<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Stream vs Loop — 선택 가이드</text>

  <!-- Decision start -->
  <rect x="330" y="68" width="220" height="46" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">컬렉션/배열 처리가 필요한가?</text>

  <!-- Arrow down -->
  <line x1="440" y1="114" x2="440" y2="134" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Yes</text>

  <!-- Q2 -->
  <rect x="280" y="136" width="320" height="46" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">인덱스 접근 또는 조기 break 필요?</text>

  <!-- Yes branch: Loop -->
  <line x1="280" y1="159" x2="200" y2="159" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="238" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Yes</text>

  <rect x="60" y="136" width="132" height="46" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="126" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">for 루프 사용</text>
  <text x="126" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">인덱스 / break 활용</text>

  <!-- No branch: Q3 -->
  <line x1="440" y1="182" x2="440" y2="202" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">No</text>

  <!-- Q3 -->
  <rect x="260" y="204" width="360" height="46" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">변환/필터링/집계 연산인가?</text>

  <!-- Yes: Stream -->
  <line x1="440" y1="250" x2="440" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="455" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Yes</text>

  <rect x="300" y="272" width="280" height="46" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">병렬 처리 이득이 있는가?</text>

  <!-- Yes: parallel -->
  <line x1="590" y1="295" x2="660" y2="295" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="624" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Yes</text>

  <rect x="660" y="272" width="160" height="46" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">parallelStream()</text>
  <text x="740" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">대용량 CPU 연산</text>

  <!-- No: sequential stream -->
  <line x1="440" y1="318" x2="440" y2="338" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">No</text>

  <rect x="300" y="340" width="280" height="46" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">순차 stream()</text>
  <text x="440" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">filter/map/collect 체이닝</text>

  <!-- Summary boxes -->
  <rect x="60" y="405" width="234" height="42" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="177" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Stream이 적합한 경우</text>
  <text x="177" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">변환·필터·집계·중복제거·정렬</text>

  <rect x="314" y="405" width="254" height="42" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="441" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">for 루프가 적합한 경우</text>
  <text x="441" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인덱스 접근·조기 탈출·checked ex</text>

  <rect x="588" y="405" width="232" height="42" rx="8" fill="#1a1a08" stroke="#e8c542" stroke-width="1"/>
  <text x="704" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c542" text-anchor="middle">황금 법칙</text>
  <text x="704" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">팀 합의 + JMH 측정 + 가독성 우선</text>
</svg>
