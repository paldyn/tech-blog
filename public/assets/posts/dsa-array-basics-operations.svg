  <text x="190" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555" text-anchor="middle">25</text>
  <text x="190" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
