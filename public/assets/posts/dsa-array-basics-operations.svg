  <text x="190" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" text-anchor="middle">25</text>
  <rect x="230" y="198" width="70" height="40" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="265" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555" text-anchor="middle">99</text>
