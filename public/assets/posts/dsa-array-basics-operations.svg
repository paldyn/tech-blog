  <text x="340" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" text-anchor="middle">37</text>
  <rect x="380" y="198" width="70" height="40" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="415" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" text-anchor="middle">42</text>
  <rect x="455" y="198" width="70" height="40" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="490" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" text-anchor="middle">58</text>

  <!-- DELETE section -->
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">삭제: index=1 제거</text>

  <!-- Before delete -->
