  <text x="340" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" text-anchor="middle">42</text>

  <!-- Left shift arrows for delete -->
  <line x1="232" y1="324" x2="222" y2="324" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="222" y1="324" x2="162" y2="324" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-left)"/>
  <line x1="307" y1="324" x2="237" y2="324" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-left)"/>
