  <text x="265" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" text-anchor="middle">37</text>
  <rect x="305" y="124" width="70" height="40" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="340" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" text-anchor="middle">42</text>
