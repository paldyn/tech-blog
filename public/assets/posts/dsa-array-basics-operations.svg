  <text x="490" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#444" text-anchor="middle">-</text>

  <!-- Shift arrows -->
  <line x1="458" y1="144" x2="392" y2="144" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-right)"/>
  <line x1="383" y1="144" x2="317" y2="144" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-right)"/>
  <line x1="308" y1="144" x2="242" y2="144" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-right)"/>
