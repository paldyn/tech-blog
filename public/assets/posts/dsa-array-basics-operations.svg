  <rect x="80" y="388" width="70" height="28" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="115" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">10</text>
  <rect x="155" y="388" width="70" height="28" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="190" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">37</text>
  <rect x="230" y="388" width="70" height="28" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="265" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">42</text>
  <rect x="305" y="388" width="70" height="28" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <text x="340" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#444" text-anchor="middle">-</text>
  <text x="600" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">삽입/삭제 모두 O(n) — 최대 n-1 원소 이동</text>
</svg>
