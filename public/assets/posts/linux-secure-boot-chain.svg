<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Secure Boot — 부팅 신뢰 체인</text>

  <!-- Chain boxes -->
  <!-- Step 1: UEFI Firmware -->
  <rect x="310" y="72" width="260" height="64" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">① UEFI 펌웨어</text>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Platform Key(PK) · KEK 보유</text>

  <!-- arrow -->
  <line x1="440" y1="136" x2="440" y2="168" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">서명 검증</text>

  <!-- Step 2: Shim -->
  <rect x="310" y="168" width="260" height="64" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">② shim.efi</text>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MS 서명 · 배포판 키 포함</text>

  <!-- arrow -->
  <line x1="440" y1="232" x2="440" y2="264" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">서명 검증</text>

  <!-- Step 3: GRUB -->
  <rect x="310" y="264" width="260" height="64" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">③ GRUB 2</text>
  <text x="440" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서명된 GRUB 바이너리</text>

  <!-- arrow -->
  <line x1="440" y1="328" x2="440" y2="360" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">서명 검증</text>

  <!-- Step 4: Kernel -->
  <rect x="310" y="360" width="260" height="64" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">④ Linux 커널</text>
  <text x="440" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서명된 vmlinuz · modules</text>

  <!-- 실패 경로: 좌측 -->
  <rect x="60" y="200" width="200" height="60" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">서명 검증 실패</text>
  <text x="160" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">부팅 중단 · 경고 화면</text>

  <line x1="310" y1="220" x2="264" y2="230" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>

  <!-- 우측: 키 DB -->
  <rect x="620" y="72" width="200" height="130" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="720" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">UEFI 키 데이터베이스</text>
  <text x="720" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PK — Platform Key</text>
  <text x="720" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">KEK — Key Exchange Key</text>
  <text x="720" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">db — 허용 서명자 목록</text>
  <text x="720" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dbx — 차단 목록</text>

  <!-- 우측: 서명 불가 커널 모듈 -->
  <rect x="620" y="220" width="200" height="80" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="720" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">서명 없는 모듈</text>
  <text x="720" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">lockdown 모드에서</text>
  <text x="720" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로드 거부됨</text>

  <!-- 요약 -->
  <rect x="60" y="440" width="760" height="28" rx="6" fill="#111827" stroke="#2a3040" stroke-width="1"/>
  <text x="440" y="459" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Secure Boot는 부트킷·루트킷의 사전 로드를 막는 UEFI 표준 — 운영 중 보안과는 별개 레이어</text>
</svg>
