<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">무한 배낭 vs 0/1 배낭 순회 방향</text>

  <!-- Left: 0/1 (reverse) -->
  <text x="220" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">0/1 배낭 — 역순 순회</text>

  <!-- Array cells W=0..5 -->
  <text x="70" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dp: [0, 0, 0, 3, 3, 3]  (물품1 처리 전)</text>

  <rect x="70" y="118" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="92" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="118" y="118" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="140" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="166" y="118" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="188" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="214" y="118" width="44" height="36" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="236" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">3</text>
  <rect x="262" y="118" width="44" height="36" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="284" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">3</text>
  <rect x="310" y="118" width="44" height="36" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="332" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">3</text>

  <!-- Reverse arrow -->
  <text x="220" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">w=5 → w=2 역순 읽기</text>
  <text x="220" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dp[5-2]=dp[3]=3 (물품1 미포함 값 참조) ✓</text>

  <text x="70" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">결과: [0, 0, 3, 3, 6, 6]  (물품1 w=2,v=3 추가 후)</text>
  <rect x="70" y="228" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="92" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="118" y="228" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="140" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="166" y="228" width="44" height="36" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="188" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">3</text>
  <rect x="214" y="228" width="44" height="36" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="236" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">3</text>
  <rect x="262" y="228" width="44" height="36" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="284" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">6</text>
  <rect x="310" y="228" width="44" height="36" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="332" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">6</text>
  <text x="220" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">물품1이 최대 1번만 선택됨 ✓</text>

  <!-- Divider -->
  <line x1="440" y1="70" x2="440" y2="380" stroke="#333" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Right: Unbounded (forward) -->
  <text x="660" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">무한 배낭 — 정순 순회</text>

  <text x="460" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dp: [0, 0, 0, 0, 0, 0]  (초기)</text>

  <rect x="460" y="118" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="482" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="508" y="118" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="530" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="556" y="118" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="578" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="604" y="118" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="626" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="652" y="118" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="674" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="700" y="118" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="722" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>

  <text x="660" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">w=2 → w=5 정순 읽기</text>
  <text x="660" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dp[5-2]=dp[3] 이미 업데이트 값 참조</text>

  <text x="460" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">결과: [0, 0, 3, 3, 6, 6]  (물품1 w=2,v=3, 무한허용)</text>
  <rect x="460" y="228" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="482" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="508" y="228" width="44" height="36" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="530" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">0</text>
  <rect x="556" y="228" width="44" height="36" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="578" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">3</text>
  <rect x="604" y="228" width="44" height="36" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="626" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">3</text>
  <rect x="652" y="228" width="44" height="36" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="674" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">6</text>
  <rect x="700" y="228" width="44" height="36" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="722" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">6</text>
  <text x="660" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">물품1이 여러 번 선택 가능 ✓</text>

  <!-- Bottom note -->
  <rect x="60" y="310" width="760" height="82" fill="#111" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">핵심 차이: 순회 방향 하나로 두 문제 구분</text>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">역순(W→wi) → 이전 상태(물품 미포함) 참조 → 0/1 배낭</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">정순(wi→W) → 현재 상태(물품 포함) 참조 → 무한 배낭</text>
</svg>
