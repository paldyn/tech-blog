<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">비동기 제너레이터 실전 예제</text>

  <!-- Left: async generator with await -->
  <text x="230" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">await + yield 조합</text>
  <rect x="50" y="80" width="370" height="284" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># API 데이터를 비동기로 스트리밍</tspan></text>
  <text x="66" y="121" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">async def </tspan><tspan>fetch_pages(url, pages):</tspan>
  </text>
  <text x="66" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">async with </tspan><tspan>aiohttp.ClientSession()</tspan>
  </text>
  <text x="66" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">            <tspan font-weight="600" fill="#7ec8e3">as </tspan><tspan>session:</tspan>
  </text>
  <text x="66" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">        </tspan><tspan font-weight="600" fill="#7ec8e3">for </tspan><tspan>page </tspan><tspan font-weight="600" fill="#7ec8e3">in </tspan><tspan>range(</tspan><tspan fill="#b5cea8">1</tspan><tspan>, pages+</tspan><tspan fill="#b5cea8">1</tspan><tspan>):</tspan>
  </text>
  <text x="66" y="193" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">            resp = </tspan><tspan font-weight="600" fill="#7ec8e3">await </tspan><tspan>session.get(</tspan>
  </text>
  <text x="66" y="211" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">                url, params={<tspan fill="#ce9178">'page'</tspan>: page})</text>
  <text x="66" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">            data = </tspan><tspan font-weight="600" fill="#7ec8e3">await </tspan><tspan>resp.json()</tspan>
  </text>
  <text x="66" y="247" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">            </tspan><tspan font-weight="600" fill="#7ec8e3">yield </tspan><tspan>data</tspan>
  </text>
  <text x="66" y="283" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># await와 yield 모두 사용</tspan></text>
  <text x="66" y="301" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 페이지별로 I/O 후 즉시 yield</tspan></text>

  <!-- Right: consumption -->
  <text x="650" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">소비 패턴</text>
  <rect x="460" y="80" width="370" height="284" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># async for로 소비</tspan></text>
  <text x="476" y="121" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">async def </tspan><tspan>main():</tspan>
  </text>
  <text x="476" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">async for </tspan><tspan>page_data </tspan><tspan font-weight="600" fill="#7ec8e3">in </tspan><tspan>\</tspan>
  </text>
  <text x="476" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">            fetch_pages(url, <tspan fill="#b5cea8">5</tspan>):</text>
  <text x="476" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        process(page_data)</text>
  <text x="476" y="211" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># async comprehension</tspan></text>
  <text x="476" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    all_data = [</text>
  <text x="476" y="247" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">        page </tspan><tspan font-weight="600" fill="#7ec8e3">async for </tspan><tspan>page</tspan>
  </text>
  <text x="476" y="265" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0">        </tspan><tspan font-weight="600" fill="#7ec8e3">in </tspan><tspan>fetch_pages(url, </tspan><tspan fill="#b5cea8">3</tspan><tspan>)</tspan>
  </text>
  <text x="476" y="283" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    ]</text>
  <text x="476" y="319" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # 비동기 리스트 컴프리헨션</tspan></text>
  <text x="476" y="337" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # async for가 내부에서 동작</tspan></text>
</svg>
