<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="cpArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">연결 생성 비용 — 매번 새로 열면 비싸다</text>

  <text x="60" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">getConnection() 한 번에 일어나는 일</text>

  <!-- step boxes -->
  <rect x="60" y="108" width="180" height="72" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">TCP 연결</text>
  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">3-way handshake</text>

  <line x1="240" y1="144" x2="300" y2="144" stroke="#e05555" stroke-width="2" marker-end="url(#cpArr)"/>

  <rect x="300" y="108" width="180" height="72" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="320" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">인증</text>
  <text x="320" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">계정·비밀번호 검증</text>

  <line x1="480" y1="144" x2="540" y2="144" stroke="#e05555" stroke-width="2" marker-end="url(#cpArr)"/>

  <rect x="540" y="108" width="280" height="72" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="560" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">세션·자원 할당</text>
  <text x="560" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB 측 메모리·프로세스</text>

  <text x="60" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">한 번이면 수~수십 ms. 요청마다 매번 반복하면 SQL 실행보다 연결 비용이 더 크다.</text>

  <!-- divider line -->
  <line x1="60" y1="256" x2="820" y2="256" stroke="#2a2a2a" stroke-width="1"/>

  <rect x="60" y="276" width="760" height="84" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">커넥션 풀의 해법</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">미리 연결 몇 개를 만들어 두고 빌려주고 돌려받기만 한다 — 생성·해제 비용 제거</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">close()는 진짜 닫는 게 아니라 풀에 반납하는 것</text>
</svg>
