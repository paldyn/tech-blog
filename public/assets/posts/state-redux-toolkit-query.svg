<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a" rx="12">
  <defs>
    <marker id="arrowBlue" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M2,2 L10,5 L2,8 Z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="45" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RTK Query — 데이터 페칭 자동화</text>

  <!-- Stage 1: API Definition -->
  <rect x="60" y="80" width="240" height="300" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="180" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">① API 정의</text>

  <!-- Stage 1 code box -->
  <rect x="70" y="120" width="220" height="248" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="82" y="140" fill="#ffffff">createApi({</tspan>
    <tspan x="82" dy="19" fill="#ffffff">  reducerPath:</tspan>
    <tspan x="82" dy="19" fill="#ce9178">    'postsApi',</tspan>
    <tspan x="82" dy="19" fill="#ffffff">  baseQuery:</tspan>
    <tspan x="82" dy="19" fill="#ffffff">    fetchBaseQuery({</tspan>
    <tspan x="82" dy="19" fill="#ce9178">      baseUrl: '/api'</tspan>
    <tspan x="82" dy="19" fill="#ffffff">    }),</tspan>
    <tspan x="82" dy="19" fill="#ffffff">  endpoints: b =&gt; ({</tspan>
    <tspan x="82" dy="19" fill="#ffffff">    getPosts:</tspan>
    <tspan x="82" dy="19" fill="#ffffff">      b.query({</tspan>
    <tspan x="82" dy="19" fill="#ffffff">        query: () =&gt;</tspan>
    <tspan x="82" dy="19" fill="#ce9178">          '/posts'</tspan>
    <tspan x="82" dy="19" fill="#ffffff">      })</tspan>
    <tspan x="82" dy="19" fill="#ffffff">  })</tspan>
    <tspan x="82" dy="19" fill="#ffffff">})</tspan>
  </text>

  <!-- Arrow 1 to 2 -->
  <line x1="305" y1="230" x2="316" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Stage 2: Auto-generated Hooks -->
  <rect x="320" y="80" width="240" height="300" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② 자동 생성 Hook</text>

  <!-- Stage 2 code box -->
  <rect x="330" y="120" width="220" height="248" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="342" y="140" fill="#9aa4b8">// 자동 생성됨</tspan>
    <tspan x="342" dy="19" fill="#ffffff">useGetPostsQuery()</tspan>
    <tspan x="342" dy="19" fill="#ffffff">useGetPostsMutation()</tspan>
    <tspan x="342" dy="19" fill="#ffffff"> </tspan>
    <tspan x="342" dy="19" fill="#9aa4b8">// 컴포넌트에서</tspan>
    <tspan x="342" dy="19" fill="#ffffff">const {</tspan>
    <tspan x="342" dy="19" fill="#ffffff">  data,</tspan>
    <tspan x="342" dy="19" fill="#ffffff">  isLoading,</tspan>
    <tspan x="342" dy="19" fill="#ffffff">  isError</tspan>
    <tspan x="342" dy="19" fill="#ffffff">} = useGetPostsQuery()</tspan>
  </text>

  <!-- Arrow 2 to 3 -->
  <line x1="565" y1="230" x2="576" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Stage 3: Cache Management -->
  <rect x="580" y="80" width="240" height="300" fill="#1a0a0a" stroke="#b07ec8" stroke-width="1.5" rx="8"/>
  <text x="700" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b07ec8" text-anchor="middle">③ 자동 캐시 관리</text>

  <!-- Stage 3 bullets -->
  <text font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14">
    <tspan x="600" y="148" fill="#e8e8e8">✓ 로딩/에러 상태</tspan>
    <tspan x="600" dy="30" fill="#e8e8e8">✓ 중복 요청 제거</tspan>
    <tspan x="600" dy="30" fill="#e8e8e8">✓ 캐시 무효화</tspan>
    <tspan x="600" dy="30" fill="#e8e8e8">✓ 낙관적 업데이트</tspan>
    <tspan x="600" dy="30" fill="#e8e8e8">✓ refetchOnFocus</tspan>
    <tspan x="600" dy="30" fill="#e8e8e8">✓ polling 지원</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="60" y="395" width="760" height="30" fill="#111111" stroke="#333333" stroke-width="1" rx="6"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888888" text-anchor="middle">Redux DevTools Extension으로 모든 캐시 상태 시각화 가능</text>
</svg>
