<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">pom.xml 구조 — Maven 프로젝트의 핵심 설정 파일</text>

  <!-- Left column: pom.xml code box -->
  <rect x="60" y="76" width="380" height="420" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="76" dy="0" fill="#9aa4b8">&lt;!-- pom.xml --&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">&lt;project&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">  &lt;groupId&gt;</tspan><tspan fill="#ce9178">com.example</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/groupId&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">  &lt;artifactId&gt;</tspan><tspan fill="#ce9178">my-app</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/artifactId&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">  &lt;version&gt;</tspan><tspan fill="#b5cea8">1.0.0</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/version&gt;</tspan><tspan x="76" dy="19" fill="#ffffff">  </tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">  &lt;properties&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">    &lt;java.version&gt;</tspan><tspan fill="#b5cea8">21</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/java.version&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">  &lt;/properties&gt;</tspan><tspan x="76" dy="19" fill="#ffffff">  </tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">  &lt;dependencies&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">    &lt;dependency&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">      &lt;groupId&gt;</tspan><tspan fill="#ce9178">junit</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/groupId&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">      &lt;artifactId&gt;</tspan><tspan fill="#ce9178">junit</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/artifactId&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">      &lt;version&gt;</tspan><tspan fill="#b5cea8">4.13.2</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/version&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">      &lt;scope&gt;</tspan><tspan fill="#ce9178">test</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/scope&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">    &lt;/dependency&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">  &lt;/dependencies&gt;</tspan><tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">&lt;/project&gt;</tspan></text>

  <!-- Right column: annotations -->
  <!-- Coordinates box -->
  <rect x="500" y="88" width="320" height="72" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">GAV 좌표 (Coordinates)</text>
  <text x="516" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">groupId + artifactId + version</text>
  <text x="516" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">전 세계에서 유일한 아티팩트 식별자</text>

  <!-- Arrow: coordinates -->
  <line x1="500" y1="120" x2="444" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Properties box -->
  <rect x="500" y="192" width="320" height="60" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">properties</text>
  <text x="516" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">버전 등 공통 값을 변수처럼 관리</text>
  <text x="516" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> </text>

  <!-- Arrow: properties -->
  <line x1="500" y1="216" x2="444" y2="243" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Dependencies box -->
  <rect x="500" y="282" width="320" height="92" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">dependencies</text>
  <text x="516" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">필요한 외부 라이브러리 선언</text>
  <text x="516" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">scope: compile / test / provided</text>
  <text x="516" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">전이 의존성 자동 포함</text>

  <!-- Arrow: dependencies -->
  <line x1="500" y1="330" x2="444" y2="352" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Local repo box -->
  <rect x="500" y="404" width="320" height="72" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">~/.m2/repository (로컬 캐시)</text>
  <text x="516" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Maven Central → 로컬 캐시 순으로 탐색</text>
  <text x="516" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">한 번 다운로드 후 오프라인 재사용 가능</text>

  <!-- Arrow: local repo (dashed) -->
  <line x1="500" y1="440" x2="444" y2="433" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
</svg>
