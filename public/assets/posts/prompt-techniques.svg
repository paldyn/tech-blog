<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" width="880" height="580">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Wanted+Sans+Variable:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Wanted Sans Variable', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
    </style>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <!-- Card gradients -->
    <linearGradient id="card0" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141824;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#182214;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1f10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22190d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22102a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0d22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="qualBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a7cd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9060e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="580" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="20" font-weight="700" letter-spacing="0.5">주요 프롬프팅 기법 비교</text>
  <line x1="100" y1="58" x2="780" y2="58" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Subtitle row -->
  <text x="68" y="82" fill="#555" font-size="12">기법</text>
  <text x="230" y="82" fill="#555" font-size="12">구조 예시</text>
  <text x="560" y="82" fill="#555" font-size="12">적합한 상황</text>
  <text x="760" y="82" fill="#555" font-size="12">난이도</text>
  <line x1="48" y1="90" x2="832" y2="90" stroke="#222" stroke-width="1"/>

  <!-- ===== Row 0: Zero-shot ===== -->
  <rect x="48" y="96" width="784" height="96" rx="8" fill="url(#card0)" stroke="#2a3860" stroke-width="1"/>
  <!-- Tag -->
  <rect x="60" y="110" width="130" height="26" rx="13" fill="#1e3060" stroke="#3a5ca8" stroke-width="1"/>
  <text x="125" y="128" text-anchor="middle" fill="#7aa8e8" font-size="13" font-weight="600">Zero-shot</text>
  <text x="60" y="168" fill="#5a6a88" font-size="11">예시 없이 바로 질문</text>
  <!-- Example -->
  <rect x="210" y="100" width="320" height="84" rx="6" fill="#0f1420" stroke="#1e2a44" stroke-width="1"/>
  <text x="222" y="120" fill="#4a7cd4" font-size="10" font-weight="600">USER</text>
  <text x="222" y="137" fill="#b0c4e0" font-size="11">"이 문장을 영어로 번역해줘:</text>
  <text x="222" y="152" fill="#b0c4e0" font-size="11"> 오늘 날씨가 정말 좋다."</text>
  <text x="222" y="172" fill="#4a9cd4" font-size="10" font-weight="600">AI →</text>
  <text x="248" y="172" fill="#7aace8" font-size="11">"The weather is really nice today."</text>
  <!-- Use case -->
  <text x="548" y="122" fill="#8898b8" font-size="12">간단한 번역·요약·분류</text>
  <text x="548" y="140" fill="#8898b8" font-size="12">빠른 프로토타이핑</text>
  <text x="548" y="158" fill="#6678a0" font-size="11">→ 복잡한 추론엔 한계</text>
  <!-- Difficulty -->
  <rect x="750" y="118" width="60" height="8" rx="4" fill="#1e2a44"/>
  <rect x="750" y="118" width="18" height="8" rx="4" fill="#4a7cd4"/>
  <text x="780" y="145" text-anchor="middle" fill="#4a7cd4" font-size="11" font-weight="600">쉬움</text>

  <!-- ===== Row 1: Few-shot ===== -->
  <rect x="48" y="200" width="784" height="104" rx="8" fill="url(#card1)" stroke="#2a4830" stroke-width="1"/>
  <!-- Tag -->
  <rect x="60" y="214" width="130" height="26" rx="13" fill="#1e3d20" stroke="#3a7854" stroke-width="1"/>
  <text x="125" y="232" text-anchor="middle" fill="#6abf8e" font-size="13" font-weight="600">Few-shot</text>
  <text x="60" y="272" fill="#4a7a58" font-size="11">예시 2~5개 제공</text>
  <!-- Example -->
  <rect x="210" y="204" width="320" height="92" rx="6" fill="#0f1810" stroke="#1e3220" stroke-width="1"/>
  <text x="222" y="224" fill="#4aaa6e" font-size="10" font-weight="600">예시 1</text>
  <text x="222" y="240" fill="#90c8a8" font-size="11">입력: "나는 행복해" → 출력: 긍정</text>
  <text x="222" y="256" fill="#4aaa6e" font-size="10" font-weight="600">예시 2</text>
  <text x="222" y="272" fill="#90c8a8" font-size="11">입력: "오늘 최악이야" → 출력: 부정</text>
  <text x="222" y="288" fill="#6aaa80" font-size="10" font-weight="600">실제 →</text>
  <text x="262" y="288" fill="#90c8a8" font-size="11">입력: "그냥 그래" → 출력: 중립</text>
  <!-- Use case -->
  <text x="548" y="226" fill="#78a888" font-size="12">감성 분석, 스타일 일관성</text>
  <text x="548" y="244" fill="#78a888" font-size="12">특정 형식의 반복 작업</text>
  <text x="548" y="262" fill="#5a8868" font-size="11">→ 예시 품질이 결과 좌우</text>
  <!-- Difficulty -->
  <rect x="750" y="228" width="60" height="8" rx="4" fill="#1e3220"/>
  <rect x="750" y="228" width="34" height="8" rx="4" fill="#4aaa6e"/>
  <text x="780" y="255" text-anchor="middle" fill="#4aaa6e" font-size="11" font-weight="600">보통</text>

  <!-- ===== Row 2: Chain-of-Thought ===== -->
  <rect x="48" y="312" width="784" height="112" rx="8" fill="url(#card2)" stroke="#504020" stroke-width="1"/>
  <!-- Tag -->
  <rect x="60" y="328" width="130" height="26" rx="13" fill="#3d2e10" stroke="#8a6a10" stroke-width="1"/>
  <text x="125" y="346" text-anchor="middle" fill="#d4b060" font-size="12" font-weight="600">Chain-of-Thought</text>
  <text x="60" y="390" fill="#7a6030" font-size="11">단계적 추론 유도</text>
  <!-- Example -->
  <rect x="210" y="316" width="320" height="100" rx="6" fill="#18120a" stroke="#32220c" stroke-width="1"/>
  <text x="222" y="336" fill="#d4a020" font-size="10" font-weight="600">USER</text>
  <text x="222" y="352" fill="#c8b080" font-size="11">"사과 3개에서 1개를 먹고,</text>
  <text x="222" y="367" fill="#c8b080" font-size="11"> 2배를 더 샀다. 총 몇 개?"</text>
  <text x="222" y="383" fill="#c8a020" font-size="10" font-weight="600">단계별로 생각해봐:</text>
  <text x="222" y="399" fill="#a09060" font-size="11">3-1=2 → 2+2×2=6 → 6개</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="222" y="412" fill="#a09060" font-size="11">(Let's think step by step)</text>
  <!-- Use case -->
  <text x="548" y="340" fill="#b09060" font-size="12">수학·논리 문제</text>
  <text x="548" y="358" fill="#b09060" font-size="12">복잡한 추론·계획 수립</text>
  <text x="548" y="376" fill="#907840" font-size="11">→ 토큰 소모 증가 주의</text>
  <!-- Difficulty -->
  <rect x="750" y="340" width="60" height="8" rx="4" fill="#32220c"/>
  <rect x="750" y="340" width="46" height="8" rx="4" fill="#d4a020"/>
  <text x="780" y="367" text-anchor="middle" fill="#d4a020" font-size="11" font-weight="600">높음</text>

  <!-- ===== Row 3: Role Prompting ===== -->
  <rect x="48" y="432" width="784" height="96" rx="8" fill="url(#card3)" stroke="#402050" stroke-width="1"/>
  <!-- Tag -->
  <rect x="60" y="446" width="130" height="26" rx="13" fill="#30153c" stroke="#7a4a7e" stroke-width="1"/>
  <text x="125" y="464" text-anchor="middle" fill="#c080c8" font-size="13" font-weight="600">Role Prompting</text>
  <text x="60" y="500" fill="#603870" font-size="11">역할 부여로 맥락 고정</text>
  <!-- Example -->
  <rect x="210" y="436" width="320" height="84" rx="6" fill="#130a18" stroke="#260f2e" stroke-width="1"/>
  <text x="222" y="456" fill="#c060c8" font-size="10" font-weight="600">USER</text>
  <text x="222" y="472" fill="#d8b0e0" font-size="11">"당신은 10년 경력의 보안 전문가입니다.</text>
  <text x="222" y="488" fill="#d8b0e0" font-size="11"> 이 코드의 취약점을 분석해주세요."</text>
  <text x="222" y="508" fill="#9060a0" font-size="10" font-weight="600">→ 역할이 응답 깊이와 어조를 결정</text>
  <!-- Use case -->
  <text x="548" y="460" fill="#a070b0" font-size="12">전문 영역 분석·자문</text>
  <text x="548" y="478" fill="#a070b0" font-size="12">일관된 페르소나 유지</text>
  <text x="548" y="496" fill="#806090" font-size="11">→ System Prompt와 함께 사용</text>
  <!-- Difficulty -->
  <rect x="750" y="460" width="60" height="8" rx="4" fill="#260f2e"/>
  <rect x="750" y="460" width="26" height="8" rx="4" fill="#b064b8"/>
  <text x="780" y="487" text-anchor="middle" fill="#b064b8" font-size="11" font-weight="600">쉬움</text>

  <!-- Bottom note -->
  <text x="440" y="558" text-anchor="middle" fill="#383838" font-size="11">기법들은 서로 배타적이지 않다 — Role + Few-shot + CoT를 조합하면 더 강력한 프롬프트가 된다</text>
</svg>
