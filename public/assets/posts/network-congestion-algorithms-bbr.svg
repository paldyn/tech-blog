<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">BBR: 병목 대역폭 및 왕복 전파 시간 기반 제어</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">손실이 아닌 네트워크 물리적 특성을 직접 측정</text>

  <!-- BBR phases -->
  <!-- Phase 1: Startup -->
  <rect x="40" y="90" width="165" height="120" rx="6" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="122" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0c055">Startup</text>
  <text x="122" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">지수적 증가</text>
  <text x="122" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대역폭 상한</text>
  <text x="122" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">탐색 중</text>
  <text x="122" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">BW 증가 멈추면</text>
  <text x="122" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">다음 단계로</text>

  <!-- Arrow -->
  <line x1="205" y1="150" x2="220" y2="150" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 2: Drain -->
  <rect x="220" y="90" width="165" height="120" rx="6" fill="#1a0a0a" stroke="#5a2a2a" stroke-width="1.5"/>
  <text x="302" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Drain</text>
  <text x="302" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">급속 감소</text>
  <text x="302" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Startup에서 채운</text>
  <text x="302" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">큐 비우기</text>
  <text x="302" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">RTT = min_RTT</text>
  <text x="302" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">되면 다음으로</text>

  <!-- Arrow -->
  <line x1="385" y1="150" x2="400" y2="150" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 3: ProbeBW -->
  <rect x="400" y="90" width="165" height="120" rx="6" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="482" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">ProbeBW</text>
  <text x="482" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">주기적 탐색</text>
  <text x="482" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">8RTT 주기로</text>
  <text x="482" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대역폭 탐색</text>
  <text x="482" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">최대 시간 여기서</text>
  <text x="482" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">보냄 (크루즈)</text>

  <!-- Arrow -->
  <line x1="565" y1="150" x2="580" y2="150" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 4: ProbeRTT -->
  <rect x="580" y="90" width="260" height="120" rx="6" fill="#1a0f1a" stroke="#5a2a5a" stroke-width="1.5"/>
  <text x="710" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#cc77cc">ProbeRTT</text>
  <text x="710" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">주기적 RTT 재측정</text>
  <text x="710" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">10초마다 cwnd 최소화</text>
  <text x="710" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">진짜 RTT 측정 (큐 비우기)</text>
  <text x="710" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">완료 후 ProbeBW로</text>

  <!-- BDP equation -->
  <rect x="40" y="240" width="800" height="140" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">BDP (Bandwidth-Delay Product) = 파이프를 가득 채우는 데이터량</text>
  <text x="60" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve" font-weight="600">BDP</text>
  <text x="60" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    = 대역폭(bps) × RTT(초)</text>
  <text x="60" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">     예: 1Gbps × 0.02s = 20Mb = 2.5MB 이 파이프에 떠있어야 최적</text>
  <text x="60" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">     BBR은 이 값을 목표로 cwnd 자동 조정</text>
  <text x="60" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">     CUBIC는 손실 발생까지 늘림 → 불필요한 버퍼 팽창(Bufferbloat)</text>
</svg>
