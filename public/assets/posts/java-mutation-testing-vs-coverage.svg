<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커버리지 vs 뮤테이션 점수</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">"실행했다"와 "검증했다"는 다르다</text>

  <rect x="60" y="100" width="360" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">코드 커버리지</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">질문: 이 코드가 실행됐나?</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">단언이 없어도 100% 가능</text>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555">가짜 테스트에 속는다</text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">측정이 빠르고 가볍다</text>

  <rect x="460" y="100" width="360" height="180" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">뮤테이션 점수</text>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">질문: 코드가 틀리면 잡나?</text>
  <text x="480" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">단언이 있어야 변이가 죽음</text>
  <text x="480" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555">단언 품질을 직접 검증</text>
  <text x="480" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">측정 비용이 크다</text>
</svg>
