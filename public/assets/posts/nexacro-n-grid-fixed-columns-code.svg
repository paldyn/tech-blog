<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">고정 컬럼 설정 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">fixedcol · fixedrow · 런타임 동적 변경</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="256" fill="#070b14" rx="6" stroke="#1e2433"/>

  <!-- Comment 1 -->
  <text x="80" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// XFD: 좌측 2개 컬럼 고정</text>

  <!-- Grid with fixedcol -->
  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;</tspan><tspan fill="#7ec8e3">Grid</tspan><tspan fill="#e8e8e8"> id=</tspan><tspan fill="#ce9178">"grd_emp"</tspan></text>

  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  fixedcol=</text>
  <text x="162" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">"2"</text>
  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  bindDataset=</tspan><tspan fill="#ce9178">"ds_emp"</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- Comment 2 -->
  <text x="80" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 런타임 동적 변경</text>

  <!-- Dynamic change -->
  <text x="80" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">this.grd_emp.fixedcol = </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">;</tspan></text>

  <!-- Comment 3 -->
  <text x="80" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 상단 행 고정 — fixedrow</text>

  <!-- fixedrow -->
  <text x="80" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;</tspan><tspan fill="#7ec8e3">Grid</tspan><tspan fill="#e8e8e8"> id=</tspan><tspan fill="#ce9178">"grd_report"</tspan></text>

  <text x="80" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  fixedcol=</text>
  <text x="162" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">"1"</text>
  <text x="182" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> fixedrow=</text>
  <text x="262" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">"2"</text>
  <text x="282" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">/&gt;</text>

  <!-- Bottom note -->
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">fixedcol: 좌측 컬럼 고정 수 | fixedrow: 상단 body 행 고정 수</text>
</svg>
