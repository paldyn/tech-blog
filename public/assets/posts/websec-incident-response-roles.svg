<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410">
  <rect width="880" height="410" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">사고 대응 팀: 누가 무엇을 하는가</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">혼란의 순간에 역할이 미리 정해져 있어야 빠르게 움직인다</text>

  <rect x="50" y="100" width="380" height="80" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="70" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">사고 지휘관 (Incident Commander)</text>
  <text x="70" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">전체 대응 조율 · 의사결정 · 우선순위 판단</text>
  <text x="70" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">직접 키보드를 잡지 않고 한 발 물러나 지휘한다</text>

  <rect x="450" y="100" width="380" height="80" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">기술 대응 (Tech Lead / Responder)</text>
  <text x="470" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">조사 · 격리 · 근절 · 복구의 실제 작업 수행</text>
  <text x="470" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">증거 보존을 염두에 두고 행동</text>

  <rect x="50" y="200" width="380" height="80" rx="8" fill="#1a102a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="70" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">커뮤니케이션 · 법무</text>
  <text x="70" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">내·외부 공지 · 규제 통지 · 법적 의무 검토</text>
  <text x="70" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">GDPR 72시간, 국내 개인정보 유출 통지 등</text>

  <rect x="450" y="200" width="380" height="80" rx="8" fill="#2a1a10" stroke="#e0a555" stroke-width="1.5"/>
  <text x="470" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0a555">기록 담당 (Scribe)</text>
  <text x="470" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">타임라인 · 모든 조치와 시각을 실시간 기록</text>
  <text x="470" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">사후 검토와 법적 증빙의 토대</text>

  <rect x="50" y="306" width="780" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">핵심 원칙</text>
  <text x="70" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">역할은 사람이 아니라 직책에 부여한다 — 새벽 3시에 누가 깨어 있든 그 자리를 채울 수 있도록</text>
</svg>
