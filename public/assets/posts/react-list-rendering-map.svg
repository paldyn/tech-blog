<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">.map()으로 리스트 렌더링하기</text>

  <!-- Left: Data array -->
  <rect x="60" y="64" width="300" height="210" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="210" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">① 데이터 배열</text>
  <rect x="76" y="100" width="268" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="122" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> fruits = [</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  { id: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, name: </tspan><tspan fill="#ce9178">'사과'</tspan><tspan fill="#ffffff"> },</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  { id: </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, name: </tspan><tspan fill="#ce9178">'바나나'</tspan><tspan fill="#ffffff"> },</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  { id: </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">, name: </tspan><tspan fill="#ce9178">'체리'</tspan><tspan fill="#ffffff"> },</tspan>
    <tspan x="92" dy="18" fill="#ffffff">];</tspan>
    <tspan x="92" dy="18"> </tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// key가 없으면 React 경고</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// 반드시 고유 값 사용</tspan>
  </text>

  <!-- Arrow -->
  <line x1="360" y1="168" x2="420" y2="168" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="390" y="158" text-anchor="middle" font-size="11" fill="#7777cc">.map()</text>

  <!-- Right: JSX output -->
  <rect x="420" y="64" width="400" height="210" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="620" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">② JSX 요소 배열로 변환</text>
  <rect x="436" y="100" width="368" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="452" y="122" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> FruitList() {</tspan>
    <tspan x="452" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="452" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;ul&gt;</tspan>
    <tspan x="452" dy="18" fill="#ffffff">      {fruits.map(fruit =&gt; (</tspan>
    <tspan x="452" dy="18" fill="#ffffff">        </tspan><tspan fill="#ce9178">&lt;li</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">key</tspan><tspan fill="#ffffff">={fruit.id}</tspan><tspan fill="#ce9178">&gt;</tspan>
    <tspan x="452" dy="18" fill="#ffffff">          {fruit.name}</tspan>
    <tspan x="452" dy="18" fill="#ce9178">        &lt;/li&gt;</tspan>
    <tspan x="452" dy="18" fill="#ffffff">      ))}</tspan>
    <tspan x="452" dy="18" fill="#ce9178">    &lt;/ul&gt;</tspan>
  </text>

  <!-- Filter + map pattern -->
  <rect x="60" y="300" width="760" height="120" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="322" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">filter() + map() 조합 — 조건에 맞는 항목만 렌더링</text>
  <rect x="76" y="334" width="728" height="74" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="356" fill="#9aa4b8">// price가 1000 이상인 상품만 렌더링</tspan>
    <tspan x="92" dy="18" fill="#ffffff">{products</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  .filter(p =&gt; p.price &gt;= </tspan><tspan fill="#b5cea8">1000</tspan><tspan fill="#ffffff">)</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  .map(p =&gt; </tspan><tspan fill="#ce9178">&lt;ProductCard</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">key</tspan><tspan fill="#ffffff">={p.id} </tspan><tspan fill="#7ec8e3">product</tspan><tspan fill="#ffffff">={p} </tspan><tspan fill="#ce9178">/&gt;</tspan><tspan fill="#ffffff">)}</tspan>
  </text>
</svg>
