<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">배열 → UI: map() 렌더링</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">JavaScript 배열 메서드로 JSX 배열 만들기</text>

  <defs>
    <marker id="arr-m" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Data array -->
  <rect x="55" y="95" width="230" height="250" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="118" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">데이터 배열</text>

  <rect x="70" y="130" width="200" height="46" rx="5" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="151" font-size="13" fill="#ce9178" text-anchor="middle">{ id: 1, name: "사과" }</text>
  <text x="170" y="168" font-size="11" fill="#888" text-anchor="middle">index: 0</text>

  <rect x="70" y="188" width="200" height="46" rx="5" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="209" font-size="13" fill="#ce9178" text-anchor="middle">{ id: 2, name: "바나나" }</text>
  <text x="170" y="226" font-size="11" fill="#888" text-anchor="middle">index: 1</text>

  <rect x="70" y="246" width="200" height="46" rx="5" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="267" font-size="13" fill="#ce9178" text-anchor="middle">{ id: 3, name: "체리" }</text>
  <text x="170" y="284" font-size="11" fill="#888" text-anchor="middle">index: 2</text>

  <text x="170" y="330" font-size="12" fill="#888" text-anchor="middle">fruits.map(fruit =&gt; ...)</text>

  <!-- Arrow -->
  <line x1="285" y1="220" x2="335" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-m)"/>

  <!-- JSX array -->
  <rect x="335" y="95" width="260" height="250" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="465" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">JSX 배열 (key 필수!)</text>

  <rect x="350" y="130" width="230" height="46" rx="5" fill="#0a1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="465" y="151" font-size="13" fill="#ffffff" text-anchor="middle">&lt;li key={1}&gt;사과&lt;/li&gt;</text>
  <text x="465" y="168" font-size="11" fill="#55c555" text-anchor="middle">key="1" ✓</text>

  <rect x="350" y="188" width="230" height="46" rx="5" fill="#0a1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="465" y="209" font-size="13" fill="#ffffff" text-anchor="middle">&lt;li key={2}&gt;바나나&lt;/li&gt;</text>
  <text x="465" y="226" font-size="11" fill="#55c555" text-anchor="middle">key="2" ✓</text>

  <rect x="350" y="246" width="230" height="46" rx="5" fill="#0a1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="465" y="267" font-size="13" fill="#ffffff" text-anchor="middle">&lt;li key={3}&gt;체리&lt;/li&gt;</text>
  <text x="465" y="284" font-size="11" fill="#55c555" text-anchor="middle">key="3" ✓</text>

  <text x="465" y="330" font-size="12" fill="#888" text-anchor="middle">React가 diff할 때 식별자로 사용</text>

  <!-- Arrow 2 -->
  <line x1="595" y1="220" x2="645" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arr-m)"/>

  <!-- DOM output -->
  <rect x="645" y="95" width="190" height="250" rx="8" fill="#0f1e12" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="118" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">DOM</text>

  <rect x="660" y="130" width="160" height="46" rx="5" fill="#142014" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="155" font-size="13" fill="#e8e8e8" text-anchor="middle">&lt;li&gt;사과&lt;/li&gt;</text>

  <rect x="660" y="188" width="160" height="46" rx="5" fill="#142014" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="213" font-size="13" fill="#e8e8e8" text-anchor="middle">&lt;li&gt;바나나&lt;/li&gt;</text>

  <rect x="660" y="246" width="160" height="46" rx="5" fill="#142014" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="271" font-size="13" fill="#e8e8e8" text-anchor="middle">&lt;li&gt;체리&lt;/li&gt;</text>

  <!-- Bottom code -->
  <rect x="55" y="365" width="770" height="90" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="70" y="378" width="740" height="64" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="398" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;ul&gt;</text>
  <text x="82" y="416" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  {fruits.map(fruit =&gt; &lt;li </text>
  <text x="272" y="416" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">key</text>
  <text x="295" y="416" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">={fruit.id}&gt;{fruit.name}&lt;/li&gt;)}</text>
  <text x="82" y="434" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;/ul&gt;</text>
</svg>
