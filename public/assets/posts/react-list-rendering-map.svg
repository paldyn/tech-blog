<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">목록 렌더링 — map()으로 배열을 JSX로</text>

  <!-- Array input -->
  <rect x="60" y="76" width="300" height="180" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">데이터 배열</text>
  <rect x="80" y="112" width="260" height="130" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan> posts = [</tspan>
  </text>
  <text x="100" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  { id: </tspan><tspan fill="#b5cea8">1</tspan><tspan>, title: </tspan><tspan fill="#ce9178">'React란'</tspan><tspan> },</tspan>
  </text>
  <text x="100" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  { id: </tspan><tspan fill="#b5cea8">2</tspan><tspan>, title: </tspan><tspan fill="#ce9178">'JSX'</tspan><tspan> },</tspan>
  </text>
  <text x="100" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  { id: </tspan><tspan fill="#b5cea8">3</tspan><tspan>, title: </tspan><tspan fill="#ce9178">'컴포넌트'</tspan><tspan> },</tspan>
  </text>
  <text x="100" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>];</tspan>
  </text>

  <!-- arrow -->
  <line x1="360" y1="166" x2="400" y2="166" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="380" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">map()</text>

  <!-- JSX output -->
  <rect x="400" y="76" width="420" height="180" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">JSX 배열 (React가 렌더)</text>
  <rect x="420" y="112" width="380" height="130" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>&lt;ul&gt;</tspan>
  </text>
  <text x="440" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  {posts.map(post </tspan><tspan fill="#7ec8e3" font-weight="600">=&gt;</tspan><tspan> (</tspan>
  </text>
  <text x="440" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>    &lt;li key={post.id}&gt;{post.title}&lt;/li&gt;</tspan>
  </text>
  <text x="440" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  ))}</tspan>
  </text>
  <text x="440" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>&lt;/ul&gt;</tspan>
  </text>

  <!-- patterns below -->
  <text x="60" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">자주 쓰는 패턴</text>

  <rect x="60" y="318" width="360" height="100" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">filter() + map()</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">posts.filter(p =&gt; p.published)</text>
  <text x="80" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">     .map(p =&gt; &lt;PostCard key={p.id} {...p} /&gt;)</text>
  <text x="80" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">filter로 제외하고 map으로 렌더</text>

  <rect x="460" y="318" width="360" height="100" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="480" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">빈 배열 처리</text>
  <text x="480" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">items.length === 0</text>
  <text x="480" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">  ? &lt;EmptyState /&gt;</text>
  <text x="480" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">  : items.map(item =&gt; &lt;Item key={item.id} /&gt;)</text>
</svg>
