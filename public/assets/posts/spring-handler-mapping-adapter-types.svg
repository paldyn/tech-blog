<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">커스텀 HandlerMapping / Adapter 등록</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">우선순위 제어와 커스텀 ArgumentResolver 등록</text>

  <!-- left panel: HandlerMapping order -->
  <text x="64" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">HandlerMapping 우선순위 설정</text>
  <rect x="60" y="94" width="380" height="330" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 커스텀 HandlerMapping 등록</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">@Bean</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">public </text>
  <text x="124" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">SimpleUrlHandlerMapping</text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    simpleMapping() {</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  var </tspan><tspan fill="#e8e8e8">m = </tspan><tspan fill="#7ec8e3">new </tspan><tspan fill="#e8e8e8">SimpleUrlHandlerMapping();</tspan></text>

  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  m.setOrder(</tspan><tspan fill="#b5cea8">Ordered.LOWEST_PRECEDENCE</tspan></text>
  
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">           - </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  var </tspan><tspan fill="#e8e8e8">urlMap = </tspan><tspan fill="#7ec8e3">new </tspan><tspan fill="#e8e8e8">HashMap&lt;&gt;();</tspan></text>

  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  urlMap.put(</tspan><tspan fill="#ce9178">"/health"</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">               healthHandler());</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  m.setUrlMap(urlMap);</text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  return </tspan><tspan fill="#e8e8e8">m;</tspan></text>
  
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <!-- right panel: Custom ArgumentResolver -->
  <text x="454" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">커스텀 ArgumentResolver 등록</text>
  <rect x="450" y="94" width="370" height="330" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>

  <text x="466" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// @LoginUser → 세션에서 자동 주입</text>
  <text x="466" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">@Component</text>
  <text x="466" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">public class </text>
  <text x="562" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">LoginUserArgumentResolver</text>
  <text x="466" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    implements</text>
  <text x="466" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    HandlerMethodArgumentResolver {</text>

  <text x="466" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">  @Override</text>
  <text x="466" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  public boolean </tspan><tspan fill="#e8e8e8">supportsParameter(</tspan></text>
  
  <text x="466" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      MethodParameter p) {</text>
  <text x="466" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    return </tspan><tspan fill="#e8e8e8">p.hasParameterAnnotation(</tspan></text>
  
  <text x="466" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">             LoginUser.</tspan><tspan fill="#7ec8e3">class</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="466" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>

  <text x="466" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">  @Override</text>
  <text x="466" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  public </tspan><tspan fill="#e8e8e8">Object resolveArgument(</tspan></text>
  
  <text x="466" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      MethodParameter p, ...) {</text>
  <text x="466" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    return </tspan><tspan fill="#e8e8e8">session.getAttribute(</tspan></text>
  
  <text x="466" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">        "loginUser"</text>
  <text x="466" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      );</text>
  <text x="466" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
</svg>
