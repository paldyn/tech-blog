<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">read 스크립트 활용 패턴</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">확인 대화·파일 읽기·while 루프 패턴</text>

  <!-- left: interactive patterns -->
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">인터랙티브 패턴</text>
  <rect x="60" y="120" width="360" height="256" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 확인 프롬프트</text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">read <tspan fill="#ffffff">-rp </tspan><tspan fill="#ce9178">"계속하시겠습니까? [y/N] "</tspan><tspan fill="#ffffff"> yn</tspan></text>
  <text x="76" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">case <tspan fill="#ffffff">$yn </tspan><tspan fill="#7ec8e3">in</tspan></text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  [Yy]*) echo <tspan fill="#ce9178">"진행"</tspan> ;;</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  *)    echo <tspan fill="#ce9178">"취소"</tspan>; exit 1 ;;</text>
  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">esac</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 비밀번호 입력 (에코 억제)</text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">read <tspan fill="#ffffff">-rsp </tspan><tspan fill="#ce9178">"Password: "</tspan><tspan fill="#ffffff"> pass</tspan></text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">echo  <tspan fill="#9aa4b8"># 줄바꿈</tspan></text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 타임아웃 처리</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">if <tspan fill="#ffffff">! read -rt 10 -p </tspan><tspan fill="#ce9178">"Enter: "</tspan><tspan fill="#ffffff"> ans; then</tspan></text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  echo <tspan fill="#ce9178">"타임아웃"</tspan></text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">fi</text>

  <!-- right: file reading patterns -->
  <text x="480" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">파일 읽기 패턴</text>
  <rect x="460" y="120" width="360" height="256" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 파일 한 줄씩 처리</text>
  <text x="476" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">while <tspan fill="#7ec8e3">IFS=</tspan><tspan fill="#ffffff"> read -r line; </tspan><tspan fill="#7ec8e3">do</tspan></text>
  <text x="476" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  echo <tspan fill="#ce9178">"$line"</tspan></text>
  <text x="476" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">done<tspan fill="#ffffff"> &lt; input.txt</tspan></text>
  <text x="476" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># CSV 필드 분리 (IFS 지정)</text>
  <text x="476" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">while <tspan fill="#7ec8e3">IFS=</tspan><tspan fill="#ce9178">','</tspan><tspan fill="#ffffff"> read -r f1 f2 f3; </tspan><tspan fill="#7ec8e3">do</tspan></text>
  <text x="476" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  echo <tspan fill="#ce9178">"$f1 / $f2"</tspan></text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">done<tspan fill="#ffffff"> &lt; data.csv</tspan></text>
  <text x="476" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 공백 보존: IFS= 비워두기</text>
  <text x="476" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># -r: 백슬래시 보존</text>
  <text x="476" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 배열로 한꺼번에 읽기</text>
  <text x="476" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">read <tspan fill="#ffffff">-ra fields &lt;&lt;&lt; </tspan><tspan fill="#ce9178">"a b c"</tspan></text>
  <text x="476" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">echo ${fields[1]}  <tspan fill="#9aa4b8"># b</tspan></text>

  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">IFS= read -r line 이 관용구가 파일을 안전하게 읽는 표준 패턴</text>
</svg>
