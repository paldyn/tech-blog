<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arrrw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">태그 기반 릴리스 워크플로</text>

  <!-- Step boxes -->
  <rect x="60" y="72" width="160" height="70" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">1. main 업데이트</text>
  <text x="140" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">git switch main</text>
  <text x="140" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">git pull origin main</text>

  <line x1="220" y1="107" x2="258" y2="107" stroke="#55c555" stroke-width="2" marker-end="url(#arrrw)"/>

  <rect x="260" y="72" width="160" height="70" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="340" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">2. 버전 태그 생성</text>
  <text x="340" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">git tag -a v1.2.0</text>
  <text x="340" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">-m "Release v1.2.0"</text>

  <line x1="420" y1="107" x2="458" y2="107" stroke="#55c555" stroke-width="2" marker-end="url(#arrrw)"/>

  <rect x="460" y="72" width="160" height="70" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">3. 태그 Push</text>
  <text x="540" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">git push origin</text>
  <text x="540" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">main --follow-tags</text>

  <line x1="620" y1="107" x2="658" y2="107" stroke="#55c555" stroke-width="2" marker-end="url(#arrrw)"/>

  <rect x="660" y="72" width="160" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="740" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">4. CI/CD 트리거</text>
  <text x="740" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">on: push:</text>
  <text x="740" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">  tags: ['v*']</text>

  <!-- CI/CD Pipeline -->
  <rect x="60" y="170" width="760" height="160" rx="8" fill="#111111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">GitHub Actions — 태그 트리거 파이프라인</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">on:</text>
  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  push:</text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">    tags:</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">      - 'v[0-9]*'</text>
  <text x="340" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 실행 단계</text>
  <text x="340" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">steps:</text>
  <text x="340" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  - run: </text>
  <text x="340" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    echo "Releasing $GITHUB_REF_NAME"</text>
  <text x="340" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">    # $GITHUB_REF_NAME = v1.2.0</text>
  <text x="340" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">    # 빌드 / 테스트 / 배포 / 릴리스</text>

  <!-- Changelog -->
  <rect x="60" y="350" width="760" height="88" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 릴리스 노트 자동 생성 (GitHub CLI)</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">gh release create</text>
  <text x="262" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> v1.2.0 --generate-notes</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 이전 태그 이후 커밋 메시지 자동 수집</text>
</svg>
