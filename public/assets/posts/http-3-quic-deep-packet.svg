<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect x="0" y="0" width="880" height="560" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">QUIC 패킷 구조 — UDP 안의 중첩</text>

  <!-- ===== UDP datagram (outer) ===== -->
  <rect x="60" y="80" width="760" height="400" rx="10" fill="none" stroke="#7777cc" stroke-width="1.5"/>
  <text x="84" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">UDP 데이터그램 (포트만 붙인 IP 페이로드)</text>

  <!-- ===== QUIC packet (middle) ===== -->
  <rect x="92" y="124" width="696" height="332" rx="8" fill="none" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="116" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">QUIC 패킷</text>

  <!-- header box -->
  <rect x="116" y="166" width="648" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="132" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">헤더 (평문 일부 + 암호화 보호)</text>

  <!-- Connection ID field (highlight) -->
  <rect x="132" y="202" width="280" height="38" rx="5" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="272" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Connection ID</text>
  <text x="272" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">연결 식별 · 마이그레이션 기준</text>

  <!-- Packet Number field (highlight) -->
  <rect x="424" y="202" width="324" height="38" rx="5" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="586" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Packet Number (단조 증가)</text>
  <text x="586" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">재전송도 새 번호 → 모호성 제거</text>

  <!-- payload label -->
  <text x="132" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">암호화된 페이로드 = 여러 프레임의 나열</text>

  <!-- frames row -->
  <!-- STREAM frame -->
  <rect x="132" y="290" width="200" height="148" rx="6" fill="#000000" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="232" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">STREAM 프레임</text>
  <text x="232" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Stream ID</text>
  <text x="232" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Offset</text>
  <text x="232" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Length</text>
  <text x="232" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Data (응용 바이트)</text>

  <!-- ACK frame -->
  <rect x="348" y="290" width="200" height="148" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="448" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">ACK 프레임</text>
  <text x="448" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Largest Acked</text>
  <text x="448" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ACK Delay</text>
  <text x="448" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ACK Ranges</text>
  <text x="448" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">수신 확인 범위</text>

  <!-- CRYPTO frame -->
  <rect x="564" y="290" width="200" height="148" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1.5"/>
  <text x="664" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">CRYPTO 프레임</text>
  <text x="664" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Offset</text>
  <text x="664" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Length</text>
  <text x="664" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">TLS 핸드셰이크</text>
  <text x="664" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">메시지 조각</text>

  <!-- bottom note -->
  <text x="60" y="516" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">한 QUIC 패킷에 여러 프레임이 섞여 실린다. STREAM은 데이터, ACK는 확인, CRYPTO는 TLS를 나른다.</text>
</svg>
