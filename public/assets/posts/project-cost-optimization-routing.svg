<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9 Z" fill="#55c555"/>
    </marker>
    <marker id="arry" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9 Z" fill="#e8a000"/>
    </marker>
    <marker id="arrr" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M1,1 L10,5 L1,9 Z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">모델 라우팅 의사결정 트리</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">쿼리 복잡도에 따라 최적 모델을 자동 선택 — 비용과 품질의 균형점</text>

  <!-- Input Query box -->
  <rect x="330" y="96" width="220" height="64" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="122" text-anchor="middle" font-size="13" fill="#888">사용자 쿼리 입력</text>
  <text x="440" y="146" text-anchor="middle" font-size="15" font-weight="700" fill="#e8e8e8">Query</text>

  <!-- Arrow down to classifier -->
  <line x1="440" y1="160" x2="440" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Complexity Classifier box -->
  <rect x="300" y="200" width="280" height="72" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="228" text-anchor="middle" font-size="13" fill="#888">복잡도 분류기</text>
  <text x="440" y="252" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">Complexity Classifier</text>

  <!-- Arrow: Classifier → Simple (left) -->
  <line x1="300" y1="236" x2="196" y2="316" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="222" y="278" text-anchor="middle" font-size="12" fill="#55c555">Simple</text>

  <!-- Arrow: Classifier → Medium (down) -->
  <line x1="440" y1="272" x2="440" y2="316" stroke="#e8a000" stroke-width="2" marker-end="url(#arry)"/>
  <text x="462" y="298" font-size="12" fill="#e8a000">Medium</text>

  <!-- Arrow: Classifier → Complex (right) -->
  <line x1="580" y1="236" x2="684" y2="316" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>
  <text x="658" y="278" text-anchor="middle" font-size="12" fill="#e05555">Complex</text>

  <!-- Model Box: Claude Haiku (Simple) -->
  <rect x="80" y="320" width="232" height="130" rx="10" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="196" y="348" text-anchor="middle" font-size="12" fill="#888">단순 쿼리</text>
  <text x="196" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">Claude Haiku</text>
  <rect x="116" y="380" width="160" height="26" rx="13" fill="#0d2a0d"/>
  <text x="196" y="397" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">$0.25 / 1M tokens</text>
  <text x="196" y="424" text-anchor="middle" font-size="12" fill="#888">분류, 요약, 번역</text>
  <text x="196" y="442" text-anchor="middle" font-size="12" fill="#888">키워드 추출, 감성 분석</text>

  <!-- Model Box: Claude Sonnet (Medium) -->
  <rect x="324" y="320" width="232" height="130" rx="10" fill="#12120d" stroke="#e8a000" stroke-width="2"/>
  <text x="440" y="348" text-anchor="middle" font-size="12" fill="#888">중간 복잡도</text>
  <text x="440" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#e8a000">Claude Sonnet</text>
  <rect x="356" y="380" width="168" height="26" rx="13" fill="#1a1200"/>
  <text x="440" y="397" text-anchor="middle" font-size="13" font-weight="700" fill="#e8a000">$3 / 1M tokens</text>
  <text x="440" y="424" text-anchor="middle" font-size="12" fill="#888">코드 생성, 분석 리포트</text>
  <text x="440" y="442" text-anchor="middle" font-size="12" fill="#888">다단계 추론, Q&amp;A</text>

  <!-- Model Box: Claude Opus (Complex) -->
  <rect x="568" y="320" width="232" height="130" rx="10" fill="#1f0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="684" y="348" text-anchor="middle" font-size="12" fill="#888">고복잡 쿼리</text>
  <text x="684" y="370" text-anchor="middle" font-size="15" font-weight="700" fill="#e05555">Claude Opus</text>
  <rect x="602" y="380" width="164" height="26" rx="13" fill="#2a0d0d"/>
  <text x="684" y="397" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">$15 / 1M tokens</text>
  <text x="684" y="424" text-anchor="middle" font-size="12" fill="#888">복잡한 추론, 창작</text>
  <text x="684" y="442" text-anchor="middle" font-size="12" fill="#888">전략 수립, 심층 분석</text>

  <!-- Cost comparison bar -->
  <rect x="60" y="484" width="760" height="52" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="440" y="506" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">라우팅 효과: 80%의 쿼리가 Haiku로 처리될 경우 평균 비용</text>
  <!-- Cost bar segments -->
  <rect x="80" y="516" width="336" height="10" rx="5" fill="#55c555" opacity="0.8"/>
  <rect x="416" y="516" width="84" height="10" rx="5" fill="#e8a000" opacity="0.8"/>
  <rect x="500" y="516" width="100" height="10" rx="5" fill="#e05555" opacity="0.8"/>
  <text x="248" y="528" text-anchor="middle" font-size="10" fill="#55c555">Haiku 80%</text>
  <text x="458" y="528" text-anchor="middle" font-size="10" fill="#e8a000">Sonnet 15%</text>
  <text x="550" y="528" text-anchor="middle" font-size="10" fill="#e05555">Opus 5%</text>

  <!-- Bottom note -->
  <text x="440" y="548" text-anchor="middle" font-size="12" fill="#555">분류기 자체 비용(Haiku)을 포함해도 단순 Opus 사용 대비 70% 이상 절감</text>
</svg>
