<svg xmlns="http://www.w3.org/2000/svg" width="880" height="620" viewBox="0 0 880 620">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <!-- background -->
  <rect width="880" height="620" rx="12" fill="#0a0a0a"/>

  <!-- title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro Studio N — 주요 영역 구성</text>

  <!-- ── MENU BAR ── -->
  <rect x="60" y="76" width="760" height="34" rx="4" fill="#12171f" stroke="#1e2433"/>
  <text x="80" y="99" font-size="13" fill="#7ec8e3" font-weight="600">메뉴 바 (Menu Bar)</text>
  <text x="420" y="99" text-anchor="middle" font-size="12" fill="#888">File · Edit · View · Project · Run · Debug · Tools · Help</text>

  <!-- ── TOOL BAR ── -->
  <rect x="60" y="118" width="760" height="32" rx="4" fill="#0e131a" stroke="#1e2433"/>
  <text x="80" y="139" font-size="13" fill="#7ec8e3" font-weight="600">툴 바 (Toolbar)</text>
  <text x="420" y="139" text-anchor="middle" font-size="12" fill="#888">Save · Run · Debug · Build · Undo / Redo</text>

  <!-- ── Left: Project Explorer ── -->
  <rect x="60" y="162" width="170" height="280" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="145" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">프로젝트 탐색기</text>
  <text x="145" y="206" text-anchor="middle" font-size="11" fill="#888">(Project Explorer)</text>
  <text x="80" y="232" font-size="12" fill="#e8e8e8">📁 MyProject</text>
  <text x="92" y="252" font-size="12" fill="#888">📂 TypeDef</text>
  <text x="92" y="270" font-size="12" fill="#888">📂 frame</text>
  <text x="92" y="288" font-size="12" fill="#888">📂 form</text>
  <text x="92" y="306" font-size="12" fill="#888">📂 css</text>
  <text x="92" y="324" font-size="12" fill="#55c555">📄 NexacroCfg.xml</text>
  <text x="145" y="360" text-anchor="middle" font-size="11" fill="#6a8aa0">파일 / 폴더 탐색</text>
  <text x="145" y="376" text-anchor="middle" font-size="11" fill="#6a8aa0">더블클릭으로 편집기 오픈</text>

  <!-- ── Center: Form Editor ── -->
  <rect x="246" y="162" width="388" height="280" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">폼 편집기 (Form Editor)</text>
  <text x="440" y="206" text-anchor="middle" font-size="11" fill="#888">Design / Script / Preview 탭 전환</text>
  <!-- design canvas mock -->
  <rect x="266" y="218" width="348" height="144" rx="4" fill="#070b14" stroke="#2a3040"/>
  <text x="440" y="245" text-anchor="middle" font-size="12" fill="#555">[Design 캔버스]</text>
  <!-- mock components -->
  <rect x="286" y="258" width="120" height="28" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="346" y="277" text-anchor="middle" font-size="11" fill="#7ec8e3">Button</text>
  <rect x="420" y="258" width="160" height="28" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="500" y="277" text-anchor="middle" font-size="11" fill="#888">Edit (텍스트 입력)</text>
  <rect x="286" y="300" width="294" height="46" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="433" y="328" text-anchor="middle" font-size="11" fill="#888">Grid 컴포넌트 영역</text>
  <!-- tab indicator -->
  <rect x="266" y="376" width="80" height="22" rx="3" fill="#7ec8e3"/>
  <text x="306" y="391" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">Design</text>
  <rect x="352" y="376" width="80" height="22" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="392" y="391" text-anchor="middle" font-size="11" fill="#888">Script</text>
  <rect x="438" y="376" width="80" height="22" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="478" y="391" text-anchor="middle" font-size="11" fill="#888">Preview</text>
  <!-- label -->
  <text x="440" y="428" text-anchor="middle" font-size="11" fill="#6a8aa0">드래그 앤 드롭으로 컴포넌트 배치</text>

  <!-- ── Right: Properties ── -->
  <rect x="650" y="162" width="170" height="280" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="735" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">속성 창</text>
  <text x="735" y="206" text-anchor="middle" font-size="11" fill="#888">(Properties)</text>
  <text x="665" y="232" font-size="12" fill="#888">name</text>
  <text x="790" y="232" text-anchor="end" font-size="12" fill="#e8e8e8">btn_search</text>
  <line x1="665" y1="240" x2="815" y2="240" stroke="#1e2433"/>
  <text x="665" y="256" font-size="12" fill="#888">width</text>
  <text x="790" y="256" text-anchor="end" font-size="12" fill="#b5cea8">120</text>
  <line x1="665" y1="264" x2="815" y2="264" stroke="#1e2433"/>
  <text x="665" y="280" font-size="12" fill="#888">height</text>
  <text x="790" y="280" text-anchor="end" font-size="12" fill="#b5cea8">32</text>
  <line x1="665" y1="288" x2="815" y2="288" stroke="#1e2433"/>
  <text x="665" y="304" font-size="12" fill="#888">text</text>
  <text x="790" y="304" text-anchor="end" font-size="12" fill="#ce9178">"조회"</text>
  <line x1="665" y1="312" x2="815" y2="312" stroke="#1e2433"/>
  <text x="665" y="328" font-size="12" fill="#888">visible</text>
  <text x="790" y="328" text-anchor="end" font-size="12" fill="#55c555">true</text>
  <line x1="665" y1="336" x2="815" y2="336" stroke="#1e2433"/>
  <text x="665" y="352" font-size="12" fill="#888">enable</text>
  <text x="790" y="352" text-anchor="end" font-size="12" fill="#55c555">true</text>
  <text x="735" y="420" text-anchor="middle" font-size="11" fill="#6a8aa0">선택 컴포넌트 속성 편집</text>

  <!-- ── Bottom Left: Output / Event ── -->
  <rect x="60" y="458" width="388" height="104" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="254" y="480" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">출력 창 (Output)</text>
  <text x="86" y="502" font-size="12" fill="#55c555">[INFO]</text>
  <text x="130" y="502" font-size="12" fill="#888">Application started</text>
  <text x="86" y="520" font-size="12" fill="#e05555">[ERROR]</text>
  <text x="136" y="520" font-size="12" fill="#888">service.xml not found</text>
  <text x="86" y="538" font-size="12" fill="#6a8aa0">[DEBUG]</text>
  <text x="140" y="538" font-size="12" fill="#888">Dataset row count: 42</text>
  <text x="254" y="554" text-anchor="middle" font-size="11" fill="#6a8aa0">실행 로그 · 오류 · 디버그 출력</text>

  <!-- ── Bottom Right: Toolbox ── -->
  <rect x="464" y="458" width="356" height="104" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="642" y="480" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">컴포넌트 도구 상자 (Toolbox)</text>
  <!-- component list mock -->
  <rect x="484" y="492" width="72" height="24" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="520" y="509" text-anchor="middle" font-size="11" fill="#e8e8e8">Button</text>
  <rect x="564" y="492" width="72" height="24" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="600" y="509" text-anchor="middle" font-size="11" fill="#e8e8e8">Edit</text>
  <rect x="644" y="492" width="72" height="24" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="680" y="509" text-anchor="middle" font-size="11" fill="#e8e8e8">Grid</text>
  <rect x="724" y="492" width="72" height="24" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="760" y="509" text-anchor="middle" font-size="11" fill="#e8e8e8">Combo</text>
  <rect x="484" y="522" width="72" height="24" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="520" y="539" text-anchor="middle" font-size="11" fill="#e8e8e8">Calendar</text>
  <rect x="564" y="522" width="72" height="24" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="600" y="539" text-anchor="middle" font-size="11" fill="#e8e8e8">Tab</text>
  <rect x="644" y="522" width="72" height="24" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="680" y="539" text-anchor="middle" font-size="11" fill="#e8e8e8">Tree</text>
  <rect x="724" y="522" width="72" height="24" rx="3" fill="#1a2535" stroke="#2a3040"/>
  <text x="760" y="539" text-anchor="middle" font-size="11" fill="#e8e8e8">Static</text>
  <text x="642" y="554" text-anchor="middle" font-size="11" fill="#6a8aa0">드래그 → 폼 에디터에 컴포넌트 추가</text>

  <!-- footer -->
  <text x="440" y="598" text-anchor="middle" font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복</text>
</svg>
