<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 280">
  <rect width="880" height="280" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">bisect run은 종료 코드로 판정한다</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">스크립트의 exit code가 good/bad/skip을 결정한다</text>

  <rect x="60" y="100" width="240" height="130" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="134" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="600" fill="#55c555">exit 0</text>
  <text x="180" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="14" fill="#e8e8e8">good</text>
  <text x="180" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">테스트 통과</text>
  <text x="180" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">더 나중을 검사</text>

  <rect x="320" y="100" width="240" height="130" rx="10" fill="#101010" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="134" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="600" fill="#e05555">exit 1~124, 126, 127</text>
  <text x="440" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="14" fill="#e8e8e8">bad</text>
  <text x="440" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">테스트 실패</text>
  <text x="440" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">더 이전을 검사</text>

  <rect x="580" y="100" width="240" height="130" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="700" y="134" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="600" fill="#9988dd">exit 125</text>
  <text x="700" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="14" fill="#e8e8e8">skip</text>
  <text x="700" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">판정 불가</text>
  <text x="700" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">빌드 깨짐 등 제외</text>
</svg>
