<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git worktree: 하나의 저장소, 여러 작업 디렉터리</text>

  <!-- Git Object Database (shared) -->
  <rect x="310" y="70" width="260" height="120" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Git 오브젝트 DB (공유)</text>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">.git/ (단 하나)</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">모든 브랜치·커밋·객체</text>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">공유됨 (잠금 없음)</text>

  <!-- Arrow left -->
  <line x1="310" y1="130" x2="232" y2="130" stroke="#7777cc" stroke-width="2"/>
  <line x1="232" y1="130" x2="232" y2="240" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Arrow center -->
  <line x1="440" y1="190" x2="440" y2="240" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Arrow right -->
  <line x1="570" y1="130" x2="648" y2="130" stroke="#7777cc" stroke-width="2"/>
  <line x1="648" y1="130" x2="648" y2="240" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Main worktree -->
  <rect x="60" y="244" width="320" height="130" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">메인 워크트리</text>
  <text x="220" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">~/projects/myapp/</text>
  <rect x="80" y="302" width="280" height="58" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">브랜치: main</text>
  <text x="96" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">📁 src/  📄 README.md</text>
  <text x="96" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">(개발 중인 main 브랜치)</text>

  <!-- Linked worktree 1 -->
  <rect x="280" y="244" width="320" height="130" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">연결된 워크트리 1</text>
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">~/projects/myapp-hotfix/</text>
  <rect x="300" y="302" width="280" height="58" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="316" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">브랜치: hotfix/critical</text>
  <text x="316" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">📁 src/  📄 README.md</text>
  <text x="316" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">(핫픽스 작업 중)</text>

  <!-- Linked worktree 2 -->
  <rect x="500" y="244" width="320" height="130" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">연결된 워크트리 2</text>
  <text x="660" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">~/projects/myapp-review/</text>
  <rect x="520" y="302" width="280" height="58" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="536" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">브랜치: feature/auth</text>
  <text x="536" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">📁 src/  📄 README.md</text>
  <text x="536" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">(코드 리뷰 중)</text>

  <!-- Key benefit -->
  <rect x="60" y="394" width="760" height="84" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">장점: stash 없이 브랜치 간 컨텍스트 전환</text>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">작업 중인 파일 저장/복구 불필요 — 각 워크트리는 독립적인 작업 상태 유지</text>
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">단, 같은 브랜치를 두 워크트리에서 동시에 체크아웃할 수 없음</text>
</svg>
