<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NULL의 세값 논리 — 가장 많이 틀리는 함정</text>

  <!-- 3-value logic table -->
  <text x="200" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">AND 연산</text>
  <text x="640" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">OR 연산</text>

  <!-- AND table -->
  <rect x="60" y="94" width="280" height="110" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AND</text>
  <text x="230" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TRUE / FALSE / NULL</text>
  <line x1="60" y1="122" x2="340" y2="122" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">TRUE</text>
  <text x="230" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T / F / UNKNOWN</text>
  <text x="100" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">FALSE</text>
  <text x="230" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">F / F / F</text>
  <text x="100" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">NULL</text>
  <text x="230" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">UNK / F / UNKNOWN</text>

  <!-- OR table -->
  <rect x="500" y="94" width="320" height="110" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="570" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OR</text>
  <text x="680" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TRUE / FALSE / NULL</text>
  <line x1="500" y1="122" x2="820" y2="122" stroke="#3a4a6e" stroke-width="1"/>
  <text x="550" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">TRUE</text>
  <text x="680" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T / T / T</text>
  <text x="550" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">FALSE</text>
  <text x="680" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T / F / UNKNOWN</text>
  <text x="550" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">NULL</text>
  <text x="680" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T / UNK / UNKNOWN</text>

  <!-- Common mistakes -->
  <rect x="60" y="226" width="760" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 틀린 예: NULL과 비교 연산자 사용</text>
  <text x="76" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WHERE</tspan>
    <tspan fill="#ffffff"> deleted_at = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">NULL</tspan>
    <tspan fill="#9aa4b8">   -- 항상 0행 반환 (NULL = NULL → UNKNOWN)</tspan>
  </text>
  <text x="76" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 올바른 예</text>
  <text x="76" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WHERE</tspan>
    <tspan fill="#ffffff"> deleted_at </tspan>
    <tspan fill="#7ec8e3" font-weight="600">IS NULL</tspan>
    <tspan fill="#9aa4b8">      -- 삭제 안 된 레코드</tspan>
    <tspan fill="#ffffff">   </tspan>
    <tspan fill="#7ec8e3" font-weight="600">IS NOT NULL</tspan>
    <tspan fill="#9aa4b8">  -- 삭제된 레코드</tspan>
  </text>
</svg>
