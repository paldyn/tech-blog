<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">서비스 Type과 Restart 옵션</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">[Service] 섹션 핵심 설정</text>

  <!-- Type section -->
  <rect x="60" y="88" width="370" height="290" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Type= 서비스 유형</text>

  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">simple</text>
  <text x="76" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ExecStart가 메인 프로세스 (기본값)</text>
  <text x="76" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 포크하지 않는 대부분의 데몬</text>

  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">forking</text>
  <text x="76" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">부모가 fork 후 종료, 자식이 메인</text>
  <text x="76" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 전통적 Unix 데몬 (PIDFile 필요)</text>

  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">notify</text>
  <text x="76" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">sd_notify()로 준비 완료 알림</text>
  <text x="76" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 의존 서비스가 준비 후 시작 가능</text>

  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">oneshot</text>
  <text x="76" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실행 후 종료 (스크립트용)</text>
  <text x="76" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ RemainAfterExit=yes 와 조합</text>

  <!-- Restart section -->
  <rect x="450" y="88" width="370" height="290" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="466" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Restart= 재시작 정책</text>

  <text x="466" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">no</text>
  <text x="546" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">재시작 안함 (기본값)</text>

  <text x="466" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">on-failure</text>
  <text x="546" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">비정상 종료 시만 재시작</text>
  <text x="466" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 프로덕션 서비스 표준 설정</text>

  <text x="466" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">always</text>
  <text x="546" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">정상 종료에도 항상 재시작</text>
  <text x="466" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 영구 실행 서비스</text>

  <text x="466" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">on-abnormal</text>
  <text x="466" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">신호·타임아웃으로 종료 시</text>

  <text x="466" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">관련 설정</text>
  <text x="466" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">RestartSec=5       # 재시작 대기 시간</text>
  <text x="466" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">StartLimitBurst=5  # 10초 내 5회 실패</text>
  <text x="466" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">StartLimitInterval=10</text>
  <text x="466" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 5회 초과 시 재시작 중단 (무한 루프 방지)</text>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">프로덕션 서비스: Restart=on-failure + RestartSec=5</text>
</svg>
