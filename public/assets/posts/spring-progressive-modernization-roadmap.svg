  <rect x="664" y="278" width="176" height="88" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="752" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
