<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SSIS 패키지 아키텍처</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Control Flow → Data Flow → 목적지 적재</text>

  <!-- Sources -->
  <rect x="60" y="96" width="140" height="56" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Source 1</text>
  <text x="130" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SQL Server OLTP</text>

  <rect x="60" y="172" width="140" height="56" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Source 2</text>
  <text x="130" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CSV / Excel</text>

  <rect x="60" y="248" width="140" height="56" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Source 3</text>
  <text x="130" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">REST API / Oracle</text>

  <line x1="200" y1="124" x2="260" y2="200" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="200" y1="200" x2="260" y2="200" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="200" y1="276" x2="260" y2="200" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Data Flow (Transform) -->
  <rect x="260" y="144" width="280" height="192" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="400" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Data Flow Task (Transform)</text>

  <rect x="278" y="180" width="244" height="36" rx="4" fill="#0a1a0e" stroke="#55c555" stroke-width="1"/>
  <text x="400" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Lookup / Merge Join</text>

  <rect x="278" y="226" width="244" height="36" rx="4" fill="#0a1a0e" stroke="#55c555" stroke-width="1"/>
  <text x="400" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Derived Column / Data Conversion</text>

  <rect x="278" y="272" width="244" height="36" rx="4" fill="#0a1a0e" stroke="#55c555" stroke-width="1"/>
  <text x="400" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Conditional Split (오류 행 분기)</text>

  <rect x="278" y="316" width="244" height="11" rx="4" fill="#101010" stroke="#888" stroke-width="0.5"/>

  <line x1="540" y1="240" x2="600" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Destination -->
  <rect x="600" y="144" width="220" height="80" rx="8" fill="#0a1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">목적지</text>
  <text x="710" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DW / Data Mart</text>
  <text x="710" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Fact / Dimension 테이블</text>

  <!-- Error output -->
  <rect x="600" y="256" width="220" height="56" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">오류 출력</text>
  <text x="710" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Error Staging 테이블</text>

  <!-- Control Flow header -->
  <rect x="60" y="340" width="760" height="104" rx="8" fill="#101010" stroke="#888" stroke-width="1"/>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Control Flow — 작업 실행 순서와 조건 분기</text>

  <rect x="80" y="372" width="140" height="56" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">Execute SQL Task</text>
  <text x="150" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">스테이징 TRUNCATE</text>

  <rect x="260" y="372" width="140" height="56" rx="4" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="330" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Data Flow Task</text>
  <text x="330" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">ETL 본작업</text>

  <rect x="440" y="372" width="140" height="56" rx="4" fill="#0a1a0e" stroke="#55c555" stroke-width="1"/>
  <text x="510" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Execute SQL Task</text>
  <text x="510" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">후처리·통계 갱신</text>

  <rect x="620" y="372" width="160" height="56" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="700" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Send Mail Task</text>
  <text x="700" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">오류 알림 (실패 시)</text>

  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SSIS = 데이터 파이프라인을 시각적으로 설계하는 ETL 도구</text>
</svg>
