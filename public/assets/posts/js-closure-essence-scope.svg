<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">클로저와 스코프 체인</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">변수 탐색은 선언 위치 기준 (렉시컬 스코핑)</text>

  <!-- Code block -->
  <rect x="60" y="90" width="380" height="260" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="118" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> x = </text>
  <text x="154" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'global'</text>
  <text x="218" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>

  <text x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="154" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> outer() {</text>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  const</text>
  <text x="120" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> x = </text>
  <text x="156" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'outer'</text>
  <text x="210" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="80" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  function</text>
  <text x="152" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> inner() {</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">    // x 탐색: inner → outer → global</text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    console.log(x); </text>
  <text x="254" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 'outer'</text>
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  }</text>
  <text x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  return</text>
  <text x="138" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> inner;</text>
  <text x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="118" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> fn = outer();</text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fn(); </text>
  <text x="128" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 'outer'</text>

  <!-- Scope chain diagram (right) -->
  <!-- Global scope -->
  <rect x="490" y="96" width="330" height="60" rx="6" fill="#1a1000" stroke="#e8a000" stroke-width="1.5"/>
  <text x="655" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a000" font-weight="600">전역 스코프</text>
  <text x="510" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">x = 'global',  outer = fn</text>

  <!-- Outer scope -->
  <rect x="490" y="186" width="330" height="60" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="655" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">outer 스코프</text>
  <text x="510" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">x = 'outer',  inner = fn</text>

  <!-- Inner scope -->
  <rect x="490" y="276" width="330" height="60" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="655" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">inner 스코프 (클로저)</text>
  <text x="510" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">(지역 변수 없음)</text>

  <!-- Arrows between scopes -->
  <line x1="655" y1="156" x2="655" y2="186" stroke="#555" stroke-width="1.5"/>
  <polygon points="651,184 655,198 659,184" fill="#555"/>

  <line x1="655" y1="246" x2="655" y2="276" stroke="#555" stroke-width="1.5"/>
  <polygon points="651,274 655,288 659,274" fill="#555"/>

  <!-- Search labels -->
  <text x="700" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">부모 참조</text>
  <text x="700" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">부모 참조</text>

  <!-- x lookup path -->
  <text x="490" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">x 탐색 경로:</text>
  <text x="490" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">inner 스코프</text>
  <text x="590" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">→</text>
  <text x="606" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">outer 스코프 ✓ 발견!</text>
  <text x="490" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">찾으면 탐색 중단. 더 위의 전역 x는 가려짐(shadowing)</text>

  <!-- Footer -->
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
