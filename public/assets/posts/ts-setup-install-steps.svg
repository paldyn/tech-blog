<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 개발 환경 설치</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">Node.js 설치부터 첫 TS 파일 실행까지</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="st" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="60" y="100" width="36" height="36" rx="18" fill="#7ec8e3"/>
  <text x="78" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">1</text>
  <rect x="110" y="100" width="710" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="134" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">Node.js 설치 (v18+ 권장)</text>
  <text x="134" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">node --version  # v20.x.x 이상 확인</text>

  <!-- Connector line 1-2 -->
  <line x1="78" y1="136" x2="78" y2="192" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Step 2 -->
  <rect x="60" y="196" width="36" height="36" rx="18" fill="#7ec8e3"/>
  <text x="78" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">2</text>
  <rect x="110" y="196" width="710" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="134" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">TypeScript 전역 설치</text>
  <text x="134" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">npm install -g typescript</tspan><tspan fill="#9aa4b8">  # 전역 설치</tspan></text>

  <!-- Connector line 2-3 -->
  <line x1="78" y1="232" x2="78" y2="288" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Step 3 -->
  <rect x="60" y="292" width="36" height="36" rx="18" fill="#7ec8e3"/>
  <text x="78" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">3</text>
  <rect x="110" y="292" width="710" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="134" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">프로젝트 초기화 및 tsconfig 생성</text>
  <text x="134" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">mkdir my-ts-app &amp;&amp; cd my-ts-app &amp;&amp; tsc --init</tspan></text>

  <!-- Connector line 3-4 -->
  <line x1="78" y1="328" x2="78" y2="384" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Step 4 -->
  <rect x="60" y="388" width="36" height="36" rx="18" fill="#55c555"/>
  <text x="78" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">4</text>
  <rect x="110" y="388" width="710" height="68" rx="8" fill="#0a1505" stroke="#3a8e3a" stroke-width="1"/>
  <text x="134" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">컴파일 및 실행</text>
  <text x="134" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">tsc index.ts &amp;&amp; node index.js  # 완료!</tspan></text>
</svg>
