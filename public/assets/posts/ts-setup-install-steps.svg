<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 설치 단계</text>

  <!-- Step boxes with arrows -->
  <!-- Step 1 -->
  <rect x="60" y="70" width="700" height="60" rx="8" fill="#0f1f2f" stroke="#3178c6" stroke-width="1.5"/>
  <text x="96" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">① Node.js 설치</text>
  <text x="96" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">nodejs.org에서 LTS 버전 다운로드 (v20+) — npm도 함께 설치됨</text>

  <line x1="410" y1="130" x2="410" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="60" y="160" width="700" height="60" rx="8" fill="#0f2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="96" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">② TypeScript 설치</text>
  <text x="96" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">npm install -g typescript  (또는 프로젝트 로컬: npm install --save-dev typescript)</text>

  <line x1="410" y1="220" x2="410" y2="248" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="60" y="250" width="700" height="60" rx="8" fill="#2a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="96" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178">③ tsconfig.json 생성</text>
  <text x="96" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">tsc --init  → 컴파일러 설정 파일 생성 (target, strict, outDir 등)</text>

  <line x1="410" y1="310" x2="410" y2="338" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="60" y="340" width="700" height="60" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="96" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">④ 컴파일 &amp; 실행</text>
  <text x="96" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">tsc index.ts  →  node index.js  (또는 ts-node로 직접 실행)</text>

  <!-- Version check code block -->
  <rect x="60" y="418" width="760" height="30" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="438" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">$ <tspan fill="#7ec8e3" font-weight="600">tsc</tspan> --version    <tspan fill="#9aa4b8"># Version 5.x.x 출력되면 설치 완료</tspan></text>
</svg>
