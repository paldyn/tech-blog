<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 설치 단계</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Node.js 설치부터 첫 컴파일까지</text>
  <!-- Step 1 -->
  <circle cx="100" cy="130" r="22" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">1</text>
  <text x="138" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Node.js 설치 (필수 전제조건)</text>
  <rect x="138" y="136" width="680" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="154" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># https://nodejs.org 에서 LTS 버전 다운로드</text>
  <text x="154" y="179" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">node --version   </text>
  <text x="300" y="179" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># v20.x.x 이상 권장</text>
  <!-- Step 2 -->
  <line x1="100" y1="152" x2="100" y2="210" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>
  <circle cx="100" cy="230" r="22" fill="#0a1a10" stroke="#55c555" stroke-width="2"/>
  <text x="100" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">2</text>
  <text x="138" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">TypeScript 설치</text>
  <rect x="138" y="236" width="680" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="154" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 프로젝트 로컬 설치 (권장)</text>
  <text x="154" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">npm install --save-dev typescript</text>
  <text x="154" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 또는 글로벌: npm install -g typescript</text>
  <!-- Step 3 -->
  <line x1="100" y1="252" x2="100" y2="330" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>
  <circle cx="100" cy="350" r="22" fill="#0a1a10" stroke="#55c555" stroke-width="2"/>
  <text x="100" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">3</text>
  <text x="138" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">tsconfig.json 초기화</text>
  <rect x="138" y="356" width="680" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="154" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 프로젝트 설정 파일 생성</text>
  <text x="154" y="395" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">npx tsc --init</text>
  <text x="154" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># tsconfig.json 파일이 생성됨</text>
  <!-- Step 4 -->
  <line x1="100" y1="372" x2="100" y2="428" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>
  <circle cx="100" cy="448" r="22" fill="#0a1a10" stroke="#55c555" stroke-width="2"/>
  <text x="100" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">4</text>
  <text x="138" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">컴파일 &amp; 실행</text>
  <rect x="138" y="454" width="680" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="154" y="474" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">npx tsc app.ts  </text>
  <text x="300" y="474" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">&amp;&amp; node app.js</text>
</svg>
