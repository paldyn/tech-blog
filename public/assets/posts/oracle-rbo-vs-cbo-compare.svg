<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle RBO vs. CBO 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">규칙 기반(RBO) vs. 비용 기반(CBO) 옵티마이저의 결정 방식</text>

  <!-- Left: RBO -->
  <rect x="60" y="92" width="360" height="46" fill="#1a1010" rx="8" stroke="#3a1a1a" stroke-width="1"/>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">RBO (Rule-Based Optimizer)</text>
  <text x="240" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Oracle 7 이전 · 완전 deprecated (10g)</text>

  <!-- Right: CBO -->
  <rect x="460" y="92" width="360" height="46" fill="#0d1a10" rx="8" stroke="#1a3a1a" stroke-width="1"/>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">CBO (Cost-Based Optimizer)</text>
  <text x="640" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Oracle 7+ · 현행 표준 (10g부터 RBO 미지원)</text>

  <!-- Decision mechanism -->
  <text x="240" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">결정 근거</text>
  <rect x="60" y="170" width="360" height="80" fill="#111" rx="6" stroke="#2a2a2a" stroke-width="1"/>
  <text x="76" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 15단계 우선순위 규칙</text>
  <text x="76" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 규칙 번호 낮을수록 고우선순위</text>
  <text x="76" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 통계 무관 — 데이터 분포 고려 안 함</text>

  <text x="640" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">결정 근거</text>
  <rect x="460" y="170" width="360" height="80" fill="#111" rx="6" stroke="#2a2a2a" stroke-width="1"/>
  <text x="476" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 통계 기반 비용 추정 (I/O + CPU)</text>
  <text x="476" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 카디널리티 · NDV · 히스토그램 활용</text>
  <text x="476" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 후보 플랜 열거 → 최저 비용 선택</text>

  <!-- RBO Rule ladder -->
  <text x="240" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">RBO 대표 규칙 우선순위</text>
  <rect x="60" y="280" width="360" height="170" fill="#111" rx="6" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Rule rows -->
  <rect x="70" y="290" width="40" height="20" fill="#1a2a1a" rx="3"/>
  <text x="90" y="304" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">R1</text>
  <text x="120" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ROWID에 의한 단일 행 접근</text>

  <rect x="70" y="316" width="40" height="20" fill="#1e2a1a" rx="3"/>
  <text x="90" y="330" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">R4</text>
  <text x="120" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Unique Index 등치 검색</text>

  <rect x="70" y="342" width="40" height="20" fill="#202a1a" rx="3"/>
  <text x="90" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">R9</text>
  <text x="120" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Non-Unique Index Range Scan</text>

  <rect x="70" y="368" width="40" height="20" fill="#252a1a" rx="3"/>
  <text x="90" y="382" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">R11</text>
  <text x="120" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">인덱스 없는 등치 검색 (Sort-Merge)</text>

  <rect x="70" y="394" width="40" height="20" fill="#2a2a1a" rx="3"/>
  <text x="90" y="408" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">R15</text>
  <text x="120" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Full Table Scan (최저 우선순위)</text>

  <text x="240" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">데이터 1행이든 1억행이든 같은 규칙 적용</text>

  <!-- CBO flow diagram -->
  <text x="640" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">CBO 실행 계획 생성 흐름</text>
  <rect x="460" y="280" width="360" height="170" fill="#111" rx="6" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Flow boxes -->
  <rect x="540" y="294" width="200" height="26" fill="#1e2433" rx="4"/>
  <text x="640" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">① SQL 파싱 및 쿼리 변환</text>

  <polygon points="636,322 644,322 640,330" fill="#7777cc"/>
  <line x1="640" y1="320" x2="640" y2="322" stroke="#7777cc" stroke-width="1.5"/>

  <rect x="540" y="332" width="200" height="26" fill="#1e2433" rx="4"/>
  <text x="640" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">② 통계 조회 (딕셔너리)</text>

  <polygon points="636,360 644,360 640,368" fill="#7777cc"/>
  <line x1="640" y1="358" x2="640" y2="360" stroke="#7777cc" stroke-width="1.5"/>

  <rect x="540" y="370" width="200" height="26" fill="#1e2433" rx="4"/>
  <text x="640" y="387" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">③ 후보 플랜 열거</text>

  <polygon points="636,398 644,398 640,406" fill="#7777cc"/>
  <line x1="640" y1="396" x2="640" y2="398" stroke="#7777cc" stroke-width="1.5"/>

  <rect x="540" y="408" width="200" height="26" fill="#1a3020" rx="4" stroke="#2a5a30" stroke-width="1"/>
  <text x="640" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">④ 최저 비용 플랜 선택</text>

  <!-- Bottom bar: key takeaway -->
  <rect x="60" y="462" width="760" height="46" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <text x="440" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">핵심 교훈</text>
  <text x="440" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">CBO는 통계가 부정확하면 잘못된 플랜을 선택한다 — 정기적인 DBMS_STATS 수집이 핵심</text>
</svg>
