<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">Parcel vs Turbopack — 포지셔닝 비교</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">무설정 DX vs Next.js 내장 고속 빌드</text>

  <!-- Parcel column -->
  <rect x="60" y="96" width="360" height="48" rx="8" fill="#0d1a2b" stroke="#1e4070"/>
