  <text x="76" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">무설정 번들러 · Rust SWC 기반 변환</text>

  <rect x="60" y="156" width="360" height="40" rx="6" fill="#0a1a0a" stroke="#1e4020"/>
