  <text x="476" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">프로덕션 빌드는 아직 webpack 사용</text>

  <rect x="460" y="364" width="360" height="32" rx="6" fill="#1a0d2b" stroke="#3a1e50"/>
  <text x="476" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">적합: Next.js 대형 프로젝트 개발 속도</text>
