  <text x="76" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">package.json source/main 자동 감지</text>

  <rect x="60" y="208" width="360" height="40" rx="6" fill="#0a1a0a" stroke="#1e4020"/>
