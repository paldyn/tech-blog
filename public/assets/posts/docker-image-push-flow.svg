<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker image push — 동작 흐름</text>

  <!-- Local storage -->
  <rect x="60" y="76" width="200" height="280" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">로컬 이미지</text>

  <rect x="78" y="120" width="164" height="36" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Layer A (100 MB)</text>

  <rect x="78" y="168" width="164" height="36" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Layer B (45 MB)</text>

  <rect x="78" y="216" width="164" height="36" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Layer C (12 MB)</text>

  <rect x="78" y="264" width="164" height="36" rx="5" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Config JSON</text>

  <rect x="78" y="312" width="164" height="28" rx="5" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">Manifest</text>

  <!-- Steps in middle -->
  <!-- Step 1: Check existing blobs -->
  <text x="360" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">① 레지스트리에 레이어 존재 여부 확인</text>
  <line x1="260" y1="138" x2="330" y2="138" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="360" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HEAD /v2/{name}/blobs/sha256:...</text>

  <text x="360" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">② 이미 있는 레이어 → 건너뜀</text>
  <text x="360" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Layer exists (200 OK) → Mounted</text>

  <!-- Step 2: Upload new layers -->
  <text x="360" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">③ 새 레이어 병렬 업로드</text>
  <line x1="260" y1="186" x2="330" y2="234" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="322,228 334,236 320,240" fill="#7ec8e3"/>
  <line x1="260" y1="234" x2="330" y2="250" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="322,244 334,252 320,256" fill="#7ec8e3"/>
  <text x="360" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">POST + PATCH (chunked) 업로드</text>
  <text x="360" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PUT 으로 완료 알림</text>

  <!-- Step 3: Config upload -->
  <text x="360" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">④ Config JSON 업로드</text>
  <line x1="260" y1="282" x2="330" y2="292" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="322,286 334,294 320,298" fill="#7ec8e3"/>

  <!-- Step 4: Manifest upload -->
  <text x="360" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">⑤ Manifest 업로드 → 태그 연결</text>
  <line x1="260" y1="326" x2="330" y2="336" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="322,330 334,338 320,342" fill="#7777cc"/>
  <text x="360" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">PUT /v2/{name}/manifests/{tag}</text>

  <!-- Registry -->
  <rect x="640" y="76" width="200" height="280" rx="10" fill="#0d1020" stroke="#7777cc" stroke-width="2"/>
  <text x="740" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Registry</text>

  <rect x="658" y="120" width="164" height="36" rx="5" fill="#0f1020" stroke="#555" stroke-width="1"/>
  <text x="740" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Layer A (공유)</text>

  <rect x="658" y="168" width="164" height="36" rx="5" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="740" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Layer B (새로 업로드)</text>

  <rect x="658" y="216" width="164" height="36" rx="5" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="740" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Layer C (새로 업로드)</text>

  <rect x="658" y="264" width="164" height="36" rx="5" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="740" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Config JSON</text>

  <rect x="658" y="312" width="164" height="28" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="740" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">myapp:v2 (태그 연결)</text>

  <!-- Horizontal arrows to registry -->
  <line x1="600" y1="250" x2="638" y2="250" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="626,244 640,250 626,256" fill="#7ec8e3"/>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-function,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">레지스트리가 이미 가진 레이어는 업로드 건너뜀 → 변경된 레이어만 전송</text>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">push 전에 반드시 docker login — 인증 없으면 403 Forbidden</text>
</svg>
