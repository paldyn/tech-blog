<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Fragment에 key 사용하기</text>

  <rect x="60" y="76" width="760" height="256" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="100" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* 목록 렌더링에서 Fragment에 key가 필요한 경우 */}
  </text>
  <text x="80" y="122" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan> { Fragment } </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan> </tspan><tspan fill="#ce9178">'react'</tspan><tspan>;</tspan>
  </text>
  <text x="80" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> GlossaryList({ items }) {</tspan>
  </text>
  <text x="80" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> (</tspan>
  </text>
  <text x="80" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;dl&gt;</tspan>
  </text>
  <text x="80" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      {items.map(item </tspan><tspan fill="#7ec8e3" font-weight="600">=&gt;</tspan><tspan> (</tspan>
  </text>
  <text x="80" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>        &lt;Fragment key={item.id}&gt;</tspan>
  </text>
  <text x="80" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>          &lt;dt&gt;{item.term}&lt;/dt&gt;</tspan>
  </text>
  <text x="80" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>          &lt;dd&gt;{item.description}&lt;/dd&gt;</tspan>
  </text>
  <text x="80" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>        &lt;/Fragment&gt;</tspan>
  </text>
  <text x="80" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      ))}</tspan>
  </text>
  <text x="80" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;/dl&gt;</tspan>
  </text>

  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">단축 &lt;&gt;&lt;/&gt; 문법에는 key를 붙일 수 없으므로 명시적 Fragment를 import해서 사용</text>
</svg>
