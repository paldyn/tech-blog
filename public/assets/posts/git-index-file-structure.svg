<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">.git/index 파일 구조</text>

  <!-- Header section -->
  <rect x="60" y="70" width="760" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">헤더 (12 bytes)</text>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DIRC 매직 (4B) | 버전 2 (4B) | 엔트리 개수 (4B)</text>

  <!-- Entries section -->
  <rect x="60" y="148" width="760" height="220" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">엔트리 목록 (파일당 1개)</text>

  <!-- Entry row headers -->
  <rect x="80" y="185" width="120" height="38" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">ctime / mtime</text>
  <text x="140" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">8+8 bytes</text>

  <rect x="210" y="185" width="100" height="38" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="260" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">dev / ino</text>
  <text x="260" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">4+4 bytes</text>

  <rect x="320" y="185" width="80" height="38" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="360" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">mode</text>
  <text x="360" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">4 bytes</text>

  <rect x="410" y="185" width="80" height="38" rx="4" fill="#1a2a3a" stroke="#55c555" stroke-width="1"/>
  <text x="450" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">uid / gid</text>
  <text x="450" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">4+4 bytes</text>

  <rect x="500" y="185" width="80" height="38" rx="4" fill="#1a2a3a" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">file size</text>
  <text x="540" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">4 bytes</text>

  <rect x="590" y="185" width="80" height="38" rx="4" fill="#1a2a4a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="630" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7777cc">SHA-1</text>
  <text x="630" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">20 bytes</text>

  <rect x="680" y="185" width="120" height="38" rx="4" fill="#1a2a3a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="740" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ce9178">flags + name</text>
  <text x="740" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">가변 길이</text>

  <!-- Key annotations -->
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">핵심 필드:</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">• SHA-1</text>
  <text x="150" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — blob 오브젝트 해시. 파일 내용이 변경되면 이 값이 달라짐</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">• ctime/mtime</text>
  <text x="200" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — OS 파일 메타데이터. git status 빠른 체크에 사용</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">• name</text>
  <text x="138" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — 상대 경로 (예: src/main.go). 저장소 루트 기준</text>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">• mode</text>
  <text x="138" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> — 100644 (일반), 100755 (실행), 120000 (symlink)</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> </text>

  <!-- Trailer section -->
  <rect x="60" y="386" width="760" height="50" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">Extensions (선택적) + SHA-1 체크섬 (20 bytes)</text>
  <text x="440" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">TREE / REUC / EOIE / IEOT 등 확장 섹션</text>

  <!-- Note -->
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">엔트리는 파일 경로 기준 알파벳 순 정렬 | 기본 버전 2, 파일 수 &gt; 65535면 버전 3</text>
</svg>
