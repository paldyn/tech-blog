<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Pageable 처리 흐름</text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">HTTP 쿼리 파라미터 → Pageable 객체 → Page&lt;T&gt; 응답</text>

  <!-- ── Top row: Flow boxes ── -->

  <!-- Client -->
  <rect x="30" y="104" width="130" height="70" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="95" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">클라이언트</text>
  <text x="95" y="150" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">?page=0</text>
  <text x="95" y="166" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">&amp;size=20</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="139" x2="196" y2="139" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="178" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">GET</text>

  <!-- Controller -->
  <rect x="196" y="104" width="150" height="70" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="271" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Controller</text>
  <text x="271" y="146" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#aab8cc">Pageable</text>
  <text x="271" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">자동 바인딩</text>

  <!-- Arrow 2 -->
  <line x1="346" y1="139" x2="382" y2="139" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Service -->
  <rect x="382" y="104" width="150" height="70" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="457" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Service</text>
  <text x="457" y="146" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">Pageable</text>
  <text x="457" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전달</text>

  <!-- Arrow 3 -->
  <line x1="532" y1="139" x2="568" y2="139" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Repository -->
  <rect x="568" y="104" width="150" height="70" rx="8" fill="#0a0f20" stroke="#4a5a8e" stroke-width="1.5"/>
  <text x="643" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9ab0e8">Repository</text>
  <text x="643" y="146" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">findAll(Pageable)</text>
  <text x="643" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JPA 쿼리 자동 생성</text>

  <!-- Arrow 4 -->
  <line x1="718" y1="139" x2="754" y2="139" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- DB -->
  <rect x="754" y="104" width="100" height="70" rx="8" fill="#0e1a0e" stroke="#3a5a3a" stroke-width="1.5"/>
  <text x="804" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec87e">Database</text>
  <text x="804" y="150" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">LIMIT</text>
  <text x="804" y="166" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">OFFSET</text>

  <!-- Return arrows (bottom row, Page<T> back) -->
  <line x1="754" y1="196" x2="718" y2="196" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="568" y1="196" x2="532" y2="196" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="382" y1="196" x2="346" y2="196" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="196" y1="196" x2="160" y2="196" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Return label -->
  <text x="440" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">← Page&lt;T&gt; 반환 (content + 페이지 메타데이터)</text>

  <!-- ── Bottom: PageRequest and Page structure ── -->
  <line x1="60" y1="236" x2="820" y2="236" stroke="#222" stroke-width="1"/>

  <text x="440" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">PageRequest 생성과 Page 응답 구조</text>

  <!-- PageRequest box -->
  <rect x="60" y="274" width="356" height="110" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">PageRequest (요청)</text>
  <text x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#aab8cc">page=0  (0부터 시작)</text>
  <text x="80" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#aab8cc">size=20 (한 페이지 항목 수)</text>
  <text x="80" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#aab8cc">sort=name,asc (정렬 조건)</text>
  <text x="80" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">→ LIMIT 20 OFFSET 0</text>

  <!-- Page response box -->
  <rect x="464" y="274" width="356" height="110" rx="8" fill="#0a1a0a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="484" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Page&lt;T&gt; (응답)</text>
  <text x="484" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#aacaaa">content: [ ... ]   (현재 페이지 데이터)</text>
  <text x="484" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#aacaaa">totalElements: 142 (전체 건수)</text>
  <text x="484" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#aacaaa">totalPages: 8</text>
  <text x="484" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">number: 0 · size: 20 · last: false</text>
</svg>
