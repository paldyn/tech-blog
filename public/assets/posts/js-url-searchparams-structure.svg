<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">URL 구성 요소</text>

  <!-- URL 문자열 -->
  <rect x="60" y="72" width="760" height="44" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="440" y="101" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" text-anchor="middle">https://user:pass@example.com:8080/path?q=hi&amp;lang=ko#section</text>

  <!-- 분해 화살표 + 레이블 -->
  <!-- protocol -->
  <line x1="108" y1="116" x2="108" y2="156" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="108" y="175" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">protocol</text>
  <text x="108" y="191" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">'https:'</text>

  <!-- username -->
  <line x1="188" y1="116" x2="188" y2="156" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="188" y="175" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">username</text>
  <text x="188" y="191" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">'user'</text>

  <!-- password -->
  <line x1="254" y1="116" x2="254" y2="156" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="254" y="175" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">password</text>
  <text x="254" y="191" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">'pass'</text>

  <!-- hostname -->
  <line x1="368" y1="116" x2="368" y2="156" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="368" y="175" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">hostname</text>
  <text x="368" y="191" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">'example.com'</text>

  <!-- port -->
  <line x1="474" y1="116" x2="474" y2="156" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="474" y="175" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">port</text>
  <text x="474" y="191" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">'8080'</text>

  <!-- pathname -->
  <line x1="540" y1="116" x2="540" y2="156" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="540" y="175" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">pathname</text>
  <text x="540" y="191" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">'/path'</text>

  <!-- search -->
  <line x1="640" y1="116" x2="640" y2="156" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="640" y="175" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">search</text>
  <text x="640" y="191" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">'?q=hi...'</text>

  <!-- hash -->
  <line x1="784" y1="116" x2="784" y2="156" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="784" y="175" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">hash</text>
  <text x="784" y="191" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">'#section'</text>

  <!-- 코드 블록 -->
  <rect x="60" y="216" width="760" height="174" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="242" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="242" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> u = new URL(</text>
  <text x="228" y="242" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'https://example.com:8080/path?q=hi#s'</text>
  <text x="622" y="242" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);</text>
  <text x="80" y="270" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">u.protocol;  </text>
  <text x="210" y="270" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 'https:'</text>
  <text x="80" y="288" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">u.hostname;  </text>
  <text x="210" y="288" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 'example.com'</text>
  <text x="80" y="306" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">u.pathname;  </text>
  <text x="210" y="306" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// '/path'</text>
  <text x="80" y="324" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">u.searchParams.get(</text>
  <text x="258" y="324" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'q'</text>
  <text x="284" y="324" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">); </text>
  <text x="310" y="324" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 'hi'</text>
  <text x="80" y="342" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">u.hash;      </text>
  <text x="210" y="342" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// '#s'</text>
  <text x="80" y="372" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 상대 URL 파싱 — base 필수</text>
  <text x="80" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">new URL(</tspan><tspan fill="#ce9178">'/about'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'https://example.com'</tspan><tspan fill="#ffffff">).href; </tspan><tspan fill="#9aa4b8">// 'https://example.com/about'</tspan></text>

</svg>
