  <!-- Final rows abbreviated -->
  <text x="320" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">... (D, A, B 행 계속)</text>
  <text x="320" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#77dd77">dp[7][5] = 4 → LCS 길이 = 4</text>

  <!-- Recurrence box -->
  <rect x="360" y="110" width="480" height="96" fill="#111" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="380" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">점화식</text>
  <text x="380" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">if X[i] == Y[j]:  dp[i][j] = dp[i-1][j-1] + 1</text>
  <text x="380" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">else:             dp[i][j] = max(dp[i-1][j], dp[i][j-1])</text>
  <text x="380" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기저: dp[0][j] = dp[i][0] = 0  (빈 문자열)</text>

  <!-- Code box -->
  <rect x="360" y="220" width="480" height="256" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="376" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def lcs(X, Y):</text>
  <text x="376" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    m, n = len(X), len(Y)</text>
  <text x="376" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp = [[0]*(n+1) for _ in range(m+1)]</text>
  <text x="376" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for i in range(1, m+1):</text>
  <text x="376" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">        for j in range(1, n+1):</text>
  <text x="376" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">            if X[i-1] == Y[j-1]:</text>
  <text x="376" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                dp[i][j] = dp[i-1][j-1]+1</text>
  <text x="376" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">            else:</text>
  <text x="376" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                dp[i][j]=max(dp[i-1][j],dp[i][j-1])</text>
  <text x="376" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    return dp[m][n]</text>
  <text x="376" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 시간 O(mn), 공간 O(mn) → O(min(m,n)) 최적화 가능</text>
  <text x="376" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># lcs("ABCBDAB","BDCAB") = 4</text>
  <text x="376" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># (예: "BCAB" 또는 "BDAB")</text>
  <text x="376" y="474" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># ...</text>
</svg>
