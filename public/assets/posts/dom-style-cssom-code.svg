<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스타일 조작 패턴</text>

  <rect x="60" y="64" width="760" height="306" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 1. element.style — 인라인 직접 조작</text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> box = document.</tspan><tspan fill="#e8e8e8">querySelector</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'.box'</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">box.style.backgroundColor = </tspan><tspan fill="#ce9178">'#ff0'</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">box.style.</tspan><tspan fill="#e8e8e8">setProperty</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'--theme-color'</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">'#0af'</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// CSS 변수</tspan></text>

  <line x1="84" y1="162" x2="796" y2="162" stroke="#1e2433" stroke-width="1"/>

  <text x="84" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 2. cssText — 여러 프로퍼티 한번에 (기존 인라인 스타일 대체)</text>
  <text x="84" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">box.style.cssText = </tspan><tspan fill="#ce9178">'color:red; font-size:16px'</tspan><tspan fill="#e8e8e8">;</tspan></text>

  <line x1="84" y1="214" x2="796" y2="214" stroke="#1e2433" stroke-width="1"/>

  <text x="84" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 3. getComputedStyle — 계산된 최종값 읽기</text>
  <text x="84" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> cs = </tspan><tspan fill="#e8e8e8">getComputedStyle</tspan><tspan fill="#e8e8e8">(box);</tspan></text>
  <text x="84" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">console.</tspan><tspan fill="#e8e8e8">log</tspan><tspan fill="#e8e8e8">(cs.width);   </tspan><tspan fill="#6a8aa0">// "320px"</tspan></text>
  <text x="84" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">console.</tspan><tspan fill="#e8e8e8">log</tspan><tspan fill="#e8e8e8">(cs.color);   </tspan><tspan fill="#6a8aa0">// "rgb(255, 0, 0)"</tspan></text>

  <line x1="84" y1="302" x2="796" y2="302" stroke="#1e2433" stroke-width="1"/>

  <text x="84" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 4. classList 토글 (직접 style보다 권장)</text>
  <text x="84" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">box.classList.</tspan><tspan fill="#e8e8e8">toggle</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'is-active'</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// CSS로 분리 유지</tspan></text>
  <text x="84" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">box.classList.</tspan><tspan fill="#e8e8e8">toggle</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'is-active'</tspan><tspan fill="#e8e8e8">, condition);</tspan></text>
</svg>
