<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">연쇄 법칙: 역전파의 수학적 기반</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">합성 함수의 미분과 신경망 학습의 원리</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Chain Rule Formula -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">연쇄 법칙 (Chain Rule)</text>
  <rect x="60" y="115" width="760" height="56" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#7ec8e3" font-weight="600">z = f(g(x))  →  dz/dx = dz/dy · dy/dx</text>
  <text x="500" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  (여기서 y = g(x))</text>
  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">합성 함수의 미분 = 각 단계의 미분을 곱한 값</text>

  <!-- Neural Network Forward Pass -->
  <text x="60" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">3-레이어 신경망에서의 역전파 흐름</text>

  <!-- Forward pass boxes -->
  <!-- Input -->
  <rect x="60" y="200" width="120" height="56" rx="8" fill="#0d1520" stroke="#7777cc"/>
  <text x="120" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">입력 x</text>
  <text x="120" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Layer 0</text>

  <!-- Arrow 1 forward -->
  <line x1="182" y1="228" x2="238" y2="228" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="238,222 250,228 238,234" fill="#7ec8e3"/>
  <text x="208" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">순전파 →</text>

  <!-- Layer 1 -->
  <rect x="252" y="200" width="120" height="56" rx="8" fill="#0d1520" stroke="#7ec8e3"/>
  <text x="312" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">z₁=W₁x+b₁</text>
  <text x="312" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">a₁=ReLU(z₁)</text>

  <!-- Arrow 2 forward -->
  <line x1="374" y1="228" x2="430" y2="228" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="430,222 442,228 430,234" fill="#7ec8e3"/>

  <!-- Layer 2 -->
  <rect x="444" y="200" width="120" height="56" rx="8" fill="#0d1520" stroke="#7ec8e3"/>
  <text x="504" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">z₂=W₂a₁+b₂</text>
  <text x="504" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">a₂=σ(z₂)</text>

  <!-- Arrow 3 forward -->
  <line x1="566" y1="228" x2="622" y2="228" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="622,222 634,228 622,234" fill="#7ec8e3"/>

  <!-- Output -->
  <rect x="636" y="200" width="120" height="56" rx="8" fill="#0d1520" stroke="#55c555"/>
  <text x="696" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">Loss L</text>
  <text x="696" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CE(a₂, y)</text>

  <!-- Back arrows -->
  <line x1="630" y1="272" x2="574" y2="272" stroke="#e05555" stroke-width="2"/>
  <polygon points="574,266 562,272 574,278" fill="#e05555"/>
  <text x="600" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">∂L/∂a₂</text>

  <line x1="438" y1="272" x2="382" y2="272" stroke="#e05555" stroke-width="2"/>
  <polygon points="382,266 370,272 382,278" fill="#e05555"/>
  <text x="410" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">∂L/∂a₁</text>

  <line x1="246" y1="272" x2="190" y2="272" stroke="#e05555" stroke-width="2"/>
  <polygon points="190,266 178,272 190,278" fill="#e05555"/>
  <text x="218" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">∂L/∂x</text>

  <text x="696" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">← 역전파</text>

  <!-- Chain rule expansion -->
  <rect x="60" y="308" width="760" height="66" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">연쇄 법칙 전개:</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">∂L/∂W₁  =  ∂L/∂a₂  ·  ∂a₂/∂z₂  ·  ∂z₂/∂a₁  ·  ∂a₁/∂z₁  ·  ∂z₁/∂W₁</text>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 항은 해당 연산의 로컬 그래디언트 — 역전파는 이 곱을 체계적으로 계산</text>

  <!-- Code box -->
  <text x="60" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">PyTorch: 연쇄 법칙의 자동 적용</text>
  <rect x="60" y="403" width="760" height="72" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="425" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="124" y="425" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">torch.nn as nn</text>
  <text x="76" y="443" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">model = nn.Sequential(nn.Linear(</text>
  <text x="340" y="443" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">4, 8</text>
  <text x="376" y="443" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">), nn.ReLU(), nn.Linear(</text>
  <text x="568" y="443" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">8, 1</text>
  <text x="604" y="443" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">))</text>
  <text x="76" y="461" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">loss = criterion(model(x), y)    </text>
  <text x="348" y="461" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 순전파</text>
  <text x="76" y="467" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">loss.backward()                  </text>
  <text x="348" y="467" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 연쇄법칙 자동 계산 (역전파)</text>

  <!-- Footer -->
  <text x="440" y="506" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
