<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">WebRTC 시그널링 흐름</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">SDP Offer/Answer + ICE Candidate 교환</text>

  <!-- Peer A Box -->
  <rect x="50" y="96" width="185" height="316" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="50" y="96" width="185" height="34" rx="8" fill="#1a2040"/>
  <rect x="50" y="117" width="185" height="13" fill="#1a2040"/>
  <text x="142" y="117" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#7777cc">Peer A</text>
  <text x="142" y="148" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">RTCPeerConnection</text>
  <text x="66" y="175"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">createOffer()</text>
  <text x="66" y="195"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">setLocalDescription()</text>
  <text x="66" y="240"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">setRemoteDescription()</text>
  <text x="66" y="260"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">(Answer 수신 후)</text>
  <text x="66" y="290"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">addIceCandidate()</text>
  <text x="66" y="310"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">(원격 ICE 후보 추가)</text>
  <text x="66" y="340"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">onicecandidate</text>
  <text x="66" y="360"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">ontrack</text>
  <text x="66" y="380"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">ondatachannel</text>

  <!-- Signaling Server Box (center top) -->
  <rect x="330" y="96" width="220" height="120" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="120" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#e05555">Signaling Server</text>
  <text x="440" y="142" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">WebSocket / REST</text>
  <text x="440" y="162" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">SDP + ICE 후보 중계</text>
  <text x="440" y="182" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">WebRTC 표준 외 별도 구현</text>
  <text x="440" y="202" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">필요: Socket.io, Firebase 등</text>

  <!-- Peer B Box -->
  <rect x="645" y="96" width="185" height="316" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="645" y="96" width="185" height="34" rx="8" fill="#1a2040"/>
  <rect x="645" y="117" width="185" height="13" fill="#1a2040"/>
  <text x="737" y="117" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#7777cc">Peer B</text>
  <text x="737" y="148" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">RTCPeerConnection</text>
  <text x="661" y="175"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">setRemoteDescription()</text>
  <text x="661" y="195"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">(Offer 수신 후)</text>
  <text x="661" y="225"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">createAnswer()</text>
  <text x="661" y="245"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">setLocalDescription()</text>
  <text x="661" y="290"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">addIceCandidate()</text>
  <text x="661" y="340"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">onicecandidate</text>
  <text x="661" y="360"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">ontrack</text>

  <!-- Arrows: A → Signaling (Offer) -->
  <rect x="235" y="132" width="75" height="5" fill="#7777cc"/>
  <polygon points="310,125 330,134 310,143" fill="#7777cc"/>
  <text x="272" y="120" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">Offer SDP</text>

  <!-- Arrows: Signaling → B (Offer) -->
  <rect x="550" y="132" width="75" height="5" fill="#7777cc"/>
  <polygon points="625,125 645,134 625,143" fill="#7777cc"/>
  <text x="597" y="120" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">Offer SDP</text>

  <!-- Arrows: B → Signaling (Answer) -->
  <rect x="550" y="168" width="75" height="5" fill="#55c555"/>
  <polygon points="550,161 530,170 550,179" fill="#55c555"/>
  <text x="597" y="155" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">Answer SDP</text>

  <!-- Arrows: Signaling → A (Answer) -->
  <rect x="235" y="168" width="75" height="5" fill="#55c555"/>
  <polygon points="235,161 215,170 235,179" fill="#55c555"/>
  <text x="272" y="155" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">Answer SDP</text>

  <!-- Direct P2P connection (bottom) -->
  <line x1="235" y1="370" x2="645" y2="370" stroke="#7ec8e3" stroke-width="2.5" stroke-dasharray="4,4"/>
  <text x="440" y="358" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">P2P 직접 연결 (ICE 완료 후)</text>
  <text x="440" y="390" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">오디오 · 비디오 · DataChannel — 낮은 지연</text>
  <text x="440" y="410" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">STUN → 공인 IP 획득 / TURN → 릴레이 (방화벽 우회)</text>
</svg>
