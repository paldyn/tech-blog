<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Docker Context — 여러 Docker 환경 관리</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">하나의 CLI로 여러 Docker 호스트를 전환하며 사용</text>

  <!-- Docker CLI (center) -->
  <rect x="330" y="180" width="220" height="80" fill="#0d1020" stroke="#7ec8e3" stroke-width="2" rx="10"/>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Docker CLI</text>
  <text x="440" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">docker context use [name]</text>

  <!-- Context: default (local) -->
  <rect x="60" y="96" width="190" height="80" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="155" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">default</text>
  <text x="155" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">로컬 Docker</text>
  <text x="155" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">/var/run/docker.sock</text>

  <!-- Arrow: default → CLI -->
  <line x1="252" y1="136" x2="328" y2="210" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Context: dev-server -->
  <rect x="60" y="240" width="190" height="80" fill="#13122a" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="155" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">dev-server</text>
  <text x="155" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">SSH 원격 서버</text>
  <text x="155" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">ssh://user@dev.example.com</text>

  <!-- Arrow: dev-server → CLI -->
  <line x1="252" y1="280" x2="328" y2="240" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Context: staging -->
  <rect x="60" y="360" width="190" height="80" fill="#1a1408" stroke="#e0a030" stroke-width="1.5" rx="8"/>
  <text x="155" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0a030">staging</text>
  <text x="155" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">스테이징 서버</text>
  <text x="155" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">tcp://staging:2376 (TLS)</text>

  <!-- Arrow: staging → CLI -->
  <line x1="252" y1="390" x2="328" y2="256" stroke="#e0a030" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Context: prod -->
  <rect x="630" y="96" width="190" height="80" fill="#1a0808" stroke="#e05555" stroke-width="1.5" rx="8"/>
  <text x="725" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">production</text>
  <text x="725" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">프로덕션 서버</text>
  <text x="725" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">ssh://user@prod.example.com</text>

  <!-- Arrow: prod → CLI -->
  <line x1="628" y1="136" x2="552" y2="210" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Context: k8s desktop -->
  <rect x="630" y="240" width="190" height="80" fill="#0d1a20" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="725" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">desktop-linux</text>
  <text x="725" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Docker Desktop</text>
  <text x="725" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">자동 생성 context</text>

  <!-- Arrow: desktop → CLI -->
  <line x1="628" y1="280" x2="552" y2="240" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Context: rootless -->
  <rect x="630" y="360" width="190" height="80" fill="#0a1408" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="725" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">rootless</text>
  <text x="725" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Rootless Docker</text>
  <text x="725" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">unix://$XDG_RUNTIME_DIR/docker.sock</text>

  <!-- Arrow: rootless → CLI -->
  <line x1="628" y1="390" x2="552" y2="256" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Active indicator -->
  <rect x="330" y="276" width="220" height="26" fill="#0f2010" stroke="#55c555" rx="4"/>
  <text x="440" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">현재 활성: default ★</text>
</svg>
