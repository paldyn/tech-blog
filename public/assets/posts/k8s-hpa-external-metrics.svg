<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HPA External 메트릭 — 클러스터 외부 지표 활용</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">SQS 큐 길이 / CloudWatch / Datadog 연동</text>

  <!-- External sources -->
  <rect x="60" y="98" width="140" height="56" fill="#0f1923" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="130" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">AWS SQS</text>
  <text x="130" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">큐 메시지 수</text>

  <rect x="60" y="164" width="140" height="56" fill="#0f1923" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="130" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">CloudWatch</text>
  <text x="130" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ALB RPS</text>

  <rect x="60" y="230" width="140" height="56" fill="#0f1923" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="130" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">Datadog</text>
  <text x="130" y="274" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" text-anchor="middle">커스텀 메트릭</text>

  <!-- Arrows to External Metrics Adapter -->
  <line x1="200" y1="126" x2="264" y2="183" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="200" y1="192" x2="264" y2="192" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="200" y1="258" x2="264" y2="201" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- External Metrics Adapter -->
  <rect x="264" y="158" width="180" height="68" fill="#1a1420" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="354" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">External Metrics</text>
  <text x="354" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Adapter</text>
  <text x="354" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">external.metrics.k8s.io 등록</text>

  <!-- Arrow to API Server -->
  <line x1="444" y1="192" x2="504" y2="192" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- API Server -->
  <rect x="504" y="158" width="150" height="68" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="579" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">kube-apiserver</text>
  <text x="579" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">external.metrics</text>
  <text x="579" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.k8s.io API</text>

  <!-- Arrow to HPA -->
  <line x1="654" y1="192" x2="716" y2="192" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- HPA -->
  <rect x="716" y="158" width="120" height="68" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="776" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">HPA</text>
  <text x="776" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">type: External</text>
  <text x="776" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스케일 결정</text>

  <!-- Code block -->
  <rect x="60" y="310" width="760" height="70" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">- type:</text>
  <text x="136" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ce9178"> External</text>
  <text x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  external: {metric: {name: sqs_messages_visible}, target: {value: "30"}}</text>
  <text x="80" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888">  # 큐 메시지 30개당 Pod 1개 유지</text>
</svg>
