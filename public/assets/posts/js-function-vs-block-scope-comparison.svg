<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">함수 스코프 vs 블록 스코프</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">var (Function Scope) vs let/const (Block Scope)</text>

  <!-- var (function scope) -->
  <rect x="60" y="90" width="360" height="320" fill="#1a0d0d" rx="10" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="240" y="114" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">var — 함수 스코프</text>

  <rect x="76" y="124" width="328" height="264" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> varDemo() {</text>
  <text x="92" y="162" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // if 블록 → 함수 스코프</text>
  <text x="92" y="180" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">if</tspan> (<tspan fill="#7ec8e3">true</tspan>) {</text>
  <text x="92" y="198" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">var</tspan> a = <tspan fill="#b5cea8">1</tspan>; <tspan fill="#6a8aa0">// 함수 전체</tspan></text>
  <text x="92" y="216" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="92" y="234" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  console.log(a); <tspan fill="#6a8aa0">// 1 (블록 밖)</tspan></text>
  <text x="92" y="256" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // for 루프</text>
  <text x="92" y="274" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">var</tspan> i = <tspan fill="#b5cea8">0</tspan>; i &lt; <tspan fill="#b5cea8">3</tspan>; i++) {}</text>
  <text x="92" y="292" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  console.log(i); <tspan fill="#6a8aa0">// 3 (누출!)</tspan></text>
  <text x="92" y="314" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // switch</text>
  <text x="92" y="332" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">switch</tspan>(x) {</text>
  <text x="92" y="350" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">case</tspan> <tspan fill="#b5cea8">1</tspan>: <tspan fill="#7ec8e3">var</tspan> v = <tspan fill="#ce9178">'a'</tspan>; <tspan fill="#6a8aa0">// 공유!</tspan></text>
  <text x="92" y="368" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>

  <!-- let/const (block scope) -->
  <rect x="460" y="90" width="360" height="320" fill="#0d1a0d" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="640" y="114" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">let/const — 블록 스코프</text>

  <rect x="476" y="124" width="328" height="264" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> letDemo() {</text>
  <text x="492" y="162" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // if 블록 → 블록 스코프</text>
  <text x="492" y="180" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">if</tspan> (<tspan fill="#7ec8e3">true</tspan>) {</text>
  <text x="492" y="198" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">let</tspan> a = <tspan fill="#b5cea8">1</tspan>; <tspan fill="#6a8aa0">// 블록 안만</tspan></text>
  <text x="492" y="216" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="492" y="234" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#6a8aa0">// a → ReferenceError ✓</tspan></text>
  <text x="492" y="256" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // for 루프</text>
  <text x="492" y="274" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">let</tspan> i = <tspan fill="#b5cea8">0</tspan>; i &lt; <tspan fill="#b5cea8">3</tspan>; i++) {</text>
  <text x="492" y="292" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#6a8aa0">// i: 반복마다 새 바인딩</tspan></text>
  <text x="492" y="310" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="492" y="328" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#6a8aa0">// i → ReferenceError ✓</tspan></text>
  <text x="492" y="350" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">switch</tspan>(x) {</text>
  <text x="492" y="368" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">case</tspan> <tspan fill="#b5cea8">1</tspan>: { <tspan fill="#7ec8e3">let</tspan> v = <tspan fill="#ce9178">'a'</tspan>; } <tspan fill="#6a8aa0">// 분리</tspan></text>

  <!-- Summary table -->
  <rect x="60" y="428" width="760" height="62" fill="#0d0d0d" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="449" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">요약 비교</text>
  <text x="100" y="474" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">스코프 단위</text>
  <text x="100" y="490" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">var: 함수</text>
  <text x="280" y="474" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">호이스팅</text>
  <text x="280" y="490" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">var: undefined로</text>
  <text x="480" y="474" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">재선언</text>
  <text x="480" y="490" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">var: 허용</text>
  <text x="650" y="474" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">TDZ</text>
  <text x="650" y="490" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">let/const: 있음</text>

  <!-- Footer -->
  <text x="440" y="502" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
