<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09040"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">SOP 우회 메커니즘과 보안 고려사항</text>

  <!-- CORS -->
  <rect x="60" y="68" width="370" height="160" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="245" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">CORS (Cross-Origin Resource Sharing)</text>
  <text x="76" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버가 명시적으로 허용한 출처에만 응답 노출</text>
  <rect x="76" y="124" width="338" height="92" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 서버 응답 헤더</text>
  <text x="92" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Access-Control-Allow-Origin:</text>
  <text x="92" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">  https://app.example.com</text>
  <text x="92" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 지정 출처만 읽기 허용</text>
  <text x="76" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">잘못 설정(*)하면 SOP의 보호가 무력화됨 → 다음 글에서 상세 설명</text>

  <!-- postMessage -->
  <rect x="450" y="68" width="370" height="160" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="635" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">postMessage API</text>
  <text x="466" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다른 창/iframe과 명시적 메시지 교환</text>
  <rect x="466" y="124" width="338" height="92" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 메시지 전송</text>
  <text x="482" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">iframe.contentWindow.postMessage(</text>
  <text x="482" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  data, 'https://target.com'</text>
  <text x="482" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">)</text>
  <text x="466" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">수신 측이 origin 검증 필수. 미검증 시 XSS로 이어짐</text>

  <!-- document.domain -->
  <rect x="60" y="248" width="370" height="160" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="245" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">document.domain (레거시)</text>
  <text x="76" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서브도메인 간 DOM 공유 목적 (현재 비권장)</text>
  <rect x="76" y="304" width="338" height="72" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// a.example.com, b.example.com 모두</text>
  <text x="92" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">document.domain = 'example.com'</text>
  <text x="92" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// → 서로 DOM 접근 가능</text>
  <text x="76" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서브도메인 XSS로 상위 도메인 접근 가능 → 위험. Chrome에서 폐지 예정</text>

  <!-- JSONP -->
  <rect x="450" y="248" width="370" height="160" rx="8" fill="#1a1000" stroke="#e09040" stroke-width="1"/>
  <text x="635" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e09040">JSONP (레거시, 위험)</text>
  <text x="466" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">script 태그 로드로 SOP 우회 (구식)</text>
  <rect x="466" y="304" width="338" height="72" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 콜백 파라미터 인젝션</text>
  <text x="482" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">/api?cb=alert(document.cookie)</text>
  <text x="482" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">→ XSS 실행</text>
  <text x="466" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">콜백 이름을 엄격히 검증해야 함. CORS로 교체 권장</text>
</svg>
