<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">template + slot 구현 패턴</text>

  <rect x="60" y="64" width="760" height="292" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">/* HTML — template 태그 (파싱은 되나 렌더링 안 됨) */</text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">&lt;template id="card-tpl"&gt;</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  &lt;style&gt;</tspan><tspan fill="#ffffff">:host { display:block } </tspan><tspan fill="#ce9178">&lt;/style&gt;</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  &lt;slot name="header"&gt;</tspan><tspan fill="#ffffff">기본 헤더</tspan><tspan fill="#ce9178">&lt;/slot&gt;</tspan></text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  &lt;slot&gt;&lt;/slot&gt;</tspan><tspan fill="#9aa4b8">  &lt;!-- 기본 슬롯 --&gt;</tspan></text>
  <text x="84" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">&lt;/template&gt;</tspan></text>

  <line x1="84" y1="198" x2="796" y2="198" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// JS — template.content를 cloneNode(true)로 복사 후 Shadow에 삽입</text>
  <text x="84" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">class</tspan><tspan fill="#ffffff"> CardEl </tspan><tspan fill="#7ec8e3">extends</tspan><tspan fill="#ffffff"> HTMLElement {</tspan></text>
  <text x="84" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  connectedCallback() {</tspan></text>
  <text x="84" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> tmpl = document.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'#card-tpl'</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> root = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.</tspan><tspan fill="#ffffff">attachShadow</tspan><tspan fill="#ffffff">({ mode: </tspan><tspan fill="#ce9178">'open'</tspan><tspan fill="#ffffff"> });</tspan></text>
  <text x="84" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    root.</tspan><tspan fill="#ffffff">appendChild</tspan><tspan fill="#ffffff">(tmpl.content.</tspan><tspan fill="#ffffff">cloneNode</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="84" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  }</tspan></text>
  <text x="84" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
</svg>
