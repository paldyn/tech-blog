<svg xmlns="http://www.w3.org/2000/svg" width="880" height="370" viewBox="0 0 880 370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="370" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">.patch 파일의 구조</text>

  <rect x="60" y="80" width="760" height="250" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="80" y="110" fill="#9aa4b8">From 9a2f... Mon Sep 17 00:00:00 2001  ← mbox 헤더</tspan>
    <tspan x="80" y="132" fill="#ffffff">From: Hong Gildong &lt;hong@paldyn.com&gt;</tspan>
    <tspan x="80" y="154" fill="#ffffff">Date: Sat, 31 May 2026 10:00:00 +0900</tspan>
    <tspan x="80" y="176" fill="#ffffff">Subject: [PATCH] fix: 로그인 검증 오류 수정</tspan>
    <tspan x="80" y="206" fill="#9aa4b8">--- (여기부터 커밋 메시지 본문)</tspan>
    <tspan x="80" y="236" fill="#ce9178">--- a/src/auth.js</tspan>
    <tspan x="80" y="258" fill="#ce9178">+++ b/src/auth.js</tspan>
    <tspan x="80" y="280" fill="#55c555">+  if (!token) return false;</tspan>
    <tspan x="80" y="302" fill="#9aa4b8">--   (끝에 git 버전 표기)</tspan>
  </text>

  <text x="60" y="356" font-size="13" fill="#888">헤더(작성자·날짜·제목) + 커밋 메시지 + diff 가 하나로 묶여 있어 git am 이 커밋을 그대로 복원합니다.</text>
</svg>
