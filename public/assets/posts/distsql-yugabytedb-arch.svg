<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">YugabyteDB 이중 API 아키텍처</text>

  <!-- YSQL (PostgreSQL) -->
  <rect x="60" y="68" width="360" height="52" rx="8" fill="#12213a" stroke="#3a6ea8" stroke-width="2"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">YSQL</text>
  <text x="240" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PostgreSQL 13 기반 SQL API (포트 5433)</text>

  <!-- YCQL (Cassandra) -->
  <rect x="460" y="68" width="360" height="52" rx="8" fill="#1a1020" stroke="#5a3080" stroke-width="2"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#9977cc" text-anchor="middle">YCQL</text>
  <text x="640" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Cassandra 호환 NoSQL API (포트 9042)</text>

  <!-- DocDB -->
  <rect x="200" y="170" width="480" height="62" rx="8" fill="#101820" stroke="#2a4060" stroke-width="2"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">DocDB (분산 스토리지 엔진)</text>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tablet 단위 분산 · Raft 복제 · RocksDB 저장</text>

  <!-- Arrows: APIs -> DocDB -->
  <line x1="240" y1="120" x2="320" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="640" y1="120" x2="560" y2="170" stroke="#9977cc" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Node row -->
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">YB-TServer (각 노드 동일 역할)</text>

  <rect x="60" y="282" width="220" height="68" rx="8" fill="#0e1820" stroke="#2a4060" stroke-width="1.5"/>
  <text x="170" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">TServer 1</text>
  <text x="170" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tablet 리더 3개</text>
  <text x="170" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tablet 팔로워 6개</text>

  <rect x="330" y="282" width="220" height="68" rx="8" fill="#0e1820" stroke="#2a4060" stroke-width="1.5"/>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">TServer 2</text>
  <text x="440" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tablet 리더 3개</text>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tablet 팔로워 6개</text>

  <rect x="600" y="282" width="220" height="68" rx="8" fill="#0e1820" stroke="#2a4060" stroke-width="1.5"/>
  <text x="710" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">TServer 3</text>
  <text x="710" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tablet 리더 3개</text>
  <text x="710" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tablet 팔로워 6개</text>

  <!-- Master -->
  <rect x="200" y="378" width="480" height="52" rx="8" fill="#101010" stroke="#404040" stroke-width="1.5"/>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">YB-Master (Raft)</text>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">카탈로그 관리 / Tablet 스케줄링 / 클러스터 메타데이터</text>

  <!-- Note -->
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tablet = 64MB 단위 데이터 조각 · 각 3개 복제본 (과반수 쓰기)</text>
</svg>
