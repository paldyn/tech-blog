<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CUBRID 아키텍처</text>

  <!-- Client layer -->
  <rect x="60" y="64" width="760" height="56" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트</text>
  <text x="160" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JDBC Driver</text>
  <text x="310" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PHP PDO</text>
  <text x="460" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Python (CCI)</text>
  <text x="610" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ODBC</text>
  <text x="760" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">csql CLI</text>

  <!-- Arrow to broker -->
  <line x1="440" y1="120" x2="440" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CUBRID Broker -->
  <rect x="60" y="146" width="760" height="60" rx="8" fill="#101828" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">CUBRID Broker (CAS: Client Application Server)</text>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">연결 풀링 · 부하 분산 · Read/Write 분리 · Statement 재사용</text>

  <!-- Arrow to server -->
  <line x1="440" y1="206" x2="440" y2="228" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Server layer -->
  <rect x="60" y="232" width="760" height="160" rx="8" fill="#0a0d18" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">CUBRID 서버 (cub_server)</text>

  <!-- Server components -->
  <rect x="80" y="270" width="150" height="52" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="155" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Query Engine</text>
  <text x="155" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파서·옵티마이저</text>

  <rect x="248" y="270" width="150" height="52" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="323" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Buffer Manager</text>
  <text x="323" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">페이지 캐시 LRU</text>

  <rect x="416" y="270" width="150" height="52" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="491" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Lock Manager</text>
  <text x="491" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">행·테이블 잠금</text>

  <rect x="584" y="270" width="150" height="52" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="659" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Log Manager</text>
  <text x="659" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">WAL·REDO·UNDO</text>

  <rect x="752" y="270" width="52" height="52" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="778" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8e8e8" text-anchor="middle">TX</text>
  <text x="778" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Mgr</text>

  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">MVCC 기반 읽기 일관성 | 2PL 기반 쓰기 잠금 | B-Tree / R-Tree 인덱스</text>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">HA(High Availability): cub_master 프로세스가 서버 상태 감시</text>

  <!-- Arrow to storage -->
  <line x1="440" y1="392" x2="440" y2="414" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Storage layer -->
  <rect x="60" y="418" width="760" height="44" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="250" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">볼륨 파일 (데이터 / 인덱스 / 임시)</text>
  <text x="640" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Active / Archive 로그</text>
</svg>
