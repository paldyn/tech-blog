<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="ainh" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="aimpl2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Queue / Deque 계층 구조</text>

  <!-- Collection -->
  <rect x="320" y="68" width="240" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">«interface» Collection&lt;E&gt;</text>

  <!-- Queue -->
  <rect x="320" y="152" width="240" height="44" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">«interface»</text>
  <text x="440" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Queue&lt;E&gt;</text>

  <!-- Deque extends Queue -->
  <rect x="320" y="244" width="240" height="44" rx="6" fill="#1a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">«interface»</text>
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Deque&lt;E&gt;</text>

  <!-- Arrows: Collection -> Queue -> Deque -->
  <line x1="440" y1="108" x2="440" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ainh)"/>
  <line x1="440" y1="196" x2="440" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ainh)"/>

  <!-- Implementations of Queue -->
  <!-- LinkedList (Queue impl) -->
  <rect x="60" y="335" width="170" height="54" rx="6" fill="#0d1b2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="145" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">LinkedList</text>
  <text x="145" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">List + Deque</text>
  <text x="145" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">노드 기반, 느린 편</text>

  <!-- PriorityQueue -->
  <rect x="255" y="335" width="170" height="54" rx="6" fill="#0d1b2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="340" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">PriorityQueue</text>
  <text x="340" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Queue만 구현</text>
  <text x="340" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">힙 기반, O(log n)</text>

  <!-- ArrayDeque -->
  <rect x="450" y="335" width="170" height="54" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="535" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">ArrayDeque</text>
  <text x="535" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Deque 구현 (권장)</text>
  <text x="535" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">배열 기반, 빠름</text>

  <!-- ArrayBlockingQueue -->
  <rect x="645" y="335" width="175" height="54" rx="6" fill="#0d1b2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="732" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">ArrayBlocking</text>
  <text x="732" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Queue</text>
  <text x="732" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">BlockingQueue, 스레드 안전</text>

  <!-- Arrows from Queue/Deque to impls -->
  <line x1="380" y1="288" x2="165" y2="330" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aimpl2)"/>
  <line x1="410" y1="288" x2="355" y2="330" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aimpl2)"/>
  <line x1="470" y1="288" x2="515" y2="330" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aimpl2)"/>
  <line x1="500" y1="288" x2="720" y2="330" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aimpl2)"/>

  <!-- Labels -->
  <text x="145" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">implements Deque</text>
  <text x="340" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">implements Queue</text>
  <text x="535" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">implements Deque</text>
  <text x="732" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">implements BlockingQueue</text>

  <!-- extends label on arrows -->
  <text x="448" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">extends</text>
  <text x="448" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">extends</text>
</svg>
