<svg xmlns="http://www.w3.org/2000/svg" width="880" height="296" viewBox="0 0 880 296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="296" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">얕은 복사의 함정과 해결</text>

  <rect x="60" y="74" width="760" height="158" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="104" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> copy</tspan></text>
  <text xml:space="preserve" x="80" y="126" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">a = [[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">], </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">]</tspan></text>
  <text xml:space="preserve" x="80" y="148" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">b = copy.copy(a)        </tspan><tspan fill="#9aa4b8"># 얕은 복사</tspan></text>
  <text xml:space="preserve" x="80" y="170" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">b[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">].append(</tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">)</tspan></text>
  <text xml:space="preserve" x="80" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">print(a)   </tspan><tspan fill="#9aa4b8"># [[1, 2, 99], 3]  ← a 도 바뀜!</tspan></text>
  <text xml:space="preserve" x="80" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">c = copy.deepcopy(a)    </tspan><tspan fill="#9aa4b8"># 깊은 복사 → 안전</tspan></text>

  <text x="60" y="262" font-size="14" fill="#cccccc">a[:] · list(a) · copy.copy 는 모두 얕은 복사다. 중첩 구조를 진짜로 떼어내려면</text>
  <text x="60" y="284" font-size="14" fill="#cccccc">copy.deepcopy 를 쓴다.</text>
</svg>
