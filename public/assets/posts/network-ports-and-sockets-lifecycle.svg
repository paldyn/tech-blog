<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="aps" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="apg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">소켓 생명 주기: 서버와 클라이언트</text>

  <!-- Server side -->
  <text x="220" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">서버</text>

  <rect x="130" y="92" width="180" height="44" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">socket()</text>
  <text x="220" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">소켓 생성</text>

  <line x1="220" y1="136" x2="220" y2="155" stroke="#55c555" stroke-width="1.5" marker-end="url(#apg)"/>

  <rect x="130" y="157" width="180" height="44" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">bind()</text>
  <text x="220" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IP:포트 바인딩</text>

  <line x1="220" y1="201" x2="220" y2="220" stroke="#55c555" stroke-width="1.5" marker-end="url(#apg)"/>

  <rect x="130" y="222" width="180" height="44" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">listen()</text>
  <text x="220" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">연결 대기 큐 생성</text>

  <line x1="220" y1="266" x2="220" y2="285" stroke="#55c555" stroke-width="1.5" marker-end="url(#apg)"/>

  <rect x="130" y="287" width="180" height="44" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="220" y="307" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">accept()</text>
  <text x="220" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">연결 수락 (블로킹)</text>

  <line x1="220" y1="331" x2="220" y2="350" stroke="#55c555" stroke-width="1.5" marker-end="url(#apg)"/>

  <rect x="130" y="352" width="180" height="44" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">recv() / send()</text>
  <text x="220" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터 교환</text>

  <line x1="220" y1="396" x2="220" y2="415" stroke="#55c555" stroke-width="1.5" marker-end="url(#apg)"/>

  <rect x="130" y="417" width="180" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="220" y="437" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">close()</text>
  <text x="220" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">연결 종료</text>

  <!-- Client side -->
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트</text>

  <rect x="570" y="92" width="180" height="44" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">socket()</text>
  <text x="660" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">소켓 생성</text>

  <line x1="660" y1="136" x2="660" y2="220" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#aps)"/>

  <rect x="570" y="222" width="180" height="44" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="660" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">connect()</text>
  <text x="660" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">3-way handshake</text>

  <line x1="660" y1="266" x2="660" y2="350" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#aps)"/>

  <rect x="570" y="352" width="180" height="44" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">send() / recv()</text>
  <text x="660" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터 교환</text>

  <line x1="660" y1="396" x2="660" y2="415" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#aps)"/>

  <rect x="570" y="417" width="180" height="44" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="660" y="437" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">close()</text>
  <text x="660" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">연결 종료</text>

  <!-- Connection arrows between server and client -->
  <line x1="310" y1="310" x2="570" y2="260" stroke="#e8a030" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8a030" text-anchor="middle">3-way handshake</text>
  <line x1="310" y1="372" x2="570" y2="372" stroke="#e8a030" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8a030" text-anchor="middle">데이터 교환</text>
</svg>
