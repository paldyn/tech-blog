<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">프로세스 상태 전이 다이어그램</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">리눅스 프로세스 라이프사이클 — 생성부터 종료까지</text>

  <!-- Created/New state -->
  <rect x="340" y="88" width="200" height="50" rx="10" fill="#111827" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Created (fork/exec)</text>

  <!-- Arrow: Created → Running -->
  <line x1="440" y1="138" x2="440" y2="158" stroke="#888" stroke-width="1.5"/>
  <polygon points="433,158 440,170 447,158" fill="#888"/>
  <text x="458" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스케줄러 선택</text>

  <!-- RUNNING state -->
  <rect x="330" y="170" width="220" height="56" rx="10" fill="#0f2010" stroke="#55c555" stroke-width="2.5"/>
  <text x="440" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">R — Running</text>
  <text x="440" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">CPU에서 실행 중 또는 실행 큐 대기</text>

  <!-- Running → Sleeping (S) -->
  <line x1="330" y1="198" x2="190" y2="198" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="190" y1="198" x2="190" y2="290" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="183,290 190,302 197,290" fill="#7ec8e3"/>
  <text x="140" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">이벤트 대기</text>
  <text x="140" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">(I/O, 타이머)</text>

  <!-- SLEEPING state (S) -->
  <rect x="90" y="302" width="200" height="56" rx="10" fill="#0d1929" stroke="#7ec8e3" stroke-width="2"/>
  <text x="190" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">S — Sleeping</text>
  <text x="190" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인터럽트 가능한 대기</text>

  <!-- Sleeping → Running -->
  <line x1="290" y1="330" x2="370" y2="250" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="363,244 374,253 377,240" fill="#7ec8e3"/>
  <text x="358" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">이벤트 발생</text>

  <!-- Running → D state -->
  <line x1="330" y1="220" x2="100" y2="420" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="93,418 100,430 107,418" fill="#e05555"/>
  <text x="180" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" transform="rotate(-55,180,372)">디스크 I/O 대기</text>

  <!-- D state (Uninterruptible) -->
  <rect x="50" y="430" width="200" height="56" rx="10" fill="#200a0a" stroke="#e05555" stroke-width="2"/>
  <text x="150" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">D — Uninterruptible</text>
  <text x="150" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">I/O 대기 — kill 불가</text>

  <!-- D → Running (I/O complete) -->
  <line x1="250" y1="458" x2="360" y2="240" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="353,234 364,243 367,230" fill="#e05555"/>
  <text x="345" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" transform="rotate(-68,345,365)">I/O 완료</text>

  <!-- Ctrl+Z / SIGSTOP -->
  <line x1="550" y1="198" x2="690" y2="198" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="690" y1="198" x2="690" y2="302" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="683,302 690,314 697,302" fill="#7777cc"/>
  <text x="740" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">SIGSTOP</text>
  <text x="740" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">Ctrl+Z</text>

  <!-- T state (Stopped) -->
  <rect x="590" y="314" width="200" height="56" rx="10" fill="#101020" stroke="#7777cc" stroke-width="2"/>
  <text x="690" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">T — Stopped</text>
  <text x="690" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SIGCONT로 재개 가능</text>

  <!-- T → Running (SIGCONT) -->
  <line x1="590" y1="342" x2="510" y2="250" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="503,244 514,253 517,240" fill="#7777cc"/>
  <text x="535" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">SIGCONT</text>

  <!-- Running → Exit (SIGTERM/SIGKILL) -->
  <line x1="440" y1="226" x2="440" y2="370" stroke="#888" stroke-width="1.5"/>
  <polygon points="433,370 440,382 447,370" fill="#888"/>
  <text x="458" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">exit() / SIGKILL</text>

  <!-- Z state (Zombie) -->
  <rect x="330" y="382" width="220" height="56" rx="10" fill="#1a1500" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#888" text-anchor="middle">Z — Zombie</text>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">종료, 부모 wait() 안 함</text>

  <!-- Z → X (parent collects) -->
  <line x1="440" y1="438" x2="440" y2="458" stroke="#888" stroke-width="1.5"/>
  <polygon points="433,458 440,470 447,458" fill="#888"/>
  <text x="480" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">부모 wait()</text>

  <!-- Dead/X state -->
  <rect x="330" y="470" width="220" height="36" rx="8" fill="#111827" stroke="#444" stroke-width="1.5"/>
  <text x="440" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#444" text-anchor="middle">X — Dead (소멸)</text>
</svg>
