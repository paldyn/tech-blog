<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ResizeObserver vs IntersectionObserver</text>

  <!-- ResizeObserver column -->
  <rect x="60" y="70" width="360" height="376" rx="8" fill="#0d1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">ResizeObserver</text>

  <text x="84" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">감지 대상</text>
  <text x="84" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">요소의 크기(width/height) 변화</text>

  <line x1="84" y1="160" x2="396" y2="160" stroke="#1a2a1a" stroke-width="1"/>

  <text x="84" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">콜백 인자</text>
  <text x="84" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">ResizeObserverEntry[]</text>
  <text x="84" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  .contentRect  .borderBoxSize</text>
  <text x="84" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  .contentBoxSize  .devicePixelContentBoxSize</text>

  <line x1="84" y1="248" x2="396" y2="248" stroke="#1a2a1a" stroke-width="1"/>

  <text x="84" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실행 시점</text>
  <text x="84" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">레이아웃 후, 페인트 전</text>

  <line x1="84" y1="298" x2="396" y2="298" stroke="#1a2a1a" stroke-width="1"/>

  <text x="84" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">주요 활용</text>
  <text x="84" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">• 컴포넌트 반응형 레이아웃</text>
  <text x="84" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">• 차트/캔버스 리사이즈</text>
  <text x="84" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">• 가상 스크롤 뷰포트 계산</text>

  <line x1="84" y1="386" x2="396" y2="386" stroke="#1a2a1a" stroke-width="1"/>
  <text x="84" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정리: observer.unobserve(el) / .disconnect()</text>

  <!-- IntersectionObserver column -->
  <rect x="460" y="70" width="360" height="376" rx="8" fill="#0a0d1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">IntersectionObserver</text>

  <text x="484" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">감지 대상</text>
  <text x="484" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">뷰포트/루트와의 교차 비율 변화</text>

  <line x1="484" y1="160" x2="796" y2="160" stroke="#0a1a2a" stroke-width="1"/>

  <text x="484" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">콜백 인자</text>
  <text x="484" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">IntersectionObserverEntry[]</text>
  <text x="484" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  .isIntersecting  .intersectionRatio</text>
  <text x="484" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  .boundingClientRect  .rootBounds</text>

  <line x1="484" y1="248" x2="796" y2="248" stroke="#0a1a2a" stroke-width="1"/>

  <text x="484" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실행 시점</text>
  <text x="484" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">비동기 — 다음 프레임 이후</text>

  <line x1="484" y1="298" x2="796" y2="298" stroke="#0a1a2a" stroke-width="1"/>

  <text x="484" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">주요 활용</text>
  <text x="484" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">• 이미지/컴포넌트 지연 로딩</text>
  <text x="484" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">• 무한 스크롤 트리거</text>
  <text x="484" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">• 애니메이션 진입점 감지</text>

  <line x1="484" y1="386" x2="796" y2="386" stroke="#0a1a2a" stroke-width="1"/>
  <text x="484" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">옵션: root, rootMargin, threshold</text>

  <!-- VS divider -->
  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#444" text-anchor="middle">VS</text>

  <!-- Bottom note -->
  <rect x="60" y="460" width="760" height="0" rx="0" fill="none"/>
</svg>
