<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">디스크 풀 진단 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">df → du → 원인 특정 → 공간 확보</text>

  <!-- Step 1 -->
  <rect x="310" y="88" width="260" height="50" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">No space left on device</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">df -h 로 어느 파티션인지 확인</text>

  <line x1="440" y1="138" x2="440" y2="160" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Step 2: df -h -->
  <rect x="310" y="160" width="260" height="50" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">df -h</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">100% Use% 파티션 찾기</text>

  <line x1="440" y1="210" x2="440" y2="232" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision: df shows 100% OR inode full? -->
  <rect x="290" y="232" width="300" height="50" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="440" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Use% 100% 인가? df -i 도 확인</text>
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IUse% 100% = inode 고갈</text>

  <!-- Left branch: large files -->
  <line x1="290" y1="257" x2="200" y2="310" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="195" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="end">블록 고갈</text>

  <!-- Right branch: inode full -->
  <line x1="590" y1="257" x2="680" y2="310" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="685" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">inode 고갈</text>

  <!-- Large files box -->
  <rect x="60" y="310" width="260" height="80" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="190" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">큰 파일 찾기</text>
  <text x="190" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">du -sh /* 2&gt;/dev/null | sort -rh</text>
  <text x="190" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">find / -size +500M 2&gt;/dev/null</text>
  <text x="190" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">로그/코어덤프 주로 범인</text>

  <!-- Inode box -->
  <rect x="560" y="310" width="260" height="80" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1"/>
  <text x="690" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">inode 고갈</text>
  <text x="690" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">find / -xdev -printf '%h\n'</text>
  <text x="690" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">| sort | uniq -c | sort -rn</text>
  <text x="690" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">소파일 대량 생성 디렉터리</text>

  <!-- Center: quick cleanup -->
  <rect x="310" y="310" width="230" height="80" rx="6" fill="#1a2a1a" stroke="#3a6a3a" stroke-width="1"/>
  <text x="425" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">빠른 정리</text>
  <text x="425" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">journalctl --vacuum-size=500M</text>
  <text x="425" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">apt/dnf clean</text>
  <text x="425" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">docker system prune</text>

  <!-- Arrows down to success -->
  <line x1="190" y1="390" x2="300" y2="430" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="425" y1="390" x2="440" y2="430" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="690" y1="390" x2="580" y2="430" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Success -->
  <rect x="260" y="430" width="360" height="44" rx="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="457" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">공간 확보 완료 / 근본 원인 제거</text>
</svg>
