<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">폭포수 차트 읽기 — 병목 식별</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">리소스 로딩 순서와 블로킹 관계 시각화</text>

  <!-- Timeline axis -->
  <line x1="200" y1="96" x2="820" y2="96" stroke="#333" stroke-width="1"/>
  <text x="200" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">0ms</text>
  <text x="500" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">1000ms</text>
  <text x="790" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">2000ms</text>

  <!-- Resource rows -->
  <!-- HTML -->
  <text x="60" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">index.html</text>
  <rect x="200" y="112" width="80" height="20" rx="3" fill="#2a3a5a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">HTML</text>

  <!-- Blocking CSS -->
  <text x="60" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">main.css</text>
  <rect x="280" y="146" width="180" height="20" rx="3" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="370" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">CSS (렌더 블로킹)</text>

  <!-- JS -->
  <text x="60" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">main.js</text>
  <rect x="280" y="180" width="240" height="20" rx="3" fill="#2a1a0d" stroke="#e0a055" stroke-width="1.5"/>
  <text x="400" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e0a055" text-anchor="middle">JS (파싱+컴파일)</text>

  <!-- Hero image -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">hero.jpg</text>
  <rect x="460" y="214" width="160" height="20" rx="3" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">이미지 (병렬)</text>

  <!-- Font -->
  <text x="60" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">font.woff2</text>
  <rect x="460" y="248" width="120" height="20" rx="3" fill="#1a0d2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="520" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">폰트</text>

  <!-- Markers -->
  <!-- FCP marker -->
  <line x1="620" y1="90" x2="620" y2="280" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="624" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">FCP</text>

  <!-- LCP marker -->
  <line x1="740" y1="90" x2="740" y2="280" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="744" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">LCP</text>

  <!-- Annotations -->
  <rect x="60" y="298" width="760" height="80" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">병목 식별 포인트:</text>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• CSS·JS 로딩이 HTML 파싱 완료 전에 시작하지 않으면 → &lt;link&gt;·&lt;script&gt; 위치 확인</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 히어로 이미지 발견이 늦으면 → &lt;link rel="preload"&gt; 추가</text>
  <text x="80" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 폰트가 FCP 이후에 로드되면 → font-display: swap + preload</text>
</svg>
