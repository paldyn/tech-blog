<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">충돌 해결 전략 비교</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">분리 체이닝 vs 개방 주소법 — 메모리·성능 트레이드오프</text>

    <!-- Table header -->
    <rect x="60" y="90" width="760" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="180" y="115" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">항목</text>
    <text x="390" y="115" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">분리 체이닝</text>
    <text x="640" y="115" font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">개방 주소법</text>

    <!-- Divider lines -->
    <line x1="300" y1="90" x2="300" y2="370" stroke="#2a3a5e" stroke-width="1"/>
    <line x1="520" y1="90" x2="520" y2="370" stroke="#2a3a5e" stroke-width="1"/>

    <!-- Row 1: 구조 -->
    <rect x="60" y="130" width="760" height="46" fill="#0d1520" stroke="#2a3a5e" stroke-width="0.5" rx="0"/>
    <text x="180" y="149" font-size="13" fill="#e8e8e8" text-anchor="middle">자료구조</text>
    <text x="180" y="165" font-size="11" fill="#888" text-anchor="middle">충돌 처리 방식</text>
    <text x="390" y="149" font-size="13" fill="#55c555" text-anchor="middle">배열 + 링크드 리스트</text>
    <text x="390" y="165" font-size="11" fill="#888" text-anchor="middle">버킷마다 연결 리스트</text>
    <text x="640" y="149" font-size="13" fill="#ce9178" text-anchor="middle">배열만 사용</text>
    <text x="640" y="165" font-size="11" fill="#888" text-anchor="middle">빈 슬롯 탐색</text>

    <!-- Row 2: 삽입 -->
    <rect x="60" y="176" width="760" height="46" fill="#111827" stroke="#2a3a5e" stroke-width="0.5" rx="0"/>
    <text x="180" y="195" font-size="13" fill="#e8e8e8" text-anchor="middle">삽입</text>
    <text x="180" y="211" font-size="11" fill="#888" text-anchor="middle">시간복잡도</text>
    <text x="390" y="200" font-size="13" fill="#55c555" text-anchor="middle">O(1) 평균</text>
    <text x="640" y="200" font-size="13" fill="#ce9178" text-anchor="middle">O(1) 평균</text>

    <!-- Row 3: 검색 -->
    <rect x="60" y="222" width="760" height="46" fill="#0d1520" stroke="#2a3a5e" stroke-width="0.5" rx="0"/>
    <text x="180" y="241" font-size="13" fill="#e8e8e8" text-anchor="middle">검색</text>
    <text x="180" y="257" font-size="11" fill="#888" text-anchor="middle">시간복잡도</text>
    <text x="390" y="241" font-size="13" fill="#55c555" text-anchor="middle">O(1+α) 평균</text>
    <text x="390" y="257" font-size="11" fill="#888" text-anchor="middle">α = 부하율</text>
    <text x="640" y="241" font-size="13" fill="#ce9178" text-anchor="middle">O(1/(1-α)) 평균</text>
    <text x="640" y="257" font-size="11" fill="#888" text-anchor="middle">α &lt; 0.7 권장</text>

    <!-- Row 4: 메모리 -->
    <rect x="60" y="268" width="760" height="46" fill="#111827" stroke="#2a3a5e" stroke-width="0.5" rx="0"/>
    <text x="180" y="287" font-size="13" fill="#e8e8e8" text-anchor="middle">메모리</text>
    <text x="180" y="303" font-size="11" fill="#888" text-anchor="middle">사용량</text>
    <text x="390" y="287" font-size="13" fill="#e05555" text-anchor="middle">포인터 오버헤드</text>
    <text x="390" y="303" font-size="11" fill="#888" text-anchor="middle">각 노드마다 next 포인터</text>
    <text x="640" y="287" font-size="13" fill="#55c555" text-anchor="middle">배열만 사용</text>
    <text x="640" y="303" font-size="11" fill="#888" text-anchor="middle">캐시 지역성 우수</text>

    <!-- Row 5: 부하율 -->
    <rect x="60" y="314" width="760" height="46" fill="#0d1520" stroke="#2a3a5e" stroke-width="0.5" rx="0"/>
    <text x="180" y="333" font-size="13" fill="#e8e8e8" text-anchor="middle">부하율 허용치</text>
    <text x="180" y="349" font-size="11" fill="#888" text-anchor="middle">resize 기준</text>
    <text x="390" y="333" font-size="13" fill="#55c555" text-anchor="middle">α &gt; 1 가능</text>
    <text x="390" y="349" font-size="11" fill="#888" text-anchor="middle">리스트가 길어질 뿐</text>
    <text x="640" y="333" font-size="13" fill="#e05555" text-anchor="middle">α &lt; 0.7 필수</text>
    <text x="640" y="349" font-size="11" fill="#888" text-anchor="middle">클러스터링 방지</text>

    <!-- Bottom border -->
    <rect x="60" y="360" width="760" height="1" fill="#2a3a5e"/>
    <text x="440" y="392" font-size="12" fill="#888" text-anchor="middle">Java HashMap: 체이닝 사용, 부하율 0.75 초과 시 리사이징  |  Python dict: 개방 주소법 (컴팩트)</text>
  </g>
</svg>
