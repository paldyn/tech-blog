<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">쿠키 보안 속성 참조표</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">Set-Cookie 헤더의 각 속성이 막는 공격 유형</text>

  <!-- Header -->
  <rect x="60" y="92" width="760" height="38" rx="6" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="200" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">속성</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">동작</text>
  <text x="720" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">방어 대상</text>
  <line x1="320" y1="92" x2="320" y2="460" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="600" y1="92" x2="600" y2="460" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Row 1: Secure -->
  <rect x="60" y="130" width="760" height="52" rx="0" fill="#0f1820"/>
  <text x="200" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">Secure</text>
  <text x="200" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">필수 권장</text>
  <text x="460" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">HTTPS 연결에서만 쿠키 전송</text>
  <text x="720" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">네트워크 도청 (MITM)</text>

  <!-- Row 2: HttpOnly -->
  <rect x="60" y="182" width="760" height="52" rx="0" fill="#0d1520"/>
  <text x="200" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">HttpOnly</text>
  <text x="200" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">필수 권장</text>
  <text x="460" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">JS의 document.cookie 접근 차단</text>
  <text x="720" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">XSS를 통한 쿠키 탈취</text>

  <!-- Row 3: SameSite=Strict -->
  <rect x="60" y="234" width="760" height="52" rx="0" fill="#0f1820"/>
  <text x="200" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">SameSite=Strict</text>
  <text x="200" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">강한 보호</text>
  <text x="460" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">크로스 사이트 요청 시 쿠키 전혀 전송 안 함</text>
  <text x="720" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">CSRF 완전 방어</text>

  <!-- Row 4: SameSite=Lax -->
  <rect x="60" y="286" width="760" height="52" rx="0" fill="#0d1520"/>
  <text x="200" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">SameSite=Lax</text>
  <text x="200" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본값 (Chrome)</text>
  <text x="460" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">GET 탑레벨 이동 시만 전송, POST 등 차단</text>
  <text x="720" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">대부분의 CSRF 방어</text>

  <!-- Row 5: SameSite=None -->
  <rect x="60" y="338" width="760" height="52" rx="0" fill="#0f1820"/>
  <text x="200" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">SameSite=None</text>
  <text x="200" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">Secure 필수!</text>
  <text x="460" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">크로스 사이트 요청에도 전송 (써드파티 쿠키)</text>
  <text x="720" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">CSRF 위험 — 최소화 필요</text>

  <!-- Row border -->
  <rect x="60" y="130" width="760" height="260" fill="none" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Bottom: Example -->
  <rect x="60" y="420" width="760" height="52" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">Set-Cookie: </text>
  <text x="165" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ce9178">session</text>
  <text x="211" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">=abc123; </text>
  <text x="287" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">HttpOnly</text>
  <text x="354" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">; </text>
  <text x="366" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">Secure</text>
  <text x="414" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">; </text>
  <text x="426" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">SameSite</text>
  <text x="496" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">=</text>
  <text x="505" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ce9178">Strict</text>
  <text x="547" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">; </text>
  <text x="559" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">Path</text>
  <text x="590" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">=/; Max-Age=</text>
  <text x="679" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#b5cea8">3600</text>
  <text x="76" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">← 권장 세션 쿠키 설정</text>
</svg>
