<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tempfile 모듈 — 4가지 임시 객체</text>

  <!-- NamedTemporaryFile -->
  <rect x="60" y="80" width="370" height="130" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">NamedTemporaryFile</text>
  <text x="76" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· 이름 있는 임시 파일</text>
  <text x="76" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· 다른 프로세스에서도 경로로 접근 가능</text>
  <text x="76" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· delete=False 하면 close 후에도 남음</text>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">→ .name 속성으로 경로 접근</text>

  <!-- SpooledTemporaryFile -->
  <rect x="450" y="80" width="370" height="130" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">SpooledTemporaryFile</text>
  <text x="466" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· 처음엔 메모리(RAM)에 저장</text>
  <text x="466" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· max_size 초과 시 자동으로 디스크로 이동</text>
  <text x="466" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· 소규모 중간 결과물에 최적</text>
  <text x="466" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">→ 빠른 I/O + 자동 overflow</text>

  <!-- TemporaryFile -->
  <rect x="60" y="230" width="370" height="130" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">TemporaryFile</text>
  <text x="76" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· 이름 없는 임시 파일 (가장 안전)</text>
  <text x="76" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· 파일시스템에 경로 노출 없음</text>
  <text x="76" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· 닫히는 즉시 자동 삭제</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">→ 보안이 중요한 임시 데이터</text>

  <!-- TemporaryDirectory -->
  <rect x="450" y="230" width="370" height="130" rx="8" fill="#111" stroke="#f0a020" stroke-width="1.5"/>
  <text x="635" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#f0a020" text-anchor="middle">TemporaryDirectory</text>
  <text x="466" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· 임시 디렉토리 생성</text>
  <text x="466" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· with 블록 종료 시 트리 전체 삭제</text>
  <text x="466" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">· .name 속성으로 경로 접근</text>
  <text x="466" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#f0a020">→ 빌드·테스트 작업 공간</text>

  <!-- Common -->
  <rect x="60" y="380" width="760" height="56" rx="8" fill="#111820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">공통 원칙</text>
  <text x="440" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">항상 with 문으로 사용 — 예외 발생 시에도 자동 정리 보장</text>
</svg>
