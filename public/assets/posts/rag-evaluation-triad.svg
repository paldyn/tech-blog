<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RAG 평가 삼각형 (RAG Triad)</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">TruLens의 세 가지 평가 관점</text>

  <!-- Triangle visualization -->
  <!-- Question-Context relevance -->
  <rect x="60" y="96" width="230" height="110" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">질문-컨텍스트 관련성</text>
  <text x="175" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">검색된 문서가 질문과</text>
  <text x="175" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">얼마나 관련 있는가?</text>
  <text x="175" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">검색기 품질 진단</text>
  <text x="175" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">낮으면 → 청킹·임베딩·검색 개선</text>

  <!-- Groundedness -->
  <rect x="325" y="96" width="230" height="110" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">근거성 (Groundedness)</text>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">답변이 컨텍스트에</text>
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">근거해 있는가?</text>
  <text x="440" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">할루시네이션 방지</text>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">낮으면 → 프롬프트·온도 조정</text>

  <!-- Answer-Question relevance -->
  <rect x="590" y="96" width="230" height="110" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">답변-질문 관련성</text>
  <text x="705" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">답변이 실제로 질문에</text>
  <text x="705" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">응답하는가?</text>
  <text x="705" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">생성기 품질 진단</text>
  <text x="705" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">낮으면 → 프롬프트 개선</text>

  <!-- Code block: trulens -->
  <rect x="60" y="228" width="760" height="92" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># TruLens RAG Triad 평가</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">from</text>
  <text x="108" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> trulens.apps.langchain </text>
  <text x="108" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">                       import</text>
  <text x="108" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                              TruChain</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">tru_rag = TruChain(rag_chain, feedbacks=[</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    Feedback(provider.context_relevance).on_input_output(),</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    Feedback(provider.groundedness).on_input_output(),</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">                                                        # 자동 스코어링</text>
</svg>
