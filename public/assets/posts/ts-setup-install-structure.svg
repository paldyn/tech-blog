<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 프로젝트 구조</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">권장 디렉터리 구조와 tsconfig.json 핵심 설정</text>
  <!-- File tree -->
  <rect x="60" y="100" width="300" height="300" rx="8" fill="#0d0d0d" stroke="#2a2a4e" stroke-width="1.5"/>
  <text x="80" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">my-ts-app/</text>
  <text x="80" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">├── </tspan><tspan fill="#7ec8e3">src/</tspan></text>
  <text x="80" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">│   └── </tspan><tspan fill="#ffffff">index.ts</tspan></text>
  <text x="80" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">├── </tspan><tspan fill="#7ec8e3">dist/</tspan></text>
  <text x="80" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">│   └── </tspan><tspan fill="#9aa4b8">index.js (컴파일 출력)</tspan></text>
  <text x="80" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">├── </tspan><tspan fill="#55c555">tsconfig.json</tspan></text>
  <text x="80" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">├── </tspan><tspan fill="#ce9178">package.json</tspan></text>
  <text x="80" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">└── </tspan><tspan fill="#888">.gitignore</tspan></text>
  <!-- tsconfig content -->
  <rect x="390" y="100" width="430" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="406" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">tsconfig.json (핵심 설정)</text>
  <line x1="406" y1="134" x2="800" y2="134" stroke="#1e3a4e" stroke-width="1"/>
  <text x="406" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">{</tspan></text>
  <text x="406" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">"compilerOptions"</tspan><tspan fill="#ffffff">: {</tspan></text>
  <text x="406" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"target"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"ES2020"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="406" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"module"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"commonjs"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="406" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"rootDir"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"./src"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="406" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"outDir"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"./dist"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="406" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"strict"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan></text>
  <text x="406" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  },</tspan></text>
  <text x="406" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">"include"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"src"</tspan><tspan fill="#ffffff">]</tspan></text>
  <text x="406" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">// exclude: ["node_modules"]</tspan></text>
  <text x="406" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">}</tspan></text>
  <!-- Bottom notes -->
  <text x="60" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">src/ : TypeScript 소스 파일   dist/ : 컴파일된 JavaScript 출력   strict : 엄격 모드 (권장)</text>
</svg>
