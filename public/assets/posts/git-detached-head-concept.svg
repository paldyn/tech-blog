<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Detached HEAD 상태</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">HEAD가 브랜치가 아닌 커밋을 직접 가리키는 상태</text>

  <!-- NORMAL state -->
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">정상 상태</text>
  <rect x="60" y="124" width="360" height="160" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.2"/>

  <!-- HEAD → main → C3 -->
  <rect x="90" y="148" width="80" height="32" rx="5" fill="#2a1a0a" stroke="#e8a838" stroke-width="1.2"/>
  <text x="130" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a838" text-anchor="middle">HEAD</text>

  <line x1="170" y1="164" x2="200" y2="164" stroke="#e8a838" stroke-width="1.5"/>
  <polygon points="200,160 210,164 200,168" fill="#e8a838"/>

  <rect x="210" y="148" width="80" height="32" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="250" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">main</text>

  <line x1="290" y1="164" x2="320" y2="164" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="320,160 330,164 320,168" fill="#55c555"/>

  <rect x="330" y="148" width="70" height="32" rx="5" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="365" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">C3</text>

  <text x="210" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">HEAD → main → C3</text>
  <text x="210" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">새 커밋 시 main이 자동으로 이동</text>
  <text x="210" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">cat .git/HEAD</text>
  <text x="210" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">→ ref: refs/heads/main</text>

  <!-- DETACHED state -->
  <text x="500" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Detached HEAD 상태</text>
  <rect x="480" y="124" width="360" height="160" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.2"/>

  <!-- HEAD → C2 directly -->
  <rect x="510" y="148" width="80" height="32" rx="5" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="550" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">HEAD</text>

  <line x1="590" y1="164" x2="650" y2="164" stroke="#e05555" stroke-width="2"/>
  <polygon points="650,160 660,164 650,168" fill="#e05555"/>

  <rect x="660" y="148" width="80" height="32" rx="5" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="700" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">C2</text>

  <text x="630" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">HEAD → C2 (직접)</text>
  <text x="630" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">새 커밋 시 어떤 브랜치도 이동하지 않음</text>
  <text x="630" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">cat .git/HEAD</text>
  <text x="630" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">→ abc1234def5678... (SHA-1)</text>

  <!-- How to enter detached -->
  <rect x="60" y="304" width="760" height="84" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Detached HEAD 진입 방법</text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git switch --detach abc1234</text>
  <text x="80" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git switch --detach v1.0.0        <tspan fill="#9aa4b8"># 태그로 진입</tspan></text>
  <text x="80" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git checkout abc1234               <tspan fill="#9aa4b8"># 구 명령</tspan></text>

  <!-- Warning message -->
  <rect x="60" y="406" width="760" height="72" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.2"/>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">주의: 커밋 손실 위험</text>
  <text x="80" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">Detached HEAD 상태에서 커밋한 뒤 다른 브랜치로 전환하면,</text>
  <text x="80" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">그 커밋은 어떤 브랜치에도 속하지 않아 GC 때 사라질 수 있다 → 브랜치로 보존 필수</text>
</svg>
