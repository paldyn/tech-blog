  <text x="420" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#555">+</text>

  <line x1="450" y1="284" x2="470" y2="284" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="470" y="266" width="80" height="36" rx="5" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="510" y="289" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" xml:space="preserve">bcrypt</text>

  <line x1="550" y1="284" x2="570" y2="284" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="570" y="266" width="250" height="36" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="695" y="289" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8e8e8" xml:space="preserve">$2b$12$…강화된 해시</text>

  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">DB가 유출되도 페퍼가 없으면 크랙 불가 — 2중 방어</text>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">페퍼는 DB와 분리된 곳에 저장 (환경변수, 시크릿 관리 시스템)</text>

  <!-- vs table -->
  <rect x="60" y="368" width="760" height="130" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">솔트 vs 페퍼 비교</text>

  <text x="200" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">구분</text>
  <text x="420" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
