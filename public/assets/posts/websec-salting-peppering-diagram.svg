<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">솔트와 페퍼 — 해시 강화 메커니즘</text>

  <!-- Salt section -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">솔트 (Salt)</text>

  <!-- User 1 -->
  <rect x="60" y="96" width="100" height="36" rx="5" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="119" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">alice</text>

  <rect x="170" y="96" width="100" height="36" rx="5" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="220" y="119" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">password</text>

  <rect x="280" y="96" width="100" height="36" rx="5" fill="#0a2010" stroke="#336633" stroke-width="1"/>
  <text x="330" y="112" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">xK9mP2qR</text>
  <text x="330" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">솔트 (랜덤)</text>

  <line x1="380" y1="114" x2="400" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="400" y="96" width="80" height="36" rx="5" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="119" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" xml:space="preserve">bcrypt</text>

  <line x1="480" y1="114" x2="500" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="500" y="96" width="320" height="36" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="660" y="119" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8e8e8" xml:space="preserve">$2b$12$xK9mP2qR…abc123</text>

  <!-- User 2 -->
  <rect x="60" y="142" width="100" height="36" rx="5" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">bob</text>

  <rect x="170" y="142" width="100" height="36" rx="5" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="220" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">password</text>

  <rect x="280" y="142" width="100" height="36" rx="5" fill="#0a2010" stroke="#336633" stroke-width="1"/>
  <text x="330" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">jL4nW7vQ</text>
  <text x="330" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">솔트 (랜덤)</text>

  <line x1="380" y1="160" x2="400" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="400" y="142" width="80" height="36" rx="5" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" xml:space="preserve">bcrypt</text>

  <line x1="480" y1="160" x2="500" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="500" y="142" width="320" height="36" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="660" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8e8e8" xml:space="preserve">$2b$12$jL4nW7vQ…xyz789</text>

  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">같은 비밀번호 "password"도 솔트가 달라서 해시가 완전히 다르다</text>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">솔트는 해시와 함께 DB에 저장 (비밀 아님) · bcrypt/argon2는 솔트를 해시에 내장</text>

  <!-- Divider -->
  <line x1="60" y1="228" x2="820" y2="228" stroke="#222" stroke-width="1"/>

  <!-- Pepper section -->
  <text x="60" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">페퍼 (Pepper)</text>

  <rect x="60" y="266" width="160" height="36" rx="5" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="282" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">password</text>
  <text x="140" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
