  <rect x="240" y="266" width="160" height="36" rx="5" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="320" y="282" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">PEPPER</text>
  <text x="320" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
