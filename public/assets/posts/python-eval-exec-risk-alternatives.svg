<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">eval 대신 무엇을 쓸까</text>

  <!-- row 1 -->
  <rect x="60" y="80" width="300" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="108" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">ast.literal_eval(s)</text>
  <text x="78" y="130" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">리스트/딕트/숫자 리터럴만</text>
  <text x="390" y="118" font-size="14" fill="#cccccc">파이썬 리터럴 안전 파싱</text>

  <!-- row 2 -->
  <rect x="60" y="160" width="300" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="188" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">json.loads(s)</text>
  <text x="78" y="210" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">데이터 교환 형식</text>
  <text x="390" y="198" font-size="14" fill="#cccccc">외부에서 받은 구조화 데이터</text>

  <!-- row 3 -->
  <rect x="60" y="240" width="300" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="268" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">{"add": add}[name]</text>
  <text x="78" y="290" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">디스패치 딕트</text>
  <text x="390" y="278" font-size="14" fill="#cccccc">이름으로 함수/동작 선택</text>
</svg>
