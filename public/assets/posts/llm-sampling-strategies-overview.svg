<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">샘플링 전략 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">각 전략의 다양성 · 일관성 · 적합 태스크 한눈에 비교</text>

  <!-- Table header -->
  <rect x="60" y="88" width="760" height="40" fill="#1a1f2e" rx="6"/>
  <text x="140" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">전략</text>
  <text x="290" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">다양성</text>
  <text x="420" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">일관성</text>
  <text x="620" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">적합 태스크</text>

  <!-- Column dividers in header -->
  <line x1="220" y1="88" x2="220" y2="128" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="350" y1="88" x2="350" y2="128" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="490" y1="88" x2="490" y2="128" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 1: Greedy Decoding -->
  <rect x="60" y="128" width="760" height="50" fill="#111" rx="0"/>
  <rect x="60" y="128" width="160" height="50" fill="#111827" rx="0"/>
  <text x="140" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Greedy</text>
  <text x="140" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Decoding</text>
  <!-- Diversity: none -->
  <text x="290" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#e05555" text-anchor="middle">●</text>
  <text x="290" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">없음</text>
  <!-- Consistency: high -->
  <text x="420" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555" text-anchor="middle">●●●</text>
  <text x="420" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">매우 높음</text>
  <!-- Use case -->
  <text x="620" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">단순 사실 답변, 분류</text>
  <text x="620" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">반복 실행 결과 동일</text>

  <!-- Row 2: Random Sampling -->
  <rect x="60" y="178" width="760" height="50" fill="#0d1117" rx="0"/>
  <rect x="60" y="178" width="160" height="50" fill="#111827" rx="0"/>
  <text x="140" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Random</text>
  <text x="140" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Sampling</text>
  <text x="290" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555" text-anchor="middle">●●●</text>
  <text x="290" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">매우 높음</text>
  <text x="420" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#e05555" text-anchor="middle">●</text>
  <text x="420" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">매우 낮음</text>
  <text x="620" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">실험 / 연구 목적</text>
  <text x="620" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">실제 사용 비권장</text>

  <!-- Row 3: Temperature Sampling -->
  <rect x="60" y="228" width="760" height="50" fill="#111" rx="0"/>
  <rect x="60" y="228" width="160" height="50" fill="#111827" rx="0"/>
  <text x="140" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Temperature</text>
  <text x="140" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Sampling</text>
  <text x="290" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#7ec8e3" text-anchor="middle">●●</text>
  <text x="290" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">조절 가능</text>
  <text x="420" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#7ec8e3" text-anchor="middle">●●</text>
  <text x="420" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">조절 가능</text>
  <text x="620" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">대화, 창의적 글쓰기</text>
  <text x="620" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">T 조절로 균형 맞춤</text>

  <!-- Row 4: Top-k + Top-p -->
  <rect x="60" y="278" width="760" height="50" fill="#0d1117" rx="0"/>
  <rect x="60" y="278" width="160" height="50" fill="#111827" rx="0"/>
  <text x="140" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Top-k / Top-p</text>
  <text x="140" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Nucleus</text>
  <text x="290" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#7ec8e3" text-anchor="middle">●●</text>
  <text x="290" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">높음</text>
  <text x="420" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#7ec8e3" text-anchor="middle">●●</text>
  <text x="420" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">높음</text>
  <text x="620" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">범용 — 가장 많이 쓰임</text>
  <text x="620" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">코드·대화·창작 모두 적합</text>

  <!-- Row 5: Typical Sampling -->
  <rect x="60" y="328" width="760" height="50" fill="#111" rx="0"/>
  <rect x="60" y="328" width="160" height="50" fill="#111827" rx="0"/>
  <text x="140" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Typical</text>
  <text x="140" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Sampling</text>
  <text x="290" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#7777cc" text-anchor="middle">●●</text>
  <text x="290" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">높음</text>
  <text x="420" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#7777cc" text-anchor="middle">●●</text>
  <text x="420" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">높음</text>
  <text x="620" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">자연스러운 텍스트 생성</text>
  <text x="620" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">엔트로피 기반 필터링</text>

  <!-- Row 6: Contrastive Search -->
  <rect x="60" y="378" width="760" height="50" fill="#0d1117" rx="0"/>
  <rect x="60" y="378" width="160" height="50" fill="#111827" rx="0"/>
  <text x="140" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Contrastive</text>
  <text x="140" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Search</text>
  <text x="290" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#7777cc" text-anchor="middle">●●</text>
  <text x="290" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">높음</text>
  <text x="420" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555" text-anchor="middle">●●●</text>
  <text x="420" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">매우 높음</text>
  <text x="620" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">긴 텍스트 생성, 번역</text>
  <text x="620" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">반복 없이 일관성 유지</text>

  <!-- Bottom border of table -->
  <rect x="60" y="428" width="760" height="2" fill="#1e2433" rx="1"/>

  <!-- Column dividers in body -->
  <line x1="220" y1="128" x2="220" y2="428" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="350" y1="128" x2="350" y2="428" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="128" x2="490" y2="428" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row dividers -->
  <line x1="60" y1="178" x2="820" y2="178" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="228" x2="820" y2="228" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="278" x2="820" y2="278" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="328" x2="820" y2="328" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="378" x2="820" y2="378" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Rounded corners wrapper -->
  <rect x="60" y="88" width="760" height="342" fill="none" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Legend -->
  <text x="60" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">● 낮음</text>
  <text x="120" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">●● 중간</text>
  <text x="190" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">●●● 높음</text>
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실무에서는 Top-p + Temperature 조합이 가장 일반적</text>
</svg>
