<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">삭제된 브랜치 복구 — 의사결정 트리</text>

  <!-- Root: branch deleted -->
  <rect x="330" y="68" width="220" height="48" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">브랜치 삭제됨</text>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git branch -D feature/xxx</text>

  <!-- Decision 1: SHA visible? -->
  <line x1="440" y1="116" x2="440" y2="148" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="290" y="150" width="300" height="42" rx="8" fill="#0e1620" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">삭제 시 터미널에 SHA 출력?</text>
  <text x="440" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(was abc1234)</text>

  <!-- Yes branch: use SHA directly -->
  <line x1="290" y1="171" x2="220" y2="240" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="238" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">YES</text>
  <rect x="60" y="243" width="260" height="56" rx="8" fill="#0e1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="190" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">git checkout -b</text>
  <text x="190" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  feature/xxx abc1234</text>

  <!-- No branch: reflog -->
  <line x1="590" y1="171" x2="660" y2="240" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="638" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">NO</text>
  <rect x="560" y="243" width="260" height="56" rx="8" fill="#0e1620" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="690" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">git reflog | grep</text>
  <text x="690" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  "feature/xxx"</text>

  <!-- Reflog found? -->
  <line x1="690" y1="299" x2="690" y2="331" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="560" y="333" width="260" height="42" rx="8" fill="#0e1620" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="690" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">reflog에서 SHA 발견?</text>

  <!-- Yes: restore -->
  <line x1="560" y1="354" x2="440" y2="415" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="488" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">YES</text>
  <rect x="330" y="418" width="220" height="42" rx="8" fill="#0e1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">git branch feature/xxx</text>
  <text x="440" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  &lt;SHA&gt;</text>

  <!-- No: fsck -->
  <line x1="820" y1="354" x2="820" y2="415" stroke="#e8c84a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="826" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c84a">NO</text>
  <rect x="700" y="418" width="160" height="42" rx="8" fill="#14120a" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="780" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8c84a" xml:space="preserve">git fsck</text>
  <text x="780" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8c84a" xml:space="preserve">  --unreachable</text>
</svg>
