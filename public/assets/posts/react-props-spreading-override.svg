<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프레딩 순서: 기본값 vs 재정의</text>

  <!-- Case 1: default first, then override -->
  <text x="220" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">기본값 먼저 → 호출자가 재정의</text>
  <rect x="60" y="84" width="360" height="220" rx="10" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>
  <rect x="76" y="96" width="328" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="116" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> TextInput({ ...props }) {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;input</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      type=</tspan><tspan fill="#ce9178">"text"</tspan><tspan fill="#9aa4b8"> {/* 기본 */}</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      </tspan><tspan fill="#7ec8e3" font-weight="600">{...props}</tspan><tspan fill="#9aa4b8"> {/* 나중 = 재정의 */}</tspan>
    <tspan x="92" dy="18" fill="#ce9178">    /&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  );</tspan>
    <tspan x="92" dy="18" fill="#ffffff">}</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// &lt;TextInput type="password" /&gt;</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// → type="password" 로 덮어씌움</tspan>
  </text>

  <!-- Case 2: override first, then lock -->
  <text x="660" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">호출자 props 먼저 → 컴포넌트가 고정</text>
  <rect x="460" y="84" width="360" height="220" rx="10" fill="#0a1628" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="476" y="96" width="328" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="492" y="116" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> SafeInput({ ...props }) {</tspan>
    <tspan x="492" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="492" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;input</tspan>
    <tspan x="492" dy="18" fill="#ffffff">      </tspan><tspan fill="#7ec8e3" font-weight="600">{...props}</tspan><tspan fill="#9aa4b8"> {/* 먼저 */}</tspan>
    <tspan x="492" dy="18" fill="#ffffff">      type=</tspan><tspan fill="#ce9178">"text"</tspan><tspan fill="#9aa4b8"> {/* 항상 고정 */}</tspan>
    <tspan x="492" dy="18" fill="#ce9178">    /&gt;</tspan>
    <tspan x="492" dy="18" fill="#ffffff">  );</tspan>
    <tspan x="492" dy="18" fill="#ffffff">}</tspan>
    <tspan x="492" dy="18" fill="#9aa4b8">// &lt;SafeInput type="password" /&gt;</tspan>
    <tspan x="492" dy="18" fill="#9aa4b8">// → type="text" 항상 유지</tspan>
  </text>

  <!-- Rule box -->
  <rect x="60" y="322" width="760" height="56" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">스프레딩 순서 규칙</text>
  <text x="440" y="360" text-anchor="middle" font-size="12" fill="#888">나중에 오는 prop이 앞의 prop을 덮어쓴다 (Object spread: { ...a, ...b } — b가 a를 덮음)</text>
  <text x="440" y="376" text-anchor="middle" font-size="12" fill="#888">기본값을 허용: 스프레드 뒤에 기본값 / 재정의 불가: 스프레드 앞에 고정값</text>
</svg>
