<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">자주 쓰는 git bundle 명령</text>

  <rect x="60" y="80" width="760" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="80" y="112" fill="#9aa4b8"># 전체 저장소를 하나의 번들로</tspan>
    <tspan x="80" y="134" fill="#ffffff">git <tspan fill="#7ec8e3" font-weight="600">bundle</tspan> create repo.bundle --all</tspan>
    <tspan x="80" y="164" fill="#9aa4b8"># 최근 5개 커밋 범위만 번들로</tspan>
    <tspan x="80" y="186" fill="#ffffff">git <tspan fill="#7ec8e3" font-weight="600">bundle</tspan> create recent.bundle main~5..main</tspan>
    <tspan x="80" y="216" fill="#9aa4b8"># 번들이 온전한지 검증</tspan>
    <tspan x="80" y="238" fill="#ffffff">git <tspan fill="#7ec8e3" font-weight="600">bundle</tspan> verify repo.bundle</tspan>
    <tspan x="80" y="268" fill="#9aa4b8"># 번들에서 새 저장소로 복제</tspan>
    <tspan x="80" y="290" fill="#ffffff">git clone repo.bundle myrepo</tspan>
  </text>

  <text x="60" y="346" font-size="13" fill="#888">--all 대신 브랜치 이름이나 커밋 범위를 지정하면 필요한 부분만 골라 담을 수 있습니다.</text>
</svg>
