<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">상관 서브쿼리 실행 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">외부 쿼리 행마다 서브쿼리가 재실행된다</text>

  <!-- Outer table -->
  <rect x="50" y="96" width="260" height="200" fill="#131820" rx="8" stroke="#7ec8e3"/>
  <text x="180" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">외부 쿼리 (employees)</text>
  <!-- Header -->
  <rect x="66" y="126" width="228" height="24" fill="#1e2433" rx="3"/>
  <text x="100" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">id</text>
  <text x="140" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">name</text>
  <text x="210" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">dept</text>
  <!-- Row 1 selected -->
  <rect x="66" y="150" width="228" height="22" fill="#0a1e14" rx="2" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">1</text>
  <text x="140" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Alice</text>
  <text x="210" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">IT</text>
  <!-- Row 2 -->
  <rect x="66" y="172" width="228" height="22" fill="#111" rx="2"/>
  <text x="100" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">2</text>
  <text x="140" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">Bob</text>
  <text x="210" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">HR</text>
  <!-- Row 3 -->
  <rect x="66" y="194" width="228" height="22" fill="#111" rx="2"/>
  <text x="100" y="209" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">3</text>
  <text x="140" y="209" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">Carol</text>
  <text x="210" y="209" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">IT</text>
  <!-- Row 4 -->
  <rect x="66" y="216" width="228" height="22" fill="#111" rx="2"/>
  <text x="100" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">4</text>
  <text x="140" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">Dave</text>
  <text x="210" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">IT</text>
  <text x="180" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">... N행</text>
  <text x="180" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">행 1 처리 중 (Alice, IT)</text>

  <!-- Arrow: outer to inner -->
  <polygon points="326,196 350,189 350,203" fill="#e05555"/>
  <line x1="310" y1="196" x2="348" y2="196" stroke="#e05555" stroke-width="2"/>
  <text x="340" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">dept='IT' 전달</text>

  <!-- Inner subquery -->
  <rect x="356" y="96" width="260" height="200" fill="#131820" rx="8" stroke="#e05555"/>
  <text x="486" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">서브쿼리 실행 (dept='IT')</text>
  <rect x="372" y="126" width="228" height="88" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="388" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">SELECT AVG</text>
  <text x="388" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">          (salary)</text>
  <text x="388" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">FROM</text>
  <text x="388" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">     employees</text>
  <text x="388" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">WHERE</text>
  <text x="388" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">      dept = <tspan fill="#ce9178">'IT'</tspan></text>
  <text x="388" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  <tspan fill="#55c555">→ 6,200,000</tspan></text>

  <text x="486" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">외부 행 N개 → N번 실행</text>
  <text x="486" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">인덱스 있어도 비용 누적</text>
  <text x="486" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">⚠ 대용량에서 성능 위험</text>

  <!-- Arrow: result back -->
  <polygon points="632,196 656,189 656,203" fill="#55c555"/>
  <line x1="616" y1="196" x2="654" y2="196" stroke="#55c555" stroke-width="2"/>
  <text x="644" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">결과 반환</text>

  <!-- Result box -->
  <rect x="662" y="96" width="168" height="200" fill="#131820" rx="8" stroke="#55c555"/>
  <text x="746" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">최종 결과</text>
  <rect x="678" y="126" width="136" height="24" fill="#1e2433" rx="3"/>
  <text x="710" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">name / dept_avg</text>
  <rect x="678" y="150" width="136" height="20" fill="#0a1e14" rx="2"/>
  <text x="710" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">Alice / 6.2M</text>
  <rect x="678" y="170" width="136" height="20" fill="#111" rx="2"/>
  <text x="710" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">Bob / 4.8M</text>
  <rect x="678" y="190" width="136" height="20" fill="#111" rx="2"/>
  <text x="710" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">Carol / 6.2M</text>
  <rect x="678" y="210" width="136" height="20" fill="#111" rx="2"/>
  <text x="710" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">Dave / 6.2M</text>

  <!-- Bottom: rewrite with join -->
  <rect x="50" y="326" width="780" height="130" fill="#0a180e" rx="8" stroke="#55c555"/>
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">JOIN으로 변환 — 테이블 1회 스캔</text>
  <rect x="66" y="360" width="748" height="84" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="82" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="82" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">       e.name, da.dept_avg</text>
  <text x="82" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="82" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     employees e</text>
  <text x="82" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">                  <tspan fill="#7ec8e3">JOIN</tspan> (SELECT dept, AVG(salary) dept_avg FROM employees GROUP BY dept) da</text>
  <text x="82" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    ON</text>
  <text x="82" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">       da.dept = e.dept;</text>
  <text x="82" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 집계를 1회 수행 후 hash join → O(N) 처리</text>
</svg>
