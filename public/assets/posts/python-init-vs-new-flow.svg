<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">객체 생성 단계: __new__ vs __init__</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">메모리 할당(new) → 초기화(init) → 완성된 인스턴스 반환</text>

  <!-- Step 1 -->
  <rect x="60" y="90" width="220" height="130" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="170" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">① Dog("Rex") 호출</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">클래스를 callable로</text>
  <text x="80" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">호출 → type.__call__</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이 조율함</text>
  <rect x="80" y="184" width="180" height="26" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="202" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Dog("Rex")</text>

  <!-- Arrow 1→2 -->
  <line x1="288" y1="155" x2="330" y2="155" stroke="#7777cc" stroke-width="2.5"/>
  <polygon points="330,149 344,155 330,161" fill="#7777cc"/>

  <!-- Step 2 -->
  <rect x="352" y="90" width="220" height="130" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="462" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">② __new__ 호출</text>
  <text x="372" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">메모리에 빈 인스턴스</text>
  <text x="372" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">할당. 인수: 클래스(cls)</text>
  <text x="372" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">반환: 새 인스턴스</text>
  <rect x="372" y="184" width="180" height="26" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="388" y="202" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Dog.__new__(Dog)</text>

  <!-- Arrow 2→3 -->
  <line x1="580" y1="155" x2="620" y2="155" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="620,149 634,155 620,161" fill="#55c555"/>

  <!-- Step 3 -->
  <rect x="642" y="90" width="198" height="130" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="741" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">③ __init__ 호출</text>
  <text x="660" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">new가 반환한 인스턴스를</text>
  <text x="660" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">self로 받아 속성 설정</text>
  <text x="660" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">반환값: None (무시됨)</text>
  <rect x="660" y="184" width="162" height="26" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="674" y="202" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">obj.__init__("Rex")</text>

  <!-- Code panels -->
  <rect x="60" y="244" width="370" height="190" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">__new__ 오버라이드: 싱글턴</text>
  <rect x="80" y="274" width="330" height="148" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="294" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">class </text>
  <text x="136" y="294" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Singleton:</text>
  <text x="96" y="312" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    _instance = </text>
  <text x="192" y="312" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">None</text>
  <text x="96" y="330" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="132" y="330" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__new__(cls):</text>
  <text x="96" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        if </text>
  <text x="126" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">cls._instance is </text>
  <text x="242" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">None</text>
  <text x="272" y="348" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">:</text>
  <text x="96" y="366" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">            cls._instance = </text>
  <text x="96" y="384" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">                super().__new__(cls)</text>
  <text x="96" y="402" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="152" y="402" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">cls._instance</text>

  <!-- Right panel -->
  <rect x="462" y="244" width="378" height="190" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="482" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">언제 __new__를 건드리나</text>
  <text x="482" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">사용하는 경우</text>
  <text x="496" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 싱글턴 패턴 구현</text>
  <text x="496" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• int, str 같은 불변 타입 서브클래스</text>
  <text x="496" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 메타클래스 작성</text>
  <text x="482" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">대부분의 경우</text>
  <text x="496" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">__init__만 오버라이드로 충분</text>
  <text x="496" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">__new__는 고급 패턴용</text>
  <text x="496" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">반환: super().__new__(cls) 필수</text>
</svg>
