<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N CRUD 표준 패턴</text>

  <!-- Column headers -->
  <text x="155" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">함수 호출</text>
  <text x="400" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Dataset 조작</text>
  <text x="680" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">서버 연동 / 결과</text>

  <!-- ===== ROW 1: SEARCH ===== -->
  <rect x="60" y="96" width="190" height="46" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="155" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">fn_search()</text>
  <text x="155" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">조회 버튼 클릭</text>

  <polygon points="250,116 308,116 308,111 320,119 308,127 308,122 250,122"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>

  <rect x="320" y="96" width="190" height="46" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="415" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">ds_cond → 서비스</text>
  <text x="415" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">조건 Dataset 전송</text>

  <polygon points="510,116 568,116 568,111 580,119 568,127 568,122 510,122"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>

  <rect x="580" y="96" width="240" height="46" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="700" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">ds_list 갱신 (Grid 반영)</text>
  <text x="700" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">callback → ds_list 자동 바인딩</text>

  <!-- ===== ROW 2: NEW ===== -->
  <rect x="60" y="196" width="190" height="46" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="155" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">fn_new()</text>
  <text x="155" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">신규 버튼 클릭</text>

  <polygon points="250,216 308,216 308,211 320,219 308,227 308,222 250,222"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>

  <rect x="320" y="196" width="190" height="46" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="415" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">ds_list.addRow()</text>
  <text x="415" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">rowStatus = INSERT(2)</text>

  <polygon points="510,216 568,216 568,211 580,219 568,227 568,222 510,222"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>

  <rect x="580" y="196" width="240" height="46" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">Grid 신규행 표시·편집</text>
  <text x="700" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버 요청 없이 로컬 추가</text>

  <!-- ===== ROW 3: DELETE ===== -->
  <rect x="60" y="296" width="190" height="46" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="155" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">fn_delete()</text>
  <text x="155" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">삭제 버튼 클릭</text>

  <polygon points="250,316 308,316 308,311 320,319 308,327 308,322 250,322"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>

  <rect x="320" y="296" width="190" height="46" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="415" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">ds_list.deleteRow(row)</text>
  <text x="415" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">rowStatus = DELETE(8)</text>

  <polygon points="510,316 568,316 568,311 580,319 568,327 568,322 510,322"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>

  <rect x="580" y="296" width="240" height="46" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">Grid에서 행 숨김</text>
  <text x="700" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">저장 시 서버 DELETE 처리</text>

  <!-- ===== ROW 4: SAVE ===== -->
  <rect x="60" y="396" width="190" height="46" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="155" y="414" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">fn_save()</text>
  <text x="155" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">저장 버튼 클릭</text>

  <polygon points="250,416 308,416 308,411 320,419 308,427 308,422 250,422"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>

  <rect x="320" y="396" width="190" height="46" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="415" y="414" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">변경 행 추출 · 검증</text>
  <text x="415" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">INSERT/UPDATE/DELETE</text>

  <polygon points="510,416 568,416 568,411 580,419 568,427 568,422 510,422"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>

  <rect x="580" y="396" width="240" height="46" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="414" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">서버 처리 후 재조회</text>
  <text x="700" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">savePoint() → 변경 초기화</text>

  <!-- Bottom note -->
  <text x="440" y="482"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">fn_delete · fn_new는 서버 직접 호출 없이 Dataset만 조작 — fn_save에서 일괄 전송</text>

  <!-- Horizontal dividers between rows -->
  <line x1="60" y1="160" x2="820" y2="160" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="60" y1="260" x2="820" y2="260" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="60" y1="360" x2="820" y2="360" stroke="#1a1a1a" stroke-width="1"/>
</svg>
