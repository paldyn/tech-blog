<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">로그 분석 빠른 참조</text>

  <rect x="60" y="62" width="760" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 오류 로그 실시간 모니터링</text>
  <text x="80" y="108" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">tail <tspan fill="#ffffff">-f</tspan> /var/log/syslog <tspan fill="#ffffff">|</tspan> <tspan fill="#ffffff">grep</tspan> <tspan fill="#ce9178">-i</tspan> <tspan fill="#ce9178">'error\|warn'</tspan></text>

  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># SSH 브루트포스 시도 IP 집계</text>
  <text x="80" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">grep <tspan fill="#ce9178">'Failed password'</tspan> /var/log/auth.log <tspan fill="#ffffff">\</tspan></text>
  <text x="80" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  | awk '{print $11}' | sort | uniq -c | sort -rn | head</text>

  <text x="80" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 패키지 설치 이력</text>
  <text x="80" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">grep <tspan fill="#ce9178">' install '</tspan> /var/log/dpkg.log | tail -<tspan fill="#b5cea8">20</tspan></text>

  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 로그인 이력</text>
  <text x="80" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">last <tspan fill="#ffffff">-n</tspan> <tspan fill="#b5cea8">20</tspan>          <tspan fill="#888"># 최근 20개 로그인</tspan></text>

  <text x="80" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># nginx 5xx 에러 집계</text>
  <text x="80" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">awk '$9~/^5/' /var/log/nginx/access.log <tspan fill="#ffffff">|</tspan> wc -l</text>
</svg>
