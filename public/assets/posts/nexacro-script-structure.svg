<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <linearGradient id="hdr2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f1a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1228;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="64" rx="12" fill="url(#hdr2)"/>
  <rect x="0" y="52" width="880" height="12" fill="url(#hdr2)"/>
  <text x="44" y="38" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">Nexacro N — 스크립트 구조와 범위 (Script Scope)</text>
  <text x="44" y="54" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" fill="#555">this · nexacro · application — 세 가지 스코프의 차이를 한눈에</text>

  <!-- this scope box -->
  <rect x="44" y="88" width="240" height="270" rx="10" fill="#111" stroke="#4a9eff" stroke-width="1.5"/>
  <rect x="44" y="88" width="240" height="36" rx="10" fill="#1a2a4a"/>
  <rect x="44" y="112" width="240" height="12" fill="#1a2a4a"/>
  <text x="164" y="112" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4a9eff" text-anchor="middle">this</text>
  <text x="164" y="128" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="middle">현재 Form 인스턴스</text>

  <text x="64" y="152" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">컴포넌트 접근</text>
  <rect x="64" y="158" width="204" height="22" rx="4" fill="#0d1a2a"/>
  <text x="74" y="173" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#7ab8ff" font-family="monospace">this.edtName.set_value("홍길동")</text>

  <text x="64" y="198" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">Dataset 접근</text>
  <rect x="64" y="204" width="204" height="22" rx="4" fill="#0d1a2a"/>
  <text x="74" y="219" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#7ab8ff" font-family="monospace">this.dsUser.getColumn(0, "name")</text>

  <text x="64" y="244" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">공통 함수 호출</text>
  <rect x="64" y="250" width="204" height="22" rx="4" fill="#0d1a2a"/>
  <text x="74" y="265" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#7ab8ff" font-family="monospace">this.fn_search()</text>

  <text x="64" y="292" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">트랜잭션 호출</text>
  <rect x="64" y="298" width="204" height="22" rx="4" fill="#0d1a2a"/>
  <text x="74" y="313" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#7ab8ff" font-family="monospace">this.transaction("svcId", ...)</text>

  <text x="64" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">팝업 호출</text>
  <rect x="64" y="346" width="204" height="22" rx="4" fill="#0d1a2a"/>
  <text x="74" y="361" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#7ab8ff" font-family="monospace">this.open("popup", ...)</text>

  <!-- nexacro scope box -->
  <rect x="316" y="88" width="240" height="270" rx="10" fill="#111" stroke="#4aff9e" stroke-width="1.5"/>
  <rect x="316" y="88" width="240" height="36" rx="10" fill="#1a3a2a"/>
  <rect x="316" y="112" width="240" height="12" fill="#1a3a2a"/>
  <text x="436" y="112" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4aff9e" text-anchor="middle">nexacro</text>
  <text x="436" y="128" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="middle">프레임워크 전역 객체</text>

  <text x="336" y="152" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">숫자 포맷</text>
  <rect x="336" y="158" width="204" height="22" rx="4" fill="#0d1a1a"/>
  <text x="346" y="173" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#7affcc" font-family="monospace">nexacro.toNumber("1,234")</text>

  <text x="336" y="198" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">문자열 포맷</text>
  <rect x="336" y="204" width="204" height="22" rx="4" fill="#0d1a1a"/>
  <text x="346" y="219" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#7affcc" font-family="monospace">nexacro.toString(1234, "###,###")</text>

  <text x="336" y="244" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">날짜 포맷</text>
  <rect x="336" y="250" width="204" height="22" rx="4" fill="#0d1a1a"/>
  <text x="346" y="265" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#7affcc" font-family="monospace">nexacro.toDate("20240101", ...)</text>

  <text x="336" y="292" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">이메일 검증</text>
  <rect x="336" y="298" width="204" height="22" rx="4" fill="#0d1a1a"/>
  <text x="346" y="313" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#7affcc" font-family="monospace">nexacro.isValidEmail(str)</text>

  <text x="336" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">JSON 변환</text>
  <rect x="336" y="346" width="204" height="22" rx="4" fill="#0d1a1a"/>
  <text x="346" y="361" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#7affcc" font-family="monospace">nexacro.toJson(dataset)</text>

  <!-- application scope box -->
  <rect x="588" y="88" width="248" height="270" rx="10" fill="#111" stroke="#ffaa44" stroke-width="1.5"/>
  <rect x="588" y="88" width="248" height="36" rx="10" fill="#3a2a1a"/>
  <rect x="588" y="112" width="248" height="12" fill="#3a2a1a"/>
  <text x="712" y="112" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffaa44" text-anchor="middle">application</text>
  <text x="712" y="128" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="middle">애플리케이션 전체 공유 객체</text>

  <text x="608" y="152" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">전역 변수 읽기</text>
  <rect x="608" y="158" width="212" height="22" rx="4" fill="#1a1100"/>
  <text x="618" y="173" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ffcc88" font-family="monospace">application.gv_userId</text>

  <text x="608" y="198" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">전역 Dataset 접근</text>
  <rect x="608" y="204" width="212" height="22" rx="4" fill="#1a1100"/>
  <text x="618" y="219" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ffcc88" font-family="monospace">application.gds_userInfo</text>

  <text x="608" y="244" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">공통 함수 호출</text>
  <rect x="608" y="250" width="212" height="22" rx="4" fill="#1a1100"/>
  <text x="618" y="265" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ffcc88" font-family="monospace">application.fn_alert("메시지")</text>

  <text x="608" y="292" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">설정값 접근</text>
  <rect x="608" y="298" width="212" height="22" rx="4" fill="#1a1100"/>
  <text x="618" y="313" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ffcc88" font-family="monospace">application.gv_serverUrl</text>

  <text x="608" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">현재 폼 목록</text>
  <rect x="608" y="346" width="212" height="22" rx="4" fill="#1a1100"/>
  <text x="618" y="361" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ffcc88" font-family="monospace">application.mainframe</text>

  <!-- Footer -->
  <text x="836" y="390" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#333" text-anchor="end">PALDYN · Nexacro N 시리즈</text>
</svg>
