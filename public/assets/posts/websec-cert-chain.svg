<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">X.509 인증서 신뢰 체인 (Chain of Trust)</text>

  <!-- Root CA -->
  <rect x="300" y="68" width="280" height="70" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Root CA</text>
  <text x="440" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DigiCert / Let's Encrypt / Sectigo 등</text>
  <text x="440" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">자체 서명 (Self-Signed), OS/브라우저에 내장</text>

  <!-- Root CA badge -->
  <rect x="620" y="78" width="120" height="50" rx="6" fill="#110d20" stroke="#7777cc" stroke-width="1"/>
  <text x="680" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">비밀키: 오프라인</text>
  <text x="680" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HSM 보관</text>
  <text x="680" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">유효기간 20~25년</text>

  <!-- Arrow down -->
  <line x1="440" y1="140" x2="440" y2="175" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="480" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">서명</text>

  <!-- Intermediate CA -->
  <rect x="280" y="178" width="320" height="70" rx="10" fill="#111a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Intermediate CA</text>
  <text x="440" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DigiCert TLS RSA SHA256 2020 CA1</text>
  <text x="440" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">Root CA가 서명, 유효기간 5~10년</text>

  <rect x="620" y="188" width="120" height="50" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="680" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">비밀키: 온라인</text>
  <text x="680" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HSM 보관 권장</text>
  <text x="680" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실제 서명 수행</text>

  <line x1="440" y1="250" x2="440" y2="285" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="480" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">서명</text>

  <!-- Leaf Certificate -->
  <rect x="260" y="288" width="360" height="80" rx="10" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Leaf (End-Entity) 인증서</text>
  <text x="440" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CN: www.example.com</text>
  <text x="440" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SAN: example.com, *.example.com</text>
  <text x="440" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">유효기간: 90일 (Let's Encrypt) ~ 398일 (최대)</text>

  <rect x="630" y="298" width="120" height="60" rx="6" fill="#0d200d" stroke="#55c555" stroke-width="1"/>
  <text x="690" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">서버 비밀키</text>
  <text x="690" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TLS 핸드셰이크 시</text>
  <text x="690" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용 (서버에 보관)</text>

  <!-- Client verification -->
  <rect x="60" y="288" width="180" height="80" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="150" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">클라이언트</text>
  <text x="150" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Root CA 목록 내장</text>
  <text x="150" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(OS/브라우저)</text>
  <text x="150" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">체인 전체 검증</text>

  <line x1="242" y1="328" x2="258" y2="328" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Bottom: Cert fields -->
  <rect x="60" y="390" width="760" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># X.509 인증서 주요 필드</text>
  <text x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Subject: CN, O, OU, C  <tspan fill="#9aa4b8">| 인증서 소유자</tspan></text>
  <text x="76" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">SAN (subjectAltName)   <tspan fill="#9aa4b8">| 와일드카드/다중 도메인 (CN 대체)</tspan></text>
  <text x="76" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Validity: NotBefore / NotAfter   <tspan fill="#9aa4b8">| 유효기간</tspan></text>
  <text x="76" y="482" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">OCSP / CRL   <tspan fill="#9aa4b8">| 인증서 폐기 확인</tspan></text>
</svg>
