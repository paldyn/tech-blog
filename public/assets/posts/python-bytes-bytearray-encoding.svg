<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">인코딩 · 디코딩 · 변환 패턴</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">str ↔ bytes 변환과 hex/int 활용</text>

  <!-- encode / decode flow -->
  <!-- str box -->
  <rect x="60" y="110" width="200" height="60" rx="8" fill="#111520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">str</text>
  <text x="160" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">"안녕, Python!"</text>

  <!-- arrow encode -->
  <line x1="260" y1="140" x2="310" y2="140" stroke="#55c555" stroke-width="2"/>
  <polygon points="310,135 322,140 310,145" fill="#55c555"/>
  <text x="291" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">.encode()</text>

  <!-- bytes box -->
  <rect x="322" y="110" width="200" height="60" rx="8" fill="#111520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="422" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">bytes</text>
  <text x="422" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">b'\xec\x95\x88\xeb\x85\x95...'</text>

  <!-- arrow decode -->
  <line x1="522" y1="140" x2="572" y2="140" stroke="#e8e8e8" stroke-width="2"/>
  <polygon points="572,135 584,140 572,145" fill="#e8e8e8"/>
  <text x="553" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">.decode()</text>

  <!-- str box 2 -->
  <rect x="584" y="110" width="200" height="60" rx="8" fill="#111520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="684" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">str</text>
  <text x="684" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">"안녕, Python!"</text>

  <!-- Code block left -->
  <rect x="60" y="200" width="380" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># str → bytes → str</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"안녕, Python!"</text></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">b = s.<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">encode</text>(<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"utf-8"</text>)</text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s2 = b.<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">decode</text>(<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"utf-8"</text>)</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># hex 표현</text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">h = b.<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">hex</text>()  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 'ec958887...'</text></text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">b3 = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">bytes</text>.<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">fromhex</text>(h)</text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># int 배열로 생성</text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">b4 = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">bytes</text>([<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">72</text>, <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">101</text>, <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">108</text>, <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">108</text>])</text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># b'Hell'</text>

  <!-- Code block right -->
  <rect x="460" y="200" width="360" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 슬라이싱 (str과 동일)</text>
  <text x="476" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">b = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">b"Hello World"</text></text>
  <text x="476" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">b[:<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">5</text>]    <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># b'Hello'</text></text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">b[<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>]      <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 72  (int!)</text></text>
  <text x="476" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># int → bytes 변환</text>
  <text x="476" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">n = (<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1024</text>).<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">to_bytes</text>(<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text>, <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"big"</text>)</text>
  <text x="476" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># b'\x04\x00'</text>
  <text x="476" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">m = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">int</text>.<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from_bytes</text>(n, <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"big"</text>)</text>
  <text x="476" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 1024</text>
</svg>
