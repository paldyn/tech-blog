<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">비동기 큐 — AsyncQueue 흐름</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">enqueue → 순차 실행 → 결과 반환 (동시 실행 수 = 1)</text>

  <!-- Queue input area -->
  <rect x="50" y="90" width="160" height="260" rx="8" fill="#0a0a14" stroke="#7777cc"/>
  <text x="130" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">대기 큐</text>

  <rect x="66" y="122" width="128" height="38" rx="4" fill="#14142a" stroke="#7777cc"/>
  <text x="130" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Job 3 (신규)</text>

  <rect x="66" y="170" width="128" height="38" rx="4" fill="#14142a" stroke="#555"/>
  <text x="130" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Job 4</text>

  <rect x="66" y="218" width="128" height="38" rx="4" fill="#141410" stroke="#333"/>
  <text x="130" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Job 5</text>

  <text x="130" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#333">⋮</text>

  <!-- Arrow: queue → runner -->
  <line x1="212" y1="200" x2="268" y2="200" stroke="#7777cc" stroke-width="2"/>
  <polygon points="260,193 270,200 260,207" fill="#7777cc"/>
  <text x="240" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">dequeue</text>

  <!-- Runner area -->
  <rect x="270" y="130" width="220" height="140" rx="8" fill="#071510" stroke="#55c555" stroke-width="2"/>
  <text x="380" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">실행 중</text>
  <rect x="286" y="162" width="188" height="50" rx="4" fill="#0d2010" stroke="#55c555"/>
  <text x="380" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Job 2</text>
  <text x="380" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">처리 중...</text>

  <!-- Progress bar -->
  <rect x="286" y="224" width="188" height="10" rx="5" fill="#1a2a1a"/>
  <rect x="286" y="224" width="120" height="10" rx="5" fill="#55c555"/>
  <text x="380" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">63%</text>

  <!-- Arrow: runner → done -->
  <line x1="492" y1="200" x2="548" y2="200" stroke="#55c555" stroke-width="2"/>
  <polygon points="540,193 550,200 540,207" fill="#55c555"/>
  <text x="520" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">완료</text>

  <!-- Completed area -->
  <rect x="550" y="90" width="280" height="260" rx="8" fill="#0a1410" stroke="#888"/>
  <text x="690" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">완료 (resolve)</text>

  <rect x="566" y="122" width="248" height="38" rx="4" fill="#101a10" stroke="#55c555"/>
  <text x="690" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Job 1 → resolve({ result })</text>
  <text x="690" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">await queue.enqueue(fn) 반환됨</text>

  <text x="690" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#333">·</text>
  <text x="690" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#333">·</text>
  <text x="690" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#333">·</text>

  <!-- Code block -->
  <rect x="50" y="370" width="780" height="86" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="66" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> q = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> AsyncQueue();  </tspan><tspan fill="#9aa4b8">// 순차 실행</tspan></text>

  <text x="66" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const</text>
  <text x="102" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> [r1, r2] = </text>
  <text x="180" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">await</text>
  <text x="214" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="214" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Promise.all([</text>
  <text x="66" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  q.enqueue(() =&gt; fetchA()),  q.enqueue(() =&gt; fetchB())</text>
  <text x="66" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]);  </text>
  <text x="96" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// fetchA 완료 후 fetchB 시작</text>
</svg>
