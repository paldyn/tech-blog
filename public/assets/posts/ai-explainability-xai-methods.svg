<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">XAI 기법 분류</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">설명 범위(전역/지역)와 모델 의존성(모델 불문/모델 특화)으로 분류</text>

  <!-- X axis label: Model dependency -->
  <text x="220" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">모델 불문 (Model-agnostic)</text>
  <text x="660" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">모델 특화 (Model-specific)</text>

  <!-- Y axis label: Scope -->
  <text x="40" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle" transform="rotate(-90,40,230)">전역 (Global)</text>
  <text x="40" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle" transform="rotate(-90,40,390)">지역 (Local)</text>

  <!-- Dividers -->
  <line x1="440" y1="120" x2="440" y2="470" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="305" x2="820" y2="305" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Quadrant 1: Global + Agnostic -->
  <rect x="90" y="130" width="330" height="155" rx="10" fill="#10180d" stroke="#55c555" stroke-width="1"/>
  <text x="105" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">전역 + 모델 불문</text>

  <rect x="105" y="162" width="140" height="48" rx="6" fill="#0d1a0a" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="175" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Partial Dependence</text>
  <text x="175" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Plot (PDP)</text>

  <rect x="260" y="162" width="140" height="48" rx="6" fill="#0d1a0a" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="330" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Permutation</text>
  <text x="330" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Feature Importance</text>

  <rect x="105" y="222" width="295" height="46" rx="6" fill="#0d1a0a" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="252" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">SHAP Global Summary Plot</text>
  <text x="252" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전체 데이터셋에 대한 특성 중요도</text>

  <!-- Quadrant 2: Global + Specific -->
  <rect x="450" y="130" width="360" height="155" rx="10" fill="#10180d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="465" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">전역 + 모델 특화</text>

  <rect x="465" y="162" width="155" height="48" rx="6" fill="#0a1820" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.5"/>
  <text x="542" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Attention Map</text>
  <text x="542" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Transformer 어텐션 가중치</text>

  <rect x="635" y="162" width="155" height="48" rx="6" fill="#0a1820" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.5"/>
  <text x="712" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Decision Tree</text>
  <text x="712" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">결정 경로 직접 추적</text>

  <rect x="465" y="222" width="325" height="46" rx="6" fill="#0a1820" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.5"/>
  <text x="627" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Grad-CAM (CNN 시각화)</text>
  <text x="627" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예측에 기여한 이미지 영역 히트맵</text>

  <!-- Quadrant 3: Local + Agnostic -->
  <rect x="90" y="315" width="330" height="145" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="105" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">지역 + 모델 불문</text>

  <rect x="105" y="348" width="140" height="48" rx="6" fill="#1a1228" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="175" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">LIME</text>
  <text x="175" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">지역 선형 근사</text>

  <rect x="260" y="348" width="140" height="48" rx="6" fill="#1a1228" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="330" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">SHAP Values</text>
  <text x="330" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">샤플리 값 기반</text>

  <rect x="105" y="408" width="295" height="40" rx="6" fill="#1a1228" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="252" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Counterfactual Explanations (반사실 설명)</text>

  <!-- Quadrant 4: Local + Specific -->
  <rect x="450" y="315" width="360" height="145" rx="10" fill="#1a100d" stroke="#ce9178" stroke-width="1"/>
  <text x="465" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">지역 + 모델 특화</text>

  <rect x="465" y="348" width="155" height="48" rx="6" fill="#1a1208" stroke="#ce9178" stroke-width="1" stroke-opacity="0.5"/>
  <text x="542" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Saliency Map</text>
  <text x="542" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력 gradient 분석</text>

  <rect x="635" y="348" width="155" height="48" rx="6" fill="#1a1208" stroke="#ce9178" stroke-width="1" stroke-opacity="0.5"/>
  <text x="712" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Integrated Gradients</text>
  <text x="712" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">경로 적분 귀인</text>

  <rect x="465" y="408" width="325" height="40" rx="6" fill="#1a1208" stroke="#ce9178" stroke-width="1" stroke-opacity="0.5"/>
  <text x="627" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Layer-wise Relevance Propagation (LRP)</text>
</svg>
