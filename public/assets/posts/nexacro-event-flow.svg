<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#152b47;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3d2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#112b1f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d2a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b1c0f;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a9eff" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4aff9e" />
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffaa44" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="64" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="52" width="880" height="12" fill="url(#headerGrad)"/>
  <text x="44" y="38" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">Nexacro N — 이벤트 흐름 (Event Flow)</text>
  <text x="44" y="54" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" fill="#555">사용자 행동 → 이벤트 발생 → 핸들러 함수 호출 → 비즈니스 로직 실행</text>

  <!-- Step 1: User Action -->
  <rect x="44" y="92" width="160" height="80" rx="10" fill="url(#boxGrad3)" stroke="#ffaa44" stroke-width="1.2"/>
  <text x="124" y="122" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffcc88" text-anchor="middle">① 사용자 행동</text>
  <text x="124" y="142" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888" text-anchor="middle">버튼 클릭</text>
  <text x="124" y="158" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888" text-anchor="middle">키보드 입력 / 포커스 이동</text>

  <!-- Arrow 1→2 -->
  <line x1="204" y1="132" x2="258" y2="132" stroke="#ffaa44" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Step 2: Event Object -->
  <rect x="260" y="92" width="180" height="80" rx="10" fill="url(#boxGrad1)" stroke="#4a9eff" stroke-width="1.2"/>
  <text x="350" y="118" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#88c0ff" text-anchor="middle">② 이벤트 객체 생성</text>
  <text x="350" y="138" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">EventInfo (e)</text>
  <text x="350" y="154" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">e.obj · e.id · e.value</text>
  <text x="350" y="168" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">e.postdata · e.statuscode</text>

  <!-- Arrow 2→3 -->
  <line x1="440" y1="132" x2="494" y2="132" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Handler Call -->
  <rect x="496" y="92" width="180" height="80" rx="10" fill="url(#boxGrad2)" stroke="#4aff9e" stroke-width="1.2"/>
  <text x="586" y="118" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#88ffcc" text-anchor="middle">③ 핸들러 호출</text>
  <text x="586" y="138" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Form_onload(obj, e)</text>
  <text x="586" y="154" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">Button_onclick(obj, e)</text>
  <text x="586" y="168" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">Edit_onchange(obj, e)</text>

  <!-- Arrow 3→4 -->
  <line x1="676" y1="132" x2="730" y2="132" stroke="#4aff9e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Step 4: Logic -->
  <rect x="732" y="92" width="108" height="80" rx="10" fill="#1a1a2e" stroke="#8888ff" stroke-width="1.2"/>
  <text x="786" y="122" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#aaaaff" text-anchor="middle">④ 로직 실행</text>
  <text x="786" y="142" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">유효성 검사</text>
  <text x="786" y="158" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">서버 통신</text>
  <text x="786" y="168" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">화면 갱신</text>

  <!-- Divider -->
  <line x1="44" y1="204" x2="836" y2="204" stroke="#222" stroke-width="1"/>

  <!-- Event Types Section -->
  <text x="44" y="230" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#888">주요 이벤트 종류</text>

  <!-- Form Events -->
  <rect x="44" y="244" width="180" height="130" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="44" y="244" width="180" height="30" rx="8" fill="#1a3a2a"/>
  <rect x="44" y="262" width="180" height="12" fill="#1a3a2a"/>
  <text x="134" y="264" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4aff9e" text-anchor="middle">Form 이벤트</text>
  <text x="60" y="286" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onload</text>
  <text x="180" y="286" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">폼 로드 완료</text>
  <text x="60" y="304" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onunload</text>
  <text x="180" y="304" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">폼 종료 직전</text>
  <text x="60" y="322" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onresize</text>
  <text x="180" y="322" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">폼 크기 변경</text>
  <text x="60" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onkeydown</text>
  <text x="180" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">키 눌림</text>
  <text x="60" y="358" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onerror</text>
  <text x="180" y="358" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">오류 발생</text>

  <!-- Input Events -->
  <rect x="244" y="244" width="180" height="130" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="244" y="244" width="180" height="30" rx="8" fill="#2a3a1a"/>
  <rect x="244" y="262" width="180" height="12" fill="#2a3a1a"/>
  <text x="334" y="264" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#aaff44" text-anchor="middle">입력 이벤트</text>
  <text x="260" y="286" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onchange</text>
  <text x="410" y="286" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">값 변경 완료</text>
  <text x="260" y="304" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onkeypress</text>
  <text x="410" y="304" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">키 입력 중</text>
  <text x="260" y="322" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onfocus</text>
  <text x="410" y="322" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">포커스 획득</text>
  <text x="260" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onkillfocus</text>
  <text x="410" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">포커스 잃음</text>
  <text x="260" y="358" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onenter</text>
  <text x="410" y="358" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">엔터 키 입력</text>

  <!-- Mouse Events -->
  <rect x="444" y="244" width="180" height="130" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="444" y="244" width="180" height="30" rx="8" fill="#2a1a3a"/>
  <rect x="444" y="262" width="180" height="12" fill="#2a1a3a"/>
  <text x="534" y="264" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#cc88ff" text-anchor="middle">마우스 이벤트</text>
  <text x="460" y="286" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onclick</text>
  <text x="610" y="286" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">마우스 클릭</text>
  <text x="460" y="304" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">ondblclick</text>
  <text x="610" y="304" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">더블 클릭</text>
  <text x="460" y="322" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onmouseover</text>
  <text x="610" y="322" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">마우스 진입</text>
  <text x="460" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onmouseout</text>
  <text x="610" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">마우스 이탈</text>
  <text x="460" y="358" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onmousedown</text>
  <text x="610" y="358" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">버튼 누름</text>

  <!-- Transaction Events -->
  <rect x="644" y="244" width="196" height="130" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="644" y="244" width="196" height="30" rx="8" fill="#3a1a1a"/>
  <rect x="644" y="262" width="196" height="12" fill="#3a1a1a"/>
  <text x="742" y="264" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ff8888" text-anchor="middle">트랜잭션 이벤트</text>
  <text x="660" y="286" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">oncalldataset</text>
  <text x="828" y="286" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">서버 통신 완료</text>
  <text x="660" y="304" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">ontransactionerror</text>
  <text x="828" y="304" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">통신 오류</text>
  <text x="660" y="322" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onfiledownload</text>
  <text x="828" y="322" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">파일 다운로드</text>
  <text x="660" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onfileupload</text>
  <text x="828" y="340" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">파일 업로드</text>
  <text x="660" y="358" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">onsessiontimeout</text>
  <text x="828" y="358" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="end">세션 만료</text>

  <!-- Footer -->
  <text x="836" y="408" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#333" text-anchor="end">PALDYN · Nexacro N 시리즈</text>
</svg>
