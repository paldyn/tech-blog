<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">버전 히스토리 추적 비교</text>

  <!-- Flyway timeline -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Flyway — 선형 버전</text>

  <circle cx="100" cy="120" r="20" fill="#1e3a5f" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#7ec8e3" text-anchor="middle">V1</text>
  <line x1="120" y1="120" x2="158" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <circle cx="190" cy="120" r="20" fill="#1e3a5f" stroke="#7ec8e3" stroke-width="2"/>
  <text x="190" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#7ec8e3" text-anchor="middle">V2</text>
  <line x1="210" y1="120" x2="248" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <circle cx="280" cy="120" r="20" fill="#1e3a5f" stroke="#7ec8e3" stroke-width="2"/>
  <text x="280" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#7ec8e3" text-anchor="middle">V3</text>
  <line x1="300" y1="120" x2="338" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <circle cx="370" cy="120" r="20" fill="#2a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="370" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#e05555" text-anchor="middle">V4</text>

  <text x="100" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">init</text>
  <text x="190" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">+phone</text>
  <text x="280" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">+index</text>
  <text x="370" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">현재</text>

  <text x="480" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 버전 번호 충돌 불가 (체크섬 변경 시 오류)</text>
  <text x="480" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• flyway_schema_history 테이블로 상태 관리</text>

  <!-- Alembic DAG -->
  <text x="60" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178">Alembic — DAG 히스토리</text>

  <rect x="80" y="216" width="80" height="36" rx="6" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="120" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10"
        fill="#ce9178" text-anchor="middle">a3f8c91</text>
  <line x1="160" y1="234" x2="198" y2="234" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="200" y="216" width="80" height="36" rx="6" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="240" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10"
        fill="#ce9178" text-anchor="middle">b12d047</text>
  <line x1="280" y1="234" x2="318" y2="220" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="280" y1="234" x2="318" y2="248" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4"/>

  <rect x="320" y="206" width="80" height="36" rx="6" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="360" y="229" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10"
        fill="#ce9178" text-anchor="middle">c9a2e11</text>
  <rect x="320" y="242" width="80" height="36" rx="6" fill="#2a1e10" stroke="#888" stroke-width="1.5"/>
  <text x="360" y="265" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10"
        fill="#888" text-anchor="middle">d5f3b20</text>

  <text x="480" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• revision_id = SHA 해시 (충돌 없음)</text>
  <text x="480" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 브랜치 merge 후 heads 단일화 필요</text>

  <!-- Code: Flyway SQL -->
  <rect x="60" y="296" width="370" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">-- V3__add_email_index.sql</text>
  <text x="80" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">CREATE INDEX</tspan><tspan fill="#ffffff"> idx_users_email</tspan>
  </text>
  <text x="80" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">ON</tspan><tspan fill="#ffffff"> users(email);</tspan>
  </text>

  <!-- Code: Alembic Python -->
  <rect x="450" y="296" width="370" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># Alembic upgrade()</text>
  <text x="470" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">op.create_index(</tspan><tspan fill="#ce9178">'idx_email'</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="470" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">'users'</tspan><tspan fill="#ffffff">, [</tspan><tspan fill="#ce9178">'email'</tspan><tspan fill="#ffffff">])</tspan>
  </text>
</svg>
