<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커스텀 훅 — 로직 분리와 재사용</text>

  <!-- Before: duplicated logic in components -->
  <text x="200" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">중복된 로직</text>

  <rect x="60" y="88" width="280" height="120" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="200" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">UserProfile</text>
  <text x="76" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">const [data, setData] = useState()</text>
  <text x="76" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">const [loading, setLoading] = useState()</text>
  <text x="76" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useEffect(() =&gt; { fetch... }, [userId])</text>
  <text x="76" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">AbortController, error handling...</text>
  <text x="76" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">⚠ 30줄 페칭 로직</text>

  <rect x="60" y="224" width="280" height="100" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="200" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">PostList</text>
  <text x="76" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">const [data, setData] = useState()</text>
  <text x="76" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">const [loading, setLoading] = useState()</text>
  <text x="76" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useEffect(() =&gt; { fetch... }, [postId])</text>
  <text x="76" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">⚠ 동일한 30줄 중복</text>

  <!-- Arrow -->
  <line x1="360" y1="200" x2="450" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="405" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">추출</text>

  <!-- After: custom hook -->
  <text x="660" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">커스텀 훅으로 분리</text>

  <rect x="460" y="88" width="360" height="130" rx="8" fill="#0a200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">useFetch(url)</text>
  <text x="476" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">AbortController 관리</text>
  <text x="476" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">loading / data / error 상태</text>
  <text x="476" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">경쟁 조건 처리</text>
  <text x="476" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">cleanup 자동화</text>
  <text x="476" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ { data, isLoading, error } 반환</text>

  <rect x="460" y="238" width="164" height="54" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="542" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">UserProfile</text>
  <text x="542" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">useFetch('/user')</text>

  <rect x="656" y="238" width="164" height="54" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="738" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">PostList</text>
  <text x="738" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">useFetch('/posts')</text>

  <!-- Arrows from hook to components -->
  <line x1="542" y1="218" x2="542" y2="237" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="738" y1="218" x2="738" y2="237" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Code section -->
  <rect x="60" y="350" width="760" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 규칙: 반드시 "use"로 시작, 내부에서 다른 훅 호출 가능</text>
  <text x="76" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> useFetch(url) {  </tspan><tspan fill="#9aa4b8">// ← "use" 접두사 필수</tspan></text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [state, dispatch] = </tspan><tspan fill="#7ec8e3" font-weight="600">useReducer</tspan><tspan fill="#ffffff">(reducer, initialState);</tspan></text>
  <text x="76" y="429" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8">  ...</tspan><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> { data: state.data, isLoading: state.loading, error: state.error };</tspan></text>
</svg>
