<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">저장소 용량은 어디에서 오는가</text>
  <text x="60" y="80" font-size="14" fill="#888">체크아웃된 파일이 아니라 .git에 쌓인 모든 과거 버전이 용량을 좌우한다</text>

  <!-- working tree box -->
  <rect x="60" y="110" width="300" height="120" rx="10" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="142" font-size="16" font-weight="600" fill="#e8e8e8">작업 트리 (HEAD)</text>
  <text x="80" y="170" font-size="13" fill="#cccccc">현재 체크아웃된 파일만</text>
  <text x="80" y="192" font-size="13" fill="#cccccc">눈에 보이는 디스크 크기</text>
  <text x="80" y="214" font-size="13" fill="#55c555">보통 작고 예측 가능</text>

  <!-- .git box -->
  <rect x="460" y="110" width="360" height="270" rx="10" fill="#11151c" stroke="#e05555" stroke-width="1.5"/>
  <text x="480" y="142" font-size="16" font-weight="600" fill="#e8e8e8">.git/ 객체 데이터베이스</text>
  <text x="480" y="166" font-size="13" fill="#888">한 번 들어온 객체는 영구 보관</text>

  <rect x="480" y="182" width="320" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="207" font-size="13" fill="#ffffff">현재 파일들의 blob</text>

  <rect x="480" y="230" width="320" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="255" font-size="13" fill="#ffffff">과거 모든 버전의 blob</text>

  <rect x="480" y="278" width="320" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="303" font-size="13" fill="#ce9178">삭제했다고 믿은 대용량 파일</text>

  <rect x="480" y="326" width="320" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="351" font-size="13" fill="#ffffff">packfile + 델타 압축</text>

  <!-- arrow connecting -->
  <defs>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <line x1="360" y1="170" x2="460" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="368" y="156" font-size="12" fill="#7ec8e3">커밋할 때마다 누적</text>

  <text x="60" y="290" font-size="13" fill="#9aa4b8">파일을 새 커밋에서 지워도</text>
  <text x="60" y="312" font-size="13" fill="#9aa4b8">과거 blob은 .git에 남아</text>
  <text x="60" y="334" font-size="13" fill="#9aa4b8">용량이 줄지 않는다.</text>
</svg>
