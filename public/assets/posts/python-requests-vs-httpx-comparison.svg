<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">requests vs httpx</text>

  <rect x="60" y="84" width="360" height="200" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="116" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">requests</text>
  <text x="240" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">동기 전용</text>
  <text x="240" y="172" font-size="13" fill="#9aa4b8" text-anchor="middle">가장 널리 쓰이는 표준</text>
  <text x="240" y="196" font-size="13" fill="#9aa4b8" text-anchor="middle">단순하고 안정적</text>
  <text x="240" y="220" font-size="13" fill="#9aa4b8" text-anchor="middle">방대한 예제·자료</text>
  <text x="240" y="252" font-size="12" fill="#e05555" text-anchor="middle">async 미지원 · HTTP/2 없음</text>

  <rect x="460" y="84" width="360" height="200" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="116" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">httpx</text>
  <text x="640" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">동기 + 비동기 모두</text>
  <text x="640" y="172" font-size="13" fill="#9aa4b8" text-anchor="middle">requests와 거의 같은 API</text>
  <text x="640" y="196" font-size="13" fill="#9aa4b8" text-anchor="middle">HTTP/2 · 타임아웃 명시</text>
  <text x="640" y="220" font-size="13" fill="#9aa4b8" text-anchor="middle">FastAPI 테스트에 기본 채택</text>
  <text x="640" y="252" font-size="12" fill="#55c555" text-anchor="middle">async 코드라면 사실상 표준</text>

  <rect x="60" y="296" width="760" height="0" rx="6" fill="#0a0a0a"/>
  <text x="440" y="308" font-size="13" fill="#9aa4b8" text-anchor="middle">동기 스크립트엔 requests, 비동기·신규 프로젝트엔 httpx가 무난하다</text>
</svg>
