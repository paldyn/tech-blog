<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">equals() + hashCode() 계약</text>

  <!-- equals contract -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">equals() 5가지 계약 (반드시 만족)</text>

  <rect x="60" y="90" width="360" height="220" rx="8" fill="#0a0a14" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="76" y="104" width="130" height="34" rx="6" fill="#0d1428" stroke="#7ec8e3" stroke-width="1"/>
  <text x="141" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">반사성(Reflexive)</text>
  <text x="220" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">x.equals(x) == true</text>

  <rect x="76" y="148" width="130" height="34" rx="6" fill="#0d1428" stroke="#7ec8e3" stroke-width="1"/>
  <text x="141" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">대칭성(Symmetric)</text>
  <text x="220" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">x.equals(y) == y.equals(x)</text>
  <text x="220" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(위반 시 컬렉션 오동작)</text>

  <rect x="76" y="192" width="130" height="34" rx="6" fill="#0d1428" stroke="#7ec8e3" stroke-width="1"/>
  <text x="141" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">추이성(Transitive)</text>
  <text x="220" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">a=b, b=c → a=c</text>
  <text x="220" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">상속 시 깨지기 쉬움</text>

  <rect x="76" y="236" width="130" height="34" rx="6" fill="#0d1428" stroke="#7ec8e3" stroke-width="1"/>
  <text x="141" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">일관성(Consistent)</text>
  <text x="220" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">객체 변경 없으면</text>
  <text x="220" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">결과 항상 동일</text>

  <rect x="76" y="280" width="130" height="34" rx="6" fill="#0d1428" stroke="#7ec8e3" stroke-width="1"/>
  <text x="141" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">null 비교</text>
  <text x="220" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">x.equals(null) == false</text>
  <text x="220" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NPE 발생 불가</text>

  <!-- hashCode contract -->
  <text x="460" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">hashCode() 계약</text>

  <rect x="460" y="90" width="360" height="220" rx="8" fill="#0a140a" stroke="#55c555" stroke-width="1.5"/>

  <rect x="476" y="104" width="140" height="34" rx="6" fill="#0d2214" stroke="#55c555" stroke-width="1"/>
  <text x="546" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">일관성</text>
  <text x="630" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">같은 실행 내</text>
  <text x="630" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">항상 같은 값 반환</text>

  <rect x="476" y="148" width="140" height="50" rx="6" fill="#0d2214" stroke="#55c555" stroke-width="1"/>
  <text x="546" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">equals = true</text>
  <text x="546" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">→ hashCode 반드시 동일</text>
  <text x="630" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이 계약이 핵심!</text>
  <text x="630" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HashMap 동작 기반</text>
  <text x="630" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">위반 시 버그 발생</text>

  <rect x="476" y="210" width="140" height="50" rx="6" fill="#0d2214" stroke="#55c555" stroke-width="1"/>
  <text x="546" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">hashCode 동일</text>
  <text x="546" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ equals 아닐 수 있음</text>
  <text x="630" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">해시 충돌</text>
  <text x="630" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(허용됨, 성능 이슈)</text>

  <rect x="476" y="272" width="140" height="34" rx="6" fill="#0d2214" stroke="#55c555" stroke-width="1"/>
  <text x="546" y="294" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">분산</text>
  <text x="630" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">충돌 최소화해야</text>
  <text x="630" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HashMap 성능 결정</text>

  <!-- Danger zone -->
  <rect x="60" y="336" width="360" height="64" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="356" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">가장 흔한 실수</text>
  <text x="240" y="374" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">equals()만 오버라이드하고 hashCode() 생략</text>
  <text x="240" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ HashMap/HashSet에서 객체를 찾지 못하는 버그</text>

  <!-- Recommendation -->
  <rect x="460" y="336" width="360" height="64" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="356" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">권장 구현 방법</text>
  <text x="640" y="374" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">record — 자동 생성 (가장 안전)</text>
  <text x="640" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">IDE 자동 생성 or Objects.hash() 활용</text>

  <!-- Summary -->
  <rect x="60" y="420" width="760" height="40" rx="8" fill="#0d1428" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="438" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">황금 규칙: equals() 오버라이드 시 hashCode()도 반드시 오버라이드</text>
  <text x="440" y="454" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">equals가 true인 두 객체는 같은 hashCode를 가져야 한다</text>
</svg>
