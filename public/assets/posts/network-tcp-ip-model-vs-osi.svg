<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-l" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OSI 7계층 vs TCP/IP 4계층 비교</text>

  <!-- OSI Column Header -->
  <text x="165" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">OSI 7계층</text>
  <!-- TCP/IP Column Header -->
  <text x="700" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">TCP/IP 4계층</text>

  <!-- OSI: Application / Presentation / Session map to TCP/IP: Application -->
  <rect x="60" y="90" width="210" height="46" rx="6" fill="#2a0a2a" stroke="#cc55cc" stroke-width="1.5"/>
  <text x="165" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#cc55cc" text-anchor="middle">7 응용 (Application)</text>
  <rect x="60" y="142" width="210" height="46" rx="6" fill="#1a0a2a" stroke="#9977cc" stroke-width="1.5"/>
  <text x="165" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9977cc" text-anchor="middle">6 표현 (Presentation)</text>
  <rect x="60" y="194" width="210" height="46" rx="6" fill="#0a0a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="165" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">5 세션 (Session)</text>

  <!-- TCP/IP: Application spans 3 OSI layers -->
  <rect x="600" y="90" width="220" height="150" rx="8" fill="#1a0a2a" stroke="#cc55cc" stroke-width="1.5"/>
  <text x="710" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#cc55cc" text-anchor="middle">응용 계층</text>
  <text x="710" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">HTTP, FTP, DNS</text>

  <!-- Arrows OSI 7/6/5 -> TCP App -->
  <line x1="270" y1="113" x2="598" y2="145" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="270" y1="165" x2="598" y2="165" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="270" y1="217" x2="598" y2="185" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- OSI: Transport -->
  <rect x="60" y="254" width="210" height="60" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="165" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">4 전송 (Transport)</text>

  <!-- TCP/IP: Transport -->
  <rect x="600" y="254" width="220" height="60" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">전송 계층</text>

  <line x1="270" y1="284" x2="598" y2="284" stroke="#7ec8e3" stroke-width="2"/>

  <!-- OSI: Network -->
  <rect x="60" y="328" width="210" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="165" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">3 네트워크 (Network)</text>

  <!-- TCP/IP: Internet -->
  <rect x="600" y="328" width="220" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">인터넷 계층</text>

  <line x1="270" y1="358" x2="598" y2="358" stroke="#55c555" stroke-width="2"/>

  <!-- OSI: Data Link + Physical map to TCP/IP: Network Access -->
  <rect x="60" y="402" width="210" height="46" rx="6" fill="#1a1200" stroke="#c8c855" stroke-width="1.5"/>
  <text x="165" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#c8c855" text-anchor="middle">2 데이터링크</text>
  <rect x="60" y="452" width="210" height="16" rx="4" fill="#1a0a00" stroke="#e8a55c" stroke-width="1"/>
  <text x="165" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#e8a55c" text-anchor="middle">1 물리 (Physical)</text>

  <!-- TCP/IP: Network Access spans both -->
  <rect x="600" y="402" width="220" height="66" rx="8" fill="#1a0a00" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="710" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8a55c" text-anchor="middle">네트워크 접근</text>
  <text x="710" y="457" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Network Access</text>

  <line x1="270" y1="425" x2="598" y2="435" stroke="#e8a55c" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="270" y1="460" x2="598" y2="450" stroke="#e8a55c" stroke-width="1.5" stroke-dasharray="4,4"/>
</svg>
