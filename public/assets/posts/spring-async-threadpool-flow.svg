<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#b5cea8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">@Async 비동기 실행 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">호출 스레드와 비동기 스레드풀의 분리</text>

  <!-- Calling Thread -->
  <rect x="60" y="90" width="180" height="56" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">HTTP 요청 스레드</text>
  <text x="150" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">tomcat-thread-1</text>

  <!-- Arrow: call async method -->
  <line x1="240" y1="118" x2="298" y2="118" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="270" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">호출</text>

  <!-- AOP Proxy -->
  <rect x="300" y="90" width="160" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">@Async 프록시</text>
  <text x="380" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AsyncAnnotationAdvisor</text>

  <!-- Arrow: proxy submits to pool -->
  <line x1="460" y1="118" x2="518" y2="118" stroke="#55c555" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="490" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">제출</text>

  <!-- Thread Pool -->
  <rect x="520" y="70" width="300" height="260" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="670" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ThreadPoolTaskExecutor</text>

  <!-- Core threads -->
  <rect x="536" y="104" width="120" height="36" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="596" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">코어 스레드 (10)</text>

  <rect x="664" y="104" width="140" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="734" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">최대 스레드 (50)</text>

  <!-- Queue -->
  <rect x="536" y="152" width="268" height="36" rx="6" fill="#2a2a1a" stroke="#b5cea8" stroke-width="1"/>
  <text x="670" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">큐 (LinkedBlockingQueue, 용량 100)</text>

  <!-- Worker threads executing -->
  <rect x="536" y="200" width="80" height="32" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="576" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">worker-1</text>

  <rect x="624" y="200" width="80" height="32" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="664" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">worker-2</text>

  <rect x="712" y="200" width="80" height="32" rx="4" fill="#111" stroke="#3a3a3a" stroke-width="1"/>
  <text x="752" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">worker-3 (대기)</text>

  <!-- Rejection policy -->
  <rect x="536" y="244" width="268" height="36" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="670" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">큐 초과 → 거부 정책 (CallerRunsPolicy)</text>

  <!-- Arrow: calling thread returns immediately -->
  <text x="150" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">즉시 반환</text>
  <line x1="300" y1="160" x2="230" y2="160" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-b)"/>

  <!-- CompletableFuture -->
  <rect x="60" y="180" width="180" height="44" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">CompletableFuture</text>
  <text x="150" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">또는 void 반환</text>

  <!-- Result back -->
  <text x="380" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">작업 완료 후 Future에 결과 세팅</text>
  <line x1="520" y1="320" x2="242" y2="320" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>

  <!-- SecurityContext 주의사항 -->
  <rect x="60" y="360" width="760" height="60" rx="8" fill="#111" stroke="#3a4a2a" stroke-width="1"/>
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">⚠ SecurityContext 전파 주의</text>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">기본적으로 SecurityContext는 새 스레드에 전파되지 않음. DelegatingSecurityContextAsyncTaskExecutor로 감싸야 한다.</text>

  <!-- Self-invocation warning -->
  <rect x="60" y="434" width="760" height="60" rx="8" fill="#111" stroke="#3a2a2a" stroke-width="1"/>
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">⚠ 같은 빈 내부에서 self-invocation 하면 @Async 무시됨</text>
  <text x="440" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">프록시를 거치지 않으므로 반드시 다른 빈에서 호출하거나 ApplicationContext.getBean()으로 self-proxy 참조</text>
</svg>
