<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">플랫폼별 줄 끝 차이</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">CRLF (Windows) vs LF (Unix) — 혼용 시 거짓 diff 발생</text>

  <!-- Platform boxes -->
  <!-- Windows -->
  <rect x="60" y="92" width="230" height="140" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="175" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Windows</text>
  <line x1="80" y1="126" x2="270" y2="126" stroke="#1e2c4a" stroke-width="1"/>
  <text x="175" y="150" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#e05555">CRLF  \r\n</text>
  <text x="175" y="174" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">0x0D 0x0A</text>
  <text x="175" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Notepad, VS Code</text>
  <text x="175" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본값이 CRLF</text>

  <!-- macOS/Linux -->
  <rect x="325" y="92" width="230" height="140" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="440" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">macOS / Linux</text>
  <line x1="345" y1="126" x2="535" y2="126" stroke="#1e2c4a" stroke-width="1"/>
  <text x="440" y="150" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#55c555">LF  \n</text>
  <text x="440" y="174" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">0x0A</text>
  <text x="440" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">터미널, vim</text>
  <text x="440" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">POSIX 표준</text>

  <!-- Old Mac -->
  <rect x="590" y="92" width="230" height="140" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="705" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">구형 Mac OS</text>
  <line x1="610" y1="126" x2="800" y2="126" stroke="#1e2c4a" stroke-width="1"/>
  <text x="705" y="150" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#888">CR  \r</text>
  <text x="705" y="174" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#666">0x0D</text>
  <text x="705" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">Mac OS 9 이전</text>
  <text x="705" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">현재는 거의 없음</text>

  <!-- Problem illustration -->
  <rect x="60" y="252" width="760" height="60" fill="#1a0808" rx="8" stroke="#5a2a2a" stroke-width="1"/>
  <text x="440" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">혼용 시 발생하는 문제</text>
  <text x="440" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내용 변경 없이 줄 끝만 바뀌어도 git diff에 전체 파일이 변경된 것처럼 표시됨</text>

  <!-- core.autocrlf options -->
  <rect x="60" y="330" width="760" height="68" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">core.autocrlf 설정값</text>
  <text x="180" y="374" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">true</text>
  <text x="180" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Windows 권장</text>
  <text x="440" y="374" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">input</text>
  <text x="440" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">macOS/Linux 권장</text>
  <text x="700" y="374" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">false</text>
  <text x="700" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">변환 없음 (비권장)</text>
</svg>
