<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
  <marker id="arr-7777cc" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto"><path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/></marker>
  </defs>
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git remote rename / remove</text>
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#888">.git/config 설정이 자동으로 업데이트된다</text>

  <!-- Before box -->
  <rect x="60" y="105" width="320" height="175" rx="8" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="220" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">변경 전</text>
  <rect x="76" y="140" width="288" height="122" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">[remote "origin"]</text>
  <text x="92" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  url = git@github.com:u/r.git</text>
  <text x="92" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  fetch = +refs/heads/*:</text>
  <text x="92" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    refs/remotes/origin/*</text>

  <!-- After box -->
  <rect x="500" y="105" width="320" height="175" rx="8" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="660" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">변경 후 (rename origin backup)</text>
  <rect x="516" y="140" width="288" height="122" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="532" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">[remote "backup"]</text>
  <text x="532" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  url = git@github.com:u/r.git</text>
  <text x="532" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  fetch = +refs/heads/*:</text>
  <text x="532" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    refs/remotes/backup/*</text>

  <!-- Arrow -->
  <line x1="382" y1="192" x2="500" y2="192" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-7777cc)"/>
  
  <text x="440" y="175" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">rename</text>

  <!-- Remove section -->
  <rect x="60" y="308" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 원격 저장소 제거 (로컬 파일은 삭제되지 않음)</text>
  <text x="76" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">git remote remove </text>
  <text x="247" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">backup</text>
  <text x="310" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # .git/config에서 제거</text>
</svg>
