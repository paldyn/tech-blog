<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">함수 어노테이션 문법</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">파라미터와 반환값에 타입 힌트 붙이기</text>

  <!-- Syntax diagram -->
  <rect x="60" y="100" width="760" height="148" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">어노테이션 문법 구조</text>
  <rect x="76" y="136" width="728" height="96" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def greet(<tspan fill="#e8e8e8">name</tspan><tspan fill="#55c555">: str</tspan>, <tspan fill="#e8e8e8">age</tspan><tspan fill="#55c555">: int</tspan> = <tspan fill="#b5cea8">0</tspan>) <tspan fill="#ce9178">-> str</tspan>:</text>
  <text x="92" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    # 파라미터: name: str  age: int  반환: -> str</text>
  <text x="92" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">return</tspan> <tspan fill="#ce9178">f"안녕 {name}, 나이: {age}"</tspan></text>
  <text x="92" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">greet.__annotations__  <tspan fill="#6a8aa0"># {'name': str, 'age': int, 'return': str}</tspan></text>

  <!-- Labels pointing at syntax -->
  <text x="175" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">파라미터 타입</text>
  <line x1="175" y1="240" x2="175" y2="234" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">기본값은 : 뒤</text>
  <text x="705" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">반환 타입</text>

  <!-- __annotations__ dict -->
  <rect x="60" y="270" width="360" height="170" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="240" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">__annotations__ 딕셔너리</text>
  <rect x="76" y="306" width="328" height="118" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">import</tspan> inspect</text>
  <text x="92" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">sig = inspect.signature(greet)</text>
  <text x="92" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for k, v <tspan fill="#7ec8e3">in</tspan> sig.parameters.items():</text>
  <text x="92" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    print(k, v.annotation)</text>
  <text x="92" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># name &lt;class 'str'&gt;</text>
  <text x="92" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># age  &lt;class 'int'&gt;</text>

  <!-- typing module -->
  <rect x="460" y="270" width="360" height="170" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">typing 모듈 활용</text>
  <rect x="476" y="306" width="328" height="118" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from typing <tspan fill="#7ec8e3">import</tspan> Optional, List</text>
  <text x="492" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def find(</text>
  <text x="492" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    items: List[str],</text>
  <text x="492" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    query: str,</text>
  <text x="492" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">) -> Optional[str]:</text>
  <text x="492" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    ...</text>

  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">어노테이션은 런타임에 강제 적용되지 않음 — 힌트일 뿐</text>
</svg>
