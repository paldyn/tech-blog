<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ReAct 에이전트 실행 트레이스</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Thought → Action → Observation 반복으로 문제를 단계적으로 해결</text>

  <!-- Trace boxes (code style) -->
  <rect x="40" y="90" width="800" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="60" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">질문: "서울의 현재 기온을 섭씨로 알려주고, 그 수치를 화씨로 변환해줘"</text>

  <text x="60" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Thought 1:</text>
  <text x="60" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">           서울의 현재 기온을 검색해야 한다.</text>

  <text x="60" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a855" font-weight="600" xml:space="preserve">Action 1:</text>
  <text x="60" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          web_search(query=</text>
  <text x="60" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                           "서울 현재 기온"</text>
  <text x="60" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                          )</text>

  <text x="60" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">Observation 1:</text>
  <text x="60" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">               서울 현재 기온: 23°C (맑음, 습도 55%)</text>

  <!-- Divider -->
  <line x1="60" y1="192" x2="820" y2="192" stroke="#1a1a1a" stroke-width="1"/>

  <text x="60" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Thought 2:</text>
  <text x="60" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">           기온이 23°C이다. 화씨 변환: F = C × 9/5 + 32</text>

  <text x="60" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a855" font-weight="600" xml:space="preserve">Action 2:</text>
  <text x="60" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          calculator(expression=</text>
  <text x="60" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                                "23 * 9/5 + 32"</text>
  <text x="60" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                               )</text>

  <text x="60" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">Observation 2:</text>
  <text x="60" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">               73.4</text>

  <!-- Divider -->
  <line x1="60" y1="266" x2="820" y2="266" stroke="#1a1a1a" stroke-width="1"/>

  <text x="60" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Thought 3:</text>
  <text x="60" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">           모든 정보가 있다. 최종 답변을 구성할 수 있다.</text>

  <text x="60" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">Final Answer:</text>
  <text x="60" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">              서울 현재 기온은 23°C이며, 화씨로는 73.4°F입니다.</text>

  <!-- Step indicators on right -->
  <rect x="820" y="128" width="40" height="50" rx="4" fill="#0f1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="840" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">Turn</text>
  <text x="840" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">1</text>

  <rect x="820" y="200" width="40" height="64" rx="4" fill="#0f1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="840" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">Turn</text>
  <text x="840" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">2</text>

  <rect x="820" y="274" width="40" height="40" rx="4" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="840" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Done</text>

  <!-- Bottom note -->
  <rect x="40" y="404" width="800" height="10" rx="4" fill="#0f0f0f"/>
</svg>
