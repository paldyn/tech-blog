<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">좋은 주석 vs 나쁜 주석</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">WHAT이 아니라 WHY를 설명하라</text>

  <!-- Bad header -->
  <rect x="60" y="84" width="360" height="30" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">나쁜 주석 — WHAT 설명</text>

  <!-- Good header -->
  <rect x="460" y="84" width="360" height="30" rx="6" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">좋은 주석 — WHY 설명</text>

  <!-- Bad code block -->
  <rect x="60" y="124" width="360" height="202" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># i를 1 증가시킨다</text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">i += </tspan><tspan fill="#b5cea8">1</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 리스트를 정렬한다</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">items.sort()</tspan></text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># x가 10보다 크면 True</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> x > </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    process(x)</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 함수 호출</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">print</tspan><tspan fill="#ffffff">(result)</tspan></text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 코드가 설명하는 것을 반복</text>

  <!-- Good code block -->
  <rect x="460" y="124" width="360" height="202" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Knuth 셔플: O(n), 편향 없음</text>
  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">random.shuffle(items)</tspan></text>
  <text x="476" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># API 제한: 초당 10회 이하</text>
  <text x="476" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">MAX_RATE = </tspan><tspan fill="#b5cea8">10</tspan></text>
  <text x="476" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 음수 인덱스로 역순 정렬</text>
  <text x="476" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">key = </tspan><tspan fill="#7ec8e3">lambda</tspan><tspan fill="#ffffff"> x: -x</tspan></text>
  <text x="476" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># DB 연결 풀 재사용 (비용↑)</text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">conn = pool.get()</tspan></text>
  <text x="476" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 이유와 제약을 설명</text>

  <!-- Summary -->
  <rect x="60" y="344" width="760" height="116" rx="8" fill="#0f1418" stroke="#333"/>
  <text x="440" y="368" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">주석 작성 원칙</text>
  <text x="200" y="394" text-anchor="middle" font-size="12" fill="#e05555">코드가 말하는 것을 반복 금지</text>
  <text x="200" y="412" text-anchor="middle" font-size="11" fill="#666">코드 자체로 읽히게 작성하라</text>
  <text x="440" y="394" text-anchor="middle" font-size="12" fill="#55c555">WHY·제약·함정을 설명</text>
  <text x="440" y="412" text-anchor="middle" font-size="11" fill="#666">미래의 나 혹은 동료에게 전달</text>
  <text x="690" y="394" text-anchor="middle" font-size="12" fill="#7ec8e3">공개 API는 독스트링 필수</text>
  <text x="690" y="412" text-anchor="middle" font-size="11" fill="#666">help(), IDE 자동완성에 활용</text>
  <text x="440" y="444" text-anchor="middle" font-size="11" fill="#555">좋은 코드 + 꼭 필요한 주석 = 유지보수하기 쉬운 코드</text>
</svg>
