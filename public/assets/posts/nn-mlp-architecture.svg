<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">MLP: 보편 함수 근사기</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">1개 이상의 은닉층을 가진 MLP는 임의의 연속 함수를 임의의 정밀도로 근사할 수 있다</text>

  <!-- Decision boundary comparison -->
  <!-- Linear (no hidden) -->
  <rect x="60" y="90" width="220" height="220" rx="8" fill="#0d0d0d" stroke="#2a2a2a"/>
  <text x="170" y="114" text-anchor="middle" fill="#888" font-size="12" font-weight="600" xml:space="preserve">선형 모델 (은닉층 없음)</text>

  <!-- Grid dots -->
  <!-- Class A dots (positive) -->
  <circle cx="100" cy="160" r="5" fill="#7ec8e3"/>
  <circle cx="115" cy="145" r="5" fill="#7ec8e3"/>
  <circle cx="130" cy="155" r="5" fill="#7ec8e3"/>
  <circle cx="120" cy="170" r="5" fill="#7ec8e3"/>
  <circle cx="110" cy="180" r="5" fill="#7ec8e3"/>

  <!-- Class B dots (negative) -->
  <circle cx="210" cy="250" r="5" fill="#e05555"/>
  <circle cx="230" cy="240" r="5" fill="#e05555"/>
  <circle cx="220" cy="260" r="5" fill="#e05555"/>
  <circle cx="240" cy="255" r="5" fill="#e05555"/>
  <circle cx="215" cy="270" r="5" fill="#e05555"/>

  <!-- Linear decision boundary -->
  <line x1="80" y1="290" x2="260" y2="120" stroke="#55c555" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="170" y="295" text-anchor="middle" fill="#55c555" font-size="11" xml:space="preserve">선형 결정 경계</text>

  <!-- MLP (with hidden layers) — nonlinear boundary -->
  <rect x="320" y="90" width="220" height="220" rx="8" fill="#0d0d0d" stroke="#2a2a2a"/>
  <text x="430" y="114" text-anchor="middle" fill="#888" font-size="12" font-weight="600" xml:space="preserve">MLP (은닉층 2개)</text>

  <!-- XOR-like pattern: mixed -->
  <circle cx="355" cy="145" r="5" fill="#7ec8e3"/>
  <circle cx="490" cy="145" r="5" fill="#7ec8e3"/>
  <circle cx="355" cy="275" r="5" fill="#7ec8e3"/>
  <circle cx="490" cy="275" r="5" fill="#7ec8e3"/>

  <circle cx="420" cy="145" r="5" fill="#e05555"/>
  <circle cx="355" cy="210" r="5" fill="#e05555"/>
  <circle cx="490" cy="210" r="5" fill="#e05555"/>
  <circle cx="420" cy="275" r="5" fill="#e05555"/>

  <!-- Non-linear boundary (circle approximation) -->
  <ellipse cx="430" cy="210" rx="55" ry="55" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="430" y="305" text-anchor="middle" fill="#55c555" font-size="11" xml:space="preserve">비선형 결정 경계</text>

  <!-- Universal approximation theorem box -->
  <rect x="580" y="90" width="240" height="220" rx="8" fill="#0c1520" stroke="#7777cc" stroke-width="2"/>
  <text x="700" y="116" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600" xml:space="preserve">보편 근사 정리</text>
  <text x="700" y="140" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">Universal Approximation</text>
  <text x="700" y="156" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">Theorem (1989)</text>

  <line x1="600" y1="168" x2="800" y2="168" stroke="#1e1e1e"/>

  <text x="700" y="190" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">충분히 많은 뉴런을 가진</text>
  <text x="700" y="208" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">1개의 은닉층 MLP는</text>
  <text x="700" y="226" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600" xml:space="preserve">임의의 연속 함수를</text>
  <text x="700" y="244" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600" xml:space="preserve">임의 정밀도로 근사</text>

  <line x1="600" y1="256" x2="800" y2="256" stroke="#1e1e1e"/>

  <text x="700" y="278" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">단, 이론적 존재 증명이지</text>
  <text x="700" y="295" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">어떻게 학습할지는 별개</text>

  <!-- Depth vs width debate -->
  <rect x="60" y="330" width="760" height="110" rx="8" fill="#0d0d0d" stroke="#1e1e1e"/>
  <text x="440" y="354" text-anchor="middle" fill="#e8e8e8" font-size="14" font-weight="600" xml:space="preserve">깊이(Depth) vs 너비(Width)</text>

  <!-- Width box -->
  <rect x="80" y="366" width="320" height="60" rx="6" fill="#0d1520" stroke="#7777cc"/>
  <text x="240" y="384" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600" xml:space="preserve">너비(넓은 네트워크)</text>
  <text x="240" y="402" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">파라미터 폭발, 과적합 위험</text>
  <text x="240" y="418" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">이론: 1층으로 모든 함수 근사 가능</text>

  <!-- Depth box -->
  <rect x="480" y="366" width="320" height="60" rx="6" fill="#0c1a0c" stroke="#55c555"/>
  <text x="640" y="384" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600" xml:space="preserve">깊이(깊은 네트워크)</text>
  <text x="640" y="402" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">파라미터 효율적, 계층적 특성 학습</text>
  <text x="640" y="418" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">실무: 같은 파라미터면 깊은 게 유리</text>

  <!-- Footer -->
  <text x="440" y="488" text-anchor="middle" fill="#444" font-size="11" xml:space="preserve">PALDYN · AI 완전 정복 시리즈</text>
</svg>
