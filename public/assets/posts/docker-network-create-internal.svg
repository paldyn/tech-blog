<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">--internal 옵션: 외부 차단 내부 전용 네트워크</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">DB 등 외부 노출이 불필요한 서비스를 완전 격리</text>

  <!-- Internet -->
  <rect x="340" y="88" width="200" height="44" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="115" text-anchor="middle" fill="#7777cc" font-size="14">인터넷 / 외부</text>

  <!-- Block to internal net -->
  <line x1="440" y1="132" x2="440" y2="168" stroke="#e05555" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="480" y="155" fill="#e05555" font-size="12">차단 (--internal)</text>

  <!-- Internal network box -->
  <rect x="160" y="170" width="560" height="160" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="440" y="196" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">internal-net (외부 통신 불가)</text>

  <!-- DB container -->
  <rect x="200" y="212" width="160" height="80" rx="6" fill="#0d1320" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="280" y="240" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">DB</text>
  <text x="280" y="260" text-anchor="middle" fill="#888" font-size="11">postgres:5432</text>
  <text x="280" y="278" text-anchor="middle" fill="#888" font-size="11">내부 통신만</text>

  <!-- Redis container -->
  <rect x="400" y="212" width="160" height="80" rx="6" fill="#0d1320" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="480" y="240" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">Redis</text>
  <text x="480" y="260" text-anchor="middle" fill="#888" font-size="11">redis:6379</text>
  <text x="480" y="278" text-anchor="middle" fill="#888" font-size="11">내부 통신만</text>

  <!-- API on external net -->
  <rect x="620" y="212" width="80" height="80" rx="6" fill="#0d1b2a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="660" y="240" text-anchor="middle" fill="#ce9178" font-size="12" font-weight="600">API</text>
  <text x="660" y="258" text-anchor="middle" fill="#888" font-size="10">양쪽 모두</text>
  <text x="660" y="274" text-anchor="middle" fill="#888" font-size="10">연결 가능</text>

  <!-- API → DB arrow -->
  <line x1="620" y1="252" x2="560" y2="252" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="560,252 572,246 572,258" fill="#55c555"/>

  <!-- DB ↔ Redis -->
  <line x1="360" y1="252" x2="400" y2="252" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="400,252 388,246 388,258" fill="#7ec8e3"/>
  <polygon points="360,252 372,246 372,258" fill="#7ec8e3"/>

  <!-- Bottom note -->
  <rect x="60" y="340" width="760" height="24" rx="4" fill="#070b14" stroke="none"/>
  <text x="440" y="357" text-anchor="middle" fill="#888" font-size="11">API 서비스는 public-net(외부)과 internal-net(내부) 양쪽에 연결  |  DB/Redis는 internal-net에만 연결 → 외부 직접 접근 불가</text>
</svg>
