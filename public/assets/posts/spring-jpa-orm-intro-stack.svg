<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JPA 기술 스택 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">표준 명세 → 구현체 → 추상화 레이어 관계</text>

  <!-- Layer 1: Application -->
  <rect x="60" y="88" width="760" height="60" fill="#0d1a2e" rx="8" stroke="#1e2e4a" stroke-width="1.5"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">애플리케이션 코드 (도메인 + 서비스)</text>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">@Entity, @Repository, JPQL, Spring Data JPA Repository</text>

  <!-- Arrow down -->
  <line x1="440" y1="148" x2="440" y2="172" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,180 434,164 446,164" fill="#555"/>

  <!-- Layer 2: Spring Data JPA -->
  <rect x="120" y="180" width="640" height="54" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Spring Data JPA</text>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">JpaRepository, @Query, Pageable, Auditing, QueryDSL 연동</text>

  <!-- Arrow down -->
  <line x1="440" y1="234" x2="440" y2="258" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,266 434,250 446,250" fill="#555"/>

  <!-- Layer 3: JPA Spec -->
  <rect x="180" y="266" width="520" height="54" fill="#1a1000" rx="8" stroke="#3a2800" stroke-width="1.5"/>
  <text x="440" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8c855" text-anchor="middle">JPA 명세 (Jakarta Persistence API)</text>
  <text x="440" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">EntityManager, PersistenceContext, JPQL, CriteriaAPI 인터페이스 표준</text>

  <!-- Arrow down -->
  <line x1="440" y1="320" x2="440" y2="344" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,352 434,336 446,336" fill="#555"/>

  <!-- Layer 4: Hibernate -->
  <rect x="240" y="352" width="400" height="54" fill="#0a0a1a" rx="8" stroke="#1a1a3a" stroke-width="1.5"/>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Hibernate (JPA 구현체)</text>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Session, HQL, 1차 캐시, Dirty Checking, Lazy Loading</text>

  <!-- Arrow down -->
  <line x1="440" y1="406" x2="440" y2="424" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,432 434,416 446,416" fill="#555"/>

  <!-- Layer 5: JDBC -->
  <rect x="300" y="432" width="280" height="18" fill="#111" rx="4" stroke="#222" stroke-width="1"/>
  <text x="440" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">JDBC → 실제 SQL → DB</text>

  <!-- Right side labels -->
  <text x="810" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="start">우리가</text>
  <text x="810" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="start">작성</text>

  <text x="810" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="start">편의</text>
  <text x="810" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="start">추상화</text>

  <text x="810" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c855" text-anchor="start">표준</text>
  <text x="810" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c855" text-anchor="start">명세</text>

  <text x="810" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="start">구현체</text>
  <text x="810" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="start">(변경 가능)</text>
</svg>
