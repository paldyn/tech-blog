<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker logs 주요 옵션</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">실시간 추적 · 시간 필터 · 줄 수 제한</text>

  <!-- Option grid -->
  <!-- Row 1 -->
  <rect x="60" y="100" width="340" height="90" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7ec8e3">-f / --follow</text>
  <text x="80" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">실시간 로그 스트리밍</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">tail -f처럼 새 로그가 생기면 즉시 출력</text>

  <rect x="480" y="100" width="340" height="90" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="500" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#55c555">-n / --tail N</text>
  <text x="500" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">마지막 N줄만 출력</text>
  <text x="500" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">--tail 0: 새 로그만, --tail all: 전체</text>

  <!-- Row 2 -->
  <rect x="60" y="208" width="340" height="90" rx="8" fill="#1a1a30" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7777cc">--since / --until</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">시간 범위 필터링</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RFC3339, 상대시간(10m, 2h), 타임스탬프</text>

  <rect x="480" y="208" width="340" height="90" rx="8" fill="#1f1400" stroke="#e8a030" stroke-width="1.5"/>
  <text x="500" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#e8a030">-t / --timestamps</text>
  <text x="500" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">각 로그 줄에 타임스탬프 추가</text>
  <text x="500" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RFC3339 UTC 형식</text>

  <!-- Code block -->
  <rect x="60" y="320" width="760" height="124" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 최근 100줄 + 실시간 팔로우</text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker logs</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">-f --tail</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#b5cea8">100</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">web</tspan>
  </text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 타임스탬프 + 최근 30분 로그</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker logs</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">-t --since</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">30m</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">web</tspan>
  </text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 에러 로그만 grep</text>
  <text x="76" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker logs</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">web</tspan>
    <tspan fill="#e8e8e8"> 2&gt;&amp;1 | </tspan>
    <tspan fill="#7ec8e3">grep</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">ERROR</tspan>
  </text>
</svg>
