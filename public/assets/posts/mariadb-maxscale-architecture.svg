<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a040"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MariaDB MaxScale 아키텍처</text>

  <!-- Client tier -->
  <text x="60" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">클라이언트 계층</text>
  <!-- App1 -->
  <rect x="60" y="125" width="130" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">App Server 1</text>
  <text x="125" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MySQL 클라이언트</text>
  <!-- App2 -->
  <rect x="60" y="200" width="130" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">App Server 2</text>
  <text x="125" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MySQL 클라이언트</text>
  <!-- App3 -->
  <rect x="60" y="275" width="130" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">App Server 3</text>
  <text x="125" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MySQL 클라이언트</text>

  <!-- Arrows: clients -> maxscale -->
  <line x1="190" y1="152" x2="290" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="190" y1="227" x2="290" y2="233" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="190" y1="302" x2="290" y2="255" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- MaxScale box -->
  <rect x="290" y="130" width="220" height="220" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="400" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">MaxScale</text>
  <text x="400" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">포트 3306/4006</text>

  <!-- Service: ReadWriteSplit -->
  <rect x="310" y="190" width="180" height="44" rx="6" fill="#0a1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="400" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">ReadWriteSplitRouter</text>
  <text x="400" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쓰기→Primary / 읽기→Replica</text>

  <!-- Service: ReadConnRoute -->
  <rect x="310" y="246" width="180" height="44" rx="6" fill="#0a1520" stroke="#e0a040" stroke-width="1.5"/>
  <text x="400" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0a040" text-anchor="middle">ReadConnRoute</text>
  <text x="400" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">읽기 전용 부하 분산</text>

  <!-- Monitor -->
  <rect x="310" y="302" width="180" height="36" rx="6" fill="#0a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="400" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">MariaDBMon</text>
  <text x="400" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서버 상태 모니터링</text>

  <!-- Backend label -->
  <text x="580" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">MariaDB 클러스터</text>

  <!-- Primary -->
  <rect x="580" y="125" width="230" height="60" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="2"/>
  <text x="695" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Primary</text>
  <text x="695" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">읽기 + 쓰기 · 192.168.1.10:3306</text>

  <!-- Replica 1 -->
  <rect x="580" y="210" width="230" height="60" rx="8" fill="#101520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="695" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Replica 1</text>
  <text x="695" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">읽기 전용 · 192.168.1.11:3306</text>

  <!-- Replica 2 -->
  <rect x="580" y="295" width="230" height="60" rx="8" fill="#101520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="695" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Replica 2</text>
  <text x="695" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">읽기 전용 · 192.168.1.12:3306</text>

  <!-- Arrows: maxscale -> backends -->
  <line x1="510" y1="210" x2="578" y2="155" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="510" y1="230" x2="578" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="510" y1="255" x2="578" y2="325" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Write label -->
  <text x="537" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">쓰기</text>
  <!-- Read labels -->
  <text x="537" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">읽기</text>
  <text x="537" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">읽기</text>

  <!-- Replication arrows between Primary and Replicas -->
  <line x1="695" y1="185" x2="695" y2="208" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="695" y1="270" x2="695" y2="293" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="710" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">복제</text>
  <text x="710" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">복제</text>

  <!-- Port info -->
  <rect x="60" y="390" width="760" height="94" rx="8" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># maxscale.cnf 포트 설정</text>
  <text xml:space="preserve" x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">[RW-Split-Listener]</text>
  <text xml:space="preserve" x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff">=listener  </tspan><tspan fill="#7ec8e3" font-weight="600">port</tspan><tspan fill="#ffffff">=3306  </tspan><tspan fill="#9aa4b8"># 앱 접속 포트</tspan></text>
  <text xml:space="preserve" x="80" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">service</tspan><tspan fill="#ffffff">=ReadWriteSplit  </tspan><tspan fill="#7ec8e3" font-weight="600">protocol</tspan><tspan fill="#ffffff">=MariaDBClient</tspan></text>
</svg>
