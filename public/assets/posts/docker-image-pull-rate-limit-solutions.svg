<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Rate Limit 우회 전략 비교</text>

  <!-- Strategy 1 -->
  <rect x="60" y="70" width="360" height="130" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">전략 1: Docker Hub 로그인</text>
  <text x="240" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">무료 계정: 200/6h → 유료: 무제한</text>
  <rect x="76" y="124" width="328" height="64" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">docker</text>
  <text x="140" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> login</text>
  <text x="92" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">docker</text>
  <text x="140" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> pull nginx:alpine</text>
  <text x="92" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># ~/.docker/config.json 에 저장됨</text>

  <!-- Strategy 2 -->
  <rect x="460" y="70" width="360" height="130" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">전략 2: 미러 레지스트리</text>
  <text x="640" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">daemon.json에 미러 설정 — IP 분산</text>
  <rect x="476" y="124" width="328" height="64" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// /etc/docker/daemon.json</text>
  <text x="492" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">"registry-mirrors": [</text>
  <text x="492" y="179" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  "https://mirror.gcr.io"]</text>

  <!-- Strategy 3 -->
  <rect x="60" y="230" width="360" height="130" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">전략 3: GitHub Actions 캐싱</text>
  <text x="240" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CI에서 레이어 캐시 재사용</text>
  <rect x="76" y="284" width="328" height="64" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">- uses:</text>
  <text x="148" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve"> docker/login-action@v3</text>
  <text x="92" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  with:</text>
  <text x="92" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    username: ${{ secrets.DOCKER_USER }}</text>

  <!-- Strategy 4 -->
  <rect x="460" y="230" width="360" height="130" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">전략 4: 프라이빗 레지스트리</text>
  <text x="640" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AWS ECR / GCP AR / 자체 Harbor</text>
  <rect x="476" y="284" width="328" height="64" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 이미지를 프라이빗에 복사</text>
  <text x="492" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">docker pull nginx:alpine</text>
  <text x="492" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">docker push myecr/nginx:alpine</text>

  <!-- Bottom note -->
  <rect x="60" y="385" width="760" height="40" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">CI/CD 환경 권장 순서: 로그인 → 레이어 캐시 활용 → 자체 레지스트리 미러링</text>
</svg>
