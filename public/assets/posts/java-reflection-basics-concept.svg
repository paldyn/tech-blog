<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">리플렉션 — 런타임에 자기 자신을 들여다본다</text>

  <!-- normal call -->
  <text x="220" y="86" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">일반 호출</text>
  <rect x="60" y="104" width="320" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="132" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">User u = new User();</text>
  <text x="76" y="156" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">u.setName("kim");</text>
  <text x="76" y="192" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 타입·메서드를</text>
  <text x="76" y="210" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 컴파일 시점에 안다</text>

  <!-- reflection -->
  <text x="660" y="86" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">리플렉션</text>
  <rect x="500" y="104" width="320" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="132" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">Class&lt;?&gt; c = Class.forName(name);</text>
  <text x="516" y="156" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">Object o = c.getConstructor()</text>
  <text x="516" y="174" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">             .newInstance();</text>
  <text x="516" y="200" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 타입을 문자열로,</text>
  <text x="516" y="218" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 런타임에 결정</text>

  <text x="440" y="270" font-size="13" fill="#9aa4b8" text-anchor="middle">컴파일 시점에 타입을 몰라도, 런타임에 클래스 구조를 조회하고 조작할 수 있다</text>
  <text x="440" y="294" font-size="12" fill="#888" text-anchor="middle">프레임워크 · 직렬화 · DI 컨테이너의 토대</text>
</svg>
