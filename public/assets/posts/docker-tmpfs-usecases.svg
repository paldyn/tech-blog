<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tmpfs 마운트 문법과 옵션</text>

  <!-- Left: syntax block -->
  <text x="80" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">마운트 방법</text>
  <rect x="80" y="88" width="360" height="170" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># --tmpfs (단순)</tspan></text>
  <text x="96" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#e8e8e8"> --tmpfs /run \</tspan></text>
  <text x="96" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  my-app</tspan></text>

  <text x="96" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># --tmpfs 옵션 지정</tspan></text>
  <text x="96" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#e8e8e8"> \</tspan></text>
  <text x="96" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  --tmpfs /run:rw,noexec,nosuid,size=64m \</tspan></text>
  <text x="96" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  my-app</tspan></text>
  <text x="96" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># --mount type=tmpfs</tspan></text>

  <!-- Right: options table -->
  <text x="466" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">주요 옵션</text>
  <rect x="466" y="88" width="354" height="170" fill="#111318" rx="6" stroke="#1e2433" stroke-width="1"/>

  <rect x="480" y="100" width="326" height="30" fill="#0f1a0f" rx="4"/>
  <text x="580" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">size=64m</text>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최대 크기 제한</text>

  <rect x="480" y="136" width="326" height="30" fill="#0f1625" rx="4"/>
  <text x="580" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">noexec</text>
  <text x="700" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실행 파일 금지</text>

  <rect x="480" y="172" width="326" height="30" fill="#0f1625" rx="4"/>
  <text x="580" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">nosuid</text>
  <text x="700" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">setuid 비트 무시</text>

  <rect x="480" y="208" width="326" height="30" fill="#0f1625" rx="4"/>
  <text x="580" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">rw / ro</text>
  <text x="700" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">읽기쓰기 / 읽기전용</text>

  <!-- Use cases -->
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">주요 사용 사례</text>
  <rect x="80" y="294" width="740" height="30" fill="#111318" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="200" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">세션 토큰</text>
  <text x="360" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">임시 캐시</text>
  <text x="500" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">소켓/PID 파일</text>
  <text x="660" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">암호화 키 임시 저장</text>
</svg>
