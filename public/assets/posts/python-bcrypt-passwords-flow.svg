<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="320" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="bc_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">비밀번호는 해시해서 저장한다</text>

  <!-- box 1 -->
  <rect x="60" y="110" width="200" height="90" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="146" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">평문 비밀번호</text>
  <text x="160" y="174" font-size="13" fill="#888" text-anchor="middle">hunter2</text>

  <!-- box 2 -->
  <rect x="340" y="110" width="200" height="90" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="146" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">bcrypt + salt</text>
  <text x="440" y="174" font-size="13" fill="#888" text-anchor="middle">느린 단방향 해시 (cost=12)</text>

  <!-- box 3 -->
  <rect x="620" y="110" width="200" height="90" rx="10" fill="#101a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="146" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">해시 문자열</text>
  <text x="720" y="174" font-size="13" fill="#888" text-anchor="middle">DB에 저장</text>

  <line x1="260" y1="155" x2="334" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#bc_arr)"/>
  <line x1="540" y1="155" x2="614" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#bc_arr)"/>

  <text x="440" y="252" font-size="13" fill="#9aa4b8" text-anchor="middle">salt가 매번 달라지므로, 같은 비밀번호라도 저장되는 해시는 서로 다르다</text>
  <text x="440" y="278" font-size="13" fill="#9aa4b8" text-anchor="middle">→ 미리 계산해 둔 레인보우 테이블 공격이 무력화된다</text>
</svg>
