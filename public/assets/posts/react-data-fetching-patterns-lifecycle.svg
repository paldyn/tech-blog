<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">데이터 페칭 라이프사이클</text>

  <!-- State 1: 초기 -->
  <rect x="60" y="80" width="160" height="64" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="140" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">컴포넌트 마운트</text>
  <text x="140" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">isLoading: true</text>

  <!-- Arrow right -->
  <line x1="220" y1="112" x2="298" y2="112" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- State 2: Fetching -->
  <rect x="300" y="80" width="160" height="64" rx="8" fill="#1a1a2a" stroke="#7777cc"/>
  <text x="380" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">네트워크 요청</text>
  <text x="380" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">fetch() 실행 중</text>

  <!-- Arrow to success -->
  <line x1="460" y1="100" x2="538" y2="80" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="495" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">성공</text>

  <!-- Arrow to error -->
  <line x1="460" y1="124" x2="538" y2="152" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="495" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">실패</text>

  <!-- State 3a: Success -->
  <rect x="540" y="60" width="160" height="64" rx="8" fill="#0a200a" stroke="#55c555"/>
  <text x="620" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">성공 상태</text>
  <text x="620" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">data: {...}</text>

  <!-- State 3b: Error -->
  <rect x="540" y="140" width="160" height="64" rx="8" fill="#200a0a" stroke="#e05555"/>
  <text x="620" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">에러 상태</text>
  <text x="620" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">error: Error</text>

  <!-- Retry arrow -->
  <path d="M 700 172 Q 760 200 760 112 Q 760 50 700 88" stroke="#e05555" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arr-red)"/>
  <text x="775" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">재시도</text>

  <!-- Re-fetch arrow from success -->
  <path d="M 620 60 Q 620 30 380 30 Q 140 30 140 80" stroke="#7ec8e3" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arr)"/>
  <text x="380" y="22" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">의존성 변경 시 재요청</text>

  <!-- Code section -->
  <rect x="60" y="240" width="760" height="208" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> useData(url) {</tspan></text>
  <text x="76" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [state, setState] = </tspan><tspan fill="#7ec8e3" font-weight="600">useState</tspan><tspan fill="#ffffff">({ data: </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">, isLoading: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">, error: </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff"> });</tspan></text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">useEffect</tspan><tspan fill="#ffffff">(() =&gt; {</tspan></text>
  <text x="76" y="319" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> controller = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> AbortController();</tspan></text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">setState</tspan><tspan fill="#ffffff">(s =&gt; ({ ...s, isLoading: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff"> }));</tspan></text>
  <text x="76" y="357" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">    fetch</tspan><tspan fill="#ffffff">(url, { signal: controller.signal })</tspan></text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">      .</tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan><tspan fill="#ffffff">(r =&gt; r.json()).then(data =&gt; setState({ data, isLoading: </tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff">, error: </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff"> }))</tspan></text>
  <text x="76" y="395" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">      .</tspan><tspan fill="#7ec8e3" font-weight="600">catch</tspan><tspan fill="#ffffff">(err =&gt; { </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (err.name !== </tspan><tspan fill="#ce9178">'AbortError'</tspan><tspan fill="#ffffff">) setState({ error: err, isLoading: </tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff">, data: </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff"> }); });</tspan></text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> () =&gt; controller.abort();</tspan></text>
  <text x="76" y="433" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  }, [url]);</tspan></text>
  <text x="76" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> state;</tspan></text>
</svg>
