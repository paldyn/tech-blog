<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">편향-분산 트레이드오프</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">모델 복잡도가 증가할수록 편향은 감소하고 분산은 증가한다</text>

  <!-- Axis -->
  <!-- X axis: x=80 to x=560, y=350 -->
  <line x1="80" y1="350" x2="560" y2="350" stroke="#555" stroke-width="1.5"/>
  <!-- Y axis: x=80, y=80 to y=350 -->
  <line x1="80" y1="80" x2="80" y2="350" stroke="#555" stroke-width="1.5"/>

  <!-- Axis arrows -->
  <polygon points="560,350 548,344 548,356" fill="#555"/>
  <polygon points="80,80 74,92 86,92" fill="#555"/>

  <!-- Axis labels -->
  <text x="320" y="380" text-anchor="middle" fill="#888" font-size="13">모델 복잡도 (Model Complexity)</text>
  <text x="44" y="220" text-anchor="middle" fill="#888" font-size="13" transform="rotate(-90, 44, 220)">오차 (Error)</text>

  <!-- Bias curve: high at left, low at right (decreasing) -->
  <!-- Points: (80,320) (140,290) (200,250) (260,210) (320,180) (380,160) (440,150) (500,145) (540,143) -->
  <polyline points="80,320 140,285 200,245 260,205 320,175 380,155 440,146 500,142 540,142"
    fill="none" stroke="#e07030" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Variance curve: low at left, high at right (increasing) -->
  <!-- Points: (80,340) (140,335) (200,328) (260,315) (320,295) (380,270) (440,240) (500,205) (540,185) -->
  <polyline points="80,342 140,338 200,332 260,318 320,298 380,272 440,242 500,207 540,188"
    fill="none" stroke="#7777cc" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Total error (bias² + variance + irreducible) -->
  <!-- Points approximately: bias²+variance at each x -->
  <!-- (80,308) (140,288) (200,258) (260,228) (320,205) (380,196) (440,198) (500,210) (540,225) -->
  <polyline points="80,310 140,288 200,258 260,227 320,203 380,194 440,196 500,210 540,226"
    fill="none" stroke="#7ec8e3" stroke-width="3" stroke-linejoin="round" stroke-dasharray="7,3"/>

  <!-- Irreducible noise line -->
  <line x1="80" y1="345" x2="540" y2="345" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Labels on curves -->
  <text x="552" y="148" fill="#e07030" font-size="12" font-weight="600">편향 (Bias)</text>
  <text x="552" y="192" fill="#7777cc" font-size="12" font-weight="600">분산 (Variance)</text>
  <text x="552" y="230" fill="#7ec8e3" font-size="12" font-weight="600">총 오차</text>
  <text x="552" y="350" fill="#555" font-size="11">환원 불가 오차</text>

  <!-- Optimal point marker -->
  <line x1="380" y1="90" x2="380" y2="350" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="380" y="106" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">최적점</text>

  <!-- Regions -->
  <text x="190" y="110" text-anchor="middle" fill="#e05555" font-size="12">과소적합 영역</text>
  <text x="190" y="126" text-anchor="middle" fill="#888" font-size="11">高 편향 / 低 분산</text>
  <text x="480" y="110" text-anchor="middle" fill="#e05555" font-size="12">과대적합 영역</text>
  <text x="480" y="126" text-anchor="middle" fill="#888" font-size="11">低 편향 / 高 분산</text>

  <!-- X axis ticks -->
  <text x="80" y="368" text-anchor="middle" fill="#555" font-size="10">단순</text>
  <text x="540" y="368" text-anchor="middle" fill="#555" font-size="10">복잡</text>

  <!-- Right panel: formulas -->
  <rect x="600" y="88" width="240" height="230" rx="8" fill="#111827" stroke="#333" stroke-width="1"/>
  <text x="720" y="112" text-anchor="middle" fill="#e8e8e8" font-size="14" font-weight="600">분해 공식</text>
  <text x="720" y="136" text-anchor="middle" fill="#888" font-size="11">총 오차 = 편향² + 분산 + ε</text>
  <line x1="616" y1="148" x2="824" y2="148" stroke="#333" stroke-width="1"/>
  <text x="616" y="168" fill="#e07030" font-size="12" font-weight="600">편향 (Bias²)</text>
  <text x="616" y="186" fill="#ccc" font-size="11">예측값과 정답의 평균 차이</text>
  <text x="616" y="204" fill="#ccc" font-size="11">단순 모델 → 높은 편향</text>
  <text x="616" y="222" fill="#ccc" font-size="11">가정이 잘못된 경우</text>
  <line x1="616" y1="234" x2="824" y2="234" stroke="#333" stroke-width="1"/>
  <text x="616" y="254" fill="#7777cc" font-size="12" font-weight="600">분산 (Variance)</text>
  <text x="616" y="272" fill="#ccc" font-size="11">훈련 데이터 변동에 민감도</text>
  <text x="616" y="290" fill="#ccc" font-size="11">복잡 모델 → 높은 분산</text>
  <text x="616" y="308" fill="#ccc" font-size="11">노이즈까지 학습한 경우</text>

  <!-- Footer -->
  <text x="440" y="428" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
