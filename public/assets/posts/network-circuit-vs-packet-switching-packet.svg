<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Store-and-Forward 패킷 전달</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">각 라우터는 패킷을 전부 수신한 후 다음 홉으로 전달 — 지연이 홉마다 누적</text>

  <defs>
    <marker id="pa1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Nodes -->
  <rect x="60" y="180" width="100" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="110" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">호스트 A</text>
  <text x="110" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">송신자</text>

  <circle cx="280" cy="205" r="30" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="280" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle" font-weight="600">R1</text>
  <text x="280" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">라우터</text>

  <circle cx="460" cy="205" r="30" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="460" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle" font-weight="600">R2</text>
  <text x="460" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">라우터</text>

  <circle cx="640" cy="205" r="30" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle" font-weight="600">R3</text>
  <text x="640" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">라우터</text>

  <rect x="720" y="180" width="100" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">호스트 B</text>
  <text x="770" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">수신자</text>

  <!-- Links -->
  <line x1="160" y1="205" x2="250" y2="205" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pa1)"/>
  <line x1="310" y1="205" x2="430" y2="205" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pa1)"/>
  <line x1="490" y1="205" x2="610" y2="205" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pa1)"/>
  <line x1="670" y1="205" x2="720" y2="205" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pa1)"/>

  <!-- Link labels -->
  <text x="205" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">1 Gbps</text>
  <text x="370" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">100 Mbps</text>
  <text x="550" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">1 Gbps</text>
  <text x="695" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">1 Gbps</text>

  <!-- Delay annotation -->
  <text x="370" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">병목: 100Mbps → 큐 대기 지연 발생</text>

  <!-- Packet components box -->
  <rect x="60" y="290" width="760" height="126" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" font-weight="600">패킷 지연 4가지 요소</text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">전파 지연</text>
  <text x="200" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">= 거리 / 광속 (수십~수백 ms, 물리적 한계)</text>
  <text x="80" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">전송 지연</text>
  <text x="200" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">= 패킷 크기 / 대역폭 (큰 파일일수록 느림)</text>
  <text x="80" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">처리 지연</text>
  <text x="200" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">= 라우터 헤더 분석 시간 (보통 무시 가능)</text>
  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">큐 지연  </text>
  <text x="200" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">= 버퍼 대기 시간 (트래픽 폭증 시 급증)</text>
</svg>
