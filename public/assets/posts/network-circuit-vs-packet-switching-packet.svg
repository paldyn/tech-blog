<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">패킷 교환: Store-and-Forward 동작 원리</text>

  <!-- Timeline: 3 routers, 3 time slots -->
  <text x="100" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">노드</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">시간 흐름 →</text>

  <!-- Node labels -->
  <text x="100" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">송신자</text>
  <text x="100" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a55c" text-anchor="middle">라우터1</text>
  <text x="100" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a55c" text-anchor="middle">라우터2</text>
  <text x="100" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">수신자</text>

  <!-- Horizontal timeline lines -->
  <line x1="150" y1="118" x2="820" y2="118" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="150" y1="188" x2="820" y2="188" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="150" y1="258" x2="820" y2="258" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="150" y1="328" x2="820" y2="328" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Time slots: packet 1 travels -->
  <!-- t=0: Sender sends P1 -->
  <rect x="160" y="104" width="120" height="28" rx="4" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">P1 전송</text>

  <!-- t=1: R1 receives and stores P1, Sender sends P2 -->
  <rect x="300" y="174" width="120" height="28" rx="4" fill="#1a1200" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="360" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a55c" text-anchor="middle">P1 수신/전달</text>
  <rect x="300" y="104" width="120" height="28" rx="4" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="360" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">P2 전송</text>

  <!-- t=2: R2 receives P1, R1 receives P2, Sender sends P3 -->
  <rect x="440" y="244" width="120" height="28" rx="4" fill="#0d2016" stroke="#55c555" stroke-width="1.5"/>
  <text x="500" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">P1 수신/전달</text>
  <rect x="440" y="174" width="120" height="28" rx="4" fill="#1a1200" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="500" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a55c" text-anchor="middle">P2 수신/전달</text>
  <rect x="440" y="104" width="120" height="28" rx="4" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="500" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">P3 전송</text>

  <!-- t=3: Receiver gets P1 -->
  <rect x="580" y="314" width="120" height="28" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">P1 도착</text>
  <rect x="580" y="244" width="120" height="28" rx="4" fill="#0d2016" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">P2 수신/전달</text>
  <rect x="580" y="174" width="120" height="28" rx="4" fill="#1a1200" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="640" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a55c" text-anchor="middle">P3 수신/전달</text>

  <!-- Time axis labels -->
  <text x="220" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">t=0</text>
  <text x="360" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">t=1</text>
  <text x="500" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">t=2</text>
  <text x="640" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">t=3</text>

  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">파이프라인 방식: 여러 패킷이 동시에 네트워크를 통과</text>
</svg>
