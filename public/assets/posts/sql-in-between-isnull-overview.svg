<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">IN · BETWEEN · IS NULL 시각적 정리</text>

  <!-- IN section -->
  <rect x="60" y="66" width="230" height="120" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">IN</text>
  <text x="175" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">이산 값 목록 중 하나</text>
  <!-- Number line for IN -->
  <line x1="80" y1="140" x2="270" y2="140" stroke="#444" stroke-width="1.5"/>
  <circle cx="100" cy="140" r="5" fill="#444"/>
  <circle cx="130" cy="140" r="5" fill="#444"/>
  <circle cx="160" cy="140" r="7" fill="#7ec8e3"/>
  <circle cx="190" cy="140" r="5" fill="#444"/>
  <circle cx="220" cy="140" r="7" fill="#7ec8e3"/>
  <circle cx="250" cy="140" r="5" fill="#444"/>
  <text x="160" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">KR</text>
  <text x="220" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">US</text>

  <!-- BETWEEN section -->
  <rect x="320" y="66" width="240" height="120" rx="8" fill="#0a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle" xml:space="preserve">BETWEEN a AND b</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">a 이상 b 이하 (양쪽 포함)</text>
  <!-- Range visualization -->
  <line x1="340" y1="140" x2="540" y2="140" stroke="#444" stroke-width="1.5"/>
  <line x1="380" y1="134" x2="500" y2="134" stroke="#7777cc" stroke-width="5"/>
  <circle cx="380" cy="140" r="7" fill="#7777cc"/>
  <circle cx="500" cy="140" r="7" fill="#7777cc"/>
  <text x="380" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle" xml:space="preserve">80 ≤</text>
  <text x="500" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle" xml:space="preserve">≤ 100</text>

  <!-- IS NULL section -->
  <rect x="590" y="66" width="230" height="120" rx="8" fill="#0a1020" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle" xml:space="preserve">IS NULL</text>
  <text x="705" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">값이 없는 행 선택</text>
  <!-- NULL visualization -->
  <rect x="640" y="128" width="40" height="24" rx="4" fill="#1a0a0a" stroke="#888"/>
  <text x="660" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">NULL</text>
  <rect x="695" y="128" width="40" height="24" rx="4" fill="#0a1a0a" stroke="#55c555"/>
  <text x="715" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle" xml:space="preserve">NULL</text>
  <rect x="750" y="128" width="40" height="24" rx="4" fill="#1a0a0a" stroke="#888"/>
  <text x="770" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">NULL</text>
  <text x="705" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle" xml:space="preserve">가운데 행만 선택</text>

  <!-- Code block -->
  <rect x="60" y="210" width="760" height="230" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- IN: OR의 축약 (동작 동일)</text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> country </text>
  <text x="196" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">IN</text>
  <text x="216" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (</text>
  <text x="228" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'KR'</text>
  <text x="264" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, </text>
  <text x="280" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'US'</text>
  <text x="316" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, </text>
  <text x="332" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'JP'</text>
  <text x="368" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>

  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- IN (서브쿼리)</text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> dept_id </text>
  <text x="196" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">IN</text>
  <text x="216" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (</text>
  <text x="228" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="280" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> id </text>
  <text x="308" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="344" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> departments</text>
  <text x="456" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve"> WHERE</text>
  <text x="504" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> active)</text>

  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- BETWEEN: 양쪽 경계 포함 (a &lt;= col &lt;= b)</text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> score </text>
  <text x="172" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">BETWEEN</text>
  <text x="240" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve"> 80</text>
  <text x="264" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve"> AND</text>
  <text x="300" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve"> 100</text>

  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- IS NULL / IS NOT NULL (COALESCE 대안)</text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> manager_id </text>
  <text x="220" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">IS NULL</text>
  <text x="278" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">    -- 최상위 관리자</text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> deleted_at </text>
  <text x="216" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">IS NOT NULL</text>
  <text x="298" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"> -- 삭제된 행만</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- NOT IN + NULL 주의: 서브쿼리에 NULL 있으면 0행</text>

  <!-- Footer -->
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle" xml:space="preserve">PALDYN — SQL 완전 정복</text>
</svg>
