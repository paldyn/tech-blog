<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 보안 계층 — 심층 방어(Defense in Depth)</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">각 계층이 독립적으로 방어선을 형성한다</text>

  <!-- Layer 1: Platform / JVM -->
  <rect x="80" y="98" width="720" height="62" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="104" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">플랫폼 계층 · JVM</text>
  <text x="104" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">바이트코드 검증 · 클래스 로더 격리 · 타입 안전성 · 자동 메모리 관리</text>

  <!-- Layer 2: Crypto -->
  <rect x="80" y="172" width="720" height="62" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="104" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">암호화 계층 · JCA / JSSE</text>
  <text x="104" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">해시 · 대칭/비대칭 암호 · 전자서명 · TLS · KeyStore</text>

  <!-- Layer 3: Input / Data -->
  <rect x="80" y="246" width="720" height="62" rx="8" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="104" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e0b055">입력·데이터 계층</text>
  <text x="104" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">입력 검증 · 파라미터 바인딩 · 역직렬화 필터 · 출력 인코딩</text>

  <!-- Layer 4: Application / Auth -->
  <rect x="80" y="320" width="720" height="62" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="104" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">애플리케이션 계층</text>
  <text x="104" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">인증 · 인가 · 세션/토큰 · 접근 제어 · 감사 로그</text>

  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">한 계층이 뚫려도 나머지 계층이 공격을 저지한다 — 단일 실패점을 만들지 않는 것이 핵심</text>
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">이번 시리즈는 위 4개 계층을 하나씩 다룬다</text>
</svg>
