<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ss / netstat 자주 쓰는 명령어 치트시트</text>

  <!-- ss commands -->
  <text x="50" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">ss 명령어</text>

  <rect x="50" y="94" width="780" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># ESTABLISHED TCP 연결만 보기</text>
  <text x="70" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">ss</tspan> -tnp state established</text>
  <text x="70" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 포트에 대한 연결 수 세기</text>
  <text x="70" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">ss</tspan> -tn dport :80 | wc -l</text>
  <text x="70" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 소켓 상세 통계 (RTT, 윈도우 크기 포함)</text>
  <text x="70" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">ss</tspan> -tei state established</text>

  <!-- netstat commands -->
  <text x="50" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a055">netstat 명령어 (레거시, 여전히 많이 사용)</text>

  <rect x="50" y="282" width="780" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 모든 TCP/UDP 연결 + 프로세스 (숫자 IP)</text>
  <text x="70" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#e0a055" font-weight="600">netstat</tspan> -tunap</text>
  <text x="70" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 라우팅 테이블 확인</text>
  <text x="70" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#e0a055" font-weight="600">netstat</tspan> -rn</text>
  <text x="70" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 연결 상태별 수 집계</text>
  <text x="70" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#e0a055" font-weight="600">netstat</tspan> -an | awk '{print $6}' | sort | uniq -c | sort -rn</text>

  <!-- Note -->
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">netstat은 net-tools 패키지 — 최신 배포판에 기본 미포함. ss는 iproute2에 포함(항상 사용 가능)</text>
</svg>
