<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useRef vs useState — 언제 무엇을 쓸까</text>

  <!-- Column headers -->
  <rect x="60" y="68" width="360" height="38" rx="6" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">useRef</text>

  <rect x="460" y="68" width="360" height="38" rx="6" fill="#1a2e0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">useState</text>

  <!-- Row 1 -->
  <rect x="60" y="120" width="360" height="44" rx="4" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경 시 동작</text>
  <text x="80" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">리렌더 트리거 없음</text>

  <rect x="460" y="120" width="360" height="44" rx="4" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="480" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경 시 동작</text>
  <text x="480" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">리렌더 트리거함</text>

  <!-- Row 2 -->
  <rect x="60" y="178" width="360" height="44" rx="4" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">렌더 중 읽기/쓰기</text>
  <text x="80" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">금지 (렌더 중 .current 접근 X)</text>

  <rect x="460" y="178" width="360" height="44" rx="4" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="480" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">렌더 중 읽기/쓰기</text>
  <text x="480" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">안전 (렌더 함수에서 자유롭게 사용)</text>

  <!-- Row 3 -->
  <rect x="60" y="236" width="360" height="44" rx="4" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="80" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주요 용도</text>
  <text x="80" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">DOM 접근, 타이머 ID, 이전 값 저장</text>

  <rect x="460" y="236" width="360" height="44" rx="4" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="480" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주요 용도</text>
  <text x="480" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">UI에 표시되는 모든 값</text>

  <!-- Bottom note -->
  <rect x="60" y="298" width="760" height="42" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">
    <tspan font-weight="600" fill="#e8e8e8">선택 기준:</tspan>
    <tspan> 화면에 표시되는 값 → useState / 화면에 영향 없는 값 → useRef</tspan>
  </text>
  <text x="440" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">useRef.current는 JavaScript 일반 객체 프로퍼티 — React가 추적하지 않는다</text>
</svg>
