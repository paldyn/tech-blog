<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#444"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="700">실행 컨텍스트 스택 (Call Stack)</text>
  <text x="440" y="66" text-anchor="middle" fill="#666" font-size="12">함수가 호출될 때마다 새 실행 컨텍스트가 스택에 쌓인다</text>

  <!-- Step labels (row 1) -->
  <text x="100"  y="104" text-anchor="middle" fill="#888" font-size="12">① 시작</text>
  <text x="256"  y="104" text-anchor="middle" fill="#888" font-size="12">② foo() 호출</text>
  <text x="412"  y="104" text-anchor="middle" fill="#888" font-size="12">③ bar() 호출</text>
  <text x="568"  y="104" text-anchor="middle" fill="#888" font-size="12">④ bar() 반환</text>
  <text x="724"  y="104" text-anchor="middle" fill="#888" font-size="12">⑤ foo() 반환</text>

  <!-- Step 3 has bar() at top -->
  <rect x="356" y="124" width="112" height="34" rx="6" fill="#2a1414" stroke="#aa4a4a" stroke-width="1.5"/>
  <text x="412" y="146" text-anchor="middle" fill="#dd8080" font-size="12" font-weight="600">bar() 컨텍스트</text>
  <text x="478" y="146" font-size="11" fill="#777">← TOP</text>

  <!-- Step 4: bar() removed (faded box) -->
  <rect x="512" y="124" width="112" height="34" rx="6" fill="none" stroke="#3a2020" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="568" y="146" text-anchor="middle" fill="#553333" font-size="11">bar() 제거됨</text>

  <!-- foo() row at y=176 (shown in steps 2,3,4) -->
  <rect x="200" y="176" width="112" height="34" rx="6" fill="#142a18" stroke="#4a8a5a" stroke-width="1.5"/>
  <text x="256" y="198" text-anchor="middle" fill="#88dd99" font-size="12" font-weight="600">foo() 컨텍스트</text>

  <rect x="356" y="176" width="112" height="34" rx="6" fill="#142a18" stroke="#4a8a5a" stroke-width="1.5"/>
  <text x="412" y="198" text-anchor="middle" fill="#88dd99" font-size="12" font-weight="600">foo() 컨텍스트</text>

  <rect x="512" y="176" width="112" height="34" rx="6" fill="#142a18" stroke="#4a8a5a" stroke-width="1.5"/>
  <text x="568" y="198" text-anchor="middle" fill="#88dd99" font-size="12" font-weight="600">foo() 컨텍스트</text>

  <!-- Step 5: foo() removed (faded box) -->
  <rect x="668" y="176" width="112" height="34" rx="6" fill="none" stroke="#1f3a25" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="724" y="198" text-anchor="middle" fill="#3a5544" font-size="11">foo() 제거됨</text>

  <!-- Global context bottom row at y=228 (always present) -->
  <rect x="44"  y="228" width="112" height="34" rx="6" fill="#181a2c" stroke="#3a4070" stroke-width="1.5"/>
  <text x="100" y="250" text-anchor="middle" fill="#aabbdd" font-size="12" font-weight="600">전역 컨텍스트</text>

  <rect x="200" y="228" width="112" height="34" rx="6" fill="#181a2c" stroke="#3a4070" stroke-width="1.5"/>
  <text x="256" y="250" text-anchor="middle" fill="#aabbdd" font-size="12" font-weight="600">전역 컨텍스트</text>

  <rect x="356" y="228" width="112" height="34" rx="6" fill="#181a2c" stroke="#3a4070" stroke-width="1.5"/>
  <text x="412" y="250" text-anchor="middle" fill="#aabbdd" font-size="12" font-weight="600">전역 컨텍스트</text>

  <rect x="512" y="228" width="112" height="34" rx="6" fill="#181a2c" stroke="#3a4070" stroke-width="1.5"/>
  <text x="568" y="250" text-anchor="middle" fill="#aabbdd" font-size="12" font-weight="600">전역 컨텍스트</text>

  <rect x="668" y="228" width="112" height="34" rx="6" fill="#181a2c" stroke="#3a4070" stroke-width="1.5"/>
  <text x="724" y="250" text-anchor="middle" fill="#aabbdd" font-size="12" font-weight="600">전역 컨텍스트</text>

  <!-- Stack base line -->
  <line x1="44" y1="280" x2="780" y2="280" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="412" y="300" text-anchor="middle" fill="#555" font-size="11">스택 베이스</text>

  <!-- Step transition arrows -->
  <line x1="158" y1="246" x2="198" y2="246" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="314" y1="246" x2="354" y2="246" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="470" y1="246" x2="510" y2="246" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="626" y1="246" x2="666" y2="246" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Footer note -->
  <text x="440" y="380" text-anchor="middle" fill="#666" font-size="12">각 컨텍스트는 Variable Environment · Lexical Environment · this 바인딩을 포함</text>
  <text x="440" y="412" text-anchor="middle" fill="#444" font-size="11">함수가 끝나면 LIFO(Last-In-First-Out) 순서로 스택에서 제거된다</text>
</svg>
