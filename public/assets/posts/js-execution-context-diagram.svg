<svg width="880" height="520" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="700">실행 컨텍스트 스택 (Call Stack)</text>
  <text x="440" y="68" text-anchor="middle" fill="#555" font-size="13">함수가 호출될 때마다 새 실행 컨텍스트가 스택에 쌓인다</text>

  <!-- Step labels -->
  <text x="100" y="108" text-anchor="middle" fill="#888" font-size="12">① 시작</text>
  <text x="280" y="108" text-anchor="middle" fill="#888" font-size="12">② foo() 호출</text>
  <text x="460" y="108" text-anchor="middle" fill="#888" font-size="12">③ bar() 호출</text>
  <text x="640" y="108" text-anchor="middle" fill="#888" font-size="12">④ bar() 반환</text>
  <text x="780" y="108" text-anchor="middle" fill="#888" font-size="12">⑤ foo() 반환</text>

  <!-- Step 1: Global only -->
  <rect x="40" y="380" width="120" height="44" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="100" y="407" text-anchor="middle" fill="#8888cc" font-size="12" font-weight="600">전역 컨텍스트</text>

  <!-- Step 2: Global + foo -->
  <rect x="220" y="380" width="120" height="44" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="280" y="407" text-anchor="middle" fill="#8888cc" font-size="12" font-weight="600">전역 컨텍스트</text>
  <rect x="220" y="320" width="120" height="44" rx="8" fill="#1e2e1e" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="280" y="347" text-anchor="middle" fill="#88cc88" font-size="12" font-weight="600">foo() 컨텍스트</text>

  <!-- Step 3: Global + foo + bar -->
  <rect x="400" y="380" width="120" height="44" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="460" y="407" text-anchor="middle" fill="#8888cc" font-size="12" font-weight="600">전역 컨텍스트</text>
  <rect x="400" y="320" width="120" height="44" rx="8" fill="#1e2e1e" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="460" y="347" text-anchor="middle" fill="#88cc88" font-size="12" font-weight="600">foo() 컨텍스트</text>
  <rect x="400" y="258" width="120" height="44" rx="8" fill="#2e1e1e" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="460" y="285" text-anchor="middle" fill="#cc8888" font-size="12" font-weight="600">bar() 컨텍스트</text>
  <!-- "TOP" label -->
  <text x="540" y="278" fill="#cc8888" font-size="11">← TOP</text>

  <!-- Step 4: Global + foo (bar popped) -->
  <rect x="580" y="380" width="120" height="44" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="640" y="407" text-anchor="middle" fill="#8888cc" font-size="12" font-weight="600">전역 컨텍스트</text>
  <rect x="580" y="320" width="120" height="44" rx="8" fill="#1e2e1e" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="640" y="347" text-anchor="middle" fill="#88cc88" font-size="12" font-weight="600">foo() 컨텍스트</text>
  <!-- dashed ghost of bar -->
  <rect x="580" y="258" width="120" height="44" rx="8" fill="none" stroke="#6e3a3a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="640" y="285" text-anchor="middle" fill="#555" font-size="12">bar() — 제거됨</text>

  <!-- Step 5: Global only (foo popped) -->
  <rect x="720" y="380" width="120" height="44" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="780" y="407" text-anchor="middle" fill="#8888cc" font-size="12" font-weight="600">전역 컨텍스트</text>
  <rect x="720" y="320" width="120" height="44" rx="8" fill="none" stroke="#3a6e3a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="780" y="347" text-anchor="middle" fill="#555" font-size="12">foo() — 제거됨</text>

  <!-- Stack base line -->
  <line x1="40" y1="430" x2="840" y2="430" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="450" text-anchor="middle" fill="#444" font-size="11">스택 베이스</text>

  <!-- Arrows between steps -->
  <text x="190" y="395" text-anchor="middle" fill="#666" font-size="18">→</text>
  <text x="370" y="395" text-anchor="middle" fill="#666" font-size="18">→</text>
  <text x="550" y="395" text-anchor="middle" fill="#666" font-size="18">→</text>
  <text x="710" y="395" text-anchor="middle" fill="#666" font-size="18">→</text>

  <!-- Legend: EC components -->
  <text x="440" y="490" text-anchor="middle" fill="#444" font-size="12">각 컨텍스트는 Variable Environment · Lexical Environment · this 바인딩 을 포함합니다</text>
</svg>
