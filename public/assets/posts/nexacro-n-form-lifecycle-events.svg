<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Form 생명주기 이벤트 순서</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">로드 → 활성 → 비활성 → 언로드</text>

  <!-- Phase 1: Load -->
  <rect x="60" y="92" width="220" height="36" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">① 로드 단계</text>

  <!-- Load events -->
  <rect x="60" y="138" width="220" height="38" rx="5" fill="#111" stroke="#3a5a3a" stroke-width="1.5"/>
  <text x="170" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#a8e0a8" text-anchor="middle">oncreate</text>

  <line x1="170" y1="176" x2="170" y2="188" stroke="#3a5a3a" stroke-width="1.5"/>
  <polygon points="170,194 165,184 175,184" fill="#3a5a3a"/>
  <rect x="60" y="196" width="220" height="38" rx="5" fill="#111" stroke="#3a5a3a" stroke-width="1.5"/>
  <text x="170" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#a8e0a8" text-anchor="middle">onprecreate</text>

  <line x1="170" y1="234" x2="170" y2="246" stroke="#3a5a3a" stroke-width="1.5"/>
  <polygon points="170,252 165,242 175,242" fill="#3a5a3a"/>
  <rect x="60" y="254" width="220" height="38" rx="5" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">onload  ★ 핵심</text>

  <line x1="170" y1="292" x2="170" y2="304" stroke="#3a5a3a" stroke-width="1.5"/>
  <polygon points="170,310 165,300 175,300" fill="#3a5a3a"/>
  <rect x="60" y="312" width="220" height="38" rx="5" fill="#111" stroke="#3a5a3a" stroke-width="1.5"/>
  <text x="170" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#a8e0a8" text-anchor="middle">onloaded</text>

  <!-- Phase 2: Active -->
  <rect x="330" y="92" width="220" height="36" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">② 활성 단계</text>

  <rect x="330" y="138" width="220" height="38" rx="5" fill="#111" stroke="#2a4a5a" stroke-width="1.5"/>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">onactivate</text>

  <line x1="440" y1="176" x2="440" y2="188" stroke="#2a4a5a" stroke-width="1.5"/>
  <polygon points="440,194 435,184 445,184" fill="#2a4a5a"/>
  <rect x="330" y="196" width="220" height="38" rx="5" fill="#111" stroke="#2a4a5a" stroke-width="1.5"/>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">onmove / onsize</text>

  <line x1="440" y1="234" x2="440" y2="246" stroke="#2a4a5a" stroke-width="1.5"/>
  <polygon points="440,252 435,242 445,242" fill="#2a4a5a"/>
  <rect x="330" y="254" width="220" height="38" rx="5" fill="#111" stroke="#2a4a5a" stroke-width="1.5"/>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">onkeydown / onclick</text>

  <line x1="440" y1="292" x2="440" y2="304" stroke="#2a4a5a" stroke-width="1.5"/>
  <polygon points="440,310 435,300 445,300" fill="#2a4a5a"/>
  <rect x="330" y="312" width="220" height="38" rx="5" fill="#111" stroke="#2a4a5a" stroke-width="1.5"/>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">ondeactivate</text>

  <!-- Phase 3: Unload -->
  <rect x="600" y="92" width="220" height="36" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="710" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">③ 언로드 단계</text>

  <rect x="600" y="138" width="220" height="38" rx="5" fill="#111" stroke="#5a2a2a" stroke-width="1.5"/>
  <text x="710" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e09090" text-anchor="middle">onbeforeunload</text>

  <line x1="710" y1="176" x2="710" y2="188" stroke="#5a2a2a" stroke-width="1.5"/>
  <polygon points="710,194 705,184 715,184" fill="#5a2a2a"/>
  <rect x="600" y="196" width="220" height="38" rx="5" fill="#200d0d" stroke="#e05555" stroke-width="2"/>
  <text x="710" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">onunload  ★ 핵심</text>

  <line x1="710" y1="234" x2="710" y2="246" stroke="#5a2a2a" stroke-width="1.5"/>
  <polygon points="710,252 705,242 715,242" fill="#5a2a2a"/>
  <rect x="600" y="254" width="220" height="38" rx="5" fill="#111" stroke="#5a2a2a" stroke-width="1.5"/>
  <text x="710" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e09090" text-anchor="middle">ondestroy</text>

  <!-- Separator -->
  <line x1="60" y1="380" x2="820" y2="380" stroke="#222" stroke-width="1"/>

  <!-- Summary labels -->
  <text x="170" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">초기 데이터 조회</text>
  <text x="170" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">onload에서 fn_search()</text>

  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">사용자 인터랙션 처리</text>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">클릭·키 이벤트 핸들러</text>

  <text x="710" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">리소스 정리</text>
  <text x="710" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">타이머·이벤트 해제</text>

  <!-- Footer -->
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>

  <!-- Note: save check before unload -->
  <rect x="60" y="454" width="760" height="80" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c84a" font-weight="600">onbeforeunload 활용 팁</text>
  <text x="80" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">저장되지 않은 변경사항이 있을 때 이 이벤트에서 사용자에게 확인 다이얼로그를 띄울 수 있습니다.</text>
  <text x="80" y="514" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">return false를 반환하면 화면 전환이 취소됩니다.</text>

  <!-- Footer -->
  <text x="440" y="548" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
