<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a855"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">에이전트 리플렉션 루프</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Generator → Critic → Reviser 반복으로 결과물을 점진적으로 개선</text>

  <!-- Generator -->
  <rect x="60" y="100" width="200" height="80" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Generator</text>
  <text x="160" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">초안 생성</text>
  <text x="160" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">도구 사용 포함</text>

  <!-- Arrow to Critic -->
  <line x1="260" y1="140" x2="338" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="299" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">draft</text>

  <!-- Critic -->
  <rect x="340" y="100" width="200" height="80" rx="8" fill="#2a1a0a" stroke="#e0a855" stroke-width="2"/>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e0a855">Critic</text>
  <text x="440" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">초안 평가·채점</text>
  <text x="440" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">개선점 제시</text>

  <!-- Critic → approve or revise -->
  <!-- Approve path (right) -->
  <line x1="540" y1="128" x2="618" y2="128" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="579" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">승인</text>

  <rect x="620" y="100" width="200" height="56" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">최종 결과물</text>
  <text x="720" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">품질 기준 충족</text>

  <!-- Revise path (down) -->
  <line x1="440" y1="180" x2="440" y2="230" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="456" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a855">수정 필요</text>

  <!-- Reviser -->
  <rect x="340" y="232" width="200" height="80" rx="8" fill="#1a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">Reviser</text>
  <text x="440" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">피드백 기반 개선</text>
  <text x="440" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">새 버전 생성</text>

  <!-- Reviser → back to critic -->
  <path d="M 340 272 Q 200 272 200 200 Q 200 140 260 140" stroke="#7777cc"
        stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr)"/>
  <text x="165" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">개선된 버전</text>
  <text x="165" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">→ 재평가</text>

  <!-- Iteration counter -->
  <rect x="620" y="230" width="200" height="80" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="720" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">반복 조건</text>
  <text x="720" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">score ≥ threshold → 승인</text>
  <text x="720" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">max_iterations 초과 → 강제 종료</text>
  <text x="720" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">human approval → 종료</text>

  <!-- Patterns list -->
  <rect x="60" y="360" width="760" height="96" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 리플렉션의 주요 변형</text>
  <text x="80" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Self-Reflection:</text>
  <text x="80" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                  동일 에이전트가 생성 후 자기 평가 (1개 LLM)</text>
  <text x="80" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Multi-Agent:</text>
  <text x="80" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">              Generator + Critic + Reviser 분리 (3개 LLM)</text>
  <text x="80" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Reflexion:</text>
  <text x="80" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">            실패 후 에피소딕 메모리에 반성 저장, 다음 시도에 활용</text>
  <text x="80" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Self-Debug:</text>
  <text x="80" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">             코드 실행 오류 → 스스로 디버깅 후 재실행</text>
</svg>
