<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 330" width="880">
  <rect width="880" height="330" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Squash Merge 전체 워크플로</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">병합 후 브랜치 삭제까지</text>

  <!-- Code block -->
  <rect x="60" y="84" width="760" height="216" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 1. main으로 이동</text>
  <text x="80" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git</text>
  <text x="122" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">switch main</text>

  <text x="80" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 2. squash merge (변경사항을 스테이지에 모음 — 커밋하지 않음)</text>
  <text x="80" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git</text>
  <text x="122" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">merge --squash feature</text>

  <text x="80" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 3. 커밋 메시지 작성 후 커밋 (이 단계를 반드시 수행)</text>
  <text x="80" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git</text>
  <text x="122" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">commit -m </text>
  <text x="235" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"feat: 사용자 프로필 기능 추가"</text>

  <text x="80" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 4. feature 브랜치 삭제 (squash는 머지 관계 없음 → -D 필요)</text>
  <text x="80" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git</text>
  <text x="122" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">branch -D feature</text>

  <text x="80" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555"># 주의: -d 는 "merged?" 체크로 실패 — squash는 머지 커밋이 없으므로 -D 사용</text>
</svg>
