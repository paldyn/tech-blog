<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">팝업 차단 해결 패턴</text>

  <!-- Pattern 1 -->
  <rect x="60" y="62" width="370" height="150" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">패턴 A: 트랜잭션 완료 후 팝업 플래그</text>

  <rect x="72" y="96" width="346" height="104" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 버튼 클릭 핸들러 (직접 액션)</text>
  <text x="88" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text>
  <text x="152" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> fn_btnPopup_onclick() {</text>
  <text x="88" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    gv_pendingPopup = </text>
  <text x="296" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">true</text>
  <text x="323" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">;</text>
  <text x="88" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    </text>
  <text x="88" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    this</text>
  <text x="131" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">.transaction(</text>
  <text x="222" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"svcCheck"</text>
  <text x="289" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, ...);</text>
  <text x="88" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Pattern 1 callback -->
  <text x="245" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">콜백에서 플래그만 처리 → 직접 클릭 없이는 팝업 불가</text>

  <!-- Pattern 2 -->
  <rect x="450" y="62" width="370" height="150" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">패턴 B: openPopup을 직접 액션에서 호출</text>

  <rect x="462" y="96" width="346" height="104" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="478" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 팝업 인자 사전 준비 후 직접 오픈</text>
  <text x="478" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text>
  <text x="542" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> fn_openDirect(args) {</text>
  <text x="478" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">    // args: 이미 준비된 데이터</text>
  <text x="478" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    this</text>
  <text x="521" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">.openPopup(</text>
  <text x="605" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"popForm"</text>
  <text x="664" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, args);</text>
  <text x="478" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <text x="635" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클릭 이벤트 안에서 openPopup 호출 → 차단 없음</text>

  <!-- Common cases table -->
  <rect x="60" y="250" width="760" height="116" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">자주 발생하는 차단 케이스</text>

  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗</text>
  <text x="96" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">트랜잭션 콜백에서 openPopup 호출</text>
  <text x="400" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗</text>
  <text x="416" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">setTimeout / setInterval 콜백에서 호출</text>

  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗</text>
  <text x="96" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">페이지 로드(onload)에서 자동 팝업</text>
  <text x="400" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗</text>
  <text x="416" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">키보드 이벤트가 아닌 프로그래밍 이벤트에서 호출</text>

  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓</text>
  <text x="96" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">버튼·링크·키보드 단축키 직접 액션에서만 호출</text>
  <text x="400" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓</text>
  <text x="416" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">팝업 허용 도메인 등록(부득이한 경우)으로 우회</text>

  <text x="440" y="385" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">팝업 차단은 브라우저 보안 정책 — Nexacro 버그가 아닌 설계 변경으로 해결한다</text>
</svg>
