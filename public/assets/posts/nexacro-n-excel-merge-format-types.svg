<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">엑셀 병합·서식 처리 유형</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">POI CellRangeAddress / CellStyle 활용</text>

  <!-- Merge example -->
  <rect x="60" y="96" width="340" height="320" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">셀 병합</text>

  <!-- Table with merge visual -->
  <rect x="80" y="132" width="300" height="24" rx="0" fill="#0a1a2a"/>
  <text x="230" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">월별 매출 현황 (병합 헤더)</text>

  <rect x="80" y="158" width="100" height="24" rx="0" fill="#1e2433"/>
  <text x="130" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">부서</text>
  <rect x="180" y="158" width="200" height="24" rx="0" fill="#1a1a2e"/>
  <text x="280" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">1분기 (병합 3셀)</text>

  <rect x="80" y="184" width="100" height="20" rx="0" fill="#1e2433"/>
  <text x="130" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">—</text>
  <rect x="180" y="184" width="66" height="20" rx="0" fill="#111827"/>
  <text x="213" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">1월</text>
  <rect x="247" y="184" width="66" height="20" rx="0" fill="#111827"/>
  <text x="280" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2월</text>
  <rect x="314" y="184" width="66" height="20" rx="0" fill="#111827"/>
  <text x="347" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">3월</text>

  <rect x="80" y="206" width="100" height="20" rx="0" fill="#0a2010"/>
  <text x="130" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">영업1팀</text>
  <rect x="180" y="206" width="66" height="20" rx="0" fill="#111827"/>
  <text x="213" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">1,200</text>
  <rect x="247" y="206" width="66" height="20" rx="0" fill="#111827"/>
  <text x="280" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">1,450</text>
  <rect x="314" y="206" width="66" height="20" rx="0" fill="#111827"/>
  <text x="347" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">1,380</text>

  <text x="230" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">sheet.addMergedRegion(</text>
  <text x="230" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">  new CellRangeAddress(</text>
  <text x="230" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    rowStart, rowEnd,</text>
  <text x="230" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    colStart, colEnd</text>
  <text x="230" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">  )</text>
  <text x="230" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">)</text>

  <!-- Format example -->
  <rect x="480" y="96" width="340" height="320" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">셀 서식</text>

  <rect x="500" y="132" width="300" height="40" rx="4" fill="#0a2010"/>
  <text x="650" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">숫자 포맷</text>
  <text x="650" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"#,##0" → 1,234,567</text>

  <rect x="500" y="180" width="300" height="40" rx="4" fill="#0a1a2a"/>
  <text x="650" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">날짜 포맷</text>
  <text x="650" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"yyyy-mm-dd" → 2026-05-16</text>

  <rect x="500" y="228" width="300" height="40" rx="4" fill="#1a1a2e"/>
  <text x="650" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">텍스트 정렬</text>
  <text x="650" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HorizontalAlignment.CENTER</text>

  <rect x="500" y="276" width="300" height="40" rx="4" fill="#1a0a0a"/>
  <text x="650" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">배경색</text>
  <text x="650" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">FillPatternType.SOLID_FOREGROUND</text>

  <rect x="500" y="324" width="300" height="40" rx="4" fill="#0d1117"/>
  <text x="650" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">테두리</text>
  <text x="650" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">BorderStyle.THIN / MEDIUM</text>
</svg>
