<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">X.509 인증서 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">DER/PEM 형식 인증서의 주요 필드</text>

  <!-- 인증서 박스 -->
  <rect x="60" y="88" width="380" height="300" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">X.509 인증서 (tbsCertificate)</text>
  <line x1="80" y1="120" x2="420" y2="120" stroke="#7ec8e3" stroke-width="0.5" opacity="0.4"/>

  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">버전</text>
  <text x="220" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">v3 (X.509 v3)</text>

  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">일련번호</text>
  <text x="220" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CA가 발급한 고유 번호</text>

  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">서명 알고리즘</text>
  <text x="220" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">sha256WithRSAEncryption</text>

  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">발급자 (Issuer)</text>
  <text x="220" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CN=DigiCert TLS RSA SHA256 2020 CA1</text>

  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">유효기간</text>
  <text x="220" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2026-01-01 ~ 2027-01-01</text>

  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">주체 (Subject)</text>
  <text x="220" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CN=example.com, O=Example Inc</text>

  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">공개키</text>
  <text x="220" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">RSA 2048bit 또는 EC P-256</text>

  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">SAN</text>
  <text x="220" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">example.com, www.example.com</text>

  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">CA 서명</text>
  <text x="220" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CA의 개인키로 tbsCertificate 서명</text>

  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">확장 (v3)</text>
  <text x="220" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">KeyUsage, OCSP, CRL DP 등</text>

  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Subject CN은 레거시. SAN이 실제 도메인 검증에 사용됨</text>

  <!-- 오른쪽: 인증서 폐기 -->
  <rect x="470" y="88" width="350" height="148" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="645" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">인증서 폐기 메커니즘</text>
  <line x1="490" y1="120" x2="800" y2="120" stroke="#e05555" stroke-width="0.5" opacity="0.4"/>
  <text x="490" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">CRL</text>
  <text x="570" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">폐기된 인증서 목록 파일</text>
  <text x="490" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">주기적 다운로드, 크기 커질 수 있음</text>
  <text x="490" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">OCSP</text>
  <text x="570" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실시간 상태 확인 API</text>
  <text x="490" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">OCSP Stapling으로 서버가 응답 캐시</text>
  <text x="490" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">OCSP Stapling</text>
  <text x="490" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버가 최신 OCSP 응답을 TLS에 포함</text>

  <!-- 오른쪽: 인증서 형식 -->
  <rect x="470" y="252" width="350" height="136" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="490" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># PEM 형식 확인</text>
  <text x="490" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">openssl</text>
  <text x="570" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> x509 -in cert.pem \</text>
  <text x="490" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  -noout -text</text>
  <text x="490" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 만료일 확인</text>
  <text x="490" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">openssl</text>
  <text x="570" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> x509 -enddate -noout</text>

  <!-- 하단 -->
  <rect x="60" y="400" width="760" height="0" rx="0"/>
</svg>
