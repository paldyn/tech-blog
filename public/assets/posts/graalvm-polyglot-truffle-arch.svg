<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Truffle 프레임워크 &amp; GraalVM 폴리글랏 아키텍처</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">여러 언어가 하나의 JIT 컴파일러를 공유하는 방식</text>

  <!-- === Languages Row === -->
  <!-- Java/Kotlin -->
  <rect x="60" y="108" width="140" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Java / Kotlin</text>
  <text x="130" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HotSpot JIT</text>

  <!-- JavaScript -->
  <rect x="220" y="108" width="130" height="56" rx="8" fill="#1e1a0a" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="285" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8c84a">JavaScript</text>
  <text x="285" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GraalJS (Truffle)</text>

  <!-- Python -->
  <rect x="368" y="108" width="130" height="56" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="433" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Python</text>
  <text x="433" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GraalPy (Truffle)</text>

  <!-- Ruby -->
  <rect x="516" y="108" width="130" height="56" rx="8" fill="#2a0a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="581" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">Ruby</text>
  <text x="581" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TruffleRuby</text>

  <!-- LLVM bitcode -->
  <rect x="664" y="108" width="156" height="56" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="742" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">C / C++ / Rust</text>
  <text x="742" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Sulong (LLVM IR)</text>

  <!-- Arrows down to Truffle -->
  <line x1="130" y1="164" x2="130" y2="208" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="285" y1="164" x2="310" y2="208" stroke="#e8c84a" stroke-width="1.5"/>
  <line x1="433" y1="164" x2="420" y2="208" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="581" y1="164" x2="540" y2="208" stroke="#e05555" stroke-width="1.5"/>
  <line x1="742" y1="164" x2="650" y2="208" stroke="#7777cc" stroke-width="1.5"/>

  <!-- Truffle AST Interpreter layer -->
  <rect x="100" y="214" width="580" height="56" rx="8" fill="#141420" stroke="#7777cc" stroke-width="1.5"/>
  <text x="390" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Truffle AST 인터프리터 프레임워크</text>
  <text x="390" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">언어별 Interpreter → AST 노드 → 특수화(Specialization) → 부분 평가(Partial Evaluation)</text>

  <!-- Arrow down -->
  <line x1="390" y1="270" x2="390" y2="308" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="410" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컴파일 요청</text>

  <!-- Graal JIT Compiler -->
  <rect x="160" y="314" width="460" height="56" rx="8" fill="#0a1828" stroke="#7ec8e3" stroke-width="2"/>
  <text x="390" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Graal JIT 컴파일러 (Java로 작성)</text>
  <text x="390" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Truffle AST → 최적화된 머신 코드 (Futamura 1st 사영)</text>

  <!-- Arrow down -->
  <line x1="390" y1="370" x2="390" y2="408" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Native Machine Code -->
  <rect x="220" y="414" width="340" height="50" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="390" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">네이티브 머신 코드</text>
  <text x="390" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모든 언어가 동일한 최적화 파이프라인으로 컴파일됨</text>

  <!-- Side label -->
  <text x="780" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">각 언어 구현체는</text>
  <text x="780" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">인터프리터만 작성하면 됨</text>

  <!-- Interop arrows (bidirectional at top) -->
  <line x1="200" y1="136" x2="220" y2="136" stroke="#888" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="350" y1="136" x2="368" y2="136" stroke="#888" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="498" y1="136" x2="516" y2="136" stroke="#888" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="646" y1="136" x2="664" y2="136" stroke="#888" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Interop label -->
  <text x="440" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- - - Polyglot Interop: 언어 간 객체 직렬화 없이 직접 공유 - - -</text>
</svg>
