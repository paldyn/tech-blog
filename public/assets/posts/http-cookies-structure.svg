<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="390" viewBox="0 0 880 390">
  <rect width="880" height="390" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">쿠키 헤더 구조</text>
    <!-- Set-Cookie anatomy -->
    <rect x="60" y="65" width="760" height="60" rx="8" fill="#0f1f35" stroke="#4a6a9a" stroke-width="1.5"/>
    <text x="440" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Set-Cookie 헤더 (서버 → 클라이언트)</text>
    <text x="440" y="112" text-anchor="middle" font-size="13" fill="#e8e8e8">Set-Cookie: name=value; expires=날짜; Max-Age=초; Domain=; Path=/; Secure; HttpOnly; SameSite=Lax</text>
    <!-- Attribute boxes -->
    <!-- name=value -->
    <rect x="60" y="148" width="150" height="80" rx="6" fill="#1a1a2e" stroke="#6655aa" stroke-width="1"/>
    <text x="135" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#9999ee">name=value</text>
    <text x="135" y="188" text-anchor="middle" font-size="10" fill="#888">쿠키 이름과 값</text>
    <text x="135" y="204" text-anchor="middle" font-size="10" fill="#888">(필수)</text>
    <text x="135" y="220" text-anchor="middle" font-size="10" fill="#7777cc">핵심 데이터</text>
    <!-- expires/max-age -->
    <rect x="225" y="148" width="150" height="80" rx="6" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="300" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555">Expires/Max-Age</text>
    <text x="300" y="188" text-anchor="middle" font-size="10" fill="#888">만료 시간</text>
    <text x="300" y="204" text-anchor="middle" font-size="10" fill="#888">없으면 세션 쿠키</text>
    <text x="300" y="220" text-anchor="middle" font-size="10" fill="#7777cc">Max-Age 우선</text>
    <!-- Domain/Path -->
    <rect x="390" y="148" width="150" height="80" rx="6" fill="#2a2a0a" stroke="#aaaa3a" stroke-width="1"/>
    <text x="465" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#dddd55">Domain/Path</text>
    <text x="465" y="188" text-anchor="middle" font-size="10" fill="#888">전송 범위 제한</text>
    <text x="465" y="204" text-anchor="middle" font-size="10" fill="#888">Domain: 서브도메인 포함</text>
    <text x="465" y="220" text-anchor="middle" font-size="10" fill="#7777cc">Path: 경로 접두사</text>
    <!-- Secure/HttpOnly -->
    <rect x="555" y="148" width="150" height="80" rx="6" fill="#2a0f0f" stroke="#aa3a3a" stroke-width="1"/>
    <text x="630" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#e05555">Secure/HttpOnly</text>
    <text x="630" y="188" text-anchor="middle" font-size="10" fill="#888">보안 플래그</text>
    <text x="630" y="204" text-anchor="middle" font-size="10" fill="#888">Secure: HTTPS만 전송</text>
    <text x="630" y="220" text-anchor="middle" font-size="10" fill="#7777cc">HttpOnly: JS 접근 차단</text>
    <!-- SameSite -->
    <rect x="720" y="148" width="120" height="80" rx="6" fill="#2a1a0f" stroke="#aa6a3a" stroke-width="1"/>
    <text x="780" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#dd9955">SameSite</text>
    <text x="780" y="188" text-anchor="middle" font-size="10" fill="#888">CSRF 방어</text>
    <text x="780" y="204" text-anchor="middle" font-size="10" fill="#888">None/Lax/Strict</text>
    <text x="780" y="220" text-anchor="middle" font-size="10" fill="#7777cc">크로스사이트 제어</text>
    <!-- Code block -->
    <rect x="60" y="250" width="760" height="105" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 세션 쿠키 (브라우저 닫으면 삭제)</text>
    <text x="76" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Set-Cookie</tspan><tspan fill="#ffffff">: sid=xyz; Path=/; HttpOnly; SameSite=Lax</tspan></text>
    <text x="76" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 영구 쿠키 (30일)</text>
    <text x="76" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Set-Cookie</tspan><tspan fill="#ffffff">: theme=dark; Max-Age=2592000; Path=/</tspan></text>
    <text x="440" y="375" text-anchor="middle" font-size="11" fill="#555">Cookie 요청 헤더는 name=value만 전송 — 속성은 브라우저 내부 처리에만 사용</text>
  </g>
</svg>
