<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">EU AI Act 위험 분류 피라미드</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">위험 수준에 따라 4단계로 분류, 상위일수록 강한 규제</text>

  <!-- Level 4: Unacceptable (top, smallest) -->
  <!-- Pyramid shape using rects -->
  <rect x="325" y="96" width="230" height="70" rx="8" fill="#3a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">금지 (Unacceptable Risk)</text>
  <text x="440" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">완전 금지 — 위반 시 €35M / 전세계 매출 7%</text>
  <!-- Bullet points to the right -->
  <text x="580" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 실시간 원격 생체인식 (공공장소)</text>
  <text x="580" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 사회 신용 점수 시스템</text>
  <text x="580" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 취약계층 잠재의식 조작</text>

  <!-- Level 3: High Risk -->
  <rect x="250" y="182" width="380" height="72" rx="8" fill="#2a1a0a" stroke="#e0a055" stroke-width="2"/>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e0a055" text-anchor="middle">고위험 (High Risk)</text>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">적합성 평가 · CE 마킹 · 인간 감독 의무</text>

  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 의료기기 AI</text>
  <text x="80" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 채용·신용 평가 AI</text>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 교육·사법 AI</text>
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 핵심 인프라 AI</text>
  <text x="640" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">벌금: €15M</text>
  <text x="640" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">또는 매출 3%</text>

  <!-- Level 2: Limited Risk -->
  <rect x="175" y="270" width="530" height="72" rx="8" fill="#1a1a0a" stroke="#e0d055" stroke-width="1.5"/>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e0d055" text-anchor="middle">제한적 위험 (Limited Risk)</text>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">투명성 의무 — AI임을 고지해야 함</text>

  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 챗봇 (AI 고지)</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 딥페이크 (표시 의무)</text>
  <text x="720" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• GPAI 모델</text>
  <text x="720" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 감성 인식 AI</text>

  <!-- Level 1: Minimal Risk -->
  <rect x="100" y="358" width="680" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">최소 위험 (Minimal Risk)</text>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">자율 규제 — 자발적 행동 강령 권고</text>

  <text x="120" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AI 스팸 필터 · 게임 AI · 추천 시스템 대부분 · 번역 서비스</text>
  <text x="120" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전체 AI 시스템의 약 85%가 이 범주에 해당</text>
</svg>
