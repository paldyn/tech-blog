<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="jlArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JPA의 위치 — 명세와 구현, 그 아래 JDBC</text>

  <!-- layer 1 -->
  <rect x="160" y="84" width="560" height="54" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="180" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">애플리케이션 코드</text>
  <text x="180" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">EntityManager / Repository 호출</text>

  <line x1="440" y1="138" x2="440" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jlArr)"/>

  <!-- layer 2 -->
  <rect x="160" y="162" width="560" height="54" fill="#101622" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="180" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">JPA 명세 (jakarta.persistence)</text>
  <text x="180" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">@Entity · @Id · EntityManager 인터페이스 — 표준</text>

  <line x1="440" y1="216" x2="440" y2="234" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jlArr)"/>

  <!-- layer 3 -->
  <rect x="160" y="240" width="560" height="54" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="180" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">구현체 (Hibernate · EclipseLink)</text>
  <text x="180" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실제 SQL 생성 → 내부에서 JDBC 호출 → DB</text>

  <text x="60" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">JPA는 '무엇을'을 정의한 표준 인터페이스, Hibernate는 '어떻게'를 구현한 엔진이다.</text>
</svg>
