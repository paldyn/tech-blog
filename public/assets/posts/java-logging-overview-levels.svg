<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">로그 레벨의 위계</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">설정한 레벨 이상만 출력된다</text>

  <rect x="60" y="110" width="120" height="150" rx="8" fill="#000000" stroke="#9aa4b8" stroke-width="1"/>
  <text x="120" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#9aa4b8" text-anchor="middle">TRACE</text>
  <text x="120" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">가장 상세</text>

  <rect x="195" y="110" width="120" height="150" rx="8" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="255" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">DEBUG</text>
  <text x="255" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">개발 진단</text>

  <rect x="330" y="110" width="120" height="150" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="390" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">INFO</text>
  <text x="390" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">운영 기본</text>

  <rect x="465" y="110" width="120" height="150" rx="8" fill="#000000" stroke="#e0a020" stroke-width="1"/>
  <text x="525" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e0a020" text-anchor="middle">WARN</text>
  <text x="525" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">경고</text>

  <rect x="600" y="110" width="120" height="150" rx="8" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="660" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555" text-anchor="middle">ERROR</text>
  <text x="660" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">오류</text>

  <text x="780" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">↑ 심각도</text>
  <text x="390" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">레벨을 INFO로 두면 TRACE·DEBUG는 버려진다</text>
</svg>
