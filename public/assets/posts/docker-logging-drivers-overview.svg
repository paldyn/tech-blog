<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="alg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker 로깅 드라이버 구조</text>

  <!-- Container -->
  <rect x="60" y="68" width="180" height="80" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">컨테이너</text>
  <text x="150" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">stdout / stderr</text>

  <!-- Arrow to daemon -->
  <line x1="240" y1="108" x2="300" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#alg)"/>

  <!-- Docker daemon + log driver -->
  <rect x="300" y="68" width="200" height="80" rx="8" fill="#1a2035" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="400" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Docker daemon</text>
  <text x="400" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">로그 드라이버 선택</text>
  <text x="400" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">log-driver + log-opts</text>

  <!-- Arrows to destinations -->
  <line x1="500" y1="90" x2="565" y2="68" stroke="#7ec8e3" stroke-width="2" marker-end="url(#alg)"/>
  <line x1="500" y1="108" x2="565" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#alg)"/>
  <line x1="500" y1="126" x2="565" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#alg)"/>

  <!-- Destinations -->
  <rect x="565" y="52" width="130" height="36" rx="6" fill="#0f2015" stroke="#55c555" stroke-width="1"/>
  <text x="630" y="75" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">json-file (기본)</text>

  <rect x="565" y="92" width="130" height="36" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="630" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">syslog / journald</text>

  <rect x="565" y="132" width="130" height="36" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="630" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">fluentd / gelf</text>

  <rect x="720" y="52" width="120" height="36" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="780" y="75" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/var/lib/docker</text>

  <rect x="720" y="92" width="120" height="36" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="780" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">OS 로그 시스템</text>

  <rect x="720" y="132" width="120" height="36" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="780" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중앙 로그 수집기</text>

  <!-- Drivers table -->
  <rect x="60" y="182" width="760" height="214" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">주요 로그 드라이버</text>

  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">드라이버</text>
  <text x="220" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">docker logs</text>
  <text x="360" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">특징</text>
  <line x1="76" y1="238" x2="804" y2="238" stroke="#2a2a3a" stroke-width="1"/>

  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">json-file</text>
  <text x="220" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">가능</text>
  <text x="360" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기본. /var/lib/docker에 저장. rotation 옵션 있음</text>

  <rect x="64" y="270" width="756" height="1" fill="#1a1a2e"/>
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">none</text>
  <text x="220" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불가</text>
  <text x="360" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">로그 버림. 성능 최우선 일회성 컨테이너용</text>

  <rect x="64" y="298" width="756" height="1" fill="#1a1a2e"/>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">local</text>
  <text x="220" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">가능</text>
  <text x="360" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">압축 바이너리 형식. json-file보다 용량 적음</text>

  <rect x="64" y="326" width="756" height="1" fill="#1a1a2e"/>
  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">syslog</text>
  <text x="220" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불가</text>
  <text x="360" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">rsyslog / syslog-ng 전송. RFC 5424 포맷</text>

  <rect x="64" y="354" width="756" height="1" fill="#1a1a2e"/>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">fluentd</text>
  <text x="220" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불가</text>
  <text x="360" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Fluent Bit/Fluentd로 전송. EFK 스택 핵심</text>
</svg>
