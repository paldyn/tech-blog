<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">충돌 전략 명령어 모음</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">merge, rebase, checkout 에서 ours/theirs 사용하기</text>

  <!-- Left: merge/rebase -->
  <text x="220" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">merge / rebase 전략</text>
  <rect x="60" y="114" width="340" height="190" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># merge 시 충돌 → 내 브랜치 우선</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">git merge -X ours feature</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># merge 시 충돌 → 상대 브랜치 우선</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">git merge -X theirs feature</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># rebase 시 충돌 → base 기준 우선</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">git rebase -X ours main</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># rebase 시 충돌 → 내 커밋 우선</text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">git rebase -X theirs main</text>

  <!-- Right: file-level checkout -->
  <text x="660" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">파일 단위 선택</text>
  <rect x="480" y="114" width="340" height="190" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="496" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 파일만 내 버전으로</text>
  <text x="496" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">git checkout --ours src/config.py</text>
  <text x="496" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">git add src/config.py</text>
  <text x="496" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 파일만 상대 버전으로</text>
  <text x="496" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">git checkout --theirs src/config.py</text>
  <text x="496" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">git add src/config.py</text>
  <text x="496" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># restore 명령어로도 동일</text>
  <text x="496" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">git restore --ours src/config.py</text>
  <text x="496" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">git restore --theirs src/config.py</text>

  <!-- Bottom -->
  <rect x="60" y="324" width="760" height="20" rx="4" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="440" y="337" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">checkout --ours/theirs 는 파일 레벨, -X ours/theirs 는 병합 전체 레벨</text>
</svg>
