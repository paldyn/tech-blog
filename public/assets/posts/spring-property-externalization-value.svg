<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
<rect width="880" height="460" rx="12" fill="#0a0a0a"/>

<!-- Title -->
<text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">@Value 주입 패턴</text>
<text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">${...} 프로퍼티 치환과 #{...} SpEL 표현식</text>

<!-- LEFT CODE BLOCK: @Value patterns -->
<!-- Background -->
<rect x="60" y="88" width="380" height="300" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
<!-- Header label -->
<text x="76" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">@Value 사용 패턴</text>
<line x1="60" y1="115" x2="440" y2="115" stroke="#1e2433" stroke-width="1"/>

<!-- Code lines (y starts at 133, lineHeight=18) -->
<text xml:space="preserve" x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">@Component</text>
<text xml:space="preserve" x="76" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">public class MailConfig {</text>
<text xml:space="preserve" x="76" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // ① 단순 프로퍼티 주입</text>
<text xml:space="preserve" x="76" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  @Value</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"${mail.host}"</tspan><tspan fill="#e8e8e8">)</tspan></text>
<text xml:space="preserve" x="76" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  private String host;</text>
<text xml:space="preserve" x="76" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // ② 기본값 지정</text>
<text xml:space="preserve" x="76" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  @Value</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"${mail.port:587}"</tspan><tspan fill="#e8e8e8">)</tspan></text>
<text xml:space="preserve" x="76" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  private int port;</text>
<text xml:space="preserve" x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // ③ SpEL 표현식</text>
<text xml:space="preserve" x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  @Value</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"#{T(Math).PI}"</tspan><tspan fill="#e8e8e8">)</tspan></text>
<text xml:space="preserve" x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  private double pi;</text>
<text xml:space="preserve" x="76" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  // ④ 콤마 분리 → List</text>
<text xml:space="preserve" x="76" y="349" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  @Value</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"${mail.cc:}"</tspan><tspan fill="#e8e8e8">)</tspan></text>
<text xml:space="preserve" x="76" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  private List&lt;String&gt; cc;</text>
<text xml:space="preserve" x="76" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

<!-- RIGHT: Annotation boxes -->
<!-- Box 1: ${...} -->
<rect x="460" y="88" width="360" height="78" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
<text x="476" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">${...} — 프로퍼티 치환</text>
<text x="476" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">PropertySource에서 키를 찾아 값으로 교체</text>
<text x="476" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">${key:default} → 키 없을 때 default 사용</text>
<text x="476" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">키가 없고 기본값도 없으면 BeanCreationException 발생</text>

<!-- Box 2: #{...} SpEL -->
<rect x="460" y="180" width="360" height="78" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
<text x="476" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#9999ee">#{...} — SpEL 표현식</text>
<text x="476" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">Spring Expression Language 실행 결과를 주입</text>
<text x="476" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">#{systemProperties['user.dir']}</text>
<text x="476" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">#{@beanName.method()} — 다른 빈 메서드 호출 가능</text>

<!-- Box 3: Environment API -->
<rect x="460" y="272" width="360" height="78" rx="6" fill="#101a10" stroke="#55c555" stroke-width="1.5"/>
<text x="476" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Environment API</text>
<text x="476" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">env.getProperty("key") — 런타임에 동적 조회</text>
<text x="476" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">env.getProperty("key", Integer.class, 30)</text>
<text x="476" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">@Value와 달리 빈 생성 후에도 조회 가능</text>

<!-- Box 4: Warning -->
<rect x="460" y="364" width="360" height="56" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
<text x="476" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">@Value 사용 불가 위치</text>
<text x="476" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">static 필드·메서드에 적용 불가 (Spring 관리 외)</text>
<text x="476" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">BeanPostProcessor 빈의 필드도 동작 보장 안 됨</text>

<!-- Footer -->
<text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — Spring 완전 정복</text>
</svg>
