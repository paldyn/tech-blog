<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <defs>
    <marker id="arrow-gray" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#555"/>
    </marker>
    <marker id="arrow-accent" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">도구 레지스트리 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">ToolRegistry → 에이전트가 이름·설명·스키마로 도구 선택</text>

  <!-- ── Agent box (left) ── -->
  <rect x="60" y="110" width="160" height="80" rx="10" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <text x="140" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">LLM 에이전트</text>
  <text x="140" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">tool_use 요청 생성</text>
  <text x="140" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">name + input</text>

  <!-- Agent → Registry arrow -->
  <line x1="220" y1="150" x2="278" y2="150" stroke="#7777cc" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <text x="249" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">조회</text>

  <!-- ── ToolRegistry center box ── -->
  <rect x="279" y="100" width="200" height="100" rx="10" fill="#111" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="379" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">ToolRegistry</text>
  <line x1="299" y1="136" x2="459" y2="136" stroke="#333" stroke-width="1"/>
  <text x="299" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">register(tool)</text>
  <text x="299" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">get(name) → Tool</text>
  <text x="299" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">list_schemas() → [dict]</text>

  <!-- Registry → 4 tools arrows -->
  <!-- WebSearch -->
  <line x1="479" y1="135" x2="538" y2="135" stroke="#555" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <!-- Calculator -->
  <line x1="479" y1="150" x2="519" y2="245" stroke="#555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-gray)"/>
  <!-- FileReader -->
  <line x1="479" y1="158" x2="519" y2="355" stroke="#555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-gray)"/>
  <!-- CodeExecutor -->
  <line x1="479" y1="165" x2="519" y2="460" stroke="#555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-gray)"/>

  <!-- ── WebSearch Tool ── -->
  <rect x="539" y="96" width="281" height="100" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="555" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">web_search</text>
  <text x="555" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">설명: 인터넷 실시간 검색</text>
  <text x="555" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">params: query: str, max_results: int</text>
  <text x="555" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">returns: List[SearchResult]</text>
  <text x="555" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">→ Serper / Brave / Tavily API</text>

  <!-- ── Calculator Tool ── -->
  <rect x="539" y="210" width="281" height="100" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="555" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">calculator</text>
  <text x="555" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">설명: 수식 계산 (수치 오류 방지)</text>
  <text x="555" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">params: expression: str</text>
  <text x="555" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">returns: float | str (오류 메시지)</text>
  <text x="555" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">→ ast.literal_eval / sympy</text>

  <!-- ── FileReader Tool ── -->
  <rect x="539" y="324" width="281" height="100" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="555" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">file_read</text>
  <text x="555" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">설명: 로컬 파일 내용 읽기</text>
  <text x="555" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">params: path: str, encoding: str</text>
  <text x="555" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">returns: str (파일 내용)</text>
  <text x="555" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">→ sandbox 경로 제한 필수</text>

  <!-- ── CodeExecutor Tool ── -->
  <rect x="539" y="435" width="281" height="60" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="555" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">code_exec  ⚠</text>
  <text x="555" y="479" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">params: code: str  →  returns: stdout: str</text>
  <text x="555" y="489" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">Docker 샌드박스 필수 · 타임아웃 필수</text>

  <!-- Registry label -->
  <text x="379" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">4개 도구 등록</text>

  <!-- Code block -->
  <rect x="60" y="420" width="460" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="441" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 도구 레지스트리에 등록</text>
  <text x="76" y="461" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">registry = ToolRegistry()</text>
  <text x="76" y="479" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">registry.register(WebSearchTool())</text>
  <text x="76" y="493" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">registry.register(CalculatorTool())</text>
</svg>
