<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Clipboard API 두 가지 방식</text>

  <!-- Old API -->
  <rect x="60" y="66" width="360" height="36" rx="6" fill="#131a2e" stroke="#888" stroke-width="1.5"/>
  <text x="240" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">레거시: document.execCommand()</text>

  <rect x="60" y="110" width="360" height="130" rx="6" fill="#111" stroke="#2a2a2a"/>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">동기 실행, 사용자 선택 필요</text>
  <text x="80" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">임의 텍스트 복사 불가 (deprecated)</text>
  <text x="80" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">document.execCommand('copy')</text>
  <text x="80" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">document.execCommand('paste')</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">⚠ 더 이상 사용 권장 안 함</text>

  <!-- New API -->
  <rect x="460" y="66" width="360" height="36" rx="6" fill="#131a2e" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">현대: navigator.clipboard API</text>

  <rect x="460" y="110" width="360" height="130" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Promise 기반 비동기 API</text>
  <text x="480" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">보안 컨텍스트(HTTPS) 필요</text>
  <text x="480" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">navigator.clipboard.writeText()</text>
  <text x="480" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">navigator.clipboard.readText()</text>
  <text x="480" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">navigator.clipboard.write()</text>

  <!-- Events section -->
  <text x="60" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">클립보드 이벤트 (copy / cut / paste)</text>

  <!-- copy/cut -->
  <rect x="60" y="292" width="360" height="90" rx="6" fill="#131a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">copy / cut 이벤트</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">사용자가 복사/잘라내기할 때 발생</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">e.clipboardData.setData()로 데이터 가로채기 가능</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">리치 텍스트 복사 커스텀에 활용</text>

  <!-- paste -->
  <rect x="460" y="292" width="360" height="90" rx="6" fill="#131a2e" stroke="#e8a84c" stroke-width="1"/>
  <text x="480" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a84c">paste 이벤트</text>
  <text x="480" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">사용자가 붙여넣기할 때 발생</text>
  <text x="480" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">e.clipboardData.getData()로 읽기</text>
  <text x="480" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">items로 이미지 등 다양한 MIME 타입 처리</text>

  <!-- Permission note -->
  <rect x="60" y="402" width="760" height="78" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">권한 모델</text>
  <text x="80" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">writeText(): 사용자 제스처(클릭 등) 안에서 호출 시 권한 없이 가능</text>
  <text x="80" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">readText(): 권한 프롬프트 필요 — Permissions API로 'clipboard-read' 권한 확인</text>
</svg>
