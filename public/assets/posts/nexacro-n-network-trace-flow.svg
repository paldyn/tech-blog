<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">네트워크 트레이스 분석 흐름</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">Browser DevTools로 Transaction 요청·응답을 추적한다</text>

  <defs>
    <marker id="nf1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="nf2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="60" y="100" width="180" height="55" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Nexacro N</text>
  <text x="150" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">브라우저 클라이언트</text>

  <!-- DevTools -->
  <rect x="60" y="200" width="180" height="55" rx="8" fill="#16100a" stroke="#e0a055" stroke-width="1.5"/>
  <text x="150" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a055" text-anchor="middle">Browser</text>
  <text x="150" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">DevTools Network</text>

  <!-- Network arrow: Client to Server -->
  <line x1="240" y1="127" x2="530" y2="127" stroke="#7ec8e3" stroke-width="2" marker-end="url(#nf1)"/>
  <text x="385" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">HTTP POST 요청</text>

  <!-- Server -->
  <rect x="530" y="100" width="180" height="55" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="620" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Backend Server</text>
  <text x="620" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">어댑터 + 서비스</text>

  <!-- Response arrow -->
  <line x1="530" y1="143" x2="240" y2="143" stroke="#55c555" stroke-width="2" marker-end="url(#nf2)"/>
  <text x="385" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">XML/JSON 응답 + Dataset</text>

  <!-- DevTools captures -->
  <line x1="150" y1="155" x2="150" y2="200" stroke="#e0a055" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="155" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0a055">캡처</text>

  <!-- Network tab info boxes -->
  <rect x="280" y="200" width="540" height="240" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="300" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">DevTools Network 탭 — 확인 포인트</text>

  <rect x="300" y="232" width="500" height="40" rx="6" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="315" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">① Request URL / Method</text>
  <text x="315" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서비스 URL이 올바른지, POST/GET 정상 여부</text>

  <rect x="300" y="281" width="500" height="40" rx="6" fill="#0d1818" stroke="#7ec8e3" stroke-width="1"/>
  <text x="315" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">② Request Payload (Form Data)</text>
  <text x="315" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dsSearch XML, 파라미터 값이 올바르게 전송되는지</text>

  <rect x="300" y="330" width="500" height="40" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="315" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">③ Response (Preview / Response)</text>
  <text x="315" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">응답 XML의 Dataset 내용, 에러코드 확인</text>

  <rect x="300" y="379" width="500" height="40" rx="6" fill="#101018" stroke="#7777cc" stroke-width="1"/>
  <text x="315" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">④ Timing (TTFB, Transfer)</text>
  <text x="315" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버 처리 시간 vs 전송 시간 분리 → 병목 위치 파악</text>

  <!-- Bottom -->
  <rect x="60" y="272" width="180" height="55" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="150" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8" text-anchor="middle">F12 → Network</text>
  <text x="150" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">서비스 URL로 필터</text>

  <!-- Bottom note -->
  <rect x="60" y="434" width="760" height="28" rx="6" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">핵심: Request Payload에서 파라미터 확인 → Response에서 에러코드 확인 → Timing에서 병목 위치 파악</text>
</svg>
