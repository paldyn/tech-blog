<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">손실 함수 전체 지도</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">태스크별 올바른 손실 함수 선택이 학습을 결정한다</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Regression losses -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">회귀 손실 (Regression Loss)</text>
  <rect x="60" y="115" width="370" height="180" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>

  <!-- MSE -->
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">MSE (Mean Squared Error)</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">L = (1/n) Σ (ŷᵢ − yᵢ)²</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이상치에 민감 (제곱으로 큰 오차 강조), 미분 쉬움</text>

  <line x1="80" y1="182" x2="410" y2="182" stroke="#1e2433" stroke-width="1"/>

  <!-- MAE -->
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">MAE (Mean Absolute Error)</text>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">L = (1/n) Σ |ŷᵢ − yᵢ|</text>
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이상치에 강건, 0에서 미분 불가</text>

  <line x1="80" y1="244" x2="410" y2="244" stroke="#1e2433" stroke-width="1"/>

  <!-- Huber -->
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Huber Loss</text>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">작은 오차: MSE, 큰 오차: MAE (δ 기준)</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이상치 강건 + 미분 가능 → 실용적 선택</text>

  <!-- Classification losses -->
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">분류 손실 (Classification Loss)</text>
  <rect x="460" y="115" width="360" height="180" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1"/>

  <!-- BCE -->
  <text x="480" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">BCE (Binary Cross-Entropy)</text>
  <text x="480" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">L = −[y·log(ŷ) + (1−y)·log(1−ŷ)]</text>
  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이진 분류, sigmoid 출력층과 함께 사용</text>

  <line x1="480" y1="182" x2="800" y2="182" stroke="#1e2433" stroke-width="1"/>

  <!-- CE -->
  <text x="480" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Cross-Entropy (다중 분류)</text>
  <text x="480" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">L = −Σ yᵢ · log(ŷᵢ)</text>
  <text x="480" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">softmax 출력층, LLM 언어 모델링</text>

  <line x1="480" y1="244" x2="800" y2="244" stroke="#1e2433" stroke-width="1"/>

  <!-- Focal -->
  <text x="480" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Focal Loss</text>
  <text x="480" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">L = −(1−ŷ)ᵞ · log(ŷ)</text>
  <text x="480" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클래스 불균형 탐지 (RetinaNet), γ≈2</text>

  <!-- Generative / Other -->
  <text x="60" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">생성 · 임베딩 · 순위 손실</text>
  <rect x="60" y="325" width="760" height="140" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>

  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">KL Divergence</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">두 분포 차이 → VAE 정규화, RLHF 정책 제약</text>

  <text x="310" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Contrastive / Triplet</text>
  <text x="310" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">유사 쌍 가깝게, 다른 쌍 멀게 → 임베딩 학습</text>

  <text x="560" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">CTC Loss</text>
  <text x="560" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">음성 인식 (ASR): 정렬 없는 시퀀스 학습</text>

  <line x1="80" y1="378" x2="800" y2="378" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Perceptual Loss</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CNN 특징 공간의 차이 → 이미지 생성 품질</text>

  <text x="310" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">InfoNCE</text>
  <text x="310" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대조 학습 (CLIP, SimCLR) 핵심 손실</text>

  <text x="560" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">RLHF Reward Loss</text>
  <text x="560" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인간 선호 학습 → ChatGPT, Claude 정렬</text>

  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">손실 함수 선택 원칙: 예측 목표 → 출력 형태 → 데이터 특성 (이상치/불균형) 순서로 결정</text>

  <!-- Footer -->
  <text x="440" y="548" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
