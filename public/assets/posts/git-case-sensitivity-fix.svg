<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">대소문자 이름 변경 안전하게 하기</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">git mv로 스테이징에 변경을 명시한다</text>

  <rect x="60" y="100" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="130" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 잘못: 그냥 OS rename은 Git이 못 알아챔</text>
  <text xml:space="preserve" x="80" y="158" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 권장: 중간 이름을 거쳐 두 단계로</text>
  <text xml:space="preserve" x="80" y="182" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git mv Readme.md readme.tmp</text>
  <text xml:space="preserve" x="80" y="206" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git mv readme.tmp readme.md</text>

  <rect x="60" y="240" width="760" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="265" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 로컬에서 대소문자 구분을 켜고 싶다면</text>
  <text xml:space="preserve" x="80" y="287" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git config core.ignorecase false</text>
</svg>
