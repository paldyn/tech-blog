<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">부작용 격리 실전 패턴</text>

  <!-- Pattern 1: Dependency injection -->
  <rect x="60" y="68" width="360" height="150" rx="8" fill="#0f1a2e" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">의존성 주입 (테스트 친화적)</text>
  <rect x="76" y="100" width="328" height="104" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 시간을 인자로 전달</text>
  <text x="90" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> is_expired(item, now):</tspan>
  </text>
  <text x="90" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ffffff"> item.expiry &lt; now</tspan>
  </text>
  <text x="90" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># datetime.now()를 외부에서 주입</text>
  <text x="90" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">is_expired(item, datetime.now())</tspan>
  </text>

  <!-- Pattern 2: Return effects instead of executing -->
  <rect x="460" y="68" width="360" height="150" rx="8" fill="#0f2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">효과를 반환값으로 표현</text>
  <rect x="476" y="100" width="328" height="104" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 실행 대신 '해야 할 일' 반환</text>
  <text x="490" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> decide(state):</tspan>
  </text>
  <text x="490" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ffffff"> {</tspan>
    <tspan fill="#ce9178">"action"</tspan>
    <tspan fill="#ffffff">:</tspan>
    <tspan fill="#ce9178">"send_email"</tspan>
    <tspan fill="#ffffff">, ...}</tspan>
  </text>
  <text x="490" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 실제 실행은 caller가</text>
  <text x="490" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">execute(decide(state))</tspan>
  </text>

  <!-- Pattern 3: Reader monad pattern -->
  <rect x="60" y="238" width="360" height="140" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">환경을 인자로 전달 (Reader)</text>
  <rect x="76" y="270" width="328" height="94" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> process(data, config, logger):</tspan>
  </text>
  <text x="90" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">    # 전역 변수 대신 인자로</tspan>
  </text>
  <text x="90" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    logger.info(</tspan>
    <tspan fill="#ce9178">"start"</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="90" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ffffff"> transform(data, config)</tspan>
  </text>

  <!-- Pattern 4: Test boundary -->
  <rect x="460" y="238" width="360" height="140" rx="8" fill="#2a1a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">경계 함수 테스트 전략</text>
  <rect x="476" y="270" width="328" height="94" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 순수 코어만 단위 테스트</text>
  <text x="490" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> test_calculate():</tspan>
  </text>
  <text x="490" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    assert</tspan>
    <tspan fill="#ffffff"> calculate([</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">]) == </tspan>
    <tspan fill="#b5cea8">6</tspan>
  </text>
  <text x="490" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">    # mock, DB 연결 필요 없음</tspan>
  </text>
</svg>
