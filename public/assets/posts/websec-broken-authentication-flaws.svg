<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">취약한 인증: 흔한 결함 5가지</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#9aa4b8" text-anchor="middle">Broken Authentication Common Flaws</text>

  <!-- Flaw 1 -->
  <rect x="60" y="96" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="96" width="6" height="60" rx="3" fill="#e05a5a"/>
  <text x="86" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05a5a">01</text>
  <text x="116" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">취약한 비밀번호 허용</text>
  <text x="116" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"123456", "password", "qwerty" — 비밀번호 정책 없음</text>

  <!-- Flaw 2 -->
  <rect x="60" y="170" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="170" width="6" height="60" rx="3" fill="#e08a3a"/>
  <text x="86" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e08a3a">02</text>
  <text x="116" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">브루트포스 방어 없음</text>
  <text x="116" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">무제한 로그인 시도 허용 — 자동화 공격에 무방비, 계정 잠금 없음</text>

  <!-- Flaw 3 -->
  <rect x="60" y="244" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="244" width="6" height="60" rx="3" fill="#d4c027"/>
  <text x="86" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#d4c027">03</text>
  <text x="116" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">세션 ID URL 노출</text>
  <text x="116" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">?sessionid=abc123ef — 브라우저 히스토리·로그에 노출</text>

  <!-- Flaw 4 -->
  <rect x="60" y="318" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="318" width="6" height="60" rx="3" fill="#7ec8e3"/>
  <text x="86" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">04</text>
  <text x="116" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">안전하지 않은 비밀번호 재설정</text>
  <text x="116" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">예측 가능한 토큰, 이메일 열거, 만료 없는 링크 허용</text>

  <!-- Flaw 5 -->
  <rect x="60" y="392" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="392" width="6" height="60" rx="3" fill="#a78bfa"/>
  <text x="86" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">05</text>
  <text x="116" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">다중 인증(MFA) 미적용</text>
  <text x="116" y="439" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">비밀번호 단일 인증 — 크리덴셜 스터핑·유출 시 계정 완전 탈취</text>

  <!-- Footer -->
  <line x1="60" y1="472" x2="820" y2="472" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555e77" text-anchor="middle">OWASP A07:2021 – Identification and Authentication Failures</text>
</svg>
