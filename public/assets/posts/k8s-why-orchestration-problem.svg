<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">마이크로서비스 확장의 현실</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">서비스 수가 늘어날수록 운영 복잡도는 기하급수적으로 증가</text>

  <!-- Phase 1: Monolith -->
  <rect x="60" y="96" width="170" height="280" rx="8" fill="#111" stroke="#444" stroke-width="1.5"/>
  <text x="145" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">모노리스</text>
  <rect x="78" y="134" width="134" height="220" rx="6" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="145" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">하나의 앱</text>
  <text x="145" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">User Service</text>
  <text x="145" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Order Service</text>
  <text x="145" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Payment Service</text>
  <text x="145" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Notification</text>
  <text x="145" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">관리: 쉬움</text>
  <text x="145" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">확장: 전체 재배포</text>
  <text x="145" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">장애: 전체 중단</text>
  <text x="145" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버 1대</text>

  <!-- Arrow 1 -->
  <line x1="232" y1="236" x2="258" y2="236" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 2: Microservices without orchestration -->
  <rect x="260" y="96" width="230" height="280" rx="8" fill="#111" stroke="#444" stroke-width="1.5"/>
  <text x="375" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">마이크로서비스</text>
  <text x="375" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">(오케스트레이션 없음)</text>

  <rect x="274" y="148" width="98" height="44" rx="4" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="323" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">user-svc:3</text>
  <text x="323" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">어느 서버?</text>

  <rect x="378" y="148" width="98" height="44" rx="4" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="427" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">order-svc:2</text>
  <text x="427" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">수동 배포</text>

  <rect x="274" y="204" width="98" height="44" rx="4" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="323" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">payment:1</text>
  <text x="323" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">장애 감지?</text>

  <rect x="378" y="204" width="98" height="44" rx="4" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="427" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">notify:4</text>
  <text x="427" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">스케일?</text>

  <rect x="274" y="264" width="202" height="90" rx="4" fill="#110d0d" stroke="#333" stroke-width="1"/>
  <text x="375" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">운영 이슈</text>
  <text x="375" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">· 장애 서버 수동 교체</text>
  <text x="375" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">· 배포 스크립트 직접 관리</text>
  <text x="375" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">· 서비스 IP 변경 시 업데이트</text>
  <text x="375" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">· 비효율적 자원 사용</text>

  <!-- Arrow 2 -->
  <line x1="492" y1="236" x2="518" y2="236" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3: K8s -->
  <rect x="520" y="96" width="300" height="280" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">K8s 오케스트레이션</text>

  <rect x="536" y="134" width="268" height="48" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="670" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Control Plane</text>
  <text x="670" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스케줄링 · 상태 감시 · 자동 복구</text>

  <rect x="536" y="194" width="122" height="52" rx="4" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="597" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Node 1</text>
  <text x="597" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">user×3, order×2</text>
  <text x="597" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">자원 최적 배치</text>

  <rect x="670" y="194" width="122" height="52" rx="4" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="731" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Node 2</text>
  <text x="731" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">payment×1, notify×4</text>
  <text x="731" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">자동 스케일링</text>

  <rect x="536" y="262" width="268" height="90" rx="4" fill="#0d110d" stroke="#333" stroke-width="1"/>
  <text x="670" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">자동화된 것들</text>
  <text x="670" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">· 파드 스케줄링 최적화</text>
  <text x="670" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">· 장애 시 자동 재스케줄</text>
  <text x="670" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">· DNS 기반 서비스 디스커버리</text>
  <text x="670" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">· 트래픽 기반 HPA 확장</text>

  <!-- Bottom labels -->
  <text x="145" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">1~5개 컨테이너</text>
  <text x="375" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">수십 개 컨테이너 → 한계</text>
  <text x="670" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">수천 개 컨테이너 → 자동화</text>
</svg>
