<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컨테이너 확산이 부르는 운영 복잡도</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">컨테이너 수 증가 &#x2192; 수동 관리 한계 도달</text>

  <!-- Stages -->
  <rect x="60" y="100" width="160" height="240" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="140" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">1~5개 컨테이너</text>
  <text x="140" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">docker run 으로 충분</text>
  <text x="140" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">단순 스크립트 관리</text>
  <text x="140" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" text-anchor="middle">&#x1F603;</text>
  <text x="140" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">문제 없음</text>
  <text x="140" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">Docker Compose</text>
  <text x="140" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">로 충분</text>
  <text x="140" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">소규모 서비스</text>

  <line x1="230" y1="220" x2="270" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrg)"/>

  <rect x="280" y="100" width="160" height="240" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="360" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">10~30개 컨테이너</text>
  <text x="360" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">수동 배포 스크립트</text>
  <text x="360" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">복잡해지기 시작</text>
  <text x="360" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" text-anchor="middle">&#x1F615;</text>
  <text x="360" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">관리 부담 증가</text>
  <text x="360" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">장애 대응 지연</text>
  <text x="360" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">리소스 낭비 발생</text>
  <text x="360" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">성장하는 스타트업</text>

  <line x1="450" y1="220" x2="490" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrd)"/>

  <rect x="500" y="100" width="160" height="240" rx="8" fill="#1a0000" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="580" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">100개+ 컨테이너</text>
  <text x="580" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">수동 관리 불가</text>
  <text x="580" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">24/7 on-call 부담</text>
  <text x="580" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" text-anchor="middle">&#x1F631;</text>
  <text x="580" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">운영 카오스</text>
  <text x="580" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">장애 복구 수시간</text>
  <text x="580" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">배포 실수 빈발</text>
  <text x="580" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">엔터프라이즈 규모</text>

  <!-- K8s solution -->
  <rect x="680" y="100" width="160" height="240" rx="8" fill="#0d1f12" stroke="#166534" stroke-width="1.5"/>
  <text x="760" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Kubernetes</text>
  <text x="760" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">선언형 자동화</text>
  <text x="760" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">셀프 힐링</text>
  <text x="760" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" text-anchor="middle">&#x1F680;</text>
  <text x="760" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">운영 자동화</text>
  <text x="760" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">장애 자동 복구</text>
  <text x="760" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">자동 스케일링</text>
  <text x="760" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">모든 규모 대응</text>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#6b7280" text-anchor="middle">오케스트레이션은 선택이 아닌 필수 &#x2014; 컨테이너 규모가 커질수록 더욱 명확해진다</text>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#6b7280" text-anchor="middle">Google: "하루 20억 개 컨테이너를 Borg 없이 운영했다면?"</text>
</svg>
