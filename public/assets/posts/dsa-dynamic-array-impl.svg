<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">동적 배열 직접 구현</text>

  <rect x="60" y="68" width="760" height="368" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="92" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan>
    <tspan fill="#ffffff"> DynamicArray:</tspan>
  </text>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  def</tspan>
    <tspan fill="#ffffff"> __init__(self):</tspan>
  </text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self._cap = </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">; self._size = </tspan>
    <tspan fill="#b5cea8">0</tspan>
  </text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self._data = [</tspan>
    <tspan fill="#7ec8e3" font-weight="600">None</tspan>
    <tspan fill="#ffffff">] * self._cap</tspan>
  </text>
  <text x="76" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  def</tspan>
    <tspan fill="#ffffff"> append(self, val):          </tspan>
    <tspan fill="#9aa4b8">// amortized O(1)</tspan>
  </text>
  <text x="76" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">if</tspan>
    <tspan fill="#ffffff"> self._size == self._cap:</tspan>
  </text>
  <text x="76" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">      self._resize(self._cap * </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">)    </tspan>
    <tspan fill="#9aa4b8">// 2배 확장</tspan>
  </text>
  <text x="76" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self._data[self._size] = val</tspan>
  </text>
  <text x="76" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self._size += </tspan>
    <tspan fill="#b5cea8">1</tspan>
  </text>
  <text x="76" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  def</tspan>
    <tspan fill="#ffffff"> pop(self):                  </tspan>
    <tspan fill="#9aa4b8">// amortized O(1)</tspan>
  </text>
  <text x="76" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    val = self._data[self._size - </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">]</tspan>
  </text>
  <text x="76" y="324" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self._size -= </tspan>
    <tspan fill="#b5cea8">1</tspan>
  </text>
  <text x="76" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">if</tspan>
    <tspan fill="#ffffff"> self._size </tspan>
    <tspan fill="#ffffff">&lt; self._cap // </tspan>
    <tspan fill="#b5cea8">4</tspan>
    <tspan fill="#ffffff">: self._resize(self._cap // </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="76" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ffffff"> val</tspan>
  </text>
  <text x="76" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  def</tspan>
    <tspan fill="#ffffff"> _resize(self, new_cap):</tspan>
  </text>
  <text x="76" y="410" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    new_data = [</tspan>
    <tspan fill="#7ec8e3" font-weight="600">None</tspan>
    <tspan fill="#ffffff">] * new_cap</tspan>
  </text>
  <text x="76" y="426" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    new_data[:</tspan>
    <tspan fill="#ffffff">self._size] = self._data[:</tspan>
    <tspan fill="#ffffff">self._size]</tspan>
  </text>
  <text x="76" y="426" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan>
  </text>
</svg>
