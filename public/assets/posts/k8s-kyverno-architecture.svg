<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Kyverno &#x2014; 아키텍처 개요</text>

  <!-- ===== Policy Types (top boxes) ===== -->
  <text x="440" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">정책 리소스</text>

  <!-- ClusterPolicy -->
  <rect x="60" y="94" width="180" height="70" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">ClusterPolicy</text>
  <text x="150" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">클러스터 전체 범위</text>
  <text x="150" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">모든 네임스페이스 적용</text>

  <!-- Policy -->
  <rect x="260" y="94" width="180" height="70" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="350" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Policy</text>
  <text x="350" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">네임스페이스 범위</text>
  <text x="350" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">특정 NS에만 적용</text>

  <!-- PolicyException -->
  <rect x="460" y="94" width="180" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="550" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">PolicyException</text>
  <text x="550" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정책 예외 허용</text>
  <text x="550" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">특정 리소스 제외</text>

  <!-- Rule types label -->
  <rect x="660" y="94" width="160" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">규칙 유형</text>
  <text x="740" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">validate / mutate</text>
  <text x="740" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">generate / verifyImages</text>

  <!-- ===== Three Controllers ===== -->
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Kyverno 컨트롤러 구성</text>

  <!-- Admission Controller -->
  <rect x="60" y="220" width="240" height="120" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Admission Controller</text>
  <text x="180" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">API 요청 실시간 처리</text>
  <!-- Sub items -->
  <rect x="76" y="280" width="200" height="22" rx="4" fill="#0a2a3a"/>
  <text x="176" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">validate &#x2022; mutate &#x2022; generate</text>
  <text x="180" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MutatingWebhook + ValidatingWebhook</text>

  <!-- Background Controller -->
  <rect x="320" y="220" width="240" height="120" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Background Controller</text>
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">기존 리소스 감사 (Audit)</text>
  <rect x="336" y="280" width="208" height="22" rx="4" fill="#1a1a2a"/>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">PolicyReport &#x2022; ClusterPolicyReport</text>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">비동기 감사 결과 기록</text>

  <!-- Cleanup Controller -->
  <rect x="580" y="220" width="240" height="120" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="700" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Cleanup Controller</text>
  <text x="700" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">리소스 TTL 정리</text>
  <rect x="596" y="280" width="208" height="22" rx="4" fill="#0a2a0a"/>
  <text x="700" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">CleanupPolicy &#x2022; TTL 기반 삭제</text>
  <text x="700" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CronJob 형태로 주기 실행</text>

  <!-- ===== Request Flow ===== -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">API 요청 처리 흐름</text>

  <!-- API Request -->
  <rect x="60" y="396" width="120" height="55" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">API 요청</text>
  <text x="120" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">kubectl apply</text>

  <!-- Arrow -->
  <line x1="180" y1="424" x2="220" y2="424" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- API Server -->
  <rect x="220" y="396" width="150" height="55" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="295" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">kube-apiserver</text>
  <text x="295" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Admission 단계</text>

  <!-- Arrow -->
  <line x1="370" y1="424" x2="410" y2="424" stroke="#7777cc" stroke-width="2" marker-end="url(#arrPurple)"/>

  <!-- Kyverno Admission -->
  <rect x="410" y="390" width="200" height="66" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="510" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Kyverno Admission</text>
  <text x="510" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Mutate &#x2192; Validate</text>
  <text x="510" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Generate (비동기)</text>

  <!-- Arrow allow/deny -->
  <line x1="610" y1="424" x2="660" y2="404" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrGreen)"/>
  <rect x="660" y="390" width="100" height="40" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Allow</text>

  <line x1="610" y1="430" x2="660" y2="448" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrRed)"/>
  <rect x="660" y="438" width="100" height="40" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="710" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">Block</text>

  <!-- PolicyReport arrow from Background Controller -->
  <line x1="440" y1="340" x2="440" y2="368" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrPurple)"/>
  <rect x="360" y="368" width="160" height="24" rx="4" fill="#1a1a2a"/>
  <text x="440" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">PolicyReport CRD</text>

  <!-- Footer -->
  <text x="440" y="516" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Kyverno = YAML 기반 정책, Rego 불필요  |  CRD: ClusterPolicy, Policy, PolicyReport</text>
</svg>
