<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrYellow" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c800"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">테스트에서의 MSW 생명주기</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">resetHandlers가 테스트 간 격리를 보장한다</text>

  <!-- Step 1 -->
  <rect x="70" y="100" width="320" height="70" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="230" y="128" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">beforeAll: server.listen()</text>
  <text x="230" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기본 핸들러로 가로채기 시작</text>

  <!-- Step 2 -->
  <rect x="490" y="100" width="320" height="70" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="650" y="128" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8c800">test: server.use(override)</text>
  <text x="650" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이 테스트에서만 에러 응답으로 교체</text>

  <!-- Step 3 -->
  <rect x="490" y="240" width="320" height="70" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="268" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">afterEach: resetHandlers()</text>
  <text x="650" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">오버라이드 제거 — 기본 핸들러 복원</text>

  <!-- Step 4 -->
  <rect x="70" y="240" width="320" height="70" rx="8" fill="#200d0d" stroke="#e05555" stroke-width="2"/>
  <text x="230" y="268" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e05555">afterAll: server.close()</text>
  <text x="230" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모든 테스트 종료 후 정리</text>

  <!-- Arrows -->
  <line x1="390" y1="135" x2="490" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="650" y1="170" x2="650" y2="240" stroke="#e8c800" stroke-width="2" marker-end="url(#arrYellow)"/>
  <line x1="490" y1="275" x2="390" y2="275" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>

  <text x="440" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">성공 응답은 전역 핸들러에, 에러·엣지 케이스는 테스트 안의 server.use에 둔다</text>
</svg>
