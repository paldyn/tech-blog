<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">@Cacheable SpEL 키 표현식 · 조건부 캐싱</text>

  <!-- Left: Key expressions -->
  <text x="200" y="76" text-anchor="middle" font-size="16" font-weight="600" fill="#7ec8e3">SpEL 키 표현식</text>

  <rect x="60" y="88" width="280" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 단일 파라미터 키</tspan></text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">@Cacheable</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"users"</tspan><tspan fill="#ffffff">, key = </tspan><tspan fill="#ce9178">"#id"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">User</tspan><tspan fill="#ffffff"> findById(Long id) {...}</tspan></text>

  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 복합 키</tspan></text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">@Cacheable</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"items"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    key = </tspan><tspan fill="#ce9178">"#type + ':' + #page"</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 객체 필드</tspan></text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">@Cacheable</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"orders"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    key = </tspan><tspan fill="#ce9178">"#req.userId"</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 메서드명 포함 (충돌 방지)</tspan></text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">@Cacheable</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"reports"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    key = </tspan><tspan fill="#ce9178">"#root.methodName + #id"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> </text>

  <!-- Right: Conditional caching -->
  <text x="640" y="76" text-anchor="middle" font-size="16" font-weight="600" fill="#55c555">조건부 캐싱</text>

  <rect x="460" y="88" width="360" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// condition: 캐시 저장 전 평가</tspan></text>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">@Cacheable</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"products"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    condition = </tspan><tspan fill="#ce9178">"#id &gt; 0"</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// unless: 결과 기반 저장 제외</tspan></text>
  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">@Cacheable</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"users"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    unless = </tspan><tspan fill="#ce9178">"#result == null"</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="476" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// sync=true: 캐시 미스 시 1 스레드만</tspan></text>
  <text x="476" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">@Cacheable</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"heavy"</tspan><tspan fill="#ffffff">, sync = </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// Cache Stampede 방지</tspan></text>

  <text x="476" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 복합 evict + put</tspan></text>
  <text x="476" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">@Caching</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="476" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  evict = {</tspan><tspan fill="#7ec8e3" font-weight="600">@CacheEvict</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"list"</tspan><tspan fill="#ffffff">)},</tspan></text>
  <text x="476" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  put = {</tspan><tspan fill="#7ec8e3" font-weight="600">@CachePut</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"item"</tspan><tspan fill="#ffffff">, key=</tspan><tspan fill="#ce9178">"#r.id"</tspan><tspan fill="#ffffff">)})</tspan></text>

  <!-- Warning note -->
  <rect x="60" y="392" width="760" height="80" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="416" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">⚠ 자기 호출(Self-invocation) 함정</text>
  <text x="440" y="438" text-anchor="middle" font-size="13" fill="#888">같은 클래스 내에서 @Cacheable 메서드를 직접 호출하면 프록시를 거치지 않아 캐시가 동작하지 않습니다.</text>
  <text x="440" y="458" text-anchor="middle" font-size="13" fill="#888">해결책: 다른 빈으로 분리하거나, ApplicationContext에서 자신의 빈을 주입받아 호출합니다.</text>
</svg>
