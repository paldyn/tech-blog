<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">언제 TypeScript / JavaScript를 선택할까</text>

  <!-- TS column -->
  <rect x="60" y="66" width="360" height="44" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">TypeScript 권장 상황</text>

  <rect x="60" y="122" width="360" height="220" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  팀 3인 이상</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  6개월 이상 유지되는 프로젝트</text>
  <text x="80" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  라이브러리 / npm 패키지 배포</text>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  React / Vue / Angular 앱</text>
  <text x="80" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  NestJS / Next.js / Remix 서버</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  오픈소스 / 외부 기여자 프로젝트</text>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  도메인 로직이 복잡한 비즈니스 앱</text>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  새로운 프로젝트 (처음부터 시작)</text>

  <!-- JS column -->
  <rect x="460" y="66" width="360" height="44" rx="6" fill="#2a2000" stroke="#f6c90e" stroke-width="1.5"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#f6c90e" text-anchor="middle">JavaScript로 충분한 상황</text>

  <rect x="460" y="122" width="360" height="220" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="480" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#f6c90e">→  50줄 이하 일회성 스크립트</text>
  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#f6c90e">→  빠른 프로토타입 / PoC 검증</text>
  <text x="480" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#f6c90e">→  학습 목적의 소규모 예제</text>
  <text x="480" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#f6c90e">→  빌드 설정 없는 단순 HTML 페이지</text>
  <text x="480" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#f6c90e">→  레거시 코드베이스 점진적 전환 전</text>
  <text x="480" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">(tsx / Bun 으로 설정 없이 실행 가능)</text>
  <text x="480" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">(현재는 대부분 TS 전환을 권장)</text>
  <text x="480" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa"> </text>

  <!-- Bottom note -->
  <rect x="60" y="360" width="760" height="40" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">현실적으로 2025년 기준 대부분의 새 프로젝트는 TypeScript를 기본으로 선택한다</text>
</svg>
