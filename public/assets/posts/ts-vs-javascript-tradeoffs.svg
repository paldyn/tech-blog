<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">언제 TypeScript를 선택할까?</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">프로젝트 특성에 따른 선택 기준</text>
  <!-- Header row -->
  <rect x="260" y="100" width="260" height="40" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">TypeScript 권장</text>
  <rect x="540" y="100" width="280" height="40" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="680" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">JS도 충분한 경우</text>
  <!-- Row labels -->
  <text x="60" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">팀 규모</text>
  <text x="60" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">프로젝트 규모</text>
  <text x="60" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">유지보수 기간</text>
  <text x="60" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">API 설계</text>
  <text x="60" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">프로토타이핑</text>
  <!-- TS column values -->
  <text x="390" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">3인 이상 팀 · 다수 기여자</text>
  <text x="390" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">라이브러리 · 대형 SPA · 서비스</text>
  <text x="390" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장기 운영 · 지속적 유지보수</text>
  <text x="390" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">공개 API · SDK · npm 패키지</text>
  <text x="390" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">TS도 충분히 빠름 (playground)</text>
  <!-- JS column values -->
  <text x="680" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">1인 개발 · 단기 스크립트</text>
  <text x="680" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">소규모 스크립트 · 빠른 해킹</text>
  <text x="680" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일회성 · 단기 프로젝트</text>
  <text x="680" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">내부 스크립트 · 비공개 모듈</text>
  <text x="680" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빠른 PoC · 아이디어 검증</text>
  <!-- Horizontal separators -->
  <line x1="60" y1="180" x2="820" y2="180" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="230" x2="820" y2="230" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="280" x2="820" y2="280" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="330" x2="820" y2="330" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="380" x2="820" y2="380" stroke="#222" stroke-width="1"/>
  <!-- Vertical separator -->
  <line x1="260" y1="100" x2="260" y2="390" stroke="#222" stroke-width="1"/>
  <line x1="540" y1="100" x2="540" y2="390" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">대부분의 현대 프로젝트는 TypeScript를 기본 선택으로 사용합니다</text>
</svg>
