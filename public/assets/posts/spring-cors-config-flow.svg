<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CORS Preflight 요청 처리 흐름</text>
  <text x="440" y="64" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">브라우저 Origin 검사 → OPTIONS 사전 요청 → 실제 요청 허용</text>

  <!-- Left side: Browser -->
  <rect x="50" y="84" width="240" height="340" rx="8" fill="#0d1520" stroke="#1e3040"/>
  <text x="170" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">브라우저</text>

  <!-- Browser boxes -->
  <rect x="70" y="124" width="200" height="36" rx="6" fill="#051828" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="170" y="147" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Cross-Origin 요청 감지</text>

  <line x1="170" y1="160" x2="170" y2="174" stroke="#555" stroke-width="1.5"/>
  <polygon points="162,174 178,174 170,182" fill="#555"/>

  <rect x="70" y="182" width="200" height="36" rx="6" fill="#051828" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="170" y="205" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">OPTIONS 사전 요청 전송</text>
  <text x="70" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" opacity="0.6">Origin · Access-Control-Request-*</text>

  <line x1="170" y1="238" x2="170" y2="252" stroke="#555" stroke-width="1.5"/>
  <polygon points="162,252 178,252 170,260" fill="#555"/>

  <rect x="70" y="260" width="200" height="36" rx="6" fill="#051828" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="170" y="283" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">허용 여부 확인</text>

  <line x1="170" y1="296" x2="170" y2="310" stroke="#555" stroke-width="1.5"/>
  <polygon points="162,310 178,310 170,318" fill="#555"/>

  <rect x="70" y="318" width="200" height="36" rx="6" fill="#051828" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="170" y="341" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">실제 요청 전송</text>

  <!-- Center arrows -->
  <!-- OPTIONS arrow (browser → server) -->
  <line x1="310" y1="200" x2="480" y2="200" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="480,194 480,206 494,200" fill="#e05555"/>
  <text x="400" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">OPTIONS /api/data</text>

  <!-- Response arrow (server → browser) -->
  <line x1="494" y1="232" x2="310" y2="268" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="310,262 310,274 296,268" fill="#55c555"/>
  <text x="400" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">200 OK + CORS 헤더</text>

  <!-- Actual request arrow -->
  <line x1="310" y1="336" x2="480" y2="336" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="480,330 480,342 494,336" fill="#7ec8e3"/>
  <text x="400" y="328" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">실제 GET/POST/PUT 요청</text>

  <!-- Right side: Server -->
  <rect x="494" y="84" width="336" height="340" rx="8" fill="#0d0b14" stroke="#1e1a2e"/>
  <text x="662" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">Spring 서버</text>

  <!-- Server boxes -->
  <rect x="514" y="124" width="296" height="36" rx="6" fill="#100c22" stroke="#9988dd" stroke-width="1.2"/>
  <text x="662" y="147" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c4b8f0">CorsFilter / CorsInterceptor</text>

  <line x1="662" y1="160" x2="662" y2="174" stroke="#555" stroke-width="1.5"/>
  <polygon points="654,174 670,174 662,182" fill="#555"/>

  <rect x="514" y="182" width="296" height="36" rx="6" fill="#100c22" stroke="#9988dd" stroke-width="1.2"/>
  <text x="662" y="205" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c4b8f0">Origin 허용 목록 대조</text>

  <line x1="662" y1="218" x2="662" y2="232" stroke="#555" stroke-width="1.5"/>
  <polygon points="654,232 670,232 662,240" fill="#555"/>

  <!-- CORS response headers box -->
  <rect x="514" y="240" width="296" height="64" rx="6" fill="#051828" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="662" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Access-Control-Allow-Origin</text>
  <text x="662" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Access-Control-Allow-Methods</text>
  <text x="662" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Access-Control-Max-Age</text>

  <line x1="662" y1="304" x2="662" y2="318" stroke="#555" stroke-width="1.5"/>
  <polygon points="654,318 670,318 662,326" fill="#555"/>

  <rect x="514" y="326" width="296" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.2"/>
  <text x="662" y="349" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#80dd80">허용 → 실제 요청 처리</text>

  <!-- Bottom note -->
  <rect x="50" y="440" width="780" height="28" rx="6" fill="#111" stroke="#2a2a2a"/>
  <text x="440" y="458" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Simple Request (GET · HEAD · 기본 POST)는 Preflight 없이 바로 전송, 응답 헤더로 허용 여부 판단</text>
</svg>
