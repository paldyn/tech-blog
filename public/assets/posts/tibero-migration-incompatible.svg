<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Oracle → Tibero 주요 비호환 항목</text>

  <!-- Table header -->
  <rect x="60" y="64" width="760" height="36" rx="6" fill="#111133"/>
  <text x="200" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Oracle 기능</text>
  <text x="480" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Tibero 상태</text>
  <text x="720" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">대응 방법</text>

  <!-- Row 1 -->
  <rect x="60" y="100" width="760" height="36" rx="0" fill="#0d0d1a"/>
  <text x="200" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">CONNECT BY 계층</text>
  <text x="480" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">&#x2713; 지원</text>
  <text x="720" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">그대로 사용</text>

  <!-- Row 2 -->
  <rect x="60" y="136" width="760" height="36" rx="0" fill="#0a0a14"/>
  <text x="200" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">DBMS_SCHEDULER</text>
  <text x="480" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">&#x26A0; 미지원</text>
  <text x="720" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">tb_job 패키지로 대체</text>

  <!-- Row 3 -->
  <rect x="60" y="172" width="760" height="36" rx="0" fill="#0d0d1a"/>
  <text x="200" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">RESULT_CACHE 힌트</text>
  <text x="480" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">&#x26A0; 무시됨</text>
  <text x="720" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">힌트 제거 또는 대안 검토</text>

  <!-- Row 4 -->
  <rect x="60" y="208" width="760" height="36" rx="0" fill="#0a0a14"/>
  <text x="200" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">DBMS_CRYPTO</text>
  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">&#x2248; 부분 지원</text>
  <text x="720" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용 API 개별 검증</text>

  <!-- Row 5 -->
  <rect x="60" y="244" width="760" height="36" rx="0" fill="#0d0d1a"/>
  <text x="200" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">Database Vault</text>
  <text x="480" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">&#x26A0; 미지원</text>
  <text x="720" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">RLS + 권한 정책으로 대체</text>

  <!-- Row 6 -->
  <rect x="60" y="280" width="760" height="36" rx="0" fill="#0a0a14"/>
  <text x="200" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">Partitioned Index</text>
  <text x="480" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">&#x2248; 부분 지원</text>
  <text x="720" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">로컬 파티션 인덱스만 지원</text>

  <!-- Column dividers -->
  <line x1="340" y1="64" x2="340" y2="316" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="64" x2="620" y2="316" stroke="#333" stroke-width="1"/>

  <!-- Outer border -->
  <rect x="60" y="64" width="760" height="252" rx="6" fill="none" stroke="#333" stroke-width="1"/>
</svg>
