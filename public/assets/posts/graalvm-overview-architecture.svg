<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GraalVM 아키텍처 개요</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Graal JIT + Truffle + Native Image — 세 축으로 구성된 고성능 런타임</text>

  <!-- Top: JVM / JVMCI layer -->
  <rect x="60" y="86" width="760" height="56" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">HotSpot JVM + JVMCI (JVM Compiler Interface)</text>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JDK 9+에 표준화 — 외부 JIT 컴파일러를 JVM에 플러그인할 수 있는 인터페이스</text>

  <!-- Down arrow center -->
  <line x1="440" y1="142" x2="440" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Graal Compiler box -->
  <rect x="180" y="164" width="500" height="60" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="430" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Graal JIT Compiler (자바로 작성된 최적화 JIT)</text>
  <text x="430" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HotSpot C2를 대체 · 공격적 인라이닝 · 탈출 분석 · 부분 탈출 분석</text>

  <!-- Two arrows splitting down -->
  <line x1="300" y1="224" x2="230" y2="266" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>
  <line x1="560" y1="224" x2="650" y2="266" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Left branch: Truffle -->
  <rect x="60" y="268" width="320" height="88" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="84" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Truffle 언어 구현 프레임워크</text>
  <text x="84" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">AST 인터프리터 → Graal이 JIT 컴파일</text>
  <text x="84" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JavaScript(GraalJS)·Python·Ruby·LLVM 지원</text>

  <!-- Right branch: Native Image -->
  <rect x="500" y="268" width="320" height="88" rx="8" fill="#0d2011" stroke="#55c555" stroke-width="1.5"/>
  <text x="524" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Native Image</text>
  <text x="524" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 타임 AOT 컴파일 → 네이티브 실행 파일</text>
  <text x="524" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">밀리초 기동 · 낮은 메모리 · JVM 불필요</text>

  <!-- Down arrows to outputs -->
  <line x1="220" y1="356" x2="220" y2="380" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>
  <line x1="660" y1="356" x2="660" y2="380" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Truffle output -->
  <rect x="60" y="382" width="320" height="56" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="220" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">폴리글랏 런타임</text>
  <text x="220" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">여러 언어를 같은 JVM 위에서 고성능 실행</text>

  <!-- Native Image output -->
  <rect x="500" y="382" width="320" height="56" rx="8" fill="#0d2011" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">독립 실행 바이너리</text>
  <text x="660" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨테이너·서버리스·CLI 최적</text>

  <!-- Bottom: distribution note -->
  <rect x="60" y="460" width="760" height="44" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">배포판: GraalVM Community (GPL) · Oracle GraalVM · Mandrel (Red Hat — Quarkus용)</text>
  <text x="440" y="498" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JDK 21+ 에서 Graal JIT는 JDK 자체에 포함(JEP 317/343)</text>
</svg>
