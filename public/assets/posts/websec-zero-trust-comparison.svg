<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">전통적 경계 보안 vs 제로 트러스트</text>

  <!-- Traditional Model (Left) -->
  <rect x="50" y="70" width="370" height="320" rx="8" fill="#100a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="235" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">전통적 경계 보안 (Castle &amp; Moat)</text>

  <rect x="70" y="115" width="330" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="235" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">신뢰 기준: 네트워크 위치</text>
  <text x="235" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">"내부망 = 믿을 수 있다"</text>

  <rect x="70" y="175" width="330" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="235" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">내부 트래픽 검사 없음</text>
  <text x="235" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">침입자가 내부망 진입 시 자유롭게 이동</text>

  <rect x="70" y="235" width="330" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="235" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">VPN: "연결되면 모두 신뢰"</text>
  <text x="235" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">VPN 계정 탈취 = 전체 내부망 노출</text>

  <rect x="70" y="295" width="330" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="235" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">클라우드/원격근무에 취약</text>
  <text x="235" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">경계가 불분명해진 현대 환경 부적합</text>

  <!-- Zero Trust (Right) -->
  <rect x="460" y="70" width="370" height="320" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">제로 트러스트 (Zero Trust)</text>

  <rect x="480" y="115" width="330" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">신뢰 기준: 신원 + 컨텍스트</text>
  <text x="645" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">"위치 무관, 항상 검증"</text>

  <rect x="480" y="175" width="330" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 트래픽 암호화 및 검사</text>
  <text x="645" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">내부망도 외부망과 동일하게 처리</text>

  <rect x="480" y="235" width="330" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">세션/요청마다 재검증</text>
  <text x="645" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">계정 탈취 시에도 이상 행동 탐지</text>

  <rect x="480" y="295" width="330" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">클라우드/원격근무 최적</text>
  <text x="645" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">어디서나 동일한 보안 정책 적용</text>

  <!-- Bottom bar -->
  <rect x="50" y="406" width="780" height="14" rx="4" fill="none"/>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">제로 트러스트 3원칙: 명시적 검증 · 최소 권한 접근 · 침해 가정(Assume Breach)</text>
</svg>
