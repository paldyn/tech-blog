<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">디지털 서명: 서명 생성 · 검증 흐름</text>

  <!-- Signing Section -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">① 서명 생성 (송신자 Alice — 비밀키 사용)</text>

  <!-- Message -->
  <rect x="60" y="92" width="120" height="44" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">메시지 M</text>
  <text x="120" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">원본 데이터</text>

  <line x1="182" y1="114" x2="208" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Hash -->
  <rect x="210" y="92" width="130" height="44" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1"/>
  <text x="275" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">SHA-256 해시</text>
  <text x="275" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">H = hash(M)</text>

  <line x1="342" y1="114" x2="368" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Private key -->
  <rect x="370" y="92" width="140" height="44" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">비밀키 서명</text>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">sig = Sign(privKey, H)</text>

  <line x1="512" y1="114" x2="538" y2="114" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Signature -->
  <rect x="540" y="92" width="140" height="44" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">서명 σ</text>
  <text x="610" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전송 (M과 함께)</text>

  <!-- Verification Section -->
  <text x="60" y="166" text-anchor="start" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">② 서명 검증 (수신자 Bob — 공개키 사용)</text>

  <!-- Received message -->
  <rect x="60" y="178" width="120" height="44" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">수신 메시지 M'</text>
  <text x="120" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">위조 여부 미확인</text>

  <line x1="182" y1="200" x2="208" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="210" y="178" width="130" height="44" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1"/>
  <text x="275" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">SHA-256 해시</text>
  <text x="275" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">H' = hash(M')</text>

  <!-- Received sig -->
  <rect x="60" y="250" width="120" height="44" rx="8" fill="#112211" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">수신 서명 σ</text>
  <text x="120" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Alice가 보낸 서명</text>

  <line x1="182" y1="272" x2="208" y2="272" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="210" y="250" width="160" height="44" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">공개키 복호화</text>
  <text x="290" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">H_dec = Verify(pubKey, σ)</text>

  <!-- Comparison -->
  <rect x="430" y="202" width="200" height="114" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="530" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">H' 비교 H_dec</text>

  <line x1="342" y1="200" x2="428" y2="236" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="372" y1="272" x2="428" y2="254" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Results -->
  <line x1="632" y1="236" x2="668" y2="222" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <rect x="670" y="200" width="170" height="44" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">✅ 서명 유효</text>
  <text x="755" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">무결성 + 인증 보장</text>

  <line x1="632" y1="280" x2="668" y2="290" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <rect x="670" y="270" width="170" height="44" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="755" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">❌ 서명 무효</text>
  <text x="755" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">위조 또는 변조</text>

  <!-- Properties -->
  <rect x="60" y="330" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 디지털 서명이 제공하는 3가지 보안 속성</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">인증</tspan> (Authentication):  서명자가 비밀키 소유자임을 증명</text>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#55c555" font-weight="600">무결성</tspan> (Integrity):   메시지가 서명 후 변조되지 않음을 보장</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#ce9178" font-weight="600">부인 방지</tspan> (Non-repudiation): 서명자가 나중에 서명 사실을 부인 불가</text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 단순 HMAC은 부인 방지 없음 (공유 키라 상대도 생성 가능)</text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 디지털 서명 = 비대칭 키 → 비밀키 소유자만 서명 가능</text>
</svg>
