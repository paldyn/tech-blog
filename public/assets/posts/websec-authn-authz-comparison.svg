<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">인증(Authentication) vs 인가(Authorization)</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">두 개념의 혼동이 가장 흔한 보안 취약점 중 하나다</text>

  <!-- Authentication column -->
  <rect x="60" y="88" width="360" height="280" rx="10" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">인증 (Authentication)</text>
  <text x="240" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">"당신이 누구인가?" (Who are you?)</text>

  <rect x="80" y="152" width="320" height="32" rx="6" fill="#0d1e30" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">비밀번호 · MFA · 생체인증</text>
  <rect x="80" y="192" width="320" height="32" rx="6" fill="#0d1e30" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">OAuth 토큰 · JWT · 세션</text>
  <rect x="80" y="232" width="320" height="32" rx="6" fill="#0d1e30" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SSH 키 · API 키 · 인증서</text>

  <text x="240" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">결과: 세션/토큰 발급 (신원 확인됨)</text>

  <rect x="80" y="302" width="320" height="52" rx="6" fill="#1a0808" stroke="#993333" stroke-width="1"/>
  <text x="240" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">취약점</text>
  <text x="240" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">브루트 포스 · 크리덴셜 스터핑</text>
  <text x="240" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">세션 탈취 · 피싱</text>

  <!-- vs divider -->
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#555">→</text>

  <!-- Authorization column -->
  <rect x="460" y="88" width="360" height="280" rx="10" fill="#0a2010" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">인가 (Authorization)</text>
  <text x="640" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">"무엇을 할 수 있는가?" (What can you do?)</text>

  <rect x="480" y="152" width="320" height="32" rx="6" fill="#0d2010" stroke="#336633" stroke-width="1"/>
  <text x="640" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">RBAC (역할 기반 접근 제어)</text>
  <rect x="480" y="192" width="320" height="32" rx="6" fill="#0d2010" stroke="#336633" stroke-width="1"/>
  <text x="640" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">ABAC (속성 기반 접근 제어)</text>
  <rect x="480" y="232" width="320" height="32" rx="6" fill="#0d2010" stroke="#336633" stroke-width="1"/>
  <text x="640" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">ACL (접근 제어 목록)</text>

  <text x="640" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">결과: 허용 또는 거부 (403 Forbidden)</text>

  <rect x="480" y="302" width="320" height="52" rx="6" fill="#1a0808" stroke="#993333" stroke-width="1"/>
  <text x="640" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">취약점</text>
  <text x="640" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">IDOR · 권한 상승 · 기능 레벨 접근 제어 부재</text>
  <text x="640" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">수평적(타인 데이터) · 수직적(높은 권한) 이탈</text>

  <!-- Hotel analogy -->
  <rect x="60" y="390" width="760" height="86" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">호텔 카드키 비유</text>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인증 = 체크인 시 신분증 확인 (당신이 예약한 손님임을 증명)</text>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인가 = 카드키로 열 수 있는 방 결정 (당신의 방 + 공용시설, 다른 방 불가)</text>
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">인증 성공 ≠ 모든 자원에 접근 가능. 인가를 별도로 항상 확인해야 한다.</text>
</svg>
