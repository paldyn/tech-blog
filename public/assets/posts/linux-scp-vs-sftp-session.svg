<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SFTP 세션 흐름</text>

  <!-- Client box -->
  <rect x="60" y="72" width="180" height="56" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트</text>
  <text x="150" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">sftp user@host</text>

  <!-- SSH layer -->
  <rect x="290" y="72" width="300" height="56" rx="8" fill="#1a2210" stroke="#5e6e3a" stroke-width="1.5"/>
  <text x="440" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#c8e37e" text-anchor="middle">SSH 암호화 채널</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">포트 22 / 공개키 인증</text>

  <!-- Server box -->
  <rect x="640" y="72" width="180" height="56" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="730" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">서버</text>
  <text x="730" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">sshd + sftp-server</text>

  <!-- Arrows horizontal -->
  <line x1="240" y1="100" x2="290" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="590" y1="100" x2="640" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Steps column -->
  <text x="440" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">세션 명령 흐름</text>

  <!-- Step boxes -->
  <rect x="100" y="180" width="680" height="44" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="130" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">①</text>
  <text x="150" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">연결 및 인증</text>
  <text x="150" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">sftp user@remote  →  SSH 핸드셰이크  →  sftp subsystem 시작</text>

  <rect x="100" y="232" width="680" height="44" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="130" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">②</text>
  <text x="150" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">디렉터리 탐색</text>
  <text x="150" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">sftp> pwd  /  ls  /  cd /var/log</text>

  <rect x="100" y="284" width="680" height="44" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="130" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">③</text>
  <text x="150" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">파일 다운로드 / 업로드</text>
  <text x="150" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">sftp> get syslog  /  put deploy.sh  /  reget large.tar.gz</text>

  <rect x="100" y="336" width="680" height="44" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="130" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">④</text>
  <text x="150" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">파일 관리</text>
  <text x="150" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">sftp> mkdir backups  /  rename old.log old.bak  /  rm tmp.file</text>

  <!-- Code -->
  <rect x="100" y="396" width="680" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="120" y="416" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 배치 모드: -b 옵션으로 명령 파일 실행</text>
  <text x="120" y="434" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">sftp</text>
  <text x="150" y="434" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -b commands.txt user@host</text>
  <text x="120" y="452" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># commands.txt: put file1 / put file2 / bye</text>
</svg>
