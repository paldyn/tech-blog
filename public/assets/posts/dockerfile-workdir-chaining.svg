<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340" role="img" aria-label="WORKDIR 연속 사용 예시">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">WORKDIR 연속 사용 — 경로 누적</text>

  <!-- Code block -->
  <rect x="60" y="72" width="440" height="230" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">WORKDIR</text>
  <text x="148" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> /a</text>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">WORKDIR</text>
  <text x="148" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> b</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 현재 위치: /a/b</text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">WORKDIR</text>
  <text x="148" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> c</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 현재 위치: /a/b/c</text>
  <text x="76" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">RUN</text>
  <text x="108" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> pwd</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 출력: /a/b/c</text>
  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># ENV 변수 사용 가능</text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ENV</text>
  <text x="108" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> APP_HOME=/app</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">WORKDIR</text>
  <text x="148" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> $APP_HOME</text>

  <!-- Right: path diagram -->
  <rect x="530" y="95" width="290" height="170" rx="8" fill="#111318" stroke="#2a2d3a" stroke-width="1"/>
  <text x="675" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">경로 누적 흐름</text>

  <text x="550" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">WORKDIR /a</text>
  <line x1="660" y1="152" x2="710" y2="152" stroke="#444" stroke-width="1.5"/>
  <text x="718" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">/a</text>

  <text x="550" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">WORKDIR b</text>
  <line x1="660" y1="184" x2="710" y2="184" stroke="#444" stroke-width="1.5"/>
  <text x="718" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">/a/b</text>

  <text x="550" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">WORKDIR c</text>
  <line x1="660" y1="216" x2="710" y2="216" stroke="#444" stroke-width="1.5"/>
  <text x="718" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">/a/b/c</text>

  <text x="550" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">WORKDIR /x</text>
  <line x1="660" y1="252" x2="710" y2="252" stroke="#444" stroke-width="1.5"/>
  <text x="718" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">/x (리셋)</text>

  <!-- Bottom note -->
  <text x="440" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">상대 경로는 이전 WORKDIR에 누적, 절대 경로는 리셋</text>
</svg>
