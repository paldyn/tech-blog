<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ReAct 루프: Thought → Action → Observation</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">추론(Reasoning)과 행동(Acting)의 교차 반복</text>

  <!-- Step boxes -->
  <!-- Question -->
  <rect x="290" y="88" width="300" height="44" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Question (입력)</text>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자 질문 또는 태스크</text>

  <!-- Arrow down -->
  <line x1="440" y1="132" x2="440" y2="158" stroke="#444" stroke-width="2"/>
  <polygon points="440,166 434,154 446,154" fill="#444"/>

  <!-- Thought -->
  <rect x="200" y="166" width="480" height="52" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Thought</text>
  <text x="320" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(추론 단계)</text>
  <text x="240" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">어떤 정보가 필요한지, 다음에 무엇을 할지 계획 수립</text>

  <!-- Arrow down -->
  <line x1="440" y1="218" x2="440" y2="244" stroke="#444" stroke-width="2"/>
  <polygon points="440,252 434,240 446,240" fill="#444"/>

  <!-- Action -->
  <rect x="200" y="252" width="480" height="52" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Action</text>
  <text x="310" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(행동 단계)</text>
  <text x="240" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">도구 호출: Search("키워드"), Calculator(식), Lookup(DB)</text>

  <!-- Arrow down -->
  <line x1="440" y1="304" x2="440" y2="330" stroke="#444" stroke-width="2"/>
  <polygon points="440,338 434,326 446,326" fill="#444"/>

  <!-- Observation -->
  <rect x="200" y="338" width="480" height="52" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Observation</text>
  <text x="360" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(관찰 단계)</text>
  <text x="240" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">도구 실행 결과를 컨텍스트로 추가</text>

  <!-- Loop back arrow -->
  <path d="M 200 364 Q 100 364 100 252 Q 100 192 200 192" stroke="#555" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="200,192 188,186 188,198" fill="#555"/>
  <text x="90" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" transform="rotate(-90,90,285)">반복 (필요시)</text>

  <!-- Final Answer -->
  <line x1="440" y1="390" x2="440" y2="420" stroke="#444" stroke-width="2"/>
  <polygon points="440,428 434,416 446,416" fill="#444"/>

  <rect x="290" y="428" width="300" height="40" rx="8" fill="#0d2d0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Final Answer</text>

  <!-- Right side labels -->
  <text x="700" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">LLM 내부</text>
  <text x="700" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">→ 토큰 생성</text>

  <text x="700" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">외부 실행</text>
  <text x="700" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">→ API/DB/코드</text>

  <text x="700" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨텍스트 주입</text>
  <text x="700" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">→ 프롬프트 추가</text>
</svg>
