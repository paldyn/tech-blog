<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">보상 모델 학습: PPO 트레이너 설정</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">TRL 라이브러리를 활용한 PPO 구현</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="342" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Line numbers and code -->
  <text xml:space="preserve" x="84" y="114" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8"> 1</text>
  <text xml:space="preserve" x="108" y="114" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#7ec8e3">from</text>
  <text xml:space="preserve" x="140" y="114" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff"> trl </text>
  <text xml:space="preserve" x="168" y="114" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#7ec8e3">import</text>
  <text xml:space="preserve" x="216" y="114" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff"> PPOTrainer, PPOConfig,</text>
  <text xml:space="preserve" x="84" y="132" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8"> 2</text>
  <text xml:space="preserve" x="108" y="132" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">       AutoModelForCausalLMWithValueHead</text>

  <text xml:space="preserve" x="84" y="150" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8"> 3</text>

  <text xml:space="preserve" x="84" y="168" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8"> 4</text>
  <text xml:space="preserve" x="108" y="168" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">config = </text>
  <text xml:space="preserve" x="172" y="168" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">PPOConfig(</text>

  <text xml:space="preserve" x="84" y="186" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8"> 5</text>
  <text xml:space="preserve" x="108" y="186" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">    model_name=</text>
  <text xml:space="preserve" x="222" y="186" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ce9178">"sft-model"</text>
  <text xml:space="preserve" x="310" y="186" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">,</text>

  <text xml:space="preserve" x="84" y="204" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8"> 6</text>
  <text xml:space="preserve" x="108" y="204" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">    learning_rate=</text>
  <text xml:space="preserve" x="238" y="204" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#b5cea8">1.41e-5</text>
  <text xml:space="preserve" x="294" y="204" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">,</text>

  <text xml:space="preserve" x="84" y="222" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8"> 7</text>
  <text xml:space="preserve" x="108" y="222" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">    batch_size=</text>
  <text xml:space="preserve" x="210" y="222" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#b5cea8">64</text>
  <text xml:space="preserve" x="228" y="222" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">,</text>

  <text xml:space="preserve" x="84" y="240" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8"> 8</text>
  <text xml:space="preserve" x="108" y="240" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">    ppo_epochs=</text>
  <text xml:space="preserve" x="210" y="240" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#b5cea8">4</text>
  <text xml:space="preserve" x="220" y="240" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">,</text>

  <text xml:space="preserve" x="84" y="258" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8"> 9</text>
  <text xml:space="preserve" x="108" y="258" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">    kl_penalty=</text>
  <text xml:space="preserve" x="210" y="258" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ce9178">"kl"</text>
  <text xml:space="preserve" x="242" y="258" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">,</text>

  <text xml:space="preserve" x="84" y="276" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8">10</text>
  <text xml:space="preserve" x="108" y="276" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">    init_kl_coef=</text>
  <text xml:space="preserve" x="228" y="276" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#b5cea8">0.2</text>
  <text xml:space="preserve" x="256" y="276" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">,</text>

  <text xml:space="preserve" x="84" y="294" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8">11</text>
  <text xml:space="preserve" x="108" y="294" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">)</text>

  <text xml:space="preserve" x="84" y="312" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8">12</text>

  <text xml:space="preserve" x="84" y="330" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8">13</text>
  <text xml:space="preserve" x="108" y="330" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">model = AutoModelForCausalLMWithValueHead</text>

  <text xml:space="preserve" x="84" y="348" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8">14</text>
  <text xml:space="preserve" x="108" y="348" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">        .from_pretrained(config.model_name)</text>

  <text xml:space="preserve" x="84" y="366" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8">15</text>
  <text xml:space="preserve" x="108" y="366" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">ppo_trainer = </text>
  <text xml:space="preserve" x="224" y="366" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">PPOTrainer(</text>

  <text xml:space="preserve" x="84" y="384" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#9aa4b8">16</text>
  <text xml:space="preserve" x="108" y="384" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ffffff">    config, model, ref_model, tokenizer, dataset)</text>

  <!-- Bottom labels -->
  <rect x="60" y="446" width="160" height="24" fill="#111827" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">kl_penalty: 과최적화 방지</text>

  <rect x="240" y="446" width="160" height="24" fill="#111827" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="320" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">ValueHead: 보상 예측 헤드</text>

  <rect x="420" y="446" width="160" height="24" fill="#111827" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">ref_model: 기준 SFT 모델</text>

  <rect x="600" y="446" width="180" height="24" fill="#111827" rx="4" stroke="#888" stroke-width="1"/>
  <text x="690" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">init_kl_coef: KL 초기 계수</text>
</svg>
