<svg width="880" height="400" viewBox="0 0 880 400"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">HuggingFace QA 파이프라인</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">Extractive QA 추론 + 신뢰도 필터링</text>

  <!-- Left: Basic QA pipeline -->
  <text x="220" y="96" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">① 기본 추론</text>
  <rect x="40" y="108" width="360" height="252" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="56" y="129" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">from </text>
  <text x="96" y="129" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">transformers </text>
  <text x="216" y="129" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">import </text>
  <text x="264" y="129" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">pipeline</text>

  <text x="56" y="153" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">qa </text>
  <text x="76" y="153" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="92" y="153" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">pipeline(</text>
  <text x="56" y="171" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    "question-answering"</text>
  <text x="56" y="189" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    model=</text>
  <text x="104" y="189" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"klue/roberta-base"</text>
  <text x="56" y="207" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>

  <text x="56" y="231" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">result </text>
  <text x="100" y="231" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="116" y="231" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">qa({</text>
  <text x="56" y="249" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    "question"</text>
  <text x="136" y="249" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">: </text>
  <text x="152" y="249" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"데뷔는 언제?"</text>
  <text x="56" y="267" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    "context"</text>
  <text x="128" y="267" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">: context</text>
  <text x="56" y="285" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">})</text>
  <text x="56" y="309" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># {'answer': '2013년 6월 13일',</text>
  <text x="56" y="327" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">#  'score': 0.95,</text>
  <text x="56" y="345" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">#  'start': 8, 'end': 20}</text>

  <!-- Right: Open-domain QA -->
  <text x="660" y="96" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">② 신뢰도 필터링</text>
  <rect x="480" y="108" width="360" height="252" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="496" y="129" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">def </text>
  <text x="520" y="129" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">safe_qa(question, context):</text>

  <text x="496" y="153" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    result </text>
  <text x="548" y="153" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="564" y="153" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">qa({</text>
  <text x="496" y="171" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">        "question"</text>
  <text x="584" y="171" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">: question,</text>
  <text x="496" y="189" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">        "context"</text>
  <text x="576" y="189" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">: context,</text>
  <text x="496" y="207" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    })</text>

  <text x="496" y="231" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    # 신뢰도 게이팅</text>
  <text x="496" y="249" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    if </text>
  <text x="524" y="249" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">result[</text>
  <text x="572" y="249" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"score"</text>
  <text x="624" y="249" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">] </text>
  <text x="636" y="249" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">&lt; </text>
  <text x="652" y="249" fill="#b5cea8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">0.3</text>
  <text x="496" y="267" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">        return </text>
  <text x="576" y="267" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"모르겠습니다."</text>
  <text x="496" y="285" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    return </text>
  <text x="556" y="285" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">result[</text>
  <text x="604" y="285" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"answer"</text>
  <text x="660" y="285" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">]</text>

  <text x="496" y="315" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># score 0.3 미만이면</text>
  <text x="496" y="333" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 답이 문서에 없다고 판단</text>
  <text x="496" y="351" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># → 폴백 처리 분기</text>

  <!-- Bottom note -->
  <text x="440" y="382" text-anchor="middle" fill="#888" font-size="12">EM(Exact Match) / F1이 주요 평가 지표 — KorQuAD 1.0 BERT-large: EM 85.9, F1 91.3</text>
</svg>
