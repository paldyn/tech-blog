<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">셀 병합 설정 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">mergeType · mergeRule 속성 설정</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="274" fill="#000000" rx="6" stroke="#3a4a6e"/>

  <!-- Comment 1 -->
  <text x="80" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 세로 방향 동일값 자동 병합</text>

  <!-- Cell with mergeType=merge -->
  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3">Cell</tspan><tspan fill="#ffffff"> col=</tspan><tspan fill="#b5cea8">"0"</tspan><tspan fill="#ffffff"> datacolumn=</tspan><tspan fill="#ce9178">"dept_nm"</tspan></text>

  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  mergeType=</tspan><tspan fill="#ce9178">"merge"</tspan></text>
  
  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  halign=</tspan><tspan fill="#ce9178">"center"</tspan><tspan fill="#ffffff"> valign=</tspan><tspan fill="#ce9178">"middle"</tspan><tspan fill="#ffffff">/&gt;</tspan></text>

  <!-- Comment 2 -->
  <text x="80" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 조건부 병합 — mergeRule로 컬럼 기준 지정</text>

  <!-- Cell with mergeType=merge and mergeRule -->
  <text x="80" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3">Cell</tspan><tspan fill="#ffffff"> col=</tspan><tspan fill="#b5cea8">"1"</tspan><tspan fill="#ffffff"> datacolumn=</tspan><tspan fill="#ce9178">"team_nm"</tspan></text>

  <text x="80" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  mergeType=</tspan><tspan fill="#ce9178">"merge"</tspan></text>
  
  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  mergeRule=</tspan><tspan fill="#ce9178">"dept_cd"</tspan></text>
  
  <text x="80" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  valign=</text>
  <text x="150" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"middle"</text>
  <text x="207" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">/&gt;</text>

  <!-- Comment 3 -->
  <text x="80" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// mergeType 값 종류</text>
  <text x="80" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">merge</text>
  <text x="130" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: 동일 값 자동 세로 병합</text>
  <text x="80" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">hmerge</text>
  <text x="137" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: 동일 값 자동 가로 병합</text>
  <text x="80" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">none</text>
  <text x="123" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: 병합 안함 (기본값)</text>

  <!-- Bottom note -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">mergeRule로 기준 컬럼 지정 시 해당 컬럼 값이 같을 때만 병합됨</text>
</svg>
