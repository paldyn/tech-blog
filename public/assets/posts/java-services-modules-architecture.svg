<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">서비스 — 인터페이스로 느슨하게 묶기</text>

  <defs>
    <marker id="svArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="svArrP" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- interface -->
  <rect x="350" y="78" width="180" height="56" rx="8" fill="#0d1322" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="104" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">interface Plugin</text>
  <text x="440" y="123" font-size="12" fill="#888" text-anchor="middle">api 모듈</text>

  <!-- consumer -->
  <rect x="60" y="178" width="220" height="82" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="210" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Consumer</text>
  <text x="170" y="232" font-size="12" fill="#888" text-anchor="middle">uses Plugin</text>
  <text x="170" y="250" font-size="12" fill="#888" text-anchor="middle">ServiceLoader.load(...)</text>

  <!-- provider -->
  <rect x="600" y="178" width="220" height="82" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="210" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Provider</text>
  <text x="710" y="232" font-size="12" fill="#888" text-anchor="middle">provides Plugin</text>
  <text x="710" y="250" font-size="12" fill="#888" text-anchor="middle">with MyPlugin</text>

  <!-- consumer -> interface -->
  <line x1="210" y1="178" x2="372" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#svArr)"/>
  <text x="270" y="158" font-size="12" fill="#7ec8e3">uses</text>
  <!-- provider -> interface (implements) -->
  <line x1="670" y1="178" x2="508" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#svArr)"/>
  <text x="586" y="158" font-size="12" fill="#7ec8e3">implements</text>

  <!-- ServiceLoader runtime injection -->
  <path d="M 710 262 C 600 360, 280 360, 170 262" fill="none" stroke="#7777cc" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#svArrP)"/>
  <text x="440" y="305" font-size="13" fill="#a0a0e0" text-anchor="middle">ServiceLoader가 런타임에 구현을 찾아 주입 — Consumer는 Provider를 직접 모른다</text>
</svg>
