<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SQL 표준 구현도: 주요 RDBMS 비교</text>

  <!-- Headers -->
  <rect x="60" y="70" width="760" height="36" fill="#192040" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">기능</text>
  <text x="340" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">PostgreSQL</text>
  <text x="470" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">MySQL 8</text>
  <text x="590" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">Oracle 19c</text>
  <text x="720" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">SQL Server</text>

  <!-- Vertical dividers -->
  <line x1="260" y1="70" x2="260" y2="340" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="400" y1="70" x2="400" y2="340" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="530" y1="70" x2="530" y2="340" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="655" y1="70" x2="655" y2="340" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1: CTE -->
  <rect x="60" y="106" width="760" height="38" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="130" text-anchor="middle" font-size="12" fill="#e8e8e8">CTE (WITH)</text>
  <text x="340" y="130" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="470" y="130" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="590" y="130" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="720" y="130" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>

  <!-- Row 2: Window Functions -->
  <rect x="60" y="144" width="760" height="38" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="168" text-anchor="middle" font-size="12" fill="#e8e8e8">Window 함수</text>
  <text x="340" y="168" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="470" y="168" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="590" y="168" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="720" y="168" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>

  <!-- Row 3: JSON -->
  <rect x="60" y="182" width="760" height="38" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="206" text-anchor="middle" font-size="12" fill="#e8e8e8">JSON 함수</text>
  <text x="340" y="206" text-anchor="middle" font-size="13" fill="#55c555">&#10003; (JSONB)</text>
  <text x="470" y="206" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="590" y="206" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="720" y="206" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>

  <!-- Row 4: MERGE -->
  <rect x="60" y="220" width="760" height="38" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="244" text-anchor="middle" font-size="12" fill="#e8e8e8">MERGE (Upsert)</text>
  <text x="340" y="244" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="470" y="244" text-anchor="middle" font-size="12" fill="#ce9178">INSERT...ON DUPLICATE</text>
  <text x="590" y="244" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="720" y="244" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>

  <!-- Row 5: Recursive CTE -->
  <rect x="60" y="258" width="760" height="38" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="282" text-anchor="middle" font-size="12" fill="#e8e8e8">재귀 CTE</text>
  <text x="340" y="282" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="470" y="282" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="590" y="282" text-anchor="middle" font-size="12" fill="#ce9178">CONNECT BY</text>
  <text x="720" y="282" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>

  <!-- Row 6: RETURNING -->
  <rect x="60" y="296" width="760" height="38" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="320" text-anchor="middle" font-size="12" fill="#e8e8e8">RETURNING</text>
  <text x="340" y="320" text-anchor="middle" font-size="13" fill="#55c555">&#10003;</text>
  <text x="470" y="320" text-anchor="middle" font-size="13" fill="#e05555">&#10007;</text>
  <text x="590" y="320" text-anchor="middle" font-size="12" fill="#ce9178">RETURNING INTO</text>
  <text x="720" y="320" text-anchor="middle" font-size="12" fill="#ce9178">OUTPUT</text>

  <!-- Bottom note -->
  <rect x="60" y="360" width="760" height="72" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="8"/>
  <text x="440" y="382" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">SQL 표준 준수의 현실</text>
  <text x="440" y="402" text-anchor="middle" font-size="12" fill="#888">각 RDBMS는 "SQL 표준을 지원한다"고 하지만 구현 범위와 방언이 크게 다르다</text>
  <text x="440" y="420" text-anchor="middle" font-size="12" fill="#888">이식성이 중요하면 표준 문법만, 성능이 중요하면 각 DB의 고유 기능을 활용</text>
</svg>
