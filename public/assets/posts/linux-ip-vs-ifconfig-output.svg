<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ip addr show 출력 해석</text>

  <!-- ip addr output box -->
  <rect x="60" y="72" width="760" height="220" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2:</text><text x="100" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> eth0</text><text x="136" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">: &lt;BROADCAST,MULTICAST,UP,LOWER_UP&gt;</text>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">    mtu 1500 qdisc mq state UP group default qlen 1000</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">    link/ether </text><text x="171" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">00:11:22:33:44:55</text><text x="319" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> brd ff:ff:ff:ff:ff:ff</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">    inet </text><text x="115" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">192.168.1.100/24</text><text x="241" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> brd 192.168.1.255 scope global eth0</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">    inet6 </text><text x="123" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">fe80::211:22ff:fe33:4455/64</text><text x="344" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"> scope link</text>

  <!-- Annotations -->
  <!-- Interface index -->
  <line x1="100" y1="100" x2="100" y2="310" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="86" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">인터페이스명</text>

  <!-- Flags -->
  <line x1="300" y1="100" x2="300" y2="310" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="300" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">플래그</text>

  <!-- MAC -->
  <line x1="240" y1="136" x2="240" y2="345" stroke="#ce9178" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="240" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178" text-anchor="middle">MAC 주소</text>

  <!-- IPv4 -->
  <line x1="200" y1="154" x2="200" y2="378" stroke="#55c555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">IPv4 / CIDR</text>

  <!-- IPv6 -->
  <line x1="500" y1="172" x2="500" y2="378" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="500" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">Link-local IPv6</text>

  <!-- Flags detail -->
  <rect x="60" y="190" width="760" height="70" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">UP</text><text x="104" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> = 인터페이스 활성화됨</text>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">LOWER_UP</text><text x="156" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> = 물리 링크(케이블) 연결됨</text>
  <text x="340" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">BROADCAST</text><text x="432" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> = 브로드캐스트 지원</text>
  <text x="340" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">MULTICAST</text><text x="432" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> = 멀티캐스트 지원</text>
  <text x="620" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">mtu 1500</text><text x="692" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> = 최대 패킷 크기</text>

  <text x="440" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">ip -c addr show 옵션으로 컬러 출력 가능 (터미널에서)</text>
</svg>
