  <rect x="680" y="232" width="150" height="76" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
