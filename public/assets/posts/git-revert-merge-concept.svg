<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">머지 커밋 revert — -m 옵션</text>

  <!-- Main branch commits -->
  <text x="60" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">main</text>

  <circle cx="120" cy="130" r="22" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" text-anchor="middle" font-weight="600">A</text>

  <line x1="142" y1="130" x2="218" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <circle cx="260" cy="130" r="22" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="260" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" text-anchor="middle" font-weight="600">B</text>

  <line x1="282" y1="130" x2="478" y2="130" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Merge commit -->
  <circle cx="520" cy="130" r="26" fill="#2a1a2a" stroke="#e05555" stroke-width="2"/>
  <text x="520" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e05555" text-anchor="middle" font-weight="600">Merge</text>
  <text x="520" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e05555" text-anchor="middle" font-weight="600">M</text>

  <text x="520" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">머지 커밋 (버그)</text>

  <!-- Feature branch commits -->
  <text x="320" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">feature</text>

  <circle cx="260" cy="260" r="22" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="260" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle" font-weight="600">F1</text>
  <!-- merge line from B to F1 -->
  <line x1="260" y1="152" x2="260" y2="238" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>

  <line x1="282" y1="260" x2="378" y2="260" stroke="#7777cc" stroke-width="2" marker-end="url(#arrp)"/>

  <circle cx="420" cy="260" r="22" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="420" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle" font-weight="600">F2</text>

  <!-- feature to merge line -->
  <line x1="442" y1="260" x2="508" y2="152" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Parent labels -->
  <text x="340" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">parent 1 (main)</text>
  <text x="460" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">parent 2 (feature)</text>

  <!-- Command -->
  <rect x="580" y="105" width="280" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="596" y="125" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git revert </text>
  <text x="596" y="125" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" x="700" y="125">-m 1</text>
  <text x="737" y="125" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178"> M의SHA</text>
  <text x="596" y="147" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># -m 1 = parent 1 기준으로</text>

  <!-- Explanation boxes -->
  <rect x="60" y="340" width="370" height="100" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="245" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">-m 1 (parent 1 = main)</text>
  <text x="245" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">feature 브랜치 변경을 취소</text>
  <text x="245" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">B 상태로 돌아가겠다는 의미</text>
  <text x="245" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 일반적으로 이쪽을 사용</text>

  <rect x="460" y="340" width="370" height="100" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="645" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle" font-weight="600">-m 2 (parent 2 = feature)</text>
  <text x="645" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">main 브랜치 변경을 취소</text>
  <text x="645" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">F2 상태로 돌아가겠다는 의미</text>
  <text x="645" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 드문 경우</text>
</svg>
