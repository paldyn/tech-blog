<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Micrometer Tracing + Zipkin 설정 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Spring Boot 3.x — build.gradle 의존성 + application.yml 핵심 설정</text>

  <!-- Left: build.gradle -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">build.gradle (의존성)</text>

  <rect x="60" y="114" width="380" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text xml:space="preserve" x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Micrometer Tracing BOM</text>
  <text xml:space="preserve" x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">dependencies {</text>
  <text xml:space="preserve" x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  implementation(</text>
  <text xml:space="preserve" x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">    'io.micrometer:</text>
  <text xml:space="preserve" x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">     micrometer-tracing-bridge-brave'</text>
  <text xml:space="preserve" x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  )</text>
  <text xml:space="preserve" x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  implementation(</text>
  <text xml:space="preserve" x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">    'io.zipkin.reporter2:</text>
  <text xml:space="preserve" x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">     zipkin-reporter-brave'</text>
  <text xml:space="preserve" x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  )</text>

  <!-- Right: application.yml -->
  <text x="460" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">application.yml (핵심 설정)</text>

  <rect x="460" y="114" width="360" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text xml:space="preserve" x="476" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">management:</text>
  <text xml:space="preserve" x="476" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  tracing:</text>
  <text xml:space="preserve" x="476" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    sampling:</text>
  <text xml:space="preserve" x="476" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      probability: </text>
  <text xml:space="preserve" x="600" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">1.0</text>
  <text xml:space="preserve" x="476" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">spring:</text>
  <text xml:space="preserve" x="476" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  zipkin:</text>
  <text xml:space="preserve" x="476" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    base-url:</text>
  <text xml:space="preserve" x="476" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">      http://localhost:9411</text>
  <text xml:space="preserve" x="476" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    enabled: </text>
  <text xml:space="preserve" x="580" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">true</text>
  <text xml:space="preserve" x="476" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # 운영: 0.1 (10%)</text>

  <!-- Log pattern section -->
  <text x="60" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">logback 로그 패턴 — traceId/spanId 자동 삽입</text>

  <rect x="60" y="352" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text xml:space="preserve" x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># application.yml에 Micrometer Tracing이 있으면 MDC에 자동 등록됨</text>
  <text xml:space="preserve" x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">logging:</text>
  <text xml:space="preserve" x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  pattern:</text>
  <text xml:space="preserve" x="76" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">    console: "%d [%X{traceId}/%X{spanId}] %-5p %c : %m%n"</text>

  <!-- Key concepts row -->
  <rect x="60" y="452" width="240" height="56" rx="6" fill="#111827" stroke="#3a5a8e" stroke-width="1"/>
  <text x="180" y="475" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Sampling Rate</text>
  <text x="180" y="495" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1.0 = 100% (개발) / 0.1 (운영)</text>

  <rect x="320" y="452" width="240" height="56" rx="6" fill="#111827" stroke="#3a5a8e" stroke-width="1"/>
  <text x="440" y="475" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">MDC 자동 주입</text>
  <text x="440" y="495" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">traceId, spanId 로그에 자동 포함</text>

  <rect x="580" y="452" width="240" height="56" rx="6" fill="#111827" stroke="#3a5a8e" stroke-width="1"/>
  <text x="700" y="475" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">헤더 전파</text>
  <text x="700" y="495" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">RestTemplate / WebClient 자동 처리</text>
</svg>
