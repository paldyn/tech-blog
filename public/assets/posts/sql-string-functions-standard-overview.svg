<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">표준 문자열 함수 분류</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">길이·변환·트리밍·검색·추출·연결</text>

  <!-- Category 1: Length &amp; Pad -->
  <rect x="60" y="88" width="230" height="156" rx="6" fill="#0e1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="175" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">길이 · 패딩</text>
  <line x1="60" y1="116" x2="290" y2="116" stroke="#3a4a6e"/>
  <text x="75" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CHAR_LENGTH(s)</text>
  <text x="275" y="136" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">문자 수</text>
  <text x="75" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">LENGTH(s)</text>
  <text x="275" y="154" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">바이트 수</text>
  <text x="75" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">LPAD(s, n, c)</text>
  <text x="275" y="172" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">왼쪽 패딩</text>
  <text x="75" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">RPAD(s, n, c)</text>
  <text x="275" y="190" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">오른쪽 패딩</text>
  <text x="75" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">OCTET_LENGTH(s)</text>
  <text x="275" y="208" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">바이트 수(표준)</text>
  <text x="75" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">BIT_LENGTH(s)</text>
  <text x="275" y="226" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">비트 수</text>
  <text x="75" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">CHAR(n), ASCII(s)</text>

  <!-- Category 2: Case conversion -->
  <rect x="325" y="88" width="230" height="156" rx="6" fill="#0e1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">대소문자 · 변환</text>
  <line x1="325" y1="116" x2="555" y2="116" stroke="#3a4a6e"/>
  <text x="340" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">UPPER(s)</text>
  <text x="540" y="136" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">대문자</text>
  <text x="340" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">LOWER(s)</text>
  <text x="540" y="154" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">소문자</text>
  <text x="340" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">INITCAP(s)</text>
  <text x="540" y="172" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">첫자 대문자</text>
  <text x="340" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">TRANSLATE(s,a,b)</text>
  <text x="540" y="190" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">문자 치환</text>
  <text x="340" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">REPLACE(s,a,b)</text>
  <text x="540" y="208" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">문자열 치환</text>
  <text x="340" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">REVERSE(s)</text>
  <text x="540" y="226" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">뒤집기</text>
  <text x="340" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">REPEAT(s, n)</text>

  <!-- Category 3: Trim -->
  <rect x="590" y="88" width="230" height="156" rx="6" fill="#0e1117" stroke="#7777cc" stroke-width="1.2"/>
  <text x="705" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">트리밍 · 공백</text>
  <line x1="590" y1="116" x2="820" y2="116" stroke="#3a4a6e"/>
  <text x="605" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">TRIM(s)</text>
  <text x="810" y="136" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">양쪽 공백 제거</text>
  <text x="605" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">LTRIM(s)</text>
  <text x="810" y="154" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">왼쪽 공백 제거</text>
  <text x="605" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">RTRIM(s)</text>
  <text x="810" y="172" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">오른쪽 공백 제거</text>
  <text x="605" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">TRIM(c FROM s)</text>
  <text x="810" y="190" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">특정 문자 제거</text>
  <text x="605" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">TRIM(LEADING ...)</text>
  <text x="810" y="208" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">왼쪽 특정문자</text>
  <text x="605" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">TRIM(TRAILING ...)</text>
  <text x="810" y="226" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">오른쪽 특정문자</text>
  <text x="605" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">TRIM(BOTH ...)</text>

  <!-- Category 4: Search &amp; Extract -->
  <rect x="60" y="260" width="230" height="142" rx="6" fill="#0e1117" stroke="#e05555" stroke-width="1.2"/>
  <text x="175" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">검색 · 위치</text>
  <line x1="60" y1="288" x2="290" y2="288" stroke="#3a4a6e"/>
  <text x="75" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">POSITION(a IN s)</text>
  <text x="275" y="308" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">시작 위치</text>
  <text x="75" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">INSTR(s, a)</text>
  <text x="275" y="326" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">위치(Oracle/MySQL)</text>
  <text x="75" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CHARINDEX(a, s)</text>
  <text x="275" y="344" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">위치(SQL Server)</text>
  <text x="75" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">STRPOS(s, a)</text>
  <text x="275" y="362" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">위치(PostgreSQL)</text>
  <text x="75" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">LOCATE(a, s)</text>

  <!-- Category 5: Substring -->
  <rect x="325" y="260" width="230" height="142" rx="6" fill="#0e1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">추출 · 분할</text>
  <line x1="325" y1="288" x2="555" y2="288" stroke="#3a4a6e"/>
  <text x="340" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">SUBSTRING(s,p,n)</text>
  <text x="540" y="308" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">부분 문자열</text>
  <text x="340" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">SUBSTR(s, p, n)</text>
  <text x="540" y="326" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Oracle/MySQL</text>
  <text x="340" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">LEFT(s, n)</text>
  <text x="540" y="344" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">왼쪽 n자</text>
  <text x="340" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">RIGHT(s, n)</text>
  <text x="540" y="362" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">오른쪽 n자</text>
  <text x="340" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">SPLIT_PART(s,d,n)</text>

  <!-- Category 6: Concat -->
  <rect x="590" y="260" width="230" height="142" rx="6" fill="#0e1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="705" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">연결 · 집계 연결</text>
  <line x1="590" y1="288" x2="820" y2="288" stroke="#3a4a6e"/>
  <text x="605" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">s1 || s2</text>
  <text x="810" y="308" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">연결(표준 SQL)</text>
  <text x="605" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CONCAT(s1, s2)</text>
  <text x="810" y="326" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">연결 함수</text>
  <text x="605" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CONCAT_WS(d,...)</text>
  <text x="810" y="344" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">구분자로 연결</text>
  <text x="605" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">STRING_AGG(s,d)</text>
  <text x="810" y="362" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">집계 연결(표준)</text>
  <text x="605" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">GROUP_CONCAT (MySQL)</text>

  <!-- Note -->
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">* 회색은 비표준 또는 일부 DB 지원 함수</text>
</svg>
