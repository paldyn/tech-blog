        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Next.js는 라우트별로 전략이 자동 결정됩니다 — 동적 함수 없으면 Static, 있으면 Dynamic</text>
  <text x="440" y="476"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Suspense 경계로 Dynamic 부분을 격리하면 나머지는 Static으로 유지됩니다 (Streaming)</text>
