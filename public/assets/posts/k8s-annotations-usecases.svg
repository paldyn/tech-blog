<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Annotations 실전 활용 패턴</text>

  <!-- Box 1: Ingress -->
  <rect x="50" y="68" width="370" height="180" rx="8" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="235" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Ingress Controller 설정</text>
  <rect x="66" y="102" width="338" height="134" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="122"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">annotations:</text>
  <text x="82" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  nginx.ingress.kubernetes.io/</text>
  <text x="82" y="156"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">    rewrite-target</text>
  <text x="246" y="156"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">: /</text>
  <text x="82" y="174"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  nginx.ingress.kubernetes.io/</text>
  <text x="82" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">    ssl-redirect</text>
  <text x="230" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">: </text>
  <text x="244" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">"true"</text>
  <text x="82" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  nginx.ingress.kubernetes.io/</text>
  <text x="82" y="226"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">    proxy-body-size</text>
  <text x="238" y="226"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">: </text>
  <text x="252" y="226"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">10m</text>

  <!-- Box 2: CI/CD 메타데이터 -->
  <rect x="460" y="68" width="370" height="180" rx="8" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="645" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">CI/CD 빌드 메타데이터</text>
  <rect x="476" y="102" width="338" height="134" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="122"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">annotations:</text>
  <text x="492" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  build.paldyn.io/git-commit</text>
  <text x="492" y="158"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    : </text>
  <text x="516" y="158"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">a1b2c3d4</text>
  <text x="492" y="176"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  build.paldyn.io/pipeline-url</text>
  <text x="492" y="194"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    : </text>
  <text x="516" y="194"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">https://ci.example.com/123</text>
  <text x="492" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  build.paldyn.io/owner</text>
  <text x="492" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    : </text>
  <text x="516" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">team-platform</text>

  <!-- Box 3: kubectl apply 관리 -->
  <rect x="50" y="268" width="370" height="130" rx="8" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="235" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">kubectl apply 자동 관리</text>
  <text x="70" y="314"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">apply 실행 시 자동 기록되는 annotation</text>
  <rect x="66" y="326" width="338" height="60" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="344"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">kubectl.kubernetes.io/</text>
  <text x="82" y="360"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  last-applied-configuration</text>
  <text x="82" y="376"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  # 3방향 diff에 사용 (서버사이드 apply)</text>

  <!-- Box 4: Prometheus scraping -->
  <rect x="460" y="268" width="370" height="130" rx="8" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="645" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178">Prometheus 메트릭 수집</text>
  <text x="480" y="314"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Pod annotation으로 scrape 설정 주입</text>
  <rect x="476" y="326" width="338" height="60" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="344"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">prometheus.io/scrape</text>
  <text x="634" y="344"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">: </text>
  <text x="648" y="344"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">"true"</text>
  <text x="492" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">prometheus.io/port</text>
  <text x="624" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">: </text>
  <text x="638" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">"9090"</text>
  <text x="492" y="378"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">prometheus.io/path</text>
  <text x="624" y="378"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">: </text>
  <text x="638" y="378"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">/metrics</text>

  <!-- Bottom note -->
  <rect x="50" y="416" width="780" height="52" rx="8" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="438" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">Annotation Key 네이밍 컨벤션</text>
  <text x="440" y="458" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">prefix/name 형식 권장 · prefix는 DNS 서브도메인 형식 (예: nginx.ingress.kubernetes.io) · 63자 이하</text>
</svg>
