<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">tmpfiles 설정 파일 검색 순서</text>

  <!-- Three sources -->
  <rect x="60" y="66" width="220" height="64" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">/etc/tmpfiles.d/</text>
  <text x="170" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">관리자 커스텀 (최우선)</text>

  <rect x="330" y="66" width="220" height="64" rx="8" fill="#0d100d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">/run/tmpfiles.d/</text>
  <text x="440" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">런타임 생성 설정</text>

  <rect x="600" y="66" width="220" height="64" rx="8" fill="#0d0d1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">/usr/lib/tmpfiles.d/</text>
  <text x="710" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">패키지 제공 (기본)</text>

  <!-- Arrows -->
  <line x1="170" y1="130" x2="380" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="130" x2="440" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="710" y1="130" x2="500" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Merge box -->
  <rect x="280" y="186" width="320" height="52" rx="8" fill="#1a2340" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">같은 파일명 → /etc 우선</text>
  <text x="440" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">덮어쓰기로 배포판 기본값 오버라이드 가능</text>

  <!-- Arrow down -->
  <line x1="440" y1="238" x2="440" y2="270" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Result -->
  <rect x="200" y="270" width="480" height="64" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">tmpfiles-setup.service (부팅 시)</text>
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">tmpfiles-clean.timer (주기적 정리)</text>
</svg>
