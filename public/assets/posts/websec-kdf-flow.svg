<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">비밀번호 저장 · 검증 흐름</text>

  <!-- Registration -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">등록 (Registration)</text>

  <rect x="60" y="90" width="130" height="54" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">평문 비밀번호</text>
  <text x="125" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">"myP@ssw0rd"</text>

  <line x1="192" y1="117" x2="228" y2="117" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="230" y="90" width="130" height="54" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1"/>
  <text x="295" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">솔트 생성</text>
  <text x="295" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">os.urandom(16)</text>

  <line x1="362" y1="117" x2="398" y2="117" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="400" y="90" width="160" height="54" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1"/>
  <text x="480" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Argon2id 해싱</text>
  <text x="480" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">password + salt + params</text>

  <line x1="562" y1="117" x2="598" y2="117" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="600" y="90" width="220" height="54" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">해시 저장 (DB)</text>
  <text x="710" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">$argon2id$v=19$m=65536,t=3,p=4$...</text>

  <!-- Code block for registration -->
  <rect x="60" y="158" width="760" height="82" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 등록 — argon2-cffi 라이브러리</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">from</tspan> argon2 <tspan fill="#7ec8e3" font-weight="600">import</tspan> PasswordHasher</text>
  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">ph = PasswordHasher(time_cost=<tspan fill="#b5cea8">3</tspan>, memory_cost=<tspan fill="#b5cea8">65536</tspan>, parallelism=<tspan fill="#b5cea8">4</tspan>)</text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">stored_hash = ph.hash(plaintext_password)  <tspan fill="#9aa4b8"># 솔트 자동 포함</tspan></text>

  <!-- Verification -->
  <text x="60" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">검증 (Login)</text>

  <rect x="60" y="272" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 검증 — 솔트는 stored_hash에 내장됨</text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">try</tspan>:</text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    ph.verify(stored_hash, input_password)  <tspan fill="#9aa4b8"># 일치하면 True</tspan></text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">if</tspan> ph.check_needs_rehash(stored_hash): rehash()  <tspan fill="#9aa4b8"># 파라미터 업그레이드</tspan></text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">except</tspan> VerifyMismatchError: reject()  <tspan fill="#9aa4b8"># 불일치</tspan></text>

  <!-- Note -->
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">솔트는 해시 문자열에 내장 → DB에 솔트 별도 컬럼 불필요</text>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">파라미터 강화 시: 다음 로그인에 자동 재해싱 (check_needs_rehash)</text>
</svg>
