<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">다국어 메뉴 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">언어 Dataset × 메뉴 Dataset → 런타임 바인딩</text>

  <!-- Lang Dataset box -->
  <rect x="60" y="100" width="220" height="200" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">언어 Dataset (dsLang)</text>
  <rect x="76" y="134" width="188" height="18" rx="3" fill="#1e2433"/>
  <text x="82" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">KEY</text>
  <text x="160" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">KO</text>
  <text x="218" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">EN</text>
  <line x1="76" y1="154" x2="264" y2="154" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">MNU_001</text>
  <text x="160" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">홈</text>
  <text x="218" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Home</text>
  <text x="82" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">MNU_002</text>
  <text x="160" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">공지사항</text>
  <text x="218" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Notice</text>
  <text x="82" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">MNU_003</text>
  <text x="160" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">설정</text>
  <text x="218" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Settings</text>
  <text x="82" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">MNU_004</text>
  <text x="160" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">보고서</text>
  <text x="218" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Report</text>
  <text x="170" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버 or XML 로드</text>

  <!-- Arrow 1 -->
  <line x1="280" y1="200" x2="336" y2="200" stroke="#7777cc" stroke-width="2"/>
  <polygon points="336,194 348,200 336,206" fill="#7777cc"/>
  <text x="308" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">조인</text>

  <!-- Merge logic box -->
  <rect x="348" y="150" width="180" height="100" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="438" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">언어 적용 함수</text>
  <text x="360" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">fn_applyLang(lang)</text>
  <text x="360" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dsMenu.MENU_NM =</text>
  <text x="360" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  dsLang[KEY][lang]</text>

  <!-- Arrow 2 -->
  <line x1="528" y1="200" x2="584" y2="200" stroke="#7777cc" stroke-width="2"/>
  <polygon points="584,194 596,200 584,206" fill="#7777cc"/>
  <text x="556" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">갱신</text>

  <!-- Menu component box -->
  <rect x="596" y="120" width="220" height="170" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="706" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Menu 컴포넌트</text>
  <rect x="612" y="154" width="188" height="26" rx="4" fill="#1a2a1a"/>
  <text x="706" y="171" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">홈 (KO)</text>
  <rect x="612" y="186" width="188" height="26" rx="4" fill="#1e2433"/>
  <text x="706" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">공지사항</text>
  <rect x="612" y="218" width="188" height="26" rx="4" fill="#1e2433"/>
  <text x="706" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">설정</text>
  <rect x="612" y="250" width="188" height="26" rx="4" fill="#1e2433"/>
  <text x="706" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">보고서</text>

  <!-- Language selector -->
  <rect x="200" y="350" width="480" height="80" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">언어 선택 Combo</text>
  <text x="440" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">onitemchanged → application["lang"] 저장 → fn_applyLang() 호출</text>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">KO · EN · JA · ZH · … 확장 가능</text>

  <!-- Arrow down from merge to lang selector -->
  <line x1="438" y1="250" x2="438" y2="348" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
