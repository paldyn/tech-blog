<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">한 번의 STW pause는 무엇으로 채워지나</text>

  <defs>
    <marker id="stwArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- segment labels -->
  <text x="170" y="110" font-size="14" font-weight="600" fill="#e0a055" text-anchor="middle">TTSP</text>
  <text x="170" y="130" font-size="12" fill="#888" text-anchor="middle">safepoint 도달까지</text>
  <text x="520" y="110" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">GC 작업</text>
  <text x="520" y="130" font-size="12" fill="#888" text-anchor="middle">표시·회수·압축</text>
  <text x="755" y="110" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">재개</text>

  <!-- stacked bar -->
  <rect x="80" y="145" width="180" height="52" fill="#e0a055"/>
  <rect x="260" y="145" width="450" height="52" fill="#e05555"/>
  <rect x="710" y="145" width="90" height="52" fill="#55c555"/>
  <rect x="80" y="145" width="720" height="52" fill="none" stroke="#3a4a6e" stroke-width="1"/>

  <!-- bracket: total pause -->
  <line x1="80" y1="225" x2="710" y2="225" stroke="#7ec8e3" stroke-width="2" marker-start="url(#stwArr)" marker-end="url(#stwArr)"/>
  <text x="395" y="252" font-size="14" fill="#7ec8e3" text-anchor="middle">측정되는 STW pause 시간</text>
  <text x="395" y="275" font-size="12" fill="#888" text-anchor="middle">TTSP가 길면 GC가 빨라도 pause가 길어진다</text>
</svg>
