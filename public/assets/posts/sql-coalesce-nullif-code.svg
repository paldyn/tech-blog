<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">NULL 처리 실전 패턴</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">기본값 치환 · 0 나누기 방지 · NULL 비율 계산</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="210" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 기본값 치환: NULL → '미입력'</tspan></text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#55c555">COALESCE</tspan>(phone, mobile, <tspan fill="#ce9178">'미입력'</tspan>)</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 0 나누기 방지</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">revenue / <tspan fill="#7777cc">NULLIF</tspan>(cost, <tspan fill="#b5cea8">0</tspan>)</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- NULL 비율 계산</tspan></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">COUNT</tspan>(email) * <tspan fill="#b5cea8">100.0</tspan></text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  / <tspan fill="#7ec8e3">NULLIF</tspan>(<tspan fill="#7ec8e3">COUNT</tspan>(*), <tspan fill="#b5cea8">0</tspan>) <tspan fill="#7ec8e3">AS</tspan> email_fill_rate</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- NULL을 특정 값으로 만들기 (역방향)</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7777cc">NULLIF</tspan>(TRIM(memo), <tspan fill="#ce9178">''</tspan>)</text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- 빈 문자열을 NULL로 통일</tspan></text>

  <!-- Note -->
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">COALESCE는 단락 평가 — 앞 인자가 non-NULL이면 뒤 인자를 평가하지 않음</text>
</svg>
