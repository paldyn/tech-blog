<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HashiCorp Vault 통합 &amp; 시크릿 로테이션</text>

  <!-- Vault 흐름 -->
  <text x="440" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178" text-anchor="middle">Spring Cloud Vault 동적 시크릿 흐름</text>

  <!-- 박스들 -->
  <rect x="60" y="100" width="160" height="60" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Spring Boot</text>
  <text x="140" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기동 시 토큰 획득</text>

  <line x1="220" y1="130" x2="278" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="249" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">AppRole</text>

  <rect x="280" y="100" width="160" height="60" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="360" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Vault Server</text>
  <text x="360" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시크릿 엔진</text>

  <line x1="440" y1="130" x2="498" y2="130" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="469" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">동적 자격증명</text>

  <rect x="500" y="100" width="160" height="60" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="580" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">PostgreSQL</text>
  <text x="580" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임시 계정 자동 생성</text>

  <!-- TTL 표시 -->
  <rect x="500" y="176" width="160" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="580" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">TTL 만료 → 자동 삭제</text>

  <!-- 코드 박스 1 -->
  <rect x="40" y="236" width="380" height="228" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Spring Cloud Vault 설정</text>
  <text x="60" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// build.gradle</text>
  <text x="60" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">implementation </text>
  <text x="192" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'org.springframework.cloud</text>
  <text x="60" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  :spring-cloud-starter-vault-config'</text>
  <text x="60" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// bootstrap.yml</text>
  <text x="60" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">spring.cloud.vault</text>
  <text x="60" y="380" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  host: vault.internal</text>
  <text x="60" y="400" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  port: 8200</text>
  <text x="60" y="420" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  authentication: APPROLE</text>
  <text x="60" y="440" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  app-role:</text>
  <text x="60" y="460" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    role-id: ${VAULT_ROLE_ID}</text>

  <!-- 코드 박스 2 -->
  <rect x="460" y="236" width="380" height="228" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 로테이션: @RefreshScope</text>
  <text x="480" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">@RefreshScope</text>
  <text x="480" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">@Component</text>
  <text x="480" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">class</text>
  <text x="510" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> DbConfig {</text>
  <text x="480" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  @Value(</text>
  <text x="552" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"${db.password}"</text>
  <text x="682" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="480" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  private</text>
  <text x="548" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> String password;</text>
  <text x="480" y="380" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="480" y="400" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Actuator로 재로드 트리거</text>
  <text x="480" y="420" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">POST /actuator/refresh</text>
  <text x="480" y="440" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 재시작 없이 시크릿 갱신</text>
  <text x="480" y="460" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># @RefreshScope 빈만 재생성</text>
</svg>
