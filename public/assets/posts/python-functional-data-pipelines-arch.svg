<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">함수형 데이터 파이프라인 구조</text>

  <!-- Pipeline stages -->
  <defs>
    <marker id="pla" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Stage 1: Input -->
  <rect x="60" y="74" width="140" height="60" rx="8" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="130" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">데이터 소스</text>
  <text x="130" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CSV · API · DB</text>

  <line x1="200" y1="104" x2="240" y2="104" stroke="#4a90d9" stroke-width="2" marker-end="url(#pla)"/>

  <!-- Stage 2: Parse -->
  <rect x="240" y="74" width="120" height="60" rx="8" fill="#0f2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="300" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">파싱</text>
  <text x="300" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">parse()</text>

  <line x1="360" y1="104" x2="400" y2="104" stroke="#55c555" stroke-width="2" marker-end="url(#pla)"/>

  <!-- Stage 3: Validate -->
  <rect x="400" y="74" width="120" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="460" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">검증</text>
  <text x="460" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">validate()</text>

  <line x1="520" y1="104" x2="560" y2="104" stroke="#7777cc" stroke-width="2" marker-end="url(#pla)"/>

  <!-- Stage 4: Transform -->
  <rect x="560" y="74" width="120" height="60" rx="8" fill="#2a1a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="620" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">변환</text>
  <text x="620" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">transform()</text>

  <line x1="680" y1="104" x2="720" y2="104" stroke="#ce9178" stroke-width="2" marker-end="url(#pla)"/>

  <!-- Stage 5: Output -->
  <rect x="720" y="74" width="120" height="60" rx="8" fill="#1e2a1f" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="780" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">출력/저장</text>
  <text x="780" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">save()</text>

  <!-- Principles -->
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">설계 원칙</text>

  <rect x="60" y="182" width="360" height="80" rx="6" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="240" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">각 단계는 순수 함수</text>
  <text x="240" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 in → 데이터 out</text>
  <text x="240" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">부작용 없음, 테스트 용이</text>

  <rect x="460" y="182" width="360" height="80" rx="6" fill="#0a0a1a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="640" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">불순 코드를 경계로</text>
  <text x="640" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">IO는 시작과 끝에만</text>
  <text x="640" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">중간 단계는 순수 유지</text>

  <!-- Code -->
  <rect x="60" y="282" width="760" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 파이프라인 조립</text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> toolz </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> pipe, compose</tspan>
  </text>
  <text x="76" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> run_pipeline(raw_data):</tspan>
  </text>
  <text x="76" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ffffff"> pipe(raw_data, parse, validate, transform)</tspan>
  </text>
  <text x="76" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 테스트</text>
  <text x="76" y="410" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> test_parse(): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">assert</tspan>
    <tspan fill="#ffffff"> parse(</tspan>
    <tspan fill="#ce9178">"1,2,3"</tspan>
    <tspan fill="#ffffff">) == [1,2,3]</tspan>
  </text>
</svg>
