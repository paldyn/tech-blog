<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">셔뱅(Shebang) 라인 사용법</text>

  <!-- Without shebang -->
  <rect x="50" y="68" width="370" height="190" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="235" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">셔뱅 없이 실행</text>

  <rect x="66" y="100" width="338" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># hello.py (셔뱅 없음)</text>
  <text x="82" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">print</text>
  <text x="118" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="124" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"Hello"</text>
  <text x="170" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="82" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 실행 방법: python3 지정 필수</text>
  <text x="82" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ python3 hello.py</text>
  <text x="82" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Hello</text>
  <text x="82" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">$ ./hello.py   # 실패 (인터프리터 모름)</text>

  <!-- With shebang -->
  <rect x="460" y="68" width="370" height="190" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">셔뱅 있음 + 실행 권한</text>

  <rect x="476" y="100" width="338" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">#!/usr/bin/env python3</text>
  <text x="492" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">print</text>
  <text x="528" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="534" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"Hello"</text>
  <text x="580" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="492" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 실행 권한 부여</text>
  <text x="492" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ chmod +x hello.py</text>
  <text x="492" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ ./hello.py</text>
  <text x="492" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Hello</text>

  <!-- shebang variants -->
  <rect x="50" y="278" width="780" height="90" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">셔뱅 라인 비교</text>

  <rect x="66" y="308" width="748" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">#!/usr/bin/env python3</text>
  <text x="290" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  ← 권장: PATH에서 python3 탐색 (이식성 높음)</text>
  <text x="82" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">#!/usr/bin/python3</text>
  <text x="240" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  ← 비권장: 경로 하드코딩 (환경마다 다를 수 있음)</text>

  <!-- Bottom: env diagram -->
  <rect x="50" y="388" width="780" height="72" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">OS 커널이 셔뱅을 처리하는 순서</text>

  <rect x="70" y="418" width="130" height="28" rx="5" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="135" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">① ./hello.py 실행</text>

  <polygon points="207,432 227,432 227,428 241,432 227,436 227,432" fill="#444"/>

  <rect x="247" y="418" width="140" height="28" rx="5" fill="#07111a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="317" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">② 첫 줄 #! 읽기</text>

  <polygon points="393" y="432" />
  <polygon points="393,432 413,432 413,428 427,432 413,436 413,432" fill="#444"/>

  <rect x="433" y="418" width="160" height="28" rx="5" fill="#13131f" stroke="#7777cc" stroke-width="1"/>
  <text x="513" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">③ python3 경로 확인</text>

  <polygon points="599,432 619,432 619,428 633,432 619,436 619,432" fill="#444"/>

  <rect x="639" y="418" width="170" height="28" rx="5" fill="#1a1607" stroke="#b5cea8" stroke-width="1"/>
  <text x="724" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">④ python3 hello.py 실행</text>
</svg>
