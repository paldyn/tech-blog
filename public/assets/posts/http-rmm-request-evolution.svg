<svg xmlns="http://www.w3.org/2000/svg" width="880" height="600" viewBox="0 0 880 600" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="600" rx="12" fill="#0a0a0a"/>

  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">같은 작업, 세 단계의 HTTP</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#e8e8e8">"예약 슬롯 조회 / 예약 생성"을 각 레벨에서 표현</text>

  <!-- Level 0 box -->
  <text x="60" y="118" font-size="15" font-weight="700" fill="#e05555">Level 0 — 단일 엔드포인트</text>
  <rect x="60" y="130" width="760" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">POST</tspan><tspan fill="#ffffff"> /bookingService HTTP/1.1</tspan></text>
  <text xml:space="preserve" x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Content-Type: application/xml</text>
  <text xml:space="preserve" x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">&lt;getSlots</tspan><tspan fill="#9aa4b8"> /&gt;  // 메서드명을 본문에</tspan></text>
  <text xml:space="preserve" x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 응답: 항상 </tspan><tspan fill="#b5cea8">200</tspan><tspan fill="#9aa4b8"> OK, 오류도 본문에</tspan></text>
  <text xml:space="preserve" x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// URI 하나, HTTP는 그냥 터널</tspan></text>

  <!-- Level 2 box -->
  <text x="60" y="288" font-size="15" font-weight="700" fill="#7ec8e3">Level 2 — 메서드 + 상태코드</text>
  <rect x="60" y="300" width="760" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">GET</tspan><tspan fill="#ffffff"> /slots?date=</tspan><tspan fill="#ce9178">2026-06-20</tspan><tspan fill="#9aa4b8">  // 조회</tspan></text>
  <text xml:space="preserve" x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// → </tspan><tspan fill="#b5cea8">200</tspan><tspan fill="#9aa4b8"> OK  [{ id: </tspan><tspan fill="#b5cea8">12</tspan><tspan fill="#9aa4b8">, time: </tspan><tspan fill="#ce9178">"14:00"</tspan><tspan fill="#9aa4b8"> }]</tspan></text>
  <text xml:space="preserve" x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">POST</tspan><tspan fill="#ffffff"> /slots/12/reservations</tspan><tspan fill="#9aa4b8">  // 생성</tspan></text>
  <text xml:space="preserve" x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// → </tspan><tspan fill="#b5cea8">201</tspan><tspan fill="#9aa4b8"> Created  Location: /reservations/77</tspan></text>
  <text xml:space="preserve" x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 충돌 시 → </tspan><tspan fill="#b5cea8">409</tspan><tspan fill="#9aa4b8"> Conflict</tspan></text>

  <!-- Level 3 box -->
  <text x="60" y="458" font-size="15" font-weight="700" fill="#55c555">Level 3 — 응답에 링크 포함 (HATEOAS)</text>
  <rect x="60" y="470" width="760" height="98" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="496" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// → </tspan><tspan fill="#b5cea8">201</tspan><tspan fill="#9aa4b8"> Created  { id: </tspan><tspan fill="#b5cea8">77</tspan><tspan fill="#9aa4b8">,</tspan></text>
  <text xml:space="preserve" x="76" y="516" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">   _links: {</tspan></text>
  <text xml:space="preserve" x="76" y="536" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">     self:   { href: </tspan><tspan fill="#ce9178">"/reservations/77"</tspan><tspan fill="#ffffff"> },</tspan></text>
  <text xml:space="preserve" x="76" y="556" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">     cancel: { href: </tspan><tspan fill="#ce9178">"/reservations/77"</tspan><tspan fill="#ffffff"> } } }</tspan></text>
</svg>
