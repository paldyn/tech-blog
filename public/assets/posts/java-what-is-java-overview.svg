<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Java 플랫폼 개요</text>
  <text x="440" y="72" text-anchor="middle" font-size="14" fill="#888">Write Once, Run Anywhere</text>

  <!-- Source Code box -->
  <rect x="60" y="100" width="220" height="80" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="170" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">소스 코드</text>
  <text x="170" y="150" text-anchor="middle" font-size="12" fill="#888">Hello.java</text>
  <text x="170" y="168" text-anchor="middle" font-size="11" fill="#555">개발자가 작성</text>

  <!-- javac arrow -->
  <polygon points="294,136 310,130 310,124 330,140 310,156 310,150 294,150" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="312" y="175" text-anchor="middle" font-size="11" fill="#7777cc">javac</text>

  <!-- Bytecode box -->
  <rect x="334" y="100" width="220" height="80" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="444" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">바이트코드</text>
  <text x="444" y="150" text-anchor="middle" font-size="12" fill="#888">Hello.class</text>
  <text x="444" y="168" text-anchor="middle" font-size="11" fill="#555">플랫폼 독립적</text>

  <!-- JVM arrow -->
  <polygon points="568,136 584,130 584,124 604,140 584,156 584,150 568,150" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="586" y="175" text-anchor="middle" font-size="11" fill="#7777cc">JVM</text>

  <!-- Native Execution box -->
  <rect x="608" y="100" width="212" height="80" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="714" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">네이티브 실행</text>
  <text x="714" y="150" text-anchor="middle" font-size="12" fill="#888">각 OS별 기계어</text>
  <text x="714" y="168" text-anchor="middle" font-size="11" fill="#555">Windows / Linux / macOS</text>

  <!-- JVM Platforms section -->
  <text x="440" y="222" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">JVM이 지원하는 플랫폼</text>

  <!-- Windows -->
  <rect x="60" y="240" width="168" height="70" fill="#0f1a2e" rx="8" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="144" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Windows</text>
  <text x="144" y="288" text-anchor="middle" font-size="11" fill="#888">x86 / x64 / ARM</text>
  <text x="144" y="304" text-anchor="middle" font-size="11" fill="#555">JVM for Windows</text>

  <!-- Linux -->
  <rect x="248" y="240" width="168" height="70" fill="#0f1a2e" rx="8" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="332" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Linux</text>
  <text x="332" y="288" text-anchor="middle" font-size="11" fill="#888">x64 / ARM / RISC-V</text>
  <text x="332" y="304" text-anchor="middle" font-size="11" fill="#555">JVM for Linux</text>

  <!-- macOS -->
  <rect x="436" y="240" width="168" height="70" fill="#0f1a2e" rx="8" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="520" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">macOS</text>
  <text x="520" y="288" text-anchor="middle" font-size="11" fill="#888">x64 / Apple Silicon</text>
  <text x="520" y="304" text-anchor="middle" font-size="11" fill="#555">JVM for macOS</text>

  <!-- Other -->
  <rect x="624" y="240" width="196" height="70" fill="#0f1a2e" rx="8" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="722" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">기타</text>
  <text x="722" y="288" text-anchor="middle" font-size="11" fill="#888">Solaris / AIX / Android</text>
  <text x="722" y="304" text-anchor="middle" font-size="11" fill="#555">다양한 JVM 구현체</text>

  <!-- Java characteristics -->
  <text x="440" y="352" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">Java의 핵심 특성</text>

  <rect x="60" y="368" width="356" height="108" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="238" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">언어 특성</text>
  <text x="80" y="415" font-size="12" fill="#55c555">✓</text>
  <text x="96" y="415" font-size="12" fill="#e8e8e8">객체지향 (Object-Oriented)</text>
  <text x="80" y="435" font-size="12" fill="#55c555">✓</text>
  <text x="96" y="435" font-size="12" fill="#e8e8e8">강한 타입 (Strongly Typed)</text>
  <text x="80" y="455" font-size="12" fill="#55c555">✓</text>
  <text x="96" y="455" font-size="12" fill="#e8e8e8">자동 메모리 관리 (GC)</text>
  <text x="80" y="467" font-size="12" fill="#555">이하 생략</text>

  <rect x="464" y="368" width="356" height="108" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="642" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">생태계</text>
  <text x="484" y="415" font-size="12" fill="#55c555">✓</text>
  <text x="500" y="415" font-size="12" fill="#e8e8e8">Spring / Spring Boot</text>
  <text x="484" y="435" font-size="12" fill="#55c555">✓</text>
  <text x="500" y="435" font-size="12" fill="#e8e8e8">Maven / Gradle 빌드 도구</text>
  <text x="484" y="455" font-size="12" fill="#55c555">✓</text>
  <text x="500" y="455" font-size="12" fill="#e8e8e8">JUnit / Mockito 테스트</text>
  <text x="484" y="467" font-size="12" fill="#555">이하 생략</text>

  <!-- Footer -->
  <text x="440" y="518" text-anchor="middle" font-size="11" fill="#444">Java 완전 정복 시리즈 — Part I. 언어의 본질과 역사 | PALDYN</text>
</svg>
