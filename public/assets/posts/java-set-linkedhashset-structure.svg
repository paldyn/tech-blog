<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="aord" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="ahsh" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LinkedHashSet 구조 — 삽입 순서 유지</text>

  <!-- Legend -->
  <line x1="60" y1="72" x2="90" y2="72" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ahsh)"/>
  <text x="96" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">해시 버킷 연결</text>
  <line x1="260" y1="72" x2="290" y2="72" stroke="#55c555" stroke-width="2" marker-end="url(#aord)"/>
  <text x="296" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">삽입 순서 이중 연결 리스트</text>

  <!-- Insertion order: add "c", "a", "b" -->
  <text x="440" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">add("c") → add("a") → add("b") 순서로 삽입</text>

  <!-- Hash table buckets (top) -->
  <text x="440" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">LinkedHashMap 버킷 (해시 위치 결정)</text>

  <!-- Buckets -->
  <rect x="60" y="152" width="90" height="40" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="105" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bucket[0]</text>
  <text x="105" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">"a"</text>

  <rect x="165" y="152" width="90" height="40" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="210" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bucket[1]</text>
  <text x="210" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">null</text>

  <rect x="270" y="152" width="90" height="40" rx="4" fill="#0d1420" stroke="#e8a020" stroke-width="1.5"/>
  <text x="315" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bucket[2]</text>
  <text x="315" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">"b"</text>

  <rect x="375" y="152" width="90" height="40" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="420" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bucket[3]</text>
  <text x="420" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">null</text>

  <rect x="480" y="152" width="90" height="40" rx="4" fill="#0d1420" stroke="#e8a020" stroke-width="1.5"/>
  <text x="525" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bucket[4]</text>
  <text x="525" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">"c"</text>

  <rect x="585" y="152" width="100" height="40" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="635" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">...(n-1)</text>
  <text x="635" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">...</text>

  <!-- Insertion-order doubly linked list (bottom) -->
  <text x="440" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">삽입 순서 이중 연결 리스트 (head → tail)</text>

  <!-- Nodes in insertion order: c, a, b -->
  <rect x="120" y="258" width="100" height="50" rx="6" fill="#0d1b2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1st inserted</text>
  <text x="170" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">"c"</text>

  <rect x="390" y="258" width="100" height="50" rx="6" fill="#0d1b2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2nd inserted</text>
  <text x="440" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">"a"</text>

  <rect x="660" y="258" width="100" height="50" rx="6" fill="#0d1b2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">3rd inserted</text>
  <text x="710" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">"b"</text>

  <!-- Arrows: c → a → b -->
  <line x1="221" y1="283" x2="386" y2="283" stroke="#55c555" stroke-width="2" marker-end="url(#aord)"/>
  <line x1="491" y1="283" x2="656" y2="283" stroke="#55c555" stroke-width="2" marker-end="url(#aord)"/>

  <!-- head/tail labels -->
  <text x="170" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">head</text>
  <text x="710" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">tail</text>

  <!-- Iteration result -->
  <rect x="60" y="335" width="760" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">iterator() 순서: "c" → "a" → "b" (삽입 순서 보장)</text>
  <text x="440" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HashSet: 무작위 순서 | LinkedHashSet: 삽입 순서 | TreeSet: 정렬 순서</text>

  <!-- Hash bucket to linked list connection arrows (dashed) -->
  <line x1="525" y1="192" x2="195" y2="254" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ahsh)"/>
  <line x1="105" y1="192" x2="430" y2="254" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ahsh)"/>
  <line x1="315" y1="192" x2="700" y2="254" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ahsh)"/>
</svg>
