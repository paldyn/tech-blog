<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">awk 프로그램 구조</text>

  <!-- Program structure visualization -->
  <!-- BEGIN block -->
  <rect x="60" y="75" width="230" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="175" y="100" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="600" fill="#7777cc">BEGIN { }</text>
  <text x="175" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">입력 읽기 전 실행</text>
  <text x="175" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">초기화, 헤더 출력</text>

  <!-- Main block -->
  <rect x="325" y="75" width="230" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="100" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="600" fill="#7ec8e3">pattern { action }</text>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">줄마다 반복 실행</text>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">패턴 생략 시 전체 줄</text>

  <!-- END block -->
  <rect x="590" y="75" width="230" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="100" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="600" fill="#7777cc">END { }</text>
  <text x="705" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">입력 끝난 후 실행</text>
  <text x="705" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">집계, 요약, 푸터</text>

  <!-- Arrows -->
  <line x1="290" y1="115" x2="325" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="555" y1="115" x2="590" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Fields diagram -->
  <rect x="60" y="190" width="760" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">레코드(줄)와 필드</text>
  <text x="80" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#ffffff" xml:space="preserve">Alice   30   Engineer   Seoul</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  $1      $2     $3          $4           $0 = 전체 줄   NF = 4   NR = 줄 번호</text>

  <!-- Code box -->
  <rect x="60" y="295" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 기본 패턴: 3번째 필드가 "Engineer"인 줄의 이름($1) 출력</tspan></text>
  <text x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">awk <tspan fill="#ce9178">'$3 == "Engineer" { print $1 }'</tspan> users.txt</text>
  <text x="80" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># BEGIN + main + END</tspan></text>
  <text x="80" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">awk <tspan fill="#ce9178">'BEGIN{sum=0} {sum+=$2} END{print "합계:", sum}'</tspan> nums.txt</text>
</svg>
