<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">삽입 수정 — Case 분류</text>

  <!-- Case 1 -->
  <rect x="50" y="65" width="240" height="120" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Case 1: 삼촌이 빨강</text>
  <text x="170" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">부모·삼촌 → 검정</text>
  <text x="170" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">할아버지 → 빨강</text>
  <text x="170" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">할아버지에서 재귀 검사</text>
  <text x="170" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">→ 리컬러링(Recoloring)</text>

  <!-- Case 2 -->
  <rect x="320" y="65" width="240" height="120" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">Case 2: 삼촌이 검정 (꺾임)</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">LR 또는 RL 형태</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">부모를 먼저 회전</text>
  <text x="440" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">→ Case 3으로 전환</text>
  <text x="440" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">→ 회전 1번</text>

  <!-- Case 3 -->
  <rect x="590" y="65" width="240" height="120" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">Case 3: 삼촌이 검정 (직선)</text>
  <text x="710" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">LL 또는 RR 형태</text>
  <text x="710" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">할아버지 회전 + 색 교환</text>
  <text x="710" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">부모→검정, 할아버지→빨강</text>
  <text x="710" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">→ 회전 1번 + 리컬러링</text>

  <!-- Code box -->
  <rect x="50" y="200" width="780" height="220" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> fix_insert(tree, z):</tspan>
  </text>
  <text x="66" y="240" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    while</tspan><tspan fill="#ffffff"> z.parent.color == </tspan><tspan fill="#ce9178">'RED'</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="66" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        if</tspan><tspan fill="#ffffff"> z.parent == z.parent.parent.left:</tspan>
  </text>
  <text x="66" y="276" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">            uncle = z.parent.parent.right</tspan>
  </text>
  <text x="66" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">            if</tspan><tspan fill="#ffffff"> uncle.color == </tspan><tspan fill="#ce9178">'RED'</tspan><tspan fill="#ffffff">:  </tspan><tspan fill="#9aa4b8"># Case 1</tspan>
  </text>
  <text x="66" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">                recolor(z); z = z.parent.parent</tspan>
  </text>
  <text x="66" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">            else</tspan><tspan fill="#ffffff">:                  </tspan><tspan fill="#9aa4b8"># Case 2 / 3</tspan>
  </text>
  <text x="66" y="348" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">                rotate_and_recolor(tree, z)</tspan>
  </text>
  <text x="66" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    tree.root.color = </tspan><tspan fill="#ce9178">'BLACK'</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8"># 속성 2 보장</tspan>
  </text>
  <text x="66" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 삽입·삭제 최대 O(log n) 회전, 항상 5가지 속성 유지</tspan>
  </text>
</svg>
