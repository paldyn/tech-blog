<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파인튜닝 평가 지표 선택 가이드</text>
  <text x="440" y="70" font-size="15" fill="#888" text-anchor="middle">태스크 유형에 따른 적합한 평가 메트릭 선택</text>

  <!-- Root node: 태스크 종류 -->
  <rect x="330" y="94" width="220" height="44" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="112" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">태스크 종류 선택</text>
  <text x="440" y="129" font-size="12" fill="#aaa" text-anchor="middle">어떤 작업을 수행하는가?</text>

  <!-- Branch lines from root -->
  <line x1="370" y1="138" x2="130" y2="192" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="415" y1="138" x2="305" y2="192" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="465" y1="138" x2="575" y2="192" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="510" y1="138" x2="748" y2="192" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Category 1: 분류 -->
  <rect x="60" y="192" width="140" height="40" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="208" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">분류 (Classification)</text>
  <text x="130" y="224" font-size="11" fill="#888" text-anchor="middle">레이블 예측 태스크</text>

  <!-- Category 2: 생성 -->
  <rect x="236" y="192" width="140" height="40" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="306" y="208" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">생성 (Generation)</text>
  <text x="306" y="224" font-size="11" fill="#888" text-anchor="middle">텍스트 생성 태스크</text>

  <!-- Category 3: 대화 -->
  <rect x="504" y="192" width="140" height="40" rx="8" fill="#1a100d" stroke="#e8a87c" stroke-width="1.5"/>
  <text x="574" y="208" font-size="13" font-weight="700" fill="#e8a87c" text-anchor="middle">대화 (Chat/QA)</text>
  <text x="574" y="224" font-size="11" fill="#888" text-anchor="middle">대화형 AI 태스크</text>

  <!-- Category 4: 추론 -->
  <rect x="678" y="192" width="140" height="40" rx="8" fill="#1a0d1a" stroke="#bb8fce" stroke-width="1.5"/>
  <text x="748" y="208" font-size="13" font-weight="700" fill="#bb8fce" text-anchor="middle">추론 (Reasoning)</text>
  <text x="748" y="224" font-size="11" fill="#888" text-anchor="middle">논리·수학 태스크</text>

  <!-- Connector lines to metrics -->
  <line x1="130" y1="232" x2="130" y2="276" stroke="#55c555" stroke-width="1.5"/>
  <line x1="306" y1="232" x2="306" y2="276" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="574" y1="232" x2="574" y2="276" stroke="#e8a87c" stroke-width="1.5"/>
  <line x1="748" y1="232" x2="748" y2="276" stroke="#bb8fce" stroke-width="1.5"/>

  <!-- Metrics box 1: 분류 -->
  <rect x="44" y="276" width="172" height="116" rx="8" fill="#111a11" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="296" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">Accuracy / F1-Score</text>
  <text x="130" y="313" font-size="11" fill="#aaa" text-anchor="middle">• Accuracy: 전체 정확도</text>
  <text x="130" y="329" font-size="11" fill="#aaa" text-anchor="middle">• F1: 정밀도·재현율 균형</text>
  <text x="130" y="345" font-size="11" fill="#aaa" text-anchor="middle">• Macro/Micro F1 구분</text>
  <text x="130" y="361" font-size="11" fill="#aaa" text-anchor="middle">• 불균형 데이터: F1 우선</text>
  <text x="130" y="377" font-size="11" fill="#7777cc" text-anchor="middle">sklearn.metrics 활용</text>

  <!-- Metrics box 2: 생성 -->
  <rect x="220" y="276" width="172" height="116" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="306" y="296" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">ROUGE / BLEU / BERTScore</text>
  <text x="306" y="313" font-size="11" fill="#aaa" text-anchor="middle">• ROUGE-1/2/L: 요약 평가</text>
  <text x="306" y="329" font-size="11" fill="#aaa" text-anchor="middle">• BLEU: 기계 번역 정밀도</text>
  <text x="306" y="345" font-size="11" fill="#aaa" text-anchor="middle">• BERTScore: 의미적 유사도</text>
  <text x="306" y="361" font-size="11" fill="#aaa" text-anchor="middle">• Perplexity: 언어 유창성</text>
  <text x="306" y="377" font-size="11" fill="#7777cc" text-anchor="middle">evaluate 라이브러리 활용</text>

  <!-- Metrics box 3: 대화 -->
  <rect x="490" y="276" width="168" height="116" rx="8" fill="#1a100d" stroke="#e8a87c" stroke-width="1"/>
  <text x="574" y="296" font-size="12" font-weight="700" fill="#e8a87c" text-anchor="middle">LLM-as-Judge</text>
  <text x="574" y="313" font-size="11" fill="#aaa" text-anchor="middle">• GPT-4/Claude로 채점</text>
  <text x="574" y="329" font-size="11" fill="#aaa" text-anchor="middle">• MT-Bench 방식 활용</text>
  <text x="574" y="345" font-size="11" fill="#aaa" text-anchor="middle">• 1~10점 척도 평가</text>
  <text x="574" y="361" font-size="11" fill="#aaa" text-anchor="middle">• 자동화 가능 · 비용 주의</text>
  <text x="574" y="377" font-size="11" fill="#7777cc" text-anchor="middle">인간 평가와 병행 권장</text>

  <!-- Metrics box 4: 추론 -->
  <rect x="664" y="276" width="152" height="116" rx="8" fill="#1a0d1a" stroke="#bb8fce" stroke-width="1"/>
  <text x="740" y="296" font-size="12" font-weight="700" fill="#bb8fce" text-anchor="middle">정확도 / EM / F1</text>
  <text x="740" y="313" font-size="11" fill="#aaa" text-anchor="middle">• Exact Match(EM)</text>
  <text x="740" y="329" font-size="11" fill="#aaa" text-anchor="middle">• QA F1 스코어</text>
  <text x="740" y="345" font-size="11" fill="#aaa" text-anchor="middle">• Pass@k (코드 생성)</text>
  <text x="740" y="361" font-size="11" fill="#aaa" text-anchor="middle">• 체인-오브-소트 분석</text>
  <text x="740" y="377" font-size="11" fill="#7777cc" text-anchor="middle">lm-evaluation-harness</text>

  <!-- Bottom note -->
  <rect x="60" y="412" width="760" height="44" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="440" y="430" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">공통 원칙: 평가 지표를 사전에 정의하고, 베이스라인(파인튜닝 전)과 반드시 비교하라</text>
  <text x="440" y="448" font-size="12" fill="#888" text-anchor="middle">단일 지표에 의존하지 말 것 — 여러 지표를 조합하면 더 신뢰할 수 있는 평가가 가능하다</text>
</svg>
