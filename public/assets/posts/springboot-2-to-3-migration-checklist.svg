<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring Boot 2 → 3 마이그레이션 체크리스트</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">업그레이드 전 반드시 확인해야 할 핵심 변경사항</text>

  <!-- Column headers -->
  <rect x="40" y="88" width="380" height="30" rx="4" fill="#1a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Breaking Changes (반드시 수정)</text>

  <rect x="460" y="88" width="380" height="30" rx="4" fill="#1a1a1a" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">신기능 · 개선사항 (선택적 적용)</text>

  <!-- Left: Breaking Changes -->
  <!-- Item 1 -->
  <rect x="40" y="128" width="380" height="54" rx="6" fill="#150a0a" stroke="#e05555" stroke-width="1"/>
  <text x="60" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Jakarta EE 9+ 패키지 변경</text>
  <text x="60" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">javax.* → jakarta.* (servlet, persistence, validation 등)</text>

  <!-- Item 2 -->
  <rect x="40" y="192" width="380" height="54" rx="6" fill="#150a0a" stroke="#e05555" stroke-width="1"/>
  <text x="60" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Java 17 최소 버전</text>
  <text x="60" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JDK 11 → 17 업그레이드 필수, Java 21 권장</text>

  <!-- Item 3 -->
  <rect x="40" y="256" width="380" height="54" rx="6" fill="#150a0a" stroke="#e05555" stroke-width="1"/>
  <text x="60" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Spring Security 6 변경</text>
  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SecurityFilterChain Bean 방식 필수, WebSecurityConfigurerAdapter 제거</text>

  <!-- Item 4 -->
  <rect x="40" y="320" width="380" height="54" rx="6" fill="#150a0a" stroke="#e05555" stroke-width="1"/>
  <text x="60" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Properties 키 변경</text>
  <text x="60" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">spring.redis.* → spring.data.redis.*, 다수의 키 리네임</text>

  <!-- Item 5 -->
  <rect x="40" y="384" width="380" height="54" rx="6" fill="#150a0a" stroke="#e05555" stroke-width="1"/>
  <text x="60" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Actuator 기본 노출 변경</text>
  <text x="60" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">management.endpoints.web.exposure.include 재확인 필요</text>

  <!-- Right: New Features -->
  <!-- Item A -->
  <rect x="460" y="128" width="380" height="54" rx="6" fill="#0a150a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">GraalVM Native Image</text>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@SpringBootApplication만으로 네이티브 컴파일 지원</text>

  <!-- Item B -->
  <rect x="460" y="192" width="380" height="54" rx="6" fill="#0a150a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Virtual Threads 공식 지원</text>
  <text x="480" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">spring.threads.virtual.enabled=true 설정 한 줄로 활성화</text>

  <!-- Item C -->
  <rect x="460" y="256" width="380" height="54" rx="6" fill="#0a150a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Problem Details (RFC 7807)</text>
  <text x="480" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">spring.mvc.problemdetails.enabled=true로 표준 에러 형식</text>

  <!-- Item D -->
  <rect x="460" y="320" width="380" height="54" rx="6" fill="#0a150a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Micrometer Tracing 내장</text>
  <text x="480" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Zipkin / OTLP 분산 추적 자동 구성 지원</text>

  <!-- Item E -->
  <rect x="460" y="384" width="380" height="54" rx="6" fill="#0a150a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Docker Compose 지원</text>
  <text x="480" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">compose.yml 감지 후 서비스 자동 시작 (개발 편의성)</text>

  <!-- Bottom hint -->
  <text x="440" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">OpenRewrite 플러그인으로 javax→jakarta, 설정키 변경을 자동화할 수 있다</text>
</svg>
