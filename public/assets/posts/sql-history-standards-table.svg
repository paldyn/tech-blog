<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 버전별 주요 기능 비교</text>

  <!-- Header row -->
  <rect x="60" y="64" width="760" height="32" fill="#162030"/>
  <text x="160" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">표준</text>
  <text x="360" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">핵심 추가 기능</text>
  <text x="620" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">현업 활용</text>
  <line x1="240" y1="64" x2="240" y2="360" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="480" y1="64" x2="480" y2="360" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Rows -->
  <rect x="60" y="96" width="760" height="36" fill="#0e1520"/>
  <text x="160" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">SQL-92</text>
  <text x="360" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">OUTER JOIN, CASE, CAST,</text>
  <text x="360" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">서브쿼리 표준화</text>
  <text x="620" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">대부분 DB 지원, 기준선</text>

  <rect x="60" y="132" width="760" height="36" fill="#0a1018"/>
  <text x="160" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">SQL:1999</text>
  <text x="360" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">WITH (비재귀 CTE), 재귀 CTE,</text>
  <text x="360" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">OLAP 함수, BOOLEAN 타입</text>
  <text x="620" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CTE는 현재 핵심 기능</text>

  <rect x="60" y="168" width="760" height="36" fill="#0e1520"/>
  <text x="160" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SQL:2003</text>
  <text x="360" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">윈도우 함수(OVER/PARTITION BY),</text>
  <text x="360" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">MERGE, SEQUENCE, XML</text>
  <text x="620" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">윈도우 함수는 필수 기능</text>

  <rect x="60" y="204" width="760" height="36" fill="#0a1018"/>
  <text x="160" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#9aa4b8" text-anchor="middle">SQL:2008</text>
  <text x="360" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">FETCH FIRST n ROWS, TRUNCATE,</text>
  <text x="360" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">INSTEAD OF 트리거</text>
  <text x="620" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">LIMIT 대안 표준</text>

  <rect x="60" y="240" width="760" height="36" fill="#0e1520"/>
  <text x="160" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">SQL:2016</text>
  <text x="360" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">JSON_VALUE, JSON_QUERY,</text>
  <text x="360" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">MATCH_RECOGNIZE (Row Pattern)</text>
  <text x="620" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">JSON 처리 표준화</text>

  <rect x="60" y="276" width="760" height="36" fill="#0a1018"/>
  <text x="160" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">SQL:2023</text>
  <text x="360" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">그래프 쿼리(GQL), ANY_VALUE,</text>
  <text x="360" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">UNIQUE NULLS DISTINCT</text>
  <text x="620" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">최신, 지원 DB 제한적</text>

  <!-- Lines between rows -->
  <line x1="60" y1="132" x2="820" y2="132" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="168" x2="820" y2="168" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="204" x2="820" y2="204" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="240" x2="820" y2="240" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="276" x2="820" y2="276" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="312" x2="820" y2="312" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Tip -->
  <rect x="60" y="324" width="760" height="56" fill="#111" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">실무 가이드</text>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SQL-92 + SQL:1999(CTE) + SQL:2003(윈도우 함수) 범위가 현업 핵심</text>
  <text x="440" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">DBMS 방언은 공식 문서에서 항상 확인</text>
</svg>