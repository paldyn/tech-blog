<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Record 실전 패턴</text>

  <!-- Status map -->
  <rect x="60" y="68" width="365" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">// 상태 → 설정 매핑</text>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan font-weight="600" fill="#7ec8e3">type</tspan> Status =</tspan>
    <tspan x="76" dy="20">  <tspan fill="#ce9178">"active"</tspan> | <tspan fill="#ce9178">"inactive"</tspan> | <tspan fill="#ce9178">"banned"</tspan>;</tspan>
    <tspan x="76" dy="20"> </tspan>
    <tspan x="76" dy="20"><tspan font-weight="600" fill="#7ec8e3">const</tspan> statusConfig:</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Record</tspan>&lt;Status, { label: <tspan fill="#b5cea8">string</tspan>;</tspan>
    <tspan x="76" dy="20">                color: <tspan fill="#b5cea8">string</tspan> }&gt; = {</tspan>
    <tspan x="76" dy="20">  active:   { label: <tspan fill="#ce9178">"활성"</tspan>, color: <tspan fill="#ce9178">"green"</tspan> },</tspan>
  </text>

  <!-- Lookup table pattern -->
  <rect x="455" y="68" width="365" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="471" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">// ID 조회 캐시</text>
  <text x="471" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="471" dy="0"><tspan font-weight="600" fill="#7ec8e3">type</tspan> UserCache =</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Record</tspan>&lt;<tspan fill="#b5cea8">number</tspan>, User&gt;;</tspan>
    <tspan x="471" dy="20"> </tspan>
    <tspan x="471" dy="20"><tspan font-weight="600" fill="#7ec8e3">const</tspan> cache: UserCache = {};</tspan>
    <tspan x="471" dy="20"> </tspan>
    <tspan x="471" dy="20"><tspan font-weight="600" fill="#7ec8e3">function</tspan> getUser(id: <tspan fill="#b5cea8">number</tspan>) {</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">return</tspan> cache[id];</tspan>
  </text>

  <!-- Groupby pattern -->
  <rect x="60" y="262" width="365" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">// groupBy 구현</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan font-weight="600" fill="#7ec8e3">function</tspan> groupBy&lt;T, K</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">extends</tspan> <tspan fill="#b5cea8">string</tspan>&gt;(</tspan>
    <tspan x="76" dy="20">  arr: T[],</tspan>
    <tspan x="76" dy="20">  key: (item: T) =&gt; K</tspan>
    <tspan x="76" dy="20">): <tspan font-weight="600" fill="#7ec8e3">Partial</tspan>&lt;<tspan font-weight="600" fill="#7ec8e3">Record</tspan>&lt;K, T[]&gt;&gt; {</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">return</tspan> arr.reduce(...);</tspan>
  </text>

  <!-- Validation errors -->
  <rect x="455" y="262" width="365" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="471" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">// 필드별 에러 메시지</text>
  <text x="471" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="471" dy="0"><tspan font-weight="600" fill="#7ec8e3">type</tspan> FormErrors&lt;T&gt; =</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Partial</tspan>&lt;<tspan font-weight="600" fill="#7ec8e3">Record</tspan>&lt;</tspan>
    <tspan x="471" dy="20">    <tspan font-weight="600" fill="#7ec8e3">keyof</tspan> T, <tspan fill="#b5cea8">string</tspan>&gt;&gt;;</tspan>
    <tspan x="471" dy="20"> </tspan>
    <tspan x="471" dy="20"><tspan font-weight="600" fill="#7ec8e3">const</tspan> errors:</tspan>
    <tspan x="471" dy="20">  FormErrors&lt;LoginForm&gt; = {</tspan>
    <tspan x="471" dy="20">  email: <tspan fill="#ce9178">"유효하지 않은 이메일"</tspan>,</tspan>
  </text>
</svg>
