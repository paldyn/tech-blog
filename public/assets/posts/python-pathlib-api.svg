<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pathlib.Path — 주요 속성 &amp; 메서드</text>

  <!-- Path anatomy -->
  <rect x="60" y="68" width="760" height="64" rx="8" fill="#111820" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#ffffff" text-anchor="middle" xml:space="preserve">p = Path("/home/user/project/main.py")</text>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">anchor="/", parts=("/","home","user","project","main.py"), name="main.py", stem="main", suffix=".py"</text>

  <!-- Attributes section -->
  <text x="60" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">속성 (읽기 전용)</text>

  <rect x="60" y="172" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.name</text>
  <text x="76" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일명 (확장자 포함)</text>

  <rect x="296" y="172" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="312" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.stem</text>
  <text x="312" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">확장자 제외 파일명</text>

  <rect x="532" y="172" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="548" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.suffix</text>
  <text x="548" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">확장자 (.py 형태)</text>

  <rect x="60" y="238" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.parent</text>
  <text x="76" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">상위 디렉토리 Path</text>

  <rect x="296" y="238" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="312" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.parts</text>
  <text x="312" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">경로 구성요소 튜플</text>

  <rect x="532" y="238" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="548" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.anchor</text>
  <text x="548" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">루트 드라이브/슬래시</text>

  <!-- Methods section -->
  <text x="60" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">주요 메서드</text>

  <rect x="60" y="334" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.exists()</text>
  <text x="76" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">경로 존재 여부</text>

  <rect x="296" y="334" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="312" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.is_file() / is_dir()</text>
  <text x="312" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일/디렉토리 여부</text>

  <rect x="532" y="334" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="548" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.iterdir()</text>
  <text x="548" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자식 항목 이터레이터</text>

  <rect x="60" y="400" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.glob("*.py")</text>
  <text x="76" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패턴 매칭 탐색</text>

  <rect x="296" y="400" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="312" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.read_text()</text>
  <text x="312" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일 텍스트 읽기</text>

  <rect x="532" y="400" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="548" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">p.write_text(s)</text>
  <text x="548" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일 텍스트 쓰기</text>

  <!-- Slash operator note -->
  <rect x="60" y="468" width="760" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="491" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Path("/home") / "user" / "file.txt"  →  /  연산자로 경로 합치기</text>
</svg>
