<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HTTP 버전 진화</text>

  <!-- Timeline line -->
  <line x1="80" y1="110" x2="800" y2="110" stroke="#2a3a4a" stroke-width="2"/>

  <!-- HTTP/0.9 -->
  <circle cx="100" cy="110" r="8" fill="#3a4a6a" stroke="#5a7aaa" stroke-width="1.5"/>
  <text x="100" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1991</text>
  <text x="100" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">HTTP/0.9</text>
  <text x="100" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">GET만 지원</text>
  <text x="100" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">헤더 없음</text>

  <!-- HTTP/1.0 -->
  <circle cx="260" cy="110" r="8" fill="#3a4a6a" stroke="#5a7aaa" stroke-width="1.5"/>
  <text x="260" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1996</text>
  <text x="260" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">HTTP/1.0</text>
  <text x="260" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">헤더 추가</text>
  <text x="260" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">POST 지원</text>
  <text x="260" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">연결 비지속</text>

  <!-- HTTP/1.1 -->
  <circle cx="430" cy="110" r="10" fill="#2a4a6a" stroke="#4a8aaa" stroke-width="2"/>
  <text x="430" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1997</text>
  <text x="430" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">HTTP/1.1</text>
  <text x="430" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Keep-Alive</text>
  <text x="430" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">청크 전송 인코딩</text>
  <text x="430" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">현재도 가장 널리 사용</text>

  <!-- HTTP/2 -->
  <circle cx="620" cy="110" r="10" fill="#1a3a2a" stroke="#3a8a5a" stroke-width="2"/>
  <text x="620" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2015</text>
  <text x="620" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">HTTP/2</text>
  <text x="620" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">멀티플렉싱</text>
  <text x="620" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">헤더 압축(HPACK)</text>
  <text x="620" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">바이너리 프레임</text>

  <!-- HTTP/3 -->
  <circle cx="790" cy="110" r="10" fill="#1a1a3a" stroke="#3a3a8a" stroke-width="2"/>
  <text x="790" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2022</text>
  <text x="790" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#b87ce8">HTTP/3</text>
  <text x="790" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">QUIC (UDP 기반)</text>
  <text x="790" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0-RTT 연결</text>
  <text x="790" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">패킷 유실 내성</text>

  <!-- Common properties box -->
  <rect x="50" y="280" width="780" height="100" rx="8" fill="#0f1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="440" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">모든 HTTP 버전의 공통 특성</text>
  <text x="440" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클라이언트-서버 모델  ·  요청-응답 패턴  ·  무상태(Stateless)</text>
  <text x="440" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">텍스트 기반 헤더(1.x) 또는 바이너리(2, 3)  ·  메서드·상태코드·헤더 체계</text>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2024년 기준 HTTP/1.1: ~65%  HTTP/2: ~32%  HTTP/3: ~30% (중복 협상 포함)</text>
</svg>
