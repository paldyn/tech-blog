<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">echo vs printf 비교</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">동작 차이와 선택 기준</text>

  <!-- echo column -->
  <rect x="60" y="100" width="360" height="300" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="100" width="360" height="42" fill="#7ec8e3" rx="8"/>
  <rect x="60" y="122" width="360" height="20" fill="#7ec8e3"/>
  <text x="240" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="17" font-weight="700" fill="#0a0a0a" text-anchor="middle">echo</text>

  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기본 동작</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">문자열 출력 후 자동 개행</text>
  <line x1="80" y1="200" x2="400" y2="200" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이식성</text>
  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">옵션 처리가 구현마다 다름</text>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">-e, -n 이 셸마다 다르게 동작</text>
  <line x1="80" y1="274" x2="400" y2="274" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">적합한 사용</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">단순 메시지 출력</text>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">변수 값 빠르게 확인</text>
  <line x1="80" y1="348" x2="400" y2="348" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">주요 옵션</text>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-n  개행 억제 | -e  이스케이프 해석</text>

  <!-- printf column -->
  <rect x="460" y="100" width="360" height="300" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="460" y="100" width="360" height="42" fill="#7777cc" rx="8"/>
  <rect x="460" y="122" width="360" height="20" fill="#7777cc"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">printf</text>

  <text x="480" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기본 동작</text>
  <text x="480" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">포맷 문자열로 출력 제어</text>
  <line x1="480" y1="200" x2="800" y2="200" stroke="#3a4a6e" stroke-width="1"/>

  <text x="480" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이식성</text>
  <text x="480" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">POSIX 표준 — 동작이 일관됨</text>
  <text x="480" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">스크립트 이식성에 적합</text>
  <line x1="480" y1="274" x2="800" y2="274" stroke="#3a4a6e" stroke-width="1"/>

  <text x="480" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">적합한 사용</text>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">정렬·패딩·숫자 포맷</text>
  <text x="480" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">스크립트 내 구조화 출력</text>
  <line x1="480" y1="348" x2="800" y2="348" stroke="#3a4a6e" stroke-width="1"/>

  <text x="480" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">주요 포맷</text>
  <text x="480" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">%s 문자열 | %d 정수 | %f 소수</text>

  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">스크립트에서 포맷이 필요한 출력은 printf, 단순 확인은 echo</text>
</svg>
