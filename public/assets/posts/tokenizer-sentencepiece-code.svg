<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SentencePiece 학습 및 사용 코드</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">sentencepiece 패키지로 커스텀 어휘 학습하기</text>

  <rect x="60" y="90" width="760" height="300" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="124" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> sentencepiece </text>
  <text x="240" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">as</text>
  <text x="260" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> spm</text>

  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 학습: 텍스트 파일로 커스텀 어휘 구축</text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">spm.SentencePieceTrainer.train(</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    input=</tspan><tspan fill="#ce9178">"corpus.txt"</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    model_prefix=</tspan><tspan fill="#ce9178">"my_model"</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    vocab_size=</tspan><tspan fill="#b5cea8">32000</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    model_type=</tspan><tspan fill="#ce9178">"bpe"</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    character_coverage=</tspan><tspan fill="#b5cea8">0.9999</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    pad_id=</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, unk_id=</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, bos_id=</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, eos_id=</tspan><tspan fill="#b5cea8">3</tspan></text>

  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 로드 및 사용</text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sp = spm.SentencePieceProcessor()</text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sp.load(</text>
  <text x="134" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"my_model.model"</text>
  <text x="254" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">print</tspan><tspan fill="#ffffff">(sp.encode(</tspan><tspan fill="#ce9178">"안녕하세요"</tspan><tspan fill="#ffffff">, out_type=str))</tspan></text>

  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># → ['▁안녕', '하세요']  (한국어도 자연스럽게)</text>
</svg>
