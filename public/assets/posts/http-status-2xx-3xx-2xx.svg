<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">2xx 성공 상태 코드</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">요청이 성공적으로 처리됨</text>

  <!-- 200 OK -->
  <rect x="60" y="90" width="760" height="56" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <rect x="60" y="90" width="80" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="100" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#55c555" text-anchor="middle">200</text>
  <text x="180" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">OK</text>
  <text x="180" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">요청 성공 · GET 조회·POST 처리 결과 반환 · 응답 본문 있음</text>
  <text x="700" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">GET, POST 성공</text>

  <!-- 201 Created -->
  <rect x="60" y="154" width="760" height="56" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <rect x="60" y="154" width="80" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="100" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#55c555" text-anchor="middle">201</text>
  <text x="180" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Created</text>
  <text x="180" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리소스 생성 완료 · Location 헤더에 새 URL · POST/PUT 응답</text>
  <text x="700" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">POST 생성</text>

  <!-- 202 Accepted -->
  <rect x="60" y="218" width="760" height="56" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <rect x="60" y="218" width="80" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#55c555" text-anchor="middle">202</text>
  <text x="180" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Accepted</text>
  <text x="180" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">요청 수락 · 비동기 처리 · 아직 완료 안 됨 (큐·배치 작업)</text>
  <text x="700" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">비동기 작업</text>

  <!-- 204 No Content -->
  <rect x="60" y="282" width="760" height="56" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <rect x="60" y="282" width="80" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="100" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#55c555" text-anchor="middle">204</text>
  <text x="180" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">No Content</text>
  <text x="180" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">처리 완료 · 응답 본문 없음 · DELETE 성공·에디터 자동저장에 사용</text>
  <text x="700" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">DELETE 성공</text>

  <!-- 206 Partial Content -->
  <rect x="60" y="346" width="760" height="56" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <rect x="60" y="346" width="80" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#55c555" text-anchor="middle">206</text>
  <text x="180" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Partial Content</text>
  <text x="180" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Range 요청 부분 응답 · 동영상 스트리밍·이어받기에 사용</text>
  <text x="700" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">Range 요청</text>

  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">200과 201의 차이: 200은 기존 처리, 201은 새 리소스 생성 — Location 헤더 유무로 구분</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">204는 본문 없어야 함 — Content-Length: 0 이거나 본문 아예 없어야 RFC 준수</text>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">기타: 205 Reset Content · 207 Multi-Status (WebDAV)</text>
</svg>
