<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Changelog 생성 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Conventional Commits → 태그 → git-cliff / conventional-changelog</text>

  <!-- Input: Commits -->
  <rect x="40" y="90" width="240" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">커밋 히스토리</text>
  <text x="56" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">feat(api):</text>
  <text x="140" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> GraphQL 추가</text>
  <text x="56" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e0955e">feat(ui):</text>
  <text x="128" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> 다크모드</text>
  <text x="56" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">fix(auth):</text>
  <text x="140" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> 토큰 오류</text>
  <text x="56" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">chore:</text>
  <text x="104" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#555"> 의존성 업데이트</text>
  <text x="56" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">docs:</text>
  <text x="96" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#555"> README 수정</text>
  <text x="56" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">fix(search):</text>
  <text x="152" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> 결과 정렬</text>

  <!-- Arrow -->
  <line x1="280" y1="170" x2="328" y2="170" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>
  <text x="304" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">분석</text>

  <!-- Tool box -->
  <rect x="332" y="130" width="180" height="80" rx="8" fill="#0d1220" stroke="#9988dd" stroke-width="1.5"/>
  <text x="422" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">git-cliff</text>
  <text x="422" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">또는</text>
  <text x="422" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">conventional-changelog</text>

  <!-- Arrow -->
  <line x1="512" y1="170" x2="560" y2="170" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>
  <text x="536" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">생성</text>

  <!-- Output: CHANGELOG.md -->
  <rect x="564" y="90" width="280" height="160" rx="8" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="704" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">CHANGELOG.md</text>
  <text x="580" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">## [1.3.0] - 2026-05-29</text>
  <text x="580" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">### Features</text>
  <text x="580" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">- GraphQL 추가</text>
  <text x="580" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">- 다크모드</text>
  <text x="580" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">### Bug Fixes</text>
  <text x="580" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">- 토큰 오류, 검색 정렬</text>

  <!-- Tools comparison section -->
  <text x="440" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">주요 도구 비교</text>

  <!-- git-cliff -->
  <rect x="40" y="304" width="240" height="136" rx="8" fill="#111" stroke="#9988dd" stroke-width="1"/>
  <text x="160" y="328" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9988dd">git-cliff (Rust)</text>
  <text x="56" y="352"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 빠름 (Rust 구현)</text>
  <text x="56" y="370"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· cliff.toml로 커스터마이징</text>
  <text x="56" y="388"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 여러 커밋 컨벤션 지원</text>
  <text x="56" y="406"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9988dd">git cliff --tag v1.3.0</text>
  <text x="56" y="424"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9988dd">git cliff --unreleased</text>

  <!-- conventional-changelog -->
  <rect x="296" y="304" width="260" height="136" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="426" y="328" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">conventional-changelog</text>
  <text x="312" y="352"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· npm 에코시스템 표준</text>
  <text x="312" y="370"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· semantic-release와 통합</text>
  <text x="312" y="388"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 사전설정 프리셋 풍부</text>
  <text x="312" y="406"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">npx conventional-changelog</text>
  <text x="312" y="424"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">  -p angular -i CHANGELOG.md -s</text>

  <!-- keep-a-changelog manual -->
  <rect x="572" y="304" width="268" height="136" rx="8" fill="#111" stroke="#e0955e" stroke-width="1"/>
  <text x="706" y="328" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0955e">Keep a Changelog (수동)</text>
  <text x="588" y="352"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 사람이 직접 작성</text>
  <text x="588" y="370"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· keepachangelog.com 표준 포맷</text>
  <text x="588" y="388"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· [Unreleased] 섹션 패턴</text>
  <text x="588" y="406"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 자유로운 표현 가능</text>
  <text x="588" y="424"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">작은 팀·라이브러리에 적합</text>

  <!-- Footer -->
  <text x="440" y="456" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">자동 생성 방식은 커밋 메시지 품질에 완전히 의존 — commitlint 설정이 선행되어야 한다</text>
</svg>
