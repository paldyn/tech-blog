<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">TDZ 함정 — 클로저와 기본값에서의 놀라운 동작</text>

  <!-- Left: Closure TDZ trap -->
  <rect x="60" y="66" width="370" height="300" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">TDZ + 클로저 함정</text>

  <rect x="76" y="96" width="338" height="258" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="88" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 언뜻 보면 괜찮아 보임</text>
  <text x="88" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">let x = 'outer';</text>
  <text x="88" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="88" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function f() {</text>
  <text x="88" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  console.log(x);</text>
  <text x="88" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">  // outer가 아닌 TDZ!</text>
  <text x="88" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  let x = 'inner';</text>
  <text x="88" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">}</text>
  <text x="88" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="88" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">f(); // ReferenceError!</text>
  <text x="88" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// console.log(x)가 함수 내</text>
  <text x="88" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// let x의 TDZ 구간에 있음</text>
  <text x="88" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// outer x를 참조 안 함!</text>

  <!-- Center -->
  <text x="447" y="220" text-anchor="middle" font-size="22" fill="#444">vs</text>

  <!-- Right: Default parameter TDZ -->
  <rect x="460" y="66" width="360" height="300" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">기본값 매개변수에서의 TDZ</text>

  <rect x="476" y="96" width="328" height="258" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="488" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 기본값은 왼→오 순으로 평가됨</text>
  <text x="488" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function f(</text>
  <text x="488" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  a = 1,</text>
  <text x="488" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  b = a + 1</text>
  <text x="488" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">  // b는 a가 초기화된 후라 OK</text>
  <text x="488" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">) {}</text>
  <text x="488" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="488" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 반대는 TDZ 에러</text>
  <text x="488" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function g(</text>
  <text x="488" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">  a = b, // TDZ! b 아직 초기화 전</text>
  <text x="488" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  b = 2</text>
  <text x="488" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">) {}</text>
  <text x="488" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// g() → ReferenceError</text>

  <!-- Bottom note -->
  <rect x="60" y="380" width="760" height="22" rx="4" fill="#0d1117" stroke="#2a2a2a"/>
  <text x="440" y="396" text-anchor="middle" font-size="11" fill="#888">TDZ는 '선언이 처리된 코드 위치'가 아닌 '실행 컨텍스트의 생성 시점'부터 시작됩니다 — 클로저와 기본값에서 예상외 동작을 유발합니다</text>

  <!-- Footer -->
  <text x="440" y="414" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
