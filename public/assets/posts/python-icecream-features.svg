<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="270" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">ic가 더 해 주는 것들</text>

  <rect x="60" y="86" width="370" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="114" font-size="14" font-weight="600" fill="#7ec8e3">식 텍스트 자동 표시</text>
  <text x="80" y="138" font-size="12" fill="#9aa4b8">ic(x * 2) → ic| x * 2: 84</text>

  <rect x="450" y="86" width="370" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="470" y="114" font-size="14" font-weight="600" fill="#7ec8e3">위치 추적 옵션</text>
  <text x="470" y="138" font-size="12" fill="#9aa4b8">파일·줄·함수까지 prefix로</text>

  <rect x="60" y="162" width="370" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="190" font-size="14" font-weight="600" fill="#7ec8e3">통과값 반환</text>
  <text x="80" y="214" font-size="12" fill="#9aa4b8">y = ic(compute()) — 흐름 안 끊김</text>

  <rect x="450" y="162" width="370" height="64" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="470" y="190" font-size="14" font-weight="600" fill="#55c555">한 줄로 전체 끄기</text>
  <text x="470" y="214" font-size="12" fill="#9aa4b8">ic.disable() — 삭제 안 해도 됨</text>
</svg>
