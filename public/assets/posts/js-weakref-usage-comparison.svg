<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">강한 참조 vs WeakRef — GC 허용 여부</text>

  <!-- Left: Strong Reference -->
  <text x="210" y="80" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e05555">강한 참조 (Strong Reference)</text>

  <!-- Code block left -->
  <rect x="60" y="92" width="360" height="130" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="114" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">let</tspan><tspan fill="#e8e8e8"> obj </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> { data: bigArray };</tspan>
  </text>
  <text x="76" y="132" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> cache </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> { key: obj };</tspan>
  </text>
  <text x="76" y="150" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#6a8aa0">// obj = null 해도...</tspan>
  </text>
  <text x="76" y="168" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">obj </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#e8e8e8">;</tspan>
  </text>
  <text x="76" y="186" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// cache.key가 살아있어 GC 불가!</text>
  <text x="76" y="204" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// 메모리 누수 발생!</text>

  <!-- Left diagram: variable → object locked -->
  <rect x="80" y="248" width="100" height="40" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="274" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">cache.key</text>

  <line x1="182" y1="268" x2="220" y2="268" stroke="#e05555" stroke-width="2"/>
  <polygon points="218,262 234,268 218,274" fill="#e05555"/>

  <rect x="236" y="248" width="140" height="40" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="306" y="274" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">{ data: bigArray }</text>

  <text x="210" y="324" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">GC 불가 — 참조가 살아있음</text>

  <!-- Lock icon representation -->
  <rect x="156" y="256" width="22" height="22" fill="none" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="167" y="272" text-anchor="middle" font-size="14" fill="#e05555">🔒</text>

  <!-- Right: WeakRef -->
  <text x="660" y="80" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#55c555">WeakRef (약한 참조)</text>

  <!-- Code block right -->
  <rect x="460" y="92" width="360" height="130" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="114" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">let</tspan><tspan fill="#e8e8e8"> obj </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> { data: bigArray };</tspan>
  </text>
  <text x="476" y="132" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> ref </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> WeakRef(obj);</tspan>
  </text>
  <text x="476" y="150" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">obj </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#e8e8e8">;</tspan><tspan fill="#6a8aa0"> // 강한 참조 제거</tspan>
  </text>
  <text x="476" y="168" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// GC가 수거 가능
  </text>
  <text x="476" y="186" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> alive </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> ref.deref();</tspan>
  </text>
  <text x="476" y="204" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// alive === undefined (이미 수거됨)
  </text>

  <!-- Right diagram: weakref → object, GC can break -->
  <rect x="478" y="248" width="90" height="40" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="523" y="274" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">WeakRef</text>

  <line x1="570" y1="268" x2="606" y2="268" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="604,262 620,268 604,274" fill="#55c555"/>

  <rect x="622" y="248" width="140" height="40" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="692" y="274" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">{ data: bigArray }</text>

  <!-- GC can cut -->
  <text x="692" y="310" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">↓ 강한 참조 없으면</text>
  <text x="692" y="326" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">GC가 수거 가능!</text>

  <!-- Key rules -->
  <rect x="60" y="360" width="760" height="80" fill="#0f0f1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="382" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">WeakRef 핵심 규칙</text>
  <text x="440" y="404" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">• ref.deref() — 객체가 살아있으면 반환, 수거됐으면 undefined</text>
  <text x="440" y="422" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">• WeakRef 자체는 GC를 막지 않음. 언제 수거될지는 엔진이 결정</text>

  <!-- Bottom note -->
  <text x="440" y="456" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">WeakRef는 캐시·메모이제이션에 적합. 주 로직의 생명주기 관리에는 사용 금지</text>
</svg>
