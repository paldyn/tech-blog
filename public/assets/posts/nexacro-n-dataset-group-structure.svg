<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 그룹 집계 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">addGroup 으로 그룹 생성 후 getGroupSummary로 집계 조회</text>

  <!-- ===== Original Dataset ===== -->
  <rect x="60" y="92" width="300" height="220" fill="#0f0f1a" rx="8" stroke="#444" stroke-width="1"/>
  <rect x="60" y="92" width="300" height="36" fill="#1a1a2e" rx="8"/>
  <rect x="60" y="116" width="300" height="12" fill="#1a1a2e"/>
  <text x="210" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">원본 Dataset (6행)</text>

  <line x1="180" y1="128" x2="180" y2="312" stroke="#333" stroke-width="1"/>
  <line x1="270" y1="128" x2="270" y2="312" stroke="#333" stroke-width="1"/>
  <rect x="60" y="128" width="300" height="24" fill="#1a2a1a"/>
  <text x="120" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">DEPT_CD</text>
  <text x="225" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">EMP_NM</text>
  <text x="325" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">AMT</text>

  <!-- 6 rows of data -->
  <rect x="60" y="152" width="300" height="22" fill="#0d1a0d"/><text x="120" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">D001</text><text x="225" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">김철수</text><text x="325" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">300</text>
  <rect x="60" y="174" width="300" height="22" fill="#111"/><text x="120" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">D001</text><text x="225" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">박민준</text><text x="325" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">450</text>
  <rect x="60" y="196" width="300" height="22" fill="#0d1a0d"/><text x="120" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">D001</text><text x="225" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">정수아</text><text x="325" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">520</text>
  <rect x="60" y="218" width="300" height="22" fill="#111"/><text x="120" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">D002</text><text x="225" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">이영희</text><text x="325" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">200</text>
  <rect x="60" y="240" width="300" height="22" fill="#0d1a0d"/><text x="120" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">D002</text><text x="225" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">최지원</text><text x="325" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">180</text>
  <rect x="60" y="262" width="300" height="22" fill="#111"/><text x="120" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c85a" text-anchor="middle">D003</text><text x="225" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">강하늘</text><text x="325" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">380</text>

  <!-- Arrow -->
  <polygon points="368,200 394,194 394,197 434,197 434,194 460,200 434,206 434,203 394,203 394,206" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>
  <text x="414" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">addGroup(</text>
  <text x="414" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">"DEPT_CD")</text>

  <!-- ===== Grouped Result ===== -->
  <rect x="476" y="92" width="344" height="220" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <rect x="476" y="92" width="344" height="36" fill="#0d2e0d" rx="8"/>
  <rect x="476" y="116" width="344" height="12" fill="#0d2e0d"/>
  <text x="648" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">그룹 집계 결과</text>

  <!-- Group D001 -->
  <rect x="476" y="128" width="344" height="22" fill="#0d2e0d"/>
  <text x="648" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">▼ D001 그룹 (3건)</text>
  <rect x="476" y="150" width="344" height="20" fill="#0d1a0d"/><text x="648" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">  sum(AMT) = 1,270 / avg(AMT) = 423</text>
  <rect x="476" y="170" width="344" height="20" fill="#0d1a0d"/><text x="648" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">  max(AMT) = 520 / min(AMT) = 300</text>
  <rect x="476" y="190" width="344" height="20" fill="#0d1a0d"/><text x="648" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">  cnt = 3</text>

  <!-- Group D002 -->
  <rect x="476" y="210" width="344" height="22" fill="#2e0d0d"/>
  <text x="648" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">▼ D002 그룹 (2건)</text>
  <rect x="476" y="232" width="344" height="20" fill="#1a0d0d"/><text x="648" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">  sum(AMT) = 380 / avg(AMT) = 190</text>

  <!-- Group D003 -->
  <rect x="476" y="252" width="344" height="22" fill="#2e2000"/>
  <text x="648" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8c85a" text-anchor="middle">▼ D003 그룹 (1건)</text>
  <rect x="476" y="274" width="344" height="22" fill="#1a1400"/><text x="648" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">  sum(AMT) = 380 / cnt = 1</text>

  <!-- ===== API Reference ===== -->
  <rect x="60" y="330" width="760" height="130" fill="#0f0f1a" rx="8" stroke="#444" stroke-width="1"/>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">그룹 API</text>

  <line x1="330" y1="366" x2="330" y2="448" stroke="#333" stroke-width="1"/>
  <line x1="570" y1="366" x2="570" y2="448" stroke="#333" stroke-width="1"/>

  <text x="195" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">addGroup(colName)</text>
  <text x="195" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">그룹 키 컬럼 등록</text>
  <text x="195" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">반드시 정렬 후 호출</text>

  <text x="450" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">getGroupSummary(grp, agg)</text>
  <text x="450" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">그룹별 집계 값 조회</text>
  <text x="450" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">agg: sum/avg/max/min/cnt</text>

  <text x="715" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">clearGroup()</text>
  <text x="715" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">그룹 해제</text>
  <text x="715" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">원본 순서 유지</text>
</svg>
