<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">nodeSelector — Pod와 Node 레이블 매칭</text>

  <!-- Pod -->
  <rect x="60" y="90" width="200" height="120" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Pod 스펙</text>
  <rect x="76" y="128" width="168" height="68" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">nodeSelector:</text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  gpu: "true"</text>
  <text x="84" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  zone: us-east</text>

  <!-- Scheduler -->
  <line x1="260" y1="150" x2="310" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="120" width="160" height="60" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="390" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Scheduler</text>
  <text x="390" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레이블 매칭 평가</text>

  <!-- Nodes -->
  <line x1="470" y1="150" x2="510" y2="150" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 1 - GPU, us-east -> MATCH -->
  <rect x="510" y="80" width="200" height="110" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="610" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Node A</text>
  <text x="610" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레이블:</text>
  <text x="610" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">gpu=true ✓</text>
  <text x="610" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">zone=us-east ✓</text>
  <text x="610" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">→ 스케줄 가능</text>

  <!-- Node 2 - no GPU -> NO MATCH -->
  <rect x="510" y="210" width="200" height="110" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="610" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Node B</text>
  <text x="610" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레이블:</text>
  <text x="610" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">gpu=false ✗</text>
  <text x="610" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">zone=us-east ✓</text>
  <text x="610" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">→ 스케줄 불가</text>

  <!-- Node 3 - diff zone -> NO MATCH -->
  <rect x="510" y="340" width="200" height="100" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="610" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Node C</text>
  <text x="610" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레이블:</text>
  <text x="610" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">gpu=true ✓</text>
  <text x="610" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">zone=eu-west ✗</text>

  <!-- Arrows from scheduler to nodes -->
  <line x1="470" y1="145" x2="510" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <line x1="470" y1="155" x2="510" y2="265" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrRed)"/>
  <line x1="470" y1="158" x2="510" y2="390" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrRed)"/>

  <!-- Result arrow -->
  <line x1="710" y1="135" x2="790" y2="135" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <rect x="790" y="110" width="60" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="820" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Pod</text>
  <text x="820" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">배치됨</text>

  <!-- note -->
  <text x="160" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">nodeSelector는</text>
  <text x="160" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">모든 레이블이 일치해야</text>
  <text x="160" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">AND 조건</text>
</svg>
