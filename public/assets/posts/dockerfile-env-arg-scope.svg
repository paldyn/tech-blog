<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" role="img" aria-label="ENV vs ARG 스코프 비교">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ENV vs ARG 스코프 비교</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">빌드 타임 vs 런타임, 이미지 포함 여부</text>

  <!-- Timeline bar -->
  <rect x="60" y="100" width="760" height="8" rx="4" fill="#2a2d3a"/>

  <!-- Build time zone -->
  <rect x="60" y="100" width="480" height="8" rx="4" fill="#1e3a5f"/>
  <text x="300" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">빌드 타임 (docker build)</text>

  <!-- Runtime zone -->
  <rect x="560" y="100" width="260" height="8" rx="4" fill="#1e3d1e"/>
  <text x="690" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">런타임 (docker run)</text>

  <!-- ARG box -->
  <rect x="60" y="138" width="460" height="120" rx="8" fill="#0d1520" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="290" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">ARG — 빌드 전용 인수</text>

  <text x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ARG</text>
  <text x="112" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> NODE_ENV=production</text>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 빌드 시에만 존재 — 이미지에 포함 안 됨</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• docker build --build-arg로 오버라이드</text>
  <text x="80" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">• 보안: 이미지 레이어 히스토리에 노출 가능</text>

  <!-- ENV box (spans both) -->
  <rect x="60" y="278" width="760" height="120" rx="8" fill="#0d180d" stroke="#1e3d1e" stroke-width="1.5"/>
  <text x="440" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">ENV — 빌드 + 런타임 환경변수</text>

  <text x="80" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ENV</text>
  <text x="112" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> PORT=3000 NODE_ENV=production</text>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 이미지에 포함 — 컨테이너 실행 시에도 유지</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• docker run -e PORT=8080 으로 오버라이드</text>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">• 보안: 민감 정보(비밀번호·API키) 이미지에 남음</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">비밀 정보는 ENV/ARG 대신 Docker Secrets 또는 런타임 주입 방식 사용</text>
</svg>
