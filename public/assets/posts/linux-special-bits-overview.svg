<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">특수 권한 비트 — SUID · SGID · Sticky</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">4번째 자리 8진수 비트로 제어되는 세 가지 특수 모드</text>

  <!-- SUID Box -->
  <rect x="60" y="86" width="230" height="280" rx="8" fill="#0e1018" stroke="#1e2433"/>
  <rect x="60" y="86" width="230" height="40" rx="8" fill="#2a1010"/>
  <text x="175" y="111" text-anchor="middle" font-size="16" font-weight="700" fill="#e05555">SUID (4xxx)</text>
  <text x="175" y="127" text-anchor="middle" font-size="11" fill="#888">Set User ID</text>

  <text x="80" y="156" font-size="13" fill="#888">ls -l 표시</text>
  <text x="270" y="156" text-anchor="end" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">-rws r-x r-x</text>

  <text x="80" y="182" font-size="13" fill="#888">작동 대상</text>
  <text x="270" y="182" text-anchor="end" font-size="12" fill="#e8e8e8">실행 파일만</text>

  <text x="80" y="206" font-size="13" fill="#888">효과</text>
  <text x="80" y="224" font-size="12" fill="#e8e8e8">실행 시 파일 소유자의</text>
  <text x="80" y="242" font-size="12" fill="#e8e8e8">권한으로 프로세스 실행</text>

  <rect x="80" y="256" width="170" height="40" rx="6" fill="#1a0808"/>
  <text x="165" y="271" text-anchor="middle" font-size="11" fill="#888">대표 예시</text>
  <text x="165" y="287" text-anchor="middle" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">/usr/bin/passwd</text>

  <text x="80" y="322" font-size="11" fill="#555">일반 사용자도 passwd</text>
  <text x="80" y="338" font-size="11" fill="#555">실행 시 root 권한으로</text>
  <text x="80" y="354" font-size="11" fill="#555">/etc/shadow 수정 가능</text>

  <!-- SGID Box -->
  <rect x="325" y="86" width="230" height="280" rx="8" fill="#0e1018" stroke="#1e2433"/>
  <rect x="325" y="86" width="230" height="40" rx="8" fill="#1a1a0a"/>
  <text x="440" y="111" text-anchor="middle" font-size="16" font-weight="700" fill="#7ec8e3">SGID (2xxx)</text>
  <text x="440" y="127" text-anchor="middle" font-size="11" fill="#888">Set Group ID</text>

  <text x="345" y="156" font-size="13" fill="#888">ls -l 표시</text>
  <text x="535" y="156" text-anchor="end" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">-rwx r-s r-x</text>

  <text x="345" y="182" font-size="13" fill="#888">작동 대상</text>
  <text x="535" y="182" text-anchor="end" font-size="12" fill="#e8e8e8">파일 · 디렉터리</text>

  <text x="345" y="206" font-size="13" fill="#888">효과 (파일)</text>
  <text x="345" y="224" font-size="12" fill="#e8e8e8">그룹 소유자 권한으로</text>
  <text x="345" y="242" font-size="12" fill="#e8e8e8">프로세스 실행</text>

  <rect x="345" y="256" width="170" height="40" rx="6" fill="#0a0a1a"/>
  <text x="430" y="271" text-anchor="middle" font-size="11" fill="#888">디렉터리 효과</text>
  <text x="430" y="287" text-anchor="middle" font-size="12" fill="#7ec8e3">새 파일이 부모 그룹 상속</text>

  <text x="345" y="322" font-size="11" fill="#555">협업 공유 폴더에 설정 시</text>
  <text x="345" y="338" font-size="11" fill="#555">모든 새 파일이 같은</text>
  <text x="345" y="354" font-size="11" fill="#555">그룹을 자동으로 가짐</text>

  <!-- Sticky Bit Box -->
  <rect x="590" y="86" width="230" height="280" rx="8" fill="#0e1018" stroke="#1e2433"/>
  <rect x="590" y="86" width="230" height="40" rx="8" fill="#0a1a0a"/>
  <text x="705" y="111" text-anchor="middle" font-size="16" font-weight="700" fill="#55c555">Sticky (1xxx)</text>
  <text x="705" y="127" text-anchor="middle" font-size="11" fill="#888">Restricted Deletion</text>

  <text x="610" y="156" font-size="13" fill="#888">ls -l 표시</text>
  <text x="800" y="156" text-anchor="end" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">drwx rwx rwt</text>

  <text x="610" y="182" font-size="13" fill="#888">작동 대상</text>
  <text x="800" y="182" text-anchor="end" font-size="12" fill="#e8e8e8">디렉터리</text>

  <text x="610" y="206" font-size="13" fill="#888">효과</text>
  <text x="610" y="224" font-size="12" fill="#e8e8e8">디렉터리 내 파일은</text>
  <text x="610" y="242" font-size="12" fill="#e8e8e8">소유자·root만 삭제 가능</text>

  <rect x="610" y="256" width="170" height="40" rx="6" fill="#0a1a08"/>
  <text x="695" y="271" text-anchor="middle" font-size="11" fill="#888">대표 예시</text>
  <text x="695" y="287" text-anchor="middle" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">/tmp (1777)</text>

  <text x="610" y="322" font-size="11" fill="#555">/tmp는 모든 사용자가</text>
  <text x="610" y="338" font-size="11" fill="#555">쓸 수 있지만 자기 파일만</text>
  <text x="610" y="354" font-size="11" fill="#555">삭제 가능</text>

  <!-- chmod summary -->
  <rect x="60" y="380" width="760" height="28" rx="6" fill="#141622"/>
  <text x="440" y="398" text-anchor="middle" font-size="12" fill="#888">chmod 4755 (SUID+755) · 2755 (SGID+755) · 1777 (Sticky+777) · 6755 (SUID+SGID+755)</text>
</svg>
