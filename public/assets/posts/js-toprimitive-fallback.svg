<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Symbol.toPrimitive · valueOf · toString 활용</text>

  <!-- Left: Symbol.toPrimitive -->
  <rect x="60" y="62" width="380" height="260" fill="#070b14" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="76" y="84"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc">Symbol.toPrimitive 정의</text>

  <text x="76" y="106" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">class</tspan><tspan fill="#e8e8e8"> Money {</tspan>
  </text>
  <text x="76" y="124" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  </tspan><tspan fill="#7ec8e3">constructor</tspan><tspan fill="#e8e8e8">(amount, cur) {</tspan>
  </text>
  <text x="76" y="142" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.amount </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> amount;</tspan>
  </text>
  <text x="76" y="160" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.currency </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> cur;</tspan>
  </text>
  <text x="76" y="178" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</tspan>
  </text>
  <text x="76" y="196" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  [Symbol.toPrimitive](hint) {</tspan>
  </text>
  <text x="76" y="214" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    if</tspan><tspan fill="#e8e8e8"> (hint </tspan><tspan fill="#7ec8e3">===</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#ce9178">'number'</tspan><tspan fill="#e8e8e8">)</tspan>
  </text>
  <text x="76" y="232" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">      return this</tspan><tspan fill="#e8e8e8">.amount;</tspan>
  </text>
  <text x="76" y="250" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    return</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#ce9178">`${</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ce9178">.amount}${</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ce9178">.currency}`</tspan><tspan fill="#e8e8e8">;</tspan>
  </text>
  <text x="76" y="268" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</tspan>
  </text>
  <text x="76" y="286" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</tspan>
  </text>
  <text x="76" y="304" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> m </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Money(</tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">'USD'</tspan><tspan fill="#e8e8e8">);</tspan>
  </text>
  <text x="76" y="322" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">+m          </tspan><tspan fill="#6a8aa0">// 100 (number hint)</tspan>
  </text>
  <text x="76" y="340" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ce9178">`${m}`</tspan><tspan fill="#e8e8e8">      </tspan><tspan fill="#6a8aa0">// "100USD" (string hint)</tspan>
  </text>
  <text x="76" y="358" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">m + </tspan><tspan fill="#b5cea8">50</tspan><tspan fill="#e8e8e8">      </tspan><tspan fill="#6a8aa0">// "100USD50" (default→string)</tspan>
  </text>

  <!-- Right: valueOf/toString -->
  <rect x="460" y="62" width="380" height="260" fill="#070b14" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="84"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">valueOf / toString 폴백</text>

  <text x="476" y="106" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> obj </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> {</tspan>
  </text>
  <text x="476" y="124" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  valueOf() {</tspan>
  </text>
  <text x="476" y="142" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    return</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#e8e8e8">;</tspan>
  </text>
  <text x="476" y="160" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  },</text>
  <text x="476" y="178" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  toString() {</tspan>
  </text>
  <text x="476" y="196" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    return</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#ce9178">'forty-two'</tspan><tspan fill="#e8e8e8">;</tspan>
  </text>
  <text x="476" y="214" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  },</text>
  <text x="476" y="232" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">};</text>
  <text x="476" y="268" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">+obj         </tspan><tspan fill="#6a8aa0">// 42 (valueOf)</tspan>
  </text>
  <text x="476" y="286" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">obj + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">      </tspan><tspan fill="#6a8aa0">// 43 (valueOf)</tspan>
  </text>
  <text x="476" y="304" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">String(obj)  </tspan><tspan fill="#6a8aa0">// "forty-two" (toString)</tspan>
  </text>
  <text x="476" y="322" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ce9178">`${obj}`</tspan><tspan fill="#e8e8e8">     </tspan><tspan fill="#6a8aa0">// "forty-two" (toString)</tspan>
  </text>

  <!-- Date special case -->
  <rect x="60" y="350" width="760" height="60" fill="#0f0f1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">Date 객체의 특별 규칙</text>
  <text x="440" y="394" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Date() + </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">  </tspan><tspan fill="#6a8aa0">// "Tue May 06 2026..." + "0" = 문자열 연결</tspan>
  </text>
  <text x="440" y="412" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">Date는 "default" hint에서도 toString()을 먼저 호출 (숫자 비교가 필요하면 .getTime() 사용)</text>
</svg>
