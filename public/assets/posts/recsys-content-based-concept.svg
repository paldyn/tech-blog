<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">콘텐츠 기반 필터링 파이프라인</text>

  <!-- ── 좌측 열: 사용자 히스토리 ── -->
  <rect x="30" y="68" width="180" height="30" rx="6" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="120" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">사용자 히스토리</text>

  <rect x="40" y="108" width="160" height="38" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="120" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">⭐ 인터스텔라</text>
  <text x="120" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">좋아요</text>

  <rect x="40" y="156" width="160" height="38" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="120" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">⭐ 마션</text>
  <text x="120" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">좋아요</text>

  <rect x="40" y="204" width="160" height="38" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="120" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">⭐ 그래비티</text>
  <text x="120" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">좋아요</text>

  <!-- 히스토리 → 사용자 프로파일 화살표 -->
  <line x1="200" y1="195" x2="252" y2="195" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ── 중앙-좌: 사용자 프로파일 ── -->
  <rect x="252" y="108" width="160" height="112" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="332" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">사용자 프로파일</text>
  <text x="332" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SF: 0.85</text>
  <text x="332" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">우주: 0.90</text>
  <text x="332" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">과학적: 0.78</text>
  <text x="332" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">특성 가중 평균</text>

  <!-- 사용자 프로파일 → 코사인 유사도 화살표 -->
  <line x1="412" y1="195" x2="562" y2="235" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ── 아이템 DB ── -->
  <rect x="30" y="270" width="180" height="30" rx="6" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="120" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">아이템 DB (영화 목록)</text>

  <rect x="40" y="310" width="160" height="50" rx="6" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="120" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">인터스텔라 · 마션</text>
  <text x="120" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">어벤져스 · 아이언맨 …</text>
  <text x="120" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">수천 개 아이템</text>

  <!-- 아이템 DB → 아이템 특성 벡터 화살표 -->
  <line x1="200" y1="335" x2="252" y2="305" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── 중앙-우: 아이템 특성 벡터 ── -->
  <rect x="252" y="262" width="160" height="108" rx="6" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="332" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">아이템 특성 벡터</text>
  <text x="332" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">장르 / 감독 / 배우</text>
  <text x="332" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">[SF:1, 우주:1, …]</text>
  <text x="332" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TF-IDF / 원-핫 인코딩</text>
  <text x="332" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임베딩</text>

  <!-- 아이템 특성 벡터 → 코사인 유사도 화살표 -->
  <line x1="412" y1="316" x2="562" y2="270" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── 중앙: 코사인 유사도 ── -->
  <rect x="562" y="192" width="160" height="80" rx="6" fill="#2a1a2a" stroke="#6e3a6e" stroke-width="1.5"/>
  <text x="642" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">코사인 유사도</text>
  <text x="642" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">cos(θ) = A·B / ‖A‖‖B‖</text>
  <text x="642" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">유사도 점수 산출</text>

  <!-- 코사인 유사도 → 추천 결과 화살표 -->
  <line x1="722" y1="232" x2="774" y2="232" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-p)"/>

  <!-- ── 우측: 추천 결과 ── -->
  <rect x="774" y="68" width="80" height="328" rx="6" fill="#1a0a1a" stroke="#6e3a6e" stroke-width="1.5"/>
  <text x="814" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">추천</text>
  <text x="814" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">결과</text>
  <text x="814" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">①마션</text>
  <text x="814" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">0.92</text>
  <text x="814" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">②그래비티</text>
  <text x="814" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">0.88</text>
  <text x="814" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">③콘택트</text>
  <text x="814" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">0.81</text>
</svg>
