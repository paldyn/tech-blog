<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- 배경 -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">메서드 보안 어노테이션 실전 예제</text>

  <!-- ===== 왼쪽 코드 박스 (x=50, y=68, w=378, h=362) ===== -->
  <rect x="50" y="68" width="378" height="362" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="239" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">@PreAuthorize 활용</text>
  <line x1="50" y1="104" x2="428" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <text x="66" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@PreAuthorize</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"hasRole('ADMIN')"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="66" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> void deleteUser(Long id) { ... }</tspan></text>

  <text x="66" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 인자 참조 (#param)</text>
  <text x="66" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@PreAuthorize</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"#email == authentication.name"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="66" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> UserDto getProfile(String email) { ... }</tspan></text>

  <text x="66" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 커스텀 빈 메서드 호출 (@beanName)</text>
  <text x="66" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@PreAuthorize</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"@postSecurity.isOwner(#id)"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="66" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> Post getPost(Long id) { ... }</tspan></text>

  <text x="66" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// @PostAuthorize — 반환값 검사</text>
  <text x="66" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@PostAuthorize</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="66" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#ce9178">"returnObject.ownerId == authentication.principal.id"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="66" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> Document findById(Long id) { ... }</tspan></text>

  <!-- ===== 오른쪽 코드 박스 (x=452, y=68, w=378, h=362) ===== -->
  <rect x="452" y="68" width="378" height="362" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="641" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">활성화 설정 및 기타 어노테이션</text>
  <line x1="452" y1="104" x2="830" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <text x="468" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 활성화: @Configuration 클래스에 추가</text>
  <text x="468" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@EnableMethodSecurity</tspan></text>
  <text x="468" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">(prePostEnabled = </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="468" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// @Secured — 역할 목록 방식</text>
  <text x="468" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Secured</tspan><tspan fill="#ffffff">({</tspan><tspan fill="#ce9178">"ROLE_ADMIN"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"ROLE_MANAGER"</tspan><tspan fill="#ffffff">})</tspan></text>
  <text x="468" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> void manageUsers() { ... }</tspan></text>

  <text x="468" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// @RolesAllowed — JSR-250 표준</text>
  <text x="468" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@RolesAllowed</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"ADMIN"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="468" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> List&lt;User&gt; listUsers() { ... }</tspan></text>

  <text x="468" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// @PostFilter — 반환 컬렉션 필터링</text>
  <text x="468" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@PostFilter</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"filterObject.owner == authentication.name"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="468" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> List&lt;Document&gt; findAll() { ... }</tspan></text>

  <text x="468" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 활성화 플래그 (securedEnabled)</text>
  <text x="468" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@EnableMethodSecurity</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="468" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#ffffff">securedEnabled = </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">, jsr250Enabled = </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">)</tspan></text>
</svg>
