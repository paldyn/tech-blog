<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" width="880" height="620">
  <rect width="880" height="620" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">JVM .class 파일 구조</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">Java 소스가 컴파일되면 이 포맷의 바이너리 파일이 생성된다</text>

  <!-- ─── LEFT COLUMN: File section stack ─── -->
  <text x="245" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">ClassFile 바이너리 레이아웃</text>

  <!-- 1. magic -->
  <rect x="80" y="103" width="330" height="40" rx="5"
        fill="#0c1d2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="127"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">magic</text>
  <text x="165" y="127"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">0xCAFEBABE  ·  u4 (4 bytes)</text>

  <!-- 2. versions -->
  <rect x="80" y="151" width="330" height="40" rx="5"
        fill="#131028" stroke="#7777cc" stroke-width="1.5"/>
  <text x="100" y="175"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#9999dd">minor_version / major_version</text>

  <!-- 3. constant pool (tall) -->
  <rect x="80" y="199" width="330" height="60" rx="5"
        fill="#0d1e10" stroke="#55c555" stroke-width="2"/>
  <text x="100" y="223"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">constant_pool_count  +  constant_pool[ ]</text>
  <text x="100" y="245"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">리터럴·클래스·메서드 이름 등 모든 참조 저장</text>

  <!-- 4. access_flags -->
  <rect x="80" y="267" width="330" height="40" rx="5"
        fill="#1c1c1c" stroke="#666" stroke-width="1.5"/>
  <text x="100" y="291"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#aaa">access_flags</text>
  <text x="215" y="291"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">public / final / abstract · u2</text>

  <!-- 5. this_class / super_class -->
  <rect x="80" y="315" width="330" height="40" rx="5"
        fill="#0c1d2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="339"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">this_class  /  super_class</text>
  <text x="310" y="339"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">u2 each</text>

  <!-- 6. interfaces -->
  <rect x="80" y="363" width="330" height="40" rx="5"
        fill="#1c1c1c" stroke="#666" stroke-width="1.5"/>
  <text x="100" y="387"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#aaa">interfaces_count  +  interfaces[ ]</text>

  <!-- 7. fields -->
  <rect x="80" y="411" width="330" height="40" rx="5"
        fill="#131028" stroke="#7777cc" stroke-width="1.5"/>
  <text x="100" y="435"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#9999dd">fields_count  +  fields[ ]</text>

  <!-- 8. methods (tall) -->
  <rect x="80" y="459" width="330" height="60" rx="5"
        fill="#0d1e10" stroke="#55c555" stroke-width="2"/>
  <text x="100" y="483"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">methods_count  +  methods[ ]</text>
  <text x="100" y="505"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">각 메서드의 Code, 예외 테이블 등 포함</text>

  <!-- 9. attributes -->
  <rect x="80" y="527" width="330" height="40" rx="5"
        fill="#1c1c1c" stroke="#666" stroke-width="1.5"/>
  <text x="100" y="551"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#aaa">attributes_count  +  attributes[ ]</text>

  <!-- ─── RIGHT COLUMN: Key details ─── -->

  <!-- Detail box 1: Magic Number -->
  <rect x="460" y="103" width="360" height="80" rx="6"
        fill="#0c1a22" stroke="#7ec8e3" stroke-width="1"/>
  <text x="478" y="124"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">매직 넘버 (Magic Number)</text>
  <text x="478" y="144"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">모든 .class 파일은 0xCAFEBABE로 시작한다.</text>
  <text x="478" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">JVM이 파일 유효성을 검사하는 첫 번째 단계.</text>

  <!-- Connector: magic → detail 1 -->
  <line x1="410" y1="123" x2="458" y2="123" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Detail box 2: Version -->
  <rect x="460" y="199" width="360" height="100" rx="6"
        fill="#131028" stroke="#7777cc" stroke-width="1"/>
  <text x="478" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#9999dd">버전 (Version)</text>
  <text x="478" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">major_version 으로 Java 릴리즈를 식별한다.</text>
  <text x="478" y="258"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Java 8 → 52  ·  Java 11 → 55</text>
  <text x="478" y="276"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Java 17 → 61  ·  Java 21 → 65</text>

  <!-- Connector: version → detail 2 -->
  <line x1="410" y1="171" x2="458" y2="230" stroke="#7777cc" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Detail box 3: Constant Pool -->
  <rect x="460" y="315" width="360" height="100" rx="6"
        fill="#0d1e10" stroke="#55c555" stroke-width="1"/>
  <text x="478" y="336"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">상수 풀 (Constant Pool)</text>
  <text x="478" y="356"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">클래스 내의 모든 심볼 정보를 저장하는 테이블.</text>
  <text x="478" y="374"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">문자열 리터럴, 클래스/메서드/필드 이름, 타입</text>
  <text x="478" y="392"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">디스크립터가 인덱스(#n)로 참조된다.</text>

  <!-- Connector: constant_pool → detail 3 -->
  <line x1="410" y1="229" x2="458" y2="350" stroke="#55c555" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Detail box 4: Methods -->
  <rect x="460" y="431" width="360" height="100" rx="6"
        fill="#0d1e10" stroke="#55c555" stroke-width="1"/>
  <text x="478" y="452"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">메서드 테이블 (Methods)</text>
  <text x="478" y="472"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">각 메서드마다 Code 어트리뷰트가 존재한다.</text>
  <text x="478" y="490"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Code 안에 바이트코드 명령 스트림, 최대 스택</text>
  <text x="478" y="508"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">크기, 지역 변수 슬롯 수, 예외 테이블이 포함.</text>

  <!-- Connector: methods → detail 4 -->
  <line x1="410" y1="489" x2="458" y2="480" stroke="#55c555" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Legend strip at bottom -->
  <rect x="80" y="580" width="16" height="12" rx="2" fill="#0d1e10" stroke="#55c555" stroke-width="1.5"/>
  <text x="102" y="591"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777">핵심 섹션</text>
  <rect x="200" y="580" width="16" height="12" rx="2" fill="#1c1c1c" stroke="#666" stroke-width="1.5"/>
  <text x="222" y="591"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777">보조 섹션</text>
  <rect x="320" y="580" width="16" height="12" rx="2" fill="#0c1d2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="342" y="591"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777">참조 섹션</text>
  <rect x="440" y="580" width="16" height="12" rx="2" fill="#131028" stroke="#7777cc" stroke-width="1.5"/>
  <text x="462" y="591"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777">버전/필드 섹션</text>
</svg>
