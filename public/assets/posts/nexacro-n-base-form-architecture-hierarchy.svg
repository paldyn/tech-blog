  <!-- Benefits box -->
  <rect x="40" y="406" width="800" height="80" rx="8" fill="#0a0a0a" stroke="#888" stroke-width="1"/>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
