  <rect x="60" y="200" width="280" height="70" rx="8" fill="#0a0a14" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
