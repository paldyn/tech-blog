  <!-- Lines from BaseForm -->
  <line x1="340" y1="154" x2="200" y2="200" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="440" y1="154" x2="440" y2="200" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="540" y1="154" x2="680" y2="200" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>

