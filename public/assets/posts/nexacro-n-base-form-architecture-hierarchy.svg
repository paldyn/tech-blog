<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">베이스 폼 계층 구조</text>

  <!-- Layer 1: BaseForm -->
  <rect x="240" y="74" width="400" height="80" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">BaseForm.xfdl</text>
  <text x="440" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
