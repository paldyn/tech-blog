  <rect x="720" y="330" width="140" height="52" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="790" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SearchPop.xfdl</text>
  <text x="790" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
