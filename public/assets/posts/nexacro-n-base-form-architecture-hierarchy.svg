  <rect x="540" y="330" width="160" height="52" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">OrderDetail.xfdl</text>
  <text x="620" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
