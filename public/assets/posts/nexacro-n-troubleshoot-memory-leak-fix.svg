<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="40" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">onunload 정리 패턴</text>

  <rect x="60" y="62" width="760" height="272" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">// Form_onunload — 반드시 정리</text>
  <text x="76" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text><text x="136" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> Form_onunload(obj, e) {</text>
  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // ① 타이머 해제</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555" xml:space="preserve">  timer00.stop();</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // ② 이벤트 핸들러 해제</text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555" xml:space="preserve">  btn00.removeEventHandler(</text><text x="286" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178" xml:space="preserve">"onclick"</text><text x="350" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">, this);</text>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // ③ Dataset 초기화</text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555" xml:space="preserve">  dsResult.clearData();</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // ④ 동적 컴포넌트 삭제</text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  var</text><text x="104" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> i = divContainer.components.length - </text><text x="416" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8" xml:space="preserve">1</text><text x="428" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">;</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  for</text><text x="112" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> (; i >= </text><text x="178" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8" xml:space="preserve">0</text><text x="190" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">; i--) divContainer.removeChild(i);</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // ⑤ 전역 배열 초기화</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">  g_selectedItems = [];</text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
