<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="are" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">렌더링 전략 자동 결정 흐름</text>

  <!-- Start box -->
  <rect x="300" y="72" width="280" height="60" rx="10" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="100"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">라우트 세그먼트</text>
  <text x="440" y="120"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Next.js가 빌드/런타임에 분석</text>

  <!-- Arrow down -->
  <line x1="440" y1="132" x2="440" y2="168" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arb)"/>

  <!-- Question: 동적 함수? -->
  <rect x="240" y="172" width="400" height="56" rx="8" fill="#1a1000" stroke="#e09050" stroke-width="1.5"/>
  <text x="440" y="198"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09050">동적 함수 사용?</text>
  <text x="440" y="218"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cookies() headers() searchParams cache:'no-store' revalidate:0</text>

  <!-- NO arrow (left) -->
  <line x1="240" y1="200" x2="170" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arg)"/>
  <text x="202" y="192"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">아니오</text>

  <!-- YES arrow (right) -->
  <line x1="640" y1="200" x2="710" y2="200" stroke="#e05555" stroke-width="2" marker-end="url(#are)"/>
  <text x="672" y="192"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">예</text>

  <!-- Static result -->
  <rect x="60" y="168" width="180" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="196"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Static</text>
  <text x="150" y="216"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">빌드 시 사전 렌더링</text>

  <!-- Dynamic result -->
  <rect x="714" y="168" width="106" height="60" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="767" y="196"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">Dynamic</text>
  <text x="767" y="216"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">매 요청 렌더</text>

  <!-- Static -> question 2 -->
  <line x1="150" y1="228" x2="150" y2="272" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Question 2: generateStaticParams? -->
  <rect x="60" y="276" width="360" height="56" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="302"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">동적 라우트 ([slug])인가?</text>
  <text x="240" y="320"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">generateStaticParams 정의 여부</text>

  <!-- YES left: static paths -->
  <line x1="60" y1="304" x2="20" y2="304" stroke="#55c555" stroke-width="1.5"/>
  <line x1="20" y1="304" x2="20" y2="376" stroke="#55c555" stroke-width="1.5" marker-end="url(#arg)"/>
  <text x="10" y="344"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#55c555" transform="rotate(-90, 10, 344)">있음</text>

  <!-- NO right: dynamic fallback -->
  <line x1="420" y1="304" x2="460" y2="304" stroke="#e09050" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Static paths result -->
  <rect x="20" y="376" width="200" height="52" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="400"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">정적 경로 사전 생성</text>
  <text x="120" y="418"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">빌드 시 모든 경로 생성</text>

  <!-- Dynamic fallback -->
  <rect x="464" y="276" width="180" height="56" rx="8" fill="#1a1000" stroke="#e09050" stroke-width="1"/>
  <text x="554" y="302"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e09050">런타임 정적 생성</text>
  <text x="554" y="320"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">첫 방문 시 생성 후 캐시</text>

  <!-- Force override note -->
  <rect x="460" y="356" width="360" height="64" rx="8" fill="#0d0d0d" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="380"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">수동 오버라이드</text>
  <text x="640" y="400"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">export const dynamic = 'force-static'</text>
  <text x="640" y="416"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">export const dynamic = 'force-dynamic'</text>
</svg>
