<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">그룹핑 구현 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Dataset.group() + Grid GroupBand XFD</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="274" fill="#000000" rx="6" stroke="#3a4a6e"/>

  <!-- Comment 1 -->
  <text x="80" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 1. 스크립트: Dataset 그룹 적용</text>

  <!-- group() call -->
  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">this</text>
  <text x="108" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">.ds_emp.group(</text>
  <text x="214" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"dept_cd"</text>
  <text x="278" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">);</text>

  <!-- Multi-level group -->
  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 다단 그룹: 부서 > 직급</text>
  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">this</tspan><tspan fill="#ffffff">.ds_emp.group(</tspan><tspan fill="#ce9178">"dept_cd,job_cd"</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- Comment 2 -->
  <text x="80" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 2. XFD: Grid GroupBand 선언</text>

  <!-- GroupBand -->
  <text x="80" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3">GroupBand</tspan><tspan fill="#ffffff"> groupcol=</tspan><tspan fill="#ce9178">"dept_cd"</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <!-- GroupBand Head -->
  <text x="80" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3">GroupBand_Head</tspan><tspan fill="#ffffff"> height=</tspan><tspan fill="#b5cea8">"28"</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <!-- GroupBand Head Cell -->
  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3">Cell</tspan><tspan fill="#ffffff"> col=</tspan><tspan fill="#b5cea8">"0"</tspan><tspan fill="#ffffff"> datacolumn=</tspan><tspan fill="#ce9178">"dept_nm"</tspan><tspan fill="#ffffff"> colspan=</tspan><tspan fill="#b5cea8">"2"</tspan><tspan fill="#ffffff">/&gt;</tspan></text>

  <!-- Close GroupBand Head -->
  <text x="80" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  &lt;/</tspan><tspan fill="#7ec8e3">GroupBand_Head</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <!-- Close GroupBand -->
  <text x="80" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">&lt;/</tspan><tspan fill="#7ec8e3">GroupBand</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <!-- Comment 3 -->
  <text x="80" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 그룹 해제</text>
  <text x="80" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">this</text>
  <text x="108" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">.ds_emp.group(</text>
  <text x="214" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">""</text>
  <text x="228" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">);</text>
  <text x="80" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 빈 문자열 전달 시 그룹 모두 해제</text>

  <!-- Bottom note -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">groupcol은 XFD의 GroupBand 기준 컬럼 | group() 인수와 일치해야 합니다</text>
</svg>
