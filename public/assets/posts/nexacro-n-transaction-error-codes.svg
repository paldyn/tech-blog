<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">트랜잭션 errCode 분류와 처리 전략</text>

  <!-- Success -->
  <rect x="60" y="72" width="760" height="54" fill="#071407" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="100" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">errCode = 0</text>
  <text x="210" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">성공 — 출력 Dataset에 데이터 채워짐, 정상 처리 로직 실행</text>
  <text x="740" y="98" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">처리: 정상 로직</text>
  <text x="100" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">if (errCode === 0) { /* 정상 */ }</text>

  <!-- Network errors -->
  <rect x="60" y="140" width="760" height="90" fill="#0d0a07" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">errCode &lt; 0  (음수 — 네트워크/인프라 오류)</text>

  <rect x="80" y="176" width="160" height="40" fill="#0d1520" rx="4"/>
  <text x="160" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">-1</text>
  <text x="160" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">네트워크 오류</text>

  <rect x="252" y="176" width="160" height="40" fill="#0d1520" rx="4"/>
  <text x="332" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">-100 ~ -199</text>
  <text x="332" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">어댑터 처리 오류</text>

  <rect x="424" y="176" width="160" height="40" fill="#0d1520" rx="4"/>
  <text x="504" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">-200</text>
  <text x="504" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">세션 만료 (관례)</text>

  <rect x="596" y="176" width="204" height="40" fill="#0d1520" rx="4"/>
  <text x="698" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">-999</text>
  <text x="698" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타임아웃</text>

  <!-- Business errors -->
  <rect x="60" y="244" width="760" height="90" fill="#0c0d07" rx="6" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="100" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c55a">errCode &gt; 0  (양수 — 비즈니스 로직 오류)</text>

  <rect x="80" y="280" width="200" height="40" fill="#0d1520" rx="4"/>
  <text x="180" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55a">1 ~ 99</text>
  <text x="180" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일반 비즈니스 오류</text>

  <rect x="292" y="280" width="200" height="40" fill="#0d1520" rx="4"/>
  <text x="392" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55a">100 ~ 199</text>
  <text x="392" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유효성 검증 실패</text>

  <rect x="504" y="280" width="296" height="40" fill="#0d1520" rx="4"/>
  <text x="652" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55a">서버 커스텀 코드</text>
  <text x="652" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">프로젝트별 정의</text>

  <!-- Strategy Box -->
  <rect x="60" y="348" width="760" height="100" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">처리 전략 요약</text>
  <text x="100" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">errCode=0</text>
  <text x="175" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 정상 처리</text>
  <text x="340" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">errCode=-200</text>
  <text x="432" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 세션 만료, 로그인 이동</text>
  <text x="100" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">errCode&lt;0</text>
  <text x="160" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 시스템 오류 alert, 로그</text>
  <text x="340" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55a">errCode&gt;0</text>
  <text x="398" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 비즈니스 메시지 표시</text>

  <!-- Bottom note -->
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">errCode 범위 정의는 프로젝트 표준에 따라 다름 — 팀 내 공통 합의 필수</text>
</svg>
