<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 그룹 집계 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">addGroup + getGroupSummary 실전 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="256" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text xml:space="preserve" x="76" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 1. 그룹 키로 먼저 정렬</text>
  <text xml:space="preserve" x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">ds.setSortByField(<tspan fill="#ce9178">"DEPT_CD"</tspan>, <tspan fill="#ce9178">"ASC"</tspan>);</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 2. 그룹 등록</text>
  <text xml:space="preserve" x="76" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">ds.addGroup(<tspan fill="#ce9178">"DEPT_CD"</tspan>);</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 3. 그룹별 집계 조회</text>
  <text xml:space="preserve" x="76" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">var</tspan> gc = ds.groupcount;</text>
  <text xml:space="preserve" x="76" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">var</tspan> gc = ds.groupcount;</text>
  <text xml:space="preserve" x="76" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">var</tspan> g=<tspan fill="#b5cea8">0</tspan>; g&lt;gc; g++) {</text>
  <text xml:space="preserve" x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#7ec8e3">var</tspan> s = ds.getGroupSummary(g,</text>
  <text xml:space="preserve" x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    <tspan fill="#ce9178">"AMT"</tspan>, <tspan fill="#ce9178">"sum"</tspan>);</text>
  <text xml:space="preserve" x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  trace(g + <tspan fill="#ce9178">": "</tspan> + s);</text>

  <!-- Note -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">addGroup() 전에 반드시 같은 키 컬럼으로 정렬해야 그룹이 올바르게 생성됩니다</text>
</svg>
