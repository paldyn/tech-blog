<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">@SpringBootApplication 분해 구조</text>
  <text x="440" y="65"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">세 개의 핵심 애노테이션을 하나로 합성한 메타 애노테이션</text>

  <!-- Top box: @SpringBootApplication -->
  <rect x="240" y="85" width="400" height="56" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="116"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">@SpringBootApplication</text>
  <text x="440" y="134"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">composed annotation (메타 애노테이션 합성)</text>

  <!-- Three arrows down from the top box -->
  <!-- Arrow to left: @SpringBootConfiguration -->
  <line x1="310" y1="141" x2="180" y2="188" stroke="#444" stroke-width="2"/>
  <polygon points="175,192 178,179 188,185" fill="#444"/>

  <!-- Arrow to center: @EnableAutoConfiguration -->
  <line x1="440" y1="141" x2="440" y2="188" stroke="#444" stroke-width="2"/>
  <polygon points="440,194 434,182 446,182" fill="#444"/>

  <!-- Arrow to right: @ComponentScan -->
  <line x1="570" y1="141" x2="700" y2="188" stroke="#444" stroke-width="2"/>
  <polygon points="705,192 702,179 692,185" fill="#444"/>

  <!-- Box 1: @SpringBootConfiguration -->
  <rect x="60" y="195" width="240" height="100" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">@SpringBootConfiguration</text>
  <text x="180" y="242"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">= @Configuration 확장</text>
  <text x="180" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이 클래스가 Bean 설정 소스</text>
  <text x="180" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Bean 메서드 선언 가능</text>

  <!-- Box 2: @EnableAutoConfiguration -->
  <rect x="320" y="195" width="240" height="100" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="218"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">@EnableAutoConfiguration</text>
  <text x="440" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Auto-Configuration 활성화</text>
  <text x="440" y="260"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">클래스패스 → Bean 자동 등록</text>
  <text x="440" y="280"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">exclude로 특정 설정 제외 가능</text>

  <!-- Box 3: @ComponentScan -->
  <rect x="580" y="195" width="240" height="100" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">@ComponentScan</text>
  <text x="700" y="242"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">현재 패키지 하위 스캔</text>
  <text x="700" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Component 계열 Bean 등록</text>
  <text x="700" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(@Service, @Repository, ...)</text>

  <!-- Arrows down from each box -->
  <line x1="180" y1="295" x2="180" y2="325" stroke="#444" stroke-width="2"/>
  <polygon points="180,331 174,319 186,319" fill="#444"/>

  <line x1="440" y1="295" x2="440" y2="325" stroke="#444" stroke-width="2"/>
  <polygon points="440,331 434,319 446,319" fill="#444"/>

  <line x1="700" y1="295" x2="700" y2="325" stroke="#444" stroke-width="2"/>
  <polygon points="700,331 694,319 706,319" fill="#444"/>

  <!-- Bottom row: results -->
  <!-- Left result -->
  <rect x="60" y="331" width="240" height="50" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="180" y="355"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">@Bean 정의 클래스 역할</text>
  <text x="180" y="373"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">ApplicationContext 설정 소스</text>

  <!-- Center result -->
  <rect x="320" y="331" width="240" height="50" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="355"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">DataSource, MVC 등 자동 Bean</text>
  <text x="440" y="373"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">Starter 추가만으로 활성화</text>

  <!-- Right result -->
  <rect x="580" y="331" width="240" height="50" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="700" y="355"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">현재 패키지 + 하위 Bean 등록</text>
  <text x="700" y="373"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">메인 클래스 위치가 루트</text>

  <!-- Note at bottom -->
  <rect x="60" y="404" width="760" height="52" rx="6" fill="#111827" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="427"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">⚠ 메인 클래스는 반드시 최상위 패키지에 위치해야 합니다</text>
  <text x="440" y="448"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">com.example.DemoApplication → com.example.** 하위 Bean 전체 스캔</text>
</svg>
