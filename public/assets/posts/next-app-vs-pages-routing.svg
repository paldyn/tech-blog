<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">라우팅 파일 구조 비교</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">동일한 URL을 만드는 두 가지 파일 구조</text>

  <!-- Left: App Router -->
  <text x="240" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">App Router (app/)</text>
  <rect x="60" y="114" width="360" height="280" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="1"/>

  <text x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">app/</text>
  <text x="96" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">layout.tsx</text>
  <text x="96" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">page.tsx</text>
  <text x="96" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">blog/</text>
  <text x="120" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">page.tsx</text>
  <text x="120" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">[slug]/</text>
  <text x="144" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">page.tsx</text>
  <text x="96" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">about/</text>
  <text x="120" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">page.tsx</text>
  <text x="80" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">→ /  /blog  /blog/post1  /about</text>

  <!-- Right: Pages Router -->
  <text x="640" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#888">Pages Router (pages/)</text>
  <rect x="460" y="114" width="360" height="280" rx="8" fill="#141414" stroke="#444" stroke-width="1"/>

  <text x="480" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" font-weight="600">pages/</text>
  <text x="496" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#666">_app.tsx</text>
  <text x="496" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#666">index.tsx</text>
  <text x="496" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" font-weight="600">blog/</text>
  <text x="520" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#666">index.tsx</text>
  <text x="520" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#666">[slug].tsx</text>
  <text x="496" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#666">about.tsx</text>
  <text x="480" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#666">→ /  /blog  /blog/post1  /about</text>
</svg>
