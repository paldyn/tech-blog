<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Copilot 효과적 활용법</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">GitHub Copilot Best Practices</text>

  <!-- Left code panel: good comment-driven completion -->
  <text x="80" y="102" font-size="13" font-weight="600" fill="#55c555">좋은 예: 명확한 주석으로 완성 유도</text>
  <rect x="60" y="114" width="370" height="176" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 한국 사업자등록번호 유효성 검사</text>
  <text x="76" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 체크섬 알고리즘: 각 자리 곱셈 후 합계</text>
  <text x="76" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 입력: '123-45-67890' 형식 문자열</text>
  <text x="76" y="190" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 반환: bool</text>
  <text x="76" y="212" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">def</text>
  <text x="104" y="212" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> validate_brn(brn: </text>
  <text x="236" y="212" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">str</text>
  <text x="254" y="212" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">) -> </text>
  <text x="286" y="212" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">bool</text>
  <text x="312" y="212" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">:</text>
  <text x="76" y="232" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">    ...</text>
  <text x="76" y="252" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">    # Copilot이 체크섬 로직을 자동 완성</text>
  <text x="76" y="272" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">    # 도메인 지식 포함 주석이 핵심</text>

  <!-- Right code panel: Chat prompt -->
  <text x="456" y="102" font-size="13" font-weight="600" fill="#7ec8e3">Copilot Chat 프롬프트 패턴</text>
  <rect x="440" y="114" width="380" height="176" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 코드 설명 요청</text>
  <text x="456" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/explain</text>
  <text x="456" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/fix</text>
  <text x="530" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">  # 버그 수정 제안</text>
  <text x="456" y="190" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/tests</text>
  <text x="536" y="190" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"> # 유닛 테스트 생성</text>
  <text x="456" y="208" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/doc</text>
  <text x="510" y="208" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">   # 문서 생성</text>
  <text x="456" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"># 컨텍스트 참조</text>
  <text x="456" y="248" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">@workspace</text>
  <text x="556" y="248" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> 이 프로젝트의 DB 연결</text>
  <text x="456" y="266" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">@workspace</text>
  <text x="556" y="266" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> 어떻게 돼 있어?</text>
  <text x="456" y="284" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">#file</text>
  <text x="496" y="284" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">:auth.py 참고해서 JWT 검증</text>

  <!-- Tips -->
  <text x="60" y="322" font-size="14" font-weight="600" fill="#e8e8e8">활용 팁</text>

  <rect x="60" y="336" width="232" height="42" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="176" y="356" text-anchor="middle" font-size="12" fill="#55c555">명확한 타입 힌트·독스트링</text>
  <text x="176" y="371" text-anchor="middle" font-size="11" fill="#666">완성 품질 크게 향상</text>

  <rect x="308" y="336" width="232" height="42" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="424" y="356" text-anchor="middle" font-size="12" fill="#7ec8e3">관련 파일 탭으로 열기</text>
  <text x="424" y="371" text-anchor="middle" font-size="11" fill="#666">컨텍스트 윈도우 활용</text>

  <rect x="556" y="336" width="264" height="42" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="688" y="356" text-anchor="middle" font-size="12" fill="#7777cc">Accept/Reject 적극 활용</text>
  <text x="688" y="371" text-anchor="middle" font-size="11" fill="#666">개인화 피드백 누적</text>

  <text x="60" y="392" font-size="12" fill="#555">* Copilot 코드는 반드시 검토 후 사용 — 보안·성능·정확성 책임은 개발자에게 있음</text>
</svg>
