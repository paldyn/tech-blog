<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RLHF 3단계 파이프라인</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">SFT → Reward Model Training → PPO Fine-tuning</text>

  <!-- Step 1: SFT -->
  <rect x="60" y="100" width="220" height="230" fill="#111827" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="60" y="100" width="220" height="38" fill="#7777cc" rx="10"/>
  <rect x="60" y="125" width="220" height="13" fill="#7777cc"/>
  <text x="170" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">1단계: SFT</text>

  <text x="170" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">지도 파인튜닝</text>
  <text x="170" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Supervised Fine-Tuning</text>

  <line x1="80" y1="200" x2="260" y2="200" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="80" y="210" width="180" height="22" fill="#0d1117" rx="4"/>
  <text x="170" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">고품질 시범 데이터</text>
  <rect x="80" y="238" width="180" height="22" fill="#0d1117" rx="4"/>
  <text x="170" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">베이스 모델 파인튜닝</text>
  <rect x="80" y="266" width="180" height="22" fill="#0d1117" rx="4"/>
  <text x="170" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">→ SFT 모델 생성</text>
  <rect x="80" y="294" width="180" height="22" fill="#0d1117" rx="4"/>
  <text x="170" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">~13K 데이터로도 충분</text>

  <!-- Arrow 1→2 -->
  <polygon points="298,215 330,215 330,209 348,222 330,235 330,229 298,229" fill="#7777cc"/>

  <!-- Step 2: Reward Model Training -->
  <rect x="350" y="100" width="220" height="230" fill="#111827" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <rect x="350" y="100" width="220" height="38" fill="#e05555" rx="10"/>
  <rect x="350" y="125" width="220" height="13" fill="#e05555"/>
  <text x="460" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">2단계: 보상 모델</text>

  <text x="460" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Reward Model Training</text>
  <text x="460" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인간 선호 학습</text>

  <line x1="370" y1="200" x2="550" y2="200" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="370" y="210" width="180" height="22" fill="#0d1117" rx="4"/>
  <text x="460" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">선호 쌍 레이블링</text>
  <rect x="370" y="238" width="180" height="22" fill="#0d1117" rx="4"/>
  <text x="460" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">chosen vs rejected</text>
  <rect x="370" y="266" width="180" height="22" fill="#0d1117" rx="4"/>
  <text x="460" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">→ 스칼라 점수 예측</text>
  <rect x="370" y="294" width="180" height="22" fill="#0d1117" rx="4"/>
  <text x="460" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Bradley-Terry 모델</text>

  <!-- Arrow 2→3 -->
  <polygon points="588,215 620,215 620,209 638,222 620,235 620,229 588,229" fill="#e05555"/>

  <!-- Step 3: PPO Fine-tuning -->
  <rect x="640" y="100" width="200" height="230" fill="#111827" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <rect x="640" y="100" width="200" height="38" fill="#55c555" rx="10"/>
  <rect x="640" y="125" width="200" height="13" fill="#55c555"/>
  <text x="740" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">3단계: PPO</text>

  <text x="740" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">PPO Fine-tuning</text>
  <text x="740" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">강화학습 정렬</text>

  <line x1="660" y1="200" x2="820" y2="200" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="660" y="210" width="160" height="22" fill="#0d1117" rx="4"/>
  <text x="740" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">보상 최대화</text>
  <rect x="660" y="238" width="160" height="22" fill="#0d1117" rx="4"/>
  <text x="740" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">KL 페널티 적용</text>
  <rect x="660" y="266" width="160" height="22" fill="#0d1117" rx="4"/>
  <text x="740" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">→ 정렬된 모델</text>
  <rect x="660" y="294" width="160" height="22" fill="#0d1117" rx="4"/>
  <text x="740" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">4 PPO epochs</text>

  <!-- Bottom info -->
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">각 단계는 이전 단계의 출력을 입력으로 사용하며, 최종 목표는 인간이 선호하는 응답을 생성하는 모델</text>
  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">InstructGPT (OpenAI, 2022) 논문에서 제안된 파이프라인</text>
</svg>
