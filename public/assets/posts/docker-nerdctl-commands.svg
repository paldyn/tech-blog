<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">nerdctl 주요 명령어 — Docker CLI 호환</text>

  <!-- Left column: Docker commands -->
  <rect x="60" y="68" width="360" height="36" rx="5" fill="#0a1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">docker 명령</text>

  <rect x="500" y="68" width="320" height="36" rx="5" fill="#0a1628" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">nerdctl 대응 명령</text>

  <!-- Code block: command pairs -->
  <rect x="60" y="112" width="760" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 컨테이너 실행</text>
  <text x="76" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">docker <tspan fill="#7ec8e3" font-weight="600">run</tspan> -d nginx          →  nerdctl <tspan fill="#55c555" font-weight="600">run</tspan> -d nginx</text>

  <text x="76" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이미지 빌드</text>
  <text x="76" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">docker <tspan fill="#7ec8e3" font-weight="600">build</tspan> -t myapp .      →  nerdctl <tspan fill="#55c555" font-weight="600">build</tspan> -t myapp .</text>

  <text x="76" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Compose (플러그인)</text>
  <text x="76" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">docker compose up              →  nerdctl <tspan fill="#55c555" font-weight="600">compose</tspan> up</text>

  <text x="76" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># namespace 지정 (nerdctl 고유)</text>
  <text x="76" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">nerdctl <tspan fill="#7ec8e3" font-weight="600">--namespace</tspan> k8s.io images list</text>

  <text x="76" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 암호화 이미지 (nerdctl 고유)</text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">nerdctl image <tspan fill="#7ec8e3" font-weight="600">encrypt</tspan> --recipient jwe:key.pem myimg</text>

  <text x="76" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># lazy pulling (eStargz)</text>
  <text x="76" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">nerdctl <tspan fill="#7ec8e3" font-weight="600">--snapshotter</tspan>=stargz pull nginx:latest</text>

  <!-- Bottom label -->
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">nerdctl 고유 기능: containerd namespace, 암호화 이미지, lazy pull — Docker CLI와 90% 이상 호환</text>
</svg>
