<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">롤링 해시 갱신 메커니즘</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">윈도우 이동 시 기존 해시를 O(1)로 갱신하는 원리</text>

  <!-- String chars -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문자열 s:</text>
  <rect x="134" y="90" width="44" height="40" fill="#2a1a1a" stroke="#e05555" stroke-width="2" rx="3"/>
  <text x="156" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e05555">s[i]</text>
  <rect x="182" y="90" width="44" height="40" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  <text x="204" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">s[i+1]</text>
  <rect x="230" y="90" width="44" height="40" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  <text x="252" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">...</text>
  <rect x="278" y="90" width="56" height="40" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  <text x="306" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">s[i+m-1]</text>
  <rect x="338" y="90" width="56" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="366" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">s[i+m]</text>

  <!-- Window bracket before -->
  <text x="60" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">이전 윈도우 [i, i+m-1]:</text>
  <rect x="130" y="148" width="208" height="26" fill="none" stroke="#7ec8e3" stroke-width="2" rx="4"/>

  <!-- Window bracket after -->
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">다음 윈도우 [i+1, i+m]:</text>
  <rect x="178" y="190" width="220" height="26" fill="none" stroke="#55c555" stroke-width="2" rx="4"/>

  <!-- Formula -->
  <text x="60" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">점화식</text>

  <rect x="60" y="252" width="760" height="72" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># h_old = s[i]*B^(m-1) + s[i+1]*B^(m-2) + ... + s[i+m-1]*B^0</text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># h_new = s[i+1]*B^(m-1) + ... + s[i+m]*B^0</text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">h_new = ((h_old - s[i]*B^(m-1)) * B + s[i+m]) % MOD</text>

  <!-- Steps breakdown -->
  <rect x="60" y="344" width="760" height="72" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="8"/>
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">3단계 분해</text>
  <text x="90" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">① 제거</text>
  <text x="148" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">h_old - s[i]·B^(m-1)</text>
  <text x="320" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">② 시프트</text>
  <text x="390" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">× B (전체 비중 올림)</text>
  <text x="560" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">③ 추가</text>
  <text x="612" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">+ s[i+m] (새 문자)</text>
  <text x="140" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">빠져나간 문자 제거</text>
  <text x="380" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">모든 비중 ×B 이동</text>
  <text x="608" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">새 문자 끝에 추가</text>
</svg>
