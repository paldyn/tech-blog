<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">TCP 소켓 — 두 프로그램을 잇는 양방향 통로</text>

  <!-- Client box -->
  <rect x="60" y="120" width="250" height="130" rx="10" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="185" y="160" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">클라이언트</text>
  <text x="185" y="190" font-size="13" fill="#7ec8e3" text-anchor="middle">new Socket(host, port)</text>
  <text x="185" y="216" font-size="12" fill="#888" text-anchor="middle">능동적으로 연결을 요청</text>

  <!-- Server box -->
  <rect x="570" y="120" width="250" height="130" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="695" y="160" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">서버</text>
  <text x="695" y="190" font-size="13" fill="#55c555" text-anchor="middle">ServerSocket.accept()</text>
  <text x="695" y="216" font-size="12" fill="#888" text-anchor="middle">연결을 기다리다 수락</text>

  <!-- arrows -->
  <line x1="312" y1="160" x2="568" y2="160" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text x="440" y="148" font-size="12" fill="#7ec8e3" text-anchor="middle">데이터 전송 (OutputStream)</text>

  <line x1="568" y1="210" x2="312" y2="210" stroke="#55c555" stroke-width="2.5" marker-end="url(#arrGreen)"/>
  <text x="440" y="232" font-size="12" fill="#55c555" text-anchor="middle">데이터 수신 (InputStream)</text>

  <text x="440" y="300" font-size="13" fill="#888" text-anchor="middle">하나의 연결이 열리면 양쪽 모두 읽기·쓰기가 가능한 전이중(full-duplex) 통로가 된다</text>
</svg>
