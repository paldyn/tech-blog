<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java Thread State Diagram</text>

  <!-- NEW state -->
  <rect x="60" y="100" width="130" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="125" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">NEW</text>
  <text x="125" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">new Thread()</text>

  <!-- RUNNABLE state -->
  <rect x="270" y="100" width="150" height="54" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="345" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">RUNNABLE</text>
  <text x="345" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">start() 호출 후</text>

  <!-- BLOCKED state -->
  <rect x="500" y="60" width="150" height="54" rx="8" fill="#1f0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="575" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">BLOCKED</text>
  <text x="575" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">monitor lock 대기</text>

  <!-- WAITING state -->
  <rect x="500" y="150" width="150" height="54" rx="8" fill="#1a1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="575" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c44a">WAITING</text>
  <text x="575" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">wait() / join()</text>

  <!-- TIMED_WAITING state -->
  <rect x="500" y="240" width="150" height="54" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="575" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">TIMED_WAITING</text>
  <text x="575" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">sleep(n) / wait(n)</text>

  <!-- TERMINATED state -->
  <rect x="270" y="340" width="150" height="54" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="345" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">TERMINATED</text>
  <text x="345" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">run() 종료</text>

  <!-- NEW -> RUNNABLE -->
  <line x1="190" y1="127" x2="268" y2="127" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="229" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">start()</text>

  <!-- RUNNABLE -> BLOCKED -->
  <path d="M 420 110 Q 460 87 498 87" stroke="#e05555" stroke-width="2" fill="none" marker-end="url(#arr2)"/>
  <text x="456" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">synchronized 진입 실패</text>

  <!-- BLOCKED -> RUNNABLE -->
  <path d="M 498 100 Q 460 115 422 124" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arr3)"/>
  <text x="458" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">lock 획득</text>

  <!-- RUNNABLE -> WAITING -->
  <line x1="420" y1="140" x2="498" y2="170" stroke="#e8c44a" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="460" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e8c44a">wait()/join()</text>

  <!-- WAITING -> RUNNABLE -->
  <path d="M 498 185 Q 460 195 421 155" stroke="#55c555" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arr3)"/>
  <text x="450" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">notify()/join 완료</text>

  <!-- RUNNABLE -> TIMED_WAITING -->
  <line x1="420" y1="150" x2="498" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="448" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">sleep(n)</text>

  <!-- TIMED_WAITING -> RUNNABLE -->
  <path d="M 498 275 Q 456 300 421 162" stroke="#55c555" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arr3)"/>
  <text x="418" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">시간 만료/interrupt</text>

  <!-- RUNNABLE -> TERMINATED -->
  <line x1="345" y1="154" x2="345" y2="338" stroke="#e05555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="368" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">run() 완료</text>

  <!-- Legend -->
  <rect x="60" y="430" width="760" height="70" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">상태 설명</text>
  <text x="80" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">NEW: 스레드 생성됨, 미시작  |  RUNNABLE: 실행 중 또는 실행 대기  |  BLOCKED: monitor lock 대기  |  WAITING: 무기한 대기</text>
  <text x="80" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TIMED_WAITING: 시간 제한 대기  |  TERMINATED: 실행 완료</text>
</svg>
