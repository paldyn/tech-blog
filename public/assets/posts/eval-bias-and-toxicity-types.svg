<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">LLM 편향과 독성의 분류</text>

  <!-- Section labels -->
  <text x="245" y="74" text-anchor="middle" font-size="13" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">편향(Bias) 유형</text>
  <text x="635" y="74" text-anchor="middle" font-size="13" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">독성(Toxicity) 유형</text>

  <!-- LEFT PANEL -->
  <!-- Header -->
  <rect x="60" y="82" width="370" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="109" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">편향 유형</text>

  <!-- Bias sub-boxes -->
  <!-- 1. 성별 편향 -->
  <rect x="60" y="138" width="370" height="54" rx="6" fill="#12121e" stroke="#7777cc" stroke-width="1"/>
  <text x="82" y="160" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">성별 편향</text>
  <text x="82" y="180" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">직업·역할 고정관념</text>
  <rect x="390" y="150" width="8" height="8" rx="2" fill="#7777cc"/>

  <!-- 2. 인종·민족 편향 -->
  <rect x="60" y="204" width="370" height="54" rx="6" fill="#12121e" stroke="#7777cc" stroke-width="1"/>
  <text x="82" y="226" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">인종·민족 편향</text>
  <text x="82" y="246" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">특정 집단 부정적 연관</text>
  <rect x="390" y="216" width="8" height="8" rx="2" fill="#7777cc"/>

  <!-- 3. 확증 편향 -->
  <rect x="60" y="270" width="370" height="54" rx="6" fill="#12121e" stroke="#7777cc" stroke-width="1"/>
  <text x="82" y="292" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">확증 편향</text>
  <text x="82" y="312" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">사용자 의견 과도 동조</text>
  <rect x="390" y="282" width="8" height="8" rx="2" fill="#7777cc"/>

  <!-- 4. 문화 편향 -->
  <rect x="60" y="336" width="370" height="54" rx="6" fill="#12121e" stroke="#7777cc" stroke-width="1"/>
  <text x="82" y="358" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">문화 편향</text>
  <text x="82" y="378" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">서구 중심 응답 경향</text>
  <rect x="390" y="348" width="8" height="8" rx="2" fill="#7777cc"/>

  <!-- RIGHT PANEL -->
  <!-- Header -->
  <rect x="450" y="82" width="370" height="44" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="109" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">독성 유형</text>

  <!-- Toxicity sub-boxes -->
  <!-- 1. 혐오 발언 -->
  <rect x="450" y="138" width="370" height="54" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="472" y="160" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">혐오 발언</text>
  <text x="472" y="180" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">집단 대상 공격적 언어</text>
  <rect x="780" y="150" width="8" height="8" rx="2" fill="#e05555"/>

  <!-- 2. 욕설·비속어 -->
  <rect x="450" y="204" width="370" height="54" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="472" y="226" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">욕설·비속어</text>
  <text x="472" y="246" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">불쾌한 언어 표현</text>
  <rect x="780" y="216" width="8" height="8" rx="2" fill="#e05555"/>

  <!-- 3. 위협 -->
  <rect x="450" y="270" width="370" height="54" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="472" y="292" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">위협</text>
  <text x="472" y="312" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">폭력·해악 암시 발언</text>
  <rect x="780" y="282" width="8" height="8" rx="2" fill="#e05555"/>

  <!-- 4. 성적 콘텐츠 -->
  <rect x="450" y="336" width="370" height="54" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="472" y="358" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">성적 콘텐츠</text>
  <text x="472" y="378" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">부적절한 성적 표현</text>
  <rect x="780" y="348" width="8" height="8" rx="2" fill="#e05555"/>

  <!-- Benchmark boxes row -->
  <rect x="60" y="404" width="178" height="32" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="149" y="424" text-anchor="middle" font-size="12" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="600">BBQ (편향)</text>

  <rect x="250" y="404" width="178" height="32" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="339" y="424" text-anchor="middle" font-size="12" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="600">WinoBias (성별)</text>

  <rect x="440" y="404" width="178" height="32" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="529" y="424" text-anchor="middle" font-size="12" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="600">ToxiGen (독성)</text>

  <rect x="630" y="404" width="210" height="32" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="735" y="424" text-anchor="middle" font-size="12" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="600">RealToxicityPrompts</text>
</svg>
