  <text xml:space="preserve" x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">twine <tspan fill="#7ec8e3" font-weight="600">upload</tspan> -r testpypi dist/*</text>
  <text xml:space="preserve" x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">twine <tspan fill="#7ec8e3" font-weight="600">upload</tspan> dist/*</text>
