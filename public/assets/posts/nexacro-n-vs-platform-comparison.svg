<svg width="880" viewBox="0 0 880 610"
     xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="610" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-size="22" font-weight="700" fill="#e8e8e8">Nexacro Platform vs N 비교</text>
  <text x="440" y="70" text-anchor="middle"
        font-size="14" fill="#888">주요 항목별 차이점 한눈에 보기</text>

  <!-- ========== Header Row ========== -->
  <!-- Left header: x=60, w=330 (right=390) -->
  <rect x="60" y="85" width="330" height="46"
        fill="#0b1520" stroke="#1e3a5f" stroke-width="1.5" rx="6"/>
  <text x="225" y="113" text-anchor="middle"
        font-size="15" font-weight="700" fill="#7ec8e3">Nexacro Platform</text>

  <!-- Right header: x=490, w=330 (right=820 ✓) -->
  <rect x="490" y="85" width="330" height="46"
        fill="#070e07" stroke="#1a3d1a" stroke-width="1.5" rx="6"/>
  <text x="655" y="113" text-anchor="middle"
        font-size="15" font-weight="700" fill="#55c555">Nexacro N</text>

  <!-- Center zone: x=390 to x=490, gap=100px ✓ -->
  <!-- Center label "항목" at x=440 -->
  <text x="440" y="113" text-anchor="middle"
        font-size="12" fill="#555">항목</text>

  <!-- Thin vertical dividers -->
  <line x1="390" y1="85" x2="390" y2="558" stroke="#222" stroke-width="1"/>
  <line x1="490" y1="85" x2="490" y2="558" stroke="#222" stroke-width="1"/>

  <!-- ========== Row 1: HTML5 엔진 (y=139) ========== -->
  <rect x="60" y="139" width="330" height="60"
        fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="80" y="162" font-size="13" font-weight="600" fill="#e8e8e8">자체 HTML5 레이어</text>
  <text x="80" y="182" font-size="11" fill="#888">IE11 포함 레거시 브라우저 지원</text>

  <!-- Center label -->
  <text x="440" y="162" text-anchor="middle" font-size="11" fill="#888">HTML5</text>
  <text x="440" y="176" text-anchor="middle" font-size="11" fill="#888">엔진</text>

  <rect x="490" y="139" width="330" height="60"
        fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="510" y="162" font-size="13" font-weight="600" fill="#e8e8e8">완전 재설계 HTML5 엔진</text>
  <text x="510" y="182" font-size="11" fill="#55c555">모던 브라우저 최적화 (W3C 표준)</text>

  <!-- ========== Row 2: IE 지원 (y=207) ========== -->
  <rect x="60" y="207" width="330" height="60"
        fill="#0f0f0f" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="80" y="230" font-size="13" font-weight="600" fill="#e8e8e8">IE 11 공식 지원</text>
  <text x="80" y="250" font-size="11" fill="#7ec8e3">레거시 시스템 유지보수 가능</text>

  <text x="440" y="230" text-anchor="middle" font-size="11" fill="#888">IE</text>
  <text x="440" y="244" text-anchor="middle" font-size="11" fill="#888">지원</text>

  <rect x="490" y="207" width="330" height="60"
        fill="#0f0f0f" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="510" y="230" font-size="13" font-weight="600" fill="#e8e8e8">IE 미지원</text>
  <text x="510" y="250" font-size="11" fill="#e05555">Chrome · Edge · Firefox · Safari만</text>

  <!-- ========== Row 3: 컴포넌트 수 (y=275) ========== -->
  <rect x="60" y="275" width="330" height="60"
        fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="80" y="298" font-size="13" font-weight="600" fill="#e8e8e8">약 270개 컴포넌트</text>
  <text x="80" y="318" font-size="11" fill="#888">일부 ActiveX 의존 컴포넌트 포함</text>

  <text x="440" y="298" text-anchor="middle" font-size="11" fill="#888">컴포넌트</text>
  <text x="440" y="312" text-anchor="middle" font-size="11" fill="#888">수</text>

  <rect x="490" y="275" width="330" height="60"
        fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="510" y="298" font-size="13" font-weight="600" fill="#e8e8e8">약 300개 컴포넌트</text>
  <text x="510" y="318" font-size="11" fill="#55c555">신규 추가 · 일부 deprecated 정리</text>

  <!-- ========== Row 4: TypeDef·스타일 (y=343) ========== -->
  <rect x="60" y="343" width="330" height="60"
        fill="#0f0f0f" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="80" y="366" font-size="13" font-weight="600" fill="#e8e8e8">TypeDef 통합 관리</text>
  <text x="80" y="386" font-size="11" fill="#888">스타일과 타입이 하나의 체계</text>

  <text x="440" y="366" text-anchor="middle" font-size="11" fill="#888">TypeDef</text>
  <text x="440" y="380" text-anchor="middle" font-size="11" fill="#888">스타일</text>

  <rect x="490" y="343" width="330" height="60"
        fill="#0f0f0f" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="510" y="366" font-size="13" font-weight="600" fill="#e8e8e8">TypeDef + Appearance 분리</text>
  <text x="510" y="386" font-size="11" fill="#55c555">테마 전환과 동적 스타일 개선</text>

  <!-- ========== Row 5: 모바일 대응 (y=411) ========== -->
  <rect x="60" y="411" width="330" height="60"
        fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="80" y="434" font-size="13" font-weight="600" fill="#e8e8e8">제한적 모바일 지원</text>
  <text x="80" y="454" font-size="11" fill="#888">별도 Mobile 버전으로 분리 운영</text>

  <text x="440" y="434" text-anchor="middle" font-size="11" fill="#888">모바일</text>
  <text x="440" y="448" text-anchor="middle" font-size="11" fill="#888">대응</text>

  <rect x="490" y="411" width="330" height="60"
        fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="510" y="434" font-size="13" font-weight="600" fill="#e8e8e8">웹 표준 기반 터치 지원</text>
  <text x="510" y="454" font-size="11" fill="#55c555">반응형 레이아웃 기능 강화</text>

  <!-- ========== Row 6: API 호환성 (y=479) ========== -->
  <rect x="60" y="479" width="330" height="60"
        fill="#0f0f0f" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="80" y="502" font-size="13" font-weight="600" fill="#e8e8e8">핵심 API 구조 동일</text>
  <text x="80" y="522" font-size="11" fill="#7ec8e3">transaction() · Dataset API 유지</text>

  <text x="440" y="502" text-anchor="middle" font-size="11" fill="#888">API</text>
  <text x="440" y="516" text-anchor="middle" font-size="11" fill="#888">호환</text>

  <rect x="490" y="479" width="330" height="60"
        fill="#0f0f0f" stroke="#1a1a1a" stroke-width="1" rx="4"/>
  <text x="510" y="502" font-size="13" font-weight="600" fill="#e8e8e8">하위 호환 유지 + 신규 API</text>
  <text x="510" y="522" font-size="11" fill="#55c555">Platform 코드 대부분 재사용 가능</text>

  <!-- Footer -->
  <text x="440" y="570" text-anchor="middle"
        font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈</text>

</svg>
