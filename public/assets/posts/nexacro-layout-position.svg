<svg width="880" height="480" viewBox="0 0 880 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <defs>
    <style>
      .t-title { fill: #e8e8e8; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 22px; font-weight: 700; }
      .t-label { fill: #888; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 13px; font-weight: 500; }
      .t-code  { fill: #6ee7b7; font-family: "JetBrains Mono", monospace; font-size: 12px; }
      .t-code2 { fill: #93c5fd; font-family: "JetBrains Mono", monospace; font-size: 12px; }
      .t-sub   { fill: #555; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 12px; }
      .t-val   { fill: #fbbf24; font-family: "JetBrains Mono", monospace; font-size: 11px; }
    </style>
  </defs>

  <!-- Title -->
  <text x="36" y="48" class="t-title">Nexacro N — 컴포넌트 레이아웃 좌표계</text>
  <text x="36" y="68" class="t-label">Form 좌상단(0,0) 기준, px 또는 % 단위로 배치</text>

  <!-- Form container -->
  <rect x="36" y="90" width="500" height="340" rx="10" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="50" y="114" class="t-label">Form (0, 0)</text>
  <line x1="50" y1="120" x2="530" y2="120" stroke="#222" stroke-width="1"/>

  <!-- Origin dot -->
  <circle cx="60" cy="134" r="4" fill="#6ee7b7"/>
  <text x="68" y="138" class="t-code">(0, 0)</text>

  <!-- X axis arrow -->
  <line x1="60" y1="134" x2="280" y2="134" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="280,130 290,134 280,138" fill="#444"/>
  <text x="295" y="138" class="t-sub">left →</text>

  <!-- Y axis arrow -->
  <line x1="60" y1="134" x2="60" y2="330" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="56,330 60,340 64,330" fill="#444"/>
  <text x="68" y="340" class="t-sub">top ↓</text>

  <!-- Component box -->
  <rect x="140" y="175" width="200" height="90" rx="8" fill="#1a2a1a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="152" y="198" class="t-code">Edit (예시 컴포넌트)</text>

  <!-- left dimension line -->
  <line x1="60" y1="220" x2="140" y2="220" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="136,216 146,220 136,224" fill="#fbbf24"/>
  <polygon points="64,216 54,220 64,224" fill="#fbbf24"/>
  <text x="78" y="215" class="t-val">left: 80px</text>

  <!-- top dimension line -->
  <line x1="240" y1="134" x2="240" y2="175" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="236,171 240,181 244,171" fill="#fbbf24"/>
  <polygon points="236,138 240,128 244,138" fill="#fbbf24"/>
  <text x="248" y="162" class="t-val">top: 41px</text>

  <!-- width dimension line -->
  <line x1="140" y1="278" x2="340" y2="278" stroke="#93c5fd" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="336,274 346,278 336,282" fill="#93c5fd"/>
  <polygon points="144,274 134,278 144,282" fill="#93c5fd"/>
  <text x="192" y="296" class="t-code2">width: 200px</text>

  <!-- height dimension line -->
  <line x1="356" y1="175" x2="356" y2="265" stroke="#93c5fd" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="352,261 356,271 360,261" fill="#93c5fd"/>
  <polygon points="352,179 356,169 360,179" fill="#93c5fd"/>
  <text x="364" y="228" class="t-code2">height: 90px</text>

  <!-- Property panel on right -->
  <rect x="560" y="90" width="288" height="340" rx="10" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="576" y="118" class="t-label">주요 레이아웃 속성</text>
  <line x1="576" y1="126" x2="834" y2="126" stroke="#222" stroke-width="1"/>

  <!-- Properties list -->
  <rect x="576" y="140" width="256" height="28" rx="5" fill="#1a1a2e"/>
  <text x="588" y="158" class="t-code2">left</text>
  <text x="650" y="158" class="t-sub">컴포넌트 좌측 끝 X 좌표</text>

  <rect x="576" y="176" width="256" height="28" rx="5" fill="#1a1a2e"/>
  <text x="588" y="194" class="t-code2">top</text>
  <text x="650" y="194" class="t-sub">컴포넌트 상단 끝 Y 좌표</text>

  <rect x="576" y="212" width="256" height="28" rx="5" fill="#1a1a2e"/>
  <text x="588" y="230" class="t-code2">width</text>
  <text x="650" y="230" class="t-sub">너비 (px 또는 %)</text>

  <rect x="576" y="248" width="256" height="28" rx="5" fill="#1a1a2e"/>
  <text x="588" y="266" class="t-code2">height</text>
  <text x="650" y="266" class="t-sub">높이 (px 또는 %)</text>

  <rect x="576" y="284" width="256" height="28" rx="5" fill="#1a1a2e"/>
  <text x="588" y="302" class="t-code2">right</text>
  <text x="650" y="302" class="t-sub">우측 여백 (앵커 배치)</text>

  <rect x="576" y="320" width="256" height="28" rx="5" fill="#1a1a2e"/>
  <text x="588" y="338" class="t-code2">bottom</text>
  <text x="650" y="338" class="t-sub">하단 여백 (앵커 배치)</text>

  <rect x="576" y="356" width="256" height="28" rx="5" fill="#1a1f1a"/>
  <text x="588" y="374" class="t-code">cssclass</text>
  <text x="660" y="374" class="t-sub">XCSS 클래스 지정</text>

  <!-- Bottom note -->
  <text x="36" y="454" class="t-sub">* right/bottom 지정 시 창 크기 변화에 따라 자동 재배치(앵커 기능)</text>
  <text x="36" y="470" class="t-sub">* % 단위는 부모 컨테이너 크기 기준으로 계산됨</text>
</svg>
