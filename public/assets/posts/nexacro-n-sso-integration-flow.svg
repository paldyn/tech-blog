<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">SAML/OIDC SSO 연동 흐름</text>

  <!-- Actors -->
  <rect x="40" y="80" width="140" height="44" rx="6" fill="#111827" stroke="#7ec8e3"/>
  <text x="110" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Nexacro Client</text>

  <rect x="360" y="80" width="160" height="44" rx="6" fill="#111827" stroke="#55c555"/>
  <text x="440" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">앱 서버 (SP)</text>

  <rect x="680" y="80" width="160" height="44" rx="6" fill="#111827" stroke="#7777cc"/>
  <text x="760" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">IdP (인증 서버)</text>

  <!-- Step 1: Client → App Server -->
  <line x1="180" y1="155" x2="358" y2="155" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="356,149 370,155 356,161" fill="#7ec8e3"/>
  <text x="268" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">① GET /app (세션 없음)</text>

  <!-- Step 2: Redirect to IdP -->
  <line x1="520" y1="185" x2="678" y2="185" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="676,179 690,185 676,191" fill="#55c555"/>
  <text x="598" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">② 302 → IdP 로그인 URL</text>

  <!-- Step 3: Client → IdP (browser redirect) -->
  <line x1="180" y1="215" x2="678" y2="215" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="676,209 690,215 676,221" fill="#7ec8e3"/>
  <text x="420" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">③ 브라우저 리다이렉트 → IdP 로그인 UI</text>

  <!-- Step 4: IdP → App (callback) -->
  <line x1="678" y1="255" x2="522" y2="255" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="524,249 510,255 524,261" fill="#7777cc"/>
  <text x="598" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">④ 인증 완료 → callback + code</text>

  <!-- Step 5: App → IdP (token exchange) -->
  <line x1="520" y1="285" x2="678" y2="285" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="676,279 690,285 676,291" fill="#55c555"/>
  <text x="598" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">⑤ code → access_token 교환</text>

  <!-- Step 6: App → Client -->
  <line x1="358" y1="320" x2="180" y2="320" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="182,314 168,320 182,326" fill="#55c555"/>
  <text x="268" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">⑥ 세션 생성 + 사용자 정보 반환</text>

  <!-- Step 7: Store in Nexacro -->
  <rect x="40" y="340" width="140" height="44" rx="4" fill="#1a2a1a" stroke="#55c555"/>
  <text x="110" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">⑦ application 변수</text>
  <text x="110" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">저장 → 메인 화면</text>

  <!-- Nexacro 진입점 -->
  <rect x="40" y="410" width="760" height="64" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Nexacro 진입점: application.xadl 또는 초기 폼에서 /api/session/check 호출</text>
  <text x="440" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SSO 인증이 완료된 상태면 세션이 이미 존재 → 바로 사용자 정보 수신</text>
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">세션 없으면 /api/auth/sso-redirect → 브라우저가 IdP로 이동 (URL 변경)</text>
</svg>
