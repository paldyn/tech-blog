<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <!-- background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Boot 3 마이그레이션 핵심 체크리스트
  </text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="70" width="36" height="36" fill="#7ec8e3" rx="18"/>
  <text x="78" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">1</text>
  <text x="110" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Java 17 이상으로 업그레이드</text>
  <text x="110" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Spring Boot 3.x 최소 요구사항: Java 17</text>

  <!-- Step 2 -->
  <rect x="60" y="130" width="36" height="36" fill="#7ec8e3" rx="18"/>
  <text x="78" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">2</text>
  <text x="110" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">spring-boot-dependencies 3.x 적용</text>
  <text x="110" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">pom.xml / build.gradle의 parent 버전 변경</text>

  <!-- Step 3 -->
  <rect x="60" y="190" width="36" height="36" fill="#7ec8e3" rx="18"/>
  <text x="78" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">3</text>
  <text x="110" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">javax.* → jakarta.* 일괄 치환</text>
  <text x="110" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">IntelliJ Migrate to Jakarta EE 10 또는 OpenRewrite 사용</text>

  <!-- Step 4 -->
  <rect x="60" y="250" width="36" height="36" fill="#7ec8e3" rx="18"/>
  <text x="78" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">4</text>
  <text x="110" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Security / Actuator 설정 재확인</text>
  <text x="110" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Security 6.x API 변경, Actuator 기본 노출 변경</text>

  <!-- code block: OpenRewrite example -->
  <rect x="60" y="310" width="760" height="170" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"><!-- build.gradle: OpenRewrite 마이그레이션 플러그인 --></text>
  <text x="76" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">plugins &#123;</text>
  <text x="76" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    id(<tspan fill="#ce9178">"org.openrewrite.rewrite"</tspan>) version <tspan fill="#ce9178">"6.x"</tspan></text>
  <text x="76" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&#125;</text>
  <text x="76" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">rewrite &#123;</text>
  <text x="76" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    activeRecipe(<tspan fill="#ce9178">"...UpgradeSpringBoot_3_2"</tspan>)</text>
  <text x="76" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&#125;</text>
</svg>
