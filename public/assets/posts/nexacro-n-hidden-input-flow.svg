<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Hidden — 화면 데이터 흐름</text>

  <!-- Login/Session box (top source) -->
  <rect x="50" y="72" width="240" height="76" rx="8" fill="#0d1a30" stroke="#2050a0" stroke-width="1.5"/>
  <text x="170" y="98" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">로그인 / 세션</text>
  <text x="170" y="118" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">gv_userId = "U001"</text>
  <text x="170" y="136" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">gv_deptCd = "D02"</text>

  <!-- Arrow down to Form onload -->
  <rect x="161" y="152" width="18" height="46" rx="2" fill="#7777cc"/>
  <polygon points="152,198 188,198 170,220" fill="#7777cc" stroke="#3a3a80" stroke-width="1"/>
  <text x="196" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">Form_onload</text>

  <!-- Form Hidden area -->
  <rect x="50" y="228" width="340" height="120" rx="8" fill="#0d1828" stroke="#1e3050" stroke-width="1.5"/>
  <text x="220" y="254" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8">Form 화면 (숨겨진 컴포넌트)</text>

  <!-- Hidden components (invisible but value stored) -->
  <rect x="70" y="266" width="140" height="32" rx="4" fill="#1a1a30" stroke="#2a2a60" stroke-dasharray="4,3"/>
  <text x="82" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="10" fill="#7777cc">hdnUserId</text>
  <text x="82" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="10" fill="#ce9178">"U001"</text>

  <rect x="230" y="266" width="140" height="32" rx="4" fill="#1a1a30" stroke="#2a2a60" stroke-dasharray="4,3"/>
  <text x="242" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="10" fill="#7777cc">hdnDeptCd</text>
  <text x="242" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="10" fill="#ce9178">"D02"</text>

  <!-- "hidden = not visible" annotation -->
  <rect x="70" y="308" width="300" height="26" rx="4" fill="#100a20" stroke="#3a2060"/>
  <text x="82" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">visible=false — 화면에 보이지 않음, 값은 유지</text>

  <!-- Arrow right to Transaction -->
  <rect x="400" y="278" width="74" height="10" rx="2" fill="#55c555"/>
  <polygon points="474,268 474,298 500,283" fill="#55c555" stroke="#206020" stroke-width="1"/>
  <text x="437" y="264" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">fn_save() 호출 시</text>

  <!-- Transaction / Dataset box -->
  <rect x="510" y="228" width="320" height="120" rx="8" fill="#0a2010" stroke="#206030" stroke-width="1.5"/>
  <text x="670" y="254" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">서버 전송 Dataset</text>

  <text x="526" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">USER_ID:</text>
  <text x="604" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ce9178">"U001"</text>
  <text x="680" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#6a8aa0">← hdnUserId.value</text>

  <text x="526" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">DEPT_CD:</text>
  <text x="604" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ce9178">"D02"</text>
  <text x="680" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#6a8aa0">← hdnDeptCd.value</text>

  <text x="526" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">INPUT_DATA: ...</text>
  <text x="680" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#6a8aa0">← 사용자 입력</text>

  <text x="526" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">REG_DATE: ...</text>
  <text x="680" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#6a8aa0">← 시스템 날짜</text>

  <!-- Use cases box -->
  <rect x="50" y="376" width="780" height="38" rx="6" fill="#0d1a10" stroke="#1e4020"/>
  <text x="440" y="394" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">대표 활용: 로그인 사용자 ID · 권한 코드 · 조회 조건 파라미터 · 팝업 전달 값</text>
  <text x="440" y="408" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">→ 화면에는 보이지 않지만 Dataset에 포함되어 서버로 전송</text>

  <!-- Footer -->
  <text x="440" y="432" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복</text>
</svg>
