<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="ptA" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파라미터화 테스트</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">하나의 메서드, 여러 입력으로 반복</text>

  <!-- source -->
  <rect x="60" y="100" width="240" height="200" rx="8" fill="#0a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="180" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">입력 소스</text>
  <text x="180" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">2</text>
  <text x="180" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">4</text>
  <text x="180" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">6</text>
  <text x="180" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">8</text>
  <text x="180" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">@ValueSource 등</text>

  <!-- method -->
  <rect x="360" y="160" width="200" height="80" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="460" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">isEven(n)</text>
  <text x="460" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">@ParameterizedTest</text>

  <line x1="300" y1="200" x2="360" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ptA)"/>

  <!-- results -->
  <rect x="620" y="120" width="200" height="40" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">[1] n=2 ✓</text>
  <rect x="620" y="170" width="200" height="40" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">[2] n=4 ✓</text>
  <rect x="620" y="220" width="200" height="40" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">[3] n=6 ✓</text>
  <rect x="620" y="270" width="200" height="40" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">[4] n=8 ✓</text>

  <line x1="560" y1="200" x2="620" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ptA)"/>
  <line x1="560" y1="200" x2="620" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ptA)"/>
  <line x1="560" y1="200" x2="620" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ptA)"/>
  <line x1="560" y1="200" x2="620" y2="290" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ptA)"/>

  <!-- note -->
  <rect x="60" y="332" width="760" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">입력 하나당 별도의 테스트 실행으로 카운트 — 어느 입력에서 실패했는지 명확</text>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">중복 코드 없이 경계값과 다양한 케이스를 한 메서드로 검증</text>
</svg>
