<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <!-- 배경 -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SecurityFilterChain 기본 설정 구조</text>

  <!-- 왼쪽 코드 박스 (x=50, y=68, w=380, h=344) -->
  <rect x="50" y="68" width="380" height="344" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">SecurityConfig.java</text>
  <line x1="50" y1="104" x2="430" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- 코드 내용: body=104~412=308px, 12줄×18=216span
       pad=(308-216-13)/2=39.5 → first=104+39.5+10=153.5≈154 -->
  <text x="66" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Configuration</tspan></text>
  <text x="66" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@EnableWebSecurity</tspan></text>
  <text x="66" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> SecurityConfig {</tspan></text>
  <text x="66" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="66" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="66" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> SecurityFilterChain</tspan></text>
  <text x="66" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#ffffff">filterChain(HttpSecurity http)</tspan></text>
  <text x="66" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">throws Exception {</tspan></text>
  <text x="66" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">http</tspan></text>
  <text x="66" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.authorizeHttpRequests(...)</tspan></text>
  <text x="66" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.formLogin(...);</tspan></text>
  <text x="66" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> http.build();</tspan></text>
  <text x="66" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan x="80">}</tspan></text>
  <text x="66" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- 오른쪽 설명 박스 (x=450, y=68, w=380, h=344) -->
  <rect x="450" y="68" width="380" height="344" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">핵심 컴포넌트 역할</text>
  <line x1="450" y1="104" x2="830" y2="104" stroke="#7777cc" stroke-width="1" opacity="0.4"/>

  <!-- 설명 항목들 (7항목, step=38, body=104~412=308px)
       pad=(308-6×38-13)/2=(308-228-13)/2=33.5 → first=104+33.5+10=147.5≈148 -->
  <text x="470" y="148"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">@EnableWebSecurity</text>
  <text x="470" y="163"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Spring Security 자동 구성 + MVC 통합 활성화</text>

  <text x="470" y="197"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">HttpSecurity</text>
  <text x="470" y="212"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">필터 체인을 DSL 방식으로 구성하는 빌더</text>

  <text x="470" y="246"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">authorizeHttpRequests</text>
  <text x="470" y="261"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">URL별 접근 권한 규칙 정의</text>

  <text x="470" y="295"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">formLogin / oauth2Login</text>
  <text x="470" y="310"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인증 방식 설정 (폼 로그인, OAuth2 등)</text>

  <text x="470" y="344"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">http.build()</text>
  <text x="470" y="359"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">설정을 SecurityFilterChain 인스턴스로 빌드</text>

  <text x="470" y="393"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">⚡ Boot 3.x: matcher → requestMatchers()</text>
</svg>
