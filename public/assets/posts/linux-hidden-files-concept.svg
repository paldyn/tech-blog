<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">숨김 파일의 원리</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">이름이 '.'으로 시작하면 ls 기본 출력에서 제외된다</text>

  <!-- Left panel: ls (without -a) -->
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">$ ls  (숨김 파일 제외)</text>
  <rect x="60" y="110" width="340" height="220" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">documents/</text>
  <text x="80" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">music/</text>
  <text x="80" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pictures/</text>
  <text x="80" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">readme.md</text>
  <text x="80" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">script.sh</text>
  <text x="80" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">← .bashrc, .config/ 등</text>
  <text x="80" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">   숨김 파일은 보이지 않음</text>
  <rect x="60" y="110" width="340" height="220" fill="none" rx="6" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Arrow -->
  <polygon points="430,220 450,210 450,230" fill="#7ec8e3"/>
  <line x1="400" y1="220" x2="449" y2="220" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">-a 추가</text>

  <!-- Right panel: ls -a (with hidden) -->
  <text x="480" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">$ ls -a  (숨김 파일 포함)</text>
  <rect x="460" y="110" width="360" height="220" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">./</text>
  <text x="480" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">../</text>
  <text x="480" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">.bashrc</text>
  <text x="480" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">.bash_history</text>
  <text x="480" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">.config/</text>
  <text x="480" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">.ssh/</text>
  <text x="480" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">documents/</text>
  <text x="480" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">music/</text>
  <text x="480" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pictures/</text>
  <text x="480" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">readme.md</text>
  <text x="480" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">script.sh</text>

  <!-- Legend -->
  <rect x="60" y="352" width="16" height="12" fill="#55c555" rx="2"/>
  <text x="82" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">숨김 파일 (. 시작)</text>
  <rect x="220" y="352" width="16" height="12" fill="#e8e8e8" rx="2"/>
  <text x="242" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">일반 파일/디렉터리</text>
  <rect x="420" y="352" width="16" height="12" fill="#7ec8e3" rx="2"/>
  <text x="442" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">. (현재)·.. (상위) 항목</text>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">숨김 여부는 파일 속성이 아닌 이름 규칙이다 — ls가 소프트웨어 관례로 필터링한다</text>
</svg>
