<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">포트 바인딩 보안: 0.0.0.0 vs 127.0.0.1</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">외부 노출 범위를 IP 바인딩으로 제한</text>

  <!-- 0.0.0.0 side (left) - dangerous -->
  <rect x="60" y="88" width="340" height="240" rx="10" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="116" text-anchor="middle" fill="#e05555" font-size="14" font-weight="600">-p 8080:80 (위험)</text>
  <text x="230" y="138" text-anchor="middle" fill="#888" font-size="12">0.0.0.0:8080 → 모든 인터페이스</text>

  <rect x="80" y="152" width="300" height="80" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="100" y="176" fill="#7ec8e3" font-size="12" xml:space="preserve">docker run -p 8080:80 nginx</text>
  <text x="100" y="200" fill="#888" font-size="12" xml:space="preserve"># 모든 IP에서 접근 가능</text>
  <text x="100" y="218" fill="#e05555" font-size="12" xml:space="preserve"># 방화벽 없으면 외부 노출!</text>

  <text x="230" y="264" text-anchor="middle" fill="#e8e8e8" font-size="12">인터넷 → :8080 접근 가능</text>
  <text x="230" y="284" text-anchor="middle" fill="#e05555" font-size="12">DB 포트 실수 노출 사고 多</text>
  <text x="230" y="304" text-anchor="middle" fill="#888" font-size="11">클라우드 SG에만 의존하면 위험</text>

  <!-- 127.0.0.1 side (right) - safe -->
  <rect x="480" y="88" width="340" height="240" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="116" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">-p 127.0.0.1:8080:80 (권장)</text>
  <text x="650" y="138" text-anchor="middle" fill="#888" font-size="12">127.0.0.1:8080 → 로컬호스트만</text>

  <rect x="500" y="152" width="300" height="80" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="520" y="176" fill="#7ec8e3" font-size="12" xml:space="preserve">docker run \</text>
  <text x="520" y="194" fill="#7ec8e3" font-size="12" xml:space="preserve">  -p 127.0.0.1:8080:80 nginx</text>
  <text x="520" y="212" fill="#55c555" font-size="12" xml:space="preserve"># 호스트 내부에서만 접근</text>

  <text x="650" y="264" text-anchor="middle" fill="#e8e8e8" font-size="12">로컬 → :8080만 가능</text>
  <text x="650" y="284" text-anchor="middle" fill="#55c555" font-size="12">외부에서 직접 접근 불가</text>
  <text x="650" y="304" text-anchor="middle" fill="#888" font-size="11">Nginx reverse proxy와 조합 권장</text>
</svg>
