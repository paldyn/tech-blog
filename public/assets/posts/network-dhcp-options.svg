<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DHCP 옵션과 서버 설정</text>

  <!-- Options table -->
  <rect x="60" y="68" width="380" height="300" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="250" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">주요 DHCP 옵션</text>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">Option</text>
  <text x="180" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">내용</text>
  <line x1="80" y1="122" x2="420" y2="122" stroke="#333" stroke-width="1"/>
  <text x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">1</text>
  <text x="180" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">서브넷 마스크</text>
  <text x="80" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">3</text>
  <text x="180" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">기본 게이트웨이</text>
  <text x="80" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">6</text>
  <text x="180" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DNS 서버</text>
  <text x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">15</text>
  <text x="180" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">도메인 이름</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">51</text>
  <text x="180" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">임대 기간 (초)</text>
  <text x="80" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">53</text>
  <text x="180" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">메시지 타입</text>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">54</text>
  <text x="180" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DHCP 서버 식별자</text>
  <text x="80" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">121</text>
  <text x="180" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">정적 경로 (classless)</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">43</text>
  <text x="180" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">벤더별 정보</text>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">119</text>
  <text x="180" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">도메인 검색 목록</text>
  <text x="80" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">252</text>
  <text x="180" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">WPAD 프록시 자동 설정</text>

  <!-- Server config code -->
  <rect x="460" y="68" width="380" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="650" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ISC DHCP 서버 설정</text>
  <text x="480" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># /etc/dhcp/dhcpd.conf</text>
  <text x="480" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">subnet</text>
  <text x="536" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> 192.168.1.0</text>
  <text x="636" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600"> netmask</text>
  <text x="700" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> 255.255.255.0 {</text>
  <text x="480" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  range 192.168.1.100 192.168.1.200;</text>
  <text x="480" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  option routers 192.168.1.1;</text>
  <text x="480" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  option domain-name-servers</text>
  <text x="480" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    8.8.8.8, 8.8.4.4;</text>
  <text x="480" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">  default-lease-time 86400;</text>
  <text x="480" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">  max-lease-time 604800;</text>
  <text x="480" y="276" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>
  <text x="480" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 고정 IP 예약 (MAC 기반)</text>
  <text x="480" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">host</text>
  <text x="510" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> printer1 {</text>
  <text x="480" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  hardware ethernet 00:1a:2b:3c:4d:5e;</text>
  <text x="480" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  fixed-address 192.168.1.50;</text>
  <text x="480" y="376" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>
</svg>
