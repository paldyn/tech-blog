<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">브랜치 생성 패턴</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">생성만 vs 생성+이동 vs 특정 커밋 기준</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="252" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#9aa4b8"># 1. 현재 위치에서 브랜치만 생성 (HEAD는 그대로)</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> feature-login</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 2. 생성 + 즉시 이동 (가장 자주 사용)</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git switch</tspan> -c feature-login</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git checkout</tspan> -b feature-login   <tspan fill="#9aa4b8"># 구 방식</tspan></tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 3. 특정 커밋·태그에서 브랜치 생성</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> hotfix/login-null HEAD~3</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> release/1.0 v1.0.0-rc</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 4. 원격 브랜치 기반으로 로컬 생성</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git switch</tspan> -c feature-login origin/feature-login</tspan>
  </text>

  <!-- Pattern cards -->
  <rect x="60" y="370" width="180" height="52" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="150" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">git branch &lt;name&gt;</text>
  <text x="150" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">생성만 (HEAD 유지)</text>

  <rect x="256" y="370" width="200" height="52" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="356" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">git switch -c &lt;name&gt;</text>
  <text x="356" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">생성 + 이동 (권장)</text>

  <rect x="472" y="370" width="200" height="52" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.2"/>
  <text x="572" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">git branch &lt;name&gt; &lt;ref&gt;</text>
  <text x="572" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">특정 ref 기준 생성</text>

  <rect x="688" y="370" width="152" height="52" rx="8" fill="#0d1117" stroke="#e8a838" stroke-width="1.2"/>
  <text x="764" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a838" text-anchor="middle">switch -c + origin/</text>
  <text x="764" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">원격 기반 생성</text>
</svg>
