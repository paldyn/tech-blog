<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrInfo" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">모듈 보강: 남의 라이브러리 타입 확장하기</text>

  <rect x="50" y="120" width="220" height="80" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="70" y="146" font-size="13" font-weight="600" fill="#e8e8e8">원본 모듈</text>
  <text x="70" y="168" font-size="11" fill="#888">express 패키지</text>
  <text x="70" y="188" font-size="11" fill="#888">interface Request { ... }</text>

  <rect x="330" y="120" width="220" height="80" rx="8" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="146" font-size="13" font-weight="600" fill="#e8e8e8">보강 파일 (.d.ts)</text>
  <text x="350" y="168" font-size="11" fill="#888">declare module 'express'</text>
  <text x="350" y="188" font-size="11" fill="#888">+ user?: User</text>

  <rect x="610" y="120" width="220" height="80" rx="8" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="146" font-size="13" font-weight="600" fill="#e8e8e8">병합된 타입</text>
  <text x="630" y="168" font-size="11" fill="#888">Request</text>
  <text x="630" y="188" font-size="11" fill="#888">+ user?: User</text>

  <text x="300" y="150" font-size="11" fill="#888">병합</text>
  <line x1="270" y1="160" x2="330" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <text x="580" y="150" font-size="11" fill="#888">결과</text>
  <line x1="550" y1="160" x2="610" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>

  <text x="60" y="252" font-size="13" fill="#9aa4b8">선언 병합 규칙을 모듈 경계 너머로 확장해, 이미 타입이 있는 모듈에 멤버를 더한다.</text>
</svg>
