<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c84a"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">release / hotfix 브랜치 흐름</text>

  <!-- main -->
  <text x="76" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">main</text>
  <line x1="60" y1="94" x2="820" y2="94" stroke="#7ec8e3" stroke-width="3"/>
  <circle cx="160" cy="94" r="7" fill="#7ec8e3"/>
  <text x="160" y="82" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#7ec8e3">v1.0</text>
  <circle cx="540" cy="94" r="7" fill="#7ec8e3"/>
  <text x="540" y="82" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#7ec8e3">v1.1</text>
  <circle cx="750" cy="94" r="7" fill="#e05555"/>
  <text x="750" y="82" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e05555">v1.1.1</text>

  <!-- develop -->
  <text x="76" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">develop</text>
  <line x1="160" y1="162" x2="820" y2="162" stroke="#55c555" stroke-width="2.5"/>
  <line x1="160" y1="94" x2="160" y2="162" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <circle cx="300" cy="162" r="6" fill="#55c555"/>
  <circle cx="400" cy="162" r="6" fill="#55c555"/>

  <!-- release branch -->
  <text x="300" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c84a">release/1.1</text>
  <line x1="320" y1="244" x2="540" y2="244" stroke="#e8c84a" stroke-width="2"/>
  <circle cx="380" cy="244" r="6" fill="#e8c84a"/>
  <circle cx="460" cy="244" r="6" fill="#e8c84a"/>
  <text x="380" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666">QA 버그픽스</text>

  <!-- release fork from develop -->
  <line x1="320" y1="162" x2="320" y2="244" stroke="#e8c84a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-y)"/>
  <!-- release merge to main + develop -->
  <path d="M 540 244 Q 540 168 540 94" fill="none" stroke="#e8c84a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <path d="M 540 244 Q 580 244 580 203 Q 580 162 580 162" fill="none" stroke="#e8c84a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
  <circle cx="580" cy="162" r="6" fill="#e8c84a"/>

  <!-- hotfix branch -->
  <text x="610" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">hotfix/1.1.1</text>
  <line x1="630" y1="352" x2="750" y2="352" stroke="#e05555" stroke-width="2"/>
  <circle cx="690" cy="352" r="6" fill="#e05555"/>
  <text x="690" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666">긴급 패치</text>

  <!-- hotfix fork from main -->
  <line x1="630" y1="94" x2="630" y2="352" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <!-- hotfix merge to main + develop -->
  <path d="M 750 352 Q 750 223 750 94" fill="none" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <path d="M 750 352 Q 790 352 790 257 Q 790 162 790 162" fill="none" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
  <circle cx="790" cy="162" r="6" fill="#e05555"/>

  <!-- annotations -->
  <rect x="60" y="420" width="360" height="58" rx="8" fill="#111" stroke="#e8c84a" stroke-width="1.2"/>
  <text x="240" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c84a">release 브랜치</text>
  <text x="240" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">develop → main + develop 머지</text>
  <text x="240" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">새 기능 추가 금지, 버그픽스만</text>

  <rect x="460" y="420" width="360" height="58" rx="8" fill="#111" stroke="#e05555" stroke-width="1.2"/>
  <text x="640" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">hotfix 브랜치</text>
  <text x="640" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">main → main + develop 머지</text>
  <text x="640" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">프로덕션 긴급 패치, feature와 독립</text>
</svg>
