<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript의 두 공간: 타입 vs 값</text>
  <!-- Left: Type Space -->
  <rect x="60" y="70" width="360" height="360" rx="10" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="240" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">타입 공간 (Type Space)</text>
  <text x="240" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">컴파일 타임에만 존재 · 런타임에 제거</text>
  <!-- Type space items -->
  <rect x="80" y="148" width="320" height="36" rx="6" fill="#1a1030" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">type</text><text x="300" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> MyType = ...</text>
  <rect x="80" y="196" width="320" height="36" rx="6" fill="#1a1030" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="219" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">interface</text><text x="310" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> User {}</text>
  <rect x="80" y="244" width="320" height="36" rx="6" fill="#1a1030" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  x: </text><text x="130" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">number</text><text x="210" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // 타입 주석</text>
  <rect x="80" y="292" width="320" height="36" rx="6" fill="#1a1030" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  </text><text x="98" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">string</text><text x="158" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> | </text><text x="188" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">number</text><text x="268" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // 유니온</text>
  <rect x="80" y="340" width="320" height="36" rx="6" fill="#1a1030" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">keyof</text><text x="140" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> / </text><text x="165" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">typeof</text><text x="225" y="363" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">  // 타입 연산자</text>
  <text x="240" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">빌드 후 JS에서 완전히 사라짐</text>
  <!-- Right: Value Space -->
  <rect x="460" y="70" width="360" height="360" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">값 공간 (Value Space)</text>
  <text x="640" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">런타임에도 존재 · 실제 JS 코드</text>
  <!-- Value space items -->
  <rect x="480" y="148" width="320" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="490" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">const</text><text x="555" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> x = </text><text x="605" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">42</text><text x="635" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">; // 변수</text>
  <rect x="480" y="196" width="320" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="490" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">function</text><text x="570" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> add() {} </text>
  <rect x="480" y="244" width="320" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="490" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">class</text><text x="545" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Animal {}</text>
  <rect x="480" y="292" width="320" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="490" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">enum</text><text x="550" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Color {}</text><text x="640" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> // 값+타입</text>
  <rect x="480" y="340" width="320" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="490" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text><text x="560" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> fs </text><text x="600" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text><text x="645" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> 'fs'</text>
  <text x="640" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">런타임 JS에도 그대로 남아있음</text>
  <!-- Center divider label -->
  <text x="440" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">|</text>
  <!-- class note -->
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#f0db4f">class는 두 공간 동시 존재: 값(생성자 함수) + 타입(인스턴스 타입)</text>
</svg>
