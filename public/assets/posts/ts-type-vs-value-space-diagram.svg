<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <defs>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">타입 공간 vs 값 공간</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">TypeScript에는 두 개의 세계가 존재한다</text>
  <!-- Type space -->
  <rect x="60" y="95" width="360" height="300" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#7ec8e3">타입 공간 (Type Space)</text>
  <text x="240" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">컴파일 후 완전히 사라진다</text>
  <!-- Type space items -->
  <rect x="80" y="158" width="320" height="30" rx="4" fill="#112244" stroke="#3a6ea8" stroke-width="1"/>
  <text x="240" y="177" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">interface User { name: string }</text>
  <rect x="80" y="196" width="320" height="30" rx="4" fill="#112244" stroke="#3a6ea8" stroke-width="1"/>
  <text x="240" y="215" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">type ID = string | number</text>
  <rect x="80" y="234" width="320" height="30" rx="4" fill="#112244" stroke="#3a6ea8" stroke-width="1"/>
  <text x="240" y="253" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">x: string</text>
  <text x="305" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"> (타입 주석)</text>
  <rect x="80" y="272" width="320" height="30" rx="4" fill="#112244" stroke="#3a6ea8" stroke-width="1"/>
  <text x="240" y="291" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">as Type</text>
  <text x="290" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"> (타입 단언)</text>
  <rect x="80" y="310" width="320" height="30" rx="4" fill="#112244" stroke="#3a6ea8" stroke-width="1"/>
  <text x="240" y="329" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Partial&lt;T&gt;, Record&lt;K, V&gt;</text>
  <text x="240" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">컴파일 타임에만 존재</text>
  <text x="240" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">런타임 참조 불가</text>
  <!-- Value space -->
  <rect x="460" y="95" width="360" height="300" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#55c555">값 공간 (Value Space)</text>
  <text x="640" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">컴파일 후에도 JavaScript로 남는다</text>
  <!-- Value space items -->
  <rect x="480" y="158" width="320" height="30" rx="4" fill="#112211" stroke="#2a6a2a" stroke-width="1"/>
  <text x="640" y="177" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">const user = { name: "Alice" }</text>
  <rect x="480" y="196" width="320" height="30" rx="4" fill="#112211" stroke="#2a6a2a" stroke-width="1"/>
  <text x="640" y="215" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">function greet(name) { ... }</text>
  <rect x="480" y="234" width="320" height="30" rx="4" fill="#112211" stroke="#2a6a2a" stroke-width="1"/>
  <text x="640" y="253" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">class Animal { ... }</text>
  <rect x="480" y="272" width="320" height="30" rx="4" fill="#112211" stroke="#2a6a2a" stroke-width="1"/>
  <text x="640" y="291" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">enum Direction { Up, Down }</text>
  <rect x="480" y="310" width="320" height="30" rx="4" fill="#112211" stroke="#2a6a2a" stroke-width="1"/>
  <text x="640" y="329" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">import fs from "fs"</text>
  <text x="640" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">런타임에 실제로 존재</text>
  <text x="640" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">JavaScript로 변환됨</text>
  <!-- Overlap: class, enum note -->
  <rect x="60" y="415" width="760" height="58" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">class와 enum은 두 공간 모두에 존재</text>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">class: 타입으로도(타입 검사), 값으로도(런타임 객체) 사용 가능</text>
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">enum: 타입으로도(타입 검사), 값으로도(런타임 객체) 사용 가능</text>
</svg>
