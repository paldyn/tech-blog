<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">타입 공간 vs 값 공간</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">TypeScript는 두 개의 평행한 세계를 가집니다</text>
  <!-- Type Space box -->
  <rect x="60" y="100" width="350" height="280" rx="10" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="235" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">타입 공간 (Type Space)</text>
  <text x="235" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컴파일 타임에만 존재 · 런타임에 제거됨</text>
  <line x1="80" y1="162" x2="390" y2="162" stroke="#1e3a4e" stroke-width="1"/>
  <!-- Type space items -->
  <rect x="80" y="174" width="310" height="34" rx="4" fill="#111830"/>
  <text x="100" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">interface</text>
  <text x="190" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">User { name: string }</text>
  <rect x="80" y="214" width="310" height="34" rx="4" fill="#111830"/>
  <text x="100" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">type</text>
  <text x="148" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ID = string | number</text>
  <rect x="80" y="254" width="310" height="34" rx="4" fill="#111830"/>
  <text x="100" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">type alias</text>
  <text x="204" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 어노테이션 ": string"</text>
  <rect x="80" y="294" width="310" height="34" rx="4" fill="#111830"/>
  <text x="100" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">generic</text>
  <text x="185" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">매개변수 T, extends, keyof</text>
  <text x="235" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">JS로 컴파일 시 완전히 사라짐</text>
  <!-- Value Space box -->
  <rect x="470" y="100" width="350" height="280" rx="10" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="645" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">값 공간 (Value Space)</text>
  <text x="645" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">런타임에도 존재 · JS에 남아있음</text>
  <line x1="490" y1="162" x2="800" y2="162" stroke="#1e4a1e" stroke-width="1"/>
  <!-- Value space items -->
  <rect x="490" y="174" width="310" height="34" rx="4" fill="#0d1f0d"/>
  <text x="510" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">const</text>
  <text x="566" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">user = { name: "Alice" }</text>
  <rect x="490" y="214" width="310" height="34" rx="4" fill="#0d1f0d"/>
  <text x="510" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">function</text>
  <text x="590" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">greet(name) { ... }</text>
  <rect x="490" y="254" width="310" height="34" rx="4" fill="#0d1f0d"/>
  <text x="510" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">class</text>
  <text x="556" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">User { constructor(...) }</text>
  <rect x="490" y="294" width="310" height="34" rx="4" fill="#0d1f0d"/>
  <text x="510" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">enum</text>
  <text x="559" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Direction (값 + 타입 동시)</text>
  <text x="645" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">런타임에 실제 값으로 존재</text>
  <!-- Both label -->
  <text x="440" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">class / enum : 두 공간 동시 존재</text>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">class는 타입으로도(타입 어노테이션) · 값으로도(new로 인스턴스 생성) 사용 가능</text>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">interface는 타입 공간에만 존재 — typeof interface는 불가</text>
</svg>
