<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">딕셔너리 컴프리헨션</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">{키표현식: 값표현식 for 변수 in 이터러블 if 조건}</text>

  <!-- Syntax -->
  <rect x="60" y="100" width="760" height="72" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="130" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">{<tspan fill="#ce9178">k</tspan><tspan fill="#888">:</tspan> <tspan fill="#55c555">v*2</tspan>  <tspan fill="#7ec8e3">for</tspan>  <tspan fill="#e8e8e8">k, v</tspan>  <tspan fill="#7ec8e3">in</tspan>  <tspan fill="#7777cc">d.items()</tspan>  <tspan fill="#7ec8e3">if</tspan>  <tspan fill="#e8e8e8">v > 0</tspan>}</text>
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#6a8aa0">키 표현식 · 값 표현식 · 루프 · 조건 (선택)</text>

  <!-- Examples left -->
  <rect x="60" y="192" width="360" height="240" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="240" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 패턴</text>
  <rect x="76" y="228" width="328" height="188" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 리스트 → dict</text>
  <text x="92" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">words = [<tspan fill="#ce9178">"cat"</tspan>, <tspan fill="#ce9178">"elephant"</tspan>, <tspan fill="#ce9178">"ox"</tspan>]</text>
  <text x="92" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">{w: len(w) <tspan fill="#7ec8e3">for</tspan> w <tspan fill="#7ec8e3">in</tspan> words}</text>
  <text x="92" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># {'cat':3,'elephant':8,'ox':2}</text>
  <text x="92" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 키·값 교환 (invert)</text>
  <text x="92" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">d = {<tspan fill="#ce9178">"a"</tspan>:<tspan fill="#b5cea8">1</tspan>, <tspan fill="#ce9178">"b"</tspan>:<tspan fill="#b5cea8">2</tspan>, <tspan fill="#ce9178">"c"</tspan>:<tspan fill="#b5cea8">3</tspan>}</text>
  <text x="92" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">{v: k <tspan fill="#7ec8e3">for</tspan> k, v <tspan fill="#7ec8e3">in</tspan> d.items()}</text>
  <text x="92" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># {1:'a', 2:'b', 3:'c'}</text>
  <text x="92" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 값 중복 시 마지막 키가 남음</text>
  <text x="92" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"></text>

  <!-- Examples right -->
  <rect x="460" y="192" width="360" height="240" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">필터링 · 변환</text>
  <rect x="476" y="228" width="328" height="188" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 값이 양수인 항목만</text>
  <text x="492" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">scores = {<tspan fill="#ce9178">"A"</tspan>:<tspan fill="#b5cea8">80</tspan>,<tspan fill="#ce9178">"B"</tspan>:-<tspan fill="#b5cea8">5</tspan>,<tspan fill="#ce9178">"C"</tspan>:<tspan fill="#b5cea8">90</tspan>}</text>
  <text x="492" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">{k:v <tspan fill="#7ec8e3">for</tspan> k,v <tspan fill="#7ec8e3">in</tspan> scores.items()</text>
  <text x="492" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> <tspan fill="#7ec8e3">if</tspan> v >= <tspan fill="#b5cea8">0</tspan>}</text>
  <text x="492" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># {'A':80, 'C':90}</text>
  <text x="492" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 키를 소문자로 정규화</text>
  <text x="492" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">data = {<tspan fill="#ce9178">"Name"</tspan>:<tspan fill="#ce9178">"Kim"</tspan>,<tspan fill="#ce9178">"AGE"</tspan>:<tspan fill="#b5cea8">30</tspan>}</text>
  <text x="492" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">{k.lower():v</text>
  <text x="492" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> <tspan fill="#7ec8e3">for</tspan> k,v <tspan fill="#7ec8e3">in</tspan> data.items()}</text>
  <text x="492" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># {'name':'Kim', 'age':30}</text>

  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">중복 키 시 나중 값이 이전 값을 덮어씀</text>
</svg>
