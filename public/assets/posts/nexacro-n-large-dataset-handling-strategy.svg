<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">대용량 데이터 처리 전략</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">데이터 규모에 따른 세 가지 처리 패턴 선택 가이드</text>

  <!-- Decision box -->
  <rect x="315" y="100" width="250" height="48" rx="8" fill="#161620" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">데이터 건수 판단</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">서버에서 몇 건을 가져올 것인가?</text>

  <!-- Arrow down from decision -->
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <line x1="440" y1="148" x2="440" y2="170" stroke="#7777cc" stroke-width="2"/>
  <line x1="175" y1="170" x2="705" y2="170" stroke="#555" stroke-width="1.5"/>

  <!-- Branch arrows -->
  <line x1="175" y1="170" x2="175" y2="192" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="440" y1="170" x2="440" y2="192" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="705" y1="170" x2="705" y2="192" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Range labels -->
  <text x="175" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">~ 5,000건</text>
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">5,000 ~ 20,000건</text>
  <text x="705" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">20,000건 이상</text>

  <!-- Box 1: 서버 페이징 -->
  <rect x="55" y="205" width="240" height="200" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">서버 페이징</text>
  <text x="175" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Server-side Paging</text>
  <line x1="75" y1="262" x2="275" y2="262" stroke="#1e3a1e" stroke-width="1"/>
  <text x="75" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 페이지 번호/크기 파라미터 전달</text>
  <text x="75" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 서버가 COUNT + 슬라이스 반환</text>
  <text x="75" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• Dataset 교체 방식으로 처리</text>
  <text x="75" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 네트워크 트래픽 최소화</text>
  <text x="75" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">적용: 업무 목록, 대용량 로그</text>
  <text x="75" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">조회, 이력 관리 화면</text>

  <!-- Box 2: 클라이언트 가상화 -->
  <rect x="320" y="205" width="240" height="200" rx="8" fill="#0d0d1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">전체 로드 + 가상화</text>
  <text x="440" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Full Load + Grid Virtualization</text>
  <line x1="340" y1="262" x2="540" y2="262" stroke="#1e1e3a" stroke-width="1"/>
  <text x="340" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 데이터 전체를 한 번에 로드</text>
  <text x="340" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• Grid 가상 렌더링으로 DOM 절감</text>
  <text x="340" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 클라이언트 필터·정렬 즉시 가능</text>
  <text x="340" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• Dataset 메모리 관리 중요</text>
  <text x="340" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">적용: 집계·분석 화면, 반복 필터</text>
  <text x="340" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">조회가 잦은 업무 화면</text>

  <!-- Box 3: 분할 로드 -->
  <rect x="585" y="205" width="240" height="200" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="705" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">점진적 분할 로드</text>
  <text x="705" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Progressive / Incremental Load</text>
  <line x1="605" y1="262" x2="805" y2="262" stroke="#3a1e1e" stroke-width="1"/>
  <text x="605" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 초기 N건 로드 후 스크롤 시 추가</text>
  <text x="605" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• Dataset.appendData()로 병합</text>
  <text x="605" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 무한 스크롤 UX 구현 가능</text>
  <text x="605" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 서버 커서·ROWNUM 활용</text>
  <text x="605" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">적용: 피드형 화면, 실시간 로그</text>
  <text x="605" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스트리밍, 알림 목록</text>

  <!-- Bottom note -->
  <rect x="55" y="425" width="770" height="70" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="75" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">선택 기준 요약</text>
  <text x="75" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 5천 건 이하 + 집계 불필요 → 서버 페이징　　• 2만 건 이하 + 다중 필터 필요 → 전체 로드 + 가상화</text>
  <text x="75" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 2만 건 초과 또는 실시간 피드 형태 → 점진적 분할 로드 + Dataset.appendData()</text>
</svg>
