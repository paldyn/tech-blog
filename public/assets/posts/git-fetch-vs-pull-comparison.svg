<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fetch vs pull — 동작 방식 비교</text>
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#888">fetch는 가져오기만, pull은 가져오기 + 통합</text>

  <!-- Divider -->
  <line x1="440" y1="100" x2="440" y2="440" stroke="#222" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- === LEFT: fetch === -->
  <text x="220" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">git fetch</text>

  <!-- Remote box -->
  <rect x="130" y="135" width="180" height="50" rx="6" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="220" y="165" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">origin/main (원격)</text>

  <!-- Arrow down -->
  <rect x="218" y="187" width="4" height="50" fill="#7ec8e3"/>
  <polygon points="210,237 230,237 220,257" fill="#7ec8e3"/>

  <!-- origin/main tracking box -->
  <rect x="130" y="259" width="180" height="50" rx="6" fill="#0d1117" stroke="#1e3a5a" stroke-width="1.5"/>
  <text x="220" y="289" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">origin/main (추적)</text>

  <!-- 로컬 main (unchanged) -->
  <rect x="130" y="330" width="180" height="50" rx="6" fill="#0d1117" stroke="#2a3a52" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="220" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">main (변경 없음)</text>

  <!-- fetch label -->
  <text x="220" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">다운로드만</text>

  <!-- Note -->
  <rect x="80" y="398" width="320" height="44" rx="6" fill="#0d1a0d" stroke="#1a3a1a"/>
  <text x="240" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">이후 직접 git merge / rebase 필요</text>

  <!-- === RIGHT: pull === -->
  <text x="660" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc">git pull</text>

  <!-- Remote box -->
  <rect x="570" y="135" width="180" height="50" rx="6" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="660" y="165" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">origin/main (원격)</text>

  <!-- Arrow: fetch step -->
  <rect x="658" y="187" width="4" height="50" fill="#7ec8e3"/>
  <polygon points="650,237 670,237 660,257" fill="#7ec8e3"/>

  <!-- origin/main tracking -->
  <rect x="570" y="259" width="180" height="50" rx="6" fill="#0d1117" stroke="#1e3a5a" stroke-width="1.5"/>
  <text x="660" y="289" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">origin/main (추적)</text>

  <!-- Arrow: merge step -->
  <rect x="658" y="311" width="4" height="18" fill="#7777cc"/>
  <polygon points="650,329 670,329 660,349" fill="#7777cc"/>

  <!-- local main (updated) -->
  <rect x="570" y="351" width="180" height="50" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="381" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">main (자동 통합됨)</text>

  <!-- fetch label -->
  <text x="660" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">① fetch</text>
  <text x="660" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">② merge</text>

  <!-- Note -->
  <rect x="480" y="418" width="320" height="32" rx="6" fill="#12102a" stroke="#3a3a6a"/>
  <text x="640" y="438" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">fetch + merge 를 한 번에 실행</text>
</svg>
