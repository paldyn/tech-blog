<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">선택적 매개변수와 기본값</text>

  <!-- Left: Optional params -->
  <text x="230" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">선택적 매개변수 (?)</text>

  <rect x="60" y="88" width="340" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// ? 로 선택적 매개변수 표시</text>
  <text x="75" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> greet(</tspan>
  </text>
  <text x="75" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  name: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="75" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  title</tspan>
    <tspan fill="#7ec8e3" font-weight="600">?</tspan>
    <tspan fill="#ffffff">: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
  </text>
  <text x="75" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="75" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">  if</tspan>
    <tspan fill="#ffffff"> (title) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> `${title} ${name}`;</tspan>
  </text>
  <text x="75" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> name;</tspan>
  </text>
  <text x="75" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Right: Default params -->
  <text x="650" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">기본값 매개변수 (= value)</text>

  <rect x="480" y="88" width="340" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="495" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// = 로 기본값 지정</text>
  <text x="495" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> greet(</tspan>
  </text>
  <text x="495" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  name: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="495" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  title = </tspan>
    <tspan fill="#ce9178">'Mr.'</tspan>
  </text>
  <text x="495" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="495" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> `${title} ${name}`;</tspan>
  </text>
  <text x="495" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="495" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// title 타입은 string (자동 추론)</text>

  <!-- Comparison boxes -->
  <rect x="60" y="278" width="340" height="80" rx="6" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="230" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">선택적 매개변수 특징</text>
  <text x="230" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입: string | undefined</text>
  <text x="230" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용 전 undefined 체크 필수</text>

  <rect x="480" y="278" width="340" height="80" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">기본값 매개변수 특징</text>
  <text x="650" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입: string (undefined 제외)</text>
  <text x="650" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">undefined 전달 시 기본값 사용</text>

  <!-- Call examples -->
  <rect x="60" y="378" width="760" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">greet(</tspan>
    <tspan fill="#ce9178">'Alice'</tspan>
    <tspan fill="#ffffff">);           </tspan>
    <tspan fill="#9aa4b8">// "Mr. Alice" (기본값 사용)</tspan>
  </text>
  <text x="75" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">greet(</tspan>
    <tspan fill="#ce9178">'Alice'</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">'Dr.'</tspan>
    <tspan fill="#ffffff">);    </tspan>
    <tspan fill="#9aa4b8">// "Dr. Alice" (전달값 사용)</tspan>
  </text>
  <text x="75" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">greet(</tspan>
    <tspan fill="#ce9178">'Alice'</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#7ec8e3" font-weight="600">undefined</tspan>
    <tspan fill="#ffffff">);  </tspan>
    <tspan fill="#9aa4b8">// "Mr. Alice" (undefined = 기본값)</tspan>
  </text>
</svg>
