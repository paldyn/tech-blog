<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Seccomp vs AppArmor — 커널 레벨 보안</text>

  <!-- Seccomp section (left) -->
  <rect x="50" y="62" width="370" height="370" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="50" y="62" width="370" height="40" rx="8" fill="#0d1a30"/>
  <rect x="50" y="94" width="370" height="8" rx="0" fill="#0d1a30"/>
  <text x="235" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Seccomp</text>

  <text x="66" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">제어 대상: 시스템 콜(syscall)</text>
  <text x="66" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로세스가 커널에 요청할 수 있는</text>
  <text x="66" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">시스템 콜 종류를 화이트리스트/블랙리스트로</text>
  <text x="66" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">제한한다.</text>

  <text x="66" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">세 가지 타입:</text>
  <text x="66" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Unconfined</text>
  <text x="66" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  제한 없음 (기본값)</text>
  <text x="66" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">RuntimeDefault</text>
  <text x="66" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  컨테이너 런타임 기본 프로파일</text>
  <text x="66" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  위험한 syscall ~300개 차단</text>
  <text x="66" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Localhost</text>
  <text x="66" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  노드에 배포한 커스텀 JSON 프로파일</text>
  <text x="66" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  /var/lib/kubelet/seccomp/</text>

  <text x="66" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">지원 OS:</text>
  <text x="66" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Linux 커널 기능 — 모든 Linux 배포판</text>
  <text x="235" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">K8s 1.25+: RuntimeDefault 기본값 권고</text>

  <!-- AppArmor section (right) -->
  <rect x="460" y="62" width="370" height="370" rx="8" fill="#0f1520" stroke="#55c555" stroke-width="1.5"/>
  <rect x="460" y="62" width="370" height="40" rx="8" fill="#0d1a0d"/>
  <rect x="460" y="94" width="370" height="8" rx="0" fill="#0d1a0d"/>
  <text x="645" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">AppArmor</text>

  <text x="476" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">제어 대상: 파일/네트워크/리소스</text>
  <text x="476" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로세스가 접근할 수 있는 파일 경로,</text>
  <text x="476" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">네트워크 소켓, 리소스 사용량을 제한한다.</text>
  <text x="476" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Mandatory Access Control(MAC) 구현체.</text>

  <text x="476" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">세 가지 모드:</text>
  <text x="476" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Disabled</text>
  <text x="476" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  AppArmor 미사용</text>
  <text x="476" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">complain</text>
  <text x="476" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  위반 시 로그만 기록 (학습 모드)</text>
  <text x="476" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  프로파일 개발 시 활용</text>
  <text x="476" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">enforce</text>
  <text x="476" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  위반 시 차단 + 로그</text>
  <text x="476" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  프로덕션 사용 모드</text>

  <text x="476" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">지원 OS:</text>
  <text x="476" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Ubuntu, Debian (기본 탑재)</text>
  <text x="476" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RHEL/CentOS는 SELinux 사용 (대안)</text>
  <text x="645" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">K8s 1.30+: securityContext.appArmorProfile 지원</text>

  <!-- Bottom note -->
  <text x="440" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Seccomp + AppArmor는 상호 보완적 — 함께 사용하면 심층 방어(Defense in Depth) 구현</text>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Pod Security Standards의 restricted 프로파일은 seccomp RuntimeDefault 또는 Localhost 강제</text>
</svg>
