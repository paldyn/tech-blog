<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">회선 교환 vs 패킷 교환 비교</text>

  <!-- Circuit Switching column -->
  <rect x="40" y="66" width="380" height="340" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">회선 교환 (Circuit Switching)</text>

  <!-- Dedicated path nodes -->
  <rect x="70" y="116" width="80" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="110" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">A</text>
  <rect x="170" y="116" width="80" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="210" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">R1</text>
  <rect x="270" y="116" width="80" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="310" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">R2</text>
  <rect x="370" y="116" width="30" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="385" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">B</text>

  <!-- Dedicated path highlight -->
  <line x1="150" y1="134" x2="168" y2="134" stroke="#55c555" stroke-width="4"/>
  <line x1="250" y1="134" x2="268" y2="134" stroke="#55c555" stroke-width="4"/>
  <line x1="350" y1="134" x2="368" y2="134" stroke="#55c555" stroke-width="4"/>

  <!-- Characteristics -->
  <rect x="70" y="170" width="320" height="40" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">통신 전 전용 경로 사전 예약</text>
  <rect x="70" y="218" width="320" height="40" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">일정한 대역폭, 낮은 지연</text>
  <rect x="70" y="266" width="320" height="40" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">자원 낭비: 유휴 시에도 경로 점유</text>
  <rect x="70" y="314" width="320" height="40" rx="6" fill="#0a1a00" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">사용 사례: 전통 전화(PSTN)</text>
  <rect x="70" y="362" width="320" height="26" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">단점: 확장성 제한, 설정 시간 필요</text>

  <!-- Packet Switching column -->
  <rect x="460" y="66" width="380" height="340" rx="10" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">패킷 교환 (Packet Switching)</text>

  <!-- Multiple paths nodes -->
  <rect x="490" y="116" width="80" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="530" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">A</text>

  <rect x="590" y="100" width="60" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="620" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">R1</text>
  <rect x="590" y="150" width="60" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="620" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">R2</text>

  <rect x="700" y="100" width="60" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="730" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">R3</text>
  <rect x="700" y="150" width="60" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="730" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">R4</text>

  <rect x="800" y="118" width="30" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="815" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">B</text>

  <!-- Multiple path arrows -->
  <line x1="570" y1="126" x2="588" y2="118" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="570" y1="140" x2="588" y2="160" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="650" y1="118" x2="698" y2="118" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="650" y1="165" x2="698" y2="165" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="760" y1="118" x2="798" y2="128" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="760" y1="165" x2="798" y2="140" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>

  <rect x="490" y="170" width="320" height="40" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">데이터를 패킷 단위로 분할 전송</text>
  <rect x="490" y="218" width="320" height="40" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">각 패킷이 독립적으로 경로 선택</text>
  <rect x="490" y="266" width="320" height="40" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">자원 공유, 높은 효율성</text>
  <rect x="490" y="314" width="320" height="40" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">사용 사례: 인터넷 (TCP/IP)</text>
  <rect x="490" y="362" width="320" height="26" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="650" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">단점: 지연 변동(지터) 가능성</text>
</svg>
