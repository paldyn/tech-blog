<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">회선 교환 vs 패킷 교환</text>

  <!-- Circuit Switching side -->
  <rect x="60" y="70" width="360" height="380" rx="10" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">회선 교환 (Circuit Switching)</text>

  <rect x="80" y="116" width="100" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" font-weight="600">발신자 A</text>
  <text x="130" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">전화기</text>

  <rect x="300" y="116" width="100" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="350" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" font-weight="600">수신자 B</text>
  <text x="350" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">전화기</text>

  <defs>
    <marker id="m1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <!-- Dedicated path -->
  <rect x="180" y="128" width="120" height="20" rx="4" fill="#55c555" opacity="0.3"/>
  <text x="240" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle" font-weight="600">전용 회선 (예약됨)</text>

  <!-- Steps -->
  <rect x="80" y="184" width="300" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="90" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">① 회선 설정</text>
  <text x="90" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">A→교환기→B 전용 경로 예약 (셋업 비용)</text>

  <rect x="80" y="250" width="300" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="90" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">② 데이터 전송</text>
  <text x="90" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">고정 대역폭 보장, 실시간 전송</text>

  <rect x="80" y="316" width="300" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="90" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">③ 회선 해제</text>
  <text x="90" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">통화 종료 → 자원 반환</text>

  <rect x="80" y="386" width="300" height="44" rx="6" fill="#1a1a0a" stroke="#e8c44a" stroke-width="1"/>
  <text x="90" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c44a">단점: 미사용 중에도 자원 점유</text>
  <text x="90" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c44a">장점: 지연 일정, 품질 보장 (전통 전화망)</text>

  <!-- Packet Switching side -->
  <rect x="460" y="70" width="360" height="380" rx="10" fill="#0f0f1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">패킷 교환 (Packet Switching)</text>

  <rect x="480" y="116" width="100" height="44" rx="6" fill="#0f0f2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="530" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" font-weight="600">호스트 A</text>
  <text x="530" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">PC</text>

  <rect x="700" y="116" width="100" height="44" rx="6" fill="#0f0f2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="750" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" font-weight="600">호스트 B</text>
  <text x="750" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">PC</text>

  <!-- Packets -->
  <rect x="560" y="128" width="28" height="20" rx="3" fill="#7ec8e3"/>
  <text x="574" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#000" text-anchor="middle" font-weight="700">P1</text>
  <rect x="594" y="128" width="28" height="20" rx="3" fill="#7777cc"/>
  <text x="608" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">P2</text>
  <rect x="628" y="128" width="28" height="20" rx="3" fill="#55c555"/>
  <text x="642" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#000" text-anchor="middle" font-weight="700">P3</text>

  <rect x="480" y="184" width="300" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="490" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">① 패킷 분할</text>
  <text x="490" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터를 작은 패킷으로 분할, 헤더 부착</text>

  <rect x="480" y="250" width="300" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="490" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">② Store-and-Forward</text>
  <text x="490" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">라우터: 수신→저장→다음 홉으로 전송</text>

  <rect x="480" y="316" width="300" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="490" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">③ 재조립</text>
  <text x="490" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">목적지에서 패킷 순서 복원 후 재조립</text>

  <rect x="480" y="386" width="300" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="490" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">장점: 자원 공유, 높은 효율 (인터넷 표준)</text>
  <text x="490" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">단점: 지연 가변적, 혼잡 발생 가능</text>
</svg>
