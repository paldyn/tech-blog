<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="34" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">청킹 전략 비교</text>

  <!-- Row 1: 고정 크기 청킹 -->
  <text x="60" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">① 고정 크기 청킹</text>
  <!-- Uniform blocks -->
  <rect x="220" y="52" width="90" height="30" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="265" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">청크 1</text>
  <rect x="316" y="52" width="90" height="30" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="361" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">청크 2</text>
  <rect x="412" y="52" width="90" height="30" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="457" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">청크 3</text>
  <rect x="508" y="52" width="90" height="30" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="553" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">청크 4</text>
  <!-- pro/con -->
  <text x="630" y="61" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 구현 단순</text>
  <text x="630" y="77" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗ 의미 단절</text>

  <!-- Separator -->
  <line x1="40" y1="96" x2="840" y2="96" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 2: 재귀적 청킹 -->
  <text x="60" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">② 재귀적 청킹</text>
  <!-- Hierarchical splits -->
  <rect x="220" y="106" width="340" height="26" rx="4" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">단락 (Paragraph)</text>
  <rect x="220" y="136" width="160" height="22" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="300" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">문장 1</text>
  <rect x="386" y="136" width="174" height="22" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="473" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">문장 2</text>
  <!-- Arrows down -->
  <line x1="300" y1="132" x2="300" y2="136" stroke="#55c555" stroke-width="1"/>
  <line x1="473" y1="132" x2="473" y2="136" stroke="#55c555" stroke-width="1"/>
  <!-- pro/con -->
  <text x="630" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 구조 보존</text>
  <text x="630" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ LangChain 기본</text>
  <text x="630" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗ 의미 미반영</text>

  <!-- Separator -->
  <line x1="40" y1="172" x2="840" y2="172" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 3: 시맨틱 청킹 -->
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">③ 시맨틱 청킹</text>
  <!-- Semantic groups color-coded -->
  <rect x="220" y="182" width="100" height="30" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="270" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">주제 A 그룹</text>
  <rect x="326" y="182" width="80" height="30" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="366" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">주제 A</text>
  <rect x="412" y="182" width="100" height="30" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="462" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">주제 B 그룹</text>
  <rect x="518" y="182" width="80" height="30" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="558" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">주제 C</text>
  <!-- pro/con -->
  <text x="630" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 의미 보존 최고</text>
  <text x="630" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗ 높은 계산 비용</text>

  <!-- Separator -->
  <line x1="40" y1="228" x2="840" y2="228" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 4: 문서 구조 청킹 -->
  <text x="60" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">④ 문서 구조 청킹</text>
  <!-- Section-based -->
  <rect x="220" y="236" width="90" height="26" rx="4" fill="#2a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="265" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555"># 제목</text>
  <rect x="316" y="236" width="130" height="26" rx="4" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="381" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">## 섹션 1</text>
  <rect x="452" y="236" width="130" height="26" rx="4" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="517" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">## 섹션 2</text>
  <!-- pro/con -->
  <text x="630" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 문서 구조 존중</text>
  <text x="630" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗ 구조화 문서만</text>

  <!-- Separator -->
  <line x1="40" y1="280" x2="840" y2="280" stroke="#1e2433" stroke-width="1"/>

  <!-- Selection guide at bottom -->
  <rect x="40" y="292" width="800" height="90" rx="8" fill="#111520" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">문서 유형별 권장 전략</text>

  <rect x="60" y="324" width="160" height="48" rx="6" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">일반 텍스트 문서</text>
  <text x="140" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 재귀적 청킹</text>

  <rect x="240" y="324" width="160" height="48" rx="6" fill="#1a1f2e" stroke="#55c555" stroke-width="1"/>
  <text x="320" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">법률·의학 전문 문서</text>
  <text x="320" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 시맨틱 청킹</text>

  <rect x="420" y="324" width="160" height="48" rx="6" fill="#1a1f2e" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Markdown·Wiki</text>
  <text x="500" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 문서 구조 청킹</text>

  <rect x="600" y="324" width="220" height="48" rx="6" fill="#1a1f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">코드·구조화 데이터</text>
  <text x="710" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 고정 크기 / 구조 청킹</text>
</svg>
