<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">bpftrace / eBPF 아키텍처</text>

  <!-- Defs -->
  <defs>
    <marker id="barr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="barr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- User Space box -->
  <rect x="60" y="72" width="760" height="130" rx="10" fill="#0d1220" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">사용자 공간 (User Space)</text>

  <!-- bpftrace box -->
  <rect x="80" y="106" width="160" height="80" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="130" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7ec8e3">bpftrace</text>
  <text x="160" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">고수준 추적 언어</text>
  <text x="160" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">AWK-like 문법</text>

  <!-- bcc -->
  <rect x="260" y="106" width="130" height="80" rx="8" fill="#0a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="325" y="130" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7777cc">BCC</text>
  <text x="325" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Python/C 기반</text>
  <text x="325" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">도구 모음</text>

  <!-- LLVM/libbpf -->
  <rect x="410" y="106" width="130" height="80" rx="8" fill="#0a1020" stroke="#888" stroke-width="1.5"/>
  <text x="475" y="134" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#888">LLVM</text>
  <text x="475" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">eBPF 바이트코드</text>
  <text x="475" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컴파일</text>

  <!-- Output sink -->
  <rect x="560" y="106" width="240" height="80" rx="8" fill="#071407" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">출력 / 집계</text>
  <text x="680" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">maps(histogram, count)</text>
  <text x="680" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">printf, 파이프, 파일</text>

  <!-- Arrow user → kernel -->
  <line x1="440" y1="202" x2="440" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#barr)"/>
  <text x="458" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bpf() syscall + verifier</text>

  <!-- Kernel Space box -->
  <rect x="60" y="244" width="760" height="140" rx="10" fill="#100d20" stroke="#7777cc" stroke-width="2"/>
  <text x="100" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">커널 공간 (Kernel Space)</text>

  <!-- eBPF VM -->
  <rect x="80" y="280" width="150" height="80" rx="8" fill="#0a0a20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="155" y="306" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7777cc">eBPF VM</text>
  <text x="155" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JIT 컴파일</text>
  <text x="155" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">안전한 실행 샌드박스</text>

  <!-- Probes -->
  <rect x="250" y="280" width="200" height="80" rx="8" fill="#0a0a20" stroke="#e0a055" stroke-width="1.5"/>
  <text x="350" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">프로브 연결 포인트</text>
  <text x="350" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">kprobe / kretprobe</text>
  <text x="350" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">tracepoint / uprobe</text>

  <!-- Maps -->
  <rect x="470" y="280" width="160" height="80" rx="8" fill="#0a0a20" stroke="#55c555" stroke-width="1.5"/>
  <text x="550" y="306" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">BPF Maps</text>
  <text x="550" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">커널 ↔ 유저 데이터</text>
  <text x="550" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">공유 메모리 구조</text>

  <!-- perf ring buffer -->
  <rect x="650" y="280" width="150" height="80" rx="8" fill="#0a0a20" stroke="#e05555" stroke-width="1.5"/>
  <text x="725" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">Ring Buffer</text>
  <text x="725" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이벤트 스트리밍</text>
  <text x="725" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">사용자 → 수신</text>

  <!-- Bottom note -->
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">eBPF 프로그램은 커널 verifier가 안전성(무한루프·잘못된 메모리 접근 등)을 검증 후 실행</text>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커널 모듈 없이 커널 내부를 안전하게 추적 가능 — 리부팅 없이 동적 계측</text>
</svg>
