<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">JPMS 모듈 시스템 &amp; var 키워드</text>

  <!-- JPMS left side -->
  <text x="220" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">module-info.java 구조</text>

  <rect x="60" y="88" width="340" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="110"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// module-info.java</text>
  <text xml:space="preserve" x="76" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">module</text>
  <text xml:space="preserve" x="76" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> com.example.service &#123;</text>
  <text xml:space="preserve" x="76" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  requires</text>
  <text xml:space="preserve" x="76" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> java.sql;</text>
  <text xml:space="preserve" x="76" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  requires transitive</text>
  <text xml:space="preserve" x="76" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> com.example.model;</text>
  <text xml:space="preserve" x="76" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  exports</text>
  <text xml:space="preserve" x="76" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> com.example.service.api;</text>
  <text xml:space="preserve" x="76" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  opens</text>
  <text xml:space="preserve" x="76" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> com.example.service.impl </text>
  <text xml:space="preserve" x="76" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    to</text>
  <text xml:space="preserve" x="76" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> com.example.testing;</text>
  <text xml:space="preserve" x="76" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&#125;</text>

  <!-- Module annotations -->
  <rect x="60" y="268" width="160" height="44" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="286" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">requires</text>
  <text x="140" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">의존 모듈 선언</text>

  <rect x="240" y="268" width="160" height="44" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="320" y="286" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">exports</text>
  <text x="320" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">공개 패키지 선언</text>

  <rect x="60" y="330" width="160" height="44" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">opens</text>
  <text x="140" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">리플렉션 허용</text>

  <rect x="240" y="330" width="160" height="44" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="320" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">provides ... with</text>
  <text x="320" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서비스 구현 등록</text>

  <!-- divider -->
  <line x1="440" y1="60" x2="440" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- var right side -->
  <text x="660" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">var 키워드 (Java 10)</text>

  <rect x="460" y="88" width="360" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="110"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// ✅ var 사용 가능한 경우</text>
  <text xml:space="preserve" x="476" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">var</text>
  <text xml:space="preserve" x="476" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> list = </text>
  <text xml:space="preserve" x="476" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">new</text>
  <text xml:space="preserve" x="476" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> ArrayList&lt;String&gt;();</text>
  <text xml:space="preserve" x="476" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">var</text>
  <text xml:space="preserve" x="476" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> entry = map.entrySet().iterator();</text>
  <text xml:space="preserve" x="476" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// for-each에서도 사용 가능</text>
  <text xml:space="preserve" x="476" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">for</text>
  <text xml:space="preserve" x="476" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> (</text>
  <text xml:space="preserve" x="476" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">var</text>
  <text xml:space="preserve" x="476" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> item : list) &#123; ... &#125;</text>
  <text xml:space="preserve" x="476" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// ❌ 사용 불가</text>
  <text xml:space="preserve" x="476" y="230"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">// var x;  // 초기화 없음</text>
  <text xml:space="preserve" x="476" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">// var x = null; // null 추론 불가</text>
  <text xml:space="preserve" x="476" y="270"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">// 필드, 파라미터, 반환 타입 불가</text>

  <!-- var note boxes -->
  <rect x="460" y="308" width="360" height="62" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="328" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">var는 동적 타입이 아님</text>
  <text x="640" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컴파일 타임에 타입 결정 — 런타임 오버헤드 없음</text>
  <text x="640" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로컬 변수 선언부에서만 사용 (Java 10부터)</text>
</svg>
