<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 정렬과 필터 동작 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">headersort · Dataset.filter() · Dataset.sort()</text>

  <!-- Left panel: Sort -->
  <rect x="50" y="88" width="360" height="300" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="230" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">정렬 (Sort)</text>

  <!-- Sort flow -->
  <rect x="70" y="124" width="320" height="36" fill="#1a2744" rx="6"/>
  <text x="230" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">헤더 클릭 (headersort="true")</text>

  <!-- Arrow down -->
  <polygon points="220,166 240,166 240,160 250,178 240,196 240,190 220,190" fill="#1e2433"/>
  <polygon points="222,168 242,168 242,162 248,178 242,194 242,188 222,188" fill="#7ec8e3"/>

  <rect x="70" y="200" width="320" height="36" fill="#162030" rx="6"/>
  <text x="230" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Dataset.sort() 내부 호출</text>

  <!-- Arrow down -->
  <polygon points="220,242 240,242 240,236 250,254 240,272 240,266 220,266" fill="#1e2433"/>
  <polygon points="222,244 242,244 242,238 248,254 242,270 242,264 222,264" fill="#7ec8e3"/>

  <rect x="70" y="276" width="320" height="36" fill="#0e1420" rx="6"/>
  <text x="230" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Grid 자동 재렌더링</text>

  <!-- Sort indicator icons -->
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">▲ 오름차순 → ▼ 내림차순 → 해제 반복</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">헤더 클릭 시 sort 아이콘이 자동 표시됨</text>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">스크립트: ds.sort("컬럼 A|D") 직접 호출 가능</text>

  <!-- Right panel: Filter -->
  <rect x="470" y="88" width="360" height="300" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="650" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">필터 (Filter)</text>

  <!-- Filter flow -->
  <rect x="490" y="124" width="320" height="36" fill="#1a3020" rx="6"/>
  <text x="650" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Dataset.filter(조건식) 호출</text>

  <!-- Arrow down -->
  <polygon points="640,166 660,166 660,160 670,178 660,196 660,190 640,190" fill="#1e2433"/>
  <polygon points="642,168 662,168 662,162 668,178 662,194 662,188 642,188" fill="#55c555"/>

  <rect x="490" y="200" width="320" height="36" fill="#162030" rx="6"/>
  <text x="650" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">조건 불일치 행 숨김 처리</text>

  <!-- Arrow down -->
  <polygon points="640,242 660,242 660,236 670,254 660,272 660,266 640,266" fill="#1e2433"/>
  <polygon points="642,244 662,244 662,238 668,254 662,270 662,264 642,264" fill="#55c555"/>

  <rect x="490" y="276" width="320" height="36" fill="#0e1420" rx="6"/>
  <text x="650" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Grid 자동 재렌더링</text>

  <!-- Filter notes -->
  <text x="500" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">데이터는 삭제되지 않음 — 숨김만 처리</text>
  <text x="500" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">filter("") 호출 시 모든 행 복원</text>
  <text x="500" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">footer 집계도 필터된 행만 기준으로 재계산</text>

  <!-- Center connection -->
  <text x="440" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#333" text-anchor="middle">+</text>

  <!-- Bottom: combined use -->
  <rect x="50" y="400" width="780" height="20" fill="none"/>
  <text x="440" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">정렬과 필터는 독립적으로 동작하며 동시에 적용 가능 — 순서: filter() 먼저, sort() 나중</text>
</svg>
