<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">CREATE TABLE 구문 분해</text>

  <rect x="60" y="54" width="760" height="322" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="78" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">CREATE TABLE</tspan> orders (</text>
  <text x="76" y="98" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  -- 열 정의: 이름 + 데이터 타입 + 제약조건</text>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  order_id    <tspan fill="#b5cea8">BIGINT</tspan>       <tspan font-weight="600" fill="#7ec8e3">NOT NULL</tspan>,</text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  user_id     <tspan fill="#b5cea8">INT</tspan>          <tspan font-weight="600" fill="#7ec8e3">NOT NULL</tspan>,</text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  total_price <tspan fill="#b5cea8">DECIMAL</tspan>(<tspan fill="#b5cea8">12,2</tspan>)  <tspan font-weight="600" fill="#7ec8e3">NOT NULL DEFAULT</tspan> <tspan fill="#b5cea8">0.00</tspan>,</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  status      <tspan fill="#b5cea8">VARCHAR</tspan>(<tspan fill="#b5cea8">20</tspan>)  <tspan font-weight="600" fill="#7ec8e3">NOT NULL DEFAULT</tspan> <tspan fill="#ce9178">'pending'</tspan>,</text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  note        <tspan fill="#b5cea8">TEXT</tspan>        <tspan font-weight="600" fill="#7ec8e3">NULL</tspan>,           <tspan fill="#9aa4b8">-- 선택적 정보</tspan></text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  ordered_at  <tspan fill="#b5cea8">TIMESTAMP</tspan>    <tspan font-weight="600" fill="#7ec8e3">NOT NULL DEFAULT</tspan> CURRENT_TIMESTAMP,</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  -- 테이블 제약조건</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan font-weight="600" fill="#7ec8e3">CONSTRAINT</tspan> pk_orders      <tspan font-weight="600" fill="#7ec8e3">PRIMARY KEY</tspan> (order_id),</text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan font-weight="600" fill="#7ec8e3">CONSTRAINT</tspan> fk_orders_user <tspan font-weight="600" fill="#7ec8e3">FOREIGN KEY</tspan> (user_id) <tspan font-weight="600" fill="#7ec8e3">REFERENCES</tspan> users(id),</text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan font-weight="600" fill="#7ec8e3">CONSTRAINT</tspan> chk_status     <tspan font-weight="600" fill="#7ec8e3">CHECK</tspan> (status <tspan font-weight="600" fill="#7ec8e3">IN</tspan> (<tspan fill="#ce9178">'pending'</tspan>,<tspan fill="#ce9178">'paid'</tspan>,<tspan fill="#ce9178">'cancelled'</tspan>))</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- CREATE TABLE IF NOT EXISTS: 이미 존재하면 오류 없이 건너뜀</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- CREATE TABLE AS SELECT: 조회 결과로 테이블 생성</text>
</svg>
