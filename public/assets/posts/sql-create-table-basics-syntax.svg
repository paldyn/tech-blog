<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">CREATE TABLE 문법 구조</text>

  <!-- Main code block -->
  <rect x="60" y="68" width="500" height="260" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="92" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace">-- 전체 구조</text>
  <text x="80" y="112" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">CREATE TABLE</text>
  <text x="226" y="112" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo',monospace"> table_name</text>
  <text x="80" y="130" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">(</text>
  <text x="80" y="150" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  column_name  data_type  [constraint],</text>
  <text x="80" y="170" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  ...,</text>
  <text x="80" y="190" font-size="13" fill="#7777cc" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  [table_constraint]</text>
  <text x="80" y="210" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">);</text>
  <text x="80" y="238" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace">-- IF NOT EXISTS 옵션 (에러 방지)</text>
  <text x="80" y="258" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">CREATE TABLE IF NOT EXISTS</text>
  <text x="80" y="276" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  my_table ( ... );</text>
  <text x="80" y="314" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace">-- CTAS: 쿼리 결과로 테이블 생성</text>
  <text x="80" y="332" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">CREATE TABLE orders_2024</text>
  <text x="80" y="350" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">AS SELECT * FROM orders</text>
  <text x="80" y="368" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">   WHERE year = 2024;</text>

  <!-- Annotation boxes -->
  <defs>
    <marker id="an" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- table_name annotation -->
  <rect x="590" y="92" width="250" height="56" fill="#0f1320" stroke="#ce9178" stroke-width="1.5" rx="6"/>
  <text x="715" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">table_name</text>
  <text x="715" y="132" text-anchor="middle" font-size="11" fill="#888">schema.table 형태도 허용</text>
  <text x="715" y="145" text-anchor="middle" font-size="11" fill="#888">예: public.employees</text>
  <line x1="590" y1="120" x2="562" y2="112" stroke="#ce9178" stroke-width="1.5" marker-end="url(#an)"/>

  <!-- column constraint annotation -->
  <rect x="590" y="164" width="250" height="56" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="715" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">열 제약(column constraint)</text>
  <text x="715" y="204" text-anchor="middle" font-size="11" fill="#888">NOT NULL, DEFAULT, CHECK</text>
  <text x="715" y="216" text-anchor="middle" font-size="11" fill="#888">PRIMARY KEY, UNIQUE, FK</text>
  <line x1="590" y1="192" x2="562" y2="162" stroke="#55c555" stroke-width="1.5" marker-end="url(#an)"/>

  <!-- table constraint annotation -->
  <rect x="590" y="236" width="250" height="56" fill="#0f1320" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="715" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">테이블 제약(table constraint)</text>
  <text x="715" y="276" text-anchor="middle" font-size="11" fill="#888">복합 기본 키, 복합 UNIQUE</text>
  <text x="715" y="290" text-anchor="middle" font-size="11" fill="#888">CHECK(a + b &gt; 0)</text>
  <line x1="590" y1="264" x2="562" y2="190" stroke="#7777cc" stroke-width="1.5" marker-end="url(#an)"/>

  <!-- CTAS annotation -->
  <rect x="590" y="308" width="250" height="56" fill="#0f1320" stroke="#9aa4b8" stroke-width="1.5" rx="6"/>
  <text x="715" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#9aa4b8">CTAS</text>
  <text x="715" y="348" text-anchor="middle" font-size="11" fill="#888">제약 조건은 복사 안 됨</text>
  <text x="715" y="362" text-anchor="middle" font-size="11" fill="#888">인덱스도 복사 안 됨</text>
  <line x1="590" y1="336" x2="562" y2="350" stroke="#9aa4b8" stroke-width="1.5" marker-end="url(#an)"/>

  <!-- Bottom: naming conventions -->
  <rect x="60" y="400" width="760" height="62" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="8"/>
  <text x="440" y="420" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">테이블/컬럼 명명 관례</text>
  <text x="220" y="442" text-anchor="middle" font-size="11" fill="#888">PostgreSQL: snake_case 권장</text>
  <text x="440" y="442" text-anchor="middle" font-size="11" fill="#888">MySQL: snake_case (대소문자 OS 의존)</text>
  <text x="680" y="442" text-anchor="middle" font-size="11" fill="#888">Oracle: UPPER_CASE 전통</text>
  <text x="440" y="456" text-anchor="middle" font-size="11" fill="#888">예약어(SELECT, FROM 등) 이름은 큰따옴표로 감싸야 함 — 피하는 게 최선</text>
</svg>
