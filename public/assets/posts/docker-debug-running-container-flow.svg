<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8">컨테이너 디버깅 절차 흐름도</text>

  <!-- Step 1 -->
  <rect x="40" y="64" width="160" height="64" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="120" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">1. 상태 확인</text>
  <text x="120" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker ps -a</text>
  <text x="120" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">STATUS 확인</text>

  <line x1="200" y1="96" x2="240" y2="96" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="240" y="64" width="160" height="64" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="320" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">2. 로그 분석</text>
  <text x="320" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker logs -f</text>
  <text x="320" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">에러 패턴 확인</text>

  <line x1="400" y1="96" x2="440" y2="96" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="440" y="64" width="160" height="64" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="520" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">3. 리소스 확인</text>
  <text x="520" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker stats</text>
  <text x="520" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">OOM 여부 체크</text>

  <line x1="600" y1="96" x2="640" y2="96" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="640" y="64" width="200" height="64" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="740" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">4. 내부 진입</text>
  <text x="740" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker exec -it ... sh</text>
  <text x="740" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">또는 docker debug</text>

  <!-- Code block -->
  <rect x="40" y="160" width="800" height="176" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># 실전 디버깅 명령 흐름</text>
  <text x="56" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">docker ps</tspan> -a --format <tspan fill="#ce9178">"table {{.Names}}\t{{.Status}}\t{{.Ports}}"</tspan></text>
  <text x="56" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">docker logs</tspan> --tail=100 --timestamps myapp 2>&amp;1 | grep -i error</text>
  <text x="56" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">docker stats</tspan> --no-stream myapp</text>
  <text x="56" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">docker inspect</tspan> myapp | jq <tspan fill="#ce9178">'.[0].State'</tspan></text>
  <text x="56" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">docker exec</tspan> -it myapp sh -c <tspan fill="#ce9178">'ps aux; netstat -tlnp; df -h'</tspan></text>
  <text x="56" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># 셸 없는 distroless 컨테이너 — debug 컨테이너 사용</text>
  <text x="56" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">docker debug</tspan> myapp  <tspan fill="#9aa4b8"># Docker Desktop 4.27+</tspan></text>
  <text x="56" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">kubectl debug -it mypod --image=busybox --target=myapp-container</text>
</svg>
