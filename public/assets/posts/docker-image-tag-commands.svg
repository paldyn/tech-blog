<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker image tag — 명령 패턴</text>

  <!-- Left column -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 사용법</text>
  <rect x="60" y="92" width="370" height="118" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 새 태그 부여 (원본 유지)</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#e8e8e8"> &lt;SOURCE&gt; &lt;TARGET&gt;</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 로컬 이름 → push용 이름</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#e8e8e8"> myapp:v1 myorg/myapp:v1</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 버전 + latest</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#e8e8e8"> myapp:v1 myorg/myapp:latest</tspan></text>

  <!-- Left column: digest source -->
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">다양한 소스 형식</text>
  <rect x="60" y="248" width="370" height="84" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># ID로 태그</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#e8e8e8"> a1b2c3d4e5f6 myapp:stable</tspan></text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># digest로 태그</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#e8e8e8"> nginx@sha256:abc... myapp</tspan></text>

  <!-- Right column: CI tagging -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">CI 자동 태깅 패턴</text>
  <rect x="448" y="92" width="372" height="136" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="464" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># Git 커밋 SHA로 태그</text>
  <text x="464" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">SHA=$(git rev-parse --short HEAD)</tspan></text>
  <text x="464" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker build</tspan><tspan fill="#e8e8e8"> -t myapp:$SHA .</tspan></text>
  <text x="464" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#e8e8e8"> myapp:$SHA myapp:latest</tspan></text>
  <text x="464" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 브랜치 기반 태그 정리</text>
  <text x="464" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">BRANCH=$(git rev-parse --abbrev-ref HEAD)</tspan></text>
  <text x="464" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#e8e8e8"> myapp:$SHA myapp:$BRANCH</tspan></text>

  <!-- Right column: Multi-registry -->
  <text x="460" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">멀티 레지스트리 미러링</text>
  <rect x="448" y="268" width="372" height="64" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="464" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#e8e8e8"> myapp ghcr.io/myorg/myapp</tspan></text>
  <text x="464" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker tag</tspan><tspan fill="#e8e8e8"> myapp 123.dkr.ecr.ap-*.amazonaws.com/myapp</tspan></text>
  <text x="464" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 같은 이미지 다수 레지스트리로 배포</text>

  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">docker tag = 레이어 복사 없음 — 이미지 ID를 가리키는 포인터(별칭)만 생성</text>
</svg>
