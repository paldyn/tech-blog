<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrf" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrf2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL Injection 공격 흐름</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">가장 흔하고 파괴적인 공격의 작동 원리</text>

  <!-- Attack step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="110" width="160" height="70" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <text x="140" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">공격자 입력</text>
  <text x="140" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">username='admin'--</text>
  <text x="140" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">password=anything</text>

  <line x1="220" y1="145" x2="279" y2="145" stroke="#e05555" stroke-width="2" marker-end="url(#arrf)"/>

  <!-- Step 2 -->
  <rect x="280" y="110" width="160" height="70" rx="8" fill="#2a1a10" stroke="#e0a055" stroke-width="2"/>
  <text x="360" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e0a055" text-anchor="middle">쿼리 생성</text>
  <text x="360" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">SELECT * FROM users</text>
  <text x="360" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">WHERE user='admin'--'</text>

  <line x1="440" y1="145" x2="499" y2="145" stroke="#e05555" stroke-width="2" marker-end="url(#arrf)"/>

  <!-- Step 3 -->
  <rect x="500" y="110" width="160" height="70" rx="8" fill="#1a1a10" stroke="#e0a055" stroke-width="2"/>
  <text x="580" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e0a055" text-anchor="middle">DB 실행</text>
  <text x="580" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">-- 이후 무시</text>
  <text x="580" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">admin 행 반환</text>

  <line x1="660" y1="145" x2="719" y2="145" stroke="#e05555" stroke-width="2" marker-end="url(#arrf)"/>

  <!-- Step 4 -->
  <rect x="720" y="110" width="100" height="70" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="2"/>
  <text x="770" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">침해</text>
  <text x="770" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">admin으로</text>
  <text x="770" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">로그인 성공</text>

  <!-- Code block: Vulnerable -->
  <rect x="60" y="210" width="370" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">취약한 코드</text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># ❌ 문자열 포맷팅</text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">query = f<text fill="#ce9178">"SELECT * FROM users</text></text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">" WHERE user='{username}'"</text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">db.execute(query)</text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555"># 사용자 입력이 SQL의 일부가 됨!</text>

  <!-- Code block: Fixed -->
  <rect x="450" y="210" width="370" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">안전한 코드 (파라미터화)</text>
  <text x="466" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># ✅ PreparedStatement</text>
  <text x="466" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">query = <text fill="#ce9178">"SELECT * FROM users</text></text>
  <text x="466" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">" WHERE user = ?"</text>
  <text x="466" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">db.execute(query, (username,))</text>
  <text x="466" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555"># 입력은 항상 데이터로만 처리</text>

  <!-- Bottom summary -->
  <rect x="60" y="360" width="760" height="70" rx="8" fill="#12121a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">모든 인젝션 공격의 공통 원인</text>
  <text x="440" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">신뢰되지 않은 데이터가 명령어(SQL/OS/HTML/JS)의 일부로 해석됨</text>
  <text x="440" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">해결책: 코드와 데이터를 항상 분리 — 파라미터화, 인코딩, 허용 목록</text>
</svg>
