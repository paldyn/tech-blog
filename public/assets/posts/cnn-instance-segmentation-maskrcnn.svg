<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Mask R-CNN 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Faster R-CNN + 마스크 헤드 병렬 추가</text>

  <!-- Input -->
  <rect x="36" y="100" width="100" height="60" fill="#1a2535" rx="6" stroke="#3a4560" stroke-width="1.5"/>
  <text x="86" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">입력</text>
  <text x="86" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이미지</text>

  <!-- Arrow -->
  <polygon points="148,130 172,122 172,138" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <line x1="136" y1="130" x2="172" y2="130" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Backbone + FPN -->
  <rect x="175" y="95" width="130" height="70" fill="#101828" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">ResNet+FPN</text>
  <text x="240" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">다중 스케일</text>
  <text x="240" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">특징 맵 추출</text>

  <!-- Arrow -->
  <polygon points="317,130 341,122 341,138" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <line x1="305" y1="130" x2="341" y2="130" stroke="#7ec8e3" stroke-width="2"/>

  <!-- RPN -->
  <rect x="344" y="95" width="110" height="70" fill="#0d1520" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="399" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">RPN</text>
  <text x="399" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">앵커 기반</text>
  <text x="399" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">영역 제안</text>

  <!-- Arrow -->
  <polygon points="466,130 490,122 490,138" fill="#7777cc" stroke="#3a3a8a" stroke-width="1"/>
  <line x1="454" y1="130" x2="490" y2="130" stroke="#7777cc" stroke-width="2"/>

  <!-- RoI Align -->
  <rect x="493" y="95" width="120" height="70" fill="#0d1520" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="553" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">RoI Align</text>
  <text x="553" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">쌍선형 보간</text>
  <text x="553" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정확한 정렬</text>

  <!-- From RoI Align - split into 3 heads -->
  <line x1="553" y1="165" x2="553" y2="210" stroke="#ce9178" stroke-width="2"/>
  <line x1="553" y1="210" x2="280" y2="210" stroke="#ce9178" stroke-width="2"/>
  <line x1="553" y1="210" x2="553" y2="210" stroke="#ce9178" stroke-width="2"/>
  <line x1="553" y1="210" x2="770" y2="210" stroke="#ce9178" stroke-width="2"/>

  <!-- Head 1: Classification -->
  <line x1="280" y1="210" x2="280" y2="240" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="280,248 274,240 286,240" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <rect x="210" y="248" width="140" height="60" fill="#101828" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="280" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">분류 헤드</text>
  <text x="280" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">FC + Softmax</text>
  <text x="280" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">클래스 예측</text>

  <!-- Head 2: Box regression -->
  <line x1="553" y1="210" x2="553" y2="240" stroke="#7777cc" stroke-width="2"/>
  <polygon points="553,248 547,240 559,240" fill="#7777cc" stroke="#3a3a8a" stroke-width="1"/>
  <rect x="483" y="248" width="140" height="60" fill="#0d1520" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="553" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">박스 회귀 헤드</text>
  <text x="553" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">FC + Linear</text>
  <text x="553" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">BBox 좌표</text>

  <!-- Head 3: Mask (NEW) -->
  <line x1="770" y1="210" x2="770" y2="240" stroke="#55c555" stroke-width="2"/>
  <polygon points="770,248 764,240 776,240" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>
  <rect x="700" y="248" width="144" height="60" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="772" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">마스크 헤드 (NEW)</text>
  <text x="772" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Conv × 4 + 트랜스포즈</text>
  <text x="772" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">28×28 바이너리 마스크</text>

  <!-- RoI Pooling vs RoI Align comparison -->
  <rect x="36" y="360" width="400" height="80" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="236" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">RoI Pooling (Faster R-CNN)</text>
  <text x="56" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">정수 좌표로 반올림 → 공간 정렬 오류</text>
  <text x="56" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">분류는 OK, 픽셀 마스크는 부정확</text>
  <text x="56" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">최대 1~2픽셀 오정렬</text>

  <rect x="460" y="360" width="384" height="80" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="652" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">RoI Align (Mask R-CNN)</text>
  <text x="480" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">쌍선형 보간으로 부동소수점 좌표 처리</text>
  <text x="480" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">픽셀 마스크 정밀도 대폭 향상</text>
  <text x="480" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">mAP mask 50%+ 향상</text>
</svg>
