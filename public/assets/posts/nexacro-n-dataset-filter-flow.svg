<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset setFilter 동작 원리</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">원본 데이터는 유지하면서 화면에 보이는 행만 제한</text>

  <!-- ===== Full Dataset (left) ===== -->
  <rect x="60" y="92" width="280" height="230" fill="#0f0f1a" rx="8" stroke="#444" stroke-width="1"/>
  <rect x="60" y="92" width="280" height="36" fill="#1a1a2e" rx="8"/>
  <rect x="60" y="116" width="280" height="12" fill="#1a1a2e"/>
  <text x="200" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">전체 Dataset (5행)</text>

  <!-- Headers -->
  <line x1="160" y1="128" x2="160" y2="322" stroke="#333" stroke-width="1"/>
  <line x1="260" y1="128" x2="260" y2="322" stroke="#333" stroke-width="1"/>
  <rect x="60" y="128" width="280" height="24" fill="#1a2a1a"/>
  <text x="110" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">DEPT_CD</text>
  <text x="210" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">EMP_NM</text>
  <text x="310" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">AMT</text>

  <!-- Row 1: D001 (visible after filter) -->
  <rect x="60" y="152" width="280" height="24" fill="#0d1a0d"/>
  <text x="110" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">D001</text>
  <text x="210" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">김철수</text>
  <text x="310" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">300</text>

  <!-- Row 2: D002 (hidden after filter) -->
  <rect x="60" y="176" width="280" height="24" fill="#1a1a0a"/>
  <text x="110" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">D002</text>
  <text x="210" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">이영희</text>
  <text x="310" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">200</text>

  <!-- Row 3: D001 (visible) -->
  <rect x="60" y="200" width="280" height="24" fill="#0d1a0d"/>
  <text x="110" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">D001</text>
  <text x="210" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">박민준</text>
  <text x="310" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">450</text>

