  <rect x="60" y="224" width="280" height="24" fill="#1a1a0a"/>
  <text x="110" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">D003</text>
  <text x="210" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">최지원</text>
  <text x="310" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">180</text>

  <!-- Row 5: D001 (visible) -->
  <rect x="60" y="248" width="280" height="24" fill="#0d1a0d"/>
  <text x="110" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">D001</text>
  <text x="210" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">정수아</text>
  <text x="310" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">520</text>

  <!-- Legend -->
  <rect x="60" y="278" width="280" height="44" fill="#111" rx="4"/>
  <rect x="70" y="289" width="14" height="14" fill="#0d1a0d" stroke="#55c555" stroke-width="1" rx="2"/>
  <text x="92" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">D001 (필터 통과)</text>
  <rect x="195" y="289" width="14" height="14" fill="#1a1a0a" stroke="#555" stroke-width="1" rx="2"/>
  <text x="217" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">필터로 숨겨진 행</text>

  <!-- ===== Arrow middle ===== -->
  <polygon points="354,190 380,184 380,187 420,187 420,184 446,190 420,196 420,193 380,193 380,196" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>
  <text x="400" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">setFilter(</text>
  <text x="400" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">)</text>

  <!-- ===== Filtered Dataset (right) ===== -->
  <rect x="460" y="92" width="360" height="230" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <rect x="460" y="92" width="360" height="36" fill="#0d2e0d" rx="8"/>
  <rect x="460" y="116" width="360" height="12" fill="#0d2e0d"/>
  <text x="640" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">필터 적용 후 (rowcount=3)</text>

  <!-- Headers -->
  <line x1="570" y1="128" x2="570" y2="322" stroke="#333" stroke-width="1"/>
  <line x1="680" y1="128" x2="680" y2="322" stroke="#333" stroke-width="1"/>
  <rect x="460" y="128" width="360" height="24" fill="#1a2a1a"/>
  <text x="515" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">DEPT_CD</text>
  <text x="625" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">EMP_NM</text>
  <text x="780" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">AMT</text>

  <rect x="460" y="152" width="360" height="24" fill="#0d1a0d"/>
  <text x="515" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">D001</text>
  <text x="625" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">김철수</text>
  <text x="780" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">300</text>

  <rect x="460" y="176" width="360" height="24" fill="#111"/>
  <text x="515" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">D001</text>
  <text x="625" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">박민준</text>
  <text x="780" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">450</text>

  <rect x="460" y="200" width="360" height="24" fill="#0d1a0d"/>
  <text x="515" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">D001</text>
  <text x="625" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">정수아</text>
  <text x="780" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">520</text>

  <rect x="460" y="230" width="360" height="92" fill="#111" rx="4"/>
  <text x="640" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">원본 데이터 5행은 그대로 유지</text>
  <text x="640" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">clearFilter() → 전체 5행 다시 보임</text>
  <text x="640" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">rowcount: 3 (필터 기준)</text>
  <text x="640" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">totalrowcount: 5 (전체 기준)</text>

  <!-- Bottom note -->
  <rect x="60" y="340" width="760" height="92" fill="#0f0f1a" rx="8" stroke="#444" stroke-width="1"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">필터 표현식 예시</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">ds.setFilter("DEPT_CD == 'D001'");</text>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ds.setFilter("AMT >= 300 &amp;&amp; USE_YN == 'Y'");</text>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ds.clearFilter(); // 필터 해제</text>
