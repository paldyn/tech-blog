<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Next.js 핵심 기능</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">프레임워크가 제공하는 주요 빌딩 블록</text>

  <!-- Feature 1: File-based routing -->
  <rect x="60" y="96" width="360" height="80" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="84" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">파일 기반 라우팅</text>
  <text x="84" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">app/ 또는 pages/ 디렉토리 구조가</text>
  <text x="84" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">곧 URL 경로로 매핑됨</text>

  <!-- Feature 2: Hybrid rendering -->
  <rect x="460" y="96" width="360" height="80" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="484" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">하이브리드 렌더링</text>
  <text x="484" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">페이지별로 SSR · SSG · ISR · CSR을</text>
  <text x="484" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자유롭게 혼합 사용 가능</text>

  <!-- Feature 3: Image optimization -->
  <rect x="60" y="204" width="360" height="80" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="84" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">이미지 · 폰트 최적화</text>
  <text x="84" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">next/image, next/font으로 자동 WebP</text>
  <text x="84" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변환, 사이즈 최적화, CLS 방지</text>

  <!-- Feature 4: Server Actions -->
  <rect x="460" y="204" width="360" height="80" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="484" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Server Actions</text>
  <text x="484" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버 로직을 클라이언트처럼 호출하는</text>
  <text x="484" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비동기 함수 (API 없이 폼·뮤테이션 처리)</text>

  <!-- Feature 5: Caching -->
  <rect x="60" y="312" width="360" height="80" rx="8" fill="#1a1020" stroke="#5a2d7a" stroke-width="1.5"/>
  <text x="84" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">4계층 캐싱 시스템</text>
  <text x="84" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Request Memoization · Data Cache</text>
  <text x="84" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· Full Route Cache · Router Cache</text>

  <!-- Feature 6: Middleware -->
  <rect x="460" y="312" width="360" height="80" rx="8" fill="#1a1020" stroke="#5a2d7a" stroke-width="1.5"/>
  <text x="484" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">미들웨어 &amp; Edge Runtime</text>
  <text x="484" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">요청 전 Auth · Redirect · Rewrite를</text>
  <text x="484" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">엣지에서 처리 (초저지연)</text>

  <!-- Code snippet: npx create-next-app -->
  <rect x="60" y="416" width="760" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve"># 프로젝트 시작</text>
  <text x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">npx</tspan> create-next-app@latest my-app <tspan fill="#7ec8e3" font-weight="600">--typescript</tspan></text>
</svg>
