<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">bindcolumn vs value 속성 해부</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Grid 셀 bindcolumn / Edit·Combo value 차이</text>

  <!-- Edit section -->
  <rect x="60" y="96" width="340" height="160" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Edit / Static — value 속성</text>
  <!-- Property annotations -->
  <rect x="80" y="132" width="300" height="50" rx="6" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="86" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dataset=</text><text x="158" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"dsMain"</text>
  <text x="86" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">value=</text><text x="144" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"NAME"</text>
  <!-- Explanation -->
  <text x="230" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dsMain.currentrow 기준</text>
  <text x="230" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단 1행의 NAME 컬럼 표시</text>
  <text x="230" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">→ 단건 폼 입력에 사용</text>

  <!-- Grid section -->
  <rect x="480" y="96" width="340" height="160" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Grid 셀 — bindcolumn 속성</text>
  <!-- Grid header row -->
  <rect x="500" y="132" width="300" height="24" rx="0" fill="#0d1117"/>
  <text x="520" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">bindcolumn="CODE"</text>
  <text x="500" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">셀1</text>
  <text x="560" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">셀2</text>
  <text x="620" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">셀3</text>
  <!-- Explanation -->
  <text x="650" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">binddataset 전체 행 × 각 셀</text>
  <text x="650" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">bindcolumn으로 컬럼 지정</text>
  <text x="650" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">→ 목록 표시에 사용</text>

  <!-- Combo section -->
  <rect x="60" y="278" width="760" height="154" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Combo — codecolumn / datacolumn / value</text>
  <!-- Diagram: code DS -->
  <rect x="80" y="316" width="160" height="80" rx="6" fill="#111" stroke="#3a4a6e"/>
  <text x="160" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드 Dataset (dsCode)</text>
  <text x="160" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">binddataset="dsCode"</text>
  <text x="160" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">codecolumn="CODE"</text>
  <text x="160" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">datacolumn="NAME"</text>
  <!-- Arrow -->
  <polygon points="262,356 282,350 282,362" fill="#7ec8e3"/>
  <line x1="240" y1="356" x2="282" y2="356" stroke="#7ec8e3" stroke-width="1.5"/>
  <!-- Combo display -->
  <rect x="282" y="320" width="130" height="40" rx="6" fill="#111" stroke="#7ec8e3"/>
  <text x="347" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">신규 ▾</text>
  <!-- Arrow write -->
  <polygon points="432,356 452,350 452,362" fill="#7777cc"/>
  <line x1="412" y1="356" x2="452" y2="356" stroke="#7777cc" stroke-width="1.5"/>
  <!-- Data Dataset -->
  <rect x="452" y="316" width="200" height="80" rx="6" fill="#111" stroke="#3a4a6e"/>
  <text x="552" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">데이터 Dataset (dsMain)</text>
  <text x="552" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">dataset="dsMain"</text>
  <text x="552" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">value="STATUS"</text>
  <text x="552" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ CODE 값 저장</text>
  <!-- Note -->
  <text x="700" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">표시: datacolumn</text>
  <text x="700" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">저장: codecolumn</text>
</svg>
