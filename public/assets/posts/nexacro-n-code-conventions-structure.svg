<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="40" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">스크립트 블록 구조 가이드</text>

  <rect x="60" y="62" width="760" height="294" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">/* =============================================
   * 1. 전역 변수 선언 (상단 고정)
   * ============================================= */</text>
  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">var</text><text x="104" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> g_searchCond = </text><text x="234" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178" xml:space="preserve">""</text><text x="252" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">;</text>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">/* =============================================
   * 2. 화면 이벤트 핸들러 (onload/onunload)
   * ============================================= */</text>
  <text x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text><text x="136" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> Form_onload(obj, e) { fn_init(); }</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">/* =============================================
   * 3. 컴포넌트 이벤트 핸들러 (클릭/변경)
   * ============================================= */</text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text><text x="136" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> btn_search_onclick(obj, e) { fn_search(); }</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">/* =============================================
   * 4. 비즈니스 함수 (fn_ 접두사)
   * ============================================= */</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text><text x="136" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> fn_init() { ... }</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text><text x="136" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> fn_search() { ... }</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text><text x="136" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> fn_callback(svcId, errCode, errMsg) { ... }</text>
</svg>
