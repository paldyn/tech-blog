<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커널 버전과 배포판 버전은 별개</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">같은 커널로 다른 배포판이 만들어진다</text>

  <!-- Code block -->
  <rect x="60" y="92" width="760" height="196" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># Ubuntu 24.04 LTS에서 커널 버전 확인</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">$ uname -r</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">6.8.0-41-generic</text>

  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># RHEL 9.4에서 커널 버전 확인</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">$ uname -r</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">5.14.0-427.13.1.el9_4.x86_64</text>

  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 배포판 정보 확인</text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">$ cat /etc/os-release | grep PRETTY</text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">PRETTY_NAME="Ubuntu 24.04.1 LTS"</text>

  <!-- Explanation boxes -->
  <rect x="60" y="308" width="360" height="50" fill="#0d1a2a" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">커널 버전: kernel.org 업스트림 번호</text>
  <text x="240" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Ubuntu = 6.8, RHEL = 5.14 (백포트 패치)</text>

  <rect x="460" y="308" width="360" height="50" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">배포판 버전: 배포판 자체 릴리즈 번호</text>
  <text x="640" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Ubuntu 24.04 ≠ 커널 24.04</text>
</svg>
