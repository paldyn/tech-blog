<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arrdash" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">React 이벤트 시스템 — 이벤트 위임</text>

  <!-- DOM Tree -->
  <!-- Root (document) -->
  <rect x="360" y="64" width="160" height="44" rx="8" fill="#1e3a5f" stroke="#3a7cc4" stroke-width="2"/>
  <text x="440" y="91" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">React Root</text>

  <!-- div#app -->
  <line x1="440" y1="108" x2="440" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="330" y="140" width="220" height="40" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="165" text-anchor="middle" font-size="13" fill="#e8e8e8">div#app</text>

  <!-- Button -->
  <line x1="440" y1="180" x2="310" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="180" x2="570" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="200" y="220" width="200" height="40" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="300" y="245" text-anchor="middle" font-size="13" fill="#e8e8e8">button (onClick)</text>

  <rect x="480" y="220" width="200" height="40" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="580" y="245" text-anchor="middle" font-size="13" fill="#e8e8e8">input (onChange)</text>

  <!-- User click -->
  <rect x="140" y="280" width="160" height="36" rx="6" fill="#0f1629" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="303" text-anchor="middle" font-size="12" fill="#7777cc">① 사용자 클릭</text>
  <line x1="300" y1="298" x2="360" y2="298" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Delegation arrow (button → React Root) -->
  <path d="M 300 260 Q 300 340 390 348" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrdash)"/>
  <text x="250" y="342" font-size="11" fill="#7ec8e3">② 이벤트 버블링</text>

  <!-- React Root handler -->
  <rect x="360" y="340" width="300" height="56" rx="8" fill="#1e1b4b" stroke="#7777cc" stroke-width="1.5"/>
  <text x="510" y="364" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">③ React Root에서 이벤트 캡처</text>
  <text x="510" y="384" text-anchor="middle" font-size="12" fill="#888">SyntheticEvent 생성 → 핸들러 호출</text>

  <!-- Note -->
  <rect x="60" y="404" width="760" height="28" rx="6" fill="#0f1629" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="422" text-anchor="middle" font-size="12" fill="#888">React 17+: 이벤트 위임 대상이 document → React Root로 변경 — 여러 React 앱 공존 가능</text>
</svg>
