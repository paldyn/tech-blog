<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">PEP 8: 스타일 전후 비교</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">같은 코드, 다른 가독성</text>

  <!-- Before header -->
  <rect x="60" y="84" width="360" height="30" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">PEP 8 위반</text>

  <!-- After header -->
  <rect x="460" y="84" width="360" height="30" rx="6" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">PEP 8 준수</text>

  <!-- Before code block -->
  <rect x="60" y="124" width="360" height="202" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> os,sys</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> numpy </tspan><tspan fill="#7ec8e3">as</tspan><tspan fill="#ffffff"> np</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">class</tspan><tspan fill="#ffffff"> myClass:</tspan></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555">CalcSum</tspan><tspan fill="#ffffff">(self,x,y):</tspan></text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    result=x+y</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> result</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555">greet</tspan><tspan fill="#ffffff">(name):</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  x= </tspan><tspan fill="#ce9178">"Hello, " </tspan><tspan fill="#ffffff">+name</tspan></text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> x</tspan></text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">MAX=</tspan><tspan fill="#b5cea8">100</tspan></text>

  <!-- After code block -->
  <rect x="460" y="124" width="360" height="202" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> os</tspan></text>
  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> sys</tspan></text>
  <text x="476" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> </text>
  <text x="476" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> numpy </tspan><tspan fill="#7ec8e3">as</tspan><tspan fill="#ffffff"> np</tspan></text>
  <text x="476" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">MAX = </tspan><tspan fill="#b5cea8">100</tspan></text>
  <text x="476" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> </text>
  <text x="476" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">class</tspan><tspan fill="#ffffff"> MyClass:</tspan></text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555">calc_sum</tspan><tspan fill="#ffffff">(self, x, y):</tspan></text>
  <text x="476" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        result = x + y</tspan></text>
  <text x="476" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> result</tspan></text>

  <!-- Issues markers -->
  <rect x="60" y="344" width="360" height="116" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="368" text-anchor="middle" font-size="12" font-weight="700" fill="#e05555">발견된 위반</text>
  <text x="80" y="390" font-size="11" fill="#aaa">• import os,sys — 한 줄에 여러 개</text>
  <text x="80" y="408" font-size="11" fill="#aaa">• myClass — PascalCase 위반</text>
  <text x="80" y="426" font-size="11" fill="#aaa">• CalcSum — snake_case 위반</text>
  <text x="80" y="444" font-size="11" fill="#aaa">• result=x+y — 공백 누락</text>

  <rect x="460" y="344" width="360" height="116" rx="8" fill="#081a08" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="368" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555">개선 사항</text>
  <text x="480" y="390" font-size="11" fill="#aaa">• import 한 줄에 하나씩</text>
  <text x="480" y="408" font-size="11" fill="#aaa">• 표준·서드파티 import 분리</text>
  <text x="480" y="426" font-size="11" fill="#aaa">• PascalCase, snake_case 준수</text>
  <text x="480" y="444" font-size="11" fill="#aaa">• 연산자 주변 공백 추가</text>
</svg>
