<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">컴포넌트 트리 — 조합으로 UI 구성</text>

  <!-- App (root) -->
  <rect x="350" y="64" width="180" height="52" rx="8" fill="#1e3a5f" stroke="#3a7cc4" stroke-width="2"/>
  <text x="440" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">App</text>
  <text x="440" y="106" text-anchor="middle" font-size="12" fill="#888">루트 컴포넌트</text>

  <!-- Lines from App -->
  <line x1="380" y1="116" x2="200" y2="176" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="116" x2="440" y2="176" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="500" y1="116" x2="680" y2="176" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Header -->
  <rect x="100" y="176" width="200" height="52" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="198" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Header</text>
  <text x="200" y="218" text-anchor="middle" font-size="12" fill="#888">로고, 내비게이션</text>

  <!-- Main -->
  <rect x="340" y="176" width="200" height="52" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="198" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Main</text>
  <text x="440" y="218" text-anchor="middle" font-size="12" fill="#888">본문 영역</text>

  <!-- Footer -->
  <rect x="580" y="176" width="200" height="52" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="680" y="198" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Footer</text>
  <text x="680" y="218" text-anchor="middle" font-size="12" fill="#888">저작권, 링크</text>

  <!-- Lines from Main -->
  <line x1="400" y1="228" x2="280" y2="294" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="480" y1="228" x2="600" y2="294" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ArticleList -->
  <rect x="170" y="294" width="200" height="52" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="270" y="316" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">ArticleList</text>
  <text x="270" y="334" text-anchor="middle" font-size="12" fill="#888">글 목록</text>

  <!-- Sidebar -->
  <rect x="510" y="294" width="200" height="52" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="610" y="316" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Sidebar</text>
  <text x="610" y="334" text-anchor="middle" font-size="12" fill="#888">사이드바</text>

  <!-- Lines from ArticleList -->
  <line x1="230" y1="346" x2="180" y2="374" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="310" y1="346" x2="360" y2="374" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ArticleCard x2 -->
  <rect x="100" y="374" width="140" height="36" rx="6" fill="#0f1629" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="397" text-anchor="middle" font-size="12" fill="#7ec8e3">ArticleCard</text>

  <rect x="280" y="374" width="140" height="36" rx="6" fill="#0f1629" stroke="#3a4a6e" stroke-width="1"/>
  <text x="350" y="397" text-anchor="middle" font-size="12" fill="#7ec8e3">ArticleCard</text>
</svg>
