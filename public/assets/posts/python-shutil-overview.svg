<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">shutil 모듈 — 고수준 파일 조작</text>

  <!-- Copy group -->
  <rect x="60" y="72" width="370" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="99" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">복사 (Copy)</text>

  <rect x="60" y="130" width="170" height="70" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">shutil.copy()</text>
  <text x="76" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일 복사</text>
  <text x="76" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(권한 포함, 메타 제외)</text>

  <rect x="260" y="130" width="170" height="70" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="276" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">shutil.copy2()</text>
  <text x="276" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일 복사</text>
  <text x="276" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(메타데이터 보존)</text>

  <!-- Move group -->
  <rect x="450" y="72" width="370" height="44" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="635" y="99" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">이동 &amp; 삭제 (Move / Remove)</text>

  <rect x="450" y="130" width="170" height="70" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="466" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">shutil.move()</text>
  <text x="466" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일/디렉토리 이동</text>
  <text x="466" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(fs 경계 넘기 가능)</text>

  <rect x="650" y="130" width="170" height="70" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="666" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">shutil.rmtree()</text>
  <text x="666" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디렉토리 트리 삭제</text>
  <text x="666" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(재귀 삭제)</text>

  <!-- copytree group -->
  <rect x="60" y="222" width="370" height="44" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">트리 복사 (copytree)</text>

  <rect x="60" y="280" width="170" height="70" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">shutil.copytree()</text>
  <text x="76" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디렉토리 트리</text>
  <text x="76" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">통째로 복사</text>

  <rect x="260" y="280" width="170" height="70" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="276" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ignore=</text>
  <text x="276" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ignore_patterns()로</text>
  <text x="276" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제외 패턴 지정</text>

  <!-- Archive group -->
  <rect x="450" y="222" width="370" height="44" rx="8" fill="#2a2a1a" stroke="#f0a020" stroke-width="1.5"/>
  <text x="635" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#f0a020" text-anchor="middle">압축 (Archive)</text>

  <rect x="450" y="280" width="170" height="70" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="466" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">make_archive()</text>
  <text x="466" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">zip/tar 생성</text>
  <text x="466" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(형식 자동 처리)</text>

  <rect x="650" y="280" width="170" height="70" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="666" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">unpack_archive()</text>
  <text x="666" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">압축 해제</text>
  <text x="666" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(확장자 자동 감지)</text>

  <!-- Disk usage -->
  <rect x="60" y="372" width="760" height="76" rx="8" fill="#111820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="372" width="760" height="76" rx="8" fill="#111820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">디스크 사용량</text>
  <text x="440" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">total, used, free = shutil.disk_usage("/")</text>
</svg>
