<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">타입 안전한 배열 조작</text>

  <!-- Code box: y=68, height=202 → bottom=270, top-pad=18, bottom-pad=18 -->
  <rect x="80" y="68" width="720" height="202" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <text x="96" y="89" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> scores: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">[] = [</tspan><tspan fill="#b5cea8">85</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">92</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">78</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">95</tspan><tspan fill="#ffffff">];</tspan>
  </text>
  <text x="96" y="117" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 타입 안전 — OK</text>
  <text x="96" y="137" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">scores.push(</tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="96" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> avg = scores.reduce((a, b) =&gt; a + b, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="96" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 타입 에러 — 컴파일 타임 감지</text>
  <text x="96" y="205" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">scores.push(</tspan><tspan fill="#ce9178">'hello'</tspan><tspan fill="#ffffff">);  </tspan><tspan fill="#9aa4b8">// Error!</tspan>
  </text>
  <text x="96" y="225" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">scores[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">;      </tspan><tspan fill="#9aa4b8">// Error!</tspan>
  </text>

  <!-- Left info box: y=290, height=70 → bottom=360, top-pad=22, bottom-pad=22 -->
  <rect x="80" y="290" width="335" height="70" fill="#000000" stroke="#55c555" stroke-width="1" rx="6"/>
  <text x="247" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">&#10003; 타입 안전</text>
  <text x="247" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">배열 요소 타입이 보장됨</text>

  <!-- Right info box: y=290, height=70 -->
  <rect x="465" y="290" width="335" height="70" fill="#000000" stroke="#e05555" stroke-width="1" rx="6"/>
  <text x="632" y="314" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">&#10007; 컴파일 에러</text>
  <text x="632" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">잘못된 타입 즉시 차단</text>
</svg>
