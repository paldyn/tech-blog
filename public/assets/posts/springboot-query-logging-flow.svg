<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a030"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">쿼리 로깅 레이어 비교</text>

  <!-- 레이어 1: JPA show-sql -->
  <rect x="60" y="70" width="220" height="100" rx="8" fill="#1a2030" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">JPA show-sql</text>
  <text x="170" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">hibernate.show_sql=true</text>
  <text x="170" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 파라미터 바인딩 없음</text>
  <text x="170" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ System.out 출력</text>

  <!-- 레이어 2: Hibernate logging -->
  <rect x="330" y="70" width="220" height="100" rx="8" fill="#1a2030" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Hibernate Logging</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">org.hibernate.SQL=DEBUG</text>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ SLF4J로 출력</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 파라미터 별도 로거 필요</text>

  <!-- 레이어 3: p6spy / datasource-proxy -->
  <rect x="600" y="70" width="220" height="100" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">p6spy / datasource-proxy</text>
  <text x="710" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JDBC 프록시 계층</text>
  <text x="710" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 파라미터 치환 완성 쿼리</text>
  <text x="710" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 실행 시간 측정 가능</text>

  <!-- 출력 예시 박스들 -->
  <!-- JPA show-sql 출력 -->
  <text x="60" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">출력 예시</text>
  <rect x="60" y="206" width="220" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">Hibernate:</text>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  select u1_0.id,</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">  where u1_0.id=?</text>

  <!-- Hibernate Logging 출력 -->
  <text x="330" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">출력 예시</text>
  <rect x="330" y="206" width="220" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="346" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">DEBUG</text>
  <text x="395" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve"> o.h.SQL</text>
  <text x="346" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  select ... where id=?</text>
  <text x="346" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">TRACE binding: [1]</text>
  <text x="346" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">  [Long]</text>

  <!-- p6spy 출력 -->
  <text x="600" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">출력 예시</text>
  <rect x="600" y="206" width="220" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="616" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">select * from users</text>
  <text x="616" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">where id=1</text>
  <text x="616" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#b5cea8" xml:space="preserve">Elapsed: 3ms</text>
  <text x="616" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># 파라미터 치환 완성</text>

  <!-- JDBC 흐름 다이어그램 -->
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">p6spy JDBC 프록시 흐름</text>

  <!-- App -->
  <rect x="60" y="338" width="120" height="44" rx="6" fill="#1a2030" stroke="#3a4a6e" stroke-width="1"/>
  <text x="120" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Application</text>

  <!-- Arrow -->
  <line x1="180" y1="360" x2="228" y2="360" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- p6spy DataSource -->
  <rect x="230" y="338" width="160" height="44" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="310" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">p6spy</text>
  <text x="310" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ProxyDriver</text>

  <!-- Arrow to log -->
  <path d="M 310 338 Q 310 295 380 295" stroke="#e0a030" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-y)"/>
  <text x="322" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a030">로그 출력</text>

  <!-- Log -->
  <rect x="382" y="278" width="130" height="36" rx="6" fill="#1a1500" stroke="#e0a030" stroke-width="1"/>
  <text x="447" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a030" text-anchor="middle">SLF4J Logger</text>

  <!-- Arrow to real DS -->
  <line x1="390" y1="360" x2="448" y2="360" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- Real DataSource -->
  <rect x="450" y="338" width="160" height="44" rx="6" fill="#1a2030" stroke="#3a4a6e" stroke-width="1"/>
  <text x="530" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">HikariCP</text>
  <text x="530" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실제 DataSource</text>

  <!-- Arrow to DB -->
  <line x1="610" y1="360" x2="668" y2="360" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- DB -->
  <rect x="670" y="338" width="140" height="44" rx="6" fill="#1a2030" stroke="#3a4a6e" stroke-width="1"/>
  <text x="740" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">MySQL / H2</text>

  <!-- 하단 slow query 경고 박스 -->
  <rect x="60" y="420" width="760" height="76" rx="8" fill="#1a1500" stroke="#e0a030" stroke-width="1.5"/>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0a030" text-anchor="middle">슬로우 쿼리 감지 — datasource-proxy</text>
  <text x="440" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle" xml:space="preserve">SlowQueryListener: 100ms 이상이면 WARN 레벨로 자동 출력</text>
  <text x="440" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">N+1 탐지, 실행 횟수 카운팅 → 성능 회귀 조기 발견</text>
</svg>
