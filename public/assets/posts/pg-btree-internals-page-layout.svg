<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">B-Tree 페이지 레이아웃 (8KB)</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">PageHeader + ItemId Array + Free Space + 실제 데이터</text>

  <!-- Page block -->
  <rect x="60" y="96" width="760" height="60" rx="0" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">PageHeader (24 bytes)</text>
  <text x="440" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">lsn | checksum | flags | lower | upper | special | pd_prune_xid</text>

  <rect x="60" y="156" width="380" height="50" rx="0" fill="#111" stroke="#3a4a6e"/>
  <text x="250" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ItemId Array (4B×N)</text>
  <text x="250" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">offset + length + flags (LP_NORMAL/DEAD/REDIRECT)</text>

  <rect x="440" y="156" width="380" height="50" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="630" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Free Space</text>
  <text x="630" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">lower↑ → ← upper 방향으로 채워짐</text>

  <!-- Items growing from bottom -->
  <rect x="60" y="206" width="760" height="50" rx="0" fill="#0d1117" stroke="#55c555" stroke-opacity="0.6"/>
  <text x="440" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">Item(key=10, TID=(3,5)) | Item(key=20, TID=(7,2)) | Item(key=30, ...) ← 고정 크기</text>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">리프 페이지 아이템: IndexTuple = key bytes + ItemPointer(6B)</text>

  <rect x="60" y="256" width="760" height="40" rx="0" fill="#1a0d0d" stroke="#e05555" stroke-opacity="0.5"/>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Special Space — BTPageOpaqueData</text>
  <text x="440" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">btpo_prev | btpo_next | btpo_level | btpo_flags (LEAF/META/...)</text>

  <!-- Fill factor and VACUUM note -->
  <rect x="60" y="312" width="360" height="84" rx="6" fill="#111" stroke="#3a4a6e"/>
  <text x="240" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">fill_factor 설정</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">기본값 90% → 신규 INSERT 여유 10%</text>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">순차 INSERT 전용: fill_factor=100</text>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CREATE INDEX ... WITH (fill_factor=70);</text>

  <!-- Page split note -->
  <rect x="460" y="312" width="360" height="84" rx="6" fill="#111" stroke="#3a4a6e"/>
  <text x="640" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">페이지 분할 (Page Split)</text>
  <text x="480" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">리프 가득 찰 때 50:50 분할</text>
  <text x="480" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">부모 Internal Node에 새 High Key 삽입</text>
  <text x="480" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Root 분할 시 트리 높이 1 증가</text>
</svg>
