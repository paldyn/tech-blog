<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Truthy / Falsy — 참·거짓값</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">bool() 변환 규칙 · 조건식 활용 · __bool__ / __len__</text>

  <!-- Falsy column -->
  <rect x="60" y="100" width="340" height="360" rx="10" fill="#111520" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555" text-anchor="middle">Falsy 값</text>
  <!-- rows -->
  <rect x="80" y="146" width="300" height="32" rx="4" fill="#1a0e0e"/>
  <text x="230" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">None</text>
  <rect x="80" y="184" width="300" height="32" rx="4" fill="#160c0c"/>
  <text x="230" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">False</text>
  <rect x="80" y="222" width="300" height="32" rx="4" fill="#1a0e0e"/>
  <text x="230" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" text-anchor="middle">0   0.0   0j   0b0</text>
  <rect x="80" y="260" width="300" height="32" rx="4" fill="#160c0c"/>
  <text x="230" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">""   b""   ''</text>
  <rect x="80" y="298" width="300" height="32" rx="4" fill="#1a0e0e"/>
  <text x="230" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">[]   ()   {}   set()</text>
  <rect x="80" y="336" width="300" height="32" rx="4" fill="#160c0c"/>
  <text x="230" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">range(0)</text>
  <rect x="80" y="374" width="300" height="32" rx="4" fill="#1a0e0e"/>
  <text x="230" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">__bool__() → False</text>
  <rect x="80" y="412" width="300" height="32" rx="4" fill="#160c0c"/>
  <text x="230" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">__len__() → 0</text>

  <!-- Truthy column -->
  <rect x="480" y="100" width="340" height="360" rx="10" fill="#111520" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">Truthy 값</text>
  <rect x="500" y="146" width="300" height="32" rx="4" fill="#0e1a0e"/>
  <text x="650" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">True</text>
  <rect x="500" y="184" width="300" height="32" rx="4" fill="#0c160c"/>
  <text x="650" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" text-anchor="middle">1  -1  3.14  1+2j</text>
  <rect x="500" y="222" width="300" height="32" rx="4" fill="#0e1a0e"/>
  <text x="650" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">"hello"   " "   "0"</text>
  <rect x="500" y="260" width="300" height="32" rx="4" fill="#0c160c"/>
  <text x="650" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">[0]   (False,)   {"k": 0}</text>
  <rect x="500" y="298" width="300" height="32" rx="4" fill="#0e1a0e"/>
  <text x="650" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">range(1, 10)</text>
  <rect x="500" y="336" width="300" height="32" rx="4" fill="#0c160c"/>
  <text x="650" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">__bool__() → True</text>
  <rect x="500" y="374" width="300" height="32" rx="4" fill="#0e1a0e"/>
  <text x="650" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">객체 (대부분)</text>
  <rect x="500" y="412" width="300" height="32" rx="4" fill="#0c160c"/>
  <text x="650" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">람다, 함수, 클래스</text>
</svg>
