<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Wanted+Sans+Variable:wght@400;600;700&amp;display=swap');
      text { font-family: 'Wanted Sans Variable', 'Pretendard Variable', 'Noto Sans KR', sans-serif; }
    </style>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="560" fill="url(#bgGrad2)" rx="12"/>
  <rect width="880" height="560" fill="none" stroke="#1e1e1e" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="20" font-weight="700">토큰 효율과 언어별 불균형</text>
  <text x="440" y="66" text-anchor="middle" fill="#666" font-size="13">동일한 의미를 표현하는 데 필요한 토큰 수 비교</text>

  <!-- Section A: Language comparison -->
  <text x="40" y="100" fill="#888" font-size="12" font-weight="600">언어별 토큰 소비량 비교</text>

  <!-- English row -->
  <rect x="40" y="112" width="800" height="48" rx="6" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="60" y="132" fill="#888" font-size="11">English</text>
  <text x="60" y="150" fill="#e8e8e8" font-size="13" font-family="'Courier New', monospace">"The cat sat on the mat."</text>
  <!-- Token blocks -->
  <rect x="420" y="118" width="46" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="443" y="136" text-anchor="middle" fill="#93c5fd" font-size="11">The</text>
  <rect x="470" y="118" width="36" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="488" y="136" text-anchor="middle" fill="#93c5fd" font-size="11">cat</text>
  <rect x="510" y="118" width="32" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="526" y="136" text-anchor="middle" fill="#93c5fd" font-size="11">sat</text>
  <rect x="546" y="118" width="28" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="560" y="136" text-anchor="middle" fill="#93c5fd" font-size="11">on</text>
  <rect x="578" y="118" width="32" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="594" y="136" text-anchor="middle" fill="#93c5fd" font-size="11">the</text>
  <rect x="614" y="118" width="34" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="631" y="136" text-anchor="middle" fill="#93c5fd" font-size="11">mat</text>
  <rect x="652" y="118" width="22" height="28" rx="4" fill="#1a2a1a" stroke="#10b981" stroke-width="1"/>
  <text x="663" y="136" text-anchor="middle" fill="#6ee7b7" font-size="11">.</text>
  <rect x="692" y="122" width="56" height="20" rx="10" fill="#1e3a5f"/>
  <text x="720" y="136" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">7 tokens</text>
  <rect x="762" y="122" width="68" height="20" rx="10" fill="#14532d"/>
  <text x="796" y="136" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">효율 ★★★</text>

  <!-- Korean row -->
  <rect x="40" y="168" width="800" height="48" rx="6" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="60" y="188" fill="#888" font-size="11">Korean</text>
  <text x="60" y="206" fill="#e8e8e8" font-size="13" font-family="'Courier New', monospace">"고양이가 매트 위에 앉았다."</text>
  <!-- Token blocks - more tokens for Korean -->
  <rect x="420" y="174" width="28" height="28" rx="4" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="434" y="192" text-anchor="middle" fill="#c4b5fd" font-size="10">고양</text>
  <rect x="452" y="174" width="24" height="28" rx="4" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="464" y="192" text-anchor="middle" fill="#c4b5fd" font-size="10">이가</text>
  <rect x="480" y="174" width="28" height="28" rx="4" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="494" y="192" text-anchor="middle" fill="#c4b5fd" font-size="10">매트</text>
  <rect x="512" y="174" width="24" height="28" rx="4" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="524" y="192" text-anchor="middle" fill="#c4b5fd" font-size="10">위에</text>
  <rect x="540" y="174" width="24" height="28" rx="4" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="552" y="192" text-anchor="middle" fill="#c4b5fd" font-size="10">앉았</text>
  <rect x="568" y="174" width="20" height="28" rx="4" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="578" y="192" text-anchor="middle" fill="#c4b5fd" font-size="10">다</text>
  <rect x="592" y="174" width="18" height="28" rx="4" fill="#1a2a1a" stroke="#10b981" stroke-width="1"/>
  <text x="601" y="192" text-anchor="middle" fill="#6ee7b7" font-size="10">.</text>
  <rect x="628" y="178" width="56" height="20" rx="10" fill="#3b1f1f"/>
  <text x="656" y="192" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700">~12 tokens</text>
  <rect x="700" y="178" width="68" height="20" rx="10" fill="#2d1f00"/>
  <text x="734" y="192" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">효율 ★☆☆</text>

  <!-- Chinese row -->
  <rect x="40" y="224" width="800" height="48" rx="6" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="60" y="244" fill="#888" font-size="11">Chinese</text>
  <text x="60" y="262" fill="#e8e8e8" font-size="13" font-family="'Courier New', monospace">"猫坐在垫子上。"</text>
  <rect x="420" y="230" width="22" height="28" rx="4" fill="#1a3a2a" stroke="#059669" stroke-width="1"/>
  <text x="431" y="248" text-anchor="middle" fill="#6ee7b7" font-size="12">猫</text>
  <rect x="446" y="230" width="22" height="28" rx="4" fill="#1a3a2a" stroke="#059669" stroke-width="1"/>
  <text x="457" y="248" text-anchor="middle" fill="#6ee7b7" font-size="12">坐</text>
  <rect x="472" y="230" width="22" height="28" rx="4" fill="#1a3a2a" stroke="#059669" stroke-width="1"/>
  <text x="483" y="248" text-anchor="middle" fill="#6ee7b7" font-size="12">在</text>
  <rect x="498" y="230" width="22" height="28" rx="4" fill="#1a3a2a" stroke="#059669" stroke-width="1"/>
  <text x="509" y="248" text-anchor="middle" fill="#6ee7b7" font-size="12">垫</text>
  <rect x="524" y="230" width="22" height="28" rx="4" fill="#1a3a2a" stroke="#059669" stroke-width="1"/>
  <text x="535" y="248" text-anchor="middle" fill="#6ee7b7" font-size="12">子</text>
  <rect x="550" y="230" width="22" height="28" rx="4" fill="#1a3a2a" stroke="#059669" stroke-width="1"/>
  <text x="561" y="248" text-anchor="middle" fill="#6ee7b7" font-size="12">上</text>
  <rect x="576" y="230" width="22" height="28" rx="4" fill="#1a2a1a" stroke="#10b981" stroke-width="1"/>
  <text x="587" y="248" text-anchor="middle" fill="#6ee7b7" font-size="12">。</text>
  <rect x="616" y="234" width="56" height="20" rx="10" fill="#1e3a5f"/>
  <text x="644" y="248" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">7 tokens</text>
  <rect x="690" y="234" width="68" height="20" rx="10" fill="#14532d"/>
  <text x="724" y="248" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">효율 ★★★</text>

  <!-- Divider -->
  <line x1="40" y1="292" x2="840" y2="292" stroke="#222" stroke-width="1"/>

  <!-- Section B: BPE visualization -->
  <text x="40" y="316" fill="#888" font-size="12" font-weight="600">BPE (Byte Pair Encoding) 서브워드 병합 과정</text>

  <!-- BPE steps -->
  <rect x="40" y="328" width="380" height="100" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="220" y="348" text-anchor="middle" fill="#aaa" font-size="12" font-weight="600">초기: 문자 단위 분리</text>
  <g transform="translate(52, 360)">
    <rect x="0" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="11" y="17" text-anchor="middle" fill="#888" font-size="12">u</text>
    <rect x="26" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="37" y="17" text-anchor="middle" fill="#888" font-size="12">n</text>
    <rect x="52" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="63" y="17" text-anchor="middle" fill="#888" font-size="12">h</text>
    <rect x="78" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="89" y="17" text-anchor="middle" fill="#888" font-size="12">a</text>
    <rect x="104" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="115" y="17" text-anchor="middle" fill="#888" font-size="12">p</text>
    <rect x="130" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="141" y="17" text-anchor="middle" fill="#888" font-size="12">p</text>
    <rect x="156" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="167" y="17" text-anchor="middle" fill="#888" font-size="12">i</text>
    <rect x="182" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="193" y="17" text-anchor="middle" fill="#888" font-size="12">n</text>
    <rect x="208" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="219" y="17" text-anchor="middle" fill="#888" font-size="12">e</text>
    <rect x="234" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="245" y="17" text-anchor="middle" fill="#888" font-size="12">s</text>
    <rect x="260" y="0" width="22" height="26" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <text x="271" y="17" text-anchor="middle" fill="#888" font-size="12">s</text>
    <text x="0" y="62" fill="#666" font-size="11">11개 문자 토큰</text>
  </g>

  <!-- Arrow between BPE steps -->
  <line x1="430" y1="378" x2="458" y2="378" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="462,378 454,374 454,382" fill="#f59e0b"/>
  <text x="444" y="372" text-anchor="middle" fill="#f59e0b" font-size="10">병합</text>

  <rect x="460" y="328" width="380" height="100" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="650" y="348" text-anchor="middle" fill="#aaa" font-size="12" font-weight="600">결과: 서브워드 병합 완료</text>
  <g transform="translate(472, 360)">
    <rect x="0" y="0" width="28" height="26" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="14" y="17" text-anchor="middle" fill="#93c5fd" font-size="12">un</text>
    <rect x="32" y="0" width="44" height="26" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="54" y="17" text-anchor="middle" fill="#93c5fd" font-size="12">happ</text>
    <rect x="80" y="0" width="18" height="26" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="89" y="17" text-anchor="middle" fill="#93c5fd" font-size="12">i</text>
    <rect x="102" y="0" width="46" height="26" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="125" y="17" text-anchor="middle" fill="#93c5fd" font-size="12">ness</text>
    <text x="0" y="62" fill="#3b82f6" font-size="11">4개 서브워드 토큰 ← 훨씬 효율적!</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="446" x2="840" y2="446" stroke="#222" stroke-width="1"/>

  <!-- Section C: Special tokens -->
  <text x="40" y="468" fill="#888" font-size="12" font-weight="600">특수 토큰 (Special Tokens)</text>

  <g transform="translate(40, 480)">
    <!-- BOS -->
    <rect x="0" y="0" width="110" height="44" rx="6" fill="#1a1a2e" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="55" y="16" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">&lt;BOS&gt;</text>
    <text x="55" y="32" text-anchor="middle" fill="#666" font-size="10">시작 토큰</text>

    <!-- SEP -->
    <rect x="120" y="0" width="110" height="44" rx="6" fill="#1a1a2e" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="175" y="16" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">&lt;SEP&gt;</text>
    <text x="175" y="32" text-anchor="middle" fill="#666" font-size="10">구분 토큰</text>

    <!-- EOS -->
    <rect x="240" y="0" width="110" height="44" rx="6" fill="#1a1a2e" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="295" y="16" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">&lt;EOS&gt;</text>
    <text x="295" y="32" text-anchor="middle" fill="#666" font-size="10">종료 토큰</text>

    <!-- PAD -->
    <rect x="360" y="0" width="110" height="44" rx="6" fill="#1a1a2e" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="415" y="16" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">&lt;PAD&gt;</text>
    <text x="415" y="32" text-anchor="middle" fill="#666" font-size="10">패딩 토큰</text>

    <!-- UNK -->
    <rect x="480" y="0" width="110" height="44" rx="6" fill="#1a1a2e" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="535" y="16" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">&lt;UNK&gt;</text>
    <text x="535" y="32" text-anchor="middle" fill="#666" font-size="10">미등록 토큰</text>

    <!-- MASK -->
    <rect x="600" y="0" width="110" height="44" rx="6" fill="#1a1a2e" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="655" y="16" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="700">[MASK]</text>
    <text x="655" y="32" text-anchor="middle" fill="#666" font-size="10">마스킹 토큰</text>
  </g>
</svg>
