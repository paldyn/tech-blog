<svg width="880" height="460" viewBox="0 0 880 460"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">텍스트 요약 방법론 비교</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">추출적 vs 추상적 요약의 원리와 특성</text>

  <!-- Left: Extractive -->
  <rect x="40" y="88" width="370" height="340" rx="10" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="225" y="116" text-anchor="middle" fill="#7777cc" font-size="17" font-weight="700">추출적 요약 (Extractive)</text>
  <text x="225" y="136" text-anchor="middle" fill="#888" font-size="12">원문 문장을 그대로 선택</text>

  <!-- Source doc mini -->
  <rect x="64" y="152" width="322" height="120" rx="6" fill="#0a0a14" stroke="#333"/>
  <text x="225" y="171" text-anchor="middle" fill="#888" font-size="11">원문 (5문장)</text>
  <!-- sentences with selection highlight -->
  <rect x="72" y="179" width="306" height="16" rx="3" fill="#2a1a5e"/>
  <text x="78" y="191" fill="#e8e8e8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">S1: 삼성전자가 3분기 실적을 발표했다. ★</text>
  <rect x="72" y="199" width="306" height="16" rx="3" fill="#111"/>
  <text x="78" y="211" fill="#555" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">S2: 영업이익은 전년 대비 12% 증가했다.</text>
  <rect x="72" y="219" width="306" height="16" rx="3" fill="#2a1a5e"/>
  <text x="78" y="231" fill="#e8e8e8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">S3: 반도체 부문이 성장을 이끌었다.  ★</text>
  <rect x="72" y="239" width="306" height="16" rx="3" fill="#111"/>
  <text x="78" y="251" fill="#555" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">S4: 스마트폰 판매는 소폭 감소했다.</text>
  <rect x="72" y="259" width="306" height="16" rx="3" fill="#111"/>
  <text x="78" y="271" fill="#555" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">S5: 4분기 전망은 긍정적으로 평가된다.</text>

  <!-- Arrow down -->
  <polygon points="225,284 215,284 215,296 205,296 225,314 245,296 235,296 235,284" fill="#7777cc"/>

  <!-- Output -->
  <rect x="64" y="320" width="322" height="64" rx="6" fill="#1a1a3a" stroke="#7777cc" stroke-width="1"/>
  <text x="225" y="339" text-anchor="middle" fill="#888" font-size="11">요약 (★ 선택된 문장만)</text>
  <text x="72" y="357" fill="#e8e8e8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">삼성전자가 3분기 실적을 발표했다.</text>
  <text x="72" y="375" fill="#e8e8e8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">반도체 부문이 성장을 이끌었다.</text>

  <text x="64" y="408" fill="#888" font-size="11">✓ 사실 왜곡 없음  ✓ 빠른 속도</text>
  <text x="64" y="424" fill="#555" font-size="11">✗ 표현 다양성 부족  ✗ 문맥 연결 약함</text>

  <!-- Right: Abstractive -->
  <rect x="470" y="88" width="370" height="340" rx="10" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="655" y="116" text-anchor="middle" fill="#55c555" font-size="17" font-weight="700">추상적 요약 (Abstractive)</text>
  <text x="655" y="136" text-anchor="middle" fill="#888" font-size="12">새로운 문장을 생성</text>

  <!-- Encoder-Decoder diagram -->
  <rect x="494" y="152" width="140" height="80" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="564" y="178" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">인코더</text>
  <text x="564" y="196" text-anchor="middle" fill="#888" font-size="11">원문 이해</text>
  <text x="564" y="212" text-anchor="middle" fill="#888" font-size="11">컨텍스트 벡터</text>

  <!-- Arrow -->
  <polygon points="646,190 674,190 674,184 690,192 674,200 674,194 646,194" fill="#555"/>

  <rect x="690" y="152" width="130" height="80" rx="6" fill="#1a2e1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="755" y="178" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">디코더</text>
  <text x="755" y="196" text-anchor="middle" fill="#888" font-size="11">토큰 생성</text>
  <text x="755" y="212" text-anchor="middle" fill="#888" font-size="11">Attention 활용</text>

  <!-- Arrow down -->
  <polygon points="655,244 645,244 645,256 635,256 655,274 675,256 665,256 665,244" fill="#55c555"/>

  <!-- Output -->
  <rect x="494" y="280" width="326" height="64" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="655" y="299" text-anchor="middle" fill="#888" font-size="11">생성된 요약</text>
  <text x="502" y="318" fill="#e8e8e8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">삼성전자의 3분기 실적이 반도체</text>
  <text x="502" y="336" fill="#e8e8e8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">부문 호조로 전년 대비 성장했다.</text>

  <text x="494" y="408" fill="#888" font-size="11">✓ 자연스러운 문장  ✓ 정보 압축 가능</text>
  <text x="494" y="424" fill="#555" font-size="11">✗ 할루시네이션 위험  ✗ 고비용</text>

  <!-- Bottom: ROUGE score reminder -->
  <text x="440" y="447" text-anchor="middle" fill="#888" font-size="12">평가 지표: ROUGE-1 / ROUGE-2 / ROUGE-L (정밀도·재현율·F1)</text>
</svg>
