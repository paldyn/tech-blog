<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
  <marker id="arr-7777cc" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto"><path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/></marker>
  </defs>
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Web Push 알림 흐름</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">구독 → 서버 전송 → Push Service → SW → Notification</text>

  <!-- Step 1: App Server -->
  <rect x="50" y="96" width="160" height="140" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="50" y="96" width="160" height="32" rx="8" fill="#1a1f35"/>
  <rect x="50" y="116" width="160" height="12" fill="#1a1f35"/>
  <text x="130" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#7ec8e3">App Server</text>
  <text x="130" y="146" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">VAPID 키 쌍 보유</text>
  <text x="130" y="166" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">web-push 라이브러리</text>
  <text x="130" y="186" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">endpoint + keys를</text>
  <text x="130" y="202" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">DB에 저장</text>
  <text x="130" y="222" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">메시지 암호화 전송</text>

  <!-- Arrow 1: App Server → Push Service -->
  <line x1="210" y1="161" x2="310" y2="161" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-7777cc)"/>
  
  <text x="250" y="144" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">HTTP POST</text>
  <text x="250" y="188" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">RFC 8030</text>

  <!-- Step 2: Push Service -->
  <rect x="310" y="96" width="185" height="140" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <rect x="310" y="96" width="185" height="32" rx="8" fill="#2a1010"/>
  <rect x="310" y="116" width="185" height="12" fill="#2a1010"/>
  <text x="402" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#e05555">Push Service</text>
  <text x="402" y="146" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">브라우저 제공자 운영</text>
  <text x="402" y="164" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">Chrome → FCM</text>
  <text x="402" y="182" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">Firefox → Mozilla</text>
  <text x="402" y="200" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">Safari → APNs</text>
  <text x="402" y="220" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">메시지 큐·딜리버리</text>

  <!-- Arrow 2: Push Service → Browser SW -->
  <line x1="495" y1="161" x2="595" y2="161" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-7777cc)"/>
  
  <text x="535" y="144" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">Push Message</text>
  <text x="535" y="188" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">암호화된 페이로드</text>

  <!-- Step 3: Browser SW -->
  <rect x="595" y="96" width="185" height="140" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <rect x="595" y="96" width="185" height="32" rx="8" fill="#1a2b1a"/>
  <rect x="595" y="116" width="185" height="12" fill="#1a2b1a"/>
  <text x="687" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#55c555">Service Worker</text>
  <text x="687" y="146" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">push 이벤트 수신</text>
  <text x="687" y="166" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">event.data.json()</text>
  <text x="687" y="186" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">showNotification()</text>
  <text x="687" y="206" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">브라우저 닫혀도 동작</text>
  <text x="687" y="222" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">notificationclick 이벤트</text>

  <!-- Subscription flow (bottom) -->
  <rect x="50" y="280" width="760" height="120" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="50" y="280" width="760" height="30" rx="8" fill="#1a1f35"/>
  <rect x="50" y="298" width="760" height="12" fill="#1a1f35"/>
  <text x="430" y="298" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">구독(Subscription) 획득 흐름</text>

  <!-- Sub-steps inside -->
  <!-- SW → PushManager.subscribe -->
  <rect x="68" y="318" width="155" height="64" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="145" y="338" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">1. 권한 요청</text>
  <text x="145" y="356" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">Notification.requestPermission()</text>
  <text x="145" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#55c555">'granted' 확인</text>

  <rect x="238" y="318" width="155" height="64" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="315" y="338" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">2. 구독 생성</text>
  <text x="315" y="356" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">pushManager.subscribe(</text>
  <text x="315" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">{applicationServerKey})</text>

  <rect x="408" y="318" width="155" height="64" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="485" y="338" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">3. 구독 정보 저장</text>
  <text x="485" y="356" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">endpoint, keys.p256dh</text>
  <text x="485" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">→ App Server DB</text>

  <rect x="578" y="318" width="218" height="64" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="687" y="338" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">4. 이벤트 트리거 시 푸시</text>
  <text x="687" y="356" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">webpush.sendNotification(</text>
  <text x="687" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">subscription, payload)</text>
</svg>
