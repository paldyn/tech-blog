<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Attention 메커니즘: 병목 문제 해결</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Bahdanau (Additive) Attention</text>

  <!-- Encoder outputs (h1..h4) -->
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">인코더 출력 (모든 타임스텝 보존)</text>
  <rect x="80" y="118" width="80" height="46" rx="6" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="120" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">h₁</text>
  <rect x="220" y="118" width="80" height="46" rx="6" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="260" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">h₂</text>
  <rect x="360" y="118" width="80" height="46" rx="6" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="400" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">h₃</text>
  <rect x="500" y="118" width="80" height="46" rx="6" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="540" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">h₄</text>

  <!-- Attention scores (scores) -->
  <text x="440" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">score(s_{t-1}, h_i) → softmax → α_i</text>
  <!-- Score boxes -->
  <rect x="80" y="224" width="80" height="36" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">α₁=0.1</text>
  <rect x="220" y="224" width="80" height="36" rx="6" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <text x="260" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">α₂=0.2</text>
  <rect x="360" y="224" width="80" height="36" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="3"/>
  <text x="400" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">α₃=0.6</text>
  <rect x="500" y="224" width="80" height="36" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">α₄=0.1</text>

  <!-- Arrows from h to score -->
  <line x1="120" y1="164" x2="120" y2="222" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="260" y1="164" x2="260" y2="222" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="400" y1="164" x2="400" y2="222" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,3"/>
  <line x1="540" y1="164" x2="540" y2="222" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Context vector = weighted sum -->
  <text x="440" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">c_t = Σ α_i · h_i  (가중 합산)</text>
  <rect x="330" y="320" width="220" height="46" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2.5"/>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Context c_t (동적)</text>

  <!-- Weighted arrows from score to context -->
  <line x1="120" y1="260" x2="340" y2="320" stroke="#7777cc" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="260" y1="260" x2="380" y2="320" stroke="#7777cc" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="400" y1="260" x2="420" y2="320" stroke="#7777cc" stroke-width="3"/>
  <polygon points="416,318 420,332 424,318" fill="#7777cc"/>
  <line x1="540" y1="260" x2="490" y2="320" stroke="#7777cc" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Decoder uses context -->
  <rect x="330" y="396" width="220" height="46" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3">Decoder Step t</text>
  <line x1="440" y1="366" x2="440" y2="394" stroke="#55c555" stroke-width="2"/>
  <polygon points="434,394 440,406 446,394" fill="#55c555"/>

  <!-- Decoder state s_t to score -->
  <text x="720" y="242" text-anchor="start" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">s_{t-1}</text>
  <text x="720" y="260" text-anchor="start" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(이전 decoder</text>
  <text x="720" y="278" text-anchor="start" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">은닉 상태)</text>
  <line x1="716" y1="260" x2="584" y2="248" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="584,244 580,256 592,252" fill="#888"/>
</svg>
