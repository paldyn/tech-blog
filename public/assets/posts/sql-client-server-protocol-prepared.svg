<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Prepared Statement vs 일반 쿼리</text>

  <!-- Left: simple query -->
  <rect x="60" y="66" width="370" height="260" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="66" width="370" height="28" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">일반 쿼리 (매 실행마다 파싱)</text>

  <rect x="76" y="104" width="338" height="108" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 1000번 실행 = 1000번 파싱</text>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> *</tspan></text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff">   고객</tspan></text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff">  고객ID = </tspan><tspan fill="#ce9178">'C001'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="92" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 값이 직접 삽입 → SQL Injection 위험</text>

  <text x="245" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">문제 1: 매 실행마다 파서/옵티마이저 재실행</text>
  <text x="245" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">문제 2: SQL Injection 취약</text>
  <text x="245" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">문제 3: 실행 계획 캐시 재사용 불가</text>
  <text x="245" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">동적 값 포함 쿼리에선 사용 자제</text>

  <!-- Right: prepared statement -->
  <rect x="450" y="66" width="370" height="260" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="450" y="66" width="370" height="28" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Prepared Statement (1번 파싱, N번 실행)</text>

  <rect x="466" y="104" width="338" height="126" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 1번 준비</text>
  <text x="482" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">PREPARE</tspan><tspan fill="#ffffff"> get_customer(text) </tspan><tspan fill="#7ec8e3" font-weight="600">AS</tspan></text>
  <text x="482" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> 고객</tspan></text>
  <text x="482" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff">  고객ID = $1;</tspan></text>
  <text x="482" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- N번 실행 (파싱 없이)</text>
  <text x="482" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">EXECUTE</tspan><tspan fill="#ffffff"> get_customer(</tspan><tspan fill="#ce9178">'C001'</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="635" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점 1: 파서/옵티마이저 1회 실행</text>
  <text x="635" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점 2: 파라미터 바인딩 → SQL Injection 방지</text>
  <text x="635" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점 3: 실행 계획 캐시 재사용</text>
  <text x="635" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JDBC: ?, Python: %s, Go: $1 — 드라이버마다 표기법 다름</text>
</svg>
