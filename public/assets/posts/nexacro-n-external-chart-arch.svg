<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">외부 차트 연동 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">Nexacro N Form → WebBrowser → ECharts / Chart.js</text>

  <!-- Nexacro Form -->
  <rect x="60" y="90" width="220" height="280" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="170" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Nexacro Form</text>
  <rect x="80" y="126" width="180" height="48" rx="4" fill="#0f1520" stroke="#2a3040"/>
  <text x="170" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Dataset</text>
  <text x="170" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JSON 직렬화</text>
  <rect x="80" y="186" width="180" height="48" rx="4" fill="#0f1520" stroke="#2a3040"/>
  <text x="170" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">WebBrowser</text>
  <text x="170" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컴포넌트</text>
  <rect x="80" y="246" width="180" height="48" rx="4" fill="#0f1520" stroke="#2a3040"/>
  <text x="170" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Script</text>
  <text x="170" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">execScript() 호출</text>
  <rect x="80" y="306" width="180" height="48" rx="4" fill="#0f1520" stroke="#2a3040"/>
  <text x="170" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이벤트 수신</text>
  <text x="170" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">onload / dispatchEvent</text>

  <!-- Arrow center -->
  <line x1="280" y1="230" x2="338" y2="230" stroke="#555" stroke-width="2"/>
  <polygon points="336,224 350,230 336,236" fill="#555"/>
  <text x="314" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JSON</text>

  <!-- Right arrow back -->
  <line x1="338" y1="260" x2="280" y2="260" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="282,254 268,260 282,266" fill="#7777cc"/>
  <text x="314" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">클릭 이벤트</text>

  <!-- HTML Page -->
  <rect x="350" y="90" width="480" height="280" rx="8" fill="#111827" stroke="#7ec8e3"/>
  <text x="590" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">HTML 페이지 (WebBrowser 내부)</text>

  <!-- ECharts area -->
  <rect x="370" y="130" width="440" height="220" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="590" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ECharts / Chart.js 캔버스</text>
  <!-- Mock chart -->
  <polyline points="400,300 440,260 480,275 520,240 560,255 600,220 640,235 680,210 720,225 760,200 800,215" fill="none" stroke="#55c555" stroke-width="2.5"/>
  <circle cx="400" cy="300" r="4" fill="#55c555"/>
  <circle cx="480" cy="275" r="4" fill="#55c555"/>
  <circle cx="560" cy="255" r="4" fill="#55c555"/>
  <circle cx="640" cy="235" r="4" fill="#55c555"/>
  <circle cx="720" cy="225" r="4" fill="#55c555"/>
  <line x1="390" y1="320" x2="810" y2="320" stroke="#555" stroke-width="1"/>
  <line x1="390" y1="160" x2="390" y2="320" stroke="#555" stroke-width="1"/>

  <!-- updateChart function label -->
  <text x="590" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">window.updateChart(jsonData) 함수로 데이터 갱신</text>

  <!-- Bottom code hint -->
  <rect x="60" y="390" width="760" height="44" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">WebBrowser00.execScript("updateChart(" + JSON.stringify(data) + ")");</text>
  <text x="440" y="427" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Nexacro Script → 내부 HTML 함수 직접 호출</text>
</svg>
