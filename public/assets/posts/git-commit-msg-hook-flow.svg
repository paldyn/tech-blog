<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">commit-msg 훅 실행 흐름</text>

  <!-- Steps -->
  <rect x="60" y="76" width="160" height="52" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">pre-commit 통과</text>
  <text x="140" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lint/format OK</text>

  <line x1="220" y1="102" x2="266" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="268" y="76" width="184" height="52" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="360" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">메시지 편집기</text>
  <text x="360" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자가 메시지 입력</text>

  <line x1="452" y1="102" x2="498" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="500" y="76" width="200" height="52" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="600" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">commit-msg 훅</text>
  <text x="600" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">$1 = 메시지 파일 경로</text>

  <!-- Branches -->
  <line x1="600" y1="128" x2="600" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="380" y="160" width="440" height="52" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="600" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">메시지 형식 검증</text>
  <text x="600" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Conventional Commits 패턴 매칭</text>

  <!-- pass/fail branches -->
  <line x1="380" y1="186" x2="212" y2="186" stroke="#55c555" stroke-width="2"/>
  <line x1="212" y1="186" x2="212" y2="268" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="120" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">패턴 일치</text>

  <line x1="820" y1="186" x2="820" y2="268" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="836" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">불일치</text>

  <rect x="60" y="270" width="304" height="64" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="212" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">커밋 완료</text>
  <text x="212" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">feat: add user profile page</text>

  <rect x="680" y="270" width="160" height="64" rx="8" fill="#1f1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="760" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">커밋 취소</text>
  <text x="760" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">오류 메시지 출력</text>

  <!-- Code block -->
  <rect x="60" y="358" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">#!/bin/sh   # commit-msg 훅은 $1 = 커밋 메시지 파일 경로</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">MSG=<tspan fill="#ce9178">$(cat "$1")</tspan>   <tspan fill="#9aa4b8"># 파일에서 메시지 읽기</tspan></text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">PATTERN=<tspan fill="#ce9178">'^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?: .{1,72}$'</tspan></text>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan> ! <tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"$MSG"</tspan> | <tspan fill="#7ec8e3" font-weight="600">grep</tspan> -qP <tspan fill="#ce9178">"$PATTERN"</tspan>; <tspan fill="#7ec8e3" font-weight="600">then</tspan> <tspan fill="#7ec8e3" font-weight="600">exit</tspan> <tspan fill="#b5cea8">1</tspan>; <tspan fill="#7ec8e3" font-weight="600">fi</tspan></text>
</svg>
