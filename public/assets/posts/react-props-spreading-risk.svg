<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Props Spreading — 위험과 올바른 사용</text>

  <!-- Problem -->
  <rect x="60" y="76" width="370" height="200" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">문제: 무분별한 스프레드</text>
  <rect x="80" y="112" width="330" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#9aa4b8">{/* 모든 props를 그대로 전달 */}</tspan>
  </text>
  <text x="100" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Button(props) {</tspan>
  </text>
  <text x="100" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> &lt;button {...props} /&gt;;</tspan>
  </text>
  <text x="100" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>}</tspan>
  </text>
  <text x="100" y="224" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">
    <tspan fill="#9aa4b8">{/* isLoading, variant 같은 커스텀 props가 */}</tspan>
  </text>
  <text x="100" y="244" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">
    <tspan fill="#9aa4b8">{/* DOM에 직접 전달 → 콘솔 경고 */}</tspan>
  </text>

  <!-- Solution -->
  <rect x="450" y="76" width="370" height="200" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">해결: 필요한 것만 추출 후 전달</text>
  <rect x="470" y="112" width="330" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#9aa4b8">{/* 커스텀 prop 먼저 추출 */}</tspan>
  </text>
  <text x="490" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Button({ variant, isLoading, ...rest }) {</tspan>
  </text>
  <text x="490" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan> cls = </tspan><tspan fill="#ce9178">`btn btn-${variant}`</tspan><tspan>;</tspan>
  </text>
  <text x="490" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> &lt;button className={cls} {...rest}&gt;</tspan>
  </text>
  <text x="490" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>    {isLoading ? </tspan><tspan fill="#ce9178">'로딩중'</tspan><tspan> : rest.children}</tspan>
  </text>
  <text x="490" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>  &lt;/button&gt;;</tspan>
  </text>
  <text x="490" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>}</tspan>
  </text>

  <!-- Summary boxes -->
  <rect x="60" y="310" width="360" height="96" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">스프레드가 위험한 이유</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">커스텀 props가 DOM에 노출 → 경고</text>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">무엇이 전달되는지 파악하기 어려움</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">컴포넌트 인터페이스가 불명확해짐</text>

  <rect x="460" y="310" width="360" height="96" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">스프레드가 유용한 경우</text>
  <text x="480" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">HTML 요소를 래핑하는 UI 컴포넌트</text>
  <text x="480" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">커스텀 props 추출 후 나머지만 전달</text>
  <text x="480" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Input, Button 같은 primitive 컴포넌트</text>
</svg>
