<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">콜 스택 동작 원리</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">함수 호출 시 프레임이 쌓이고 반환 시 제거된다</text>

  <!-- Code -->
  <rect x="60" y="100" width="340" height="200" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="230" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">실행 코드</text>
  <rect x="76" y="136" width="308" height="148" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def</tspan> c(): <tspan fill="#7ec8e3">return</tspan> <tspan fill="#b5cea8">1</tspan> / <tspan fill="#b5cea8">0</tspan>  <tspan fill="#6a8aa0"># ①</tspan></text>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"></text>
  <text x="92" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def</tspan> b():</text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">return</tspan> c()     <tspan fill="#6a8aa0"># ②</tspan></text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"></text>
  <text x="92" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def</tspan> a():</text>
  <text x="92" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">return</tspan> b()     <tspan fill="#6a8aa0"># ③</tspan></text>
  <text x="92" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a()               <tspan fill="#6a8aa0"># ④</tspan></text>

  <!-- Call stack visualization -->
  <rect x="460" y="100" width="360" height="200" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">콜 스택 (LIFO)</text>

  <!-- Stack frames -->
  <rect x="510" y="140" width="260" height="36" rx="4" fill="#1a2a1a" stroke="#55c555"/>
  <text x="640" y="163" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">c() — ZeroDivisionError 발생</text>

  <rect x="510" y="182" width="260" height="36" rx="4" fill="#111827" stroke="#444"/>
  <text x="640" y="205" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">b() — c() 호출 중</text>

  <rect x="510" y="224" width="260" height="36" rx="4" fill="#111827" stroke="#444"/>
  <text x="640" y="247" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">a() — b() 호출 중</text>

  <rect x="510" y="266" width="260" height="30" rx="4" fill="#111827" stroke="#333"/>
  <text x="640" y="286" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">module — a() 호출</text>

  <!-- Stack top label -->
  <text x="490" y="160" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">TOP ↑</text>
  <text x="490" y="284" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BOTTOM</text>

  <!-- Traceback output -->
  <rect x="60" y="320" width="760" height="148" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">트레이스백 출력 (아래에서 위로 읽는다)</text>
  <rect x="76" y="356" width="728" height="96" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Traceback (most recent call last):</text>
  <text x="92" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  File "app.py", line 8, in &lt;module&gt;:  a()</text>
  <text x="92" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  File "app.py", line 6, in a:         return b()</text>
  <text x="92" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  File "app.py", line 4, in b:         return c()</text>
  <text x="92" y="448" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">ZeroDivisionError: division by zero    ← 여기서 발생!</text>

  <text x="440" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">마지막 줄 = 실제 오류 원인 / 그 위 = 호출 경로</text>
</svg>
