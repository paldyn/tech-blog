<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">불변 클래스 설계 5가지 규칙</text>

  <!-- Rule boxes -->
  <!-- Rule 1 -->
  <rect x="60" y="68" width="360" height="72" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">① final 클래스</text>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">상속을 막아 하위 클래스가</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">불변 계약을 깨는 것을 방지</text>

  <!-- Rule 2 -->
  <rect x="460" y="68" width="360" height="72" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="480" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">② 모든 필드 private final</text>
  <text x="480" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">생성 후 필드 값을 바꿀 수 없게</text>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">컴파일러가 강제</text>

  <!-- Rule 3 -->
  <rect x="60" y="160" width="360" height="72" rx="8" fill="#0d1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">③ setter 금지</text>
  <text x="80" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">상태 변경 메서드 제공 안 함</text>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">변경이 필요하면 새 객체 반환</text>

  <!-- Rule 4 -->
  <rect x="460" y="160" width="360" height="72" rx="8" fill="#0d1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">④ 방어적 복사 (가변 필드)</text>
  <text x="480" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">List/Date 등 가변 객체는</text>
  <text x="480" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">생성자/반환 시 복사본 사용</text>

  <!-- Rule 5 -->
  <rect x="260" y="252" width="360" height="72" rx="8" fill="#0d1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="280" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">⑤ 불변 컬렉션 활용</text>
  <text x="280" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">List.of() / Map.copyOf()로</text>
  <text x="280" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">컬렉션 필드를 불변으로 유지</text>

  <!-- Code block -->
  <rect x="60" y="350" width="760" height="88" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 방어적 복사 예시</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">private final</tspan><tspan fill="#ffffff"> List&lt;String&gt; tags;</tspan></text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> ImmutablePost(List&lt;String&gt; tags) {</tspan></text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    this</tspan><tspan fill="#ffffff">.tags = List.copyOf(tags); }</tspan></text>
</svg>
