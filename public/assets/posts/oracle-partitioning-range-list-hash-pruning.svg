<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">파티션 프루닝과 DDL 구문</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">파티셔닝 생성 구문과 실행 계획에서의 프루닝 확인</text>

  <!-- Left: DDL code -->
  <text x="230" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">Range 파티셔닝 DDL</text>
  <rect x="50" y="108" width="360" height="306" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="66" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="66" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  sales (</text>
  <text x="66" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    sale_id  <tspan fill="#b5cea8">NUMBER</tspan>,</text>
  <text x="66" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    sale_dt  <tspan fill="#b5cea8">DATE</tspan>,</text>
  <text x="66" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    amount   <tspan fill="#b5cea8">NUMBER</tspan></text>
  <text x="66" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  )</text>
  <text x="66" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">PARTITION BY RANGE</text>
  <text x="66" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  (sale_dt)</text>
  <text x="66" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text>
  <text x="66" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  PARTITION</text>
  <text x="66" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    p2024q1 <tspan fill="#7ec8e3">VALUES LESS THAN</tspan></text>
  <text x="66" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    (DATE <tspan fill="#ce9178">'2024-04-01'</tspan>),</text>
  <text x="66" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  PARTITION</text>
  <text x="66" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    p2024q2 <tspan fill="#7ec8e3">VALUES LESS THAN</tspan></text>
  <text x="66" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    (DATE <tspan fill="#ce9178">'2024-07-01'</tspan>)</text>
  <text x="66" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">);</text>

  <!-- Right: Pruning diagram -->
  <text x="650" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">파티션 프루닝 동작</text>

  <!-- Query box -->
  <rect x="470" y="108" width="360" height="60" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="486" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="486" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  SUM(amount) <tspan fill="#7ec8e3">FROM</tspan> sales</text>
  <text x="486" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  WHERE</text>

  <!-- Arrow down -->
  <line x1="650" y1="172" x2="650" y2="198" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="642,196 650,210 658,196" fill="#7ec8e3"/>

  <!-- Optimizer -->
  <rect x="530" y="214" width="240" height="36" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">CBO 실행 계획 수립</text>

  <line x1="650" y1="250" x2="650" y2="272" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="642,270 650,284 658,270" fill="#7ec8e3"/>

  <!-- Partition boxes -->
  <rect x="486" y="288" width="110" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="541" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">p2024q1</text>
  <text x="541" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">SCAN ✓</text>

  <rect x="608" y="288" width="110" height="44" rx="6" fill="#1a0a0a" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="663" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#555">p2024q2</text>
  <text x="663" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">SKIP ✗</text>

  <rect x="730" y="288" width="88" height="44" rx="6" fill="#1a0a0a" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="774" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#555">p2024q3</text>
  <text x="774" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">SKIP ✗</text>

  <!-- Benefits -->
  <rect x="470" y="352" width="360" height="80" rx="6" fill="#081208" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">프루닝 효과</text>
  <text x="650" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">조건 컬럼 = 파티션 키 → 불필요 파티션 Skip</text>
  <text x="650" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">Full Scan → Partition Scan (수십 배 빠름)</text>

  <!-- WHERE label in query area -->
  <text x="486" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    sale_dt &lt; DATE <tspan fill="#ce9178">'2024-04-01'</tspan></text>
</svg>
