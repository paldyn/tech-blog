<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">셀프 호스팅 배포 아키텍처</text>

  <!-- Internet -->
  <rect x="60" y="90" width="130" height="60" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="125" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Internet</text>
  <text x="125" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용자 요청</text>

  <!-- Arrow Internet → Nginx -->
  <line x1="190" y1="120" x2="248" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="219" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">:443</text>

  <!-- Nginx -->
  <rect x="250" y="90" width="160" height="60" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="330" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">Nginx</text>
  <text x="330" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">리버스 프록시 / SSL</text>

  <!-- Arrow Nginx → Next.js container -->
  <line x1="410" y1="120" x2="468" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="439" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">:3000</text>

  <!-- Next.js container -->
  <rect x="470" y="78" width="200" height="86" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Next.js 컨테이너</text>
  <text x="570" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">node server.js</text>
  <text x="570" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">standalone 번들 실행</text>

  <!-- Arrow Next.js → DB -->
  <line x1="670" y1="120" x2="728" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- DB -->
  <rect x="730" y="90" width="110" height="60" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="785" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">DB / Redis</text>
  <text x="785" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">내부 네트워크</text>

  <!-- docker-compose code -->
  <text x="60" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">docker-compose.yml</text>

  <rect x="60" y="222" width="760" height="198" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="246" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">services</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="76" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">  app</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="76" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">image</tspan><tspan fill="#ffffff">: my-nextjs-app:latest</tspan>
  </text>
  <text x="76" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">ports</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"3000:3000"</tspan><tspan fill="#ffffff">]</tspan>
  </text>
  <text x="76" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">env_file</tspan><tspan fill="#ffffff">: .env.production</tspan>
  </text>
  <text x="76" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">restart</tspan><tspan fill="#ffffff">: unless-stopped</tspan>
  </text>
  <text x="76" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">  nginx</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="76" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">image</tspan><tspan fill="#ffffff">: nginx:alpine</tspan>
  </text>
  <text x="76" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">ports</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"80:80"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"443:443"</tspan><tspan fill="#ffffff">]</tspan>
  </text>
  <text x="76" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">depends_on</tspan><tspan fill="#ffffff">: [app]</tspan>
  </text>
</svg>
