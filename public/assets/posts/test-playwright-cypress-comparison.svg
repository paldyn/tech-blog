  <rect x="60" y="302" width="370" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="245" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Worker 기반 완전 병렬, 무료</text>
  <text x="245" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">각 테스트 독립 브라우저 컨텍스트</text>

  <rect x="450" y="302" width="370" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="635" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">Cypress Cloud 유료 플랜 필요</text>
  <text x="635" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로컬 병렬은 별도 설정 복잡</text>

  <!-- Row: 개발 경험 -->
  <rect x="60" y="354" width="760" height="24" rx="0" fill="#1a1a2e" stroke="none"/>
  <text x="440" y="371" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">디버깅 / DX</text>

  <rect x="60" y="378" width="370" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="245" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">VS Code 확장, trace viewer, 스크린샷</text>
  <text x="245" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">codegen으로 테스트 자동 생성</text>

  <rect x="450" y="378" width="370" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="635" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">시간 여행 디버거, GUI 대시보드</text>
  <text x="635" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스텝별 DOM 스냅샷, 뛰어난 DX</text>

  <!-- Row: 선택 기준 -->
  <rect x="60" y="434" width="370" height="52" rx="8" fill="#0d2218" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">추천: 크로스 브라우저 · CI 병렬 · 모바일</text>
  <text x="245" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TypeScript 지원 · 파일 다운로드 · iframe</text>

  <rect x="450" y="434" width="370" height="52" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">추천: 팀 학습 용이 · 싱글 앱 E2E</text>
  <text x="635" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Component Testing · 직관적 API</text>
</svg>
