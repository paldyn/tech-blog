<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Playwright vs Cypress 비교</text>

  <!-- Header row -->
  <rect x="60" y="66" width="370" height="48" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="245" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">Playwright</text>

  <rect x="450" y="66" width="370" height="48" rx="8" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="635" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">Cypress</text>

  <!-- Row: 아키텍처 -->
  <rect x="60" y="126" width="760" height="24" rx="0" fill="#1a1a2e" stroke="none"/>
  <text x="440" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">아키텍처</text>

  <rect x="60" y="150" width="370" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="245" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">외부 프로세스 → CDP / WebDriver BiDi</text>
  <text x="245" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">브라우저 밖에서 제어 → 다양한 컨텍스트 가능</text>

  <rect x="450" y="150" width="370" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="635" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">브라우저 내부 실행 (iframe)</text>
  <text x="635" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">앱과 동일 루프 → 특정 동기 패턴에 강함</text>

  <!-- Row: 브라우저 지원 -->
  <rect x="60" y="202" width="760" height="24" rx="0" fill="#1a1a2e" stroke="none"/>
  <text x="440" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">브라우저 지원</text>

  <rect x="60" y="226" width="370" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="245" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Chromium · Firefox · Safari (WebKit)</text>
  <text x="245" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">크로스 브라우저 한 번에 실행</text>

  <rect x="450" y="226" width="370" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="635" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">Chrome · Edge · Firefox (실험적)</text>
  <text x="635" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Safari 지원 제한적</text>

  <!-- Row: 병렬 실행 -->
  <rect x="60" y="278" width="760" height="24" rx="0" fill="#1a1a2e" stroke="none"/>
  <text x="440" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
