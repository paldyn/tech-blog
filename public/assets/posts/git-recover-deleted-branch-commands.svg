<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">브랜치 복구 실전 명령어</text>

  <rect x="60" y="68" width="760" height="282" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 방법 1: SHA가 터미널에 표시된 경우</text>
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Deleted branch feature/auth (was abc1234)</text>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git checkout -b feature/auth abc1234</text>

  <line x1="76" y1="148" x2="804" y2="148" stroke="#1e2a3a" stroke-width="1"/>

  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 방법 2: reflog에서 SHA 찾기</text>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git reflog | grep "feature/auth"</text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># abc1234 HEAD@{5}: commit: feat: 인증 추가</text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git branch feature/auth abc1234</text>

  <line x1="76" y1="244" x2="804" y2="244" stroke="#1e2a3a" stroke-width="1"/>

  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 방법 3: fsck로 dangling commit 찾기</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fsck --unreachable 2>/dev/null | grep commit</text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 각 커밋 메시지 확인 후 복구</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git show --oneline --no-patch &lt;sha&gt;</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git checkout -b feature/auth &lt;sha&gt;</text>
</svg>
