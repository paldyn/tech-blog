<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">제어 vs 비제어 입력</text>

  <!-- Left: Controlled -->
  <rect x="60" y="72" width="360" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">제어 컴포넌트 (Controlled)</text>

  <rect x="60" y="136" width="360" height="168" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [val, setVal] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">input</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">    value={val}</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">    onChange={e =&gt; setVal(e.target.value)}</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">  /&gt;</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">);</tspan></tspan>
  </text>

  <!-- Controlled flow -->
  <rect x="60" y="318" width="360" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">React state가 단일 진실 공급원</text>
  <text x="240" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">입력할 때마다 리렌더링 발생</text>

  <!-- Right: Uncontrolled -->
  <rect x="460" y="72" width="360" height="50" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">비제어 컴포넌트 (Uncontrolled)</text>

  <rect x="460" y="136" width="360" height="168" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="156" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="476" dy="0"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> inputRef = useRef(</tspan><tspan fill="#b5cea8">null</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> handleSubmit() {</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> val = inputRef.current.value;</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="476" dy="20"><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">input</tspan><tspan fill="#ffffff"> ref={inputRef} /&gt;;</tspan></tspan>
    <tspan x="476" dy="40"><tspan fill="#9aa4b8">// DOM이 직접 값을 보관</tspan></tspan>
  </text>

  <!-- Uncontrolled flow -->
  <rect x="460" y="318" width="360" height="60" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">DOM 자체가 값을 보관</text>
  <text x="640" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">필요할 때만 ref로 읽음 (리렌더 없음)</text>

  <!-- Bottom tip -->
  <rect x="60" y="400" width="760" height="40" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파일 업로드·포커스 관리·서드파티 연동 → 비제어 / 그 외 대부분 → 제어 컴포넌트 권장</text>
</svg>
