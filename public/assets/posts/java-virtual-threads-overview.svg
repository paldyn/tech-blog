<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Virtual Threads 아키텍처</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">수백만 개의 경량 스레드를 소수의 OS 스레드(캐리어) 위에 스케줄링</text>

  <!-- Virtual Threads (many) -->
  <rect x="60" y="88" width="360" height="200" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Virtual Threads (수백만 개)</text>

  <rect x="76" y="122" width="70" height="30" rx="4" fill="#1a3a5a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="111" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">VT-1</text>
  <rect x="152" y="122" width="70" height="30" rx="4" fill="#1a3a5a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="187" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">VT-2</text>
  <rect x="228" y="122" width="70" height="30" rx="4" fill="#1a3a5a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="263" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">VT-3</text>
  <rect x="304" y="122" width="70" height="30" rx="4" fill="#0a1a2a" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="339" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">VT-N</text>

  <rect x="76" y="162" width="70" height="30" rx="4" fill="#1a3a5a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="111" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">VT-4</text>
  <rect x="152" y="162" width="70" height="30" rx="4" fill="#0f2a1f" stroke="#55c555" stroke-width="1"/>
  <text x="187" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">PARKED</text>
  <rect x="228" y="162" width="70" height="30" rx="4" fill="#0f2a1f" stroke="#55c555" stroke-width="1"/>
  <text x="263" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">PARKED</text>
  <rect x="304" y="162" width="70" height="30" rx="4" fill="#1a3a5a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="339" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">VT-5</text>

  <text x="240" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PARKED: I/O 대기 중 — 힙에 보관, OS 스레드 점유 없음</text>
  <text x="240" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">스택 크기 ~수백 바이트 (플랫폼 스레드: ~512KB~1MB)</text>
  <text x="240" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">생성 비용 극히 낮음</text>

  <!-- Arrow: VT -> Scheduler -->
  <text x="454" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">mount/</text>
  <text x="454" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">unmount</text>
  <line x1="420" y1="188" x2="456" y2="188" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Platform / Carrier Threads -->
  <rect x="476" y="88" width="344" height="200" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="648" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">캐리어 스레드 (OS 스레드 수 = CPU 코어)</text>

  <rect x="492" y="126" width="140" height="56" rx="6" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="562" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Carrier-1</text>
  <text x="562" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">→ VT-1 실행 중</text>

  <rect x="648" y="126" width="140" height="56" rx="6" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="718" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Carrier-2</text>
  <text x="718" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">→ VT-2 실행 중</text>

  <rect x="492" y="192" width="140" height="56" rx="6" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="562" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Carrier-3</text>
  <text x="562" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">→ VT-5 실행 중</text>

  <rect x="648" y="192" width="140" height="56" rx="6" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="718" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Carrier-4</text>
  <text x="718" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">→ VT 스케줄 대기</text>

  <!-- OS Layer -->
  <rect x="60" y="320" width="760" height="48" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">운영체제 스레드 스케줄러</text>
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">캐리어 스레드만 OS가 인식 — Virtual Thread는 JVM이 직접 관리</text>

  <!-- Bottom comparison -->
  <rect x="60" y="390" width="370" height="68" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">플랫폼 스레드 (기존)</text>
  <text x="245" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">I/O 블로킹 = OS 스레드 낭비</text>
  <text x="245" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">스레드 수 ≈ 수천 개 한계</text>

  <rect x="450" y="390" width="370" height="68" rx="6" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">Virtual Thread (Java 21)</text>
  <text x="635" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">I/O 블로킹 = VT만 park (CPU 반환)</text>
  <text x="635" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">스레드 수 ≈ 수백만 개 가능</text>
</svg>
