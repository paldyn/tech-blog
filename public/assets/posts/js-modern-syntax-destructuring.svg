<svg viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }</style>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" fill="#e8e8e8" font-size="18" font-weight="600" text-anchor="middle">구조 분해 할당 — 고급 패턴</text>
  <line x1="40" y1="54" x2="840" y2="54" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Left column: Object & Array destructuring -->
  <!-- Object destructuring card -->
  <rect x="20" y="68" width="400" height="170" fill="#111" rx="8"/>
  <text x="36" y="90" fill="#7dd3fc" font-size="12" font-weight="600">객체 구조 분해</text>

  <rect x="36" y="100" width="368" height="118" fill="#0d0d0d" rx="5"/>
  <text x="48" y="118" fill="#555" font-size="11" font-family="monospace, 'Courier New'">const { name, age } = user              <tspan fill="#555">// 기본</tspan></text>
  <text x="48" y="136" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const { name: <tspan fill="#86efac">userName</tspan> } = user         <tspan fill="#555">// 이름 변경</tspan></text>
  <text x="48" y="154" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const { role = <tspan fill="#fbbf24">'user'</tspan> } = user          <tspan fill="#555">// 기본값</tspan></text>
  <text x="48" y="172" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const { addr: { city } } = user         <tspan fill="#555">// 중첩</tspan></text>
  <text x="48" y="190" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const { a, <tspan fill="#c4b5fd">...rest</tspan> } = obj             <tspan fill="#555">// 레스트</tspan></text>

  <!-- Array destructuring card -->
  <rect x="20" y="250" width="400" height="170" fill="#111" rx="8"/>
  <text x="36" y="272" fill="#86efac" font-size="12" font-weight="600">배열 구조 분해</text>

  <rect x="36" y="282" width="368" height="118" fill="#0d0d0d" rx="5"/>
  <text x="48" y="300" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const [first, second] = arr             <tspan fill="#555">// 순서대로</tspan></text>
  <text x="48" y="318" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const [, , third] = arr                 <tspan fill="#555">// 건너뛰기</tspan></text>
  <text x="48" y="336" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const [head, <tspan fill="#c4b5fd">...tail</tspan>] = arr            <tspan fill="#555">// 레스트</tspan></text>
  <text x="48" y="354" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const [x = 0, y = 0] = point           <tspan fill="#555">// 기본값</tspan></text>
  <text x="48" y="372" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">[a, b] = [b, a]                         <tspan fill="#555">// 값 교환</tspan></text>

  <!-- Right column: Practical patterns -->
  <!-- Function params pattern -->
  <rect x="440" y="68" width="420" height="165" fill="#111" rx="8"/>
  <text x="456" y="90" fill="#c4b5fd" font-size="12" font-weight="600">함수 매개변수 구조 분해</text>

  <rect x="456" y="100" width="388" height="113" fill="#0d0d0d" rx="5"/>
  <text x="468" y="118" fill="#555" font-size="11" font-family="monospace, 'Courier New'">// 명명 매개변수 패턴</text>
  <text x="468" y="136" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">function createUser({</text>
  <text x="468" y="152" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">  name, role = <tspan fill="#fbbf24">'user'</tspan>, active = <tspan fill="#fbbf24">true</tspan></text>
  <text x="468" y="168" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">} = {}) { ... }</text>
  <text x="468" y="186" fill="#86efac" font-size="11" font-family="monospace, 'Courier New'">createUser({ name: <tspan fill="#fbbf24">'지수'</tspan> })    <tspan fill="#555">// 나머지 기본값</tspan></text>

  <!-- Spread object pattern -->
  <rect x="440" y="248" width="420" height="175" fill="#111" rx="8"/>
  <text x="456" y="270" fill="#fbbf24" font-size="12" font-weight="600">객체 스프레드 — ES2018</text>

  <rect x="456" y="280" width="388" height="120" fill="#0d0d0d" rx="5"/>
  <text x="468" y="298" fill="#555" font-size="11" font-family="monospace, 'Courier New'">// 얕은 복사 + 병합</text>
  <text x="468" y="315" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const merged = { <tspan fill="#c4b5fd">...defaults</tspan>, <tspan fill="#86efac">...overrides</tspan> }</text>
  <text x="468" y="333" fill="#555" font-size="11" font-family="monospace, 'Courier New'">// 불변 업데이트 — React 상태 패턴</text>
  <text x="468" y="350" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const next = { <tspan fill="#c4b5fd">...state</tspan>, count: state.count + 1 }</text>
  <text x="468" y="368" fill="#555" font-size="11" font-family="monospace, 'Courier New'">// 특정 키 제거</text>
  <text x="468" y="386" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const { password: <tspan fill="#f87171">_</tspan>, <tspan fill="#c4b5fd">...safeUser</tspan> } = user</text>

  <text x="456" y="420" fill="#444" font-size="10">스프레드는 1단계 얕은 복사 — 중첩 객체는 여전히 참조 공유</text>
</svg>
