<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Optional — null을 명시적으로 다루는 컨테이너</text>

  <!-- Left: null problem -->
  <text x="200" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">null의 문제</text>

  <rect x="60" y="96" width="280" height="60" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">String name = findUser(id).getName();</text>
  <text x="200" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">NullPointerException 위험!</text>

  <!-- Arrow -->
  <line x1="360" y1="126" x2="410" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="385" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">Optional</text>

  <!-- Right: Optional solution -->
  <text x="620" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Optional 해결</text>
  <rect x="420" y="96" width="400" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Optional&lt;User&gt; user = findUser(id);</text>
  <text x="620" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">값이 없음을 타입으로 명시</text>

  <!-- Optional states diagram -->
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">Optional 두 가지 상태</text>

  <!-- Present state -->
  <rect x="100" y="208" width="260" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="230" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Optional.of(value)</text>
  <text x="230" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">값이 존재</text>
  <text x="230" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">isPresent() == true</text>

  <!-- Empty state -->
  <rect x="520" y="208" width="260" height="80" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="650" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Optional.empty()</text>
  <text x="650" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">값이 없음</text>
  <text x="650" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">isEmpty() == true</text>

  <!-- Code block -->
  <rect x="60" y="316" width="760" height="158" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Optional 생성 3가지 방법</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">&lt;String&gt; present = </tspan><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">.of(</tspan><tspan fill="#ce9178">"Hello"</tspan><tspan fill="#ffffff">);     </tspan><tspan fill="#9aa4b8">// 값 있음</tspan></text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">&lt;String&gt; empty   = </tspan><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">.empty();          </tspan><tspan fill="#9aa4b8">// 비어 있음</tspan></text>
  <text x="76" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">&lt;String&gt; maybe   = </tspan><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">.ofNullable(str);  </tspan><tspan fill="#9aa4b8">// null 가능</tspan></text>
  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 값 꺼내기 — 안전한 방법</text>
  <text x="76" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">present.orElse(</tspan><tspan fill="#ce9178">"기본값"</tspan><tspan fill="#ffffff">);             </tspan><tspan fill="#9aa4b8">// "Hello"</tspan></text>
  <text x="76" y="462" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">empty.orElse(</tspan><tspan fill="#ce9178">"기본값"</tspan><tspan fill="#ffffff">);               </tspan><tspan fill="#9aa4b8">// "기본값"</tspan></text>
</svg>
