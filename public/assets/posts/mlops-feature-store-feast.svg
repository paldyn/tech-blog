<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Feast 피처 스토어 코드</text>

  <!-- Header bar with badge -->
  <rect x="40" y="64" width="800" height="36" rx="6" fill="#141420" stroke="#7777cc" stroke-width="1"/>
  <text x="60" y="87" font-size="14" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">피처 뷰 정의 (Feast)</text>
  <rect x="690" y="72" width="130" height="22" rx="11" fill="#7777cc" fill-opacity="0.2" stroke="#7777cc" stroke-width="1"/>
  <text x="755" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Feature Store</text>

  <!-- Code block -->
  <rect x="40" y="108" width="800" height="222" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="60" dy="0" y="132"><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> feast </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="60" dy="19"><tspan fill="#ffffff">    Entity, FeatureView, Field, FileSource</tspan></tspan>
    <tspan x="60" dy="19"><tspan fill="#ffffff">)</tspan></tspan>
    <tspan x="60" dy="19"><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> feast.types </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Float32, Int64</tspan></tspan>
    <tspan x="60" dy="22"><tspan fill="#9aa4b8"># 엔티티 정의</tspan></tspan>
    <tspan x="60" dy="19"><tspan fill="#ffffff">user = Entity(name=</tspan><tspan fill="#ce9178">"user_id"</tspan><tspan fill="#ffffff">, join_keys=[</tspan><tspan fill="#ce9178">"user_id"</tspan><tspan fill="#ffffff">])</tspan></tspan>
    <tspan x="60" dy="22"><tspan fill="#9aa4b8"># 피처 소스</tspan></tspan>
    <tspan x="60" dy="19"><tspan fill="#ffffff">user_stats_source = FileSource(</tspan></tspan>
    <tspan x="60" dy="19"><tspan fill="#ffffff">    path=</tspan><tspan fill="#ce9178">"data/user_stats.parquet"</tspan><tspan fill="#ffffff">,</tspan></tspan>
    <tspan x="60" dy="19"><tspan fill="#ffffff">    timestamp_field=</tspan><tspan fill="#ce9178">"event_timestamp"</tspan><tspan fill="#ffffff">,</tspan></tspan>
    <tspan x="60" dy="19"><tspan fill="#ffffff">)</tspan></tspan>
  </text>

  <!-- Second code block for FeatureView -->
  <rect x="40" y="338" width="800" height="42" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="0"/>

  <!-- Concept annotation boxes -->
  <rect x="40" y="340" width="160" height="42" rx="6" fill="#0f1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="357" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Entity</text>
  <text x="120" y="373" text-anchor="middle" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">조인 키 정의</text>

  <rect x="220" y="340" width="200" height="42" rx="6" fill="#12101f" stroke="#7777cc" stroke-width="1"/>
  <text x="320" y="357" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">FeatureView</text>
  <text x="320" y="373" text-anchor="middle" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">피처 그룹 + TTL 설정</text>

  <rect x="440" y="340" width="160" height="42" rx="6" fill="#0a1a10" stroke="#55c555" stroke-width="1"/>
  <text x="520" y="357" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Field</text>
  <text x="520" y="373" text-anchor="middle" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">개별 피처 + 타입</text>

  <rect x="620" y="340" width="200" height="42" rx="6" fill="#1f120f" stroke="#ce9178" stroke-width="1"/>
  <text x="720" y="357" text-anchor="middle" font-size="11" font-weight="700" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">FileSource</text>
  <text x="720" y="373" text-anchor="middle" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">데이터 소스 연결</text>
</svg>
