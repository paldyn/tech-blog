<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Gitflow 브랜치별 역할</text>

  <!-- main -->
  <rect x="60" y="68" width="360" height="72" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">main</text>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로덕션 배포 이력만 보관</text>
  <text x="240" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">릴리즈마다 버전 태그 부착</text>

  <!-- develop -->
  <rect x="460" y="68" width="360" height="72" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">develop</text>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">다음 릴리즈 통합 브랜치</text>
  <text x="640" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">feature들이 여기로 머지됨</text>

  <!-- feature -->
  <rect x="60" y="168" width="220" height="82" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">feature/*</text>
  <text x="170" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">develop에서 분기</text>
  <text x="170" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ develop으로 머지</text>

  <!-- release -->
  <rect x="320" y="168" width="220" height="82" rx="8" fill="#111" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="430" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8c84a">release/*</text>
  <text x="430" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">develop에서 분기</text>
  <text x="430" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ main + develop 머지</text>

  <!-- hotfix -->
  <rect x="580" y="168" width="260" height="82" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">hotfix/*</text>
  <text x="710" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">main에서 분기</text>
  <text x="710" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ main + develop 머지</text>

  <!-- when to use -->
  <rect x="60" y="278" width="760" height="96" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Gitflow가 적합한 경우</text>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 명확한 릴리즈 주기가 있는 제품 (모바일 앱, 패키지 라이브러리)</text>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 여러 버전을 동시에 유지보수해야 하는 경우</text>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">→ 지속적 배포(CD)가 필요한 웹 서비스에는 GitHub Flow나 Trunk-Based가 더 적합</text>
</svg>
