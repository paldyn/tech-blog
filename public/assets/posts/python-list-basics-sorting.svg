<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">리스트 정렬 · 중첩 · 복사</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">sort vs sorted · 얕은 복사 vs 깊은 복사</text>

  <!-- sorting -->
  <rect x="60" y="100" width="360" height="290" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="240" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">정렬</text>
  <rect x="80" y="140" width="320" height="232" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">nums = [</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">]</tspan></text>
  <text x="96" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># in-place 정렬 (None 반환)</tspan></text>
  <text x="96" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">nums.</tspan><tspan fill="#7ec8e3">sort</tspan><tspan fill="#e8e8e8">()</tspan></text>
  <text x="96" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">nums.</tspan><tspan fill="#7ec8e3">sort</tspan><tspan fill="#e8e8e8">(reverse=</tspan><tspan fill="#7ec8e3">True</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="96" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 새 리스트 반환</tspan></text>
  <text x="96" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s = </tspan><tspan fill="#7ec8e3">sorted</tspan><tspan fill="#e8e8e8">(nums)</tspan></text>
  <text x="96" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># key 함수 활용</tspan></text>
  <text x="96" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">words = [</tspan><tspan fill="#ce9178">"banana"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"fig"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"apple"</tspan><tspan fill="#e8e8e8">]</tspan></text>
  <text x="96" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">sorted</tspan><tspan fill="#e8e8e8">(words, key=</tspan><tspan fill="#7ec8e3">len</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="96" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># ['fig', 'apple', 'banana']</tspan></text>
  <text x="96" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 다중 조건: 길이→알파벳순</tspan></text>
  <text x="96" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">sorted</tspan><tspan fill="#e8e8e8">(words, key=</tspan><tspan fill="#7ec8e3">lambda</tspan><tspan fill="#e8e8e8"> w: (</tspan><tspan fill="#7ec8e3">len</tspan><tspan fill="#e8e8e8">(w), w))</tspan></text>

  <!-- copy -->
  <rect x="460" y="100" width="360" height="290" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">복사 주의사항</text>
  <rect x="480" y="140" width="320" height="232" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 참조만 복사 (얕은)</tspan></text>
  <text x="496" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, [</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">]]</tspan></text>
  <text x="496" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">b = a[:]      </tspan><tspan fill="#6a8aa0"># 얕은 복사</tspan></text>
  <text x="496" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">b[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">] = </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#e8e8e8">   </tspan><tspan fill="#6a8aa0"># a 영향 없음</tspan></text>
  <text x="496" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">b[</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">].</tspan><tspan fill="#7ec8e3">append</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">)</tspan><tspan fill="#6a8aa0"># a도 변경!</tspan></text>
  <text x="496" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 깊은 복사</tspan></text>
  <text x="496" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> copy</tspan></text>
  <text x="496" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">c = copy.</tspan><tspan fill="#7ec8e3">deepcopy</tspan><tspan fill="#e8e8e8">(a)</tspan></text>
  <text x="496" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">c[</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">].</tspan><tspan fill="#7ec8e3">append</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#b5cea8">9</tspan><tspan fill="#e8e8e8">)</tspan><tspan fill="#6a8aa0"># a 영향 없음</tspan></text>
  <text x="496" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 얕은 복사 다른 방법들</tspan></text>
  <text x="496" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a.</tspan><tspan fill="#7ec8e3">copy</tspan><tspan fill="#e8e8e8">()   </tspan><tspan fill="#6a8aa0"># 메서드</tspan></text>
  <text x="496" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">list</tspan><tspan fill="#e8e8e8">(a)      </tspan><tspan fill="#6a8aa0"># list() 생성자</tspan></text>
</svg>
