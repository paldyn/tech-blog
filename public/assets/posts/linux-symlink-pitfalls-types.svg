<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">심볼릭 링크 함정 유형</text>

  <!-- Case 1: Dangling symlink -->
  <text x="200" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">1. 깨진 링크 (Dangling)</text>

  <rect x="60" y="96" width="130" height="46" rx="6" fill="#1e0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="125" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">link.txt</text>
  <text x="125" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">symlink</text>

  <line x1="190" y1="119" x2="245" y2="119" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <rect x="250" y="96" width="130" height="46" rx="6" fill="#0f0f0f" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="315" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">target.txt</text>
  <text x="315" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">삭제됨</text>

  <text x="200" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">원본 삭제 후 링크만 남아 ENOENT 에러</text>

  <!-- Case 2: Circular symlink -->
  <text x="660" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8c55e" text-anchor="middle">2. 순환 링크 (Circular)</text>

  <rect x="510" y="96" width="120" height="46" rx="6" fill="#1a1200" stroke="#e8c55e" stroke-width="1.5"/>
  <text x="570" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c55e" text-anchor="middle">a → b</text>
  <text x="570" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">symlink</text>

  <rect x="650" y="96" width="120" height="46" rx="6" fill="#1a1200" stroke="#e8c55e" stroke-width="1.5"/>
  <text x="710" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c55e" text-anchor="middle">b → a</text>
  <text x="710" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">symlink</text>

  <path d="M 640 108 C 640 72 770 72 770 108" stroke="#e8c55e" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr)"/>
  <text x="660" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ELOOP: Too many levels of symbolic links</text>

  <!-- Case 3: Relative path broken after move -->
  <text x="200" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">3. 이동 후 깨지는 상대 경로</text>

  <rect x="60" y="225" width="160" height="70" rx="6" fill="#10101e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">/app/bin/run</text>
  <text x="140" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ ../lib/run.sh</text>
  <text x="140" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(상대 경로)</text>

  <text x="250" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">→ mv →</text>

  <rect x="290" y="225" width="160" height="70" rx="6" fill="#1e0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="370" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">/tools/bin/run</text>
  <text x="370" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ ../lib/run.sh</text>
  <text x="370" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">경로가 달라져 깨짐!</text>

  <text x="200" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">링크를 이동하면 상대 경로 기준점도 이동 — 절대 경로 권장</text>

  <!-- Case 4: Permission of target -->
  <text x="660" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">4. 권한은 대상 파일 기준</text>

  <rect x="500" y="225" width="150" height="70" rx="6" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="575" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">link.txt</text>
  <text x="575" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">lrwxrwxrwx</text>
  <text x="575" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(항상 777)</text>

  <line x1="650" y1="260" x2="700" y2="260" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="704" y="225" width="140" height="70" rx="6" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="774" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">target.txt</text>
  <text x="774" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">-rw-r--r--</text>
  <text x="774" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(실제 권한)</text>

  <text x="660" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">링크 자체는 chmod 불가 — 대상 파일 권한이 적용</text>

  <!-- Bottom: find dangling -->
  <rect x="60" y="345" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="367" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 깨진 심볼릭 링크 찾기</text>
  <text x="76" y="385" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">find</tspan> /app -type l ! -e</text>
  <text x="76" y="403" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 대상 경로 확인</text>
  <text x="76" y="421" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">readlink</tspan> -f /app/bin/run</text>
</svg>
