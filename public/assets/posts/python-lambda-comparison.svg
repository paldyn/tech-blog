<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">lambda vs def 비교</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">문법 차이와 제한사항</text>

  <!-- lambda side -->
  <rect x="60" y="90" width="360" height="310" fill="#070b14" rx="8" stroke="#7ec8e3"/>
  <rect x="60" y="90" width="360" height="5" fill="#7ec8e3" rx="8"/>
  <rect x="60" y="93" width="360" height="3" fill="#7ec8e3"/>
  <text x="240" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">lambda</text>

  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 문법</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">lambda</tspan><tspan fill="#e8e8e8"> x: x * </tspan><tspan fill="#b5cea8">2</tspan></text>

  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 변수 할당도 가능</text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">double = </tspan><tspan fill="#7ec8e3">lambda</tspan><tspan fill="#e8e8e8"> x: x * </tspan><tspan fill="#b5cea8">2</tspan></text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">double(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">)   </tspan><tspan fill="#888"># 10</tspan></text>

  <line x1="76" y1="252" x2="400" y2="252" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">제한사항</text>
  <text x="76" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 본문이 단일 표현식만 가능</text>
  <text x="76" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 독스트링 없음</text>
  <text x="76" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• return 키워드 없음</text>
  <text x="76" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• if/for/while 블록 불가</text>
  <text x="76" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">표현식(expression)만 허용</text>

  <!-- def side -->
  <rect x="460" y="90" width="360" height="310" fill="#070b14" rx="8" stroke="#55c555"/>
  <rect x="460" y="90" width="360" height="5" fill="#55c555" rx="8"/>
  <rect x="460" y="93" width="360" height="3" fill="#55c555"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">def (동일한 기능)</text>

  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 동등한 def</text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> double(x):</tspan></text>
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#e8e8e8"> x * </tspan><tspan fill="#b5cea8">2</tspan></text>

  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">double(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">)   </tspan><tspan fill="#888"># 10</tspan></text>

  <line x1="476" y1="236" x2="800" y2="236" stroke="#1e2433" stroke-width="1"/>

  <text x="476" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="476" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 여러 줄 작성 가능</text>
  <text x="476" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 독스트링 추가 가능</text>
  <text x="476" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 이름(__name__) 존재</text>
  <text x="476" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 복잡한 로직 가능</text>
  <text x="476" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">재사용·문서화 필요 시 def 선택</text>
</svg>
