<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">App Router 특수 파일 목록</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">각 파일의 역할과 사용 시점</text>

  <!-- page.tsx -->
  <rect x="60" y="90" width="760" height="58" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <rect x="60" y="90" width="170" height="58" rx="6" fill="#0d2e0d"/>
  <text x="145" y="116" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">page.tsx</text>
  <text x="145" y="136" text-anchor="middle" font-size="11" fill="#888">라우트 UI</text>
  <text x="460" y="114" text-anchor="middle" font-size="13" fill="#e8e8e8">URL에 대응하는 실제 페이지 컴포넌트</text>
  <text x="460" y="134" text-anchor="middle" font-size="12" fill="#888">이 파일이 있어야 해당 경로에 접근 가능</text>

  <!-- layout.tsx -->
  <rect x="60" y="160" width="760" height="58" rx="6" fill="#10102a" stroke="#7777cc" stroke-width="1"/>
  <rect x="60" y="160" width="170" height="58" rx="6" fill="#14143a"/>
  <text x="145" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7777cc">layout.tsx</text>
  <text x="145" y="206" text-anchor="middle" font-size="11" fill="#888">중첩 레이아웃</text>
  <text x="460" y="184" text-anchor="middle" font-size="13" fill="#e8e8e8">하위 라우트 전체에 적용되는 공통 UI</text>
  <text x="460" y="204" text-anchor="middle" font-size="12" fill="#888">네비게이션 시 언마운트 되지 않아 상태 보존</text>

  <!-- loading.tsx -->
  <rect x="60" y="230" width="760" height="58" rx="6" fill="#0c1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="60" y="230" width="170" height="58" rx="6" fill="#102030"/>
  <text x="145" y="256" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">loading.tsx</text>
  <text x="145" y="276" text-anchor="middle" font-size="11" fill="#888">로딩 UI</text>
  <text x="460" y="254" text-anchor="middle" font-size="13" fill="#e8e8e8">페이지/세그먼트 로딩 중 표시할 Skeleton UI</text>
  <text x="460" y="274" text-anchor="middle" font-size="12" fill="#888">React Suspense로 자동 래핑됨</text>

  <!-- error.tsx -->
  <rect x="60" y="300" width="760" height="58" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <rect x="60" y="300" width="170" height="58" rx="6" fill="#3a1010"/>
  <text x="145" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#e05555">error.tsx</text>
  <text x="145" y="346" text-anchor="middle" font-size="11" fill="#888">에러 UI</text>
  <text x="460" y="324" text-anchor="middle" font-size="13" fill="#e8e8e8">세그먼트에서 에러 발생 시 표시할 폴백 UI</text>
  <text x="460" y="344" text-anchor="middle" font-size="12" fill="#888">반드시 'use client' 선언 필요</text>

  <!-- not-found.tsx -->
  <rect x="60" y="370" width="760" height="58" rx="6" fill="#1a150a" stroke="#ce9178" stroke-width="1"/>
  <rect x="60" y="370" width="170" height="58" rx="6" fill="#2a200a"/>
  <text x="145" y="396" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#ce9178">not-found.tsx</text>
  <text x="145" y="416" text-anchor="middle" font-size="11" fill="#888">404 UI</text>
  <text x="460" y="394" text-anchor="middle" font-size="13" fill="#e8e8e8">notFound() 호출 시 또는 매칭 라우트 없을 때</text>
  <text x="460" y="414" text-anchor="middle" font-size="12" fill="#888">루트의 not-found.tsx가 전역 404 처리</text>

  <!-- template.tsx -->
  <rect x="60" y="440" width="760" height="58" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <rect x="60" y="440" width="170" height="58" rx="6" fill="#222"/>
  <text x="145" y="466" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#aaa">template.tsx</text>
  <text x="145" y="486" text-anchor="middle" font-size="11" fill="#666">템플릿</text>
  <text x="460" y="464" text-anchor="middle" font-size="13" fill="#aaa">layout과 유사하나 네비게이션마다 새 인스턴스 생성</text>
  <text x="460" y="484" text-anchor="middle" font-size="12" fill="#666">상태 초기화가 필요한 경우에 사용</text>
</svg>
