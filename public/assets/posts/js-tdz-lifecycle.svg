<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TDZ (Temporal Dead Zone) — 변수 생명주기</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">let · const의 스코프 진입 → TDZ → 선언 → 초기화 → 할당</text>

  <!-- Timeline line -->
  <line x1="80" y1="160" x2="800" y2="160" stroke="#333" stroke-width="2"/>

  <!-- Phase 1: Scope start -->
  <circle cx="120" cy="160" r="8" fill="#7777cc" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="120" y1="152" x2="120" y2="110" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">스코프 진입</text>

  <!-- TDZ region (red zone) -->
  <rect x="120" y="168" width="320" height="28" rx="4" fill="#2e1010" stroke="#e05555" stroke-width="1"/>
  <text x="280" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">⚠ Temporal Dead Zone (TDZ) ⚠</text>

  <!-- Phase 2: Declaration -->
  <circle cx="440" cy="160" r="10" fill="#e8c55a" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="440" y1="152" x2="440" y2="110" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c55a" text-anchor="middle">let x 선언</text>

  <!-- Phase 3: Initialization -->
  <circle cx="600" cy="160" r="8" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="600" y1="168" x2="600" y2="210" stroke="#55c555" stroke-width="1.5"/>
  <text x="600" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">초기화</text>
  <text x="600" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(undefined)</text>

  <!-- Live zone -->
  <rect x="440" y="168" width="360" height="28" rx="4" fill="#102e10" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">✓ 접근 가능 영역</text>

  <!-- Phase 4: Assignment -->
  <circle cx="740" cy="160" r="8" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="740" y1="168" x2="740" y2="210" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="740" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">할당</text>
  <text x="740" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(x = 10)</text>

  <!-- Error annotation -->
  <rect x="130" y="260" width="290" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="275" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">TDZ에서 접근 시:</text>
  <text x="275" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ReferenceError: Cannot access</text>

  <!-- Code block -->
  <rect x="60" y="330" width="760" height="110" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// TDZ 실제 동작 예시</text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">{</text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">  // ← 여기서 블록 진입: x는 TDZ에 진입</text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">  console</text><text x="148" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">.log(x); </text><text x="270" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">// ReferenceError! (TDZ 구간)</text>
  <text x="76" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  let</text><text x="106" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> x = </text><text x="154" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">10</text><text x="176" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">;</text><text x="190" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"> // ← TDZ 종료, x = 10</text>
  <text x="76" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">}</text>

  <text x="440" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
