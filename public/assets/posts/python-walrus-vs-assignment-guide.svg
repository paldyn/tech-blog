<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">왈러스가 빛날 때 vs 흐릴 때</text>

  <rect x="60" y="78" width="370" height="172" rx="10" fill="#101a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="108" font-size="16" font-weight="600" fill="#55c555">쓰면 좋은 곳</text>
  <text x="84" y="138" font-size="13" fill="#cccccc">· while 루프에서 읽고 검사</text>
  <text x="84" y="164" font-size="13" fill="#cccccc">· 컴프리헨션에서 계산값 재사용</text>
  <text x="84" y="190" font-size="13" fill="#cccccc">  [y for x in d if (y := f(x))]</text>
  <text x="84" y="216" font-size="13" fill="#cccccc">· if 조건에서 결과를 바로 받기</text>
  <text x="84" y="240" font-size="13" fill="#9aa4b8">중복 제거 + 범위는 좁게</text>

  <rect x="450" y="78" width="370" height="172" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="474" y="108" font-size="16" font-weight="600" fill="#e05555">피해야 할 곳</text>
  <text x="474" y="138" font-size="13" fill="#cccccc">· 그냥 한 줄이면 되는 평범한 대입</text>
  <text x="474" y="164" font-size="13" fill="#cccccc">· 한 식에 := 를 여러 번 욱여넣기</text>
  <text x="474" y="190" font-size="13" fill="#cccccc">· 부작용을 숨겨 읽기 어렵게 만들 때</text>
  <text x="474" y="216" font-size="13" fill="#cccccc">· 함수 인자 안에서의 깜짝 대입</text>
  <text x="474" y="240" font-size="13" fill="#9aa4b8">간결함이 명확함을 해치면 = 로</text>
</svg>
