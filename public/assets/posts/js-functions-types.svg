<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8">함수 작성 방식 비교</text>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#555">함수 선언식 · 함수 표현식 · 화살표 함수</text>

  <!-- Column headers -->
  <text x="150" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#d4a84b">함수 선언식</text>
  <text x="440" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#6b9fff">함수 표현식</text>
  <text x="730" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#6abf5e">화살표 함수</text>

  <!-- Syntax boxes -->
  <rect x="30" y="112" width="240" height="80" rx="8" fill="#111" stroke="#2a2a1a" stroke-width="1"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="50" y="135" font-size="11" fill="#bbb"><tspan fill="#d4a84b">function</tspan> add(a, b) {</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="64" y="153" font-size="11" fill="#bbb"><tspan fill="#d4a84b">return</tspan> a + b;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="50" y="171" font-size="11" fill="#bbb">}</text>

  <rect x="320" y="112" width="240" height="80" rx="8" fill="#111" stroke="#1a1a2a" stroke-width="1"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="340" y="135" font-size="11" fill="#bbb"><tspan fill="#6b9fff">const</tspan> add = <tspan fill="#6b9fff">function</tspan>(a, b) {</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="354" y="153" font-size="11" fill="#bbb"><tspan fill="#6b9fff">return</tspan> a + b;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="340" y="171" font-size="11" fill="#bbb">};</text>

  <rect x="610" y="112" width="240" height="80" rx="8" fill="#111" stroke="#1a2a1a" stroke-width="1"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="630" y="135" font-size="11" fill="#bbb"><tspan fill="#6abf5e">const</tspan> add = (a, b) =&gt;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="644" y="153" font-size="11" fill="#bbb">a + b;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="630" y="171" font-size="11" fill="#555">// 한 줄로 표현 가능</text>

  <!-- Row: 호이스팅 -->
  <text x="440" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#666">호이스팅</text>
  <rect x="30" y="230" width="240" height="36" rx="6" fill="#2a2a1a"/>
  <text x="150" y="253" text-anchor="middle" font-size="12" fill="#d4a84b">✓ 선언 전에 호출 가능</text>
  <rect x="320" y="230" width="240" height="36" rx="6" fill="#1a1a1a"/>
  <text x="440" y="253" text-anchor="middle" font-size="12" fill="#555">✗ 선언 후에만 호출</text>
  <rect x="610" y="230" width="240" height="36" rx="6" fill="#1a1a1a"/>
  <text x="730" y="253" text-anchor="middle" font-size="12" fill="#555">✗ 선언 후에만 호출</text>

  <!-- Row: this 바인딩 -->
  <text x="440" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#666">this 바인딩</text>
  <rect x="30" y="310" width="240" height="36" rx="6" fill="#1a1a2a"/>
  <text x="150" y="333" text-anchor="middle" font-size="12" fill="#6b9fff">호출 방식에 따라 결정</text>
  <rect x="320" y="310" width="240" height="36" rx="6" fill="#1a1a2a"/>
  <text x="440" y="333" text-anchor="middle" font-size="12" fill="#6b9fff">호출 방식에 따라 결정</text>
  <rect x="610" y="310" width="240" height="36" rx="6" fill="#1a2a1a"/>
  <text x="730" y="333" text-anchor="middle" font-size="12" fill="#6abf5e">상위 스코프의 this 사용</text>

  <!-- Row: arguments -->
  <text x="440" y="376" text-anchor="middle" font-size="12" font-weight="600" fill="#666">arguments 객체</text>
  <rect x="30" y="386" width="240" height="36" rx="6" fill="#1a2a1a"/>
  <text x="150" y="409" text-anchor="middle" font-size="12" fill="#6abf5e">✓ 있음</text>
  <rect x="320" y="386" width="240" height="36" rx="6" fill="#1a2a1a"/>
  <text x="440" y="409" text-anchor="middle" font-size="12" fill="#6abf5e">✓ 있음</text>
  <rect x="610" y="386" width="240" height="36" rx="6" fill="#2a1a1a"/>
  <text x="730" y="409" text-anchor="middle" font-size="12" fill="#e06c75">✗ 없음 (rest 파라미터 사용)</text>
</svg>
