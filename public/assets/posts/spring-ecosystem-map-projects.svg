<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스프링 생태계 지도</text>
  <text x="440" y="68" font-size="13" fill="#888" text-anchor="middle">spring.io 에서 제공하는 주요 프로젝트들</text>

  <!-- Spring Framework (Foundation) -->
  <rect x="200" y="88" width="480" height="64" fill="#131a2a" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="115" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">Spring Framework</text>
  <text x="440" y="137" font-size="12" fill="#888" text-anchor="middle">IoC · DI · AOP · MVC · WebFlux · JDBC · Test — 모든 스프링 프로젝트의 기반</text>

  <!-- Spring Boot -->
  <rect x="60" y="184" width="220" height="100" fill="#0e1a0e" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="212" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Spring Boot</text>
  <text x="170" y="232" font-size="12" fill="#888" text-anchor="middle">자동 구성·스타터</text>
  <text x="170" y="250" font-size="12" fill="#888" text-anchor="middle">임베디드 서버</text>
  <text x="170" y="268" font-size="12" fill="#888" text-anchor="middle">Actuator</text>

  <!-- Spring Data -->
  <rect x="330" y="184" width="220" height="100" fill="#1a110a" rx="10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="212" font-size="15" font-weight="600" fill="#ce9178" text-anchor="middle">Spring Data</text>
  <text x="440" y="232" font-size="12" fill="#888" text-anchor="middle">JPA · MongoDB</text>
  <text x="440" y="250" font-size="12" fill="#888" text-anchor="middle">Redis · R2DBC</text>
  <text x="440" y="268" font-size="12" fill="#888" text-anchor="middle">Elasticsearch</text>

  <!-- Spring Security -->
  <rect x="600" y="184" width="220" height="100" fill="#1a1a0a" rx="10" stroke="#e0c555" stroke-width="1.5"/>
  <text x="710" y="212" font-size="15" font-weight="600" fill="#e0c555" text-anchor="middle">Spring Security</text>
  <text x="710" y="232" font-size="12" fill="#888" text-anchor="middle">인증·인가</text>
  <text x="710" y="250" font-size="12" fill="#888" text-anchor="middle">OAuth 2 · OIDC</text>
  <text x="710" y="268" font-size="12" fill="#888" text-anchor="middle">CSRF · CORS</text>

  <!-- Spring Cloud -->
  <rect x="60" y="320" width="220" height="100" fill="#0a0e1a" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="348" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Spring Cloud</text>
  <text x="170" y="368" font-size="12" fill="#888" text-anchor="middle">Gateway · Config</text>
  <text x="170" y="386" font-size="12" fill="#888" text-anchor="middle">Eureka · Feign</text>
  <text x="170" y="404" font-size="12" fill="#888" text-anchor="middle">Resilience4j</text>

  <!-- Spring Batch -->
  <rect x="330" y="320" width="220" height="100" fill="#0e1a1a" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="348" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Spring Batch</text>
  <text x="440" y="368" font-size="12" fill="#888" text-anchor="middle">대용량 배치 처리</text>
  <text x="440" y="386" font-size="12" fill="#888" text-anchor="middle">Job · Step · Chunk</text>
  <text x="440" y="404" font-size="12" fill="#888" text-anchor="middle">재시작·스킵 처리</text>

  <!-- Spring AI -->
  <rect x="600" y="320" width="220" height="100" fill="#1a0a1a" rx="10" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="710" y="348" font-size="15" font-weight="600" fill="#cc77cc" text-anchor="middle">Spring AI</text>
  <text x="710" y="368" font-size="12" fill="#888" text-anchor="middle">LLM 통합 (신규)</text>
  <text x="710" y="386" font-size="12" fill="#888" text-anchor="middle">OpenAI · Claude</text>
  <text x="710" y="404" font-size="12" fill="#888" text-anchor="middle">Vector DB 연동</text>

  <!-- Lines from Framework to others -->
  <line x1="170" y1="152" x2="170" y2="184" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="440" y1="152" x2="440" y2="184" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="710" y1="152" x2="710" y2="184" stroke="#e0c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="170" y1="284" x2="170" y2="320" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="440" y1="284" x2="440" y2="320" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="710" y1="284" x2="710" y2="320" stroke="#cc77cc" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Summary bar -->
  <rect x="60" y="444" width="760" height="52" fill="#0e0e0e" rx="8" stroke="#222" stroke-width="1"/>
  <text x="440" y="466" font-size="13" fill="#888" text-anchor="middle">Spring Boot = Spring Framework + 자동 구성 + 스타터 (가장 많이 쓰이는 진입점)</text>
  <text x="440" y="484" font-size="13" fill="#7ec8e3" text-anchor="middle">실무에서는 Boot 위에 Data · Security · Cloud 등을 조합해서 사용</text>

  <!-- Footer -->
  <text x="440" y="536" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #3 · Chapter 1</text>
</svg>
