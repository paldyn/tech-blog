  <text x="80" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Visual Line(V) + d로 블록 선택 이동도 가능. nano: Ctrl+K → Ctrl+U로 잘라내기·붙여넣기</text>
