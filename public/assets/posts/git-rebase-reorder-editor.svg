  <!-- Tips -->
  <rect x="60" y="345" width="760" height="80" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
