  <line x1="406" y1="225" x2="438" y2="225" stroke="#7777cc" stroke-width="2"/>
  <line x1="438" y1="155" x2="438" y2="230" stroke="#7777cc" stroke-width="2"/>
  <line x1="438" y1="155" x2="468" y2="155" stroke="#7777cc" stroke-width="2" marker-end="url(#arrp)"/>

  <defs>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7"
