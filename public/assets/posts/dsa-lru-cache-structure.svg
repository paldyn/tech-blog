<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LRU 캐시 내부 구조</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">HashMap + 이중 연결 리스트 — 모든 연산 O(1)</text>

    <!-- HashMap section (left) -->
    <text x="190" y="100" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">HashMap (key → node)</text>
    <rect x="60" y="112" width="260" height="200" fill="#0d1520" stroke="#2a3a5e" stroke-width="1" rx="6"/>

    <!-- HashMap entries -->
    <text x="100" y="140" font-size="13" fill="#888">key</text>
    <text x="260" y="140" font-size="13" fill="#888" text-anchor="end">→ node 포인터</text>
    <line x1="80" y1="148" x2="300" y2="148" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="100" y="170" font-size="13" fill="#e8e8e8">"a"</text>
    <text x="260" y="170" font-size="13" fill="#7ec8e3" text-anchor="end">→ node_a</text>
    <line x1="80" y1="178" x2="300" y2="178" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="100" y="200" font-size="13" fill="#e8e8e8">"b"</text>
    <text x="260" y="200" font-size="13" fill="#7ec8e3" text-anchor="end">→ node_b</text>
    <line x1="80" y1="208" x2="300" y2="208" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="100" y="230" font-size="13" fill="#e8e8e8">"c"</text>
    <text x="260" y="230" font-size="13" fill="#7ec8e3" text-anchor="end">→ node_c</text>
    <line x1="80" y1="238" x2="300" y2="238" stroke="#2a3a5e" stroke-width="0.5"/>

    <text x="190" y="294" font-size="12" fill="#555" text-anchor="middle">O(1) 노드 접근</text>

    <!-- DLL section (right) -->
    <text x="620" y="100" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">이중 연결 리스트 (MRU → LRU)</text>

    <!-- HEAD sentinel -->
    <rect x="395" y="112" width="70" height="46" fill="#1a1a2e" stroke="#555" stroke-width="1" rx="4"/>
    <text x="430" y="131" font-size="11" fill="#555" text-anchor="middle">HEAD</text>
    <text x="430" y="147" font-size="10" fill="#555" text-anchor="middle">(sentinel)</text>

    <!-- node_a (MRU) -->
    <rect x="490" y="112" width="80" height="46" fill="#1a2544" stroke="#7ec8e3" stroke-width="1.5" rx="4"/>
    <text x="530" y="131" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">a: 100</text>
    <text x="530" y="148" font-size="10" fill="#888" text-anchor="middle">MRU</text>

    <!-- node_b -->
    <rect x="598" y="112" width="80" height="46" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="638" y="131" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">b: 200</text>
    <text x="638" y="148" font-size="10" fill="#888" text-anchor="middle"> </text>

    <!-- node_c (LRU) -->
    <rect x="706" y="112" width="80" height="46" fill="#2a1010" stroke="#e05555" stroke-width="1.5" rx="4"/>
    <text x="746" y="131" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">c: 300</text>
    <text x="746" y="148" font-size="10" fill="#e05555" text-anchor="middle">LRU</text>

    <!-- TAIL sentinel -->
    <rect x="814" y="112" width="50" height="46" fill="#1a1a2e" stroke="#555" stroke-width="1" rx="4"/>
    <text x="839" y="131" font-size="11" fill="#555" text-anchor="middle">TAIL</text>
    <text x="839" y="147" font-size="10" fill="#555" text-anchor="middle">(sentinel)</text>

    <!-- Forward arrows -->
    <line x1="465" y1="135" x2="488" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="570" y1="135" x2="596" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="678" y1="135" x2="704" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="786" y1="135" x2="812" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Backward arrows (lower) -->
    <line x1="570" y1="148" x2="492" y2="148" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="678" y1="148" x2="600" y2="148" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="786" y1="148" x2="708" y2="148" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- HashMap arrows pointing to DLL nodes -->
    <path d="M 320 170 Q 400 170 490 135" fill="none" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
    <path d="M 320 200 Q 500 190 598 135" fill="none" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
    <path d="M 320 230 Q 600 215 706 135" fill="none" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

    <!-- Operations explanation -->
    <line x1="60" y1="330" x2="820" y2="330" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>

    <text x="440" y="360" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 연산</text>

    <rect x="60" y="372" width="235" height="80" fill="#0d1520" stroke="#55c555" stroke-width="1" rx="6"/>
    <text x="177" y="394" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">get(key)</text>
    <text x="177" y="414" font-size="12" fill="#888" text-anchor="middle">① 맵에서 노드 찾기 O(1)</text>
    <text x="177" y="432" font-size="12" fill="#888" text-anchor="middle">② 노드를 MRU 위치로 이동</text>

    <rect x="322" y="372" width="235" height="80" fill="#0d1520" stroke="#7ec8e3" stroke-width="1" rx="6"/>
    <text x="439" y="394" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">put(key, val)</text>
    <text x="439" y="414" font-size="12" fill="#888" text-anchor="middle">① 존재 시: 값 갱신 + MRU</text>
    <text x="439" y="432" font-size="12" fill="#888" text-anchor="middle">② 용량 초과 시: LRU 제거</text>

    <rect x="584" y="372" width="235" height="80" fill="#2a1010" stroke="#e05555" stroke-width="1" rx="6"/>
    <text x="701" y="394" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">evict (용량 초과)</text>
    <text x="701" y="414" font-size="12" fill="#888" text-anchor="middle">① TAIL 이전 노드 제거</text>
    <text x="701" y="432" font-size="12" fill="#888" text-anchor="middle">② 맵에서도 삭제</text>
  </g>
</svg>
