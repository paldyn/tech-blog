<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr-up" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-ok" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-err" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메서드 오버라이딩 규칙</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">자식 클래스에서 부모 메서드를 재정의할 때 지켜야 할 5가지 규칙</text>

  <!-- Rule cards: 5 rules in a 3+2 grid -->

  <!-- Rule 1 -->
  <rect x="60" y="96" width="240" height="104" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">① 메서드 시그니처 동일</text>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">이름, 매개변수 타입·개수,</text>
  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">순서가 부모와 정확히 일치</text>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">다르면 오버로딩(overloading)</text>

  <!-- Rule 2 -->
  <rect x="320" y="96" width="240" height="104" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="340" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">② 반환 타입 동일 또는 공변</text>
  <text x="340" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">부모 반환 타입과 같거나,</text>
  <text x="340" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">그 서브타입(공변 반환)이어야 함</text>
  <text x="340" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Number → Integer 허용</text>

  <!-- Rule 3 -->
  <rect x="580" y="96" width="240" height="104" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">③ 접근 제어자 같거나 완화</text>
  <text x="600" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">부모보다 좁아질 수 없다</text>
  <text x="600" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">protected → public 허용</text>
  <text x="600" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">public → protected 금지</text>

  <!-- Rule 4 -->
  <rect x="190" y="224" width="240" height="104" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="210" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">④ 예외는 좁아지거나 동일</text>
  <text x="210" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">부모보다 넓은 checked 예외</text>
  <text x="210" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">선언 금지</text>
  <text x="210" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">unchecked 예외는 제한 없음</text>

  <!-- Rule 5 -->
  <rect x="450" y="224" width="240" height="104" rx="8" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="470" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">⑤ static·private·final 불가</text>
  <text x="470" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">static 메서드는 오버라이딩이</text>
  <text x="470" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">아니라 메서드 히딩(hiding)</text>
  <text x="470" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">final 메서드는 재정의 불가</text>

  <!-- Divider -->
  <line x1="60" y1="355" x2="820" y2="355" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>

  <!-- @Override annotation explanation -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">@Override 애노테이션을 반드시 붙여야 하는 이유</text>

  <!-- Three benefit boxes -->
  <rect x="60" y="400" width="230" height="120" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">컴파일 타임 검증</text>
  <text x="175" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">시그니처가 틀리면</text>
  <text x="175" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">즉시 컴파일 에러 발생</text>
  <text x="175" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">오버라이드 의도 보호</text>
  <text x="175" y="504" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(오타·파라미터 실수 방지)</text>

  <rect x="325" y="400" width="230" height="120" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">가독성 향상</text>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">이 메서드가 재정의임을</text>
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">독자에게 명확히 전달</text>
  <text x="440" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">코드 리뷰·유지보수에서</text>
  <text x="440" y="504" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빠른 의도 파악 가능</text>

  <rect x="590" y="400" width="230" height="120" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">IDE 지원 강화</text>
  <text x="705" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">부모 메서드로 이동·</text>
  <text x="705" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">참조 추적 자동 지원</text>
  <text x="705" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리팩터링 시 안전성 확보</text>
  <text x="705" y="504" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(부모 변경 감지 즉시 알림)</text>

  <text x="440" y="545" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">@Override는 선택이 아닌 관례 — 체크스타일·PMD 등 린터도 필수로 강제한다</text>
</svg>
