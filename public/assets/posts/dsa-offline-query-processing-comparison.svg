<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr-b" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12 Z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">온라인 vs 오프라인 쿼리 처리</text>

  <!-- Online Column Header -->
  <rect x="60" y="62" width="360" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="90" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">온라인 (Online)</text>

  <!-- Offline Column Header -->
  <rect x="460" y="62" width="360" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">오프라인 (Offline)</text>

  <!-- Online: queries come one by one -->
  <!-- Query 1 -->
  <rect x="60" y="122" width="200" height="36" rx="5" fill="#1a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="145" font-size="13" fill="#e8e8e8" text-anchor="middle">Q1: [2, 7] 도착</text>
  <line x1="270" y1="140" x2="398" y2="140" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <rect x="310" y="122" width="110" height="36" rx="5" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="365" y="145" font-size="13" fill="#e05555" text-anchor="middle">즉시 응답</text>

  <!-- Query 2 -->
  <rect x="60" y="170" width="200" height="36" rx="5" fill="#1a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="193" font-size="13" fill="#e8e8e8" text-anchor="middle">Q2: [1, 5] 도착</text>
  <line x1="270" y1="188" x2="398" y2="188" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <rect x="310" y="170" width="110" height="36" rx="5" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="365" y="193" font-size="13" fill="#e05555" text-anchor="middle">즉시 응답</text>

  <!-- Query 3 -->
  <rect x="60" y="218" width="200" height="36" rx="5" fill="#1a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="241" font-size="13" fill="#e8e8e8" text-anchor="middle">Q3: [3, 9] 도착</text>
  <line x1="270" y1="236" x2="398" y2="236" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <rect x="310" y="218" width="110" height="36" rx="5" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="365" y="241" font-size="13" fill="#e05555" text-anchor="middle">즉시 응답</text>

  <!-- Online complexity -->
  <rect x="60" y="272" width="360" height="44" rx="5" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="290" font-size="12" fill="#888" text-anchor="middle">각 쿼리를 독립적으로 처리</text>
  <text x="240" y="308" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">복잡도: O(Q * N) 또는 O(Q * log N)</text>

  <!-- Offline: collect all first -->
  <!-- Collect phase -->
  <rect x="460" y="122" width="200" height="36" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="560" y="145" font-size="13" fill="#888" text-anchor="middle">Q1: [2, 7] 수집</text>

  <rect x="460" y="164" width="200" height="36" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="560" y="187" font-size="13" fill="#888" text-anchor="middle">Q2: [1, 5] 수집</text>

  <rect x="460" y="206" width="200" height="36" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="560" y="229" font-size="13" fill="#888" text-anchor="middle">Q3: [3, 9] 수집</text>

  <!-- Down arrow to sort -->
  <line x1="560" y1="248" x2="560" y2="268" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Sort + Batch process -->
  <rect x="460" y="272" width="200" height="36" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="560" y="290" font-size="12" fill="#55c555" text-anchor="middle">블록 기준 정렬</text>
  <text x="560" y="306" font-size="12" fill="#55c555" text-anchor="middle">Q2 - Q1 - Q3 순서</text>

  <!-- Arrow to answers -->
  <line x1="670" y1="160" x2="700" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="702" y="122" width="118" height="194" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="761" y="149" font-size="13" fill="#e8e8e8" text-anchor="middle">최적 순서로</text>
  <text x="761" y="168" font-size="13" fill="#e8e8e8" text-anchor="middle">일괄 처리</text>
  <text x="761" y="200" font-size="13" fill="#55c555" text-anchor="middle">ans[Q2]</text>
  <text x="761" y="222" font-size="13" fill="#55c555" text-anchor="middle">ans[Q1]</text>
  <text x="761" y="244" font-size="13" fill="#55c555" text-anchor="middle">ans[Q3]</text>
  <text x="761" y="278" font-size="11" fill="#888" text-anchor="middle">인덱스 복원</text>
  <text x="761" y="296" font-size="11" fill="#888" text-anchor="middle">후 반환</text>

  <!-- Offline complexity -->
  <rect x="460" y="326" width="360" height="44" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="344" font-size="12" fill="#888" text-anchor="middle">쿼리 전체를 미리 파악, 최적 순서 처리</text>
  <text x="640" y="362" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">복잡도: O((N+Q) * sqrt(N))</text>

  <!-- Bottom comparison -->
  <rect x="60" y="392" width="760" height="96" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="414" font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">비교 요약</text>

  <text x="240" y="440" font-size="13" fill="#e05555" text-anchor="middle">온라인: 이전 답을 다음 쿼리에 활용</text>
  <text x="240" y="460" font-size="13" fill="#888" text-anchor="middle">암호화된 쿼리, 실시간 처리 필요 시</text>
  <text x="240" y="478" font-size="12" fill="#888" text-anchor="middle">세그먼트 트리, BIT 등 사용</text>

  <line x1="440" y1="408" x2="440" y2="484" stroke="#3a4a6e" stroke-width="1"/>

  <text x="640" y="440" font-size="13" fill="#55c555" text-anchor="middle">오프라인: 모든 쿼리 수집 후 최적화</text>
  <text x="640" y="460" font-size="13" fill="#888" text-anchor="middle">정적 데이터, 배치 처리 가능 시</text>
  <text x="640" y="478" font-size="12" fill="#888" text-anchor="middle">Mo's, 분할정복, 이벤트 정렬</text>
</svg>
