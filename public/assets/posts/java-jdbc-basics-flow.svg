<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="jfArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JDBC 한 번의 조회 — 다섯 단계</text>

  <!-- step 1 -->
  <rect x="60" y="88" width="760" height="52" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">1. Connection 획득</text>
  <text x="280" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">DriverManager.getConnection(url, user, pw)</text>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB 연결</text>

  <line x1="440" y1="140" x2="440" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#jfArr)"/>

  <!-- step 2 -->
  <rect x="60" y="166" width="760" height="52" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">2. Statement 생성</text>
  <text x="280" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">conn.prepareStatement(sql)</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SQL 준비</text>

  <line x1="440" y1="218" x2="440" y2="238" stroke="#55c555" stroke-width="2" marker-end="url(#jfArr)"/>

  <!-- step 3 -->
  <rect x="60" y="244" width="760" height="52" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">3. 실행</text>
  <text x="280" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">stmt.executeQuery() / executeUpdate()</text>
  <text x="80" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB에 전송</text>

  <line x1="440" y1="296" x2="440" y2="316" stroke="#55c555" stroke-width="2" marker-end="url(#jfArr)"/>

  <!-- step 4 -->
  <rect x="60" y="322" width="760" height="52" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">4. ResultSet 처리</text>
  <text x="280" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">while (rs.next()) { rs.getString(...) }</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">5. close — try-with-resources로 자동 정리</text>
</svg>
