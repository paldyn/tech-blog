<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">SQL 표준 격리 수준 4단계</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">허용 이상 현상과 동시성 수준의 트레이드오프</text>

  <!-- Table header -->
  <rect x="50" y="86" width="780" height="32" rx="4" fill="#1a2233"/>
  <text x="190" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">격리 수준</text>
  <text x="390" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Dirty Read</text>
  <text x="540" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Non-Repeatable</text>
  <text x="700" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Phantom Read</text>

  <!-- Row 1: READ UNCOMMITTED -->
  <rect x="50" y="118" width="780" height="50" fill="#111118"/>
  <text x="190" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">READ UNCOMMITTED</text>
  <rect x="360" y="130" width="60" height="26" rx="4" fill="#2a1010"/>
  <text x="390" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">허용</text>
  <rect x="510" y="130" width="60" height="26" rx="4" fill="#2a1010"/>
  <text x="540" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">허용</text>
  <rect x="670" y="130" width="60" height="26" rx="4" fill="#2a1010"/>
  <text x="700" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">허용</text>

  <!-- Row 2: READ COMMITTED -->
  <rect x="50" y="168" width="780" height="50" fill="#0d0d14"/>
  <text x="190" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a020">READ COMMITTED</text>
  <rect x="360" y="180" width="60" height="26" rx="4" fill="#0f1a0f"/>
  <text x="390" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">방지</text>
  <rect x="510" y="180" width="60" height="26" rx="4" fill="#2a1010"/>
  <text x="540" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">허용</text>
  <rect x="670" y="180" width="60" height="26" rx="4" fill="#2a1010"/>
  <text x="700" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">허용</text>

  <!-- Row 3: REPEATABLE READ -->
  <rect x="50" y="218" width="780" height="50" fill="#111118"/>
  <text x="190" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">REPEATABLE READ</text>
  <rect x="360" y="230" width="60" height="26" rx="4" fill="#0f1a0f"/>
  <text x="390" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">방지</text>
  <rect x="510" y="230" width="60" height="26" rx="4" fill="#0f1a0f"/>
  <text x="540" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">방지</text>
  <rect x="670" y="230" width="60" height="26" rx="4" fill="#2a1010"/>
  <text x="700" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">허용*</text>

  <!-- Row 4: SERIALIZABLE -->
  <rect x="50" y="268" width="780" height="50" fill="#0d0d14"/>
  <text x="190" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">SERIALIZABLE</text>
  <rect x="360" y="280" width="60" height="26" rx="4" fill="#0f1a0f"/>
  <text x="390" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">방지</text>
  <rect x="510" y="280" width="60" height="26" rx="4" fill="#0f1a0f"/>
  <text x="540" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">방지</text>
  <rect x="670" y="280" width="60" height="26" rx="4" fill="#0f1a0f"/>
  <text x="700" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">방지</text>

  <rect x="50" y="118" width="780" height="200" fill="none" stroke="#222" stroke-width="1"/>

  <!-- Performance arrow -->
  <line x1="50" y1="340" x2="830" y2="340" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="826,335 834,340 826,345" fill="#55c555"/>
  <text x="50" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">동시성 ↑ (성능 높음)</text>
  <text x="700" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">안전성 ↑ (성능 낮음)</text>

  <!-- Notes -->
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">* InnoDB REPEATABLE READ는 MVCC로 Phantom Read를 대부분 방지 (but SELECT ... FOR UPDATE/SHARE는 예외)</text>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PostgreSQL 기본: READ COMMITTED | MySQL InnoDB 기본: REPEATABLE READ | Oracle 기본: READ COMMITTED</text>
</svg>
