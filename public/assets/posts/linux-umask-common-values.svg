<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">자주 쓰는 umask 값과 용도</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">환경별 권장 umask 설정</text>

  <!-- Table header -->
  <rect x="60" y="84" width="760" height="34" rx="6" fill="#141622"/>
  <text x="120" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#888">umask</text>
  <text x="240" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">파일 결과</text>
  <text x="380" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">디렉터리 결과</text>
  <text x="560" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#888">적합한 환경</text>
  <text x="750" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#888">보안 수준</text>

  <!-- Rows -->
  <rect x="60" y="118" width="760" height="36" fill="#0e1018"/>
  <text x="120" y="141" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">022</text>
  <text x="240" y="141" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">644 rw-r--r--</text>
  <text x="380" y="141" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">755 rwxr-xr-x</text>
  <text x="560" y="141" text-anchor="middle" font-size="13" fill="#888">일반 사용자 (기본값)</text>
  <text x="750" y="141" text-anchor="middle" font-size="13" fill="#7ec8e3">보통</text>

  <rect x="60" y="154" width="760" height="36" fill="#0a0a0a"/>
  <text x="120" y="177" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">027</text>
  <text x="240" y="177" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">640 rw-r-----</text>
  <text x="380" y="177" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">750 rwxr-x---</text>
  <text x="560" y="177" text-anchor="middle" font-size="13" fill="#888">서버 공유 환경</text>
  <text x="750" y="177" text-anchor="middle" font-size="13" fill="#55c555">높음</text>

  <rect x="60" y="190" width="760" height="36" fill="#0e1018"/>
  <text x="120" y="213" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">077</text>
  <text x="240" y="213" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">600 rw-------</text>
  <text x="380" y="213" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">700 rwx------</text>
  <text x="560" y="213" text-anchor="middle" font-size="13" fill="#888">보안 민감 환경 (root)</text>
  <text x="750" y="213" text-anchor="middle" font-size="13" fill="#55c555">매우 높음</text>

  <rect x="60" y="226" width="760" height="36" fill="#0a0a0a"/>
  <text x="120" y="249" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">002</text>
  <text x="240" y="249" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">664 rw-rw-r--</text>
  <text x="380" y="249" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">775 rwxrwxr-x</text>
  <text x="560" y="249" text-anchor="middle" font-size="13" fill="#888">그룹 협업 디렉터리</text>
  <text x="750" y="249" text-anchor="middle" font-size="13" fill="#7ec8e3">낮음</text>

  <rect x="60" y="262" width="760" height="36" fill="#0e1018"/>
  <text x="120" y="285" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">000</text>
  <text x="240" y="285" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">666 rw-rw-rw-</text>
  <text x="380" y="285" text-anchor="middle" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">777 rwxrwxrwx</text>
  <text x="560" y="285" text-anchor="middle" font-size="13" fill="#e05555">격리된 개발 환경</text>
  <text x="750" y="285" text-anchor="middle" font-size="13" fill="#e05555">매우 낮음</text>

  <!-- Border -->
  <rect x="60" y="84" width="760" height="214" rx="6" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- umask persistence note -->
  <rect x="60" y="312" width="760" height="34" rx="6" fill="#0e1018" stroke="#1e2433"/>
  <text x="76" y="328" font-size="13" fill="#888">📁 영구 설정:</text>
  <text x="176" y="328" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">~/.bashrc, /etc/profile, /etc/login.defs (UMASK 항목)</text>
  <text x="76" y="342" font-size="13" fill="#888">🔄 임시 설정:</text>
  <text x="176" y="342" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">umask 027</text>
  <text x="254" y="342" font-size="13" fill="#888">(현재 셸 세션에만 적용)</text>
</svg>
