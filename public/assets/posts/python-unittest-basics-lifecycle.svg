<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">테스트 메서드의 생명주기</text>

  <defs>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="110" width="200" height="70" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="142" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">setUp()</text>
  <text x="160" y="164" font-size="12" fill="#888" text-anchor="middle">준비물 생성</text>

  <rect x="340" y="110" width="200" height="70" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="142" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">test_xxx()</text>
  <text x="440" y="164" font-size="12" fill="#888" text-anchor="middle">실제 검증</text>

  <rect x="620" y="110" width="200" height="70" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="720" y="142" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">tearDown()</text>
  <text x="720" y="164" font-size="12" fill="#888" text-anchor="middle">뒷정리</text>

  <line x1="260" y1="145" x2="334" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="540" y1="145" x2="614" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr2)"/>

  <text x="60" y="232" font-size="13" fill="#888" xml:space="preserve">테스트 메서드 하나마다 이 세 단계가 통째로 반복된다.</text>
  <text x="60" y="258" font-size="13" fill="#888" xml:space="preserve">덕분에 각 테스트는 깨끗한 상태에서 서로 간섭 없이 실행된다.</text>
</svg>
