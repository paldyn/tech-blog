<svg xmlns="http://www.w3.org/2000/svg" width="880" height="660" viewBox="0 0 880 660" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="660" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">EJB의 한계 vs 스프링 POJO 철학</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">컨테이너 종속 코드에서 비침투적 자바 객체로</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- ====== Left: EJB ====== -->
  <rect x="60" y="96" width="370" height="500" fill="#10090a" stroke="#3a1a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="96" width="370" height="44" fill="#1a0d0e" rx="10"/>
  <rect x="60" y="128" width="370" height="12" fill="#1a0d0e"/>
  <text x="84" y="124" font-size="16" font-weight="600" fill="#e05555">EJB (Enterprise JavaBeans)</text>
  <text x="406" y="124" text-anchor="end" font-size="11" fill="#666">2003 이전</text>

  <!-- code rect: x=84, w=322, y=160, h=234 -->
  <rect x="84" y="160" width="322" height="234" fill="#070b14" stroke="#1e2433" rx="6"/>
  <!-- base x=100 (84+16). first y=160+14+12=186. line-height 18 -->
  <text x="100" y="186" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Session Bean — 컨테이너 종속</text>
  <text x="100" y="204" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Stateless</text>
  <text x="100" y="222" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@TransactionAttribute(REQUIRED)</text>
  <text x="100" y="240" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">public class OrderEJB</text>
  <text x="114" y="258" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">implements OrderRemote,</text>
  <text x="128" y="276" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">OrderLocal {</text>
  <text x="114" y="294" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@EJB</text>
  <text x="114" y="312" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">private DataSource ds;</text>
  <text x="114" y="330" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">public void place() {</text>
  <text x="128" y="348" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// ejb-jar.xml 필요</text>
  <text x="114" y="366" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="100" y="384" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- pain points: starts y=424 -->
  <text x="84" y="424" font-size="13" fill="#888">한계</text>
  <text x="100" y="448" font-size="13" fill="#e05555">×</text>
  <text x="120" y="448" font-size="13" fill="#bbbbbb">컨테이너 없이 단위 테스트 불가</text>
  <text x="100" y="472" font-size="13" fill="#e05555">×</text>
  <text x="120" y="472" font-size="13" fill="#bbbbbb">배포 서술자(XML) 수백 줄</text>
  <text x="100" y="496" font-size="13" fill="#e05555">×</text>
  <text x="120" y="496" font-size="13" fill="#bbbbbb">인터페이스 강제 상속</text>
  <text x="100" y="520" font-size="13" fill="#e05555">×</text>
  <text x="120" y="520" font-size="13" fill="#bbbbbb">WAS 벤더에 강하게 결합</text>
  <text x="100" y="544" font-size="13" fill="#e05555">×</text>
  <text x="120" y="544" font-size="13" fill="#bbbbbb">기술 코드와 비즈니스 코드 혼재</text>
  <text x="100" y="568" font-size="13" fill="#e05555">×</text>
  <text x="120" y="568" font-size="13" fill="#bbbbbb">느린 시작, 높은 학습 비용</text>

  <!-- evolution chevron (double chevron emphasizes direction) -->
  <path d="M 432 320 L 446 340 L 432 360" fill="none" stroke="#7777cc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 432 332 L 442 340 L 432 348" fill="none" stroke="#7777cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- ====== Right: Spring POJO ====== -->
  <rect x="450" y="96" width="370" height="500" fill="#091309" stroke="#1a3a1a" stroke-width="1.5" rx="10"/>
  <rect x="450" y="96" width="370" height="44" fill="#0d1d0d" rx="10"/>
  <rect x="450" y="128" width="370" height="12" fill="#0d1d0d"/>
  <text x="474" y="124" font-size="16" font-weight="600" fill="#55c555">Spring (POJO 철학)</text>
  <text x="796" y="124" text-anchor="end" font-size="11" fill="#666">2003 이후</text>

  <rect x="474" y="160" width="322" height="234" fill="#070b14" stroke="#1e2433" rx="6"/>
  <!-- base x=490 -->
  <text x="490" y="186" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 평범한 자바 클래스 (POJO)</text>
  <text x="490" y="204" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Service</text>
  <text x="490" y="222" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">public class OrderService {</text>
  <text x="504" y="240" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 생성자 주입</text>
  <text x="504" y="258" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">private final OrderRepo repo;</text>
  <text x="490" y="276" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"> </text>
  <text x="504" y="294" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">public OrderService(</text>
  <text x="518" y="312" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">OrderRepo repo) {</text>
  <text x="518" y="330" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">this.repo = repo;</text>
  <text x="504" y="348" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="504" y="366" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 프레임워크 무관</text>
  <text x="490" y="384" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <text x="474" y="424" font-size="13" fill="#888">장점</text>
  <text x="490" y="448" font-size="13" fill="#55c555">✓</text>
  <text x="510" y="448" font-size="13" fill="#bbbbbb">생성자에 mock 주입 — 즉시 테스트</text>
  <text x="490" y="472" font-size="13" fill="#55c555">✓</text>
  <text x="510" y="472" font-size="13" fill="#bbbbbb">프레임워크 클래스 상속 불필요</text>
  <text x="490" y="496" font-size="13" fill="#55c555">✓</text>
  <text x="510" y="496" font-size="13" fill="#bbbbbb">WAS 없이 로컬에서 실행</text>
  <text x="490" y="520" font-size="13" fill="#55c555">✓</text>
  <text x="510" y="520" font-size="13" fill="#bbbbbb">애노테이션으로 간결한 설정</text>
  <text x="490" y="544" font-size="13" fill="#55c555">✓</text>
  <text x="510" y="544" font-size="13" fill="#bbbbbb">비침투적(Non-invasive) 설계</text>
  <text x="490" y="568" font-size="13" fill="#55c555">✓</text>
  <text x="510" y="568" font-size="13" fill="#bbbbbb">비즈니스 로직만 순수 자바로</text>

  <text x="440" y="630" text-anchor="middle" font-size="11" fill="#444">POJO = Plain Old Java Object · 스프링 핵심 철학: "비즈니스 로직은 순수 자바로"</text>
</svg>
