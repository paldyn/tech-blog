<svg xmlns="http://www.w3.org/2000/svg" width="880" height="640" viewBox="0 0 880 640" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="640" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">EJB의 한계 vs 스프링 POJO 철학</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- ====== EJB Side ====== -->
  <rect x="60" y="84" width="370" height="490" fill="#0f0f0f" stroke="#3a1a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="84" width="370" height="44" fill="#1e1010" rx="10"/>
  <rect x="60" y="116" width="370" height="12" fill="#1e1010"/>
  <text x="245" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#e05555">EJB (Enterprise JavaBeans)</text>

  <!-- EJB code block: 12 lines, line-height 18, padding 16/14 -->
  <rect x="84" y="148" width="322" height="248" fill="#070b14" stroke="#1e2433" rx="6"/>
  <!-- code base x = 100 (84 + 16 padding); first y = 148 + 14 + 12 = 174 -->
  <text x="100" y="174" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Session Bean</text>
  <text x="100" y="192" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Stateless</text>
  <text x="100" y="210" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@TransactionAttribute(REQUIRED)</text>
  <text x="100" y="228" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">public class OrderEJB</text>
  <text x="100" y="246" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    implements OrderRemote,</text>
  <text x="100" y="264" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">               OrderLocal {</text>
  <text x="100" y="282" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    // 컨테이너 종속</text>
  <text x="100" y="300" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    @EJB</text>
  <text x="100" y="318" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    private DataSource ds;</text>
  <text x="100" y="336" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    public void place() {</text>
  <text x="100" y="354" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">        // ejb-jar.xml 필요</text>
  <text x="100" y="372" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    }</text>

  <!-- EJB pain points -->
  <text x="84" y="430" font-size="13" fill="#e05555">x</text>
  <text x="100" y="430" font-size="13" fill="#bbbbbb">컨테이너 없이 단위 테스트 불가</text>
  <text x="84" y="454" font-size="13" fill="#e05555">x</text>
  <text x="100" y="454" font-size="13" fill="#bbbbbb">배포 서술자(XML) 수백 줄</text>
  <text x="84" y="478" font-size="13" fill="#e05555">x</text>
  <text x="100" y="478" font-size="13" fill="#bbbbbb">인터페이스 강제 상속</text>
  <text x="84" y="502" font-size="13" fill="#e05555">x</text>
  <text x="100" y="502" font-size="13" fill="#bbbbbb">느린 시작, 높은 학습 비용</text>
  <text x="84" y="526" font-size="13" fill="#e05555">x</text>
  <text x="100" y="526" font-size="13" fill="#bbbbbb">WAS 벤더에 강하게 결합</text>
  <text x="84" y="550" font-size="13" fill="#e05555">x</text>
  <text x="100" y="550" font-size="13" fill="#bbbbbb">기술 코드와 비즈니스 코드 혼재</text>

  <!-- Center arrow -->
  <line x1="438" y1="320" x2="442" y2="320" stroke="transparent"/>
  <text x="440" y="316" text-anchor="middle" font-size="11" fill="#888">진화</text>
  <line x1="430" y1="328" x2="450" y2="328" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ====== Spring Side ====== -->
  <rect x="450" y="84" width="370" height="490" fill="#0f0f0f" stroke="#1a3a1a" stroke-width="1.5" rx="10"/>
  <rect x="450" y="84" width="370" height="44" fill="#101e10" rx="10"/>
  <rect x="450" y="116" width="370" height="12" fill="#101e10"/>
  <text x="635" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#55c555">Spring (POJO 철학)</text>

  <!-- Spring code block -->
  <rect x="474" y="148" width="322" height="248" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="490" y="174" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 평범한 자바 클래스</text>
  <text x="490" y="192" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Service</text>
  <text x="490" y="210" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">public class OrderService {</text>
  <text x="490" y="228" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    // 생성자 주입</text>
  <text x="490" y="246" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    private final OrderRepo r;</text>
  <text x="490" y="264" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"> </text>
  <text x="490" y="282" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    public OrderService(</text>
  <text x="490" y="300" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">            OrderRepo r) {</text>
  <text x="490" y="318" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">        this.r = r;</text>
  <text x="490" y="336" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    }</text>
  <text x="490" y="354" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    // 프레임워크 무관</text>
  <text x="490" y="372" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Spring benefits -->
  <text x="474" y="430" font-size="13" fill="#55c555">v</text>
  <text x="490" y="430" font-size="13" fill="#bbbbbb">new OrderService(mock) — 즉시 테스트</text>
  <text x="474" y="454" font-size="13" fill="#55c555">v</text>
  <text x="490" y="454" font-size="13" fill="#bbbbbb">프레임워크 클래스 상속 불필요</text>
  <text x="474" y="478" font-size="13" fill="#55c555">v</text>
  <text x="490" y="478" font-size="13" fill="#bbbbbb">WAS 없이 로컬에서 실행</text>
  <text x="474" y="502" font-size="13" fill="#55c555">v</text>
  <text x="490" y="502" font-size="13" fill="#bbbbbb">애노테이션으로 간결한 설정</text>
  <text x="474" y="526" font-size="13" fill="#55c555">v</text>
  <text x="490" y="526" font-size="13" fill="#bbbbbb">비침투적(Non-invasive) 설계</text>
  <text x="474" y="550" font-size="13" fill="#55c555">v</text>
  <text x="490" y="550" font-size="13" fill="#bbbbbb">비즈니스 로직만 순수 자바로</text>

  <!-- Footer -->
  <text x="440" y="610" text-anchor="middle" font-size="11" fill="#444">POJO = Plain Old Java Object · 스프링 핵심 철학: "비즈니스 로직은 순수 자바로"</text>
</svg>
