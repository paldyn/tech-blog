<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RAG 아키텍처 발전 단계</text>

  <!-- Column 1: Naive RAG -->
  <rect x="40" y="56" width="220" height="340" rx="10" fill="#111520" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="40" y="56" width="220" height="40" rx="10" fill="#7ec8e3"/>
  <rect x="40" y="84" width="220" height="12" fill="#7ec8e3"/>
  <text x="150" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#0a0a0a">Naive RAG</text>

  <!-- Steps -->
  <rect x="72" y="116" width="156" height="36" rx="6" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">① 질문 입력</text>

  <line x1="150" y1="152" x2="150" y2="168" stroke="#444" stroke-width="2"/>
  <polygon points="144,168 150,180 156,168" fill="#444"/>

  <rect x="72" y="180" width="156" height="36" rx="6" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">② 벡터 검색</text>

  <line x1="150" y1="216" x2="150" y2="232" stroke="#444" stroke-width="2"/>
  <polygon points="144,232 150,244 156,232" fill="#444"/>

  <rect x="72" y="244" width="156" height="36" rx="6" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">③ LLM 생성</text>

  <!-- Problems -->
  <rect x="55" y="305" width="190" height="72" rx="6" fill="#1a0e0e" stroke="#e05555" stroke-width="1"/>
  <text x="150" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">한계점</text>
  <text x="150" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">낮은 검색 정밀도</text>
  <text x="150" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">중복 컨텍스트 문제</text>
  <text x="150" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단순 쿼리만 처리</text>

  <!-- Arrow 1→2 -->
  <line x1="268" y1="230" x2="304" y2="230" stroke="#7777cc" stroke-width="2.5"/>
  <polygon points="304,224 320,230 304,236" fill="#7777cc"/>
  <text x="294" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">개선</text>

  <!-- Column 2: Advanced RAG -->
  <rect x="322" y="56" width="220" height="340" rx="10" fill="#111520" stroke="#55c555" stroke-width="1.5"/>
  <rect x="322" y="56" width="220" height="40" rx="10" fill="#55c555"/>
  <rect x="322" y="84" width="220" height="12" fill="#55c555"/>
  <text x="432" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#0a0a0a">Advanced RAG</text>

  <rect x="354" y="108" width="156" height="32" rx="6" fill="#1a1f2e" stroke="#55c555" stroke-width="1"/>
  <text x="432" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">① 쿼리 재작성</text>

  <line x1="432" y1="140" x2="432" y2="154" stroke="#444" stroke-width="2"/>
  <polygon points="426,154 432,164 438,154" fill="#444"/>

  <rect x="354" y="164" width="156" height="32" rx="6" fill="#1a1f2e" stroke="#55c555" stroke-width="1"/>
  <text x="432" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">② 하이브리드 검색</text>

  <line x1="432" y1="196" x2="432" y2="210" stroke="#444" stroke-width="2"/>
  <polygon points="426,210 432,220 438,210" fill="#444"/>

  <rect x="354" y="220" width="156" height="32" rx="6" fill="#1a1f2e" stroke="#55c555" stroke-width="1"/>
  <text x="432" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">③ 재순위(Rerank)</text>

  <line x1="432" y1="252" x2="432" y2="266" stroke="#444" stroke-width="2"/>
  <polygon points="426,266 432,276 438,266" fill="#444"/>

  <rect x="354" y="276" width="156" height="32" rx="6" fill="#1a1f2e" stroke="#55c555" stroke-width="1"/>
  <text x="432" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">④ LLM 생성</text>

  <!-- Improvements -->
  <rect x="337" y="325" width="190" height="52" rx="6" fill="#0e1a0e" stroke="#55c555" stroke-width="1"/>
  <text x="432" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">개선 사항</text>
  <text x="432" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">검색 품질 향상</text>
  <text x="432" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨텍스트 최적화</text>

  <!-- Arrow 2→3 -->
  <line x1="550" y1="230" x2="586" y2="230" stroke="#7777cc" stroke-width="2.5"/>
  <polygon points="586,224 602,230 586,236" fill="#7777cc"/>
  <text x="576" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">확장</text>

  <!-- Column 3: Modular RAG -->
  <rect x="604" y="56" width="236" height="340" rx="10" fill="#111520" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="604" y="56" width="236" height="40" rx="10" fill="#7777cc"/>
  <rect x="604" y="84" width="236" height="12" fill="#7777cc"/>
  <text x="722" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#fff">Modular RAG</text>

  <!-- Modules -->
  <rect x="624" y="108" width="96" height="32" rx="6" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="672" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Router</text>

  <rect x="728" y="108" width="96" height="32" rx="6" fill="#1a1f2e" stroke="#55c555" stroke-width="1"/>
  <text x="776" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Retriever</text>

  <rect x="624" y="156" width="96" height="32" rx="6" fill="#1a1f2e" stroke="#e05555" stroke-width="1"/>
  <text x="672" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Reranker</text>

  <rect x="728" y="156" width="96" height="32" rx="6" fill="#1a1f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="776" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Generator</text>

  <rect x="624" y="204" width="96" height="32" rx="6" fill="#1a1f2e" stroke="#888" stroke-width="1"/>
  <text x="672" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Memory</text>

  <rect x="728" y="204" width="96" height="32" rx="6" fill="#1a1f2e" stroke="#888" stroke-width="1"/>
  <text x="776" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Evaluator</text>

  <text x="722" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">각 모듈 독립적 교체 가능</text>

  <!-- Benefits -->
  <rect x="619" y="285" width="206" height="90" rx="6" fill="#141420" stroke="#7777cc" stroke-width="1"/>
  <text x="722" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">장점</text>
  <text x="722" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">플러그인 방식 구성</text>
  <text x="722" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유연한 워크플로우</text>
  <text x="722" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">최고 성능 달성 가능</text>
  <text x="722" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실무 프로덕션 권장</text>

  <!-- Bottom label -->
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">2020 → 2022 → 2023~현재</text>
</svg>
