<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이미지 지연 로딩 — Intersection Observer</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">뷰포트 진입 시에만 이미지 다운로드 시작</text>

  <!-- Viewport box -->
  <rect x="60" y="96" width="360" height="260" rx="8" fill="#0d0d1f" stroke="#7777cc" stroke-width="2"/>
  <text x="240" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">뷰포트</text>

  <!-- Image 1 (visible - loaded) -->
  <rect x="80" y="132" width="320" height="80" rx="6" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">이미지 1 — 로드됨</text>
  <text x="240" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">src 설정 완료 → 네트워크 요청 발생</text>

  <!-- Image 2 (entering viewport) -->
  <rect x="80" y="226" width="320" height="80" rx="6" fill="#1a2a0d" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="240" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">이미지 2 — 뷰포트 진입 중</text>
  <text x="240" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">data-src → src 교체 트리거</text>

  <!-- Image 3 (below viewport - not loaded) -->
  <rect x="80" y="330" width="320" height="80" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="240" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#555" text-anchor="middle">이미지 3 — 아직 로드 안 됨</text>
  <text x="240" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444" text-anchor="middle">data-src만 있음, src 없음</text>

  <!-- Observer explanation -->
  <rect x="460" y="96" width="360" height="260" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">IntersectionObserver 동작</text>

  <text x="480" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">1. 각 이미지에 옵저버 부착</text>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">2. 뷰포트 교차 감지 (스크롤 이벤트 없음)</text>
  <text x="480" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">3. intersectionRatio > 0 이면:</text>
  <text x="480" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">   img.src = img.dataset.src</text>
  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">4. 옵저버 해제 (observer.unobserve)</text>
  <text x="480" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">주요 옵션:</text>
  <text x="480" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">rootMargin: "200px" → 진입 200px 전에 로드</text>
  <text x="480" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">threshold: 0.1 → 10% 보일 때 트리거</text>
  <text x="480" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">root: null → 기본 뷰포트</text>

  <!-- Code block -->
  <rect x="60" y="380" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> obs = <tspan fill="#7ec8e3" font-weight="600">new</tspan> IntersectionObserver((entries) => {</text>
  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  entries.forEach(e => { <tspan fill="#7ec8e3" font-weight="600">if</tspan> (e.isIntersecting) { e.target.src = e.target.dataset.src; obs.unobserve(e.target); } });</text>
  <text x="76" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}, { rootMargin: <tspan fill="#ce9178">'200px'</tspan> });</text>
  <text x="76" y="458" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">document.querySelectorAll(<tspan fill="#ce9178">'img[data-src]'</tspan>).forEach(img => obs.observe(img));</text>
</svg>
