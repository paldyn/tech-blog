<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">구조화 추출 스키마 설계 패턴</text>

  <!-- Left: simple schema -->
  <text x="220" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">단순 평면 스키마</text>
  <rect x="60" y="82" width="320" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="106" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">class</text>
  <text x="130" y="106" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> Invoice(BaseModel):</text>
  <text x="80" y="125" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    vendor: </text>
  <text x="174" y="125" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">str</text>
  <text x="80" y="144" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    date:   </text>
  <text x="174" y="144" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">str</text>
  <text x="80" y="163" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    total:  </text>
  <text x="174" y="163" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">float</text>
  <text x="80" y="182" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    items:  </text>
  <text x="174" y="182" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">list</text>
  <text x="210" y="182" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">[</text>
  <text x="220" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">]</tspan></text>
  
  <text x="80" y="262" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">→ 빠른 구현, 중첩 정보 손실</text>

  <!-- Right: nested schema -->
  <text x="660" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">중첩 스키마 (권장)</text>
  <rect x="500" y="82" width="320" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="520" y="106" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">class</text>
  <text x="570" y="106" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> LineItem(BaseModel):</text>
  <text x="520" y="125" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    name:  </text>
  <text x="609" y="125" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">str</text>
  <text x="520" y="144" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    amount:</text>
  <text x="609" y="144" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">float</text>
  <text x="520" y="163" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">class</text>
  <text x="570" y="163" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> Invoice(BaseModel):</text>
  <text x="520" y="182" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    items: </text>
  <text x="609" y="182" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">list</text>
  <text x="645" y="182" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">[LineItem]</text>
  <text x="520" y="262" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">→ 정확한 구조, 검증 강화</text>

  <!-- Best practices -->
  <rect x="60" y="322" width="760" height="54" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="344" text-anchor="middle" font-size="13" fill="#e8e8e8">스키마 설계 원칙</text>
  <text x="440" y="362" text-anchor="middle" font-size="12" fill="#888">필드에 Field(description=...) 추가 → LLM이 의미 이해 · Optional 필드로 누락 허용 · 재시도 로직 필수</text>
</svg>
