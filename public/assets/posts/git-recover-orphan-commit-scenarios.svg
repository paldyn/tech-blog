<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">고아 커밋이 만들어지는 대표 시나리오</text>

  <!-- Scenario 1: git reset -->
  <text x="60" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">시나리오 1: git reset --hard HEAD~N</text>
  <rect x="60" y="98" width="380" height="88" rx="8" fill="#0e0e0e" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Before -->
  <circle cx="90" cy="130" r="16" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="90" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">C1</text>
  <line x1="106" y1="130" x2="126" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="146" cy="130" r="16" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="146" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">C2</text>
  <line x1="162" y1="130" x2="182" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="202" cy="130" r="16" fill="#3a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="202" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">C3</text>
  <line x1="218" y1="130" x2="238" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="258" cy="130" r="16" fill="#3a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="258" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">C4</text>

  <!-- After reset -->
  <text x="90" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">reset 후: C3, C4가 고아(dangling)</text>
  <text x="90" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">HEAD → C2 (복구: git reflog → SHA)</text>

  <!-- Scenario 2: interactive rebase -->
  <text x="460" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">시나리오 2: interactive rebase</text>
  <rect x="460" y="98" width="380" height="88" rx="8" fill="#0e0e0e" stroke="#3a3a3a" stroke-width="1"/>
  <text x="476" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원본: A → B → C</text>
  <text x="476" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c84a">squash 후: A → BC (새 커밋)</text>
  <text x="476" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">원본 B, C가 고아 커밋으로 남음</text>
  <text x="476" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">복구: git reflog → 원본 SHA</text>

  <!-- Scenario 3: amend -->
  <text x="60" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">시나리오 3: git commit --amend</text>
  <rect x="60" y="228" width="380" height="88" rx="8" fill="#0e0e0e" stroke="#3a3a3a" stroke-width="1"/>
  <text x="76" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원본 커밋 OldC → 새 커밋 NewC</text>
  <text x="76" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">OldC가 고아 커밋 (ORIG_HEAD에 저장)</text>
  <text x="76" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">복구: git cat-file -p ORIG_HEAD</text>
  <text x="76" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">또는: git checkout -b recovery ORIG_HEAD</text>

  <!-- Scenario 4: detached HEAD -->
  <text x="460" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">시나리오 4: detached HEAD 커밋</text>
  <rect x="460" y="228" width="380" height="88" rx="8" fill="#0e0e0e" stroke="#3a3a3a" stroke-width="1"/>
  <text x="476" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">detached HEAD 상태에서 커밋 생성</text>
  <text x="476" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">checkout하면 ref 없이 고아 상태</text>
  <text x="476" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">복구: git reflog → 해당 커밋 SHA</text>
  <text x="476" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">git checkout -b new-branch &lt;sha&gt;</text>

  <!-- Recovery code -->
  <rect x="60" y="335" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 고아 커밋 전체 목록 확인</text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git reflog --all --date=iso | head -30</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># fsck로 고아 커밋 SHA 목록</text>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fsck --unreachable 2>/dev/null | grep commit</text>
  <text x="76" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 브랜치로 복구</text>
</svg>
