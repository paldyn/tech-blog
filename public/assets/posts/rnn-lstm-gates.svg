<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">LSTM 셀: 세 게이트의 역할</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Forget · Input · Output Gate</text>

  <!-- Cell State (top horizontal flow) -->
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">셀 상태 C_t (장기 기억 고속도로)</text>
  <line x1="60" y1="120" x2="820" y2="120" stroke="#7777cc" stroke-width="3"/>
  <polygon points="818,114 830,120 818,126" fill="#7777cc"/>

  <!-- Forget Gate -->
  <rect x="60" y="180" width="200" height="130" rx="10" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="160" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">Forget Gate</text>
  <text x="160" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">σ([h_{t-1}, x_t])</text>
  <text x="160" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">0에 가까울수록 삭제</text>
  <text x="160" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1에 가까울수록 유지</text>
  <text x="160" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#e05555">f_t</text>
  <!-- Arrow to cell state (×) -->
  <line x1="160" y1="178" x2="160" y2="132" stroke="#e05555" stroke-width="2"/>
  <polygon points="154,132 160,120 166,132" fill="#e05555"/>
  <text x="172" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">×</text>

  <!-- Input Gate -->
  <rect x="340" y="180" width="200" height="130" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Input Gate</text>
  <text x="440" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">i_t = σ([h_{t-1}, x_t])</text>
  <text x="440" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">g_t = tanh([h_{t-1}, x_t])</text>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">새 정보를 얼마나 추가</text>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#55c555">i_t ⊙ g_t</text>
  <!-- Arrow to cell state (+) -->
  <line x1="440" y1="178" x2="440" y2="132" stroke="#55c555" stroke-width="2"/>
  <polygon points="434,132 440,120 446,132" fill="#55c555"/>
  <text x="452" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">+</text>

  <!-- Output Gate -->
  <rect x="620" y="180" width="200" height="130" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="720" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Output Gate</text>
  <text x="720" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">o_t = σ([h_{t-1}, x_t])</text>
  <text x="720" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">h_t = o_t ⊙ tanh(C_t)</text>
  <text x="720" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">외부로 내보낼 정보</text>
  <text x="720" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#7ec8e3">h_t</text>
  <!-- Arrow from cell state -->
  <line x1="720" y1="178" x2="720" y2="132" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="714,132 720,120 726,132" fill="#7ec8e3"/>

  <!-- Input h_{t-1}, x_t labels -->
  <text x="440" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">모든 게이트 입력: [h_{t-1}, x_t] 연결 벡터</text>
  <!-- Horizontal input line -->
  <line x1="60" y1="380" x2="820" y2="380" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="30" y="385" text-anchor="start" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">x_t</text>

  <!-- Summary box -->
  <rect x="60" y="410" width="760" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">핵심: 셀 상태 C_t는 게이트에 의해 선택적으로 업데이트 → 장기 의존성 유지</text>
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C_t = f_t ⊙ C_{t-1} + i_t ⊙ g_t    |    σ(z) = 1/(1+e^{-z}) ∈ (0,1)</text>
</svg>
