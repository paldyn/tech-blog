<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">set -euo pipefail 효과</text>

  <!-- set -e -->
  <rect x="60" y="75" width="360" height="90" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e05555">set -e</text>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">명령이 0이 아닌 값을 반환하면 즉시 종료</text>
  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">if/while 조건, ||, &amp;&amp; 뒤 명령은 제외</text>

  <!-- set -u -->
  <rect x="60" y="185" width="360" height="90" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e05555">set -u</text>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">미설정 변수 참조 시 오류로 종료</text>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">$@ · $* · $# 배열은 예외 (빈값 허용)</text>

  <!-- set -o pipefail -->
  <rect x="60" y="295" width="360" height="90" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e05555">set -o pipefail</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">파이프라인 내 어느 명령이 실패해도 전체 실패</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">기본값: 마지막 명령 반환값만 반영</text>

  <!-- Right: combined effect -->
  <rect x="460" y="75" width="360" height="310" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">함께 사용 예시</text>
  <text x="480" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8">#!/usr/bin/env bash</tspan></text>
  <text x="480" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">set</tspan> -euo pipefail</text>
  <text x="480" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># -e: 이 명령이 실패하면 즉시 종료</tspan></text>
  <text x="480" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git pull origin main</text>
  <text x="480" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># -u: UNDEFINED 사용시 오류</tspan></text>
  <text x="480" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">echo <tspan fill="#ce9178">"$UNDEFINED"</tspan>  <tspan fill="#e05555"># 오류!</tspan></text>
  <text x="480" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># pipefail: grep 실패가 전파됨</tspan></text>
  <text x="480" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">cat file.txt | grep <tspan fill="#ce9178">"pattern"</tspan></text>
  <text x="480" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># -e만 있었다면 grep이 실패해도</tspan></text>
  <text x="480" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># cat 성공으로 계속 진행됐음</tspan></text>

  <!-- Label at bottom -->
  <text x="240" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">★ 세 옵션은 항상 함께 사용 권장</text>
</svg>
