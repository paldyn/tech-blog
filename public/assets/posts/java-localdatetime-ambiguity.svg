<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <defs>
    <marker id="arr-warn" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a040"/>
    </marker>
  </defs>

  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LocalDateTime은 타임라인 위의 한 점이 아니다</text>

  <!-- Source box -->
  <rect x="60" y="150" width="250" height="80" rx="8" fill="#0d1420" stroke="#7ec8e3" stroke-width="2"/>
  <text x="185" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">LocalDateTime</text>
  <text x="185" y="204" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">2026-06-12T14:30</text>

  <!-- Arrows to three zones -->
  <line x1="310" y1="170" x2="486" y2="106" stroke="#e0a040" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-warn)"/>
  <line x1="310" y1="190" x2="486" y2="190" stroke="#e0a040" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-warn)"/>
  <line x1="310" y1="210" x2="486" y2="274" stroke="#e0a040" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-warn)"/>

  <text x="185" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">어느 타임존으로 해석하느냐에 따라</text>
  <text x="185" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전혀 다른 순간이 된다</text>

  <!-- Three resulting instants -->
  <rect x="490" y="74" width="330" height="64" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="655" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">서울이라면 — Instant</text>
  <text x="655" y="122" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">2026-06-12T05:30:00Z</text>

  <rect x="490" y="158" width="330" height="64" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="655" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">UTC라면 — Instant</text>
  <text x="655" y="206" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">2026-06-12T14:30:00Z</text>

  <rect x="490" y="242" width="330" height="64" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="655" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">뉴욕이라면 — Instant</text>
  <text x="655" y="290" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">2026-06-12T18:30:00Z</text>

  <!-- Bottom takeaway -->
  <rect x="60" y="340" width="760" height="90" rx="8" fill="#1a140a" stroke="#e0a040" stroke-width="1.5"/>
  <text x="440" y="370" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a040">같은 LocalDateTime이라도 타임존에 따라 서로 다른 순간을 가리킨다</text>
  <text x="440" y="396" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타임존을 확정하려면 atZone(ZoneId) → ZonedDateTime, 또는 toInstant(ZoneOffset) → Instant</text>
  <text x="440" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">글로벌 서비스의 시각 저장·비교에 LocalDateTime을 그대로 쓰면 안 되는 이유</text>
</svg>
