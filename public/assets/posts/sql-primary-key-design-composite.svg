<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">복합 기본 키 vs 대리 키 + UNIQUE</text>

  <!-- Composite PK -->
  <text x="210" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">복합 PK</text>

  <rect x="60" y="92" width="300" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan>
    <tspan fill="#ffffff"> order_items (</tspan>
  </text>
  <text x="76" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  order_id   </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INT NOT NULL</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  product_id </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INT NOT NULL</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  quantity   </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INT</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  PRIMARY KEY</tspan>
    <tspan fill="#ffffff"> (order_id, product_id)</tspan>
  </text>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan>
  </text>

  <!-- Surrogate + UNIQUE -->
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">대리 키 + UNIQUE</text>

  <rect x="500" y="92" width="320" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="516" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan>
    <tspan fill="#ffffff"> order_items (</tspan>
  </text>
  <text x="516" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  id         </tspan>
    <tspan fill="#7ec8e3" font-weight="600">BIGINT</tspan>
    <tspan fill="#ffffff"> ... </tspan>
    <tspan fill="#7ec8e3" font-weight="600">PRIMARY KEY</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="516" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  order_id   </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INT NOT NULL</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="516" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  product_id </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INT NOT NULL</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="516" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  quantity   </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INT</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="516" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  UNIQUE</tspan>
    <tspan fill="#ffffff"> (order_id, product_id)</tspan>
  </text>
  <text x="516" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan>
  </text>

  <!-- Trade-offs -->
  <rect x="60" y="264" width="370" height="72" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">복합 PK 장점</text>
  <text x="245" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">저장 공간 절감, 중간 테이블에 자연스러움</text>
  <text x="245" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단점: FK로 참조 시 모든 열을 포함해야 함</text>

  <rect x="450" y="264" width="370" height="72" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">대리 키 장점</text>
  <text x="635" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">FK 참조 단순, ORM/프레임워크 친화적</text>
  <text x="635" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단점: 여분의 열, UNIQUE 인덱스 추가 필요</text>
</svg>
