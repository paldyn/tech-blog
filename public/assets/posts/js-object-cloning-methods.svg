<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">객체 복사 방법 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">얕은 복사 vs 깊은 복사 — 무엇이 공유되나</text>

  <!-- Shallow copy illustration -->
  <text x="200" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">얕은 복사 (Shallow Copy)</text>

  <!-- original -->
  <rect x="60" y="116" width="160" height="80" fill="#0d1520" rx="6" stroke="#1e3a5f"/>
  <text x="140" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">original</text>
  <text x="80" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">name: 'Alice'</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">addr: →</text>

  <!-- copy (shallow) -->
  <rect x="260" y="116" width="160" height="80" fill="#0d1520" rx="6" stroke="#1e3a5f"/>
  <text x="340" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">copy</text>
  <text x="280" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">name: 'Alice'</text>
  <text x="280" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">addr: →</text>

  <!-- shared addr object -->
  <rect x="180" y="220" width="160" height="60" fill="#1a0a0a" rx="6" stroke="#3a1e1e"/>
  <text x="260" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e05555">addr (공유됨!)</text>
  <text x="196" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">city: 'Seoul'</text>

  <!-- Arrows from both to addr -->
  <line x1="140" y1="196" x2="230" y2="218" stroke="#e05555" stroke-width="2"/>
  <polygon points="227,210 234,220 222,222" fill="#e05555"/>
  <line x1="340" y1="196" x2="290" y2="218" stroke="#e05555" stroke-width="2"/>
  <polygon points="292,210 284,220 296,222" fill="#e05555"/>

  <!-- Deep copy illustration -->
  <text x="640" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">깊은 복사 (Deep Copy)</text>

  <!-- original -->
  <rect x="490" y="116" width="160" height="80" fill="#0d1a12" rx="6" stroke="#1e3320"/>
  <text x="570" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">original</text>
  <text x="508" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">name: 'Alice'</text>
  <text x="508" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">addr: →</text>

  <!-- copy (deep) -->
  <rect x="690" y="116" width="160" height="80" fill="#0d1a12" rx="6" stroke="#1e3320"/>
  <text x="770" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">copy</text>
  <text x="708" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">name: 'Alice'</text>
  <text x="708" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">addr: →</text>

  <!-- independent addr objects -->
  <rect x="494" y="220" width="140" height="50" fill="#0a1410" rx="6" stroke="#1a3a20"/>
  <text x="564" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">addr (독립)</text>
  <text x="508" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">city: 'Seoul'</text>

  <rect x="706" y="220" width="140" height="50" fill="#0a1410" rx="6" stroke="#1a3a20"/>
  <text x="776" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">addr (독립)</text>
  <text x="720" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">city: 'Seoul'</text>

  <line x1="550" y1="196" x2="548" y2="218" stroke="#55c555" stroke-width="2"/>
  <polygon points="542,216 548,228 554,216" fill="#55c555"/>
  <line x1="770" y1="196" x2="782" y2="218" stroke="#55c555" stroke-width="2"/>
  <polygon points="776,216 782,228 788,216" fill="#55c555"/>

  <!-- Method comparison table -->
  <rect x="60" y="304" width="760" height="36" fill="#111827" rx="6"/>
  <text x="200" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">방법</text>
  <text x="380" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">깊이</text>
  <text x="520" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">getter 보존</text>
  <text x="660" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">순환참조</text>

  <rect x="60" y="340" width="760" height="30" fill="#0d1117" rx="0"/>
  <text x="200" y="360" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">{ ...obj } / Object.assign</text>
  <text x="380" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">얕음</text>
  <text x="520" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗</text>
  <text x="660" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗</text>

  <rect x="60" y="370" width="760" height="30" fill="#111" rx="0"/>
  <text x="200" y="390" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">JSON.parse(JSON.stringify)</text>
  <text x="380" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">깊음</text>
  <text x="520" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗</text>
  <text x="660" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗</text>

  <rect x="60" y="400" width="760" height="30" fill="#0d1117" rx="0"/>
  <text x="200" y="420" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">structuredClone</text>
  <text x="380" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">깊음</text>
  <text x="520" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗</text>
  <text x="660" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✓</text>

  <line x1="60" y1="430" x2="820" y2="430" stroke="#222" stroke-width="1"/>
  <line x1="300" y1="304" x2="300" y2="430" stroke="#222" stroke-width="1"/>
  <line x1="460" y1="304" x2="460" y2="430" stroke="#222" stroke-width="1"/>
  <line x1="590" y1="304" x2="590" y2="430" stroke="#222" stroke-width="1"/>

  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">getter 보존이 필요하면: Object.create(proto) + Object.getOwnPropertyDescriptors(src)</text>

  <text x="440" y="504" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
