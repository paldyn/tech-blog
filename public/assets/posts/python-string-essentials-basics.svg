<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">문자열 생성과 인덱싱</text>

  <!-- String literals -->
  <rect x="50" y="68" width="370" height="190" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="235" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">문자열 리터럴</text>

  <rect x="66" y="100" width="338" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 작은따옴표 / 큰따옴표 동일</text>
  <text x="82" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">a = </text>
  <text x="110" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'Hello'</text>
  <text x="82" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">b = </text>
  <text x="110" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"World"</text>
  <text x="82" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 삼중 따옴표: 여러 줄</text>
  <text x="82" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">c = </text>
  <text x="110" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"""</text>
  <text x="134" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">첫 줄</text>
  <text x="82" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">둘째 줄"""</text>
  <text x="82" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 이스케이프: \n \t \\ \'</text>

  <!-- Indexing &amp; slicing -->
  <rect x="460" y="68" width="370" height="190" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">인덱싱 / 슬라이싱</text>

  <rect x="476" y="100" width="338" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s = </text>
  <text x="520" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"Python"</text>
  <text x="492" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s[</text>
  <text x="508" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="516" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]   </text>
  <text x="552" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 'P'</text>
  <text x="492" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s[</text>
  <text x="508" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">-1</text>
  <text x="524" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]  </text>
  <text x="552" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 'n' (마지막)</text>
  <text x="492" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s[</text>
  <text x="508" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text>
  <text x="516" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="522" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">4</text>
  <text x="530" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]  </text>
  <text x="552" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 'yth'</text>
  <text x="492" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s[:</text>
  <text x="516" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">-1</text>
  <text x="532" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">] </text>
  <text x="552" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 'Pytho' (마지막 제외)</text>
  <text x="492" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s[::</text>
  <text x="520" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">-1</text>
  <text x="536" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]</text>
  <text x="552" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 'nohtyP' (뒤집기)</text>
  <text x="492" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">len(s)   </text>
  <text x="552" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 6</text>

  <!-- Index visual -->
  <rect x="50" y="278" width="780" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">"Python" 인덱스 구조</text>

  <!-- characters -->
  <rect x="100" y="308" width="44" height="36" rx="4" fill="#13131f" stroke="#7777cc" stroke-width="1"/>
  <text x="122" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#ce9178" text-anchor="middle">P</text>
  <rect x="156" y="308" width="44" height="36" rx="4" fill="#13131f" stroke="#7777cc" stroke-width="1"/>
  <text x="178" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#ce9178" text-anchor="middle">y</text>
  <rect x="212" y="308" width="44" height="36" rx="4" fill="#13131f" stroke="#7777cc" stroke-width="1"/>
  <text x="234" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#ce9178" text-anchor="middle">t</text>
  <rect x="268" y="308" width="44" height="36" rx="4" fill="#13131f" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#ce9178" text-anchor="middle">h</text>
  <rect x="324" y="308" width="44" height="36" rx="4" fill="#13131f" stroke="#7777cc" stroke-width="1"/>
  <text x="346" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#ce9178" text-anchor="middle">o</text>
  <rect x="380" y="308" width="44" height="36" rx="4" fill="#13131f" stroke="#7777cc" stroke-width="1"/>
  <text x="402" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#ce9178" text-anchor="middle">n</text>

  <!-- positive index -->
  <text x="122" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">0</text>
  <text x="178" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">1</text>
  <text x="234" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">2</text>
  <text x="290" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">3</text>
  <text x="346" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">4</text>
  <text x="402" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">5</text>

  <!-- negative index -->
  <text x="122" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">-6</text>
  <text x="178" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">-5</text>
  <text x="234" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">-4</text>
  <text x="290" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">-3</text>
  <text x="346" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">-2</text>
  <text x="402" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">-1</text>

  <!-- labels -->
  <text x="60" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">양수:</text>
  <text x="60" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">음수:</text>

  <!-- immutable note -->
  <rect x="50" y="394" width="780" height="82" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">문자열 불변성 (Immutable)</text>
  <rect x="66" y="424" width="748" height="42" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s = </text>
  <text x="110" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"hello"</text>
  <text x="82" y="460" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s[0] = </text>
  <text x="128" y="460" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"H"</text>
  <text x="160" y="460" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">  # TypeError! 수정 불가</text>
  <text x="400" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">s = </text>
  <text x="428" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"H"</text>
  <text x="452" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> + s[1:]</text>
  <text x="400" y="460" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  # "Hello" — 새 문자열 생성</text>
</svg>
