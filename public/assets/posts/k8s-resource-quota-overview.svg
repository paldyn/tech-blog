<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ResourceQuota — 네임스페이스 총량 제한</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Compute · Object Count · Storage 쿼터</text>

  <!-- Namespace box -->
  <rect x="60" y="90" width="760" height="280" fill="#0a0f18" rx="10" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#3a4a6e" text-anchor="middle">Namespace: production</text>

  <!-- Compute Quota -->
  <rect x="80" y="124" width="220" height="228" fill="#0f1923" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="190" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Compute Quota</text>

  <rect x="96" y="158" width="188" height="44" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="190" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">requests.cpu: 10</text>
  <text x="190" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">총 CPU 요청량 상한</text>

  <rect x="96" y="210" width="188" height="44" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="190" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">limits.memory: 20Gi</text>
  <text x="190" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">총 메모리 한도 상한</text>

  <rect x="96" y="262" width="188" height="44" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="190" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">limits.cpu: 20</text>
  <text x="190" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">총 CPU 한도 상한</text>

  <rect x="96" y="314" width="188" height="30" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="190" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">requests.ephemeral-storage 등</text>

  <!-- Object Count Quota -->
  <rect x="320" y="124" width="220" height="228" fill="#0f1923" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="430" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Object Count Quota</text>

  <rect x="336" y="158" width="188" height="44" fill="#0a1015" rx="5" stroke="#2a2a4e" stroke-width="1"/>
  <text x="430" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">pods: 50</text>
  <text x="430" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Pod 최대 개수</text>

  <rect x="336" y="210" width="188" height="44" fill="#0a1015" rx="5" stroke="#2a2a4e" stroke-width="1"/>
  <text x="430" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">services: 10</text>
  <text x="430" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Service 최대 개수</text>

  <rect x="336" y="262" width="188" height="44" fill="#0a1015" rx="5" stroke="#2a2a4e" stroke-width="1"/>
  <text x="430" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">secrets: 20</text>
  <text x="430" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Secret 최대 개수</text>

  <rect x="336" y="314" width="188" height="30" fill="#0a1015" rx="5" stroke="#2a2a4e" stroke-width="1"/>
  <text x="430" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">configmaps, deployments 등</text>

  <!-- Storage Quota -->
  <rect x="560" y="124" width="240" height="228" fill="#0f1923" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="680" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Storage Quota</text>

  <rect x="576" y="158" width="208" height="44" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="680" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">requests.storage: 100Gi</text>
  <text x="680" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">총 PVC 스토리지 합산 상한</text>

  <rect x="576" y="210" width="208" height="44" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="680" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">persistentvolumeclaims: 10</text>
  <text x="680" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PVC 개수 상한</text>

  <rect x="576" y="262" width="208" height="44" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="680" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">gold.storageclass.../requests.storage</text>
  <text x="680" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">StorageClass별 제한</text>

  <rect x="576" y="314" width="208" height="30" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="680" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">ephemeral-storage 포함</text>

  <!-- Code block -->
  <rect x="60" y="388" width="760" height="88" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888"># ResourceQuota 사용량 확인</text>
  <text x="80" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">kubectl describe quota -n production</text>
  <text x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888"># Resource   Used   Hard</text>
  <text x="80" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888"># pods       12     50</text>
</svg>
