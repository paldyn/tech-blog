<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git cherry-pick 원리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">특정 커밋의 변경사항을 현재 브랜치에 복사</text>

  <!-- feature branch (top) -->
  <text x="80" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">feature 브랜치</text>

  <circle cx="100" cy="155" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C1</text>

  <circle cx="200" cy="155" r="22" fill="#1a2233" stroke="#55c555" stroke-width="2.5"/>
  <text x="200" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C2</text>
  <text x="200" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">← 원하는 커밋</text>

  <circle cx="320" cy="155" r="22" fill="#1a2233" stroke="#888" stroke-width="2"/>
  <text x="320" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C3</text>

  <circle cx="440" cy="155" r="22" fill="#1a2233" stroke="#888" stroke-width="2"/>
  <text x="440" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C4</text>

  <!-- feature label -->
  <rect x="400" y="108" width="80" height="22" rx="5" fill="#0a1a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">feature</text>
  <line x1="440" y1="130" x2="440" y2="133" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- feature arrows -->
  <line x1="122" y1="155" x2="176" y2="155" stroke="#555" stroke-width="2"/>
  <polygon points="176,150 186,155 176,160" fill="#555"/>
  <line x1="222" y1="155" x2="296" y2="155" stroke="#555" stroke-width="2"/>
  <polygon points="296,150 306,155 296,160" fill="#555"/>
  <line x1="342" y1="155" x2="416" y2="155" stroke="#555" stroke-width="2"/>
  <polygon points="416,150 426,155 416,160" fill="#555"/>

  <!-- cherry-pick arrow (big curved arrow) -->
  <path d="M 200 210 Q 300 310 600 300" stroke="#55c555" stroke-width="2.5" fill="none" stroke-dasharray="8,4"/>
  <polygon points="592,295 602,298 596,308" fill="#55c555"/>

  <text x="350" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">git cherry-pick C2</text>

  <!-- main branch (bottom) -->
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">main 브랜치</text>

  <circle cx="500" cy="370" r="22" fill="#1a2233" stroke="#7777cc" stroke-width="2"/>
  <text x="500" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">M1</text>

  <circle cx="620" cy="370" r="22" fill="#1a2233" stroke="#7777cc" stroke-width="2"/>
  <text x="620" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">M2</text>

  <circle cx="740" cy="370" r="26" fill="#1a1a0a" stroke="#55c555" stroke-width="2.5"/>
  <text x="740" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C2'</text>
  <text x="740" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">새 SHA</text>

  <!-- main label -->
  <rect x="700" y="406" width="80" height="22" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="740" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">main</text>
  <line x1="740" y1="406" x2="740" y2="396" stroke="#7777cc" stroke-width="1.5"/>

  <!-- main arrows -->
  <line x1="522" y1="370" x2="596" y2="370" stroke="#7777cc" stroke-width="2"/>
  <polygon points="596,365 606,370 596,375" fill="#7777cc"/>
  <line x1="642" y1="370" x2="712" y2="370" stroke="#7777cc" stroke-width="2"/>
  <polygon points="712,365 722,370 712,375" fill="#7777cc"/>

  <!-- Note -->
  <text x="200" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C2는 feature에 그대로 존재</text>
  <text x="200" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C2'는 동일 변경의 새 커밋</text>
</svg>
