<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">모듈 해석 알고리즘</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">require('react') 탐색 순서 / .npmrc 호이스팅 설정</text>

  <!-- Left: resolution algorithm -->
  <text x="60" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">CJS 모듈 해석 탐색 경로</text>
  <rect x="60" y="112" width="370" height="252" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="140" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// /home/user/project/src/app.js에서</text>
  <text x="76" y="158" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// require('react') 호출 시 탐색 순서:</text>

  <text x="76" y="194" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">1.</text>
  <text x="96" y="194" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> src/node_modules/react</text>
  <text x="76" y="212" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">2.</text>
  <text x="96" y="212" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> project/node_modules/react</text>
  <text x="76" y="230" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">   ← 일반적으로 여기서 발견</text>
  <text x="76" y="248" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">3.</text>
  <text x="96" y="248" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> home/user/node_modules/react</text>
  <text x="76" y="266" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">4.</text>
  <text x="96" y="266" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> home/node_modules/react</text>
  <text x="76" y="284" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">5.</text>
  <text x="96" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> node_modules/react  (전역)</text>
  <text x="76" y="302" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">6.</text>
  <text x="96" y="302" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> Cannot find module 'react'</text>

  <text x="76" y="340" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// NODE_PATH로 추가 탐색 경로 지정 가능</text>
  <text x="76" y="358" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// (레거시 — 현대에서는 비권장)</text>

  <!-- Right: .npmrc settings -->
  <text x="450" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">.npmrc 호이스팅 설정</text>
  <rect x="450" y="112" width="370" height="252" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="466" y="140" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># .npmrc (pnpm 호이스팅 조정)</text>

  <text x="466" y="176" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 일부 패키지를 루트로 호이스팅</text>
  <text x="466" y="194" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">hoist-pattern</text>
  <text x="572" y="194" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">=*jest*</text>
  <text x="466" y="212" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">hoist-pattern</text>
  <text x="572" y="212" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">=*babel*</text>

  <text x="466" y="248" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 모든 패키지 호이스팅 (npm처럼)</text>
  <text x="466" y="266" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 마이그레이션 시 임시 사용</text>
  <text x="466" y="284" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">shamefully-hoist</text>
  <text x="616" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">=true</text>

  <text x="466" y="320" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 잠금 파일 엄격 모드</text>
  <text x="466" y="338" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">frozen-lockfile</text>
  <text x="602" y="338" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">=true</text>
  <text x="466" y="356" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># CI 환경에서 권장</text>

  <!-- Bottom note -->
  <text x="440" y="385" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">shamefully-hoist는 임시 회피책 — 팬텀 의존성이 생기므로 장기적으로 해결할 것</text>
</svg>
