<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">BuildKit 핵심 기능</text>

  <!-- Feature 1: Parallel -->
  <rect x="60" y="70" width="370" height="90" fill="#111827" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" xml:space="preserve">병렬 스테이지 빌드</text>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">의존성이 없는 스테이지를 동시에 빌드</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">멀티 스테이지 빌드에서 자동 적용</text>

  <!-- Feature 2: Cache mount -->
  <rect x="450" y="70" width="370" height="90" fill="#111827" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" xml:space="preserve">캐시 마운트 (type=cache)</text>
  <text x="470" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">레이어 외부에 패키지 캐시 영속</text>
  <text x="470" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">이미지 크기 증가 없이 빌드 속도 향상</text>

  <!-- Feature 3: Secret mount -->
  <rect x="60" y="180" width="370" height="90" fill="#111827" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" xml:space="preserve">시크릿 마운트 (type=secret)</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">빌드 중 SSH 키, 토큰을 레이어에</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">남기지 않고 사용</text>

  <!-- Feature 4: SSH mount -->
  <rect x="450" y="180" width="370" height="90" fill="#111827" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" xml:space="preserve">SSH 에이전트 마운트</text>
  <text x="470" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">private git repo 접근 시</text>
  <text x="470" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">호스트 SSH 키를 안전하게 전달</text>

  <!-- Feature 5: Inline cache -->
  <rect x="60" y="290" width="370" height="90" fill="#111827" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" xml:space="preserve">인라인 캐시 내보내기</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">이미지에 캐시 메타데이터 포함</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">CI 환경에서 레지스트리 캐시 활용</text>

  <!-- Feature 6: Dockerfile frontend -->
  <rect x="450" y="290" width="370" height="90" fill="#111827" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" xml:space="preserve">Dockerfile 프론트엔드 버전</text>
  <text x="470" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve"># syntax=docker/dockerfile:1</text>
  <text x="470" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">최신 문법 실험적 기능 사용 가능</text>

  <!-- Enable -->
  <rect x="60" y="400" width="760" height="60" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" xml:space="preserve">활성화 방법</text>
  <text x="76" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">DOCKER_BUILDKIT=1</text>
  <text x="270" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> docker build .   </text>
  <text x="500" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">Docker 23+ 이후 기본값으로 활성화</text>
</svg>
