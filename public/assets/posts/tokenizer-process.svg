<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Wanted+Sans+Variable:wght@400;600;700&amp;display=swap');
      text { font-family: 'Wanted Sans Variable', 'Pretendard Variable', 'Noto Sans KR', sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="url(#bgGrad)" rx="12"/>
  <rect width="880" height="520" fill="none" stroke="#1e1e1e" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="20" font-weight="700">토크나이저 동작 원리</text>
  <text x="440" y="66" text-anchor="middle" fill="#666" font-size="13">텍스트 → 토큰 → 토큰 ID 변환 과정</text>

  <!-- Step labels -->
  <text x="48" y="108" fill="#888" font-size="12" font-weight="600">STEP 1</text>
  <text x="48" y="124" fill="#aaa" font-size="13">원본 텍스트</text>

  <!-- Input text box -->
  <rect x="40" y="134" width="800" height="52" rx="8" fill="#161616" stroke="#2a2a2a" stroke-width="1"/>
  <text x="60" y="164" fill="#e8e8e8" font-size="16" font-family="'Courier New', monospace">"ChatGPT는 OpenAI가 만든 언어 모델입니다."</text>

  <!-- Arrow down -->
  <line x1="440" y1="196" x2="440" y2="224" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="440,228 435,218 445,218" fill="#3b82f6"/>
  <text x="460" y="214" fill="#3b82f6" font-size="11" font-weight="600">토크나이징</text>

  <!-- Step 2 -->
  <text x="48" y="248" fill="#888" font-size="12" font-weight="600">STEP 2</text>
  <text x="48" y="264" fill="#aaa" font-size="13">서브워드 토큰 분리 (BPE / WordPiece)</text>

  <!-- Token boxes row 1 -->
  <!-- Tokens: "Chat", "G", "PT", "는", " Open", "AI", "가", " 만든", " 언어", " 모델", "입니다", "." -->
  <g id="tokens">
    <!-- Token 1: Chat -->
    <rect x="40" y="276" width="64" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="72" y="298" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">Chat</text>

    <!-- Token 2: G -->
    <rect x="112" y="276" width="32" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="128" y="298" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">G</text>

    <!-- Token 3: PT -->
    <rect x="152" y="276" width="36" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="170" y="298" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">PT</text>

    <!-- Token 4: 는 -->
    <rect x="196" y="276" width="34" height="34" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="213" y="298" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">는</text>

    <!-- Token 5: ▁Open -->
    <rect x="238" y="276" width="68" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="272" y="298" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">▁Open</text>

    <!-- Token 6: AI -->
    <rect x="314" y="276" width="36" height="34" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="332" y="298" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">AI</text>

    <!-- Token 7: 가 -->
    <rect x="358" y="276" width="34" height="34" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="375" y="298" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">가</text>

    <!-- Token 8: ▁만든 -->
    <rect x="400" y="276" width="68" height="34" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="434" y="298" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">▁만든</text>

    <!-- Token 9: ▁언어 -->
    <rect x="476" y="276" width="64" height="34" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="508" y="298" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">▁언어</text>

    <!-- Token 10: ▁모델 -->
    <rect x="548" y="276" width="64" height="34" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="580" y="298" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">▁모델</text>

    <!-- Token 11: 입니다 -->
    <rect x="620" y="276" width="70" height="34" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="655" y="298" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">입니다</text>

    <!-- Token 12: . -->
    <rect x="698" y="276" width="28" height="34" rx="6" fill="#1a2a1a" stroke="#10b981" stroke-width="1.5"/>
    <text x="712" y="298" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="600">.</text>
  </g>

  <!-- Token count badge -->
  <rect x="740" y="276" width="100" height="34" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="790" y="291" text-anchor="middle" fill="#888" font-size="11">총 토큰 수</text>
  <text x="790" y="305" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">12 tokens</text>

  <!-- Arrow down -->
  <line x1="440" y1="320" x2="440" y2="348" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="440,352 435,342 445,342" fill="#10b981"/>
  <text x="460" y="338" fill="#10b981" font-size="11" font-weight="600">어휘 사전 조회</text>

  <!-- Step 3 -->
  <text x="48" y="372" fill="#888" font-size="12" font-weight="600">STEP 3</text>
  <text x="48" y="388" fill="#aaa" font-size="13">토큰 ID 배열 (모델 입력값)</text>

  <!-- Token IDs -->
  <rect x="40" y="396" width="800" height="52" rx="8" fill="#161616" stroke="#2a2a2a" stroke-width="1"/>
  <text x="60" y="418" fill="#888" font-size="11">input_ids =</text>
  <text x="148" y="418" fill="#10b981" font-size="14" font-family="'Courier New', monospace">[</text>
  <text x="162" y="418" fill="#fbbf24" font-size="14" font-family="'Courier New', monospace">27871, 38, 2969, 20olean, 9842, 15836, 70, 28652, 13821, 48047, 171028, 13</text>
  <text x="60" y="438" fill="#fbbf24" font-size="13" font-family="'Courier New', monospace">  9842,  15836,    70,  28652,  13821, 48047, 171028,    13</text>

  <!-- Simplified visual version -->
  <rect x="40" y="396" width="800" height="52" rx="8" fill="#161616" stroke="#2a2a2a" stroke-width="1"/>
  <text x="60" y="422" fill="#888" font-size="12">input_ids  =  [</text>
  <text x="172" y="422" fill="#fbbf24" font-size="12" font-family="'Courier New', monospace">9993,  38,  2969,  247,  9842, 15836,  70, 28652, 13821, 48047, 171028,  13</text>
  <text x="60" y="440" fill="#888" font-size="12">              ]</text>

  <!-- Legend -->
  <rect x="40" y="468" width="800" height="38" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
  <rect x="60" y="480" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="78" y="491" fill="#888" font-size="12">영어/ASCII 토큰 (짧음)</text>
  <rect x="240" y="480" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="258" y="491" fill="#888" font-size="12">한국어 토큰 (더 많이 분리됨)</text>
  <rect x="470" y="480" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="488" y="491" fill="#888" font-size="12">구두점 / 특수 토큰</text>
  <text x="640" y="491" fill="#555" font-size="11">▁ = 단어 시작 공백 표시</text>
</svg>
