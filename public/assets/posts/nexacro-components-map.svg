<svg width="880" height="500" viewBox="0 0 880 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>
  <defs>
    <style>
      .t-title { fill: #e8e8e8; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 22px; font-weight: 700; }
      .t-label { fill: #888; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 12px; }
      .t-cat   { fill: #e8e8e8; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 13px; font-weight: 700; }
      .t-item  { fill: #aaa; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 11px; }
      .t-code  { fill: #6ee7b7; font-family: "JetBrains Mono", monospace; font-size: 10px; }
    </style>
  </defs>

  <text x="36" y="46" class="t-title">Nexacro N — 컴포넌트 분류 맵</text>
  <text x="36" y="66" class="t-label">실무에서 자주 쓰는 컴포넌트를 카테고리별로 정리</text>

  <!-- Category 1: Input -->
  <rect x="36" y="88" width="192" height="260" rx="10" fill="#0f1117" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="36" y="88" width="192" height="34" rx="10" fill="#1e3a5f"/>
  <text x="52" y="111" class="t-cat">✍️ 입력</text>
  <text x="52" y="144" class="t-code">Edit</text>
  <text x="120" y="144" class="t-item">단순 텍스트 입력</text>
  <text x="52" y="164" class="t-code">MaskEdit</text>
  <text x="120" y="164" class="t-item">포맷 입력 (날짜·금액)</text>
  <text x="52" y="184" class="t-code">ComboBox</text>
  <text x="120" y="184" class="t-item">드롭다운 선택</text>
  <text x="52" y="204" class="t-code">CheckBox</text>
  <text x="120" y="204" class="t-item">다중 선택</text>
  <text x="52" y="224" class="t-code">Radio</text>
  <text x="120" y="224" class="t-item">단일 선택</text>
  <text x="52" y="244" class="t-code">Calendar</text>
  <text x="120" y="244" class="t-item">날짜 선택기</text>
  <text x="52" y="264" class="t-code">Spin</text>
  <text x="120" y="264" class="t-item">숫자 증감 입력</text>
  <text x="52" y="284" class="t-code">TextArea</text>
  <text x="120" y="284" class="t-item">여러 줄 입력</text>
  <text x="52" y="304" class="t-code">Password</text>
  <text x="120" y="304" class="t-item">비밀번호 입력</text>
  <text x="52" y="328" class="t-item">+ 파일첨부, 슬라이더 등</text>

  <!-- Category 2: Display -->
  <rect x="244" y="88" width="192" height="260" rx="10" fill="#0f1117" stroke="#365314" stroke-width="1.5"/>
  <rect x="244" y="88" width="192" height="34" rx="10" fill="#1a3a0f"/>
  <text x="260" y="111" class="t-cat">🖼️ 표시</text>
  <text x="260" y="144" class="t-code">Static</text>
  <text x="328" y="144" class="t-item">레이블 / 읽기전용 텍스트</text>
  <text x="260" y="164" class="t-code">Image</text>
  <text x="328" y="164" class="t-item">이미지 표시</text>
  <text x="260" y="184" class="t-code">ProgressBar</text>
  <text x="328" y="184" class="t-item">진행 표시줄</text>
  <text x="260" y="204" class="t-code">Gauge</text>
  <text x="328" y="204" class="t-item">게이지 차트</text>
  <text x="260" y="224" class="t-code">Map</text>
  <text x="328" y="224" class="t-item">지도 표시</text>
  <text x="260" y="244" class="t-code">HtmlView</text>
  <text x="328" y="244" class="t-item">HTML 콘텐츠 렌더링</text>
  <text x="260" y="264" class="t-code">WebBrowser</text>
  <text x="328" y="264" class="t-item">내장 웹브라우저</text>
  <text x="260" y="284" class="t-code">Chart</text>
  <text x="328" y="284" class="t-item">차트 시각화</text>
  <text x="260" y="328" class="t-item">+ 바코드, 서명 패드 등</text>

  <!-- Category 3: Data -->
  <rect x="452" y="88" width="192" height="260" rx="10" fill="#0f1117" stroke="#4c1d2e" stroke-width="1.5"/>
  <rect x="452" y="88" width="192" height="34" rx="10" fill="#2a0f1a"/>
  <text x="468" y="111" class="t-cat">📊 데이터</text>
  <text x="468" y="144" class="t-code">Grid</text>
  <text x="536" y="144" class="t-item">표 형식 데이터 표시·입력</text>
  <text x="468" y="164" class="t-code">TreeView</text>
  <text x="536" y="164" class="t-item">계층형 트리 목록</text>
  <text x="468" y="184" class="t-code">ListView</text>
  <text x="536" y="184" class="t-item">단순 목록 표시</text>
  <text x="468" y="204" class="t-item">Grid 주요 하위 요소:</text>
  <text x="468" y="224" class="t-code">  GridBand</text>
  <text x="536" y="224" class="t-item">열 그룹(머리글)</text>
  <text x="468" y="244" class="t-code">  GridColumn</text>
  <text x="536" y="244" class="t-item">개별 열 정의</text>
  <text x="468" y="264" class="t-code">  GridCell</text>
  <text x="536" y="264" class="t-item">셀 편집 타입 지정</text>
  <text x="468" y="284" class="t-item">셀 편집 타입:</text>
  <text x="468" y="300" class="t-item">Text·Combo·Check·Button</text>
  <text x="468" y="316" class="t-item">Calendar·Image·Custom 등</text>

  <!-- Category 4: Container & Control -->
  <rect x="660" y="88" width="188" height="260" rx="10" fill="#0f1117" stroke="#3b2a00" stroke-width="1.5"/>
  <rect x="660" y="88" width="188" height="34" rx="10" fill="#2a1f00"/>
  <text x="676" y="111" class="t-cat">📦 컨테이너 / 제어</text>
  <text x="676" y="144" class="t-code">Div</text>
  <text x="720" y="144" class="t-item">컴포넌트 그룹화</text>
  <text x="676" y="164" class="t-code">Tab</text>
  <text x="720" y="164" class="t-item">탭 패널 구성</text>
  <text x="676" y="184" class="t-code">Splitter</text>
  <text x="720" y="184" class="t-item">패널 구분선(드래그)</text>
  <text x="676" y="204" class="t-code">Button</text>
  <text x="720" y="204" class="t-item">클릭 액션 버튼</text>
  <text x="676" y="224" class="t-code">ImageButton</text>
  <text x="720" y="224" class="t-item">이미지 버튼</text>
  <text x="676" y="244" class="t-code">ToggleButton</text>
  <text x="720" y="244" class="t-item">토글 상태 버튼</text>
  <text x="676" y="264" class="t-code">Menu</text>
  <text x="720" y="264" class="t-item">드롭다운 메뉴</text>
  <text x="676" y="284" class="t-code">PopupMenu</text>
  <text x="720" y="284" class="t-item">우클릭 컨텍스트 메뉴</text>
  <text x="676" y="328" class="t-item">+ 툴바, 상태바 등</text>

  <!-- Bottom hint -->
  <text x="36" y="374" class="t-label">* 위 분류는 편의상 구분이며, 실제 투비소프트 문서에서의 분류와 다소 다를 수 있습니다</text>
  <text x="36" y="392" class="t-label">* Nexacro N에서는 컴포넌트를 드래그&amp;드롭으로 배치하거나 스크립트로 동적 생성할 수 있습니다</text>

  <!-- Quick ref boxes -->
  <rect x="36" y="410" width="800" height="60" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="52" y="432" class="t-cat">핵심 3총사 기억법</text>
  <text x="52" y="454" class="t-item">🔹 입력값 읽기: Edit·MaskEdit → .value  |  ComboBox → .value (코드), .text (표시명)</text>
  <text x="52" y="470" class="t-item">🔹 데이터 표시: Grid → Dataset 바인딩  |  Static → .set_text()  |  Image → .set_image()</text>
</svg>
