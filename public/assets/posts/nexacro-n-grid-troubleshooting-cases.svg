<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 자주 발생하는 문제와 원인</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">증상 → 원인 → 해결책 빠른 참조</text>

  <!-- Case 1 -->
  <rect x="60" y="96" width="760" height="68" fill="#111" rx="8"/>
  <rect x="60" y="96" width="8" height="68" fill="#e05555" rx="4"/>
  <text x="84" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">증상</text>
  <text x="140" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Grid가 텅 비어 보임 (데이터 있는데 렌더링 안 됨)</text>
  <text x="84" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">원인</text>
  <text x="140" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">bindeddataset 연결 누락 또는 Dataset ID 오타</text>
  <text x="84" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">해결</text>
  <text x="140" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">grd.bindeddataset 속성 확인, ds.rowcount 로그 확인</text>

  <!-- Case 2 -->
  <rect x="60" y="172" width="760" height="68" fill="#161616" rx="8"/>
  <rect x="60" y="172" width="8" height="68" fill="#e05555" rx="4"/>
  <text x="84" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">증상</text>
  <text x="140" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">콤보 셀 드롭다운 목록이 비어 있음</text>
  <text x="84" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">원인</text>
  <text x="140" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">bindingcodedataset 연결 누락 또는 데이터 미로드</text>
  <text x="84" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">해결</text>
  <text x="140" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">코드 Dataset 트랜잭션 완료 후 bindingcodedataset 연결</text>

  <!-- Case 3 -->
  <rect x="60" y="248" width="760" height="68" fill="#111" rx="8"/>
  <rect x="60" y="248" width="8" height="68" fill="#e05555" rx="4"/>
  <text x="84" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">증상</text>
  <text x="140" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">편집 후 저장 시 변경 데이터가 서버에 전달 안 됨</text>
  <text x="84" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">원인</text>
  <text x="140" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Dataset rowType이 NORMAL(변경 없음)로 남아 있음</text>
  <text x="84" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">해결</text>
  <text x="140" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">setColumn 대신 bindeddataset을 통한 편집 확인</text>

  <!-- Case 4 -->
  <rect x="60" y="324" width="760" height="68" fill="#161616" rx="8"/>
  <rect x="60" y="324" width="8" height="68" fill="#e05555" rx="4"/>
  <text x="84" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">증상</text>
  <text x="140" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">스크롤 시 셀 배경색이 엉뚱한 행에 나타남</text>
  <text x="84" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">원인</text>
  <text x="140" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">가상화 시 setCellBackgroundColor DOM 재사용 후 미초기화</text>
  <text x="84" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">해결</text>
  <text x="140" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">oncellstyle 이벤트에서 스타일 설정 (DOM 재사용과 동기화)</text>

  <!-- Case 5 -->
  <rect x="60" y="400" width="760" height="68" fill="#111" rx="8"/>
  <rect x="60" y="400" width="8" height="68" fill="#e05555" rx="4"/>
  <text x="84" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">증상</text>
  <text x="140" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Grid 행 추가 후 oncellchange가 발생하지 않음</text>
  <text x="84" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">원인</text>
  <text x="140" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">addRow() + setColumn()은 편집이 아니라 프로그램 변경</text>
  <text x="84" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">해결</text>
  <text x="140" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">setColumn 직후 수동으로 연동 함수 호출</text>
</svg>
