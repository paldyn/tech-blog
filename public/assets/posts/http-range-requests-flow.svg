<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="rrf-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="rrf-arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Range 요청과 206 Partial Content 흐름</text>

  <!-- actor labels -->
  <text x="175" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">클라이언트</text>
  <text x="705" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">서버</text>

  <!-- lifelines -->
  <line x1="175" y1="100" x2="175" y2="400" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="705" y1="100" x2="705" y2="400" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- request box -->
  <rect x="220" y="118" width="280" height="62" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="236" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">GET</tspan><tspan fill="#ffffff"> /video.mp4</tspan></text>
  <text x="236" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Range:</tspan><tspan fill="#ffffff"> bytes=</tspan><tspan fill="#b5cea8">0-1023</tspan></text>

  <!-- request arrow -->
  <line x1="175" y1="200" x2="703" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rrf-arr)"/>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">요청: 처음 1024바이트만</text>

  <!-- response box -->
  <rect x="240" y="250" width="425" height="106" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="256" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">HTTP/1.1 </tspan><tspan fill="#55c555" font-weight="600">206 Partial Content</tspan></text>
  <text x="256" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Accept-Ranges:</tspan><tspan fill="#ffffff"> bytes</tspan></text>
  <text x="256" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Range:</tspan><tspan fill="#ffffff"> bytes </tspan><tspan fill="#b5cea8">0-1023</tspan><tspan fill="#ffffff">/</tspan><tspan fill="#b5cea8">73400320</tspan></text>
  <text x="256" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Length:</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1024</tspan><tspan fill="#9aa4b8">  # 전체 아님</tspan></text>

  <!-- response arrow -->
  <line x1="705" y1="386" x2="177" y2="386" stroke="#55c555" stroke-width="2" marker-end="url(#rrf-arr2)"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">응답: 조각 + 위치 정보</text>
</svg>
