<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">디버깅 도구 · 진단 API</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">console.time · --cpu-prof · --heap-prof · report</text>

  <!-- Left: console + util -->
  <text x="60" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">내장 진단</text>
  <rect x="60" y="112" width="370" height="252" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="140" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 타이밍 측정</text>
  <text x="76" y="158" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">console.time(</text>
  <text x="186" y="158" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">'db-query'</text>
  <text x="250" y="158" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">);</text>
  <text x="76" y="176" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">await</text>
  <text x="116" y="176" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> query();</text>
  <text x="76" y="194" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">console.timeEnd(</text>
  <text x="200" y="194" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">'db-query'</text>
  <text x="264" y="194" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">); </text>
  <text x="280" y="194" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// db-query: 23ms</text>

  <text x="76" y="230" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 객체 깊이 출력</text>
  <text x="76" y="248" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">import</text>
  <text x="120" y="248" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> { inspect } </text>
  <text x="204" y="248" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">from</text>
  <text x="236" y="248" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> 'util'</text>
  <text x="278" y="248" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">;</text>
  <text x="76" y="266" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">console.log(inspect(obj, {</text>
  <text x="76" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  depth: </text>
  <text x="138" y="284" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">null</text>
  <text x="162" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">, colors: </text>
  <text x="234" y="284" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">true</text>
  <text x="258" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> }));</text>
  <text x="76" y="320" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 스택 트레이스</text>
  <text x="76" y="338" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">console.trace(</text>
  <text x="186" y="338" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">'호출 위치 추적'</text>
  <text x="304" y="338" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">);</text>

  <!-- Right: CLI flags -->
  <text x="450" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">CLI 진단 플래그</text>
  <rect x="450" y="112" width="370" height="252" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="466" y="140" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># CPU 프로파일 생성</text>
  <text x="466" y="158" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">node --cpu-prof app.js</text>
  <text x="466" y="176" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># → isolate-*.cpuprofile 생성</text>

  <text x="466" y="212" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 힙 프로파일 생성</text>
  <text x="466" y="230" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">node --heap-prof app.js</text>
  <text x="466" y="248" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># → Heap.*.heapprofile 생성</text>

  <text x="466" y="284" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 진단 리포트</text>
  <text x="466" y="302" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">node --report-on-fatalerror</text>
  <text x="466" y="320" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">     --report-on-signal app.js</text>

  <text x="466" y="356" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"># 코드에서 직접 생성</text>
  <text x="466" y="374" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">process.report.writeReport();</text>

  <!-- Bottom note -->
  <text x="440" y="385" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">.cpuprofile / .heapprofile → Chrome DevTools에서 열어 시각화</text>
</svg>
