<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클립보드 코드 패턴</text>

  <!-- Left: writeText + readText -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">복사 버튼 구현</text>

  <rect x="60" y="94" width="370" height="162" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">async function <text fill="#e8e8e8">copyToClipboard(text) {</text></text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  try <text fill="#e8e8e8">{</text></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    await <text fill="#e8e8e8">navigator.clipboard.</text><text fill="#7ec8e3">writeText</text><text fill="#e8e8e8">(text);</text></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <text fill="#7ec8e3">showToast</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'복사 완료!'</text><text fill="#e8e8e8">);</text></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  } catch <text fill="#e8e8e8">(err) {</text></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    // 권한 거부 또는 비보안 컨텍스트</text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <text fill="#7ec8e3">fallbackCopy</text><text fill="#e8e8e8">(text);</text></text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <!-- Right: paste event + image -->
  <text x="450" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">붙여넣기 이미지 처리</text>

  <rect x="450" y="94" width="370" height="162" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">editor.<text fill="#7ec8e3">addEventListener</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'paste'</text><text fill="#e8e8e8">, e =&gt; {</text></text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  for <text fill="#e8e8e8">(</text><text fill="#7ec8e3">const <text fill="#e8e8e8">item of e.clipboardData.items)</text></text></text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  {</text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    if <text fill="#e8e8e8">(item.type.<text fill="#7ec8e3">startsWith</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'image/'</text><text fill="#e8e8e8">)) {</text></text></text>
  <text x="466" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">      const <text fill="#e8e8e8">blob = item.<text fill="#7ec8e3">getAsFile</text><text fill="#e8e8e8">();</text></text></text>
  <text x="466" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      <text fill="#7ec8e3">insertImage</text><text fill="#e8e8e8">(blob);</text></text>
  <text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    }</text>
  <text x="466" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="466" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">});</text>

  <!-- Bottom: copy event intercept -->
  <text x="60" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">copy 이벤트 가로채기 (커스텀 복사)</text>

  <rect x="60" y="298" width="760" height="106" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 복사 시 원본 외 추가 정보를 클립보드에 담기</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">document.<text fill="#7ec8e3">addEventListener</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'copy'</text><text fill="#e8e8e8">, e =&gt; {</text></text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  e.<text fill="#7ec8e3">preventDefault</text><text fill="#e8e8e8">();</text></text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  const <text fill="#e8e8e8">selected = window.<text fill="#7ec8e3">getSelection</text><text fill="#e8e8e8">().</text><text fill="#7ec8e3">toString</text><text fill="#e8e8e8">();</text></text></text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  e.clipboardData.<text fill="#7ec8e3">setData</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'text/plain'</text><text fill="#e8e8e8">, selected + </text><text fill="#ce9178">'\n출처: …'</text><text fill="#e8e8e8">);</text></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">});</text>
</svg>
