<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클립보드 코드 패턴</text>

  <!-- Left: writeText + readText -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">복사 버튼 구현</text>

  <rect x="60" y="94" width="370" height="162" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">async function <tspan fill="#ffffff">copyToClipboard(text) {</tspan></text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  try <tspan fill="#ffffff">{</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    await <tspan fill="#ffffff">navigator.clipboard.</tspan><tspan fill="#7ec8e3">writeText</tspan><tspan fill="#e8e8e8">(text);</tspan></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">showToast</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'복사 완료!'</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  } catch <tspan fill="#ffffff">(err) {</tspan></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    // 권한 거부 또는 비보안 컨텍스트</text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">fallbackCopy</tspan><tspan fill="#e8e8e8">(text);</tspan></text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Right: paste event + image -->
  <text x="450" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">붙여넣기 이미지 처리</text>

  <rect x="450" y="94" width="370" height="162" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">editor.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'paste'</tspan><tspan fill="#e8e8e8">, e =&gt; {</tspan></text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  for <tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3">const <tspan fill="#e8e8e8">item of e.clipboardData.items)</tspan></tspan></text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  {</text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    if <tspan fill="#ffffff">(item.type.<tspan fill="#7ec8e3">startsWith</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'image/'</tspan><tspan fill="#e8e8e8">)) {</tspan></tspan></text>
  <text x="466" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">      const <tspan fill="#ffffff">blob = item.<tspan fill="#7ec8e3">getAsFile</tspan><tspan fill="#e8e8e8">();</tspan></tspan></text>
  <text x="466" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3">insertImage</tspan><tspan fill="#e8e8e8">(blob);</tspan></text>
  <text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    }</text>
  <text x="466" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="466" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>

  <!-- Bottom: copy event intercept -->
  <text x="60" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">copy 이벤트 가로채기 (커스텀 복사)</text>

  <rect x="60" y="298" width="760" height="106" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 복사 시 원본 외 추가 정보를 클립보드에 담기</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">document.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'copy'</tspan><tspan fill="#e8e8e8">, e =&gt; {</tspan></text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  e.<tspan fill="#7ec8e3">preventDefault</tspan><tspan fill="#e8e8e8">();</tspan></text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  const <tspan fill="#ffffff">selected = window.<tspan fill="#7ec8e3">getSelection</tspan><tspan fill="#e8e8e8">().</tspan><tspan fill="#7ec8e3">toString</tspan><tspan fill="#e8e8e8">();</tspan></tspan></text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  e.clipboardData.<tspan fill="#7ec8e3">setData</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'text/plain'</tspan><tspan fill="#e8e8e8">, selected + </tspan><tspan fill="#ce9178">'\n출처: …'</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
</svg>
