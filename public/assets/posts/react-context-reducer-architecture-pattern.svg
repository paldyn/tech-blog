<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Context + useReducer 아키텍처</text>

  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrP" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- StateContext -->
  <rect x="60" y="80" width="220" height="80" rx="8" fill="#0d1212" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">StateContext</text>
  <text x="170" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">state 값만 담음</text>
  <text x="170" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3" text-anchor="middle">{ items, loading }</text>

  <!-- DispatchContext -->
  <rect x="60" y="186" width="220" height="80" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">DispatchContext</text>
  <text x="170" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">dispatch 함수만 담음</text>
  <text x="170" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc" text-anchor="middle">안정적 참조 — 리렌더 없음</text>

  <!-- useReducer -->
  <rect x="340" y="116" width="200" height="80" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">useReducer</text>
  <text x="440" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">(reducer, initialState)</text>
  <text x="440" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#ce9178" text-anchor="middle">→ [state, dispatch]</text>

  <!-- Arrows from useReducer to contexts -->
  <line x1="340" y1="140" x2="280" y2="120" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="340" y1="176" x2="280" y2="226" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrP)"/>

  <!-- Consumer components -->
  <rect x="590" y="80" width="240" height="60" rx="8" fill="#0d1212" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">읽기 전용 컴포넌트</text>
  <text x="710" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3" text-anchor="middle">useStateContext() — 상태 구독</text>

  <rect x="590" y="162" width="240" height="60" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">액션 전용 컴포넌트</text>
  <text x="710" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc" text-anchor="middle">useDispatchContext() — dispatch만</text>

  <rect x="590" y="244" width="240" height="60" rx="8" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="710" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">복합 컴포넌트</text>
  <text x="710" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">두 Context 모두 사용 가능</text>

  <!-- Connecting arrows to consumers -->
  <line x1="280" y1="120" x2="590" y2="110" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="280" y1="226" x2="590" y2="192" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrP)"/>

  <!-- Bottom summary -->
  <rect x="60" y="332" width="760" height="52" rx="8" fill="#0d1212" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">dispatch는 useReducer가 반환하는 안정된 참조 — Context value가 바뀌지 않아</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3" text-anchor="middle">액션 전용 컴포넌트는 state가 바뀌어도 리렌더되지 않는다</text>
</svg>
