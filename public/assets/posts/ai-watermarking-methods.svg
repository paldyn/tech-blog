<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AI 워터마킹 기법</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">텍스트·이미지·오디오 생성 콘텐츠의 출처 추적 방법</text>

  <!-- Text Watermarking -->
  <rect x="60" y="96" width="360" height="340" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">텍스트 워터마킹</text>

  <!-- Submethod 1: Token bias -->
  <rect x="76" y="134" width="328" height="80" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="96" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">토큰 편향 워터마킹</text>
  <text x="96" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">토큰을 red/green list로 분류</text>
  <text x="96" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">생성 시 green list 토큰을 편향적 선택</text>
  <text x="96" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">비밀 키로만 검출 가능 (Kirchenbauer 2023)</text>

  <!-- Submethod 2: Semantic -->
  <rect x="76" y="226" width="328" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="96" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">의미론적 워터마킹</text>
  <text x="96" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">동의어 선택 패턴에 숨겨진 신호</text>
  <text x="96" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">텍스트 수정 후에도 유지</text>

  <!-- Submethod 3: Stylometric -->
  <rect x="76" y="308" width="328" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="96" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">스타일로메트리</text>
  <text x="96" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">문체·어휘 패턴으로 출처 모델 식별</text>
  <text x="96" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">워터마크 아니지만 출처 귀인 가능</text>

  <!-- Image/Audio Watermarking -->
  <rect x="460" y="96" width="360" height="340" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">이미지/미디어 워터마킹</text>

  <!-- Submethod 1: Invisible watermark -->
  <rect x="476" y="134" width="328" height="80" rx="8" fill="#14101a" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="496" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">불가시 워터마크</text>
  <text x="496" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">픽셀 수준 노이즈로 신호 삽입</text>
  <text x="496" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사람 눈에는 보이지 않음</text>
  <text x="496" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">C2PA 표준, Google SynthID 이미지</text>

  <!-- Submethod 2: Frequency domain -->
  <rect x="476" y="226" width="328" height="70" rx="8" fill="#14101a" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="496" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">주파수 도메인 워터마킹</text>
  <text x="496" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DCT/DWT 변환 후 계수에 신호 삽입</text>
  <text x="496" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">압축·크롭·재인코딩에 강인</text>

  <!-- Submethod 3: Model fingerprint -->
  <rect x="476" y="308" width="328" height="60" rx="8" fill="#14101a" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="496" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">모델 핑거프린팅</text>
  <text x="496" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">생성 모델의 고유 패턴 학습·식별</text>
  <text x="496" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">어떤 모델이 만들었는지 분류</text>

  <!-- Bottom note -->
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">강인한 워터마크의 조건: 비가시성 · 강인성 · 검출 용이성 · 위조 불가성</text>
</svg>
