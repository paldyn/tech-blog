<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">렉시컬 스코프 vs 동적 스코프</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Lexical Scope (Static) vs Dynamic Scope</text>

  <!-- Lexical scope column -->
  <rect x="60" y="90" width="360" height="300" fill="#0d0d1a" rx="10" stroke="#1a1a3a" stroke-width="1.5"/>
  <text x="240" y="114" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">렉시컬 스코프 (JS)</text>
  <text x="240" y="132" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">선언 위치 기준</text>

  <rect x="76" y="142" width="328" height="228" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="162" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> x = <tspan fill="#b5cea8">1</tspan>;</text>
  <text x="92" y="180" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> foo() {</text>
  <text x="92" y="198" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // foo가 선언된 곳의 x</text>
  <text x="92" y="216" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  console.log(x); <tspan fill="#6a8aa0">// 1</tspan></text>
  <text x="92" y="234" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="92" y="252" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> bar() {</text>
  <text x="92" y="270" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> x = <tspan fill="#b5cea8">2</tspan>;</text>
  <text x="92" y="288" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // foo를 bar 안에서 호출해도</text>
  <text x="92" y="306" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  foo(); <tspan fill="#6a8aa0">// x=1 (선언 위치 기준)</tspan></text>
  <text x="92" y="324" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="92" y="342" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">bar(); <tspan fill="#6a8aa0">// 1 출력 ← 예측 가능</tspan></text>

  <!-- Dynamic scope (hypothetical) -->
  <rect x="460" y="90" width="360" height="300" fill="#1a0d0d" rx="10" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="640" y="114" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">동적 스코프 (JS 아님)</text>
  <text x="640" y="132" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">호출 위치 기준 (Bash, Perl 등)</text>

  <rect x="476" y="142" width="328" height="228" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="162" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> x = <tspan fill="#b5cea8">1</tspan>;</text>
  <text x="492" y="180" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> foo() {</text>
  <text x="492" y="198" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // 호출된 곳의 x?</text>
  <text x="492" y="216" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  console.log(x); <tspan fill="#e05555">// 2? (가상)</tspan></text>
  <text x="492" y="234" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="492" y="252" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> bar() {</text>
  <text x="492" y="270" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> x = <tspan fill="#b5cea8">2</tspan>;</text>
  <text x="492" y="288" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // bar 안에서 호출 → bar의 x 사용</text>
  <text x="492" y="306" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  foo(); <tspan fill="#e05555">// 2 출력? (동적 스코프)</tspan></text>
  <text x="492" y="324" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="492" y="342" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">bar(); <tspan fill="#6a8aa0">// ← 호출마다 다름!</tspan></text>

  <!-- Bottom summary -->
  <rect x="60" y="408" width="760" height="60" fill="#0d0d0d" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="432" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">JavaScript는 렉시컬(정적) 스코프를 사용합니다</text>
  <text x="440" y="454" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">스코프는 코드를 작성할 때(컴파일 시점) 결정되며, 실행 시 변하지 않습니다</text>

  <!-- Footer -->
  <text x="440" y="484" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
