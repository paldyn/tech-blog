<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">해결: None 센티넬 패턴</text>

  <!-- bad -->
  <rect x="60" y="78" width="760" height="44" rx="6" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text xml:space="preserve" x="80" y="106" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#e05555">✗ </tspan><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> add(item, bag=[]):</tspan><tspan fill="#9aa4b8">          # 공유되는 기본값</tspan></text>

  <!-- good -->
  <rect x="60" y="140" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#55c555">✔ </tspan><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> add(item, bag=</tspan><tspan fill="#7ec8e3" font-weight="600">None</tspan><tspan fill="#ffffff">):</tspan></text>
  <text xml:space="preserve" x="80" y="196" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> bag </tspan><tspan fill="#7ec8e3" font-weight="600">is</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">None</tspan><tspan fill="#ffffff">:</tspan></text>
  <text xml:space="preserve" x="80" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">        bag = []          </tspan><tspan fill="#9aa4b8"># 호출마다 새 리스트</tspan></text>
  <text xml:space="preserve" x="80" y="244" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    bag.append(item)</tspan></text>
  <text xml:space="preserve" x="80" y="262" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> bag</tspan></text>
</svg>
