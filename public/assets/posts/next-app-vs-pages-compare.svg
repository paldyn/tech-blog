<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">App Router vs Pages Router</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">Next.js 13+ App Router와 기존 Pages Router 비교</text>

  <!-- Header row -->
  <rect x="60" y="88" width="360" height="40" rx="6" fill="#10102a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="113" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">App Router (권장)</text>
  <rect x="460" y="88" width="360" height="40" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="640" y="113" text-anchor="middle" font-size="15" font-weight="700" fill="#888">Pages Router (레거시)</text>

  <!-- Row: 도입 시기 -->
  <rect x="60" y="140" width="360" height="50" rx="6" fill="#0a0a14" stroke="#333" stroke-width="1"/>
  <text x="240" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Next.js 13+ (2022)</text>
  <text x="240" y="180" text-anchor="middle" font-size="11" fill="#888">React 최신 기능 완벽 지원</text>
  <rect x="460" y="140" width="360" height="50" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="640" y="162" text-anchor="middle" font-size="13" fill="#888">Next.js 1 ~ 12 (2016~)</text>
  <text x="640" y="180" text-anchor="middle" font-size="11" fill="#666">안정적, 장기 유지보수</text>

  <!-- Row: Server Components -->
  <rect x="60" y="202" width="360" height="50" rx="6" fill="#0a0a14" stroke="#333" stroke-width="1"/>
  <text x="240" y="224" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Server Components 기본</text>
  <text x="240" y="242" text-anchor="middle" font-size="11" fill="#888">async/await 컴포넌트 가능</text>
  <rect x="460" y="202" width="360" height="50" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="640" y="224" text-anchor="middle" font-size="13" fill="#666">지원 안 함</text>
  <text x="640" y="242" text-anchor="middle" font-size="11" fill="#666">모든 컴포넌트가 클라이언트</text>

  <!-- Row: 데이터 페칭 -->
  <rect x="60" y="264" width="360" height="50" rx="6" fill="#0a0a14" stroke="#333" stroke-width="1"/>
  <text x="240" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">fetch() 확장 + Server Actions</text>
  <text x="240" y="304" text-anchor="middle" font-size="11" fill="#888">컴포넌트 내부에서 직접 fetch</text>
  <rect x="460" y="264" width="360" height="50" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="640" y="286" text-anchor="middle" font-size="13" fill="#888">getServerSideProps</text>
  <text x="640" y="304" text-anchor="middle" font-size="11" fill="#666">getStaticProps / getStaticPaths</text>

  <!-- Row: 레이아웃 -->
  <rect x="60" y="326" width="360" height="50" rx="6" fill="#0a0a14" stroke="#333" stroke-width="1"/>
  <text x="240" y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">layout.tsx 파일로 중첩 레이아웃</text>
  <text x="240" y="366" text-anchor="middle" font-size="11" fill="#888">자동 중첩, 상태 보존</text>
  <rect x="460" y="326" width="360" height="50" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="640" y="348" text-anchor="middle" font-size="13" fill="#888">_app.tsx 전역 레이아웃</text>
  <text x="640" y="366" text-anchor="middle" font-size="11" fill="#666">단일 레이아웃, 중첩 어려움</text>

  <!-- Row: 라우팅 -->
  <rect x="60" y="388" width="360" height="50" rx="6" fill="#0a0a14" stroke="#333" stroke-width="1"/>
  <text x="240" y="410" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">app/ 디렉토리 기반</text>
  <text x="240" y="428" text-anchor="middle" font-size="11" fill="#888">폴더 = 라우트 세그먼트</text>
  <rect x="460" y="388" width="360" height="50" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="640" y="410" text-anchor="middle" font-size="13" fill="#888">pages/ 디렉토리 기반</text>
  <text x="640" y="428" text-anchor="middle" font-size="11" fill="#666">파일명 = 라우트 경로</text>

  <!-- Divider -->
  <line x1="440" y1="88" x2="440" y2="450" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
