<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">쿠키 속성 완전 정리</text>
    <!-- Header row -->
    <rect x="60" y="62" width="760" height="32" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="180" y="83" text-anchor="middle" font-size="12" font-weight="600" fill="#888">속성</text>
    <text x="440" y="83" text-anchor="middle" font-size="12" font-weight="600" fill="#888">역할</text>
    <text x="700" y="83" text-anchor="middle" font-size="12" font-weight="600" fill="#888">주의사항</text>
    <line x1="300" y1="62" x2="300" y2="94" stroke="#333" stroke-width="1"/>
    <line x1="580" y1="62" x2="580" y2="94" stroke="#333" stroke-width="1"/>
    <!-- rows -->
    <!-- Expires -->
    <rect x="60" y="96" width="760" height="42" rx="0" fill="#0f1a2a" stroke="#2a3a4a" stroke-width="0.5"/>
    <text x="180" y="122" text-anchor="middle" font-size="13" fill="#7ec8e3">Expires</text>
    <text x="440" y="115" text-anchor="middle" font-size="11" fill="#e8e8e8">절대 만료 시간 (GMT 형식)</text>
    <text x="440" y="132" text-anchor="middle" font-size="10" fill="#888">Set-Cookie: id=x; Expires=Thu, 01 Jan 2026 00:00:00 GMT</text>
    <text x="700" y="122" text-anchor="middle" font-size="11" fill="#888">시간대 주의. Max-Age 우선.</text>
    <line x1="300" y1="96" x2="300" y2="138" stroke="#2a3a4a" stroke-width="0.5"/>
    <line x1="580" y1="96" x2="580" y2="138" stroke="#2a3a4a" stroke-width="0.5"/>
    <!-- Max-Age -->
    <rect x="60" y="140" width="760" height="42" rx="0" fill="#0f1a2a" stroke="#2a3a4a" stroke-width="0.5"/>
    <text x="180" y="166" text-anchor="middle" font-size="13" fill="#7ec8e3">Max-Age</text>
    <text x="440" y="159" text-anchor="middle" font-size="11" fill="#e8e8e8">상대 만료 초 (0이면 즉시 삭제)</text>
    <text x="440" y="176" text-anchor="middle" font-size="10" fill="#888">Set-Cookie: id=x; Max-Age=3600</text>
    <text x="700" y="166" text-anchor="middle" font-size="11" fill="#888">음수도 즉시 삭제. 권장 방식.</text>
    <line x1="300" y1="140" x2="300" y2="182" stroke="#2a3a4a" stroke-width="0.5"/>
    <line x1="580" y1="140" x2="580" y2="182" stroke="#2a3a4a" stroke-width="0.5"/>
    <!-- Domain -->
    <rect x="60" y="184" width="760" height="42" rx="0" fill="#0f2a1a" stroke="#2a4a2a" stroke-width="0.5"/>
    <text x="180" y="210" text-anchor="middle" font-size="13" fill="#55c555">Domain</text>
    <text x="440" y="203" text-anchor="middle" font-size="11" fill="#e8e8e8">전송 허용 도메인</text>
    <text x="440" y="220" text-anchor="middle" font-size="10" fill="#888">Domain=.example.com → 서브도메인 포함</text>
    <text x="700" y="210" text-anchor="middle" font-size="11" fill="#888">부모 도메인만 지정 가능</text>
    <line x1="300" y1="184" x2="300" y2="226" stroke="#2a4a2a" stroke-width="0.5"/>
    <line x1="580" y1="184" x2="580" y2="226" stroke="#2a4a2a" stroke-width="0.5"/>
    <!-- Path -->
    <rect x="60" y="228" width="760" height="42" rx="0" fill="#0f2a1a" stroke="#2a4a2a" stroke-width="0.5"/>
    <text x="180" y="254" text-anchor="middle" font-size="13" fill="#55c555">Path</text>
    <text x="440" y="247" text-anchor="middle" font-size="11" fill="#e8e8e8">전송 허용 URL 경로 접두사</text>
    <text x="440" y="264" text-anchor="middle" font-size="10" fill="#888">Path=/admin → /admin/* 경로에만 전송</text>
    <text x="700" y="254" text-anchor="middle" font-size="11" fill="#888">기본값: 현재 경로의 디렉토리</text>
    <line x1="300" y1="228" x2="300" y2="270" stroke="#2a4a2a" stroke-width="0.5"/>
    <line x1="580" y1="228" x2="580" y2="270" stroke="#2a4a2a" stroke-width="0.5"/>
    <!-- Secure -->
    <rect x="60" y="272" width="760" height="42" rx="0" fill="#2a0f0f" stroke="#4a2a2a" stroke-width="0.5"/>
    <text x="180" y="298" text-anchor="middle" font-size="13" fill="#e05555">Secure</text>
    <text x="440" y="291" text-anchor="middle" font-size="11" fill="#e8e8e8">HTTPS 연결에서만 전송</text>
    <text x="440" y="308" text-anchor="middle" font-size="10" fill="#888">Set-Cookie: sid=x; Secure</text>
    <text x="700" y="298" text-anchor="middle" font-size="11" fill="#888">localhost는 예외 허용</text>
    <line x1="300" y1="272" x2="300" y2="314" stroke="#4a2a2a" stroke-width="0.5"/>
    <line x1="580" y1="272" x2="580" y2="314" stroke="#4a2a2a" stroke-width="0.5"/>
    <!-- HttpOnly -->
    <rect x="60" y="316" width="760" height="42" rx="0" fill="#2a0f0f" stroke="#4a2a2a" stroke-width="0.5"/>
    <text x="180" y="342" text-anchor="middle" font-size="13" fill="#e05555">HttpOnly</text>
    <text x="440" y="335" text-anchor="middle" font-size="11" fill="#e8e8e8">JavaScript 접근 차단 (XSS 방어)</text>
    <text x="440" y="352" text-anchor="middle" font-size="10" fill="#888">document.cookie로 읽기 불가</text>
    <text x="700" y="342" text-anchor="middle" font-size="11" fill="#888">세션 쿠키에 필수</text>
    <line x1="300" y1="316" x2="300" y2="358" stroke="#4a2a2a" stroke-width="0.5"/>
    <line x1="580" y1="316" x2="580" y2="358" stroke="#4a2a2a" stroke-width="0.5"/>
    <!-- SameSite -->
    <rect x="60" y="360" width="760" height="42" rx="0" fill="#2a1a0f" stroke="#4a3a2a" stroke-width="0.5"/>
    <text x="180" y="386" text-anchor="middle" font-size="13" fill="#dd9955">SameSite</text>
    <text x="440" y="379" text-anchor="middle" font-size="11" fill="#e8e8e8">크로스사이트 전송 제어 (CSRF 방어)</text>
    <text x="440" y="396" text-anchor="middle" font-size="10" fill="#888">None|Lax|Strict — 기본값 Lax (Chrome 80+)</text>
    <text x="700" y="386" text-anchor="middle" font-size="11" fill="#888">None은 Secure 필수</text>
    <line x1="300" y1="360" x2="300" y2="402" stroke="#4a3a2a" stroke-width="0.5"/>
    <line x1="580" y1="360" x2="580" y2="402" stroke="#4a3a2a" stroke-width="0.5"/>
    <text x="440" y="462" text-anchor="middle" font-size="11" fill="#555">보안 세션 쿠키 권장: Secure + HttpOnly + SameSite=Lax + __Host- 프리픽스</text>
  </g>
</svg>
