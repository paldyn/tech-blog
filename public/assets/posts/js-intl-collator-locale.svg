<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">로케일별 정렬 비교</text>

  <!-- 로케일별 비교 박스들 -->
  <!-- Swedish -->
  <rect x="60" y="72" width="240" height="120" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="180" y="97" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">sv (스웨덴어)</text>
  <text x="180" y="120" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">z &lt; å &lt; ä &lt; ö</text>
  <text x="180" y="142" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">å·ä·ö는 별개 문자</text>
  <text x="180" y="162" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">알파벳 뒤에 위치</text>

  <!-- German -->
  <rect x="320" y="72" width="240" height="120" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="440" y="97" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">de (독일어)</text>
  <text x="440" y="120" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">ä ≈ ae, ö ≈ oe</text>
  <text x="440" y="142" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">움라우트는 ae·oe로</text>
  <text x="440" y="162" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">확장 처리</text>

  <!-- Korean -->
  <rect x="580" y="72" width="240" height="120" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="700" y="97" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">ko (한국어)</text>
  <text x="700" y="120" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">가 &lt; 나 &lt; 다 ... 하</text>
  <text x="700" y="142" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">한글 초성 기준 정렬</text>
  <text x="700" y="162" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">UCA 기반</text>

  <!-- 실용 패턴 코드 -->
  <rect x="60" y="218" width="760" height="222" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="244" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 실무 패턴: locale-aware 테이블 정렬</text>
  <text x="80" y="262" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">function</text>
  <text x="140" y="262" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> sortRows(rows, key, locale = </text>
  <text x="386" y="262" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'ko-KR'</text>
  <text x="440" y="262" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">) {</text>
  <text x="80" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  const</tspan><tspan fill="#ffffff"> col = new Intl.Collator(locale, {</tspan></text>
  
  <text x="80" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    numeric: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">, sensitivity: </tspan><tspan fill="#ce9178">'base'</tspan><tspan fill="#ffffff"> });</tspan></text>

  <text x="80" y="316" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">  return</text>
  <text x="134" y="316" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> [...rows].sort((a, b) =&gt;</text>
  <text x="80" y="334" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    col.compare(a[key], b[key]));</text>
  <text x="80" y="352" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">}</text>
  <text x="80" y="382" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// locales 지원 여부 확인</text>
  <text x="80" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">Intl.Collator.supportedLocalesOf([</tspan><tspan fill="#ce9178">'ko','ja','zh'</tspan><tspan fill="#ffffff">]);</tspan></text>

  <text x="80" y="418" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// → ['ko', 'ja', 'zh'] (지원하는 항목만 반환)</text>
</svg>
