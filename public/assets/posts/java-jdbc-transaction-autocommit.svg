<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">autoCommit — 기본값 true의 함정</text>

  <!-- true -->
  <rect x="60" y="84" width="370" height="200" fill="#101622" stroke="#e05555" stroke-width="1.5" rx="8"/>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">autoCommit = true (기본)</text>
  <rect x="80" y="128" width="330" height="48" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="96" y="157" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">executeUpdate(); <tspan fill="#9aa4b8">// 즉시 commit</tspan></text>
  <rect x="80" y="184" width="330" height="48" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="96" y="213" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">executeUpdate(); <tspan fill="#9aa4b8">// 즉시 commit</tspan></text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">문장마다 따로 확정 → 묶을 수 없다</text>

  <!-- false -->
  <rect x="450" y="84" width="370" height="200" fill="#101622" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="470" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">setAutoCommit(false)</text>
  <rect x="470" y="128" width="330" height="48" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="486" y="157" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">executeUpdate(); <tspan fill="#9aa4b8">// 보류</tspan></text>
  <rect x="470" y="184" width="330" height="48" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="486" y="213" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">executeUpdate(); <tspan fill="#9aa4b8">// 보류</tspan></text>
  <text x="470" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">commit() 호출 전까지 모아둔다 → 한 단위</text>

  <text x="60" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">여러 SQL을 트랜잭션으로 묶으려면 먼저 setAutoCommit(false)로 자동 확정을 꺼야 한다.</text>
</svg>
