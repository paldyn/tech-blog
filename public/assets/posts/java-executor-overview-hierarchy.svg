<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Executor 프레임워크 인터페이스 계층</text>

  <!-- Executor -->
  <rect x="340" y="62" width="200" height="50" rx="8" fill="#1a1a3a" stroke="#5a5a9e" stroke-width="2"/>
  <text x="440" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">«interface»</text>
  <text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">Executor</text>

  <!-- Arrow down -->
  <path d="M 440 112 L 440 140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="448" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">extends</text>

  <!-- ExecutorService -->
  <rect x="300" y="140" width="280" height="70" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="2"/>
  <text x="440" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">«interface»</text>
  <text x="440" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">ExecutorService</text>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">submit / invokeAll / shutdown</text>

  <!-- Arrow down left -->
  <path d="M 380 210 L 240 250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Arrow down right -->
  <path d="M 500 210 L 640 250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Arrow down center -->
  <path d="M 440 210 L 440 250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="360" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">implements</text>

  <!-- AbstractExecutorService -->
  <rect x="320" y="250" width="240" height="50" rx="8" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1.5"/>
  <text x="440" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">AbstractExecutorService</text>
  <text x="440" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">abstract class</text>

  <!-- ScheduledExecutorService -->
  <rect x="140" y="250" width="130" height="50" rx="8" fill="#2a2a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="205" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8e8e8">Scheduled</text>
  <text x="205" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8e8e8">ExecutorService</text>

  <!-- ForkJoinPool ancestor -->
  <rect x="610" y="250" width="130" height="50" rx="8" fill="#2a0a2a" stroke="#5a1a5a" stroke-width="1.5"/>
  <text x="675" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8e8e8">ForkJoinPool</text>
  <text x="675" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(work-stealing)</text>

  <!-- Arrows from AbstractExecutorService -->
  <path d="M 380 300 L 260 340" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 440 300 L 440 340" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 500 300 L 620 340" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ThreadPoolExecutor -->
  <rect x="340" y="340" width="200" height="50" rx="8" fill="#0a1a2a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ThreadPoolExecutor</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">핵심 구현체</text>

  <!-- ScheduledThreadPoolExecutor -->
  <rect x="140" y="340" width="160" height="50" rx="8" fill="#1a1a0a" stroke="#3a3a1a" stroke-width="1.5"/>
  <text x="220" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8e8e8">Scheduled</text>
  <text x="220" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8e8e8">ThreadPoolExecutor</text>

  <!-- VirtualThreadExecutor -->
  <rect x="580" y="340" width="200" height="50" rx="8" fill="#0a2a0a" stroke="#1a5a1a" stroke-width="1.5"/>
  <text x="680" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Virtual Thread</text>
  <text x="680" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Executors.newVirtualThreadPerTaskExecutor()</text>

  <!-- Executors factory -->
  <rect x="60" y="418" width="760" height="44" rx="8" fill="#1a1a0a" stroke="#4a4a1a" stroke-width="1"/>
  <text x="440" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09055">Executors (팩토리 클래스)</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">newFixedThreadPool / newCachedThreadPool / newSingleThreadExecutor / newScheduledThreadPool</text>
</svg>
