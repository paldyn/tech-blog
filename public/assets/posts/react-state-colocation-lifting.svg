<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">State 올리기(Lift Up) — 공유가 필요할 때</text>

  <!-- Before: both components have their own state -->
  <text x="220" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">공유 전 — 각자 독립 state</text>
  <rect x="60" y="86" width="340" height="270" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>

  <rect x="100" y="104" width="260" height="36" rx="6" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="230" y="128" text-anchor="middle" font-size="12" fill="#888">TemperatureForm (부모)</text>

  <rect x="84" y="158" width="140" height="60" rx="6" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="154" y="176" text-anchor="middle" font-size="12" fill="#7ec8e3">CelsiusInput</text>
  <text x="154" y="194" text-anchor="middle" font-size="11" fill="#888">celsius (state)</text>
  <text x="154" y="210" text-anchor="middle" font-size="11" fill="#888">서로 모름</text>

  <rect x="236" y="158" width="140" height="60" rx="6" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="306" y="176" text-anchor="middle" font-size="12" fill="#7ec8e3">FahrenheitInput</text>
  <text x="306" y="194" text-anchor="middle" font-size="11" fill="#888">fahrenheit (state)</text>
  <text x="306" y="210" text-anchor="middle" font-size="11" fill="#888">서로 모름</text>

  <text x="230" y="260" text-anchor="middle" font-size="12" fill="#e05555">문제: 두 입력값이 동기화 안 됨</text>
  <text x="230" y="278" text-anchor="middle" font-size="11" fill="#888">섭씨를 바꿔도 화씨가 자동으로 안 바뀜</text>
  <text x="230" y="298" text-anchor="middle" font-size="11" fill="#888">→ 두 state를 어떻게 연결하나?</text>

  <!-- After: state lifted to parent -->
  <text x="660" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">공유 후 — 부모로 state 올리기</text>
  <rect x="460" y="86" width="360" height="270" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>

  <rect x="500" y="104" width="280" height="60" rx="6" fill="#0f2a0f" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="640" y="124" text-anchor="middle" font-size="12" fill="#55c555">TemperatureForm (부모)</text>
  <text x="640" y="144" text-anchor="middle" font-size="11" fill="#55c555">celsius (state) — 공유 소스</text>

  <line x1="580" y1="164" x2="540" y2="200" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="164" x2="740" y2="200" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="528" y="188" font-size="10" fill="#7777cc">prop</text>
  <text x="718" y="188" font-size="10" fill="#7777cc">prop</text>

  <rect x="484" y="200" width="140" height="60" rx="6" fill="#0f1a2a" stroke="#2a3a5a" stroke-width="1"/>
  <text x="554" y="218" text-anchor="middle" font-size="12" fill="#7ec8e3">CelsiusInput</text>
  <text x="554" y="236" text-anchor="middle" font-size="11" fill="#888">value={celsius}</text>
  <text x="554" y="252" text-anchor="middle" font-size="11" fill="#888">onChange=...</text>

  <rect x="636" y="200" width="160" height="60" rx="6" fill="#0f1a2a" stroke="#2a3a5a" stroke-width="1"/>
  <text x="716" y="218" text-anchor="middle" font-size="12" fill="#7ec8e3">FahrenheitInput</text>
  <text x="716" y="236" text-anchor="middle" font-size="11" fill="#888">value={c*9/5+32}</text>
  <text x="716" y="252" text-anchor="middle" font-size="11" fill="#888">onChange=...</text>

  <text x="640" y="296" text-anchor="middle" font-size="12" fill="#55c555">해결: 부모 celsius를 바꾸면</text>
  <text x="640" y="312" text-anchor="middle" font-size="11" fill="#55c555">두 입력 모두 자동 동기화!</text>

  <!-- Bottom tip -->
  <text x="440" y="370" text-anchor="middle" font-size="12" fill="#888">두 컴포넌트가 같은 데이터를 필요로 한다면, 그 state를 가장 가까운 공통 부모로 올린다(Lift Up)</text>
  <text x="440" y="388" text-anchor="middle" font-size="12" fill="#888">반대로, 오직 한 컴포넌트만 쓰는 state는 그 컴포넌트 안에 두어야(colocate) 불필요한 리렌더를 막는다</text>
</svg>
