<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="zc-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
    <marker id="zc-arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="zc-arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ZGC 타임라인 — 거의 모든 작업이 동시(Concurrent)</text>

  <!-- Timeline section -->
  <text x="60" y="86" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">GC 사이클 — 3개의 미세 STW만 존재 (각 sub-ms)</text>

  <!-- baseline axis -->
  <line x1="60" y1="200" x2="820" y2="200" stroke="#444" stroke-width="1"/>
  <text x="60" y="232" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시간 →</text>

  <!-- Concurrent Mark band (green) -->
  <rect x="120" y="130" width="200" height="40" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Concurrent Mark</text>

  <!-- Concurrent Relocate band (green) -->
  <rect x="360" y="130" width="220" height="40" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Concurrent Relocate / Compact</text>

  <!-- Concurrent Remap band (green) -->
  <rect x="620" y="130" width="180" height="40" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Concurrent Remap</text>

  <!-- STW slivers (red thin) -->
  <rect x="108" y="124" width="10" height="52" rx="2" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>
  <rect x="346" y="124" width="10" height="52" rx="2" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>
  <rect x="606" y="124" width="10" height="52" rx="2" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>

  <!-- STW labels -->
  <text x="113" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="700" fill="#e05555">Pause Mark Start</text>
  <text x="351" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="700" fill="#e05555">Pause Mark End</text>
  <text x="611" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="700" fill="#e05555">Pause Relocate Start</text>

  <!-- legend under axis -->
  <rect x="120" y="246" width="18" height="14" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="146" y="258" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">앱과 동시에 진행 (concurrent)</text>
  <rect x="360" y="246" width="10" height="14" rx="2" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="378" y="258" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">STW (sub-ms, 힙 크기와 무관)</text>

  <!-- Pause vs heap size chart -->
  <text x="60" y="312" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">정지 시간 vs 힙 크기 — ZGC는 평평, 기존 GC는 증가</text>

  <!-- chart axes -->
  <line x1="120" y1="500" x2="800" y2="500" stroke="#666" stroke-width="1.5"/>
  <line x1="120" y1="340" x2="120" y2="500" stroke="#666" stroke-width="1.5"/>

  <text x="60" y="348" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정지</text>
  <text x="60" y="362" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시간</text>
  <text x="800" y="524" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">힙 크기 → (GB ~ 수 TB)</text>

  <!-- older GC line (grows) -->
  <path d="M 130 488 L 800 360" stroke="#e05555" stroke-width="2.5" fill="none" marker-end="url(#zc-arr-r)"/>
  <text x="700" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">기존 GC (힙 클수록 정지 ↑)</text>

  <!-- ZGC flat line -->
  <path d="M 130 480 L 786 480" stroke="#55c555" stroke-width="2.5" fill="none" marker-end="url(#zc-arr-g)"/>
  <text x="455" y="468" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555">ZGC (sub-ms로 평평 — 힙 크기 무관)</text>
</svg>
