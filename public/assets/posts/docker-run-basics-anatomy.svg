<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker run 명령 해부</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">명령어 구조와 각 구성 요소의 역할</text>

  <!-- Command anatomy boxes row -->
  <!-- docker box -->
  <rect x="60" y="108" width="88" height="44" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="75" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">docker</text>

  <!-- arrow -->
  <text x="152" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#555">›</text>

  <!-- run box -->
  <rect x="164" y="108" width="60" height="44" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="179" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">run</text>

  <!-- [OPTIONS] box -->
  <rect x="236" y="108" width="120" height="44" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1.5"/>
  <text x="252" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">[OPTIONS]</text>

  <!-- IMAGE box -->
  <rect x="368" y="108" width="100" height="44" rx="6" fill="#2d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="384" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">IMAGE</text>

  <!-- [COMMAND] box -->
  <rect x="480" y="108" width="120" height="44" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="492" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#9999cc">[COMMAND]</text>

  <!-- [ARG...] box -->
  <rect x="612" y="108" width="100" height="44" rx="6" fill="#1a1a30" stroke="#555588" stroke-width="1"/>
  <text x="628" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#9999cc">[ARG...]</text>

  <!-- Labels below boxes -->
  <text x="60" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CLI 바이너리</text>
  <text x="164" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서브커맨드</text>
  <text x="236" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실행 옵션 (반복 가능)</text>
  <text x="368" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이미지:태그 (필수)</text>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오버라이드 명령</text>
  <text x="612" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추가 인수</text>

  <!-- Divider -->
  <line x1="60" y1="192" x2="820" y2="192" stroke="#222" stroke-width="1"/>

  <!-- Section: 실행 흐름 -->
  <text x="60" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">실행 흐름</text>

  <!-- Flow step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="236" width="150" height="52" rx="8" fill="#111827" stroke="#333"/>
  <text x="135" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① 이미지 확인</text>
  <text x="135" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">로컬 캐시 조회</text>

  <!-- Arrow -->
  <polygon points="218,262 232,256 232,268" fill="#555"/>
  <line x1="210" y1="262" x2="232" y2="262" stroke="#555" stroke-width="2"/>

  <!-- Step 2 -->
  <rect x="236" y="236" width="150" height="52" rx="8" fill="#111827" stroke="#333"/>
  <text x="311" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">② 이미지 Pull</text>
  <text x="311" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">없으면 레지스트리에서</text>

  <!-- Arrow -->
  <polygon points="394,262 408,256 408,268" fill="#555"/>
  <line x1="386" y1="262" x2="408" y2="262" stroke="#555" stroke-width="2"/>

  <!-- Step 3 -->
  <rect x="412" y="236" width="150" height="52" rx="8" fill="#111827" stroke="#333"/>
  <text x="487" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ 컨테이너 생성</text>
  <text x="487" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">레이어 + 쓰기 레이어</text>

  <!-- Arrow -->
  <polygon points="570,262 584,256 584,268" fill="#555"/>
  <line x1="562" y1="262" x2="584" y2="262" stroke="#555" stroke-width="2"/>

  <!-- Step 4 -->
  <rect x="588" y="236" width="150" height="52" rx="8" fill="#111827" stroke="#333"/>
  <text x="663" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">④ 프로세스 시작</text>
  <text x="663" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PID 1로 CMD 실행</text>

  <!-- Code block -->
  <rect x="60" y="318" width="760" height="92" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본 예시: nginx 컨테이너를 백그라운드로 실행</text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3">run</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">-d</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">--name</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">web</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">-p</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#b5cea8">80:80</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">nginx:alpine</tspan>
  </text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># → 컨테이너 ID 64자리 hex 출력 후 백그라운드 실행</tspan>
  </text>

  <!-- Height: 440 -->
</svg>
