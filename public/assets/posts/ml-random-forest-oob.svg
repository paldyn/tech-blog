<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 450" style="background:#0a0a0a;border-radius:12px">
  <rect x="0" y="0" width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">OOB 오류 추정과 RandomForestClassifier</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">Out-of-Bag 샘플로 별도 검증 세트 없이 모델 평가</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- OOB Concept (Left) -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">OOB(Out-of-Bag) 개념: 부트스트랩에서 빠진 샘플 ≈ 37%</text>

  <rect x="60" y="115" width="370" height="154" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Data samples representation -->
  <text x="80" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원본 샘플 8개 → 부트스트랩(복원) → 미선택 ≈ OOB</text>

  <!-- Sample boxes (n=8 example) -->
  <rect x="80" y="145" width="26" height="22" rx="3" fill="#55c555" opacity="0.85"/>
  <text x="93" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">1</text>
  <rect x="110" y="145" width="26" height="22" rx="3" fill="#55c555" opacity="0.85"/>
  <text x="123" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">2</text>
  <rect x="140" y="145" width="26" height="22" rx="3" fill="#55c555" opacity="0.85"/>
  <text x="153" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">3</text>
  <rect x="170" y="145" width="26" height="22" rx="3" fill="#55c555" opacity="0.85"/>
  <text x="183" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">4</text>
  <rect x="200" y="145" width="26" height="22" rx="3" fill="#55c555" opacity="0.85"/>
  <text x="213" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">5</text>
  <rect x="230" y="145" width="26" height="22" rx="3" fill="#55c555" opacity="0.85"/>
  <text x="243" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">6</text>
  <rect x="260" y="145" width="26" height="22" rx="3" fill="#55c555" opacity="0.85"/>
  <text x="273" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">7</text>
  <rect x="290" y="145" width="26" height="22" rx="3" fill="#55c555" opacity="0.85"/>
  <text x="303" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">8</text>

  <!-- Tree 1 bootstrap -->
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">트리1 훈련:</text>
  <rect x="160" y="178" width="24" height="20" rx="3" fill="#7ec8e3" opacity="0.7"/>
  <text x="172" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">1</text>
  <rect x="188" y="178" width="24" height="20" rx="3" fill="#7ec8e3" opacity="0.7"/>
  <text x="200" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">1</text>
  <rect x="216" y="178" width="24" height="20" rx="3" fill="#7ec8e3" opacity="0.7"/>
  <text x="228" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">3</text>
  <rect x="244" y="178" width="24" height="20" rx="3" fill="#7ec8e3" opacity="0.7"/>
  <text x="256" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">5</text>
  <rect x="272" y="178" width="24" height="20" rx="3" fill="#7ec8e3" opacity="0.7"/>
  <text x="284" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">7</text>
  <rect x="300" y="178" width="24" height="20" rx="3" fill="#7ec8e3" opacity="0.7"/>
  <text x="312" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="700">8</text>
  <text x="330" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">×6</text>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">OOB(트리1):</text>
  <rect x="160" y="200" width="24" height="20" rx="3" fill="#e05555" opacity="0.6"/>
  <text x="172" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#fff" font-weight="700">2</text>
  <rect x="188" y="200" width="24" height="20" rx="3" fill="#e05555" opacity="0.6"/>
  <text x="200" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#fff" font-weight="700">4</text>
  <rect x="216" y="200" width="24" height="20" rx="3" fill="#e05555" opacity="0.6"/>
  <text x="228" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#fff" font-weight="700">6</text>

  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 샘플은 해당 샘플을 훈련에 쓰지 않은 트리들로만 예측</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 별도 검증 세트 없이 일반화 성능 추정 가능!</text>

  <!-- Feature Importance bar chart (Right) -->
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">특성 중요도 (Feature Importance)</text>
  <rect x="460" y="115" width="360" height="154" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Feature importance bars -->
  <text x="480" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">특성</text>
  <text x="680" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중요도</text>
  <line x1="480" y1="142" x2="800" y2="142" stroke="#333" stroke-width="1"/>

  <!-- Bar 1: petal length -->
  <text x="480" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">꽃잎 길이</text>
  <rect x="590" y="151" width="176" height="14" rx="3" fill="#7777cc" opacity="0.85"/>
  <text x="774" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">0.44</text>

  <!-- Bar 2: petal width -->
  <text x="480" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">꽃잎 너비</text>
  <rect x="590" y="173" width="156" height="14" rx="3" fill="#7777cc" opacity="0.7"/>
  <text x="754" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">0.39</text>

  <!-- Bar 3: sepal length -->
  <text x="480" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">꽃받침 길이</text>
  <rect x="590" y="195" width="60" height="14" rx="3" fill="#7777cc" opacity="0.5"/>
  <text x="658" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">0.15</text>

  <!-- Bar 4: sepal width -->
  <text x="480" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">꽃받침 너비</text>
  <rect x="590" y="217" width="8" height="14" rx="3" fill="#7777cc" opacity="0.35"/>
  <text x="606" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">0.02</text>

  <text x="480" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">불순도 감소 평균값 (MDI 방식, Iris 예시)</text>

  <!-- Code block -->
  <text x="60" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">RandomForestClassifier 핵심 파라미터</text>
  <rect x="60" y="297" width="760" height="120" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="319" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="120" y="319" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> sklearn.ensemble </text>
  <text x="266" y="319" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="317" y="319" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> RandomForestClassifier</text>

  <text x="76" y="337" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">rf = RandomForestClassifier(</text>
  <text x="76" y="355" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    n_estimators=</text>
  <text x="202" y="355" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">100</text>
  <text x="232" y="355" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">,  # 트리 개수 (많을수록 안정적)</text>
  <text x="76" y="373" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    max_features=</text>
  <text x="209" y="373" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'sqrt'</text>
  <text x="260" y="373" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">,  # 분기 시 랜덤 선택 특성 수</text>
  <text x="76" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    oob_score=</text>
  <text x="189" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">True</text>
  <text x="223" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">,     # OOB 정확도 자동 계산</text>
  <text x="76" y="409" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    random_state=</text>
  <text x="209" y="409" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">42</text>
  <text x="229" y="409" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>

  <!-- Footer note -->
  <text x="60" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">rf.oob_score_  →  OOB 정확도 (별도 교차 검증 없이 일반화 성능 확인)</text>
  <text x="480" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">rf.feature_importances_  →  각 특성 중요도 배열</text>

  <!-- Footer -->
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
