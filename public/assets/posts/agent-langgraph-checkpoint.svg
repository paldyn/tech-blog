<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LangGraph Checkpointer &amp; Human-in-the-Loop</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">체크포인트로 상태를 영속화하고 인간 승인 단계를 삽입하는 패턴</text>

  <!-- Thread 1 execution flow -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">thread_id: "conv-001" 실행 흐름</text>

  <!-- Step boxes -->
  <rect x="60" y="118" width="120" height="56" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Step 1</text>
  <text x="120" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">agent 실행</text>

  <line x1="180" y1="146" x2="218" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Checkpoint 1 -->
  <rect x="220" y="118" width="100" height="56" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="270" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">💾 저장</text>
  <text x="270" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">checkpoint-1</text>
  <text x="270" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">state snapshot</text>

  <line x1="320" y1="146" x2="358" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 - interrupt -->
  <rect x="360" y="118" width="140" height="56" rx="6" fill="#2a1a0a" stroke="#e0a855" stroke-width="2"/>
  <text x="430" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">interrupt_before</text>
  <text x="430" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사람 확인 대기</text>
  <text x="430" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">tools 노드 전</text>

  <!-- Human approval -->
  <rect x="360" y="218" width="140" height="56" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="430" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">👤 Human</text>
  <text x="430" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">승인 / 수정 / 거부</text>
  <text x="430" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">update_state()</text>

  <line x1="430" y1="174" x2="430" y2="218" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Approved arrow -->
  <line x1="500" y1="246" x2="558" y2="196" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="536" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">승인</text>

  <!-- Step 3 -->
  <rect x="560" y="118" width="120" height="56" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="620" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Step 3</text>
  <text x="620" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">tools 실행</text>

  <line x1="680" y1="146" x2="718" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Checkpoint 3 -->
  <rect x="720" y="118" width="100" height="56" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">💾 저장</text>
  <text x="770" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">checkpoint-3</text>
  <text x="770" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">state snapshot</text>

  <!-- Denied arrow -->
  <line x1="360" y1="255" x2="262" y2="255" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <text x="311" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">거부→ 롤백</text>

  <!-- Rollback to checkpoint-1 -->
  <path d="M 220 255 Q 200 300 220 146" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"
        fill="none" marker-end="url(#arr-r)"/>
  <text x="170" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">checkpoint-1로 복구</text>

  <!-- Code example -->
  <rect x="60" y="328" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Checkpointer 설정 및 Human-in-the-Loop</text>
  <text x="80" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="80" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      langgraph.checkpoint.memory </text>
  <text x="80" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                                   import</text>
  <text x="80" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                          MemorySaver</text>
  <text x="80" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">memory = MemorySaver()</text>
  <text x="80" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">app = graph.compile(checkpointer=memory, interrupt_before=[</text>
  <text x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    "tools"</text>
  <text x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">           ])</text>
</svg>
