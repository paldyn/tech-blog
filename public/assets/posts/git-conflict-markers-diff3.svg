<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">diff3 스타일: 공통 조상 포함</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">merge.conflictstyle=diff3 설정 시 세 개 구역으로 표시</text>

  <!-- Left: default style -->
  <text x="220" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">기본 스타일 (merge)</text>
  <rect x="60" y="114" width="320" height="184" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <rect x="60" y="114" width="320" height="18" fill="#1a1200" opacity="0.7"/>
  <text x="76" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8a020" xml:space="preserve">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</text>
  <text x="76" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">    return 30</text>
  <rect x="60" y="154" width="320" height="18" fill="#0d0d1a" opacity="0.7"/>
  <text x="76" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">=======</text>
  <text x="76" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">    return 60</text>
  <rect x="60" y="190" width="320" height="18" fill="#0d1a1a" opacity="0.7"/>
  <text x="76" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">&gt;&gt;&gt;&gt;&gt;&gt;&gt; feature</text>
  <text x="220" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">BASE(공통 조상) 정보 없음</text>
  <text x="220" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 어디서 갈라졌는지 불명확</text>

  <!-- Right: diff3 style -->
  <text x="660" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">diff3 스타일</text>
  <rect x="500" y="114" width="320" height="220" rx="6" fill="#000000" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="500" y="114" width="320" height="18" fill="#1a1200" opacity="0.7"/>
  <text x="516" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8a020" xml:space="preserve">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</text>
  <text x="516" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">    return 30</text>
  <!-- ||| BASE section -->
  <rect x="500" y="154" width="320" height="18" fill="#14140a" opacity="0.8"/>
  <text x="516" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">||||||| parent of abc1234</text>
  <text x="516" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">    return 10</text>
  <!-- === -->
  <rect x="500" y="190" width="320" height="18" fill="#0d0d1a" opacity="0.7"/>
  <text x="516" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">=======</text>
  <text x="516" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">    return 60</text>
  <rect x="500" y="226" width="320" height="18" fill="#0d1a1a" opacity="0.7"/>
  <text x="516" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">&gt;&gt;&gt;&gt;&gt;&gt;&gt; feature</text>
  <text x="660" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">BASE가 10이었음을 알 수 있다</text>
  <text x="660" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ main은 30, feature는 60으로 바꿈</text>

  <!-- Config command -->
  <rect x="60" y="340" width="760" height="66" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="88" y="364"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">diff3 스타일 활성화</text>
  <text x="88" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">git config --global merge.conflictstyle diff3</text>
  <text x="500" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # zdiff3 도 권장</text>
</svg>
