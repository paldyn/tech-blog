<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LLM 서빙 비용 최적화 레이어</text>

  <!-- 레이어 5 (최상단): 모델 선택 -->
  <rect x="120" y="68" width="640" height="56" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="2"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">① 모델 선택: 오버스펙 방지</text>
  <text x="440" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단순 분류→소형 모델 · 복잡 추론→대형 모델 · 라우팅으로 자동 선택</text>

  <!-- 레이어 4: 프롬프트 최적화 -->
  <rect x="90" y="136" width="700" height="56" rx="8" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="2"/>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">② 프롬프트 최적화: 입력 토큰 절감</text>
  <text x="440" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">불필요한 예시 제거 · 청크 크기 최적화 · 시스템 프롬프트 압축</text>

  <!-- 레이어 3: 캐싱 -->
  <rect x="60" y="204" width="760" height="56" rx="8" fill="#1a0f0a" stroke="#6e5a3a" stroke-width="2"/>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">③ 응답 캐싱: 중복 요청 완전 제거</text>
  <text x="440" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Semantic Cache(임베딩 유사도) + Exact Cache(해시) → 동일/유사 질문 재사용</text>

  <!-- 레이어 2: 배치 처리 -->
  <rect x="30" y="272" width="820" height="56" rx="8" fill="#1a0a1a" stroke="#6e3a6e" stroke-width="2"/>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">④ 배치 처리: GPU 활용률 극대화</text>
  <text x="440" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Continuous Batching · 오프라인 배치 스케줄링 · 공유 GPU 인스턴스</text>

  <!-- 레이어 1: 인프라 최적화 -->
  <rect x="60" y="340" width="760" height="56" rx="8" fill="#1a1a0a" stroke="#6e6e3a" stroke-width="2"/>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#b5cea8" text-anchor="middle">⑤ 인프라 최적화: 하드웨어 비용 절감</text>
  <text x="440" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">양자화(INT4/FP8) · 소형 GPU + 오프로드 · 스팟 인스턴스 활용</text>

  <!-- ── 비용 절감 효과 표 ── -->
  <rect x="60" y="412" width="760" height="68" rx="8" fill="#0f0f0f" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">전략별 예상 비용 절감률</text>

  <text x="120" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">① 모델 라우팅</text>
  <text x="120" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">40~70%</text>

  <text x="280" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">② 프롬프트 압축</text>
  <text x="280" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">20~40%</text>

  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">③ 응답 캐싱</text>
  <text x="440" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">30~80%</text>

  <text x="600" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">④ 배치 처리</text>
  <text x="600" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">2~5×</text>

  <text x="760" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">⑤ 양자화</text>
  <text x="760" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">50~75%</text>
</svg>
