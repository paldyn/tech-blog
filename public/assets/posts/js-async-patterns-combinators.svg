  <text x="545" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555" text-anchor="middle">느림</text>
  <circle cx="595" cy="165" r="12" fill="#0d2818" stroke="#4caf7d" stroke-width="1.2"/>
  <text x="595" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555" text-anchor="middle">느림</text>
  <rect x="466" y="200" width="158" height="24" rx="5" fill="#1a1200" stroke="#a07030" stroke-width="1"/>
  <text x="545" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#f4a942" text-anchor="middle">→ 가장 빠른 값</text>

  <text x="466" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">• 타임아웃 구현</text>
  <text x="466" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">• 가장 빠른 CDN 선택</text>
  <text x="466" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">• 실패도 race에 참여</text>

  <!-- Promise.any -->
  <rect x="660" y="68" width="190" height="340" rx="10" fill="#111" stroke="#7a3a7a" stroke-width="1.2"/>
  <text x="755" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#cc88cc" text-anchor="middle">Promise.any</text>
  <text x="755" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">첫 성공 반환</text>

  <circle cx="705" cy="150" r="12" fill="#2a0d0d" stroke="#e05252" stroke-width="1.2"/>
  <text x="705" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05252" text-anchor="middle">✗</text>
  <circle cx="755" cy="150" r="12" fill="#0d2818" stroke="#4caf7d" stroke-width="1.2"/>
  <text x="755" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#4caf7d" text-anchor="middle">✓</text>
  <circle cx="805" cy="150" r="12" fill="#2a0d0d" stroke="#e05252" stroke-width="1.2"/>
  <text x="805" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05252" text-anchor="middle">✗</text>
