  <text x="676" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">• 여러 소스 중 하나</text>
  <text x="676" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">• 전부 실패 시 AggregateError</text>
  <text x="676" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">• ES2021</text>

  <!-- Bottom note -->
