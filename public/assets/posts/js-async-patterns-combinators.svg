  <text x="125" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">전부 성공해야 이행</text>

  <circle cx="75" cy="150" r="12" fill="#0d2818" stroke="#4caf7d" stroke-width="1.2"/>
