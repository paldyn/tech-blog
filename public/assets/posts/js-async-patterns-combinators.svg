  <text x="335" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#8888ff" text-anchor="middle"> {status:"rejected",reason}, ...]</text>

  <text x="256" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">• 실패해도 계속 진행</text>
