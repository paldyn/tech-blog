<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">실전 활용 패턴</text>

  <!-- Partial code block -->
  <rect x="60" y="68" width="365" height="192" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">// Partial — 부분 업데이트</text>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan font-weight="600" fill="#7ec8e3">function</tspan> updateUser(</tspan>
    <tspan x="76" dy="20">  id: <tspan fill="#b5cea8">number</tspan>,</tspan>
    <tspan x="76" dy="20">  patch: <tspan font-weight="600" fill="#7ec8e3">Partial</tspan>&lt;User&gt;</tspan>
    <tspan x="76" dy="20">) {</tspan>
    <tspan x="76" dy="20">  <tspan fill="#9aa4b8">// id 외 나머지는 선택</tspan></tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">return</tspan> { ...getUser(id), ...patch };</tspan>
    <tspan x="76" dy="20">}</tspan>
  </text>

  <!-- Required code block -->
  <rect x="455" y="68" width="365" height="192" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="471" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">// Required — 검증 완료 타입</text>
  <text x="471" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="471" dy="0"><tspan font-weight="600" fill="#7ec8e3">interface</tspan> FormDraft {</tspan>
    <tspan x="471" dy="20">  name?: <tspan fill="#b5cea8">string</tspan>;</tspan>
    <tspan x="471" dy="20">  email?: <tspan fill="#b5cea8">string</tspan>;</tspan>
    <tspan x="471" dy="20">}</tspan>
    <tspan x="471" dy="20"><tspan font-weight="600" fill="#7ec8e3">type</tspan> ValidForm =</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Required</tspan>&lt;FormDraft&gt;;</tspan>
  </text>

  <!-- Readonly code block -->
  <rect x="60" y="282" width="365" height="192" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">// Readonly — 불변 객체</text>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan font-weight="600" fill="#7ec8e3">const</tspan> config:</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Readonly</tspan>&lt;AppConfig&gt; = {</tspan>
    <tspan x="76" dy="20">  apiUrl: <tspan fill="#ce9178">"https://api.example.com"</tspan>,</tspan>
    <tspan x="76" dy="20">  timeout: <tspan fill="#b5cea8">5000</tspan>,</tspan>
    <tspan x="76" dy="20">};</tspan>
    <tspan x="76" dy="20">config.apiUrl = <tspan fill="#ce9178">"x"</tspan>; <tspan fill="#e05555">// Error!</tspan></tspan>
  </text>

  <!-- Combination box -->
  <rect x="455" y="282" width="365" height="192" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="471" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">// 조합 패턴</text>
  <text x="471" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="471" dy="0"><tspan font-weight="600" fill="#7ec8e3">type</tspan> PartialReadonly&lt;T&gt; =</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Readonly</tspan>&lt;<tspan font-weight="600" fill="#7ec8e3">Partial</tspan>&lt;T&gt;&gt;;</tspan>
    <tspan x="471" dy="20"> </tspan>
    <tspan x="471" dy="20"><tspan font-weight="600" fill="#7ec8e3">type</tspan> Draft&lt;T&gt; =</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">Partial</tspan>&lt;<tspan font-weight="600" fill="#7ec8e3">Required</tspan>&lt;T&gt;&gt;;</tspan>
    <tspan x="471" dy="20"><tspan fill="#9aa4b8">// 필수화 후 선택 변환</tspan></tspan>
  </text>
</svg>
