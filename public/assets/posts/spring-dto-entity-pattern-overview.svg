<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">DTO ↔ Entity 패턴 — 계층별 역할 분리</text>

  <!-- 클라이언트 -->
  <rect x="60" y="90" width="140" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Client</text>
  <text x="130" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HTTP Request/Response</text>

  <!-- 화살표: Client → Controller (x2=280) -->
  <line x1="200" y1="120" x2="280" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="238" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JSON</text>

  <!-- Controller 레이어 -->
  <rect x="280" y="72" width="160" height="240" rx="8" fill="#0f1b0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="360" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Controller Layer</text>

  <!-- Box 1: y=104, h=52 → text at y+25=129, y+45=149 -->
  <rect x="296" y="104" width="128" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="360" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">RequestDTO</text>
  <text x="360" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">입력 데이터 수신</text>

  <!-- Box 2: y=172, h=52 → text at y+25=197, y+45=217 -->
  <rect x="296" y="172" width="128" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="360" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">ResponseDTO</text>
  <text x="360" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">출력 데이터 반환</text>

  <!-- Box 3: y=240, h=52 → text at y+25=265, y+45=285 -->
  <rect x="296" y="240" width="128" height="52" rx="6" fill="#1a2a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="360" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">@Valid</text>
  <text x="360" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">입력 유효성 검증</text>

  <!-- 화살표: Controller → Service (x2=520) -->
  <line x1="440" y1="190" x2="520" y2="190" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="479" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DTO</text>

  <!-- Service 레이어 -->
  <rect x="520" y="72" width="160" height="240" rx="8" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="600" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Service Layer</text>

  <!-- Box 4: y=104, h=52 → text at y+25=129, y+45=149 -->
  <rect x="536" y="104" width="128" height="52" rx="6" fill="#201528" stroke="#7777cc" stroke-width="1"/>
  <text x="600" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">비즈니스 로직</text>
  <text x="600" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DTO → Entity 변환</text>

  <!-- Box 5: y=172, h=52 → text at y+25=197, y+45=217 -->
  <rect x="536" y="172" width="128" height="52" rx="6" fill="#201528" stroke="#7777cc" stroke-width="1"/>
  <text x="600" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">도메인 연산</text>
  <text x="600" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">순수 비즈니스 처리</text>

  <!-- Box 6: y=240, h=52 → text at y+25=265, y+45=285 -->
  <rect x="536" y="240" width="128" height="52" rx="6" fill="#201528" stroke="#7777cc" stroke-width="1"/>
  <text x="600" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Entity → DTO 변환</text>
  <text x="600" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">결과 반환 준비</text>

  <!-- 화살표: Service → Repository (x2=760) -->
  <line x1="680" y1="190" x2="760" y2="190" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="719" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Entity</text>

  <!-- Repository 레이어 -->
  <rect x="760" y="120" width="60" height="140" rx="8" fill="#1a100a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="790" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#ce9178">Repo</text>
  <text x="790" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Entity</text>
  <text x="790" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">관리</text>
  <text x="790" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">DB</text>
  <text x="790" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">저장</text>
  <text x="790" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">조회</text>

  <!-- 구분선 -->
  <line x1="60" y1="360" x2="820" y2="360" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 핵심 원칙 섹션 -->
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">DTO vs Entity — 핵심 차이</text>

  <!-- DTO 박스 -->
  <rect x="60" y="408" width="360" height="88" rx="8" fill="#0f1b0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">DTO (Data Transfer Object)</text>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 계층 간 데이터 전달 전용</text>
  <text x="80" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 필요한 필드만 선택적으로 포함</text>
  <text x="80" y="487" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• @Valid 검증 어노테이션 부여 가능</text>

  <!-- Entity 박스 -->
  <rect x="460" y="408" width="360" height="88" rx="8" fill="#1a100a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="480" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">Entity</text>
  <text x="480" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 도메인 모델, JPA가 관리</text>
  <text x="480" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• DB 스키마와 1:1 매핑</text>
  <text x="480" y="487" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 비즈니스 로직·불변식 캡슐화</text>
</svg>
