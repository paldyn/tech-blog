<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">거짓 양성률 공식과 최적 해시 함수 수</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">m(비트 수), n(원소 수), k(해시 함수 수) 간의 관계</text>

    <!-- Left: FP formula -->
    <rect x="60" y="88" width="380" height="120" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="80" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 거짓 양성률 (FPR) 근사식</text>
    <text x="80" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">FPR ≈ (1 - e^(-kn/m))^k</text>
    <text x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 최적 k (FPR 최소화)</text>
    <text x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">k_opt = (m/n) * ln(2)</text>
    <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 최적 FPR ≈ 0.618^(m/n)</text>

    <!-- Right: practical examples table -->
    <rect x="480" y="88" width="360" height="120" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="660" y="110" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">실용 파라미터 (n=1,000,000)</text>
    <text x="500" y="132" font-size="12" fill="#888">목표 FPR</text>
    <text x="650" y="132" font-size="12" fill="#888">비트 수 m</text>
    <text x="810" y="132" font-size="12" fill="#888" text-anchor="end">k 수</text>
    <text x="500" y="152" font-size="12" fill="#e8e8e8">1% (0.01)</text>
    <text x="650" y="152" font-size="12" fill="#55c555">9.6 MB</text>
    <text x="810" y="152" font-size="12" fill="#55c555" text-anchor="end">7</text>
    <text x="500" y="172" font-size="12" fill="#e8e8e8">0.1% (0.001)</text>
    <text x="650" y="172" font-size="12" fill="#7ec8e3">14.4 MB</text>
    <text x="810" y="172" font-size="12" fill="#7ec8e3" text-anchor="end">10</text>
    <text x="500" y="192" font-size="12" fill="#e8e8e8">0.01% (0.0001)</text>
    <text x="650" y="192" font-size="12" fill="#ce9178">19.2 MB</text>
    <text x="810" y="192" font-size="12" fill="#ce9178" text-anchor="end">13</text>

    <!-- Divider -->
    <line x1="60" y1="228" x2="820" y2="228" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Use cases -->
    <text x="440" y="256" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">실제 사용 사례</text>

    <rect x="60" y="268" width="180" height="82" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="150" y="290" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Google Bigtable</text>
    <text x="150" y="310" font-size="11" fill="#888" text-anchor="middle">디스크 조회 전</text>
    <text x="150" y="328" font-size="11" fill="#888" text-anchor="middle">키 존재 여부 확인</text>

    <rect x="260" y="268" width="180" height="82" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="350" y="290" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Chrome 브라우저</text>
    <text x="350" y="310" font-size="11" fill="#888" text-anchor="middle">악성 URL 빠른</text>
    <text x="350" y="328" font-size="11" fill="#888" text-anchor="middle">1차 필터링</text>

    <rect x="460" y="268" width="180" height="82" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="550" y="290" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Cassandra</text>
    <text x="550" y="310" font-size="11" fill="#888" text-anchor="middle">SSTable 읽기 전</text>
    <text x="550" y="328" font-size="11" fill="#888" text-anchor="middle">키 조회 최적화</text>

    <rect x="660" y="268" width="160" height="82" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="740" y="290" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">비밀번호 검사</text>
    <text x="740" y="310" font-size="11" fill="#888" text-anchor="middle">유출된 비밀번호</text>
    <text x="740" y="328" font-size="11" fill="#888" text-anchor="middle">목록 조회</text>
  </g>
</svg>
