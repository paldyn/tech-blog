<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">git apply vs git am</text>

  <rect x="60" y="90" width="360" height="220" rx="10" fill="#10151f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="126" font-size="17" font-weight="600" fill="#7ec8e3" text-anchor="middle">git apply</text>
  <text x="80" y="162" font-size="13" fill="#ffffff">· 작업 트리(파일)만 변경</text>
  <text x="80" y="190" font-size="13" fill="#ffffff">· 커밋을 만들지 않음</text>
  <text x="80" y="218" font-size="13" fill="#ffffff">· 작성자 · 메시지 정보 없음</text>
  <text x="80" y="246" font-size="13" fill="#ffffff">· 순수 diff 패치에 적합</text>
  <text x="80" y="278" font-size="12" fill="#9aa4b8">git apply change.diff</text>

  <rect x="460" y="90" width="360" height="220" rx="10" fill="#10151f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="126" font-size="17" font-weight="600" fill="#55c555" text-anchor="middle">git am</text>
  <text x="480" y="162" font-size="13" fill="#ffffff">· 패치를 적용하고 커밋 생성</text>
  <text x="480" y="190" font-size="13" fill="#ffffff">· 작성자 · 날짜 그대로 보존</text>
  <text x="480" y="218" font-size="13" fill="#ffffff">· 커밋 메시지까지 복원</text>
  <text x="480" y="246" font-size="13" fill="#ffffff">· format-patch 결과에 적합</text>
  <text x="480" y="278" font-size="12" fill="#9aa4b8">git am 0001-fix.patch</text>

  <text x="60" y="344" font-size="13" fill="#888">"파일만 바꿀까, 커밋까지 만들까" 가 두 명령을 가르는 기준입니다.</text>
</svg>
