<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a">
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Fiber 링크드 리스트와 훅 순서</text>

  <!-- 정상 케이스 -->
  <text x="240" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">정상: 순서 일관</text>

  <!-- 렌더 1 -->
  <rect x="60" y="90" width="130" height="34" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">useState(0)</text>
  <line x1="190" y1="107" x2="210" y2="107" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrB)"/>

  <rect x="214" y="90" width="140" height="34" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="284" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">useEffect(fn)</text>
  <line x1="354" y1="107" x2="374" y2="107" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrB)"/>

  <rect x="378" y="90" width="140" height="34" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="448" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">useRef(null)</text>

  <text x="240" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">렌더 1</text>

  <!-- 렌더 2 (동일) -->
  <rect x="60" y="154" width="130" height="34" rx="6" fill="#0d1828" stroke="#55c555" stroke-width="1.5"/>
  <text x="125" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">useState(0)</text>
  <line x1="190" y1="171" x2="210" y2="171" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrB)"/>

  <rect x="214" y="154" width="140" height="34" rx="6" fill="#0d1828" stroke="#55c555" stroke-width="1.5"/>
  <text x="284" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">useEffect(fn)</text>
  <line x1="354" y1="171" x2="374" y2="171" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrB)"/>

  <rect x="378" y="154" width="140" height="34" rx="6" fill="#0d1828" stroke="#55c555" stroke-width="1.5"/>
  <text x="448" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">useRef(null)</text>

  <text x="240" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">렌더 2 — 동일 순서, 올바른 매칭</text>

  <!-- 구분선 -->
  <line x1="60" y1="220" x2="820" y2="220" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 잘못된 케이스 -->
  <text x="640" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">잘못됨: 조건부 훅</text>

  <rect x="540" y="90" width="130" height="34" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="605" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">useState(0)</text>
  <line x1="670" y1="107" x2="690" y2="107" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrB)"/>

  <rect x="694" y="90" width="140" height="34" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="764" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">useEffect(fn)</text>

  <text x="720" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">렌더 1 (isLoggedIn=true)</text>

  <!-- 렌더 2: 조건 false로 useEffect 스킵 -->
  <rect x="540" y="154" width="130" height="34" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="605" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">useState(0)</text>

  <rect x="694" y="154" width="140" height="34" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="764" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">useRef(null)</text>

  <text x="720" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">렌더 2 — 순서 어긋남! state 오염</text>

  <!-- 하단 요약 -->
  <rect x="60" y="240" width="760" height="160" rx="10" fill="#0a0e16" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">lint 규칙으로 강제</text>
  <text x="440" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">eslint-plugin-react-hooks 패키지</text>
  <text x="440" y="316" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">"rules-of-hooks": "error"</text>
  <text x="440" y="338" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">"exhaustive-deps": "warn"</text>
  <text x="440" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Vite, CRA, Next.js 등 기본 포함 — 경고 무시하지 말 것</text>
  <text x="440" y="386" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">커스텀 훅 이름은 반드시 use로 시작 (lint가 훅으로 인식)</text>
</svg>
