<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">인터페이스 상속 계층</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">extends로 타입 계층 구성</text>

  <!-- Base: Animal -->
  <rect x="320" y="84" width="240" height="80" rx="8" fill="#0d1627" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Animal</text>
  <text x="440" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">name: string</text>
  <text x="440" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">eat(): void</text>

  <!-- Arrow down left -->
  <line x1="390" y1="164" x2="300" y2="222" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <!-- Arrow down right -->
  <line x1="490" y1="164" x2="580" y2="222" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <text x="318" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">extends</text>
  <text x="520" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">extends</text>

  <!-- Dog -->
  <rect x="140" y="224" width="240" height="100" rx="8" fill="#130d2a" stroke="#7777cc" stroke-width="2"/>
  <text x="260" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Dog extends Animal</text>
  <text x="260" y="270" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">name: string (상속)</text>
  <text x="260" y="290" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">eat(): void (상속)</text>
  <text x="260" y="310" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">bark(): string (추가)</text>

  <!-- Cat -->
  <rect x="500" y="224" width="240" height="100" rx="8" fill="#0a2a10" stroke="#55c555" stroke-width="2"/>
  <text x="620" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Cat extends Animal</text>
  <text x="620" y="270" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">name: string (상속)</text>
  <text x="620" y="290" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">eat(): void (상속)</text>
  <text x="620" y="310" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">purr(): string (추가)</text>

  <!-- Code example -->
  <rect x="60" y="348" width="760" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">interface</text>
  <text x="70" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          Animal { name: </text>
  <text x="70" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                         string</text>
  <text x="70" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                ; eat(): </text>
  <text x="70" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                                          void</text>
  <text x="70" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                              }</text>
  <text x="70" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">interface</text>
  <text x="70" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          Dog </text>
  <text x="70" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">               extends</text>
  <text x="70" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                        Animal { bark(): </text>
  <text x="70" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                                          string</text>
  <text x="70" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                 }</text>
  <text x="70" y="428" text-anchor="start" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dog = Animal의 모든 멤버 + bark() — 서브타입 관계</text>
</svg>