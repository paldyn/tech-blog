<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CompletableFuture 조합 연산자</text>

  <!-- thenCombine -->
  <rect x="60" y="72" width="360" height="130" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">thenCombine(cf2, fn)</text>
  <text x="240" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">두 CF 모두 완료 후 결과를 fn으로 결합</text>
  <rect x="76" y="122" width="148" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CF1 → T</text>
  <rect x="236" y="122" width="168" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="320" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CF2 → U</text>
  <rect x="156" y="162" width="168" height="28" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">fn(T, U) → V</text>

  <!-- allOf -->
  <rect x="460" y="72" width="360" height="130" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">allOf(cf1, cf2, ...cfN)</text>
  <text x="640" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 CF가 완료될 때까지 대기 → CF&lt;Void&gt;</text>
  <rect x="476" y="122" width="80" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CF1</text>
  <rect x="566" y="122" width="80" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="606" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CF2</text>
  <rect x="656" y="122" width="80" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="696" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">...CFN</text>
  <rect x="556" y="162" width="168" height="28" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">CF&lt;Void&gt; (전부 완료)</text>

  <!-- anyOf -->
  <rect x="60" y="232" width="360" height="110" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">anyOf(cf1, cf2, ...cfN)</text>
  <text x="240" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">가장 먼저 완료된 CF 결과 반환</text>
  <rect x="76" y="282" width="80" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="116" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CF1 ✓</text>
  <rect x="166" y="282" width="80" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="206" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">CF2</text>
  <rect x="256" y="282" width="80" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="296" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">CF3</text>
  <rect x="136" y="318" width="168" height="18" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="220" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">CF&lt;Object&gt; 타입 소실 주의</text>

  <!-- acceptEither / applyToEither -->
  <rect x="460" y="232" width="360" height="110" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">applyToEither(cf2, fn)</text>
  <text x="640" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">둘 중 먼저 완료된 결과로 fn 실행</text>
  <rect x="476" y="282" width="148" height="28" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="550" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CF1 (T) 또는 CF2 (T)</text>
  <rect x="556" y="318" width="168" height="18" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">fn(T) → U (타입 유지)</text>

  <!-- Bottom summary -->
  <rect x="60" y="366" width="760" height="72" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">allOf 활용 팁: 결과 수집은 thenApply로 각 CF에서 join() 호출</text>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">CompletableFuture.allOf(cfs).thenApply(v -&gt; cfs.stream().map(CF::join).toList())</text>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">allOf 자체는 Void — 결과는 각 CF 참조에서 별도로 꺼내야 함</text>
</svg>
