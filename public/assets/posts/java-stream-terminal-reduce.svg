<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">reduce 동작 원리와 종료 연산 코드</text>

  <!-- reduce diagram -->
  <text x="80" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">reduce(0, Integer::sum) 단계별 실행</text>

  <!-- Step boxes -->
  <rect x="64" y="90" width="60" height="36" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="94" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">acc=0</text>

  <line x1="124" y1="108" x2="148" y2="108" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="152" y="90" width="60" height="36" fill="#0f1f30" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="182" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">+1=1</text>

  <line x1="212" y1="108" x2="236" y2="108" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="240" y="90" width="60" height="36" fill="#0f1f30" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="270" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">+2=3</text>

  <line x1="300" y1="108" x2="324" y2="108" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="328" y="90" width="60" height="36" fill="#0f1f30" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="358" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">+3=6</text>

  <line x1="388" y1="108" x2="412" y2="108" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="416" y="90" width="60" height="36" fill="#0f1f30" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="446" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">+4=10</text>

  <line x1="476" y1="108" x2="500" y2="108" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="504" y="90" width="80" height="36" fill="#1a3a5a" rx="4" stroke="#7ec8e3" stroke-width="2"/>
  <text x="544" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7ec8e3">+5=15</text>

  <text x="620" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">결과: 15</text>

  <!-- Left: reduce code -->
  <text x="80" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">reduce · count · findFirst</text>
  <rect x="64" y="168" width="368" height="200" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> nums = List.of(1, 2, 3, 4, 5);</tspan></text>
  <text x="80" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// identity + BinaryOperator</text>
  <text x="80" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> sum = nums.stream().reduce(0, Integer::sum);</tspan></text>
  <text x="80" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 15</text>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// identity 없음 → Optional</text>
  <text x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> max = nums.stream().reduce(Integer::max);</tspan></text>
  <text x="80" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// Optional.of(5)</text>
  <text x="80" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">long</tspan><tspan fill="#ffffff"> cnt = nums.stream().filter(n -&gt; n%2==0).count();</tspan></text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 2 (짝수 개수)</text>
  <text x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> first = nums.stream().filter(n -&gt; n &gt; 3).findFirst();</tspan></text>
  <text x="80" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// Optional.of(4)</text>

  <!-- Right: match + forEach -->
  <text x="476" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">match · forEach · toArray</text>
  <rect x="460" y="168" width="356" height="200" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> nums = List.of(2, 4, 6, 8);</tspan></text>
  <text x="476" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">boolean</tspan><tspan fill="#ffffff"> allEven = nums.stream().allMatch(n -&gt; n % 2 == 0);</tspan></text>
  <text x="476" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// true</text>
  <text x="476" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">boolean</tspan><tspan fill="#ffffff"> hasOdd = nums.stream().anyMatch(n -&gt; n % 2 != 0);</tspan></text>
  <text x="476" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// false</text>
  <text x="476" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 부수 효과 - 주로 출력용</text>
  <text x="476" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">nums.stream().forEach(System.out::println);</text>
  <text x="476" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 배열 변환</text>
  <text x="476" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Integer</tspan><tspan fill="#ffffff">[] arr = nums.stream().toArray(Integer[]::new);</tspan></text>
  <text x="476" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">[] prim = nums.stream().mapToInt(i -&gt; i).toArray();</tspan></text>

  <!-- Bottom: summaryStatistics -->
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">IntStream.summaryStatistics — 통계 한 번에</text>
  <rect x="64" y="408" width="752" height="40" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> stats = IntStream.rangeClosed(1, 100).summaryStatistics();</tspan></text>
  <text x="80" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// count=100, sum=5050, min=1, max=100, avg=50.5</text>
</svg>
