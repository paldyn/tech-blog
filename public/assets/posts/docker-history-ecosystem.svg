<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Docker 생태계의 진화</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">단일 도구 → 표준화된 오픈 생태계</text>

  <!-- Phase 1: Docker Inc. era -->
  <rect x="60" y="90" width="220" height="280" fill="#0d1020" stroke="#7777cc" stroke-width="1.5" rx="10"/>
  <text x="170" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">2013 — Docker Inc. 시대</text>
  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• Docker = 전부 (빌드+실행+배포)</text>
  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• LXC 기반 → libcontainer</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• Docker Hub 런칭</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• docker-compose 등장</text>
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• Swarm 클러스터링</text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">⚡ 개발자 경험 혁신</text>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">⚡ "Build once, run anywhere"</text>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">⚡ 이미지 레이어 캐싱 개념 정립</text>

  <!-- Arrow 1 -->
  <line x1="290" y1="230" x2="326" y2="230" stroke="#444" stroke-width="2"/>
  <polygon points="330,230 320,224 320,236" fill="#444"/>

  <!-- Phase 2: OCI/CNCF era -->
  <rect x="330" y="90" width="220" height="280" fill="#0d1a10" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">2015 — 표준화 시대</text>
  <text x="350" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• OCI(Open Container Initiative)</text>
  <text x="350" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• image-spec, runtime-spec</text>
  <text x="350" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• Kubernetes 1.0 출시</text>
  <text x="350" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• CRI (Container Runtime Interface)</text>
  <text x="350" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• containerd CNCF 기증(2017)</text>
  <text x="350" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">⚡ 런타임 교체 가능해짐</text>
  <text x="350" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">⚡ 특정 벤더 종속 탈피</text>
  <text x="350" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">⚡ 에코시스템 폭발적 성장</text>

  <!-- Arrow 2 -->
  <line x1="560" y1="230" x2="596" y2="230" stroke="#444" stroke-width="2"/>
  <polygon points="600,230 590,224 590,236" fill="#444"/>

  <!-- Phase 3: Modern era -->
  <rect x="600" y="90" width="220" height="280" fill="#1a1408" stroke="#e0a030" stroke-width="1.5" rx="10"/>
  <text x="710" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a030">2020~ — 현대 생태계</text>
  <text x="620" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• Docker Desktop 유료화(기업)</text>
  <text x="620" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• Podman / nerdctl 부상</text>
  <text x="620" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• BuildKit 기본화</text>
  <text x="620" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• multi-arch 이미지 표준화</text>
  <text x="620" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• Rootless 모드 안정화</text>
  <text x="620" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">⚡ 보안 강화</text>
  <text x="620" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">⚡ 대안 툴체인 다양화</text>
  <text x="620" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">⚡ Wasm 컨테이너 실험</text>

  <!-- Bottom label -->
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">현재 Docker CLI는 내부적으로 containerd + runc를 사용하는 얇은 클라이언트입니다</text>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">OCI 표준 덕분에 어느 호환 런타임에서도 동일한 이미지를 실행할 수 있습니다</text>
</svg>
