<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">디버깅 세션의 흐름</text>

  <defs>
    <marker id="pdbarr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="92" width="220" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="120" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">중단점 삽입</text>
  <text x="170" y="142" font-size="12" fill="#9aa4b8" text-anchor="middle">breakpoint()</text>

  <line x1="280" y1="124" x2="330" y2="124" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pdbarr)"/>

  <rect x="334" y="92" width="220" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="444" y="120" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">(Pdb) 프롬프트</text>
  <text x="444" y="142" font-size="12" fill="#9aa4b8" text-anchor="middle">실행이 멈춘 그 자리</text>

  <line x1="554" y1="124" x2="604" y2="124" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pdbarr)"/>

  <rect x="608" y="92" width="212" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="714" y="120" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">상태 관찰</text>
  <text x="714" y="142" font-size="12" fill="#9aa4b8" text-anchor="middle">p 변수 · l · w</text>

  <rect x="60" y="200" width="760" height="74" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 한 줄씩 따라가며 값을 확인</text>
  <text xml:space="preserve" x="78" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(Pdb) <tspan fill="#7ec8e3" font-weight="600">p</tspan> total</text>
  <text xml:space="preserve" x="300" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">42</text>
  <text xml:space="preserve" x="78" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(Pdb) <tspan fill="#7ec8e3" font-weight="600">n</tspan></text>
  <text xml:space="preserve" x="300" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 다음 줄로</text>
</svg>
