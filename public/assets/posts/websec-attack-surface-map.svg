  <line x1="230" y1="342" x2="339" y2="268" stroke="#e05555" stroke-width="1.5" marker-end="url(#arras)"/>

  <!-- Admin UI -->
  <rect x="650" y="100" width="170" height="65" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="735" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">관리자 인터페이스</text>
  <text x="735" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
