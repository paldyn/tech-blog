  <line x1="650" y1="132" x2="541" y2="232" stroke="#e05555" stroke-width="1.5" marker-end="url(#arras)"/>

  <!-- File Upload -->
  <rect x="650" y="205" width="170" height="65" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="735" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">파일 업로드</text>
  <text x="735" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이미지, 문서</text>
  <text x="735" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임포트 기능</text>
  <line x1="650" y1="245" x2="541" y2="245" stroke="#e05555" stroke-width="1.5" marker-end="url(#arras)"/>

  <!-- Config / Infra -->
  <rect x="650" y="310" width="170" height="65" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="735" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">설정 · 인프라</text>
  <text x="735" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">환경 변수 노출</text>
  <text x="735" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
