<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arras" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">공격 표면 (Attack Surface) 맵</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">공격자가 접근 가능한 모든 진입점</text>

  <!-- Center: Application -->
  <rect x="340" y="210" width="200" height="70" rx="10" fill="#1a2035" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">웹 애플리케이션</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">보호해야 할 핵심 시스템</text>

  <!-- Attack vectors -->
  <!-- User Input -->
  <rect x="60" y="100" width="170" height="65" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="145" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">사용자 입력</text>
  <text x="145" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">폼, URL 파라미터</text>
  <text x="145" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">헤더, 쿠키</text>
  <line x1="230" y1="132" x2="339" y2="232" stroke="#e05555" stroke-width="1.5" marker-end="url(#arras)"/>

  <!-- APIs -->
  <rect x="60" y="205" width="170" height="65" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="145" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">API 엔드포인트</text>
  <text x="145" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">REST, GraphQL</text>
  <text x="145" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">WebSocket</text>
  <line x1="230" y1="245" x2="339" y2="245" stroke="#e05555" stroke-width="1.5" marker-end="url(#arras)"/>

  <!-- Dependencies -->
  <rect x="60" y="310" width="170" height="65" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="145" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">서드파티 의존성</text>
  <text x="145" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
