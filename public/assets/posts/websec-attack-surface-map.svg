<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arra" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">웹 애플리케이션 공격 표면 지도</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">공격자가 접근할 수 있는 모든 진입점 — 표면이 클수록 위험이 높다</text>

  <!-- Center: App -->
  <rect x="340" y="200" width="200" height="100" rx="10" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">웹 애플리케이션</text>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">보호 대상 자산</text>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">데이터 · 로직 · 인프라</text>

  <!-- Attack surfaces: surrounding boxes -->
  <!-- Top: HTTP Endpoints -->
  <rect x="280" y="88" width="320" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">HTTP 엔드포인트 · API</text>
  <text x="440" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GET/POST · REST · GraphQL · WebSocket</text>
  <line x1="440" y1="148" x2="440" y2="200" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arra)"/>

  <!-- Left: User Input -->
  <rect x="60" y="170" width="220" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">사용자 입력</text>
  <text x="170" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">폼 · URL 파라미터 · 쿠키 · 헤더</text>
  <line x1="280" y1="200" x2="340" y2="230" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arra)"/>

  <!-- Right: Third-party -->
  <rect x="600" y="170" width="220" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">서드파티 연동</text>
  <text x="710" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">OAuth · 결제 · 외부 API · CDN</text>
  <line x1="600" y1="200" x2="540" y2="230" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arra)"/>

  <!-- Bottom-left: File Upload -->
  <rect x="60" y="340" width="220" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">파일 업로드</text>
  <text x="170" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이미지 · 문서 · 아카이브</text>
  <line x1="280" y1="360" x2="340" y2="295" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arra)"/>

  <!-- Bottom: Dependencies -->
  <rect x="280" y="370" width="320" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">의존성 · 라이브러리</text>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">npm · pip · Maven · OS 패키지</text>
  <line x1="440" y1="370" x2="440" y2="300" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arra)"/>

  <!-- Bottom-right: Admin Interface -->
  <rect x="600" y="340" width="220" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">관리자 인터페이스</text>
  <text x="710" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">어드민 패널 · SSH · 배포 스크립트</text>
  <line x1="600" y1="360" x2="540" y2="295" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arra)"/>

  <!-- Legend -->
  <rect x="60" y="453" width="760" height="50" rx="6" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="80" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공격 표면 축소 원칙: </text>
  <text x="210" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">① 불필요한 엔드포인트 제거  </text>
  <text x="430" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">② 입력 검증 강화  </text>
  <text x="570" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">③ 의존성 최소화</text>
  <text x="80" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">                   </text>
  <text x="210" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">④ 관리자 접근 제한  </text>
  <text x="430" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">⑤ 서드파티 감사  </text>
  <text x="570" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">⑥ 업로드 파일 격리</text>
</svg>
