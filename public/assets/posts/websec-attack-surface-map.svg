  <line x1="650" y1="342" x2="541" y2="268" stroke="#e05555" stroke-width="1.5" marker-end="url(#arras)"/>

  <!-- Bottom: reduction strategies -->
  <rect x="60" y="420" width="760" height="70" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">공격 표면 축소 전략</text>
  <text x="200" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">불필요한 기능 제거</text>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">최소 권한 원칙 적용</text>
  <text x="680" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">입력 화이트리스트</text>
  <text x="200" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">미사용 엔드포인트 비활성화</text>
  <text x="440" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">의존성 최소화 및 감사</text>
  <text x="680" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네트워크 분리</text>
</svg>
