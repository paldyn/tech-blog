<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr55c555" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr7ec8e3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CNN 계층적 특징 맵</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">저수준 → 중수준 → 고수준 특징으로 추상화</text>

  <!-- Input Image -->
  <rect x="36" y="100" width="100" height="100" fill="#1a2535" rx="4" stroke="#3a4560" stroke-width="1.5"/>
  <text x="86" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">입력</text>
  <text x="86" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">224×224</text>
  <text x="86" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RGB</text>

  <!-- Arrow 1 -->
  <line x1="136" y1="150" x2="175" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7ec8e3)"/>
  <text x="162" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Conv1-2</text>

  <!-- Layer 1: Low-level -->
  <rect x="178" y="85" width="130" height="130" fill="#101820" rx="6" stroke="#1e3a5a" stroke-width="1.5"/>
  <text x="243" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">저수준 특징</text>
  <text x="243" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">conv1 (64ch)</text>

  <!-- Feature map thumbnails for low level -->
  <g transform="translate(190, 132)">
    <!-- Horizontal edge map -->
    <rect x="0"  y="0" width="28" height="28" fill="#0a1218" rx="2" stroke="#1e3a5a" stroke-width="1"/>
    <line x1="0" y1="14" x2="28" y2="14" stroke="#55c555" stroke-width="2"/>
    <text x="14" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">수평 엣지</text>

    <!-- Vertical edge map -->
    <rect x="34" y="0" width="28" height="28" fill="#0a1218" rx="2" stroke="#1e3a5a" stroke-width="1"/>
    <line x1="47" y1="0" x2="47" y2="28" stroke="#ce9178" stroke-width="2"/>
    <text x="48" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">수직 엣지</text>

    <!-- Color map -->
    <rect x="68" y="0" width="28" height="28" fill="#1a0d1a" rx="2" stroke="#5a2060" stroke-width="1"/>
    <rect x="68" y="0" width="14" height="28" fill="#3a1a3a" rx="1"/>
    <text x="82" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">색상</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="308" y1="150" x2="347" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7ec8e3)"/>
  <text x="334" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Conv3-4</text>

  <!-- Layer 2: Mid-level -->
  <rect x="350" y="70" width="150" height="160" fill="#0d1520" rx="6" stroke="#2a3550" stroke-width="1.5"/>
  <text x="425" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">중수준 특징</text>
  <text x="425" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">conv3 (256ch)</text>

  <g transform="translate(360, 118)">
    <!-- Corner -->
    <rect x="0"  y="0" width="32" height="32" fill="#0a0d18" rx="2" stroke="#2a3550" stroke-width="1"/>
    <line x1="0" y1="20" x2="16" y2="20" stroke="#7777cc" stroke-width="1.5"/>
    <line x1="16" y1="20" x2="16" y2="0" stroke="#7777cc" stroke-width="1.5"/>
    <text x="16" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">코너</text>

    <!-- Texture -->
    <rect x="38" y="0" width="32" height="32" fill="#0a0d18" rx="2" stroke="#2a3550" stroke-width="1"/>
    <line x1="38" y1="8" x2="70" y2="8" stroke="#7777cc" stroke-width="1"/>
    <line x1="38" y1="16" x2="70" y2="16" stroke="#7777cc" stroke-width="1"/>
    <line x1="38" y1="24" x2="70" y2="24" stroke="#7777cc" stroke-width="1"/>
    <text x="54" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">질감</text>

    <!-- Circle -->
    <rect x="76" y="0" width="32" height="32" fill="#0a0d18" rx="2" stroke="#2a3550" stroke-width="1"/>
    <circle cx="92" cy="16" r="10" fill="none" stroke="#7777cc" stroke-width="1.5"/>
    <text x="92" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">곡선</text>

    <!-- Pattern -->
    <rect x="0"  y="52" width="32" height="32" fill="#0a0d18" rx="2" stroke="#2a3550" stroke-width="1"/>
    <rect x="4" y="56" width="10" height="10" fill="#7777cc" opacity="0.5" rx="1"/>
    <rect x="18" y="68" width="10" height="10" fill="#7777cc" opacity="0.5" rx="1"/>
    <text x="16" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">패턴</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="500" y1="150" x2="539" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7ec8e3)"/>
  <text x="526" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Conv5</text>

  <!-- Layer 3: High-level -->
  <rect x="542" y="60" width="160" height="180" fill="#0d1a10" rx="6" stroke="#1e4a20" stroke-width="1.5"/>
  <text x="622" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">고수준 특징</text>
  <text x="622" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">conv5 (512ch)</text>

  <g transform="translate(553, 108)">
    <!-- Eye -->
    <rect x="0"  y="0" width="36" height="36" fill="#081208" rx="2" stroke="#1e4a20" stroke-width="1"/>
    <ellipse cx="18" cy="18" rx="14" ry="8" fill="none" stroke="#55c555" stroke-width="1.5"/>
    <circle cx="18" cy="18" r="4" fill="#55c555" opacity="0.5"/>
    <text x="18" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">눈</text>

    <!-- Wheel -->
    <rect x="44" y="0" width="36" height="36" fill="#081208" rx="2" stroke="#1e4a20" stroke-width="1"/>
    <circle cx="62" cy="18" r="12" fill="none" stroke="#55c555" stroke-width="1.5"/>
    <circle cx="62" cy="18" r="4" fill="#55c555" opacity="0.5"/>
    <text x="62" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">바퀴</text>

    <!-- Face -->
    <rect x="88" y="0" width="36" height="36" fill="#081208" rx="2" stroke="#1e4a20" stroke-width="1"/>
    <circle cx="106" cy="15" r="12" fill="none" stroke="#55c555" stroke-width="1.5"/>
    <circle cx="101" cy="13" r="2" fill="#55c555" opacity="0.6"/>
    <circle cx="111" cy="13" r="2" fill="#55c555" opacity="0.6"/>
    <path d="M100 20 Q106 25 112 20" fill="none" stroke="#55c555" stroke-width="1.5"/>
    <text x="106" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">얼굴</text>

    <!-- Complex object -->
    <rect x="0" y="56" width="36" height="36" fill="#081208" rx="2" stroke="#1e4a20" stroke-width="1"/>
    <rect x="6" y="62" width="24" height="16" fill="none" stroke="#55c555" stroke-width="1.5" rx="2"/>
    <circle cx="11" cy="85" r="4" fill="none" stroke="#55c555" stroke-width="1.5"/>
    <circle cx="25" cy="85" r="4" fill="none" stroke="#55c555" stroke-width="1.5"/>
    <text x="18" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">자동차</text>
  </g>

  <!-- Arrow to Output -->
  <line x1="702" y1="150" x2="741" y2="150" stroke="#55c555" stroke-width="2" marker-end="url(#arr55c555)"/>

  <!-- Output -->
  <rect x="744" y="115" width="100" height="70" fill="#0d1a0d" rx="6" stroke="#1e5533" stroke-width="1.5"/>
  <text x="794" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">GAP</text>
  <text x="794" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ FC</text>
  <text x="794" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">분류</text>

  <!-- Size labels below -->
  <text x="86"  y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">224×224×3</text>
  <text x="243" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">112×112×64</text>
  <text x="425" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">28×28×256</text>
  <text x="622" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">7×7×512</text>

  <!-- Feature size decrease bar -->
  <rect x="36" y="275" width="808" height="14" fill="#111827" rx="3" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="36" y="275" width="808" height="14" fill="url(#grad)" rx="3"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7ec8e3;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#7777cc;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#55c555;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <text x="36" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">← 공간 해상도 감소 (크기 작아짐)</text>
  <text x="620" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">채널 수 증가 (추상성 높아짐) →</text>

  <!-- Bottom info boxes -->
  <rect x="36"  y="320" width="250" height="130" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="161" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">저수준 특징</text>
  <text x="56"  y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 엣지 (수평, 수직, 대각)</text>
  <text x="56"  y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 색상 블롭</text>
  <text x="56"  y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 그라디언트</text>
  <text x="56"  y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 학습 전 Gabor 필터와 유사</text>
  <text x="56"  y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 모든 이미지 도메인 공유 가능</text>

  <rect x="314" y="320" width="252" height="130" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">중수준 특징</text>
  <text x="334" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 코너, T자 교차점</text>
  <text x="334" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 반복 질감 패턴</text>
  <text x="334" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 원형·곡선 구조</text>
  <text x="334" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 부분적 객체 형태</text>
  <text x="334" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 도메인 간 전이 가능</text>

  <rect x="594" y="320" width="250" height="130" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="719" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">고수준 특징</text>
  <text x="614" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 눈, 코, 귀 등 부위</text>
  <text x="614" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 얼굴, 바퀴, 창문</text>
  <text x="614" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 도메인 특화 패턴</text>
  <text x="614" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 파인튜닝 시 주로 교체</text>
  <text x="614" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 분류 결정에 직접 관여</text>
</svg>
