<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <!-- background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">AppArmor vs SELinux 비교</text>

  <!-- Header row -->
  <rect x="60" y="62" width="760" height="36" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="270" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">AppArmor</text>
  <text x="644" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">SELinux</text>

  <!-- Row dividers -->
  <line x1="60" y1="98" x2="820" y2="98" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="134" x2="820" y2="134" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="170" x2="820" y2="170" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="206" x2="820" y2="206" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="242" x2="820" y2="242" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="278" x2="820" y2="278" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="314" x2="820" y2="314" stroke="#222" stroke-width="1"/>

  <!-- Column divider -->
  <line x1="460" y1="62" x2="460" y2="322" stroke="#222" stroke-width="1"/>
  <line x1="180" y1="62" x2="180" y2="322" stroke="#222" stroke-width="1"/>

  <!-- Row labels -->
  <text x="120" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">접근제어 방식</text>
  <text x="120" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정책 단위</text>
  <text x="120" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기본 배포판</text>
  <text x="120" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">설정 방식</text>
  <text x="120" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">복잡도</text>
  <text x="120" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Docker 통합</text>

  <!-- AppArmor values -->
  <text x="320" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">경로 기반 (Path-based MAC)</text>
  <text x="320" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">프로그램(프로파일)별</text>
  <text x="320" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Ubuntu, Debian, SUSE</text>
  <text x="320" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">텍스트 프로파일 파일</text>
  <text x="320" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">낮음 (배우기 쉬움)</text>
  <text x="320" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">--security-opt apparmor=프로파일</text>

  <!-- SELinux values -->
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">레이블 기반 (Label-based MAC)</text>
  <text x="640" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">타입(도메인)별</text>
  <text x="640" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">RHEL, Fedora, CentOS</text>
  <text x="640" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">정책 모듈 컴파일</text>
  <text x="640" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">높음 (학습 곡선 큼)</text>
  <text x="640" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">--security-opt label=type:...</text>

  <rect x="60" y="62" width="760" height="262" rx="6" fill="none" stroke="#333" stroke-width="1"/>

  <!-- MAC concept box -->
  <rect x="60" y="338" width="760" height="104" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">강제 접근 제어(MAC) vs 임의 접근 제어(DAC)</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DAC (일반 Unix 권한): 파일 소유자가 권한을 설정 — root는 모든 파일 접근 가능</text>
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MAC (AppArmor/SELinux): 커널 정책이 프로세스 권한을 강제 — root도 정책 밖 접근 불가</text>
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컨테이너가 root로 실행되더라도 AppArmor/SELinux 정책이 파일 접근을 추가로 제한한다</text>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Docker의 기본 AppArmor 프로파일: docker-default (자동 생성 &amp; 적용)</text>
</svg>
