<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }
      .label-en { font-size: 11px; fill: #666; letter-spacing: 0.12em; }
      .label-kr { font-size: 13px; fill: #999; }
      .label-main { font-size: 16px; font-weight: 600; fill: #e8e8e8; letter-spacing: 0.04em; }
      .desc { font-size: 12px; fill: #555; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- AI box -->
  <rect x="16" y="16" width="848" height="448" rx="10" fill="none" stroke="#2e2e2e" stroke-width="1.5"/>
  <text x="36" y="44" class="label-main">AI</text>
  <text x="60" y="44" class="label-en">ARTIFICIAL INTELLIGENCE</text>
  <text x="36" y="60" class="desc">기계가 스스로 판단하고 행동하도록 만드는 연구 분야 전체</text>

  <!-- ML box -->
  <rect x="56" y="76" width="768" height="372" rx="8" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="76" y="104" class="label-main">ML</text>
  <text x="103" y="104" class="label-en">MACHINE LEARNING</text>
  <text x="76" y="120" class="desc">데이터에서 패턴을 스스로 학습하는 방법론</text>

  <!-- DL box -->
  <rect x="96" y="136" width="688" height="296" rx="8" fill="none" stroke="#3d3d3d" stroke-width="1.5"/>
  <text x="116" y="164" class="label-main">DL</text>
  <text x="140" y="164" class="label-en">DEEP LEARNING</text>
  <text x="116" y="180" class="desc">다층 신경망 구조로 특징까지 스스로 학습하는 ML의 하위 기술</text>

  <!-- LLM box -->
  <rect x="136" y="196" width="608" height="220" rx="8" fill="#111" stroke="#4a4a4a" stroke-width="1.5"/>

  <!-- LLM inner accent line -->
  <rect x="136" y="196" width="608" height="4" rx="2" fill="#3a3a3a"/>

  <text x="156" y="228" class="label-main">LLM</text>
  <text x="198" y="228" class="label-en">LARGE LANGUAGE MODEL</text>
  <text x="156" y="248" class="desc">방대한 텍스트로 학습한 언어 특화 초대형 딥러닝 모델</text>

  <!-- LLM examples -->
  <text x="156" y="290" font-family="'Wanted Sans Variable', sans-serif" font-size="12" fill="#444">예시</text>

  <rect x="192" y="274" width="64" height="26" rx="13" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="224" y="291" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">GPT-4o</text>

  <rect x="264" y="274" width="64" height="26" rx="13" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="296" y="291" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">Claude</text>

  <rect x="336" y="274" width="64" height="26" rx="13" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="368" y="291" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">Gemini</text>

  <rect x="408" y="274" width="64" height="26" rx="13" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="440" y="291" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">Llama</text>

  <rect x="480" y="274" width="64" height="26" rx="13" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="512" y="291" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">Mistral</text>

  <!-- Note -->
  <text x="156" y="376" font-family="'Wanted Sans Variable', sans-serif" font-size="11" fill="#333">
    ※ LLM ⊂ DL ⊂ ML ⊂ AI  —  역은 성립하지 않습니다
  </text>
</svg>
