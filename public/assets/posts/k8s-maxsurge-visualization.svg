<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">maxSurge &amp; maxUnavailable 시각화</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">replicas: 4 기준, 절댓값과 퍼센트 모두 지원</text>

  <!-- Config A: maxSurge=1, maxUnavailable=0 (안전) -->
  <rect x="50" y="84" width="370" height="36" rx="6" fill="#121e38" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="107" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">A. 안전 우선 (maxSurge=1, maxUnavailable=0)</text>

  <!-- Config A pods row 1: before -->
  <text x="66" y="142"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">업데이트 중</text>
  <rect x="66" y="150" width="52" height="32" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="92" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v1</text>
  <rect x="126" y="150" width="52" height="32" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="152" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v1</text>
  <rect x="186" y="150" width="52" height="32" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="212" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v1</text>
  <rect x="246" y="150" width="52" height="32" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="272" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v1</text>
  <rect x="306" y="150" width="52" height="32" rx="4" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="332" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">v2 +1</text>

  <text x="370" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">총 5개</text>
  <text x="66" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">v1 종료 후 → v2 추가 반복 · 항상 4개 Ready 보장 · 느리지만 안전</text>

  <!-- Config B: maxSurge=0, maxUnavailable=1 (빠름) -->
  <rect x="50" y="218" width="370" height="36" rx="6" fill="#1a1428" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="241" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">B. 속도 우선 (maxSurge=0, maxUnavailable=1)</text>

  <text x="66" y="276"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">업데이트 중</text>
  <rect x="66" y="284" width="52" height="32" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="92" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">종료</text>
  <rect x="126" y="284" width="52" height="32" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="152" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v1</text>
  <rect x="186" y="284" width="52" height="32" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="212" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v1</text>
  <rect x="246" y="284" width="52" height="32" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="272" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v1</text>

  <text x="370" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">총 4개</text>
  <text x="66" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">v1 먼저 종료 → v2 투입 · 추가 노드 리소스 불필요 · 순간 3개만 서비스</text>

  <!-- Config C: maxSurge=25%, maxUnavailable=25% (균형) -->
  <rect x="460" y="84" width="370" height="36" rx="6" fill="#0a1f0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="107" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">C. 균형 (maxSurge=25%, maxUnavailable=25%)</text>

  <text x="476" y="142"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">업데이트 중 (replicas=4 기준)</text>
  <rect x="476" y="150" width="52" height="32" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="502" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v1</text>
  <rect x="536" y="150" width="52" height="32" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="562" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v1</text>
  <rect x="596" y="150" width="52" height="32" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="622" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v1</text>
  <rect x="656" y="150" width="52" height="32" rx="4" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="682" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">v2</text>
  <rect x="716" y="150" width="52" height="32" rx="4" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="742" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">v2</text>

  <text x="780" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">총 5개</text>
  <text x="476" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">surge=ceil(4×0.25)=1 · unavail=floor(4×0.25)=1</text>

  <!-- Formula boxes -->
  <rect x="460" y="218" width="370" height="160" rx="6" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">계산 공식</text>
  <text x="476" y="266"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">최대 Pod 수</text>
  <text x="590" y="266"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">= replicas + maxSurge</text>
  <text x="476" y="288"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">최소 Ready 수</text>
  <text x="590" y="288"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">= replicas - maxUnavailable</text>
  <text x="476" y="314"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">퍼센트 사용 시:</text>
  <text x="476" y="334"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">  maxSurge → ceil(replicas × 비율)</text>
  <text x="476" y="352"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">  maxUnavailable → floor(replicas × 비율)</text>
  <text x="476" y="372"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">  둘 다 0이 될 수 없음 (API 서버 검증)</text>

  <!-- Bottom constraint box -->
  <rect x="50" y="370" width="370" height="128" rx="6" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="235" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">제약 조건</text>
  <text x="66" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">· maxSurge=0이면 maxUnavailable ≥ 1 필수</text>
  <text x="66" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">· 둘 다 0이면 업데이트 불가 → 오류</text>
  <text x="66" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">· 기본값: maxSurge=25%, maxUnavailable=25%</text>
  <text x="66" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">· stateful 서비스: maxUnavailable=0 권장</text>

  <!-- Bottom combined formula -->
  <rect x="50" y="508" width="780" height="0" rx="0" fill="none"/>
</svg>
