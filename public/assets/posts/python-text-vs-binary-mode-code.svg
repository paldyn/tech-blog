<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">개행 문자와 인코딩 처리 비교</text>

  <!-- Left: newline handling -->
  <rect x="60" y="68" width="370" height="26" rx="4" fill="#1a2a4a"/>
  <text x="245" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">개행 문자 동작</text>

  <rect x="60" y="96" width="370" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Windows 파일: 내부 \r\n</text>
  <text xml:space="preserve" x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 텍스트 모드: \r\n → \n</text>
  <text xml:space="preserve" x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"win.txt"</tspan>, <tspan fill="#ce9178">"r"</tspan>) as f:</text>
  <text xml:space="preserve" x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    s = f.read()</text>
  <text xml:space="preserve" x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # s에는 \n만 포함</text>
  <text xml:space="preserve" x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이진 모드: 변환 없음</text>
  <text xml:space="preserve" x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"win.txt"</tspan>, <tspan fill="#ce9178">"rb"</tspan>) as f:</text>
  <text xml:space="preserve" x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    b = f.read()</text>
  <text xml:space="preserve" x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # b에는 \r\n 유지</text>
  <text xml:space="preserve" x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># newline='' : 변환 없이 str</text>
  <text xml:space="preserve" x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"data.csv"</tspan>, newline=<tspan fill="#ce9178">''</tspan>) as f:</text>
  <text xml:space="preserve" x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    reader = csv.reader(f)</text>
  <text xml:space="preserve" x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # csv가 직접 처리</text>

  <!-- Right: encoding -->
  <rect x="450" y="68" width="370" height="26" rx="4" fill="#2a1a4a"/>
  <text x="635" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">인코딩 변환</text>

  <rect x="450" y="96" width="370" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="466" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># str과 bytes 상호 변환</text>
  <text xml:space="preserve" x="466" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">s = <tspan fill="#ce9178">"안녕하세요"</tspan></text>
  <text xml:space="preserve" x="466" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">b = s.encode(<tspan fill="#ce9178">"utf-8"</tspan>)     <tspan fill="#9aa4b8"># str→bytes</tspan></text>
  <text xml:space="preserve" x="466" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">s2 = b.decode(<tspan fill="#ce9178">"utf-8"</tspan>)   <tspan fill="#9aa4b8"># bytes→str</tspan></text>
  <text xml:space="preserve" x="466" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 텍스트 모드: 자동 처리</text>
  <text xml:space="preserve" x="466" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"k.txt"</tspan>, <tspan fill="#ce9178">"w"</tspan>,</text>
  <text xml:space="preserve" x="466" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         encoding=<tspan fill="#ce9178">"utf-8"</tspan>) as f:</text>
  <text xml:space="preserve" x="466" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.write(<tspan fill="#ce9178">"한글"</tspan>)   <tspan fill="#9aa4b8"># str OK</tspan></text>
  <text xml:space="preserve" x="466" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이진 모드: 직접 변환 필요</text>
  <text xml:space="preserve" x="466" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"k.bin"</tspan>, <tspan fill="#ce9178">"wb"</tspan>) as f:</text>
  <text xml:space="preserve" x="466" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.write(<tspan fill="#ce9178">"한글"</tspan>.encode(<tspan fill="#ce9178">"utf-8"</tspan>))</text>
  <text xml:space="preserve" x="466" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # str 직접 쓰면 TypeError</text>

  <!-- Bottom -->
  <rect x="60" y="412" width="760" height="22" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">CSV는 newline='' 로 열어야 csv.reader가 개행을 올바르게 처리한다 (공식 문서 권장)</text>
</svg>
