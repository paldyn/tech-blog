<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">DOM 선택 메서드 비교</text>

  <!-- querySelector 계열 -->
  <rect x="60" y="72" width="360" height="200" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="97" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">querySelector 계열 (CSS 선택자)</text>

  <text x="80" y="120" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">querySelector(sel)</text>
  <text x="80" y="138" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">첫 번째 일치 요소 (없으면 null)</text>
  <text x="80" y="162" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">querySelectorAll(sel)</text>
  <text x="80" y="180" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">정적 NodeList — DOM 변경에 무반응</text>
  <text x="80" y="204" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">범위: document 또는 element</text>
  <text x="80" y="224" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">el.querySelectorAll('.item') — 하위만</text>
  <text x="80" y="248" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">장점: 복잡한 선택자 가능</text>
  <text x="80" y="266" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">단점: getElementsBy* 보다 느릴 수 있음</text>

  <!-- getElementById / getElementsBy* 계열 -->
  <rect x="460" y="72" width="360" height="200" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="97" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">getElementById 계열</text>

  <text x="480" y="120" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">getElementById(id)</text>
  <text x="480" y="138" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">id로 단일 요소 (document 전용)</text>
  <text x="480" y="162" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">getElementsByTagName(tag)</text>
  <text x="480" y="180" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">실시간 HTMLCollection</text>
  <text x="480" y="204" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">getElementsByClassName(cls)</text>
  <text x="480" y="222" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">실시간 HTMLCollection</text>
  <text x="480" y="248" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">장점: getElementById 매우 빠름</text>
  <text x="480" y="266" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">주의: 실시간 컬렉션 순회 시 부작용</text>

  <!-- 코드 블록 -->
  <rect x="60" y="296" width="760" height="160" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="322" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// querySelector — 가장 유연</text>
  <text x="80" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">document.querySelector(</tspan><tspan fill="#ce9178">'ul &gt; li:first-child'</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">document.querySelectorAll(</tspan><tspan fill="#ce9178">'[data-active="true"]'</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="388" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// :scope — 기준 요소 명시 (컨텍스트 범위)</text>
  <text x="80" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> parent = document.querySelector(</tspan><tspan fill="#ce9178">'.list'</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">parent.querySelectorAll(</tspan><tspan fill="#ce9178">':scope &gt; .item'</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="80" y="448" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// parent의 직접 자식 .item만 선택</text>
</svg>
