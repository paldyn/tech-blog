<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Graceful Shutdown 처리 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">SIGTERM 수신 → 진행 중 요청 완료 대기 → 자원 해제 → 종료</text>

  <!-- Phase 1: Signal -->
  <rect x="60" y="90" width="200" height="52" rx="8" fill="#3a1515" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">① SIGTERM 수신</text>
  <text x="160" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OS / 오케스트레이터 신호</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="116" x2="309" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Phase 2: Stop accepting -->
  <rect x="310" y="90" width="200" height="52" rx="8" fill="#111827" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="410" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">② 신규 요청 거부</text>
  <text x="410" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">포트 소켓 닫기</text>

  <!-- Arrow 2 -->
  <line x1="510" y1="116" x2="559" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Phase 3: Wait -->
  <rect x="560" y="90" width="260" height="52" rx="8" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">③ 진행 중 요청 완료 대기</text>
  <text x="690" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">timeout 내 처리 완료 시도</text>

  <!-- Vertical arrow down -->
  <line x1="690" y1="142" x2="690" y2="182" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Timeout branch -->
  <rect x="560" y="184" width="260" height="52" rx="8" fill="#111827" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="690" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">④ SmartLifecycle 종료</text>
  <text x="690" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">빈 destroy 역순 실행</text>

  <!-- Down arrow from phase 4 -->
  <line x1="690" y1="236" x2="690" y2="276" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Phase 5 -->
  <rect x="560" y="278" width="260" height="52" rx="8" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">⑤ JVM 종료</text>
  <text x="690" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ShutdownHook → 프로세스 exit</text>

  <!-- Timeout path (dashed) -->
  <path d="M 690 165 Q 820 165 820 240 Q 820 315 760 315"
        fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <text x="830" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">timeout</text>
  <text x="826" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">초과 시</text>
  <text x="822" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">강제 종료</text>

  <!-- Timeline bar -->
  <text x="60" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">타임라인 (기본 timeout 30s)</text>

  <rect x="60" y="380" width="760" height="30" rx="4" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="380" width="120" height="30" rx="4" fill="#3a1515" stroke="none"/>
  <text x="120" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">SIGTERM</text>

  <rect x="180" y="380" width="200" height="30" rx="0" fill="#0d1e0d" stroke="none"/>
  <text x="280" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">진행 중 요청 처리</text>

  <rect x="380" y="380" width="440" height="30" rx="0" fill="#111827" stroke="none"/>
  <text x="600" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빈 소멸 · JVM 종료</text>

  <!-- Config boxes -->
  <rect x="60" y="430" width="360" height="60" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">application.yml</text>
  <text x="80" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">server.shutdown: graceful</text>
  <text x="80" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">spring.lifecycle.timeout-per-shutdown-phase: 30s</text>

  <rect x="460" y="430" width="360" height="60" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Kubernetes 설정</text>
  <text x="480" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">terminationGracePeriodSeconds: 60</text>
  <text x="480" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">preStop: sleep 5  (LB 연결 끊길 시간 확보)</text>
</svg>
