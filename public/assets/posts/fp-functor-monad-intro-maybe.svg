<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Maybe 모나드 — null 안전 체인</text>

  <!-- Without Maybe -->
  <rect x="60" y="68" width="360" height="180" rx="8" fill="#1a0000" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">방어 코드 지옥</text>
  <rect x="76" y="104" width="328" height="132" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text x="163" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> getCity(user) {</text>
  <text x="92" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  if</text>
  <text x="116" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> (!user) </text>
  <text x="171" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text x="218" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> null</text>
  <text x="248" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">;</text>
  <text x="92" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  if</text>
  <text x="116" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> (!user.address) </text>
  <text x="239" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text x="286" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> null</text>
  <text x="316" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">;</text>
  <text x="92" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="148" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> user.address.city;</text>
  <text x="92" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="92" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// null 체크가 로직을 덮음</text>

  <!-- With Maybe -->
  <rect x="460" y="68" width="360" height="180" rx="8" fill="#001a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Maybe 모나드로 간결하게</text>
  <rect x="476" y="104" width="328" height="132" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Maybe 체인 — null 안전</text>
  <text x="492" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text x="563" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> getCity(user) {</text>
  <text x="492" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="549" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Maybe.of(user)</text>
  <text x="492" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    .map(u => u.address)</text>
  <text x="492" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    .map(a => a.city)</text>
  <text x="492" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    .getOrElse(</text>
  <text x="599" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'Unknown'</text>
  <text x="661" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>

  <!-- Optional chaining equivalent -->
  <rect x="60" y="270" width="760" height="160" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">JS에서 모나드적 패턴들</text>

  <rect x="76" y="306" width="728" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Optional chaining — JS 내장 Maybe</text>
  <text x="92" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text x="136" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> city = user?.address?.city ?? </text>
  <text x="358" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'Unknown'</text>
  <text x="410" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">;</text>
  <text x="92" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Array.flatMap — 배열 모나드</text>
  <text x="92" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">[[</text>
  <text x="104" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">1</text>
  <text x="113" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">,</text>
  <text x="120" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">2</text>
  <text x="129" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">], [</text>
  <text x="155" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">3</text>
  <text x="164" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">,</text>
  <text x="171" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">4</text>
  <text x="180" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">]].flatMap(x => x);  </text>
  <text x="370" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// → [1, 2, 3, 4]</text>
  <text x="92" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"></text>
</svg>
