<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">멀티홉 RAG 구현 패턴 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Iterative Retrieval vs IRCoT vs FLARE</text>

  <!-- Left: Iterative Retrieval -->
  <rect x="60" y="90" width="240" height="36" rx="6" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Iterative Retrieval</text>

  <rect x="60" y="136" width="240" height="150" rx="6" fill="#111" stroke="#333"/>
  <text x="180" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">고정 횟수(N) 반복 검색</text>
  <text x="180" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1. 쿼리 분해</text>
  <text x="180" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2. 하위 쿼리 1 검색</text>
  <text x="180" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3. 결과로 쿼리 2 생성</text>
  <text x="180" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">4. 쿼리 2 검색 ...</text>
  <text x="180" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">구현 단순 · 예측 가능</text>
  <text x="180" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">홉 수 고정으로 비효율 가능</text>

  <!-- Middle: IRCoT -->
  <rect x="320" y="90" width="240" height="36" rx="6" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">IRCoT</text>

  <rect x="320" y="136" width="240" height="150" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추론 사슬 기반 반복 검색</text>
  <text x="440" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1. CoT 추론 한 단계 생성</text>
  <text x="440" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2. 추론 근거 검색</text>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3. 근거로 다음 추론 생성</text>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">4. 완료까지 반복</text>
  <text x="440" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">추론과 검색 상호 보완</text>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">구현 복잡 · 지연시간 증가</text>

  <!-- Right: FLARE -->
  <rect x="580" y="90" width="240" height="36" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">FLARE</text>

  <rect x="580" y="136" width="240" height="150" rx="6" fill="#111" stroke="#333"/>
  <text x="700" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">능동적 검색 (불확실할 때만)</text>
  <text x="700" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1. 생성 중 토큰 확률 모니터</text>
  <text x="700" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2. 낮은 확률 → 검색 트리거</text>
  <text x="700" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3. 검색 후 재생성</text>
  <text x="700" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">4. 필요할 때만 검색</text>
  <text x="700" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">검색 횟수 최소화</text>
  <text x="700" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">토큰 확률 접근 필요</text>

  <!-- Code block -->
  <rect x="60" y="308" width="760" height="52" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># IRCoT 핵심 루프 패턴</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">while</text>
  <text x="116" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve"> not</text>
  <text x="144" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> is_complete(reasoning_chain):</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    next_thought = llm(context + reasoning_chain)</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">                                                   # 추론 생성</text>
</svg>
