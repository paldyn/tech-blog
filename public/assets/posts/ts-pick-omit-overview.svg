<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-pick" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-omit" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pick vs Omit: 타입 조각내기</text>

  <!-- Original Type -->
  <rect x="60" y="72" width="220" height="180" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">원본 타입 User</text>

  <!-- Properties with highlight indicators -->
  <rect x="72" y="104" width="8" height="16" fill="#55c555" rx="2"/>
  <text x="88" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">id: number</text>

  <rect x="72" y="124" width="8" height="16" fill="#55c555" rx="2"/>
  <text x="88" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">name: string</text>

  <rect x="72" y="144" width="8" height="16" fill="#e05555" rx="2"/>
  <text x="88" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">email: string</text>

  <rect x="72" y="164" width="8" height="16" fill="#e05555" rx="2"/>
  <text x="88" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">password: string</text>

  <rect x="72" y="184" width="8" height="16" fill="#55c555" rx="2"/>
  <text x="88" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">role: string</text>

  <rect x="72" y="204" width="8" height="16" fill="#e05555" rx="2"/>
  <text x="88" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">createdAt: Date</text>

  <!-- Legend -->
  <rect x="72" y="232" width="8" height="8" fill="#55c555" rx="1"/>
  <text x="86" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Pick 선택</text>
  <rect x="150" y="232" width="8" height="8" fill="#e05555" rx="1"/>
  <text x="164" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Omit 제거</text>

  <!-- Arrow to Pick -->
  <line x1="282" y1="130" x2="364" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-pick)"/>
  <text x="296" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Pick</text>

  <!-- Arrow to Omit -->
  <line x1="282" y1="200" x2="364" y2="280" stroke="#e05555" stroke-width="2" marker-end="url(#arr-omit)"/>
  <text x="288" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Omit</text>

  <!-- Pick result -->
  <rect x="366" y="72" width="220" height="140" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="476" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Pick&lt;User, "id"|"name"|"role"&gt;</text>
  <text x="382" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">id: number</text>
  <text x="382" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">name: string</text>
  <text x="382" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">role: string</text>
  <text x="382" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">선택한 키만 남김</text>

  <!-- Omit result -->
  <rect x="366" y="268" width="220" height="140" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="476" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Omit&lt;User, "email"|"password"|"createdAt"&gt;</text>
  <text x="382" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">id: number</text>
  <text x="382" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">name: string</text>
  <text x="382" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">role: string</text>
  <text x="382" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">지정한 키를 제외하고 남김</text>

  <!-- Right panel: comparison -->
  <rect x="620" y="72" width="200" height="170" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="720" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">선택 기준</text>
  <text x="636" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Pick — 화이트리스트</text>
  <text x="636" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">남길 키가 적을 때</text>
  <text x="636" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">명시적 허용 목록</text>
  <line x1="636" y1="170" x2="808" y2="170" stroke="#334155" stroke-width="1"/>
  <text x="636" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">Omit — 블랙리스트</text>
  <text x="636" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">제거할 키가 적을 때</text>
  <text x="636" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">명시적 거부 목록</text>

  <!-- Rule box -->
  <rect x="620" y="260" width="200" height="148" fill="#0d1117" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="720" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">결과 비교</text>
  <text x="636" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Pick&lt;T, K&gt;</text>
  <text x="636" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">= { [P in K]: T[P] }</text>
  <line x1="636" y1="338" x2="808" y2="338" stroke="#334155" stroke-width="1"/>
  <text x="636" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Omit&lt;T, K&gt;</text>
  <text x="636" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">= Pick&lt;T, Exclude&lt;</text>
  <text x="636" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">  keyof T, K&gt;&gt;</text>
</svg>
