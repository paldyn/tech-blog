<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-teal" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-grn" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">this 키워드의 3가지 용법</text>

  <!-- ── 용법 1: 필드 vs 매개변수 구별 ── -->
  <rect x="60" y="64" width="240" height="34" rx="7" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">① 필드 vs 매개변수 구별</text>

  <rect x="60" y="108" width="240" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">class</text>
  <text x="116" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> Book {</text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  String</text>
  <text x="132" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> title; </text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  Book(</text>
  <text x="130.8" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">String</text>
  <text x="177.8" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> title) {</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    this</text>
  <text x="138.6" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.title = title;</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  //필드    매개변수</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>

  <!-- 설명 박스 1 -->
  <rect x="60" y="256" width="240" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">this.title → 인스턴스 필드</text>
  <text x="180" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">title → 매개변수 (지역 변수)</text>

  <!-- ── 용법 2: 현재 객체 참조 반환 ── -->
  <rect x="320" y="64" width="240" height="34" rx="7" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">② 메서드 체이닝 (return this)</text>

  <rect x="320" y="108" width="240" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="336" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">class</text>
  <text x="376" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> Builder {</text>
  <text x="336" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  Builder name(</text>
  <text x="453.4" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">String</text>
  <text x="496" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> n)</text>
  <text x="336" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  {</text>
  <text x="336" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    this.name = n;</text>
  <text x="336" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    return this</text>
  <text x="453.4" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">;</text>
  <text x="336" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>

  <!-- 설명 박스 2 -->
  <rect x="320" y="256" width="240" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">return this → 자기 자신 반환</text>
  <text x="440" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메서드 체이닝 / 빌더 패턴 핵심</text>

  <!-- ── 용법 3: this() 생성자 위임 ── -->
  <rect x="580" y="64" width="240" height="34" rx="7" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="700" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">③ this() 생성자 위임</text>

  <rect x="580" y="108" width="240" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="596" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  Car() {</text>
  <text x="596" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    this</text>
  <text x="658.6" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">(</text>
  <text x="666.5" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"Unknown"</text>
  <text x="736.9" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, </text>
  <text x="744.7" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="752.6" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="596" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="596" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  Car(</text>
  <text x="643" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">String</text>
  <text x="689.9" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> m, </text>
  <text x="713.4" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">int</text>
  <text x="736.9" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> y) {</text>
  <text x="596" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    model=m; year=y;</text>
  <text x="596" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>

  <!-- 설명 박스 3 -->
  <rect x="580" y="256" width="240" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">this() → 같은 클래스 생성자 호출</text>
  <text x="700" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반드시 생성자 첫 줄, 한 번만 가능</text>

  <!-- ── 하단: this가 가리키는 것 ── -->
  <rect x="60" y="330" width="760" height="176" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="356" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">this는 무엇을 가리키는가?</text>

  <!-- 힙 객체 박스 -->
  <rect x="80" y="368" width="200" height="120" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">힙 — Car 객체</text>
  <text x="96" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">model:</text>
  <text x="150" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"Tesla"</text>
  <text x="96" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">year:</text>
  <text x="148" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">2024</text>
  <text x="96" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">주소: 0x4A2F</text>
  <text x="96" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">← this 가 바로 이 주소를 보유</text>

  <!-- 화살표: this → 객체 -->
  <line x1="400" y1="428" x2="284" y2="428" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arr-teal)"/>

  <!-- 설명 텍스트 -->
  <text x="430" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">• this는 현재 메서드(또는 생성자)를</text>
  <text x="430" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">  호출한 인스턴스의 참조(주소)를 보유</text>
  <text x="430" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">• static 메서드에서는 this 사용 불가</text>
  <text x="430" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">  (인스턴스와 무관하게 호출되므로)</text>
  <text x="430" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">• 컴파일러가 모든 인스턴스 메서드에</text>
  <text x="430" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">  숨겨진 첫 번째 매개변수로 전달</text>
</svg>
