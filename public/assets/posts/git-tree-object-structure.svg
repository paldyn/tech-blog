<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Git Tree 오브젝트 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">디렉터리 스냅샷을 저장하는 오브젝트</text>

  <!-- Tree object box -->
  <rect x="60" y="94" width="340" height="230" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">tree abc123</text>
  <!-- entries -->
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  mode  type  SHA              name</text>
  <line x1="76" y1="144" x2="384" y2="144" stroke="#222" stroke-width="1"/>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" xml:space="preserve">  <tspan fill="#b5cea8">100644</tspan><tspan fill="#888"> blob </tspan><tspan fill="#7ec8e3">8ab686e…</tspan><tspan fill="#ce9178"> README.md</tspan></text>
  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" xml:space="preserve">  <tspan fill="#b5cea8">100644</tspan><tspan fill="#888"> blob </tspan><tspan fill="#7ec8e3">f3a2b1c…</tspan><tspan fill="#ce9178"> main.js</tspan></text>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" xml:space="preserve">  <tspan fill="#b5cea8">100755</tspan><tspan fill="#888"> blob </tspan><tspan fill="#7ec8e3">9d1e4f2…</tspan><tspan fill="#ce9178"> run.sh</tspan></text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" xml:space="preserve">  <tspan fill="#b5cea8">040000</tspan><tspan fill="#888"> tree </tspan><tspan fill="#55c555">d7c3a9b…</tspan><tspan fill="#ce9178"> src/</tspan></text>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" xml:space="preserve">  <tspan fill="#b5cea8">160000</tspan><tspan fill="#888"> commit</tspan><tspan fill="#e05555"> e1f2b3c…</tspan><tspan fill="#ce9178"> vendor/</tspan></text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  ...</text>

  <!-- mode legend -->
  <rect x="76" y="276" width="308" height="40" fill="#111" rx="4"/>
  <text x="230" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">100644=일반파일  100755=실행파일</text>
  <text x="230" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">040000=디렉터리  160000=서브모듈</text>

  <!-- Arrows to blobs -->
  <!-- Arrow to blob 1 -->
  <line x1="400" y1="162" x2="460" y2="178" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="182" x2="460" y2="218" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="202" x2="460" y2="258" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Blob boxes -->
  <rect x="460" y="160" width="200" height="36" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">blob 8ab686e  README.md 내용</text>

  <rect x="460" y="202" width="200" height="36" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">blob f3a2b1c  main.js 내용</text>

  <rect x="460" y="244" width="200" height="36" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">blob 9d1e4f2  run.sh 내용</text>

  <!-- Arrow to sub-tree -->
  <line x1="400" y1="222" x2="460" y2="340" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Sub-tree -->
  <rect x="460" y="316" width="200" height="56" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="560" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">tree d7c3a9b (src/)</text>
  <text x="560" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">100644 blob … index.js</text>
  <text x="560" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">040000 tree … components/</text>

  <!-- Bottom: ls-tree commands -->
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">tree 조회 명령</text>

  <rect x="60" y="430" width="760" height="56" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git ls-tree</tspan><tspan fill="#ffffff"> HEAD             </tspan><tspan fill="#888"># 루트 tree 항목 나열</tspan></text>
  <text x="76" y="474" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git ls-tree</tspan><tspan fill="#ffffff"> -r HEAD          </tspan><tspan fill="#888"># 모든 파일 재귀 나열</tspan></text>
</svg>
