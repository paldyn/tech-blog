<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Pull Request가 만들어지는 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">브랜치 분기부터 base 브랜치 병합까지 5단계</text>

  <!-- Stage 1 -->
  <rect x="160" y="92" width="560" height="60" rx="8" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="184" y="116"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9988dd">① feature 브랜치 생성</text>
  <text x="184" y="136"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#aaaaaa">main에서 분기해 독립된 작업 공간을 확보한다</text>

  <line x1="440" y1="152" x2="440" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Stage 2 -->
  <rect x="160" y="188" width="560" height="60" rx="8" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="184" y="212"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9988dd">② 커밋 &amp; origin에 push</text>
  <text x="184" y="232"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#aaaaaa">변경을 커밋하고 원격 브랜치로 올린다</text>

  <line x1="440" y1="248" x2="440" y2="282" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Stage 3 -->
  <rect x="160" y="284" width="560" height="60" rx="8" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="184" y="308"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">③ Pull Request 열기</text>
  <text x="184" y="328"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#aaaaaa">base ← compare 브랜치를 비교해 변경을 제안한다</text>

  <line x1="440" y1="344" x2="440" y2="378" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Stage 4 -->
  <rect x="160" y="380" width="560" height="60" rx="8" fill="#1a150a" stroke="#e0955e" stroke-width="1.5"/>
  <text x="184" y="404"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0955e">④ 리뷰 &amp; 승인</text>
  <text x="184" y="424"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#aaaaaa">팀이 코드를 확인하고 CI 통과 여부를 검토한다</text>

  <line x1="440" y1="440" x2="440" y2="474" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Stage 5 -->
  <rect x="160" y="476" width="560" height="60" rx="8" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="184" y="500"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">⑤ Merge</text>
  <text x="184" y="520"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#aaaaaa">base 브랜치에 반영하고 작업 브랜치는 삭제한다</text>
</svg>
