<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TCP 4-way 핸드셰이크 (연결 종료)</text>

  <!-- Actor headers -->
  <rect x="80" y="68" width="160" height="44" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Active Close</text>

  <rect x="640" y="68" width="160" height="44" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Passive Close</text>

  <!-- Timeline lines -->
  <line x1="160" y1="112" x2="160" y2="500" stroke="#2a3a4a" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="720" y1="112" x2="720" y2="500" stroke="#2a4a2a" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Step 1: FIN -->
  <line x1="160" y1="155" x2="706" y2="195" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <rect x="290" y="138" width="240" height="38" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="410" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">FIN</text>
  <text x="410" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">seq=u  (더 이상 보낼 데이터 없음)</text>
  <text x="50" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">FIN_WAIT_1</text>

  <!-- Step 2: ACK -->
  <line x1="720" y1="240" x2="174" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <rect x="330" y="224" width="200" height="38" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="430" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">ACK</text>
  <text x="430" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ack=u+1</text>
  <text x="50" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">FIN_WAIT_2</text>
  <text x="726" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">CLOSE_WAIT</text>

  <!-- Half-close note -->
  <rect x="726" y="278" width="134" height="42" rx="4" fill="#1a2a1a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="793" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">잔여 데이터 전송</text>
  <text x="793" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">(Half-close 구간)</text>

  <!-- Step 3: FIN (from passive) -->
  <line x1="720" y1="350" x2="174" y2="380" stroke="#e05555" stroke-width="2" marker-end="url(#arr3)"/>
  <rect x="330" y="334" width="200" height="38" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="430" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">FIN</text>
  <text x="430" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">seq=v  (이제 닫겠음)</text>
  <text x="726" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">LAST_ACK</text>

  <!-- Step 4: ACK -->
  <line x1="160" y1="420" x2="706" y2="420" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <rect x="290" y="403" width="240" height="34" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="410" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">ACK</text>
  <text x="410" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ack=v+1</text>

  <!-- Final states -->
  <text x="50" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">TIME_WAIT</text>
  <text x="726" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">CLOSED</text>

  <!-- TIME_WAIT note -->
  <rect x="50" y="450" width="160" height="40" rx="4" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="130" y="467" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">TIME_WAIT: 2MSL 대기</text>
  <text x="130" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">후 CLOSED</text>

  <!-- Bottom note -->
  <rect x="60" y="500" width="760" height="22" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="515" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">4-way인 이유: FIN과 ACK이 분리됨 — 수신측이 잔여 데이터를 먼저 보낸 뒤 자신의 FIN을 전송</text>
</svg>
