<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" marketHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Sliding Window 파티셔닝 패턴</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">오래된 파티션 아웃, 새 파티션 인 — 메타데이터 조작으로 즉시 처리</text>

  <!-- Partition table -->
  <text x="60" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">파티션 테이블: SalesData</text>

  <!-- Old partition (to be removed) -->
  <rect x="60" y="116" width="110" height="60" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="115" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">P1: 2024-01</text>
  <text x="115" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">아웃 예정</text>
  <text x="115" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">3GB</text>

  <rect x="185" y="116" width="110" height="60" rx="6" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">P2: 2024-02</text>
  <text x="240" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">유지</text>

  <rect x="310" y="116" width="110" height="60" rx="6" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="365" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">P3: 2024-03</text>
  <text x="365" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">유지</text>

  <text x="450" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888">···</text>

  <rect x="490" y="116" width="110" height="60" rx="6" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="545" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">P12: 2024-12</text>
  <text x="545" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">유지</text>

  <!-- New partition (to be added) -->
  <rect x="620" y="116" width="110" height="60" rx="6" fill="#0a1a0e" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="675" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">P13: 2025-01</text>
  <text x="675" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">인 예정</text>

  <!-- Archive table -->
  <rect x="60" y="216" width="200" height="52" rx="6" fill="#1a1a0a" stroke="#888" stroke-width="1"/>
  <text x="160" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">아카이브 테이블</text>
  <text x="160" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SalesData_Archive (동일 구조)</text>

  <!-- Empty staging -->
  <rect x="580" y="216" width="200" height="52" rx="6" fill="#0a1a0e" stroke="#55c555" stroke-width="1"/>
  <text x="680" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">스테이징 테이블</text>
  <text x="680" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비어 있는 구조 (파티션 함수 동일)</text>

  <!-- Arrows: SWITCH OUT -->
  <line x1="115" y1="176" x2="115" y2="216" stroke="#e05555" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="125" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">SWITCH OUT</text>

  <!-- Arrow: SWITCH IN -->
  <line x1="675" y1="216" x2="675" y2="176" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="685" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">SWITCH IN</text>

  <!-- Code -->
  <rect x="60" y="292" width="760" height="152" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- Sliding Window: 오래된 파티션 아카이브로 스위치</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">ALTER TABLE SalesData SWITCH PARTITION 1</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  TO SalesData_Archive PARTITION 1;</text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 파티션 함수에 새 경계값 추가 (RIGHT 기준)</text>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">ALTER PARTITION FUNCTION pf_Monthly() SPLIT RANGE ('2025-02-01');</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 새 파티션에 스테이징 데이터 스위치 인</text>
  <text x="76" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">ALTER TABLE SalesData_Stage SWITCH TO SalesData PARTITION 14;</text>

  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SWITCH는 메타데이터만 변경 → 데이터 이동 없음 → 거의 즉시 완료</text>
</svg>
