<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring Boot CI/CD 파이프라인</text>

  <!-- CI 단계 레이블 -->
  <text x="440" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">CI (Continuous Integration)</text>

  <!-- CI 박스들 -->
  <rect x="40" y="96" width="130" height="56" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="105" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">① Push</text>
  <text x="105" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">feature 브랜치</text>

  <line x1="170" y1="124" x2="198" y2="124" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="200" y="96" width="130" height="56" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="265" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">② 빌드</text>
  <text x="265" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">gradle build</text>

  <line x1="330" y1="124" x2="358" y2="124" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="360" y="96" width="130" height="56" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="425" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 테스트</text>
  <text x="425" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단위/통합 테스트</text>

  <line x1="490" y1="124" x2="518" y2="124" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="520" y="96" width="130" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="585" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">④ 이미지 빌드</text>
  <text x="585" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">docker build &amp; push</text>

  <line x1="650" y1="124" x2="678" y2="124" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="680" y="96" width="130" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="745" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">⑤ Registry</text>
  <text x="745" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ECR / GHCR</text>

  <!-- CD 단계 레이블 -->
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">CD (Continuous Deployment)</text>

  <!-- CD 박스들 -->
  <rect x="200" y="202" width="130" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="265" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">⑥ 스테이징</text>
  <text x="265" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자동 배포</text>

  <!-- 화살표: Registry → 스테이징 (위에서 아래, 꺾임) -->
  <path d="M 745 152 L 745 170 L 265 170 L 265 202" fill="none" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <line x1="330" y1="230" x2="358" y2="230" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="360" y="202" width="130" height="56" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="425" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">⑦ 승인</text>
  <text x="425" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수동 검토 (선택)</text>

  <line x1="490" y1="230" x2="518" y2="230" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="520" y="202" width="130" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="585" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">⑧ 프로덕션</text>
  <text x="585" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">롤링/블루그린</text>

  <!-- GitHub Actions 코드 박스 -->
  <rect x="40" y="290" width="800" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># .github/workflows/ci.yml</text>
  <text x="60" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">on</text>
  <text x="84" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: {push: {branches: [main, develop]}}</text>
  <text x="60" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">jobs</text>
  <text x="100" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="60" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  build-and-push:</text>
  <text x="60" y="394" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    runs-on: ubuntu-latest</text>
  <text x="60" y="414" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    steps:</text>
  <text x="60" y="434" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      - uses: actions/checkout@v4</text>
  <text x="60" y="454" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      - uses: actions/setup-java@v4</text>
  <text x="60" y="474" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        with: {java-version: </text>
  <text x="310" y="474" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'21'</text>
  <text x="346" y="474" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, distribution: </text>
  <text x="460" y="474" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'temurin'</text>
  <text x="528" y="474" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="60" y="494" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      - run: ./gradlew build -x test</text>
</svg>
