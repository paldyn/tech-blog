<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 원시 타입 7종</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">JavaScript의 7가지 원시 타입을 TypeScript에서 표현</text>

  <!-- string -->
  <rect x="60" y="100" width="360" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="84" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#7ec8e3">string</text>
  <text x="84" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">텍스트 문자열. 작은따옴표, 큰따옴표, 백틱 모두 허용</text>
  <text x="380" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="end">"hello"  `world`</text>
  <text x="84" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">let name: string = "Alice";</text>

  <!-- number -->
  <rect x="460" y="100" width="360" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="484" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#7ec8e3">number</text>
  <text x="484" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정수 + 실수 통합. NaN, Infinity 포함. 64비트 부동소수</text>
  <text x="800" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="end">42  3.14  0xFF</text>
  <text x="484" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">let age: number = 25;</text>

  <!-- boolean -->
  <rect x="60" y="196" width="360" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="84" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#7ec8e3">boolean</text>
  <text x="84" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">참(true) 또는 거짓(false). 오직 두 값만 존재</text>
  <text x="380" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="end">true  false</text>
  <text x="84" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">let active: boolean = true;</text>

  <!-- bigint -->
  <rect x="460" y="196" width="360" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="484" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#7ec8e3">bigint</text>
  <text x="484" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">임의 정밀도 정수. 숫자 뒤에 n 붙임. ES2020+</text>
  <text x="800" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="end">9007199n  BigInt(99)</text>
  <text x="484" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">let big: bigint = 100n;</text>

  <!-- symbol -->
  <rect x="60" y="292" width="360" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="84" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#7ec8e3">symbol</text>
  <text x="84" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">유일하고 불변인 값. Symbol() 로 생성. ES2015+</text>
  <text x="380" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="end">Symbol("id")</text>
  <text x="84" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">let id: symbol = Symbol("id");</text>

  <!-- null -->
  <rect x="460" y="292" width="172" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="484" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#888">null</text>
  <text x="484" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">의도적 빈 값</text>
  <text x="484" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">= null;</text>

  <!-- undefined -->
  <rect x="648" y="292" width="172" height="80" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="672" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#888">undefined</text>
  <text x="672" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">미할당 값</text>
  <text x="672" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">= undefined;</text>

  <!-- Bottom note -->
  <rect x="60" y="392" width="760" height="76" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">strictNullChecks 모드에서</text>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">null과 undefined는 다른 타입에 할당할 수 없습니다</text>
  <text x="440" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">let name: string = null; // Error with strictNullChecks!</text>
</svg>
