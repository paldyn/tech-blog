<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 실행 흐름: 클라이언트 → DBMS</text>

  <!-- Client -->
  <rect x="60" y="70" width="160" height="60" rx="8" fill="#0d1a2a" stroke="#3a6a9e" stroke-width="1.5"/>
  <text x="140" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트</text>
  <text x="140" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">App / psql / DBeaver</text>

  <!-- Arrow: Client -> Parse -->
  <line x1="220" y1="100" x2="270" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="245" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TCP/IP</text>

  <!-- Parse -->
  <rect x="270" y="70" width="130" height="60" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="335" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">파서</text>
  <text x="335" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">구문 분석</text>

  <!-- Arrow: Parse -> Rewrite -->
  <line x1="400" y1="100" x2="440" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Rewrite -->
  <rect x="440" y="70" width="130" height="60" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="505" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">분석기</text>
  <text x="505" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">의미 검증</text>

  <!-- Arrow: Rewrite -> Optimizer -->
  <line x1="570" y1="100" x2="610" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Optimizer -->
  <rect x="610" y="70" width="130" height="60" rx="8" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">옵티마이저</text>
  <text x="675" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실행 계획 수립</text>

  <!-- Arrow: Optimizer -> Executor -->
  <line x1="675" y1="130" x2="675" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Executor -->
  <rect x="610" y="160" width="130" height="60" rx="8" fill="#1a0d1a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="675" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">실행기</text>
  <text x="675" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 데이터 접근</text>

  <!-- Arrow: Executor -> Storage -->
  <line x1="675" y1="220" x2="675" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Storage -->
  <rect x="610" y="250" width="130" height="60" rx="8" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="675" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">스토리지</text>
  <text x="675" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">디스크/버퍼풀</text>

  <!-- Return arrow: Storage -> Client -->
  <path d="M 610 280 Q 400 340 220 280 Q 180 260 140 220" stroke="#55c555" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arrg)"/>
  <text x="400" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">결과셋 반환 (ResultSet)</text>

  <!-- Detail boxes -->
  <rect x="60" y="175" width="500" height="240" rx="8" fill="#0a0a10" stroke="#2a2a4a" stroke-width="1"/>
  <text x="310" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">각 단계 세부 설명</text>

  <text x="80" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">1. 파서 (Parser)</text>
  <text x="80" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SQL 텍스트를 토큰화 → AST(추상 구문 트리) 생성. 문법 오류 시 즉시 거부.</text>

  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">2. 분석기 (Analyzer / Semantic Check)</text>
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테이블·열 존재 여부, 타입 호환성, 권한(ACL) 검증. 카탈로그(메타데이터) 조회.</text>

  <text x="80" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">3. 옵티마이저 (Query Optimizer)</text>
  <text x="80" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">통계(Statistics) 기반으로 최저 비용 실행 계획(Execution Plan) 선택.</text>
  <text x="80" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인덱스 사용 여부, 조인 순서·알고리즘 결정. EXPLAIN으로 확인 가능.</text>

  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">4. 실행기 (Executor)</text>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">플랜 트리를 순서대로 실행. 버퍼 풀에서 페이지 로드, 잠금(Lock) 획득.</text>
</svg>
