<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SQL 클라이언트-서버 프로토콜 흐름</text>

  <defs>
    <marker id="arW" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arC" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arO" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Left: Application -->
  <rect x="30" y="80" width="140" height="60" fill="#0f1320" stroke="#7777cc" stroke-width="2" rx="8"/>
  <text x="100" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">애플리케이션</text>
  <text x="100" y="124" text-anchor="middle" font-size="11" fill="#888">JDBC / psycopg2</text>

  <!-- Arrow 1: app -> network -->
  <line x1="170" y1="110" x2="210" y2="110" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arW)"/>
  <text x="190" y="103" text-anchor="middle" font-size="10" fill="#888">TCP</text>

  <!-- Network/Protocol box -->
  <rect x="210" y="80" width="130" height="60" fill="#0f1320" stroke="#3a4a6e" stroke-width="1.5" rx="8"/>
  <text x="275" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#9aa4b8">네트워크</text>
  <text x="275" y="122" text-anchor="middle" font-size="11" fill="#888">PostgreSQL Wire</text>
  <text x="275" y="134" text-anchor="middle" font-size="11" fill="#888">MySQL Protocol</text>

  <!-- Arrow 2: network -> server -->
  <line x1="340" y1="110" x2="380" y2="110" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arW)"/>

  <!-- Server box (tall) -->
  <rect x="380" y="68" width="470" height="358" fill="#0d1320" stroke="#3a4a6e" stroke-width="1.5" rx="10"/>
  <text x="615" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#9aa4b8">DB 서버</text>

  <!-- Step 1: Connection Manager -->
  <rect x="400" y="108" width="180" height="52" fill="#0f1320" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="490" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">① 연결 관리자</text>
  <text x="490" y="148" text-anchor="middle" font-size="11" fill="#888">인증 / 세션 생성</text>

  <!-- Step 2: Parser -->
  <rect x="400" y="174" width="180" height="52" fill="#0f1320" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="490" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">② 파서(Parser)</text>
  <text x="490" y="214" text-anchor="middle" font-size="11" fill="#888">렉서 → 파스 트리 생성</text>

  <!-- Step 3: Rewriter -->
  <rect x="400" y="240" width="180" height="52" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="490" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">③ 리라이터</text>
  <text x="490" y="280" text-anchor="middle" font-size="11" fill="#888">뷰 전개 / 규칙 적용</text>

  <!-- Step 4: Optimizer -->
  <rect x="400" y="306" width="180" height="52" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="490" y="328" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">④ 옵티마이저</text>
  <text x="490" y="346" text-anchor="middle" font-size="11" fill="#888">실행 계획(Plan) 수립</text>

  <!-- Arrows between steps -->
  <line x1="490" y1="160" x2="490" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arC)"/>
  <line x1="490" y1="226" x2="490" y2="238" stroke="#55c555" stroke-width="2" marker-end="url(#arG)"/>
  <line x1="490" y1="292" x2="490" y2="304" stroke="#55c555" stroke-width="2" marker-end="url(#arG)"/>

  <!-- Right side of server: Executor + Storage -->
  <rect x="610" y="240" width="210" height="52" fill="#0f1320" stroke="#ce9178" stroke-width="1.5" rx="6"/>
  <text x="715" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">⑤ 실행기(Executor)</text>
  <text x="715" y="280" text-anchor="middle" font-size="11" fill="#888">계획 따라 연산 수행</text>

  <rect x="610" y="306" width="210" height="52" fill="#0f1320" stroke="#ce9178" stroke-width="1.5" rx="6"/>
  <text x="715" y="328" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">⑥ 스토리지</text>
  <text x="715" y="346" text-anchor="middle" font-size="11" fill="#888">버퍼 캐시 / 디스크 I/O</text>

  <!-- Connect optimizer -> executor -->
  <line x1="580" y1="332" x2="608" y2="266" stroke="#ce9178" stroke-width="2" marker-end="url(#arO)"/>
  <line x1="715" y1="292" x2="715" y2="304" stroke="#ce9178" stroke-width="2" marker-end="url(#arO)"/>

  <!-- Result path: executor -> app (return arrow) -->
  <path d="M 610 256 L 360 256 L 360 150 L 210 150" stroke="#e8e8e8" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arW)"/>
  <text x="400" y="244" text-anchor="middle" font-size="10" fill="#888">결과셋 반환</text>

  <!-- Bottom row: protocol labels -->
  <rect x="30" y="380" width="820" height="56" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="8"/>
  <text x="440" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">주요 프로토콜</text>
  <text x="150" y="422" text-anchor="middle" font-size="11" fill="#888">PostgreSQL: libpq Wire (TCP 5432)</text>
  <text x="390" y="422" text-anchor="middle" font-size="11" fill="#888">MySQL: MySQL Protocol (TCP 3306)</text>
  <text x="620" y="422" text-anchor="middle" font-size="11" fill="#888">Oracle: TNS Protocol (TCP 1521)</text>
  <text x="820" y="422" text-anchor="middle" font-size="11" fill="#888">MSSQL: TDS (TCP 1433)</text>
</svg>
