<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 클라이언트-서버 통신 흐름</text>

  <!-- Client -->
  <rect x="60" y="70" width="200" height="56" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트 앱</text>
  <text x="160" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JDBC / ODBC / psycopg2</text>

  <!-- Driver -->
  <rect x="60" y="156" width="200" height="56" rx="8" fill="#111822" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">드라이버 / 커넥터</text>
  <text x="160" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프로토콜 직렬화</text>

  <line x1="160" y1="128" x2="160" y2="154" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Network -->
  <rect x="60" y="242" width="200" height="40" rx="8" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">TCP/IP 네트워크</text>

  <line x1="160" y1="214" x2="160" y2="240" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Protocol labels -->
  <text x="280" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">MySQL: Protocol v41</text>
  <text x="280" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">PG: Frontend/Backend</text>
  <text x="280" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">Oracle: Net8/SQL*Net</text>
  <text x="280" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">MSSQL: TDS 프로토콜</text>

  <!-- DB Server -->
  <rect x="620" y="70" width="200" height="56" rx="8" fill="#0d2137" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">DB 서버 프로세스</text>
  <text x="720" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Listener / Acceptor</text>

  <!-- Connection Pool -->
  <rect x="620" y="156" width="200" height="56" rx="8" fill="#0a2000" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">커넥션 풀</text>
  <text x="720" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HikariCP / pgBouncer</text>

  <line x1="720" y1="128" x2="720" y2="154" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- SQL Processor -->
  <rect x="620" y="242" width="200" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">SQL 처리 엔진</text>
  <text x="720" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파서 → 옵티마이저 → 실행</text>

  <line x1="720" y1="214" x2="720" y2="240" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Bidirectional arrows in middle -->
  <line x1="262" y1="262" x2="618" y2="262" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="618" y1="278" x2="262" y2="278" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">SQL 전송 →</text>
  <text x="440" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">← 결과셋 반환</text>

  <!-- Connection lifecycle -->
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">커넥션 수명 주기</text>

  <rect x="80" y="352" width="90" height="30" rx="4" fill="#111822" stroke="#7ec8e3" stroke-width="1"/>
  <text x="125" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1. 연결 요청</text>

  <rect x="196" y="352" width="90" height="30" rx="4" fill="#111822" stroke="#55c555" stroke-width="1"/>
  <text x="241" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">2. 인증</text>

  <rect x="312" y="352" width="90" height="30" rx="4" fill="#111822" stroke="#7777cc" stroke-width="1"/>
  <text x="357" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">3. 세션 설정</text>

  <rect x="428" y="352" width="90" height="30" rx="4" fill="#111822" stroke="#ce9178" stroke-width="1"/>
  <text x="473" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">4. SQL 실행</text>

  <rect x="544" y="352" width="90" height="30" rx="4" fill="#111822" stroke="#7ec8e3" stroke-width="1"/>
  <text x="589" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">5. 결과 수신</text>

  <rect x="660" y="352" width="100" height="30" rx="4" fill="#111822" stroke="#e05555" stroke-width="1"/>
  <text x="710" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">6. 종료/반납</text>

  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커넥션 풀: 종료 대신 풀에 반납 → 재사용으로 연결 오버헤드 제거</text>
</svg>
