<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SQL 쿼리의 여행 — 클라이언트에서 결과까지</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">TCP/IP 위에서 동작하는 DBMS 클라이언트-서버 모델</text>

  <!-- Client box -->
  <rect x="60" y="100" width="200" height="300" fill="#0d1520" rx="8" stroke="#1e3a5a" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">클라이언트</text>
  <text x="160" y="148" text-anchor="middle" font-size="11" fill="#888">애플리케이션 / psql / sqlplus</text>

  <rect x="80" y="160" width="160" height="36" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="160" y="183" text-anchor="middle" font-size="12" fill="#e8e8e8">SQL 문자열 생성</text>

  <rect x="80" y="208" width="160" height="36" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="160" y="231" text-anchor="middle" font-size="12" fill="#e8e8e8">드라이버 (JDBC/ODBC)</text>

  <rect x="80" y="256" width="160" height="36" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="160" y="279" text-anchor="middle" font-size="12" fill="#e8e8e8">패킷 직렬화</text>

  <rect x="80" y="304" width="160" height="36" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="160" y="327" text-anchor="middle" font-size="12" fill="#e8e8e8">TCP 소켓 (5432 등)</text>

  <rect x="80" y="352" width="160" height="36" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="160" y="375" text-anchor="middle" font-size="12" fill="#55c555">결과셋 수신</text>

  <!-- Network -->
  <rect x="300" y="235" width="120" height="60" fill="#111520" rx="6" stroke="#2a3040" stroke-width="1"/>
  <text x="360" y="262" text-anchor="middle" font-size="12" fill="#888">네트워크</text>
  <text x="360" y="280" text-anchor="middle" font-size="11" fill="#555">TCP/IP</text>

  <!-- Forward arrow: client -> server -->
  <polygon points="418,256 438,256 438,248 456,265 438,282 438,274 418,274"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Backward arrow: server -> client -->
  <polygon points="300,282 280,282 280,274 262,291 280,308 280,300 300,300"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Server box -->
  <rect x="480" y="100" width="340" height="300" fill="#0d1520" rx="8" stroke="#1e3a5a" stroke-width="1.5"/>
  <text x="650" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">데이터베이스 서버</text>
  <text x="650" y="148" text-anchor="middle" font-size="11" fill="#888">DBMS 프로세스</text>

  <rect x="500" y="160" width="300" height="36" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="650" y="183" text-anchor="middle" font-size="12" fill="#e8e8e8">① 접속 인증 (Auth)</text>

  <rect x="500" y="208" width="300" height="36" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="650" y="231" text-anchor="middle" font-size="12" fill="#e8e8e8">② 파서 (Lexer + Parser)</text>

  <rect x="500" y="256" width="300" height="36" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="650" y="279" text-anchor="middle" font-size="12" fill="#e8e8e8">③ 옵티마이저 (실행 계획)</text>

  <rect x="500" y="304" width="300" height="36" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="650" y="327" text-anchor="middle" font-size="12" fill="#e8e8e8">④ 실행 엔진 (Storage 접근)</text>

  <rect x="500" y="352" width="300" height="36" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="650" y="375" text-anchor="middle" font-size="12" fill="#55c555">⑤ 결과셋 직렬화 → 전송</text>

  <!-- Server internal arrows -->
  <line x1="650" y1="196" x2="650" y2="208" stroke="#2a3a5a" stroke-width="1.5"/>
  <line x1="650" y1="244" x2="650" y2="256" stroke="#2a3a5a" stroke-width="1.5"/>
  <line x1="650" y1="292" x2="650" y2="304" stroke="#2a3a5a" stroke-width="1.5"/>
  <line x1="650" y1="340" x2="650" y2="352" stroke="#2a3a5a" stroke-width="1.5"/>

  <!-- Protocol label boxes -->
  <rect x="60" y="424" width="200" height="68" fill="#0f1a0f" rx="6" stroke="#1e5a1e" stroke-width="1"/>
  <text x="160" y="448" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">PostgreSQL</text>
  <text x="160" y="466" text-anchor="middle" font-size="11" fill="#888">Frontend-Backend Protocol</text>
  <text x="160" y="482" text-anchor="middle" font-size="11" fill="#888">기본 포트: 5432</text>

  <rect x="280" y="424" width="200" height="68" fill="#1a1000" rx="6" stroke="#5a3a00" stroke-width="1"/>
  <text x="380" y="448" text-anchor="middle" font-size="12" font-weight="600" fill="#e8c060">MySQL / MariaDB</text>
  <text x="380" y="466" text-anchor="middle" font-size="11" fill="#888">MySQL Client-Server Protocol</text>
  <text x="380" y="482" text-anchor="middle" font-size="11" fill="#888">기본 포트: 3306</text>

  <rect x="500" y="424" width="200" height="68" fill="#1a0f0f" rx="6" stroke="#5a1a1a" stroke-width="1"/>
  <text x="600" y="448" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">Oracle</text>
  <text x="600" y="466" text-anchor="middle" font-size="11" fill="#888">TNS (Transparent Network Substrate)</text>
  <text x="600" y="482" text-anchor="middle" font-size="11" fill="#888">기본 포트: 1521</text>

  <rect x="720" y="424" width="140" height="68" fill="#0f0f1a" rx="6" stroke="#2a2a5a" stroke-width="1"/>
  <text x="790" y="448" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">SQL Server</text>
  <text x="790" y="466" text-anchor="middle" font-size="11" fill="#888">TDS (Tabular Data Stream)</text>
  <text x="790" y="482" text-anchor="middle" font-size="11" fill="#888">기본 포트: 1433</text>

  <!-- Footer -->
  <text x="440" y="520" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 Chapter 1</text>
</svg>
