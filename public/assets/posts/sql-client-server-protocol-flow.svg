<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrb2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 실행 흐름 — 클라이언트 → 서버</text>

  <!-- Client box -->
  <rect x="60" y="80" width="180" height="300" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">클라이언트</text>
  <text x="150" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">애플리케이션 / CLI</text>

  <rect x="78" y="144" width="144" height="30" fill="#162032" rx="4"/>
  <text x="150" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">SQL 문 작성</text>

  <rect x="78" y="188" width="144" height="30" fill="#162032" rx="4"/>
  <text x="150" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">드라이버 API 호출</text>
  <text x="150" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">JDBC / psycopg2 / cx_Oracle</text>

  <rect x="78" y="232" width="144" height="30" fill="#162032" rx="4"/>
  <text x="150" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">결과셋 수신</text>

  <rect x="78" y="276" width="144" height="30" fill="#162032" rx="4"/>
  <text x="150" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">행 단위 fetch</text>

  <rect x="78" y="320" width="144" height="30" fill="#162032" rx="4"/>
  <text x="150" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">커넥션 반납</text>

  <!-- Network layer -->
  <rect x="280" y="156" width="130" height="130" fill="#0d1520" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="345" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">네트워크</text>
  <text x="345" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TCP/IP</text>
  <text x="345" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Oracle: 1521</text>
  <text x="345" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">PostgreSQL: 5432</text>
  <text x="345" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">MySQL: 3306</text>

  <!-- Server box -->
  <rect x="450" y="80" width="370" height="300" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="635" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">DBMS 서버</text>

  <!-- Parse -->
  <rect x="468" y="120" width="148" height="40" fill="#162032" rx="4"/>
  <text x="542" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">1. 파싱(Parse)</text>
  <text x="542" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">문법 검사 · 파스 트리</text>

  <!-- Optimize -->
  <rect x="468" y="172" width="148" height="40" fill="#162032" rx="4"/>
  <text x="542" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">2. 최적화(Optimize)</text>
  <text x="542" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">통계 기반 실행 계획 생성</text>

  <!-- Execute -->
  <rect x="468" y="224" width="148" height="40" fill="#162032" rx="4"/>
  <text x="542" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">3. 실행(Execute)</text>
  <text x="542" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">스토리지 엔진 접근</text>

  <!-- Return -->
  <rect x="468" y="276" width="148" height="40" fill="#162032" rx="4"/>
  <text x="542" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">4. 결과 전송</text>
  <text x="542" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">커서 / 결과셋 반환</text>

  <!-- Server internal arrows -->
  <line x1="542" y1="160" x2="542" y2="172" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <line x1="542" y1="212" x2="542" y2="224" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <line x1="542" y1="264" x2="542" y2="276" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>

  <!-- Plan cache box -->
  <rect x="640" y="152" width="160" height="80" fill="#0d1a0d" rx="6" stroke="#1a4a1a" stroke-width="1"/>
  <text x="720" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">플랜 캐시</text>
  <text x="720" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">동일 SQL 재실행 시</text>
  <text x="720" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파싱·최적화 생략</text>
  <text x="720" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">성능 핵심!</text>

  <!-- Network arrows -->
  <path d="M 240 200 L 280 200" fill="none" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="258" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">SQL 전송</text>

  <path d="M 410 265 L 450 265" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrb2)"/>
  <text x="428" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">결과 수신</text>

  <!-- Connection pool -->
  <rect x="60" y="420" width="760" height="50" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">커넥션 풀(Connection Pool)</text>
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TCP 연결은 비용이 크므로 미리 생성해 재사용 — HikariCP, PgBouncer, Oracle UCP 등</text>
</svg>
