<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 클라이언트-서버 통신 흐름</text>

  <!-- Client -->
  <rect x="60" y="70" width="200" height="360" rx="10" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">클라이언트</text>
  <text x="160" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">애플리케이션 / CLI</text>

  <rect x="80" y="136" width="160" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">① SQL 문 작성</text>

  <rect x="80" y="190" width="160" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">② 드라이버 / API 호출</text>

  <rect x="80" y="244" width="160" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">③ 네트워크 전송</text>

  <rect x="80" y="352" width="160" height="36" rx="6" fill="#1a1a2e" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">⑦ 결과셋 수신</text>

  <!-- Arrow right (request) -->
  <line x1="260" y1="255" x2="318" y2="255" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="289" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">요청</text>

  <!-- Arrow left (response) -->
  <line x1="320" y1="370" x2="262" y2="370" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="291" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">응답</text>

  <!-- Server -->
  <rect x="320" y="70" width="500" height="360" rx="10" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">데이터베이스 서버</text>

  <!-- Parse -->
  <rect x="340" y="116" width="200" height="52" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">④ 파싱 (Parse)</text>
  <text x="440" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">문법 검사, AST 생성</text>

  <!-- Optimize -->
  <rect x="340" y="184" width="200" height="52" rx="6" fill="#0f1a0f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">⑤ 옵티마이저</text>
  <text x="440" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실행 계획 생성 (비용 최소화)</text>

  <!-- Execute -->
  <rect x="340" y="252" width="200" height="52" rx="6" fill="#0f1a0f" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">⑥ 실행 (Execute)</text>
  <text x="440" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스토리지 엔진 호출</text>

  <!-- Storage -->
  <rect x="560" y="116" width="230" height="188" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="675" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">스토리지 계층</text>
  <text x="675" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">버퍼 풀 (메모리 캐시)</text>
  <text x="675" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터 파일 (디스크)</text>
  <text x="675" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인덱스 파일</text>
  <text x="675" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">WAL / Redo Log</text>
  <text x="675" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">트랜잭션 로그</text>
  <text x="675" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">결과셋 반환</text>

  <!-- arrows inside server -->
  <line x1="440" y1="168" x2="440" y2="183" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="236" x2="440" y2="251" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="540" y1="278" x2="560" y2="278" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Result row -->
  <rect x="340" y="340" width="460" height="60" rx="6" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="570" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">결과셋(Result Set): 행/열 구조 데이터</text>
  <text x="570" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프로토콜 패킷으로 직렬화 후 클라이언트 전송</text>

  <!-- Protocol labels -->
  <rect x="60" y="455" width="760" height="28" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">주요 프로토콜: PostgreSQL Wire Protocol · MySQL Protocol · TDS (SQL Server) · Oracle Net</text>
</svg>
