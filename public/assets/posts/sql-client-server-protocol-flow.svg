<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SQL 클라이언트-서버 쿼리 실행 흐름</text>

  <!-- Client box -->
  <rect x="60" y="70" width="200" height="360" rx="8" fill="#111820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">클라이언트</text>
  <text x="160" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">앱 / psql / DBeaver</text>

  <rect x="76" y="128" width="168" height="34" rx="4" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">① SQL 텍스트 작성</text>

  <rect x="76" y="178" width="168" height="34" rx="4" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">② 드라이버 직렬화</text>
  <text x="160" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">(JDBC/ODBC/libpq)</text>

  <rect x="76" y="330" width="168" height="34" rx="4" fill="#1a2a1a" stroke="#3a5e3a" stroke-width="1"/>
  <text x="160" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">⑦ 결과 수신 · 렌더링</text>

  <rect x="76" y="380" width="168" height="34" rx="4" fill="#1a2a1a" stroke="#3a5e3a" stroke-width="1"/>
  <text x="160" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">⑧ 커서 / 페치</text>
  <text x="160" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">배치 단위 수신</text>

  <!-- Arrows client to network -->
  <line x1="260" y1="210" x2="298" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrb)"/>
  <line x1="298" y1="360" x2="260" y2="360" stroke="#55c555" stroke-width="2" marker-end="url(#arrr)"/>

  <!-- Network box -->
  <rect x="300" y="160" width="120" height="240" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="360" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">Network</text>
  <text x="360" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666">TCP/IP</text>
  <text x="360" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666">→ 쿼리 전송</text>
  <text x="360" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666">← 결과 반환</text>

  <!-- Arrows network to server -->
  <line x1="420" y1="210" x2="458" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrb)"/>
  <line x1="458" y1="360" x2="420" y2="360" stroke="#55c555" stroke-width="2" marker-end="url(#arrr)"/>

  <!-- Server box -->
  <rect x="460" y="70" width="360" height="360" rx="8" fill="#111820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">DBMS 서버</text>

  <!-- Parser -->
  <rect x="476" y="108" width="328" height="48" rx="4" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ffffff">③ 파서(Parser)</text>
  <text x="640" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SQL 텍스트 → AST (구문 트리)</text>

  <!-- Optimizer -->
  <rect x="476" y="168" width="328" height="48" rx="4" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ffffff">④ 옵티마이저(Optimizer)</text>
  <text x="640" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실행 계획 생성 — 인덱스/조인 순서 결정</text>

  <!-- Executor -->
  <rect x="476" y="228" width="328" height="48" rx="4" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ffffff">⑤ 실행 엔진(Executor)</text>
  <text x="640" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">계획대로 스토리지 접근, 조인·집계 수행</text>

  <!-- Storage -->
  <rect x="476" y="288" width="328" height="48" rx="4" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ffffff">⑥ 스토리지 엔진</text>
  <text x="640" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">버퍼 캐시 → 디스크 I/O → 결과 집합</text>

  <!-- Server internal arrows -->
  <line x1="640" y1="156" x2="640" y2="166" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrb)"/>
  <line x1="640" y1="216" x2="640" y2="226" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrb)"/>
  <line x1="640" y1="276" x2="640" y2="286" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrb)"/>

  <!-- Bottom note -->
  <rect x="60" y="452" width="760" height="36" rx="6" fill="#1a1a2e" stroke="#3a3a5e" stroke-width="1"/>
  <text x="440" y="475" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파서/옵티마이저는 CPU·메모리 비용 — 준비된 쿼리(Prepared Statement)로 재사용 가능</text>
</svg>
