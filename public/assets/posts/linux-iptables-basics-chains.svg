<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
  <marker id="arr-7777cc" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto"><path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/></marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">iptables 테이블 · 체인 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">패킷 흐름과 Netfilter 훅</text>

  <!-- Packet flow diagram -->
  <!-- Network In -->
  <rect x="60" y="110" width="100" height="50" fill="#1a2535" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="110" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">네트워크 IN</text>

  <!-- Arrow to PREROUTING -->
  <polygon points="172,135 188,129 188,141" fill="#7777cc"/>
  <rect x="162" y="132" width="26" height="6" fill="#7777cc"/>

  <!-- PREROUTING -->
  <rect x="190" y="100" width="130" height="70" fill="#2a1a2e" rx="6" stroke="#7777cc" stroke-width="2"/>
  <text x="255" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">PREROUTING</text>
  <text x="255" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">nat (DNAT)</text>
  <text x="255" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">mangle, raw</text>

  <!-- Routing decision -->
  <polygon points="332,135 348,129 348,141" fill="#7777cc"/>
  <rect x="322" y="132" width="26" height="6" fill="#7777cc"/>

  <rect x="350" y="110" width="110" height="50" fill="#1a1a1a" rx="6" stroke="#555" stroke-width="1.5"/>
  <text x="405" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">라우팅</text>
  <text x="405" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">결정</text>

  <!-- To LOCAL or FORWARD -->
  <!-- Down to INPUT -->
  
  <line x1="405" y1="176" x2="405" y2="162" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-7777cc)"/>

  <!-- INPUT chain -->
  <rect x="340" y="178" width="130" height="70" fill="#1a2e1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="405" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">INPUT</text>
  <text x="405" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">filter, mangle</text>
  <text x="405" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">로컬 프로세스 수신</text>

  <!-- LOCAL PROCESS -->
  <rect x="340" y="268" width="130" height="50" fill="#1a2535" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="405" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">로컬 프로세스</text>

  <!-- Arrow down -->
  
  <line x1="405" y1="264" x2="405" y2="250" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-7777cc)"/>

  <!-- OUTPUT chain -->
  <rect x="340" y="348" width="130" height="70" fill="#1a2e1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="405" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">OUTPUT</text>
  <text x="405" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">filter, nat, mangle</text>
  <text x="405" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">나가는 패킷 처리</text>

  <!-- Arrow down from process -->
  
  <line x1="405" y1="334" x2="405" y2="320" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-7777cc)"/>

  <!-- FORWARD chain (right side) -->
  <polygon points="472,135 488,129 488,141" fill="#e05555"/>
  <rect x="460" y="132" width="28" height="6" fill="#e05555"/>

  <rect x="490" y="100" width="130" height="70" fill="#2e1a1a" rx="6" stroke="#e05555" stroke-width="2"/>
  <text x="555" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">FORWARD</text>
  <text x="555" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">filter, mangle</text>
  <text x="555" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">라우터 통과 패킷</text>

  <!-- POSTROUTING -->
  <polygon points="632,135 648,129 648,141" fill="#7777cc"/>
  <rect x="622" y="132" width="26" height="6" fill="#7777cc"/>

  <rect x="650" y="100" width="130" height="70" fill="#2a1a2e" rx="6" stroke="#7777cc" stroke-width="2"/>
  <text x="715" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">POSTROUTING</text>
  <text x="715" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">nat (SNAT, MASQ)</text>
  <text x="715" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">mangle</text>

  <!-- Network Out -->
  <polygon points="792,135 808,129 808,141" fill="#7777cc"/>
  <rect x="782" y="132" width="26" height="6" fill="#7777cc"/>

  <rect x="810" y="110" width="10" height="50" fill="#1a2e1a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="820" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" transform="rotate(90,820,135)">OUT</text>

  <!-- Tables info -->
  <rect x="60" y="430" width="760" height="50" fill="#111827" rx="6"/>
  <text x="100" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">filter</text>
  <text x="148" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">INPUT·FORWARD·OUTPUT  |</text>
  <text x="390" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">nat</text>
  <text x="415" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PREROUTING·OUTPUT·POSTROUTING  |</text>
  <text x="700" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">mangle</text>
  <text x="750" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전체</text>
  <text x="100" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기본 테이블 — 패킷 허용/차단</text>
  <text x="415" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">주소 변환 (DNAT/SNAT/MASQUERADE)</text>
  <text x="700" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패킷 수정</text>
</svg>
