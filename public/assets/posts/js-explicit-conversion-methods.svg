<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">명시적 형변환 — 변환 함수 총정리</text>

  <!-- Number conversion -->
  <rect x="60" y="62" width="360" height="180" fill="#000000" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="76" y="84"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">→ Number 변환</text>

  <text x="76" y="106" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Number(</tspan><tspan fill="#ce9178">"42"</tspan><tspan fill="#ffffff">)       </tspan><tspan fill="#9aa4b8">// 42</tspan>
  </text>
  <text x="76" y="124" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Number(</tspan><tspan fill="#ce9178">"3.14"</tspan><tspan fill="#ffffff">)     </tspan><tspan fill="#9aa4b8">// 3.14</tspan>
  </text>
  <text x="76" y="142" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Number(</tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">)         </tspan><tspan fill="#9aa4b8">// 0</tspan>
  </text>
  <text x="76" y="160" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Number(</tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">)       </tspan><tspan fill="#9aa4b8">// 0</tspan>
  </text>
  <text x="76" y="178" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Number(</tspan><tspan fill="#7ec8e3">undefined</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// NaN</tspan>
  </text>
  <text x="76" y="196" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Number(</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff">)       </tspan><tspan fill="#9aa4b8">// 1</tspan>
  </text>
  <text x="76" y="214" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">parseInt(</tspan><tspan fill="#ce9178">"42px"</tspan><tspan fill="#ffffff">)   </tspan><tspan fill="#9aa4b8">// 42 (뒤 무시)</tspan>
  </text>
  <text x="76" y="232" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">parseFloat(</tspan><tspan fill="#ce9178">"3.5em"</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// 3.5</tspan>
  </text>

  <!-- String conversion -->
  <rect x="460" y="62" width="360" height="180" fill="#000000" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="84"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">→ String 변환</text>

  <text x="476" y="106" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">String(</tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">)         </tspan><tspan fill="#9aa4b8">// "42"</tspan>
  </text>
  <text x="476" y="124" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">String(</tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">)       </tspan><tspan fill="#9aa4b8">// "null"</tspan>
  </text>
  <text x="476" y="142" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">String(</tspan><tspan fill="#7ec8e3">undefined</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// "undefined"</tspan>
  </text>
  <text x="476" y="160" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">String(</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff">)       </tspan><tspan fill="#9aa4b8">// "true"</tspan>
  </text>
  <text x="476" y="178" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">255</tspan><tspan fill="#ffffff">).toString(</tspan><tspan fill="#b5cea8">16</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// "ff" (16진수)</tspan>
  </text>
  <text x="476" y="196" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">3.14159</tspan><tspan fill="#ffffff">).toFixed(</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#9aa4b8">// "3.14"</tspan>
  </text>
  <text x="476" y="214" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">           </tspan><tspan fill="#9aa4b8">// "42" (암묵적)</tspan>
  </text>
  <text x="476" y="232" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">.toString()    </tspan><tspan fill="#9aa4b8">// SyntaxError!</tspan>
  </text>

  <!-- Boolean conversion -->
  <rect x="60" y="260" width="360" height="160" fill="#000000" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="76" y="282"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">→ Boolean 변환</text>

  <text x="76" y="304" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// falsy → false
  </text>
  <text x="76" y="322" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Boolean(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">)     </tspan><tspan fill="#9aa4b8">// false</tspan>
  </text>
  <text x="76" y="340" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Boolean(</tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">)    </tspan><tspan fill="#9aa4b8">// false</tspan>
  </text>
  <text x="76" y="358" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Boolean(</tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// false</tspan>
  </text>
  <text x="76" y="376" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 나머지 → true
  </text>
  <text x="76" y="394" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Boolean(</tspan><tspan fill="#ce9178">"0"</tspan><tspan fill="#ffffff">)   </tspan><tspan fill="#9aa4b8">// true! (비빈 문자열)</tspan>
  </text>
  <text x="76" y="412" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Boolean([])    </tspan><tspan fill="#9aa4b8">// true! (빈 배열)</tspan>
  </text>

  <!-- parseInt quirks -->
  <rect x="460" y="260" width="360" height="160" fill="#000000" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="282"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555">parseInt 함정</text>

  <text x="476" y="304" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">parseInt(</tspan><tspan fill="#ce9178">"08"</tspan><tspan fill="#ffffff">)     </tspan><tspan fill="#9aa4b8">// 8 (ES5+)</tspan>
  </text>
  <text x="476" y="322" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">parseInt(</tspan><tspan fill="#ce9178">"0x1F"</tspan><tspan fill="#ffffff">)   </tspan><tspan fill="#9aa4b8">// 31 (16진수)</tspan>
  </text>
  <text x="476" y="340" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">parseInt(</tspan><tspan fill="#ce9178">"abc"</tspan><tspan fill="#ffffff">)    </tspan><tspan fill="#9aa4b8">// NaN</tspan>
  </text>
  <text x="476" y="358" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 항상 radix 명시 권장!
  </text>
  <text x="476" y="376" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">parseInt(</tspan><tspan fill="#ce9178">"42"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// 42 (10진수)</tspan>
  </text>
  <text x="476" y="394" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">parseInt(</tspan><tspan fill="#ce9178">"ff"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">16</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// 255</tspan>
  </text>
  <text x="476" y="412" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">].map(parseInt)  </tspan><tspan fill="#e05555">// [1,NaN,NaN]!</tspan>
  </text>

  <!-- Bottom note -->
  <text x="440" y="448" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">[1,2,3].map(parseInt) 함정: parseInt(val, index) — index가 radix로 전달됨</text>
  <text x="440" y="466" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">해결: [1,2,3].map(n => parseInt(n, 10))  또는  [1,2,3].map(Number)</text>
</svg>
