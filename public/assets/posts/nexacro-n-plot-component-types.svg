<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">주요 차트 타입 비교</text>

  <!-- Bar Chart -->
  <rect x="60" y="70" width="180" height="160" rx="8" fill="#0f1520" stroke="#2a3040"/>
  <text x="150" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">bar</text>
  <rect x="80" y="170" width="22" height="48" fill="#55c555" opacity="0.85"/>
  <rect x="110" y="150" width="22" height="68" fill="#55c555" opacity="0.85"/>
  <rect x="140" y="185" width="22" height="33" fill="#7ec8e3" opacity="0.85"/>
  <rect x="170" y="140" width="22" height="78" fill="#7ec8e3" opacity="0.85"/>
  <line x1="75" y1="218" x2="210" y2="218" stroke="#555" stroke-width="1"/>
  <text x="150" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">카테고리 비교</text>

  <!-- Line Chart -->
  <rect x="260" y="70" width="180" height="160" rx="8" fill="#0f1520" stroke="#2a3040"/>
  <text x="350" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">line</text>
  <polyline points="280,200 305,170 330,185 355,150 380,165 405,140 430,155" fill="none" stroke="#55c555" stroke-width="2"/>
  <circle cx="280" cy="200" r="3" fill="#55c555"/>
  <circle cx="305" cy="170" r="3" fill="#55c555"/>
  <circle cx="330" cy="185" r="3" fill="#55c555"/>
  <circle cx="355" cy="150" r="3" fill="#55c555"/>
  <circle cx="380" cy="165" r="3" fill="#55c555"/>
  <line x1="275" y1="218" x2="435" y2="218" stroke="#555" stroke-width="1"/>
  <text x="350" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추세·시계열</text>

  <!-- Pie Chart -->
  <rect x="460" y="70" width="180" height="160" rx="8" fill="#0f1520" stroke="#2a3040"/>
  <text x="550" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">pie</text>
  <circle cx="550" cy="165" r="50" fill="none" stroke="#2a3040"/>
  <!-- Pie slices approximation -->
  <path d="M550,165 L550,115 A50,50 0 0,1 593,190 Z" fill="#55c555" opacity="0.85"/>
  <path d="M550,165 L593,190 A50,50 0 0,1 520,212 Z" fill="#7ec8e3" opacity="0.85"/>
  <path d="M550,165 L520,212 A50,50 0 0,1 507,140 Z" fill="#7777cc" opacity="0.85"/>
  <path d="M550,165 L507,140 A50,50 0 0,1 550,115 Z" fill="#e05555" opacity="0.85"/>
  <text x="550" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비율·구성</text>

  <!-- Area Chart -->
  <rect x="660" y="70" width="180" height="160" rx="8" fill="#0f1520" stroke="#2a3040"/>
  <text x="750" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">area</text>
  <polygon points="680,218 705,190 730,200 755,165 780,180 805,155 830,170 830,218" fill="#7777cc" opacity="0.4"/>
  <polyline points="680,218 705,190 730,200 755,165 780,180 805,155 830,170" fill="none" stroke="#7777cc" stroke-width="2"/>
  <line x1="675" y1="218" x2="835" y2="218" stroke="#555" stroke-width="1"/>
  <text x="750" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">누적·영역 강조</text>

  <!-- Code block -->
  <rect x="60" y="280" width="760" height="110" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 차트 타입 동적 전환</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text><text x="150" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> changeChartType(type) {</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    Plot00.charttype = type;  </text><text x="400" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// "bar","line","pie","area"</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    Plot00.redraw();</text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
</svg>
