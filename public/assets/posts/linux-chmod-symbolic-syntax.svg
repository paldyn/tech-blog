<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">chmod 심볼릭 모드 문법</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">[대상][연산자][권한] — 조합으로 세밀하게 제어</text>

  <!-- Syntax boxes -->
  <!-- WHO -->
  <rect x="60" y="86" width="200" height="140" rx="8" fill="#0e1018" stroke="#3a4a6e"/>
  <rect x="60" y="86" width="200" height="34" rx="8" fill="#141622"/>
  <text x="160" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">대상 (WHO)</text>
  <text x="80" y="136" font-size="13" fill="#e8e8e8"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">u</tspan> — 소유자 (user)</text>
  <text x="80" y="158" font-size="13" fill="#e8e8e8"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">g</tspan> — 그룹 (group)</text>
  <text x="80" y="180" font-size="13" fill="#e8e8e8"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">o</tspan> — 기타 (others)</text>
  <text x="80" y="202" font-size="13" fill="#e8e8e8"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">a</tspan> — 전체 (all=ugo)</text>

  <!-- OPERATOR -->
  <rect x="290" y="86" width="200" height="140" rx="8" fill="#0e1018" stroke="#3a4a6e"/>
  <rect x="290" y="86" width="200" height="34" rx="8" fill="#141622"/>
  <text x="390" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">연산자 (OP)</text>
  <text x="310" y="136" font-size="13" fill="#e8e8e8"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">+</tspan> — 권한 추가</text>
  <text x="310" y="158" font-size="13" fill="#e8e8e8"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">-</tspan> — 권한 제거</text>
  <text x="310" y="180" font-size="13" fill="#e8e8e8"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">=</tspan> — 권한 지정 (기존 대체)</text>

  <!-- PERMISSION -->
  <rect x="520" y="86" width="300" height="140" rx="8" fill="#0e1018" stroke="#3a4a6e"/>
  <rect x="520" y="86" width="300" height="34" rx="8" fill="#141622"/>
  <text x="670" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">권한 (PERM)</text>
  <text x="540" y="136" font-size="13" fill="#e8e8e8"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">r</tspan> — 읽기</text>
  <text x="540" y="158" font-size="13" fill="#e8e8e8"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">w</tspan> — 쓰기</text>
  <text x="540" y="180" font-size="13" fill="#e8e8e8"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">x</tspan> — 실행</text>
  <text x="540" y="202" font-size="13" fill="#888"><tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace">X</tspan> — 디렉터리이거나 이미 x 있을 때만</text>

  <!-- Examples code block -->
  <text x="60" y="252" font-size="14" font-weight="600" fill="#888">심볼릭 모드 예시</text>
  <rect x="60" y="260" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="280" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 소유자에게 실행 권한 추가</text>
  <text x="76" y="298" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chmod </text>
  <text x="118" y="298" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">u+x script.sh</text>
  <text x="300" y="298" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">  # 그룹·기타에서 쓰기 제거</text>
  <text x="76" y="316" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chmod </text>
  <text x="118" y="316" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">go-w file.txt</text>
  <text x="300" y="316" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">  # 기타를 읽기만으로 지정</text>
  <text x="76" y="334" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chmod </text>
  <text x="118" y="334" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">o=r file.txt</text>
  <text x="300" y="334" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">  # 전체 소유자 권한 복사</text>
  <text x="76" y="352" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chmod </text>
  <text x="118" y="352" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">g=u file.txt</text>
</svg>
