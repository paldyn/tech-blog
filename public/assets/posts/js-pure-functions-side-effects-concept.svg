<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">순수 함수 vs 부수 효과</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Pure Functions &amp; Side Effects</text>

  <!-- Pure Function box -->
  <rect x="60" y="96" width="350" height="260" fill="#0d1a0d" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="235" y="122" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" text-anchor="middle">순수 함수 (Pure)</text>

  <!-- Pure code block -->
  <rect x="80" y="132" width="310" height="130" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="152" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> <tspan fill="#e8e8e8">add</tspan><tspan fill="#e8e8e8">(a, b) {</tspan></text>
  <text x="96" y="170" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return</tspan> a + b;</text>
  <text x="96" y="188" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="96" y="210" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 동일 입력 → 동일 출력</text>
  <text x="96" y="228" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">add(<tspan fill="#b5cea8">2</tspan>, <tspan fill="#b5cea8">3</tspan>); <tspan fill="#6a8aa0">// 항상 5</tspan></text>
  <text x="96" y="246" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">add(<tspan fill="#b5cea8">2</tspan>, <tspan fill="#b5cea8">3</tspan>); <tspan fill="#6a8aa0">// 항상 5</tspan></text>

  <!-- Pure traits -->
  <text x="96" y="282" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">✓ 특징</text>
  <text x="96" y="302" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">동일 인자 → 동일 반환값</text>
  <text x="96" y="320" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">외부 상태를 읽거나 변경 안 함</text>
  <text x="96" y="338" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">참조 투명성(Referential Transparency)</text>

  <!-- Impure Function box -->
  <rect x="470" y="96" width="350" height="260" fill="#1a0d0d" rx="10" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="645" y="122" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" text-anchor="middle">부수 효과 (Side Effects)</text>

  <!-- Impure code block -->
  <rect x="490" y="132" width="310" height="130" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="506" y="152" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">let</tspan> count = <tspan fill="#b5cea8">0</tspan>;</text>
  <text x="506" y="170" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> <tspan fill="#e8e8e8">increment</tspan><tspan fill="#e8e8e8">() {</tspan></text>
  <text x="506" y="188" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  count++; <tspan fill="#6a8aa0">// 외부 변경!</tspan></text>
  <text x="506" y="206" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return</tspan> count;</text>
  <text x="506" y="224" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="506" y="246" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 1, 2, 3... 매번 다름</text>

  <!-- Impure traits -->
  <text x="506" y="282" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">✗ 부수 효과 종류</text>
  <text x="506" y="302" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">외부 변수 수정, DOM 조작</text>
  <text x="506" y="320" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">네트워크 요청, 콘솔 출력</text>
  <text x="506" y="338" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">파일 I/O, 날짜·난수 참조</text>

  <!-- Arrow between -->
  <line x1="415" y1="226" x2="465" y2="226" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="440" y="218" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">vs</text>

  <!-- Bottom labels -->
  <rect x="60" y="376" width="350" height="44" fill="#0f1f0f" rx="6"/>
  <text x="235" y="397" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">테스트·캐싱·병렬화 용이</text>
  <text x="235" y="413" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">예측 가능 · 재사용 높음</text>

  <rect x="470" y="376" width="350" height="44" fill="#1f0f0f" rx="6"/>
  <text x="645" y="397" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">불가피하지만 격리 필요</text>
  <text x="645" y="413" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">경계를 명확히 · 최소화</text>

  <!-- Footer -->
  <text x="440" y="458" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
