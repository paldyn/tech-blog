<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git worktree 핵심 명령어</text>

  <!-- add command -->
  <rect x="60" y="68" width="760" height="86" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">워크트리 추가</text>
  <rect x="80" y="102" width="720" height="42" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git worktree add </text>
  <text x="242" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">../myapp-hotfix </text>
  <text x="380" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">hotfix/critical</text>
  <text x="96" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 새 브랜치와 함께: git worktree add -b hotfix/new ../myapp-fix</text>

  <!-- list command -->
  <rect x="60" y="168" width="760" height="70" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">목록 확인</text>
  <rect x="80" y="202" width="720" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git worktree list</text>
  <text x="300" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # --porcelain 으로 파싱 가능한 출력</text>

  <!-- remove command -->
  <rect x="60" y="252" width="760" height="70" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">워크트리 제거</text>
  <rect x="80" y="286" width="720" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git worktree remove </text>
  <text x="264" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">../myapp-hotfix</text>
  <text x="404" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # 깨진 링크: git worktree prune</text>

  <!-- move command -->
  <rect x="60" y="336" width="760" height="70" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">경로 이동</text>
  <rect x="80" y="370" width="720" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git worktree move </text>
  <text x="250" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">../myapp-hotfix </text>
  <text x="390" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">../myapp-hotfix-v2</text>

  <!-- Note -->
  <rect x="60" y="424" width="760" height="24" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">규칙: 같은 브랜치를 두 워크트리에서 동시에 사용할 수 없다 (Git이 잠금 처리)</text>
</svg>
