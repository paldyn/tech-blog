<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컨트롤 플레인 내부 통신</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">모든 컴포넌트는 API Server를 중심으로 통신한다</text>

  <!-- API Server center -->
  <rect x="330" y="180" width="220" height="80" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="440" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">kube-apiserver</text>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 통신의 허브</text>
  <text x="440" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">REST API · 인증 · 인가 · Admission Control</text>

  <!-- etcd -->
  <rect x="60" y="180" width="180" height="80" rx="8" fill="#1a100d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="150" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">etcd</text>
  <text x="150" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클러스터 상태 저장</text>
  <text x="150" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유일한 영속 저장소</text>

  <!-- etcd <-> API Server -->
  <line x1="242" y1="220" x2="328" y2="220" stroke="#ce9178" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="328" y1="228" x2="242" y2="228" stroke="#ce9178" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="285" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">읽기/쓰기</text>

  <!-- Scheduler -->
  <rect x="60" y="90" width="180" height="70" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">kube-scheduler</text>
  <text x="150" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파드 → 노드 배치 결정</text>
  <text x="150" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Watch API 구독</text>

  <!-- Scheduler <-> API Server -->
  <line x1="242" y1="130" x2="370" y2="185" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="295" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">Watch unscheduled pods</text>

  <!-- Controller Manager -->
  <rect x="640" y="90" width="200" height="70" rx="8" fill="#1a0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="740" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">controller-manager</text>
  <text x="740" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">상태 조정 루프</text>
  <text x="740" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Watch + Reconcile</text>

  <!-- Controller Manager <-> API Server -->
  <line x1="640" y1="130" x2="552" y2="185" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="604" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">Watch + Write</text>

  <!-- kubectl / external -->
  <rect x="330" y="90" width="220" height="60" rx="8" fill="#0f0f0f" stroke="#444" stroke-width="1.5"/>
  <text x="440" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">kubectl / CI-CD / Dashboard</text>
  <text x="440" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">외부 클라이언트</text>

  <!-- External -> API Server -->
  <line x1="440" y1="152" x2="440" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Worker Node (kubelet + kube-proxy) -->
  <rect x="60" y="310" width="760" height="160" rx="10" fill="#0d110d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Worker Nodes</text>

  <rect x="80" y="346" width="160" height="110" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">kubelet</text>
  <text x="160" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">노드 에이전트</text>
  <text x="160" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파드 상태 보고</text>
  <text x="160" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">헬스체크 실행</text>
  <text x="160" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">:10250</text>

  <rect x="260" y="346" width="160" height="110" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="340" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">kube-proxy</text>
  <text x="340" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">네트워크 프록시</text>
  <text x="340" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">iptables/IPVS 규칙</text>
  <text x="340" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Service 라우팅</text>
  <text x="340" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">DaemonSet</text>

  <rect x="440" y="346" width="380" height="110" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="630" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">Container Runtime (containerd)</text>
  <text x="630" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CRI 인터페이스를 통해 kubelet과 통신</text>
  <text x="630" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이미지 풀 · 컨테이너 생성 · 네트워크 설정</text>
  <text x="630" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Pod 실행 및 생명주기 관리</text>
  <text x="630" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">containerd / CRI-O</text>

  <!-- API Server -> kubelet -->
  <line x1="400" y1="262" x2="200" y2="344" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="280" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">파드 스펙 전달</text>
</svg>
