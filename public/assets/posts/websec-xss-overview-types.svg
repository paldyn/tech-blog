<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">XSS: 크로스 사이트 스크립팅 유형</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Reflected · Stored · DOM-based — 세 가지 실행 경로</text>

  <!-- Reflected XSS -->
  <rect x="60" y="96" width="234" height="180" rx="10" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="177" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">Reflected XSS</text>
  <text x="177" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">반사형 — URL 파라미터 즉시 반사</text>

  <rect x="76" y="154" width="202" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="86" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">?q=&lt;script&gt;alert(1)&lt;/script&gt;</text>
  <text xml:space="preserve" x="86" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff">→ 서버가 입력을 그대로</text>
  <text xml:space="preserve" x="86" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff">  HTML에 삽입해 반환</text>
  <text xml:space="preserve" x="86" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555">→ 피싱 링크로 전파</text>

  <text x="177" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DB 저장 없음, 피해자가 링크</text>
  <text x="177" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클릭 시 스크립트 실행</text>

  <!-- Stored XSS -->
  <rect x="323" y="96" width="234" height="180" rx="10" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">Stored XSS ★</text>
  <text x="440" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">저장형 — DB에 저장, 모두에 실행</text>

  <rect x="339" y="154" width="202" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="349" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">댓글: &lt;script&gt;stealCookies()&lt;/script&gt;</text>
  <text xml:space="preserve" x="349" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff">→ DB 저장</text>
  <text xml:space="preserve" x="349" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff">→ 페이지 방문자 전원 실행</text>
  <text xml:space="preserve" x="349" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555">→ 대규모 세션 탈취 가능</text>

  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가장 위험: 지속적, 자동 전파</text>
  <text x="440" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">게시판, 프로필, 채팅에서 발생</text>

  <!-- DOM XSS -->
  <rect x="586" y="96" width="234" height="180" rx="10" fill="#1a1a0f" stroke="#e0a055" stroke-width="1.5"/>
  <text x="703" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a055">DOM-based XSS</text>
  <text x="703" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DOM형 — 서버 무관, 브라우저 DOM 조작</text>

  <rect x="602" y="154" width="202" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="612" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">// 취약 JavaScript</text>
  <text xml:space="preserve" x="612" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555">el.innerHTML = location.hash;</text>
  <text xml:space="preserve" x="612" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">// URL: #&lt;img src onerror=alert(1)&gt;</text>
  <text xml:space="preserve" x="612" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e0a055">→ 서버 로그에 남지 않음</text>

  <text x="703" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버 응답에 스크립트 없음</text>
  <text x="703" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">WAF·서버 필터 우회 가능</text>

  <!-- Impact section -->
  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">XSS 공격 영향</text>

  <rect x="60" y="334" width="175" height="54" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="147" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">세션 탈취</text>
  <text x="147" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">document.cookie 전송</text>

  <rect x="251" y="334" width="175" height="54" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="338" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">키로깅</text>
  <text x="338" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">폼 입력값 탈취</text>

  <rect x="442" y="334" width="175" height="54" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="529" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">가짜 UI 삽입</text>
  <text x="529" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">피싱 폼 삽입</text>

  <rect x="633" y="334" width="175" height="54" rx="8" fill="#111" stroke="#e0a055" stroke-width="1.5"/>
  <text x="720" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0a055">CSRF 우회</text>
  <text x="720" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">토큰 획득 후 요청</text>

  <!-- Defense row -->
  <rect x="60" y="408" width="760" height="66" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">핵심 방어</text>
  <text x="200" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">출력 인코딩</text>
  <text x="380" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CSP 헤더</text>
  <text x="560" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">HttpOnly 쿠키</text>
  <text x="730" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">innerHTML 금지</text>
  <text x="440" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨텍스트별 이스케이프 · Trusted Types · DOMPurify</text>
</svg>
