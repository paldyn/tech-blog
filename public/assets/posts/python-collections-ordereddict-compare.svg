<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">OrderedDict vs dict — 차이점과 활용</text>

  <!-- dict equality -->
  <rect x="60" y="72" width="360" height="168" rx="10" fill="#131825" stroke="#1e2433"/>
  <text x="240" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">일반 dict 동등성 비교</text>
  <rect x="76" y="106" width="328" height="120" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="127" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">d1 = {<tspan fill="#ce9178">'a'</tspan>: <tspan fill="#b5cea8">1</tspan>, <tspan fill="#ce9178">'b'</tspan>: <tspan fill="#b5cea8">2</tspan>}</text>
  <text x="92" y="145" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">d2 = {<tspan fill="#ce9178">'b'</tspan>: <tspan fill="#b5cea8">2</tspan>, <tspan fill="#ce9178">'a'</tspan>: <tspan fill="#b5cea8">1</tspan>}</text>
  <text x="92" y="163" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">d1 == d2  <tspan fill="#55c555"># True</tspan></text>
  <text x="92" y="181" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 삽입 순서와 무관하게 같음</text>
  <text x="92" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># Python 3.7+: dict도 삽입 순서 유지</text>

  <!-- OrderedDict equality -->
  <rect x="460" y="72" width="360" height="168" rx="10" fill="#131825" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">OrderedDict 동등성 비교</text>
  <rect x="476" y="106" width="328" height="120" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="127" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from collections <tspan fill="#7ec8e3">import</tspan> OrderedDict</text>
  <text x="492" y="145" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">od1 = OrderedDict([(<tspan fill="#ce9178">'a'</tspan>,<tspan fill="#b5cea8">1</tspan>),(<tspan fill="#ce9178">'b'</tspan>,<tspan fill="#b5cea8">2</tspan>)])</text>
  <text x="492" y="163" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">od2 = OrderedDict([(<tspan fill="#ce9178">'b'</tspan>,<tspan fill="#b5cea8">2</tspan>),(<tspan fill="#ce9178">'a'</tspan>,<tspan fill="#b5cea8">1</tspan>)])</text>
  <text x="492" y="181" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">od1 == od2  # False</text>
  <text x="492" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 삽입 순서도 동등성 조건에 포함</text>

  <!-- move_to_end + LRU -->
  <rect x="60" y="260" width="760" height="116" rx="8" fill="#0d0d0d" stroke="#1e2433"/>
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">move_to_end — LRU 캐시 핵심 메서드</text>
  <rect x="76" y="296" width="728" height="64" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">od = OrderedDict([(<tspan fill="#ce9178">'a'</tspan>,<tspan fill="#b5cea8">1</tspan>),(<tspan fill="#ce9178">'b'</tspan>,<tspan fill="#b5cea8">2</tspan>),(<tspan fill="#ce9178">'c'</tspan>,<tspan fill="#b5cea8">3</tspan>)])</text>
  <text x="92" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">od.move_to_end(<tspan fill="#ce9178">'a'</tspan>)         <tspan fill="#6a8aa0"># OrderedDict([('b',2),('c',3),('a',1)])</tspan></text>
  <text x="92" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">od.move_to_end(<tspan fill="#ce9178">'b'</tspan>, last=<tspan fill="#7ec8e3">False</tspan>)  <tspan fill="#6a8aa0"># 앞으로 이동</tspan></text>
</svg>
