<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">문자 인코딩: 문자 → 바이트 변환</text>

  <!-- Concept flow: char → codepoint → bytes -->
  <rect x="50" y="68" width="780" height="140" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">문자 → 코드포인트 → 바이트 흐름</text>

  <!-- Box 1: Character -->
  <rect x="80" y="100" width="140" height="80" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#55c555" text-anchor="middle">가</text>
  <text x="150" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">문자 (인간)</text>

  <!-- Arrow 1 -->
  <polygon points="232,140 260,140 260,136 278,148 260,160 260,156 232,156" fill="#7777cc"/>
  <text x="255" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">Unicode</text>

  <!-- Box 2: Code point -->
  <rect x="284" y="100" width="190" height="80" rx="8" fill="#13131f" stroke="#7777cc" stroke-width="1.5"/>
  <text x="379" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7777cc" text-anchor="middle">U+AC00</text>
  <text x="379" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">= 44032</text>
  <text x="379" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">유니코드 코드포인트</text>

  <!-- Arrow 2 -->
  <polygon points="482,140 510,140 510,136 528,148 510,160 510,156 482,156" fill="#7ec8e3"/>
  <text x="505" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">UTF-8</text>

  <!-- Box 3: UTF-8 bytes -->
  <rect x="534" y="100" width="300" height="80" rx="8" fill="#07111a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="684" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" text-anchor="middle">EA B0 80</text>
  <text x="684" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">3바이트 (한글)</text>
  <text x="684" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">UTF-8 바이트 시퀀스</text>

  <!-- UTF-8 byte sizes -->
  <rect x="50" y="228" width="780" height="120" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">UTF-8 가변 바이트 크기</text>

  <rect x="70" y="260" width="160" height="74" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">A  →  1 byte</text>
  <text x="150" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">U+0041 (0x41)</text>
  <text x="150" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ASCII 영역</text>
  <text x="150" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">U+0000–U+007F</text>

  <rect x="250" y="260" width="160" height="74" rx="6" fill="#13131f" stroke="#7777cc" stroke-width="1"/>
  <text x="330" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">é  →  2 bytes</text>
  <text x="330" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">C3 A9</text>
  <text x="330" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">라틴 확장</text>
  <text x="330" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">U+0080–U+07FF</text>

  <rect x="430" y="260" width="160" height="74" rx="6" fill="#07111a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="510" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">가  →  3 bytes</text>
  <text x="510" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">EA B0 80</text>
  <text x="510" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">한글·한자</text>
  <text x="510" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">U+0800–U+FFFF</text>

  <rect x="610" y="260" width="200" height="74" rx="6" fill="#1a1607" stroke="#b5cea8" stroke-width="1"/>
  <text x="710" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" text-anchor="middle">😊  →  4 bytes</text>
  <text x="710" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">F0 9F 98 8A</text>
  <text x="710" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이모지·보충 문자</text>
  <text x="710" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">U+10000–</text>

  <!-- Python code example -->
  <rect x="50" y="368" width="780" height="108" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Python 에서 인코딩/디코딩</text>

  <rect x="66" y="398" width="748" height="64" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="82" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">s = </text>
  <text x="110" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"가"</text>
  <text x="142" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  # str (유니코드)</text>
  <text x="82" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">b = s.</text>
  <text x="128" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">encode</text>
  <text x="176" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text>
  <text x="182" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"utf-8"</text>
  <text x="228" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)     </text>
  <text x="262" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># → b'\xea\xb0\x80'  (bytes)</text>
  <text x="82" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">b.</text>
  <text x="100" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">decode</text>
  <text x="148" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text>
  <text x="154" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"utf-8"</text>
  <text x="200" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)          </text>
  <text x="262" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># → "가"  (str)</text>
</svg>
