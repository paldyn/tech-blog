<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="aLabel" viewBox="0 0 10 10" refX="5" refY="5" markerUnits="userSpaceOnUse" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 9 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">URL 구조 완전 해부</text>

  <!-- Example URL -->
  <rect x="50" y="68" width="780" height="54" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="104" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#ffffff" xml:space="preserve"><tspan fill="#e0a055">https</tspan><tspan fill="#888">://</tspan><tspan fill="#55c555">user:pass</tspan><tspan fill="#888">@</tspan><tspan fill="#7ec8e3">api.example.com</tspan><tspan fill="#888">:8443</tspan><tspan fill="#b87ce8">/v1/items</tspan><tspan fill="#888">?q=test</tspan><tspan fill="#ce9178">&amp;lang=ko</tspan><tspan fill="#888">#section2</tspan></text>

  <!-- Component labels with arrows -->
  <!-- Scheme -->
  <line x1="83" y1="122" x2="83" y2="155" stroke="#e0a055" stroke-width="1.5"/>
  <rect x="42" y="155" width="82" height="36" rx="4" fill="#1a120b" stroke="#6a4a1a" stroke-width="1"/>
  <text x="83" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e0a055">스킴</text>

  <!-- Authority (user+host+port) -->
  <line x1="305" y1="122" x2="305" y2="215" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="220" y="215" width="170" height="50" rx="4" fill="#0b1a24" stroke="#2a6a8a" stroke-width="1"/>
  <text x="305" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">호스트 (Authority)</text>
  <text x="305" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">user:pass@host:port</text>

  <!-- Path -->
  <line x1="520" y1="122" x2="520" y2="155" stroke="#b87ce8" stroke-width="1.5"/>
  <rect x="467" y="155" width="106" height="36" rx="4" fill="#180d22" stroke="#6a3a8a" stroke-width="1"/>
  <text x="520" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#b87ce8">경로 (Path)</text>

  <!-- Query -->
  <line x1="657" y1="122" x2="657" y2="215" stroke="#9aa4b8" stroke-width="1.5"/>
  <rect x="581" y="215" width="152" height="50" rx="4" fill="#0f1219" stroke="#2a3a5a" stroke-width="1"/>
  <text x="657" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#9aa4b8">쿼리 스트링</text>
  <text x="657" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">?key=value&amp;key2=v2</text>

  <!-- Fragment -->
  <line x1="800" y1="122" x2="800" y2="155" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="751" y="155" width="98" height="36" rx="4" fill="#1a110b" stroke="#6a4a2a" stroke-width="1"/>
  <text x="800" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#ce9178">프래그먼트</text>

  <!-- Detailed breakdown -->
  <rect x="50" y="298" width="780" height="120" rx="8" fill="#0f1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">각 컴포넌트 역할</text>
  <line x1="70" y1="332" x2="810" y2="332" stroke="#1a2a3a" stroke-width="1"/>

  <text x="70" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a055">스킴</text>
  <text x="140" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 어떤 프로토콜을 쓸지 (https, http, ftp, mailto, file...)</text>

  <text x="70" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">호스트</text>
  <text x="140" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 어느 서버에 접속할지 (도메인 또는 IP). 포트 생략 시 스킴 기본값 사용</text>

  <text x="70" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b87ce8">경로</text>
  <text x="140" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 서버 내 리소스 위치. 슬래시(/)로 계층 구분. 서버가 해석 방식 결정</text>

  <text x="70" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">쿼리</text>
  <text x="140" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 서버에 전달하는 추가 파라미터. 서버가 처리. 검색·필터에 주로 사용</text>
</svg>
