<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">선택: 무엇을 고르느냐로 갈린다</text>

  <rect x="60" y="84" width="246" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="112" font-size="15" font-weight="600" fill="#7ec8e3">df["age"]</text>
  <text x="78" y="140" font-size="13" fill="#9aa4b8">컬럼 이름으로 선택</text>
  <text x="78" y="162" font-size="13" fill="#9aa4b8">→ Series 하나 반환</text>
  <text x="78" y="190" font-size="13" fill="#9aa4b8">df[["age","city"]]</text>
  <text x="78" y="212" font-size="13" fill="#9aa4b8">→ 여러 컬럼 = DataFrame</text>

  <rect x="317" y="84" width="246" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="335" y="112" font-size="15" font-weight="600" fill="#7ec8e3">df.loc[0, "age"]</text>
  <text x="335" y="140" font-size="13" fill="#9aa4b8">라벨 기반 선택</text>
  <text x="335" y="162" font-size="13" fill="#9aa4b8">→ index·컬럼 이름으로</text>
  <text x="335" y="190" font-size="13" fill="#9aa4b8">df.loc[df.age &gt; 28]</text>
  <text x="335" y="212" font-size="13" fill="#9aa4b8">→ 조건으로 행 필터</text>

  <rect x="574" y="84" width="246" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="592" y="112" font-size="15" font-weight="600" fill="#7ec8e3">df.iloc[0, 1]</text>
  <text x="592" y="140" font-size="13" fill="#9aa4b8">정수 위치 기반 선택</text>
  <text x="592" y="162" font-size="13" fill="#9aa4b8">→ 몇 번째 행·열인지</text>
  <text x="592" y="190" font-size="13" fill="#9aa4b8">df.iloc[0:3]</text>
  <text x="592" y="212" font-size="13" fill="#9aa4b8">→ 위치 슬라이싱</text>

  <rect x="60" y="252" width="760" height="34" rx="4" fill="#0f1320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="274" font-size="13" fill="#7ec8e3" text-anchor="middle">loc는 "이름표", iloc는 "순번" — 헷갈리면 데이터가 엉뚱하게 잡힌다</text>
</svg>
