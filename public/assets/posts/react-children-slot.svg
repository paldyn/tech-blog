<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">children prop — 컴포넌트 슬롯 패턴</text>

  <!-- Layout component left -->
  <rect x="60" y="80" width="360" height="200" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Card 컴포넌트 (슬롯 제공)</text>
  <rect x="80" y="118" width="320" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Card({ children }) {</tspan>
  </text>
  <text x="100" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> (</tspan>
  </text>
  <text x="100" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;div className=</tspan><tspan fill="#ce9178">"card"</tspan><tspan>&gt;</tspan>
  </text>
  <text x="100" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>      {children}  </tspan><tspan fill="#9aa4b8">{/* 슬롯 */}</tspan>
  </text>
  <text x="100" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;/div&gt;</tspan>
  </text>
  <text x="100" y="240" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  );</tspan>
  </text>
  <text x="100" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>}</tspan>
  </text>

  <!-- arrow -->
  <line x1="420" y1="180" x2="460" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Usage right -->
  <rect x="460" y="80" width="360" height="200" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">사용 측 (내용 주입)</text>
  <rect x="480" y="118" width="320" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="500" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>&lt;Card&gt;</tspan>
  </text>
  <text x="500" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  &lt;h2&gt;React 완전 정복&lt;/h2&gt;</tspan>
  </text>
  <text x="500" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  &lt;p&gt;이 시리즈는 100편입니다.&lt;/p&gt;</tspan>
  </text>
  <text x="500" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  &lt;Button&gt;읽기&lt;/Button&gt;</tspan>
  </text>
  <text x="500" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>&lt;/Card&gt;</tspan>
  </text>
  <text x="500" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* 태그 사이 내용이 children으로 전달됨 */}
  </text>

  <!-- Result DOM box -->
  <rect x="60" y="316" width="760" height="110" rx="8" fill="#141414" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">결과 DOM</text>
  <text x="80" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">
    &lt;div class="card"&gt;&lt;h2&gt;React 완전 정복&lt;/h2&gt;&lt;p&gt;이 시리즈는 100편입니다.&lt;/p&gt;&lt;button&gt;읽기&lt;/button&gt;&lt;/div&gt;
  </text>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Card가 레이아웃만 담당. 내용은 사용 측이 결정</text>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">→ 재사용성과 유연성을 동시에 달성</text>
</svg>
