<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">관계(Relation)의 해부</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">Codd의 관계형 모델 — 속성·튜플·도메인</text>

  <!-- Relation name label -->
  <text x="80" y="108" font-size="13" fill="#7ec8e3" font-weight="600">릴레이션 이름</text>
  <line x1="160" y1="112" x2="220" y2="112" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="228" y="116" font-size="12" fill="#7ec8e3">↓</text>

  <!-- Table header row -->
  <rect x="80" y="124" width="720" height="40" fill="#102030" rx="6" stroke="#1e3a5a" stroke-width="1.5"/>
  <!-- Header cells -->
  <text x="180" y="149" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">customers</text>
  <!-- Attribute labels above header -->
  <text x="310" y="118" text-anchor="middle" font-size="11" fill="#888">속성(Attribute) / 컬럼</text>
  <line x1="310" y1="122" x2="310" y2="124" stroke="#888" stroke-width="1"/>

  <!-- Attribute names in header -->
  <line x1="260" y1="124" x2="260" y2="164" stroke="#1e3a5a" stroke-width="1"/>
  <text x="310" y="149" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">id</text>
  <line x1="360" y1="124" x2="360" y2="164" stroke="#1e3a5a" stroke-width="1"/>
  <text x="470" y="149" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">name</text>
  <line x1="580" y1="124" x2="580" y2="164" stroke="#1e3a5a" stroke-width="1"/>
  <text x="650" y="149" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">email</text>
  <line x1="720" y1="124" x2="720" y2="164" stroke="#1e3a5a" stroke-width="1"/>
  <text x="760" y="149" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">grade</text>

  <!-- Data rows (tuples) -->
  <!-- Row 1 -->
  <rect x="80" y="164" width="720" height="44" fill="#0d1a10" rx="0" stroke="#1e3a1e" stroke-width="0.5"/>
  <line x1="260" y1="164" x2="260" y2="208" stroke="#1e3a1e" stroke-width="1"/>
  <text x="310" y="191" text-anchor="middle" font-size="13" fill="#b5cea8">1</text>
  <line x1="360" y1="164" x2="360" y2="208" stroke="#1e3a1e" stroke-width="1"/>
  <text x="470" y="191" text-anchor="middle" font-size="13" fill="#e8e8e8">김민준</text>
  <line x1="580" y1="164" x2="580" y2="208" stroke="#1e3a1e" stroke-width="1"/>
  <text x="650" y="191" text-anchor="middle" font-size="13" fill="#ce9178">minjun@ex.com</text>
  <line x1="720" y1="164" x2="720" y2="208" stroke="#1e3a1e" stroke-width="1"/>
  <text x="760" y="191" text-anchor="middle" font-size="13" fill="#7ec8e3">GOLD</text>

  <!-- Row 2 -->
  <rect x="80" y="208" width="720" height="44" fill="#0a1508" rx="0" stroke="#1e3a1e" stroke-width="0.5"/>
  <line x1="260" y1="208" x2="260" y2="252" stroke="#1e3a1e" stroke-width="1"/>
  <text x="310" y="235" text-anchor="middle" font-size="13" fill="#b5cea8">2</text>
  <line x1="360" y1="208" x2="360" y2="252" stroke="#1e3a1e" stroke-width="1"/>
  <text x="470" y="235" text-anchor="middle" font-size="13" fill="#e8e8e8">이서연</text>
  <line x1="580" y1="208" x2="580" y2="252" stroke="#1e3a1e" stroke-width="1"/>
  <text x="650" y="235" text-anchor="middle" font-size="13" fill="#ce9178">seoyeon@ex.com</text>
  <line x1="720" y1="208" x2="720" y2="252" stroke="#1e3a1e" stroke-width="1"/>
  <text x="760" y="235" text-anchor="middle" font-size="13" fill="#55c555">SILVER</text>

  <!-- Row 3 -->
  <rect x="80" y="252" width="720" height="44" fill="#0d1a10" rx="0" stroke="#1e3a1e" stroke-width="0.5"/>
  <line x1="260" y1="252" x2="260" y2="296" stroke="#1e3a1e" stroke-width="1"/>
  <text x="310" y="279" text-anchor="middle" font-size="13" fill="#b5cea8">3</text>
  <line x1="360" y1="252" x2="360" y2="296" stroke="#1e3a1e" stroke-width="1"/>
  <text x="470" y="279" text-anchor="middle" font-size="13" fill="#e8e8e8">박도현</text>
  <line x1="580" y1="252" x2="580" y2="296" stroke="#1e3a1e" stroke-width="1"/>
  <text x="650" y="279" text-anchor="middle" font-size="13" fill="#ce9178">dohyun@ex.com</text>
  <line x1="720" y1="252" x2="720" y2="296" stroke="#1e3a1e" stroke-width="1"/>
  <text x="760" y="279" text-anchor="middle" font-size="13" fill="#7ec8e3">GOLD</text>

  <!-- Table border -->
  <rect x="80" y="124" width="720" height="172" fill="none" rx="6" stroke="#2a4060" stroke-width="1.5"/>

  <!-- Annotation: tuple -->
  <line x1="80" y1="230" x2="50" y2="230" stroke="#55c555" stroke-width="1.5"/>
  <text x="44" y="214" text-anchor="end" font-size="12" fill="#55c555">튜플</text>
  <text x="44" y="230" text-anchor="end" font-size="12" fill="#55c555">(행)</text>

  <!-- Annotation: degree -->
  <line x1="440" y1="296" x2="440" y2="318" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="334" text-anchor="middle" font-size="12" fill="#7777cc">차수(Degree) = 4 (속성 수)</text>

  <!-- Annotation: cardinality -->
  <line x1="820" y1="210" x2="820" y2="270" stroke="#e8c060" stroke-width="1.5"/>
  <line x1="800" y1="210" x2="820" y2="210" stroke="#e8c060" stroke-width="1.5"/>
  <line x1="800" y1="270" x2="820" y2="270" stroke="#e8c060" stroke-width="1.5"/>
  <text x="826" y="244" font-size="12" fill="#e8c060">카디널리티</text>
  <text x="826" y="260" font-size="12" fill="#e8c060">(튜플 수) = 3</text>

  <!-- Domain box -->
  <rect x="80" y="356" width="720" height="88" fill="#0f0f1a" rx="8" stroke="#2a2a5a" stroke-width="1"/>
  <text x="100" y="380" font-size="14" font-weight="600" fill="#7777cc">도메인(Domain)</text>
  <text x="100" y="400" font-size="13" fill="#888">각 속성이 가질 수 있는 값의 집합</text>
  <text x="100" y="420" font-size="13" fill="#e8e8e8">grade 도메인 = {BRONZE, SILVER, GOLD, PLATINUM}</text>
  <text x="100" y="436" font-size="12" fill="#888">→ CHECK 제약 또는 ENUM 타입으로 SQL에서 표현</text>

  <!-- Footer -->
  <text x="440" y="478" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 Chapter 1</text>
</svg>
