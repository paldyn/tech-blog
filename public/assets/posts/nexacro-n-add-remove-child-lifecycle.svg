<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">addChild / removeChild 동작</text>

  <!-- Container box -->
  <rect x="60" y="74" width="760" height="240" rx="8" fill="#0f172a" stroke="#374151" stroke-width="1.5"/>
  <text x="90" y="100" fill="#888" font-size="13">div_container (부모 컨테이너)</text>

  <!-- Child 1 -->
  <rect x="90" y="110" width="150" height="60" rx="6" fill="#1e293b" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="165" y="137" fill="#7ec8e3" font-size="12" text-anchor="middle">edt_name</text>
  <text x="165" y="156" fill="#888" font-size="11" text-anchor="middle">Edit</text>

  <!-- Child 2 -->
  <rect x="260" y="110" width="150" height="60" rx="6" fill="#1e293b" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="335" y="137" fill="#7ec8e3" font-size="12" text-anchor="middle">btn_search</text>
  <text x="335" y="156" fill="#888" font-size="11" text-anchor="middle">Button</text>

  <!-- Child 3 (being removed) -->
  <rect x="430" y="110" width="150" height="60" rx="6" fill="#1e293b" stroke="#e05555" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="505" y="137" fill="#e05555" font-size="12" text-anchor="middle">stc_label</text>
  <text x="505" y="156" fill="#888" font-size="11" text-anchor="middle">Static — 제거 예정</text>

  <!-- Child 4 (being added) -->
  <rect x="600" y="110" width="160" height="60" rx="6" fill="#1e293b" stroke="#55c555" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="680" y="137" fill="#55c555" font-size="12" text-anchor="middle">cmb_type</text>
  <text x="680" y="156" fill="#888" font-size="11" text-anchor="middle">Combo — 추가 중</text>

  <!-- addChild arrow (from outside) -->
  <line x1="680" y1="70" x2="680" y2="107" stroke="#55c555" stroke-width="2"/>
  <polygon points="680,110 674,98 686,98" fill="#55c555"/>
  <text x="730" y="65" fill="#55c555" font-size="12">addChild()</text>

  <!-- removeChild arrow (to outside) -->
  <line x1="505" y1="73" x2="505" y2="107" stroke="#e05555" stroke-width="2"/>
  <polygon points="505,70 499,82 511,82" fill="#e05555"/>
  <text x="535" y="65" fill="#e05555" font-size="12">removeChild()</text>

  <!-- Method table -->
  <rect x="60" y="334" width="760" height="90" rx="8" fill="#111827" stroke="#374151"/>
  <text x="80" y="360" fill="#e8e8e8" font-size="14" font-weight="600">주요 메서드 비교</text>
  <text x="80" y="382" fill="#7ec8e3" font-size="12">addChild(sID, obj)      </text>
  <text x="260" y="382" fill="#e8e8e8" font-size="12">— 컴포넌트 추가. obj.show() 별도 호출 필요</text>
  <text x="80" y="400" fill="#e05555" font-size="12">removeChild(sID)        </text>
  <text x="260" y="400" fill="#e8e8e8" font-size="12">— 컴포넌트 제거 및 메모리 해제</text>
  <text x="80" y="418" fill="#7777cc" font-size="12">removeAll()             </text>
  <text x="260" y="418" fill="#e8e8e8" font-size="12">— 컨테이너 내 모든 자식 컴포넌트 제거</text>
</svg>
