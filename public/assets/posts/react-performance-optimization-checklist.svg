<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">React 성능 최적화 체크리스트</text>

  <!-- Priority 1: Measure first -->
  <rect x="60" y="76" width="760" height="60" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="84" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#ce9178">0단계. 먼저 측정하라 (측정 없는 최적화는 추측일 뿐)</text>
  <text x="84" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">React DevTools Profiler → 실제로 느린 컴포넌트 찾기 → 그 후 최적화 적용</text>

  <!-- Step 1 -->
  <rect x="60" y="158" width="360" height="100" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">1. 불필요한 리렌더 제거</text>
  <text x="84" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">React.memo — props 동일 시 컴포넌트 스킵</text>
  <text x="84" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">useCallback — 콜백 참조 안정화</text>
  <text x="84" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">useMemo — 비싼 계산 결과 캐싱</text>

  <!-- Step 2 -->
  <rect x="460" y="158" width="360" height="100" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">2. 상태 관리 최적화</text>
  <text x="484" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">State 하강 — 최대한 사용처 가까이 배치</text>
  <text x="484" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">Context 분리 — 역할별로 나눔</text>
  <text x="484" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">useReducer — 복잡한 상태 로직 정리</text>

  <!-- Step 3 -->
  <rect x="60" y="278" width="360" height="100" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="84" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">3. 코드 분할 · 지연 로딩</text>
  <text x="84" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">React.lazy + Suspense — 라우트 분할</text>
  <text x="84" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">dynamic import — 무거운 라이브러리 지연</text>
  <text x="84" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">Tree-shaking — 번들에서 불필요 코드 제거</text>

  <!-- Step 4 -->
  <rect x="460" y="278" width="360" height="100" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="484" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#ce9178">4. 렌더링 부담 줄이기</text>
  <text x="484" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">가상화 — 긴 목록 react-window 적용</text>
  <text x="484" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">useTransition — 긴급 / 비긴급 분리</text>
  <text x="484" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">useDeferredValue — 입력 중 UI 부드럽게</text>

  <!-- Bottom: golden rule -->
  <rect x="60" y="398" width="760" height="36" rx="8" fill="#0d1212" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3" text-anchor="middle">황금 규칙: 코드 가독성 유지 &gt; 무분별한 최적화. 실제 병목부터 고쳐라.</text>
</svg>
