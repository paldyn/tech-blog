<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">베어 저장소 + worktree 패턴</text>

  <!-- Bare repo -->
  <rect x="310" y="68" width="260" height="100" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">베어 저장소</text>
  <text x="440" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">myapp.git/  (작업 파일 없음)</text>
  <text x="440" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">오브젝트 DB만 존재</text>
  <text x="440" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git clone --bare origin myapp.git</text>

  <!-- Arrows -->
  <line x1="310" y1="118" x2="200" y2="118" stroke="#7777cc" stroke-width="2"/>
  <line x1="200" y1="118" x2="200" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <line x1="440" y1="168" x2="440" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <line x1="570" y1="118" x2="680" y2="118" stroke="#7777cc" stroke-width="2"/>
  <line x1="680" y1="118" x2="680" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Worktree 1: main -->
  <rect x="60" y="224" width="240" height="90" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">main/</text>
  <text x="180" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">→ main 브랜치</text>
  <text x="180" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git worktree add main main</text>

  <!-- Worktree 2: feature -->
  <rect x="320" y="224" width="240" height="90" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">feature-auth/</text>
  <text x="440" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">→ feature/auth</text>
  <text x="440" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git worktree add feature-auth ...</text>

  <!-- Worktree 3: hotfix -->
  <rect x="580" y="224" width="240" height="90" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">hotfix-v2/</text>
  <text x="700" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">→ hotfix/v2.1</text>
  <text x="700" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git worktree add hotfix-v2 ...</text>

  <!-- Setup commands -->
  <rect x="60" y="336" width="760" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">베어 저장소 + worktree 초기 설정</text>
  <rect x="80" y="372" width="720" height="52" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git clone --bare https://github.com/org/myapp.git myapp.git</text>
  <text x="96" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">cd myapp.git &amp;&amp; git worktree add ../main main</text>
</svg>
