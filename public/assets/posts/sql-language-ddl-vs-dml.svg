<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DDL vs DML — 동작 방식 비교</text>

  <!-- DDL column -->
  <rect x="60" y="68" width="360" height="320" fill="#0d0d0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">DDL (자동 COMMIT)</text>

  <rect x="76" y="104" width="328" height="200" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 즉시 반영, 되돌리기 불가</text>
  <text x="92" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">CREATE TABLE</text>
  <text x="92" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  orders (</text>
  <text x="92" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    id     INT</text>
  <text x="92" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">      PRIMARY KEY,</text>
  <text x="92" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    amount DECIMAL</text>
  <text x="92" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  );</text>
  <text x="92" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 실행 즉시 COMMIT 발생</text>
  <text x="92" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- ROLLBACK 효과 없음!</text>

  <rect x="76" y="312" width="328" height="60" fill="#111" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">주의</text>
  <text x="240" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">DDL 실행 전 미완성 DML은 모두 COMMIT됨</text>
  <text x="240" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">(Oracle/MySQL 기준, PG는 예외)</text>

  <!-- DML column -->
  <rect x="460" y="68" width="360" height="320" fill="#0d0d0d" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">DML (명시적 COMMIT 필요)</text>

  <rect x="476" y="104" width="328" height="200" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 트랜잭션 내 실행</text>
  <text x="492" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">BEGIN;</text>
  <text x="492" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">INSERT INTO</text>
  <text x="492" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  orders(id, amount)</text>
  <text x="492" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">VALUES</text>
  <text x="492" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">  (1, 50000);</text>
  <text x="492" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 취소 가능</text>
  <text x="492" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">ROLLBACK;</text>
  <text x="492" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 또는 확정</text>
  <text x="492" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">COMMIT;</text>

  <rect x="476" y="312" width="328" height="60" fill="#111" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">안전</text>
  <text x="640" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">COMMIT 전까지 다른 세션에 변경 내용 비공개</text>
  <text x="640" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">ROLLBACK으로 모든 변경 취소 가능</text>
</svg>