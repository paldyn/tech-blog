  <!-- Code -->
  <rect x="60" y="258" width="760" height="190" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// useDeferredValue 기본 패턴</text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> { useState, useDeferredValue, useMemo, memo } </tspan>
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ce9178"> 'react'</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> SlowList = memo(({ query }: { query: string }) =&gt; {</tspan>
  </text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> results = computeExpensive(query);</tspan>
  </text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> &lt;</tspan>
    <tspan fill="#55c555">ul</tspan>
    <tspan fill="#ffffff">&gt;{results.map(r =&gt; &lt;</tspan>
    <tspan fill="#55c555">li</tspan>
    <tspan fill="#ffffff">&gt;{r}&lt;/</tspan>
    <tspan fill="#55c555">li</tspan>
    <tspan fill="#ffffff">&gt;)}&lt;/</tspan>
    <tspan fill="#55c555">ul</tspan>
    <tspan fill="#ffffff">&gt;;</tspan>
  </text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">});</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> Search() {</tspan>
  </text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> [query, setQuery] = useState(</tspan>
    <tspan fill="#ce9178">''</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> deferredQuery = useDeferredValue(query);</tspan>
  </text>
  <text x="76" y="448" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> &lt;&gt;&lt;</tspan>
    <tspan fill="#55c555">input</tspan>
    <tspan fill="#ffffff"> value={query} onChange={e =&gt; setQuery(e.target.value)}/&gt;</tspan>
  </text>
