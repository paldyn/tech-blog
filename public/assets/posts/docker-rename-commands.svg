<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker rename — 명령 패턴 &amp; 활용</text>

  <!-- Left column -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 사용법</text>
  <rect x="60" y="92" width="370" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 이름 변경</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker rename</tspan><tspan fill="#e8e8e8"> &lt;OLD&gt; &lt;NEW&gt;</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 실행 중에도 바로 적용됨</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker rename</tspan><tspan fill="#e8e8e8"> quirky_hypatia web</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker ps</tspan><tspan fill="#6a8aa0">  # → NAME: web</tspan></text>

  <!-- Left column: naming convention -->
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">네이밍 컨벤션 패턴</text>
  <rect x="60" y="230" width="370" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 환경별 접두사</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker rename</tspan><tspan fill="#e8e8e8"> app prod-app-v2</tspan></text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 버전 표기</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker rename</tspan><tspan fill="#e8e8e8"> db db-postgres16</tspan></text>

  <!-- Right column: Blue-green deployment -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">블루-그린 전환 패턴</text>
  <rect x="448" y="92" width="372" height="136" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="464" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 신규 컨테이너 실행</text>
  <text x="464" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#e8e8e8"> -d --name web-new myapp:v2</tspan></text>
  <text x="464" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 구버전 이름 변경 (예비)</text>
  <text x="464" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker rename</tspan><tspan fill="#e8e8e8"> web web-old</tspan></text>
  <text x="464" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 신규를 서비스명으로 승격</text>
  <text x="464" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker rename</tspan><tspan fill="#e8e8e8"> web-new web</tspan></text>

  <!-- Right column: Notes -->
  <text x="460" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">제약 사항</text>
  <rect x="448" y="266" width="372" height="64" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="464" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 이름 충돌: 동명 컨테이너 존재 시 오류</text>
  <text x="464" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• --name으로 실행 중인 compose 컨테이너는</text>
  <text x="464" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  rename 후 compose 명령 오동작 가능</text>

  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">유효한 이름: 영문자·숫자·- (하이픈)·_ (언더스코어) — 슬래시 제외</text>
</svg>
