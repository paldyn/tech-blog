<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Volume Snapshot API 오브젝트 관계</text>

  <!-- VolumeSnapshotClass -->
  <rect x="60" y="72" width="220" height="96" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">VolumeSnapshotClass</text>
  <text x="170" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">driver: ebs.csi.aws.com</text>
  <text x="170" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">deletionPolicy: Delete/Retain</text>
  <text x="170" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클러스터 범위</text>

  <!-- Arrow to VolumeSnapshot -->
  <line x1="280" y1="120" x2="320" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="298" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">참조</text>

  <!-- VolumeSnapshot -->
  <rect x="322" y="72" width="220" height="96" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="432" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">VolumeSnapshot</text>
  <text x="432" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자 생성 요청 오브젝트</text>
  <text x="432" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">source: PVC 또는 VSC 참조</text>
  <text x="432" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">네임스페이스 범위</text>

  <!-- Arrow to VolumeSnapshotContent -->
  <line x1="542" y1="120" x2="582" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="560" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">바인딩</text>

  <!-- VolumeSnapshotContent -->
  <rect x="584" y="72" width="236" height="96" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="702" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">VolumeSnapshotContent</text>
  <text x="702" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클러스터 범위 (PV와 유사)</text>
  <text x="702" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">snapshotHandle: snap-xxxxx</text>
  <text x="702" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">실제 클라우드 스냅샷 참조</text>

  <!-- PVC for restore -->
  <rect x="322" y="214" width="220" height="96" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="432" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">PVC (dataSource)</text>
  <text x="432" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">VolumeSnapshot에서 복원</text>
  <text x="432" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">용량 &gt;= 스냅샷 원본</text>
  <text x="432" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">같은 네임스페이스</text>

  <!-- Arrow VolumeSnapshot to PVC -->
  <line x1="432" y1="168" x2="432" y2="214" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="446" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">복원 요청</text>

  <!-- VolumeSnapshot cross-namespace note -->
  <rect x="60" y="334" width="760" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">크로스 네임스페이스 스냅샷 복원 (k8s 1.26+)</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wantedorate Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">다른 네임스페이스의 VolumeSnapshot을 참조할 때는 VolumeSnapshotContent를 직접 참조 (dataSourceRef) — 동일 클러스터 내</text>
</svg>
