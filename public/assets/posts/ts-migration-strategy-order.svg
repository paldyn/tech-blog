<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="mo_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">말단부터 변환하는 이유</text>
  <text x="60" y="76" font-size="14" fill="#888">의존성이 없는 파일(leaf)부터 타입을 입혀 위로 올라간다</text>

  <!-- leaf -->
  <rect x="320" y="270" width="240" height="56" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="295" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">utils / constants</text>
  <text x="440" y="315" font-size="12" fill="#888" text-anchor="middle">의존성 없음 → 먼저 변환</text>

  <!-- mid -->
  <rect x="200" y="160" width="200" height="56" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="300" y="185" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">services</text>
  <text x="300" y="205" font-size="12" fill="#888" text-anchor="middle">utils에 의존</text>
  <rect x="480" y="160" width="200" height="56" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="185" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">models</text>
  <text x="580" y="205" font-size="12" fill="#888" text-anchor="middle">utils에 의존</text>

  <!-- top -->
  <rect x="340" y="100" width="200" height="40" fill="#101418" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="125" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">entry (app)</text>

  <!-- arrows from leaf up -->
  <line x1="400" y1="270" x2="320" y2="218" stroke="#55c555" stroke-width="2" marker-end="url(#mo_arr)"/>
  <line x1="480" y1="270" x2="560" y2="218" stroke="#55c555" stroke-width="2" marker-end="url(#mo_arr)"/>
  <line x1="320" y1="160" x2="410" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#mo_arr)"/>
  <line x1="560" y1="160" x2="470" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#mo_arr)"/>

  <text x="60" y="345" font-size="13" fill="#9aa4b8">→ 먼저 변환한 파일이 정확한 타입을 제공하면, 그 위 파일의 추론이 저절로 좋아진다</text>
</svg>
