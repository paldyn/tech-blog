<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ECMAScript vs JavaScript</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">명칭 혼란 정리 및 구현체 관계</text>

  <!-- Left column: ECMAScript -->
  <rect x="60" y="100" width="340" height="200" rx="10" fill="#0e1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">ECMAScript (ECMA-262)</text>
  <text x="230" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">ECMA International이 관리하는 공식 표준</text>

  <rect x="80" y="168" width="300" height="28" rx="5" fill="#111820"/>
  <text x="230" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">문법(Syntax) 및 의미론(Semantics) 정의</text>

  <rect x="80" y="202" width="300" height="28" rx="5" fill="#111820"/>
  <text x="230" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">내장 객체 (Array, Promise, Map …)</text>

  <rect x="80" y="236" width="300" height="28" rx="5" fill="#111820"/>
  <text x="230" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">매년 6월 새 버전 확정 (ES2015~)</text>

  <!-- Arrow -->
  <line x1="400" y1="200" x2="448" y2="200" stroke="#555" stroke-width="2"/>
  <polygon points="460,200 448,194 448,206" fill="#555"/>
  <text x="430" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">구현</text>

  <!-- Right column: JS implementations -->
  <rect x="460" y="100" width="360" height="200" rx="10" fill="#0e150e" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">구현체들</text>
  <text x="640" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">ECMAScript 표준을 실제로 구현한 엔진</text>

  <rect x="480" y="168" width="320" height="28" rx="5" fill="#0d150d"/>
  <text x="540" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">V8</text>
  <text x="570" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">— Chrome, Node.js, Deno, Bun</text>

  <rect x="480" y="202" width="320" height="28" rx="5" fill="#0d150d"/>
  <text x="540" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55a">SpiderMonkey</text>
  <text x="650" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">— Firefox</text>

  <rect x="480" y="236" width="320" height="28" rx="5" fill="#0d150d"/>
  <text x="540" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">JavaScriptCore</text>
  <text x="663" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">— Safari, Bun</text>

  <!-- Bottom note -->
  <rect x="60" y="322" width="760" height="52" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">JavaScript = ECMAScript + Web APIs (DOM, Fetch, localStorage …)</text>
  <text x="440" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666" text-anchor="middle">Node.js = ECMAScript + Node.js APIs (fs, http, Buffer …)</text>

  <!-- Code block -->
  <rect x="60" y="390" width="760" height="36" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// TC39 진행 상황 확인: </text><text x="288" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">https://github.com/tc39/proposals</text>

  <!-- Footer -->
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
