<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 560"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">ECMAScript 버전 역사</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">ES1(1997) → ES2024 · 매년 진화하는 표준</text>

  <!-- Era 1 : 초기 (x=60, width=360) -->
  <rect x="60" y="104" width="360" height="168" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="78" y="128" font-size="13" font-weight="600" fill="#7777cc">초기 표준화 시대 (1997–2009)</text>
  <text x="78" y="150" font-size="12" fill="#888">ES1  1997 — 최초 표준화</text>
  <text x="78" y="168" font-size="12" fill="#888">ES2  1998 — ISO/IEC 16262 정렬</text>
  <text x="78" y="186" font-size="12" fill="#888">ES3  1999 — 정규식 · try/catch · 배열 메서드</text>
  <text x="78" y="204" font-size="12" fill="#666">ES4       — 폐기 (너무 급진적인 변경안)</text>
  <text x="78" y="222" font-size="12" fill="#888">ES5  2009 — strict mode · JSON · Array 메서드</text>

  <!-- Solid polygon arrow (60px gap: x=422→478, center y=188) -->
  <polygon points="422,195 422,181 452,181 452,175 478,188 452,201 452,195"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Era 2 : 대전환 (x=480, width=340) -->
  <rect x="480" y="104" width="340" height="168" fill="#0f1624" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="498" y="128" font-size="13" font-weight="600" fill="#e05555">대전환 (2015) — ES6 / ES2015</text>
  <text x="498" y="150" font-size="12" fill="#888">let · const · 화살표 함수 · 클래스</text>
  <text x="498" y="168" font-size="12" fill="#888">모듈 (import/export) · 템플릿 리터럴</text>
  <text x="498" y="186" font-size="12" fill="#888">Promise · Symbol · Map · Set · WeakMap</text>
  <text x="498" y="204" font-size="12" fill="#888">디스트럭처링 · 스프레드 · 기본값 매개변수</text>
  <text x="498" y="222" font-size="12" fill="#888">제너레이터 · Proxy · Reflect</text>

  <!-- Era 3 : 연간 릴리스 table -->
  <rect x="60" y="292" width="760" height="208" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="78" y="316" font-size="13" font-weight="600" fill="#55c555">연간 릴리스 시대 (ES2016 → ES2024)</text>

  <!-- table header -->
  <text x="78"  y="338" font-size="11" fill="#555">버전</text>
  <text x="160" y="338" font-size="11" fill="#555">주요 추가 기능</text>

  <!-- rows — 18px spacing -->
  <text x="78"  y="356" font-size="12" fill="#7ec8e3">ES2016</text>
  <text x="160" y="356" font-size="12" fill="#888">Array.prototype.includes · 지수 연산자 (**)</text>

  <text x="78"  y="374" font-size="12" fill="#7ec8e3">ES2017</text>
  <text x="160" y="374" font-size="12" fill="#888">async/await · Object.entries/values · SharedArrayBuffer</text>

  <text x="78"  y="392" font-size="12" fill="#7ec8e3">ES2018</text>
  <text x="160" y="392" font-size="12" fill="#888">Promise.finally · 비동기 이터레이션 · Rest/Spread 객체</text>

  <text x="78"  y="410" font-size="12" fill="#7ec8e3">ES2020</text>
  <text x="160" y="410" font-size="12" fill="#888">BigInt · Nullish(??) · 옵셔널 체이닝(?.) · Promise.allSettled</text>

  <text x="78"  y="428" font-size="12" fill="#7ec8e3">ES2022</text>
  <text x="160" y="428" font-size="12" fill="#888">클래스 private(#) · Top-level await · Error cause · at()</text>

  <text x="78"  y="446" font-size="12" fill="#7ec8e3">ES2023</text>
  <text x="160" y="446" font-size="12" fill="#888">Array.findLast · toSorted · toReversed · Hashbang</text>

  <text x="78"  y="464" font-size="12" fill="#7ec8e3">ES2024</text>
  <text x="160" y="464" font-size="12" fill="#888">Promise.withResolvers · Object.groupBy · ArrayBuffer.resize</text>

  <!-- Footer -->
  <text x="60" y="516" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part I — ES2019·ES2021 생략, 다음 편에서 상세 설명</text>
</svg>
