<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">ECMAScript 버전 히스토리</text>

  <!-- Column headers -->
  <text x="100" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#888">버전</text>
  <text x="220" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#888">연도</text>
  <text x="530" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#888">주요 추가 기능</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ES3 -->
  <rect x="60" y="88" width="760" height="36" rx="4" fill="#111"/>
  <text x="100" y="111" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">ES3</text>
  <text x="220" y="111" text-anchor="middle" font-size="13" fill="#888">1999</text>
  <text x="340" y="111" font-size="12" fill="#666">정규표현식 · try/catch · 엄격한 비교 — 10년간 사실상 표준</text>

  <!-- ES5 -->
  <rect x="60" y="128" width="760" height="36" rx="4" fill="#0d1117"/>
  <text x="100" y="151" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">ES5</text>
  <text x="220" y="151" text-anchor="middle" font-size="13" fill="#888">2009</text>
  <text x="340" y="151" font-size="12" fill="#888">strict mode · JSON · Array.forEach/map/filter · getter/setter</text>

  <!-- ES6/ES2015 - highlight -->
  <rect x="60" y="168" width="760" height="40" rx="4" fill="#0a1628"/>
  <rect x="60" y="168" width="4" height="40" rx="2" fill="#7777cc"/>
  <text x="100" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">ES6</text>
  <text x="100" y="203" text-anchor="middle" font-size="11" fill="#7777cc">ES2015</text>
  <text x="220" y="195" text-anchor="middle" font-size="13" fill="#7777cc">2015</text>
  <text x="340" y="188" font-size="12" fill="#7777cc">let/const · 화살표 함수 · 클래스 · 모듈 · Promise</text>
  <text x="340" y="203" font-size="12" fill="#7777cc">템플릿 리터럴 · 디스트럭처링 · Symbol · Map/Set</text>

  <!-- ES2016 -->
  <rect x="60" y="212" width="760" height="36" rx="4" fill="#111"/>
  <text x="100" y="235" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">ES2016</text>
  <text x="220" y="235" text-anchor="middle" font-size="13" fill="#888">2016</text>
  <text x="340" y="235" font-size="12" fill="#888">Array.includes · 지수 연산자 (**)</text>

  <!-- ES2017 -->
  <rect x="60" y="252" width="760" height="36" rx="4" fill="#0d1117"/>
  <text x="100" y="275" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">ES2017</text>
  <text x="220" y="275" text-anchor="middle" font-size="13" fill="#888">2017</text>
  <text x="340" y="275" font-size="12" fill="#888">async/await · Object.entries/values · SharedArrayBuffer</text>

  <!-- ES2018 -->
  <rect x="60" y="292" width="760" height="36" rx="4" fill="#111"/>
  <text x="100" y="315" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">ES2018</text>
  <text x="220" y="315" text-anchor="middle" font-size="13" fill="#888">2018</text>
  <text x="340" y="315" font-size="12" fill="#888">for await...of · Promise.finally · 정규식 lookbehind/named group</text>

  <!-- ES2019 -->
  <rect x="60" y="332" width="760" height="36" rx="4" fill="#0d1117"/>
  <text x="100" y="355" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">ES2019</text>
  <text x="220" y="355" text-anchor="middle" font-size="13" fill="#888">2019</text>
  <text x="340" y="355" font-size="12" fill="#888">Array.flat/flatMap · Object.fromEntries · optional catch binding</text>

  <!-- ES2020 -->
  <rect x="60" y="372" width="760" height="36" rx="4" fill="#111"/>
  <text x="100" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">ES2020</text>
  <text x="220" y="395" text-anchor="middle" font-size="13" fill="#888">2020</text>
  <text x="340" y="395" font-size="12" fill="#888">BigInt · nullish coalescing (??) · optional chaining (?.) · globalThis</text>

  <!-- ES2021 -->
  <rect x="60" y="412" width="760" height="36" rx="4" fill="#0d1117"/>
  <text x="100" y="435" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">ES2021</text>
  <text x="220" y="435" text-anchor="middle" font-size="13" fill="#888">2021</text>
  <text x="340" y="435" font-size="12" fill="#888">논리 할당 (&&=, ||=, ??=) · String.replaceAll · WeakRef</text>

  <!-- ES2022 -->
  <rect x="60" y="452" width="760" height="36" rx="4" fill="#111"/>
  <text x="100" y="475" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">ES2022</text>
  <text x="220" y="475" text-anchor="middle" font-size="13" fill="#888">2022</text>
  <text x="340" y="475" font-size="12" fill="#888">클래스 private (#) · at() · Object.hasOwn · Error cause · top-level await</text>

  <!-- ES2023 / ES2024 -->
  <rect x="60" y="492" width="760" height="36" rx="4" fill="#0d1117"/>
  <text x="100" y="508" text-anchor="middle" font-size="12" font-weight="600" fill="#ce9178">ES2023+</text>
  <text x="220" y="508" text-anchor="middle" font-size="13" fill="#888">2023~</text>
  <text x="340" y="508" font-size="12" fill="#888">Array.toSorted/toReversed · Object.groupBy · Promise.withResolvers ...</text>

  <!-- Footer -->
  <text x="440" y="548" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 — ES3→ES5 긴 침묵, ES6에서 대격변, 이후 매년 점진적 개선</text>
</svg>
