<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrP" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">상대 경로 지옥 → 경로 별칭</text>

  <text x="60" y="84" font-size="14" font-weight="600" fill="#e05555">Before — 깊은 상대 경로</text>
  <rect x="60" y="96" width="350" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="78" y="122" fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { api }</tspan>
    <tspan x="78" y="142" fill="#7ec8e3" font-weight="600">  from</tspan><tspan fill="#ce9178"> '../../../lib/api'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="78" y="170" fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { Btn }</tspan>
    <tspan x="78" y="190" fill="#7ec8e3" font-weight="600">  from</tspan><tspan fill="#ce9178"> '../../ui/Btn'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="78" y="214" fill="#9aa4b8">// 옮기면 다 깨짐</tspan>
  </text>

  <line x1="420" y1="160" x2="468" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arrP)"/>

  <text x="480" y="84" font-size="14" font-weight="600" fill="#55c555">After — @ 별칭</text>
  <rect x="480" y="96" width="340" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="498" y="122" fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { api }</tspan>
    <tspan x="498" y="142" fill="#7ec8e3" font-weight="600">  from</tspan><tspan fill="#ce9178"> '@/lib/api'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="498" y="170" fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { Btn }</tspan>
    <tspan x="498" y="190" fill="#7ec8e3" font-weight="600">  from</tspan><tspan fill="#ce9178"> '@/ui/Btn'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="498" y="214" fill="#9aa4b8">// 위치 무관, 안정적</tspan>
