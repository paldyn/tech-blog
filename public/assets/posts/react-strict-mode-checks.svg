<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a">
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">StrictMode가 감지하는 문제들</text>

  <!-- 항목 1 -->
  <rect x="60" y="68" width="760" height="66" rx="8" fill="#101820" stroke="#e05555" stroke-width="1.5"/>
  <text x="90" y="92"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">비순수 렌더 함수</text>
  <text x="90" y="114"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컴포넌트 바깥 변수를 렌더 중에 변경 — 이중 실행 시 다른 결과 → 버그로 드러남</text>
  <text x="810" y="110" text-anchor="end"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">let count = 0; // 외부 변수</text>

  <!-- 항목 2 -->
  <rect x="60" y="148" width="760" height="66" rx="8" fill="#101820" stroke="#e05555" stroke-width="1.5"/>
  <text x="90" y="172"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">cleanup 없는 useEffect</text>
  <text x="90" y="194"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이중 마운트 시 구독/타이머가 두 개 쌓임 → 메모리 누수, 이벤트 중복 발생</text>
  <text x="810" y="190" text-anchor="end"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">return () =&gt; unsubscribe(); // 필수</text>

  <!-- 항목 3 -->
  <rect x="60" y="228" width="760" height="66" rx="8" fill="#101820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="90" y="252"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">Deprecated API 경고</text>
  <text x="90" y="274"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">findDOMNode, legacy context API, componentWillMount 등 사용 시 콘솔 경고</text>

  <!-- 항목 4 -->
  <rect x="60" y="308" width="760" height="66" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="332"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Ref 재사용 패턴 검사</text>
  <text x="90" y="354"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Ref를 렌더 중에 읽는 부적절한 패턴 경고 (useEffect/이벤트 핸들러에서만 읽어야 함)</text>

  <!-- 요약 -->
  <rect x="60" y="390" width="760" height="36" rx="8" fill="#0a0f1a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="413" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">StrictMode 경고 = 프로덕션에서 문제가 될 코드의 신호 — 무시하지 말 것</text>
</svg>
