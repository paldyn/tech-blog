<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">캐시 신선도 판단 알고리즘</text>
    <!-- Timeline -->
    <text x="80" y="90" font-size="13" font-weight="600" fill="#e8e8e8">신선도 계산</text>
    <!-- freshness_lifetime = max-age (or Expires - Date) -->
    <rect x="60" y="105" width="760" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 신선 유지 시간</text>
    <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555">freshness_lifetime</tspan><tspan fill="#ffffff"> = max-age</tspan><tspan fill="#9aa4b8">  (또는 Expires - Date)</tspan></text>
    <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555">age</tspan><tspan fill="#ffffff">              = Age 헤더 값</tspan><tspan fill="#9aa4b8"> (캐시가 보유한 시간)</tspan></text>
    <!-- Timeline bar -->
    <text x="80" y="218" font-size="12" fill="#888">시간 →</text>
    <line x1="120" y1="240" x2="820" y2="240" stroke="#444" stroke-width="2"/>
    <!-- Events on timeline -->
    <line x1="120" y1="230" x2="120" y2="250" stroke="#7ec8e3" stroke-width="2"/>
    <text x="120" y="265" text-anchor="middle" font-size="11" fill="#7ec8e3">응답 생성</text>
    <line x1="360" y1="230" x2="360" y2="250" stroke="#55c555" stroke-width="2"/>
    <text x="360" y="265" text-anchor="middle" font-size="11" fill="#55c555">캐시 저장</text>
    <!-- Fresh region -->
    <rect x="360" y="222" width="280" height="18" rx="0" fill="#1a3a1a" stroke="none"/>
    <text x="500" y="215" text-anchor="middle" font-size="11" fill="#55c555">신선(Fresh) 구간</text>
    <!-- Age arrow -->
    <line x1="360" y1="235" x2="640" y2="235" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="500" y="290" text-anchor="middle" font-size="11" fill="#888">age &lt; freshness_lifetime</text>
    <line x1="640" y1="230" x2="640" y2="250" stroke="#e05555" stroke-width="2"/>
    <text x="640" y="265" text-anchor="middle" font-size="11" fill="#e05555">만료(Stale)</text>
    <!-- Stale region -->
    <rect x="640" y="222" width="180" height="18" rx="0" fill="#3a1a1a" stroke="none"/>
    <text x="730" y="215" text-anchor="middle" font-size="11" fill="#e05555">Stale 구간</text>
    <!-- Decision flow -->
    <rect x="60" y="295" width="760" height="100" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
    <text x="440" y="317" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">신선도 판단 흐름</text>
    <text x="80" y="342" font-size="12" fill="#e8e8e8">1. age &lt; freshness_lifetime</text>
    <text x="440" y="342" text-anchor="middle" font-size="11" fill="#55c555">→ 신선: 캐시 응답 즉시 반환</text>
    <text x="80" y="366" font-size="12" fill="#e8e8e8">2. age &gt;= freshness_lifetime (Stale)</text>
    <text x="440" y="366" text-anchor="middle" font-size="11" fill="#dd9955">→ 조건부 요청으로 서버 재검증</text>
    <text x="80" y="386" font-size="12" fill="#e8e8e8">3. stale-while-revalidate=N</text>
    <text x="440" y="386" text-anchor="middle" font-size="11" fill="#9999ee">→ Stale이어도 N초간 배경 재검증</text>
    <text x="440" y="416" text-anchor="middle" font-size="11" fill="#555">발견적(Heuristic) 캐싱: Last-Modified가 있으면 (Date - Last-Modified) × 0.1 사용</text>
  </g>
</svg>
