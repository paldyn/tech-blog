<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">비교·곱셈·실전 활용</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">타입 레벨 수 비교와 고정 길이 제약</text>

  <!-- Left: comparison -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">크기 비교</text>
  <rect x="60" y="116" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// A &gt;= B: Arr&lt;B&gt;가 Arr&lt;A&gt; 안에 들어가는가</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> GTE&lt;A <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#b5cea8">number</tspan>,</text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">       B <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#b5cea8">number</tspan>&gt; =</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  Arr&lt;A&gt; <tspan fill="#7ec8e3" font-weight="600">extends</tspan></text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    [...Arr&lt;B&gt;, ...unknown[]]</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    ? <tspan fill="#7ec8e3" font-weight="600">true</tspan> : <tspan fill="#7ec8e3" font-weight="600">false</tspan>;</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// GTE&lt;5, 3&gt; = true</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// GTE&lt;2, 3&gt; = false</text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// GTE&lt;3, 3&gt; = true</text>

  <!-- Right: multiplication -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">곱셈 (재귀 덧셈)</text>
  <rect x="460" y="116" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Multiply&lt;</text>
  <text x="476" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  A <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#b5cea8">number</tspan>,</text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  B <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#b5cea8">number</tspan>,</text>
  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  Acc <tspan fill="#7ec8e3" font-weight="600">extends</tspan> unknown[] = []</text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">&gt; = Acc[<tspan fill="#ce9178">"length"</tspan>] <tspan fill="#7ec8e3" font-weight="600">extends</tspan> B</text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  ? [...Arr&lt;A&gt;, ...Acc][<tspan fill="#ce9178">"length"</tspan>]</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#9aa4b8">// B번 더한 결과</tspan></text>
  <text x="476" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  : Multiply&lt;A, B, [...Arr&lt;A&gt;, ...Acc]&gt;;</text>
  <text x="476" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Multiply&lt;3, 4&gt; = 12</text>

  <!-- Bottom: practical use -->
  <text x="60" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실전: 고정 길이 튜플 제약</text>
  <rect x="60" y="336" width="760" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 길이가 N 이상인 배열만 받기</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> AtLeast&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>, N <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#b5cea8">number</tspan>&gt; =</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  GTE&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>[<tspan fill="#ce9178">"length"</tspan> &amp; <tspan fill="#7ec8e3" font-weight="600">keyof</tspan> <tspan fill="#7ec8e3" font-weight="600">T</tspan>], N&gt; <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#7ec8e3" font-weight="600">true</tspan> ? <tspan fill="#7ec8e3" font-weight="600">T</tspan> : <tspan fill="#7ec8e3" font-weight="600">never</tspan>;</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 길이 검증이 런타임 전 타입 레벨에서 수행됨</text>

  <!-- Note -->
  <rect x="60" y="446" width="760" height="0" rx="4"/>
</svg>
