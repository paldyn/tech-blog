<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">복수 PR 템플릿 설정</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">.github/PULL_REQUEST_TEMPLATE/ 디렉토리에 여러 파일</text>

  <!-- Left: directory structure -->
  <rect x="40" y="90" width="340" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 복수 템플릿 디렉토리 구조</text>
  <text x="56" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">.github/</text>
  <text x="56" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">&#9492;&#9472; PULL_REQUEST_TEMPLATE/</text>
  <text x="56" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    &#9500;&#9472; feature.md</text>
  <text x="56" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    &#9500;&#9472; bugfix.md</text>
  <text x="56" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    &#9492;&#9472; hotfix.md</text>
  <text x="56" y="244" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># URL 파라미터로 선택</text>
  <text x="56" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">?template=bugfix.md</text>

  <!-- Right: URL usage -->
  <rect x="400" y="90" width="440" height="200" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="620" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">템플릿 선택 방법</text>

  <text x="416" y="148"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">PR URL에 ?template= 추가</text>
  <text x="416" y="168"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">github.com/.../compare/main...feat</text>
  <text x="416" y="186"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">?template=bugfix.md</text>

  <line x1="416" y1="200" x2="826" y2="200" stroke="#1e1e1e" stroke-width="1"/>

  <text x="416" y="222"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">GitHub CLI로 템플릿 지정</text>
  <text x="416" y="242"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600">gh</text>
  <text x="438" y="242"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff"> pr create \</text>
  <text x="416" y="260"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">  --template .github/PULL_REQUEST_TEMPLATE/bugfix.md</text>

  <!-- Template content examples -->
  <rect x="40" y="306" width="230" height="90" rx="6" fill="#071a07" stroke="#55c555" stroke-width="1"/>
  <text x="155" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">feature.md</text>
  <text x="56" y="346"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 기능 설명</text>
  <text x="56" y="364"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 설계 결정 근거</text>
  <text x="56" y="382"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 테스트 항목 (많음)</text>

  <rect x="285" y="306" width="230" height="90" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="400" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">bugfix.md</text>
  <text x="301" y="346"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 재현 방법</text>
  <text x="301" y="364"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 근본 원인</text>
  <text x="301" y="382"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 회귀 테스트</text>

  <rect x="530" y="306" width="310" height="90" rx="6" fill="#16122a" stroke="#9988dd" stroke-width="1"/>
  <text x="685" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9988dd">hotfix.md</text>
  <text x="546" y="346"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 긴급 수정 이유</text>
  <text x="546" y="364"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 영향 범위</text>
  <text x="546" y="382"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 롤백 계획</text>

  <!-- Footer -->
  <text x="440" y="410" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">단일 템플릿은 PULL_REQUEST_TEMPLATE.md (루트 또는 .github/ 또는 docs/)</text>
</svg>
