<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">HashSet · LinkedHashSet · TreeSet 비교</text>

  <!-- Header -->
  <rect x="60" y="64" width="760" height="40" rx="4" fill="#0f1827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="200" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">특성</text>
  <text x="400" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">HashSet</text>
  <text x="580" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">LinkedHashSet</text>
  <text x="760" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">TreeSet</text>
  <line x1="300" y1="64" x2="300" y2="104" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="64" x2="490" y2="104" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="670" y1="64" x2="670" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1: 내부 구조 -->
  <rect x="60" y="104" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">내부 구조</text>
  <text x="400" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">HashMap</text>
  <text x="580" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">LinkedHashMap</text>
  <text x="760" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">TreeMap (RB-Tree)</text>

  <!-- Row 2: 순서 -->
  <rect x="60" y="148" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">순서 보장</text>
  <text x="400" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">없음</text>
  <text x="580" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">삽입 순서</text>
  <text x="760" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">정렬 순서</text>

  <!-- Row 3: add/contains -->
  <rect x="60" y="192" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">add / contains</text>
  <text x="400" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1) 평균</text>
  <text x="580" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1) 평균</text>
  <text x="760" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a020">O(log n)</text>

  <!-- Row 4: null 허용 -->
  <rect x="60" y="236" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">null 허용</text>
  <text x="400" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">1개 허용</text>
  <text x="580" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">1개 허용</text>
  <text x="760" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불허</text>

  <!-- Row 5: 추천 상황 -->
  <rect x="60" y="280" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">추천 상황</text>
  <text x="400" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">순서 불필요</text>
  <text x="580" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">삽입 순서 재현</text>
  <text x="760" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">정렬·범위 쿼리</text>

  <!-- Dividers -->
  <line x1="300" y1="104" x2="300" y2="324" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="104" x2="490" y2="324" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="670" y1="104" x2="670" y2="324" stroke="#3a4a6e" stroke-width="1"/>
</svg>
