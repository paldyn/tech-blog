<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">시스템 메시지 우선순위와 캐싱</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">운영자 vs 사용자 지시 충돌 처리 + Prompt Caching 전략</text>

  <!-- Priority pyramid -->
  <!-- Level 1: Anthropic -->
  <polygon points="440,88 360,128 520,128" fill="#1a0a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Anthropic 정책</text>

  <!-- Level 2: Operator -->
  <polygon points="360,132 280,172 520,132 600,172" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">운영자 (시스템 메시지)</text>

  <!-- Level 3: User -->
  <polygon points="280,176 200,216 600,176 700,216" fill="#111111" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">사용자 (Human Turn)</text>

  <!-- Level 4: Model -->
  <polygon points="200,220 80,260 700,220 820,260" fill="#0d0d0d" stroke="#888" stroke-width="1"/>
  <text x="440" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Assistant (Model Output)</text>

  <!-- Caching section -->
  <rect x="60" y="278" width="760" height="98" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Prompt Caching 전략 (시스템 메시지 고정 시 비용 절감)</text>
  <text x="80" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">system</text>
  <text x="140" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> = [{"type": </text>
  <text x="294" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"text"</text>
  <text x="336" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">, "text": system_prompt,</text>
  <text x="80" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">              </text>
  <text x="192" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"cache_control"</text>
  <text x="330" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">: {</text>
  <text x="354" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"type"</text>
  <text x="396" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">: </text>
  <text x="408" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"ephemeral"</text>
  <text x="504" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}}]</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 시스템 메시지가 1,024 토큰 이상이면 캐시 히트 시 입력 비용 90% 절감 (Anthropic 기준)</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">캐시 유효 기간: 5분 (ephemeral) — 트래픽 많은 서비스에서 매우 효과적</text>
</svg>
