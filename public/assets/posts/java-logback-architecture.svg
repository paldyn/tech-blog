<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Logback 핵심 구성요소</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Logger → Appender → Encoder</text>

  <defs>
    <marker id="lbArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="40" y="120" width="180" height="90" rx="8" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Logger</text>
  <text x="130" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">레벨 판단·이름 계층</text>

  <rect x="350" y="120" width="180" height="90" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Appender</text>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">출력 대상(콘솔·파일)</text>

  <rect x="660" y="120" width="180" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="750" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">Encoder</text>
  <text x="750" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">패턴·JSON 포맷</text>

  <line x1="220" y1="165" x2="350" y2="165" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#lbArr)"/>
  <line x1="530" y1="165" x2="660" y2="165" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#lbArr)"/>

  <text x="285" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전달</text>
  <text x="595" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">포맷</text>

  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">하나의 Logger가 여러 Appender로 동시에 출력할 수 있다</text>
</svg>
