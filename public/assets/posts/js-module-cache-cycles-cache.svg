<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">모듈 캐시 — 한 번 로드 후 재사용</text>

  <!-- Module Map (cache) -->
  <rect x="50" y="68" width="360" height="230" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="66" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Module Map (캐시)</text>

  <!-- Row 1 -->
  <rect x="66" y="102" width="220" height="32" rx="4" fill="#111520" stroke="#3a4a6e"/>
  <text x="80" y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"/lib/utils.js"</text>
  <text x="310" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 로드됨</text>

  <!-- Row 2 -->
  <rect x="66" y="148" width="220" height="32" rx="4" fill="#111520" stroke="#3a4a6e"/>
  <text x="80" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"/lib/math.js"</text>
  <text x="310" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 로드됨</text>

  <!-- Row 3 -->
  <rect x="66" y="194" width="220" height="32" rx="4" fill="#111520" stroke="#3a4a6e"/>
  <text x="80" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"/app/main.js"</text>
  <text x="310" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">⏳ 로딩 중</text>

  <text x="66" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">URL 기준 식별 → 중복 로드 없음</text>
  <text x="66" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">모듈 인스턴스는 프로세스 수명 동안 유지</text>

  <!-- Code: 싱글턴 효과 -->
  <rect x="66" y="290" width="320" height="0" rx="0" fill="none"/>
  <text x="66" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#6a8aa0">import는 몇 번이든 같은 인스턴스 반환</text>

  <!-- Arrow -->
  <line x1="410" y1="200" x2="438" y2="200" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="438,194 450,200 438,206" fill="#7ec8e3"/>

  <!-- Right: Code showing singleton behavior -->
  <rect x="450" y="68" width="380" height="230" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">싱글턴 효과 — 상태 공유</text>

  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// counter.js</text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">export let</text><text x="550" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> count = </text><text x="622" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">export function</text><text x="586" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> inc() { count++ }</text>

  <text x="466" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// a.js</text>
  <text x="466" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text><text x="510" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> { inc } </text><text x="574" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text><text x="610" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> './counter'</text>
  <text x="466" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">inc(); </text><text x="520" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// count = 1</text>

  <text x="466" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// b.js — 동일 인스턴스!</text>
  <text x="466" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text><text x="510" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> { count } </text><text x="586" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text><text x="622" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> './counter'</text>
  <text x="466" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// count === 1 (a.js 변경 반영됨)</text>

  <!-- Bottom: Node.js cache invalidation note -->
  <rect x="50" y="320" width="780" height="90" rx="6" fill="#111520" stroke="#3a4a6e"/>
  <text x="66" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Node.js에서 캐시 삭제 (CJS require 한정)</text>
  <text x="66" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">delete</tspan><tspan fill="#ffffff"> require.cache[</tspan><tspan fill="#ffffff">require.resolve(</tspan><tspan fill="#ce9178">'./counter'</tspan><tspan fill="#ffffff">)]</tspan></text>
  <text x="66" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">ESM은 캐시 삭제 불가 — URL 쿼리 파라미터로 우회: import('./m.js?v=2')</text>
</svg>
