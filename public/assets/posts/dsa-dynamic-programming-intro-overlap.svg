<svg width="880" viewBox="0 0 880 580" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr-g" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#888" stroke-width="1.5"/>
    </marker>
    <marker id="arr-r" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#e05555" stroke-width="1.5"/>
    </marker>
    <marker id="arr-c" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#55c555" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="880" height="580" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">겹치는 부분 문제 — fib(5) 재귀 트리</text>

  <!-- Section label -->
  <text x="60" y="82" font-size="16" font-weight="600" fill="#e8e8e8">단순 재귀: O(2ⁿ) 호출</text>

  <!-- fib(5) at root -->
  <circle cx="440" cy="120" r="26" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="125" text-anchor="middle" font-size="13" fill="#7777cc" font-weight="600">fib(5)</text>

  <!-- Level 1: fib(4), fib(3) -->
  <line x1="417" y1="140" x2="310" y2="185" stroke="#888" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="463" y1="140" x2="570" y2="185" stroke="#888" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <circle cx="295" cy="200" r="26" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="295" y="205" text-anchor="middle" font-size="13" fill="#7777cc" font-weight="600">fib(4)</text>

  <circle cx="585" cy="200" r="26" fill="#2a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="585" y="205" text-anchor="middle" font-size="13" fill="#e05555" font-weight="600">fib(3)</text>

  <!-- Level 2 from fib(4): fib(3), fib(2) -->
  <line x1="272" y1="220" x2="185" y2="262" stroke="#888" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="318" y1="220" x2="408" y2="262" stroke="#888" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <circle cx="170" cy="277" r="26" fill="#2a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="170" y="282" text-anchor="middle" font-size="13" fill="#e05555" font-weight="600">fib(3)</text>

  <circle cx="423" cy="277" r="26" fill="#2a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="423" y="282" text-anchor="middle" font-size="13" fill="#e05555" font-weight="600">fib(2)</text>

  <!-- Level 2 from fib(3) right: fib(2), fib(1) -->
  <line x1="562" y1="220" x2="510" y2="262" stroke="#888" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="608" y1="220" x2="660" y2="262" stroke="#888" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <circle cx="495" cy="277" r="26" fill="#2a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="495" y="282" text-anchor="middle" font-size="13" fill="#e05555" font-weight="600">fib(2)</text>

  <circle cx="675" cy="277" r="26" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
  <text x="675" y="282" text-anchor="middle" font-size="13" fill="#888">fib(1)</text>

  <!-- Level 3 from fib(3) left: fib(2), fib(1) -->
  <line x1="147" y1="297" x2="110" y2="340" stroke="#888" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="193" y1="297" x2="228" y2="340" stroke="#888" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <circle cx="95" cy="355" r="26" fill="#2a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="95" y="360" text-anchor="middle" font-size="13" fill="#e05555" font-weight="600">fib(2)</text>

  <circle cx="243" cy="355" r="26" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
  <text x="243" y="360" text-anchor="middle" font-size="13" fill="#888">fib(1)</text>

  <!-- fib(2) repeats leaves -->
  <line x1="72" y1="375" x2="72" y2="408" stroke="#888" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <circle cx="72" cy="420" r="20" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="72" y="425" text-anchor="middle" font-size="11" fill="#888">1</text>
  <line x1="118" y1="375" x2="118" y2="408" stroke="#888" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <circle cx="118" cy="420" r="20" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="118" y="425" text-anchor="middle" font-size="11" fill="#888">0</text>

  <!-- Warning label for repeated subproblems -->
  <rect x="310" y="292" width="220" height="40" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="420" y="317" text-anchor="middle" font-size="13" fill="#e05555" font-weight="600">fib(3): 2번, fib(2): 3번 중복!</text>

  <!-- Right: Memoization benefit -->
  <text x="530" y="350" font-size="16" font-weight="600" fill="#e8e8e8">메모이제이션 적용</text>

  <!-- Cache boxes -->
  <rect x="530" y="368" width="290" height="34" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="390" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">cache[3] = 2 → 재사용</text>

  <rect x="530" y="410" width="290" height="34" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="432" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">cache[2] = 1 → 재사용</text>

  <!-- Complexity comparison -->
  <rect x="60" y="488" width="360" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="512" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">단순 재귀</text>
  <text x="240" y="534" text-anchor="middle" font-size="13" fill="#888">호출 횟수: O(2ⁿ)</text>
  <text x="240" y="550" text-anchor="middle" font-size="13" fill="#888">fib(5) → 약 25회 호출</text>

  <rect x="460" y="488" width="360" height="70" rx="8" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="512" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">메모이제이션 DP</text>
  <text x="640" y="534" text-anchor="middle" font-size="13" fill="#888">호출 횟수: O(N)</text>
  <text x="640" y="550" text-anchor="middle" font-size="13" fill="#888">각 fib(i) 정확히 1번만 계산</text>
</svg>
