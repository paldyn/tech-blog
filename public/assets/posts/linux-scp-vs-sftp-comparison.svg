<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SCP vs SFTP — 파일 전송 프로토콜 비교</text>

  <!-- SCP Column -->
  <rect x="60" y="72" width="360" height="44" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">SCP</text>
  <text x="240" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Secure Copy Protocol</text>

  <!-- SFTP Column -->
  <rect x="460" y="72" width="360" height="44" rx="8" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">SFTP</text>
  <text x="640" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SSH File Transfer Protocol</text>

  <!-- Row 1: 기반 프로토콜 -->
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">기반 프로토콜</text>
  <rect x="60" y="156" width="360" height="44" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="240" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">SSH 채널 (exec 서브시스템)</text>
  <text x="240" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RCP를 SSH로 감싼 구조</text>
  <rect x="460" y="156" width="360" height="44" rx="6" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="640" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">SSH 서브시스템 (sftp subsystem)</text>
  <text x="640" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">독립적인 파일 전송 프로토콜</text>

  <!-- Row 2: 방향성 -->
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">전송 방향</text>
  <rect x="60" y="232" width="360" height="44" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="240" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">단방향 복사 only</text>
  <text x="240" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">push/pull 한 번에 하나</text>
  <rect x="460" y="232" width="360" height="44" rx="6" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="640" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">양방향 세션 유지</text>
  <text x="640" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ls, mkdir, rename, delete 가능</text>

  <!-- Row 3: 재개 -->
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">전송 재개(resume)</text>
  <rect x="60" y="308" width="360" height="44" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="240" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">불가</text>
  <text x="240" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">중단 시 처음부터 재전송</text>
  <rect x="460" y="308" width="360" height="44" rx="6" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="640" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">가능 (reput/reget)</text>
  <text x="640" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">중단 지점부터 이어서 전송</text>

  <!-- Row 4: 속도/간편성 -->
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">속도 / 간편성</text>
  <rect x="60" y="384" width="360" height="44" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="240" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">빠름 (파이프라인 없음)</text>
  <text x="240" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단순 복사에 최적, 스크립트 용이</text>
  <rect x="460" y="384" width="360" height="44" rx="6" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="640" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">약간 느림 (세션 오버헤드)</text>
  <text x="640" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인터랙티브 작업에 강점</text>

  <!-- Code example -->
  <rect x="60" y="444" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="464" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># SCP: 원격→로컬 복사</text>
  <text x="80" y="482" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">scp</text>
  <text x="110" y="482" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> user@host:/remote/file.txt ./local/</text>
  <text x="80" y="500" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># SFTP: 세션 접속 후 대화형 명령</text>
  <text x="80" y="518" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">sftp</text>
  <text x="110" y="518" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> user@host  </text>
  <text x="230" y="518" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">   # 접속 → get/put/ls/cd ...</text>
</svg>
