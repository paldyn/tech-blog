<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LCEL과 RAG 체인 구현</text>

  <!-- 왼쪽: LCEL 기본 -->
  <rect x="30" y="64" width="390" height="352" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="50" y="86" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"
        ># LCEL (LangChain Expression Language)</text>
  <text x="50" y="106" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> langchain_anthropic </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> ChatAnthropic</tspan>
  </text>
  <text x="50" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> langchain_core.prompts </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> ChatPromptTemplate</tspan>
  </text>
  <text x="50" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> langchain_core.output_parsers </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> StrOutputParser</tspan>
  </text>
  <text x="50" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8"># LCEL 체인: | (pipe) 연산자로 연결</tspan>
  </text>
  <text x="50" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">llm</tspan><tspan fill="#ffffff"> = ChatAnthropic(</tspan><tspan fill="#ce9178">model</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"claude-sonnet-4-6"</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="50" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">prompt = ChatPromptTemplate.from_messages([</tspan>
  </text>
  <text x="50" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    (</tspan><tspan fill="#ce9178">"system"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"당신은 {role}입니다."</tspan><tspan fill="#ffffff">),</tspan>
  </text>
  <text x="50" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    (</tspan><tspan fill="#ce9178">"human"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"{question}"</tspan><tspan fill="#ffffff">),</tspan>
  </text>
  <text x="50" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">])</tspan>
  </text>
  <text x="50" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8"># | 로 체인 구성</tspan>
  </text>
  <text x="50" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">chain</tspan><tspan fill="#ffffff"> = prompt | llm | StrOutputParser()</tspan>
  </text>
  <text x="50" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8"># 스트리밍</tspan>
  </text>
  <text x="50" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> chunk </tspan>
    <tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> chain.stream({</tspan>
  </text>
  <text x="50" y="378" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"role"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"파이썬 전문가"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="50" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"question"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"데코레이터란?"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="50" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">}): </tspan><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(chunk, end=</tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">, flush=</tspan><tspan fill="#7ec8e3" font-weight="600">True</tspan><tspan fill="#ffffff">)</tspan>
  </text>

  <!-- 오른쪽: RAG 체인 -->
  <rect x="450" y="64" width="400" height="352" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="86" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"
        ># LangChain RAG 체인</text>
  <text x="470" y="106" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> langchain_chroma </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Chroma</tspan>
  </text>
  <text x="470" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> langchain_openai </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> OpenAIEmbeddings</tspan>
  </text>
  <text x="470" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> langchain_core.runnables </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> RunnablePassthrough</tspan>
  </text>
  <text x="470" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8"># 벡터 스토어 초기화</tspan>
  </text>
  <text x="470" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">vectorstore = Chroma(</tspan>
  </text>
  <text x="470" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">persist_directory</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"./chroma_db"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="470" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">embedding_function</tspan><tspan fill="#ffffff">=OpenAIEmbeddings()</tspan>
  </text>
  <text x="470" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="470" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">retriever = vectorstore.as_retriever(</tspan>
  </text>
  <text x="470" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">search_kwargs</tspan><tspan fill="#ffffff">={</tspan><tspan fill="#ce9178">"k"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">})</tspan>
  </text>
  <text x="470" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8"># RAG 체인</tspan>
  </text>
  <text x="470" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">rag_chain</tspan><tspan fill="#ffffff"> = (</tspan>
  </text>
  <text x="470" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    {</tspan><tspan fill="#ce9178">"context"</tspan><tspan fill="#ffffff">: retriever,</tspan>
    <tspan fill="#ce9178">"question"</tspan><tspan fill="#ffffff">: RunnablePassthrough()}</tspan>
  </text>
  <text x="470" y="378" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    | rag_prompt | llm | StrOutputParser()</tspan>
  </text>
  <text x="470" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="470" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(rag_chain.invoke(</tspan><tspan fill="#ce9178">"MCP란?"</tspan><tspan fill="#ffffff">))</tspan>
  </text>
</svg>
