<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">gfn_validate() 공통 함수 아키텍처</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">규칙 배열 선언 → 공통 함수 위임 → 실패 시 포커스 이동</text>

  <!-- 화면 폼 (왼쪽) -->
  <rect x="60" y="96" width="260" height="320" fill="#0e1a2a" rx="8" stroke="#2a4a7a" stroke-width="1.5"/>
  <text x="190" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">개별 화면 폼</text>

  <rect x="76" y="130" width="228" height="22" fill="#070b14" rx="3"/>
  <text x="86" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">var rules = [</text>
  <rect x="76" y="156" width="228" height="22" fill="#070b14" rx="3"/>
  <text x="86" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">  { col:</text>
  <text x="138" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">"nm"</text>
  <text x="170" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">, req:</text>
  <text x="208" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">true</text>
  <text x="236" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">},</text>
  <rect x="76" y="182" width="228" height="22" fill="#070b14" rx="3"/>
  <text x="86" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">  { col:</text>
  <text x="138" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">"dt"</text>
  <text x="166" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">, fmt:</text>
  <text x="206" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">"date8"</text>
  <text x="252" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">},</text>
  <rect x="76" y="208" width="228" height="22" fill="#070b14" rx="3"/>
  <text x="86" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">  { col:</text>
  <text x="138" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">"qty"</text>
  <text x="170" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">, min:</text>
  <text x="206" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#b5cea8">1</text>
  <text x="216" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">, max:</text>
  <text x="252" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#b5cea8">999</text>
  <text x="280" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">}</text>
  <rect x="76" y="234" width="228" height="22" fill="#070b14" rx="3"/>
  <text x="86" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178">];</text>

  <rect x="76" y="268" width="228" height="36" fill="#0d1e0d" rx="4" stroke="#2a5a2a" stroke-width="1"/>
  <text x="190" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555" text-anchor="middle">gfn_validate(ds, rules, ctrl)</text>
  <text x="190" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8" text-anchor="middle">호출</text>

  <text x="190" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">각 화면은 규칙만 선언</text>
  <text x="190" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">로직은 위임</text>

  <!-- 화살표 -->
  <line x1="320" y1="270" x2="410" y2="270" stroke="#555" stroke-width="1.5"/>
  <polygon points="396,264 412,270 396,276" fill="#55c555"/>
  <text x="365" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">위임</text>

  <!-- 공통 라이브러리 (가운데) -->
  <rect x="412" y="96" width="260" height="320" fill="#0d1e0d" rx="8" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="542" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">공통 라이브러리</text>
  <text x="542" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">gfn_validate()</text>

  <rect x="428" y="150" width="228" height="22" fill="#070b14" rx="3"/>
  <text x="438" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">for each rule in rules {</text>

  <rect x="428" y="176" width="228" height="22" fill="#0d2137" rx="3"/>
  <text x="448" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">if rule.req → gfn_isNull</text>

  <rect x="428" y="202" width="228" height="22" fill="#0d1e0d" rx="3"/>
  <text x="448" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">if rule.fmt → gfn_checkFormat</text>

  <rect x="428" y="228" width="228" height="22" fill="#1a1a0d" rx="3"/>
  <text x="448" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8c44a">if rule.min/max → gfn_checkRange</text>

  <rect x="428" y="254" width="228" height="22" fill="#1e0d0d" rx="3"/>
  <text x="448" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555">실패 → alert + setFocus</text>
  <text x="448" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555">       return false</text>

  <rect x="428" y="298" width="228" height="22" fill="#0d1e0d" rx="3"/>
  <text x="438" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">전부 통과 → return true</text>

  <!-- 서브 함수 연결 -->
  <line x1="672" y1="270" x2="762" y2="270" stroke="#555" stroke-width="1.5"/>
  <polygon points="748,264 764,270 748,276" fill="#7ec8e3"/>
  <text x="717" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">호출</text>

  <!-- 서브 함수 (오른쪽) -->
  <rect x="764" y="140" width="56" height="28" fill="#0d2137" rx="4" stroke="#2a4a7a" stroke-width="1"/>
  <text x="792" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#7ec8e3" text-anchor="middle">isNull</text>
  <rect x="764" y="174" width="56" height="28" fill="#0d1e0d" rx="4" stroke="#2a5a2a" stroke-width="1"/>
  <text x="792" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#55c555" text-anchor="middle">chkFmt</text>
  <rect x="764" y="208" width="56" height="28" fill="#1a1a0d" rx="4" stroke="#5a5a2a" stroke-width="1"/>
  <text x="792" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#e8c44a" text-anchor="middle">chkRng</text>

  <!-- 장점 -->
  <rect x="60" y="430" width="760" height="20" fill="#0f0f0f" rx="4"/>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">장점: 검증 규칙이 선언적 — 항목 추가 시 배열에 원소만 추가, 로직 수정 없음</text>
</svg>
