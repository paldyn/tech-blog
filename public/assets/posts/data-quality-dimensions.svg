<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">데이터 품질 6대 차원</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Six Dimensions of Data Quality</text>

  <!-- Row 1: 3 boxes -->
  <!-- Box 1: 정확성 -->
  <rect x="60" y="96" width="240" height="110" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#55c555">정확성 Accuracy</text>
  <text x="180" y="148" text-anchor="middle" font-size="13" fill="#e8e8e8">데이터가 실제 세계를</text>
  <text x="180" y="166" text-anchor="middle" font-size="13" fill="#e8e8e8">올바르게 반영하는가</text>
  <text x="180" y="190" text-anchor="middle" font-size="12" fill="#888">예: 나이 필드에 음수 없음</text>

  <!-- Box 2: 완전성 -->
  <rect x="320" y="96" width="240" height="110" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#7ec8e3">완전성 Completeness</text>
  <text x="440" y="148" text-anchor="middle" font-size="13" fill="#e8e8e8">필수 값이 누락 없이</text>
  <text x="440" y="166" text-anchor="middle" font-size="13" fill="#e8e8e8">모두 채워져 있는가</text>
  <text x="440" y="190" text-anchor="middle" font-size="12" fill="#888">예: NULL 비율 ≤ 0.1%</text>

  <!-- Box 3: 일관성 -->
  <rect x="580" y="96" width="240" height="110" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#7777cc">일관성 Consistency</text>
  <text x="700" y="148" text-anchor="middle" font-size="13" fill="#e8e8e8">여러 소스·테이블 간</text>
  <text x="700" y="166" text-anchor="middle" font-size="13" fill="#e8e8e8">데이터가 모순 없는가</text>
  <text x="700" y="190" text-anchor="middle" font-size="12" fill="#888">예: 주문일 ≤ 배송일</text>

  <!-- Row 2: 3 boxes -->
  <!-- Box 4: 적시성 -->
  <rect x="60" y="228" width="240" height="110" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="180" y="254" text-anchor="middle" font-size="16" font-weight="700" fill="#e05555">적시성 Timeliness</text>
  <text x="180" y="280" text-anchor="middle" font-size="13" fill="#e8e8e8">데이터가 필요한 시점에</text>
  <text x="180" y="298" text-anchor="middle" font-size="13" fill="#e8e8e8">최신 상태인가</text>
  <text x="180" y="322" text-anchor="middle" font-size="12" fill="#888">예: 재고 데이터 ≤ 1시간 지연</text>

  <!-- Box 5: 타당성 -->
  <rect x="320" y="228" width="240" height="110" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="254" text-anchor="middle" font-size="16" font-weight="700" fill="#ce9178">타당성 Validity</text>
  <text x="440" y="280" text-anchor="middle" font-size="13" fill="#e8e8e8">데이터 형식·범위가</text>
  <text x="440" y="298" text-anchor="middle" font-size="13" fill="#e8e8e8">정의된 규칙을 따르는가</text>
  <text x="440" y="322" text-anchor="middle" font-size="12" fill="#888">예: 이메일 형식, 0–100 점수</text>

  <!-- Box 6: 유일성 -->
  <rect x="580" y="228" width="240" height="110" rx="8" fill="#111" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="700" y="254" text-anchor="middle" font-size="16" font-weight="700" fill="#b5cea8">유일성 Uniqueness</text>
  <text x="700" y="280" text-anchor="middle" font-size="13" fill="#e8e8e8">중복 레코드 없이</text>
  <text x="700" y="298" text-anchor="middle" font-size="13" fill="#e8e8e8">단일 사실이 존재하는가</text>
  <text x="700" y="322" text-anchor="middle" font-size="12" fill="#888">예: 고객 ID 중복 0건</text>

  <!-- Bottom score bar -->
  <text x="60" y="378" font-size="14" font-weight="600" fill="#e8e8e8">품질 점수 산출 예시</text>

  <!-- Score bar background -->
  <rect x="60" y="394" width="760" height="28" rx="6" fill="#1a1a1a"/>
  <!-- Accuracy 90% -->
  <rect x="60" y="394" width="684" height="28" rx="6" fill="none" stroke="#333" stroke-width="1"/>
  <rect x="62" y="396" width="115" height="24" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="120" y="412" text-anchor="middle" font-size="11" fill="#000" font-weight="600">정확성 90%</text>
  <rect x="179" y="396" width="105" height="24" rx="4" fill="#7ec8e3" opacity="0.8"/>
  <text x="232" y="412" text-anchor="middle" font-size="11" fill="#000" font-weight="600">완전성 85%</text>
  <rect x="286" y="396" width="120" height="24" rx="4" fill="#7777cc" opacity="0.8"/>
  <text x="346" y="412" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">일관성 95%</text>
  <rect x="408" y="396" width="100" height="24" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="458" y="412" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">적시성 80%</text>
  <rect x="510" y="396" width="110" height="24" rx="4" fill="#ce9178" opacity="0.8"/>
  <text x="565" y="412" text-anchor="middle" font-size="11" fill="#000" font-weight="600">타당성 92%</text>
  <rect x="622" y="396" width="120" height="24" rx="4" fill="#b5cea8" opacity="0.8"/>
  <text x="682" y="412" text-anchor="middle" font-size="11" fill="#000" font-weight="600">유일성 99%</text>

  <text x="60" y="448" font-size="12" fill="#555">* 종합 품질 점수 = 각 차원 점수의 가중 평균 (도메인별 가중치 상이)</text>
</svg>
