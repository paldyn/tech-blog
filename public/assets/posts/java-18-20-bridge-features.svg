<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 18–20 (2022–2023) 브리지</text>

  <!-- Timeline -->
  <rect x="60" y="56" width="760" height="26" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="210" y="73" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Java 18 (2022.03)</text>
  <text x="440" y="73" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Java 19 (2022.09)</text>
  <text x="670" y="73" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Java 20 (2023.03)</text>
  <line x1="330" y1="56" x2="330" y2="82" stroke="#333" stroke-width="1"/>
  <line x1="550" y1="56" x2="550" y2="82" stroke="#333" stroke-width="1"/>

  <!-- UTF-8 Default -->
  <rect x="60" y="96" width="360" height="64" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">UTF-8 기본 Charset (JEP 400, Java 18)</text>
  <text x="240" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">플랫폼 기본 인코딩 → UTF-8로 통일</text>
  <text x="240" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Windows에서 EUC-KR 등 다르던 문제 해결</text>

  <!-- Simple Web Server -->
  <rect x="460" y="96" width="360" height="64" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Simple Web Server (JEP 408, Java 18)</text>
  <text x="640" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정적 파일 서빙 최소 HTTP 서버</text>
  <text x="640" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">jwebserver 명령어 / API 사용 가능</text>

  <!-- Virtual Threads Preview -->
  <rect x="60" y="176" width="360" height="64" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Virtual Threads (JEP 425/436, Java 19·20)</text>
  <text x="240" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">경량 스레드 Preview in 19, 20</text>
  <text x="240" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">→ Java 21 표준화 (JEP 444)</text>

  <!-- Structured Concurrency Preview -->
  <rect x="460" y="176" width="360" height="64" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Structured Concurrency (JEP 428/437, Java 19·20)</text>
  <text x="640" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">구조적 동시성 Incubator/Preview</text>
  <text x="640" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">→ Java 21 Preview (JEP 453)</text>

  <!-- Pattern Matching Switch 2nd Preview -->
  <rect x="60" y="256" width="360" height="64" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="240" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">Pattern Match Switch 2·3 Preview (18·19·20)</text>
  <text x="240" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">세밀한 문법 개선 지속</text>
  <text x="240" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">→ Java 21 표준화</text>

  <!-- Record Patterns Preview -->
  <rect x="460" y="256" width="360" height="64" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Record Patterns (JEP 405/432, Java 19·20)</text>
  <text x="640" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Record 컴포넌트 패턴 매칭으로 분해</text>
  <text x="640" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">→ Java 21 표준화 (JEP 440)</text>

  <!-- Scoped Values -->
  <rect x="60" y="336" width="360" height="64" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Scoped Values (JEP 429, Java 20 Incubator)</text>
  <text x="240" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ThreadLocal 대안 — 불변 컨텍스트 전달</text>
  <text x="240" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">→ Java 21 Preview (JEP 446)</text>

  <!-- Deprecations -->
  <rect x="460" y="336" width="360" height="64" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Security Manager 제거 (JEP 411 확정)</text>
  <text x="640" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Java 17에서 deprecated → 17+에서 접근 불가</text>
  <text x="640" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Finalization deprecated (JEP 421, Java 18)</text>

  <!-- Bottom note -->
  <rect x="60" y="416" width="760" height="76" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="440" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Java 18~20은 Java 21 LTS의 준비 단계</text>
  <text x="440" y="460" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Virtual Threads, Structured Concurrency, Scoped Values, Record Patterns, Pattern Match Switch</text>
  <text x="440" y="478" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 이 5개 기능이 Java 19·20에서 Preview를 거쳐 Java 21에서 일제히 표준화됨</text>
</svg>
