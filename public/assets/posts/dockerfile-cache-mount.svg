<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">BuildKit 캐시 마운트 활용</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle" xml:space="preserve">--mount=type=cache 로 빌드 캐시를 레이어 바깥에 영속</text>

  <!-- npm cache mount -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" xml:space="preserve">Node.js / npm</text>
  <rect x="60" y="116" width="760" height="56" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># syntax=docker/dockerfile:1</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="112" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> --mount=type=cache,target=/root/.npm \</text>
  <text x="440" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    npm ci --prefer-offline</text>

  <!-- pip cache mount -->
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" xml:space="preserve">Python / pip</text>
  <rect x="60" y="212" width="760" height="56" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="112" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> --mount=type=cache,target=/root/.cache/pip \</text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    pip install -r requirements.txt</text>

  <!-- apt cache mount -->
  <text x="60" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" xml:space="preserve">Debian apt</text>
  <rect x="60" y="308" width="760" height="74" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="112" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> --mount=type=cache,target=/var/cache/apt \</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    --mount=type=cache,target=/var/lib/apt \</text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    apt-get update &amp;&amp; apt-get install -y curl</text>

  <!-- Benefit boxes -->
  <rect x="60" y="404" width="230" height="44" fill="#0d2818" rx="8" stroke="#55c555"/>
  <text x="175" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">레이어에 포함 안 됨</text>
  <text x="175" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">이미지 크기 불변</text>

  <rect x="325" y="404" width="230" height="44" fill="#0d2818" rx="8" stroke="#55c555"/>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">빌드 간 캐시 공유</text>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">재빌드 시 다운로드 생략</text>

  <rect x="590" y="404" width="230" height="44" fill="#0d2818" rx="8" stroke="#55c555"/>
  <text x="705" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">COPY 위치 무관</text>
  <text x="705" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">소스 변경에도 캐시 유지</text>
</svg>
