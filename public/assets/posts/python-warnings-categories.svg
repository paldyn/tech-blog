<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python 경고(Warning) 카테고리</text>

  <!-- Warning hierarchy -->
  <rect x="330" y="65" width="220" height="40" rx="6" fill="#0c1628" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">Warning</text>

  <!-- Line from Warning -->
  <line x1="440" y1="105" x2="440" y2="130" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="100" y1="130" x2="780" y2="130" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- 6 warning types -->
  <line x1="100" y1="130" x2="100" y2="150" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="230" y1="130" x2="230" y2="150" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="370" y1="130" x2="370" y2="150" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="500" y1="130" x2="500" y2="150" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="640" y1="130" x2="640" y2="150" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="780" y1="130" x2="780" y2="150" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Warning boxes row 1 -->
  <rect x="40" y="150" width="120" height="70" rx="6" fill="#0c1628" stroke="#ce9178" stroke-width="1.5"/>
  <text x="100" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#ce9178">Deprecation</text>
  <text x="100" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#ce9178">Warning</text>
  <text x="100" y="213" text-anchor="middle" font-size="9" fill="#888">폐기 예정 기능</text>

  <rect x="170" y="150" width="120" height="70" rx="6" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">Future</text>
  <text x="230" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">Warning</text>
  <text x="230" y="213" text-anchor="middle" font-size="9" fill="#888">향후 변경 예고</text>

  <rect x="310" y="150" width="120" height="70" rx="6" fill="#0c1628" stroke="#e05555" stroke-width="1.5"/>
  <text x="370" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#e05555">Pending</text>
  <text x="370" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#e05555">Deprecation</text>
  <text x="370" y="213" text-anchor="middle" font-size="9" fill="#888">보류 중 폐기</text>

  <rect x="440" y="150" width="120" height="70" rx="6" fill="#0c1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="500" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">Runtime</text>
  <text x="500" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">Warning</text>
  <text x="500" y="213" text-anchor="middle" font-size="9" fill="#888">런타임 의심 동작</text>

  <rect x="580" y="150" width="120" height="70" rx="6" fill="#0c1628" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">Resource</text>
  <text x="640" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">Warning</text>
  <text x="640" y="213" text-anchor="middle" font-size="9" fill="#888">자원 사용 경고</text>

  <rect x="720" y="150" width="120" height="70" rx="6" fill="#0c1628" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="780" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#b5cea8">User</text>
  <text x="780" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#b5cea8">Warning</text>
  <text x="780" y="213" text-anchor="middle" font-size="9" fill="#888">사용자 정의</text>

  <!-- Code block showing warnings.warn usage -->
  <rect x="55" y="244" width="770" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="75" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">import</text><text x="131" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> warnings</text>
  <text x="75" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8"># 폐기 경고 발생</text>
  <text x="75" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">warnings.</text><text x="165" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">warn</text><text x="196" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text><text x="204" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"old_func()는 곧 삭제됩니다"</text><text x="490" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, DeprecationWarning)</text>
  <text x="75" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8"># 경고를 오류로 변환</text>
  <text x="75" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">warnings.</text><text x="165" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">filterwarnings</text><text x="277" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text><text x="285" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"error"</text><text x="333" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, DeprecationWarning)</text>
</svg>
