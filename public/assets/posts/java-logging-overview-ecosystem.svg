<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">자바 로깅 생태계</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">파사드(API)와 구현(엔진)의 분리</text>

  <defs>
    <marker id="loArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- app -->
  <rect x="320" y="100" width="240" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">애플리케이션 코드</text>

  <!-- facade -->
  <rect x="320" y="196" width="240" height="56" rx="8" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">SLF4J (파사드 / API)</text>
  <text x="440" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">코드는 이 인터페이스에만 의존</text>

  <line x1="440" y1="156" x2="440" y2="196" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#loArr)"/>

  <!-- implementations -->
  <rect x="60" y="292" width="220" height="52" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Logback</text>

  <rect x="330" y="292" width="220" height="52" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Log4j 2</text>

  <rect x="600" y="292" width="220" height="52" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">java.util.logging</text>

  <line x1="400" y1="252" x2="200" y2="292" stroke="#7ec8e3" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#loArr)"/>
  <line x1="440" y1="252" x2="440" y2="292" stroke="#7ec8e3" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#loArr)"/>
  <line x1="480" y1="252" x2="680" y2="292" stroke="#7ec8e3" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#loArr)"/>
  <text x="700" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">바인딩으로 교체 가능</text>
</svg>
