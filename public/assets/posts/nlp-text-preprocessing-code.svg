<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <!-- Background -->
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">한국어 텍스트 전처리 코드 (KoNLPy)</text>

  <!-- Code block background -->
  <rect x="60" y="68" width="760" height="268" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Line numbers background -->
  <rect x="60" y="68" width="44" height="268" fill="#060910" rx="6"/>
  <rect x="104" y="68" width="1" height="268" fill="#1e2433"/>

  <!-- Line numbers -->
  <text x="82" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">1</text>
  <text x="82" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">2</text>
  <text x="82" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">3</text>
  <text x="82" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">4</text>
  <text x="82" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">5</text>
  <text x="82" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">6</text>
  <text x="82" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">7</text>
  <text x="82" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">8</text>
  <text x="82" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">9</text>
  <text x="82" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">10</text>
  <text x="82" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">11</text>
  <text x="82" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">12</text>

  <!-- Code lines -->
  <!-- Line 1: import re -->
  <text x="120" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="168" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> re</text>

  <!-- Line 2: from konlpy.tag import Okt -->
  <text x="120" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="162" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> konlpy.tag </text>
  <text x="292" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="340" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Okt</text>

  <!-- Line 3: blank -->

  <!-- Line 4: okt = Okt() -->
  <text x="120" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">okt </text>
  <text x="150" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="162" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Okt()</text>

  <!-- Line 5: blank -->

  <!-- Line 6: def preprocess(text): -->
  <text x="120" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">def</text>
  <text x="150" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> preprocess(</text>
  <text x="274" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">text</text>
  <text x="306" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">):</text>

  <!-- Line 7:     # HTML 태그 제거 -->
  <text x="120" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # HTML 태그 제거</text>

  <!-- Line 8:     text = re.sub(r"<[^>]+>", "", text) -->
  <text x="120" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    text </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> re.sub(</tspan><tspan fill="#ce9178">r"&lt;[^&gt;]+&gt;"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">, text)</tspan></text>

  <!-- Line 9:     # 특수문자 정리 -->
  <text x="120" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # 특수문자 정리</text>

  <!-- Line 10:     text = re.sub(r"[^\w\s]", " ", text) -->
  <text x="120" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    text </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> re.sub(</tspan><tspan fill="#ce9178">r"[^\w\s]"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">" "</tspan><tspan fill="#ffffff">, text)</tspan></text>

  <!-- Line 11:     # 형태소 분석 -->
  <text x="120" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # 형태소 분석</text>

  <!-- Line 12:     tokens = okt.morphs(text, norm=True, stem=True) -->
  <text x="120" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    tokens </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> okt.morphs(text,</tspan><tspan fill="#ffffff"> norm</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#b5cea8">True</tspan><tspan fill="#ffffff">, stem</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#b5cea8">True</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- return tokens annotation -->
  <rect x="620" y="88" width="180" height="64" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">반환값 예시</text>
  <text x="630" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">    return tokens</text>
  <text x="630" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ ['안녕', '세계', '예시']</text>
</svg>
