<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">타입 선택 함정 — FLOAT 오차 vs NUMERIC 정확도</text>

  <!-- FLOAT problem -->
  <rect x="60" y="66" width="360" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">FLOAT 오차 예시 (위험)</text>

  <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 잘못된 금액 타입</tspan></text>
  <text x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> 결제 (</tspan></text>
  <text x="80" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  금액 </tspan><tspan fill="#e05555" font-weight="600">DOUBLE PRECISION</tspan></text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">);</tspan></text>
  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 0.1 + 0.2 계산 결과</tspan></text>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0.1</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#b5cea8">0.2</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 결과: 0.30000000000000004</tspan></text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">이 오차가 누적되면 정산 금액이 틀려짐</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">재무 감사 시 미스매치 발생</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">FLOAT은 과학 계산 / 센서 데이터에만 사용</text>

  <!-- NUMERIC solution -->
  <rect x="450" y="66" width="370" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="470" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">NUMERIC 정확도 (올바른 방법)</text>

  <text x="470" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 올바른 금액 타입</tspan></text>
  <text x="470" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> 결제 (</tspan></text>
  <text x="470" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  금액 </tspan><tspan fill="#55c555" font-weight="600">NUMERIC(15, 2)</tspan></text>
  <text x="470" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">);</tspan></text>
  <text x="470" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 정확한 계산</tspan></text>
  <text x="470" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0.1</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#b5cea8">0.2</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="470" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 결과: 0.3 (정확)</tspan></text>
  <text x="470" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">수십억 건 금액 합계도 정확</text>
  <text x="470" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">소수점 자리수가 고정되어 정산 일치</text>
  <text x="470" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DECIMAL = NUMERIC, 동일 타입</text>

  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">돈 = NUMERIC, 과학 계산 = FLOAT — 이 한 가지 규칙이 수많은 버그를 막는다</text>
</svg>
