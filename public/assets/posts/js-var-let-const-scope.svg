<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">var · let · const — 스코프와 재할당 비교</text>

  <!-- Three columns -->
  <!-- var -->
  <rect x="60" y="68" width="240" height="380" rx="10" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="180" y="96" text-anchor="middle" font-size="18" font-weight="700" fill="#e05555">var</text>
  <text x="180" y="114" text-anchor="middle" font-size="11" fill="#888">ES1 ~ (레거시)</text>
  <line x1="76" y1="122" x2="284" y2="122" stroke="#222" stroke-width="1"/>

  <text x="80" y="144" font-size="12" fill="#888">스코프</text>
  <text x="80" y="162" font-size="13" fill="#e05555">함수 스코프</text>
  <text x="80" y="180" font-size="11" fill="#555">(블록 { }을 무시)</text>

  <text x="80" y="204" font-size="12" fill="#888">호이스팅</text>
  <text x="80" y="222" font-size="13" fill="#e05555">선언 + undefined 초기화</text>

  <text x="80" y="246" font-size="12" fill="#888">재선언</text>
  <text x="80" y="264" font-size="13" fill="#e05555">허용 (덮어씀)</text>

  <text x="80" y="288" font-size="12" fill="#888">재할당</text>
  <text x="80" y="306" font-size="13" fill="#55c555">가능</text>

  <text x="80" y="330" font-size="12" fill="#888">전역 객체 등록</text>
  <text x="80" y="348" font-size="13" fill="#e05555">window.x 에 등록됨</text>

  <rect x="76" y="362" width="208" height="66" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">if</text>
  <text x="108" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> (</text>
  <text x="120" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">true</text>
  <text x="148" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">) {</text>
  <text x="92" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">  var</text>
  <text x="120" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> x = </text>
  <text x="156" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="164" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="92" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="92" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">console.log(x); // 1</text>

  <!-- let -->
  <rect x="320" y="68" width="240" height="380" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="96" text-anchor="middle" font-size="18" font-weight="700" fill="#7ec8e3">let</text>
  <text x="440" y="114" text-anchor="middle" font-size="11" fill="#888">ES2015 (ES6)</text>
  <line x1="336" y1="122" x2="544" y2="122" stroke="#222" stroke-width="1"/>

  <text x="340" y="144" font-size="12" fill="#888">스코프</text>
  <text x="340" y="162" font-size="13" fill="#7ec8e3">블록 스코프</text>
  <text x="340" y="180" font-size="11" fill="#888">(중괄호 { }를 존중)</text>

  <text x="340" y="204" font-size="12" fill="#888">호이스팅</text>
  <text x="340" y="222" font-size="13" fill="#7ec8e3">선언만 (TDZ 존재)</text>

  <text x="340" y="246" font-size="12" fill="#888">재선언</text>
  <text x="340" y="264" font-size="13" fill="#e05555">불가 (SyntaxError)</text>

  <text x="340" y="288" font-size="12" fill="#888">재할당</text>
  <text x="340" y="306" font-size="13" fill="#55c555">가능</text>

  <text x="340" y="330" font-size="12" fill="#888">전역 객체 등록</text>
  <text x="340" y="348" font-size="13" fill="#7ec8e3">등록 안 됨</text>

  <rect x="336" y="362" width="208" height="66" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="352" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">if</text>
  <text x="368" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> (</text>
  <text x="380" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">true</text>
  <text x="408" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">) {</text>
  <text x="352" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">  let</text>
  <text x="380" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> y = </text>
  <text x="416" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="424" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="352" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="352" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">// y → ReferenceError</text>

  <!-- const -->
  <rect x="580" y="68" width="240" height="380" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="700" y="96" text-anchor="middle" font-size="18" font-weight="700" fill="#55c555">const</text>
  <text x="700" y="114" text-anchor="middle" font-size="11" fill="#888">ES2015 (ES6)</text>
  <line x1="596" y1="122" x2="804" y2="122" stroke="#222" stroke-width="1"/>

  <text x="600" y="144" font-size="12" fill="#888">스코프</text>
  <text x="600" y="162" font-size="13" fill="#55c555">블록 스코프</text>
  <text x="600" y="180" font-size="11" fill="#888">(let과 동일)</text>

  <text x="600" y="204" font-size="12" fill="#888">호이스팅</text>
  <text x="600" y="222" font-size="13" fill="#55c555">선언만 (TDZ 존재)</text>

  <text x="600" y="246" font-size="12" fill="#888">재선언</text>
  <text x="600" y="264" font-size="13" fill="#e05555">불가 (SyntaxError)</text>

  <text x="600" y="288" font-size="12" fill="#888">재할당</text>
  <text x="600" y="306" font-size="13" fill="#e05555">불가 (TypeError)</text>

  <text x="600" y="330" font-size="12" fill="#888">전역 객체 등록</text>
  <text x="600" y="348" font-size="13" fill="#55c555">등록 안 됨</text>

  <rect x="596" y="362" width="208" height="66" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="612" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="648" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> z = [</text>
  <text x="696" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="704" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="710" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="718" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">];</text>
  <text x="612" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">z.push(</text>
  <text x="660" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">3</text>
  <text x="668" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="612" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">// OK! 내용 변경은 가능</text>
  <text x="612" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">// z = []; → TypeError!</text>

  <!-- Footer -->
  <text x="440" y="476" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #6</text>
</svg>
