<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">var · let · const 스코프와 호이스팅 비교</text>

  <!-- Column headers -->
  <rect x="60" y="58" width="234" height="36" rx="6" fill="#1a1428" stroke="#ce9178" stroke-width="1.5"/>
  <text x="177" y="81" text-anchor="middle" font-size="14" font-weight="700" fill="#ce9178">var</text>

  <rect x="323" y="58" width="234" height="36" rx="6" fill="#0a1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="81" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">let</text>

  <rect x="586" y="58" width="234" height="36" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="703" y="81" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">const</text>

  <!-- Row: 스코프 -->
  <text x="60" y="118" font-size="13" font-weight="600" fill="#888">스코프</text>
  <rect x="60" y="126" width="234" height="36" rx="4" fill="#0d1117"/>
  <text x="177" y="149" text-anchor="middle" font-size="13" fill="#ce9178">함수 스코프</text>

  <rect x="323" y="126" width="234" height="36" rx="4" fill="#0d1117"/>
  <text x="440" y="149" text-anchor="middle" font-size="13" fill="#7ec8e3">블록 스코프</text>

  <rect x="586" y="126" width="234" height="36" rx="4" fill="#0d1117"/>
  <text x="703" y="149" text-anchor="middle" font-size="13" fill="#55c555">블록 스코프</text>

  <!-- Row: 호이스팅 -->
  <text x="60" y="184" font-size="13" font-weight="600" fill="#888">호이스팅</text>
  <rect x="60" y="192" width="234" height="36" rx="4" fill="#111"/>
  <text x="177" y="215" text-anchor="middle" font-size="12" fill="#ce9178">undefined로 초기화</text>

  <rect x="323" y="192" width="234" height="36" rx="4" fill="#111"/>
  <text x="440" y="215" text-anchor="middle" font-size="12" fill="#7ec8e3">선언만, TDZ 존재</text>

  <rect x="586" y="192" width="234" height="36" rx="4" fill="#111"/>
  <text x="703" y="215" text-anchor="middle" font-size="12" fill="#55c555">선언만, TDZ 존재</text>

  <!-- Row: 재선언 -->
  <text x="60" y="250" font-size="13" font-weight="600" fill="#888">재선언</text>
  <rect x="60" y="258" width="234" height="36" rx="4" fill="#0d1117"/>
  <text x="177" y="281" text-anchor="middle" font-size="13" fill="#55c555">가능</text>

  <rect x="323" y="258" width="234" height="36" rx="4" fill="#0d1117"/>
  <text x="440" y="281" text-anchor="middle" font-size="13" fill="#e05555">불가</text>

  <rect x="586" y="258" width="234" height="36" rx="4" fill="#0d1117"/>
  <text x="703" y="281" text-anchor="middle" font-size="13" fill="#e05555">불가</text>

  <!-- Row: 재할당 -->
  <text x="60" y="316" font-size="13" font-weight="600" fill="#888">재할당</text>
  <rect x="60" y="324" width="234" height="36" rx="4" fill="#111"/>
  <text x="177" y="347" text-anchor="middle" font-size="13" fill="#55c555">가능</text>

  <rect x="323" y="324" width="234" height="36" rx="4" fill="#111"/>
  <text x="440" y="347" text-anchor="middle" font-size="13" fill="#55c555">가능</text>

  <rect x="586" y="324" width="234" height="36" rx="4" fill="#111"/>
  <text x="703" y="347" text-anchor="middle" font-size="13" fill="#e05555">불가 (바인딩 고정)</text>

  <!-- Row: 전역 객체 -->
  <text x="60" y="382" font-size="13" font-weight="600" fill="#888">전역 선언 시</text>
  <rect x="60" y="390" width="234" height="36" rx="4" fill="#0d1117"/>
  <text x="177" y="413" text-anchor="middle" font-size="12" fill="#ce9178">window 프로퍼티 됨</text>

  <rect x="323" y="390" width="234" height="36" rx="4" fill="#0d1117"/>
  <text x="440" y="413" text-anchor="middle" font-size="12" fill="#7ec8e3">window 프로퍼티 아님</text>

  <rect x="586" y="390" width="234" height="36" rx="4" fill="#0d1117"/>
  <text x="703" y="413" text-anchor="middle" font-size="12" fill="#55c555">window 프로퍼티 아님</text>

  <!-- Bottom note -->
  <rect x="60" y="442" width="760" height="40" rx="6" fill="#0d1117" stroke="#2a2a2a"/>
  <text x="440" y="467" text-anchor="middle" font-size="12" fill="#888">const: 바인딩이 고정될 뿐, 객체/배열 내부는 변경 가능 · 오늘날 기본은 const, 재할당이 필요할 때만 let</text>

  <!-- Footer -->
  <text x="440" y="512" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
