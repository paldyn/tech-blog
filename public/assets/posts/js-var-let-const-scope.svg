<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 510"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="510" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">var · let · const 스코프 차이</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">함수 스코프 vs 블록 스코프 — 차이를 코드로 확인</text>

  <!--
    3 columns: var (x=60,w=230), let (x=315,w=230), const (x=570,w=250)
    Right edge: 570+250=820 ✓
  -->

  <!-- Column headers -->
  <text x="175" y="108" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">var</text>
  <text x="430" y="108" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">let</text>
  <text x="695" y="108" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">const</text>

  <!-- Scope row -->
  <rect x="60"  y="118" width="230" height="56" fill="#1a0808" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="175" y="140" font-size="12" font-weight="600" fill="#888" text-anchor="middle">스코프</text>
  <text x="175" y="160" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">함수 스코프</text>

  <rect x="315" y="118" width="230" height="56" fill="#0a1520" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="430" y="140" font-size="12" font-weight="600" fill="#888" text-anchor="middle">스코프</text>
  <text x="430" y="160" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">블록 스코프</text>

  <rect x="570" y="118" width="250" height="56" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="695" y="140" font-size="12" font-weight="600" fill="#888" text-anchor="middle">스코프</text>
  <text x="695" y="160" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">블록 스코프</text>

  <!-- Hoisting row -->
  <rect x="60"  y="182" width="230" height="56" fill="#1a0f0a" rx="6" stroke="#e8a53f" stroke-width="1"/>
  <text x="175" y="204" font-size="12" font-weight="600" fill="#888" text-anchor="middle">호이스팅</text>
  <text x="175" y="224" font-size="12" fill="#e8a53f" text-anchor="middle">선언 + undefined 초기화</text>

  <rect x="315" y="182" width="230" height="56" fill="#0a1520" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="430" y="204" font-size="12" font-weight="600" fill="#888" text-anchor="middle">호이스팅</text>
  <text x="430" y="224" font-size="12" fill="#7ec8e3" text-anchor="middle">선언만 (TDZ 진입)</text>

  <rect x="570" y="182" width="250" height="56" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="695" y="204" font-size="12" font-weight="600" fill="#888" text-anchor="middle">호이스팅</text>
  <text x="695" y="224" font-size="12" fill="#55c555" text-anchor="middle">선언만 (TDZ 진입)</text>

  <!-- Re-assign row -->
  <rect x="60"  y="246" width="230" height="56" fill="#1a0808" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="175" y="268" font-size="12" font-weight="600" fill="#888" text-anchor="middle">재할당</text>
  <text x="175" y="288" font-size="13" fill="#55c555" text-anchor="middle">✓ 가능</text>

  <rect x="315" y="246" width="230" height="56" fill="#0a1520" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="430" y="268" font-size="12" font-weight="600" fill="#888" text-anchor="middle">재할당</text>
  <text x="430" y="288" font-size="13" fill="#55c555" text-anchor="middle">✓ 가능</text>

  <rect x="570" y="246" width="250" height="56" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="695" y="268" font-size="12" font-weight="600" fill="#888" text-anchor="middle">재할당</text>
  <text x="695" y="288" font-size="13" fill="#e05555" text-anchor="middle">✗ TypeError</text>

  <!-- Re-declare row -->
  <rect x="60"  y="310" width="230" height="56" fill="#1a0808" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="175" y="332" font-size="12" font-weight="600" fill="#888" text-anchor="middle">재선언</text>
  <text x="175" y="352" font-size="13" fill="#55c555" text-anchor="middle">✓ 가능 (위험)</text>

  <rect x="315" y="310" width="230" height="56" fill="#0a1520" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="430" y="332" font-size="12" font-weight="600" fill="#888" text-anchor="middle">재선언</text>
  <text x="430" y="352" font-size="13" fill="#e05555" text-anchor="middle">✗ SyntaxError</text>

  <rect x="570" y="310" width="250" height="56" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="695" y="332" font-size="12" font-weight="600" fill="#888" text-anchor="middle">재선언</text>
  <text x="695" y="352" font-size="13" fill="#e05555" text-anchor="middle">✗ SyntaxError</text>

  <!-- Recommendation -->
  <rect x="60" y="384" width="760" height="60" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="406" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">실무 권장 원칙</text>
  <text x="440" y="426" font-size="12" fill="#888" text-anchor="middle">기본은 const → 값이 바뀌어야 할 때만 let → var는 사용하지 않는다</text>

  <!-- Footer -->
  <text x="60" y="470" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part II — var·let·const 차이</text>
</svg>
