<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">pytest 실행 흐름</text>

  <defs>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="100" width="220" height="72" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="132" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">수집(collect)</text>
  <text x="170" y="154" font-size="12" fill="#888" text-anchor="middle">test_*.py 탐색</text>

  <rect x="330" y="100" width="220" height="72" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="132" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">실행(run)</text>
  <text x="440" y="154" font-size="12" fill="#888" text-anchor="middle">test_ 함수 호출</text>

  <rect x="600" y="100" width="220" height="72" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="132" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">보고(report)</text>
  <text x="710" y="154" font-size="12" fill="#888" text-anchor="middle">passed / failed</text>

  <line x1="280" y1="136" x2="324" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="550" y1="136" x2="594" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="60" y="206" width="760" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ pytest -v</text>
  <text xml:space="preserve" x="220" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 2 passed in 0.01s</text>
</svg>
