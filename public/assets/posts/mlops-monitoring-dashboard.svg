<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <polygon points="2,2 12,7 2,12" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">프로덕션 ML 모니터링 대시보드</text>

  <!-- ===== PANEL 1: 모델 정확도 트렌드 (top-left) ===== -->
  <rect x="60" y="80" width="370" height="140" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="102" font-size="12" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델 정확도 트렌드</text>

  <!-- Panel 1 chart area -->
  <!-- Y-axis ticks -->
  <text x="76" y="122" text-anchor="end" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">95%</text>
  <text x="76" y="152" text-anchor="end" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">90%</text>
  <text x="76" y="182" text-anchor="end" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">85%</text>

  <!-- Grid lines -->
  <line x1="80" y1="120" x2="418" y2="120" stroke="#222" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="150" x2="418" y2="150" stroke="#222" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="180" x2="418" y2="180" stroke="#222" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 89% threshold line (dashed orange) -->
  <line x1="80" y1="162" x2="418" y2="162" stroke="#e09030" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="420" y="165" font-size="9" fill="#e09030" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">89%</text>

  <!-- X-axis labels -->
  <text x="88"  y="196" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Jan</text>
  <text x="143" y="196" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Feb</text>
  <text x="198" y="196" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Mar</text>
  <text x="253" y="196" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Apr</text>
  <text x="308" y="196" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">May</text>
  <text x="363" y="196" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Jun</text>

  <!--
    Accuracy line: scale y: 85%→180, 95%→120 (6px per 1%)
    Jan=93% → y=132, Feb=93.5% → y=129, Mar=92% → y=138, Apr=91% → y=144, May=89.5% → y=153, Jun=87.3% → y=165
    x positions: Jan=96, Feb=151, Mar=206, Apr=261, May=316, Jun=371
  -->
  <polyline points="96,132 151,129 206,138 261,144 316,153 371,165"
            fill="none" stroke="#55c555" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Dots -->
  <circle cx="96"  cy="132" r="3" fill="#55c555"/>
  <circle cx="151" cy="129" r="3" fill="#55c555"/>
  <circle cx="206" cy="138" r="3" fill="#55c555"/>
  <circle cx="261" cy="144" r="3" fill="#55c555"/>
  <circle cx="316" cy="153" r="3" fill="#55c555"/>
  <circle cx="371" cy="165" r="4" fill="#e05555" stroke="#fff" stroke-width="1"/>

  <!-- Current + warning labels -->
  <text x="80" y="214" font-size="10" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">현재: 87.3%</text>
  <text x="200" y="214" font-size="10" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">⚠ 기준치 89% 미달</text>

  <!-- ===== PANEL 2: 데이터 드리프트 점수 (top-right) ===== -->
  <rect x="450" y="80" width="370" height="140" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="102" font-size="12" font-weight="700" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">데이터 드리프트 점수 (PSI)</text>

  <!-- PSI legend -->
  <text x="720" y="102" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">PSI &gt; 0.2 = 심각</text>

  <!-- Bar chart: 4 features -->
  <!-- Critical threshold line at PSI=0.2 -->
  <!-- Bar area: x 470-800, y 108-200. Max PSI=0.45 → scale: 92px for 0.45 → 204px/PSI -->
  <!-- PSI 0.2 line: 0.2*204 = 40.8 from bottom → y=200-41=159 -->
  <line x1="470" y1="159" x2="808" y2="159" stroke="#e05555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="810" y="162" font-size="9" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">0.2</text>

  <!-- Feature bars (bottom y=200, heights computed) -->
  <!-- purchase_amt: PSI=0.38 → h=78 → y=122 -->
  <!-- age: PSI=0.12 → h=24 → y=176 -->
  <!-- category: PSI=0.26 → h=53 → y=147 -->
  <!-- freq: PSI=0.07 → h=14 → y=186 -->

  <!-- Bar 1: purchase_amt — high drift -->
  <rect x="480" y="122" width="58" height="78" rx="3" fill="#e05555" opacity="0.85"/>
  <text x="509" y="210" text-anchor="middle" font-size="9" fill="#ccc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">구매금액</text>
  <text x="509" y="118" text-anchor="middle" font-size="9" font-weight="700" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">0.38</text>

  <!-- Bar 2: age — normal -->
  <rect x="568" y="176" width="58" height="24" rx="3" fill="#7777cc" opacity="0.85"/>
  <text x="597" y="210" text-anchor="middle" font-size="9" fill="#ccc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">연령대</text>
  <text x="597" y="172" text-anchor="middle" font-size="9" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">0.12</text>

  <!-- Bar 3: category — high drift -->
  <rect x="656" y="147" width="58" height="53" rx="3" fill="#e05555" opacity="0.85"/>
  <text x="685" y="210" text-anchor="middle" font-size="9" fill="#ccc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">카테고리</text>
  <text x="685" y="143" text-anchor="middle" font-size="9" font-weight="700" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">0.26</text>

  <!-- Bar 4: freq — low drift -->
  <rect x="744" y="186" width="58" height="14" rx="3" fill="#55c555" opacity="0.85"/>
  <text x="773" y="210" text-anchor="middle" font-size="9" fill="#ccc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">방문빈도</text>
  <text x="773" y="182" text-anchor="middle" font-size="9" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">0.07</text>

  <!-- ===== PANEL 3: 예측 지연시간 (bottom-left) ===== -->
  <rect x="60" y="250" width="370" height="140" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="272" font-size="12" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">예측 지연시간 P99 (ms)</text>

  <!-- Grid -->
  <line x1="80" y1="290" x2="418" y2="290" stroke="#222" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="318" x2="418" y2="318" stroke="#222" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="346" x2="418" y2="346" stroke="#222" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Y-axis -->
  <text x="76" y="292" text-anchor="end" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">120ms</text>
  <text x="76" y="320" text-anchor="end" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">80ms</text>
  <text x="76" y="348" text-anchor="end" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">40ms</text>

  <!-- SLA dashed line at 100ms -->
  <!-- 120→290, 40→346 scale: 56px for 80ms → 0.7px/ms  -->
  <!-- 100ms: 120-100=20ms above 40ms baseline → 100ms = y=346-(60*0.7)=346-42=304 -->
  <line x1="80" y1="304" x2="418" y2="304" stroke="#e09030" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="420" y="307" font-size="9" fill="#e09030" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">SLA</text>

  <!--
    Latency line:
    normal ~45ms → y=346-(5*0.7)=346-3.5≈342... rescale: 56px for 80ms → 0.7px/ms
    45ms from 40ms base → 5ms above → y=346-3.5=342 (too flat)
    Better: scale 0→360 range: 120ms→y=290, 0ms→y=374 (84px for 120ms → 0.7px/ms)
    45ms: y=374-31.5=342 ✓, 120ms: y=374-84=290 ✓, 100ms: y=374-70=304 ✓
    Points (9 time ticks, ~38px apart): x=88,126,164,202,240,278,316,354,392
    Latencies: 45,47,44,46,45,43,44,120,46 ms
    y: 342,341,343,341,342,344,343,290,342
  -->
  <polyline points="88,342 126,341 164,343 202,341 240,342 278,344 316,343 342,290 354,340 392,342"
            fill="none" stroke="#55c555" stroke-width="2" stroke-linejoin="round"/>

  <!-- Spike dot -->
  <circle cx="342" cy="290" r="4" fill="#e05555" stroke="#fff" stroke-width="1"/>

  <!-- Labels -->
  <text x="80" y="380" font-size="10" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">P99: 48ms</text>
  <text x="180" y="380" font-size="10" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">스파이크: 120ms</text>
  <text x="330" y="380" font-size="10" fill="#e09030" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">SLA: 100ms</text>

  <!-- ===== PANEL 4: 알림 히스토리 (bottom-right) ===== -->
  <rect x="450" y="250" width="370" height="140" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="272" font-size="12" font-weight="700" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">알림 히스토리</text>

  <!-- Alert 1 -->
  <rect x="466" y="280" width="348" height="28" rx="4" fill="#2a1010" stroke="#e05555" stroke-width="0.8"/>
  <text x="478" y="298" font-size="11" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">⚠</text>
  <text x="496" y="298" font-size="11" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">정확도 드리프트 감지</text>
  <text x="806" y="298" text-anchor="end" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">2026-05-20 09:14</text>

  <!-- Alert 2 -->
  <rect x="466" y="316" width="348" height="28" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="0.8"/>
  <text x="478" y="334" font-size="11" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">✓</text>
  <text x="496" y="334" font-size="11" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">자동 재학습 완료</text>
  <text x="806" y="334" text-anchor="end" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">2026-05-21 02:33</text>

  <!-- Alert 3 -->
  <rect x="466" y="352" width="348" height="28" rx="4" fill="#2a1010" stroke="#e05555" stroke-width="0.8"/>
  <text x="478" y="370" font-size="11" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">⚠</text>
  <text x="496" y="370" font-size="11" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">피처 분포 이상</text>
  <text x="806" y="370" text-anchor="end" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">2026-05-22 15:47</text>

</svg>
