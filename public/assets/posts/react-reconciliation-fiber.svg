<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">React Fiber — 재조정 엔진</text>

  <!-- 왼쪽: Fiber 개념 -->
  <rect x="60" y="68" width="360" height="100" rx="10" fill="#0f1c2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Fiber란?</text>
  <text x="240" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">각 컴포넌트/엘리먼트에 대한</text>
  <text x="240" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">작업 단위(work unit) 객체</text>
  <text x="240" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">React 16에서 재구현된 재조정 엔진</text>

  <!-- 오른쪽: 두 페이즈 -->
  <rect x="460" y="68" width="360" height="100" rx="10" fill="#0d1f12" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Concurrent 가능성</text>
  <text x="640" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Render 단계: 중단·재개 가능</text>
  <text x="640" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">우선순위 기반 스케줄링 지원</text>
  <text x="640" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">useTransition, startTransition 기반</text>

  <!-- Fiber 노드 구조 -->
  <rect x="60" y="192" width="380" height="240" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="250" y="214"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// Fiber 노드 (단순화)</text>
  <text x="76" y="234"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">const</text>
  <text x="118" y="234"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> fiber = {</text>
  <text x="76" y="254"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  type</text>
  <text x="134" y="254"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: MyComponent,</text>
  <text x="76" y="274"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  key</text>
  <text x="126" y="274"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: </text>
  <text x="140" y="274"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  stateNode</text>
  <text x="222" y="274"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: domNode,</text>
  <text x="76" y="294"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  child</text>
  <text x="134" y="294"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: firstChild,</text>
  <text x="76" y="314"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  sibling</text>
  <text x="150" y="314"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: nextSibling,</text>
  <text x="76" y="334"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  return</text>
  <text x="142" y="334"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: parentFiber,</text>
  <text x="76" y="354"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  memoizedState</text>
  <text x="210" y="354"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: hooksLinkedList,</text>
  <text x="76" y="374"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">};</text>
  <text x="76" y="410"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// memoizedState = 훅 링크드 리스트</text>
  <text x="76" y="428"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 훅 규칙을 어기면 여기가 깨짐</text>

  <!-- 오른쪽 설명 패널 -->
  <rect x="460" y="192" width="360" height="112" rx="8" fill="#101820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">current vs workInProgress</text>
  <text x="476" y="242"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">current: 현재 화면에 표시된 트리</text>
  <text x="476" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">workInProgress: 작업 중인 새 트리</text>
  <text x="476" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커밋 후 두 포인터가 swap됨</text>
  <text x="476" y="296"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">double buffering 방식 (안정적 업데이트)</text>

  <rect x="460" y="320" width="360" height="112" rx="8" fill="#101820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">훅 규칙이 중요한 이유</text>
  <text x="476" y="370"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">훅은 Fiber의 링크드 리스트에 저장됨</text>
  <text x="476" y="390"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">조건문 안 사용 금지: 순서 바뀌면</text>
  <text x="476" y="410"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리스트 인덱스가 어긋나 state 오염</text>
  <text x="476" y="424"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">항상 최상위에서, 동일한 순서로 호출</text>
</svg>
