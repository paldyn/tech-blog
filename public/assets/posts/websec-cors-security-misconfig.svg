<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CORS 잘못된 설정 vs 올바른 설정</text>

  <!-- Vulnerable patterns -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">위험한 패턴</text>

  <rect x="60" y="90" width="228" height="130" rx="6" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="174" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">와일드카드 + Credentials</text>
  <rect x="72" y="120" width="204" height="90" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">ACAO: *</text>
  <text x="84" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">ACAC: true</text>
  <text x="84" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 브라우저가 거부</text>
  <text x="84" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// (규격상 불가)</text>

  <rect x="308" y="90" width="228" height="130" rx="6" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="422" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">Origin 헤더 그대로 반영</text>
  <rect x="320" y="120" width="204" height="90" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="332" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// Request</text>
  <text x="332" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">Origin: https://evil.com</text>
  <text x="332" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// Response (취약)</text>
  <text x="332" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">ACAO: https://evil.com</text>

  <rect x="556" y="90" width="264" height="130" rx="6" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="688" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">suffix 검증 우회</text>
  <rect x="568" y="120" width="240" height="90" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="580" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 검증 로직</text>
  <text x="580" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">if (origin.endsWith('.example.com'))</text>
  <text x="580" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 우회:</text>
  <text x="580" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">evil.example.com.attacker.io</text>

  <!-- Safe patterns -->
  <text x="60" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">올바른 패턴</text>

  <rect x="60" y="272" width="370" height="130" rx="6" fill="#0a100a" stroke="#55c555" stroke-width="1"/>
  <text x="245" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">허용 목록 검증</text>
  <rect x="76" y="304" width="338" height="86" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const ORIGINS = new Set([</text>
  <text x="92" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  'https://app.example.com',</text>
  <text x="92" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  'https://www.example.com'</text>
  <text x="92" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">])</text>

  <rect x="450" y="272" width="370" height="130" rx="6" fill="#0a100a" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">동적 Origin 설정</text>
  <rect x="466" y="304" width="338" height="86" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const origin = req.headers.origin</text>
  <text x="482" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">if (ORIGINS.has(origin)) {</text>
  <text x="482" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  res.setHeader('ACAO', origin)</text>
  <text x="482" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  res.setHeader('Vary', 'Origin')</text>
  <text x="482" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">}</text>
</svg>
