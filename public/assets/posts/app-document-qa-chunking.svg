<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">청킹 전략 비교</text>

  <!-- Header -->
  <text x="140" y="72" text-anchor="middle" font-size="13" fill="#888">전략</text>
  <text x="380" y="72" text-anchor="middle" font-size="13" fill="#888">시각화</text>
  <text x="690" y="72" text-anchor="middle" font-size="13" fill="#888">특징 · 권장 상황</text>
  <line x1="60" y1="80" x2="820" y2="80" stroke="#222" stroke-width="1"/>

  <!-- Row 1: Fixed Size -->
  <line x1="60" y1="86" x2="60" y2="156" stroke="#111" stroke-width="1"/>
  <text x="140" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">고정 크기</text>
  <text x="140" y="134" text-anchor="middle" font-size="12" fill="#888">Fixed Size</text>
  <line x1="240" y1="86" x2="240" y2="156" stroke="#222" stroke-width="1"/>

  <!-- Fixed size visual: 3 equal bars -->
  <rect x="255" y="104" width="82" height="32" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="296" y="124" text-anchor="middle" font-size="11" fill="#7ec8e3">512t</text>
  <rect x="345" y="104" width="82" height="32" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="386" y="124" text-anchor="middle" font-size="11" fill="#7ec8e3">512t</text>
  <rect x="435" y="104" width="82" height="32" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="476" y="124" text-anchor="middle" font-size="11" fill="#7ec8e3">512t</text>
  <!-- Overlap indicator -->
  <rect x="327" y="104" width="18" height="32" rx="0" fill="#7ec8e3" opacity="0.2"/>
  <rect x="417" y="104" width="18" height="32" rx="0" fill="#7ec8e3" opacity="0.2"/>
  <line x1="520" y1="86" x2="520" y2="156" stroke="#222" stroke-width="1"/>

  <text x="690" y="108" text-anchor="middle" font-size="13" fill="#e8e8e8">구현 단순, 예측 가능</text>
  <text x="690" y="126" text-anchor="middle" font-size="12" fill="#888">범용 · 빠른 프로토타입</text>
  <text x="690" y="144" text-anchor="middle" font-size="12" fill="#888">겹침(overlap) 50~100t 권장</text>
  <line x1="60" y1="156" x2="820" y2="156" stroke="#222" stroke-width="1"/>

  <!-- Row 2: Semantic -->
  <line x1="60" y1="166" x2="60" y2="246" stroke="#111" stroke-width="1"/>
  <text x="140" y="196" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">의미 단위</text>
  <text x="140" y="215" text-anchor="middle" font-size="12" fill="#888">Semantic</text>
  <line x1="240" y1="166" x2="240" y2="246" stroke="#222" stroke-width="1"/>

  <!-- Semantic visual: varying width bars -->
  <rect x="255" y="184" width="120" height="32" rx="4" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="315" y="204" text-anchor="middle" font-size="11" fill="#7777cc">문단 1</text>
  <rect x="385" y="184" width="60" height="32" rx="4" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="415" y="204" text-anchor="middle" font-size="11" fill="#7777cc">문단 2</text>
  <rect x="455" y="184" width="55" height="32" rx="4" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="482" y="204" text-anchor="middle" font-size="11" fill="#7777cc">문단 3</text>
  <line x1="520" y1="166" x2="520" y2="246" stroke="#222" stroke-width="1"/>

  <text x="690" y="188" text-anchor="middle" font-size="13" fill="#e8e8e8">문단 · 문장 경계 기준 분할</text>
  <text x="690" y="206" text-anchor="middle" font-size="12" fill="#888">의미 맥락 보존 · 검색 품질 향상</text>
  <text x="690" y="224" text-anchor="middle" font-size="12" fill="#888">일반 문서 · 기사 · 매뉴얼</text>
  <line x1="60" y1="246" x2="820" y2="246" stroke="#222" stroke-width="1"/>

  <!-- Row 3: Recursive -->
  <line x1="60" y1="256" x2="60" y2="336" stroke="#111" stroke-width="1"/>
  <text x="140" y="286" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">계층적</text>
  <text x="140" y="305" text-anchor="middle" font-size="12" fill="#888">Recursive</text>
  <line x1="240" y1="256" x2="240" y2="336" stroke="#222" stroke-width="1"/>

  <!-- Recursive visual: hierarchical bars -->
  <rect x="255" y="268" width="250" height="20" rx="3" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="282" text-anchor="middle" font-size="10" fill="#55c555">섹션 1</text>
  <rect x="265" y="294" width="110" height="16" rx="3" fill="#0f2418" stroke="#55c555" stroke-width="1"/>
  <text x="320" y="306" text-anchor="middle" font-size="10" fill="#55c555">문단 1-1</text>
  <rect x="385" y="294" width="110" height="16" rx="3" fill="#0f2418" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="306" text-anchor="middle" font-size="10" fill="#55c555">문단 1-2</text>
  <line x1="520" y1="256" x2="520" y2="336" stroke="#222" stroke-width="1"/>

  <text x="690" y="278" text-anchor="middle" font-size="13" fill="#e8e8e8">제목→절→문단 계층 분할</text>
  <text x="690" y="296" text-anchor="middle" font-size="12" fill="#888">최고 검색 품질 · 구조 보존</text>
  <text x="690" y="314" text-anchor="middle" font-size="12" fill="#888">구조화 문서 · 기술 문서</text>
  <line x1="60" y1="336" x2="820" y2="336" stroke="#222" stroke-width="1"/>

  <line x1="820" y1="80" x2="820" y2="336" stroke="#222" stroke-width="1"/>
</svg>
