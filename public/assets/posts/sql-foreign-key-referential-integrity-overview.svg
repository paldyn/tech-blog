<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="fk-arr" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0,8 4,0 8" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">FOREIGN KEY와 참조 무결성</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">부모-자식 테이블 관계와 ON DELETE / ON UPDATE 동작</text>

  <!-- Parent table: customers -->
  <rect x="60" y="100" width="320" height="150" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="220" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">customers (부모)</text>
  <line x1="80" y1="132" x2="360" y2="132" stroke="#1e2433"/>
  <text x="100" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">🔑 customer_id</text>
  <text x="290" y="154" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">BIGINT PK</text>
  <text x="100" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">   name</text>
  <text x="290" y="172" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">VARCHAR</text>
  <text x="100" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">   email</text>
  <text x="290" y="190" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">VARCHAR</text>
  <!-- Sample data -->
  <line x1="80" y1="200" x2="360" y2="200" stroke="#1e2433" stroke-dasharray="4"/>
  <text x="100" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">1</text>
  <text x="160" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">김철수</text>
  <text x="100" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">2</text>
  <text x="160" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">이영희</text>

  <!-- Arrow -->
  <line x1="380" y1="185" x2="500" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fk-arr)"/>
  <text x="440" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">참조</text>

  <!-- Child table: orders -->
  <rect x="500" y="100" width="320" height="150" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="660" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">orders (자식)</text>
  <line x1="520" y1="132" x2="800" y2="132" stroke="#1e2433"/>
  <text x="540" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">🔑 order_id</text>
  <text x="790" y="154" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">BIGINT PK</text>
  <text x="540" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">🔗 customer_id</text>
  <text x="790" y="172" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">BIGINT FK</text>
  <text x="540" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">   total</text>
  <text x="790" y="190" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">NUMERIC</text>
  <line x1="520" y1="200" x2="800" y2="200" stroke="#1e2433" stroke-dasharray="4"/>
  <text x="540" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">1001</text>
  <text x="620" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">1</text>
  <text x="540" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">1002</text>
  <text x="620" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">1</text>

  <!-- ON DELETE table -->
  <rect x="60" y="280" width="760" height="180" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">ON DELETE / ON UPDATE 옵션</text>
  <line x1="80" y1="312" x2="800" y2="312" stroke="#1e2433"/>
  <!-- Headers -->
  <text x="160" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">옵션</text>
  <text x="440" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">부모 삭제·수정 시 자식 동작</text>
  <text x="700" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추천 상황</text>
  <!-- Rows -->
  <text x="100" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">RESTRICT</text>
  <text x="440" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">자식이 있으면 부모 삭제 거부</text>
  <text x="700" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기본값, 안전 우선</text>

  <text x="100" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">CASCADE</text>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">자식도 함께 삭제·수정</text>
  <text x="700" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">로그, 주문 상세</text>

  <text x="100" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">SET NULL</text>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">자식 FK를 NULL로 설정</text>
  <text x="700" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">선택적 관계</text>

  <text x="100" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">SET DEFAULT</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">자식 FK를 DEFAULT 값으로</text>
  <text x="700" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PostgreSQL 지원</text>

  <text x="100" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">NO ACTION</text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">트랜잭션 끝에 검사 (지연)</text>
  <text x="700" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DEFERRABLE과 함께</text>

  <text x="440" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
