<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arrG" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Git 분산 워크플로: 로컬 완전 자급</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">네트워크 없이도 로컬에서 완전한 버전 관리가 가능하다</text>

  <!-- Local repo box -->
  <rect x="60" y="96" width="380" height="300" rx="10" fill="#0d150d" stroke="#1e3a1e"/>
  <text x="250" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">로컬 저장소 (Local)</text>
  <text x="250" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 이력 포함 — 완전한 복제본</text>

  <!-- Working Dir -->
  <rect x="80" y="160" width="160" height="52" rx="6" fill="#111" stroke="#2a3a2a"/>
  <text x="160" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">작업 디렉토리</text>
  <text x="160" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일 편집</text>

  <!-- Stage -->
  <rect x="260" y="160" width="160" height="52" rx="6" fill="#111" stroke="#2a3a2a"/>
  <text x="340" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">스테이징 영역</text>
  <text x="340" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">git add</text>

  <!-- Local commits -->
  <rect x="80" y="240" width="340" height="120" rx="6" fill="#111" stroke="#2a3a2a"/>
  <text x="250" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">로컬 커밋 이력</text>
  <circle cx="110" cy="295" r="14" fill="#1e3a1e" stroke="#55c555"/>
  <text x="110" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">c1</text>
  <circle cx="170" cy="295" r="14" fill="#1e3a1e" stroke="#55c555"/>
  <text x="170" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">c2</text>
  <circle cx="230" cy="295" r="14" fill="#1e3a1e" stroke="#55c555"/>
  <text x="230" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">c3</text>
  <circle cx="290" cy="295" r="14" fill="#55c555" stroke="#77cc77"/>
  <text x="290" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a">c4</text>
  <line x1="124" y1="295" x2="156" y2="295" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="184" y1="295" x2="216" y2="295" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="244" y1="295" x2="276" y2="295" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="250" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">git commit — 네트워크 불필요</text>

  <!-- arrows within local -->
  <line x1="242" y1="186" x2="258" y2="186" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="212" x2="250" y2="238" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Remote repo box -->
  <rect x="480" y="96" width="360" height="300" rx="10" fill="#111" stroke="#1e2a3a"/>
  <text x="660" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">원격 저장소 (Remote)</text>
  <text x="660" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GitHub / GitLab / Bitbucket</text>

  <!-- Remote commits -->
  <rect x="500" y="160" width="320" height="200" rx="6" fill="#0d1520" stroke="#1e2e40"/>
  <circle cx="530" cy="230" r="14" fill="#1e2a40" stroke="#7ec8e3"/>
  <text x="530" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">c1</text>
  <circle cx="590" cy="230" r="14" fill="#1e2a40" stroke="#7ec8e3"/>
  <text x="590" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">c2</text>
  <circle cx="650" cy="230" r="14" fill="#1e2a40" stroke="#7ec8e3"/>
  <text x="650" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">c3</text>
  <circle cx="710" cy="230" r="14" fill="#7ec8e3" stroke="#aaddff"/>
  <text x="710" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a">c4</text>
  <line x1="544" y1="230" x2="576" y2="230" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="604" y1="230" x2="636" y2="230" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="664" y1="230" x2="696" y2="230" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="660" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">git push / git fetch</text>
  <text x="660" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">로컬과 선택적으로 동기화</text>

  <!-- Push/fetch arrows between local and remote -->
  <line x1="443" y1="230" x2="477" y2="230" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="460" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">push</text>
  <line x1="477" y1="260" x2="443" y2="260" stroke="#55c555" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="460" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">fetch</text>
</svg>
