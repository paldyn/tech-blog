<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">print() 함수 해부</text>

  <!-- Code display -->
  <rect x="60" y="68" width="760" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="100" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" text-anchor="middle">
    <tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"Hello"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"World"</tspan><tspan fill="#ffffff">, sep=</tspan><tspan fill="#ce9178">"-"</tspan><tspan fill="#ffffff">, end=</tspan><tspan fill="#ce9178">"!\n"</tspan><tspan fill="#ffffff">)</tspan>
  </text>

  <!-- Annotations -->
  <!-- "print" annotation -->
  <line x1="200" y1="118" x2="150" y2="160" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,4"/>
  <rect x="60" y="162" width="190" height="50" rx="6" fill="#111827" stroke="#3b82f6" stroke-width="1"/>
  <text x="155" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">내장 함수</text>
  <text x="155" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">builtins 모듈에 있음</text>

  <!-- "Hello", "World" annotation -->
  <line x1="340" y1="118" x2="320" y2="160" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,4"/>
  <rect x="230" y="162" width="190" height="50" rx="6" fill="#111827" stroke="#f59e0b" stroke-width="1"/>
  <text x="325" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="middle">위치 인수 (값들)</text>
  <text x="325" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">여러 개 쉼표로 나열</text>

  <!-- sep annotation -->
  <line x1="560" y1="118" x2="520" y2="160" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,4"/>
  <rect x="420" y="162" width="200" height="50" rx="6" fill="#111827" stroke="#10b981" stroke-width="1"/>
  <text x="520" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">sep 인수</text>
  <text x="520" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">값 사이 구분자 (기본: 공백)</text>

  <!-- end annotation -->
  <line x1="720" y1="118" x2="740" y2="160" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,4"/>
  <rect x="640" y="162" width="200" height="50" rx="6" fill="#111827" stroke="#8b5cf6" stroke-width="1"/>
  <text x="740" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">end 인수</text>
  <text x="740" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">끝 문자 (기본: \n)</text>

  <!-- Output section -->
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">출력 결과</text>
  <rect x="60" y="264" width="760" height="66" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">Hello-World!</text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6b7280">sep="-" 때문에 값 사이에 "-"가 들어가고, end="!\n" 때문에 끝에 "!"가 붙은 후 줄바꿈</text>
</svg>
