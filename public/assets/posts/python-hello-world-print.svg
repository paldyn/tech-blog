<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">print() 활용 패턴</text>

  <rect x="60" y="70" width="760" height="230" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="94" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본 출력</text>
  <text x="76" y="114" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"Hello, World!"</tspan><tspan fill="#ffffff">)         </tspan><tspan fill="#9aa4b8"># Hello, World!</tspan></text>
  <text x="76" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># sep — 구분자 변경</text>
  <text x="76" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"2026"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"05"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"28"</tspan><tspan fill="#ffffff">, sep=</tspan><tspan fill="#ce9178">"-"</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8"># 2026-05-28</tspan></text>
  <text x="76" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># end — 줄 끝 변경</text>
  <text x="76" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"loading"</tspan><tspan fill="#ffffff">, end=</tspan><tspan fill="#ce9178">" "</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"done"</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8"># loading done</tspan></text>
  <text x="76" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 파일에 출력 (stderr)</text>
  <text x="76" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> sys</tspan></text>
  <text x="76" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"Error occurred"</tspan><tspan fill="#ffffff">, file=sys.stderr)</tspan></text>

  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">print()는 Python 3의 일급 함수 — 모든 객체를 str로 변환해 출력</text>
</svg>
