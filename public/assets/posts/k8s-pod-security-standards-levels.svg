  <text x="610" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717; 호스트 네트워크/PID/IPC</text>
  <text x="610" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717; privileged 컨테이너</text>
  <text x="610" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717; root 실행 금지</text>
  <text x="610" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717; root filesystem 쓰기 금지</text>
  <text x="610" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717; NET_RAW 등 capability 금지</text>
  <text x="610" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#x2713; seccomp RuntimeDefault 권장</text>
  <rect x="605" y="375" width="200" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="705" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">사용 용도</text>
  <text x="705" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">보안 민감 워크로드,</text>
  <text x="705" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">멀티테넌트 환경</text>

  <!-- Bottom legend -->
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Privileged &#x2192; Baseline &#x2192; Restricted  (보안 강도 증가)</text>
  <line x1="290" y1="270" x2="325" y2="270" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <line x1="555" y1="270" x2="590" y2="270" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
