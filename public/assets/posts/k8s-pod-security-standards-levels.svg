  <text x="345" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717; 호스트 네트워크 금지</text>
  <text x="345" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717; 호스트 PID/IPC 금지</text>
  <text x="345" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2717; privileged 컨테이너 금지</text>
  <text x="345" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">&#x2713; 일반 capability 허용</text>
  <text x="345" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">&#x2713; 일반 볼륨 타입 허용</text>
  <text x="345" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">&#x2713; root 실행 허용</text>
  <rect x="340" y="375" width="200" height="60" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">사용 용도</text>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">대부분의 비특권</text>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">프로덕션 워크로드</text>

  <!-- Restricted Box -->
  <rect x="590" y="80" width="230" height="380" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <rect x="590" y="80" width="230" height="48" rx="10" fill="#1a5a1a"/>
