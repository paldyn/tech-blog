  <text x="175" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">제한 없음</text>
  <text x="80" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2713; 호스트 네트워크 허용</text>
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2713; 호스트 PID/IPC 허용</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2713; privileged 컨테이너</text>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2713; 모든 capability 허용</text>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2713; 임의 볼륨 타입</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#x2713; root 실행 허용</text>
  <rect x="75" y="375" width="200" height="60" rx="8" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
