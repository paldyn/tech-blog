      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pod Security Standards — 세 가지 보안 레벨</text>

  <!-- Privileged Box -->
  <rect x="60" y="80" width="230" height="380" rx="10" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
