<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-at" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-at2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Annotated 태그 내부 구조</text>

  <!-- refs/tags/v1.0 -->
  <rect x="60" y="70" width="220" height="54" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">refs/tags/v1.0</text>
  <text x="170" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">→ def5678 (태그 객체 SHA)</text>

  <!-- Arrow: ref → tag object -->
  <line x1="280" y1="97" x2="356" y2="97" stroke="#55c555" stroke-width="2" marker-end="url(#arr-at)"/>

  <!-- Tag object box -->
  <rect x="356" y="60" width="250" height="180" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="481" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Tag 객체 (def5678)</text>
  <text x="376" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">object  abc1234</text>
  <text x="376" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">type    commit</text>
  <text x="376" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">tag     v1.0</text>
  <text x="376" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">tagger  Jane &lt;jane@ex.com&gt;</text>
  <text x="376" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">date    2026-05-18</text>
  <text x="376" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">First stable release</text>

  <!-- Arrow: tag object → commit -->
  <line x1="606" y1="140" x2="682" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-at2)"/>
  <text x="643" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">object 참조</text>

  <!-- Commit object -->
  <rect x="682" y="100" width="160" height="80" rx="8" fill="#1a2233" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="762" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Commit</text>
  <text x="762" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">abc1234</text>
  <text x="762" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">tree · parents</text>

  <!-- GPG signature box -->
  <rect x="60" y="278" width="760" height="70" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">GPG 서명 (선택)</text>
  <text x="440" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">-----BEGIN PGP SIGNATURE-----  ...  -----END PGP SIGNATURE-----</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">git tag -s 로 서명, git tag -v 로 검증</text>

  <!-- Bottom commands -->
  <rect x="60" y="368" width="760" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 태그 객체 내부 직접 확인</text>
  <text x="80" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">cat-file -p v1.0        </text>
  <text x="80" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">cat-file -t v1.0        </text>
  <text x="370" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># "tag" 출력</text>
</svg>
