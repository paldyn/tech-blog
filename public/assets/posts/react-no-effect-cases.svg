<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useEffectк°Җ н•„мҡ” м—ҶлҠ” 5к°Җм§Җ мғҒнҷ©</text>

  <!-- Case 1 -->
  <rect x="60" y="72" width="360" height="72" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="80" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">вқҢ мһҳлӘ»лҗң нҢЁн„ҙ</text>
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useEffectлЎң нҢҢмғқ state кі„мӮ°</text>
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">const [full, setFull] = useState('')</text>

  <rect x="460" y="72" width="360" height="72" rx="6" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="480" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">вң“ мҳ¬л°”лҘё нҢЁн„ҙ</text>
  <text x="480" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">л ҢлҚ” мӨ‘ м§Ғм ‘ кі„мӮ°</text>
  <text x="480" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">const fullName = first + ' ' + last</text>

  <!-- Case 2 -->
  <rect x="60" y="158" width="360" height="72" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="80" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">вқҢ мһҳлӘ»лҗң нҢЁн„ҙ</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useEffectлЎң props вҶ’ state лҸҷкё°нҷ”</text>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">useEffect(() =&gt; { setItems(prop) }, [prop])</text>

  <rect x="460" y="158" width="360" height="72" rx="6" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="480" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">вң“ мҳ¬л°”лҘё нҢЁн„ҙ</text>
  <text x="480" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">propsлҘј м§Ғм ‘ мӮ¬мҡ©н•ҳкұ°лӮҳ keyлЎң мҙҲкё°нҷ”</text>
  <text x="480" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">const items = prop / &lt;Comp key={prop} /&gt;</text>

  <!-- Case 3 -->
  <rect x="60" y="244" width="360" height="72" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">вқҢ мһҳлӘ»лҗң нҢЁн„ҙ</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useEffectлЎң мқҙлІӨнҠё н•ёл“Өлҹ¬ лЎңм§Ғ мІҳлҰ¬</text>
  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">useEffect(() =&gt; { if(submitted) send() }, [submitted])</text>

  <rect x="460" y="244" width="360" height="72" rx="6" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="480" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">вң“ мҳ¬л°”лҘё нҢЁн„ҙ</text>
  <text x="480" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">мқҙлІӨнҠё н•ёл“Өлҹ¬м—җм„ң м§Ғм ‘ нҳём¶ң</text>
  <text x="480" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">function handleSubmit() { send(data); }</text>

  <!-- Case 4 -->
  <rect x="60" y="330" width="360" height="72" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">вқҢ мһҳлӘ»лҗң нҢЁн„ҙ</text>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useEffectлЎң лҚ°мқҙн„° ліҖнҷҳ/н•„н„°л§Ғ</text>
  <text x="80" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">useEffect(() =&gt; { setFiltered(filter(list)) }, [list])</text>

  <rect x="460" y="330" width="360" height="72" rx="6" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="480" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">вң“ мҳ¬л°”лҘё нҢЁн„ҙ</text>
  <text x="480" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">л ҢлҚ” мӨ‘ кі„мӮ° (л№„мҡ© нҒ¬л©ҙ useMemo)</text>
  <text x="480" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">const filtered = useMemo(() =&gt; filter(list), [list])</text>
</svg>
