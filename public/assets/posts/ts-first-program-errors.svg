<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 오류 메시지 읽는 법</text>

  <!-- Error 1 -->
  <rect x="60" y="70" width="760" height="70" rx="6" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="76" y="94" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">error TS2322:</text>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  Type '<tspan fill="#ce9178">string</tspan>' is not assignable to type '<tspan fill="#ce9178">number</tspan>'.</text>
  <text x="76" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">  src/index.ts(12,5): error TS2322: ...</text>

  <rect x="60" y="156" width="760" height="50" rx="6" fill="#0f1f2f" stroke="#3178c6" stroke-width="1"/>
  <text x="76" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">TS2322: 타입 대입 불가</text>
  <text x="76" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">string 값을 number 타입 변수에 넣으려 함 → 타입 선언 또는 값 수정 필요</text>

  <!-- Error 2 -->
  <rect x="60" y="222" width="760" height="70" rx="6" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="76" y="246" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">error TS7006:</text>
  <text x="76" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  Parameter '<tspan fill="#ce9178">x</tspan>' implicitly has an '<tspan fill="#ce9178">any</tspan>' type.</text>
  <text x="76" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">  src/index.ts(5,17): ...</text>

  <rect x="60" y="308" width="760" height="36" rx="6" fill="#0f1f2f" stroke="#3178c6" stroke-width="1"/>
  <text x="76" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">TS7006: 암묵적 any — strict 모드에서 타입 없는 매개변수 금지 → 타입 명시 필요</text>
</svg>
