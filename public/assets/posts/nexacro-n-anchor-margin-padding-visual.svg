<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Anchor · Margin · Padding 시각화</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">컴포넌트 위치와 여백 원리</text>

  <!-- Left: Anchor demo -->
  <text x="70" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">anchors 동작</text>

  <!-- Parent container -->
  <rect x="60" y="110" width="360" height="200" rx="6" fill="#0a1020" stroke="#3a5a7a" stroke-width="2"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Form / 부모 컨테이너</text>

  <!-- Component with left+right anchors -->
  <rect x="80" y="140" width="320" height="36" rx="4" fill="#0d2040" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">anchors="left right" → 너비 자동 늘어남</text>
  <!-- Arrows showing stretch -->
  <line x1="82" y1="156" x2="96" y2="156" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="96,156 88,152 88,160" fill="#7ec8e3"/>
  <line x1="398" y1="156" x2="384" y2="156" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="384,156 392,152 392,160" fill="#7ec8e3"/>

  <!-- Component with right anchor -->
  <rect x="300" y="192" width="140" height="36" rx="4" fill="#0d2040" stroke="#55c555" stroke-width="1.5"/>
  <text x="370" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">anchors="right"</text>
  <!-- Right anchor arrow -->
  <line x1="400" y1="210" x2="416" y2="210" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="370" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">우측 기준 고정</text>

  <!-- Component with bottom anchor -->
  <rect x="80" y="248" width="280" height="36" rx="4" fill="#0d2040" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="220" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c84a" text-anchor="middle">anchors="left right top bottom" → 사방 늘어남</text>

  <!-- Right: Margin/Padding demo -->
  <text x="470" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">Margin · Padding 박스 모델</text>

  <!-- Outer margin box -->
  <rect x="460" y="110" width="360" height="200" rx="6" fill="#0a1020" stroke="#3a5a7a" stroke-width="1.5"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">부모 컨테이너</text>

  <!-- Margin region -->
  <rect x="488" y="130" width="304" height="164" rx="4" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="640" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">margin 영역 (외부 여백)</text>

  <!-- Padding region -->
  <rect x="508" y="158" width="264" height="116" rx="4" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">padding 영역 (내부 여백)</text>

  <!-- Content -->
  <rect x="528" y="188" width="224" height="68" rx="4" fill="#0d2040" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">컴포넌트 콘텐츠</text>

  <!-- Margin arrows -->
  <line x1="488" y1="218" x2="508" y2="218" stroke="#e05555" stroke-width="1.5"/>
  <text x="498" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">M</text>
  <!-- Padding arrows -->
  <line x1="508" y1="228" x2="528" y2="228" stroke="#55c555" stroke-width="1.5"/>
  <text x="518" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">P</text>

  <!-- Anchor reference table -->
  <rect x="60" y="330" width="760" height="150" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">anchors 값 조합 레퍼런스</text>

  <!-- Table header -->
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">anchors 값</text>
  <text x="320" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">동작</text>
  <text x="560" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">활용 예</text>

  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">"left"  (기본)</text>
  <text x="320" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">좌측 고정, 폼 변화 무관</text>
  <text x="560" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">라벨·입력 필드</text>

  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">"left right"</text>
  <text x="320" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">좌우 고정 → 너비 자동 늘어남</text>
  <text x="560" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">상단 검색 바, 편집 필드</text>

  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">"right bottom"</text>
  <text x="320" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">우하단 고정, 우하로 이동</text>
  <text x="560" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">닫기·확인 버튼</text>

  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">"left right top bottom"</text>
  <text x="320" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">사방 고정 → 크기도 함께 변화</text>
  <text x="560" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">전체 영역 Grid</text>

  <!-- Footer -->
  <text x="440" y="502" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
