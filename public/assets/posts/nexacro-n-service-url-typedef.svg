<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeDefinition 서비스 URL 구조</text>

  <!-- Left: TypeDef XML Code -->
  <rect x="60" y="70" width="380" height="360" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="98" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">&lt;!-- TypeDefinition.xml --&gt;</text>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">&lt;TypeDefinition&gt;</text>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">  &lt;Environments&gt;</text>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    &lt;Environment</text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">      id=</text>
  <text x="112" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"SVC_EMP"</text>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">      url=</text>
  <text x="116" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"/emp/empService.do"</text>
  <text x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    /&gt;</text>
  <text x="76" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    &lt;Environment</text>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">      id=</text>
  <text x="112" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"SVC_DEPT"</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">      url=</text>
  <text x="116" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"/dept/deptService.do"</text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    /&gt;</text>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">  &lt;/Environments&gt;</text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">&lt;/TypeDefinition&gt;</text>

  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// 사용 시</text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">this.transaction(</text>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "SVC_SRCH"</text>
  <text x="152" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "SVC_EMP::getList"</text>
  <text x="198" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">, ...</text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">);</text>

  <!-- Arrow -->
  <polygon points="458,254 488,244 488,264" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="440" y1="254" x2="488" y2="254" stroke="#7777cc" stroke-width="2.5"/>

  <!-- Right: explanation -->
  <rect x="498" y="70" width="322" height="360" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="659" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">URL 조합 방식</text>

  <!-- baseURL box -->
  <rect x="514" y="112" width="290" height="56" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="659" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">BaseURL (environment.xml)</text>
  <text x="659" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">http://api.company.com</text>

  <text x="659" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">+</text>

  <!-- serviceURL box -->
  <rect x="514" y="200" width="290" height="56" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="659" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">ServiceURL (TypeDefinition)</text>
  <text x="659" y="240" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/emp/empService.do</text>

  <text x="659" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">+</text>

  <!-- method box -->
  <rect x="514" y="288" width="290" height="56" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="659" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">서비스명::메서드</text>
  <text x="659" y="328" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">SVC_EMP::getList</text>

  <line x1="514" y1="358" x2="804" y2="358" stroke="#1e2433" stroke-width="1"/>
  <text x="659" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">최종 URL: http://api.company.com</text>
  <text x="659" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">/emp/empService.do?svcId=getList</text>

  <!-- Bottom note -->
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">환경별 BaseURL은 environment.xml — 개발/운영 전환 시 이 파일만 교체</text>
</svg>
