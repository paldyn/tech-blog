<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrow-blue" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-red" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">ELO 레이팅 업데이트 공식</text>

  <!-- ===== TOP: Formula section (y=68-200) ===== -->
  <!-- Formula background -->
  <rect x="60" y="68" width="760" height="140" rx="8" fill="#0d1425" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Formula label -->
  <text x="440" y="92" text-anchor="middle" font-size="13" fill="#888">기대 승률 (Expected Score)</text>

  <!-- E_A formula -->
  <text x="440" y="123" text-anchor="middle" font-size="20" font-weight="700" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">E_A = 1 / ( 1 + 10 ^ ((R_B − R_A) / 400) )</text>

  <!-- Divider -->
  <line x1="100" y1="138" x2="780" y2="138" stroke="#1e2a40" stroke-width="1"/>

  <!-- R'_A formula label -->
  <text x="440" y="157" text-anchor="middle" font-size="13" fill="#888">레이팅 업데이트 (Rating Update)</text>

  <!-- R'_A formula -->
  <text x="440" y="185" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">R′_A = R_A + K × ( S_A − E_A )</text>

  <!-- ===== Variable legend ===== -->
  <rect x="60" y="220" width="760" height="44" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="100" y="244" font-size="12" fill="#888">R_A = 현재 레이팅</text>
  <text x="265" y="244" font-size="12" fill="#888">K = K-factor (32)</text>
  <text x="420" y="244" font-size="12" fill="#888">S_A = 실제 결과 (1 / 0.5 / 0)</text>
  <text x="630" y="244" font-size="12" fill="#888">E_A = 기대 승률</text>

  <!-- ===== BOTTOM: Three outcome scenarios (y=278-390) ===== -->
  <text x="440" y="273" text-anchor="middle" font-size="13" fill="#888">결과별 레이팅 변화 예시 (R_A = R_B = 1200, K = 32)</text>

  <!-- Scenario 1: A wins (S_A=1.0) -->
  <rect x="60" y="285" width="240" height="110" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">A 승리 (S_A = 1.0)</text>
  <line x1="80" y1="316" x2="280" y2="316" stroke="#55c555" stroke-width="0.5" opacity="0.4"/>
  <text x="180" y="338" text-anchor="middle" font-size="13" fill="#ccc">E_A = 0.500</text>
  <text x="180" y="358" text-anchor="middle" font-size="13" fill="#ccc">ΔR = 32 × (1.0 − 0.5)</text>
  <text x="180" y="378" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">R_A: 1200 → 1216 ▲</text>

  <!-- Scenario 2: Draw (S_A=0.5) -->
  <rect x="320" y="285" width="240" height="110" rx="8" fill="#0a1218" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">무승부 (S_A = 0.5)</text>
  <line x1="340" y1="316" x2="540" y2="316" stroke="#7ec8e3" stroke-width="0.5" opacity="0.4"/>
  <text x="440" y="338" text-anchor="middle" font-size="13" fill="#ccc">E_A = 0.500</text>
  <text x="440" y="358" text-anchor="middle" font-size="13" fill="#ccc">ΔR = 32 × (0.5 − 0.5)</text>
  <text x="440" y="378" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">R_A: 1200 → 1200 ─</text>

  <!-- Scenario 3: A loses (S_A=0.0) -->
  <rect x="580" y="285" width="240" height="110" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">A 패배 (S_A = 0.0)</text>
  <line x1="600" y1="316" x2="800" y2="316" stroke="#e05555" stroke-width="0.5" opacity="0.4"/>
  <text x="700" y="338" text-anchor="middle" font-size="13" fill="#ccc">E_A = 0.500</text>
  <text x="700" y="358" text-anchor="middle" font-size="13" fill="#ccc">ΔR = 32 × (0.0 − 0.5)</text>
  <text x="700" y="378" text-anchor="middle" font-size="15" font-weight="700" fill="#e05555">R_A: 1200 → 1184 ▼</text>
</svg>
