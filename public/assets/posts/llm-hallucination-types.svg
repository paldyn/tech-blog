<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LLM 환각(Hallucination) 유형 분류</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">AI가 자신 있게 틀리는 세 가지 방식</text>

  <!-- Type 1: Factual Hallucination -->
  <rect x="60" y="90" width="228" height="290" fill="#111827" rx="10" stroke="#e05555" stroke-width="1.5" stroke-opacity="0.7"/>
  <rect x="60" y="90" width="228" height="44" fill="#2a1010" rx="10"/>
  <rect x="60" y="120" width="228" height="14" fill="#2a1010" rx="0"/>
  <text x="174" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">사실적 환각</text>
  <text x="174" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">Factual Hallucination</text>

  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">정의</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">실제 존재하지 않거나 틀린</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">사실을 마치 사실인 것처럼</text>
  <text x="80" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">자신 있게 생성</text>

  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">예시</text>
  <rect x="76" y="238" width="196" height="62" fill="#1a0808" rx="6"/>
  <text x="86" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">"세종대왕은 1398년에</text>
  <text x="86" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">스마트폰을 발명했습니다."</text>
  <text x="86" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(존재하지 않는 사실 생성)</text>

  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">하위 유형</text>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 가짜 인용 / 출처 날조</text>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 잘못된 수치·날짜·이름</text>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 존재하지 않는 법률·제품</text>

  <!-- Type 2: Faithfulness Hallucination -->
  <rect x="326" y="90" width="228" height="290" fill="#111827" rx="10" stroke="#e05555" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="326" y="90" width="228" height="44" fill="#1a1508" rx="10"/>
  <rect x="326" y="120" width="228" height="14" fill="#1a1508" rx="0"/>
  <text x="440" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8a020" text-anchor="middle">충실성 환각</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020" text-anchor="middle">Faithfulness Hallucination</text>

  <text x="346" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">정의</text>
  <text x="346" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">제공된 컨텍스트(문서, 지시)</text>
  <text x="346" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">와 모순되는 내용을 생성하거나</text>
  <text x="346" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">과도하게 추론/확장</text>

  <text x="346" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">예시</text>
  <rect x="342" y="238" width="196" height="62" fill="#1a1508" rx="6"/>
  <text x="352" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a020">[문서: 판매량 500개]</text>
  <text x="352" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a020">→ "판매량 5,000개 돌파"</text>
  <text x="352" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(컨텍스트 왜곡·확대)</text>

  <text x="346" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">하위 유형</text>
  <text x="346" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 요약 시 정보 왜곡</text>
  <text x="346" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 지시 무시 (instruction)</text>
  <text x="346" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 의미 과잉 해석</text>

  <!-- Type 3: Reasoning Error -->
  <rect x="592" y="90" width="228" height="290" fill="#111827" rx="10" stroke="#e05555" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="592" y="90" width="228" height="44" fill="#0d0d2a" rx="10"/>
  <rect x="592" y="120" width="228" height="14" fill="#0d0d2a" rx="0"/>
  <text x="706" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">추론 오류</text>
  <text x="706" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">Reasoning Error</text>

  <text x="612" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">정의</text>
  <text x="612" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">전제는 사실이지만 논리적</text>
  <text x="612" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">추론 과정에서 오류가 발생해</text>
  <text x="612" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">잘못된 결론 도출</text>

  <text x="612" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">예시</text>
  <rect x="608" y="238" width="196" height="62" fill="#0d0d1a" rx="6"/>
  <text x="618" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">"17 × 24 = 428"</text>
  <text x="618" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">(실제: 408)</text>
  <text x="618" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(계산·논리 오류)</text>

  <text x="612" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">하위 유형</text>
  <text x="612" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 수학 계산 오류</text>
  <text x="612" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 논리 오류 (비약·순환)</text>
  <text x="612" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 다단계 추론 실패</text>

  <!-- Bottom: Why it happens -->
  <rect x="60" y="396" width="760" height="68" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">왜 LLM은 환각하는가?</text>
  <text x="100" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 훈련 데이터에 없는 정보도 확률적으로 그럴듯한 답을 생성</text>
  <text x="100" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 모델은 "모른다"고 말하는 것보다 유창한 답을 만드는 데 최적화</text>
  <text x="100" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">              → 사실 검증 능력이 아닌 언어 패턴 학습의 부산물</text>
</svg>
