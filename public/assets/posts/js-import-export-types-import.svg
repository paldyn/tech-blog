<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">import 문법 총정리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Named · Default · Namespace · Side-effect</text>

  <!-- Code block: all import forms -->
  <rect x="60" y="88" width="760" height="300" rx="8" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ① Named import — 이름 그대로 가져오기</text>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ffffff">{ add, PI } </tspan><tspan fill="#7ec8e3">from </tspan><tspan fill="#ce9178">'./math.mjs'</tspan><tspan fill="#ffffff">;</tspan></text>

  <line x1="76" y1="144" x2="804" y2="144" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ② Renamed import — 이름 바꾸기</text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ffffff">{ add </tspan><tspan fill="#7ec8e3">as </tspan><tspan fill="#ffffff">sum } </tspan><tspan fill="#7ec8e3">from </tspan><tspan fill="#ce9178">'./math.mjs'</tspan><tspan fill="#ffffff">;</tspan></text>

  <line x1="76" y1="194" x2="804" y2="194" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ③ Default import — 이름 자유</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ffffff">MyApp </tspan><tspan fill="#7ec8e3">from </tspan><tspan fill="#ce9178">'./app.mjs'</tspan><tspan fill="#ffffff">;</tspan></text>

  <line x1="76" y1="244" x2="804" y2="244" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ④ Namespace import — 전체 묶음</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ffffff">* </tspan><tspan fill="#7ec8e3">as </tspan><tspan fill="#ffffff">MathUtils </tspan><tspan fill="#7ec8e3">from </tspan><tspan fill="#ce9178">'./math.mjs'</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">MathUtils.add(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">);</tspan></text>

  <line x1="76" y1="312" x2="804" y2="312" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ⑤ Side-effect only — 부수 효과만</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ce9178">'./polyfill.mjs'</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// 실행만, 값 없음</tspan></text>

  <line x1="76" y1="362" x2="804" y2="362" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ⑥ Default + Named 혼합</text>

  <!-- Bottom: summary labels -->
  <rect x="60" y="408" width="760" height="44" rx="8" fill="#111827" stroke="#374151"/>
  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">import 바인딩은 <tspan fill="#55c555">읽기 전용</tspan> — 가져온 값에 직접 재할당 불가 (TypeError)</text>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">내보낸 모듈의 함수를 통해서만 값 변경 가능 (라이브 바인딩)</text>

  <!-- Footer -->
</svg>
