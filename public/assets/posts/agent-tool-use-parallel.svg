<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">병렬 도구 호출과 도구 선택 전략</text>

  <!-- 왼쪽: 병렬 도구 호출 -->
  <text x="210" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">병렬 Tool Use</text>

  <rect x="140" y="92" width="140" height="36" rx="6" fill="#1a0a1a" stroke="#6e3a6e" stroke-width="1.5"/>
  <text x="210" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">LLM 응답</text>

  <!-- LLM → 3개 도구 동시 -->
  <line x1="210" y1="128" x2="100" y2="168" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="210" y1="128" x2="210" y2="168" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="210" y1="128" x2="320" y2="168" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="50" y="168" width="100" height="36" rx="6" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1"/>
  <text x="100" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">날씨 API</text>

  <rect x="160" y="168" width="100" height="36" rx="6" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1"/>
  <text x="210" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">교통 API</text>

  <rect x="270" y="168" width="100" height="36" rx="6" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1"/>
  <text x="320" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">뉴스 API</text>

  <!-- 병렬 결과 → 통합 -->
  <line x1="100" y1="204" x2="140" y2="232" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="210" y1="204" x2="210" y2="232" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="320" y1="204" x2="280" y2="232" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="140" y="232" width="140" height="36" rx="6" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="210" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">결과 통합 → 최종 답변</text>

  <text x="210" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">3개 도구 동시 실행 → 지연 최소화</text>
  <text x="210" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">Claude는 tool_use 블록을 여러 개 반환</text>

  <!-- 오른쪽: 도구 선택 전략 코드 -->
  <rect x="460" y="68" width="380" height="340" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"
        ># 병렬 도구 실행 처리</text>
  <text x="480" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> asyncio</tspan>
  </text>
  <text x="480" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">async def</tspan><tspan fill="#ffffff"> run_tools_parallel(blocks, funcs):</tspan>
  </text>
  <text x="480" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">    """여러 tool_use 블록을 병렬 실행"""</tspan>
  </text>
  <text x="480" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    async def</tspan><tspan fill="#ffffff"> run_one(block):</tspan>
  </text>
  <text x="480" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        func = funcs.get(block.name)</tspan>
  </text>
  <text x="480" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        if not</tspan><tspan fill="#ffffff"> func:</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> return</tspan><tspan fill="#ffffff"> {</tspan><tspan fill="#ce9178">"error"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"unknown"</tspan><tspan fill="#ffffff">}</tspan>
  </text>
  <text x="480" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        try</tspan><tspan fill="#ffffff">:</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> return await</tspan><tspan fill="#ffffff"> func(**block.input)</tspan>
  </text>
  <text x="480" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        except</tspan><tspan fill="#ffffff"> Exception </tspan>
    <tspan fill="#7ec8e3" font-weight="600">as</tspan><tspan fill="#ffffff"> e:</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> return</tspan><tspan fill="#ffffff"> {</tspan><tspan fill="#ce9178">"error"</tspan><tspan fill="#ffffff">: str(e)}</tspan>
  </text>
  <text x="480" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">    # tool_use 블록만 필터링 후 병렬 실행</tspan>
  </text>
  <text x="480" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    tool_blocks = [b </tspan>
    <tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> b </tspan>
    <tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> blocks</tspan>
  </text>
  <text x="480" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">                   </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> b.type == </tspan><tspan fill="#ce9178">"tool_use"</tspan><tspan fill="#ffffff">]</tspan>
  </text>
  <text x="480" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    results = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> asyncio.gather(</tspan>
  </text>
  <text x="480" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        *[run_one(b) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> b </tspan>
    <tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> tool_blocks]</tspan>
  </text>
  <text x="480" y="378" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    )</tspan>
  </text>
  <text x="480" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> [{</tspan><tspan fill="#ce9178">"type"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"tool_result"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
</svg>
