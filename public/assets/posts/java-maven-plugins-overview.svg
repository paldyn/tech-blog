<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Maven 플러그인 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Plugin = Goals 모음 · Phase에 Binding</text>

  <!-- Maven Build box (center top) -->
  <rect x="330" y="100" width="220" height="54" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">Maven Build</text>
  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">mvn 명령 실행</text>

  <!-- Arrow down from Maven Build to Plugin -->
  <line x1="440" y1="154" x2="440" y2="184" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Plugin box -->
  <rect x="310" y="184" width="260" height="54" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">Plugin</text>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">groupId : artifactId : version</text>

  <!-- Arrow down from Plugin to Goals -->
  <line x1="440" y1="238" x2="440" y2="268" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Goals label -->
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">포함하는 Goals</text>

  <!-- Three Goal boxes side by side -->
  <rect x="60" y="278" width="180" height="54" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">compile</text>
  <text x="150" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">compiler:compile</text>

  <rect x="350" y="278" width="180" height="54" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">test</text>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">surefire:test</text>

  <rect x="640" y="278" width="180" height="54" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">package</text>
  <text x="730" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">jar:jar</text>

  <!-- Arrows from Plugin to Goals -->
  <line x1="310" y1="240" x2="150" y2="278" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="440" y1="238" x2="440" y2="278" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="570" y1="240" x2="730" y2="278" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Phase binding section -->
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Goal → Phase Binding</text>

  <!-- Phase binding boxes -->
  <rect x="60" y="382" width="220" height="54" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">Build Plugin</text>
  <text x="170" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">라이프사이클 phase에 실행</text>

  <rect x="600" y="382" width="220" height="54" rx="8" fill="#0a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">Reporting Plugin</text>
  <text x="710" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">mvn site 리포트 생성</text>

  <!-- VS divider -->
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#888" text-anchor="middle">vs</text>

  <!-- bottom tip -->
  <rect x="200" y="456" width="480" height="42" rx="8" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">직접 실행: mvn compiler:compile  |  mvn shade:shade</text>
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">기본 groupId: org.apache.maven.plugins 생략 가능</text>
</svg>
