<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLAlchemy 레이어 구조</text>

  <!-- Layer 1: Application -->
  <rect x="200" y="66" width="480" height="60" rx="8" fill="#1e3a5f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">애플리케이션 코드 (Python)</text>
  <text x="440" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">session.query(User).filter(...) | select(User).where(...)</text>

  <!-- Arrow down -->
  <line x1="440" y1="126" x2="440" y2="154" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 2: ORM -->
  <rect x="200" y="156" width="480" height="60" rx="8" fill="#1e2d10" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">ORM Layer (Session · Mapper)</text>
  <text x="440" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Identity Map · Unit of Work · Lazy/Eager Loading</text>

  <!-- Arrow down -->
  <line x1="440" y1="216" x2="440" y2="244" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 3: Core (SQL Expression Language) -->
  <rect x="200" y="246" width="480" height="60" rx="8" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">Core Layer (SQL Expression Language)</text>
  <text x="440" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">select() · insert() · Table · Column · Engine</text>

  <!-- Arrow down -->
  <line x1="440" y1="306" x2="440" y2="334" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 4: DBAPI -->
  <rect x="200" y="336" width="480" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">DBAPI 2.0 드라이버</text>
  <text x="440" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">psycopg2 · asyncpg · pymysql · cx_Oracle · pyodbc</text>

  <!-- Arrow down -->
  <line x1="440" y1="396" x2="440" y2="424" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- Layer 5: DB -->
  <rect x="200" y="426" width="480" height="38" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">PostgreSQL · MySQL · SQLite · Oracle · MSSQL</text>

  <!-- Side labels -->
  <rect x="60" y="156" width="120" height="60" rx="6" fill="#0a1a0a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="120" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">SQLAlchemy</text>
  <text x="120" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">ORM</text>
  <text x="120" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">(2.0+)</text>

  <rect x="700" y="246" width="120" height="60" rx="6" fill="#1a1000" stroke="#4a3a00" stroke-width="1"/>
  <text x="760" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">SQLAlchemy</text>
  <text x="760" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">Core</text>
  <text x="760" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">(단독 사용 가능)</text>
</svg>
