<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-us" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">useTransition + Suspense: fallback 타이밍 제어</text>

  <!-- Without transition: Suspense shows fallback immediately -->
  <text x="200" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">transition 없음</text>

  <rect x="60" y="88" width="280" height="80" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="200" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Tab A</text>
  <text x="200" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">setPage('b') 호출</text>
  <text x="200" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">→ 즉시 fallback("Loading...")으로 교체</text>

  <rect x="60" y="182" width="280" height="60" rx="6" fill="#2a1a1e" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">Suspense fallback 표시 (flickering)</text>
  <text x="200" y="227" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">데이터가 빨리 오면 깜빡임 불쾌</text>

  <!-- With transition: Suspense defers fallback -->
  <text x="640" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">startTransition 사용</text>

  <rect x="460" y="88" width="360" height="80" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="640" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Tab A (isPending=true → opacity 0.7)</text>
  <text x="640" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">startTransition(() =&gt; setPage('b'))</text>
  <text x="640" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ Tab A 유지하며 Tab B를 백그라운드에서 준비</text>

  <rect x="460" y="182" width="360" height="60" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">Tab B 준비 완료 → 즉시 표시</text>
  <text x="640" y="227" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Suspense fallback 건너뜀 (빠를 경우)</text>

  <!-- Code: transition + suspense combination -->
  <rect x="60" y="268" width="760" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// startTransition으로 감싸면 Suspense가 fallback을 즉시 보이지 않음</text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> handleTabClick(tab: string) {</tspan>
  </text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  startTransition(() =&gt; {</tspan>
  </text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    setCurrentTab(tab);</tspan>
  </text>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  });</tspan>
  </text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Suspense는 transition 중에 fallback 전환을 보류 → 기존 UI 유지</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 새 콘텐츠 준비가 완료될 때까지 기다린 후 한 번에 교체</text>
</svg>
