<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Vitest 실행 파이프라인</text>

  <!-- Left column: pipeline flow -->
  <!-- Box 1: Test Files -->
  <rect x="60" y="80" width="320" height="60" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="220" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">*.test.ts / *.spec.ts</text>
  <text x="220" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테스트 파일 (TypeScript / JSX 포함)</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="140" x2="220" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 2: Vitest Runner -->
  <rect x="60" y="172" width="320" height="60" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Vitest Runner</text>
  <text x="220" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 수집 · 필터 · 감시(watch) · 병렬화</text>

  <!-- Arrow 2 -->
  <line x1="220" y1="232" x2="220" y2="262" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 3: Vite Transform -->
  <rect x="60" y="264" width="320" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Vite Transform (esbuild / SWC)</text>
  <text x="220" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TS 제거 · JSX 변환 · HMR 모듈 그래프</text>

  <!-- Arrow 3 -->
  <line x1="220" y1="324" x2="220" y2="354" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 4: Worker Pool -->
  <rect x="60" y="356" width="320" height="60" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="220" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Worker Pool (vm.Module / iframe)</text>
  <text x="220" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">격리된 환경에서 병렬 실행</text>

  <!-- Arrow 4 -->
  <line x1="220" y1="416" x2="220" y2="446" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Box 5: Results -->
  <rect x="60" y="448" width="320" height="52" rx="8" fill="#0d2218" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">테스트 결과 리포트</text>
  <text x="220" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pass · fail · coverage · 실행 시간</text>

  <!-- Right column: Features -->
  <text x="500" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">핵심 특징</text>

  <!-- Feature boxes -->
  <rect x="490" y="124" width="330" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="510" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">HMR 기반 즉시 재실행</text>
  <text x="510" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경된 모듈만 재변환 — Jest보다 10~40× 빠름</text>

  <rect x="490" y="192" width="330" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="510" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Jest 호환 API</text>
  <text x="510" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">describe / it / expect / vi.fn() — 마이그레이션 최소화</text>

  <rect x="490" y="260" width="330" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="510" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">TypeScript 즉시 지원</text>
  <text x="510" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">별도 Babel/ts-jest 설정 불필요</text>

  <rect x="490" y="328" width="330" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="510" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">v8 / istanbul 커버리지</text>
  <text x="510" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본 v8 커버리지, istanbul 플러그인 선택 가능</text>

  <rect x="490" y="396" width="330" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="510" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">브라우저 모드 (실험적)</text>
  <text x="510" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Playwright / WebdriverIO 연동으로 실제 DOM 실행</text>

  <rect x="490" y="464" width="330" height="48" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="510" y="485" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">워크스페이스(모노레포) 지원</text>
  <text x="510" y="503" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">vitest.workspace.ts로 패키지별 설정 분리</text>
</svg>
