<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">XtraBackup 전체·증분 백업 플로우</text>

  <defs>
    <marker id="arr-xb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-xb2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Full backup -->
  <rect x="60" y="78" width="140" height="54" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="2"/>
  <text x="130" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Full Backup</text>
  <text x="130" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Day 0</text>

  <!-- Arrow to inc1 -->
  <line x1="202" y1="105" x2="278" y2="105" stroke="#55c555" stroke-width="2" marker-end="url(#arr-xb)"/>

  <rect x="280" y="78" width="130" height="54" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="345" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">Inc 1</text>
  <text x="345" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Day 1 delta</text>

  <line x1="412" y1="105" x2="488" y2="105" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-xb2)"/>

  <rect x="490" y="78" width="130" height="54" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="555" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">Inc 2</text>
  <text x="555" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Day 2 delta</text>

  <line x1="622" y1="105" x2="698" y2="105" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-xb2)"/>

  <rect x="700" y="78" width="130" height="54" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="765" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">Inc N</text>
  <text x="765" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Day N delta</text>

  <!-- Commands code box -->
  <rect x="60" y="160" width="380" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 전체 백업</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">xtrabackup</text><text x="185" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --backup \</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  --target-dir=/backup/full</text>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 증분 백업</text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">xtrabackup</text><text x="185" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --backup \</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  --target-dir=/backup/inc1 \</text>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  --incremental-basedir=/backup/full</text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># prepare (복구 전 반드시)</text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">xtrabackup</text><text x="185" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --prepare --apply-log-only \</text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  --target-dir=/backup/full</text>

  <!-- Restore flow -->
  <rect x="460" y="160" width="360" height="210" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="640" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">복구 순서</text>

  <text x="476" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">① prepare Full (--apply-log-only)</text>
  <text x="476" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">② prepare + Inc1 적용</text>
  <text x="476" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">③ prepare + Inc2 적용</text>
  <text x="476" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">④ 마지막 prepare (--apply-log-only 제거)</text>
  <text x="476" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">⑤ --copy-back → datadir 복사</text>
  <text x="476" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">⑥ chown -R mysql:mysql datadir</text>
  <text x="476" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">⑦ MySQL 시작</text>

  <text x="640" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">마지막 Inc에 --apply-log-only 없이 prepare → redo 완전 적용</text>
</svg>
