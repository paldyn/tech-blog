<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">STRIDE 위협 모델</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Microsoft가 개발한 6가지 위협 분류 — 각 위협은 CIA의 특정 속성을 공격한다</text>

  <!-- S: Spoofing -->
  <rect x="60" y="90" width="240" height="80" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">S — 스푸핑</text>
  <text x="100" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Spoofing · 위협: 인증</text>
  <text x="100" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">다른 사용자/서비스로 위장</text>
  <text x="100" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">대응: MFA · 상호 TLS</text>

  <!-- T: Tampering -->
  <rect x="320" y="90" width="240" height="80" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="360" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">T — 변조</text>
  <text x="360" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Tampering · 위협: 무결성</text>
  <text x="360" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">데이터·코드·설정 무단 변경</text>
  <text x="360" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">대응: 해시 · HMAC · 감사 로그</text>

  <!-- R: Repudiation -->
  <rect x="580" y="90" width="240" height="80" rx="8" fill="#12081a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="620" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">R — 부인</text>
  <text x="620" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Repudiation · 위협: 추적성</text>
  <text x="620" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">행위를 나중에 부인</text>
  <text x="620" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">대응: 감사 로그 · 전자 서명</text>

  <!-- I: Information Disclosure -->
  <rect x="60" y="195" width="240" height="80" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">I — 정보 노출</text>
  <text x="100" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Information Disclosure · 위협: 기밀성</text>
  <text x="100" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">민감 데이터 노출</text>
  <text x="100" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">대응: 암호화 · 접근 제어</text>

  <!-- D: Denial of Service -->
  <rect x="320" y="195" width="240" height="80" rx="8" fill="#12100a" stroke="#e8a020" stroke-width="1.5"/>
  <text x="360" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8a020">D — 서비스 거부</text>
  <text x="360" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Denial of Service · 위협: 가용성</text>
  <text x="360" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">서비스 마비</text>
  <text x="360" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">대응: Rate Limit · WAF · CDN</text>

  <!-- E: Elevation of Privilege -->
  <rect x="580" y="195" width="240" height="80" rx="8" fill="#1a0a10" stroke="#cc5577" stroke-width="1.5"/>
  <text x="620" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#cc5577">E — 권한 상승</text>
  <text x="620" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Elevation of Privilege · 위협: 인가</text>
  <text x="620" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">허가되지 않은 권한 획득</text>
  <text x="620" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">대응: 최소 권한 · 샌드박스</text>

  <!-- DFD center -->
  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">데이터 흐름도(DFD) 기반 위협 식별</text>

  <rect x="340" y="330" width="200" height="44" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">웹 애플리케이션</text>
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">신뢰 경계 내부</text>

  <rect x="100" y="344" width="120" height="30" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="160" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">사용자 브라우저</text>

  <rect x="660" y="344" width="120" height="30" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="720" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">데이터베이스</text>

  <!-- Boundary: dashed line -->
  <line x1="240" y1="310" x2="240" y2="400" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="640" y1="310" x2="640" y2="400" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="240" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">신뢰 경계</text>
  <text x="640" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">신뢰 경계</text>

  <line x1="220" y1="359" x2="340" y2="352" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="352" x2="660" y2="359" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STRIDE labels on arrows -->
  <text x="280" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">S · T · I</text>
  <text x="600" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">T · I · D</text>

  <!-- Bottom risk formula -->
  <rect x="60" y="420" width="760" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 위협 우선순위: DREAD 점수 (1-10)</text>
  <text x="80" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Risk = (Damage + Reproducibility + Exploitability</text>
  <text x="80" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">       + Affected_users + Discoverability) / 5</text>
</svg>
