  <line x1="684" y1="255" x2="776" y2="255" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="684" y1="165" x2="776" y2="245" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="776" y1="165" x2="684" y2="245" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="730" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
