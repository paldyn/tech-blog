<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">traceroute 출력 구조 해부</text>

  <!-- Command -->
  <rect x="50" y="64" width="780" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">$ <tspan fill="#7ec8e3" font-weight="600">traceroute</tspan> -n example.com</text>

  <!-- Header -->
  <rect x="50" y="112" width="780" height="28" rx="4" fill="#0f1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="68" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"> 홉   라우터 IP              RTT1       RTT2       RTT3</text>

  <!-- Hop 1 -->
  <rect x="50" y="145" width="780" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> 1   <tspan fill="#55c555">192.168.1.1</tspan>       0.382 ms   0.291 ms   0.318 ms</text>

  <!-- Hop 2 -->
  <rect x="50" y="183" width="780" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> 2   <tspan fill="#7ec8e3">10.10.10.1</tspan>        2.143 ms   2.088 ms   2.211 ms</text>

  <!-- Hop 3: no response -->
  <rect x="50" y="221" width="780" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> 3   <tspan fill="#888">* * *</tspan>                            (ICMP 필터링 또는 타임아웃)</text>

  <!-- Hop 4 -->
  <rect x="50" y="259" width="780" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="281" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> 4   <tspan fill="#7ec8e3">203.0.113.1</tspan>       15.423 ms  14.901 ms  15.122 ms</text>

  <!-- Hop 5: final -->
  <rect x="50" y="297" width="780" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="319" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> 5   <tspan fill="#e0a055">93.184.216.34</tspan>     18.251 ms  17.988 ms  18.102 ms   (목적지)</text>

  <!-- Explanation boxes -->
  <rect x="50" y="352" width="370" height="84" rx="6" fill="#0b1a24" stroke="#2a5a8a" stroke-width="1"/>
  <text x="235" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">RTT 3번 표시 이유</text>
  <text x="68" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 홉에 프로브(TTL+1 UDP/ICMP)를</text>
  <text x="68" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">3개 보내고 각각의 RTT를 표시</text>
  <text x="68" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">변동성과 패킷 유실 여부 파악 가능</text>

  <rect x="460" y="352" width="370" height="84" rx="6" fill="#1a0c0c" stroke="#5a1a1a" stroke-width="1"/>
  <text x="645" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">* * * 이 나오는 이유</text>
  <text x="478" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">라우터가 ICMP TTL Exceeded를</text>
  <text x="478" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">보내지 않도록 필터링한 경우</text>
  <text x="478" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">경로는 정상 — 응답이 없는 것뿐</text>
</svg>
