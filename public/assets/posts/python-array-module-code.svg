<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">array 모듈 코드 패턴</text>

  <!-- Left: basic ops -->
  <text x="70" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">기본 연산</text>
  <rect x="60" y="88" width="370" height="264" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from array <tspan fill="#7ec8e3">import</tspan> array</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 정수 배열 생성</text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr = array(<tspan fill="#ce9178">'i'</tspan>, [<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">2</tspan>, <tspan fill="#b5cea8">3</tspan>, <tspan fill="#b5cea8">4</tspan>])</text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr.append(<tspan fill="#b5cea8">5</tspan>)</text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr.extend([<tspan fill="#b5cea8">6</tspan>, <tspan fill="#b5cea8">7</tspan>])</text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 타입 다르면 TypeError</text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr.append(<tspan fill="#b5cea8">3.14</tspan>)  <tspan fill="#e05555"># TypeError!</tspan></text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 크기·타입코드 확인</text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr.typecode    <tspan fill="#6a8aa0"># 'i'</tspan></text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr.itemsize    <tspan fill="#6a8aa0"># 4 (바이트)</tspan></text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr.buffer_info() <tspan fill="#6a8aa0"># (주소, 요소수)</tspan></text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">list</tspan>(arr)  <tspan fill="#6a8aa0"># 리스트로 변환</tspan></text>

  <!-- Right: file I/O + when to use -->
  <text x="460" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#b5cea8">바이너리 I/O · 언제 쓸까</text>
  <rect x="450" y="88" width="370" height="264" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 바이너리 파일에 쓰기/읽기</text>
  <text x="466" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr = array(<tspan fill="#ce9178">'f'</tspan>, [<tspan fill="#b5cea8">1.0</tspan>, <tspan fill="#b5cea8">2.5</tspan>, <tspan fill="#b5cea8">3.7</tspan>])</text>
  <text x="466" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">with <tspan fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"data.bin"</tspan>, <tspan fill="#ce9178">"wb"</tspan>) <tspan fill="#7ec8e3">as</tspan> f:</text>
  <text x="466" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    arr.tofile(f)</text>
  <text x="466" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="466" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr2 = array(<tspan fill="#ce9178">'f'</tspan>)</text>
  <text x="466" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">with <tspan fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"data.bin"</tspan>, <tspan fill="#ce9178">"rb"</tspan>) <tspan fill="#7ec8e3">as</tspan> f:</text>
  <text x="466" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    arr2.fromfile(f, <tspan fill="#b5cea8">3</tspan>)</text>
  <text x="466" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="466" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># bytes 변환</text>
  <text x="466" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">b = arr.tobytes()</text>
  <text x="466" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr3 = array(<tspan fill="#ce9178">'f'</tspan>)</text>
  <text x="466" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">arr3.frombytes(b)</text>
  <text x="466" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 대규모 수치 → NumPy 권장</text>

  <!-- Bottom -->
  <rect x="60" y="372" width="760" height="36" rx="6" fill="#1a1a0d" stroke="#b5cea8"/>
  <text x="440" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">수치 연산이 필요하면 NumPy · 단순 메모리 절약이 목적이면 array · 작은 데이터는 list</text>
</svg>
