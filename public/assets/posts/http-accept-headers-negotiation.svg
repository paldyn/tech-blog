<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="390" viewBox="0 0 880 390">
  <rect width="880" height="390" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">협상 우선순위 선택 예시</text>
    <!-- Code block -->
    <rect x="60" y="65" width="760" height="166" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 요청 헤더</text>
    <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Accept</tspan><tspan fill="#ffffff">: text/html;q=1.0, application/xhtml+xml;q=0.9, */*;q=0.5</tspan></text>
    <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Accept-Language</tspan><tspan fill="#ffffff">: ko-KR;q=1.0, ko;q=0.9, en-US;q=0.8</tspan></text>
    <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Accept-Encoding</tspan><tspan fill="#ffffff">: br;q=1.0, gzip;q=0.9, identity;q=0.1</tspan></text>
    <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 응답</text>
    <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Type</tspan><tspan fill="#ffffff">: text/html; charset=utf-8  </tspan><tspan fill="#9aa4b8"># 1순위</tspan></text>
    <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Language</tspan><tspan fill="#ffffff">: ko-KR                    </tspan><tspan fill="#9aa4b8"># 1순위</tspan></text>
    <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Encoding</tspan><tspan fill="#ffffff">: br                       </tspan><tspan fill="#9aa4b8"># 1순위</tspan></text>
    <!-- Rules box -->
    <rect x="60" y="250" width="760" height="110" rx="8" fill="#0f1a0f" stroke="#3a6a3a" stroke-width="1"/>
    <text x="440" y="272" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">선택 규칙 요약</text>
    <text x="80" y="297" font-size="12" fill="#e8e8e8">1. q 값이 높을수록 우선 (0.0~1.0, 생략 시 1.0)</text>
    <text x="80" y="317" font-size="12" fill="#e8e8e8">2. 동일 q 값이면 더 구체적인 타입 우선 (text/html &gt; text/* &gt; */*)</text>
    <text x="80" y="337" font-size="12" fill="#e8e8e8">3. 서버가 선호 타입을 지원 못하면 406 Not Acceptable 반환</text>
    <text x="440" y="375" text-anchor="middle" font-size="11" fill="#555">Vary 헤더로 협상 차원을 캐시에 알려야 캐시 오염 방지</text>
  </g>
</svg>
