<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Constitutional AI 2단계 프로세스</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">SL-CAI (지도 학습) → RL-CAI (강화 학습)</text>

  <!-- Phase 1: SL-CAI -->
  <rect x="60" y="88" width="340" height="290" fill="#0d1117" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="60" y="88" width="340" height="40" fill="#7777cc" rx="10"/>
  <rect x="60" y="114" width="340" height="14" fill="#7777cc"/>
  <text x="230" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1단계: SL-CAI</text>

  <text x="230" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">지도 헌법 AI (Supervised Learning)</text>

  <!-- SL-CAI Steps -->
  <rect x="80" y="162" width="300" height="36" fill="#1a1a2e" rx="6"/>
  <text x="100" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">① 유해한 프롬프트로 초기 응답 생성</text>
  <text x="100" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(헬프풀 RLHF 모델로)</text>

  <polygon points="221,202 229,202 229,208 234,198 239,208 239,202 247,202 247,206 234,194 221,206" fill="#7777cc"/>

  <rect x="80" y="212" width="300" height="36" fill="#1a1a2e" rx="6"/>
  <text x="100" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">② AI가 원칙에 따라 응답 비판</text>
  <text x="100" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(Constitution 원칙 적용)</text>

  <polygon points="221,252 229,252 229,258 234,248 239,258 239,252 247,252 247,256 234,244 221,256" fill="#7777cc"/>

  <rect x="80" y="262" width="300" height="36" fill="#1a1a2e" rx="6"/>
  <text x="100" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">③ AI가 개선된 응답 생성</text>
  <text x="100" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(비판을 반영한 수정 응답)</text>

  <polygon points="221,302 229,302 229,308 234,298 239,308 239,302 247,302 247,306 234,294 221,306" fill="#7777cc"/>

  <rect x="80" y="312" width="300" height="36" fill="#1a1a2e" rx="6"/>
  <text x="100" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">④ SFT 데이터로 모델 학습</text>
  <text x="100" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(원본 → AI-수정 응답 쌍)</text>

  <text x="230" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">출력: SL-CAI 모델</text>

  <!-- Center Arrow -->
  <polygon points="412,222 448,222 448,210 480,232 448,254 448,242 412,242" fill="#7ec8e3"/>
  <text x="446" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">CAI 모델</text>

  <!-- Phase 2: RL-CAI -->
  <rect x="480" y="88" width="340" height="290" fill="#0d1117" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <rect x="480" y="88" width="340" height="40" fill="#55c555" rx="10"/>
  <rect x="480" y="114" width="340" height="14" fill="#55c555"/>
  <text x="650" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">2단계: RL-CAI</text>

  <text x="650" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">강화 헌법 AI (RLAIF)</text>

  <!-- RL-CAI Steps -->
  <rect x="500" y="162" width="300" height="36" fill="#0a1a0f" rx="6"/>
  <text x="520" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">① SL-CAI로 응답 쌍 생성</text>
  <text x="520" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(같은 프롬프트에 여러 응답)</text>

  <polygon points="641,202 649,202 649,208 654,198 659,208 659,202 667,202 667,206 654,194 641,206" fill="#55c555"/>

  <rect x="500" y="212" width="300" height="36" fill="#0a1a0f" rx="6"/>
  <text x="520" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">② AI가 원칙에 따라 응답 비교</text>
  <text x="520" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(어느 응답이 더 무해한가?)</text>

  <polygon points="641,252 649,252 649,258 654,248 659,258 659,252 667,252 667,256 654,244 641,256" fill="#55c555"/>

  <rect x="500" y="262" width="300" height="36" fill="#0a1a0f" rx="6"/>
  <text x="520" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">③ AI 선호 레이블로 RM 학습</text>
  <text x="520" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(인간 레이블러 없음 = RLAIF)</text>

  <polygon points="641,302 649,302 649,308 654,298 659,308 659,302 667,302 667,306 654,294 641,306" fill="#55c555"/>

  <rect x="500" y="312" width="300" height="36" fill="#0a1a0f" rx="6"/>
  <text x="520" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">④ RL로 최종 모델 정렬</text>
  <text x="520" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(AI 보상 모델 기반 PPO)</text>

  <text x="650" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">출력: Claude (정렬된 모델)</text>

  <!-- Bottom note -->
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">핵심: 인간이 원칙(Constitution)을 정의하면, AI가 스스로 비판·수정·평가하여 정렬</text>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Bai et al., Anthropic 2022</text>
</svg>
