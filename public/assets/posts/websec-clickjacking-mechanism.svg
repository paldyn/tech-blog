<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a6ea8"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클릭재킹 공격 메커니즘</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">투명 iframe으로 클릭을 가로채는 원리</text>

  <!-- Left: Attacker page -->
  <rect x="60" y="100" width="340" height="300" rx="8" fill="#1a0d0d" stroke="#a83a3a" stroke-width="1.5"/>
  <text x="230" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">공격자 페이지 (attacker.com)</text>

  <!-- Decoy content (bottom layer) -->
  <rect x="80" y="138" width="300" height="240" rx="6" fill="#1e1a0d" stroke="#7a6a2a" stroke-width="1"/>
  <text x="230" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">미끼 콘텐츠 (아래 레이어)</text>

  <rect x="100" y="180" width="260" height="40" rx="4" fill="#2a2010"/>
  <text x="230" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8a020" text-anchor="middle">🎁 경품 당첨! 클릭하세요</text>

  <rect x="115" y="232" width="230" height="34" rx="20" fill="#e8a020"/>
  <text x="230" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#0a0a0a" text-anchor="middle">지금 받기</text>

  <!-- Transparent iframe overlay (top layer) -->
  <rect x="80" y="138" width="300" height="240" rx="6" fill="#3a6ea8" fill-opacity="0.08" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="230" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">투명 iframe</text>
  <text x="230" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">opacity: 0 (실제로는 보이지 않음)</text>
  <text x="230" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">z-index: 999 (가장 위)</text>
  <text x="230" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">src: target-bank.com/transfer</text>

  <!-- Arrow between panels -->
  <line x1="405" y1="250" x2="470" y2="250" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="436" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">사용자 클릭</text>
  <text x="436" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">전달됨</text>

  <!-- Right: Target site -->
  <rect x="475" y="100" width="345" height="300" rx="8" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="648" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">실제 대상 페이지 (bank.com)</text>

  <rect x="495" y="138" width="305" height="240" rx="6" fill="#0d1a2e" stroke="#1a3a6e" stroke-width="1"/>
  <text x="648" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">계좌 이체</text>

  <rect x="515" y="180" width="265" height="60" rx="4" fill="#111827"/>
  <text x="648" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">수신자: attacker@evil.com</text>
  <text x="648" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">금액: 1,000,000원</text>

  <rect x="535" y="255" width="225" height="34" rx="6" fill="#3a6ea8"/>
  <text x="648" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">이체 확인</text>

  <text x="648" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">← 사용자는 경품 버튼을</text>
  <text x="648" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">클릭했다고 생각하지만</text>
  <text x="648" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">실제로는 이 버튼을 클릭</text>

  <!-- Bottom CSS code -->
  <rect x="60" y="424" width="760" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#7ec8e3" font-weight="600">iframe </text>
  <text x="116" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ffffff">{ position: absolute; top: 0; left: 0; </text>
  <text x="362" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#7ec8e3" font-weight="600">opacity</text>
  <text x="410" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ffffff">: </text>
  <text x="419" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#b5cea8">0</text>
  <text x="428" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ffffff">; </text>
  <text x="439" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#7ec8e3" font-weight="600">z-index</text>
  <text x="488" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ffffff">: </text>
  <text x="498" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#b5cea8">999</text>
  <text x="520" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ffffff">; }</text>
  <text x="76" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">공격자가 iframe에 설정하는 CSS (투명하게 전체 덮기)</text>
</svg>
