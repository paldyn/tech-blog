<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">중첩 라우팅 구조</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">폴더 중첩 = 레이아웃 중첩</text>

  <!-- Root layout wrapping everything -->
  <rect x="60" y="90" width="760" height="310" rx="10" fill="#10102a" stroke="#7777cc" stroke-width="2"/>
  <text x="100" y="115" font-size="13" font-weight="600" fill="#7777cc">app/layout.tsx (루트)</text>

  <!-- Blog layout -->
  <rect x="90" y="128" width="640" height="230" rx="8" fill="#0c1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="153" font-size="13" font-weight="600" fill="#7ec8e3">app/blog/layout.tsx (블로그 레이아웃)</text>

  <!-- Blog page / Slug page side by side -->
  <rect x="120" y="168" width="270" height="160" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="255" y="192" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">app/blog/page.tsx</text>
  <text x="255" y="212" text-anchor="middle" font-size="12" fill="#888">블로그 목록 페이지</text>
  <text x="255" y="230" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">URL: /blog</text>

  <rect x="420" y="168" width="270" height="160" rx="6" fill="#10102a" stroke="#7777cc" stroke-width="1"/>
  <text x="555" y="192" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">app/blog/[slug]/page.tsx</text>
  <text x="555" y="212" text-anchor="middle" font-size="12" fill="#888">개별 포스트 페이지</text>
  <text x="555" y="230" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">URL: /blog/my-post</text>

  <!-- params note -->
  <text x="555" y="260" text-anchor="middle" font-size="11" fill="#7777cc">params.slug 로 슬러그 접근</text>
  <rect x="440" y="272" width="230" height="44" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="460" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">async</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ce9178">{ params }</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="460" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  params.slug</tspan>
  </text>
</svg>
