<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Javadoc 주석 구조와 블록 태그</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">API 문서 자동 생성을 위한 핵심 태그 완전 가이드</text>

  <!-- Left section label -->
  <text x="60" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Javadoc 주석 예시</text>

  <!-- Code block -->
  <rect x="60" y="96" width="380" height="264" fill="#000000" rx="6" stroke="#3a4a6e"/>

  <!-- Code lines: first at y=120, spacing 18px, 12 lines -->
  <text x="76" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">/**</text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> * 두 정수를 더합니다.</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> * <tspan fill="#7ec8e3">@param</tspan> a  첫 번째 정수</text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> * <tspan fill="#7ec8e3">@param</tspan> b  두 번째 정수</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> * <tspan fill="#7ec8e3">@return</tspan>  두 수의 합</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> * <tspan fill="#7ec8e3">@throws</tspan>  ArithmeticException</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> * <tspan fill="#7ec8e3">@since</tspan>   1.0</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> * <tspan fill="#7ec8e3">@see</tspan>     Math#addExact(int,int)</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"> */</text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">public</tspan> <tspan fill="#7ec8e3">int</tspan> add(<tspan fill="#7ec8e3">int</tspan> a, <tspan fill="#7ec8e3">int</tspan> b) {</text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">return</tspan> a + b;</text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Right section label -->
  <text x="500" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">주요 블록 태그</text>

  <!-- Tag boxes: x=500, w=320, h=32, spacing=38px (32h+6gap), starting y=96 -->

  <!-- @param -->
  <rect x="500" y="96" width="320" height="32" fill="#0f1a2e" rx="4" stroke="#1e2d4a"/>
  <text x="516" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">@param</text>
  <text x="614" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메서드 파라미터 설명</text>

  <!-- @return -->
  <rect x="500" y="134" width="320" height="32" fill="#0f1a2e" rx="4" stroke="#1e2d4a"/>
  <text x="516" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">@return</text>
  <text x="614" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">반환값 설명</text>

  <!-- @throws -->
  <rect x="500" y="172" width="320" height="32" fill="#1a0f0f" rx="4" stroke="#3a1e1e"/>
  <text x="516" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">@throws</text>
  <text x="614" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">예외 조건 설명</text>

  <!-- @since -->
  <rect x="500" y="210" width="320" height="32" fill="#0f2310" rx="4" stroke="#1e3a1a"/>
  <text x="516" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">@since</text>
  <text x="614" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">도입 버전 표시</text>

  <!-- @see -->
  <rect x="500" y="248" width="320" height="32" fill="#0f2310" rx="4" stroke="#1e3a1a"/>
  <text x="516" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">@see</text>
  <text x="614" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">관련 API 참조</text>

  <!-- @author -->
  <rect x="500" y="286" width="320" height="32" fill="#151428" rx="4" stroke="#2a2855"/>
  <text x="516" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">@author</text>
  <text x="614" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">작성자 (클래스 레벨)</text>

  <!-- @deprecated -->
  <rect x="500" y="324" width="320" height="32" fill="#1a0f0f" rx="4" stroke="#3a1e1e"/>
  <text x="516" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">@deprecated</text>
  <text x="614" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용 중단 경고</text>

  <!-- Bottom note -->
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">/** ... */ 블록 주석을 javadoc이 파싱하여 HTML API 문서로 변환합니다</text>
</svg>
