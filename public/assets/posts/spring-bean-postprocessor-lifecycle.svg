<svg width="880" height="640" viewBox="0 0 880 640" xmlns="http://www.w3.org/2000/svg">
<rect width="880" height="640" rx="12" fill="#0a0a0a"/>

<!-- Title -->
<text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">BeanPostProcessor의 위치</text>
<text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">빈 생명주기에서 BPP가 개입하는 두 지점</text>

<!-- ── LEFT COLUMN: Lifecycle steps (x=60, w=330) ── -->

<!-- Step 1 -->
<rect x="60" y="90" width="330" height="50" rx="8" fill="#13131f" stroke="#2a2a44" stroke-width="1.5"/>
<text x="225" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">① 인스턴스화</text>
<text x="225" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">생성자(constructor) 호출</text>

<!-- Arrow 1→2 -->
<line x1="225" y1="140" x2="225" y2="152" stroke="#333355" stroke-width="2"/>
<polygon points="218,151 232,151 225,162" fill="#333355"/>

<!-- Step 2 -->
<rect x="60" y="162" width="330" height="50" rx="8" fill="#13131f" stroke="#2a2a44" stroke-width="1.5"/>
<text x="225" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">② 의존성 주입</text>
<text x="225" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">@Autowired · @Value 처리</text>

<!-- Arrow 2→3 -->
<line x1="225" y1="212" x2="225" y2="224" stroke="#333355" stroke-width="2"/>
<polygon points="218,223 232,223 225,234" fill="#333355"/>

<!-- Step 3: BPP Before (highlighted) -->
<rect x="60" y="234" width="330" height="50" rx="8" fill="#0c1c2e" stroke="#7ec8e3" stroke-width="2"/>
<text x="225" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">③ BPP — Before 콜백</text>
<text x="225" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" opacity="0.75">postProcessBeforeInitialization()</text>

<!-- Horizontal arrow: BPP Before → annotation -->
<line x1="390" y1="259" x2="438" y2="259" stroke="#7ec8e3" stroke-width="2"/>
<polygon points="436,253 450,259 436,265" fill="#7ec8e3"/>

<!-- Arrow 3→4 -->
<line x1="225" y1="284" x2="225" y2="296" stroke="#333355" stroke-width="2"/>
<polygon points="218,295 232,295 225,306" fill="#333355"/>

<!-- Step 4 -->
<rect x="60" y="306" width="330" height="50" rx="8" fill="#13131f" stroke="#2a2a44" stroke-width="1.5"/>
<text x="225" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">④ 초기화 콜백</text>
<text x="225" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">@PostConstruct → afterPropertiesSet()</text>

<!-- Arrow 4→5 -->
<line x1="225" y1="356" x2="225" y2="368" stroke="#333355" stroke-width="2"/>
<polygon points="218,367 232,367 225,378" fill="#333355"/>

<!-- Step 5: BPP After (highlighted) -->
<rect x="60" y="378" width="330" height="50" rx="8" fill="#0c1c2e" stroke="#7ec8e3" stroke-width="2"/>
<text x="225" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">⑤ BPP — After 콜백</text>
<text x="225" y="417" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" opacity="0.75">postProcessAfterInitialization()</text>

<!-- Horizontal arrow: BPP After → annotation -->
<line x1="390" y1="403" x2="438" y2="403" stroke="#7ec8e3" stroke-width="2"/>
<polygon points="436,397 450,403 436,409" fill="#7ec8e3"/>

<!-- Arrow 5→6 -->
<line x1="225" y1="428" x2="225" y2="440" stroke="#333355" stroke-width="2"/>
<polygon points="218,439 232,439 225,450" fill="#333355"/>

<!-- Step 6 -->
<rect x="60" y="450" width="330" height="50" rx="8" fill="#13131f" stroke="#2a2a44" stroke-width="1.5"/>
<text x="225" y="471" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">⑥ 사용 단계</text>
<text x="225" y="489" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비즈니스 로직 수행</text>

<!-- Arrow 6→7 -->
<line x1="225" y1="500" x2="225" y2="512" stroke="#333355" stroke-width="2"/>
<polygon points="218,511 232,511 225,522" fill="#333355"/>

<!-- Step 7 -->
<rect x="60" y="522" width="330" height="50" rx="8" fill="#13131f" stroke="#2a2a44" stroke-width="1.5"/>
<text x="225" y="543" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">⑦ 소멸</text>
<text x="225" y="561" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">@PreDestroy → destroy()</text>

<!-- ── RIGHT COLUMN: Annotation boxes (x=450, w=370) ── -->

<!-- BPP Before annotation -->
<rect x="450" y="220" width="370" height="78" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
<text x="466" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Spring 내장 BPP (Before 단계)</text>
<text x="466" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cccccc">• CommonAnnotationBeanPostProcessor</text>
<text x="478" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ @PostConstruct / @PreDestroy 등록</text>
<text x="466" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cccccc">• AutowiredAnnotationBeanPostProcessor</text>

<!-- BPP After annotation -->
<rect x="450" y="364" width="370" height="78" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
<text x="466" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Spring 내장 BPP (After 단계)</text>
<text x="466" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cccccc">• AbstractAutoProxyCreator</text>
<text x="478" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ AOP 프록시 객체로 빈 교체</text>
<text x="466" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cccccc">• 반환 객체로 원본 빈 대체 가능</text>

<!-- Footer -->
<text x="440" y="614" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — Spring 완전 정복</text>
</svg>
