<svg width="880" height="470" viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="470" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">접미사 배열: "banana"의 모든 접미사 정렬</text>

  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">모든 접미사 (시작 인덱스 i)</text>
  <text x="500" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">사전순 정렬 결과 → SA</text>

  <!-- left column: unsorted suffixes -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <rect x="60" y="120" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="142" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=0</tspan><tspan fill="#ffffff">  banana</tspan></text>

    <rect x="60" y="162" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="184" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=1</tspan><tspan fill="#ffffff">  anana</tspan></text>

    <rect x="60" y="204" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="226" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=2</tspan><tspan fill="#ffffff">  nana</tspan></text>

    <rect x="60" y="246" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="268" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=3</tspan><tspan fill="#ffffff">  ana</tspan></text>

    <rect x="60" y="288" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="310" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=4</tspan><tspan fill="#ffffff">  na</tspan></text>

    <rect x="60" y="330" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="352" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=5</tspan><tspan fill="#ffffff">  a</tspan></text>
  </g>

  <!-- arrow between columns -->
  <line x1="392" y1="242" x2="488" y2="242" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="440" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">사전순 정렬</text>

  <!-- right column: sorted suffixes -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <rect x="500" y="120" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="516" y="142" xml:space="preserve"><tspan fill="#ffffff">a       </tspan><tspan fill="#55c555" font-weight="600">SA[0]=5</tspan></text>

    <rect x="500" y="162" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="516" y="184" xml:space="preserve"><tspan fill="#ffffff">ana     </tspan><tspan fill="#55c555" font-weight="600">SA[1]=3</tspan></text>

    <rect x="500" y="204" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="516" y="226" xml:space="preserve"><tspan fill="#ffffff">anana   </tspan><tspan fill="#55c555" font-weight="600">SA[2]=1</tspan></text>

    <rect x="500" y="246" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="516" y="268" xml:space="preserve"><tspan fill="#ffffff">banana  </tspan><tspan fill="#55c555" font-weight="600">SA[3]=0</tspan></text>

    <rect x="500" y="288" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="516" y="310" xml:space="preserve"><tspan fill="#ffffff">na      </tspan><tspan fill="#55c555" font-weight="600">SA[4]=4</tspan></text>

    <rect x="500" y="330" width="320" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="516" y="352" xml:space="preserve"><tspan fill="#ffffff">nana    </tspan><tspan fill="#55c555" font-weight="600">SA[5]=2</tspan></text>
  </g>

  <!-- result box -->
  <rect x="60" y="394" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SA</tspan><tspan fill="#ffffff"> = [5, 3, 1, 0, 4, 2]   </tspan><tspan fill="#9aa4b8"># 접미사 자체가 아닌 시작 인덱스만 저장 → O(n) 공간</tspan></text>
</svg>
