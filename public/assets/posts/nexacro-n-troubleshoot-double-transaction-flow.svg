<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">이중 트랜잭션 발생 타임라인</text>

  <!-- Timeline labels -->
  <text x="200" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">사용자</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">클라이언트</text>
  <text x="700" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">서버</text>

  <!-- Timeline lines -->
  <line x1="200" y1="86" x2="200" y2="360" stroke="#2a3a4a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="440" y1="86" x2="440" y2="360" stroke="#2a3a4a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="700" y1="86" x2="700" y2="360" stroke="#2a3a4a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Click 1 -->
  <rect x="120" y="90" width="160" height="30" rx="4" fill="#241a05" stroke="#e0a030" stroke-width="1"/>
  <text x="200" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a030">버튼 클릭 (1번째)</text>
  <line x1="280" y1="105" x2="360" y2="105" stroke="#e0a030" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Transaction 1 -->
  <rect x="360" y="90" width="160" height="30" rx="4" fill="#1a2233" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">transaction() 호출</text>
  <line x1="520" y1="105" x2="620" y2="105" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="620" y="90" width="160" height="30" rx="4" fill="#1a2233" stroke="#7ec8e3" stroke-width="1"/>
  <text x="700" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">요청 처리 중…</text>

  <!-- Click 2 (problem) -->
  <rect x="120" y="150" width="160" height="30" rx="4" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">버튼 클릭 (2번째) ←문제</text>
  <line x1="280" y1="165" x2="360" y2="165" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="360" y="150" width="160" height="30" rx="4" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">또 transaction() 호출</text>
  <line x1="520" y1="165" x2="620" y2="165" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <rect x="620" y="150" width="160" height="30" rx="4" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">중복 처리 발생!</text>

  <!-- Responses -->
  <line x1="620" y1="220" x2="520" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="568" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">응답1</text>
  <line x1="620" y1="250" x2="520" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="568" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">응답2</text>

  <!-- Result box -->
  <rect x="280" y="284" width="320" height="52" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">결과: 데이터 이중 저장 / 콜백 두 번 실행</text>
  <text x="440" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">데이터 정합성 깨짐, 예상치 못한 화면 동작</text>

  <text x="440" y="375" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">응답이 오기 전 두 번째 클릭이 두 번째 트랜잭션을 발생시킨다</text>
</svg>
