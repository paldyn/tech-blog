<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Load Average 해석 (CPU 1개 기준)</text>

  <!-- 3 state cards -->
  <!-- Card 1: 여유 (green) -->
  <rect x="60" y="80" width="230" height="320" rx="10" fill="#071407" stroke="#55c555" stroke-width="2"/>
  <text x="175" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">여유</text>
  <text x="175" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="36" font-weight="700" fill="#55c555">0.5</text>
  <text x="175" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Load &lt; 1.0</text>
  <rect x="90" y="215" width="170" height="10" rx="5" fill="#1a2a1a"/>
  <rect x="90" y="215" width="85" height="10" rx="5" fill="#55c555"/>
  <text x="175" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">CPU 사용률 50%</text>
  <text x="175" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">프로세스가 대기 없이</text>
  <text x="175" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">즉시 실행됩니다</text>
  <text x="175" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">조치 불필요</text>

  <!-- Card 2: 한계 (yellow) -->
  <rect x="325" y="80" width="230" height="320" rx="10" fill="#141200" stroke="#e0d455" stroke-width="2"/>
  <text x="440" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e0d455">한계</text>
  <text x="440" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="36" font-weight="700" fill="#e0d455">1.0</text>
  <text x="440" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Load ≈ CPU 수</text>
  <rect x="355" y="215" width="170" height="10" rx="5" fill="#1a1a00"/>
  <rect x="355" y="215" width="170" height="10" rx="5" fill="#e0d455"/>
  <text x="440" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">CPU 사용률 100%</text>
  <text x="440" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">CPU 포화 상태, 약간의</text>
  <text x="440" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">대기 지연이 발생합니다</text>
  <text x="440" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0d455">모니터링 필요</text>

  <!-- Card 3: 과부하 (red) -->
  <rect x="590" y="80" width="230" height="320" rx="10" fill="#140505" stroke="#e05555" stroke-width="2"/>
  <text x="705" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">과부하</text>
  <text x="705" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="36" font-weight="700" fill="#e05555">2.0</text>
  <text x="705" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Load &gt; CPU 수</text>
  <rect x="620" y="215" width="170" height="10" rx="5" fill="#1a0505"/>
  <rect x="620" y="215" width="170" height="10" rx="5" fill="#e05555"/>
  <text x="705" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">CPU 사용률 200%</text>
  <text x="705" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">CPU당 2개 프로세스가</text>
  <text x="705" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">대기하며 경쟁합니다</text>
  <text x="705" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">즉시 조치 필요</text>

  <!-- Note at bottom -->
  <text x="440" y="425" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CPU 4코어 시스템에서 load average 4.0은 정상, 8.0이면 과부하</text>
</svg>
