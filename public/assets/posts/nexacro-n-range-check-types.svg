<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">범위 검사 유형과 방법</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">숫자 범위 · 날짜 범위 · 문자열 길이 · 상호 의존성</text>

  <!-- 숫자 범위 박스 -->
  <rect x="60" y="96" width="368" height="130" fill="#0d1e0d" rx="8" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="244" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">숫자 범위</text>

  <!-- 수직선 -->
  <line x1="90" y1="140" x2="410" y2="140" stroke="#333" stroke-width="2"/>
  <!-- min 마커 -->
  <line x1="140" y1="132" x2="140" y2="148" stroke="#e05555" stroke-width="2"/>
  <text x="140" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">min=0</text>
  <!-- max 마커 -->
  <line x1="360" y1="132" x2="360" y2="148" stroke="#e05555" stroke-width="2"/>
  <text x="360" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">max=999</text>
  <!-- 유효 범위 표시 -->
  <rect x="140" y="133" width="220" height="14" fill="#55c555" rx="2" opacity="0.4"/>
  <text x="250" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">유효 범위</text>
  <!-- 무효 범위 -->
  <text x="90" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">✗</text>
  <text x="380" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">✗</text>

  <text x="90" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">조건: min ≤ value ≤ max</text>
  <text x="90" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Number(val) 변환 후 비교</text>

  <!-- 날짜 범위 박스 -->
  <rect x="452" y="96" width="368" height="130" fill="#0d2137" rx="8" stroke="#2a4a7a" stroke-width="1.5"/>
  <text x="636" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">날짜 범위</text>

  <line x1="482" y1="140" x2="802" y2="140" stroke="#333" stroke-width="2"/>
  <line x1="532" y1="132" x2="532" y2="148" stroke="#e05555" stroke-width="2"/>
  <text x="532" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">시작일</text>
  <line x1="752" y1="132" x2="752" y2="148" stroke="#e05555" stroke-width="2"/>
  <text x="752" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">종료일</text>
  <rect x="532" y="133" width="220" height="14" fill="#7ec8e3" rx="2" opacity="0.4"/>
  <text x="642" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">유효 범위</text>
  <text x="482" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">✗</text>
  <text x="772" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">✗</text>

  <text x="480" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">조건: 시작일 ≤ 종료일</text>
  <text x="480" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문자열 비교 (YYYYMMDD 기준)</text>

  <!-- 문자열 길이 박스 -->
  <rect x="60" y="250" width="368" height="120" fill="#160f28" rx="8" stroke="#3a2a6a" stroke-width="1.5"/>
  <text x="244" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">문자열 길이</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">최솟값: </text>
  <text x="150" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">val.length >= minLen</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">최댓값: </text>
  <text x="150" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">val.length &lt;= maxLen</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB 컬럼 크기 초과 방지</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">한글 1자 = 2byte (DB에 따라 다름)</text>

  <!-- 상호 의존성 박스 -->
  <rect x="452" y="250" width="368" height="120" fill="#1a1a0d" rx="8" stroke="#5a5a2a" stroke-width="1.5"/>
  <text x="636" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c44a" text-anchor="middle">상호 의존성 검사</text>
  <text x="470" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">예: 종료일 &gt;= 시작일</text>
  <text x="470" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">예: 최대수량 &gt;= 최소수량</text>
  <text x="470" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">두 컬럼 값의 관계를</text>
  <text x="470" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">저장 직전 교차 검증</text>
</svg>
