  <rect x="660" y="106" width="80" height="32" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="700" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
