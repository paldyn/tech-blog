  <rect x="100" y="164" width="80" height="32" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">A1</text>
  <rect x="220" y="164" width="80" height="32" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">A2·A3·A4</text>

  <!-- Tree for k=2: (A1·A2)(A3·A4) -->
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
