<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrInfo" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SSE 이벤트 스트림 형식 — text/event-stream</text>
    <text x="440" y="74" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">하나의 응답 위로 이벤트 블록이 시간순으로 계속 흘러온다</text>

    <!-- Server side label -->
    <text x="120" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">서버</text>
    <text x="760" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">클라이언트 (EventSource)</text>

    <!-- time axis arrow -->
    <line x1="60" y1="140" x2="820" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
    <text x="60" y="160" font-size="13" fill="#888">시간 →  연결을 닫지 않고 이벤트를 계속 push</text>

    <!-- Response header box -->
    <rect x="60" y="178" width="760" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text xml:space="preserve" x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">HTTP/1.1 200 OK</tspan></text>
    <text xml:space="preserve" x="76" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">Content-Type: </tspan><tspan fill="#ce9178">text/event-stream</tspan><tspan fill="#ffffff">   Cache-Control: </tspan><tspan fill="#ce9178">no-cache</tspan></text>

    <!-- Event block 1 -->
    <rect x="60" y="256" width="370" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text xml:space="preserve" x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">id:</tspan><tspan fill="#b5cea8"> 1</tspan></text>
    <text xml:space="preserve" x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">event:</tspan><tspan fill="#ffffff"> message</tspan></text>
    <text xml:space="preserve" x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">data:</tspan><tspan fill="#ce9178"> {"price":42100}</tspan></text>
    <text xml:space="preserve" x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">↵   (빈 줄 = 이벤트 끝)</tspan></text>

    <!-- Event block 2 -->
    <rect x="450" y="256" width="370" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text xml:space="preserve" x="466" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">id:</tspan><tspan fill="#b5cea8"> 2</tspan></text>
    <text xml:space="preserve" x="466" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">event:</tspan><tspan fill="#ffffff"> alert</tspan></text>
    <text xml:space="preserve" x="466" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">data:</tspan><tspan fill="#ce9178"> "임계치 돌파"</tspan></text>
    <text xml:space="preserve" x="466" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">↵</tspan></text>

    <!-- field legend -->
    <text x="60" y="388" font-size="13" font-weight="600" fill="#e8e8e8">필드 의미</text>

    <rect x="60" y="400" width="178" height="60" rx="6" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="149" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">data:</text>
    <text x="149" y="444" text-anchor="middle" font-size="11" fill="#888">본문 (여러 줄 가능)</text>

    <rect x="252" y="400" width="178" height="60" rx="6" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1"/>
    <text x="341" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">event:</text>
    <text x="341" y="444" text-anchor="middle" font-size="11" fill="#888">이벤트 타입 이름</text>

    <rect x="444" y="400" width="178" height="60" rx="6" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1"/>
    <text x="533" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">id:</text>
    <text x="533" y="444" text-anchor="middle" font-size="11" fill="#888">재연결 시 Last-Event-ID</text>

    <rect x="636" y="400" width="184" height="60" rx="6" fill="#1f173a" stroke="#7777cc" stroke-width="1"/>
    <text x="728" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#9b8fe8">retry:</text>
    <text x="728" y="444" text-anchor="middle" font-size="11" fill="#888">재연결 대기 ms</text>

    <text x="440" y="484" text-anchor="middle" font-size="12" fill="#888">각 이벤트는 빈 줄 하나로 구분된다 — 필드는 "이름: 값" 형태, 줄 단위로 누적된다</text>
  </g>
</svg>
