<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AI 에이전트: LLM + 도구 + 환경</text>

  <!-- ── 에이전트 핵심 루프 ── -->
  <!-- 중앙: LLM 코어 -->
  <rect x="320" y="100" width="240" height="80" rx="12" fill="#1a0a1a" stroke="#6e3a6e" stroke-width="2"/>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">LLM 코어</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">추론 · 계획 · 도구 선택</text>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">Claude / GPT-4 / Llama</text>

  <!-- 왼쪽: 메모리 -->
  <rect x="80" y="100" width="180" height="80" rx="10" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="170" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">메모리</text>
  <text x="170" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단기: 대화 컨텍스트</text>
  <text x="170" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">장기: 벡터 DB</text>

  <!-- 오른쪽: 도구 -->
  <rect x="620" y="100" width="180" height="80" rx="10" fill="#1a1a0a" stroke="#6e6e3a" stroke-width="1.5"/>
  <text x="710" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#b5cea8" text-anchor="middle">도구</text>
  <text x="710" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">웹검색 · 코드실행</text>
  <text x="710" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DB · API · 파일시스템</text>

  <!-- 화살표: 메모리 ↔ LLM -->
  <line x1="260" y1="140" x2="320" y2="140" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="320" y1="148" x2="260" y2="148" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- 화살표: LLM ↔ 도구 -->
  <line x1="560" y1="140" x2="620" y2="140" stroke="#b5cea8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="620" y1="148" x2="560" y2="148" stroke="#b5cea8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 아래: 환경 -->
  <rect x="200" y="240" width="480" height="60" rx="10" fill="#1a0f0a" stroke="#6e5a3a" stroke-width="1.5"/>
  <text x="440" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">환경 (Environment)</text>
  <text x="440" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">웹 브라우저 · 터미널 · 데이터베이스 · 외부 API · 파일 시스템</text>

  <!-- LLM → 환경, 환경 → LLM -->
  <line x1="400" y1="180" x2="350" y2="240" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-o)"/>
  <line x1="480" y1="240" x2="480" y2="180" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="360" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">행동</text>
  <text x="490" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">관찰</text>

  <!-- ── MCP 섹션 ── -->
  <text x="440" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">Model Context Protocol (MCP)</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">에이전트와 외부 도구를 연결하는 표준 프로토콜 (Anthropic, 2024)</text>

  <!-- MCP 구성요소 -->
  <rect x="60" y="372" width="228" height="68" rx="8" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="174" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">MCP Host</text>
  <text x="174" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Claude Desktop, IDEs</text>
  <text x="174" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LLM을 실행하는 애플리케이션</text>

  <rect x="326" y="372" width="228" height="68" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">MCP Client</text>
  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Host 안에 내장</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Server와 1:1 연결</text>

  <rect x="592" y="372" width="228" height="68" rx="8" fill="#1a0f0a" stroke="#6e5a3a" stroke-width="1.5"/>
  <text x="706" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">MCP Server</text>
  <text x="706" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Tools · Resources · Prompts</text>
  <text x="706" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GitHub, Slack, DB 등 연동</text>

  <!-- 연결 화살표 -->
  <line x1="288" y1="406" x2="326" y2="406" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="554" y1="406" x2="592" y2="406" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 하단: 요약 -->
  <rect x="60" y="456" width="760" height="44" rx="8" fill="#0f0f0f" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="440" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MCP = USB-C처럼 표준화된 커넥터 → 한 번 구현하면 모든 호환 에이전트에서 사용 가능</text>
  <text x="440" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">JSON-RPC 2.0 기반 · stdio / HTTP SSE 전송</text>
</svg>
