<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">getfacl 출력 해석</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">ACL 항목(entry)의 구조와 mask 개념</text>

  <!-- getfacl output code block -->
  <rect x="60" y="84" width="400" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="104" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve"># getfacl report.txt</text>
  <text x="76" y="124" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#888" xml:space="preserve">file: report.txt</text>
  <text x="76" y="142" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#888" xml:space="preserve">owner: alice</text>
  <text x="76" y="160" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#888" xml:space="preserve">group: devteam</text>
  <line x1="76" y1="172" x2="444" y2="172" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="190" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">user::rw-</text>
  <text x="76" y="208" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">user:bob:r--</text>
  <text x="76" y="226" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">user:www-data:r--</text>
  <text x="76" y="244" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc" xml:space="preserve">group::r--</text>
  <text x="76" y="262" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555" xml:space="preserve">mask::rw-</text>
  <text x="76" y="280" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#888" xml:space="preserve">other::---</text>

  <!-- Annotations -->
  <rect x="500" y="84" width="320" height="220" rx="8" fill="#0e1018" stroke="#1e2433"/>
  <text x="660" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#888">항목 설명</text>

  <text x="520" y="130" font-size="12" fill="#55c555">user::</text>
  <text x="570" y="130" font-size="12" fill="#888">파일 소유자 권한 (= chmod 소유자)</text>

  <text x="520" y="152" font-size="12" fill="#7ec8e3">user:name:</text>
  <text x="595" y="152" font-size="12" fill="#888">특정 사용자 ACL 항목</text>

  <text x="520" y="174" font-size="12" fill="#7777cc">group::</text>
  <text x="572" y="174" font-size="12" fill="#888">파일 그룹 권한 (= chmod 그룹)</text>

  <text x="520" y="196" font-size="12" fill="#7777cc">group:name:</text>
  <text x="598" y="196" font-size="12" fill="#888">특정 그룹 ACL 항목</text>

  <text x="520" y="220" font-size="12" fill="#e05555">mask::</text>
  <text x="566" y="220" font-size="12" fill="#888">유효 권한 상한선</text>
  <text x="520" y="238" font-size="12" fill="#555">(named 항목에 AND 적용)</text>

  <text x="520" y="262" font-size="12" fill="#888">other::</text>
  <text x="572" y="262" font-size="12" fill="#888">기타 사용자 권한</text>
  <text x="520" y="280" font-size="12" fill="#555">(= chmod 기타)</text>

  <!-- mask explanation -->
  <rect x="60" y="320" width="760" height="42" rx="8" fill="#14101a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">mask 동작</text>
  <text x="440" y="356" text-anchor="middle" font-size="12" fill="#888">mask::rw- 이면 named user/group ACL이 rw- AND mask = 최대 rw- (실행 불가)</text>
</svg>
