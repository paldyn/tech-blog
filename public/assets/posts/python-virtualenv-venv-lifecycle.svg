<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">venv 사용 흐름</text>

  <rect x="60" y="110" width="170" height="64" rx="8" fill="#11151f" stroke="#7777cc" stroke-width="1.5"/>
  <text x="145" y="138" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">생성</text>
  <text x="145" y="159" font-size="12" fill="#888" text-anchor="middle">venv 디렉터리</text>

  <rect x="290" y="110" width="170" height="64" rx="8" fill="#11151f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="375" y="138" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">활성화</text>
  <text x="375" y="159" font-size="12" fill="#888" text-anchor="middle">PATH 변경</text>

  <rect x="520" y="110" width="170" height="64" rx="8" fill="#11151f" stroke="#55c555" stroke-width="1.5"/>
  <text x="605" y="138" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">설치·작업</text>
  <text x="605" y="159" font-size="12" fill="#888" text-anchor="middle">pip install</text>

  <line x1="230" y1="142" x2="288" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="460" y1="142" x2="518" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrG)"/>

  <rect x="60" y="226" width="760" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">python -m venv .venv          <tspan fill="#9aa4b8"># 생성</tspan></text>
  <text xml:space="preserve" x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">source .venv/bin/activate     <tspan fill="#9aa4b8"># 활성화 (Win: .venv\Scripts\activate)</tspan></text>
</svg>
