<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">언어 전환 UI 패턴 & 세션 유지</text>

  <!-- Pattern 1: Combo -->
  <rect x="60" y="72" width="240" height="140" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="180" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Combo 선택 방식</text>
  <rect x="80" y="108" width="200" height="30" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">▼  한국어 (ko)</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cmb_lang.onitemchanged</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ gfn_setLanguage()</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점: 다수 언어 지원 시 유리</text>

  <!-- Pattern 2: Button -->
  <rect x="320" y="72" width="240" height="140" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">버튼 토글 방식</text>
  <rect x="340" y="108" width="90" height="30" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="385" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">KO</text>
  <rect x="450" y="108" width="90" height="30" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="495" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">EN</text>
  <text x="340" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">btn_ko / btn_en onclick</text>
  <text x="340" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ gfn_setLanguage(sLang)</text>
  <text x="340" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점: 2~3개 언어, 직관적</text>

  <!-- Pattern 3: Auto Detect -->
  <rect x="580" y="72" width="240" height="140" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="700" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">자동 감지 방식</text>
  <text x="600" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">브라우저 언어 감지</text>
  <text x="600" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">또는 서버 세션 언어 사용</text>
  <text x="600" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로그인 사용자 설정 반영</text>
  <text x="600" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">navigator.language 조회</text>
  <text x="600" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점: 사용자 개입 불필요</text>

  <!-- Session Persistence section -->
  <rect x="60" y="240" width="760" height="120" rx="8" fill="#0d1523" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">세션 간 언어 설정 유지</text>

  <rect x="80" y="280" width="180" height="64" rx="6" fill="#0a1020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">쿠키 저장</text>
  <text x="170" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">document.cookie</text>
  <text x="170" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">= "LANG=en; path=/"</text>

  <line x1="260" y1="312" x2="294" y2="312" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="300" y="280" width="180" height="64" rx="6" fill="#0a1020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="390" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">서버 사용자 프로필</text>
  <text x="390" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DB의 언어 설정 컬럼</text>
  <text x="390" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로그인 시 로드</text>

  <line x1="480" y1="312" x2="514" y2="312" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="520" y="280" width="180" height="64" rx="6" fill="#0a1020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="610" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">App 초기화 시 적용</text>
  <text x="610" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">BaseForm Form_Load에서</text>
  <text x="610" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">저장 언어로 setLanguage</text>
</svg>
