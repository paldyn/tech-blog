<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">range-diff 출력 읽는 법</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">왼쪽 번호는 old, 오른쪽 번호는 new, 가운데 기호가 관계</text>

  <rect x="60" y="105" width="760" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="135" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">$ git range-diff main old-branch new-branch</text>
  <text xml:space="preserve" x="80" y="160" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">1:  a1b2c3 = 1:  7c6d5e  로그인 추가</text>
  <text xml:space="preserve" x="80" y="184" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">2:  d4e5f6 ! 2:  f1e2d3  검증 보강</text>
  <text xml:space="preserve" x="80" y="208" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">    @@ src/auth.js</text>
  <text xml:space="preserve" x="80" y="232" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">    -  if (!user) return;</text>
  <text xml:space="preserve" x="80" y="256" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">    +  if (!user || !token) return;</text>
  <text xml:space="preserve" x="80" y="280" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">3:  09a8b7 = 3:  44c3b2  오타 수정</text>

  <text x="60" y="340" font-size="13" fill="#888"><tspan fill="#55c555" font-weight="600">=</tspan> 동일   <tspan fill="#e05555" font-weight="600">!</tspan> 내용 변경   <tspan fill="#7ec8e3" font-weight="600">&lt;</tspan> new에만 추가   <tspan fill="#7777cc" font-weight="600">&gt;</tspan> old에만 있던 커밋</text>
</svg>
