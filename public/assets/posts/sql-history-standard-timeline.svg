<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 표준 역사 타임라인</text>

  <!-- Timeline bar -->
  <line x1="80" y1="95" x2="820" y2="95" stroke="#3a4a6e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Milestones -->
  <!-- 1970 Codd -->
  <line x1="100" y1="88" x2="100" y2="102" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1970</text>
  <text x="100" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Codd</text>
  <text x="100" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">논문</text>

  <!-- 1974 SEQUEL -->
  <line x1="200" y1="88" x2="200" y2="102" stroke="#55c555" stroke-width="2"/>
  <text x="200" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">1974</text>
  <text x="200" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SEQUEL</text>
  <text x="200" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(IBM)</text>

  <!-- 1986 SQL-86 -->
  <line x1="330" y1="88" x2="330" y2="102" stroke="#ce9178" stroke-width="2"/>
  <text x="330" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">1986</text>
  <text x="330" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL-86</text>
  <text x="330" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">첫 표준</text>

  <!-- 1992 SQL-92 -->
  <line x1="450" y1="88" x2="450" y2="102" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="450" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1992</text>
  <text x="450" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">SQL-92</text>
  <text x="450" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">대규모 확장</text>

  <!-- 1999 SQL:1999 -->
  <line x1="570" y1="88" x2="570" y2="102" stroke="#7777cc" stroke-width="2"/>
  <text x="570" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">1999</text>
  <text x="570" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL:1999</text>
  <text x="570" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CTE/재귀</text>

  <!-- 2003 SQL:2003 -->
  <line x1="650" y1="88" x2="650" y2="102" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">2003</text>
  <text x="650" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL:2003</text>
  <text x="650" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Window 함수</text>

  <!-- 2023 SQL:2023 -->
  <line x1="790" y1="88" x2="790" y2="102" stroke="#e05555" stroke-width="2"/>
  <text x="790" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">2023</text>
  <text x="790" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL:2023</text>
  <text x="790" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JSON/그래프</text>

  <!-- Feature boxes -->
  <rect x="60" y="165" width="370" height="220" rx="8" fill="#0d1520" stroke="#3a6a9e" stroke-width="1.5"/>
  <text x="245" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">SQL-92 주요 추가 기능</text>
  <text x="85" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">• JOIN 구문 표준화 (INNER/LEFT/RIGHT/FULL)</text>
  <text x="85" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">• CASE 표현식</text>
  <text x="85" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">• 문자열 함수 (SUBSTRING, UPPER 등)</text>
  <text x="85" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">• 날짜/시간 타입 표준화</text>
  <text x="85" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">• DISTINCT, ORDER BY 정식 표준화</text>
  <text x="85" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">• 서브쿼리 (IN, EXISTS)</text>
  <text x="85" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">• 트랜잭션 격리 수준 (ISOLATION LEVEL)</text>
  <text x="85" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">• 스키마 정의 언어 강화</text>

  <rect x="450" y="165" width="370" height="220" rx="8" fill="#0d1520" stroke="#3a6a9e" stroke-width="1.5"/>
  <text x="635" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">SQL:1999~2023 주요 추가</text>
  <text x="470" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">• WITH (CTE), 재귀 CTE [1999]</text>
  <text x="470" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">• TRIGGER, 사용자 정의 타입 [1999]</text>
  <text x="470" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">• 윈도우 함수 ROW_NUMBER 등 [2003]</text>
  <text x="470" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">• MERGE (UPSERT) [2003]</text>
  <text x="470" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">• TRUNCATE TABLE [2008]</text>
  <text x="470" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">• JSON 타입 및 함수 [2016/2023]</text>
  <text x="470" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">• FETCH FIRST n ROWS (표준 페이징) [2008]</text>
  <text x="470" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">• 그래프 쿼리 (GQL 통합) [2023]</text>
</svg>
