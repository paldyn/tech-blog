<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-l" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">RTT (Round-Trip Time)</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">패킷이 왕복하는 데 걸리는 시간 — ping으로 측정</text>

  <!-- timeline -->
  <line x1="100" y1="160" x2="100" y2="290" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="780" y1="160" x2="780" y2="290" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- client label -->
  <rect x="60" y="110" width="80" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="100" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">클라이언트</text>

  <!-- server label -->
  <rect x="740" y="110" width="80" height="36" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="780" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">서버</text>

  <!-- t=0: send -->
  <circle cx="100" cy="175" r="5" fill="#7ec8e3"/>
  <text x="80" y="172" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">t=0ms</text>

  <!-- request arrow -->
  <line x1="105" y1="178" x2="773" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="440" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">요청 패킷 (ICMP Echo Request)</text>

  <!-- t=10: arrive -->
  <circle cx="780" cy="220" r="5" fill="#55c555"/>
  <text x="800" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">t=10ms</text>

  <!-- response arrow -->
  <line x1="775" y1="225" x2="107" y2="265" stroke="#55c555" stroke-width="2" marker-end="url(#arr-l)"/>
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">응답 패킷 (ICMP Echo Reply)</text>

  <!-- t=20: receive -->
  <circle cx="100" cy="268" r="5" fill="#7ec8e3"/>
  <text x="80" y="265" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">t=20ms</text>

  <!-- RTT brace -->
  <line x1="50" y1="175" x2="50" y2="268" stroke="#e05555" stroke-width="2"/>
  <line x1="44" y1="175" x2="56" y2="175" stroke="#e05555" stroke-width="2"/>
  <line x1="44" y1="268" x2="56" y2="268" stroke="#e05555" stroke-width="2"/>
  <text x="36" y="226" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">RTT</text>
  <text x="36" y="243" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">20ms</text>

  <!-- one-way latency label -->
  <text x="440" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">편도 지연(One-way Latency) = RTT ÷ 2 = 10ms</text>
  <text x="440" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">ping 명령어로 측정 — 서울 ↔ 도쿄 약 15ms, 서울 ↔ 뉴욕 약 160ms</text>
</svg>
