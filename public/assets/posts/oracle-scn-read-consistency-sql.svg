<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">SCN 조회 및 Flashback SCN 활용</text>

  <!-- Code block left -->
  <rect x="60" y="66" width="360" height="258" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 현재 SCN 조회</text>
  <text x="76" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    current_scn,</text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    scn_to_timestamp(current_scn)</text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        AS current_time</text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM v$database;</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 타임스탬프 ↔ SCN 변환</text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    timestamp_to_scn(</text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        SYSTIMESTAMP - INTERVAL</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">        '1' HOUR</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    ) AS scn_1h_ago</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM dual;</text>

  <!-- Code block right -->
  <rect x="450" y="66" width="370" height="258" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 블록 SCN 확인 (ROWID로)</text>
  <text x="466" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="466" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    dbms_rowid.rowid_block_number(rowid)</text>
  <text x="466" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        AS block#,</text>
  <text x="466" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    ora_rowscn</text>
  <text x="466" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM orders</text>
  <text x="466" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE order_id = 1;</text>
  <text x="466" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 세션 기준 SCN 고정 (직렬화)</text>
  <text x="466" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SET TRANSACTION</text>
  <text x="466" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">READ ONLY;</text>
  <text x="466" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 모든 후속 쿼리가 같은 SCN 기준</text>
  <text x="466" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT COUNT(*) FROM orders;</text>
  <text x="466" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT SUM(amount) FROM orders;</text>
</svg>
