<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 11 핵심 기능 (2018.09, LTS)</text>

  <!-- String Methods -->
  <rect x="60" y="66" width="370" height="180" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">String 신규 메서드</text>
  <rect x="76" y="100" width="338" height="136" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="88" y="120"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">"  hello  ".strip()     </text>
  <text xml:space="preserve" x="88" y="120"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// "hello"</text>
  <text xml:space="preserve" x="88" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">"".isBlank()            </text>
  <text xml:space="preserve" x="88" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// true</text>
  <text xml:space="preserve" x="88" y="160"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">"a\nb\nc".lines()       </text>
  <text xml:space="preserve" x="88" y="160"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// Stream</text>
  <text xml:space="preserve" x="88" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">"abc".repeat(3)         </text>
  <text xml:space="preserve" x="88" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// "abcabcabc"</text>
  <text xml:space="preserve" x="88" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">"  ".stripLeading()     </text>
  <text xml:space="preserve" x="88" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// ""</text>
  <text xml:space="preserve" x="88" y="220"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// strip vs trim: Unicode 공백 처리 차이</text>

  <!-- HTTP Client -->
  <rect x="450" y="66" width="370" height="180" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">HTTP Client API (표준화)</text>
  <rect x="466" y="100" width="338" height="136" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="478" y="120"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">var</text>
  <text xml:space="preserve" x="478" y="120"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> client = HttpClient.newBuilder()</text>
  <text xml:space="preserve" x="478" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .version(HTTP_2)</text>
  <text xml:space="preserve" x="478" y="160"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .connectTimeout(Duration.ofSeconds(10))</text>
  <text xml:space="preserve" x="478" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .build();</text>
  <text xml:space="preserve" x="478" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">var</text>
  <text xml:space="preserve" x="478" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> resp = client.send(</text>
  <text xml:space="preserve" x="478" y="220"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  req, BodyHandlers.ofString());</text>

  <!-- Other features grid -->
  <rect x="60" y="264" width="170" height="80" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="145" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">var in Lambda</text>
  <text x="145" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">람다 파라미터에</text>
  <text x="145" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">var + 어노테이션 가능</text>

  <rect x="248" y="264" width="174" height="80" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="335" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">Files 유틸리티</text>
  <text x="335" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Files.readString(path)</text>
  <text x="335" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Files.writeString(path, str)</text>

  <rect x="450" y="264" width="180" height="80" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Nest-based Access</text>
  <text x="540" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">중첩 클래스 private</text>
  <text x="540" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">멤버 직접 접근</text>

  <rect x="648" y="264" width="172" height="80" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="734" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">ZGC Preview</text>
  <text x="734" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">저지연 GC 실험적 도입</text>
  <text x="734" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">STW &lt; 10ms 목표</text>

  <!-- Removed features -->
  <rect x="60" y="362" width="760" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="386" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Java 11에서 제거된 항목</text>
  <text x="440" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Java EE 모듈 제거: javax.xml.ws, javax.annotation, javax.activation 등 (Jakarta EE로 분리)</text>
  <text x="440" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Nashorn JS 엔진 deprecated · CORBA 제거 · appletviewer 제거</text>
  <text x="440" y="442" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">마이그레이션 시 javax → jakarta 패키지 변경 필요</text>
</svg>
