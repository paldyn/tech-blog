  <rect x="348" y="198" width="214" height="34" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="455" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
