  <text x="735" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">KQL 쿼리</text>

  <!-- bottom note -->
  <rect x="60" y="350" width="760" height="64" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">강점: 모든 단어가 인덱싱되어 자유로운 전문 검색</text>
  <text x="440" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대가: JVM 힙 · 인덱스 디스크 · 샤드 운영 부담 — 로깅 스택 중 가장 무겁다</text>
