  <line x1="260" y1="134" x2="330" y2="180" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="260" y1="206" x2="330" y2="206" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="260" y1="278" x2="330" y2="232" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Elasticsearch -->
  <rect x="330" y="110" width="250" height="196" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="455" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Elasticsearch</text>

  <rect x="348" y="156" width="214" height="34" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="455" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
