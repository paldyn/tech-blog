  <line x1="580" y1="208" x2="650" y2="208" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Kibana -->
  <rect x="650" y="150" width="170" height="116" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="735" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
