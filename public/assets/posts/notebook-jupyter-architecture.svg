<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Jupyter 아키텍처: Browser → Server → Kernel</text>

  <!-- ===== BROWSER BOX ===== -->
  <rect x="60" y="80" width="180" height="110" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Browser</text>
  <text x="150" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Notebook UI</text>
  <text x="150" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">HTML / JS / CodeMirror</text>
  <text x="150" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">셀 렌더링 · 출력 표시</text>

  <!-- Arrow: Browser -> Server (HTTP) -->
  <line x1="240" y1="120" x2="318" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="279" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">HTTP</text>
  <!-- Arrow: Server -> Browser (response) -->
  <line x1="320" y1="134" x2="242" y2="134" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="281" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">WebSocket</text>

  <!-- ===== JUPYTER SERVER BOX ===== -->
  <rect x="320" y="62" width="200" height="148" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="420" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">Jupyter Server</text>
  <text x="420" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Python 프로세스</text>
  <rect x="336" y="118" width="168" height="26" rx="4" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="420" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">Tornado Web Framework</text>
  <rect x="336" y="150" width="168" height="26" rx="4" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="420" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">Kernel Manager</text>
  <rect x="336" y="182" width="168" height="22" rx="4" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
  <text x="420" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Contents Manager (.ipynb)</text>

  <!-- Arrow: Server -> Kernel (ZMQ) -->
  <line x1="520" y1="120" x2="598" y2="120" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="559" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">ZeroMQ</text>
  <line x1="600" y1="134" x2="522" y2="134" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="561" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">5 소켓 채널</text>

  <!-- ===== IPYTHON KERNEL BOX ===== -->
  <rect x="600" y="62" width="200" height="148" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">IPython Kernel</text>
  <text x="700" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">독립 Python 프로세스</text>
  <rect x="616" y="118" width="168" height="26" rx="4" fill="#0a1a0a" stroke="#444" stroke-width="1"/>
  <text x="700" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">코드 실행 (exec)</text>
  <rect x="616" y="150" width="168" height="26" rx="4" fill="#0a1a0a" stroke="#444" stroke-width="1"/>
  <text x="700" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">상태 유지 (globals 네임스페이스)</text>
  <rect x="616" y="182" width="168" height="22" rx="4" fill="#0a1a0a" stroke="#444" stroke-width="1"/>
  <text x="700" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">rich output (matplotlib…)</text>

  <!-- ===== IPYNB FILE SECTION ===== -->
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">.ipynb 파일 구조 (JSON)</text>

  <!-- Code box: ipynb JSON -->
  <rect x="60" y="262" width="760" height="206" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># .ipynb는 순수 JSON 파일 — 셀 배열 구조</text>
  <text x="80" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{</text>
  <text x="80" y="324" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">  "nbformat"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">,  </tspan><tspan fill="#7ec8e3" font-weight="600">"metadata"</tspan><tspan fill="#ffffff">: { </tspan><tspan fill="#ce9178">"kernelspec"</tspan><tspan fill="#ffffff">: { </tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"python3"</tspan><tspan fill="#ffffff"> } },</tspan></text>
  <text x="80" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">  "cells"</tspan><tspan fill="#ffffff">: [</tspan></text>
  <text x="80" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    { </tspan><tspan fill="#7ec8e3" font-weight="600">"cell_type"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"code"</tspan><tspan fill="#ffffff">,     </tspan><tspan fill="#7ec8e3" font-weight="600">"source"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"print('hello')"</tspan><tspan fill="#ffffff">], </tspan><tspan fill="#7ec8e3" font-weight="600">"outputs"</tspan><tspan fill="#ffffff">: [...] },</tspan></text>
  <text x="80" y="378" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    { </tspan><tspan fill="#7ec8e3" font-weight="600">"cell_type"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"markdown"</tspan><tspan fill="#ffffff">,  </tspan><tspan fill="#7ec8e3" font-weight="600">"source"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"## 제목"</tspan><tspan fill="#ffffff">] },</tspan></text>
  <text x="80" y="396" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    { </tspan><tspan fill="#7ec8e3" font-weight="600">"cell_type"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"raw"</tspan><tspan fill="#ffffff">,      </tspan><tspan fill="#7ec8e3" font-weight="600">"source"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"raw text"</tspan><tspan fill="#ffffff">] }</tspan></text>
  <text x="80" y="414" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  ]</text>
  <text x="80" y="432" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Cell type legend -->
  <rect x="60" y="482" width="18" height="14" rx="3" fill="#7ec8e3" fill-opacity="0.25" stroke="#7ec8e3" stroke-width="1"/>
  <text x="84" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Code 셀 — 실행되어 outputs 저장</text>
  <rect x="290" y="482" width="18" height="14" rx="3" fill="#ce9178" fill-opacity="0.25" stroke="#ce9178" stroke-width="1"/>
  <text x="314" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Markdown 셀 — 렌더링만, 실행 없음</text>
  <rect x="560" y="482" width="18" height="14" rx="3" fill="#9aa4b8" fill-opacity="0.25" stroke="#9aa4b8" stroke-width="1"/>
  <text x="584" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Raw 셀 — 변환 없이 그대로</text>
</svg>
