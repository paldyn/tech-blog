<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">투기적 디코딩 변형과 속도 향상</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">다양한 Draft 전략과 실제 측정 속도 향상</text>

  <!-- Table header -->
  <rect x="60" y="90" width="760" height="34" rx="4" fill="#151c24"/>
  <text x="170" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">방법</text>
  <text x="350" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Draft 전략</text>
  <text x="560" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">속도 향상</text>
  <text x="720" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">추가 메모리</text>

  <!-- Speculative Decoding -->
  <rect x="60" y="124" width="760" height="32" rx="0" fill="#111"/>
  <text x="170" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Standard SD</text>
  <text x="350" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">별도 소형 모델 (7B→70B)</text>
  <text x="560" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">2~3×</text>
  <text x="720" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">Draft 모델 크기</text>

  <!-- Medusa -->
  <rect x="60" y="156" width="760" height="32" rx="0" fill="#0d0d0d"/>
  <text x="170" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Medusa</text>
  <text x="350" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">헤드 N개 추가 (Tree Decoding)</text>
  <text x="560" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">2.2~3.6×</text>
  <text x="720" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">헤드 파라미터만</text>

  <!-- Draft-based (EAGLE) -->
  <rect x="60" y="188" width="760" height="32" rx="0" fill="#0f1a0f"/>
  <rect x="60" y="188" width="4" height="32" fill="#55c555"/>
  <text x="170" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">EAGLE ★</text>
  <text x="350" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">피처 예측 Draft + Tree</text>
  <text x="560" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">3~4×</text>
  <text x="720" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">경량 Draft 레이어</text>

  <!-- Self-Speculative -->
  <rect x="60" y="220" width="760" height="32" rx="0" fill="#111"/>
  <text x="170" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Self-Speculative</text>
  <text x="350" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Early Exit (레이어 일부만 사용)</text>
  <text x="560" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">1.5~2×</text>
  <text x="720" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">없음</text>

  <!-- Prompt Lookup -->
  <rect x="60" y="252" width="760" height="32" rx="0" fill="#0d0d0d"/>
  <text x="170" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Prompt Lookup</text>
  <text x="350" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">입력 프롬프트에서 복사 추출</text>
  <text x="560" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">2~4× (RAG/요약)</text>
  <text x="720" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">없음</text>

  <!-- Key insights -->
  <rect x="60" y="308" width="760" height="92" rx="6" fill="#111" stroke="#222"/>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">핵심 보장: 품질은 Target Model과 동일</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Rejection Sampling 수락 알고리즘이 Token 단위로 Target 분포를 보장한다. Draft 품질이 낮아도 출력 품질은 Target과 동일.</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">속도 향상 조건</text>
  <text x="80" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Draft 실행 비용 &lt;&lt; Target 1회 Forward 비용. 수락률이 높을수록(Draft 품질↑) 효과 큼. Batch size=1일 때 가장 효과적.</text>
</svg>
