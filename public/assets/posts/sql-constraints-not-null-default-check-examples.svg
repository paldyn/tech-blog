<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">NOT NULL · DEFAULT · CHECK 예시</text>

  <!-- NOT NULL -->
  <rect x="60" y="66" width="240" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">NOT NULL</text>
  <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan></text>
  <text x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  직원 (</tspan></text>
  <text x="80" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  ID  </tspan><tspan fill="#7ec8e3" font-weight="600">INT</tspan></text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">         PK</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  이름 </tspan><tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">50</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#e05555" font-weight="600">       NOT NULL</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  비고 </tspan><tspan fill="#7ec8e3" font-weight="600">TEXT</tspan></text>
  <text x="80" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  -- NULL 허용</tspan></text>
  <text x="80" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">);</tspan></text>
  <text x="170" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">이름=NULL이면 INSERT 거부</text>
  <text x="170" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">반드시 값을 입력해야 함</text>

  <!-- DEFAULT -->
  <rect x="320" y="66" width="240" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">DEFAULT</text>
  <text x="340" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan></text>
  <text x="340" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  게시글 (</tspan></text>
  <text x="340" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  ID   </tspan><tspan fill="#7ec8e3" font-weight="600">INT PK</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="340" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  조회수 </tspan><tspan fill="#7ec8e3" font-weight="600">INT</tspan></text>
  <text x="340" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    DEFAULT</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="340" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  생성일 </tspan><tspan fill="#7ec8e3" font-weight="600">DATE</tspan></text>
  <text x="340" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    DEFAULT</tspan></text>
  <text x="340" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    CURRENT_DATE</tspan></text>
  <text x="340" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">);</tspan></text>
  <text x="440" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">생략 시 자동으로 0 삽입</text>
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">생성일 생략 시 오늘 날짜</text>

  <!-- CHECK -->
  <rect x="580" y="66" width="240" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="600" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">CHECK</text>
  <text x="600" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan></text>
  <text x="600" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  상품 (</tspan></text>
  <text x="600" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  ID  </tspan><tspan fill="#7ec8e3" font-weight="600">INT PK</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="600" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  가격 </tspan><tspan fill="#7ec8e3" font-weight="600">INT</tspan></text>
  <text x="600" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7777cc" font-weight="600">    CHECK</tspan></text>
  <text x="600" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    (가격 </tspan><tspan fill="#7ec8e3" font-weight="600">&gt;</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">),</tspan></text>
  <text x="600" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  등급 </tspan><tspan fill="#7ec8e3" font-weight="600">CHAR</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="600" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7777cc" font-weight="600">    CHECK</tspan><tspan fill="#ffffff"> (등급</tspan></text>
  <text x="600" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    IN</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ce9178">'A','B','C'</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="700" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">가격 0 이하 INSERT 거부</text>
  <text x="700" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">A,B,C 외 등급 거부</text>

  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">제약 위반 시 오류 코드 반환 — 트랜잭션 전체 롤백 or 해당 문장만 실패 (DBMS 설정에 따라)</text>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ALTER TABLE ADD CONSTRAINT로 기존 테이블에도 추가 가능 (기존 데이터 검증 포함)</text>
</svg>
