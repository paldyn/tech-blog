<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Promise &#xC870;&#xD569; API &#xBE44;&#xAD50;</text>

  <!-- Promise.all -->
  <rect x="50" y="68" width="370" height="170" rx="6" fill="#070b14" stroke="#55c555"/>
  <text x="235" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Promise.all</text>

  <text x="66" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">await Promise.all([p1, p2, p3])</text>

  <text x="66" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">&#xBAA8;&#xB450; fulfilled &#xC2DC; &#xBC30;&#xC5F4; &#xBC18;&#xD658;</text>
  <text x="66" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#xD558;&#xB098;&#xB77C;&#xB3C4; rejected &#xC2DC; &#xC989;&#xC2DC; rejected</text>
  <text x="66" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&#xBCD1;&#xB82C; &#xBCC0;&#xD658; &#xBC29;&#xC2DD;. &#xB2E8; &#xD558;&#xB098;&#xB77C;&#xB3C4; &#xC2E4;&#xD328;&#xD558;&#xBA74; &#xC804;&#xCCB4; &#xC2E4;&#xD328;</text>
  <text x="66" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">&#xC6A9;&#xB3C4;: &#xC5EC;&#xB7EC; API &#xBCD1;&#xB82C; &#xD638;&#xCD9C; (&#xBAA8;&#xB450; &#xD544;&#xC218;)</text>

  <!-- Promise.allSettled -->
  <rect x="460" y="68" width="370" height="170" rx="6" fill="#070b14" stroke="#7ec8e3"/>
  <text x="645" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Promise.allSettled</text>

  <text x="476" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">await Promise.allSettled([p1, p2, p3])</text>

  <text x="476" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">&#xBAA8;&#xB450; settled &#xB420; &#xB54C;&#xAE4C;&#xC9C0; &#xB300;&#xAE30;</text>
  <text x="476" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">&#xACB0;&#xACFC;: [{status, value/reason}] &#xBC30;&#xC5F4;</text>
  <text x="476" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&#xC808;&#xB300; rejected &#xB418;&#xC9C0; &#xC54A;&#xC74C;</text>
  <text x="476" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">&#xC6A9;&#xB3C4;: &#xC77C;&#xBD80; &#xC2E4;&#xD328; &#xD5C8;&#xC6A9;&#xD558;&#xBA74;&#xC11C; &#xC804;&#xCCB4; &#xACB0;&#xACFC; &#xD544;&#xC694;</text>

  <!-- Promise.race -->
  <rect x="50" y="262" width="370" height="170" rx="6" fill="#070b14" stroke="#e05555"/>
  <text x="235" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Promise.race</text>

  <text x="66" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">await Promise.race([p1, p2, p3])</text>

  <text x="66" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#xAC00;&#xC7A5; &#xBA3C;&#xC800; settled &#xB41C; &#xACB0;&#xACFC;&#xB9CC; &#xBC18;&#xD658;</text>
  <text x="66" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">&#xBA3C;&#xC800; rejected &#xC774;&#xBA74; &#xC804;&#xCCB4; rejected</text>
  <text x="66" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&#xB098;&#xBA38;&#xC9C0; &#xC608;&#xC57D;&#xC740; &#xACC4;&#xC18D; &#xC2E4;&#xD589; (&#xCDE8;&#xC18C; &#xBD88;&#xAC00;)</text>
  <text x="66" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">&#xC6A9;&#xB3C4;: &#xD0C0;&#xC784;&#xC544;&#xC6C3; &#xB808;&#xC774;&#xC2F1;</text>

  <!-- Promise.any -->
  <rect x="460" y="262" width="370" height="170" rx="6" fill="#070b14" stroke="#7777cc"/>
  <text x="645" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Promise.any</text>

  <text x="476" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">await Promise.any([p1, p2, p3])</text>

  <text x="476" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">&#xAC00;&#xC7A5; &#xBA3C;&#xC800; fulfilled &#xB41C; &#xAC12;&#xB9CC; &#xBC18;&#xD658;</text>
  <text x="476" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">&#xBAA8;&#xB450; rejected &#xC2DC; AggregateError</text>
  <text x="476" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&#xBAA8;&#xB450; &#xC2E4;&#xD328;&#xD574;&#xC57C; rejected</text>
  <text x="476" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">&#xC6A9;&#xB3C4;: &#xC5EC;&#xB7EC; &#xC18C;&#xC2A4; &#xC911; &#xD558;&#xB098;&#xB77C;&#xB3C4; &#xC131;&#xACF5;&#xD558;&#xBA74; &#xC644;&#xB8CC;</text>
</svg>
