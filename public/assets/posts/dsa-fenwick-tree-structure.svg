<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">펜윅 트리 (Binary Indexed Tree) 구조</text>

  <!-- Array indices label -->
  <text x="60" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인덱스 (1~8)</text>

  <!-- Array cells (values) -->
  <!-- i=1 -->
  <rect x="60" y="108" width="90" height="44" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="105" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">1</text>
  <!-- i=2 -->
  <rect x="160" y="108" width="90" height="44" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="205" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">2</text>
  <!-- i=3 -->
  <rect x="260" y="108" width="90" height="44" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="305" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">3</text>
  <!-- i=4 -->
  <rect x="360" y="108" width="90" height="44" rx="6" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="405" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">4</text>
  <!-- i=5 -->
  <rect x="460" y="108" width="90" height="44" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="505" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">5</text>
  <!-- i=6 -->
  <rect x="560" y="108" width="90" height="44" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="605" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">6</text>
  <!-- i=7 -->
  <rect x="660" y="108" width="90" height="44" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="705" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">7</text>
  <!-- i=8 -->
  <rect x="760" y="108" width="80" height="44" rx="6" fill="#2e2a1a" stroke="#6e6a3a" stroke-width="1.5"/>
  <text x="800" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c060" text-anchor="middle">8</text>

  <!-- Responsible range bars -->
  <!-- BIT[1] covers [1,1] -->
  <rect x="62" y="164" width="86" height="14" rx="3" fill="#7ec8e3" opacity="0.8"/>
  <!-- BIT[2] covers [1,2] -->
  <rect x="62" y="184" width="186" height="14" rx="3" fill="#55c555" opacity="0.8"/>
  <!-- BIT[3] covers [3,3] -->
  <rect x="262" y="164" width="86" height="14" rx="3" fill="#7ec8e3" opacity="0.8"/>
  <!-- BIT[4] covers [1,4] -->
  <rect x="62" y="204" width="386" height="14" rx="3" fill="#e05555" opacity="0.8"/>
  <!-- BIT[5] covers [5,5] -->
  <rect x="462" y="164" width="86" height="14" rx="3" fill="#7ec8e3" opacity="0.8"/>
  <!-- BIT[6] covers [5,6] -->
  <rect x="462" y="184" width="186" height="14" rx="3" fill="#55c555" opacity="0.8"/>
  <!-- BIT[7] covers [7,7] -->
  <rect x="662" y="164" width="86" height="14" rx="3" fill="#7ec8e3" opacity="0.8"/>
  <!-- BIT[8] covers [1,8] -->
  <rect x="62" y="224" width="776" height="14" rx="3" fill="#e8c060" opacity="0.8"/>

  <!-- Range labels -->
  <text x="105" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">[1,1]</text>
  <text x="155" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">[1,2]</text>
  <text x="305" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">[3,3]</text>
  <text x="255" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">[1,4]</text>
  <text x="505" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">[5,5]</text>
  <text x="555" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">[5,6]</text>
  <text x="705" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">[7,7]</text>
  <text x="450" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="700">[1,8]</text>

  <!-- lowbit explanation -->
  <text x="60" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">lowbit(i) = i &amp; (-i)</text>
  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">각 인덱스 i가 담당하는 구간의 크기 = lowbit(i)</text>

  <!-- Table: lowbit values -->
  <!-- Header -->
  <rect x="60" y="314" width="760" height="32" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="105" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">i=1</text>
  <text x="205" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">i=2</text>
  <text x="305" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">i=3</text>
  <text x="405" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">i=4</text>
  <text x="505" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">i=5</text>
  <text x="605" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">i=6</text>
  <text x="705" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">i=7</text>
  <text x="800" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">i=8</text>

  <rect x="60" y="346" width="760" height="32" rx="0" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="105" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">1 (1₂)</text>
  <text x="205" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">2 (10₂)</text>
  <text x="305" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">1 (11₂)</text>
  <text x="405" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">4 (100₂)</text>
  <text x="505" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">1 (101₂)</text>
  <text x="605" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">2 (110₂)</text>
  <text x="705" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">1 (111₂)</text>
  <text x="800" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">8 (1000₂)</text>

  <text x="60" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ lowbit(i) 크기</text>

  <!-- Legend -->
  <rect x="60" y="414" width="14" height="14" rx="2" fill="#7ec8e3" opacity="0.8"/>
  <text x="82" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구간 크기 1</text>
  <rect x="190" y="414" width="14" height="14" rx="2" fill="#55c555" opacity="0.8"/>
  <text x="212" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구간 크기 2</text>
  <rect x="320" y="414" width="14" height="14" rx="2" fill="#e05555" opacity="0.8"/>
  <text x="342" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구간 크기 4</text>
  <rect x="450" y="414" width="14" height="14" rx="2" fill="#e8c060" opacity="0.8"/>
  <text x="472" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구간 크기 8</text>

  <text x="60" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">update: i += lowbit(i) | query: i -= lowbit(i)  →  O(log n)</text>
</svg>
