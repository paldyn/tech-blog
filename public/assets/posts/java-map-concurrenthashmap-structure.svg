<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="acon" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ConcurrentHashMap — 버킷 단위 잠금</text>

  <!-- Java 7 Segment approach (left) -->
  <text x="200" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a020">Java 7 — Segment 분할 락</text>

  <rect x="60" y="96" width="280" height="170" rx="6" fill="#0d1420" stroke="#e8a020" stroke-width="1.5"/>
  <!-- Segment 0 -->
  <rect x="76" y="112" width="110" height="54" rx="4" fill="#1a1a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="131" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020">Segment[0]</text>
  <text x="131" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Lock + HashTable</text>
  <text x="131" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">b[0]~b[3]</text>

  <!-- Segment 1 -->
  <rect x="210" y="112" width="110" height="54" rx="4" fill="#1a1a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="265" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020">Segment[1]</text>
  <text x="265" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Lock + HashTable</text>
  <text x="265" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">b[4]~b[7]</text>

  <!-- Segment 2..n -->
  <rect x="76" y="184" width="244" height="36" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="198" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Segment[2] ... Segment[15]</text>

  <text x="200" y="245" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8a020">기본 동시성 = 16 (세그먼트 수)</text>
  <text x="200" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서로 다른 세그먼트 → 동시 쓰기 가능</text>

  <!-- Java 8+ Bucket CAS approach (right) -->
  <text x="630" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Java 8+ — 버킷 단위 synchronized</text>

  <rect x="460" y="96" width="360" height="170" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>

  <!-- Bucket 0: CAS (empty) -->
  <rect x="476" y="112" width="76" height="54" rx="4" fill="#0d1827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="514" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">b[0]</text>
  <text x="514" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">CAS 삽입</text>
  <text x="514" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(빈 버킷)</text>

  <!-- Bucket 1: synchronized (collision) -->
  <rect x="565" y="112" width="76" height="54" rx="4" fill="#0f1827" stroke="#55c555" stroke-width="2"/>
  <text x="603" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">b[1]</text>
  <text x="603" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">synchronized</text>
  <text x="603" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(체인 있음)</text>

  <!-- Bucket 2: free -->
  <rect x="654" y="112" width="76" height="54" rx="4" fill="#0d1827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="692" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">b[2]</text>
  <text x="692" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">CAS 삽입</text>
  <text x="692" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(빈 버킷)</text>

  <!-- Multiple buckets -->
  <rect x="476" y="184" width="254" height="36" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="603" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">b[3] ... b[n-1]</text>

  <text x="630" y="245" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">동시성 = 버킷 수 (사실상 무제한)</text>
  <text x="630" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">빈 버킷: lock-free CAS | 충돌 버킷: head node lock</text>

  <!-- Key differences box -->
  <rect x="60" y="286" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 동시성 안전 복합 연산</text>
  <text x="76" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">map.putIfAbsent(</text>
  <text x="213" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"key"</text>
  <text x="246" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">, value);          </text>
  <text x="436" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// atomic check-then-insert</text>
  <text x="76" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">map.computeIfAbsent(</text>
  <text x="227" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"key"</text>
  <text x="260" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">, k -&gt; expensive());  </text>
  <text x="436" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 없으면 한 번만 계산</text>
  <text x="76" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">map.merge(</text>
  <text x="152" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"key"</text>
  <text x="185" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">, </text>
  <text x="195" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">1</text>
  <text x="205" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">, Integer::sum);        </text>
  <text x="436" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 동시성 안전 카운터</text>
  <text x="76" y="380" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// size()는 근사값 — 정확한 count는 mappingCount() 사용</text>
  <text x="76" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">map.mappingCount();             </text>
  <text x="436" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// long — 2^31 이상 크기 지원</text>
</svg>
