<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Context + React.memo 조합 패턴</text>

  <!-- Pattern 1: Context with memo children -->
  <rect x="60" y="68" width="360" height="136" rx="8" fill="#0a1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">소비자를 React.memo로 보호</text>
  <rect x="76" y="104" width="328" height="86" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#9aa4b8">// Context 값이 바뀌면 memo도 리렌더됨에 주의</tspan></text>
  <text x="88" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#9aa4b8">// 하지만 해당 Context를 쓰지 않는 자식은 보호</tspan></text>
  <text x="88" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> ExpensiveChild = React.memo(() =&gt; {</tspan></text>
  <text x="88" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#9aa4b8">  // Context를 사용하지 않으므로 Context 변경 시 리렌더 없음</tspan></text>
  <text x="88" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> &lt;div&gt;비싼 컴포넌트&lt;/div&gt;;</tspan></text>

  <!-- Pattern 2: State + Dispatch split -->
  <rect x="460" y="68" width="360" height="136" rx="8" fill="#0a200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">상태 / 액션 Context 분리</text>
  <rect x="476" y="104" width="328" height="86" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="488" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#9aa4b8">// 상태 변경 시 StateContext 소비자만 리렌더</tspan></text>
  <text x="488" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#9aa4b8">// dispatch는 변경 없으므로 ActionContext 소비자 안전</tspan></text>
  <text x="488" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> StateCtx = createContext(</tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="488" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> ActionCtx = createContext(</tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">);  </tspan><tspan fill="#9aa4b8">// dispatch</tspan></text>
  <text x="488" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#9aa4b8">// dispatch는 useReducer가 보장하는 안정된 참조</tspan></text>

  <!-- Checklist -->
  <rect x="60" y="224" width="760" height="130" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Context 성능 최적화 체크리스트</text>
  <text x="80" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">1. value 객체를 useMemo로 안정화 — { a, b } 인라인 금지</text>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">2. 관심사가 다른 값은 Context 분리 — UserCtx, ThemeCtx 별도</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">3. 상태(state)와 액션(dispatch)을 별도 Context로 분리</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">4. Context를 사용하지 않는 무거운 자식은 React.memo 적용</text>
</svg>
