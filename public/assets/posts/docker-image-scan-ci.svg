<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CI 파이프라인에서 이미지 스캔</text>

  <!-- GitHub Actions workflow -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">.github/workflows/security-scan.yml</text>

  <rect x="60" y="88" width="760" height="292" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">name</text><text x="130" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" font-size="13" fill="#ffffff">: Security Scan</text>
  <text x="76" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">on</text><text x="104" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" font-size="13" fill="#ffffff">: [push]</text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">jobs</text><text x="118" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" font-size="13" fill="#ffffff">:</text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  trivy-scan:</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">    runs-on: ubuntu-latest</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">    steps:</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">      - uses: actions/checkout@v4</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">      - name: Build image</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">        run: docker build -t myapp:$&#123;&#123; github.sha &#125;&#125; .</text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">      - name: Trivy scan</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">        uses: aquasecurity/trivy-action@master</text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">        with</text><text x="148" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" font-size="13" fill="#ffffff">:</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">          image-ref: </text><text x="208" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" font-size="13" fill="#ce9178">'myapp:$&#123;&#123; github.sha &#125;&#125;'</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">          severity: </text><text x="194" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" font-size="13" fill="#ce9178">'CRITICAL,HIGH'</text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">          exit-code: </text><text x="208" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" font-size="13" fill="#b5cea8">'1'</text><text x="226" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" font-size="13" fill="#9aa4b8">  # 취약점 발견시 빌드 실패</text>

  <!-- bottom note -->
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">exit-code: '1'로 설정하면 CRITICAL/HIGH CVE 발견 시 CI 파이프라인을 중단한다</text>
</svg>
