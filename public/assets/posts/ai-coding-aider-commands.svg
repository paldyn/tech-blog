<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Aider 명령어 참조</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Aider CLI Commands &amp; Usage</text>

  <!-- Left: startup commands -->
  <text x="80" y="102" font-size="13" font-weight="600" fill="#55c555">시작 명령 패턴</text>
  <rect x="60" y="114" width="370" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 기본 시작 (GPT-4o)</text>
  <text x="76" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">$ aider</text>

  <text x="76" y="178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># Claude Sonnet 사용</text>
  <text x="76" y="196" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">$ aider --model claude-sonnet-4-6</text>

  <text x="76" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 파일 지정해서 시작</text>
  <text x="76" y="238" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">$ aider app/main.py app/auth.py</text>

  <text x="76" y="262" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># Architect 모드 (2-model)</text>
  <text x="76" y="280" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">$ aider --architect \</text>
  <text x="76" y="298" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">  --model claude-opus-4-7 \</text>
  <text x="76" y="316" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">  --editor-model claude-sonnet-4-6</text>

  <!-- Right: in-session commands -->
  <text x="456" y="102" font-size="13" font-weight="600" fill="#7ec8e3">세션 내 슬래시 커맨드</text>
  <rect x="440" y="114" width="380" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/add app/services/pay.py</text>
  <text x="685" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">파일 추가</text>
  <text x="456" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/drop app/old.py</text>
  <text x="621" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">파일 제거</text>
  <text x="456" y="176" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/ls</text>
  <text x="492" y="176" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">                 현재 컨텍스트 파일 목록</text>
  <text x="456" y="196" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/run pytest tests/</text>
  <text x="631" y="196" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">명령 실행</text>
  <text x="456" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/undo</text>
  <text x="510" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">             마지막 커밋 되돌리기</text>
  <text x="456" y="236" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/diff</text>
  <text x="510" y="236" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">             마지막 변경 diff 보기</text>
  <text x="456" y="256" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/ask 코드 설명해줘</text>
  <text x="456" y="276" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">              # 파일 수정 없이 질문만</text>
  <text x="456" y="296" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">/code 리팩토링해줘</text>
  <text x="456" y="316" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">              # 코드 수정 모드</text>

  <!-- .aider.conf.yml -->
  <text x="60" y="334" font-size="14" font-weight="600" fill="#e8e8e8">.aider.conf.yml — 프로젝트 설정</text>

  <rect x="60" y="350" width="760" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="368" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">model: claude-sonnet-4-6   auto-commits: true   dirty-commits: false</text>
  <text x="76" y="382" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">read: [README.md, ARCHITECTURE.md]   lint-cmd: ruff check {files}</text>

  <text x="60" y="396" font-size="12" fill="#555">* aider --no-auto-commits 옵션으로 자동 커밋 비활성화 가능 (수동 검토 후 커밋 원할 때)</text>
</svg>
