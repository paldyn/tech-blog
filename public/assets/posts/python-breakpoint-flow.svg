<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">breakpoint()와 PYTHONBREAKPOINT</text>

  <defs>
    <marker id="bparr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="92" width="240" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="122" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">코드에 한 줄</text>
  <text xml:space="preserve" x="180" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">breakpoint()</text>

  <line x1="300" y1="126" x2="356" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#bparr)"/>

  <rect x="360" y="92" width="260" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="122" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">PYTHONBREAKPOINT</text>
  <text x="490" y="146" font-size="12" fill="#9aa4b8" text-anchor="middle">환경변수가 디버거를 결정</text>

  <line x1="620" y1="126" x2="676" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#bparr)"/>

  <rect x="680" y="92" width="140" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="750" y="122" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">디버거 진입</text>
  <text x="750" y="146" font-size="12" fill="#9aa4b8" text-anchor="middle">(Pdb)</text>

  <rect x="60" y="190" width="370" height="40" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">기본값 → pdb 실행</text>

  <rect x="450" y="190" width="370" height="40" rx="4" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text xml:space="preserve" x="468" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=ipdb.set_trace → 다른 디버거</text>

  <rect x="60" y="244" width="760" height="40" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="269" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">PYTHONBREAKPOINT=0  → breakpoint()를 통째로 무시 (운영 배포 시 유용)</text>
</svg>
