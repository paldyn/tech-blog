<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">API 키 스코프 설계와 보안 속성</text>

  <!-- Scope design -->
  <text x="200" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">스코프 계층 구조</text>
  <text x="650" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">키 보안 속성</text>

  <!-- Scope boxes -->
  <rect x="60" y="88" width="280" height="40" rx="6" fill="#0d2e1a" stroke="#1a5e3a" stroke-width="2"/>
  <text x="200" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">read:* (전체 읽기)</text>

  <rect x="80" y="140" width="120" height="36" rx="6" fill="#0d1a2e" stroke="#1a3a5e" stroke-width="1"/>
  <text x="140" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">read:orders</text>

  <rect x="220" y="140" width="120" height="36" rx="6" fill="#0d1a2e" stroke="#1a3a5e" stroke-width="1"/>
  <text x="280" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">read:users</text>

  <rect x="60" y="190" width="280" height="40" rx="6" fill="#1a1a0d" stroke="#4a4a1a" stroke-width="2"/>
  <text x="200" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">write:orders</text>

  <rect x="60" y="244" width="280" height="40" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="2"/>
  <text x="200" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">admin:* (관리자 전용)</text>

  <text x="200" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최소 권한 원칙: 필요한 스코프만 부여</text>
  <text x="200" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파트너 통합: read:orders만 부여하면</text>
  <text x="200" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">침해 시 영향 범위 최소화</text>

  <!-- Security properties -->
  <rect x="460" y="88" width="360" height="46" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">접두사(Prefix): sk_live_, sk_test_</text>
  <text x="640" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">GitHub Secret Scanning이 키를 자동 탐지하도록</text>

  <rect x="460" y="144" width="360" height="46" rx="6" fill="#0d1a2e" stroke="#1a3a5e" stroke-width="1"/>
  <text x="640" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">IP 화이트리스트</text>
  <text x="640" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">특정 IP에서만 사용 가능한 키</text>

  <rect x="460" y="200" width="360" height="46" rx="6" fill="#1a1a0d" stroke="#4a4a1a" stroke-width="1"/>
  <text x="640" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">만료 시간</text>
  <text x="640" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">장기 키보다 단기 키가 노출 피해 최소화</text>

  <rect x="460" y="256" width="360" height="46" rx="6" fill="#1a0d1a" stroke="#4a1a4a" stroke-width="1"/>
  <text x="640" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">감사 로그</text>
  <text x="640" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">키별 사용 기록, 이상 패턴 탐지</text>

  <rect x="460" y="312" width="360" height="46" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="640" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">즉시 폐기</text>
  <text x="640" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">침해 감지 시 API 한 번으로 즉시 무효화</text>

  <!-- Bottom -->
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">API 키 != 비밀번호: 해시 저장(비밀번호), SHA-256 저장(API 키) — 비밀번호는 bcrypt/Argon2 필수</text>
</svg>
