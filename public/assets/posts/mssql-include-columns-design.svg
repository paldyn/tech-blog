<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커버링 인덱스 설계 원칙 — 열 배치 전략</text>

  <!-- Key columns box -->
  <rect x="60" y="72" width="350" height="120" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="2"/>
  <text x="235" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">키 열 (Key Columns)</text>
  <text x="235" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">모든 노드에 저장</text>
  <text x="235" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• WHERE 절 조건 열</text>
  <text x="235" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• JOIN 조건 열</text>
  <text x="235" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• ORDER BY 열</text>

  <!-- INCLUDE columns box -->
  <rect x="470" y="72" width="350" height="120" rx="8" fill="#111122" stroke="#55c555" stroke-width="2"/>
  <text x="645" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">포함 열 (INCLUDE Columns)</text>
  <text x="645" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">리프 노드에만 저장</text>
  <text x="645" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• SELECT 목록 열 (Key Lookup 방지)</text>
  <text x="645" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• 정렬·필터 불필요한 열</text>
  <text x="645" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• (MAX 타입도 허용)</text>

  <!-- Rule box: DO -->
  <rect x="60" y="218" width="350" height="100" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">✓ 올바른 설계</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">WHERE email  → 키: (email)</text>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SELECT name, phone → INCLUDE: (name, phone)</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인덱스 크기 최소화 + Key Lookup 제거</text>

  <!-- Rule box: DONT -->
  <rect x="470" y="218" width="350" height="100" rx="8" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="490" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">✗ 잘못된 설계</text>
  <text x="490" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">모든 열을 키에 넣는 것</text>
  <text x="490" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ON customers (email, name, phone)</text>
  <text x="490" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 노드에 복사 → 인덱스 크기 과다</text>

  <!-- Limits -->
  <rect x="60" y="340" width="760" height="76" rx="8" fill="#111120" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SQL Server 인덱스 제한</text>
  <text x="200" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">키 열: 최대 16개 · 합계 ≤ 900바이트</text>
  <text x="200" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(SQL 2016+ 900→1700 완화)</text>
  <text x="640" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">INCLUDE 열: 최대 1023개</text>
  <text x="640" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MAX 타입 포함 가능 (키는 불가)</text>
  <line x1="420" y1="352" x2="420" y2="414" stroke="#2a2a3e" stroke-width="1"/>
</svg>
