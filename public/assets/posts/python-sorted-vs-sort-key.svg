<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">key 매개변수 활용 패턴</text>

  <!-- Left: basic key examples -->
  <text x="70" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">기본 key 패턴</text>
  <rect x="60" y="88" width="370" height="260" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 문자열 길이로 정렬</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">words = [<tspan fill="#ce9178">"banana"</tspan>, <tspan fill="#ce9178">"apple"</tspan>, <tspan fill="#ce9178">"kiwi"</tspan>]</text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">sorted</tspan>(words, key=<tspan fill="#7ec8e3">len</tspan>)</text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># ['kiwi', 'apple', 'banana']</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 대소문자 무시 정렬</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">names = [<tspan fill="#ce9178">"Bob"</tspan>, <tspan fill="#ce9178">"alice"</tspan>, <tspan fill="#ce9178">"Charlie"</tspan>]</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">sorted</tspan>(names, key=str.lower)</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># ['alice', 'Bob', 'Charlie']</text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 역순 정렬</text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">sorted</tspan>(nums, reverse=<tspan fill="#7ec8e3">True</tspan>)</text>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># [5, 4, 3, 2, 1]</text>

  <!-- Right: attrgetter/itemgetter -->
  <text x="460" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#b5cea8">operator 모듈 활용</text>
  <rect x="450" y="88" width="370" height="260" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from operator <tspan fill="#7ec8e3">import</tspan> itemgetter</text>
  <text x="466" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"/>
  <text x="466" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">data = [</text>
  <text x="466" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    {<tspan fill="#ce9178">"name"</tspan>: <tspan fill="#ce9178">"Bob"</tspan>,   <tspan fill="#ce9178">"age"</tspan>: <tspan fill="#b5cea8">30</tspan>},</text>
  <text x="466" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    {<tspan fill="#ce9178">"name"</tspan>: <tspan fill="#ce9178">"Alice"</tspan>, <tspan fill="#ce9178">"age"</tspan>: <tspan fill="#b5cea8">25</tspan>},</text>
  <text x="466" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">]</text>
  <text x="466" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># age 기준 정렬</text>
  <text x="466" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">sorted</tspan>(data, key=itemgetter(<tspan fill="#ce9178">"age"</tspan>))</text>
  <text x="466" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># Alice(25), Bob(30)</text>
  <text x="466" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 다중 키: (age, name) 순서로</text>
  <text x="466" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">sorted</tspan>(data, key=itemgetter(<tspan fill="#ce9178">"age"</tspan>,<tspan fill="#ce9178">"name"</tspan>))</text>
  <text x="466" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 나이 같으면 이름 오름차순</text>

  <!-- Bottom warning -->
  <rect x="60" y="370" width="760" height="64" rx="8" fill="#1a0d0d" stroke="#e05555"/>
  <text x="80" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">흔한 실수 — sort()의 반환값을 변수에 저장</text>
  <text x="80" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">result = my_list.sort()  →  result 는 None! 정렬된 리스트가 아닙니다</text>
  <text x="80" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원본 보존이 필요하면 sorted()를, 원본만 바꾸면 .sort()를 사용하세요</text>
</svg>
