<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">self가 전달되는 원리</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">메서드 호출 시 Python이 첫 번째 인수로 인스턴스를 자동 전달</text>

  <!-- Call site -->
  <rect x="60" y="90" width="340" height="100" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">인스턴스 메서드 호출</text>
  <rect x="80" y="120" width="300" height="56" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="96" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">rex = Dog(</text>
  <text x="162" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"Rex"</text>
  <text x="196" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="96" y="160" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">rex.bark()</text>

  <!-- Arrow right -->
  <line x1="408" y1="145" x2="458" y2="145" stroke="#7777cc" stroke-width="2.5"/>
  <polygon points="458,139 472,145 458,151" fill="#7777cc"/>
  <text x="415" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Python</text>
  <text x="415" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">변환</text>

  <!-- Equivalent -->
  <rect x="480" y="90" width="340" height="100" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="500" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">내부적으로 동일</text>
  <rect x="500" y="120" width="300" height="56" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="516" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Dog.bark(rex)</text>
  <text x="516" y="160" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># rex가 self로 전달됨</text>

  <!-- Method definition -->
  <rect x="60" y="218" width="760" height="110" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">메서드 정의와 self 역할</text>
  <rect x="80" y="248" width="720" height="68" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="96" y="268" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">class </text>
  <text x="140" y="268" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Dog:</text>
  <text x="96" y="286" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="136" y="286" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">bark(</text>
  <text x="168" y="286" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">self</text>
  <text x="196" y="286" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">):  </text>
  <text x="230" y="286" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># self = 현재 인스턴스 참조</text>
  <text x="96" y="304" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="172" y="304" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">f"</text>
  <text x="184" y="304" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="192" y="304" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">self</text>
  <text x="220" y="304" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">.name} says Woof"</text>

  <!-- Three panels at bottom -->
  <rect x="60" y="350" width="230" height="82" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">self = 인스턴스 객체</text>
  <text x="80" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">self는 관례적 이름.</text>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">다른 이름도 동작하지만</text>
  <text x="80" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">PEP 8은 self 권장</text>

  <rect x="325" y="350" width="230" height="82" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="345" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">self.attr 접근</text>
  <text x="345" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">self를 통해 인스턴스</text>
  <text x="345" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">속성과 다른 메서드에</text>
  <text x="345" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">접근 가능</text>

  <rect x="590" y="350" width="230" height="82" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="610" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">명시적 전달의 철학</text>
  <text x="610" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Python은 암묵적 this</text>
  <text x="610" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">대신 명시적 self로</text>
  <text x="610" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가독성 극대화</text>
</svg>
