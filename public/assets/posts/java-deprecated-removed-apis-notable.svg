<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">주요 폐기·제거 API와 대체</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">레거시 코드에서 자주 마주치는 항목들</text>

  <!-- header row -->
  <rect x="50" y="94" width="290" height="40" rx="6" fill="#12141c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0b055">폐기·제거된 것</text>
  <rect x="350" y="94" width="220" height="40" rx="6" fill="#12141c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">대체</text>
  <rect x="580" y="94" width="250" height="40" rx="6" fill="#12141c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="600" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">사유</text>

  <!-- rows -->
  <text x="70" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">Thread.stop()</text>
  <text x="370" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">인터럽트·플래그</text>
  <text x="600" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">상태 훼손 위험</text>

  <text x="70" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">new Integer(x)</text>
  <text x="370" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Integer.valueOf</text>
  <text x="600" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">캐시 미활용</text>

  <text x="70" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">finalize()</text>
  <text x="370" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Cleaner · try-w-r</text>
  <text x="600" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">예측 불가·성능</text>

  <text x="70" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">Applet</text>
  <text x="370" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">웹 표준 기술</text>
  <text x="600" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">브라우저 지원 종료</text>

  <text x="70" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">SecurityManager</text>
  <text x="370" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">OS·컨테이너 격리</text>
  <text x="600" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">유지보수 곤란</text>

  <text x="70" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">Date/Calendar</text>
  <text x="370" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">java.time.*</text>
  <text x="600" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">가변·설계 결함</text>

  <line x1="50" y1="176" x2="830" y2="176" stroke="#1e2433" stroke-width="1"/>
  <line x1="50" y1="208" x2="830" y2="208" stroke="#1e2433" stroke-width="1"/>
  <line x1="50" y1="240" x2="830" y2="240" stroke="#1e2433" stroke-width="1"/>
  <line x1="50" y1="272" x2="830" y2="272" stroke="#1e2433" stroke-width="1"/>
  <line x1="50" y1="304" x2="830" y2="304" stroke="#1e2433" stroke-width="1"/>

  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">정확한 제거 버전은 버전마다 다르므로 JDK 릴리스 노트로 확인</text>
</svg>
