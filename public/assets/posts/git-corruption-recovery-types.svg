<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Git 저장소 손상 유형과 증상</text>

  <!-- Type 1 -->
  <rect x="60" y="68" width="360" height="120" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">객체 파일 손상</text>
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 디스크 오류, 전원 차단</text>
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 파일 내용이 SHA-1 해시와 불일치</text>
  <text x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">error: sha1 mismatch</text>
  <text x="80" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">error: inflate: data stream error</text>

  <!-- Type 2 -->
  <rect x="460" y="68" width="360" height="120" rx="8" fill="#1a0e0e" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8c84a" text-anchor="middle">누락된 객체</text>
  <text x="480" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 객체 파일 자체가 없음</text>
  <text x="480" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 참조(tree/commit)는 있으나 대상 없음</text>
  <text x="480" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8c84a">error: object file is empty</text>
  <text x="480" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8c84a">fatal: loose object is corrupt</text>

  <!-- Type 3 -->
  <rect x="60" y="210" width="360" height="120" rx="8" fill="#1a0e0e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">인덱스(index) 손상</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• .git/index 파일 손상</text>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• staging area 사용 불가</text>
  <text x="80" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc">error: index file corrupt</text>
  <text x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc">fatal: unable to read tree</text>

  <!-- Type 4 -->
  <rect x="460" y="210" width="360" height="120" rx="8" fill="#1a0e0e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">HEAD/refs 손상</text>
  <text x="480" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• HEAD 파일 비어 있거나 잘못됨</text>
  <text x="480" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 브랜치 ref 파일 손상</text>
  <text x="480" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">fatal: not a git repository</text>
  <text x="480" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">error: invalid ref</text>

  <!-- Diagnosis commands -->
  <rect x="60" y="350" width="760" height="88" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 진단 첫 단계: 오류 유형 파악</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fsck --full 2>&amp;1 | grep -v "^Checking\|^dangling"</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git status 2>&amp;1 | head -5</text>
</svg>
