<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">버그는 늦게 잡을수록 비싸다</text>
  <text x="60" y="72" font-size="13" fill="#888">상대 수정 비용 · 정적 분석은 검출 시점을 왼쪽으로 당긴다 (shift-left)</text>

  <!-- annotation bracket over early stages -->
  <line x1="80" y1="96" x2="322" y2="96" stroke="#55c555" stroke-width="2"/>
  <line x1="80" y1="96" x2="80" y2="104" stroke="#55c555" stroke-width="2"/>
  <line x1="322" y1="96" x2="322" y2="104" stroke="#55c555" stroke-width="2"/>
  <text x="201" y="90" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">정적 분석이 잡는 구간 — 가장 저렴</text>

  <!-- baseline -->
  <line x1="60" y1="320" x2="820" y2="320" stroke="#333" stroke-width="1"/>

  <!-- bars -->
  <rect x="80" y="290" width="90" height="30" rx="3" fill="#14240f" stroke="#55c555" stroke-width="1"/>
  <text x="125" y="283" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">1×</text>
  <text x="125" y="340" font-size="12" fill="#888" text-anchor="middle">작성 중 (IDE)</text>

  <rect x="232" y="265" width="90" height="55" rx="3" fill="#14240f" stroke="#55c555" stroke-width="1"/>
  <text x="277" y="258" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">3×</text>
  <text x="277" y="340" font-size="12" fill="#888" text-anchor="middle">커밋 전</text>

  <rect x="384" y="225" width="90" height="95" rx="3" fill="#2a2010" stroke="#e0a055" stroke-width="1"/>
  <text x="429" y="218" font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">10×</text>
  <text x="429" y="340" font-size="12" fill="#888" text-anchor="middle">CI</text>

  <rect x="536" y="170" width="90" height="150" rx="3" fill="#2a2010" stroke="#e0a055" stroke-width="1"/>
  <text x="581" y="163" font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">30×</text>
  <text x="581" y="340" font-size="12" fill="#888" text-anchor="middle">코드 리뷰</text>

  <rect x="688" y="90" width="90" height="230" rx="3" fill="#2a1414" stroke="#e05555" stroke-width="1"/>
  <text x="733" y="83" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">100×</text>
  <text x="733" y="340" font-size="12" fill="#888" text-anchor="middle">프로덕션</text>
</svg>
