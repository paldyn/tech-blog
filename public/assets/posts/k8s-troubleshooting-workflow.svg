<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="tw-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">진단 4종 세트 — 순서대로 던지는 질문</text>

  <!-- step boxes -->
  <rect x="40" y="100" width="190" height="100" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">1. get</text>
  <text x="135" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">무엇이 비정상?</text>
  <text x="135" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">상태 한눈에</text>

  <rect x="262" y="100" width="190" height="100" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="357" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">2. describe</text>
  <text x="357" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">왜 그 상태인가?</text>
  <text x="357" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Events 섹션</text>

  <rect x="484" y="100" width="190" height="100" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="579" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">3. logs</text>
  <text x="579" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">앱이 뭐라 하나?</text>
  <text x="579" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">--previous로 직전</text>

  <rect x="706" y="100" width="134" height="100" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="773" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">4. exec</text>
  <text x="773" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">안에서 직접</text>
  <text x="773" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">확인</text>

  <line x1="230" y1="150" x2="262" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tw-arr)"/>
  <line x1="452" y1="150" x2="484" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tw-arr)"/>
  <line x1="674" y1="150" x2="706" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tw-arr)"/>

  <!-- code box -->
  <rect x="40" y="230" width="800" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">kubectl get pods -o wide          <tspan fill="#9aa4b8"># 1) 상태·노드·재시작</tspan></text>
  <text x="60" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">kubectl describe pod &lt;pod&gt;        <tspan fill="#9aa4b8"># 2) 끝의 Events를 본다</tspan></text>
  <text x="60" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">kubectl logs &lt;pod&gt; --previous     <tspan fill="#9aa4b8"># 3) 크래시 직전 로그</tspan></text>
  <text x="60" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">kubectl exec -it &lt;pod&gt; -- sh      <tspan fill="#9aa4b8"># 4) 컨테이너 내부 점검</tspan></text>
</svg>
