<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">@contextmanager 실행 흐름</text>

  <!-- Generator function box -->
  <rect x="60" y="60" width="760" height="54" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">@contextmanager 데코레이터 적용</text>
  <text x="440" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">제너레이터 함수를 컨텍스트 매니저로 변환</text>

  <!-- Step 1 -->
  <line x1="440" y1="114" x2="440" y2="144" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="140" y="152" width="560" height="54" rx="8" fill="#0d2b1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">① with 진입: yield 앞 코드 실행</text>
  <text x="440" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자원 획득, 초기화 코드 실행 후 yield 에서 일시 정지</text>

  <!-- Step 2 -->
  <line x1="440" y1="206" x2="440" y2="236" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <rect x="140" y="244" width="560" height="54" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">② yield value → as 절에 바인딩</text>
  <text x="440" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">블록 본문이 실행되는 동안 여기서 대기</text>

  <!-- Step 3 -->
  <line x1="440" y1="298" x2="440" y2="328" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="140" y="336" width="560" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">③ with 탈출: yield 뒤 코드 실행</text>
  <text x="440" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자원 해제, 정리 코드 실행 (try/finally 권장)</text>

  <!-- Comparison note -->
  <rect x="60" y="412" width="380" height="50" rx="6" fill="#0d2b1a" stroke="#55c555" stroke-width="1"/>
  <text x="250" y="433" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">클래스 방식 vs @contextmanager</text>
  <text x="250" y="451" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">동일 기능, 클래스 없이 함수 하나로 구현 가능</text>

  <rect x="460" y="412" width="360" height="50" rx="6" fill="#2b0d1a" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="433" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">yield 는 정확히 한 번만</text>
  <text x="640" y="451" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">두 번 이상이면 RuntimeError 발생</text>
</svg>
