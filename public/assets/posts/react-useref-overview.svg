<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e08020"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useRef의 두 가지 용도</text>

  <!-- Left column: DOM 참조 -->
  <text x="220" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">① DOM 직접 참조</text>

  <rect x="70" y="108" width="300" height="56" rx="8" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">const inputRef = useRef(null)</text>
  <text x="220" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">초기값 null — DOM 연결 전</text>

  <!-- Arrow down -->
  <line x1="220" y1="166" x2="220" y2="198" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="240" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">&lt;input ref={inputRef} /&gt;</text>

  <rect x="70" y="202" width="300" height="56" rx="8" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">inputRef.current = &lt;input&gt; DOM</text>
  <text x="220" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">마운트 후 .current에 DOM 자동 연결</text>

  <rect x="70" y="290" width="300" height="56" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="220" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">inputRef.current.focus()</text>
  <text x="220" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">DOM 메서드 직접 호출 가능</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="360" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right column: 값 유지 -->
  <text x="660" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② 렌더 간 값 유지</text>

  <rect x="510" y="108" width="300" height="56" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">const timerRef = useRef(null)</text>
  <text x="660" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">리렌더 트리거 없이 값 저장</text>

  <rect x="510" y="202" width="300" height="56" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">timerRef.current = setTimeout(...)</text>
  <text x="660" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.current 변경 = 렌더 없음</text>

  <rect x="510" y="290" width="300" height="56" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="660" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">clearTimeout(timerRef.current)</text>
  <text x="660" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">다음 렌더에서 동일한 값 접근</text>
</svg>
