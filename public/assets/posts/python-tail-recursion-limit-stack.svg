<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">재귀 호출 스택 시각화</text>

  <!-- Call stack growing down -->
  <text x="200" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">재귀 (콜 스택 증가)</text>

  <rect x="80" y="96" width="240" height="44" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">factorial(5)</text>

  <rect x="80" y="152" width="240" height="44" rx="6" fill="#2a1515" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="179" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">factorial(4)</text>

  <rect x="80" y="208" width="240" height="44" rx="6" fill="#2a1c1c" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">factorial(3)</text>

  <rect x="80" y="264" width="240" height="44" rx="6" fill="#1e1010" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">factorial(2)</text>

  <rect x="80" y="320" width="240" height="44" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">factorial(1) → base</text>

  <!-- Stack depth label -->
  <text x="46" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">깊이</text>
  <text x="46" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">1</text>
  <text x="46" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">2</text>
  <text x="46" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">3</text>
  <text x="46" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">4</text>
  <text x="46" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">5</text>

  <!-- RecursionError -->
  <rect x="80" y="384" width="240" height="44" rx="6" fill="#3a0000" stroke="#ff4444" stroke-width="2"/>
  <text x="200" y="411" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ff4444" text-anchor="middle">RecursionError: depth 1001</text>

  <!-- Iteration side -->
  <text x="640" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">반복문 (스택 일정)</text>

  <rect x="460" y="96" width="360" height="270" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 반복문 버전 — 스택 O(1)</text>
  <text x="476" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> factorial_iter(n):</tspan>
  </text>
  <text x="476" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    result = </tspan>
    <tspan fill="#b5cea8">1</tspan>
  </text>
  <text x="476" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    while</tspan>
    <tspan fill="#ffffff"> n &gt; </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">:</tspan>
  </text>
  <text x="476" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        result *= n; n -= </tspan>
    <tspan fill="#b5cea8">1</tspan>
  </text>
  <text x="476" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ffffff"> result</tspan>
  </text>
  <text x="476" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 꼬리 재귀를 직접 TCO로 변환</text>
  <text x="476" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> factorial_tco(n, acc=</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">):</tspan>
  </text>
  <text x="476" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    while</tspan>
    <tspan fill="#ffffff"> n &gt; </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">:  </tspan>
    <tspan fill="#9aa4b8"># 재귀 대신 루프</tspan>
  </text>
  <text x="476" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        n, acc = n - </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">, acc * n</tspan>
  </text>
  <text x="476" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ffffff"> acc</tspan>
  </text>
  <text x="476" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># 1000000 이상도 OK</tspan>
  </text>

  <!-- limit note -->
  <rect x="80" y="406" width="760" height="36" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">CPython 기본 재귀 깊이 제한: 1000  |  sys.setrecursionlimit(n) 으로 변경 가능</text>
</svg>
