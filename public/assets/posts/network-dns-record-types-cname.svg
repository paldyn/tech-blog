<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CNAME과 A 레코드 연쇄 해석</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">CNAME은 최종적으로 A 레코드까지 따라가야 IP를 얻는다</text>

  <!-- Query start -->
  <rect x="40" y="92" width="150" height="46" rx="6" fill="#1a2a3a" stroke="#3a5a7a" stroke-width="1.5"/>
  <text x="115" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">브라우저</text>
  <text x="115" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">www 질의</text>

  <line x1="190" y1="115" x2="230" y2="115" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DNS resolver -->
  <rect x="230" y="92" width="150" height="46" rx="6" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="305" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0c055">해석기</text>
  <text x="305" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">캐시 없음</text>

  <line x1="380" y1="115" x2="420" y2="115" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>

  <!-- Auth NS -->
  <rect x="420" y="92" width="200" height="46" rx="6" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1.5"/>
  <text x="520" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">권위 NS</text>
  <text x="520" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">example.com zone</text>

  <!-- CNAME response -->
  <line x1="420" y1="130" x2="380" y2="160" stroke="#e0c055" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- CNAME record box -->
  <rect x="40" y="175" width="760" height="46" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="193" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0c055" xml:space="preserve" font-weight="600">www.example.com.  CNAME</text>
  <text x="440" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">                         cdn.provider.net.</text>
  <text x="440" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CNAME 응답 → 해석기가 cdn.provider.net의 A 레코드 추가 조회</text>

  <!-- Second lookup -->
  <line x1="305" y1="221" x2="305" y2="250" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="252" width="150" height="46" rx="6" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="305" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0c055">해석기</text>
  <text x="305" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">cdn.provider.net 조회</text>

  <line x1="380" y1="275" x2="420" y2="275" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>

  <rect x="420" y="252" width="200" height="46" rx="6" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="520" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">provider NS</text>
  <text x="520" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">cdn.provider.net zone</text>

  <!-- A record response -->
  <rect x="40" y="318" width="760" height="46" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="336" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve" font-weight="600">cdn.provider.net.  A</text>
  <text x="440" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">                     104.21.23.145</text>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">최종 A 레코드 → 클라이언트에 IP 104.21.23.145 반환</text>
</svg>
