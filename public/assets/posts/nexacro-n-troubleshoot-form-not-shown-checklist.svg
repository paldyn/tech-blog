<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-ok" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-ng" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">폼 미표시 진단 흐름</text>

  <!-- Step 1 -->
  <rect x="280" y="62" width="320" height="44" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="79" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">콘솔·트레이스 로그 확인</text>
  <text x="440" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Nexacro Studio > 출력 창 > 오류 메시지?</text>

  <line x1="440" y1="106" x2="440" y2="132" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="280" y="134" width="320" height="44" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">폼 파일 경로 확인</text>
  <text x="440" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">TypeDefinition 경로 vs 실제 파일 위치</text>

  <line x1="440" y1="178" x2="440" y2="204" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: diamond -->
  <polygon points="440,206 540,236 440,266 340,236" fill="#1e1505" stroke="#e0a030" stroke-width="1.5"/>
  <text x="440" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a030">visibility?</text>

  <!-- visible=hidden -->
  <line x1="340" y1="236" x2="180" y2="236" stroke="#e05555" stroke-width="2" marker-end="url(#arr-ng)"/>
  <text x="258" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">hidden</text>
  <rect x="60" y="218" width="120" height="36" rx="5" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="120" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">visible 수정</text>

  <!-- visible=true -->
  <line x1="540" y1="236" x2="700" y2="236" stroke="#55c555" stroke-width="2" marker-end="url(#arr-ok)"/>
  <text x="618" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">visible</text>

  <!-- Step 4 -->
  <rect x="700" y="218" width="120" height="36" rx="5" fill="#0d2b1e" stroke="#55c555" stroke-width="1"/>
  <text x="760" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">z-order 확인</text>

  <line x1="440" y1="266" x2="440" y2="292" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="280" y="294" width="320" height="44" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">onload 에러 여부</text>
  <text x="440" y="329" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">onload 내 JS 오류 → 렌더 중단 확인</text>

  <line x1="440" y1="338" x2="440" y2="364" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 6 -->
  <rect x="280" y="366" width="320" height="44" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">컨테이너 크기 확인</text>
  <text x="440" y="401" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">부모 Div·Form 크기가 0이면 자식도 숨겨짐</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">위 단계를 순서대로 확인하면 대부분의 미표시 원인을 파악할 수 있다</text>
</svg>
