<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일 업로드 공격 벡터와 방어</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">악성 파일 업로드의 주요 공격 경로와 방어 레이어</text>

  <!-- Attack vectors left column -->
  <rect x="40" y="100" width="240" height="70" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">웹쉘 업로드</text>
  <text x="160" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">shell.php, cmd.jsp 실행</text>
  <text x="160" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Remote Code Execution</text>

  <rect x="40" y="190" width="240" height="70" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">MIME 타입 위조</text>
  <text x="160" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">image.php → image/jpeg 위장</text>
  <text x="160" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Content-Type Spoofing</text>

  <rect x="40" y="280" width="240" height="70" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">경로 탈출 + 덮어쓰기</text>
  <text x="160" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">../../../etc/cron.d/hack</text>
  <text x="160" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Path Traversal</text>

  <!-- Center: arrows -->
  <line x1="280" y1="135" x2="318" y2="215" stroke="#e05555" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <line x1="280" y1="225" x2="318" y2="225" stroke="#e05555" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <line x1="280" y1="315" x2="318" y2="235" stroke="#e05555" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <!-- Defense center -->
  <rect x="320" y="170" width="240" height="114" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">파일 업로드 검증</text>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">매직 바이트 검사</text>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">확장자 Allowlist</text>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">파일명 UUID 재생성</text>
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">크기 제한 · AV 스캔</text>

  <!-- Defense outputs -->
  <line x1="560" y1="215" x2="598" y2="135" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="560" y1="227" x2="598" y2="225" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="560" y1="239" x2="598" y2="315" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Defense boxes right -->
  <rect x="600" y="100" width="240" height="70" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">격리된 스토리지</text>
  <text x="720" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">S3 / GCS + CDN 서빙</text>
  <text x="720" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">앱 서버와 분리</text>

  <rect x="600" y="190" width="240" height="70" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">콘텐츠 변환</text>
  <text x="720" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">이미지 재인코딩 (pillow)</text>
  <text x="720" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">악성 페이로드 제거</text>

  <rect x="600" y="280" width="240" height="70" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Content-Disposition</text>
  <text x="720" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">attachment 강제</text>
  <text x="720" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">브라우저 렌더링 차단</text>

  <!-- Bottom bar -->
  <rect x="40" y="394" width="800" height="40" rx="6" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">업로드된 파일은 절대 웹 루트에 저장하지 않는다 — 앱 서버와 완전히 분리된 스토리지 사용</text>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Never serve uploaded files from the same server</text>
</svg>
