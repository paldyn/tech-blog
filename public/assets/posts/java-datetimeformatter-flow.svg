<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">format과 parse — 양방향 변환</text>

  <!-- Object box -->
  <rect x="60" y="120" width="230" height="80" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="175" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">LocalDateTime</text>
  <text x="175" y="174" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">2026-06-12T14:30</text>

  <!-- Formatter box (center) -->
  <rect x="330" y="108" width="220" height="104" rx="8" fill="#111" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="440" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">DateTimeFormatter</text>
  <text x="440" y="160" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">"yyyy-MM-dd HH:mm"</text>
  <text x="440" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">불변 · 스레드 안전</text>

  <!-- String box -->
  <rect x="590" y="120" width="230" height="80" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="705" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">String</text>
  <text x="705" y="174" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">"2026-06-12 14:30"</text>

  <!-- format arrow (top, left to right) -->
  <path d="M 240 116 C 320 70, 560 70, 656 116" fill="none"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="440" y="66" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">dt.format(formatter)</text>

  <!-- parse arrow (bottom, right to left) -->
  <path d="M 640 204 C 560 250, 320 250, 224 204" fill="none"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="440" y="266" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">LocalDateTime.parse(str, formatter)</text>

  <!-- Bottom note -->
  <rect x="60" y="300" width="760" height="64" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">SimpleDateFormat과 달리 불변이므로 static final 상수로 안전하게 공유</text>
  <text x="440" y="348" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">static final DateTimeFormatter FMT = DateTimeFormatter.ofPattern("...");</text>
</svg>
