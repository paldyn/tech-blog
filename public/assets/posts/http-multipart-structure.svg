<svg xmlns="http://www.w3.org/2000/svg" width="880" height="620" viewBox="0 0 880 620" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="620" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">multipart/form-data 본문 구조</text>
  <text x="60" y="80" font-size="13" fill="#888">boundary로 part를 나누고, 각 part는 자체 헤더 + 본문을 가진다</text>

  <!-- Header code box -->
  <rect x="60" y="100" width="760" height="74" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">POST</tspan> /upload <tspan fill="#7ec8e3" font-weight="600">HTTP/1.1</tspan></text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">Content-Type:</tspan> multipart/form-data;</text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    boundary=<tspan fill="#ce9178">----X7MA4YWxkTrZu0gW</tspan></text>

  <!-- Text field part -->
  <rect x="60" y="194" width="760" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    ----X7MA4YWxkTrZu0gW   <tspan fill="#9aa4b8"># part 시작</tspan></text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">Content-Disposition:</tspan> form-data;</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    name=<tspan fill="#ce9178">"title"</tspan></text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">                <tspan fill="#9aa4b8"># 빈 줄 뒤 값</tspan></text>
  <text x="690" y="220" font-size="13" fill="#55c555">텍스트 필드</text>

  <!-- File part -->
  <rect x="60" y="306" width="760" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    ----X7MA4YWxkTrZu0gW</text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">Content-Disposition:</tspan> form-data;</text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    name=<tspan fill="#ce9178">"avatar"</tspan>; filename=<tspan fill="#ce9178">"me.png"</tspan></text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">Content-Type:</tspan> image/png</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">                <tspan fill="#9aa4b8"># 빈 줄</tspan></text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">    \x89PNG\r\n\x1a\n\x00\x00...</text>
  <text x="76" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">                <tspan fill="#9aa4b8"># 바이너리 원본</tspan></text>
  <text x="700" y="332" font-size="13" fill="#7ec8e3">파일 part</text>

  <!-- Closing boundary -->
  <rect x="60" y="478" width="760" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="502" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    ----X7MA4YWxkTrZu0gW<tspan fill="#e05555" font-weight="600">--</tspan></text>
  <text x="76" y="522" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    <tspan fill="#9aa4b8"># 끝의 -- 가 본문 종료 표시</tspan></text>
  <text x="640" y="502" font-size="13" fill="#e05555">closing boundary</text>

  <text x="60" y="580" font-size="13" fill="#888">각 줄 끝은 CRLF(\r\n), boundary 앞에는 -- 가 붙는다 (RFC 7578)</text>
</svg>
