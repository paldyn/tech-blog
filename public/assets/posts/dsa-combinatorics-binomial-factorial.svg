<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrB4" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">nCr mod p 파이프라인: 전처리 O(n) + 쿼리 O(1)</text>

  <!-- step 1 -->
  <rect x="60" y="96" width="560" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">1. 팩토리얼 테이블 — O(n)</text>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">fact[i] = fact[i-1] · i % p</text>

  <!-- step 2 -->
  <rect x="60" y="188" width="560" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">2. 역원은 마지막 하나만 거듭제곱 — O(log p)</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">inv_fact[n] = pow(fact[n], p-2, p)</text>

  <!-- step 3 -->
  <rect x="60" y="280" width="560" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">3. 역순으로 전파 — O(n)</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">inv_fact[i-1] = inv_fact[i] · i % p</text>

  <!-- step 4 -->
  <rect x="60" y="372" width="560" height="64" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
  <text x="76" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">4. 쿼리 — O(1)</text>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">nCr = fact[n] · inv_fact[r] % p · inv_fact[n-r] % p</text>

  <!-- arrows -->
  <line x1="340" y1="160" x2="340" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB4)"/>
  <line x1="340" y1="252" x2="340" y2="278" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB4)"/>
  <line x1="340" y1="344" x2="340" y2="370" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB4)"/>

  <!-- complexity box -->
  <rect x="660" y="188" width="160" height="156" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="676" y="222" fill="#9aa4b8">전처리</text>
    <text x="676" y="250" fill="#ffffff" font-weight="600">O(n + log p)</text>
    <text x="676" y="290" fill="#9aa4b8">쿼리 1회</text>
    <text x="676" y="318" fill="#55c555" font-weight="600">O(1)</text>
  </g>
</svg>
