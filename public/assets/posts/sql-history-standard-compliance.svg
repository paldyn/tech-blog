<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DBMS별 SQL 표준 준수 현황</text>

  <!-- Header row -->
  <rect x="60" y="65" width="760" height="36" rx="4" fill="#131320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">DBMS</text>
  <text x="340" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">기반 표준</text>
  <text x="510" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">준수 수준</text>
  <text x="700" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">방언(Dialect) 특이사항</text>

  <!-- Data rows -->
  <rect x="60" y="101" width="760" height="36" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="170" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">PostgreSQL</text>
  <text x="340" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">SQL:2016+</text>
  <text x="510" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">매우 높음</text>
  <text x="700" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">SERIAL, $1 바인딩</text>

  <rect x="60" y="137" width="760" height="36" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="170" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">Oracle</text>
  <text x="340" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">SQL:2003+</text>
  <text x="510" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">높음</text>
  <text x="700" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">ROWNUM, NVL, CONNECT BY</text>

  <rect x="60" y="173" width="760" height="36" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="170" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">MySQL / MariaDB</text>
  <text x="340" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">SQL:2003 일부</text>
  <text x="510" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">중간</text>
  <text x="700" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">AUTO_INCREMENT, LIMIT n</text>

  <rect x="60" y="209" width="760" height="36" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="170" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">SQL Server</text>
  <text x="340" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">SQL:2008+</text>
  <text x="510" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">높음</text>
  <text x="700" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">TOP n, IDENTITY, T-SQL</text>

  <rect x="60" y="245" width="760" height="36" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="170" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">SQLite</text>
  <text x="340" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">SQL-92 대부분</text>
  <text x="510" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178" text-anchor="middle">낮음~중간</text>
  <text x="700" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">동적 타입, FK 기본 비활성</text>

  <!-- Note -->
  <rect x="60" y="300" width="760" height="40" rx="6" fill="#131310" stroke="#4a4a1a" stroke-width="1"/>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 DBMS는 SQL 표준의 핵심 기능(SELECT/INSERT/UPDATE/DELETE/JOIN)은 거의 동일하게 지원한다.</text>
  <text x="440" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">차이는 고급 기능과 방언(dialect)에서 발생하므로 이식성을 위해 표준 SQL을 우선 작성하는 습관이 중요하다.</text>
</svg>
