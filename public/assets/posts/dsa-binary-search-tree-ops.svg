<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BST 삽입·삭제 연산</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">삽입은 간단, 삭제는 3가지 케이스로 분류</text>

    <!-- Left: Insert -->
    <text x="200" y="100" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">삽입 (insert 45)</text>
    <text x="200" y="116" font-size="12" fill="#888" text-anchor="middle">50&gt;45→왼쪽, 30&lt;45→오른쪽, 40&lt;45→오른쪽, 빈자리</text>

    <!-- BST: 50(30(20,40),70) → insert 45 after 40's right -->
    <circle cx="200" cy="155" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="200" y="161" font-size="14" fill="#e8e8e8" text-anchor="middle">50</text>
    <circle cx="130" cy="220" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="130" y="226" font-size="14" fill="#e8e8e8" text-anchor="middle">30</text>
    <circle cx="270" cy="220" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="270" y="226" font-size="14" fill="#e8e8e8" text-anchor="middle">70</text>
    <circle cx="90" cy="285" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="90" y="291" font-size="14" fill="#e8e8e8" text-anchor="middle">20</text>
    <circle cx="170" cy="285" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="170" y="291" font-size="14" fill="#e8e8e8" text-anchor="middle">40</text>
    <!-- New node 45 -->
    <circle cx="210" cy="350" r="22" fill="#0d2a1e" stroke="#55c555" stroke-width="2.5"/>
    <text x="210" y="356" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">45</text>

    <line x1="187" y1="174" x2="143" y2="202" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="213" y1="174" x2="257" y2="202" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="118" y1="236" x2="101" y2="267" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="142" y1="236" x2="157" y2="267" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="183" y1="301" x2="198" y2="332" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>

    <text x="235" y="352" font-size="11" fill="#55c555">← 삽입!</text>

    <!-- Right: Delete cases -->
    <text x="620" y="100" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">삭제 케이스 3가지</text>

    <!-- Case 1: leaf -->
    <rect x="465" y="115" width="380" height="60" fill="#0d1520" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="480" y="138" font-size="13" font-weight="600" fill="#7ec8e3">케이스 1: 리프 노드</text>
    <text x="480" y="158" font-size="12" fill="#888">자식 없음 → 그냥 제거</text>

    <!-- Case 2: one child -->
    <rect x="465" y="185" width="380" height="60" fill="#0d1520" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="480" y="208" font-size="13" font-weight="600" fill="#55c555">케이스 2: 자식 1개</text>
    <text x="480" y="228" font-size="12" fill="#888">자식을 노드 자리로 올림 (bypass)</text>

    <!-- Case 3: two children -->
    <rect x="465" y="255" width="380" height="80" fill="#0d1520" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="480" y="278" font-size="13" font-weight="600" fill="#ce9178">케이스 3: 자식 2개 (가장 복잡)</text>
    <text x="480" y="298" font-size="12" fill="#888">후계자(successor) = 오른쪽 서브트리 최솟값</text>
    <text x="480" y="316" font-size="12" fill="#888">또는 선행자(predecessor) = 왼쪽 서브트리 최댓값</text>
    <text x="480" y="332" font-size="12" fill="#ce9178">노드 값을 후계자로 교체 후 후계자 삭제</text>

    <!-- Code block -->
    <rect x="60" y="390" width="760" height="34" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="80" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 후계자: node.right 에서 계속 left 로 내려가면 최솟값</text>
    <text x="80" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">                                                              </text>
  </g>
</svg>
