<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">절대 경로 vs 상대 경로</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">절대 경로는 / 에서 출발, 상대 경로는 현재 위치에서 출발</text>

  <!-- File tree -->
  <text x="340" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">디렉터리 구조</text>
  <!-- / -->
  <rect x="390" y="112" width="100" height="28" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">/</text>

  <!-- / to /home, /etc -->
  <line x1="415" y1="140" x2="280" y2="168" stroke="#444" stroke-width="1"/>
  <line x1="465" y1="140" x2="600" y2="168" stroke="#444" stroke-width="1"/>

  <!-- /home -->
  <rect x="230" y="168" width="100" height="28" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="280" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">home</text>
  <!-- /etc -->
  <rect x="550" y="168" width="100" height="28" fill="#1a1a2e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="600" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">etc</text>

  <!-- /home to /home/alice, /home/bob -->
  <line x1="260" y1="196" x2="180" y2="224" stroke="#444" stroke-width="1"/>
  <line x1="300" y1="196" x2="380" y2="224" stroke="#444" stroke-width="1"/>

  <!-- /home/alice -->
  <rect x="130" y="224" width="100" height="28" fill="#0f2a0f" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="180" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">alice</text>
  <!-- /home/bob -->
  <rect x="330" y="224" width="100" height="28" fill="#1a1a2e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="380" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">bob</text>

  <!-- /home/alice to docs, .bashrc -->
  <line x1="160" y1="252" x2="120" y2="280" stroke="#444" stroke-width="1"/>
  <line x1="200" y1="252" x2="240" y2="280" stroke="#444" stroke-width="1"/>

  <!-- /home/alice/docs -->
  <rect x="70" y="280" width="100" height="28" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">docs</text>
  <!-- /home/alice/.bashrc -->
  <rect x="190" y="280" width="100" height="28" fill="#1a1a2e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="240" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">.bashrc</text>

  <!-- /home/alice/docs to report.txt -->
  <line x1="120" y1="308" x2="120" y2="336" stroke="#444" stroke-width="1"/>
  <rect x="70" y="336" width="100" height="28" fill="#1a1a2e" rx="6" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="120" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8c55a" text-anchor="middle">report.txt</text>

  <!-- Current location marker -->
  <text x="180" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">← PWD</text>

  <!-- Absolute path label -->
  <line x1="390" y1="350" x2="390" y2="126" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="460" y="316" width="340" height="72" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">절대 경로</text>
  <text x="476" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">/home/alice/docs/report.txt</text>
  <text x="476" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 항상 / 에서 시작</text>

  <!-- Relative path label -->
  <rect x="460" y="400" width="340" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">상대 경로 (PWD=/home/alice)</text>
  <text x="476" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">docs/report.txt</text>
</svg>
