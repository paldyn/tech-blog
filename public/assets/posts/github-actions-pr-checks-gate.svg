<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">PR 검사가 머지를 게이팅한다</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">PR이 열리면 검사가 돌고, 모두 통과해야 머지가 열린다</text>

  <!-- PR -->
  <rect x="56" y="160" width="160" height="80" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="136" y="195" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">PR 열림</text>
  <text x="136" y="217" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">push 트리거</text>

  <line x1="216" y1="200" x2="284" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Checks stack -->
  <rect x="290" y="116" width="280" height="44" rx="8" fill="#101010" stroke="#55c555" stroke-width="1.3"/>
  <text x="312" y="143"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ build</text>
  <rect x="290" y="166" width="280" height="44" rx="8" fill="#101010" stroke="#55c555" stroke-width="1.3"/>
  <text x="312" y="193"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ test</text>
  <rect x="290" y="216" width="280" height="44" rx="8" fill="#101010" stroke="#55c555" stroke-width="1.3"/>
  <text x="312" y="243"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ lint</text>
  <rect x="290" y="266" width="280" height="44" rx="8" fill="#101010" stroke="#e05555" stroke-width="1.3"/>
  <text x="312" y="293"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ coverage  (실패 시 차단)</text>

  <line x1="570" y1="200" x2="638" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Merge -->
  <rect x="644" y="160" width="180" height="80" rx="10" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="734" y="195" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">Merge 가능</text>
  <text x="734" y="217" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 필수 검사 통과</text>

  <text x="440" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#888">하나라도 실패하거나 대기 중이면 머지 버튼은 비활성 상태로 막힌다</text>
</svg>
