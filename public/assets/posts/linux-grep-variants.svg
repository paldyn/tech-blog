<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">grep / egrep / fgrep 비교</text>

  <!-- grep -->
  <rect x="60" y="75" width="230" height="150" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="100" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3">grep</text>
  <text x="80" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">BRE (기본 정규식)</text>
  <text x="80" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">. * ^ $ [] \(\) \{\}</text>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">grep <tspan fill="#ce9178">'a\{2,4\}'</tspan> f</text>
  <text x="80" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">= grep -G</text>

  <!-- egrep -->
  <rect x="325" y="75" width="230" height="150" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#55c555">egrep</text>
  <text x="345" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">ERE (확장 정규식)</text>
  <text x="345" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">+ ? | () {} 추가</text>
  <text x="345" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">egrep <tspan fill="#ce9178">'a{2,4}'</tspan> f</text>
  <text x="345" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">= grep -E</text>

  <!-- fgrep -->
  <rect x="590" y="75" width="230" height="150" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="705" y="100" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e05555">fgrep</text>
  <text x="610" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Fixed string (고정 문자열)</text>
  <text x="610" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">정규식 해석 없음, 더 빠름</text>
  <text x="610" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">fgrep <tspan fill="#ce9178">'a.b*c'</tspan> f</text>
  <text x="610" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">= grep -F</text>

  <!-- Options table -->
  <rect x="60" y="250" width="760" height="106" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">주요 옵션</text>
  <text x="80" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">-i 대소문자 무시  -v 반전(불일치)  -n 라인번호  -c 카운트  -l 파일명만</text>
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">-r 재귀  -A N 이후N줄  -B N 이전N줄  -C N 앞뒤N줄  --color 색상강조</text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">-o 매칭부분만  -w 단어경계  -x 전체줄일치  -q 조용히(종료코드만)</text>
</svg>
