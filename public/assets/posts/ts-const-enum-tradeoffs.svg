<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">const enum 트레이드오프</text>

  <!-- Table header -->
  <rect x="60" y="64" width="760" height="36" rx="4" fill="#111827"/>
  <text x="180" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">항목</text>
  <text x="460" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">const enum</text>
  <text x="720" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">일반 enum</text>

  <!-- Column separators in header -->
  <line x1="310" y1="64" x2="310" y2="100" stroke="#333" stroke-width="1"/>
  <line x1="600" y1="64" x2="600" y2="100" stroke="#333" stroke-width="1"/>

  <!-- ROW 1: 번들 크기 -->
  <rect x="60" y="100" width="760" height="56" rx="0" fill="#0f0f0f"/>
  <rect x="60" y="100" width="760" height="56" rx="0" fill="none" stroke="#1e2433" stroke-width="1"/>
  <text x="180" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">번들 크기</text>
  <text x="180" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">Bundle Size</text>
  <!-- const enum: good -->
  <rect x="330" y="112" width="250" height="32" rx="4" fill="#0a1a0a"/>
  <text x="455" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle" xml:space="preserve">✓ 작음 (인라인)</text>
  <!-- regular enum: neutral -->
  <rect x="618" y="112" width="182" height="32" rx="4" fill="#111"/>
  <text x="709" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">△ enum 객체 포함</text>

  <!-- Row separator -->
  <line x1="60" y1="156" x2="820" y2="156" stroke="#1e2433" stroke-width="1"/>

  <!-- ROW 2: 런타임 조회 -->
  <rect x="60" y="156" width="760" height="56" rx="0" fill="#0a0a0a"/>
  <rect x="60" y="156" width="760" height="56" rx="0" fill="none" stroke="#1e2433" stroke-width="1"/>
  <text x="180" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">런타임 조회</text>
  <text x="180" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">Reverse Mapping</text>
  <!-- const enum: bad -->
  <rect x="330" y="168" width="250" height="32" rx="4" fill="#1a0a0a"/>
  <text x="455" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle" xml:space="preserve">✗ 불가</text>
  <!-- regular enum: good -->
  <rect x="618" y="168" width="182" height="32" rx="4" fill="#0a1a0a"/>
  <text x="709" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓ 가능 (역방향 매핑)</text>

  <!-- Row separator -->
  <line x1="60" y1="212" x2="820" y2="212" stroke="#1e2433" stroke-width="1"/>

  <!-- ROW 3: isolatedModules -->
  <rect x="60" y="212" width="760" height="56" rx="0" fill="#0f0f0f"/>
  <rect x="60" y="212" width="760" height="56" rx="0" fill="none" stroke="#1e2433" stroke-width="1"/>
  <text x="180" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">isolatedModules</text>
  <text x="180" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">Babel / esbuild / SWC</text>
  <!-- const enum: bad -->
  <rect x="330" y="224" width="250" height="32" rx="4" fill="#1a0a0a"/>
  <text x="455" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle" xml:space="preserve">✗ 비호환</text>
  <!-- regular enum: good -->
  <rect x="618" y="224" width="182" height="32" rx="4" fill="#0a1a0a"/>
  <text x="709" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓ 호환</text>

  <!-- Bottom border of table -->
  <rect x="60" y="64" width="760" height="204" rx="4" fill="none" stroke="#2a3a5e" stroke-width="1.5"/>

  <!-- Column separators in body -->
  <line x1="310" y1="100" x2="310" y2="268" stroke="#1e2433" stroke-width="1"/>
  <line x1="600" y1="100" x2="600" y2="268" stroke="#1e2433" stroke-width="1"/>

  <!-- Note box -->
  <rect x="60" y="288" width="760" height="52" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">⚠  isolatedModules: true 환경 (Babel, esbuild, SWC)에서는 const enum 사용 불가</text>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle" xml:space="preserve">각 파일을 독립적으로 트랜스파일하므로 다른 파일의 const enum 값을 인라인할 수 없음</text>
</svg>
