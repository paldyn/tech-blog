<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">args 실전 활용 사례</text>

  <!-- Case 1: Delete -->
  <rect x="60" y="68" width="360" height="140" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">단건 삭제 — PK 값 전달</text>
  <rect x="78" y="108" width="324" height="84" fill="#070b14" rx="4" stroke="#1e2433"/>
  <text x="94" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">var</text>
  <text x="115" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> empNo = this.dsMain.getColumn(</text>
  <text x="94" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    this.dsMain.rowposition, </text>
  <text x="284" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"EMP_NO"</text>
  <text x="333" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="94" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">this.transaction(</text>
  <text x="94" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "SVC_DEL", "SVC_EMP::delete",</text>
  <text x="94" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "", "", "empNo="</text>
  <text x="94" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  ...</text>

  <!-- Case 2: Pagination -->
  <rect x="460" y="68" width="360" height="140" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">페이징 + 정렬 정보 전달</text>
  <rect x="478" y="108" width="324" height="84" fill="#070b14" rx="4" stroke="#1e2433"/>
  <text x="494" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">var</text>
  <text x="515" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> args =</text>
  <text x="554" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve"> "pageNo="</text>
  <text x="611" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> + nPage</text>
  <text x="494" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">       + " pageSize=20"</text>
  <text x="494" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">       + " sortCol=" + sCol</text>
  <text x="494" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">       + " sortDir=" + sDir;</text>

  <!-- Case 3: Flag -->
  <rect x="60" y="226" width="360" height="130" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">플래그 값 전달</text>
  <rect x="78" y="266" width="324" height="72" fill="#070b14" rx="4" stroke="#1e2433"/>
  <text x="94" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// 승인/반려 처리</text>
  <text x="94" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">this.transaction(</text>
  <text x="94" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "SVC_APPR", ..., "", "",</text>
  <text x="94" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "apprType=Y", ...</text>

  <!-- Case 4: Mixed -->
  <rect x="460" y="226" width="360" height="130" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">inDatasets + args 혼합</text>
  <rect x="478" y="266" width="324" height="72" fill="#070b14" rx="4" stroke="#1e2433"/>
  <text x="494" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// DS: 상세 조건 / args: 페이지</text>
  <text x="494" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">this.transaction(</text>
  <text x="494" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  ..., "dsCond=dsFilter",</text>
  <text x="494" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  ..., "pageNo="+n, ...</text>

  <!-- Bottom note -->
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">args와 inDatasets는 함께 사용 가능 — 각각 req.getParameter()와 req.getDataset()으로 수신</text>
</svg>
