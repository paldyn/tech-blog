<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-cr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-cr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-cr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Credential Helper 동작 흐름</text>

  <!-- Git operation box -->
  <rect x="60" y="80" width="200" height="56" rx="8" fill="#1a2233" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">git push / fetch</text>
  <text x="160" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HTTPS 인증 필요</text>

  <!-- Arrow → credential helper -->
  <line x1="260" y1="108" x2="336" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-cr)"/>
  <text x="297" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">자격 증명 요청</text>

  <!-- Credential Helper -->
  <rect x="336" y="80" width="200" height="56" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="436" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Credential Helper</text>
  <text x="436" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">캐시 / 저장소 조회</text>

  <!-- Arrow → Storage -->
  <line x1="536" y1="108" x2="612" y2="108" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-cr3)"/>
  <text x="573" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">자격 증명 조회</text>

  <!-- Storage -->
  <rect x="612" y="80" width="200" height="56" rx="8" fill="#2a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="712" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">저장소</text>
  <text x="712" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OS 키체인 / 파일</text>

  <!-- Return arrow -->
  <line x1="612" y1="130" x2="536" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-cr2)"/>
  <text x="573" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">토큰 반환</text>

  <line x1="336" y1="130" x2="260" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-cr2)"/>
  <text x="297" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">인증 완료</text>

  <!-- Divider -->
  <line x1="60" y1="178" x2="820" y2="178" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Helper types -->
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">헬퍼 종류 비교</text>

  <!-- cache -->
  <rect x="60" y="216" width="230" height="80" rx="8" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="175" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">cache</text>
  <text x="175" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">메모리에 임시 보관</text>
  <text x="175" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">기본 900초 후 만료</text>

  <!-- store -->
  <rect x="310" y="216" width="230" height="80" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <text x="425" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">store</text>
  <text x="425" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">평문 파일 (~/.git-credentials)</text>
  <text x="425" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">보안 취약 — 비권장</text>

  <!-- OS keychain -->
  <rect x="560" y="216" width="260" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">osxkeychain / wincred</text>
  <text x="690" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OS 키체인 통합</text>
  <text x="690" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">권장 — 암호화 저장</text>

  <!-- Bottom: config -->
  <rect x="60" y="322" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Mac OS 키체인 사용 (Mac 기본값)</text>
  <text x="80" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">config --global credential.helper osxkeychain</text>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Linux: 15분 캐시</text>
  <text x="80" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">config --global credential.helper 'cache --timeout=900'</text>
</svg>
