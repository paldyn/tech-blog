<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">복합 인덱스 컬럼 순서 설계 원칙</text>

  <!-- Principle 1: Equality first -->
  <rect x="60" y="66" width="360" height="130" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">원칙 1: 등호(=) 조건 먼저</text>
  <rect x="76" y="100" width="328" height="84" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 좋음: = 먼저, 범위 나중</text>
  <text x="92" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">INDEX (status, created_at)</text>
  <text x="92" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 나쁨: 범위 먼저</text>
  <text x="92" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">INDEX (created_at, status)</text>

  <!-- Principle 2: Cardinality -->
  <rect x="460" y="66" width="360" height="130" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">원칙 2: 선택도 높은 컬럼 먼저</text>
  <rect x="476" y="100" width="328" height="84" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- user_id 선택도 높음 (1/100만)</text>
  <text x="492" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- status 선택도 낮음 (1/5)</text>
  <text x="492" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">INDEX (user_id, status)  -- 권장</text>
  <text x="492" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">INDEX (status, user_id)  -- 비효율</text>

  <!-- Principle 3: Query pattern -->
  <rect x="60" y="214" width="360" height="130" rx="8" fill="#0d0d0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="240" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">원칙 3: 쿼리 패턴 매칭</text>
  <rect x="76" y="248" width="328" height="84" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 자주 쓰는 WHERE 절 순서 = 인덱스</text>
  <text x="92" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">WHERE dept_id=1 AND salary &gt; 5000</text>
  <text x="92" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">→ INDEX (dept_id, salary)</text>
  <text x="92" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">   등호 dept_id 먼저, 범위 salary 뒤</text>

  <!-- Principle 4: ORDER BY / GROUP BY -->
  <rect x="460" y="214" width="360" height="130" rx="8" fill="#0d0d0d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">원칙 4: 정렬 컬럼 포함</text>
  <rect x="476" y="248" width="328" height="84" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- ORDER BY 정렬 인덱스로 처리</text>
  <text x="492" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">WHERE status='A' ORDER BY created_at</text>
  <text x="492" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">→ INDEX (status, created_at)</text>
  <text x="492" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">   filesort 없이 인덱스 순서 활용</text>

  <!-- Bottom key insight -->
  <rect x="60" y="356" width="760" height="14" rx="4" fill="none"/>
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">원칙 1(등호 먼저) > 원칙 3(쿼리 패턴) > 원칙 2(선택도) 순으로 우선순위 적용</text>
</svg>
