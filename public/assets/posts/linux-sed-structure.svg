<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">sed 동작 구조</text>

  <!-- Input stream -->
  <rect x="60" y="80" width="130" height="55" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">입력 스트림</text>
  <text x="125" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 / stdin</text>

  <!-- Arrow -->
  <line x1="190" y1="107" x2="240" y2="107" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Pattern Space -->
  <rect x="240" y="70" width="180" height="75" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="330" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Pattern Space</text>
  <text x="330" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">현재 처리 중인 줄</text>
  <text x="330" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">명령 적용 대상</text>

  <!-- Arrow to commands -->
  <line x1="420" y1="107" x2="470" y2="107" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Commands box -->
  <rect x="470" y="70" width="180" height="75" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="560" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">sed 명령 실행</text>
  <text x="560" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">s, d, p, a, i, c...</text>
  <text x="560" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주소 매칭 후 적용</text>

  <!-- Arrow to output -->
  <line x1="650" y1="107" x2="700" y2="107" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="700" y="80" width="120" height="55" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="760" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">출력 스트림</text>
  <text x="760" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">stdout</text>

  <!-- Hold Space -->
  <rect x="240" y="175" width="180" height="55" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="330" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Hold Space</text>
  <text x="330" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">보조 버퍼 (h/H/g/G)</text>

  <!-- Arrows between spaces -->
  <line x1="330" y1="145" x2="330" y2="175" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Commands reference -->
  <rect x="60" y="260" width="760" height="115" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">주요 sed 명령</text>
  <text x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#55c555">s</tspan>/pat/rep/flags  치환    <tspan fill="#55c555">d</tspan>  삭제    <tspan fill="#55c555">p</tspan>  출력    <tspan fill="#55c555">q</tspan>  종료</text>
  <text x="80" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#55c555">a</tspan>  줄 뒤 추가    <tspan fill="#55c555">i</tspan>  줄 앞 삽입    <tspan fill="#55c555">c</tspan>  줄 교체    <tspan fill="#55c555">y</tspan>  문자 변환</text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#55c555">h</tspan>/<tspan fill="#55c555">H</tspan>  패턴→홀드 복사/추가    <tspan fill="#55c555">g</tspan>/<tspan fill="#55c555">G</tspan>  홀드→패턴 복사/추가    <tspan fill="#55c555">n</tspan>  다음 줄</text>
  <text x="80" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#55c555">=</tspan>  라인번호 출력    <tspan fill="#55c555">l</tspan>  비출력 문자 표시    <tspan fill="#55c555">r</tspan>  파일 내용 삽입</text>
</svg>
