<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a855"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CrewAI 멀티 에이전트 협업 구조</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Crew → Agent(역할/목표/배경) + Task(설명/기대출력/도구) 조합</text>

  <!-- Crew box (outer) -->
  <rect x="40" y="90" width="800" height="330" rx="10" fill="#0a0f0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">Crew (팀)</text>
  <text x="440" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">process="sequential" | "hierarchical" | "parallel"</text>

  <!-- Agent 1: Researcher -->
  <rect x="64" y="152" width="200" height="130" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="164" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">🔍 Researcher</text>
  <rect x="78" y="188" width="172" height="26" rx="4" fill="#000" stroke="#2a4a2a" stroke-width="1"/>
  <text x="164" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">role: "AI 연구 전문가"</text>
  <rect x="78" y="220" width="172" height="26" rx="4" fill="#000" stroke="#2a4a2a" stroke-width="1"/>
  <text x="164" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">goal: "최신 AI 트렌드 수집"</text>
  <rect x="78" y="252" width="172" height="20" rx="4" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="164" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">도구: web_search, scraper</text>

  <!-- Task 1 -->
  <rect x="64" y="294" width="200" height="100" rx="8" fill="#1a1000" stroke="#e0a855" stroke-width="1.5"/>
  <text x="164" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">Task 1: 조사</text>
  <text x="164" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">description: "LLM 최신 동향</text>
  <text x="164" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">조사 및 정리"</text>
  <text x="164" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">expected_output: "리포트"</text>
  <text x="164" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">agent: researcher</text>

  <!-- Arrow Task1 → Task2 -->
  <line x1="264" y1="344" x2="308" y2="344" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-o)"/>

  <!-- Agent 2: Writer -->
  <rect x="310" y="152" width="200" height="130" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="410" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">✍️ Writer</text>
  <rect x="324" y="188" width="172" height="26" rx="4" fill="#000" stroke="#2a4a2a" stroke-width="1"/>
  <text x="410" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">role: "기술 블로그 작가"</text>
  <rect x="324" y="220" width="172" height="26" rx="4" fill="#000" stroke="#2a4a2a" stroke-width="1"/>
  <text x="410" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">goal: "명확한 글 작성"</text>
  <rect x="324" y="252" width="172" height="20" rx="4" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="410" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">도구: file_write</text>

  <!-- Task 2 -->
  <rect x="310" y="294" width="200" height="100" rx="8" fill="#1a1000" stroke="#e0a855" stroke-width="1.5"/>
  <text x="410" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">Task 2: 작성</text>
  <text x="410" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">context: [task_1]</text>
  <text x="410" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">description: "블로그 포스트</text>
  <text x="410" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">작성 (1000자)"</text>
  <text x="410" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">agent: writer</text>

  <!-- Arrow Task2 → Task3 -->
  <line x1="510" y1="344" x2="554" y2="344" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-o)"/>

  <!-- Agent 3: Reviewer -->
  <rect x="556" y="152" width="200" height="130" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="656" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">🔎 Reviewer</text>
  <rect x="570" y="188" width="172" height="26" rx="4" fill="#000" stroke="#2a4a2a" stroke-width="1"/>
  <text x="656" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">role: "품질 검토 전문가"</text>
  <rect x="570" y="220" width="172" height="26" rx="4" fill="#000" stroke="#2a4a2a" stroke-width="1"/>
  <text x="656" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">goal: "정확성·명확성 검증"</text>
  <rect x="570" y="252" width="172" height="20" rx="4" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="656" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">도구: fact_check</text>

  <!-- Task 3 -->
  <rect x="556" y="294" width="200" height="100" rx="8" fill="#1a1000" stroke="#e0a855" stroke-width="1.5"/>
  <text x="656" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">Task 3: 검토</text>
  <text x="656" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">context: [task_2]</text>
  <text x="656" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">output_file:</text>
  <text x="656" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">"final_post.md"</text>
  <text x="656" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">agent: reviewer</text>

  <!-- Output -->
  <line x1="756" y1="344" x2="800" y2="344" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="818" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">최종</text>
  <text x="818" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">출력</text>

  <!-- Manager LLM (hierarchical) note -->
  <rect x="40" y="440" width="800" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Hierarchical: </text>
  <text x="60" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">               manager_llm=</text>
  <text x="60" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                            Anthropic</text>
  <text x="60" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                     () → 매니저 에이전트가 태스크 위임</text>
  <text x="60" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Sequential: </text>
  <text x="60" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">              태스크 순서대로 실행, 이전 결과가 다음 </text>
  <text x="60" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                                                    context</text>
  <text x="60" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                           로 전달</text>
</svg>
