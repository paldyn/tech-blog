<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">open() 모드별 실전 코드</text>

  <!-- Left: text modes -->
  <rect x="60" y="72" width="360" height="26" rx="4" fill="#1a2a4a"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">텍스트 모드</text>

  <rect x="60" y="100" width="360" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 읽기 — 파일 없으면 에러</text>
  <text xml:space="preserve" x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">with <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"data.txt"</tspan>, <tspan fill="#ce9178">"r"</tspan>,</text>
  <text xml:space="preserve" x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         encoding=<tspan fill="#ce9178">"utf-8"</tspan>) as f:</text>
  <text xml:space="preserve" x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    content = f.read()</text>
  <text xml:space="preserve" x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 쓰기 — 덮어쓰기 주의</text>
  <text xml:space="preserve" x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">with <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"out.txt"</tspan>, <tspan fill="#ce9178">"w"</tspan>,</text>
  <text xml:space="preserve" x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         encoding=<tspan fill="#ce9178">"utf-8"</tspan>) as f:</text>
  <text xml:space="preserve" x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.write(<tspan fill="#ce9178">"새 내용\n"</tspan>)</text>
  <text xml:space="preserve" x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 추가 — 기존 내용 유지</text>
  <text xml:space="preserve" x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">with <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"log.txt"</tspan>, <tspan fill="#ce9178">"a"</tspan>,</text>
  <text xml:space="preserve" x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         encoding=<tspan fill="#ce9178">"utf-8"</tspan>) as f:</text>
  <text xml:space="preserve" x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.write(<tspan fill="#ce9178">"로그 추가\n"</tspan>)</text>

  <!-- Right: binary modes -->
  <rect x="460" y="72" width="360" height="26" rx="4" fill="#2a1a4a"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">이진 모드</text>

  <rect x="460" y="100" width="360" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이미지 읽기</text>
  <text xml:space="preserve" x="476" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">with <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"photo.jpg"</tspan>, <tspan fill="#ce9178">"rb"</tspan>) as f:</text>
  <text xml:space="preserve" x="476" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    data = f.read()</text>
  <text xml:space="preserve" x="476" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # data는 bytes 객체</text>
  <text xml:space="preserve" x="476" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이진 파일 복사</text>
  <text xml:space="preserve" x="476" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">with (<tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"src.bin"</tspan>, <tspan fill="#ce9178">"rb"</tspan>) as src,</text>
  <text xml:space="preserve" x="476" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"dst.bin"</tspan>, <tspan fill="#ce9178">"wb"</tspan>) as dst):</text>
  <text xml:space="preserve" x="476" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan font-weight="600" fill="#7ec8e3">while</tspan> chunk := src.read(<tspan fill="#b5cea8">65536</tspan>):</text>
  <text xml:space="preserve" x="476" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        dst.write(chunk)</text>
  <text xml:space="preserve" x="476" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 파일 이미 있으면 에러</text>
  <text xml:space="preserve" x="476" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">with <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"new.txt"</tspan>, <tspan fill="#ce9178">"x"</tspan>) as f:</text>
  <text xml:space="preserve" x="476" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    f.write(<tspan fill="#ce9178">"최초 1회만"</tspan>)</text>

  <!-- Bottom tip -->
  <rect x="60" y="420" width="760" height="28" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="439" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">항상 encoding="utf-8" 명시 권장 — 플랫폼 기본값에 의존하면 Windows/Linux 간 깨짐 발생</text>
</svg>
