<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">defaultdict 실전 패턴</text>

  <!-- Left: groupby -->
  <text x="70" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">그룹화 패턴</text>
  <rect x="60" y="88" width="370" height="248" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 단어를 길이별로 그룹화</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">words = [<tspan fill="#ce9178">"cat"</tspan>,<tspan fill="#ce9178">"car"</tspan>,<tspan fill="#ce9178">"dog"</tspan>,<tspan fill="#ce9178">"elephant"</tspan>]</text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">by_len = defaultdict(<tspan fill="#7ec8e3">list</tspan>)</text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">for w <tspan fill="#7ec8e3">in</tspan> words:</text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    by_len[<tspan fill="#7ec8e3">len</tspan>(w)].append(w)</text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># {3:['cat','car','dog'], 8:['elephant']}</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 역방향 인덱스 (값 → 키 목록)</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">inv = defaultdict(<tspan fill="#7ec8e3">list</tspan>)</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">for k, v <tspan fill="#7ec8e3">in</tspan> original.items():</text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    inv[v].append(k)</text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 일반 dict로 변환</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">result = <tspan fill="#7ec8e3">dict</tspan>(by_len)</text>

  <!-- Right: int + nested -->
  <text x="460" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#b5cea8">빈도 집계 · 중첩 defaultdict</text>
  <rect x="450" y="88" width="370" height="248" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># int: 빈도 집계</text>
  <text x="466" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">freq = defaultdict(<tspan fill="#7ec8e3">int</tspan>)</text>
  <text x="466" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">for ch <tspan fill="#7ec8e3">in</tspan> <tspan fill="#ce9178">"hello"</tspan>:</text>
  <text x="466" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    freq[ch] += <tspan fill="#b5cea8">1</tspan></text>
  <text x="466" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># {'h':1,'e':1,'l':2,'o':1}</text>
  <text x="466" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 중첩 defaultdict</text>
  <text x="466" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">graph = defaultdict(<tspan fill="#7ec8e3">lambda</tspan>: defaultdict(<tspan fill="#7ec8e3">int</tspan>))</text>
  <text x="466" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">graph[<tspan fill="#ce9178">'A'</tspan>][<tspan fill="#ce9178">'B'</tspan>] += <tspan fill="#b5cea8">1</tspan></text>
  <text x="466" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># {'A': {'B': 1}}</text>
  <text x="466" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># setdefault와 동등하지만 더 깔끔</text>
  <text x="466" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">d.setdefault(<tspan fill="#ce9178">'key'</tspan>, []).append(v)</text>
  <text x="466" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># vs defaultdict(list)</text>

  <!-- Bottom -->
  <rect x="60" y="356" width="760" height="40" rx="6" fill="#1a0d1a" stroke="#7777cc"/>
  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">주의: defaultdict를 직렬화(pickle/json)하기 전에 dict()로 변환하거나 default_factory=None으로 설정</text>
</svg>
