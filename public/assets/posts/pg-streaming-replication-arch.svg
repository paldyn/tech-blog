<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PostgreSQL 스트리밍 복제 아키텍처</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">WAL 스트림으로 Primary → Standby 실시간 동기화</text>

  <!-- Primary box -->
  <rect x="60" y="110" width="280" height="220" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Primary (읽기/쓰기)</text>

  <rect x="80" y="150" width="240" height="36" fill="#0f1724" rx="6" stroke="#3a4a6e"/>
  <text x="200" y="171" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">사용자 쓰기 작업</text>

  <line x1="200" y1="186" x2="200" y2="202" stroke="#55c555" stroke-width="1.5"/>

  <rect x="80" y="202" width="240" height="36" fill="#0f1724" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">WAL 생성 (wal_level=replica)</text>

  <line x1="200" y1="238" x2="200" y2="254" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="80" y="254" width="240" height="36" fill="#0f1724" rx="6" stroke="#3a4a6e"/>
  <text x="200" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">WAL Sender 프로세스</text>

  <rect x="80" y="302" width="240" height="22" fill="#000000" rx="4"/>
  <text x="200" y="317" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">pg_wal/ (WAL 파일 보관)</text>

  <!-- Arrow: WAL stream -->
  <line x1="340" y1="270" x2="480" y2="270" stroke="#55c555" stroke-width="3"/>
  <polygon points="480,270 462,261 462,279" fill="#55c555"/>
  <text x="410" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">WAL 스트림</text>
  <text x="410" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TCP / 5432</text>

  <!-- Standby boxes -->
  <rect x="480" y="110" width="340" height="140" fill="#111827" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="650" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Standby 1 (Hot Standby)</text>

  <rect x="500" y="150" width="300" height="36" fill="#0f1724" rx="6" stroke="#3a4a6e"/>
  <text x="650" y="171" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">WAL Receiver 프로세스</text>

  <line x1="650" y1="186" x2="650" y2="202" stroke="#888" stroke-width="1.5"/>

  <rect x="500" y="202" width="300" height="36" fill="#0f1724" rx="6" stroke="#3a4a6e"/>
  <text x="650" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">WAL Apply (읽기 전용 쿼리 허용)</text>

  <!-- Arrow to Standby 2 -->
  <line x1="650" y1="250" x2="650" y2="290" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="650,290 644,278 656,278" fill="#888"/>
  <text x="710" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Cascade</text>

  <rect x="480" y="290" width="340" height="70" fill="#111827" rx="8" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="650" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">Standby 2 (Cascading)</text>
  <text x="650" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Standby 1로부터 WAL 수신</text>

  <!-- Sync/Async label -->
  <rect x="60" y="355" width="180" height="54" fill="#111827" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">동기 복제</text>
  <text x="150" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">synchronous_commit=on</text>
  <text x="150" y="409" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">RPO=0, 지연 있음</text>

  <rect x="260" y="355" width="180" height="54" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="350" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">비동기 복제</text>
  <text x="350" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">synchronous_commit=off</text>
  <text x="350" y="409" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">RPO&gt;0, 낮은 지연</text>

  <rect x="460" y="355" width="360" height="54" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">replication slot</text>
  <text x="640" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Standby가 따라잡을 때까지 WAL 보존</text>
  <text x="640" y="409" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">디스크 풀 위험 — 모니터링 필수</text>

  <!-- Legend -->
  <text x="440" y="447" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Hot Standby: read-only 쿼리 허용 / Warm Standby: 복구만 (postgres_fdw로 읽기 불가)</text>
</svg>
