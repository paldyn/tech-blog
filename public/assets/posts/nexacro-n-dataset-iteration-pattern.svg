<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 행 순회 패턴 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">전체 순회 · 조건 순회 · 변경 행 순회</text>

  <!-- ===== Pattern 1: Full iteration ===== -->
  <rect x="60" y="92" width="240" height="290" fill="#0f0f1a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="92" width="240" height="36" fill="#1a1a2e" rx="8"/>
  <rect x="60" y="116" width="240" height="12" fill="#1a1a2e"/>
  <text x="180" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">① 전체 행 순회</text>

  <!-- Dataset visual -->
  <rect x="80" y="140" width="200" height="100" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <!-- Header -->
  <rect x="80" y="140" width="200" height="22" fill="#1a2a1a" rx="4"/>
  <text x="180" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">EMP_CD | EMP_NM</text>
  <!-- Rows highlighted sequentially -->
  <rect x="80" y="162" width="200" height="20" fill="#0d1a2e"/>
  <text x="180" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">→ i=0: E001 | 김철수</text>
  <rect x="80" y="182" width="200" height="20" fill="#0d1a1a"/>
  <text x="180" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">i=1: E002 | 이영희</text>
  <rect x="80" y="202" width="200" height="20" fill="#0d1a1a"/>
  <text x="180" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">i=2: E003 | 박민준</text>
  <rect x="80" y="222" width="200" height="18" fill="#0d1a1a"/>
  <text x="180" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">... rowcount개 반복</text>

  <text x="180" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">for (var i=0;</text>
  <text x="180" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">i &lt; ds.rowcount; i++)</text>
  <text x="180" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">DELETE 행 포함 안됨</text>
  <text x="180" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(rowcount 기준)</text>
  <text x="180" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">가장 자주 쓰는 패턴</text>

  <!-- ===== Pattern 2: Conditional iteration ===== -->
  <rect x="320" y="92" width="240" height="290" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <rect x="320" y="92" width="240" height="36" fill="#1a2e1a" rx="8"/>
  <rect x="320" y="116" width="240" height="12" fill="#1a2e1a"/>
  <text x="440" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">② 조건 행 순회</text>

  <!-- Filtered visual -->
  <rect x="340" y="140" width="200" height="100" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <rect x="340" y="140" width="200" height="22" fill="#1a2a1a" rx="4"/>
  <text x="440" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">USE_YN | EMP_NM</text>
  <rect x="340" y="162" width="200" height="20" fill="#0d1a0d"/>
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">✓ Y | 김철수</text>
  <rect x="340" y="182" width="200" height="20" fill="#1a0d0d"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">✗ N | 이영희 (skip)</text>
  <rect x="340" y="202" width="200" height="20" fill="#0d1a0d"/>
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">✓ Y | 박민준</text>
  <rect x="340" y="222" width="200" height="18" fill="#111"/>
  <text x="440" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">조건 일치 행만 처리</text>

  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">if (getColumn(i,</text>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">"USE_YN") == "Y")</text>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">체크 합산, 유효성</text>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">검사 등에 활용</text>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">합계·검증 패턴</text>

  <!-- ===== Pattern 3: Changed row iteration ===== -->
  <rect x="580" y="92" width="240" height="290" fill="#1a0f0f" rx="8" stroke="#e8c85a" stroke-width="1.5"/>
  <rect x="580" y="92" width="240" height="36" fill="#2e1a00" rx="8"/>
  <rect x="580" y="116" width="240" height="12" fill="#2e1a00"/>
  <text x="700" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c85a" text-anchor="middle">③ 변경 행 순회</text>

  <!-- Changed rows visual -->
  <rect x="600" y="140" width="200" height="100" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <rect x="600" y="140" width="200" height="22" fill="#1a2a1a" rx="4"/>
  <text x="700" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">EMP_NM | rowType</text>
  <rect x="600" y="162" width="200" height="20" fill="#0d1a0d"/>
  <text x="700" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">김철수 | 1(skip)</text>
  <rect x="600" y="182" width="200" height="20" fill="#0d1a2e"/>
  <text x="700" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">✓ 이영희 | 2(INSERT)</text>
  <rect x="600" y="202" width="200" height="20" fill="#1a1000"/>
  <text x="700" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c85a" text-anchor="middle">✓ 박민준 | 4(UPDATE)</text>
  <rect x="600" y="222" width="200" height="18" fill="#111"/>
  <text x="700" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">변경된 행만 처리</text>

  <text x="700" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c85a" text-anchor="middle">if (getRowType(i)</text>
  <text x="700" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c85a" text-anchor="middle">!= ROWTYPE.NORMAL)</text>
  <text x="700" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">저장 전 클라이언트</text>
  <text x="700" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">측 유효성 검증</text>
  <text x="700" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8c85a" text-anchor="middle">저장 전 검증 패턴</text>

  <!-- Bottom note -->
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">rowcount는 NORMAL·INSERT·UPDATE 행만 포함 (DELETE 행 제외)</text>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">deletedrowcount 속성으로 DELETE 행 수를 따로 확인할 수 있음</text>
</svg>
