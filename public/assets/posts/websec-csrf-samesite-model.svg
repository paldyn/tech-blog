<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SameSite vs SameOrigin: 정확한 개념 구분</text>

  <!-- Site definition -->
  <text x="440" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">SameSite = 등록 가능한 도메인(eTLD+1) 기준 | SameOrigin = 프로토콜+호스트+포트 전체 일치</text>

  <!-- SameSite examples -->
  <rect x="60" y="100" width="360" height="160" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Same-Site (쿠키 전송됨 — Lax/Strict)</text>

  <text x="76" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="96" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">api.example.com → example.com</text>
  <text x="76" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="96" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">shop.example.com → app.example.com</text>
  <text x="76" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="96" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">http → https (같은 eTLD+1)</text>
  <text x="76" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">※ Strict에서 외부 링크 클릭 → example.com 로드</text>
  <text x="76" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  이 경우 쿠키 NOT 전송 (top-level nav 아닌 경우)</text>

  <!-- Cross-Site examples -->
  <rect x="460" y="100" width="360" height="160" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Cross-Site (쿠키 차단됨 — Lax/Strict)</text>

  <text x="476" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="496" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">evil.com → example.com</text>
  <text x="476" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="496" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">example.co.kr → example.com</text>
  <text x="476" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="496" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">attacker.github.io → user.github.io</text>
  <text x="476" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">※ github.io는 공개 접미사 → 서로 다른 사이트</text>
  <text x="476" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  Public Suffix List(PSL) 참조</text>

  <!-- Lax detail -->
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Lax 모드: "안전한" 교차 출처 GET만 허용</text>

  <rect x="60" y="302" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">// Lax에서 쿠키 전송 조건: top-level navigation + "안전한" HTTP 메서드</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">전송됨:</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  &lt;a href="https://bank.com"&gt;링크 클릭&lt;/a&gt;     → GET top-level nav</text>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600" xml:space="preserve">차단됨:</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  &lt;form method="POST" action="https://bank.com"&gt; → POST (CSRF 차단)</text>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  fetch/XHR, &lt;img&gt;, &lt;iframe&gt; 등 서브리소스 요청 → 모두 차단</text>

  <!-- Bottom note -->
  <rect x="60" y="436" width="760" height="50" rx="8" fill="#0d0d0d" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Chrome 80+: SameSite 미설정 쿠키는 Lax 처리 / SameSite=None은 반드시 Secure 필요</text>
  <text x="440" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">단, 120초 이내 POST 요청은 임시로 None 처리 (Lax+POST 임시 완화, 2024년 이후 제거)</text>
</svg>
