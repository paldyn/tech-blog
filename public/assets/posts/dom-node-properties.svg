<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">Element vs Node 주요 프로퍼티 비교</text>

  <!-- Node 프로퍼티 -->
  <rect x="60" y="72" width="360" height="220" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="97" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">Node (공통 기반)</text>

  <text x="80" y="120" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">nodeType</text>
  <text x="200" y="120" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">1·3·8·9·11 등</text>
  <text x="80" y="142" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">nodeName</text>
  <text x="200" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'DIV'·'#text'·'#comment'</text>
  <text x="80" y="164" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">nodeValue</text>
  <text x="200" y="164" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Element: null, Text: 내용</text>
  <text x="80" y="186" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">parentNode</text>
  <text x="200" y="186" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">부모 노드 (모든 타입)</text>
  <text x="80" y="208" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">childNodes</text>
  <text x="200" y="208" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">NodeList (텍스트 포함)</text>
  <text x="80" y="230" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">isConnected</text>
  <text x="200" y="230" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">문서에 연결 여부</text>
  <text x="80" y="252" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">textContent</text>
  <text x="200" y="252" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">모든 하위 텍스트 합산</text>
  <text x="80" y="274" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">cloneNode(deep)</text>
  <text x="200" y="274" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">노드 복제</text>

  <!-- Element 프로퍼티 -->
  <rect x="460" y="72" width="360" height="220" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="97" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">Element (Element 전용)</text>

  <text x="480" y="120" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">tagName</text>
  <text x="600" y="120" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'DIV' (대문자)</text>
  <text x="480" y="142" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">id · className</text>
  <text x="600" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">속성 접근 단축키</text>
  <text x="480" y="164" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">classList</text>
  <text x="600" y="164" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">DOMTokenList</text>
  <text x="480" y="186" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">innerHTML</text>
  <text x="600" y="186" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">HTML 문자열 (XSS 주의)</text>
  <text x="480" y="208" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">children</text>
  <text x="600" y="208" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">HTMLCollection (요소만)</text>
  <text x="480" y="230" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">attributes</text>
  <text x="600" y="230" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">NamedNodeMap</text>
  <text x="480" y="252" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">matches(selector)</text>
  <text x="600" y="252" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">CSS 선택자 일치 여부</text>
  <text x="480" y="274" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">closest(selector)</text>
  <text x="600" y="274" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">조상 중 일치하는 요소</text>

  <!-- 코드 블록 -->
  <rect x="60" y="316" width="760" height="100" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="342" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="342" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> el = document.querySelector(</text>
  <text x="350" y="342" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'#app p'</text>
  <text x="412" y="342" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);</text>
  <text x="80" y="360" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">el.tagName;             </text>
  <text x="304" y="360" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 'P'</text>
  <text x="80" y="378" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">el.closest(</text>
  <text x="172" y="378" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'#app'</text>
  <text x="218" y="378" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);      </text>
  <text x="304" y="378" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// &lt;div id="app"&gt;</text>
  <text x="80" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">el.matches(</tspan><tspan fill="#ce9178">'p.intro'</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// true/false</tspan></text>

</svg>
