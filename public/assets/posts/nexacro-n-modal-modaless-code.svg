<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">openPopup bModal 파라미터</text>

  <!-- Left: bModal=true code -->
  <text x="230" y="84" fill="#888" font-size="13" text-anchor="middle">모달 팝업 (bModal = true)</text>
  <rect x="60" y="94" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="116" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">fn_openModal</tspan>() {</text>
  <text x="76" y="134" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.openPopup(</text>
  <text x="76" y="152" xml:space="preserve" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "popup/Confirm",</text>
  <text x="76" y="170" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    <tspan fill="#b5cea8">0</tspan>, <tspan fill="#ce9178">"fn_callback"</tspan>, <tspan fill="#7ec8e3">null</tspan>,</text>
  <text x="76" y="188" xml:space="preserve" fill="#e05555" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    true,  <tspan fill="#9aa4b8">// bModal ← 5번째 인수</tspan></text>
  <text x="76" y="206" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    oExtra, <tspan fill="#ce9178">"400:200"</tspan>);</text>
  <text x="76" y="224" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Right: bModal=false code -->
  <text x="650" y="84" fill="#888" font-size="13" text-anchor="middle">모달리스 팝업 (bModal = false)</text>
  <rect x="460" y="94" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="116" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">fn_openModaless</tspan>() {</text>
  <text x="476" y="134" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.openPopup(</text>
  <text x="476" y="152" xml:space="preserve" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "popup/Help",</text>
  <text x="476" y="170" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    <tspan fill="#b5cea8">0</tspan>, <tspan fill="#ce9178">"fn_callback"</tspan>, <tspan fill="#7ec8e3">null</tspan>,</text>
  <text x="476" y="188" xml:space="preserve" fill="#55c555" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    false, <tspan fill="#9aa4b8">// bModal = false</tspan></text>
  <text x="476" y="206" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    oExtra, <tspan fill="#ce9178">"500:300"</tspan>);</text>
  <text x="476" y="224" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- openPopup signature -->
  <text x="440" y="278" fill="#888" font-size="13" text-anchor="middle">openPopup 전체 파라미터</text>
  <rect x="60" y="288" width="760" height="104" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="310" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">openPopup(</text>
  <text x="76" y="328" xml:space="preserve" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  sURL,          <tspan fill="#9aa4b8">// 팝업 서비스 경로</tspan></text>
  <text x="76" y="346" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  nZOrder,       <tspan fill="#9aa4b8">// z-order (0=자동)</tspan></text>
  <text x="76" y="364" xml:space="preserve" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  sCallbackFn,   <tspan fill="#9aa4b8">// 콜백 함수명 (문자열)</tspan></text>
  <text x="76" y="382" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  sPopupID, bModal, oExtraData, sColSize)</text>
</svg>
