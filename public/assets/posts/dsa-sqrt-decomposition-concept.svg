<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제곱근 분해 (Sqrt Decomposition)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">배열을 √N 크기 블록으로 나눠 구간 쿼리를 O(√N)에 처리</text>

  <!-- Array -->
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">N=12 배열, 블록 크기=3 (√12 ≈ 4블록)</text>

  <!-- Block 0: cells 0-2 -->
  <rect x="70" y="108" width="196" height="6" rx="2" fill="#7ec8e3" opacity="0.5"/>
  <text x="168" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">블록 0</text>

  <rect x="80"  y="128" width="58" height="44" rx="4" fill="#0d1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="109" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">3</text>

  <rect x="142" y="128" width="58" height="44" rx="4" fill="#0d1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="171" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">1</text>

  <rect x="204" y="128" width="58" height="44" rx="4" fill="#0d1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="233" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7ec8e3" text-anchor="middle">4</text>

  <!-- Block 1: cells 3-5 -->
  <rect x="270" y="108" width="196" height="6" rx="2" fill="#7777cc" opacity="0.5"/>
  <text x="368" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">블록 1</text>

  <rect x="272" y="128" width="58" height="44" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="301" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7777cc" text-anchor="middle">1</text>

  <rect x="334" y="128" width="58" height="44" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="363" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7777cc" text-anchor="middle">5</text>

  <rect x="396" y="128" width="58" height="44" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="425" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7777cc" text-anchor="middle">9</text>

  <!-- Block 2: cells 6-8 -->
  <rect x="462" y="108" width="196" height="6" rx="2" fill="#55c555" opacity="0.5"/>
  <text x="560" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">블록 2</text>

  <rect x="464" y="128" width="58" height="44" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="493" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">2</text>

  <rect x="526" y="128" width="58" height="44" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="555" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">6</text>

  <rect x="588" y="128" width="58" height="44" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="617" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">5</text>

  <!-- Block 3: cells 9-11 -->
  <rect x="654" y="108" width="196" height="6" rx="2" fill="#e05555" opacity="0.5"/>
  <text x="752" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">블록 3</text>

  <rect x="656" y="128" width="58" height="44" rx="4" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="685" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" text-anchor="middle">3</text>

  <rect x="718" y="128" width="58" height="44" rx="4" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="747" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" text-anchor="middle">5</text>

  <rect x="780" y="128" width="58" height="44" rx="4" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="809" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" text-anchor="middle">8</text>

  <!-- Block sums -->
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">블록 합:</text>

  <rect x="140" y="178" width="120" height="32" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7ec8e3" text-anchor="middle">block[0] = 8</text>

  <rect x="274" y="178" width="120" height="32" rx="4" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="334" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7777cc" text-anchor="middle">block[1] = 15</text>

  <rect x="464" y="178" width="120" height="32" rx="4" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="524" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle">block[2] = 13</text>

  <rect x="656" y="178" width="120" height="32" rx="4" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="716" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e05555" text-anchor="middle">block[3] = 16</text>

  <!-- Query: sum(2..9) -->
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">쿼리: sum(2, 9) — 인덱스 2~9</text>

  <rect x="60" y="252" width="760" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">왼쪽 부분 블록 (2~2): A[2] = 4 개별 합산 (≤ 블록크기)</text>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">완전 블록 (블록1, 2): block[1] + block[2] = 15 + 13 = 28</text>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">오른쪽 부분 블록 (9~9): A[9] = 3 개별 합산</text>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">합계: 4 + 28 + 3 = 35  — O(√N) 시간</text>

  <!-- Complexity -->
  <rect x="60" y="352" width="760" height="120" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">복잡도 분석</text>

  <text x="160" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">전처리</text>
  <text x="160" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">O(N)</text>

  <text x="380" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">구간 쿼리</text>
  <text x="380" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">O(√N)</text>

  <text x="600" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">점 업데이트</text>
  <text x="600" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">O(1) + 블록 업데이트</text>

  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">누적 합(O(1) 쿼리)과 세그먼트 트리(O(log N)) 사이 실용적 절충점</text>
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">구현 단순 + 업데이트 지원 — 코딩 테스트에서 세그먼트 트리 대신 쓰기도 함</text>
</svg>
