<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CTE — WITH 절 구조와 실행 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">공통 테이블 표현식 (Common Table Expression)</text>

  <!-- CTE code block -->
  <rect x="50" y="96" width="460" height="380" fill="#0d0d0d" rx="8" stroke="#7777cc"/>
  <text x="280" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">CTE 구문</text>
  <rect x="66" y="128" width="428" height="334" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="82" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 다중 CTE 체인</text>
  <text x="82" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">WITH</text>
  <text x="82" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">dept_avg <tspan fill="#7ec8e3">AS</tspan> (</text>
  <text x="82" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">SELECT</tspan> dept,</text>
  <text x="82" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">         <tspan fill="#7ec8e3">AVG</tspan>(salary) avg_sal</text>
  <text x="82" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">FROM</tspan> employees</text>
  <text x="82" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">GROUP BY</tspan> dept</text>
  <text x="82" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">),</text>
  <text x="82" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">high_earners <tspan fill="#ffffff">AS</tspan> (</text>
  <text x="82" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">SELECT</tspan> e.*, da.avg_sal</text>
  <text x="82" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">FROM</tspan> employees e</text>
  <text x="82" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">JOIN</tspan> <tspan fill="#55c555">dept_avg</tspan> da <tspan fill="#7ec8e3">USING</tspan> (dept)</text>
  <text x="82" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">WHERE</tspan> e.salary > da.avg_sal</text>
  <text x="82" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="82" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="82" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  name, dept, salary, avg_sal</text>
  <text x="82" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="82" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     <tspan fill="#7ec8e3">high_earners</tspan></text>
  <text x="82" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ORDER BY</text>
  <text x="82" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">         salary <tspan fill="#7ec8e3">DESC</tspan>;</text>

  <!-- Right: flow diagram -->
  <rect x="540" y="96" width="290" height="380" fill="#0d0d0d" rx="8" stroke="#7ec8e3"/>
  <text x="685" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">실행 흐름</text>

  <!-- Step 1 -->
  <rect x="560" y="130" width="250" height="56" fill="#131820" rx="6" stroke="#55c555"/>
  <text x="685" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">① dept_avg CTE 실행</text>
  <text x="685" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">부서별 평균 급여 집계</text>

  <!-- Arrow 1 -->
  <line x1="685" y1="186" x2="685" y2="210" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="678,206 685,222 692,206" fill="#7ec8e3"/>

  <!-- Step 2 -->
  <rect x="560" y="220" width="250" height="56" fill="#131820" rx="6" stroke="#7777cc"/>
  <text x="685" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">② high_earners CTE 실행</text>
  <text x="685" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">dept_avg JOIN, salary 필터</text>

  <!-- Arrow 2 -->
  <line x1="685" y1="276" x2="685" y2="300" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="678,296 685,312 692,296" fill="#7ec8e3"/>

  <!-- Step 3 -->
  <rect x="560" y="310" width="250" height="56" fill="#131820" rx="6" stroke="#7ec8e3"/>
  <text x="685" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 최종 SELECT</text>
  <text x="685" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">high_earners를 테이블처럼 참조</text>

  <!-- Note -->
  <rect x="560" y="390" width="250" height="72" fill="#1e2433" rx="6"/>
  <text x="685" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CTE는 선언 순서대로 실행</text>
  <text x="685" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">뒤 CTE가 앞 CTE를 참조 가능</text>
  <text x="685" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">구체화 여부는 DBMS마다 다름</text>
</svg>
