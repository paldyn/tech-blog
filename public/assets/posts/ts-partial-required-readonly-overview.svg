<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Partial · Required · Readonly 변환 원리</text>

  <!-- Original Type box -->
  <rect x="60" y="80" width="220" height="130" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="170" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">원본 타입 User</text>
  <text x="80" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">id: number</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">name: string</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">email?: string</text>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">age: number</text>

  <!-- Arrow to Partial -->
  <line x1="282" y1="180" x2="364" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="295" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Partial&lt;T&gt;</text>

  <!-- Arrow to Required -->
  <line x1="282" y1="145" x2="364" y2="145" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="290" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Required&lt;T&gt;</text>

  <!-- Arrow to Readonly -->
  <line x1="282" y1="110" x2="364" y2="82" stroke="#ce9178" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="288" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">Readonly&lt;T&gt;</text>

  <!-- Partial result box -->
  <rect x="366" y="200" width="220" height="130" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="476" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Partial&lt;User&gt;</text>
  <text x="386" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">id?: number</text>
  <text x="386" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">name?: string</text>
  <text x="386" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">email?: string</text>
  <text x="386" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">age?: number</text>

  <!-- Required result box -->
  <rect x="366" y="80" width="220" height="110" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="476" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Required&lt;User&gt;</text>
  <text x="386" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">id: number</text>
  <text x="386" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">name: string</text>
  <text x="386" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">email: string</text>

  <!-- Readonly result box -->
  <rect x="366" y="356" width="220" height="106" fill="#111827" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="476" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">Readonly&lt;User&gt;</text>
  <text x="386" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">readonly id: number</text>
  <text x="386" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">readonly name: string</text>
  <text x="386" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">readonly age: number</text>

  <!-- Arrow: Original to Readonly -->
  <line x1="282" y1="160" x2="364" y2="390" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr3)"/>

  <!-- Descriptions right column -->
  <rect x="620" y="80" width="202" height="90" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="721" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Partial&lt;T&gt;</text>
  <text x="636" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 프로퍼티를 optional</text>
  <text x="636" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(?:) 로 만든다</text>
  <text x="636" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">→ 부분 업데이트 패턴</text>

  <rect x="620" y="186" width="202" height="90" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="721" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Required&lt;T&gt;</text>
  <text x="636" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 optional 프로퍼티를</text>
  <text x="636" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">필수로 만든다</text>
  <text x="636" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">→ 유효성 검사 완료 후</text>

  <rect x="620" y="292" width="202" height="90" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="721" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Readonly&lt;T&gt;</text>
  <text x="636" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 프로퍼티에 readonly</text>
  <text x="636" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수식어를 추가한다</text>
  <text x="636" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">→ 불변(immutable) 객체</text>

  <!-- Mapped Type Note -->
  <rect x="60" y="390" width="280" height="68" fill="#0d1117" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="200" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">내부 구현: Mapped Type</text>
  <text x="76" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">{ [K in keyof T]?: T[K] }</text>
  <text x="76" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">Mapped Type 수식어로 구현됨</text>
</svg>
