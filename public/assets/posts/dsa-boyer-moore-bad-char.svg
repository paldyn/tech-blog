<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">보이어-무어: Bad Character 휴리스틱</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">텍스트 "ABCBABCAB", 패턴 "ABC" — 오른쪽에서 왼쪽으로 비교</text>

  <!-- Text row -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">텍스트:</text>

  <rect x="120" y="90" width="44" height="38" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="142" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">A</text>
  <rect x="168" y="90" width="44" height="38" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="190" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">B</text>
  <rect x="216" y="90" width="44" height="38" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="238" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">C</text>
  <rect x="264" y="90" width="44" height="38" fill="#2a1a1a" stroke="#e05555" stroke-width="2" rx="3"/>
  <text x="286" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e05555">B</text>
  <rect x="312" y="90" width="44" height="38" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="334" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">A</text>
  <rect x="360" y="90" width="44" height="38" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="382" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#55c555">B</text>
  <rect x="408" y="90" width="44" height="38" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="430" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#55c555">C</text>
  <rect x="456" y="90" width="44" height="38" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="478" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#55c555">A</text>
  <rect x="504" y="90" width="44" height="38" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="526" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">B</text>

  <!-- Step 1: align at 0 -->
  <text x="60" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">1단계</text>
  <text x="60" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패턴:</text>

  <rect x="120" y="148" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="142" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#888">A</text>
  <rect x="168" y="148" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="190" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#888">B</text>
  <rect x="216" y="148" width="44" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="3"/>
  <text x="238" y="171" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">C</text>

  <text x="290" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">← 오른쪽부터 비교: C=C ✓</text>
  <text x="290" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">다음: B=B ✓, A=A ✓ → 매칭!</text>
  <text x="290" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">위치 0 매칭</text>

  <!-- Step 2: bad char skip -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2단계</text>
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패턴:</text>
  <text x="60" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(이동 후)</text>

  <rect x="168" y="228" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="190" y="251" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#888">A</text>
  <rect x="216" y="228" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="238" y="251" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#888">B</text>
  <rect x="264" y="228" width="44" height="36" fill="#2a1a1a" stroke="#e05555" stroke-width="2" rx="3"/>
  <text x="286" y="251" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">C</text>

  <text x="330" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">C ≠ B (bad character!)</text>
  <text x="330" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">B의 패턴 내 마지막 위치 = 1</text>
  <text x="330" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">skip = j - last[bad_char] = 2 - 1 = 1</text>

  <!-- bad char table -->
  <text x="60" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Bad Character 테이블 ("ABC")</text>

  <rect x="60" y="324" width="760" height="48" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="140" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문자</text>
  <text x="220" y="344" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">A</text>
  <text x="300" y="344" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">B</text>
  <text x="380" y="344" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">C</text>
  <text x="460" y="344" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">기타</text>
  <text x="140" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">마지막 위치</text>
  <text x="220" y="364" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">0</text>
  <text x="300" y="364" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">1</text>
  <text x="380" y="364" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">2</text>
  <text x="460" y="364" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">-1</text>

  <!-- complexity note -->
  <rect x="60" y="390" width="760" height="50" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1" rx="6"/>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">평균 O(n/m): 알파벳이 크고 패턴이 길수록 건너뛰기가 많아져 빠름</text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">최악 O(n·m): 모두 같은 문자 (예: "AAAA"에서 "AAA" 탐색)</text>
</svg>
