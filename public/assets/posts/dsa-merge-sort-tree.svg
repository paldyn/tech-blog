<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-d" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-u" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">병합 정렬 — 분할 정복 트리</text>

  <!-- Level 0: [8,3,7,1,5,2,6,4] -->
  <rect x="190" y="54" width="500" height="36" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7ec8e3">8  3  7  1  5  2  6  4</text>

  <!-- Level 1 split arrows -->
  <line x1="330" y1="90" x2="270" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="550" y1="90" x2="610" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <!-- Level 1 boxes -->
  <rect x="130" y="130" width="230" height="36" fill="#111" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="245" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7ec8e3">8  3  7  1</text>
  <rect x="520" y="130" width="230" height="36" fill="#111" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="635" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7ec8e3">5  2  6  4</text>

  <!-- Level 2 splits -->
  <line x1="200" y1="166" x2="165" y2="208" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="290" y1="166" x2="325" y2="208" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="590" y1="166" x2="555" y2="208" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="680" y1="166" x2="715" y2="208" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <!-- Level 2 boxes -->
  <rect x="100" y="210" width="110" height="36" fill="#111" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="155" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3">8  3</text>
  <rect x="285" y="210" width="110" height="36" fill="#111" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="340" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3">7  1</text>
  <rect x="488" y="210" width="110" height="36" fill="#111" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="543" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3">5  2</text>
  <rect x="672" y="210" width="110" height="36" fill="#111" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="727" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3">6  4</text>

  <!-- Level 3: individual elements -->
  <line x1="135" y1="246" x2="110" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="175" y1="246" x2="200" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="320" y1="246" x2="295" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="360" y1="246" x2="385" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="522" y1="246" x2="497" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="562" y1="246" x2="587" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="706" y1="246" x2="681" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <line x1="746" y1="246" x2="771" y2="288" stroke="#555" stroke-width="1.5" marker-end="url(#arr-d)"/>

  <!-- Level 3 single elements -->
  <rect x="90" y="290" width="38" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="109" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#55c555">8</text>
  <rect x="181" y="290" width="38" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#55c555">3</text>
  <rect x="274" y="290" width="38" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="293" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#55c555">7</text>
  <rect x="365" y="290" width="38" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="384" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#55c555">1</text>
  <rect x="475" y="290" width="38" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="494" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#55c555">5</text>
  <rect x="566" y="290" width="38" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="585" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#55c555">2</text>
  <rect x="659" y="290" width="38" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="678" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#55c555">6</text>
  <rect x="750" y="290" width="38" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="769" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#55c555">4</text>

  <!-- Merge arrows (upward) -->
  <line x1="109" y1="324" x2="135" y2="362" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="200" y1="324" x2="175" y2="362" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>

  <!-- Merged pairs -->
  <rect x="100" y="365" width="110" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="155" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">3  8</text>
  <rect x="274" y="324" x2="320" y2="362" width="0" height="0"/>
  <line x1="293" y1="324" x2="320" y2="362" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="384" y1="324" x2="357" y2="362" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <rect x="283" y="365" width="110" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="338" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">1  7</text>
  <line x1="494" y1="324" x2="521" y2="362" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="585" y1="324" x2="558" y2="362" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <rect x="466" y="365" width="110" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="521" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">2  5</text>
  <line x1="678" y1="324" x2="705" y2="362" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <line x1="769" y1="324" x2="742" y2="362" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-u)"/>
  <rect x="648" y="365" width="110" height="34" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="703" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">4  6</text>

  <!-- Complexity note -->
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">log₂N 레벨 × 레벨당 O(N) 병합 = O(N log N)</text>
</svg>
