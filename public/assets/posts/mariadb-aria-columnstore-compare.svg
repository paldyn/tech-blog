  <rect x="60" y="326" width="760" height="34" rx="0" fill="#0f1214" stroke="#222" stroke-width="1"/>
  <text x="170" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">배포 방식</text>
  <text x="360" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">기본 내장</text>
  <text x="540" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">기본 내장</text>
  <text x="730" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">별도 플러그인 설치</text>

  <!-- Use case row -->
  <rect x="60" y="360" width="760" height="40" rx="0" fill="#0a1a10" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">주 사용 사례</text>
  <text x="360" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">임시 테이블, 읽기 전용</text>
  <text x="360" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">테이블, FULLTEXT</text>
  <text x="540" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프로덕션 OLTP,</text>
  <text x="540" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">대부분의 애플리케이션</text>
  <text x="730" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">DW, 대규모 집계,</text>
  <text x="730" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">리포팅, HTAP</text>

  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MariaDB 내부 시스템 임시 테이블은 Aria 사용. aria_pagecache_buffer_size 조정으로 성능 개선 가능</text>
