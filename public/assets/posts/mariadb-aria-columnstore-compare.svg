  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">Aria · InnoDB · ColumnStore 특성 비교</text>

  <!-- Header -->
  <rect x="60" y="86" width="760" height="36" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">특성</text>
  <text x="360" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Aria</text>
  <text x="540" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">InnoDB</text>
  <text x="730" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">ColumnStore</text>

