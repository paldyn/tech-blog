  <text x="540" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">보통</text>
  <text x="730" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">매우 빠름 (압축·벡터)</text>

  <rect x="60" y="292" width="760" height="34" rx="0" fill="#111518" stroke="#222" stroke-width="1"/>
  <text x="170" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">OLTP 적합성</text>
