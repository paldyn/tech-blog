<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="880" height="320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">less vs more 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">less is more — 이름처럼 less가 more보다 기능이 많다</text>

  <!-- Headers -->
  <rect x="60" y="84" width="360" height="32" fill="#0f2a0f" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">less</text>
  <rect x="460" y="84" width="360" height="32" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">more</text>

  <!-- Row 1 -->
  <rect x="60" y="116" width="360" height="28" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">양방향 스크롤 (j/k/b)</text>
  <rect x="460" y="116" width="360" height="28" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">앞으로만 스크롤</text>

  <!-- Row 2 -->
  <rect x="60" y="144" width="360" height="28" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/ ? 로 검색 가능</text>
  <rect x="460" y="144" width="360" height="28" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/ 로 앞방향 검색만</text>

  <!-- Row 3 -->
  <rect x="60" y="172" width="360" height="28" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">파일 끝에서 종료 안 됨</text>
  <rect x="460" y="172" width="360" height="28" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">파일 끝 도달 시 자동 종료</text>

  <!-- Row 4 -->
  <rect x="60" y="200" width="360" height="28" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">마크, 여러 파일, +F 모드</text>
  <rect x="460" y="200" width="360" height="28" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">기본 기능만</text>

  <!-- Row 5 -->
  <rect x="60" y="228" width="360" height="28" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">파이프 입력 스크롤 가능</text>
  <rect x="460" y="228" width="360" height="28" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">파이프 입력 지원 제한적</text>

  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">man 페이지도 내부적으로 less를 사용한다</text>
</svg>
