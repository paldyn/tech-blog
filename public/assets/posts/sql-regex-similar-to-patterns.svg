<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="350" viewBox="0 0 880 350">
  <rect width="880" height="350" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">패턴 매칭 SQL 예제</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">전화번호·이메일·한글 검증 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="210" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- LIKE: 이메일 기본 확인</tspan></text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">WHERE</tspan> email <tspan fill="#7ec8e3">LIKE</tspan> <tspan fill="#ce9178">'%@%.%'</tspan></text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- SIMILAR TO: 전화번호 패턴</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">WHERE</tspan> phone <tspan fill="#7ec8e3">SIMILAR TO</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#ce9178">'0[0-9]{1,2}-[0-9]{3,4}-[0-9]{4}'</tspan></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- PostgreSQL ~: POSIX 정규식</tspan></text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">WHERE</tspan> email ~ <tspan fill="#ce9178">'^[a-zA-Z0-9._%+-]+'</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  || <tspan fill="#ce9178">'@[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$'</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#6a8aa0">-- MySQL REGEXP_LIKE</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">WHERE</tspan> <tspan fill="#55c555">REGEXP_LIKE</tspan>(phone,</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#ce9178">'^01[016789]-[0-9]{3,4}-[0-9]{4}$'</tspan>)</text>

  <!-- Note -->
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">~ (매칭) / !~ (불매칭) / ~* (대소문자 무관 매칭) — PostgreSQL 전용 연산자</text>
</svg>
