<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">커버링 인덱스 — 힙 접근 없음</text>

  <!-- Without covering index -->
  <rect x="60" y="70" width="360" height="300" rx="8" fill="#0d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">일반 Index Scan</text>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">INDEX(status) — 힙 왕복 필요</text>

  <!-- B-Tree -->
  <rect x="100" y="130" width="100" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">B-Tree 탐색</text>

  <!-- Arrow down -->
  <line x1="150" y1="166" x2="150" y2="194" stroke="#888" stroke-width="1.5"/>
  <polygon points="146,190 154,190 150,198" fill="#888"/>

  <!-- Leaf node -->
  <rect x="80" y="198" width="140" height="36" rx="4" fill="#1a1a2e" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">리프: status + 힙 포인터</text>
  <text x="150" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(name 없음)</text>

  <!-- Arrow right: heap access needed -->
  <line x1="220" y1="216" x2="265" y2="216" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="261,212 269,216 261,220" fill="#e05555"/>
  <text x="280" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">힙 접근</text>
  <text x="280" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">필요!</text>

  <!-- Heap block -->
  <rect x="265" y="232" width="110" height="36" rx="4" fill="#1f0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="320" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">힙(테이블 블록)</text>
  <text x="320" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">status, name, ...</text>

  <text x="150" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">★ 랜덤 I/O 발생</text>
  <text x="150" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">매 행마다 힙 블록 읽기</text>
  <text x="150" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">I/O = 인덱스 블록</text>
  <text x="150" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">     + 힙 블록</text>

  <!-- With covering index -->
  <rect x="460" y="70" width="360" height="300" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Index Only Scan</text>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">INDEX(status, name) — 힙 불필요</text>

  <!-- B-Tree -->
  <rect x="500" y="130" width="100" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">B-Tree 탐색</text>

  <!-- Arrow down -->
  <line x1="550" y1="166" x2="550" y2="194" stroke="#888" stroke-width="1.5"/>
  <polygon points="546,190 554,190 550,198" fill="#888"/>

  <!-- Leaf node: has all needed data -->
  <rect x="480" y="198" width="160" height="36" rx="4" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="560" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#55c555">리프: status + name ✓</text>
  <text x="560" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">SELECT 컬럼 모두 존재!</text>

  <!-- No heap access needed -->
  <text x="640" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">힙 접근 없음</text>
  <text x="640" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인덱스 블록만으로 완결</text>
  <text x="640" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">I/O = 인덱스 블록</text>
  <text x="640" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">     (힙 블록 0)</text>

  <!-- Bottom summary -->
  <rect x="60" y="384" width="760" height="56" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">커버링 인덱스 조건</text>
  <text x="440" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">WHERE 절 컬럼 + SELECT 절 컬럼이 모두 인덱스 안에 있어야 함</text>
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">PG: INCLUDE 절 · MySQL: 인덱스에 직접 포함 · MSSQL: INCLUDE 컬럼</text>
</svg>
