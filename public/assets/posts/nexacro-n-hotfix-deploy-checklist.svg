  <text x="52" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a6e" text-anchor="end">13</text>
  <text x="52" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a6e" text-anchor="end">14</text>

  <!-- Code content -->
  <!-- Line 1: comment -->
  <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// hotfix-deploy.sh</text>
  <!-- Line 2: shebang -->
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">#!/bin/bash</text>
  <!-- Line 3: set -e -->
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">set</text>
  <text x="111" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -e</text>
  <!-- Line 4: blank then echo -->
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">echo</text>
  <text x="116" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> "=== 핫픽스 배포 시작 ==="</text>
  <!-- Line 5: comment -->
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 1. 현재 운영 버전 백업</text>
  <!-- Line 6: cp -->
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">cp</text>
  <text x="100" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -r /deploy/prod /deploy/backup/$(</text>
  <text x="340" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">date</text>
  <text x="372" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> +%Y%m%d_%H%M%S</text>
  <text x="490" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <!-- Line 7: comment -->
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 2. 핫픽스 빌드 검증</text>
  <!-- Line 8: if -->
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">if</text>
  <text x="100" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> [ ! -f </text>
  <text x="160" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"./dist/index.html"</text>
  <text x="302" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ]; </text>
  <text x="332" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">then</text>
  <!-- Line 9: echo error -->
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  </text>
  <text x="89" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">echo</text>
  <text x="129" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555"> "ERROR: 빌드 파일 없음"</text>
  <!-- Line 10: exit -->
  <text x="89" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  exit</text>
  <text x="134" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> 1</text>
  <!-- Line 11: fi -->
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">fi</text>
  <!-- Line 12: comment -->
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 3. 스테이징 배포 및 스모크 테스트</text>
  <!-- Line 13: rsync -->
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">rsync</text>
  <text x="116" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -av ./dist/ stg:/deploy/stg/ &amp;&amp; </text>
  <text x="340" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">curl</text>
  <text x="372" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -f http://stg.example.com/health</text>
  <!-- Line 14: prod deploy -->
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">rsync</text>
  <text x="116" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -av ./dist/ prod:/deploy/prod/ &amp;&amp; </text>
  <text x="344" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">echo</text>
  <text x="384" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> "=== 배포 완료 ==="</text>
</svg>
