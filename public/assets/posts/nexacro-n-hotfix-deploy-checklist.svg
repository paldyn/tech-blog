  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">핫픽스 배포 스크립트 체크리스트</text>

  <!-- Code block -->
