  <!-- Line numbers background -->
  <rect x="24" y="68" width="40" height="288" rx="6" fill="#0a0a0a"/>
  <line x1="64" y1="68" x2="64" y2="356" stroke="#1e2a3a" stroke-width="1"/>

  <!-- Line numbers -->
  <text x="52" y="92"  font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a6e" text-anchor="end">1</text>
  <text x="52" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a6e" text-anchor="end">2</text>
