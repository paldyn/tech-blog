<svg xmlns="http://www.w3.org/2000/svg" width="880" height="350" viewBox="0 0 880 350">
  <rect width="880" height="350" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JShell REPL 동작 원리</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">READ → EVAL → PRINT → LOOP 사이클로 Java 코드를 즉시 실행</text>

  <!-- READ box -->
  <rect x="100" y="100" width="170" height="120" fill="#0f1a2e" rx="8" stroke="#1e2d4a"/>
  <text x="185" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">READ</text>
  <line x1="118" y1="134" x2="252" y2="134" stroke="#1e2d4a"/>
  <text x="185" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">입력 읽기</text>
  <text x="185" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">스니펫 입력 단계</text>

  <!-- Forward arrow 1: READ → EVAL -->
  <!-- shaft: 272→333 (61px), head: 333→353 (20px), head height: 150→170 (20px) -->
  <polygon points="272,156 333,156 333,150 353,160 333,170 333,164 272,164" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>

  <!-- EVAL box -->
  <rect x="355" y="100" width="170" height="120" fill="#0f2310" rx="8" stroke="#1e3a1a"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">EVAL</text>
  <line x1="373" y1="134" x2="507" y2="134" stroke="#1e3a1a"/>
  <text x="440" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">컴파일·실행</text>
  <text x="440" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">JVM 바이트코드 처리</text>

  <!-- Forward arrow 2: EVAL → PRINT -->
  <!-- shaft: 527→588 (61px), head: 588→608 (20px), head height: 150→170 (20px) -->
  <polygon points="527,156 588,156 588,150 608,160 588,170 588,164 527,164" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>

  <!-- PRINT box -->
  <rect x="610" y="100" width="170" height="120" fill="#1a1510" rx="8" stroke="#3a2e1a"/>
  <text x="695" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#ce9178" text-anchor="middle">PRINT</text>
  <line x1="628" y1="134" x2="762" y2="134" stroke="#3a2e1a"/>
  <text x="695" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">결과 즉시 출력</text>
  <text x="695" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">x ==&gt; 값</text>

  <!-- Return loop path: PRINT → (down/around) → READ -->
  <polyline points="780,160 820,160 820,270 60,270 60,160 82,160" stroke="#7777cc" stroke-width="2" fill="none" stroke-linejoin="miter"/>
  <!-- Arrowhead at end pointing right, entering READ box left edge (x=100) -->
  <!-- base at x=82, tip at x=100, y range 151~169 (18px ≥16px) -->
  <polygon points="82,151 82,169 100,160" fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>

  <!-- LOOP label below the bottom horizontal segment -->
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">반복 (LOOP)</text>
</svg>
