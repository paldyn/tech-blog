<svg width="880" height="360" viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8">JavaScript 주요 역사</text>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#555">10일간의 탄생부터 풀스택 언어까지</text>

  <!-- Timeline line -->
  <line x1="80" y1="180" x2="800" y2="180" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Events -->
  <!-- 1995 -->
  <circle cx="120" cy="180" r="7" fill="#d4a84b"/>
  <line x1="120" y1="173" x2="120" y2="120" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="120" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#d4a84b">1995</text>
  <text x="120" y="130" text-anchor="middle" font-size="11" fill="#888">탄생</text>
  <text x="120" y="145" text-anchor="middle" font-size="10" fill="#555">Netscape</text>
  <text x="120" y="210" text-anchor="middle" font-size="10" fill="#444">10일 만에</text>
  <text x="120" y="224" text-anchor="middle" font-size="10" fill="#444">개발</text>

  <!-- 1997 -->
  <circle cx="230" cy="180" r="7" fill="#6abf5e"/>
  <line x1="230" y1="187" x2="230" y2="240" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="230" y="254" text-anchor="middle" font-size="13" font-weight="700" fill="#6abf5e">1997</text>
  <text x="230" y="270" text-anchor="middle" font-size="11" fill="#888">표준화</text>
  <text x="230" y="285" text-anchor="middle" font-size="10" fill="#555">ES1 발표</text>
  <text x="230" y="110" text-anchor="middle" font-size="10" fill="#444">ECMAScript</text>
  <text x="230" y="124" text-anchor="middle" font-size="10" fill="#444">1st Edition</text>

  <!-- 2005 -->
  <circle cx="370" cy="180" r="7" fill="#6b9fff"/>
  <line x1="370" y1="173" x2="370" y2="120" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="370" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#6b9fff">2005</text>
  <text x="370" y="130" text-anchor="middle" font-size="11" fill="#888">Ajax 시대</text>
  <text x="370" y="145" text-anchor="middle" font-size="10" fill="#555">Google Maps</text>
  <text x="370" y="210" text-anchor="middle" font-size="10" fill="#444">비동기</text>
  <text x="370" y="224" text-anchor="middle" font-size="10" fill="#444">통신 붐</text>

  <!-- 2009 -->
  <circle cx="510" cy="180" r="7" fill="#c678dd"/>
  <line x1="510" y1="187" x2="510" y2="240" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
