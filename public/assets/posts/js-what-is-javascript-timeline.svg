<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JavaScript 역사 타임라인</text>

  <!-- Timeline line -->
  <line x1="80" y1="140" x2="800" y2="140" stroke="#333" stroke-width="2"/>

  <!-- 1995 -->
  <circle cx="120" cy="140" r="8" fill="#e8c55a" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="120" y1="132" x2="120" y2="100" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="120" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8c55a" text-anchor="middle">1995</text>
  <text x="120" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Mocha</text>
  <text x="120" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">탄생 (Brendan Eich)</text>

  <!-- 1997 -->
  <circle cx="230" cy="140" r="8" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="230" y1="132" x2="230" y2="100" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">1997</text>
  <text x="230" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ES1</text>
  <text x="230" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">ECMAScript 표준화</text>

  <!-- 2009 -->
  <circle cx="400" cy="140" r="8" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="400" y1="148" x2="400" y2="200" stroke="#55c555" stroke-width="1.5"/>
  <text x="400" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">2009</text>
  <text x="400" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Node.js</text>
  <text x="400" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">서버 사이드 JS</text>

  <!-- 2015 -->
  <circle cx="560" cy="140" r="10" fill="#7777cc" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="560" y1="132" x2="560" y2="90" stroke="#7777cc" stroke-width="1.5"/>
  <text x="560" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">2015</text>
  <text x="560" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ES6 / ES2015</text>
  <text x="560" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">현대 JS의 시작</text>

  <!-- 2020+ -->
  <circle cx="740" cy="140" r="8" fill="#e05555" stroke="#0a0a0a" stroke-width="2"/>
  <line x1="740" y1="148" x2="740" y2="200" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">2020+</text>
  <text x="740" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">매년 신규 버전</text>
  <text x="740" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">연간 릴리즈 주기</text>

  <!-- Code block -->
  <rect x="60" y="280" width="760" height="140" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// JavaScript의 다양한 실행 환경</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const</text><text x="132" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> environments = [</text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  'Browser (Chrome, Firefox, Safari)'</text><text x="500" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">,</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  'Node.js (서버)'</text><text x="268" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">,</text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  'Deno, Bun (차세대 런타임)'</text><text x="380" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">,</text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  'Edge Workers (Cloudflare 등)'</text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">];</text>

  <!-- Footer -->
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
