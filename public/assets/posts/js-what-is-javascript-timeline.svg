<svg width="880" height="360" viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">JavaScript 주요 역사</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#666">10일 만의 탄생부터 풀스택 언어까지</text>

  <!-- Timeline base line -->
  <line x1="80" y1="190" x2="800" y2="190" stroke="#333" stroke-width="1.5"/>

  <!-- Event 1: 1995 (above) -->
  <circle cx="100" cy="190" r="7" fill="#e09b5e"/>
  <text x="100" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#e09b5e">1995</text>
  <text x="100" y="168" text-anchor="middle" font-size="12" fill="#aaa">탄생</text>
  <text x="100" y="220" text-anchor="middle" font-size="11" fill="#666">Netscape</text>
  <text x="100" y="236" text-anchor="middle" font-size="10" fill="#555">10일만에 작성</text>

  <!-- Event 2: 1997 (below) -->
  <circle cx="240" cy="190" r="7" fill="#77cc88"/>
  <text x="240" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#77cc88">1997</text>
  <text x="240" y="240" text-anchor="middle" font-size="12" fill="#aaa">표준화</text>
  <text x="240" y="148" text-anchor="middle" font-size="11" fill="#666">ECMAScript</text>
  <text x="240" y="168" text-anchor="middle" font-size="10" fill="#555">1st Edition</text>

  <!-- Event 3: 2005 (above) -->
  <circle cx="380" cy="190" r="7" fill="#7799cc"/>
  <text x="380" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#7799cc">2005</text>
  <text x="380" y="168" text-anchor="middle" font-size="12" fill="#aaa">Ajax 시대</text>
  <text x="380" y="220" text-anchor="middle" font-size="11" fill="#666">Google Maps</text>
  <text x="380" y="236" text-anchor="middle" font-size="10" fill="#555">동적 웹의 시작</text>

  <!-- Event 4: 2009 (below) -->
  <circle cx="520" cy="190" r="7" fill="#cc88cc"/>
  <text x="520" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#cc88cc">2009</text>
  <text x="520" y="240" text-anchor="middle" font-size="12" fill="#aaa">서버 진출</text>
  <text x="520" y="148" text-anchor="middle" font-size="11" fill="#666">Node.js 탄생</text>
  <text x="520" y="168" text-anchor="middle" font-size="10" fill="#555" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">Ryan Dahl</text>

  <!-- Event 5: 2015 (above) -->
  <circle cx="660" cy="190" r="7" fill="#cc6666"/>
  <text x="660" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#cc6666">2015</text>
  <text x="660" y="168" text-anchor="middle" font-size="12" fill="#aaa">대혁신</text>
  <text x="660" y="220" text-anchor="middle" font-size="11" fill="#666">ES6 (ES2015)</text>
  <text x="660" y="236" text-anchor="middle" font-size="10" fill="#555">클래스·화살표·모듈</text>

  <!-- Event 6: 2020+ (below) -->
  <circle cx="780" cy="190" r="7" fill="#5ac4d4"/>
  <text x="780" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#5ac4d4">2020+</text>
  <text x="780" y="240" text-anchor="middle" font-size="12" fill="#aaa">풀스택</text>
  <text x="780" y="148" text-anchor="middle" font-size="11" fill="#666">매년 업데이트</text>
  <text x="780" y="168" text-anchor="middle" font-size="10" fill="#555">ES2020 ~</text>

  <!-- Footer -->
  <text x="440" y="316" text-anchor="middle" font-size="11" fill="#666">ECMAScript는 2015년 이후 매년 새 버전이 발표되고 있다 (ES2015, ES2016, ...)</text>
  <text x="440" y="340" text-anchor="middle" font-size="10" fill="#444">한 언어가 30년 동안 웹의 표준으로 살아남은 것은 드문 일이다</text>
</svg>
