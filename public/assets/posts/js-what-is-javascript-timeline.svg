  <text x="510" y="270" text-anchor="middle" font-size="11" fill="#888">서버 진출</text>
  <text x="510" y="285" text-anchor="middle" font-size="10" fill="#555">Node.js 탄생</text>
  <text x="510" y="110" text-anchor="middle" font-size="10" fill="#444">Ryan Dahl</text>
  <text x="510" y="124" text-anchor="middle" font-size="10" fill="#444">Ryan Dahl</text>

  <!-- 2015 -->
  <circle cx="650" cy="180" r="7" fill="#e06c75"/>
  <line x1="650" y1="173" x2="650" y2="120" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="650" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#e06c75">2015</text>
  <text x="650" y="130" text-anchor="middle" font-size="11" fill="#888">대혁신</text>
  <text x="650" y="145" text-anchor="middle" font-size="10" fill="#555">ES6(ES2015)</text>
  <text x="650" y="210" text-anchor="middle" font-size="10" fill="#444">클래스·화살표</text>
  <text x="650" y="224" text-anchor="middle" font-size="10" fill="#444">함수·모듈</text>

  <!-- 2020+ -->
  <circle cx="780" cy="180" r="7" fill="#56b6c2"/>
  <line x1="780" y1="187" x2="780" y2="240" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="780" y="254" text-anchor="middle" font-size="13" font-weight="700" fill="#56b6c2">2020+</text>
  <text x="780" y="270" text-anchor="middle" font-size="11" fill="#888">풀스택</text>
  <text x="780" y="285" text-anchor="middle" font-size="10" fill="#555">매년 업데이트</text>

  <!-- Bottom note -->
  <text x="440" y="332" text-anchor="middle" font-size="12" fill="#444">ECMAScript는 2015년 이후 매년 새 버전이 발표되고 있습니다 (ES2015, ES2016, …)</text>
</svg>
