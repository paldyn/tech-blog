<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">chown · chgrp 문법과 동작</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">파일 소유자(user)와 그룹(group) 변경</text>

  <!-- chown section -->
  <text x="60" y="100" font-size="15" font-weight="700" fill="#7ec8e3">chown</text>
  <rect x="60" y="108" width="380" height="112" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="128" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 소유자만 변경</text>
  <text x="76" y="146" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chown </text>
  <text x="116" y="146" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">alice file.txt</text>
  <line x1="76" y1="158" x2="424" y2="158" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="176" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 소유자 + 그룹 동시 변경</text>
  <text x="76" y="194" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chown </text>
  <text x="116" y="194" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">alice:devteam file.txt</text>
  <line x1="76" y1="206" x2="424" y2="206" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="224" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 그룹만 변경 (user 생략)</text>
  <text x="76" y="242" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chown </text>
  <text x="116" y="242" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">:devteam file.txt</text>

  <!-- chgrp section -->
  <text x="460" y="100" font-size="15" font-weight="700" fill="#55c555">chgrp</text>
  <rect x="460" y="108" width="380" height="112" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="476" y="128" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 그룹 변경</text>
  <text x="476" y="146" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">chgrp </text>
  <text x="516" y="146" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">devteam file.txt</text>
  <line x1="476" y1="158" x2="824" y2="158" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="176" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 재귀 적용</text>
  <text x="476" y="194" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">chgrp </text>
  <text x="516" y="194" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">-R devteam /var/www/</text>
  <line x1="476" y1="206" x2="824" y2="206" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="224" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># UID/GID 숫자로도 지정 가능</text>
  <text x="476" y="242" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">chgrp </text>
  <text x="516" y="242" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">1001 file.txt</text>

  <!-- Ownership model diagram -->
  <text x="60" y="248" font-size="14" font-weight="600" fill="#888">소유권 모델</text>
  <rect x="60" y="256" width="760" height="90" rx="8" fill="#0e1018" stroke="#3a4a6e"/>

  <!-- Owner box -->
  <rect x="90" y="274" width="160" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">소유자 (UID)</text>
  <text x="170" y="316" text-anchor="middle" font-size="12" fill="#e8e8e8">alice (1000)</text>

  <!-- Arrow -->
  <text x="278" y="304" text-anchor="middle" font-size="20" fill="#555">→</text>

  <!-- File box -->
  <rect x="310" y="274" width="260" height="52" rx="6" fill="#141622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="292" text-anchor="middle" font-size="11" fill="#888">파일 메타데이터</text>
  <text x="370" y="312" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">UID=1000  GID=1001</text>

  <!-- Arrow -->
  <text x="598" y="304" text-anchor="middle" font-size="20" fill="#555">←</text>

  <!-- Group box -->
  <rect x="628" y="274" width="160" height="52" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="708" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">그룹 (GID)</text>
  <text x="708" y="316" text-anchor="middle" font-size="12" fill="#e8e8e8">devteam (1001)</text>

  <!-- Footer -->
  <text x="440" y="364" text-anchor="middle" font-size="12" fill="#555">chown은 root만 사용 가능 · chgrp은 자신이 속한 그룹으로만 변경 가능 (비-root)</text>
</svg>
