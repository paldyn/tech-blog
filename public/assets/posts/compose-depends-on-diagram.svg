<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">compose depends_on — 서비스 의존성</text>

  <!-- Section label -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">시작 순서 (db → api → web)</text>

  <!-- db box -->
  <rect x="60" y="100" width="180" height="64" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">db</text>
  <text x="150" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">PostgreSQL · 5432</text>

  <!-- arrow db→api -->
  <line x1="240" y1="132" x2="318" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#a1)"/>
  <text x="279" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">시작 후</text>

  <!-- api box -->
  <rect x="320" y="100" width="180" height="64" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="410" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">api</text>
  <text x="410" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">FastAPI · 8080</text>

  <!-- arrow api→web -->
  <line x1="500" y1="132" x2="578" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#a1)"/>
  <text x="539" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">시작 후</text>

  <!-- web box -->
  <rect x="580" y="100" width="180" height="64" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">web</text>
  <text x="670" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Nginx · 80</text>

  <text x="440" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">web.depends_on: [api]  ·  api.depends_on: [db]</text>

  <!-- Divider -->
  <line x1="60" y1="202" x2="820" y2="202" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Condition section -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">condition 타입 (긴 구문에서 사용)</text>

  <!-- service_started box -->
  <rect x="60" y="244" width="236" height="96" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="178" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">service_started</text>
  <text x="178" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">컨테이너 프로세스 시작</text>
  <text x="178" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본값 · 즉각적</text>
  <text x="178" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">DB 실제 준비와 무관</text>

  <!-- service_healthy box -->
  <rect x="322" y="244" width="236" height="96" fill="#1a1400" rx="8" stroke="#e0a055" stroke-width="1.5"/>
  <text x="440" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">service_healthy</text>
  <text x="440" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">HEALTHCHECK 통과 후</text>
  <text x="440" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">healthcheck 설정 필수</text>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">실제 서비스 준비 보장</text>

  <!-- service_completed_successfully box -->
  <rect x="584" y="244" width="236" height="96" fill="#150a1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="702" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">service_completed_</text>
  <text x="702" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">successfully</text>
  <text x="702" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">exit code 0 종료 후</text>
  <text x="702" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">일회성 init/migrate 용</text>
  <text x="702" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">exit 1이면 의존 서비스 중단</text>

  <!-- Divider -->
  <line x1="60" y1="360" x2="820" y2="360" stroke="#2a2a3a" stroke-width="1"/>

  <!-- restart option -->
  <text x="60" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">restart 옵션</text>

  <rect x="60" y="402" width="360" height="56" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">restart: true</text>
  <text x="240" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">의존 서비스 비정상 종료 시 재시작</text>

  <rect x="440" y="402" width="360" height="56" fill="#1a0a0a" rx="6" stroke="#555" stroke-width="1"/>
  <text x="620" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">restart: false (기본값)</text>
  <text x="620" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">의존 서비스 실패해도 계속 실행</text>
</svg>
