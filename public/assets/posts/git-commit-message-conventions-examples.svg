<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">좋은 vs 나쁜 커밋 메시지</text>

  <!-- Bad examples -->
  <rect x="60" y="68" width="360" height="280" rx="8" fill="#070b14" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="80" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">나쁜 메시지</text>

  <rect x="80" y="106" width="320" height="24" rx="4" fill="#1a0808"/>
  <text x="92" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">fix bug</text>

  <rect x="80" y="138" width="320" height="24" rx="4" fill="#1a0808"/>
  <text x="92" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">수정</text>

  <rect x="80" y="170" width="320" height="24" rx="4" fill="#1a0808"/>
  <text x="92" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">WIP</text>

  <rect x="80" y="202" width="320" height="24" rx="4" fill="#1a0808"/>
  <text x="92" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">asdfgh</text>

  <rect x="80" y="234" width="320" height="46" rx="4" fill="#1a0808"/>
  <text x="92" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">LoginPage 컴포넌트에서 사용자가</text>
  <text x="92" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">로그인할 때 발생하던 오류 수정</text>

  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문제: 무엇을, 왜 바꿨는지 불명확.</text>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">type 없음, 너무 짧거나 너무 김.</text>

  <!-- Good examples -->
  <rect x="450" y="68" width="370" height="280" rx="8" fill="#070b14" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="470" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">좋은 메시지</text>

  <rect x="470" y="106" width="330" height="24" rx="4" fill="#081408"/>
  <text x="482" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">fix(auth): resolve token expiry loop</text>

  <rect x="470" y="138" width="330" height="24" rx="4" fill="#081408"/>
  <text x="482" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">feat(ui): add dark mode toggle</text>

  <rect x="470" y="170" width="330" height="24" rx="4" fill="#081408"/>
  <text x="482" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">docs: update API auth examples</text>

  <rect x="470" y="202" width="330" height="62" rx="4" fill="#081408"/>
  <text x="482" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">refactor(api): extract rate limiter</text>
  <text x="482" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888"></text>
  <text x="482" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">Moves logic to middleware layer</text>
  <text x="482" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">for reuse across handlers.</text>

  <text x="470" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">type + scope + 짧은 imperative subject.</text>
  <text x="470" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">body는 선택, 그러나 WHY를 설명.</text>
</svg>
