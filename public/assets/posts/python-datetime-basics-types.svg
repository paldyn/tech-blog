<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">datetime 모듈 — 핵심 타입 4개</text>

  <defs>
    <marker id="arr-dt" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- date -->
  <rect x="60" y="80" width="360" height="110" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">date</text>
  <text x="76" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">date(year, month, day)</text>
  <text x="76" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">날짜만 저장 (시간 없음) · date.today() · date.fromisoformat()</text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">→ .year .month .day .weekday()</text>

  <!-- time -->
  <rect x="460" y="80" width="360" height="110" rx="8" fill="#111" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">time</text>
  <text x="476" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">time(hour, minute, second, microsecond)</text>
  <text x="476" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시간만 저장 (날짜 없음) · tzinfo 첨부 가능</text>
  <text x="476" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">→ .hour .minute .second .microsecond</text>

  <!-- datetime (date + time) -->
  <rect x="60" y="220" width="760" height="110" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">datetime (date + time 통합)</text>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">datetime(year, month, day, hour, minute, second, microsecond, tzinfo)</text>
  <text x="76" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">날짜 + 시간 · datetime.now() · datetime.utcnow() · datetime.fromisoformat()</text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">→ .date() .time() .timestamp() .isoformat() .strftime()</text>

  <!-- timedelta -->
  <rect x="60" y="360" width="760" height="110" rx="8" fill="#1a2a1a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555" text-anchor="middle">timedelta — 시간 간격</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">timedelta(days, seconds, microseconds, milliseconds, minutes, hours, weeks)</text>
  <text x="76" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">두 datetime의 차이 · 날짜 덧셈/뺄셈 · 음수 가능 · .total_seconds()</text>
  <text x="76" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">→ date1 - date2  또는  date + timedelta(days=7)</text>
</svg>
