<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 도입 ROI: 비용 vs 편익</text>

  <!-- Cost side -->
  <rect x="60" y="70" width="340" height="40" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">초기 비용</text>

  <rect x="60" y="120" width="160" height="60" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="140" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">학습 시간</text>
  <text x="140" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">~2주 기본 문법</text>

  <rect x="240" y="120" width="160" height="60" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="320" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">타이핑 오버헤드</text>
  <text x="320" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">초반 코드량 증가</text>

  <rect x="60" y="200" width="340" height="60" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">빌드 파이프라인 설정</text>
  <text x="230" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">tsconfig · 빌드 도구 연동 필요</text>

  <!-- Divider -->
  <line x1="440" y1="70" x2="440" y2="360" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Benefit side -->
  <rect x="480" y="70" width="340" height="40" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">장기 편익</text>

  <rect x="480" y="120" width="160" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">버그 감소</text>
  <text x="560" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">런타임 오류 15% 감소*</text>

  <rect x="660" y="120" width="160" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">개발 속도</text>
  <text x="740" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리팩터링 대폭 단축</text>

  <rect x="480" y="200" width="160" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">온보딩 단축</text>
  <text x="560" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">타입이 문서 역할</text>

  <rect x="660" y="200" width="160" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">코드 품질</text>
  <text x="740" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">설계 강제 효과</text>

  <!-- Break-even line -->
  <rect x="60" y="280" width="760" height="50" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">손익분기점: 대부분 프로젝트에서 2~4주 내</text>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">* Airbnb 자체 연구 — JS 버그의 38%가 TS로 사전 방지 가능</text>

  <text x="230" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">단기 비용 (일회성)</text>
  <text x="650" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">장기 편익 (복리 효과)</text>
</svg>
