<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">SCN 증가와 읽기 일관성 동작</text>

  <!-- Timeline axis -->
  <line x1="80" y1="110" x2="800" y2="110" stroke="#333" stroke-width="2"/>
  <text x="80" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SCN 1000</text>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SCN 1050</text>
  <text x="420" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SCN 1080</text>
  <text x="600" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SCN 1120</text>
  <text x="760" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SCN 1200</text>

  <!-- Time ticks -->
  <line x1="100" y1="105" x2="100" y2="115" stroke="#555" stroke-width="2"/>
  <line x1="270" y1="105" x2="270" y2="115" stroke="#555" stroke-width="2"/>
  <line x1="450" y1="105" x2="450" y2="115" stroke="#e05555" stroke-width="2"/>
  <line x1="630" y1="105" x2="630" y2="115" stroke="#55c555" stroke-width="2"/>
  <line x1="790" y1="105" x2="790" y2="115" stroke="#555" stroke-width="2"/>

  <!-- Session A: UPDATE + COMMIT -->
  <rect x="60" y="130" width="160" height="44" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">세션 A</text>
  <text x="140" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">UPDATE orders SET ...</text>

  <!-- Arrow Session A action -->
  <line x1="240" y1="152" x2="415" y2="152" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="310" y="130" width="140" height="44" rx="6" fill="#0a1020" stroke="#7ec8e3"/>
  <text x="380" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">COMMIT</text>
  <text x="380" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SCN=1080 할당</text>

  <!-- Session B: SELECT -->
  <rect x="60" y="220" width="160" height="44" rx="6" fill="#1a100a" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">세션 B</text>
  <text x="140" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SELECT 시작 SCN=1050</text>

  <!-- Session B long SELECT -->
  <line x1="240" y1="242" x2="786" y2="242" stroke="#e05555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="640" y="220" width="150" height="44" rx="6" fill="#1a0808" stroke="#e05555"/>
  <text x="715" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">블록 읽기</text>
  <text x="715" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SCN=1200에서 실행 중</text>

  <!-- CR block creation -->
  <rect x="310" y="310" width="360" height="80" rx="8" fill="#111" stroke="#555"/>
  <text x="490" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">CR 블록 생성 (읽기 일관성)</text>
  <text x="490" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">블록 SCN(1080) &gt; 세션 B 쿼리 SCN(1050)</text>
  <text x="490" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">→ Undo 적용해 SCN 1050 시점 CR 블록 생성</text>

  <!-- Arrow down from conflict point -->
  <line x1="490" y1="265" x2="490" y2="308" stroke="#555" stroke-width="1.5"/>
  <polygon points="483,308 497,308 490,320" fill="#555"/>

  <!-- Key note -->
  <rect x="60" y="415" width="760" height="48" rx="6" fill="#0f1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="437" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">Oracle 읽기 일관성: 세션 B는 SCN 1050 이전에 커밋된 데이터만 봄</text>
  <text x="440" y="457" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">세션 A의 커밋(SCN 1080)은 세션 B 쿼리 SCN(1050)보다 크므로 보이지 않음 — 잠금 없이 일관성 보장</text>
</svg>
