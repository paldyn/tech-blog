<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">순차 vs 랜덤 PK 인덱스 영향</text>

  <!-- Sequential -->
  <rect x="60" y="60" width="340" height="50" rx="8" fill="#0d2400" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">순차 증가 키 (BIGINT)</text>
  <text x="230" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">항상 B-Tree 오른쪽 끝에 삽입 → 페이지 분할 최소</text>

  <!-- Tree right-append visual -->
  <rect x="80" y="128" width="50" height="30" rx="4" fill="#1a2a3a" stroke="#55c555" stroke-width="1"/>
  <text x="105" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">1~100</text>
  <rect x="160" y="128" width="50" height="30" rx="4" fill="#1a2a3a" stroke="#55c555" stroke-width="1"/>
  <text x="185" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">101~200</text>
  <rect x="240" y="128" width="50" height="30" rx="4" fill="#1a2a3a" stroke="#55c555" stroke-width="1"/>
  <text x="265" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">201~300</text>
  <rect x="320" y="128" width="50" height="30" rx="4" fill="#0d2400" stroke="#55c555" stroke-width="2"/>
  <text x="345" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">301 →</text>
  <text x="230" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">새 레코드는 항상 우측에 추가</text>

  <!-- Random UUID -->
  <rect x="480" y="60" width="340" height="50" rx="8" fill="#1a1020" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">랜덤 UUID (v4)</text>
  <text x="650" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">B-Tree 임의 위치에 삽입 → 페이지 분할 빈번</text>

  <!-- Random tree visual -->
  <rect x="500" y="128" width="50" height="30" rx="4" fill="#1a1020" stroke="#e05555" stroke-width="1"/>
  <text x="525" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">ab3f...</text>
  <rect x="580" y="128" width="50" height="30" rx="4" fill="#1a1020" stroke="#e05555" stroke-width="1"/>
  <text x="605" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">2c9d...</text>
  <rect x="660" y="110" width="50" height="30" rx="4" fill="#2a1020" stroke="#e05555" stroke-width="2"/>
  <text x="685" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">f1a0...</text>
  <text x="650" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">삽입 위치 불규칙 → 분할 발생</text>

  <!-- Solution -->
  <rect x="60" y="206" width="760" height="106" rx="8" fill="#111822" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">해결책: 정렬 가능한 UUID — UUIDv7 / ULID</text>
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">타임스탬프 + 랜덤 조합으로 시간 순으로 정렬됨</text>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">UUIDv7 예: 018fda2a-5c3b-7xxx (앞 48비트 = Unix time ms)</text>
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MySQL 8.0.36+: uuid_to_bin(uuid, 1)로 swap 저장으로 유사 효과</text>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PostgreSQL 17+: gen_random_uuid() → UUIDv4; pg_idkit 확장으로 UUIDv7 생성</text>
</svg>
