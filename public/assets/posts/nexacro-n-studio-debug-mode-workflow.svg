<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Studio 디버그 모드 워크플로우</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">브레이크포인트 → 단계 실행 → 변수 감시 순서로 진행</text>

  <defs>
    <marker id="sd1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="105" width="160" height="65" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="2"/>
  <text x="140" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">① 브레이크포인트</text>
  <text x="140" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">코드 라인 좌측 클릭</text>
  <text x="140" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">빨간 점 표시</text>

  <line x1="220" y1="137" x2="270" y2="137" stroke="#7777cc" stroke-width="2" marker-end="url(#sd1)"/>

  <!-- Step 2 -->
  <rect x="270" y="105" width="160" height="65" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="2"/>
  <text x="350" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">② 디버그 실행</text>
  <text x="350" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">F5 또는 디버그 버튼</text>
  <text x="350" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">브라우저 실행</text>

  <line x1="430" y1="137" x2="480" y2="137" stroke="#7777cc" stroke-width="2" marker-end="url(#sd1)"/>

  <!-- Step 3 -->
  <rect x="480" y="105" width="160" height="65" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="2"/>
  <text x="560" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">③ 일시 정지</text>
  <text x="560" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">브레이크포인트 도달</text>
  <text x="560" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">실행 중단</text>

  <line x1="640" y1="137" x2="690" y2="137" stroke="#7777cc" stroke-width="2" marker-end="url(#sd1)"/>

  <!-- Step 4 -->
  <rect x="690" y="105" width="160" height="65" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="2"/>
  <text x="770" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">④ 단계 실행</text>
  <text x="770" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">F10: Step Over</text>
  <text x="770" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">F11: Step Into</text>

  <!-- Debug panels info -->
  <rect x="60" y="210" width="760" height="250" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="80" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Studio 디버그 패널 기능</text>

  <!-- Variables Watch -->
  <rect x="80" y="245" width="330" height="90" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">변수 감시 (Watch Window)</text>
  <text x="100" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 감시할 변수명을 직접 입력</text>
  <text x="100" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 현재 값과 타입을 실시간 표시</text>
  <text x="100" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• Dataset.getColumn() 표현식도 입력 가능</text>

  <!-- Call Stack -->
  <rect x="430" y="245" width="370" height="90" rx="6" fill="#0d0d1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="450" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">호출 스택 (Call Stack)</text>
  <text x="450" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 현재 함수 호출 체인 표시</text>
  <text x="450" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 상위 스택 프레임 클릭 시 해당 위치로 이동</text>
  <text x="450" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 재귀 호출이나 이벤트 체인 추적에 유용</text>

  <!-- Breakpoint types -->
  <rect x="80" y="350" width="700" height="90" rx="6" fill="#100d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="100" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">브레이크포인트 종류</text>
  <text x="100" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 일반 브레이크포인트: 라인 클릭 → 해당 라인 도달 시 정지</text>
  <text x="100" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 조건부 브레이크포인트: 우클릭 → Condition 입력 → 조건 충족 시만 정지 (예: i == 50)</text>
  <text x="100" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 비활성화: 체크박스 해제 → 코드는 유지하되 정지하지 않음 (나중에 재사용)</text>

  <!-- Keyboard shortcuts -->
  <rect x="60" y="470" width="760" height="20" rx="4" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="80" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단축키: F5 계속 실행 | F10 Step Over (함수 건너뜀) | F11 Step Into (함수 진입) | Shift+F11 Step Out | F9 브레이크포인트 토글</text>
</svg>
