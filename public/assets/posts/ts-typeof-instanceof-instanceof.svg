<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a050"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">instanceof 타입 가드</text>

  <!-- Class hierarchy diagram (left side) -->
  <text x="200" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9aa4b8">클래스 계층 구조</text>

  <!-- Animal base class -->
  <rect x="120" y="92" width="160" height="44" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="200" y="110" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 부모 클래스</text>
  <text x="200" y="128" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">Animal</text>

  <!-- Arrow down left -->
  <line x1="168" y1="136" x2="120" y2="176" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow down right -->
  <line x1="232" y1="136" x2="280" y2="176" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dog subclass -->
  <rect x="56" y="178" width="128" height="44" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="120" y="196" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 자식 클래스</text>
  <text x="120" y="214" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">Dog</text>

  <!-- Cat subclass -->
  <rect x="216" y="178" width="128" height="44" rx="8" fill="#1a1200" stroke="#e0a050" stroke-width="1.5"/>
  <text x="280" y="196" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 자식 클래스</text>
  <text x="280" y="214" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e0a050">Cat</text>

  <!-- extends labels -->
  <text x="128" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">extends</text>
  <text x="268" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">extends</text>

  <!-- instanceof check box (right side) -->
  <text x="600" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9aa4b8">instanceof 좁히기 예시</text>

  <rect x="420" y="92" width="420" height="178" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="436" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> makeSound(a: Animal) {</tspan></text>
  <text x="436" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (a </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> Dog) {</tspan></text>
  <text x="436" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// a: Dog</tspan></text>
  <text x="436" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    a.</tspan><tspan fill="#7ec8e3" font-weight="600">bark</tspan><tspan fill="#ffffff">();</tspan></text>
  <text x="436" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  } </tspan><tspan fill="#7ec8e3" font-weight="600">else if</tspan><tspan fill="#ffffff"> (a </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> Cat) {</tspan></text>
  <text x="436" y="209" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// a: Cat</tspan></text>
  <text x="436" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    a.</tspan><tspan fill="#7ec8e3" font-weight="600">meow</tspan><tspan fill="#ffffff">();</tspan></text>
  <text x="436" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  }</tspan></text>

  <!-- Result boxes -->
  <rect x="420" y="288" width="196" height="56" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="518" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">a instanceof Dog</text>
  <text x="518" y="328" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">a: <tspan fill="#55c555" font-weight="600">Dog</tspan> 으로 좁혀짐</text>

  <rect x="644" y="288" width="196" height="56" rx="8" fill="#1a1200" stroke="#e0a050" stroke-width="1.5"/>
  <text x="742" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a050">a instanceof Cat</text>
  <text x="742" y="328" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">a: <tspan fill="#e0a050" font-weight="600">Cat</tspan> 으로 좁혀짐</text>

  <!-- Key points box -->
  <rect x="40" y="292" width="360" height="140" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="220" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">instanceof 핵심 포인트</text>
  <text x="60" y="340"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2022; 프로토타입 체인을 검사합니다</text>
  <text x="60" y="362"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2022; 클래스 인스턴스 구분에 사용합니다</text>
  <text x="60" y="384"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2022; 자식 클래스도 부모 instanceof에 해당합니다</text>
  <text x="60" y="406"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">&#x2022; 인터페이스에는 사용할 수 없습니다</text>

  <!-- Arrow from check to result boxes -->
  <line x1="518" y1="270" x2="518" y2="286" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="742" y1="270" x2="742" y2="286" stroke="#e0a050" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Arrow from class hierarchy to check box -->
  <line x1="360" y1="157" x2="418" y2="157" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="388" y="150"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">사용</text>
</svg>
