<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="a2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="a3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a055"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">compose watch — 파일 변경 자동 반응</text>

  <!-- Action types -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">action 타입</text>

  <!-- sync box -->
  <rect x="60" y="100" width="240" height="100" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">sync</text>
  <text x="180" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">파일을 컨테이너로 즉시 복사</text>
  <text x="180" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">컨테이너 재시작 없음</text>
  <text x="180" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Python, Node.js 핫리로드에 적합</text>

  <!-- rebuild box -->
  <rect x="320" y="100" width="240" height="100" fill="#1a1400" rx="8" stroke="#e0a055" stroke-width="1.5"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a055" text-anchor="middle">rebuild</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">이미지 재빌드 + 컨테이너 교체</text>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">시간이 걸림</text>
  <text x="440" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Dockerfile, go 소스 변경 시</text>

  <!-- sync+restart box -->
  <rect x="580" y="100" width="240" height="100" fill="#150a1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">sync+restart</text>
  <text x="700" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">sync 후 컨테이너만 재시작</text>
  <text x="700" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이미지 재빌드 없음 (빠름)</text>
  <text x="700" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">설정 파일 변경 시</text>

  <!-- Divider -->
  <line x1="60" y1="222" x2="820" y2="222" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Flow diagram -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">작동 흐름 (sync 예시)</text>

  <!-- Step boxes -->
  <rect x="60" y="264" width="140" height="50" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="130" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">파일 변경</text>
  <text x="130" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">호스트에서</text>

  <line x1="200" y1="289" x2="238" y2="289" stroke="#7ec8e3" stroke-width="2" marker-end="url(#a1)"/>

  <rect x="240" y="264" width="140" height="50" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="310" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">watch 감지</text>
  <text x="310" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">path 패턴 매칭</text>

  <line x1="380" y1="289" x2="418" y2="289" stroke="#7ec8e3" stroke-width="2" marker-end="url(#a1)"/>

  <rect x="420" y="264" width="140" height="50" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="490" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">컨테이너 sync</text>
  <text x="490" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">target 경로로 복사</text>

  <line x1="560" y1="289" x2="598" y2="289" stroke="#55c555" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="600" y="264" width="160" height="50" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="680" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">앱 자동 갱신</text>
  <text x="680" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">핫리로더가 감지</text>

  <!-- Divider -->
  <line x1="60" y1="338" x2="820" y2="338" stroke="#2a2a3a" stroke-width="1"/>

  <!-- ignore patterns note -->
  <text x="60" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">ignore 패턴 (자동 제외)</text>

  <rect x="60" y="378" width="750" height="72" fill="#1a1a1a" rx="6" stroke="#3a3a3a" stroke-width="1"/>
  <text x="76" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기본 제외: node_modules/, .git/, __pycache__/, *.pyc, .DS_Store</text>
  <text x="76" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추가 ignore: watch.ignore 배열로 직접 지정 가능 (glob 패턴)</text>
  <text x="76" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">예: ignore: ["*.test.ts", "**/*.md", "dist/"]</text>
</svg>
