<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">useActionState 데이터 흐름</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Action 결과와 pending을 하나의 훅으로</text>

  <!-- API signature box -->
  <rect x="60" y="94" width="760" height="52" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="116" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> [state, formAction, isPending] = useActionState(action, initialState);</text>
  <text x="440" y="134" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">// action(prevState, formData) → newState</text>

  <!-- Flow boxes -->
  <rect x="60" y="170" width="140" height="60" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="130" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">initialState</text>
  <text x="130" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">초기 상태</text>
  <text x="130" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">설정</text>

  <line x1="200" y1="200" x2="258" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="260" y="170" width="160" height="60" rx="10" fill="#2a1a0d" stroke="#e05555" stroke-width="2"/>
  <text x="340" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">formAction</text>
  <text x="340" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">form action=에</text>
  <text x="340" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전달</text>

  <line x1="420" y1="200" x2="478" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="480" y="170" width="160" height="60" rx="10" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="560" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">action 실행</text>
  <text x="560" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(prevState,</text>
  <text x="560" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">formData) 인자</text>

  <line x1="640" y1="200" x2="698" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="700" y="170" width="120" height="60" rx="10" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="760" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">newState</text>
  <text x="760" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반환값이</text>
  <text x="760" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">state가 됨</text>

  <!-- Code: useActionState pattern -->
  <rect x="60" y="258" width="760" height="216" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 타입 정의</text>
  <text x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan> FormState = &#123; message: <tspan fill="#7ec8e3" font-weight="600">string</tspan>; error: <tspan fill="#7ec8e3" font-weight="600">string</tspan> | <tspan fill="#b5cea8">null</tspan> &#125;;</text>
  <text x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">async function</tspan> submitAction(</text>
  <text x="76" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  prevState: FormState, formData: FormData</text>
  <text x="76" y="349" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">): Promise&lt;FormState&gt; &#123;</text>
  <text x="76" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> name = formData.get(<tspan fill="#ce9178">'name'</tspan>) <tspan fill="#7ec8e3" font-weight="600">as string</tspan>;</text>
  <text x="76" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">if</tspan> (!name) <tspan fill="#7ec8e3" font-weight="600">return</tspan> &#123; message: <tspan fill="#ce9178">''</tspan>, error: <tspan fill="#ce9178">'이름 필수'</tspan> &#125;;</text>
  <text x="76" y="403" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">await</tspan> save(name);</text>
  <text x="76" y="421" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> &#123; message: <tspan fill="#ce9178">`${name} 저장됨`</tspan>, error: <tspan fill="#b5cea8">null</tspan> &#125;;</text>
  <text x="76" y="439" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;</text>
  <text x="76" y="457" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// [state, formAction, isPending] = useActionState(submitAction, &#123;...&#125;)</text>
  <text x="76" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">// &#8593; 반환값: [현재상태, form에 전달할 action 래퍼, 진행 여부]</text>
</svg>
