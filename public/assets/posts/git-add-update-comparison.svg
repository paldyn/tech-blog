  <text x="80" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">README.md (modified)  ·  src/auth.js (new, untracked)  ·  old.js (deleted)</text>

  <!-- -u column -->
  <rect x="60" y="144" width="234" height="220" rx="8" fill="#070b14" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="177" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">git add -u</text>
  <text x="177" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">update: 추적 파일만</text>

  <text x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">✓ README.md</text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">✗ src/auth.js</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">  (untracked — 제외)</text>
  <text x="80" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">✓ old.js (deleted)</text>

  <rect x="76" y="300" width="202" height="44" rx="4" fill="#0a1a08"/>
  <text x="86" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">새 파일을 의도적으로</text>
  <text x="86" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">제외하고 싶을 때 유용</text>

  <!-- -A column -->
  <rect x="323" y="144" width="234" height="220" rx="8" fill="#070b14" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="440" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">git add -A</text>
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">all: 전체 변경</text>

  <text x="343" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">✓ README.md</text>
