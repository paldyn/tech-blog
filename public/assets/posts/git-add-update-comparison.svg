  <text x="343" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">  (신규도 포함)</text>
  <text x="343" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">✓ old.js (deleted)</text>

  <rect x="339" y="300" width="202" height="44" rx="4" fill="#1a0a0a"/>
  <text x="349" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">.gitignore 미비 시</text>
  <text x="349" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">민감 파일 포함 위험</text>

  <!-- . column -->
  <rect x="586" y="144" width="234" height="220" rx="8" fill="#070b14" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="703" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">git add .</text>
  <text x="703" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">현재 디렉터리 (Git ≥2)</text>

  <text x="606" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">✓ README.md</text>
  <text x="606" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">✓ src/auth.js</text>
  <text x="606" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">  (cwd 기준)</text>
  <text x="606" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">✓ old.js (deleted)</text>

  <rect x="602" y="300" width="202" height="44" rx="4" fill="#0a0a1a"/>
  <text x="612" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Git &lt;2.0: cwd 하위만.</text>
  <text x="612" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Git ≥2.0: -A와 동일.</text>
</svg>
