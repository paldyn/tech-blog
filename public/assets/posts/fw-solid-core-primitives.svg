<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SolidJS 반응성 프리미티브</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">createSignal · createMemo · createEffect · createResource</text>

  <!-- createMemo -->
  <rect x="60" y="100" width="230" height="72" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">createMemo(fn)</text>
  <text x="175" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">읽기 전용 파생 Signal</text>
  <text x="175" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">의존성 변경 시만 재계산</text>

  <!-- createResource -->
  <rect x="310" y="100" width="260" height="72" rx="6" fill="#1f1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">createResource(source, fn)</text>
  <text x="440" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비동기 데이터 로딩</text>
  <text x="440" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">loading / error 상태 내장</text>

  <!-- createStore -->
  <rect x="590" y="100" width="250" height="72" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="715" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">createStore(obj)</text>
  <text x="715" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">중첩 객체 세밀한 반응성</text>
  <text x="715" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">produce(Immer 유사) 지원</text>

  <!-- Code block -->
  <rect x="60" y="195" width="760" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// createResource — Suspense와 함께</text>
  <text x="76" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> [userId] = createSignal(<tspan fill="#b5cea8">1</tspan>)</text>
  <text x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> [user] = createResource(userId, fetchUser)</text>
  <text x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8">// userId가 바뀌면 fetchUser(newId) 자동 호출</tspan></text>
  <text x="76" y="307" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">return</tspan> (</text>
  <text x="76" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  &lt;Suspense fallback=&#123;&lt;Loading /&gt;&#125;&gt;</text>
  <text x="76" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    &lt;Show when=&#123;!user.error&#125; fallback=&#123;&lt;Error /&gt;&#125;&gt;</text>
  <text x="76" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      &lt;p&gt;&#123;user()?.name&#125;&lt;/p&gt;</text>
  <text x="76" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    &lt;/Show&gt;</text>
</svg>
