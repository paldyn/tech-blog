<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JDK · JRE · JVM 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">세 개념의 포함 관계와 역할</text>

  <!-- JDK outer box -->
  <rect x="60" y="95" width="760" height="400" rx="10" fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">JDK — Java Development Kit</text>
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">javac, jlink, jmod, jshell, jdb, jpackage …</text>

  <!-- JRE box inside JDK -->
  <rect x="80" y="155" width="720" height="305" rx="8" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="100" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">JRE — Java Runtime Environment</text>
  <text x="100" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">java.base, java.util, java.io … (표준 라이브러리 + JVM)</text>

  <!-- JVM box inside JRE -->
  <rect x="100" y="210" width="680" height="230" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">JVM — Java Virtual Machine</text>

  <!-- ClassLoader -->
  <rect x="120" y="245" width="180" height="60" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="210" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Class Loader</text>
  <text x="210" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.class 로드·링크·초기화</text>

  <!-- Runtime Data Areas -->
  <rect x="325" y="245" width="200" height="60" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="425" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Runtime Data Areas</text>
  <text x="425" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Heap · Stack · Method Area</text>

  <!-- Execution Engine -->
  <rect x="550" y="245" width="210" height="60" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="655" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Execution Engine</text>
  <text x="655" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Interpreter + JIT Compiler</text>

  <!-- arrows between JVM components -->
  <line x1="300" y1="275" x2="323" y2="275" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="525" y1="275" x2="548" y2="275" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Native Interface & Native Libraries -->
  <rect x="120" y="330" width="280" height="90" rx="6" fill="#111827" stroke="#555" stroke-width="1"/>
  <text x="260" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Native Method Interface (JNI)</text>
  <text x="260" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C/C++ 네이티브 코드 호출 브릿지</text>
  <text x="260" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Native Libraries (OS 시스템 콜)</text>
  <text x="260" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">java.library.path</text>

  <!-- GC -->
  <rect x="440" y="330" width="320" height="90" rx="6" fill="#111827" stroke="#555" stroke-width="1"/>
  <text x="600" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Garbage Collector</text>
  <text x="600" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">G1GC (JDK 9+), ZGC, Shenandoah</text>
  <text x="600" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Heap 자동 메모리 관리</text>
  <text x="600" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">STW(Stop-The-World) 최소화</text>

  <!-- Footer -->
  <text x="440" y="515" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">JDK ⊇ JRE ⊇ JVM | JDK 11+ 이후 JRE 별도 배포 없이 JDK 단일 패키지 제공</text>
</svg>
