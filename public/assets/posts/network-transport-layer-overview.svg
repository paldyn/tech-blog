<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">전송 계층: 애플리케이션을 네트워크와 연결</text>

  <!-- Stack left (Sender) -->
  <text x="190" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">송신 측</text>

  <rect x="80" y="92" width="220" height="46" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="190" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">응용 계층 (HTTP, DNS…)</text>

  <rect x="80" y="144" width="220" height="46" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="190" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">전송 계층 (TCP / UDP)</text>

  <rect x="80" y="196" width="220" height="46" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="190" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">네트워크 계층 (IP)</text>

  <rect x="80" y="248" width="220" height="46" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="190" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">링크 계층 (이더넷)</text>

  <!-- Center vertical line -->
  <line x1="440" y1="80" x2="440" y2="380" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">네트워크</text>

  <!-- Arrows -->
  <line x1="300" y1="240" x2="560" y2="240" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Stack right (Receiver) -->
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">수신 측</text>

  <rect x="580" y="92" width="220" height="46" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">응용 계층 (HTTP, DNS…)</text>

  <rect x="580" y="144" width="220" height="46" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="690" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">전송 계층 (TCP / UDP)</text>

  <rect x="580" y="196" width="220" height="46" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">네트워크 계층 (IP)</text>

  <rect x="580" y="248" width="220" height="46" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="690" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">링크 계층 (이더넷)</text>

  <!-- Transport layer responsibilities -->
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">전송 계층의 핵심 역할</text>

  <rect x="60" y="334" width="180" height="100" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">다중화 / 역다중화</text>
  <text x="150" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">포트 번호로 여러</text>
  <text x="150" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">앱 동시 구분</text>
  <text x="150" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">src/dst port 활용</text>
  <text x="150" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">0~65535 범위</text>

  <rect x="260" y="334" width="180" height="100" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="350" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">신뢰성 (TCP만)</text>
  <text x="350" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">순서 보장, 재전송</text>
  <text x="350" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">오류 복구</text>
  <text x="350" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">흐름/혼잡 제어</text>
  <text x="350" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">연결 지향</text>

  <rect x="460" y="334" width="180" height="100" rx="6" fill="#111" stroke="#e8a030" stroke-width="1"/>
  <text x="550" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8a030" text-anchor="middle">세그멘테이션</text>
  <text x="550" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">큰 데이터를</text>
  <text x="550" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">작은 단위로 분할</text>
  <text x="550" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MSS 단위 분할</text>
  <text x="550" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수신 측 재조립</text>

  <rect x="660" y="334" width="180" height="100" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="750" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">오류 감지</text>
  <text x="750" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">체크섬으로</text>
  <text x="750" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비트 오류 탐지</text>
  <text x="750" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TCP/UDP 모두</text>
  <text x="750" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">pseudo 헤더 포함</text>
</svg>
