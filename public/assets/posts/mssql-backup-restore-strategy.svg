<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SQL Server 백업 유형과 복원 전략</text>

  <!-- Backup types row -->
  <rect x="60" y="76" width="200" height="88" rx="8" fill="#0a1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Full Backup</text>
  <text x="160" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">전체 DB 스냅샷</text>
  <text x="160" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">주 1회 (야간 오프피크)</text>
  <text x="160" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">복원 기준점 역할</text>

  <rect x="290" y="76" width="200" height="88" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Differential</text>
  <text x="390" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">마지막 Full 이후 변경분</text>
  <text x="390" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">일 1~2회 (중간 비용)</text>
  <text x="390" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">복원 시 Full + 최신 Diff</text>

  <rect x="520" y="76" width="200" height="88" rx="8" fill="#101030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="620" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Log Backup</text>
  <text x="620" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">로그 세그먼트 백업</text>
  <text x="620" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">15분~1시간 주기</text>
  <text x="620" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PITR의 핵심 (로그 체인)</text>

  <!-- RTO/RPO -->
  <rect x="60" y="184" width="760" height="68" rx="8" fill="#101010" stroke="#888" stroke-width="1"/>
  <text x="200" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">RPO (데이터 손실 허용)</text>
  <text x="200" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로그 백업 주기 = RPO</text>
  <text x="200" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">15분 주기 → 최대 15분 손실</text>

  <line x1="380" y1="200" x2="380" y2="244" stroke="#333" stroke-width="1"/>

  <text x="560" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">RTO (복구 시간 목표)</text>
  <text x="560" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Full 복원 + Diff + Log 적용 시간</text>
  <text x="560" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Diff 주기 짧을수록 Log 적용 수 ↓ → RTO ↓</text>

  <!-- Code -->
  <rect x="60" y="272" width="760" height="152" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- Full 백업 (압축, 체크섬)</text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">BACKUP DATABASE AdventureWorks TO DISK = 'D:\Backup\full.bak'</text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  WITH COMPRESSION, CHECKSUM, STATS = 5;</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 로그 백업 (15분 주기 Agent 작업)</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">BACKUP LOG AdventureWorks TO DISK = 'D:\Backup\log_20260524_1430.bak'</text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  WITH COMPRESSION, CHECKSUM;</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- CHECKSUM: 백업 파일 자체의 무결성 보장</text>

  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">백업은 저장했지만 복원을 테스트하지 않으면 의미 없다</text>
</svg>
