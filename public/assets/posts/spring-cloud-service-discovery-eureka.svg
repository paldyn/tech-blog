<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Eureka 서버 &amp; 클라이언트 설정</text>
  <text x="440" y="74" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" fill="#888">Spring Boot 기반 Eureka Server / Client 핵심 설정</text>

  <!-- Left panel header -->
  <rect x="60" y="94" width="364" height="34" rx="6" fill="#0f1929" stroke="#2d5a8e" stroke-width="1"/>
  <text x="242" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">Eureka Server</text>

  <!-- Left code box 1: Java config -->
  <rect x="60" y="136" width="364" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="76" y="157"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 서버 애플리케이션</text>

  <text xml:space="preserve" x="76" y="176"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">@SpringBootApplication</text>

  <text xml:space="preserve" x="76" y="195"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">@EnableEurekaServer</text>

  <text xml:space="preserve" x="76" y="214"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">public class</tspan>
    <tspan> DiscoveryServerApp {</tspan>
  </text>

  <text xml:space="preserve" x="90" y="233"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">public static void</tspan>
    <tspan> main(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">...</tspan>
    <tspan>) {}</tspan>
  </text>

  <text xml:space="preserve" x="76" y="252"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">} </text>

  <text xml:space="preserve" x="76" y="271"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 의존성: spring-cloud-starter-netflix-eureka-server</text>

  <!-- Left code box 2: YAML config -->
  <rect x="60" y="298" width="364" height="190" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="76" y="319"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8"># application.yml (서버)</text>

  <text xml:space="preserve" x="76" y="338"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">server:</text>

  <text xml:space="preserve" x="90" y="357"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">  port: </tspan>
    <tspan fill="#b5cea8">8761</tspan>
  </text>

  <text xml:space="preserve" x="76" y="376"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">eureka:</text>

  <text xml:space="preserve" x="76" y="395"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>  client:</tspan>
  </text>

  <text xml:space="preserve" x="76" y="414"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>    register-with-eureka: </tspan>
    <tspan fill="#b5cea8">false</tspan>
  </text>

  <text xml:space="preserve" x="76" y="433"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>    fetch-registry: </tspan>
    <tspan fill="#b5cea8">false</tspan>
  </text>

  <!-- Divider -->
  <line x1="436" y1="90" x2="436" y2="500" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right panel header -->
  <rect x="456" y="94" width="364" height="34" rx="6" fill="#0e1c0e" stroke="#2d6e2d" stroke-width="1"/>
  <text x="638" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">Eureka Client</text>

  <!-- Right code box 1: Java config -->
  <rect x="456" y="136" width="364" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="472" y="157"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 클라이언트 서비스</text>

  <text xml:space="preserve" x="472" y="176"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">@SpringBootApplication</text>

  <text xml:space="preserve" x="472" y="195"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 최신 버전: 어노테이션 생략 가능</text>

  <text xml:space="preserve" x="472" y="214"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">public class</tspan>
    <tspan> OrderServiceApp {</tspan>
  </text>

  <text xml:space="preserve" x="486" y="233"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">public static void</tspan>
    <tspan> main(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">...</tspan>
    <tspan>) {}</tspan>
  </text>

  <text xml:space="preserve" x="472" y="252"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">} </text>

  <text xml:space="preserve" x="472" y="271"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 의존성: spring-cloud-starter-netflix-eureka-client</text>

  <!-- Right code box 2: YAML config -->
  <rect x="456" y="298" width="364" height="190" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="472" y="319"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8"># application.yml (클라이언트)</text>

  <text xml:space="preserve" x="472" y="338"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">spring:</text>

  <text xml:space="preserve" x="472" y="357"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>  application:</tspan>
  </text>

  <text xml:space="preserve" x="472" y="376"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>    name: </tspan>
    <tspan fill="#ce9178">order-service</tspan>
  </text>

  <text xml:space="preserve" x="472" y="395"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">eureka:</text>

  <text xml:space="preserve" x="472" y="414"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>  client:</tspan>
  </text>

  <text xml:space="preserve" x="472" y="433"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>    service-url:</tspan>
  </text>

  <!-- Bottom note -->
  <text x="440" y="505" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">spring.application.name 이 Eureka에 등록되는 서비스 식별자가 된다</text>
</svg>
