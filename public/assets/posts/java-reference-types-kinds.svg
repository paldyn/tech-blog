<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Java 참조형(Reference Type) 4가지</text>

  <!-- ═══ Box 1: class ═══ -->
  <rect x="50" y="68" width="370" height="148" rx="8" fill="#0d1a2d" stroke="#1e3a6a" stroke-width="1.5"/>
  <!-- header -->
  <rect x="51" y="69" width="368" height="36" rx="7" fill="#163060"/>
  <text x="78" y="92" fill="#7ec8e3" font-size="15" font-weight="700">클래스 (class)</text>
  <line x1="50" y1="106" x2="420" y2="106" stroke="#1e3a6a" stroke-width="1"/>
  <!-- content -->
  <text x="68" y="126" fill="#888" font-size="12">인스턴스를 생성하는 기본 사용자 정의 타입</text>
  <text x="68" y="148" fill="#e8e8e8" font-size="13">String · Integer · ArrayList · HashMap</text>
  <!-- code snippet -->
  <rect x="68" y="158" width="334" height="46" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="82" y="176" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">String</text>
  <text x="128" y="176" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> name = </text>
  <text x="197" y="176" fill="#7777cc" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">new</text>
  <text x="222" y="176" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> String(</text>
  <text x="278" y="176" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"Alice"</text>
  <text x="330" y="176" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">);</text>
  <text x="82" y="196" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 힙에 객체 생성, name은 참조 보유</text>

  <!-- ═══ Box 2: interface ═══ -->
  <rect x="460" y="68" width="370" height="148" rx="8" fill="#0d1a2d" stroke="#1e3a6a" stroke-width="1.5"/>
  <rect x="461" y="69" width="368" height="36" rx="7" fill="#163060"/>
  <text x="478" y="92" fill="#7777cc" font-size="15" font-weight="700">인터페이스 (interface)</text>
  <line x1="460" y1="106" x2="830" y2="106" stroke="#1e3a6a" stroke-width="1"/>
  <text x="478" y="126" fill="#888" font-size="12">계약만 정의, 구현 클래스가 인스턴스 생성</text>
  <text x="478" y="148" fill="#e8e8e8" font-size="13">List · Map · Runnable · Comparable</text>
  <rect x="478" y="158" width="334" height="46" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="176" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">List</text>
  <text x="514" y="176" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">&lt;String&gt; list = </text>
  <text x="614" y="176" fill="#7777cc" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">new</text>
  <text x="639" y="176" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> ArrayList&lt;&gt;();</text>
  <text x="492" y="196" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 타입은 인터페이스, 객체는 클래스</text>

  <!-- ═══ Box 3: array ═══ -->
  <rect x="50" y="244" width="370" height="148" rx="8" fill="#0d1a2d" stroke="#1e3a6a" stroke-width="1.5"/>
  <rect x="51" y="245" width="368" height="36" rx="7" fill="#163060"/>
  <text x="78" y="268" fill="#55c555" font-size="15" font-weight="700">배열 (array [])</text>
  <line x1="50" y1="282" x2="420" y2="282" stroke="#1e3a6a" stroke-width="1"/>
  <text x="68" y="302" fill="#888" font-size="12">같은 타입 원소의 고정 크기 연속 메모리</text>
  <text x="68" y="324" fill="#e8e8e8" font-size="13">int[] · String[] · double[] · Object[]</text>
  <rect x="68" y="334" width="334" height="46" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="82" y="352" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">int</text>
  <text x="101" y="352" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">[] scores = {</text>
  <text x="210" y="352" fill="#b5cea8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">90</text>
  <text x="228" y="352" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">, </text>
  <text x="241" y="352" fill="#b5cea8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">85</text>
  <text x="259" y="352" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">, </text>
  <text x="272" y="352" fill="#b5cea8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">92</text>
  <text x="290" y="352" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">};</text>
  <text x="82" y="372" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 힙에 배열 객체, 크기 고정</text>

  <!-- ═══ Box 4: enum ═══ -->
  <rect x="460" y="244" width="370" height="148" rx="8" fill="#0d1a2d" stroke="#1e3a6a" stroke-width="1.5"/>
  <rect x="461" y="245" width="368" height="36" rx="7" fill="#163060"/>
  <text x="478" y="268" fill="#7ec8e3" font-size="15" font-weight="700">열거형 (enum)</text>
  <line x1="460" y1="282" x2="830" y2="282" stroke="#1e3a6a" stroke-width="1"/>
  <text x="478" y="302" fill="#888" font-size="12">미리 정의된 상수 집합, 타입 안전 보장</text>
  <text x="478" y="324" fill="#e8e8e8" font-size="13">DayOfWeek · Month · Direction · Status</text>
  <rect x="478" y="334" width="334" height="46" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="352" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">DayOfWeek</text>
  <text x="570" y="352" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> day = DayOfWeek.</text>
  <text x="688" y="352" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">MONDAY;</text>
  <text x="492" y="372" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 상수 객체, 싱글턴 보장</text>

</svg>
