<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410">
  <defs>
    <marker id="mgArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="410" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">점진적 마이그레이션 순서</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">한 번에 다 바꾸지 말고 단계별로 검증한다</text>

  <!-- 1 -->
  <rect x="80" y="98" width="720" height="52" rx="8" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="104" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">1. Java 8에서 최신 의존성으로 먼저 갱신</text>
  <text x="104" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">라이브러리를 Java 11 호환 버전으로 올리되, 아직 JDK는 8 유지</text>

  <line x1="440" y1="150" x2="440" y2="168" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mgArr)"/>

  <!-- 2 -->
  <rect x="80" y="170" width="720" height="52" rx="8" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="104" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">2. JDK 11로 컴파일 · 경고 확인</text>
  <text x="104" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">jdeps로 내부 API·제거 모듈 사용 여부 진단</text>

  <line x1="440" y1="222" x2="440" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mgArr)"/>

  <!-- 3 -->
  <rect x="80" y="242" width="720" height="52" rx="8" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="104" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">3. 제거된 모듈을 의존성으로 추가</text>
  <text x="104" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">JAXB·JAX-WS 등을 jakarta 아티팩트로 복구</text>

  <line x1="440" y1="294" x2="440" y2="312" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mgArr)"/>

  <!-- 4 -->
  <rect x="80" y="314" width="720" height="52" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="104" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">4. 전체 테스트 · 런타임 검증 · 배포</text>
  <text x="104" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">GC·리플렉션 경고까지 확인 후 운영 반영</text>
</svg>
