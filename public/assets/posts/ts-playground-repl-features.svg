<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Playground 주요 기능</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">TypeScript Playground에서 할 수 있는 것들</text>
  <!-- Feature 1 -->
  <rect x="60" y="100" width="360" height="100" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">실시간 타입 검사</text>
  <text x="240" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드 입력하면 즉시 오류 표시</text>
  <text x="240" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빨간 밑줄 hover로 오류 설명 확인</text>
  <!-- Feature 2 -->
  <rect x="460" y="100" width="360" height="100" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">TS → JS 변환 확인</text>
  <text x="640" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입이 어떻게 제거되는지 실시간 확인</text>
  <text x="640" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">여러 target 버전별 출력 비교</text>
  <!-- Feature 3 -->
  <rect x="60" y="220" width="360" height="100" rx="8" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">타입 선언(.d.ts) 확인</text>
  <text x="240" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드에서 생성되는 타입 선언 확인</text>
  <text x="240" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">라이브러리 타입 작성 연습</text>
  <!-- Feature 4 -->
  <rect x="460" y="220" width="360" height="100" rx="8" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">URL로 코드 공유</text>
  <text x="640" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드가 URL에 인코딩됨</text>
  <text x="640" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이슈 재현 · 팀원과 공유에 최적</text>
  <!-- Feature 5 -->
  <rect x="60" y="340" width="360" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">TS 버전 선택</text>
  <text x="240" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최신 버전부터 과거 버전까지 선택 가능</text>
  <!-- Feature 6 -->
  <rect x="460" y="340" width="360" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">tsconfig 옵션 UI</text>
  <text x="640" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">체크박스로 strict 등 옵션 토글</text>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">새 TS 기능을 배울 때 가장 빠른 도구 — 설치 없이 즉시 실험 가능</text>
</svg>
