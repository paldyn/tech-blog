<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript Playground 핵심 기능</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">학습과 디버깅에 꼭 필요한 6가지 기능</text>

  <!-- Feature 1 -->
  <rect x="60" y="100" width="362" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">&#x1F50D;  실시간 타입 검사</text>
  <text x="84" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">코드 입력과 동시에 타입 오류를</text>
  <text x="84" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">즉시 빨간 밑줄로 표시해줍니다.</text>
  <text x="84" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">오류 메시지 + 오류 코드(TS2xxx) 제공</text>

  <!-- Feature 2 -->
  <rect x="458" y="100" width="362" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">&#x1F4CB;  JS 컴파일 결과 확인</text>
  <text x="482" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TS 코드가 어떤 JS로 변환되는지</text>
  <text x="482" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실시간으로 우측 패널에 보여줍니다.</text>
  <text x="482" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">target 버전별 출력 코드 비교 가능</text>

  <!-- Feature 3 -->
  <rect x="60" y="218" width="362" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">&#x2699;&#xFE0F;  컴파일러 옵션 조정</text>
  <text x="84" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">strict, target 등 tsconfig 옵션을</text>
  <text x="84" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">UI로 바꿔가며 결과를 실험합니다.</text>
  <text x="84" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">타입 버전 선택(4.x, 5.x) 가능</text>

  <!-- Feature 4 -->
  <rect x="458" y="218" width="362" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">&#x1F517;  URL로 공유</text>
  <text x="482" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">작성한 코드가 URL에 인코딩되어</text>
  <text x="482" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">링크 하나로 동료와 공유됩니다.</text>
  <text x="482" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">이슈 리포트, 질문 시 편리</text>

  <!-- Feature 5 -->
  <rect x="60" y="336" width="362" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">&#x1F4D6;  타입 정의 확인</text>
  <text x="84" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">심볼 위에 마우스를 올리면</text>
  <text x="84" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">추론된 타입을 즉시 확인합니다.</text>
  <text x="84" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">복잡한 제네릭 타입 디버깅에 유용</text>

  <!-- Feature 6 -->
  <rect x="458" y="336" width="362" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">&#x1F9EA;  예제 코드 모음</text>
  <text x="482" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">공식 TypeScript 예제를 그대로</text>
  <text x="482" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">불러와 실행해볼 수 있습니다.</text>
  <text x="482" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">제네릭, 유틸리티 타입 등 예제 제공</text>
</svg>
