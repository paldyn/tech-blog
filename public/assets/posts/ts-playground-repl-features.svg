<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript Playground 주요 기능</text>

  <!-- Left panel: TS input -->
  <rect x="60" y="66" width="370" height="220" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">TypeScript 입력 (왼쪽 패널)</text>
  <rect x="76" y="96" width="338" height="180" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">type </text>
  <text x="134" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">Result&lt;T&gt; =</text>
  <text x="92" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  | { ok: </text>
  <text x="158" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">true</text>
  <text x="186" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">; value: T }</text>
  <text x="92" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  | { ok: </text>
  <text x="158" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">false</text>
  <text x="192" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">; error: </text>
  <text x="254" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">string </text>
  <text x="302" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">};</text>
  <text x="92" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> </text>
  <text x="92" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">function </text>
  <text x="162" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">parse(s: </text>
  <text x="218" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">string</text>
  <text x="264" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">)</text>
  <text x="92" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  : Result&lt;</text>
  <text x="158" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">number</text>
  <text x="212" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">&gt; { ... }</text>
  <text x="92" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> </text>

  <!-- Arrow -->
  <text x="440" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="24" fill="#7ec8e3" text-anchor="middle">→</text>

  <!-- Right panel: JS output -->
  <rect x="450" y="66" width="370" height="220" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">JavaScript 출력 (오른쪽 패널)</text>
  <rect x="466" y="96" width="338" height="180" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// interface 선언 사라짐</text>
  <text x="482" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// type alias 사라짐</text>
  <text x="482" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> </text>
  <text x="482" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">function </text>
  <text x="552" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">parse(s) {</text>
  <text x="482" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">  // 타입 어노테이션 제거됨</text>
  <text x="482" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  ...</text>
  <text x="482" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>

  <!-- Feature cards -->
  <rect x="60" y="306" width="170" height="102" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="145" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">URL 공유</text>
  <text x="145" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">코드가 URL에</text>
  <text x="145" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인코딩됨</text>
  <text x="145" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">설치 없이 공유</text>
  <text x="145" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle"> </text>

  <rect x="245" y="306" width="170" height="102" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="330" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">버전 선택</text>
  <text x="330" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TS 3.x~최신</text>
  <text x="330" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">버전별 동작</text>
  <text x="330" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">차이 확인</text>
  <text x="330" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle"> </text>

  <rect x="430" y="306" width="170" height="102" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="515" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">타입 오류</text>
  <text x="515" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인라인으로</text>
  <text x="515" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">오류 표시</text>
  <text x="515" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">호버로 상세</text>
  <text x="515" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle"> </text>

  <rect x="615" y="306" width="205" height="102" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="717" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">.d.ts 탭</text>
  <text x="717" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">선언 파일 확인</text>
  <text x="717" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">라이브러리 작성</text>
  <text x="717" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시 유용</text>
  <text x="717" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle"> </text>
</svg>
