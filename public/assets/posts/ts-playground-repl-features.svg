<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript Playground 주요 기능</text>
  <!-- URL badge -->
  <rect x="240" y="58" width="400" height="30" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="78" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">typescriptlang.org/play</text>
  <!-- Feature cards in 3x2 grid -->
  <!-- Row 1 -->
  <rect x="60" y="105" width="240" height="110" rx="8" fill="#0a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">실시간 타입 검사</text>
  <text x="180" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드 작성과 동시에</text>
  <text x="180" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오류를 즉시 표시합니다</text>
  <text x="180" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">설치 없이 브라우저에서</text>
  <rect x="320" y="105" width="240" height="110" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">컴파일 결과 확인</text>
  <text x="440" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.JS 탭에서 컴파일된</text>
  <text x="440" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JavaScript 결과 확인</text>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">타입 제거 과정 이해</text>
  <rect x="580" y="105" width="240" height="110" rx="8" fill="#1a0a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="700" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">URL 공유</text>
  <text x="700" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">작성한 코드를 URL로</text>
  <text x="700" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">즉시 공유 가능</text>
  <text x="700" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">질문·이슈 재현에 유용</text>
  <!-- Row 2 -->
  <rect x="60" y="235" width="240" height="110" rx="8" fill="#0a1818" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">TS 버전 선택</text>
  <text x="180" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최신 Nightly 버전 포함</text>
  <text x="180" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">버전별 동작 차이 비교</text>
  <text x="180" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">TS 5.x 신기능 미리 체험</text>
  <rect x="320" y="235" width="240" height="110" rx="8" fill="#1a1a0a" stroke="#f0db4f" stroke-width="1.5"/>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#f0db4f">tsconfig 옵션 조절</text>
  <text x="440" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">strict, target, lib 등</text>
  <text x="440" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">옵션 영향도 즉시 확인</text>
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#f0db4f">UI에서 체크박스로 간단히</text>
  <rect x="580" y="235" width="240" height="110" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">.DTS 탭</text>
  <text x="700" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 선언 파일 미리보기</text>
  <text x="700" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">라이브러리 배포 시</text>
  <text x="700" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">생성될 타입 미리 확인</text>
  <!-- Bottom note -->
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3">학습 단계에서 가장 빠른 피드백 루프를 제공하는 도구</text>
  <!-- Hover tip -->
  <rect x="200" y="400" width="480" height="36" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">변수 위에 마우스를 올리면 추론된 타입을 즉시 확인할 수 있습니다</text>
</svg>
