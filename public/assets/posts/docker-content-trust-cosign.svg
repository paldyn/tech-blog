<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">DCT vs Cosign 비교 &amp; Cosign 사용법</text>

  <!-- comparison table -->
  <!-- header row -->
  <rect x="60" y="64" width="760" height="36" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">항목</text>
  <text x="460" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Docker Content Trust (DCT)</text>
  <text x="720" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Cosign (Sigstore)</text>

  <!-- rows -->
  <line x1="60" y1="100" x2="820" y2="100" stroke="#222" stroke-width="1"/>
  <text x="200" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서명 저장 방식</text>
  <text x="460" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Notary 서버 (별도 인프라)</text>
  <text x="720" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">레지스트리 자체 (OCI artifact)</text>

  <line x1="60" y1="128" x2="820" y2="128" stroke="#222" stroke-width="1"/>
  <text x="200" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">키 관리</text>
  <text x="460" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">로컬 파일 키 (~/.docker/trust)</text>
  <text x="720" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">KMS / Keyless (OIDC)</text>

  <line x1="60" y1="156" x2="820" y2="156" stroke="#222" stroke-width="1"/>
  <text x="200" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CI 연동</text>
  <text x="460" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">보통 (키 파일 관리 복잡)</text>
  <text x="720" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">우수 (Keyless로 CI 자동화)</text>

  <line x1="60" y1="184" x2="820" y2="184" stroke="#222" stroke-width="1"/>
  <text x="200" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Kubernetes 통합</text>
  <text x="460" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">제한적</text>
  <text x="720" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Policy Controller, Kyverno</text>

  <line x1="60" y1="212" x2="820" y2="212" stroke="#222" stroke-width="1"/>
  <text x="200" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SBOM / Attestation</text>
  <text x="460" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">미지원</text>
  <text x="720" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">지원 (SLSA provenance)</text>

  <rect x="60" y="62" width="760" height="172" rx="6" fill="none" stroke="#333" stroke-width="1"/>

  <!-- vertical separators -->
  <line x1="340" y1="62" x2="340" y2="234" stroke="#222" stroke-width="1"/>
  <line x1="580" y1="62" x2="580" y2="234" stroke="#222" stroke-width="1"/>

  <!-- Cosign commands -->
  <text x="60" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Cosign 기본 사용법</text>

  <rect x="60" y="274" width="760" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#9aa4b8"># 키 생성</text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">cosign generate-key-pair</text>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#9aa4b8"># 서명 후 push (레지스트리에 서명 저장)</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">cosign sign --key cosign.key myregistry/myimage:1.0</text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#9aa4b8"># 서명 검증</text>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">cosign verify --key cosign.pub myregistry/myimage:1.0</text>
</svg>
