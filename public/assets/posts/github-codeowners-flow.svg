<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">자동 리뷰어 지정 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">PR이 건드린 파일에 따라 소유자가 리뷰어로 자동 등록된다</text>

  <!-- Step 1 -->
  <rect x="48" y="140" width="220" height="80" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="158" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">PR 열림</text>
  <text x="158" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/web/Login.tsx 변경</text>

  <line x1="268" y1="180" x2="338" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Step 2 -->
  <rect x="340" y="140" width="220" height="80" rx="10" fill="#101010" stroke="#9988dd" stroke-width="1.5"/>
  <text x="450" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9988dd">패턴 매칭</text>
  <text x="450" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/web/ → @org/frontend</text>

  <line x1="560" y1="180" x2="630" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Step 3 -->
  <rect x="632" y="140" width="220" height="80" rx="10" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="742" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">자동 리뷰 요청</text>
  <text x="742" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">팀에 알림 전송</text>

  <text x="440" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#888">브랜치 보호에서 "Require review from Code Owners"를 켜면 머지 전 소유자 승인이 필수가 된다</text>
</svg>
