<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">멀티 모듈 Gradle 빌드 설정</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">settings.gradle + 루트 build.gradle + 모듈 build.gradle 패턴</text>

  <!-- Left: settings.gradle -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">settings.gradle</text>
  <rect x="60" y="110" width="370" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text xml:space="preserve" x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">rootProject.name = </text>
  <text xml:space="preserve" x="246" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'my-service'</text>
  <text xml:space="preserve" x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">include(</text>
  <text xml:space="preserve" x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  ':domain',</text>
  <text xml:space="preserve" x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  ':application',</text>
  <text xml:space="preserve" x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  ':infra-db',</text>
  <text xml:space="preserve" x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  ':api',</text>
  <text xml:space="preserve" x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  ':bootstrap'</text>
  <text xml:space="preserve" x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">)</text>

  <!-- Right: module build.gradle -->
  <text x="460" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">:application/build.gradle</text>
  <rect x="460" y="110" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text xml:space="preserve" x="476" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">dependencies {</text>
  <text xml:space="preserve" x="476" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 도메인 모듈 참조</text>
  <text xml:space="preserve" x="476" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  implementation(</text>
  <text xml:space="preserve" x="476" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">    project(':domain')</text>
  <text xml:space="preserve" x="476" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  )</text>
  <text xml:space="preserve" x="476" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // Spring 의존성 없이 순수 로직</text>
  <text xml:space="preserve" x="476" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">}</text>

  <!-- Root build.gradle (subprojects) -->
  <text x="60" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">루트 build.gradle — 공통 설정</text>
  <rect x="60" y="306" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text xml:space="preserve" x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">subprojects {</text>
  <text xml:space="preserve" x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  apply plugin: </text>
  <text xml:space="preserve" x="206" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'java-library'</text>
  <text xml:space="preserve" x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  apply plugin: </text>
  <text xml:space="preserve" x="206" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'io.spring.dependency-management'</text>
  <text xml:space="preserve" x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  group = </text>
  <text xml:space="preserve" x="158" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'com.example'</text>
  <text xml:space="preserve" x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  dependencyManagement {</text>
  <text xml:space="preserve" x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    imports { mavenBom </text>
  <text xml:space="preserve" x="236" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"org.springframework.boot:...</text>
  <text xml:space="preserve" x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> </text>

  <!-- Key points -->
  <rect x="60" y="456" width="360" height="42" rx="6" fill="#111827" stroke="#3a5a8e" stroke-width="1"/>
  <text x="240" y="475" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">:domain 모듈은 순수 Java</text>
  <text x="240" y="491" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Spring 의존성 없이 테스트 가능</text>

  <rect x="460" y="456" width="360" height="42" rx="6" fill="#111827" stroke="#3a5a8e" stroke-width="1"/>
  <text x="640" y="475" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">:bootstrap만 bootJar 태스크</text>
  <text x="640" y="491" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">나머지 모듈은 jar만 생성</text>
</svg>
