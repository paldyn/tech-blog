<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">왜 데이터를 나누는가</text>

  <text x="60" y="92" font-size="13" fill="#888">전체 데이터</text>
  <rect x="60" y="104" width="760" height="40" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="440" y="129" font-size="13" fill="#9aa4b8" text-anchor="middle">모든 샘플</text>

  <defs>
    <marker id="ttar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <line x1="300" y1="150" x2="300" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ttar)"/>
  <line x1="620" y1="150" x2="620" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ttar)"/>

  <rect x="60" y="182" width="490" height="56" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="305" y="208" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">train (예: 80%)</text>
  <text x="305" y="228" font-size="12" fill="#9aa4b8" text-anchor="middle">모델 학습에만 사용</text>

  <rect x="566" y="182" width="254" height="56" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="693" y="208" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">test (예: 20%)</text>
  <text x="693" y="228" font-size="12" fill="#9aa4b8" text-anchor="middle">평가에만 사용</text>

  <rect x="60" y="252" width="760" height="30" rx="4" fill="#0f1320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="272" font-size="13" fill="#7ec8e3" text-anchor="middle">test로 학습하면 "외운 답"을 채점하는 셈 — 처음 보는 데이터에만 평가해야 진짜 성능</text>
</svg>
