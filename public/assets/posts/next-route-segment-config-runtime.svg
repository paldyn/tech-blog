<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <!-- Background -->
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">runtime 설정 — Edge vs Node.js</text>

  <!-- LEFT: Edge Runtime -->
  <rect x="50" y="68" width="360" height="340" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="230" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">Edge Runtime</text>
  <text x="230" y="120" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">runtime = 'edge'</text>

  <rect x="72" y="134" width="316" height="32" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="88" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓  Cold start 거의 없음 (0ms~)</text>

  <rect x="72" y="176" width="316" height="32" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="88" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓  전 세계 Edge에서 실행</text>

  <rect x="72" y="218" width="316" height="32" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="88" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓  Web API 기반 (fetch, crypto...)</text>

  <rect x="72" y="260" width="316" height="32" rx="5" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="88" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗  Node.js API 미지원 (fs, path...)</text>

  <rect x="72" y="302" width="316" height="32" rx="5" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="88" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗  npm 패키지 호환성 제한</text>

  <rect x="72" y="350" width="316" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 미들웨어 / A/B 테스트</text>
  <text x="88" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">export const</text>
  <text x="164" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> runtime = 'edge'</text>

  <!-- RIGHT: Node.js Runtime -->
  <rect x="470" y="68" width="360" height="340" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="650" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">Node.js Runtime</text>
  <text x="650" y="120" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">기본값 (선언 불필요)</text>

  <rect x="492" y="134" width="316" height="32" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓  모든 Node.js API 사용 가능</text>

  <rect x="492" y="176" width="316" height="32" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓  npm 패키지 완전 호환</text>

  <rect x="492" y="218" width="316" height="32" rx="5" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓  DB ORM, fs, crypto 자유롭게 사용</text>

  <rect x="492" y="260" width="316" height="32" rx="5" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="508" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗  Cold start 있음 (서버리스 환경)</text>

  <rect x="492" y="302" width="316" height="32" rx="5" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="508" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗  Edge보다 latency 높을 수 있음</text>

  <rect x="492" y="350" width="316" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="508" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// DB 쿼리 / 파일 처리</text>
  <text x="508" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 기본값 — 선언 생략 가능</text>
</svg>
