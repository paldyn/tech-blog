<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">힙 스냅샷 — 메모리 누수 탐지</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Chrome DevTools Memory 패널 활용법</text>

  <!-- Step 1 -->
  <rect x="60" y="96" width="180" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 스냅샷 1 촬영</text>
  <text x="150" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기준선 메모리 상태</text>

  <line x1="240" y1="126" x2="278" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="280" y="96" width="180" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="370" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">② 작업 수행</text>
  <text x="370" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">의심 동작 실행</text>

  <line x1="460" y1="126" x2="498" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="500" y="96" width="180" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="590" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 스냅샷 2 촬영</text>
  <text x="590" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">작업 후 상태</text>

  <line x1="680" y1="126" x2="718" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="720" y="96" width="120" height="60" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="780" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">④ 비교 분석</text>
  <text x="780" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1→2 증가 확인</text>

  <!-- Heap snapshot result table -->
  <rect x="60" y="184" width="760" height="120" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">힙 스냅샷 Comparison 뷰</text>
  <!-- Table headers -->
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Constructor</text>
  <text x="320" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"># New</text>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Size Delta</text>
  <text x="580" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Retained Size</text>
  <!-- Row 1 (problem) -->
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">EventListeners</text>
  <text x="320" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">+1,024</text>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">+4.2 MB</text>
  <text x="580" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">+12.8 MB ⚠</text>
  <!-- Row 2 (ok) -->
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">HTMLElement</text>
  <text x="320" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">+2</text>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">+0.1 KB</text>
  <text x="580" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">+0.3 KB</text>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">EventListeners 증가 → removeEventListener 누락 의심</text>

  <!-- Allocation Timeline diagram -->
  <rect x="60" y="328" width="760" height="120" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Allocation Timeline — GC 후에도 남는 객체 확인</text>
  <!-- Bars representing allocations -->
  <rect x="80" y="364" width="8" height="40" rx="2" fill="#7ec8e3" opacity="0.8"/>
  <rect x="96" y="374" width="8" height="30" rx="2" fill="#7ec8e3" opacity="0.8"/>
  <rect x="112" y="360" width="8" height="44" rx="2" fill="#e05555" opacity="0.9"/>
  <rect x="128" y="370" width="8" height="34" rx="2" fill="#7ec8e3" opacity="0.8"/>
  <rect x="144" y="358" width="8" height="46" rx="2" fill="#e05555" opacity="0.9"/>
  <rect x="160" y="372" width="8" height="32" rx="2" fill="#7ec8e3" opacity="0.8"/>
  <rect x="176" y="356" width="8" height="48" rx="2" fill="#e05555" opacity="0.9"/>
  <text x="300" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">■ 파란색: GC로 해제됨</text>
  <text x="300" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">■ 빨간색: GC 후에도 남음 → 누수 의심 객체</text>
  <text x="300" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">빨간 막대 클릭 → 해당 객체의 retain 경로 확인</text>
  <text x="300" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Retainer 체인 확인 → 어디서 참조 유지되는지 추적</text>
</svg>
