<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-jwt" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JWT (JSON Web Token) 구조</text>

  <!-- JWT Token Visual: 3 segments -->
  <!-- Header -->
  <rect x="60" y="68" width="220" height="48" rx="8" fill="#c0392b"/>
  <text x="170" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">eyJhbGciOiJIUzI1NiJ9</text>

  <!-- dot 1 -->
  <text x="286" y="97" text-anchor="middle" font-size="22" font-weight="700" fill="#888">.</text>

  <!-- Payload -->
  <rect x="298" y="68" width="284" height="48" rx="8" fill="#7777cc"/>
  <text x="440" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">eyJzdWIiOiJ1c2VyMSJ9</text>

  <!-- dot 2 -->
  <text x="588" y="97" text-anchor="middle" font-size="22" font-weight="700" fill="#888">.</text>

  <!-- Signature -->
  <rect x="600" y="68" width="220" height="48" rx="8" fill="#2471a3"/>
  <text x="710" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">SflKxwRJSMeKKF2QT4...</text>

  <!-- Labels -->
  <text x="170" y="134" text-anchor="middle" font-size="13" fill="#888">① Header</text>
  <text x="440" y="134" text-anchor="middle" font-size="13" fill="#888">② Payload (Claims)</text>
  <text x="710" y="134" text-anchor="middle" font-size="13" fill="#888">③ Signature</text>

  <!-- Detail Boxes -->
  <!-- Header detail -->
  <rect x="60" y="152" width="220" height="100" rx="8" fill="#1a0a0a" stroke="#c0392b" stroke-width="1.5"/>
  <text x="80" y="176" font-size="14" font-weight="600" fill="#c0392b">Header</text>
  <text x="80" y="198" font-size="13" fill="#888">알고리즘: HS256 / RS256</text>
  <text x="80" y="216" font-size="13" fill="#888">타입: JWT</text>
  <text x="80" y="234" font-size="13" fill="#888">Base64URL 인코딩</text>

  <!-- Payload detail -->
  <rect x="298" y="152" width="284" height="100" rx="8" fill="#0e0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="318" y="176" font-size="14" font-weight="600" fill="#9b9bd4">Payload</text>
  <text x="318" y="198" font-size="13" fill="#888">sub: 사용자 ID</text>
  <text x="318" y="216" font-size="13" fill="#888">iat / exp: 발급·만료 시각</text>
  <text x="318" y="234" font-size="13" fill="#888">role, email 등 커스텀 클레임</text>

  <!-- Signature detail -->
  <rect x="600" y="152" width="220" height="100" rx="8" fill="#0a0e1a" stroke="#2471a3" stroke-width="1.5"/>
  <text x="620" y="176" font-size="14" font-weight="600" fill="#7ec8e3">Signature</text>
  <text x="620" y="198" font-size="13" fill="#888">HMAC / RSA 서명값</text>
  <text x="620" y="216" font-size="13" fill="#888">서버만 검증 가능</text>
  <text x="620" y="234" font-size="13" fill="#888">위변조 방지 보장</text>

  <!-- Subtitle for code block -->
  <text x="60" y="278" font-size="16" font-weight="600" fill="#e8e8e8">JWT 생성 · 검증 예시</text>

  <!-- Code Block -->
  <rect x="60" y="292" width="760" height="236" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="311" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// build.gradle — JJWT 의존성</text>
  <text x="76" y="329" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">implementation</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'io.jsonwebtoken:jjwt-api:0.12.5'</tspan></text>
  <text x="76" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">runtimeOnly</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">'io.jsonwebtoken:jjwt-impl:0.12.5'</tspan></text>
  <text x="76" y="365" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> </text>
  <text x="76" y="383" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// Access Token 생성</tspan></text>
  <text x="76" y="401" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff"> token = Jwts.builder()</tspan></text>
  <text x="76" y="419" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .subject(username)</tspan></text>
  <text x="76" y="437" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .expiration(</tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> Date(now + </tspan><tspan fill="#b5cea8">3_600_000</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="455" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .signWith(secretKey)</tspan></text>
  <text x="76" y="473" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .compact();</tspan></text>
  <text x="76" y="491" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> </text>
  <text x="76" y="509" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 검증: Jwts.parser().verifyWith(secretKey).build().parseSignedClaims(token)</tspan></text>
</svg>
