<svg width="880" height="430" viewBox="0 0 880 430"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">텍스트 분류 파이프라인</text>
  <text x="440" y="72" text-anchor="middle" fill="#888" font-size="13">입력 텍스트 → 인코딩 → 분류</text>

  <!-- Stage 1: 입력 텍스트 -->
  <rect x="60" y="130" width="120" height="68" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="159" text-anchor="middle" fill="#7777cc" font-size="14" font-weight="600">입력 텍스트</text>
  <text x="120" y="178" text-anchor="middle" fill="#888" font-size="12">"오늘 날씨가</text>
  <text x="120" y="193" text-anchor="middle" fill="#888" font-size="12">너무 좋다"</text>

  <!-- Arrow 1 -->
  <polygon points="192,163 220,163 220,157 236,164 220,171 220,165 192,165" fill="#555"/>

  <!-- Stage 2: 토크나이저 -->
  <rect x="236" y="130" width="120" height="68" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="296" y="159" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">토크나이저</text>
  <text x="296" y="178" text-anchor="middle" fill="#888" font-size="12">[CLS] 오늘</text>
  <text x="296" y="193" text-anchor="middle" fill="#888" font-size="12">날씨 [SEP]</text>

  <!-- Arrow 2 -->
  <polygon points="368,163 396,163 396,157 412,164 396,171 396,165 368,165" fill="#555"/>

  <!-- Stage 3: 인코더 (BERT) -->
  <rect x="412" y="118" width="140" height="92" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="2"/>
  <text x="482" y="147" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600">인코더 (BERT)</text>
  <text x="482" y="167" text-anchor="middle" fill="#888" font-size="12">Self-Attention</text>
  <text x="482" y="183" text-anchor="middle" fill="#888" font-size="12">Feed-Forward</text>
  <text x="482" y="199" text-anchor="middle" fill="#888" font-size="12">× 12 레이어</text>

  <!-- Arrow 3 -->
  <polygon points="564,163 592,163 592,157 608,164 592,171 592,165 564,165" fill="#555"/>

  <!-- Stage 4: 분류기 헤드 -->
  <rect x="608" y="130" width="120" height="68" rx="8" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="668" y="156" text-anchor="middle" fill="#e05555" font-size="14" font-weight="600">분류기 헤드</text>
  <text x="668" y="174" text-anchor="middle" fill="#888" font-size="12">Linear(768, C)</text>
  <text x="668" y="190" text-anchor="middle" fill="#888" font-size="12">Softmax</text>

  <!-- Arrow 4 -->
  <polygon points="740,163 768,163 768,157 784,164 768,171 768,165 740,165" fill="#555"/>

  <!-- Stage 5: 레이블 -->
  <rect x="784" y="130" width="66" height="68" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="817" y="156" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">레이블</text>
  <text x="817" y="175" text-anchor="middle" fill="#e8e8e8" font-size="13">긍정</text>
  <text x="817" y="191" text-anchor="middle" fill="#888" font-size="12">0.92</text>

  <!-- Labels below stages -->
  <text x="120" y="216" text-anchor="middle" fill="#888" font-size="12">Raw Input</text>
  <text x="296" y="216" text-anchor="middle" fill="#888" font-size="12">Tokenization</text>
  <text x="482" y="228" text-anchor="middle" fill="#888" font-size="12">Contextualization</text>
  <text x="668" y="216" text-anchor="middle" fill="#888" font-size="12">Classification</text>
  <text x="817" y="216" text-anchor="middle" fill="#888" font-size="12">Output</text>

  <!-- Fine-tuning categories section -->
  <text x="440" y="274" text-anchor="middle" fill="#e8e8e8" font-size="16" font-weight="600">주요 분류 카테고리</text>

  <!-- Category cards -->
  <rect x="60" y="292" width="175" height="60" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="148" y="315" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">주제 분류</text>
  <text x="148" y="335" text-anchor="middle" fill="#888" font-size="12">스포츠 / 정치 / 경제 / 문화</text>
  <text x="148" y="350" text-anchor="middle" fill="#888" font-size="11">Topic Classification</text>

  <rect x="255" y="292" width="175" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="343" y="315" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">감성 분류</text>
  <text x="343" y="335" text-anchor="middle" fill="#888" font-size="12">긍정 / 부정 / 중립</text>
  <text x="343" y="350" text-anchor="middle" fill="#888" font-size="11">Sentiment Analysis</text>

  <rect x="450" y="292" width="175" height="60" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="538" y="315" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">의도 분류</text>
  <text x="538" y="335" text-anchor="middle" fill="#888" font-size="12">예약 / 문의 / 불만 / 취소</text>
  <text x="538" y="350" text-anchor="middle" fill="#888" font-size="11">Intent Classification</text>

  <rect x="645" y="292" width="175" height="60" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="733" y="315" text-anchor="middle" fill="#e05555" font-size="13" font-weight="600">독성 감지</text>
  <text x="733" y="335" text-anchor="middle" fill="#888" font-size="12">혐오 / 스팸 / 안전</text>
  <text x="733" y="350" text-anchor="middle" fill="#888" font-size="11">Toxicity Detection</text>

  <!-- Bottom metrics -->
  <text x="440" y="400" text-anchor="middle" fill="#888" font-size="12">BERT-base 기준 대부분 태스크에서 F1 0.90+ 달성 가능</text>
</svg>
