<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">이슈 생명 주기</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Open → Triage → 처리 → Closed</text>

  <!-- States (horizontal) -->
  <!-- Open -->
  <rect x="50" y="110" width="140" height="50" rx="8" fill="#071a07" stroke="#55c555" stroke-width="2"/>
  <text x="120" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Open</text>
  <text x="120" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이슈 생성됨</text>

  <line x1="190" y1="135" x2="238" y2="135" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- Triage -->
  <rect x="242" y="110" width="140" height="50" rx="8" fill="#1a150a" stroke="#e0955e" stroke-width="1.5"/>
  <text x="312" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0955e">Triage</text>
  <text x="312" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">레이블·담당자 배정</text>

  <line x1="382" y1="135" x2="430" y2="135" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- In Progress -->
  <rect x="434" y="110" width="140" height="50" rx="8" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="504" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">In Progress</text>
  <text x="504" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">작업 시작</text>

  <line x1="574" y1="135" x2="622" y2="135" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- Closed (resolved) -->
  <rect x="626" y="110" width="140" height="50" rx="8" fill="#111" stroke="#888" stroke-width="1.5"/>
  <text x="696" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Closed</text>
  <text x="696" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">해결 또는 거부</text>

  <!-- Won't fix path -->
  <path d="M 312 160 Q 312 220 440 220 Q 568 220 696 160" stroke="#e05555" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <text x="440" y="215" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Won't Fix / Duplicate 처리</text>

  <!-- Labels section -->
  <text x="440" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">표준 레이블</text>

  <rect x="50" y="282" width="116" height="28" rx="14" fill="#e05555" fill-opacity="0.2" stroke="#e05555" stroke-width="1"/>
  <text x="108" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">bug</text>

  <rect x="178" y="282" width="116" height="28" rx="14" fill="#7ec8e3" fill-opacity="0.2" stroke="#7ec8e3" stroke-width="1"/>
  <text x="236" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">enhancement</text>

  <rect x="306" y="282" width="116" height="28" rx="14" fill="#9988dd" fill-opacity="0.2" stroke="#9988dd" stroke-width="1"/>
  <text x="364" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9988dd">question</text>

  <rect x="434" y="282" width="116" height="28" rx="14" fill="#888" fill-opacity="0.2" stroke="#888" stroke-width="1"/>
  <text x="492" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">wontfix</text>

  <rect x="562" y="282" width="116" height="28" rx="14" fill="#e0955e" fill-opacity="0.2" stroke="#e0955e" stroke-width="1"/>
  <text x="620" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0955e">duplicate</text>

  <rect x="690" y="282" width="116" height="28" rx="14" fill="#55c555" fill-opacity="0.2" stroke="#55c555" stroke-width="1"/>
  <text x="748" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">good first issue</text>

  <!-- PR link note -->
  <rect x="50" y="330" width="780" height="44" rx="6" fill="#0d1220" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="349" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">PR 본문에 Closes #이슈번호 → PR 머지 시 이슈 자동 닫힘</text>
  <text x="440" y="365" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GitHub Projects와 연동하면 이슈 상태가 칸반 보드에 자동 반영</text>
</svg>
