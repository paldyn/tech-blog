<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">교차 = 서로 상대 선분의 양 끝을 갈라놓을 때</text>

  <!-- panel 1: cross -->
  <text x="190" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">교차함</text>
  <line x1="110" y1="300" x2="270" y2="180" stroke="#7ec8e3" stroke-width="2.5"/>
  <line x1="110" y1="180" x2="270" y2="300" stroke="#e8a855" stroke-width="2.5"/>
  <circle cx="190" cy="240" r="5" fill="#55c555"/>
  <text x="106" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">A</text>
  <text x="270" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">B</text>
  <text x="106" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a855">C</text>
  <text x="270" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a855">D</text>
  <text x="190" y="352" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">ccw 부호 엇갈림 ×2</text>

  <!-- panel 2: not cross -->
  <text x="450" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">교차 안 함</text>
  <line x1="370" y1="300" x2="500" y2="240" stroke="#7ec8e3" stroke-width="2.5"/>
  <line x1="400" y1="200" x2="530" y2="160" stroke="#e8a855" stroke-width="2.5"/>
  <text x="366" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">A</text>
  <text x="500" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">B</text>
  <text x="386" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a855">C</text>
  <text x="534" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a855">D</text>
  <text x="450" y="352" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">한쪽 부호 같음</text>

  <!-- panel 3: touch endpoint -->
  <text x="710" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">끝점 접촉</text>
  <line x1="630" y1="300" x2="760" y2="220" stroke="#7ec8e3" stroke-width="2.5"/>
  <line x1="760" y1="220" x2="800" y2="140" stroke="#e8a855" stroke-width="2.5"/>
  <circle cx="760" cy="220" r="5" fill="#55c555"/>
  <text x="626" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">A</text>
  <text x="800" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a855">D</text>
  <text x="710" y="352" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ccw=0 + 범위 안</text>

  <text x="60" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">AB가 C,D를 양쪽으로 가르고 동시에 CD가 A,B를 양쪽으로 가르면 → 두 선분은 교차한다</text>
</svg>
