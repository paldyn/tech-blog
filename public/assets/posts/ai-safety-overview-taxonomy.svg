<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="as-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AI 안전성 문제 분류 체계</text>

  <!-- Root -->
  <rect x="330" y="68" width="220" height="54" rx="8" fill="#2a1a2a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">AI 안전성 위험</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Safety Risks in AI Systems</text>

  <!-- Fan-out arrows -->
  <line x1="370" y1="122" x2="180" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#as-arr)"/>
  <line x1="440" y1="122" x2="440" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#as-arr)"/>
  <line x1="510" y1="122" x2="700" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#as-arr)"/>

  <!-- Category 1: 기술적 위험 -->
  <rect x="60" y="170" width="240" height="54" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">기술적 위험</text>
  <text x="180" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Technical Safety</text>

  <!-- Sub 1 -->
  <rect x="40" y="250" width="140" height="60" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="110" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">환각</text>
  <text x="110" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Hallucination</text>
  <text x="110" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">사실과 다른 출력</text>

  <rect x="200" y="250" width="140" height="60" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="270" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">취약한 견고성</text>
  <text x="270" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Robustness</text>
  <text x="270" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">적대적 입력 취약</text>

  <line x1="180" y1="224" x2="110" y2="250" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#as-arr)"/>
  <line x1="180" y1="224" x2="270" y2="250" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#as-arr)"/>

  <!-- Category 2: 사회적 위험 -->
  <rect x="320" y="170" width="240" height="54" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">사회적 위험</text>
  <text x="440" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Societal Safety</text>

  <!-- Sub 2 -->
  <rect x="300" y="250" width="140" height="60" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="370" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">편향·차별</text>
  <text x="370" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Bias &amp; Fairness</text>
  <text x="370" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">불평등 재생산</text>

  <rect x="460" y="250" width="140" height="60" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="530" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">유해 콘텐츠</text>
  <text x="530" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Harmful Content</text>
  <text x="530" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">CSAM·자해 조장</text>

  <line x1="440" y1="224" x2="370" y2="250" stroke="#e05555" stroke-width="1.5" marker-end="url(#as-arr)"/>
  <line x1="440" y1="224" x2="530" y2="250" stroke="#e05555" stroke-width="1.5" marker-end="url(#as-arr)"/>

  <!-- Category 3: 정렬 위험 -->
  <rect x="580" y="170" width="240" height="54" rx="8" fill="#2a2a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">정렬 위험</text>
  <text x="700" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Alignment Risk</text>

  <rect x="560" y="250" width="140" height="60" rx="6" fill="#2a2a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="630" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">목적 불일치</text>
  <text x="630" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Misalignment</text>
  <text x="630" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">의도와 다른 행동</text>

  <rect x="720" y="250" width="140" height="60" rx="6" fill="#2a2a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="790" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">프라이버시</text>
  <text x="790" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Privacy</text>
  <text x="790" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">개인정보 노출</text>

  <line x1="700" y1="224" x2="630" y2="250" stroke="#7777cc" stroke-width="1.5" marker-end="url(#as-arr)"/>
  <line x1="700" y1="224" x2="790" y2="250" stroke="#7777cc" stroke-width="1.5" marker-end="url(#as-arr)"/>

  <!-- Code block -->
  <rect x="60" y="334" width="760" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 환각 감지 기본 패턴 (RAG 시스템)</text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> is_grounded(answer: str, context: str) -> bool:</tspan></text>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    prompt = </tspan><tspan fill="#ce9178">f"컨텍스트에 근거한 답변인가? ctx:{context[:200]} ans:{answer}"</tspan></text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    result = judge_llm.generate(prompt)</tspan></text>
  <text x="76" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"예"</tspan><tspan fill="#ffffff"> in result or </tspan><tspan fill="#ce9178">"yes"</tspan><tspan fill="#ffffff"> in result.lower()</tspan></text>
  <text x="76" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># 환각이면 "답변할 수 없는 질문입니다" 반환</tspan></text>
  <text x="76" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if not</tspan><tspan fill="#ffffff"> is_grounded(answer, context): </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> SAFE_FALLBACK</tspan></text>
</svg>
