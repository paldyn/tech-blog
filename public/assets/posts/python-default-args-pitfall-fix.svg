<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#55c555">올바른 패턴 — None 센티널</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">가변 객체 기본값은 None으로 대체하고 함수 내부에서 생성</text>

  <!-- Correct code -->
  <rect x="60" y="90" width="400" height="200" fill="#000000" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555"># 올바른 코드</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> append_item(item, lst=</tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">):</tspan></text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    if</tspan><tspan fill="#ffffff"> lst </tspan><tspan fill="#7ec8e3">is None</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        lst = []    </tspan><tspan fill="#9aa4b8"># 매번 새로 생성</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    lst.append(item)</tspan></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ffffff"> lst</tspan></text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">print(append_item(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">print(append_item(</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">[1]  /  [2]  — 각각 독립!</text>

  <!-- What to avoid table -->
  <rect x="500" y="90" width="320" height="290" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <text x="660" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">기본값으로 피해야 할 타입</text>

  <!-- List row -->
  <rect x="516" y="132" width="288" height="36" fill="#1a0a0a" rx="4"/>
  <text x="532" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">list  []</text>
  <text x="690" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ None 사용</text>

  <!-- dict row -->
  <rect x="516" y="176" width="288" height="36" fill="#1a0a0a" rx="4"/>
  <text x="532" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">dict  {}</text>
  <text x="690" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ None 사용</text>

  <!-- set row -->
  <rect x="516" y="220" width="288" height="36" fill="#1a0a0a" rx="4"/>
  <text x="532" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">set  set()</text>
  <text x="690" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ None 사용</text>

  <!-- OK types -->
  <text x="516" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">기본값으로 안전한 타입</text>
  <text x="516" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">int, float, str, bool, None</text>
  <text x="516" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">tuple  ()</text>
  <text x="516" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">불변(immutable)이라 공유해도 안전</text>
  <text x="516" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">* 튜플은 불변이므로 수정 불가 → 공유해도 무해</text>
</svg>
