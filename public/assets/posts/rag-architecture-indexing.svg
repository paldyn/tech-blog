<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RAG 인덱싱 파이프라인 상세</text>

  <!-- Main flow boxes -->
  <!-- 문서 입력 -->
  <rect x="40" y="70" width="120" height="68" rx="8" fill="#1a1f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="100" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">문서 입력</text>
  <text x="100" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PDF · HTML</text>
  <text x="100" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Markdown · TXT</text>

  <!-- Arrow -->
  <line x1="160" y1="104" x2="190" y2="104" stroke="#555" stroke-width="2"/>
  <polygon points="190,98 204,104 190,110" fill="#555"/>

  <!-- 문서 파싱 -->
  <rect x="204" y="70" width="134" height="68" rx="8" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="271" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">문서 파싱</text>
  <text x="271" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PyMuPDF · Unstructured</text>
  <text x="271" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">텍스트 추출</text>

  <!-- Arrow -->
  <line x1="338" y1="104" x2="368" y2="104" stroke="#555" stroke-width="2"/>
  <polygon points="368,98 382,104 368,110" fill="#555"/>

  <!-- 청킹 전략 -->
  <rect x="382" y="70" width="130" height="68" rx="8" fill="#1a1f2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="447" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">청킹 전략</text>
  <text x="447" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">RecursiveCharacter</text>
  <text x="447" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SemanticChunker</text>

  <!-- Arrow -->
  <line x1="512" y1="104" x2="542" y2="104" stroke="#555" stroke-width="2"/>
  <polygon points="542,98 556,104 542,110" fill="#555"/>

  <!-- 임베딩 생성 -->
  <rect x="556" y="70" width="130" height="68" rx="8" fill="#1a1f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="621" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">임베딩 생성</text>
  <text x="621" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">text-embedding-3</text>
  <text x="621" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">BGE-M3 · E5</text>

  <!-- Arrow -->
  <line x1="686" y1="104" x2="716" y2="104" stroke="#555" stroke-width="2"/>
  <polygon points="716,98 730,104 716,110" fill="#555"/>

  <!-- 벡터DB 저장 -->
  <rect x="730" y="70" width="120" height="68" rx="8" fill="#1a1f2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="790" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">벡터DB 저장</text>
  <text x="790" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">pgvector · Qdrant</text>
  <text x="790" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HNSW 인덱스</text>

  <!-- Metadata extraction branch (below) -->
  <!-- From 문서 파싱 downward -->
  <line x1="271" y1="138" x2="271" y2="185" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="265,185 271,198 277,185" fill="#888"/>

  <!-- 메타데이터 추출 -->
  <rect x="185" y="198" width="170" height="60" rx="8" fill="#141420" stroke="#888" stroke-width="1.5"/>
  <text x="270" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">메타데이터 추출</text>
  <text x="270" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">제목 · 날짜 · 출처 · 페이지</text>

  <!-- Arrow from metadata to vector DB storage -->
  <line x1="355" y1="228" x2="730" y2="228" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="730" y1="228" x2="730" y2="160" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="724,160 730,148 736,160" fill="#888"/>
  <text x="530" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">메타데이터 함께 저장</text>

  <!-- Combined storage diagram -->
  <rect x="200" y="280" width="480" height="62" rx="8" fill="#111520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">벡터DB 레코드 구조</text>
  <rect x="215" y="312" width="90" height="22" rx="4" fill="#1a1f2e" stroke="#e05555" stroke-width="1"/>
  <text x="260" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">벡터 [1536-dim]</text>
  <rect x="315" y="312" width="80" height="22" rx="4" fill="#1a1f2e" stroke="#55c555" stroke-width="1"/>
  <text x="355" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">청크 텍스트</text>
  <rect x="405" y="312" width="80" height="22" rx="4" fill="#1a1f2e" stroke="#888" stroke-width="1"/>
  <text x="445" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">출처 메타데이터</text>
  <rect x="495" y="312" width="80" height="22" rx="4" fill="#1a1f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="535" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">고유 ID</text>
  <rect x="585" y="312" width="80" height="22" rx="4" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="625" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">타임스탬프</text>
</svg>
