<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Promise 체이닝 &#x2014; 값과 에러의 흐름</text>

  <!-- State boxes -->
  <rect x="50" y="90" width="110" height="50" rx="6" fill="#1a2540" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="105" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Promise</text>
  <text x="105" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">fulfilled(1)</text>

  <line x1="160" y1="115" x2="186" y2="115" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="186,109 198,115 186,121" fill="#55c555"/>

  <rect x="198" y="90" width="110" height="50" rx="6" fill="#1a2540" stroke="#55c555" stroke-width="1.5"/>
  <text x="253" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">fulfilled(2)</text>
  <text x="253" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.then(v=&gt;v*2)</text>

  <line x1="308" y1="115" x2="334" y2="115" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="334,109 346,115 334,121" fill="#e05555"/>

  <rect x="346" y="90" width="110" height="50" rx="6" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="401" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">rejected</text>
  <text x="401" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.then(throw)</text>

  <line x1="456" y1="115" x2="482" y2="115" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="482,109 494,115 482,121" fill="#e05555"/>

  <rect x="494" y="90" width="116" height="50" rx="6" fill="#102020" stroke="#55c555" stroke-width="1.5"/>
  <text x="552" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">.catch &#xAE;&#xB3;&#xBB;&#xAD;</text>
  <text x="552" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">fulfilled</text>

  <line x1="610" y1="115" x2="636" y2="115" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="636,109 648,115 636,121" fill="#7777cc"/>

  <rect x="648" y="90" width="180" height="50" rx="6" fill="#1a1530" stroke="#7777cc" stroke-width="1.5"/>
  <text x="738" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">.finally(cleanup)</text>
  <text x="738" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">&#xD56D;&#xC0C1; &#xC2E4;&#xD589;</text>

  <!-- Left code: correct chain -->
  <rect x="50" y="165" width="380" height="275" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="66" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">&#xC62C;&#xBC14;&#xB978; &#xCCB4;&#xC774;&#xB2DD;</text>

  <text x="66" y="211" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">fetchUser(id)</text>
  <text x="66" y="229" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  .then(user </tspan><tspan fill="#e8e8e8">=&gt; fetchPosts(user.id))</tspan></text>
  <text x="66" y="247" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  .then(posts </tspan><tspan fill="#e8e8e8">=&gt; render(posts))</tspan></text>
  <text x="66" y="265" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  .catch(err </tspan><tspan fill="#e8e8e8">=&gt; showError(err))</tspan></text>
  <text x="66" y="283" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  .finally(() </text><text x="158" y="283" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">=&gt; hideLoading())</text>

  <line x1="66" y1="300" x2="414" y2="300" stroke="#1e2433" stroke-width="1"/>
  <text x="66" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">&#xD754;&#xD55C; &#xC2E4;&#xC218; &#x2014; return &#xB204;&#xB77D;</text>

  <text x="66" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// return &#xC5C6;&#xC73C;&#xBA74; undefined &#xC804;&#xB2EC;</text>
  <text x="66" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">.then(user </text><text x="148" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">=&gt; {</text>
  <text x="66" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  fetchPosts(user.id) </text>
  <text x="66" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // return &#xB204;&#xB77D; &#x2192; undefined</text>
  <text x="66" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">})</text>

  <!-- Right code: anti-patterns -->
  <rect x="450" y="165" width="380" height="275" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">.catch &#xC704;&#xCE58;&#xC5D0; &#xB530;&#xB978; &#xCC28;&#xC774;</text>

  <text x="466" y="211" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// &#xBC30;&#xC5F4; &#xC911;&#xAC04;&#xC5D0; .catch</text>
  <text x="466" y="229" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p.then(a)</text>
  <text x="466" y="247" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> .catch(e </text><text x="536" y="247" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">=&gt; fallback(e))</text>
  <text x="466" y="265" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> .then(b)</text>
  <text x="466" y="283" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// a &#xC2E4;&#xD328;&#xC2DC; fallback&#xD6C4; b &#xC2E4;&#xD589;</text>

  <line x1="466" y1="300" x2="814" y2="300" stroke="#1e2433" stroke-width="1"/>
  <text x="466" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">.finally &#xD2B9;&#xC131;</text>

  <text x="466" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">.finally(fn)</text>
  <text x="466" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&#xBC18;&#xD658;&#xAC12; &#xBB34;&#xC2DC; (throw &#xC81C;&#xC678;)</text>
  <text x="466" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&#xC774;&#xC804; &#xAC12;/&#xC5D0;&#xB7EC;&#xB97C; &#xADF8;&#xB300;&#xB85C; &#xD1B5;&#xACFC;</text>
  <text x="466" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">p.finally(cleanup).then(v) </text>
  <text x="466" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// v = p&#xC758; &#xBCF8;&#xB798; &#xAC12;</text>
</svg>
