<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 620">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arrYellow" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c44a"/>
    </marker>
  </defs>
  <rect width="880" height="620" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CRD OpenAPI v3 스키마 검증 구조</text>

  <!-- CRD YAML code block -->
  <rect x="60" y="68" width="400" height="508" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># CRD 구조적 스키마 정의</text>
  <text x="80" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">versions</text>
  <text x="138" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">:</text>
  <text x="80" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  - name: </text>
  <text x="163" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">v1</text>
  <text x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    served: </text>
  <text x="167" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">true</text>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    storage: </text>
  <text x="172" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">true</text>
  <text x="80" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    schema:</text>
  <text x="80" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      openAPIV3Schema:</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        type: </text>
  <text x="167" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">object</text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        properties:</text>
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          spec:</text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">            type: </text>
  <text x="176" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">object</text>
  <text x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">            required: </text>
  <text x="196" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">[engine]</text>
  <text x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">            properties:</text>
  <text x="80" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">              engine:</text>
  <text x="80" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                type: </text>
  <text x="189" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">string</text>
  <text x="80" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                enum: </text>
  <text x="193" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">[pg, mysql]</text>
  <text x="80" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">              replicas:</text>
  <text x="80" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                type: </text>
  <text x="189" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">integer</text>
  <text x="80" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                minimum: 1</text>
  <text x="80" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                maximum: 10</text>
  <text x="80" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">              storage:</text>
  <text x="80" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                type: </text>
  <text x="189" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">string</text>
  <text x="80" y="490" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                pattern: </text>
  <text x="213" y="490" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'^[0-9]+Gi$'</text>
  <text x="80" y="526" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># CEL 크로스 필드 검증</text>
  <text x="80" y="544" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">x-kubernetes-validations</text>
  <text x="80" y="562" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  - rule: </text>
  <text x="154" y="562" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">self.min &lt; self.max</text>

  <!-- Right side: Annotation boxes -->
  <!-- Schema Type box -->
  <rect x="490" y="68" width="330" height="72" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="510" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">구조적 스키마 (Structural Schema)</text>
  <text x="510" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 필드에 type 명시 필수</text>
  <text x="510" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">apiextensions.k8s.io/v1 부터 강제</text>

  <!-- served / storage box -->
  <rect x="490" y="156" width="330" height="72" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="510" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">served / storage 플래그</text>
  <text x="510" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">served: API 요청 처리 여부</text>
  <text x="510" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">storage: etcd 저장 버전 (1개만 true)</text>

  <!-- required box -->
  <rect x="490" y="244" width="330" height="72" rx="6" fill="#1a0a00" stroke="#e05555" stroke-width="1.5"/>
  <text x="510" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">required 필드 검증</text>
  <text x="510" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">누락 시 API Server 즉시 거부 (400)</text>
  <text x="510" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">enum, minimum, maximum 등 규칙 적용</text>

  <!-- pattern box -->
  <rect x="490" y="332" width="330" height="72" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="510" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">pattern 정규식 검증</text>
  <text x="510" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">format: date-time, email, uri 등</text>
  <text x="510" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">string 타입에만 적용 가능</text>

  <!-- CEL box -->
  <rect x="490" y="420" width="330" height="88" rx="6" fill="#1a1000" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="510" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c44a">CEL 표현식 검증 (k8s 1.25+)</text>
  <text x="510" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">x-kubernetes-validations: rule/message</text>
  <text x="510" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">크로스 필드 검증: self.min &lt; self.max</text>
  <text x="510" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Webhook 없이 서버사이드 검증 가능</text>

  <!-- Connecting dashed lines -->
  <line x1="460" y1="140" x2="488" y2="104" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="460" y1="157" x2="488" y2="192" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrGreen)"/>
  <line x1="460" y1="292" x2="488" y2="280" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>
  <line x1="460" y1="382" x2="488" y2="368" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrPurple)"/>
  <line x1="460" y1="556" x2="488" y2="464" stroke="#e8c44a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrYellow)"/>
</svg>
