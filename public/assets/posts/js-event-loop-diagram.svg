<svg width="880" height="520" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="700">JavaScript 이벤트 루프 구조</text>
  <text x="440" y="64" text-anchor="middle" fill="#555" font-size="13">콜 스택 · Web API · 태스크 큐 · 마이크로태스크 큐</text>

  <!-- Call Stack -->
  <rect x="40" y="88" width="180" height="320" rx="10" fill="#111" stroke="#3a2a1a" stroke-width="1.5"/>
  <rect x="40" y="88" width="180" height="38" rx="10" fill="#2a1a0a"/>
  <text x="130" y="113" text-anchor="middle" fill="#ddaa55" font-size="13" font-weight="700">콜 스택</text>
  <text x="130" y="136" text-anchor="middle" fill="#666" font-size="10">Call Stack</text>
  <!-- stack slots -->
  <rect x="56" y="152" width="148" height="36" rx="5" fill="#1e1a10" stroke="#4a3a20" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" fill="#888" font-size="11">현재 실행 중인 함수</text>
  <rect x="56" y="196" width="148" height="36" rx="5" fill="#1a1a10" stroke="#3a3a20" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="130" y="219" text-anchor="middle" fill="#555" font-size="11">이전 함수 (대기)</text>
  <rect x="56" y="240" width="148" height="36" rx="5" fill="#161610" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="130" y="263" text-anchor="middle" fill="#444" font-size="11">전역 컨텍스트</text>
  <text x="130" y="360" text-anchor="middle" fill="#444" font-size="10">LIFO (후입선출)</text>

  <!-- Web APIs -->
  <rect x="340" y="88" width="200" height="320" rx="10" fill="#111" stroke="#1a3a1a" stroke-width="1.5"/>
  <rect x="340" y="88" width="200" height="38" rx="10" fill="#0a2a0a"/>
  <text x="440" y="113" text-anchor="middle" fill="#88cc88" font-size="13" font-weight="700">Web API</text>
  <text x="440" y="136" text-anchor="middle" fill="#444" font-size="10">브라우저 / Node.js 제공</text>

  <rect x="356" y="152" width="168" height="30" rx="5" fill="#0f1f0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="440" y="172" text-anchor="middle" fill="#77bb77" font-size="11">setTimeout / setInterval</text>

  <rect x="356" y="190" width="168" height="30" rx="5" fill="#0f1f0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="440" y="210" text-anchor="middle" fill="#77bb77" font-size="11">fetch / XMLHttpRequest</text>

  <rect x="356" y="228" width="168" height="30" rx="5" fill="#0f1f0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="440" y="248" text-anchor="middle" fill="#77bb77" font-size="11">DOM 이벤트 리스너</text>

  <rect x="356" y="266" width="168" height="30" rx="5" fill="#0f1f0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="440" y="286" text-anchor="middle" fill="#77bb77" font-size="11">requestAnimationFrame</text>

  <text x="440" y="360" text-anchor="middle" fill="#444" font-size="10">완료되면 콜백을 큐에 전달</text>

  <!-- Queues -->
  <rect x="640" y="88" width="200" height="148" rx="10" fill="#111" stroke="#1a1a3a" stroke-width="1.5"/>
  <rect x="640" y="88" width="200" height="38" rx="10" fill="#0a0a2a"/>
  <text x="740" y="113" text-anchor="middle" fill="#9999ee" font-size="12" font-weight="700">마이크로태스크 큐</text>
  <text x="740" y="136" text-anchor="middle" fill="#444" font-size="10">Promise .then / queueMicrotask</text>
  <rect x="656" y="152" width="168" height="28" rx="4" fill="#10102a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="740" y="171" text-anchor="middle" fill="#7777dd" font-size="11">Promise 콜백 (우선)</text>
  <text x="740" y="222" text-anchor="middle" fill="#333" font-size="22">⬆ 먼저</text>

  <rect x="640" y="260" width="200" height="148" rx="10" fill="#111" stroke="#3a1a1a" stroke-width="1.5"/>
  <rect x="640" y="260" width="200" height="38" rx="10" fill="#2a0a0a"/>
  <text x="740" y="285" text-anchor="middle" fill="#ee9999" font-size="12" font-weight="700">태스크 큐 (매크로)</text>
  <text x="740" y="306" text-anchor="middle" fill="#444" font-size="10">setTimeout / DOM 이벤트</text>
  <rect x="656" y="322" width="168" height="28" rx="4" fill="#2a1010" stroke="#5a3a3a" stroke-width="1"/>
  <text x="740" y="341" text-anchor="middle" fill="#dd7777" font-size="11">setTimeout 콜백</text>
  <text x="740" y="394" text-anchor="middle" fill="#333" font-size="22">⬇ 나중</text>

  <!-- Event Loop circle -->
  <circle cx="240" cy="450" r="28" fill="none" stroke="#555" stroke-width="2"/>
  <text x="240" y="445" text-anchor="middle" fill="#888" font-size="10" font-weight="600">이벤트</text>
  <text x="240" y="460" text-anchor="middle" fill="#888" font-size="10" font-weight="600">루프</text>

  <!-- Arrows -->
  <!-- Call Stack → Web API -->
  <line x1="220" y1="248" x2="338" y2="248" stroke="#3a5a3a" stroke-width="1.5" marker-end="url(#arr1)"/>
  <text x="279" y="240" text-anchor="middle" fill="#3a6a3a" font-size="10">비동기 호출</text>

  <!-- Web API → Task Queue -->
  <line x1="540" y1="300" x2="638" y2="340" stroke="#5a3a3a" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="594" y="310" text-anchor="middle" fill="#6a3a3a" font-size="10">완료 시 push</text>

  <!-- Web API → Microtask Queue -->
  <line x1="540" y1="190" x2="638" y2="175" stroke="#3a3a6a" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="594" y="172" text-anchor="middle" fill="#3a3a7a" font-size="10">Promise 완료</text>

  <!-- Event loop → Call Stack (microtask first) -->
  <path d="M212 450 Q130 450 130 420" fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr4)"/>

  <!-- Queue → event loop -->
  <path d="M740 436 Q740 470 350 470 Q268 470 268 450" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>

  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3a5a3a"/></marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#5a3a3a"/></marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3a3a6a"/></marker>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#666"/></marker>
  </defs>

  <text x="440" y="495" text-anchor="middle" fill="#333" font-size="11">콜 스택이 비어야 이벤트 루프가 큐에서 다음 태스크를 꺼냅니다 — 마이크로태스크 큐를 먼저 소진합니다</text>
</svg>
