<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">가상 파일시스템 — 세 종류 비교</text>

  <!-- Kernel layer -->
  <rect x="60" y="68" width="760" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">리눅스 커널</text>
  <text x="440" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프로세스 테이블 / 하드웨어 드라이버 / 디바이스 트리</text>

  <!-- Three columns -->
  <!-- tmpfs -->
  <rect x="60" y="148" width="240" height="230" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#7ec8e3" text-anchor="middle">tmpfs</text>
  <text x="180" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">/tmp, /run, /dev/shm</text>

  <text x="75" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• RAM 기반 임시 저장소</text>
  <text x="75" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 재부팅 시 내용 소실</text>
  <text x="75" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 스왑까지 확장 가능</text>
  <text x="75" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• size= 옵션으로 제한</text>
  <text x="75" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 읽기/쓰기 가능</text>
  <text x="75" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">용도: 임시 파일, 공유 메모리</text>
  <text x="75" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  빌드 캐시, 세션 데이터</text>
  <text x="75" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c55e">  속도: 디스크보다 수십 배 빠름</text>

  <!-- procfs -->
  <rect x="320" y="148" width="240" height="230" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#55c555" text-anchor="middle">procfs</text>
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">/proc</text>

  <text x="335" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 프로세스 정보 노출</text>
  <text x="335" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• /proc/{PID}/... 구조</text>
  <text x="335" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 디스크에 실제 파일 없음</text>
  <text x="335" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 읽기/일부 쓰기 가능</text>
  <text x="335" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 커널 파라미터 via /proc/sys</text>
  <text x="335" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">용도: ps, top, lsof 등 도구가</text>
  <text x="335" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  실제로 읽는 데이터 소스</text>
  <text x="335" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c55e">  sysctl은 /proc/sys 래퍼</text>

  <!-- sysfs -->
  <rect x="580" y="148" width="240" height="230" rx="8" fill="#1e0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#e05555" text-anchor="middle">sysfs</text>
  <text x="700" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">/sys</text>

  <text x="595" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 하드웨어·드라이버 트리</text>
  <text x="595" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 디바이스 속성 읽기/쓰기</text>
  <text x="595" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• /sys/class, /sys/bus 계층</text>
  <text x="595" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• udev 이벤트 소스</text>
  <text x="595" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• cgroup v1도 여기 있음</text>
  <text x="595" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">용도: 배터리 잔량, 네트워크</text>
  <text x="595" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  인터페이스, LED 제어 등</text>
  <text x="595" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c55e">  procfs보다 구조화된 API</text>

  <!-- Arrows from kernel -->
  <line x1="220" y1="118" x2="180" y2="148" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="118" x2="440" y2="148" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="118" x2="700" y2="148" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bottom summary -->
  <rect x="60" y="398" width="760" height="72" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">공통점: 모두 메모리에만 존재 — 디스크 I/O 없음, 재부팅 시 초기화</text>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">tmpfs = 사용자 데이터 저장 | procfs = 프로세스·커널 파라미터 | sysfs = 하드웨어·드라이버</text>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">mount -t tmpfs/proc/sysfs 로 어디든 마운트 가능 (단, 관례적 위치 사용 권장)</text>
</svg>
