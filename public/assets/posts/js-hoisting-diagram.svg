<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">호이스팅 — 코드가 실제로 실행되는 순서</text>

  <!-- Left: Written code -->
  <text x="200" y="76" text-anchor="middle" font-size="14" font-weight="600" fill="#888">개발자가 작성한 코드</text>
  <rect x="60" y="86" width="320" height="340" rx="8" fill="#0d1117" stroke="#444" stroke-width="1.5"/>
  <rect x="76" y="100" width="288" height="314" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="88" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 함수 선언문 호출 먼저</text>
  <text x="88" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">sayHello(); // 'Hello!'</text>
  <text x="88" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="88" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 함수 선언문 — 아래에 있음</text>
  <text x="88" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function sayHello() {</text>
  <text x="88" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  console.log('Hello!');</text>
  <text x="88" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">}</text>
  <text x="88" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="88" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// var 변수</text>
  <text x="88" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">console.log(x); // undefined</text>
  <text x="88" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">var x = 10;</text>
  <text x="88" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">console.log(x); // 10</text>
  <text x="88" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="88" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 함수 표현식 — 호이스팅 없음</text>
  <text x="88" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">sayBye(); // TypeError!</text>
  <text x="88" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">var sayBye = function() {};</text>

  <!-- Center arrow -->
  <polygon points="388,228 388,252 412,240" fill="#7777cc"/>
  <text x="400" y="218" text-anchor="middle" font-size="11" fill="#7777cc">JS 엔진</text>
  <text x="400" y="262" text-anchor="middle" font-size="11" fill="#7777cc">처리</text>

  <!-- Right: After hoisting -->
  <text x="660" y="76" text-anchor="middle" font-size="14" font-weight="600" fill="#888">엔진이 실제로 처리하는 순서</text>
  <rect x="420" y="86" width="400" height="340" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="436" y="100" width="368" height="314" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="448" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 1. 함수 선언문 전체 호이스팅</text>
  <text x="448" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function sayHello() {</text>
  <text x="448" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  console.log('Hello!');</text>
  <text x="448" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">}</text>
  <text x="448" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 2. var 선언 호이스팅 (undefined)</text>
  <text x="448" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">var x = undefined; // 호이스팅</text>
  <text x="448" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">var sayBye = undefined;</text>
  <text x="448" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="448" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 3. 실제 코드 실행</text>
  <text x="448" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">sayHello(); // 'Hello!'</text>
  <text x="448" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">console.log(x); // undefined</text>
  <text x="448" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">x = 10;</text>
  <text x="448" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">console.log(x); // 10</text>
  <text x="448" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">sayBye(); // TypeError: not a function</text>
  <text x="448" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">sayBye = function() {};</text>

  <!-- Bottom note -->
  <rect x="60" y="446" width="760" height="40" rx="6" fill="#0d1117" stroke="#2a2a2a"/>
  <text x="440" y="471" text-anchor="middle" font-size="12" fill="#888">함수 선언문 → 완전히 호이스팅 / var → undefined로 호이스팅 / let·const → TDZ (호이스팅은 되나 접근 불가)</text>

  <!-- Footer -->
  <text x="440" y="512" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
