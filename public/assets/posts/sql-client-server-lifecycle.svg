<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 쿼리 생애 주기 (Query Lifecycle)</text>

  <defs>
    <marker id="ql-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Steps -->
  <rect x="60" y="72" width="130" height="60" fill="#111" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 연결</text>
  <text x="125" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">TCP + 인증</text>

  <line x1="190" y1="102" x2="220" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ql-arr)"/>

  <rect x="220" y="72" width="130" height="60" fill="#111" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="285" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">② 전송</text>
  <text x="285" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SQL 문자열</text>

  <line x1="350" y1="102" x2="380" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ql-arr)"/>

  <rect x="380" y="72" width="130" height="60" fill="#111" rx="6" stroke="#e8a020" stroke-width="1.5"/>
  <text x="445" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">③ 파싱</text>
  <text x="445" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">문법 + 의미 검사</text>

  <line x1="510" y1="102" x2="540" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ql-arr)"/>

  <rect x="540" y="72" width="130" height="60" fill="#111" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="605" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">④ 최적화</text>
  <text x="605" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">실행 계획 생성</text>

  <line x1="670" y1="102" x2="700" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ql-arr)"/>

  <rect x="700" y="72" width="120" height="60" fill="#111" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="760" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">⑤ 실행</text>
  <text x="760" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">데이터 접근</text>

  <!-- Details section -->
  <rect x="60" y="158" width="760" height="250" fill="#0d0d0d" rx="8" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Col 1: 준비된 쿼리 -->
  <text x="200" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Prepared Statement</text>
  <rect x="76" y="192" width="248" height="200" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 1. 준비 (한 번만)</text>
  <text x="92" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">PREPARE</text>
  <text x="154" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> stmt FROM</text>
  <text x="92" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  'SELECT * FROM u</text>
  <text x="92" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">   WHERE id = ?'</text>
  <text x="92" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 2. 실행 (반복)</text>
  <text x="92" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">EXECUTE</text>
  <text x="155" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> stmt</text>
  <text x="92" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  USING</text>
  <text x="140" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> 42</text>
  <text x="92" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- SQL 인젝션 방어!</text>

  <!-- Col 2: 커넥션 풀 -->
  <text x="560" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">커넥션 풀 (Connection Pool)</text>
  <rect x="344" y="192" width="400" height="200" fill="#111" rx="4" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="360" y="208" width="368" height="28" fill="#162030" rx="3"/>
  <text x="544" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">문제: DB 연결은 비싸다 (50~200ms)</text>

  <text x="360" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해결: 연결을 미리 만들어 재사용</text>

  <rect x="360" y="270" width="100" height="28" fill="#122016" rx="3"/>
  <text x="410" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">유휴(Idle)</text>
  <rect x="470" y="270" width="100" height="28" fill="#122016" rx="3"/>
  <text x="520" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">유휴(Idle)</text>
  <rect x="580" y="270" width="100" height="28" fill="#1a2a0a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="630" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">사용중</text>

  <text x="544" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">HikariCP(Java), pgBouncer(PG)</text>
  <text x="544" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">최소/최대 풀 크기 설정 필수</text>
  <text x="544" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">커넥션 누수(leak) 주의</text>
  <text x="544" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">idle_timeout, max_lifetime 튜닝</text>
</svg>