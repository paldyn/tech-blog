<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NSS 조회 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">/etc/nsswitch.conf 설정에 따른 소스 우선순위</text>

  <!-- nsswitch.conf snippet -->
  <rect x="60" y="88" width="350" height="120" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">/etc/nsswitch.conf</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">passwd:</text><text x="156" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  files systemd ldap</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">group:</text><text x="156" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">   files systemd</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">hosts:</text><text x="156" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    files dns</text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">shadow:</text><text x="156" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  files</text>

  <!-- Flow diagram -->
  <!-- App -->
  <rect x="500" y="88" width="110" height="44" fill="#1a1a2e" rx="6" stroke="#2d2d5f" stroke-width="1.5"/>
  <text x="555" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">애플리케이션</text>

  <!-- Arrow down -->
  <line x1="555" y1="132" x2="555" y2="156" stroke="#555" stroke-width="2"/>
  <polygon points="550,156 555,166 560,156" fill="#555"/>

  <!-- NSS library -->
  <rect x="470" y="166" width="170" height="44" fill="#0d1929" rx="6" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="555" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">glibc NSS</text>

  <!-- Arrow to files -->
  <line x1="555" y1="210" x2="555" y2="234" stroke="#555" stroke-width="2"/>
  <polygon points="550,234 555,244 560,234" fill="#555"/>

  <!-- Reads nsswitch.conf -->
  <rect x="470" y="244" width="170" height="44" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="555" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">nsswitch.conf 읽기</text>
  <text x="555" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">소스 순서 결정</text>

  <!-- Sources -->
  <line x1="470" y1="266" x2="340" y2="310" stroke="#55c555" stroke-width="1.5"/>
  <line x1="555" y1="288" x2="555" y2="310" stroke="#55c555" stroke-width="1.5"/>
  <line x1="640" y1="266" x2="760" y2="310" stroke="#55c555" stroke-width="1.5"/>

  <rect x="240" y="310" width="100" height="44" fill="#0d200d" rx="6" stroke="#2d4a1e" stroke-width="1"/>
  <text x="290" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">/etc/passwd</text>
  <text x="290" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">files</text>

  <rect x="505" y="310" width="100" height="44" fill="#0d1929" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="555" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">systemd-userdb</text>
  <text x="555" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">systemd</text>

  <rect x="710" y="310" width="100" height="44" fill="#1a1a2e" rx="6" stroke="#2d2d5f" stroke-width="1"/>
  <text x="760" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">LDAP/AD</text>
  <text x="760" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ldap</text>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">getent는 이 흐름 전체를 통합 조회 — cat /etc/passwd 보다 신뢰성 높음</text>
</svg>
