<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Thread Priority &amp; Daemon Thread</text>

  <!-- Priority Section -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">스레드 우선순위 (1~10)</text>

  <!-- Priority bar chart -->
  <rect x="60" y="90" width="380" height="200" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>

  <!-- MIN_PRIORITY = 1 -->
  <rect x="90" y="240" width="40" height="20" rx="3" fill="#7777cc"/>
  <text x="110" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">1</text>
  <text x="110" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888">MIN</text>

  <!-- 5 = NORM_PRIORITY -->
  <rect x="190" y="200" width="40" height="60" rx="3" fill="#55c555"/>
  <text x="210" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">5</text>
  <text x="210" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888">NORM</text>

  <!-- MAX_PRIORITY = 10 -->
  <rect x="290" y="140" width="40" height="120" rx="3" fill="#e05555"/>
  <text x="310" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">10</text>
  <text x="310" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888">MAX</text>

  <text x="80" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기본값: NORM_PRIORITY(5)  |  OS 스케줄러 힌트일 뿐, 보장 없음</text>

  <!-- Daemon Section -->
  <text x="490" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">데몬 스레드 vs 사용자 스레드</text>

  <rect x="470" y="90" width="360" height="200" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>

  <!-- User thread box -->
  <rect x="490" y="110" width="140" height="60" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="560" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">사용자 스레드</text>
  <text x="560" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">isDaemon() = false</text>
  <text x="560" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">JVM 종료 블록</text>

  <!-- Daemon thread box -->
  <rect x="650" y="110" width="140" height="60" rx="6" fill="#1a1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="720" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c44a">데몬 스레드</text>
  <text x="720" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">isDaemon() = true</text>
  <text x="720" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">JVM 종료 시 강제 중단</text>

  <!-- JVM box -->
  <rect x="570" y="210" width="100" height="46" rx="6" fill="#1f0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="620" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">JVM</text>
  <text x="620" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">종료 결정</text>

  <line x1="560" y1="170" x2="595" y2="210" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrd)"/>
  <line x1="720" y1="170" x2="655" y2="210" stroke="#e8c44a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrd)"/>

  <text x="490" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GC, JIT 컴파일러 등이 대표적인 데몬 스레드</text>

  <!-- Code example -->
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">코드 예시</text>
  <rect x="60" y="350" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">Thread</text>
  <text x="152" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> daemon = </text>
  <text x="222" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">new</text>
  <text x="248" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Thread(() -&gt; { </text>
  <text x="380" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">/* 백그라운드 작업 */</text>
  <text x="562" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> });</text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// start() 전에 설정해야 함</text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">daemon.setDaemon(</text>
  <text x="222" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">true</text>
  <text x="248" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>
  <text x="76" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">daemon.setPriority(Thread.MIN_PRIORITY);</text>
  <text x="76" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">daemon.start();</text>
  <text x="76" y="462" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 사용자 스레드 없으면 JVM이 daemon도 강제 종료</text>
</svg>
