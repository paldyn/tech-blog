<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-blue5" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green5" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red5" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커버리지 유도 퍼징 루프</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">새 코드 경로를 연 입력은 시드로 환류되어 탐색이 점점 깊어진다</text>

  <!-- corpus -->
  <rect x="60" y="160" width="180" height="70" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">시드 코퍼스</text>
  <text x="150" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">정상 입력 샘플 모음</text>
  <text x="150" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">JSON · 이미지 · 패킷 등</text>

  <!-- mutate -->
  <rect x="300" y="160" width="180" height="70" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">변형 (Mutation)</text>
  <text x="390" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">비트 플립 · 길이 변경 ·</text>
  <text x="390" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">경계값 삽입 · 청크 교환</text>

  <!-- execute -->
  <rect x="540" y="160" width="180" height="70" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="630" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">실행 + 관측</text>
  <text x="630" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">계측된 타깃에 입력 주입</text>
  <text x="630" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">초당 수천~수만 회</text>

  <line x1="240" y1="195" x2="298" y2="195" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue5)"/>
  <line x1="480" y1="195" x2="538" y2="195" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue5)"/>

  <!-- coverage feedback (bottom curve back to corpus) -->
  <path d="M 630 230 C 630 320, 150 320, 150 232" fill="none" stroke="#55c555"
        stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#arr-green5)"/>
  <text x="390" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">새 코드 경로 발견 → 해당 입력을 코퍼스에 추가</text>

  <!-- crash output -->
  <line x1="720" y1="195" x2="758" y2="195" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red5)"/>
  <rect x="760" y="130" width="80" height="130" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="800" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">크래시</text>
  <text x="800" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">행 · 누수</text>
  <text x="800" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">단언 실패</text>
  <text x="800" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">재현 파일 저장</text>

  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">크래시를 일으킨 입력은 그대로 재현 가능한 버그 리포트가 된다</text>
</svg>
