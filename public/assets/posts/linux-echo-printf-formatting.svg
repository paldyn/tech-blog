<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">printf 포맷 문자열</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">다양한 형식 지정자와 실행 결과</text>

  <!-- left: format specifiers examples -->
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 형식 지정자</text>
  <rect x="60" y="120" width="360" height="256" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ printf <tspan fill="#ce9178">"%s\n"</tspan><tspan fill="#ffffff"> "hello"</tspan></text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">hello</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ printf <tspan fill="#ce9178">"%d + %d = %d\n"</tspan><tspan fill="#ffffff"> 3 5 8</tspan></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">3 + 5 = 8</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ printf <tspan fill="#ce9178">"%.2f\n"</tspan><tspan fill="#ffffff"> 3.14159</tspan></text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">3.14</text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ printf <tspan fill="#ce9178">"%-10s %5d\n"</tspan><tspan fill="#ffffff"> "item" 42</tspan></text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">item           42</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ printf <tspan fill="#ce9178">"%05d\n"</tspan><tspan fill="#ffffff"> 42</tspan></text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">00042</text>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ printf <tspan fill="#ce9178">"%x %o\n"</tspan><tspan fill="#ffffff"> 255 255</tspan></text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">ff 377</text>

  <!-- right: escape sequences + repeat trick -->
  <text x="480" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">이스케이프 시퀀스 &amp; 반복 출력</text>
  <rect x="460" y="120" width="360" height="256" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 이스케이프 시퀀스</text>
  <text x="476" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">\n</tspan> 개행  <tspan fill="#7ec8e3">\t</tspan> 탭  <tspan fill="#7ec8e3">\r</tspan> CR</text>
  <text x="476" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">\\</tspan> 백슬래시  <tspan fill="#7ec8e3">\0NNN</tspan> 8진수</text>
  <text x="476" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 구분선 출력 (반복 트릭)</text>
  <text x="476" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ printf <tspan fill="#ce9178">'%0.s-'</tspan><tspan fill="#ffffff"> {1..40}</tspan></text>
  <text x="476" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">----------------------------------------</text>
  <text x="476" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 컬러 출력 (ANSI 코드)</text>
  <text x="476" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ printf <tspan fill="#ce9178">"\e[32m%s\e[0m\n"</tspan><tspan fill="#ffffff"> "OK"</tspan></text>
  <text x="476" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 파일로 리다이렉트</text>
  <text x="476" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ printf <tspan fill="#ce9178">"%s\n"</tspan><tspan fill="#ffffff"> a b c &gt; list.txt</tspan></text>
  <text x="476" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 인자가 포맷보다 많으면 반복</text>
  <text x="476" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ printf <tspan fill="#ce9178">"%d\n"</tspan><tspan fill="#ffffff"> 1 2 3</tspan></text>
  <text x="476" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">1  2  3  (각 줄에 출력)</text>

  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">%-10s: 왼쪽 정렬 10칸 패딩 | %5d: 오른쪽 정렬 5칸 | %05d: 0 패딩</text>
</svg>
