<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Resources YAML</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">m은 milli (1000m = 1 core) · Mi/Gi는 메비바이트/기가비트 단위</text>

  <!-- Left: basic resource config -->
  <rect x="60" y="86" width="360" height="276" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="108"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">containers:</text>
  <text x="80" y="126"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">- name: app</text>
  <text x="80" y="144"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  image: myapp:1.0</text>
  <text x="80" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  resources</text>
  <text x="80" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    requests</text>
  <text x="80" y="198"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">      cpu: "500m"</text>
  <text x="80" y="216"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">      memory: "128Mi"</text>
  <text x="80" y="234"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    limits</text>
  <text x="80" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">      cpu: "1000m"</text>
  <text x="80" y="270"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">      memory: "256Mi"</text>
  <text x="80" y="288"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 단위 표기법</text>
  <text x="80" y="306"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># cpu: "0.5" == "500m"</text>
  <text x="80" y="324"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># memory: "1Gi" = 1073741824</text>
  <text x="80" y="342"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># memory: "1G"  = 1000000000</text>

  <!-- Right: kubectl commands + explanations -->
  <rect x="460" y="86" width="360" height="276" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="108"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 노드별 가용 리소스 확인</text>
  <text x="480" y="126"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="538" y="126"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> describe node node1</text>
  <text x="480" y="144"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Pod 리소스 사용량 실시간</text>
  <text x="480" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="538" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> top pod</text>
  <text x="480" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 Pod 상세</text>
  <text x="480" y="198"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="538" y="198"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> top pod web-0 \</text>
  <text x="480" y="216"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  --containers</text>
  <text x="480" y="234"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># CPU 초과 시: 스로틀링</text>
  <text x="480" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># (죽지 않고 느려짐)</text>
  <text x="480" y="270"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># MEM 초과 시: OOMKilled</text>
  <text x="480" y="288"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># (컨테이너 즉시 종료)</text>

  <!-- Bottom -->
  <rect x="60" y="378" width="760" height="44" rx="6" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="396" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">requests 없는 Pod는 BestEffort QoS가 됩니다 — 리소스 부족 시 가장 먼저 퇴출됩니다</text>
  <text x="440" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">프로덕션 환경에서는 모든 컨테이너에 requests와 limits를 반드시 설정하세요</text>
</svg>
