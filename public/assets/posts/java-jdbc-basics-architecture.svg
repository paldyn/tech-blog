<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="jbArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JDBC 아키텍처 — 표준 API와 드라이버의 분리</text>

  <!-- App -->
  <rect x="60" y="92" width="180" height="70" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">애플리케이션</text>
  <text x="80" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SQL 호출</text>

  <line x1="240" y1="127" x2="320" y2="127" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jbArr)"/>

  <!-- JDBC API -->
  <rect x="320" y="92" width="200" height="70" fill="#101622" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="340" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">JDBC API</text>
  <text x="340" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">java.sql 인터페이스</text>

  <line x1="520" y1="127" x2="600" y2="127" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jbArr)"/>

  <!-- Driver -->
  <rect x="600" y="92" width="220" height="70" fill="#101622" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="620" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">JDBC 드라이버</text>
  <text x="620" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">벤더별 구현체 (jar)</text>

  <!-- arrow down to DB -->
  <line x1="710" y1="162" x2="710" y2="222" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jbArr)"/>

  <!-- DB -->
  <rect x="600" y="232" width="220" height="64" fill="#1a1206" stroke="#e0a555" stroke-width="1.5" rx="8"/>
  <text x="620" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">데이터베이스</text>
  <text x="620" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">MySQL · PostgreSQL · Oracle</text>

  <text x="60" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">코드는 표준 인터페이스에만 의존</text>
  <text x="60" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">→ DB를 바꿔도 드라이버 jar만</text>
  <text x="60" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">교체하면 코드는 그대로</text>
</svg>
