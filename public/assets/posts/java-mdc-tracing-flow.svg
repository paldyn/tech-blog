<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="mdcArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">MDC — 요청 컨텍스트가 모든 로그에 따라붙는다</text>

  <!-- request box -->
  <rect x="60" y="92" width="200" height="70" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">HTTP 요청 진입</text>
  <text x="80" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">필터에서 traceId 발급</text>

  <!-- arrow request -> put -->
  <line x1="260" y1="127" x2="360" y2="127" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mdcArr)"/>

  <!-- MDC.put box -->
  <rect x="360" y="92" width="460" height="70" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="376" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">MDC</tspan>.put(<tspan fill="#ce9178">"traceId"</tspan>, traceId);</text>
  <text x="376" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">MDC</tspan>.put(<tspan fill="#ce9178">"userId"</tspan>, userId);</text>

  <!-- arrow put -> logs (vertical) -->
  <line x1="590" y1="162" x2="590" y2="212" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mdcArr)"/>
  <text x="610" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이후 모든 로그에 자동 주입</text>

  <!-- log lines box -->
  <rect x="60" y="222" width="760" height="120" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#b5cea8">[a1b2c3]</tspan> <tspan fill="#9aa4b8">INFO</tspan>  OrderService - 주문 검증 시작</text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#b5cea8">[a1b2c3]</tspan> <tspan fill="#9aa4b8">INFO</tspan>  PaymentService - 결제 승인 요청</text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#b5cea8">[a1b2c3]</tspan> <tspan fill="#e05555">ERROR</tspan> PaymentService - 한도 초과</text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 같은 traceId로 한 요청을 처음부터 끝까지 추적</text>

  <text x="60" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">패턴에 %X{traceId} 한 줄만 넣으면 코드 변경 없이 모든 로그에 컨텍스트가 붙는다.</text>
</svg>
