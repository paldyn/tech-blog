<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">Path 핵심 패턴 — 코드로 보기</text>

  <!-- Left code block: Path 생성 -->
  <rect x="60" y="62" width="360" height="185" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">// Path 생성</text>
  <text x="76" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="112" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> p1 = </text>
  <text x="174" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="210" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.of(</text>
  <text x="240" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"/home"</text>
  <text x="318" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>

  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="112" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> p2 = </text>
  <text x="174" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="210" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.of(</text>
  <text x="240" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"/home"</text>
  <text x="318" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">,</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    </text>
  <text x="106" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"user"</text>
  <text x="156" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, </text>
  <text x="172" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"docs"</text>
  <text x="222" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>

  <text x="76" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">// resolve - 경로 이어붙이기</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="112" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> docs = p1.resolve(</text>
  <text x="274" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"docs"</text>
  <text x="324" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>

  <text x="76" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">// normalize - .. 제거</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="112" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> n = </text>
  <text x="155" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="191" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.of(</text>
  <text x="221" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"/a/../b"</text>
  <text x="305" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    .normalize(); </text>
  <text x="210" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// /b</text>

  <!-- Right code block: Path 탐색 -->
  <rect x="460" y="62" width="360" height="185" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">// Path 컴포넌트 탐색</text>
  <text x="476" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="512" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> p = </text>
  <text x="548" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="584" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.of(</text>
  <text x="614" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"/a/b/c.txt"</text>
  <text x="730" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>

  <text x="476" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">p.getFileName();    </text>
  <text x="668" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// c.txt</text>

  <text x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">p.getParent();      </text>
  <text x="668" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// /a/b</text>

  <text x="476" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">p.getNameCount();   </text>
  <text x="668" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 3</text>

  <text x="476" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">p.getName(</text>
  <text x="558" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="566" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);       </text>
  <text x="640" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// a</text>

  <text x="476" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">p.isAbsolute();     </text>
  <text x="668" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// true</text>

  <text x="476" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">p.startsWith(</text>
  <text x="580" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"/a"</text>
  <text x="614" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">); </text>
  <text x="640" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// true</text>

  <text x="476" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">// 반복 - 각 경로 요소 순회</text>

  <!-- Bottom code block: iteration + relativize -->
  <rect x="60" y="270" width="760" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">// relativize — 상대 경로 계산 / 상호변환</text>

  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="112" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> base = </text>
  <text x="178" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="214" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.of(</text>
  <text x="244" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"/home/user"</text>
  <text x="358" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>

  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="112" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> target = </text>
  <text x="192" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="228" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">.of(</text>
  <text x="258" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"/home/user/docs/r.pdf"</text>
  <text x="452" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>

  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="112" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> rel = base.relativize(target); </text>
  <text x="376" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// docs/r.pdf</text>

  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// Path ↔ File ↔ URI 상호 변환</text>

  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">File</text>
  <text x="112" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> f = target.toFile();</text>

  <text x="460" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="496" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> back = f.toPath();</text>

  <!-- Labels -->
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">Path.of()는 Java 11+, Paths.get()는 Java 7+ — 동일 결과, Path.of() 권장</text>

  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Path는 불변(immutable) — 모든 조작 메서드는 새 Path 반환</text>
</svg>
