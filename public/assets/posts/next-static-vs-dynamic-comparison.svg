<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">정적 렌더링 vs 동적 렌더링 요청 흐름</text>

  <!-- Static column -->
  <text x="230" y="80"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">정적 렌더링 (Static)</text>

  <!-- Static: Build time -->
  <rect x="60" y="96" width="340" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="122"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">빌드 타임 (next build)</text>
  <text x="230" y="142"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HTML + RSC Payload 생성 · CDN 배포</text>

  <!-- Arrow down -->
  <line x1="230" y1="156" x2="230" y2="186" stroke="#55c555" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Static: CDN -->
  <rect x="80" y="190" width="300" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="216"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">CDN 엣지 노드</text>
  <text x="230" y="234"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전 세계 엣지에 캐시 복사본</text>

  <!-- Arrow down -->
  <line x1="230" y1="246" x2="230" y2="276" stroke="#55c555" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Static: User request -->
  <rect x="60" y="280" width="340" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="306"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">사용자 요청</text>
  <text x="230" y="324"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">가장 가까운 CDN에서 즉시 응답</text>

  <!-- Static: Result -->
  <rect x="80" y="356" width="300" height="52" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="380"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">TTFB: ~10-50ms</text>
  <text x="230" y="398"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버 처리 없음</text>

  <!-- Divider -->
  <line x1="440" y1="72" x2="440" y2="460" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Dynamic column -->
  <text x="660" y="80"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">동적 렌더링 (Dynamic)</text>

  <!-- Dynamic: User request -->
  <rect x="480" y="96" width="340" height="60" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="660" y="122"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">사용자 요청 수신</text>
  <text x="660" y="142"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cookies / headers / searchParams 포함</text>

  <!-- Arrow -->
  <line x1="660" y1="156" x2="660" y2="186" stroke="#e05555" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Dynamic: Server render -->
  <rect x="480" y="190" width="340" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="216"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">서버에서 렌더링</text>
  <text x="660" y="234"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DB 조회 · API 호출 · HTML 생성</text>

  <!-- Arrow -->
  <line x1="660" y1="246" x2="660" y2="276" stroke="#e05555" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Dynamic: Response -->
  <rect x="480" y="280" width="340" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="306"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">HTML 응답</text>
  <text x="660" y="324"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">렌더링 완료 후 전송</text>

  <!-- Dynamic: Result -->
  <rect x="500" y="356" width="300" height="52" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="660" y="380"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">TTFB: ~100-500ms+</text>
  <text x="660" y="398"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버 처리 시간 포함</text>

  <!-- Bottom optimization tip -->
  <rect x="60" y="428" width="760" height="52" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="450"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">동적 렌더링 성능 개선: Suspense로 정적 셸 먼저 전송 + 동적 부분 스트리밍</text>
  <text x="440" y="470"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TTFB는 동적과 같지만, 레이아웃이 먼저 표시되어 체감 성능이 크게 개선됩니다</text>
</svg>
