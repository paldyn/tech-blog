<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">reset --hard 후 커밋 복구 흐름</text>

  <!-- Before reset -->
  <rect x="60" y="76" width="160" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">C: feat: login</text>
  <text x="140" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">← HEAD (현재)</text>

  <rect x="60" y="134" width="160" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">B: refactor</text>

  <rect x="60" y="192" width="160" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">A: init</text>

  <!-- Arrow: reset -->
  <line x1="220" y1="160" x2="290" y2="160" stroke="#e05555" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="255" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">reset --hard HEAD~2</text>

  <!-- After reset -->
  <rect x="300" y="76" width="160" height="50" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="380" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555">C: feat: login</text>
  <text x="380" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">도달 불가!</text>

  <rect x="300" y="134" width="160" height="50" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="380" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555">B: refactor</text>
  <text x="380" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">도달 불가!</text>

  <rect x="300" y="192" width="160" height="50" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">A: init</text>
  <text x="380" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">← HEAD (현재)</text>

  <!-- Arrow: reflog find -->
  <line x1="460" y1="160" x2="530" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="495" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">reflog에서 C SHA 확인</text>

  <!-- After recovery -->
  <rect x="540" y="76" width="160" height="50" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">C: feat: login</text>
  <text x="620" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">← HEAD (복구됨)</text>

  <rect x="540" y="134" width="160" height="50" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">B: refactor</text>

  <rect x="540" y="192" width="160" height="50" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">A: init</text>

  <!-- Code block -->
  <rect x="60" y="264" width="760" height="132" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 1. reflog에서 잃어버린 커밋 찾기</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">reflog</tspan></text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># HEAD@{2}: commit: feat: login → SHA = abc1234</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 2. reset --hard로 복구</text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">reset</tspan> --hard abc1234  <tspan fill="#9aa4b8"># 또는 HEAD@{2}</tspan></text>
</svg>
