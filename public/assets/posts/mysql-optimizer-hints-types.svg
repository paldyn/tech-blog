<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MySQL 옵티마이저 힌트 분류</text>

  <!-- Category 1: 인덱스 -->
  <rect x="40" y="64" width="380" height="36" fill="#0e1a2e" rx="6" stroke="#3a5a8e" stroke-width="1"/>
  <text x="230" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">인덱스 힌트</text>

  <rect x="40" y="108" width="175" height="64" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="127" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">INDEX(t, idx)</text>
  <text x="127" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">특정 인덱스 사용 강제</text>
  <text x="127" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">USE_INDEX와 유사</text>

  <rect x="225" y="108" width="195" height="64" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="322" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">NO_INDEX(t, idx)</text>
  <text x="322" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">특정 인덱스 사용 금지</text>
  <text x="322" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IGNORE_INDEX와 유사</text>

  <!-- Category 2: 조인 순서 -->
  <rect x="460" y="64" width="380" height="36" fill="#0e1a2e" rx="6" stroke="#3a5a8e" stroke-width="1"/>
  <text x="650" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">조인 순서 · 알고리즘 힌트</text>

  <rect x="460" y="108" width="175" height="64" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="547" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">JOIN_ORDER(t1, t2)</text>
  <text x="547" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">조인 테이블 순서 지정</text>
  <text x="547" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">드라이빙 테이블 제어</text>

  <rect x="645" y="108" width="195" height="64" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="742" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">HASH_JOIN(t1, t2)</text>
  <text x="742" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Hash Join 강제 적용</text>
  <text x="742" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">NO_HASH_JOIN으로 금지</text>

  <!-- Category 3: 서브쿼리 -->
  <rect x="40" y="198" width="380" height="36" fill="#0e1a2e" rx="6" stroke="#3a5a8e" stroke-width="1"/>
  <text x="230" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">서브쿼리 변환 힌트</text>

  <rect x="40" y="242" width="175" height="64" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="127" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">SEMIJOIN</text>
  <text x="127" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IN/EXISTS → 세미조인</text>
  <text x="127" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">변환 유도</text>

  <rect x="225" y="242" width="195" height="64" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="322" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">SUBQUERY</text>
  <text x="322" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">NO_SEMIJOIN과 함께</text>
  <text x="322" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서브쿼리 유지 강제</text>

  <!-- Category 4: 파생 테이블 -->
  <rect x="460" y="198" width="380" height="36" fill="#0e1a2e" rx="6" stroke="#3a5a8e" stroke-width="1"/>
  <text x="650" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">파생 테이블 · 최적화 제어</text>

  <rect x="460" y="242" width="175" height="64" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="547" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">MERGE</text>
  <text x="547" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파생 테이블을 외부</text>
  <text x="547" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쿼리에 병합</text>

  <rect x="645" y="242" width="195" height="64" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="742" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0aa55" text-anchor="middle">NO_MERGE</text>
  <text x="742" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파생 테이블을 별도</text>
  <text x="742" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Materialization으로 실행</text>

  <!-- 힌트 위치 -->
  <text x="40" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">힌트 작성 위치 — SELECT 키워드 직후 주석</text>

  <rect x="40" y="356" width="800" height="72" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">SELECT</text>
  <text x="116" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  /*+ INDEX(o idx_status) JOIN_ORDER(o, c) */</text>
  <text x="56" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  o.id, o.amount, c.name</text>
  <text x="56" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">FROM</text>
  <text x="100" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> orders o </text>
  <text x="220" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">JOIN</text>
  <text x="260" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> customers c </text>
  <text x="378" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">ON</text>
  <text x="402" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> o.customer_id = c.id</text>

  <!-- Notice -->
  <rect x="40" y="450" width="800" height="48" fill="#1e1a0a" rx="6" stroke="#e0aa55" stroke-width="1"/>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0aa55" text-anchor="middle">⚠ 힌트는 최후 수단 — 통계 갱신(ANALYZE TABLE), 인덱스 추가를 먼저 시도</text>
  <text x="440" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">힌트는 스키마 변경 없이 계획을 고정하므로, MySQL 버전 업그레이드 시 역효과 가능성 있음</text>
</svg>
