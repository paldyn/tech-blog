<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DoH vs DoT vs 일반 DNS</text>

  <!-- Column headers -->
  <text x="145" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#888" text-anchor="middle">일반 DNS (Plain)</text>
  <text x="430" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">DoT (DNS over TLS)</text>
  <text x="720" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">DoH (DNS over HTTPS)</text>

  <!-- Plain DNS column -->
  <rect x="60" y="88" width="170" height="48" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="145" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Client</text>
  <text x="145" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">UDP/TCP :53</text>

  <line x1="145" y1="136" x2="145" y2="170" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="172" width="170" height="48" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="145" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Resolver</text>
  <text x="145" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">평문 노출</text>

  <!-- Plain DNS problems -->
  <rect x="60" y="238" width="170" height="80" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="145" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">보안 문제</text>
  <text x="145" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ISP 모니터링</text>
  <text x="145" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">중간자 공격 가능</text>
  <text x="145" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">포트 53 차단 대상</text>

  <!-- DoT column -->
  <rect x="335" y="88" width="190" height="48" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="430" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Client</text>
  <text x="430" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TLS Handshake</text>

  <line x1="430" y1="136" x2="430" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">TCP :853</text>

  <rect x="335" y="172" width="190" height="48" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="430" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Resolver</text>
  <text x="430" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">TLS 암호화</text>

  <!-- DoT features -->
  <rect x="335" y="238" width="190" height="98" rx="8" fill="#0f0f1e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="430" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">특징</text>
  <text x="430" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전용 포트 853</text>
  <text x="430" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">트래픽 식별 쉬움</text>
  <text x="430" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네트워크 필터링 가능</text>
  <text x="430" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">DNS 전용 → 낮은 오버헤드</text>

  <!-- DoH column -->
  <rect x="620" y="88" width="200" height="48" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Client (Browser)</text>
  <text x="720" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">HTTPS POST/GET</text>

  <line x1="720" y1="136" x2="720" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="750" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">TCP :443</text>

  <rect x="620" y="172" width="200" height="48" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">DoH Resolver</text>
  <text x="720" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">HTTPS 암호화</text>

  <!-- DoH features -->
  <rect x="620" y="238" width="200" height="98" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">특징</text>
  <text x="720" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">포트 443 (HTTPS와 동일)</text>
  <text x="720" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">방화벽 우회 가능</text>
  <text x="720" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">브라우저 내장 지원</text>
  <text x="720" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e09050" text-anchor="middle">기업망 DNS 정책 우회 논란</text>

  <!-- Public resolvers section -->
  <text x="60" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">주요 공개 DoH/DoT 서버</text>

  <rect x="60" y="382" width="220" height="60" rx="8" fill="#111120" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Cloudflare 1.1.1.1</text>
  <text x="170" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DoT: 1.1.1.1:853</text>
  <text x="170" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DoH: cloudflare-dns.com/dns-query</text>

  <rect x="310" y="382" width="220" height="60" rx="8" fill="#111120" stroke="#7777cc" stroke-width="1"/>
  <text x="420" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Google 8.8.8.8</text>
  <text x="420" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DoT: dns.google:853</text>
  <text x="420" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DoH: dns.google/dns-query</text>

  <rect x="560" y="382" width="260" height="60" rx="8" fill="#111120" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">NextDNS</text>
  <text x="690" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DoT: dns.nextdns.io:853</text>
  <text x="690" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">커스텀 필터링 지원</text>

  <!-- Code block -->
  <rect x="60" y="454" width="760" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="473" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">curl <tspan fill="#7ec8e3" font-weight="600">-H "accept: application/dns-json"</tspan> <tspan fill="#ce9178">"https://cloudflare-dns.com/dns-query?name=example.com&amp;type=A"</tspan></text>
</svg>
