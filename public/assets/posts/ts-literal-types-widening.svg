<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">리터럴 타입 확장 (Widening)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Main code box (10 lines) -->
  <rect x="60" y="66" width="560" height="222" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// let: 리터럴이 string으로 확장됨</tspan></text>
  <text x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> s = </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">;      </tspan><tspan fill="#9aa4b8">// type: string</tspan></text>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> c = </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">;    </tspan><tspan fill="#9aa4b8">// type: "hello" (리터럴)</tspan></text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff"> </tspan></text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 명시적 리터럴 유지</tspan></text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> s2: </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// type: "hello"</tspan></text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff"> </tspan></text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// as const — 중첩 객체도 리터럴</tspan></text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> config = { env: </tspan><tspan fill="#ce9178">"production"</tspan><tspan fill="#ffffff">, port: </tspan><tspan fill="#b5cea8">3000</tspan><tspan fill="#ffffff"> } </tspan><tspan fill="#7ec8e3" font-weight="600">as const</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// env: "production", port: 3000</tspan></text>

  <!-- Annotation panel -->
  <rect x="648" y="66" width="172" height="222" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Annotation: let widening -->
  <text x="734" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">let 선언</text>
  <rect x="664" y="100" width="140" height="36" rx="4" fill="#1a1010"/>
  <text x="734" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" font-weight="600" text-anchor="middle" xml:space="preserve">string으로 확장</text>
  <text x="734" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">재할당 가능하므로</text>

  <!-- Annotation: const literal -->
  <text x="734" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">const 선언</text>
  <rect x="664" y="168" width="140" height="36" rx="4" fill="#0a1a0a"/>
  <text x="734" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600" text-anchor="middle" xml:space="preserve">리터럴 유지</text>
  <text x="734" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">불변이므로 좁힘 유지</text>

  <!-- Annotation: as const -->
  <text x="734" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">as const</text>
  <rect x="664" y="236" width="140" height="36" rx="4" fill="#0a1020"/>
  <text x="734" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle" xml:space="preserve">모든 속성 리터럴</text>
  <text x="734" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">readonly + 리터럴 고정</text>

  <!-- Note box -->
  <rect x="60" y="308" width="760" height="56" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">const 선언은 리터럴 타입 유지 — let은 확장됨. as const로 강제 고정 가능</text>
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">타입 확장(widening)은 TS가 변수 변경 가능성을 고려하여 자동으로 더 넓은 타입을 추론하는 동작</text>
</svg>
