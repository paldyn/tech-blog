<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">파인튜닝 유형 분류</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Full Fine-tuning vs PEFT vs Instruction Tuning</text>

  <!-- Base Model -->
  <rect x="330" y="90" width="220" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">사전 학습 기반 모델</text>
  <text x="440" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">LLaMA, Mistral, Qwen ...</text>

  <!-- Arrows -->
  <line x1="300" y1="140" x2="200" y2="180" stroke="#444" stroke-width="1.5"/>
  <polygon points="198,174 198,186 205,180" fill="#444"/>
  <line x1="440" y1="140" x2="440" y2="180" stroke="#444" stroke-width="1.5"/>
  <polygon points="435,176 440,186 445,176" fill="#444"/>
  <line x1="580" y1="140" x2="680" y2="180" stroke="#444" stroke-width="1.5"/>
  <polygon points="675,174 682,180 675,186" fill="#444"/>

  <!-- Full Fine-tuning -->
  <rect x="60" y="186" width="220" height="110" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Full Fine-tuning</text>
  <text x="170" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체 파라미터 업데이트</text>
  <text x="170" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ddaaaa">성능 최고</text>
  <text x="170" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ddaaaa">GPU 메모리 막대히 필요</text>
  <text x="170" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">7B 모델: A100 80GB×8</text>

  <!-- PEFT -->
  <rect x="330" y="186" width="220" height="110" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">PEFT</text>
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파라미터 효율적 파인튜닝</text>
  <text x="440" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaddaa">소수 파라미터만 학습</text>
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaddaa">LoRA, QLoRA, Adapter</text>
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">7B 모델: A100 40GB 1개</text>

  <!-- Instruction Tuning -->
  <rect x="600" y="186" width="220" height="110" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Instruction Tuning</text>
  <text x="710" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">지시 따르기 학습</text>
  <text x="710" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">SFT: 지시-응답 쌍 학습</text>
  <text x="710" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">RLHF/DPO로 선호 정렬</text>
  <text x="710" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ChatGPT, Claude 제작 방식</text>

  <!-- PEFT sub-types -->
  <rect x="60" y="326" width="760" height="74" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">PEFT 주요 기법</text>

  <text x="160" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">LoRA</text>
  <text x="160" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">저랭크 행렬 추가</text>

  <text x="330" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">QLoRA</text>
  <text x="330" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">4bit 양자화+LoRA</text>

  <text x="500" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Prefix Tuning</text>
  <text x="500" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가상 토큰 프리픽스</text>

  <text x="670" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Adapter</text>
  <text x="670" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">레이어 내 소형 모듈</text>
</svg>
