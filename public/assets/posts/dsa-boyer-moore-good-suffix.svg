<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">보이어-무어: Good Suffix 휴리스틱</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">이미 일치한 접미사를 활용해 더 크게 건너뛰기</text>

  <!-- Concept explanation -->
  <rect x="60" y="88" width="760" height="120" fill="#111" stroke="#3a4a6e" stroke-width="1" rx="8"/>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Good Suffix 원리</text>

  <!-- Scenario 1 -->
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">케이스 1</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패턴에서 이미 일치한 접미사 t가 다른 위치에도 있음</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 그 위치로 정렬되도록 이동</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">케이스 2</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">그런 위치 없음 → t의 접미사 = 패턴 접두사인 최대 길이로 이동</text>

  <!-- Code box -->
  <text x="60" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">보이어-무어 핵심 구현 (Bad Character 포함)</text>
  <rect x="60" y="248" width="760" height="132" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="104" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> bm_search(text, pat):</text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    n, m = len(text), len(pat)</text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    last = {c: i for i, c in enumerate(pat)}</text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    s = 0   </text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">    while</text>
  <text x="124" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> s &lt;= n - m:</text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        j = m - 1</text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">        while</text>
  <text x="126" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> j&gt;=0 and pat[j]==text[s+j]: j-=1</text>
</svg>
