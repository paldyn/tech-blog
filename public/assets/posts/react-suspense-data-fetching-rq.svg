<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-rq" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">React Query + Suspense 통합 패턴</text>

  <!-- Left: architecture diagram -->
  <rect x="60" y="70" width="220" height="56" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">ErrorBoundary</text>
  <text x="170" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">에러 상태 처리</text>

  <line x1="170" y1="126" x2="170" y2="152" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-rq)"/>

  <rect x="60" y="152" width="220" height="56" rx="8" fill="#2a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Suspense</text>
  <text x="170" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로딩 상태 처리</text>

  <line x1="170" y1="208" x2="170" y2="234" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-rq)"/>

  <rect x="60" y="234" width="220" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">DataComponent</text>
  <text x="170" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">useSuspenseQuery</text>

  <line x1="170" y1="290" x2="170" y2="316" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-rq)"/>

  <rect x="60" y="316" width="220" height="56" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <text x="170" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">TanStack Query Cache</text>
  <text x="170" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">백그라운드 재검증</text>

  <!-- Right: code -->
  <rect x="320" y="70" width="520" height="360" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="336" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// useSuspenseQuery 사용 패턴</text>
  <text x="336" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> { useSuspenseQuery } </tspan>
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ce9178"> '@tanstack/react-query'</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="336" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">// isLoading/error 없음 — data는 항상 존재</tspan>
  </text>
  <text x="336" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> UserCard({ id }: { id: string }) {</tspan>
  </text>
  <text x="336" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> { data } = useSuspenseQuery({</tspan>
  </text>
  <text x="336" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    queryKey: [</tspan>
    <tspan fill="#ce9178">'user'</tspan>
    <tspan fill="#ffffff">, id],</tspan>
  </text>
  <text x="336" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    queryFn: () =&gt; fetchUser(id),</tspan>
  </text>
  <text x="336" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  });</text>
  <text x="336" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> &lt;</tspan>
    <tspan fill="#55c555">div</tspan>
    <tspan fill="#ffffff">&gt;{data.name}&lt;/</tspan>
    <tspan fill="#55c555">div</tspan>
    <tspan fill="#ffffff">&gt;;</tspan>
  </text>
  <text x="336" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <text x="336" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 사용: EB + Suspense로 감쌈</text>
  <text x="336" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> Page() {</tspan>
  </text>
  <text x="336" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> (</tspan>
  </text>
  <text x="336" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    &lt;</tspan>
    <tspan fill="#55c555">ErrorBoundary</tspan>
    <tspan fill="#ffffff"> fallback={&lt;</tspan>
    <tspan fill="#55c555">ErrMsg</tspan>
    <tspan fill="#ffffff">/&gt;}&gt;</tspan>
  </text>
  <text x="336" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      &lt;</tspan>
    <tspan fill="#55c555">Suspense</tspan>
    <tspan fill="#ffffff"> fallback={&lt;</tspan>
    <tspan fill="#55c555">Skeleton</tspan>
    <tspan fill="#ffffff">/&gt;}&gt;</tspan>
  </text>
  <text x="336" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        &lt;</tspan>
    <tspan fill="#55c555">UserCard</tspan>
    <tspan fill="#ffffff"> id=</tspan>
    <tspan fill="#ce9178">"123"</tspan>
    <tspan fill="#ffffff">/&gt;</tspan>
  </text>
  <text x="336" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      &lt;/</tspan>
    <tspan fill="#55c555">Suspense</tspan>
    <tspan fill="#ffffff">&gt;&lt;/</tspan>
    <tspan fill="#55c555">ErrorBoundary</tspan>
    <tspan fill="#ffffff">&gt;</tspan>
  </text>
  <text x="336" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  );</text>

  <!-- Bottom note -->
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">useSuspenseQuery는 throwOnError: true + suspense: true 를 기본값으로 함</text>
</svg>
