<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">오버로드 해소 3단계 (컴파일러 탐색 순서)</text>

  <!-- 1단계 -->
  <rect x="60" y="72" width="760" height="64" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="100" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">1단계</text>
  <text x="160" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">정확 일치 (Exact Match)</text>
  <text x="160" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">인수 타입이 매개변수 타입과 완전히 일치하는 메서드를 먼저 선택</text>
  <text x="700" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">가장 우선순위 높음</text>

  <!-- 화살표 1→2 -->
  <line x1="440" y1="136" x2="440" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정확 일치 없을 때</text>

  <!-- 2단계 -->
  <rect x="60" y="162" width="760" height="64" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">2단계</text>
  <text x="160" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">확대 변환 허용 (Widening)</text>
  <text x="160" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">int→long→float→double 등 손실 없는 자동 확대 변환으로 일치하는 메서드 선택</text>

  <!-- 화살표 2→3 -->
  <line x1="440" y1="226" x2="440" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">확대 변환도 없을 때</text>

  <!-- 3단계 -->
  <rect x="60" y="252" width="760" height="64" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="100" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">3단계</text>
  <text x="160" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">가변 인수 허용 (Varargs)</text>
  <text x="160" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">위 두 단계에서 일치하지 않을 때만 varargs(…) 메서드를 후보로 검토</text>

  <!-- 구분선 -->
  <line x1="60" y1="340" x2="820" y2="340" stroke="#2a2a2a" stroke-width="1"/>

  <!-- 실제 예제 코드 박스 -->
  <text x="440" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">단계별 예제</text>

  <rect x="60" y="382" width="360" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">// 오버로드 후보들</text>
  <text x="76" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">void</tspan> show(<tspan font-weight="600" fill="#7ec8e3">int</tspan> n) { }         <tspan fill="#9aa4b8">// A</tspan></text>
  <text x="76" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">void</tspan> show(<tspan font-weight="600" fill="#7ec8e3">long</tspan> n) { }        <tspan fill="#9aa4b8">// B</tspan></text>
  <text x="76" y="464" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">void</tspan> show(<tspan font-weight="600" fill="#7ec8e3">int</tspan>... n) { }      <tspan fill="#9aa4b8">// C</tspan></text>
  <text x="76" y="494" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">show(42);   <tspan fill="#9aa4b8">// → A (정확 일치)</tspan></text>
  <text x="76" y="512" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">show(42L);  <tspan fill="#9aa4b8">// → B (long 정확)</tspan></text>

  <!-- 결과 박스 -->
  <rect x="460" y="382" width="360" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">// byte → 단계별 선택</text>
  <text x="476" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">byte</tspan> b = 10;</text>
  <text x="476" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">show(b);</text>
  <text x="476" y="464" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// byte 정확 없음 (1단계 실패)</text>
  <text x="476" y="484" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// byte→int 확대 → A 선택</text>
  <text x="476" y="504" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">// → 2단계에서 A 선택</text>
</svg>
