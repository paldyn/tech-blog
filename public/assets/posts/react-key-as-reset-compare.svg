<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">key 리셋 vs useEffect — 언제 쓸까?</text>

  <rect x="60" y="72" width="360" height="276" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="240" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">key 리셋 (권장)</text>
  <rect x="76" y="108" width="328" height="228" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="92" dy="0"><tspan fill="#9aa4b8">// userId 바뀌면 폼 전체 리셋</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> ProfileForm({ userId }) {</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [name, setName] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &lt;input value={name} onChange={...} /&gt;;</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="92" dy="18"> </tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Editor({ userId }) {</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">    &lt;ProfileForm</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">      key={userId}</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">      userId={userId}</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">    /&gt;</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">  );</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
  </text>

  <rect x="460" y="72" width="360" height="276" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="640" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">useEffect 리셋 (복잡)</text>
  <rect x="476" y="108" width="328" height="228" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="492" dy="0"><tspan fill="#9aa4b8">// useEffect로 수동 리셋 — 버그 위험</tspan></tspan>
    <tspan x="492" dy="18"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> ProfileForm({ userId }) {</tspan></tspan>
    <tspan x="492" dy="18"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [name, setName] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="492" dy="18"> </tspan>
    <tspan x="492" dy="18"><tspan fill="#ffffff">  useEffect(() =&gt; {</tspan></tspan>
    <tspan x="492" dy="18"><tspan fill="#9aa4b8">    // state 하나씩 수동 초기화</tspan></tspan>
    <tspan x="492" dy="18"><tspan fill="#9aa4b8">    // 실수로 빠뜨리면 버그</tspan></tspan>
    <tspan x="492" dy="18"><tspan fill="#ffffff">    setName(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="492" dy="18"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// 다른 state들도 모두 리셋...</tspan></tspan>
    <tspan x="492" dy="18"><tspan fill="#ffffff">  }, [userId]);</tspan></tspan>
    <tspan x="492" dy="18"> </tspan>
    <tspan x="492" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &lt;input value={name} onChange={...} /&gt;;</tspan></tspan>
    <tspan x="492" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
  </text>
</svg>