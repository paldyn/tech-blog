<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">디코딩 방법 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">속도 · 품질 · 다양성 · 적합 태스크 비교</text>

  <!-- Table header -->
  <rect x="60" y="88" width="760" height="40" fill="#1a1f2e" rx="6"/>
  <text x="140" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">디코딩 방법</text>
  <text x="285" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">속도</text>
  <text x="400" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">출력 품질</text>
  <text x="530" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">다양성</text>
  <text x="690" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">적합 태스크</text>

  <!-- Dividers in header -->
  <line x1="218" y1="88" x2="218" y2="128" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="340" y1="88" x2="340" y2="128" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="460" y1="88" x2="460" y2="128" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="600" y1="88" x2="600" y2="128" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 1: Greedy -->
  <rect x="60" y="128" width="760" height="52" fill="#111" rx="0"/>
  <rect x="60" y="128" width="158" height="52" fill="#111827" rx="0"/>
  <text x="139" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Greedy</text>
  <text x="139" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Decoding</text>
  <!-- Speed: very fast -->
  <rect x="238" y="140" width="80" height="16" fill="#55c555" rx="3" opacity="0.9"/>
  <text x="285" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">매우 빠름</text>
  <!-- Quality: medium -->
  <rect x="352" y="140" width="64" height="16" fill="#7ec8e3" rx="3" opacity="0.7"/>
  <text x="400" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">보통</text>
  <!-- Diversity: none -->
  <rect x="483" y="140" width="48" height="16" fill="#e05555" rx="3" opacity="0.7"/>
  <text x="530" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">없음</text>
  <text x="690" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">사실 QA, 분류, 추출</text>
  <text x="690" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">결정적 출력 필요 시</text>

  <!-- Row 2: Beam Search -->
  <rect x="60" y="180" width="760" height="52" fill="#0d1117" rx="0"/>
  <rect x="60" y="180" width="158" height="52" fill="#111827" rx="0"/>
  <text x="139" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Beam Search</text>
  <text x="139" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">beam_size=5</text>
  <!-- Speed: slow (beam×forward passes) -->
  <rect x="238" y="192" width="48" height="16" fill="#e05555" rx="3" opacity="0.7"/>
  <text x="285" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">느림</text>
  <!-- Quality: high -->
  <rect x="352" y="192" width="80" height="16" fill="#55c555" rx="3" opacity="0.9"/>
  <text x="400" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">높음</text>
  <!-- Diversity: low -->
  <rect x="483" y="192" width="48" height="16" fill="#e05555" rx="3" opacity="0.5"/>
  <text x="530" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">낮음</text>
  <text x="690" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">번역, 요약, 캡션</text>
  <text x="690" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">품질이 최우선일 때</text>

  <!-- Row 3: Diverse Beam Search -->
  <rect x="60" y="232" width="760" height="52" fill="#111" rx="0"/>
  <rect x="60" y="232" width="158" height="52" fill="#111827" rx="0"/>
  <text x="139" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Diverse</text>
  <text x="139" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Beam Search</text>
  <!-- Speed: slow -->
  <rect x="238" y="244" width="48" height="16" fill="#e05555" rx="3" opacity="0.7"/>
  <text x="285" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">느림</text>
  <!-- Quality: good -->
  <rect x="352" y="244" width="64" height="16" fill="#7ec8e3" rx="3" opacity="0.8"/>
  <text x="400" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">좋음</text>
  <!-- Diversity: medium -->
  <rect x="483" y="244" width="64" height="16" fill="#7ec8e3" rx="3" opacity="0.7"/>
  <text x="530" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">중간</text>
  <text x="690" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">다양한 후보 생성</text>
  <text x="690" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">여러 재작성 버전 필요 시</text>

  <!-- Row 4: Sampling (Top-p) -->
  <rect x="60" y="284" width="760" height="52" fill="#0d1117" rx="0"/>
  <rect x="60" y="284" width="158" height="52" fill="#111827" rx="0"/>
  <text x="139" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Sampling</text>
  <text x="139" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Top-p / Nucleus</text>
  <!-- Speed: fast -->
  <rect x="238" y="296" width="64" height="16" fill="#55c555" rx="3" opacity="0.8"/>
  <text x="285" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">빠름</text>
  <!-- Quality: variable -->
  <rect x="352" y="296" width="64" height="16" fill="#7ec8e3" rx="3" opacity="0.7"/>
  <text x="400" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">가변적</text>
  <!-- Diversity: high -->
  <rect x="483" y="296" width="80" height="16" fill="#55c555" rx="3" opacity="0.9"/>
  <text x="530" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">높음</text>
  <text x="690" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">창의적 글쓰기, 대화</text>
  <text x="690" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">가장 범용적으로 쓰임</text>

  <!-- Row 5: Contrastive Search -->
  <rect x="60" y="336" width="760" height="52" fill="#111" rx="0"/>
  <rect x="60" y="336" width="158" height="52" fill="#111827" rx="0"/>
  <text x="139" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Contrastive</text>
  <text x="139" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Search</text>
  <!-- Speed: medium -->
  <rect x="238" y="348" width="64" height="16" fill="#7ec8e3" rx="3" opacity="0.7"/>
  <text x="285" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">보통</text>
  <!-- Quality: high -->
  <rect x="352" y="348" width="80" height="16" fill="#55c555" rx="3" opacity="0.9"/>
  <text x="400" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">높음</text>
  <!-- Diversity: medium-high -->
  <rect x="483" y="348" width="64" height="16" fill="#7ec8e3" rx="3" opacity="0.8"/>
  <text x="530" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" font-weight="700">중상</text>
  <text x="690" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">긴 텍스트, 스토리</text>
  <text x="690" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">반복 없이 유창함 유지</text>

  <!-- Table border and dividers -->
  <rect x="60" y="88" width="760" height="300" fill="none" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="218" y1="128" x2="218" y2="388" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="340" y1="128" x2="340" y2="388" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="460" y1="128" x2="460" y2="388" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="600" y1="128" x2="600" y2="388" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="180" x2="820" y2="180" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="232" x2="820" y2="232" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="284" x2="820" y2="284" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="336" x2="820" y2="336" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Bottom note -->
  <rect x="60" y="400" width="760" height="30" fill="#111827" rx="6"/>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실무 팁: 번역·요약엔 Beam Search, 대화·창작엔 Nucleus Sampling, 장문 생성엔 Contrastive Search가 기본값으로 권장된다</text>
</svg>
