<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">충돌 마커 해부</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">충돌 파일 안에 삽입되는 세 마커의 의미</text>

  <!-- Code block (left) -->
  <rect x="60" y="90" width="440" height="270" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  def get_timeout():</text>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    # ... 이전 코드 ...</text>
  <!-- marker 1 -->
  <rect x="60" y="141" width="440" height="18" fill="#1a1200" opacity="0.7"/>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8a020" xml:space="preserve">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</text>
  <!-- ours -->
  <rect x="60" y="159" width="440" height="36" fill="#0a1a0a" opacity="0.5"/>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">    return 30</text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    # main 브랜치 값</text>
  <!-- separator -->
  <rect x="60" y="195" width="440" height="18" fill="#0d0d1a" opacity="0.7"/>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" xml:space="preserve">=======</text>
  <!-- theirs -->
  <rect x="60" y="213" width="440" height="36" fill="#0a0a1a" opacity="0.5"/>
  <text x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">    return 60</text>
  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    # feature 브랜치 값</text>
  <!-- marker 3 -->
  <rect x="60" y="249" width="440" height="18" fill="#0d1a1a" opacity="0.7"/>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">&gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/timeout-fix</text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    # ... 이후 코드 ...</text>
  <text x="76" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    return 42  # 합의된 값으로 교체</text>

  <!-- Right: annotation boxes -->
  <text x="720" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</text>
  <text x="720" y="173" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">현재 브랜치의 변경 시작</text>
  <line x1="500" y1="150" x2="560" y2="150" stroke="#e8a020" stroke-width="2" stroke-dasharray="3,3"/>

  <text x="720" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">=======</text>
  <text x="720" y="227" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">두 버전을 나누는 구분선</text>
  <line x1="500" y1="204" x2="560" y2="204" stroke="#7777cc" stroke-width="2" stroke-dasharray="3,3"/>

  <text x="720" y="263" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">&gt;&gt;&gt;&gt;&gt;&gt;&gt; 브랜치명</text>
  <text x="720" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">병합 대상 브랜치의 변경 끝</text>
  <line x1="500" y1="258" x2="560" y2="258" stroke="#e05555" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Bottom note -->
  <rect x="60" y="382" width="760" height="54" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">해결 방법: 세 마커와 원치 않는 코드를 모두 제거하고 올바른 코드만 남긴다</text>
  <text x="440" y="426" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">파일에 &lt;&lt;&lt;, ===, &gt;&gt;&gt; 가 하나라도 남으면 커밋이 오염된다</text>
</svg>
