<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">어떤 벡터 DB를 선택할까?</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">의사결정 트리</text>

  <!-- Root question -->
  <rect x="310" y="86" width="260" height="46" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">관리형 클라우드가 필요한가?</text>

  <!-- Yes branch -->
  <line x1="330" y1="132" x2="220" y2="164" stroke="#55c555" stroke-width="2"/>
  <text x="265" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Yes</text>
  <rect x="100" y="164" width="200" height="40" rx="8" fill="#1a1040" stroke="#7777cc" stroke-width="2"/>
  <text x="200" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Pinecone</text>

  <!-- No branch -->
  <line x1="550" y1="132" x2="660" y2="164" stroke="#e05555" stroke-width="2"/>
  <text x="614" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">No (오픈소스)</text>

  <!-- 2nd level: scale question -->
  <rect x="560" y="164" width="220" height="46" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="670" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">규모와 목적은?</text>
  <text x="670" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">프로토타입 / 대규모 / 고성능</text>

  <!-- Chroma: small -->
  <line x1="580" y1="210" x2="200" y2="268" stroke="#888" stroke-width="1.5"/>
  <text x="350" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">프로토타입·소규모</text>
  <rect x="100" y="268" width="200" height="40" rx="8" fill="#111" stroke="#888" stroke-width="1.5"/>
  <text x="200" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">Chroma</text>

  <!-- Milvus: large scale -->
  <line x1="670" y1="210" x2="440" y2="268" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">대규모 운영</text>
  <rect x="340" y="268" width="200" height="40" rx="8" fill="#0a1e0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Milvus</text>

  <!-- Qdrant: high perf -->
  <line x1="750" y1="210" x2="680" y2="268" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="742" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">고성능·필터</text>
  <rect x="580" y="268" width="200" height="40" rx="8" fill="#1a1a1a" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="680" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">Qdrant</text>

  <!-- Weaviate note -->
  <rect x="100" y="340" width="680" height="30" rx="6" fill="#0a1e28" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">멀티모달·GraphQL 쿼리가 필요하면 → Weaviate (오픈소스 + 클라우드)</text>
</svg>
