<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Cache API 주요 메서드</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">CacheStorage vs Cache 인터페이스</text>

  <!-- Left: CacheStorage (global caches) -->
  <rect x="60" y="95" width="360" height="310" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">CacheStorage  (caches.*)</text>

  <!-- Method rows -->
  <rect x="80" y="134" width="320" height="40" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="100" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">caches.open(name)</text>
  <text x="100" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">캐시 생성 또는 열기 → Cache 객체 반환</text>

  <rect x="80" y="184" width="320" height="40" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="100" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">caches.match(request)</text>
  <text x="100" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 캐시에서 첫 매칭 응답 검색</text>

  <rect x="80" y="234" width="320" height="40" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="100" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">caches.has(name)</text>
  <text x="100" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해당 이름의 캐시 존재 여부 확인</text>

  <rect x="80" y="284" width="320" height="40" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="100" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">caches.keys()</text>
  <text x="100" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 캐시 이름 목록</text>

  <rect x="80" y="334" width="320" height="40" rx="5" fill="#1f0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">caches.delete(name)</text>
  <text x="100" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">캐시 전체 삭제</text>

  <!-- Right: Cache instance -->
  <rect x="460" y="95" width="360" height="310" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Cache  (cache.*)</text>

  <rect x="480" y="134" width="320" height="40" rx="5" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">cache.put(request, response)</text>
  <text x="500" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">요청-응답 쌍 저장 (덮어쓰기)</text>

  <rect x="480" y="184" width="320" height="40" rx="5" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">cache.add(url)</text>
  <text x="500" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">fetch 후 자동으로 캐시에 저장</text>

  <rect x="480" y="234" width="320" height="40" rx="5" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">cache.addAll([urls])</text>
  <text x="500" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">여러 URL 일괄 프리캐시</text>

  <rect x="480" y="284" width="320" height="40" rx="5" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">cache.match(request)</text>
  <text x="500" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이 캐시에서만 매칭 응답 검색</text>

  <rect x="480" y="334" width="320" height="40" rx="5" fill="#1f0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">cache.delete(request)</text>
  <text x="500" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단일 항목 삭제</text>

  <!-- Bottom note -->
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">모든 메서드는 Promise 반환 — Service Worker 및 Window 컨텍스트 모두 사용 가능</text>
</svg>
