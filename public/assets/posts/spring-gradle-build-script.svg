<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">build.gradle.kts 구조 (Kotlin DSL)</text>

  <!-- Left: build.gradle.kts code -->
  <rect x="60" y="64" width="480" height="390" fill="#070b14" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 1. 플러그인</text>
  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">plugins {</text>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  id(</text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "org.springframework.boot"</text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  ) version </text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "3.3.0"</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  id(</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "io.spring.dependency-management"</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  ) version </text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "1.1.4"</text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  java</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 2. 자바 버전</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">java {</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  toolchain {</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    languageVersion =</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      JavaLanguageVersion.of(21)</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 3. 의존성 → 우측 패널 참조</text>
  <text x="76" y="448" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dependencies { ... }</text>

  <!-- Right: dependencies detail -->
  <rect x="560" y="64" width="260" height="390" fill="#0e1420" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="690" y="88" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">의존성 scope</text>

  <text x="576" y="114" font-size="12" font-weight="600" fill="#55c555">implementation</text>
  <text x="576" y="132" font-size="11" fill="#888">컴파일·런타임 모두 필요</text>
  <text x="576" y="148" font-size="11" fill="#888">최종 JAR에 포함</text>

  <line x1="572" y1="160" x2="804" y2="160" stroke="#333" stroke-width="1"/>

  <text x="576" y="180" font-size="12" font-weight="600" fill="#ce9178">runtimeOnly</text>
  <text x="576" y="198" font-size="11" fill="#888">런타임만 필요</text>
  <text x="576" y="214" font-size="11" fill="#888">예: DB 드라이버, H2</text>

  <line x1="572" y1="226" x2="804" y2="226" stroke="#333" stroke-width="1"/>

  <text x="576" y="246" font-size="12" font-weight="600" fill="#7ec8e3">testImplementation</text>
  <text x="576" y="264" font-size="11" fill="#888">테스트 코드에만 사용</text>
  <text x="576" y="280" font-size="11" fill="#888">예: JUnit, Mockito</text>

  <line x1="572" y1="292" x2="804" y2="292" stroke="#333" stroke-width="1"/>

  <text x="576" y="312" font-size="12" font-weight="600" fill="#7777cc">compileOnly</text>
  <text x="576" y="330" font-size="11" fill="#888">컴파일 시에만 필요</text>
  <text x="576" y="346" font-size="11" fill="#888">예: Lombok, @Nullable</text>

  <line x1="572" y1="358" x2="804" y2="358" stroke="#333" stroke-width="1"/>

  <text x="576" y="378" font-size="12" font-weight="600" fill="#888">annotationProcessor</text>
  <text x="576" y="396" font-size="11" fill="#888">어노테이션 처리기</text>
  <text x="576" y="412" font-size="11" fill="#888">예: Lombok, MapStruct</text>

  <!-- Footer -->
  <text x="440" y="470" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #7</text>
</svg>
