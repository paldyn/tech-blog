<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">children prop 개념</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">태그 사이의 내용이 props.children으로 전달된다</text>

  <defs>
    <marker id="arr-ch" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Usage side -->
  <rect x="55" y="95" width="360" height="230" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="235" y="118" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">사용 (부모에서)</text>
  <rect x="70" y="128" width="330" height="182" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 태그 사이 = children</text>
  <text x="82" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;Card title=</text>
  <text x="163" y="166" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">"프로필"</text>
  <text x="214" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&gt;</text>
  <text x="82" y="184" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;Avatar src</text>
  <text x="160" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">={...} /&gt;</text>
  <text x="82" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;h2&gt;홍길동&lt;/h2&gt;</text>
  <text x="82" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;p&gt;React 개발자&lt;/p&gt;</text>
  <text x="82" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;/Card&gt;</text>
  <text x="82" y="266" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 이 3줄이 children으로 전달됨</text>
  <text x="82" y="284" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// Avatar, h2, p</text>
  <text x="82" y="302" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// = [ReactElement, ReactElement, ReactElement]</text>

  <!-- Arrow -->
  <line x1="415" y1="210" x2="465" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ch)"/>
  <text x="440" y="202" font-size="11" fill="#888" text-anchor="middle">props로</text>
  <text x="440" y="224" font-size="11" fill="#888" text-anchor="middle">전달</text>

  <!-- Definition side -->
  <rect x="465" y="95" width="360" height="230" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="645" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">정의 (컴포넌트 안에서)</text>
  <rect x="480" y="128" width="330" height="182" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="535" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Card({ title, </text>
  <text x="630" y="148" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">children</text>
  <text x="680" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> }) {</text>
  <text x="492" y="166" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="536" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> (</text>
  <text x="492" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;section&gt;</text>
  <text x="492" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;h3&gt;{title}&lt;/h3&gt;</text>
  <text x="492" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;div className=</text>
  <text x="612" y="220" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">"body"</text>
  <text x="652" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&gt;</text>
  <text x="492" y="238" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">        {children}</text>
  <text x="492" y="256" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;/div&gt;</text>
  <text x="492" y="274" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;/section&gt;</text>
  <text x="492" y="292" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  )</text>
  <text x="492" y="310" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>

  <!-- Bottom: children types -->
  <rect x="55" y="345" width="770" height="85" rx="8" fill="#111118" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="368" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">children의 타입</text>

  <rect x="75" y="380" width="170" height="36" rx="5" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="160" y="402" font-size="12" fill="#e8e8e8" text-anchor="middle">문자열: "텍스트"</text>

  <rect x="255" y="380" width="170" height="36" rx="5" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="340" y="402" font-size="12" fill="#e8e8e8" text-anchor="middle">단일 React Element</text>

  <rect x="435" y="380" width="170" height="36" rx="5" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="520" y="402" font-size="12" fill="#e8e8e8" text-anchor="middle">Element 배열</text>

  <rect x="615" y="380" width="200" height="36" rx="5" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="715" y="402" font-size="12" fill="#e8e8e8" text-anchor="middle">null (없음)</text>
</svg>
