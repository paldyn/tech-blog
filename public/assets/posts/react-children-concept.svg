<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">children prop 작동 원리</text>

  <!-- Parent JSX (left top) -->
  <text x="220" y="76" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">부모 (사용 측)</text>
  <rect x="60" y="86" width="320" height="130" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="76" y="98" width="288" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="118" fill="#ce9178">&lt;Card</tspan><tspan fill="#ffffff"> title=</tspan><tspan fill="#ce9178">"공지사항"</tspan><tspan fill="#ce9178">&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">&lt;p&gt;</tspan><tspan fill="#ffffff">내용입니다.</tspan><tspan fill="#ce9178">&lt;/p&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">&lt;button&gt;</tspan><tspan fill="#ffffff">닫기</tspan><tspan fill="#ce9178">&lt;/button&gt;</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">  {/* 이 영역이 children */}</tspan>
    <tspan x="92" dy="18" fill="#ce9178">&lt;/Card&gt;</tspan>
  </text>

  <!-- Arrow -->
  <line x1="388" y1="151" x2="442" y2="151" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="415" y="143" text-anchor="middle" font-size="11" fill="#7777cc">children</text>

  <!-- Child component definition (right top) -->
  <text x="660" y="76" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">Card 컴포넌트 (정의 측)</text>
  <rect x="450" y="86" width="370" height="130" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="466" y="98" width="338" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="482" y="118" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Card({ title, </tspan><tspan fill="#7ec8e3" font-weight="600">children</tspan><tspan fill="#ffffff"> }) {</tspan>
    <tspan x="482" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="482" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;div</tspan><tspan fill="#ffffff"> className=</tspan><tspan fill="#ce9178">"card"</tspan><tspan fill="#ce9178">&gt;</tspan>
    <tspan x="482" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;h2&gt;</tspan><tspan fill="#ffffff">{title}</tspan><tspan fill="#ce9178">&lt;/h2&gt;</tspan>
    <tspan x="482" dy="18" fill="#ffffff">      {</tspan><tspan fill="#7ec8e3" font-weight="600">children</tspan><tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Children types section -->
  <text x="440" y="252" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">children이 될 수 있는 값</text>

  <!-- Type boxes -->
  <!-- String -->
  <rect x="60" y="266" width="164" height="72" rx="8" fill="#0f1020" stroke="#2a2a4a" stroke-width="1.5"/>
  <text x="142" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">문자열</text>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11">
    <tspan x="76" y="304" fill="#ce9178">&lt;Tag&gt;</tspan><tspan fill="#ffffff">안녕</tspan><tspan fill="#ce9178">&lt;/Tag&gt;</tspan>
    <tspan x="76" dy="16" fill="#9aa4b8">// children = "안녕"</tspan>
  </text>

  <!-- Element -->
  <rect x="238" y="266" width="164" height="72" rx="8" fill="#0f1020" stroke="#2a2a4a" stroke-width="1.5"/>
  <text x="320" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">React 요소</text>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11">
    <tspan x="254" y="304" fill="#ce9178">&lt;Tag&gt;&lt;p/&gt;&lt;/Tag&gt;</tspan>
    <tspan x="254" dy="16" fill="#9aa4b8">// children = &lt;p/&gt;</tspan>
  </text>

  <!-- Array -->
  <rect x="416" y="266" width="164" height="72" rx="8" fill="#0f1020" stroke="#2a2a4a" stroke-width="1.5"/>
  <text x="498" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">배열</text>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11">
    <tspan x="432" y="304" fill="#ce9178">&lt;Tag&gt;&lt;a/&gt;&lt;b/&gt;&lt;/Tag&gt;</tspan>
    <tspan x="432" dy="16" fill="#9aa4b8">// children = [a, b]</tspan>
  </text>

  <!-- Function -->
  <rect x="594" y="266" width="226" height="72" rx="8" fill="#0f1020" stroke="#2a2a4a" stroke-width="1.5"/>
  <text x="707" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">함수 (render prop)</text>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11">
    <tspan x="610" y="304" fill="#ce9178">&lt;Tag&gt;</tspan><tspan fill="#ffffff">{x =&gt; </tspan><tspan fill="#ce9178">&lt;p&gt;</tspan><tspan fill="#ffffff">{x}</tspan><tspan fill="#ce9178">&lt;/p&gt;</tspan><tspan fill="#ffffff">}</tspan><tspan fill="#ce9178">&lt;/Tag&gt;</tspan>
    <tspan x="610" dy="16" fill="#9aa4b8">// children = Function</tspan>
  </text>

  <!-- Bottom note -->
  <text x="440" y="380" text-anchor="middle" font-size="12" fill="#888">children이 undefined면 컴포넌트는 아무것도 렌더링하지 않는다 — defaultProps나 || 기본값으로 처리</text>
  <text x="440" y="400" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">children은 특별한 prop이 아니다 — props.children으로 전달되는 일반 prop일 뿐이다</text>
  <text x="440" y="420" text-anchor="middle" font-size="12" fill="#888">컴포넌트가 열기/닫기 태그 사이에 넣은 모든 내용은 React가 자동으로 children prop으로 전달한다</text>
  <text x="440" y="440" text-anchor="middle" font-size="12" fill="#888">TypeScript: ReactNode 타입 (string | number | ReactElement | null | undefined | ...)</text>
</svg>
