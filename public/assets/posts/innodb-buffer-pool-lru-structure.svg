<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="490" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">InnoDB Buffer Pool — Midpoint LRU 구조</text>

  <!-- Buffer Pool outer box -->
  <rect x="60" y="70" width="760" height="280" rx="10" fill="#0d1117" stroke="#2a3a5a" stroke-width="2"/>
  <text x="440" y="96" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">Buffer Pool (innodb_buffer_pool_size = 8GB 예시)</text>

  <!-- New Sublist (Young) -->
  <rect x="80" y="108" width="450" height="220" rx="6" fill="#111520" stroke="#2a4a3a"/>
  <text x="305" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">New Sublist (Young) — 5/8</text>
  <text x="305" y="150" text-anchor="middle" font-size="12" fill="#888">자주 접근한 "핫" 페이지</text>

  <!-- Hot pages -->
  <rect x="96" y="162" width="80" height="44" rx="4" fill="#1e3a2a" stroke="#2a5a3a"/>
  <text x="136" y="189" text-anchor="middle" font-size="12" fill="#55c555">HOT</text>
  <rect x="186" y="162" width="80" height="44" rx="4" fill="#1e3a2a" stroke="#2a5a3a"/>
  <text x="226" y="189" text-anchor="middle" font-size="12" fill="#55c555">HOT</text>
  <rect x="276" y="162" width="80" height="44" rx="4" fill="#1e3a2a" stroke="#2a5a3a"/>
  <text x="316" y="189" text-anchor="middle" font-size="12" fill="#55c555">HOT</text>
  <rect x="366" y="162" width="80" height="44" rx="4" fill="#1e2a20" stroke="#2a4a2a"/>
  <text x="406" y="189" text-anchor="middle" font-size="12" fill="#888">... 많음</text>

  <!-- MRU pointer -->
  <text x="96" y="148" font-size="11" fill="#7ec8e3">← MRU (Head)</text>

  <!-- New → Old direction -->
  <text x="305" y="225" text-anchor="middle" font-size="12" fill="#888">시간이 지나면 → Old Sublist로 이동</text>
  <line x1="305" y1="235" x2="520" y2="235" stroke="#888" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="520,229 532,235 520,241" fill="#888"/>

  <!-- Old Sublist -->
  <rect x="540" y="108" width="270" height="220" rx="6" fill="#111520" stroke="#4a3a2a"/>
  <text x="675" y="132" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">Old Sublist — 3/8</text>
  <text x="675" y="150" text-anchor="middle" font-size="12" fill="#888">새로 읽은 / 덜 접근한 페이지</text>

  <!-- Old pages -->
  <rect x="556" y="162" width="70" height="44" rx="4" fill="#2a1a10" stroke="#4a2a10"/>
  <text x="591" y="184" text-anchor="middle" font-size="11" fill="#e05555">NEW</text>
  <text x="591" y="198" text-anchor="middle" font-size="10" fill="#888">INSERT</text>
  <rect x="636" y="162" width="70" height="44" rx="4" fill="#1a1a1a" stroke="#2a2a2a"/>
  <text x="671" y="189" text-anchor="middle" font-size="12" fill="#888">COLD</text>
  <rect x="716" y="162" width="70" height="44" rx="4" fill="#1a1010" stroke="#3a1a1a"/>
  <text x="751" y="184" text-anchor="middle" font-size="11" fill="#e05555">EVICT</text>
  <text x="751" y="198" text-anchor="middle" font-size="10" fill="#888">← LRU 끝</text>

  <!-- Midpoint label -->
  <line x1="538" y1="108" x2="538" y2="328" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="538" y="340" text-anchor="middle" font-size="12" fill="#7777cc">Midpoint</text>
  <text x="538" y="356" text-anchor="middle" font-size="11" fill="#888">innodb_old_blocks_pct=37</text>

  <!-- Full table scan protection -->
  <rect x="60" y="375" width="760" height="90" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="440" y="398" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Full Table Scan으로부터 핫 페이지 보호</text>
  <text x="200" y="426" text-anchor="middle" font-size="13" fill="#888">Midpoint Insert 전략</text>
  <text x="200" y="444" text-anchor="middle" font-size="13" fill="#888">새 페이지는 Old 리스트 Head에 삽입</text>
  <text x="600" y="426" text-anchor="middle" font-size="13" fill="#7ec8e3">innodb_old_blocks_time=1000</text>
  <text x="600" y="444" text-anchor="middle" font-size="13" fill="#888">Old에서 1초 후에만 Young으로 승격</text>
</svg>
