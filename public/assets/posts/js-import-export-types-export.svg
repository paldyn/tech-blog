<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">export 문법 총정리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Named · Default · Re-export · Aggregation</text>

  <!-- Left: Named exports -->
  <text x="230" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Named Export</text>
  <rect x="60" y="108" width="340" height="350" rx="8" fill="#0d1422" stroke="#1e3a5f" stroke-width="1.5"/>

  <rect x="76" y="120" width="308" height="72" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 선언과 동시에</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">export </tspan><tspan fill="#7ec8e3">function </tspan><tspan fill="#ffffff">add(a, b) {</tspan></text>

  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  return </tspan><tspan fill="#ffffff">a + b; }</tspan></text>

  <rect x="76" y="202" width="308" height="72" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 목록으로 한꺼번에</text>
  <text x="92" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const </tspan><tspan fill="#ffffff">PI = </tspan><tspan fill="#b5cea8">3.14</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="92" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">export </text>
  <text x="134" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{ PI, add };</text>

  <rect x="76" y="284" width="308" height="54" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 이름 바꿔 내보내기</text>
  <text x="92" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">export </tspan><tspan fill="#ffffff">{ add </tspan><tspan fill="#7ec8e3">as </tspan><tspan fill="#ffffff">sum };</tspan></text>

  <text x="230" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">여러 개 가능 · 이름으로 식별</text>
  <text x="230" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">import { add, PI } from '...'</text>
  <text x="230" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트리 쉐이킹에 최적화</text>
  <text x="230" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">라이브러리 · 유틸 함수에 적합</text>

  <!-- Right: Default + Re-export -->
  <text x="650" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Default Export + Re-export</text>
  <rect x="480" y="108" width="340" height="350" rx="8" fill="#0d1a0d" stroke="#1e4a1e" stroke-width="1.5"/>

  <rect x="496" y="120" width="308" height="90" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="512" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// default export — 1개만</text>
  <text x="512" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">export default </tspan><tspan fill="#7ec8e3">class </tspan><tspan fill="#ffffff">App {</tspan></text>

  <text x="512" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  // ...</text>
  <text x="512" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <rect x="496" y="220" width="308" height="90" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="512" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// re-export: 통합 진입점</text>
  <text x="512" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">export </text>
  <text x="554" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{ add } </text>
  <text x="606" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">from </text>
  <text x="638" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'./math'</text>
  <text x="512" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">export </text>
  <text x="554" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">* </text>
  <text x="568" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">from </text>
  <text x="600" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'./utils'</text>
  <text x="512" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">export </tspan><tspan fill="#ffffff">* </tspan><tspan fill="#7ec8e3">as </tspan><tspan fill="#ffffff">str </tspan><tspan fill="#7ec8e3">from </tspan><tspan fill="#ce9178">'./str'</tspan></text>

  <text x="650" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">default: 1개, 이름 자유롭게 가져오기</text>
  <text x="650" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">import App from '...'</text>
  <text x="650" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">re-export: 배럴 파일(index.js) 패턴</text>
  <text x="650" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">여러 모듈을 한 진입점에서 노출</text>
  <text x="650" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">컴포넌트 · 메인 클래스에 적합</text>

  <!-- Footer -->
</svg>
