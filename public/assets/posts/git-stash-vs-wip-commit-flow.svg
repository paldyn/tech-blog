<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">WIP 커밋 패턴</text>

  <!-- WIP commit flow -->
  <rect x="60" y="80" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">작업 중단</text>
  <text x="140" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">git add -A</text>

  <line x1="220" y1="110" x2="280" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="280" y="80" width="180" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="370" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">WIP 커밋 생성</text>
  <text x="370" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">git commit -m "WIP"</text>

  <line x1="460" y1="110" x2="520" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="520" y="80" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="600" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">브랜치 전환</text>
  <text x="600" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">git checkout other</text>

  <line x1="680" y1="110" x2="740" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="740" y="80" width="100" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="790" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">작업</text>
  <text x="790" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">...</text>

  <!-- Restore -->
  <rect x="520" y="190" width="200" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">WIP 복원</text>
  <text x="620" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">git reset HEAD~1</text>

  <path d="M 790 140 C 790 175 620 175 620 190" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Code block -->
  <rect x="60" y="276" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># WIP 커밋 → 작업 복귀 흐름</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">add</tspan> -A &amp;&amp; git <tspan fill="#7ec8e3" font-weight="600">commit</tspan> -m <tspan fill="#ce9178">"WIP: auth modal"</tspan></text>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 복귀 시: git reset HEAD~1 (또는 --soft HEAD~1)</text>
</svg>
