<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Maven vs Gradle — 빌드 도구 비교</text>

  <!-- Maven left -->
  <rect x="60" y="68" width="360" height="330" fill="#1a110a" rx="10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="240" y="96" font-size="15" font-weight="600" fill="#ce9178" text-anchor="middle">Maven</text>
  <text x="240" y="116" font-size="12" fill="#888" text-anchor="middle">XML 기반 · 선언적</text>

  <rect x="76" y="128" width="328" height="196" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- pom.xml --&gt;</text>
  <text x="92" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;dependency&gt;</text>
  <text x="92" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  &lt;groupId&gt;</text>
  <text x="92" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    org.springframework.boot</text>
  <text x="92" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  &lt;/groupId&gt;</text>
  <text x="92" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  &lt;artifactId&gt;</text>
  <text x="92" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    spring-boot-starter-web</text>
  <text x="92" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  &lt;/artifactId&gt;</text>
  <text x="92" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;/dependency&gt;</text>
  <text x="92" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 버전: 부모 POM에서 관리</text>

  <text x="76" y="350" font-size="12" fill="#888">빌드: mvn clean package</text>
  <text x="76" y="370" font-size="12" fill="#888">테스트: mvn test</text>
  <text x="76" y="390" font-size="12" fill="#888">실행: mvn spring-boot:run</text>

  <!-- Center arrow (bidirectional label) -->
  <text x="440" y="234" font-size="13" font-weight="600" fill="#888" text-anchor="middle">vs</text>

  <!-- Gradle right -->
  <rect x="460" y="68" width="360" height="330" fill="#0a1a0a" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="96" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Gradle</text>
  <text x="640" y="116" font-size="12" fill="#888" text-anchor="middle">Groovy/Kotlin DSL · 명령형</text>

  <rect x="476" y="128" width="328" height="196" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// build.gradle (Kotlin DSL)</text>
  <text x="492" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dependencies {</text>
  <text x="492" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  implementation(</text>
  <text x="492" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "org.springframework.boot:</text>
  <text x="492" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">     spring-boot-starter-web"</text>
  <text x="492" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  )</text>
  <text x="492" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="492" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 버전: BOM 플러그인 관리</text>
  <text x="492" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text>
  <text x="492" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 빌드 속도 Maven보다 빠름</text>

  <text x="476" y="350" font-size="12" fill="#888">빌드: ./gradlew build</text>
  <text x="476" y="370" font-size="12" fill="#888">테스트: ./gradlew test</text>
  <text x="476" y="390" font-size="12" fill="#888">실행: ./gradlew bootRun</text>

  <!-- Recommendation -->
  <rect x="60" y="418" width="760" height="36" fill="#0e1420" rx="6" stroke="#333" stroke-width="1"/>
  <text x="440" y="441" font-size="13" fill="#7ec8e3" text-anchor="middle">신규 프로젝트: Gradle(Kotlin DSL) 권장 · 기업 레거시: Maven 많음 · 둘 다 학습 가치 있음</text>

  <!-- Footer -->
  <text x="440" y="468" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #5</text>
</svg>
