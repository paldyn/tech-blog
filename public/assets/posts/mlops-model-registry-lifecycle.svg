<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrow-solid" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#888"/>
    </marker>
    <marker id="arrow-blue" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-dashed" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델 생애주기 (Model Lifecycle)</text>

  <!-- State 1: None -->
  <rect x="30" y="74" width="170" height="74" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="115" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">None</text>
  <text x="115" y="121" text-anchor="middle" font-size="12" fill="#666" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">등록 전</text>
  <text x="115" y="138" text-anchor="middle" font-size="11" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">후보 모델</text>

  <!-- Arrow: None → Staging -->
  <line x1="200" y1="111" x2="238" y2="111" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
  <text x="219" y="106" text-anchor="middle" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Register</text>

  <!-- State 2: Staging -->
  <rect x="240" y="74" width="170" height="74" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="325" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Staging</text>
  <text x="325" y="121" text-anchor="middle" font-size="12" fill="#aaa" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">테스트 중</text>
  <text x="325" y="138" text-anchor="middle" font-size="11" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">검증 단계</text>

  <!-- Arrow: Staging → Production -->
  <line x1="410" y1="111" x2="448" y2="111" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="429" y="106" text-anchor="middle" font-size="10" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Promote</text>

  <!-- State 3: Production -->
  <rect x="450" y="74" width="170" height="74" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="535" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Production</text>
  <text x="535" y="121" text-anchor="middle" font-size="12" fill="#aaa" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">배포 완료</text>
  <text x="535" y="138" text-anchor="middle" font-size="11" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">트래픽 수신</text>

  <!-- Arrow: Production → Archived -->
  <line x1="620" y1="111" x2="658" y2="111" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
  <text x="639" y="106" text-anchor="middle" font-size="10" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Archive</text>

  <!-- State 4: Archived -->
  <rect x="660" y="74" width="170" height="74" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="745" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Archived</text>
  <text x="745" y="121" text-anchor="middle" font-size="12" fill="#666" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">은퇴</text>
  <text x="745" y="138" text-anchor="middle" font-size="11" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">참조용 보관</text>

  <!-- Dashed backward arrow: Production → Staging (Demote) -->
  <path d="M535,148 Q535,176 325,176 Q325,158 325,148" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-dashed)"/>
  <text x="430" y="192" text-anchor="middle" font-size="11" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Demote (이슈 발생 시)</text>

  <!-- Action boxes below each state -->
  <!-- Staging actions -->
  <rect x="198" y="216" width="256" height="68" rx="6" fill="#101018" stroke="#7ec8e3" stroke-width="1"/>
  <text x="326" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Staging 단계</text>
  <text x="326" y="254" text-anchor="middle" font-size="11" fill="#aaa" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">단위·통합 테스트 실행</text>
  <text x="326" y="270" text-anchor="middle" font-size="11" fill="#aaa" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">A/B 트래픽 5%, 성능 비교</text>

  <!-- Production actions -->
  <rect x="382" y="216" width="256" height="68" rx="6" fill="#081008" stroke="#55c555" stroke-width="1"/>
  <text x="510" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Production 단계</text>
  <text x="510" y="254" text-anchor="middle" font-size="11" fill="#aaa" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">100% 트래픽, SLA 보장</text>
  <text x="510" y="270" text-anchor="middle" font-size="11" fill="#aaa" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">실시간 모니터링</text>

  <!-- Archived actions -->
  <rect x="566" y="216" width="256" height="68" rx="6" fill="#101010" stroke="#555" stroke-width="1"/>
  <text x="694" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Archived 단계</text>
  <text x="694" y="254" text-anchor="middle" font-size="11" fill="#666" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">감사용 보관</text>
  <text x="694" y="270" text-anchor="middle" font-size="11" fill="#666" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">롤백 가능 상태 유지</text>

  <!-- Connecting lines from state boxes to action boxes -->
  <line x1="325" y1="148" x2="325" y2="214" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="535" y1="148" x2="510" y2="214" stroke="#55c555" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="745" y1="148" x2="694" y2="214" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Version label -->
  <rect x="30" y="316" width="820" height="60" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="440" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">MLflow Model Registry 상태 전환 — 각 버전별 독립적 관리</text>
  <text x="440" y="360" text-anchor="middle" font-size="11" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">model v1: Production  |  model v2: Staging  |  model v3: None  |  model v0: Archived</text>
</svg>
