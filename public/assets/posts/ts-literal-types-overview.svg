<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">리터럴 타입 종류</text>

  <!-- Column labels -->
  <text x="153" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">문자열 리터럴</text>
  <text x="440" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">숫자 리터럴</text>
  <text x="727" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">불리언 리터럴</text>

  <!-- Vertical dividers -->
  <line x1="300" y1="60" x2="300" y2="420" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="580" y1="60" x2="580" y2="420" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: 문자열 리터럴 code box (7 lines) -->
  <rect x="30" y="96" width="246" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="46" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> Dir = </tspan><tspan fill="#ce9178">"north"</tspan></text>
  <text x="46" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">         | </tspan><tspan fill="#ce9178">"south"</tspan></text>
  <text x="46" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">         | </tspan><tspan fill="#ce9178">"east"</tspan></text>
  <text x="46" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">         | </tspan><tspan fill="#ce9178">"west"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="46" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff"> </tspan></text>
  <text x="46" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> d: Dir = </tspan><tspan fill="#ce9178">"north"</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// OK</tspan></text>
  <text x="46" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> e: Dir = </tspan><tspan fill="#ce9178">"up"</tspan><tspan fill="#ffffff">;    </tspan><tspan fill="#9aa4b8">// Error</tspan></text>

  <!-- Note under left box -->
  <rect x="30" y="280" width="246" height="44" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="153" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">허용된 값만 할당 가능</text>
  <text x="153" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">"up" 은 Dir 타입 오류</text>

  <!-- MIDDLE: 숫자 리터럴 code box (7 lines) -->
  <rect x="316" y="96" width="248" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="332" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> Dice = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">|</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">|</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">|</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">|</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">|</tspan><tspan fill="#b5cea8">6</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="332" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff"> </tspan></text>
  <text x="332" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> roll(): Dice {</tspan></text>
  <text x="332" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> Math.floor(</tspan></text>
  <text x="332" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    Math.random() * </tspan><tspan fill="#b5cea8">6</tspan></text>
  <text x="332" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  ) + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">as</tspan><tspan fill="#ffffff"> Dice;</tspan></text>
  <text x="332" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>

  <!-- Note under middle box -->
  <rect x="316" y="280" width="248" height="44" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">1~6 숫자만 유효한 Dice 타입</text>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">범위 밖 숫자는 컴파일 오류</text>

  <!-- RIGHT: 불리언 리터럴 code box (7 lines) -->
  <rect x="596" y="96" width="254" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="612" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> True = </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="612" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> False = </tspan><tspan fill="#b5cea8">false</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="612" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff"> </tspan></text>
  <text x="612" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> assert(</tspan></text>
  <text x="612" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  val: </tspan><tspan fill="#b5cea8">true</tspan></text>
  <text x="612" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">): </tspan><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> { ... }</tspan></text>
  <text x="612" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff"> </tspan></text>

  <!-- Note under right box -->
  <rect x="596" y="280" width="254" height="44" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="723" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">true / false 자체가 타입</text>
  <text x="723" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">조건부 타입에서 자주 활용</text>

  <!-- Bottom summary -->
  <rect x="60" y="348" width="760" height="56" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">리터럴 타입 = 특정 값 자체를 타입으로 사용</text>
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle" xml:space="preserve">string · number · boolean 의 정확한 부분집합 — 유니언과 함께 사용하면 더욱 강력</text>
</svg>
