<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">비동기 제너레이터 — 페이지네이션 패턴</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Async Generator Pagination Pattern</text>

  <!-- Pagination generator code -->
  <rect x="60" y="90" width="760" height="260" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="112" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">API 페이지네이션 제너레이터</text>

  <rect x="76" y="122" width="727" height="208" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="142" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">async function*</tspan> fetchAllPages(url) {</text>
  <text x="92" y="160" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">let</tspan> nextUrl = url;</text>
  <text x="92" y="178" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">while</tspan> (nextUrl) {</text>
  <text x="92" y="196" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">const</tspan> res  = <tspan fill="#7ec8e3">await</tspan> fetch(nextUrl);</text>
  <text x="92" y="214" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">const</tspan> data = <tspan fill="#7ec8e3">await</tspan> res.json();</text>
  <text x="92" y="232" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">yield</tspan> data.items; <tspan fill="#6a8aa0">// 한 페이지씩 반환</tspan></text>
  <text x="92" y="250" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    nextUrl = data.nextPage ?? <tspan fill="#7ec8e3">null</tspan>;</text>
  <text x="92" y="268" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="92" y="286" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="92" y="308" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 모든 페이지의 항목을 스트리밍</text>
  <text x="92" y="326" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">for await</tspan> (<tspan fill="#7ec8e3">const</tspan> page <tspan fill="#7ec8e3">of</tspan> fetchAllPages(<tspan fill="#ce9178">'/api/posts'</tspan>)) {</text>

  <!-- Flow visualization -->
  <rect x="60" y="368" width="760" height="60" fill="#0d0d0d" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="390" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">페이지 흐름 (각 단계마다 fetch 1회)</text>

  <rect x="80" y="400" width="90" height="20" fill="#1a1a3a" rx="4"/>
  <text x="125" y="414" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">page 1 (10개)</text>
  <polygon points="174,410 184,405 184,415" fill="#7ec8e3"/>

  <rect x="188" y="400" width="90" height="20" fill="#1a1a3a" rx="4"/>
  <text x="233" y="414" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">page 2 (10개)</text>
  <polygon points="282,410 292,405 292,415" fill="#7ec8e3"/>

  <rect x="296" y="400" width="90" height="20" fill="#1a1a3a" rx="4"/>
  <text x="341" y="414" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">page 3 (10개)</text>
  <polygon points="390,410 400,405 400,415" fill="#55c555"/>

  <text x="430" y="415" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">... </text>

  <rect x="450" y="400" width="110" height="20" fill="#0d3a0d" rx="4"/>
  <text x="505" y="414" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">마지막 페이지 (done:T)</text>

  <text x="570" y="415" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11"> ← 메모리 효율적!</text>

  <!-- Footer -->
  <text x="440" y="442" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
