<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">재귀 트리: T(n) = 2T(n/2) + n</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">각 레벨의 총 비용 = n (log n개 레벨) → Θ(n log n)</text>

  <!-- Level 0 node -->
  <rect x="360" y="90" width="160" height="50" rx="8" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="2"/>
  <text x="440" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">T(n)</text>
  <text x="440" y="129" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8">비용: n</text>
  <!-- cost label right -->
  <text x="780" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">= n</text>

  <!-- arrows L0 → L1 -->
  <line x1="400" y1="140" x2="290" y2="178" stroke="#3a5a8a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="140" x2="590" y2="178" stroke="#3a5a8a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Level 1 nodes -->
  <rect x="200" y="180" width="150" height="50" rx="8" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="2"/>
  <text x="275" y="201" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">T(n/2)</text>
  <text x="275" y="219" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8">비용: n/2</text>

  <rect x="530" y="180" width="150" height="50" rx="8" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="2"/>
  <text x="605" y="201" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">T(n/2)</text>
  <text x="605" y="219" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8">비용: n/2</text>
  <text x="780" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">= n</text>

  <!-- arrows L1 → L2 -->
  <line x1="245" y1="230" x2="170" y2="268" stroke="#3a5a8a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="305" y1="230" x2="380" y2="268" stroke="#3a5a8a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="565" y1="230" x2="500" y2="268" stroke="#3a5a8a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="625" y1="230" x2="700" y2="268" stroke="#3a5a8a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Level 2 nodes -->
  <rect x="115" y="270" width="120" height="46" rx="8" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="175" y="291" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">T(n/4)</text>
  <text x="175" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#9aa4b8">n/4</text>

  <rect x="328" y="270" width="120" height="46" rx="8" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="388" y="291" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">T(n/4)</text>
  <text x="388" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#9aa4b8">n/4</text>

  <rect x="442" y="270" width="120" height="46" rx="8" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="502" y="291" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">T(n/4)</text>
  <text x="502" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#9aa4b8">n/4</text>

  <rect x="648" y="270" width="120" height="46" rx="8" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="708" y="291" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">T(n/4)</text>
  <text x="708" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#9aa4b8">n/4</text>
  <text x="780" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">= n</text>

  <!-- dots indicating more levels -->
  <text x="175" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#444">⋮</text>
  <text x="388" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#444">⋮</text>
  <text x="502" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#444">⋮</text>
  <text x="708" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#444">⋮</text>
  <text x="780" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#444">= n</text>

  <!-- leaf level -->
  <text x="60" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">단말(T(1)):</text>
  <!-- many small leaf boxes -->
  <rect x="135" y="406" width="34" height="30" rx="4" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="152" y="425" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555">1</text>
  <rect x="176" y="406" width="34" height="30" rx="4" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="193" y="425" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555">1</text>
  <text x="224" y="425" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#444">···</text>
  <rect x="268" y="406" width="34" height="30" rx="4" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="285" y="425" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555">1</text>
  <text x="780" y="425" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">= n</text>

  <!-- divider -->
  <line x1="60" y1="456" x2="820" y2="456" stroke="#2a2a2a" stroke-width="1"/>

  <!-- summary box -->
  <rect x="60" y="468" width="760" height="68" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="489" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">레벨 수 = log₂n   (각 레벨마다 n만큼 일)</text>
  <text x="76" y="509" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">총 비용</tspan> = n × log₂n  →  <tspan fill="#55c555" font-weight="600">T(n) = Θ(n log n)</tspan></text>
  <text x="76" y="527" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">마스터 정리 Case 2: f(n) = n = n^(log₂2) = n¹ → 같은 차수</text>
</svg>
