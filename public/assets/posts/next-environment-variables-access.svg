<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">서버 전용 vs 클라이언트 노출</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">NEXT_PUBLIC_ 접두사가 클라이언트 번들 포함 여부를 결정</text>

  <!-- Left: Server only -->
  <rect x="60" y="90" width="360" height="264" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">서버 전용 (접두사 없음)</text>
  <rect x="76" y="122" width="328" height="216" rx="4" fill="#000000" stroke="#2a3a5e" stroke-width="1"/>
  <text x="92" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># .env.local</text>
  <text x="92" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">DATABASE_URL=postgres://...</text>
  <text x="92" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">SECRET_KEY=abc123</text>
  <text x="92" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 서버 컴포넌트에서만 접근</text>
  <text x="92" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="132" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> url =</text>
  <text x="92" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  process.env.DATABASE_URL</text>
  <text x="92" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// 클라이언트에서 → undefined</text>
  <text x="92" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// 클라이언트 번들에 포함 안 됨</text>
  <text x="92" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// ✅ 보안상 안전</text>

  <!-- Right: Public -->
  <rect x="460" y="90" width="360" height="264" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">공개 변수 (NEXT_PUBLIC_ 접두사)</text>
  <rect x="476" y="122" width="328" height="216" rx="4" fill="#000000" stroke="#2a3a5e" stroke-width="1"/>
  <text x="492" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># .env.local</text>
  <text x="492" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">NEXT_PUBLIC_API_URL=https://...</text>
  <text x="492" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">NEXT_PUBLIC_GA_ID=G-XXXXXX</text>
  <text x="492" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 클라이언트·서버 모두 접근</text>
  <text x="492" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="532" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> api =</text>
  <text x="492" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  process.env.NEXT_PUBLIC_API_URL</text>
  <text x="492" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// ⚠ 빌드 시 인라인됨</text>
  <text x="492" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// 클라이언트 번들에 포함됨</text>
  <text x="492" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// ❌ 시크릿 값 절대 금지</text>
</svg>
