<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Partial Page Write 문제와 Doublewrite Buffer 해결책</text>

  <!-- Without Doublewrite (problem) -->
  <rect x="60" y="75" width="360" height="240" rx="8" fill="#1a0f0f" stroke="#4a2020"/>
  <rect x="60" y="75" width="360" height="32" rx="8" fill="#3a1a1a"/>
  <rect x="60" y="91" width="360" height="16" fill="#3a1a1a"/>
  <text x="240" y="97" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">Doublewrite 없이 쓰다 충돌</text>

  <!-- Buffer Pool page -->
  <rect x="90" y="120" width="120" height="50" rx="4" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="150" y="150" text-anchor="middle" font-size="13" fill="#7ec8e3">Buffer Pool</text>
  <text x="150" y="163" text-anchor="middle" font-size="11" fill="#888">16KB Page</text>

  <line x1="210" y1="145" x2="270" y2="145" stroke="#e05555" stroke-width="2"/>
  <polygon points="270,139 282,145 270,151" fill="#e05555"/>

  <!-- Disk page broken -->
  <rect x="284" y="120" width="120" height="50" rx="4" fill="#2a1010" stroke="#5a2020"/>
  <text x="344" y="140" text-anchor="middle" font-size="13" fill="#e05555">디스크 페이지</text>
  <text x="344" y="158" text-anchor="middle" font-size="11" fill="#e05555">절반만 기록됨</text>
  <text x="344" y="170" text-anchor="middle" font-size="9" fill="#888">▓▓▒▒▒▒▒▒ 손상!</text>

  <!-- CRASH -->
  <text x="240" y="210" text-anchor="middle" font-size="18" font-weight="700" fill="#e05555">⚡ CRASH</text>

  <text x="240" y="244" text-anchor="middle" font-size="13" fill="#888">Redo Log로 복구 시도 →</text>
  <text x="240" y="262" text-anchor="middle" font-size="13" fill="#e05555">베이스 페이지가 손상돼</text>
  <text x="240" y="280" text-anchor="middle" font-size="13" fill="#e05555">Redo 적용 불가!</text>
  <text x="240" y="298" text-anchor="middle" font-size="12" fill="#888">Redo Log는 "변경만" 기록,</text>
  <text x="240" y="314" text-anchor="middle" font-size="12" fill="#888">온전한 베이스 페이지가 필요</text>

  <!-- With Doublewrite (solution) -->
  <rect x="454" y="75" width="386" height="240" rx="8" fill="#0f1a10" stroke="#2a4a2a"/>
  <rect x="454" y="75" width="386" height="32" rx="8" fill="#1a3a1a"/>
  <rect x="454" y="91" width="386" height="16" fill="#1a3a1a"/>
  <text x="647" y="97" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">Doublewrite Buffer 활성화</text>

  <!-- Step 1: write to doublewrite area -->
  <rect x="474" y="118" width="130" height="44" rx="4" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="539" y="140" text-anchor="middle" font-size="12" fill="#7ec8e3">Buffer Pool</text>
  <text x="539" y="155" text-anchor="middle" font-size="11" fill="#888">Dirty Pages</text>

  <line x1="604" y1="140" x2="624" y2="140" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="624,134 636,140 624,146" fill="#55c555"/>

  <rect x="638" y="118" width="168" height="44" rx="4" fill="#1e3a2a" stroke="#2a5a2a"/>
  <text x="722" y="136" text-anchor="middle" font-size="12" fill="#55c555">① Doublewrite Area</text>
  <text x="722" y="152" text-anchor="middle" font-size="11" fill="#888">System Tablespace 일부</text>
  <text x="722" y="164" text-anchor="middle" font-size="10" fill="#888">128페이지(2MB) 순차 기록</text>

  <!-- Step 2: write to actual location -->
  <line x1="722" y1="162" x2="722" y2="192" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="716,192 722,204 728,192" fill="#55c555"/>

  <rect x="636" y="206" width="172" height="44" rx="4" fill="#1e3a2a" stroke="#2a5a2a"/>
  <text x="722" y="224" text-anchor="middle" font-size="12" fill="#55c555">② 실제 위치에 기록</text>
  <text x="722" y="240" text-anchor="middle" font-size="11" fill="#888">각 페이지를 제자리에 Write</text>
  <text x="722" y="252" text-anchor="middle" font-size="10" fill="#888">② 중 충돌해도 ①로 복구 가능</text>

  <text x="647" y="295" text-anchor="middle" font-size="13" fill="#55c555">충돌 후 재시작: Doublewrite Area에서</text>
  <text x="647" y="313" text-anchor="middle" font-size="13" fill="#55c555">온전한 페이지 복사 후 Redo 적용 ✓</text>

  <!-- Bottom config -->
  <rect x="60" y="340" width="760" height="78" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="440" y="364" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">설정 및 확인</text>
  <text x="200" y="390" text-anchor="middle" font-size="13" fill="#7ec8e3">innodb_doublewrite = ON (기본값)</text>
  <text x="620" y="390" text-anchor="middle" font-size="13" fill="#888">ZFS/Fusion-IO처럼 atomic write를 보장하면 OFF 가능</text>
</svg>
