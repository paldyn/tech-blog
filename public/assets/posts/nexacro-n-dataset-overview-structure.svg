<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 구조와 역할</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">서버 데이터 ↔ Dataset ↔ UI 컴포넌트의 흐름</text>

  <!-- Server -->
  <rect x="60" y="100" width="150" height="80" fill="#1a1a2e" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">서버</text>
  <text x="135" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">XML / JSON</text>
  <text x="135" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">응답</text>

  <!-- Arrow server → dataset -->
  <polygon points="213,140 240,134 240,137 270,137 270,134 297,140 270,146 270,143 240,143 240,146" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>
  <text x="255" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">transaction()</text>

  <!-- Dataset box (center) -->
  <rect x="300" y="88" width="280" height="280" fill="#111" rx="10" stroke="#55c555" stroke-width="2"/>
  <rect x="300" y="88" width="280" height="36" fill="#0d2e0d" rx="10"/>
  <rect x="300" y="112" width="280" height="12" fill="#0d2e0d"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Dataset</text>

  <!-- Column headers inside dataset -->
  <rect x="316" y="132" width="248" height="28" fill="#1a2e1a" rx="4"/>
  <text x="360" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">DEPT_CD</text>
  <text x="440" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">DEPT_NM</text>
  <text x="534" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">USE_YN</text>

  <!-- Rows -->
  <rect x="316" y="164" width="248" height="24" fill="#0d1a0d" rx="2"/>
  <text x="360" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">D001</text>
  <text x="440" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">개발팀</text>
  <text x="534" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Y</text>

  <rect x="316" y="192" width="248" height="24" fill="#111" rx="2"/>
  <text x="360" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">D002</text>
  <text x="440" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">기획팀</text>
  <text x="534" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">N</text>

  <rect x="316" y="220" width="248" height="24" fill="#0d1a0d" rx="2"/>
  <text x="360" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">D003</text>
  <text x="440" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">영업팀</text>
  <text x="534" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Y</text>

  <!-- Row type indicators -->
  <text x="320" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">rowType</text>
  <rect x="316" y="258" width="248" height="22" fill="#1a1a1a" rx="2"/>
  <text x="352" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">NORMAL</text>
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">UPDATE</text>
  <text x="528" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">DELETE</text>

  <!-- Dataset properties -->
  <rect x="316" y="294" width="248" height="62" fill="#1a1a2e" rx="4"/>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">주요 속성</text>
  <text x="326" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">rowcount / colcount</text>
  <text x="326" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">currentrow / saveXML()</text>

  <!-- Arrow dataset → UI -->
  <polygon points="583,140 610,134 610,137 640,137 640,134 667,140 640,146 640,143 610,143 610,146" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>
  <text x="625" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">databinding</text>

  <!-- UI Components -->
  <rect x="670" y="100" width="150" height="268" fill="#1a1a2e" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="745" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">UI 컴포넌트</text>
  <text x="745" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Grid</text>
  <text x="745" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Edit</text>
  <text x="745" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Combo</text>
  <text x="745" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Static</text>
  <text x="745" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Calendar</text>
  <text x="745" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">CheckBox</text>
  <text x="745" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">...(all)</text>
  <text x="745" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">bindeddataset 연결</text>
  <text x="745" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">binddatacolumn 연결</text>
  <text x="745" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">자동 양방향 동기화</text>

  <!-- Bottom: types -->
  <rect x="60" y="400" width="760" height="80" fill="#111" rx="8"/>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 유형</text>
  <text x="180" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">일반 Dataset</text>
  <text x="180" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">서버 응답 저장</text>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">코드 Dataset</text>
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">콤보 목록 등 공통 코드</text>
  <text x="700" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">임시 Dataset</text>
  <text x="700" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">화면 간 파라미터 전달</text>
</svg>
