<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-teal" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="45" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Next.js App Router — 파일 시스템 라우팅</text>

  <!-- ===== Left Panel: Directory Tree ===== -->
  <text x="80" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">디렉터리 구조</text>

  <!-- Tree background -->
  <rect x="80" y="96" width="340" height="380" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1" rx="8"/>

  <!-- Tree lines — app/ root -->
  <text x="100" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">app/</text>

  <!-- layout.tsx -->
  <text x="100" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── </text>
  <text x="145" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">layout.tsx</text>
  <text x="252" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← 루트 레이아웃</text>

  <!-- page.tsx -->
  <text x="100" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── </text>
  <text x="145" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">page.tsx</text>
  <text x="244" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← /</text>

  <!-- loading.tsx -->
  <text x="100" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── </text>
  <text x="145" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" xml:space="preserve">loading.tsx</text>
  <text x="264" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← Suspense boundary</text>

  <!-- error.tsx -->
  <text x="100" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── </text>
  <text x="145" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" xml:space="preserve">error.tsx</text>
  <text x="240" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← Error boundary</text>

  <!-- not-found.tsx -->
  <text x="100" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── </text>
  <text x="145" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" xml:space="preserve">not-found.tsx</text>
  <text x="288" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← 404</text>

  <!-- (auth)/ group -->
  <text x="100" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── </text>
  <text x="145" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">(auth)/</text>
  <text x="218" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← 라우트 그룹 (URL 미포함)</text>

  <!-- login/page.tsx -->
  <text x="100" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">│   ├── </text>
  <text x="172" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#555" xml:space="preserve">login/</text>
  <text x="218" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">page.tsx</text>
  <text x="302" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← /login</text>

  <!-- signup/page.tsx -->
  <text x="100" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">│   └── </text>
  <text x="172" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#555" xml:space="preserve">signup/</text>
  <text x="224" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">page.tsx</text>
  <text x="308" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← /signup</text>

  <!-- blog/ -->
  <text x="100" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">├── </text>
  <text x="145" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">blog/</text>

  <!-- blog/page.tsx -->
  <text x="100" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">│   ├── </text>
  <text x="172" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">page.tsx</text>
  <text x="260" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← /blog</text>

  <!-- blog/[slug]/page.tsx -->
  <text x="100" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">│   └── </text>
  <text x="172" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b07ec8" xml:space="preserve">[slug]/</text>
  <text x="228" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">page.tsx</text>
  <text x="316" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← /blog/:slug</text>

  <!-- api/ -->
  <text x="100" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">└── </text>
  <text x="145" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">api/</text>

  <!-- api/route.ts -->
  <text x="100" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">    └── </text>
  <text x="172" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">route.ts</text>
  <text x="248" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">← API 엔드포인트</text>

  <!-- Legend -->
  <rect x="80" y="440" width="340" height="40" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="6"/>
  <rect x="96" y="453" width="10" height="10" fill="#55c555" rx="2"/>
  <text x="112" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">레이아웃</text>
  <rect x="168" y="453" width="10" height="10" fill="#7ec8e3" rx="2"/>
  <text x="184" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">페이지</text>
  <rect x="228" y="453" width="10" height="10" fill="#e8c55a" rx="2"/>
  <text x="244" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">특수 파일</text>
  <rect x="308" y="453" width="10" height="10" fill="#b07ec8" rx="2"/>
  <text x="324" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동적 세그먼트</text>

  <!-- ===== Right Panel: Nested Layout Hierarchy ===== -->
  <text x="460" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">중첩 레이아웃 구조</text>

  <!-- Root Layout (outermost) -->
  <rect x="460" y="96" width="360" height="380" fill="#0a1a0a" stroke="#55c555" stroke-width="2" rx="10"/>
  <text x="480" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">RootLayout</text>
  <text x="700" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">layout.tsx</text>
  <!-- HTML / body wrapper indicator -->
  <text x="480" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#333">&lt;html&gt;&lt;body&gt;{children}&lt;/body&gt;&lt;/html&gt;</text>

  <!-- Home Page (inside Root) -->
  <rect x="476" y="152" width="328" height="56" fill="#0a0a20" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="494" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">HomePage</text>
  <text x="494" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">app/page.tsx → URL: /</text>

  <!-- Auth Group Layout -->
  <rect x="476" y="220" width="328" height="120" fill="#0a0a10" stroke="#b07ec8" stroke-width="1.5" rx="8"/>
  <text x="494" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b07ec8">(auth) 그룹</text>
  <text x="494" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">URL에 (auth) 포함되지 않음</text>

  <!-- Login Page -->
  <rect x="492" y="270" width="140" height="56" fill="#0a0a20" stroke="#7ec8e3" stroke-width="1" rx="6"/>
  <text x="508" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">LoginPage</text>
  <text x="508" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">URL: /login</text>

  <!-- Signup Page -->
  <rect x="648" y="270" width="140" height="56" fill="#0a0a20" stroke="#7ec8e3" stroke-width="1" rx="6"/>
  <text x="664" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">SignupPage</text>
  <text x="664" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">URL: /signup</text>

  <!-- Blog Layout -->
  <rect x="476" y="352" width="328" height="108" fill="#100a00" stroke="#e8c55a" stroke-width="1.5" rx="8"/>
  <text x="494" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c55a">blog/ 세그먼트</text>

  <!-- Blog List Page -->
  <rect x="492" y="384" width="140" height="58" fill="#0a0a20" stroke="#7ec8e3" stroke-width="1" rx="6"/>
  <text x="508" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">BlogPage</text>
  <text x="508" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">URL: /blog</text>

  <!-- Blog Slug Page -->
  <rect x="648" y="384" width="140" height="58" fill="#100010" stroke="#b07ec8" stroke-width="1" rx="6"/>
  <text x="664" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b07ec8">BlogPostPage</text>
  <text x="664" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">URL: /blog/:slug</text>

  <!-- Legend bottom-right -->
  <rect x="460" y="440" width="360" height="40" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="6"/>
  <text x="480" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">중첩된 상자 = 중첩 레이아웃 상속 —</text>
  <text x="480" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">자식 페이지는 모든 상위 레이아웃을 자동 포함합니다</text>
</svg>
