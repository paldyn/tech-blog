<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Lightweight 태그 — 커밋을 직접 가리키는 포인터
  </text>

  <!-- Commit chain -->
  <!-- Commit A -->
  <rect x="60" y="140" width="160" height="70" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">commit abc1234</text>
  <text x="140" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">feat: add login</text>
  <text x="140" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">v1.0-beta</text>

  <!-- Arrow A → B -->
  <line x1="220" y1="175" x2="278" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Commit B -->
  <rect x="280" y="140" width="160" height="70" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="360" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">commit def5678</text>
  <text x="360" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">fix: bug fix</text>
  <text x="360" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">(태그 없음)</text>

  <!-- Arrow B → C -->
  <line x1="440" y1="175" x2="498" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Commit C -->
  <rect x="500" y="140" width="160" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="580" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">commit ghi9abc</text>
  <text x="580" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">release: v1.0.0</text>
  <text x="580" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">← v1.0.0 (LW)</text>

  <!-- Tag label box -->
  <rect x="520" y="70" width="120" height="44" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="580" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">v1.0.0</text>
  <text x="580" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">lightweight tag</text>
  <line x1="580" y1="114" x2="580" y2="140" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr2)"/>

  <!-- Code block: lightweight tag internals -->
  <rect x="60" y="260" width="760" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Lightweight 태그는 단순 refs 파일에 불과</text>
  <text x="76" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># .git/refs/tags/v1.0.0 = &lt;commit-sha&gt;</text>
  <text x="76" y="324" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git tag</text>
  <text x="124" y="324" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> v1.0.0</text>
  <text x="76" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 태그 객체 없음 → 커밋 SHA 직접 참조</text>
  <text x="76" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git</text>
  <text x="103" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> cat-file -t v1.0.0   </text>
  <text x="400" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># → commit (not "tag"!)</text>
  <text x="76" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">git</text>
  <text x="103" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> cat-file -t v2.0.0   </text>
  <text x="400" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># → tag (annotated!)</text>
</svg>
