<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrW" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">예외 계층과 catch 블록 전략</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">상위 타입은 하위 타입의 catch를 흡수한다</text>

  <!-- Hierarchy tree -->
  <!-- Throwable -->
  <rect x="340" y="90" width="200" height="44" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">Throwable</text>

  <line x1="370" y1="134" x2="230" y2="174" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>
  <line x1="510" y1="134" x2="650" y2="174" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <!-- Error -->
  <rect x="130" y="176" width="200" height="44" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">Error</text>

  <!-- Exception -->
  <rect x="540" y="176" width="200" height="44" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">Exception</text>

  <line x1="590" y1="220" x2="490" y2="260" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>
  <line x1="690" y1="220" x2="790" y2="260" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <!-- IOException -->
  <rect x="380" y="262" width="210" height="44" rx="8" fill="#10181a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="485" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">IOException (Checked)</text>

  <!-- RuntimeException -->
  <rect x="680" y="262" width="160" height="44" rx="8" fill="#1a1a10" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="760" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8">RuntimeException</text>

  <line x1="460" y1="306" x2="340" y2="346" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>
  <line x1="510" y1="306" x2="620" y2="346" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <!-- FileNotFoundException -->
  <rect x="200" y="348" width="240" height="44" rx="8" fill="#0e1618" stroke="#7ec8e3" stroke-width="1"/>
  <text x="320" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">FileNotFoundException</text>

  <!-- SocketException -->
  <rect x="460" y="348" width="200" height="44" rx="8" fill="#0e1618" stroke="#7ec8e3" stroke-width="1"/>
  <text x="560" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">SocketException</text>

  <!-- Catch order best practice -->
  <rect x="60" y="90" width="260" height="260" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1"/>
  <text x="190" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">올바른 catch 순서</text>
  <text x="76" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">1. 가장 구체적인 예외 먼저</text>
  <text x="76" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">   FileNotFoundException</text>
  <text x="76" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">   SocketException</text>
  <text x="76" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">2. 중간 수준</text>
  <text x="76" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">   IOException</text>
  <text x="76" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">3. 상위 타입은 마지막</text>
  <text x="76" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">   Exception</text>
  <line x1="76" y1="280" x2="324" y2="280" stroke="#3a3a4e" stroke-width="1"/>
  <text x="76" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">multi-catch도 동일 원칙 적용</text>
  <text x="76" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">catch (FileNotFound | Socket e) { }</text>
  <text x="76" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이후 catch (IOException e) { }</text>

  <!-- Bottom note -->
  <rect x="60" y="410" width="760" height="40" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">catch 블록 내 변수 e는 implicitly final — 재할당 시도 시 컴파일 에러</text>
</svg>
