<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">AES-GCM 암호화 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">키 생성 → 암호화 → 복호화</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="300" rx="6" fill="#070b14" stroke="#1e2433"/>

  <!-- Line 1 -->
  <text x="80" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 1. AES-256-GCM 키 생성</text>
  <text x="80" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text><text x="128" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> key = <text fill="#7ec8e3">await</text> crypto.subtle.generateKey(</text>
  <text x="80" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  { name: <text fill="#ce9178">'AES-GCM'</text>, length: <text fill="#b5cea8">256</text> },</text>
  <text x="80" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">  true</text><text x="116" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,                     </text><text x="116" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 내보내기 가능 여부</text>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  [<text fill="#ce9178">'encrypt'</text>, <text fill="#ce9178">'decrypt'</text>]</text>
  <text x="80" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">);</text>

  <!-- Line 2 -->
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 2. 암호화 (IV는 매번 새로 생성)</text>
  <text x="80" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text><text x="128" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> iv = crypto.getRandomValues(</text><text x="428" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">new</text><text x="464" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Uint8Array(</text><text x="580" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">12</text><text x="596" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">));</text>
  <text x="80" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text><text x="128" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> plaintext = <text fill="#7ec8e3">new</text> TextEncoder().encode(<text fill="#ce9178">'비밀 메시지'</text>);</text>
  <text x="80" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text><text x="128" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> ciphertext = <text fill="#7ec8e3">await</text> crypto.subtle.encrypt(</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  { name: <text fill="#ce9178">'AES-GCM'</text>, iv }, key, plaintext</text>
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">);</text>

  <!-- Line 3 -->
  <text x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 3. 복호화 (같은 key + iv 필요)</text>
  <text x="80" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text><text x="128" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> decrypted = <text fill="#7ec8e3">await</text> crypto.subtle.decrypt(</text>
  <text x="80" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  { name: <text fill="#ce9178">'AES-GCM'</text>, iv }, key, ciphertext</text>
  <text x="80" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">);</text>

  <!-- Bottom note -->
  <text x="440" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GCM 모드는 인증 태그 포함 — IV 재사용 금지</text>
</svg>
