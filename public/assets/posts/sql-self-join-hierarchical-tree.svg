<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">셀프 조인 — 계층형 데이터 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">같은 테이블을 두 번 조인해 부모-자식 관계 탐색</text>

  <!-- employees table -->
  <rect x="60" y="96" width="280" height="250" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="200" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">employees 테이블</text>
  <!-- header -->
  <rect x="60" y="126" width="280" height="22" rx="4" fill="#0f1a2e"/>
  <text x="100" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">id</text>
  <text x="175" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">name</text>
  <text x="290" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">manager_id</text>
  <line x1="60" y1="148" x2="340" y2="148" stroke="#1e2433" stroke-width="1"/>
  <!-- rows -->
  <text x="100" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">1</text>
  <text x="175" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">Alice</text>
  <text x="290" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">NULL</text>
  <line x1="60" y1="170" x2="340" y2="170" stroke="#1e2433" stroke-width="1"/>
  <text x="100" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">2</text>
  <text x="175" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">Bob</text>
  <text x="290" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">1</text>
  <line x1="60" y1="192" x2="340" y2="192" stroke="#1e2433" stroke-width="1"/>
  <text x="100" y="208" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">3</text>
  <text x="175" y="208" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">Carol</text>
  <text x="290" y="208" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">1</text>
  <line x1="60" y1="214" x2="340" y2="214" stroke="#1e2433" stroke-width="1"/>
  <text x="100" y="230" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">4</text>
  <text x="175" y="230" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">Dave</text>
  <text x="290" y="230" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">2</text>
  <line x1="60" y1="236" x2="340" y2="236" stroke="#1e2433" stroke-width="1"/>
  <text x="100" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">5</text>
  <text x="175" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">Eve</text>
  <text x="290" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">2</text>
  <line x1="60" y1="258" x2="340" y2="258" stroke="#1e2433" stroke-width="1"/>
  <text x="100" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">6</text>
  <text x="175" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">Frank</text>
  <text x="290" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">3</text>

  <!-- Tree visualization -->
  <rect x="370" y="96" width="450" height="270" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="595" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">계층 구조 시각화</text>

  <!-- Alice (root) -->
  <rect x="544" y="130" width="100" height="30" rx="6" fill="#1e3a5f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="594" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Alice (1)</text>

  <!-- Level 2 -->
  <line x1="594" y1="160" x2="594" y2="180" stroke="#555" stroke-width="1.5"/>
  <line x1="490" y1="180" x2="698" y2="180" stroke="#555" stroke-width="1.5"/>
  <line x1="490" y1="180" x2="490" y2="200" stroke="#555" stroke-width="1.5"/>
  <line x1="698" y1="180" x2="698" y2="200" stroke="#555" stroke-width="1.5"/>

  <rect x="440" y="200" width="100" height="30" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Bob (2)</text>

  <rect x="648" y="200" width="100" height="30" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="698" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Carol (3)</text>

  <!-- Level 3 -->
  <line x1="490" y1="230" x2="490" y2="250" stroke="#555" stroke-width="1.5"/>
  <line x1="430" y1="250" x2="550" y2="250" stroke="#555" stroke-width="1.5"/>
  <line x1="430" y1="250" x2="430" y2="270" stroke="#555" stroke-width="1.5"/>
  <line x1="550" y1="250" x2="550" y2="270" stroke="#555" stroke-width="1.5"/>

  <rect x="390" y="270" width="80" height="28" rx="6" fill="#2a1e1e" stroke="#7777cc" stroke-width="1"/>
  <text x="430" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Dave (4)</text>

  <rect x="510" y="270" width="80" height="28" rx="6" fill="#2a1e1e" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Eve (5)</text>

  <line x1="698" y1="230" x2="698" y2="270" stroke="#555" stroke-width="1.5"/>
  <rect x="648" y="270" width="84" height="28" rx="6" fill="#2a1e1e" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Frank (6)</text>

  <!-- Legend -->
  <text x="595" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">manager_id → id 자기 참조</text>

  <!-- Self join query -->
  <rect x="60" y="362" width="760" height="108" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 직원과 관리자 이름을 함께 조회 (셀프 조인)</text>
  <text x="80" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="80" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    e.name  AS employee,</text>
  <text x="80" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    m.name  AS manager</text>
  <text x="80" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM employees e</text>
  <text x="80" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM employees e  LEFT JOIN employees m ON m.id = e.manager_id;</text>

  <!-- Footer -->
  <text x="440" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
