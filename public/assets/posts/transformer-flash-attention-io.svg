<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">FlashAttention: IO-Aware 메모리 계층 활용</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">HBM ↔ SRAM 데이터 이동을 최소화해 어텐션을 가속한다</text>

  <!-- Left: Standard Attention -->
  <rect x="60" y="96" width="350" height="390" rx="10" fill="#111" stroke="#222"/>
  <text x="235" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">표준 어텐션 (느림)</text>

  <!-- HBM box -->
  <rect x="85" y="136" width="300" height="60" rx="6" fill="#1a0a0a" stroke="#3a1a1a"/>
  <text x="235" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">HBM (GPU 메인 메모리)</text>
  <text x="235" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Q, K, V, S(NxN), P(NxN), O 저장 — O(N²) 공간</text>

  <!-- Arrows: multiple HBM reads/writes -->
  <line x1="235" y1="196" x2="235" y2="228" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="227,228 235,244 243,228" fill="#e05555"/>
  <text x="250" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">읽기×3</text>

  <rect x="85" y="248" width="300" height="40" rx="6" fill="#111820" stroke="#1e2433"/>
  <text x="235" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">S = QK^T 계산 (SRAM)</text>

  <line x1="235" y1="288" x2="235" y2="310" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="227,310 235,326 243,310" fill="#e05555"/>
  <text x="250" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">HBM 쓰기</text>

  <rect x="85" y="328" width="300" height="40" rx="6" fill="#111820" stroke="#1e2433"/>
  <text x="235" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">P = softmax(S) 계산</text>

  <line x1="235" y1="368" x2="235" y2="390" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="227,390 235,406 243,390" fill="#e05555"/>
  <text x="250" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">HBM 재읽기</text>

  <rect x="85" y="408" width="300" height="40" rx="6" fill="#111820" stroke="#1e2433"/>
  <text x="235" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">O = PV 계산</text>

  <text x="235" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">HBM 읽기/쓰기 횟수: O(N²/M) — 느림</text>

  <!-- Right: FlashAttention -->
  <rect x="470" y="96" width="350" height="390" rx="10" fill="#111" stroke="#222"/>
  <text x="645" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">FlashAttention (빠름)</text>

  <!-- SRAM box -->
  <rect x="495" y="136" width="300" height="60" rx="6" fill="#0a1a0a" stroke="#1a3a1a"/>
  <text x="645" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">SRAM (온칩 캐시, 수십 MB)</text>
  <text x="645" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">타일 Q_i, K_j, V_j만 올라온다</text>

  <!-- Tile blocks -->
  <rect x="495" y="214" width="140" height="80" rx="6" fill="#0f1a0f" stroke="#1e3a1e"/>
  <text x="565" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Block Q_i</text>
  <text x="565" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Br × d</text>
  <text x="565" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(타일 크기)</text>

  <rect x="655" y="214" width="140" height="80" rx="6" fill="#0f1a0f" stroke="#1e3a1e"/>
  <text x="725" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Block K_j, V_j</text>
  <text x="725" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Bc × d</text>
  <text x="725" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(열 타일)</text>

  <!-- Arrow between tiles -->
  <line x1="635" y1="254" x2="655" y2="254" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="3,2"/>

  <rect x="495" y="314" width="300" height="60" rx="6" fill="#111820" stroke="#1e2433"/>
  <text x="645" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">타일별 softmax + O 누적</text>
  <text x="645" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">online softmax로 전체 S 불필요</text>

  <!-- Arrow down -->
  <line x1="645" y1="374" x2="645" y2="400" stroke="#55c555" stroke-width="2"/>
  <polygon points="637,400 645,416 653,400" fill="#55c555"/>

  <rect x="495" y="416" width="300" height="40" rx="6" fill="#0a1a0a" stroke="#1a3a1e"/>
  <text x="645" y="441" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">최종 O를 HBM에 1회 기록</text>

  <text x="645" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">HBM 읽기/쓰기: O(N²/M·d) — 최대 7.6× 빠름</text>
</svg>
