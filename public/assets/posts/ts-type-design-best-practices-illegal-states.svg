<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="40" font-size="22" font-weight="700" fill="#e8e8e8">불가능한 상태를 표현 불가능하게</text>

  <text x="60" y="78" font-size="14" font-weight="600" fill="#e05555">✗ 플래그 조합 — 모순 상태 허용</text>
  <text x="460" y="78" font-size="14" font-weight="600" fill="#55c555">✓ 판별 유니온 — 유효 상태만</text>

  <rect x="60" y="92" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="118" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">// loading=true, data 있음?</text>
  <text x="76" y="140" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan> State = {</text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  loading: <tspan fill="#7ec8e3" font-weight="600">boolean</tspan>;</text>
  <text x="76" y="184" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  error?: Error;</text>
  <text x="76" y="206" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  data?: User;</text>
  <text x="76" y="228" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">};</text>
  <text x="76" y="250" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">// 8가지 조합, 대부분 무효</text>

  <rect x="460" y="92" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="118" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">// 각 상태가 자기 데이터만</text>
  <text x="476" y="140" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan> State =</text>
  <text x="476" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  | { tag: <tspan fill="#ce9178">"loading"</tspan> }</text>
  <text x="476" y="184" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  | { tag: <tspan fill="#ce9178">"error"</tspan>; error: Error }</text>
  <text x="476" y="206" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  | { tag: <tspan fill="#ce9178">"ok"</tspan>; data: User };</text>
  <text x="476" y="228" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> </text>
  <text x="476" y="250" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">// 무효 상태가 컴파일 불가</text>
</svg>
