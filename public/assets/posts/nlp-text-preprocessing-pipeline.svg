<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NLP 텍스트 전처리 파이프라인</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">원시 텍스트 → 정제 → 토큰화 → 정규화 → 불용어 제거 → 어간/원형 → 피처</text>

  <!-- Step boxes with before/after examples -->
  <!-- Each step: box at top (label + description), example below -->

  <!-- STEP 1: Raw Text -->
  <rect x="60" y="96" width="108" height="64" fill="#111827" rx="8" stroke="#1e2a3a" stroke-width="1.5"/>
  <text x="114" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">원시 텍스트</text>
  <text x="114" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Raw Input</text>
  <text x="114" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">HTML·특수문자 포함</text>

  <!-- Arrow 1→2 -->
  <polygon points="172,122 186,122 186,116 200,128 186,140 186,134 172,134" fill="#555"/>

  <!-- STEP 2: Clean -->
  <rect x="204" y="96" width="108" height="64" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="258" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">정제 (Clean)</text>
  <text x="258" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">HTML 제거</text>
  <text x="258" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">특수문자 정리</text>

  <!-- Arrow 2→3 -->
  <polygon points="316,122 330,122 330,116 344,128 330,140 330,134 316,134" fill="#555"/>

  <!-- STEP 3: Tokenize -->
  <rect x="348" y="96" width="108" height="64" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="402" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">토큰화</text>
  <text x="402" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Tokenize</text>
  <text x="402" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">단어 단위 분리</text>

  <!-- Arrow 3→4 -->
  <polygon points="460,122 474,122 474,116 488,128 474,140 474,134 460,134" fill="#555"/>

  <!-- STEP 4: Normalize -->
  <rect x="492" y="96" width="108" height="64" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="546" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">정규화</text>
  <text x="546" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Normalize</text>
  <text x="546" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">소문자·유니코드</text>

  <!-- Arrow 4→5 -->
  <polygon points="604,122 618,122 618,116 632,128 618,140 618,134 604,134" fill="#555"/>

  <!-- STEP 5: Stopwords -->
  <rect x="636" y="96" width="108" height="64" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="690" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">불용어 제거</text>
  <text x="690" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Stopword</text>
  <text x="690" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Removal</text>
  <text x="690" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">is, the, a...</text>

  <!-- Arrow 5→6 (goes down) -->
  <line x1="748" y1="128" x2="780" y2="128" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="780" y1="128" x2="780" y2="290" stroke="#555" stroke-width="2"/>
  <line x1="780" y1="290" x2="746" y2="290" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 6: Stem/Lemma (below, right side) -->
  <rect x="636" y="258" width="108" height="64" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">어간/원형</text>
  <text x="690" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Stem/Lemma</text>
  <text x="690" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">running→run</text>

  <!-- Arrow 6→features -->
  <polygon points="632,284 618,284 618,278 604,290 618,302 618,296 632,296" fill="#555"/>

  <!-- STEP 7: Features -->
  <rect x="492" y="258" width="108" height="64" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="546" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">피처 벡터</text>
  <text x="546" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Features</text>
  <text x="546" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">모델 입력 준비</text>

  <!-- ===== EXAMPLE FLOW (bottom section) ===== -->
  <rect x="60" y="190" width="756" height="230" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">단계별 변환 예시</text>

  <!-- Example rows -->
  <!-- Row 1: Raw -->
  <rect x="76" y="222" width="80" height="20" fill="#1e2433" rx="3"/>
  <text x="116" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">원시 텍스트</text>
  <rect x="166" y="220" width="622" height="24" fill="#111827" rx="3"/>
  <text x="477" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">"&lt;p&gt;Hello, World!!! 😊 This is an EXAMPLE.&lt;/p&gt;"</text>

  <!-- Row 2: Clean -->
  <rect x="76" y="252" width="80" height="20" fill="#1a2a1a" rx="3"/>
  <text x="116" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">정제 후</text>
  <rect x="166" y="250" width="622" height="24" fill="#111827" rx="3"/>
  <text x="477" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">"Hello World  This is an EXAMPLE"</text>

  <!-- Row 3: Tokenize -->
  <rect x="76" y="282" width="80" height="20" fill="#0d1a2e" rx="3"/>
  <text x="116" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">토큰화 후</text>
  <rect x="166" y="280" width="622" height="24" fill="#111827" rx="3"/>
  <text x="477" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">["Hello", "World", "This", "is", "an", "EXAMPLE"]</text>

  <!-- Row 4: Normalize -->
  <rect x="76" y="312" width="80" height="20" fill="#0d1a2e" rx="3"/>
  <text x="116" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">정규화 후</text>
  <rect x="166" y="310" width="622" height="24" fill="#111827" rx="3"/>
  <text x="477" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">["hello", "world", "this", "is", "an", "example"]</text>

  <!-- Row 5: Stopword -->
  <rect x="76" y="342" width="80" height="20" fill="#2a1111" rx="3"/>
  <text x="116" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">불용어 제거</text>
  <rect x="166" y="340" width="622" height="24" fill="#111827" rx="3"/>
  <text x="477" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">["hello", "world", "example"]  ← this, is, an 제거</text>

  <!-- Row 6: Stem/Lemma -->
  <rect x="76" y="372" width="80" height="20" fill="#1a1a2e" rx="3"/>
  <text x="116" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">어간 추출</text>
  <rect x="166" y="370" width="622" height="24" fill="#111827" rx="3"/>
  <text x="477" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">["hello", "world", "exampl"]  → TF-IDF / 임베딩 입력</text>
</svg>
