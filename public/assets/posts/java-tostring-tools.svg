<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">toString() 구현 방법 3가지 비교</text>

  <!-- Method 1: record -->
  <text x="160" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">1. record (자동)</text>
  <rect x="60" y="90" width="240" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">record</text>
  <text x="120" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Person(</text>
  <text x="76" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    String name, </text>
  <text x="76" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    int</text>
  <text x="130.8" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> age) {}</text>
  <text x="76" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Person[name=Alice, age=30]</text>

  <rect x="60" y="202" width="240" height="30" rx="6" fill="#0d2214" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">자동 생성, 가장 안전</text>

  <!-- Method 2: formatted/String.format -->
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">2. formatted() (Java 15+)</text>
  <rect x="320" y="90" width="240" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="336" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">@Override</text>
  <text x="336" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">public</text>
  <text x="380" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> String toString() {</text>
  <text x="336" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="398.6" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178"> "P{%s,%d}"</text>
  <text x="336" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    .formatted(name, age);</text>
  <text x="336" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <rect x="320" y="202" width="240" height="30" rx="6" fill="#0d1428" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">포맷 제어, 읽기 좋음</text>

  <!-- Method 3: ToStringBuilder (Apache) -->
  <text x="720" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">3. 직접 구현</text>
  <rect x="580" y="90" width="240" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="596" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">@Override</text>
  <text x="596" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">public</text>
  <text x="640" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> String toString() {</text>
  <text x="596" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="658.6" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178"> "Person{"</text>
  <text x="596" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    + name + </text>
  <text x="689.9" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">","</text>
  <text x="596" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    + age + </text>
  <text x="682.1" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'}'</text>
  <text x="705.6" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">;</text>

  <rect x="580" y="202" width="240" height="30" rx="6" fill="#1a1428" stroke="#7777cc" stroke-width="1"/>
  <text x="700" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">의존성 없음, 완전 제어</text>

  <!-- Bad practices -->
  <text x="440" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">주의사항</text>

  <rect x="60" y="278" width="360" height="116" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">하지 말아야 할 것</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- 민감 정보(패스워드, 토큰) toString에 포함 금지</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- 순환 참조(A.toString()이 B 출력, B.toString()이 A) → StackOverflow</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- 너무 많은 필드 포함 → 로그가 지저분해짐</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- 계약으로 삼기 금지 — toString 포맷은 변경 가능</text>

  <rect x="460" y="278" width="360" height="116" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">권장 사항</text>
  <text x="480" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- 디버깅에 유용한 핵심 필드만 포함</text>
  <text x="480" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- 클래스명 포함 (Person{...} 형식)</text>
  <text x="480" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- record 사용 시 자동 생성 활용</text>
  <text x="480" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- @Override 명시로 오버라이드 보장</text>
</svg>
