<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">과대적합 방지 기법 코드 모음</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">정규화 · Early Stopping · Dropout · 데이터 증강</text>

  <!-- Code block -->
  <rect x="60" y="86" width="760" height="328" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- L2 Regularization -->
  <text x="76" y="108" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"># ① L2 정규화 (Ridge) — 가중치 크기 패널티</text>
  <text x="76" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">ridge = Ridge(alpha=</tspan><tspan fill="#b5cea8">1.0</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="76" y="144" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"># alpha ↑ → 규제 강화 → 분산 감소</text>

  <line x1="76" y1="158" x2="804" y2="158" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Early Stopping -->
  <text x="76" y="176" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"># ② Early Stopping (sklearn SGD)</text>
  <text x="76" y="194" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">sgd = SGDClassifier(</text>
  <text x="76" y="212" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    early_stopping=</text>
  <text x="216" y="212" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">True</text>
  <text x="244" y="212" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">,</text>
  <text x="76" y="230" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    n_iter_no_change=</text>
  <text x="230" y="230" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">10</text>
  <text x="250" y="230" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, validation_fraction=</text>
  <text x="441" y="230" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">0.1</text>
  <text x="465" y="230" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">)</text>

  <line x1="76" y1="244" x2="804" y2="244" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Max depth (tree) -->
  <text x="76" y="262" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"># ③ 트리 복잡도 제한</text>
  <text x="76" y="280" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">rf = RandomForestClassifier(</text>
  <text x="76" y="298" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    max_depth=</text>
  <text x="175" y="298" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">8</text>
  <text x="182" y="298" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">,</text>
  <text x="76" y="316" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    min_samples_leaf=</text>
  <text x="234" y="316" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">5</text>
  <text x="241" y="316" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">,</text>
  <text x="76" y="334" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    max_features=</text>
  <text x="209" y="334" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'sqrt'</text>
  <text x="255" y="334" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">)</text>

  <line x1="76" y1="348" x2="804" y2="348" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Cross-validation based selection -->
  <text x="76" y="366" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"># ④ CV로 최적 복잡도 자동 탐색</text>
  <text x="76" y="384" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">grid = GridSearchCV(rf,</text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    {</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">'max_depth'</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#b5cea8">4, 6, 8, 10</tspan><tspan fill="#ffffff">]},</tspan></text>

  <!-- Footer -->
</svg>
