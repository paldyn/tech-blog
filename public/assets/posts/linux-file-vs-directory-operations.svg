<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일 · 디렉터리 조작 명령어 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">같은 개념, 다른 명령어</text>

  <!-- Header -->
  <rect x="60" y="88" width="760" height="32" fill="#161616" rx="4"/>
  <text x="200" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">작업</text>
  <text x="440" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">파일</text>
  <text x="680" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c55a" text-anchor="middle">디렉터리</text>

  <!-- Rows -->
  <rect x="60" y="124" width="760" height="32" fill="#0d1a0d" rx="0"/>
  <text x="200" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">생성</text>
  <text x="440" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">touch file.txt</text>
  <text x="680" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" text-anchor="middle">mkdir mydir</text>

  <rect x="60" y="160" width="760" height="32" fill="#0a0a0a" rx="0"/>
  <text x="200" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">삭제</text>
  <text x="440" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">rm file.txt</text>
  <text x="680" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" text-anchor="middle">rmdir mydir / rm -r</text>

  <rect x="60" y="196" width="760" height="32" fill="#0d1a0d" rx="0"/>
  <text x="200" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">복사</text>
  <text x="440" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">cp src dst</text>
  <text x="680" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" text-anchor="middle">cp -r src/ dst/</text>

  <rect x="60" y="232" width="760" height="32" fill="#0a0a0a" rx="0"/>
  <text x="200" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">이동/이름 변경</text>
  <text x="440" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">mv old.txt new.txt</text>
  <text x="680" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" text-anchor="middle">mv olddir/ newdir/</text>

  <rect x="60" y="268" width="760" height="32" fill="#0d1a0d" rx="0"/>
  <text x="200" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">내용 확인</text>
  <text x="440" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">cat / less / head</text>
  <text x="680" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" text-anchor="middle">ls / tree</text>

  <rect x="60" y="304" width="760" height="32" fill="#0a0a0a" rx="0"/>
  <text x="200" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">존재 여부 확인</text>
  <text x="440" y="325" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">[ -f file ]</text>
  <text x="680" y="325" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" text-anchor="middle">[ -d dir ]</text>

  <!-- Column dividers -->
  <line x1="320" y1="88" x2="320" y2="336" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="560" y1="88" x2="560" y2="336" stroke="#1a1a1a" stroke-width="1"/>

  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">file 명령어로 타입 확인: file /etc → directory  |  file /etc/hostname → ASCII text</text>
</svg>
