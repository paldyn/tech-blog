<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">리스트 컴프리헨션 해부</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">[표현식 for 변수 in 이터러블 if 조건]</text>

  <!-- Main syntax box -->
  <rect x="60" y="100" width="760" height="80" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" fill="#e8e8e8">[<tspan fill="#ce9178">x**2</tspan>  <tspan fill="#7ec8e3">for</tspan>  <tspan fill="#55c555">x</tspan>  <tspan fill="#7ec8e3">in</tspan>  <tspan fill="#7777cc">range(10)</tspan>  <tspan fill="#7ec8e3">if</tspan>  <tspan fill="#e8e8e8">x%2==0</tspan>]</text>
  <text x="440" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#6a8aa0">→  [0, 4, 16, 36, 64]</text>

  <!-- Labels pointing up -->
  <text x="182" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">① 표현식</text>
  <line x1="182" y1="200" x2="182" y2="184" stroke="#ce9178" stroke-width="1.5"/>
  <text x="182" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">출력 값</text>

  <text x="390" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">② 루프 변수</text>
  <line x1="390" y1="200" x2="390" y2="184" stroke="#55c555" stroke-width="1.5"/>

  <text x="570" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">③ 이터러블</text>
  <line x1="570" y1="200" x2="570" y2="184" stroke="#7777cc" stroke-width="1.5"/>

  <text x="720" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">④ 필터 조건</text>
  <line x1="720" y1="200" x2="720" y2="184" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">생략 가능</text>

  <!-- Loop vs comprehension -->
  <rect x="60" y="248" width="360" height="200" rx="8" fill="#1f0f0f" stroke="#e05555"/>
  <text x="240" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">일반 for 루프</text>
  <rect x="76" y="284" width="328" height="148" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">result = []</text>
  <text x="92" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for x <tspan fill="#7ec8e3">in</tspan> range(<tspan fill="#b5cea8">10</tspan>):</text>
  <text x="92" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    if x % <tspan fill="#b5cea8">2</tspan> == <tspan fill="#b5cea8">0</tspan>:</text>
  <text x="92" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">        result.append(x**<tspan fill="#b5cea8">2</tspan>)</text>
  <text x="92" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 4줄, 가변 상태 필요</text>
  <text x="92" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">result  <tspan fill="#6a8aa0"># [0, 4, 16, 36, 64]</tspan></text>

  <!-- Comprehension -->
  <rect x="460" y="248" width="360" height="200" rx="8" fill="#0f1f0f" stroke="#55c555"/>
  <text x="640" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">리스트 컴프리헨션</text>
  <rect x="476" y="284" width="328" height="148" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">result = [</text>
  <text x="492" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    x**<tspan fill="#b5cea8">2</tspan></text>
  <text x="492" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    for x <tspan fill="#7ec8e3">in</tspan> range(<tspan fill="#b5cea8">10</tspan>)</text>
  <text x="492" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    if x % <tspan fill="#b5cea8">2</tspan> == <tspan fill="#b5cea8">0</tspan></text>
  <text x="492" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">]</text>
  <text x="492" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 한 구조, 불변 스타일</text>

  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컴프리헨션은 새 리스트를 반환 — 원본 불변</text>
</svg>
