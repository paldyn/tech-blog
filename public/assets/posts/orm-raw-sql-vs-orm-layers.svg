<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">ORM 레이어 구조와 추상화 수준</text>

  <!-- Abstraction spectrum -->
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">추상화 낮음 (SQL 제어) ←──────────────────── 추상화 높음 (객체 지향)</text>

  <!-- Levels -->
  <rect x="40" y="80" width="154" height="80" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="117" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Raw SQL</text>
  <text x="117" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JDBC / psycopg2</text>
  <text x="117" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">database/sql (Go)</text>
  <text x="117" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">완전한 SQL 제어</text>

  <rect x="210" y="80" width="154" height="80" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="287" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SQL Mapper</text>
  <text x="287" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MyBatis</text>
  <text x="287" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Dapper (.NET)</text>
  <text x="287" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL 직접 + 매핑 자동</text>

  <rect x="380" y="80" width="154" height="80" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="457" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">SQL Builder</text>
  <text x="457" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">jOOQ / QueryDSL</text>
  <text x="457" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQLAlchemy Core</text>
  <text x="457" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">타입 안전 SQL 생성</text>

  <rect x="550" y="80" width="154" height="80" rx="6" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="627" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Micro ORM</text>
  <text x="627" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Spring JDBC Template</text>
  <text x="627" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">sqlx (Go)</text>
  <text x="627" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL + 결과 자동 매핑</text>

  <rect x="720" y="80" width="120" height="80" rx="6" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="780" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Full ORM</text>
  <text x="780" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JPA/Hibernate</text>
  <text x="780" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Django ORM</text>
  <text x="780" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">객체 중심</text>

  <!-- Same query comparison -->
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">동일 조회를 각 레이어로 표현</text>

  <!-- Raw SQL -->
  <rect x="40" y="210" width="372" height="124" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">-- JDBC Raw SQL</text>
  <text x="56" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">String sql = </text>
  <text x="56" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">  "SELECT * FROM orders"</text>
  <text x="56" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">  +" WHERE cust_id = ?"</text>
  <text x="56" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">  +" AND status = 'PAID'"</text>
  <text x="56" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">ps.setInt(</text>
  <text x="136" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">1</text>
  <text x="148" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">, custId);</text>
  <text x="56" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// ResultSet 수동 매핑...</text>

  <!-- JPA -->
  <rect x="468" y="210" width="372" height="124" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// Spring Data JPA</text>
  <text x="484" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 메서드명으로 쿼리 자동 생성</text>
  <text x="484" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">List</text>
  <text x="514" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">&lt;Order&gt; orders =</text>
  <text x="484" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  orderRepo</text>
  <text x="484" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .findByCustIdAndStatus(</text>
  <text x="484" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">      custId, </text>
  <text x="566" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"PAID"</text>
  <text x="608" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">);</text>
  <text x="484" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// Order 객체로 자동 매핑</text>

  <!-- Bottom insight -->
  <rect x="40" y="354" width="800" height="70" rx="8" fill="#111"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">현실적 전략: 계층별 선택</text>
  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">도메인 CRUD → ORM (JPA·Hibernate·Django ORM)</text>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">복잡한 집계·보고서 → Raw SQL (MyBatis·jOOQ·SQLAlchemy Core·Spring JDBC)</text>
</svg>
