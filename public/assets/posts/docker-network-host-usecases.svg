<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">host 네트워크 사용 판단 기준</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">성능과 격리 간의 트레이드오프</text>

  <!-- Use cases left -->
  <rect x="60" y="88" width="340" height="240" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="116" text-anchor="middle" fill="#55c555" font-size="15" font-weight="600">✓ host 네트워크 적합</text>

  <text x="80" y="148" fill="#e8e8e8" font-size="13">• 고성능 네트워크 I/O 필요</text>
  <text x="80" y="172" fill="#888" font-size="12">  (패킷 포워딩, 고빈도 요청)</text>
  <text x="80" y="200" fill="#e8e8e8" font-size="13">• 포트를 동적으로 열어야 하는 앱</text>
  <text x="80" y="224" fill="#888" font-size="12">  (FTP passive, UDP 다중 포트)</text>
  <text x="80" y="252" fill="#e8e8e8" font-size="13">• 호스트 네트워크 직접 모니터링</text>
  <text x="80" y="276" fill="#888" font-size="12">  (tcpdump, snmp 에이전트)</text>
  <text x="80" y="304" fill="#55c555" font-size="12">  Linux 전용 (macOS/Win 미지원)</text>

  <!-- Avoid right -->
  <rect x="480" y="88" width="340" height="240" rx="10" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="116" text-anchor="middle" fill="#e05555" font-size="15" font-weight="600">✗ host 네트워크 비권장</text>

  <text x="500" y="148" fill="#e8e8e8" font-size="13">• 여러 컨테이너가 같은 포트 사용</text>
  <text x="500" y="172" fill="#888" font-size="12">  (포트 충돌로 실행 불가)</text>
  <text x="500" y="200" fill="#e8e8e8" font-size="13">• 보안 격리가 중요한 서비스</text>
  <text x="500" y="224" fill="#888" font-size="12">  (컨테이너가 호스트 네트워크 노출)</text>
  <text x="500" y="252" fill="#e8e8e8" font-size="13">• macOS / Windows 환경</text>
  <text x="500" y="276" fill="#888" font-size="12">  (VM 레이어로 인해 효과 없음)</text>
  <text x="500" y="304" fill="#e05555" font-size="12">  Kubernetes에서 보안상 비권장</text>
</svg>
