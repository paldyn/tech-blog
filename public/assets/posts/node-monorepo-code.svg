<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">모노레포 설정 파일 예시</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">pnpm-workspace.yaml (왼쪽) · turbo.json (오른쪽)</text>

  <!-- Left: pnpm-workspace.yaml + root package.json -->
  <text x="60" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">pnpm-workspace.yaml</text>
  <rect x="60" y="112" width="370" height="264" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="140" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">packages</text>
  <text x="148" y="140" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">:</text>
  <text x="76" y="158" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  - 'packages/*'</text>
  <text x="76" y="176" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  - 'apps/*'</text>
  <text x="76" y="194" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  - 'tooling/*'</text>

  <text x="76" y="230" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// apps/web/package.json</text>
  <text x="76" y="248" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">{</text>
  <text x="76" y="266" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  "name"</text>
  <text x="136" y="266" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: </text>
  <text x="152" y="266" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">"web"</text>
  <text x="192" y="266" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">,</text>
  <text x="76" y="284" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  "dependencies"</text>
  <text x="196" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: {</text>
  <text x="76" y="302" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    "@myorg/ui"</text>
  <text x="182" y="302" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: </text>
  <text x="198" y="302" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">"workspace:*"</text>
  <text x="76" y="320" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="76" y="338" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="76" y="356" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// workspace:* = 로컬 패키지 심링크</text>

  <!-- Right: turbo.json -->
  <text x="450" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">turbo.json (Turborepo 빌드 파이프라인)</text>
  <rect x="450" y="112" width="370" height="264" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="466" y="140" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">{</text>
  <text x="466" y="158" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  "$schema"</text>
  <text x="550" y="158" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: </text>
  <text x="566" y="158" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">"https://turbo.build/schema.json"</text>
  <text x="466" y="176" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  "tasks"</text>
  <text x="530" y="176" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: {</text>
  <text x="466" y="194" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    "build"</text>
  <text x="522" y="194" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: {</text>
  <text x="466" y="212" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      "dependsOn"</text>
  <text x="570" y="212" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: [</text>
  <text x="594" y="212" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">"^build"</text>
  <text x="650" y="212" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">],</text>
  <text x="466" y="230" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      "outputs"</text>
  <text x="554" y="230" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: [</text>
  <text x="578" y="230" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">"dist/**"</text>
  <text x="640" y="230" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">]</text>
  <text x="466" y="248" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    },</text>
  <text x="466" y="266" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    "dev"</text>
  <text x="510" y="266" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: { </text>
  <text x="534" y="266" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">"persistent"</text>
  <text x="630" y="266" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: </text>
  <text x="646" y="266" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">true</text>
  <text x="670" y="266" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> },</text>
  <text x="466" y="284" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    "test"</text>
  <text x="518" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: { </text>
  <text x="542" y="284" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">"dependsOn"</text>
  <text x="638" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">: [</text>
  <text x="662" y="284" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">"build"</text>
  <text x="706" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">] },</text>
  <text x="466" y="302" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="466" y="320" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="466" y="356" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// ^build = 의존 패키지 빌드 후 실행</text>

  <!-- Bottom note -->
  <text x="440" y="395" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">Turborepo: 변경되지 않은 패키지는 캐시에서 즉시 복원 — CI 시간 대폭 단축</text>
</svg>
