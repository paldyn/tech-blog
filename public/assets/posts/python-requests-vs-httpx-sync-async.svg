<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">같은 일을 동기로도, 비동기로도</text>

  <rect x="60" y="80" width="370" height="170" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="245" y="106" font-size="13" fill="#7ec8e3" text-anchor="middle">동기 (requests / httpx)</text>
  <text x="76" y="136" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">import</tspan> httpx</text>
  <text x="76" y="164" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">r = httpx.get(<tspan fill="#ce9178">"https://.."</tspan>)</text>
  <text x="76" y="192" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">data = r.json()</text>
  <text x="76" y="224" font-size="12" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 응답 올 때까지 기다림</text>

  <rect x="450" y="80" width="370" height="170" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="106" font-size="13" fill="#55c555" text-anchor="middle">비동기 (httpx만)</text>
  <text x="466" y="136" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">async with</tspan> httpx.AsyncClient()</text>
  <text x="466" y="160" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       <tspan fill="#7ec8e3" font-weight="600">as</tspan> client:</text>
  <text x="466" y="188" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  r = <tspan fill="#7ec8e3" font-weight="600">await</tspan> client.get(url)</text>
  <text x="466" y="220" font-size="12" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 대기 중 다른 일 처리</text>
</svg>
