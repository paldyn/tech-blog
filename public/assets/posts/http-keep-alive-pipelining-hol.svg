<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrW" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888888"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">파이프라이닝과 머리줄(HOL) 블로킹</text>
    <!-- Row 1: serial keep-alive -->
    <text x="60" y="92" font-size="13" font-weight="600" fill="#7ec8e3">① Keep-Alive 직렬 — 응답을 받아야 다음 요청</text>
    <rect x="70" y="108" width="115" height="34" rx="5" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1"/>
    <text x="127" y="130" text-anchor="middle" font-size="12" fill="#7ec8e3">요청 1</text>
    <rect x="195" y="108" width="115" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="252" y="130" text-anchor="middle" font-size="12" fill="#55c555">응답 1</text>
    <rect x="320" y="108" width="115" height="34" rx="5" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1"/>
    <text x="377" y="130" text-anchor="middle" font-size="12" fill="#7ec8e3">요청 2</text>
    <rect x="445" y="108" width="115" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="502" y="130" text-anchor="middle" font-size="12" fill="#55c555">응답 2</text>
    <rect x="570" y="108" width="115" height="34" rx="5" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1"/>
    <text x="627" y="130" text-anchor="middle" font-size="12" fill="#7ec8e3">요청 3</text>
    <rect x="695" y="108" width="115" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="752" y="130" text-anchor="middle" font-size="12" fill="#55c555">응답 3</text>
    <line x1="60" y1="162" x2="806" y2="162" stroke="#888888" stroke-width="2" marker-end="url(#arrW)"/>
    <!-- Row 2: pipelining -->
    <text x="60" y="222" font-size="13" font-weight="600" fill="#dd9955">② 파이프라이닝 — 요청은 연달아, 응답은 순서 고정</text>
    <rect x="70" y="238" width="110" height="34" rx="5" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1"/>
    <text x="125" y="260" text-anchor="middle" font-size="12" fill="#7ec8e3">요청 1·2·3</text>
    <rect x="190" y="238" width="60" height="34" rx="5" fill="#0a0a0a" stroke="#555555" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="220" y="260" text-anchor="middle" font-size="11" fill="#888">처리</text>
    <rect x="260" y="238" width="240" height="34" rx="5" fill="#2a0f0f" stroke="#aa3a3a" stroke-width="1"/>
    <text x="380" y="260" text-anchor="middle" font-size="12" fill="#e05555">응답 1 (느린 쿼리로 지연)</text>
    <rect x="510" y="238" width="115" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="567" y="260" text-anchor="middle" font-size="12" fill="#55c555">응답 2</text>
    <rect x="635" y="238" width="115" height="34" rx="5" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1"/>
    <text x="692" y="260" text-anchor="middle" font-size="12" fill="#55c555">응답 3</text>
    <line x1="60" y1="292" x2="806" y2="292" stroke="#888888" stroke-width="2" marker-end="url(#arrW)"/>
    <text x="440" y="322" text-anchor="middle" font-size="12" fill="#888">응답 2·3은 이미 준비됐어도 응답 1이 끝나기를 기다린다 — 머리줄 블로킹</text>
    <!-- Summary -->
    <text x="440" y="366" text-anchor="middle" font-size="12" fill="#888">HTTP/1.1 응답에는 요청 식별자가 없어 반드시 보낸 순서대로 돌려줘야 한다</text>
    <text x="440" y="384" text-anchor="middle" font-size="11" fill="#555">중간 프록시 호환성 문제까지 겹쳐 모든 주요 브라우저가 파이프라이닝을 비활성화했다</text>
  </g>
</svg>
