  <line x1="58" y1="162" x2="444" y2="162" stroke="#333" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="100" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
