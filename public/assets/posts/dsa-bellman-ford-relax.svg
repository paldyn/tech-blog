  <text x="330" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">∞</text>
  <text x="380" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">∞</text>
  <text x="424" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">∞</text>

  <line x1="58" y1="196" x2="444" y2="196" stroke="#333" stroke-width="1"/>

  <!-- Row 2 -->
  <text x="100" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">i=2</text>
  <text x="180" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">0</text>
  <text x="230" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">6</text>
  <text x="280" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">3</text>
  <text x="330" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">11</text>
  <text x="380" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">∞</text>
  <text x="424" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">5</text>

  <line x1="58" y1="230" x2="444" y2="230" stroke="#333" stroke-width="1"/>

  <!-- Row 3 -->
  <text x="100" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">i=3</text>
  <text x="180" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">0</text>
  <text x="230" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">6</text>
  <text x="280" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">3</text>
  <text x="330" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">7</text>
  <text x="380" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">3</text>
  <text x="424" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">5</text>

  <line x1="58" y1="264" x2="444" y2="264" stroke="#333" stroke-width="1"/>

  <!-- Row 4 -->
  <text x="100" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">i=4</text>
  <text x="180" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">0</text>
  <text x="230" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">6</text>
  <text x="280" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">3</text>
  <text x="330" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">7</text>
  <text x="380" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">3</text>
  <text x="424" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">2</text>

  <line x1="58" y1="298" x2="444" y2="298" stroke="#333" stroke-width="1"/>

  <!-- Row 5: final -->
  <rect x="58" y="302" width="386" height="28" fill="#1a3a1a" rx="4"/>
  <text x="100" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">i=5(최종)</text>
  <text x="180" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">0</text>
  <text x="230" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">6</text>
  <text x="280" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">3</text>
  <text x="330" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">7</text>
  <text x="380" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">3</text>
  <text x="424" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">2</text>

  <text x="250" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">초록 = 이번 단계 갱신된 값</text>
  <text x="250" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">총 V-1 = 5번 반복 후 수렴</text>

  <!-- Right: code -->
  <rect x="480" y="64" width="360" height="376" fill="#000000" rx="10" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">Python 구현</text>

  <text x="500" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text x="530" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> bellman_ford(V, edges, src):</text>

  <text x="500" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  dist = [</text>
  <text x="580" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">float</text>
  <text x="622" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="630" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'inf'</text>
  <text x="666" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)] * V</text>

  <text x="500" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  dist[src] = </text>
  <text x="616" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>

  <text x="500" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # V-1번 간선 완화</text>

  <text x="500" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  for</text>
  <text x="530" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> _ in range(V - </text>
  <text x="660" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text>
  <text x="668" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">):</text>

  <text x="500" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    for</text>
  <text x="536" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> u, v, w in edges:</text>

  <text x="500" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">      if</text>
  <text x="540" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> dist[u] + w &lt; dist[v]:</text>

  <text x="500" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        dist[v] = dist[u] + w</text>

  <text x="500" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # 음수 사이클 탐지</text>

  <text x="500" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  for</text>
  <text x="530" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> u, v, w in edges:</text>

  <text x="500" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    if</text>
  <text x="530" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> dist[u] + w &lt; dist[v]:</text>

  <text x="500" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">      return</text>
  <text x="566" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555"> None</text>
  <text x="600" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # 음수 사이클!</text>

  <text x="500" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="556" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> dist</text>
</svg>
