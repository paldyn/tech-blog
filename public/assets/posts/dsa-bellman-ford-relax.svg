  <text x="330" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">∞</text>
  <text x="380" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
