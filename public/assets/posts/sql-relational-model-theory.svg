<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계 모델의 구성 요소</text>

  <!-- Domain -->
  <rect x="60" y="68" width="200" height="80" rx="8" fill="#111822" stroke="#ce9178" stroke-width="1.5"/>
  <text x="160" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">도메인 (Domain)</text>
  <text x="160" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">속성이 가질 수 있는</text>
  <text x="160" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">원자 값(Atomic Value)의 집합</text>

  <!-- Attribute -->
  <rect x="290" y="68" width="200" height="80" rx="8" fill="#111822" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">속성 (Attribute)</text>
  <text x="390" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이름 + 도메인 쌍</text>
  <text x="390" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">= 테이블의 열(Column)</text>

  <!-- Tuple -->
  <rect x="520" y="68" width="200" height="80" rx="8" fill="#111822" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">튜플 (Tuple)</text>
  <text x="620" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">속성 값의 순서 없는 집합</text>
  <text x="620" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">= 테이블의 행(Row)</text>

  <!-- Relation -->
  <rect x="290" y="186" width="300" height="60" rx="8" fill="#0d2137" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">릴레이션 (Relation)</text>
  <text x="440" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">헤더 + 바디 = 스키마 + 데이터</text>

  <!-- Arrows up to Relation -->
  <line x1="160" y1="150" x2="330" y2="185" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="390" y1="150" x2="420" y2="184" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="620" y1="150" x2="550" y2="185" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Relation schema -->
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">릴레이션 스키마 예시</text>

  <rect x="60" y="296" width="760" height="32" rx="4" fill="#1a2a3a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">order_id</text>
  <text x="250" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">user_id</text>
  <text x="400" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">product_name</text>
  <text x="600" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">amount</text>
  <text x="730" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ordered_at</text>

  <rect x="60" y="328" width="760" height="26" fill="#0f1a24" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="100" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">1001</text>
  <text x="250" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">42</text>
  <text x="400" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">노트북</text>
  <text x="600" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">1590000</text>
  <text x="730" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">2024-03-01</text>

  <rect x="60" y="354" width="760" height="26" fill="#0a1219" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="100" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">1002</text>
  <text x="250" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">17</text>
  <text x="400" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">마우스</text>
  <text x="600" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">45000</text>
  <text x="730" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">2024-03-02</text>

  <!-- Annotations -->
  <text x="100" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">PK</text>
  <text x="250" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">FK</text>

  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">릴레이션은 튜플의 집합이므로 순서 없음 · 중복 없음 · NULL은 "알 수 없음"을 의미</text>
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">관계 대수(Relational Algebra): σ(선택) π(투영) ⋈(조인) ∪ ∩ −</text>
</svg>
