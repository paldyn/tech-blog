<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계형 모델의 핵심 요소</text>

  <!-- Domain -->
  <rect x="60" y="70" width="180" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">도메인 (Domain)</text>
  <text x="150" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">허용 값의 집합</text>
  <text x="150" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예: 양의 정수, 이메일</text>

  <line x1="240" y1="110" x2="298" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Attribute -->
  <rect x="300" y="70" width="180" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">속성 (Attribute)</text>
  <text x="390" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">도메인에 이름 부여</text>
  <text x="390" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예: age (양의 정수)</text>

  <line x1="480" y1="110" x2="538" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Tuple -->
  <rect x="540" y="70" width="180" height="80" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="630" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">튜플 (Tuple)</text>
  <text x="630" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">속성값 묶음 = 한 행</text>
  <text x="630" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(1, '홍길동', 30)</text>

  <!-- Relation -->
  <rect x="300" y="190" width="280" height="70" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">관계 (Relation = 테이블)</text>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">동일 스키마 튜플의 집합 — 중복 없음, 순서 없음</text>

  <line x1="390" y1="150" x2="400" y2="190" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="630" y1="150" x2="540" y2="190" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Key types -->
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">키 (Key) 계층</text>

  <rect x="60" y="316" width="180" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">슈퍼키</text>
  <text x="150" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">행을 유일 식별하는</text>
  <text x="150" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">속성 집합 전체</text>

  <rect x="270" y="316" width="180" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="360" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">후보키</text>
  <text x="360" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">최소 슈퍼키</text>
  <text x="360" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(불필요 속성 없음)</text>

  <rect x="480" y="316" width="180" height="80" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="570" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">기본키 (PK)</text>
  <text x="570" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">후보키 중 선택된</text>
  <text x="570" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">대표 식별자</text>

  <rect x="690" y="316" width="150" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="765" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">외래키 (FK)</text>
  <text x="765" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">다른 테이블</text>
  <text x="765" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PK 참조</text>

  <!-- Integrity rules -->
  <rect x="60" y="430" width="760" height="44" rx="8" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">무결성 규칙 — 개체 무결성: PK는 NULL 불가 / 참조 무결성: FK는 존재하는 PK만 참조</text>
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Codd의 12가지 규칙 중 핵심</text>
</svg>
