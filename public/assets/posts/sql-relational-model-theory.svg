<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계형 모델 핵심 용어</text>

  <!-- Relation box -->
  <rect x="60" y="70" width="760" height="240" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">릴레이션(Relation) = 테이블</text>

  <!-- Header -->
  <rect x="80" y="108" width="720" height="30" fill="#1e3a5f" rx="4"/>
  <text x="160" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9aa4b8" text-anchor="middle">student_id</text>
  <text x="320" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9aa4b8" text-anchor="middle">name</text>
  <text x="480" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9aa4b8" text-anchor="middle">major</text>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9aa4b8" text-anchor="middle">gpa</text>

  <!-- Data rows -->
  <rect x="80" y="138" width="720" height="28" fill="#0d1520"/>
  <text x="160" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">2024001</text>
  <text x="320" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">김민수</text>
  <text x="480" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">컴퓨터공학</text>
  <text x="640" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">3.8</text>

  <rect x="80" y="166" width="720" height="28" fill="#111827"/>
  <text x="160" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">2024002</text>
  <text x="320" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">이서연</text>
  <text x="480" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">수학</text>
  <text x="640" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">4.1</text>

  <rect x="80" y="194" width="720" height="28" fill="#0d1520"/>
  <text x="160" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">2024003</text>
  <text x="320" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">박준혁</text>
  <text x="480" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">전자공학</text>
  <text x="640" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">3.5</text>

  <!-- Labels: tuple / attribute -->
  <line x1="60" y1="171" x2="30" y2="171" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="30" y1="171" x2="30" y2="171" stroke="#7777cc" stroke-width="1.5"/>
  <text x="22" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="end">튜플</text>
  <text x="22" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="end">(Row)</text>

  <!-- Attribute annotation top -->
  <text x="160" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">속성(Attribute)</text>

  <!-- Degree / Cardinality -->
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">차수(Degree) = 4  |  기수(Cardinality) = 3</text>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">차수 = 열 수 / 기수 = 행 수</text>

  <!-- Relational Algebra ops -->
  <rect x="60" y="340" width="340" height="120" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">관계 대수 (이론)</text>
  <text x="80" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">σ (선택) — WHERE에 대응</text>
  <text x="80" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">π (투영) — SELECT 열에 대응</text>
  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">⋈ (조인) — JOIN에 대응</text>
  <text x="80" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">∪ ∩ − (집합연산) — UNION 등에 대응</text>

  <rect x="480" y="340" width="340" height="120" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="650" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">무결성 제약</text>
  <text x="500" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">개체 무결성: PK는 NULL 불가</text>
  <text x="500" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">참조 무결성: FK 값은 존재해야 함</text>
  <text x="500" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">도메인 무결성: 값은 정의된 도메인</text>
  <text x="500" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자 정의: CHECK, TRIGGER 등</text>
</svg>
