<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계형 모델 핵심 개념</text>

  <!-- Relation (Table) -->
  <rect x="60" y="70" width="760" height="50" rx="8" fill="#0d1a2a" stroke="#3a6a9e" stroke-width="1.5"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">릴레이션 (Relation) = 테이블</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">수학적 정의: 도메인들의 카테시안 곱(Cartesian Product)의 부분집합</text>

  <!-- Three columns -->
  <!-- Domain -->
  <rect x="60" y="140" width="220" height="120" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">도메인 (Domain)</text>
  <text x="170" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">열이 취할 수 있는</text>
  <text x="170" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">값의 집합</text>
  <text x="170" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">예: 양의 정수, 길이 100자리내</text>
  <text x="170" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">이메일 형식 문자열</text>

  <!-- Tuple -->
  <rect x="330" y="140" width="220" height="120" rx="8" fill="#0f1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">튜플 (Tuple)</text>
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">릴레이션의 한 행(Row)</text>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">각 속성 값의 순서쌍</text>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">예: (1, '홍길동',</text>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">'hong@ex.com')</text>

  <!-- Attribute -->
  <rect x="600" y="140" width="220" height="120" rx="8" fill="#0f1520" stroke="#ce9178" stroke-width="1.5"/>
  <text x="710" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">속성 (Attribute)</text>
  <text x="710" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">릴레이션의 열(Column)</text>
  <text x="710" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이름과 도메인으로 정의</text>
  <text x="710" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">예: name VARCHAR(100),</text>
  <text x="710" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">age INTEGER</text>

  <!-- Codd 12 rules summary -->
  <rect x="60" y="280" width="760" height="34" rx="6" fill="#131320" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Codd 12원칙 핵심 3가지</text>

  <rect x="60" y="326" width="230" height="94" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">규칙 1: 정보 원칙</text>
  <text x="175" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 정보는 테이블의</text>
  <text x="175" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">열 값으로만 표현</text>
  <text x="175" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">숨겨진 포인터 없음</text>

  <rect x="325" y="326" width="230" height="94" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">규칙 3: NULL 처리</text>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">NULL은 알 수 없는 값</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 도메인에서 지원</text>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">0이나 빈 문자열과 다름</text>

  <rect x="590" y="326" width="230" height="94" rx="6" fill="#0f1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">규칙 12: 비파괴 원칙</text>
  <text x="705" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL 호환성 규칙</text>
  <text x="705" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">저수준 접근이 관계형</text>
  <text x="705" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">규칙을 우회 불가</text>
</svg>
