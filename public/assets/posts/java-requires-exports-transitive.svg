<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">requires transitive — 의존이 전이된다</text>

  <defs>
    <marker id="reArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="reArrP" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect x="70" y="120" width="180" height="70" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="152" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">C</text>
  <text x="160" y="174" font-size="12" fill="#888" text-anchor="middle">requires A</text>

  <rect x="350" y="120" width="180" height="70" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="152" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">A</text>
  <text x="440" y="174" font-size="12" fill="#888" text-anchor="middle">requires transitive B</text>

  <rect x="630" y="120" width="180" height="70" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="720" y="152" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">B</text>
  <text x="720" y="174" font-size="12" fill="#888" text-anchor="middle">api 패키지 제공</text>

  <line x1="250" y1="155" x2="348" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#reArr)"/>
  <text x="299" y="145" font-size="12" fill="#7ec8e3" text-anchor="middle">requires</text>
  <line x1="530" y1="155" x2="628" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#reArr)"/>
  <text x="579" y="145" font-size="11" fill="#7ec8e3" text-anchor="middle">transitive</text>

  <path d="M 160 192 C 300 300, 580 300, 720 192" fill="none" stroke="#7777cc" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#reArrP)"/>
  <text x="440" y="248" font-size="13" fill="#a0a0e0" text-anchor="middle">C는 B를 명시하지 않아도 자동으로 읽을 수 있다</text>
</svg>
