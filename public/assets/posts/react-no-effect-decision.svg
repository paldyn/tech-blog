<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr-dec1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-dec2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-dec3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useEffect 필요 여부 판단 흐름도</text>

  <!-- Start question -->
  <rect x="310" y="70" width="260" height="52" rx="8" fill="#1a1a0a" stroke="#e0b020" stroke-width="1.5"/>
  <text x="440" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0b020" text-anchor="middle">외부 시스템과 동기화?</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(DOM, API, 타이머, WebSocket 등)</text>

  <!-- Yes branch -->
  <line x1="440" y1="124" x2="440" y2="154" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-dec2)"/>
  <text x="460" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">YES</text>

  <rect x="310" y="158" width="260" height="42" rx="6" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">useEffect 사용 ✓</text>

  <!-- No branch -->
  <line x1="310" y1="96" x2="204" y2="96" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-dec3)"/>
  <text x="250" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">NO</text>

  <!-- Second question -->
  <rect x="60" y="70" width="240" height="52" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="180" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">사용자 이벤트에 반응?</text>
  <text x="180" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(클릭, 제출, 입력 등)</text>

  <line x1="180" y1="124" x2="180" y2="154" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-dec1)"/>
  <text x="200" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">YES</text>

  <rect x="80" y="158" width="200" height="42" rx="6" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">이벤트 핸들러에</text>

  <!-- Third question from YES branch (no external, no event) -->
  <line x1="60" y1="96" x2="0" y2="96" stroke="#777" stroke-width="1.5"/>
  <text x="22" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777">NO</text>

  <!-- Bottom alternatives -->
  <rect x="60" y="246" width="760" height="100" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">대신 사용할 수 있는 것들</text>
  <text x="100" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">렌더 중 계산</text>
  <text x="100" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">const value = transform(prop)</text>
  <text x="310" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">useMemo</text>
  <text x="310" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">비용이 클 때만</text>
  <text x="500" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">key prop으로 리셋</text>
  <text x="500" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">props 변경 시 컴포넌트 재생성</text>
  <text x="680" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">이벤트 핸들러</text>
  <text x="680" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">사용자 동작에 응답</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">useEffect는 외부 시스템 동기화 전용 — 그 외는 대부분 더 나은 대안이 있다</text>
</svg>
