<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-v" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">StatefulSet + Headless Service 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">안정적인 네트워크 ID — pod-N.svc.ns.svc.cluster.local</text>

  <!-- Headless Service box (center top) -->
  <rect x="320" y="92" width="240" height="58" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Headless Service</text>
  <text x="440" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">mysql-headless  |  clusterIP: None</text>

  <!-- StatefulSet label -->
  <text x="440" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">StatefulSet: mysql  (replicas: 3)</text>

  <!-- Pod-0 -->
  <rect x="80" y="194" width="200" height="110" rx="8" fill="#111a28" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">mysql-0</text>
  <text x="180" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">10.0.0.10</text>
  <rect x="96" y="242" width="168" height="20" rx="3" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">mysql-0.mysql-headless</text>
  <rect x="96" y="266" width="168" height="20" rx="3" fill="#1a2010" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">Primary (쓰기)</text>

  <!-- Pod-1 -->
  <rect x="340" y="194" width="200" height="110" rx="8" fill="#111a28" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">mysql-1</text>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">10.0.0.11</text>
  <rect x="356" y="242" width="168" height="20" rx="3" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">mysql-1.mysql-headless</text>
  <rect x="356" y="266" width="168" height="20" rx="3" fill="#1a1a20" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">Replica (읽기)</text>

  <!-- Pod-2 -->
  <rect x="600" y="194" width="200" height="110" rx="8" fill="#111a28" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">mysql-2</text>
  <text x="700" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">10.0.0.12</text>
  <rect x="616" y="242" width="168" height="20" rx="3" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">mysql-2.mysql-headless</text>
  <rect x="616" y="266" width="168" height="20" rx="3" fill="#1a1a20" stroke="#7777cc" stroke-width="1"/>
  <text x="700" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">Replica (읽기)</text>

  <!-- Arrows from Headless Service to Pods -->
  <line x1="380" y1="150" x2="220" y2="194" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="440" y1="150" x2="440" y2="194" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="500" y1="150" x2="660" y2="194" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- PVC arrows -->
  <line x1="180" y1="304" x2="180" y2="340" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-v)"/>
  <line x1="440" y1="304" x2="440" y2="340" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-v)"/>
  <line x1="700" y1="304" x2="700" y2="340" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-v)"/>

  <!-- PVC boxes -->
  <rect x="100" y="341" width="160" height="38" rx="6" fill="#13103a" stroke="#7777cc" stroke-width="1"/>
  <text x="180" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7777cc">PVC: data-mysql-0</text>
  <text x="180" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">10Gi (고정 바인딩)</text>

  <rect x="360" y="341" width="160" height="38" rx="6" fill="#13103a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7777cc">PVC: data-mysql-1</text>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">10Gi (고정 바인딩)</text>

  <rect x="620" y="341" width="160" height="38" rx="6" fill="#13103a" stroke="#7777cc" stroke-width="1"/>
  <text x="700" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7777cc">PVC: data-mysql-2</text>
  <text x="700" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">10Gi (고정 바인딩)</text>

  <!-- Key concept: stable DNS -->
  <rect x="60" y="402" width="380" height="76" rx="7" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">안정적 DNS 이름 (재시작해도 유지)</text>
  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">mysql-0.mysql-headless.default.svc.cluster.local</text>
  <text x="80" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">mysql-1.mysql-headless.default.svc.cluster.local</text>
  <text x="80" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">mysql-2.mysql-headless.default.svc.cluster.local</text>

  <!-- Code block -->
  <rect x="460" y="402" width="380" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Headless Service 정의</text>
  <text x="476" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">spec</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="476" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">clusterIP</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">None</tspan><tspan fill="#ffffff">   # 핵심</tspan></text>
  <text x="476" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">selector</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="476" y="494" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">app</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">mysql</tspan></text>
</svg>
