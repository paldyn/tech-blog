<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="40" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Dataset 디버그 코드 패턴</text>

  <rect x="60" y="62" width="760" height="254" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">// 콜백에서 Dataset 상태 즉시 확인</text>
  <text x="76" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text><text x="136" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> fn_searchCb(svcId, errCode, errMsg) {</text>
  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // ① errCode 먼저 확인</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">  trace(</text><text x="124" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178" xml:space="preserve">"errCode=" + errCode + " msg=" + errMsg</text><text x="480" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // ② Dataset rowCount 확인</text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">  trace(</text><text x="124" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178" xml:space="preserve">"rowCount=" + dsResult.rowcount</text><text x="386" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // ③ 컬럼 수 확인 (0이면 binding 자체 실패)</text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">  trace(</text><text x="124" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178" xml:space="preserve">"colCount=" + dsResult.colcount</text><text x="378" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // ④ getXml로 실제 내용 출력</text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">  trace(dsResult.getXml());</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  if</text><text x="104" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> (errCode == </text><text x="196" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8" xml:space="preserve">0</text><text x="208" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">) { ... }</text>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
