<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">고급 타입 활용 예시</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">배열·UUID·inet·JSON을 한 테이블에서 활용</text>

  <!-- Left: Table definition code -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">테이블 정의</text>
  <rect x="60" y="118" width="370" height="266" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  user_profile (</text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    id        </text>
  <text x="178" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">uuid</text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      </text>
  <text x="112" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">DEFAULT</text>
  <text x="166" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> gen_random_uuid(),</text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    tags      </text>
  <text x="178" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">text[]</text>
  <text x="218" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> DEFAULT</text>
  <text x="278" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> '{}'</text>
  <text x="308" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    client_ip </text>
  <text x="178" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">inet</text>
  <text x="208" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    meta      </text>
  <text x="178" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">jsonb</text>
  <text x="218" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> DEFAULT</text>
  <text x="278" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> '{}'</text>
  <text x="308" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    score     </text>
  <text x="178" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">numeric</text>
  <text x="234" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(5,2),</text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    PRIMARY KEY</text>
  <text x="178" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (id)</text>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  );</text>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- uuid: 충돌 없는 분산 ID</text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- text[]: 태그 배열 내장</text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- inet: IP 범위 연산 지원</text>

  <!-- Right: Type characteristics -->
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">타입별 특징</text>
  <rect x="460" y="118" width="360" height="260" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>

  <!-- uuid row -->
  <rect x="476" y="134" width="60" height="26" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="506" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">uuid</text>
  <text x="556" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">128비트, 분산 환경 PK 적합</text>

  <!-- text[] row -->
  <rect x="476" y="172" width="60" height="26" rx="4" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="506" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">text[]</text>
  <text x="556" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1차원~다차원, GIN 인덱스 가능</text>

  <!-- inet row -->
  <rect x="476" y="210" width="60" height="26" rx="4" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="506" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">inet</text>
  <text x="556" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">IPv4/v6 + CIDR 포함 연산자</text>

  <!-- jsonb row -->
  <rect x="476" y="248" width="60" height="26" rx="4" fill="#1f1a0d" stroke="#e8c84a" stroke-width="1"/>
  <text x="506" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c84a" text-anchor="middle">jsonb</text>
  <text x="556" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">바이너리 파싱, GIN 인덱스</text>

  <!-- numeric row -->
  <rect x="476" y="286" width="60" height="26" rx="4" fill="#1f0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="506" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">numeric</text>
  <text x="556" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">임의 정밀도, 금융 계산 안전</text>

  <!-- range row -->
  <rect x="476" y="324" width="60" height="26" rx="4" fill="#1a0d1f" stroke="#c880e0" stroke-width="1"/>
  <text x="506" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c880e0" text-anchor="middle">range</text>
  <text x="556" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">겹침·포함 등 범위 전용 연산자</text>

  <!-- Bottom note -->
  <rect x="60" y="405" width="760" height="50" rx="8" fill="#0d1520" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">올바른 타입 선택 → 인덱스 효율 + 제약 내재화 + 쿼리 단순화</text>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">varchar(255) 대신 text, int 대신 uuid, 문자 IP 대신 inet 사용 권장</text>
</svg>
