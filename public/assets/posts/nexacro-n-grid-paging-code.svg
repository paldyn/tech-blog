<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클라이언트 페이징 구현 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">pageRowCount · currentPage · 페이지 이동 함수</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="274" fill="#000000" rx="6" stroke="#3a4a6e"/>

  <!-- Comment 1 -->
  <text x="80" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// XFD: pageRowCount 설정</text>
  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3">Grid</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"grd_emp"</tspan><tspan fill="#ffffff"> pagerowcount=</tspan><tspan fill="#b5cea8">"20"</tspan><tspan fill="#ffffff">/&gt;</tspan></text>

  <!-- Comment 2 -->
  <text x="80" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 페이지 이동 함수</text>
  <text x="80" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">function</text>
  <text x="136" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> fn_movePage(pageIdx) {</text>

  <!-- currentPage -->
  <text x="80" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  </text>
  <text x="94" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">var</text>
  <text x="115" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> totalPage = </text>
  <text x="209" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">this</text>
  <text x="237" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">.grd_emp.pagecount;</text>

  <text x="80" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (pageIdx &lt; </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> || pageIdx >= totalPage)</tspan></text>

  <text x="80" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    </text>
  <text x="108" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">return</text>
  <text x="150" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>

  <!-- Set currentPage -->
  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">  this</text>
  <text x="122" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">.grd_emp.currentpage = pageIdx;</text>

  <!-- Sync rowposition -->
  <text x="80" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">  this</text>
  <text x="122" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">.ds_emp.rowposition =</text>
  <text x="80" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    pageIdx * </tspan><tspan fill="#7777cc">this</tspan><tspan fill="#ffffff">.grd_emp.pagerowcount;</tspan></text>

  <!-- Update paging UI label -->
  <text x="80" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">  this</tspan><tspan fill="#ffffff">.lbl_page.set_text(</tspan><tspan fill="#ffffff">(pageIdx+</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)+</tspan><tspan fill="#ce9178">"/"</tspan><tspan fill="#ffffff">+totalPage);</tspan></text>

  <text x="80" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Bottom note -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">pagerowcount: 페이지당 행 수 | currentpage: 현재 페이지(0-based) | pagecount: 전체 페이지 수</text>
</svg>
