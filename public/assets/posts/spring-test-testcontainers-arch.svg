<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Testcontainers 동작 구조</text>

  <!-- 테스트 코드 박스 -->
  <rect x="60" y="72" width="200" height="60" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">@DataJpaTest</text>
  <text x="160" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">+ @Testcontainers</text>

  <!-- 화살표 -->
  <line x1="260" y1="102" x2="318" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="289" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시작 요청</text>

  <!-- Testcontainers 코어 -->
  <rect x="318" y="72" width="200" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="418" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Testcontainers</text>
  <text x="418" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Docker API 호출</text>

  <!-- 화살표 -->
  <line x1="518" y1="102" x2="576" y2="102" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="547" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컨테이너 생성</text>

  <!-- Docker -->
  <rect x="576" y="72" width="200" height="60" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="676" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Docker 데몬</text>
  <text x="676" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">postgres:16 이미지 실행</text>

  <!-- 컨테이너들 -->
  <text x="60" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">지원 컨테이너 모듈</text>

  <!-- PostgreSQL -->
  <rect x="60" y="184" width="160" height="70" rx="8" fill="#0a1525" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">PostgreSQL</text>
  <text x="140" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PostgreSQLContainer</text>
  <text x="140" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 DB 환경</text>

  <!-- MySQL -->
  <rect x="240" y="184" width="160" height="70" rx="8" fill="#0a1525" stroke="#7ec8e3" stroke-width="1"/>
  <text x="320" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">MySQL</text>
  <text x="320" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MySQLContainer</text>
  <text x="320" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 DB 환경</text>

  <!-- Redis -->
  <rect x="420" y="184" width="160" height="70" rx="8" fill="#0a1525" stroke="#7ec8e3" stroke-width="1"/>
  <text x="500" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Redis</text>
  <text x="500" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GenericContainer</text>
  <text x="500" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">"redis:7"</text>

  <!-- Kafka -->
  <rect x="600" y="184" width="220" height="70" rx="8" fill="#0a1525" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Kafka</text>
  <text x="710" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">KafkaContainer</text>
  <text x="710" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">confluentinc/cp-kafka</text>

  <!-- 생명주기 섹션 -->
  <text x="60" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">컨테이너 생명주기 전략</text>

  <!-- 전략 1: 클래스당 -->
  <rect x="60" y="302" width="240" height="86" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">클래스당 1개</text>
  <text x="180" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Container 필드</text>
  <text x="180" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">테스트 클래스 종료 시 파괴</text>
  <text x="180" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">일반적인 기본값</text>

  <!-- 전략 2: JVM당 -->
  <rect x="320" y="302" width="240" height="86" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">JVM당 1개 (재사용)</text>
  <text x="440" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">static @Container</text>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">withReuse(true)</text>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">권장 — 빠른 테스트 스위트</text>

  <!-- 전략 3: 공유 컨테이너 -->
  <rect x="580" y="302" width="240" height="86" rx="8" fill="#1a1a0a" stroke="#e8c444" stroke-width="1.5"/>
  <text x="700" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c444" text-anchor="middle">공유 기반 클래스</text>
  <text x="700" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AbstractIntegrationTest</text>
  <text x="700" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">여러 테스트 클래스 공유</text>
  <text x="700" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">컨텍스트 캐시와 궁합 최고</text>

  <!-- H2 vs Testcontainers 비교 -->
  <text x="60" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">H2 vs Testcontainers 선택 기준</text>

  <rect x="60" y="438" width="760" height="72" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">H2 (인메모리): 빠름, 단순, 방언 차이로 실제 DB 동작과 다를 수 있음 — 빠른 피드백 루프에 적합</text>
  <text x="80" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">Testcontainers: 느린 시작, 실제 DB와 동일한 방언·확장 함수·JSON 연산자 — CI 통합 테스트에 적합</text>
  <text x="80" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">전략: @DataJpaTest에서는 H2로 빠르게, @SpringBootTest 통합에서는 Testcontainers로 정확하게</text>
</svg>
