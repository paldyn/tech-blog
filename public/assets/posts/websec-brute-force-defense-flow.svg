<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">무차별 대입 공격 흐름과 방어 지점</text>

  <!-- Attacker -->
  <rect x="50" y="80" width="120" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="110" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">공격자</text>
  <text x="110" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자동화 스크립트</text>

  <!-- Arrow -->
  <line x1="170" y1="110" x2="228" y2="110" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="199" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">반복 요청</text>

  <!-- Defense 1: Rate Limiting -->
  <rect x="230" y="68" width="130" height="84" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="2"/>
  <text x="295" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">속도 제한</text>
  <text x="295" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Rate Limiting</text>
  <text x="295" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">IP당 N회/분</text>

  <!-- Arrow -->
  <line x1="360" y1="110" x2="418" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Defense 2: Account Lockout -->
  <rect x="420" y="68" width="130" height="84" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="2"/>
  <text x="485" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">계정 잠금</text>
  <text x="485" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Account Lockout</text>
  <text x="485" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">N회 실패 후 잠금</text>

  <!-- Arrow -->
  <line x1="550" y1="110" x2="608" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Defense 3: CAPTCHA -->
  <rect x="610" y="68" width="130" height="84" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="2"/>
  <text x="675" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">CAPTCHA</text>
  <text x="675" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">봇 차단</text>
  <text x="675" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">인간 검증</text>

  <!-- Arrow to login -->
  <line x1="740" y1="110" x2="800" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Login endpoint -->
  <rect x="802" y="80" width="58" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="831" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">로그인</text>
  <text x="831" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">엔드포인트</text>

  <!-- Blocked flow going down -->
  <line x1="295" y1="152" x2="295" y2="200" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <rect x="210" y="202" width="170" height="54" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="295" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">429 Too Many Requests</text>
  <text x="295" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Retry-After 헤더 포함</text>

  <!-- Exponential backoff diagram -->
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">지수 백오프(Exponential Backoff) 잠금 정책</text>

  <rect x="60" y="320" width="760" height="140" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Attempt bars -->
  <text x="130" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1~3회 실패</text>
  <rect x="60" y="358" width="140" height="24" rx="4" fill="#55c555"/>
  <text x="130" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#0a0a0a" text-anchor="middle">계속 허용</text>

  <text x="310" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">4~5회 실패</text>
  <rect x="220" y="358" width="180" height="24" rx="4" fill="#e8c55a"/>
  <text x="310" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#0a0a0a" text-anchor="middle">30초 지연</text>

  <text x="540" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">6~9회 실패</text>
  <rect x="420" y="358" width="240" height="24" rx="4" fill="#e08855"/>
  <text x="540" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#0a0a0a" text-anchor="middle">5분 잠금</text>

  <text x="760" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">10회+ 실패</text>
  <rect x="680" y="358" width="140" height="24" rx="4" fill="#e05555"/>
  <text x="750" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">계정 잠금</text>

  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">잠금 + 이메일 알림 + 관리자 리뷰 또는 비밀번호 재설정 유도</text>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">IP 기반 + 계정 기반 양쪽 모두 적용 (분산 공격 대응)</text>

  <text x="440" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">완전 잠금은 DoS를 유발 — 점진적 제한이 더 안전</text>
</svg>
