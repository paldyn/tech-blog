<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">개별 prune 명령어</text>

  <rect x="60" y="68" width="760" height="208" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> container prune               <tspan fill="#9aa4b8"># 중지된 컨테이너만</ttml></text>
  <text x="76" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</ttml> image prune                   <tspan fill="#9aa4b8"># 댕글링 이미지만</ttml></text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</ttml> image prune -a               <tspan fill="#9aa4b8"># 미사용 이미지 전체</ttml></text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</ttml> volume prune                 <tspan fill="#9aa4b8"># 미사용 볼륨 (데이터 삭제!)</ttml></text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</ttml> network prune               <tspan fill="#9aa4b8"># 미사용 네트워크만</ttml></text>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</ttml> builder prune               <tspan fill="#9aa4b8"># BuildKit 빌드 캐시만</ttml></text>
  <text x="76" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</ttml> builder prune --keep-storage=<tspan fill="#b5cea8">5g</tspan>  <tspan fill="#9aa4b8"># 5GB 이상만</ttml></text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</ttml> image prune --filter <tspan fill="#ce9178">"until=24h"</ttml></text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 24시간 이전에 생성된 이미지만 삭제</ttml></text>
</svg>
