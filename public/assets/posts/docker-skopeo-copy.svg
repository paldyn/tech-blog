<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-grn" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Skopeo — 이미지 전송 경로 지원 매트릭스</text>

  <!-- Central Skopeo box -->
  <rect x="330" y="186" width="220" height="60" rx="8" fill="#0a1628" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="440" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">skopeo copy</text>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이미지 레이어를 직접 스트리밍</text>

  <!-- Source: Docker Hub -->
  <rect x="60" y="80" width="200" height="50" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">docker://</text>
  <text x="160" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Docker Hub / 레지스트리</text>
  <line x1="260" y1="105" x2="330" y2="205" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Source: OCI -->
  <rect x="60" y="160" width="200" height="50" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">oci://</text>
  <text x="160" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로컬 OCI 레이아웃 디렉터리</text>
  <line x1="260" y1="185" x2="330" y2="215" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Source: docker-daemon -->
  <rect x="60" y="240" width="200" height="50" rx="6" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="160" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">docker-daemon://</text>
  <text x="160" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로컬 Docker 이미지 스토어</text>
  <line x1="260" y1="265" x2="330" y2="225" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Source: containers-storage -->
  <rect x="60" y="320" width="200" height="50" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">containers-storage://</text>
  <text x="160" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Podman / Buildah 스토어</text>
  <line x1="260" y1="345" x2="330" y2="240" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dest: Registry -->
  <rect x="620" y="80" width="200" height="50" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">docker://</text>
  <text x="720" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프라이빗 레지스트리</text>
  <line x1="550" y1="205" x2="620" y2="105" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dest: oci-archive -->
  <rect x="620" y="160" width="200" height="50" rx="6" fill="#0d1117" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="720" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">oci-archive://</text>
  <text x="720" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">tar 아카이브 파일</text>
  <line x1="550" y1="215" x2="620" y2="185" stroke="#b5cea8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dest: docker-archive -->
  <rect x="620" y="240" width="200" height="50" rx="6" fill="#0d1117" stroke="#f5c542" stroke-width="1.5"/>
  <text x="720" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#f5c542" text-anchor="middle">docker-archive://</text>
  <text x="720" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">docker save 호환 tar</text>
  <line x1="550" y1="225" x2="620" y2="265" stroke="#f5c542" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Dest: containers-storage -->
  <rect x="620" y="320" width="200" height="50" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">containers-storage://</text>
  <text x="720" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Podman 로컬 스토어</text>
  <line x1="550" y1="235" x2="620" y2="345" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- "No daemon" tag -->
  <rect x="350" y="256" width="180" height="28" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✅ 데몬 불필요</text>

  <!-- Bottom label -->
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Skopeo는 레이어를 로컬 스토어에 저장하지 않고 소스→목적지 직접 스트리밍 — 디스크 절약</text>

  <!-- Code snippet -->
  <rect x="60" y="408" width="760" height="36" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="431" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">skopeo copy docker://nginx:latest docker://myregistry.io/nginx:latest</text>
</svg>
