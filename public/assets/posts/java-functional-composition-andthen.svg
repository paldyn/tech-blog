<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Function 합성 — andThen vs compose</text>

  <!-- andThen section -->
  <text x="440" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">f.andThen(g)  =  g(f(x))  —  f 먼저, g 나중</text>

  <rect x="60" y="96" width="100" height="46" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="110" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">x</text>
  <text x="110" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력</text>

  <line x1="160" y1="119" x2="218" y2="119" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="220" y="96" width="130" height="46" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="285" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c542" text-anchor="middle">f(x)</text>
  <text x="285" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">첫번째 함수</text>

  <line x1="350" y1="119" x2="408" y2="119" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="410" y="96" width="130" height="46" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="475" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">g(f(x))</text>
  <text x="475" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두번째 함수</text>

  <line x1="540" y1="119" x2="598" y2="119" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="600" y="96" width="120" height="46" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">결과</text>
  <text x="660" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">최종 출력</text>

  <!-- Labels above flow -->
  <text x="285" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c542" text-anchor="middle">f</text>
  <text x="475" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">g</text>

  <!-- compose section -->
  <line x1="60" y1="162" x2="820" y2="162" stroke="#222" stroke-width="1"/>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">f.compose(g)  =  f(g(x))  —  g 먼저, f 나중</text>

  <rect x="60" y="198" width="100" height="46" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="110" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">x</text>
  <text x="110" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력</text>

  <line x1="160" y1="221" x2="218" y2="221" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="220" y="198" width="130" height="46" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="285" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">g(x)</text>
  <text x="285" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">먼저 실행</text>

  <line x1="350" y1="221" x2="408" y2="221" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="410" y="198" width="130" height="46" rx="8" fill="#111" stroke="#e8c542" stroke-width="1.5"/>
  <text x="475" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c542" text-anchor="middle">f(g(x))</text>
  <text x="475" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">나중에 실행</text>

  <line x1="540" y1="221" x2="598" y2="221" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="600" y="198" width="120" height="46" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">결과</text>

  <!-- Code example -->
  <line x1="60" y1="262" x2="820" y2="262" stroke="#222" stroke-width="1"/>

  <rect x="60" y="272" width="760" height="156" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">Function</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">&gt; times2 = n -&gt; n * </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">;  </tspan><tspan fill="#9aa4b8">// n*2</tspan></text>
  <text x="76" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">Function</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">&gt; plus3  = n -&gt; n + </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">;  </tspan><tspan fill="#9aa4b8">// n+3</tspan></text>
  <text x="76" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// andThen: times2 먼저 → plus3 나중</text>
  <text x="76" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">times2.</tspan><tspan font-weight="600" fill="#7ec8e3">andThen</tspan><tspan fill="#ffffff">(plus3).</tspan><tspan font-weight="600" fill="#7ec8e3">apply</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// 5*2=10, 10+3=13</tspan></text>
  <text x="76" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// compose: plus3 먼저 → times2 나중</text>
  <text x="76" y="410" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">times2.</tspan><tspan font-weight="600" fill="#7ec8e3">compose</tspan><tspan fill="#ffffff">(plus3).</tspan><tspan font-weight="600" fill="#7ec8e3">apply</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// 5+3=8, 8*2=16</tspan></text>

  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">andThen은 파이프라인 순서(왼→오), compose는 수학적 합성 순서(오→왼) — andThen이 직관적</text>
</svg>
