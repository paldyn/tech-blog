<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">ZFS vs Btrfs — 핵심 기능 비교</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">Copy-on-Write 기반 차세대 파일시스템</text>

  <!-- Column Headers -->
  <rect x="50" y="82" width="240" height="36" rx="6" fill="#141622"/>
  <text x="170" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">ZFS</text>

  <rect x="320" y="82" width="240" height="36" rx="6" fill="#141622"/>
  <text x="440" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">Btrfs</text>

  <rect x="620" y="82" width="210" height="36" rx="6" fill="#141622"/>
  <text x="725" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">항목</text>

  <!-- Row 1: 라이선스 -->
  <rect x="50" y="128" width="780" height="36" fill="#0e1018"/>
  <text x="170" y="151" text-anchor="middle" font-size="13" fill="#e8e8e8">CDDL (커널 통합 불가)</text>
  <text x="440" y="151" text-anchor="middle" font-size="13" fill="#e8e8e8">GPL v2 (커널 통합)</text>
  <text x="725" y="151" text-anchor="middle" font-size="13" font-weight="600" fill="#888">라이선스</text>

  <!-- Row 2: 스냅샷 -->
  <rect x="50" y="164" width="780" height="36" fill="#0a0a0a"/>
  <text x="170" y="187" text-anchor="middle" font-size="13" fill="#55c555">매우 안정적</text>
  <text x="440" y="187" text-anchor="middle" font-size="13" fill="#7ec8e3">안정적 (send/recv)</text>
  <text x="725" y="187" text-anchor="middle" font-size="13" font-weight="600" fill="#888">스냅샷</text>

  <!-- Row 3: RAID -->
  <rect x="50" y="200" width="780" height="36" fill="#0e1018"/>
  <text x="170" y="223" text-anchor="middle" font-size="13" fill="#55c555">내장 RAID-Z (1/2/3)</text>
  <text x="440" y="223" text-anchor="middle" font-size="13" fill="#7ec8e3">RAID 0/1/10 (실험적)</text>
  <text x="725" y="223" text-anchor="middle" font-size="13" font-weight="600" fill="#888">RAID 내장</text>

  <!-- Row 4: 압축 -->
  <rect x="50" y="236" width="780" height="36" fill="#0a0a0a"/>
  <text x="170" y="259" text-anchor="middle" font-size="13" fill="#55c555">lz4/zstd/gzip</text>
  <text x="440" y="259" text-anchor="middle" font-size="13" fill="#55c555">lzo/zlib/zstd</text>
  <text x="725" y="259" text-anchor="middle" font-size="13" font-weight="600" fill="#888">투명 압축</text>

  <!-- Row 5: 체크섬 -->
  <rect x="50" y="272" width="780" height="36" fill="#0e1018"/>
  <text x="170" y="295" text-anchor="middle" font-size="13" fill="#55c555">데이터+메타데이터</text>
  <text x="440" y="295" text-anchor="middle" font-size="13" fill="#55c555">데이터+메타데이터</text>
  <text x="725" y="295" text-anchor="middle" font-size="13" font-weight="600" fill="#888">체크섬</text>

  <!-- Row 6: 메모리 -->
  <rect x="50" y="308" width="780" height="36" fill="#0a0a0a"/>
  <text x="170" y="331" text-anchor="middle" font-size="13" fill="#e05555">많음 (ARC 캐시)</text>
  <text x="440" y="331" text-anchor="middle" font-size="13" fill="#55c555">적음</text>
  <text x="725" y="331" text-anchor="middle" font-size="13" font-weight="600" fill="#888">메모리 사용</text>

  <!-- Row 7: 성숙도 -->
  <rect x="50" y="344" width="780" height="36" fill="#0e1018"/>
  <text x="170" y="367" text-anchor="middle" font-size="13" fill="#55c555">매우 성숙 (2006~)</text>
  <text x="440" y="367" text-anchor="middle" font-size="13" fill="#7ec8e3">성숙 (2009~)</text>
  <text x="725" y="367" text-anchor="middle" font-size="13" font-weight="600" fill="#888">성숙도</text>

  <!-- Border -->
  <rect x="50" y="82" width="780" height="298" rx="6" fill="none" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Divider lines -->
  <line x1="290" y1="82" x2="290" y2="380" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="560" y1="82" x2="560" y2="380" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Note -->
  <text x="440" y="406" text-anchor="middle" font-size="12" fill="#555">Btrfs RAID 5/6은 프로덕션에서 권장하지 않음 — 데이터 손실 버그 이력 있음</text>
</svg>
