<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">.at() — 양수/음수 인덱스</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Array · String · TypedArray — ES2022</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#1e2433" stroke-width="1"/>

  <!-- Array visualization -->
  <text x="60" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">배열: ['a', 'b', 'c', 'd', 'e']</text>

  <!-- Cells -->
  <rect x="60"  y="132" width="100" height="44" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <rect x="170" y="132" width="100" height="44" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <rect x="280" y="132" width="100" height="44" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <rect x="390" y="132" width="100" height="44" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <rect x="500" y="132" width="100" height="44" fill="#1a1a2e" rx="4" stroke="#7ec8e3" stroke-width="2"/>

  <text x="110" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8e8e8">'a'</text>
  <text x="220" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8e8e8">'b'</text>
  <text x="330" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8e8e8">'c'</text>
  <text x="440" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#e8e8e8">'d'</text>
  <text x="550" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#7ec8e3">'e'</text>

  <!-- Positive indices -->
  <text x="110" y="195" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[0]</text>
  <text x="220" y="195" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[1]</text>
  <text x="330" y="195" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[2]</text>
  <text x="440" y="195" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[3]</text>
  <text x="550" y="195" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[4]</text>
  <text x="60" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">양수 인덱스</text>

  <!-- Negative indices -->
  <text x="110" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">[-5]</text>
  <text x="220" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">[-4]</text>
  <text x="330" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">[-3]</text>
  <text x="440" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">[-2]</text>
  <text x="550" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">[-1]</text>
  <text x="60" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">음수 인덱스 (.at() 전용)</text>

  <!-- Highlight arrow for -1 -->
  <line x1="550" y1="240" x2="550" y2="258" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="620" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">arr.at(-1) → 'e'</text>
  <text x="620" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">마지막 요소 간편 접근</text>

  <!-- Code comparison -->
  <text x="60" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">마지막 요소 접근 비교</text>
  <rect x="60" y="320" width="760" height="64" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#6a8aa0">// 기존: arr[arr.length - 1]</tspan>
  </text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">arr[arr.length - </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">]  </tspan><tspan fill="#6a8aa0">// 장황</tspan>
  </text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">arr.at(-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">)         </tspan><tspan fill="#6a8aa0">// 간결</tspan>
  </text>

  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
