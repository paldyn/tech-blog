<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TCP / UDP 헤더 구조</text>

  <!-- TCP Header section -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">TCP 헤더 (최소 20 bytes)</text>

  <!-- TCP header fields row 1 -->
  <rect x="60" y="96" width="200" height="44" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">16 bits</text>
  <text x="160" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Source Port</text>

  <rect x="262" y="96" width="200" height="44" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="362" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">16 bits</text>
  <text x="362" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Destination Port</text>

  <!-- TCP header fields row 2 -->
  <rect x="60" y="152" width="402" height="44" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="261" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">32 bits</text>
  <text x="261" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Sequence Number</text>

  <!-- TCP header fields row 3 -->
  <rect x="60" y="208" width="402" height="44" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="261" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">32 bits</text>
  <text x="261" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Acknowledgment Number</text>

  <!-- TCP header fields row 4 -->
  <rect x="60" y="264" width="80" height="44" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">4 b</text>
  <text x="100" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3">Offset</text>

  <rect x="142" y="264" width="80" height="44" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="182" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">6 b</text>
  <text x="182" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3">Flags</text>

  <rect x="224" y="264" width="120" height="44" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="284" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">16 bits</text>
  <text x="284" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">Window Size</text>

  <rect x="346" y="264" width="116" height="44" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="404" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">16 bits</text>
  <text x="404" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3">Checksum</text>

  <!-- Flags annotation -->
  <text x="468" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Flags:</text>
  <text x="468" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">SYN, ACK, FIN,</text>
  <text x="468" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">RST, PSH, URG</text>

  <!-- Window annotation -->
  <text x="468" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Window Size:</text>
  <text x="468" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">흐름 제어 핵심 필드</text>
  <text x="468" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최대 65,535 bytes</text>

  <!-- Divider -->
  <line x1="60" y1="374" x2="820" y2="374" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- UDP Header section -->
  <text x="60" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">UDP 헤더 (고정 8 bytes)</text>

  <!-- UDP fields -->
  <rect x="60" y="412" width="185" height="44" rx="4" fill="#112a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="152" y="429" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">16 bits</text>
  <text x="152" y="447" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Source Port</text>

  <rect x="247" y="412" width="185" height="44" rx="4" fill="#112a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="339" y="429" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">16 bits</text>
  <text x="339" y="447" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Destination Port</text>

  <rect x="60" y="468" width="185" height="44" rx="4" fill="#112a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="152" y="485" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">16 bits</text>
  <text x="152" y="503" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Length</text>

  <rect x="247" y="468" width="185" height="44" rx="4" fill="#112a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="339" y="485" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">16 bits</text>
  <text x="339" y="503" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Checksum</text>

  <!-- UDP annotation -->
  <text x="468" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">헤더 필드 4개뿐</text>
  <text x="468" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Seq/Ack/Window 없음</text>
  <text x="468" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 오버헤드 극소화</text>
  <text x="468" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 지연 민감 앱에 적합</text>
</svg>
