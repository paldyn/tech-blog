<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">데이터 중복 제거 기법 비교</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Deduplication Techniques</text>

  <!-- Column headers -->
  <rect x="60" y="92" width="220" height="42" rx="7" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">정확 매칭 (Exact)</text>

  <rect x="330" y="92" width="220" height="42" rx="7" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">퍼지 매칭 (Fuzzy)</text>

  <rect x="600" y="92" width="220" height="42" rx="7" fill="#2e1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">시맨틱 (Semantic)</text>

  <!-- Exact Matching -->
  <rect x="60" y="148" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="170" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">Hash 비교</text>
  <text x="170" y="188" text-anchor="middle" font-size="12" fill="#888">MD5/SHA256 해시값 일치 여부</text>

  <rect x="60" y="214" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="170" y="236" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">Primary Key 중복</text>
  <text x="170" y="254" text-anchor="middle" font-size="12" fill="#888">id/이메일 등 식별자로 중복 탐지</text>

  <rect x="60" y="280" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="170" y="302" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">복합키 중복</text>
  <text x="170" y="320" text-anchor="middle" font-size="12" fill="#888">(이름+생년월일+주소) 조합</text>

  <!-- Fuzzy Matching -->
  <rect x="330" y="148" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">Edit Distance</text>
  <text x="440" y="188" text-anchor="middle" font-size="12" fill="#888">Levenshtein · Jaro-Winkler</text>

  <rect x="330" y="214" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="236" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">Phonetic Encoding</text>
  <text x="440" y="254" text-anchor="middle" font-size="12" fill="#888">Soundex · Metaphone (영문)</text>

  <rect x="330" y="280" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="302" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">Record Linkage</text>
  <text x="440" y="320" text-anchor="middle" font-size="12" fill="#888">recordlinkage · dedupe 라이브러리</text>

  <!-- Semantic -->
  <rect x="600" y="148" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="710" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">임베딩 유사도</text>
  <text x="710" y="188" text-anchor="middle" font-size="12" fill="#888">벡터 코사인 유사도 ≥ 임계값</text>

  <rect x="600" y="214" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="710" y="236" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">MinHash / LSH</text>
  <text x="710" y="254" text-anchor="middle" font-size="12" fill="#888">대규모 문서 집합 빠른 근사 매칭</text>

  <rect x="600" y="280" width="220" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="710" y="302" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">SemDeDup</text>
  <text x="710" y="320" text-anchor="middle" font-size="12" fill="#888">LLM 학습 데이터 시맨틱 디덥</text>

  <!-- Bottom comparison -->
  <text x="60" y="366" font-size="13" font-weight="600" fill="#e8e8e8">적합한 상황</text>
  <text x="170" y="390" text-anchor="middle" font-size="12" fill="#7777cc">정형 데이터, DB 중복</text>
  <text x="170" y="408" text-anchor="middle" font-size="12" fill="#7777cc">100% 정밀도 필요</text>

  <text x="440" y="390" text-anchor="middle" font-size="12" fill="#55c555">오타·약어·변형 포함</text>
  <text x="440" y="408" text-anchor="middle" font-size="12" fill="#55c555">고객 데이터 매칭</text>

  <text x="710" y="390" text-anchor="middle" font-size="12" fill="#e05555">비정형·텍스트 데이터</text>
  <text x="710" y="408" text-anchor="middle" font-size="12" fill="#e05555">LLM 학습 데이터 정제</text>

  <text x="60" y="444" font-size="12" fill="#555">* 실무에서는 정확 매칭 후 미해결 케이스에 퍼지·시맨틱 매칭을 순차 적용하는 계층 전략이 효과적</text>
</svg>
