<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker pause / unpause — 명령 패턴 &amp; 활용</text>

  <!-- Left column: Basic commands -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 사용법</text>
  <rect x="60" y="92" width="360" height="118" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 컨테이너 일시 정지</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker pause</tspan><tspan fill="#e8e8e8"> &lt;CONTAINER&gt;</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 일시 정지 해제</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker unpause</tspan><tspan fill="#e8e8e8"> &lt;CONTAINER&gt;</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 상태 확인</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker ps</tspan><tspan fill="#e8e8e8"> --filter </tspan><tspan fill="#ce9178">'status=paused'</tspan></text>

  <!-- Left column: Backup pattern -->
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">일관된 스냅샷 백업 패턴</text>
  <rect x="60" y="248" width="360" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># DB 쓰기 중단 후 스냅샷</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker pause</tspan><tspan fill="#e8e8e8"> db</tspan></text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">btrfs subvolume snapshot /var/lib/docker ...</tspan></text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker unpause</tspan><tspan fill="#e8e8e8"> db</tspan></text>

  <!-- Right column: Use cases -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">주요 사용 사례</text>
  <rect x="448" y="92" width="372" height="160" rx="6" fill="#111320" stroke="#7777cc" stroke-width="1"/>
  <text x="464" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">pause 적합 상황</text>
  <text x="464" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 일관된 파일시스템 스냅샷 취득</text>
  <text x="464" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 메모리 이미지(checkpoint) 생성 전처리</text>
  <text x="464" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 리소스 임시 확보 (CPU 집약 작업 양보)</text>
  <text x="464" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 디버깅: 특정 시점 상태 동결 후 분석</text>
  <text x="464" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">pause 주의 상황</text>
  <text x="464" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 헬스체크 타임아웃 발생 가능</text>

  <!-- Right column: pause vs stop -->
  <text x="460" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">pause vs stop 비교</text>
  <rect x="448" y="292" width="372" height="60" rx="6" fill="#111827" stroke="#333"/>
  <text x="464" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">pause: 메모리·상태 보존, 즉시 재개 가능</text>
  <text x="464" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">stop:  프로세스 종료 (SIGTERM→SIGKILL)</text>

  <text x="440" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">내부적으로 SIGSTOP/SIGCONT가 아닌 cgroup freezer 사용 — 모든 스레드에 원자적 적용</text>
</svg>
