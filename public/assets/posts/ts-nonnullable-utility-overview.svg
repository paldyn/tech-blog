<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NonNullable&lt;T&gt; — null/undefined 제거</text>

  <!-- Input types -->
  <rect x="60" y="72" width="220" height="240" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">입력 타입 T</text>

  <rect x="76" y="108" width="188" height="28" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">string</text>

  <rect x="76" y="142" width="188" height="28" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">number</text>

  <rect x="76" y="176" width="188" height="28" fill="#3a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="170" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">null</text>

  <rect x="76" y="210" width="188" height="28" fill="#3a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="170" y="229" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">undefined</text>

  <rect x="76" y="244" width="188" height="28" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">boolean</text>

  <!-- Arrow -->
  <line x1="282" y1="190" x2="340" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="284" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">NonNullable</text>

  <!-- Output type -->
  <rect x="342" y="72" width="220" height="180" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="452" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">결과 타입</text>

  <rect x="358" y="108" width="188" height="28" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="452" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">string</text>

  <rect x="358" y="142" width="188" height="28" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="452" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">number</text>

  <!-- null/undefined removed indicator -->
  <line x1="358" y1="176" x2="546" y2="204" stroke="#e05555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="358" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">null 제거됨</text>
  <text x="358" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">undefined 제거됨</text>

  <rect x="358" y="224" width="188" height="28" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="452" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">boolean</text>

  <!-- Implementation -->
  <rect x="600" y="72" width="240" height="130" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="720" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현</text>
  <text x="616" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">type NonNullable&lt;T&gt;</text>
  <text x="616" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  = T &amp; {};</text>
  <text x="616" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">T &amp; {} 는 null/undefined와의</text>
  <text x="616" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인터섹션이 never가 됨</text>
  <text x="616" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">이전: Exclude&lt;T, null|undefined&gt;</text>

  <!-- Strict null checks note -->
  <rect x="600" y="218" width="240" height="96" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="720" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">strictNullChecks 필수</text>
  <text x="616" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">OFF면 null/undefined가</text>
  <text x="616" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 타입의 서브타입</text>
  <text x="616" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ NonNullable이 의미 없음</text>

  <!-- When to use -->
  <rect x="60" y="330" width="510" height="50" fill="#0d1117" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="315" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">사용 시점: 타입 레벨 null 단언이 필요할 때</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">런타임 null 체크 이후 · 제네릭 제약 조건 · 필터 함수 반환 타입</text>
</svg>
