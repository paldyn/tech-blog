<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">JS 런타임 환경 비교</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">브라우저 · Node.js · Deno · Bun — 엔진 위에 쌓인 환경의 차이</text>

  <!--
    4 boxes × 178px + 3 gaps × 16px = 712+48=760px
    Left margin=60, right margin=60 → 60+760+60=880 ✓
    Box x: 60, 254, 448, 642   Box right edges: 238,432,626,820
    Box centers: 149,343,537,731   Text left: 76,270,464,658
    Box height=290, y=108→398
    Footer y=458, viewBox=500, margin=42px ✓
  -->

  <!-- ── Box 1: 브라우저 ── -->
  <rect x="60" y="108" width="178" height="290" fill="#0f1624" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="149" y="134" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">브라우저</text>
  <text x="149" y="152" font-size="11" fill="#5a8a9a" text-anchor="middle">Chrome · Safari · Firefox</text>

  <text x="76" y="178" font-size="12" font-weight="600" fill="#e8e8e8">엔진</text>
  <text x="76" y="196" font-size="11" fill="#888">여러 엔진 지원</text>
  <text x="76" y="214" font-size="11" fill="#666">(V8 / SpiderMonkey / JSC)</text>

  <text x="76" y="238" font-size="12" font-weight="600" fill="#e8e8e8">제공 API</text>
  <text x="76" y="256" font-size="11" fill="#888">DOM · window · document</text>
  <text x="76" y="274" font-size="11" fill="#888">fetch · localStorage</text>
  <text x="76" y="292" font-size="11" fill="#888">Web API 전체</text>

  <text x="76" y="316" font-size="12" font-weight="600" fill="#e8e8e8">파일 접근</text>
  <text x="76" y="334" font-size="11" fill="#e05555">✗ 샌드박스 격리</text>

  <text x="76" y="358" font-size="11" fill="#666">모듈: ESM</text>
  <text x="76" y="376" font-size="11" fill="#666">패키지: 번들러 통해</text>

  <!-- ── Box 2: Node.js ── -->
  <rect x="254" y="108" width="178" height="290" fill="#0f1a14" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="343" y="134" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Node.js</text>
  <text x="343" y="152" font-size="11" fill="#4a8a5a" text-anchor="middle">v20 LTS · v22 Current</text>

  <text x="270" y="178" font-size="12" font-weight="600" fill="#e8e8e8">엔진</text>
  <text x="270" y="196" font-size="11" fill="#888">V8 (Google)</text>

  <text x="270" y="220" font-size="12" font-weight="600" fill="#e8e8e8">제공 API</text>
  <text x="270" y="238" font-size="11" fill="#888">fs · http · path · os</text>
  <text x="270" y="256" font-size="11" fill="#888">EventEmitter · Stream</text>
  <text x="270" y="274" font-size="11" fill="#888">worker_threads</text>

  <text x="270" y="298" font-size="12" font-weight="600" fill="#e8e8e8">파일 접근</text>
  <text x="270" y="316" font-size="11" fill="#55c555">✓ 완전 접근</text>

  <text x="270" y="340" font-size="11" fill="#666">모듈: CJS / ESM</text>
  <text x="270" y="358" font-size="11" fill="#666">패키지: npm / pnpm</text>
  <text x="270" y="376" font-size="11" fill="#666">npm 200만+ 패키지</text>

  <!-- ── Box 3: Deno ── -->
  <rect x="448" y="108" width="178" height="290" fill="#0f1624" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="537" y="134" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Deno</text>
  <text x="537" y="152" font-size="11" fill="#5555aa" text-anchor="middle">v2 · Ryan Dahl 재도전</text>

  <text x="464" y="178" font-size="12" font-weight="600" fill="#e8e8e8">엔진</text>
  <text x="464" y="196" font-size="11" fill="#888">V8 (Google)</text>

  <text x="464" y="220" font-size="12" font-weight="600" fill="#e8e8e8">제공 API</text>
  <text x="464" y="238" font-size="11" fill="#888">Deno.* 네임스페이스</text>
  <text x="464" y="256" font-size="11" fill="#888">Web API 호환 내장</text>
  <text x="464" y="274" font-size="11" fill="#888">TypeScript 기본 지원</text>

  <text x="464" y="298" font-size="12" font-weight="600" fill="#e8e8e8">파일 접근</text>
  <text x="464" y="316" font-size="11" fill="#e8a53f">✓ 권한 허가 시</text>
  <text x="464" y="334" font-size="11" fill="#666">--allow-read 등</text>

  <text x="464" y="358" font-size="11" fill="#666">모듈: ESM + URL</text>
  <text x="464" y="376" font-size="11" fill="#666">패키지: npm 호환</text>

  <!-- ── Box 4: Bun ── -->
  <rect x="642" y="108" width="178" height="290" fill="#140e08" rx="8" stroke="#e8a53f" stroke-width="1"/>
  <text x="731" y="134" font-size="14" font-weight="700" fill="#e8a53f" text-anchor="middle">Bun</text>
  <text x="731" y="152" font-size="11" fill="#8a7030" text-anchor="middle">v1 · Jarred Sumner</text>

  <text x="658" y="178" font-size="12" font-weight="600" fill="#e8e8e8">엔진</text>
  <text x="658" y="196" font-size="11" fill="#888">JSC (JavaScriptCore)</text>

  <text x="658" y="220" font-size="12" font-weight="600" fill="#e8e8e8">제공 API</text>
  <text x="658" y="238" font-size="11" fill="#888">Node.js API 호환</text>
  <text x="658" y="256" font-size="11" fill="#888">번들러·테스트 내장</text>
  <text x="658" y="274" font-size="11" fill="#888">TypeScript 기본 지원</text>

  <text x="658" y="298" font-size="12" font-weight="600" fill="#e8e8e8">파일 접근</text>
  <text x="658" y="316" font-size="11" fill="#55c555">✓ 완전 접근</text>

  <text x="658" y="340" font-size="11" fill="#666">모듈: CJS / ESM</text>
  <text x="658" y="358" font-size="11" fill="#666">패키지: npm 호환</text>
  <text x="658" y="376" font-size="11" fill="#e8a53f">⚡ 가장 빠른 시작</text>

  <!-- Footer -->
  <text x="60" y="458" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part I — 런타임 환경</text>
</svg>
