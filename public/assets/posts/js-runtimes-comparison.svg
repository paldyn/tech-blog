<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript 런타임 환경 비교</text>

  <!-- Browser column -->
  <rect x="60" y="68" width="180" height="330" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
