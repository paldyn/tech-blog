  <text x="150" y="114" text-anchor="middle" font-size="11" fill="#888">Chrome · Firefox · Safari</text>
  <line x1="76" y1="122" x2="224" y2="122" stroke="#222" stroke-width="1"/>
  <text x="80" y="142" font-size="12" fill="#e8e8e8">엔진</text>
  <text x="80" y="158" font-size="11" fill="#888">V8 / SpiderMonkey / JSC</text>
  <text x="80" y="180" font-size="12" fill="#e8e8e8">제공 API</text>
  <text x="80" y="196" font-size="11" fill="#888">DOM · fetch · localStorage</text>
  <text x="80" y="212" font-size="11" fill="#888">WebWorker · IndexedDB</text>
  <text x="80" y="234" font-size="12" fill="#e8e8e8">파일 시스템</text>
  <text x="80" y="250" font-size="11" fill="#e05555">없음 (샌드박스)</text>
  <text x="80" y="272" font-size="12" fill="#e8e8e8">네트워크</text>
  <text x="80" y="288" font-size="11" fill="#55c555">fetch · XHR · WebSocket</text>
  <text x="80" y="310" font-size="12" fill="#e8e8e8">주요 용도</text>
  <text x="80" y="326" font-size="11" fill="#888">웹 앱 UI · DOM 조작</text>
  <text x="80" y="342" font-size="11" fill="#888">사용자 인터랙션</text>
  <text x="80" y="364" font-size="12" fill="#e8e8e8">보안 모델</text>
  <text x="80" y="380" font-size="11" fill="#7ec8e3">샌드박스 · CORS · CSP</text>

  <!-- Node.js column -->
  <rect x="255" y="68" width="180" height="330" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="345" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">Node.js</text>
  <text x="345" y="114" text-anchor="middle" font-size="11" fill="#888">2009 · Ryan Dahl</text>
  <line x1="271" y1="122" x2="419" y2="122" stroke="#222" stroke-width="1"/>
  <text x="275" y="142" font-size="12" fill="#e8e8e8">엔진</text>
  <text x="275" y="158" font-size="11" fill="#888">V8 + libuv</text>
  <text x="275" y="180" font-size="12" fill="#e8e8e8">제공 API</text>
  <text x="275" y="196" font-size="11" fill="#888">fs · http · crypto · buffer</text>
  <text x="275" y="212" font-size="11" fill="#888">stream · EventEmitter</text>
