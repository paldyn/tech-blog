<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">서버사이드 런타임 비교: Node vs Deno vs Bun</text>

  <!-- Header row -->
  <rect x="60" y="60" width="760" height="36" rx="4" fill="#111"/>
  <text x="200" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Node.js</text>
  <text x="440" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">Deno</text>
  <text x="680" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">Bun</text>

  <!-- Vertical dividers -->
  <line x1="320" y1="60" x2="320" y2="420" stroke="#1e2433" stroke-width="1"/>
  <line x1="560" y1="60" x2="560" y2="420" stroke="#1e2433" stroke-width="1"/>

  <!-- Row: Released -->
  <rect x="60" y="98" width="760" height="36" rx="0" fill="#0d1117"/>
  <text x="80" y="120" font-size="12" fill="#666">출시</text>
  <text x="200" y="120" text-anchor="middle" font-size="12" fill="#888">2009</text>
  <text x="440" y="120" text-anchor="middle" font-size="12" fill="#888">2018 (1.0: 2020)</text>
  <text x="680" y="120" text-anchor="middle" font-size="12" fill="#888">2022</text>

  <!-- Row: Engine -->
  <rect x="60" y="134" width="760" height="36" rx="0" fill="#111"/>
  <text x="80" y="156" font-size="12" fill="#666">JS 엔진</text>
  <text x="200" y="156" text-anchor="middle" font-size="12" fill="#7ec8e3">V8</text>
  <text x="440" y="156" text-anchor="middle" font-size="12" fill="#7777cc">V8</text>
  <text x="680" y="156" text-anchor="middle" font-size="12" fill="#ce9178">JavaScriptCore</text>

  <!-- Row: TypeScript -->
  <rect x="60" y="170" width="760" height="36" rx="0" fill="#0d1117"/>
  <text x="80" y="192" font-size="12" fill="#666">TypeScript</text>
  <text x="200" y="192" text-anchor="middle" font-size="12" fill="#e05555">별도 tsc / ts-node 필요</text>
  <text x="440" y="192" text-anchor="middle" font-size="12" fill="#55c555">네이티브 지원</text>
  <text x="680" y="192" text-anchor="middle" font-size="12" fill="#55c555">네이티브 지원</text>

  <!-- Row: Security -->
  <rect x="60" y="206" width="760" height="36" rx="0" fill="#111"/>
  <text x="80" y="228" font-size="12" fill="#666">보안 모델</text>
  <text x="200" y="228" text-anchor="middle" font-size="12" fill="#888">기본 전체 접근</text>
  <text x="440" y="228" text-anchor="middle" font-size="12" fill="#55c555">명시적 권한 필요</text>
  <text x="680" y="228" text-anchor="middle" font-size="12" fill="#888">Node.js 유사</text>

  <!-- Row: Module -->
  <rect x="60" y="242" width="760" height="36" rx="0" fill="#0d1117"/>
  <text x="80" y="264" font-size="12" fill="#666">모듈</text>
  <text x="200" y="264" text-anchor="middle" font-size="12" fill="#888">CJS + ESM</text>
  <text x="440" y="264" text-anchor="middle" font-size="12" fill="#888">ESM (URL import)</text>
  <text x="680" y="264" text-anchor="middle" font-size="12" fill="#888">CJS + ESM + npm</text>

  <!-- Row: npm compat -->
  <rect x="60" y="278" width="760" height="36" rx="0" fill="#111"/>
  <text x="80" y="300" font-size="12" fill="#666">npm 호환</text>
  <text x="200" y="300" text-anchor="middle" font-size="12" fill="#55c555">완전 호환</text>
  <text x="440" y="300" text-anchor="middle" font-size="12" fill="#888">npm: 부분 (node_modules)</text>
  <text x="680" y="300" text-anchor="middle" font-size="12" fill="#55c555">완전 호환</text>

  <!-- Row: Speed -->
  <rect x="60" y="314" width="760" height="36" rx="0" fill="#0d1117"/>
  <text x="80" y="336" font-size="12" fill="#666">속도</text>
  <text x="200" y="336" text-anchor="middle" font-size="12" fill="#888">빠름 (성숙한 V8)</text>
  <text x="440" y="336" text-anchor="middle" font-size="12" fill="#888">V8 기반, 유사</text>
  <text x="680" y="336" text-anchor="middle" font-size="12" fill="#ce9178">매우 빠름 (JSC+저수준)</text>

  <!-- Row: Built-in tools -->
  <rect x="60" y="350" width="760" height="36" rx="0" fill="#111"/>
  <text x="80" y="372" font-size="12" fill="#666">내장 도구</text>
  <text x="200" y="372" text-anchor="middle" font-size="12" fill="#888">최소 (외부 의존)</text>
  <text x="440" y="372" text-anchor="middle" font-size="12" fill="#888">lint·test·fmt 내장</text>
  <text x="680" y="372" text-anchor="middle" font-size="12" fill="#888">번들러·test·SQLite 내장</text>

  <!-- Row: Use case -->
  <rect x="60" y="386" width="760" height="36" rx="0" fill="#0d1117"/>
  <text x="80" y="408" font-size="12" fill="#666">주 용도</text>
  <text x="200" y="408" text-anchor="middle" font-size="12" fill="#7ec8e3">API 서버, 스크립팅</text>
  <text x="440" y="408" text-anchor="middle" font-size="12" fill="#7777cc">안전한 스크립팅, 서버</text>
  <text x="680" y="408" text-anchor="middle" font-size="12" fill="#ce9178">고성능 서버, 빠른 빌드</text>

  <!-- Outer border -->
  <rect x="60" y="60" width="760" height="362" rx="4" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Footer -->
  <text x="440" y="460" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
