  <text x="275" y="250" font-size="11" fill="#55c555">완전한 fs 모듈</text>
  <text x="275" y="272" font-size="12" fill="#e8e8e8">네트워크</text>
  <text x="275" y="288" font-size="11" fill="#55c555">http · https · net · dgram</text>
  <text x="275" y="310" font-size="12" fill="#e8e8e8">주요 용도</text>
  <text x="275" y="326" font-size="11" fill="#888">API 서버 · CLI 도구</text>
  <text x="275" y="342" font-size="11" fill="#888">빌드 도구 · 스크립팅</text>
  <text x="275" y="364" font-size="12" fill="#e8e8e8">모듈 시스템</text>
  <text x="275" y="380" font-size="11" fill="#7ec8e3">CJS (require) + ESM</text>

  <!-- Deno column -->
  <rect x="450" y="68" width="180" height="330" rx="10" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">Deno</text>
  <text x="540" y="114" text-anchor="middle" font-size="11" fill="#888">2018 · Ryan Dahl (재도전)</text>
  <line x1="466" y1="122" x2="614" y2="122" stroke="#222" stroke-width="1"/>
  <text x="470" y="142" font-size="12" fill="#e8e8e8">엔진</text>
  <text x="470" y="158" font-size="11" fill="#888">V8 + Tokio (Rust)</text>
  <text x="470" y="180" font-size="12" fill="#e8e8e8">제공 API</text>
  <text x="470" y="196" font-size="11" fill="#888">Web API 호환 + Deno.*</text>
  <text x="470" y="212" font-size="11" fill="#888">TypeScript 네이티브</text>
  <text x="470" y="234" font-size="12" fill="#e8e8e8">파일 시스템</text>
  <text x="470" y="250" font-size="11" fill="#7777cc">권한 부여 시 허용</text>
  <text x="470" y="272" font-size="12" fill="#e8e8e8">네트워크</text>
  <text x="470" y="288" font-size="11" fill="#7777cc">권한 부여 시 허용</text>
  <text x="470" y="310" font-size="12" fill="#e8e8e8">주요 용도</text>
  <text x="470" y="326" font-size="11" fill="#888">서버 · 엣지 함수</text>
  <text x="470" y="342" font-size="11" fill="#888">TypeScript 스크립팅</text>
  <text x="470" y="364" font-size="12" fill="#e8e8e8">보안 모델</text>
  <text x="470" y="380" font-size="11" fill="#7777cc">명시적 권한 플래그</text>

  <!-- Bun column -->
  <rect x="645" y="68" width="175" height="330" rx="10" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="732" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#ce9178">Bun</text>
  <text x="732" y="114" text-anchor="middle" font-size="11" fill="#888">2022 · Jarred Sumner</text>
  <line x1="661" y1="122" x2="804" y2="122" stroke="#222" stroke-width="1"/>
  <text x="665" y="142" font-size="12" fill="#e8e8e8">엔진</text>
  <text x="665" y="158" font-size="11" fill="#888">JavaScriptCore (JSC)</text>
  <text x="665" y="180" font-size="12" fill="#e8e8e8">제공 기능</text>
  <text x="665" y="196" font-size="11" fill="#888">런타임 + 번들러</text>
  <text x="665" y="212" font-size="11" fill="#888">테스트 러너 + 패키지 관리</text>
  <text x="665" y="234" font-size="12" fill="#e8e8e8">파일 시스템</text>
  <text x="665" y="250" font-size="11" fill="#55c555">Bun.file() API</text>
  <text x="665" y="272" font-size="12" fill="#e8e8e8">목표</text>
  <text x="665" y="288" font-size="11" fill="#ce9178">Node.js 대체 + 속도</text>
  <text x="665" y="310" font-size="12" fill="#e8e8e8">주요 용도</text>
  <text x="665" y="326" font-size="11" fill="#888">빠른 서버 · 빌드</text>
  <text x="665" y="342" font-size="11" fill="#888">Node.js 호환 실행</text>
  <text x="665" y="364" font-size="12" fill="#e8e8e8">특징</text>
  <text x="665" y="380" font-size="11" fill="#ce9178">Node 3~5배 빠른 시작</text>

  <!-- Footer -->
  <text x="440" y="428" text-anchor="middle" font-size="12" fill="#888">모두 같은 JavaScript를 실행하지만, 제공하는 내장 API와 보안 모델이 다릅니다</text>
  <text x="440" y="448" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #4</text>
</svg>
