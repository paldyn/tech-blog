<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring Boot 정적 리소스 처리 흐름</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">기본 경로 · ResourceHttpRequestHandler · 캐싱 헤더</text>

  <!-- Browser -->
  <rect x="60" y="108" width="120" height="56" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="120" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Browser</text>
  <text x="120" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">GET /css/app.css</text>

  <!-- Arrow 1 -->
  <polygon points="194,136 208,131 208,141" fill="#7ec8e3"/>
  <line x1="180" y1="136" x2="208" y2="136" stroke="#7ec8e3" stroke-width="2"/>

  <!-- DispatcherServlet -->
  <rect x="212" y="108" width="140" height="56" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="282" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Dispatcher</text>
  <text x="282" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Servlet</text>
  <text x="282" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">HandlerMapping 탐색</text>

  <!-- Arrow 2 -->
  <polygon points="366,136 380,131 380,141" fill="#7ec8e3"/>
  <line x1="352" y1="136" x2="380" y2="136" stroke="#7ec8e3" stroke-width="2"/>

  <!-- ResourceHttpRequestHandler -->
  <rect x="384" y="108" width="186" height="56" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="477" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">ResourceHttp</text>
  <text x="477" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">RequestHandler</text>
  <text x="477" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">리소스 위치 탐색 + 캐싱</text>

  <!-- Arrow 3 -->
  <polygon points="584,136 598,131 598,141" fill="#7ec8e3"/>
  <line x1="570" y1="136" x2="598" y2="136" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Classpath / File -->
  <rect x="602" y="108" width="218" height="56" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="711" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">클래스패스 / 파일시스템</text>
  <text x="711" y="148" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">static/css/app.css</text>
  <text x="711" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">리소스 로드 후 응답</text>

  <!-- Default locations box -->
  <rect x="60" y="196" width="760" height="124" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Spring Boot 기본 정적 리소스 경로 (우선순위 순)</text>

  <rect x="76" y="228" width="172" height="78" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="162" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">1순위</text>
  <text x="162" y="264" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/META-INF/resources/</text>
  <text x="162" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">JAR 내부 메타 리소스</text>
  <text x="162" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(WebJars 등)</text>

  <rect x="266" y="228" width="148" height="78" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">2순위</text>
  <text x="340" y="264" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/resources/</text>
  <text x="340" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">클래스패스 루트</text>

  <rect x="432" y="228" width="148" height="78" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">3순위</text>
  <text x="506" y="264" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/static/</text>
  <text x="506" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">가장 일반적으로 사용</text>

  <rect x="598" y="228" width="206" height="78" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="701" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">4순위</text>
  <text x="701" y="264" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">/public/</text>
  <text x="701" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">공개 리소스 디렉터리</text>

  <!-- Cache Control box -->
  <rect x="60" y="348" width="760" height="116" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># application.yml — 캐시 설정</text>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">spring:</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  web.resources.cache.period: 31536000</text>
  <text x="76" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  web.resources.chain.strategy.content:</text>
  <text x="76" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    enabled: true   </text>
  <text x="400" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일 내용 해시 기반 URL 버저닝</text>
</svg>
