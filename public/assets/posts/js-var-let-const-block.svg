<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">블록 스코프 이해하기</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">var는 블록을 무시한다 — let/const는 블록 안에 갇힌다</text>

  <!-- Left: var (함수 스코프) -->
  <rect x="60" y="104" width="360" height="290" fill="#1a0808" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="130" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">var — 함수 스코프</text>

  <rect x="78" y="144" width="324" height="216" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- y base=164, spacing=18: 164,182,200,218,236,254,272,290,308,326,344 -->
  <text x="94" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">function test() {</text>
  <text x="94" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  if (true) {</text>
  <text x="94" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">    var x = 10;</text>
  <text x="94" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="94" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // 블록 밖에서도 접근 가능!</text>
  <text x="94" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  console.log(x); // 10</text>
  <text x="94" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="94" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// var는 함수 경계만 인식</text>
  <text x="94" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">for (var i = 0; i &lt; 3; i++) {}</text>
  <text x="94" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">console.log(i); // 3 ← 누수!</text>
  <text x="94" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>

  <text x="78" y="376" font-size="12" fill="#e05555">✗ 블록 밖으로 변수가 "누수"됨</text>

  <!-- Center arrow -->
  <polygon points="422,255 422,241 452,241 452,235 478,248 452,261 452,255"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Right: let (블록 스코프) -->
  <rect x="480" y="104" width="340" height="290" fill="#0a1520" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="130" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">let — 블록 스코프</text>

  <rect x="498" y="144" width="304" height="216" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="514" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">function test() {</text>
  <text x="514" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  if (true) {</text>
  <text x="514" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    let x = 10;</text>
  <text x="514" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="514" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // 블록 밖에서 접근 불가</text>
  <text x="514" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  console.log(x);</text>
  <text x="514" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  // ReferenceError ✓</text>
  <text x="514" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="514" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for (let i = 0; i &lt; 3; i++) {}</text>
  <text x="514" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">// console.log(i) → 에러 ✓</text>
  <text x="514" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>

  <text x="498" y="376" font-size="12" fill="#55c555">✓ 블록 스코프 내에 안전하게 격리</text>

  <!-- Footer -->
  <text x="60" y="460" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part II — var·let·const 차이</text>
</svg>
