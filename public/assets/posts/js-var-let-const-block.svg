<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">함수 스코프(var) vs 블록 스코프(let·const)</text>

  <!-- Left: var - function scope -->
  <rect x="60" y="66" width="360" height="380" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="240" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#ce9178">var — 함수 스코프</text>

  <rect x="78" y="100" width="324" height="204" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="90" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function outer() {</text>
  <text x="90" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  var x = 1;</text>
  <text x="90" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  if (true) {</text>
  <text x="90" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    var x = 2; // 같은 x!</text>
  <text x="90" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  }</text>
  <text x="90" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">  console.log(x); // 2</text>
  <text x="90" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">  // if 블록이 var를 막지 못함</text>
  <text x="90" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="90" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// for 루프에서의 고전적 버그</text>
  <text x="90" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">for (var i = 0; i &lt; 3; i++) {</text>
  <text x="90" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  setTimeout(() =&gt;</text>
  <text x="90" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">    console.log(i), 0); // 3,3,3</text>

  <text x="240" y="370" text-anchor="middle" font-size="12" fill="#e05555">for 루프 i가 모두 3을 출력!</text>
  <text x="240" y="390" text-anchor="middle" font-size="11" fill="#666">var은 블록을 무시하고 함수 전체로 스코프</text>
  <text x="240" y="410" text-anchor="middle" font-size="11" fill="#666">클로저가 루프 종료 후의 i 값을 참조</text>

  <!-- Center arrow -->
  <polygon points="426,216 426,240 454,228" fill="#7777cc"/>

  <!-- Right: let - block scope -->
  <rect x="460" y="66" width="360" height="380" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">let — 블록 스코프</text>

  <rect x="478" y="100" width="324" height="204" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="490" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function outer() {</text>
  <text x="490" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  let x = 1;</text>
  <text x="490" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  if (true) {</text>
  <text x="490" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    let x = 2; // 다른 x!</text>
  <text x="490" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  }</text>
  <text x="490" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">  console.log(x); // 1</text>
  <text x="490" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">  // if 블록 안의 x는 별도</text>
  <text x="490" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="490" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// for 루프에서 let</text>
  <text x="490" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">for (let i = 0; i &lt; 3; i++) {</text>
  <text x="490" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  setTimeout(() =&gt;</text>
  <text x="490" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">    console.log(i), 0); // 0,1,2</text>

  <text x="640" y="370" text-anchor="middle" font-size="12" fill="#55c555">각 반복마다 독립적인 i 바인딩!</text>
  <text x="640" y="390" text-anchor="middle" font-size="11" fill="#666">let은 블록마다 새 바인딩을 생성합니다</text>
  <text x="640" y="410" text-anchor="middle" font-size="11" fill="#666">클로저가 각 반복의 i를 독립적으로 캡처</text>

  <!-- Footer -->
  <text x="440" y="466" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
