<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">두 가지 배포 소스</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">정적 파일이냐, 빌드가 필요한 사이트냐로 갈린다</text>

  <!-- branch source -->
  <rect x="60" y="100" width="360" height="160" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">Deploy from a branch</text>
  <text x="240" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">브랜치의 파일을 그대로 게시</text>
  <text x="240" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">main / docs 폴더 등 지정</text>
  <text x="240" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">순수 HTML/CSS/JS에 적합</text>
  <text x="240" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">빌드 단계 없음</text>

  <!-- actions source -->
  <rect x="460" y="100" width="360" height="160" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="640" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#9988dd">GitHub Actions</text>
  <text x="640" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">워크플로우가 빌드 후 게시</text>
  <text x="640" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">artifact를 Pages에 배포</text>
  <text x="640" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">Astro·React 등에 적합</text>
  <text x="640" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">유연한 빌드 제어</text>
</svg>
