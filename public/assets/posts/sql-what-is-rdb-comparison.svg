<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RDB vs 파일 시스템</text>

  <!-- Left: File system -->
  <rect x="60" y="70" width="340" height="340" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">파일 시스템</text>

  <rect x="84" y="116" width="292" height="60" fill="#1a1010" rx="6" stroke="#4a2222" stroke-width="1"/>
  <text x="100" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">customers.csv</text>
  <text x="100" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">1,김철수,서울,010-1234-5678</text>

  <rect x="84" y="190" width="292" height="60" fill="#1a1010" rx="6" stroke="#4a2222" stroke-width="1"/>
  <text x="100" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">orders.csv</text>
  <text x="100" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">101,1,50000,2024-01-15</text>

  <!-- Problems -->
  <text x="84" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">문제점</text>
  <text x="84" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✕ 중복 데이터 (고객 주소 여러 파일)</text>
  <text x="84" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✕ 참조 무결성 없음 (없는 고객ID)</text>
  <text x="84" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✕ 동시 접근 충돌</text>
  <text x="84" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✕ 표준화된 질의 언어 없음</text>
  <text x="84" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✕ 보안 제어 어려움</text>

  <!-- Right: RDB -->
  <rect x="480" y="70" width="340" height="340" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="650" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">관계형 데이터베이스</text>

  <rect x="504" y="116" width="292" height="60" fill="#0d1a0d" rx="6" stroke="#1a4a1a" stroke-width="1"/>
  <text x="520" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">customers 테이블</text>
  <text x="520" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PK, 제약조건, 인덱스 관리</text>

  <rect x="504" y="190" width="292" height="60" fill="#0d1a0d" rx="6" stroke="#1a4a1a" stroke-width="1"/>
  <text x="520" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">orders 테이블</text>
  <text x="520" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">FK(customer_id) 참조 무결성</text>

  <!-- Benefits -->
  <text x="504" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">장점</text>
  <text x="504" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ 정규화로 중복 최소화</text>
  <text x="504" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ FK로 참조 무결성 강제</text>
  <text x="504" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ ACID 트랜잭션 보장</text>
  <text x="504" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ SQL 표준 질의 언어</text>
  <text x="504" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✓ 권한 기반 접근 제어</text>

  <!-- VS divider -->
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#7777cc" text-anchor="middle">VS</text>
</svg>
