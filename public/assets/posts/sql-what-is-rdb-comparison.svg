<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RDB vs 파일 시스템 핵심 차이</text>
  <rect x="60" y="70" width="340" height="44" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">파일 시스템</text>
  <rect x="480" y="70" width="340" height="44" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">관계형 데이터베이스</text>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#888" text-anchor="middle">VS</text>
  <rect x="60" y="130" width="340" height="52" rx="6" fill="#130e0e" stroke="#3a1a1a" stroke-width="1"/>
  <text x="230" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">데이터 중복</text>
  <text x="230" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">같은 정보가 여러 파일에 분산</text>
  <rect x="480" y="130" width="340" height="52" rx="6" fill="#0d150d" stroke="#1a3a1a" stroke-width="1"/>
  <text x="650" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">정규화로 중복 제거</text>
  <text x="650" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">FK 참조로 한 곳에 저장</text>
  <rect x="60" y="196" width="340" height="52" rx="6" fill="#130e0e" stroke="#3a1a1a" stroke-width="1"/>
  <text x="230" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">무결성 강제 불가</text>
  <text x="230" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">잘못된 데이터 차단 어려움</text>
  <rect x="480" y="196" width="340" height="52" rx="6" fill="#0d150d" stroke="#1a3a1a" stroke-width="1"/>
  <text x="650" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">제약조건으로 무결성 보장</text>
  <text x="650" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">NOT NULL, FK, CHECK 등</text>
  <rect x="60" y="262" width="340" height="52" rx="6" fill="#130e0e" stroke="#3a1a1a" stroke-width="1"/>
  <text x="230" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">동시 접근 충돌</text>
  <text x="230" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">여러 프로세스 동시 쓰기 시 문제</text>
  <rect x="480" y="262" width="340" height="52" rx="6" fill="#0d150d" stroke="#1a3a1a" stroke-width="1"/>
  <text x="650" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">트랜잭션 + 잠금</text>
  <text x="650" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ACID 보장으로 안전한 동시성</text>
  <rect x="60" y="328" width="340" height="52" rx="6" fill="#130e0e" stroke="#3a1a1a" stroke-width="1"/>
  <text x="230" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">직접 코드로 탐색</text>
  <text x="230" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">for 루프로 직접 검색 필터링</text>
  <rect x="480" y="328" width="340" height="52" rx="6" fill="#0d150d" stroke="#1a3a1a" stroke-width="1"/>
  <text x="650" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">SQL 선언형 쿼리</text>
  <text x="650" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SELECT/JOIN으로 복잡한 조회 가능</text>
</svg>
