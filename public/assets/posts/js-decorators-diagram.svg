<svg width="880" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">데코레이터 — 함수 래핑 메커니즘</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">원본 함수를 교체 없이 기능을 앞뒤로 추가</text>

  <!-- Original method box -->
  <rect x="60" y="110" width="220" height="80" rx="8" fill="#0f0f15" stroke="#888" stroke-width="1.5"/>
  <text x="170" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">원본 메서드</text>
  <line x1="60" y1="144" x2="280" y2="144" stroke="#888" stroke-width="1" stroke-opacity="0.4"/>
  <text x="76" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">add(a, b) {</text>
  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  return a + b</text>

  <!-- Arrow into decorator -->
  <line x1="280" y1="150" x2="340" y2="150" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="340,150 326,143 326,157" fill="#7777cc"/>
  <text x="310" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">@logged</text>

  <!-- Decorator box (center) -->
  <rect x="340" y="100" width="300" height="220" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="490" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">logged 데코레이터</text>
  <line x1="340" y1="134" x2="640" y2="134" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Steps inside decorator -->
  <rect x="356" y="146" width="268" height="32" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="490" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">① 호출 전: 로깅 실행</text>

  <rect x="356" y="190" width="268" height="32" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="490" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">② 원본 메서드 호출 (fn.apply)</text>

  <rect x="356" y="234" width="268" height="32" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="490" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">③ 호출 후: 결과 로깅</text>

  <rect x="356" y="278" width="268" height="26" rx="4" fill="#2a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="490" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" text-anchor="middle">④ 결과 반환</text>

  <!-- Arrow out of decorator -->
  <line x1="640" y1="200" x2="700" y2="200" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="700,200 686,193 686,207" fill="#7ec8e3"/>

  <!-- Wrapped method box (right) -->
  <rect x="700" y="150" width="120" height="100" rx="8" fill="#0f1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="760" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">래핑된</text>
  <text x="760" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">메서드</text>
  <text x="760" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">기존 코드는</text>
  <text x="760" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">변경 없음</text>

  <!-- Note box -->
  <rect x="60" y="360" width="760" height="42" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">TC39 Stage 3 — TypeScript 5.0+, Babel @babel/plugin-proposal-decorators</text>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">레거시 experimentalDecorators 와 새 표준은 동작 방식이 다릅니다</text>

  <!-- Footer -->
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
