<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }
      .step-num { font-size: 11px; font-weight: 700; fill: #888; }
      .step-title { font-size: 13px; font-weight: 600; fill: #e8e8e8; }
      .step-desc { font-size: 10px; fill: #666; }
      .step-sub { font-size: 9px; fill: #444; letter-spacing: 0.06em; }
    </style>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2e2e2e"/>
    </marker>
    <marker id="a2r" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#2a2a2a"/>
    </marker>
  </defs>

  <rect width="880" height="280" fill="#0a0a0a" rx="12"/>

  <!-- Step boxes -->
  <!-- 1. 순전파 -->
  <rect x="32" y="60" width="160" height="140" rx="8" fill="#111" stroke="#2e2e2e" stroke-width="1.5"/>
  <text x="52" y="88" class="step-num">01</text>
  <text x="52" y="108" class="step-title">순전파</text>
  <text x="52" y="124" class="step-sub">FORWARD PASS</text>
  <line x1="52" y1="136" x2="172" y2="136" stroke="#1e1e1e" stroke-width="1"/>
  <text x="52" y="154" class="step-desc">입력 데이터를 넣어</text>
  <text x="52" y="170" class="step-desc">예측값을 계산</text>
  <text x="52" y="188" font-size="9" fill="#3a3a3a">예측: 고양이 30%</text>

  <!-- Arrow → -->
  <line x1="198" y1="130" x2="236" y2="130" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- 2. 손실 계산 -->
  <rect x="244" y="60" width="160" height="140" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="264" y="88" class="step-num">02</text>
  <text x="264" y="108" class="step-title">손실 계산</text>
  <text x="264" y="124" class="step-sub">LOSS CALCULATION</text>
  <line x1="264" y1="136" x2="384" y2="136" stroke="#222" stroke-width="1"/>
  <text x="264" y="154" class="step-desc">정답과 예측의</text>
  <text x="264" y="170" class="step-desc">차이를 수치화</text>
  <text x="264" y="188" font-size="9" fill="#3a3a3a">정답 100% → 오차 70%</text>

  <!-- Arrow → -->
  <line x1="410" y1="130" x2="448" y2="130" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- 3. 역전파 -->
  <rect x="456" y="60" width="160" height="140" rx="8" fill="#111" stroke="#3d3d3d" stroke-width="1.5"/>
  <text x="476" y="88" class="step-num">03</text>
  <text x="476" y="108" class="step-title">역전파</text>
  <text x="476" y="124" class="step-sub">BACKPROPAGATION</text>
  <line x1="476" y1="136" x2="596" y2="136" stroke="#2a2a2a" stroke-width="1"/>
  <text x="476" y="154" class="step-desc">오차를 역방향으로</text>
  <text x="476" y="170" class="step-desc">전파해 원인 파악</text>
  <text x="476" y="188" font-size="9" fill="#3a3a3a">각 가중치의 기여도 계산</text>

  <!-- Arrow → -->
  <line x1="622" y1="130" x2="660" y2="130" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#a2)"/>

  <!-- 4. 가중치 갱신 -->
  <rect x="668" y="60" width="180" height="140" rx="8" fill="#141414" stroke="#4a4a4a" stroke-width="1.5"/>
  <rect x="668" y="60" width="180" height="4" rx="2" fill="#333"/>
  <text x="688" y="88" class="step-num">04</text>
  <text x="688" y="108" class="step-title">가중치 갱신</text>
  <text x="688" y="124" class="step-sub">WEIGHT UPDATE</text>
  <line x1="688" y1="136" x2="828" y2="136" stroke="#2a2a2a" stroke-width="1"/>
  <text x="688" y="154" class="step-desc">가중치를 조금씩</text>
  <text x="688" y="170" class="step-desc">오차가 줄어드는 방향으로</text>
  <text x="688" y="188" font-size="9" fill="#555">w = w - lr × gradient</text>

  <!-- Feedback arrow (bottom) -->
  <path d="M758,204 Q758,240 440,240 Q122,240 122,204" fill="none" stroke="#1e1e1e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a2)"/>
  <text x="440" y="256" font-size="10" fill="#333" text-anchor="middle">수만~수억 번 반복 → 점점 정확한 예측</text>
</svg>
