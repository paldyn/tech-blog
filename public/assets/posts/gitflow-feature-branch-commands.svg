<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git-flow CLI와 git 직접 명령어 비교</text>

  <!-- git-flow CLI column -->
  <text x="230" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">git-flow CLI</text>
  <rect x="60" y="88" width="340" height="278" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 시작</text>
  <text xml:space="preserve" x="80" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git flow feature start login</text>
  <text xml:space="preserve" x="80" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 작업 후 원격 push</text>
  <text xml:space="preserve" x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git flow feature publish login</text>
  <text xml:space="preserve" x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 원격 feature 가져오기</text>
  <text xml:space="preserve" x="80" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git flow feature track login</text>
  <text xml:space="preserve" x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 완료 (develop 머지 + 삭제)</text>
  <text xml:space="preserve" x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git flow feature finish login</text>
  <text xml:space="preserve" x="80" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># --no-ff 머지 + 브랜치 삭제</text>
  <text xml:space="preserve" x="80" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># + 태그 없음 (release만 태그)</text>
  <text xml:space="preserve" x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> </text>

  <!-- git direct column -->
  <text x="650" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">git 직접 명령어</text>
  <rect x="480" y="88" width="340" height="278" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="500" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 시작</text>
  <text xml:space="preserve" x="500" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git checkout -b feature/login develop</text>
  <text xml:space="preserve" x="500" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 원격 push</text>
  <text xml:space="preserve" x="500" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git push -u origin feature/login</text>
  <text xml:space="preserve" x="500" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 완료</text>
  <text xml:space="preserve" x="500" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git checkout develop</text>
  <text xml:space="preserve" x="500" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git merge --no-ff feature/login</text>
  <text xml:space="preserve" x="500" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git branch -d feature/login</text>
  <text xml:space="preserve" x="500" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git push origin --delete feature/login</text>
  <text xml:space="preserve" x="500" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># --no-ff: merge commit 강제 생성</text>
  <text xml:space="preserve" x="500" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># (fast-forward 방지)</text>
</svg>
