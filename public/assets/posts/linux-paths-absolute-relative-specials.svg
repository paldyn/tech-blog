<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">경로 특수 기호와 활용 예시</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">. · .. · ~ · - 기호의 의미와 경로 표현 패턴</text>

  <!-- Special symbols table -->
  <rect x="60" y="84" width="200" height="36" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">기호</text>
  <rect x="260" y="84" width="540" height="36" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="530" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">의미와 예시</text>

  <!-- Row 1: . -->
  <rect x="60" y="120" width="200" height="44" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="147" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555" text-anchor="middle">.</text>
  <rect x="260" y="120" width="540" height="44" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="276" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">현재 디렉터리</text>
  <text x="276" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">./script.sh  →  현재 dir의 script.sh</text>

  <!-- Row 2: .. -->
  <rect x="60" y="164" width="200" height="44" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="191" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555" text-anchor="middle">..</text>
  <rect x="260" y="164" width="540" height="44" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="276" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">상위 디렉터리</text>
  <text x="276" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">../../etc  →  두 단계 위의 etc</text>

  <!-- Row 3: ~ -->
  <rect x="60" y="208" width="200" height="44" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#7ec8e3" text-anchor="middle">~</text>
  <rect x="260" y="208" width="540" height="44" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="276" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">현재 사용자 홈 디렉터리 ($HOME)</text>
  <text x="276" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">~/.ssh  →  /home/alice/.ssh</text>

  <!-- Row 4: - -->
  <rect x="60" y="252" width="200" height="44" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8c55a" text-anchor="middle">-</text>
  <rect x="260" y="252" width="540" height="44" fill="#000000" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="276" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">직전에 방문한 디렉터리 ($OLDPWD)</text>
  <text x="276" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">cd -  →  이전 위치로 돌아가기</text>

  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">상대 경로는 현재 위치($PWD)가 바뀌면 가리키는 대상도 달라진다</text>
</svg>
