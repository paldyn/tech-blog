<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">충돌 중 파일 상태와 해결 방법</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">git status 로 확인하는 세 가지 파일 상태</text>

  <!-- Left: git status output -->
  <text x="220" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">git status 출력</text>
  <rect x="60" y="112" width="320" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">On branch main</text>
  <text x="76" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">You have unmerged paths.</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">Changes to be committed:</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  modified: config.py</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">Unmerged paths:</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">  both modified: auth.py</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">  both added:   utils.py</text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">Changes not staged:</text>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">  modified: README.md</text>

  <!-- Right: three state descriptions -->
  <text x="660" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">파일 상태 설명</text>

  <!-- State 1: staged (green) -->
  <rect x="500" y="112" width="320" height="58" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="516" y="134"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">충돌 해결 완료 (staged)</text>
  <text x="516" y="155"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">마커 제거 후 git add 완료 → 커밋 가능</text>

  <!-- State 2: unmerged (red) -->
  <rect x="500" y="182" width="320" height="76" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="516" y="204"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">미해결 충돌 (unmerged)</text>
  <text x="516" y="225"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">both modified: 양쪽 모두 수정</text>
  <text x="516" y="245"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">both added: 양쪽 모두 신규 추가</text>

  <!-- State 3: unstaged (blue) -->
  <rect x="500" y="270" width="320" height="58" rx="6" fill="#0a0d14" stroke="#7ec8e3" stroke-width="1"/>
  <text x="516" y="292"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">일반 미스테이지 파일</text>
  <text x="516" y="313"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">충돌과 무관 — 평소처럼 git add</text>

  <!-- Bottom note -->
  <text x="440" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">unmerged 파일이 남아 있으면 커밋 불가 — 모두 해결 후 git add 필요</text>
</svg>
