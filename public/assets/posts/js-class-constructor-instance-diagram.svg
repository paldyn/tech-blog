<svg width="880" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">클래스 → new → 인스턴스</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">생성자 함수가 인스턴스를 초기화하는 과정</text>

  <!-- Class box (left) -->
  <rect x="60" y="110" width="240" height="220" rx="8" fill="#0f0f20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">class Point</text>
  <line x1="60" y1="148" x2="300" y2="148" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">constructor(x,y)</text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  this.x = x</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  this.y = y</text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">toString()</text>
  <text x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">distance()</text>
  <text x="180" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">설계도 (청사진)</text>

  <!-- Arrow: new -->
  <polygon points="375,215 340,200 340,230" fill="#55c555"/>
  <rect x="300" y="207" width="40" height="16" fill="#55c555" rx="2"/>
  <text x="320" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#0a0a0a" text-anchor="middle" font-weight="700">new</text>

  <!-- new keyword label -->
  <text x="320" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">인스턴스 생성</text>

  <!-- Instance box 1 (right top) -->
  <rect x="400" y="110" width="200" height="120" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="500" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">p1 (인스턴스)</text>
  <line x1="400" y1="144" x2="600" y2="144" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="416" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">x: 3</text>
  <text x="416" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">y: 4</text>
  <text x="416" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">[[Prototype]] →</text>

  <!-- Instance box 2 (right bottom) -->
  <rect x="400" y="250" width="200" height="110" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="500" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">p2 (인스턴스)</text>
  <line x1="400" y1="284" x2="600" y2="284" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="416" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">x: 0</text>
  <text x="416" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">y: 0</text>
  <text x="416" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">[[Prototype]] →</text>

  <!-- Shared prototype box (far right) -->
  <rect x="630" y="180" width="190" height="90" rx="8" fill="#1a1a0a" stroke="#888" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="725" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">Point.prototype</text>
  <text x="646" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">toString()</text>
  <text x="646" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">distance()</text>

  <!-- Arrows to prototype -->
  <line x1="600" y1="178" x2="630" y2="210" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="320" x2="630" y2="240" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Footer -->
  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
