<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">언어별 cache 마운트 적용</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">RUN --mount=type=cache 로 언어별 패키지 캐시를 빌드 간 공유</text>

  <!-- Card 1: Python -->
  <rect x="60" y="100" width="380" height="150" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Python · pip</text>
  <rect x="76" y="144" width="348" height="66" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">target=</tspan><tspan fill="#ce9178">/root/.cache/pip</tspan></text>
  <text x="92" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#d4d4d4">pip install -r </tspan><tspan fill="#ce9178">requirements.txt</tspan></text>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">requirements 바뀌어도 재다운로드 없음</text>

  <!-- Card 2: Node.js -->
  <rect x="460" y="100" width="380" height="150" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">Node.js · npm</text>
  <rect x="476" y="144" width="348" height="66" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">target=</tspan><tspan fill="#ce9178">/root/.npm</tspan></text>
  <text x="492" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#d4d4d4">npm ci</tspan></text>
  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pnpm 은 ~/.local/share/pnpm/store</text>

  <!-- Card 3: Go -->
  <rect x="60" y="266" width="380" height="150" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">Go · go build</text>
  <rect x="76" y="310" width="348" height="66" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">target=</tspan><tspan fill="#ce9178">/go/pkg/mod</tspan></text>
  <text x="92" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">target=</tspan><tspan fill="#ce9178">/root/.cache/go-build</tspan></text>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모듈 캐시 + 컴파일 캐시 둘 다 마운트</text>

  <!-- Card 4: apt -->
  <rect x="460" y="266" width="380" height="150" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">Debian · apt</text>
  <rect x="476" y="310" width="348" height="66" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">target=</tspan><tspan fill="#ce9178">/var/cache/apt</tspan></text>
  <text x="492" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">target=</tspan><tspan fill="#ce9178">/var/lib/apt,sharing=locked</tspan></text>
  <text x="480" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">두 경로 함께 · 병렬 빌드 충돌 방지</text>

  <!-- Bottom note -->
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">언어마다 캐시 경로만 다를 뿐 — type=cache 로 빌드 간 패키지를 재사용한다</text>
</svg>
