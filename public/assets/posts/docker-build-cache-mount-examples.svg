<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    언어별 cache 마운트 예시
  </text>

  <!-- Python -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Python (pip)</text>
  <rect x="60" y="86" width="376" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="106" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">RUN</tspan><tspan fill="#ffffff"> --mount=type=cache,\</tspan>
  </text>
  <text x="76" y="122" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        target=/root/.cache/pip \</tspan>
  </text>
  <text x="76" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    pip install -r requirements.txt</tspan>
  </text>
  <text x="76" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># /root/.cache/pip → 빌드 캐시 재사용</tspan>

  <!-- Node.js -->
  <text x="464" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Node.js (npm)</text>
  <rect x="464" y="86" width="356" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="106" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">RUN</tspan><tspan fill="#ffffff"> --mount=type=cache,\</tspan>
  </text>
  <text x="480" y="122" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        target=/root/.npm \</tspan>
  </text>
  <text x="480" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    npm ci</tspan>
  </text>
  <text x="480" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># npm 전역 캐시 재사용</tspan>

  <!-- Debian apt -->
  <text x="60" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Debian/Ubuntu (apt)</text>
  <rect x="60" y="214" width="376" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">RUN</tspan><tspan fill="#ffffff"> --mount=type=cache,\</tspan>
  </text>
  <text x="76" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        target=/var/cache/apt \</tspan>
  </text>
  <text x="76" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    --mount=type=cache,\</tspan>
  </text>
  <text x="76" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        target=/var/lib/apt \</tspan>
  </text>
  <text x="76" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    apt-get update &amp;&amp; apt-get install -y curl</tspan>
  </text>

  <!-- Go modules -->
  <text x="464" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Go (go mod)</text>
  <rect x="464" y="214" width="356" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">RUN</tspan><tspan fill="#ffffff"> --mount=type=cache,\</tspan>
  </text>
  <text x="480" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        target=/go/pkg/mod \</tspan>
  </text>
  <text x="480" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    --mount=type=cache,\</tspan>
  </text>
  <text x="480" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        target=/root/.cache/go-build \</tspan>
  </text>
  <text x="480" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    go build -o server .</tspan>
  </text>

  <!-- Syntax note -->
  <rect x="60" y="344" width="760" height="76" rx="6" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">첫 줄에 syntax 선언 필수 (BuildKit 자동 활성화)</text>
  <text x="80" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># syntax=docker/dockerfile:1</tspan>
  </text>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">또는 DOCKER_BUILDKIT=1 환경변수 설정. BuildKit 없이는 --mount 옵션 사용 불가</text>
</svg>
