<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">인터닝(Interning)과 is 함정</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">CPython 최적화 · 작은 정수 캐시 · 문자열 인터닝</text>

  <rect x="60" y="100" width="380" height="270" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="250" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">작은 정수 캐시 (-5 ~ 256)</text>
  <rect x="80" y="140" width="340" height="210" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># -5 ~ 256 범위: 같은 객체</tspan></text>
  <text x="96" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a = </tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#e8e8e8">; b = </tspan><tspan fill="#b5cea8">100</tspan></text>
  <text x="96" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a </tspan><tspan fill="#7ec8e3">is</tspan><tspan fill="#e8e8e8"> b  </tspan><tspan fill="#55c555"># True  (캐시됨)</tspan></text>
  <text x="96" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 257 이상: 다른 객체</tspan></text>
  <text x="96" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">c = </tspan><tspan fill="#b5cea8">300</tspan><tspan fill="#e8e8e8">; d = </tspan><tspan fill="#b5cea8">300</tspan></text>
  <text x="96" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">c </tspan><tspan fill="#7ec8e3">is</tspan><tspan fill="#e8e8e8"> d  </tspan><tspan fill="#e05555"># False (CPython에서)</tspan></text>
  <text x="96" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">c == d  </tspan><tspan fill="#55c555"># True  (값은 동일)</tspan></text>
  <text x="96" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 결론: 정수에도 == 써야 안전</tspan></text>
  <text x="96" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># None/True/False는 is OK</tspan></text>
  <text x="96" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">x </tspan><tspan fill="#7ec8e3">is None</tspan><tspan fill="#e8e8e8">   </tspan><tspan fill="#55c555"># 안전 (싱글턴)</tspan></text>

  <rect x="460" y="100" width="360" height="270" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">문자열 인터닝</text>
  <rect x="480" y="140" width="320" height="210" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 식별자처럼 보이는 문자열: 인터닝됨</tspan></text>
  <text x="496" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a = </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#e8e8e8">; b = </tspan><tspan fill="#ce9178">"hello"</tspan></text>
  <text x="496" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a </tspan><tspan fill="#7ec8e3">is</tspan><tspan fill="#e8e8e8"> b  </tspan><tspan fill="#6a8aa0"># True or False (비보장!)</tspan></text>
  <text x="496" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 공백 있는 문자열: 비보장</tspan></text>
  <text x="496" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">c = </tspan><tspan fill="#ce9178">"hello world"</tspan></text>
  <text x="496" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d = </tspan><tspan fill="#ce9178">"hello world"</tspan></text>
  <text x="496" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">c </tspan><tspan fill="#7ec8e3">is</tspan><tspan fill="#e8e8e8"> d  </tspan><tspan fill="#e05555"># 비보장 (구현 의존)</tspan></text>
  <text x="496" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">c == d  </tspan><tspan fill="#55c555"># True  (항상 안전)</tspan></text>
  <text x="496" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># sys.intern으로 명시적 인터닝</tspan></text>
  <text x="496" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> sys; sys.</tspan><tspan fill="#7ec8e3">intern</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"key"</tspan><tspan fill="#e8e8e8">)</tspan></text>
</svg>
