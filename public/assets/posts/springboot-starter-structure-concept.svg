<svg width="880" viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">spring-boot-starter-web 내부 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Starter = 의존성 묶음 + Auto-Configuration — 코드 없이 의존성만 선언</text>

  <!-- User project box -->
  <rect x="320" y="96" width="240" height="58" fill="#13130d" rx="8" stroke="#e0b840" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0b840">내 프로젝트 build.gradle</text>
  <text x="440" y="142" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">implementation 'spring-boot-starter-web'</text>

  <!-- Arrow down -->
  <line x1="440" y1="154" x2="440" y2="182" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,192 435,180 445,180" fill="#555"/>

  <!-- starter-web box -->
  <rect x="240" y="194" width="400" height="64" fill="#0d1520" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">spring-boot-starter-web</text>
  <text x="440" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드 없음 — pom.xml / build.gradle로만 구성</text>

  <!-- Arrow down to children -->
  <line x1="340" y1="258" x2="200" y2="306" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="258" x2="440" y2="306" stroke="#555" stroke-width="1.5"/>
  <line x1="540" y1="258" x2="680" y2="306" stroke="#555" stroke-width="1.5"/>

  <!-- Child: spring-boot-starter -->
  <rect x="60" y="308" width="280" height="58" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="200" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">spring-boot-starter</text>
  <text x="200" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">spring-boot + spring-boot-autoconfigure + logback</text>

  <!-- Child: spring-web + spring-webmvc -->
  <rect x="300" y="308" width="280" height="58" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="440" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">spring-web + spring-webmvc</text>
  <text x="440" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DispatcherServlet, Controller 지원</text>

  <!-- Child: spring-boot-starter-tomcat -->
  <rect x="540" y="308" width="280" height="58" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="680" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">spring-boot-starter-tomcat</text>
  <text x="680" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">내장 Tomcat (embed) — 별도 설치 불필요</text>

  <!-- Naming convention -->
  <rect x="60" y="394" width="760" height="106" fill="#0f1218" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Starter 네이밍 컨벤션</text>

  <!-- Official starter -->
  <rect x="80" y="432" width="320" height="54" fill="#111" rx="4"/>
  <text x="240" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">공식 Starter</text>
  <text x="240" y="472" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">spring-boot-starter-{이름}</text>
  <text x="240" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">예: -web, -data-jpa, -security, -actuator</text>

  <!-- Custom starter -->
  <rect x="480" y="432" width="320" height="54" fill="#111" rx="4"/>
  <text x="640" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">커스텀 Starter</text>
  <text x="640" y="472" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">{이름}-spring-boot-starter</text>
  <text x="640" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">예: paldyn-spring-boot-starter</text>
</svg>
