<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">정렬/필터 구현 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">headersort XFD · sort() · filter() 스크립트</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="274" fill="#000000" rx="6" stroke="#3a4a6e"/>

  <!-- Comment 1: headersort XFD -->
  <text x="80" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// XFD: 헤더 클릭 정렬 활성화</text>
  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3">Grid</tspan><tspan fill="#ffffff"> headersort=</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"grd_emp"</tspan><tspan fill="#ffffff">/&gt;</tspan></text>

  <!-- Comment 2: sort -->
  <text x="80" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 스크립트: 정렬 — A 오름차순, D 내림차순</text>
  <text x="80" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">this</tspan><tspan fill="#ffffff">.ds_emp.sort(</tspan><tspan fill="#ce9178">"sal_amt D"</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="80" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 복합 정렬: 부서 오름차순 후 급여 내림차순</text>
  <text x="80" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">this</tspan><tspan fill="#ffffff">.ds_emp.sort(</tspan><tspan fill="#ce9178">"dept_cd A,sal_amt D"</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- Comment 3: filter -->
  <text x="80" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 필터 — 조건식 적용</text>
  <text x="80" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">this</tspan><tspan fill="#ffffff">.ds_emp.filter(</tspan><tspan fill="#ce9178">"dept_cd == '개발'"</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- Range filter -->
  <text x="80" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 범위 필터: 급여 >= 3,500,000</text>
  <text x="80" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">this</tspan><tspan fill="#ffffff">.ds_emp.filter(</tspan><tspan fill="#ce9178">"sal_amt >= 3500000"</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- Clear filter -->
  <text x="80" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 필터 해제</text>
  <text x="80" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">this</tspan><tspan fill="#ffffff">.ds_emp.filter(</tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="80" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 빈 문자열 전달 시 전체 행 표시 복원</text>

  <!-- Bottom note -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">sort/filter 후 데이터는 보존 — 행 순서/가시성만 변경됨</text>
</svg>
