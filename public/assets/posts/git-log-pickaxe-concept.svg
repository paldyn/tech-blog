<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-pk" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">피카악스: 문자열이 등장/소멸한 커밋 찾기</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">전체 히스토리에서 코드 한 조각의 일대기를 추적한다</text>

  <!-- timeline of commits with occurrence count -->
  <rect x="60" y="120" width="150" height="70" rx="10" fill="#101010" stroke="#444" stroke-width="1.5"/>
  <text x="135" y="150" text-anchor="middle" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">커밋 A</text>
  <text x="135" y="174" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">count = 0</text>

  <rect x="270" y="120" width="150" height="70" rx="10" fill="#101010" stroke="#55c555" stroke-width="2"/>
  <text x="345" y="150" text-anchor="middle" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#55c555">커밋 B</text>
  <text x="345" y="174" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">count = 2</text>

  <rect x="480" y="120" width="150" height="70" rx="10" fill="#101010" stroke="#444" stroke-width="1.5"/>
  <text x="555" y="150" text-anchor="middle" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">커밋 C</text>
  <text x="555" y="174" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">count = 2</text>

  <rect x="690" y="120" width="150" height="70" rx="10" fill="#101010" stroke="#e05555" stroke-width="2"/>
  <text x="765" y="150" text-anchor="middle" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e05555">커밋 D</text>
  <text x="765" y="174" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">count = 0</text>

  <line x1="210" y1="155" x2="264" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-pk)"/>
  <line x1="420" y1="155" x2="474" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-pk)"/>
  <line x1="630" y1="155" x2="684" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-pk)"/>

  <text x="345" y="228" text-anchor="middle" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#55c555">개수 0→2: 추가됨</text>
  <text x="765" y="228" text-anchor="middle" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e05555">개수 2→0: 삭제됨</text>

  <text x="440" y="285" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git log -S "텍스트"  →  B와 D만 결과로 나온다</text>
</svg>
