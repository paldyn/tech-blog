<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">이스케이프 분석 — 객체는 어디까지 새어 나가나</text>

  <!-- three columns -->
  <rect x="40" y="80" width="250" height="180" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="165" y="112" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">NoEscape</text>
  <text x="165" y="140" font-size="13" fill="#9aa4b8" text-anchor="middle">메서드 밖으로 안 나감</text>
  <text x="165" y="164" font-size="13" fill="#9aa4b8" text-anchor="middle">→ 스택 할당 가능</text>
  <text x="165" y="184" font-size="13" fill="#9aa4b8" text-anchor="middle">→ 스칼라 치환 가능</text>
  <text x="165" y="208" font-size="13" fill="#9aa4b8" text-anchor="middle">→ 락 제거 가능</text>
  <text x="165" y="240" font-size="13" fill="#9aa4b8" text-anchor="middle">지역 변수에만 머무는 객체</text>

  <rect x="315" y="80" width="250" height="180" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="112" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">ArgEscape</text>
  <text x="440" y="140" font-size="13" fill="#9aa4b8" text-anchor="middle">호출된 메서드에 인자로</text>
  <text x="440" y="164" font-size="13" fill="#9aa4b8" text-anchor="middle">전달되지만 더 멀리는</text>
  <text x="440" y="188" font-size="13" fill="#9aa4b8" text-anchor="middle">새지 않음</text>
  <text x="440" y="220" font-size="13" fill="#9aa4b8" text-anchor="middle">제한적 최적화만 적용</text>

  <rect x="590" y="80" width="250" height="180" rx="8" fill="#101010" stroke="#e05555" stroke-width="1"/>
  <text x="715" y="112" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">GlobalEscape</text>
  <text x="715" y="140" font-size="13" fill="#9aa4b8" text-anchor="middle">필드 저장·반환·다른</text>
  <text x="715" y="164" font-size="13" fill="#9aa4b8" text-anchor="middle">스레드에서 접근</text>
  <text x="715" y="196" font-size="13" fill="#9aa4b8" text-anchor="middle">→ 최적화 불가</text>
  <text x="715" y="228" font-size="13" fill="#9aa4b8" text-anchor="middle">일반 힙 할당</text>
</svg>
