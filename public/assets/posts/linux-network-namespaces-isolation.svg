<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" markerWidth="18" markerHeight="14" refX="16" refY="7" orient="auto">
      <polygon points="0 0,18 7,0 14" fill="#4a5a6a" stroke="none"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">네트워크 네임스페이스 격리</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">각 네임스페이스는 독립적인 네트워크 스택을 갖는다</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Host netns (top) -->
  <rect x="60" y="100" width="760" height="120" rx="10" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" xml:space="preserve">호스트 네트워크 네임스페이스 (기본)</text>
  <!-- Host interfaces -->
  <rect x="90" y="136" width="140" height="44" rx="6" fill="#12192a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">eth0</text>
  <text x="160" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">192.168.1.1/24</text>

  <rect x="250" y="136" width="140" height="44" rx="6" fill="#12192a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="320" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">lo</text>
  <text x="320" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">127.0.0.1/8</text>

  <rect x="410" y="136" width="160" height="44" rx="6" fill="#12192a" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">veth0 (호스트 쪽)</text>
  <text x="490" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">10.0.0.1/24</text>

  <text x="650" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">라우팅 테이블, iptables</text>
  <text x="650" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">호스트 전용</text>

  <!-- veth pair arrow -->
  <line x1="490" y1="220" x2="490" y2="256" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="530" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">veth pair</text>

  <!-- Netns A (left) -->
  <rect x="60" y="258" width="360" height="130" rx="10" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" xml:space="preserve">netns: ns0</text>

  <rect x="90" y="296" width="140" height="44" rx="6" fill="#12192a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">veth1 (ns 쪽)</text>
  <text x="160" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">10.0.0.2/24</text>

  <rect x="250" y="296" width="140" height="44" rx="6" fill="#12192a" stroke="#555" stroke-width="1"/>
  <text x="320" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">lo</text>
  <text x="320" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">127.0.0.1/8</text>

  <text x="240" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">독립적 라우팅, 방화벽, 소켓</text>

  <!-- Netns B (right) -->
  <rect x="460" y="258" width="360" height="130" rx="10" fill="#1a0d20" stroke="#7777cc" stroke-width="2"/>
  <text x="640" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" xml:space="preserve">netns: ns1</text>

  <rect x="490" y="296" width="140" height="44" rx="6" fill="#12192a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="560" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">veth2 (ns 쪽)</text>
  <text x="560" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">10.0.1.2/24</text>

  <rect x="650" y="296" width="140" height="44" rx="6" fill="#12192a" stroke="#555" stroke-width="1"/>
  <text x="720" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">lo</text>
  <text x="720" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">127.0.0.1/8</text>

  <text x="640" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">독립적 라우팅, 방화벽, 소켓</text>

  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">컨테이너(Docker, podman)는 이 네임스페이스 격리를 활용한다</text>
</svg>
