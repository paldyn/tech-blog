  <rect x="324" y="208" width="232" height="120" rx="8" fill="#0a1a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Java 저장 프로시저</text>
  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서버 내 JVM 내장</text>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Java 메서드 → 프로시저</text>
  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Java 생태계 활용</text>

  <rect x="588" y="208" width="232" height="120" rx="8" fill="#0a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="704" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">한글 지원 최적화</text>
  <text x="704" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">UTF-8 / EUC-KR</text>
  <text x="704" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">한글 풀텍스트 검색</text>
  <text x="704" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">국내 포털 서비스 실적</text>
