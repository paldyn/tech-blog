<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CUBRID 주요 특징</text>

  <!-- Feature cards 2x3 layout -->
  <!-- Row 1 -->
  <rect x="60" y="68" width="232" height="120" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="176" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">오픈소스 무료</text>
  <text x="176" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">GPL / LGPL 이중 라이선스</text>
  <text x="176" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상용 서비스 무료 사용 가능</text>
  <text x="176" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">NHN 개발 → 오픈소스 전환</text>

  <rect x="324" y="68" width="232" height="120" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">CUBRID Broker</text>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">미들웨어 계층 내장</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">연결 풀 + Read/Write 분리</text>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">별도 프록시 불필요</text>

  <rect x="588" y="68" width="232" height="120" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="704" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">객체-관계형 혼합</text>
  <text x="704" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">집합(SET) 타입 지원</text>
  <text x="704" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">객체 상속 · 다형성</text>
  <text x="704" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">OO 확장 RDBMS</text>

  <!-- Row 2 -->
  <rect x="60" y="208" width="232" height="120" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="176" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
