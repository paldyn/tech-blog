<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">선언 종류별 호이스팅 동작</text>

  <!-- Table header -->
  <rect x="60" y="60" width="760" height="36" rx="4" fill="#111"/>
  <text x="200" y="83" text-anchor="middle" font-size="13" font-weight="600" fill="#888">선언 방식</text>
  <text x="400" y="83" text-anchor="middle" font-size="13" font-weight="600" fill="#888">호이스팅 여부</text>
  <text x="570" y="83" text-anchor="middle" font-size="13" font-weight="600" fill="#888">초기값</text>
  <text x="740" y="83" text-anchor="middle" font-size="13" font-weight="600" fill="#888">선언 전 접근</text>
  <line x1="60" y1="96" x2="820" y2="96" stroke="#2a2a2a" stroke-width="1"/>

  <!-- var -->
  <rect x="60" y="96" width="760" height="44" rx="0" fill="#0d1117"/>
  <text x="200" y="123" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">var</text>
  <text x="400" y="123" text-anchor="middle" font-size="12" fill="#55c555">됨</text>
  <text x="570" y="123" text-anchor="middle" font-size="12" fill="#ce9178">undefined</text>
  <text x="740" y="123" text-anchor="middle" font-size="12" fill="#ce9178">undefined 반환 (에러 없음)</text>

  <!-- let -->
  <rect x="60" y="140" width="760" height="44" rx="0" fill="#111"/>
  <text x="200" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">let</text>
  <text x="400" y="167" text-anchor="middle" font-size="12" fill="#55c555">됨 (선언만)</text>
  <text x="570" y="167" text-anchor="middle" font-size="12" fill="#e05555">초기화 안 됨 (TDZ)</text>
  <text x="740" y="167" text-anchor="middle" font-size="12" fill="#e05555">ReferenceError</text>

  <!-- const -->
  <rect x="60" y="184" width="760" height="44" rx="0" fill="#0d1117"/>
  <text x="200" y="211" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">const</text>
  <text x="400" y="211" text-anchor="middle" font-size="12" fill="#55c555">됨 (선언만)</text>
  <text x="570" y="211" text-anchor="middle" font-size="12" fill="#e05555">초기화 안 됨 (TDZ)</text>
  <text x="740" y="211" text-anchor="middle" font-size="12" fill="#e05555">ReferenceError</text>

  <!-- function declaration -->
  <rect x="60" y="228" width="760" height="44" rx="0" fill="#111"/>
  <text x="200" y="255" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">함수 선언문</text>
  <text x="400" y="255" text-anchor="middle" font-size="12" fill="#55c555">됨 (완전히)</text>
  <text x="570" y="255" text-anchor="middle" font-size="12" fill="#55c555">함수 전체</text>
  <text x="740" y="255" text-anchor="middle" font-size="12" fill="#55c555">정상 호출 가능</text>

  <!-- function expression (var) -->
  <rect x="60" y="272" width="760" height="44" rx="0" fill="#0d1117"/>
  <text x="200" y="299" text-anchor="middle" font-size="12" font-weight="600" fill="#888">함수 표현식 (var)</text>
  <text x="400" y="299" text-anchor="middle" font-size="12" fill="#55c555">됨 (var처럼)</text>
  <text x="570" y="299" text-anchor="middle" font-size="12" fill="#ce9178">undefined</text>
  <text x="740" y="299" text-anchor="middle" font-size="12" fill="#e05555">TypeError (undefined 호출)</text>

  <!-- class -->
  <rect x="60" y="316" width="760" height="44" rx="0" fill="#111"/>
  <text x="200" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">class</text>
  <text x="400" y="343" text-anchor="middle" font-size="12" fill="#55c555">됨 (선언만)</text>
  <text x="570" y="343" text-anchor="middle" font-size="12" fill="#e05555">초기화 안 됨 (TDZ)</text>
  <text x="740" y="343" text-anchor="middle" font-size="12" fill="#e05555">ReferenceError</text>

  <!-- Border -->
  <rect x="60" y="96" width="760" height="264" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Bottom note -->
  <rect x="60" y="378" width="760" height="36" rx="6" fill="#0d1117" stroke="#2a2a2a"/>
  <text x="440" y="401" text-anchor="middle" font-size="12" fill="#888">"호이스팅"은 엔진이 실행 전 생성 단계에서 식별자를 수집하는 과정 — var만 undefined로 초기화되는 것이 핵심 차이</text>

  <!-- Footer -->
  <text x="440" y="432" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
