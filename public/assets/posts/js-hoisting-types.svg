<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">호이스팅 유형별 정리</text>

  <!-- Header row -->
  <rect x="60" y="64" width="760" height="32" rx="6" fill="#0d1117" stroke="#333"/>
  <text x="140" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#888">구문 유형</text>
  <text x="320" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#888">호이스팅 여부</text>
  <text x="500" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#888">선언 전 사용 시</text>
  <text x="700" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#888">비고</text>

  <!-- Row 1: var -->
  <rect x="60" y="96" width="760" height="38" rx="0" fill="#0d1117"/>
  <text x="140" y="120" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">var x</text>
  <text x="320" y="120" text-anchor="middle" font-size="12" fill="#55c555">선언 + undefined 초기화</text>
  <text x="500" y="120" text-anchor="middle" font-size="12" fill="#7ec8e3">undefined</text>
  <text x="700" y="120" text-anchor="middle" font-size="12" fill="#888">함수 스코프</text>
  <line x1="60" y1="134" x2="820" y2="134" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 2: let -->
  <rect x="60" y="134" width="760" height="38" rx="0" fill="#0f0f0f"/>
  <text x="140" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">let x</text>
  <text x="320" y="158" text-anchor="middle" font-size="12" fill="#7777cc">선언만 (TDZ)</text>
  <text x="500" y="158" text-anchor="middle" font-size="12" fill="#e05555">ReferenceError</text>
  <text x="700" y="158" text-anchor="middle" font-size="12" fill="#888">블록 스코프</text>
  <line x1="60" y1="172" x2="820" y2="172" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 3: const -->
  <rect x="60" y="172" width="760" height="38" rx="0" fill="#0d1117"/>
  <text x="140" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">const x</text>
  <text x="320" y="196" text-anchor="middle" font-size="12" fill="#7777cc">선언만 (TDZ)</text>
  <text x="500" y="196" text-anchor="middle" font-size="12" fill="#e05555">ReferenceError</text>
  <text x="700" y="196" text-anchor="middle" font-size="12" fill="#888">블록 스코프</text>
  <line x1="60" y1="210" x2="820" y2="210" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 4: function declaration -->
  <rect x="60" y="210" width="760" height="38" rx="0" fill="#0f0f0f"/>
  <text x="140" y="234" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">function f(){}</text>
  <text x="320" y="234" text-anchor="middle" font-size="12" fill="#55c555">선언 + 전체 함수 본문</text>
  <text x="500" y="234" text-anchor="middle" font-size="12" fill="#55c555">정상 실행!</text>
  <text x="700" y="234" text-anchor="middle" font-size="12" fill="#888">완전 호이스팅</text>
  <line x1="60" y1="248" x2="820" y2="248" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 5: function expression with var -->
  <rect x="60" y="248" width="760" height="38" rx="0" fill="#0d1117"/>
  <text x="140" y="272" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">var f = () =&gt; {}</text>
  <text x="320" y="272" text-anchor="middle" font-size="12" fill="#55c555">변수 선언만 (undefined)</text>
  <text x="500" y="272" text-anchor="middle" font-size="12" fill="#e05555">TypeError (not a function)</text>
  <text x="700" y="272" text-anchor="middle" font-size="12" fill="#888">함수 스코프</text>
  <line x1="60" y1="286" x2="820" y2="286" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 6: function expression with let -->
  <rect x="60" y="286" width="760" height="38" rx="0" fill="#0f0f0f"/>
  <text x="140" y="310" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">let f = () =&gt; {}</text>
  <text x="320" y="310" text-anchor="middle" font-size="12" fill="#7777cc">선언만 (TDZ)</text>
  <text x="500" y="310" text-anchor="middle" font-size="12" fill="#e05555">ReferenceError</text>
  <text x="700" y="310" text-anchor="middle" font-size="12" fill="#888">블록 스코프</text>
  <line x1="60" y1="324" x2="820" y2="324" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 7: class -->
  <rect x="60" y="324" width="760" height="38" rx="0" fill="#0d1117"/>
  <text x="140" y="348" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">class C {}</text>
  <text x="320" y="348" text-anchor="middle" font-size="12" fill="#7777cc">선언만 (TDZ)</text>
  <text x="500" y="348" text-anchor="middle" font-size="12" fill="#e05555">ReferenceError</text>
  <text x="700" y="348" text-anchor="middle" font-size="12" fill="#888">블록 스코프</text>

  <!-- Key insight -->
  <rect x="60" y="374" width="760" height="28" rx="6" fill="#0d1117" stroke="#f7df1e" stroke-width="1"/>
  <text x="440" y="393" text-anchor="middle" font-size="12" fill="#f7df1e">함수 선언문만 "완전 호이스팅" — 나머지는 TDZ(let/const/class) 또는 undefined(var 표현식)</text>

  <!-- Footer -->
  <text x="440" y="413" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #7</text>
</svg>
