<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">문자·논리형 데이터 타입</text>

  <!-- String types left -->
  <rect x="60" y="68" width="380" height="350" fill="#0d0d0d" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">문자열 타입</text>

  <rect x="76" y="106" width="348" height="30" fill="#162030"/>
  <text x="250" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">CHAR vs VARCHAR vs TEXT</text>

  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">CHAR(n)</text>
  <text x="148" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> 고정 길이, n자 미만이면 공백 패딩</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">  → 국가 코드('KR'), 성별('M'/'F') 같은 고정값</text>

  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">VARCHAR(n)</text>
  <text x="161" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> 가변 길이, 최대 n자</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">  → 이름, 이메일, 주소 등 일반 텍스트</text>

  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a020">TEXT</text>
  <text x="116" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  길이 제한 없는 가변 텍스트</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">  → 게시글 본문, 로그 메시지 (인덱스 주의)</text>

  <line x1="76" y1="258" x2="424" y2="258" stroke="#3a4a6e" stroke-width="0.5"/>

  <rect x="76" y="268" width="348" height="130" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- CHAR 공백 패딩 주의</text>
  <text x="92" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">SELECT</text>
  <text x="136" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> CHAR_LENGTH(</text>
  <text x="92" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  CAST</text>
  <text x="126" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="136" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'hi'</text>
  <text x="160" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600"> AS</text>
  <text x="186" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600"> CHAR</text>
  <text x="222" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">(10)</text>
  <text x="248" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">));</text>
  <text x="92" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 결과: 10 (공백 8개 포함)</text>
  <text x="92" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 비교 시 RTRIM 필요할 수도</text>

  <!-- Boolean right -->
  <rect x="460" y="68" width="360" height="350" fill="#0d0d0d" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">논리형 및 기타 타입</text>

  <rect x="476" y="106" width="328" height="30" fill="#1a1a2a"/>
  <text x="640" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">BOOLEAN</text>

  <text x="480" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">PostgreSQL:</text>
  <text x="560" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff"> BOOLEAN (true/false/null)</text>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">MySQL:</text>
  <text x="530" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> TINYINT(1) (0=false, 1=true)</text>
  <text x="480" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a020">Oracle:</text>
  <text x="530" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> BOOLEAN (21c+), 전통: NUMBER(1)</text>
  <text x="480" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#9aa4b8">MSSQL:</text>
  <text x="532" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> BIT (0/1/NULL)</text>

  <line x1="476" y1="218" x2="804" y2="218" stroke="#3a4a6e" stroke-width="0.5"/>

  <rect x="476" y="228" width="328" height="30" fill="#1a1a2a"/>
  <text x="640" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a020" text-anchor="middle">BINARY / BLOB</text>

  <text x="480" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BINARY(n): 고정 이진 데이터</text>
  <text x="480" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">VARBINARY(n): 가변 이진</text>
  <text x="480" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BLOB: 대형 이진 (이미지, 파일)</text>
  <text x="480" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">PG: BYTEA / Oracle: RAW, BLOB</text>

  <line x1="476" y1="336" x2="804" y2="336" stroke="#3a4a6e" stroke-width="0.5"/>

  <rect x="476" y="346" width="328" height="30" fill="#1a1a2a"/>
  <text x="640" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">UUID / JSON / ARRAY</text>

  <text x="480" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">UUID: PG 네이티브, MySQL: CHAR(36)</text>
  <text x="480" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JSON/JSONB: PG 네이티브, MySQL JSON</text>
</svg>