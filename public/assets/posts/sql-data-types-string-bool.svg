<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">문자열 · 불리언 타입</text>

  <!-- String types table -->
  <rect x="60" y="65" width="760" height="34" rx="4" fill="#131320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타입</text>
  <text x="390" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">특징</text>
  <text x="680" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">적합한 용도</text>

  <rect x="60" y="99" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="170" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">VARCHAR(n)</text>
  <text x="390" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">최대 n자 가변 길이. 초과 시 에러.</text>
  <text x="680" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이름, 이메일, 제목 — 길이 예측 가능</text>

  <rect x="60" y="133" width="760" height="34" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="170" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">TEXT</text>
  <text x="390" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">길이 제한 없는 가변 문자열</text>
  <text x="680" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">본문, JSON, 로그 (PG/MySQL)</text>

  <rect x="60" y="167" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="170" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">CHAR(n)</text>
  <text x="390" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">고정 n자 (부족하면 공백 패딩)</text>
  <text x="680" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">국가코드(2), 성별코드(1)</text>

  <rect x="60" y="201" width="760" height="34" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="170" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">NVARCHAR(n)</text>
  <text x="390" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">유니코드 가변 길이 (SQL Server/Oracle)</text>
  <text x="680" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">다국어 데이터 (비표준)</text>

  <!-- Boolean section -->
  <rect x="60" y="252" width="360" height="120" rx="8" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">BOOLEAN 타입</text>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• PostgreSQL: TRUE/FALSE/NULL 3값 논리</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• MySQL: TINYINT(1) 내부 구현. 1=TRUE, 0=FALSE</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Oracle: BOOLEAN 없음 → CHAR(1) 'Y'/'N' 관행</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• SQL Server: BIT (0/1, NULL)</text>

  <!-- VARCHAR vs TEXT note -->
  <rect x="460" y="252" width="360" height="120" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">VARCHAR vs TEXT (PostgreSQL)</text>
  <text x="480" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 내부 저장 방식 동일 (TOAST 사용)</text>
  <text x="480" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• VARCHAR(n)은 길이 제한 강제가 유일한 차이</text>
  <text x="480" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 성능 차이 없음 (길이 체크 오버헤드 미미)</text>
  <text x="480" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• PG에서는 길이 제한 필요 시 VARCHAR(n), 없으면 TEXT 권장</text>
</svg>
