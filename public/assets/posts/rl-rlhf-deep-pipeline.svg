<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">RLHF 3단계 파이프라인</text>

  <!-- 단계 1: SFT -->
  <rect x="40" y="58" width="800" height="108" fill="#0f1a2e" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">① 지도 미세조정 (SFT)</text>

  <rect x="60" y="96" width="220" height="58" fill="#0a1522" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Base LLM</text>
  <text x="170" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사전학습 완료</text>
  <text x="170" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GPT / Claude / Llama</text>

  <line x1="280" y1="125" x2="318" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="320" y="96" width="220" height="58" fill="#0a1522" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="430" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">고품질 데모 데이터</text>
  <text x="430" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전문가 작성 (질문-응답)</text>
  <text x="430" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수만 개 예시</text>

  <line x1="540" y1="125" x2="578" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="580" y="96" width="220" height="58" fill="#0d1a10" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">SFT 모델 π_SFT</text>
  <text x="690" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">지시 따르기 능력 획득</text>
  <text x="690" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Reference 모델로도 사용</text>

  <!-- 단계 2: 보상 모델 -->
  <rect x="40" y="188" width="800" height="118" fill="#1a1010" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="60" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">② 보상 모델 학습 (Reward Model)</text>

  <rect x="60" y="226" width="220" height="68" fill="#1a0a0a" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">인간 선호 데이터</text>
  <text x="170" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">같은 질문, 두 응답</text>
  <text x="170" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">A vs B → 어느 쪽 선호?</text>
  <text x="170" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">수십만~수백만 쌍</text>

  <line x1="280" y1="260" x2="318" y2="260" stroke="#e05555" stroke-width="2" marker-end="url(#arr-orange)"/>

  <rect x="320" y="226" width="220" height="68" fill="#1a0a0a" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="430" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Bradley-Terry 모델</text>
  <text x="430" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">P(A &gt; B) = σ(r(A) - r(B))</text>
  <text x="430" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">랭킹 손실로 학습</text>

  <line x1="540" y1="260" x2="578" y2="260" stroke="#e05555" stroke-width="2" marker-end="url(#arr-orange)"/>

  <rect x="580" y="226" width="220" height="68" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="690" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">보상 모델 r_φ(x, y)</text>
  <text x="690" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">응답 품질 스칼라 출력</text>
  <text x="690" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">고정 (RL 학습 중)</text>

  <!-- 단계 3: RL 파인튜닝 -->
  <rect x="40" y="328" width="800" height="118" fill="#0d0f1a" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="60" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">③ PPO로 RL 파인튜닝</text>

  <rect x="60" y="366" width="220" height="68" fill="#0d0f1a" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">LLM Policy π_θ</text>
  <text x="170" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SFT 모델로 초기화</text>
  <text x="170" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">토큰 단위 행동 선택</text>
  <text x="170" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">에피소드 = 응답 생성</text>

  <line x1="280" y1="400" x2="318" y2="400" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <rect x="320" y="366" width="220" height="68" fill="#0d0f1a" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="430" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">보상 = r_φ - β·KL</text>
  <text x="430" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">KL = KL(π_θ || π_SFT)</text>
  <text x="430" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">β: KL 패널티 강도</text>

  <line x1="540" y1="400" x2="578" y2="400" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <rect x="580" y="366" width="220" height="68" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">RLHF 모델</text>
  <text x="690" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인간 선호 반영</text>
  <text x="690" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">도움됨·무해함·정직함</text>

  <!-- 단계 연결 화살표 -->
  <line x1="690" y1="166" x2="690" y2="226" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <line x1="690" y1="306" x2="690" y2="366" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
</svg>
