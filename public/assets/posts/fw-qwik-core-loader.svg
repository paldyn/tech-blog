<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">QwikCity — 라우팅과 데이터 로딩</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">routeLoader$ / routeAction$ — 서버-클라이언트 경계</text>

  <!-- routeLoader$ -->
  <rect x="60" y="100" width="350" height="288" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// routes/products/[id]/index.tsx</text>
  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan> { routeLoader$, routeAction$,</text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">         component$ } <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">'@builder.io/qwik-city'</tspan></text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 서버에서만 실행 — 결과 직렬화 전달</text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> useProduct = routeLoader$(<tspan fill="#7ec8e3" font-weight="600">async</tspan> (event) =&gt; {</text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> { id } = event.params</text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> <tspan fill="#7ec8e3" font-weight="600">await</tspan> db.product.findUnique({ where: { id } })</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">})</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 폼 처리 — POST 핸들러 (서버)</text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> useAddToCart = routeAction$(<tspan fill="#7ec8e3" font-weight="600">async</tspan> (data) =&gt; {</text>
  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">await</tspan> cart.add(data.productId)</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> { success: <tspan fill="#ce9178">true</tspan> }</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">})</text>

  <!-- Component usage -->
  <rect x="430" y="100" width="410" height="288" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 컴포넌트 — 클라이언트에서 사용</text>
  <text x="446" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export default</tspan> component$(() =&gt; {</text>
  <text x="446" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> product = useProduct()  <tspan fill="#9aa4b8">// Signal</tspan></text>
  <text x="446" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> addToCart = useAddToCart()</text>
  <text x="446" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> (</text>
  <text x="446" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    &lt;div&gt;</text>
  <text x="446" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      &lt;h1&gt;&#123;product.value.name&#125;&lt;/h1&gt;</text>
  <text x="446" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      &lt;Form action=&#123;addToCart&#125;&gt;</text>
  <text x="446" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">        &lt;button type=<tspan fill="#ce9178">"submit"</tspan>&gt;장바구니 추가&lt;/button&gt;</text>
  <text x="446" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      &lt;/Form&gt;</text>
  <text x="446" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    &lt;/div&gt;</text>
  <text x="446" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  )</text>
  <text x="446" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">})</text>
</svg>
