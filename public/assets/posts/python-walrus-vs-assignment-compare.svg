<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">대입하면서 동시에 검사하기</text>

  <text x="50" y="90" font-size="16" font-weight="600" fill="#888">일반 대입 — 줄과 들여쓰기가 갈린다</text>
  <rect x="50" y="104" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="68" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">line = f.readline()</tspan></text>
  <text xml:space="preserve" x="68" y="160" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> line:</tspan></text>
  <text xml:space="preserve" x="68" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    process(line)</tspan></text>
  <text xml:space="preserve" x="68" y="212" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    line = f.readline()</tspan></text>
  <text xml:space="preserve" x="68" y="238" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># readline 을 두 번 적는다</tspan></text>

  <text x="470" y="90" font-size="16" font-weight="600" fill="#55c555">왈러스 := — 한 자리에서</text>
  <rect x="470" y="104" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="488" y="148" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> (line := f.readline()):</tspan></text>
  <text xml:space="preserve" x="488" y="174" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    process(line)</tspan></text>
  <text xml:space="preserve" x="488" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># 대입과 조건을 한 줄에,</tspan></text>
  <text xml:space="preserve" x="488" y="238" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># 중복이 사라진다</tspan></text>

  <text x="60" y="288" font-size="13" fill="#888">:= 는 표현식 안에서 이름에 값을 대입한다. 일반 = 는 그 자체로 값을 갖지 않는다.</text>
</svg>
