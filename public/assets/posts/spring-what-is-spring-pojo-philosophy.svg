<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">POJO 철학 — 스프링이 제공하는 것</text>

  <!-- Center POJO box -->
  <rect x="310" y="70" width="260" height="80" fill="#131a2a" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="102" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">POJO 비즈니스 객체</text>
  <text x="440" y="124" font-size="13" fill="#888" text-anchor="middle">순수 자바 클래스 (Plain Old Java Object)</text>

  <!-- Surrounding Spring features -->
  <!-- IoC/DI -->
  <rect x="60" y="190" width="200" height="76" fill="#0e1420" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="222" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">IoC / DI</text>
  <text x="160" y="244" font-size="12" fill="#888" text-anchor="middle">의존성 주입으로</text>
  <text x="160" y="260" font-size="12" fill="#888" text-anchor="middle">결합도 감소</text>

  <!-- AOP -->
  <rect x="620" y="190" width="200" height="76" fill="#0e1420" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="222" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">AOP</text>
  <text x="720" y="244" font-size="12" fill="#888" text-anchor="middle">횡단 관심사 분리</text>
  <text x="720" y="260" font-size="12" fill="#888" text-anchor="middle">(로깅, 트랜잭션 등)</text>

  <!-- PSA -->
  <rect x="60" y="320" width="200" height="76" fill="#0e1420" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="160" y="352" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">PSA</text>
  <text x="160" y="374" font-size="12" fill="#888" text-anchor="middle">이식 가능한 서비스</text>
  <text x="160" y="390" font-size="12" fill="#888" text-anchor="middle">추상화 레이어</text>

  <!-- 테스트 -->
  <rect x="620" y="320" width="200" height="76" fill="#0e1420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="352" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">테스트 용이성</text>
  <text x="720" y="374" font-size="12" fill="#888" text-anchor="middle">컨테이너 없이</text>
  <text x="720" y="390" font-size="12" fill="#888" text-anchor="middle">단위 테스트 가능</text>

  <!-- Arrows from POJO to each box -->
  <!-- Left top -->
  <line x1="310" y1="120" x2="260" y2="228" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Right top -->
  <line x1="570" y1="120" x2="620" y2="228" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Left bottom -->
  <line x1="310" y1="140" x2="260" y2="358" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Right bottom -->
  <line x1="570" y1="140" x2="620" y2="358" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom summary -->
  <rect x="200" y="420" width="480" height="44" fill="#0e1420" rx="8" stroke="#333" stroke-width="1"/>
  <text x="440" y="438" font-size="13" fill="#888" text-anchor="middle">스프링 = "코드는 POJO로, 기반 기술은 스프링이 대신"</text>
  <text x="440" y="456" font-size="13" fill="#7ec8e3" text-anchor="middle">개발자는 비즈니스 로직에만 집중할 수 있다</text>

  <!-- Footer -->
  <text x="440" y="490" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #1</text>
</svg>
