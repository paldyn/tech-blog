<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Sparse Checkout: 필요한 디렉터리만 체크아웃</text>

  <!-- Full repo -->
  <rect x="60" y="68" width="340" height="320" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888" text-anchor="middle">전체 저장소 구조</text>
  <text x="230" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(원격에 수천 개의 파일)</text>

  <rect x="80" y="126" width="300" height="240" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">monorepo/</text>
  <text x="112" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">├── apps/</text>
  <text x="128" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">│   ├── frontend/  (3,000 파일)</text>
  <text x="128" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">│   ├── backend/   ← 필요한 것</text>
  <text x="128" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">│   └── mobile/   (2,000 파일)</text>
  <text x="112" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">├── packages/</text>
  <text x="128" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">│   ├── shared/    ← 필요한 것</text>
  <text x="128" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">│   └── ui/       (1,500 파일)</text>
  <text x="112" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">├── tools/        (500 파일)</text>
  <text x="112" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">└── docs/         (800 파일)</text>
  <text x="230" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">총 ~8,000 파일</text>

  <!-- Arrow -->
  <line x1="410" y1="228" x2="470" y2="228" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">sparse</text>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">checkout</text>

  <!-- Sparse result -->
  <rect x="480" y="68" width="340" height="320" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Sparse Checkout 결과</text>
  <text x="650" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(로컬에는 필요한 파일만)</text>

  <rect x="500" y="126" width="300" height="240" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">monorepo/</text>
  <text x="532" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">├── apps/</text>
  <text x="548" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">│   └── backend/   ✓ 포함</text>
  <text x="532" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">└── packages/</text>
  <text x="548" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">    └── shared/    ✓ 포함</text>
  <text x="516" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">(나머지 디렉터리 없음)</text>
  <text x="650" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">~400 파일만 로컬에 존재</text>

  <!-- Bottom note -->
  <rect x="60" y="408" width="760" height="68" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">핵심: Git 오브젝트 DB는 전체를 가지지만 작업 디렉터리에는 일부만 체크아웃</text>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">partial clone과 함께 사용하면 다운로드 용량도 줄일 수 있음</text>
</svg>
