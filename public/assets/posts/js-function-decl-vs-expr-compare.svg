<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">함수 선언식 vs 함수 표현식</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">호이스팅·이름·스코프의 차이</text>

  <!-- 선언식 -->
  <rect x="60" y="100" width="360" height="195" fill="#111827" rx="8" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="240" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">함수 선언식 (Declaration)</text>
  <rect x="80" y="132" width="320" height="151" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="96" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 호출 먼저 해도 OK (호이스팅)</text>
  <text x="96" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">greet(</text><text x="144" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'Kim'</text><text x="180" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">);  </text><text x="222" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">// ✓ 정상</text>
  <text x="96" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="168" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> greet(name) {</text>
  <text x="96" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  return</text><text x="156" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> `안녕, ${name}`</text><text x="282" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="96" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="96" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 특징</text>
  <text x="96" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">typeof</text><text x="150" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> greet; </text><text x="210" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 'function'</text>
  <text x="96" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">greet.name; </text><text x="180" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 'greet'</text>

  <!-- 표현식 -->
  <rect x="460" y="100" width="360" height="195" fill="#111827" rx="8" stroke="#4a1e5f" stroke-width="1.5"/>
  <text x="640" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">함수 표현식 (Expression)</text>
  <rect x="480" y="132" width="320" height="151" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="496" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 선언 전 호출 불가</text>
  <text x="496" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">add(1,2); </text><text x="574" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// ReferenceError</text>
  <text x="496" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="544" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> add = </text><text x="592" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="664" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(a, b) {</text>
  <text x="496" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  return</text><text x="556" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> a + b;</text>
  <text x="496" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">};</text>
  <text x="496" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 기명 함수 표현식</text>
  <text x="496" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="544" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> f = </text><text x="568" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="640" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> inner() {};</text>
  <text x="496" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">f.name; </text><text x="556" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 'inner'</text>

  <!-- 비교표 -->
  <rect x="60" y="315" width="760" height="175" fill="#111827" rx="8" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="440" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 차이점 비교</text>

  <!-- Table header -->
  <rect x="80" y="347" width="720" height="26" fill="#1a2030" rx="4"/>
  <text x="200" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">항목</text>
  <text x="440" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">선언식</text>
  <text x="680" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">표현식</text>

  <line x1="80" y1="373" x2="800" y2="373" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">호이스팅</text>
  <text x="440" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">전체 호이스팅</text>
  <text x="680" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">변수만 (TDZ)</text>

  <line x1="80" y1="399" x2="800" y2="399" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">선언 전 호출</text>
  <text x="440" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">가능</text>
  <text x="680" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">불가 (ReferenceError)</text>

  <line x1="80" y1="425" x2="800" y2="425" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">스코프</text>
  <text x="440" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">함수/전역 스코프</text>
  <text x="680" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">블록 스코프 (const/let)</text>

  <line x1="80" y1="451" x2="800" y2="451" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="469" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">조건부 정의</text>
  <text x="440" y="469" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">비표준 동작</text>
  <text x="680" y="469" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">자유롭게 가능</text>

  <!-- Column dividers -->
  <line x1="320" y1="347" x2="320" y2="480" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="560" y1="347" x2="560" y2="480" stroke="#2a2a2a" stroke-width="1"/>

  <text x="440" y="520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN — JavaScript 완전 정복</text>
</svg>
