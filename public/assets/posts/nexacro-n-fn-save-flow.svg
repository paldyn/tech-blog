<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fn_save() 저장 처리 흐름</text>

  <!-- Step 1: Button click -->
  <rect x="60" y="70" width="380" height="46" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">① 저장 버튼 클릭 → fn_save()</text>
  <text x="250" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">btn_save.onclick = "fn_save"</text>

  <polygon points="247,116 253,116 253,154 259,154 250,166 241,154 247,154"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Step 2: Change check -->
  <rect x="60" y="166" width="380" height="46" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">② 변경 사항 확인</text>
  <text x="250" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">INSERT + UPDATE + DELETE 행 수 합계 확인</text>

  <!-- Right arrow to "no change" box -->
  <polygon points="440,185 498,185 498,180 510,188 498,196 498,191 440,191"
           fill="#888" stroke="#0a0a0a" stroke-width="1"/>
  <text x="475" y="178"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경 없음</text>
  <rect x="510" y="166" width="310" height="46" fill="#1a1a1a" rx="6" stroke="#888" stroke-width="1"/>
  <text x="665" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">alert → return</text>
  <text x="665" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">저장 불필요</text>

  <polygon points="247,212 253,212 253,250 259,250 250,262 241,250 247,250"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>
  <text x="270" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경 있음</text>

  <!-- Step 3: Validation -->
  <rect x="60" y="262" width="380" height="46" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">③ 유효성 검사</text>
  <text x="250" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">gfn_validate(ds_list) — 필수값·형식·범위</text>

  <!-- Right arrow to "validation fail" -->
  <polygon points="440,281 498,281 498,276 510,284 498,292 498,287 440,287"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="475" y="274"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">검증 실패</text>
  <rect x="510" y="262" width="310" height="46" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="665" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">오류 메시지 표시 → return</text>
  <text x="665" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">해당 셀 포커스 이동</text>

  <polygon points="247,308 253,308 253,346 259,346 250,358 241,346 247,346"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>
  <text x="270" y="336"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">검증 통과</text>

  <!-- Step 4: Transaction -->
  <rect x="60" y="358" width="380" height="46" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="2"/>
  <text x="250" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">④ transaction() 서버 저장 요청</text>
  <text x="250" y="396" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ds_list 전체 (변경 행 포함) → 서버 처리</text>

  <polygon points="247,404 253,404 253,442 259,442 250,454 241,442 247,442"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Step 5: Callback -->
  <rect x="60" y="454" width="380" height="50" fill="#122a12" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="250" y="474" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">⑤ fn_saveCb() → 성공</text>
  <text x="250" y="494" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">savePoint() → alert → fn_search() 재조회</text>

  <!-- Right arrow to "error" -->
  <polygon points="440,473 498,473 498,468 510,476 498,484 498,479 440,479"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="475" y="466"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">서버 오류</text>
  <rect x="510" y="454" width="310" height="50" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="665" y="474" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">alert(errMsg) → return</text>
  <text x="665" y="494" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Dataset 변경 상태 유지</text>

  <!-- Bottom note -->
  <text x="440" y="536"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">서버 처리 성공 후 fn_search() 재조회 시 rowStatus가 NORMAL로 자동 초기화됨</text>
</svg>
