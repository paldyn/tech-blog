<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">firewalld 존(Zone) 신뢰 수준</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">존에 인터페이스를 할당해 허용 트래픽을 제어한다</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#1e2433" stroke-width="1"/>

  <!-- Table header -->
  <rect x="60" y="92" width="760" height="42" rx="6" fill="#12192a"/>
  <line x1="180" y1="92" x2="180" y2="134" stroke="#1e2433" stroke-width="1"/>
  <line x1="290" y1="92" x2="290" y2="134" stroke="#1e2433" stroke-width="1"/>
  <line x1="430" y1="92" x2="430" y2="134" stroke="#1e2433" stroke-width="1"/>
  <text x="120" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">존 이름</text>
  <text x="235" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">기본 정책</text>
  <text x="360" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">신뢰 수준</text>
  <text x="625" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">용도</text>

  <!-- Row: trusted -->
  <rect x="60" y="134" width="760" height="44" fill="#0d1520"/>
  <line x1="180" y1="134" x2="180" y2="178" stroke="#1e2433" stroke-width="1"/>
  <line x1="290" y1="134" x2="290" y2="178" stroke="#1e2433" stroke-width="1"/>
  <line x1="430" y1="134" x2="430" y2="178" stroke="#1e2433" stroke-width="1"/>
  <text x="120" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" xml:space="preserve">trusted</text>
  <text x="235" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">ACCEPT</text>
  <text x="360" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">최상 ★★★★★</text>
  <text x="625" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">모든 트래픽 허용 (루프백 등)</text>

  <!-- Row: home -->
  <rect x="60" y="178" width="760" height="44" fill="#0a0a0a"/>
  <line x1="180" y1="178" x2="180" y2="222" stroke="#1e2433" stroke-width="1"/>
  <line x1="290" y1="178" x2="290" y2="222" stroke="#1e2433" stroke-width="1"/>
  <line x1="430" y1="178" x2="430" y2="222" stroke="#1e2433" stroke-width="1"/>
  <text x="120" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" xml:space="preserve">home / work</text>
  <text x="235" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" xml:space="preserve">선택적 허용</text>
  <text x="360" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" xml:space="preserve">높음 ★★★★</text>
  <text x="625" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">내부 LAN, 사무실 네트워크</text>

  <!-- Row: public -->
  <rect x="60" y="222" width="760" height="44" fill="#0d1520"/>
  <line x1="180" y1="222" x2="180" y2="266" stroke="#1e2433" stroke-width="1"/>
  <line x1="290" y1="222" x2="290" y2="266" stroke="#1e2433" stroke-width="1"/>
  <line x1="430" y1="222" x2="430" y2="266" stroke="#1e2433" stroke-width="1"/>
  <text x="120" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" xml:space="preserve">public</text>
  <text x="235" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" xml:space="preserve">최소 허용</text>
  <text x="360" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" xml:space="preserve">보통 ★★★</text>
  <text x="625" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">기본 존. 공용 인터페이스</text>

  <!-- Row: dmz -->
  <rect x="60" y="266" width="760" height="44" fill="#0a0a0a"/>
  <line x1="180" y1="266" x2="180" y2="310" stroke="#1e2433" stroke-width="1"/>
  <line x1="290" y1="266" x2="290" y2="310" stroke="#1e2433" stroke-width="1"/>
  <line x1="430" y1="266" x2="430" y2="310" stroke="#1e2433" stroke-width="1"/>
  <text x="120" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" xml:space="preserve">dmz</text>
  <text x="235" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">SSH만 허용</text>
  <text x="360" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">낮음 ★★</text>
  <text x="625" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">DMZ 서버 (웹·메일 서버)</text>

  <!-- Row: drop -->
  <rect x="60" y="310" width="760" height="44" fill="#0d1520"/>
  <line x1="180" y1="310" x2="180" y2="354" stroke="#1e2433" stroke-width="1"/>
  <line x1="290" y1="310" x2="290" y2="354" stroke="#1e2433" stroke-width="1"/>
  <line x1="430" y1="310" x2="430" y2="354" stroke="#1e2433" stroke-width="1"/>
  <text x="120" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" xml:space="preserve">drop / block</text>
  <text x="235" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">DROP / REJECT</text>
  <text x="360" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">최저 ★</text>
  <text x="625" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">모든 수신 차단 (응답 없음)</text>

  <rect x="60" y="92" width="760" height="262" rx="6" fill="none" stroke="#1e2433" stroke-width="1"/>
</svg>
