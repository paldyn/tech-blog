<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">프로퍼티 디스크립터 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Property Descriptor — 데이터 vs 접근자</text>

  <!-- Left column: Data Descriptor -->
  <text x="200" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">데이터 디스크립터</text>

  <rect x="60" y="120" width="280" height="220" fill="#0d1520" rx="8" stroke="#1e2433"/>

  <!-- value -->
  <rect x="80" y="140" width="240" height="40" fill="#111827" rx="6" stroke="#1e3a5f"/>
  <text x="100" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">value</text>
  <text x="100" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실제 저장된 값 (any)</text>

  <!-- writable -->
  <rect x="80" y="192" width="240" height="40" fill="#111827" rx="6" stroke="#1e3a5f"/>
  <text x="100" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">writable</text>
  <text x="100" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">값 변경 허용 여부 (boolean)</text>

  <!-- enumerable -->
  <rect x="80" y="244" width="240" height="40" fill="#111827" rx="6" stroke="#1e3a5f"/>
  <text x="100" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">enumerable</text>
  <text x="100" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">for..in, Object.keys 노출 여부</text>

  <!-- configurable -->
  <rect x="80" y="296" width="240" height="40" fill="#111827" rx="6" stroke="#1e3a5f"/>
  <text x="100" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">configurable</text>
  <text x="100" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디스크립터 변경/삭제 허용 여부</text>

  <!-- Right column: Accessor Descriptor -->
  <text x="660" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">접근자 디스크립터</text>

  <rect x="530" y="120" width="290" height="220" fill="#0d1a12" rx="8" stroke="#1e3320"/>

  <!-- get -->
  <rect x="550" y="140" width="250" height="40" fill="#0f1f14" rx="6" stroke="#1e4a2a"/>
  <text x="570" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">get</text>
  <text x="570" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">읽기 시 호출되는 함수</text>

  <!-- set -->
  <rect x="550" y="192" width="250" height="40" fill="#0f1f14" rx="6" stroke="#1e4a2a"/>
  <text x="570" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">set</text>
  <text x="570" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">쓰기 시 호출되는 함수</text>

  <!-- enumerable -->
  <rect x="550" y="244" width="250" height="40" fill="#0f1f14" rx="6" stroke="#1e4a2a"/>
  <text x="570" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">enumerable</text>
  <text x="570" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">for..in, Object.keys 노출 여부</text>

  <!-- configurable -->
  <rect x="550" y="296" width="250" height="40" fill="#0f1f14" rx="6" stroke="#1e4a2a"/>
  <text x="570" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">configurable</text>
  <text x="570" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디스크립터 변경/삭제 허용 여부</text>

  <!-- VS divider -->
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#444">VS</text>
  <line x1="440" y1="120" x2="440" y2="340" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Mutual exclusion note -->
  <rect x="60" y="360" width="760" height="50" fill="#1a1410" rx="8" stroke="#3a2a10"/>
  <text x="440" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">⚠ 상호 배타적</text>
  <text x="440" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">value/writable 과 get/set 을 동시에 지정하면 TypeError 발생</text>

  <!-- Default values note -->
  <rect x="60" y="428" width="760" height="36" fill="#111" rx="6" stroke="#222"/>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기본값: </text>
  <text x="490" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">value: undefined  </text>
  <text x="610" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">writable / enumerable / configurable: false</text>

  <!-- Footer -->
  <text x="440" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
