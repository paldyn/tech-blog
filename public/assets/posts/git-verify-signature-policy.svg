<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">서명 정책: log.showSignature &amp; GitHub 서명 검증</text>

  <!-- Left column: log.showSignature -->
  <rect x="60" y="76" width="360" height="52" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">자동 서명 표시 설정</text>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">git config --global log.showSignature true</text>

  <!-- Boxes under left column -->
  <rect x="60" y="150" width="168" height="70" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="144" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">서명 있음</text>
  <text x="144" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">G (Good)</text>
  <text x="144" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">유효 키</text>

  <rect x="252" y="150" width="168" height="70" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="336" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">서명 없음 / 불량</text>
  <text x="336" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">N / B / U</text>
  <text x="336" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">신뢰도 낮음</text>

  <!-- Right column: GitHub -->
  <rect x="460" y="76" width="360" height="52" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">GitHub 서명 뱃지</text>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Verified / Unverified 뱃지 표시</text>

  <rect x="460" y="150" width="160" height="70" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Verified</text>
  <text x="540" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GPG/SSH 키</text>
  <text x="540" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">계정에 등록됨</text>

  <rect x="660" y="150" width="160" height="70" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Unverified</text>
  <text x="740" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">키 미등록 or</text>
  <text x="740" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">서명 없음</text>

  <!-- Code block -->
  <rect x="60" y="248" width="760" height="196" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># git log 서명 상태 코드</text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> log <tspan fill="#ce9178">--format="%G? %GS %H %s"</tspan> <tspan fill="#b5cea8">-10</tspan></text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># %G? = G(good) B(bad) U(unknown) N(none) E(expired)</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 서명 없는 커밋 찾기</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> log <tspan fill="#ce9178">--format="%G? %H"</tspan> | <tspan fill="#7ec8e3" font-weight="600">grep</tspan> <tspan fill="#ce9178">'^N'</tspan></text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 브랜치 보호: required signed commits</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># GitHub Settings &gt; Branches &gt; Require signed commits</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 서명 없으면 push 거부됨</text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">git</tspan> push  <tspan fill="#9aa4b8"># ! [remote rejected] unsigned commit</tspan></text>
</svg>
