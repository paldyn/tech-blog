<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Railway Oriented Programming</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">성공 레일(상단)과 실패 레일(하단)이 병렬 진행</text>

  <!-- Success track -->
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">성공 레일</text>
  <line x1="60" y1="130" x2="820" y2="130" stroke="#55c555" stroke-width="3"/>

  <!-- Failure track -->
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">실패 레일</text>
  <line x1="60" y1="190" x2="820" y2="190" stroke="#e05555" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- Step 1: Parse -->
  <rect x="80" y="100" width="100" height="60" rx="6" fill="#001a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">1. Parse</text>
  <text x="130" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력 파싱</text>
  <!-- divert arrow -->
  <path d="M 130 160 Q 130 190 130 190" stroke="#e05555" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arrR)"/>

  <!-- Step 2: Validate -->
  <rect x="270" y="100" width="100" height="60" rx="6" fill="#001a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="320" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">2. Validate</text>
  <text x="320" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">유효성 검사</text>
  <path d="M 320 160 Q 320 190 320 190" stroke="#e05555" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arrR)"/>

  <!-- Step 3: Save -->
  <rect x="460" y="100" width="100" height="60" rx="6" fill="#001a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="510" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">3. Save</text>
  <text x="510" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DB 저장</text>
  <path d="M 510 160 Q 510 190 510 190" stroke="#e05555" stroke-width="1.5" fill="none" stroke-dasharray="4,4" marker-end="url(#arrR)"/>

  <!-- Step 4: Notify -->
  <rect x="650" y="100" width="100" height="60" rx="6" fill="#001a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">4. Notify</text>
  <text x="700" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">알림 발송</text>

  <!-- Error collectors on failure rail -->
  <rect x="190" y="173" width="80" height="34" rx="4" fill="#2d0000" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">ParseError</text>

  <rect x="375" y="173" width="80" height="34" rx="4" fill="#2d0000" stroke="#e05555" stroke-width="1"/>
  <text x="415" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">ValidationErr</text>

  <rect x="570" y="173" width="80" height="34" rx="4" fill="#2d0000" stroke="#e05555" stroke-width="1"/>
  <text x="610" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">DbError</text>

  <!-- Code block -->
  <rect x="60" y="240" width="760" height="188" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Railway: 각 단계가 Result를 반환, 에러 시 자동 우회</text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text x="120" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> processOrder = (raw) =></text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  parseOrder(raw)</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    .andThen(validateOrder)</text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    .andThen(saveOrder)</text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    .andThen(notifyUser)</text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    .match({ onOk: r => r, onErr: e => ({ error: e }) });</text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 어느 단계에서 실패해도 이후 단계 건너뜀</text>
</svg>
