<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Here Document 문법</text>

  <!-- Basic heredoc -->
  <rect x="60" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">기본 형태 (변수 확장 O)</text>
  <rect x="60" y="106" width="370" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">cat</tspan><tspan fill="#ffffff"> &lt;&lt;EOF</tspan></text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">안녕하세요, $USER</tspan></text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">오늘 날짜: $(date +%F)</tspan></text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">홈: $HOME</tspan></text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">EOF</tspan><tspan fill="#9aa4b8">                # 들여쓰기 없이 줄 시작</tspan></text>
  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="76" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 변수·명령 치환 적용됨</text>

  <!-- Quoted heredoc -->
  <rect x="450" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">인용 형태 (변수 확장 X)</text>
  <rect x="450" y="106" width="370" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">cat</tspan><tspan fill="#ffffff"> &lt;&lt;</tspan><tspan fill="#ce9178">'EOF'</tspan><tspan fill="#9aa4b8">  # 구분자를 따옴표로</tspan></text>
  <text x="466" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">변수: $USER     </tspan><tspan fill="#9aa4b8"># 그대로 출력</tspan></text>
  <text x="466" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">명령: $(whoami) </tspan><tspan fill="#9aa4b8"># 그대로 출력</tspan></text>
  <text x="466" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">이스케이프: \n  </tspan><tspan fill="#9aa4b8"># 그대로 출력</tspan></text>
  <text x="466" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ce9178">EOF</tspan></text>
  <text x="466" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 셸 스크립트 코드 출력에 유용</text>

  <!-- Indented heredoc -->
  <rect x="60" y="256" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">&lt;&lt;- 들여쓰기 제거</text>
  <rect x="60" y="298" width="370" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="318" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan></text>
  <text x="76" y="336" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">cat</tspan><tspan fill="#ffffff"> &lt;&lt;-EOF</tspan><tspan fill="#9aa4b8"> # - : 탭 제거</tspan></text>
  <text x="76" y="354" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">        들여쓴 내용</tspan></text>
  <text x="76" y="372" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">        여러 줄</tspan></text>
  <text x="76" y="390" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    EOF</tspan><tspan fill="#9aa4b8">  # 탭 들여쓰기 허용</tspan></text>
  <text x="76" y="408" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">fi</tspan></text>

  <!-- Here String -->
  <rect x="450" y="256" width="370" height="36" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="635" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">Here String (&lt;&lt;&lt;)</text>
  <rect x="450" y="298" width="370" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="318" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 문자열을 stdin으로 전달</text>
  <text x="466" y="336" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">read</tspan><tspan fill="#ffffff"> -r line &lt;&lt;&lt; </tspan><tspan fill="#ce9178">"hello world"</tspan></text>
  <text x="466" y="354" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $line  </tspan><tspan fill="#9aa4b8"># hello world</tspan></text>
  <text x="466" y="372" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">grep </tspan><tspan fill="#ce9178">"foo"</tspan><tspan fill="#ffffff"> &lt;&lt;&lt; </tspan><tspan fill="#ce9178">"foobar"</tspan></text>
  <text x="466" y="390" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="466" y="408" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">bc</tspan><tspan fill="#ffffff"> &lt;&lt;&lt; </tspan><tspan fill="#ce9178">"3 * 7"</tspan><tspan fill="#9aa4b8">  # 21</tspan></text>
</svg>
