<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">런타임 오류 처리 흐름</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">try/catch + onerror로 예외를 잡고 보고한다</text>

  <defs>
    <marker id="rd1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="rd2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="rd3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Top: script execution -->
  <rect x="280" y="100" width="320" height="55" rx="8" fill="#101010" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#c8c8c8" text-anchor="middle">스크립트 실행 중</text>
  <text x="440" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정상 흐름 or 예외 발생</text>

  <!-- Error branch -->
  <line x1="380" y1="155" x2="220" y2="205" stroke="#e05555" stroke-width="2" marker-end="url(#rd1)"/>
  <text x="280" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">예외 발생</text>

  <!-- Normal branch -->
  <line x1="500" y1="155" x2="660" y2="205" stroke="#55c555" stroke-width="2" marker-end="url(#rd2)"/>
  <text x="580" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">정상 완료</text>

  <!-- try/catch box -->
  <rect x="60" y="210" width="300" height="95" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="210" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">try / catch 블록</text>
  <text x="80" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• catch(e) { e.message, e.name }</text>
  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 오류 로그 기록 (gfn_error)</text>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 사용자 메시지 표시</text>

  <!-- onerror box -->
  <rect x="390" y="210" width="300" height="95" rx="8" fill="#10101a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">application.onerror</text>
  <text x="410" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• try/catch 외부 uncaught 예외</text>
  <text x="410" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 전역 오류 핸들러</text>
  <text x="410" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 서버 오류 리포트 전송 가능</text>

  <!-- Success box -->
  <rect x="560" y="210" width="280" height="95" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">정상 완료 처리</text>
  <text x="580" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• UI 상태 복원</text>
  <text x="580" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 로딩 인디케이터 숨기기</text>
  <text x="580" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">• 다음 단계 진행</text>

  <!-- finally -->
  <rect x="225" y="330" width="430" height="60" rx="8" fill="#101018" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">finally 블록 (항상 실행)</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">로딩 상태 해제 · 공통 정리 작업 · 버튼 재활성화</text>

  <!-- Arrows to finally -->
  <line x1="210" y1="305" x2="280" y2="330" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#rd3)"/>
  <line x1="440" y1="305" x2="440" y2="330" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#rd3)"/>

  <!-- Error reporting -->
  <rect x="60" y="408" width="760" height="50" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">오류 리포팅 전략</text>
  <text x="80" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">개발: trace() 상세 출력 | 운영: 서버 오류 리포트 API 전송 (스택 트레이스, 사용자 ID, 화면 ID, 시각)</text>
</svg>
