<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-pl" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">에러 경계 계층적 배치 전략</text>

  <!-- Level 1: Global -->
  <rect x="60" y="75" width="760" height="36" rx="6" fill="#2a1a1e" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">Global ErrorBoundary — 최후 안전망 (앱 전체 크래시 방지)</text>

  <!-- Level 2: Route/Page -->
  <rect x="80" y="125" width="340" height="36" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">Route ErrorBoundary (페이지별)</text>

  <rect x="440" y="125" width="380" height="36" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="630" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">Route ErrorBoundary (페이지별)</text>

  <!-- Level 3: Feature -->
  <rect x="80" y="178" width="156" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="158" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Sidebar EB</text>

  <rect x="248" y="178" width="172" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="334" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Widget EB</text>

  <rect x="440" y="178" width="172" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="526" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Chart EB</text>

  <rect x="624" y="178" width="196" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="722" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">DataTable EB</text>

  <!-- Code example -->
  <rect x="60" y="234" width="500" height="190" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 계층적 에러 경계 구성</text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> AppRoutes() {</tspan>
  </text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> (</tspan>
  </text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    &lt;</tspan>
    <tspan fill="#55c555">ErrorBoundary</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">FallbackComponent</tspan>
    <tspan fill="#ffffff">={AppCrash}&gt;</tspan>
  </text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      &lt;</tspan>
    <tspan fill="#55c555">Routes</tspan>
    <tspan fill="#ffffff">&gt;</tspan>
  </text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        &lt;</tspan>
    <tspan fill="#55c555">Route</tspan>
    <tspan fill="#ffffff"> path=</tspan>
    <tspan fill="#ce9178">"/dashboard"</tspan>
  </text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">          element={&lt;</tspan>
    <tspan fill="#55c555">PageBoundary</tspan>
    <tspan fill="#ffffff">&gt;&lt;</tspan>
    <tspan fill="#55c555">Dashboard</tspan>
    <tspan fill="#ffffff">/&gt;&lt;/</tspan>
    <tspan fill="#55c555">PageBoundary</tspan>
    <tspan fill="#ffffff">&gt;}</tspan>
  </text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        /&gt;</tspan>
  </text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  ...</text>

  <!-- Right side tips -->
  <rect x="580" y="234" width="240" height="190" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="600" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">배치 팁</text>
  <text x="600" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">1. 라우트마다 배치</text>
  <text x="600" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  → 페이지 수준 격리</text>
  <text x="600" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">2. 독립 위젯마다 배치</text>
  <text x="600" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  → 위젯 에러가 페이지 보존</text>
  <text x="600" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">3. Suspense + EB 조합</text>
  <text x="600" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  → 로딩/에러 한 곳에서</text>
  <text x="600" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ 너무 세분화 말것 — 디버깅 어려워짐</text>

  <!-- Bottom note -->
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">에러 경계는 React 트리에서 위쪽 경계가 아래쪽을 보호 — 에러는 가장 가까운 상위 경계에서 잡힘</text>
</svg>
