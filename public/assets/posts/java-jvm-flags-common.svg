<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">-XX 플래그 두 형태와 실제 값 확인</text>

  <!-- two forms -->
  <rect x="40" y="74" width="380" height="96" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="56" y="102" font-size="14" font-weight="600" fill="#e8e8e8">Boolean 플래그</text>
  <text x="56" y="128" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono',monospace">-XX:+UseG1GC   (켜기)</text>
  <text x="56" y="152" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono',monospace">-XX:-UseG1GC   (끄기)</text>

  <rect x="460" y="74" width="380" height="96" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="102" font-size="14" font-weight="600" fill="#e8e8e8">Value 플래그</text>
  <text x="476" y="128" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace">-XX:MaxGCPauseMillis=200</text>
  <text x="476" y="152" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace">-XX:MetaspaceSize=128m</text>

  <!-- diagnostic -->
  <rect x="40" y="186" width="800" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="58" y="214" fill="#9aa4b8"># 현재 JVM의 모든 플래그 최종값 덤프</tspan>
    <tspan x="58" y="236" fill="#ffffff">java -XX:+PrintFlagsFinal -version | grep MaxHeap</tspan>
    <tspan x="58" y="258" fill="#ffffff">    size_t MaxHeapSize = 4294967296   {product}</tspan>
  </text>
</svg>
