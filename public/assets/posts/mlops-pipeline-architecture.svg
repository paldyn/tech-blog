<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-a" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ML 파이프라인 전체 아키텍처</text>

  <!-- Stage 1: Data Ingestion -->
  <rect x="40" y="76" width="140" height="76" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="110" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">데이터 수집</text>
  <text x="110" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Data Ingestion</text>
  <text x="110" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Airflow / Prefect</text>

  <!-- Stage 2: Preprocessing -->
  <rect x="210" y="76" width="140" height="76" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="280" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">전처리</text>
  <text x="280" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Preprocessing</text>
  <text x="280" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Spark / Pandas</text>

  <!-- Stage 3: Feature Engineering -->
  <rect x="380" y="76" width="140" height="76" rx="8" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="450" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">피처 엔지니어링</text>
  <text x="450" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Feature Eng.</text>
  <text x="450" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Feature Store</text>

  <!-- Stage 4: Training -->
  <rect x="550" y="76" width="140" height="76" rx="8" fill="#2a2a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="620" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">모델 학습</text>
  <text x="620" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Training</text>
  <text x="620" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GPU / Distributed</text>

  <!-- Stage 5: Evaluation + Registry -->
  <rect x="720" y="76" width="130" height="76" rx="8" fill="#2a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="785" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">평가·등록</text>
  <text x="785" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Eval + Registry</text>
  <text x="785" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MLflow</text>

  <!-- Horizontal arrows stage 1~5 -->
  <line x1="180" y1="114" x2="208" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-a)"/>
  <line x1="350" y1="114" x2="378" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-a)"/>
  <line x1="520" y1="114" x2="548" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-a)"/>
  <line x1="690" y1="114" x2="718" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-a)"/>

  <!-- Separator -->
  <line x1="40" y1="172" x2="840" y2="172" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Orchestration layer -->
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">오케스트레이션 레이어</text>

  <!-- Airflow box -->
  <rect x="60" y="218" width="220" height="90" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Apache Airflow</text>
  <text x="170" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• DAG 기반 스케줄링</text>
  <text x="170" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• 의존성 관리 + 재시도</text>
  <text x="170" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• 대규모 배치 파이프라인</text>

  <!-- Kubeflow box -->
  <rect x="330" y="218" width="220" height="90" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Kubeflow Pipelines</text>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• Kubernetes 네이티브</text>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• 컨테이너 기반 스텝</text>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• GPU 자원 스케줄링</text>

  <!-- Prefect box -->
  <rect x="600" y="218" width="220" height="90" rx="8" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Prefect / ZenML</text>
  <text x="710" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• Python 코드 우선</text>
  <text x="710" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• 로컬 → 클라우드 전환</text>
  <text x="710" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• 관측성 + 알림</text>

  <!-- Code block -->
  <rect x="60" y="328" width="760" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Prefect 파이프라인 예시</text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> prefect </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> flow, task</tspan></text>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">@</tspan><tspan fill="#7ec8e3" font-weight="600">task</tspan><tspan fill="#ffffff">(retries=</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> preprocess(data_path: str) -> str: ...</tspan></text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">@</tspan><tspan fill="#7ec8e3" font-weight="600">flow</tspan><tspan fill="#ffffff">(name=</tspan><tspan fill="#ce9178">"ml-training-pipeline"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> run_pipeline():</tspan></text>
  <text x="76" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    processed = </tspan><tspan fill="#7ec8e3" font-weight="600">preprocess</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"s3://bucket/raw.csv"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="474" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    model = </tspan><tspan fill="#7ec8e3" font-weight="600">train</tspan><tspan fill="#ffffff">(processed)   </tspan><tspan fill="#9aa4b8"># 자동 의존성 추적</tspan></text>
</svg>
