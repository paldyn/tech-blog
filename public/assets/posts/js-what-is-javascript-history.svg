<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript의 역사</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">브라우저 스크립트에서 범용 언어까지</text>

  <!-- Vertical timeline line -->
  <line x1="220" y1="110" x2="220" y2="445" stroke="#2a2a2a" stroke-width="2"/>

  <!-- ── Node 1 : 1995 ── -->
  <circle cx="220" cy="140" r="10" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <text x="206" y="145" font-size="13" fill="#7ec8e3" text-anchor="end">1995</text>
  <text x="240" y="135" font-size="15" font-weight="600" fill="#e8e8e8">탄생</text>
  <text x="240" y="153" font-size="12" fill="#888">Netscape, 10일 만에 개발 · Mocha → JavaScript</text>

  <!-- ── Node 2 : 1997 ── -->
  <circle cx="220" cy="210" r="10" fill="#7777cc" stroke="#0a0a0a" stroke-width="2"/>
  <text x="206" y="215" font-size="13" fill="#7777cc" text-anchor="end">1997</text>
  <text x="240" y="205" font-size="15" font-weight="600" fill="#e8e8e8">ECMAScript 1.0 표준화</text>
  <text x="240" y="223" font-size="12" fill="#888">ECMA TC39 · 브라우저 간 호환성 확보</text>

  <!-- ── Node 3 : 2009 ── -->
  <circle cx="220" cy="280" r="10" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <text x="206" y="285" font-size="13" fill="#55c555" text-anchor="end">2009</text>
  <text x="240" y="275" font-size="15" font-weight="600" fill="#e8e8e8">서버 사이드 진출</text>
  <text x="240" y="293" font-size="12" fill="#888">Node.js (Ryan Dahl) · V8 엔진 · npm 생태계</text>

  <!-- ── Node 4 : 2015 ── -->
  <circle cx="220" cy="350" r="10" fill="#e05555" stroke="#0a0a0a" stroke-width="2"/>
  <text x="206" y="355" font-size="13" fill="#e05555" text-anchor="end">2015</text>
  <text x="240" y="345" font-size="15" font-weight="600" fill="#e8e8e8">ES6 / ES2015 대전환</text>
  <text x="240" y="363" font-size="12" fill="#888">클래스 · 모듈 · 화살표함수 · Promise · let/const</text>

  <!-- ── Node 5 : 2024 ── -->
  <circle cx="220" cy="420" r="10" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <text x="206" y="425" font-size="13" fill="#7ec8e3" text-anchor="end">2024</text>
  <text x="240" y="415" font-size="15" font-weight="600" fill="#e8e8e8">범용 언어로 성장</text>
  <text x="240" y="433" font-size="12" fill="#888">브라우저 · 서버 · 모바일 · 데스크탑 · 엣지 · IoT</text>

  <!-- Footer -->
  <text x="60" y="496" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part I — 언어의 본질과 역사</text>
</svg>
