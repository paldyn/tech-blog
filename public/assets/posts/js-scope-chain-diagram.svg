<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">스코프 체인 구조</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Scope Chain: Variable Lookup from Inner to Outer</text>

  <!-- Global scope -->
  <rect x="60" y="90" width="760" height="390" fill="#0d0a00" rx="10" stroke="#3a2a00" stroke-width="1.5"/>
  <text x="80" y="112" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">전역 스코프 (Global)</text>
  <text x="700" y="112" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">x = 'global'</text>

  <!-- outer function scope -->
  <rect x="90" y="124" width="700" height="300" fill="#0d0d0a" rx="8" stroke="#2a2a1a" stroke-width="1.5"/>
  <text x="110" y="146" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">outer() 스코프</text>
  <text x="680" y="146" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">y = 'outer'</text>

  <!-- inner function scope -->
  <rect x="120" y="158" width="640" height="230" fill="#0d0d1a" rx="8" stroke="#1a1a3a" stroke-width="1.5"/>
  <text x="140" y="180" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">inner() 스코프</text>
  <text x="660" y="180" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">z = 'inner'</text>

  <!-- Code inside inner -->
  <rect x="150" y="192" width="580" height="180" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="166" y="212" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> outer() {</text>
  <text x="166" y="230" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> y = <tspan fill="#ce9178">'outer'</tspan>;</text>
  <text x="166" y="248" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">function</tspan> inner() {</text>
  <text x="166" y="266" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">const</tspan> z = <tspan fill="#ce9178">'inner'</tspan>;</text>
  <text x="166" y="284" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    console.log(z); <tspan fill="#6a8aa0">// ① inner 스코프</tspan></text>
  <text x="166" y="302" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    console.log(y); <tspan fill="#6a8aa0">// ② outer 스코프</tspan></text>
  <text x="166" y="320" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    console.log(x); <tspan fill="#6a8aa0">// ③ 전역 스코프</tspan></text>
  <text x="166" y="338" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="166" y="356" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>

  <!-- Lookup arrows on right side -->
  <text x="760" y="290" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">① 발견</text>
  <text x="760" y="310" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">② 발견</text>
  <text x="760" y="330" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">③ 발견</text>

  <!-- Scope chain upward arrows -->
  <line x1="800" y1="200" x2="800" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="795,200 800,190 805,200" fill="#333"/>

  <!-- Bottom search direction -->
  <rect x="60" y="490" width="760" height="20" fill="none"/>
  <text x="440" y="504" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">변수 탐색 방향: 현재 스코프 → 외부 스코프 → ... → 전역 스코프 (없으면 ReferenceError)</text>
</svg>
