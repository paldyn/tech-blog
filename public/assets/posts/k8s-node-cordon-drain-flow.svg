<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Node Cordon / Drain 절차</text>

  <!-- Step 1: Cordon -->
  <rect x="40" y="76" width="240" height="120" rx="10" fill="#1a1a0a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Step 1: Cordon</text>
  <text x="160" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">kubectl cordon node-1</text>
  <text x="160" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">노드를 SchedulingDisabled 상태로</text>
  <text x="160" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">기존 Pod는 계속 실행</text>
  <text x="160" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">신규 Pod 스케줄 차단만</text>

  <line x1="280" y1="136" x2="320" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Drain -->
  <rect x="320" y="76" width="240" height="120" rx="10" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">Step 2: Drain</text>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">kubectl drain node-1</text>
  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Pod를 graceful하게 축출</text>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">PDB 존중하며 순차 처리</text>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Cordon 포함 (자동 실행)</text>

  <line x1="560" y1="136" x2="600" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Maintenance -->
  <rect x="600" y="76" width="240" height="120" rx="10" fill="#0a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="720" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Step 3: 작업</text>
  <text x="720" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">OS 업그레이드, 패치</text>
  <text x="720" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">하드웨어 교체, 커널 업데이트</text>
  <text x="720" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">재부팅 등 유지보수</text>
  <text x="720" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Pod 없는 상태에서 안전하게</text>

  <!-- Step 4: Uncordon -->
  <rect x="320" y="246" width="240" height="80" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Step 4: Uncordon</text>
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">kubectl uncordon node-1</text>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">스케줄 가능 상태 복원</text>

  <line x1="720" y1="196" x2="720" y2="286" stroke="#55c555" stroke-width="2"/>
  <line x1="720" y1="286" x2="560" y2="286" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- Node states -->
  <rect x="40" y="360" width="800" height="120" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Node 상태 전환</text>

  <rect x="60" y="398" width="160" height="66" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Ready</text>
  <text x="140" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">정상 스케줄 가능</text>
  <text x="140" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SchedulingEnabled</text>

  <line x1="220" y1="430" x2="260" y2="430" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="240" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">cordon</text>

  <rect x="260" y="398" width="180" height="66" rx="6" fill="#1a1a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">SchedulingDisabled</text>
  <text x="350" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기존 Pod 실행 중</text>
  <text x="350" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">신규 Pod 차단</text>

  <line x1="440" y1="430" x2="480" y2="430" stroke="#e05555" stroke-width="2" marker-end="url(#arrRed)"/>
  <text x="460" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">drain</text>

  <rect x="480" y="398" width="160" height="66" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="560" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">Draining</text>
  <text x="560" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Pod 축출 중</text>
  <text x="560" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">작업 대기</text>

  <line x1="640" y1="430" x2="680" y2="430" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="660" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">uncordon</text>

  <rect x="680" y="398" width="140" height="66" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="750" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Ready</text>
  <text x="750" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">복원 완료</text>
  <text x="750" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">스케줄 재개</text>
</svg>
