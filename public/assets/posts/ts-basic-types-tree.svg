<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 타입 분류</text>

  <!-- Root -->
  <rect x="350" y="64" width="180" height="44" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">TypeScript 타입</text>

  <!-- Lines from root -->
  <line x1="350" y1="86" x2="200" y2="152" stroke="#444" stroke-width="1.5"/>
  <line x1="440" y1="108" x2="440" y2="152" stroke="#444" stroke-width="1.5"/>
  <line x1="530" y1="86" x2="680" y2="152" stroke="#444" stroke-width="1.5"/>

  <!-- Primitives -->
  <rect x="100" y="154" width="200" height="44" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">원시 타입 (Primitive)</text>

  <!-- Object types -->
  <rect x="340" y="154" width="200" height="44" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">객체 타입 (Object)</text>

  <!-- Special types -->
  <rect x="580" y="154" width="200" height="44" rx="6" fill="#2a1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="680" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">특수 타입 (Special)</text>

  <!-- Primitive children -->
  <line x1="130" y1="198" x2="90" y2="254" stroke="#333" stroke-width="1"/>
  <line x1="160" y1="198" x2="160" y2="254" stroke="#333" stroke-width="1"/>
  <line x1="190" y1="198" x2="220" y2="254" stroke="#333" stroke-width="1"/>
  <line x1="220" y1="198" x2="280" y2="254" stroke="#333" stroke-width="1"/>
  <line x1="240" y1="198" x2="340" y2="254" stroke="#333" stroke-width="1"/>

  <rect x="60" y="256" width="76" height="36" rx="4" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="98" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">string</text>

  <rect x="144" y="256" width="76" height="36" rx="4" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="182" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">number</text>

  <rect x="228" y="256" width="76" height="36" rx="4" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="266" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">boolean</text>

  <rect x="312" y="256" width="76" height="36" rx="4" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">bigint</text>

  <!-- Symbol at bottom -->
  <rect x="144" y="312" width="76" height="36" rx="4" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="182" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">symbol</text>

  <!-- Object children -->
  <line x1="380" y1="198" x2="380" y2="254" stroke="#333" stroke-width="1"/>
  <line x1="410" y1="198" x2="440" y2="254" stroke="#333" stroke-width="1"/>
  <line x1="470" y1="198" x2="500" y2="254" stroke="#333" stroke-width="1"/>
  <line x1="500" y1="198" x2="554" y2="254" stroke="#333" stroke-width="1"/>

  <rect x="354" y="256" width="76" height="36" rx="4" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="392" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">object</text>

  <rect x="438" y="256" width="76" height="36" rx="4" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">array</text>

  <rect x="522" y="256" width="76" height="36" rx="4" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">tuple</text>

  <!-- function at bottom -->
  <rect x="438" y="312" width="76" height="36" rx="4" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">function</text>

  <!-- Special children -->
  <line x1="630" y1="198" x2="598" y2="254" stroke="#333" stroke-width="1"/>
  <line x1="660" y1="198" x2="660" y2="254" stroke="#333" stroke-width="1"/>
  <line x1="700" y1="198" x2="730" y2="254" stroke="#333" stroke-width="1"/>
  <line x1="730" y1="198" x2="784" y2="254" stroke="#333" stroke-width="1"/>

  <rect x="568" y="256" width="76" height="36" rx="4" fill="#2a1a0d" stroke="#ce9178" stroke-width="1"/>
  <text x="606" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600" text-anchor="middle">any</text>

  <rect x="652" y="256" width="76" height="36" rx="4" fill="#2a1a0d" stroke="#ce9178" stroke-width="1"/>
  <text x="690" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600" text-anchor="middle">unknown</text>

  <rect x="736" y="256" width="76" height="36" rx="4" fill="#2a1a0d" stroke="#ce9178" stroke-width="1"/>
  <text x="774" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600" text-anchor="middle">never</text>

  <!-- void and null -->
  <rect x="568" y="312" width="76" height="36" rx="4" fill="#2a1a0d" stroke="#ce9178" stroke-width="1"/>
  <text x="606" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600" text-anchor="middle">void</text>

  <rect x="652" y="312" width="76" height="36" rx="4" fill="#2a1a0d" stroke="#ce9178" stroke-width="1"/>
  <text x="690" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600" text-anchor="middle">null</text>

  <rect x="736" y="312" width="76" height="36" rx="4" fill="#2a1a0d" stroke="#ce9178" stroke-width="1"/>
  <text x="774" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600" text-anchor="middle">undefined</text>

  <!-- Bottom note -->
  <rect x="60" y="376" width="760" height="98" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 대부분의 타입은 소문자 (원시 타입 키워드)</text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">let </text>
  <text x="106" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">x: </text>
  <text x="124" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">string </text>
  <text x="178" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// OK (소문자 string)</text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">let </text>
  <text x="106" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">y: </text>
  <text x="124" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">String </text>
  <text x="172" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 피할 것! String 래퍼 객체 (박싱된 타입)</text>
  <text x="76" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// Number, Boolean, Object 대문자 버전도 피할 것</text>
  <text x="76" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> </text>
</svg>
