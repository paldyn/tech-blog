<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MVCC 튜플 버전 체인</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">xmin·xmax·ctid로 추적하는 다중 버전 동시성</text>

  <!-- Transaction timeline -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">트랜잭션 흐름</text>

  <!-- Txn blocks -->
  <rect x="60" y="116" width="100" height="36" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="110" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Txn 100</text>

  <rect x="200" y="116" width="100" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Txn 101</text>

  <rect x="340" y="116" width="100" height="36" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Txn 102</text>

  <text x="500" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">INSERT → UPDATE → UPDATE</text>

  <!-- Heap page -->
  <text x="60" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Heap 페이지 내 튜플 상태</text>

  <!-- Tuple v1: inserted by 100 -->
  <rect x="60" y="200" width="750" height="72" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">버전 1 (ctid 0,1)</text>
  <rect x="80" y="228" width="80" height="28" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">xmin=100</text>
  <rect x="170" y="228" width="80" height="28" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="210" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">xmax=101</text>
  <rect x="260" y="228" width="80" height="28" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="300" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ctid=(0,1)</text>
  <rect x="350" y="228" width="300" height="28" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="500" y="247" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">name='Alice', age=30</text>
  <text x="680" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Dead (xmax=101 커밋됨)</text>

  <!-- Tuple v2: updated by 101 -->
  <rect x="60" y="282" width="750" height="72" rx="8" fill="#1a1a0d" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="80" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c84a" font-weight="600">버전 2 (ctid 0,2)</text>
  <rect x="80" y="310" width="80" height="28" rx="4" fill="#3a3a1a" stroke="#e8c84a" stroke-width="1"/>
  <text x="120" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c84a" text-anchor="middle">xmin=101</text>
  <rect x="170" y="310" width="80" height="28" rx="4" fill="#3a3a1a" stroke="#e8c84a" stroke-width="1"/>
  <text x="210" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">xmax=102</text>
  <rect x="260" y="310" width="80" height="28" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="300" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ctid=(0,2)</text>
  <rect x="350" y="310" width="300" height="28" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="500" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">name='Alice', age=31</text>
  <text x="680" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Dead (xmax=102 커밋됨)</text>

  <!-- Tuple v3: updated by 102 -->
  <rect x="60" y="364" width="750" height="72" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">버전 3 (ctid 0,3) — Live</text>
  <rect x="80" y="392" width="80" height="28" rx="4" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">xmin=102</text>
  <rect x="170" y="392" width="80" height="28" rx="4" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="210" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">xmax=0</text>
  <rect x="260" y="392" width="80" height="28" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="300" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ctid=(0,3)</text>
  <rect x="350" y="392" width="300" height="28" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="500" y="411" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">name='Alice', age=32</text>
  <text x="680" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Live (현재 버전)</text>

  <!-- Note -->
  <rect x="60" y="452" width="760" height="48" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">가시성 규칙: 내 스냅샷 기준 xmin 커밋 &amp;&amp; xmax 미커밋(또는 0) → 보임</text>
  <text x="440" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">xmax=0이면 아직 삭제/업데이트 안 됨 | VACUUM이 Dead 버전 회수</text>
</svg>
