<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="ae" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 고객 지원 처리 워크플로우</text>

  <!-- Step 1: Ticket -->
  <rect x="330" y="68" width="220" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="92" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">고객 문의 접수</text>
  <text x="440" y="113" text-anchor="middle" font-size="12" fill="#888">이메일 · 채팅 · 앱</text>

  <line x1="440" y1="128" x2="440" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Step 2: Classify -->
  <rect x="330" y="158" width="220" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="182" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">AI 분류 · 우선순위</text>
  <text x="440" y="203" text-anchor="middle" font-size="12" fill="#888">카테고리 · 긴급도 판별</text>

  <!-- Fork: auto vs escalate -->
  <line x1="390" y1="218" x2="240" y2="278" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="490" y1="218" x2="640" y2="278" stroke="#e05555" stroke-width="2" marker-end="url(#ae)"/>
  <text x="300" y="255" text-anchor="middle" font-size="11" fill="#55c555">자동 처리 가능</text>
  <text x="580" y="255" text-anchor="middle" font-size="11" fill="#e05555">복잡 · 긴급</text>

  <!-- Auto path -->
  <rect x="100" y="278" width="280" height="60" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="302" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">AI 자동 답변 생성</text>
  <text x="240" y="323" text-anchor="middle" font-size="12" fill="#888">FAQ · 지식베이스 기반</text>

  <!-- Escalate path -->
  <rect x="500" y="278" width="280" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="302" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">상담원 에스컬레이션</text>
  <text x="640" y="323" text-anchor="middle" font-size="12" fill="#888">AI 요약본 + 이력 전달</text>

  <!-- Join at review -->
  <line x1="240" y1="338" x2="350" y2="394" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="640" y1="338" x2="530" y2="394" stroke="#e05555" stroke-width="2" marker-end="url(#ae)"/>

  <!-- Review + send -->
  <rect x="270" y="394" width="300" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="420" y="418" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">검토 · 발송</text>
  <text x="420" y="439" text-anchor="middle" font-size="12" fill="#888">품질 확인 후 고객에게 전달</text>
</svg>
