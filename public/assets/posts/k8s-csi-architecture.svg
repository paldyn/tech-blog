<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CSI 드라이버 아키텍처</text>

  <!-- Kubernetes side label -->
  <rect x="60" y="64" width="400" height="340" rx="10" fill="none" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="90" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#3a4a6e">쿠버네티스 컴포넌트</text>

  <!-- kube-controller-manager -->
  <rect x="80" y="96" width="180" height="54" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">kube-controller-manager</text>
  <text x="170" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PV/PVC 컨트롤러</text>

  <!-- kubelet -->
  <rect x="80" y="270" width="180" height="54" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">kubelet</text>
  <text x="170" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">노드 볼륨 마운트 요청</text>

  <!-- CSI Driver side label -->
  <rect x="480" y="64" width="360" height="340" rx="10" fill="none" stroke="#7777cc" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="510" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">CSI 드라이버 컴포넌트</text>

  <!-- External Provisioner -->
  <rect x="500" y="96" width="160" height="54" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="580" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">external-provisioner</text>
  <text x="580" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PVC → CreateVolume 호출</text>

  <!-- External Attacher -->
  <rect x="500" y="176" width="160" height="54" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="580" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">external-attacher</text>
  <text x="580" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">VolumeAttachment → ControllerPublish</text>

  <!-- Node Plugin (CSI Node) -->
  <rect x="500" y="256" width="160" height="54" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="580" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">CSI Node Plugin</text>
  <text x="580" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">NodeStageVolume, NodePublish</text>

  <!-- Cloud API -->
  <rect x="692" y="156" width="128" height="60" rx="6" fill="#0f1a2e" stroke="#888" stroke-width="1"/>
  <text x="756" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">클라우드 API</text>
  <text x="756" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AWS / GCP / Azure</text>

  <!-- Arrows -->
  <!-- kube-controller-manager -> external-provisioner -->
  <line x1="460" y1="118" x2="500" y2="118" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="476" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Watch</text>

  <!-- kube-controller-manager -> external-attacher -->
  <line x1="460" y1="123" x2="500" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- kubelet -> CSI Node -->
  <line x1="460" y1="294" x2="500" y2="280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="476" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">gRPC</text>

  <!-- external-provisioner -> cloud -->
  <line x1="660" y1="136" x2="710" y2="162" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>

  <!-- external-attacher -> cloud -->
  <line x1="660" y1="200" x2="692" y2="190" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>

  <!-- 3 RPCs labels section -->
  <rect x="60" y="428" width="760" height="72" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">CSI 주요 gRPC 인터페이스</text>

  <text x="160" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">IdentityService</text>
  <text x="160" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">드라이버 정보, 기능 선언</text>

  <text x="440" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">ControllerService</text>
  <text x="440" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Create/Delete/Attach/Detach/Snapshot</text>

  <text x="720" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">NodeService</text>
  <text x="720" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Stage/Unstage/Publish/Unpublish</text>

  <!-- vertical dividers -->
  <line x1="300" y1="440" x2="300" y2="492" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="580" y1="440" x2="580" y2="492" stroke="#2a2a2a" stroke-width="1"/>
</svg>
