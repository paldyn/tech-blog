<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">RTK Query 데이터 흐름</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">훅 구독부터 캐시 확인, 서버 요청까지</text>

  <!-- Row: component / cache / server -->
  <rect x="50" y="100" width="200" height="60" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">컴포넌트</text>
  <text x="150" y="144" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">useGetPostsQuery()</text>

  <rect x="340" y="100" width="200" height="60" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">RTK Query 캐시</text>
  <text x="440" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">api reducer 슬라이스</text>

  <rect x="630" y="100" width="200" height="60" rx="8" fill="#200d0d" stroke="#e05555" stroke-width="2"/>
  <text x="730" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">서버</text>
  <text x="730" y="144" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">fetchBaseQuery</text>

  <!-- Arrows between boxes -->
  <line x1="250" y1="115" x2="340" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="295" y="97" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">구독 시작</text>
  <line x1="340" y1="145" x2="250" y2="145" stroke="#55c555" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arrGreen)"/>
  <text x="295" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">캐시 데이터 반환</text>

  <line x1="540" y1="115" x2="630" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="585" y="97" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">캐시 미스</text>
  <line x1="630" y1="145" x2="540" y2="145" stroke="#55c555" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arrGreen)"/>
  <text x="585" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">응답 저장</text>

  <!-- Status flags section -->
  <text x="440" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">훅이 반환하는 상태 플래그</text>

  <rect x="60" y="262" width="240" height="60" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="180" y="286" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8c800">isLoading</text>
  <text x="180" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">캐시 없음 + 첫 요청 중</text>

  <rect x="320" y="262" width="240" height="60" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="286" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">isFetching</text>
  <text x="440" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">캐시 표시 중 재요청</text>

  <rect x="580" y="262" width="240" height="60" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="700" y="286" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">isSuccess</text>
  <text x="700" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">data 사용 가능</text>

  <text x="440" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">구독이 모두 해제되면 keepUnusedDataFor(기본 60초) 이후 캐시가 제거된다</text>
</svg>
