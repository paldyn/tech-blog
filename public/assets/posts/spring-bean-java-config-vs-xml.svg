<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Java Config vs XML Config 비교</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#888">@Configuration / @Bean 대 &lt;bean&gt; XML 태그</text>

  <!-- Column headers -->
  <rect x="60" y="82" width="360" height="36" rx="6" fill="#0f1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">Java Config (@Configuration)</text>

  <rect x="460" y="82" width="360" height="36" rx="6" fill="#1a1308" stroke="#e8a03a" stroke-width="1.5"/>
  <text x="640" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#e8a03a">XML Config (&lt;beans&gt; / &lt;bean&gt;)</text>

  <!-- Left code block -->
  <rect x="60" y="126" width="360" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="149" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">@Configuration</text>
  <text x="76" y="167" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">public class </text>
  <text x="184" y="167" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">AppConfig {</text>
  <text x="76" y="185" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  </text>
  <text x="76" y="203" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  @Bean</text>
  <text x="76" y="221" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  public </text>
  <text x="142" y="221" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">OrderService orderService() {</text>
  <text x="76" y="239" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">    return new </text>
  <text x="172" y="239" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">OrderService(discountPolicy());</text>
  <text x="76" y="257" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  }</text>
  <text x="76" y="275" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  </text>
  <text x="76" y="293" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  @Bean</text>
  <text x="76" y="311" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  public </text>
  <text x="142" y="311" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">DiscountPolicy discountPolicy() {</text>
  <text x="76" y="329" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">    return new </text>
  <text x="172" y="329" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">RateDiscountPolicy();</text>
  <text x="76" y="347" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  }}</text>

  <!-- Right code block -->
  <rect x="460" y="126" width="360" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="149" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">&lt;beans ...&gt;</text>
  <text x="476" y="167" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  </text>
  <text x="476" y="185" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  &lt;bean </text>
  <text x="534" y="185" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">id</text>
  <text x="549" y="185" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="orderService"</text>
  <text x="476" y="203" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">        class</text>
  <text x="536" y="203" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="c.e.OrderService"</text>
  <text x="662" y="203" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">&gt;</text>
  <text x="476" y="221" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">    &lt;constructor-arg </text>
  <text x="624" y="221" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">ref</text>
  <text x="645" y="221" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="discountPolicy"</text>
  <text x="782" y="221" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">/&gt;</text>
  <text x="476" y="239" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  &lt;/bean&gt;</text>
  <text x="476" y="257" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  </text>
  <text x="476" y="275" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  &lt;bean </text>
  <text x="534" y="275" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">id</text>
  <text x="549" y="275" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="discountPolicy"</text>
  <text x="476" y="293" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">        class</text>
  <text x="536" y="293" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="c.e.RateDiscountPolicy"</text>
  <text x="718" y="293" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">/&gt;</text>
  <text x="476" y="311" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">&lt;/beans&gt;</text>

  <!-- Comparison table -->
  <rect x="60" y="358" width="760" height="90" rx="8" fill="#111" stroke="#222"/>
  <!-- Headers -->
  <text x="130" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#888">항목</text>
  <text x="330" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">Java Config</text>
  <text x="640" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#e8a03a">XML Config</text>
  <line x1="200" y1="364" x2="200" y2="448" stroke="#222" stroke-width="1"/>
  <line x1="490" y1="364" x2="490" y2="448" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="390" x2="820" y2="390" stroke="#222" stroke-width="1"/>
  <!-- Row 1 -->
  <text x="130" y="407" text-anchor="middle" font-size="12" fill="#888">타입 안전성</text>
  <text x="330" y="407" text-anchor="middle" font-size="12" fill="#55c555">컴파일 타임 체크 ✓</text>
  <text x="640" y="407" text-anchor="middle" font-size="12" fill="#e05555">런타임에 오류 발견</text>
  <line x1="60" y1="416" x2="820" y2="416" stroke="#222" stroke-width="1"/>
  <!-- Row 2 -->
  <text x="130" y="434" text-anchor="middle" font-size="12" fill="#888">IDE 지원</text>
  <text x="330" y="434" text-anchor="middle" font-size="12" fill="#55c555">자동완성·리팩터링 완전 지원</text>
  <text x="640" y="434" text-anchor="middle" font-size="12" fill="#888">플러그인 의존, 부분 지원</text>

  <!-- Footer -->
  <text x="440" y="464" text-anchor="middle" font-size="11" fill="#444">현대 스프링 프로젝트에서는 Java Config가 표준 — XML은 레거시 연동·외부 라이브러리 등록 시 선택적으로 사용</text>
</svg>
