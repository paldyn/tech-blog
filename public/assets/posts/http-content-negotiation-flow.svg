<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">콘텐츠 협상 흐름</text>
    <!-- Client -->
    <rect x="60" y="70" width="200" height="280" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="160" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">클라이언트</text>
    <line x1="60" y1="108" x2="260" y2="108" stroke="#4a7aaa" stroke-width="1"/>
    <text x="80" y="130" font-size="11" fill="#888">Accept 협상 헤더</text>
    <text x="80" y="150" font-size="12" fill="#e8e8e8">Accept:</text>
    <text x="80" y="168" font-size="11" fill="#888"> text/html, app/json</text>
    <text x="80" y="193" font-size="12" fill="#e8e8e8">Accept-Language:</text>
    <text x="80" y="211" font-size="11" fill="#888"> ko-KR, en-US</text>
    <text x="80" y="236" font-size="12" fill="#e8e8e8">Accept-Encoding:</text>
    <text x="80" y="254" font-size="11" fill="#888"> gzip, br, deflate</text>
    <text x="80" y="279" font-size="12" fill="#e8e8e8">Accept-Charset:</text>
    <text x="80" y="297" font-size="11" fill="#888"> utf-8, iso-8859-1</text>
    <text x="80" y="330" font-size="11" fill="#7777cc">선호도 표현</text>
    <!-- Server -->
    <rect x="620" y="70" width="200" height="280" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="720" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">서버</text>
    <line x1="620" y1="108" x2="820" y2="108" stroke="#3aaa5a" stroke-width="1"/>
    <text x="640" y="130" font-size="11" fill="#888">Vary 헤더로 캐시 키 선언</text>
    <text x="640" y="152" font-size="12" fill="#e8e8e8">Content-Type:</text>
    <text x="640" y="170" font-size="11" fill="#888"> application/json</text>
    <text x="640" y="195" font-size="12" fill="#e8e8e8">Content-Language:</text>
    <text x="640" y="213" font-size="11" fill="#888"> ko</text>
    <text x="640" y="238" font-size="12" fill="#e8e8e8">Content-Encoding:</text>
    <text x="640" y="256" font-size="11" fill="#888"> gzip</text>
    <text x="640" y="281" font-size="12" fill="#e8e8e8">Vary:</text>
    <text x="640" y="299" font-size="11" fill="#888"> Accept, Accept-Language</text>
    <text x="640" y="330" font-size="11" fill="#7777cc">최적 표현 선택 후 응답</text>
    <!-- Middle: negotiation process -->
    <rect x="310" y="130" width="260" height="160" rx="8" fill="#1a1a0f" stroke="#aaaa3a" stroke-width="1.5"/>
    <text x="440" y="154" text-anchor="middle" font-size="13" font-weight="600" fill="#dddd55">서버 측 협상 알고리즘</text>
    <text x="330" y="178" font-size="11" fill="#888">1. Accept → 미디어 타입 선택</text>
    <text x="330" y="198" font-size="11" fill="#888">2. Accept-Language → 언어 선택</text>
    <text x="330" y="218" font-size="11" fill="#888">3. Accept-Encoding → 압축 선택</text>
    <text x="330" y="238" font-size="11" fill="#888">4. 모두 불가 → 406 Not Acceptable</text>
    <text x="330" y="270" font-size="11" fill="#7777cc">q-factor로 우선순위 결정</text>
    <!-- Arrows -->
    <line x1="260" y1="200" x2="310" y2="200" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="285" y="192" text-anchor="middle" font-size="10" fill="#7ec8e3">요청</text>
    <line x1="570" y1="200" x2="620" y2="200" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
    <text x="595" y="192" text-anchor="middle" font-size="10" fill="#55c555">응답</text>
    <text x="440" y="410" text-anchor="middle" font-size="11" fill="#555">서버 주도 협상(Server-Driven) — 클라이언트 힌트(Client Hints)로 보완 가능</text>
  </g>
</svg>
