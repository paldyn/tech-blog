<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JavaScript의 7가지 원시 타입</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">불변(immutable) · 값에 의한 비교 · 스택에 직접 저장</text>

  <!-- Primitive type boxes -->
  <!-- Row 1 -->
  <rect x="60" y="100" width="170" height="80" rx="10" fill="#0e1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="145" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">number</text>
  <text x="145" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">64비트 부동소수점</text>
  <text x="145" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">42 / 3.14 / Infinity / NaN</text>

  <rect x="248" y="100" width="170" height="80" rx="10" fill="#0e150e" stroke="#55c555" stroke-width="1.5"/>
  <text x="333" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">string</text>
  <text x="333" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">UTF-16 코드 단위</text>
  <text x="333" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">'hello' / "world" / `tmpl`</text>

  <rect x="436" y="100" width="170" height="80" rx="10" fill="#2e2a1a" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="521" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8c55a" text-anchor="middle">boolean</text>
  <text x="521" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">논리값</text>
  <text x="521" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">true / false</text>

  <rect x="624" y="100" width="196" height="80" rx="10" fill="#2e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="722" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">symbol</text>
  <text x="722" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">고유 식별자 (ES2015)</text>
  <text x="722" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">Symbol('desc')</text>

  <!-- Row 2 -->
  <rect x="140" y="204" width="170" height="80" rx="10" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="225" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">null</text>
  <text x="225" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">의도적 빈 값</text>
  <text x="225" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">null</text>

  <rect x="328" y="204" width="200" height="80" rx="10" fill="#1e1e1e" stroke="#666" stroke-width="1.5"/>
  <text x="428" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#aaa" text-anchor="middle">undefined</text>
  <text x="428" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">초기화되지 않은 값</text>
  <text x="428" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">undefined</text>

  <rect x="546" y="204" width="194" height="80" rx="10" fill="#1a2e20" stroke="#55c5aa" stroke-width="1.5"/>
  <text x="643" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c5aa" text-anchor="middle">bigint</text>
  <text x="643" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">임의 정밀도 정수 (ES2020)</text>
  <text x="643" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">9007199254740993n</text>

  <!-- Key characteristics -->
  <rect x="60" y="310" width="760" height="140" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">원시 타입의 핵심 특성</text>

  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">불변(Immutable)</text>
  <text x="210" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">— 한 번 생성된 원시 값은 변경 불가. 'hello'.toUpperCase()는 새 문자열 반환</text>

  <text x="80" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">값에 의한 복사(Copy by Value)</text>
  <text x="270" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">— 변수에 할당 시 값 자체가 복사됨</text>

  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55a">값에 의한 비교(Compared by Value)</text>
  <text x="290" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">— 같은 값이면 === 동등. 예외: NaN !== NaN</text>

  <text x="80" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">래퍼 객체(Wrapper Object)</text>
  <text x="218" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">— 'hello'.length 같은 접근 시 임시 객체로 자동 박싱됨</text>

  <text x="440" y="483" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
