<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript 원시 타입 7가지</text>

  <!-- Grid: 7 type boxes -->
  <!-- Row 1 -->
  <!-- number -->
  <rect x="60" y="68" width="178" height="110" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="149" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#7ec8e3">number</text>
  <text x="149" y="116" text-anchor="middle" font-size="11" fill="#888">IEEE 754 부동소수점</text>
  <text x="74" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">42</text>
  <text x="100" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve"> · </text>
  <text x="112" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">3.14</text>
  <text x="140" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve"> · </text>
  <text x="152" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">NaN</text>
  <text x="74" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">Infinity · -Infinity</text>
  <text x="74" y="168" font-size="10" fill="#555">정수/실수 구분 없음</text>

  <!-- string -->
  <rect x="254" y="68" width="178" height="110" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="343" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#ce9178">string</text>
  <text x="343" y="116" text-anchor="middle" font-size="11" fill="#888">UTF-16 코드 유닛</text>
  <text x="268" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"hello"</text>
  <text x="316" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve"> · </text>
  <text x="328" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">'world'</text>
  <text x="268" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">`template`</text>
  <text x="268" y="168" font-size="10" fill="#555">불변(immutable)</text>

  <!-- boolean -->
  <rect x="448" y="68" width="178" height="110" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="537" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#55c555">boolean</text>
  <text x="537" y="116" text-anchor="middle" font-size="11" fill="#888">참/거짓 두 값</text>
  <text x="462" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">true</text>
  <text x="494" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve"> · </text>
  <text x="506" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">false</text>
  <text x="462" y="168" font-size="10" fill="#555">조건문의 기본 단위</text>

  <!-- null -->
  <rect x="642" y="68" width="178" height="110" rx="8" fill="#0d1117" stroke="#888" stroke-width="1.5"/>
  <text x="731" y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#888">null</text>
  <text x="731" y="116" text-anchor="middle" font-size="11" fill="#888">의도적인 빈값</text>
  <text x="656" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">null</text>
  <text x="656" y="154" font-size="10" fill="#555">typeof null === "object"</text>
  <text x="656" y="168" font-size="10" fill="#e05555">(역사적 버그)</text>

  <!-- Row 2 -->
  <!-- undefined -->
  <rect x="60" y="196" width="178" height="110" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="149" y="224" text-anchor="middle" font-size="16" font-weight="700" fill="#7777cc">undefined</text>
  <text x="149" y="244" text-anchor="middle" font-size="11" fill="#888">값이 없음</text>
  <text x="74" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" xml:space="preserve">undefined</text>
  <text x="74" y="282" font-size="10" fill="#555">선언만 된 변수의 기본값</text>
  <text x="74" y="296" font-size="10" fill="#555">반환값 없는 함수</text>

  <!-- Symbol -->
  <rect x="254" y="196" width="178" height="110" rx="8" fill="#0d1117" stroke="#f7df1e" stroke-width="1.5"/>
  <text x="343" y="224" text-anchor="middle" font-size="16" font-weight="700" fill="#f7df1e">Symbol</text>
  <text x="343" y="244" text-anchor="middle" font-size="11" fill="#888">ES2015 유일한 식별자</text>
  <text x="268" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#f7df1e" xml:space="preserve">Symbol('id')</text>
  <text x="268" y="282" font-size="10" fill="#555">매번 다른 값 생성</text>
  <text x="268" y="296" font-size="10" fill="#555">Well-known Symbols</text>

  <!-- BigInt -->
  <rect x="448" y="196" width="178" height="110" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="537" y="224" text-anchor="middle" font-size="16" font-weight="700" fill="#ce9178">BigInt</text>
  <text x="537" y="244" text-anchor="middle" font-size="11" fill="#888">ES2020 임의 정밀도</text>
  <text x="462" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">9007199254740992n</text>
  <text x="462" y="282" font-size="10" fill="#555">number 범위 초과 정수</text>
  <text x="462" y="296" font-size="10" fill="#555">암호화·금융 계산</text>

  <!-- Primitive vs Reference -->
  <rect x="60" y="326" width="760" height="130" rx="10" fill="#0d1117" stroke="#333"/>
  <text x="440" y="350" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">원시 타입 vs 참조 타입</text>

  <rect x="80" y="362" width="330" height="80" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="100" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 원시 타입 — 값 복사</text>
  <text x="100" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">let</text>
  <text x="124" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> a = </text>
  <text x="160" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="168" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, b = a;</text>
  <text x="100" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">a = </text>
  <text x="128" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">99</text>
  <text x="148" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="100" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">b; // 1 (영향 없음)</text>

  <rect x="430" y="362" width="370" height="80" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="450" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 참조 타입 — 주소 복사</text>
  <text x="450" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">let</text>
  <text x="474" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> a = {x: </text>
  <text x="554" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="562" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}, b = a;</text>
  <text x="450" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">a.x = </text>
  <text x="498" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">99</text>
  <text x="516" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="450" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">b.x; // 99 (같은 객체 참조!)</text>

  <!-- Footer -->
  <text x="440" y="482" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #9</text>
</svg>
