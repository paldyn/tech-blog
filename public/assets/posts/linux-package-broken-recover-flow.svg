<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrPkg" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="520" rx="12" fill="#0a0a0a"/>
  <text x="60" y="44" font-size="22" font-weight="700" fill="#e8e8e8">깨진 패키지 복구 결정 흐름</text>

  <!-- Box1 -->
  <rect x="160" y="80" width="560" height="72" rx="8" fill="#141414" stroke="#e05555" stroke-width="1.5"/>
  <text x="184" y="102" font-size="13" font-weight="600" fill="#e8e8e8">① 증상 — apt/dpkg 명령이 에러로 멈춤</text>
  <text x="184" y="120" font-size="11" fill="#9aa4b8">dpkg was interrupted / unmet dependencies</text>
  <text x="184" y="138" font-size="11" fill="#9aa4b8">Sub-process returned an error code</text>

  <line x1="440" y1="152" x2="440" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrPkg)"/>

  <!-- Box2 -->
  <rect x="160" y="192" width="560" height="60" rx="8" fill="#141414" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="184" y="216" font-size="13" font-weight="600" fill="#7ec8e3">② dpkg --configure -a</text>
  <text x="184" y="236" font-size="11" fill="#9aa4b8">중단된 패키지 설정 작업을 마저 끝낸다</text>

  <line x1="440" y1="252" x2="440" y2="290" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrPkg)"/>

  <!-- Box3 -->
  <rect x="160" y="292" width="560" height="72" rx="8" fill="#141414" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="184" y="314" font-size="13" font-weight="600" fill="#7ec8e3">③ apt-get install -f  (--fix-broken)</text>
  <text x="184" y="332" font-size="11" fill="#9aa4b8">깨진 의존성을 자동으로 해결한다</text>
  <text x="184" y="350" font-size="11" fill="#9aa4b8">필요한 패키지 설치 · 충돌 패키지 제거</text>

  <line x1="440" y1="364" x2="440" y2="402" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrPkg)"/>

  <!-- Box4 -->
  <rect x="160" y="404" width="560" height="72" rx="8" fill="#141414" stroke="#55c555" stroke-width="1.5"/>
  <text x="184" y="426" font-size="13" font-weight="600" fill="#55c555">④ 그래도 실패하면 — 강제 복구</text>
  <text x="184" y="444" font-size="11" fill="#9aa4b8">dpkg --remove --force-remove-reinstreq pkg</text>
  <text x="184" y="462" font-size="11" fill="#9aa4b8">apt-get install --reinstall pkg 로 재설치</text>
</svg>
