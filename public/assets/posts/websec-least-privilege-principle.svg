<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">최소 권한 원칙 (Principle of Least Privilege)</text>

  <!-- Left column: WITHOUT PoLP -->
  <rect x="60" y="70" width="360" height="360" rx="8" fill="#100a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">PoLP 미적용 — 과도한 권한</text>

  <rect x="80" y="115" width="320" height="55" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">DB 계정: root</text>
  <text x="240" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ALL PRIVILEGES — 모든 DB 수정 가능</text>

  <rect x="80" y="185" width="320" height="55" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">API 서비스: Admin 토큰</text>
  <text x="240" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사용자 삭제, 설정 변경까지 가능</text>

  <rect x="80" y="255" width="320" height="55" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">앱 서버: root 실행</text>
  <text x="240" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OS 전체 파일 시스템 접근</text>

  <rect x="80" y="355" width="320" height="55" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">침해 시 피해 범위</text>
  <text x="240" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전체 시스템 장악 가능</text>

  <!-- Arrow between columns -->
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" fill="#3a4a6e" text-anchor="middle">vs</text>

  <!-- Right column: WITH PoLP -->
  <rect x="460" y="70" width="360" height="360" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">PoLP 적용 — 최소 권한</text>

  <rect x="480" y="115" width="320" height="55" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">DB 계정: app_user</text>
  <text x="640" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SELECT, INSERT만 허용 (해당 테이블만)</text>

  <rect x="480" y="185" width="320" height="55" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">API 서비스: 읽기 전용 토큰</text>
  <text x="640" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">필요한 API 엔드포인트만 접근</text>

  <rect x="480" y="255" width="320" height="55" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">앱 서버: 전용 계정 실행</text>
  <text x="640" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">앱 디렉토리만 읽기/쓰기</text>

  <rect x="480" y="355" width="320" height="55" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">침해 시 피해 범위</text>
  <text x="640" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">해당 서비스 범위로 제한</text>

  <!-- Bottom bar -->
  <rect x="60" y="448" width="760" height="20" rx="4" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">최소 권한 원칙: 작업에 필요한 최소한의 권한만 부여하고, 나머지는 기본 거부</text>
</svg>
