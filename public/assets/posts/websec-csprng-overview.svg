<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">PRNG vs CSPRNG: 암호학적 안전 난수 생성</text>

  <!-- PRNG Column -->
  <rect x="60" y="66" width="370" height="44" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">PRNG (일반 난수 생성기)</text>

  <!-- CSPRNG Column -->
  <rect x="450" y="66" width="370" height="44" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">CSPRNG (암호학적 안전 난수)</text>

  <!-- PRNG: Seed -->
  <rect x="60" y="124" width="370" height="60" rx="6" fill="#120808" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">예측 가능한 시드</text>
  <text x="245" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">random.seed(time.time()) — 타임스탬프 기반</text>
  <text x="245" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">공격자가 시간 유추 시 시드 예측 가능</text>

  <!-- CSPRNG: Entropy -->
  <rect x="450" y="124" width="370" height="60" rx="6" fill="#0d200d" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">하드웨어 엔트로피</text>
  <text x="635" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">키보드 타이밍, 마우스 움직임, 인터럽트, 열잡음</text>
  <text x="635" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">물리적으로 예측 불가능한 엔트로피 수집</text>

  <!-- PRNG: Algorithm -->
  <rect x="60" y="196" width="370" height="60" rx="6" fill="#120808" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">선형 합동 알고리즘 등</text>
  <text x="245" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">출력 몇 개만 보면 다음 값 예측 가능</text>
  <text x="245" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">통계 테스트는 통과, 암호에는 부적합</text>

  <!-- CSPRNG: OS -->
  <rect x="450" y="196" width="370" height="60" rx="6" fill="#0d200d" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">OS 엔트로피 풀</text>
  <text x="635" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Linux: /dev/urandom · Windows: BCryptGenRandom</text>
  <text x="635" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">연속 출력으로 이전 상태 역산 불가</text>

  <!-- PRNG: Use -->
  <rect x="60" y="268" width="370" height="54" rx="6" fill="#120808" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">적합한 용도</text>
  <text x="245" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">시뮬레이션, 게임, 테스트 데이터</text>
  <text x="245" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">보안 관련 용도에 절대 사용 금지</text>

  <!-- CSPRNG: Use -->
  <rect x="450" y="268" width="370" height="54" rx="6" fill="#0d200d" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">적합한 용도</text>
  <text x="635" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">암호화 키, 솔트, 토큰, 세션 ID, OTP, IV/nonce</text>
  <text x="635" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">보안 용도는 무조건 CSPRNG</text>

  <!-- Code comparison -->
  <rect x="60" y="340" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">❌  import random; token = str(random.randint(100000, 999999))  # OTP에 사용 — 예측 가능!</text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">❌  session_id = str(time.time())  # 타임스탬프 기반 ID — 추측 가능</text>
  <text x="76" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">──────────────────────────────────────────</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">✅  import secrets; token = secrets.token_hex(32)  # CSPRNG 사용</text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">✅  import os; key = os.urandom(32)  # 32바이트 암호화 키</text>
</svg>
