<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 코드 리뷰 자동화</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">GitHub Actions + Claude API Review Bot</text>

  <!-- Left: review prompt -->
  <text x="80" y="102" font-size="13" font-weight="600" fill="#55c555">AI 리뷰 프롬프트 템플릿</text>
  <rect x="60" y="114" width="370" height="216" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">review_prompt = </text>
  <text x="76" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">"""다음 코드 변경사항을 리뷰해줘.</text>
  <text x="76" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">각 이슈를 심각도로 분류해:</text>
  <text x="76" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">🔴 Critical: 즉시 수정 필요</text>
  <text x="76" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">🟡 Warning: 개선 권장</text>
  <text x="76" y="228" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">🔵 Info: 선택적 개선</text>
  <text x="76" y="248" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">특히 확인할 것:</text>
  <text x="76" y="266" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">- 보안: SQL 인젝션, XSS</text>
  <text x="76" y="284" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">- 성능: N+1 쿼리, 비효율</text>
  <text x="76" y="302" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">- 에러 처리 누락</text>
  <text x="76" y="322" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">코드: {diff}"""</text>

  <!-- Right: GitHub Actions workflow -->
  <text x="456" y="102" font-size="13" font-weight="600" fill="#7ec8e3">GitHub Actions 자동 리뷰</text>
  <rect x="440" y="114" width="380" height="216" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># .github/workflows/ai-review.yml</text>
  <text x="456" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">name: AI Code Review</text>
  <text x="456" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600" xml:space="preserve">on</text>
  <text x="482" y="172" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">: pull_request</text>
  <text x="456" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">jobs:</text>
  <text x="456" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  review:</text>
  <text x="456" y="228" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    runs-on: ubuntu-latest</text>
  <text x="456" y="248" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    steps:</text>
  <text x="456" y="266" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">      - uses: actions/checkout@v4</text>
  <text x="456" y="284" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">      - name: Claude Review</text>
  <text x="456" y="302" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">        uses: anthropics/</text>
  <text x="456" y="320" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">          claude-code-action@beta</text>
  <text x="456" y="338" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">        env: ANTHROPIC_API_KEY</text>

  <!-- Bottom tips -->
  <text x="60" y="362" font-size="14" font-weight="600" fill="#e8e8e8">리뷰봇 운영 팁</text>

  <rect x="60" y="378" width="230" height="28" rx="5" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="175" y="397" text-anchor="middle" font-size="12" fill="#888">Critical만 PR 블로킹 적용</text>

  <rect x="306" y="378" width="230" height="28" rx="5" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="421" y="397" text-anchor="middle" font-size="12" fill="#888">파일별 컨텍스트 주석 제공</text>

  <rect x="552" y="378" width="268" height="28" rx="5" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="686" y="397" text-anchor="middle" font-size="12" fill="#888">팀 피드백으로 프롬프트 지속 개선</text>

  <text x="60" y="414" font-size="12" fill="#555">* AI 리뷰 코멘트에 "[AI Generated]" 레이블 부착 권장 — 리뷰어가 AI 의견임을 인지하도록</text>
</svg>
