<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arro" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Loki 아키텍처 — 라벨만 인덱싱한다</text>

  <!-- Alloy agent -->
  <rect x="60" y="100" width="200" height="76" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Alloy (Promtail)</text>
  <text x="160" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DaemonSet 수집기</text>
  <text x="160" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">라벨 부착 후 push</text>

  <line x1="260" y1="138" x2="330" y2="138" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Loki -->
  <rect x="330" y="100" width="250" height="180" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="455" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Loki</text>

  <rect x="348" y="146" width="214" height="50" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="455" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">인덱스: 라벨 조합만</text>
  <text x="455" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" text-anchor="middle">{namespace, app, pod}</text>

  <rect x="348" y="204" width="214" height="50" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="455" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">본문: 압축 청크로 저장</text>
  <text x="455" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">내용은 인덱싱하지 않음</text>

  <line x1="455" y1="280" x2="455" y2="330" stroke="#ce9178" stroke-width="2" marker-end="url(#arro)"/>

  <!-- object storage -->
  <rect x="330" y="330" width="250" height="70" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="455" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">오브젝트 스토리지 (S3 · GCS)</text>
  <text x="455" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">청크 + 인덱스 보관 — 저렴한 장기 보존</text>

  <line x1="580" y1="190" x2="650" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Grafana -->
  <rect x="650" y="132" width="170" height="116" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="735" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Grafana</text>
  <text x="735" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LogQL로 조회</text>
  <text x="735" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메트릭과 같은 화면에서</text>

  <!-- LogQL example -->
  <text x="160" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">LogQL 쿼리 예시</text>

  <rect x="60" y="304" width="200" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{<tspan fill="#ce9178">app="api"</tspan>}</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">|=</tspan> <tspan fill="#ce9178">"error"</tspan></text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">| json</tspan></text>

  <!-- bottom -->
  <rect x="60" y="440" width="760" height="64" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="467" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">"라벨로 좁히고, 본문은 그 자리에서 grep" — 인덱스가 작아 가볍고 저렴</text>
  <text x="440" y="489" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대가: 라벨 없이 전체 기간 전문 검색은 Elasticsearch보다 느리다</text>
</svg>
