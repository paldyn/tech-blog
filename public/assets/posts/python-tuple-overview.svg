<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">튜플 — 불변 시퀀스</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">생성 · 언패킹 · 해시 · namedtuple</text>

  <!-- Creation and access -->
  <rect x="60" y="100" width="360" height="340" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="240" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">생성과 기초</text>
  <rect x="80" y="142" width="320" height="280" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 생성</tspan></text>
  <text x="96" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">t = (</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="96" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">t2 = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#6a8aa0">    # 괄호 생략 가능</tspan></text>
  <text x="96" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">single = (</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,)  </tspan><tspan fill="#6a8aa0"># 쉼표 필수!</tspan></text>
  <text x="96" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">wrong = (</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">)   </tspan><tspan fill="#e05555"># int 1 (튜플 아님)</tspan></text>
  <text x="96" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">empty = ()</tspan></text>
  <text x="96" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 수정 불가</tspan></text>
  <text x="96" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">t[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">] = </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#e8e8e8">   </tspan><tspan fill="#e05555"># TypeError!</tspan></text>
  <text x="96" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 해시 가능 → dict 키 가능</tspan></text>
  <text x="96" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d = {(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">): </tspan><tspan fill="#ce9178">"origin"</tspan><tspan fill="#e8e8e8">}</tspan></text>
  <text x="96" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">s = {(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">), (</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">)}</tspan></text>
  <text x="96" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 가변 원소 포함 시 해시 불가</tspan></text>
  <text x="96" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">bad = ([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">],)  </tspan><tspan fill="#e05555"># unhashable!</tspan></text>
  <text x="96" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">good = ((</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">),)  </tspan><tspan fill="#55c555"># OK</tspan></text>

  <!-- unpacking -->
  <rect x="460" y="100" width="360" height="340" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">언패킹 패턴</text>
  <rect x="480" y="142" width="320" height="280" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 기본 언패킹</tspan></text>
  <text x="496" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">x, y, z = (</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="496" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 스왑</tspan></text>
  <text x="496" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a, b = b, a</tspan></text>
  <text x="496" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 별표 언패킹</tspan></text>
  <text x="496" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">first, *rest = (</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="496" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># first=1, rest=[2,3,4]</tspan></text>
  <text x="496" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 중첩 언패킹</tspan></text>
  <text x="496" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">(a, b), c = (</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">), </tspan><tspan fill="#b5cea8">3</tspan></text>
  <text x="496" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># for 루프 언패킹</tspan></text>
  <text x="496" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">pts = [(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">), (</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">)]</tspan></text>
  <text x="496" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> x, y </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> pts:</tspan></text>
  <text x="496" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(x, y)</tspan></text>
  <text x="496" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 0 1  /  2 3</tspan></text>
</svg>
