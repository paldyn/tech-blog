<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N Form 타입 계층 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Application → Frame → Form 계층</text>

  <!-- Application box -->
  <rect x="320" y="96" width="240" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Application</text>
  <text x="440" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">앱 최상위 컨테이너</text>

  <!-- Arrow down from Application -->
  <line x1="440" y1="150" x2="440" y2="178" stroke="#555" stroke-width="2"/>
  <polygon points="440,184 435,174 445,174" fill="#555"/>

  <!-- MainFrame box -->
  <rect x="290" y="186" width="300" height="54" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">MainFrame</text>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">앱의 뼈대 — Header·Nav·Content 영역</text>

  <!-- Branch lines from MainFrame -->
  <line x1="440" y1="240" x2="440" y2="268" stroke="#555" stroke-width="2"/>
  <!-- Left branch -->
  <line x1="440" y1="268" x2="160" y2="268" stroke="#555" stroke-width="2"/>
  <!-- Right branch -->
  <line x1="440" y1="268" x2="720" y2="268" stroke="#555" stroke-width="2"/>
  <!-- Center branch -->
  <!-- Down arrows from branch points -->
  <line x1="160" y1="268" x2="160" y2="286" stroke="#555" stroke-width="2"/>
  <polygon points="160,292 155,282 165,282" fill="#555"/>
  <line x1="440" y1="268" x2="440" y2="286" stroke="#555" stroke-width="2"/>
  <polygon points="440,292 435,282 445,282" fill="#555"/>
  <line x1="720" y1="268" x2="720" y2="286" stroke="#555" stroke-width="2"/>
  <polygon points="720,292 715,282 725,282" fill="#555"/>

  <!-- ChildFrame -->
  <rect x="60" y="294" width="200" height="54" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">ChildFrame</text>
  <text x="160" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">MainFrame 내 하위 프레임</text>

  <!-- Form (Normal) -->
  <rect x="340" y="294" width="200" height="54" rx="8" fill="#1a1208" stroke="#e8c84a" stroke-width="2"/>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c84a" text-anchor="middle">Form (일반)</text>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">화면 단위 xfdl 파일</text>

  <!-- PopupForm -->
  <rect x="620" y="294" width="200" height="54" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="720" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">PopupForm</text>
  <text x="720" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">독립 팝업 창</text>

  <!-- Sub-items under Form -->
  <line x1="440" y1="348" x2="440" y2="372" stroke="#555" stroke-width="2"/>
  <polygon points="440,378 435,368 445,368" fill="#555"/>
  <rect x="340" y="380" width="200" height="44" rx="8" fill="#12180d" stroke="#7a9955" stroke-width="1.5"/>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#a8cc88" text-anchor="middle">BaseForm (추상)</text>
  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">상속 전용 · 직접 표시 안 됨</text>

  <!-- Sub-items under ChildFrame -->
  <line x1="160" y1="348" x2="160" y2="372" stroke="#555" stroke-width="2"/>
  <polygon points="160,378 155,368 165,368" fill="#555"/>
  <rect x="60" y="380" width="200" height="44" rx="8" fill="#0a1620" stroke="#4a8aa0" stroke-width="1.5"/>
  <text x="160" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Include Form</text>
  <text x="160" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">화면 조각 재사용</text>

  <!-- Sub-items under PopupForm -->
  <line x1="720" y1="348" x2="720" y2="372" stroke="#555" stroke-width="2"/>
  <polygon points="720,378 715,368 725,368" fill="#555"/>
  <rect x="620" y="380" width="200" height="44" rx="8" fill="#1a0f0d" stroke="#c06050" stroke-width="1.5"/>
  <text x="720" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e09070" text-anchor="middle">Modal / Modaless</text>
  <text x="720" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">블로킹 여부로 구분</text>

  <!-- Legend -->
  <rect x="60" y="454" width="760" height="46" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="76" y="470" width="12" height="12" rx="2" fill="#55c555"/>
  <text x="94" y="481" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프레임 계층</text>
  <rect x="196" y="470" width="12" height="12" rx="2" fill="#e8c84a"/>
  <text x="214" y="481" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일반 Form</text>
  <rect x="316" y="470" width="12" height="12" rx="2" fill="#e05555"/>
  <text x="334" y="481" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">팝업 Form</text>
  <rect x="436" y="470" width="12" height="12" rx="2" fill="#7ec8e3"/>
  <text x="454" y="481" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Include Form</text>
  <rect x="566" y="470" width="12" height="12" rx="2" fill="#7777cc"/>
  <text x="584" y="481" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Application / 추상</text>

  <!-- Footer -->
  <text x="440" y="510" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
