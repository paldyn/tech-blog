<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스크립트 오류 처리 계층</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">클라이언트 예외 / 트랜잭션 오류 / 전역 오류 핸들러</text>

  <!-- Layer 1: try-catch -->
  <rect x="60" y="100" width="760" height="80" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Layer 1 — try-catch (런타임 예외)</text>
  <text x="160" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스크립트 실행 중 예상치 못한 null 참조, 타입 오류 등을 포착</text>
  <rect x="700" y="110" width="104" height="60" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="752" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">try { } catch</text>

  <!-- Arrow -->
  <line x1="440" y1="180" x2="440" y2="196" stroke="#555" stroke-width="1.5"/>
  <polygon points="434,196 440,208 446,196" fill="#555"/>

  <!-- Layer 2: transaction callback -->
  <rect x="60" y="208" width="760" height="80" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Layer 2 — 트랜잭션 콜백 오류 처리</text>
  <text x="160" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">errCode !== 0 체크 → 서버 비즈니스 오류 / 네트워크 오류 처리</text>
  <rect x="700" y="218" width="104" height="60" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="752" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">fn_*Cb</text>

  <!-- Arrow -->
  <line x1="440" y1="288" x2="440" y2="304" stroke="#555" stroke-width="1.5"/>
  <polygon points="434,304 440,316 446,304" fill="#555"/>

  <!-- Layer 3: ontransactionerror -->
  <rect x="60" y="316" width="760" height="80" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Layer 3 — ontransactionerror (전역)</text>
  <text x="160" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Application 레벨 전역 오류 핸들러 — 콜백 미지정 트랜잭션 오류 포착</text>
  <rect x="700" y="326" width="104" height="60" rx="6" fill="#2e0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="752" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle">app.ontrans</text>

  <!-- Bottom: session expired -->
  <rect x="60" y="416" width="760" height="48" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">세션 만료 처리</text>
  <text x="160" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">errCode === -200 (세션 만료) → 로그인 페이지로 이동</text>
</svg>
