<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#55c555"/>
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SBERT 샴 네트워크 아키텍처</text>

  <!-- Input sentences -->
  <rect x="80" y="76" width="300" height="40" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" text-anchor="middle">문장 A: "AI가 발전했다"</text>

  <rect x="500" y="76" width="300" height="40" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" text-anchor="middle">문장 B: "인공지능 기술 성장"</text>

  <!-- Labels -->
  <text x="230" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">입력 A</text>
  <text x="650" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">입력 B</text>

  <!-- Arrows down to BERT towers -->
  <line x1="230" y1="116" x2="230" y2="148" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="650" y1="116" x2="650" y2="148" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- BERT Tower A -->
  <rect x="80" y="152" width="300" height="160" fill="#111" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="230" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">BERT Encoder</text>

  <!-- Transformer layers A -->
  <rect x="100" y="188" width="260" height="28" fill="#0d1a22" rx="4" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="230" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Transformer Layer 12</text>
  <rect x="100" y="220" width="260" height="28" fill="#0d1a22" rx="4" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="230" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Transformer Layer ···</text>
  <rect x="100" y="252" width="260" height="28" fill="#0d1a22" rx="4" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="230" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Transformer Layer 1</text>
  <text x="230" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">가중치 공유 (Shared Weights)</text>

  <!-- BERT Tower B -->
  <rect x="500" y="152" width="300" height="160" fill="#111" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="650" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">BERT Encoder</text>

  <rect x="520" y="188" width="260" height="28" fill="#0d1a22" rx="4" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="650" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Transformer Layer 12</text>
  <rect x="520" y="220" width="260" height="28" fill="#0d1a22" rx="4" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="650" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Transformer Layer ···</text>
  <rect x="520" y="252" width="260" height="28" fill="#0d1a22" rx="4" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="650" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Transformer Layer 1</text>
  <text x="650" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">동일한 가중치 사용</text>

  <!-- Shared weight bridge -->
  <line x1="380" y1="232" x2="500" y2="232" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" stroke-opacity="0.5"/>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">공유</text>

  <!-- Pooling arrows -->
  <line x1="230" y1="312" x2="230" y2="346" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="650" y1="312" x2="650" y2="346" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Pooling boxes -->
  <rect x="130" y="350" width="200" height="36" fill="#0d2a0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Mean Pooling → u</text>

  <rect x="550" y="350" width="200" height="36" fill="#0d2a0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Mean Pooling → v</text>

  <!-- Arrows to cosine -->
  <line x1="330" y1="368" x2="380" y2="430" stroke="#e8a020" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="550" y1="368" x2="500" y2="430" stroke="#e8a020" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Cosine similarity box -->
  <rect x="340" y="434" width="200" height="50" fill="#1a150d" rx="8" stroke="#e8a020" stroke-width="2"/>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a020" text-anchor="middle">코사인 유사도</text>
  <text x="440" y="475" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a020" text-anchor="middle">cos(u, v) = 0.89</text>

  <!-- Training loss note -->
  <rect x="80" y="496" width="740" height="18" fill="#111" rx="4"/>
  <text x="440" y="509" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">학습: NLI 분류 손실 또는 STS 회귀 손실 (Triplet / MSE)</text>
</svg>
