<svg width="880" height="430" viewBox="0 0 880 430"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">질의응답 (QA) 파이프라인</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">Extractive QA: 문서에서 정답 스팬을 찾는다</text>

  <!-- Input boxes -->
  <rect x="40" y="96" width="340" height="72" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="60" y="118" fill="#7777cc" font-size="13" font-weight="600">질문 (Question)</text>
  <text x="60" y="140" fill="#e8e8e8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"BTS는 언제 데뷔했나요?"</text>
  <text x="60" y="158" fill="#888" font-size="11">자연어 질문</text>

  <rect x="500" y="96" width="340" height="72" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="520" y="118" fill="#55c555" font-size="13" font-weight="600">문맥 (Context)</text>
  <text x="520" y="140" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"BTS는 2013년 6월 13일 데뷔한</text>
  <text x="520" y="156" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> 대한민국 보이그룹이다."</text>

  <!-- Arrows to encoder -->
  <polygon points="210,176 200,176 200,196 190,196 210,216 230,196 220,196 220,176" fill="#7777cc"/>
  <polygon points="670,176 660,176 660,196 650,196 670,216 690,196 680,196 680,176" fill="#55c555"/>

  <!-- Tokenizer / Encoder -->
  <rect x="200" y="216" width="460" height="72" rx="8" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="430" y="242" text-anchor="middle" fill="#7ec8e3" font-size="15" font-weight="600">BERT 인코더</text>
  <text x="430" y="262" text-anchor="middle" fill="#888" font-size="12">[CLS] 질문 [SEP] 문맥 [SEP]</text>
  <text x="430" y="278" text-anchor="middle" fill="#888" font-size="12">→ 각 토큰의 숨겨진 상태 H (768차원)</text>

  <!-- Arrow down -->
  <polygon points="430,296 420,296 420,312 410,312 430,332 450,312 440,312 440,296" fill="#7ec8e3"/>

  <!-- Span prediction heads -->
  <rect x="180" y="332" width="200" height="60" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="280" y="356" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">Start 헤드</text>
  <text x="280" y="374" text-anchor="middle" fill="#888" font-size="12">Linear(768→1) → Softmax</text>
  <text x="280" y="390" text-anchor="middle" fill="#888" font-size="11">정답 시작 위치 확률</text>

  <rect x="500" y="332" width="200" height="60" rx="8" fill="#1a2030" stroke="#55c555" stroke-width="1.5"/>
  <text x="600" y="356" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">End 헤드</text>
  <text x="600" y="374" text-anchor="middle" fill="#888" font-size="12">Linear(768→1) → Softmax</text>
  <text x="600" y="390" text-anchor="middle" fill="#888" font-size="11">정답 끝 위치 확률</text>

  <!-- Final answer -->
  <rect x="280" y="406" width="320" height="18" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="419" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">정답: "2013년 6월 13일" (토큰 5→9)</text>
</svg>
