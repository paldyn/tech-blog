<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-gr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">그래프 표현 방식 비교</text>

  <!-- Sample graph visual -->
  <text x="60" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">예제 그래프 (방향 있음)</text>

  <!-- Nodes -->
  <circle cx="160" cy="130" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">0</text>

  <circle cx="260" cy="100" r="20" fill="#1a2a3a" stroke="#55c555" stroke-width="2"/>
  <text x="260" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">1</text>

  <circle cx="260" cy="180" r="20" fill="#1a2a3a" stroke="#e05555" stroke-width="2"/>
  <text x="260" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">2</text>

  <circle cx="360" cy="140" r="20" fill="#1a2a3a" stroke="#e8c060" stroke-width="2"/>
  <text x="360" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c060" text-anchor="middle">3</text>

  <!-- Edges -->
  <line x1="178" y1="120" x2="240" y2="108" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-gr)"/>
  <line x1="178" y1="140" x2="240" y2="172" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-gr)"/>
  <line x1="280" y1="100" x2="340" y2="130" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-gr)"/>
  <line x1="280" y1="180" x2="340" y2="150" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-gr)"/>

  <!-- Edge labels -->
  <text x="213" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0→1</text>
  <text x="196" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0→2</text>
  <text x="316" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1→3</text>
  <text x="316" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2→3</text>

  <!-- 1. Adjacency Matrix -->
  <text x="60" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">① 인접 행렬</text>
  <rect x="60" y="250" width="220" height="120" rx="6" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <!-- Matrix header -->
  <text x="110" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">0</text>
  <text x="150" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">1</text>
  <text x="190" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">2</text>
  <text x="230" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">3</text>
  <!-- Row 0 -->
  <text x="75" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">0</text>
  <text x="110" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="150" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">1</text>
  <text x="190" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">1</text>
  <text x="230" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <!-- Row 1 -->
  <text x="75" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">1</text>
  <text x="110" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="150" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="190" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="230" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">1</text>
  <!-- Row 2 -->
  <text x="75" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">2</text>
  <text x="110" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="150" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="190" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="230" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">1</text>
  <!-- Row 3 -->
  <text x="75" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">3</text>
  <text x="110" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="150" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="190" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="230" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">0</text>
  <text x="60" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">공간: O(V²)  |  간선 확인: O(1)</text>

  <!-- 2. Adjacency List -->
  <text x="320" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">② 인접 리스트</text>
  <rect x="320" y="250" width="220" height="120" rx="6" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="336" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">0:</text>
  <text x="360" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[1, 2]</text>
  <text x="336" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">1:</text>
  <text x="360" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[3]</text>
  <text x="336" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">2:</text>
  <text x="360" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[3]</text>
  <text x="336" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">3:</text>
  <text x="360" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[]</text>
  <text x="320" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">공간: O(V+E)  |  순회: O(V+E)</text>

  <!-- 3. Edge List -->
  <text x="580" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">③ 엣지 리스트</text>
  <rect x="580" y="250" width="260" height="120" rx="6" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="596" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// [src, dst, weight]</text>
  <text x="596" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c060">[0, 1, 1]</text>
  <text x="596" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c060">[0, 2, 1]</text>
  <text x="596" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c060">[1, 3, 1]</text>
  <text x="596" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c060">[2, 3, 1]</text>
  <text x="580" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">공간: O(E)  |  크루스칼 MST에 유리</text>

  <!-- Comparison table header -->
  <rect x="60" y="400" width="760" height="34" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="155" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">표현</text>
  <text x="295" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">공간</text>
  <text x="460" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">간선 존재 확인</text>
  <text x="640" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">이웃 순회</text>
  <text x="770" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">적합한 경우</text>

  <rect x="60" y="434" width="760" height="52" rx="0" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="155" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">인접 행렬</text>
  <text x="295" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">O(V²)</text>
  <text x="460" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">O(1)</text>
  <text x="640" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">O(V)</text>
  <text x="770" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">밀집 그래프</text>

  <text x="155" y="473" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">인접 리스트</text>
  <text x="295" y="473" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">O(V+E)</text>
  <text x="460" y="473" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c060" text-anchor="middle">O(deg)</text>
  <text x="640" y="473" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">O(deg)</text>
  <text x="770" y="473" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">희소 그래프 (일반)</text>
</svg>
