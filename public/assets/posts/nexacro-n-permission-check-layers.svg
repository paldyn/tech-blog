<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">권한 체크 레이어</text>

  <!-- Layer 1: Menu -->
  <rect x="60" y="72" width="760" height="72" rx="8" fill="#1a2030" stroke="#7ec8e3"/>
  <text x="130" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">① 메뉴 접근 권한</text>
  <text x="130" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버에서 사용자별 접근 가능 메뉴 목록을 Dataset으로 내려줌</text>
  <text x="130" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 미허가 메뉴 항목은 클라이언트에서 숨기거나 비활성화</text>
  <rect x="700" y="84" width="100" height="36" rx="4" fill="#0f1520" stroke="#2a3040"/>
  <text x="750" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">ds_menu</text>

  <!-- Layer 2: Button/UI -->
  <rect x="60" y="160" width="760" height="72" rx="8" fill="#1a2030" stroke="#7777cc"/>
  <text x="130" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">② 버튼/UI 권한</text>
  <text x="130" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ds_permission.CRUD 컬럼으로 조회(R)/신규(C)/수정(U)/삭제(D) 버튼 제어</text>
  <text x="130" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ set_visible / set_enable로 버튼 노출 및 활성화 상태 결정</text>
  <rect x="700" y="172" width="100" height="36" rx="4" fill="#0f1520" stroke="#2a3040"/>
  <text x="750" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">ds_perm</text>

  <!-- Layer 3: Action -->
  <rect x="60" y="248" width="760" height="72" rx="8" fill="#1a2030" stroke="#55c555"/>
  <text x="130" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">③ 액션 직전 재검증</text>
  <text x="130" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">저장/삭제 실행 직전 클라이언트에서 권한 재확인 (이중 안전장치)</text>
  <text x="130" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ fn_checkPermission("D") 호출 → 미허가 시 경고 후 중단</text>

  <!-- Layer 4: Server -->
  <rect x="60" y="336" width="760" height="72" rx="8" fill="#2a1a1a" stroke="#e05555"/>
  <text x="130" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">④ 서버 최종 권한 검증 (필수)</text>
  <text x="130" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클라이언트 권한 체크는 UX용 — 서버에서 반드시 재검증해야 함</text>
  <text x="130" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ Spring Security / AOP / Filter로 API 레벨 권한 강제</text>
</svg>
