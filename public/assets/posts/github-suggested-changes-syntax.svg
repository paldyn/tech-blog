<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Suggestion 문법과 렌더링 결과</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">리뷰 코멘트에 suggestion 블록을 쓰면 적용 가능한 diff로 보인다</text>

  <!-- Left: what reviewer types -->
  <text x="60" y="116"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#aaaaaa">리뷰어가 입력</text>
  <rect x="60" y="130" width="340" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">변수명을 더 명확하게:</text>
  <text x="76" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">```suggestion</text>
  <text x="76" y="206" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">const userCount = list.length;</text>
  <text x="76" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">```</text>
  <text x="76" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 단축키: 코멘트 창에서</text>
  <text x="76" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Ctrl/Cmd + G</text>

  <line x1="408" y1="220" x2="468" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Right: rendered diff -->
  <text x="476" y="116"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#aaaaaa">렌더링된 제안 (적용 가능)</text>
  <rect x="476" y="130" width="344" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="476" y="150" width="344" height="24" fill="#2a0f0f"/>
  <text x="492" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">- const c = list.length;</text>
  <rect x="476" y="178" width="344" height="24" fill="#0f2a0f"/>
  <text x="492" y="195" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">+ const userCount = list.length;</text>

  <rect x="492" y="256" width="220" height="38" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="602" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Commit suggestion</text>

  <text x="440" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#888">작성자는 버튼 한 번으로 제안을 그대로 커밋할 수 있다</text>
</svg>
