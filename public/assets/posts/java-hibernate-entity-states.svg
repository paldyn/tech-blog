<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="hsArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">엔티티 생명주기 — 네 가지 상태</text>

  <!-- transient -->
  <rect x="60" y="100" width="200" height="80" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">비영속 (transient)</text>
  <text x="80" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">new로 만든 직후</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JPA가 모름</text>

  <!-- arrow persist -->
  <line x1="260" y1="140" x2="360" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#hsArr)"/>
  <text x="268" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">persist()</text>

  <!-- persistent -->
  <rect x="360" y="100" width="200" height="80" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="380" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">영속 (persistent)</text>
  <text x="380" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨텍스트가 관리 중</text>
  <text x="380" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">변경 감지 대상</text>

  <!-- arrow detach -->
  <line x1="560" y1="140" x2="660" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#hsArr)"/>
  <text x="660" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">detach() / close</text>

  <!-- detached -->
  <rect x="660" y="100" width="160" height="80" fill="#101622" stroke="#e0a555" stroke-width="1.5" rx="8"/>
  <text x="680" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e0a555">준영속</text>
  <text x="680" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(detached)</text>
  <text x="680" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">관리에서 분리</text>

  <!-- removed below persistent -->
  <line x1="460" y1="180" x2="460" y2="240" stroke="#e05555" stroke-width="2" marker-end="url(#hsArr)"/>
  <text x="470" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">remove()</text>
  <rect x="360" y="250" width="200" height="70" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5" rx="8"/>
  <text x="380" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">삭제 (removed)</text>
  <text x="380" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커밋 시 DELETE 예약</text>

  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">변경 감지는 '영속' 상태에서만 동작 — 준영속 엔티티의 수정은 DB에 반영되지 않는다.</text>
</svg>
