<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">메모이제이션 동작 원리</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Memoization: Cache Results of Pure Functions</text>

  <!-- Call flow boxes -->
  <!-- First call -->
  <rect x="60" y="96" width="340" height="56" fill="#1a1a0a" rx="8" stroke="#3a3a1a" stroke-width="1.5"/>
  <text x="80" y="118" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">첫 번째 호출</text>
  <text x="80" y="138" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600">fib(40)</text>
  <polygon points="406,124 420,118 420,130" fill="#7ec8e3"/>
  <rect x="420" y="110" width="40" height="4" fill="#7ec8e3" rx="2"/>

  <!-- Cache miss -->
  <rect x="466" y="96" width="180" height="56" fill="#1a0d0d" rx="8" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="556" y="118" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">캐시 미스</text>
  <text x="556" y="138" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">Cache Miss</text>
  <polygon points="650,124 664,118 664,130" fill="#e05555"/>
  <rect x="650" y="120" width="40" height="4" fill="#e05555" rx="2"/>

  <!-- Compute -->
  <rect x="694" y="96" width="126" height="56" fill="#0d0d1a" rx="8" stroke="#1a1a3a" stroke-width="1.5"/>
  <text x="757" y="118" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">계산 실행</text>
  <text x="757" y="138" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">102334155</text>

  <!-- Down arrow -->
  <line x1="757" y1="152" x2="757" y2="172" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="751,172 757,184 763,172" fill="#7ec8e3"/>

  <!-- Cache store -->
  <rect x="694" y="184" width="126" height="40" fill="#0d1a0d" rx="8" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="757" y="202" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">캐시 저장</text>
  <text x="757" y="216" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">40 → 102334155</text>

  <!-- Second call -->
  <rect x="60" y="240" width="340" height="56" fill="#1a1a0a" rx="8" stroke="#3a3a1a" stroke-width="1.5"/>
  <text x="80" y="262" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">두 번째 호출</text>
  <text x="80" y="282" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600">fib(40)</text>
  <polygon points="406,268 420,262 420,274" fill="#55c555"/>
  <rect x="420" y="264" width="40" height="4" fill="#55c555" rx="2"/>

  <!-- Cache hit -->
  <rect x="466" y="240" width="180" height="56" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="556" y="262" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">캐시 히트</text>
  <text x="556" y="282" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">Cache Hit</text>
  <polygon points="650,268 664,262 664,274" fill="#55c555"/>
  <rect x="650" y="264" width="40" height="4" fill="#55c555" rx="2"/>

  <!-- Instant return -->
  <rect x="694" y="240" width="126" height="56" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="757" y="262" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">즉시 반환</text>
  <text x="757" y="282" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" text-anchor="middle">102334155</text>

  <!-- Cache data structure -->
  <rect x="60" y="320" width="760" height="130" fill="#0d0d0d" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="342" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">내부 캐시 (Map)</text>

  <rect x="76" y="352" width="727" height="84" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="372" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> memoize = (fn) =&gt; {</text>
  <text x="92" y="390" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> cache = <tspan fill="#7ec8e3">new</tspan> Map(); <tspan fill="#6a8aa0">// key: JSON.stringify(args)</tspan></text>
  <text x="92" y="408" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return</tspan> (...args) =&gt; cache.has(JSON.stringify(args))</text>
  <text x="92" y="426" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    ? cache.get(JSON.stringify(args)) : (r =&gt; (cache.set(JSON.stringify(args), r), r))(fn(...args));</text>

  <!-- Footer -->
  <text x="440" y="474" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
