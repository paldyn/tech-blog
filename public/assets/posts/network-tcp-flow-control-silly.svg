<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Silly Window Syndrome 와 해결책</text>

  <!-- Problem section -->
  <rect x="60" y="62" width="340" height="200" rx="8" fill="#0f0a08" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">문제: Silly Window Syndrome</text>

  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수신자가 소량씩 버퍼를 비움</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 작은 rwnd 광고 (예: 40 bytes)</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 송신자가 40 bytes 세그먼트 전송</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 헤더(40 bytes) + 데이터(40 bytes)</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">→ 50% 오버헤드!</text>

  <rect x="80" y="210" width="300" height="36" rx="4" fill="#1a0808" stroke="#3a1a1a" stroke-width="1"/>
  <text x="230" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">대역폭 낭비, 패킷 수 폭증</text>
  <text x="230" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TCP 초기 시절 실제 문제였음</text>

  <!-- Solution section -->
  <rect x="480" y="62" width="340" height="200" rx="8" fill="#080f08" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">해결: Clark's Solution + Nagle</text>

  <text x="500" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Clark's Solution (수신자 측)</text>
  <text x="500" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">rwnd가 MSS 이상 or 버퍼 50%+일 때만 광고</text>
  <text x="500" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">그 이전엔 rwnd=0으로 광고</text>

  <line x1="500" y1="164" x2="800" y2="164" stroke="#2a3a2a" stroke-width="1"/>

  <text x="500" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Nagle Algorithm (송신자 측)</text>
  <text x="500" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">미전송 데이터 있으면 ACK 대기 후 묶어서 전송</text>
  <text x="500" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TCP_NODELAY로 비활성화 가능 (인터랙티브 앱)</text>

  <!-- Code block -->
  <rect x="60" y="280" width="760" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Nagle 비활성화 (게임, SSH, 실시간 앱에서 지연 줄이기)</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><text fill="#7ec8e3" font-weight="600">import</text> socket</text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sock.setsockopt(socket.IPPROTO_TCP, socket.TCP_NODELAY, <text fill="#b5cea8">1</text>)</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># TCP_CORK: 데이터를 모아서 한 번에 전송 (sendfile과 병용)</text>
</svg>
