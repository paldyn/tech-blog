<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NFS 설정 명령어</text>

  <!-- Server setup -->
  <text x="220" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">서버 설정</text>

  <rect x="60" y="95" width="320" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="117" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 패키지 설치</text>
  <text x="76" y="135" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">apt</tspan> install nfs-kernel-server</text>
  <text x="76" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># /etc/exports 편집</text>
  <text x="76" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">/data 192.168.1.0/24(<tspan fill="#ce9178">rw,sync,no_subtree_check</tspan>)</text>
  <text x="76" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">/pub *(ro,no_root_squash)</text>
  <text x="76" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 내보내기 적용</text>
  <text x="76" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">exportfs</tspan> -rav</text>
  <text x="76" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">systemctl</tspan> enable --now nfs-server</text>
  <text x="76" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 내보내기 목록 확인</text>

  <!-- Client mount -->
  <text x="660" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">클라이언트 마운트</text>

  <rect x="500" y="95" width="320" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="117" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 패키지 설치</text>
  <text x="516" y="135" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">apt</tspan> install nfs-common</text>
  <text x="516" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 임시 마운트</text>
  <text x="516" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">mount</tspan> -t nfs4 10.0.0.10:/data /mnt/nfs</text>
  <text x="516" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 서버의 내보내기 목록 조회</text>
  <text x="516" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">showmount</tspan> -e 10.0.0.10</text>
  <text x="516" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 마운트 상태 확인</text>
  <text x="516" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">nfsstat</tspan> -c</text>

  <!-- fstab options -->
  <text x="220" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8c55e" text-anchor="middle">fstab 영구 설정</text>

  <rect x="60" y="303" width="320" height="86" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="325" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888"># /etc/fstab</text>
  <text x="76" y="343" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">10.0.0.10:/data  /mnt/nfs  nfs4</text>
  <text x="76" y="361" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">  rw,hard,intr,timeo=14,retrans=3  0 0</text>
  <text x="76" y="379" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># hard: 서버 응답 때까지 재시도</text>

  <!-- Options table -->
  <text x="660" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">주요 마운트 옵션</text>

  <rect x="500" y="303" width="320" height="152" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="516" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">hard / soft</text>
  <text x="640" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">장애 시 재시도 / 즉시 실패</text>
  <text x="516" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">intr</text>
  <text x="640" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">신호로 중단 가능</text>
  <text x="516" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">rsize / wsize</text>
  <text x="640" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">읽기/쓰기 블록 크기</text>
  <text x="516" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">noatime</text>
  <text x="640" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">atime 업데이트 안 함</text>
  <text x="516" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">_netdev</text>
  <text x="640" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">네트워크 준비 후 마운트</text>
  <text x="516" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">sync / async</text>
  <text x="640" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">즉시 / 비동기 쓰기</text>
  <text x="516" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">bg</text>
  <text x="640" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">마운트 실패 시 백그라운드 재시도</text>
</svg>
