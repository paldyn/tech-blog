<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">동적 import() 활용 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">라우트 분할 · 조건부 폴리필 · 지연 로딩</text>

  <!-- Pattern 1: Route-based code splitting -->
  <text x="230" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① 라우트 기반 코드 분할</text>
  <rect x="60" y="108" width="340" height="148" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const </tspan><tspan fill="#ffffff">routes = {</tspan></text>
  
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">  '/home'</tspan><tspan fill="#ffffff">: () =&gt; </tspan><tspan fill="#ffffff">import(</tspan></text>

  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    './pages/Home.mjs'</text>
  <text x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  ),</text>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">  '/about'</tspan><tspan fill="#ffffff">: () =&gt; import(</tspan></text>
  
  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    './pages/About.mjs'</text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  )</text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">};</text>

  <!-- Pattern 2: Conditional polyfill -->
  <text x="650" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">② 조건부 폴리필</text>
  <rect x="480" y="108" width="340" height="148" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="496" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">async function </tspan><tspan fill="#ffffff">init() {</tspan></text>
  
  <text x="496" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  if </tspan><tspan fill="#ffffff">(!</tspan><tspan fill="#ffffff">globalThis.structuredClone) {</tspan></text>

  <text x="496" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">    await </tspan><tspan fill="#ffffff">import(</tspan></text>
  
  <text x="496" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">      './polyfill.mjs'</text>
  <text x="496" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    );</text>
  <text x="496" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="496" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">  // 필요할 때만 로드</text>
  <text x="496" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Pattern 3: Lazy load on user action -->
  <text x="230" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c842">③ 사용자 액션에 따른 지연 로딩</text>
  <rect x="60" y="294" width="340" height="130" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">btn.addEventListener(</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">  'click'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3">async </tspan><tspan fill="#ffffff">() =&gt; {</tspan></text>

  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  const </tspan><tspan fill="#ffffff">{ render } = </tspan><tspan fill="#7ec8e3">await</tspan></text>

  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    import(</tspan><tspan fill="#ce9178">'./chart.mjs'</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  render(data);</text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">});</text>

  <!-- Pattern 4: Preload hint -->
  <text x="650" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">④ import.meta.url 활용</text>
  <rect x="480" y="294" width="340" height="130" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="496" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 현재 모듈 경로 기준</text>
  <text x="496" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const </tspan><tspan fill="#ffffff">base = </tspan><tspan fill="#ffffff">import.meta.url;</tspan></text>

  <text x="496" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const </tspan><tspan fill="#ffffff">mod = </tspan><tspan fill="#7ec8e3">await </tspan><tspan fill="#ffffff">import(</tspan></text>

  <text x="496" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  new </tspan><tspan fill="#ffffff">URL(</tspan><tspan fill="#ce9178">'./plugin'</tspan><tspan fill="#ffffff">, base)</tspan></text>

  <text x="496" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">);</text>

  <!-- Footer -->
</svg>
