<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">실전 조건부 렌더링 패턴</text>

  <!-- Loading state pattern -->
  <rect x="60" y="68" width="370" height="130" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">비동기 상태 패턴 (로딩/에러/성공)</text>
  <rect x="76" y="106" width="338" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (isLoading) </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">Spinner</tspan><tspan fill="#ffffff"> /&gt;;</tspan></text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (error) </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">Error</tspan><tspan fill="#ffffff"> msg={error} /&gt;;</tspan></text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (!data) </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">Empty</tspan><tspan fill="#ffffff"> /&gt;;</tspan></text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// early return 패턴으로 깔끔하게 분기</text>

  <!-- View toggle pattern -->
  <rect x="450" y="68" width="370" height="130" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">뷰 전환 패턴 (탭/모드)</text>
  <rect x="466" y="106" width="338" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> TABS = {</tspan></text>
  <text x="482" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  home: &lt;</tspan><tspan fill="#55c555">HomeTab</tspan><tspan fill="#ffffff"> /&gt;,</tspan></text>
  <text x="482" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  profile: &lt;</tspan><tspan fill="#55c555">ProfileTab</tspan><tspan fill="#ffffff"> /&gt;,</tspan></text>
  <text x="482" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">}; </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> {TABS[activeTab] ?? &lt;</tspan><tspan fill="#55c555">NotFound</tspan><tspan fill="#ffffff"> /&gt;}</tspan></text>

  <!-- Null return pattern -->
  <rect x="60" y="218" width="760" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// null 반환 — 컴포넌트를 완전히 숨기기 (DOM에서도 제거)</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Toast({ message, isVisible }) {</tspan></text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (!isVisible) </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> </tspan><tspan font-weight="600" fill="#7ec8e3">null</tspan><tspan fill="#ffffff">;  </tspan><tspan fill="#9aa4b8">// DOM에서 완전 제거</tspan></text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff"> className=</tspan><tspan fill="#ce9178">"toast"</tspan><tspan fill="#ffffff">&gt;{message}&lt;/</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff">&gt;;</tspan></text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"> </text>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// CSS visibility:hidden vs null 반환 차이</text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// null:</tspan><tspan fill="#ffffff">  DOM에서 완전 제거 (마운트/언마운트, 상태 초기화)</tspan></text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// hidden:</tspan><tspan fill="#ffffff"> DOM 유지, 화면만 숨김 (상태 보존, 애니메이션 가능)</tspan></text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e0c044">// 모달·드로어 같은 애니메이션 UI는 null 대신 CSS로 숨기길 권장</tspan></text>
</svg>
