<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">조건부 렌더링 패턴 비교</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">상황에 따라 다른 패턴을 선택한다</text>

  <!-- Pattern 1: if/else (early return) -->
  <rect x="55" y="95" width="380" height="175" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">if / early return</text>
  <rect x="70" y="128" width="350" height="128" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="125" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Dashboard({ user }) {</text>
  <text x="82" y="166" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  if</text>
  <text x="100" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> (!user) </text>
  <text x="82" y="184" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">    return</text>
  <text x="126" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> &lt;LoginPage /&gt;</text>
  <text x="82" y="202" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">  // user 있을 때의 UI</text>
  <text x="82" y="220" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="126" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> &lt;UserDashboard user={user} /&gt;</text>
  <text x="82" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>
  <text x="245" y="258" font-size="12" fill="#888" text-anchor="middle">복잡한 조건 / 다수 분기에 적합</text>

  <!-- Pattern 2: Ternary -->
  <rect x="455" y="95" width="370" height="175" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="118" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">삼항 연산자</text>
  <rect x="470" y="128" width="340" height="128" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">return</text>
  <text x="523" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> (</text>
  <text x="482" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;div&gt;</text>
  <text x="482" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    {isLoading</text>
  <text x="482" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      ? &lt;Spinner /&gt;</text>
  <text x="482" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      : &lt;DataView data={data} /&gt;}</text>
  <text x="482" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;/div&gt;</text>
  <text x="640" y="258" font-size="12" fill="#888" text-anchor="middle">A 또는 B 중 하나 선택에 적합</text>

  <!-- Pattern 3: && shortcircuit -->
  <rect x="55" y="295" width="380" height="175" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="245" y="318" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">&amp;&amp; 단락 평가</text>
  <rect x="70" y="328" width="350" height="128" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="348" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 조건 충족 시만 렌더링</text>
  <text x="82" y="366" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{hasError &amp;&amp; &lt;ErrorBanner /&gt;}</text>
  <text x="82" y="384" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ⚠ 숫자 0 함정</text>
  <text x="82" y="402" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">{count &amp;&amp; &lt;p&gt;{count}개&lt;/p&gt;}</text>
  <text x="82" y="420" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// count=0이면 "0" 출력됨!</text>
  <text x="82" y="438" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace" xml:space="preserve">{count &gt; 0 &amp;&amp; &lt;p&gt;{count}개&lt;/p&gt;}</text>
  <text x="245" y="458" font-size="12" fill="#888" text-anchor="middle">"있으면 보여줘" 패턴에 적합</text>

  <!-- Pattern 4: switch / object map -->
  <rect x="455" y="295" width="370" height="175" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="318" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">객체 맵 (다중 상태)</text>
  <rect x="470" y="328" width="340" height="128" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="348" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">const</text>
  <text x="520" y="348" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> views = {</text>
  <text x="482" y="366" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  loading</text>
  <text x="530" y="366" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">: &lt;Spinner /&gt;,</text>
  <text x="482" y="384" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  error</text>
  <text x="518" y="384" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">: &lt;Error /&gt;,</text>
  <text x="482" y="402" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  success</text>
  <text x="532" y="402" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">: &lt;DataView /&gt;</text>
  <text x="482" y="420" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>
  <text x="482" y="438" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{views[status]}</text>
  <text x="640" y="458" font-size="12" fill="#888" text-anchor="middle">3가지 이상 상태에 적합</text>
</svg>
