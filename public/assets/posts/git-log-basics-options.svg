<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git log 자주 쓰는 옵션</text>

  <!-- Options table -->
  <rect x="60" y="68" width="760" height="286" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="60" y="68" width="760" height="34" rx="8" fill="#1a2035"/>
  <text x="200" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">옵션</text>
  <text x="590" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">설명</text>

  <line x1="60" y1="102" x2="820" y2="102" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--oneline</text>
  <text x="590" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">해시 7자 + 제목만 한 줄로</text>

  <line x1="60" y1="134" x2="820" y2="134" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-N</text>
  <text x="590" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">최근 N개만 출력 (예: -5, -10)</text>

  <line x1="60" y1="166" x2="820" y2="166" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--decorate</text>
  <text x="590" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">브랜치·태그 이름 표시 (기본 포함)</text>

  <line x1="60" y1="198" x2="820" y2="198" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-p</text>
  <text x="590" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">각 커밋의 diff(패치) 출력</text>

  <line x1="60" y1="230" x2="820" y2="230" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--stat</text>
  <text x="590" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">파일별 변경 통계 추가</text>

  <line x1="60" y1="262" x2="820" y2="262" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--all</text>
  <text x="590" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">모든 브랜치 히스토리 포함</text>

  <line x1="60" y1="294" x2="820" y2="294" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--follow</text>
  <text x="590" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">파일 이름 변경 이전 히스토리까지 추적</text>

  <line x1="60" y1="326" x2="820" y2="326" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-- &lt;path&gt;</text>
  <text x="590" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">특정 파일·디렉터리 관련 커밋만</text>
</svg>
