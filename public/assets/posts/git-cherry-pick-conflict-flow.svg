<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Cherry-pick 충돌 해결 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">충돌 발생 시 두 가지 경로: 해결 후 계속 or 중단</text>

  <!-- Step 1: cherry-pick command -->
  <rect x="300" y="90" width="280" height="44" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="117" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">git cherry-pick abc1234</text>

  <!-- Arrow 1 (shaft + head) -->
  <line x1="440" y1="134" x2="440" y2="164" stroke="#555" stroke-width="2"/>
  <polygon points="440,174 432,162 448,162" fill="#555"/>

  <!-- CONFLICT box -->
  <rect x="285" y="174" width="310" height="44" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="201" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">CONFLICT 발생!</text>

  <!-- T-junction lines -->
  <line x1="440" y1="218" x2="440" y2="248" stroke="#666" stroke-width="1.5"/>
  <line x1="200" y1="248" x2="660" y2="248" stroke="#666" stroke-width="1.5"/>

  <!-- Left column descender with arrow -->
  <line x1="200" y1="248" x2="200" y2="274" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="200,282 193,272 207,272" fill="#e05555"/>

  <!-- Right column descender with arrow -->
  <line x1="660" y1="248" x2="660" y2="274" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="660,282 653,272 667,272" fill="#55c555"/>

  <!-- Left column label -->
  <text x="200" y="243" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">중단 경로</text>

  <!-- Right column label -->
  <text x="660" y="243" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">해결 경로</text>

  <!-- Left Box 1: –abort -->
  <rect x="80" y="282" width="240" height="44" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="308" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">cherry-pick --abort</text>

  <!-- Arrow Left 1 -->
  <line x1="200" y1="326" x2="200" y2="356" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="200,364 193,354 207,354" fill="#e05555"/>

  <!-- Left Box 2: restored -->
  <rect x="80" y="364" width="240" height="44" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">작업 디렉토리 원상 복구</text>

  <!-- Right Box 1: edit file -->
  <rect x="540" y="282" width="240" height="44" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">충돌 파일 직접 수정</text>

  <!-- Arrow Right 1 -->
  <line x1="660" y1="326" x2="660" y2="356" stroke="#555" stroke-width="1.5"/>
  <polygon points="660,364 653,354 667,354" fill="#555"/>

  <!-- Right Box 2: git add -->
  <rect x="540" y="364" width="240" height="44" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="390" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">git add &lt;충돌 파일&gt;</text>

  <!-- Arrow Right 2 -->
  <line x1="660" y1="408" x2="660" y2="438" stroke="#555" stroke-width="1.5"/>
  <polygon points="660,446 653,436 667,436" fill="#555"/>

  <!-- Right Box 3: –continue -->
  <rect x="540" y="446" width="240" height="44" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="660" y="472" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">cherry-pick --continue</text>
</svg>
