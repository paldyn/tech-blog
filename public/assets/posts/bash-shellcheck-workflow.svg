<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ShellCheck 분석 워크플로우</text>

  <!-- Step 1: Write script -->
  <rect x="60" y="80" width="150" height="70" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">스크립트 작성</text>
  <text x="135" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">script.sh</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="115" x2="260" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: ShellCheck -->
  <rect x="260" y="80" width="150" height="70" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="335" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">shellcheck</text>
  <text x="335" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정적 분석</text>

  <!-- Arrow 2→3 (문제 있음) -->
  <line x1="410" y1="115" x2="460" y2="115" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="432" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">경고/오류</text>

  <!-- Step 3: Fix -->
  <rect x="460" y="80" width="150" height="70" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="535" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">수정</text>
  <text x="535" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 개선</text>

  <!-- Arrow 3→2 (loop) -->
  <path d="M 535 80 C 535 50 335 50 335 80" stroke="#7ec8e3" stroke-width="2" fill="none"
        stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Arrow 2→4 (문제 없음) -->
  <line x1="410" y1="145" x2="660" y2="145" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="535" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">경고 없음</text>

  <!-- Step 4: Done -->
  <rect x="660" y="115" width="160" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">✓ 검증 완료</text>
  <text x="740" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커밋 / 배포</text>

  <!-- CI/CD note -->
  <rect x="60" y="200" width="760" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">CI/CD 연동 — GitHub Actions 예시</text>
  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">- <tspan fill="#7ec8e3" font-weight="600">name</tspan>: ShellCheck</text>
  <text x="80" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">uses</tspan>: ludeeus/action-shellcheck@master</text>
  <text x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">with</tspan>:</text>
  <text x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">severity</tspan>: <tspan fill="#ce9178">warning</tspan></text>
  <text x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">scandir</tspan>: <tspan fill="#ce9178">./scripts</tspan></text>
</svg>
