<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">OUTER JOIN에서 ON vs WHERE 조건 위치</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">조건 위치에 따라 결과가 달라진다</text>

  <!-- Left panel: ON 조건 -->
  <rect x="60" y="90" width="360" height="360" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">ON 절에 추가 조건</text>
  <text x="240" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">LEFT JOIN 특성 유지 → 좌측 행 보존</text>

  <!-- Code block left -->
  <rect x="72" y="148" width="336" height="126" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="88" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="88" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    u.name, o.amount</text>
  <text x="88" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="88" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    users u</text>
  <text x="88" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">LEFT JOIN</text>
  <text x="88" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    orders o</text>
  <text x="88" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    ON</text>
  <text x="88" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        o.user_id = u.id</text>

  <!-- Adjust code positions -->
  <rect x="72" y="148" width="336" height="144" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="88" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT u.name, o.amount</text>
  <text x="88" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM users u</text>
  <text x="88" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">LEFT JOIN orders o</text>
  <text x="88" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  ON</text>
  <text x="116" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    o.user_id = u.id</text>
  <!-- highlighted line -->
  <rect x="73" y="229" width="334" height="18" rx="2" fill="#1e3a1e" fill-opacity="0.6"/>
  <text x="88" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">  AND o.status = </text>
  <text x="268" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'paid'</text>
  <text x="88" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- Carol: name=Carol, amount=NULL</text>

  <!-- Result left -->
  <text x="240" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">결과: users 3행 모두 포함</text>
  <rect x="120" y="328" width="240" height="90" rx="6" fill="#070b14" stroke="#1e2433"/>
  <rect x="120" y="328" width="240" height="22" rx="6" fill="#0f1a2e"/>
  <text x="192" y="343" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">name</text>
  <text x="312" y="343" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">amount</text>
  <line x1="120" y1="350" x2="360" y2="350" stroke="#1e2433" stroke-width="1"/>
  <text x="192" y="365" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">Alice</text>
  <text x="312" y="365" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">5000</text>
  <line x1="120" y1="370" x2="360" y2="370" stroke="#1e2433" stroke-width="1"/>
  <text x="192" y="385" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">Bob</text>
  <text x="312" y="385" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">NULL</text>
  <line x1="120" y1="390" x2="360" y2="390" stroke="#1e2433" stroke-width="1"/>
  <text x="192" y="405" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Carol</text>
  <text x="312" y="405" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">NULL</text>

  <text x="240" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">3행 반환 — LEFT JOIN 유지됨</text>

  <!-- Right panel: WHERE 조건 -->
  <rect x="460" y="90" width="360" height="360" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="640" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">WHERE 절에 추가 조건</text>
  <text x="640" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">LEFT JOIN이 INNER JOIN처럼 동작</text>

  <!-- Code block right -->
  <rect x="472" y="148" width="336" height="144" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="488" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT u.name, o.amount</text>
  <text x="488" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM users u</text>
  <text x="488" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">LEFT JOIN orders o</text>
  <text x="488" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  ON o.user_id = u.id</text>
  <!-- highlighted WHERE line -->
  <rect x="473" y="229" width="334" height="18" rx="2" fill="#3a1e1e" fill-opacity="0.6"/>
  <text x="488" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">WHERE o.status = </text>
  <text x="680" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'paid'</text>
  <text x="488" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- NULL 행 WHERE에서 탈락!</text>

  <!-- Result right -->
  <text x="640" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">결과: NULL 행 WHERE에서 탈락</text>
  <rect x="520" y="328" width="240" height="90" rx="6" fill="#070b14" stroke="#1e2433"/>
  <rect x="520" y="328" width="240" height="22" rx="6" fill="#0f1a2e"/>
  <text x="592" y="343" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">name</text>
  <text x="712" y="343" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">amount</text>
  <line x1="520" y1="350" x2="760" y2="350" stroke="#1e2433" stroke-width="1"/>
  <text x="592" y="365" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">Alice</text>
  <text x="712" y="365" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">5000</text>
  <line x1="520" y1="370" x2="760" y2="370" stroke="#1e2433" stroke-width="1"/>
  <text x="592" y="390" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">(Bob, Carol 제외됨)</text>

  <text x="640" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">1행만 반환 — INNER JOIN과 동일</text>

  <!-- Footer -->
  <text x="440" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
