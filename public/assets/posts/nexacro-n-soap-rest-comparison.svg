<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SOAP / REST 연동 경로</text>

  <!-- Nexacro Client -->
  <rect x="340" y="74" width="200" height="60" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Nexacro N</text>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">transaction() 호출</text>

  <!-- Adapter box -->
  <rect x="280" y="178" width="320" height="60" rx="8" fill="#14200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Java/Node 어댑터 서비스</text>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DataSet 수신 → 외부 API 호출 → DataSet 반환</text>

  <line x1="440" y1="134" x2="440" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Branch to REST and SOAP -->
  <line x1="330" y1="238" x2="180" y2="290" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="550" y1="238" x2="700" y2="290" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- REST box -->
  <rect x="60" y="292" width="240" height="80" rx="8" fill="#0a0a14" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">REST API 호출</text>
  <text x="180" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">WebClient / RestTemplate</text>
  <text x="180" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JSON 응답 처리</text>

  <!-- SOAP box -->
  <rect x="580" y="292" width="240" height="80" rx="8" fill="#0a0a14" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">SOAP 웹서비스</text>
  <text x="700" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JAX-WS / Axis2</text>
  <text x="700" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">XML SOAP Envelope</text>

  <!-- External services -->
  <rect x="60" y="402" width="240" height="60" rx="6" fill="#1a1400" stroke="#e8e8e3" stroke-width="1"/>
  <text x="180" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">외부 서비스 A</text>
  <text x="180" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">마이크로서비스 / ERP API</text>

  <rect x="580" y="402" width="240" height="60" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="700" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">외부 서비스 B</text>
  <text x="700" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">레거시 시스템 / 공공 API</text>

  <line x1="180" y1="372" x2="180" y2="402" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="372" x2="700" y2="402" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Key: JSON vs XML -->
  <rect x="310" y="390" width="260" height="60" rx="6" fill="#0a0a0a" stroke="#888" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">두 경우 모두 어댑터가</text>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">DataSet으로 변환해 반환</text>
</svg>
