<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">소켓 5-tuple: 연결의 고유 식별자</text>

  <!-- 5-tuple boxes -->
  <rect x="60" y="76" width="140" height="70" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">프로토콜</text>
  <text x="130" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" text-anchor="middle">TCP</text>
  <text x="130" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(6번)</text>

  <rect x="218" y="76" width="140" height="70" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="288" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">출발지 IP</text>
  <text x="288" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" text-anchor="middle">10.0.0.5</text>
  <text x="288" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(클라이언트)</text>

  <rect x="376" y="76" width="140" height="70" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="446" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">출발지 포트</text>
  <text x="446" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" text-anchor="middle">51234</text>
  <text x="446" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(임시 포트)</text>

  <rect x="534" y="76" width="140" height="70" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="604" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">목적지 IP</text>
  <text x="604" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" text-anchor="middle">93.184.216.34</text>
  <text x="604" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(서버)</text>

  <rect x="692" y="76" width="140" height="70" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="762" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">목적지 포트</text>
  <text x="762" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" text-anchor="middle">443</text>
  <text x="762" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(HTTPS)</text>

  <!-- Same server multiple clients -->
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">같은 서버에 여러 클라이언트가 연결해도 5-tuple로 구분</text>

  <rect x="60" y="204" width="760" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">프로토콜  출발지 IP       출발지포트  목적지IP          목적지포트</text>
  <line x1="80" y1="234" x2="800" y2="234" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">TCP       10.0.0.5        51234       93.184.216.34     443</text>
  <text x="80" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">TCP       10.0.0.5        51235       93.184.216.34     443</text>
  <text x="80" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">TCP       192.168.1.20    60000       93.184.216.34     443</text>
  <text x="80" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">TCP       172.16.0.3      49152       93.184.216.34     443</text>
  <text x="80" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 서버는 하나의 :443 포트로 수만 개 연결을 동시에 처리</text>
  <text x="80" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 각 연결은 (srcIP, srcPort)로 구분됨</text>
</svg>
