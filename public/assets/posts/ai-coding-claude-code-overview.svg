<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Claude Code 기능 개요</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Claude Code — Agentic CLI for Software Engineering</text>

  <!-- Central box -->
  <rect x="320" y="150" width="240" height="100" rx="10" fill="#1a1428" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="180" text-anchor="middle" font-size="16" font-weight="700" fill="#ce9178">Claude Code</text>
  <text x="440" y="202" text-anchor="middle" font-size="13" fill="#888">터미널 CLI 에이전트</text>
  <text x="440" y="222" text-anchor="middle" font-size="12" fill="#888">claude-sonnet-4-6 기반</text>
  <text x="440" y="240" text-anchor="middle" font-size="12" fill="#888">by Anthropic</text>

  <defs>
    <marker id="ccmarr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Tool use (top left) -->
  <rect x="40" y="96" width="220" height="90" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">도구 사용 능력</text>
  <text x="150" y="142" text-anchor="middle" font-size="12" fill="#888">파일 읽기·쓰기·편집</text>
  <text x="150" y="160" text-anchor="middle" font-size="12" fill="#888">터미널 명령 실행</text>
  <text x="150" y="178" text-anchor="middle" font-size="12" fill="#888">웹 검색·URL 페치</text>

  <line x1="260" y1="141" x2="320" y2="175" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ccmarr)"/>

  <!-- Agent (top right) -->
  <rect x="620" y="96" width="220" height="90" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="730" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">에이전트 모드</text>
  <text x="730" y="142" text-anchor="middle" font-size="12" fill="#888">복잡 태스크 자율 실행</text>
  <text x="730" y="160" text-anchor="middle" font-size="12" fill="#888">서브 에이전트 병렬화</text>
  <text x="730" y="178" text-anchor="middle" font-size="12" fill="#888">계획-실행-검증 루프</text>

  <line x1="620" y1="141" x2="560" y2="175" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ccmarr)"/>

  <!-- MCP (bottom left) -->
  <rect x="40" y="290" width="220" height="90" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="314" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">MCP 통합</text>
  <text x="150" y="336" text-anchor="middle" font-size="12" fill="#888">GitHub, Slack, DB</text>
  <text x="150" y="354" text-anchor="middle" font-size="12" fill="#888">커스텀 MCP 서버</text>
  <text x="150" y="372" text-anchor="middle" font-size="12" fill="#888">도구 생태계 확장</text>

  <line x1="260" y1="310" x2="320" y2="250" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ccmarr)"/>

  <!-- Memory (bottom right) -->
  <rect x="620" y="290" width="220" height="90" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="730" y="314" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">메모리 시스템</text>
  <text x="730" y="336" text-anchor="middle" font-size="12" fill="#888">CLAUDE.md 프로젝트 지식</text>
  <text x="730" y="354" text-anchor="middle" font-size="12" fill="#888">~/.claude/ 글로벌 설정</text>
  <text x="730" y="372" text-anchor="middle" font-size="12" fill="#888">대화 히스토리 유지</text>

  <line x1="620" y1="310" x2="560" y2="250" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#ccmarr)"/>

  <!-- Use cases row -->
  <rect x="40" y="408" width="800" height="34" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="424" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">대표 활용: 코드 리뷰·리팩토링 | PR 생성 | 버그 수정 | 테스트 작성 | 문서화 | CI/CD 스크립트</text>
  <text x="440" y="438" text-anchor="middle" font-size="12" fill="#888">+ 깃허브 Actions, Web App(claude.ai/code), VS Code/JetBrains 익스텐션에서도 사용 가능</text>
</svg>
