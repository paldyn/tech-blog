<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BiFunction / BiPredicate / BiConsumer — 코드 예제</text>

  <!-- BiFunction code -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">BiFunction — 두 값으로 결과 생성</text>
  <rect x="60" y="90" width="380" height="138" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">BiFunction</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; repeat =</tspan></text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    (s, n) -&gt; s.</tspan><tspan font-weight="600" fill="#7ec8e3">repeat</tspan><tspan fill="#ffffff">(n);</tspan></text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">repeat.</tspan><tspan font-weight="600" fill="#7ec8e3">apply</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"ab"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// "ababab"</tspan></text>
  <text x="76" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// andThen: 결과에 추가 변환</text>
  <text x="76" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">BiFunction</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">&gt; repeatLen =</tspan></text>
  <text x="76" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    repeat.</tspan><tspan font-weight="600" fill="#7ec8e3">andThen</tspan><tspan fill="#ffffff">(</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">::</tspan><tspan font-weight="600" fill="#7ec8e3">length</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- BiPredicate code -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">BiPredicate — 두 값 조건 검사</text>
  <rect x="460" y="90" width="360" height="138" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">BiPredicate</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">&gt; longerThan =</tspan></text>
  <text x="476" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    (s, n) -&gt; s.</tspan><tspan font-weight="600" fill="#7ec8e3">length</tspan><tspan fill="#ffffff">() &gt; n;</tspan></text>
  <text x="476" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">longerThan.</tspan><tspan font-weight="600" fill="#7ec8e3">test</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// true</tspan></text>
  <text x="476" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// and / or / negate 조합</text>
  <text x="476" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">BiPredicate</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">&gt; check =</tspan></text>
  <text x="476" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    longerThan.</tspan><tspan font-weight="600" fill="#7ec8e3">and</tspan><tspan fill="#ffffff">((s, n) -&gt; s != </tspan><tspan font-weight="600" fill="#7ec8e3">null</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- BiConsumer + BinaryOperator code -->
  <text x="60" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">BiConsumer — Map.forEach</text>
  <rect x="60" y="262" width="380" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">Map</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">&gt; scores = Map.of(</tspan></text>
  <text x="76" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "Alice"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">90</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"Bob"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">85</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="324" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">scores.</tspan><tspan font-weight="600" fill="#7ec8e3">forEach</tspan><tspan fill="#ffffff">((name, score) -&gt;</tspan></text>
  <text x="76" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan font-weight="600" fill="#7ec8e3">System</tspan><tspan fill="#ffffff">.out.</tspan><tspan font-weight="600" fill="#7ec8e3">printf</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"%s: %d%n"</tspan><tspan fill="#ffffff">, name, score));</tspan></text>
  <text x="76" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Map.forEach의 파라미터: BiConsumer&lt;K,V&gt;</text>

  <!-- BinaryOperator -->
  <text x="460" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">BinaryOperator — reduce와 조합</text>
  <rect x="460" y="262" width="360" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 최댓값 reduce</text>
  <text x="476" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan font-weight="600" fill="#7ec8e3">Optional</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">&gt; max = </tspan></text>
  <text x="476" y="324" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    nums.</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">()</tspan></text>
  <text x="476" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">         .</tspan><tspan font-weight="600" fill="#7ec8e3">reduce</tspan><tspan fill="#ffffff">(</tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">::</tspan><tspan font-weight="600" fill="#7ec8e3">max</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="476" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// reduce는 BinaryOperator&lt;T&gt;를 받음</text>

  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Bi 계열은 두 파라미터를 받는 람다 표현식이 필요할 때 사용 — API 설계 시 BiFunction으로 유연성 확보 가능</text>
</svg>
