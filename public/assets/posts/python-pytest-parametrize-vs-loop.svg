<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">루프 대신 parametrize를 쓰는 이유</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e05555">함수 안에서 for 루프</text>
  <rect x="60" y="108" width="360" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">for</text>
  <text xml:space="preserve" x="108" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">n, sq in cases:</text>
  <text xml:space="preserve" x="100" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">assert</text>
  <text xml:space="preserve" x="162" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">square(n) == sq</text>
  <text xml:space="preserve" x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 첫 실패에서 멈춤</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#55c555">parametrize</text>
  <rect x="460" y="108" width="360" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 케이스마다 별도 테스트</text>
  <text xml:space="preserve" x="476" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_sq[2-4]   ✓</text>
  <text xml:space="preserve" x="476" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">test_sq[3-8]   ✗</text>
  <text xml:space="preserve" x="476" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_sq[4-16]  ✓</text>

  <text x="60" y="270" font-size="13" fill="#888" xml:space="preserve">루프는 첫 실패에서 멈추고 어느 입력이 문제인지 가린다.</text>
  <text x="60" y="296" font-size="13" fill="#888" xml:space="preserve">parametrize는 모든 케이스를 끝까지 돌려, 실패한 입력을 이름으로 정확히 짚어 준다.</text>
</svg>
