<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JShell 대화형 세션과 주요 명령어</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">실제 JShell 세션 예시와 슬래시 명령 참조</text>

  <!-- Left section label -->
  <text x="60" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">JShell 세션 예시</text>

  <!-- Code block: x=60, y=96, w=380, h=258, 12 lines starting at y=118 -->
  <rect x="60" y="96" width="380" height="258" fill="#070b14" rx="6" stroke="#1e2433"/>

  <!-- Line 1: $ jshell -->
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#888">$</tspan> <tspan fill="#55c555">jshell</tspan></text>
  <!-- Line 2: | JShell – Version 21 -->
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">|  JShell -- Version 21</text>
  <!-- Line 3: jshell> int x = 10 -->
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">jshell&gt; int</tspan><tspan fill="#e8e8e8"> x = </tspan><tspan fill="#b5cea8">10</tspan></text>
  <!-- Line 4: x ==> 10 -->
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">x<tspan fill="#888"> ==&gt; </tspan><tspan fill="#b5cea8">10</tspan></text>
  <!-- Line 5: jshell> x * x -->
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">jshell&gt;</tspan> x * x</text>
  <!-- Line 6: $1 ==> 100 -->
  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">$1 ==&gt; <tspan fill="#b5cea8">100</tspan></text>
  <!-- Line 7: jshell> var msg = "Hello" -->
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">jshell&gt; var</tspan><tspan fill="#e8e8e8"> msg = </tspan><tspan fill="#ce9178">"Hello"</tspan></text>
  <!-- Line 8: msg ==> "Hello" -->
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">msg<tspan fill="#888"> ==&gt; </tspan><tspan fill="#ce9178">"Hello"</tspan></text>
  <!-- Line 9: jshell> msg.length() -->
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">jshell&gt;</tspan> msg.length()</text>
  <!-- Line 10: $2 ==> 5 -->
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">$2 ==&gt; <tspan fill="#b5cea8">5</tspan></text>
  <!-- Line 11: jshell> /vars -->
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">jshell&gt;</tspan> /vars</text>
  <!-- Line 12: jshell> /exit -->
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">jshell&gt;</tspan> <tspan fill="#e05555">/exit</tspan></text>

  <!-- Right section label -->
  <text x="500" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">슬래시 명령 참조</text>

  <!-- Command boxes: x=500, w=320, h=26, spacing=30px, starting at y=96 -->

  <!-- /list -->
  <rect x="500" y="96" width="320" height="26" fill="#0f1a2e" rx="4" stroke="#1e2d4a"/>
  <text x="516" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">/list</text>
  <text x="600" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">입력한 스니펫 목록</text>

  <!-- /vars -->
  <rect x="500" y="126" width="320" height="26" fill="#0f1a2e" rx="4" stroke="#1e2d4a"/>
  <text x="516" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">/vars</text>
  <text x="600" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">선언된 변수 목록</text>

  <!-- /methods -->
  <rect x="500" y="156" width="320" height="26" fill="#0f1a2e" rx="4" stroke="#1e2d4a"/>
  <text x="516" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">/methods</text>
  <text x="600" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정의된 메서드 목록</text>

  <!-- /types -->
  <rect x="500" y="186" width="320" height="26" fill="#0f1a2e" rx="4" stroke="#1e2d4a"/>
  <text x="516" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">/types</text>
  <text x="600" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클래스·인터페이스 목록</text>

  <!-- /imports -->
  <rect x="500" y="216" width="320" height="26" fill="#0f1a2e" rx="4" stroke="#1e2d4a"/>
  <text x="516" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">/imports</text>
  <text x="600" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현재 임포트 목록</text>

  <!-- /history -->
  <rect x="500" y="246" width="320" height="26" fill="#0f2310" rx="4" stroke="#1e3a1a"/>
  <text x="516" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">/history</text>
  <text x="600" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전체 입력 이력</text>

  <!-- /open -->
  <rect x="500" y="276" width="320" height="26" fill="#151428" rx="4" stroke="#2a2855"/>
  <text x="516" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">/open</text>
  <text x="600" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일 열어 실행</text>

  <!-- /exit -->
  <rect x="500" y="306" width="320" height="26" fill="#1a0f0f" rx="4" stroke="#3a1e1e"/>
  <text x="516" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">/exit</text>
  <text x="600" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JShell 종료</text>

  <!-- Bottom note -->
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">Tab 자동완성, ↑↓ 이력 탐색, /help 명령으로 전체 도움말을 확인할 수 있습니다</text>
</svg>
