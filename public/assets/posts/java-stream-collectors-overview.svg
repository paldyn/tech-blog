<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">java.util.stream.Collectors 전체 분류</text>

  <!-- Section 1: 기본 수집 -->
  <rect x="60" y="66" width="360" height="160" fill="#0f1f30" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 수집</text>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">toList()                       List (가변)</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">toSet()                        Set (가변)</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">toUnmodifiableList()           불변 List</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">toCollection(TreeSet::new)     특정 구현체</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">toMap(key, value)              Map</text>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">toMap(key, value, mergeF)      중복 키 병합</text>

  <!-- Section 2: 문자열 -->
  <rect x="460" y="66" width="360" height="160" fill="#0f2010" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">문자열 · 그룹화</text>
  <text x="480" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">joining()                      "" 구분자 없음</text>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">joining(", ")                  구분자</text>
  <text x="480" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">joining(", ", "[", "]")        구분자+접두/접미</text>
  <text x="480" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">groupingBy(classifier)         Map&lt;K, List&lt;V&gt;&gt;</text>
  <text x="480" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">groupingBy(cl, downstream)     2단계 그룹</text>
  <text x="480" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">partitioningBy(pred)           Map&lt;Boolean, List&gt;</text>

  <!-- Section 3: 집계 -->
  <rect x="60" y="246" width="360" height="148" fill="#201020" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">집계 · 다운스트림</text>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">counting()                     long</text>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">summingInt / summingLong       합계</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">averagingInt / averagingDouble 평균</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">minBy / maxBy                  Optional&lt;T&gt;</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">summarizingInt/Long/Double     통계 한 번에</text>

  <!-- Section 4: 변환 -->
  <rect x="460" y="246" width="360" height="148" fill="#1a1500" rx="8" stroke="#e0b555" stroke-width="1.5"/>
  <text x="640" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0b555">변환 · 커스텀</text>
  <text x="480" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">mapping(fn, downstream)        변환 후 수집</text>
  <text x="480" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">filtering(pred, downstream)    필터 후 수집</text>
  <text x="480" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">flatMapping(fn, downstream)    평탄화 후 수집</text>
  <text x="480" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">collectingAndThen(c, fn)       수집 후 변환</text>
  <text x="480" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">teeing(c1, c2, merger)         Java 12: 분기</text>

  <!-- Bottom note -->
  <rect x="60" y="410" width="760" height="74" fill="#0a0a14" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Collector 조합 원칙</text>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">groupingBy의 2번째 인수(다운스트림)에 counting(), toSet(), joining() 등을 중첩 가능</text>
  <text x="80" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">collectingAndThen으로 최종 변환 추가 — 예: toList 후 Collections.unmodifiableList</text>
</svg>
