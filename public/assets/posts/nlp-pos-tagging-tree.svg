<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">품사 태깅(POS Tagging): 단어의 문법적 역할</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">"고양이가 빠르게 달린다" — 세종 품사 체계 + 주요 POS 카테고리 비교</text>

  <!-- ===== TOP: POS TAGGING VISUALIZATION ===== -->
  <text x="84" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">품사 태깅 예시 (세종 태그셋)</text>

  <!-- Token 1: 고양이 → NNG -->
  <rect x="60" y="108" width="110" height="80" fill="#0d1a2e" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="115" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">고양이</text>
  <rect x="76" y="142" width="78" height="20" fill="#1a2a3a" rx="4"/>
  <text x="115" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">NNG</text>
  <text x="115" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">일반명사</text>

  <!-- Token 2: 가 → JKS -->
  <rect x="180" y="108" width="80" height="80" fill="#111827" rx="8" stroke="#555" stroke-width="1.5"/>
  <text x="220" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#888" text-anchor="middle">가</text>
  <rect x="194" y="142" width="52" height="20" fill="#1a1a1a" rx="4"/>
  <text x="220" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#555" text-anchor="middle">JKS</text>
  <text x="220" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">주격조사</text>

  <!-- Token 3: 빠르게 → MAG -->
  <rect x="270" y="108" width="110" height="80" fill="#1a0d2e" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="325" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">빠르게</text>
  <rect x="286" y="142" width="78" height="20" fill="#1a1a2e" rx="4"/>
  <text x="325" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">MAG</text>
  <text x="325" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">일반부사</text>

  <!-- Token 4: 달린다 → VV+EF -->
  <rect x="390" y="108" width="120" height="80" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="450" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">달린다</text>
  <rect x="406" y="142" width="88" height="20" fill="#1a2a1a" rx="4"/>
  <text x="450" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">VV+EF</text>
  <text x="450" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">동사+종결어미</text>

  <!-- Dependency-style arcs (simplified) -->
  <!-- 달린다 governs 고양이가 -->
  <path d="M 450,108 Q 300,80 220,108" fill="none" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="320" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">주어</text>
  <!-- 달린다 governs 빠르게 -->
  <path d="M 450,108 Q 400,88 385,108" fill="none" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="420" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">수식</text>

  <!-- ===== POS CATEGORY TABLE (right side top) ===== -->
  <rect x="556" y="96" width="284" height="196" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="698" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">세종 품사 체계 주요 카테고리</text>

  <!-- Header row -->
  <rect x="572" y="126" width="60" height="18" fill="#1e2433" rx="3"/>
  <text x="602" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">태그</text>
  <rect x="638" y="126" width="80" height="18" fill="#1e2433" rx="3"/>
  <text x="678" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">카테고리</text>
  <rect x="724" y="126" width="100" height="18" fill="#1e2433" rx="3"/>
  <text x="774" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">예시</text>

  <!-- Row data -->
  <text x="602" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">NNG</text>
  <text x="678" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">일반명사</text>
  <text x="774" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">고양이, 사람</text>

  <text x="602" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">NNP</text>
  <text x="678" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">고유명사</text>
  <text x="774" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">서울, 홍길동</text>

  <text x="602" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">VV</text>
  <text x="678" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">동사</text>
  <text x="774" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">달리다, 먹다</text>

  <text x="602" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">VA</text>
  <text x="678" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">형용사</text>
  <text x="774" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">빠르다, 좋다</text>

  <text x="602" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">MAG</text>
  <text x="678" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">일반부사</text>
  <text x="774" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">빠르게, 매우</text>

  <text x="602" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#555" text-anchor="middle">JKS</text>
  <text x="678" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">주격조사</text>
  <text x="774" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">이/가</text>

  <text x="602" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#555" text-anchor="middle">EF</text>
  <text x="678" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">종결어미</text>
  <text x="774" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">-ㄴ다, -어요</text>

  <!-- ===== BOTTOM: ARCHITECTURE COMPARISON ===== -->
  <rect x="60" y="214" width="480" height="280" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">POS 태거 발전 역사</text>

  <!-- HMM -->
  <rect x="76" y="248" width="140" height="70" fill="#111827" rx="6" stroke="#555" stroke-width="1"/>
  <text x="146" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">HMM 기반</text>
  <text x="146" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">은닉 마르코프 모델</text>
  <text x="146" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">Viterbi 알고리즘</text>
  <text x="146" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444" text-anchor="middle">1990년대 ~ 2000년대</text>

  <!-- Arrow HMM → CRF -->
  <polygon points="220,280 234,280 234,274 248,286 234,298 234,292 220,292" fill="#555"/>

  <!-- CRF -->
  <rect x="252" y="248" width="140" height="70" fill="#111827" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="322" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">CRF 기반</text>
  <text x="322" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">조건부 랜덤 필드</text>
  <text x="322" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">피처 엔지니어링</text>
  <text x="322" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">2000년대 ~ 2010년대</text>

  <!-- Arrow CRF → BERT -->
  <polygon points="396,280 410,280 410,274 424,286 410,298 410,292 396,292" fill="#555"/>

  <!-- BERT-CRF -->
  <rect x="428" y="248" width="100" height="70" fill="#0d1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="478" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">BERT</text>
  <text x="478" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">+CRF</text>
  <text x="478" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">최고 성능</text>
  <text x="478" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">2018년~현재</text>

  <!-- Accuracy bars -->
  <text x="84" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">영어 Penn Treebank 정확도 비교</text>

  <text x="84" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">HMM</text>
  <rect x="130" y="356" width="166" height="14" fill="#333" rx="3"/>
  <text x="300" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">96.5%</text>

  <text x="84" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CRF</text>
  <rect x="130" y="380" width="186" height="14" fill="#7ec8e3" opacity="0.5" rx="3"/>
  <text x="320" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">97.5%</text>

  <text x="84" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">BERT</text>
  <rect x="130" y="404" width="220" height="14" fill="#7777cc" opacity="0.7" rx="3"/>
  <text x="354" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">97.9%+</text>

  <text x="84" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">※ 한국어는 형태론적 복잡성으로 인해 서브태스크 구성이 다름. Komoran·Mecab 등 전문 분석기 활용 권장</text>

  <!-- Tagset comparison box -->
  <rect x="556" y="310" width="284" height="180" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="698" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">품사 체계 비교</text>

  <text x="572" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Penn Treebank (영어)</text>
  <text x="572" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">NN/NNS/NNP: 명사</text>
  <text x="572" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">VB/VBD/VBG: 동사 변형</text>
  <text x="572" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">총 36개 태그</text>

  <line x1="572" y1="412" x2="824" y2="412" stroke="#3a4a6e" stroke-width="1"/>

  <text x="572" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">세종 태그셋 (한국어)</text>
  <text x="572" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">형태소 결합 표기: VV+EF</text>
  <text x="572" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">조사·어미 세분화 체계</text>
  <text x="572" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">총 40+ 태그</text>
</svg>
