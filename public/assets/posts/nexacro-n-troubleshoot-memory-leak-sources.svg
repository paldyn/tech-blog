<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">메모리 누수 주요 발생 원인</text>

  <!-- Source 1 -->
  <rect x="60" y="62" width="368" height="70" rx="6" fill="#1e0505" stroke="#e05555" stroke-width="1"/>
  <text x="244" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">① 이벤트 핸들러 미해제</text>
  <text x="244" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">addEventHandler로 등록한 이벤트를</text>
  <text x="244" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">onunload에서 removeEventHandler 미호출</text>

  <!-- Source 2 -->
  <rect x="452" y="62" width="368" height="70" rx="6" fill="#1e0505" stroke="#e05555" stroke-width="1"/>
  <text x="636" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">② setInterval 미해제</text>
  <text x="636" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">timer.start로 시작한 타이머를</text>
  <text x="636" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">화면 종료 시 timer.stop 미호출</text>

  <!-- Source 3 -->
  <rect x="60" y="144" width="368" height="70" rx="6" fill="#241a05" stroke="#e0a030" stroke-width="1"/>
  <text x="244" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a030">③ Dataset 과다 누적</text>
  <text x="244" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">조회마다 Dataset row가 추가되고</text>
  <text x="244" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">clearData 없이 계속 쌓이는 경우</text>

  <!-- Source 4 -->
  <rect x="452" y="144" width="368" height="70" rx="6" fill="#241a05" stroke="#e0a030" stroke-width="1"/>
  <text x="636" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a030">④ 팝업 폼 미해제</text>
  <text x="636" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">modaless 팝업을 close하지 않고</text>
  <text x="636" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">반복 open하면 메모리 계속 점유</text>

  <!-- Source 5 -->
  <rect x="60" y="226" width="368" height="70" rx="6" fill="#1a1435" stroke="#7777cc" stroke-width="1"/>
  <text x="244" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">⑤ 동적 생성 컴포넌트 미삭제</text>
  <text x="244" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">addChild로 동적 추가한 컴포넌트를</text>
  <text x="244" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">removeChild/destroy 없이 재생성</text>

  <!-- Source 6 -->
  <rect x="452" y="226" width="368" height="70" rx="6" fill="#1a1435" stroke="#7777cc" stroke-width="1"/>
  <text x="636" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">⑥ 전역 변수 배열 누적</text>
  <text x="636" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전역 배열에 계속 push하고</text>
  <text x="636" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">화면 종료 시 초기화하지 않는 경우</text>

  <text x="440" y="368" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">장기 운영 시스템에서 메모리 누수는 브라우저 탭 충돌로 이어질 수 있다</text>
</svg>
