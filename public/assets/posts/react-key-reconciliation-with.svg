<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a">
  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">key 있을 때 — 효율적 리스트 재조정</text>

  <!-- 기존 리스트 -->
  <text x="230" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">기존 리스트</text>

  <rect x="120" y="88" width="220" height="38" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">key="1": 홍길동</text>

  <rect x="120" y="134" width="220" height="38" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="158" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">key="2": 김철수</text>

  <rect x="120" y="180" width="220" height="38" rx="6" fill="#0d1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="204" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">key="3": 이영희</text>

  <!-- 화살표 -->
  <line x1="350" y1="160" x2="468" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="410" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">key 매칭</text>

  <!-- 새 리스트 -->
  <text x="650" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">새 리스트 (앞에 박민준 추가)</text>

  <rect x="540" y="88" width="220" height="38" rx="6" fill="#0d1f12" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="112" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">key="4": 박민준 (NEW)</text>

  <rect x="540" y="134" width="220" height="38" rx="6" fill="#0d1828" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="158" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">key="1": 홍길동 (재사용)</text>

  <rect x="540" y="180" width="220" height="38" rx="6" fill="#0d1828" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="204" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">key="2": 김철수 (재사용)</text>

  <rect x="540" y="226" width="220" height="38" rx="6" fill="#0d1828" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="250" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">key="3": 이영희 (재사용)</text>

  <!-- 설명 박스 -->
  <rect x="60" y="290" width="760" height="68" rx="10" fill="#0d1f12" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">key가 있으면 React는 id로 동일성을 추적한다</text>
  <text x="440" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">기존 3개 노드 재사용, 새 항목(key="4")만 DOM에 삽입 — 최소 변경</text>

  <!-- 코드 박스 -->
  <rect x="60" y="374" width="760" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="396"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 올바른 key: 데이터 고유 id (index 쓰지 말 것)</text>
  <text x="76" y="416"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">users.map(u =&gt; &lt;Item key={u.id} user={u} /&gt;)</text>
</svg>
