<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이미지 ↔ 컨테이너 관계와 레이어 공유</text>

  <!-- Single image -->
  <rect x="60" y="76" width="200" height="80" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">이미지</text>
  <text x="160" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">nginx:alpine</text>
  <text x="160" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">읽기 전용 레이어 묶음</text>

  <!-- Arrow: 1 image → N containers -->
  <line x1="260" y1="116" x2="380" y2="80" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="376,72 388,82 374,86" fill="#7ec8e3"/>

  <line x1="260" y1="116" x2="380" y2="116" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="368,110 382,116 368,122" fill="#7ec8e3"/>

  <line x1="260" y1="116" x2="380" y2="152" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="376,146 388,156 374,160" fill="#7ec8e3"/>

  <text x="320" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">1 이미지</text>
  <text x="320" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">→</text>
  <text x="320" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">N 컨테이너</text>

  <!-- Containers -->
  <rect x="380" y="62" width="140" height="44" rx="6" fill="#1a1a0a" stroke="#e8e8e8" stroke-width="1"/>
  <text x="450" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">container A</text>

  <rect x="380" y="98" width="140" height="44" rx="6" fill="#1a1a0a" stroke="#e8e8e8" stroke-width="1"/>
  <text x="450" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">container B</text>

  <rect x="380" y="134" width="140" height="44" rx="6" fill="#1a1a0a" stroke="#e8e8e8" stroke-width="1"/>
  <text x="450" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">container C</text>

  <!-- Shared layers label -->
  <text x="450" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">각자 독립 쓰기 레이어 보유</text>

  <!-- Layer sharing between images -->
  <text x="700" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">레이어 공유로 디스크 절약</text>

  <rect x="580" y="92" width="260" height="80" rx="8" fill="#111827" stroke="#333"/>

  <rect x="596" y="104" width="228" height="28" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">ubuntu:22.04 (공유 베이스)</text>

  <rect x="596" y="136" width="100" height="24" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="646" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">app-v1 전용</text>

  <rect x="724" y="136" width="100" height="24" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="774" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">app-v2 전용</text>

  <!-- Image anatomy -->
  <rect x="60" y="240" width="760" height="130" rx="10" fill="#111320" stroke="#7777cc" stroke-width="1"/>
  <text x="100" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">이미지 구성 요소</text>

  <!-- Manifest -->
  <rect x="80" y="280" width="160" height="72" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Manifest</text>
  <text x="160" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">레이어 목록 + 설정</text>
  <text x="160" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">digest 참조</text>

  <!-- Config -->
  <rect x="260" y="280" width="160" height="72" rx="6" fill="#0d0d1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="340" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Config (JSON)</text>
  <text x="340" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ENV / CMD / EXPOSE</text>
  <text x="340" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">레이어 히스토리</text>

  <!-- Layers -->
  <rect x="440" y="280" width="160" height="72" rx="6" fill="#0d0d1a" stroke="#55c555" stroke-width="1"/>
  <text x="520" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Layers (tar.gz)</text>
  <text x="520" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">파일시스템 변경분</text>
  <text x="520" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">content-addressable</text>

  <!-- Tags -->
  <rect x="620" y="280" width="180" height="72" rx="6" fill="#0d0d1a" stroke="#e8e8e8" stroke-width="1"/>
  <text x="710" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Tag / Digest</text>
  <text x="710" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사람이 읽는 참조</text>
  <text x="710" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">sha256:... (불변)</text>

  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">이미지 = 불변(immutable) 아티팩트 — 컨테이너는 이미지 위에 쓰기 레이어를 추가한 실행 인스턴스</text>
</svg>
