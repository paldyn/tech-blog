<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">df — 파일시스템 디스크 사용량</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">마운트된 파일시스템 전체의 용량·사용량·남은 공간을 한눈에</text>

  <!-- df -h output -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">df -h 출력 예시</text>
  <rect x="60" y="114" width="760" height="130" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">Filesystem      Size  Used Avail Use%  Mounted on</text>
  <text x="76" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">/dev/sda1        50G   18G   30G  38%  /</text>
  <text x="76" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">/dev/sda2       100G   72G   24G  76%  /home</text>
  <text x="76" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a020" xml:space="preserve">/dev/sdb1       500G  460G   28G  95%  /data</text>
  <text x="76" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">tmpfs           7.8G  1.2G  6.6G  16%  /dev/shm</text>
  <text x="76" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">tmpfs           1.6G  1.2M  1.6G   1%  /run</text>

  <!-- Column annotations -->
  <text x="76" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">① Filesystem</text>
  <text x="76" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">장치 경로</text>
  <text x="220" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">② Size</text>
  <text x="220" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체 용량</text>
  <text x="320" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">③ Used</text>
  <text x="320" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">사용 중</text>
  <text x="420" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">④ Avail</text>
  <text x="420" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">남은 공간</text>
  <text x="530" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">⑤ Use%</text>
  <text x="530" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">사용률(80↑경고)</text>
  <text x="660" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">⑥ Mounted on</text>
  <text x="660" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">마운트 포인트</text>

  <!-- Usage bar for /data (95%) -->
  <text x="60" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">/data 사용률 시각화 (95% — 위험)</text>
  <rect x="60" y="314" width="760" height="22" fill="#1a1200" rx="4" stroke="#444" stroke-width="1"/>
  <rect x="60" y="314" width="722" height="22" fill="#e05555" rx="4"/>
  <text x="445" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="600">95% 사용 (460G / 500G)</text>

  <!-- Common commands -->
  <text x="60" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">자주 쓰는 df 명령어</text>
  <rect x="60" y="378" width="760" height="44" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">df -h</text>
  <text x="120" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">          # 사람이 읽기 쉬운 단위(G/M)</text>
  <text x="420" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">df -i</text>
  <text x="464" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">          # inode 사용량 확인</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">df -hT</text>
  <text x="128" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">         # 파일시스템 타입 포함</text>
  <text x="420" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">df -h /home</text>
  <text x="510" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">      # 특정 경로만</text>
</svg>
