<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="19" font-weight="700" fill="#e8e8e8">일반 함수 vs 화살표 함수 — this 비교</text>
  <text x="440" y="64" text-anchor="middle" font-size="13" fill="#555">화살표 함수는 자신만의 this를 갖지 않는다 — 렉시컬 this</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="390" stroke="#1e1e1e" stroke-width="2"/>

  <!-- Left: Regular function -->
  <text x="220" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#cc8844">일반 함수 (function)</text>
  <text x="220" y="120" text-anchor="middle" font-size="12" fill="#666">호출 시점에 this가 결정됨</text>

  <rect x="40" y="134" width="370" height="180" rx="8" fill="#141008" stroke="#2a2010" stroke-width="1"/>
  <text x="225" y="158" text-anchor="middle" font-size="11.5" fill="#888">function Timer() {</text>
  <text x="225" y="176" text-anchor="middle" font-size="11.5" fill="#888">  this.seconds = 0;</text>
  <text x="225" y="194" text-anchor="middle" font-size="11.5" fill="#888">  setInterval(function() {</text>
  <text x="225" y="212" text-anchor="middle" font-size="11.5" fill="#cc6622">    this.seconds++; // ❌ 여기서 this는?</text>
  <text x="225" y="230" text-anchor="middle" font-size="11.5" fill="#cc6622">    // this = window (혹은 undefined)</text>
  <text x="225" y="248" text-anchor="middle" font-size="11.5" fill="#888">  }, 1000);</text>
  <text x="225" y="266" text-anchor="middle" font-size="11.5" fill="#888">}</text>
  <text x="225" y="284" text-anchor="middle" font-size="11.5" fill="#888">new Timer(); // Timer의 seconds가 증가하지 않음</text>

  <rect x="80" y="328" width="290" height="44" rx="6" fill="#200c00"/>
  <text x="225" y="348" text-anchor="middle" font-size="11" fill="#cc8844">콜백 안 function()의 this는</text>
  <text x="225" y="364" text-anchor="middle" font-size="11" fill="#cc6622">Timer 인스턴스가 아님 ⚠</text>

  <!-- Right: Arrow function -->
  <text x="660" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#44aa88">화살표 함수 (arrow)</text>
  <text x="660" y="120" text-anchor="middle" font-size="12" fill="#666">선언 시점의 this를 캡처 (렉시컬)</text>

  <rect x="458" y="134" width="380" height="180" rx="8" fill="#08140e" stroke="#1a2a20" stroke-width="1"/>
  <text x="648" y="158" text-anchor="middle" font-size="11.5" fill="#888">function Timer() {</text>
  <text x="648" y="176" text-anchor="middle" font-size="11.5" fill="#888">  this.seconds = 0;</text>
  <text x="648" y="194" text-anchor="middle" font-size="11.5" fill="#888">  setInterval(() =&gt; {  // 화살표 함수</text>
  <text x="648" y="212" text-anchor="middle" font-size="11.5" fill="#44cc88">    this.seconds++; // ✓ Timer 인스턴스의 this</text>
  <text x="648" y="230" text-anchor="middle" font-size="11.5" fill="#44cc88">    // 선언 시점(Timer 함수 내부)의 this 사용</text>
  <text x="648" y="248" text-anchor="middle" font-size="11.5" fill="#888">  }, 1000);</text>
  <text x="648" y="266" text-anchor="middle" font-size="11.5" fill="#888">}</text>
  <text x="648" y="284" text-anchor="middle" font-size="11.5" fill="#888">new Timer(); // seconds가 정상 증가</text>

  <rect x="498" y="328" width="290" height="44" rx="6" fill="#001c10"/>
  <text x="643" y="348" text-anchor="middle" font-size="11" fill="#44aa88">화살표 함수는 this를 바인딩하지 않음</text>
  <text x="643" y="364" text-anchor="middle" font-size="11" fill="#44cc88">외부 스코프의 this를 그대로 사용 ✓</text>
</svg>
