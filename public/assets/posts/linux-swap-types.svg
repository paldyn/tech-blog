<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스왑 메모리 — 파티션 vs 파일</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">RAM이 부족할 때 디스크를 임시 메모리로 활용하는 가상 메모리 기법</text>

  <!-- Left: Swap partition -->
  <rect x="60" y="92" width="340" height="200" fill="#071420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">스왑 파티션</text>
  <line x1="60" y1="122" x2="400" y2="122" stroke="#1e2433" stroke-width="1"/>
  <text x="230" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">전용 파티션 (타입: 82/linux-swap)</text>
  <text x="230" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">장점: 성능 우수, 단편화 없음</text>
  <text x="230" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">단점: 크기 변경 어려움</text>
  <text x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve"># 생성</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">mkswap /dev/sdb2</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">swapon /dev/sdb2</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve"># fstab</text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">UUID=...  none  swap  sw  0  0</text>

  <!-- Right: Swap file -->
  <rect x="480" y="92" width="340" height="200" fill="#071a07" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">스왑 파일</text>
  <line x1="480" y1="122" x2="820" y2="122" stroke="#1e2433" stroke-width="1"/>
  <text x="650" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">일반 파일로 생성 (/swapfile)</text>
  <text x="650" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">장점: 크기 조정 유연, 클라우드 친화</text>
  <text x="650" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a020" text-anchor="middle">단점: 약간의 성능 오버헤드</text>
  <text x="496" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve"># 2G 스왑 파일 생성</text>
  <text x="496" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">fallocate -l 2G /swapfile</text>
  <text x="496" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">chmod 600 /swapfile</text>
  <text x="496" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">mkswap /swapfile</text>
  <text x="496" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">swapon /swapfile</text>

  <!-- Memory diagram -->
  <text x="60" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">메모리 압박 시 흐름</text>
  <rect x="60" y="328" width="160" height="40" fill="#0d1117" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">RAM (물리 메모리)</text>
  <line x1="220" y1="348" x2="280" y2="348" stroke="#e05555" stroke-width="2"/>
  <polygon points="280,342 280,354 292,348" fill="#e05555"/>
  <text x="250" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">압박</text>
  <rect x="292" y="328" width="140" height="40" fill="#1a0000" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="362" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">페이지 교체</text>
  <line x1="432" y1="348" x2="492" y2="348" stroke="#888" stroke-width="2"/>
  <polygon points="492,342 492,354 504,348" fill="#888"/>
  <rect x="504" y="328" width="160" height="40" fill="#111" rx="6" stroke="#888" stroke-width="1.5"/>
  <text x="584" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">스왑 (디스크)</text>

  <!-- swappiness -->
  <text x="700" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">vm.swappiness</text>
  <text x="700" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">0 = 가능한 한 스왑 사용 안 함</text>
  <text x="700" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">10 = 서버 권장 (DB 환경)</text>
  <text x="700" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">60 = 기본값 (Ubuntu)</text>
  <text x="700" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">100 = 적극적으로 스왑 사용</text>
</svg>
