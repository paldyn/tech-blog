<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Effect 실행 타이밍 비교</text>

  <!-- 헤더 행 -->
  <text x="140" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Hook</text>
  <text x="340" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">실행 시점</text>
  <text x="600" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">용도</text>

  <line x1="60" y1="84" x2="820" y2="84" stroke="#3a4a6e" stroke-width="1"/>

  <!-- useEffect 행 -->
  <rect x="60" y="92" width="760" height="58" rx="6" fill="#0a0e16" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="120" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">useEffect</text>
  <text x="340" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DOM 반영 + 화면 페인트</text>
  <text x="340" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이후 비동기 실행</text>
  <text x="600" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">데이터 페칭, 구독, 타이머</text>
  <text x="600" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대부분의 부수효과</text>

  <!-- useLayoutEffect 행 -->
  <rect x="60" y="158" width="760" height="58" rx="6" fill="#0a0e16" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="184" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#ce9178">useLayoutEffect</text>
  <text x="340" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DOM 반영 직후</text>
  <text x="340" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">화면 페인트 전 동기 실행</text>
  <text x="600" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DOM 크기·위치 측정</text>
  <text x="600" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">깜빡임 없는 DOM 조작</text>

  <!-- useInsertionEffect 행 -->
  <rect x="60" y="224" width="760" height="58" rx="6" fill="#0a0e16" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="248" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" font-weight="600" fill="#7777cc">useInsertionEffect</text>
  <text x="340" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DOM 변경 전</text>
  <text x="340" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useLayoutEffect보다 먼저</text>
  <text x="600" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">CSS-in-JS 라이브러리 전용</text>
  <text x="600" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">일반 코드에서 사용 금지</text>

  <!-- 코드 박스 -->
  <rect x="60" y="308" width="380" height="132" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="330"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 타이밍 확인 예제</text>
  <text x="76" y="350"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">useLayoutEffect</text>
  <text x="228" y="350"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">(() =&gt; {</text>
  <text x="76" y="370"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">  // DOM 크기 측정 가능</text>
  <text x="76" y="390"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  setHeight(ref.current.offsetHeight);</text>
  <text x="76" y="410"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}, []);</text>
  <text x="76" y="430"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 페인트 전이라 깜빡임 없음</text>

  <!-- 오른쪽 주의사항 -->
  <rect x="468" y="308" width="352" height="132" rx="8" fill="#101820" stroke="#e05555" stroke-width="1.5"/>
  <text x="644" y="334" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">주의: useLayoutEffect</text>
  <text x="484" y="358"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">동기 실행 = 화면 페인트 블로킹</text>
  <text x="484" y="378"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">무거운 작업은 성능 저하 유발</text>
  <text x="484" y="398"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SSR에서 경고 발생 (서버엔 DOM 없음)</text>
  <text x="484" y="418"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">필요할 때만 — 기본은 useEffect</text>
  <text x="484" y="432"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">SSR: suppressHydrationWarning 또는 클라이언트 전용 처리</text>
</svg>
