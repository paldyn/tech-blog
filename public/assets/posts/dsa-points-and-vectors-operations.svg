<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="vecArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="vecArrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="vecArrP" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">벡터 = 끝점 − 시작점, 그리고 덧셈의 평행사변형</text>

  <!-- left diagram: B - A -->
  <text x="150" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">방향 벡터  v = B − A</text>

  <!-- grid origin around (110,330) for left -->
  <line x1="80" y1="340" x2="290" y2="340" stroke="#333" stroke-width="1"/>
  <line x1="110" y1="360" x2="110" y2="140" stroke="#333" stroke-width="1"/>

  <circle cx="150" cy="300" r="5" fill="#55c555"/>
  <text x="150" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">A(1,1)</text>
  <circle cx="260" cy="180" r="5" fill="#e05555"/>
  <text x="262" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">B(4,5)</text>

  <line x1="150" y1="300" x2="256" y2="184" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#vecArr)"/>
  <text x="222" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">v=(3,4)</text>

  <!-- right diagram: parallelogram a + b -->
  <text x="620" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">덧셈  a + b = 평행사변형 대각선</text>

  <line x1="490" y1="340" x2="780" y2="340" stroke="#333" stroke-width="1"/>
  <line x1="520" y1="360" x2="520" y2="140" stroke="#333" stroke-width="1"/>

  <!-- a -->
  <line x1="520" y1="320" x2="630" y2="290" stroke="#55c555" stroke-width="2.5" marker-end="url(#vecArrG)"/>
  <text x="565" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">a</text>
  <!-- b -->
  <line x1="520" y1="320" x2="580" y2="200" stroke="#7777cc" stroke-width="2.5" marker-end="url(#vecArrP)"/>
  <text x="534" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">b</text>
  <!-- a+b diagonal -->
  <line x1="520" y1="320" x2="688" y2="172" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#vecArr)"/>
  <text x="640" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">a+b</text>
  <!-- dashed parallelogram sides -->
  <line x1="630" y1="290" x2="694" y2="166" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="580" y1="200" x2="694" y2="166" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- bottom code -->
  <rect x="60" y="362" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">add</tspan><tspan fill="#ffffff">(a,b)=(a.x+b.x, a.y+b.y)   </tspan><tspan fill="#7ec8e3" font-weight="600">sub</tspan><tspan fill="#ffffff">(b,a)=(b.x-a.x, b.y-a.y)   |v|=√(x²+y²)</tspan></text>
</svg>
