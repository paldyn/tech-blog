<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Bash 변수 유형</text>

  <!-- 4 variable type boxes: 2x2 grid -->
  <!-- Local / Shell variable -->
  <rect x="60" y="72" width="370" height="160" rx="10" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">셸 변수 (Shell Variable)</text>
  <text x="245" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현재 셸 세션에서만 유효, 서브프로세스 미전달</text>
  <rect x="76" y="126" width="338" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">MY_VAR</text>
  <text x="152" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">="hello"</text>
  <text x="92" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">echo "$MY_VAR"    <tspan fill="#9aa4b8"># hello</tspan></text>
  <text x="92" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">bash -c 'echo $MY_VAR' <tspan fill="#9aa4b8"># 빈값</tspan></text>
  <text x="92" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># = 앞뒤 공백 금지!</text>

  <!-- Environment variable -->
  <rect x="450" y="72" width="370" height="160" rx="10" fill="#071407" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">환경 변수 (Environment Variable)</text>
  <text x="635" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">export로 서브프로세스에 전달</text>
  <rect x="466" y="126" width="338" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">export</text>
  <text x="544" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8"> MY_ENV</text>
  <text x="636" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">="world"</text>
  <text x="482" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">bash -c 'echo $MY_ENV' <tspan fill="#9aa4b8"># world</tspan></text>
  <text x="482" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">env | grep MY_ENV</text>
  <text x="482" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 서브셸에도 상속됨</text>

  <!-- Special variables -->
  <rect x="60" y="252" width="370" height="168" rx="10" fill="#120c00" stroke="#e0a055" stroke-width="1.5"/>
  <text x="245" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a055">특수 변수</text>
  <rect x="76" y="290" width="338" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">$0   <tspan fill="#9aa4b8">— 스크립트 이름</tspan></text>
  <text x="92" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">$1-9 <tspan fill="#9aa4b8">— 위치 파라미터 (인자)</tspan></text>
  <text x="92" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">$#   <tspan fill="#9aa4b8">— 인자 개수</tspan></text>
  <text x="92" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">$@   <tspan fill="#9aa4b8">— 모든 인자 (각각 따옴표)</tspan></text>
  <text x="92" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">$?   <tspan fill="#9aa4b8">— 마지막 종료 코드</tspan></text>
  <text x="92" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">$$   <tspan fill="#9aa4b8">— 현재 셸 PID</tspan></text>

  <!-- readonly variable -->
  <rect x="450" y="252" width="370" height="168" rx="10" fill="#0a0a20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="635" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">읽기 전용 / 로컬 변수</text>
  <rect x="466" y="290" width="338" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 읽기 전용 (재할당 불가)</text>
  <text x="482" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" font-weight="600">readonly</text>
  <text x="556" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> PI=3.14159</text>
  <text x="482" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 함수 내 지역 변수</text>
  <text x="482" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" font-weight="600">local</text>
  <text x="524" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> count=0  <tspan fill="#9aa4b8"># 함수 내에서만</tspan></text>
  <text x="482" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 정수 선언</text>
  <text x="482" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" font-weight="600">declare</text>
  <text x="548" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> -i num=10  <tspan fill="#9aa4b8"># 산술 자동</tspan></text>
</svg>
