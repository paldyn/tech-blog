<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="700">마이크로태스크 vs 매크로태스크 실행 순서</text>
  <text x="440" y="64" text-anchor="middle" fill="#555" font-size="13">같은 코드, 다른 출력 순서</text>

  <!-- Code panel -->
  <rect x="60" y="88" width="360" height="300" rx="10" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="60" y="88" width="360" height="38" rx="10" fill="#1a1a1a"/>
  <text x="240" y="113" text-anchor="middle" fill="#aaa" font-size="13" font-weight="700">코드</text>

  <text x="80" y="148" fill="#888" font-size="12" font-family="monospace">console.log('1. 동기');</text>
  <text x="80" y="172" fill="#888" font-size="12" font-family="monospace">setTimeout(() =&gt; {</text>
  <text x="96" y="192" fill="#dd7777" font-size="12" font-family="monospace">  console.log('4. setTimeout');</text>
  <text x="80" y="212" fill="#888" font-size="12" font-family="monospace">}, 0);</text>
  <text x="80" y="236" fill="#888" font-size="12" font-family="monospace">Promise.resolve()</text>
  <text x="96" y="256" fill="#7777dd" font-size="12" font-family="monospace">  .then(() =&gt; console.log('3. Promise'));</text>
  <text x="80" y="280" fill="#888" font-size="12" font-family="monospace">queueMicrotask(() =&gt; {</text>
  <text x="96" y="300" fill="#7777dd" font-size="12" font-family="monospace">  console.log('3. queueMicrotask');</text>
  <text x="80" y="320" fill="#888" font-size="12" font-family="monospace">});</text>
  <text x="80" y="344" fill="#888" font-size="12" font-family="monospace">console.log('2. 동기');</text>

  <!-- Output panel -->
  <rect x="460" y="88" width="360" height="300" rx="10" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="460" y="88" width="360" height="38" rx="10" fill="#1a1a1a"/>
  <text x="640" y="113" text-anchor="middle" fill="#aaa" font-size="13" font-weight="700">출력 순서</text>

  <!-- Output rows -->
  <rect x="476" y="140" width="328" height="36" rx="5" fill="#1a1a10" stroke="#3a3a20" stroke-width="1"/>
  <text x="490" y="162" fill="#ddcc55" font-size="12" font-weight="600">① 동기 코드 — 즉시 실행</text>
  <text x="790" y="162" text-anchor="end" fill="#888" font-size="11">1. 동기</text>

  <rect x="476" y="186" width="328" height="36" rx="5" fill="#10101a" stroke="#202030" stroke-width="1"/>
  <text x="490" y="208" fill="#ddcc55" font-size="12" font-weight="600">② 동기 코드 — 즉시 실행</text>
  <text x="790" y="208" text-anchor="end" fill="#888" font-size="11">2. 동기</text>

  <rect x="476" y="232" width="328" height="36" rx="5" fill="#10102a" stroke="#20206a" stroke-width="1"/>
  <text x="490" y="254" fill="#9999ff" font-size="12" font-weight="600">③ 마이크로태스크 큐 소진</text>
  <text x="790" y="248" text-anchor="end" fill="#7777dd" font-size="11">3. Promise</text>
  <text x="790" y="264" text-anchor="end" fill="#7777dd" font-size="11">3. queueMicrotask</text>

  <rect x="476" y="290" width="328" height="36" rx="5" fill="#2a1010" stroke="#6a2020" stroke-width="1"/>
  <text x="490" y="312" fill="#ff9999" font-size="12" font-weight="600">④ 매크로태스크 큐 (setTimeout)</text>
  <text x="790" y="312" text-anchor="end" fill="#dd7777" font-size="11">4. setTimeout</text>

  <!-- Priority labels -->
  <text x="640" y="358" text-anchor="middle" fill="#444" font-size="11">setTimeout(fn, 0) 이지만 Promise.then 보다 나중에 실행됩니다</text>

  <!-- Arrow -->
  <text x="430" y="248" text-anchor="middle" fill="#333" font-size="22">→</text>

  <!-- Timeline bar -->
  <rect x="60" y="400" width="760" height="20" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <rect x="60" y="400" width="190" height="20" rx="4" fill="#2a2a10"/>
  <rect x="250" y="400" width="190" height="20" fill="#101028"/>
  <rect x="440" y="400" width="190" height="20" fill="#102810"/>
  <rect x="630" y="400" width="190" height="20" rx="4" fill="#281010"/>
  <text x="155" y="414" text-anchor="middle" fill="#888" font-size="10">현재 태스크 실행</text>
  <text x="345" y="414" text-anchor="middle" fill="#666" font-size="10">동기 실행 계속</text>
  <text x="535" y="414" text-anchor="middle" fill="#555" font-size="10">마이크로태스크 전부</text>
  <text x="725" y="414" text-anchor="middle" fill="#555" font-size="10">다음 매크로태스크</text>
</svg>
