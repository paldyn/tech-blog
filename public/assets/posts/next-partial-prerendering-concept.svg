<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Partial Prerendering (PPR) 개념</text>

  <!-- Static shell label -->
  <text x="60" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">정적 셸 (빌드 시점 생성)</text>

  <!-- Main page shell box -->
  <rect x="60" y="106" width="760" height="310" rx="10" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>

  <!-- Static header region -->
  <rect x="80" y="122" width="720" height="56" rx="6" fill="#1a2a44" stroke="#3a5a8e" stroke-width="1"/>
  <text x="440" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Static Header (Nav, Logo)</text>
  <text x="440" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 시 렌더링 → CDN 캐시</text>

  <!-- Dynamic slots -->
  <!-- Slot 1: Hero -->
  <rect x="80" y="194" width="340" height="100" rx="6" fill="#1e1a0a" stroke="#7a5a1e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="250" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a030">Dynamic: 사용자 맞춤 추천</text>
  <text x="250" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Suspense 경계 → 서버 스트리밍</text>
  <text x="250" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">runtime request-time</text>

  <!-- Slot 2: Cart -->
  <rect x="440" y="194" width="340" height="100" rx="6" fill="#1e1a0a" stroke="#7a5a1e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="610" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a030">Dynamic: 장바구니 수량</text>
  <text x="610" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Suspense 경계 → 서버 스트리밍</text>
  <text x="610" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">runtime request-time</text>

  <!-- Static footer region -->
  <rect x="80" y="310" width="720" height="88" rx="6" fill="#1a2a44" stroke="#3a5a8e" stroke-width="1"/>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Static Product Grid (카탈로그)</text>
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 시 렌더링 → CDN 캐시</text>
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">ISR로 주기적 갱신 가능</text>

  <!-- Legend -->
  <rect x="60" y="434" width="18" height="12" rx="2" fill="#1a2a44" stroke="#3a5a8e" stroke-width="1"/>
  <text x="86" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정적 영역 (Static)</text>
  <rect x="240" y="434" width="18" height="12" rx="2" fill="#1e1a0a" stroke="#7a5a1e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="266" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">동적 슬롯 (Dynamic via Suspense)</text>
</svg>
