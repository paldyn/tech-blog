<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="jwtArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="jwtArrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">JWT 기반 인증 흐름</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">서버는 상태를 저장하지 않고 토큰의 서명만 검증한다</text>

  <!-- Client -->
  <rect x="90" y="106" width="200" height="52" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="190" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">클라이언트</text>

  <!-- Server -->
  <rect x="590" y="106" width="200" height="52" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">서버</text>

  <line x1="190" y1="160" x2="190" y2="380" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="690" y1="160" x2="690" y2="380" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 1 login -->
  <text x="440" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">1. 로그인 (ID / 비밀번호)</text>
  <line x1="200" y1="208" x2="680" y2="208" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jwtArr)"/>

  <!-- server signs -->
  <rect x="560" y="228" width="260" height="40" rx="6" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="690" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0b055">비밀키로 JWT 발급·서명</text>

  <!-- 2 token back -->
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">2. JWT 반환</text>
  <line x1="680" y1="308" x2="200" y2="308" stroke="#55c555" stroke-width="2" marker-end="url(#jwtArrG)"/>

  <!-- 3 subsequent -->
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">3. 이후 요청마다 Authorization: Bearer &lt;JWT&gt;</text>
  <line x1="200" y1="356" x2="680" y2="356" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jwtArr)"/>
  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버는 서명만 검증 → 세션 저장소 불필요(무상태)</text>
</svg>
