<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ArrayList 내부 구조 — 동적 배열</text>

  <!-- Array visual -->
  <text x="56" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">초기 상태: capacity=10, size=3</text>

  <!-- cells -->
  <rect x="56" y="100" width="68" height="50" fill="#0d1a2a" rx="0" stroke="#7ec8e3" stroke-width="2"/>
  <text x="90" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">"A"</text>
  <text x="90" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">[0]</text>

  <rect x="124" y="100" width="68" height="50" fill="#0d1a2a" rx="0" stroke="#7ec8e3" stroke-width="2"/>
  <text x="158" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">"B"</text>
  <text x="158" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">[1]</text>

  <rect x="192" y="100" width="68" height="50" fill="#0d1a2a" rx="0" stroke="#7ec8e3" stroke-width="2"/>
  <text x="226" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">"C"</text>
  <text x="226" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">[2]</text>

  <!-- Empty cells -->
  <rect x="260" y="100" width="68" height="50" fill="#111111" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="294" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#333" text-anchor="middle">null</text>
  <text x="294" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">[3]</text>

  <rect x="328" y="100" width="68" height="50" fill="#111111" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="362" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#333" text-anchor="middle">null</text>
  <text x="362" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">[4]</text>

  <text x="420" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#555" text-anchor="middle">...</text>

  <rect x="444" y="100" width="68" height="50" fill="#111111" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <text x="478" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#333" text-anchor="middle">null</text>
  <text x="478" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">[9]</text>

  <!-- Arrows for size and capacity -->
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-c" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- size bracket -->
  <line x1="56" y1="166" x2="260" y2="166" stroke="#55c555" stroke-width="2"/>
  <line x1="56" y1="160" x2="56" y2="172" stroke="#55c555" stroke-width="2"/>
  <line x1="260" y1="160" x2="260" y2="172" stroke="#55c555" stroke-width="2"/>
  <text x="158" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">size = 3</text>

  <!-- capacity bracket -->
  <line x1="56" y1="200" x2="512" y2="200" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="56" y1="194" x2="56" y2="206" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="512" y1="194" x2="512" y2="206" stroke="#7777cc" stroke-width="1.5"/>
  <text x="284" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">capacity = 10 (내부 배열 크기)</text>

  <!-- Growth visualization -->
  <text x="56" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">용량 초과 시 — 1.5배 확장 (grow)</text>
  <rect x="56" y="276" width="800" height="80" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="72" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// capacity=10이 꽉 차서 add(11번째) 호출 시</tspan></text>
  <text x="72" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 내부: Arrays.copyOf(elementData, newCapacity)</tspan></text>
  <text x="72" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> newCapacity = oldCapacity + (oldCapacity &gt;&gt; </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// × 1.5</tspan></text>

  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">확장 빈도 줄이려면 new ArrayList&lt;&gt;(expectedSize)로 초기 capacity 지정</text>
</svg>
