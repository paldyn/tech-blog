<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">history 명령어 &amp; 설정</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">히스토리 조회·제어·저장 옵션</text>

  <!-- left: history commands -->
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">history 명령</text>
  <rect x="60" y="122" width="370" height="236" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ history        <tspan fill="#6a8aa0"># 전체 히스토리</tspan></text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ history 20     <tspan fill="#6a8aa0"># 최근 20개</tspan></text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ history | grep ssh   <tspan fill="#6a8aa0"># 필터</tspan></text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ history -c     <tspan fill="#6a8aa0"># 메모리 히스토리 삭제</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ history -d 42  <tspan fill="#6a8aa0"># 42번 항목 삭제</tspan></text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ history -w     <tspan fill="#6a8aa0"># 메모리 → 파일 저장</tspan></text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ history -r     <tspan fill="#6a8aa0"># 파일 → 메모리 로드</tspan></text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Ctrl+R           <tspan fill="#6a8aa0"># 역방향 증분 검색</tspan></text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Ctrl+G / Ctrl+C  <tspan fill="#6a8aa0"># 검색 취소</tspan></text>

  <!-- right: ~/.bashrc settings -->
  <text x="480" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">~/.bashrc 히스토리 설정</text>
  <rect x="460" y="122" width="360" height="236" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 저장 크기</text>
  <text x="476" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">HISTSIZE<tspan fill="#e8e8e8">=10000</tspan></text>
  <text x="476" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">HISTFILESIZE<tspan fill="#e8e8e8">=20000</tspan></text>
  <text x="476" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 중복·공백 시작 제외</text>
  <text x="476" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">HISTCONTROL<tspan fill="#e8e8e8">=ignoreboth</tspan></text>
  <text x="476" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 타임스탬프 저장</text>
  <text x="476" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">HISTTIMEFORMAT<tspan fill="#e8e8e8">="</tspan><tspan fill="#ce9178">%F %T </tspan><tspan fill="#e8e8e8">"</tspan></text>
  <text x="476" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 세션 간 히스토리 공유</text>
  <text x="476" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">shopt <tspan fill="#e8e8e8">-s histappend</tspan></text>
  <text x="476" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 히스토리 확장 미리보기</text>
  <text x="476" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">shopt <tspan fill="#e8e8e8">-s histverify</tspan></text>

  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">HISTCONTROL=ignoreboth 은 ignorespace(공백 시작)와 ignoredups(중복) 동시 적용</text>
</svg>
