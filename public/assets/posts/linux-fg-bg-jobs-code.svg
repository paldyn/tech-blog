<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">fg · bg · jobs 실전 패턴</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">여러 작업 병렬 관리와 대기 패턴</text>

  <!-- Left panel -->
  <rect x="50" y="86" width="370" height="270" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">기본 사용법</text>
  <line x1="66" y1="118" x2="404" y2="118" stroke="#3a4a6e" stroke-width="1"/>

  <text x="66" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 백그라운드로 시작</text>
  <text x="66" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">sleep 100 &amp;</text>
  <text x="66" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">[1] 3456</text>

  <text x="66" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># vim을 Ctrl+Z로 정지</text>
  <text x="66" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">vim config.yaml  # 편집 중 ^Z</text>
  <text x="66" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">[2]+ Stopped    vim config.yaml</text>

  <text x="66" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 전체 작업 목록 확인</text>
  <text x="66" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">jobs -l</text>

  <text x="66" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># vim 다시 포그라운드로</text>
  <text x="66" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">fg %2</text>

  <text x="66" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># $! = 가장 최근 백그라운드 PID</text>

  <!-- Right panel -->
  <rect x="460" y="86" width="370" height="270" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">병렬 작업 + wait 패턴</text>
  <line x1="476" y1="118" x2="814" y2="118" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">#!/bin/bash</text>
  <text x="476" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 세 작업 병렬 시작</text>
  <text x="476" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">task_a.sh &amp; PID_A=$!</text>
  <text x="476" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">task_b.sh &amp; PID_B=$!</text>
  <text x="476" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">task_c.sh &amp; PID_C=$!</text>

  <text x="476" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 모두 끝날 때까지 대기</text>
  <text x="476" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">wait $PID_A $PID_B $PID_C</text>
  <text x="476" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">echo "모든 작업 완료"</text>

  <text x="476" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 가장 먼저 끝나는 것만 대기</text>
  <text x="476" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">wait -n  # bash 5.1+</text>

  <text x="476" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 백그라운드 작업 모두 종료</text>
</svg>
