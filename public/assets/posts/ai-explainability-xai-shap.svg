<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SHAP 값 시각화 예시</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">대출 승인 AI: "왜 이 사람의 신청이 거절됐는가?"</text>

  <!-- Waterfall chart -->
  <!-- Base value -->
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기대값 E[f(X)] = 0.45</text>
  <line x1="240" y1="112" x2="780" y2="112" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Feature bars -->
  <!-- Feature: 연소득 (positive) -->
  <text x="200" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="end">연소득 5,000만원</text>
  <rect x="210" y="138" width="180" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="396" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">+0.18</text>

  <!-- Feature: 신용점수 (positive) -->
  <text x="200" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="end">신용점수 720</text>
  <rect x="210" y="184" width="120" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="336" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">+0.12</text>

  <!-- Feature: 고용형태 (positive) -->
  <text x="200" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="end">고용형태: 정규직</text>
  <rect x="210" y="230" width="80" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="296" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">+0.08</text>

  <!-- Feature: 부채비율 (negative) -->
  <text x="200" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="end">부채비율 78%</text>
  <rect x="210" y="276" width="200" height="28" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="416" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">-0.20</text>

  <!-- Feature: 연체이력 (negative) -->
  <text x="200" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="end">연체이력 2회</text>
  <rect x="210" y="322" width="160" height="28" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="376" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">-0.16</text>

  <!-- Feature: 대출기간 (negative) -->
  <text x="200" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="end">대출기간 36개월</text>
  <rect x="210" y="368" width="60" height="28" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="276" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">-0.06</text>

  <!-- Final prediction line -->
  <line x1="210" y1="410" x2="780" y2="410" stroke="#555" stroke-width="1"/>
  <text x="200" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="end">최종 예측</text>
  <rect x="210" y="412" width="168" height="28" rx="4" fill="#7777cc" opacity="0.9"/>
  <text x="384" y="431" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">= 0.41 (거절)</text>

  <!-- Legend -->
  <rect x="570" y="130" width="16" height="16" rx="3" fill="#55c555" opacity="0.8"/>
  <text x="592" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">승인 방향 기여 (+)</text>
  <rect x="570" y="158" width="16" height="16" rx="3" fill="#e05555" opacity="0.8"/>
  <text x="592" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">거절 방향 기여 (-)</text>

  <!-- Insight box -->
  <rect x="570" y="192" width="270" height="80" rx="8" fill="#1a1a0a" stroke="#e0a055" stroke-width="1"/>
  <text x="585" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055">핵심 인사이트</text>
  <text x="585" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">부채비율(-0.20)과 연체이력(-0.16)이</text>
  <text x="585" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">승인 요인을 상쇄해 거절 결정</text>
  <text x="585" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"/>
</svg>
