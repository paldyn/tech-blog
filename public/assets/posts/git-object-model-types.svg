<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Git 오브젝트 모델 — 4가지 타입</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">모든 Git 데이터는 SHA-1 주소를 갖는 불변 오브젝트다</text>

  <!-- blob -->
  <rect x="60" y="92" width="183" height="130" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="151" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">blob</text>
  <text x="151" y="137" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 내용</text>
  <line x1="80" y1="147" x2="223" y2="147" stroke="#1e2c4a" stroke-width="1"/>
  <text x="151" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 파일명 없음</text>
  <text x="151" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 순수 내용만</text>
  <text x="151" y="204" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555">abc123: &lt;bytes&gt;</text>

  <!-- tree -->
  <rect x="274" y="92" width="183" height="130" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="365" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">tree</text>
  <text x="365" y="137" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">디렉터리 구조</text>
  <line x1="294" y1="147" x2="437" y2="147" stroke="#1e2c4a" stroke-width="1"/>
  <text x="365" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 파일명+모드</text>
  <text x="365" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• blob/tree 참조</text>
  <text x="365" y="204" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555">blob abc123 main.c</text>

  <!-- commit -->
  <rect x="488" y="92" width="183" height="130" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="579" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178">commit</text>
  <text x="579" y="137" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스냅샷 + 메타데이터</text>
  <line x1="508" y1="147" x2="651" y2="147" stroke="#1e2c4a" stroke-width="1"/>
  <text x="579" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• tree 참조</text>
  <text x="579" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• parent 참조</text>
  <text x="579" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• author / message</text>

  <!-- tag -->
  <rect x="702" y="92" width="118" height="130" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="761" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#b5cea8">tag</text>
  <text x="761" y="137" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">annotated tag</text>
  <line x1="722" y1="147" x2="800" y2="147" stroke="#1e2c4a" stroke-width="1"/>
  <text x="761" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• commit 참조</text>
  <text x="761" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• tagger 정보</text>
  <text x="761" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• message</text>

  <!-- Graph: relationships -->
  <!-- tag → commit -->
  <line x1="702" y1="157" x2="671" y2="157" stroke="#b5cea8" stroke-width="2" marker-end="url(#arr-o)"/>

  <!-- commit → tree -->
  <line x1="488" y1="157" x2="457" y2="157" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-o)"/>

  <!-- tree → blob -->
  <line x1="274" y1="157" x2="243" y2="157" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Example: full object chain -->
  <text x="440" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">오브젝트 체인 예시</text>

  <rect x="60" y="266" width="760" height="164" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="290" fill="#9aa4b8"># 커밋 오브젝트 내용 확인</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git cat-file</tspan><tspan fill="#ffffff"> -p HEAD</tspan>
    <tspan x="76" dy="18" fill="#9aa4b8">tree </tspan><tspan fill="#55c555">4b825dc642cb6eb9a060e54bf8d69288fbee4904</tspan>
    <tspan x="76" dy="18" fill="#9aa4b8">parent </tspan><tspan fill="#ce9178">da39a3ee5e6b4b0d3255bfef95601890afd80709</tspan>
    <tspan x="76" dy="18" fill="#9aa4b8">author </tspan><tspan fill="#ffffff">Alice &lt;a@example.com&gt; 1716508800 +0900</tspan>
    <tspan x="76" dy="18" fill="#9aa4b8">committer </tspan><tspan fill="#ffffff">Alice &lt;a@example.com&gt; 1716508800 +0900</tspan>
    <tspan x="76" dy="18" fill="#ce9178"></tspan>
    <tspan fill="#ffffff">feat: add login feature</tspan>
  </text>
</svg>
