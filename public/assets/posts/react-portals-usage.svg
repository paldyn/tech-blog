<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">createPortal 사용 패턴</text>

  <!-- Code block: createPortal basic -->
  <text x="220" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">기본 사용법</text>
  <rect x="60" y="92" width="340" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text x="120" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> { createPortal } </text>
  <text x="249" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text x="287" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#ce9178"> 'react-dom'</text>
  <text x="78" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text x="140" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> Modal({ children }) {</text>
  <text x="78" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="126" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> createPortal(</text>
  <text x="78" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    &lt;div className="modal"&gt;</text>
  <text x="78" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">      {children}</text>
  <text x="78" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    &lt;/div&gt;,</text>
  <text x="78" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    document.getElementById('modal-root')</text>
  <text x="78" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">  );</text>
  <text x="78" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">}</text>

  <!-- Code block: HTML setup -->
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">HTML 준비 (index.html)</text>
  <rect x="500" y="92" width="320" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="518" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">&lt;body&gt;</text>
  <text x="518" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">  &lt;div id="root"&gt;&lt;/div&gt;</text>
  <text x="518" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#55c555">  &lt;div id="modal-root"&gt;&lt;/div&gt;</text>
  <text x="518" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">&lt;/body&gt;</text>

  <!-- Use cases -->
  <rect x="500" y="210" width="320" height="82" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Portal 적합 사용처</text>
  <text x="520" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">모달 / 다이얼로그 · 토스트 알림</text>
  <text x="520" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">툴팁 / 드롭다운 · 오버레이</text>
  <text x="520" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888"> </text>

  <!-- overflow hidden issue -->
  <rect x="60" y="318" width="760" height="68" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Portal이 필요한 이유: overflow:hidden / z-index 문제</text>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">부모에 overflow:hidden이 있으면 모달이 잘림. Portal로 body 직하에 마운트하면 해결</text>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">z-index 스태킹 컨텍스트 문제도 Portal로 #modal-root에 내보내면 깔끔하게 해결</text>
</svg>
