<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">KEDA 아키텍처</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">ScaledObject / ScaledJob + Scaler 플러그인</text>

  <!-- Event Sources -->
  <rect x="60" y="96" width="160" height="300" fill="#0a0f18" rx="8" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="140" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#3a4a6e" text-anchor="middle">Event Sources</text>

  <rect x="74" y="130" width="132" height="36" fill="#0f1923" rx="5" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle">AWS SQS / SNS</text>

  <rect x="74" y="174" width="132" height="36" fill="#0f1923" rx="5" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle">Kafka / RabbitMQ</text>

  <rect x="74" y="218" width="132" height="36" fill="#0f1923" rx="5" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle">Redis / NATS</text>

  <rect x="74" y="262" width="132" height="36" fill="#0f1923" rx="5" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle">Azure ServiceBus</text>

  <rect x="74" y="306" width="132" height="36" fill="#0f1923" rx="5" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle">Prometheus</text>

  <rect x="74" y="350" width="132" height="36" fill="#0f1923" rx="5" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">+ 50개 이상 스케일러</text>

  <!-- Arrow to KEDA -->
  <line x1="220" y1="246" x2="276" y2="246" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- KEDA Core -->
  <rect x="276" y="160" width="200" height="172" fill="#1a1420" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="376" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">KEDA Core</text>

  <rect x="292" y="196" width="168" height="40" fill="#0f0d14" rx="5" stroke="#5a4a6e" stroke-width="1"/>
  <text x="376" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Metrics Server</text>
  <text x="376" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">external.metrics.k8s.io 제공</text>

  <rect x="292" y="244" width="168" height="40" fill="#0f0d14" rx="5" stroke="#5a4a6e" stroke-width="1"/>
  <text x="376" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Operator</text>
  <text x="376" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">ScaledObject 감시 &amp; HPA 관리</text>

  <rect x="292" y="292" width="168" height="30" fill="#0f0d14" rx="5" stroke="#5a4a6e" stroke-width="1"/>
  <text x="376" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Admission Webhook · RBAC</text>

  <!-- Arrow to HPA -->
  <line x1="476" y1="246" x2="536" y2="246" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- HPA (managed by KEDA) -->
  <rect x="536" y="196" width="160" height="100" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="616" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">HPA</text>
  <text x="616" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">KEDA가 자동 생성/관리</text>
  <text x="616" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">0 ↔ N 스케일링 지원</text>
  <text x="616" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">(일반 HPA는 min=1)</text>

  <!-- Arrow to Deployment -->
  <line x1="696" y1="246" x2="756" y2="246" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Deployment -->
  <rect x="756" y="206" width="104" height="80" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="808" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Workload</text>
  <text x="808" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Deployment</text>
  <text x="808" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">StatefulSet</text>

  <!-- ScaledObject box -->
  <rect x="276" y="96" width="200" height="56" fill="#0a1015" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="376" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">ScaledObject</text>
  <text x="376" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">트리거 + 대상 workload 선언</text>

  <!-- Arrow from ScaledObject to KEDA -->
  <line x1="376" y1="152" x2="376" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Code block -->
  <rect x="60" y="416" width="760" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">triggers:</text>
  <text x="80" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">- type: aws-sqs-queue</text>
  <text x="80" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  metadata: {queueURL: "...", queueLength: "30"}</text>
</svg>
