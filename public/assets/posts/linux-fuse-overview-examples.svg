<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">FUSE 파일시스템 실전 사용</text>

  <!-- sshfs -->
  <text x="220" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">sshfs — SSH 원격 마운트</text>

  <rect x="60" y="95" width="320" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="117" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 설치</text>
  <text x="76" y="135" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">apt</tspan> install sshfs</text>
  <text x="76" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 원격 서버 마운트</text>
  <text x="76" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">sshfs</tspan> alice@10.0.0.10:/data /mnt/remote</text>
  <text x="76" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 해제</text>
  <text x="76" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">fusermount</tspan> -u /mnt/remote</text>

  <!-- rclone -->
  <text x="660" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">rclone — 클라우드 스토리지 마운트</text>

  <rect x="500" y="95" width="320" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="117" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># S3 설정 후 마운트</text>
  <text x="516" y="135" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">rclone</tspan> config  <tspan fill="#9aa4b8"># remote 설정</tspan></text>
  <text x="516" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">rclone</tspan> mount s3:my-bucket /mnt/s3 \</text>
  <text x="516" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  --vfs-cache-mode writes &amp;</text>
  <text x="516" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 언마운트</text>
  <text x="516" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">fusermount</tspan> -u /mnt/s3</text>

  <!-- Python FUSE example -->
  <text x="220" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8c55e" text-anchor="middle">Python으로 FUSE 구현 (개요)</text>

  <rect x="60" y="254" width="320" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">from</tspan> fuse <tspan fill="#7ec8e3" font-weight="600">import</tspan> FUSE, Operations</text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">class</tspan> <tspan fill="#55c555">MyFS</tspan>(Operations):</text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">def</tspan> <tspan fill="#55c555">read</tspan>(self, path, size, offset, fh):</text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">        # 어디서든 데이터 가져오기</text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">        <tspan fill="#7ec8e3" font-weight="600">return</tspan> fetch_from_db(path)[offset:offset+size]</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">FUSE(MyFS(), <tspan fill="#ce9178">'/mnt/myfs'</tspan>, foreground=<tspan fill="#b5cea8">True</tspan>)</text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888"># pip install fusepy</text>

  <!-- Performance note -->
  <rect x="500" y="254" width="320" height="140" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="660" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">FUSE 성능 고려사항</text>

  <text x="516" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">컨텍스트 스위치 오버헤드</text>
  <text x="516" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">매 I/O마다 커널 ↔ 사용자 공간 전환</text>

  <text x="516" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">로컬 FS 대비 2~10배 느림</text>
  <text x="516" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">네트워크·암호화 FS는 I/O가 병목이라 무시됨</text>

  <text x="516" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">캐싱으로 완화 가능</text>
  <text x="516" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">--vfs-cache-mode, kernel cache 옵션 활용</text>
</svg>
