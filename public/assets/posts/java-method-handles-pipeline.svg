<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">MethodHandle을 얻는 세 단계</text>

  <defs>
    <marker id="mhArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="50" y="110" width="230" height="90" rx="8" fill="#0d1322" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="165" y="142" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Lookup</text>
  <text x="165" y="166" font-size="12" fill="#888" text-anchor="middle">MethodHandles.lookup()</text>
  <text x="165" y="185" font-size="12" fill="#888" text-anchor="middle">접근 권한의 토큰</text>

  <rect x="325" y="110" width="230" height="90" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="142" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">MethodType</text>
  <text x="440" y="166" font-size="12" fill="#888" text-anchor="middle">methodType(rt, args)</text>
  <text x="440" y="185" font-size="12" fill="#888" text-anchor="middle">시그니처 명세</text>

  <rect x="600" y="110" width="230" height="90" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="715" y="142" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">MethodHandle</text>
  <text x="715" y="166" font-size="12" fill="#888" text-anchor="middle">findVirtual(...)</text>
  <text x="715" y="185" font-size="12" fill="#888" text-anchor="middle">invokeExact(...)</text>

  <line x1="280" y1="155" x2="323" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mhArr)"/>
  <line x1="555" y1="155" x2="598" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mhArr)"/>

  <text x="440" y="252" font-size="13" fill="#9aa4b8" text-anchor="middle">Lookup이 시그니처(MethodType)로 메서드를 찾아 MethodHandle을 돌려준다</text>
</svg>
