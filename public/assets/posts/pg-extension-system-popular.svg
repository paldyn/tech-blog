<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 PostgreSQL 확장</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">카테고리별 필수 확장 목록</text>

  <!-- Category: 성능·진단 -->
  <rect x="60" y="88" width="370" height="168" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">성능 · 진단</text>
  <text x="80" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">pg_stat_statements</text>
  <text x="280" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">쿼리 통계 수집</text>
  <text x="80" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">auto_explain</text>
  <text x="214" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">슬로우 쿼리 자동 EXPLAIN</text>
  <text x="80" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">pg_buffercache</text>
  <text x="250" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">버퍼 캐시 상태 조회</text>
  <text x="80" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">pg_prewarm</text>
  <text x="208" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">재시작 후 버퍼 예열</text>
  <text x="80" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">pgstattuple</text>
  <text x="202" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">테이블·인덱스 팽창 진단</text>
  <text x="80" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">pg_visibility</text>
  <text x="214" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가시성 맵·힙 상태 점검</text>

  <!-- Category: 인덱스·검색 -->
  <rect x="460" y="88" width="370" height="168" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">인덱스 · 검색</text>
  <text x="480" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">pg_trgm</text>
  <text x="586" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">trigram 유사도·ILIKE 가속</text>
  <text x="480" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">unaccent</text>
  <text x="598" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">발음 기호 제거 전처리</text>
  <text x="480" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">btree_gin</text>
  <text x="598" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일반 컬럼에도 GIN 인덱스</text>
  <text x="480" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">btree_gist</text>
  <text x="598" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">EXCLUDE 제약에 B-tree 타입</text>
  <text x="480" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">fuzzystrmatch</text>
  <text x="634" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Soundex·Levenshtein</text>
  <text x="480" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">dict_int / dict_xsyn</text>
  <text x="658" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전문검색 사전</text>

  <!-- Category: 데이터 타입 -->
  <rect x="60" y="276" width="370" height="148" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">데이터 타입 · 유틸리티</text>
  <text x="80" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">hstore</text>
  <text x="170" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">key-value 컬럼 (JSONB 이전 사용)</text>
  <text x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">citext</text>
  <text x="158" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">대소문자 무시 TEXT 타입</text>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">uuid-ossp</text>
  <text x="194" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">UUID 생성 함수</text>
  <text x="80" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">earthdistance</text>
  <text x="226" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구면 거리 계산</text>
  <text x="80" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">tablefunc</text>
  <text x="194" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">crosstab (피벗)</text>

  <!-- Category: 보안·암호화 -->
  <rect x="460" y="276" width="370" height="148" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="480" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ce9178">보안 · 암호화 · 기타</text>
  <text x="480" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">pgcrypto</text>
  <text x="594" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">해시·대칭·비대칭 암호화</text>
  <text x="480" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">passwordcheck</text>
  <text x="634" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비밀번호 복잡도 검사</text>
  <text x="480" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">pg_audit</text>
  <text x="578" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">감사 로그 (서드파티)</text>
  <text x="480" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">dblink</text>
  <text x="550" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원격 DB 쿼리 (FDW 이전)</text>
  <text x="480" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">pg_partman</text>
  <text x="610" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파티션 자동 관리 (서드파티)</text>

  <!-- PGXN note -->
  <rect x="60" y="444" width="760" height="24" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="440" y="461" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">서드파티 확장 저장소: PGXN (pgxn.org) · Trunk (pgtap, pg_partman 등)</text>
</svg>
