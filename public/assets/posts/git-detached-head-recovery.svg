<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Detached HEAD 대처 방법</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">확인·보존·탈출 패턴</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="252" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#9aa4b8"># 현재 상태 확인</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git status</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># → HEAD detached at abc1234</tspan></tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 커밋을 보존하고 싶다면: 브랜치 생성</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git switch</tspan> -c temp-experiment     <tspan fill="#9aa4b8"># 현재 위치에서 브랜치 생성</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> save-my-work HEAD      <tspan fill="#9aa4b8"># 동일 효과</tspan></tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 버릴 거라면: 바로 브랜치로 복귀</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git switch</tspan> main</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 이미 떠났는데 커밋이 생각났다면: reflog</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git reflog</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># → find: HEAD@{N}: commit: ... (lost commit SHA)</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> recovered-work &lt;lost-sha&gt;</tspan>
  </text>

  <!-- Scenario cards -->
  <rect x="60" y="370" width="230" height="52" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="175" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">작업 보존</text>
  <text x="175" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">git switch -c 브랜치명</text>

  <rect x="310" y="370" width="230" height="52" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="425" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">탐색 후 탈출</text>
  <text x="425" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">git switch main</text>

  <rect x="560" y="370" width="260" height="52" rx="8" fill="#0d1117" stroke="#e8a838" stroke-width="1.2"/>
  <text x="690" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a838" text-anchor="middle">이탈 후 복구</text>
  <text x="690" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">git reflog → git branch</text>
</svg>
