<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">프로세스 트리 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">systemd(PID 1)를 루트로 하는 부모-자식 계층</text>

  <!-- systemd (PID 1) -->
  <rect x="360" y="90" width="160" height="46" rx="8" fill="#1a2535" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">systemd</text>
  <text x="440" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">PID 1 (init)</text>

  <!-- Level 2 connections from systemd -->
  <line x1="440" y1="136" x2="440" y2="152" stroke="#444" stroke-width="1.5"/>
  <line x1="440" y1="152" x2="160" y2="152" stroke="#444" stroke-width="1.5"/>
  <line x1="440" y1="152" x2="440" y2="152" stroke="#444" stroke-width="1.5"/>
  <line x1="440" y1="152" x2="720" y2="152" stroke="#444" stroke-width="1.5"/>

  <!-- sshd -->
  <line x1="160" y1="152" x2="160" y2="168" stroke="#444" stroke-width="1.5"/>
  <rect x="90" y="168" width="140" height="40" rx="6" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">sshd</text>
  <text x="160" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID 892</text>

  <!-- nginx -->
  <line x1="340" y1="152" x2="340" y2="168" stroke="#444" stroke-width="1.5"/>
  <rect x="270" y="168" width="140" height="40" rx="6" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="340" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">nginx (master)</text>
  <text x="340" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID 1204</text>

  <!-- cron -->
  <line x1="540" y1="152" x2="540" y2="168" stroke="#444" stroke-width="1.5"/>
  <rect x="470" y="168" width="140" height="40" rx="6" fill="#1a1500" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="540" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">cron</text>
  <text x="540" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID 1412</text>

  <!-- bash -->
  <line x1="720" y1="152" x2="720" y2="168" stroke="#444" stroke-width="1.5"/>
  <rect x="650" y="168" width="140" height="40" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="720" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">bash</text>
  <text x="720" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID 2100</text>

  <!-- Level 3: sshd children -->
  <line x1="160" y1="208" x2="160" y2="226" stroke="#444" stroke-width="1.5"/>
  <line x1="160" y1="226" x2="120" y2="226" stroke="#444" stroke-width="1.5"/>
  <line x1="160" y1="226" x2="200" y2="226" stroke="#444" stroke-width="1.5"/>

  <line x1="120" y1="226" x2="120" y2="242" stroke="#444" stroke-width="1.5"/>
  <rect x="60" y="242" width="120" height="38" rx="5" fill="#0d1929" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">sshd</text>
  <text x="120" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID 3001 (세션)</text>

  <line x1="200" y1="226" x2="200" y2="242" stroke="#444" stroke-width="1.5"/>
  <rect x="140" y="242" width="120" height="38" rx="5" fill="#0d1929" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">sshd</text>
  <text x="200" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID 3002 (세션)</text>

  <!-- sshd child: bash -->
  <line x1="120" y1="280" x2="120" y2="296" stroke="#444" stroke-width="1.5"/>
  <rect x="62" y="296" width="116" height="38" rx="5" fill="#0d1929" stroke="#ce9178" stroke-width="1"/>
  <text x="120" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" text-anchor="middle">bash</text>
  <text x="120" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID 3010</text>

  <!-- bash child: ps -->
  <line x1="120" y1="334" x2="120" y2="350" stroke="#444" stroke-width="1.5"/>
  <rect x="62" y="350" width="116" height="38" rx="5" fill="#1a1000" stroke="#e8e8e8" stroke-width="1"/>
  <text x="120" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">ps aux</text>
  <text x="120" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID 3050</text>

  <!-- Level 3: nginx workers -->
  <line x1="340" y1="208" x2="340" y2="226" stroke="#444" stroke-width="1.5"/>
  <line x1="340" y1="226" x2="290" y2="226" stroke="#444" stroke-width="1.5"/>
  <line x1="340" y1="226" x2="390" y2="226" stroke="#444" stroke-width="1.5"/>

  <line x1="290" y1="226" x2="290" y2="242" stroke="#444" stroke-width="1.5"/>
  <rect x="230" y="242" width="120" height="38" rx="5" fill="#0d1020" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">nginx</text>
  <text x="290" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">worker PID 1205</text>

  <line x1="390" y1="226" x2="390" y2="242" stroke="#444" stroke-width="1.5"/>
  <rect x="330" y="242" width="120" height="38" rx="5" fill="#0d1020" stroke="#7777cc" stroke-width="1"/>
  <text x="390" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">nginx</text>
  <text x="390" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">worker PID 1206</text>

  <!-- bash children -->
  <line x1="720" y1="208" x2="720" y2="226" stroke="#444" stroke-width="1.5"/>
  <rect x="652" y="226" width="136" height="38" rx="5" fill="#0d1929" stroke="#e8e8e8" stroke-width="1"/>
  <text x="720" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">pstree -p</text>
  <text x="720" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID 2200 (자식)</text>

  <!-- Legend -->
  <rect x="50" y="420" width="780" height="80" rx="8" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">fork() 규칙: 자식은 부모가 종료되면 고아(orphan)가 되어 PID 1에 입양됩니다</text>
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">pstree 명령은 이 계층 구조를 ASCII 트리로 시각화합니다</text>
  <text x="440" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">같은 이름의 프로세스가 여러 개면 n*[name] 또는 name─┬─name 형태로 묶어 표시</text>
</svg>
