<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Mark &amp; Sweep — 가비지 컬렉션 알고리즘</text>

  <!-- Phase labels -->
  <text x="210" y="80" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#7ec8e3">Phase 1: Mark (표시)</text>
  <text x="660" y="80" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e05555">Phase 2: Sweep (수거)</text>

  <!-- Phase divider -->
  <line x1="440" y1="70" x2="440" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ── MARK PHASE (left) ── -->
  <!-- GC Root -->
  <rect x="80" y="98" width="140" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="124" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">GC Roots</text>

  <!-- Reachable nodes -->
  <rect x="80" y="178" width="100" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="204" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">Node A ✓</text>

  <rect x="220" y="178" width="100" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="270" y="204" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">Node B ✓</text>

  <rect x="80" y="268" width="100" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="294" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">Node C ✓</text>

  <!-- Unreachable node (left side) -->
  <rect x="220" y="268" width="100" height="40" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="270" y="294" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">Node D ✗</text>

  <rect x="150" y="358" width="100" height="40" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="200" y="384" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">Node E ✗</text>

  <!-- Arrows in mark phase -->
  <!-- Root → A -->
  <line x1="130" y1="138" x2="130" y2="176" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="126,173 130,186 134,173" fill="#55c555"/>
  <!-- Root → B -->
  <line x1="188" y1="118" x2="260" y2="176" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="256,172 268,184 264,170" fill="#55c555"/>
  <!-- A → C -->
  <line x1="130" y1="218" x2="130" y2="266" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="126,263 130,276 134,263" fill="#55c555"/>
  <!-- No path to D, E -->
  <text x="200" y="440" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">GC Root에서 도달 불가 → 수거 대상 표시</text>

  <!-- Legend mark phase -->
  <rect x="80" y="420" width="14" height="14" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5" rx="2"/>
  <text x="100" y="432"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">도달 가능 (살아있음)</text>
  <rect x="80" y="440" width="14" height="14" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5" stroke-dasharray="3,2" rx="2"/>
  <text x="100" y="452"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">도달 불가 (수거 대상)</text>

  <!-- ── SWEEP PHASE (right) ── -->
  <!-- Before sweep -->
  <text x="560" y="110"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#888">Sweep 전 힙 상태</text>

  <rect x="480" y="124" width="80" height="34" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="520" y="146" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">A ✓</text>

  <rect x="570" y="124" width="80" height="34" fill="#1a0d0d" rx="4" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="610" y="146" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">D ✗</text>

  <rect x="660" y="124" width="80" height="34" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="146" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">B ✓</text>

  <rect x="750" y="124" width="80" height="34" fill="#1a0d0d" rx="4" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="790" y="146" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">E ✗</text>

  <!-- Arrow down -->
  <line x1="660" y1="178" x2="660" y2="210" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="656,207 660,222 664,207" fill="#7ec8e3"/>
  <text x="680" y="198"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">Sweep!</text>

  <!-- After sweep -->
  <text x="560" y="236"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#888">Sweep 후 힙 상태</text>

  <rect x="480" y="250" width="80" height="34" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="520" y="272" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">A</text>

  <rect x="570" y="250" width="80" height="34" fill="#111" rx="4" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="610" y="272" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#444">free</text>

  <rect x="660" y="250" width="80" height="34" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="272" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">B</text>

  <rect x="750" y="250" width="80" height="34" fill="#111" rx="4" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="790" y="272" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#444">free</text>

  <!-- GC cycle info -->
  <rect x="460" y="318" width="380" height="100" fill="#0f0f1a" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="650" y="340" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">GC 트리거 조건</text>
  <text x="650" y="360" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• 힙 할당량이 임계값에 도달 (Young Generation 꽉 참)</text>
  <text x="650" y="378" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• Minor GC: Young Gen 대상, 빠름 (ms 단위)</text>
  <text x="650" y="396" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• Major GC: Old Gen 포함, 느림 (STW 발생)</text>

  <!-- STW note -->
  <text x="650" y="432" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">⚠ Major GC 중 Stop-The-World — JS 실행 일시 중단</text>
  <text x="650" y="452" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">V8: 증분(incremental) + 병렬(parallel) GC로 STW 최소화</text>
</svg>
