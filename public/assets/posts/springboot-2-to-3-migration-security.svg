<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Security 설정 마이그레이션 Before / After</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">WebSecurityConfigurerAdapter 제거 → SecurityFilterChain Bean 방식</text>

  <!-- Before label -->
  <rect x="40" y="88" width="380" height="28" rx="4" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">&#x2715;  Boot 2 (WebSecurityConfigurerAdapter)</text>

  <!-- Before Code Box -->
  <rect x="40" y="116" width="380" height="246" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Configuration</tspan></text>
  <text x="56" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> SecurityConfig</tspan></text>
  <text x="56" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> WebSecurityConfigurerAdapter {</tspan></text>
  <text x="56" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // Boot 2 방식 - Deprecated</text>
  <text x="56" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@Override</tspan></text>
  <text x="56" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">protected void</tspan><tspan fill="#ffffff"> configure(</tspan></text>
  <text x="56" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">      HttpSecurity http) <tspan fill="#7ec8e3" font-weight="600">throws</tspan><tspan fill="#ffffff"> Exception {</tspan></text>
  <text x="56" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    http.authorizeRequests()</text>
  <text x="56" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      .antMatchers(<tspan fill="#ce9178">"/api/**"</tspan>)</text>
  <text x="56" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      .authenticated();</text>
  <text x="56" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="56" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Arrow -->
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#7ec8e3" text-anchor="middle">&#x2192;</text>

  <!-- After label -->
  <rect x="460" y="88" width="380" height="28" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">&#x2713;  Boot 3 (SecurityFilterChain Bean)</text>

  <!-- After Code Box -->
  <rect x="460" y="116" width="380" height="246" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Configuration</tspan></text>
  <text x="476" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> SecurityConfig {</tspan></text>
  <text x="476" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // Boot 3 권장 방식</text>
  <text x="476" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="476" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> SecurityFilterChain filterChain(</tspan></text>
  <text x="476" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">      HttpSecurity http) <tspan fill="#7ec8e3" font-weight="600">throws</tspan><tspan fill="#ffffff"> Exception {</tspan></text>
  <text x="476" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    http.authorizeHttpRequests(auth -&gt;</text>
  <text x="476" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      auth.requestMatchers(<tspan fill="#ce9178">"/api/**"</tspan>)</text>
  <text x="476" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">          .authenticated());</text>
  <text x="476" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> http.build();</tspan></text>
  <text x="476" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="476" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Key diffs -->
  <rect x="40" y="380" width="800" height="90" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">핵심 변경 포인트</text>
  <text x="60" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">antMatchers()</text>
  <text x="168" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">&#x2192;</text>
  <text x="184" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">requestMatchers()</text>
  <text x="380" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">authorizeRequests()</text>
  <text x="530" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">&#x2192;</text>
  <text x="546" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">authorizeHttpRequests()</text>
  <text x="60" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">WebSecurityConfigurerAdapter 상속</text>
  <text x="330" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">&#x2192;</text>
  <text x="346" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">SecurityFilterChain @Bean 반환</text>
</svg>
