<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="aH" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="aM" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="aR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CDN Cache Hit vs Cache Miss 흐름</text>

  <!-- ===== CACHE HIT (top half) ===== -->
  <text x="440" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Cache HIT — 엣지에서 즉시 응답</text>

  <rect x="50" y="100" width="110" height="48" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="105" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">클라이언트</text>

  <rect x="350" y="100" width="180" height="48" rx="8" fill="#091b0e" stroke="#1a6030" stroke-width="1.5"/>
  <text x="440" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">엣지 서버 (캐시 있음)</text>

  <rect x="720" y="100" width="120" height="48" rx="8" fill="#1a0f0b" stroke="#5a3a1a" stroke-width="1.5"/>
  <text x="780" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">Origin</text>

  <!-- Hit flow arrows -->
  <line x1="160" y1="118" x2="350" y2="118" stroke="#55c555" stroke-width="2" marker-end="url(#aH)"/>
  <text x="253" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">GET /image.png</text>

  <line x1="350" y1="132" x2="160" y2="132" stroke="#55c555" stroke-width="2" marker-end="url(#aH)"/>
  <text x="253" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">200 OK (캐시 응답) X-Cache: HIT</text>

  <!-- Cross out origin -->
  <line x1="530" y1="124" x2="720" y2="124" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="625" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444">Origin 요청 없음</text>

  <!-- ===== CACHE MISS (bottom half) ===== -->
  <line x1="50" y1="186" x2="830" y2="186" stroke="#1a2a1a" stroke-width="1"/>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">Cache MISS — Origin에서 가져와 캐시 저장</text>

  <rect x="50" y="228" width="110" height="48" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="105" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">클라이언트</text>

  <rect x="330" y="228" width="200" height="48" rx="8" fill="#1a0c0c" stroke="#5a1a1a" stroke-width="1.5"/>
  <text x="430" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">엣지 서버 (캐시 없음)</text>

  <rect x="720" y="228" width="120" height="48" rx="8" fill="#1a0f0b" stroke="#5a3a1a" stroke-width="1.5"/>
  <text x="780" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">Origin</text>

  <!-- Miss flow arrows -->
  <line x1="160" y1="246" x2="330" y2="246" stroke="#e05555" stroke-width="2" marker-end="url(#aM)"/>
  <text x="243" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">GET /image.png</text>

  <line x1="530" y1="246" x2="720" y2="246" stroke="#e05555" stroke-width="2" marker-end="url(#aM)"/>
  <text x="623" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">Origin 요청</text>

  <line x1="720" y1="262" x2="530" y2="262" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aR)"/>
  <text x="623" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">200 OK + 캐시 저장</text>

  <line x1="330" y1="262" x2="160" y2="262" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aR)"/>
  <text x="243" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">200 OK X-Cache: MISS</text>

  <!-- Cache headers explanation -->
  <rect x="50" y="318" width="780" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Origin 응답 헤더 — 캐시 수명 제어</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Cache-Control: public, max-age=86400</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ETag: "abc123"</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 엣지 서버가 86400초(24h) 캐시 보관 후 재검증</text>
</svg>
