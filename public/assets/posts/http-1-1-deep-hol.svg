<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="hol-flow" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="hol-blk" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HOL 블로킹 — 줄의 맨 앞이 막히면 뒤가 전부 막힌다</text>

  <text x="60" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">하나의 연결 = 한 번에 응답 하나만 흐름</text>

  <!-- The single connection channel -->
  <rect x="120" y="108" width="700" height="86" fill="#000000" stroke="#3a4a6e" rx="6"/>
  <text x="138" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단일 HTTP/1.1 연결</text>

  <!-- response 1 slow box (head of line) blocking the channel -->
  <rect x="138" y="142" width="190" height="38" fill="#e05555" rx="5"/>
  <text x="158" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">응답 1 (느림) — 맨 앞</text>

  <!-- queued responses 2 and 3 waiting -->
  <rect x="344" y="142" width="140" height="38" fill="#1a1a1a" stroke="#7777cc" rx="5"/>
  <text x="372" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">응답 2 (대기)</text>

  <rect x="500" y="142" width="140" height="38" fill="#1a1a1a" stroke="#7777cc" rx="5"/>
  <text x="528" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">응답 3 (대기)</text>

  <!-- blocked arrow between head and queue -->
  <line x1="488" y1="244" x2="344" y2="244" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#hol-blk)"/>
  <text x="500" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">응답 1이 끝나야 통과</text>

  <text x="138" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">응답 2·3은 이미 준비됐지만 보낼 수 없다</text>

  <!-- contrast: what we wanted -->
  <text x="60" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">정의</text>

  <rect x="120" y="312" width="700" height="74" fill="#000000" stroke="#3a4a6e" rx="6"/>
  <text x="138" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">줄의 맨 앞(Head-of-Line) 항목이 처리되지 않으면</text>
  <text x="138" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">그 <tspan fill="#e05555" font-weight="600">뒤가 전부 막히는</tspan> 현상 — 1.1 프로토콜 구조의 한계</text>
</svg>
