<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Files 유틸리티 메서드 분류</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">java.nio.file.Files — Java 7+의 모던 파일 조작 API</text>

  <!-- Read/Write category -->
  <rect x="60" y="90" width="360" height="190" rx="8" fill="#101828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">읽기 / 쓰기</text>

  <rect x="76" y="122" width="328" height="146" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// Java 11+ (가장 간편)</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">String</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        readString(path, UTF_8);</text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">void</text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        writeString(path,str,UTF_8);</text>
  <text x="92" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 바이너리</text>
  <text x="92" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">byte</text>
  <text x="92" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        []  readAllBytes(path);</text>
  <text x="92" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">void</text>
  <text x="92" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">            write(path, bytes);</text>
  <text x="92" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 줄 단위 / 스트림</text>
  <text x="92" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Stream</text>
  <text x="92" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">       &lt;String&gt; lines(path, UTF_8);</text>

  <!-- Metadata category -->
  <rect x="460" y="90" width="360" height="190" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">존재 확인 / 메타데이터</text>

  <rect x="476" y="122" width="328" height="146" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">boolean</text>
  <text x="492" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">         exists(path);</text>
  <text x="492" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">boolean</text>
  <text x="492" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">         isDirectory(path);</text>
  <text x="492" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">boolean</text>
  <text x="492" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">         isRegularFile(path);</text>
  <text x="492" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">long</text>
  <text x="492" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        size(path);</text>
  <text x="492" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">FileTime</text>
  <text x="492" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">          getLastModifiedTime(path);</text>
  <text x="492" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">String</text>
  <text x="492" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        probeContentType(path);</text>
  <text x="492" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// MIME 타입 감지</text>

  <!-- Copy/Move/Delete category -->
  <rect x="60" y="300" width="360" height="190" rx="8" fill="#1a1a10" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="240" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#b5cea8">복사 / 이동 / 삭제</text>

  <rect x="76" y="332" width="328" height="146" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="92" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        copy(src, dst, REPLACE_EXISTING);</text>
  <text x="92" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="92" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        move(src, dst, ATOMIC_MOVE);</text>
  <text x="92" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">void</text>
  <text x="92" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        delete(path);</text>
  <text x="92" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">boolean</text>
  <text x="92" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">         deleteIfExists(path);</text>
  <text x="92" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="92" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        createDirectories(path);</text>
  <text x="92" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Path</text>
  <text x="92" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        createTempFile(dir, prefix, suffix);</text>

  <!-- Walk/List category -->
  <rect x="460" y="300" width="360" height="190" rx="8" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">디렉터리 탐색</text>

  <rect x="476" y="332" width="328" height="146" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 1 depth</text>
  <text x="492" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Stream</text>
  <text x="492" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">       &lt;Path&gt; list(dir);</text>
  <text x="492" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 재귀 탐색</text>
  <text x="492" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Stream</text>
  <text x="492" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">       &lt;Path&gt; walk(root, maxDepth);</text>
  <text x="492" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// glob 패턴 필터</text>
  <text x="492" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Stream</text>
  <text x="492" y="446" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">       &lt;Path&gt; find(root, depth,</text>
  <text x="492" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">         BiPredicate&lt;Path,BasicFile</text>
  <text x="492" y="482" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">         Attributes&gt; matcher);</text>
</svg>
