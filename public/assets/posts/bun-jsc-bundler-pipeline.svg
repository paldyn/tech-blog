<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Bun 빌드 파이프라인</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">bun build — 번들·트랜스파일·미니파이 일체형 CLI</text>

  <!-- Pipeline steps (5 boxes with arrows) -->
  <!-- Step boxes: y=100, height=70 -->
  <!-- Step 1: Entry (x=60 w=130) -->
  <rect x="60" y="104" width="130" height="70" rx="8" fill="#111520" stroke="#7ec8e3"/>
  <text x="125" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">진입점</text>
  <text x="125" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">src/index.ts</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="139" x2="218" y2="139" stroke="#888" stroke-width="2"/>
  <polygon points="218,133 231,139 218,145" fill="#888"/>

  <!-- Step 2: Parse -->
  <rect x="231" y="104" width="130" height="70" rx="8" fill="#111520" stroke="#7777cc"/>
  <text x="296" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">파싱·변환</text>
  <text x="296" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">TS → AST → JS</text>

  <!-- Arrow 2 -->
  <line x1="361" y1="139" x2="389" y2="139" stroke="#888" stroke-width="2"/>
  <polygon points="389,133 402,139 389,145" fill="#888"/>

  <!-- Step 3: Bundle -->
  <rect x="402" y="104" width="130" height="70" rx="8" fill="#111520" stroke="#55c555"/>
  <text x="467" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">모듈 번들</text>
  <text x="467" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">트리 쉐이킹</text>

  <!-- Arrow 3 -->
  <line x1="532" y1="139" x2="560" y2="139" stroke="#888" stroke-width="2"/>
  <polygon points="560,133 573,139 560,145" fill="#888"/>

  <!-- Step 4: Minify -->
  <rect x="573" y="104" width="130" height="70" rx="8" fill="#111520" stroke="#e8e8e8"/>
  <text x="638" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">미니파이</text>
  <text x="638" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공백·주석 제거</text>

  <!-- Arrow 4 -->
  <line x1="703" y1="139" x2="731" y2="139" stroke="#888" stroke-width="2"/>
  <polygon points="731,133 744,139 731,145" fill="#888"/>

  <!-- Step 5: Output -->
  <rect x="744" y="104" width="100" height="70" rx="8" fill="#111520" stroke="#55c555"/>
  <text x="794" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">출력</text>
  <text x="794" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dist/</text>

  <!-- Code block below -->
  <text x="60" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">bun build 명령 예시</text>
  <rect x="60" y="214" width="760" height="154" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 기본 번들 (ESM 출력)</text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">bun build src/index.ts --outdir dist</text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 미니파이 + 소스맵 + 외부 패키지 제외</text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">bun build src/index.ts \</text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  --outdir dist --minify --sourcemap \</text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  --external react --external react-dom</text>
</svg>
