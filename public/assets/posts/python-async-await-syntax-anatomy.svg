<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="awArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">async def 와 await 의 역할</text>

  <rect x="60" y="90" width="760" height="80" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text xml:space="preserve" x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">async def</tspan> fetch(url):</text>
  <text xml:space="preserve" x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    data = <tspan fill="#7ec8e3" font-weight="600">await</tspan> client.get(url)</text>

  <!-- 라벨 화살표 -->
  <path d="M 150 175 C 150 210, 230 210, 230 236" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#awArr)"/>
  <rect x="80" y="240" width="300" height="76" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="230" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">async def</text>
  <text x="230" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이 함수는 코루틴이다</text>

  <path d="M 290 175 C 290 210, 600 210, 600 236" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#awArr)"/>
  <rect x="450" y="240" width="370" height="76" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="635" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">await</text>
  <text x="635" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">여기서 제어권을 양보, 결과를 기다림</text>
</svg>
