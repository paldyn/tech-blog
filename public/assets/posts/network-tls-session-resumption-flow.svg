<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TLS 세션 재개 방식 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Session ID · Session Ticket · PSK (TLS 1.3)</text>

  <defs>
    <marker id="rArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="lArr" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 13 0 L 0 7 L 13 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Session ID (왼쪽) -->
  <rect x="60" y="88" width="230" height="36" rx="6" fill="#2a1a0a" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="175" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c44a">Session ID (TLS 1.2)</text>

  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라이언트</text>
  <text x="232" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버</text>
  <line x1="90" y1="154" x2="90" y2="310" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="265" y1="154" x2="265" y2="310" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <line x1="90" y1="170" x2="265" y2="170" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#rArr)"/>
  <text x="177" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ClientHello + session_id</text>

  <line x1="265" y1="205" x2="90" y2="205" stroke="#55c555" stroke-width="1.5" marker-end="url(#lArr)"/>
  <text x="177" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ServerHello (재개 확인)</text>

  <line x1="265" y1="240" x2="90" y2="240" stroke="#55c555" stroke-width="1.5" marker-end="url(#lArr)"/>
  <text x="177" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ChangeCipherSpec + Finished</text>

  <line x1="90" y1="275" x2="265" y2="275" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#rArr)"/>
  <text x="177" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ChangeCipherSpec + Finished</text>

  <rect x="65" y="295" width="210" height="30" rx="4" fill="#1a1500" stroke="#e8c44a" stroke-width="1" opacity="0.7"/>
  <text x="170" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c44a">서버 메모리에 세션 저장 필요</text>

  <!-- Session Ticket (중앙) -->
  <rect x="325" y="88" width="230" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Session Ticket (TLS 1.2)</text>

  <text x="340" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라이언트</text>
  <text x="497" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버</text>
  <line x1="352" y1="154" x2="352" y2="310" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="528" y1="154" x2="528" y2="310" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <line x1="352" y1="170" x2="528" y2="170" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#rArr)"/>
  <text x="440" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ClientHello + session_ticket</text>

  <line x1="528" y1="205" x2="352" y2="205" stroke="#55c555" stroke-width="1.5" marker-end="url(#lArr)"/>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ServerHello + NewSessionTicket</text>

  <line x1="528" y1="240" x2="352" y2="240" stroke="#55c555" stroke-width="1.5" marker-end="url(#lArr)"/>
  <text x="440" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ChangeCipherSpec + Finished</text>

  <line x1="352" y1="275" x2="528" y2="275" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#rArr)"/>
  <text x="440" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ChangeCipherSpec + Finished</text>

  <rect x="330" y="295" width="210" height="30" rx="4" fill="#0a1520" stroke="#7ec8e3" stroke-width="1" opacity="0.7"/>
  <text x="435" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">티켓은 암호화돼 클라이언트에 저장</text>

  <!-- PSK / 0-RTT (오른쪽) -->
  <rect x="590" y="88" width="230" height="36" rx="6" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">PSK + 0-RTT (TLS 1.3)</text>

  <text x="605" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라이언트</text>
  <text x="760" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버</text>
  <line x1="618" y1="154" x2="618" y2="310" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="795" y1="154" x2="795" y2="310" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <line x1="618" y1="170" x2="795" y2="170" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#rArr)"/>
  <text x="706" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ClientHello + psk + early_data</text>

  <rect x="600" y="178" width="208" height="26" rx="4" fill="#0d1a0d" stroke="#55c555" stroke-width="1" opacity="0.6"/>
  <text x="704" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">↑ 0-RTT: 앱 데이터 즉시 전송 가능</text>

  <line x1="795" y1="225" x2="618" y2="225" stroke="#55c555" stroke-width="1.5" marker-end="url(#lArr)"/>
  <text x="706" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ServerHello + {EncryptedExtensions}</text>

  <line x1="795" y1="260" x2="618" y2="260" stroke="#55c555" stroke-width="1.5" marker-end="url(#lArr)"/>
  <text x="706" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">Finished</text>

  <line x1="618" y1="295" x2="795" y2="295" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#rArr)"/>
  <text x="706" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">Finished</text>

  <rect x="595" y="308" width="210" height="30" rx="4" fill="#0d2a0a" stroke="#55c555" stroke-width="1" opacity="0.7"/>
  <text x="700" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">주의: 0-RTT는 재전송 공격 취약</text>

  <!-- 비교 요약 -->
  <rect x="60" y="360" width="760" height="96" rx="8" fill="#111"/>
  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">세션 재개 방식 비교</text>
  <text x="160" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Session ID</text>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Session Ticket</text>
  <text x="720" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PSK (TLS 1.3)</text>
  <text x="160" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">서버에 상태 저장</text>
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">클라이언트에 티켓 저장</text>
  <text x="720" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">PSK 식별자 교환</text>
  <text x="160" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">확장성 제한</text>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">서버 무상태 가능</text>
  <text x="720" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">0-RTT 지원</text>
</svg>
