  <!-- legend -->
  <rect x="60" y="294" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#55c555" font-weight="600">초록 = 살아남은 소수</tspan><tspan fill="#ffffff"> · </tspan><tspan fill="#888888">회색 = 배수 단계에서 지워진 합성수</tspan><tspan fill="#ffffff"> · 1은 소수 아님</tspan></text>

  <text x="60" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">√30 ≈ 5.4 → 2, 3, 5의 배수만 지우면 끝. 남는 수가 전부 소수다</text>
  <text x="60" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">각 소수 p는 p² 부터 지우기 시작하면 된다 (그보다 작은 배수는 이미 지워짐)</text>
</svg>
