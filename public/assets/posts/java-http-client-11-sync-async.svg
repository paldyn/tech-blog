<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="sa1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="sa2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">동기 send vs 비동기 sendAsync</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e05555">send() — 블로킹</text>
  <rect x="60" y="108" width="360" height="90" rx="10" fill="#11151c" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="142" font-size="13" fill="#ffffff" text-anchor="middle">호출 스레드가 응답까지 멈춰 대기</text>
  <text x="240" y="168" font-size="12" fill="#888" text-anchor="middle">HttpResponse 를 직접 반환</text>
  <line x1="80" y1="218" x2="400" y2="218" stroke="#e05555" stroke-width="2.5" marker-end="url(#sa1)"/>
  <text x="240" y="240" font-size="11" fill="#888" text-anchor="middle">요청 ─── (대기) ─── 응답</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#55c555">sendAsync() — 논블로킹</text>
  <rect x="460" y="108" width="360" height="90" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="142" font-size="13" fill="#ffffff" text-anchor="middle">즉시 CompletableFuture 반환</text>
  <text x="640" y="168" font-size="12" fill="#888" text-anchor="middle">응답은 나중에 콜백으로 처리</text>
  <line x1="480" y1="218" x2="640" y2="218" stroke="#55c555" stroke-width="2.5" marker-end="url(#sa2)"/>
  <text x="560" y="240" font-size="11" fill="#888" text-anchor="middle">요청 → 즉시 반환</text>
  <line x1="660" y1="240" x2="800" y2="240" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#sa2)"/>
  <text x="730" y="232" font-size="11" fill="#7777cc" text-anchor="middle">thenAccept(...)</text>

  <text x="440" y="294" font-size="13" fill="#888" text-anchor="middle">한 클라이언트로 동기·비동기 호출을 자유롭게 선택할 수 있다</text>
</svg>
