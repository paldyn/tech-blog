<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">async/await 에러 처리 패턴 3가지</text>

  <!-- Pattern 1: try/catch -->
  <rect x="30" y="68" width="260" height="290" rx="10" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="160" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4caf7d" text-anchor="middle">① try / catch</text>
  <text x="160" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">가장 일반적인 방식</text>

  <text x="46" y="140" font-family="'Courier New',monospace" font-size="11" fill="#888">async function load() {</text>
  <text x="46" y="158" font-family="'Courier New',monospace" font-size="11" fill="#e05252">  try {</text>
  <text x="46" y="176" font-family="'Courier New',monospace" font-size="11" fill="#f4a942">    const d = await fetch(url);</text>
  <text x="46" y="194" font-family="'Courier New',monospace" font-size="11" fill="#888">    return await d.json();</text>
  <text x="46" y="212" font-family="'Courier New',monospace" font-size="11" fill="#e05252">  } catch (err) {</text>
  <text x="46" y="230" font-family="'Courier New',monospace" font-size="11" fill="#888">    handleError(err);</text>
  <text x="46" y="248" font-family="'Courier New',monospace" font-size="11" fill="#e05252">  }</text>
  <text x="46" y="266" font-family="'Courier New',monospace" font-size="11" fill="#888">}</text>

  <text x="46" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">• 동기 코드와 동일한 패턴</text>
  <text x="46" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">• 여러 await를 한 번에 처리</text>
  <text x="46" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">• 가독성 ↑</text>

  <!-- Pattern 2: .catch() on await -->
  <rect x="310" y="68" width="260" height="290" rx="10" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#8888ff" text-anchor="middle">② await + .catch()</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">개별 오류 포착</text>

  <text x="326" y="140" font-family="'Courier New',monospace" font-size="11" fill="#888">async function load() {</text>
  <text x="326" y="158" font-family="'Courier New',monospace" font-size="11" fill="#888">  const data =</text>
  <text x="326" y="176" font-family="'Courier New',monospace" font-size="11" fill="#f4a942">    await fetch(url)</text>
  <text x="326" y="194" font-family="'Courier New',monospace" font-size="11" fill="#8888ff">      .catch(() =&gt; null);</text>
  <text x="326" y="212" font-family="'Courier New',monospace" font-size="11" fill="#888">  if (!data) return;</text>
  <text x="326" y="230" font-family="'Courier New',monospace" font-size="11" fill="#888">  ...</text>
  <text x="326" y="248" font-family="'Courier New',monospace" font-size="11" fill="#888">}</text>

  <text x="326" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">• 단계별 오류 처리</text>
  <text x="326" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">• null 반환으로 폴백 처리</text>
  <text x="326" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">• 세밀한 제어 가능</text>

  <!-- Pattern 3: wrapper util -->
  <rect x="590" y="68" width="260" height="290" rx="10" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="720" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f4a942" text-anchor="middle">③ to() 유틸리티</text>
  <text x="720" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">Go 스타일 에러 처리</text>

  <text x="606" y="140" font-family="'Courier New',monospace" font-size="11" fill="#888">const to = p =&gt;</text>
  <text x="606" y="158" font-family="'Courier New',monospace" font-size="11" fill="#888">  p.then(d =&gt; [null, d])</text>
  <text x="606" y="176" font-family="'Courier New',monospace" font-size="11" fill="#888">   .catch(e =&gt; [e, null]);</text>
  <text x="606" y="200" font-family="'Courier New',monospace" font-size="11" fill="#888">async function load() {</text>
  <text x="606" y="218" font-family="'Courier New',monospace" font-size="11" fill="#f4a942">  const [err, data] =</text>
  <text x="606" y="236" font-family="'Courier New',monospace" font-size="11" fill="#f4a942">    await to(fetch(url));</text>
  <text x="606" y="254" font-family="'Courier New',monospace" font-size="11" fill="#888">  if (err) ...</text>
  <text x="606" y="272" font-family="'Courier New',monospace" font-size="11" fill="#888">}</text>

  <text x="606" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">• try/catch 없이 처리</text>
  <text x="606" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">• [error, data] 패턴</text>
  <text x="606" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">• await-to-js 라이브러리</text>

  <!-- Bottom note -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">상황에 맞는 패턴을 선택 — 일반적으로는 try/catch가 가장 명확</text>
</svg>
