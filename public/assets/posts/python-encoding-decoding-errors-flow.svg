<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="330" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="en_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="en_red" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">str ↔ bytes: encode / decode</text>

  <!-- str box -->
  <rect x="80" y="110" width="240" height="80" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="146" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">str — 텍스트</text>
  <text x="200" y="170" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" text-anchor="middle">'카페'</text>

  <!-- bytes box -->
  <rect x="560" y="110" width="240" height="80" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="680" y="146" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">bytes — 이진 데이터</text>
  <text x="680" y="170" font-size="12.5" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" text-anchor="middle">b'\xec\xb9\xb4\xed\x8e\x98'</text>

  <!-- top arrow encode -->
  <path d="M 320 132 C 410 102, 470 102, 560 132" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#en_arr)"/>
  <text x="440" y="98" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" text-anchor="middle">.encode('utf-8')</text>

  <!-- bottom arrow decode -->
  <path d="M 560 168 C 470 198, 410 198, 320 168" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#en_arr)"/>
  <text x="440" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" text-anchor="middle">.decode('utf-8')</text>

  <!-- error -->
  <rect x="80" y="252" width="720" height="56" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="285" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178">b'\xec\xb9\xb4'.decode('ascii')</text>
  <text x="420" y="285" font-size="13" fill="#e05555">→ UnicodeDecodeError (코덱이 틀리면 실패)</text>
</svg>
