<svg width="880" viewBox="0 0 880 570" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="570" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring Boot 외부화 설정 우선순위</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">위로 갈수록 높은 우선순위 — 상위 설정이 하위 설정을 덮어씁니다</text>

  <!-- Priority up arrow on the left -->
  <line x1="36" y1="510" x2="36" y2="105" stroke="#555" stroke-width="1.5"/>
  <polygon points="36,95 31,110 41,110" fill="#555"/>
  <text x="36" y="540" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">낮음</text>
  <text x="36" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">높음</text>

  <!-- Row 1: Command-line args (highest) -->
  <rect x="60" y="92" width="44" height="54" fill="#e05555" rx="4"/>
  <text x="82" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#0a0a0a">1</text>
  <rect x="108" y="92" width="712" height="54" fill="#1a1010" rx="4"/>
  <text x="128" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">커맨드라인 인수</text>
  <text x="128" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">--spring.datasource.url=jdbc:mysql://prod/db</text>

  <!-- Row 2: JVM system props -->
  <rect x="60" y="154" width="44" height="54" fill="#e07040" rx="4"/>
  <text x="82" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#0a0a0a">2</text>
  <rect x="108" y="154" width="712" height="54" fill="#1a1108" rx="4"/>
  <text x="128" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">JVM 시스템 속성</text>
  <text x="128" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-Dspring.datasource.url=jdbc:mysql://prod/db</text>

  <!-- Row 3: OS env vars -->
  <rect x="60" y="216" width="44" height="54" fill="#e0b840" rx="4"/>
  <text x="82" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#0a0a0a">3</text>
  <rect x="108" y="216" width="712" height="54" fill="#191508" rx="4"/>
  <text x="128" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">OS 환경 변수</text>
  <text x="128" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SPRING_DATASOURCE_URL=jdbc:mysql://prod/db</text>

  <!-- Row 4: Profile-specific yml outside JAR -->
  <rect x="60" y="278" width="44" height="54" fill="#55c8a0" rx="4"/>
  <text x="82" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#0a0a0a">4</text>
  <rect x="108" y="278" width="712" height="54" fill="#081915" rx="4"/>
  <text x="128" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">외부 프로파일 전용 파일 (JAR 외부 config/)</text>
  <text x="128" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">config/application-prod.yml  |  config/application-prod.properties</text>

  <!-- Row 5: application.yml outside JAR -->
  <rect x="60" y="340" width="44" height="54" fill="#7ec8e3" rx="4"/>
  <text x="82" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#0a0a0a">5</text>
  <rect x="108" y="340" width="712" height="54" fill="#080f19" rx="4"/>
  <text x="128" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">외부 기본 파일 (JAR 외부 config/)</text>
  <text x="128" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">config/application.yml  |  config/application.properties</text>

  <!-- Row 6: Profile-specific yml inside classpath -->
  <rect x="60" y="402" width="44" height="54" fill="#5588e0" rx="4"/>
  <text x="82" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#0a0a0a">6</text>
  <rect x="108" y="402" width="712" height="54" fill="#080e1c" rx="4"/>
  <text x="128" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">내부 프로파일 전용 파일 (classpath 내)</text>
  <text x="128" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">src/main/resources/application-prod.yml</text>

  <!-- Row 7: application.yml inside classpath (lowest) -->
  <rect x="60" y="464" width="44" height="54" fill="#7777cc" rx="4"/>
  <text x="82" y="497" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#0a0a0a">7</text>
  <rect x="108" y="464" width="712" height="54" fill="#0d0c1c" rx="4"/>
  <text x="128" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">내부 기본 파일 (classpath 내)</text>
  <text x="128" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">src/main/resources/application.yml  |  application.properties</text>
</svg>
