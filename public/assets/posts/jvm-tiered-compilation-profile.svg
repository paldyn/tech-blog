<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">티어드 컴파일: 성능 곡선과 실전 튜닝</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">워밍업 구간과 안정 상태 throughput</text>

  <!-- Performance graph area -->
  <rect x="60" y="88" width="460" height="220" rx="6" fill="#0d0d14" stroke="#1e2433"/>

  <!-- Y axis label -->
  <text x="50" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" transform="rotate(-90, 50, 198)">성능 (처리량)</text>

  <!-- X axis label -->
  <text x="290" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">시간 / 요청 수 →</text>

  <!-- Y axis ticks -->
  <text x="78" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Low</text>
  <text x="78" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">High</text>

  <!-- Grid lines -->
  <line x1="100" y1="260" x2="500" y2="260" stroke="#1e2433" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="220" x2="500" y2="220" stroke="#1e2433" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="160" x2="500" y2="160" stroke="#1e2433" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="120" x2="500" y2="120" stroke="#1e2433" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Performance curve: Interpreter flat, C1 rise, C2 rise, steady -->
  <!-- Interpreter phase (100→180): y stays at 270 -->
  <polyline points="100,270 180,270" stroke="#888" stroke-width="2" fill="none"/>

  <!-- C1 phase (180→280): rises to 200 -->
  <polyline points="180,270 200,250 240,220 280,200" stroke="#7ec8e3" stroke-width="2.5" fill="none"/>

  <!-- C2 phase (280→380): rises to 130 -->
  <polyline points="280,200 320,170 360,145 380,130" stroke="#55c555" stroke-width="2.5" fill="none"/>

  <!-- Steady state (380→500): flat at 125 -->
  <polyline points="380,130 500,125" stroke="#55c555" stroke-width="2.5" fill="none"/>

  <!-- Phase labels -->
  <!-- Interpreter phase label -->
  <line x1="140" y1="92" x2="140" y2="268" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="140" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Level 0</text>

  <!-- C1 phase label -->
  <line x1="230" y1="92" x2="230" y2="268" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="230" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">C1 활성</text>

  <!-- C2 phase label -->
  <line x1="370" y1="92" x2="370" y2="268" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="370" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">C2 최적화</text>

  <!-- Steady label -->
  <text x="450" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">정상 상태</text>

  <!-- Right panel: PrintCompilation output simulation -->
  <rect x="540" y="88" width="300" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="556" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0"># -XX:+PrintCompilation 출력</text>
  <text x="556" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">  88   1   3  java/lang/String::</text>
  <text x="556" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">            charAt (29 bytes)</text>
  <text x="556" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3"> 102   2   3  java/lang/String::</text>
  <text x="556" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">            indexOf (70 bytes)</text>
  <text x="556" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555"> 218   3   4  com/app/Calc::</text>
  <text x="556" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">            compute (52 bytes)</text>
  <text x="556" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555"> 340   3   4  made not entrant</text>
  <text x="556" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">           ↑ Deoptimization</text>
  <text x="556" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0"># 열: ms tier# 메서드 크기</text>
  <text x="556" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0"># tier: 1=C1 simple, 4=C2</text>
  <text x="556" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0"># made not entrant = 무효화됨</text>

  <!-- Divider -->
  <line x1="60" y1="334" x2="820" y2="334" stroke="#1e2433" stroke-width="1"/>

  <!-- Tuning guide: 3 columns -->
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">실전 튜닝 가이드</text>

  <!-- Col 1: Serverless / 빠른 시작 -->
  <rect x="60" y="372" width="230" height="120" rx="6" fill="#0f0f1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">서버리스 / 빠른 시작</text>
  <text x="80" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C2 끄고 C1만 사용:</text>
  <rect x="76" y="420" width="200" height="32" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="84" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">-XX:TieredStopAtLevel=</text>
  <text x="84" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">1</text>
  <text x="80" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GraalVM Native Image도 고려</text>

  <!-- Col 2: Long-running / 고처리량 -->
  <rect x="325" y="372" width="230" height="120" rx="6" fill="#0f0f1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">장기 실행 / 고처리량</text>
  <text x="340" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">C2 스레드 수 늘리기:</text>
  <rect x="336" y="420" width="204" height="32" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="344" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">-XX:CICompilerCount=</text>
  <text x="344" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8">4</text>
  <text x="340" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Code Cache 256m 이상 확보</text>

  <!-- Col 3: Benchmark -->
  <rect x="590" y="372" width="230" height="120" rx="6" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">벤치마크 / 분석</text>
  <text x="605" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JIT 완전 비활성 비교:</text>
  <rect x="601" y="420" width="200" height="32" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="609" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">-Xint  </text>
  <text x="663" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0"># 인터프리터만</text>
  <text x="609" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">-Xcomp </text>
  <text x="663" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0"># 즉시 컴파일</text>
  <text x="605" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JMH warmup 이터레이션 필수</text>
</svg>
