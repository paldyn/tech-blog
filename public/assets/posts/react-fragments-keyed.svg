<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">key가 있는 Fragment 패턴</text>

  <!-- Left: keyed Fragment with list -->
  <text x="220" y="76" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">목록에서 여러 요소를 key로 묶기</text>
  <rect x="60" y="86" width="360" height="220" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="76" y="98" width="328" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="118" fill="#9aa4b8">// &lt;&gt;&lt;/&gt; 단축 문법은 key 불가</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// React.Fragment 명시 필요</tspan>
    <tspan x="92" dy="18" fill="#ffffff">{items.map(item =&gt; (</tspan>
    <tspan x="92" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">&lt;React.Fragment</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">key</tspan><tspan fill="#ffffff">={item.id}</tspan>
    <tspan x="92" dy="18" fill="#ce9178">  &gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;dt&gt;</tspan><tspan fill="#ffffff">{item.term}</tspan><tspan fill="#ce9178">&lt;/dt&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;dd&gt;</tspan><tspan fill="#ffffff">{item.desc}</tspan><tspan fill="#ce9178">&lt;/dd&gt;</tspan>
    <tspan x="92" dy="18" fill="#ce9178">  &lt;/React.Fragment&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">))}</tspan>
  </text>

  <!-- Right: Use cases -->
  <text x="660" y="76" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">Fragment가 빛나는 상황</text>
  <rect x="460" y="86" width="360" height="220" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>

  <!-- Use case 1 -->
  <rect x="476" y="98" width="328" height="48" rx="6" fill="#0f1020" stroke="#2a2a4a" stroke-width="1"/>
  <text x="640" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">table &gt; tr &gt; td / th</text>
  <text x="640" y="136" text-anchor="middle" font-size="12" fill="#888">tr 자식은 반드시 td/th — div 래퍼 불가</text>

  <!-- Use case 2 -->
  <rect x="476" y="156" width="328" height="48" rx="6" fill="#0f1020" stroke="#2a2a4a" stroke-width="1"/>
  <text x="640" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">dl &gt; dt + dd 쌍</text>
  <text x="640" y="194" text-anchor="middle" font-size="12" fill="#888">dt/dd 여러 쌍을 key로 묶어 렌더링</text>

  <!-- Use case 3 -->
  <rect x="476" y="214" width="328" height="48" rx="6" fill="#0f1020" stroke="#2a2a4a" stroke-width="1"/>
  <text x="640" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">CSS Flex/Grid 레이아웃</text>
  <text x="640" y="252" text-anchor="middle" font-size="12" fill="#888">래퍼 div가 flex 배치를 깨는 경우</text>

  <!-- Bottom comparison -->
  <rect x="60" y="326" width="760" height="72" rx="8" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="348" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">두 가지 문법 비교</text>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="180" y="368" fill="#9aa4b8">// 단축 (key 불가)</tspan>
    <tspan x="180" dy="18" fill="#ffffff">&lt;&gt;</tspan><tspan fill="#ce9178">&lt;td/&gt;&lt;td/&gt;</tspan><tspan fill="#ffffff">&lt;/&gt;</tspan>
    <tspan x="500" y="368" fill="#9aa4b8">// 명시 (key 가능)</tspan>
    <tspan x="500" dy="18" fill="#ffffff">&lt;React.Fragment </tspan><tspan fill="#7ec8e3" font-weight="600">key</tspan><tspan fill="#ffffff">={id}&gt;</tspan><tspan fill="#ce9178">&lt;td/&gt;&lt;td/&gt;</tspan><tspan fill="#ffffff">&lt;/React.Fragment&gt;</tspan>
  </text>
</svg>
