<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Node.js 아키텍처</text>

  <!-- Layer 1: JS Application -->
  <rect x="60" y="64" width="760" height="52" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="94" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#55c555">JavaScript 애플리케이션 코드</text>
  <text x="440" y="110" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">npm 패키지 / 사용자 코드 / 프레임워크 (Express, Fastify …)</text>

  <!-- Layer 2: Node.js Standard Library -->
  <rect x="60" y="128" width="760" height="52" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="158" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3">Node.js 표준 라이브러리 (JS)</text>
  <text x="440" y="174" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">fs · path · http · net · crypto · stream · events · worker_threads …</text>

  <!-- Layer 3: Node.js Bindings (C++) -->
  <rect x="60" y="192" width="760" height="52" rx="8" fill="#16100a" stroke="#e0a030" stroke-width="1.5"/>
  <text x="440" y="222" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#e0a030">Node.js 바인딩 (C++)</text>
  <text x="440" y="238" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">N-API · V8 API · libuv API · OpenSSL 바인딩</text>

  <!-- Layer 4: V8 + libuv (side by side) -->
  <!-- V8 box -->
  <rect x="60" y="256" width="360" height="120" rx="8" fill="#100a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="282" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7777cc">V8 (JavaScript 엔진)</text>
  <text x="240" y="304" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">JIT 컴파일 · 가비지 컬렉션</text>
  <text x="240" y="322" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">Call Stack · Heap</text>
  <text x="240" y="342" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">Google Chromium 코어 공유</text>
  <text x="240" y="362" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc">싱글 스레드 JS 실행</text>

  <!-- libuv box -->
  <rect x="460" y="256" width="360" height="120" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="282" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#e05555">libuv (비동기 I/O)</text>
  <text x="640" y="304" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">이벤트 루프 구현체</text>
  <text x="640" y="322" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">비동기 파일 I/O · DNS</text>
  <text x="640" y="342" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">스레드 풀 (4~1024개)</text>
  <text x="640" y="362" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">크로스 플랫폼 (Linux·macOS·Windows)</text>

  <!-- Layer 5: OS -->
  <rect x="60" y="390" width="760" height="52" rx="8" fill="#101010" stroke="#444"/>
  <text x="440" y="420" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#888">운영체제 (OS)</text>
  <text x="440" y="436" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">epoll (Linux) · kqueue (macOS) · IOCP (Windows) · TCP/UDP · 파일 시스템</text>

  <!-- Layer labels -->
  <text x="820" y="92" text-anchor="end"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#555">Layer 1</text>
  <text x="820" y="156" text-anchor="end"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#555">Layer 2</text>
  <text x="820" y="220" text-anchor="end"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#555">Layer 3</text>
  <text x="820" y="320" text-anchor="end"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#555">Layer 4</text>
  <text x="820" y="418" text-anchor="end"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#555">Layer 5</text>
</svg>
