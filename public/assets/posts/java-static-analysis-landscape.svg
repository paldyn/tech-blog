<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">정적 분석이 잡아내는 것들</text>
  <text x="60" y="72" font-size="13" fill="#888">실행하지 않고 코드·바이트코드를 분석해 문제를 미리 찾는다</text>

  <!-- Card 1: 버그 패턴 -->
  <rect x="60" y="100" width="360" height="140" rx="8" fill="#2a1414" stroke="#e05555" stroke-width="1"/>
  <text x="82" y="136" font-size="16" font-weight="600" fill="#e05555">버그 패턴</text>
  <text x="82" y="166" font-size="13" fill="#ffffff">Null 역참조, 자원 누수,</text>
  <text x="82" y="190" font-size="13" fill="#ffffff">== 로 문자열 비교 등 실수</text>
  <text x="82" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">SpotBugs · Error Prone</text>

  <!-- Card 2: 코드 냄새 -->
  <rect x="460" y="100" width="360" height="140" rx="8" fill="#2a2010" stroke="#e0a055" stroke-width="1"/>
  <text x="482" y="136" font-size="16" font-weight="600" fill="#e0a055">코드 냄새 · 복잡도</text>
  <text x="482" y="166" font-size="13" fill="#ffffff">긴 메서드, 중복 코드,</text>
  <text x="482" y="190" font-size="13" fill="#ffffff">높은 순환 복잡도</text>
  <text x="482" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">PMD · SonarQube</text>

  <!-- Card 3: 보안 -->
  <rect x="60" y="260" width="360" height="140" rx="8" fill="#14142a" stroke="#7777cc" stroke-width="1"/>
  <text x="82" y="296" font-size="16" font-weight="600" fill="#9a9ae0">보안 취약점</text>
  <text x="82" y="326" font-size="13" fill="#ffffff">SQL 인젝션, 하드코딩된 비밀,</text>
  <text x="82" y="350" font-size="13" fill="#ffffff">안전하지 않은 역직렬화</text>
  <text x="82" y="380" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">FindSecBugs · Semgrep</text>

  <!-- Card 4: 스타일 -->
  <rect x="460" y="260" width="360" height="140" rx="8" fill="#12203a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="482" y="296" font-size="16" font-weight="600" fill="#7ec8e3">스타일 위반</text>
  <text x="482" y="326" font-size="13" fill="#ffffff">명명 규칙, 포맷,</text>
  <text x="482" y="350" font-size="13" fill="#ffffff">import 정렬 · 문서화 누락</text>
  <text x="482" y="380" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">Checkstyle</text>
</svg>
