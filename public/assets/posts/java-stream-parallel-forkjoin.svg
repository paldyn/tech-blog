<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">병렬 스트림 — ForkJoin 풀 동작 구조</text>

  <!-- Sequential vs Parallel -->
  <text x="200" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">순차 스트림 (sequential)</text>
  <text x="660" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">병렬 스트림 (parallel)</text>

  <!-- Sequential: single thread -->
  <rect x="60" y="92" width="280" height="46" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메인 스레드 1개</text>
  <text x="200" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">[1][2][3][4][5][6][7][8] → 순서대로</text>

  <!-- Parallel: ForkJoin -->
  <rect x="460" y="92" width="360" height="46" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">ForkJoinPool.commonPool() 공유 풀</text>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">스레드 수 = CPU 코어 수 - 1 (기본)</text>

  <!-- Fork step -->
  <text x="640" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Fork — 데이터 분할</text>
  <rect x="460" y="172" width="360" height="56" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">[1,2]  [3,4]  [5,6]  [7,8]</text>
  <text x="640" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Spliterator로 데이터를 균등 분할</text>

  <!-- Worker threads -->
  <text x="640" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Worker 스레드 병렬 처리</text>
  <rect x="460" y="260" width="80" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="500" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">W-1</text>
  <text x="500" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[1,2]</text>

  <rect x="556" y="260" width="80" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="596" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">W-2</text>
  <text x="596" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[3,4]</text>

  <rect x="652" y="260" width="80" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="692" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">W-3</text>
  <text x="692" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[5,6]</text>

  <rect x="748" y="260" width="72" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="784" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">W-4</text>
  <text x="784" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[7,8]</text>

  <!-- Join step -->
  <text x="640" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Join — 결과 병합</text>
  <rect x="460" y="344" width="360" height="46" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">partial results → 최종 결과 병합</text>
  <text x="640" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">reduce/collect 시 combiner로 결합</text>

  <!-- Vertical line for sequential -->
  <line x1="200" y1="138" x2="200" y2="400" stroke="#e05555" stroke-width="2"/>
  <rect x="170" y="160" width="60" height="28" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">1 2 3 ...</text>
  <rect x="170" y="196" width="60" height="28" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">4 5 6 ...</text>
  <rect x="170" y="232" width="60" height="28" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">7 8</text>
  <text x="200" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">직렬 처리</text>
  <text x="200" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">T = n</text>

  <text x="200" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">T ≈ n/cores</text>
  <text x="200" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(이상적 조건 시)</text>

  <!-- divider -->
  <line x1="420" y1="72" x2="420" y2="420" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Caveats -->
  <rect x="60" y="416" width="760" height="52" rx="8" fill="#1a1a08" stroke="#e8c542" stroke-width="1"/>
  <text x="440" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c542" text-anchor="middle">주의: commonPool을 GC 스레드, I/O 등과 공유 — 블로킹 작업에 쓰면 앱 전체 성능 저하</text>
  <text x="440" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">커스텀 ForkJoinPool 사용: new ForkJoinPool(n).submit(() -&gt; stream.parallel()...)</text>
</svg>
