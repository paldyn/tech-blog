<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a855"/>
    </marker>
    <marker id="arr-v" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Swarm 작동 원리: 단일 루프 + 핸드오프</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">매 턴 현재 에이전트가 응답하고, 핸드오프 시 active_agent를 교체하는 단순 구조</text>

  <!-- Loop boxes -->
  <!-- 1. User Input -->
  <rect x="60" y="110" width="140" height="56" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">① 입력</text>
  <text x="130" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자 메시지</text>

  <line x1="200" y1="138" x2="238" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 2. Active Agent -->
  <rect x="240" y="100" width="180" height="76" rx="6" fill="#1a1000" stroke="#e0a855" stroke-width="2"/>
  <text x="330" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">② active_agent</text>
  <text x="330" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">현재 담당 에이전트</text>
  <text x="330" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">LLM 호출 + 도구 실행</text>

  <line x1="420" y1="138" x2="458" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 3. Result check -->
  <rect x="460" y="100" width="180" height="76" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="550" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">③ 응답 분석</text>
  <text x="550" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">핸드오프 여부 판단</text>
  <text x="550" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">context 업데이트</text>

  <!-- No handoff → output -->
  <line x1="640" y1="130" x2="698" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="669" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">일반응답</text>

  <rect x="700" y="108" width="130" height="42" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="765" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">최종 출력</text>

  <!-- Handoff → swap agent -->
  <line x1="550" y1="176" x2="550" y2="226" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="566" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e0a855">핸드오프</text>

  <rect x="420" y="228" width="260" height="46" rx="6" fill="#2a1a0a" stroke="#e0a855" stroke-width="1.5"/>
  <text x="550" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">active_agent = 새 에이전트</text>
  <text x="550" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">instructions, tools 교체</text>

  <!-- Loop back -->
  <path d="M 420 251 Q 200 300 240 190" stroke="#e0a855" stroke-width="2" stroke-dasharray="4,4"
        fill="none" marker-end="url(#arr-o)"/>
  <text x="220" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a855">다음 턴 계속</text>

  <!-- Comparison table -->
  <rect x="60" y="320" width="760" height="56" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Swarm vs 다른 프레임워크</text>
  <text x="200" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">Swarm: 극도로 단순, 경량, 핸드오프만</text>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">AutoGen: 대화 기반, 코드 실행 강점</text>
  <text x="680" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">LangGraph: 상태 기계, 복잡 루프</text>
  <text x="200" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#3a3a3a">의존성 최소, 교육·프로토타입용</text>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#3a3a3a">GroupChat, Human-in-Loop 지원</text>
  <text x="680" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#3a3a3a">체크포인트, 시각화 강점</text>
</svg>
