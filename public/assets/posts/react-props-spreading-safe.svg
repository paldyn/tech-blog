<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">안전한 Props Spreading 패턴</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">필요한 props 꺼내고, 나머지(rest)만 spread</text>

  <!-- Pattern: Rest spreading -->
  <rect x="55" y="95" width="770" height="200" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="118" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">✅ 안전한 패턴: 커스텀 props 꺼내고 나머지만 전달</text>
  <rect x="70" y="128" width="740" height="152" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="125" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Button({ variant, size, className, children, </text>
  <text x="432" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">...</text>
  <text x="453" y="148" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">rest</text>
  <text x="479" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> }) {</text>
  <text x="82" y="166" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">  // variant, size, className은 이 컴포넌트용 props</text>
  <text x="82" y="184" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">  // rest에는 onClick, disabled, aria-label 등 HTML 속성만 남음</text>
  <text x="82" y="202" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="126" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> (</text>
  <text x="82" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;button</text>
  <text x="82" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      className={</text>
  <text x="160" y="238" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">`btn btn-${variant} btn-${size} ${className}`</text>
  <text x="430" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>
  <text x="82" y="256" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace" xml:space="preserve">      {...rest}</text>
  <text x="82" y="256" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">                 // onClick, disabled 등 HTML 속성</text>
  <text x="82" y="274" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &gt;{children}&lt;/button&gt;</text>

  <!-- Override pattern -->
  <rect x="55" y="320" width="770" height="130" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="343" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Spread 순서로 오버라이드 제어</text>
  <rect x="70" y="355" width="740" height="82" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="375" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// spread 뒤에 오는 값이 이긴다</text>
  <text x="82" y="393" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;input {...inputProps} type=</text>
  <text x="266" y="393" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">"email"</text>
  <text x="310" y="393" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> /&gt;</text>
  <text x="400" y="393" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// type="email"이 spread의 type을 덮어씀</text>
  <text x="82" y="411" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;input type=</text>
  <text x="155" y="411" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">"text"</text>
  <text x="195" y="411" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> {...inputProps} /&gt;</text>
  <text x="400" y="411" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// spread가 type="text"를 덮어씀</text>
</svg>
