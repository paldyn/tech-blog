<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <linearGradient id="hdrG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#203a43"/>
    </linearGradient>
    <marker id="ma" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
    <marker id="mb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="mc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a"/>
  <rect x="0" y="0" width="880" height="52" fill="url(#hdrG)"/>
  <text x="440" y="32" font-family="'Wanted Sans Variable', 'Noto Sans KR', sans-serif" font-size="17" font-weight="700" fill="#e8e8e8" text-anchor="middle">MCP 통신 흐름 — Host ↔ Client ↔ Server</text>

  <!-- Three column headers -->
  <rect x="30" y="68" width="220" height="36" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="140" y="91" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="700" fill="#a5b4fc" text-anchor="middle">🖥️ MCP Host (AI 앱)</text>

  <rect x="330" y="68" width="220" height="36" rx="8" fill="#1a2a1a" stroke="#34d399" stroke-width="1.5"/>
  <text x="440" y="91" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="middle">🔌 MCP Client (내장)</text>

  <rect x="630" y="68" width="220" height="36" rx="8" fill="#2a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="740" y="91" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="700" fill="#fcd34d" text-anchor="middle">⚙️ MCP Server (도구)</text>

  <!-- Vertical lines -->
  <line x1="140" y1="104" x2="140" y2="390" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>
  <line x1="440" y1="104" x2="440" y2="390" stroke="#34d399" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>
  <line x1="740" y1="104" x2="740" y2="390" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>

  <!-- Step 1: initialize -->
  <text x="20" y="132" font-family="'Wanted Sans Variable', sans-serif" font-size="9" font-weight="600" fill="#555">① 초기화</text>
  <line x1="140" y1="128" x2="430" y2="128" stroke="#34d399" stroke-width="1.5" marker-end="url(#ma)"/>
  <rect x="200" y="115" width="130" height="18" rx="4" fill="#0a0a0a"/>
  <text x="265" y="127" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">initialize { clientInfo }</text>

  <line x1="440" y1="148" x2="730" y2="148" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#mb)"/>
  <rect x="490" y="135" width="190" height="18" rx="4" fill="#0a0a0a"/>
  <text x="585" y="147" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle">capabilities 협상 (tools, resources…)</text>

  <!-- Step 2: tool list -->
  <text x="20" y="182" font-family="'Wanted Sans Variable', sans-serif" font-size="9" font-weight="600" fill="#555">② 도구 목록</text>
  <line x1="730" y1="178" x2="450" y2="178" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#mb)"/>
  <rect x="490" y="165" width="190" height="18" rx="4" fill="#0a0a0a"/>
  <text x="585" y="177" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle">tools/list → [ searchWeb, readFile… ]</text>

  <line x1="430" y1="198" x2="150" y2="198" stroke="#34d399" stroke-width="1.5" marker-end="url(#ma)"/>
  <rect x="200" y="185" width="130" height="18" rx="4" fill="#0a0a0a"/>
  <text x="265" y="197" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">도구 목록 노출 → LLM</text>

  <!-- Step 3: LLM decides -->
  <text x="20" y="232" font-family="'Wanted Sans Variable', sans-serif" font-size="9" font-weight="600" fill="#555">③ LLM 판단</text>
  <rect x="60" y="220" width="160" height="28" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="140" y="233" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#c7d2fe" text-anchor="middle">LLM: "searchWeb 써야겠다"</text>
  <text x="140" y="244" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#555" text-anchor="middle">tool_call 생성</text>

  <!-- Step 4: call tool -->
  <text x="20" y="278" font-family="'Wanted Sans Variable', sans-serif" font-size="9" font-weight="600" fill="#555">④ 호출</text>
  <line x1="140" y1="274" x2="430" y2="274" stroke="#34d399" stroke-width="1.5" marker-end="url(#ma)"/>
  <rect x="165" y="261" width="240" height="18" rx="4" fill="#0a0a0a"/>
  <text x="285" y="273" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">tools/call { name:"searchWeb", args:{q:"…"} }</text>

  <line x1="440" y1="294" x2="730" y2="294" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#mb)"/>
  <rect x="490" y="281" width="190" height="18" rx="4" fill="#0a0a0a"/>
  <text x="585" y="293" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle">JSON-RPC 2.0 요청 전달</text>

  <!-- Step 5: result -->
  <text x="20" y="330" font-family="'Wanted Sans Variable', sans-serif" font-size="9" font-weight="600" fill="#555">⑤ 결과</text>
  <line x1="730" y1="326" x2="450" y2="326" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#mb)"/>
  <rect x="490" y="313" width="190" height="18" rx="4" fill="#0a0a0a"/>
  <text x="585" y="325" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle">{ content: [{ type:"text", text:"…" }] }</text>

  <line x1="430" y1="346" x2="150" y2="346" stroke="#34d399" stroke-width="1.5" marker-end="url(#ma)"/>
  <rect x="200" y="333" width="130" height="18" rx="4" fill="#0a0a0a"/>
  <text x="265" y="345" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">결과를 컨텍스트에 추가</text>

  <!-- Step 6: final -->
  <text x="20" y="382" font-family="'Wanted Sans Variable', sans-serif" font-size="9" font-weight="600" fill="#555">⑥ 응답</text>
  <rect x="60" y="370" width="160" height="24" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="140" y="386" font-family="'Wanted Sans Variable', sans-serif" font-size="9" fill="#a5b4fc" text-anchor="middle">LLM 최종 응답 → 사용자</text>

  <!-- Bottom note -->
  <rect x="30" y="408" width="820" height="38" rx="8" fill="#111" stroke="#222"/>
  <text x="440" y="425" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#666" text-anchor="middle">MCP는 어떤 AI 앱이든 동일한 방식으로 외부 도구와 통신하도록 Anthropic이 제안한 오픈 표준입니다.</text>
  <text x="440" y="440" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#444" text-anchor="middle">로컬 프로세스(stdio) 또는 원격 서버(SSE/HTTP) 모두 동일한 프로토콜로 연결됩니다.</text>
</svg>
