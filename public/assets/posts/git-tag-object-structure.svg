<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Git Tag 오브젝트 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">annotated tag만 별도 오브젝트로 존재한다</text>

  <!-- Tag raw content -->
  <rect x="60" y="94" width="380" height="210" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="250" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">tag 오브젝트 원문</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">object</tspan><tspan fill="#ffffff"> abc123def…   </tspan><tspan fill="#888"># 가리키는 SHA</tspan></text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff">   commit        </tspan><tspan fill="#888"># 대상 타입</tspan></text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">tag</tspan><tspan fill="#ffffff">    v1.0.0        </tspan><tspan fill="#888"># 태그 이름</tspan></text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">tagger</tspan><tspan fill="#ffffff"> Alice &lt;a@ex.com&gt; 1716681600 +0900</tspan></text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  (빈 줄)</text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">  Release v1.0.0</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  First stable release.</text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  -----BEGIN PGP SIGNATURE-----...</text>

  <!-- Arrow: tag -> commit -->
  <line x1="440" y1="158" x2="520" y2="158" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Pointed commit -->
  <rect x="520" y="130" width="240" height="64" fill="#111" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">commit abc123def</text>
  <text x="640" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실제 태그가 가리키는 커밋</text>
  <text x="640" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">(blob·tree·다른 tag도 가능)</text>

  <!-- GPG signature note -->
  <rect x="520" y="214" width="240" height="76" fill="#1a0d0d" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">GPG 서명 (선택)</text>
  <text x="640" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">-s 옵션으로 서명 포함</text>
  <text x="640" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">메시지 뒤에 PGP 블록 추가</text>
  <text x="640" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">git tag -v로 검증</text>

  <!-- Lightweight vs Annotated -->
  <text x="440" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">Lightweight tag vs Annotated tag</text>

  <!-- Lightweight -->
  <rect x="60" y="352" width="360" height="100" fill="#111" rx="8" stroke="#555" stroke-width="1"/>
  <text x="240" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">Lightweight tag</text>
  <text x="240" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">refs/tags/v1.0.0 → commit SHA</text>
  <text x="240" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">오브젝트 없음, 단순 포인터</text>
  <text x="240" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">git tag v1.0.0</text>
  <text x="240" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">메시지·서명·tagger 없음</text>

  <!-- Annotated -->
  <rect x="460" y="352" width="360" height="100" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Annotated tag</text>
  <text x="640" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">refs/tags/v1.0.0 → tag 오브젝트 SHA</text>
  <text x="640" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">tag 오브젝트 → commit SHA</text>
  <text x="640" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">git tag -a v1.0.0 -m "msg"</text>
  <text x="640" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메시지·tagger·서명 보관</text>
</svg>
