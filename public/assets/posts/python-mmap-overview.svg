<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrL" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">mmap — 메모리 맵 파일</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">파일을 메모리처럼 접근 — 읽기/쓰기를 복사 없이, OS가 직접 관리</text>

  <!-- Traditional read diagram -->
  <rect x="60" y="96" width="360" height="30" rx="6" fill="#2a1a1a"/>
  <text x="240" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">일반 read() — 2번 복사</text>

  <rect x="60" y="136" width="100" height="44" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">디스크</text>

  <line x1="160" y1="158" x2="190" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="175" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">①복사</text>

  <rect x="194" y="136" width="100" height="44" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="244" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OS 버퍼</text>

  <line x1="294" y1="158" x2="324" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="309" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">②복사</text>

  <rect x="328" y="136" width="100" height="44" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="378" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">앱 메모리</text>

  <!-- mmap diagram -->
  <rect x="460" y="96" width="360" height="30" rx="6" fill="#1a2a1a"/>
  <text x="640" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">mmap — 복사 없음</text>

  <rect x="460" y="136" width="100" height="44" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="510" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">디스크</text>

  <line x1="560" y1="158" x2="590" y2="158" stroke="#55c555" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="575" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">매핑</text>

  <rect x="594" y="136" width="100" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="644" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">가상 메모리</text>
  <text x="644" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(= OS 페이지)</text>

  <line x1="694" y1="158" x2="724" y2="158" stroke="#55c555" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="709" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">직접</text>

  <rect x="728" y="136" width="80" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="768" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">앱</text>

  <!-- Benefits -->
  <rect x="60" y="210" width="760" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># mmap 기본 사용</text>
  <text xml:space="preserve" x="78" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">import</ttml:tspan> mmap</text>
  <text xml:space="preserve" x="78" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">with</ttml:tspan> <ttml:tspan font-weight="600" fill="#7ec8e3">open</ttml:tspan>(<ttml:tspan fill="#ce9178">"large.bin"</ttml:tspan>, <ttml:tspan fill="#ce9178">"rb"</ttml:tspan>) as f:</text>
  <text xml:space="preserve" x="78" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    mm = mmap.mmap(f.fileno(), <ttml:tspan fill="#b5cea8">0</ttml:tspan>,  <ttml:tspan fill="#9aa4b8"># 0=전체</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">                   access=mmap.ACCESS_READ)</text>
  <text xml:space="preserve" x="78" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    pos = mm.find(b<ttml:tspan fill="#ce9178">"KEYWORD"</ttml:tspan>)   <ttml:tspan fill="#9aa4b8"># 고속 검색</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    chunk = mm[<ttml:tspan fill="#b5cea8">100</ttml:tspan>:<ttml:tspan fill="#b5cea8">200</ttml:tspan>]          <ttml:tspan fill="#9aa4b8"># 슬라이싱</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    mm.close()</text>

  <rect x="60" y="424" width="760" height="24" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">mmap은 bytes처럼 인덱싱·슬라이싱·find()·정규식 모두 지원 — seek+read 없이 바로 접근</text>
</svg>
