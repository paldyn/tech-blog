<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">전역 보강: 모듈 안에서 전역 스코프를 연다</text>

  <rect x="50" y="100" width="330" height="130" rx="8" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="72" y="128" font-size="13" font-weight="600" fill="#e8e8e8">모듈 파일 (import/export 있음)</text>
  <text x="72" y="156" font-size="11" fill="#888">declare global {</text>
  <text x="88" y="178" font-size="11" fill="#888">interface Window {</text>
  <text x="104" y="200" font-size="11" fill="#888">dataLayer: unknown[];</text>
  <text x="88" y="220" font-size="11" fill="#888">} }</text>

  <rect x="500" y="100" width="330" height="130" rx="8" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="522" y="128" font-size="13" font-weight="600" fill="#e8e8e8">전역 스코프</text>
  <text x="522" y="156" font-size="11" fill="#888">window.dataLayer  ✅</text>
  <text x="522" y="178" font-size="11" fill="#888">globalThis.dataLayer  ✅</text>
  <text x="522" y="200" font-size="11" fill="#888">어디서나 import 없이 접근</text>
  <text x="522" y="220" font-size="11" fill="#888">가능</text>

  <text x="410" y="155" font-size="11" fill="#888">전역에 병합</text>
  <line x1="380" y1="165" x2="500" y2="165" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>

  <text x="60" y="272" font-size="13" fill="#9aa4b8">declare global 블록은 모듈 내부에서도 선언을 전역 스코프로 끌어올려 병합한다.</text>
</svg>
