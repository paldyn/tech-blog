<svg width="880" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">상속 계층과 메서드 탐색 순서</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">extends · super · 프로토타입 체인을 따라가는 메서드 결정</text>

  <!-- Animal box (top) -->
  <rect x="290" y="100" width="300" height="80" rx="8" fill="#1a1a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Animal</text>
  <line x1="290" y1="134" x2="590" y2="134" stroke="#7777cc" stroke-width="1" stroke-opacity="0.4"/>
  <text x="306" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">constructor(name)</text>
  <text x="306" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">speak() → '...'</text>

  <!-- Arrow Animal → Dog -->
  <line x1="440" y1="180" x2="440" y2="220" stroke="#55c555" stroke-width="2"/>
  <polygon points="440,220 432,206 448,206" fill="#55c555"/>
  <text x="450" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">extends</text>

  <!-- Dog box (middle) -->
  <rect x="200" y="220" width="320" height="90" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="360" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Dog extends Animal</text>
  <line x1="200" y1="254" x2="520" y2="254" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>
  <text x="216" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">super(name) — 부모 생성자</text>
  <text x="216" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">speak() → '멍!' (오버라이드)</text>

  <!-- Arrow Dog → GoldenRetriever -->
  <line x1="360" y1="310" x2="360" y2="350" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="360,350 352,336 368,336" fill="#7ec8e3"/>
  <text x="370" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">extends</text>

  <!-- GoldenRetriever box (bottom) -->
  <rect x="110" y="350" width="360" height="70" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="290" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">GoldenRetriever extends Dog</text>
  <line x1="110" y1="384" x2="470" y2="384" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="126" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">fetch() → 새 메서드 추가</text>

  <!-- Right: Method resolution note -->
  <rect x="560" y="220" width="260" height="180" rx="6" fill="#0f0f15" stroke="#1e2030" stroke-width="1"/>
  <text x="690" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">메서드 탐색 순서 (MRO)</text>
  <text x="576" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">1. GoldenRetriever.prototype</text>
  <text x="576" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">2. Dog.prototype</text>
  <text x="576" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">3. Animal.prototype</text>
  <text x="576" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">4. Object.prototype</text>
  <text x="576" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#444">5. null (탐색 종료)</text>
  <text x="690" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">찾으면 즉시 반환</text>

  <!-- Footer -->
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
