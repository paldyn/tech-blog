<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">고유값 수(NDV)와 선택도</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">NDV가 높을수록 선택도 낮음 → 인덱스 효과 높음</text>

  <!-- Low NDV example -->
  <rect x="60" y="95" width="360" height="180" fill="#111" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">낮은 NDV — 인덱스 비효율</text>

  <text x="240" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컬럼: gender (M / F)</text>
  <text x="240" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">NDV = 2</text>

  <!-- bars -->
  <rect x="100" y="185" width="120" height="50" fill="#e05555" rx="3" opacity="0.7"/>
  <text x="160" y="214" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#fff">M (50%)</text>

  <rect x="250" y="185" width="120" height="50" fill="#e05555" rx="3" opacity="0.7"/>
  <text x="310" y="214" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#fff">F (50%)</text>

  <text x="240" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">선택도 ≈ 0.5 → Full Scan 선택</text>

  <!-- High NDV example -->
  <rect x="460" y="95" width="360" height="180" fill="#111" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">높은 NDV — 인덱스 효율적</text>

  <text x="640" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컬럼: user_id (1 ~ 1,000,000)</text>
  <text x="640" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">NDV = 1,000,000</text>

  <!-- bars (thin) -->
  <rect x="480" y="185" width="4" height="50" fill="#55c555" rx="1"/>
  <rect x="490" y="185" width="4" height="50" fill="#55c555" rx="1"/>
  <rect x="500" y="185" width="4" height="50" fill="#55c555" rx="1"/>
  <rect x="510" y="185" width="4" height="50" fill="#55c555" rx="1"/>
  <text x="580" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">…각 ID당 매우 적은 행</text>

  <text x="640" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">선택도 ≈ 0.000001 → Index Scan 선택</text>

  <!-- Formula box -->
  <rect x="60" y="300" width="760" height="80" fill="#0d0d18" rx="8" stroke="#3a4a6e"/>
  <text x="440" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">선택도 공식 (등치 조건)</text>

  <text x="265" y="352" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">selectivity = 1 / NDV</text>
  <text x="265" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(균등 분포 가정, 실제는 히스토그램 사용)</text>

  <text x="640" y="352" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">rows = reltuples × selectivity</text>
  <text x="640" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CBO 카디널리티 추정</text>
</svg>
