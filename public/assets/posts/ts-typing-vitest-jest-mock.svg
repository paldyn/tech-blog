<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">타입이 살아있는 목(mock)</text>
  <text x="60" y="78" font-size="13" fill="#888">제네릭 vi.fn과 vi.mocked로 인자·반환 타입을 보존한다</text>

  <!-- left -->
  <rect x="60" y="100" width="360" height="250" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" font-size="14" font-weight="600" fill="#7ec8e3">제네릭 vi.fn</text>
  <text xml:space="preserve" x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> fn =</tspan></text>
  <text xml:space="preserve" x="76" y="184" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  vi.fn&lt;(id: number)</text>
  <text xml:space="preserve" x="76" y="206" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    =&gt; User&gt;();</text>
  <text xml:space="preserve" x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">fn.mockReturnValue(user);</text>
  <text xml:space="preserve" x="76" y="262" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// user가 User인지 검사</text>
  <text x="76" y="300" font-size="13" fill="#ffffff">잘못된 인자·반환값을</text>
  <text x="76" y="322" font-size="13" fill="#55c555">컴파일 타임에 차단</text>

  <!-- right -->
  <rect x="460" y="100" width="360" height="250" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="128" font-size="14" font-weight="600" fill="#55c555">vi.mocked로 모듈 목</text>
  <text xml:space="preserve" x="476" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">vi.mock(</text>
  <text xml:space="preserve" x="476" y="184" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">"./api"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text xml:space="preserve" x="476" y="218" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> m =</tspan></text>
  <text xml:space="preserve" x="476" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  vi.mocked(getUser);</text>
  <text xml:space="preserve" x="476" y="262" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 원래 시그니처 + mock API</text>
  <text x="476" y="300" font-size="13" fill="#ffffff">실제 함수 타입을 그대로</text>
  <text x="476" y="322" font-size="13" fill="#55c555">유지한 채 mock 메서드 제공</text>
</svg>
