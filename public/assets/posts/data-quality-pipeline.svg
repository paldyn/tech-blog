<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">데이터 품질 파이프라인</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Data Quality Pipeline</text>

  <!-- Defs: arrow marker -->
  <defs>
    <marker id="dqarr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Pipeline boxes -->
  <!-- 1. Raw Data -->
  <rect x="60" y="110" width="130" height="68" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="125" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#888">Raw Data</text>
  <text x="125" y="158" text-anchor="middle" font-size="12" fill="#666">원천 데이터</text>
  <text x="125" y="173" text-anchor="middle" font-size="12" fill="#666">수집·적재</text>

  <!-- Arrow 1->2 -->
  <line x1="190" y1="144" x2="224" y2="144" stroke="#555" stroke-width="2" marker-end="url(#dqarr)"/>

  <!-- 2. Profiling -->
  <rect x="224" y="110" width="130" height="68" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="289" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Profiling</text>
  <text x="289" y="158" text-anchor="middle" font-size="12" fill="#888">분포·결측·이상</text>
  <text x="289" y="173" text-anchor="middle" font-size="12" fill="#888">자동 탐색</text>

  <!-- Arrow 2->3 -->
  <line x1="354" y1="144" x2="388" y2="144" stroke="#555" stroke-width="2" marker-end="url(#dqarr)"/>

  <!-- 3. Validation -->
  <rect x="388" y="110" width="130" height="68" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="453" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Validation</text>
  <text x="453" y="158" text-anchor="middle" font-size="12" fill="#888">규칙·스키마</text>
  <text x="453" y="173" text-anchor="middle" font-size="12" fill="#888">검증·알림</text>

  <!-- Arrow 3->4 -->
  <line x1="518" y1="144" x2="552" y2="144" stroke="#555" stroke-width="2" marker-end="url(#dqarr)"/>

  <!-- 4. Cleaning -->
  <rect x="552" y="110" width="130" height="68" rx="8" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="617" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">Cleaning</text>
  <text x="617" y="158" text-anchor="middle" font-size="12" fill="#888">결측 보완·이상</text>
  <text x="617" y="173" text-anchor="middle" font-size="12" fill="#888">값 제거·수정</text>

  <!-- Arrow 4->5 -->
  <line x1="682" y1="144" x2="716" y2="144" stroke="#555" stroke-width="2" marker-end="url(#dqarr)"/>

  <!-- 5. Monitoring -->
  <rect x="716" y="110" width="104" height="68" rx="8" fill="#1a2020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="768" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">Monitoring</text>
  <text x="768" y="158" text-anchor="middle" font-size="12" fill="#888">드리프트</text>
  <text x="768" y="173" text-anchor="middle" font-size="12" fill="#888">지속 감시</text>

  <!-- Feedback arrow: Validation fail -> back -->
  <defs>
    <marker id="dqfail" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <path d="M 453 178 Q 453 230 289 230 Q 224 230 224 178" fill="none"
        stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#dqfail)"/>
  <text x="360" y="252" text-anchor="middle" font-size="12" fill="#e05555">검증 실패 시 재처리</text>

  <!-- Tools section -->
  <text x="60" y="290" font-size="14" font-weight="600" fill="#e8e8e8">주요 도구</text>

  <rect x="60" y="304" width="150" height="48" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="135" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">Great Expectations</text>
  <text x="135" y="342" text-anchor="middle" font-size="11" fill="#666">규칙 기반 검증</text>

  <rect x="228" y="304" width="150" height="48" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="303" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">dbt tests</text>
  <text x="303" y="342" text-anchor="middle" font-size="11" fill="#666">SQL 기반 품질 검증</text>

  <rect x="396" y="304" width="150" height="48" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="471" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">Pandera</text>
  <text x="471" y="342" text-anchor="middle" font-size="11" fill="#666">DataFrame 스키마 검증</text>

  <rect x="564" y="304" width="150" height="48" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="639" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">Monte Carlo</text>
  <text x="639" y="342" text-anchor="middle" font-size="11" fill="#666">데이터 옵저버빌리티</text>

  <text x="60" y="368" font-size="12" fill="#555">* 파이프라인 각 단계에서 품질 지표를 메타스토어에 기록하고 대시보드로 모니터링</text>
</svg>
