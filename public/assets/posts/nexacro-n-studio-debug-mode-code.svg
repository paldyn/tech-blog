<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">디버거 활용 실전 — 변수 감시 패턴</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Watch Window와 조건부 브레이크포인트 활용</text>

  <!-- Left: Watch example -->
  <text x="40" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">감시할 코드 (브레이크포인트 위치)</text>
  <rect x="40" y="106" width="390" height="240" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ← 이 라인에 브레이크포인트 설정</text>
  <text x="56" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> fnSave() {</text>
  <text x="56" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">var</tspan> nRows = dsList.rowcount;</text>
  <text x="56" y="187" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">for</tspan> (<tspan fill="#7ec8e3" font-weight="600">var</tspan> i=<tspan fill="#b5cea8">0</tspan>; i&lt;nRows; i++) {</text>
  <text x="56" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">var</tspan> sStatus = dsList</text>
  <text x="56" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      .getRowType(i);</text>
  <text x="56" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">if</tspan> (sStatus == <tspan fill="#b5cea8">1</tspan>) { <tspan fill="#9aa4b8">// 추가</tspan></text>
  <text x="56" y="263" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      fnInsert(i);</text>
  <text x="56" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    } <tspan fill="#7ec8e3" font-weight="600">else if</tspan> (sStatus == <tspan fill="#b5cea8">2</tspan>) {</text>
  <text x="56" y="301" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      fnUpdate(i);</text>
  <text x="56" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    }</text>
  <text x="56" y="339" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>

  <!-- Right: Watch window + condition -->
  <text x="450" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Watch Window 감시 항목 예시</text>
  <rect x="450" y="106" width="390" height="240" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Watch에 입력할 표현식</text>
  <text x="466" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dsList.rowcount</text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">i</text>
  <text x="466" y="187" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sStatus</text>
  <text x="466" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dsList.getColumn(i, <tspan fill="#ce9178">"USER_ID"</tspan>)</text>
  <text x="466" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 조건부 브레이크포인트</text>
  <text x="466" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 우클릭 → Condition: i == 5</text>
  <text x="466" y="271" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// → i가 5가 될 때만 정지</text>
  <text x="466" y="299" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 즉시 실행창 (Immediate)</text>
  <text x="466" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">? dsList.getColumn(i, <tspan fill="#ce9178">"AMT"</tspan>)</text>
  <text x="466" y="337" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 정지 상태에서 임의 코드 실행</text>

  <!-- Bottom note -->
  <rect x="40" y="357" width="800" height="16" rx="4" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="60" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Watch에서 dsList.getColumn(i, "컬럼") 형태로 Dataset 내용을 직접 조회할 수 있다</text>
</svg>
