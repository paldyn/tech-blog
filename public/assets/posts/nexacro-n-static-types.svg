<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Static — 종류 및 활용 패턴</text>

  <!-- Row 1: Label type -->
  <rect x="50" y="66" width="780" height="74" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="66" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">라벨 (Label)</text>
  <!-- Mock label -->
  <rect x="66" y="100" width="160" height="28" rx="4" fill="#1a2030"/>
  <text x="80" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">이름 *</text>
  <text x="250" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">입력 필드 앞의 설명 텍스트. halign, valign으로 정렬 제어.</text>
  <text x="250" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">text, style (font-weight/color) 속성으로 커스터마이즈</text>

  <!-- Row 2: Status type -->
  <rect x="50" y="150" width="780" height="74" rx="8" fill="#101828" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="66" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">상태 메시지 (Status)</text>
  <!-- Mock status chips -->
  <rect x="66" y="184" width="100" height="28" rx="14" fill="#0a2010" stroke="#1e5020"/>
  <text x="116" y="203" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">● 처리완료</text>
  <rect x="180" y="184" width="80" height="28" rx="14" fill="#1a1008" stroke="#503010"/>
  <text x="220" y="203" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#b5cea8">● 대기중</text>
  <rect x="274" y="184" width="80" height="28" rx="14" fill="#160808" stroke="#502020"/>
  <text x="314" y="203" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">● 오류</text>
  <text x="380" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">스크립트로 text/style을 동적 변경하여</text>
  <text x="380" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">처리 상태를 사용자에게 시각적으로 표시</text>

  <!-- Row 3: Separator type -->
  <rect x="50" y="234" width="780" height="74" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="66" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">구분선 / 제목 영역</text>
  <!-- Mock divider -->
  <rect x="66" y="270" width="300" height="2" fill="#2a3a4a"/>
  <text x="380" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">width 100%, height 2px → 수평 구분선 효과</text>
  <text x="66" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#e8e8e8">■ 기본 정보</text>
  <text x="380" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">섹션 제목: font-weight bold + border-bottom</text>

  <!-- Row 4: Dynamic content -->
  <rect x="50" y="318" width="780" height="100" rx="8" fill="#101828" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="66" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">주요 속성</text>

  <text x="66" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">text</text>
  <text x="150" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">→</text>
  <text x="166" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">표시 텍스트 (set_text()로 동적 변경 가능)</text>

  <text x="66" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">style</text>
  <text x="150" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">→</text>
  <text x="166" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">color, font-size, font-weight, background-color</text>

  <text x="66" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">halign / valign</text>
  <text x="200" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">→</text>
  <text x="216" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">텍스트 정렬 (left/center/right, top/middle/bottom)</text>

  <!-- Footer -->
  <text x="440" y="444" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복</text>
</svg>
