<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">타입 선택 실전 예시</text>
  <rect x="60" y="54" width="760" height="228" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="76" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 실전 테이블: 타입 선택 이유 주석 포함</text>
  <text x="76" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">CREATE TABLE</tspan> payments (</text>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  id          <tspan fill="#b5cea8">BIGINT</tspan>        <tspan font-weight="600" fill="#7ec8e3">NOT NULL</tspan>, <tspan fill="#9aa4b8">-- 고트래픽: INT 21억 초과 가능</tspan></text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  amount      <tspan fill="#b5cea8">DECIMAL</tspan>(<tspan fill="#b5cea8">15,2</tspan>)  <tspan font-weight="600" fill="#7ec8e3">NOT NULL</tspan>, <tspan fill="#9aa4b8">-- 금액: FLOAT 사용 금지</tspan></text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  currency    <tspan fill="#b5cea8">CHAR</tspan>(<tspan fill="#b5cea8">3</tspan>)       <tspan font-weight="600" fill="#7ec8e3">NOT NULL</tspan>, <tspan fill="#9aa4b8">-- ISO 4217: KRW, USD, EUR</tspan></text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  pg_name     <tspan fill="#b5cea8">VARCHAR</tspan>(<tspan fill="#b5cea8">50</tspan>)   <tspan font-weight="600" fill="#7ec8e3">NOT NULL</tspan>, <tspan fill="#9aa4b8">-- 결제사 이름</tspan></text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  is_refunded <tspan fill="#b5cea8">BOOLEAN</tspan>      <tspan font-weight="600" fill="#7ec8e3">NOT NULL DEFAULT</tspan> <tspan font-weight="600" fill="#7ec8e3">FALSE</tspan>,</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  receipt_url <tspan fill="#b5cea8">TEXT</tspan>         <tspan font-weight="600" fill="#7ec8e3">NULL</tspan>,      <tspan fill="#9aa4b8">-- URL 길이 미정: TEXT</tspan></text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan font-weight="600" fill="#7ec8e3">CONSTRAINT</tspan> pk_payments <tspan font-weight="600" fill="#7ec8e3">PRIMARY KEY</tspan> (id)</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- MySQL BOOLEAN = TINYINT(1) 내부 표현, 0=FALSE, 1=TRUE</text>
</svg>
