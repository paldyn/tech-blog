  <text x="76" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">선형 체의 규칙: 합성수는 "최소 소인수 × 나머지"로 정확히 한 번만 지운다</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> p </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> primes:  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> p &gt; spf[i]: </tspan><tspan fill="#7ec8e3" font-weight="600">break</tspan><tspan fill="#ffffff">;  spf[i·p] = p</tspan></text>

  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">12는 2·6 으로만 지워진다 (3·4로는 안 지움) → 전체 작업량이 정확히 O(n)</text>
  <text x="60" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">spf 테이블이 있으면 어떤 수든 O(log n)에 소인수분해 가능 — 다음 글에서 활용</text>
