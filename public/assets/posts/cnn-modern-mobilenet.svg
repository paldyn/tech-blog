<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr7ec8e3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arre05555" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">깊이별 분리 합성곱 (Depthwise Separable)</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">MobileNet의 핵심 — 8~9배 연산 절약</text>

  <!-- Standard Conv (left) -->
  <text x="185" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">일반 합성곱</text>

  <!-- Input feature map -->
  <g transform="translate(36, 120)">
    <rect x="0" y="0" width="80" height="80" fill="#1a2535" rx="4" stroke="#3a4560" stroke-width="1.5"/>
    <text x="40" y="36" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">입력</text>
    <text x="40" y="52" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">H×W×C_in</text>
    <text x="40" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">예: ×3</text>
  </g>

  <line x1="116" y1="160" x2="154" y2="160" stroke="#e05555" stroke-width="2" marker-end="url(#arre05555)"/>

  <!-- Standard Conv box -->
  <rect x="157" y="130" width="110" height="60" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="212" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">Conv 3×3</text>
  <text x="212" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모든 채널 동시</text>
  <text x="212" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">C_in→C_out</text>

  <line x1="267" y1="160" x2="306" y2="160" stroke="#e05555" stroke-width="2" marker-end="url(#arre05555)"/>

  <!-- Output -->
  <g transform="translate(308, 120)">
    <rect x="0" y="0" width="80" height="80" fill="#1a0d0d" rx="4" stroke="#e05555" stroke-width="1.5"/>
    <text x="40" y="36" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">출력</text>
    <text x="40" y="52" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">H×W×C_out</text>
    <text x="40" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">예: ×64</text>
  </g>

  <rect x="36" y="220" width="352" height="36" fill="#000000" rx="4" stroke="#3a4a6e"/>
  <text x="212" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">파라미터: 3×3×3×64 = 1,728 | FLOPs: ~H×W×1,728</text>

  <!-- Depthwise Separable (right) -->
  <text x="620" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">깊이별 분리 합성곱</text>

  <!-- Input -->
  <g transform="translate(450, 120)">
    <rect x="0" y="0" width="70" height="80" fill="#1a2535" rx="4" stroke="#3a4560" stroke-width="1.5"/>
    <text x="35" y="36" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">입력</text>
    <text x="35" y="52" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">H×W×3</text>
  </g>

  <line x1="520" y1="160" x2="558" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7ec8e3)"/>

  <!-- Depthwise conv -->
  <rect x="561" y="128" width="110" height="64" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="616" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">DW Conv 3×3</text>
  <text x="616" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">채널별 독립 3×3</text>
  <text x="616" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">3→3 ch (공간만)</text>

  <line x1="671" y1="160" x2="710" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7ec8e3)"/>

  <!-- Pointwise conv -->
  <rect x="713" y="128" width="110" height="64" fill="#0d1a0d" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="768" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">PW Conv 1×1</text>
  <text x="768" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">채널 믹싱</text>
  <text x="768" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">3→64 ch</text>

  <!-- Output -->
  <rect x="835" y="128" width="35" height="64" fill="#0d1a0d" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="852" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">출력</text>
  <text x="852" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">×64</text>
  <line x1="823" y1="160" x2="835" y2="160" stroke="#55c555" stroke-width="2"/>

  <rect x="450" y="220" width="420" height="36" fill="#000000" rx="4" stroke="#3a4a6e"/>
  <text x="660" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">파라미터: 3×3×3 + 3×64 = 27+192 = 219 → 7.9× 절약!</text>

  <!-- Comparison table -->
  <rect x="36" y="275" width="808" height="140" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <text x="440" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">현대 경량 CNN 비교</text>

  <line x1="56" y1="308" x2="824" y2="308" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Header -->
  <text x="120" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">모델</text>
  <text x="280" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">파라미터</text>
  <text x="420" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">Top-1 (ImageNet)</text>
  <text x="570" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">핵심 혁신</text>
  <text x="730" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">용도</text>

  <line x1="56" y1="333" x2="824" y2="333" stroke="#3a4a6e" stroke-width="1"/>

  <text x="120" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">MobileNetV2</text>
  <text x="280" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3.4M</text>
  <text x="420" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">72.0%</text>
  <text x="570" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">역전 잔차 + DW분리</text>
  <text x="730" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모바일/엣지</text>

  <text x="120" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">EfficientNet-B0</text>
  <text x="280" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">5.3M</text>
  <text x="420" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">77.1%</text>
  <text x="570" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">복합 스케일링</text>
  <text x="730" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">범용</text>

  <text x="120" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">ConvNeXt-T</text>
  <text x="280" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">28M</text>
  <text x="420" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">82.1%</text>
  <text x="570" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ViT 설계 CNN 적용</text>
  <text x="730" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">고성능 CNN</text>
</svg>
