<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker port — 명령 패턴</text>

  <!-- Left column -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 사용법</text>
  <rect x="60" y="92" width="360" height="118" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 컨테이너 전체 포트 매핑 조회</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker port</tspan><tspan fill="#ffffff"> &lt;CONTAINER&gt;</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 특정 컨테이너 포트 조회</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker port</tspan><tspan fill="#ffffff"> web </tspan><tspan fill="#b5cea8">80</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 프로토콜 지정</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker port</tspan><tspan fill="#ffffff"> web </tspan><tspan fill="#b5cea8">80</tspan><tspan fill="#ffffff">/tcp</tspan></text>

  <!-- Left column: output -->
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">출력 예시</text>
  <rect x="60" y="248" width="360" height="118" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># docker port web 출력</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">80/tcp -&gt; 0.0.0.0:8080</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">80/tcp -&gt; [::]:8080</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 컨테이너 포트만 지정 시</text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">0.0.0.0:8080</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">[::]:8080</text>

  <!-- Right column: run with port mapping -->
  <text x="468" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">포트 매핑으로 실행</text>
  <rect x="448" y="92" width="372" height="136" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="464" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 단일 포트 매핑</text>
  <text x="464" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#ffffff"> -p </tspan><tspan fill="#b5cea8">8080</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#b5cea8">80</tspan><tspan fill="#ffffff"> nginx</tspan></text>
  <text x="464" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 특정 인터페이스 바인딩</text>
  <text x="464" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#ffffff"> -p 127.0.0.1:</tspan><tspan fill="#b5cea8">8080</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#b5cea8">80</tspan><tspan fill="#ffffff"> nginx</tspan></text>
  <text x="464" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 임의 호스트 포트 할당</text>
  <text x="464" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#ffffff"> -p </tspan><tspan fill="#b5cea8">80</tspan><tspan fill="#ffffff"> nginx</tspan></text>
  <text x="464" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 할당된 포트 확인</text>

  <!-- Right column: inspect comparison -->
  <text x="468" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">docker inspect 비교</text>
  <rect x="448" y="264" width="372" height="102" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="464" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># inspect로 같은 정보 추출</text>
  <text x="464" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker inspect</tspan><tspan fill="#ffffff"> web \</tspan></text>
  <text x="464" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  --format </tspan><tspan fill="#ce9178">'{{json .NetworkSettings.Ports}}'</tspan></text>
  <text x="464" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># docker port가 훨씬 간결</text>
  <text x="464" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker port</tspan><tspan fill="#ffffff"> web</tspan><tspan fill="#9aa4b8">  # 한 줄!</tspan></text>

  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">실행 중인 컨테이너에만 동작 — 중지 상태 컨테이너는 출력 없음</text>
</svg>
