<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CompletableFuture 상태 전이</text>

  <!-- Incomplete -->
  <rect x="340" y="72" width="200" height="56" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">INCOMPLETE</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">미완료 · 대기 중</text>

  <!-- Complete normally -->
  <rect x="100" y="220" width="220" height="60" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="210" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">COMPLETED</text>
  <text x="210" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">complete(value) / 정상 완료</text>

  <!-- Complete exceptionally -->
  <rect x="380" y="220" width="220" height="60" rx="8" fill="#0f1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="490" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">EXCEPTIONALLY</text>
  <text x="490" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">completeExceptionally(ex)</text>

  <!-- Cancelled -->
  <rect x="660" y="220" width="160" height="60" rx="8" fill="#0f1a2e" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">CANCELLED</text>
  <text x="740" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">cancel(true)</text>

  <!-- Arrows -->
  <line x1="390" y1="128" x2="270" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="128" x2="490" y2="220" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <line x1="490" y1="128" x2="700" y2="220" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Labels on arrows -->
  <text x="310" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">정상 완료</text>
  <text x="470" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">예외 발생</text>
  <text x="620" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">취소</text>

  <!-- Bottom note -->
  <rect x="60" y="310" width="760" height="44" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">한 번 완료된 CF는 상태가 변하지 않음 (불변 완료 상태)</text>
  <text x="440" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">isDone() · isCompletedExceptionally() · isCancelled()로 상태 확인</text>
</svg>
