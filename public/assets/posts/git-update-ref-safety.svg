<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">update-ref 안전 체크 메커니즘</text>

  <!-- Safe update (with old SHA check) -->
  <rect x="60" y="75" width="360" height="120" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">안전한 업데이트 (old SHA 검증)</text>
  <rect x="80" y="108" width="320" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="96" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 현재값이 OLD_SHA 와 다르면 실패</text>
  <text xml:space="preserve" x="96" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git update-ref</text>
  <text xml:space="preserve" x="96" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  refs/heads/main $NEW $OLD</text>

  <!-- Unsafe update (no check) -->
  <rect x="460" y="75" width="360" height="120" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="640" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">강제 업데이트 (검증 없음)</text>
  <rect x="480" y="108" width="320" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="496" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 현재값과 무관하게 덮어씀</text>
  <text xml:space="preserve" x="496" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git update-ref</text>
  <text xml:space="preserve" x="496" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  refs/heads/main $NEW</text>

  <!-- Delete and create examples -->
  <rect x="60" y="220" width="760" height="115" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ref 삭제 (-d 플래그)</text>
  <text xml:space="preserve" x="80" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git update-ref</text><text xml:space="preserve" x="178" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -d refs/heads/old-branch</text>
  <text xml:space="preserve" x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ref 생성 (브랜치 만들기)</text>
  <text xml:space="preserve" x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git update-ref</text><text xml:space="preserve" x="178" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> refs/heads/new-branch $SHA</text>
  <text xml:space="preserve" x="80" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># git branch new-branch $SHA 와 동일</text>
</svg>
