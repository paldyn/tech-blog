<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">core.autocrlf 동작 방식</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">체크아웃·커밋 시 줄 끝 변환 방향</text>

  <!-- Column headers -->
  <text x="180" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">설정값</text>
  <text x="360" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">체크아웃 시</text>
  <text x="560" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">커밋 시 (저장소)</text>
  <text x="740" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">권장 환경</text>

  <!-- Row: true -->
  <rect x="60" y="112" width="760" height="50" fill="#0d1520" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="180" y="142" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#55c555" font-weight="600">true</text>
  <text x="360" y="135" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">LF → CRLF</text>
  <text x="360" y="153" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(워킹 트리에서 CRLF)</text>
  <text x="560" y="135" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">CRLF → LF</text>
  <text x="560" y="153" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(저장소는 항상 LF)</text>
  <text x="740" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Windows</text>

  <!-- Row: input -->
  <rect x="60" y="164" width="760" height="50" fill="#0a0f1a" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="180" y="194" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#55c555" font-weight="600">input</text>
  <text x="360" y="187" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">변환 없음</text>
  <text x="360" y="205" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(그대로 LF)</text>
  <text x="560" y="187" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">CRLF → LF</text>
  <text x="560" y="205" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(저장소는 LF)</text>
  <text x="740" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">macOS / Linux</text>

  <!-- Row: false -->
  <rect x="60" y="216" width="760" height="50" fill="#0d1520" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="180" y="246" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#888">false</text>
  <text x="360" y="239" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">변환 없음</text>
  <text x="560" y="239" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">변환 없음</text>
  <text x="740" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">비권장</text>

  <!-- Best practice: use .gitattributes -->
  <rect x="60" y="284" width="760" height="92" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">권장: .gitattributes로 저장소 레벨에서 고정</text>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="328" fill="#9aa4b8"># .gitattributes (저장소 전체)</tspan>
    <tspan x="76" dy="18" fill="#ce9178">*</tspan><tspan fill="#ffffff">     </tspan><tspan fill="#7ec8e3" font-weight="600">text</tspan><tspan fill="#ffffff">=auto</tspan>
    <tspan x="76" dy="18" fill="#ce9178">*.sh</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">text</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">eol</tspan><tspan fill="#ffffff">=lf</tspan>
    <tspan fill="#9aa4b8">  # 개인 core.autocrlf 설정을 덮어씀</tspan>
  </text>
</svg>
