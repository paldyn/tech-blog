<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">async/await &#xB514;&#xC288;&#xAC00;&#xB9C1; &#x2014; Promise &#xCCB4;&#xC774;&#xB2DD;&#xC73C;&#xB85C; &#xD3FC;&#xCCD0;&#xBCF4;&#xAE30;</text>

  <!-- Left: async/await -->
  <rect x="50" y="68" width="370" height="230" rx="6" fill="#070b14" stroke="#55c555"/>
  <text x="235" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">async/await (&#xC2E4;&#xC81C; &#xCF54;&#xB4DC;)</text>

  <text x="66" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">async function</text><text x="178" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> loadData(id) {</text>
  <text x="66" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  try</text><text x="96" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> {</text>
  <text x="66" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    const</text><text x="114" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> user = </text><text x="170" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">await</text><text x="204" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> fetchUser(id)</text>
  <text x="66" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    const</text><text x="114" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> posts = </text><text x="176" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">await</text><text x="210" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> fetchPosts(user.id)</text>
  <text x="66" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    return</text><text x="118" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> posts</text>
  <text x="66" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  } </text><text x="90" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">catch</text><text x="120" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(e) {</text>
  <text x="66" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    throw</text><text x="106" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> e</text>
  <text x="66" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="66" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <!-- Arrow -->
  <line x1="420" y1="190" x2="448" y2="190" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="448,184 460,190 448,196" fill="#7777cc"/>
  <text x="434" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">&#xB514;&#xC288;&#xAC00;&#xB9C1;</text>

  <!-- Right: Promise chain equivalent -->
  <rect x="460" y="68" width="370" height="230" rx="6" fill="#070b14" stroke="#7ec8e3"/>
  <text x="645" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Promise &#xCCB4;&#xC774;&#xB2DD; &#xB3D9;&#xB4F1;&#xBB3C;</text>

  <text x="476" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="528" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> loadData(id) {</text>
  <text x="476" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  return</text><text x="528" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> fetchUser(id)</text>
  <text x="476" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    .then(user =&gt;</text>
  <text x="476" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      fetchPosts(user.id))</text>
  <text x="476" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    .then(posts =&gt; posts)</text>
  <text x="476" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    .catch(e =&gt; {</text>
  <text x="476" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">      throw</text><text x="528" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> e</text>
  <text x="476" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    })</text>
  <text x="476" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <!-- Bottom: await timing -->
  <rect x="50" y="318" width="780" height="120" rx="6" fill="#111520" stroke="#1e2433"/>
  <text x="66" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">await &#xC2E4;&#xD589; &#xD750;&#xB984;</text>

  <text x="66" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">1.</text>
  <text x="84" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">await &#xD45C;&#xD604;&#xC2DD;&#xC5D0; &#xB3C4;&#xB2EC; &#xC2DC; &#xD568;&#xC218; &#xC2E4;&#xD589; &#xC77C;&#xC2DC; &#xC911;&#xC9C0;</text>
  <text x="66" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">2.</text>
  <text x="84" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">&#xC774;&#xBCA4;&#xD2B8; &#xB8E8;&#xD504;&#xB85C; &#xC81C;&#xC5B4;&#xAD8C; &#xBC18;&#xD658; &#x2192; &#xB2E4;&#xB978; &#xCF54;&#xB4DC; &#xC2E4;&#xD589; &#xAC00;&#xB2A5;</text>
  <text x="66" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">3.</text>
  <text x="84" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Promise settled &#xC2DC; &#xB9C8;&#xC774;&#xD06C;&#xB85C;&#xD0DC;&#xC2A4;&#xD06C;&#xB85C; &#xC7AC;&#xAC1C; &#x2192; await &#xB2E4;&#xC74C; &#xD589;&#xC5D0;&#xC11C; &#xACC4;&#xC18D;</text>
  <text x="66" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">4.</text>
  <text x="84" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">rejected &#xC2DC; throw&#xCC98;&#xB7FC; &#xC804;&#xD30C; &#x2192; try/catch&#xB85C; &#xD3EC;&#xCC29;</text>
</svg>
