<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">뮤테이션 테스트의 원리</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">코드를 일부러 바꿔 테스트가 잡는지 본다</text>

  <defs>
    <marker id="mtKill" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="mtLive" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- original -->
  <rect x="320" y="100" width="240" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">if (a <tspan fill="#7ec8e3">&gt;=</tspan> b)</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">원본 코드</text>

  <!-- mutant left: killed -->
  <rect x="60" y="220" width="320" height="80" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="220" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">if (a <tspan fill="#e05555">&gt;</tspan> b)  // 변이</text>
  <text x="220" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">테스트 실패 → 변이 처치(killed)</text>

  <!-- mutant right: survived -->
  <rect x="500" y="220" width="320" height="80" rx="8" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="660" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">if (a <tspan fill="#e05555">!=</tspan> b)  // 변이</text>
  <text x="660" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">테스트 통과 → 변이 생존(survived)</text>

  <line x1="380" y1="164" x2="240" y2="220" stroke="#55c555" stroke-width="2.5" marker-end="url(#mtKill)"/>
  <line x1="500" y1="164" x2="640" y2="220" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#mtLive)"/>
</svg>
