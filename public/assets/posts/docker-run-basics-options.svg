<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker run 주요 옵션</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">자주 쓰는 8가지 옵션과 역할</text>

  <!-- Table header -->
  <rect x="60" y="96" width="760" height="36" rx="4" fill="#111827"/>
  <text x="80" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">옵션</text>
  <text x="220" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">설명</text>
  <text x="500" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">예시</text>

  <!-- Row 1: -d -->
  <rect x="60" y="132" width="760" height="44" rx="0" fill="#0d0d0d"/>
  <text x="80" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7777cc">-d</text>
  <text x="220" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">백그라운드(detached) 실행</text>
  <text x="500" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">docker run -d nginx</text>

  <!-- Row 2: -it -->
  <rect x="60" y="176" width="760" height="44" rx="0" fill="#111"/>
  <text x="80" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7777cc">-it</text>
  <text x="220" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">대화형 터미널 연결 (-i -t 합성)</text>
  <text x="500" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">docker run -it ubuntu bash</text>

  <!-- Row 3: –name -->
  <rect x="60" y="220" width="760" height="44" rx="0" fill="#0d0d0d"/>
  <text x="80" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7777cc">--name</text>
  <text x="220" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">컨테이너 이름 지정</text>
  <text x="500" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">docker run --name web nginx</text>

  <!-- Row 4: -p -->
  <rect x="60" y="264" width="760" height="44" rx="0" fill="#111"/>
  <text x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7ec8e3">-p</text>
  <text x="220" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">호스트:컨테이너 포트 매핑</text>
  <text x="500" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">docker run -p 8080:80 nginx</text>

  <!-- Row 5: -v -->
  <rect x="60" y="308" width="760" height="44" rx="0" fill="#0d0d0d"/>
  <text x="80" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7ec8e3">-v</text>
  <text x="220" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">볼륨 또는 디렉터리 마운트</text>
  <text x="500" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">docker run -v /data:/app/data</text>

  <!-- Row 6: –rm -->
  <rect x="60" y="352" width="760" height="44" rx="0" fill="#111"/>
  <text x="80" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#55c555">--rm</text>
  <text x="220" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">종료 시 컨테이너 자동 삭제</text>
  <text x="500" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">docker run --rm alpine echo hi</text>

  <!-- Row 7: -e -->
  <rect x="60" y="396" width="760" height="44" rx="0" fill="#0d0d0d"/>
  <text x="80" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#55c555">-e</text>
  <text x="220" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">환경 변수 설정</text>
  <text x="500" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">docker run -e NODE_ENV=prod</text>

  <!-- Row 8: –network -->
  <rect x="60" y="440" width="760" height="44" rx="0" fill="#111"/>
  <text x="80" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#55c555">--network</text>
  <text x="220" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">연결할 Docker 네트워크 지정</text>
  <text x="500" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">docker run --network mynet</text>

  <!-- Bottom row border -->
  <rect x="60" y="132" width="760" height="352" rx="4" fill="none" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Column dividers -->
  <line x1="210" y1="132" x2="210" y2="484" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="132" x2="490" y2="484" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Footer note -->
  <text x="60" y="510" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">* 옵션은 조합해서 사용 가능: docker run -d -it --name web -p 80:80 nginx</text>
</svg>
