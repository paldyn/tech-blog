<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">pop vs apply — 복원 방식 비교</text>

  <!-- Stash Stack -->
  <rect x="60" y="80" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">stash@{0}</text>

  <rect x="60" y="122" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">stash@{1}</text>

  <rect x="60" y="164" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">stash@{2}</text>

  <text x="160" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Stash Stack</text>

  <!-- pop arrow -->
  <line x1="260" y1="98" x2="360" y2="98" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="310" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">pop</text>

  <!-- Working Tree (pop result) -->
  <rect x="370" y="68" width="200" height="74" rx="8" fill="#0d1f1d" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Working Tree</text>
  <text x="470" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경사항 복원됨</text>
  <text x="470" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">stash@{0} 삭제됨</text>

  <!-- apply arrow -->
  <line x1="260" y1="150" x2="620" y2="150" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">apply</text>

  <!-- Working Tree (apply result) -->
  <rect x="630" y="120" width="200" height="74" rx="8" fill="#0d1f1d" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Working Tree</text>
  <text x="730" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경사항 복원됨</text>
  <text x="730" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">stash@{1} 유지됨</text>

  <!-- Code block -->
  <rect x="60" y="250" width="760" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># pop: 복원 + 스택에서 제거</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">pop</tspan>               <tspan fill="#9aa4b8"># stash@{0} 복원 후 삭제</tspan></text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">pop</tspan> stash@{2}    <tspan fill="#9aa4b8"># 특정 stash 복원 후 삭제</tspan></text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># apply: 복원만 (스택 유지)</text>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#55c555" font-weight="600">apply</tspan>             <tspan fill="#9aa4b8"># stash@{0} 복원, 스택 유지</tspan></text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#55c555" font-weight="600">apply</tspan> stash@{1}   <tspan fill="#9aa4b8"># 특정 stash 복원</tspan></text>
</svg>
