<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Temperature 효과: 확률 분포 변화</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">동일한 로짓(logits)에 T를 적용하면 분포 형태가 달라진다</text>

  <!-- Token labels (shared x-axis tokens) -->
  <!-- Three panels side by side -->

  <!-- Panel 1: T=0.3 (sharp/peaked) -->
  <rect x="60" y="88" width="228" height="300" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="174" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">T = 0.3</text>
  <text x="174" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">결정적 (날카로운 분포)</text>

  <!-- Chart area for T=0.3 -->
  <line x1="84" y1="340" x2="272" y2="340" stroke="#333" stroke-width="1"/>
  <line x1="84" y1="148" x2="84" y2="340" stroke="#333" stroke-width="1"/>

  <!-- Bars for T=0.3: token A=78%, B=15%, C=5%, D=2% -->
  <!-- A: 78% → height ~148px -->
  <rect x="100" y="192" width="32" height="148" fill="#55c555" rx="3"/>
  <text x="116" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">78%</text>
  <text x="116" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">A</text>

  <!-- B: 15% → height ~28px -->
  <rect x="148" y="312" width="32" height="28" fill="#55c555" rx="3" opacity="0.7"/>
  <text x="164" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">15%</text>
  <text x="164" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">B</text>

  <!-- C: 5% → height ~9px -->
  <rect x="196" y="331" width="32" height="9" fill="#55c555" rx="2" opacity="0.5"/>
  <text x="212" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">5%</text>
  <text x="212" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">C</text>

  <!-- D: 2% → height ~4px -->
  <rect x="244" y="336" width="22" height="4" fill="#55c555" rx="2" opacity="0.3"/>
  <text x="255" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">2%</text>
  <text x="255" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">D</text>

  <!-- Y axis label -->
  <text x="84" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">100%</text>
  <text x="84" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">50%</text>

  <!-- Panel 2: T=1.0 (balanced) -->
  <rect x="326" y="88" width="228" height="300" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">T = 1.0</text>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">균형 (원본 분포)</text>

  <line x1="350" y1="340" x2="538" y2="340" stroke="#333" stroke-width="1"/>
  <line x1="350" y1="148" x2="350" y2="340" stroke="#333" stroke-width="1"/>

  <!-- Bars for T=1.0: A=52%, B=28%, C=13%, D=7% -->
  <rect x="366" y="241" width="32" height="99" fill="#7ec8e3" rx="3"/>
  <text x="382" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">52%</text>
  <text x="382" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">A</text>

  <rect x="414" y="287" width="32" height="53" fill="#7ec8e3" rx="3" opacity="0.8"/>
  <text x="430" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">28%</text>
  <text x="430" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">B</text>

  <rect x="462" y="315" width="32" height="25" fill="#7ec8e3" rx="3" opacity="0.6"/>
  <text x="478" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">13%</text>
  <text x="478" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">C</text>

  <rect x="510" y="327" width="22" height="13" fill="#7ec8e3" rx="2" opacity="0.4"/>
  <text x="521" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">7%</text>
  <text x="521" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">D</text>

  <text x="350" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">100%</text>
  <text x="350" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">50%</text>

  <!-- Panel 3: T=2.0 (flat) -->
  <rect x="592" y="88" width="228" height="300" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="706" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">T = 2.0</text>
  <text x="706" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">창의적 (평평한 분포)</text>

  <line x1="616" y1="340" x2="804" y2="340" stroke="#333" stroke-width="1"/>
  <line x1="616" y1="148" x2="616" y2="340" stroke="#333" stroke-width="1"/>

  <!-- Bars for T=2.0: A=38%, B=30%, C=20%, D=12% -->
  <rect x="632" y="268" width="32" height="72" fill="#e05555" rx="3"/>
  <text x="648" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">38%</text>
  <text x="648" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">A</text>

  <rect x="680" y="283" width="32" height="57" fill="#e05555" rx="3" opacity="0.85"/>
  <text x="696" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">30%</text>
  <text x="696" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">B</text>

  <rect x="728" y="302" width="32" height="38" fill="#e05555" rx="3" opacity="0.65"/>
  <text x="744" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">20%</text>
  <text x="744" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">C</text>

  <rect x="776" y="317" width="22" height="23" fill="#e05555" rx="2" opacity="0.45"/>
  <text x="787" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">12%</text>
  <text x="787" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">D</text>

  <text x="616" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">100%</text>
  <text x="616" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">50%</text>

  <!-- Summary bar at bottom -->
  <rect x="60" y="406" width="760" height="38" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">낮은 T</text>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 집중·반복</text>
  <text x="230" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">T = 0: Greedy와 동일</text>
  <text x="230" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(최고 확률 토큰 선택)</text>
  <text x="480" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">높은 T</text>
  <text x="480" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">→ 다양·창의적</text>
  <text x="640" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">T → ∞: 균등 분포</text>
  <text x="640" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(완전 무작위 선택)</text>
</svg>
