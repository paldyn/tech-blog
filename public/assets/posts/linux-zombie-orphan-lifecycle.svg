<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Zombie vs Orphan 프로세스</text>

  <!-- ZOMBIE side (left) -->
  <text x="220" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">Zombie 생성 경로</text>

  <!-- Parent alive, no wait -->
  <rect x="60" y="96" width="160" height="52" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="140" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc" text-anchor="middle">부모 프로세스</text>
  <text x="140" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">wait() 없음</text>

  <rect x="260" y="96" width="160" height="52" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="340" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555" text-anchor="middle">자식 → 종료</text>
  <text x="340" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">exit(0)</text>

  <line x1="220" y1="122" x2="258" y2="122" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="258,117 268,122 258,127" fill="#e05555"/>
  <text x="224" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">fork()</text>

  <!-- Arrow down to zombie -->
  <line x1="340" y1="148" x2="340" y2="196" stroke="#e05555" stroke-width="2"/>
  <polygon points="335,196 340,208 345,196" fill="#e05555"/>

  <rect x="260" y="208" width="160" height="60" rx="8" fill="#2a0505" stroke="#e05555" stroke-width="2"/>
  <text x="340" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">💀 ZOMBIE</text>
  <text x="340" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">exit code 대기 중</text>

  <!-- Zombie properties -->
  <rect x="60" y="288" width="360" height="100" rx="8" fill="#111" stroke="#333"/>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Zombie 특성</text>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 프로세스 테이블 엔트리 유지 (PID 점유)</text>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• CPU·메모리 사용 없음</text>
  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">• 부모가 wait() 호출 시 즉시 소멸</text>

  <!-- ORPHAN side (right) -->
  <text x="660" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Orphan 생성 경로</text>

  <rect x="540" y="96" width="160" height="52" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="620" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc" text-anchor="middle">부모 프로세스</text>
  <text x="620" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">먼저 종료</text>

  <rect x="720" y="96" width="140" height="52" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="790" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" text-anchor="middle">자식 (계속)</text>
  <text x="790" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실행 중</text>

  <line x1="680" y1="122" x2="718" y2="122" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="718,117 728,122 718,127" fill="#7ec8e3"/>

  <!-- Parent dies arrow -->
  <line x1="620" y1="148" x2="620" y2="196" stroke="#e05555" stroke-width="2"/>
  <polygon points="615,196 620,208 625,196" fill="#e05555"/>

  <rect x="540" y="208" width="160" height="52" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1.5"/>
  <text x="620" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555" text-anchor="middle">부모 사망</text>

  <!-- init adopts -->
  <line x1="790" y1="148" x2="790" y2="230" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="700" y1="234" x2="787" y2="234" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="702,229 692,234 702,239" fill="#55c555"/>
  <text x="730" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">init 입양</text>

  <rect x="540" y="280" width="300" height="100" rx="8" fill="#111" stroke="#333"/>
  <text x="560" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Orphan 특성</text>
  <text x="560" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• PPID가 1 (init/systemd)로 변경</text>
  <text x="560" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 정상 실행 계속, 리소스 누수 없음</text>
  <text x="560" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">• init이 나중에 wait() 처리</text>

  <!-- Divider -->
  <line x1="440" y1="72" x2="440" y2="420" stroke="#333" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Bottom commands -->
  <rect x="60" y="408" width="760" height="64" rx="8" fill="#0d0d0d" stroke="#333"/>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">확인 명령</text>
  <text x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ps aux | awk '$8=="Z"'</text>
  <text x="340" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # zombie</text>
  <text x="80" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ps -o pid,ppid,stat,comm ax | awk '$4=="Z"'</text>
</svg>
