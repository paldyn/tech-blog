<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrGray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888888"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">MSW 요청 가로채기 구조</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">앱 코드는 모킹 여부를 전혀 모른다 — 네트워크 레벨에서 가로챈다</text>

  <!-- App code -->
  <rect x="330" y="100" width="220" height="60" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">앱 코드</text>
  <text x="440" y="144" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">fetch('/api/user')</text>

  <line x1="440" y1="160" x2="440" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- Interceptor -->
  <rect x="290" y="200" width="300" height="88" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="440" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c800">MSW 인터셉터</text>
  <text x="440" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">브라우저: Service Worker (setupWorker)</text>
  <text x="440" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">Node 테스트: 요청 인터셉터 (setupServer)</text>
  <text x="440" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">등록된 핸들러와 요청을 대조</text>

  <!-- Branches -->
  <line x1="350" y1="288" x2="240" y2="340" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="250" y="304" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">매칭 성공</text>
  <line x1="530" y1="288" x2="640" y2="340" stroke="#888888" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arrGray)"/>
  <text x="630" y="304" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">매칭 실패</text>

  <rect x="80" y="340" width="320" height="70" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">핸들러의 목 응답 반환</text>
  <text x="240" y="380" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">HttpResponse.json({ ... })</text>
  <text x="240" y="398" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실제 네트워크 요청 없음</text>

  <rect x="480" y="340" width="320" height="70" rx="8" fill="#12121f" stroke="#7777cc" stroke-width="2"/>
  <text x="640" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">처리되지 않은 요청</text>
  <text x="640" y="380" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">onUnhandledRequest: 'error'</text>
  <text x="640" y="398" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">테스트에서는 에러로 처리 권장</text>

  <text x="440" y="442" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">fetch·axios 어느 쪽이든 동일하게 동작한다 — 요청 코드를 바꿀 필요가 없다</text>
</svg>
