<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이벤트 객체 주요 프로퍼티 활용</text>

  <rect x="60" y="64" width="760" height="312" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// target vs currentTarget</text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">outer.</tspan><tspan fill="#ffffff">addEventListener</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#ffffff">, e =&gt; {</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  e.target;        </tspan><tspan fill="#9aa4b8">// span (실제 클릭)</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  e.currentTarget; </tspan><tspan fill="#9aa4b8">// outer (리스너 있는 곳)</tspan></text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">});</tspan></text>

  <line x1="84" y1="180" x2="796" y2="180" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// relatedTarget — mouseover: 이전 요소, mouseout: 이동 대상</text>
  <text x="84" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">el.</tspan><tspan fill="#ffffff">addEventListener</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'mouseover'</tspan><tspan fill="#ffffff">, e =&gt; {</tspan></text>
  <text x="84" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (e.relatedTarget?.closest(</tspan><tspan fill="#ce9178">'#tooltip'</tspan><tspan fill="#ffffff">)) </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="84" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  showTooltip(); </tspan><tspan fill="#9aa4b8">// 툴팁 내부 이동은 무시</tspan></text>
  <text x="84" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">});</tspan></text>

  <line x1="84" y1="286" x2="796" y2="286" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// currentTarget은 비동기에서 null — 미리 저장 필요</text>
  <text x="84" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">el.</tspan><tspan fill="#ffffff">addEventListener</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3">async</tspan><tspan fill="#ffffff"> e =&gt; {</tspan></text>
  <text x="84" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  const</tspan><tspan fill="#ffffff"> ct = e.currentTarget; </tspan><tspan fill="#9aa4b8">// 미리 저장</tspan></text>
  <text x="84" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  await</tspan><tspan fill="#ffffff"> fetch(</tspan><tspan fill="#ce9178">'/api'</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  ct.classList.</tspan><tspan fill="#ffffff">remove</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'loading'</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// e.currentTarget는 이미 null</tspan></text>
</svg>
