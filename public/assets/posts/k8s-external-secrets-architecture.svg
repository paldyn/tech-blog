<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">External Secrets Operator 아키텍처</text>

  <!-- External backends (left column) -->
  <text x="110" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">외부 시크릿 저장소</text>

  <rect x="30" y="90" width="160" height="50" rx="6" fill="#1a1208" stroke="#5a3a1a" stroke-width="1"/>
  <text x="110" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178" text-anchor="middle">AWS Secrets Manager</text>

  <rect x="30" y="154" width="160" height="50" rx="6" fill="#0a1a10" stroke="#1a4a2a" stroke-width="1"/>
  <text x="110" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">HashiCorp Vault</text>

  <rect x="30" y="218" width="160" height="50" rx="6" fill="#0a0a1a" stroke="#1a2a5a" stroke-width="1"/>
  <text x="110" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">GCP Secret Manager</text>

  <rect x="30" y="282" width="160" height="50" rx="6" fill="#1a0a10" stroke="#4a1a2a" stroke-width="1"/>
  <text x="110" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">Azure Key Vault</text>

  <rect x="30" y="346" width="160" height="50" rx="6" fill="#1a1030" stroke="#4a2a6a" stroke-width="1"/>
  <text x="110" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">AWS SSM Parameter</text>

  <!-- Arrows from backends to ESO -->
  <line x1="192" y1="115" x2="298" y2="200" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="192" y1="179" x2="298" y2="215" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="192" y1="243" x2="298" y2="230" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="192" y1="307" x2="298" y2="248" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="192" y1="371" x2="298" y2="265" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ESO Operator (center) -->
  <rect x="300" y="150" width="280" height="160" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="2"/>
  <text x="440" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">External Secrets Operator</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SecretStore 연결 관리</text>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ExternalSecret 감시</text>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">주기적 갱신 (refreshInterval)</text>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">K8s Secret 생성/업데이트</text>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">kube-system 또는 전용 namespace에 설치</text>

  <!-- Arrow ESO to K8s Secret -->
  <line x1="582" y1="230" x2="648" y2="230" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="615" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">생성</text>

  <!-- K8s Secret (right) -->
  <rect x="650" y="170" width="200" height="72" rx="8" fill="#1a1235" stroke="#7777cc" stroke-width="1.5"/>
  <text x="750" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">K8s Secret</text>
  <text x="750" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자동 동기화됨</text>
  <text x="750" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">일반 Secret처럼 참조</text>

  <!-- Arrow to Pod -->
  <line x1="750" y1="242" x2="750" y2="308" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>

  <!-- Pod -->
  <rect x="650" y="310" width="200" height="60" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="750" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Pod</text>
  <text x="750" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">envFrom / volumeMount</text>

  <!-- CRD labels below ESO -->
  <rect x="300" y="340" width="280" height="90" rx="6" fill="#111"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">핵심 CRD</text>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SecretStore — 네임스페이스 범위 백엔드 연결</text>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ClusterSecretStore — 클러스터 범위 백엔드 연결</text>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ExternalSecret — 가져올 시크릿 명세</text>

  <!-- Bottom note -->
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">ESO가 외부 저장소를 폴링해 K8s Secret을 최신 상태로 유지</text>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">refreshInterval: 1h → 1시간마다 최신 값으로 자동 갱신</text>
</svg>
