<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">super() 동작 원리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">super()는 부모가 아닌 "MRO의 다음 클래스"로 위임합니다</text>

  <!-- MRO sequence -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">class D(B, C) 의 MRO:</text>

  <!-- D box -->
  <rect x="60" y="120" width="120" height="50" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="120" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#e05555">D</text>

  <!-- Arrow -->
  <line x1="180" y1="145" x2="215" y2="145" stroke="#888" stroke-width="2"/>
  <polygon points="215,138 230,145 215,152" fill="#888"/>

  <!-- B box -->
  <rect x="230" y="120" width="120" height="50" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="290" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#55c555">B</text>

  <!-- Arrow -->
  <line x1="350" y1="145" x2="385" y2="145" stroke="#888" stroke-width="2"/>
  <polygon points="385,138 400,145 385,152" fill="#888"/>

  <!-- C box -->
  <rect x="400" y="120" width="120" height="50" rx="8" fill="#0d1117" stroke="#e8c040" stroke-width="2"/>
  <text x="460" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#e8c040">C</text>

  <!-- Arrow -->
  <line x1="520" y1="145" x2="555" y2="145" stroke="#888" stroke-width="2"/>
  <polygon points="555,138 570,145 555,152" fill="#888"/>

  <!-- A box -->
  <rect x="570" y="120" width="120" height="50" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="630" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#7ec8e3">A</text>

  <!-- Arrow -->
  <line x1="690" y1="145" x2="725" y2="145" stroke="#888" stroke-width="2"/>
  <polygon points="725,138 740,145 725,152" fill="#888"/>

  <!-- object box -->
  <rect x="740" y="120" width="100" height="50" rx="8" fill="#0d1117" stroke="#444" stroke-width="1.5"/>
  <text x="790" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#666">object</text>

  <!-- Annotations below each -->
  <text x="120" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">현재 클래스</text>
  <text x="290" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">D 내부 super()</text>
  <text x="460" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c040">B 내부 super()</text>
  <text x="630" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">C 내부 super()</text>

  <!-- Divider -->
  <line x1="60" y1="210" x2="820" y2="210" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Bottom section: super() syntax -->
  <text x="60" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">super() 호출 방식</text>

  <!-- Box 1: zero-arg super -->
  <rect x="60" y="254" width="360" height="90" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">인자 없는 super()  (Python 3 권장)</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class </text>
  <text x="125" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">D(B, C):</text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">    def </text>
  <text x="117" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">method(self): super().method()</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">    # __class__ 셀 변수로 자동 결정</text>

  <!-- Box 2: explicit super -->
  <rect x="450" y="254" width="370" height="90" rx="8" fill="#0d1117" stroke="#e8c040" stroke-width="1.5"/>
  <text x="635" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c040">명시적 super(Type, obj)  (Python 2 스타일)</text>
  <text x="466" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class </text>
  <text x="515" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">D(B, C):</text>
  <text x="466" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">    def </text>
  <text x="507" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">method(self): super(D, self).method()</text>
  <text x="466" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">    # 동적으로 클래스 지정 필요 시</text>

  <!-- Tip box -->
  <rect x="60" y="364" width="760" height="76" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">super()를 올바르게 쓰는 핵심 규칙</text>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 클래스가 super().method()를 호출해야 협력적 체인이 성립합니다. 중간에 하나라도 빠지면 체인이 끊깁니다.</text>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">단일 상속에서도 super()를 쓰면 나중에 다중 상속으로 확장할 때 안전합니다.</text>
</svg>
