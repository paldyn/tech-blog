<svg xmlns="http://www.w3.org/2000/svg" width="880" height="318" viewBox="0 0 880 318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="318" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">JIT 튜닝 플래그와 진단</text>

  <!-- left: flag rows -->
  <rect x="40" y="74" width="400" height="220" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="56" y="102" font-size="14" font-weight="600" fill="#e8e8e8">자주 쓰는 플래그</text>

  <text x="56" y="134" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono',monospace">-XX:+PrintCompilation</text>
  <text x="56" y="152" font-size="13" fill="#9aa4b8">메서드별 컴파일 로그 출력</text>

  <text x="56" y="180" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono',monospace">-XX:-TieredCompilation</text>
  <text x="56" y="198" font-size="13" fill="#9aa4b8">단계형 끄고 C2만 사용</text>

  <text x="56" y="226" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono',monospace">-XX:CompileThreshold=N</text>
  <text x="56" y="244" font-size="13" fill="#9aa4b8">컴파일 시작 호출 횟수 조정</text>

  <text x="56" y="272" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono',monospace">-Xint / -Xcomp</text>
  <text x="56" y="290" font-size="13" fill="#9aa4b8">완전 인터프리트 / 즉시 컴파일</text>

  <!-- right: principles -->
  <rect x="460" y="74" width="380" height="104" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="102" font-size="14" font-weight="600" fill="#e8e8e8">웜업을 존중하라</text>
  <text x="476" y="126" font-size="13" fill="#9aa4b8">측정 전 충분히 실행해 핫코드가</text>
  <text x="476" y="144" font-size="13" fill="#9aa4b8">C2로 컴파일되게 한다. 시작 직후</text>
  <text x="476" y="162" font-size="13" fill="#9aa4b8">수치는 인터프리터 성능일 뿐.</text>

  <rect x="460" y="190" width="380" height="104" rx="8" fill="#101010" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="218" font-size="14" font-weight="600" fill="#e8e8e8">기본값을 먼저 의심하지 말라</text>
  <text x="476" y="242" font-size="13" fill="#9aa4b8">단계형 컴파일과 기본 임계값은</text>
  <text x="476" y="260" font-size="13" fill="#9aa4b8">대부분의 워크로드에 잘 맞는다.</text>
  <text x="476" y="278" font-size="13" fill="#9aa4b8">측정 없는 플래그 변경은 역효과.</text>
</svg>
