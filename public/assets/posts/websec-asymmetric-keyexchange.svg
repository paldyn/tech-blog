<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a6ea8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#b07ad0"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">비대칭 암호화의 핵심 사용 사례</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">키 교환과 디지털 서명: 공개키 인프라(PKI)의 기반</text>

  <!-- Left: Key Exchange (Encryption) -->
  <rect x="60" y="96" width="370" height="36" rx="6" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1.5"/>
  <text x="245" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">① 공개키 암호화 (키 교환)</text>

  <rect x="60" y="146" width="120" height="50" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="120" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Alice</text>
  <text x="120" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">보내는 쪽</text>

  <rect x="310" y="146" width="120" height="50" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="370" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Bob</text>
  <text x="370" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">받는 쪽</text>

  <!-- Key exchange steps -->
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">1. Bob이 공개키(KPub) 배포</text>
  <line x1="310" y1="215" x2="180" y2="215" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">2. Alice가 KPub로 메시지 암호화 후 전송</text>
  <line x1="183" y1="250" x2="308" y2="250" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <text x="80" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">3. Bob만 개인키(KPriv)로 복호화 가능</text>

  <rect x="60" y="306" width="370" height="36" rx="6" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1"/>
  <text x="245" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">TLS 핸드셰이크에서 세션 키 교환에 사용</text>

  <!-- Right: Digital Signature -->
  <rect x="470" y="96" width="350" height="36" rx="6" fill="#180d1a" stroke="#8a3aa8" stroke-width="1.5"/>
  <text x="645" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#b07ad0" text-anchor="middle">② 디지털 서명 (인증)</text>

  <rect x="470" y="146" width="120" height="50" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="530" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">서명자</text>
  <text x="530" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(개인키 보유)</text>

  <rect x="700" y="146" width="120" height="50" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="760" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">검증자</text>
  <text x="760" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(공개키 사용)</text>

  <!-- Signature steps -->
  <text x="490" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">1. 서명자가 KPriv로 메시지 해시 서명</text>
  <text x="490" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">2. 메시지 + 서명을 전달</text>
  <line x1="595" y1="243" x2="698" y2="243" stroke="#b07ad0" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="490" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">3. 검증자가 KPub으로 서명 검증</text>
  <text x="490" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   일치 = 서명자가 보낸 것 + 변조 없음</text>

  <rect x="470" y="306" width="350" height="36" rx="6" fill="#180d1a" stroke="#8a3aa8" stroke-width="1"/>
  <text x="645" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b07ad0" text-anchor="middle">SSL 인증서 · JWT · 코드 서명에 사용</text>

  <!-- Bottom: Algorithm comparison -->
  <rect x="60" y="365" width="760" height="80" rx="8" fill="#0f1820" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">비대칭 알고리즘 비교</text>

  <text x="120" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">RSA</text>
  <text x="120" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">2048~4096비트 · 느림</text>
  <text x="120" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">레거시 환경</text>

  <text x="360" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">ECDSA (P-256)</text>
  <text x="360" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">짧은 키 · 빠름 · TLS 표준</text>
  <text x="360" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">현재 권장</text>

  <text x="620" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Ed25519</text>
  <text x="620" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">최신 · 빠름 · SSH 키</text>
  <text x="620" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">신규 시스템 권장</text>
</svg>
