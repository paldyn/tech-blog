<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">관계 대수(Relational Algebra) 연산</text>

  <!-- Code block: relational algebra examples -->
  <rect x="60" y="74" width="360" height="200" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="100" font-size="11" fill="#888" font-family="'JetBrains Mono','Menlo',monospace">-- 선택(Selection): 행 필터링</text>
  <text x="80" y="120" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">SELECT * FROM emp</text>
  <text x="80" y="138" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">WHERE  dept_id = 10;</text>

  <text x="80" y="166" font-size="11" fill="#888" font-family="'JetBrains Mono','Menlo',monospace">-- 투영(Projection): 열 선택</text>
  <text x="80" y="186" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">SELECT name, email</text>
  <text x="80" y="204" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">FROM   emp;</text>

  <text x="80" y="232" font-size="11" fill="#888" font-family="'JetBrains Mono','Menlo',monospace">-- 조인(Join): 두 릴레이션 결합</text>
  <text x="80" y="252" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">SELECT e.name, d.name</text>
  <text x="80" y="270" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">FROM   emp e JOIN dept d</text>

  <!-- Right side: Operation cards -->
  <rect x="460" y="74" width="180" height="70" fill="#0f1320" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="550" y="97" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">선택 (Selection)</text>
  <text x="550" y="115" text-anchor="middle" font-size="11" fill="#888">조건을 만족하는 행만 추출</text>
  <text x="550" y="131" text-anchor="middle" font-size="11" fill="#888">&#963;(sigma) 연산자</text>

  <rect x="460" y="158" width="180" height="70" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="550" y="181" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">투영 (Projection)</text>
  <text x="550" y="199" text-anchor="middle" font-size="11" fill="#888">특정 열만 선택해 추출</text>
  <text x="550" y="215" text-anchor="middle" font-size="11" fill="#888">&#960;(pi) 연산자</text>

  <rect x="460" y="242" width="180" height="70" fill="#0f1320" stroke="#ce9178" stroke-width="1.5" rx="6"/>
  <text x="550" y="265" text-anchor="middle" font-size="14" font-weight="600" fill="#ce9178">조인 (Join)</text>
  <text x="550" y="283" text-anchor="middle" font-size="11" fill="#888">공통 속성으로 두 릴레이션 결합</text>
  <text x="550" y="299" text-anchor="middle" font-size="11" fill="#888">&#x22C8; (bowtie) 연산자</text>

  <rect x="660" y="74" width="180" height="70" fill="#0f1320" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="750" y="97" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">합집합 (Union)</text>
  <text x="750" y="115" text-anchor="middle" font-size="11" fill="#888">두 릴레이션의 모든 행</text>
  <text x="750" y="131" text-anchor="middle" font-size="11" fill="#888">&#x222A; 연산자</text>

  <rect x="660" y="158" width="180" height="70" fill="#0f1320" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="750" y="181" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">차집합 (Difference)</text>
  <text x="750" y="199" text-anchor="middle" font-size="11" fill="#888">A에는 있고 B에는 없는 행</text>
  <text x="750" y="215" text-anchor="middle" font-size="11" fill="#888">&#x2212; 연산자</text>

  <rect x="660" y="242" width="180" height="70" fill="#0f1320" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="750" y="265" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">교집합 (Intersection)</text>
  <text x="750" y="283" text-anchor="middle" font-size="11" fill="#888">두 릴레이션 모두에 있는 행</text>
  <text x="750" y="299" text-anchor="middle" font-size="11" fill="#888">&#x2229; 연산자</text>

  <!-- Bottom: SQL vs Relational Algebra mapping -->
  <rect x="60" y="344" width="760" height="88" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="8"/>
  <text x="440" y="366" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">SQL과 관계 대수의 대응</text>
  <text x="200" y="388" text-anchor="middle" font-size="12" fill="#7ec8e3">WHERE &#8594; 선택(&#963;)</text>
  <text x="380" y="388" text-anchor="middle" font-size="12" fill="#55c555">SELECT cols &#8594; 투영(&#960;)</text>
  <text x="560" y="388" text-anchor="middle" font-size="12" fill="#ce9178">JOIN &#8594; 조인(&#x22C8;)</text>
  <text x="730" y="388" text-anchor="middle" font-size="12" fill="#7777cc">UNION/EXCEPT &#8594; 집합 연산</text>
  <text x="440" y="420" text-anchor="middle" font-size="11" fill="#888">SQL은 관계 대수를 선언적(declarative)으로 표현한 언어 — 어떻게(how)가 아니라 무엇을(what) 원하는지만 기술</text>
</svg>
