<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">관계 대수(Relational Algebra) 핵심 연산</text>

  <!-- SELECT (σ) -->
  <rect x="60" y="66" width="360" height="158" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="66" width="360" height="28" rx="8" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">σ (Selection) — 행 필터</text>

  <!-- Code inside -->
  <rect x="76" y="102" width="328" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- SQL 등가 표현</text>
  <text x="92" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> 나이 </tspan><tspan fill="#7ec8e3" font-weight="600">&gt;</tspan><tspan fill="#b5cea8"> 28</tspan></text>

  <text x="240" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">조건을 만족하는 튜플(행)만 추출</text>
  <text x="240" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">결과는 같은 스키마의 부분집합</text>
  <text x="240" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ C002(이순신,30), C003(강감찬,45)</text>

  <!-- PROJECT (π) -->
  <rect x="460" y="66" width="360" height="158" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="460" y="66" width="360" height="28" rx="8" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">π (Projection) — 열 필터</text>

  <rect x="476" y="102" width="328" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- SQL 등가 표현</text>
  <text x="492" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> 이름, 도시</tspan></text>

  <text x="640" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">원하는 속성(열)만 추출</text>
  <text x="640" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">중복 제거 (집합 의미론)</text>
  <text x="640" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">→ {이름, 도시} 2열짜리 릴레이션</text>

  <!-- JOIN (⋈) -->
  <rect x="60" y="246" width="360" height="158" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="246" width="360" height="28" rx="8" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">⋈ (Natural Join) — 테이블 결합</text>

  <rect x="76" y="282" width="328" height="72" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- SQL 등가 표현</text>
  <text x="92" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">JOIN</tspan><tspan fill="#ffffff"> 주문 o</tspan></text>
  <text x="92" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">ON</tspan><tspan fill="#ffffff"> c.고객ID = o.고객ID</tspan></text>

  <text x="240" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">공통 속성 기반으로 두 릴레이션 결합</text>
  <text x="240" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">관계형 모델의 핵심 연산</text>

  <!-- SET ops -->
  <rect x="460" y="246" width="360" height="158" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="460" y="246" width="360" height="28" rx="8" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">집합 연산 (Union / Intersect / Except)</text>

  <rect x="476" y="282" width="328" height="72" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 합집합 예시</text>
  <text x="492" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> id </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> A</tspan></text>
  <text x="492" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">UNION</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> id </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> B</tspan></text>

  <text x="640" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호환 가능한 릴레이션 간 집합 연산</text>
  <text x="640" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">수학적 집합 의미론을 SQL이 직접 구현</text>
</svg>
