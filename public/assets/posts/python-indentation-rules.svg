<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">들여쓰기 관련 오류와 해결책</text>

  <!-- Rules -->
  <rect x="60" y="68" width="340" height="230" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">규칙 요약</text>
  <line x1="80" y1="102" x2="380" y2="102" stroke="#7777cc" stroke-width="0.5"/>
  <text x="80" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  스페이스 4칸 (PEP 8 권장)</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  블록 내 일관된 들여쓰기</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  탭과 스페이스 혼용 금지</text>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x26A0;  탭 ≠ 4스페이스 (Python 3)</text>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x26A0;  혼용 시 TabError 발생</text>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">  에디터에서 "탭을 스페이스로" 설정 권장</text>
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">  $ python -tt myfile.py 로 혼용 감지</text>

  <!-- Code: continuation -->
  <rect x="430" y="68" width="390" height="230" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 여러 줄 연속: 괄호 활용</text>
  <text x="446" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">result = (</tspan></text>
  <text x="446" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    first_value</tspan></text>
  <text x="446" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    + second_value</tspan></text>
  <text x="446" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    + third_value</tspan></text>
  <text x="446" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">)</tspan></text>
  <text x="446" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 역슬래시 연속 (덜 선호)</text>
  <text x="446" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">long_var = first \</tspan></text>
  <text x="446" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    + second</tspan></text>

  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">에디터 설정: Tab = 4 Spaces (VS Code: editor.insertSpaces: true)</text>
</svg>
