<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python 들여쓰기 규칙</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">공백이 곧 문법이다</text>

  <!-- Rules summary -->
  <rect x="60" y="86" width="760" height="100" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">들여쓰기 3원칙</text>
  <text x="180" y="136" text-anchor="middle" font-size="12" fill="#55c555">1. 스페이스 4칸 (PEP 8)</text>
  <text x="180" y="156" text-anchor="middle" font-size="11" fill="#666">탭 대신 스페이스 권장</text>
  <text x="440" y="136" text-anchor="middle" font-size="12" fill="#55c555">2. 같은 블록 = 같은 수준</text>
  <text x="440" y="156" text-anchor="middle" font-size="11" fill="#666">들여쓰기로 블록 구분</text>
  <text x="700" y="136" text-anchor="middle" font-size="12" fill="#55c555">3. 탭·스페이스 혼용 금지</text>
  <text x="700" y="156" text-anchor="middle" font-size="11" fill="#666">TabError 발생 원인</text>

  <!-- Code block: correct indentation -->
  <rect x="60" y="200" width="380" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 올바른 들여쓰기</text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#55c555">greet</tspan><tspan fill="#e8e8e8">(name):</tspan></text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">if</tspan><tspan fill="#e8e8e8"> name:</tspan></text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">        msg = </tspan><tspan fill="#ce9178">f"Hi, {name}"</tspan></text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">        </tspan><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(msg)</tspan></text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">else</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">        </tspan><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"누구세요?"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">greet(</tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># → Hi, Alice</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">✓ 4칸 들여쓰기 일관 적용</text>

  <!-- Indent level boxes on the right -->
  <rect x="460" y="200" width="360" height="220" rx="8" fill="#0f1418" stroke="#333"/>
  <text x="640" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">블록 단계 시각화</text>

  <!-- Level 0 -->
  <rect x="476" y="236" width="328" height="28" rx="4" fill="#0a0f18" stroke="#7ec8e3" stroke-width="1"/>
  <text x="492" y="254" font-size="11" fill="#7ec8e3">def greet(name):</text>
  <text x="790" y="254" text-anchor="end" font-size="10" fill="#666">레벨 0</text>

  <!-- Level 1 -->
  <rect x="476" y="272" width="328" height="28" rx="4" fill="#0a1218" stroke="#55c555" stroke-width="1"/>
  <text x="506" y="290" font-size="11" fill="#55c555">    if name:  /  else:</text>
  <text x="790" y="290" text-anchor="end" font-size="10" fill="#666">레벨 1 (+4)</text>

  <!-- Level 2 -->
  <rect x="476" y="308" width="328" height="28" rx="4" fill="#0a1518" stroke="#7777cc" stroke-width="1"/>
  <text x="522" y="326" font-size="11" fill="#7777cc">        msg = ...  /  print(...)</text>
  <text x="790" y="326" text-anchor="end" font-size="10" fill="#666">레벨 2 (+8)</text>

  <!-- Note -->
  <rect x="476" y="344" width="328" height="66" rx="6" fill="#0f1820" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="366" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">들여쓰기 = 블록의 시작과 끝</text>
  <text x="640" y="386" text-anchor="middle" font-size="11" fill="#aaa">{ } 중괄호가 아닌 들여쓰기로</text>
  <text x="640" y="402" text-anchor="middle" font-size="11" fill="#aaa">Python의 가장 큰 특징 중 하나</text>
</svg>
