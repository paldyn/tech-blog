<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Native 힌트 등록 방법 3가지
  </text>

  <!-- Method 1: @RegisterReflectionForBinding -->
  <rect x="60" y="68" width="240" height="50" fill="#0f2020" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">① 어노테이션 기반</text>
  <text x="180" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@RegisterReflectionForBinding</text>

  <!-- Method 2: RuntimeHints -->
  <rect x="320" y="68" width="240" height="50" fill="#1a1008" rx="6" stroke="#e8a020" stroke-width="1.5"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">② RuntimeHints API</text>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">RuntimeHintsRegistrar</text>

  <!-- Method 3: reflect-config.json -->
  <rect x="580" y="68" width="240" height="50" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">③ JSON 설정 파일</text>
  <text x="700" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">reflect-config.json</text>

  <!-- Code block: RuntimeHints example -->
  <rect x="60" y="138" width="760" height="270" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// RuntimeHintsRegistrar 구현</text>
  <text x="76" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">@ImportRuntimeHints(MyHints.<tspan fill="#7ec8e3" font-weight="600">class</tspan>)</text>
  <text x="76" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">public class</text>
  <text x="76" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    MyHints <tspan fill="#7ec8e3" font-weight="600">implements</tspan> RuntimeHintsRegistrar &#123;</text>

  <text x="76" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    @Override</text>
  <text x="76" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    public void</text>
  <text x="76" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        registerHints(RuntimeHints hints, ClassLoader cl) &#123;</text>

  <text x="76" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">        // 리플렉션 대상 클래스 등록</text>
  <text x="76" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        hints.reflection().registerType(</text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">            MyDto.<tspan fill="#7ec8e3" font-weight="600">class</tspan>,</text>
  <text x="76" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">            MemberCategory.INVOKE_PUBLIC_CONSTRUCTORS);</text>
  <text x="76" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    &#125;</text>
  <text x="76" y="376" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&#125;</text>
</svg>
