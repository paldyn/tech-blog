<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="vfArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">NP의 본질: 찾기는 어려워도 검증은 빠르다</text>

  <!-- problem box -->
  <rect x="60" y="96" width="220" height="92" rx="8" fill="#000000" stroke="#7ec8e3" stroke-width="2"/>
  <text x="76" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">문제 (SAT)</text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">(x∨¬y)∧(y∨z)</tspan></text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9aa4b8">만족하는 값이 있나?</tspan></text>

  <!-- certificate box -->
  <rect x="340" y="96" width="200" height="92" rx="8" fill="#000000" stroke="#e8a855" stroke-width="2"/>
  <text x="356" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8a855" font-weight="600">증명서(certificate)</text>
  <text x="356" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">x=T, y=T, z=T</tspan></text>
  <text x="356" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9aa4b8">제시된 답 후보</tspan></text>

  <!-- verifier box -->
  <rect x="600" y="96" width="220" height="92" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
  <text x="616" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">검증기 (다항 시간)</text>
  <text x="616" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">대입 → 절마다 참 확인</tspan></text>
  <text x="616" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#55c555">O(절·변수) 빠름 ✓</tspan></text>

  <line x1="282" y1="142" x2="338" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#vfArr)"/>
  <line x1="542" y1="142" x2="598" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#vfArr)"/>

  <!-- two sides -->
  <rect x="60" y="226" width="375" height="92" rx="6" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="76" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555" font-weight="600">찾기 (search) — 어렵다</text>
  <text x="76" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">2ⁿ 가지 대입을 다 시도?</text>
  <text x="76" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">다항 알고리즘은 아무도 모른다</text>

  <rect x="445" y="226" width="375" height="92" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="461" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">검증 (verify) — 쉽다</text>
  <text x="461" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">답을 주면 맞는지 확인은 즉시</text>
  <text x="461" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">→ 이것이 NP의 정의</text>

  <text x="60" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">NP = "예" 답에 대해 다항 크기 증명서가 존재하고, 그 증명서를 다항 시간에 검증 가능한 문제</text>
  <text x="60" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">SAT는 쿡–레빈 정리로 최초의 NP-완전 문제로 증명되었다</text>
</svg>
