<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">비교 연산자 — [ ] vs [[ ]]</text>

  <!-- [ ] vs [[ ]] header -->
  <rect x="60" y="60" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="82" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">[ ] — POSIX 호환 test</text>

  <rect x="450" y="60" width="370" height="36" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="635" y="82" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">[[ ]] — Bash 확장 조건</text>

  <!-- Numeric comparison -->
  <text x="60" y="116" font-size="13" font-weight="600" fill="#888">숫자 비교</text>
  <rect x="60" y="122" width="370" height="106" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="142" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[ $a -eq $b ]  </tspan><tspan fill="#9aa4b8">같다</tspan></text>
  <text x="76" y="160" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[ $a -ne $b ]  </tspan><tspan fill="#9aa4b8">다르다</tspan></text>
  <text x="76" y="178" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[ $a -lt $b ]  </tspan><tspan fill="#9aa4b8">미만</tspan></text>
  <text x="76" y="196" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[ $a -le $b ]  </tspan><tspan fill="#9aa4b8">이하</tspan></text>
  <text x="76" y="214" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[ $a -gt $b ]  </tspan><tspan fill="#9aa4b8">초과</tspan></text>

  <rect x="450" y="122" width="370" height="106" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="142" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[[ $a -eq $b ]] </tspan><tspan fill="#9aa4b8">숫자 같다</tspan></text>
  <text x="466" y="160" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[[ $a == $b ]] </tspan><tspan fill="#9aa4b8"> 문자열 같다</tspan></text>
  <text x="466" y="178" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[[ $a != $b ]] </tspan><tspan fill="#9aa4b8"> 문자열 다름</tspan></text>
  <text x="466" y="196" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[[ $a =~ ^[0-9]+$ ]] </tspan><tspan fill="#9aa4b8">정규식</tspan></text>
  <text x="466" y="214" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[[ $a > $b ]] </tspan><tspan fill="#9aa4b8">  사전순 비교</tspan></text>

  <!-- File tests -->
  <text x="60" y="248" font-size="13" font-weight="600" fill="#888">파일 검사</text>
  <rect x="60" y="254" width="370" height="106" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="274" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">-f</tspan><tspan fill="#ffffff"> file  </tspan><tspan fill="#9aa4b8">일반 파일이면 참</tspan></text>
  <text x="76" y="292" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">-d</tspan><tspan fill="#ffffff"> dir   </tspan><tspan fill="#9aa4b8">디렉터리이면 참</tspan></text>
  <text x="76" y="310" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">-e</tspan><tspan fill="#ffffff"> path  </tspan><tspan fill="#9aa4b8">존재하면 참</tspan></text>
  <text x="76" y="328" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">-r</tspan><tspan fill="#ffffff"> file  </tspan><tspan fill="#9aa4b8">읽기 권한 있으면 참</tspan></text>
  <text x="76" y="346" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">-s</tspan><tspan fill="#ffffff"> file  </tspan><tspan fill="#9aa4b8">크기 > 0이면 참</tspan></text>

  <!-- Logic operators -->
  <text x="450" y="248" font-size="13" font-weight="600" fill="#888">논리 연산자</text>
  <rect x="450" y="254" width="370" height="106" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="274" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[ a ] </tspan><tspan fill="#7ec8e3" font-weight="600">-a</tspan><tspan fill="#ffffff"> [ b ]  </tspan><tspan fill="#9aa4b8">AND ([ ] 내부)</tspan></text>
  <text x="466" y="292" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[ a ] </tspan><tspan fill="#7ec8e3" font-weight="600">-o</tspan><tspan fill="#ffffff"> [ b ]  </tspan><tspan fill="#9aa4b8">OR ([ ] 내부)</tspan></text>
  <text x="466" y="310" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[[ a ]] </tspan><tspan fill="#7ec8e3" font-weight="600">&amp;&amp;</tspan><tspan fill="#ffffff"> [[ b ]] </tspan><tspan fill="#9aa4b8">AND ([[ ]] 외부)</tspan></text>
  <text x="466" y="328" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[[ a ]] </tspan><tspan fill="#7ec8e3" font-weight="600">||</tspan><tspan fill="#ffffff"> [[ b ]] </tspan><tspan fill="#9aa4b8">OR ([[ ]] 외부)</tspan></text>
  <text x="466" y="346" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">!</tspan><tspan fill="#ffffff"> [[ ... ]]  </tspan><tspan fill="#9aa4b8">NOT</tspan></text>

  <!-- Recommendation -->
  <rect x="60" y="374" width="760" height="80" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="440" y="398" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">권장 패턴</text>
  <text x="440" y="420" text-anchor="middle" font-size="13" fill="#e8e8e8">Bash 스크립트에서는 [[ ]] 사용 권장 — 단어 분리·글로빙 없음, 패턴 매칭·정규식 지원</text>
  <text x="440" y="440" text-anchor="middle" font-size="13" fill="#e8e8e8">POSIX sh 호환이 필요한 경우에만 [ ] 사용 (dash, ash 환경)</text>
</svg>
