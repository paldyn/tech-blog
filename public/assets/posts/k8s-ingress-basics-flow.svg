<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">인그레스 트래픽 흐름</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단일 진입점으로 여러 서비스로 L7 라우팅</text>

  <!-- Internet -->
  <rect x="60" y="190" width="120" height="60" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="120" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">인터넷</text>
  <text x="120" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HTTPS :443</text>

  <line x1="180" y1="220" x2="238" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Ingress Controller -->
  <rect x="240" y="180" width="180" height="80" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="330" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Ingress</text>
  <text x="330" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Controller</text>
  <text x="330" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">nginx / traefik</text>

  <!-- Routing rules labels -->
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">Ingress 규칙 (host/path 기반)</text>

  <!-- Arrow to service 1: /api -->
  <line x1="420" y1="205" x2="518" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="445" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">/api/*</text>

  <!-- Arrow to service 2: / -->
  <line x1="420" y1="220" x2="518" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">/*</text>

  <!-- Arrow to service 3: /admin -->
  <line x1="420" y1="235" x2="518" y2="295" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="445" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">/admin/*</text>

  <!-- Service 1: api-service -->
  <rect x="520" y="110" width="200" height="60" rx="8" fill="#0f0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="620" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">api-service</text>
  <text x="620" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ClusterIP:8080</text>

  <!-- Service 2: frontend -->
  <rect x="520" y="190" width="200" height="60" rx="8" fill="#0f0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="620" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">frontend-service</text>
  <text x="620" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ClusterIP:3000</text>

  <!-- Service 3: admin -->
  <rect x="520" y="270" width="200" height="60" rx="8" fill="#0f0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="620" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">admin-service</text>
  <text x="620" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ClusterIP:9000</text>

  <!-- Pods at right -->
  <line x1="720" y1="140" x2="758" y2="140" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="760" y="118" width="80" height="44" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="800" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">api pods</text>
  <text x="800" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">×3</text>

  <line x1="720" y1="220" x2="758" y2="220" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="760" y="198" width="80" height="44" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="800" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">web pods</text>
  <text x="800" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">×2</text>

  <line x1="720" y1="300" x2="758" y2="300" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="760" y="278" width="80" height="44" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="800" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">admin pod</text>
  <text x="800" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">×1</text>

  <!-- TLS note -->
  <rect x="240" y="360" width="540" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="256" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># TLS 인증서 (cert-manager 연동)</text>
  <text x="256" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">tls</text>
  <text x="256" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  - hosts: [example.com]   secretName: tls-cert</text>
</svg>
