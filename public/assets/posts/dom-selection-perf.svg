<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">선택 API 성능 · 실시간 vs 정적</text>

  <!-- 성능 비교 바 -->
  <text x="80" y="90" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">상대 성능 (일반적 기준, 브라우저마다 다름)</text>

  <text x="80" y="116" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">getElementById</text>
  <rect x="260" y="102" width="540" height="22" fill="#55c555" rx="3"/>
  <text x="810" y="118" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">최고속</text>

  <text x="80" y="148" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">getElementsByTagName</text>
  <rect x="260" y="134" width="440" height="22" fill="#7ec8e3" rx="3"/>
  <text x="710" y="150" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">빠름</text>

  <text x="80" y="180" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">getElementsByClassName</text>
  <rect x="260" y="166" width="400" height="22" fill="#7ec8e3" rx="3"/>
  <text x="670" y="182" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">빠름</text>

  <text x="80" y="212" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">querySelector</text>
  <rect x="260" y="198" width="300" height="22" fill="#7777cc" rx="3"/>
  <text x="570" y="214" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">보통</text>

  <text x="80" y="244" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">querySelectorAll</text>
  <rect x="260" y="230" width="260" height="22" fill="#7777cc" rx="3"/>
  <text x="530" y="246" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">보통</text>

  <!-- 실시간 vs 정적 -->
  <rect x="60" y="278" width="760" height="112" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="304" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 실시간 컬렉션 함정</text>
  <text x="80" y="322" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="322" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> divs = document.getElementsByTagName(</text>
  <text x="424" y="322" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'div'</text>
  <text x="464" y="322" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);</text>
  <text x="80" y="340" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// ⚠ divs.length 가 DOM 변경 때마다 바뀜 — 무한루프 위험</text>
  <text x="80" y="358" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">for</text>
  <text x="104" y="358" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> (</text>
  <text x="122" y="358" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="166" y="358" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> div of [...divs]) { ... }  </text>
  <text x="430" y="358" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 먼저 배열로 복사 후 순회</text>
  <text x="80" y="376" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// qSA는 정적 — 순회 중 DOM 변경해도 안전</text>
</svg>
