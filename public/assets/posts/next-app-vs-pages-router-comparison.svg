<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">App Router vs Pages Router</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">두 라우터의 핵심 차이점</text>

  <!-- Column headers -->
  <rect x="60" y="90" width="360" height="44" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">App Router (app/)</text>

  <rect x="460" y="90" width="360" height="44" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">Pages Router (pages/)</text>

  <!-- Row labels on center -->
  <!-- Row 1: 도입 버전 -->
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">도입 버전</text>
  <rect x="60" y="164" width="360" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="240" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">Next.js 13+ (안정: 14+)</text>
  <rect x="460" y="164" width="360" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="640" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">Next.js 초기 ~ 현재</text>

  <!-- Row 2: 기본 컴포넌트 -->
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기본 컴포넌트 유형</text>
  <rect x="60" y="228" width="360" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="240" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">Server Component (기본)</text>
  <rect x="460" y="228" width="360" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="640" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">Client Component (기본)</text>

  <!-- Row 3: 데이터 패칭 -->
  <text x="440" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">데이터 패칭 방식</text>
  <rect x="60" y="292" width="360" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="240" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">async/await (컴포넌트 내)</text>
  <rect x="460" y="292" width="360" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="640" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">getServerSideProps / getStaticProps</text>

  <!-- Row 4: 레이아웃 -->
  <text x="440" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">레이아웃</text>
  <rect x="60" y="356" width="360" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="240" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">layout.tsx (중첩 레이아웃)</text>
  <rect x="460" y="356" width="360" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="640" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">_app.tsx (단일 전역 래퍼)</text>

  <!-- Row 5: 추천 -->
  <text x="440" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">추천 여부</text>
  <rect x="60" y="420" width="360" height="40" rx="4" fill="#0f2010" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="240" y="445" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">✓ 신규 프로젝트 권장</text>
  <rect x="460" y="420" width="360" height="40" rx="4" fill="#1a1010" stroke="#4a2020" stroke-width="1"/>
  <text x="640" y="445" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">레거시 지원 (유지보수 모드)</text>

  <!-- Bottom note -->
  <text x="440" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">둘은 같은 프로젝트에서 공존 가능 (pages/ + app/ 병행)</text>
  <text x="440" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단, 가능한 한 하나로 통일하는 것을 권장</text>
</svg>
