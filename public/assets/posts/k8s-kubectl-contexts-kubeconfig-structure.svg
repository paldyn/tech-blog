<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">kubeconfig 파일 구조</text>

  <!-- Left: Structure diagram -->
  <!-- Root: kubeconfig -->
  <rect x="60" y="72" width="180" height="48" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="150" y="102" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">~/.kube/config</text>

  <!-- Three branches -->
  <!-- clusters -->
  <line x1="150" y1="120" x2="110" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="60" y="160" width="100" height="44" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="110" y="186" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">clusters</text>

  <!-- users -->
  <line x1="150" y1="120" x2="150" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="105" y="160" width="90" height="44" rx="6" fill="#0d2d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="186" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">users</text>

  <!-- contexts -->
  <line x1="150" y1="120" x2="195" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="155" y="160" width="100" height="44" rx="6" fill="#1e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="205" y="186" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">contexts</text>

  <!-- clusters children -->
  <line x1="110" y1="204" x2="110" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="60" y="240" width="100" height="60" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="110" y="264" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8e8e8">name: prod</text>
  <text x="110" y="282" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">server: https://</text>

  <!-- users children -->
  <line x1="150" y1="204" x2="150" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="105" y="240" width="90" height="60" rx="6" fill="#0d2d0d" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="264" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8e8e8">name: admin</text>
  <text x="150" y="282" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">token/cert</text>

  <!-- contexts children -->
  <line x1="205" y1="204" x2="205" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="155" y="240" width="100" height="60" rx="6" fill="#1e1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="205" y="258" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e8e8e8">name: prod-ctx</text>
  <text x="205" y="272" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">cluster: prod</text>
  <text x="205" y="286" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">user: admin</text>

  <!-- current-context pointer -->
  <rect x="60" y="340" width="240" height="44" rx="6" fill="#2d1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="180" y="366" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">current-context: prod-ctx</text>
  <line x1="205" y1="300" x2="180" y2="340" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Right: code block -->
  <rect x="340" y="72" width="490" height="395" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="356" y="100" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">apiVersion</text>
  <text x="454" y="100" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: v1</text>
  <text x="356" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">kind</text>
  <text x="396" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: Config</text>
  <text x="356" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">clusters</text>
  <text x="418" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="356" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- </text>
  <text x="370" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">name</text>
  <text x="408" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: production</text>
  <text x="356" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  cluster:</text>
  <text x="356" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    server: </text>
  <text x="449" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">https://prod.example.com</text>
  <text x="356" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">users</text>
  <text x="394" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="356" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- </text>
  <text x="370" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">name</text>
  <text x="408" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: prod-admin</text>
  <text x="356" y="276" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  user:</text>
  <text x="356" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    token: </text>
  <text x="427" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">eyJhbGci...</text>
  <text x="356" y="324" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">contexts</text>
  <text x="418" y="324" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="356" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- name: prod-ctx</text>
  <text x="356" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  context:</text>
  <text x="356" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    cluster: production</text>
  <text x="356" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    user: prod-admin</text>
  <text x="356" y="432" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">current-context</text>
  <text x="488" y="432" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: prod-ctx</text>

  <!-- Label -->
  <text x="585" y="482" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">~/.kube/config (기본 위치)</text>
</svg>
