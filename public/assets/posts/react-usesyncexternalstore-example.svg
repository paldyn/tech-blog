<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useSyncExternalStore 활용 예시</text>

  <!-- Example 1: Online status -->
  <rect x="60" y="68" width="360" height="140" rx="8" fill="#0a1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">네트워크 상태 구독</text>
  <rect x="76" y="102" width="328" height="92" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> subscribe(cb) {</tspan></text>
  <text x="88" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  window.addEventListener(</tspan><tspan fill="#ce9178">'online'</tspan><tspan fill="#ffffff">, cb);</tspan></text>
  <text x="88" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  window.addEventListener(</tspan><tspan fill="#ce9178">'offline'</tspan><tspan fill="#ffffff">, cb);</tspan></text>
  <text x="88" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> () =&gt; { window.removeEventListener(</tspan><tspan fill="#ce9178">'online'</tspan><tspan fill="#ffffff">, cb); </tspan><tspan fill="#9aa4b8">...</tspan><tspan fill="#ffffff"> };</tspan></text>
  <text x="88" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">}</tspan></text>

  <!-- Example 2: Mini store -->
  <rect x="460" y="68" width="360" height="140" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">미니 전역 스토어</text>
  <rect x="476" y="102" width="328" height="92" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="488" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> createStore(init) {</tspan></text>
  <text x="488" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  let</tspan><tspan fill="#ffffff"> state = init; </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> listeners = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> Set();</tspan></text>
  <text x="488" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="488" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    subscribe: cb =&gt; { listeners.add(cb); </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> () =&gt; listeners.delete(cb); },</tspan></text>
  <text x="488" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    getSnapshot: () =&gt; state,  setState: (fn) =&gt; { state = fn(state); listeners.forEach(cb =&gt; cb()); }</tspan></text>

  <!-- Usage section -->
  <rect x="60" y="228" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 네트워크 상태 훅</text>
  <text x="76" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> useOnlineStatus() {</tspan></text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">useSyncExternalStore</tspan><tspan fill="#ffffff">(subscribe, () =&gt; navigator.onLine, () =&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="307" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">}</tspan></text>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 컴포넌트에서 사용</text>
  <text x="76" y="345" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> isOnline = </tspan><tspan fill="#7ec8e3" font-weight="600">useOnlineStatus</tspan><tspan fill="#ffffff">();  </tspan><tspan fill="#9aa4b8">// 네트워크 끊기면 자동 리렌더</tspan></text>
</svg>
