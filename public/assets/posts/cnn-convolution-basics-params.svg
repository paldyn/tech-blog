<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">스트라이드 · 패딩 · 파라미터 수</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">합성곱 핵심 하이퍼파라미터</text>

  <!-- Stride section -->
  <rect x="36" y="95" width="380" height="170" fill="#0d1117" rx="8" stroke="#1e2433"/>
  <text x="226" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">스트라이드 (Stride)</text>

  <!-- stride=1 -->
  <text x="100" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">stride=1</text>
  <g transform="translate(55,155)">
    <rect x="0"  y="0" width="28" height="28" fill="#1a3d4a" stroke="#7ec8e3" stroke-width="1.5"/>
    <rect x="28" y="0" width="28" height="28" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="56" y="0" width="28" height="28" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="84" y="0" width="28" height="28" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="28" y="0" width="28" height="28" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
  <text x="100" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">매 1칸 이동</text>

  <!-- stride=2 -->
  <text x="280" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">stride=2</text>
  <g transform="translate(220,155)">
    <rect x="0"  y="0" width="28" height="28" fill="#1a3d4a" stroke="#7ec8e3" stroke-width="1.5"/>
    <rect x="28" y="0" width="28" height="28" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="56" y="0" width="28" height="28" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="84" y="0" width="28" height="28" fill="#111827" stroke="#2a3550" stroke-width="1"/>
    <rect x="56" y="0" width="28" height="28" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
  <text x="280" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">매 2칸 이동 → 출력 ↓</text>

  <text x="226" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">스트라이드 커질수록 출력 공간 크기 감소, 연산량 감소</text>

  <!-- Padding section -->
  <rect x="36" y="275" width="380" height="130" fill="#0d1117" rx="8" stroke="#1e2433"/>
  <text x="226" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">패딩 (Padding)</text>

  <text x="100" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">padding=0 (valid)</text>
  <g transform="translate(55,335)">
    <rect x="0"  y="0" width="30" height="30" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
    <rect x="30" y="0" width="30" height="30" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
    <rect x="0"  y="30" width="30" height="30" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
    <rect x="30" y="30" width="30" height="30" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
  </g>
  <text x="100" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">3×3→1×1 축소</text>

  <text x="280" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">padding=1 (same)</text>
  <g transform="translate(228,330)">
    <!-- outer pad -->
    <rect x="0"  y="0"  width="30" height="30" fill="#101810" stroke="#2a3a20" stroke-width="1"/>
    <rect x="30" y="0"  width="30" height="30" fill="#101810" stroke="#2a3a20" stroke-width="1"/>
    <rect x="60" y="0"  width="30" height="30" fill="#101810" stroke="#2a3a20" stroke-width="1"/>
    <rect x="0"  y="30" width="30" height="30" fill="#101810" stroke="#2a3a20" stroke-width="1"/>
    <rect x="60" y="30" width="30" height="30" fill="#101810" stroke="#2a3a20" stroke-width="1"/>
    <rect x="0"  y="60" width="30" height="30" fill="#101810" stroke="#2a3a20" stroke-width="1"/>
    <rect x="30" y="60" width="30" height="30" fill="#101810" stroke="#2a3a20" stroke-width="1"/>
    <rect x="60" y="60" width="30" height="30" fill="#101810" stroke="#2a3a20" stroke-width="1"/>
    <!-- inner -->
    <rect x="30" y="30" width="30" height="30" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1.5"/>
    <text x="45" y="51" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">0</text>
  </g>
  <text x="280" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">크기 유지</text>

  <!-- Parameters section -->
  <rect x="460" y="95" width="384" height="310" fill="#070b14" rx="8" stroke="#1e2433"/>
  <text x="652" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">Conv 레이어 파라미터 수</text>

  <text x="484" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Conv2d(3, 64, kernel_size=3, padding=1)</text>

  <text x="484" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">파라미터 수 = K × K × C_in × C_out + C_out(bias)</text>
  <text x="484" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">= 3 × 3 × 3 × 64 + 64 = 1,792</text>

  <line x1="484" y1="218" x2="820" y2="218" stroke="#1e2433" stroke-width="1"/>

  <text x="484" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">기호</text>
  <text x="600" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">의미</text>
  <text x="720" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">값</text>

  <text x="484" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">K</text>
  <text x="600" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">커널 크기</text>
  <text x="720" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">3</text>

  <text x="484" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">C_in</text>
  <text x="600" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">입력 채널 수</text>
  <text x="720" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">3 (RGB)</text>

  <text x="484" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">C_out</text>
  <text x="600" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">출력 채널 수 (필터 수)</text>
  <text x="720" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">64</text>

  <text x="484" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">bias</text>
  <text x="600" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">편향 (C_out개)</text>
  <text x="720" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">64</text>

  <line x1="484" y1="344" x2="820" y2="344" stroke="#1e2433" stroke-width="1"/>
  <text x="484" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">FC(3072→64) 파라미터: 196,672개</text>
  <text x="484" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Conv 파라미터: 1,792개 → 110배 절약!</text>
  <text x="484" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가중치 공유(weight sharing)가 핵심 이점</text>

  <!-- Bottom note -->
  <rect x="36" y="420" width="380" height="52" fill="#0d1117" rx="6" stroke="#1e2433"/>
  <text x="226" y="443" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">위치 불변성 (Translation Equivariance)</text>
  <text x="226" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">같은 패턴을 이미지 어디서든 동일 필터로 탐지</text>
</svg>
