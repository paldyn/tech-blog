<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">systemd 아키텍처</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">PID 1 — 모든 프로세스의 조상</text>

  <!-- Kernel -->
  <rect x="300" y="88" width="280" height="44" fill="#1a0d0d" rx="6" stroke="#5f1e1e" stroke-width="1.5"/>
  <text x="440" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">Linux 커널</text>

  <!-- Arrow -->
  <line x1="440" y1="132" x2="440" y2="150" stroke="#555" stroke-width="2"/>
  <polygon points="435,150 440,160 445,150" fill="#555"/>

  <!-- systemd PID 1 -->
  <rect x="240" y="160" width="400" height="54" fill="#0d2b0d" rx="8" stroke="#2d4a1e" stroke-width="2"/>
  <text x="440" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">systemd (PID 1)</text>
  <text x="440" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">init 시스템 + 서비스 관리자 + 로깅 + 소켓 활성화 ...</text>

  <!-- systemd components -->
  <!-- Row 1 -->
  <rect x="60" y="240" width="148" height="60" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="134" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">systemctl</text>
  <text x="134" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">서비스 제어 CLI</text>

  <rect x="222" y="240" width="148" height="60" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="296" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">journald</text>
  <text x="296" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">구조화 로깅</text>

  <rect x="384" y="240" width="148" height="60" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="458" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">networkd</text>
  <text x="458" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">네트워크 설정</text>

  <rect x="546" y="240" width="148" height="60" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="620" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">resolved</text>
  <text x="620" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">DNS 리졸버</text>

  <rect x="708" y="240" width="112" height="60" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="764" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">logind</text>
  <text x="764" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">로그인 세션</text>

  <!-- Lines from systemd to components -->
  <line x1="440" y1="214" x2="134" y2="240" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="440" y1="214" x2="296" y2="240" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="440" y1="214" x2="458" y2="240" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="440" y1="214" x2="620" y2="240" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="440" y1="214" x2="764" y2="240" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Unit types -->
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">유닛 유형 (Unit Types)</text>

  <rect x="60" y="348" width="760" height="110" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">.service</text><text x="176" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">  데몬 프로세스 관리</text>
  <text x="440" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">.socket</text><text x="530" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">   소켓 활성화</text>

  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">.target</text><text x="176" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">   동기화 포인트 (런레벨 대체)</text>
  <text x="440" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">.timer</text><text x="530" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">    cron 대체 타이머</text>

  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">.mount</text><text x="176" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">    파일시스템 마운트</text>
  <text x="440" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">.path</text><text x="530" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">     파일 변경 감시</text>

  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">.slice</text><text x="176" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">    cgroup 자원 그룹</text>
  <text x="440" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">.scope</text><text x="530" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">    외부 프로세스 관리</text>

  <text x="440" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">병렬 시작으로 SysV init 대비 부팅 속도 대폭 향상</text>
</svg>
