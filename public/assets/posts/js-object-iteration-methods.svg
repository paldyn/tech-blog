<svg width="880" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">객체 프로퍼티 순회 메서드 비교</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">5가지 방법 — enumerable · 프로토타입 · Symbol 키 포함 여부</text>

  <!-- Table background -->
  <rect x="60" y="100" width="760" height="336" rx="8" fill="#0f0f15" stroke="#1e2030" stroke-width="1"/>

  <!-- Header row -->
  <rect x="60" y="100" width="760" height="44" rx="8" fill="#1a1a2e"/>
  <rect x="60" y="128" width="760" height="16" fill="#1a1a2e"/>

  <!-- Alternating row backgrounds -->
  <rect x="61" y="193" width="758" height="47" fill="#0c0c12"/>
  <rect x="61" y="289" width="758" height="47" fill="#0c0c12"/>
  <rect x="61" y="385" width="758" height="50" fill="#0c0c12"/>

  <!-- Column dividers -->
  <line x1="290" y1="100" x2="290" y2="436" stroke="#1e2030" stroke-width="1"/>
  <line x1="460" y1="100" x2="460" y2="436" stroke="#1e2030" stroke-width="1"/>
  <line x1="650" y1="100" x2="650" y2="436" stroke="#1e2030" stroke-width="1"/>

  <!-- Row dividers -->
  <line x1="60" y1="144" x2="820" y2="144" stroke="#1e2030" stroke-width="1"/>
  <line x1="60" y1="192" x2="820" y2="192" stroke="#1e2030" stroke-width="1"/>
  <line x1="60" y1="240" x2="820" y2="240" stroke="#1e2030" stroke-width="1"/>
  <line x1="60" y1="288" x2="820" y2="288" stroke="#1e2030" stroke-width="1"/>
  <line x1="60" y1="336" x2="820" y2="336" stroke="#1e2030" stroke-width="1"/>
  <line x1="60" y1="384" x2="820" y2="384" stroke="#1e2030" stroke-width="1"/>

  <!-- Header text -->
  <text x="88" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">메서드 / 구문</text>
  <text x="308" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">프로토타입 포함</text>
  <text x="476" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">반환값 타입</text>
  <text x="666" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Symbol 키</text>

  <!-- Row 1: for...in -->
  <text x="88" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">for...in</text>
  <text x="308" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">포함 ⚠</text>
  <text x="476" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">string (키 이름)</text>
  <text x="666" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제외</text>

  <!-- Row 2: Object.keys() -->
  <text x="88" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Object.keys()</text>
  <text x="308" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">제외 ✓</text>
  <text x="476" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">string[]</text>
  <text x="666" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제외</text>

  <!-- Row 3: Object.values() -->
  <text x="88" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Object.values()</text>
  <text x="308" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">제외 ✓</text>
  <text x="476" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">any[]</text>
  <text x="666" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제외</text>

  <!-- Row 4: Object.entries() -->
  <text x="88" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Object.entries()</text>
  <text x="308" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">제외 ✓</text>
  <text x="476" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">[key, val][]</text>
  <text x="666" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제외</text>

  <!-- Row 5: for...of + entries() -->
  <text x="88" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">for...of + entries</text>
  <text x="308" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">제외 ✓</text>
  <text x="476" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">순회 (no return)</text>
  <text x="666" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제외</text>

  <!-- Row 6: Reflect.ownKeys() -->
  <text x="88" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Reflect.ownKeys()</text>
  <text x="308" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">제외 ✓</text>
  <text x="476" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">(string|symbol)[]</text>
  <text x="666" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">포함 ✓</text>

  <!-- Footer -->
  <text x="440" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
