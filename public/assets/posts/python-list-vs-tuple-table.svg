<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">list vs tuple — 한눈에 비교</text>

  <text x="320" y="92" font-size="16" font-weight="600" fill="#e05555">list</text>
  <text x="610" y="92" font-size="16" font-weight="600" fill="#55c555">tuple</text>

  <line x1="60" y1="104" x2="820" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <text x="60" y="138" font-size="14" fill="#cccccc">변경 가능 여부</text>
  <text x="320" y="138" font-size="14" fill="#e8e8e8">mutable — 추가·삭제·교체</text>
  <text x="610" y="138" font-size="14" fill="#e8e8e8">immutable — 생성 후 고정</text>
  <line x1="60" y1="154" x2="820" y2="154" stroke="#1e2433" stroke-width="1"/>

  <text x="60" y="186" font-size="14" fill="#cccccc">dict 키 / set 원소</text>
  <text x="320" y="186" font-size="14" fill="#e8e8e8">불가 (해시 불가)</text>
  <text x="610" y="186" font-size="14" fill="#e8e8e8">가능 (원소도 불변일 때)</text>
  <line x1="60" y1="202" x2="820" y2="202" stroke="#1e2433" stroke-width="1"/>

  <text x="60" y="234" font-size="14" fill="#cccccc">메모리 / 생성 속도</text>
  <text x="320" y="234" font-size="14" fill="#e8e8e8">여유분 확보, 조금 무겁다</text>
  <text x="610" y="234" font-size="14" fill="#e8e8e8">더 작고 생성이 빠르다</text>
  <line x1="60" y1="250" x2="820" y2="250" stroke="#1e2433" stroke-width="1"/>

  <text x="60" y="282" font-size="14" fill="#cccccc">전형적 의미</text>
  <text x="320" y="282" font-size="14" fill="#e8e8e8">같은 종류의 가변 모음</text>
  <text x="610" y="282" font-size="14" fill="#e8e8e8">고정된 구조의 레코드</text>
  <line x1="60" y1="298" x2="820" y2="298" stroke="#1e2433" stroke-width="1"/>

  <text x="60" y="326" font-size="13" fill="#888">바뀌어야 하면 list, 한 번 정해지면 변하지 않아야 하면 tuple.</text>
</svg>
