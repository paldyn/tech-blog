<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">짝수의 제곱 합 — 명령형 vs 표현식 중심</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#888">Java — 단계를 나열</text>
  <rect x="60" y="106" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">int</tspan> sum = 0;</text>
  <text xml:space="preserve" x="76" y="158" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">for</tspan> (<tspan fill="#7ec8e3" font-weight="600">int</tspan> n : nums) {</text>
  <text xml:space="preserve" x="76" y="182" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">if</tspan> (n % 2 == 0)</text>
  <text xml:space="preserve" x="76" y="206" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    sum += n * n;</text>
  <text xml:space="preserve" x="76" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">}</text>
  <text xml:space="preserve" x="76" y="262" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 가변 변수 + 반복문</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#55c555">Scala — 변환을 잇는다</text>
  <rect x="460" y="106" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">val</tspan> sum = nums</text>
  <text xml:space="preserve" x="476" y="158" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  .filter(_ % 2 == 0)</text>
  <text xml:space="preserve" x="476" y="182" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  .map(n =&gt; n * n)</text>
  <text xml:space="preserve" x="476" y="206" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  .sum</text>
  <text xml:space="preserve" x="476" y="246" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 불변 val + 함수 합성</text>
  <text xml:space="preserve" x="476" y="270" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 전체가 하나의 표현식</text>

  <text x="440" y="318" font-size="13" fill="#888" text-anchor="middle">자바 스트림과 비슷하지만, Scala는 이 표현식 중심 스타일이 언어의 기본값이다</text>
</svg>
