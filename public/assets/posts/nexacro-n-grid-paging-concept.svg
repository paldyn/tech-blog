<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 페이징 처리 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">클라이언트 페이징 · 서버사이드 페이징 비교</text>

  <!-- Left panel: Client paging -->
  <rect x="50" y="90" width="370" height="300" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="235" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">클라이언트 페이징</text>
  <text x="235" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">전체 데이터 로드 후 pageRowCount 분할</text>
  <line x1="70" y1="148" x2="400" y2="148" stroke="#1e2433" stroke-width="1"/>

  <!-- Dataset full data -->
  <rect x="70" y="160" width="310" height="60" fill="#162035" rx="6"/>
  <text x="225" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Dataset (전체 500건 로드)</text>
  <text x="225" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">rowcount = 500</text>

  <!-- Arrow down -->
  <polygon points="215,228 235,228 235,222 245,238 235,254 235,248 215,248" fill="#1e2433"/>
  <polygon points="217,230 237,230 237,224 243,238 237,252 237,246 217,246" fill="#7ec8e3"/>
  <text x="268" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">pageRowCount=20</text>

  <!-- Grid page 3 of 25 -->
  <rect x="70" y="258" width="310" height="80" fill="#0e1420" rx="6"/>
  <text x="225" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Grid 표시: 3페이지 (행 41~60)</text>
  <text x="225" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Dataset에서 시작행~끝행만 렌더링</text>
  <text x="225" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">전체 25페이지</text>

  <!-- Paging buttons -->
  <rect x="90" y="350" width="28" height="22" fill="#162030" rx="4"/>
  <text x="104" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">|◀</text>
  <rect x="122" y="350" width="28" height="22" fill="#162030" rx="4"/>
  <text x="136" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">◀</text>
  <rect x="160" y="350" width="28" height="22" fill="#7ec8e3" rx="4"/>
  <text x="174" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#000" text-anchor="middle">3</text>
  <rect x="192" y="350" width="28" height="22" fill="#162030" rx="4"/>
  <text x="206" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">4</text>
  <rect x="224" y="350" width="28" height="22" fill="#162030" rx="4"/>
  <text x="238" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">5</text>
  <rect x="280" y="350" width="28" height="22" fill="#162030" rx="4"/>
  <text x="294" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">▶</text>
  <rect x="312" y="350" width="28" height="22" fill="#162030" rx="4"/>
  <text x="326" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">▶|</text>

  <!-- Right panel: Server-side paging -->
  <rect x="460" y="90" width="370" height="300" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="645" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">서버사이드 페이징</text>
  <text x="645" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">페이지 요청마다 서버 조회</text>
  <line x1="480" y1="148" x2="810" y2="148" stroke="#1e2433" stroke-width="1"/>

  <!-- Client request -->
  <rect x="480" y="160" width="310" height="50" fill="#1d3a22" rx="6"/>
  <text x="635" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">클라이언트 → 서버 요청</text>
  <text x="635" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">page=3, pageSize=20</text>

  <!-- Arrow right to server -->
  <polygon points="625,218 645,218 645,212 655,228 645,244 645,238 625,238" fill="#1e2433"/>
  <polygon points="627,220 647,220 647,214 653,228 647,242 647,236 627,236" fill="#55c555"/>

  <!-- Server response -->
  <rect x="480" y="248" width="310" height="50" fill="#162030" rx="6"/>
  <text x="635" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">서버 → 클라이언트 응답</text>
  <text x="635" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">20건 + 전체건수(500)</text>

  <!-- Grid display -->
  <rect x="480" y="308" width="310" height="50" fill="#0e1420" rx="6"/>
  <text x="635" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Dataset에 20건만 로드</text>
  <text x="635" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">페이지 이동 시 재조회</text>

  <!-- Comparison note -->
  <rect x="50" y="406" width="780" height="24" fill="#0f1520" rx="6"/>
  <text x="235" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">소~중용량: 클라이언트 페이징</text>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#333" text-anchor="middle">|</text>
  <text x="645" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">대용량: 서버사이드 페이징</text>
</svg>
