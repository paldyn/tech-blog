<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">InstanceType · ConstructorParameters</text>

  <!-- Class box -->
  <rect x="60" y="72" width="260" height="170" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="190" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">클래스 Database</text>
  <text x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">class Database {</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  constructor(</text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    url: string,</text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    pool: number</text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  ) {"{"}</text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    ...</text>
  <text x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  {"}"}</text>

  <!-- Arrow to InstanceType -->
  <line x1="322" y1="120" x2="380" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="326" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">InstanceType</text>

  <!-- Arrow to ConstructorParameters -->
  <line x1="322" y1="210" x2="380" y2="280" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="324" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">ConstructorParameters</text>

  <!-- InstanceType result -->
  <rect x="382" y="80" width="220" height="110" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="492" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">InstanceType&lt;typeof Database&gt;</text>
  <text x="398" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">= Database</text>
  <text x="398" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">new Database(...)의 타입</text>
  <text x="398" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">클래스 생성자의 인스턴스 타입</text>

  <!-- ConstructorParameters result -->
  <rect x="382" y="252" width="220" height="110" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="492" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">ConstructorParameters</text>
  <text x="398" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">[url: string, pool: number]</text>
  <text x="398" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">생성자 파라미터 튜플</text>
  <text x="398" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Parameters&lt;T&gt;의 생성자 버전</text>

  <!-- Implementation -->
  <rect x="628" y="72" width="220" height="144" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="738" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현</text>
  <text x="644" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">InstanceType&lt;T&gt; =</text>
  <text x="644" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  T extends new</text>
  <text x="644" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  (...a:any) =&gt; infer R</text>
  <text x="644" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">    ? R : any</text>
  <text x="644" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">new (...args: any) =&gt; infer R</text>
  <text x="644" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">new 키워드가 핵심</text>

  <!-- typeof note -->
  <rect x="628" y="232" width="220" height="96" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="738" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">typeof 와 함께 사용</text>
  <text x="644" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">// 클래스 자체 타입</text>
  <text x="644" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">typeof Database</text>
  <text x="644" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">InstanceType은 이것을 받음</text>

  <!-- Use cases row -->
  <rect x="60" y="370" width="760" height="52" fill="#0d1117" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 사용 사례</text>
  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">팩토리 함수 · 의존성 주입 컨테이너 · 제네릭 생성자 래퍼 · 클래스 레지스트리</text>
</svg>
