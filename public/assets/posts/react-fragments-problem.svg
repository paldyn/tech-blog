<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Fragment: 불필요한 DOM 노드 문제 해결</text>

  <!-- Problem: extra div -->
  <rect x="60" y="68" width="360" height="180" rx="12" fill="#2a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">❌ div로 감싸면 불필요한 DOM 추가</text>
  <rect x="76" y="106" width="328" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Columns() {</tspan></text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> (</tspan></text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e05555">    &lt;div&gt;</tspan><tspan fill="#9aa4b8">  {/* 불필요한 div! */}</tspan></text>
  <text x="92" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#55c555">td</tspan><tspan fill="#ffffff">&gt;이름&lt;/</tspan><tspan fill="#55c555">td</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="92" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#55c555">td</tspan><tspan fill="#ffffff">&gt;나이&lt;/</tspan><tspan fill="#55c555">td</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="92" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e05555">    &lt;/div&gt;</tspan></text>

  <!-- Arrow -->
  <line x1="420" y1="158" x2="460" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Solution: Fragment -->
  <rect x="460" y="68" width="360" height="180" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">✅ Fragment로 DOM 오염 없이 묶기</text>
  <rect x="476" y="106" width="328" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Columns() {</tspan></text>
  <text x="492" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> (</tspan></text>
  <text x="492" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#55c555">    &lt;&gt;</tspan><tspan fill="#9aa4b8">  {/* Fragment 단축 문법 */}</tspan></text>
  <text x="492" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#55c555">td</tspan><tspan fill="#ffffff">&gt;이름&lt;/</tspan><tspan fill="#55c555">td</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="492" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#55c555">td</tspan><tspan fill="#ffffff">&gt;나이&lt;/</tspan><tspan fill="#55c555">td</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="492" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#55c555">    &lt;/&gt;</tspan></text>

  <!-- Key on Fragment -->
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">key가 필요한 경우 — React.Fragment 명시</text>

  <rect x="60" y="302" width="760" height="158" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// &lt;&gt;&lt;/&gt; 단축 문법은 key 속성 불가 — React.Fragment 사용</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">{items.map(item =&gt; (</tspan></text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#55c555">React.Fragment</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">key</tspan><tspan fill="#ffffff">={item.id}&gt;</tspan></text>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#55c555">dt</tspan><tspan fill="#ffffff">&gt;{item.term}&lt;/</tspan><tspan fill="#55c555">dt</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#55c555">dd</tspan><tspan fill="#ffffff">&gt;{item.desc}&lt;/</tspan><tspan fill="#55c555">dd</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  &lt;/</tspan><tspan fill="#55c555">React.Fragment</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="76" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">))}</text>
</svg>
