<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git add -p: 파일 내 부분 스테이징</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">하나의 파일에서 원하는 변경 덩어리(hunk)만 골라서 스테이징</text>

  <!-- Left: file changes -->
  <rect x="60" y="86" width="360" height="276" rx="8" fill="#111" stroke="#2a2a2a"/>
  <text x="240" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">app.js의 변경 내용 (2가지 수정)</text>

  <rect x="78" y="122" width="324" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="98" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">@@ -10,6 +10,8 @@ function login() {</text>
  <text x="98" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">+  // 버그 수정: null 체크 추가</text>
  <text x="98" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">+  if (!user) return null;</text>
  <text x="98" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">   validateCredentials(user);</text>

  <text x="98" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">@@ -45,5 +47,7 @@ function logout() {</text>
  <text x="98" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">+  // TODO: 새 기능 (미완성)</text>
  <text x="98" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">+  experimentalFeature();</text>
  <text x="98" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">   cleanup();</text>
  <text x="98" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8c55e">Stage this hunk [y,n,q,a,d,s,?]?</text>

  <!-- Right: how to use -->
  <rect x="460" y="86" width="360" height="276" rx="8" fill="#0d1520" stroke="#3a4a6e"/>
  <text x="640" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">git add -p 사용법</text>

  <rect x="478" y="122" width="324" height="180" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="498" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 인터랙티브 패치 모드 실행</text>
  <text x="498" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git add</text><text x="558" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -p app.js</text>

  <text x="498" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 첫 번째 hunk (버그 수정) → y</text>
  <text x="498" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">y</text><text x="514" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  → 스테이징에 포함</text>

  <text x="498" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 두 번째 hunk (미완성 기능) → n</text>
  <text x="498" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">n</text><text x="514" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  → 스테이징에서 제외</text>

  <text x="498" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">git commit</text><text x="580" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> -m "null 체크 버그 수정"</text>

  <!-- options -->
  <rect x="478" y="312" width="324" height="40" rx="5" fill="#111" stroke="#2a2a2a"/>
  <text x="498" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">y=포함  n=제외  s=더 작게 분할  q=종료  ?=도움말</text>

  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">같은 파일에 버그 수정과 미완성 기능이 섞여도 — 커밋은 논리적으로 분리할 수 있다</text>
</svg>
