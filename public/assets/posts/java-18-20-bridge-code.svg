<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Record Patterns &amp; jwebserver</text>

  <!-- Record Patterns code -->
  <text x="220" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Record Patterns (Java 19 Preview)</text>

  <rect x="60" y="88" width="360" height="264" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="110"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Record 정의</text>
  <text xml:space="preserve" x="76" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">record</text>
  <text xml:space="preserve" x="76" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">       Point(</text>
  <text xml:space="preserve" x="76" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">             int</text>
  <text xml:space="preserve" x="76" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">                 x, </text>
  <text xml:space="preserve" x="76" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">                    int</text>
  <text xml:space="preserve" x="76" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">                        y) &#123;&#125;</text>
  <text xml:space="preserve" x="76" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">record</text>
  <text xml:space="preserve" x="76" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">       ColoredPoint(Point p, String color) &#123;&#125;</text>
  <text xml:space="preserve" x="76" y="172"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 이전 방식</text>
  <text xml:space="preserve" x="76" y="192"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">if</text>
  <text xml:space="preserve" x="76" y="192"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  (obj </text>
  <text xml:space="preserve" x="76" y="192"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">        instanceof</text>
  <text xml:space="preserve" x="76" y="192"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">                   ColoredPoint cp) &#123;</text>
  <text xml:space="preserve" x="76" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // cp.p().x() 수동 접근</text>
  <text xml:space="preserve" x="76" y="234"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Record Patterns — 분해 직접</text>
  <text xml:space="preserve" x="76" y="254"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">if</text>
  <text xml:space="preserve" x="76" y="254"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  (obj </text>
  <text xml:space="preserve" x="76" y="254"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">        instanceof</text>
  <text xml:space="preserve" x="76" y="274"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  ColoredPoint(Point(</text>
  <text xml:space="preserve" x="76" y="294"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    int</text>
  <text xml:space="preserve" x="76" y="294"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        x, </text>
  <text xml:space="preserve" x="76" y="294"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">           int</text>
  <text xml:space="preserve" x="76" y="294"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">               y), String color)) &#123;</text>
  <text xml:space="preserve" x="76" y="334"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // x, y, color 바로 사용!</text>

  <!-- jwebserver code -->
  <text x="660" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Simple Web Server (Java 18)</text>

  <rect x="460" y="88" width="360" height="168" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="110"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># CLI 사용법</text>
  <text xml:space="preserve" x="476" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">$ jwebserver</text>
  <text xml:space="preserve" x="476" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 포트, 디렉토리 지정</text>
  <text xml:space="preserve" x="476" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">$ jwebserver -p 8080 -d ./dist</text>
  <text xml:space="preserve" x="476" y="192"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// API 사용</text>
  <text xml:space="preserve" x="476" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">var</text>
  <text xml:space="preserve" x="476" y="212"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    server = SimpleFileServer</text>
  <text xml:space="preserve" x="476" y="232"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  .createFileServer(</text>
  <text xml:space="preserve" x="476" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    addr, path, OutputLevel.VERBOSE);</text>

  <!-- UTF-8 note -->
  <rect x="460" y="276" width="360" height="76" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">UTF-8 기본 인코딩 (Java 18)</text>
  <text x="640" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">new FileReader("f.txt") → UTF-8 (이전: OS 기본값)</text>
  <text x="640" y="334" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-Dfile.encoding=UTF-8 없이도 동작</text>
</svg>
