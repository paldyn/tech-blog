<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">rerere 설정 및 관리 명령어</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">활성화부터 캐시 관리까지</text>

  <!-- Left: enable and use -->
  <text x="220" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">활성화 및 사용</text>
  <rect x="60" y="114" width="340" height="196" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 전역 활성화 (권장)</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">git config --global rerere.enabled true</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 자동 스테이지 (재사용 시 자동 add)</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">git config rerere.autoupdate true</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 현재 기록된 충돌 목록</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">git rerere status</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 기록된 해결책 내용 보기</text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">git rerere diff</text>

  <!-- Right: cache management -->
  <text x="660" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">캐시 관리</text>
  <rect x="480" y="114" width="340" height="196" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 캐시 디렉토리 직접 확인</text>
  <text x="496" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">ls .git/rr-cache/</text>
  <text x="496" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 특정 해결책 삭제</text>
  <text x="496" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve">git rerere forget src/auth.py</text>
  <text x="496" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 전체 캐시 초기화</text>
  <text x="496" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve">rm -rf .git/rr-cache/</text>
  <text x="496" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0" xml:space="preserve"># 수동으로 현재 충돌 기록</text>
  <text x="496" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">git rerere</text>

  <!-- Bottom tip -->
  <rect x="60" y="328" width="760" height="18" rx="4" fill="#0d1117" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="341" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">rerere.autoupdate=true 이면 재사용 시 자동으로 git add까지 처리 — git commit 만 실행하면 된다</text>
</svg>
