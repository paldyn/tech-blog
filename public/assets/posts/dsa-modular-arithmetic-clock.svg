<svg width="880" height="470" viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="470" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">모듈러 연산 = 시계 산술: (10 + 5) mod 12 = 3</text>

  <!-- clock face -->
  <circle cx="250" cy="270" r="130" fill="none" stroke="#3a4a6e" stroke-width="2"/>

  <!-- highlight circles -->
  <circle cx="159" cy="218" r="17" fill="#000000" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="355" cy="270" r="17" fill="#000000" stroke="#55c555" stroke-width="2.5"/>

  <!-- numbers (mod 12 positions) -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" text-anchor="middle" fill="#ffffff">
    <text x="250" y="170">0</text>
    <text x="303" y="184">1</text>
    <text x="341" y="223">2</text>
    <text x="355" y="275" fill="#55c555" font-weight="600">3</text>
    <text x="341" y="328">4</text>
    <text x="303" y="366">5</text>
    <text x="250" y="380">6</text>
    <text x="197" y="366">7</text>
    <text x="159" y="328">8</text>
    <text x="145" y="275">9</text>
    <text x="159" y="223" fill="#7ec8e3" font-weight="600">10</text>
    <text x="197" y="184">11</text>
  </g>

  <!-- +5 arc from 10 clockwise to 3 -->
  <path d="M 113 191 A 158 158 0 0 1 408 270" fill="none"
        stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrG)"/>
  <text x="290" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">+5 (12를 지나며 0으로 순환)</text>

  <!-- annotation box -->
  <rect x="520" y="180" width="300" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="536" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#ffffff">(10 + 5) mod 12 = </tspan><tspan fill="#55c555" font-weight="600">3</tspan></text>
    <text x="536" y="246" fill="#ffffff">12에 도달하면 0으로 되돌아감</text>
    <text x="536" y="278" fill="#ffffff">합동 표기: <tspan fill="#7ec8e3" font-weight="600">15 ≡ 3 (mod 12)</tspan></text>
    <text x="536" y="310" fill="#9aa4b8">나머지가 같으면 "합동"이다</text>
  </g>

  <text x="60" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">mod m 세계에는 정수가 0 ~ m-1 의 m개뿐 — 모든 연산 결과가 이 범위로 순환한다</text>
</svg>
