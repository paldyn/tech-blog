<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrInfo" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrAux" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="560" rx="12" fill="#0a0a0a"/>

  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">REST 다중 엔드포인트 vs GraphQL 단일 엔드포인트</text>

  <!-- divider -->
  <line x1="440" y1="80" x2="440" y2="520" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ===== LEFT: REST ===== -->
  <text x="60" y="100" font-size="16" font-weight="600" fill="#e8e8e8">REST · 여러 URI</text>

  <!-- client -->
  <rect x="60" y="120" width="120" height="44" rx="6" fill="#11161f" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="147" font-size="13" fill="#e8e8e8" text-anchor="middle">클라이언트</text>

  <!-- endpoints -->
  <rect x="270" y="118" width="150" height="46" rx="6" fill="#11161f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="345" y="139" font-size="13" fill="#ffffff" text-anchor="middle">GET /users/1</text>
  <text x="345" y="156" font-size="11" fill="#888" text-anchor="middle">불필요 필드까지 over-fetch</text>

  <rect x="270" y="178" width="150" height="46" rx="6" fill="#11161f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="345" y="199" font-size="13" fill="#ffffff" text-anchor="middle">GET /users/1/posts</text>
  <text x="345" y="216" font-size="11" fill="#888" text-anchor="middle">2번째 왕복 필요</text>

  <rect x="270" y="238" width="150" height="46" rx="6" fill="#11161f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="345" y="259" font-size="13" fill="#ffffff" text-anchor="middle">GET /posts/9/comments</text>
  <text x="345" y="276" font-size="11" fill="#888" text-anchor="middle">3번째 왕복 (under-fetch)</text>

  <!-- arrows client -> endpoints -->
  <line x1="180" y1="141" x2="270" y2="141" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <line x1="180" y1="148" x2="270" y2="201" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <line x1="180" y1="155" x2="270" y2="261" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>

  <!-- summary box -->
  <rect x="60" y="330" width="360" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="358" font-size="13" fill="#9aa4b8" xml:space="preserve"># 3번의 요청·응답 왕복</text>
  <text x="76" y="380" font-size="13" fill="#ffffff" xml:space="preserve">GET /users/1</text>
  <text x="76" y="402" font-size="13" fill="#ffffff" xml:space="preserve">GET /users/1/posts</text>
  <text x="76" y="424" font-size="13" fill="#ffffff" xml:space="preserve">GET /posts/9/comments</text>

  <text x="60" y="494" font-size="13" fill="#e05555">리소스마다 URI가 늘고, 응답 모양은 서버가 고정한다.</text>

  <!-- ===== RIGHT: GraphQL ===== -->
  <text x="480" y="100" font-size="16" font-weight="600" fill="#e8e8e8">GraphQL · 단일 URI</text>

  <!-- client -->
  <rect x="480" y="120" width="120" height="44" rx="6" fill="#11161f" stroke="#7777cc" stroke-width="1"/>
  <text x="540" y="147" font-size="13" fill="#e8e8e8" text-anchor="middle">클라이언트</text>

  <!-- single endpoint -->
  <rect x="690" y="118" width="130" height="46" rx="6" fill="#11161f" stroke="#55c555" stroke-width="1"/>
  <text x="755" y="139" font-size="13" fill="#ffffff" text-anchor="middle">POST /graphql</text>
  <text x="755" y="156" font-size="11" fill="#888" text-anchor="middle">단 하나의 엔드포인트</text>

  <!-- arrow client -> endpoint -->
  <line x1="600" y1="141" x2="690" y2="141" stroke="#7777cc" stroke-width="2" marker-end="url(#arrAux)"/>

  <!-- query box -->
  <rect x="480" y="200" width="340" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="226" font-size="13" fill="#9aa4b8" xml:space="preserve"># 필요한 필드만 한 번에 지정</text>
  <text x="496" y="248" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">query</tspan> {</text>
  <text x="496" y="270" font-size="13" fill="#ffffff" xml:space="preserve">  user(id: <tspan fill="#b5cea8">1</tspan>) {</text>
  <text x="496" y="292" font-size="13" fill="#ffffff" xml:space="preserve">    name</text>
  <text x="496" y="314" font-size="13" fill="#ffffff" xml:space="preserve">    posts { title comments { body } }</text>
  <text x="496" y="336" font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="496" y="358" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <text x="480" y="408" font-size="13" fill="#55c555">한 번의 요청으로 정확히 원하는 모양을 받는다.</text>
  <text x="480" y="430" font-size="13" fill="#888">over/under-fetching이 구조적으로 사라진다.</text>
</svg>
