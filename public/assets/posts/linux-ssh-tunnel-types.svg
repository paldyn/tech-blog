<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SSH 터널 — 세 가지 포워딩 유형</text>

  <!-- === Local Forwarding === -->
  <text x="70" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">① 로컬 포워딩 (Local Port Forwarding)</text>

  <rect x="70" y="86" width="130" height="44" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="135" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">로컬 앱</text>
  <text x="135" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">localhost:8080</text>

  <rect x="250" y="86" width="130" height="44" rx="6" fill="#1a2210" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="315" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">SSH 서버</text>
  <text x="315" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">remote:22</text>

  <rect x="430" y="86" width="130" height="44" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="495" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">내부 서비스</text>
  <text x="495" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">db:5432</text>

  <line x1="200" y1="108" x2="250" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="380" y1="108" x2="430" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="600" y="86" width="240" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="616" y="105" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">ssh</text>
  <text x="640" y="105" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> -L 8080:db:5432</text>
  <text x="616" y="122" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    user@remote</text>

  <!-- === Remote Forwarding === -->
  <text x="70" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">② 리모트 포워딩 (Remote Port Forwarding)</text>

  <rect x="70" y="172" width="130" height="44" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="135" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">로컬 서비스</text>
  <text x="135" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">localhost:3000</text>

  <rect x="250" y="172" width="130" height="44" rx="6" fill="#1a2210" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="315" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">SSH 서버</text>
  <text x="315" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">remote:9000</text>

  <rect x="430" y="172" width="130" height="44" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="495" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">원격 클라이언트</text>
  <text x="495" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">remote:9000 접속</text>

  <line x1="380" y1="194" x2="250" y2="194" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="560" y1="194" x2="430" y2="194" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="600" y="172" width="240" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="616" y="191" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">ssh</text>
  <text x="640" y="191" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> -R 9000:localhost:3000</text>
  <text x="616" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    user@remote</text>

  <!-- === Dynamic Forwarding === -->
  <text x="70" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">③ 다이나믹 포워딩 (SOCKS5 프록시)</text>

  <rect x="70" y="258" width="130" height="44" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="135" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">브라우저/앱</text>
  <text x="135" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SOCKS5:1080</text>

  <rect x="250" y="258" width="130" height="44" rx="6" fill="#1a102e" stroke="#6a3a9e" stroke-width="1.5"/>
  <text x="315" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">SSH 서버</text>
  <text x="315" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SOCKS 게이트웨이</text>

  <rect x="430" y="258" width="130" height="44" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="495" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">임의 목적지</text>
  <text x="495" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">any:any</text>

  <line x1="200" y1="280" x2="250" y2="280" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-p)"/>
  <line x1="380" y1="280" x2="430" y2="280" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-p)"/>

  <rect x="600" y="258" width="240" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="616" y="277" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">ssh</text>
  <text x="640" y="277" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> -D 1080 user@remote</text>
  <text x="616" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 브라우저 SOCKS5:127.0.0.1:1080</text>

  <!-- Divider -->
  <line x1="60" y1="322" x2="820" y2="322" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Combined code example -->
  <text x="70" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">백그라운드 터널 + 자동 재연결</text>

  <rect x="70" y="354" width="740" height="164" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># -f: 백그라운드, -N: 명령 실행 안 함, -T: 터미널 할당 안 함</text>
  <text x="90" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">ssh</text>
  <text x="120" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -fNT -L 5432:db.internal:5432 user@bastion</text>
  <text x="90" y="410" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이제 로컬에서 localhost:5432 → 원격 DB 접속 가능</text>
  <text x="90" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">psql</text>
  <text x="124" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -h localhost -p 5432 -U admin mydb</text>
  <text x="90" y="446" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># ~/.ssh/config 에 영구 설정</text>
  <text x="90" y="464" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">LocalForward</text>
  <text x="186" y="464" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> 5432 db.internal:5432</text>
  <text x="90" y="482" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">ExitOnForwardFailure</text>
  <text x="234" y="482" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> yes</text>
  <text x="90" y="500" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">ServerAliveInterval</text>
  <text x="234" y="500" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8"> 60</text>
</svg>
