<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">WebSocket 실전 패턴</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">연결 관리 · 재연결 · 바이너리</text>

  <!-- Left code block: Basic usage -->
  <text x="60" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">기본 사용</text>
  <rect x="60" y="110" width="358" height="200" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">const</tspan> ws = <tspan fill="#7ec8e3">new</tspan> WebSocket(<tspan fill="#ce9178">'wss://…'</tspan>);</text>
  <text x="76" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">ws.binaryType = <tspan fill="#ce9178">'arraybuffer'</tspan>;</text>
  <text x="76" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8"></text>
  <text x="76" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">ws.onopen = () => ws.send(</text>
  <text x="76" y="210" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  JSON.stringify({type: <tspan fill="#ce9178">'join'</tspan>})</text>
  <text x="76" y="228" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">);</text>
  <text x="76" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">ws.onmessage = ({data}) => {</text>
  <text x="76" y="264" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  handle(JSON.parse(data));</text>
  <text x="76" y="282" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">};</text>
  <text x="76" y="300" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">ws.onclose = (e) => reconnect(e);</text>

  <!-- Right code block: Reconnect pattern -->
  <text x="462" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e05555">지수 백오프 재연결</text>
  <rect x="462" y="110" width="358" height="200" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="478" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">let</tspan> delay = <tspan fill="#b5cea8">1000</tspan>;</text>
  <text x="478" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">function</tspan> connect() {</text>
  <text x="478" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">const</tspan> ws = <tspan fill="#7ec8e3">new</tspan> WebSocket(url);</text>
  <text x="478" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  ws.onopen = () => delay = <tspan fill="#b5cea8">1000</tspan>;</text>
  <text x="478" y="210" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  ws.onclose = ({code}) => {</text>
  <text x="478" y="228" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">if</tspan> (code === <tspan fill="#b5cea8">1000</tspan>) <tspan fill="#7ec8e3">return</tspan>;</text>
  <text x="478" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    setTimeout(connect, delay);</text>
  <text x="478" y="264" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    delay = Math.min(delay*<tspan fill="#b5cea8">2</tspan>,<tspan fill="#b5cea8">30000</tspan>);</text>
  <text x="478" y="282" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  };</text>
  <text x="478" y="300" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">}</text>

  <!-- Bottom: bufferedAmount + close codes -->
  <rect x="60" y="326" width="358" height="108" rx="6" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="239" y="348" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#888">bufferedAmount 흐름 제어</text>
  <text x="76" y="368"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">ws.bufferedAmount — 미전송 큐 바이트 수</text>
  <text x="76" y="388"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">0이 될 때까지 send() 호출 자제</text>
  <text x="76" y="408"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">→ setInterval로 주기적 체크 후 전송</text>
  <text x="76" y="426"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">close(1000, 'done') — 정상 닫기</text>

  <!-- Bottom right: Close codes -->
  <rect x="462" y="326" width="358" height="108" rx="6" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="641" y="348" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#888">주요 CloseEvent 코드</text>
  <text x="478" y="368"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">1000  정상 종료</text>
  <text x="478" y="388"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">1001  서버 종료 / 탐색 이탈</text>
  <text x="478" y="408"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">1006  비정상 종료 (네트워크)</text>
  <text x="478" y="426"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">4000~ 앱 정의 커스텀 코드</text>
</svg>
