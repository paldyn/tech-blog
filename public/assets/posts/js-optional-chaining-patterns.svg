<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">?. 실전 패턴 &amp; 주의사항</text>

  <!-- Combined with ?? -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">?. 와 ?? 결합 — 기본값 제공</text>
  <rect x="60" y="98" width="760" height="120" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> city = user?.address?.city ?? </tspan><tspan fill="#ce9178">'알 수 없음'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="80" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> len = arr?.length ?? </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="80" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// API 응답 중첩 구조 안전 접근</text>
  <text x="80" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> avatar = response?.data?.user?.profile?.avatarUrl ?? </tspan><tspan fill="#ce9178">'/default.png'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="80" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 콜백 옵셔널 호출</text>
  <text x="80" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text><text x="138" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> run(callback) { callback?.(); }</text>

  <!-- Delete caution -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">주의사항 &amp; 한계</text>
  <rect x="60" y="264" width="760" height="118" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ 좌측에는 사용 불가 — 할당 대상이 될 수 없음</text>
  <text x="80" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">user?.name = </text><text x="180" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'Bob'</text><text x="216" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlon','Consolas',monospace" font-size="13" fill="#e05555">; // SyntaxError</text>

  <text x="80" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ delete와 함께 — 조건부 삭제</text>
  <text x="80" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">delete</tspan><tspan fill="#ffffff"> user?.address; </tspan><tspan fill="#9aa4b8">// user가 null이면 false, 있으면 삭제</tspan></text>
  <text x="80" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✓ 생성자 호출</text>
  <text x="80" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> obj = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> Foo?.(); </tspan><tspan fill="#9aa4b8">// Foo가 null이면 undefined</tspan></text>

  <!-- Footer -->
</svg>
