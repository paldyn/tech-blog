<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Context + Reducer 코드 구조</text>

  <!-- Left: Provider code -->
  <text x="220" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">Provider 파일</text>
  <rect x="60" y="94" width="320" height="340" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text x="120" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> StateCtx = createContext(</text>
  <text x="78" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">  null</text>
  <text x="78" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">);</text>
  <text x="78" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text x="120" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> DispCtx = createContext(</text>
  <text x="78" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">  null</text>
  <text x="78" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">);</text>
  <text x="78" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">export function</text>
  <text x="199" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> Provider({ children }) {</text>
  <text x="78" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  const</text>
  <text x="120" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> [state, dispatch] =</text>
  <text x="78" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    useReducer(reducer, init);</text>
  <text x="78" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="78" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    &lt;StateCtx.Provider value={state}&gt;</text>
  <text x="78" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">      &lt;DispCtx.Provider value={dispatch}&gt;</text>
  <text x="78" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">        {children}</text>
  <text x="78" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">      &lt;/DispCtx.Provider&gt;</text>
  <text x="78" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">    &lt;/StateCtx.Provider&gt;;</text>
  <text x="78" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">}</text>

  <!-- Right: Custom hooks -->
  <text x="670" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">커스텀 훅</text>
  <rect x="500" y="94" width="320" height="170" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="518" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">export function</text>
  <text x="639" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> useAppState() {</text>
  <text x="518" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  const</text>
  <text x="560" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> ctx = useContext(StateCtx);</text>
  <text x="518" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  if</text>
  <text x="540" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> (!ctx) throw new Error(...);</text>
  <text x="518" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text x="570" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> ctx;</text>
  <text x="518" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">}</text>
  <text x="518" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">export function</text>
  <text x="639" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> useAppDispatch() {</text>
  <text x="518" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">  // DispCtx 동일하게...</text>
  <text x="518" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">}</text>

  <!-- Right bottom: Usage -->
  <text x="670" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">소비 컴포넌트</text>
  <rect x="500" y="314" width="320" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="518" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text x="568" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> AddItemButton() {</text>
  <text x="518" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">  // dispatch만 구독</text>
  <text x="518" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">  const</text>
  <text x="560" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> dispatch = useAppDispatch();</text>
  <text x="518" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">  // state 변경 시 리렌더 안함</text>
  <text x="518" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">}</text>
</svg>
