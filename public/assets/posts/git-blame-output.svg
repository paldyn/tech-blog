<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git blame 출력 구조</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">각 줄에 누가 언제 작성했는지 커밋 단위로 표시</text>

  <!-- Output columns label -->
  <text x="60" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">출력 칼럼 구성</text>

  <!-- Column header boxes -->
  <!-- Hash -->
  <rect x="60" y="128" width="100" height="32" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="110" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">커밋 해시</text>

  <!-- Author -->
  <rect x="172" y="128" width="100" height="32" rx="6" fill="#1a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="222" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">저자</text>

  <!-- Date -->
  <rect x="284" y="128" width="160" height="32" rx="6" fill="#1a1a2e" stroke="#e8a838" stroke-width="1.5"/>
  <text x="364" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a838" text-anchor="middle">날짜 &amp; 시각</text>

  <!-- Line num -->
  <rect x="456" y="128" width="60" height="32" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="486" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">줄</text>

  <!-- Content -->
  <rect x="528" y="128" width="292" height="32" rx="6" fill="#1a1a2e" stroke="#888" stroke-width="1.5"/>
  <text x="674" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">실제 코드 내용</text>

  <!-- Code block showing blame output -->
  <rect x="60" y="178" width="760" height="174" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#7ec8e3">a1b2c3d</tspan> (<tspan fill="#55c555">John  </tspan> <tspan fill="#e8a838">2024-01-15 09:30</tspan> <tspan fill="#7777cc"> 1)</tspan> import React from 'react'</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">e4f5a6b</tspan> (<tspan fill="#55c555">Jane  </tspan> <tspan fill="#e8a838">2024-01-20 14:22</tspan> <tspan fill="#7777cc"> 2)</tspan> </tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">a1b2c3d</tspan> (<tspan fill="#55c555">John  </tspan> <tspan fill="#e8a838">2024-01-15 09:30</tspan> <tspan fill="#7777cc"> 3)</tspan> const App = () =&gt; {</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">c7d8e9f</tspan> (<tspan fill="#55c555">Bob   </tspan> <tspan fill="#e8a838">2024-02-01 11:45</tspan> <tspan fill="#7777cc"> 4)</tspan>   return &lt;div&gt;Hello&lt;/div&gt;</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">a1b2c3d</tspan> (<tspan fill="#55c555">John  </tspan> <tspan fill="#e8a838">2024-01-15 09:30</tspan> <tspan fill="#7777cc"> 5)</tspan> }</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">e4f5a6b</tspan> (<tspan fill="#55c555">Jane  </tspan> <tspan fill="#e8a838">2024-01-20 14:22</tspan> <tspan fill="#7777cc"> 6)</tspan> export default App</tspan>
  </text>

  <!-- Annotation arrows -->
  <!-- Hash annotation -->
  <line x1="110" y1="160" x2="110" y2="178" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Author annotation -->
  <line x1="222" y1="160" x2="222" y2="178" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Date annotation -->
  <line x1="364" y1="160" x2="364" y2="178" stroke="#e8a838" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Summary section -->
  <rect x="60" y="372" width="760" height="80" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="80" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">주요 활용 시나리오</text>
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 버그 발생 시: 해당 줄 담당자를 즉시 파악</text>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 코드 리뷰 시: 변경 맥락(어느 커밋에서 도입됐는지) 확인</text>
</svg>
