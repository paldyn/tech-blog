<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="atree" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TreeSet 내부 — Red-Black Tree 기반 정렬</text>

  <!-- TreeSet info -->
  <text x="440" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">add(5), add(3), add(8), add(1), add(4) — 자동 정렬 유지</text>

  <!-- Tree nodes -->
  <!-- Root: 5 -->
  <circle cx="440" cy="130" r="28" fill="#1a0a0a" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="137" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#ce9178">5</text>
  <text x="440" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">root (BLACK)</text>

  <!-- Level 2: 3, 8 -->
  <circle cx="260" cy="220" r="28" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="260" y="227" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7777cc">3</text>
  <text x="220" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">RED</text>

  <circle cx="620" cy="220" r="28" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="620" y="227" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7777cc">8</text>
  <text x="660" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">RED</text>

  <!-- Level 3: 1, 4 -->
  <circle cx="160" cy="310" r="24" fill="#1a0a0a" stroke="#ce9178" stroke-width="2"/>
  <text x="160" y="317" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#ce9178">1</text>
  <text x="118" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">BLACK</text>

  <circle cx="360" cy="310" r="24" fill="#1a0a0a" stroke="#ce9178" stroke-width="2"/>
  <text x="360" y="317" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#ce9178">4</text>
  <text x="400" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">BLACK</text>

  <!-- Lines: root to children -->
  <line x1="416" y1="152" x2="284" y2="196" stroke="#888" stroke-width="1.5"/>
  <line x1="464" y1="152" x2="596" y2="196" stroke="#888" stroke-width="1.5"/>

  <!-- Lines: 3 to children -->
  <line x1="238" y1="242" x2="180" y2="290" stroke="#888" stroke-width="1.5"/>
  <line x1="282" y1="242" x2="338" y2="290" stroke="#888" stroke-width="1.5"/>

  <!-- left/right labels -->
  <text x="340" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">left (&lt; 5)</text>
  <text x="540" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">right (&gt; 5)</text>

  <!-- in-order traversal result -->
  <rect x="60" y="358" width="760" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">중위 순회 (in-order) = 정렬 순서</text>
  <text x="440" y="400" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">1 → 3 → 4 → 5 → 8</text>

  <!-- TreeSet properties -->
  <rect x="60" y="340" width="340" height="0" rx="0" fill="none"/>

  <!-- Property boxes -->
  <rect x="60" y="270" width="200" height="68" rx="6" fill="#0d1b2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">RB-Tree 속성</text>
  <text x="160" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">BLACK 노드는 모든 경로</text>
  <text x="160" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">에서 동일 수 보장</text>
  <text x="160" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 균형 O(log n) 보장</text>

  <rect x="620" y="270" width="200" height="68" rx="6" fill="#0d1b2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">TreeSet = TreeMap</text>
  <text x="720" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">내부에서 TreeMap 사용</text>
  <text x="720" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">키만 사용, 값은 PRESENT</text>
  <text x="720" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Comparable 또는 Comparator</text>
</svg>
