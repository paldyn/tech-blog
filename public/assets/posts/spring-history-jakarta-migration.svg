<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="580" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Spring 5 → 6: javax → jakarta 패키지 전환</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">Oracle → Eclipse Foundation · Jakarta EE 9+ 호환</text>

  <defs>
    <marker id="mig" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- ===== Left: Boot 2 / Spring 5 ===== -->
  <rect x="60" y="92" width="370" height="378" fill="#10130a" stroke="#3a4a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="92" width="370" height="44" fill="#1a2a0a" rx="10"/>
  <rect x="60" y="124" width="370" height="12" fill="#1a2a0a"/>
  <text x="84" y="120" font-size="15" font-weight="600" fill="#aadd66">Spring Boot 2.x · Spring 5</text>
  <text x="406" y="120" text-anchor="end" font-size="11" fill="#666">javax.*</text>

  <!-- code rect: padding 16/14, h calculated for 12 lines, h = 14*2 + 12*18 = 244 -->
  <rect x="84" y="156" width="322" height="244" fill="#070b14" stroke="#1e2433" rx="6"/>
  <!-- base x=100, first y=156+14+12=182 -->
  <text x="100" y="182" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 서블릿</text>
  <text x="100" y="200" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.servlet.http</text>
  <text x="114" y="218" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">.HttpServlet;</text>
  <text x="100" y="236" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.servlet.http</text>
  <text x="114" y="254" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">.HttpServletRequest;</text>
  <text x="100" y="272" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// JPA</text>
  <text x="100" y="290" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.persistence</text>
  <text x="114" y="308" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">.Entity;</text>
  <text x="100" y="326" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.persistence.Id;</text>
  <text x="100" y="344" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Validation</text>
  <text x="100" y="362" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.validation</text>
  <text x="114" y="380" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">.Valid;</text>

  <text x="84" y="430" font-size="12" fill="#888">JDK 8 ~ 17 · Servlet 4 · Tomcat 9</text>
  <text x="84" y="452" font-size="11" fill="#666">javax 패키지에 의존하는 모든 라이브러리</text>

  <!-- center arrow -->
  <line x1="430" y1="280" x2="450" y2="280" stroke="#7777cc" stroke-width="3" marker-end="url(#mig)"/>
  <text x="440" y="266" text-anchor="middle" font-size="11" fill="#7777cc">migration</text>
  <text x="440" y="304" text-anchor="middle" font-size="11" fill="#888">2022.11</text>

  <!-- ===== Right: Boot 3 / Spring 6 ===== -->
  <rect x="450" y="92" width="370" height="378" fill="#0a1320" stroke="#1e3a5a" stroke-width="1.5" rx="10"/>
  <rect x="450" y="92" width="370" height="44" fill="#0a1a2a" rx="10"/>
  <rect x="450" y="124" width="370" height="12" fill="#0a1a2a"/>
  <text x="474" y="120" font-size="15" font-weight="600" fill="#7ec8e3">Spring Boot 3.x · Spring 6</text>
  <text x="796" y="120" text-anchor="end" font-size="11" fill="#666">jakarta.*</text>

  <rect x="474" y="156" width="322" height="244" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="490" y="182" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 서블릿</text>
  <text x="490" y="200" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.servlet.http</text>
  <text x="504" y="218" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">.HttpServlet;</text>
  <text x="490" y="236" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.servlet.http</text>
  <text x="504" y="254" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">.HttpServletRequest;</text>
  <text x="490" y="272" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// JPA</text>
  <text x="490" y="290" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.persistence</text>
  <text x="504" y="308" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">.Entity;</text>
  <text x="490" y="326" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.persistence.Id;</text>
  <text x="490" y="344" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Validation</text>
  <text x="490" y="362" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.validation</text>
  <text x="504" y="380" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">.Valid;</text>

  <text x="474" y="430" font-size="12" fill="#888">JDK 17 최소 · Servlet 6 · Tomcat 10+</text>
  <text x="474" y="452" font-size="11" fill="#666">Jakarta EE 9+ 라이브러리 필요</text>

  <!-- bottom note -->
  <rect x="60" y="492" width="760" height="60" fill="#0f0f0f" stroke="#222" stroke-width="1" rx="8"/>
  <text x="440" y="514" text-anchor="middle" font-size="13" font-weight="600" fill="#bbbbbb">왜 바뀌었나</text>
  <text x="440" y="534" text-anchor="middle" font-size="12" fill="#888">Oracle이 Java EE 상표를 Eclipse Foundation에 이전 — 패키지명도 jakarta로 변경</text>
</svg>
