<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Spring 5 → 6: javax → jakarta 패키지 전환</text>

  <defs>
    <marker id="mig" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- ===== Left: Spring Boot 2.x / Spring 5 ===== -->
  <rect x="60" y="80" width="370" height="380" fill="#0f0f0f" stroke="#2a3a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="80" width="370" height="44" fill="#1a2a0a" rx="10"/>
  <rect x="60" y="112" width="370" height="12" fill="#1a2a0a"/>
  <text x="245" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#88cc55">Spring Boot 2.x / Spring 5</text>

  <!-- Code block left: padding 16/14, line-height 18 -->
  <rect x="84" y="144" width="322" height="296" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="100" y="170" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 서블릿 — javax</text>
  <text x="100" y="188" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.servlet.http</text>
  <text x="100" y="206" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       .HttpServlet;</text>
  <text x="100" y="224" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.servlet.http</text>
  <text x="100" y="242" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       .HttpServletRequest;</text>
  <text x="100" y="260" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// JPA — javax</text>
  <text x="100" y="278" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.persistence</text>
  <text x="100" y="296" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       .Entity;</text>
  <text x="100" y="314" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.persistence.Id;</text>
  <text x="100" y="332" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Validation — javax</text>
  <text x="100" y="350" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.validation</text>
  <text x="100" y="368" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       .Valid;</text>
  <text x="100" y="386" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 트랜잭션 — javax</text>
  <text x="100" y="404" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.transaction</text>
  <text x="100" y="422" xml:space="preserve" font-size="13" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       .Transactional;</text>

  <!-- Center arrow -->
  <line x1="430" y1="280" x2="450" y2="280" stroke="#666" stroke-width="2.5" marker-end="url(#mig)"/>
  <text x="440" y="266" text-anchor="middle" font-size="11" fill="#999">마이그레이션</text>
  <text x="440" y="304" text-anchor="middle" font-size="11" fill="#999">2022 Nov</text>

  <!-- ===== Right: Spring Boot 3.x / Spring 6 ===== -->
  <rect x="450" y="80" width="370" height="380" fill="#0f0f0f" stroke="#1a2a3a" stroke-width="1.5" rx="10"/>
  <rect x="450" y="80" width="370" height="44" fill="#0a1a2a" rx="10"/>
  <rect x="450" y="112" width="370" height="12" fill="#0a1a2a"/>
  <text x="635" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#55aaee">Spring Boot 3.x / Spring 6</text>

  <!-- Code block right -->
  <rect x="474" y="144" width="322" height="296" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="490" y="170" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 서블릿 — jakarta</text>
  <text x="490" y="188" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.servlet.http</text>
  <text x="490" y="206" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       .HttpServlet;</text>
  <text x="490" y="224" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.servlet.http</text>
  <text x="490" y="242" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       .HttpServletRequest;</text>
  <text x="490" y="260" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// JPA — jakarta</text>
  <text x="490" y="278" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.persistence</text>
  <text x="490" y="296" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       .Entity;</text>
  <text x="490" y="314" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.persistence.Id;</text>
  <text x="490" y="332" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Validation — jakarta</text>
  <text x="490" y="350" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.validation</text>
  <text x="490" y="368" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       .Valid;</text>
  <text x="490" y="386" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 트랜잭션 — spring</text>
  <text x="490" y="404" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import org.springframework</text>
  <text x="490" y="422" xml:space="preserve" font-size="13" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       .transaction.annotation</text>

  <!-- Bottom note -->
  <rect x="60" y="480" width="760" height="50" fill="#0f0f0f" stroke="#222" stroke-width="1" rx="6"/>
  <text x="440" y="500" text-anchor="middle" font-size="12" fill="#bbbbbb">Oracle이 Java EE 상표를 Eclipse Foundation에 이전하며 패키지명도 변경: javax.* → jakarta.*</text>
  <text x="440" y="520" text-anchor="middle" font-size="11" fill="#666">모든 라이브러리·WAS가 Jakarta EE 9+ 지원해야 Spring Boot 3.x와 호환됨</text>
</svg>
