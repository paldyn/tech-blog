<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">Spring 5 → 6: 가장 큰 변화 — javax → jakarta</text>

  <!-- Left: Spring Boot 2.x / Spring 5 -->
  <rect x="60" y="68" width="340" height="320" fill="#0f0f0f" stroke="#2a3a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="68" width="340" height="40" fill="#1a2a0a" rx="10"/>
  <rect x="60" y="96" width="340" height="12" fill="#1a2a0a"/>
  <text x="230" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#88cc55">Spring Boot 2.x / Spring 5</text>

  <!-- Code block left -->
  <rect x="80" y="122" width="300" height="242" fill="#070b14" stroke="#1e2433" stroke-width="1" rx="6"/>
  <text x="96" y="142" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 서블릿 — javax 패키지</text>
  <text x="96" y="158" font-size="10" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.servlet.http.HttpServlet;</text>
  <text x="96" y="174" font-size="10" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.servlet.http.HttpServletRequest;</text>
  <text x="96" y="190" font-size="10" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.servlet.http.HttpServletResponse;</text>

  <text x="96" y="214" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// JPA — javax 패키지</text>
  <text x="96" y="230" font-size="10" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.persistence.Entity;</text>
  <text x="96" y="246" font-size="10" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.persistence.Id;</text>
  <text x="96" y="262" font-size="10" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.persistence.GeneratedValue;</text>

  <text x="96" y="286" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Validation — javax 패키지</text>
  <text x="96" y="302" font-size="10" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.validation.Valid;</text>
  <text x="96" y="318" font-size="10" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.validation.constraints.NotNull;</text>

  <text x="96" y="342" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 트랜잭션 — javax 패키지</text>
  <text x="96" y="358" font-size="10" fill="#dd8888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import javax.transaction.Transactional;</text>

  <!-- Arrow center -->
  <line x1="420" y1="228" x2="460" y2="228" stroke="#555" stroke-width="2.5" marker-end="url(#mig)"/>
  <defs>
    <marker id="mig" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
  <text x="440" y="218" text-anchor="middle" font-size="10" fill="#888">마이그레이션</text>
  <text x="440" y="244" text-anchor="middle" font-size="10" fill="#888">2022 Nov</text>

  <!-- Right: Spring Boot 3.x / Spring 6 -->
  <rect x="480" y="68" width="340" height="320" fill="#0f0f0f" stroke="#1a2a3a" stroke-width="1.5" rx="10"/>
  <rect x="480" y="68" width="340" height="40" fill="#0a1a2a" rx="10"/>
  <rect x="480" y="96" width="340" height="12" fill="#0a1a2a"/>
  <text x="650" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#55aaee">Spring Boot 3.x / Spring 6</text>

  <!-- Code block right -->
  <rect x="500" y="122" width="300" height="242" fill="#070b14" stroke="#1e2433" stroke-width="1" rx="6"/>
  <text x="516" y="142" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 서블릿 — jakarta 패키지</text>
  <text x="516" y="158" font-size="10" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.servlet.http.HttpServlet;</text>
  <text x="516" y="174" font-size="10" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.servlet.http.HttpServletRequest;</text>
  <text x="516" y="190" font-size="10" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.servlet.http.HttpServletResponse;</text>

  <text x="516" y="214" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// JPA — jakarta 패키지</text>
  <text x="516" y="230" font-size="10" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.persistence.Entity;</text>
  <text x="516" y="246" font-size="10" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.persistence.Id;</text>
  <text x="516" y="262" font-size="10" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.persistence.GeneratedValue;</text>

  <text x="516" y="286" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Validation — jakarta 패키지</text>
  <text x="516" y="302" font-size="10" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.validation.Valid;</text>
  <text x="516" y="318" font-size="10" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import jakarta.validation.constraints.NotNull;</text>

  <text x="516" y="342" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 트랜잭션 — org.springframework</text>
  <text x="516" y="358" font-size="10" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">import org.springframework.transaction.annotation</text>
  <text x="516" y="372" font-size="10" fill="#88ccff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">        .Transactional;</text>

  <!-- Bottom note -->
  <rect x="60" y="406" width="760" height="34" fill="#0f0f0f" stroke="#222" stroke-width="1" rx="6"/>
  <text x="440" y="421" text-anchor="middle" font-size="11" fill="#888">Oracle이 Java EE 상표를 Eclipse Foundation에 이전하면서 패키지명도 변경: javax.* → jakarta.*</text>
  <text x="440" y="436" text-anchor="middle" font-size="11" fill="#555">모든 라이브러리·WAS가 Jakarta EE 9+를 지원해야 Spring Boot 3.x와 호환됨</text>
</svg>
