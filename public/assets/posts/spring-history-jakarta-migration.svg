<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring 6 / Boot 3 핵심 변화 — javax → jakarta</text>

  <!-- Left: Spring Boot 2.x (javax) -->
  <rect x="60" y="68" width="360" height="300" fill="#120a0a" rx="10" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="240" y="96" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">Spring Boot 2.x (구버전)</text>
  <text x="240" y="116" font-size="12" fill="#888" text-anchor="middle">javax.* 네임스페이스</text>

  <rect x="76" y="128" width="328" height="200" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 구버전 import</text>
  <text x="92" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="134" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> javax.persistence.Entity;</text>
  <text x="92" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="134" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> javax.servlet.Filter;</text>
  <text x="92" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="134" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> javax.validation.Valid;</text>
  <text x="92" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="134" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> javax.annotation.PostConstruct;</text>
  <text x="92" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text>
  <text x="92" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// JDK 8+ 지원</text>
  <text x="92" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Java EE → Jakarta EE 이전</text>
  <text x="92" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Spring 5.x 대응</text>

  <text x="92" y="342" font-size="13" fill="#e05555">✗  javax.* → 더 이상 업데이트 없음</text>
  <text x="92" y="360" font-size="13" fill="#888">JDK 8+ 지원</text>

  <!-- Center arrow -->
  <polygon points="420,224 456,224 456,212 476,244 456,276 456,264 420,264"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="410" y="286" width="76" height="20" fill="#0a0a0a"/>
  <text x="448" y="300" font-size="11" fill="#7777cc" text-anchor="middle">마이그레이션</text>

  <!-- Right: Spring Boot 3.x (jakarta) -->
  <rect x="460" y="68" width="360" height="300" fill="#0a120a" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="640" y="96" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Spring Boot 3.x (현재)</text>
  <text x="640" y="116" font-size="12" fill="#888" text-anchor="middle">jakarta.* 네임스페이스</text>

  <rect x="476" y="128" width="328" height="200" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 신버전 import</text>
  <text x="492" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="534" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> jakarta.persistence.Entity;</text>
  <text x="492" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="534" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> jakarta.servlet.Filter;</text>
  <text x="492" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="534" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> jakarta.validation.Valid;</text>
  <text x="492" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="534" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> jakarta.annotation.PostConstruct;</text>
  <text x="492" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text>
  <text x="492" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// JDK 17+ 필수</text>
  <text x="492" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Jakarta EE 9+ 기반</text>
  <text x="492" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Spring 6.x 대응</text>

  <text x="492" y="342" font-size="13" fill="#55c555">✓  GraalVM Native Image 지원</text>
  <text x="492" y="360" font-size="13" fill="#888">JDK 17+ 필수</text>

  <!-- Footer -->
  <text x="440" y="424" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #4</text>
</svg>
