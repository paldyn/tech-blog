<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">실행 순서 함정: 위치 ≠ 실행 순서</text>

  <defs>
    <marker id="jpar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="240" y="92" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">노트북에 보이는 순서</text>
  <rect x="60" y="104" width="360" height="46" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">[3]  x = 10</text>
  <rect x="60" y="158" width="360" height="46" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">[1]  print(x)</text>
  <rect x="60" y="212" width="360" height="46" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">[2]  x = 99</text>

  <path d="M 440 180 C 500 180, 500 180, 556 180" fill="none" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#jpar)"/>
  <text x="498" y="160" font-size="12" fill="#9aa4b8" text-anchor="middle">실행 번호 순</text>

  <rect x="570" y="104" width="250" height="100" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="588" y="132" font-size="14" font-weight="600" fill="#e05555">커널이 본 순서</text>
  <text x="588" y="158" font-size="13" fill="#9aa4b8">[1] print → 아직 x 없음? </text>
  <text x="588" y="180" font-size="13" fill="#9aa4b8">[2] x=99 → [3] x=10</text>
  <text x="588" y="198" font-size="13" fill="#9aa4b8">위→아래가 아님!</text>

  <rect x="60" y="270" width="760" height="36" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="293" font-size="13" fill="#e05555" text-anchor="middle">의심스러우면 Restart &amp; Run All — 깨끗한 커널에서 위→아래로 재실행</text>
</svg>
