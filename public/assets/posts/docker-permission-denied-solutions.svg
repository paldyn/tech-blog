<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Permission Denied 해결 방법</text>

  <!-- Method 1 -->
  <rect x="60" y="70" width="360" height="110" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">방법 1: docker 그룹 추가 (권장)</text>
  <text x="240" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">영구 적용 — 로그아웃 후 재로그인 필요</text>
  <rect x="76" y="130" width="328" height="38" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">sudo</text>
  <text x="134" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> usermod -aG docker $USER</text>

  <!-- Method 2 -->
  <rect x="460" y="70" width="360" height="110" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">방법 2: newgrp (즉시 적용)</text>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">현재 셸만 임시 적용, 새 터미널은 재실행</text>
  <rect x="476" y="130" width="328" height="38" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">newgrp</text>
  <text x="550" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> docker</text>

  <!-- Method 3 -->
  <rect x="60" y="210" width="360" height="110" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">방법 3: sudo 사용 (비권장)</text>
  <text x="240" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">루트 권한 남용 — 보안 위험</text>
  <rect x="76" y="270" width="328" height="38" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">sudo</text>
  <text x="134" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> docker run nginx</text>

  <!-- Method 4 -->
  <rect x="460" y="210" width="360" height="110" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">방법 4: Rootless Docker</text>
  <text x="640" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">권한 없이 데몬 실행 — 보안 강화</text>
  <rect x="476" y="270" width="328" height="38" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">dockerd-rootless-setuptool.sh install</text>

  <!-- Note -->
  <rect x="60" y="350" width="760" height="82" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">보안 주의사항</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">docker 그룹은 사실상 root와 동등한 권한 — 신뢰하는 사용자에게만 부여</text>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">CI/CD 환경은 Rootless Mode 또는 Docker-in-Docker 방식을 고려</text>
</svg>
