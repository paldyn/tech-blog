<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">가상 스레드 도입 시 재검토할 것</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">기존 관행이 가상 스레드에서는 역효과를 낼 수 있다</text>

  <!-- keep -->
  <rect x="60" y="100" width="360" height="240" rx="10" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">그대로 두어도 되는 것</text>
  <line x1="84" y1="148" x2="396" y2="148" stroke="#204020" stroke-width="1"/>
  <text x="84" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">기존 동기·블로킹 코드</text>
  <text x="84" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">가상 스레드 위에서 그대로 잘 동작</text>
  <text x="84" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">try-with-resources 구조</text>
  <text x="84" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Executor 자원 관리 패턴 유지</text>
  <text x="84" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">17 소스 전체</text>
  <text x="84" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">대부분 수정 없이 컴파일</text>

  <!-- reconsider -->
  <rect x="460" y="100" width="360" height="240" rx="10" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="640" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e0b055">재검토할 것</text>
  <line x1="484" y1="148" x2="796" y2="148" stroke="#403515" stroke-width="1"/>
  <text x="484" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">스레드 풀 크기 제한</text>
  <text x="484" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">가상 스레드는 풀링하지 않는다</text>
  <text x="484" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">긴 synchronized 블록</text>
  <text x="484" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">캐리어 스레드 고정(pinning) 유발</text>
  <text x="484" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">ThreadLocal 남용</text>
  <text x="484" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">스레드 수 급증 시 메모리 부담</text>
</svg>
