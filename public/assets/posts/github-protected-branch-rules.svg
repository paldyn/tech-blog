<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-gr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">보호된 브랜치는 직접 push를 막는다</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">모든 변경은 PR과 통과한 검사를 거쳐야 들어온다</text>

  <!-- developer -->
  <rect x="60" y="130" width="200" height="80" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="165" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">개발자</text>
  <text x="160" y="190" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git push main</text>

  <!-- main protected -->
  <rect x="620" y="130" width="200" height="80" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="165" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">main (보호됨)</text>
  <text x="720" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">규칙 통과만 머지</text>

  <!-- blocked direct push -->
  <line x1="262" y1="158" x2="616" y2="158" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <text x="440" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">직접 push 거부 (rejected)</text>

  <!-- PR path -->
  <line x1="262" y1="185" x2="616" y2="185" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gr)"/>
  <text x="440" y="205" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">PR → 리뷰 + CI 통과 → 머지</text>

  <!-- rules box -->
  <rect x="60" y="240" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 대표 규칙</text>
  <text x="78" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">require PR · require reviews · require status checks</text>
  <text x="78" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">no force-push · no deletion · linear history</text>
</svg>
