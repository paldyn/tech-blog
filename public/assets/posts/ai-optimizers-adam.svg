<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Adam / AdamW 구현과 학습률 스케줄러</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">PyTorch 코드로 이해하는 현대 옵티마이저</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- LEFT: Adam code -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Adam/AdamW PyTorch 설정</text>
  <rect x="60" y="115" width="380" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="124" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">torch.optim as optim</text>
  <text x="76" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># Adam (기본 설정)</text>
  <text x="76" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">opt = optim.Adam(</text>
  <text x="76" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    model.parameters(),</text>
  <text x="76" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    lr=</text>
  <text x="112" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1e-3</text>
  <text x="148" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text>
  <text x="76" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    betas=(</text>
  <text x="148" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0.9, 0.999</text>
  <text x="232" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">), eps=</text>
  <text x="296" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1e-8</text>
  <text x="76" y="245" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>
  <text x="76" y="263" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># AdamW (LLM 표준: 가중치 감쇠 분리)</text>
  <text x="76" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">opt = optim.AdamW(</text>
  <text x="76" y="299" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    model.parameters(), lr=</text>
  <text x="316" y="299" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">3e-4</text>
  <text x="352" y="299" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text>
  <text x="76" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    weight_decay=</text>
  <text x="208" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0.01</text>
  <text x="244" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>

  <!-- RIGHT: LR Scheduler -->
  <text x="480" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">학습률 스케줄러 (LR Scheduler)</text>
  <rect x="480" y="115" width="360" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from</text>
  <text x="528" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">torch.optim.lr_scheduler</text>
  <text x="496" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="544" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">CosineAnnealingLR</text>

  <text x="496" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 코사인 스케줄 (LLM 표준)</text>
  <text x="496" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">scheduler = CosineAnnealingLR(</text>
  <text x="496" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    opt, T_max=</text>
  <text x="604" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">100</text>
  <text x="628" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">, eta_min=</text>
  <text x="712" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1e-6</text>
  <text x="496" y="227" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>
  <text x="496" y="245" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for</text>
  <text x="520" y="245" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">epoch in range(</text>
  <text x="652" y="245" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">100</text>
  <text x="676" y="245" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">):</text>
  <text x="496" y="263" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    train_one_epoch(model, opt)</text>
  <text x="496" y="281" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    scheduler.step()</text>
  <text x="496" y="299" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># warmup + cosine decay</text>
  <text x="496" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># LLM: 전체 step의 1~5% warmup</text>

  <!-- Bottom: Key insights -->
  <rect x="60" y="352" width="760" height="80" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">옵티마이저 선택 시 주의사항</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Adam은 일반화 성능이 SGD보다 낮을 수 있다 → 이미지 분류는 SGD+Momentum 선호</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">AdamW의 weight_decay는 Bias/LayerNorm 파라미터에는 적용하지 않는다 (no_decay 그룹 분리)</text>

  <!-- Footer -->
  <text x="440" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
