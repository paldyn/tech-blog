<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="ae" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 정보 추출 파이프라인</text>

  <!-- Stage 1 -->
  <rect x="60" y="80" width="160" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">비정형 입력</text>
  <text x="140" y="123" text-anchor="middle" font-size="12" fill="#888">PDF · 이메일 · 이미지</text>

  <line x1="220" y1="110" x2="278" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Stage 2 -->
  <rect x="278" y="80" width="180" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="368" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">전처리 · OCR</text>
  <text x="368" y="123" text-anchor="middle" font-size="12" fill="#888">텍스트 정규화</text>

  <line x1="458" y1="110" x2="516" y2="110" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Stage 3 -->
  <rect x="516" y="80" width="180" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="606" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">LLM 추출</text>
  <text x="606" y="123" text-anchor="middle" font-size="12" fill="#888">스키마 기반 파싱</text>

  <line x1="696" y1="110" x2="748" y2="110" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Stage 4 -->
  <rect x="748" y="80" width="112" height="60" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="804" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">검증 · 저장</text>
  <text x="804" y="123" text-anchor="middle" font-size="12" fill="#888">Pydantic</text>

  <!-- Example extraction -->
  <text x="440" y="184" text-anchor="middle" font-size="13" fill="#888">청구서 추출 예시 (입력 → 구조화 출력)</text>

  <rect x="60" y="196" width="340" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="218" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 입력 (비정형 텍스트)</text>
  <text x="80" y="237" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"ABC Corp. 2026-05-01"</text>
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"소프트웨어 라이선스  ₩1,200,000"</text>
  <text x="80" y="275" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"컨설팅 서비스       ₩800,000"</text>
  <text x="80" y="294" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#b5cea8" xml:space="preserve"># 합계: ₩2,000,000</text>

  <line x1="400" y1="256" x2="460" y2="256" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <rect x="460" y="196" width="360" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="218" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 출력 (구조화 JSON)</text>
  <text x="480" y="237" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{ </text>
  <text x="480" y="237" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">  vendor</text>
  <text x="627" y="237" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">: </text>
  <text x="644" y="237" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"ABC Corp."</text>
  <text x="480" y="256" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">  total</text>
  <text x="621" y="256" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">: </text>
  <text x="638" y="256" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">2000000</text>
  <text x="480" y="275" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">  items</text>
  <text x="621" y="275" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">: [</text>
  <text x="644" y="275" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">...</text>
  <text x="480" y="294" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Bottom: validation status -->
  <rect x="280" y="358" width="320" height="42" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="382" text-anchor="middle" font-size="13" fill="#55c555">Pydantic 검증 통과 → DB 저장 · 후속 처리</text>
</svg>
