<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">key prop으로 컴포넌트 리셋</text>

  <defs>
    <marker id="arrk" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Timeline: key=A -->
  <rect x="60" y="80" width="360" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">key="user-1" 일 때</text>
  <text x="240" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">ProfileForm 마운트 → state 초기화</text>
  <text x="240" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">name = "홍길동", 편집 중...</text>

  <!-- Arrow down with key change -->
  <line x1="240" y1="160" x2="240" y2="195" stroke="#e05555" stroke-width="2" marker-end="url(#arrk)"/>
  <rect x="280" y="170" width="120" height="28" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="340" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">key 변경!</text>

  <!-- Timeline: key=B -->
  <rect x="60" y="196" width="360" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">key="user-2" 로 변경</text>
  <text x="240" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기존 컴포넌트 언마운트 + 새로 마운트</text>
  <text x="240" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">name = "", 깨끗한 상태에서 시작</text>

  <!-- Right: explanation -->
  <rect x="460" y="80" width="360" height="196" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="640" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">왜 이렇게 동작하나?</text>
  <text x="640" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">React는 key가 바뀌면</text>
  <text x="640" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">같은 위치의 같은 컴포넌트라도</text>
  <text x="640" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">완전히 다른 인스턴스로 처리한다</text>

  <rect x="476" y="188" width="328" height="72" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">unmount (기존) → mount (신규)</text>
  <text x="640" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">모든 state, ref, Effect가 초기화됨</text>
  <text x="640" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">useEffect cleanup도 실행</text>

  <!-- Code example -->
  <rect x="60" y="304" width="760" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#9aa4b8">// key를 변경하면 ProfileForm 전체가 리셋됨</tspan></tspan>
    <tspan x="76" dy="22"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> UserEditor({ userId }) {</tspan></tspan>
    <tspan x="76" dy="22"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &lt;ProfileForm key={userId} userId={userId} /&gt;;</tspan></tspan>
    <tspan x="76" dy="22"><tspan fill="#ffffff">}</tspan></tspan>
  </text>
</svg>