<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ce9178">  &quot;compilerOptions&quot;: {</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ce9178">    &quot;incremental&quot;: </tspan><tspan font-weight="600" fill="#7ec8e3">false</tspan><tspan fill="#ffffff">,</tspan></text>
