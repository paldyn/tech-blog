<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">드래그 앤 드롭 구현 패턴</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">소스와 대상이 주고받는 네 이벤트 — dt = e.dataTransfer</text>

  <!-- Card 1: dragstart -->
  <rect x="60" y="100" width="380" height="148" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">dragstart · 소스</text>
  <rect x="76" y="144" width="348" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">dt.setData(</tspan><tspan fill="#ce9178">'text/plain'</tspan><tspan fill="#ffffff">, id)</tspan></text>
  <text x="92" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">dt.effectAllowed = </tspan><tspan fill="#ce9178">'move'</tspan></text>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">데이터 저장 · 허용 효과 설정</text>

  <!-- Card 2: dragover -->
  <rect x="460" y="100" width="380" height="148" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">dragover · 대상</text>
  <rect x="476" y="144" width="348" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">el.addEventListener(</tspan><tspan fill="#ce9178">'dragover'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="492" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  (e) =&gt; e.preventDefault())</tspan></text>
  <text x="480" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">필수! 없으면 drop 이 안 생김</text>

  <!-- Card 3: drop -->
  <rect x="60" y="264" width="380" height="148" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">drop · 대상</text>
  <rect x="76" y="308" width="348" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">e.preventDefault()</tspan></text>
  <text x="92" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">id = dt.getData(</tspan><tspan fill="#ce9178">'text/plain'</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="92" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">files = [...dt.files]</tspan></text>
  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">getData 는 drop 안에서만 가능</text>

  <!-- Card 4: dragend -->
  <rect x="460" y="264" width="380" height="148" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="480" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">dragend · 소스</text>
  <rect x="476" y="308" width="348" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (dt.dropEffect</tspan></text>
  <text x="492" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    === </tspan><tspan fill="#ce9178">'none'</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="492" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  restore(item) }</tspan></text>
  <text x="480" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dropEffect 'none' = 드롭 실패</text>

  <!-- Bottom note -->
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">핵심 — dragover 의 preventDefault() 가 없으면 drop 은 발생하지 않는다</text>
</svg>
