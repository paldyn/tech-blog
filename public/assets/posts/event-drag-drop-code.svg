<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">드래그 앤 드롭 구현 패턴</text>

  <!-- Left: source -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">드래그 소스 설정</text>

  <rect x="60" y="94" width="370" height="180" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// HTML: draggable="true" 필수</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">item.<text fill="#7ec8e3">addEventListener</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'dragstart'</text><text fill="#e8e8e8">, e =&gt; {</text></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  e.dataTransfer.<text fill="#7ec8e3">setData</text><text fill="#e8e8e8">(</text></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <text fill="#ce9178">'text/plain'</text><text fill="#e8e8e8">, item.id);</text></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  e.dataTransfer.effectAllowed = </text></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    'move'<text fill="#e8e8e8">;</text></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">});</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// dragend에서 성공 여부 확인</text>

  <!-- Right: target -->
  <text x="450" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">드롭 대상 설정</text>

  <rect x="450" y="94" width="370" height="180" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// dragover에서 preventDefault 필수</text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">zone.<text fill="#7ec8e3">addEventListener</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'dragover'</text><text fill="#e8e8e8">, e =&gt; {</text></text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  e.<text fill="#7ec8e3">preventDefault</text><text fill="#e8e8e8">();</text></text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  e.dataTransfer.dropEffect = </text></text>
  <text x="466" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    'move'<text fill="#e8e8e8">;</text></text>
  <text x="466" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">});</text>
  <text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">zone.<text fill="#7ec8e3">addEventListener</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'drop'</text><text fill="#e8e8e8">, e =&gt; {</text></text>
  <text x="466" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  const <text fill="#e8e8e8">id = e.dataTransfer.<text fill="#7ec8e3">getData</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'text/plain'</text><text fill="#e8e8e8">);</text></text>
  <text x="466" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <text fill="#7ec8e3">moveItem</text><text fill="#e8e8e8">(id, zone); });</text></text>

  <!-- Bottom: file drop -->
  <text x="60" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">파일 드롭 처리</text>

  <rect x="60" y="316" width="760" height="88" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dropZone.<text fill="#7ec8e3">addEventListener</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'drop'</text><text fill="#e8e8e8">, e =&gt; {</text></text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  e.<text fill="#7ec8e3">preventDefault</text><text fill="#e8e8e8">();</text></text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  const <text fill="#e8e8e8">files = [...e.dataTransfer.files];</text></text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  files.<text fill="#7ec8e3">forEach</text><text fill="#e8e8e8">(file =&gt; <text fill="#7ec8e3">uploadFile</text><text fill="#e8e8e8">(file));</text></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">});</text>
</svg>
