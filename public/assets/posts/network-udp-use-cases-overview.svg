<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">UDP 주요 활용 사례</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">신뢰성보다 속도/단순성이 중요한 영역</text>

  <!-- DNS -->
  <rect x="40" y="86" width="190" height="140" rx="8" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="135" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0c055">DNS</text>
  <text x="135" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">도메인 → IP 조회</text>
  <text x="135" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">포트 53</text>
  <text x="135" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">작은 요청/응답</text>
  <text x="135" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단일 패킷으로 충분</text>
  <text x="135" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0c055">재시도: 앱 레벨</text>

  <!-- DHCP -->
  <rect x="250" y="86" width="190" height="140" rx="8" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="345" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">DHCP</text>
  <text x="345" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">IP 주소 자동 할당</text>
  <text x="345" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">포트 67/68</text>
  <text x="345" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">브로드캐스트 필요</text>
  <text x="345" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">연결 전 통신</text>
  <text x="345" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">TCP 연결 불가 상태</text>

  <!-- VoIP/RTP -->
  <rect x="460" y="86" width="190" height="140" rx="8" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1.5"/>
  <text x="555" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">VoIP / RTP</text>
  <text x="555" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실시간 음성/영상</text>
  <text x="555" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Zoom, Teams 등</text>
  <text x="555" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">재전송보다 버림</text>
  <text x="555" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">늦은 패킷 = 무의미</text>
  <text x="555" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">지터 버퍼로 보완</text>

  <!-- Game/QUIC -->
  <rect x="670" y="86" width="170" height="140" rx="8" fill="#1a0a0a" stroke="#5a2a2a" stroke-width="1.5"/>
  <text x="755" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">게임 / QUIC</text>
  <text x="755" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">온라인 게임</text>
  <text x="755" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HTTP/3 (QUIC)</text>
  <text x="755" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">위치 동기화</text>
  <text x="755" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최신 상태만 중요</text>
  <text x="755" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">앱에서 신뢰성 제어</text>

  <!-- UDP Header -->
  <rect x="40" y="254" width="800" height="140" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">UDP 헤더 구조 (8바이트 = TCP 20바이트보다 간결)</text>

  <!-- Header fields -->
  <rect x="56" y="288" width="175" height="36" rx="4" fill="#1a2a3a" stroke="#3a5a7a" stroke-width="1"/>
  <text x="143" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Src Port (16비트)</text>

  <rect x="237" y="288" width="175" height="36" rx="4" fill="#1a2a3a" stroke="#3a5a7a" stroke-width="1"/>
  <text x="324" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Dst Port (16비트)</text>

  <rect x="418" y="288" width="175" height="36" rx="4" fill="#1a1a2a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="505" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Length (16비트)</text>

  <rect x="599" y="288" width="185" height="36" rx="4" fill="#1a1a2a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="691" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Checksum (16비트)</text>

  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">연결 설정 없음 | 순서 보장 없음 | 재전송 없음 | 흐름제어 없음 = 최소 오버헤드</text>
</svg>
