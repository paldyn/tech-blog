<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">3-Way Merge 자동 해결 vs 충돌</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">같은 파일이라도 수정 위치가 다르면 자동 병합 가능</text>

  <!-- Left panel: Auto-merge -->
  <text x="100" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">자동 병합 (위치 다름)</text>

  <rect x="60" y="122" width="340" height="198" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">Base:    A B C D</text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">Ours:    A B' C D  </text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Theirs:  A B C D'</text>
  <line x1="76" y1="196" x2="384" y2="196" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Result:  A B' C D'</text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># B는 ours가, D는 theirs가</text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 변경했으므로 자동 적용</text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Auto-merging app.js</text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Merge made by 'ort'.</text>

  <!-- Right panel: Conflict -->
  <text x="490" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">충돌 (같은 위치 수정)</text>

  <rect x="460" y="122" width="360" height="198" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">Base:    A B C D</text>
  <text x="476" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">Ours:    A X C D</text>
  <text x="476" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Theirs:  A Y C D</text>
  <line x1="476" y1="196" x2="804" y2="196" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</text>
  <text x="476" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">X</text>
  <text x="476" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">=======</text>
  <text x="476" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Y</text>
  <text x="476" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">&gt;&gt;&gt;&gt;&gt;&gt;&gt; feature</text>
  <text x="476" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">CONFLICT: 수동 해결 필요</text>

  <!-- Bottom divider -->
  <line x1="60" y1="334" x2="820" y2="334" stroke="#222" stroke-width="1"/>
  <text x="440" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Base가 없으면 Git은 무엇이 변경인지 알 수 없다 — 3-way가 필요한 이유</text>
</svg>
