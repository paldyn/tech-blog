<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 회의 요약 파이프라인</text>

  <!-- Stage 1: Audio input -->
  <rect x="60" y="80" width="160" height="68" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">회의 녹음</text>
  <text x="140" y="126" text-anchor="middle" font-size="12" fill="#888">음성 · 영상 파일</text>

  <line x1="220" y1="114" x2="268" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Stage 2: STT -->
  <rect x="268" y="80" width="160" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="348" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">음성 → 텍스트</text>
  <text x="348" y="126" text-anchor="middle" font-size="12" fill="#888">Whisper · STT API</text>

  <line x1="428" y1="114" x2="476" y2="114" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Stage 3: Diarize -->
  <rect x="476" y="80" width="160" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="556" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">화자 분리</text>
  <text x="556" y="126" text-anchor="middle" font-size="12" fill="#888">Speaker Diarization</text>

  <line x1="636" y1="114" x2="684" y2="114" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Stage 4: Summarize -->
  <rect x="684" y="80" width="136" height="68" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="752" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">LLM 분석</text>
  <text x="752" y="126" text-anchor="middle" font-size="12" fill="#888">요약 · 분류</text>

  <!-- Intermediate transcript view -->
  <text x="440" y="192" text-anchor="middle" font-size="13" fill="#888">변환된 회의록 (화자 구분)</text>

  <rect x="60" y="204" width="760" height="68" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">[김팀장 00:02:15]</text>
  <text x="260" y="228" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> "Q3 출시 일정을 앞당기는 것을 검토해야 합니다."</text>
  <text x="80" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7777cc" xml:space="preserve">[이개발 00:03:40]</text>
  <text x="260" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> "현재 API 통합 이슈가 있어 2주 연장이 필요합니다."</text>

  <!-- Output -->
  <line x1="440" y1="272" x2="440" y2="320" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="200" y="320" width="480" height="60" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="344" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">구조화된 회의 요약 생성</text>
  <text x="440" y="365" text-anchor="middle" font-size="12" fill="#888">요약 · 결정사항 · 액션아이템 · 담당자 · 기한</text>
</svg>
