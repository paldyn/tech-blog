<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">선언형(tox) vs 코드형(nox)</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e8e8e8">tox.ini — 선언형</text>
  <rect x="60" y="108" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">[tox]</text>
  <text xml:space="preserve" x="76" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">envlist = py310,py311,py312</text>
  <text xml:space="preserve" x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">[testenv]</text>
  <text xml:space="preserve" x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">deps = pytest</text>
  <text xml:space="preserve" x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">commands = pytest</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#e8e8e8">noxfile.py — 코드형</text>
  <rect x="460" y="108" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">@nox.session(</text>
  <text xml:space="preserve" x="588" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">python=[...])</text>
  <text xml:space="preserve" x="476" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="518" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">tests(session):</text>
  <text xml:space="preserve" x="500" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">session.install("pytest")</text>
  <text xml:space="preserve" x="500" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">session.run("pytest")</text>

  <text x="60" y="296" font-size="13" fill="#888" xml:space="preserve">tox는 INI 설정으로 간결하고, nox는 평범한 파이썬 코드라 조건 분기·반복을 유연하게 짠다.</text>
</svg>
