<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8">스택과 힙 메모리</text>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#555">원시 타입은 스택에, 객체 타입은 힙에 저장됩니다</text>

  <!-- STACK section -->
  <rect x="60" y="90" width="320" height="290" rx="10" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="220" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#e8e8e8">Stack</text>
  <text x="220" y="134" text-anchor="middle" font-size="11" fill="#555">값 자체가 저장됨 · 빠른 접근</text>

  <!-- Stack: a = 42 -->
  <rect x="80" y="148" width="280" height="44" rx="6" fill="#1a1a2a" stroke="#2a2a4a" stroke-width="1"/>
  <text x="100" y="168" font-size="12" fill="#888">a</text>
  <text x="300" y="168" text-anchor="end" font-size="13" font-weight="600" fill="#6b9fff">42</text>
  <text x="100" y="183" font-size="10" fill="#444">Number</text>

  <!-- Stack: b = "hello" -->
  <rect x="80" y="202" width="280" height="44" rx="6" fill="#1a2a1a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="100" y="222" font-size="12" fill="#888">b</text>
  <text x="300" y="222" text-anchor="end" font-size="13" font-weight="600" fill="#6abf5e">"hello"</text>
  <text x="100" y="237" font-size="10" fill="#444">String</text>

  <!-- Stack: c = true -->
  <rect x="80" y="256" width="280" height="44" rx="6" fill="#2a1a2a" stroke="#4a2a4a" stroke-width="1"/>
  <text x="100" y="276" font-size="12" fill="#888">c</text>
  <text x="300" y="276" text-anchor="end" font-size="13" font-weight="600" fill="#c678dd">true</text>
  <text x="100" y="291" font-size="10" fill="#444">Boolean</text>

  <!-- Stack: obj → reference -->
  <rect x="80" y="310" width="280" height="44" rx="6" fill="#2a2a1a" stroke="#4a4a2a" stroke-width="1"/>
  <text x="100" y="330" font-size="12" fill="#888">obj</text>
  <text x="300" y="330" text-anchor="end" font-size="13" font-weight="600" fill="#d4a84b">→ 0x7f3a</text>
  <text x="100" y="345" font-size="10" fill="#444">Object (메모리 주소)</text>

  <!-- Arrow from obj to heap -->
  <line x1="380" y1="332" x2="500" y2="280" stroke="#d4a84b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- HEAP section -->
  <rect x="500" y="90" width="340" height="290" rx="10" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="670" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#e8e8e8">Heap</text>
  <text x="670" y="134" text-anchor="middle" font-size="11" fill="#555">참조(주소)로 접근 · 동적 크기</text>

  <!-- Heap: object -->
  <rect x="520" y="200" width="300" height="120" rx="8" fill="#1a1a1a" stroke="#2a2a1a" stroke-width="1"/>
  <text x="540" y="224" font-size="11" fill="#555">0x7f3a</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="670" y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#d4a84b">{ name: "Alice",</text>
  <text x="670" y="266" text-anchor="middle" font-size="12" fill="#d4a84b">  age: 30 }</text>
  <text x="670" y="296" text-anchor="middle" font-size="11" fill="#444">크기가 가변적인 데이터</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d4a84b"/>
    </marker>
  </defs>

  <!-- Bottom note -->
  <text x="440" y="398" text-anchor="middle" font-size="12" fill="#444">스택의 obj 변수에는 실제 데이터가 아닌 힙의 메모리 주소가 저장됩니다</text>
</svg>
