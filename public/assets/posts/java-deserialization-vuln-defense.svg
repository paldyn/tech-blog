<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">역직렬화 방어 전략</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">위에서 아래로 갈수록 차선책 — 최선은 아예 쓰지 않는 것</text>

  <!-- best -->
  <rect x="90" y="100" width="700" height="64" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="114" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">최선 · Java 직렬화를 쓰지 않는다</text>
  <text x="114" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">JSON(Jackson) · Protobuf 등 데이터 전용 포맷으로 교체 — 코드 실행 경로 자체가 없음</text>

  <!-- second -->
  <rect x="90" y="176" width="700" height="64" rx="8" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="114" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">차선 · 역직렬화 필터로 허용 클래스 제한</text>
  <text x="114" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">ObjectInputFilter로 허용 목록만 통과 — Java 9+ 내장, JEP 290</text>

  <!-- third -->
  <rect x="90" y="252" width="700" height="64" rx="8" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="114" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e0b055">보조 · 의존성 최신화 · 가젯 라이브러리 제거</text>
  <text x="114" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">알려진 가젯 체인(Commons-Collections 등) 취약 버전 업데이트</text>

  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">신뢰할 수 없는 데이터를 native 역직렬화하지 않는 것이 근본 해법</text>
  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">필터는 방어선일 뿐, 포맷 교체가 위험을 없앤다</text>
</svg>
