<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">토큰 저장소별 보안 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">localStorage / sessionStorage / Cookie / Memory</text>

  <!-- Table header -->
  <rect x="50" y="86" width="780" height="36" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">저장소</text>
  <text x="330" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">XSS 위험</text>
  <text x="490" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">CSRF 위험</text>
  <text x="640" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">탭 유지</text>
  <text x="780" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">추천</text>

  <!-- Row 1: localStorage -->
  <rect x="50" y="126" width="780" height="50" rx="0" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="150" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">localStorage</text>
  <text x="150" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">브라우저 영구 저장</text>
  <text x="330" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">⚠ 높음</text>
  <text x="490" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 낮음</text>
  <text x="640" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 유지</text>
  <text x="780" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">AT만 (短수명)</text>

  <!-- Row 2: sessionStorage -->
  <rect x="50" y="178" width="780" height="50" rx="0" fill="#0d0d1a" stroke="#333" stroke-width="1"/>
  <text x="150" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">sessionStorage</text>
  <text x="150" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">탭 세션 동안</text>
  <text x="330" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">⚠ 높음</text>
  <text x="490" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 낮음</text>
  <text x="640" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 탭 종료 시</text>
  <text x="780" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a23a">제한적</text>

  <!-- Row 3: Cookie HttpOnly -->
  <rect x="50" y="230" width="780" height="50" rx="0" fill="#0d1a0d" stroke="#333" stroke-width="1"/>
  <text x="150" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">HttpOnly Cookie</text>
  <text x="150" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">SameSite=Strict</text>
  <text x="330" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ JS 접근 불가</text>
  <text x="490" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ SameSite로 방어</text>
  <text x="640" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 유지</text>
  <text x="780" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">RT 권장</text>

  <!-- Row 4: Memory -->
  <rect x="50" y="282" width="780" height="50" rx="0" fill="#1a1200" stroke="#333" stroke-width="1"/>
  <text x="150" y="301" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">메모리 (변수)</text>
  <text x="150" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">JS 클로저/모듈</text>
  <text x="330" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a23a">중간 (XSS 노출)</text>
  <text x="490" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 낮음</text>
  <text x="640" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 새로고침 시</text>
  <text x="780" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">AT 단기 보관</text>

  <!-- Recommended strategy -->
  <rect x="50" y="360" width="780" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">권장 전략: Access Token = 메모리, Refresh Token = HttpOnly Cookie</text>
  <text x="440" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">AT는 짧은 수명(15분), 페이지 이동 시 RT 쿠키로 재발급 · AT를 localStorage에 저장하면 XSS로 탈취 위험</text>
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">RT 쿠키: Secure; HttpOnly; SameSite=Strict; Path=/api/auth/refresh</text>
</svg>
