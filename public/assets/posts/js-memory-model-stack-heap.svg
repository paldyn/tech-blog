<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">JavaScript 메모리 모델 — 스택과 힙</text>

  <!-- ── CALL STACK (left) ── -->
  <text x="225" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#7ec8e3">Call Stack</text>

  <rect x="60" y="88" width="330" height="370" fill="#0f0f0f" rx="8" stroke="#1e2433" stroke-width="1"/>

  <!-- Frame: greet() -->
  <rect x="80" y="106" width="290" height="74" fill="#141f2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="96" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc">greet() 프레임</text>
  <text x="96" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">name</text>
  <text x="144" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">=</text>
  <text x="158" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#ce9178">"Alice"</text>
  <text x="240" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">← 원시값(직접 저장)</text>

  <!-- Frame: main() -->
  <rect x="80" y="194" width="290" height="98" fill="#141f2e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="96" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#888">main() 프레임</text>
  <text x="96" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">count</text>
  <text x="148" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">=</text>
  <text x="162" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#b5cea8">42</text>
  <text x="240" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">← 원시값</text>
  <text x="96" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">user</text>
  <text x="135" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">=</text>
  <text x="149" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">ref →</text>
  <text x="240" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">← 힙 주소</text>
  <text x="96" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">alias</text>
  <text x="140" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">=</text>
  <text x="154" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">ref →</text>
  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">← 같은 힙 주소</text>

  <!-- Frame: global -->
  <rect x="80" y="306" width="290" height="60" fill="#141f2e" rx="6" stroke="#333" stroke-width="1"/>
  <text x="96" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#555">Global 프레임</text>
  <text x="96" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">config</text>
  <text x="140" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">=</text>
  <text x="154" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">ref →</text>

  <text x="225" y="428" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">↑ 함수 호출 시 성장, 반환 시 축소 (LIFO)</text>

  <!-- ── HEAP (right) ── -->
  <text x="655" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#55c555">Heap</text>

  <rect x="490" y="88" width="330" height="370" fill="#0f0f0f" rx="8" stroke="#1e2433" stroke-width="1"/>

  <!-- Heap Object 1: user / alias -->
  <rect x="510" y="106" width="290" height="90" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="526" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">Object @0x1a2b</text>
  <text x="526" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">id:</text>
  <text x="554" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#b5cea8">1</text>
  <text x="526" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">role:</text>
  <text x="566" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#ce9178">"admin"</text>

  <!-- Heap Object 2: config -->
  <rect x="510" y="214" width="290" height="90" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="526" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">Object @0x3c4d</text>
  <text x="526" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">debug:</text>
  <text x="578" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">false</text>
  <text x="526" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">timeout:</text>
  <text x="590" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#b5cea8">3000</text>

  <!-- GC note -->
  <text x="655" y="362" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">참조가 없으면 GC가 수거 (자동 관리)</text>
  <text x="655" y="382" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">크기·수명 가변 → 할당 비용 ↑</text>
  <text x="655" y="428" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">↑ 동적으로 성장 (크기 예측 불가)</text>

  <!-- ── ARROWS: stack refs → heap objects ── -->
  <!-- user & alias → @0x1a2b (y=151) -->
  <polyline points="200,260 430,260 430,151 508,151"
    fill="none" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="506,145 520,151 506,157" fill="#7777cc"/>

  <!-- alias → same object (slight offset so visible) -->
  <polyline points="200,280 440,280 440,161 508,161"
    fill="none" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- config → @0x3c4d (y=258) -->
  <polyline points="200,350 450,350 450,258 508,258"
    fill="none" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="506,252 520,258 506,264" fill="#7777cc"/>

  <!-- Bottom legend -->
  <text x="440" y="468" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">원시값: 스택에 값 직접 저장 | 객체·배열·함수: 힙에 저장, 스택엔 주소(참조)만 보관</text>
</svg>
