<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">리눅스 권한 비트 해부</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">ls -l 출력 한 줄에 담긴 10자리 권한 문자열 분석</text>

  <!-- Permission string display -->
  <rect x="80" y="90" width="720" height="70" rx="8" fill="#000000" stroke="#3a4a6e"/>

  <!-- Type bit -->
  <text x="130" y="130" text-anchor="middle" font-size="32" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">-</text>
  <!-- Owner -->
  <text x="210" y="130" text-anchor="middle" font-size="32" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">r</text>
  <text x="255" y="130" text-anchor="middle" font-size="32" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">w</text>
  <text x="300" y="130" text-anchor="middle" font-size="32" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">-</text>
  <!-- Group -->
  <text x="370" y="130" text-anchor="middle" font-size="32" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">r</text>
  <text x="415" y="130" text-anchor="middle" font-size="32" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">-</text>
  <text x="460" y="130" text-anchor="middle" font-size="32" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">-</text>
  <!-- Others -->
  <text x="530" y="130" text-anchor="middle" font-size="32" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">r</text>
  <text x="575" y="130" text-anchor="middle" font-size="32" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">-</text>
  <text x="620" y="130" text-anchor="middle" font-size="32" font-weight="700" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">-</text>

  <!-- Brackets under groups -->
  <!-- Type bracket -->
  <line x1="130" y1="155" x2="130" y2="165" stroke="#7777cc" stroke-width="2"/>
  <line x1="130" y1="165" x2="130" y2="165" stroke="#7777cc" stroke-width="2"/>

  <!-- Owner bracket -->
  <line x1="195" y1="155" x2="315" y2="155" stroke="#55c555" stroke-width="2"/>
  <line x1="195" y1="155" x2="195" y2="165" stroke="#55c555" stroke-width="2"/>
  <line x1="315" y1="155" x2="315" y2="165" stroke="#55c555" stroke-width="2"/>

  <!-- Group bracket -->
  <line x1="355" y1="155" x2="475" y2="155" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="355" y1="155" x2="355" y2="165" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="475" y1="155" x2="475" y2="165" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Others bracket -->
  <line x1="515" y1="155" x2="635" y2="155" stroke="#e05555" stroke-width="2"/>
  <line x1="515" y1="155" x2="515" y2="165" stroke="#e05555" stroke-width="2"/>
  <line x1="635" y1="155" x2="635" y2="165" stroke="#e05555" stroke-width="2"/>

  <!-- Labels -->
  <text x="130" y="185" text-anchor="middle" font-size="13" fill="#7777cc">파일 유형</text>
  <text x="255" y="185" text-anchor="middle" font-size="13" fill="#55c555">소유자(Owner)</text>
  <text x="415" y="185" text-anchor="middle" font-size="13" fill="#7ec8e3">그룹(Group)</text>
  <text x="575" y="185" text-anchor="middle" font-size="13" fill="#e05555">기타(Others)</text>

  <!-- Type bit table -->
  <rect x="60" y="210" width="360" height="140" rx="8" fill="#0e1018" stroke="#3a4a6e"/>
  <text x="240" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">파일 유형 비트</text>
  <text x="100" y="254" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">-</text>
  <text x="130" y="254" font-size="13" fill="#888">일반 파일</text>
  <text x="100" y="274" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">d</text>
  <text x="130" y="274" font-size="13" fill="#888">디렉터리</text>
  <text x="100" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">l</text>
  <text x="130" y="294" font-size="13" fill="#888">심볼릭 링크</text>
  <text x="100" y="314" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">b / c</text>
  <text x="160" y="314" font-size="13" fill="#888">블록/문자 장치</text>
  <text x="100" y="334" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">p / s</text>
  <text x="160" y="334" font-size="13" fill="#888">파이프/소켓</text>

  <!-- rwx meaning table -->
  <rect x="460" y="210" width="360" height="140" rx="8" fill="#0e1018" stroke="#3a4a6e"/>
  <text x="640" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">권한 비트 의미</text>

  <text x="490" y="254" font-size="13" font-weight="600" fill="#55c555">r (4)</text>
  <text x="550" y="254" font-size="13" fill="#888">읽기 — 파일 내용 읽기 / 디렉터리 목록</text>
  <text x="490" y="274" font-size="13" font-weight="600" fill="#7ec8e3">w (2)</text>
  <text x="550" y="274" font-size="13" fill="#888">쓰기 — 파일 수정 / 파일 생성·삭제</text>
  <text x="490" y="294" font-size="13" font-weight="600" fill="#e05555">x (1)</text>
  <text x="550" y="294" font-size="13" fill="#888">실행 — 프로그램 실행 / 디렉터리 진입</text>
  <text x="490" y="318" font-size="13" font-weight="600" fill="#888">- (0)</text>
  <text x="550" y="318" font-size="13" fill="#888">해당 권한 없음</text>
  <text x="490" y="340" font-size="13" fill="#555">합계: r+w+x = 4+2+1 = 7 (rwx)</text>
</svg>
