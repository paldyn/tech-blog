<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PostGIS 지오메트리 타입 계층</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">OGC Simple Features — POINT·LINESTRING·POLYGON·COLLECTION</text>

  <!-- geometry (root) -->
  <rect x="330" y="90" width="220" height="48" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">geometry</text>
  <text x="440" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">모든 지오메트리 타입의 상위 타입</text>

  <!-- Lines to children -->
  <line x1="440" y1="138" x2="440" y2="165" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="130" y1="165" x2="750" y2="165" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="130" y1="165" x2="130" y2="185" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="310" y1="165" x2="310" y2="185" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="490" y1="165" x2="490" y2="185" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="670" y1="165" x2="670" y2="185" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- POINT -->
  <rect x="60" y="185" width="140" height="80" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">POINT</text>
  <text x="130" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">단일 좌표</text>
  <text x="130" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">POINT(127.0 37.5)</text>
  <text x="130" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">2D/3D/4D 지원</text>

  <!-- LINESTRING -->
  <rect x="240" y="185" width="140" height="80" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="310" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">LINESTRING</text>
  <text x="310" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">선 (2점 이상)</text>
  <text x="310" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">LINESTRING(0 0,1 1)</text>
  <text x="310" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">도로·경로</text>

  <!-- POLYGON -->
  <rect x="420" y="185" width="140" height="80" rx="6" fill="#2e1a00" stroke="#ce9178" stroke-width="1.5"/>
  <text x="490" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">POLYGON</text>
  <text x="490" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">면 (닫힌 링)</text>
  <text x="490" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">POLYGON((0 0,1 0,...))</text>
  <text x="490" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">행정구역·건물</text>

  <!-- GEOMETRYCOLLECTION -->
  <rect x="600" y="185" width="140" height="80" rx="6" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="670" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">GEOMETRY</text>
  <text x="670" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">COLLECTION</text>
  <text x="670" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">혼합 집합</text>
  <text x="670" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">MULTI* 포함</text>

  <!-- MULTI types -->
  <line x1="130" y1="265" x2="130" y2="295" stroke="#55c555" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="60" y="295" width="140" height="44" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">MULTIPOINT</text>
  <text x="130" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">점 집합</text>

  <line x1="310" y1="265" x2="310" y2="295" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="240" y="295" width="140" height="44" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="310" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">MULTILINESTRING</text>
  <text x="310" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">선 집합</text>

  <line x1="490" y1="265" x2="490" y2="295" stroke="#ce9178" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="420" y="295" width="140" height="44" rx="6" fill="#111" stroke="#ce9178" stroke-width="1"/>
  <text x="490" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" text-anchor="middle">MULTIPOLYGON</text>
  <text x="490" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">면 집합</text>

  <!-- geography vs geometry -->
  <rect x="60" y="368" width="760" height="100" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="80" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">geometry vs geography</text>
  <text x="80" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">geometry:</text>
  <text x="170" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">평면 좌표계(유클리드). 빠름. 국지적 계산에 적합</text>
  <text x="80" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">geography:</text>
  <text x="180" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구면 좌표계(WGS84). 위경도 기반 거리 계산 정확. 느림</text>
  <text x="80" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 수십 km 이상의 거리 계산이나 전 세계 데이터라면 geography 권장</text>
  <text x="80" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 같은 도시 내 POI 거리라면 geometry + EPSG:5181(Korea TM) 또는 UTM 투영이 유리</text>
</svg>
