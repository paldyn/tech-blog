<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DFS 순회 — 전위·중위·후위</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">같은 트리, 다른 방문 순서 — 루트의 방문 시점이 결정</text>

    <!-- Column headers -->
    <text x="145" y="100" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">전위 (Pre-order)</text>
    <text x="145" y="114" font-size="12" fill="#888" text-anchor="middle">루트 → 왼 → 오른</text>
    <text x="440" y="100" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">중위 (In-order)</text>
    <text x="440" y="114" font-size="12" fill="#888" text-anchor="middle">왼 → 루트 → 오른</text>
    <text x="735" y="100" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">후위 (Post-order)</text>
    <text x="735" y="114" font-size="12" fill="#888" text-anchor="middle">왼 → 오른 → 루트</text>

    <line x1="293" y1="85" x2="293" y2="460" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="587" y1="85" x2="587" y2="460" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Tree 1 (Pre-order) -->
    <!-- Root A -->
    <circle cx="145" cy="162" r="20" fill="#1a2544" stroke="#7ec8e3" stroke-width="2"/>
    <text x="145" y="167" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">A</text>
    <text x="128" y="155" font-size="10" fill="#7ec8e3">①</text>
    <!-- B, C -->
    <circle cx="90" cy="228" r="20" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="90" y="233" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>
    <text x="73" y="221" font-size="10" fill="#7ec8e3">②</text>
    <circle cx="200" cy="228" r="20" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="200" y="233" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">C</text>
    <text x="183" y="221" font-size="10" fill="#7ec8e3">⑤</text>
    <!-- D, E, F -->
    <circle cx="62" cy="294" r="20" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="62" y="299" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">D</text>
    <text x="45" y="287" font-size="10" fill="#7ec8e3">③</text>
    <circle cx="118" cy="294" r="20" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="118" y="299" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">E</text>
    <text x="101" y="287" font-size="10" fill="#7ec8e3">④</text>
    <circle cx="228" cy="294" r="20" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="228" y="299" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">F</text>
    <text x="211" y="287" font-size="10" fill="#7ec8e3">⑥</text>
    <!-- Edges -->
    <line x1="131" y1="177" x2="103" y2="212" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="159" y1="177" x2="187" y2="212" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="78" y1="243" x2="71" y2="278" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="102" y1="243" x2="109" y2="278" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="208" y1="243" x2="221" y2="278" stroke="#3a4a6e" stroke-width="1.5"/>
    <!-- Result -->
    <text x="145" y="340" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">A B D E C F</text>

    <!-- Tree 2 (In-order) -->
    <circle cx="440" cy="162" r="20" fill="#1a2544" stroke="#55c555" stroke-width="2"/>
    <text x="440" y="167" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">A</text>
    <text x="423" y="155" font-size="10" fill="#55c555">④</text>
    <circle cx="385" cy="228" r="20" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="385" y="233" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>
    <text x="368" y="221" font-size="10" fill="#55c555">②</text>
    <circle cx="495" cy="228" r="20" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="495" y="233" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">C</text>
    <text x="478" y="221" font-size="10" fill="#55c555">⑥</text>
    <circle cx="357" cy="294" r="20" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="357" y="299" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">D</text>
    <text x="340" y="287" font-size="10" fill="#55c555">①</text>
    <circle cx="413" cy="294" r="20" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="413" y="299" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">E</text>
    <text x="396" y="287" font-size="10" fill="#55c555">③</text>
    <circle cx="523" cy="294" r="20" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="523" y="299" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">F</text>
    <text x="506" y="287" font-size="10" fill="#55c555">⑤</text>
    <line x1="426" y1="177" x2="398" y2="212" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="454" y1="177" x2="482" y2="212" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="373" y1="243" x2="366" y2="278" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="397" y1="243" x2="404" y2="278" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="503" y1="243" x2="516" y2="278" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="440" y="340" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">D B E A C F</text>
    <text x="440" y="356" font-size="11" fill="#888" text-anchor="middle">BST 중위 순회 = 오름차순!</text>

    <!-- Tree 3 (Post-order) -->
    <circle cx="735" cy="162" r="20" fill="#1a2544" stroke="#ce9178" stroke-width="2"/>
    <text x="735" y="167" font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">A</text>
    <text x="718" y="155" font-size="10" fill="#ce9178">⑥</text>
    <circle cx="680" cy="228" r="20" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="680" y="233" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>
    <text x="663" y="221" font-size="10" fill="#ce9178">③</text>
    <circle cx="790" cy="228" r="20" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="790" y="233" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">C</text>
    <text x="773" y="221" font-size="10" fill="#ce9178">⑤</text>
    <circle cx="652" cy="294" r="20" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="652" y="299" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">D</text>
    <text x="635" y="287" font-size="10" fill="#ce9178">①</text>
    <circle cx="708" cy="294" r="20" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="708" y="299" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">E</text>
    <text x="691" y="287" font-size="10" fill="#ce9178">②</text>
    <circle cx="818" cy="294" r="20" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="818" y="299" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">F</text>
    <text x="801" y="287" font-size="10" fill="#ce9178">④</text>
    <line x1="721" y1="177" x2="693" y2="212" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="749" y1="177" x2="777" y2="212" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="668" y1="243" x2="661" y2="278" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="692" y1="243" x2="699" y2="278" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="798" y1="243" x2="811" y2="278" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="735" y="340" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">D E B F C A</text>
    <text x="735" y="356" font-size="11" fill="#888" text-anchor="middle">자식 처리 후 부모 처리</text>

    <!-- Code block -->
    <rect x="60" y="378" width="760" height="100" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="80" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">def preorder(n):  </text>
    <text x="80" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                  if</text>
    <text x="80" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                       n: visit(n); preorder(n.left); preorder(n.right)</text>
    <text x="80" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">def inorder(n):   </text>
    <text x="80" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                  if</text>
    <text x="80" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                       n: inorder(n.left);  visit(n); inorder(n.right)</text>
    <text x="80" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">def postorder(n): </text>
    <text x="80" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">                  if</text>
    <text x="80" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                       n: postorder(n.left); postorder(n.right); visit(n)</text>
    <text x="80" y="462" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">모두 O(n) 시간, O(h) 공간 (재귀 스택 깊이 = 트리 높이 h)</text>
  </g>
</svg>
