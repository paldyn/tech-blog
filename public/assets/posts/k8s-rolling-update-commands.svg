<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">kubectl rollout 핵심 명령</text>

  <!-- Update -->
  <rect x="50" y="68" width="370" height="36" rx="6" fill="#121e38" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">업데이트 &amp; 모니터링</text>

  <rect x="50" y="112" width="370" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="132"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 이미지 업데이트 (롤링 업데이트 트리거)</text>
  <text x="66" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="130" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> set image deploy/web \</text>
  <text x="66" y="168"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  web=nginx:1.26</text>
  <text x="66" y="192"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 롤아웃 진행 상황 확인</text>
  <text x="66" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="130" y="210"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> rollout status deploy/web</text>
  <text x="66" y="232"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 일시 정지 / 재개</text>
  <text x="66" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="130" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> rollout pause deploy/web</text>
  <text x="66" y="268"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="130" y="268"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> rollout resume deploy/web</text>
  <text x="66" y="296"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># YAML 변경 후 apply로도 트리거</text>
  <text x="66" y="306"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">kubectl apply -f web-deploy.yaml</text>

  <!-- Rollback -->
  <rect x="460" y="68" width="370" height="36" rx="6" fill="#121e38" stroke="#e05555" stroke-width="1.5"/>
  <text x="645" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">롤백 &amp; 히스토리</text>

  <rect x="460" y="112" width="370" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="132"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 직전 버전으로 롤백</text>
  <text x="476" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="540" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> rollout undo deploy/web</text>
  <text x="476" y="172"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 revision으로 롤백</text>
  <text x="476" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="540" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> rollout undo deploy/web \</text>
  <text x="476" y="208"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  --to-revision=2</text>
  <text x="476" y="232"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 롤아웃 히스토리 확인</text>
  <text x="476" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="540" y="250"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> rollout history deploy/web</text>
  <text x="476" y="272"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 revision 상세 보기</text>
  <text x="476" y="290"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="540" y="290"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> rollout history deploy/web \</text>
  <text x="476" y="308"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  --revision=2</text>

  <!-- Bottom tip -->
  <rect x="50" y="328" width="780" height="108" rx="8" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">히스토리 기록을 남기려면 --record (deprecated) 대신 CHANGE-CAUSE annotation 사용</text>
  <rect x="66" y="362" width="748" height="62" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="382"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 배포 전 annotation 추가</text>
  <text x="82" y="400"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl</text>
  <text x="146" y="400"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> annotate deploy/web \</text>
  <text x="82" y="416"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  kubernetes.io/change-cause="nginx 1.26 upgrade"</text>
</svg>
