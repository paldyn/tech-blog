<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">iframe sandbox 속성 참조표</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">각 토큰이 허용하는 동작과 보안 위험도</text>

  <!-- Header row -->
  <rect x="60" y="95" width="760" height="40" rx="6" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="180" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">sandbox 토큰</text>
  <text x="490" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">허용하는 동작</text>
  <text x="770" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">위험도</text>

  <!-- Divider lines -->
  <line x1="310" y1="95" x2="310" y2="455" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="680" y1="95" x2="680" y2="455" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Row 1: allow-scripts -->
  <rect x="60" y="135" width="760" height="46" rx="0" fill="#0f1820"/>
  <text x="180" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">allow-scripts</text>
  <text x="180" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">자바스크립트 실행</text>
  <text x="490" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">JS eval, 이벤트 핸들러, setTimeout 허용</text>
  <rect x="735" y="143" width="70" height="24" rx="4" fill="#5a1a1a"/>
  <text x="770" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">HIGH</text>

  <!-- Row 2: allow-same-origin -->
  <rect x="60" y="181" width="760" height="46" rx="0" fill="#0d1520"/>
  <text x="180" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">allow-same-origin</text>
  <text x="180" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">동일 오리진 취급</text>
  <text x="490" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">쿠키·스토리지 접근, 부모 DOM 접근 허용</text>
  <rect x="735" y="189" width="70" height="24" rx="4" fill="#5a1a1a"/>
  <text x="770" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">HIGH</text>

  <!-- Row 3: allow-forms -->
  <rect x="60" y="227" width="760" height="46" rx="0" fill="#0f1820"/>
  <text x="180" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">allow-forms</text>
  <text x="180" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">폼 제출 허용</text>
  <text x="490" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">form submit, 데이터 외부 전송 가능</text>
  <rect x="735" y="235" width="70" height="24" rx="4" fill="#4a3a0a"/>
  <text x="770" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a020" text-anchor="middle">MED</text>

  <!-- Row 4: allow-popups -->
  <rect x="60" y="273" width="760" height="46" rx="0" fill="#0d1520"/>
  <text x="180" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">allow-popups</text>
  <text x="180" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">팝업 창 허용</text>
  <text x="490" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">window.open, 타겟 링크 새 창 허용</text>
  <rect x="735" y="281" width="70" height="24" rx="4" fill="#4a3a0a"/>
  <text x="770" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a020" text-anchor="middle">MED</text>

  <!-- Row 5: allow-top-navigation -->
  <rect x="60" y="319" width="760" height="46" rx="0" fill="#0f1820"/>
  <text x="180" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">allow-top-navigation</text>
  <text x="180" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">상위 탐색 변경</text>
  <text x="490" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">부모 페이지 URL 변경 가능 → 피싱 위험</text>
  <rect x="735" y="327" width="70" height="24" rx="4" fill="#5a1a1a"/>
  <text x="770" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">HIGH</text>

  <!-- Row 6: allow-downloads -->
  <rect x="60" y="365" width="760" height="46" rx="0" fill="#0d1520"/>
  <text x="180" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">allow-downloads</text>
  <text x="180" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">파일 다운로드</text>
  <text x="490" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">파일 강제 다운로드 트리거 가능</text>
  <rect x="735" y="373" width="70" height="24" rx="4" fill="#4a3a0a"/>
  <text x="770" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a020" text-anchor="middle">MED</text>

  <!-- Border around table -->
  <rect x="60" y="135" width="760" height="276" fill="none" stroke="#2a3a4a" stroke-width="1" rx="0"/>

  <!-- Bottom: default (empty sandbox) -->
  <rect x="60" y="430" width="760" height="46" rx="8" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="449" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">sandbox="" (토큰 없음) — 가장 강력한 격리</text>
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">JS 차단 · 쿠키 차단 · 폼 차단 · 팝업 차단 — 모든 동작 기본 금지</text>
</svg>
