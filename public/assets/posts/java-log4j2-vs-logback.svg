<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Log4j 2 vs Logback</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">언제 무엇을 택할까</text>

  <rect x="60" y="100" width="360" height="190" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">Log4j 2</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">+ 비동기 로깅 처리량 우수</text>
  <text x="80" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">+ 가비지 프리 모드</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">+ 풍부한 플러그인</text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">→ 고성능·고처리량 환경</text>

  <rect x="460" y="100" width="360" height="190" rx="8" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">Logback</text>
  <text x="480" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">+ 스프링 부트 기본값</text>
  <text x="480" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">+ 설정이 단순·익숙</text>
  <text x="480" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">+ 별도 바인딩 불필요</text>
  <text x="480" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">→ 대부분의 일반 서비스</text>
</svg>
