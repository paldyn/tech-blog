<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">memo와 함께 쓰는 도구들</text>

  <!-- Box 1: React.memo -->
  <rect x="60" y="76" width="234" height="135" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="177" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">React.memo</text>
  <text x="177" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">컴포넌트 자체를 메모화</text>
  <text x="177" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">props 얕은 비교로 스킵 결정</text>
  <text x="177" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">memo(Component)</text>
  <text x="177" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">적용 단위: 컴포넌트</text>

  <!-- Box 2: useMemo -->
  <rect x="323" y="76" width="234" height="135" rx="8" fill="#0d1212" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">useMemo</text>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">계산 결과 값을 메모화</text>
  <text x="440" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">deps 배열 변경 시만 재계산</text>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3" text-anchor="middle">useMemo(() =&gt; calc(), [deps])</text>
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">적용 단위: 값(계산)</text>

  <!-- Box 3: useCallback -->
  <rect x="586" y="76" width="234" height="135" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="703" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">useCallback</text>
  <text x="703" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">함수 참조를 메모화</text>
  <text x="703" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">deps 배열 변경 시만 새 함수 생성</text>
  <text x="703" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc" text-anchor="middle">useCallback(fn, [deps])</text>
  <text x="703" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">적용 단위: 함수 참조</text>

  <!-- Combined usage -->
  <rect x="60" y="236" width="760" height="105" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">// 세 가지를 함께 쓰는 전형적 패턴</text>
  <text x="78" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text x="120" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> expensiveList = useMemo(() =&gt; filter(items), [items]);</text>
  <text x="78" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text x="120" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8"> handleClick = useCallback((id) =&gt; remove(id), []);</text>
  <text x="78" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">return &lt;MemoList items={expensiveList} onRemove={handleClick} /&gt;;</text>
  <text x="78" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">// MemoList = memo(List)</text>
</svg>
