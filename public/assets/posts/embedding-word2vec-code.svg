<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="880" height="320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Gensim Word2Vec 학습 예제</text>

  <!-- Code block background -->
  <rect x="60" y="68" width="760" height="232" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <!-- Line numbers -->
  <text x="76" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 1</text>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 2</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 3</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 4</text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 5</text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 6</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 7</text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 8</text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 9</text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve">10</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve">11</text>

  <!-- Code lines -->
  <text x="110" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">from</tspan><tspan fill="#e8e8e8"> gensim.models </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> Word2Vec</tspan></text>

  <text x="110" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 말뭉치 학습</text>

  <text x="110" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">model = Word2Vec(</text>

  <text x="110" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    sentences=corpus,</text>

  <text x="110" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e8e8e8">    vector_size=</tspan><tspan fill="#b5cea8">300</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="110" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e8e8e8">    window=</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">, min_count=</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="110" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e8e8e8">    sg=</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#6a8aa0">,  # 1=skip-gram</tspan></text>

  <text x="110" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">)</text>

  <text x="110" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 유사 단어 조회</text>

  <text x="110" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">model.wv.most_similar(</text>
  <text x="280" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"왕"</text>
  <text x="313" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">)</text>
</svg>
