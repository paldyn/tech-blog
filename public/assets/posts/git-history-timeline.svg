<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Git의 탄생 역사 타임라인</text>

  <!-- Timeline line -->
  <line x1="80" y1="260" x2="800" y2="260" stroke="#2a2a2a" stroke-width="2"/>

  <!-- 2002 -->
  <circle cx="120" cy="260" r="10" fill="#7777cc" stroke="#9999ee"/>
  <line x1="120" y1="250" x2="120" y2="160" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="60" y="120" width="120" height="64" rx="6" fill="#111" stroke="#2a2a40"/>
  <text x="120" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#9999ee">2002</text>
  <text x="120" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#aaa">Linux 커널팀</text>
  <text x="120" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#aaa">BitKeeper 도입</text>

  <!-- 2005 April -->
  <circle cx="280" cy="260" r="10" fill="#e05555" stroke="#ff7777"/>
  <line x1="280" y1="270" x2="280" y2="360" stroke="#e05555" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="194" y="310" width="172" height="80" rx="6" fill="#1a0d0d" stroke="#3a1e1e"/>
  <text x="280" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e05555">2005년 4월</text>
  <text x="280" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#cc7777">BitKeeper 라이선스</text>
  <text x="280" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#cc7777">취소 → 위기</text>

  <!-- 2005 April-June: Git created -->
  <circle cx="440" cy="260" r="14" fill="#55c555" stroke="#77ee77"/>
  <line x1="440" y1="246" x2="440" y2="140" stroke="#55c555" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="340" y="96" width="200" height="88" rx="6" fill="#0d1a0d" stroke="#1e4a1e"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">2005년 4~6월</text>
  <text x="440" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#77cc77">Linus Torvalds</text>
  <text x="440" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#77cc77">Git 직접 개발 · 공개</text>
  <text x="440" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">10일 만에 첫 버전</text>

  <!-- 2008 GitHub -->
  <circle cx="600" cy="260" r="10" fill="#7ec8e3" stroke="#aaddff"/>
  <line x1="600" y1="270" x2="600" y2="360" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="514" y="310" width="172" height="80" rx="6" fill="#0d1520" stroke="#1e2e3a"/>
  <text x="600" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">2008</text>
  <text x="600" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#99ccdd">GitHub 출시</text>
  <text x="600" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#99ccdd">Git 대중화 시작</text>

  <!-- 2020s -->
  <circle cx="760" cy="260" r="10" fill="#e8c55e" stroke="#ffdd88"/>
  <line x1="760" y1="250" x2="760" y2="160" stroke="#e8c55e" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="674" y="120" width="172" height="80" rx="6" fill="#1a1a0d" stroke="#3a3a1e"/>
  <text x="760" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e8c55e">2020년대</text>
  <text x="760" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ccbb77">전 세계 93%+ 개발자</text>
  <text x="760" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ccbb77">사실상 유일한 표준</text>

  <!-- Year labels on timeline -->
  <text x="120" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2002</text>
  <text x="280" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2005.04</text>
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">2005.06</text>
  <text x="600" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">2008</text>
  <text x="760" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">현재</text>

  <!-- Bottom note -->
  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">위기에서 탄생한 도구가 20년 만에 개발 문화를 바꿨다</text>
</svg>
