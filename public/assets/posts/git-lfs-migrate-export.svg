<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">migrate import vs export</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">상황에 맞는 명령 선택</text>

  <!-- import card -->
  <rect x="60" y="90" width="360" height="200" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="240" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">migrate import</text>
  <text x="240" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">일반 Git 오브젝트 → LFS 포인터</text>
  <line x1="80" y1="152" x2="400" y2="152" stroke="#1e2c4a" stroke-width="1"/>
  <text x="240" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 기존 커밋의 바이너리를 LFS로 이동</text>
  <text x="240" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 저장소를 가볍게 만들 때</text>
  <text x="240" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• --everything으로 모든 브랜치 처리</text>

  <rect x="80" y="232" width="280" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan x="96" y="252" fill="#7ec8e3" font-weight="600">git lfs migrate import</tspan>
    <tspan x="96" dy="16" fill="#ffffff">  --include=</tspan><tspan fill="#ce9178">"*.mp4"</tspan><tspan fill="#ffffff"> --everything</tspan>
  </text>

  <!-- export card -->
  <rect x="460" y="90" width="360" height="200" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="640" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">migrate export</text>
  <text x="640" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">LFS 포인터 → 일반 Git 오브젝트</text>
  <line x1="480" y1="152" x2="800" y2="152" stroke="#1e2c4a" stroke-width="1"/>
  <text x="640" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• LFS 의존성을 제거할 때</text>
  <text x="640" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• LFS 서버 없는 환경으로 이전</text>
  <text x="640" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 저장소 크기 늘어남 주의</text>

  <rect x="480" y="232" width="280" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan x="496" y="252" fill="#55c555" font-weight="600">git lfs migrate export</tspan>
    <tspan x="496" dy="16" fill="#ffffff">  --include=</tspan><tspan fill="#ce9178">"*.png"</tspan><tspan fill="#ffffff"> --everything</tspan>
  </text>

  <!-- Warning -->
  <rect x="60" y="308" width="760" height="50" fill="#1a0a08" rx="8" stroke="#5a2a2a" stroke-width="1"/>
  <text x="440" y="329" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">⚠ 두 명령 모두 히스토리를 재작성한다 — force push 및 팀원 재클론 필요</text>
  <text x="440" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행 전 모든 팀원이 작업을 push하고, 실행 후 저장소를 새로 clone하도록 안내한다</text>
</svg>
