<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-tvd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">useTransition vs useDeferredValue</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">같은 목표, 다른 관점 — 어디서 "지연"을 선언하는가?</text>

  <!-- useTransition column -->
  <rect x="60" y="88" width="360" height="46" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">useTransition</text>

  <rect x="60" y="146" width="360" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">관점</text>
  <text x="80" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">업데이트를 "시작"하는 쪽에서 선언</text>

  <rect x="60" y="212" width="360" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">사용 위치</text>
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이벤트 핸들러에서 setState 호출 시</text>

  <rect x="60" y="278" width="360" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">로딩 표시</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">isPending (boolean 반환)</text>

  <rect x="60" y="344" width="360" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">적합한 케이스</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">탭 전환, 페이지 이동, 버튼 클릭 결과</text>

  <rect x="60" y="410" width="360" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> [p, start] = useTransition();</tspan>
  </text>
  <text x="76" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">start(() =&gt; setState(val));</tspan>
  </text>
  <text x="76" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">// 핸들러에서 setState 감쌈</tspan>
  </text>

  <!-- useDeferredValue column -->
  <rect x="460" y="88" width="360" height="46" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">useDeferredValue</text>

  <rect x="460" y="146" width="360" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="480" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">관점</text>
  <text x="480" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">값을 "소비"하는 쪽에서 선언</text>

  <rect x="460" y="212" width="360" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">사용 위치</text>
  <text x="480" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">prop/context 값을 받아 렌더할 때</text>

  <rect x="460" y="278" width="360" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="480" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">로딩 표시</text>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">value !== deferredValue 비교</text>

  <rect x="460" y="344" width="360" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="480" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">적합한 케이스</text>
  <text x="480" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">검색 입력 기반 무거운 목록 필터링</text>

  <rect x="460" y="410" width="360" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> deferred = useDeferredValue(val);</tspan>
  </text>
  <text x="476" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">// 값을 받아서 지연 버전 생성</tspan>
  </text>
  <text x="476" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">&lt;</tspan>
    <tspan fill="#55c555">MemoList</tspan>
    <tspan fill="#ffffff"> query={deferred}/&gt;</tspan>
  </text>

  <!-- Middle divider and note -->
  <line x1="440" y1="88" x2="440" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
