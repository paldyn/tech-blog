<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">DBMS별 RETURNING / OUTPUT 문법 비교</text>

  <!-- Left column: PostgreSQL -->
  <text x="80" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" xml:space="preserve">PostgreSQL</text>
  <rect x="60" y="100" width="360" height="166" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- UPDATE + RETURNING</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">UPDATE</text>
  <text x="124" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> accounts</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SET</text>
  <text x="104" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> balance = balance - </text>
  <text x="280" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">100</text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> id = </text>
  <text x="160" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">7</text>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">RETURNING</text>
  <text x="160" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> id, balance;</text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- DELETE + RETURNING *</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">DELETE FROM</text>
  <text x="160" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> sessions</text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> expired_at &lt; NOW()</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">RETURNING</text>
  <text x="160" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> *;</text>

  <!-- Right column: SQL Server -->
  <text x="480" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" xml:space="preserve">SQL Server (OUTPUT)</text>
  <rect x="460" y="100" width="360" height="166" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- OUTPUT 절 (삽입 후)</text>
  <text x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">INSERT INTO</text>
  <text x="560" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> orders(user_id)</text>
  <text x="476" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">OUTPUT</text>
  <text x="528" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> INSERTED.id,</text>
  <text x="476" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">       INSERTED.created_at</text>
  <text x="476" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">VALUES</text>
  <text x="528" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (</text>
  <text x="540" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">42</text>
  <text x="564" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="476" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- DELETED: 삭제 전 값 참조</text>
  <text x="476" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">DELETE</text>
  <text x="524" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> FROM sessions</text>
  <text x="476" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">OUTPUT</text>
  <text x="528" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> DELETED.session_id</text>
  <text x="476" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="524" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> expired_at &lt; GETDATE();</text>

  <!-- DBMS support table -->
  <text x="60" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" xml:space="preserve">DBMS 지원 현황</text>

  <!-- Table header -->
  <rect x="60" y="318" width="760" height="32" rx="4" fill="#111827"/>
  <text x="140" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">DBMS</text>
  <text x="340" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">문법</text>
  <text x="560" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">INSERT</text>
  <text x="680" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">UPDATE</text>
  <text x="790" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">DELETE</text>

  <!-- Rows -->
  <rect x="60" y="350" width="760" height="28" rx="0" fill="#0d1117"/>
  <text x="140" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">PostgreSQL</text>
  <text x="340" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">RETURNING</text>
  <text x="560" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓</text>
  <text x="680" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓</text>
  <text x="790" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓</text>

  <rect x="60" y="378" width="760" height="28" rx="0" fill="#111827"/>
  <text x="140" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">SQL Server</text>
  <text x="340" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle" xml:space="preserve">OUTPUT</text>
  <text x="560" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓</text>
  <text x="680" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓</text>
  <text x="790" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓</text>

  <rect x="60" y="406" width="760" height="28" rx="0" fill="#0d1117"/>
  <text x="140" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">Oracle 23c+</text>
  <text x="340" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">RETURNING INTO</text>
  <text x="560" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓</text>
  <text x="680" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓</text>
  <text x="790" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">✓</text>

  <rect x="60" y="434" width="760" height="28" rx="0" fill="#111827"/>
  <text x="140" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">MySQL 8.x</text>
  <text x="340" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle" xml:space="preserve">미지원</text>
  <text x="560" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle" xml:space="preserve">✗</text>
  <text x="680" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle" xml:space="preserve">✗</text>
  <text x="790" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle" xml:space="preserve">✗</text>

  <!-- Footer -->
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle" xml:space="preserve">PALDYN — SQL 완전 정복</text>
</svg>
