<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스위치 MAC 학습 과정</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">프레임 수신 시 출발지 MAC을 포트와 매핑 — 이후 해당 MAC으로 오는 트래픽은 플러딩 없이 전달</text>

  <defs>
    <marker id="sw1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="sw2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Switch -->
  <rect x="330" y="180" width="220" height="80" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3" text-anchor="middle" font-weight="600">스위치</text>
  <text x="440" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Fa0/1  Fa0/2  Fa0/3  Fa0/4</text>
  <text x="360" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Fa0/1</text>
  <text x="415" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Fa0/2</text>
  <text x="470" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Fa0/3</text>
  <text x="526" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Fa0/4</text>

  <!-- PCs -->
  <rect x="60" y="195" width="110" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="115" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">PC-A</text>
  <text x="115" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">AA:AA:AA:AA:AA:AA</text>

  <rect x="710" y="195" width="110" height="50" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="765" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">PC-B</text>
  <text x="765" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">BB:BB:BB:BB:BB:BB</text>

  <rect x="385" y="90" width="110" height="50" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle" font-weight="600">PC-C</text>
  <text x="440" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">CC:CC:CC:CC:CC:CC</text>

  <!-- Links -->
  <line x1="170" y1="220" x2="330" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#sw1)"/>
  <line x1="710" y1="220" x2="550" y2="220" stroke="#e05555" stroke-width="2" marker-end="url(#sw2)"/>
  <line x1="440" y1="140" x2="440" y2="180" stroke="#7777cc" stroke-width="2" marker-end="url(#sw1)"/>

  <!-- Step annotations -->
  <text x="220" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">① PC-A → 플러딩</text>
  <text x="630" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">② PC-A 학습 후 유니캐스트</text>

  <!-- MAC Table -->
  <rect x="60" y="310" width="760" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" font-weight="600">MAC 주소 테이블 (CAM Table)</text>

  <!-- Table header -->
  <rect x="80" y="344" width="720" height="24" rx="4" fill="#1a1a2e"/>
  <text x="100" y="361" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">MAC 주소               포트    VLAN   유효 시간</text>

  <text x="100" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">AA:AA:AA:AA:AA:AA      Fa0/1   1      300s</text>
  <text x="100" y="405" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">BB:BB:BB:BB:BB:BB      Fa0/4   1      300s</text>
  <text x="100" y="425" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" xml:space="preserve">CC:CC:CC:CC:CC:CC      Fa0/2   1      298s</text>
  <text x="100" y="445" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">미등록 목적지          →  모든 포트로 플러딩 (Flooding)</text>
</svg>
