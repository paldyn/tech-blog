<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">dmesg 출력 형식 해부</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">타임스탬프 · 레벨 · 서브시스템 · 메시지</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">$ dmesg -H --color=always | tail -6</text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#b5cea8">[  0.000000]</tspan><tspan fill="#7ec8e3" font-weight="600"> Linux version </tspan><tspan fill="#ffffff">6.8.0-51-generic (buildd@...)</tspan></text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#b5cea8">[  0.000000]</tspan><tspan fill="#ffffff"> Command line: BOOT_IMAGE=... root=/dev/sda1</tspan></text>
  <text x="76" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#b5cea8">[  3.142857]</tspan><tspan fill="#7ec8e3" font-weight="600"> e1000e </tspan><tspan fill="#ffffff">0000:00:19.0 eth0: renamed from eth0</tspan></text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#b5cea8">[  5.318092]</tspan><tspan fill="#e05555" font-weight="600"> EXT4-fs error </tspan><tspan fill="#ffffff">(sda2): ext4_find_entry:1455</tspan></text>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#b5cea8">[  7.001234]</tspan><tspan fill="#55c555" font-weight="600"> audit</tspan><tspan fill="#ffffff">: type=1300 audit(1234.567:89): ...</tspan></text>
  <text x="76" y="240" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">$ dmesg -T   # 사람이 읽기 좋은 시간 형식</text>
  <text x="76" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">$ dmesg -l err,warn   # 에러·경고만 필터</text>
  <text x="76" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">$ dmesg --follow   # 실시간 모니터링</text>

  <!-- Annotation -->
  <rect x="60" y="306" width="360" height="50" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="240" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">[타임스탬프] = 부팅 후 경과 초</text>
  <text x="240" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">-T 옵션으로 실제 시각으로 변환</text>

  <rect x="460" y="306" width="360" height="50" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1"/>
  <text x="640" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">에러 우선 확인: dmesg -l err,crit</text>
  <text x="640" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">드라이버 에러, I/O 오류, 메모리 문제</text>
</svg>
