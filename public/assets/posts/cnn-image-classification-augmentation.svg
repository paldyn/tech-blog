<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">현대적 데이터 증강 기법</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">정확도 5~10% 향상을 가져오는 레시피</text>

  <!-- Mixup -->
  <rect x="36" y="96" width="185" height="170" fill="#0d1520" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="128" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Mixup</text>

  <g transform="translate(55, 128)">
    <!-- Image A -->
    <rect x="0" y="0" width="40" height="40" fill="#1a2535" rx="2" stroke="#3a4560"/>
    <text x="20" y="24" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18">🐱</text>

    <text x="48" y="24" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">+</text>

    <!-- Image B -->
    <rect x="56" y="0" width="40" height="40" fill="#1a2535" rx="2" stroke="#3a4560"/>
    <text x="76" y="24" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18">🐶</text>

    <text x="104" y="24" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555">=</text>

    <!-- Mixed image -->
    <rect x="112" y="0" width="40" height="40" fill="#1a2535" rx="2" stroke="#55c555" stroke-width="1.5"/>
    <text x="132" y="14" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" opacity="0.7">🐱</text>
    <text x="132" y="34" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" opacity="0.5">🐶</text>
  </g>

  <text x="128" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">x̃ = λ·xᵢ + (1-λ)·xⱼ</text>
  <text x="128" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ỹ = λ·yᵢ + (1-λ)·yⱼ</text>
  <text x="128" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">소프트 레이블로 과적합 방지</text>
  <text x="128" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">λ ~ Beta(α, α), α=0.2</text>

  <!-- CutMix -->
  <rect x="240" y="96" width="185" height="170" fill="#100d18" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="332" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">CutMix</text>

  <g transform="translate(258, 128)">
    <rect x="0" y="0" width="60" height="60" fill="#1a2535" rx="2" stroke="#3a4560"/>
    <text x="30" y="36" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28">🐱</text>
    <!-- Cut region overlay -->
    <rect x="28" y="0" width="32" height="32" fill="#1a1a2a" rx="1" stroke="#7777cc" stroke-width="1.5"/>
    <text x="44" y="20" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16">🐶</text>
    <text x="78" y="36" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#55c555">→</text>
    <rect x="92" y="0" width="60" height="60" fill="#1a2535" rx="2" stroke="#55c555" stroke-width="1.5"/>
    <text x="112" y="36" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28">🐱</text>
    <rect x="120" y="0" width="32" height="32" fill="#1a1a2a" rx="1" stroke="#7777cc"/>
    <text x="136" y="20" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16">🐶</text>
  </g>

  <text x="332" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">영역 잘라붙이기</text>
  <text x="332" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">레이블: 영역 비율 혼합</text>
  <text x="332" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Mixup보다 현실적</text>

  <!-- RandAugment -->
  <rect x="444" y="96" width="185" height="170" fill="#0d1117" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="536" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">RandAugment</text>

  <g transform="translate(455, 132)">
    <rect x="0"   y="0" width="76" height="24" fill="#1a1208" rx="3" stroke="#ce9178" stroke-width="1"/>
    <text x="38" y="16" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">Rotate(30°)</text>
    <rect x="84"  y="0" width="76" height="24" fill="#1a1208" rx="3" stroke="#ce9178" stroke-width="1"/>
    <text x="122" y="16" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">Shear(10)</text>
    <rect x="0"   y="30" width="76" height="24" fill="#1a1208" rx="3" stroke="#ce9178" stroke-width="1"/>
    <text x="38" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">Color(1.5)</text>
    <rect x="84"  y="30" width="76" height="24" fill="#1a1208" rx="3" stroke="#ce9178" stroke-width="1"/>
    <text x="122" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">Equalize</text>
    <rect x="0"   y="60" width="76" height="24" fill="#1a1208" rx="3" stroke="#ce9178" stroke-width="1"/>
    <text x="38" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">Brightness</text>
    <rect x="84"  y="60" width="76" height="24" fill="#1a1208" rx="3" stroke="#ce9178" stroke-width="1"/>
    <text x="122" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">...14가지</text>
  </g>

  <text x="536" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">N개 랜덤 선택 · 강도 M</text>
  <text x="536" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">N=2, M=9가 기본값</text>

  <!-- Test-Time Augmentation -->
  <rect x="648" y="96" width="196" height="170" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="746" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Test-Time Augmentation</text>

  <g transform="translate(660, 132)">
    <text x="0" y="16" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원본 이미지 → 5가지 크롭</text>
    <text x="0" y="36" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• Center crop</text>
    <text x="0" y="54" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• Top-left / Top-right</text>
    <text x="0" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• Bottom-left / Bottom-right</text>
    <text x="0" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">+ 각각 수평 반전 = 10개</text>
    <text x="0" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">예측값 평균 → 1~2% 향상</text>
  </g>
  <text x="746" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">추론 시간 10× 증가 (트레이드오프)</text>

  <!-- Bottom note -->
  <rect x="36" y="285" width="808" height="72" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">현대 학습 레시피 (ResNet 기준 ~84% Top-1)</text>
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">RandAugment + Mixup/CutMix + Label Smoothing + EMA + Cosine LR + Weight Decay</text>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">timm 라이브러리가 이 레시피를 구현해둠 — pip install timm</text>
</svg>
