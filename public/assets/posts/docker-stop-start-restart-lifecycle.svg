<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컨테이너 라이프사이클</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">stop · start · restart 상태 전환</text>

  <!-- State: Created -->
  <rect x="60" y="140" width="130" height="56" rx="10" fill="#1a1a30" stroke="#7777cc" stroke-width="2"/>
  <text x="125" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#9999cc">Created</text>
  <text x="125" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">생성됨 (미실행)</text>

  <!-- Arrow: Created -> Running (docker start) -->
  <line x1="190" y1="168" x2="268" y2="168" stroke="#55c555" stroke-width="2"/>
  <polygon points="264,162 278,168 264,174" fill="#55c555"/>
  <text x="226" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">start</text>

  <!-- State: Running -->
  <rect x="278" y="118" width="160" height="100" rx="10" fill="#0d2010" stroke="#55c555" stroke-width="2.5"/>
  <text x="358" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">Running</text>
  <text x="358" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Up Nh</text>
  <text x="358" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정상 실행 중</text>

  <!-- Arrow: Running -> Paused -->
  <line x1="358" y1="118" x2="358" y2="80" stroke="#e8a030" stroke-width="2"/>
  <line x1="358" y1="80" x2="520" y2="80" stroke="#e8a030" stroke-width="2"/>
  <line x1="520" y1="80" x2="520" y2="118" stroke="#e8a030" stroke-width="2"/>
  <polygon points="514,114 520,128 526,114" fill="#e8a030"/>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a030">pause / unpause</text>

  <!-- State: Paused -->
  <rect x="440" y="118" width="160" height="100" rx="10" fill="#1f1400" stroke="#e8a030" stroke-width="2"/>
  <text x="520" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8a030">Paused</text>
  <text x="520" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일시 정지</text>

  <!-- Arrow: Running -> Stopped (docker stop) -->
  <line x1="438" y1="168" x2="516" y2="228" stroke="#e05555" stroke-width="2" stroke-dasharray="0"/>
  <polygon points="510,230 524,238 520,224" fill="#e05555"/>
  <text x="490" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">stop</text>

  <!-- State: Stopped/Exited -->
  <rect x="440" y="260" width="160" height="80" rx="10" fill="#2d0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="520" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">Exited</text>
  <text x="520" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">종료됨 (코드 N)</text>

  <!-- Arrow: Stopped -> Running (docker start) -->
  <line x1="440" y1="300" x2="368" y2="250" stroke="#55c555" stroke-width="2"/>
  <polygon points="374,244 360,238 366,252" fill="#55c555"/>
  <text x="390" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">start</text>

  <!-- Arrow: Running -> Stopped via restart -->
  <line x1="358" y1="218" x2="358" y2="290" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="352,286 358,300 364,286" fill="#7777cc"/>
  <text x="290" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">restart</text>
  <text x="280" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">(stop → start)</text>

  <!-- Arrow: Exited -> Removed (docker rm) -->
  <line x1="600" y1="300" x2="700" y2="300" stroke="#555" stroke-width="2"/>
  <polygon points="696,294 710,300 696,306" fill="#555"/>
  <text x="648" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">rm</text>

  <!-- State: Removed -->
  <rect x="710" y="270" width="110" height="60" rx="10" fill="#111" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="765" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#555">Removed</text>
  <text x="765" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">삭제됨</text>

  <!-- docker run creates+starts directly -->
  <line x1="125" y1="140" x2="125" y2="80" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="125" y1="80" x2="308" y2="80" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="308" y1="80" x2="308" y2="118" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="302,114 308,128 314,114" fill="#7ec8e3"/>
  <text x="60" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">docker run</text>

  <!-- Legend -->
  <text x="60" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">* docker restart = stop + start 순서 실행  ·  강제 종료: docker kill (SIGKILL 즉시 전송)</text>
</svg>
