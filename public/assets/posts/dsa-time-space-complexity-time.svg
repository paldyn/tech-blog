<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">시간 복잡도 분석</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">코드 각 부분의 연산 횟수를 세어 전체 복잡도를 도출한다</text>

  <!-- Section 1: O(1) -->
  <rect x="60" y="90" width="370" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// O(1) — 상수 시간</tspan></text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> getFirst(arr) {</tspan></text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> arr[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">]; </tspan><tspan fill="#9aa4b8">// 1번 접근</tspan></text>
  <text x="76" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
  <rect x="445" y="90" width="100" height="90" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="495" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#55c555" text-anchor="middle">O(1)</text>
  <text x="495" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">최적</text>

  <!-- Section 2: O(n) -->
  <rect x="60" y="200" width="370" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// O(n) — 선형 시간</tspan></text>
  <text x="76" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> sumAll(arr) {</tspan></text>
  <text x="76" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> arr.reduce((a, b) =&gt; a + b, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
  <rect x="445" y="200" width="100" height="90" rx="8" fill="#0f1000" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="495" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#b5cea8" text-anchor="middle">O(n)</text>
  <text x="495" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">양호</text>

  <!-- Section 3: O(n²) -->
  <rect x="60" y="310" width="370" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// O(n²) — 이중 루프</tspan></text>
  <text x="76" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> printPairs(arr) {</tspan></text>
  <text x="76" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (a </tspan><tspan fill="#7ec8e3" font-weight="600">of</tspan><tspan fill="#ffffff"> arr)          </tspan><tspan fill="#9aa4b8">// n</tspan></text>
  <text x="76" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (b </tspan><tspan fill="#7ec8e3" font-weight="600">of</tspan><tspan fill="#ffffff"> arr) </tspan><tspan fill="#9aa4b8">// × n = n²</tspan></text>
  <text x="76" y="412" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
  <rect x="445" y="310" width="100" height="110" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="495" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e05555" text-anchor="middle">O(n²)</text>
  <text x="495" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">주의</text>

  <!-- Right side: Space hint -->
  <rect x="580" y="90" width="260" height="330" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">공간 복잡도</text>
  <text x="596" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">O(1) — 추가 변수 1개</text>
  <text x="596" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">in-place 정렬, 카운터 변수</text>
  <line x1="596" y1="185" x2="824" y2="185" stroke="#333" stroke-width="1"/>
  <text x="596" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">O(n) — 입력 크기 메모리</text>
  <text x="596" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">배열 복사, 해시맵</text>
  <line x1="596" y1="242" x2="824" y2="242" stroke="#333" stroke-width="1"/>
  <text x="596" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">O(log n) — 재귀 스택</text>
  <text x="596" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이진 탐색 재귀 호출</text>
  <line x1="596" y1="299" x2="824" y2="299" stroke="#333" stroke-width="1"/>
  <text x="596" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">O(n²) — 2D 배열</text>
  <text x="596" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DP 테이블, 인접 행렬</text>
  <text x="710" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">* 입력 공간 제외 보조 공간만 계산</text>
</svg>
