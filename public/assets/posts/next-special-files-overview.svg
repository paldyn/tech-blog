<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">app/ 디렉토리 특수 파일</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">각 파일의 역할과 렌더링 우선순위</text>

  <!-- File entries: 2-column grid -->
  <!-- Row 1 -->
  <rect x="60" y="90" width="360" height="80" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="80" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#ce9178">page.tsx</text>
  <text x="80" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해당 경로의 UI를 렌더링하는 파일.</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">URL에 매핑되는 유일한 필수 파일</text>

  <rect x="460" y="90" width="360" height="80" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="480" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#ce9178">layout.tsx</text>
  <text x="480" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">같은 디렉토리와 하위 라우트 모두를</text>
  <text x="480" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">감싸는 지속적 레이아웃 (상태 유지)</text>

  <!-- Row 2 -->
  <rect x="60" y="186" width="360" height="80" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">loading.tsx</text>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">페이지 로딩 중 자동으로 보여주는</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">스켈레톤 / 스피너 UI</text>

  <rect x="460" y="186" width="360" height="80" rx="8" fill="#1a1010" stroke="#4a2020" stroke-width="1.5"/>
  <text x="480" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#e05555">error.tsx</text>
  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">렌더링 중 에러 발생 시 폴백 UI.</text>
  <text x="480" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">'use client' 필수 (reset 가능해야 함)</text>

  <!-- Row 3 -->
  <rect x="60" y="282" width="360" height="80" rx="8" fill="#1a1020" stroke="#5a2d7a" stroke-width="1.5"/>
  <text x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7777cc">not-found.tsx</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">notFound() 함수 호출 또는</text>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">404 응답 시 표시할 UI</text>

  <rect x="460" y="282" width="360" height="80" rx="8" fill="#1a1820" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">template.tsx</text>
  <text x="480" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">layout과 유사하지만 라우트 이동 시마다</text>
  <text x="480" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">새 인스턴스 생성 (상태 초기화)</text>

  <!-- Row 4 -->
  <rect x="60" y="378" width="360" height="80" rx="8" fill="#1a1410" stroke="#4a3a10" stroke-width="1.5"/>
  <text x="80" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#ce9178">route.ts</text>
  <text x="80" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HTTP 핸들러 (GET, POST 등) 정의.</text>
  <text x="80" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">page.tsx와 같은 폴더에 공존 불가</text>

  <rect x="460" y="378" width="360" height="80" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="480" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">middleware.ts</text>
  <text x="480" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">루트에 위치. 요청 전처리.</text>
  <text x="480" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Auth, 리다이렉트, 헤더 추가 등</text>
</svg>
