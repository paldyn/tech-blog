<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">비트 연산 기본 — AND · OR · XOR · NOT · SHIFT</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">A = 0b1100 (12), B = 0b1010 (10) 기준 예시</text>

  <!-- AND -->
  <rect x="60" y="90" width="230" height="120" fill="#111" stroke="#3a4a6e" stroke-width="1" rx="8"/>
  <text x="175" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">AND (&amp;)</text>
  <text x="175" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">둘 다 1일 때만 1</text>
  <text x="90" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  1 1 0 0  (A=12)</text>
  <text x="90" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">&amp; 1 0 1 0  (B=10)</text>
  <line x1="84" y1="180" x2="280" y2="180" stroke="#333" stroke-width="1"/>
  <text x="90" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">= 1 0 0 0  = 8</text>

  <!-- OR -->
  <rect x="310" y="90" width="230" height="120" fill="#111" stroke="#3a4a6e" stroke-width="1" rx="8"/>
  <text x="425" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">OR (|)</text>
  <text x="425" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">하나라도 1이면 1</text>
  <text x="340" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  1 1 0 0  (A=12)</text>
  <text x="340" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">| 1 0 1 0  (B=10)</text>
  <line x1="334" y1="180" x2="530" y2="180" stroke="#333" stroke-width="1"/>
  <text x="340" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">= 1 1 1 0  = 14</text>

  <!-- XOR -->
  <rect x="560" y="90" width="260" height="120" fill="#111" stroke="#3a4a6e" stroke-width="1" rx="8"/>
  <text x="690" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">XOR (^)</text>
  <text x="690" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">값이 다를 때만 1</text>
  <text x="590" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  1 1 0 0  (A=12)</text>
  <text x="590" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">^ 1 0 1 0  (B=10)</text>
  <line x1="584" y1="180" x2="808" y2="180" stroke="#333" stroke-width="1"/>
  <text x="590" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">= 0 1 1 0  = 6</text>

  <!-- NOT and SHIFTS -->
  <rect x="60" y="232" width="230" height="120" fill="#111" stroke="#3a4a6e" stroke-width="1" rx="8"/>
  <text x="175" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">LEFT SHIFT (&lt;&lt;)</text>
  <text x="175" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">×2^k (2의 거듭제곱 곱하기)</text>
  <text x="90" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  0 0 1 1  (A=3)</text>
  <text x="90" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">&lt;&lt; 2</text>
  <line x1="84" y1="320" x2="280" y2="320" stroke="#333" stroke-width="1"/>
  <text x="90" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">= 1 1 0 0  = 12</text>

  <rect x="310" y="232" width="230" height="120" fill="#111" stroke="#3a4a6e" stroke-width="1" rx="8"/>
  <text x="425" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">RIGHT SHIFT (&gt;&gt;)</text>
  <text x="425" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">÷2^k (정수 나눗셈)</text>
  <text x="340" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  1 1 0 0  (A=12)</text>
  <text x="340" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">&gt;&gt; 2</text>
  <line x1="334" y1="320" x2="530" y2="320" stroke="#333" stroke-width="1"/>
  <text x="340" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">= 0 0 1 1  = 3</text>

  <!-- NOT -->
  <rect x="560" y="232" width="260" height="120" fill="#111" stroke="#3a4a6e" stroke-width="1" rx="8"/>
  <text x="690" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">NOT (~)</text>
  <text x="690" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비트 반전 (2의 보수)</text>
  <text x="590" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">~5 = -(5+1) = -6</text>
  <text x="590" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">~0 = -1</text>
  <text x="590" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">(부호 있는 정수에 주의)</text>

  <!-- Common tricks -->
  <rect x="60" y="372" width="760" height="104" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="8"/>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">자주 쓰는 비트 트릭</text>

  <text x="84" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// i번째 비트 검사</text>
  <text x="84" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">n &amp; (1 &lt;&lt; i)</text>
  <text x="84" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// i번째 비트 세트</text>
  <text x="84" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">n | (1 &lt;&lt; i)</text>

  <text x="290" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// i번째 비트 클리어</text>
  <text x="290" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">n &amp; ~(1 &lt;&lt; i)</text>
  <text x="290" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 최하위 비트 추출</text>
  <text x="290" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">n &amp; (-n)</text>

  <text x="500" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 2의 거듭제곱 여부</text>
  <text x="500" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">n &amp; (n-1) == 0</text>
  <text x="500" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// XOR 스왑</text>
  <text x="500" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">a^=b; b^=a; a^=b</text>
</svg>
