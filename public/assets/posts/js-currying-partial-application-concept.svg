<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">커링 vs 부분 적용</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Currying vs Partial Application</text>

  <!-- Currying Column -->
  <rect x="60" y="90" width="360" height="290" fill="#0d0d1a" rx="10" stroke="#1a1a3a" stroke-width="1.5"/>
  <text x="240" y="114" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">커링 (Currying)</text>
  <text x="240" y="132" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">n개 인자 → 1개씩 받는 함수 체인</text>

  <rect x="76" y="142" width="328" height="216" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="162" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 일반 함수</text>
  <text x="92" y="180" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> add = (a, b) =&gt; a + b;</text>
  <text x="92" y="202" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 커링된 함수</text>
  <text x="92" y="220" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> curriedAdd =</text>
  <text x="92" y="238" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  a =&gt; b =&gt; a + b;</text>
  <text x="92" y="260" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 호출: 1개씩</text>
  <text x="92" y="278" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">curriedAdd(<tspan fill="#b5cea8">2</tspan>)(<tspan fill="#b5cea8">3</tspan>); <tspan fill="#6a8aa0">// 5</tspan></text>
  <text x="92" y="296" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> add5 = curriedAdd(<tspan fill="#b5cea8">5</tspan>);</text>
  <text x="92" y="314" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">add5(<tspan fill="#b5cea8">10</tspan>); <tspan fill="#6a8aa0">// 15</tspan></text>
  <text x="92" y="332" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">add5(<tspan fill="#b5cea8">20</tspan>); <tspan fill="#6a8aa0">// 25</tspan></text>

  <!-- Partial Application Column -->
  <rect x="460" y="90" width="360" height="290" fill="#0d1a0d" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="640" y="114" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">부분 적용 (Partial Application)</text>
  <text x="640" y="132" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">일부 인자를 미리 고정</text>

  <rect x="476" y="142" width="328" height="216" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="162" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// bind로 부분 적용</text>
  <text x="492" y="180" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> <tspan fill="#e8e8e8">multiply</tspan>(a, b) {</text>
  <text x="492" y="198" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return</tspan> a * b;</text>
  <text x="492" y="216" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="492" y="238" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// a=2 고정</text>
  <text x="492" y="256" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> double =</text>
  <text x="492" y="274" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  multiply.bind(<tspan fill="#7ec8e3">null</tspan>, <tspan fill="#b5cea8">2</tspan>);</text>
  <text x="492" y="296" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">double(<tspan fill="#b5cea8">5</tspan>);  <tspan fill="#6a8aa0">// 10</tspan></text>
  <text x="492" y="314" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">double(<tspan fill="#b5cea8">8</tspan>);  <tspan fill="#6a8aa0">// 16</tspan></text>
  <text x="492" y="332" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">double(<tspan fill="#b5cea8">21</tspan>); <tspan fill="#6a8aa0">// 42</tspan></text>

  <!-- Flow diagram -->
  <rect x="60" y="400" width="760" height="60" fill="#0d0d0d" rx="8" stroke="#1e2433" stroke-width="1"/>
  <!-- Currying chain visualization -->
  <rect x="80" y="416" width="80" height="28" fill="#1a1a3a" rx="6"/>
  <text x="120" y="434" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">f(a,b,c)</text>
  <polygon points="166,430 178,424 178,436" fill="#7ec8e3"/>
  <rect x="180" y="416" width="80" height="28" fill="#1a1a3a" rx="6"/>
  <text x="220" y="434" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">a⇒b⇒c</text>
  <polygon points="266,430 278,424 278,436" fill="#7ec8e3"/>
  <rect x="280" y="416" width="80" height="28" fill="#1a1a3a" rx="6"/>
  <text x="320" y="434" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">결과값</text>

  <!-- Separator -->
  <line x1="420" y1="406" x2="420" y2="460" stroke="#333" stroke-width="1"/>

  <!-- Partial app chain visualization -->
  <rect x="440" y="416" width="80" height="28" fill="#0a1a0a" rx="6"/>
  <text x="480" y="434" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">f(a,b,c)</text>
  <polygon points="526,430 538,424 538,436" fill="#55c555"/>
  <rect x="540" y="416" width="100" height="28" fill="#0a1a0a" rx="6"/>
  <text x="590" y="434" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">g=f(a,_,_)</text>
  <polygon points="646,430 658,424 658,436" fill="#55c555"/>
  <rect x="660" y="416" width="80" height="28" fill="#0a1a0a" rx="6"/>
  <text x="700" y="434" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">g(b,c)</text>

  <!-- Footer -->
  <text x="440" y="482" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
