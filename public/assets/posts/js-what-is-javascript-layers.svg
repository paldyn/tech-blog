<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8">웹의 세 가지 층</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#555">HTML · CSS · JavaScript 각각의 역할</text>

  <!-- HTML Layer -->
  <rect x="60" y="100" width="220" height="260" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="60" y="100" width="220" height="44" rx="12" fill="#2a2a1a"/>
  <rect x="60" y="132" width="220" height="12" fill="#2a2a1a"/>
  <text x="170" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#d4a84b">HTML</text>
  <text x="170" y="152" text-anchor="middle" font-size="12" fill="#888">구조 · 뼈대</text>
  <text x="80" y="186" font-size="11" fill="#555">&lt;header&gt;</text>
  <text x="80" y="204" font-size="11" fill="#555">  &lt;h1&gt;제목&lt;/h1&gt;</text>
  <text x="80" y="222" font-size="11" fill="#555">&lt;/header&gt;</text>
  <text x="80" y="240" font-size="11" fill="#555">&lt;main&gt;</text>
  <text x="80" y="258" font-size="11" fill="#555">  &lt;p&gt;내용&lt;/p&gt;</text>
  <text x="80" y="276" font-size="11" fill="#555">&lt;/main&gt;</text>
  <text x="170" y="330" text-anchor="middle" font-size="11" fill="#555">콘텐츠의 의미와 구조를</text>
  <text x="170" y="346" text-anchor="middle" font-size="11" fill="#555">정의합니다</text>

  <!-- CSS Layer -->
  <rect x="330" y="100" width="220" height="260" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="330" y="100" width="220" height="44" rx="12" fill="#1a2a1a"/>
  <rect x="330" y="132" width="220" height="12" fill="#1a2a1a"/>
  <text x="440" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#6abf5e">CSS</text>
  <text x="440" y="152" text-anchor="middle" font-size="12" fill="#888">표현 · 외관</text>
  <text x="350" y="186" font-size="11" fill="#555">h1 {</text>
  <text x="350" y="204" font-size="11" fill="#555">  color: #333;</text>
  <text x="350" y="222" font-size="11" fill="#555">  font-size: 2rem;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="350" y="240" font-size="11" fill="#555">}</text>
  <text x="350" y="258" font-size="11" fill="#555">p { line-height:</text>
  <text x="350" y="276" font-size="11" fill="#555">      1.6; }</text>
  <text x="440" y="330" text-anchor="middle" font-size="11" fill="#555">색상·레이아웃·애니메이션을</text>
  <text x="440" y="346" text-anchor="middle" font-size="11" fill="#555">담당합니다</text>

  <!-- JS Layer -->
  <rect x="600" y="100" width="220" height="260" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="600" y="100" width="220" height="44" rx="12" fill="#1a1a2a"/>
  <rect x="600" y="132" width="220" height="12" fill="#1a1a2a"/>
  <text x="710" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#6b9fff">JavaScript</text>
  <text x="710" y="152" text-anchor="middle" font-size="12" fill="#888">동작 · 상호작용</text>
  <text x="620" y="186" font-size="11" fill="#555">btn.onclick = () =&gt; {</text>
  <text x="620" y="204" font-size="11" fill="#555">  modal.show();</text>
  <text x="620" y="222" font-size="11" fill="#555">  fetch('/api/data')</text>
  <text x="620" y="240" font-size="11" fill="#555">    .then(render);</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="620" y="258" font-size="11" fill="#555">}</text>
  <text x="710" y="330" text-anchor="middle" font-size="11" fill="#555">클릭·데이터 로딩·DOM</text>
  <text x="710" y="346" text-anchor="middle" font-size="11" fill="#555">조작을 처리합니다</text>

  <!-- Arrow: HTML -> CSS -->
  <line x1="280" y1="228" x2="330" y2="228" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Arrow: CSS -> JS -->
  <line x1="550" y1="228" x2="600" y2="228" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom note -->
  <text x="440" y="396" text-anchor="middle" font-size="12" fill="#444">세 가지가 함께 작동하여 완전한 웹 경험을 만들어냅니다</text>
</svg>
