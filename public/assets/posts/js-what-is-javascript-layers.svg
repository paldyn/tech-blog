<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">웹의 세 가지 층</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#666">HTML · CSS · JavaScript 각각의 역할</text>

  <!-- Card 1: HTML -->
  <rect x="40" y="104" width="252" height="284" rx="12" fill="#1a1208" stroke="#5a3a1a" stroke-width="1.5"/>
  <rect x="40" y="104" width="252" height="44" rx="12" fill="#2a1f10"/>
  <rect x="40" y="136" width="252" height="12" fill="#2a1f10"/>
  <text x="166" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#e09b5e">HTML</text>
  <text x="166" y="172" text-anchor="middle" font-size="11" fill="#888">구조 · 뼈대</text>

  <rect x="56" y="184" width="220" height="116" rx="6" fill="#0f0a05" stroke="#3a2a10" stroke-width="1"/>
  <text x="70" y="206" font-size="11" fill="#d8b080" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">&lt;header&gt;</text>
  <text x="86" y="222" font-size="11" fill="#aa8866" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">&lt;h1&gt;제목&lt;/h1&gt;</text>
  <text x="70" y="238" font-size="11" fill="#d8b080" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">&lt;/header&gt;</text>
  <text x="70" y="262" font-size="11" fill="#d8b080" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">&lt;main&gt;</text>
  <text x="86" y="278" font-size="11" fill="#aa8866" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">&lt;p&gt;내용&lt;/p&gt;</text>
  <text x="70" y="294" font-size="11" fill="#d8b080" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">&lt;/main&gt;</text>

  <text x="166" y="338" text-anchor="middle" font-size="12" fill="#888">콘텐츠의 의미와 구조를</text>
  <text x="166" y="358" text-anchor="middle" font-size="12" fill="#888">정의한다</text>

  <!-- Card 2: CSS -->
  <rect x="314" y="104" width="252" height="284" rx="12" fill="#0e1a0e" stroke="#22552a" stroke-width="1.5"/>
  <rect x="314" y="104" width="252" height="44" rx="12" fill="#152a18"/>
  <rect x="314" y="136" width="252" height="12" fill="#152a18"/>
  <text x="440" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#77cc88">CSS</text>
  <text x="440" y="172" text-anchor="middle" font-size="11" fill="#888">표현 · 외관</text>

  <rect x="330" y="184" width="220" height="116" rx="6" fill="#070f08" stroke="#1a3a1a" stroke-width="1"/>
  <text x="344" y="206" font-size="11" fill="#aaddaa" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">h1 {</text>
  <text x="360" y="222" font-size="11" fill="#88cc99" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">color: #333;</text>
  <text x="360" y="238" font-size="11" fill="#88cc99" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">font-size: 2rem;</text>
  <text x="344" y="254" font-size="11" fill="#aaddaa" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="344" y="278" font-size="11" fill="#aaddaa" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">p {</text>
  <text x="360" y="294" font-size="11" fill="#88cc99" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">line-height: 1.6;</text>

  <text x="440" y="338" text-anchor="middle" font-size="12" fill="#888">레이아웃·색·타이포 등</text>
  <text x="440" y="358" text-anchor="middle" font-size="12" fill="#888">시각적 표현을 담당</text>

  <!-- Card 3: JavaScript -->
  <rect x="588" y="104" width="252" height="284" rx="12" fill="#1a1808" stroke="#5a521a" stroke-width="1.5"/>
  <rect x="588" y="104" width="252" height="44" rx="12" fill="#2a2810"/>
  <rect x="588" y="136" width="252" height="12" fill="#2a2810"/>
  <text x="714" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#e0d068">JavaScript</text>
  <text x="714" y="172" text-anchor="middle" font-size="11" fill="#888">동작 · 상호작용</text>

  <rect x="604" y="184" width="220" height="116" rx="6" fill="#0f0e05" stroke="#3a3210" stroke-width="1"/>
  <text x="618" y="206" font-size="11" fill="#d8d080" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">btn.onclick = () =&gt; {</text>
  <text x="634" y="222" font-size="11" fill="#aaa066" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">modal.show();</text>
  <text x="634" y="246" font-size="11" fill="#aaa066" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">fetch('/api/data')</text>
  <text x="650" y="262" font-size="11" fill="#aaa066" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">.then(render);</text>
  <text x="618" y="286" font-size="11" fill="#d8d080" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">};</text>

  <text x="714" y="338" text-anchor="middle" font-size="12" fill="#888">클릭 · 데이터 로딩 · DOM</text>
  <text x="714" y="358" text-anchor="middle" font-size="12" fill="#888">조작 등 동작을 처리</text>

  <!-- Footer -->
  <text x="440" y="420" text-anchor="middle" font-size="11" fill="#555">세 층이 함께 작동해야 완전한 웹 경험이 만들어진다</text>
</svg>
