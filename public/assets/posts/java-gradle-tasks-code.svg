<svg xmlns="http://www.w3.org/2000/svg" width="880" height="404" viewBox="0 0 880 404">
  <rect width="880" height="404" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커스텀 Task 정의</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">register · doLast · dependsOn</text>

  <rect x="60" y="90" width="760" height="294" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="78" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  >// build.gradle.kts</text>
  <text x="78" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">tasks</tspan>.register(<tspan fill="#ce9178">"greet"</tspan>) {</text>
  <text x="78" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    group = <tspan fill="#ce9178">"custom"</tspan></text>
  <text x="78" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    description = <tspan fill="#ce9178">"인사를 출력한다"</tspan></text>
  <text x="78" y="206" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#7ec8e3" font-weight="600">doLast</tspan> {            <tspan fill="#9aa4b8">// 실행 단계 Action</tspan></text>
  <text x="78" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        println(<tspan fill="#ce9178">"Hello, Gradle!"</tspan>)</text>
  <text x="78" y="246" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    }</text>
  <text x="78" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
  <text x="78" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  >// build 가 greet 후에 실행되도록 연결</text>
  <text x="78" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">tasks</tspan>.named(<tspan fill="#ce9178">"build"</tspan>) {</text>
  <text x="78" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#7ec8e3" font-weight="600">dependsOn</tspan>(<tspan fill="#ce9178">"greet"</tspan>)</text>
  <text x="78" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
  <text x="78" y="376" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8"
  >$ ./gradlew greet   <tspan fill="#9aa4b8">→ Hello, Gradle!</tspan></text>
</svg>
