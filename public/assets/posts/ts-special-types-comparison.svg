<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">특수 타입 완전 비교</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">any, unknown, never, void — 각자의 역할과 사용 시점</text>

  <!-- any -->
  <rect x="60" y="96" width="370" height="200" rx="10" fill="#1a0d00" stroke="#8e6e00" stroke-width="1.5"/>
  <text x="84" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#b5cea8">any</text>
  <text x="84" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">모든 타입 허용. 타입 검사 완전 비활성화</text>
  <text x="84" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">가능하면 사용하지 말 것</text>
  <rect x="84" y="182" width="326" height="80" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> x: </tspan><tspan fill="#b5cea8">any</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="100" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">x = </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#9aa4b8"> // OK</tspan></text>
  <text x="100" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">x.foo();</tspan><tspan fill="#9aa4b8">      // OK (검사 없음!)</tspan></text>
  <text x="84" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">점진적 마이그레이션 시 임시 사용</text>

  <!-- unknown -->
  <rect x="450" y="96" width="370" height="200" rx="10" fill="#001a0d" stroke="#007e4e" stroke-width="1.5"/>
  <text x="474" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#55c555">unknown</text>
  <text x="474" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">타입 불명확 시 any 대신 사용</text>
  <text x="474" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">타입 좁히기 후에만 사용 가능</text>
  <rect x="474" y="182" width="326" height="80" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> y: </tspan><tspan fill="#55c555">unknown</tspan><tspan fill="#ffffff"> = fetchData();</tspan></text>
  <text x="490" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (typeof y === </tspan><tspan fill="#ce9178">"string"</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="490" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  y.toUpperCase(); </tspan><tspan fill="#9aa4b8">// 안전!</tspan></text>
  <text x="474" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">외부 API 응답, JSON 파싱 결과에 활용</text>

  <!-- never -->
  <rect x="60" y="310" width="370" height="180" rx="10" fill="#1a001a" stroke="#6e006e" stroke-width="1.5"/>
  <text x="84" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#7777cc">never</text>
  <text x="84" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">절대 도달할 수 없는 코드. 모든 타입의 하위 타입</text>
  <text x="84" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">항상 예외를 던지거나 무한 루프인 함수</text>
  <rect x="84" y="396" width="326" height="60" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> fail(): </tspan><tspan fill="#7777cc">never</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="100" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">  throw new</tspan><tspan fill="#ffffff"> Error(</tspan><tspan fill="#ce9178">"!"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">exhaustiveness check에 활용</text>

  <!-- void -->
  <rect x="450" y="310" width="370" height="180" rx="10" fill="#0a0a1a" stroke="#2a2a6e" stroke-width="1.5"/>
  <text x="474" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#7ec8e3">void</text>
  <text x="474" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">반환값이 없는 함수의 반환 타입</text>
  <text x="474" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">함수가 undefined를 반환함을 명시</text>
  <rect x="474" y="396" width="326" height="60" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> log(msg: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">): </tspan><tspan fill="#7ec8e3">void</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="490" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  console.log(msg);</tspan></text>
  <text x="474" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">콜백 함수 반환 타입으로 자주 사용</text>

  <!-- Bottom summary -->
  <text x="440" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">any &gt; unknown &gt; 일반타입 &gt; never (타입 계층 위에서 아래로)</text>
</svg>
