<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="au" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring Boot 레이어 스택</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">실무 프로젝트가 사용하는 전형적인 레이어 구성</text>

  <!-- Layers stacked -->
  <!-- Layer 5: Application code -->
  <rect x="100" y="100" width="680" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">비즈니스 코드 (Controller / Service / Repository)</text>
  <text x="440" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">개발자가 직접 작성하는 POJO 계층</text>

  <!-- Layer 4: Spring Boot Starters -->
  <rect x="100" y="168" width="680" height="56" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Spring Boot Starters</text>
  <text x="440" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">web, data-jpa, security, actuator, test — 의존성 번들</text>

  <!-- Layer 3: Spring Projects -->
  <rect x="100" y="236" width="680" height="56" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Spring Projects (MVC, Data, Security, Cloud...)</text>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 도메인별 기능 모듈</text>

  <!-- Layer 2: Spring Framework Core -->
  <rect x="100" y="304" width="680" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Spring Framework Core (IoC / DI / AOP / Data Access)</text>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 Spring 프로젝트의 기반</text>

  <!-- Layer 1: JVM -->
  <rect x="100" y="372" width="680" height="56" rx="6" fill="#1a1010" stroke="#9aa4b8" stroke-width="1"/>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#9aa4b8">JVM / Java SE (Jakarta EE API)</text>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실행 환경 기반 — JDK 17+ (Spring 6, Boot 3)</text>
</svg>
