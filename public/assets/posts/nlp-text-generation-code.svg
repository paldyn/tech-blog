<svg width="880" height="380" viewBox="0 0 880 380"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">GPT 계열 텍스트 생성 구현</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">HuggingFace generate() 파라미터 완전 활용</text>

  <!-- Left: generation code -->
  <text x="220" y="96" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">① 텍스트 생성</text>
  <rect x="40" y="108" width="360" height="234" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="56" y="129" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">from </text>
  <text x="96" y="129" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">transformers </text>
  <text x="216" y="129" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">import</text>
  <text x="56" y="147" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    AutoTokenizer, AutoModelForCausalLM</text>

  <text x="56" y="171" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">tok </text>
  <text x="80" y="171" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="96" y="171" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">AutoTokenizer.from_pretrained(</text>
  <text x="56" y="189" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    "skt/ko-gpt-trinity-1.2B-v0.5"</text>
  <text x="56" y="207" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>
  <text x="56" y="225" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">model </text>
  <text x="92" y="225" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="108" y="225" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">AutoModelForCausalLM.from_pretrained(</text>
  <text x="56" y="243" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    "skt/ko-gpt-trinity-1.2B-v0.5"</text>
  <text x="56" y="261" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>

  <text x="56" y="285" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">prompt </text>
  <text x="104" y="285" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="120" y="285" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"오늘 날씨가"</text>
  <text x="56" y="303" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">ids </text>
  <text x="80" y="303" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="96" y="303" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">tok(prompt, return_tensors=</text>
  <text x="56" y="321" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">              "pt").input_ids</text>

  <!-- Right: generate params -->
  <text x="660" y="96" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">② 생성 파라미터</text>
  <rect x="480" y="108" width="360" height="234" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="496" y="129" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">out </text>
  <text x="520" y="129" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="536" y="129" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">model.generate(</text>
  <text x="496" y="147" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    ids,</text>
  <text x="496" y="165" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    max_new_tokens=</text>
  <text x="616" y="165" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">100</text>
  <text x="636" y="165" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">,</text>
  <text x="496" y="183" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    do_sample=</text>
  <text x="580" y="183" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">True</text>
  <text x="608" y="183" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">,</text>
  <text x="496" y="201" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    temperature=</text>
  <text x="588" y="201" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">0.8</text>
  <text x="612" y="201" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">,</text>
  <text x="496" y="219" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    top_p=</text>
  <text x="548" y="219" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">0.9</text>
  <text x="572" y="219" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">,</text>
  <text x="496" y="237" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    repetition_penalty=</text>
  <text x="636" y="237" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">1.3</text>
  <text x="660" y="237" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">,</text>
  <text x="496" y="255" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    no_repeat_ngram_size=</text>
  <text x="656" y="255" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">3</text>
  <text x="664" y="255" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">,</text>
  <text x="496" y="273" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    eos_token_id=tok.eos_token_id,</text>
  <text x="496" y="291" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    pad_token_id=tok.eos_token_id,</text>
  <text x="496" y="309" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>
  <text x="496" y="333" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">text </text>
  <text x="524" y="333" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="540" y="333" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">tok.decode(out[</text>
  <text x="648" y="333" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">0</text>
  <text x="656" y="333" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">])</text>

  <!-- Bottom -->
  <text x="440" y="362" text-anchor="middle" fill="#888" font-size="12">perplexity로 언어 모델 품질 측정: PPL = exp(-1/N × Σ log P(토큰_i))</text>
</svg>
