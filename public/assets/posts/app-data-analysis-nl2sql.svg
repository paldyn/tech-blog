<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">NL2SQL 데이터 분석 아키텍처</text>

  <!-- Input: Natural Language -->
  <rect x="60" y="80" width="220" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="104" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">자연어 질문</text>
  <text x="170" y="125" text-anchor="middle" font-size="12" fill="#888">"지난 달 매출 상위 5개"</text>

  <line x1="280" y1="110" x2="340" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>
  <text x="310" y="103" text-anchor="middle" font-size="11" fill="#888">+스키마</text>

  <!-- LLM SQL Gen -->
  <rect x="340" y="80" width="220" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="450" y="104" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">LLM SQL 생성</text>
  <text x="450" y="125" text-anchor="middle" font-size="12" fill="#888">스키마 + 쿼리 → SQL</text>

  <line x1="560" y1="110" x2="620" y2="110" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Validation -->
  <rect x="620" y="80" width="200" height="60" rx="8" fill="#1a1200" stroke="#e09060" stroke-width="1.5"/>
  <text x="720" y="104" text-anchor="middle" font-size="15" font-weight="600" fill="#e09060">SQL 검증</text>
  <text x="720" y="125" text-anchor="middle" font-size="12" fill="#888">파싱 · 권한 확인</text>

  <!-- Code block: NL2SQL prompt -->
  <rect x="60" y="186" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 스키마 프롬프트 예시</text>
  <text x="80" y="229" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">schema</text>
  <text x="80" y="229" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">       = </text>
  <text x="168" y="229" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"orders(id,user_id,amount,date)"</text>
  <text x="80" y="248" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">question</text>
  <text x="80" y="248" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        = </text>
  <text x="192" y="248" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"지난 달 사용자별 주문 총액 TOP 5"</text>
  <text x="80" y="285" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">→ SELECT user_id, SUM(amount) ...</text>

  <!-- Execute + Explain -->
  <rect x="60" y="356" width="360" height="60" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="380" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">DB 실행 · 결과 반환</text>
  <text x="240" y="401" text-anchor="middle" font-size="12" fill="#888">읽기 전용 · 타임아웃 설정</text>

  <line x1="720" y1="140" x2="720" y2="356" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="500" y="356" width="360" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="680" y="380" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">자연어 결과 설명</text>
  <text x="680" y="401" text-anchor="middle" font-size="12" fill="#888">표 + 인사이트 요약 생성</text>

  <line x1="420" y1="386" x2="500" y2="386" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>
</svg>
