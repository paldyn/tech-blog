<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CORS Preflight 흐름</text>

  <!-- Browser and Server boxes -->
  <rect x="80" y="70" width="140" height="52" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">브라우저</text>
  <text x="150" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">app.example.com</text>

  <rect x="660" y="70" width="140" height="52" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">API 서버</text>
  <text x="730" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">api.example.com</text>

  <!-- Preflight request -->
  <text x="150" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">① Preflight 요청</text>
  <line x1="220" y1="172" x2="658" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="260" y="182" width="360" height="70" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="276" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">OPTIONS /api/data HTTP/1.1</text>
  <text x="276" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">Origin: https://app.example.com</text>
  <text x="276" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">Access-Control-Request-Method: POST</text>

  <!-- Preflight response -->
  <text x="730" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">② Preflight 응답</text>
  <line x1="658" y1="290" x2="222" y2="290" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="260" y="300" width="360" height="70" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="276" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">HTTP/1.1 204 No Content</text>
  <text x="276" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">Access-Control-Allow-Origin:</text>
  <text x="276" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">  https://app.example.com</text>

  <!-- Actual request -->
  <text x="150" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">③ 실제 요청</text>
  <line x1="220" y1="412" x2="658" y2="412" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="500" y="422" width="230" height="44" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">POST /api/data HTTP/1.1</text>
  <text x="516" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">Origin: https://app.example.com</text>
</svg>
