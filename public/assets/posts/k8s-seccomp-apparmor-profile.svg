<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Seccomp 커스텀 프로파일 구조</text>

  <!-- Left: Seccomp JSON -->
  <rect x="50" y="62" width="380" height="300" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">seccomp 프로파일 JSON</text>
  <rect x="66" y="98" width="348" height="244" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">{</text>
  <text x="82" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  "defaultAction":</text>
  <text x="82" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">                     "SCMP_ACT_ERRNO",</text>
  <text x="82" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">  // 목록에 없는 모든 syscall 차단</text>
  <text x="82" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  "syscalls": [</text>
  <text x="82" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    {</text>
  <text x="82" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">      "names": </text>
  <text x="82" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">               ["read","write","open",</text>
  <text x="82" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">                "close","stat","mmap"],</text>
  <text x="82" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">      "action": </text>
  <text x="82" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">                 "SCMP_ACT_ALLOW"</text>
  <text x="82" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    }</text>
  <text x="82" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  ]</text>
  <text x="82" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>

  <!-- Right: Pod spec applying it -->
  <rect x="460" y="62" width="380" height="300" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="650" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Pod에 Localhost 프로파일 적용</text>
  <rect x="476" y="98" width="348" height="244" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 노드에 프로파일 배포</text>
  <text x="492" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># /var/lib/kubelet/seccomp/</text>
  <text x="492" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">#   profiles/my-app.json</text>
  <text x="492" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">spec:</text>
  <text x="492" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  securityContext:</text>
  <text x="492" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">    seccompProfile:</text>
  <text x="492" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">      type: Localhost</text>
  <text x="492" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">      localhostProfile:</text>
  <text x="492" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">        profiles/my-app.json</text>
  <text x="492" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># DaemonSet으로 전체 노드</text>
  <text x="492" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 에 프로파일 배포 필요</text>

  <!-- Bottom note -->
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">프로파일 개발 시 audit 모드로 시작: defaultAction: "SCMP_ACT_LOG" → 로그로 필요한 syscall 파악</text>
</svg>
