<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Studio N — 설계 → 개발 → 실행 워크플로</text>
  <text x="440" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#888">형식 편집기(Format Editor)와 Script 편집기 연동 흐름</text>

  <!-- Step boxes -->
  <!-- Step 1: Design -->
  <rect x="60" y="104" width="170" height="290" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <rect x="60" y="104" width="170" height="36" rx="8" fill="#12233a"/>
  <rect x="60" y="128" width="170" height="12" fill="#12233a"/>
  <text x="145" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">① Design</text>
  <text x="145" y="150" text-anchor="middle" font-size="12" fill="#888">폼 레이아웃 설계</text>
  <text x="80" y="178" font-size="12" fill="#e8e8e8">• Toolbox에서</text>
  <text x="80" y="196" font-size="12" fill="#e8e8e8">  컴포넌트 드래그</text>
  <text x="80" y="218" font-size="12" fill="#e8e8e8">• Properties에서</text>
  <text x="80" y="236" font-size="12" fill="#e8e8e8">  name/size 설정</text>
  <text x="80" y="258" font-size="12" fill="#e8e8e8">• Format Editor로</text>
  <text x="80" y="276" font-size="12" fill="#e8e8e8">  Grid 컬럼 설정</text>
  <text x="80" y="298" font-size="12" fill="#e8e8e8">• CSS로 스타일</text>
  <text x="80" y="316" font-size="12" fill="#e8e8e8">  지정</text>
  <text x="145" y="370" text-anchor="middle" font-size="11" fill="#6a8aa0">.xfdl 파일 저장</text>

  <!-- Arrow 1→2 -->
  <polygon points="242,240 272,224 272,256" fill="#7ec8e3" stroke="#4a8fb0" stroke-width="1"/>
  <line x1="230" y1="240" x2="260" y2="240" stroke="#7ec8e3" stroke-width="3"/>
  <text x="256" y="214" text-anchor="middle" font-size="11" fill="#7ec8e3">편집</text>

  <!-- Step 2: Script -->
  <rect x="274" y="104" width="170" height="290" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <rect x="274" y="104" width="170" height="36" rx="8" fill="#1a2535"/>
  <rect x="274" y="128" width="170" height="12" fill="#1a2535"/>
  <text x="359" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">② Script</text>
  <text x="359" y="150" text-anchor="middle" font-size="12" fill="#888">이벤트 핸들러 작성</text>

  <!-- code block inside Step 2 -->
  <rect x="284" y="162" width="150" height="160" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="294" y="182" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0">// 조회 버튼 클릭</text>
  <text x="294" y="200" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">function</text>
  <text x="358" y="200" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8"> btn_</text>
  <text x="294" y="218" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">  onclick(obj,e)</text>
  <text x="294" y="236" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">{</text>
  <text x="308" y="254" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">  this</text>
  <text x="336" y="254" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">.fn_search</text>
  <text x="308" y="272" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">  ();</text>
  <text x="294" y="290" xml:space="preserve" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">}</text>
  <text x="359" y="352" text-anchor="middle" font-size="11" fill="#6a8aa0">Ctrl+S 저장</text>
  <text x="359" y="370" text-anchor="middle" font-size="11" fill="#6a8aa0">후 F5 실행</text>

  <!-- Arrow 2→3 -->
  <polygon points="456,240 486,224 486,256" fill="#55c555" stroke="#338833" stroke-width="1"/>
  <line x1="444" y1="240" x2="474" y2="240" stroke="#55c555" stroke-width="3"/>
  <text x="470" y="214" text-anchor="middle" font-size="11" fill="#55c555">실행</text>

  <!-- Step 3: Run / Debug -->
  <rect x="488" y="104" width="170" height="290" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <rect x="488" y="104" width="170" height="36" rx="8" fill="#1f2b1a"/>
  <rect x="488" y="128" width="170" height="12" fill="#1f2b1a"/>
  <text x="573" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">③ Test Run</text>
  <text x="573" y="150" text-anchor="middle" font-size="12" fill="#888">내장 런타임으로 즉시 확인</text>
  <text x="508" y="178" font-size="12" fill="#e8e8e8">• F5: 전체 실행</text>
  <text x="508" y="198" font-size="12" fill="#e8e8e8">• F6: 현재 폼만</text>
  <text x="508" y="218" font-size="12" fill="#e8e8e8">• 브라우저 불필요</text>
  <text x="508" y="242" font-size="12" fill="#e8e8e8">• 출력 창에서</text>
  <text x="508" y="260" font-size="12" fill="#e8e8e8">  로그 확인</text>
  <text x="508" y="284" font-size="12" fill="#e8e8e8">• Breakpoint 설정</text>
  <text x="508" y="302" font-size="12" fill="#e8e8e8">  후 F9 디버그</text>
  <text x="573" y="356" text-anchor="middle" font-size="11" fill="#6a8aa0">오류 발견 →</text>
  <text x="573" y="374" text-anchor="middle" font-size="11" fill="#6a8aa0">② Script 수정</text>

  <!-- Arrow 3→4 -->
  <polygon points="670,240 700,224 700,256" fill="#7777cc" stroke="#4455aa" stroke-width="1"/>
  <line x1="658" y1="240" x2="688" y2="240" stroke="#7777cc" stroke-width="3"/>
  <text x="684" y="214" text-anchor="middle" font-size="11" fill="#7777cc">배포</text>

  <!-- Step 4: Build -->
  <rect x="702" y="104" width="118" height="290" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <rect x="702" y="104" width="118" height="36" rx="8" fill="#1a1530"/>
  <rect x="702" y="128" width="118" height="12" fill="#1a1530"/>
  <text x="761" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">④ Build</text>
  <text x="761" y="150" text-anchor="middle" font-size="12" fill="#888">배포 패키지</text>
  <text x="718" y="178" font-size="12" fill="#e8e8e8">• Project</text>
  <text x="718" y="196" font-size="12" fill="#e8e8e8">  → Build</text>
  <text x="718" y="216" font-size="12" fill="#e8e8e8">• .zip 또는</text>
  <text x="718" y="234" font-size="12" fill="#e8e8e8">  폴더로</text>
  <text x="718" y="252" font-size="12" fill="#e8e8e8">  출력</text>
  <text x="718" y="274" font-size="12" fill="#e8e8e8">• 웹 서버에</text>
  <text x="718" y="292" font-size="12" fill="#e8e8e8">  정적 파일</text>
  <text x="718" y="310" font-size="12" fill="#e8e8e8">  배포</text>
  <text x="761" y="360" text-anchor="middle" font-size="11" fill="#6a8aa0">서버 업로드</text>

  <!-- feedback arrow: Debug → Script -->
  <path d="M 573 394 Q 573 440 359 440 Q 200 440 200 394" fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="200,394 192,410 208,410" fill="#e05555"/>
  <text x="390" y="458" text-anchor="middle" font-size="12" fill="#e05555">오류 발생 시 Script 수정 반복</text>

  <!-- footer -->
  <text x="440" y="520" text-anchor="middle" font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복</text>
</svg>
