<svg width="880" height="440" viewBox="0 0 880 440"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">자동회귀 텍스트 생성 프로세스</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">다음 토큰 예측의 반복: P(토큰_n+1 | 토큰_1...토큰_n)</text>

  <!-- Step 1 -->
  <rect x="40" y="92" width="170" height="52" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="114" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600">Step 1: 프롬프트</text>
  <text x="125" y="134" text-anchor="middle" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"오늘 날씨가"</text>

  <!-- Arrow -->
  <polygon points="220,116 248,116 248,110 264,118 248,126 248,120 220,120" fill="#555"/>

  <!-- Step 2 -->
  <rect x="264" y="92" width="130" height="52" rx="6" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="329" y="114" text-anchor="middle" fill="#7ec8e3" font-size="12" font-weight="600">GPT 모델</text>
  <text x="329" y="134" text-anchor="middle" fill="#888" font-size="11">어휘 확률 계산</text>

  <!-- Vocab prob bar -->
  <rect x="408" y="88" width="200" height="68" rx="6" fill="#0a0a18" stroke="#333"/>
  <text x="508" y="104" text-anchor="middle" fill="#888" font-size="10">다음 토큰 확률 분포</text>
  <rect x="416" y="110" width="116" height="10" rx="2" fill="#7777cc"/>
  <text x="540" y="120" fill="#e8e8e8" font-size="10">맑다 (0.58)</text>
  <rect x="416" y="124" width="52" height="10" rx="2" fill="#7ec8e3"/>
  <text x="476" y="134" fill="#e8e8e8" font-size="10">춥다 (0.26)</text>
  <rect x="416" y="138" width="24" height="10" rx="2" fill="#55c555"/>
  <text x="448" y="148" fill="#e8e8e8" font-size="10">흐리다 (0.12)</text>

  <!-- Arrow -->
  <polygon points="618,116 646,116 646,110 662,118 646,126 646,120 618,120" fill="#555"/>

  <!-- Sample -->
  <rect x="662" y="92" width="180" height="52" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="752" y="112" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">샘플링/선택</text>
  <text x="752" y="132" text-anchor="middle" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">→ "맑다"</text>

  <!-- Iteration arrow (down) -->
  <polygon points="440,156 430,156 430,174 420,174 440,192 460,174 450,174 450,156" fill="#888"/>
  <text x="560" y="178" fill="#888" font-size="12">다음 스텝 반복 →</text>

  <!-- Step 2 cycle -->
  <rect x="40" y="196" width="800" height="52" rx="8" fill="#0a0a14" stroke="#333"/>
  <text x="80" y="218" fill="#7777cc" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"오늘 날씨가"</text>
  <text x="220" y="218" fill="#55c555" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">+ "맑다"</text>
  <text x="330" y="218" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">→ P(? | "오늘 날씨가 맑다")</text>
  <text x="580" y="218" fill="#888" font-size="12">→ "정말"</text>
  <text x="660" y="218" fill="#888" font-size="12">→ "기분이"</text>
  <text x="740" y="218" fill="#888" font-size="12">...</text>

  <text x="440" y="240" text-anchor="middle" fill="#888" font-size="11">누적 컨텍스트가 늘어날수록 이전 토큰 전체가 어텐션에 포함됨</text>

  <!-- Decoding strategies section -->
  <text x="440" y="280" text-anchor="middle" fill="#e8e8e8" font-size="16" font-weight="600">주요 디코딩 전략 비교</text>

  <!-- Greedy -->
  <rect x="40" y="296" width="175" height="100" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="128" y="318" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">Greedy Search</text>
  <text x="128" y="338" text-anchor="middle" fill="#888" font-size="11">매 스텝 최고 확률</text>
  <text x="128" y="355" text-anchor="middle" fill="#888" font-size="11">토큰 하나 선택</text>
  <text x="128" y="372" text-anchor="middle" fill="#555" font-size="11">반복·단조로움</text>
  <text x="128" y="389" text-anchor="middle" fill="#888" font-size="10">결정적(deterministic)</text>

  <!-- Beam Search -->
  <rect x="230" y="296" width="175" height="100" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="318" y="318" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">Beam Search</text>
  <text x="318" y="338" text-anchor="middle" fill="#888" font-size="11">상위 k개 경로 유지</text>
  <text x="318" y="355" text-anchor="middle" fill="#888" font-size="11">최고 시퀀스 반환</text>
  <text x="318" y="372" text-anchor="middle" fill="#888" font-size="11">번역·요약에 적합</text>
  <text x="318" y="389" text-anchor="middle" fill="#888" font-size="10">num_beams = 4~8</text>

  <!-- Top-k -->
  <rect x="420" y="296" width="175" height="100" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="508" y="318" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">Top-k Sampling</text>
  <text x="508" y="338" text-anchor="middle" fill="#888" font-size="11">상위 k 토큰 중</text>
  <text x="508" y="355" text-anchor="middle" fill="#888" font-size="11">확률 비례 샘플링</text>
  <text x="508" y="372" text-anchor="middle" fill="#888" font-size="11">다양성 높음</text>
  <text x="508" y="389" text-anchor="middle" fill="#888" font-size="10">k = 50 일반적</text>

  <!-- Top-p (Nucleus) -->
  <rect x="610" y="296" width="230" height="100" rx="8" fill="#1a1a0f" stroke="#e8c84e" stroke-width="1"/>
  <text x="725" y="318" text-anchor="middle" fill="#e8c84e" font-size="13" font-weight="600">Top-p (Nucleus)</text>
  <text x="725" y="338" text-anchor="middle" fill="#888" font-size="11">누적 확률 p 이내 토큰</text>
  <text x="725" y="355" text-anchor="middle" fill="#888" font-size="11">집합에서 샘플링</text>
  <text x="725" y="372" text-anchor="middle" fill="#888" font-size="11">동적 어휘 크기</text>
  <text x="725" y="389" text-anchor="middle" fill="#888" font-size="10">p = 0.9, LLM 표준</text>

  <text x="440" y="424" text-anchor="middle" fill="#888" font-size="12">실전: temperature(0.7~1.2) + top-p(0.9) 조합이 창작 생성에 가장 많이 사용됨</text>
</svg>
