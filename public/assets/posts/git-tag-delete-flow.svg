<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">태그 삭제 절차</text>
  <rect x="60" y="70" width="340" height="90" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Step 1 - 로컬 태그 삭제</text>
  <text x="230" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">git tag -d v1.0.0</text>
  <text x="230" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">refs/tags/v1.0.0 파일 제거</text>
  <text x="230" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">커밋 객체에는 영향 없음</text>
  <rect x="480" y="70" width="340" height="90" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Step 2 - 원격 태그 삭제</text>
  <text x="650" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">git push origin --delete v1.0.0</text>
  <text x="650" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">또는: git push origin :refs/tags/v1.0.0</text>
  <text x="650" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">팀원에게 삭제 공지 필요</text>
  <rect x="60" y="180" width="760" height="70" rx="8" fill="#111111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Step 3 - 팀원 로컬 정리</text>
  <text x="440" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" text-anchor="middle">git fetch --prune-tags origin</text>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">원격에 없는 태그 로컬에서 자동 제거</text>
  <rect x="60" y="270" width="760" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 배치 삭제 (여러 태그 한 번에)</text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git tag -l "v0.*" | xargs git tag -d</text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 원격도 정리: git push origin --delete $(git tag -l "v0.*")</text>
</svg>
