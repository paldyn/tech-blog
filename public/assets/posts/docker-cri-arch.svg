<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-grn" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CRI — 쿠버네티스와 컨테이너 런타임 연결</text>

  <!-- K8s control plane -->
  <rect x="280" y="70" width="320" height="54" rx="6" fill="#0a1628" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Kubernetes kubelet</text>
  <text x="440" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Pod 생명주기 관리 · 스케줄링 결과 실행</text>

  <!-- CRI Interface -->
  <line x1="440" y1="124" x2="440" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="280" y="158" width="320" height="44" rx="6" fill="#111827" stroke="#f5c542" stroke-width="2"/>
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#f5c542" text-anchor="middle">CRI (Container Runtime Interface)</text>
  <text x="440" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">gRPC API — RuntimeService + ImageService</text>

  <!-- Three runtime options -->
  <!-- containerd -->
  <line x1="340" y1="202" x2="200" y2="258" stroke="#55c555" stroke-width="2" marker-end="url(#arr-grn)"/>
  <rect x="60" y="258" width="280" height="70" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="200" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">containerd</text>
  <text x="200" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CRI 플러그인 내장</text>
  <text x="200" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">K8s 1.24+ 기본 런타임</text>

  <!-- CRI-O -->
  <line x1="440" y1="202" x2="440" y2="258" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="300" y="258" width="280" height="70" rx="6" fill="#0d1117" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">CRI-O</text>
  <text x="440" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">K8s 전용 경량 CRI 구현</text>
  <text x="440" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">OpenShift 기본 런타임</text>

  <!-- dockershim (deprecated) -->
  <line x1="540" y1="202" x2="680" y2="258" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <rect x="540" y="258" width="280" height="70" rx="6" fill="#111" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="680" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#555" text-anchor="middle">dockershim (deprecated)</text>
  <text x="680" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#444" text-anchor="middle">K8s 1.24에서 제거됨</text>
  <text x="680" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-function,sans-serif"
        font-size="11" fill="#444" text-anchor="middle">→ cri-dockerd로 대체 가능</text>

  <!-- Lower runtimes -->
  <line x1="200" y1="328" x2="280" y2="380" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <line x1="440" y1="328" x2="440" y2="380" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="240" y="380" width="400" height="54" rx="6" fill="#0a1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">OCI Runtime (runc / crun / kata / gVisor)</text>
  <text x="440" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실제 컨테이너 생성 — Linux Kernel 직접 호출</text>

  <!-- CRI API note -->
  <rect x="60" y="382" width="160" height="52" rx="5" fill="#0d1117" stroke="#f5c542" stroke-width="1"/>
  <text x="140" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#f5c542" text-anchor="middle">CRI gRPC 서비스</text>
  <text x="140" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RuntimeService:</text>
  <text x="140" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RunPodSandbox ...</text>

  <rect x="660" y="382" width="160" height="52" rx="5" fill="#0d1117" stroke="#f5c542" stroke-width="1"/>
  <text x="740" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#f5c542" text-anchor="middle">ImageService</text>
  <text x="740" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PullImage</text>
  <text x="740" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ListImages, ...</text>

  <!-- Bottom label -->
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">CRI = kubelet이 런타임과 통신하는 표준 인터페이스 — 런타임 교체가 kubelet 코드 변경 없이 가능</text>
  <text x="440" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">K8s 1.5(2016) 도입 · K8s 1.24(2022) dockershim 제거 · 현재 containerd / CRI-O 양강 체제</text>
</svg>
