<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CompletionService 동작 흐름</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">완료된 순서대로 결과를 수집하는 비동기 패턴</text>

  <!-- Submit side -->
  <rect x="60" y="90" width="180" height="56" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">submit(Callable)</text>
  <text x="150" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">작업 제출 (3개)</text>

  <!-- Tasks T1 T2 T3 -->
  <rect x="60" y="180" width="80" height="44" rx="6" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">Task 1</text>
  <text x="100" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1.2s</text>

  <rect x="160" y="180" width="80" height="44" rx="6" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">Task 2</text>
  <text x="200" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">0.3s</text>

  <rect x="110" y="260" width="80" height="44" rx="6" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">Task 3</text>
  <text x="150" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">0.8s</text>

  <!-- ExecutorService -->
  <rect x="295" y="160" width="170" height="160" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="380" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">ExecutorService</text>
  <text x="380" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스레드 풀</text>
  <rect x="311" y="214" width="138" height="24" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="380" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Worker Thread 1</text>
  <rect x="311" y="244" width="138" height="24" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="380" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Worker Thread 2</text>
  <rect x="311" y="274" width="138" height="24" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="380" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Worker Thread 3</text>

  <!-- Completion Queue -->
  <rect x="510" y="160" width="160" height="160" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="590" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">완료 큐</text>
  <text x="590" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">BlockingQueue&lt;Future&gt;</text>

  <rect x="526" y="214" width="128" height="24" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="590" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Future(Task2) ← 0.3s</text>
  <rect x="526" y="244" width="128" height="24" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="590" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Future(Task3) ← 0.8s</text>
  <rect x="526" y="274" width="128" height="24" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="590" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Future(Task1) ← 1.2s</text>

  <!-- take() poll() -->
  <rect x="720" y="190" width="130" height="44" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="785" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">take() / poll()</text>
  <text x="785" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">완료 순 결과 수신</text>

  <!-- Arrows: submit -> executor -->
  <line x1="150" y1="146" x2="340" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <!-- tasks -> executor -->
  <line x1="180" y1="202" x2="295" y2="230" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="240" y1="202" x2="295" y2="250" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="190" y1="282" x2="295" y2="282" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <!-- executor -> completion queue -->
  <line x1="465" y1="240" x2="510" y2="240" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <!-- completion queue -> take -->
  <line x1="670" y1="230" x2="720" y2="218" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Note -->
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">제출 순서(1→2→3)가 아닌 완료 순서(2→3→1)로 결과 수집</text>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">Future.get() 블로킹 없이 가장 빠른 결과부터 처리 가능</text>
</svg>
