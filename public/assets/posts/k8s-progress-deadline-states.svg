<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Deployment 진행 상태와 Deadline</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">progressDeadlineSeconds 초과 시 Progressing 조건이 False로 전환</text>

  <!-- Timeline box -->
  <rect x="50" y="90" width="780" height="60" rx="8" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Timeline bar -->
  <rect x="80" y="110" width="720" height="16" rx="4" fill="#1a2840"/>
  <!-- Progress section (green) -->
  <rect x="80" y="110" width="360" height="16" rx="4" fill="#55c555"/>
  <!-- Deadline marker -->
  <rect x="600" y="104" width="3" height="28" fill="#e05555"/>
  <text x="440" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" font-weight="600">진행 중</text>
  <text x="700" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타임아웃 이후</text>
  <text x="601" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">deadline</text>
  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">t=0 배포 시작</text>
  <text x="560" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">t=progressDeadlineSeconds</text>

  <!-- State: Progressing (success) -->
  <rect x="50" y="170" width="370" height="130" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="235" y="195" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Progressing = True (정상)</text>
  <rect x="66" y="205" width="338" height="84" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="223"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">conditions:</text>
  <text x="82" y="239"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">- type: Progressing</text>
  <text x="82" y="255"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">  status: "True"</text>
  <text x="82" y="271"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  reason: NewReplicaSetAvailable</text>

  <!-- Arrow right: progress -->
  <line x1="422" y1="235" x2="458" y2="235" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- State: Progressing (deadline exceeded) -->
  <rect x="460" y="170" width="370" height="130" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="645" y="195" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">Progressing = False (타임아웃)</text>
  <rect x="476" y="205" width="338" height="84" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="223"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">conditions:</text>
  <text x="492" y="239"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">- type: Progressing</text>
  <text x="492" y="255"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve">  status: "False"</text>
  <text x="492" y="271"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  reason: ProgressDeadlineExceeded</text>

  <!-- Causes box -->
  <rect x="50" y="318" width="370" height="130" rx="8" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="235" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">타임아웃 주요 원인</text>
  <text x="70" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">· 이미지 Pull 실패 (ImagePullBackOff)</text>
  <text x="70" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">· readinessProbe 지속 실패</text>
  <text x="70" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">· 리소스 부족 (Pending 지속)</text>
  <text x="70" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">· PVC 마운트 실패 · 노드 Taint</text>

  <!-- Recovery actions -->
  <rect x="460" y="318" width="370" height="130" rx="8" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="645" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">대응 방법</text>
  <text x="480" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">· kubectl rollout undo → 이전 버전 복구</text>
  <text x="480" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">· kubectl describe pod → 이벤트 확인</text>
  <text x="480" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">· kubectl get events → 클러스터 이벤트</text>
  <text x="480" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">· progressDeadline 증가 후 재시도</text>
</svg>
