<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="display:block">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">멀티모달 LLM 아키텍처</text>
  <text x="440" y="65" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">이미지·텍스트·오디오 → 인코더 → 프로젝션 → LLM 디코더 → 출력</text>

  <!-- ===== INPUT MODALITIES (left column) ===== -->
  <!-- Image input box -->
  <rect x="50" y="100" width="130" height="52" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="115" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">이미지</text>
  <text x="115" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PNG / JPEG / WebP</text>

  <!-- Text input box -->
  <rect x="50" y="174" width="130" height="52" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="115" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">텍스트</text>
  <text x="115" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프롬프트 / 문서</text>

  <!-- Audio input box -->
  <rect x="50" y="248" width="130" height="52" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="115" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">오디오</text>
  <text x="115" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">음성 / 사운드</text>

  <!-- ===== ENCODERS (second column) ===== -->
  <!-- Vision Encoder -->
  <rect x="240" y="100" width="140" height="52" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="310" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">비전 인코더</text>
  <text x="310" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CLIP / SigLIP / ViT</text>

  <!-- Text Tokenizer -->
  <rect x="240" y="174" width="140" height="52" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="310" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">텍스트 토크나이저</text>
  <text x="310" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">BPE / SentencePiece</text>

  <!-- Audio Encoder -->
  <rect x="240" y="248" width="140" height="52" rx="8" fill="#221111" stroke="#e05555" stroke-width="1.5"/>
  <text x="310" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">오디오 인코더</text>
  <text x="310" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Whisper / EnCodec</text>

  <!-- ===== ARROWS: Input → Encoder ===== -->
  <line x1="180" y1="126" x2="240" y2="126" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="180" y1="200" x2="240" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="180" y1="274" x2="240" y2="274" stroke="#e05555" stroke-width="2">
    <defs>
      <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
              markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
        <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
      </marker>
    </defs>
  </line>
  <line x1="180" y1="274" x2="240" y2="274" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- ===== PROJECTION LAYER (center) ===== -->
  <rect x="440" y="162" width="130" height="76" rx="8" fill="#1a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="505" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">프로젝션 레이어</text>
  <text x="505" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">멀티모달 어댑터</text>
  <text x="505" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">임베딩 공간 통합</text>
  <text x="505" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Q-Former / Linear</text>

  <!-- ===== ARROWS: Encoder → Projection ===== -->
  <!-- Vision encoder to projection -->
  <path d="M 380 126 L 420 126 L 420 200 L 440 200" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>
  <!-- Text tokenizer to projection -->
  <line x1="380" y1="200" x2="440" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <!-- Audio encoder to projection -->
  <path d="M 380 274 L 420 274 L 420 200 L 440 200" stroke="#e05555" stroke-width="2" fill="none" marker-end="url(#arr-red)"/>

  <!-- ===== LLM DECODER ===== -->
  <rect x="630" y="140" width="140" height="120" rx="8" fill="#12101e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">LLM 디코더</text>
  <text x="700" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Transformer</text>
  <text x="700" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Self-Attention</text>
  <text x="700" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Cross-Attention</text>
  <text x="700" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">FFN × N레이어</text>
  <text x="700" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">GPT / LLaMA / Gemini</text>

  <!-- ===== ARROW: Projection → LLM ===== -->
  <line x1="570" y1="200" x2="630" y2="200" stroke="#7777cc" stroke-width="2.5">
    <defs>
      <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
              markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
        <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
      </marker>
    </defs>
  </line>
  <line x1="570" y1="200" x2="630" y2="200" stroke="#7777cc" stroke-width="2.5" marker-end="url(#arr-purple)"/>

  <!-- ===== OUTPUT ===== -->
  <!-- Output label -->
  <text x="440" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">출력</text>

  <!-- Output boxes (small) -->
  <rect x="595" y="290" width="80" height="36" rx="6" fill="#111" stroke="#e8e8e8" stroke-width="1"/>
  <text x="635" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">텍스트 응답</text>

  <rect x="690" y="290" width="80" height="36" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="730" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">코드 / 분석</text>

  <!-- Arrow LLM → Output -->
  <line x1="700" y1="260" x2="700" y2="290" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- ===== MODEL LABELS (bottom) ===== -->
  <rect x="50" y="330" width="370" height="50" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="235" y="351" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">주요 멀티모달 LLM 모델</text>
  <text x="235" y="369" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GPT-4o  ·  Gemini 1.5 Pro  ·  Claude 3.5+  ·  LLaVA  ·  InternVL</text>
</svg>
