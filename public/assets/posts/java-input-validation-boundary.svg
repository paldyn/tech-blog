<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410">
  <defs>
    <marker id="ivArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0b055"/>
    </marker>
  </defs>

  <rect width="880" height="410" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">신뢰 경계(Trust Boundary)</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">외부 입력은 경계를 넘는 순간 검증되어야 한다</text>

  <!-- Untrusted zone -->
  <rect x="50" y="98" width="300" height="270" rx="10" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">신뢰할 수 없는 영역</text>
  <text x="200" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">HTTP 요청 파라미터</text>
  <text x="200" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">폼 · JSON 바디</text>
  <text x="200" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">헤더 · 쿠키</text>
  <text x="200" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">업로드 파일</text>
  <text x="200" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">외부 API 응답</text>
  <text x="200" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">공격자가 자유롭게</text>
  <text x="200" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">조작할 수 있음</text>

  <!-- boundary gate -->
  <rect x="392" y="150" width="96" height="166" rx="8" fill="#1a1a10" stroke="#e0b055" stroke-width="2"/>
  <text x="440" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e0b055">검증</text>
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e0b055">게이트</text>
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">타입·범위</text>
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">형식·길이</text>

  <line x1="352" y1="233" x2="390" y2="233" stroke="#e0b055" stroke-width="2" marker-end="url(#ivArr)"/>
  <line x1="490" y1="233" x2="528" y2="233" stroke="#55c555" stroke-width="2" marker-end="url(#ivArr)"/>

  <!-- Trusted zone -->
  <rect x="530" y="98" width="300" height="270" rx="10" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">신뢰 영역</text>
  <text x="680" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">비즈니스 로직</text>
  <text x="680" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">DB 접근</text>
  <text x="680" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">파일 시스템</text>
  <text x="680" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">외부 명령 실행</text>
  <text x="680" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">검증된 데이터만</text>
  <text x="680" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">도달하도록 보장</text>

  <text x="440" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">규칙: 입력은 최대한 이른 지점(경계)에서, 신뢰하지 말고 검증한다</text>
</svg>
