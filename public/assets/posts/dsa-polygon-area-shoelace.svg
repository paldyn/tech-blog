<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">신발끈 공식: 외적의 합 ÷ 2</text>

  <!-- polygon -->
  <polygon points="120,320 280,340 330,200 220,120 100,200"
           fill="#7ec8e322" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="120" cy="320" r="5" fill="#55c555"/><text x="100" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">P0</text>
  <circle cx="280" cy="340" r="5" fill="#55c555"/><text x="286" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">P1</text>
  <circle cx="330" cy="200" r="5" fill="#55c555"/><text x="338" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">P2</text>
  <circle cx="220" cy="120" r="5" fill="#55c555"/><text x="226" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">P3</text>
  <circle cx="100" cy="200" r="5" fill="#55c555"/><text x="68" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">P4</text>

  <!-- formula box -->
  <rect x="430" y="92" width="390" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">         1   n-1</tspan></text>
  <text x="446" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Area = ─── · Σ ( xᵢ·yᵢ₊₁ − xᵢ₊₁·yᵢ )</tspan></text>
  <text x="446" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">         2  i=0</tspan></text>
  <text x="446" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># 각 항 = 원점·Pᵢ·Pᵢ₊₁ 외적</tspan></text>
  <text x="446" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555" font-weight="600"># 부호 = 정점 진행 방향(CCW &gt; 0)</tspan></text>
  <text x="446" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff"># 인덱스는 mod n 으로 순환</tspan></text>

  <!-- code box -->
  <rect x="430" y="258" width="390" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">s = 0</tspan></text>
  <text x="446" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> range(n):</tspan></text>
  <text x="446" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  j = (i+1) % n</tspan></text>
  <text x="446" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  s += x[i]*y[j] - x[j]*y[i]</tspan></text>

  <text x="60" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">정점을 순서대로 외적 누적 → |s|/2 가 넓이. 볼록·오목 상관없이 단순 다각형이면 성립</text>
</svg>
