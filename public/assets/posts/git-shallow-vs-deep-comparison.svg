<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Shallow Clone vs Full Clone 비교</text>

  <!-- Full clone -->
  <rect x="60" y="68" width="360" height="360" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888" text-anchor="middle">Full Clone (일반)</text>
  <text x="240" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전체 히스토리</text>

  <!-- Full clone commits -->
  <circle cx="240" cy="148" r="14" fill="#55c555" stroke="none"/>
  <text x="240" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#0a0a0a" text-anchor="middle">HEAD</text>
  <line x1="240" y1="162" x2="240" y2="186" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <circle cx="240" cy="198" r="12" fill="#3a5a3e" stroke="#888" stroke-width="1"/>
  <text x="240" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e8e8e8" text-anchor="middle">n-1</text>
  <line x1="240" y1="210" x2="240" y2="228" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <circle cx="240" cy="240" r="12" fill="#3a5a3e" stroke="#888" stroke-width="1"/>
  <text x="240" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e8e8e8" text-anchor="middle">n-2</text>
  <line x1="240" y1="252" x2="240" y2="270" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <text x="240" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" fill="#888" text-anchor="middle">⋮</text>

  <circle cx="240" cy="320" r="12" fill="#3a5a3e" stroke="#888" stroke-width="1"/>
  <text x="240" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e8e8e8" text-anchor="middle">init</text>

  <text x="240" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">모든 커밋 히스토리 포함</text>
  <text x="240" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">git log --all 동작</text>
  <text x="240" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">git bisect, git blame 완전 동작</text>

  <!-- Shallow clone -->
  <rect x="460" y="68" width="360" height="360" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Shallow Clone (--depth=N)</text>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">최근 N개 커밋만</text>

  <circle cx="640" cy="148" r="14" fill="#55c555" stroke="none"/>
  <text x="640" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#0a0a0a" text-anchor="middle">HEAD</text>
  <line x1="640" y1="162" x2="640" y2="186" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <circle cx="640" cy="198" r="12" fill="#3a5a3e" stroke="#888" stroke-width="1"/>
  <text x="640" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e8e8e8" text-anchor="middle">n-1</text>
  <line x1="640" y1="210" x2="640" y2="228" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Shallow boundary -->
  <line x1="480" y1="240" x2="800" y2="240" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="800" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="end">shallow boundary</text>

  <circle cx="640" cy="252" r="12" fill="#1a2035" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e05555" text-anchor="middle">cut</text>

  <text x="640" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">이전 히스토리 없음</text>

  <text x="640" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">✓ 빠른 클론 속도</text>
  <text x="640" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">✓ 작은 디스크 사용량</text>
  <text x="640" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ git bisect 제한적</text>
  <text x="640" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ rebase 대상 제한</text>

  <!-- Bottom -->
  <rect x="60" y="448" width="760" height="52" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">깊이 늘리기: git fetch --unshallow  또는  git fetch --depth=100</text>
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">shallow를 full로 전환: git fetch --unshallow</text>
</svg>
