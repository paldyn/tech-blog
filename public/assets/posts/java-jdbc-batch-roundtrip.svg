<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="brArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="bgArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">개별 실행 vs 배치 — 네트워크 왕복 횟수</text>

  <!-- without batch -->
  <text x="60" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">개별 executeUpdate — 매 건 왕복</text>
  <rect x="60" y="106" width="160" height="48" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">애플리케이션</text>
  <rect x="660" y="106" width="160" height="48" fill="#1a1206" stroke="#e0a555" stroke-width="1.5" rx="8"/>
  <text x="700" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">데이터베이스</text>
  <line x1="220" y1="120" x2="660" y2="120" stroke="#e05555" stroke-width="2" marker-end="url(#brArr)"/>
  <line x1="220" y1="132" x2="660" y2="132" stroke="#e05555" stroke-width="2" marker-end="url(#brArr)"/>
  <line x1="220" y1="144" x2="660" y2="144" stroke="#e05555" stroke-width="2" marker-end="url(#brArr)"/>
  <text x="300" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">1000건이면 1000번 왕복 — 지연 누적</text>

  <!-- with batch -->
  <text x="60" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">executeBatch — 모아서 한 번 왕복</text>
  <rect x="60" y="254" width="160" height="48" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="80" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">애플리케이션</text>
  <rect x="660" y="254" width="160" height="48" fill="#1a1206" stroke="#e0a555" stroke-width="1.5" rx="8"/>
  <text x="700" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">데이터베이스</text>
  <line x1="220" y1="278" x2="660" y2="278" stroke="#55c555" stroke-width="2.5" marker-end="url(#bgArr)"/>
  <text x="300" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">1000건을 한 묶음으로 — 왕복 1번</text>

  <text x="60" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">병목은 SQL 실행이 아니라 네트워크 왕복인 경우가 많다. 배치는 그 왕복을 줄인다.</text>
</svg>
