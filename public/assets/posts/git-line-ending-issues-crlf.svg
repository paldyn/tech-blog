<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="leArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">CRLF vs LF: 줄바꿈 충돌</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">OS마다 줄 끝 표기가 달라 "전체 파일이 바뀐 것"처럼 보인다</text>

  <!-- windows -->
  <rect x="60" y="110" width="300" height="90" rx="10" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="140" font-size="15" font-weight="600" fill="#7ec8e3">Windows</text>
  <text x="80" y="168" font-size="13" fill="#ffffff">줄 끝 = CRLF</text>
  <text x="80" y="190" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#ce9178">line\r\n</text>

  <!-- mac/linux -->
  <rect x="520" y="110" width="300" height="90" rx="10" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="540" y="140" font-size="15" font-weight="600" fill="#55c555">macOS / Linux</text>
  <text x="540" y="168" font-size="13" fill="#ffffff">줄 끝 = LF</text>
  <text x="540" y="190" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#ce9178">line\n</text>

  <line x1="360" y1="155" x2="520" y2="155" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#leArr)"/>
  <text x="375" y="145" font-size="12" fill="#e05555">diff 전체가 변경으로 표시</text>

  <rect x="60" y="225" width="760" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="250" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 해결: 저장소에는 LF로 통일하고 체크아웃 시 OS에 맞춤</text>
  <text xml:space="preserve" x="80" y="272" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">echo "* text=auto eol=lf" &gt; .gitattributes</text>

  <text x="60" y="320" font-size="13" fill="#888">.gitattributes로 규칙을 저장소에 박아 두면 팀 전체가 동일하게 동작한다</text>
</svg>
