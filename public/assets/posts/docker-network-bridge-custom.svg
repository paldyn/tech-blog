<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">기본 bridge vs 사용자 정의 bridge</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">DNS 이름 해석 가능 여부가 핵심 차이</text>

  <!-- Default bridge (left) -->
  <rect x="60" y="88" width="340" height="280" rx="10" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="114" text-anchor="middle" fill="#e05555" font-size="15" font-weight="600">기본 bridge 네트워크</text>

  <rect x="80" y="130" width="300" height="80" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="100" y="156" fill="#888" font-size="12" xml:space="preserve"># 컨테이너 이름으로 통신 불가</text>
  <text x="100" y="174" fill="#e05555" font-size="12" xml:space="preserve">ping other-container</text>
  <text x="100" y="192" fill="#e05555" font-size="12" xml:space="preserve">→ ping: unknown host</text>

  <text x="230" y="238" text-anchor="middle" fill="#e8e8e8" font-size="13">IP 직접 지정 필요</text>
  <text x="230" y="258" text-anchor="middle" fill="#888" font-size="12">172.17.0.2, 172.17.0.3 …</text>
  <text x="230" y="280" text-anchor="middle" fill="#e05555" font-size="12">재시작하면 IP 바뀜 → 하드코딩 불가</text>
  <text x="230" y="300" text-anchor="middle" fill="#888" font-size="11">--link 옵션(deprecated)으로만 해결 가능</text>
  <text x="230" y="320" text-anchor="middle" fill="#e05555" font-size="12">⚠ 실무 사용 비권장</text>

  <!-- Custom bridge (right) -->
  <rect x="480" y="88" width="340" height="280" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="114" text-anchor="middle" fill="#55c555" font-size="15" font-weight="600">사용자 정의 bridge</text>

  <rect x="500" y="130" width="300" height="80" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="520" y="156" fill="#888" font-size="12" xml:space="preserve"># 컨테이너 이름으로 바로 통신</text>
  <text x="520" y="174" fill="#55c555" font-size="12" xml:space="preserve">ping other-container</text>
  <text x="520" y="192" fill="#55c555" font-size="12" xml:space="preserve">→ PING 172.18.0.3 ... OK</text>

  <text x="650" y="238" text-anchor="middle" fill="#e8e8e8" font-size="13">내장 DNS 자동 등록</text>
  <text x="650" y="258" text-anchor="middle" fill="#888" font-size="12">컨테이너 이름 = DNS 이름</text>
  <text x="650" y="280" text-anchor="middle" fill="#55c555" font-size="12">재시작해도 이름으로 찾음 → 안전</text>
  <text x="650" y="300" text-anchor="middle" fill="#888" font-size="12">docker network create my-net</text>
  <text x="650" y="320" text-anchor="middle" fill="#55c555" font-size="12">✓ Compose 기본 동작 방식</text>
</svg>
