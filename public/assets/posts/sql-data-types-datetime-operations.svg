<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">날짜·시간 연산 예시</text>

  <!-- left: basic operations -->
  <rect x="60" y="66" width="370" height="288" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">기본 날짜 연산</text>

  <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 현재 날짜/시각</tspan></text>
  <text x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> CURRENT_DATE;</tspan></text>
  <text x="80" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> CURRENT_TIMESTAMP;</tspan></text>

  <text x="80" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 날짜 덧셈/뺄셈 (INTERVAL)</tspan></text>
  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> CURRENT_DATE</tspan></text>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">     + </tspan><tspan fill="#7ec8e3" font-weight="600">INTERVAL</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'30 days'</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 날짜 차이 계산</tspan></text>
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> CURRENT_DATE - 가입일</tspan></text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> 회원;</tspan></text>
  <text x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 결과: 경과 일수 (INTEGER)</tspan></text>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">DATE - DATE = INTEGER(일수) (PostgreSQL)</text>

  <!-- right: extract/format -->
  <rect x="450" y="66" width="370" height="288" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="470" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">EXTRACT와 날짜 포맷</text>

  <text x="470" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 년/월/일 추출</tspan></text>
  <text x="470" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan></text>
  <text x="470" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  EXTRACT</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">YEAR FROM</tspan><tspan fill="#ffffff"> 주문일),</tspan></text>
  <text x="470" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  EXTRACT</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">MONTH FROM</tspan><tspan fill="#ffffff"> 주문일),</tspan></text>
  <text x="470" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  EXTRACT</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">DOW FROM</tspan><tspan fill="#ffffff"> 주문일)</tspan></text>
  <text x="470" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> 주문;</tspan></text>

  <text x="470" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 날짜 포맷 변환</tspan></text>
  <text x="470" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- PostgreSQL</tspan></text>
  <text x="470" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> TO_CHAR(주문일,</tspan></text>
  <text x="470" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ce9178">  'YYYY"년" MM"월" DD"일"'</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="470" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> 주문;</tspan></text>
  <text x="470" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">결과: '2026년 06월 08일'</text>

  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">WHERE 절에서 날짜 인덱스 활용하려면 함수 대신 범위 조건으로 — EXTRACT는 인덱스 스킵 가능</text>
</svg>
