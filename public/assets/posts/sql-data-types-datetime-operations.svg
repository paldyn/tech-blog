<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">날짜/시간 연산 비교</text>
  <rect x="60" y="54" width="760" height="248" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="76" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 현재 날짜/시간</text>
  <text x="76" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> CURRENT_DATE, CURRENT_TIME, CURRENT_TIMESTAMP; <tspan fill="#9aa4b8">-- 표준</tspan></text>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> NOW(); <tspan fill="#9aa4b8">-- MySQL/PostgreSQL 축약</tspan></text>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 날짜 더하기/빼기</text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> created_at + <tspan font-weight="600" fill="#7ec8e3">INTERVAL</tspan> <tspan fill="#ce9178">'30 days'</tspan> <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> orders; <tspan fill="#9aa4b8">-- 표준/PG</tspan></text>
  <text x="76" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> DATE_ADD(created_at, <tspan font-weight="600" fill="#7ec8e3">INTERVAL</tspan> <tspan fill="#b5cea8">30</tspan> DAY) <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> orders; <tspan fill="#9aa4b8">-- MySQL</tspan></text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> DATEADD(DAY, <tspan fill="#b5cea8">30</tspan>, created_at) <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> orders; <tspan fill="#9aa4b8">-- SQL Server</tspan></text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 날짜 차이 계산</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> DATEDIFF(NOW(), created_at) <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> orders; <tspan fill="#9aa4b8">-- MySQL: 일 차이</tspan></text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> NOW() - created_at <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> orders; <tspan fill="#9aa4b8">-- PostgreSQL: INTERVAL 반환</tspan></text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> EXTRACT(EPOCH <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> NOW() - created_at)<tspan fill="#9aa4b8">  -- 초 단위 차이</tspan></text>
</svg>
