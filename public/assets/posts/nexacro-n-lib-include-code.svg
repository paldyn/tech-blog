<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">라이브러리 include 방법 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">전역 include vs 폼별 include</text>

  <!-- Left: TypeDefinition global include -->
  <text x="220" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">전역 include (권장)</text>
  <rect x="60" y="112" width="340" height="226" rx="6" fill="#070b14" stroke="#55c555" stroke-width="1.5"/>

  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">/* TypeDefinition.xml */</text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">&lt;Includes&gt;</text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  &lt;FileRef</text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">    path="common/gfn.xjs"</text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  /&gt;</text>
  <text x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">&lt;/Includes&gt;</text>

  <text x="76" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 모든 폼에 자동 적용</text>
  <text x="76" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 중복 선언 없음</text>
  <text x="76" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 한 곳에서 관리</text>
  <text x="76" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">△ 전체 초기 로딩 크기 증가</text>
  <text x="76" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  (캐싱으로 1회만 로드됨)</text>

  <!-- Right: form-level include -->
  <text x="660" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">폼별 include (비권장)</text>
  <rect x="480" y="112" width="340" height="226" rx="6" fill="#070b14" stroke="#e05555" stroke-width="1.5"/>

  <text x="496" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">/* SCR001.xfdl (Script 태그) */</text>
  <text x="496" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">&lt;Script&gt;</text>
  <text x="496" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  &lt;![CDATA[</text>
  <text x="496" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">  include "common/gfn.xjs";</text>
  <text x="496" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  ]]&gt;</text>
  <text x="496" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">&lt;/Script&gt;</text>

  <text x="496" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">△ 폼마다 직접 선언 필요</text>
  <text x="496" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 추가 시 모든 폼 수정</text>
  <text x="496" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 누락 폼에서 오류 발생</text>
  <text x="496" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">△ 특정 폼만 사용하는 특수</text>
  <text x="496" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  라이브러리에는 적합</text>

  <!-- Divider -->
  <line x1="440" y1="112" x2="440" y2="338" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom note -->
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">공통 라이브러리는 TypeDefinition 전역 include, 특수 용도 라이브러리만 폼별 include 사용</text>
</svg>
