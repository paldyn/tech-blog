<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">해결: 매 반복마다 값을 묶어 둔다</text>

  <!-- fix 1 -->
  <rect x="60" y="78" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="104" font-size="13" fill="#55c555" font-weight="600">① 기본 인자로 즉시 캡처</text>
  <text xml:space="preserve" x="80" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">funcs = [</tspan><tspan fill="#7ec8e3" font-weight="600">lambda</tspan><tspan fill="#ffffff"> i=i: i </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> range(3)]   </tspan><tspan fill="#9aa4b8"># 0, 1, 2</tspan></text>

  <!-- fix 2 -->
  <rect x="60" y="176" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="202" font-size="13" fill="#55c555" font-weight="600">② functools.partial로 값 고정</text>
  <text xml:space="preserve" x="80" y="232" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">funcs = [partial(</tspan><tspan fill="#7ec8e3" font-weight="600">lambda</tspan><tspan fill="#ffffff"> x: x, i) </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> range(3)]</tspan></text>
</svg>
