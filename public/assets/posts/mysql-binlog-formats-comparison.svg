<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">바이너리 로그 포맷 3종 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">STATEMENT · ROW · MIXED</text>

  <!-- STATEMENT -->
  <rect x="60" y="90" width="240" height="280" rx="8" fill="#0f1a2e" stroke="#3a6aae" stroke-width="2"/>
  <text x="180" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">STATEMENT</text>
  <text x="180" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SQL 문 자체를 기록</text>
  <line x1="76" y1="152" x2="284" y2="152" stroke="#3a6aae" stroke-width="1"/>
  <text x="76" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  로그 크기 작음</text>
  <text x="76" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  읽기 쉬운 SQL</text>
  <text x="76" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  비결정적 함수 위험</text>
  <text x="76" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  NOW(), UUID() 불일치</text>
  <text x="76" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  GTID와 궁합 나쁨</text>
  <text x="76" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">binlog_format = STATEMENT</text>
  <text x="76" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MySQL 5.0 기본값 (구버전)</text>
  <rect x="76" y="324" width="208" height="34" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="180" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레거시 환경에서만 사용</text>

  <!-- ROW -->
  <rect x="320" y="90" width="240" height="280" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">ROW</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">변경된 행 데이터를 기록</text>
  <line x1="336" y1="152" x2="544" y2="152" stroke="#55c555" stroke-width="1"/>
  <text x="336" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  정확한 데이터 복제</text>
  <text x="336" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  비결정적 함수 안전</text>
  <text x="336" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  GTID + RBR 황금 조합</text>
  <text x="336" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  로그 크기 대폭 증가</text>
  <text x="336" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  mysqlbinlog 가독성↓</text>
  <text x="336" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">binlog_format = ROW</text>
  <text x="336" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MySQL 8.0 기본값</text>
  <rect x="336" y="324" width="208" height="34" rx="4" fill="#0a2a10" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">프로덕션 권장</text>

  <!-- MIXED -->
  <rect x="580" y="90" width="240" height="280" rx="8" fill="#1a150a" stroke="#e09055" stroke-width="2"/>
  <text x="700" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e09055" text-anchor="middle">MIXED</text>
  <text x="700" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">상황에 따라 자동 선택</text>
  <line x1="596" y1="152" x2="804" y2="152" stroke="#e09055" stroke-width="1"/>
  <text x="596" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  로그 크기 중간</text>
  <text x="596" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  비결정적 시 ROW 자동</text>
  <text x="596" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  예측하기 어려운 동작</text>
  <text x="596" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  트러블슈팅 복잡</text>
  <text x="596" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NOW()·UUID() → ROW 전환</text>
  <text x="596" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">binlog_format = MIXED</text>
  <text x="596" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MySQL 5.1~5.7 타협안</text>
  <rect x="596" y="324" width="208" height="34" rx="4" fill="#2a1f0a" stroke="#e09055" stroke-width="1"/>
  <text x="700" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ROW 전환이 나음</text>

  <!-- Bottom summary -->
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">결론: MySQL 8.0 이상 신규 구성 → ROW + GTID 조합으로 고정</text>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">binlog_row_image = FULL(기본) | MINIMAL | NOBLOB 로 크기 조절 가능</text>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">binlog_expire_logs_seconds(8.0) 또는 expire_logs_days(5.7)로 보존 기간 설정</text>
</svg>
