<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">주요 DNS 레코드 타입</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">각 레코드의 역할과 값 형식</text>

  <!-- A Record -->
  <rect x="40" y="86" width="390" height="68" rx="6" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="60" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">A</text>
  <text x="90" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">도메인 → IPv4 주소</text>
  <text x="60" y="141" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">example.com.  300  IN  A  93.184.216.34</text>

  <!-- AAAA Record -->
  <rect x="450" y="86" width="390" height="68" rx="6" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="470" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">AAAA</text>
  <text x="530" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">도메인 → IPv6 주소</text>
  <text x="470" y="141" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">example.com.  300  IN  AAAA  2606:2800::1</text>

  <!-- CNAME Record -->
  <rect x="40" y="168" width="390" height="68" rx="6" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="60" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0c055">CNAME</text>
  <text x="130" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">별명 → 정식 도메인</text>
  <text x="60" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">www.example.com.  CNAME  example.com.</text>

  <!-- MX Record -->
  <rect x="450" y="168" width="390" height="68" rx="6" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="470" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0c055">MX</text>
  <text x="510" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">메일 서버 지정</text>
  <text x="470" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">example.com.  MX  10  mail.example.com.</text>

  <!-- NS Record -->
  <rect x="40" y="250" width="390" height="68" rx="6" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1.5"/>
  <text x="60" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">NS</text>
  <text x="90" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">권위 네임서버 지정</text>
  <text x="60" y="305" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">example.com.  NS  ns1.example.com.</text>

  <!-- TXT Record -->
  <rect x="450" y="250" width="390" height="68" rx="6" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1.5"/>
  <text x="470" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">TXT</text>
  <text x="510" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">임의 텍스트 (SPF, DKIM 등)</text>
  <text x="470" y="305" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">example.com.  TXT  "v=spf1 include:..."</text>

  <!-- SOA Record -->
  <rect x="40" y="332" width="390" height="68" rx="6" fill="#1a0f1a" stroke="#5a2a5a" stroke-width="1.5"/>
  <text x="60" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#cc77cc">SOA</text>
  <text x="108" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">존(Zone) 권위 정보</text>
  <text x="60" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">example.com.  SOA  ns1... serial refresh...</text>

  <!-- PTR Record -->
  <rect x="450" y="332" width="390" height="68" rx="6" fill="#1a0a0a" stroke="#5a2a2a" stroke-width="1.5"/>
  <text x="470" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">PTR</text>
  <text x="514" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">역방향 조회 (IP → 도메인)</text>
  <text x="470" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">34.216.184.93.in-addr.arpa.  PTR  example.com.</text>

  <!-- Legend: TTL -->
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">레코드 형식: 도메인 TTL(초) CLASS TYPE 값 | IN = Internet 클래스</text>
</svg>
