<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">널 안전성 — 컴파일러가 NPE를 막아준다</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e05555">Java — 모든 참조가 null일 수 있다</text>
  <rect x="60" y="106" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">String name = findName();</text>
  <text xml:space="preserve" x="76" y="158" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">int len = name.length();</text>
  <text xml:space="preserve" x="76" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">// name이 null이면?</text>
  <text xml:space="preserve" x="76" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">// 런타임에 NPE 폭발</text>
  <text xml:space="preserve" x="76" y="238" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 컴파일은 멀쩡히 통과</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#55c555">Kotlin — null 가능성이 타입에 새겨진다</text>
  <rect x="460" y="106" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">String? name = findName()</text>
  <text xml:space="preserve" x="476" y="158" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">val len = name<tspan fill="#55c555" font-weight="600">?.</tspan>length</text>
  <text xml:space="preserve" x="476" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">// ?. 없이 쓰면</text>
  <text xml:space="preserve" x="476" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">// 컴파일 에러로 차단</text>
  <text xml:space="preserve" x="476" y="238" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// NPE를 설계로 예방</text>

  <text x="440" y="298" font-size="13" fill="#888" text-anchor="middle">Kotlin은 String(널 불가)과 String?(널 가능)을 타입으로 구분해 NPE를 컴파일 단계로 끌어온다</text>
</svg>
