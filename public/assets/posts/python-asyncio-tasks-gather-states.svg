<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="stArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Task 의 생애주기</text>

  <rect x="60" y="110" width="190" height="80" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="155" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">PENDING</text>
  <text x="155" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">루프에 등록, 실행 대기</text>

  <rect x="345" y="110" width="190" height="80" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="440" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">FINISHED</text>
  <text x="440" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">result() 로 값 조회</text>

  <rect x="630" y="110" width="190" height="80" fill="#11161f" stroke="#e05555" stroke-width="1.5" rx="10"/>
  <text x="725" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">CANCELLED</text>
  <text x="725" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">cancel() 호출됨</text>

  <path d="M 250 150 L 337 150" stroke="#7777cc" stroke-width="2" marker-end="url(#stArr)"/>
  <text x="252" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">완료</text>
  <path d="M 250 178 C 400 250, 560 250, 628 188" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#stArr)"/>
  <text x="370" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">cancel()</text>
</svg>
