<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">팝업 생명주기 (Popup Lifecycle)</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">openPopup → 팝업 onload → 사용자 조작 → close → 부모 복귀</text>

  <!-- Parent form column -->
  <text x="170" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">부모 폼 (SCR001)</text>
  <line x1="170" y1="110" x2="170" y2="400" stroke="#1e2433" stroke-width="2"/>

  <!-- Popup form column -->
  <text x="660" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">팝업 폼 (POP001)</text>
  <line x1="660" y1="110" x2="660" y2="400" stroke="#1e2433" stroke-width="2"/>

  <!-- Step 1: openPopup call -->
  <rect x="80" y="118" width="180" height="40" rx="6" fill="#1a2233" stroke="#7ec8e3"/>
  <text x="170" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">openPopup() 호출</text>
  <line x1="260" y1="138" x2="580" y2="138" stroke="#555" stroke-width="1.5"/>
  <polygon points="582,138 570,132 570,144" fill="#555"/>
  <text x="420" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">팝업 폼 로드 요청</text>

  <!-- Step 2: Popup Form_onload -->
  <rect x="580" y="158" width="160" height="40" rx="6" fill="#1a2a1a" stroke="#55c555"/>
  <text x="660" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">Form_onload</text>
  <text x="580" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">인자 수신 · 초기 데이터 조회</text>

  <!-- Step 3: User interaction -->
  <rect x="580" y="228" width="160" height="40" rx="6" fill="#111" stroke="#333"/>
  <text x="660" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">사용자 조작</text>

  <!-- Step 4: Popup onclose / returnValue -->
  <rect x="580" y="288" width="160" height="40" rx="6" fill="#1a2a1a" stroke="#55c555"/>
  <text x="660" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">close() 호출</text>
  <text x="660" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">returnValue 설정 후 닫기</text>

  <!-- Arrow back to parent -->
  <line x1="580" y1="308" x2="260" y2="308" stroke="#555" stroke-width="1.5"/>
  <polygon points="258,308 270,302 270,314" fill="#555"/>
  <text x="420" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PopupClose 이벤트 → 부모 콜백</text>

  <!-- Step 5: Parent onpopupclose -->
  <rect x="80" y="328" width="180" height="40" rx="6" fill="#1a2233" stroke="#7ec8e3"/>
  <text x="170" y="353" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">PopupClose 콜백</text>
  <text x="170" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">returnValue 읽기 → 화면 갱신</text>

  <!-- Modal vs Modeless note -->
  <rect x="60" y="408" width="760" height="40" rx="6" fill="#111" stroke="#1e2433"/>
  <text x="200" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Modal: 팝업 열린 동안 부모 폼 조작 불가</text>
  <text x="500" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Modeless: 팝업 열린 상태에서 부모 폼도 조작 가능</text>
</svg>
