<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" markerWidth="21" markerHeight="14" refX="19.25" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 21 7, 0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arr-g" markerWidth="21" markerHeight="14" refX="19.25" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 21 7, 0 14" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arr-gray" markerWidth="21" markerHeight="14" refX="19.25" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 21 7, 0 14" fill="#555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HandlerMapping · HandlerAdapter 동작 원리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">URL 탐색 → 실행 위임의 전체 흐름</text>

  <!-- DispatcherServlet -->
  <rect x="32" y="104" width="148" height="100" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="106" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Dispatcher</text>
  <text x="106" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Servlet</text>
  <text x="106" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">getHandler(request)</text>

  <!-- DS → HandlerMappings -->
  <line x1="180" y1="130" x2="236" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="208" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">① 탐색 요청</text>

  <!-- HandlerMappings area -->
  <rect x="237" y="88" width="260" height="256" rx="8" fill="#090e1a" stroke="#1e3050" stroke-width="1.5"/>
  <text x="367" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">HandlerMapping 구현체들</text>
  <text x="367" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(우선순위 순으로 순회)</text>

  <!-- RM HM -->
  <rect x="251" y="136" width="232" height="58" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="367" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">RequestMappingHandlerMapping</text>
  <text x="367" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@RequestMapping 어노테이션 스캔</text>

  <!-- BN HM -->
  <rect x="251" y="206" width="232" height="58" rx="6" fill="#0d1a2e" stroke="#555" stroke-width="1"/>
  <text x="367" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">BeanNameUrlHandlerMapping</text>
  <text x="367" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">빈 이름이 URL인 경우 처리</text>

  <!-- Router HM -->
  <rect x="251" y="276" width="232" height="58" rx="6" fill="#0d1a2e" stroke="#555" stroke-width="1"/>
  <text x="367" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">RouterFunctionMapping</text>
  <text x="367" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">함수형 라우팅 (WebFlux 공유)</text>

  <!-- HandlerMapping → DS (HandlerExecutionChain) -->
  <line x1="237" y1="168" x2="180" y2="168" stroke="#555" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <text x="208" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">② HandlerExecutionChain</text>

  <!-- HandlerExecutionChain box -->
  <rect x="32" y="226" width="148" height="118" rx="8" fill="#0a1810" stroke="#55c555" stroke-width="1.5"/>
  <text x="106" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Handler</text>
  <text x="106" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">ExecutionChain</text>
  <text x="46" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">handler</text>
  <text x="46" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  = Method 참조</text>
  <text x="46" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">interceptors</text>
  <text x="46" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  = 인터셉터 목록</text>

  <!-- DS → HandlerAdapters -->
  <line x1="180" y1="285" x2="236" y2="285" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="208" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">③ 어댑터 조회</text>

  <!-- HandlerAdapters area -->
  <rect x="237" y="356" width="260" height="136" rx="8" fill="#090e1a" stroke="#1e3050" stroke-width="1.5"/>
  <text x="367" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">HandlerAdapter 구현체들</text>

  <!-- RMHA -->
  <rect x="251" y="388" width="232" height="46" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.2"/>
  <text x="367" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">RequestMappingHandlerAdapter</text>
  <text x="367" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Controller 메서드 실행 + 파라미터 바인딩</text>

  <!-- HRHA -->
  <rect x="251" y="440" width="232" height="44" rx="6" fill="#0a1810" stroke="#333" stroke-width="1"/>
  <text x="367" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#666">HttpRequestHandlerAdapter</text>
  <text x="367" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">HttpRequestHandler 구현체 실행</text>

  <!-- DS → Controller (via adapter) -->
  <line x1="237" y1="340" x2="560" y2="290" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="408" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">④ handle() 위임</text>

  <!-- Controller/Handler area -->
  <rect x="560" y="104" width="280" height="380" rx="8" fill="#0d0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">@Controller (Handler)</text>

  <!-- ArgumentResolver -->
  <rect x="572" y="138" width="256" height="70" rx="6" fill="#13102a" stroke="#7777cc" stroke-width="1"/>
  <text x="700" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">HandlerMethodArgument</text>
  <text x="700" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Resolver</text>
  <text x="700" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@RequestParam · @PathVariable · @RequestBody</text>

  <!-- Method execution -->
  <rect x="572" y="224" width="256" height="60" rx="6" fill="#091a09" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">메서드 실행</text>
  <text x="700" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비즈니스 로직 수행</text>

  <!-- ReturnValueHandler -->
  <rect x="572" y="300" width="256" height="70" rx="6" fill="#13102a" stroke="#7777cc" stroke-width="1"/>
  <text x="700" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">HandlerMethodReturn</text>
  <text x="700" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">ValueHandler</text>
  <text x="700" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ModelAndView · @ResponseBody · ResponseEntity</text>

  <!-- Return to DS -->
  <line x1="560" y1="380" x2="180" y2="360" stroke="#555" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <text x="370" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">⑤ ModelAndView 반환 (또는 직접 응답 쓰기)</text>

  <!-- DS box: return arrow -->
  <rect x="572" y="386" width="256" height="84" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="700" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">HttpMessageConverter</text>
  <text x="700" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@ResponseBody 시 자동 직렬화</text>
  <text x="700" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MappingJackson2HttpMessageConverter</text>
  <text x="700" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ Java 객체 ↔ JSON</text>
</svg>
