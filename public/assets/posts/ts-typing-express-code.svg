<svg xmlns="http://www.w3.org/2000/svg" width="880" height="297" viewBox="0 0 880 297">
<rect width="880" height="297" fill="#0a0a0a" rx="12"/>
<text x="50" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Request 제네릭 4개 인자</text>
<text x="50" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">RequestHandler</text>
<rect x="50" y="96" width="780" height="173" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> { Request, Response } </tspan><tspan font-weight="600" fill="#7ec8e3">from</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"express"</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">type</tspan><tspan fill="#ffffff"> Params = { id: </tspan><tspan font-weight="600" fill="#7ec8e3">string</tspan><tspan fill="#ffffff"> }</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">type</tspan><tspan fill="#ffffff"> Body = { name: </tspan><tspan font-weight="600" fill="#7ec8e3">string</tspan><tspan fill="#ffffff"> }</tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">app.put(</tspan><tspan fill="#ce9178">"/u/:id"</tspan><tspan fill="#ffffff">, (</tspan></text>
<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  req: Request&lt;Params, </tspan><tspan font-weight="600" fill="#7ec8e3">unknown</tspan><tspan fill="#ffffff">, Body&gt;,</tspan></text>
<text y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  res: Response</tspan></text>
<text y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">) =&gt; { req.params.id; req.body.name })</tspan></text>
<text y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// 4개 제네릭: Params, ResBody, ReqBody, Query</tspan></text>
</svg>
