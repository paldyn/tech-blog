<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">권한 강화 — 최소 권한 원칙 (PoLP)</text>

  <!-- 중앙 원칙 -->
  <rect x="280" y="72" width="320" height="58" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Principle of Least Privilege</text>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로세스·사용자는 필요한 최소 권한만 가져야 한다</text>

  <!-- 영역 1: 파일 권한 -->
  <rect x="60" y="160" width="220" height="130" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">파일 권한 강화</text>
  <text x="80" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• world-writable 제거</text>
  <text x="80" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• SUID/SGID 최소화</text>
  <text x="80" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• umask 027 이상</text>
  <text x="80" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• /tmp sticky bit</text>
  <text x="80" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• chmod 600 개인 키</text>

  <!-- 영역 2: 사용자/그룹 -->
  <rect x="330" y="160" width="220" height="130" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">사용자·그룹 관리</text>
  <text x="350" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 불필요 계정 잠금</text>
  <text x="350" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• root 직접 로그인 금지</text>
  <text x="350" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• sudo 최소 권한</text>
  <text x="350" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 서비스 전용 계정</text>
  <text x="350" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 패스워드 정책 강화</text>

  <!-- 영역 3: 프로세스/서비스 -->
  <rect x="600" y="160" width="220" height="130" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">서비스 격리</text>
  <text x="620" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• systemd 샌드박싱</text>
  <text x="620" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• capabilities 최소화</text>
  <text x="620" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• NoNewPrivileges=yes</text>
  <text x="620" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• PrivateTmp=yes</text>
  <text x="620" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• chroot · namespace</text>

  <!-- 하단: SUID 검사 코드 박스 -->
  <rect x="60" y="314" width="370" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">SUID · world-writable 검사</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># SUID 파일 목록</text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">find / -perm -4000 -type f 2>/dev/null</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># world-writable 파일</text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">find / -perm -002 -type f 2>/dev/null</text>
  <text x="76" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 소유자 없는 파일</text>

  <!-- 하단 우: 잠금 계정 박스 -->
  <rect x="450" y="314" width="370" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="635" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">계정 잠금 · 불필요 서비스 제거</text>
  <text x="466" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 계정 잠금</text>
  <text x="466" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">passwd -l username</text>
  <text x="466" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># root SSH 금지 (sshd_config)</text>
  <text x="466" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">PermitRootLogin </text>
  <text x="590" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">no</text>
  <text x="466" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 불필요 서비스 중지</text>
</svg>
