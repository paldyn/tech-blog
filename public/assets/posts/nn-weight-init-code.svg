<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">가중치 초기화 PyTorch 구현</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">xavier_uniform_, kaiming_normal_, 커스텀 초기화 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="240" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">import</tspan> torch.nn <tspan fill="#7ec8e3">as</tspan> nn</text>

  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">def</tspan> <tspan fill="#55c555">init_weights</tspan>(m):</text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">if</tspan> isinstance(m, nn.Linear):</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#6a8aa0"># ReLU → He (Kaiming) 초기화</tspan></text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    nn.init.kaiming_normal_(</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">        m.weight, mode=<tspan fill="#ce9178">'fan_in'</tspan>,</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">        nonlinearity=<tspan fill="#ce9178">'relu'</tspan>)</text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    nn.init.zeros_(m.bias)</text>

  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">model = nn.Sequential(</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    nn.Linear(<tspan fill="#b5cea8">784</tspan>, <tspan fill="#b5cea8">256</tspan>), nn.ReLU(),</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    nn.Linear(<tspan fill="#b5cea8">256</tspan>, <tspan fill="#b5cea8">10</tspan>),</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">).apply(init_weights)</text>

  <!-- Info boxes -->
  <rect x="60" y="345" width="350" height="58" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="364" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600" xml:space="preserve">PyTorch 기본 초기화</text>
  <text x="235" y="382" text-anchor="middle" fill="#e8e8e8" font-size="11" xml:space="preserve">nn.Linear: Kaiming Uniform (mode=fan_in)</text>
  <text x="235" y="398" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">편향: Uniform(-1/√fan_in, 1/√fan_in)</text>

  <rect x="470" y="345" width="350" height="58" rx="8" fill="#0c1a0c" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="364" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600" xml:space="preserve">분산 유지가 중요한 이유</text>
  <text x="645" y="382" text-anchor="middle" fill="#e8e8e8" font-size="11" xml:space="preserve">신호 분산이 일정해야 역전파 기울기도 일정</text>
  <text x="645" y="398" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">BatchNorm이 있으면 초기화 중요도 감소</text>

  <!-- Footer -->
  <text x="440" y="428" text-anchor="middle" fill="#444" font-size="11" xml:space="preserve">PALDYN · AI 완전 정복 시리즈</text>
</svg>
