<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-blue3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ASVS 실무 활용 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">체크리스트가 아니라 요구사항 → 구현 → 검증을 잇는 공통 언어로 쓴다</text>

  <!-- Step 1 -->
  <rect x="50" y="110" width="240" height="80" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">1. 레벨 선정</text>
  <text x="170" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">데이터 민감도 · 위험도 기준</text>
  <text x="170" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">대부분 L2에서 시작</text>

  <!-- Step 2 -->
  <rect x="320" y="110" width="240" height="80" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">2. 적용 범위 선별</text>
  <text x="440" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">해당 없는 챕터 제외</text>
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">(예: WebSocket 미사용 시)</text>

  <!-- Step 3 -->
  <rect x="590" y="110" width="240" height="80" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">3. 요구사항화</text>
  <text x="710" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">항목을 백로그 티켓 ·</text>
  <text x="710" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">PR 체크리스트로 변환</text>

  <line x1="290" y1="150" x2="318" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue3)"/>
  <line x1="560" y1="150" x2="588" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue3)"/>

  <!-- Step 4 -->
  <rect x="50" y="250" width="240" height="80" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">4. 검증 자동화 매핑</text>
  <text x="170" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">SAST 룰 · 단위 테스트 ·</text>
  <text x="170" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">DAST 스캔에 항목 연결</text>

  <!-- Step 5 -->
  <rect x="320" y="250" width="240" height="80" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">5. 갭 분석 · 측정</text>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">충족 / 미충족 / 해당없음</text>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">분기별 커버리지 추적</text>

  <!-- Step 6 -->
  <rect x="590" y="250" width="240" height="80" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">6. 외부 검증 기준</text>
  <text x="710" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">침투 테스트 범위 정의 ·</text>
  <text x="710" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">벤더 보안 평가 공통 언어</text>

  <line x1="290" y1="290" x2="318" y2="290" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue3)"/>
  <line x1="560" y1="290" x2="588" y2="290" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue3)"/>

  <!-- connector step3 -> step4 -->
  <path d="M 710 190 C 710 225, 170 215, 170 248" fill="none" stroke="#7ec8e3"
        stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-blue3)"/>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">100% 충족이 목표가 아니라, 무엇을 충족하지 못했는지 아는 것이 목표다</text>
</svg>
