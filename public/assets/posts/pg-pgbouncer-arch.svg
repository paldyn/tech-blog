<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PgBouncer 커넥션 풀링 아키텍처</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">클라이언트 연결을 풀링해 PostgreSQL 프로세스 부하 절감</text>

  <!-- Without PgBouncer -->
  <text x="180" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">PgBouncer 없음</text>

  <!-- Many clients -->
  <rect x="60" y="118" width="80" height="22" fill="#0f1724" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Client ×200</text>

  <line x1="140" y1="129" x2="192" y2="155" stroke="#e05555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="140" y1="129" x2="192" y2="175" stroke="#e05555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="140" y1="129" x2="192" y2="195" stroke="#e05555" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- PG processes -->
  <rect x="192" y="148" width="90" height="18" fill="#111827" rx="3" stroke="#e05555"/>
  <text x="237" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">PG process 1</text>
  <rect x="192" y="170" width="90" height="18" fill="#111827" rx="3" stroke="#e05555"/>
  <text x="237" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">PG process 2</text>
  <rect x="192" y="192" width="90" height="18" fill="#111827" rx="3" stroke="#e05555"/>
  <text x="237" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">... ×200</text>

  <text x="175" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">메모리 ≈ 200 × 10MB = 2GB</text>
  <text x="175" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">컨텍스트 스위칭 폭발</text>

  <!-- With PgBouncer -->
  <text x="640" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">PgBouncer 사용</text>

  <!-- Many clients -->
  <rect x="460" y="118" width="80" height="22" fill="#0f1724" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="500" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Client ×200</text>

  <line x1="540" y1="129" x2="580" y2="167" stroke="#7ec8e3" stroke-width="1.2"/>
  <line x1="540" y1="129" x2="580" y2="180" stroke="#7ec8e3" stroke-width="1.2"/>
  <line x1="540" y1="129" x2="580" y2="193" stroke="#7ec8e3" stroke-width="1.2"/>

  <!-- PgBouncer box -->
  <rect x="580" y="148" width="110" height="72" fill="#111827" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="635" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">PgBouncer</text>
  <text x="635" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Connection Pool</text>
  <text x="635" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">×20 (설정값)</text>

  <line x1="690" y1="184" x2="718" y2="170" stroke="#55c555" stroke-width="2"/>
  <line x1="690" y1="184" x2="718" y2="190" stroke="#55c555" stroke-width="2"/>
  <polygon points="718,170 706,163 706,177" fill="#55c555"/>
  <polygon points="718,190 706,183 706,197" fill="#55c555"/>

  <!-- PG processes few -->
  <rect x="718" y="162" width="90" height="18" fill="#111827" rx="3" stroke="#55c555"/>
  <text x="763" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">PG process 1</text>
  <rect x="718" y="184" width="90" height="18" fill="#111827" rx="3" stroke="#55c555"/>
  <text x="763" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">PG process 2</text>

  <text x="680" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">메모리 ≈ 20 × 10MB = 200MB</text>
  <text x="680" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">CPU 부하 대폭 감소</text>

  <!-- Pool modes -->
  <rect x="60" y="285" width="760" height="170" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">풀링 모드 비교</text>

  <rect x="80" y="318" width="210" height="120" fill="#0f1724" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="185" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Session Pool</text>
  <text x="185" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라이언트 1개 = 서버 1개</text>
  <text x="185" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">연결 생성 비용 절감</text>
  <text x="185" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가장 안전, 효과 제한적</text>
  <text x="185" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SET, LISTEN 등 호환</text>

  <rect x="310" y="318" width="210" height="120" fill="#0f1724" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="415" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Transaction Pool</text>
  <text x="415" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">트랜잭션 단위 연결 해제</text>
  <text x="415" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">효율 최대 (권장)</text>
  <text x="415" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">SET, LISTEN 제한</text>
  <text x="415" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Prepared Statement 주의</text>

  <rect x="540" y="318" width="260" height="120" fill="#0f1724" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="670" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Statement Pool</text>
  <text x="670" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">쿼리 단위 즉시 반환</text>
  <text x="670" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Autocommit 쿼리만</text>
  <text x="670" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">트랜잭션 사용 불가</text>
  <text x="670" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">극히 제한적 상황에만</text>
</svg>
