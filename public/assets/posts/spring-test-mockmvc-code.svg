<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MockMvc 요청 빌더 패턴</text>

  <!-- 왼쪽: GET/POST/PUT/DELETE -->
  <text x="80" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">HTTP 메서드별 요청 빌더</text>

  <rect x="60" y="90" width="370" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// GET — 쿼리 파라미터</text>
  <text x="76" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">mockMvc.</tspan><tspan fill="#55c555" font-weight="600">perform</tspan><tspan fill="#ffffff">(</tspan>
  </text>
  <text x="76" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  get</tspan><tspan fill="#ffffff">("/api/users")</tspan>
  </text>
  <text x="76" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    .param(</tspan><tspan fill="#ce9178">"page"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"0"</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="76" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    .param(</tspan><tspan fill="#ce9178">"size"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"10"</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="76" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    .header(</tspan><tspan fill="#ce9178">"Authorization"</tspan><tspan fill="#ffffff">, token)</tspan>
  </text>
  <text x="76" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">).</tspan><tspan fill="#55c555" font-weight="600">andExpect</tspan><tspan fill="#ffffff">(status().isOk());</tspan>
  </text>
  <text x="76" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> </text>
  <text x="76" y="276" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 생략...</text>

  <!-- 오른쪽: POST JSON body -->
  <text x="460" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">POST — JSON 바디 전송</text>

  <rect x="450" y="90" width="370" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">String body = </tspan>
  </text>
  <text x="466" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">  """{"name":"홍길동","age":30}"""</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="466" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> </text>
  <text x="466" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">mockMvc.</tspan><tspan fill="#55c555" font-weight="600">perform</tspan><tspan fill="#ffffff">(</tspan>
  </text>
  <text x="466" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  post</tspan><tspan fill="#ffffff">("/api/users")</tspan>
  </text>
  <text x="466" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    .contentType(APPLICATION_JSON)</tspan>
  </text>
  <text x="466" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    .content(body)</tspan>
  </text>
  <text x="466" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">).</tspan><tspan fill="#55c555" font-weight="600">andExpect</tspan><tspan fill="#ffffff">(</tspan>
  </text>
  <text x="466" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  status().isCreated());</tspan>
  </text>
  <text x="466" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> </text>

  <!-- 하단: 유효성 검사 오류 검증 -->
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">유효성 검사 오류 검증</text>

  <rect x="60" y="330" width="370" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">mockMvc.</tspan><tspan fill="#55c555" font-weight="600">perform</tspan><tspan fill="#ffffff">(</tspan>
  </text>
  <text x="76" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  post</tspan><tspan fill="#ffffff">("/api/users").content(badBody))</tspan>
  </text>
  <text x="76" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  .</tspan><tspan fill="#55c555" font-weight="600">andExpect</tspan><tspan fill="#ffffff">(status().isBadRequest())</tspan>
  </text>
  <text x="76" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  .</tspan><tspan fill="#55c555" font-weight="600">andExpect</tspan><tspan fill="#ffffff">(</tspan>
  </text>
  <text x="76" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    jsonPath(</tspan><tspan fill="#ce9178">"$.errors[0].field"</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="76" y="440" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">      .value(</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff">));</tspan>
  </text>

  <!-- 하단 오른쪽: file upload -->
  <text x="460" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">파일 업로드 요청</text>

  <rect x="450" y="330" width="370" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">MockMultipartFile file =</tspan>
  </text>
  <text x="466" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  new</tspan><tspan fill="#ffffff"> MockMultipartFile(</tspan>
  </text>
  <text x="466" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">    "file"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"test.png"</tspan><tspan fill="#ffffff">, ...);</tspan>
  </text>
  <text x="466" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">mockMvc.</tspan><tspan fill="#55c555" font-weight="600">perform</tspan><tspan fill="#ffffff">(</tspan>
  </text>
  <text x="466" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  multipart</tspan><tspan fill="#ffffff">("/upload").file(file))</tspan>
  </text>
  <text x="466" y="440" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  .</tspan><tspan fill="#55c555" font-weight="600">andExpect</tspan><tspan fill="#ffffff">(status().isOk());</tspan>
  </text>
</svg>
