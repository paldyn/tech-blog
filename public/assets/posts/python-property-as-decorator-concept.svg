<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">property 데코레이터: getter / setter / deleter</text>
  <!-- Left: property flow -->
  <rect x="40" y="70" width="380" height="290" fill="#0d0d20" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">property 체인 선언</text>
  <rect x="56" y="106" width="348" height="234" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">class </tspan><tspan fill="#ffffff">Circle:</tspan></text>
  <text x="70" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">__init__(self, r):</tspan></text>
  <text x="70" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        self._r = r</tspan></text>
  <text x="70" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7777cc">@property</tspan><tspan fill="#9aa4b8">          # getter</tspan></text>
  <text x="70" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">radius(self): </tspan><tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">self._r</tspan></text>
  <text x="70" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7777cc">@radius.setter</tspan><tspan fill="#9aa4b8">     # setter</tspan></text>
  <text x="70" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">radius(self, v):</tspan></text>
  <text x="70" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">if </tspan><tspan fill="#ffffff">v &lt; </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">raise </tspan><tspan fill="#ffffff">ValueError(</tspan><tspan fill="#ce9178">"r&gt;=0"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="70" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        self._r = v</tspan></text>
  <text x="70" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7777cc">    @radius.deleter</tspan><tspan fill="#9aa4b8">   # deleter</tspan></text>
  <text x="70" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">radius(self): self._r = </tspan><tspan fill="#b5cea8">0</tspan></text>
  <!-- Right: usage and descriptor -->
  <rect x="460" y="70" width="380" height="290" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">사용 및 내부 동작</text>
  <rect x="476" y="106" width="348" height="140" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">c = Circle(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="490" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">c.radius</tspan><tspan fill="#9aa4b8">      # __get__ 호출 → 5</tspan></text>
  <text x="490" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">c.radius = </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#9aa4b8">  # __set__ 호출</tspan></text>
  <text x="490" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">c.radius = -</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#9aa4b8"> # ValueError!</tspan></text>
  <text x="490" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">del </tspan><tspan fill="#ffffff">c.radius</tspan><tspan fill="#9aa4b8">  # __delete__ 호출</tspan></text>
  <text x="490" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">type(Circle.radius)</tspan><tspan fill="#9aa4b8"> # property</tspan></text>
  <!-- Descriptor protocol boxes -->
  <rect x="476" y="262" width="100" height="38" fill="#071010" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="526" y="285" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">__get__</text>
  <rect x="590" y="262" width="100" height="38" fill="#071010" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="285" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">__set__</text>
  <rect x="704" y="262" width="120" height="38" fill="#071010" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="764" y="285" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">__delete__</text>
  <text x="650" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">property는 디스크립터 프로토콜 구현체</text>
  <text x="650" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">c.radius 접근 → Circle.__dict__['radius'].__get__(c, Circle)</text>
  <!-- bottom note -->
  <text x="440" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">getter만 정의하면 읽기 전용 / setter 추가 시 쓰기 허용 / deleter로 del 연산 지원</text>
</svg>
