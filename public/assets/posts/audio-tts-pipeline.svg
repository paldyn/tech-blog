<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TTS 파이프라인: 텍스트 → 음성</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">텍스트 분석 → 음향 모델 → 보코더 전체 흐름</text>

  <!-- Step 1: 입력 텍스트 -->
  <rect x="30" y="98" width="130" height="84" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="95" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">① 입력 텍스트</text>
  <text x="95" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">한국어/영어</text>
  <text x="95" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">UTF-8 문자열</text>

  <line x1="160" y1="140" x2="188" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: 텍스트 분석 -->
  <rect x="190" y="93" width="140" height="94" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">② 텍스트 분석</text>
  <text x="260" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">G2P 변환</text>
  <text x="260" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">운율·억양 분석</text>
  <text x="260" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">음소 시퀀스 생성</text>

  <line x1="330" y1="140" x2="358" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: 음향 모델 -->
  <rect x="360" y="86" width="160" height="108" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">③ 음향 모델</text>
  <text x="440" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">멜 스펙트로그램 생성</text>
  <text x="440" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">FastSpeech2 / VITS</text>
  <text x="440" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">피치·지속시간 예측</text>
  <text x="440" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">80채널 멜 출력</text>

  <line x1="520" y1="140" x2="548" y2="140" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Step 4: 보코더 -->
  <rect x="550" y="93" width="140" height="94" rx="8" fill="#1a0a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="620" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">④ 보코더</text>
  <text x="620" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">HiFi-GAN</text>
  <text x="620" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">멜 → 파형 변환</text>
  <text x="620" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">22050Hz 오디오</text>

  <line x1="690" y1="140" x2="718" y2="140" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Step 5: 음성 출력 -->
  <rect x="720" y="98" width="130" height="84" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="785" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">⑤ 음성 출력</text>
  <text x="785" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">WAV / PCM</text>
  <text x="785" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">자연스러운 음성</text>

  <!-- Model Comparison Table -->
  <rect x="30" y="228" width="820" height="164" rx="8" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="440" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 End-to-End TTS 모델 비교</text>

  <!-- Header row -->
  <text x="90" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">모델</text>
  <text x="280" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">방식</text>
  <text x="490" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">특징</text>
  <text x="710" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">다국어/클로닝</text>

  <line x1="50" y1="287" x2="830" y2="287" stroke="#333" stroke-width="1"/>

  <!-- VITS row -->
  <text x="90" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">VITS</text>
  <text x="280" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">VAE + Flow + GAN</text>
  <text x="490" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단일 모델, 고품질, 실시간</text>
  <text x="710" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">단일 화자</text>

  <!-- FastSpeech2 row -->
  <text x="90" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#ce9178" text-anchor="middle">FastSpeech2</text>
  <text x="280" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">병렬 Transformer</text>
  <text x="490" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빠른 추론, 피치·에너지 제어</text>
  <text x="710" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">단일 화자</text>

  <!-- XTTS row -->
  <text x="90" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">XTTS-v2</text>
  <text x="280" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GPT + 음성 디코더</text>
  <text x="490" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">17개 언어, 화자 복제</text>
  <text x="710" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">제로샷 클로닝 ★</text>

  <!-- CosyVoice row -->
  <text x="90" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">CosyVoice</text>
  <text x="280" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LLM + Flow Matching</text>
  <text x="490" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">감정·스타일 제어 탁월</text>
  <text x="710" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">3초 참조 클로닝 ★</text>
</svg>
