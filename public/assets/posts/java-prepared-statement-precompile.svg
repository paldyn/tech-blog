<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="psArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">사전 컴파일 — 한 번 파싱, 여러 번 실행</text>

  <!-- prepare -->
  <rect x="60" y="92" width="300" height="90" fill="#101622" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">prepareStatement(sql)</text>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">SQL 구조를 DB가 한 번</text>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파싱·계획 수립 후 재사용</text>

  <!-- arrow -->
  <line x1="360" y1="137" x2="460" y2="137" stroke="#7ec8e3" stroke-width="2" marker-end="url(#psArr)"/>
  <text x="370" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">바인딩만 바꿔</text>

  <!-- executions -->
  <rect x="460" y="92" width="360" height="48" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="476" y="121" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">setLong(1, 10); executeQuery();</text>
  <rect x="460" y="148" width="360" height="48" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="476" y="177" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">setLong(1, 20); executeQuery();</text>
  <rect x="460" y="204" width="360" height="48" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="476" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">setLong(1, 30); executeQuery();</text>

  <text x="60" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">같은 SQL을 반복 실행할 때 파싱 비용을 절약하고 실행 계획을 캐시할 수 있다.</text>
  <text x="60" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">값은 별도 채널로 전달되어 SQL 텍스트에 절대 섞이지 않는다 — 그래서 안전하다.</text>
</svg>
