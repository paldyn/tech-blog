<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">타입 안전 SQL 빌더 비교</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">컴파일 타임에 SQL 오류를 잡는다 — 문자열 SQL의 런타임 오류 제거</text>

  <!-- Problem (String SQL) -->
  <rect x="40" y="82" width="800" height="68" rx="8" fill="#2a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">문자열 SQL의 문제: 컴파일 시 오류 감지 불가</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">"SELECT * FROM oarders WHERE custId = ?" → 오타가 런타임에 터짐</text>
  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">컬럼명 변경 시 전체 문자열 검색 — IDE 자동완성·리팩토링 불가</text>

  <!-- Two columns -->
  <!-- QueryDSL -->
  <rect x="40" y="166" width="380" height="34" rx="6" fill="#12182a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">QueryDSL</text>

  <rect x="460" y="166" width="380" height="34" rx="6" fill="#1a1220" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">jOOQ</text>

  <!-- QueryDSL features -->
  <rect x="40" y="210" width="380" height="118" rx="6" fill="#111"/>
  <text x="56" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">JPA 엔티티에서 Q-class 자동 생성</text>
  <text x="56" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  QOrder.order.status.eq("PAID")</text>
  <text x="56" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">JPA + Spring Data 연동 자연스러움</text>
  <text x="56" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  JPAQueryFactory로 JPQL 생성</text>
  <text x="56" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  동적 조건: BooleanBuilder·Predicate</text>
  <text x="56" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">  JPA 위에서 동작 → JPQL 한계 공유</text>

  <!-- jOOQ features -->
  <rect x="460" y="210" width="380" height="118" rx="6" fill="#111"/>
  <text x="476" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DB 스키마에서 클래스 코드 생성</text>
  <text x="476" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  ORDERS.STATUS.eq("PAID")</text>
  <text x="476" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SQL에 가장 가까운 추상화</text>
  <text x="476" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  Window·CTE·PIVOT 완전 지원</text>
  <text x="476" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  DB 특화 기능(RETURNING, ON CONFLICT)</text>
  <text x="476" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">  JPA 독립 — 순수 SQL 생성</text>

  <!-- Code comparison -->
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">동일 쿼리 표현 비교</text>
  <rect x="40" y="368" width="380" height="104" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// QueryDSL</text>
  <text x="56" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">queryFactory</text>
  <text x="56" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .selectFrom(order)</text>
  <text x="56" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .where(order.status.eq(</text>
  <text x="302" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"PAID"</text>
  <text x="338" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">))</text>
  <text x="56" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .orderBy(order.amount.desc())</text>
  <text x="56" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .fetch();</text>

  <rect x="460" y="368" width="380" height="104" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// jOOQ</text>
  <text x="476" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">dsl.selectFrom(ORDERS)</text>
  <text x="476" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .where(ORDERS.STATUS.eq(</text>
  <text x="676" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"PAID"</text>
  <text x="710" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">))</text>
  <text x="476" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .orderBy(ORDERS.AMOUNT.desc())</text>
  <text x="476" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  .fetchInto(OrderDto.class);</text>
  <text x="476" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// ORDERS: DB 스키마 기반 생성 클래스</text>
</svg>
