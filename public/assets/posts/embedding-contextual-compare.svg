<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#e05555"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#55c555"/>
    </marker>
    <marker id="arrowGray" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">정적 임베딩 vs 문맥적 임베딩</text>

  <!-- ===== TOP: Polysemy problem ===== -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">다의어 "bank" — 같은 단어, 다른 의미</text>

  <!-- Sentence 1: river bank -->
  <rect x="80" y="94" width="340" height="40" fill="#111" rx="6" stroke="#333" stroke-width="1"/>
  <text x="250" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">He sat by the</text>
  <text x="336" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">bank</text>
  <text x="393" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">of the river</text>

  <!-- Sentence 2: savings bank -->
  <rect x="80" y="146" width="340" height="40" fill="#111" rx="6" stroke="#333" stroke-width="1"/>
  <text x="230" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">She went to the</text>
  <text x="335" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">bank</text>
  <text x="388" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">to save money</text>

  <!-- ===== LEFT: Static Embedding ===== -->
  <rect x="80" y="208" width="340" height="170" fill="#111" rx="10" stroke="#333" stroke-width="1"/>
  <text x="250" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">정적 임베딩 (Word2Vec / GloVe)</text>

  <!-- Both sentences point to same vector -->
  <text x="130" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">강변 "bank"</text>
  <text x="130" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">은행 "bank"</text>

  <!-- Both arrows to same vector box -->
  <line x1="186" y1="264" x2="230" y2="280" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="186" y1="310" x2="230" y2="296" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="234" y="268" width="130" height="44" fill="#2a1a1a" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="299" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">[0.4, -0.2, ...]</text>
  <text x="299" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">항상 동일한 벡터</text>

  <text x="250" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">✗ 의미 구분 불가</text>

  <!-- ===== RIGHT: Contextual Embedding ===== -->
  <rect x="460" y="208" width="360" height="170" fill="#111" rx="10" stroke="#333" stroke-width="1"/>
  <text x="640" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">문맥적 임베딩 (ELMo / BERT)</text>

  <text x="530" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">강변 "bank"</text>
  <text x="530" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">은행 "bank"</text>

  <!-- Two different vectors -->
  <line x1="580" y1="260" x2="618" y2="256" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <rect x="622" y="244" width="160" height="32" fill="#0d2a0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="702" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">[0.8, 0.1, ...] 자연</text>

  <line x1="580" y1="314" x2="618" y2="318" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <rect x="622" y="302" width="160" height="32" fill="#0d2a0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="702" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">[-0.3, 0.9, ...] 금융</text>

  <text x="640" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 문맥에 따라 다른 벡터</text>

  <!-- ===== Bottom: Model comparison ===== -->
  <line x1="60" y1="400" x2="820" y2="400" stroke="#222" stroke-width="1"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">문맥적 임베딩 모델 비교</text>

  <!-- ELMo -->
  <rect x="80" y="436" width="220" height="64" fill="#1a150d" rx="8" stroke="#e8a020" stroke-width="1"/>
  <text x="190" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a020" text-anchor="middle">ELMo (2018)</text>
  <text x="190" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">양방향 LSTM · 문자 기반</text>
  <text x="190" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레이어별 표현 합산</text>

  <!-- BERT -->
  <rect x="330" y="436" width="220" height="64" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">BERT (2018)</text>
  <text x="440" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Transformer · 양방향 어텐션</text>
  <text x="440" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">서브워드 토큰 · MLM 학습</text>

  <!-- GPT-style -->
  <rect x="580" y="436" width="220" height="64" fill="#0d0d1a" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">GPT 계열 (2018~)</text>
  <text x="690" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">단방향 · 언어 모델링</text>
  <text x="690" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">생성 태스크에 특화</text>
</svg>
