<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N 로그인 흐름</text>

  <!-- Client -->
  <rect x="60" y="80" width="180" height="360" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="150" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Nexacro Client</text>

  <!-- Server -->
  <rect x="340" y="80" width="200" height="360" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">서버 (Spring Boot)</text>

  <!-- Session Store -->
  <rect x="640" y="200" width="180" height="100" rx="8" fill="#111827" stroke="#7777cc"/>
  <text x="730" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">세션 저장소</text>
  <text x="730" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HttpSession /</text>
  <text x="730" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Redis</text>

  <!-- Step 1: Login Request -->
  <line x1="240" y1="140" x2="340" y2="140" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="338,134 352,140 338,146" fill="#7ec8e3"/>
  <text x="150" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">① ID / PW 입력</text>
  <text x="290" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">POST /login</text>

  <!-- Step 2: Validate -->
  <rect x="360" y="158" width="160" height="36" rx="4" fill="#0f1520" stroke="#2a3040"/>
  <text x="440" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">② ID/PW 검증 (DB)</text>

  <!-- Step 3: Session create -->
  <line x1="540" y1="240" x2="638" y2="240" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="636,234 650,240 636,246" fill="#7777cc"/>
  <text x="590" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">③ 세션 생성</text>

  <!-- Step 4: JSESSIONID response -->
  <line x1="340" y1="280" x2="240" y2="280" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="242,274 228,280 242,286" fill="#55c555"/>
  <text x="290" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">④ JSESSIONID 쿠키</text>
  <text x="290" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">+ 사용자 정보 Dataset</text>

  <!-- Step 5: Store in app vars -->
  <rect x="60" y="300" width="180" height="44" rx="4" fill="#0f1520" stroke="#2a3040"/>
  <text x="150" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">⑤ application 변수</text>
  <text x="150" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">에 사용자 정보 저장</text>

  <!-- Step 6: Navigate -->
  <rect x="60" y="360" width="180" height="44" rx="4" fill="#1a2a1a" stroke="#55c555"/>
  <text x="150" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">⑥ 메인 화면 이동</text>
  <text x="150" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">changeForm() / open()</text>

  <!-- Error path -->
  <rect x="360" y="370" width="160" height="44" rx="4" fill="#2a1a1a" stroke="#e05555"/>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">인증 실패</text>
  <text x="440" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">errorCode ≠ 0 → alert</text>
  <line x1="440" y1="194" x2="440" y2="370" stroke="#e05555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="448" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">실패 경로</text>
</svg>
