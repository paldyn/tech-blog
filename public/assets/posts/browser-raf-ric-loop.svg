<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">브라우저 렌더링 루프와 rAF/rIC 실행 위치</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">60fps = 프레임당 16.7ms</text>

  <!-- One frame timeline -->
  <rect x="60" y="90" width="760" height="36" rx="6" fill="#1a1a1a" stroke="#333"/>
  <text x="440" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">←──────────── 한 프레임 (16.7ms) ────────────→</text>

  <!-- JS/Event -->
  <rect x="60" y="148" width="140" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">JS / 이벤트</text>
  <text x="130" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">태스크 처리</text>

  <!-- Arrow -->
  <line x1="200" y1="173" x2="222" y2="173" stroke="#333" stroke-width="1.5"/>
  <polygon points="222,167 234,173 222,179" fill="#333"/>

  <!-- rAF -->
  <rect x="234" y="148" width="160" height="50" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="314" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">rAF 콜백</text>
  <text x="314" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">requestAnimationFrame</text>

  <!-- Arrow -->
  <line x1="394" y1="173" x2="416" y2="173" stroke="#333" stroke-width="1.5"/>
  <polygon points="416,167 428,173 416,179" fill="#333"/>

  <!-- Style/Layout/Paint -->
  <rect x="428" y="148" width="220" height="50" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="538" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Style → Layout → Paint</text>
  <text x="538" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">브라우저 렌더링 파이프라인</text>

  <!-- Arrow -->
  <line x1="648" y1="173" x2="670" y2="173" stroke="#333" stroke-width="1.5"/>
  <polygon points="670,167 682,173 670,179" fill="#333"/>

  <!-- rIC (idle) -->
  <rect x="682" y="148" width="138" height="50" rx="6" fill="#1f1400" stroke="#e8b84b" stroke-width="2"/>
  <text x="751" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8b84b">rIC 콜백</text>
  <text x="751" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">유휴 시간</text>

  <!-- Labels below -->
  <text x="314" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">DOM 조작 최적 위치</text>
  <text x="314" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다음 프레임 전 시각 동기화</text>

  <text x="751" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8b84b">비긴급 작업</text>
  <text x="751" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프리패치·로깅·분석</text>

  <!-- Divider -->
  <line x1="60" y1="268" x2="820" y2="268" stroke="#222" stroke-width="1"/>

  <!-- Comparison table -->
  <text x="440" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">rAF vs rIC 비교</text>

  <!-- Headers -->
  <rect x="60" y="308" width="220" height="36" rx="4" fill="#1a1a1a"/>
  <rect x="290" y="308" width="270" height="36" rx="4" fill="#0d1f0d"/>
  <rect x="570" y="308" width="250" height="36" rx="4" fill="#1f1400"/>
  <text x="170" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">항목</text>
  <text x="425" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">requestAnimationFrame</text>
  <text x="695" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8b84b">requestIdleCallback</text>

  <!-- Row 1 -->
  <text x="170" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실행 시점</text>
  <text x="425" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">다음 프레임 직전 (60fps)</text>
  <text x="695" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8b84b">프레임 후 유휴 시간</text>
  <line x1="60" y1="372" x2="820" y2="372" stroke="#222" stroke-width="1"/>

  <!-- Row 2 -->
  <text x="170" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">적합한 작업</text>
  <text x="425" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">애니메이션·DOM 업데이트</text>
  <text x="695" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">로깅·프리패치·분석</text>
  <line x1="60" y1="404" x2="820" y2="404" stroke="#222" stroke-width="1"/>

  <!-- Row 3 -->
  <text x="170" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타임아웃 지원</text>
  <text x="425" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">없음</text>
  <text x="695" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">options.timeout (강제 실행)</text>

  <!-- Bottom note -->
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">rIC는 Safari 미지원 (2026 기준) — 폴리필 또는 setTimeout 대안 필요</text>
</svg>
