<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MySQL 파티셔닝 유형</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">RANGE · LIST · HASH · KEY</text>

  <!-- RANGE -->
  <rect x="60" y="90" width="360" height="170" rx="8" fill="#0f1a2e" stroke="#3a6aae" stroke-width="1.5"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">RANGE</text>
  <text x="240" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">컬럼 값의 범위로 분할 — 날짜 파티셔닝 최다 활용</text>

  <rect x="76" y="148" width="80" height="36" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="116" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">p2024</text>

  <rect x="166" y="148" width="80" height="36" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="206" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">p2025</text>

  <rect x="256" y="148" width="80" height="36" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="296" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">p2026</text>

  <rect x="346" y="148" width="60" height="36" rx="4" fill="#2a1a0a" stroke="#e09055" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="376" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e09055" text-anchor="middle">MAXVALUE</text>

  <text x="76" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PARTITION p2024 VALUES LESS THAN (2025)</text>
  <text x="76" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PARTITION p2025 VALUES LESS THAN (2026)</text>
  <text x="76" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 오래된 파티션 DROP으로 빠른 데이터 삭제</text>

  <!-- LIST -->
  <rect x="460" y="90" width="360" height="170" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">LIST</text>
  <text x="640" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">열거된 값으로 분할 — 지역·상태 코드 등</text>

  <rect x="476" y="148" width="90" height="36" rx="4" fill="#0a2a10" stroke="#55c555" stroke-width="1"/>
  <text x="521" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Asia</text>
  <text x="521" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">KR,JP,CN</text>

  <rect x="576" y="148" width="90" height="36" rx="4" fill="#0a2a10" stroke="#55c555" stroke-width="1"/>
  <text x="621" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Europe</text>
  <text x="621" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">DE,FR,GB</text>

  <rect x="676" y="148" width="90" height="36" rx="4" fill="#0a2a10" stroke="#55c555" stroke-width="1"/>
  <text x="721" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Americas</text>
  <text x="721" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">US,CA,BR</text>

  <text x="476" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PARTITION Asia VALUES IN ('KR','JP','CN')</text>
  <text x="476" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">목록에 없는 값 INSERT → 오류 (주의)</text>
  <text x="476" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ LIST COLUMNS로 다중 컬럼 지원</text>

  <!-- HASH -->
  <rect x="60" y="290" width="360" height="160" rx="8" fill="#1a150a" stroke="#e09055" stroke-width="1.5"/>
  <text x="240" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e09055" text-anchor="middle">HASH</text>
  <text x="240" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정수 표현식의 MOD — 균등 분산</text>

  <rect x="76" y="350" width="65" height="30" rx="4" fill="#2a1f0a" stroke="#e09055" stroke-width="1"/>
  <text x="108" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e09055" text-anchor="middle">p0</text>

  <rect x="151" y="350" width="65" height="30" rx="4" fill="#2a1f0a" stroke="#e09055" stroke-width="1"/>
  <text x="183" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e09055" text-anchor="middle">p1</text>

  <rect x="226" y="350" width="65" height="30" rx="4" fill="#2a1f0a" stroke="#e09055" stroke-width="1"/>
  <text x="258" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e09055" text-anchor="middle">p2</text>

  <rect x="301" y="350" width="65" height="30" rx="4" fill="#2a1f0a" stroke="#e09055" stroke-width="1"/>
  <text x="333" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e09055" text-anchor="middle">p3</text>

  <text x="76" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PARTITIONS 4  → id MOD 4로 분산</text>
  <text x="76" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파티션 추가 시 데이터 재분배 필요 (주의)</text>
  <text x="76" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">LINEAR HASH: 일관성 해싱 방식, 재분배 최소화</text>

  <!-- KEY -->
  <rect x="460" y="290" width="360" height="160" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">KEY</text>
  <text x="640" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">MySQL 내부 해시 함수 사용 — PK 자동 활용</text>

  <text x="476" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PARTITION BY KEY()  — PK 자동 사용</text>
  <text x="476" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PARTITION BY KEY(col) — 지정 컬럼</text>
  <text x="476" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HASH vs KEY 차이:</text>
  <text x="476" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HASH = 사용자 정의 식, KEY = MySQL 내장 함수</text>
  <text x="476" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">문자열 컬럼 파티셔닝 가능 (HASH는 정수만)</text>

  <!-- Bottom note -->
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">서브파티셔닝: RANGE/LIST + HASH/KEY 조합. 모든 파티션에 PK·유니크 컬럼 포함 필수</text>
</svg>
