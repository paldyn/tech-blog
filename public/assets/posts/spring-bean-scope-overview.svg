<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3" stroke="#2a4a5a" stroke-width="0.5"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring Bean Scope 한눈에 보기</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Singleton · Prototype · Request · Session · Application</text>

  <!-- Singleton -->
  <rect x="40" y="92" width="380" height="180" rx="8" fill="#071212" stroke="#1e3a3a"/>
  <text x="70" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Singleton  (기본값)</text>
  <text x="70" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨테이너당 인스턴스 1개, 공유</text>

  <!-- Three clients pointing to one bean -->
  <rect x="60" y="150" width="80" height="32" rx="5" fill="#0e1820" stroke="#1e3050"/>
  <text x="100" y="171" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Client A</text>
  <rect x="60" y="200" width="80" height="32" rx="5" fill="#0e1820" stroke="#1e3050"/>
  <text x="100" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Client B</text>
  <rect x="60" y="250" width="80" height="32" rx="5" fill="#0e1820" stroke="#1e3050"/>
  <text x="100" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Client C</text>

  <rect x="270" y="192" width="120" height="50" rx="8" fill="#0a2020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="330" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Bean</text>
  <text x="330" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단 1개</text>

  <line x1="140" y1="166" x2="270" y2="210" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="140" y1="216" x2="270" y2="217" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="140" y1="266" x2="270" y2="228" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Prototype -->
  <rect x="460" y="92" width="380" height="180" rx="8" fill="#120708" stroke="#3a1e1e"/>
  <text x="490" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Prototype</text>
  <text x="490" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">요청마다 새 인스턴스 생성</text>

  <rect x="480" y="150" width="80" height="32" rx="5" fill="#0e1820" stroke="#1e3050"/>
  <text x="520" y="171" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Client A</text>
  <rect x="480" y="200" width="80" height="32" rx="5" fill="#0e1820" stroke="#1e3050"/>
  <text x="520" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Client B</text>
  <rect x="480" y="250" width="80" height="32" rx="5" fill="#0e1820" stroke="#1e3050"/>
  <text x="520" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Client C</text>

  <rect x="660" y="145" width="100" height="34" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="710" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Bean-1</text>
  <rect x="660" y="196" width="100" height="34" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="710" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Bean-2</text>
  <rect x="660" y="247" width="100" height="34" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="710" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Bean-3</text>

  <line x1="560" y1="166" x2="660" y2="162" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="216" x2="660" y2="213" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="266" x2="660" y2="264" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Web scopes table -->
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">웹 전용 스코프</text>

  <rect x="40" y="320" width="800" height="36" rx="6" fill="#0e1820"/>
  <text x="80" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스코프</text>
  <text x="240" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">생존 범위</text>
  <text x="500" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">활용 예</text>

  <line x1="40" y1="356" x2="840" y2="356" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">request</text>
  <text x="240" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">HTTP 요청 1회</text>
  <text x="500" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">요청별 로깅 컨텍스트, 트랜잭션 ID</text>

  <line x1="40" y1="388" x2="840" y2="388" stroke="#1a1a1a" stroke-width="1"/>

  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">session</text>
  <text x="240" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">HTTP 세션</text>
  <text x="500" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">로그인 사용자 정보, 장바구니</text>

  <line x1="40" y1="420" x2="840" y2="420" stroke="#1a1a1a" stroke-width="1"/>

  <text x="80" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">application</text>
  <text x="240" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">ServletContext 생애</text>
  <text x="500" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">앱 전체 공유 설정 (싱글톤과 유사)</text>

  <line x1="40" y1="452" x2="840" y2="452" stroke="#1a1a1a" stroke-width="1"/>

  <text x="80" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">websocket</text>
  <text x="240" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">WebSocket 세션</text>
  <text x="500" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실시간 채팅 사용자 상태</text>

  <!-- Footer -->
  <text x="440" y="506" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · Spring 완전 정복 시리즈</text>
</svg>
