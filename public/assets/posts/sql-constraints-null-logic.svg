<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NULL 3값 논리와 제약조건 실전 패턴</text>

  <!-- NULL 3-value logic -->
  <rect x="60" y="68" width="360" height="300" fill="#0d0d0d" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">NULL의 3값 논리 (Three-Valued Logic)</text>

  <rect x="76" y="106" width="328" height="32" fill="#162030"/>
  <text x="175" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">표현식</text>
  <text x="350" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">결과</text>
  <line x1="266" y1="106" x2="266" y2="330" stroke="#3a4a6e" stroke-width="0.5"/>

  <rect x="76" y="138" width="328" height="28" fill="#0a1018"/>
  <text x="175" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">NULL = NULL</text>
  <text x="350" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">NULL (FALSE 아님!)</text>

  <rect x="76" y="166" width="328" height="28" fill="#0e1520"/>
  <text x="175" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">NULL != NULL</text>
  <text x="350" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">NULL</text>

  <rect x="76" y="194" width="328" height="28" fill="#0a1018"/>
  <text x="175" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">NULL IS NULL</text>
  <text x="350" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">TRUE</text>

  <rect x="76" y="222" width="328" height="28" fill="#0e1520"/>
  <text x="175" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">1 + NULL</text>
  <text x="350" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">NULL (전파됨)</text>

  <rect x="76" y="250" width="328" height="28" fill="#0a1018"/>
  <text x="175" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">WHERE col = NULL</text>
  <text x="350" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">항상 0행 반환!</text>

  <rect x="76" y="278" width="328" height="28" fill="#0e1520"/>
  <text x="175" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">WHERE col IS NULL</text>
  <text x="350" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">올바른 NULL 비교</text>

  <rect x="76" y="316" width="328" height="34" fill="#111" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CHECK(col = 'A')는 col이 NULL이면 통과됨!</text>

  <!-- Practical patterns -->
  <rect x="440" y="68" width="400" height="300" fill="#0d0d0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">제약조건 실전 패턴</text>

  <rect x="456" y="106" width="368" height="246" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="472" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">-- 실무 테이블 예시</text>
  <text x="472" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">CREATE TABLE</text>
  <text x="562" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> members (</text>
  <text x="472" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  id      </text>
  <text x="520" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">INT</text>
  <text x="544" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600"> PRIMARY KEY,</text>
  <text x="472" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  email   </text>
  <text x="520" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">VARCHAR</text>
  <text x="576" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">(254)</text>
  <text x="472" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" font-weight="600">    NOT NULL</text>
  <text x="472" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">    UNIQUE,</text>
  <text x="472" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  age     </text>
  <text x="520" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">SMALLINT</text>
  <text x="472" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">    CHECK</text>
  <text x="516" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> (age </text>
  <text x="556" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">BETWEEN</text>
  <text x="614" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8"> 0 </text>
  <text x="628" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">AND</text>
  <text x="656" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8"> 150),</text>
  <text x="472" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  status  </text>
  <text x="520" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">VARCHAR</text>
  <text x="576" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">(10)</text>
  <text x="472" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">    DEFAULT</text>
  <text x="540" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> 'ACTIVE'</text>
  <text x="472" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">    NOT NULL</text>
  <text x="540" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">);</text>
</svg>