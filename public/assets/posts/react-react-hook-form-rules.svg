<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">register 검사 규칙 &amp; Controller</text>

  <!-- Left: validation rules -->
  <rect x="60" y="72" width="370" height="290" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="245" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">register 내장 검사 규칙</text>
  <rect x="76" y="108" width="338" height="242" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="92" dy="0"><tspan fill="#ffffff">{...register(</tspan><tspan fill="#ce9178">'username'</tspan><tspan fill="#ffffff">, {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  required: </tspan><tspan fill="#ce9178">'이름을 입력하세요'</tspan><tspan fill="#ffffff">,</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  minLength: {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    value: </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">,</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    message: </tspan><tspan fill="#ce9178">'2자 이상'</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  },</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  maxLength: { value: </tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#ffffff">, message: </tspan><tspan fill="#ce9178">'20자 이하'</tspan><tspan fill="#ffffff"> },</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  pattern: {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    value: /^[a-zA-Z0-9]+$/,</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    message: </tspan><tspan fill="#ce9178">'영문·숫자만 허용'</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  },</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  validate: async v =&gt; {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> ok = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> checkAvailability(v);</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> ok || </tspan><tspan fill="#ce9178">'이미 사용 중'</tspan><tspan fill="#ffffff">;</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  }</tspan></tspan>
  </text>

  <!-- Right: Controller -->
  <rect x="450" y="72" width="370" height="290" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="635" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Controller (커스텀 컴포넌트)</text>
  <rect x="466" y="108" width="338" height="242" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="482" dy="0"><tspan fill="#9aa4b8">// ref를 지원하지 않는 UI 라이브러리</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { Controller } </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'react-hook-form'</tspan><tspan fill="#ffffff">;</tspan></tspan>
    <tspan x="482" dy="20"> </tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Controller</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  name=</tspan><tspan fill="#ce9178">"role"</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  control={control}</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  rules={{ required: </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff"> }}</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  render={({ field }) =&gt; (</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Select</tspan><tspan fill="#ffffff"> {...field}&gt;</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">option</tspan><tspan fill="#ffffff"> value=</tspan><tspan fill="#ce9178">"admin"</tspan><tspan fill="#ffffff">&gt;관리자&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">option</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">    &lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Select</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  )}</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">/&gt;</tspan></tspan>
  </text>
</svg>
