<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">Vite 플러그인 & 주요 기능</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">Rollup 플러그인 호환 · 환경 변수 · CSS Modules · 글로브 임포트</text>

  <!-- Plugin cards row 1 -->
  <rect x="60" y="96" width="180" height="64" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="76" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">@vitejs/plugin-react</text>
  <text x="76" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">React Fast Refresh</text>
  <text x="76" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">JSX + Babel/SWC</text>

  <rect x="256" y="96" width="180" height="64" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="272" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">@vitejs/plugin-vue</text>
  <text x="272" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">SFC(.vue) 처리</text>
  <text x="272" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">script setup / template</text>

  <rect x="452" y="96" width="180" height="64" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="468" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">vite-plugin-pwa</text>
  <text x="468" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">Service Worker 자동 생성</text>
  <text x="468" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">오프라인 지원 · 매니페스트</text>

  <rect x="648" y="96" width="172" height="64" rx="6" fill="#0d1a2b" stroke="#1e3a5f"/>
  <text x="664" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">vite-plugin-checker</text>
  <text x="664" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">TS / ESLint 백그라운드</text>
  <text x="664" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">타입 검사 · 오버레이 표시</text>

  <!-- Code block: env vars + glob -->
  <text x="60" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">환경 변수 · CSS Modules · Glob Import</text>
  <rect x="60" y="196" width="760" height="156" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 환경 변수 — .env 파일 자동 로드 (VITE_ 접두사 필수)</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">const </text>
  <text x="116" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">apiUrl = import.meta.env.</text>
  <text x="283" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">VITE_API_URL;</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// CSS Modules — .module.css는 자동 지원</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">import </text>
  <text x="116" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">styles </text>
  <text x="158" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">from </text>
  <text x="196" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'./Button.module.css'</text>
  <text x="352" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">; </text>
  <text x="366" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// → styles.root (해시)</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Glob Import — 여러 파일 한 번에</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">const </text>
  <text x="116" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">modules = </text>
  <text x="189" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">import.meta.glob(</text>
  <text x="317" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'./pages/**/*.ts'</text>
  <text x="443" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// → { './pages/Home.ts': () => import('./pages/Home.ts'), ... }</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">const </text>
  <text x="116" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">eager = import.meta.glob(</text>
  <text x="278" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'./data/*.json'</text>
  <text x="382" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, { eager: </text>
  <text x="455" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">true </text>
  <text x="479" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">});</text>

  <text x="60" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">Vite 플러그인은 Rollup 플러그인 훅과 호환 — vitePlugin.apply: 'build' | 'serve'로 실행 환경 제한 가능</text>
</svg>
