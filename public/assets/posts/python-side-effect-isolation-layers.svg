<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">부작용 격리: 계층 분리 패턴</text>

  <!-- Outer: IO layer -->
  <rect x="60" y="68" width="760" height="360" rx="12" fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">외부 계층 — 불순 (IO, DB, API, 시간, 난수)</text>

  <!-- Middle: Adapter layer -->
  <rect x="100" y="110" width="680" height="280" rx="10" fill="none" stroke="#e0a055" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">어댑터 계층 — 불순한 것을 순수 인터페이스로 변환</text>

  <!-- Inner: Pure core -->
  <rect x="160" y="152" width="560" height="210" rx="8" fill="#0f2a1f" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">순수 코어 (Pure Core)</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">비즈니스 로직 · 데이터 변환 · 계산</text>

  <!-- Core boxes -->
  <rect x="190" y="218" width="150" height="50" rx="6" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="265" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">parse()</text>
  <text x="265" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터 파싱</text>

  <rect x="365" y="218" width="150" height="50" rx="6" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">validate()</text>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">검증 로직</text>

  <rect x="540" y="218" width="150" height="50" rx="6" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="615" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">calculate()</text>
  <text x="615" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">계산 로직</text>

  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">100% 단위 테스트 가능 · 부작용 없음 · 예측 가능</text>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">재사용 가능 · 병렬 처리 안전 · 독립 배포 가능</text>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이 영역을 최대화하는 것이 목표</text>

  <!-- IO examples outside -->
  <text x="100" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">read_db()</text>
  <text x="260" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">write_file()</text>
  <text x="440" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">send_email()</text>
  <text x="620" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">call_api()</text>
  <text x="780" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">now()</text>
</svg>
