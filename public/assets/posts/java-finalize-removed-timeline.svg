<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">finalize() 폐기 타임라인과 문제점</text>

  <!-- Timeline line -->
  <line x1="80" y1="120" x2="800" y2="120" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Timeline events -->
  <!-- Java 1.0 -->
  <circle cx="120" cy="120" r="8" fill="#7777cc" stroke="#7777cc" stroke-width="2"/>
  <text x="120" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600">Java 1.0</text>
  <text x="120" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">finalize()</text>
  <text x="120" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">도입</text>

  <!-- Java 9 -->
  <circle cx="300" cy="120" r="8" fill="#e05555" stroke="#e05555" stroke-width="2"/>
  <text x="300" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">Java 9</text>
  <text x="300" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">@Deprecated</text>
  <text x="300" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">경고 시작</text>

  <!-- Java 18 -->
  <circle cx="520" cy="120" r="8" fill="#e05555" stroke="#e05555" stroke-width="2"/>
  <text x="520" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">Java 18</text>
  <text x="520" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">forRemoval</text>
  <text x="520" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">=true 강화</text>

  <!-- Java 24+ -->
  <circle cx="720" cy="120" r="8" fill="#888" stroke="#888" stroke-width="2"/>
  <text x="720" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" font-weight="600">Java 24+</text>
  <text x="720" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">finalize()</text>
  <text x="720" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">완전 제거 예정</text>

  <!-- Problem boxes -->
  <text x="440" y="202" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">finalize()의 근본적 문제들</text>

  <rect x="60" y="216" width="185" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="152" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">호출 보장 없음</text>
  <text x="152" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GC가 호출할지</text>
  <text x="152" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">언제 호출할지</text>
  <text x="152" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전혀 보장 안 됨</text>

  <rect x="265" y="216" width="185" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="357" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">성능 저하</text>
  <text x="357" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GC 두 번 실행</text>
  <text x="357" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">finalizer 큐 처리</text>
  <text x="357" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메모리 지연 해제</text>

  <rect x="470" y="216" width="185" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="562" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">보안 취약점</text>
  <text x="562" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">생성자 예외 후</text>
  <text x="562" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">finalize()가 실행돼</text>
  <text x="562" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공격에 악용 가능</text>

  <rect x="675" y="216" width="145" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="747" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">부활 위험</text>
  <text x="747" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">finalize() 안에서</text>
  <text x="747" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">this를 저장하면</text>
  <text x="747" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">객체 부활!</text>

  <!-- Replacement -->
  <rect x="60" y="330" width="760" height="70" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">권장 대안</text>
  <text x="220" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">try-with-resources</text>
  <text x="440" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">|</text>
  <text x="600" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">java.lang.ref.Cleaner</text>
  <text x="220" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">AutoCloseable 구현 + 명시적 해제</text>
  <text x="600" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">안전한 네이티브 자원 정리 (Java 9+)</text>
</svg>
