<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-eb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-err" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">에러 경계(Error Boundary) — 개념</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">자식 컴포넌트 트리에서 발생한 에러를 가로채 fallback UI를 보여줌</text>

  <!-- Without Error Boundary: whole tree crashes -->
  <rect x="60" y="95" width="360" height="36" rx="8" fill="#2a1a1e" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">에러 경계 없음 — 전체 앱 충돌</text>

  <rect x="100" y="148" width="280" height="44" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="240" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">App</text>
  <text x="240" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">최상위 컴포넌트</text>

  <line x1="240" y1="192" x2="240" y2="218" stroke="#444" stroke-width="1.5"/>

  <rect x="100" y="218" width="280" height="44" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="240" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Layout</text>
  <text x="240" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">네비게이션 포함</text>

  <line x1="240" y1="262" x2="240" y2="288" stroke="#444" stroke-width="1.5"/>

  <rect x="100" y="288" width="280" height="44" rx="6" fill="#3a1a1e" stroke="#e05555" stroke-width="2"/>
  <text x="240" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">Widget (에러 발생!)</text>
  <text x="240" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">throw new Error()</text>

  <text x="240" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">→ 전체 화면 빈 화면(crash)</text>

  <!-- With Error Boundary -->
  <rect x="460" y="95" width="360" height="36" rx="8" fill="#1a2a1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">에러 경계 있음 — 부분 격리</text>

  <rect x="500" y="148" width="240" height="44" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="620" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">App</text>
  <text x="620" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정상 동작 유지</text>

  <line x1="620" y1="192" x2="620" y2="218" stroke="#444" stroke-width="1.5"/>

  <!-- Error Boundary wrapper -->
  <rect x="490" y="210" width="260" height="150" rx="8" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="620" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">ErrorBoundary</text>

  <rect x="510" y="236" width="220" height="44" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="620" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Layout</text>
  <text x="620" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정상 렌더링</text>

  <line x1="620" y1="280" x2="620" y2="296" stroke="#444" stroke-width="1.5"/>

  <rect x="510" y="296" width="220" height="44" rx="6" fill="#3a1a1e" stroke="#e05555" stroke-width="2"/>
  <text x="620" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">Widget (에러!)</text>
  <text x="620" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">에러 경계가 가로챔</text>

  <!-- Fallback UI -->
  <rect x="490" y="378" width="260" height="50" rx="8" fill="#1a2030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="620" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">Fallback UI 표시</text>
  <text x="620" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">"문제가 발생했습니다" 메시지</text>

  <line x1="620" y1="360" x2="620" y2="378" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-eb)"/>
  <text x="648" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">catch</text>

  <!-- Bottom note -->
  <text x="440" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">에러 경계는 클래스 컴포넌트로만 구현 (React 19 이전) · 이벤트 핸들러 에러는 감지 못함</text>
  <text x="440" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">react-error-boundary 라이브러리 사용 권장</text>
</svg>
