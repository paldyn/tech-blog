<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">포워드 프록시 vs 리버스 프록시</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">위치와 목적에 따른 프록시 유형 비교</text>

  <defs>
    <marker id="fwdArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="revArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 포워드 프록시 -->
  <text x="220" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">포워드 프록시</text>
  <text x="220" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클라이언트 측에 위치</text>

  <!-- 클라이언트들 -->
  <rect x="60" y="130" width="80" height="40" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="100" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PC-A</text>
  <rect x="60" y="182" width="80" height="40" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="100" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PC-B</text>
  <rect x="60" y="234" width="80" height="40" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="100" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PC-C</text>

  <!-- 포워드 프록시 서버 -->
  <rect x="190" y="155" width="100" height="72" rx="8" fill="#0a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Forward</text>
  <text x="240" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Proxy</text>
  <text x="240" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">클라 IP 숨김</text>

  <!-- 인터넷 -->
  <rect x="340" y="163" width="80" height="56" rx="6" fill="#2a2a1a" stroke="#e8c44a" stroke-width="1"/>
  <text x="380" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c44a">인터넷</text>

  <!-- 화살표 포워드 -->
  <line x1="140" y1="150" x2="190" y2="178" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#fwdArr)"/>
  <line x1="140" y1="202" x2="190" y2="202" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#fwdArr)"/>
  <line x1="140" y1="254" x2="190" y2="224" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#fwdArr)"/>
  <line x1="290" y1="191" x2="340" y2="191" stroke="#7777cc" stroke-width="1.5" marker-end="url(#fwdArr)"/>

  <!-- 포워드 프록시 특징 -->
  <rect x="60" y="295" width="370" height="88" rx="6" fill="#111"/>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">특징 및 사용 목적</text>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">• 클라이언트 IP 숨기기 (익명성)</text>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">• 콘텐츠 필터링 (기업 인터넷 감시)</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">• 캐싱으로 대역폭 절감</text>

  <!-- 세로 구분선 -->
  <line x1="440" y1="88" x2="440" y2="420" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 리버스 프록시 -->
  <text x="660" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">리버스 프록시</text>
  <text x="660" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버 측에 위치</text>

  <!-- 인터넷 클라이언트 -->
  <rect x="460" y="163" width="80" height="56" rx="6" fill="#2a2a1a" stroke="#e8c44a" stroke-width="1"/>
  <text x="500" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c44a">인터넷</text>
  <text x="500" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c44a">클라이언트</text>

  <!-- 리버스 프록시 서버 -->
  <rect x="590" y="155" width="100" height="72" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Reverse</text>
  <text x="640" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Proxy</text>
  <text x="640" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">로드밸런서/nginx</text>

  <!-- 백엔드 서버들 -->
  <rect x="740" y="130" width="80" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="780" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">서버-A</text>
  <rect x="740" y="182" width="80" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="780" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">서버-B</text>
  <rect x="740" y="234" width="80" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="780" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">서버-C</text>

  <!-- 화살표 리버스 -->
  <line x1="540" y1="191" x2="590" y2="191" stroke="#e8c44a" stroke-width="1.5" marker-end="url(#revArr)"/>
  <line x1="690" y1="178" x2="740" y2="150" stroke="#55c555" stroke-width="1.5" marker-end="url(#revArr)"/>
  <line x1="690" y1="191" x2="740" y2="202" stroke="#55c555" stroke-width="1.5" marker-end="url(#revArr)"/>
  <line x1="690" y1="205" x2="740" y2="254" stroke="#55c555" stroke-width="1.5" marker-end="url(#revArr)"/>

  <!-- 리버스 프록시 특징 -->
  <rect x="450" y="295" width="370" height="88" rx="6" fill="#111"/>
  <text x="470" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">특징 및 사용 목적</text>
  <text x="470" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">• 로드 밸런싱 (트래픽 분산)</text>
  <text x="470" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">• TLS 종단 처리 (SSL Termination)</text>
  <text x="470" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">• 서버 IP 숨기기 / 캐싱 / WAF</text>

  <!-- 하단 요약 -->
  <rect x="60" y="400" width="760" height="48" rx="8" fill="#111"/>
  <text x="230" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">포워드 프록시: 클라이언트가 설정</text>
  <text x="650" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">리버스 프록시: 서버 측이 설정 (클라는 모름)</text>
  <text x="230" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Squid, 기업 프록시</text>
  <text x="650" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Nginx, HAProxy, Cloudflare</text>
</svg>
