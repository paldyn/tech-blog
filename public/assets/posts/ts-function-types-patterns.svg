<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">함수 타입 패턴 3가지</text>

  <!-- Pattern 1: Callback -->
  <rect x="60" y="65" width="235" height="28" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="177" y="83" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">1. 콜백 타입 (Callback)</text>

  <rect x="60" y="100" width="235" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 배열 메서드 콜백</text>
  <text x="75" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">type</tspan>
    <tspan fill="#ffffff"> MapFn&lt;T, U&gt; =</tspan>
  </text>
  <text x="75" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  (item: T, idx: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="75" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">=&gt;</tspan>
    <tspan fill="#ffffff"> U;</tspan>
  </text>
  <text x="75" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> run&lt;T, U&gt;(</tspan>
  </text>
  <text x="75" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  arr: T[], fn: MapFn&lt;T,U&gt;) {}</tspan>
  </text>

  <!-- Pattern 2: Overload -->
  <rect x="322" y="65" width="235" height="28" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="439" y="83" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">2. 오버로드 타입</text>

  <rect x="322" y="100" width="235" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="337" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 다중 시그니처</text>
  <text x="337" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> parse(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="337" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> parse(n: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">):</tspan>
  </text>
  <text x="337" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">  string</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="337" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> parse(x: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">any</tspan>
    <tspan fill="#ffffff">): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">any</tspan>
  </text>
  <text x="337" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  { </tspan>
    <tspan fill="#9aa4b8">/* 구현 */</tspan>
    <tspan fill="#ffffff"> }</tspan>
  </text>

  <!-- Pattern 3: Method Signatures -->
  <rect x="584" y="65" width="235" height="28" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="701" y="83" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">3. 메서드 시그니처</text>

  <rect x="584" y="100" width="235" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="599" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 인터페이스 메서드</text>
  <text x="599" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">interface</tspan>
    <tspan fill="#ffffff"> Logger {</tspan>
  </text>
  <text x="599" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  log(msg: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">void</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="599" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  warn: (msg: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="599" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">=&gt; void</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="599" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Summary boxes -->
  <rect x="60" y="255" width="760" height="60" rx="6" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">콜백 vs 메서드 시그니처 차이</text>
  <text x="440" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메서드 시그니처(log(): void)는 this 바인딩이 더 유연 / 함수 프로퍼티(log: () =&gt; void)는 더 엄격한 타입 체크</text>

  <!-- Tip boxes -->
  <rect x="60" y="335" width="370" height="100" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">콜백 타입 활용 팁</text>
  <text x="245" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제네릭으로 재사용성 높이기</text>
  <text x="245" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">콜백 반환 타입 void vs never 구분</text>
  <text x="245" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비동기 콜백은 Promise&lt;T&gt; 반환 타입 명시</text>

  <rect x="450" y="335" width="370" height="100" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">주의사항</text>
  <text x="635" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오버로드 구현 시그니처는 외부 노출 안 됨</text>
  <text x="635" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메서드 시그니처는 공변성(covariance) 허용</text>
  <text x="635" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수 프로퍼티는 반변성(contravariance) 체크</text>
</svg>
