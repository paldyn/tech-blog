<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">정규화 단계: 1NF → 2NF → 3NF → BCNF</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">함수 종속성으로 이상 현상(Anomaly) 제거</text>

  <!-- 1NF -->
  <rect x="50" y="88" width="370" height="112" rx="10" fill="#111118" stroke="#7ec8e3" stroke-width="2"/>
  <text x="235" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">1NF (제1정규형)</text>
  <text x="235" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">모든 속성이 원자값(Atomic Value)이어야 한다</text>
  <text x="235" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">✗ (국어, 영어) → 한 컬럼에 여러 값</text>
  <text x="235" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 반복 그룹 제거, 각 값 별도 행으로 분리</text>
  <text x="235" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모든 행에 PK가 있고, PK로 행을 식별 가능</text>

  <!-- 2NF -->
  <rect x="460" y="88" width="370" height="112" rx="10" fill="#111118" stroke="#55c555" stroke-width="2"/>
  <text x="645" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">2NF (제2정규형)</text>
  <text x="645" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1NF + 부분 함수 종속 제거</text>
  <text x="645" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">복합 PK(A, B)에서 A만으로 결정되는 속성 분리</text>
  <text x="645" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 비키 속성은 PK 전체에 완전 함수 종속이어야</text>
  <text x="645" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단일 컬럼 PK이면 자동으로 2NF 만족</text>

  <!-- Arrow 1→2 -->
  <polygon points="424,144 440,152 424,160" fill="#55c555"/>
  <line x1="420" y1="152" x2="458" y2="152" stroke="#55c555" stroke-width="2"/>

  <!-- 3NF -->
  <rect x="50" y="232" width="370" height="112" rx="10" fill="#111118" stroke="#7777cc" stroke-width="2"/>
  <text x="235" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">3NF (제3정규형)</text>
  <text x="235" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2NF + 이행적 함수 종속 제거</text>
  <text x="235" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PK → A → B 에서 A→B 를 별도 테이블로</text>
  <text x="235" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 비키 속성은 오직 후보키에만 종속되어야</text>
  <text x="235" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">예: 주문(order_id, dept_id, dept_name) → 분리</text>

  <!-- Arrow 2→3 -->
  <line x1="645" y1="200" x2="645" y2="220" stroke="#7777cc" stroke-width="2"/>
  <line x1="645" y1="220" x2="235" y2="220" stroke="#7777cc" stroke-width="2"/>
  <polygon points="231,216 239,220 231,224" fill="#7777cc"/>

  <!-- BCNF -->
  <rect x="460" y="232" width="370" height="112" rx="10" fill="#111118" stroke="#e05555" stroke-width="2"/>
  <text x="645" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">BCNF (보이스-코드 정규형)</text>
  <text x="645" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3NF + 결정자는 반드시 후보키이어야</text>
  <text x="645" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">후보키가 여럿일 때 3NF가 부족할 수 있음</text>
  <text x="645" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ X → Y 이면 X는 슈퍼키(Superkey)</text>
  <text x="645" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">3NF ⊃ BCNF (BCNF가 더 엄격)</text>

  <!-- Arrow 3→BCNF -->
  <polygon points="424,288 440,296 424,304" fill="#e05555"/>
  <line x1="420" y1="296" x2="458" y2="296" stroke="#e05555" stroke-width="2"/>

  <!-- Bottom: Anomaly types -->
  <rect x="50" y="370" width="780" height="104" rx="8" fill="#111118" stroke="#333"/>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">정규화로 제거하는 이상 현상(Anomaly)</text>

  <rect x="80" y="404" width="200" height="54" rx="6" fill="#1a1010"/>
  <text x="180" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">삽입 이상</text>
  <text x="180" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">불필요한 데이터 없이</text>
  <text x="180" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">삽입 불가 문제</text>

  <rect x="340" y="404" width="200" height="54" rx="6" fill="#1a1010"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">갱신 이상</text>
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일부 행만 수정해</text>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터 불일치 발생</text>

  <rect x="600" y="404" width="200" height="54" rx="6" fill="#1a1010"/>
  <text x="700" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">삭제 이상</text>
  <text x="700" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">행 삭제 시 필요한</text>
  <text x="700" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정보도 같이 삭제</text>
</svg>
