<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <defs>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">default 메서드 충돌 &#8212; 다이아몬드 문제와 해결</text>

  <!-- Interface A: x=60, y=82, w=300, h=76 -->
  <rect x="60" y="82" width="300" height="76" fill="#1e1020" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="210" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">&#171;interface&#187; A</text>
  <text x="210" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">default String hello() {</text>
  <text x="210" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">    return "Hello from A"; }</text>

  <!-- Interface B: x=520, y=82, w=300, h=76 -->
  <rect x="520" y="82" width="300" height="76" fill="#1e1020" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="670" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">&#171;interface&#187; B</text>
  <text x="670" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">default String hello() {</text>
  <text x="670" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">    return "Hello from B"; }</text>

  <!-- Arrows A,B down to warning box -->
  <line x1="210" y1="158" x2="380" y2="208" stroke="#e05555" stroke-width="2" marker-end="url(#arrRed)"/>
  <line x1="670" y1="158" x2="500" y2="208" stroke="#e05555" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- Warning / conflict box: x=280, y=216, w=320, h=56 -->
  <rect x="280" y="216" width="320" height="56" fill="#201008" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">&#9888; 충돌 발생!</text>
  <text x="440" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">hello()가 두 인터페이스에서 동시에 정의됨</text>

  <!-- Arrow conflict box down to class C -->
  <line x1="440" y1="272" x2="440" y2="306" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- Class C: x=190, y=314, w=500, h=76 -->
  <rect x="190" y="314" width="500" height="76" fill="#0e1420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="336" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">class C implements A, B</text>
  <text x="440" y="356" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">@Override hello() &#8594; 컴파일러가 명시적 재정의 강제</text>
  <text x="440" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">A.super.hello() / B.super.hello() 로 특정 구현 선택</text>

  <!-- Code box: x=90, y=414, w=700, h=72 -->
  <rect x="90" y="414" width="700" height="72" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="436" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">@Override </tspan><tspan fill="#7ec8e3" font-weight="600">public </tspan><tspan fill="#ffffff">String hello() {</tspan>
  </text>
  <text x="110" y="456" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return </tspan><tspan fill="#ffffff">A.super.hello() + </tspan><tspan fill="#ce9178">" | "</tspan><tspan fill="#ffffff"> + B.super.hello(); }</tspan>
  </text>
</svg>
