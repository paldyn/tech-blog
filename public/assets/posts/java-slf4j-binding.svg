<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SLF4J 바인딩 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">컴파일타임 API + 런타임 바인딩</text>

  <defs>
    <marker id="sbArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="40" y="130" width="190" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">코드</text>
  <text x="135" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">slf4j-api에 의존</text>

  <rect x="345" y="130" width="190" height="80" rx="8" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">slf4j-api</text>
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Logger 인터페이스</text>

  <rect x="650" y="130" width="190" height="80" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="745" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">바인딩 구현</text>
  <text x="745" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Logback / Log4j2</text>

  <line x1="230" y1="170" x2="345" y2="170" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#sbArr)"/>
  <line x1="535" y1="170" x2="650" y2="170" stroke="#7ec8e3" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#sbArr)"/>

  <text x="287" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">컴파일타임</text>
  <text x="592" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">런타임에 발견</text>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">클래스패스에 바인딩이 없으면 NOP — 아무것도 출력되지 않음</text>
</svg>
