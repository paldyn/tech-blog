<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Q-러닝: Q-테이블과 업데이트 규칙</text>

  <!-- Q-테이블 영역 -->
  <text x="220" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Q-테이블 (Q-Table)</text>

  <!-- 테이블 헤더 -->
  <rect x="60" y="102" width="320" height="34" fill="#0f1a2e" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상태 (State)</text>
  <text x="260" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a555" text-anchor="middle">a=왼 | a=오</text>

  <!-- 테이블 행 1 -->
  <rect x="60" y="136" width="320" height="36" fill="#0a1020" rx="0" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="140" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">s₀ (막대 수직)</text>
  <text x="260" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">0.82 | 0.79</text>

  <!-- 테이블 행 2 -->
  <rect x="60" y="172" width="320" height="36" fill="#0d1520" rx="0" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="140" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">s₁ (막대 오른쪽 기울기)</text>
  <text x="260" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e0a555" text-anchor="middle">0.31 | 0.71</text>

  <!-- 테이블 행 3 -->
  <rect x="60" y="208" width="320" height="36" fill="#0a1020" rx="0" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="140" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">s₂ (막대 왼쪽 기울기)</text>
  <text x="260" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e0a555" text-anchor="middle">0.68 | 0.22</text>

  <!-- 테이블 행 4 -->
  <rect x="60" y="244" width="320" height="36" fill="#0d1520" rx="0" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="140" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">... (N개 상태)</text>
  <text x="260" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#555" text-anchor="middle">... | ...</text>

  <!-- Bellman 업데이트 공식 박스 -->
  <rect x="430" y="90" width="410" height="120" fill="#1a1030" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="635" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Bellman 업데이트 규칙</text>
  <text x="635" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Q(s,a) ← Q(s,a)</text>
  <text x="635" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" text-anchor="middle">+ α[r + γ·max Q(s',a')</text>
  <text x="635" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" text-anchor="middle">- Q(s,a)]</text>

  <!-- 수식 구성 요소 설명 -->
  <rect x="430" y="228" width="190" height="56" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="525" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">α (학습률)</text>
  <text x="525" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">업데이트 크기 조절</text>
  <text x="525" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">보통 0.1 ~ 0.5</text>

  <rect x="640" y="228" width="200" height="56" fill="#0d1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="740" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">γ (할인율)</text>
  <text x="740" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">미래 보상 비중</text>
  <text x="740" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">보통 0.95 ~ 0.99</text>

  <!-- TD 에러 박스 -->
  <rect x="430" y="300" width="410" height="72" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">TD 에러 (Temporal Difference Error)</text>
  <text x="635" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" text-anchor="middle">δ = r + γ·maxₐ Q(s',a') - Q(s,a)</text>
  <text x="635" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예측값과 실제값의 차이 → 학습 신호</text>

  <!-- 학습 흐름 화살표 -->
  <text x="220" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">학습 과정</text>

  <!-- 단계 박스들 -->
  <rect x="60" y="336" width="100" height="48" fill="#0f1a2e" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">① 관측</text>
  <text x="110" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">상태 s 확인</text>

  <line x1="160" y1="360" x2="174" y2="360" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="176" y="336" width="100" height="48" fill="#0f1a2e" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="226" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a555" text-anchor="middle">② 행동</text>
  <text x="226" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">a=argmax Q</text>

  <line x1="276" y1="360" x2="290" y2="360" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="292" y="336" width="100" height="48" fill="#0f1a2e" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="342" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">③ 보상</text>
  <text x="342" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">r, s' 수신</text>

  <line x1="392" y1="360" x2="406" y2="360" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- 학습 라벨 - 마지막 박스 -->
  <text x="420" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="start">④ Q-테이블</text>
  <text x="420" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="start">업데이트</text>

  <text x="60" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="start">* 오프-정책 학습: 행동 선택(ε-greedy)과 학습 목표(greedy)가 다를 수 있음</text>
</svg>
