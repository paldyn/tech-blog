<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">Rollup 출력 포맷 비교</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">하나의 소스 → 여러 포맷 동시 출력 (ESM · CJS · UMD · IIFE)</text>

  <!-- Source box -->
  <rect x="60" y="96" width="160" height="56" rx="8" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="76" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">Source (ESM)</text>
  <text x="76" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">src/index.ts</text>

  <!-- Arrow down to ESM -->
  <line x1="142" y1="154" x2="142" y2="182" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- ESM -->
  <rect x="60" y="184" width="160" height="48" rx="6" fill="#0d2b1a" stroke="#1e7040"/>
  <text x="76" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">ESM</text>
  <text x="76" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">dist/index.mjs</text>

  <!-- CJS -->
  <rect x="60" y="244" width="160" height="48" rx="6" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="76" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">CJS</text>
  <text x="76" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">dist/index.cjs</text>

  <!-- UMD -->
  <rect x="60" y="304" width="160" height="48" rx="6" fill="#1a0d2b" stroke="#3a1e70"/>
  <text x="76" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">UMD</text>
  <text x="76" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">dist/index.umd.js</text>

  <!-- Lines from source -->
  <line x1="142" y1="154" x2="142" y2="244" stroke="#4a9eff" stroke-width="1" stroke-dasharray="4"/>
  <line x1="142" y1="244" x2="142" y2="304" stroke="#4a9eff" stroke-width="1" stroke-dasharray="4"/>

  <!-- Right: rollup.config code -->
  <rect x="280" y="96" width="540" height="300" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="296" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">// rollup.config.js</text>
  <text x="296" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">import </text>
  <text x="338" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">typescript </text>
  <text x="428" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">from </text>
  <text x="468" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'@rollup/plugin-typescript'</text>
  <text x="296" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">export default </text>
  <text x="401" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">{</text>
  <text x="296" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  input: </text>
  <text x="352" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'src/index.ts'</text>
  <text x="451" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="296" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  external: [</text>
  <text x="370" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">/node_modules/</text>
  <text x="473" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">],</text>
  <text x="296" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  plugins: [typescript()],</text>
  <text x="296" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  output: [</text>
  <text x="296" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    {</text>
  <text x="296" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">      file: </text>
  <text x="348" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'dist/index.mjs'</text>
  <text x="451" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">, format: </text>
  <text x="524" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'esm'</text>
  <text x="557" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="296" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">      sourcemap: </text>
  <text x="382" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">true </text>
  <text x="407" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">},</text>
  <text x="296" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    { file: </text>
  <text x="362" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'dist/index.cjs'</text>
  <text x="465" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">, format: </text>
  <text x="538" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'cjs'</text>
  <text x="572" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> },</text>
  <text x="296" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    { file: </text>
  <text x="362" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'dist/index.umd.js'</text>
  <text x="478" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">, format: </text>
  <text x="551" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'umd'</text>
  <text x="585" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> },</text>
  <text x="296" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">  ]</text>
  <text x="296" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">};</text>

  <text x="60" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">external 옵션으로 peer dependency를 번들에서 제외 — 라이브러리 배포의 핵심</text>
</svg>
