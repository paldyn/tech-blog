<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">Rollup 출력 포맷 비교</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">하나의 소스 → 여러 포맷 동시 출력 (ESM · CJS · UMD · IIFE)</text>

  <!-- Source box -->
  <rect x="60" y="96" width="160" height="56" rx="8" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="76" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">Source (ESM)</text>
  <text x="76" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">src/index.ts</text>

  <!-- Arrow down to ESM -->
  <line x1="142" y1="154" x2="142" y2="182" stroke="#4a9eff" stroke-width="2" stroke-dasharray="4"/>

  <!-- ESM -->
  <rect x="60" y="184" width="160" height="48" rx="6" fill="#0d2b1a" stroke="#1e7040"/>
  <text x="76" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">ESM</text>
  <text x="76" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">dist/index.mjs</text>

  <!-- CJS -->
  <rect x="60" y="244" width="160" height="48" rx="6" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="76" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">CJS</text>
  <text x="76" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">dist/index.cjs</text>

  <!-- UMD -->
  <rect x="60" y="304" width="160" height="48" rx="6" fill="#1a0d2b" stroke="#3a1e70"/>
  <text x="76" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">UMD</text>
  <text x="76" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">dist/index.umd.js</text>

  <!-- Lines from source -->
  <line x1="142" y1="154" x2="142" y2="244" stroke="#4a9eff" stroke-width="2" stroke-dasharray="4"/>
  <line x1="142" y1="244" x2="142" y2="304" stroke="#4a9eff" stroke-width="2" stroke-dasharray="4"/>

  <!-- Right: rollup.config code -->
  <rect x="280" y="96" width="540" height="300" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="296" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// rollup.config.js</text>
  <text x="296" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ffffff">typescript </tspan><tspan fill="#7ec8e3">from </tspan><tspan fill="#ce9178">'@rollup/plugin-typescript'</tspan></text>

  <text x="296" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">export default </tspan><tspan fill="#ffffff">{</tspan></text>
  
  <text x="296" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  input: </tspan><tspan fill="#ce9178">'src/index.ts'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="296" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  external: [</tspan><tspan fill="#b5cea8">/node_modules/</tspan><tspan fill="#ffffff">],</tspan></text>

  <text x="296" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  plugins: [typescript()],</text>
  <text x="296" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  output: [</text>
  <text x="296" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    {</text>
  <text x="296" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      file: </tspan><tspan fill="#ce9178">'dist/index.mjs'</tspan><tspan fill="#ffffff">, format: </tspan><tspan fill="#ce9178">'esm'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="296" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      sourcemap: </tspan><tspan fill="#7ec8e3">true </tspan><tspan fill="#ffffff">},</tspan></text>

  <text x="296" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    { file: </tspan><tspan fill="#ce9178">'dist/index.cjs'</tspan><tspan fill="#ffffff">, format: </tspan><tspan fill="#ce9178">'cjs'</tspan><tspan fill="#ffffff">},</tspan></text>

  <text x="296" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    { file: </tspan><tspan fill="#ce9178">'dist/index.umd.js'</tspan><tspan fill="#ffffff">, format: </tspan><tspan fill="#ce9178">'umd'</tspan><tspan fill="#ffffff">},</tspan></text>

  <text x="296" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  ]</text>
  <text x="296" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">};</text>

  <text x="60" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">external 옵션으로 peer dependency를 번들에서 제외 — 라이브러리 배포의 핵심</text>
</svg>
