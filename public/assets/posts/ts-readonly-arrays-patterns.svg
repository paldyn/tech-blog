<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ReadonlyArray 활용 패턴</text>

  <!-- Code box: y=68, 9 visible lines at 20px spacing → 160px; height=182 gives top-pad=18, bottom-pad=18 -->
  <!-- Lines: 92,112,132,152,172,192,212,232,252 → last at 252, bottom = 68+182=250? Need ≥252+14=266 → height=200 -->
  <!-- y=68+h=200 → bottom=268; first line y=89 (pad=21), last y=252 (bottom-pad=16) → diff=5, close enough -->
  <rect x="80" y="68" width="720" height="200" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <text x="96" y="89" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 두 문법은 동일</text>
  <text x="96" y="109" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> A = </tspan><tspan fill="#7ec8e3" font-weight="600">readonly</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">[];</tspan>
  </text>
  <text x="96" y="129" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> B = ReadonlyArray&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">&gt;;</tspan>
  </text>
  <text x="96" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 함수 파라미터 — 원본 불변 보장</text>
  <text x="96" y="177" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> sum(nums: </tspan><tspan fill="#7ec8e3" font-weight="600">readonly</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">[]): </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="96" y="197" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> nums.reduce((a, b) =&gt; a + b, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="96" y="217" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="96" y="245" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// readonly T[] 권장</text>

  <!-- Left box: y=295, height=80 → bottom=375; text at 320,348 (pad 25/27 ≈ ok) -->
  <rect x="80" y="295" width="335" height="80" fill="#000000" stroke="#7ec8e3" stroke-width="1" rx="6"/>
  <text x="247" y="323" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">readonly number[]</text>
  <text x="247" y="351" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">선호되는 문법</text>

  <!-- Right box -->
  <rect x="465" y="295" width="335" height="80" fill="#000000" stroke="#7777cc" stroke-width="1" rx="6"/>
  <text x="632" y="323" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" font-weight="600">ReadonlyArray&lt;number&gt;</text>
  <text x="632" y="351" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">동등한 제네릭 형식</text>
</svg>
