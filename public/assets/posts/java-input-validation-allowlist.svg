<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">허용 목록 vs 차단 목록</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">검증은 "무엇을 허용할지" 정의하는 방향이 안전하다</text>

  <!-- Blocklist (bad) -->
  <rect x="60" y="100" width="360" height="240" rx="10" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">차단 목록 (Blocklist)</text>
  <line x1="84" y1="150" x2="396" y2="150" stroke="#402020" stroke-width="1"/>
  <text x="84" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">"이런 나쁜 입력을 막자"</text>
  <text x="84" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">예: &lt;script&gt; · '--' · ../ 필터</text>
  <text x="84" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">문제: 새로운 공격 벡터를</text>
  <text x="84" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">계속 놓친다</text>
  <text x="84" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">인코딩·우회로 뚫리기 쉬움</text>
  <text x="240" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">불완전 — 지양</text>

  <!-- Allowlist (good) -->
  <rect x="460" y="100" width="360" height="240" rx="10" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">허용 목록 (Allowlist)</text>
  <line x1="484" y1="150" x2="796" y2="150" stroke="#204020" stroke-width="1"/>
  <text x="484" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">"이 형식만 허용하자"</text>
  <text x="484" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">예: ^[a-z0-9_]{3,20}$ 만 통과</text>
  <text x="484" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">장점: 정의된 것 외 전부</text>
  <text x="484" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">거부 → 미지의 공격도 차단</text>
  <text x="484" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">범위·타입·형식을 명시</text>
  <text x="640" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">권장 — 기본 전략</text>
</svg>
