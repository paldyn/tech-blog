<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">호이스팅 — var의 선언은 최상단으로 끌어올려진다</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">개발자가 쓴 코드 vs JavaScript가 실제 처리하는 코드</text>

  <!-- Left: what you write -->
  <rect x="60" y="104" width="360" height="280" fill="#0f1624" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="130" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">개발자가 작성한 코드</text>

  <rect x="78" y="144" width="324" height="186" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- y=164,182,200,218,236,254,272,290,308,326 (18px) -->
  <text x="94" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 선언보다 먼저 사용</text>
  <text x="94" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">console.log(x);</text>
  <text x="94" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">var x = 5;</text>
  <text x="94" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">console.log(x);</text>
  <text x="94" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>

  <text x="78" y="354" font-size="12" fill="#888">SyntaxError 없이 실행됨 — 결과는?</text>
  <text x="78" y="372" font-size="12" fill="#888">첫 번째 log → undefined (에러 아님!)</text>

  <!-- Center arrow -->
  <polygon points="422,255 422,241 452,241 452,235 478,248 452,261 452,255"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="409" y="218" width="82" height="18" fill="#0a0a0a"/>
  <text x="450" y="231" font-size="11" fill="#7777cc" text-anchor="middle">JS 엔진이</text>
  <rect x="409" y="262" width="82" height="18" fill="#0a0a0a"/>
  <text x="450" y="275" font-size="11" fill="#7777cc" text-anchor="middle">실제로 보는 것</text>

  <!-- Right: what JS sees (after hoisting) -->
  <rect x="480" y="104" width="340" height="280" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="130" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">호이스팅 후 실제 실행 순서</text>

  <rect x="498" y="144" width="304" height="186" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="514" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">var x;        // 선언 호이스트</text>
  <text x="514" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">              // x = undefined</text>
  <text x="514" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="514" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">console.log(x);</text>
  <text x="514" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a53f">// undefined ← 에러 아님!</text>
  <text x="514" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="514" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">x = 5;        // 할당은 제자리</text>
  <text x="514" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">console.log(x);</text>
  <text x="514" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">// 5</text>

  <text x="498" y="354" font-size="12" fill="#888">선언(var x)만 위로 — 할당(= 5)은 원래 자리</text>
  <text x="498" y="372" font-size="12" fill="#e8a53f">→ 이런 동작이 버그의 온상이 됨</text>

  <!-- Footer -->
  <text x="60" y="440" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part II — 호이스팅의 본질</text>
</svg>
