<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript vs JavaScript 비교</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">주요 특성 7가지 비교</text>

  <!-- Table header -->
  <rect x="60" y="96" width="280" height="40" rx="6" fill="#1a1520" stroke="#6a4a9e" stroke-width="1"/>
  <text x="200" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">특성</text>

  <rect x="355" y="96" width="230" height="40" rx="6" fill="#1a1520" stroke="#6a4a9e" stroke-width="1"/>
  <text x="470" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">JavaScript</text>

  <rect x="600" y="96" width="220" height="40" rx="6" fill="#0f1f0f" stroke="#3a8e3a" stroke-width="1"/>
  <text x="710" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">TypeScript</text>

  <!-- Row 1: 타입 시스템 -->
  <rect x="60" y="146" width="280" height="44" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="200" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">타입 시스템</text>
  <rect x="355" y="146" width="230" height="44" rx="4" fill="#0d0a0a" stroke="#222" stroke-width="1"/>
  <text x="470" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">동적 (런타임)</text>
  <rect x="600" y="146" width="220" height="44" rx="4" fill="#0a0d0a" stroke="#222" stroke-width="1"/>
  <text x="710" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">정적 (컴파일 타임)</text>

  <!-- Row 2: 실행 방식 -->
  <rect x="60" y="196" width="280" height="44" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="200" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">실행 방식</text>
  <rect x="355" y="196" width="230" height="44" rx="4" fill="#0d0a0a" stroke="#222" stroke-width="1"/>
  <text x="470" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">직접 실행</text>
  <rect x="600" y="196" width="220" height="44" rx="4" fill="#0a0d0a" stroke="#222" stroke-width="1"/>
  <text x="710" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">JS로 컴파일 후 실행</text>

  <!-- Row 3: 오류 감지 -->
  <rect x="60" y="246" width="280" height="44" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="200" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">오류 감지</text>
  <rect x="355" y="246" width="230" height="44" rx="4" fill="#0d0a0a" stroke="#222" stroke-width="1"/>
  <text x="470" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">런타임 (배포 후)</text>
  <rect x="600" y="246" width="220" height="44" rx="4" fill="#0a0d0a" stroke="#222" stroke-width="1"/>
  <text x="710" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">컴파일 타임 (배포 전)</text>

  <!-- Row 4: IDE 지원 -->
  <rect x="60" y="296" width="280" height="44" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="200" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">IDE 자동완성</text>
  <rect x="355" y="296" width="230" height="44" rx="4" fill="#0d0a0a" stroke="#222" stroke-width="1"/>
  <text x="470" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">제한적</text>
  <rect x="600" y="296" width="220" height="44" rx="4" fill="#0a0d0a" stroke="#222" stroke-width="1"/>
  <text x="710" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">강력한 인텔리센스</text>

  <!-- Row 5: 러닝 커브 -->
  <rect x="60" y="346" width="280" height="44" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="200" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">러닝 커브</text>
  <rect x="355" y="346" width="230" height="44" rx="4" fill="#0d0a0a" stroke="#222" stroke-width="1"/>
  <text x="470" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">낮음</text>
  <rect x="600" y="346" width="220" height="44" rx="4" fill="#0a0d0a" stroke="#222" stroke-width="1"/>
  <text x="710" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">중간 (타입 학습 필요)</text>

  <!-- Row 6: 대형 프로젝트 -->
  <rect x="60" y="396" width="280" height="44" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="200" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">대형 프로젝트 적합성</text>
  <rect x="355" y="396" width="230" height="44" rx="4" fill="#0d0a0a" stroke="#222" stroke-width="1"/>
  <text x="470" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">관리 어려움</text>
  <rect x="600" y="396" width="220" height="44" rx="4" fill="#0a0d0a" stroke="#222" stroke-width="1"/>
  <text x="710" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">&#x2713; 강력히 권장</text>

  <!-- Row 7: JS 호환성 -->
  <rect x="60" y="446" width="280" height="44" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="200" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">JavaScript 호환성</text>
  <rect x="355" y="446" width="230" height="44" rx="4" fill="#0d0a0a" stroke="#222" stroke-width="1"/>
  <text x="470" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">&#x2713; 원본</text>
  <rect x="600" y="446" width="220" height="44" rx="4" fill="#0a0d0a" stroke="#222" stroke-width="1"/>
  <text x="710" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">&#x2713; 100% JS 상위셋</text>
</svg>
