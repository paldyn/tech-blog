<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TypeScript vs JavaScript 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">두 언어의 핵심 차이점</text>
  <!-- Header row -->
  <rect x="60" y="90" width="340" height="42" rx="6" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">JavaScript</text>
  <rect x="480" y="90" width="340" height="42" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">TypeScript</text>
  <text x="420" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555">vs</text>
  <!-- Row 1: Typing -->
  <rect x="60" y="148" width="760" height="48" rx="0" fill="#111" stroke="none"/>
  <text x="80" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타이핑</text>
  <text x="230" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">동적 타입 (Dynamic)</text>
  <text x="230" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">실행 시점에 타입 결정</text>
  <text x="650" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">정적 타입 (Static)</text>
  <text x="650" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">컴파일 시점에 타입 검사</text>
  <line x1="60" y1="196" x2="820" y2="196" stroke="#222" stroke-width="1"/>
  <!-- Row 2: Error detection -->
  <rect x="60" y="196" width="760" height="48" rx="0" fill="#0f0f0f" stroke="none"/>
  <text x="80" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">에러 검출</text>
  <text x="230" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">런타임 에러</text>
  <text x="230" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">실행 후 발견</text>
  <text x="650" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">컴파일 타임 에러</text>
  <text x="650" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">실행 전 에디터에서 발견</text>
  <line x1="60" y1="244" x2="820" y2="244" stroke="#222" stroke-width="1"/>
  <!-- Row 3: Learning curve -->
  <rect x="60" y="244" width="760" height="48" rx="0" fill="#111" stroke="none"/>
  <text x="80" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">학습 곡선</text>
  <text x="230" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">낮음 (진입 쉬움)</text>
  <text x="230" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">브라우저가 직접 실행</text>
  <text x="650" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">중간 (타입 시스템 이해 필요)</text>
  <text x="650" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">컴파일 빌드 단계 추가</text>
  <line x1="60" y1="292" x2="820" y2="292" stroke="#222" stroke-width="1"/>
  <!-- Row 4: IDE -->
  <rect x="60" y="292" width="760" height="48" rx="0" fill="#0f0f0f" stroke="none"/>
  <text x="80" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IDE 지원</text>
  <text x="230" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">기본적인 자동완성</text>
  <text x="230" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">추론 한계 있음</text>
  <text x="650" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">강력한 IntelliSense</text>
  <text x="650" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">정확한 타입 힌트 제공</text>
  <line x1="60" y1="340" x2="820" y2="340" stroke="#222" stroke-width="1"/>
  <!-- Row 5: Scale -->
  <rect x="60" y="340" width="760" height="48" rx="0" fill="#111" stroke="none"/>
  <text x="80" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대규모 프로젝트</text>
  <text x="230" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">어려움 (암묵적 타입)</text>
  <text x="230" y="379" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">유지보수 비용 증가</text>
  <text x="650" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">최적 (명시적 계약)</text>
  <text x="650" y="379" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">리팩터링 자신감 향상</text>
  <line x1="60" y1="388" x2="820" y2="388" stroke="#222" stroke-width="1"/>
  <!-- Row border -->
  <rect x="60" y="148" width="760" height="240" rx="0" fill="none" stroke="#222" stroke-width="1"/>
  <!-- Bottom -->
  <rect x="60" y="408" width="760" height="68" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">결론: TypeScript는 JavaScript의 진화, 대체가 아닌 강화다</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">소규모 스크립트 → JS가 빠를 수 있음 | 중·대형 애플리케이션 → TS의 투자 대비 효과 압도적</text>
  <text x="440" y="469" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">2024년 State of JS: 응답자의 78% "TypeScript 사용 중"</text>
</svg>
