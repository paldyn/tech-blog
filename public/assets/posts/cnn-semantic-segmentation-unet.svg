<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">U-Net 인코더-디코더 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">다운샘플링 → 업샘플링 + 스킵 연결</text>

  <!-- Encoder (left side, going down) -->
  <text x="130" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">인코더 (Encoder)</text>

  <!-- Input -->
  <rect x="60" y="115" width="140" height="44" fill="#1a2535" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">입력: 572×572×1</text>
  <text x="130" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Conv3×3 × 2 + ReLU</text>

  <!-- Encoder level 2 -->
  <polygon points="130,168 124,160 136,160" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <text x="152" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">MaxPool</text>
  <line x1="130" y1="159" x2="130" y2="175" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="60" y="175" width="140" height="44" fill="#1a2535" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">284×284×128</text>
  <text x="130" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Conv3×3 × 2</text>

  <!-- Encoder level 3 -->
  <polygon points="130,228 124,220 136,220" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <text x="152" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">MaxPool</text>
  <line x1="130" y1="219" x2="130" y2="235" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="60" y="235" width="140" height="44" fill="#1a2535" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">142×142×256</text>
  <text x="130" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Conv3×3 × 2</text>

  <!-- Encoder level 4 -->
  <polygon points="130,288 124,280 136,280" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <text x="152" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">MaxPool</text>
  <line x1="130" y1="279" x2="130" y2="295" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="60" y="295" width="140" height="44" fill="#1a2535" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">71×71×512</text>
  <text x="130" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Conv3×3 × 2</text>

  <!-- Bottleneck -->
  <polygon points="130,348 124,340 136,340" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="1"/>
  <line x1="130" y1="339" x2="130" y2="355" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="60" y="355" width="140" height="44" fill="#1a1a1a" rx="6" stroke="#888" stroke-width="2"/>
  <text x="130" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Bottleneck</text>
  <text x="130" y="391" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">35×35×1024</text>

  <!-- Decoder (right side, going up) -->
  <text x="690" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">디코더 (Decoder)</text>

  <!-- Decoder level 4 -->
  <rect x="620" y="295" width="140" height="44" fill="#1a1208" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="690" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">71×71×512</text>
  <text x="690" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Upsample + Conv</text>

  <!-- Decoder level 3 -->
  <polygon points="690,286 684,294 696,294" fill="#ce9178" stroke="#7a5530" stroke-width="1"/>
  <line x1="690" y1="287" x2="690" y2="280" stroke="#ce9178" stroke-width="1.5"/>

  <rect x="620" y="235" width="140" height="44" fill="#1a1208" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="690" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">142×142×256</text>
  <text x="690" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Upsample + Conv</text>

  <!-- Decoder level 2 -->
  <polygon points="690,226 684,234 696,234" fill="#ce9178" stroke="#7a5530" stroke-width="1"/>
  <line x1="690" y1="227" x2="690" y2="220" stroke="#ce9178" stroke-width="1.5"/>

  <rect x="620" y="175" width="140" height="44" fill="#1a1208" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="690" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">284×284×128</text>
  <text x="690" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Upsample + Conv</text>

  <!-- Decoder level 1 -->
  <polygon points="690,166 684,174 696,174" fill="#ce9178" stroke="#7a5530" stroke-width="1"/>
  <line x1="690" y1="167" x2="690" y2="160" stroke="#ce9178" stroke-width="1.5"/>

  <rect x="620" y="115" width="140" height="44" fill="#1a1208" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="690" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">388×388×64</text>
  <text x="690" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Conv1×1 → 클래스 수</text>

  <!-- Skip connections (horizontal arrows) -->
  <!-- Skip 1 (top) -->
  <line x1="200" y1="137" x2="620" y2="137" stroke="#55c555" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="620,137 610,132 610,142" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>
  <text x="410" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">스킵 연결 (crop + concat)</text>

  <!-- Skip 2 -->
  <line x1="200" y1="197" x2="620" y2="197" stroke="#55c555" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="620,197 610,192 610,202" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>

  <!-- Skip 3 -->
  <line x1="200" y1="257" x2="620" y2="257" stroke="#55c555" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="620,257 610,252 610,262" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>

  <!-- Skip 4 -->
  <line x1="200" y1="317" x2="620" y2="317" stroke="#55c555" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="620,317 610,312 610,322" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>

  <!-- Bottleneck arrow to decoder -->
  <line x1="200" y1="377" x2="620" y2="377" stroke="#888" stroke-width="2.5"/>
  <polygon points="620,377 610,372 610,382" fill="#888" stroke="#444" stroke-width="1"/>
  <line x1="620" y1="377" x2="690" y2="339" stroke="#888" stroke-width="1.5"/>

  <!-- Bottom labels -->
  <rect x="260" y="420" width="360" height="30" fill="#070b14" rx="4" stroke="#1e2433"/>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">스킵 연결 = 고해상도 위치 + 저해상도 의미 정보 결합</text>
</svg>
