<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">서비스 메시 핵심 기능</text>

  <!-- Card 1: Traffic Management (top-left) -->
  <rect x="50" y="62" width="370" height="160" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="50" y="62" width="5" height="160" rx="4" fill="#7ec8e3"/>
  <text x="76" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">트래픽 관리</text>
  <text x="76" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Canary / Blue-Green 배포</text>
  <text x="76" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Circuit Breaker / Retry / Timeout</text>
  <text x="76" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 가중치 기반 라우팅 (A/B 테스트)</text>
  <text x="76" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 헤더/쿠키 기반 라우팅 규칙</text>
  <text x="76" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">VirtualService / DestinationRule</text>

  <!-- Card 2: Observability (top-right) -->
  <rect x="460" y="62" width="370" height="160" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="460" y="62" width="5" height="160" rx="4" fill="#55c555"/>
  <text x="486" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">관찰 가능성</text>
  <text x="486" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 골든 시그널 자동 수집 (지연, 에러율)</text>
  <text x="486" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 분산 추적 (Jaeger / Zipkin 연동)</text>
  <text x="486" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 서비스 토폴로지 시각화 (Kiali)</text>
  <text x="486" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Prometheus 메트릭 자동 노출</text>
  <text x="486" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">코드 변경 없이 telemetry 확보</text>

  <!-- Card 3: Security (bottom-left) -->
  <rect x="50" y="246" width="370" height="160" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="50" y="246" width="5" height="160" rx="4" fill="#e05555"/>
  <text x="76" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">보안</text>
  <text x="76" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 서비스 간 mTLS 자동 암호화</text>
  <text x="76" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 워크로드 ID 기반 인증 (SPIFFE)</text>
  <text x="76" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 세분화 인가 정책 (AuthorizationPolicy)</text>
  <text x="76" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Zero-Trust 네트워크 구현</text>
  <text x="76" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">PeerAuthentication / AuthorizationPolicy</text>

  <!-- Card 4: Resilience (bottom-right) -->
  <rect x="460" y="246" width="370" height="160" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="460" y="246" width="5" height="160" rx="4" fill="#7777cc"/>
  <text x="486" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">복원력</text>
  <text x="486" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Outlier Detection (장애 노드 제외)</text>
  <text x="486" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 자동 재시도 + 타임아웃 정책</text>
  <text x="486" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 부하 분산 알고리즘 (LEAST_CONN 등)</text>
  <text x="486" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Fault Injection (카오스 엔지니어링)</text>
  <text x="486" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">DestinationRule trafficPolicy</text>

  <!-- Bottom -->
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">모든 기능이 애플리케이션 코드 변경 없이 인프라 레이어에서 동작</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Envoy Proxy가 모든 인바운드/아웃바운드 트래픽을 인터셉트</text>
</svg>
