<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">다중 상속 MRO 코드 예제</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">__mro__ 확인과 협력적 super() 호출</text>

  <!-- Code block -->
  <rect x="60" y="88" width="560" height="360" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>

  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class</text>
  <text x="122" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> A:</text>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">    def </text>
  <text x="120" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">who(self): </text>
  <text x="230" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">return </text>
  <text x="295" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">"A"</text>

  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class</text>
  <text x="122" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> B(A):</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">    def </text>
  <text x="120" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">who(self): </text>
  <text x="230" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">return </text>
  <text x="295" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">"B→"</text>
  <text x="342" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> + super().who()</text>

  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class</text>
  <text x="122" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> C(A):</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">    def </text>
  <text x="120" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">who(self): </text>
  <text x="230" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">return </text>
  <text x="295" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">"C→"</text>
  <text x="342" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> + super().who()</text>

  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class</text>
  <text x="122" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> D(B, C):  </text>
  <text x="246" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># B가 C보다 먼저</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">    def </text>
  <text x="120" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">who(self): </text>
  <text x="230" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">return </text>
  <text x="295" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">"D→"</text>
  <text x="342" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> + super().who()</text>

  <!-- Results -->
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># 결과 확인</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">D().who()</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># "D→B→C→A"</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">D.__mro__</text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># (D, B, C, A, object)</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># A.who()는 단 한 번만 호출됨</text>
  <text x="76" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># (C3 알고리즘이 중복 방지)</text>

  <!-- Right info box -->
  <rect x="650" y="96" width="190" height="140" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="745" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">C3 선형화 규칙</text>
  <text x="665" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1. 자식이 부모보다 앞</text>
  <text x="665" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2. 왼쪽 부모가 오른쪽보다 앞</text>
  <text x="665" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">3. 일관성 유지</text>
  <text x="665" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">불일치 시 TypeError</text>
  <text x="665" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">발생 (MRO 불가)</text>

  <rect x="650" y="256" width="190" height="80" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="745" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">super()의 역할</text>
  <text x="665" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MRO 순서에서 다음</text>
  <text x="665" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클래스를 위임 대상으로</text>
</svg>
