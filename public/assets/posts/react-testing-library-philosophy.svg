<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">구현이 아니라 동작을 테스트한다</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">리팩터링에 강한 테스트의 조건</text>

  <!-- Left: implementation-centric -->
  <rect x="60" y="100" width="360" height="240" rx="10" fill="#200d0d" stroke="#e05555" stroke-width="2"/>
  <text x="240" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">구현 중심 테스트</text>

  <rect x="80" y="150" width="320" height="40" rx="6" fill="#0a0a0a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="240" y="175" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">내부 state 값을 직접 검사</text>

  <rect x="80" y="200" width="320" height="40" rx="6" fill="#0a0a0a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="240" y="225" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">컴포넌트 인스턴스·메서드 접근</text>

  <rect x="80" y="250" width="320" height="40" rx="6" fill="#0a0a0a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="240" y="275" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">CSS 클래스명·DOM 구조에 의존</text>

  <text x="240" y="322" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">동작이 같아도 리팩터링하면 깨진다</text>

  <!-- Right: user-centric -->
  <rect x="460" y="100" width="360" height="240" rx="10" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">사용자 중심 테스트</text>

  <rect x="480" y="150" width="320" height="40" rx="6" fill="#0a0a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="175" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">화면에 보이는 텍스트·역할로 질의</text>

  <rect x="480" y="200" width="320" height="40" rx="6" fill="#0a0a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="225" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">클릭·입력 등 실제 상호작용 재현</text>

  <rect x="480" y="250" width="320" height="40" rx="6" fill="#0a0a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="275" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">사용자가 보는 결과만 단언</text>

  <text x="640" y="322" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">구현이 바뀌어도 동작이 같으면 통과</text>

  <text x="440" y="386" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">"테스트가 소프트웨어 사용 방식을 닮을수록 더 큰 확신을 준다"</text>
</svg>
