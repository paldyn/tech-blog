<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Linus가 Git에 요구한 설계 목표</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">CVS를 반면교사 삼아 정반대로 설계</text>

  <!-- Card 1 -->
  <rect x="60" y="96" width="180" height="264" rx="10" fill="#111" stroke="#1e3a1e"/>
  <text x="150" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="32" fill="#55c555">⚡</text>
  <text x="150" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">속도</text>
  <text x="150" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">CVS보다 반드시</text>
  <text x="150" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">빨라야 한다</text>
  <text x="150" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#77cc77">→ 모든 작업</text>
  <text x="150" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#77cc77">로컬 실행</text>

  <!-- Card 2 -->
  <rect x="260" y="96" width="180" height="264" rx="10" fill="#111" stroke="#1e2a3a"/>
  <text x="350" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="32" fill="#7ec8e3">🔒</text>
  <text x="350" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">무결성</text>
  <text x="350" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">데이터 변조를</text>
  <text x="350" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">반드시 감지</text>
  <text x="350" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#99ccdd">→ SHA-1 해시로</text>
  <text x="350" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#99ccdd">모든 객체 검증</text>

  <!-- Card 3 -->
  <rect x="460" y="96" width="180" height="264" rx="10" fill="#111" stroke="#2a2a1a"/>
  <text x="550" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="32" fill="#e8c55e">🌿</text>
  <text x="550" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c55e">비선형 개발</text>
  <text x="550" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">수천 개 브랜치를</text>
  <text x="550" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">동시에 지원</text>
  <text x="550" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccbb77">→ 브랜치 = 40바이트</text>
  <text x="550" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccbb77">포인터 파일 하나</text>

  <!-- Card 4 -->
  <rect x="660" y="96" width="180" height="264" rx="10" fill="#111" stroke="#2a1a2a"/>
  <text x="750" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="32" fill="#cc7ec8">🌐</text>
  <text x="750" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#cc7ec8">분산</text>
  <text x="750" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">중앙 서버 없이도</text>
  <text x="750" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa">완전히 동작</text>
  <text x="750" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cc9ecc">→ 각 클론이</text>
  <text x="750" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cc9ecc">완전한 저장소</text>

  <!-- Bottom quote -->
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" font-style="italic">"If it's not faster than CVS, I'm not interested." — Linus Torvalds</text>
</svg>
