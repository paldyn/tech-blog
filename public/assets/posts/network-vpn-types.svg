<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">VPN 유형 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">IPSec · OpenVPN · WireGuard · SSL/TLS VPN</text>

  <!-- 헤더 행 -->
  <rect x="60" y="88" width="120" height="36" rx="4" fill="#111"/>
  <text x="120" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">항목</text>
  <rect x="188" y="88" width="155" height="36" rx="4" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="265" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">IPSec / IKEv2</text>
  <rect x="351" y="88" width="155" height="36" rx="4" fill="#1a0d2a" stroke="#7777cc" stroke-width="1"/>
  <text x="428" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">OpenVPN</text>
  <rect x="514" y="88" width="155" height="36" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="591" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">WireGuard</text>
  <rect x="677" y="88" width="143" height="36" rx="4" fill="#1a1500" stroke="#e8c44a" stroke-width="1"/>
  <text x="748" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8c44a">SSL VPN</text>

  <!-- 데이터 행들 -->
  <!-- 계층 -->
  <rect x="60" y="132" width="120" height="36" rx="4" fill="#111"/>
  <text x="120" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">계층</text>
  <rect x="188" y="132" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="265" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">L3 (IP 계층)</text>
  <rect x="351" y="132" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="428" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">L3 (TUN) / L2 (TAP)</text>
  <rect x="514" y="132" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="591" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">L3 (UDP)</text>
  <rect x="677" y="132" width="143" height="36" rx="4" fill="#0a0f18"/>
  <text x="748" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">L4-L7 (TCP 443)</text>

  <!-- 암호화 -->
  <rect x="60" y="176" width="120" height="36" rx="4" fill="#111"/>
  <text x="120" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">암호화</text>
  <rect x="188" y="176" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="265" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">AES, 3DES (ESP)</text>
  <rect x="351" y="176" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="428" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">OpenSSL (TLS)</text>
  <rect x="514" y="176" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="591" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">ChaCha20-Poly1305</text>
  <rect x="677" y="176" width="143" height="36" rx="4" fill="#0a0f18"/>
  <text x="748" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">TLS 1.2/1.3</text>

  <!-- 성능 -->
  <rect x="60" y="220" width="120" height="36" rx="4" fill="#111"/>
  <text x="120" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">성능</text>
  <rect x="188" y="220" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="265" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">높음 (커널 지원)</text>
  <rect x="351" y="220" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="428" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">보통</text>
  <rect x="514" y="220" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="591" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">매우 높음</text>
  <rect x="677" y="220" width="143" height="36" rx="4" fill="#0a0f18"/>
  <text x="748" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">보통~높음</text>

  <!-- 코드줄 수 (WireGuard 특징) -->
  <rect x="60" y="264" width="120" height="36" rx="4" fill="#111"/>
  <text x="120" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">코드 크기</text>
  <rect x="188" y="264" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="265" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">복잡 (수십만 줄)</text>
  <rect x="351" y="264" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="428" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">크다 (OpenSSL 의존)</text>
  <rect x="514" y="264" width="155" height="36" rx="4" fill="#0a0f18"/>
  <text x="591" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">~4,000줄 (감사 용이)</text>
  <rect x="677" y="264" width="143" height="36" rx="4" fill="#0a0f18"/>
  <text x="748" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">벤더별 상이</text>

  <!-- 하단 -->
  <rect x="60" y="316" width="760" height="44" rx="8" fill="#111"/>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">현대 권장: WireGuard (성능·보안·단순성) / 기업: IPSec IKEv2 (호환성)</text>
  <text x="440" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SSL VPN은 방화벽 우회 용이 (TCP 443), 원격 근무에 적합</text>
</svg>
