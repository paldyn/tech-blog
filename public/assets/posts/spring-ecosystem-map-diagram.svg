<svg xmlns="http://www.w3.org/2000/svg" width="880" height="600" viewBox="0 0 880 600" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="600" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링 생태계 지도</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">모든 Spring 프로젝트는 Spring Framework 위에서 동작한다</text>

  <defs>
    <marker id="eco" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Foundation: Spring Framework -->
  <rect x="60" y="92" width="760" height="92" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="2" rx="10"/>
  <text x="440" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#55c555">Spring Framework</text>
  <text x="440" y="148" text-anchor="middle" font-size="12" fill="#88aa88">IoC/DI · AOP · MVC · WebFlux · JDBC · TX 추상화 · 테스트 지원</text>
  <text x="440" y="170" text-anchor="middle" font-size="11" fill="#666">spring-core · spring-beans · spring-context · spring-web</text>

  <!-- Top row: Boot, Data -->
  <rect x="60" y="208" width="370" height="156" fill="#1a1208" stroke="#3a2a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="208" width="370" height="42" fill="#2a1a08" rx="10"/>
  <rect x="60" y="238" width="370" height="12" fill="#2a1a08"/>
  <text x="84" y="234" font-size="15" font-weight="700" fill="#ffaa44">Spring Boot</text>
  <text x="406" y="234" text-anchor="end" font-size="11" fill="#666">시작점</text>
  <text x="84" y="272" font-size="13" fill="#bbbbbb">자동 구성 (Auto-Configuration)</text>
  <text x="84" y="294" font-size="13" fill="#bbbbbb">스타터 의존성 (spring-boot-starter-*)</text>
  <text x="84" y="316" font-size="13" fill="#bbbbbb">임베디드 서버 (Tomcat / Jetty)</text>
  <text x="84" y="338" font-size="13" fill="#bbbbbb">Actuator · 프로파일 · 외부 설정</text>

  <rect x="450" y="208" width="370" height="156" fill="#08111c" stroke="#1e3a5a" stroke-width="1.5" rx="10"/>
  <rect x="450" y="208" width="370" height="42" fill="#0a1a2a" rx="10"/>
  <rect x="450" y="238" width="370" height="12" fill="#0a1a2a"/>
  <text x="474" y="234" font-size="15" font-weight="700" fill="#7ec8e3">Spring Data</text>
  <text x="796" y="234" text-anchor="end" font-size="11" fill="#666">데이터 접근</text>
  <text x="474" y="272" font-size="13" fill="#bbbbbb">JPA (Hibernate) · JDBC · MongoDB</text>
  <text x="474" y="294" font-size="13" fill="#bbbbbb">Redis · Elasticsearch · Cassandra</text>
  <text x="474" y="316" font-size="13" fill="#bbbbbb">JpaRepository · CrudRepository</text>
  <text x="474" y="338" font-size="13" fill="#bbbbbb">메서드 이름 쿼리 · Pageable</text>

  <!-- Bottom row: Security, Cloud, etc -->
  <rect x="60" y="384" width="246" height="160" fill="#150909" stroke="#3a1a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="384" width="246" height="42" fill="#1a0a0a" rx="10"/>
  <rect x="60" y="414" width="246" height="12" fill="#1a0a0a"/>
  <text x="84" y="410" font-size="14" font-weight="700" fill="#e05555">Spring Security</text>
  <text x="84" y="446" font-size="12" fill="#bbbbbb">인증·인가 프레임워크</text>
  <text x="84" y="466" font-size="12" fill="#bbbbbb">OAuth 2.0 / OIDC</text>
  <text x="84" y="486" font-size="12" fill="#bbbbbb">JWT · CSRF · CORS</text>
  <text x="84" y="506" font-size="12" fill="#bbbbbb">메서드 시큐리티</text>
  <text x="84" y="526" font-size="12" fill="#bbbbbb">Security Filter Chain</text>

  <rect x="318" y="384" width="246" height="160" fill="#081414" stroke="#1a3a3a" stroke-width="1.5" rx="10"/>
  <rect x="318" y="384" width="246" height="42" fill="#0a1a1a" rx="10"/>
  <rect x="318" y="414" width="246" height="12" fill="#0a1a1a"/>
  <text x="342" y="410" font-size="14" font-weight="700" fill="#44ddcc">Spring Cloud</text>
  <text x="342" y="446" font-size="12" fill="#bbbbbb">Service Discovery (Eureka)</text>
  <text x="342" y="466" font-size="12" fill="#bbbbbb">API Gateway</text>
  <text x="342" y="486" font-size="12" fill="#bbbbbb">Config Server</text>
  <text x="342" y="506" font-size="12" fill="#bbbbbb">Circuit Breaker (Resilience4j)</text>
  <text x="342" y="526" font-size="12" fill="#bbbbbb">OpenFeign · Sleuth</text>

  <rect x="576" y="384" width="244" height="160" fill="#141408" stroke="#3a3a1a" stroke-width="1.5" rx="10"/>
  <rect x="576" y="384" width="244" height="42" fill="#1a1a08" rx="10"/>
  <rect x="576" y="414" width="244" height="12" fill="#1a1a08"/>
  <text x="600" y="410" font-size="14" font-weight="700" fill="#cccc44">그 외 프로젝트</text>
  <text x="600" y="446" font-size="12" fill="#bbbbbb">Spring Batch</text>
  <text x="600" y="466" font-size="12" fill="#bbbbbb">Spring Integration</text>
  <text x="600" y="486" font-size="12" fill="#bbbbbb">Spring AI</text>
  <text x="600" y="506" font-size="12" fill="#bbbbbb">Spring GraphQL</text>
  <text x="600" y="526" font-size="12" fill="#bbbbbb">Spring Authorization Server</text>

  <!-- Arrows up to Framework -->
  <line x1="245" y1="208" x2="245" y2="186" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#eco)"/>
  <line x1="635" y1="208" x2="635" y2="186" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#eco)"/>
  <line x1="183" y1="384" x2="183" y2="366" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#eco)"/>
  <line x1="441" y1="384" x2="441" y2="366" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#eco)"/>
  <line x1="698" y1="384" x2="698" y2="366" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#eco)"/>

  <text x="440" y="576" text-anchor="middle" font-size="11" fill="#444">spring.io/projects 에서 전체 목록 확인 · 모든 프로젝트는 Spring Framework 위에 동작</text>
</svg>
