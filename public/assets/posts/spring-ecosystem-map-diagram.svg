<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="580" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링 생태계 지도</text>
  <text x="440" y="74" text-anchor="middle" font-size="13" fill="#666">Spring의 모든 프로젝트는 Spring Framework 위에서 동작한다</text>

  <defs>
    <marker id="eco" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Spring Framework — Foundation -->
  <rect x="60" y="92" width="760" height="84" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="2" rx="10"/>
  <text x="440" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#55dd55">Spring Framework</text>
  <text x="440" y="144" text-anchor="middle" font-size="12" fill="#88aa88">IoC/DI 컨테이너 · AOP · MVC · WebFlux · JDBC · TX 추상화 · 테스트 지원</text>
  <text x="440" y="164" text-anchor="middle" font-size="11" fill="#666">spring-core, spring-beans, spring-context, spring-web</text>

  <!-- Spring Boot -->
  <rect x="60" y="200" width="370" height="148" fill="#0f0f0f" stroke="#3a2a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="200" width="370" height="40" fill="#2a1a0a" rx="10"/>
  <rect x="60" y="228" width="370" height="12" fill="#2a1a0a"/>
  <text x="245" y="226" text-anchor="middle" font-size="15" font-weight="700" fill="#ffaa44">Spring Boot</text>
  <text x="84" y="262" font-size="13" fill="#bbbbbb">자동 구성(Auto-Configuration)</text>
  <text x="84" y="284" font-size="13" fill="#bbbbbb">스타터 의존성 (spring-boot-starter-*)</text>
  <text x="84" y="306" font-size="13" fill="#bbbbbb">임베디드 서버 (Tomcat/Jetty)</text>
  <text x="84" y="328" font-size="13" fill="#bbbbbb">Actuator · 프로파일 · 외부 설정</text>

  <!-- Spring Data -->
  <rect x="450" y="200" width="370" height="148" fill="#0f0f0f" stroke="#1a2a3a" stroke-width="1.5" rx="10"/>
  <rect x="450" y="200" width="370" height="40" fill="#0a1a2a" rx="10"/>
  <rect x="450" y="228" width="370" height="12" fill="#0a1a2a"/>
  <text x="635" y="226" text-anchor="middle" font-size="15" font-weight="700" fill="#4499ee">Spring Data</text>
  <text x="474" y="262" font-size="13" fill="#bbbbbb">JPA (Hibernate) · JDBC · MongoDB</text>
  <text x="474" y="284" font-size="13" fill="#bbbbbb">Redis · Elasticsearch · Cassandra</text>
  <text x="474" y="306" font-size="13" fill="#bbbbbb">JpaRepository · CrudRepository</text>
  <text x="474" y="328" font-size="13" fill="#bbbbbb">메서드 이름 쿼리 · Pageable</text>

  <!-- Spring Security -->
  <rect x="60" y="368" width="246" height="160" fill="#0f0f0f" stroke="#2a1a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="368" width="246" height="40" fill="#1a0a0a" rx="10"/>
  <rect x="60" y="396" width="246" height="12" fill="#1a0a0a"/>
  <text x="183" y="394" text-anchor="middle" font-size="14" font-weight="700" fill="#ee4444">Spring Security</text>
  <text x="84" y="430" font-size="12" fill="#bbbbbb">인증·인가 프레임워크</text>
  <text x="84" y="450" font-size="12" fill="#bbbbbb">OAuth 2.0 / OIDC</text>
  <text x="84" y="470" font-size="12" fill="#bbbbbb">JWT · CSRF · CORS</text>
  <text x="84" y="490" font-size="12" fill="#bbbbbb">메서드 시큐리티</text>
  <text x="84" y="510" font-size="12" fill="#bbbbbb">Security Filter Chain</text>

  <!-- Spring Cloud -->
  <rect x="318" y="368" width="246" height="160" fill="#0f0f0f" stroke="#1a2a2a" stroke-width="1.5" rx="10"/>
  <rect x="318" y="368" width="246" height="40" fill="#0a1a1a" rx="10"/>
  <rect x="318" y="396" width="246" height="12" fill="#0a1a1a"/>
  <text x="441" y="394" text-anchor="middle" font-size="14" font-weight="700" fill="#44ddcc">Spring Cloud</text>
  <text x="342" y="430" font-size="12" fill="#bbbbbb">Service Discovery (Eureka)</text>
  <text x="342" y="450" font-size="12" fill="#bbbbbb">API Gateway</text>
  <text x="342" y="470" font-size="12" fill="#bbbbbb">Config Server</text>
  <text x="342" y="490" font-size="12" fill="#bbbbbb">Circuit Breaker</text>
  <text x="342" y="510" font-size="12" fill="#bbbbbb">OpenFeign · Sleuth</text>

  <!-- 그 외 -->
  <rect x="576" y="368" width="244" height="160" fill="#0f0f0f" stroke="#2a2a1a" stroke-width="1.5" rx="10"/>
  <rect x="576" y="368" width="244" height="40" fill="#1a1a0a" rx="10"/>
  <rect x="576" y="396" width="244" height="12" fill="#1a1a0a"/>
  <text x="698" y="394" text-anchor="middle" font-size="14" font-weight="700" fill="#cccc44">그 외 프로젝트</text>
  <text x="600" y="430" font-size="12" fill="#bbbbbb">Spring Batch</text>
  <text x="600" y="450" font-size="12" fill="#bbbbbb">Spring Integration</text>
  <text x="600" y="470" font-size="12" fill="#bbbbbb">Spring AI</text>
  <text x="600" y="490" font-size="12" fill="#bbbbbb">Spring GraphQL</text>
  <text x="600" y="510" font-size="12" fill="#bbbbbb">Spring Authorization Server</text>

  <!-- Arrows up to Framework -->
  <line x1="245" y1="200" x2="245" y2="178" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#eco)"/>
  <line x1="635" y1="200" x2="635" y2="178" stroke="#666" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#eco)"/>
  <line x1="183" y1="368" x2="183" y2="350" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#eco)"/>
  <line x1="441" y1="368" x2="441" y2="350" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#eco)"/>
  <line x1="698" y1="368" x2="698" y2="350" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#eco)"/>

  <!-- Footer -->
  <text x="440" y="556" text-anchor="middle" font-size="11" fill="#444">spring.io/projects 에서 전체 목록 확인 · 모든 프로젝트는 Spring Framework 위에 동작</text>
</svg>
