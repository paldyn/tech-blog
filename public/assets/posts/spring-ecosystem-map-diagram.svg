<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링 생태계 지도</text>
  <text x="440" y="65" text-anchor="middle" font-size="12" fill="#555">Spring의 모든 프로젝트는 Spring Framework 위에서 동작한다</text>

  <!-- Spring Framework — Foundation -->
  <rect x="60" y="82" width="760" height="72" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="2" rx="10"/>
  <text x="440" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#55dd55">Spring Framework</text>
  <text x="440" y="130" text-anchor="middle" font-size="11" fill="#88aa88">IoC/DI 컨테이너 · AOP · MVC · WebFlux · JDBC · TX 추상화 · 테스트 지원</text>
  <text x="440" y="147" text-anchor="middle" font-size="11" fill="#555">모든 스프링 프로젝트의 기반 — spring-core, spring-beans, spring-context, spring-web</text>

  <!-- Spring Boot -->
  <rect x="60" y="174" width="380" height="130" fill="#0f0f0f" stroke="#3a2a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="174" width="380" height="38" fill="#2a1a0a" rx="10"/>
  <rect x="60" y="200" width="380" height="12" fill="#2a1a0a"/>
  <text x="250" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#ffaa44">Spring Boot</text>
  <text x="80" y="230" font-size="12" fill="#aaa">자동 구성(Auto-Configuration)</text>
  <text x="80" y="250" font-size="12" fill="#aaa">스타터 의존성 (spring-boot-starter-*)</text>
  <text x="80" y="270" font-size="12" fill="#aaa">임베디드 서버 (Tomcat/Jetty/Undertow)</text>
  <text x="80" y="290" font-size="12" fill="#aaa">Actuator · 프로파일 · 외부 설정</text>

  <!-- Spring Data -->
  <rect x="460" y="174" width="360" height="130" fill="#0f0f0f" stroke="#1a2a3a" stroke-width="1.5" rx="10"/>
  <rect x="460" y="174" width="360" height="38" fill="#0a1a2a" rx="10"/>
  <rect x="460" y="200" width="360" height="12" fill="#0a1a2a"/>
  <text x="640" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#4499ee">Spring Data</text>
  <text x="480" y="230" font-size="12" fill="#aaa">JPA (Hibernate) · JDBC · MongoDB</text>
  <text x="480" y="250" font-size="12" fill="#aaa">Redis · Elasticsearch · Cassandra</text>
  <text x="480" y="270" font-size="12" fill="#aaa">JpaRepository · CrudRepository</text>
  <text x="480" y="290" font-size="12" fill="#aaa">메서드 이름 쿼리 · Pageable · Auditing</text>

  <!-- Spring Security -->
  <rect x="60" y="324" width="260" height="150" fill="#0f0f0f" stroke="#2a1a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="324" width="260" height="38" fill="#1a0a0a" rx="10"/>
  <rect x="60" y="350" width="260" height="12" fill="#1a0a0a"/>
  <text x="190" y="350" text-anchor="middle" font-size="14" font-weight="700" fill="#ee4444">Spring Security</text>
  <text x="80" y="380" font-size="12" fill="#aaa">인증·인가 프레임워크</text>
  <text x="80" y="400" font-size="12" fill="#aaa">OAuth 2.0 / OIDC</text>
  <text x="80" y="420" font-size="12" fill="#aaa">JWT · CSRF · CORS</text>
  <text x="80" y="440" font-size="12" fill="#aaa">메서드 시큐리티</text>
  <text x="80" y="460" font-size="12" fill="#aaa">Security Filter Chain</text>

  <!-- Spring Cloud -->
  <rect x="340" y="324" width="260" height="150" fill="#0f0f0f" stroke="#1a2a2a" stroke-width="1.5" rx="10"/>
  <rect x="340" y="324" width="260" height="38" fill="#0a1a1a" rx="10"/>
  <rect x="340" y="350" width="260" height="12" fill="#0a1a1a"/>
  <text x="470" y="350" text-anchor="middle" font-size="14" font-weight="700" fill="#44ddcc">Spring Cloud</text>
  <text x="360" y="380" font-size="12" fill="#aaa">Service Discovery (Eureka)</text>
  <text x="360" y="400" font-size="12" fill="#aaa">API Gateway</text>
  <text x="360" y="420" font-size="12" fill="#aaa">Config Server</text>
  <text x="360" y="440" font-size="12" fill="#aaa">Circuit Breaker (Resilience4j)</text>
  <text x="360" y="460" font-size="12" fill="#aaa">OpenFeign · Sleuth</text>

  <!-- Spring Batch / Integration / Other -->
  <rect x="620" y="324" width="220" height="150" fill="#0f0f0f" stroke="#2a2a1a" stroke-width="1.5" rx="10"/>
  <rect x="620" y="324" width="220" height="38" fill="#1a1a0a" rx="10"/>
  <rect x="620" y="350" width="220" height="12" fill="#1a1a0a"/>
  <text x="730" y="350" text-anchor="middle" font-size="14" font-weight="700" fill="#cccc44">그 외 프로젝트</text>
  <text x="640" y="380" font-size="12" fill="#aaa">Spring Batch</text>
  <text x="640" y="400" font-size="12" fill="#aaa">Spring Integration</text>
  <text x="640" y="420" font-size="12" fill="#aaa">Spring AI</text>
  <text x="640" y="440" font-size="12" fill="#aaa">Spring GraphQL</text>
  <text x="640" y="460" font-size="12" fill="#aaa">Spring Authorization Server</text>

  <!-- Arrows from Boot to Framework -->
  <line x1="250" y1="174" x2="250" y2="154" stroke="#3a2a1a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#eco)"/>
  <line x1="640" y1="174" x2="640" y2="154" stroke="#1a2a3a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#eco)"/>
  <line x1="190" y1="324" x2="190" y2="304" stroke="#2a1a1a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#eco)"/>
  <line x1="470" y1="324" x2="470" y2="304" stroke="#1a2a2a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#eco)"/>
  <line x1="730" y1="324" x2="730" y2="304" stroke="#2a2a1a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#eco)"/>
  <defs>
    <marker id="eco" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Uses label -->
  <text x="275" y="165" font-size="9" fill="#555">사용</text>
  <text x="645" y="165" font-size="9" fill="#555">사용</text>

  <!-- Footer -->
  <text x="440" y="498" text-anchor="middle" font-size="11" fill="#444">spring.io/projects 에서 전체 프로젝트 목록 확인 가능 · 모든 프로젝트는 Spring Framework 위에 동작</text>
</svg>
