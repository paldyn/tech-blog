<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">MLOps 기술 스택</text>

  <!-- Layer 1 (bottom): 인프라 & 컴퓨팅 — widest -->
  <rect x="40" y="380" width="800" height="55" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="401" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">인프라 &amp; 컴퓨팅</text>
  <line x1="300" y1="385" x2="300" y2="430" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>
  <text x="570" y="401" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccddcc">Kubernetes</text>
  <text x="680" y="401" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccddcc">GPU 클러스터</text>
  <text x="790" y="401" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccddcc">클라우드</text>
  <text x="170" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">기반 인프라</text>
  <text x="570" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">AWS · GCP · Azure · On-prem</text>

  <!-- Layer 2: 데이터 레이어 -->
  <rect x="60" y="310" width="760" height="55" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">데이터 레이어</text>
  <line x1="310" y1="315" x2="310" y2="360" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="490" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cce8f4">데이터 버전관리</text>
  <text x="680" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cce8f4">피처 스토어</text>
  <text x="180" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터 관리</text>
  <text x="490" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">DVC · Delta Lake · LakeFS</text>
  <text x="680" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Feast · Tecton · Hopsworks</text>

  <!-- Layer 3: 실험 관리 -->
  <rect x="80" y="240" width="720" height="55" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="190" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">실험 관리</text>
  <line x1="310" y1="245" x2="310" y2="290" stroke="#7777cc" stroke-width="1" stroke-opacity="0.4"/>
  <text x="500" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccccee">MLflow</text>
  <text x="620" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccccee">Weights &amp; Biases</text>
  <text x="760" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccccee">Neptune</text>
  <text x="190" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트래킹·비교</text>
  <text x="580" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">파라미터 · 메트릭 · 아티팩트 추적</text>

  <!-- Layer 4: 모델 레지스트리 & CI/CD -->
  <rect x="100" y="170" width="680" height="55" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="215" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">모델 레지스트리 &amp; CI/CD</text>
  <line x1="360" y1="175" x2="360" y2="220" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>
  <text x="530" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccddcc">MLflow Model Registry</text>
  <text x="720" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccddcc">GitHub Actions</text>
  <text x="215" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모델 버전관리 · 파이프라인</text>
  <text x="620" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Kubeflow · ZenML · Vertex AI Pipelines</text>

  <!-- Layer 5 (top): 서빙 & 모니터링 — narrowest -->
  <rect x="120" y="100" width="640" height="55" rx="6" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="240" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ce9178">서빙 &amp; 모니터링</text>
  <line x1="370" y1="105" x2="370" y2="150" stroke="#ce9178" stroke-width="1" stroke-opacity="0.4"/>
  <text x="530" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c8a8">Seldon · BentoML · TorchServe</text>
  <text x="700" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c8a8">Evidently</text>
  <text x="240" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">추론 서빙 · 드리프트 감지</text>
  <text x="590" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">실시간·배치 추론 · 모델 모니터링</text>

  <!-- Upward arrow on left side -->
  <defs>
    <marker id="arrow-up" markerUnits="userSpaceOnUse" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
      <path d="M1,9 L5,1 L9,9 Z" fill="#888"/>
    </marker>
  </defs>
  <line x1="22" y1="410" x2="22" y2="90" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-up)"/>
  <text x="12" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" transform="rotate(-90, 12, 260)">성숙도 / 추상화 수준</text>
</svg>
