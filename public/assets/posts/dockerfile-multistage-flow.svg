<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">멀티 스테이지 빌드 흐름</text>

  <!-- Stage 1: deps -->
  <rect x="60" y="72" width="220" height="200" fill="#111827" rx="10" stroke="#7777cc" stroke-width="2"/>
  <text x="170" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle" xml:space="preserve">AS deps</text>
  <rect x="74" y="108" width="192" height="150" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="88" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="124" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> node:20</text>
  <text x="88" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">AS</text>
  <text x="112" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve"> deps</text>
  <text x="88" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WORKDIR</text>
  <text x="160" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve"> /app</text>
  <text x="88" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">COPY</text>
  <text x="124" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> pkg*.json .</text>
  <text x="88" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="120" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> npm ci</text>
  <text x="88" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" xml:space="preserve">의존성만 설치</text>

  <!-- Stage 2: builder -->
  <rect x="330" y="72" width="220" height="200" fill="#111827" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">AS builder</text>
  <rect x="344" y="108" width="192" height="150" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="358" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="394" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> node:20</text>
  <text x="358" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">AS</text>
  <text x="382" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve"> builder</text>
  <text x="358" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">COPY</text>
  <text x="394" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> --from=deps \</text>
  <text x="358" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  /app/node_modules .</text>
  <text x="358" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="390" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> npm run build</text>
  <text x="358" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" xml:space="preserve">빌드 산출물 생성</text>

  <!-- Stage 3: production -->
  <rect x="600" y="72" width="220" height="200" fill="#0d2818" rx="10" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle" xml:space="preserve">AS production</text>
  <rect x="614" y="108" width="192" height="150" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="628" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="664" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> node:20-alpine</text>
  <text x="628" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">COPY</text>
  <text x="664" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> --from=builder \</text>
  <text x="628" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  /app/dist ./dist</text>
  <text x="628" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">USER</text>
  <text x="664" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> node</text>
  <text x="628" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">CMD</text>
  <text x="664" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> ["node","dist/app"]</text>
  <text x="628" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" xml:space="preserve">산출물만 포함된 최종 이미지</text>

  <!-- Arrows -->
  <line x1="280" y1="172" x2="330" y2="172" stroke="#7777cc" stroke-width="2"/>
  <polygon points="330,166 342,172 330,178" fill="#7777cc"/>

  <line x1="550" y1="172" x2="600" y2="172" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="600,166 612,172 600,178" fill="#7ec8e3"/>

  <!-- Labels on arrows -->
  <text x="305" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle" xml:space="preserve">node_modules</text>
  <text x="575" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">dist/</text>

  <!-- Divider -->
  <line x1="60" y1="298" x2="820" y2="298" stroke="#1e2433" stroke-width="1"/>

  <!-- Size comparison -->
  <text x="60" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" xml:space="preserve">이미지 크기 비교</text>

  <!-- Single stage bar -->
  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">단일 스테이지</text>
  <rect x="200" y="342" width="560" height="24" fill="#2a0d0d" rx="4" stroke="#e05555"/>
  <text x="790" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">~1.2 GB</text>

  <!-- Multi stage bar -->
  <text x="60" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">멀티 스테이지</text>
  <rect x="200" y="384" width="140" height="24" fill="#0d2818" rx="4" stroke="#55c555"/>
  <text x="790" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">~180 MB</text>

  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle" xml:space="preserve">빌드 도구, 소스코드, node_modules → 최종 이미지에서 완전 제거</text>

  <!-- Target -->
  <text x="60" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">특정 스테이지까지만 빌드:</text>
  <rect x="300" y="454" width="420" height="24" fill="#070b14" rx="4" stroke="#1e2433"/>
  <text x="316" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">docker build --target deps -t myapp:deps .</text>
</svg>
