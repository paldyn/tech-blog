<svg xmlns="http://www.w3.org/2000/svg" width="880" height="250" viewBox="0 0 880 250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="250" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">스냅샷을 비교한다</text>

  <defs>
    <marker id="tmarr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">start()</text>
  <text x="135" y="150" font-size="11" fill="#9aa4b8" text-anchor="middle">추적 시작</text>

  <line x1="210" y1="132" x2="259" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tmarr)"/>

  <rect x="263" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="338" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">snapshot A</text>
  <text x="338" y="150" font-size="11" fill="#9aa4b8" text-anchor="middle">의심 코드 전</text>

  <line x1="413" y1="132" x2="462" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tmarr)"/>

  <rect x="466" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="541" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">snapshot B</text>
  <text x="541" y="150" font-size="11" fill="#9aa4b8" text-anchor="middle">의심 코드 후</text>

  <line x1="616" y1="132" x2="665" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tmarr)"/>

  <rect x="669" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="744" y="128" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">compare</text>
  <text x="744" y="150" font-size="11" fill="#9aa4b8" text-anchor="middle">늘어난 곳</text>

  <rect x="60" y="192" width="759" height="34" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">B.compare_to(A, "lineno")  → 두 시점 사이 어디서 메모리가 늘었는지</text>
</svg>
