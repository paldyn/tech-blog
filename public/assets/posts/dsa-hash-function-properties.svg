<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">좋은 해시 함수의 조건</text>

  <!-- property boxes -->
  <!-- 1. Deterministic -->
  <rect x="60" y="62" width="374" height="90" rx="10" fill="#0d1020" stroke="#3a5a8a" stroke-width="1.5"/>
  <rect x="60" y="62" width="6" height="90" rx="3" fill="#7ec8e3"/>
  <text x="84" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">1. 결정론적 (Deterministic)</text>
  <text x="84" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">같은 입력 → 항상 같은 출력</text>
  <rect x="84" y="120" width="340" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">hash("apple") == hash("apple")  // 항상 True</text>

  <!-- 2. Uniform distribution -->
  <rect x="446" y="62" width="374" height="90" rx="10" fill="#0d1020" stroke="#3a5a8a" stroke-width="1.5"/>
  <rect x="446" y="62" width="6" height="90" rx="3" fill="#55c555"/>
  <text x="470" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">2. 균등 분포 (Uniform Distribution)</text>
  <text x="470" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">해시값이 버킷에 고르게 분포</text>
  <rect x="470" y="120" width="340" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">P(h(k) = i) ≈ 1/n  for all i, k</text>

  <!-- 3. Fast computation -->
  <rect x="60" y="166" width="374" height="90" rx="10" fill="#0d1020" stroke="#3a5a8a" stroke-width="1.5"/>
  <rect x="60" y="166" width="6" height="90" rx="3" fill="#7777cc"/>
  <text x="84" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">3. 빠른 계산 (Fast Computation)</text>
  <text x="84" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">해시 계산 자체가 병목이 되면 안 됨</text>
  <rect x="84" y="224" width="340" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">목표: O(key 길이)  — O(n) 이하</text>

  <!-- 4. Avalanche effect -->
  <rect x="446" y="166" width="374" height="90" rx="10" fill="#0d1020" stroke="#3a5a8a" stroke-width="1.5"/>
  <rect x="446" y="166" width="6" height="90" rx="3" fill="#e05555"/>
  <text x="470" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">4. 눈사태 효과 (Avalanche Effect)</text>
  <text x="470" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">입력 1비트 변화 → 출력 ~절반 비트 변화</text>
  <rect x="470" y="224" width="340" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">"abc" → 0x3456...,  "abd" → 0xfe12...</text>

  <!-- comparison table -->
  <text x="60" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">해시 함수 종류</text>

  <rect x="60" y="292" width="760" height="182" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- headers -->
  <text x="76"  y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">함수</text>
  <text x="200" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">속도</text>
  <text x="310" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">충돌 저항</text>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">암호학적</text>
  <text x="560" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">주요 용도</text>
  <line x1="76" y1="320" x2="804" y2="320" stroke="#2a3a5e" stroke-width="1"/>

  <text x="76"  y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">MurmurHash3</text>
  <text x="200" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">매우 빠름</text>
  <text x="310" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">높음</text>
  <text x="440" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">아님</text>
  <text x="560" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해시 테이블, 블룸 필터</text>

  <text x="76"  y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">FNV-1a</text>
  <text x="200" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">빠름</text>
  <text x="310" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">중간</text>
  <text x="440" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">아님</text>
  <text x="560" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">임베디드 해시 테이블</text>

  <text x="76"  y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">SipHash</text>
  <text x="200" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">빠름</text>
  <text x="310" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">높음</text>
  <text x="440" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">의사난수</text>
  <text x="560" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Python dict (DoS 방어)</text>

  <text x="76"  y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">SHA-256</text>
  <text x="200" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">느림</text>
  <text x="310" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">매우 높음</text>
  <text x="440" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">예</text>
  <text x="560" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">암호화, 블록체인</text>

  <text x="76"  y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">MD5</text>
  <text x="200" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">중간</text>
  <text x="310" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">낮음(취약)</text>
  <text x="440" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">비권장</text>
  <text x="560" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">체크섬 (보안 용도 지양)</text>
  <text x="76"  y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">Python hash()는 SipHash-1-3 사용, 랜덤 시드(PYTHONHASHSEED)로 HashDoS 공격 방어</text>
</svg>
