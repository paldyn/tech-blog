<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#e8a040"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">동적 디스패치 — 컴파일 vs 런타임</text>

  <!-- ===== LEFT: Compile time ===== -->
  <rect x="60" y="70" width="360" height="36" rx="6" fill="#2a1a3e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">컴파일 타임 (정적 타입 검사)</text>

  <rect x="60" y="118" width="360" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 선언 타입 = Animal</text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Animal animal = <tspan fill="#7ec8e3" font-weight="600">new</tspan> Dog(...);</text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">animal.sound(); <tspan fill="#9aa4b8">// Animal에 sound()?</tspan></text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">// ✓ 컴파일 OK — Animal에 sound() 있음</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">// ✗ animal.fetch() — 컴파일 오류!</text>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Animal에 fetch() 없음</text>

  <!-- arrow compile -> runtime -->
  <line x1="428" y1="178" x2="448" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-right)"/>
  <text x="438" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">실행</text>

  <!-- ===== RIGHT: Runtime ===== -->
  <rect x="452" y="70" width="368" height="36" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="636" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">런타임 (동적 타입 결정)</text>

  <rect x="452" y="118" width="368" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="468" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// JVM이 실제 객체 타입 조회</text>
  <text x="468" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">animal.sound();</text>
  <text x="468" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 1. animal 실제 타입 = Dog</text>
  <text x="468" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 2. Dog.sound() 오버라이딩 여부 확인</text>
  <text x="468" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">// 3. Dog.sound() 실행 → "멍멍!"</text>
  <text x="468" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// vtable 조회로 O(1)</text>

  <!-- ===== Middle: dispatch decision diagram ===== -->
  <text x="240" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8a040" text-anchor="middle">메서드 선택 흐름</text>

  <!-- Dog box -->
  <rect x="60" y="282" width="180" height="44" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Dog 실제 타입</text>
  <text x="150" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">sound() 오버라이딩 있음</text>

  <!-- Dog -> Dog.sound() -->
  <line x1="240" y1="304" x2="280" y2="304" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="284" y="282" width="130" height="44" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="349" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">Dog.sound()</text>
  <text x="349" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ "멍멍!"</text>

  <!-- Cat box -->
  <rect x="60" y="352" width="180" height="44" rx="6" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="150" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">Cat 실제 타입</text>
  <text x="150" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">sound() 오버라이딩 있음</text>

  <!-- Cat -> Cat.sound() -->
  <line x1="240" y1="374" x2="280" y2="374" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <rect x="284" y="352" width="130" height="44" rx="6" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="349" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">Cat.sound()</text>
  <text x="349" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ "야옹!"</text>

  <!-- ===== RIGHT: instanceof + pattern matching ===== -->
  <text x="636" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">instanceof + 패턴 매칭 (Java 16+)</text>

  <rect x="452" y="282" width="368" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="468" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 전통 방식 (Java 15 이하)</text>
  <text x="468" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">if</tspan> (animal <tspan fill="#7ec8e3" font-weight="600">instanceof</tspan> Dog) {</text>
  <text x="468" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    Dog d = (Dog) animal; <tspan fill="#9aa4b8">// 캐스팅</tspan></text>
  <text x="468" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="468" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 패턴 매칭 (Java 16+)</text>
  <text x="468" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">if</tspan> (animal <tspan fill="#7ec8e3" font-weight="600">instanceof</tspan> Dog d) {</text>
  <text x="468" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    d.fetch(); <tspan fill="#9aa4b8">// d는 Dog 타입으로 사용</tspan></text>

  <!-- bottom info -->
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">컴파일 타임 vs 런타임 결정 요약</text>

  <rect x="60" y="466" width="360" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">컴파일: 선언 타입 기준으로 메서드 존재 여부 검사</text>
  <text x="240" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle"> </text>

  <rect x="452" y="466" width="368" height="36" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="636" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">런타임: 실제 타입 기준으로 오버라이딩 메서드 실행</text>
</svg>
