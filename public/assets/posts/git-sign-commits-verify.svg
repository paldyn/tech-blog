<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">커밋 서명 검증 방법</text>

  <rect x="60" y="70" width="760" height="265" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># HEAD 커밋 서명 검증</text>
  <text xml:space="preserve" x="80" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git verify-commit</text><text xml:space="preserve" x="218" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> HEAD</text>
  <text xml:space="preserve" x="80" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">gpg: Good signature from "Alice &lt;alice@example.com&gt;"</text>
  <text xml:space="preserve" x="80" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">gpg: Signature made ... using RSA key ID 3AA5C34371567BD2</text>

  <text xml:space="preserve" x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 서명 상태를 --show-signature 로 git log 에서 확인</text>
  <text xml:space="preserve" x="80" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git log</text><text xml:space="preserve" x="136" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --show-signature -1</text>
  <text xml:space="preserve" x="80" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">gpg: Good signature from "Alice &lt;alice@example.com&gt;"</text>
  <text xml:space="preserve" x="80" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">commit abc123def456...</text>
  <text xml:space="preserve" x="80" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># %G? 포맷: G=Good / B=Bad / U=Unknown / N=없음</text>
  <text xml:space="preserve" x="80" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git log</text><text xml:space="preserve" x="136" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --format=</text><text xml:space="preserve" x="240" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"%H %G? %GS"</text>
  <text xml:space="preserve" x="80" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">abc123...  G  Alice &lt;alice@example.com&gt;</text>
  <text xml:space="preserve" x="80" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">def456...  N  (no signature)</text>
</svg>
