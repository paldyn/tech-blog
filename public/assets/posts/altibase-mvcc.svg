<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Altibase 메모리 테이블 MVCC</text>

  <!-- Timeline -->
  <line x1="80" y1="110" x2="800" y2="110" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">시간 →</text>

  <!-- SCN markers -->
  <line x1="160" y1="98" x2="160" y2="122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">SCN 100</text>
  <text x="160" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Tx A 시작</text>

  <line x1="320" y1="98" x2="320" y2="122" stroke="#55c555" stroke-width="1.5"/>
  <text x="320" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">SCN 110</text>
  <text x="320" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Tx B 시작</text>

  <line x1="480" y1="98" x2="480" y2="122" stroke="#e05555" stroke-width="1.5"/>
  <text x="480" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">SCN 120</text>
  <text x="480" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Tx A UPDATE</text>

  <line x1="640" y1="98" x2="640" y2="122" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">SCN 130</text>
  <text x="640" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Tx A COMMIT</text>

  <!-- Row versions -->
  <rect x="80" y="180" width="760" height="60" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">행(Row) 버전 체인</text>

  <rect x="100" y="210" width="200" height="20" rx="4" fill="#111133"/>
  <text x="200" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">구버전: price=1000 (SCN 100)</text>

  <line x1="300" y1="220" x2="340" y2="220" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="344" y="210" width="200" height="20" rx="4" fill="#0d1520"/>
  <text x="444" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">신버전: price=1200 (SCN 130)</text>

  <!-- Read isolation -->
  <rect x="80" y="264" width="340" height="84" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="250" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Tx B (SCN=110) 읽기</text>
  <text x="250" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커밋 SCN 130 > 시작 SCN 110</text>
  <text x="250" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">→ 구버전 price=1000 반환</text>
  <text x="250" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(잠금 없이 일관성 읽기)</text>

  <rect x="460" y="264" width="380" height="84" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">신규 Tx (SCN=140) 읽기</text>
  <text x="650" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커밋 SCN 130 &lt; 시작 SCN 140</text>
  <text x="650" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">→ 신버전 price=1200 반환</text>
  <text x="650" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(최신 커밋 데이터 반환)</text>
</svg>
