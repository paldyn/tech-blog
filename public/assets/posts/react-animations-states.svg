<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-st" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-exit" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">AnimatePresence — 마운트/언마운트 상태</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">컴포넌트가 DOM에서 제거될 때도 exit 애니메이션 재생</text>

  <!-- State: Unmounted -->
  <rect x="60" y="110" width="180" height="70" rx="10" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="150" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#888">Unmounted</text>
  <text x="150" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">DOM에 없음</text>

  <!-- Arrow: Unmounted → Entering -->
  <line x1="240" y1="145" x2="304" y2="145"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-st)"/>
  <text x="272" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">mount</text>

  <!-- State: Entering -->
  <rect x="304" y="110" width="180" height="70" rx="10" fill="#1a2a1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="394" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Entering</text>
  <text x="394" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">initial → animate</text>

  <!-- Arrow: Entering → Present -->
  <line x1="484" y1="145" x2="548" y2="145"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-st)"/>
  <text x="516" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">완료</text>

  <!-- State: Present (center highlighted) -->
  <rect x="548" y="100" width="200" height="90" rx="10" fill="#1a2030" stroke="#7ec8e3" stroke-width="2"/>
  <text x="648" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Present</text>
  <text x="648" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">animate 상태 유지</text>
  <text x="648" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자와 인터랙션 가능</text>

  <!-- Arrow: Present → Exiting (down-left curve) -->
  <path d="M 648 190 Q 648 250 394 250 Q 200 250 150 250"
        fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#arr-exit)"/>
  <text x="430" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">unmount 요청</text>

  <!-- State: Exiting -->
  <rect x="60" y="270" width="180" height="70" rx="10" fill="#2a1a1e" stroke="#e05555" stroke-width="1.5"/>
  <text x="150" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">Exiting</text>
  <text x="150" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">animate → exit</text>

  <!-- Arrow: Exiting → Unmounted -->
  <path d="M 150 270 Q 150 230 150 195"
        fill="none" stroke="#e05555" stroke-width="2"
        marker-end="url(#arr-exit)"/>
  <text x="175" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">완료</text>

  <!-- Code Block -->
  <rect x="320" y="270" width="500" height="168" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="336" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// AnimatePresence 예시</text>
  <text x="336" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> { AnimatePresence, motion } </tspan>
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ce9178"> 'framer-motion'</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="336" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#55c555">&lt;AnimatePresence&gt;</tspan>
  </text>
  <text x="336" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  {isVisible &amp;&amp; (</tspan>
  </text>
  <text x="336" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    &lt;</tspan>
    <tspan fill="#55c555">motion.div</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">initial</tspan>
    <tspan fill="#ffffff">={{ opacity: </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff"> }}</tspan>
  </text>
  <text x="336" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      </tspan>
    <tspan fill="#7ec8e3" font-weight="600">animate</tspan>
    <tspan fill="#ffffff">={{ opacity: </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff"> }} </tspan>
    <tspan fill="#7ec8e3" font-weight="600">exit</tspan>
    <tspan fill="#ffffff">={{ opacity: </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff"> }}/&gt;</tspan>
  </text>
  <text x="336" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  )}</tspan>
  </text>
  <text x="336" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#55c555">&lt;/AnimatePresence&gt;</tspan>
  </text>

  <!-- Bottom note -->
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">exit prop 없으면 AnimatePresence는 즉시 제거 — exit 정의 필수</text>
</svg>
