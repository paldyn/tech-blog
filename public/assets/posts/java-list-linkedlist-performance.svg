<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ArrayList vs LinkedList — 연산별 시간 복잡도</text>

  <!-- Header row -->
  <rect x="60" y="72" width="760" height="40" rx="4" fill="#0f1827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="250" y="97" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">연산</text>
  <text x="510" y="97" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">ArrayList</text>
  <text x="730" y="97" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">LinkedList</text>

  <!-- Column dividers in header -->
  <line x1="380" y1="72" x2="380" y2="112" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="620" y1="72" x2="620" y2="112" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1: get(i) -->
  <rect x="60" y="112" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="250" y="139" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">get(i) — 인덱스 접근</text>
  <rect x="385" y="116" width="230" height="36" rx="4" fill="#0f2010" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="139" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">O(1)</text>
  <rect x="625" y="116" width="190" height="36" rx="4" fill="#200f0f" stroke="#e05555" stroke-width="1"/>
  <text x="720" y="139" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">O(n)</text>

  <!-- Row 2: add(end) -->
  <rect x="60" y="156" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="250" y="183" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">add(끝에 추가)</text>
  <rect x="385" y="160" width="230" height="36" rx="4" fill="#0f2010" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="183" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">O(1)*</text>
  <rect x="625" y="160" width="190" height="36" rx="4" fill="#0f2010" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="183" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">O(1)</text>

  <!-- Row 3: add(i) -->
  <rect x="60" y="200" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="250" y="227" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">add(i, e) — 중간 삽입</text>
  <rect x="385" y="204" width="230" height="36" rx="4" fill="#200f0f" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="227" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">O(n)</text>
  <rect x="625" y="204" width="190" height="36" rx="4" fill="#1a1a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="720" y="227" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8a020">O(1)**</text>

  <!-- Row 4: remove(i) -->
  <rect x="60" y="244" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="250" y="271" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">remove(i) — 인덱스 삭제</text>
  <rect x="385" y="248" width="230" height="36" rx="4" fill="#200f0f" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="271" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">O(n)</text>
  <rect x="625" y="248" width="190" height="36" rx="4" fill="#1a1a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="720" y="271" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8a020">O(1)**</text>

  <!-- Row 5: contains -->
  <rect x="60" y="288" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="250" y="315" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">contains(o)</text>
  <rect x="385" y="292" width="230" height="36" rx="4" fill="#200f0f" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="315" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">O(n)</text>
  <rect x="625" y="292" width="190" height="36" rx="4" fill="#200f0f" stroke="#e05555" stroke-width="1"/>
  <text x="720" y="315" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">O(n)</text>

  <!-- Footnotes -->
  <text x="60" y="358"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">* ArrayList.add(끝): 배열 복사 발생 시 O(n), 분할 상환 O(1)</text>
  <text x="60" y="376"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">** LinkedList 중간 삽입/삭제: 노드 포인터는 O(1)이지만 위치 탐색에 O(n) 필요 — 실제 반복자 사용 시만 O(1)</text>
</svg>
