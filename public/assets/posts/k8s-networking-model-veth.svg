<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Pod 네트워크 스택 — veth pair와 브리지</text>

  <!-- Pod 1 network namespace -->
  <rect x="60" y="68" width="200" height="150" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Pod 1 netns</text>
  <rect x="100" y="108" width="120" height="36" rx="4" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">eth0 (10.244.1.2)</text>
  <text x="160" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컨테이너가 보는 인터페이스</text>
  <text x="160" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">pause 컨테이너가 보유</text>
  <text x="160" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Pod 내 모든 컨테이너 공유</text>

  <!-- Arrow: Pod1 eth0 to veth -->
  <line x1="260" y1="126" x2="310" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="282" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">veth pair</text>

  <!-- Host network namespace -->
  <rect x="310" y="68" width="260" height="230" rx="8" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">호스트 netns (노드)</text>

  <!-- veth1 -->
  <rect x="330" y="104" width="100" height="32" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="380" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">vethXXXX</text>

  <!-- Bridge cbr0 -->
  <rect x="330" y="160" width="220" height="40" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">cbr0 / cni0 (브리지)</text>

  <!-- veth2 -->
  <rect x="450" y="104" width="100" height="32" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="500" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">vethYYYY</text>

  <!-- Arrows veth to bridge -->
  <line x1="380" y1="136" x2="400" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="136" x2="480" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- eth0 host -->
  <rect x="370" y="220" width="140" height="32" rx="4" fill="#0f1a2e" stroke="#888" stroke-width="1"/>
  <text x="440" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">eth0 (192.168.1.10)</text>

  <line x1="440" y1="200" x2="440" y2="220" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>
  <text x="452" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">iptables / routes</text>

  <!-- Arrow: vethYYYY from Pod2 -->
  <line x1="610" y1="126" x2="550" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="578" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">veth pair</text>

  <!-- Pod 2 network namespace -->
  <rect x="610" y="68" width="200" height="150" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Pod 2 netns</text>
  <rect x="650" y="108" width="120" height="36" rx="4" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">eth0 (10.244.1.3)</text>
  <text x="710" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">별도 네트워크 네임스페이스</text>
  <text x="710" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">프로세스 격리</text>

  <!-- pause container explanation -->
  <rect x="60" y="320" width="760" height="100" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">pause 컨테이너 (infra container)</text>
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">각 Pod마다 1개씩 실행되는 작은 컨테이너 — 네트워크 네임스페이스의 생명주기를 관리합니다.</text>
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Pod 내 다른 컨테이너들은 pause의 네트워크 네임스페이스를 공유(--net=container:pause)합니다.</text>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pause 컨테이너가 종료되면 Pod 내 모든 컨테이너의 네트워크가 리셋됩니다.</text>
</svg>
