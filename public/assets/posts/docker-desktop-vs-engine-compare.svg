<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Docker Desktop vs Docker Engine 비교</text>

  <!-- Headers -->
  <rect x="60" y="66" width="240" height="36" fill="#1a1a1a" stroke="#333" rx="6"/>
  <text x="180" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#aaa">항목</text>

  <rect x="315" y="66" width="240" height="36" fill="#0d1020" stroke="#7ec8e3" rx="6"/>
  <text x="435" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Docker Desktop</text>

  <rect x="570" y="66" width="250" height="36" fill="#0f2a0f" stroke="#55c555" rx="6"/>
  <text x="695" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Docker Engine</text>

  <!-- Row 1: Platform -->
  <rect x="60" y="108" width="240" height="38" fill="#111" stroke="#222" rx="4"/>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">지원 플랫폼</text>
  <rect x="315" y="108" width="240" height="38" fill="#080e1a" stroke="#1a2430" rx="4"/>
  <text x="435" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">macOS, Windows, Linux</text>
  <rect x="570" y="108" width="250" height="38" fill="#071208" stroke="#1a2a1a" rx="4"/>
  <text x="695" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Linux 전용</text>

  <!-- Row 2: GUI -->
  <rect x="60" y="152" width="240" height="38" fill="#0e0e0e" stroke="#222" rx="4"/>
  <text x="80" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">GUI 대시보드</text>
  <rect x="315" y="152" width="240" height="38" fill="#080e1a" stroke="#1a2430" rx="4"/>
  <text x="435" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">있음 (컨테이너/이미지 관리)</text>
  <rect x="570" y="152" width="250" height="38" fill="#071208" stroke="#1a2a1a" rx="4"/>
  <text x="695" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">없음 (CLI 전용)</text>

  <!-- Row 3: VM overhead -->
  <rect x="60" y="196" width="240" height="38" fill="#111" stroke="#222" rx="4"/>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">Linux VM 오버헤드</text>
  <rect x="315" y="196" width="240" height="38" fill="#080e1a" stroke="#1a2430" rx="4"/>
  <text x="435" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a030">있음 (macOS/Windows)</text>
  <rect x="570" y="196" width="250" height="38" fill="#071208" stroke="#1a2a1a" rx="4"/>
  <text x="695" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">없음 (네이티브)</text>

  <!-- Row 4: License -->
  <rect x="60" y="240" width="240" height="38" fill="#0e0e0e" stroke="#222" rx="4"/>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">라이선스</text>
  <rect x="315" y="240" width="240" height="38" fill="#080e1a" stroke="#1a2430" rx="4"/>
  <text x="435" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">기업 250인+ 유료</text>
  <rect x="570" y="240" width="250" height="38" fill="#071208" stroke="#1a2a1a" rx="4"/>
  <text x="695" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Apache 2.0 무료</text>

  <!-- Row 5: Kubernetes -->
  <rect x="60" y="284" width="240" height="38" fill="#111" stroke="#222" rx="4"/>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">내장 Kubernetes</text>
  <rect x="315" y="284" width="240" height="38" fill="#080e1a" stroke="#1a2430" rx="4"/>
  <text x="435" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">있음 (로컬 클러스터)</text>
  <rect x="570" y="284" width="250" height="38" fill="#071208" stroke="#1a2a1a" rx="4"/>
  <text x="695" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">없음 (별도 설치 필요)</text>

  <!-- Row 6: Use case -->
  <rect x="60" y="328" width="240" height="38" fill="#0e0e0e" stroke="#222" rx="4"/>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">주요 사용 환경</text>
  <rect x="315" y="328" width="240" height="38" fill="#080e1a" stroke="#1a2430" rx="4"/>
  <text x="435" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">로컬 개발 (dev)</text>
  <rect x="570" y="328" width="250" height="38" fill="#071208" stroke="#1a2a1a" rx="4"/>
  <text x="695" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">서버 / CI / 프로덕션</text>

  <!-- Bottom note -->
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">Docker Desktop과 Docker Engine은 같은 Docker CLI를 사용하므로 명령어는 동일합니다</text>
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">macOS에서는 Colima, OrbStack 같은 오픈소스 대안도 인기가 높습니다</text>
</svg>
