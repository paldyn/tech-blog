<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">메뉴 Dataset 바인딩 · 클릭 처리</text>

  <text x="230" y="82" fill="#888" font-size="13" text-anchor="middle">메뉴 Dataset 바인딩</text>
  <rect x="60" y="92" width="360" height="286" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// Menu 컴포넌트에 Dataset 연결</text>
  <text x="76" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_bindMenu</ttml></ttml></tspan>() {</text>
  <text x="76" y="150" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">oMenu</ttml></ttml></tspan> = this.mnu_main;</text>
  <text x="76" y="168" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 데이터 소스 지정</text>
  <text x="76" y="186" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oMenu.set_binddataset(</text>
  <text x="76" y="204" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "ds_menu");</text>
  <text x="76" y="222" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 컬럼 매핑</text>
  <text x="76" y="240" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oMenu.set_idcolumn(</text>
  <text x="76" y="258" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "menuId");</text>
  <text x="76" y="276" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oMenu.set_parentidcolumn(</text>
  <text x="76" y="294" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "parentId");</text>
  <text x="76" y="312" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oMenu.set_textcolumn(</text>
  <text x="76" y="330" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "menuNm");</text>
  <text x="76" y="348" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oMenu.refresh();</text>
  <text x="76" y="366" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <text x="650" y="82" fill="#888" font-size="13" text-anchor="middle">메뉴 클릭 처리</text>
  <rect x="460" y="92" width="360" height="286" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="114" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// onmenuclick 이벤트</text>
  <text x="476" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">mnu_main_onmenuclick</ttml></ttml></tspan>(</text>
  <text x="476" y="150" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    obj, e) {</text>
  <text x="476" y="168" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 클릭된 메뉴 정보</text>
  <text x="476" y="186" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">sId</ttml></ttml></tspan> = e.menuID;</text>
  <text x="476" y="204" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">nRow</ttml></ttml></tspan> = e.row;</text>
  <text x="476" y="222" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">sUrl</ttml></ttml></tspan> = this.ds_menu</text>
  <text x="476" y="240" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    .getColumn(nRow, <tspan fill="#ce9178">"menuUrl"</ttml></ttml></tspan>);</text>
  <text x="476" y="258" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // URL 없으면 폴더 메뉴</text>
  <text x="476" y="276" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  if <tspan fill="#e8e8e8">(!sUrl || sUrl == </ttml></ttml></ttml></tspan><tspan fill="#ce9178">""</ttml></ttml></tspan><tspan fill="#e8e8e8">)</ttml></ttml></tspan></text>
  <text x="476" y="294" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    return;</text>
  <text x="476" y="312" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  application.mainframe</text>
  <text x="476" y="330" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    .workarea.createContents(</text>
  <text x="476" y="348" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      sId, sUrl);</text>
  <text x="476" y="366" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
</svg>
