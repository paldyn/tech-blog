<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">os 모듈 — 운영체제 인터페이스 4대 영역</text>

  <!-- Column 1: 경로/디렉토리 -->
  <rect x="60" y="80" width="180" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">경로 / 디렉토리</text>

  <rect x="60" y="140" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.getcwd()</text>
  <text x="76" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">현재 작업 디렉토리 반환</text>

  <rect x="60" y="212" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.chdir(path)</text>
  <text x="76" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">작업 디렉토리 변경</text>

  <rect x="60" y="284" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.listdir(path)</text>
  <text x="76" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">디렉토리 항목 목록</text>

  <rect x="60" y="356" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="76" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.makedirs(path)</text>
  <text x="76" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">중간 디렉토리 포함 생성</text>

  <!-- Column 2: 파일 시스템 -->
  <rect x="270" y="80" width="180" height="44" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="360" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">파일 시스템</text>

  <rect x="270" y="140" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="286" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.rename(src, dst)</text>
  <text x="286" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파일 이름 변경 / 이동</text>

  <rect x="270" y="212" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="286" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.remove(path)</text>
  <text x="286" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파일 삭제</text>

  <rect x="270" y="284" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="286" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.stat(path)</text>
  <text x="286" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파일 메타데이터 조회</text>

  <rect x="270" y="356" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="286" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.walk(top)</text>
  <text x="286" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">트리 순회 generator</text>

  <!-- Column 3: 환경변수 -->
  <rect x="480" y="80" width="180" height="44" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="570" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">환경변수</text>

  <rect x="480" y="140" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="496" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.environ</text>
  <text x="496" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">환경변수 매핑 객체</text>

  <rect x="480" y="212" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="496" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.getenv(key)</text>
  <text x="496" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">환경변수 조회 (None 기본)</text>

  <rect x="480" y="284" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="496" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.putenv(key, val)</text>
  <text x="496" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">환경변수 설정</text>

  <rect x="480" y="356" width="180" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="496" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.path</text>
  <text x="496" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">경로 조작 서브모듈</text>

  <!-- Column 4: 프로세스 -->
  <rect x="690" y="80" width="150" height="44" rx="8" fill="#2a2a1a" stroke="#f0a020" stroke-width="1.5"/>
  <text x="765" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#f0a020" text-anchor="middle">프로세스</text>

  <rect x="690" y="140" width="150" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="706" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.getpid()</text>
  <text x="706" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">현재 프로세스 ID</text>

  <rect x="690" y="212" width="150" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="706" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.getppid()</text>
  <text x="706" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">부모 프로세스 ID</text>

  <rect x="690" y="284" width="150" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="706" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os.system(cmd)</text>
  <text x="706" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">쉘 명령 실행 (구식)</text>

  <rect x="690" y="356" width="150" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="706" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">os._exit(n)</text>
  <text x="706" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">즉시 종료 (cleanup 없음)</text>

  <!-- Bottom tip -->
  <rect x="60" y="440" width="760" height="64" rx="8" fill="#111820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">경로 조작 권장사항</text>
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">os.path 대신 pathlib.Path 사용 권장 (Python 3.4+) — 더 읽기 좋고 객체지향적</text>
</svg>
