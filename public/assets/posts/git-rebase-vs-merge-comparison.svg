  <line x1="498" y1="340" x2="530" y2="340" stroke="#555" stroke-width="1.5"/>
  <polygon points="530,335 540,340 530,345" fill="#555"/>
  <line x1="568" y1="340" x2="610" y2="340" stroke="#555" stroke-width="1.5"/>
  <polygon points="610,335 620,340 610,345" fill="#555"/>
  <line x1="648" y1="340" x2="690" y2="340" stroke="#555" stroke-width="1.5"/>
  <polygon points="690,335 700,340 690,345" fill="#555"/>
  <line x1="728" y1="340" x2="770" y2="340" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="770,335 780,340 770,345" fill="#55c555"/>

  <!-- Bottom info -->
  <line x1="60" y1="412" x2="820" y2="412" stroke="#222" stroke-width="1"/>
  <text x="220" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원본 SHA 유지 | 부모 2개 | 이력 명확</text>
  <text x="670" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">새 SHA 생성 | 부모 1개 | 직선 이력</text>
