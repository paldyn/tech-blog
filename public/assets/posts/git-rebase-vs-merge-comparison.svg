<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Rebase vs Merge 히스토리 비교</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">동일한 작업 결과, 다른 히스토리 모양</text>

  <!-- Setup (same start) -->
