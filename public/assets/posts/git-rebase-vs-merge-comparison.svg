  <circle cx="100" cy="155" r="18" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">C1</text>
  <circle cx="180" cy="155" r="18" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">C2</text>
