  <text x="670" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">직선 히스토리</text>

  <circle cx="480" cy="340" r="18" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="480" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">C1</text>
  <circle cx="550" cy="340" r="18" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="550" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">C2</text>
  <circle cx="630" cy="340" r="18" fill="#1a2233" stroke="#7777cc" stroke-width="2"/>
  <text x="630" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">M1</text>
  <circle cx="710" cy="340" r="18" fill="#1a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">F1'</text>
  <circle cx="790" cy="340" r="18" fill="#1a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="790" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">F2'</text>

