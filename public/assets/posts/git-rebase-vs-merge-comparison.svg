  <line x1="196" y1="144" x2="260" y2="122" stroke="#555" stroke-width="1.5"/>
  <polygon points="255,116 265,121 257,129" fill="#555"/>
  <line x1="196" y1="166" x2="260" y2="188" stroke="#555" stroke-width="1.5"/>
  <polygon points="256,188 266,192 258,200" fill="#555"/>
