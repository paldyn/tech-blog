  <circle cx="290" cy="300" r="18" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="290" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">F2</text>

