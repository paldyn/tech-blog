  <!-- Normal edges -->
  <line x1="140" y1="193" x2="228" y2="128" stroke="#555" stroke-width="2"/>
  <line x1="140" y1="207" x2="228" y2="272" stroke="#555" stroke-width="2"/>
  <line x1="252" y1="128" x2="368" y2="193" stroke="#555" stroke-width="2"/>
  <line x1="252" y1="272" x2="368" y2="207" stroke="#555" stroke-width="2"/>
  <line x1="240" y1="138" x2="240" y2="262" stroke="#555" stroke-width="2"/>

  <!-- Bridge: 3-4 (red) -->
  <line x1="396" y1="195" x2="486" y2="125" stroke="#e05555" stroke-width="3"/>
  <text x="445" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600" text-anchor="middle">다리!</text>

  <!-- Bridge: 3-5 (red) -->
  <line x1="396" y1="205" x2="486" y2="275" stroke="#e05555" stroke-width="3"/>
  <text x="445" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600" text-anchor="middle">다리!</text>

  <line x1="514" y1="128" x2="608" y2="193" stroke="#555" stroke-width="2"/>
  <line x1="514" y1="272" x2="608" y2="207" stroke="#555" stroke-width="2"/>
  <line x1="500" y1="138" x2="500" y2="262" stroke="#555" stroke-width="2"/>

  <!-- Bridge: 6-7 (red) -->
  <line x1="638" y1="200" x2="742" y2="200" stroke="#e05555" stroke-width="3"/>
  <text x="690" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
