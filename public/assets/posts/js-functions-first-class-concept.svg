<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">함수가 일급 객체인 세 가지 이유</text>
  <text x="440" y="76" text-anchor="middle" font-size="13" fill="#666">값처럼 저장하고, 전달하고, 반환할 수 있다</text>

  <!-- Card 1: 변수에 저장 -->
  <rect x="40" y="108" width="252" height="338" rx="12" fill="#0e1620" stroke="#22405a" stroke-width="1.5"/>
  <rect x="40" y="108" width="252" height="44" rx="12" fill="#152436"/>
  <rect x="40" y="140" width="252" height="12" fill="#152436"/>
  <text x="166" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#7799cc">① 변수에 저장</text>

  <!-- Code block 1 -->
  <rect x="56" y="168" width="220" height="116" rx="6" fill="#070b14" stroke="#1a2240" stroke-width="1"/>
  <text x="70" y="190" font-size="11" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">const greet = function (n) {</text>
  <text x="86" y="208" font-size="11" fill="#7799cc" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">return `안녕, ${n}`;</text>
  <text x="70" y="226" font-size="11" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">};</text>
  <text x="70" y="252" font-size="11" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">greet("Alice");</text>
  <text x="70" y="270" font-size="11" fill="#557766" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">// "안녕, Alice"</text>

  <!-- Description 1 -->
  <line x1="56" y1="304" x2="276" y2="304" stroke="#1a2a40" stroke-width="1"/>
  <text x="166" y="332" text-anchor="middle" font-size="12" fill="#888">함수를 값처럼</text>
  <text x="166" y="354" text-anchor="middle" font-size="12" fill="#888">변수에 할당</text>
  <text x="166" y="392" text-anchor="middle" font-size="11" fill="#5a7a99">나중에 이름으로 호출 가능</text>
  <text x="166" y="420" text-anchor="middle" font-size="10" fill="#446">(상수 함수 패턴의 기반)</text>

  <!-- Card 2: 인자로 전달 -->
  <rect x="314" y="108" width="252" height="338" rx="12" fill="#0e1a0e" stroke="#22552a" stroke-width="1.5"/>
  <rect x="314" y="108" width="252" height="44" rx="12" fill="#152a18"/>
  <rect x="314" y="140" width="252" height="12" fill="#152a18"/>
  <text x="440" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#77cc88">② 인자로 전달</text>

  <!-- Code block 2 -->
  <rect x="330" y="168" width="220" height="116" rx="6" fill="#070f08" stroke="#1a3a1a" stroke-width="1"/>
  <text x="344" y="190" font-size="11" fill="#aaddaa" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">function run(fn) {</text>
  <text x="360" y="208" font-size="11" fill="#88cc99" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">fn("world");</text>
  <text x="344" y="226" font-size="11" fill="#aaddaa" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="344" y="252" font-size="11" fill="#aaddaa" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">run(greet);</text>
  <text x="344" y="270" font-size="11" fill="#5a7a5a" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">// "안녕, world"</text>

  <!-- Description 2 -->
  <line x1="330" y1="304" x2="550" y2="304" stroke="#1a3a1a" stroke-width="1"/>
  <text x="440" y="332" text-anchor="middle" font-size="12" fill="#888">함수를 다른 함수의</text>
  <text x="440" y="354" text-anchor="middle" font-size="12" fill="#888">인자로 넘김</text>
  <text x="440" y="392" text-anchor="middle" font-size="11" fill="#669977">콜백 패턴의 기반</text>
  <text x="440" y="420" text-anchor="middle" font-size="10" fill="#456645">(map · filter · reduce 등)</text>

  <!-- Card 3: 반환값으로 -->
  <rect x="588" y="108" width="252" height="338" rx="12" fill="#1a0e1a" stroke="#552255" stroke-width="1.5"/>
  <rect x="588" y="108" width="252" height="44" rx="12" fill="#2a152a"/>
  <rect x="588" y="140" width="252" height="12" fill="#2a152a"/>
  <text x="714" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#cc88cc">③ 반환값으로</text>

  <!-- Code block 3 -->
  <rect x="604" y="168" width="220" height="116" rx="6" fill="#0f070f" stroke="#3a1a3a" stroke-width="1"/>
  <text x="618" y="190" font-size="11" fill="#ddaaee" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">function multiplier(n) {</text>
  <text x="634" y="208" font-size="11" fill="#cc99dd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">return (x) =&gt; x * n;</text>
  <text x="618" y="226" font-size="11" fill="#ddaaee" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="618" y="252" font-size="11" fill="#ddaaee" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">const triple = multiplier(3);</text>
  <text x="618" y="270" font-size="11" fill="#7a5a7a" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">triple(5); // 15</text>

  <!-- Description 3 -->
  <line x1="604" y1="304" x2="824" y2="304" stroke="#3a1a3a" stroke-width="1"/>
  <text x="714" y="332" text-anchor="middle" font-size="12" fill="#888">함수가 새 함수를</text>
  <text x="714" y="354" text-anchor="middle" font-size="12" fill="#888">만들어 반환</text>
  <text x="714" y="392" text-anchor="middle" font-size="11" fill="#996699">클로저·팩토리 패턴의 기반</text>
  <text x="714" y="420" text-anchor="middle" font-size="10" fill="#664466">(고차 함수의 핵심)</text>

  <!-- Footer -->
  <text x="440" y="478" text-anchor="middle" font-size="11" fill="#555">이 세 가지 능력이 모두 있어야 함수를 '일급 객체(First-Class Object)'라고 부른다</text>
</svg>
