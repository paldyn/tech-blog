<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#e8e8e8">함수가 일급 객체인 세 가지 이유</text>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#555">값처럼 저장하고, 전달하고, 반환할 수 있다</text>

  <!-- Card 1: 변수에 저장 -->
  <rect x="40" y="90" width="250" height="270" rx="12" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
  <rect x="40" y="90" width="250" height="52" rx="12" fill="#1a1a2a"/>
  <rect x="40" y="130" width="250" height="12" fill="#1a1a2a"/>
  <text x="165" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#6b9fff">① 변수에 저장</text>

  <text x="60" y="162" font-size="11" fill="#555">const greet =</text>
  <text x="60" y="178" font-size="11" fill="#555">  function(name) {</text>
  <text x="60" y="194" font-size="11" fill="#555">    return `안녕, ${name}`;</text>
  <text x="60" y="210" font-size="11" fill="#555">  };</text>
  <text x="60" y="234" font-size="11" fill="#555">greet("Alice");</text>
  <text x="60" y="250" font-size="11" fill="#888">// "안녕, Alice"</text>

  <text x="165" y="290" text-anchor="middle" font-size="11" fill="#444">함수를 값처럼</text>
  <text x="165" y="306" text-anchor="middle" font-size="11" fill="#444">변수에 할당합니다</text>
  <text x="165" y="325" text-anchor="middle" font-size="11" fill="#333">나중에 이름으로 호출 가능</text>

  <!-- Card 2: 인자로 전달 -->
  <rect x="315" y="90" width="250" height="270" rx="12" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
  <rect x="315" y="90" width="250" height="52" rx="12" fill="#1a2a1a"/>
  <rect x="315" y="130" width="250" height="12" fill="#1a2a1a"/>
  <text x="440" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#6abf5e">② 인자로 전달</text>

  <text x="335" y="162" font-size="11" fill="#555">function run(fn) {</text>
  <text x="335" y="178" font-size="11" fill="#555">  fn("world");</text>
  <text x="335" y="194" font-size="11" fill="#555">}</text>
  <text x="335" y="218" font-size="11" fill="#555">run(greet);</text>
  <text x="335" y="234" font-size="11" fill="#888">// "안녕, world"</text>

  <text x="440" y="290" text-anchor="middle" font-size="11" fill="#444">함수를 다른 함수의</text>
  <text x="440" y="306" text-anchor="middle" font-size="11" fill="#444">인자로 넘깁니다</text>
  <text x="440" y="325" text-anchor="middle" font-size="11" fill="#333">콜백 패턴의 기반</text>

  <!-- Card 3: 반환 -->
  <rect x="590" y="90" width="250" height="270" rx="12" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
  <rect x="590" y="90" width="250" height="52" rx="12" fill="#2a1a2a"/>
  <rect x="590" y="130" width="250" height="12" fill="#2a1a2a"/>
  <text x="715" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#c678dd">③ 반환값으로</text>

  <text x="610" y="162" font-size="11" fill="#555">function multiplier(n) {</text>
  <text x="610" y="178" font-size="11" fill="#555">  return (x) =&gt; x * n;</text>
  <text x="610" y="194" font-size="11" fill="#555">}</text>
  <text x="610" y="218" font-size="11" fill="#555">const triple = multiplier(3);</text>
  <text x="610" y="234" font-size="11" fill="#555">triple(5);</text>
  <text x="610" y="250" font-size="11" fill="#888">// 15</text>

  <text x="715" y="290" text-anchor="middle" font-size="11" fill="#444">함수가 새 함수를</text>
  <text x="715" y="306" text-anchor="middle" font-size="11" fill="#444">만들어 반환합니다</text>
  <text x="715" y="325" text-anchor="middle" font-size="11" fill="#333">클로저와 팩토리 패턴의 기반</text>

  <!-- Bottom note -->
  <text x="440" y="378" text-anchor="middle" font-size="12" fill="#444">이 세 가지 능력이 있어야 '일급 객체(First-Class Object)'라고 부릅니다</text>
</svg>
