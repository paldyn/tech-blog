<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">다중 파일 업로드 UI 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">파일 목록 Dataset + Grid + FileUpload 조합</text>

  <!-- FileUpload component -->
  <rect x="60" y="96" width="240" height="120" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">FileUpload</text>
  <text x="180" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">multiple="true"</text>
  <rect x="80" y="154" width="200" height="28" rx="4" fill="#1e2433"/>
  <text x="180" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">파일 선택 / 드래그 앤 드롭</text>
  <text x="180" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">filter="*.pdf;*.xlsx;*.jpg"</text>

  <!-- Arrow right -->
  <line x1="300" y1="156" x2="356" y2="156" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="356,150 368,156 356,162" fill="#7ec8e3"/>
  <text x="328" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일 목록</text>

  <!-- Dataset box -->
  <rect x="368" y="96" width="200" height="120" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="468" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">dsFileQueue</text>
  <rect x="384" y="132" width="168" height="18" rx="2" fill="#1e2433"/>
  <text x="388" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">FILE_NM | SIZE | STATUS</text>
  <text x="388" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">보고서.pdf</text>
  <text x="516" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">1.2MB</text>
  <text x="560" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">완료</text>
  <text x="388" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">사진.jpg</text>
  <text x="516" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">3.4MB</text>
  <text x="560" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">대기</text>
  <text x="388" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">계약서.xlsx</text>
  <text x="516" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">0.8MB</text>
  <text x="560" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">오류</text>

  <!-- Arrow right -->
  <line x1="568" y1="156" x2="624" y2="156" stroke="#7777cc" stroke-width="2"/>
  <polygon points="624,150 636,156 624,162" fill="#7777cc"/>
  <text x="596" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">바인딩</text>

  <!-- Grid box -->
  <rect x="636" y="96" width="204" height="120" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="738" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Grid (파일 목록)</text>
  <rect x="652" y="132" width="172" height="16" rx="2" fill="#1e2433"/>
  <text x="738" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일명 | 크기 | 상태 | 삭제</text>
  <rect x="652" y="150" width="172" height="14" rx="0" fill="#0a1a0a"/>
  <text x="666" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">보고서.pdf</text>
  <text x="746" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">완료</text>
  <rect x="652" y="166" width="172" height="14" rx="0" fill="#111827"/>
  <text x="666" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">사진.jpg</text>
  <text x="746" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">대기</text>
  <rect x="652" y="182" width="172" height="14" rx="0" fill="#0a1a0a"/>
  <text x="666" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">계약서.xlsx</text>
  <text x="746" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">오류</text>

  <!-- Sequential upload logic -->
  <rect x="60" y="256" width="760" height="160" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">순차 업로드 로직</text>

  <!-- Step boxes -->
  <rect x="80" y="292" width="120" height="40" rx="4" fill="#1a1a2e"/>
  <text x="140" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">파일 0 업로드</text>
  <line x1="200" y1="312" x2="228" y2="312" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="228,307 240,312 228,317" fill="#7777cc"/>
  <rect x="240" y="292" width="120" height="40" rx="4" fill="#1a1a2e"/>
  <text x="300" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">완료 콜백</text>
  <line x1="360" y1="312" x2="388" y2="312" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="388,307 400,312 388,317" fill="#7777cc"/>
  <rect x="400" y="292" width="120" height="40" rx="4" fill="#1a1a2e"/>
  <text x="460" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">파일 1 업로드</text>
  <line x1="520" y1="312" x2="548" y2="312" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="548,307 560,312 548,317" fill="#7777cc"/>
  <rect x="560" y="292" width="120" height="40" rx="4" fill="#1a1a2e"/>
  <text x="620" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">모두 완료</text>

  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 파일 완료 후 nCurrentIdx++ → 다음 파일 upload() 호출</text>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">STATUS 컬럼 갱신 → Grid 상태 실시간 반영</text>
</svg>
