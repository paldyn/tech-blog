<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">XML 빈 와이어링 방식 비교</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#888">constructor-arg (생성자 주입) vs property (세터 주입)</text>

  <!-- Divider -->
  <line x1="440" y1="82" x2="440" y2="450" stroke="#222" stroke-width="1"/>

  <!-- ─── Left column: constructor-arg ─── -->
  <!-- Header -->
  <rect x="60" y="86" width="360" height="38" rx="6" fill="#0f1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="111" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">constructor-arg (생성자 주입)</text>

  <!-- Code block -->
  <rect x="60" y="132" width="360" height="148" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="155" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">&lt;bean </text>
  <text x="117" y="155" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">id</text>
  <text x="132" y="155" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="orderService"</text>
  <text x="76" y="173" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">      class</text>
  <text x="136" y="173" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="com.example.OrderService"</text>
  <text x="76" y="191" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  &gt;</text>
  <text x="76" y="209" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#6a8aa0">  &lt;!-- 빈 참조 --&gt;</text>
  <text x="76" y="227" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  &lt;constructor-arg </text>
  <text x="224" y="227" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">ref</text>
  <text x="246" y="227" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="discountPolicy"</text>
  <text x="372" y="227" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">/&gt;</text>
  <text x="76" y="245" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  &lt;constructor-arg </text>
  <text x="224" y="245" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">value</text>
  <text x="260" y="245" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="3"</text>
  <text x="296" y="245" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">/&gt;</text>
  <text x="76" y="263" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">&lt;/bean&gt;</text>

  <!-- Pros/Cons -->
  <rect x="60" y="292" width="360" height="140" rx="6" fill="#0a0f0a" stroke="#1e2e1e"/>
  <text x="80" y="316" font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="80" y="336" font-size="12" fill="#e8e8e8">• 불변 객체 생성 가능 (final 필드)</text>
  <text x="80" y="354" font-size="12" fill="#e8e8e8">• 순환 의존성 즉시 감지</text>
  <text x="80" y="372" font-size="12" fill="#e8e8e8">• 완전히 초기화된 상태 보장</text>
  <text x="80" y="400" font-size="13" font-weight="600" fill="#e05555">단점</text>
  <text x="80" y="420" font-size="12" fill="#888">• 매개변수 수가 많으면 복잡</text>

  <!-- ─── Right column: property (setter) ─── -->
  <!-- Header -->
  <rect x="460" y="86" width="360" height="38" rx="6" fill="#1a130a" stroke="#e8a03a" stroke-width="1.5"/>
  <text x="640" y="111" text-anchor="middle" font-size="15" font-weight="700" fill="#e8a03a">property (세터 주입)</text>

  <!-- Code block -->
  <rect x="460" y="132" width="360" height="148" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="155" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">&lt;bean </text>
  <text x="517" y="155" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">id</text>
  <text x="532" y="155" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="emailSender"</text>
  <text x="476" y="173" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">      class</text>
  <text x="536" y="173" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="com.example.EmailSender"</text>
  <text x="476" y="191" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">  &gt;</text>
  <text x="476" y="209" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#6a8aa0">  &lt;!-- 세터 주입 --&gt;</text>
  <text x="476" y="227" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  &lt;property </text>
  <text x="556" y="227" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">name</text>
  <text x="586" y="227" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="host"</text>
  <text x="640" y="227" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">  value</text>
  <text x="682" y="227" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="smtp.ex.com"</text>
  <text x="795" y="227" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">/&gt;</text>
  <text x="476" y="245" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">  &lt;property </text>
  <text x="556" y="245" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">name</text>
  <text x="586" y="245" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="port"</text>
  <text x="640" y="245" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#b5cea8">  value</text>
  <text x="682" y="245" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ce9178">="587"</text>
  <text x="730" y="245" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">/&gt;</text>
  <text x="476" y="263" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">&lt;/bean&gt;</text>

  <!-- Pros/Cons -->
  <rect x="460" y="292" width="360" height="140" rx="6" fill="#0a0f0a" stroke="#1e2e1e"/>
  <text x="480" y="316" font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="480" y="336" font-size="12" fill="#e8e8e8">• 선택적 의존성 처리 유연</text>
  <text x="480" y="354" font-size="12" fill="#e8e8e8">• 매개변수 이름으로 명시적 지정</text>
  <text x="480" y="372" font-size="12" fill="#e8e8e8">• 기존 레거시 코드 연동 용이</text>
  <text x="480" y="400" font-size="13" font-weight="600" fill="#e05555">단점</text>
  <text x="480" y="420" font-size="12" fill="#888">• 가변 상태 · 초기화 순서 주의 필요</text>

  <!-- Footer -->
  <text x="440" y="472" text-anchor="middle" font-size="11" fill="#444">스프링 팀은 필수 의존성은 생성자 주입, 선택적 의존성은 세터 주입을 권장합니다 (Spring 4.x 이후)</text>
</svg>
