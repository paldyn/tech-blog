<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 550"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="550" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">파일 시스템 vs 관계형 데이터베이스</text>

  <!-- ── Left Panel: File System ── -->
  <rect x="60" y="78" width="350" height="408" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="235" y="106" text-anchor="middle" font-size="16" font-weight="600" fill="#e05555">파일 시스템</text>
  <line x1="60" y1="118" x2="410" y2="118" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Left Item 1 -->
  <text x="84" y="148" font-size="15" fill="#e05555">✗</text>
  <text x="108" y="148" font-size="14" font-weight="600" fill="#e8e8e8">데이터 중복 저장</text>
  <text x="108" y="166" font-size="12" fill="#888">파일마다 같은 정보를 중복 기록</text>

  <!-- Left Item 2 -->
  <text x="84" y="220" font-size="15" fill="#e05555">✗</text>
  <text x="108" y="220" font-size="14" font-weight="600" fill="#e8e8e8">쿼리 언어 없음</text>
  <text x="108" y="238" font-size="12" fill="#888">원하는 데이터 찾으려면 전체 탐색</text>

  <!-- Left Item 3 -->
  <text x="84" y="292" font-size="15" fill="#e05555">✗</text>
  <text x="108" y="292" font-size="14" font-weight="600" fill="#e8e8e8">동시 접근 충돌</text>
  <text x="108" y="310" font-size="12" fill="#888">락 없이 동시 수정 시 데이터 손상</text>

  <!-- Left Item 4 -->
  <text x="84" y="364" font-size="15" fill="#e05555">✗</text>
  <text x="108" y="364" font-size="14" font-weight="600" fill="#e8e8e8">형식·무결성 미보장</text>
  <text x="108" y="382" font-size="12" fill="#888">날짜·포맷과 필수 값 검증 불가</text>

  <!-- Left Item 5 -->
  <text x="84" y="434" font-size="15" fill="#e05555">✗</text>
  <text x="108" y="434" font-size="14" font-weight="600" fill="#e8e8e8">애플리케이션 종속</text>
  <text x="108" y="452" font-size="12" fill="#888">스키마가 없어 앱마다 해석이 다름</text>

  <!-- ── Right Panel: RDBMS ── -->
  <rect x="470" y="78" width="350" height="408" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="645" y="106" text-anchor="middle" font-size="16" font-weight="600" fill="#55c555">관계형 데이터베이스</text>
  <line x1="470" y1="118" x2="820" y2="118" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Right Item 1 -->
  <text x="494" y="148" font-size="15" fill="#55c555">✓</text>
  <text x="518" y="148" font-size="14" font-weight="600" fill="#e8e8e8">정규화로 중복 제거</text>
  <text x="518" y="166" font-size="12" fill="#888">한 곳에 저장, FK로 참조</text>

  <!-- Right Item 2 -->
  <text x="494" y="220" font-size="15" fill="#55c555">✓</text>
  <text x="518" y="220" font-size="14" font-weight="600" fill="#e8e8e8">SQL로 즉시 검색</text>
  <text x="518" y="238" font-size="12" fill="#888">SELECT 한 줄로 원하는 집합 추출</text>

  <!-- Right Item 3 -->
  <text x="494" y="292" font-size="15" fill="#55c555">✓</text>
  <text x="518" y="292" font-size="14" font-weight="600" fill="#e8e8e8">트랜잭션 동시성 제어</text>
  <text x="518" y="310" font-size="12" fill="#888">ACID 보장으로 안전한 동시 접근</text>

  <!-- Right Item 4 -->
  <text x="494" y="364" font-size="15" fill="#55c555">✓</text>
  <text x="518" y="364" font-size="14" font-weight="600" fill="#e8e8e8">스키마 + 제약 조건</text>
  <text x="518" y="382" font-size="12" fill="#888">CHECK·NOT NULL로 형식 강제</text>

  <!-- Right Item 5 -->
  <text x="494" y="434" font-size="15" fill="#55c555">✓</text>
  <text x="518" y="434" font-size="14" font-weight="600" fill="#e8e8e8">데이터 독립성</text>
  <text x="518" y="452" font-size="12" fill="#888">스키마로 앱과 데이터 분리</text>

  <!-- ── Center Arrow (solid polygon) at y=290 ── -->
  <polygon points="413,285 452,285 452,280 467,290 452,300 452,295 413,295"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Footer -->
  <text x="440" y="510" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 1</text>
</svg>
