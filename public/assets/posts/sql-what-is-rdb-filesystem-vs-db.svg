<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">파일 시스템 vs 데이터베이스</text>
  <text x="440" y="72" text-anchor="middle" font-size="14" fill="#888">데이터 저장·조회·무결성 측면 비교</text>

  <!-- Left column: File System -->
  <rect x="60" y="96" width="340" height="380" fill="#0f1520" rx="8" stroke="#2a3040" stroke-width="1"/>
  <text x="230" y="126" text-anchor="middle" font-size="16" font-weight="600" fill="#e05555">파일 시스템</text>

  <!-- FS item 1 -->
  <rect x="80" y="140" width="300" height="56" fill="#1a0f0f" rx="6" stroke="#3a2020" stroke-width="1"/>
  <text x="96" y="162" font-size="13" fill="#888">저장 방식</text>
  <text x="96" y="182" font-size="13" fill="#e8e8e8">플랫 파일(CSV·TXT) 직접 I/O</text>

  <!-- FS item 2 -->
  <rect x="80" y="208" width="300" height="56" fill="#1a0f0f" rx="6" stroke="#3a2020" stroke-width="1"/>
  <text x="96" y="230" font-size="13" fill="#888">중복 제어</text>
  <text x="96" y="250" font-size="13" fill="#e8e8e8">없음 — 앱마다 각자 관리</text>

  <!-- FS item 3 -->
  <rect x="80" y="276" width="300" height="56" fill="#1a0f0f" rx="6" stroke="#3a2020" stroke-width="1"/>
  <text x="96" y="298" font-size="13" fill="#888">동시 접근</text>
  <text x="96" y="318" font-size="13" fill="#e8e8e8">파일 잠금(lock)에 의존</text>

  <!-- FS item 4 -->
  <rect x="80" y="344" width="300" height="56" fill="#1a0f0f" rx="6" stroke="#3a2020" stroke-width="1"/>
  <text x="96" y="366" font-size="13" fill="#888">장애 복구</text>
  <text x="96" y="386" font-size="13" fill="#e8e8e8">애플리케이션 직접 구현 필요</text>

  <!-- FS item 5 -->
  <rect x="80" y="412" width="300" height="48" fill="#1a0f0f" rx="6" stroke="#3a2020" stroke-width="1"/>
  <text x="96" y="434" font-size="13" fill="#888">접근 방법</text>
  <text x="96" y="452" font-size="13" fill="#e8e8e8">프로그래밍 언어 파일 API</text>

  <!-- Center arrow (solid polygon) -->
  <polygon points="430,270 450,270 450,256 470,280 450,304 450,290 430,290"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Right column: Database -->
  <rect x="480" y="96" width="340" height="380" fill="#0f1520" rx="8" stroke="#1e3a20" stroke-width="1"/>
  <text x="650" y="126" text-anchor="middle" font-size="16" font-weight="600" fill="#55c555">데이터베이스</text>

  <!-- DB item 1 -->
  <rect x="500" y="140" width="300" height="56" fill="#0f1a0f" rx="6" stroke="#1e3a1e" stroke-width="1"/>
  <text x="516" y="162" font-size="13" fill="#888">저장 방식</text>
  <text x="516" y="182" font-size="13" fill="#e8e8e8">구조화된 테이블 + 인덱스</text>

  <!-- DB item 2 -->
  <rect x="500" y="208" width="300" height="56" fill="#0f1a0f" rx="6" stroke="#1e3a1e" stroke-width="1"/>
  <text x="516" y="230" font-size="13" fill="#888">중복 제어</text>
  <text x="516" y="250" font-size="13" fill="#e8e8e8">제약 조건으로 DBMS가 보장</text>

  <!-- DB item 3 -->
  <rect x="500" y="276" width="300" height="56" fill="#0f1a0f" rx="6" stroke="#1e3a1e" stroke-width="1"/>
  <text x="516" y="298" font-size="13" fill="#888">동시 접근</text>
  <text x="516" y="318" font-size="13" fill="#e8e8e8">트랜잭션 + 격리 수준 제공</text>

  <!-- DB item 4 -->
  <rect x="500" y="344" width="300" height="56" fill="#0f1a0f" rx="6" stroke="#1e3a1e" stroke-width="1"/>
  <text x="516" y="366" font-size="13" fill="#888">장애 복구</text>
  <text x="516" y="386" font-size="13" fill="#e8e8e8">WAL · Redo Log 자동 복구</text>

  <!-- DB item 5 -->
  <rect x="500" y="412" width="300" height="48" fill="#0f1a0f" rx="6" stroke="#1e3a1e" stroke-width="1"/>
  <text x="516" y="434" font-size="13" fill="#888">접근 방법</text>
  <text x="516" y="452" font-size="13" fill="#e8e8e8">SQL (표준 선언형 질의 언어)</text>

  <!-- Footer -->
  <text x="440" y="500" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 Chapter 1</text>
</svg>
