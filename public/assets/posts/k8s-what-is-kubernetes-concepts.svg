<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">K8s 핵심 오브젝트 계층</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">선언적 API 기반 리소스 관리</text>

  <!-- kubectl box -->
  <rect x="340" y="90" width="200" height="60" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">kubectl</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">선언적 YAML 적용 / 명령어 실행</text>

  <line x1="440" y1="150" x2="440" y2="172" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- API Server -->
  <rect x="320" y="178" width="240" height="52" rx="8" fill="#112240" stroke="#3a6ea5" stroke-width="1.5"/>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">API Server</text>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인증 · 인가 · 검증 · etcd 저장</text>

  <line x1="290" y1="230" x2="200" y2="268" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="230" x2="440" y2="268" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="590" y1="230" x2="680" y2="268" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Scheduler -->
  <rect x="80" y="274" width="200" height="52" rx="8" fill="#112240" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Scheduler</text>
  <text x="180" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Pod -&gt; 최적 Node 배치</text>

  <!-- etcd -->
  <rect x="320" y="274" width="240" height="52" rx="8" fill="#112240" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">etcd</text>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">desired state 영속화</text>

  <!-- Controller -->
  <rect x="600" y="274" width="200" height="52" rx="8" fill="#112240" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Controller</text>
  <text x="700" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Manager</text>
  <text x="700" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">desired == actual 유지</text>

  <!-- Code box: K8s API object example -->
  <rect x="60" y="348" width="360" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">apiVersion: apps/v1</text>
  <text x="78" y="389" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kind: Deployment</text>
  <text x="78" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">metadata:</text>
  <text x="78" y="427" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  name: <tspan fill="#ce9178">my-app</tspan></text>

  <!-- Right explanation box -->
  <rect x="460" y="348" width="360" height="100" rx="6" fill="#0f1a2e" stroke="#3a6ea5" stroke-width="1"/>
  <text x="480" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">선언적(Declarative) 방식</text>
  <text x="480" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원하는 상태(desired state)를</text>
  <text x="480" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">YAML로 정의 → API Server에 전달</text>
  <text x="480" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">K8s가 자동으로 현재 상태와 동기화</text>

  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">쿠버네티스는 선언적 API + 제어 루프로 클러스터 상태를 자동 관리한다</text>
</svg>
