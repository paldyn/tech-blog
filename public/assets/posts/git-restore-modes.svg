<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git restore 두 가지 모드</text>

  <!-- Three areas -->
  <!-- Commit (HEAD) -->
  <rect x="60" y="80" width="180" height="90" rx="8" fill="#0a0a1a" stroke="#20205a" stroke-width="1.5"/>
  <text x="150" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Repository</text>
  <text x="150" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(HEAD)</text>
  <text x="150" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">커밋 상태</text>

  <!-- Staging -->
  <rect x="340" y="80" width="200" height="90" rx="8" fill="#0a1a0a" stroke="#205a20" stroke-width="1.5"/>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Staging Area</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(Index)</text>
  <text x="440" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">스테이징된 내용</text>

  <!-- Working Tree -->
  <rect x="640" y="80" width="180" height="90" rx="8" fill="#1a0a0a" stroke="#5a2020" stroke-width="1.5"/>
  <text x="730" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Working Tree</text>
  <text x="730" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(파일)</text>
  <text x="730" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle">현재 파일 내용</text>

  <!-- Arrow: HEAD -> Staging (–staged mode) -->
  <line x1="240" y1="112" x2="340" y2="112" stroke="#7777cc" stroke-width="2"/>
  <polygon points="340,106 352,112 340,118" fill="#7777cc"/>
  <text x="290" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">--staged</text>
  <text x="290" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">(source=HEAD)</text>

  <!-- Arrow: Staging -> Working Tree (default) -->
  <line x1="540" y1="125" x2="640" y2="125" stroke="#55c555" stroke-width="2"/>
  <polygon points="640,119 652,125 640,131" fill="#55c555"/>
  <text x="590" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">기본 모드</text>
  <text x="590" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">(source=index)</text>

  <!-- Mode 1 box -->
  <rect x="60" y="210" width="375" height="170" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">모드 1: 워킹트리 되돌리기</text>
  <text x="80" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">git restore file.txt</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인덱스(스테이징 영역) → 워킹트리</text>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스테이징 안 된 변경을 버림</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">⚠ 되돌릴 수 없음! reflog에도 없음</text>
  <text x="80" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 구버전: git checkout -- file.txt</text>
  <text x="80" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 전체 되돌리기: git restore .</text>

  <!-- Mode 2 box -->
  <rect x="448" y="210" width="372" height="170" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="468" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">모드 2: 스테이징 취소</text>
  <text x="468" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">git restore --staged file.txt</text>
  <text x="468" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HEAD(최신 커밋) → 인덱스</text>
  <text x="468" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">워킹트리 파일은 그대로 유지</text>
  <text x="468" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">안전: 실제 파일 내용은 바뀌지 않음</text>
  <text x="468" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 구버전: git reset HEAD file.txt</text>
  <text x="468" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 두 모드 동시: git restore -SW .</text>
</svg>
