<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">삽입 정렬 — 카드 삽입 방식</text>

  <!-- Row labels -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">초기</text>
  <text x="60" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">i=1</text>
  <text x="60" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">i=2</text>
  <text x="60" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">i=3</text>
  <text x="60" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">완료</text>

  <!-- Row 0: [5, 2, 4, 1, 3] -->
  <rect x="110" y="84" width="72" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="146" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">5</text>
  <rect x="192" y="84" width="72" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="228" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">2</text>
  <rect x="274" y="84" width="72" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="310" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">4</text>
  <rect x="356" y="84" width="72" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="392" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">1</text>
  <rect x="438" y="84" width="72" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="474" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">3</text>

  <!-- Row 1: i=1, key=2 → [2, 5, 4, 1, 3] -->
  <rect x="110" y="158" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="146" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>
  <rect x="192" y="158" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="228" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#55c555">5</text>
  <rect x="274" y="158" width="72" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="310" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">4</text>
  <rect x="356" y="158" width="72" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="392" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">1</text>
  <rect x="438" y="158" width="72" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="474" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">3</text>
  <text x="660" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">key=2, 5 오른쪽 이동</text>

  <!-- Row 2: i=2, key=4 → [2, 4, 5, 1, 3] -->
  <rect x="110" y="234" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="146" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>
  <rect x="192" y="234" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="228" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">4</text>
  <rect x="274" y="234" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="310" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#55c555">5</text>
  <rect x="356" y="234" width="72" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="392" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">1</text>
  <rect x="438" y="234" width="72" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="474" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">3</text>
  <text x="660" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">key=4, 5 오른쪽 이동</text>

  <!-- Row 3: i=3, key=1 → [1, 2, 4, 5, 3] -->
  <rect x="110" y="310" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="146" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">1</text>
  <rect x="192" y="310" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="228" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>
  <rect x="274" y="310" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="310" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">4</text>
  <rect x="356" y="310" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="392" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#55c555">5</text>
  <rect x="438" y="310" width="72" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="474" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">3</text>
  <text x="660" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">key=1, 2·4·5 이동</text>

  <!-- Final: [1, 2, 3, 4, 5] -->
  <rect x="110" y="386" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="146" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">1</text>
  <rect x="192" y="386" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="228" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>
  <rect x="274" y="386" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="310" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">3</text>
  <rect x="356" y="386" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="392" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">4</text>
  <rect x="438" y="386" width="72" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="474" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">5</text>
  <text x="660" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">정렬 완료</text>
</svg>
