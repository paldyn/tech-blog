<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Content Security Policy(CSP) 동작 원리</text>

  <!-- CSP header -->
  <rect x="60" y="68" width="760" height="62" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">서버가 CSP 헤더를 전송 → 브라우저가 정책에 따라 리소스 로드 제어</text>
  <rect x="76" y="98" width="748" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Content-Security-Policy: default-src 'self'; script-src 'self' cdn.example.com; style-src 'self' 'unsafe-inline'</text>

  <!-- Directives table -->
  <text x="60" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">주요 CSP 지시어</text>

  <!-- directive rows -->
  <rect x="60" y="172" width="220" height="36" rx="4" fill="#0a100a" stroke="#333" stroke-width="1"/>
  <text x="170" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">default-src</text>
  <rect x="290" y="172" width="530" height="36" rx="4" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="306" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 리소스의 기본값. 각 지시어가 없을 때 폴백으로 사용</text>

  <rect x="60" y="212" width="220" height="36" rx="4" fill="#0a100a" stroke="#333" stroke-width="1"/>
  <text x="170" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">script-src</text>
  <rect x="290" y="212" width="530" height="36" rx="4" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="306" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JavaScript 로드 출처 제어. 'nonce-' 또는 'hash-' 사용 권장</text>

  <rect x="60" y="252" width="220" height="36" rx="4" fill="#0a100a" stroke="#333" stroke-width="1"/>
  <text x="170" y="276" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">connect-src</text>
  <rect x="290" y="252" width="530" height="36" rx="4" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="306" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">fetch, XHR, WebSocket 연결 대상 제어</text>

  <rect x="60" y="292" width="220" height="36" rx="4" fill="#0a100a" stroke="#333" stroke-width="1"/>
  <text x="170" y="316" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">frame-src</text>
  <rect x="290" y="292" width="530" height="36" rx="4" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="306" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">iframe 로드 출처 제어. 클릭재킹 방어에 활용</text>

  <rect x="60" y="332" width="220" height="36" rx="4" fill="#0a100a" stroke="#333" stroke-width="1"/>
  <text x="170" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">upgrade-insecure</text>
  <rect x="290" y="332" width="530" height="36" rx="4" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="306" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HTTP 리소스를 자동으로 HTTPS로 업그레이드</text>

  <!-- Report-only mode -->
  <rect x="60" y="386" width="760" height="76" rx="8" fill="#0a0a18" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Content-Security-Policy-Report-Only</text>
  <text x="440" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">차단 없이 위반 사항만 보고 — 프로덕션 배포 전 정책 테스트에 사용</text>
  <rect x="76" y="434" width="748" height="20" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" font-weight="600" xml:space="preserve">Content-Security-Policy-Report-Only: default-src 'self'; report-uri /csp-report</text>
</svg>
