<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Application의 두 가지 상태 축과 Sync Wave</text>

  <!-- Sync status -->
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Sync Status — Git과 같은가?</text>

  <rect x="60" y="104" width="360" height="64" rx="8" fill="#0f1a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">Synced</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클러스터 상태 = Git 렌더링 결과</text>

  <rect x="60" y="180" width="360" height="64" rx="8" fill="#1a0f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e05555">OutOfSync</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Git이 바뀌었거나, 누가 클러스터를 직접 변경 (드리프트)</text>

  <!-- Health status -->
  <text x="660" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Health Status — 잘 돌고 있는가?</text>

  <rect x="460" y="104" width="360" height="48" rx="8" fill="#0f1a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">Healthy</text>
  <text x="480" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모든 리소스 정상 (replicas 충족 등)</text>

  <rect x="460" y="160" width="360" height="48" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="480" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">Progressing</text>
  <text x="480" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">롤아웃 진행 중 — 기다리는 상태</text>

  <rect x="460" y="216" width="360" height="48" rx="8" fill="#1a0f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="480" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e05555">Degraded</text>
  <text x="480" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실패 상태 (CrashLoop, 프로브 실패 등)</text>

  <text x="240" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">두 축은 독립적 — "Synced인데 Degraded"가 가능</text>

  <!-- Sync waves -->
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Sync 순서 제어 — Hooks와 Wave</text>

  <rect x="60" y="350" width="170" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="145" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">PreSync</text>
  <text x="145" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DB 마이그레이션 Job</text>

  <line x1="230" y1="390" x2="270" y2="390" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="270" y="350" width="170" height="80" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="355" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Wave 0</text>
  <text x="355" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ConfigMap · Secret</text>

  <line x1="440" y1="390" x2="480" y2="390" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="480" y="350" width="170" height="80" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="565" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Wave 1</text>
  <text x="565" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Deployment · Service</text>

  <line x1="650" y1="390" x2="690" y2="390" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="690" y="350" width="130" height="80" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">PostSync</text>
  <text x="755" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스모크 테스트</text>

  <rect x="60" y="450" width="760" height="36" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="473" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" text-anchor="middle">annotation: argocd.argoproj.io/sync-wave: "1" · argocd.argoproj.io/hook: PreSync</text>
</svg>
