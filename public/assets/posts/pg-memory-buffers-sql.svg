<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Shared Buffers 활용도 모니터링 SQL</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">pg_buffercache · pg_statio_user_tables</text>

  <!-- Left -->
  <rect x="60" y="92" width="370" height="320" rx="12" fill="#0e1623" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">버퍼 캐시 히트율</text>
  <rect x="76" y="124" width="338" height="272" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="92" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 테이블별 캐시 히트율</text>
  <text x="92" y="166" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> relname,</text>
  <text x="92" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  heap_blks_read  AS disk_reads,</text>
  <text x="92" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  heap_blks_hit   AS cache_hits,</text>
  <text x="92" y="220" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  <tspan fill="#7ec8e3">ROUND</tspan>(</text>
  <text x="92" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    heap_blks_hit::numeric</text>
  <text x="92" y="256" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    / NULLIF(heap_blks_hit</text>
  <text x="92" y="274" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">      + heap_blks_read, <tspan fill="#b5cea8">0</tspan>)</text>
  <text x="92" y="292" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    * <tspan fill="#b5cea8">100</tspan>, <tspan fill="#b5cea8">1</tspan>) AS hit_pct</text>
  <text x="92" y="310" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  pg_statio_user_tables</text>
  <text x="92" y="328" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">WHERE</tspan> heap_blks_read > <tspan fill="#b5cea8">0</tspan></text>
  <text x="92" y="346" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ORDER BY</tspan> disk_reads <tspan fill="#7ec8e3">DESC</tspan>;</text>

  <!-- Right -->
  <rect x="450" y="92" width="370" height="320" rx="12" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">pg_buffercache 확장 활용</text>
  <rect x="466" y="124" width="338" height="272" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="482" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 확장 설치</text>
  <text x="482" y="166" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">CREATE EXTENSION</tspan> pg_buffercache;</text>

  <text x="482" y="194" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 버퍼 점유 상위 테이블</text>
  <text x="482" y="212" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> c.relname,</text>
  <text x="482" y="230" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  count(*) AS buffers,</text>
  <text x="482" y="248" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  pg_size_pretty(</text>
  <text x="482" y="266" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    count(*) * <tspan fill="#b5cea8">8192</tspan>) AS size</text>
  <text x="482" y="284" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  pg_buffercache b</text>
  <text x="482" y="302" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">JOIN</tspan>  pg_class c</text>
  <text x="482" y="320" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    <tspan fill="#7ec8e3">ON</tspan> b.relfilenode = c.relfilenode</text>
  <text x="482" y="338" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">GROUP BY</tspan> c.relname</text>
  <text x="482" y="356" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ORDER BY</tspan> buffers <tspan fill="#7ec8e3">DESC</tspan></text>
  <text x="482" y="374" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">LIMIT</tspan> <tspan fill="#b5cea8">10</tspan>;</text>
</svg>
