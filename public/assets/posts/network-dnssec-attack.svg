<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DNS 스푸핑 vs DNSSEC 방어</text>

  <!-- Left: without DNSSEC -->
  <text x="200" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">DNSSEC 없음 (취약)</text>

  <rect x="60" y="90" width="110" height="48" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="115" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Client</text>

  <rect x="220" y="90" width="110" height="48" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="275" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Resolver</text>
  <text x="275" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(검증 없음)</text>

  <!-- Attacker -->
  <rect x="150" y="190" width="110" height="48" rx="8" fill="#3a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="205" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">Attacker</text>
  <text x="205" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">위조 응답 주입</text>

  <line x1="180" y1="194" x2="250" y2="138" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <text x="190" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">위조 IP</text>

  <line x1="220" y1="114" x2="182" y2="114" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="201" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">피싱 사이트</text>

  <!-- Right: with DNSSEC -->
  <text x="650" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">DNSSEC 활성화 (안전)</text>

  <rect x="500" y="90" width="110" height="48" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="555" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Client</text>

  <rect x="660" y="90" width="130" height="48" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Resolver</text>
  <text x="725" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">(RRSIG 검증)</text>

  <!-- Attacker right -->
  <rect x="590" y="190" width="110" height="48" rx="8" fill="#3a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="645" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">Attacker</text>
  <text x="645" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">위조 응답 시도</text>

  <line x1="620" y1="194" x2="690" y2="138" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <!-- Blocked -->
  <rect x="670" y="158" width="72" height="26" rx="6" fill="#3a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="706" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">BLOCKED</text>

  <line x1="660" y1="114" x2="612" y2="114" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="636" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">정상 응답</text>

  <!-- Divider -->
  <line x1="440" y1="70" x2="440" y2="270" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- NSEC / NSEC3 section -->
  <text x="60" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">NSEC vs NSEC3 (존재하지 않는 레코드 증명)</text>

  <rect x="60" y="316" width="360" height="80" rx="8" fill="#0f0f1e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">NSEC</text>
  <text x="240" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이웃 레코드를 평문 체인으로 연결</text>
  <text x="240" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">단점: Zone Walking 가능 (레코드 목록 노출)</text>

  <rect x="460" y="316" width="360" height="80" rx="8" fill="#0f0f1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">NSEC3</text>
  <text x="640" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">레코드 이름을 해시한 체인</text>
  <text x="640" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Zone Walking 방지 (권장)</text>

  <!-- Code block -->
  <rect x="60" y="410" width="760" height="30" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="430" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">dig <tspan fill="#7ec8e3" font-weight="600">+dnssec</tspan> nonexistent.example.com A  <tspan fill="#9aa4b8">; NSEC/NSEC3 레코드로 부재 증명</tspan></text>
</svg>
