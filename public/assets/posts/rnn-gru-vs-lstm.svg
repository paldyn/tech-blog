<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">GRU vs LSTM 비교</text>

  <!-- Table header -->
  <rect x="60" y="70" width="760" height="44" rx="6" fill="#111" stroke="#333"/>
  <text x="160" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#888">항목</text>
  <text x="400" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">LSTM</text>
  <text x="640" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">GRU</text>

  <!-- Rows -->
  <!-- Row 1 -->
  <rect x="60" y="116" width="760" height="44" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="160" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">게이트 수</text>
  <text x="400" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">3개 (F/I/O)</text>
  <text x="640" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">2개 (Reset/Update)</text>

  <!-- Row 2 -->
  <rect x="60" y="162" width="760" height="44" rx="0" fill="#111" stroke="#3a4a6e"/>
  <text x="160" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">셀 상태</text>
  <text x="400" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">있음 (C_t + h_t)</text>
  <text x="640" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">없음 (h_t만)</text>

  <!-- Row 3 -->
  <rect x="60" y="208" width="760" height="44" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="160" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">파라미터 수</text>
  <text x="400" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">4 × (i+h) × h</text>
  <text x="640" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">3 × (i+h) × h  (25% ↓)</text>

  <!-- Row 4 -->
  <rect x="60" y="254" width="760" height="44" rx="0" fill="#111" stroke="#3a4a6e"/>
  <text x="160" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">학습 속도</text>
  <text x="400" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">느림</text>
  <text x="640" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">더 빠름</text>

  <!-- Row 5 -->
  <rect x="60" y="300" width="760" height="44" rx="0" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="160" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">장기 의존성</text>
  <text x="400" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">더 강함</text>
  <text x="640" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">비슷하거나 약간 약함</text>

  <!-- Dividers -->
  <line x1="280" y1="70" x2="280" y2="346" stroke="#333" stroke-width="1"/>
  <line x1="520" y1="70" x2="520" y2="346" stroke="#333" stroke-width="1"/>

  <!-- Recommendation -->
  <rect x="60" y="360" width="760" height="40" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실무 권장: 데이터·태스크 규모가 작으면 GRU, 복잡한 장기 의존성이 필요하면 LSTM (현재는 Transformer 우선)</text>
</svg>
