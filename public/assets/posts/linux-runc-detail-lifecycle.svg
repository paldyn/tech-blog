<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">runc 컨테이너 라이프사이클</text>

  <!-- State boxes -->
  <!-- created state -->
  <rect x="60" y="100" width="160" height="70" rx="8" fill="#12123a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">created</text>
  <text x="140" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">runc create</text>

  <!-- running state -->
  <rect x="300" y="100" width="160" height="70" rx="8" fill="#002010" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">running</text>
  <text x="380" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">runc start</text>

  <!-- paused state -->
  <rect x="540" y="100" width="160" height="70" rx="8" fill="#1a1a00" stroke="#e8c040" stroke-width="1.5"/>
  <text x="620" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c040">paused</text>
  <text x="620" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">runc pause</text>

  <!-- stopped state -->
  <rect x="300" y="260" width="160" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="380" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">stopped</text>
  <text x="380" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">runc kill SIGTERM</text>

  <!-- deleted state -->
  <rect x="60" y="260" width="160" height="70" rx="8" fill="#1a1a1a" stroke="#666" stroke-width="1.5"/>
  <text x="140" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">deleted</text>
  <text x="140" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">runc delete</text>

  <!-- Arrows -->
  <!-- created → running -->
  <line x1="220" y1="135" x2="300" y2="135"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- running → paused -->
  <line x1="460" y1="135" x2="540" y2="135"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- paused → running -->
  <line x1="540" y1="155" x2="460" y2="155"
        stroke="#e8c040" stroke-width="2" marker-end="url(#arr)"/>
  <text x="500" y="175" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">runc resume</text>

  <!-- running → stopped -->
  <line x1="380" y1="170" x2="380" y2="260"
        stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="406" y="218" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SIGTERM/SIGKILL</text>

  <!-- stopped → deleted -->
  <line x1="300" y1="295" x2="220" y2="295"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Command reference box -->
  <rect x="60" y="380" width="760" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">runc</text>
  <text x="130" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> create mycontainer   # 격리 환경만 생성 (프로세스 미시작)</text>
  <text x="76" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">runc</text>
  <text x="130" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> start  mycontainer   # 엔트리포인트 실행</text>
  <text x="76" y="444" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">runc</text>
  <text x="130" y="444" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> state  mycontainer   # 현재 상태 확인</text>

  <!-- runc state labels above arrows -->
  <text x="260" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">runc start</text>
</svg>
