<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a6ea8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">서브리소스 무결성(SRI) 동작 원리</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">CDN 파일 변조를 해시 검증으로 차단하는 메커니즘</text>

  <!-- Step 1: Developer -->
  <rect x="60" y="100" width="200" height="110" rx="8" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="160" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 개발자</text>
  <text x="160" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">원본 파일 해시 계산</text>
  <text x="160" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">sha384-abc123...</text>
  <text x="160" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">HTML에 integrity 속성 삽입</text>
  <text x="160" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">crossorigin="anonymous"</text>

  <!-- Arrow 1→2 -->
  <line x1="265" y1="155" x2="310" y2="155" stroke="#3a6ea8" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="287" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">배포</text>

  <!-- Step 2: CDN -->
  <rect x="315" y="100" width="200" height="110" rx="8" fill="#180d1a" stroke="#8a3aa8" stroke-width="1.5"/>
  <text x="415" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b07ad0" text-anchor="middle">② CDN 서버</text>
  <text x="415" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">jquery.min.js 호스팅</text>
  <text x="415" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">cdn.jsdelivr.net</text>

  <!-- CDN 침해 시나리오 표시 -->
  <rect x="315" y="185" width="200" height="26" rx="4" fill="#2d0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="415" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">⚠ 공격자가 파일 변조 가능</text>

  <!-- Arrow 2→3 -->
  <line x1="520" y1="155" x2="565" y2="155" stroke="#3a6ea8" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="542" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">요청</text>

  <!-- Step 3: Browser -->
  <rect x="570" y="100" width="250" height="110" rx="8" fill="#0f1820" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="695" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 브라우저</text>
  <text x="695" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">파일 다운로드 후 SHA-384 계산</text>
  <text x="695" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">계산값 vs integrity 속성값 비교</text>
  <text x="695" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">일치 → 실행 / 불일치 → 차단</text>

  <!-- Match OK -->
  <rect x="570" y="235" width="118" height="80" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="629" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">해시 일치</text>
  <text x="629" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">스크립트 실행</text>
  <text x="629" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">정상 동작</text>

  <!-- Match FAIL -->
  <rect x="702" y="235" width="118" height="80" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="761" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">해시 불일치</text>
  <text x="761" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">리소스 차단</text>
  <text x="761" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">오류 로그</text>

  <!-- Hash comparison arrow down -->
  <line x1="695" y1="215" x2="629" y2="233" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="695" y1="215" x2="761" y2="233" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Code example -->
  <rect x="60" y="345" width="760" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">&lt;!-- SRI 적용 예시 --&gt;</text>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">&lt;script</text>
  <text x="128" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff"> src=</text>
  <text x="168" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ce9178">"https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">  integrity</text>
  <text x="148" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">=</text>
  <text x="156" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ce9178">"sha384-MhTVubDeYVWZgJzNhqtk56QHkMeScaN6BQIV..."</text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">  crossorigin</text>
  <text x="162" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">=</text>
  <text x="170" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ce9178">"anonymous"</text>
  <text x="258" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">&gt;&lt;/script&gt;</text>
  <text x="76" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">crossorigin 없으면 CORS 오류로 해시 검증 불가</text>
</svg>
