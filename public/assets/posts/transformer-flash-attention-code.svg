<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">FlashAttention 사용법 &amp; 버전별 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">flash-attn 패키지 또는 PyTorch 2.0+ scaled_dot_product_attention</text>

  <!-- Left: Code -->
  <rect x="60" y="96" width="460" height="326" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># PyTorch 2.0+ 내장 FlashAttention</text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="130" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> torch.nn.functional </text>
  <text x="286" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">as</text>
  <text x="304" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> F</text>

  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">with</text>
  <text x="106" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> torch.backends.cuda.sdp_kernel(</text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    enable_flash=</tspan><tspan fill="#b5cea8">True</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    enable_math=</tspan><tspan fill="#b5cea8">False</tspan><tspan fill="#ffffff">):</tspan></text>

  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    out = F.scaled_dot_product_attention(</text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        query, key, value,</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        attn_mask=mask,</text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        dropout_p=</tspan><tspan fill="#b5cea8">0.0</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        is_causal=</tspan><tspan fill="#b5cea8">True</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># flash-attn 패키지 직접 사용</text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">from</tspan><tspan fill="#ffffff"> flash_attn </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> flash_attn_func</tspan></text>

  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">out = flash_attn_func(q, k, v, causal=</text>
  <text x="370" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">True</text>
  <text x="406" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># q,k,v shape: (batch, seqlen, nheads, headdim)</text>

  <!-- Right: Version comparison table -->
  <rect x="540" y="96" width="300" height="326" rx="10" fill="#111" stroke="#222"/>
  <text x="690" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">버전별 특징</text>

  <!-- FA v1 -->
  <rect x="558" y="132" width="264" height="80" rx="6" fill="#0a0a16" stroke="#1e1e40"/>
  <text x="574" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">FlashAttention v1 (2022)</text>
  <text x="574" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- IO-Aware 타일링 최초 제안</text>
  <text x="574" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 표준 대비 최대 7.6× 속도 향상</text>
  <text x="574" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- A100 대상 CUDA 커널</text>

  <!-- FA v2 -->
  <rect x="558" y="224" width="264" height="80" rx="6" fill="#0a0a16" stroke="#1e1e40"/>
  <text x="574" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">FlashAttention v2 (2023)</text>
  <text x="574" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 병렬화 개선, GQA 지원</text>
  <text x="574" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- v1 대비 2× 추가 향상</text>
  <text x="574" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- PyTorch 2.0 내장 통합</text>

  <!-- FA v3 -->
  <rect x="558" y="316" width="264" height="80" rx="6" fill="#0a0a16" stroke="#1e1e40"/>
  <text x="574" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">FlashAttention v3 (2024)</text>
  <text x="574" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- H100 Hopper 특화 최적화</text>
  <text x="574" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- TMA, warp 특화 파이프라인</text>
  <text x="574" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- FP8 지원, 최대 1.5-2× 향상</text>
</svg>
