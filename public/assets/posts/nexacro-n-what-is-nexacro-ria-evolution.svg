<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 490"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="490" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">RIA 기술의 진화와 Nexacro N의 탄생</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">Flash 시대부터 웹 표준 엔터프라이즈 프레임워크까지의 여정</text>

  <!--
    5 era boxes: each w=130, gap=18, left/right margin=79
    Era1: x=79~209, center=144
    Era2: x=227~357, center=292
    Era3: x=375~505, center=440
    Era4: x=523~653, center=588
    Era5: x=671~801, center=736   right-margin=880-801=79 ✓
  -->

  <!-- Era 1: Flash/Flex -->
  <rect x="79" y="100" width="130" height="95" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="144" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">Flash / Flex</text>
  <text x="144" y="143" text-anchor="middle" font-size="11" fill="#bbb">2000 – 2012</text>
  <text x="144" y="160" text-anchor="middle" font-size="10" fill="#777">플러그인 기반 RIA</text>
  <text x="144" y="177" text-anchor="middle" font-size="10" fill="#777">Adobe · MS 주도</text>

  <!-- Era 2: HTML5 전환기 -->
  <rect x="227" y="100" width="130" height="95" rx="6" fill="#0f1620" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="292" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">HTML5 전환</text>
  <text x="292" y="143" text-anchor="middle" font-size="11" fill="#bbb">2008 – 2013</text>
  <text x="292" y="160" text-anchor="middle" font-size="10" fill="#777">웹 표준화 물결</text>
  <text x="292" y="177" text-anchor="middle" font-size="10" fill="#777">플러그인 퇴출 시작</text>

  <!-- Era 3: Nexacro 14 -->
  <rect x="375" y="100" width="130" height="95" rx="6" fill="#13101a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">Nexacro 14</text>
  <text x="440" y="143" text-anchor="middle" font-size="11" fill="#bbb">2013 출시</text>
  <text x="440" y="160" text-anchor="middle" font-size="10" fill="#777">투비소프트 RIA</text>
  <text x="440" y="177" text-anchor="middle" font-size="10" fill="#777">엔터프라이즈 특화</text>

  <!-- Era 4: Nexacro Platform -->
  <rect x="523" y="100" width="130" height="95" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="588" y="124" text-anchor="middle" font-size="11" font-weight="600" fill="#55c555">Nexacro Platform</text>
  <text x="588" y="143" text-anchor="middle" font-size="11" fill="#bbb">2018 출시</text>
  <text x="588" y="160" text-anchor="middle" font-size="10" fill="#777">HTML5 네이티브</text>
  <text x="588" y="177" text-anchor="middle" font-size="10" fill="#777">플러그인 완전 제거</text>

  <!-- Era 5: Nexacro N -->
  <rect x="671" y="100" width="130" height="95" rx="6" fill="#1a150a" stroke="#f4a261" stroke-width="2"/>
  <text x="736" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#f4a261">Nexacro N</text>
  <text x="736" y="143" text-anchor="middle" font-size="11" fill="#bbb">2022 · V24</text>
  <text x="736" y="160" text-anchor="middle" font-size="10" fill="#bbb">최신 웹 표준</text>
  <text x="736" y="177" text-anchor="middle" font-size="10" fill="#bbb">ES6+ · TypeScript</text>

  <!-- Timeline line at y=230 -->
  <line x1="79" y1="230" x2="812" y2="230" stroke="#333" stroke-width="2"/>
  <polygon points="812,226 812,234 822,230" fill="#555"/>

  <!-- Connectors: box bottom y=195 to timeline y=224 -->
  <line x1="144" y1="195" x2="144" y2="224" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="292" y1="195" x2="292" y2="224" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="440" y1="195" x2="440" y2="224" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="588" y1="195" x2="588" y2="224" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="736" y1="195" x2="736" y2="224" stroke="#777" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Timeline nodes -->
  <circle cx="144" cy="230" r="7" fill="#e05555" stroke="#0a0a0a" stroke-width="2"/>
  <circle cx="292" cy="230" r="7" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <circle cx="440" cy="230" r="7" fill="#7777cc" stroke="#0a0a0a" stroke-width="2"/>
  <circle cx="588" cy="230" r="7" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <circle cx="736" cy="230" r="9" fill="#f4a261" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Year labels y=252 -->
  <text x="144" y="252" text-anchor="middle" font-size="11" fill="#e05555">2000s</text>
  <text x="292" y="252" text-anchor="middle" font-size="11" fill="#7ec8e3">2008</text>
  <text x="440" y="252" text-anchor="middle" font-size="11" fill="#7777cc">2013</text>
  <text x="588" y="252" text-anchor="middle" font-size="11" fill="#55c555">2018</text>
  <text x="736" y="252" text-anchor="middle" font-size="11" fill="#f4a261">2022+</text>

  <!-- Description groups -->
  <!-- Group 1: 플러그인 시대 (center of eras 1+2 = (144+292)/2=218) -->
  <text x="218" y="284" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">플러그인 의존 시대</text>
  <text x="218" y="302" text-anchor="middle" font-size="11" fill="#666">보안·업데이트·호환성 부담</text>

  <line x1="371" y1="277" x2="371" y2="311" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Group 2: 웹 표준 전환기 (center of era 3 = 440) -->
  <text x="440" y="284" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">웹 표준 전환기</text>
  <text x="440" y="302" text-anchor="middle" font-size="11" fill="#666">HTML5 · 플러그인 종말</text>

  <line x1="509" y1="277" x2="509" y2="311" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Group 3: Nexacro 시대 (center of eras 4+5 = (588+736)/2=662) -->
  <text x="662" y="284" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">Nexacro 엔터프라이즈</text>
  <text x="662" y="302" text-anchor="middle" font-size="11" fill="#666">표준 기반 · 생산성 특화</text>

  <!-- Insight box -->
  <rect x="80" y="328" width="720" height="60" rx="6" fill="#0d1117" stroke="#2a2a3a" stroke-width="1"/>
  <text x="440" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Nexacro N = 엔터프라이즈 UI × 웹 표준 × 개발 생산성</text>
  <text x="440" y="374" text-anchor="middle" font-size="12" fill="#888">Grid · Dataset · Transaction으로 복잡한 업무 화면을 빠르게 구현</text>

  <!-- Footer y=450, total=490, bottom margin=40 -->
  <text x="440" y="450" text-anchor="middle" font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈 #1</text>
</svg>
