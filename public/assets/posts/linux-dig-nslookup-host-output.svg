<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">dig 출력 해석</text>

  <!-- dig output box -->
  <rect x="60" y="68" width="760" height="260" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">; &lt;&lt;&gt;&gt; DiG 9.18 &lt;&lt;&gt;&gt; A google.com</text>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">;; QUESTION SECTION:</text>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">;google.com.                    IN      A</text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">;; ANSWER SECTION:</text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">google.com.</text><text x="160" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      300     IN    A     142.250.196.142</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">;; Query time: 12 msec</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">;; SERVER: 1.1.1.1#53(1.1.1.1) (UDP)</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">;; MSG SIZE  rcvd: 55</text>

  <!-- Annotation: TTL -->
  <line x1="178" y1="172" x2="178" y2="300" stroke="#b5cea8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="178" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">TTL(초)</text>
  <text x="178" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">캐시 유지 시간</text>

  <!-- Annotation: Class -->
  <line x1="280" y1="172" x2="280" y2="300" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="280" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">클래스</text>
  <text x="280" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">IN=Internet</text>

  <!-- Annotation: Type -->
  <line x1="370" y1="172" x2="370" y2="300" stroke="#55c555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="370" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">레코드 타입</text>

  <!-- Annotation: Value -->
  <line x1="580" y1="172" x2="580" y2="300" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="580" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">IPv4 주소</text>

  <!-- Useful dig options -->
  <text x="440" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">자주 쓰는 dig 옵션</text>

  <rect x="60" y="378" width="760" height="54" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">dig</text><text x="100" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> +short google.com</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">dig</text><text x="100" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> @8.8.8.8 google.com</text>
  <text x="340" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">dig</text><text x="364" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> +trace google.com</text>
  <text x="340" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">dig</text><text x="364" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> -x 8.8.8.8</text>
  <text x="620" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">dig</text><text x="644" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> +noall +answer google.com</text>
  <text x="620" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">dig</text><text x="644" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> MX gmail.com +short</text>
</svg>
