<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript Playground</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">설치 없이 브라우저에서 TypeScript 실험</text>

  <!-- Browser frame mockup -->
  <rect x="60" y="96" width="760" height="350" rx="10" fill="#111" stroke="#333" stroke-width="1.5"/>

  <!-- Browser bar -->
  <rect x="60" y="96" width="760" height="36" rx="10" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <rect x="60" y="116" width="760" height="16" fill="#1e1e1e"/>
  <circle cx="88" cy="114" r="6" fill="#e05555"/>
  <circle cx="108" cy="114" r="6" fill="#b5cea8"/>
  <circle cx="128" cy="114" r="6" fill="#55c555"/>
  <rect x="160" y="106" width="480" height="16" rx="8" fill="#2a2a2a"/>
  <text x="400" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">typescriptlang.org/play</text>

  <!-- Left panel: editor -->
  <rect x="68" y="138" width="370" height="300" rx="4" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="84" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">TypeScript 코드 입력</text>
  <line x1="68" y1="164" x2="438" y2="164" stroke="#222" stroke-width="1"/>

  <!-- Code in left panel -->
  <text x="84" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">interface</tspan><tspan fill="#ffffff"> User {</tspan></text>
  <text x="84" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="84" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  age: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="84" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">}</text>
  <text x="84" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> user: User = {</tspan></text>
  <text x="84" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  name: </tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="84" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">  age: </tspan><tspan fill="#b5cea8">30</tspan></text>
  <text x="84" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">};</text>
  <text x="84" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e05555">user.age = "thirty"; </tspan><tspan fill="#9aa4b8">// Error!</tspan></text>

  <!-- Error underline -->
  <line x1="84" y1="349" x2="210" y2="349" stroke="#e05555" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Right panel: output/errors -->
  <rect x="450" y="138" width="362" height="300" rx="4" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  <text x="466" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">오류 &amp; 컴파일 결과</text>
  <line x1="450" y1="164" x2="812" y2="164" stroke="#222" stroke-width="1"/>

  <!-- Error message -->
  <rect x="458" y="174" width="346" height="80" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="474" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">Type 'string' is not</text>
  <text x="474" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">assignable to type 'number'.</text>
  <text x="474" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">ts(2322) at line 10</text>

  <!-- JS output -->
  <text x="466" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">JavaScript 출력</text>
  <line x1="450" y1="290" x2="812" y2="290" stroke="#222" stroke-width="1"/>
  <text x="466" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// 타입 오류 시 출력 없음</text>
  <text x="466" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">// 오류 수정 후 출력 표시</text>

  <!-- Bottom note -->
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">URL 공유 기능으로 코드 스니펫을 동료와 즉시 공유 가능</text>
</svg>
