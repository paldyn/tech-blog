<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JSON → Dataset 수동 변환 함수</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">JSON.parse + clearData + addRow 패턴</text>

  <rect x="60" y="90" width="760" height="276" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="142" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> fn_jsonToDataset(ds, jsonStr) {</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    var</tspan><tspan fill="#e8e8e8"> arr;</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    try</tspan><tspan fill="#e8e8e8"> { arr = JSON.parse(jsonStr); }</tspan></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    catch</tspan><tspan fill="#e8e8e8"> (e) { trace(</tspan><tspan fill="#ce9178">"JSON parse error: "</tspan><tspan fill="#e8e8e8"> + e.message); </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#e8e8e8">; }</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    ds.clearData();</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    for</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">var</tspan><tspan fill="#e8e8e8"> i = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">; i &lt; arr.length; i++) {</tspan></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">        var</tspan><tspan fill="#e8e8e8"> nRow = ds.addRow();</tspan></text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">        var</tspan><tspan fill="#e8e8e8"> item = arr[i];</tspan></text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">        ds.setColumn(nRow, </tspan><tspan fill="#ce9178">"CODE"</tspan><tspan fill="#e8e8e8">, item.id);</tspan></text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">        ds.setColumn(nRow, </tspan><tspan fill="#ce9178">"AMT"</tspan><tspan fill="#e8e8e8">, item.amt);</tspan></text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    }</text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 사용: WebService 콜백에서 호출</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">fn_jsonToDataset(</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.dsMain, responseBody);</tspan></text>
</svg>
