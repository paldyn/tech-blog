<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a" rx="12">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="45" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">createSlice — 보일러플레이트 제거</text>

  <!-- VS label -->
  <text x="440" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#555" text-anchor="middle">VS</text>

  <!-- LEFT PANEL: Before -->
  <rect x="60" y="70" width="360" height="380" fill="#0a0a0a" stroke="#e05555" stroke-width="1.5" rx="8"/>
  <text x="240" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Before — 전통 Redux</text>

  <!-- Left code box -->
  <rect x="75" y="115" width="330" height="320" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="90" y="137" fill="#9aa4b8">// 3개 파일 필요</tspan>
    <tspan x="90" dy="19" fill="#9aa4b8">// actionTypes.js</tspan>
    <tspan x="90" dy="19" fill="#ffffff">const INCREMENT =</tspan>
    <tspan x="90" dy="19" fill="#ce9178">  'counter/increment'</tspan>
    <tspan x="90" dy="19" fill="#ffffff"> </tspan>
    <tspan x="90" dy="19" fill="#9aa4b8">// actions.js</tspan>
    <tspan x="90" dy="19" fill="#ffffff">const increment = () =&gt;</tspan>
    <tspan x="90" dy="19" fill="#ffffff">  ({ type: INCREMENT })</tspan>
    <tspan x="90" dy="19" fill="#ffffff"> </tspan>
    <tspan x="90" dy="19" fill="#9aa4b8">// reducer.js</tspan>
    <tspan x="90" dy="19" fill="#ffffff">function counterReducer(</tspan>
    <tspan x="90" dy="19" fill="#ffffff">  state = 0, action</tspan>
    <tspan x="90" dy="19" fill="#ffffff">) {</tspan>
    <tspan x="90" dy="19" fill="#ffffff">  switch(action.type) {</tspan>
    <tspan x="90" dy="19" fill="#7ec8e3" font-weight="600">    case INCREMENT:</tspan>
    <tspan x="90" dy="19" fill="#ffffff">      return state + 1</tspan>
    <tspan x="90" dy="19" fill="#ffffff">  }</tspan>
    <tspan x="90" dy="19" fill="#ffffff">}</tspan>
  </text>

  <!-- RIGHT PANEL: After -->
  <rect x="460" y="70" width="360" height="380" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="640" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">After — Redux Toolkit</text>

  <!-- Right code box -->
  <rect x="475" y="115" width="330" height="320" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="490" y="137" fill="#9aa4b8">// 1개 파일!</tspan>
    <tspan x="490" dy="19" fill="#ffffff">import { createSlice }</tspan>
    <tspan x="490" dy="19" fill="#ce9178">  from '@reduxjs/toolkit'</tspan>
    <tspan x="490" dy="19" fill="#ffffff"> </tspan>
    <tspan x="490" dy="19" fill="#ffffff">const counterSlice =</tspan>
    <tspan x="490" dy="19" fill="#ffffff">  createSlice({</tspan>
    <tspan x="490" dy="19" fill="#ffffff">  name: <tspan fill="#ce9178">'counter'</tspan>,</tspan>
    <tspan x="490" dy="19" fill="#ffffff">  initialState: <tspan fill="#b5cea8">0</tspan>,</tspan>
    <tspan x="490" dy="19" fill="#ffffff">  reducers: {</tspan>
    <tspan x="490" dy="19" fill="#ffffff">    increment: state =&gt;</tspan>
    <tspan x="490" dy="19" fill="#ffffff">      state + <tspan fill="#b5cea8">1</tspan>,</tspan>
    <tspan x="490" dy="19" fill="#ffffff">    decrement: state =&gt;</tspan>
    <tspan x="490" dy="19" fill="#ffffff">      state - <tspan fill="#b5cea8">1</tspan></tspan>
    <tspan x="490" dy="19" fill="#ffffff">  }</tspan>
    <tspan x="490" dy="19" fill="#ffffff">})</tspan>
  </text>
</svg>
