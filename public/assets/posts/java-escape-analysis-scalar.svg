<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">스칼라 치환 — 객체를 변수로 분해</text>

  <defs>
    <marker id="ea-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- before -->
  <text x="40" y="82" font-size="14" font-weight="600" fill="#e05555">원본 (힙 할당)</text>
  <rect x="40" y="94" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="58" y="122" fill="#ffffff">Point p = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> Point(x, y);</tspan><tspan x="58" y="148" fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> d2 = p.x*p.x + p.y*p.y;</tspan><tspan x="58" y="174" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> d2;</tspan><tspan x="58" y="212" fill="#9aa4b8">// Point 객체가 힙에 생성</tspan><tspan x="58" y="232" fill="#9aa4b8">// → GC 대상</tspan></text>

  <!-- after -->
  <text x="490" y="82" font-size="14" font-weight="600" fill="#55c555">스칼라 치환 후</text>
  <rect x="490" y="94" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="508" y="122" fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> px = x;   </tspan><tspan fill="#9aa4b8">// 필드를</tspan><tspan x="508" y="148" fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> py = y;   </tspan><tspan fill="#9aa4b8">// 지역변수로</tspan><tspan x="508" y="174" fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> d2 = px*px + py*py;</tspan><tspan x="508" y="212" fill="#9aa4b8">// 객체 할당 자체가 사라짐</tspan><tspan x="508" y="232" fill="#9aa4b8">// → GC 부담 0, 레지스터 활용</tspan></text>

  <line x1="404" y1="169" x2="486" y2="169" stroke="#55c555" stroke-width="2.5" marker-end="url(#ea-arr)"/>
</svg>
