<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Strict mode 적용 방법과 금지 규칙</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">어디에 선언하느냐에 따라 범위가 달라진다</text>

  <!-- Top section: 3 ways to activate -->
  <!-- Box 1: 파일 전체 (x=60, w=230) -->
  <rect x="60" y="104" width="230" height="140" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="175" y="128" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">파일 전체 적용</text>
  <rect x="76" y="140" width="198" height="82" fill="#070b14" rx="5" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">'use strict';</text>
  <text x="92" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="92" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 파일 첫 줄에 선언</text>
  <text x="92" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 전체 파일에 적용</text>

  <!-- Box 2: 함수 내 적용 (x=315, w=230) -->
  <rect x="315" y="104" width="230" height="140" fill="#0f1a24" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="430" y="128" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">함수 내 적용</text>
  <rect x="331" y="140" width="198" height="82" fill="#070b14" rx="5" stroke="#1e2433" stroke-width="1"/>
  <text x="347" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">function fn() {</text>
  <text x="347" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  'use strict';</text>
  <text x="347" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // 이 함수만 strict</text>
  <text x="347" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <!-- Box 3: 자동 적용 (x=570, w=250) -->
  <rect x="570" y="104" width="250" height="140" fill="#0f1624" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="695" y="128" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">자동 적용 환경</text>
  <text x="586" y="158" font-size="12" fill="#888">ES 모듈 (import/export)</text>
  <text x="586" y="178" font-size="12" fill="#888">클래스 본문 (class { })</text>
  <text x="586" y="198" font-size="12" fill="#888">Deno · Bun (기본 strict)</text>
  <text x="586" y="218" font-size="12" fill="#666">→ 별도 선언 없이 strict</text>

  <!-- Bottom section: rules table -->
  <rect x="60" y="264" width="760" height="210" fill="#0f1624" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="288" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Strict mode가 금지하는 것들</text>

  <!-- Table header -->
  <text x="88"  y="312" font-size="11" fill="#555">금지 항목</text>
  <text x="340" y="312" font-size="11" fill="#555">Sloppy 동작</text>
  <text x="570" y="312" font-size="11" fill="#555">Strict 동작</text>
  <line x1="78" y1="318" x2="812" y2="318" stroke="#1e2433" stroke-width="1"/>

  <!-- Rows (18px spacing from y=334) -->
  <text x="88"  y="334" font-size="12" fill="#e8e8e8">선언 없는 변수 할당</text>
  <text x="340" y="334" font-size="12" fill="#888">전역 변수 자동 생성</text>
  <text x="570" y="334" font-size="12" fill="#e05555">ReferenceError</text>

  <text x="88"  y="352" font-size="12" fill="#e8e8e8">함수 내 this</text>
  <text x="340" y="352" font-size="12" fill="#888">window / global</text>
  <text x="570" y="352" font-size="12" fill="#e05555">undefined</text>

  <text x="88"  y="370" font-size="12" fill="#e8e8e8">with 문</text>
  <text x="340" y="370" font-size="12" fill="#888">허용</text>
  <text x="570" y="370" font-size="12" fill="#e05555">SyntaxError</text>

  <text x="88"  y="388" font-size="12" fill="#e8e8e8">중복 매개변수</text>
  <text x="340" y="388" font-size="12" fill="#888">허용 (뒤 값이 덮음)</text>
  <text x="570" y="388" font-size="12" fill="#e05555">SyntaxError</text>

  <text x="88"  y="406" font-size="12" fill="#e8e8e8">delete 불가 대상 삭제</text>
  <text x="340" y="406" font-size="12" fill="#888">무시 (false 반환)</text>
  <text x="570" y="406" font-size="12" fill="#e05555">TypeError</text>

  <text x="88"  y="424" font-size="12" fill="#e8e8e8">8진수 리터럴 (0777)</text>
  <text x="340" y="424" font-size="12" fill="#888">허용</text>
  <text x="570" y="424" font-size="12" fill="#e05555">SyntaxError</text>

  <text x="88"  y="442" font-size="12" fill="#e8e8e8">arguments.callee</text>
  <text x="340" y="442" font-size="12" fill="#888">허용</text>
  <text x="570" y="442" font-size="12" fill="#e05555">TypeError</text>

  <!-- Footer -->
  <text x="60" y="492" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part I — Strict mode와 sloppy mode</text>
</svg>
