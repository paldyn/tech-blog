  <text x="550" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">중간 처리 결과</text>
  <text x="550" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
