<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CREATE TABLE 주요 옵션</text>

  <!-- 4 option boxes -->
  <rect x="60" y="70" width="180" height="260" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">IF NOT EXISTS</text>
  <line x1="75" y1="108" x2="225" y2="108" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">테이블이 이미</text>
  <text x="150" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">존재해도 에러</text>
  <text x="150" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">없이 넘어감</text>
  <text x="150" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">마이그레이션</text>
  <text x="150" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">스크립트에 유용</text>

  <rect x="260" y="70" width="180" height="260" rx="8" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="350" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">CREATE TABLE AS</text>
  <line x1="275" y1="108" x2="425" y2="108" stroke="#3a4a6e" stroke-width="1"/>
  <text x="350" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SELECT 결과로</text>
  <text x="350" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">새 테이블 생성</text>
  <text x="350" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(CTAS)</text>
  <text x="350" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">스냅샷/백업</text>
  <text x="350" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">임시 테이블 복사</text>
  <text x="350" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">제약조건 미복사</text>

  <rect x="460" y="70" width="180" height="260" rx="8" fill="#1a0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="550" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">TEMP TABLE</text>
  <line x1="475" y1="108" x2="625" y2="108" stroke="#3a4a6e" stroke-width="1"/>
  <text x="550" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">세션/트랜잭션</text>
  <text x="550" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
