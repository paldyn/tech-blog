  <text x="550" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">다른 세션 불가시</text>

  <rect x="660" y="70" width="160" height="260" rx="8" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="740" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">LIKE/INHERITS</text>
  <line x1="675" y1="108" x2="805" y2="108" stroke="#3a4a6e" stroke-width="1"/>
  <text x="740" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기존 테이블</text>
  <text x="740" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">구조 복사/상속</text>
  <text x="740" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">파티션 베이스</text>
  <text x="740" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">테이블 유사 복제</text>
  <text x="740" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PG 전용(INHERITS)</text>

  <!-- Bottom note -->
  <rect x="60" y="348" width="760" height="22" rx="4" fill="#0a0a10" stroke="#2a2a4a" stroke-width="1"/>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">UNLOGGED TABLE (PostgreSQL) — WAL 미기록으로 빠르지만 크래시 시 데이터 손실. 캐시/임시 테이블에 적합.</text>
</svg>
