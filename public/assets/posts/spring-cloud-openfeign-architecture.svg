<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Spring Cloud OpenFeign 아키텍처</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">선언형 HTTP 클라이언트 — 인터페이스만 정의하면 구현체는 Feign이 생성</text>

  <!-- Order Service 박스 (좌측) -->
  <rect x="60" y="100" width="200" height="70" rx="8" fill="#0f1a2e" stroke="#3a5a9e" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">Order Service</text>
  <text x="160" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">호출 측 마이크로서비스</text>

  <!-- @FeignClient 인터페이스 -->
  <rect x="60" y="210" width="200" height="80" rx="8" fill="#0a1a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">@FeignClient</text>
  <text x="160" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ProductClient 인터페이스</text>
  <text x="160" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">HTTP 메서드 매핑만 선언</text>

  <!-- Feign 런타임 프록시 -->
  <rect x="340" y="180" width="200" height="110" rx="8" fill="#1a1a0a" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="440" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8c84a">Feign 런타임 프록시</text>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인터페이스 → 구현체 자동 생성</text>
  <text x="440" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Encoder / Decoder</text>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">LoadBalancer / Retry</text>

  <!-- Product Service 박스 (우측) -->
  <rect x="620" y="100" width="200" height="70" rx="8" fill="#0f1a2e" stroke="#3a5a9e" stroke-width="1.5"/>
  <text x="720" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">Product Service</text>
  <text x="720" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">피호출 측 마이크로서비스</text>

  <!-- Eureka (서비스 디스커버리) -->
  <rect x="620" y="210" width="200" height="80" rx="8" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#c077cc">Eureka / LoadBalancer</text>
  <text x="720" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서비스 주소 자동 조회</text>
  <text x="720" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">spring-cloud-starter-netflix-eureka</text>

  <!-- 화살표들 -->
  <!-- Order Service → @FeignClient -->
  <line x1="160" y1="170" x2="160" y2="208" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="170" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">주입</text>

  <!-- @FeignClient → Feign Proxy -->
  <line x1="260" y1="250" x2="338" y2="235" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="284" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">구현 위임</text>

  <!-- Feign Proxy → Product Service (HTTP) -->
  <line x1="540" y1="215" x2="618" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="560" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">HTTP 요청</text>

  <!-- Feign Proxy ↔ Eureka -->
  <line x1="540" y1="250" x2="618" y2="250" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-gray)"/>
  <text x="553" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">주소 조회</text>

  <!-- Order Service → Feign Proxy (점선) -->
  <line x1="260" y1="135" x2="338" y2="200" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-gray)"/>

  <!-- 하단 처리 흐름 설명 -->
  <rect x="60" y="340" width="760" height="50" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="440" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">요청 처리 흐름</text>
  <text x="440" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메서드 호출 → Feign 인터셉트 → Encoder → LoadBalancer 주소 조회 → HTTP 실행 → Decoder → 반환</text>

  <!-- 특징 박스들 -->
  <rect x="60" y="410" width="170" height="90" rx="8" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="145" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">선언형</text>
  <text x="145" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인터페이스 + 어노테이션</text>
  <text x="145" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">구현 코드 불필요</text>
  <text x="145" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">RestTemplate 대비 간결</text>

  <rect x="250" y="410" width="170" height="90" rx="8" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="335" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">통합</text>
  <text x="335" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Eureka 자동 연동</text>
  <text x="335" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Ribbon/Spring LB</text>
  <text x="335" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Resilience4j 연동</text>

  <rect x="440" y="410" width="170" height="90" rx="8" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="525" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c84a">커스터마이징</text>
  <text x="525" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Encoder / Decoder</text>
  <text x="525" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RequestInterceptor</text>
  <text x="525" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">ErrorDecoder</text>

  <rect x="630" y="410" width="190" height="90" rx="8" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="725" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#c077cc">회복력</text>
  <text x="725" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Retry 자동 재시도</text>
  <text x="725" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Fallback 처리</text>
  <text x="725" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Circuit Breaker 통합</text>
</svg>
