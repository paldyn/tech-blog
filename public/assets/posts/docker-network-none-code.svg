<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">none 네트워크 실전 사용법</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">격리된 환경에서 컨테이너 실행하기</text>

  <!-- Left: basic usage -->
  <rect x="60" y="90" width="360" height="240" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="116" fill="#888" font-size="12" xml:space="preserve"># none 네트워크로 실행</text>
  <text x="80" y="134" fill="#7ec8e3" font-size="12" xml:space="preserve">docker run --rm \</text>
  <text x="80" y="152" fill="#7ec8e3" font-size="12" xml:space="preserve">  --network none \</text>
  <text x="80" y="170" fill="#7ec8e3" font-size="12" xml:space="preserve">  --name isolated \</text>
  <text x="80" y="188" fill="#7ec8e3" font-size="12" xml:space="preserve">  alpine sh</text>
  <line x1="80" y1="204" x2="400" y2="204" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="224" fill="#888" font-size="12" xml:space="preserve"># 컨테이너 내부 확인</text>
  <text x="80" y="242" fill="#e8e8e8" font-size="12" xml:space="preserve">ip addr show</text>
  <text x="80" y="260" fill="#888" font-size="12" xml:space="preserve"># 1: lo: &lt;LOOPBACK,UP&gt;</text>
  <text x="80" y="278" fill="#888" font-size="12" xml:space="preserve">#    inet 127.0.0.1/8</text>
  <text x="80" y="296" fill="#e05555" font-size="12" xml:space="preserve">ping 8.8.8.8</text>
  <text x="80" y="314" fill="#888" font-size="12" xml:space="preserve"># connect: Network unreachable</text>

  <!-- Right: Compose + custom plugin -->
  <rect x="460" y="90" width="360" height="240" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="480" y="116" fill="#888" font-size="12" xml:space="preserve"># Compose에서 none 사용</text>
  <text x="480" y="134" fill="#e8e8e8" font-size="12" xml:space="preserve">services:</text>
  <text x="480" y="152" fill="#e8e8e8" font-size="12" xml:space="preserve">  processor:</text>
  <text x="480" y="170" fill="#e8e8e8" font-size="12" xml:space="preserve">    image: my-processor</text>
  <text x="480" y="188" fill="#7ec8e3" font-size="12" xml:space="preserve">    network_mode: "none"</text>
  <text x="480" y="206" fill="#888" font-size="12" xml:space="preserve">    volumes:</text>
  <text x="480" y="224" fill="#888" font-size="12" xml:space="preserve">      - input:/data/in</text>
  <text x="480" y="242" fill="#888" font-size="12" xml:space="preserve">      - output:/data/out</text>
  <line x1="480" y1="258" x2="800" y2="258" stroke="#1e2433" stroke-width="1"/>
  <text x="480" y="278" fill="#888" font-size="12" xml:space="preserve"># 볼륨으로만 데이터 입출력</text>
  <text x="480" y="296" fill="#888" font-size="12" xml:space="preserve"># 외부 네트워크 일절 불가</text>
  <text x="480" y="314" fill="#55c555" font-size="12" xml:space="preserve"># 최대 격리 보안 처리에 적합</text>
</svg>
