<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">dmesg 출력 구조</text>

  <!-- Single log line anatomy -->
  <rect x="60" y="62" width="760" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="90" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">[  12.345678]</text>
  <text x="244" y="90" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> usb 1-1:</text>
  <text x="340" y="90" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> New USB device found, idVendor=0781</text>
  <text x="80" y="110" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  ↑ 부팅 후 경과 초                ↑ 드라이버/서브시스템     ↑ 메시지</text>

  <!-- Sections -->
  <text x="60" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">주요 조회 패턴</text>

  <rect x="60" y="168" width="760" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 사람이 읽기 쉬운 타임스탬프 (-T 옵션)</text>
  <text x="80" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">dmesg <tspan fill="#ffffff">-T</tspan>                      <tspan fill="#888"># 절대 시각 출력</tspan></text>

  <text x="80" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 오류·경고만 필터</text>
  <text x="80" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">dmesg <tspan fill="#ffffff">-l</tspan> <tspan fill="#ce9178">err,warn</tspan>            <tspan fill="#888"># level 필터</tspan></text>

  <text x="80" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 특정 서브시스템 필터</text>
  <text x="80" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">dmesg <tspan fill="#ffffff">-f</tspan> <tspan fill="#ce9178">kern</tspan>               <tspan fill="#888"># facility 필터</tspan></text>

  <text x="80" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 실시간 추적</text>
  <text x="80" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">dmesg <tspan fill="#ffffff">-w</tspan>                      <tspan fill="#888"># watch 모드</tspan></text>

  <text x="80" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">dmesg <tspan fill="#ffffff">-T</tspan> <tspan fill="#ffffff">-l</tspan> <tspan fill="#ce9178">err</tspan> <tspan fill="#ffffff">-w</tspan>          <tspan fill="#888"># 타임스탬프 + 오류 + 실시간</tspan></text>
</svg>
