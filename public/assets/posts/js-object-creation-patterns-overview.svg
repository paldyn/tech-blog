<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">객체 생성 패턴 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">리터럴 / 팩토리 / 생성자 / Object.create / class</text>

  <!-- Pattern 1: Object literal -->
  <rect x="60" y="90" width="360" height="100" rx="6" fill="#070b14" stroke="#888" stroke-width="1"/>
  <text x="80" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 1. 객체 리터럴 (단순, 1회성)</text>
  <text x="80" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="118" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> user = { name: </text>
  <text x="226" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'Alice'</text>
  <text x="274" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, age: </text>
  <text x="318" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">30</text>
  <text x="334" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> };</text>
  <text x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// prototype = Object.prototype (직접)</text>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 유형: 단순 DTO, 설정 객체, 1회용 맵</text>
  <text x="80" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 재사용 구조 없음</text>

  <!-- Pattern 2: Factory function -->
  <rect x="460" y="90" width="360" height="100" rx="6" fill="#070b14" stroke="#7ec8e3" stroke-width="1"/>
  <text x="480" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">// 2. 팩토리 함수 (클로저 private)</text>
  <text x="480" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="554" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> createUser(name) {</text>
  <text x="480" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  return</text>
  <text x="538" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> { name, greet() { </text>
  <text x="480" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    return</text>
  <text x="538" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve"> `Hi, ${name}`</text>
  <text x="636" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; } };</text>
  <text x="480" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// new 없이 사용, private 가능, instanceof 안 됨</text>

  <!-- Pattern 3: Constructor -->
  <rect x="60" y="210" width="360" height="110" rx="6" fill="#070b14" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" xml:space="preserve">// 3. 생성자 함수 (prototype 공유)</text>
  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="154" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> User(name) { </text>
  <text x="80" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  this</text>
  <text x="114" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">.name = name; }</text>
  <text x="80" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">User.prototype.greet = </text>
  <text x="80" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  function</text>
  <text x="152" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">() { </text>
  <text x="184" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">return</text>
  <text x="222" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve"> this</text>
  <text x="246" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">.name; };</text>
  <text x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// new User('Alice') / instanceof 사용 가능</text>

  <!-- Pattern 4: Object.create -->
  <rect x="460" y="210" width="360" height="110" rx="6" fill="#070b14" stroke="#e8a000" stroke-width="1"/>
  <text x="480" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a000" xml:space="preserve">// 4. Object.create (prototype 직접 지정)</text>
  <text x="480" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="518" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> userProto = {</text>
  <text x="480" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  greet() { </text>
  <text x="556" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">return</text>
  <text x="594" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve"> this</text>
  <text x="618" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">.name; },</text>
  <text x="480" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">};</text>
  <text x="480" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="518" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> alice = Object.create(userProto);</text>
  <text x="480" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// prototype 명시적 제어, 프로토타입 체인 직접 구성</text>

  <!-- Pattern 5: Class -->
  <rect x="60" y="340" width="760" height="100" rx="6" fill="#070b14" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// 5. class (현대 표준 — 내부는 prototype과 동일)</text>
  <text x="80" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">class</text>
  <text x="116" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> User {</text>
  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  #name; </text>
  <text x="160" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// private field (ES2022)</text>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  constructor(name) { </text>
  <text x="80" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    this</text>
  <text x="114" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">.#name = name; }  greet() { </text>
  <text x="114" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">return</text>
  <text x="290" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve"> this</text>
  <text x="320" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">.#name; }  </text>
  <text x="450" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="480" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 엄격 모드, extends/super, instanceof, 정적 필드</text>
  <text x="480" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 현재 권장 — 가장 표현력 있고 도구 지원 우수</text>

  <!-- Footer -->
  <text x="440" y="520" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
