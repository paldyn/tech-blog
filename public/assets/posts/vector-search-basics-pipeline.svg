<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">벡터 검색 파이프라인</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">문서 → 임베딩 → 벡터 DB ← 쿼리 → 결과</text>

  <!-- Step 1: 문서 -->
  <rect x="60" y="108" width="130" height="76" rx="8" fill="#1a1040" stroke="#7777cc" stroke-width="2"/>
  <text x="125" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">① 문서</text>
  <text x="125" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Documents</text>
  <text x="125" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">텍스트·PDF·HTML</text>

  <!-- Arrow 1→2 -->
  <line x1="192" y1="146" x2="228" y2="146" stroke="#555" stroke-width="2"/>
  <polygon points="228,139 246,146 228,153" fill="#555"/>

  <!-- Step 2: 임베딩 모델 -->
  <rect x="248" y="108" width="148" height="76" rx="8" fill="#0a1e28" stroke="#7ec8e3" stroke-width="2"/>
  <text x="322" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">② 임베딩 모델</text>
  <text x="322" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Embedding Model</text>
  <text x="322" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">고차원 벡터 변환</text>

  <!-- Arrow 2→3 -->
  <line x1="398" y1="146" x2="432" y2="146" stroke="#555" stroke-width="2"/>
  <polygon points="432,139 450,146 432,153" fill="#555"/>

  <!-- Step 3: 벡터 DB (taller, receives query too) -->
  <rect x="452" y="86" width="148" height="116" rx="8" fill="#0a1e0a" stroke="#55c555" stroke-width="2"/>
  <text x="526" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">③ 벡터 DB</text>
  <text x="526" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Vector Database</text>
  <text x="526" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[0.12, -0.87, 0.45…]</text>
  <text x="526" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HNSW 인덱스</text>
  <text x="526" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">ANN 탐색</text>

  <!-- Step 4: 쿼리 (from below) -->
  <rect x="452" y="278" width="148" height="64" rx="8" fill="#1e0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="526" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">④ 쿼리</text>
  <text x="526" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">사용자 검색 입력</text>

  <!-- Arrow query→db upward -->
  <line x1="526" y1="278" x2="526" y2="206" stroke="#e05555" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="519,210 526,202 533,210" fill="#e05555"/>
  <text x="548" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">임베딩 후 검색</text>

  <!-- Arrow 3→5 results -->
  <line x1="602" y1="146" x2="636" y2="146" stroke="#555" stroke-width="2"/>
  <polygon points="636,139 654,146 636,153" fill="#555"/>

  <!-- Step 5: 결과 -->
  <rect x="656" y="108" width="164" height="76" rx="8" fill="#1a1a1a" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="738" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">⑤ 결과</text>
  <text x="738" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Top-K Results</text>
  <text x="738" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유사도 순 정렬 반환</text>

  <!-- Step labels -->
  <text x="125" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">원본 데이터</text>
  <text x="322" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">수치 벡터 변환</text>
  <text x="738" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">유사도 순 정렬</text>

  <!-- Bottom note -->
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인덱싱(오프라인)과 쿼리(온라인) 두 단계로 구성된 시맨틱 검색 시스템</text>
</svg>
