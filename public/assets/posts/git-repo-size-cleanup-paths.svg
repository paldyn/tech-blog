<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="450" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">용량 정리의 두 가지 길</text>
  <text x="60" y="80" font-size="14" fill="#888">히스토리를 건드리지 않는 안전한 길과, 과거를 재작성하는 강력한 길</text>

  <defs>
    <marker id="arrD" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- decision -->
  <rect x="290" y="100" width="300" height="48" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="130" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">대용량 파일이 히스토리에 박혔나?</text>

  <line x1="290" y1="124" x2="200" y2="180" stroke="#888" stroke-width="2" marker-end="url(#arrD)"/>
  <text x="180" y="168" font-size="13" fill="#55c555">아니오</text>

  <line x1="590" y1="124" x2="680" y2="180" stroke="#888" stroke-width="2" marker-end="url(#arrD)"/>
  <text x="648" y="168" font-size="13" fill="#e05555">예</text>

  <!-- left path: safe -->
  <rect x="60" y="190" width="320" height="220" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="220" font-size="16" font-weight="600" fill="#55c555">안전한 최적화</text>
  <text x="80" y="244" font-size="13" fill="#888">히스토리 그대로, 압축만 다시</text>

  <rect x="80" y="258" width="280" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="96" y="282" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#9aa4b8"># 느슨한 객체를 묶고 정리</text>
  <text xml:space="preserve" x="96" y="304" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff">git <tspan fill="#7ec8e3" font-weight="600">gc</tspan> --aggressive</text>
  <text xml:space="preserve" x="96" y="328" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#9aa4b8"># 도달 불가 객체 즉시 삭제</text>
  <text xml:space="preserve" x="96" y="350" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff">git <tspan fill="#7ec8e3" font-weight="600">prune</tspan> --expire=now</text>
  <text xml:space="preserve" x="96" y="374" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#b5cea8">force-push 불필요</text>

  <!-- right path: rewrite -->
  <rect x="500" y="190" width="320" height="220" rx="10" fill="#11151c" stroke="#e05555" stroke-width="1.5"/>
  <text x="520" y="220" font-size="16" font-weight="600" fill="#e05555">히스토리 재작성</text>
  <text x="520" y="244" font-size="13" fill="#888">과거 blob 자체를 제거</text>

  <rect x="520" y="258" width="280" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="536" y="282" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#9aa4b8"># 특정 파일을 전 커밋에서</text>
  <text xml:space="preserve" x="536" y="304" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff">git filter-repo \</text>
  <text xml:space="preserve" x="536" y="326" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff">  --<tspan fill="#7ec8e3" font-weight="600">invert-paths</tspan> --path big.zip</text>
  <text xml:space="preserve" x="536" y="350" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#9aa4b8"># SHA 전부 바뀜</text>
  <text xml:space="preserve" x="536" y="374" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#e05555">force-push + 팀 재클론 필요</text>
</svg>
