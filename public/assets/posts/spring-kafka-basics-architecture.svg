  <text x="740" y="211" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Partition 1 담당</text>

  <!-- Consumer 3 -->
  <rect x="676" y="226" width="128" height="40" rx="6" fill="#061406" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Consumer 3</text>
  <text x="740" y="259" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Partition 2 담당</text>

  <!-- Key concepts bottom -->
  <rect x="60" y="298" width="760" height="170" rx="8" fill="#0d0d0d" stroke="#2a2a2a"/>
  <text x="440" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">핵심 개념</text>

  <!-- Concept 1 -->
  <rect x="80" y="330" width="186" height="118" rx="6" fill="#0d1f35" stroke="#3a4a6e" stroke-width="1"/>
  <text x="173" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Topic / Partition</text>
  <text x="173" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">메시지 분류 단위 / 병렬처리</text>
  <text x="173" y="386" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">순서는 파티션 내에서만 보장</text>
  <text x="173" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">키 기반 파티셔닝 가능</text>
  <text x="173" y="422" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">retention 기간 동안 보존</text>

  <!-- Concept 2 -->
  <rect x="280" y="330" width="186" height="118" rx="6" fill="#0a1f0a" stroke="#55c555" stroke-width="1"/>
  <text x="373" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Consumer Group</text>
  <text x="373" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">같은 group-id 끼리 파티션 분담</text>
  <text x="373" y="386" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컨슈머 수 ≤ 파티션 수</text>
  <text x="373" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">offset 커밋으로 처리 위치 추적</text>
  <text x="373" y="422" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">장애 시 리밸런싱 자동 수행</text>

  <!-- Concept 3 -->
  <rect x="480" y="330" width="186" height="118" rx="6" fill="#1a1208" stroke="#e0b755" stroke-width="1"/>
  <text x="573" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0b755">Offset 관리</text>
  <text x="573" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">자동 커밋 (기본 5초 주기)</text>
  <text x="573" y="386" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">수동 커밋 (처리 후 ack)</text>
  <text x="573" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AckMode: MANUAL_IMMEDIATE</text>
  <text x="573" y="422" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">중복/유실 여부 결정</text>

  <!-- Concept 4 -->
  <rect x="680" y="330" width="120" height="118" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">Dead Letter</text>
  <text x="740" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">처리 실패 메시지</text>
  <text x="740" y="386" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DLT 토픽으로 이동</text>
  <text x="740" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">재처리 / 모니터링</text>
  <text x="740" y="422" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">RetryTopicConfiguration</text>
</svg>
