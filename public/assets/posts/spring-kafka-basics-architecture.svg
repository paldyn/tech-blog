<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrB" viewBox="0 0 21 14" refX="19" refY="7" markerUnits="userSpaceOnUse" markerWidth="21" markerHeight="14" orient="auto">
      <polygon points="0,0 21,7 0,14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 21 14" refX="19" refY="7" markerUnits="userSpaceOnUse" markerWidth="21" markerHeight="14" orient="auto">
      <polygon points="0,0 21,7 0,14" fill="#55c555"/>
    </marker>
    <marker id="arrO" viewBox="0 0 21 14" refX="19" refY="7" markerUnits="userSpaceOnUse" markerWidth="21" markerHeight="14" orient="auto">
      <polygon points="0,0 21,7 0,14" fill="#ce9178"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Spring Kafka 기본 아키텍처</text>
  <text x="440" y="62" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Producer → Topic (Partition) → Consumer Group → Consumer</text>

  <!-- ====== Producer side ====== -->
  <rect x="60" y="84" width="160" height="60" rx="8" fill="#0d1f35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Producer</text>
  <text x="140" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">KafkaTemplate</text>

  <!-- Arrow Producer → Broker -->
  <line x1="220" y1="114" x2="258" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="239" y="107"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">send()</text>

  <!-- ====== Kafka Broker ====== -->
  <rect x="260" y="74" width="360" height="200" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="97" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Kafka Broker</text>
  <text x="440" y="113" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Topic: orders</text>

  <!-- Partition 0 -->
  <rect x="280" y="122" width="100" height="130" rx="6" fill="#141420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="330" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">Partition 0</text>
  <rect x="288" y="148" width="84" height="22" rx="3" fill="#0d1f35" stroke="#3a4a6e"/>
  <text x="330" y="163" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">offset 0</text>
  <rect x="288" y="174" width="84" height="22" rx="3" fill="#0d1f35" stroke="#3a4a6e"/>
  <text x="330" y="189" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">offset 1</text>
  <rect x="288" y="200" width="84" height="22" rx="3" fill="#0d1f35" stroke="#3a4a6e"/>
  <text x="330" y="215" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">offset 2</text>
  <text x="330" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#444">→ append only</text>

  <!-- Partition 1 -->
  <rect x="390" y="122" width="100" height="130" rx="6" fill="#141420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">Partition 1</text>
  <rect x="398" y="148" width="84" height="22" rx="3" fill="#0d1f35" stroke="#3a4a6e"/>
  <text x="440" y="163" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">offset 0</text>
  <rect x="398" y="174" width="84" height="22" rx="3" fill="#0d1f35" stroke="#3a4a6e"/>
  <text x="440" y="189" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">offset 1</text>
  <rect x="398" y="200" width="84" height="22" rx="3" fill="#0a1f0a" stroke="#55c555"/>
  <text x="440" y="215" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">offset 2 ← latest</text>
  <text x="440" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#444">→ 순서 보장</text>

  <!-- Partition 2 -->
  <rect x="500" y="122" width="100" height="130" rx="6" fill="#141420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="550" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">Partition 2</text>
  <rect x="508" y="148" width="84" height="22" rx="3" fill="#0d1f35" stroke="#3a4a6e"/>
  <text x="550" y="163" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">offset 0</text>
  <rect x="508" y="174" width="84" height="22" rx="3" fill="#0d1f35" stroke="#3a4a6e"/>
  <text x="550" y="189" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">offset 1</text>
  <rect x="508" y="200" width="84" height="22" rx="3" fill="#0d1f35" stroke="#3a4a6e"/>
  <text x="550" y="215" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">offset 2</text>
  <text x="550" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#444">→ 병렬처리</text>

  <!-- Arrow Broker → Consumer Group -->
  <line x1="620" y1="174" x2="658" y2="174" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="639" y="167"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
