  <text x="740" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">group-id: order-svc</text>

  <!-- Consumer 1 -->
  <rect x="676" y="130" width="128" height="40" rx="6" fill="#061406" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Consumer 1</text>
  <text x="740" y="163" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Partition 0 담당</text>

  <!-- Consumer 2 -->
  <rect x="676" y="178" width="128" height="40" rx="6" fill="#061406" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="196" text-anchor="middle"
