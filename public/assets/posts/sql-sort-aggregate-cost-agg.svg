<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">집계(Aggregate) 알고리즘 비교</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Sort Aggregate vs Hash Aggregate</text>

  <!-- Sort Agg -->
  <rect x="60" y="95" width="360" height="240" fill="#111" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Sort Aggregate</text>

  <text x="240" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">GROUP BY 키로 먼저 정렬 → 순차 집계</text>

  <rect x="80" y="158" width="320" height="84" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="96" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 인덱스가 GROUP BY와 일치 →</text>
  <text x="96" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- Sort 없이 바로 Aggregate</text>
  <text x="96" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="142" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> dept, </text>
  <text x="192" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">COUNT</text>
  <text x="234" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(*)  </text>
  <text x="96" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM</text>
  <text x="132" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> emp </text>
  <text x="162" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">GROUP BY</text>
  <text x="224" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> dept;</text>

  <text x="240" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">장점: 결과가 정렬됨, 스트리밍 가능</text>
  <text x="240" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단점: 정렬 비용 O(N log N) 선행</text>
  <text x="240" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">인덱스로 정렬 제거 시 최적</text>

  <!-- Hash Agg -->
  <rect x="460" y="95" width="360" height="240" fill="#111" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Hash Aggregate</text>

  <text x="640" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">GROUP BY 키 → 해시 테이블에 누적</text>

  <rect x="480" y="158" width="320" height="84" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="496" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 정렬 없이 해시로 집계</text>
  <text x="496" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- group count가 적을 때 효율</text>
  <text x="496" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">HashAgg: {dept → count}</text>
  <text x="496" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">→ 순차 I/O 한 번으로 완료</text>

  <text x="640" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">장점: 정렬 불필요 O(N)</text>
  <text x="640" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단점: 그룹 수가 많으면 해시 테이블 비대</text>
  <text x="640" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">그룹 수 적은 대용량 집계에 최적</text>

  <!-- Choices -->
  <rect x="60" y="355" width="760" height="45" fill="#0d1520" rx="6" stroke="#1e2433"/>
  <text x="440" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">CBO 선택 기준</text>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">GROUP BY 컬럼에 인덱스 있고 그룹 많음 → Sort Agg  |  그룹 적음·인덱스 없음 → Hash Agg</text>
</svg>
