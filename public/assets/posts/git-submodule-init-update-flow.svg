<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">서브모듈 init → update 흐름</text>

  <!-- Clone step -->
  <rect x="60" y="70" width="760" height="60" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">일반 clone (서브모듈 비어 있음)</text>
  <rect x="80" y="104" width="720" height="20" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git clone https://github.com/org/main-project.git</text>

  <!-- Arrow -->
  <line x1="440" y1="138" x2="440" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="506" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">libs/util/ 빈 디렉터리</text>

  <!-- init step -->
  <rect x="60" y="166" width="355" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="237" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">git submodule init</text>
  <text x="237" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">.gitmodules → .git/config 등록</text>
  <text x="237" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">URL·경로 정보 복사</text>

  <!-- update step -->
  <rect x="465" y="166" width="355" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="642" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">git submodule update</text>
  <text x="642" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">실제 파일 다운로드</text>
  <text x="642" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">포인터 커밋으로 체크아웃</text>

  <!-- Combined command -->
  <line x1="440" y1="254" x2="440" y2="278" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="60" y="282" width="760" height="70" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">한 번에: init + update</text>
  <rect x="80" y="318" width="720" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git submodule update </text>
  <text x="284" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">--init --recursive</text>

  <!-- Clone with recurse -->
  <line x1="440" y1="360" x2="440" y2="384" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="388" width="760" height="70" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">클론과 동시에 서브모듈 초기화</text>
  <rect x="80" y="424" width="720" height="24" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git clone </text>
  <text x="175" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">--recurse-submodules </text>
  <text x="392" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">https://github.com/org/main.git</text>

  <!-- Note -->
  <rect x="60" y="474" width="760" height="32" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">가장 권장되는 방법: clone 시 --recurse-submodules 플래그 사용</text>
</svg>
