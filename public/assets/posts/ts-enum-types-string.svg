  <text x="44" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" xml:space="preserve">문자열 enum은 디버깅 친화적 — 런타임에 의미 있는 값 유지</text>
