<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a" rx="12">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="44" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">문자열 열거형 (String Enum)</text>

  <!-- Code box -->
  <rect x="44" y="72" width="792" height="316" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <!-- Line 1 -->
  <text x="60" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">enum</tspan><tspan fill="#ffffff"> Color {</tspan></text>
  <!-- Line 2 -->
  <text x="60" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  Red = </tspan><tspan fill="#ce9178">"RED"</tspan><tspan fill="#ffffff">,</tspan></text>
  <!-- Line 3 -->
  <text x="60" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  Green = </tspan><tspan fill="#ce9178">"GREEN"</tspan><tspan fill="#ffffff">,</tspan></text>
  <!-- Line 4 -->
  <text x="60" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  Blue = </tspan><tspan fill="#ce9178">"BLUE"</tspan></text>
  <!-- Line 5 -->
  <text x="60" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <!-- blank line gap -->
  <!-- Line 7 -->
  <text x="60" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">enum</tspan><tspan fill="#ffffff"> LogLevel {</tspan></text>
  <!-- Line 8 -->
  <text x="60" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  Error = </tspan><tspan fill="#ce9178">"error"</tspan><tspan fill="#ffffff">,</tspan></text>
  <!-- Line 9 -->
  <text x="60" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  Warn = </tspan><tspan fill="#ce9178">"warn"</tspan><tspan fill="#ffffff">,</tspan></text>
  <!-- Line 10 -->
  <text x="60" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  Info = </tspan><tspan fill="#ce9178">"info"</tspan><tspan fill="#ffffff">,</tspan></text>
  <!-- Line 11 -->
  <text x="60" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  Debug = </tspan><tspan fill="#ce9178">"debug"</tspan></text>
  <!-- Line 12 -->
  <text x="60" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <!-- blank line gap -->
