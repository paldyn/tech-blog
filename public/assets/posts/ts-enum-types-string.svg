  <text x="60" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 사용 예</text>
  <!-- Line 15 -->
  <text x="60" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> log(level: LogLevel, msg: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">) {</tspan></text>
  <!-- Line 16 -->
  <text x="60" y="361" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  console.log(</tspan><tspan fill="#ce9178">`[${level}] ${msg}`</tspan><tspan fill="#ffffff">);</tspan></text>
  <!-- Line 17 -->
