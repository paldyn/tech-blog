<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Chain-of-Thought 프롬프팅 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Standard vs Chain-of-Thought 비교</text>

  <!-- Left column: Standard -->
  <text x="200" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Standard Prompting</text>

  <!-- Input box -->
  <rect x="60" y="118" width="280" height="56" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="200" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Q: 철수는 사과 3개, 배 2개를</text>
  <text x="200" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">가지고 있다. 총 몇 개인가?</text>

  <!-- Arrow down -->
  <line x1="200" y1="174" x2="200" y2="210" stroke="#444" stroke-width="2"/>
  <polygon points="200,218 194,206 206,206" fill="#444"/>

  <!-- LLM box -->
  <rect x="110" y="218" width="180" height="40" rx="8" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="200" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">LLM</text>

  <!-- Arrow down -->
  <line x1="200" y1="258" x2="200" y2="294" stroke="#444" stroke-width="2"/>
  <polygon points="200,302 194,290 206,290" fill="#444"/>

  <!-- Output box standard -->
  <rect x="110" y="302" width="180" height="40" rx="8" fill="#1a1a1a" stroke="#e05555"/>
  <text x="200" y="327" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">5개 (?)</text>

  <text x="200" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단순 출력 — 오류 가능성↑</text>

  <!-- Right column: CoT -->
  <text x="660" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Chain-of-Thought Prompting</text>

  <!-- Input box -->
  <rect x="520" y="118" width="280" height="56" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="660" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Q: … 총 몇 개인가?</text>
  <text x="660" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">→ "단계별로 생각해 봅시다."</text>

  <!-- Arrow down -->
  <line x1="660" y1="174" x2="660" y2="210" stroke="#444" stroke-width="2"/>
  <polygon points="660,218 654,206 666,206" fill="#444"/>

  <!-- LLM box -->
  <rect x="570" y="218" width="180" height="40" rx="8" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="660" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">LLM</text>

  <!-- Arrow down -->
  <line x1="660" y1="258" x2="660" y2="294" stroke="#444" stroke-width="2"/>
  <polygon points="660,302 654,290 666,290" fill="#444"/>

  <!-- Reasoning steps -->
  <rect x="520" y="302" width="280" height="110" rx="8" fill="#0d1117" stroke="#55c555"/>
  <text x="540" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추론 단계:</text>
  <text x="540" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">① 사과 3개</text>
  <text x="540" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">② 배 2개</text>
  <text x="540" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">③ 3 + 2 = 5</text>
  <text x="540" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">∴ 정답: 5개 ✓</text>

  <text x="660" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단계별 추론 — 정확도↑</text>

  <!-- Divider -->
  <line x1="440" y1="96" x2="440" y2="460" stroke="#222" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Bottom comparison -->
  <rect x="60" y="460" width="760" height="50" rx="8" fill="#111111" stroke="#1e2433"/>
  <text x="440" y="483" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">핵심: "Let's think step by step" 한 문장이 복잡한 추론 정확도를 평균 <tspan fill="#55c555">40~80%</tspan> 향상</text>
  <text x="440" y="501" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Wei et al. 2022 — GSM8K, SVAMP, AQuA, CSQA 등 다수 벤치마크에서 검증</text>
</svg>
