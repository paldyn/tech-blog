<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">macvlan 네트워크: MAC 주소 직접 할당</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">컨테이너가 물리 네트워크의 독립 장치처럼 동작</text>

  <!-- Physical network top -->
  <rect x="60" y="90" width="760" height="50" rx="8" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle" fill="#b5cea8" font-size="14" font-weight="600">물리 네트워크 스위치 (192.168.1.0/24)</text>

  <!-- Host physical NIC -->
  <rect x="300" y="168" width="280" height="50" rx="6" fill="#0a0a0a" stroke="#444"/>
  <text x="440" y="198" text-anchor="middle" fill="#e8e8e8" font-size="13">Host eth0 (192.168.1.10)</text>

  <!-- Promiscuous mode note -->
  <text x="440" y="232" text-anchor="middle" fill="#888" font-size="12">↑ Promiscuous 모드 활성화 필요</text>

  <!-- macvlan interfaces -->
  <rect x="80" y="256" width="180" height="60" rx="6" fill="#0d1b2a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="170" y="280" text-anchor="middle" fill="#b5cea8" font-size="12">macvlan0</text>
  <text x="170" y="298" text-anchor="middle" fill="#888" font-size="11">MAC: aa:bb:cc:01</text>

  <rect x="290" y="256" width="180" height="60" rx="6" fill="#0d1b2a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="380" y="280" text-anchor="middle" fill="#b5cea8" font-size="12">macvlan1</text>
  <text x="380" y="298" text-anchor="middle" fill="#888" font-size="11">MAC: aa:bb:cc:02</text>

  <rect x="500" y="256" width="180" height="60" rx="6" fill="#0d1b2a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="590" y="280" text-anchor="middle" fill="#b5cea8" font-size="12">macvlan2</text>
  <text x="590" y="298" text-anchor="middle" fill="#888" font-size="11">MAC: aa:bb:cc:03</text>

  <!-- Containers -->
  <rect x="80" y="348" width="180" height="80" rx="6" fill="#0d1320" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="372" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">Container A</text>
  <text x="170" y="392" text-anchor="middle" fill="#e8e8e8" font-size="12">192.168.1.100</text>
  <text x="170" y="410" text-anchor="middle" fill="#888" font-size="11">독립 MAC 주소</text>

  <rect x="290" y="348" width="180" height="80" rx="6" fill="#0d1320" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="372" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">Container B</text>
  <text x="380" y="392" text-anchor="middle" fill="#e8e8e8" font-size="12">192.168.1.101</text>
  <text x="380" y="410" text-anchor="middle" fill="#888" font-size="11">독립 MAC 주소</text>

  <rect x="500" y="348" width="180" height="80" rx="6" fill="#0d1320" stroke="#55c555" stroke-width="1.5"/>
  <text x="590" y="372" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">Container C</text>
  <text x="590" y="392" text-anchor="middle" fill="#e8e8e8" font-size="12">192.168.1.102</text>
  <text x="590" y="410" text-anchor="middle" fill="#888" font-size="11">독립 MAC 주소</text>

  <!-- lines -->
  <line x1="170" y1="316" x2="170" y2="348" stroke="#b5cea8" stroke-width="1.5"/>
  <line x1="380" y1="316" x2="380" y2="348" stroke="#b5cea8" stroke-width="1.5"/>
  <line x1="590" y1="316" x2="590" y2="348" stroke="#b5cea8" stroke-width="1.5"/>
  <line x1="170" y1="256" x2="380" y2="218" stroke="#b5cea8" stroke-width="1"/>
  <line x1="380" y1="256" x2="440" y2="218" stroke="#b5cea8" stroke-width="1"/>
  <line x1="590" y1="256" x2="500" y2="218" stroke="#b5cea8" stroke-width="1"/>
  <line x1="440" y1="140" x2="440" y2="168" stroke="#b5cea8" stroke-width="1.5"/>

  <!-- Note bottom -->
  <rect x="700" y="256" width="140" height="172" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="770" y="280" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600">주의</text>
  <text x="770" y="302" text-anchor="middle" fill="#e8e8e8" font-size="11">호스트 ↔</text>
  <text x="770" y="320" text-anchor="middle" fill="#e8e8e8" font-size="11">컨테이너 통신</text>
  <text x="770" y="338" text-anchor="middle" fill="#e05555" font-size="11">기본 불가!</text>
  <text x="770" y="360" text-anchor="middle" fill="#888" font-size="10">별도 macvlan</text>
  <text x="770" y="378" text-anchor="middle" fill="#888" font-size="10">인터페이스를</text>
  <text x="770" y="396" text-anchor="middle" fill="#888" font-size="10">호스트에 추가</text>
  <text x="770" y="414" text-anchor="middle" fill="#888" font-size="10">해야 통신 가능</text>
</svg>
