<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TypeScript ESLint 아키텍처</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">@typescript-eslint/parser + plugin 처리 흐름</text>

  <!-- Source -->
  <rect x="60" y="105" width="180" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">.ts / .tsx</text>
  <text x="150" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TypeScript 소스 파일</text>

  <!-- Arrow to Parser -->
  <line x1="240" y1="135" x2="290" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- @typescript-eslint/parser -->
  <rect x="295" y="105" width="200" height="60" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="395" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">@typescript-eslint/parser</text>
  <text x="395" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TSESTree(AST) + 타입 정보 생성</text>

  <!-- Arrow to TypeScript Compiler -->
  <line x1="395" y1="165" x2="395" y2="215" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="415" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">타입 조회</text>

  <!-- TypeScript Compiler -->
  <rect x="295" y="220" width="200" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="395" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">TypeScript Compiler</text>
  <text x="395" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Program + Type Checker</text>

  <!-- Arrow from parser to plugin -->
  <line x1="495" y1="135" x2="545" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- @typescript-eslint/eslint-plugin -->
  <rect x="550" y="105" width="270" height="60" rx="8" fill="#1f1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="685" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">@typescript-eslint/eslint-plugin</text>
  <text x="685" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타입 인식 규칙 100+개</text>

  <!-- Rules section -->
  <text x="60" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">주요 타입 인식 규칙</text>

  <!-- Rule boxes -->
  <rect x="60" y="330" width="230" height="56" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">no-floating-promises</text>
  <text x="175" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">미처리 Promise 감지</text>

  <rect x="310" y="330" width="230" height="56" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="425" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">no-unsafe-assignment</text>
  <text x="425" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">any 타입 전파 차단</text>

  <rect x="560" y="330" width="260" height="56" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="690" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">consistent-type-imports</text>
  <text x="690" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">import type 일관성 강제</text>

  <!-- Code block -->
  <rect x="60" y="415" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="437" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// eslint.config.js</text>
  <text x="76" y="457" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan> tseslint <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">'typescript-eslint'</tspan></text>
  <text x="76" y="477" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export default</tspan> tseslint.config(tseslint.configs.recommendedTypeChecked)</text>
  <text x="76" y="497" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// parserOptions.project 로 tsconfig.json 연결 필수</text>
</svg>
