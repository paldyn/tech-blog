<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">통계적 다중화 (Statistical Multiplexing)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">패킷 교환이 자원을 효율적으로 사용하는 원리</text>

  <!-- TDM (Circuit) on left -->
  <text x="200" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">TDM (회선 교환)</text>
  <text x="200" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시간 슬롯 고정 할당</text>

  <!-- Timeline for TDM -->
  <rect x="60" y="130" width="280" height="40" rx="4" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <!-- slots: A B C A B C ... -->
  <rect x="60" y="130" width="46" height="40" rx="0" fill="#1a2a35" stroke="#7ec8e3" stroke-width="1"/>
  <text x="83" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">A</text>
  <rect x="106" y="130" width="46" height="40" rx="0" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="129" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">B</text>
  <rect x="152" y="130" width="46" height="40" rx="0" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="175" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">C</text>
  <rect x="198" y="130" width="46" height="40" rx="0" fill="#1a2a35" stroke="#7ec8e3" stroke-width="1"/>
  <text x="221" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">A</text>
  <rect x="244" y="130" width="46" height="40" rx="0" fill="#2a2a1a" stroke="#888" stroke-width="1"/>
  <text x="267" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">B(빈)</text>
  <rect x="290" y="130" width="50" height="40" rx="0" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="315" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">C</text>

  <text x="200" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">B 슬롯: 데이터 없어도 낭비</text>

  <!-- Statistical Mux on right -->
  <text x="660" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">통계적 다중화 (패킷 교환)</text>
  <text x="660" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">필요할 때만 링크 사용</text>

  <!-- Timeline for statistical mux -->
  <rect x="520" y="130" width="280" height="40" rx="4" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="520" y="130" width="46" height="40" rx="0" fill="#1a2a35" stroke="#7ec8e3" stroke-width="1"/>
  <text x="543" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">A:p1</text>
  <rect x="566" y="130" width="46" height="40" rx="0" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="589" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">B:p1</text>
  <rect x="612" y="130" width="46" height="40" rx="0" fill="#1a2a35" stroke="#7ec8e3" stroke-width="1"/>
  <text x="635" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">A:p2</text>
  <rect x="658" y="130" width="46" height="40" rx="0" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="681" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">C:p1</text>
  <rect x="704" y="130" width="46" height="40" rx="0" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="727" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">B:p2</text>
  <rect x="750" y="130" width="50" height="40" rx="0" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="775" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">C:p2</text>

  <text x="660" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">빈 슬롯 없이 링크 최대 활용</text>

  <!-- Code block: store and forward -->
  <rect x="60" y="220" width="760" height="156" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">패킷 교환 핵심 동작: Store-and-Forward</text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 각 라우터에서의 처리</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">1. </text>
  <text x="100" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">패킷 전체 수신 (Store)</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">2. </text>
  <text x="100" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">IP 헤더 검사 및 CRC 오류 검증</text>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">3. </text>
  <text x="100" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">라우팅 테이블로 다음 홉 결정</text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">4. </text>
  <text x="100" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">출력 링크로 패킷 전달 (Forward)</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 전송 지연 = N_홉 × (패킷크기/대역폭)</text>
</svg>
