<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이벤트 위임 구현 패턴</text>

  <rect x="60" y="64" width="760" height="312" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// closest() 활용 — 중첩 구조에서도 안전</text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">document.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'#list'</tspan><tspan fill="#ffffff">).</tspan><tspan fill="#ffffff">addEventListener</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#ffffff">, e =&gt; {</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  const</tspan><tspan fill="#ffffff"> item = e.target.</tspan><tspan fill="#ffffff">closest</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'[data-id]'</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  if</tspan><tspan fill="#ffffff"> (!item) </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// 리스트 외부 클릭 무시</tspan></text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  console.</tspan><tspan fill="#ffffff">log</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'선택된 ID:'</tspan><tspan fill="#ffffff">, item.dataset.id);</tspan></text>
  <text x="84" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">});</tspan></text>

  <line x1="84" y1="198" x2="796" y2="198" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 다중 액션 위임 — data-action 패턴</text>
  <text x="84" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">document.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'#toolbar'</tspan><tspan fill="#ffffff">).</tspan><tspan fill="#ffffff">addEventListener</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#ffffff">, e =&gt; {</tspan></text>
  <text x="84" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  const</tspan><tspan fill="#ffffff"> btn = e.target.</tspan><tspan fill="#ffffff">closest</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'[data-action]'</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  const</tspan><tspan fill="#ffffff"> actions = { save, delete: del, export: exp };</tspan></text>
  <text x="84" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  actions[btn?.dataset.action]?.();</tspan></text>
  <text x="84" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">});</tspan></text>

  <line x1="84" y1="322" x2="796" y2="322" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 주의: stopPropagation() 사용 시 위임 이벤트 도달 불가</text>
  <text x="84" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// e.target.matches(selector) 로도 판별 가능 (중첩 주의)</text>
</svg>
