<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Java 변수 선언 구조</text>

  <!-- Vertical divider -->
  <line x1="450" y1="66" x2="450" y2="456" stroke="#1e2433" stroke-width="1"/>

  <!-- ═══════ LEFT: 선언 구조 ═══════ -->
  <text x="60" y="82" font-size="16" font-weight="600" fill="#e8e8e8">선언 구조</text>

  <!-- Code block -->
  <rect x="60" y="94" width="370" height="90" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">int</tspan><tspan fill="#e8e8e8"> count = </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#e8e8e8">;</tspan>
  </text>
  <text xml:space="preserve" x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">final</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">String</tspan><tspan fill="#e8e8e8"> msg = </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#e8e8e8">;</tspan>
  </text>
  <text xml:space="preserve" x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">var</tspan><tspan fill="#e8e8e8"> list = List.of(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">);</tspan>
  </text>

  <!-- Anatomy: 타입 -->
  <rect x="60" y="204" width="370" height="50" rx="6" fill="#0d1929"/>
  <rect x="60" y="204" width="4" height="50" rx="2" fill="#7ec8e3"/>
  <text x="76" y="224" font-size="13" font-weight="600" fill="#7ec8e3">타입</text>
  <text x="76" y="242" font-size="12" fill="#888">값의 종류·크기 결정 (int, double, String …)</text>
  <text x="422" y="228" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">int</text>

  <!-- Anatomy: 한정자 -->
  <rect x="60" y="262" width="370" height="50" rx="6" fill="#0d1929"/>
  <rect x="60" y="262" width="4" height="50" rx="2" fill="#7777cc"/>
  <text x="76" y="282" font-size="13" font-weight="600" fill="#7777cc">한정자 (선택)</text>
  <text x="76" y="300" font-size="12" fill="#888">final·static 등으로 변수 속성 제한</text>
  <text x="422" y="286" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">final</text>

  <!-- Anatomy: 변수명 -->
  <rect x="60" y="320" width="370" height="50" rx="6" fill="#0d1929"/>
  <rect x="60" y="320" width="4" height="50" rx="2" fill="#55c555"/>
  <text x="76" y="340" font-size="13" font-weight="600" fill="#55c555">변수명</text>
  <text x="76" y="358" font-size="12" fill="#888">lowerCamelCase 식별자, 예약어 사용 불가</text>
  <text x="422" y="344" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">count</text>

  <!-- Anatomy: 초기값 -->
  <rect x="60" y="378" width="370" height="50" rx="6" fill="#0d1929"/>
  <rect x="60" y="378" width="4" height="50" rx="2" fill="#b5cea8"/>
  <text x="76" y="398" font-size="13" font-weight="600" fill="#b5cea8">초기값 (선택)</text>
  <text x="76" y="416" font-size="12" fill="#888">= 뒤에 오는 리터럴·식·객체</text>
  <text x="422" y="402" text-anchor="end" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">42</text>

  <!-- ═══════ RIGHT: 변수 종류 ═══════ -->
  <text x="470" y="82" font-size="16" font-weight="600" fill="#e8e8e8">변수 종류</text>

  <!-- Card 1: 지역 변수 -->
  <rect x="470" y="94" width="350" height="80" rx="6" fill="#0d1929" stroke="#1e2433"/>
  <rect x="470" y="94" width="4" height="80" rx="2" fill="#55c555"/>
  <text x="486" y="118" font-size="14" font-weight="600" fill="#55c555">지역 변수 (Local Variable)</text>
  <text x="486" y="137" font-size="12" fill="#c8c8c8">메서드·블록 내 선언, 스택 저장</text>
  <text x="486" y="155" font-size="12" fill="#888">자동 초기화 없음 — 반드시 직접 초기화</text>

  <!-- Card 2: 인스턴스 필드 -->
  <rect x="470" y="182" width="350" height="80" rx="6" fill="#0d1929" stroke="#1e2433"/>
  <rect x="470" y="182" width="4" height="80" rx="2" fill="#7ec8e3"/>
  <text x="486" y="206" font-size="14" font-weight="600" fill="#7ec8e3">인스턴스 필드 (Instance Field)</text>
  <text x="486" y="225" font-size="12" fill="#c8c8c8">객체마다 독립 공간, 힙(Heap) 저장</text>
  <text x="486" y="243" font-size="12" fill="#888">기본값으로 자동 초기화 (int→0, ref→null)</text>

  <!-- Card 3: 정적 필드 -->
  <rect x="470" y="270" width="350" height="80" rx="6" fill="#0d1929" stroke="#1e2433"/>
  <rect x="470" y="270" width="4" height="80" rx="2" fill="#7777cc"/>
  <text x="486" y="294" font-size="14" font-weight="600" fill="#7777cc">정적 필드 (Static Field)</text>
  <text x="486" y="313" font-size="12" fill="#c8c8c8">static 키워드, 클래스당 하나</text>
  <text x="486" y="331" font-size="12" fill="#888">메서드 영역 저장, 모든 인스턴스 공유</text>

  <!-- Card 4: 매개변수 -->
  <rect x="470" y="358" width="350" height="80" rx="6" fill="#0d1929" stroke="#1e2433"/>
  <rect x="470" y="358" width="4" height="80" rx="2" fill="#e05555"/>
  <text x="486" y="382" font-size="14" font-weight="600" fill="#e05555">매개변수 (Parameter)</text>
  <text x="486" y="401" font-size="12" fill="#c8c8c8">메서드 호출 시 전달되는 지역 변수</text>
  <text x="486" y="419" font-size="12" fill="#888">기본형: 값 복사 / 참조형: 참조 복사</text>
</svg>
