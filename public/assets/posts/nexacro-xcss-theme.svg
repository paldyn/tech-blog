<svg width="880" height="440" viewBox="0 0 880 440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <defs>
    <style>
      .t-title { fill: #e8e8e8; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 22px; font-weight: 700; }
      .t-label { fill: #888; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 13px; }
      .t-box   { fill: #e8e8e8; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 14px; font-weight: 600; }
      .t-desc  { fill: #666; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 12px; }
      .t-code  { fill: #6ee7b7; font-family: "JetBrains Mono", monospace; font-size: 11px; }
      .t-win   { fill: #93c5fd; font-family: "JetBrains Mono", monospace; font-size: 11px; }
      .arrow-label { fill: #555; font-family: "Wanted Sans Variable", -apple-system, sans-serif; font-size: 11px; }
    </style>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#444"/>
    </marker>
  </defs>

  <text x="36" y="46" class="t-title">XCSS 스타일 우선순위 및 적용 계층</text>
  <text x="36" y="66" class="t-label">낮은 우선순위 → 높은 우선순위 순서로 덮어씀</text>

  <!-- Layer 1: Theme -->
  <rect x="36" y="88" width="192" height="260" rx="10" fill="#0f1117" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="36" y="88" width="192" height="36" rx="10" fill="#1e293b"/>
  <text x="52" y="112" class="t-box">① Theme (테마)</text>
  <text x="52" y="140" class="t-desc">전체 앱 기본 스타일</text>
  <text x="52" y="158" class="t-desc">skin 폴더의 XCSS 파일</text>
  <text x="52" y="185" class="t-code">Button {</text>
  <text x="52" y="200" class="t-code">  background: #1e3a5f;</text>
  <text x="52" y="215" class="t-code">  color: white;</text>
  <text x="52" y="230" class="t-code">}</text>
  <text x="52" y="256" class="t-desc">우선순위: 1 (최저)</text>
  <text x="52" y="274" class="t-desc">범위: 앱 전체</text>
  <text x="52" y="310" class="arrow-label">⟵ 기본값</text>

  <!-- Arrow 1→2 -->
  <line x1="228" y1="218" x2="264" y2="218" stroke="#333" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Layer 2: Form XCSS -->
  <rect x="268" y="88" width="192" height="260" rx="10" fill="#0f1117" stroke="#27272a" stroke-width="1.5"/>
  <rect x="268" y="88" width="192" height="36" rx="10" fill="#1c1c28"/>
  <text x="284" y="112" class="t-box">② Form XCSS</text>
  <text x="284" y="140" class="t-desc">화면 단위 스타일 파일</text>
  <text x="284" y="158" class="t-desc">*.xfdl 에 대응하는 xcss</text>
  <text x="284" y="185" class="t-code">.essential {</text>
  <text x="284" y="200" class="t-code">  background: #fffbe6;</text>
  <text x="284" y="215" class="t-code">  color: #1a1a1a;</text>
  <text x="284" y="230" class="t-code">}</text>
  <text x="284" y="256" class="t-desc">우선순위: 2</text>
  <text x="284" y="274" class="t-desc">범위: 해당 Form</text>

  <!-- Arrow 2→3 -->
  <line x1="460" y1="218" x2="496" y2="218" stroke="#333" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Layer 3: cssclass -->
  <rect x="500" y="88" width="192" height="260" rx="10" fill="#0f1117" stroke="#365314" stroke-width="1.5"/>
  <rect x="500" y="88" width="192" height="36" rx="10" fill="#1a2e0f"/>
  <text x="516" y="112" class="t-box">③ cssclass 속성</text>
  <text x="516" y="140" class="t-desc">컴포넌트 단위 클래스</text>
  <text x="516" y="158" class="t-desc">cssclass="essential"</text>
  <text x="516" y="185" class="t-code">Edit.essential {</text>
  <text x="516" y="200" class="t-code">  border: 1px solid</text>
  <text x="516" y="213" class="t-code">    #f59e0b;</text>
  <text x="516" y="228" class="t-code">}</text>
  <text x="516" y="256" class="t-desc">우선순위: 3</text>
  <text x="516" y="274" class="t-desc">범위: 해당 컴포넌트</text>

  <!-- Arrow 3→4 -->
  <line x1="692" y1="218" x2="728" y2="218" stroke="#333" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Layer 4: style prop -->
  <rect x="732" y="88" width="112" height="260" rx="10" fill="#0f1117" stroke="#4c1d2e" stroke-width="1.5"/>
  <rect x="732" y="88" width="112" height="36" rx="10" fill="#2a0f1a"/>
  <text x="746" y="105" class="t-box">④ style</text>
  <text x="746" y="120" class="t-box">속성(인라인)</text>
  <text x="746" y="148" class="t-desc">직접 지정</text>
  <text x="746" y="165" class="t-desc">스크립트에서</text>
  <text x="746" y="182" class="t-desc">동적 변경 가능</text>
  <text x="746" y="205" class="t-win">obj.style</text>
  <text x="746" y="220" class="t-win">  .background</text>
  <text x="746" y="235" class="t-win">  = "#ff0";</text>
  <text x="746" y="262" class="t-desc">우선순위: 4</text>
  <text x="746" y="278" class="t-desc">(최고)</text>

  <!-- Bottom notes -->
  <text x="36" y="374" class="t-desc">※ 동일 속성이 여러 계층에서 정의되면 높은 우선순위 값이 적용됩니다</text>
  <text x="36" y="394" class="t-desc">※ :hover, :focus, :disabled 등 의사 클래스(pseudo-class)도 XCSS에서 사용 가능합니다</text>
  <text x="36" y="414" class="t-desc">※ 테마 변경 시 Theme 계층만 교체하면 전체 앱 스타일이 한 번에 전환됩니다</text>
</svg>
