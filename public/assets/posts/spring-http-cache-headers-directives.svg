<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560">
  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Cache-Control 주요 지시자</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">응답 헤더 설정 방식과 각 지시자의 의미</text>

  <!-- max-age -->
  <rect x="60" y="88" width="760" height="60" rx="8" fill="#111" stroke="#2a3a2a" stroke-width="1"/>
  <rect x="60" y="88" width="220" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">max-age=3600</text>
  <text x="170" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">초 단위 신선도 유지 기간</text>
  <text x="500" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">응답 후 3600초(1시간) 동안 캐시 유효.</text>
  <text x="500" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">그 이후에는 재검증 요청(조건부 GET) 발생.</text>

  <!-- no-cache -->
  <rect x="60" y="162" width="760" height="60" rx="8" fill="#111" stroke="#2a2a3a" stroke-width="1"/>
  <rect x="60" y="162" width="220" height="60" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">no-cache</text>
  <text x="170" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">매번 서버 재검증</text>
  <text x="500" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">저장은 허용하나 사용 전 반드시 서버에서 재검증.</text>
  <text x="500" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ETag가 일치하면 304, 아니면 200+새 바디 수신.</text>

  <!-- no-store -->
  <rect x="60" y="236" width="760" height="60" rx="8" fill="#111" stroke="#3a2a2a" stroke-width="1"/>
  <rect x="60" y="236" width="220" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="170" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">no-store</text>
  <text x="170" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">캐시 저장 완전 금지</text>
  <text x="500" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">민감 데이터(개인정보, 결제 응답)에 사용.</text>
  <text x="500" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">어떤 캐시(브라우저·프록시)에도 저장하지 않음.</text>

  <!-- public / private -->
  <rect x="60" y="310" width="760" height="60" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="60" y="310" width="220" height="60" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">public / private</text>
  <text x="170" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">캐시 범위 지정</text>
  <text x="500" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">public: CDN·프록시 포함 모든 캐시 허용.</text>
  <text x="500" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">private: 브라우저 전용, 공유 캐시 저장 금지.</text>

  <!-- must-revalidate -->
  <rect x="60" y="384" width="760" height="60" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="60" y="384" width="220" height="60" rx="8" fill="#1a1a1a" stroke="#ce9178" stroke-width="1"/>
  <text x="170" y="409" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">must-revalidate</text>
  <text x="170" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">만료 후 반드시 재검증</text>
  <text x="500" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">max-age 만료 후 오프라인이면 504 반환.</text>
  <text x="500" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">오래된 캐시 제공(stale-while-revalidate) 방지.</text>

  <!-- Spring Code block -->
  <rect x="60" y="464" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="483" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Spring — ResponseEntity로 Cache-Control 헤더 설정</text>
  <text xml:space="preserve" x="76" y="500" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> ResponseEntity.ok()</tspan>
    <tspan x="76" dy="18">  .cacheControl(CacheControl.maxAge(1, TimeUnit.HOURS).cachePublic())</tspan>
    <tspan x="76" dy="18">  .body(data);</tspan>
  </text>
</svg>
