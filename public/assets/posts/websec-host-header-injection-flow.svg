<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09040"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Host 헤더 인젝션 공격 시나리오</text>

  <!-- Scenario labels -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">시나리오 1: 비밀번호 재설정 링크 탈취</text>

  <!-- Attacker -->
  <rect x="60" y="98" width="130" height="56" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="125" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">공격자</text>
  <text x="125" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Host 조작 요청</text>

  <!-- Arrow to server -->
  <line x1="190" y1="126" x2="318" y2="126" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Server -->
  <rect x="320" y="98" width="240" height="56" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">애플리케이션 서버</text>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Host 헤더로 링크 생성</text>

  <!-- Email arrow -->
  <line x1="560" y1="126" x2="688" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="624" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">이메일 발송</text>

  <!-- Victim -->
  <rect x="690" y="98" width="130" height="56" rx="8" fill="#100a0a" stroke="#e05555" stroke-width="1"/>
  <text x="755" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">피해자</text>
  <text x="755" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이메일 수신</text>

  <!-- Poisoned request code box -->
  <rect x="60" y="176" width="360" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">조작된 요청</text>
  <text x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">POST /reset-password</text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">Host: evil.attacker.com</text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">email: victim@example.com</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// Token link -> evil.attacker.com</text>

  <!-- Generated link box -->
  <rect x="460" y="176" width="360" height="100" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">피해자에게 발송된 이메일</text>
  <text x="476" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">비밀번호를 재설정하려면</text>
  <text x="476" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">아래 링크를 클릭하세요:</text>
  <text x="476" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">evil.attacker.com/reset?t=abc</text>
  <text x="476" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">→ 공격자 서버로 토큰 전달!</text>

  <!-- Scenario 2 -->
  <text x="60" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">시나리오 2: 캐시 포이즈닝 경유</text>

  <rect x="60" y="328" width="760" height="56" rx="8" fill="#1a1000" stroke="#e09040" stroke-width="1"/>
  <text x="440" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e09040">Host 조작 → 서버가 응답에 Host 값 반영 → 캐시 저장 → 전체 방문자 XSS</text>
  <text x="440" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">앞선 웹 캐시 포이즈닝과 결합하면 파급력이 극대화됨</text>

  <!-- Scenario 3: Open Redirect -->
  <text x="60" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">시나리오 3: SSRF / 내부망 접근</text>

  <rect x="60" y="432" width="360" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">GET / HTTP/1.1</text>
  <text x="76" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">Host: internal-db.corp:5432</text>
  <text x="76" y="488" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 가상호스트 설정 오류 시 내부망 접근</text>

  <rect x="460" y="432" width="360" height="60" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">위험</text>
  <text x="476" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">내부 서비스로 요청 라우팅 가능</text>
  <text x="476" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ SSRF, 정보 수집, 인증 우회</text>
</svg>
