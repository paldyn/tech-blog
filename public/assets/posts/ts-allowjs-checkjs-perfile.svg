<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">파일 단위로 뒤집기</text>
  <text x="60" y="76" font-size="14" fill="#888">전역 checkJs 설정을 파일 상단 주석으로 개별 재정의한다</text>

  <!-- checkJs:false + @ts-check -->
  <rect x="60" y="100" width="360" height="230" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="134" font-size="15" font-weight="600" fill="#55c555">전역 off → 파일만 켜기</text>
  <text x="84" y="158" font-size="13" fill="#888">checkJs: false 일 때</text>
  <rect x="84" y="176" width="312" height="138" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="100" y="202" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">// @ts-check</text>
  <text xml:space="preserve" x="100" y="226" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 이 .js 파일만 검사 켬</text>
  <text xml:space="preserve" x="100" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> add(a, b) {</text>
  <text xml:space="preserve" x="100" y="282" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> a + b;</text>
  <text xml:space="preserve" x="100" y="306" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">}</text>

  <!-- checkJs:true + @ts-nocheck -->
  <rect x="460" y="100" width="360" height="230" fill="#101418" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="484" y="134" font-size="15" font-weight="600" fill="#e05555">전역 on → 파일만 끄기</text>
  <text x="484" y="158" font-size="13" fill="#888">checkJs: true 일 때</text>
  <rect x="484" y="176" width="312" height="138" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="500" y="202" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">// @ts-nocheck</text>
  <text xml:space="preserve" x="500" y="226" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 이 파일만 검사 끔</text>
  <text xml:space="preserve" x="500" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 아직 못 고친 레거시</text>
  <text xml:space="preserve" x="500" y="290" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 한 줄만: @ts-ignore</text>
  <text xml:space="preserve" x="500" y="306" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 다음 줄: @ts-expect-error</text>
</svg>
