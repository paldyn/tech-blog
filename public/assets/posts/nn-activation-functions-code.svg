<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">활성화 함수 구현 및 선택 기준</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">PyTorch에서 활성화 함수 사용 방법과 실무 선택 가이드</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">import</tspan> torch</text>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">import</tspan> torch.nn <tspan fill="#7ec8e3">as</tspan> nn</text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">import</tspan> torch.nn.functional <tspan fill="#7ec8e3">as</tspan> F</text>

  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8"># 방법 1: 함수형 API</tspan></text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">x = torch.randn(<tspan fill="#b5cea8">4</tspan>, <tspan fill="#b5cea8">8</tspan>)</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">out = F.relu(x)</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">out = F.gelu(x)</text>

  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8"># 방법 2: 모듈 (Sequential용)</tspan></text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">model = nn.Sequential(</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    nn.Linear(<tspan fill="#b5cea8">8</tspan>, <tspan fill="#b5cea8">32</tspan>), nn.ReLU(),</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    nn.Linear(<tspan fill="#b5cea8">32</tspan>, <tspan fill="#b5cea8">1</tspan>), nn.Sigmoid()</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <!-- Selection guide -->
  <rect x="60" y="324" width="350" height="78" rx="8" fill="#0c1a0c" stroke="#55c555" stroke-width="1.5"/>
  <text x="235" y="346" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600" xml:space="preserve">실무 선택 가이드</text>
  <text x="235" y="364" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">은닉층 기본값: ReLU (빠르고 안정적)</text>
  <text x="235" y="382" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">트랜스포머: GELU (성능 우수)</text>
  <text x="235" y="400" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">이진분류 출력: Sigmoid</text>

  <rect x="470" y="324" width="350" height="78" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="645" y="346" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600" xml:space="preserve">Dying ReLU 문제</text>
  <text x="645" y="364" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">음수 입력 → 출력 0 → 기울기 0</text>
  <text x="645" y="382" text-anchor="middle" fill="#e8e8e8" font-size="12" xml:space="preserve">→ 뉴런이 영구적으로 비활성화</text>
  <text x="645" y="400" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">해결: Leaky ReLU / 낮은 lr / BN</text>

  <!-- Footer -->
</svg>
