<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Hello World 프로그램 구조</text>
  <text x="440" y="72" text-anchor="middle" font-size="14" fill="#888">Java 소스 파일의 기본 구성 요소</text>

  <!-- Code block background -->
  <rect x="60" y="92" width="480" height="234" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <!-- Code lines -->
  <text x="80" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// Hello.java</text>
  <text x="80" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">public</text>
  <text x="142" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> class</text>
  <text x="196" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> Hello {</text>
  <text x="94" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  public</text>
  <text x="148" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> static</text>
  <text x="204" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> void</text>
  <text x="240" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> main(String[] args) {</text>
  <text x="108" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    System.out.println(</text>
  <text x="108" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">        "Hello, World!"</text>
  <text x="108" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    );</text>
  <text x="94" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  }</text>
  <text x="80" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">}</text>
  <text x="80" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555">// Java 21 LTS: void main() {} 도 가능 (preview)</text>

  <!-- Annotations on the right -->
  <!-- class annotation -->
  <line x1="556" y1="134" x2="600" y2="134" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="600" y="118" width="220" height="32" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="710" y="136" text-anchor="middle" font-size="12" fill="#7ec8e3">클래스 선언 (파일명과 동일)</text>

  <!-- main method annotation -->
  <line x1="556" y1="152" x2="600" y2="176" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="600" y="162" width="220" height="32" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="710" y="180" text-anchor="middle" font-size="12" fill="#55c555">진입점 메서드 (entry point)</text>

  <!-- println annotation -->
  <line x1="556" y1="188" x2="600" y2="218" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="600" y="206" width="220" height="32" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="710" y="224" text-anchor="middle" font-size="12" fill="#ce9178">표준 출력 (stdout)</text>

  <!-- Compile & Run section -->
  <text x="440" y="370" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">컴파일 &amp; 실행</text>

  <!-- compile command -->
  <rect x="60" y="386" width="356" height="60" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">$ javac Hello.java</text>
  <text x="80" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">$ java Hello</text>
  <text x="80" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555"># 결과: Hello, World!</text>

  <!-- result box -->
  <rect x="464" y="386" width="356" height="60" fill="#071207" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="484" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Hello.java</text>
  <polygon points="560,416 576,410 576,406 592,416 576,426 576,422 560,422" fill="#7777cc" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>
  <text x="600" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Hello.class</text>
  <polygon points="672,416 688,410 688,406 704,416 688,426 688,422 672,422" fill="#7777cc" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>
  <text x="710" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">실행</text>

  <!-- Footer -->
  <text x="440" y="478" text-anchor="middle" font-size="11" fill="#444">Java 완전 정복 시리즈 — Part I. 언어의 본질과 역사 | PALDYN</text>
</svg>
