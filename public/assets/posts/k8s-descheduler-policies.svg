<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Descheduler 정책 플러그인</text>

  <!-- Plugin boxes -->
  <rect x="40" y="72" width="370" height="94" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="56" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">LowNodeUtilization</text>
  <text x="56" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">과부하 노드의 Pod를 여유 노드로 재배치</text>
  <text x="56" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">thresholds로 과부하/저부하 기준 설정</text>
  <text x="56" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">cpu/memory/pods 기준 동시 적용 가능</text>

  <rect x="470" y="72" width="370" height="94" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="486" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">RemoveDuplicates</text>
  <text x="486" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">같은 노드에 동일 ReplicaSet Pod가 2개 이상</text>
  <text x="486" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">있으면 하나를 축출해 분산시킴</text>
  <text x="486" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">podAntiAffinity 없을 때 유용</text>

  <rect x="40" y="186" width="370" height="94" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="56" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">RemovePodsViolatingNodeAffinity</text>
  <text x="56" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Node Affinity 조건이 더 이상 만족되지 않는</text>
  <text x="56" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Pod를 다시 스케줄하도록 축출</text>
  <text x="56" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">노드 레이블 변경 후 재배치에 유용</text>

  <rect x="470" y="186" width="370" height="94" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="486" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">RemovePodsViolatingTopologySpread</text>
  <text x="486" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">TopologySpreadConstraints 위반 Pod 축출</text>
  <text x="486" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">노드 추가/삭제 후 균형 회복에 활용</text>
  <text x="486" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TSC와 함께 사용 필수</text>

  <rect x="40" y="300" width="370" height="80" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="56" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">RemovePodsHavingTooManyRestarts</text>
  <text x="56" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">재시작 횟수가 임계값을 넘은 Pod 축출</text>
  <text x="56" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CrashLoopBackOff 해소 시도</text>

  <rect x="470" y="300" width="370" height="80" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="486" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">PodLifeTime</text>
  <text x="486" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">특정 시간 이상 실행 중인 Pod를 축출</text>
  <text x="486" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">개발 환경 임시 Pod 정리에 활용</text>

  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Descheduler는 CronJob 또는 Deployment로 실행 — PDB를 존중하며 축출</text>
</svg>
