<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="a2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">compose up / down — 생명주기</text>

  <!-- up section -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">compose up</text>

  <!-- up steps -->
  <rect x="60" y="100" width="120" height="52" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">네트워크</text>
  <text x="120" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">생성</text>
  <line x1="180" y1="126" x2="208" y2="126" stroke="#55c555" stroke-width="2" marker-end="url(#a1)"/>

  <rect x="210" y="100" width="120" height="52" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="270" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">볼륨</text>
  <text x="270" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">생성</text>
  <line x1="330" y1="126" x2="358" y2="126" stroke="#55c555" stroke-width="2" marker-end="url(#a1)"/>

  <rect x="360" y="100" width="120" height="52" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="420" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">이미지</text>
  <text x="420" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">pull / build</text>
  <line x1="480" y1="126" x2="508" y2="126" stroke="#55c555" stroke-width="2" marker-end="url(#a1)"/>

  <rect x="510" y="100" width="130" height="52" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="575" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">컨테이너</text>
  <text x="575" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">생성+시작</text>
  <line x1="640" y1="126" x2="668" y2="126" stroke="#55c555" stroke-width="2" marker-end="url(#a1)"/>

  <rect x="670" y="100" width="130" height="52" fill="#0a2a0a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="735" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Running</text>
  <text x="735" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">서비스 실행 중</text>

  <!-- Divider -->
  <line x1="60" y1="176" x2="820" y2="176" stroke="#2a2a3a" stroke-width="1"/>

  <!-- down section -->
  <text x="60" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">compose down</text>

  <!-- down steps -->
  <rect x="60" y="218" width="140" height="52" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="130" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">컨테이너 정지</text>
  <text x="130" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SIGTERM → SIGKILL</text>
  <line x1="200" y1="244" x2="228" y2="244" stroke="#e05555" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="230" y="218" width="140" height="52" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="300" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">컨테이너 삭제</text>
  <text x="300" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">--rmi 옵션</text>
  <line x1="370" y1="244" x2="398" y2="244" stroke="#e05555" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="400" y="218" width="140" height="52" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="470" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">네트워크 삭제</text>
  <text x="470" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">자동 정리</text>
  <line x1="540" y1="244" x2="568" y2="244" stroke="#e05555" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="570" y="218" width="160" height="52" fill="#2a0a0a" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">완전 중지</text>
  <text x="650" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">볼륨은 기본 유지</text>

  <!-- Divider -->
  <line x1="60" y1="294" x2="820" y2="294" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Key options -->
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">주요 옵션</text>

  <!-- up options -->
  <text x="60" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">up</text>
  <text x="100" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-d 백그라운드  ·  --build 빌드 강제  ·  --force-recreate 컨테이너 재생성  ·  --wait healthy 대기</text>
  <text x="100" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">--no-deps 의존 서비스 무시  ·  --scale web=3 스케일  ·  --remove-orphans 고아 제거</text>

  <!-- down options -->
  <text x="60" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">down</text>
  <text x="100" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-v 볼륨도 삭제  ·  --rmi all 이미지도 삭제  ·  --remove-orphans 고아 제거</text>
  <text x="100" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">--timeout 10 정지 대기 시간(초)  ·  기본 10초 후 SIGKILL</text>

  <!-- Note -->
  <text x="60" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">⚠  down -v 는 named volume도 삭제 — DB 데이터 영구 삭제 주의</text>
  <text x="60" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">   외부 선언 볼륨(external: true)은 down -v 대상에서 제외됨</text>
</svg>
