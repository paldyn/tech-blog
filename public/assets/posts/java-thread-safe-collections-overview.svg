<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">스레드 안전 컬렉션 분류</text>

  <!-- ConcurrentHashMap -->
  <rect x="60" y="66" width="220" height="100" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="170" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ConcurrentHashMap</text>
  <text x="80" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 세그먼트/버킷 분할 락</text>
  <text x="80" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• null key/value 불가</text>
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• read는 거의 무잠금</text>
  <text x="80" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">✓ 범용 맵에 권장</text>

  <!-- CopyOnWriteArrayList -->
  <rect x="310" y="66" width="220" height="100" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="420" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">CopyOnWriteArrayList</text>
  <text x="330" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 쓰기 시 배열 전체 복사</text>
  <text x="330" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 읽기 동기화 없음</text>
  <text x="330" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 쓰기 비용 큼</text>
  <text x="330" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">✓ 읽기 多 쓰기 少</text>

  <!-- ConcurrentLinkedQueue -->
  <rect x="560" y="66" width="260" height="100" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="690" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ConcurrentLinkedQueue</text>
  <text x="580" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• CAS 기반 무잠금 큐</text>
  <text x="580" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• size() 비싼 O(n)</text>
  <text x="580" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 비블로킹 FIFO</text>
  <text x="580" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">✓ 고속 메시지 전달</text>

  <!-- BlockingQueues -->
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">BlockingQueue 계열</text>

  <rect x="60" y="210" width="190" height="100" rx="8" fill="#1a1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="155" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">ArrayBlockingQueue</text>
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 고정 크기 배열</text>
  <text x="80" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 단일 락 공유</text>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 메모리 예측 가능</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 선택적 공정성</text>

  <rect x="270" y="210" width="190" height="100" rx="8" fill="#1a1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="365" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">LinkedBlockingQueue</text>
  <text x="290" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 동적 크기 (선택적 상한)</text>
  <text x="290" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• put/take 분리 락</text>
  <text x="290" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 처리량 높음</text>
  <text x="290" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">✓ 스레드 풀 기본</text>

  <rect x="480" y="210" width="160" height="100" rx="8" fill="#1a1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="560" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">SynchronousQueue</text>
  <text x="500" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 용량 0 (직접 전달)</text>
  <text x="500" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• put은 take 대기</text>
  <text x="500" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">✓ 핸드오프 패턴</text>

  <rect x="660" y="210" width="160" height="100" rx="8" fill="#1a1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="740" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">PriorityBlockingQueue</text>
  <text x="676" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 무한 크기(메모리 주의)</text>
  <text x="676" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">• 우선순위 힙</text>
  <text x="676" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">✓ 작업 스케줄링</text>

  <!-- BlockingQueue API -->
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">BlockingQueue 4가지 연산 방식</text>
  <rect x="60" y="360" width="760" height="132" rx="6" fill="#111111" stroke="#333" stroke-width="1"/>

  <!-- Header -->
  <text x="130" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">방식</text>
  <text x="310" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">예외 발생</text>
  <text x="460" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">특수값 반환</text>
  <text x="600" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">블로킹</text>
  <text x="740" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">타임아웃</text>

  <text x="130" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">삽입</text>
  <text x="310" y="404" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">add(e)</text>
  <text x="460" y="404" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">offer(e)</text>
  <text x="600" y="404" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">put(e)</text>
  <text x="740" y="404" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">offer(e,t,u)</text>

  <text x="130" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">제거</text>
  <text x="310" y="428" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">remove()</text>
  <text x="460" y="428" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">poll()</text>
  <text x="600" y="428" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">take()</text>
  <text x="740" y="428" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">poll(t,u)</text>

  <text x="130" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">조회</text>
  <text x="310" y="452" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">element()</text>
  <text x="460" y="452" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">peek()</text>
  <text x="600" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">해당없음</text>
  <text x="740" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">해당없음</text>

  <text x="130" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">공간 없으면 예외</text>
  <text x="460" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">false/null 반환</text>
  <text x="600" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">공간 생길 때까지 대기</text>
</svg>
