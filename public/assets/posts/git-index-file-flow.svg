<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Index를 통한 파일 상태 전환</text>

  <defs>
    <marker id="arr4" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr5" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr6" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Working Directory -->
  <rect x="60" y="90" width="200" height="80" rx="8" fill="#111111" stroke="#888" stroke-width="2"/>
  <text x="160" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">Working Dir</text>
  <text x="160" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">로컬 파일 시스템</text>

  <!-- Index -->
  <rect x="340" y="90" width="200" height="80" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="2.5"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Index</text>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.git/index</text>
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">스테이징 영역</text>

  <!-- Repository -->
  <rect x="620" y="90" width="200" height="80" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Repository</text>
  <text x="720" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.git/objects/</text>

  <!-- Arrow: git add -->
  <line x1="260" y1="120" x2="338" y2="120" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr4)"/>
  <text x="299" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">git add</text>

  <!-- Arrow: git commit -->
  <line x1="540" y1="120" x2="618" y2="120" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr5)"/>
  <text x="579" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">git commit</text>

  <!-- Reverse arrow: git checkout -->
  <path d="M 620 145 C 540 185 360 185 260 145" fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr6)"/>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">git checkout / git restore</text>

  <!-- git status legend -->
  <rect x="60" y="230" width="760" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="255" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># git status 비교 경로</text>
  <text xml:space="preserve" x="80" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Working Dir  vs  Index   </text><text xml:space="preserve" x="382" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">→ Changes not staged</text>
  <text xml:space="preserve" x="80" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Index        vs  HEAD    </text><text xml:space="preserve" x="382" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">→ Changes to be committed</text>
  <text xml:space="preserve" x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># index 직접 읽기 (plumbing)</text>
  <text xml:space="preserve" x="80" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git ls-files</text><text xml:space="preserve" x="178" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --stage</text>
  <text xml:space="preserve" x="80" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 출력: &lt;mode&gt; &lt;SHA&gt; &lt;stage&gt; &lt;path&gt;</text>
  <text xml:space="preserve" x="80" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">100644</text><text xml:space="preserve" x="136" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> abc123def456...  0  src/main.go</text>
</svg>
