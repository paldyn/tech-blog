<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Dataset 비어 있음 — 원인 진단 흐름</text>

  <!-- Step boxes with failure branch indicators -->
  <rect x="280" y="62" width="320" height="44" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="79" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">트랜잭션 errCode 확인</text>
  <text x="440" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">errCode != 0 이면 서버 에러 → 서버 로그 확인</text>

  <line x1="440" y1="106" x2="440" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="280" y="132" width="320" height="44" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Output Dataset 이름 확인</text>
  <text x="440" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">"dsOut=dsResult" 의 dsResult 이름 일치 여부</text>

  <!-- Mismatch branch -->
  <line x1="280" y1="154" x2="180" y2="154" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="228" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">불일치</text>
  <rect x="60" y="138" width="120" height="32" rx="4" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="120" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">이름 수정</text>

  <line x1="440" y1="176" x2="440" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="280" y="202" width="320" height="44" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">서버 응답 데이터 확인</text>
  <text x="440" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Network 탭에서 실제 XML/JSON 응답 행 수 확인</text>

  <!-- Server side empty branch -->
  <line x1="280" y1="224" x2="180" y2="224" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="228" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">응답 0건</text>
  <rect x="60" y="208" width="120" height="32" rx="4" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="120" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">서버 쿼리 확인</text>

  <line x1="440" y1="246" x2="440" y2="270" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="280" y="272" width="320" height="44" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Protocol 파싱 확인</text>
  <text x="440" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Adapter 응답 형식 (XML/JSON) 설정 일치 여부</text>

  <line x1="440" y1="316" x2="440" y2="340" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="280" y="342" width="320" height="44" rx="6" fill="#0d2b1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="359" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Dataset.loadXML 직접 테스트</text>
  <text x="440" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">하드코딩 XML로 로드 시 정상 → Protocol 문제 확인</text>

  <text x="440" y="408" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">단계별로 범위를 좁혀가면 원인을 빠르게 특정할 수 있다</text>
</svg>
