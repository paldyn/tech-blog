<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">로그인 실패 진단 흐름도</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">계정 잠금 · 쉘 오류 · PAM 설정 · SSH 문제</text>

  <!-- Start -->
  <rect x="340" y="88" width="200" height="44" rx="22" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="2"/>
  <text x="440" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">로그인 실패</text>

  <line x1="440" y1="132" x2="440" y2="158" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 1: 에러 메시지 확인 -->
  <rect x="310" y="158" width="260" height="44" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">에러 메시지 / 로그 확인</text>

  <!-- Branch left: "Authentication failure" -->
  <line x1="310" y1="180" x2="200" y2="240" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="195" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="end">인증 실패</text>

  <!-- Branch center: "permission denied" -->
  <line x1="440" y1="202" x2="440" y2="240" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Branch right: "Account locked" -->
  <line x1="570" y1="180" x2="680" y2="240" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="685" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">계정 잠금</text>

  <!-- Auth failure box -->
  <rect x="60" y="240" width="220" height="60" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1"/>
  <text x="170" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">비밀번호 문제</text>
  <text x="170" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">passwd username</text>
  <text x="170" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">또는 rescue로 재설정</text>

  <!-- Shell/config box -->
  <rect x="310" y="240" width="260" height="60" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">쉘/설정 문제</text>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">cat /etc/passwd | grep user</text>
  <text x="440" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쉘이 /sbin/nologin 인지 확인</text>

  <!-- Account locked box -->
  <rect x="600" y="240" width="220" height="60" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1"/>
  <text x="710" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">계정 잠금</text>
  <text x="710" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">pam_tally2 --reset</text>
  <text x="710" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">usermod -U username</text>

  <!-- Arrow to log check -->
  <line x1="440" y1="300" x2="440" y2="340" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Log check -->
  <rect x="310" y="340" width="260" height="60" rx="6" fill="#0d1a0d" stroke="#3a6a3a" stroke-width="1"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">로그 확인</text>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">journalctl -u sshd -n 50</text>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">/var/log/auth.log</text>

  <!-- Success -->
  <line x1="440" y1="400" x2="440" y2="430" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="320" y="430" width="240" height="44" rx="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="457" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">원인 파악 → 수정</text>

  <!-- SSH specific note -->
  <rect x="60" y="400" width="220" height="58" rx="6" fill="#1a1a0a" stroke="#5a5a2a" stroke-width="1"/>
  <text x="170" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8d030" text-anchor="middle">SSH 전용 확인</text>
  <text x="170" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PermitRootLogin no?</text>
  <text x="170" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">~/.ssh/authorized_keys 권한</text>
</svg>
