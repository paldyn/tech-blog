<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">compose.override.yml — 자동 병합</text>

  <!-- compose.yaml box -->
  <rect x="60" y="80" width="240" height="200" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">compose.yaml</text>
  <line x1="76" y1="112" x2="284" y2="112" stroke="#2a2a4e" stroke-width="1"/>
  <text x="76" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">api:</text>
  <text x="76" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  image: my-api:prod</text>
  <text x="76" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  environment:</text>
  <text x="76" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">    LOG_LEVEL: warn</text>
  <text x="76" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  restart: always</text>
  <text x="76" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">프로덕션 기준 설정</text>
  <text x="76" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">git에 커밋</text>

  <!-- Plus sign -->
  <text x="330" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#555" text-anchor="middle">+</text>

  <!-- override box -->
  <rect x="360" y="80" width="240" height="200" fill="#1a1400" rx="8" stroke="#e0a055" stroke-width="1.5"/>
  <text x="480" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a055" text-anchor="middle">compose.override.yaml</text>
  <line x1="376" y1="112" x2="584" y2="112" stroke="#3a3010" stroke-width="1"/>
  <text x="376" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">api:</text>
  <text x="376" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a055">  image: my-api:dev</text>
  <text x="376" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">  environment:</text>
  <text x="376" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a055">    LOG_LEVEL: debug</text>
  <text x="376" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a055">  volumes: [".:/app"]</text>
  <text x="376" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">로컬 개발 전용 재정의</text>
  <text x="376" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">.gitignore에 추가</text>

  <!-- Arrow → result -->
  <line x1="600" y1="180" x2="648" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#a1)"/>
  <text x="624" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">자동</text>

  <!-- result box -->
  <rect x="650" y="80" width="170" height="200" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="735" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">최종 설정</text>
  <line x1="666" y1="112" x2="804" y2="112" stroke="#0a2a0a" stroke-width="1"/>
  <text x="666" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">api:</text>
  <text x="666" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">  image: my-api:dev</text>
  <text x="666" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">  environment:</text>
  <text x="666" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">    LOG: debug</text>
  <text x="666" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">  volumes: .:/app</text>
  <text x="666" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">  restart: always</text>
  <text x="666" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">override 우선</text>
  <text x="666" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">없는 키는 유지</text>

  <!-- Divider -->
  <line x1="60" y1="302" x2="820" y2="302" stroke="#2a2a3a" stroke-width="1"/>

  <!-- File detection note -->
  <text x="60" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">자동 감지 파일 목록 (순서)</text>

  <rect x="60" y="344" width="340" height="80" fill="#1a1a1a" rx="6" stroke="#3a3a3a" stroke-width="1"/>
  <text x="76" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1.  compose.yaml       (우선순위 낮음)</text>
  <text x="76" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2.  compose.override.yaml</text>
  <text x="76" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a055">    (같은 디렉터리에 있으면 자동 병합)</text>

  <rect x="420" y="344" width="400" height="80" fill="#1a1a1a" rx="6" stroke="#3a3a3a" stroke-width="1"/>
  <text x="436" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">레거시 (구버전 호환)</text>
  <text x="436" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">docker-compose.yml</text>
  <text x="436" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">docker-compose.override.yml</text>
</svg>
