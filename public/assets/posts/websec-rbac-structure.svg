<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RBAC 구조 (Role-Based Access Control)</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">사용자 → 역할 → 권한 → 리소스</text>

  <!-- Users -->
  <rect x="60" y="100" width="120" height="40" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">Alice (User)</text>
  <rect x="60" y="160" width="120" height="40" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">Bob (User)</text>
  <rect x="60" y="220" width="120" height="40" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">Carol (User)</text>

  <!-- Roles -->
  <rect x="270" y="100" width="140" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="340" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">admin</text>
  <rect x="270" y="160" width="140" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="340" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">editor</text>
  <rect x="270" y="220" width="140" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="340" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">viewer</text>

  <!-- Permissions -->
  <rect x="500" y="88" width="150" height="36" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="575" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">posts:read,write,delete</text>
  <rect x="500" y="140" width="150" height="36" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="575" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">users:read,write,delete</text>
  <rect x="500" y="192" width="150" height="36" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="575" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">posts:read,write</text>
  <rect x="500" y="244" width="150" height="36" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="575" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">posts:read</text>

  <!-- Connections: Users to Roles -->
  <line x1="180" y1="120" x2="268" y2="120" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="180" y1="180" x2="268" y2="180" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="180" y1="120" x2="268" y2="240" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="180" y1="240" x2="268" y2="240" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Connections: Roles to Permissions -->
  <line x1="410" y1="106" x2="498" y2="106" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="410" y1="120" x2="498" y2="158" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="410" y1="180" x2="498" y2="210" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="410" y1="240" x2="498" y2="262" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Labels -->
  <text x="120" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자</text>
  <text x="340" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">역할</text>
  <text x="575" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">권한(Permission)</text>

  <!-- Comparison with DAC/MAC -->
  <rect x="60" y="310" width="760" height="140" rx="8" fill="#111" stroke="#3a4a3e" stroke-width="1"/>
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">접근 제어 모델 비교</text>
  <text x="180" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">DAC</text>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">RBAC</text>
  <text x="700" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">ABAC</text>
  <text x="180" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">소유자 기반 임의</text>
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">역할 기반 그룹화</text>
  <text x="700" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">속성 기반 동적</text>
  <text x="180" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단순, 조직 부적합</text>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">기업 표준, 감사 용이</text>
  <text x="700" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">복잡, 세밀한 제어</text>
  <text x="180" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Unix 파일 시스템</text>
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AWS IAM, 기업 앱</text>
  <text x="700" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시간/위치 기반</text>
</svg>
