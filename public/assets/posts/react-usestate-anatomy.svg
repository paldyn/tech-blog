<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">useState 해부</text>

  <!-- Main code box -->
  <rect x="60" y="64" width="760" height="90" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="76" y="78" width="728" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="16" xml:space="preserve">
    <tspan x="120" y="104" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [</tspan><tspan fill="#55c555">count</tspan><tspan fill="#ffffff">,  </tspan><tspan fill="#e05555">setCount</tspan><tspan fill="#ffffff">] = </tspan><tspan fill="#7777cc">useState</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
  </text>

  <!-- Annotations -->
  <!-- count annotation -->
  <line x1="222" y1="142" x2="222" y2="188" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrg)"/>
  <rect x="140" y="188" width="164" height="52" rx="6" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="222" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">현재 state 값</text>
  <text x="222" y="230" text-anchor="middle" font-size="12" fill="#888">읽기 전용 — JSX에서 사용</text>

  <!-- setCount annotation -->
  <line x1="390" y1="142" x2="390" y2="188" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <rect x="296" y="188" width="188" height="52" rx="6" fill="#2a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="390" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">setter 함수</text>
  <text x="390" y="230" text-anchor="middle" font-size="12" fill="#888">호출하면 리렌더 트리거</text>

  <!-- useState annotation -->
  <line x1="600" y1="142" x2="600" y2="188" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <rect x="500" y="188" width="200" height="52" rx="6" fill="#1e1b4b" stroke="#7777cc" stroke-width="1"/>
  <text x="600" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">useState Hook</text>
  <text x="600" y="230" text-anchor="middle" font-size="12" fill="#888">react에서 import 필요</text>

  <!-- initial value annotation -->
  <line x1="730" y1="142" x2="730" y2="188" stroke="#b5cea8" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <rect x="666" y="188" width="148" height="52" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="740" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#b5cea8">초기값</text>
  <text x="740" y="230" text-anchor="middle" font-size="12" fill="#888">첫 렌더에서만 사용</text>

  <!-- Common patterns -->
  <rect x="60" y="264" width="760" height="180" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="286" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">자주 쓰는 패턴</text>
  <rect x="76" y="298" width="728" height="134" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="318" fill="#9aa4b8">// 다양한 타입의 state</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [count, setCount]   = useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);          </tspan><tspan fill="#9aa4b8">// 숫자</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [name, setName]     = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);         </tspan><tspan fill="#9aa4b8">// 문자열</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [isOpen, setIsOpen] = useState(</tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff">);      </tspan><tspan fill="#9aa4b8">// 불리언</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [items, setItems]   = useState([]);           </tspan><tspan fill="#9aa4b8">// 배열</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [user, setUser]     = useState(</tspan><tspan fill="#b5cea8">null</tspan><tspan fill="#ffffff">);        </tspan><tspan fill="#9aa4b8">// null/객체</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [tab, setTab]       = useState(</tspan><tspan fill="#ce9178">'home'</tspan><tspan fill="#ffffff">);      </tspan><tspan fill="#9aa4b8">// 유니언 문자열</tspan>
  </text>
</svg>
