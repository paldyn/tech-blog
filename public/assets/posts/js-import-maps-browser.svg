  <text x="486" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">브라우저가 직접 URL로 변환</text>

  <!-- Scopes section -->
  <rect x="50" y="310" width="780" height="140" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="66" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">scopes — 특정 경로 하위에만 적용되는 매핑</text>

  <text x="66" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"scopes"</text><text x="150" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">: {</text>
  <text x="66" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  "/legacy/"</text><text x="186" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">: {</text>
