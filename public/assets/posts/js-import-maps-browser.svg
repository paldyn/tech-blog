  <!-- HTML script tag box -->
  <rect x="50" y="74" width="380" height="210" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="66" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">index.html</text>

  <text x="66" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;script type=<tspan fill="#ce9178">"importmap"</tspan>&gt;</text>
  <text x="66" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">{</text>
