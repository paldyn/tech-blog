<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">JPA 연관 관계 매핑 개요</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13">@ManyToOne · @OneToMany · @OneToOne · @ManyToMany 관계와 연관관계 주인</text>

  <!-- ManyToOne / OneToMany section -->
  <!-- Member entity -->
  <rect x="60" y="96" width="200" height="140" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="120" text-anchor="middle" fill="#7ec8e3" font-size="15" font-weight="700">Member</text>
  <line x1="80" y1="130" x2="240" y2="130" stroke="#1e2433"/>
  <text x="80" y="150" fill="#888" font-size="12">id: Long (PK)</text>
  <text x="80" y="168" fill="#888" font-size="12">name: String</text>
  <text x="80" y="186" fill="#55c555" font-size="12">orders: List&lt;Order&gt;</text>
  <text x="80" y="204" fill="#7ec8e3" font-size="11">@OneToMany</text>
  <text x="80" y="220" fill="#888" font-size="11">(mappedBy="member")</text>

  <!-- Arrow: Member 1 — N Order -->
  <text x="300" y="165" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">1</text>
  <line x1="320" y1="166" x2="380" y2="166" stroke="#e8b84b" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">N</text>

  <!-- Order entity -->
  <rect x="440" y="96" width="200" height="140" rx="8" fill="#0f1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="120" text-anchor="middle" fill="#55c555" font-size="15" font-weight="700">Order</text>
  <line x1="460" y1="130" x2="620" y2="130" stroke="#1e2433"/>
  <text x="460" y="150" fill="#888" font-size="12">id: Long (PK)</text>
  <text x="460" y="168" fill="#888" font-size="12">amount: int</text>
  <text x="460" y="186" fill="#55c555" font-size="12">member: Member</text>
  <text x="460" y="204" fill="#55c555" font-size="11">@ManyToOne (FK 주인)</text>
  <text x="460" y="220" fill="#888" font-size="11">@JoinColumn("member_id")</text>

  <!-- Label: 연관관계 주인 -->
  <rect x="440" y="248" width="200" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="270" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">연관관계 주인 (FK 보유)</text>

  <!-- OneToOne section -->
  <rect x="60" y="310" width="180" height="120" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="334" text-anchor="middle" fill="#7777cc" font-size="15" font-weight="700">User</text>
  <line x1="80" y1="344" x2="220" y2="344" stroke="#1e2433"/>
  <text x="80" y="364" fill="#888" font-size="12">id: Long</text>
  <text x="80" y="382" fill="#7777cc" font-size="12">profile: Profile</text>
  <text x="80" y="400" fill="#888" font-size="11">@OneToOne</text>
  <text x="80" y="416" fill="#888" font-size="11">(mappedBy="user")</text>

  <text x="268" y="378" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="700">1:1</text>
  <line x1="240" y1="372" x2="290" y2="372" stroke="#7777cc" stroke-width="2"/>

  <rect x="290" y="310" width="180" height="120" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="380" y="334" text-anchor="middle" fill="#7777cc" font-size="15" font-weight="700">Profile</text>
  <line x1="310" y1="344" x2="450" y2="344" stroke="#1e2433"/>
  <text x="310" y="364" fill="#888" font-size="12">id: Long</text>
  <text x="310" y="382" fill="#7777cc" font-size="12">user: User (FK)</text>
  <text x="310" y="400" fill="#7777cc" font-size="11">@OneToOne 주인</text>
  <text x="310" y="416" fill="#888" font-size="11">@JoinColumn("user_id")</text>

  <!-- ManyToMany section -->
  <rect x="500" y="310" width="160" height="120" rx="8" fill="#0f1520" stroke="#e05555" stroke-width="1.5"/>
  <text x="580" y="334" text-anchor="middle" fill="#e05555" font-size="15" font-weight="700">Student</text>
  <line x1="520" y1="344" x2="640" y2="344" stroke="#1e2433"/>
  <text x="520" y="364" fill="#888" font-size="12">id: Long</text>
  <text x="520" y="382" fill="#e05555" font-size="12">courses: List</text>
  <text x="520" y="400" fill="#888" font-size="11">@ManyToMany</text>
  <text x="520" y="416" fill="#888" font-size="11">⚠ 실무 비권장</text>

  <text x="688" y="376" text-anchor="middle" fill="#e8e8e8" font-size="16" font-weight="700">M:N</text>
  <line x1="660" y1="372" x2="710" y2="372" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>

  <rect x="710" y="310" width="130" height="120" rx="8" fill="#0f1520" stroke="#e05555" stroke-width="1.5"/>
  <text x="775" y="334" text-anchor="middle" fill="#e05555" font-size="14" font-weight="700">Course</text>
  <line x1="730" y1="344" x2="820" y2="344" stroke="#1e2433"/>
  <text x="730" y="364" fill="#888" font-size="12">id: Long</text>
  <text x="730" y="382" fill="#888" font-size="12">title: String</text>
  <text x="730" y="412" fill="#888" font-size="11">중간 테이블</text>
  <text x="730" y="428" fill="#888" font-size="11">자동 생성</text>

  <!-- Bottom: Key rules -->
  <rect x="60" y="454" width="760" height="46" rx="6" fill="#0f0f1a" stroke="#2a2a3a"/>
  <text x="80" y="474" fill="#7ec8e3" font-size="12" font-weight="600">핵심 규칙:</text>
  <text x="150" y="474" fill="#888" font-size="12">연관관계 주인 = FK를 보유한 쪽 · @ManyToOne 쪽이 항상 주인 · mappedBy는 주인이 아닌 쪽에 지정</text>
  <text x="80" y="492" fill="#888" font-size="12">@ManyToMany 직접 사용 금지 → 중간 엔티티로 분리 (@OneToMany + @ManyToOne)</text>
</svg>
