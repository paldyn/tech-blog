<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">FOR UPDATE 변형 모드 비교</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">락 강도 · 차단 범위 · 적합 시나리오</text>

  <!-- Table -->
  <rect x="60" y="96" width="760" height="260" rx="8" fill="#111" stroke="#3a4a6e"/>
  <!-- headers -->
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">모드</text>
  <text x="280" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">행 락 강도</text>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">차단 대상</text>
  <text x="700" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600" text-anchor="end">주요 용도</text>
  <line x1="80" y1="130" x2="800" y2="130" stroke="#3a4a6e"/>

  <!-- FOR KEY SHARE -->
  <text x="80" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">FOR KEY SHARE</text>
  <text x="280" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">가장 약함</text>
  <text x="440" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">FOR UPDATE만</text>
  <text x="700" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">FK 참조 무결성</text>
  <line x1="80" y1="166" x2="800" y2="166" stroke="#3a4a6e" stroke-dasharray="2,3"/>

  <!-- FOR SHARE -->
  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FOR SHARE</text>
  <text x="280" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">약함</text>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">FOR UPDATE, FOR NO KEY UPDATE</text>
  <text x="700" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">읽기 보호</text>
  <line x1="80" y1="202" x2="800" y2="202" stroke="#3a4a6e" stroke-dasharray="2,3"/>

  <!-- FOR NO KEY UPDATE -->
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">FOR NO KEY UPDATE</text>
  <text x="280" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">강함</text>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">FOR UPDATE, FOR SHARE 이상</text>
  <text x="700" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">비키컬럼 UPDATE</text>
  <line x1="80" y1="238" x2="800" y2="238" stroke="#3a4a6e" stroke-dasharray="2,3"/>

  <!-- FOR UPDATE -->
  <rect x="72" y="244" width="716" height="26" rx="3" fill="#1a0d0d"/>
  <text x="80" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">FOR UPDATE</text>
  <text x="280" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">가장 강함</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">모든 행 락 모드</text>
  <text x="700" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">삭제·키 변경 방지</text>
  <line x1="80" y1="272" x2="800" y2="272" stroke="#3a4a6e" stroke-dasharray="2,3"/>

  <!-- Modifiers -->
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">수식어</text>
  <text x="280" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">기본 (없음): 잠긴 행 대기</text>
  <text x="280" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">NOWAIT: 잠긴 행 만나면 즉시 오류</text>
  <text x="280" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">SKIP LOCKED: 잠긴 행 건너뜀 (결과 제외)</text>
</svg>
