<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">템플릿 상속: 공통 뼈대 + 빈칸</text>

  <defs>
    <marker id="jiar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="90" width="290" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="205" y="116" font-size="13" fill="#9aa4b8" text-anchor="middle">base.html (공통 뼈대)</text>
  <text x="76" y="146" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ce9178">&lt;header&gt;</tspan>로고<tspan fill="#ce9178">&lt;/header&gt;</tspan></text>
  <text x="76" y="174" font-size="13" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">{% block content %}</text>
  <text x="76" y="198" font-size="13" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  (페이지마다 채울 빈칸)</text>
  <text x="76" y="222" font-size="13" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">{% endblock %}</text>

  <line x1="350" y1="170" x2="426" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jiar)"/>
  <text x="388" y="153" font-size="11" fill="#9aa4b8" text-anchor="middle">extends</text>

  <rect x="430" y="90" width="390" height="160" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="625" y="116" font-size="13" fill="#55c555" text-anchor="middle">page.html (자식)</text>
  <text x="446" y="146" font-size="13" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">{% extends "base.html" %}</text>
  <text x="446" y="174" font-size="13" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">{% block content %}</text>
  <text x="446" y="198" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  <tspan fill="#ce9178">&lt;h1&gt;</tspan>이 페이지만의 내용<tspan fill="#ce9178">&lt;/h1&gt;</tspan></text>
  <text x="446" y="222" font-size="13" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">{% endblock %}</text>

  <rect x="60" y="262" width="760" height="30" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="282" font-size="13" fill="#55c555" text-anchor="middle">헤더·푸터는 base에 한 번만, 페이지는 block만 채운다 — 중복이 사라진다</text>
</svg>
