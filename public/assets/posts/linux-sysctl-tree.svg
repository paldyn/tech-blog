<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">sysctl 파라미터 계층 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">/proc/sys 의 주요 네임스페이스</text>

  <!-- Root -->
  <rect x="360" y="90" width="160" height="44" rx="6" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="440" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">/proc/sys</text>

  <!-- branches -->
  <line x1="440" y1="134" x2="130" y2="180" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="134" x2="290" y2="180" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="134" x2="440" y2="180" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="134" x2="590" y2="180" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="134" x2="750" y2="180" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- kernel -->
  <rect x="60" y="180" width="140" height="44" rx="6" fill="#1a1a2a" stroke="#5a5a9a" stroke-width="1"/>
  <text x="130" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">kernel</text>

  <!-- vm -->
  <rect x="220" y="180" width="140" height="44" rx="6" fill="#1a2a1a" stroke="#3a6a3a" stroke-width="1"/>
  <text x="290" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">vm</text>

  <!-- net -->
  <rect x="370" y="180" width="140" height="44" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">net</text>

  <!-- fs -->
  <rect x="520" y="180" width="140" height="44" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1"/>
  <text x="590" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">fs</text>

  <!-- dev -->
  <rect x="680" y="180" width="140" height="44" rx="6" fill="#1a2a2a" stroke="#3a6a6a" stroke-width="1"/>
  <text x="750" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">dev</text>

  <!-- kernel sub-items -->
  <line x1="130" y1="224" x2="130" y2="258" stroke="#5a5a9a" stroke-width="1"/>
  <rect x="60" y="258" width="140" height="36" rx="4" fill="#111" stroke="#3a3a5a" stroke-width="1"/>
  <text x="130" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">hostname</text>
  <text x="130" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">pid_max  panic</text>

  <!-- vm sub-items -->
  <line x1="290" y1="224" x2="290" y2="258" stroke="#3a6a3a" stroke-width="1"/>
  <rect x="220" y="258" width="140" height="36" rx="4" fill="#111" stroke="#2a5a2a" stroke-width="1"/>
  <text x="290" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">swappiness</text>
  <text x="290" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">dirty_ratio  overcommit</text>

  <!-- net sub-items -->
  <line x1="440" y1="224" x2="440" y2="258" stroke="#3a6ea8" stroke-width="1"/>
  <rect x="370" y="258" width="140" height="36" rx="4" fill="#111" stroke="#1a4a6a" stroke-width="1"/>
  <text x="440" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ipv4/tcp_*</text>
  <text x="440" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">ip_forward  somaxconn</text>

  <!-- fs sub-items -->
  <line x1="590" y1="224" x2="590" y2="258" stroke="#6a3a3a" stroke-width="1"/>
  <rect x="520" y="258" width="140" height="36" rx="4" fill="#111" stroke="#5a2a2a" stroke-width="1"/>
  <text x="590" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">file-max</text>
  <text x="590" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">inotify  aio-max</text>

  <!-- dev sub-items -->
  <line x1="750" y1="224" x2="750" y2="258" stroke="#3a6a6a" stroke-width="1"/>
  <rect x="680" y="258" width="140" height="36" rx="4" fill="#111" stroke="#2a5a5a" stroke-width="1"/>
  <text x="750" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">scsi/  cdrom/</text>
  <text x="750" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">하드웨어별 튜닝</text>

  <!-- sysctl.conf -->
  <rect x="160" y="330" width="560" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="176" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># /etc/sysctl.conf (영구 적용)</text>
  <text x="176" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">net.ipv4.ip_forward</tspan><tspan fill="#ffffff"> = 1</tspan></text>
  <text x="176" y="394" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">vm.swappiness</tspan><tspan fill="#ffffff"> = 10</tspan></text>
  <text x="176" y="414" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">fs.file-max</tspan><tspan fill="#ffffff"> = 2097152</tspan></text>
  <text x="176" y="434" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">$ sudo sysctl -p    # 즉시 적용</text>
</svg>
