<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8a55a"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">딥러닝 추천 아키텍처 비교</text>

  <!-- 컬럼 1: NCF -->
  <text x="147" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">NCF</text>
  <text x="147" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Neural Collaborative Filtering</text>

  <!-- NCF: 사용자 임베딩 -->
  <rect x="50" y="108" width="120" height="44" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="110" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">사용자 임베딩</text>
  <text x="110" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">User Embedding</text>

  <!-- NCF: 아이템 임베딩 -->
  <rect x="50" y="172" width="120" height="44" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="110" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">아이템 임베딩</text>
  <text x="110" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Item Embedding</text>

  <!-- NCF: 두 임베딩 → Concat 화살표 -->
  <line x1="110" y1="152" x2="110" y2="248" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="110" y1="216" x2="110" y2="248" stroke="#7ec8e3" stroke-width="2"/>

  <!-- NCF: Concat/MLP 박스 -->
  <rect x="50" y="250" width="120" height="44" fill="#0d1f3c" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="110" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Concat + MLP</text>
  <text x="110" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">비선형 상호작용</text>

  <!-- NCF: MLP → 예측 -->
  <line x1="110" y1="294" x2="110" y2="348" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- NCF: 예측 -->
  <rect x="50" y="350" width="120" height="44" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="110" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">예측 점수</text>
  <text x="110" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">P(interaction)</text>

  <!-- 구분선 -->
  <line x1="250" y1="64" x2="250" y2="410" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 컬럼 2: Wide & Deep -->
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Wide &amp; Deep</text>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">암기 + 일반화 결합</text>

  <!-- Wide 파트 -->
  <rect x="270" y="108" width="140" height="44" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="340" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">Wide 파트</text>
  <text x="340" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">선형 모델 (암기)</text>

  <!-- Deep 파트 -->
  <rect x="420" y="108" width="140" height="44" fill="#1a2a1a" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="490" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">Deep 파트</text>
  <text x="490" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DNN (일반화)</text>

  <!-- Wide → 합산 -->
  <line x1="340" y1="152" x2="340" y2="240" stroke="#55c555" stroke-width="2"/>
  <line x1="340" y1="240" x2="415" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Deep → DNN layers -->
  <rect x="430" y="172" width="120" height="44" fill="#161628" stroke="#7777cc" stroke-width="1.5" rx="6"/>
  <text x="490" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">DNN Layers</text>
  <text x="490" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ReLU × 3</text>

  <line x1="490" y1="152" x2="490" y2="172" stroke="#7777cc" stroke-width="2"/>
  <line x1="490" y1="216" x2="490" y2="240" stroke="#7777cc" stroke-width="2"/>
  <line x1="490" y1="240" x2="468" y2="270" stroke="#7777cc" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- 합산 박스 -->
  <rect x="370" y="272" width="120" height="44" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="430" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">출력 합산</text>
  <text x="430" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Wide + Deep</text>

  <line x1="430" y1="316" x2="430" y2="350" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- W&D 최종 예측 -->
  <rect x="370" y="352" width="120" height="44" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="430" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">앱 추천 점수</text>
  <text x="430" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Google Play</text>

  <!-- 구분선 -->
  <line x1="630" y1="64" x2="630" y2="410" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- 컬럼 3: DIN -->
  <text x="755" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8a55a" text-anchor="middle">DIN</text>
  <text x="755" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Deep Interest Network</text>

  <!-- DIN: 쿼리 아이템 -->
  <rect x="650" y="108" width="120" height="44" fill="#2a1a0a" stroke="#e8a55a" stroke-width="1.5" rx="6"/>
  <text x="710" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a55a" text-anchor="middle">쿼리 아이템</text>
  <text x="710" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Target Ad</text>

  <!-- DIN: 행동 시퀀스 -->
  <rect x="650" y="172" width="120" height="44" fill="#2a1a0a" stroke="#e8a55a" stroke-width="1.5" rx="6"/>
  <text x="710" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">행동 시퀀스</text>
  <text x="710" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">클릭·구매 이력</text>

  <!-- DIN: 두 박스 → Attention -->
  <line x1="710" y1="152" x2="710" y2="248" stroke="#e8a55a" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="710" y1="216" x2="710" y2="248" stroke="#e8a55a" stroke-width="2"/>

  <!-- DIN: Attention 박스 -->
  <rect x="650" y="250" width="120" height="44" fill="#2a1508" stroke="#e8a55a" stroke-width="1.5" rx="6"/>
  <text x="710" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a55a" text-anchor="middle">Attention</text>
  <text x="710" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">관련 행동 집중</text>

  <!-- DIN: Attention → MLP -->
  <line x1="710" y1="294" x2="710" y2="348" stroke="#e8a55a" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- DIN: MLP 예측 -->
  <rect x="650" y="350" width="120" height="44" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5" rx="6"/>
  <text x="710" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">광고 클릭률</text>
  <text x="710" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Alibaba CTR</text>

  <!-- 하단 설명 -->
  <text x="110" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">비선형 상호작용</text>
  <text x="430" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">암기 + 일반화 균형</text>
  <text x="710" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">관심사 기반 집중</text>
</svg>
