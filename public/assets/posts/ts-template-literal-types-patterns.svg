<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">실전 패턴 — 이벤트 타입·키 변환</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle" xml:space="preserve">템플릿 리터럴 타입의 실용적 활용</text>

  <!-- Event Handler Pattern -->
  <rect x="60" y="96" width="760" height="134" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">이벤트 핸들러 타입 자동 생성</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">type EventMap = { click: MouseEvent; keydown: KeyboardEvent };</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">type OnEvents&lt;T&gt; = {</text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  [K in keyof T as `on${Capitalize&lt;string &amp; K&gt;}`]:</text>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    (event: T[K]) =&gt; void</text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}; </text>
  <text x="200" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// { onClick: (e: MouseEvent) => void; ... }</text>

  <!-- infer with template literals -->
  <rect x="60" y="252" width="760" height="132" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle" xml:space="preserve">infer로 문자열 부분 추출</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// "on" 접두사 제거 후 소문자로</text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">type StripOn&lt;S&gt; = S extends `on${infer Rest}`</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  ? Uncapitalize&lt;Rest&gt;</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  : never;</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// StripOn&lt;"onClick"&gt; → "click"</text>

  <!-- Bottom boxes -->
  <rect x="60" y="406" width="360" height="56" rx="8" fill="#0f1a0f" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="240" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">camelCase ↔ snake_case 변환</text>
  <text x="240" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">재귀 + infer로 변환 타입 정의</text>

  <rect x="460" y="406" width="360" height="56" rx="8" fill="#1a0f0a" stroke="#3a1e0f" stroke-width="1.5"/>
  <text x="640" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle" xml:space="preserve">주의: 복잡한 재귀는 성능 저하</text>
  <text x="640" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">컴파일 타임 비용 고려 필요</text>
</svg>
