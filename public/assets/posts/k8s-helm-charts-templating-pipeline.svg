<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Helm 템플릿 렌더링 파이프라인</text>

  <!-- Input sources row -->
  <!-- values.yaml box -->
  <rect x="60" y="100" width="140" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">values.yaml</text>
  <text x="130" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">기본값 / 오버라이드</text>
  <text x="130" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">-f prod-values.yaml</text>

  <!-- Chart.yaml box -->
  <rect x="60" y="190" width="140" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Chart.yaml</text>
  <text x="130" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">메타데이터</text>
  <text x="130" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">.Chart.Name 등</text>

  <!-- templates/ box -->
  <rect x="60" y="280" width="140" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">templates/</text>
  <text x="130" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Go 템플릿 파일</text>
  <text x="130" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">_helpers.tpl 포함</text>

  <!-- Arrows from inputs to helm template engine -->
  <line x1="200" y1="135" x2="280" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="200" y1="225" x2="280" y2="235" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="200" y1="315" x2="280" y2="250" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Helm Template Engine box (center) -->
  <rect x="284" y="175" width="160" height="100" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="364" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">helm template</text>
  <text x="364" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Go 템플릿 엔진</text>
  <text x="364" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">함수 · 파이프라인</text>
  <text x="364" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">제어 흐름 평가</text>

  <!-- Arrow: helm engine → rendered YAML -->
  <line x1="444" y1="225" x2="524" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Rendered YAML box -->
  <rect x="528" y="175" width="150" height="100" rx="8" fill="#0a1a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="603" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Rendered YAML</text>
  <text x="603" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">완성된 manifest</text>
  <text x="603" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Deployment</text>
  <text x="603" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Service / Ingress</text>

  <!-- Arrow: rendered YAML → kubectl apply -->
  <line x1="678" y1="225" x2="754" y2="225" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- kubectl apply box -->
  <rect x="758" y="175" width="62" height="100" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="789" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">kubectl</text>
  <text x="789" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">apply</text>
  <text x="789" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">K8s</text>
  <text x="789" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">API</text>

  <!-- Bottom labels -->
  <text x="130" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">입력 소스</text>
  <text x="364" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">렌더링 단계</text>
  <text x="603" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">출력 결과</text>
  <text x="789" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">배포</text>
</svg>
