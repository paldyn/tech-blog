<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CPU 프로파일링 스택 추적 원리</text>

  <!-- Sampling profiler concept -->
  <text x="220" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">샘플링 프로파일러 동작</text>

  <!-- Timeline -->
  <rect x="60" y="95" width="320" height="60" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타임라인</text>
  <!-- Samples -->
  <line x1="130" y1="100" x2="130" y2="155" stroke="#e8c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="200" y1="100" x2="200" y2="155" stroke="#e8c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="270" y1="100" x2="270" y2="155" stroke="#e8c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="340" y1="100" x2="340" y2="155" stroke="#e8c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="140" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c55e">↓샘플</text>
  <text x="210" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c55e">↓샘플</text>
  <text x="280" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c55e">↓샘플</text>
  <text x="350" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c55e">↓샘플</text>

  <!-- Call stack at sample -->
  <rect x="60" y="172" width="320" height="190" rx="6" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">샘플 시점 콜 스택</text>

  <rect x="80" y="208" width="280" height="30" rx="4" fill="#e05555" opacity="0.3"/>
  <text x="220" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">compress_data()  ← CPU 실행 중</text>

  <rect x="80" y="242" width="280" height="30" rx="4" fill="#e8c55e" opacity="0.2"/>
  <text x="220" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c55e" text-anchor="middle">process_request()</text>

  <rect x="80" y="276" width="280" height="30" rx="4" fill="#55c555" opacity="0.15"/>
  <text x="220" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">handle_connection()</text>

  <rect x="80" y="310" width="280" height="30" rx="4" fill="#7ec8e3" opacity="0.1"/>
  <text x="220" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">worker_thread()</text>

  <rect x="80" y="344" width="280" height="30" rx="4" fill="#888" opacity="0.15"/>
  <text x="220" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">start_thread(libc)</text>

  <text x="220" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle"></text>

  <!-- Flame graph concept -->
  <text x="660" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8c55e" text-anchor="middle">FlameGraph — 샘플 집계</text>

  <!-- Flame visualization -->
  <rect x="500" y="95" width="320" height="268" rx="6" fill="#111" stroke="#444" stroke-width="1"/>

  <!-- Flame bars (bottom to top = callers to callees) -->
  <!-- Level 0: start_thread (base, wide) -->
  <rect x="510" y="320" width="300" height="20" rx="2" fill="#4477aa" opacity="0.8"/>
  <text x="660" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#fff" text-anchor="middle">start_thread (100%)</text>

  <!-- Level 1: worker_thread -->
  <rect x="510" y="296" width="300" height="20" rx="2" fill="#5588bb" opacity="0.8"/>
  <text x="660" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#fff" text-anchor="middle">worker_thread (100%)</text>

  <!-- Level 2: handle_connection -->
  <rect x="510" y="272" width="300" height="20" rx="2" fill="#3399cc" opacity="0.9"/>
  <text x="660" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#fff" text-anchor="middle">handle_connection (100%)</text>

  <!-- Level 3: process_request wide, sleep narrow -->
  <rect x="510" y="248" width="240" height="20" rx="2" fill="#ee7722" opacity="0.9"/>
  <text x="630" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#fff" text-anchor="middle">process_request (80%)</text>
  <rect x="754" y="248" width="56" height="20" rx="2" fill="#5533aa" opacity="0.9"/>
  <text x="782" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#fff" text-anchor="middle">sleep(20%)</text>

  <!-- Level 4: compress_data tall, parse_headers small -->
  <rect x="510" y="224" width="180" height="20" rx="2" fill="#e05555" opacity="0.95"/>
  <text x="600" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#fff" text-anchor="middle">compress_data (60%)</text>
  <rect x="694" y="224" width="56" height="20" rx="2" fill="#55aa55" opacity="0.9"/>
  <text x="722" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#fff" text-anchor="middle">parse (20%)</text>

  <!-- Level 5: lz4_compress -->
  <rect x="510" y="200" width="180" height="20" rx="2" fill="#cc3333" opacity="0.95"/>
  <text x="600" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#fff" text-anchor="middle">lz4_compress (60%) &lt;-- 병목!</text>

  <text x="660" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">넓을수록 CPU 사용 비율 높음</text>
  <text x="660" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">가장 위 = 실제 실행 함수</text>
  <text x="660" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">→ lz4_compress 최적화 대상!</text>
  <text x="660" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">수천~수만 샘플 집계 결과</text>

  <!-- Bottom note -->
  <rect x="60" y="385" width="760" height="70" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">On-CPU vs Off-CPU 프로파일링</text>
  <text x="220" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">On-CPU (perf/FlameGraph)</text>
  <text x="220" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CPU를 실제로 쓰는 코드 찾기</text>
  <text x="660" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c55e" text-anchor="middle">Off-CPU (bpftrace/offcputime)</text>
  <text x="660" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">I/O 대기, 락 경쟁으로 잠든 코드 찾기</text>
</svg>
