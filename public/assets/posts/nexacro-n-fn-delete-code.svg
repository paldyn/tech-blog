<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fn_delete() 구현 코드</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">행 선택 체크 → confirm → deleteRow() 3단계 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="264" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="115" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan fill="#7ec8e3">function</tspan><tspan> fn_delete() {</tspan>
  </text>
  <text x="76" y="133" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">var</tspan><tspan> row = </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.Grid00.currentrow;</tspan>
  </text>
  <text x="76" y="151" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0">  // ① 선택 여부 확인</text>
  <text x="76" y="169" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">if</tspan><tspan> (row &lt; </tspan><tspan fill="#b5cea8">0</tspan><tspan>) {</tspan>
  </text>
  <text x="76" y="187" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>    alert(</tspan><tspan fill="#ce9178">"삭제할 행을 선택하세요."</tspan><tspan>);</tspan>
  </text>
  <text x="76" y="205" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>    </tspan><tspan fill="#7ec8e3">return</tspan><tspan>; }</tspan>
  </text>
  <text x="76" y="223" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0">  // ② 확인 다이얼로그</text>
  <text x="76" y="241" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">if</tspan><tspan> (!confirm(</tspan><tspan fill="#ce9178">"삭제하시겠습니까?"</tspan><tspan>))</tspan>
  </text>
  <text x="76" y="259" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>    </tspan><tspan fill="#7ec8e3">return</tspan><tspan>;</tspan>
  </text>
  <text x="76" y="277" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0">  // ③ 행 삭제</text>
  <text x="76" y="295" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">
    <tspan>  </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.ds_list.deleteRow(row);</tspan>
  </text>
  <text x="76" y="313" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0">  // fn_save() 시 서버 DELETE 전송</text>
  <text x="76" y="331" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">}</text>

  <text x="440" y="375"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">INSERT 행 deleteRow() → Dataset 즉시 제거 · NORMAL 행 → rowStatus = DELETE(8)</text>
</svg>
