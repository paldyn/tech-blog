<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git fsck — 저장소 무결성 검사 구조</text>

  <!-- Objects graph -->
  <text x="60" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Git 객체 참조 그래프</text>

  <!-- HEAD -->
  <rect x="380" y="100" width="120" height="42" rx="8" fill="#0e1620" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">HEAD</text>
  <text x="440" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">refs/heads/main</text>

  <!-- Commit -->
  <line x1="440" y1="142" x2="440" y2="173" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="340" y="176" width="200" height="42" rx="8" fill="#0e1620" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">commit abc1234</text>
  <text x="440" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">tree + parent + author + msg</text>

  <!-- Tree -->
  <line x1="440" y1="218" x2="240" y2="260" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="140" y="263" width="200" height="42" rx="8" fill="#0e1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">tree def5678</text>
  <text x="240" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">디렉터리 구조</text>

  <!-- Blobs -->
  <line x1="240" y1="305" x2="160" y2="355" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="240" y1="305" x2="320" y2="355" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="80" y="358" width="160" height="36" rx="6" fill="#1a1010" stroke="#ce9178" stroke-width="1.5"/>
  <text x="160" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">blob ghi9012 (파일A)</text>

  <rect x="250" y="358" width="160" height="36" rx="6" fill="#1a1010" stroke="#ce9178" stroke-width="1.5"/>
  <text x="330" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">blob jkl3456 (파일B)</text>

  <!-- Dangling object (unreachable) -->
  <rect x="570" y="263" width="240" height="80" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="690" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">dangling commit</text>
  <text x="690" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">어떤 ref도 가리키지 않음</text>
  <text x="690" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">fsck: "unreachable commit"</text>

  <!-- fsck action box -->
  <rect x="60" y="418" width="760" height="42" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="435" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fsck</text>
  <text x="170" y="435" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">→ 모든 객체 SHA 검증 + 도달 불가 객체 탐지</text>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fsck --unreachable</text>
  <text x="290" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">→ 도달 불가 객체만 출력</text>
</svg>
