<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@dataclass 자동 생성 메서드</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">클래스 변수 선언만으로 반복 코드를 자동 생성합니다</text>

  <!-- Left: user writes -->
  <rect x="60" y="88" width="360" height="280" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">작성하는 코드</text>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">@dataclass</text>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class</text>
  <text x="122" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> Point:</text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    x: float</text>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    y: float</text>
  <text x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    z: float = </text>
  <text x="184" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#b5cea8">0.0</text>

  <!-- Right: auto generated -->
  <rect x="460" y="88" width="360" height="280" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">자동 생성되는 메서드</text>
  <text x="476" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">__init__(self, x, y, z=0.0)</text>
  <text x="476" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">__repr__(self)</text>
  <text x="476" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # Point(x=1, y=2, z=0.0)</text>
  <text x="476" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">__eq__(self, other)</text>
  <text x="476" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # 필드 값 비교</text>

  <text x="476" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># order=True 시 추가:</text>
  <text x="476" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c040">__lt__, __le__</text>
  <text x="476" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c040">__gt__, __ge__</text>
  <text x="476" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # 선언 순서대로 비교</text>
  <text x="476" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># frozen=True 시 추가:</text>
  <text x="476" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">__hash__(self)</text>

  <!-- Arrow between them -->
  <line x1="420" y1="228" x2="455" y2="228" stroke="#888" stroke-width="2"/>
  <polygon points="450,221 464,228 450,235" fill="#888"/>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">자동</text>
  <text x="440" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">생성</text>

  <!-- dataclass params table -->
  <rect x="60" y="388" width="760" height="72" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="440" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">@dataclass 주요 파라미터</text>
  <text x="80" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">eq=True</text>
  <text x="160" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">__eq__ 생성</text>
  <text x="280" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8c040">order=False</text>
  <text x="380" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비교 연산자</text>
  <text x="500" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">frozen=False</text>
  <text x="600" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">불변성</text>
  <text x="680" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">slots=False</text>
  <text x="760" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">__slots__</text>
  <text x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">repr=True</text>
  <text x="160" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">__repr__ 생성</text>
  <text x="280" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">init=True</text>
  <text x="380" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">__init__ 생성</text>
  <text x="500" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">kw_only=False</text>
  <text x="600" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">키워드 전용</text>
  <text x="680" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(Python 3.10+)</text>
</svg>
