<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HuggingFace Transformers — 핵심 구성 요소</text>

  <!-- Pipeline abstraction -->
  <rect x="60" y="70" width="760" height="54" rx="8" fill="#1a2c1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="440" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">pipeline() — 가장 쉬운 추론 인터페이스</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">task 문자열 하나로 토크나이저·모델·후처리를 자동으로 묶어줌</text>

  <!-- Three columns -->
  <!-- Tokenizer -->
  <rect x="60" y="148" width="220" height="130" rx="8" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Tokenizer</text>
  <text x="170" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">텍스트 → token IDs</text>
  <text x="170" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">attention_mask 생성</text>
  <text x="170" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">패딩 · 트런케이션</text>
  <text x="170" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">return_tensors="pt/tf"</text>
  <text x="170" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">AutoTokenizer.from_pretrained()</text>

  <line x1="280" y1="213" x2="328" y2="213" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Model -->
  <rect x="330" y="148" width="220" height="130" rx="8" fill="#1a2c1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">PretrainedModel</text>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">BERT·GPT·T5·Llama 등</text>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">task 헤드 자동 부착</text>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ForSequenceClassification</text>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ForCausalLM · ForMaskedLM</text>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">AutoModel.from_pretrained()</text>

  <line x1="550" y1="213" x2="598" y2="213" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="600" y="148" width="220" height="130" rx="8" fill="#2a1535" stroke="#6e3a9e" stroke-width="1.5"/>
  <text x="710" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#c77ec8" text-anchor="middle">Output / 후처리</text>
  <text x="710" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">logits → softmax</text>
  <text x="710" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">토큰 ID → 텍스트 디코딩</text>
  <text x="710" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">last_hidden_state</text>
  <text x="710" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">pooler_output (분류)</text>
  <text x="710" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#c77ec8" text-anchor="middle">ModelOutput dataclass</text>

  <!-- Task list -->
  <rect x="60" y="304" width="760" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">pipeline() task 목록</text>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">text-classification · ner · question-answering · summarization · translation · text-generation · fill-mask · zero-shot-classification · image-classification · automatic-speech-recognition</text>

  <!-- Code -->
  <rect x="60" y="374" width="760" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="114" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> transformers </text>
  <text x="238" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="296" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> pipeline</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">clf = pipeline(</text>
  <text x="210" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"text-classification"</text>
  <text x="376" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, model=</text>
  <text x="450" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"klue/roberta-base"</text>
  <text x="622" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="76" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">result = clf(</text>
  <text x="180" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"이 제품 정말 좋아요!"</text>
  <text x="364" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">)   </text>
  <text x="400" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># [{'label': 'positive', 'score': 0.99}]</text>
</svg>
