<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">실전 패턴: 팩토리 · DI · 레지스트리</text>

  <!-- Factory pattern -->
  <rect x="60" y="68" width="365" height="152" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">// 제네릭 팩토리</text>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan font-weight="600" fill="#7ec8e3">function</tspan> create&lt;T</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">extends</tspan> new (...a: any) =&gt; any</tspan>
    <tspan x="76" dy="20">&gt;(Cls: T,</tspan>
    <tspan x="76" dy="20">  ...args: ConstructorParameters&lt;T&gt;</tspan>
    <tspan x="76" dy="20">): InstanceType&lt;T&gt; {</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">return</tspan> <tspan font-weight="600" fill="#7ec8e3">new</tspan> Cls(...args);</tspan>
  </text>

  <!-- Class registry -->
  <rect x="455" y="68" width="365" height="152" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="471" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">// 클래스 레지스트리</text>
  <text x="471" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="471" dy="0"><tspan font-weight="600" fill="#7ec8e3">const</tspan> registry = <tspan font-weight="600" fill="#7ec8e3">new</tspan> Map&lt;</tspan>
    <tspan x="471" dy="20">  <tspan fill="#b5cea8">string</tspan>,</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">new</tspan> (...a: any) =&gt; any&gt;();</tspan>
    <tspan x="471" dy="20"> </tspan>
    <tspan x="471" dy="20"><tspan font-weight="600" fill="#7ec8e3">type</tspan> Instances = {</tspan>
    <tspan x="471" dy="20">  db: InstanceType&lt;<tspan font-weight="600" fill="#7ec8e3">typeof</tspan> Database&gt;,</tspan>
  </text>

  <!-- Singleton pattern -->
  <rect x="60" y="242" width="365" height="152" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">// 싱글턴 컨테이너</text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan font-weight="600" fill="#7ec8e3">class</tspan> Container {</tspan>
    <tspan x="76" dy="20">  <tspan font-weight="600" fill="#7ec8e3">private</tspan> instances =</tspan>
    <tspan x="76" dy="20">    <tspan font-weight="600" fill="#7ec8e3">new</tspan> Map&lt;symbol, unknown&gt;();</tspan>
    <tspan x="76" dy="20">  get&lt;T <tspan font-weight="600" fill="#7ec8e3">extends</tspan></tspan>
    <tspan x="76" dy="20">    <tspan font-weight="600" fill="#7ec8e3">new</tspan> (...a: any) =&gt; any&gt;(</tspan>
    <tspan x="76" dy="20">    Cls: T): InstanceType&lt;T&gt; {}</tspan>
  </text>

  <!-- Mixin pattern -->
  <rect x="455" y="242" width="365" height="152" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="471" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">// Mixin 타입 패턴</text>
  <text x="471" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="471" dy="0"><tspan font-weight="600" fill="#7ec8e3">type</tspan> Ctor&lt;T = {"{"}{"}"}> =</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">new</tspan> (...a: any[]) =&gt; T;</tspan>
    <tspan x="471" dy="20"> </tspan>
    <tspan x="471" dy="20"><tspan font-weight="600" fill="#7ec8e3">function</tspan> Serializable&lt;B</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">extends</tspan> Ctor&gt;(Base: B) {</tspan>
    <tspan x="471" dy="20">  <tspan font-weight="600" fill="#7ec8e3">return</tspan> <tspan font-weight="600" fill="#7ec8e3">class extends</tspan> Base {};</tspan>
  </text>
</svg>
