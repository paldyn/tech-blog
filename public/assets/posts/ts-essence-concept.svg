<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript의 본질: JavaScript + 타입 시스템</text>

  <!-- JavaScript box -->
  <rect x="60" y="90" width="260" height="160" rx="10" fill="#1a1a2e" stroke="#4a5568" stroke-width="1.5"/>
  <text x="190" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#f6c90e" text-anchor="middle">JavaScript</text>
  <text x="190" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">동적 타입 언어</text>
  <text x="190" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">런타임에 타입 결정</text>
  <text x="190" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">오류 = 실행 중 발견</text>
  <text x="190" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">모든 브라우저/Node 지원</text>

  <!-- Plus sign -->
  <text x="350" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="36" font-weight="700" fill="#7777cc" text-anchor="middle">+</text>

  <!-- Type System box -->
  <rect x="400" y="90" width="260" height="160" rx="10" fill="#1a2035" stroke="#4a6a8e" stroke-width="1.5"/>
  <text x="530" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">정적 타입 시스템</text>
  <text x="530" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">컴파일 타임 타입 검사</text>
  <text x="530" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">오류 = 코드 작성 중 발견</text>
  <text x="530" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">자동완성 · 리팩터링</text>
  <text x="530" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">대규모 코드베이스 지원</text>

  <!-- Equals sign -->
  <text x="690" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="36" font-weight="700" fill="#55c555" text-anchor="middle">=</text>

  <!-- TypeScript result -->
  <rect x="730" y="104" width="110" height="132" rx="10" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="785" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Type</text>
  <text x="785" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Script</text>
  <text x="785" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">.ts / .tsx</text>
  <text x="785" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">↓ tsc</text>
  <text x="785" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#f6c90e" text-anchor="middle">.js</text>

  <!-- Compile flow -->
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 컴파일 파이프라인</text>

  <!-- Pipeline boxes -->
  <!-- .ts source -->
  <rect x="60" y="320" width="130" height="52" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">소스 코드</text>
  <text x="125" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.ts / .tsx</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="346" x2="238" y2="346" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Parser -->
  <rect x="240" y="320" width="130" height="52" rx="8" fill="#1a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="305" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">파서 / AST</text>
  <text x="305" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">구문 분석</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="346" x2="418" y2="346" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Type checker -->
  <rect x="420" y="320" width="130" height="52" rx="8" fill="#1a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="485" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">타입 검사기</text>
  <text x="485" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">오류 탐지</text>

  <!-- Arrow 3 -->
  <line x1="550" y1="346" x2="598" y2="346" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Emitter -->
  <rect x="600" y="320" width="130" height="52" rx="8" fill="#1a1a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="665" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">코드 생성기</text>
  <text x="665" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.js 출력</text>

  <!-- Arrow 4 -->
  <line x1="730" y1="346" x2="778" y2="346" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="780" y="320" width="60" height="52" rx="8" fill="#1a1a1a" stroke="#f6c90e" stroke-width="1.5"/>
  <text x="810" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#f6c90e" text-anchor="middle">.js</text>
  <text x="810" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실행</text>

  <!-- Key insight -->
  <rect x="60" y="400" width="760" height="72" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">핵심 인사이트</text>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">타입 정보는 컴파일 후 완전히 제거 → 런타임에는 순수 JavaScript만 남는다</text>
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">TypeScript는 "개발 도구"이지 별도 런타임이 아니다</text>
</svg>
