<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">딥러닝 이미지 분류 파이프라인</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">입력 이미지 → 전처리 → CNN 특징 추출 → 분류 출력</text>

  <!-- Step boxes -->
  <!-- 1. Input -->
  <rect x="40" y="110" width="140" height="80" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="110" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">① 입력</text>
  <text x="110" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">224×224×3</text>
  <text x="110" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RGB 이미지</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="150" x2="218" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- 2. Preprocessing -->
  <rect x="220" y="110" width="140" height="80" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="290" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">② 전처리</text>
  <text x="290" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">정규화·증강</text>
  <text x="290" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Resize / Flip</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="150" x2="398" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- 3. Feature Extraction -->
  <rect x="400" y="110" width="140" height="80" rx="8" fill="#1a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">③ 특징 추출</text>
  <text x="470" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">CNN Backbone</text>
  <text x="470" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ResNet / ViT</text>

  <!-- Arrow 3→4 -->
  <line x1="540" y1="150" x2="578" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- 4. Classifier -->
  <rect x="580" y="110" width="140" height="80" rx="8" fill="#1a1a2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="650" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">④ 분류기</text>
  <text x="650" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">FC + Softmax</text>
  <text x="650" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">클래스 확률</text>

  <!-- Arrow 4→5 -->
  <line x1="720" y1="150" x2="758" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- 5. Output -->
  <rect x="760" y="110" width="80" height="80" rx="8" fill="#1a1a2e" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="800" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#b5cea8" text-anchor="middle">⑤ 출력</text>
  <text x="800" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">레이블</text>
  <text x="800" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">+ 신뢰도</text>

  <!-- Backbone 비교 섹션 -->
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 백본 비교</text>

  <!-- Headers -->
  <rect x="40" y="248" width="160" height="36" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <text x="120" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">모델</text>

  <rect x="205" y="248" width="110" height="36" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <text x="260" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">Top-1 Acc</text>

  <rect x="320" y="248" width="110" height="36" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <text x="375" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">파라미터</text>

  <rect x="435" y="248" width="120" height="36" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <text x="495" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">특징</text>

  <rect x="560" y="248" width="280" height="36" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <text x="700" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">적합 상황</text>

  <!-- Row 1: ResNet-50 -->
  <rect x="40" y="288" width="160" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="120" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">ResNet-50</text>

  <rect x="205" y="288" width="110" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="260" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b5cea8" text-anchor="middle">76.1%</text>

  <rect x="320" y="288" width="110" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="375" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">25M</text>

  <rect x="435" y="288" width="120" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="495" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">잔차 연결</text>

  <rect x="560" y="288" width="280" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="700" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">전이학습 베이스라인</text>

  <!-- Row 2: EfficientNet -->
  <rect x="40" y="332" width="160" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="120" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">EfficientNet-B4</text>

  <rect x="205" y="332" width="110" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="260" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">83.0%</text>

  <rect x="320" y="332" width="110" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="375" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">19M</text>

  <rect x="435" y="332" width="120" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="495" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">복합 스케일링</text>

  <rect x="560" y="332" width="280" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="700" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">엣지 디바이스·효율 중시</text>

  <!-- Row 3: ViT -->
  <rect x="40" y="376" width="160" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="120" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">ViT-L/16</text>

  <rect x="205" y="376" width="110" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="260" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">87.8%</text>

  <rect x="320" y="376" width="110" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="375" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">307M</text>

  <rect x="435" y="376" width="120" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="495" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">패치 어텐션</text>

  <rect x="560" y="376" width="280" height="40" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="700" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">대규모 데이터셋·SOTA</text>

  <!-- Row 4: ConvNeXt -->
  <rect x="40" y="420" width="160" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="120" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">ConvNeXt-L</text>

  <rect x="205" y="420" width="110" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="260" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">87.5%</text>

  <rect x="320" y="420" width="110" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="375" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">198M</text>

  <rect x="435" y="420" width="120" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="495" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">순수 CNN 현대화</text>

  <rect x="560" y="420" width="280" height="40" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="700" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">CNN 한계 극복 연구</text>

  <!-- Bottom note -->
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">ImageNet-1K 기준 · Top-1 Accuracy</text>
</svg>
