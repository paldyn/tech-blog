<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e05555">가변 기본값의 함정</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">리스트·딕셔너리를 기본값으로 쓰면 호출마다 공유된다</text>

  <!-- Bug code block -->
  <rect x="60" y="90" width="400" height="200" fill="#000000" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555"># 잘못된 코드</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> append_item(item, lst=[]):</tspan></text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    lst.append(item)</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ffffff"> lst</tspan></text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">print(append_item(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">print(append_item(</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">print(append_item(</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ← [] 단 한 번만 생성!</text>

  <!-- Output (unexpected) -->
  <rect x="60" y="318" width="400" height="102" fill="#000000" rx="6" stroke="#e05555"/>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 예상과 다른 출력</text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">[1]</tspan></text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">[1, 2]</tspan><tspan fill="#9aa4b8">   # 2만 있어야!</tspan></text>
  <text x="76" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">[1, 2, 3]</tspan><tspan fill="#9aa4b8"> # 3만 있어야!</tspan></text>

  <!-- Explanation box -->
  <rect x="500" y="90" width="320" height="330" fill="#000000" rx="8" stroke="#3a4a6e"/>
  <text x="660" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">왜 이런 일이?</text>

  <text x="516" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기본값은 함수가</text>
  <text x="516" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">정의될 때 단 한 번만</text>
  <text x="516" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">평가(evaluate)된다.</text>

  <!-- Timeline boxes -->
  <rect x="516" y="210" width="288" height="32" fill="#0f1825" rx="4" stroke="#3a4a6e"/>
  <text x="660" y="230" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">def 실행 시 → [] 생성 (id: 100)</text>

  <rect x="516" y="252" width="288" height="32" fill="#0f1825" rx="4" stroke="#3a4a6e"/>
  <text x="660" y="272" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">append_item(1) → [1] (id: 100)</text>

  <rect x="516" y="294" width="288" height="32" fill="#0f1825" rx="4" stroke="#3a4a6e"/>
  <text x="660" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">append_item(2) → [1,2] (id: 100)</text>

  <rect x="516" y="336" width="288" height="32" fill="#0f1825" rx="4" stroke="#3a4a6e"/>
  <text x="660" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">append_item(3) → [1,2,3] (id: 100)</text>

  <text x="516" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">같은 리스트 객체를 계속 수정!</text>
  <text x="516" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">id()로 확인하면 항상 동일</text>
</svg>
