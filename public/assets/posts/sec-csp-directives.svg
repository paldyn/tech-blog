<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CSP 주요 디렉티브 한눈에 보기</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Content-Security-Policy 헤더 구성</text>

  <!-- 디렉티브 목록 -->
  <!-- default-src -->
  <rect x="60" y="90" width="180" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">default-src</text>
  <text x="150" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 리소스 기본 정책</text>

  <rect x="260" y="90" width="560" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="280" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">'self'</text>
  <text x="330" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> — 같은 origin만</text>
  <text x="280" y="125" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">'none'</text>
  <text x="330" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> — 모두 차단 (가장 엄격)</text>

  <!-- script-src -->
  <rect x="60" y="148" width="180" height="44" rx="6" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">script-src</text>
  <text x="150" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스크립트 허용 출처</text>

  <rect x="260" y="148" width="560" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="280" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">'nonce-{random}'</text>
  <text x="420" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> — 요청별 무작위값 일치 시만 실행</text>
  <text x="280" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">'strict-dynamic'</text>
  <text x="420" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> — nonce 스크립트가 로드한 스크립트도 신뢰</text>

  <!-- style-src -->
  <rect x="60" y="206" width="180" height="44" rx="6" fill="#1a1a0a" stroke="#e8e83a" stroke-width="1.5"/>
  <text x="150" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8e83a" text-anchor="middle">style-src</text>
  <text x="150" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스타일시트 허용 출처</text>

  <rect x="260" y="206" width="560" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="280" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">'unsafe-inline'</text>
  <text x="400" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555"> — 인라인 스타일 허용 (권장 안 함)</text>
  <text x="280" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">'nonce-{random}'</text>
  <text x="420" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> — 인라인 스타일도 nonce로 허용 가능</text>

  <!-- img-src -->
  <rect x="60" y="264" width="180" height="44" rx="6" fill="#0a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">img-src</text>
  <text x="150" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이미지 허용 출처</text>

  <rect x="260" y="264" width="560" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="280" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">'self' data: https://cdn.example.com</text>
  <text x="280" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  여러 출처 공백 구분 나열 가능</text>

  <!-- connect-src -->
  <rect x="60" y="322" width="180" height="44" rx="6" fill="#1a0a1a" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="150" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#cc77cc" text-anchor="middle">connect-src</text>
  <text x="150" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">fetch·XHR·WebSocket</text>

  <rect x="260" y="322" width="560" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="280" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">'self' https://api.example.com wss://ws.example.com</text>
  <text x="280" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  API 서버·WebSocket 엔드포인트 명시</text>

  <!-- frame-ancestors -->
  <rect x="60" y="380" width="180" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">frame-ancestors</text>
  <text x="150" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">클릭재킹 방어</text>

  <rect x="260" y="380" width="560" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="280" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">'none'</text>
  <text x="330" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> — iframe 삽입 완전 차단 (X-Frame-Options 대체)</text>
  <text x="280" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">'self'</text>
  <text x="328" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> — 같은 origin의 iframe만 허용</text>

  <!-- 구분선 -->
  <line x1="60" y1="140" x2="820" y2="140" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="198" x2="820" y2="198" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="256" x2="820" y2="256" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="314" x2="820" y2="314" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="372" x2="820" y2="372" stroke="#222" stroke-width="1"/>
  <line x1="240" y1="90" x2="240" y2="424" stroke="#222" stroke-width="1"/>
  <rect x="60" y="90" width="760" height="334" rx="6" fill="none" stroke="#333" stroke-width="1"/>
</svg>
