<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr-c" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-d" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useImperativeHandle — ref 노출 범위 제어</text>

  <!-- Parent box -->
  <rect x="60" y="80" width="360" height="72" rx="8" fill="#0a0a1e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">부모 컴포넌트</text>
  <text x="240" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ref.current.focus()</text>
  <text x="240" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ref.current.scrollIntoView()</text>

  <!-- Arrow: parent to child -->
  <line x1="240" y1="154" x2="240" y2="194" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-c)"/>
  <text x="260" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">ref 전달 (forwardRef)</text>

  <!-- Child box -->
  <rect x="60" y="198" width="360" height="72" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">자식 컴포넌트</text>
  <text x="240" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">useImperativeHandle(ref, () =&gt; ({...}))</text>

  <!-- Arrow: child exposes API -->
  <line x1="240" y1="272" x2="240" y2="308" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-d)"/>
  <text x="260" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">커스텀 API 노출</text>

  <!-- Exposed API box -->
  <rect x="60" y="312" width="360" height="72" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">ref.current (커스텀 객체)</text>
  <text x="240" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">{ focus(), scrollIntoView() }</text>
  <text x="240" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">내부 DOM 전체가 아닌 허용된 메서드만 노출</text>

  <!-- Right side explanation -->
  <rect x="480" y="80" width="360" height="308" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="660" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">forwardRef vs useImperativeHandle</text>

  <text x="500" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">forwardRef만 사용:</text>
  <text x="500" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DOM 요소 전체 노출</text>
  <text x="500" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 DOM 메서드/프로퍼티 접근 가능</text>
  <text x="500" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">캡슐화 파괴 위험</text>

  <line x1="500" y1="220" x2="820" y2="220" stroke="#333" stroke-width="1"/>

  <text x="500" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">useImperativeHandle 추가:</text>
  <text x="500" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">허용된 메서드만 노출</text>
  <text x="500" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내부 DOM 구조 변경 가능 (API 불변)</text>
  <text x="500" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커스텀 메서드 추가 가능</text>
  <text x="500" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">캡슐화 유지</text>
  <text x="500" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">단, 꼭 필요할 때만 — props/state로 해결 가능하면 쓰지 말 것</text>
  <text x="500" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">명령형 API는 선언형 React 방식보다 예외적 수단이다</text>
</svg>
