<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="sf1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">Scala — 객체지향과 함수형을 한 언어에 융합</text>

  <rect x="80" y="110" width="240" height="110" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="150" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">객체지향 (OOP)</text>
  <text x="200" y="180" font-size="12" fill="#888" text-anchor="middle">클래스 · 상속 · 트레이트</text>
  <text x="200" y="202" font-size="12" fill="#888" text-anchor="middle">모든 값이 객체</text>

  <rect x="560" y="110" width="240" height="110" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="150" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">함수형 (FP)</text>
  <text x="680" y="180" font-size="12" fill="#888" text-anchor="middle">불변성 · 일급 함수</text>
  <text x="680" y="202" font-size="12" fill="#888" text-anchor="middle">패턴 매칭 · 표현식 중심</text>

  <line x1="322" y1="165" x2="430" y2="165" stroke="#7777cc" stroke-width="2.5" marker-end="url(#sf1)"/>
  <line x1="558" y1="165" x2="450" y2="165" stroke="#7777cc" stroke-width="2.5" marker-end="url(#sf1)"/>
  <text x="440" y="150" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Scala</text>

  <text x="440" y="278" font-size="13" fill="#888" text-anchor="middle">강력한 타입 시스템 위에서 두 패러다임을 자연스럽게 섞어 쓸 수 있는 것이 Scala의 정체성</text>
</svg>
