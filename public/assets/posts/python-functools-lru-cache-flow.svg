<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">lru_cache 동작 원리</text>

  <!-- Caller -->
  <rect x="60" y="72" width="160" height="54" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">함수 호출</text>
  <text x="140" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">f(args)</text>

  <!-- Arrow to cache check -->
  <line x1="220" y1="99" x2="298" y2="99" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Cache check -->
  <rect x="300" y="72" width="180" height="54" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">캐시 조회</text>
  <text x="390" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">args in cache?</text>

  <!-- Cache HIT arrow -->
  <line x1="480" y1="85" x2="598" y2="85" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="538" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">HIT</text>

  <!-- Cache MISS arrow down -->
  <line x1="390" y1="126" x2="390" y2="194" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="406" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">MISS</text>

  <!-- Cache result box -->
  <rect x="600" y="66" width="200" height="66" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">캐시된 결과 반환</text>
  <text x="700" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">dict[args] → value</text>
  <text x="700" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">O(1) 조회</text>

  <!-- Actual compute box -->
  <rect x="300" y="196" width="180" height="54" rx="8" fill="#1f1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="390" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">실제 함수 실행</text>
  <text x="390" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">비싼 연산 수행</text>

  <!-- Save to cache -->
  <line x1="390" y1="250" x2="390" y2="298" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Cache storage -->
  <rect x="280" y="300" width="400" height="66" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">LRU 캐시 저장소</text>
  <text x="480" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">OrderedDict {args: result} — maxsize 초과 시 가장 오래된 항목 제거</text>

  <!-- Stats box -->
  <rect x="60" y="300" width="200" height="66" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">통계 조회</text>
  <text x="160" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">f.cache_info()</text>
  <text x="160" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">hits / misses / size</text>

  <!-- Constraints -->
  <rect x="60" y="390" width="760" height="36" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">⚠ 인자는 반드시 해시 가능(hashable)해야 합니다 — list, dict는 직접 사용 불가</text>
</svg>
