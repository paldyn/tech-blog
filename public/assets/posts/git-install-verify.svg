<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">설치 후 첫 번째 확인 단계</text>

  <!-- Step 1 -->
  <rect x="60" y="68" width="36" height="36" rx="18" fill="#55c555"/>
  <text x="78" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#0a0a0a">1</text>
  <text x="108" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">버전 확인</text>

  <rect x="60" y="112" width="760" height="54" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">git</text><text x="104" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> --version</text>
  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">git version 2.47.0</text>

  <!-- Step 2 -->
  <rect x="60" y="182" width="36" height="36" rx="18" fill="#7ec8e3"/>
  <text x="78" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#0a0a0a">2</text>
  <text x="108" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Git 실행 경로 확인</text>

  <rect x="60" y="226" width="760" height="54" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">which git       </text><text x="240" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># macOS/Linux</text>
  <text x="80" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">/usr/local/bin/git</text><text x="280" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">  # Homebrew 설치 시</text>

  <!-- Version note -->
  <rect x="60" y="296" width="760" height="44" rx="6" fill="#0d150d" stroke="#1e3a1e"/>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#77cc77">✓ 2.x.x 이상이면 모든 예제 실행 가능. 최신 기능(worktree, partial clone 등)은 2.36+ 권장</text>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">  macOS 기본 탑재 Git(Apple Git)은 구버전인 경우가 많음 — Homebrew로 최신 버전 설치 권장</text>
</svg>
