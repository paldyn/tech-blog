  <rect x="472" y="217" width="176" height="22" rx="5" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="560" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">비결정론적 (주관적)</text>
