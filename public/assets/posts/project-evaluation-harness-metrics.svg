  <rect x="78" y="217" width="90" height="22" rx="5" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="123" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">완전</text>
