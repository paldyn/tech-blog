  <rect x="64" y="380" width="164" height="60" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="146" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">1st: Exact Match</text>
  <text x="146" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CI에 항상 포함</text>
  <text x="146" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">fast gate</text>

  <rect x="248" y="380" width="164" height="60" rx="8" fill="#1a1810" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="330" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">2nd: ROUGE/BERTScore</text>
  <text x="330" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">텍스트 유사도 체크</text>
  <text x="330" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">no API cost</text>

  <rect x="432" y="380" width="188" height="60" rx="8" fill="#12101a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="526" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">3rd: LLM-as-Judge</text>
  <text x="526" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">복잡한 기준 자동 평가</text>
  <text x="526" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">major releases</text>

  <rect x="636" y="380" width="180" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="726" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">4th: Human Eval</text>
  <text x="726" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Gold standard 생성</text>
  <text x="726" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">quarterly / milestone</text>

  <text x="440" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">빠른 메트릭으로 조기 필터링 → 비싼 메트릭은 후반부에 집중 투입</text>
</svg>
