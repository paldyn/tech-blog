  <rect x="686" y="301" width="140" height="22" rx="5" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="756" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">예 (사람이 함)</text>

  <!-- ── "When to use" recommendation row ── -->
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">추천 전략: 레이어드 평가</text>

