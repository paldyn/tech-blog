<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">const vs let 타입 추론 차이</text>

  <!-- const column -->
  <rect x="60" y="70" width="380" height="280" rx="8" fill="#0f1f2f" stroke="#3178c6" stroke-width="1.5"/>
  <text x="250" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">const — 리터럴 타입으로 좁힘</text>

  <rect x="76" y="112" width="348" height="220" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> a = <tspan fill="#ce9178">"hello"</tspan>;</text>
  <text x="92" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// a: "hello"  (리터럴 타입)</text>
  <text x="92" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> n = <tspan fill="#b5cea8">42</tspan>;</text>
  <text x="92" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// n: 42  (숫자 리터럴)</text>
  <text x="92" y="224" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> dir = <tspan fill="#ce9178">"north"</tspan>;</text>
  <text x="92" y="244" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// dir: "north"  (재할당 불가이므로)</text>
  <text x="92" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 유니언 타입으로 사용 가능</text>
  <text x="92" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Dir = <tspan fill="#7ec8e3" font-weight="600">typeof</tspan> dir; <tspan fill="#9aa4b8">// "north"</tspan></text>
  <text x="92" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 좁은 타입 = 더 많은 정보</text>

  <!-- let column -->
  <rect x="460" y="70" width="380" height="280" rx="8" fill="#1a1a0a" stroke="#e8c840" stroke-width="1.5"/>
  <text x="650" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8c840" text-anchor="middle">let — 일반 타입으로 넓힘</text>

  <rect x="476" y="112" width="348" height="220" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">let</tspan> a = <tspan fill="#ce9178">"hello"</tspan>;</text>
  <text x="492" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// a: string  (재할당 가능하므로 넓힘)</text>
  <text x="492" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">let</tspan> n = <tspan fill="#b5cea8">42</tspan>;</text>
  <text x="492" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// n: number  (다른 숫자 대입 가능)</text>
  <text x="492" y="224" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">a = <tspan fill="#ce9178">"world"</tspan>;  <tspan fill="#9aa4b8">// OK</tspan></text>
  <text x="492" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">a = <tspan fill="#b5cea8">123</tspan>;      <tspan fill="#9aa4b8">// 오류: number ≠ string</tspan></text>
  <text x="492" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 여전히 string 타입 강제</text>
  <text x="492" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 재할당 가능하나 타입은 고정</text>

  <text x="440" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">const: 값이 변하지 않으므로 더 좁은 타입(리터럴)으로 추론 / let: 재할당 가능하므로 더 넓은 타입으로 추론</text>
</svg>
