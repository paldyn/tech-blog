<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring 6 핵심 신기능 상세</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Jakarta EE 마이그레이션부터 Virtual Threads까지</text>

  <!-- Card 1: Jakarta EE -->
  <rect x="40" y="92" width="248" height="148" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="164" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">Jakarta EE 전환</text>
  <text x="56" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">javax.servlet → jakarta.servlet</text>
  <text x="56" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">javax.persistence → jakarta.persistence</text>
  <text x="56" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">javax.validation → jakarta.validation</text>
  <text x="56" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 전체 import 일괄 변경 필요</text>
  <text x="56" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">openrewrite 툴로 자동화 가능</text>
  <text x="56" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Tomcat 10+, Jetty 11+ 필요</text>

  <!-- Card 2: GraalVM -->
  <rect x="316" y="92" width="248" height="148" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">GraalVM Native Image</text>
  <text x="332" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">AOT(Ahead-Of-Time) 컴파일</text>
  <text x="332" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">시작 시간: 수초 → 수십ms</text>
  <text x="332" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">메모리: 대폭 감소</text>
  <text x="332" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Spring AOT 힌트 자동 생성</text>
  <text x="332" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Serverless / FaaS에 최적화</text>
  <text x="332" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Reflection 제한 주의</text>

  <!-- Card 3: Virtual Threads -->
  <rect x="592" y="92" width="248" height="148" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="716" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Virtual Threads (JDK 21+)</text>
  <text x="608" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Project Loom 정식 지원</text>
  <text x="608" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">spring.threads.virtual.enabled=true</text>
  <text x="608" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Thread-per-request 모델 부활</text>
  <text x="608" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">WebFlux 없이 고성능 동시성</text>
  <text x="608" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">기존 코드 거의 수정 불필요</text>
  <text x="608" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">I/O 바운드 앱에 효과적</text>

  <!-- Code example: HTTP Interface -->
  <rect x="40" y="262" width="390" height="168" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="235" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">신기능: HTTP Interface Client</text>
  <text x="56" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@HttpExchange</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"https://api.example.com"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="56" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public interface</tspan><tspan fill="#ffffff"> UserApi {</tspan></text>
  <text x="56" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@GetExchange</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"/users/{id}"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="56" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  User getUser(<tspan fill="#7ec8e3" font-weight="600">@PathVariable</tspan><tspan fill="#ffffff"> Long id);</tspan></text>
  <text x="56" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@PostExchange</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"/users"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="56" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  User createUser(<tspan fill="#7ec8e3" font-weight="600">@RequestBody</tspan><tspan fill="#ffffff"> UserDto dto);</tspan></text>
  <text x="56" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- RFC 7807 box -->
  <rect x="450" y="262" width="390" height="168" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="645" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">기타 Spring 6 변경사항</text>
  <text x="466" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">▸</text>
  <text x="482" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">RFC 7807 ProblemDetail 내장 지원</text>
  <text x="466" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">▸</text>
  <text x="482" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Micrometer Observability API 통합</text>
  <text x="466" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">▸</text>
  <text x="482" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">@RequestParam required=false 기본값 변경</text>
  <text x="466" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">▸</text>
  <text x="482" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Ahead-of-time 힌트 자동 처리기</text>
  <text x="466" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">▸</text>
  <text x="482" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">@EnableMethodSecurity 기본값 변경</text>
  <text x="466" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">▸</text>
  <text x="482" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Spring Data 3.x, Security 6.x 동반 업그레이드</text>
</svg>
