<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">레거시 → java.time 대응표</text>

  <text x="230" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">레거시</text>
  <text x="660" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">java.time</text>

  <rect x="80" y="94" width="300" height="30" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">java.util.Date</text>
  <line x1="396" y1="109" x2="496" y2="109" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <rect x="510" y="94" width="300" height="30" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">Instant</text>

  <rect x="80" y="138" width="300" height="30" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">Calendar</text>
  <line x1="396" y1="153" x2="496" y2="153" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <rect x="510" y="138" width="300" height="30" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">ZonedDateTime</text>

  <rect x="80" y="182" width="300" height="30" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">SimpleDateFormat</text>
  <line x1="396" y1="197" x2="496" y2="197" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <rect x="510" y="182" width="300" height="30" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">DateTimeFormatter</text>

  <rect x="80" y="226" width="300" height="30" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">java.sql.Date / Timestamp</text>
  <line x1="396" y1="241" x2="496" y2="241" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <rect x="510" y="226" width="300" height="30" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">LocalDate / Instant</text>

  <rect x="80" y="270" width="300" height="30" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="290" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">TimeZone</text>
  <line x1="396" y1="285" x2="496" y2="285" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <rect x="510" y="270" width="300" height="30" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="290" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">ZoneId</text>

  <rect x="80" y="314" width="300" height="30" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="334" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">date.getTime()</text>
  <line x1="396" y1="329" x2="496" y2="329" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-green)"/>
  <rect x="510" y="314" width="300" height="30" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="334" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">instant.toEpochMilli()</text>

  <!-- Bridge note -->
  <rect x="60" y="376" width="760" height="74" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">경계에서의 브리지 메서드 (Java 8+에 내장)</text>
  <text x="440" y="430" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">legacyDate.toInstant()  /  Date.from(instant)  /  cal.toInstant()  /  sqlDate.toLocalDate()</text>
</svg>
