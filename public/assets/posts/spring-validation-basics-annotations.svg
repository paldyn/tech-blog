<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Bean Validation 주요 어노테이션</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">jakarta.validation.constraints 패키지</text>

  <!-- Left column -->
  <!-- @NotNull -->
  <rect x="60" y="92" width="370" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="80" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@NotNull</text>
  <text x="80" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">null 금지 / 빈 문자열("") 통과 가능</text>

  <!-- @NotEmpty -->
  <rect x="60" y="154" width="370" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="80" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@NotEmpty</text>
  <text x="80" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">null + 빈 문자열 금지 / 공백(" ") 통과</text>

  <!-- @NotBlank -->
  <rect x="60" y="216" width="370" height="52" rx="6" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@NotBlank ★</text>
  <text x="80" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">null + 빈 문자열 + 공백 문자열 금지</text>

  <!-- @Size -->
  <rect x="60" y="278" width="370" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@Size(min, max)</text>
  <text x="80" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문자열 길이 / 컬렉션 크기 범위</text>

  <!-- @Min / @Max -->
  <rect x="60" y="340" width="370" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@Min(val) / @Max(val)</text>
  <text x="80" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정수형 최솟값 / 최댓값 제한</text>

  <!-- @Email -->
  <rect x="60" y="402" width="370" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@Email</text>
  <text x="80" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이메일 형식 검증 (null 허용 → @NotBlank 병행)</text>

  <!-- Right column -->
  <!-- @Pattern -->
  <rect x="450" y="92" width="370" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="470" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@Pattern(regexp)</text>
  <text x="470" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정규식 패턴 매칭</text>

  <!-- @Positive / @PositiveOrZero -->
  <rect x="450" y="154" width="370" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="470" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@Positive / @PositiveOrZero</text>
  <text x="470" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">양수 / 0 이상 숫자 제한</text>

  <!-- @Past / @Future -->
  <rect x="450" y="216" width="370" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="470" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@Past / @Future</text>
  <text x="470" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">날짜 과거/미래 제한 (LocalDate 등)</text>

  <!-- @Valid (cascade) -->
  <rect x="450" y="278" width="370" height="52" rx="6" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@Valid (중첩 검증) ★</text>
  <text x="470" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">내부 객체 필드까지 재귀 검증</text>

  <!-- @AssertTrue / @AssertFalse -->
  <rect x="450" y="340" width="370" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="470" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@AssertTrue / @AssertFalse</text>
  <text x="470" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">boolean 메서드 기반 커스텀 조건</text>

  <!-- Custom -->
  <rect x="450" y="402" width="370" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="470" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">@커스텀Constraint</text>
  <text x="470" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ConstraintValidator 구현으로 도메인 규칙 표현</text>

  <!-- Bottom note -->
  <rect x="60" y="470" width="760" height="32" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="491" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">message 속성으로 오류 메시지 커스터마이징 가능 — ValidationMessages.properties 파일로 국제화</text>
</svg>
