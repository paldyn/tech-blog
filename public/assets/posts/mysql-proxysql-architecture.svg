<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ProxySQL 아키텍처 — 쿼리 라우팅 &amp; 커넥션 풀링</text>

  <defs>
    <marker id="arr-ps" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-ps2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-ps3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- App -->
  <rect x="60" y="180" width="120" height="60" rx="8" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="120" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">App</text>
  <text x="120" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">:3306 연결</text>

  <!-- Arrow App → ProxySQL -->
  <line x1="182" y1="210" x2="248" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ps)"/>

  <!-- ProxySQL box -->
  <rect x="250" y="120" width="220" height="180" rx="8" fill="#0f1a2e" stroke="#3a6aae" stroke-width="2"/>
  <text x="360" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">ProxySQL</text>
  <text x="360" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">:6032 Admin / :6033 MySQL</text>

  <rect x="264" y="178" width="192" height="34" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="360" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Query Routing Rules</text>
  <text x="360" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">regex 기반 읽기/쓰기 분리</text>

  <rect x="264" y="220" width="192" height="34" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="360" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Connection Pool</text>
  <text x="360" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">백엔드 연결 재사용</text>

  <rect x="264" y="262" width="192" height="26" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="360" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Health Check &amp; Failover</text>

  <!-- Arrow ProxySQL → Primary -->
  <line x1="472" y1="175" x2="548" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ps)"/>
  <text x="510" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Write</text>

  <!-- Arrow ProxySQL → Replica1 -->
  <line x1="472" y1="240" x2="548" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr-ps2)"/>
  <text x="510" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Read</text>

  <!-- Arrow ProxySQL → Replica2 -->
  <line x1="472" y1="270" x2="548" y2="340" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-ps3)"/>

  <!-- Primary -->
  <rect x="550" y="150" width="140" height="50" rx="8" fill="#0f1a2e" stroke="#3a6aae" stroke-width="2"/>
  <text x="620" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Primary</text>
  <text x="620" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">HG=10 (Write)</text>

  <!-- Replica 1 -->
  <rect x="550" y="250" width="140" height="50" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Replica 1</text>
  <text x="620" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">HG=20 (Read)</text>

  <!-- Replica 2 -->
  <rect x="550" y="320" width="140" height="50" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Replica 2</text>
  <text x="620" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">HG=20 (Read)</text>

  <!-- Admin -->
  <rect x="700" y="80" width="140" height="50" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="770" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">Admin Interface</text>
  <text x="770" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">mysql -h 127.0.0.1 -P 6032</text>

  <!-- Bottom annotations -->
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">HG = Hostgroup. 쿼리 규칙에서 destination_hostgroup으로 쓰기(10)/읽기(20) 분리</text>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ProxySQL: 고성능·고기능 / MySQL Router: 경량·공식 지원</text>
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">stats_mysql_query_digest 테이블로 쿼리별 성능 분석 가능</text>
</svg>
