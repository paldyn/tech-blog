<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">VDP vs 버그 바운티</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">제보를 받는 창구부터 만들고, 준비가 되면 보상을 붙인다</text>

  <!-- VDP -->
  <rect x="50" y="100" width="370" height="250" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">VDP (취약점 공개 정책)</text>
  <text x="235" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Vulnerability Disclosure Program</text>
  <line x1="74" y1="172" x2="396" y2="172" stroke="#26334d" stroke-width="1"/>
  <text x="74" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• "어디로, 어떻게 제보하라"는 공개 안내</text>
  <text x="74" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 선의의 연구자에 대한 법적 면책(Safe Harbor)</text>
  <text x="74" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 금전 보상 없음 — 크레딧/감사 중심</text>
  <text x="74" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• security.txt로 연락처 공개</text>
  <text x="74" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">모든 조직이 최소한 갖춰야 할 출발점</text>
  <text x="74" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">운영 부담 낮음 · 제보 양 적당</text>

  <!-- Bug Bounty -->
  <rect x="460" y="100" width="370" height="250" rx="10" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">버그 바운티</text>
  <text x="645" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Bug Bounty Program</text>
  <line x1="484" y1="172" x2="806" y2="172" stroke="#1d3a26" stroke-width="1"/>
  <text x="484" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 유효 취약점에 위험도별 금전 보상</text>
  <text x="484" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 명시적 범위(scope) · 보상 테이블</text>
  <text x="484" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• HackerOne · Bugcrowd 등 플랫폼 운영</text>
  <text x="484" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 비공개(초대제) → 공개로 확장 가능</text>
  <text x="484" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">상시 다수 연구자의 눈을 빌리는 효과</text>
  <text x="484" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">트리아지 역량 없이 시작하면 제보 폭주에 마비</text>
</svg>
