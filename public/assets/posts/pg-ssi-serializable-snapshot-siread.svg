<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SIREAD Lock — SSI 추적 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">읽기 범위를 기록해 이후 쓰기 충돌 탐지에 사용</text>

  <!-- Left: SIREAD lock types -->
  <rect x="60" y="96" width="340" height="230" rx="8" fill="#111" stroke="#1e2433"/>
  <text x="230" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">SIREAD Lock 단위</text>
  <text x="80" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단위</text>
  <text x="350" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="end">설명</text>
  <line x1="80" y1="158" x2="380" y2="158" stroke="#1e2433"/>
  <text x="80" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">Relation</text>
  <text x="380" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="end">Sequential Scan 시</text>
  <text x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">Page</text>
  <text x="380" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="end">인덱스 페이지 읽기 시</text>
  <text x="80" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">Tuple</text>
  <text x="380" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="end">단일 행 읽기 시</text>
  <line x1="80" y1="232" x2="380" y2="232" stroke="#1e2433"/>
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• SIREAD는 실제 접근 차단 없이</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  읽기 범위만 추적 (Predicate Lock)</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">• 충돌 시 롤백, 재시도 필요</text>

  <!-- Right: SSI settings -->
  <rect x="480" y="96" width="340" height="230" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="490" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- SSI 모드 사용</text>
  <text x="490" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">BEGIN ISOLATION LEVEL</text>
  <text x="490" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  SERIALIZABLE;</text>
  <text x="490" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 관련 GUC 설정</text>
  <text x="490" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">max_pred_locks_per_xact</text>
  <text x="490" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">  = 64  -- 기본값</text>
  <text x="490" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">max_pred_locks_per_page</text>
  <text x="490" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">  = 2   -- 승격 임계</text>
  <text x="490" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">max_pred_locks_per_relation</text>
  <text x="490" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">  = -2  -- Page 락 2배</text>
  <text x="490" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 충돌 후 재시도 패턴</text>

  <!-- Bottom: tradeoffs -->
  <rect x="60" y="344" width="760" height="72" rx="8" fill="#111" stroke="#1e2433"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">SSI 오버헤드와 적용 전략</text>
  <text x="100" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 오버헤드: 메모리(SIREAD 락 테이블) + CPU(사이클 탐지) — 일반적으로 10~15% 수준</text>
  <text x="100" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 재고 차감·당직 배정 등 논리적 불변식이 중요한 곳에 선택적 적용 권장</text>
</svg>
