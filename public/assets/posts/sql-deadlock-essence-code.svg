<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">데드락 감지 · 진단 · 방지 코드</text>

  <!-- Left: Deadlock scenario -->
  <rect x="50" y="56" width="370" height="22" rx="4" fill="#1a1010"/>
  <text x="235" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">데드락 시나리오 재현</text>

  <rect x="50" y="82" width="370" height="252" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="66" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 세션 1</text>
  <text x="66" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">BEGIN<tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">UPDATE<tspan fill="#ffffff"> accounts</tspan></text>
  <text x="66" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  SET<tspan fill="#ffffff"> bal=bal-</tspan><tspan fill="#b5cea8">100</tspan></text>
  <text x="66" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  WHERE<tspan fill="#ffffff"> id=</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#9aa4b8"> -- Row A 잠금</tspan></text>
  <text x="66" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 세션 2 (동시에)</text>
  <text x="66" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">BEGIN<tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">UPDATE<tspan fill="#ffffff"> accounts</tspan></text>
  <text x="66" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  SET<tspan fill="#ffffff"> bal=bal+</tspan><tspan fill="#b5cea8">100</tspan></text>
  <text x="66" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  WHERE<tspan fill="#ffffff"> id=</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#9aa4b8"> -- Row B 잠금</tspan></text>
  <text x="66" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 세션1→id=2, 세션2→id=1 시도</text>
  <text x="66" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">-- ERROR: deadlock detected</text>

  <!-- Right: Diagnosis + Prevention -->
  <rect x="460" y="56" width="370" height="22" rx="4" fill="#0f1a0f"/>
  <text x="645" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">진단 &amp; 방지</text>

  <rect x="460" y="82" width="370" height="252" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- PostgreSQL: 데드락 로그 확인</text>
  <text x="476" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- log_min_messages = log</text>
  <text x="476" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- deadlock_timeout = 1s (기본)</text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- MySQL: 마지막 데드락 확인</text>
  <text x="476" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SHOW ENGINE InnoDB STATUS\G</text>
  <text x="476" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 방지: 잠금 순서 일관화</text>
  <text x="476" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 항상 id 오름차순으로 접근</text>
  <text x="476" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT<tspan fill="#ffffff"> *</tspan></text>
  <text x="476" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM<tspan fill="#ffffff"> accounts</tspan></text>
  <text x="476" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">WHERE<tspan fill="#ffffff"> id </tspan><tspan fill="#7ec8e3">IN</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ORDER BY<tspan fill="#ffffff"> id</tspan></text>
  <text x="476" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FOR UPDATE<tspan fill="#ffffff">;</tspan></text>

  <!-- Bottom -->
  <rect x="50" y="346" width="780" height="24" rx="4" fill="#111118"/>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데드락 발생 시 애플리케이션은 오류를 받고 재시도 로직으로 처리해야 함 (피해자 트랜잭션만 롤백됨)</text>
</svg>
