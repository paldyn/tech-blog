<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 550">
  <rect width="880" height="550" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">분리 체이닝 (Separate Chaining)</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">충돌 발생 시 같은 버킷의 링크드 리스트에 노드를 추가</text>

    <!-- Column headers -->
    <text x="95" y="100" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">버킷</text>
    <text x="310" y="100" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">연결된 노드 (충돌 시 연장)</text>

    <!-- Row 0: bucket[0] → apple → grape → null  (collision) -->
    <rect x="60" y="115" width="70" height="46" fill="#111827" stroke="#e05555" stroke-width="1.5" rx="4"/>
    <text x="95" y="143" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">0</text>
    <line x1="130" y1="138" x2="198" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
    <rect x="200" y="115" width="110" height="46" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="255" y="134" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">apple</text>
    <text x="255" y="151" font-size="11" fill="#888" text-anchor="middle">h("apple")%5=0</text>
    <line x1="310" y1="138" x2="378" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
    <rect x="380" y="115" width="110" height="46" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="435" y="134" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">grape</text>
    <text x="435" y="151" font-size="11" fill="#888" text-anchor="middle">h("grape")%5=0</text>
    <line x1="490" y1="138" x2="548" y2="138" stroke="#555" stroke-width="2" marker-end="url(#arr-gray)"/>
    <text x="556" y="143" font-size="13" fill="#555">null</text>
    <text x="600" y="134" font-size="11" fill="#e05555" font-weight="600">← 충돌!</text>

    <!-- Row 1: bucket[1] → banana → null -->
    <rect x="60" y="185" width="70" height="46" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="95" y="213" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">1</text>
    <line x1="130" y1="208" x2="198" y2="208" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
    <rect x="200" y="185" width="110" height="46" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="255" y="204" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">banana</text>
    <text x="255" y="221" font-size="11" fill="#888" text-anchor="middle">h("banana")%5=1</text>
    <line x1="310" y1="208" x2="348" y2="208" stroke="#555" stroke-width="2" marker-end="url(#arr-gray)"/>
    <text x="356" y="213" font-size="13" fill="#555">null</text>

    <!-- Row 2: bucket[2] → null (empty) -->
    <rect x="60" y="255" width="70" height="46" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="95" y="283" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">2</text>
    <line x1="130" y1="278" x2="148" y2="278" stroke="#555" stroke-width="2" marker-end="url(#arr-gray)"/>
    <text x="156" y="283" font-size="13" fill="#555">null</text>

    <!-- Row 3: bucket[3] → cherry → date → null  (collision) -->
    <rect x="60" y="325" width="70" height="46" fill="#111827" stroke="#e05555" stroke-width="1.5" rx="4"/>
    <text x="95" y="353" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">3</text>
    <line x1="130" y1="348" x2="198" y2="348" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
    <rect x="200" y="325" width="110" height="46" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="255" y="344" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">cherry</text>
    <text x="255" y="361" font-size="11" fill="#888" text-anchor="middle">h("cherry")%5=3</text>
    <line x1="310" y1="348" x2="378" y2="348" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
    <rect x="380" y="325" width="110" height="46" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="435" y="344" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">date</text>
    <text x="435" y="361" font-size="11" fill="#888" text-anchor="middle">h("date")%5=3</text>
    <line x1="490" y1="348" x2="548" y2="348" stroke="#555" stroke-width="2" marker-end="url(#arr-gray)"/>
    <text x="556" y="353" font-size="13" fill="#555">null</text>
    <text x="600" y="344" font-size="11" fill="#e05555" font-weight="600">← 충돌!</text>

    <!-- Row 4: bucket[4] → elderberry → null -->
    <rect x="60" y="395" width="70" height="46" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="95" y="423" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">4</text>
    <line x1="130" y1="418" x2="198" y2="418" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
    <rect x="200" y="395" width="110" height="46" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="255" y="414" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">elderberry</text>
    <text x="255" y="431" font-size="11" fill="#888" text-anchor="middle">h(...)%5=4</text>
    <line x1="310" y1="418" x2="348" y2="418" stroke="#555" stroke-width="2" marker-end="url(#arr-gray)"/>
    <text x="356" y="423" font-size="13" fill="#555">null</text>

    <!-- Bottom note -->
    <rect x="60" y="462" width="760" height="56" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="440" y="484" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">시간복잡도 (부하율 α = n/m)</text>
    <text x="440" y="505" font-size="12" fill="#888" text-anchor="middle">삽입 O(1)  |  검색·삭제 평균 O(1+α), 최악 O(n)  |  공간 O(n+m)</text>
  </g>
</svg>
