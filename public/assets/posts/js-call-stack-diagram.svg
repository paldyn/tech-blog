<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">콜 스택 동작 원리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">함수 호출과 반환에 따른 스택 변화</text>

  <!-- Code block left side -->
  <rect x="60" y="96" width="340" height="260" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 실행 코드</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="152" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> greet(name) {</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  return</text>
  <text x="136" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> "Hello, " + name;</text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="152" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> main() {</text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  const</text>
  <text x="124" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> msg = greet(</text>
  <text x="238" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"JS"</text>
  <text x="276" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  console.log(msg);</text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">main();</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 전역 실행</text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// → main() 호출</text>

  <!-- Stack visualization -->
  <text x="480" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">호출 스택 (peak)</text>

  <!-- Stack frame boxes - stacked from bottom -->
  <!-- Global context (bottom) -->
  <rect x="380" y="340" width="200" height="48" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">전역 컨텍스트</text>
  <text x="480" y="378" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">Global Execution Context</text>

  <!-- main() frame -->
  <rect x="380" y="276" width="200" height="48" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">main()</text>
  <text x="480" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">FEC: main</text>

  <!-- greet() frame (top) -->
  <rect x="380" y="212" width="200" height="48" rx="4" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="480" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">greet("JS")</text>
  <text x="480" y="250" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0">FEC: greet</text>

  <!-- Stack top arrow label -->
  <text x="620" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">← TOP (현재 실행 중)</text>

  <!-- UP arrow indicating stack growth direction -->
  <line x1="480" y1="196" x2="480" y2="136" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="480,120 474,136 486,136" fill="#444"/>
  <text x="490" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">PUSH</text>

  <!-- DOWN arrow -->
  <line x1="480" y1="404" x2="480" y2="456" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="480,472 474,456 486,456" fill="#444"/>
  <text x="490" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">POP (완료 후)</text>

  <!-- Step sequence below -->
  <rect x="60" y="374" width="340" height="100" rx="6" fill="#0d0d1a" stroke="#1e2433"/>
  <text x="230" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">실행 순서</text>
  <text x="76" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">① 전역 컨텍스트 push</text>
  <text x="76" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">② main() 호출 → push</text>
  <text x="76" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">③ greet() 호출 → push</text>
  <text x="230" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">④ greet 반환 → pop</text>
  <text x="230" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">⑤ main 반환 → pop</text>
  <text x="230" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">⑥ 전역 컨텍스트 pop</text>

  <!-- Footer -->
  <text x="440" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
