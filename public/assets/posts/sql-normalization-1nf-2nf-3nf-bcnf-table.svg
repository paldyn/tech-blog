  <text x="375" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e05555">qty</text>

  <rect x="50" y="102" width="370" height="24" fill="#111118"/>
  <text x="100" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">1001</text>
  <text x="185" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">P01</text>
  <text x="270" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">마우스</text>
  <text x="375" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">2</text>

  <rect x="50" y="126" width="370" height="24" fill="#0d0d14"/>
  <text x="100" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">1001</text>
  <text x="185" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">P02</text>
  <text x="270" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">키보드</text>
  <text x="375" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">1</text>

  <rect x="50" y="150" width="370" height="24" fill="#111118"/>
  <text x="100" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">1002</text>
  <text x="185" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">P01</text>
  <text x="270" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">마우스</text>
  <text x="375" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">3</text>

  <rect x="50" y="74" width="370" height="100" fill="none" stroke="#444"/>

  <text x="235" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">product_name은 product_id만으로 결정됨 → 부분 종속!</text>
  <text x="235" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PK=(order_id, product_id) 인데 product_name은 product_id만 있으면 됨</text>

  <!-- Arrow -->
  <polygon points="448,175 460,175 454,189" fill="#55c555"/>
  <text x="454" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#55c555">→</text>
  <text x="454" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">2NF</text>
  <text x="454" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">분해</text>

  <!-- After: Two tables -->
  <text x="680" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">정규화 후 (2NF 만족)</text>

  <!-- order_items table -->
  <text x="630" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">order_items</text>
  <rect x="490" y="94" width="260" height="24" rx="4" fill="#0f1a0f"/>
  <text x="565" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">order_id</text>
  <text x="680" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">product_id</text>
  <text x="780" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">qty</text>

  <rect x="490" y="118" width="260" height="22" fill="#111118"/>
  <text x="565" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">1001</text>
  <text x="680" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">P01</text>
  <text x="780" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">2</text>

  <rect x="490" y="140" width="260" height="22" fill="#0d0d14"/>
  <text x="565" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">1001</text>
  <text x="680" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">P02</text>
  <text x="780" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">1</text>

  <rect x="490" y="94" width="340" height="68" fill="none" stroke="#333"/>

  <!-- products table -->
  <text x="630" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">products</text>
  <rect x="490" y="190" width="260" height="24" rx="4" fill="#0f1a0f"/>
  <text x="590" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">product_id</text>
  <text x="730" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7ec8e3">product_name</text>

  <rect x="490" y="214" width="260" height="22" fill="#111118"/>
  <text x="590" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">P01</text>
  <text x="730" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">마우스</text>

  <rect x="490" y="236" width="260" height="22" fill="#0d0d14"/>
  <text x="590" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">P02</text>
  <text x="730" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">키보드</text>

  <rect x="490" y="190" width="340" height="68" fill="none" stroke="#333"/>
  <text x="660" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">product_name 중복 제거 완료</text>

  <!-- 3NF example at bottom -->
  <rect x="50" y="300" width="780" height="158" rx="8" fill="#111118" stroke="#333"/>
  <text x="440" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">3NF 예시: 이행적 종속 제거</text>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">직원(emp_id, dept_id, dept_name): emp_id → dept_id → dept_name (이행적 종속)</text>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">→ 분리: 직원(emp_id, dept_id) + 부서(dept_id, dept_name)</text>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">BCNF 예시: 수강(학생, 과목, 교수) — 교수 → 과목 인데 교수는 후보키 아님</text>
  <text x="440" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">→ 분리: 강의(교수, 과목) + 수강(학생, 교수)</text>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">BCNF 분해는 무손실(Lossless) 분해여야 하며 종속 보존(Dependency Preservation)이 안 될 수 있음</text>
</svg>
