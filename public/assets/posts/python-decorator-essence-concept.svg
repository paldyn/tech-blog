<svg width="880" height="380" viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">데코레이터 = 함수를 감싸는 함수</text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">@decorator  =  func = decorator(func)  (완전히 동일)</text>
  <!-- Outer dashed box: wrapper -->
  <rect x="100" y="96" width="680" height="224" fill="#0d0d20" rx="8"
        stroke="#7777cc" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="115" y="120"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">wrapper 함수 (데코레이터가 반환)</text>
  <!-- Before label -->
  <text x="440" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">① 전처리 실행 (Before)</text>
  <!-- Inner solid box: original function -->
  <rect x="200" y="170" width="480" height="58" fill="#051005" rx="6"
        stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">원본 함수</text>
  <text x="440" y="213" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">def greet(name): ...</text>
  <!-- After label -->
  <text x="440" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">② 후처리 실행 + 결과 반환 (After)</text>
  <!-- Left input arrow -->
  <line x1="55" y1="199" x2="98" y2="199" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="57" y="192"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">호출</text>
  <!-- Right output arrow -->
  <line x1="782" y1="199" x2="823" y2="199" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="783" y="192"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반환</text>
  <!-- Bottom note -->
  <text x="440" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">decorator(func) 호출 → wrapper 객체 반환 → 이름 재바인딩</text>
</svg>
