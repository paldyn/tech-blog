<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Plot 컴포넌트 구성 요소</text>

  <!-- Plot area -->
  <rect x="60" y="70" width="580" height="340" rx="8" fill="#0f1520" stroke="#2a3040"/>
  <text x="350" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Plot 컴포넌트</text>

  <!-- Title area -->
  <rect x="80" y="104" width="540" height="36" rx="4" fill="#1a2030" stroke="#2a3040"/>
  <text x="350" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">titletext · titlealign · titlefontsize</text>

  <!-- Legend -->
  <rect x="80" y="150" width="100" height="160" rx="4" fill="#1a2030" stroke="#2a3040"/>
  <text x="130" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">범례</text>
  <circle cx="95" cy="194" r="5" fill="#55c555"/>
  <text x="105" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">시리즈1</text>
  <circle cx="95" cy="214" r="5" fill="#7ec8e3"/>
  <text x="105" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">시리즈2</text>
  <circle cx="95" cy="234" r="5" fill="#7777cc"/>
  <text x="105" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">시리즈3</text>

  <!-- Chart area -->
  <rect x="190" y="150" width="430" height="220" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="405" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">차트 영역 (plotarea)</text>
  <!-- Bar chart mockup -->
  <rect x="220" y="290" width="30" height="70" fill="#55c555" opacity="0.8"/>
  <rect x="265" y="260" width="30" height="100" fill="#55c555" opacity="0.8"/>
  <rect x="310" y="310" width="30" height="50" fill="#7ec8e3" opacity="0.8"/>
  <rect x="355" y="230" width="30" height="130" fill="#7ec8e3" opacity="0.8"/>
  <rect x="400" y="280" width="30" height="80" fill="#7777cc" opacity="0.8"/>
  <rect x="445" y="250" width="30" height="110" fill="#7777cc" opacity="0.8"/>
  <!-- Axes -->
  <line x1="210" y1="360" x2="580" y2="360" stroke="#555" stroke-width="1"/>
  <line x1="210" y1="170" x2="210" y2="360" stroke="#555" stroke-width="1"/>

  <!-- X Axis label -->
  <rect x="80" y="320" width="100" height="50" rx="4" fill="#1a2030" stroke="#2a3040"/>
  <text x="130" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">X축 라벨</text>

  <!-- Property panel -->
  <rect x="660" y="70" width="200" height="340" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="760" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">주요 속성</text>
  <text x="676" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">charttype</text>
  <text x="676" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bar/line/pie/area</text>
  <text x="676" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">bindingdataset</text>
  <text x="676" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터셋 바인딩</text>
  <text x="676" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">xcol / ycol</text>
  <text x="676" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">X/Y 축 컬럼명</text>
  <text x="676" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">series</text>
  <text x="676" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">시리즈 컬럼 목록</text>
  <text x="676" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">legendposition</text>
  <text x="676" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">left/right/top</text>
  <text x="676" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">tooltip</text>
  <text x="676" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">마우스오버 툴팁</text>

  <!-- Bind arrow -->
  <line x1="640" y1="240" x2="662" y2="240" stroke="#555" stroke-width="1.5"/>
  <polygon points="660,235 672,240 660,245" fill="#555"/>
</svg>
