<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">팝업 생명주기 이벤트 핸들러 예시</text>

  <!-- Left: onCreate + onInit -->
  <text x="230" y="82" fill="#888" font-size="13" text-anchor="middle">생성·초기화 단계</text>
  <rect x="60" y="92" width="360" height="250" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// onCreate: 컴포넌트 미준비 상태</text>
  <text x="76" y="132" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">this_onCreate</tspan>(obj, e) {</text>
  <text x="76" y="150" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.sMode = <tspan fill="#ce9178">""</tspan>;</text>
  <text x="76" y="168" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="76" y="196" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// onInit: 컴포넌트 사용 가능</text>
  <text x="76" y="214" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">this_onInit</tspan>(obj, e) {</text>
  <text x="76" y="232" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var args = this.getArgs();</text>
  <text x="76" y="250" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  if <tspan fill="#ffffff">(args) {</tspan></text>
  <text x="76" y="268" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    this.sMode = args.mode;</text>
  <text x="76" y="286" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    this.fn_search();</text>
  <text x="76" y="304" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  }</text>
  <text x="76" y="322" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Right: onOpen + onClose + onDestroy -->
  <text x="650" y="82" fill="#888" font-size="13" text-anchor="middle">표시·종료 단계</text>
  <rect x="460" y="92" width="360" height="382" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="114" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// onOpen: 화면 표시 완료 후</text>
  <text x="476" y="132" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">this_onOpen</tspan>(obj, e) {</text>
  <text x="476" y="150" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 포커스 설정</text>
  <text x="476" y="168" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.edt_search.setFocus();</text>
  <text x="476" y="186" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="476" y="214" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// onClose: 닫힘 직전 (취소 가능)</text>
  <text x="476" y="232" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">this_onClose</tspan>(obj, e) {</text>
  <text x="476" y="250" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  if <tspan fill="#ffffff">(this.bDirty) {</tspan></text>
  <text x="476" y="268" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    var r = this.confirm(</text>
  <text x="476" y="286" xml:space="preserve" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      "저장하지 않고 닫겠습니까?");</text>
  <text x="476" y="304" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    if <tspan fill="#ffffff">(!r) </tspan><tspan fill="#7ec8e3">return false</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="322" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  }</text>
  <text x="476" y="340" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="476" y="368" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// onDestroy: 리소스 정리</text>
  <text x="476" y="386" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">this_onDestroy</tspan>(obj, e) {</text>
  <text x="476" y="404" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.ds_temp.clearData();</text>
  <text x="476" y="422" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.bDirty = false;</text>
  <text x="476" y="440" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Left bottom note -->
  <rect x="60" y="360" width="360" height="114" rx="6" fill="#111827" stroke="#374151"/>
  <text x="80" y="382" fill="#7ec8e3" font-size="13" font-weight="600">onInit vs onOpen 차이</text>
  <text x="80" y="402" fill="#e8e8e8" font-size="12">onInit: 렌더 전, DOM 접근 불가</text>
  <text x="80" y="420" fill="#e8e8e8" font-size="12">        → 데이터 로딩·변수 초기화</text>
  <text x="80" y="440" fill="#e8e8e8" font-size="12">onOpen: 렌더 완료, 화면 표시 후</text>
  <text x="80" y="458" fill="#e8e8e8" font-size="12">        → 포커스, 스크롤, 애니메이션</text>
</svg>
