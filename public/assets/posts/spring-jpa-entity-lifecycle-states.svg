<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">JPA 엔티티 생명주기 4단계</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13">비영속 → 영속 → 준영속 → 삭제 · 각 상태의 특성과 전이 방법</text>

  <!-- State boxes -->
  <!-- 1. 비영속 -->
  <rect x="60" y="110" width="170" height="100" rx="10" fill="#1a1510" stroke="#e8b84b" stroke-width="2"/>
  <text x="145" y="150" text-anchor="middle" fill="#e8b84b" font-size="16" font-weight="700">비영속</text>
  <text x="145" y="170" text-anchor="middle" fill="#e8b84b" font-size="12">(New / Transient)</text>
  <text x="145" y="192" text-anchor="middle" fill="#888" font-size="11">JPA 모름</text>
  <text x="145" y="207" text-anchor="middle" fill="#888" font-size="11">DB와 무관</text>

  <!-- 2. 영속 -->
  <rect x="355" y="110" width="170" height="100" rx="10" fill="#0d1a10" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="150" text-anchor="middle" fill="#55c555" font-size="16" font-weight="700">영속</text>
  <text x="440" y="170" text-anchor="middle" fill="#55c555" font-size="12">(Managed)</text>
  <text x="440" y="192" text-anchor="middle" fill="#888" font-size="11">컨텍스트 관리 중</text>
  <text x="440" y="207" text-anchor="middle" fill="#888" font-size="11">Dirty Check 대상</text>

  <!-- 3. 준영속 -->
  <rect x="650" y="110" width="170" height="100" rx="10" fill="#0f1520" stroke="#7777cc" stroke-width="2"/>
  <text x="735" y="150" text-anchor="middle" fill="#7777cc" font-size="16" font-weight="700">준영속</text>
  <text x="735" y="170" text-anchor="middle" fill="#7777cc" font-size="12">(Detached)</text>
  <text x="735" y="192" text-anchor="middle" fill="#888" font-size="11">컨텍스트 분리</text>
  <text x="735" y="207" text-anchor="middle" fill="#888" font-size="11">DB 동기화 중단</text>

  <!-- 4. 삭제 -->
  <rect x="355" y="360" width="170" height="100" rx="10" fill="#1a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="400" text-anchor="middle" fill="#e05555" font-size="16" font-weight="700">삭제</text>
  <text x="440" y="420" text-anchor="middle" fill="#e05555" font-size="12">(Removed)</text>
  <text x="440" y="442" text-anchor="middle" fill="#888" font-size="11">DELETE 예약</text>
  <text x="440" y="457" text-anchor="middle" fill="#888" font-size="11">커밋 시 DB 삭제</text>

  <!-- Arrows -->
  <!-- 비영속 → 영속: persist() -->
  <line x1="230" y1="160" x2="350" y2="160" stroke="#55c555" stroke-width="2"/>
  <polygon points="346,154 358,160 346,166" fill="#55c555"/>
  <text x="290" y="148" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">persist()</text>

  <!-- 영속 → 준영속: detach() / clear() / close() -->
  <line x1="525" y1="160" x2="645" y2="160" stroke="#7777cc" stroke-width="2"/>
  <polygon points="641,154 653,160 641,166" fill="#7777cc"/>
  <text x="585" y="148" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600">detach()</text>
  <text x="585" y="178" text-anchor="middle" fill="#888" font-size="11">clear() / close()</text>

  <!-- 준영속 → 영속: merge() -->
  <line x1="645" y1="175" x2="525" y2="175" stroke="#e8b84b" stroke-width="2"/>
  <polygon points="529,169 517,175 529,181" fill="#e8b84b"/>
  <text x="585" y="200" text-anchor="middle" fill="#e8b84b" font-size="12" font-weight="600">merge()</text>

  <!-- 영속 → 삭제: remove() -->
  <line x1="440" y1="210" x2="440" y2="355" stroke="#e05555" stroke-width="2"/>
  <polygon points="434,351 440,363 446,351" fill="#e05555"/>
  <text x="475" y="290" fill="#e05555" font-size="12" font-weight="600">remove()</text>

  <!-- 삭제 → 비영속 방향 (트랜잭션 커밋 후) -->
  <path d="M 355 450 Q 207 480 145 415" stroke="#888" stroke-width="2" fill="none" stroke-dasharray="5,4"/>
  <polygon points="142,419 140,407 150,413" fill="#888"/>
  <text x="230" y="494" text-anchor="middle" fill="#888" font-size="11">커밋 완료 → 비영속화</text>

  <!-- 비영속 → 영속 (find/DB에서 조회) -->
  <path d="M 145 210 Q 145 300 355 395" stroke="#7ec8e3" stroke-width="2" fill="none" stroke-dasharray="5,4"/>
  <polygon points="351,391 359,398 363,387" fill="#7ec8e3"/>
  <text x="200" y="330" fill="#7ec8e3" font-size="11">new + persist</text>

  <!-- Persistence Context area indicator -->
  <rect x="320" y="95" width="240" height="430" rx="8" fill="none" stroke="#1a2a1a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="480" text-anchor="middle" fill="#2a4a2a" font-size="12">영속성 컨텍스트 내부</text>

  <!-- find() arrow from outside -->
  <path d="M 145 240 C 145 310 355 280 355 360" stroke="#7ec8e3" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <text x="210" y="290" fill="#7ec8e3" font-size="11" text-anchor="middle">find() / JPQL</text>
</svg>
