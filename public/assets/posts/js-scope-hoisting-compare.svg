<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">호이스팅 — var vs let/const vs function</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#555">실행 전 선언부가 위로 끌어올려지는 방식 비교</text>

  <!-- Columns -->
  <!-- var -->
  <rect x="40" y="88" width="250" height="320" rx="10" fill="#1a1410" stroke="#3a2a10" stroke-width="1"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="165" y="114" text-anchor="middle" font-size="15" font-weight="700" fill="#cc8844">var</text>
  <line x1="60" y1="124" x2="270" y2="124" stroke="#3a2a10" stroke-width="1"/>
  <text x="165" y="150" text-anchor="middle" font-size="12" fill="#888">선언 + undefined 초기화</text>
  <text x="165" y="170" text-anchor="middle" font-size="12" fill="#888">코드 실행 전 완료</text>
  <rect x="60" y="186" width="210" height="70" rx="6" fill="#111008"/>
  <text x="165" y="207" text-anchor="middle" font-size="12" fill="#cc8844">console.log(x); // undefined</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="165" y="227" text-anchor="middle" font-size="12" fill="#888">(에러 없음, 값만 없음)</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="165" y="247" text-anchor="middle" font-size="12" fill="#cc8844">var x = 10;</text>
  <text x="165" y="290" text-anchor="middle" font-size="12" fill="#666">함수 스코프</text>
  <text x="165" y="312" text-anchor="middle" font-size="12" fill="#666">블록({})을 무시함</text>
  <rect x="80" y="336" width="170" height="32" rx="6" fill="#2a1800"/>
  <text x="165" y="357" text-anchor="middle" font-size="13" fill="#cc6622" font-weight="600">⚠ 예측하기 어려움</text>

  <!-- let/const -->
  <rect x="315" y="88" width="250" height="320" rx="10" fill="#101a10" stroke="#1a3a1a" stroke-width="1"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="440" y="114" text-anchor="middle" font-size="15" font-weight="700" fill="#44aa66">let / const</text>
  <line x1="335" y1="124" x2="545" y2="124" stroke="#1a3a1a" stroke-width="1"/>
  <text x="440" y="150" text-anchor="middle" font-size="12" fill="#888">선언만 호이스팅</text>
  <text x="440" y="170" text-anchor="middle" font-size="12" fill="#888">초기화는 선언 줄에서</text>
  <rect x="335" y="186" width="210" height="70" rx="6" fill="#08110a"/>
  <text x="440" y="207" text-anchor="middle" font-size="12" fill="#aa4444">console.log(y); // ❌ ReferenceError</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="440" y="227" text-anchor="middle" font-size="12" fill="#888">(TDZ: 일시적 사각지대)</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="440" y="247" text-anchor="middle" font-size="12" fill="#44aa66">let y = 20;</text>
  <text x="440" y="290" text-anchor="middle" font-size="12" fill="#666">블록 스코프</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="440" y="312" text-anchor="middle" font-size="12" fill="#666">{} 안에서만 유효</text>
  <rect x="355" y="336" width="170" height="32" rx="6" fill="#082000"/>
  <text x="440" y="357" text-anchor="middle" font-size="13" fill="#44cc66" font-weight="600">✓ 예측 가능, 권장</text>

  <!-- function -->
  <rect x="590" y="88" width="250" height="320" rx="10" fill="#10101a" stroke="#1a1a3a" stroke-width="1"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="715" y="114" text-anchor="middle" font-size="15" font-weight="700" fill="#6688cc">function 선언식</text>
  <line x1="610" y1="124" x2="820" y2="124" stroke="#1a1a3a" stroke-width="1"/>
  <text x="715" y="150" text-anchor="middle" font-size="12" fill="#888">선언 + 함수 전체 호이스팅</text>
  <text x="715" y="170" text-anchor="middle" font-size="12" fill="#888">코드 실행 전 완료</text>
  <rect x="610" y="186" width="210" height="70" rx="6" fill="#08081a"/>
  <text x="715" y="207" text-anchor="middle" font-size="12" fill="#44aa66">greet(); // ✓ "안녕!"</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="715" y="227" text-anchor="middle" font-size="12" fill="#888">(선언 전에 호출 가능)</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="715" y="247" text-anchor="middle" font-size="12" fill="#6688cc">function greet() {...}</text>
  <text x="715" y="290" text-anchor="middle" font-size="12" fill="#666">함수 스코프</text>
  <text x="715" y="312" text-anchor="middle" font-size="12" fill="#666">전체가 먼저 등록됨</text>
  <rect x="630" y="336" width="170" height="32" rx="6" fill="#001030"/>
  <text x="715" y="357" text-anchor="middle" font-size="13" fill="#6688cc" font-weight="600">유용하지만 주의 필요</text>

  <text x="440" y="430" text-anchor="middle" font-size="11" fill="#444">ES6부터는 let/const를 기본으로 사용하고, var는 레거시 코드에서만 접하는 것을 권장</text>
</svg>
