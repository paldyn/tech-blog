<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PE를 더하는 과정 — 토큰 임베딩 + 위치 정보</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">두 행렬을 element-wise 합산, shape 변화 없음</text>

  <!-- Step 1: Token IDs -->
  <rect x="50" y="96" width="160" height="90" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Token IDs</text>
  <text x="130" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">["나는", "AI를",</text>
  <text x="130" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">"공부한다"]</text>
  <text x="130" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">shape: (3,)</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="141" x2="248" y2="141" stroke="#444" stroke-width="2"/>
  <polygon points="248,135 260,141 248,147" fill="#444"/>
  <text x="234" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">embed</text>

  <!-- Step 2: Token Embedding -->
  <rect x="260" y="96" width="160" height="130" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="340" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Token Embedding</text>
  <!-- matrix visualization -->
  <rect x="275" y="132" width="130" height="18" fill="#1a1f35" rx="2"/>
  <text x="340" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" text-anchor="middle">0.12  -0.34  0.87 ...</text>
  <rect x="275" y="154" width="130" height="18" fill="#151a2e" rx="2"/>
  <text x="340" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" text-anchor="middle">-0.45  0.67 -0.23 ...</text>
  <rect x="275" y="176" width="130" height="18" fill="#1a1f35" rx="2"/>
  <text x="340" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" text-anchor="middle">0.33  0.11  -0.88 ...</text>
  <text x="340" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">shape: (3, d_model)</text>

  <!-- Plus sign -->
  <text x="440" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="32" font-weight="700" fill="#55c555" text-anchor="middle">+</text>

  <!-- Step 3: Positional Encoding -->
  <rect x="460" y="96" width="160" height="130" fill="#111827" rx="8" stroke="#ce9178" stroke-width="1"/>
  <text x="540" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Positional Encoding</text>
  <rect x="475" y="132" width="130" height="18" fill="#1a1200" rx="2"/>
  <text x="540" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">sin(0)  cos(0)  sin(0) ...</text>
  <rect x="475" y="154" width="130" height="18" fill="#150e00" rx="2"/>
  <text x="540" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">sin(1)  cos(1)  sin(.) ...</text>
  <rect x="475" y="176" width="130" height="18" fill="#1a1200" rx="2"/>
  <text x="540" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">sin(2)  cos(2)  sin(.) ...</text>
  <text x="540" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">shape: (3, d_model)</text>

  <!-- Equals sign -->
  <text x="640" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="32" font-weight="700" fill="#888" text-anchor="middle">=</text>

  <!-- Step 4: Result -->
  <rect x="660" y="96" width="170" height="130" fill="#111827" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="745" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Transformer 입력</text>
  <rect x="675" y="132" width="140" height="18" fill="#0a1a0a" rx="2"/>
  <text x="745" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">0.12  -0.34  0.87 ...</text>
  <rect x="675" y="154" width="140" height="18" fill="#071007" rx="2"/>
  <text x="745" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">0.39   1.55  0.55 ...</text>
  <rect x="675" y="176" width="140" height="18" fill="#0a1a0a" rx="2"/>
  <text x="745" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">1.24   0.12 -0.96 ...</text>
  <text x="745" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">shape: (3, d_model)</text>

  <!-- Code block -->
  <rect x="50" y="260" width="780" height="180" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># PyTorch Positional Encoding 구현</text>
  <text x="66" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import </text>
  <text x="120" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">torch, math</text>
  <text x="66" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">def </text>
  <text x="96" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">positional_encoding(seq_len, d_model):</text>
  <text x="66" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    pe = torch.zeros(seq_len, d_model)</text>
  <text x="66" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    pos = torch.arange(seq_len).unsqueeze(</text>
  <text x="416" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text>
  <text x="424" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="66" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    div = torch.exp(torch.arange(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, d_model, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">) * -(math.log(</tspan><tspan fill="#b5cea8">10000.0</tspan><tspan fill="#ffffff">) / d_model))</tspan></text>

  <text x="66" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    pe[:, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">::</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">] = torch.sin(pos * div);   pe[:, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">::</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">] = torch.cos(pos * div)</tspan></text>

  <text x="66" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return </tspan><tspan fill="#ffffff">pe</tspan></text>
  
  <text x="66" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">                    </text>
</svg>
