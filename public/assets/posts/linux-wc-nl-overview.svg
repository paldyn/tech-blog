<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">wc · nl — 줄/단어/문자 세기와 행 번호</text>

  <!-- wc section -->
  <rect x="60" y="68" width="360" height="200" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">wc (word count)</text>

  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">출력 형식: 줄 수  단어 수  바이트 수  파일명</text>

  <rect x="80" y="132" width="50" height="26" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="105" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">-l</text>
  <text x="144" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">줄 수 (lines)</text>

  <rect x="80" y="166" width="50" height="26" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="105" y="184" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">-w</text>
  <text x="144" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">단어 수 (words)</text>

  <rect x="80" y="200" width="50" height="26" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="105" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">-c</text>
  <text x="144" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">바이트 수 (bytes)</text>

  <rect x="80" y="234" width="50" height="26" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="105" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">-m</text>
  <text x="144" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">문자 수 (multibyte 포함)</text>

  <!-- nl section -->
  <rect x="460" y="68" width="360" height="200" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">nl (number lines)</text>

  <text x="480" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">줄 번호를 붙여 출력 (cat -n 과 유사)</text>

  <rect x="480" y="132" width="70" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-ba</text>
  <text x="564" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">빈 줄 포함 모든 줄에 번호</text>

  <rect x="480" y="166" width="70" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="184" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-bt</text>
  <text x="564" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">비어 있지 않은 줄만 번호 (기본)</text>

  <rect x="480" y="200" width="70" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-v N</text>
  <text x="564" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">시작 번호 지정 (기본 1)</text>

  <rect x="480" y="234" width="70" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-i N</text>
  <text x="564" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">증가량 지정 (기본 1)</text>

  <!-- wc output anatomy -->
  <text x="60" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">wc 출력 필드 해부</text>

  <rect x="60" y="322" width="760" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#ffffff" xml:space="preserve">     42    156    1024  /var/log/syslog</text>

  <!-- annotations -->
  <line x1="84" y1="360" x2="84" y2="382" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="74" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">줄 수</text>

  <line x1="150" y1="360" x2="150" y2="382" stroke="#55c555" stroke-width="1.5"/>
  <text x="135" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">단어 수</text>

  <line x1="222" y1="360" x2="222" y2="382" stroke="#ce9178" stroke-width="1.5"/>
  <text x="202" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">바이트 수</text>

  <line x1="348" y1="360" x2="348" y2="382" stroke="#888" stroke-width="1.5"/>
  <text x="318" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일명</text>
</svg>
