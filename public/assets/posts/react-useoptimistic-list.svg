<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">낙관적 리스트 업데이트 패턴</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">항목 추가 시 서버 응답 전에 미리 표시</text>

  <!-- Left code: action and optimistic -->
  <rect x="60" y="94" width="380" height="360" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 할 일 추가 컴포넌트</text>
  <text x="76" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> TodoList() &#123;</text>
  <text x="76" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> [todos, setTodos] = useState(initialTodos);</text>
  <text x="76" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> [optimisticTodos, addOptimisticTodo] =</text>
  <text x="76" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    useOptimistic(</text>
  <text x="76" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      todos,</text>
  <text x="76" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      (state, newTodo) =&gt; [...state, newTodo]</text>
  <text x="76" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    );</text>
  <text x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">async function</tspan> addTodoAction(formData) &#123;</text>
  <text x="76" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">const</tspan> text = formData.get(<tspan fill="#ce9178">'todo'</tspan>);</text>
  <text x="76" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">const</tspan> tempTodo = &#123; id: Date.now(), text,</text>
  <text x="76" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      sending: <tspan fill="#b5cea8">true</tspan> &#125;;</text>
  <text x="76" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    addOptimisticTodo(tempTodo); <tspan fill="#9aa4b8">// 즉시 표시</tspan></text>
  <text x="76" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">const</tspan> saved = <tspan fill="#7ec8e3" font-weight="600">await</tspan> saveTodo(text);</text>
  <text x="76" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    setTodos(t =&gt; [...t, saved]); <tspan fill="#9aa4b8">// 서버 응답 반영</tspan></text>
  <text x="76" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  &#125;</text>
  <text x="76" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> (</text>
  <text x="76" y="419" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;&gt;</text>
  <text x="76" y="437" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &#123;optimisticTodos.map(todo =&gt; (</text>
  <text x="76" y="455" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        &lt;<tspan fill="#7ec8e3" font-weight="600">li</tspan> style=&#123;&#123;opacity: todo.sending ? <tspan fill="#b5cea8">0.5</tspan> : <tspan fill="#b5cea8">1</tspan>&#125;&#125;&gt;</text>

  <!-- Right: UI states -->
  <rect x="460" y="94" width="360" height="160" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">낙관적 상태 (sending: true)</text>
  <text x="476" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 새 항목이 즉시 목록에 표시됨</text>
  <text x="476" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• opacity 0.5로 "전송 중" 시각화</text>
  <text x="476" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 사용자는 바로 결과를 볼 수 있음</text>
  <text x="476" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 서버 요청은 백그라운드에서 진행</text>
  <text x="476" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• optimisticTodos를 렌더에 사용</text>
  <text x="476" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  (todos 직접 사용 X)</text>

  <rect x="460" y="270" width="360" height="184" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">rollback 동작 원리</text>
  <text x="476" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• action 내부에서 에러 throw 시</text>
  <text x="476" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• React가 optimisticState를</text>
  <text x="476" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  원래 state로 자동 복원</text>
  <text x="476" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• setTodos를 따로 호출할 필요 없음</text>
  <text x="476" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• ErrorBoundary가 에러를 처리</text>
  <text x="476" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 성공 시: setTodos(confirmed)</text>
  <text x="476" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  로 서버 확정 값으로 교체</text>
  <text x="476" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  (임시 항목 대체)</text>
</svg>
