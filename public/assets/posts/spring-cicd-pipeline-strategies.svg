<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">배포 전략 비교: 롤링 vs 블루/그린 vs 카나리</text>

  <!-- 롤링 배포 -->
  <text x="145" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">롤링(Rolling)</text>

  <rect x="40" y="100" width="70" height="40" rx="5" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="75" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">v1</text>

  <rect x="120" y="100" width="70" height="40" rx="5" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="155" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">v1</text>

  <rect x="200" y="100" width="70" height="40" rx="5" fill="#0a1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="235" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">v2</text>

  <text x="145" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">v1·v2 혼재 → 순차 교체</text>

  <rect x="40" y="172" width="70" height="40" rx="5" fill="#0a1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="75" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">v2</text>
  <rect x="120" y="172" width="70" height="40" rx="5" fill="#0a1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="155" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">v2</text>
  <rect x="200" y="172" width="70" height="40" rx="5" fill="#0a1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="235" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">v2</text>

  <text x="145" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">완료: 추가 리소스 불필요</text>

  <!-- 구분선 -->
  <line x1="305" y1="76" x2="305" y2="260" stroke="#333" stroke-width="1"/>

  <!-- 블루/그린 배포 -->
  <text x="460" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">블루/그린(Blue/Green)</text>

  <!-- Blue(live) -->
  <rect x="320" y="100" width="130" height="60" rx="5" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="385" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Blue (v1, Live)</text>
  <text x="385" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">트래픽 수신 중</text>

  <!-- Green(new) -->
  <rect x="480" y="100" width="130" height="60" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="545" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Green (v2, New)</text>
  <text x="545" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대기 중</text>

  <!-- 스위치 화살표 -->
  <path d="M 385 160 Q 385 192 545 192 L 545 160" fill="none" stroke="#7ec8e3" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="465" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">트래픽 전환 (즉시)</text>

  <text x="460" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">장점: 즉시 롤백 가능 / 단점: 2배 리소스</text>

  <!-- 구분선 -->
  <line x1="640" y1="76" x2="640" y2="260" stroke="#333" stroke-width="1"/>

  <!-- 카나리 배포 -->
  <text x="755" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178" text-anchor="middle">카나리(Canary)</text>

  <rect x="650" y="100" width="110" height="60" rx="5" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">v1 (90%)</text>
  <text x="705" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기존 트래픽</text>

  <rect x="770" y="100" width="70" height="60" rx="5" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="805" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">v2</text>
  <text x="805" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">10%</text>

  <text x="755" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">점진적 트래픽 증가</text>
  <text x="755" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">10% → 50% → 100%</text>
  <text x="755" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">메트릭 이상 시 즉시 중단</text>

  <!-- 구분선 수평 -->
  <line x1="40" y1="260" x2="840" y2="260" stroke="#222" stroke-width="1"/>

  <!-- 코드 박스: GitHub Actions deploy step -->
  <rect x="40" y="278" width="800" height="250" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># GitHub Actions: Docker 빌드 + ECR 푸시</text>
  <text x="60" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      - name: Configure AWS credentials</text>
  <text x="60" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        uses: aws-actions/configure-aws-credentials@v4</text>
  <text x="60" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        with:</text>
  <text x="60" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}</text>
  <text x="60" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      - name: Build &amp; push image</text>
  <text x="60" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">        run</text>
  <text x="104" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: |</text>
  <text x="60" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          docker build -t $ECR_REPO:$SHA .</text>
  <text x="60" y="462" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          docker push $ECR_REPO:$SHA</text>
  <text x="60" y="482" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">          # ECS task def 업데이트 후 서비스 배포</text>
  <text x="60" y="502" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          aws ecs update-service --force-new-deployment</text>
</svg>
