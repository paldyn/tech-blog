<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">단계별 정리 전략</text>

  <!-- Step 1 -->
  <rect x="60" y="70" width="360" height="90" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">STEP 1 — 현황 파악</text>
  <rect x="76" y="104" width="328" height="44" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">docker system df -v</text>
  <text x="92" y="141" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">df -h /var/lib/docker</text>

  <!-- Step 2 -->
  <rect x="460" y="70" width="360" height="90" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">STEP 2 — 정지된 컨테이너 제거</text>
  <rect x="476" y="104" width="328" height="44" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">docker container prune -f</text>
  <text x="492" y="141" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 실행 중 컨테이너는 유지됨</text>

  <!-- Step 3 -->
  <rect x="60" y="190" width="360" height="90" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">STEP 3 — dangling 이미지 정리</text>
  <rect x="76" y="224" width="328" height="44" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">docker image prune -f</text>
  <text x="92" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 태그 없는 이미지만 삭제</text>

  <!-- Step 4 -->
  <rect x="460" y="190" width="360" height="90" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">STEP 4 — 미사용 이미지 정리</text>
  <rect x="476" y="224" width="328" height="44" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">docker image prune -a -f</text>
  <text x="492" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 컨테이너에서 안 쓰는 이미지 삭제</text>

  <!-- Warning box -->
  <rect x="60" y="310" width="360" height="100" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">주의 — 볼륨 정리</text>
  <text x="240" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">볼륨은 데이터를 담으므로 신중하게</text>
  <rect x="76" y="368" width="328" height="30" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">docker volume prune -f  # 위험!</text>

  <!-- Auto cleanup tip -->
  <rect x="460" y="310" width="360" height="100" rx="8" fill="#0a1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">예방 — 로그 크기 제한</text>
  <text x="640" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/etc/docker/daemon.json 설정</text>
  <rect x="476" y="368" width="328" height="30" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">"log-opts": {"max-size": "10m"}</text>
</svg>
