<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" role="img" aria-label="Dockerfile 전체 구조">
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Dockerfile 전체 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">각 인스트럭션의 역할과 실행 순서</text>

  <!-- Dockerfile document column -->
  <rect x="60" y="100" width="360" height="400" rx="8" fill="#111318" stroke="#2a2d3a" stroke-width="1"/>
  <rect x="60" y="100" width="360" height="32" rx="8" fill="#1a1d26"/>
  <rect x="60" y="120" width="360" height="12" rx="0" fill="#1a1d26"/>
  <text x="240" y="121" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">Dockerfile</text>

  <!-- Instructions list -->
  <!-- FROM -->
  <rect x="76" y="145" width="328" height="34" rx="4" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="92" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="140" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> node:20-alpine</text>

  <!-- ARG -->
  <rect x="76" y="186" width="328" height="34" rx="4" fill="#0d1a0d" stroke="#1e3d1e" stroke-width="1"/>
  <text x="92" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ARG</text>
  <text x="126" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> APP_PORT=3000</text>

  <!-- ENV -->
  <rect x="76" y="227" width="328" height="34" rx="4" fill="#0d1a0d" stroke="#1e3d1e" stroke-width="1"/>
  <text x="92" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ENV</text>
  <text x="126" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> NODE_ENV=production</text>

  <!-- WORKDIR -->
  <rect x="76" y="268" width="328" height="34" rx="4" fill="#1a100d" stroke="#3d2a1e" stroke-width="1"/>
  <text x="92" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">WORKDIR</text>
  <text x="168" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> /app</text>

  <!-- COPY -->
  <rect x="76" y="309" width="328" height="34" rx="4" fill="#1a100d" stroke="#3d2a1e" stroke-width="1"/>
  <text x="92" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">COPY</text>
  <text x="140" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> . .</text>

  <!-- RUN -->
  <rect x="76" y="350" width="328" height="34" rx="4" fill="#1a1410" stroke="#3d301e" stroke-width="1"/>
  <text x="92" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="126" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> npm ci --omit=dev</text>

  <!-- EXPOSE -->
  <rect x="76" y="391" width="328" height="34" rx="4" fill="#0d0d1a" stroke="#1e1e3d" stroke-width="1"/>
  <text x="92" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">EXPOSE</text>
  <text x="162" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve"> 3000</text>

  <!-- CMD -->
  <rect x="76" y="432" width="328" height="34" rx="4" fill="#0d0d1a" stroke="#1e1e3d" stroke-width="1"/>
  <text x="92" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">CMD</text>
  <text x="126" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> ["node","server.js"]</text>

  <!-- Right side: labels -->
  <!-- FROM label -->
  <line x1="460" y1="162" x2="510" y2="162" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="510" y="146" width="290" height="32" rx="6" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="522" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" dominant-baseline="middle">베이스 이미지 지정 (필수·1번째 줄)</text>

  <!-- ARG label -->
  <line x1="460" y1="203" x2="510" y2="203" stroke="#1e3d1e" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="510" y="187" width="290" height="32" rx="6" fill="#0d1a0d" stroke="#1e3d1e" stroke-width="1"/>
  <text x="522" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" dominant-baseline="middle">빌드 타임 인수 (이미지에 미포함)</text>

  <!-- ENV label -->
  <line x1="460" y1="244" x2="510" y2="244" stroke="#1e3d1e" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="510" y="228" width="290" height="32" rx="6" fill="#0d1a0d" stroke="#1e3d1e" stroke-width="1"/>
  <text x="522" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" dominant-baseline="middle">런타임 환경 변수 (이미지에 포함)</text>

  <!-- WORKDIR label -->
  <line x1="460" y1="285" x2="510" y2="285" stroke="#3d2a1e" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="510" y="269" width="290" height="32" rx="6" fill="#1a100d" stroke="#3d2a1e" stroke-width="1"/>
  <text x="522" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" dominant-baseline="middle">이후 명령의 작업 디렉터리 설정</text>

  <!-- COPY label -->
  <line x1="460" y1="326" x2="510" y2="326" stroke="#3d2a1e" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="510" y="310" width="290" height="32" rx="6" fill="#1a100d" stroke="#3d2a1e" stroke-width="1"/>
  <text x="522" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" dominant-baseline="middle">빌드 컨텍스트 → 이미지 파일 복사</text>

  <!-- RUN label -->
  <line x1="460" y1="367" x2="510" y2="367" stroke="#3d301e" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="510" y="351" width="290" height="32" rx="6" fill="#1a1410" stroke="#3d301e" stroke-width="1"/>
  <text x="522" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" dominant-baseline="middle">빌드 시 셸 명령 실행 → 레이어 생성</text>

  <!-- EXPOSE label -->
  <line x1="460" y1="408" x2="510" y2="408" stroke="#1e1e3d" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="510" y="392" width="290" height="32" rx="6" fill="#0d0d1a" stroke="#1e1e3d" stroke-width="1"/>
  <text x="522" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" dominant-baseline="middle">포트 문서화 (실제 바인딩 아님)</text>

  <!-- CMD label -->
  <line x1="460" y1="449" x2="510" y2="449" stroke="#1e1e3d" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="510" y="433" width="290" height="32" rx="6" fill="#0d0d1a" stroke="#1e1e3d" stroke-width="1"/>
  <text x="522" y="449" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" dominant-baseline="middle">컨테이너 기본 실행 명령</text>

  <!-- Bottom note -->
  <text x="440" y="520" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">인스트럭션은 대소문자를 구분하지 않지만 관례상 대문자로 작성</text>
</svg>
