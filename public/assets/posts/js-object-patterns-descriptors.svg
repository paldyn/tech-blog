<svg viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }</style>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" fill="#e8e8e8" font-size="18" font-weight="600" text-anchor="middle">프로퍼티 디스크립터 &amp; 객체 불변성</text>
  <line x1="40" y1="54" x2="840" y2="54" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Left: Descriptor attributes -->
  <rect x="20" y="66" width="415" height="295" fill="#111" rx="8"/>
  <text x="227" y="90" fill="#c4b5fd" font-size="13" font-weight="600" text-anchor="middle">프로퍼티 디스크립터</text>
  <line x1="36" y1="98" x2="419" y2="98" stroke="#1e1e1e" stroke-width="1"/>

  <text x="36" y="118" fill="#888" font-size="11">Object.getOwnPropertyDescriptor(obj, 'key')</text>

  <!-- Descriptor table -->
  <rect x="36" y="126" width="383" height="140" fill="#0d0d0d" rx="5"/>

  <!-- Headers -->
  <text x="52" y="144" fill="#555" font-size="10">속성</text>
  <text x="170" y="144" fill="#555" font-size="10">기본값</text>
  <text x="260" y="144" fill="#555" font-size="10">의미</text>
  <line x1="48" y1="148" x2="412" y2="148" stroke="#1a1a1a" stroke-width="1"/>

  <text x="52" y="164" fill="#fbbf24" font-size="11" font-family="monospace, 'Courier New'">value</text>
  <text x="170" y="164" fill="#888" font-size="10">undefined</text>
  <text x="260" y="164" fill="#888" font-size="10">실제 저장된 값</text>

  <text x="52" y="182" fill="#fbbf24" font-size="11" font-family="monospace, 'Courier New'">writable</text>
  <text x="170" y="182" fill="#86efac" font-size="10">true</text>
  <text x="260" y="182" fill="#888" font-size="10">값 변경 가능 여부</text>

  <text x="52" y="200" fill="#fbbf24" font-size="11" font-family="monospace, 'Courier New'">enumerable</text>
  <text x="170" y="200" fill="#86efac" font-size="10">true</text>
  <text x="260" y="200" fill="#888" font-size="10">for...in · 스프레드 노출 여부</text>

  <text x="52" y="218" fill="#fbbf24" font-size="11" font-family="monospace, 'Courier New'">configurable</text>
  <text x="170" y="218" fill="#86efac" font-size="10">true</text>
  <text x="260" y="218" fill="#888" font-size="10">삭제·재정의 가능 여부</text>

  <text x="52" y="236" fill="#7dd3fc" font-size="11" font-family="monospace, 'Courier New'">get / set</text>
  <text x="170" y="236" fill="#888" font-size="10">undefined</text>
  <text x="260" y="236" fill="#888" font-size="10">게터/세터 함수</text>

  <text x="36" y="282" fill="#888" font-size="11">직접 정의:</text>
  <rect x="36" y="290" width="383" height="30" fill="#0d0d0d" rx="4"/>
  <text x="48" y="309" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">Object.defineProperty(obj, 'PI', { value: 3.14, writable: false })</text>

  <text x="36" y="340" fill="#555" font-size="10">writable: false + configurable: false → 사실상 상수</text>
  <text x="36" y="356" fill="#555" font-size="10">enumerable: false → 스프레드 · JSON.stringify 에서 제외</text>

  <!-- Right: freeze / seal -->
  <rect x="451" y="66" width="409" height="295" fill="#111" rx="8"/>
  <text x="655" y="90" fill="#f87171" font-size="13" font-weight="600" text-anchor="middle">객체 불변성 제어</text>
  <line x1="467" y1="98" x2="844" y2="98" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Comparison: none / seal / freeze -->
  <!-- Headers -->
  <text x="467" y="118" fill="#555" font-size="10">기능</text>
  <text x="590" y="118" fill="#fbbf24" font-size="10">seal()</text>
  <text x="690" y="118" fill="#f87171" font-size="10">freeze()</text>
  <line x1="467" y1="122" x2="844" y2="122" stroke="#1a1a1a" stroke-width="1"/>

  <text x="467" y="140" fill="#888" font-size="11">프로퍼티 추가</text>
  <text x="590" y="140" fill="#f87171" font-size="12" text-anchor="middle">✗</text>
  <text x="700" y="140" fill="#f87171" font-size="12" text-anchor="middle">✗</text>

  <text x="467" y="160" fill="#888" font-size="11">프로퍼티 삭제</text>
  <text x="590" y="160" fill="#f87171" font-size="12" text-anchor="middle">✗</text>
  <text x="700" y="160" fill="#f87171" font-size="12" text-anchor="middle">✗</text>

  <text x="467" y="180" fill="#888" font-size="11">값 변경</text>
  <text x="590" y="180" fill="#86efac" font-size="12" text-anchor="middle">✓</text>
  <text x="700" y="180" fill="#f87171" font-size="12" text-anchor="middle">✗</text>

  <text x="467" y="200" fill="#888" font-size="11">프로토타입 변경</text>
  <text x="590" y="200" fill="#f87171" font-size="12" text-anchor="middle">✗</text>
  <text x="700" y="200" fill="#f87171" font-size="12" text-anchor="middle">✗</text>

  <line x1="467" y1="210" x2="844" y2="210" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="467" y="220" width="370" height="52" fill="#0d0d0d" rx="4"/>
  <text x="479" y="238" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const cfg = Object.freeze({ host: 'api.dev', port: 443 })</text>
  <text x="479" y="256" fill="#555" font-size="11" font-family="monospace, 'Courier New'">cfg.port = 80  <tspan fill="#f87171">// strict mode: TypeError, 아니면 무시</tspan></text>

  <text x="467" y="290" fill="#555" font-size="10">freeze는 얕은 동결 — 중첩 객체는 여전히 변경 가능</text>
  <text x="467" y="308" fill="#555" font-size="10">깊은 동결이 필요하면 재귀 적용 또는 Immer 라이브러리 사용</text>
  <text x="467" y="326" fill="#555" font-size="10">isFrozen() · isSealed() · isExtensible() 로 상태 확인 가능</text>
  <text x="467" y="344" fill="#555" font-size="10">상수 설정 객체, 열거형 대용으로 자주 사용</text>

  <!-- Bottom: Getter/Setter -->
  <rect x="20" y="374" width="840" height="84" fill="#111" rx="8"/>
  <text x="440" y="396" fill="#7dd3fc" font-size="12" font-weight="600" text-anchor="middle">게터 / 세터</text>

  <rect x="36" y="404" width="808" height="44" fill="#0d0d0d" rx="4"/>
  <text x="48" y="422" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const circle = { radius: 5,  <tspan fill="#7dd3fc">get</tspan> area() { return Math.PI * this.radius ** 2 },  <tspan fill="#86efac">set</tspan> diameter(d) { this.radius = d / 2 } }</text>
  <text x="48" y="440" fill="#555" font-size="11" font-family="monospace, 'Courier New'">circle.area       <tspan fill="#555">// 78.53...  호출처럼 보이지만 get 접두사가 있어 ()없이 프로퍼티처럼 접근</tspan></text>
</svg>
