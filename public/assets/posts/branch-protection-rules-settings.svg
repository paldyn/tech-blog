<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Branch Protection Rules 주요 옵션</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">GitHub Settings → Branches → Add branch ruleset</text>

  <!-- Left column: options list -->
  <rect x="40" y="90" width="400" height="370" rx="8" fill="#0d1220" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">보호 규칙 목록</text>

  <!-- Option rows -->
  <!-- Row 1 -->
  <rect x="56" y="126" width="14" height="14" rx="3" fill="#55c555"/>
  <text x="78" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Require a pull request before merging</text>
  <text x="78" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">직접 push 금지, PR 경유 필수</text>

  <!-- Row 2 -->
  <rect x="56" y="170" width="14" height="14" rx="3" fill="#55c555"/>
  <text x="78" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Required approvals: 1</text>
  <text x="78" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Approve 수 1명 이상 필요</text>

  <!-- Row 3 -->
  <rect x="56" y="214" width="14" height="14" rx="3" fill="#55c555"/>
  <text x="78" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Require status checks to pass</text>
  <text x="78" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">지정 CI 체크 통과 후 머지 가능</text>

  <!-- Row 4 -->
  <rect x="56" y="258" width="14" height="14" rx="3" fill="#55c555"/>
  <text x="78" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Require branches to be up to date</text>
  <text x="78" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">머지 전 base 브랜치 최신화 필수</text>

  <!-- Row 5 -->
  <rect x="56" y="302" width="14" height="14" rx="3" fill="#7777cc"/>
  <text x="78" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Require signed commits</text>
  <text x="78" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GPG/SSH 서명된 커밋만 허용</text>

  <!-- Row 6 -->
  <rect x="56" y="346" width="14" height="14" rx="3" fill="#7777cc"/>
  <text x="78" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Restrict who can push</text>
  <text x="78" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">특정 팀/사용자만 push 허용</text>

  <!-- Row 7 -->
  <rect x="56" y="390" width="14" height="14" rx="3" fill="#7777cc"/>
  <text x="78" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">Require linear history</text>
  <text x="78" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">머지 커밋 금지, rebase/squash만 허용</text>

  <!-- Legend -->
  <rect x="56" y="438" width="10" height="10" rx="2" fill="#55c555"/>
  <text x="70" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">권장 (main 기본)</text>
  <rect x="180" y="438" width="10" height="10" rx="2" fill="#7777cc"/>
  <text x="194" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">팀 상황에 따라</text>

  <!-- Right column: push flow diagram -->
  <rect x="460" y="90" width="380" height="370" rx="8" fill="#0d1220" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="650" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">보호된 브랜치로 머지 흐름</text>

  <!-- Flow boxes -->
  <rect x="530" y="128" width="240" height="36" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="650" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">feature 브랜치에서 작업</text>

  <line x1="650" y1="164" x2="650" y2="186" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <rect x="530" y="192" width="240" height="36" rx="6" fill="#111" stroke="#555" stroke-width="1.2"/>
  <text x="650" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">PR 생성 → CI 자동 실행</text>

  <line x1="650" y1="228" x2="650" y2="250" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- CI Check -->
  <rect x="530" y="256" width="240" height="36" rx="6" fill="#071a07" stroke="#55c555" stroke-width="1.2"/>
  <text x="650" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ CI 통과</text>

  <line x1="650" y1="292" x2="650" y2="314" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- Review -->
  <rect x="530" y="320" width="240" height="36" rx="6" fill="#071a07" stroke="#55c555" stroke-width="1.2"/>
  <text x="650" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 리뷰 Approve (1명 이상)</text>

  <line x1="650" y1="356" x2="650" y2="378" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr-w)"/>

  <!-- Merge -->
  <rect x="530" y="384" width="240" height="36" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">머지 버튼 활성화</text>

  <!-- Fail path label -->
  <text x="480" y="275" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">✗ 실패 시</text>
  <text x="480" y="291" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">머지 차단</text>

  <!-- Footer -->
  <text x="440" y="478" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">관리자(admin)는 bypass 가능 — Rulesets의 bypass list에서 제어</text>
</svg>
