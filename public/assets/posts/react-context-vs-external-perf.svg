<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Context vs Zustand 렌더링 차이</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">상태 변경 시 어떤 컴포넌트가 re-render되는가</text>

  <!-- Context side -->
  <text x="220" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Context: 소비자 전체 re-render</text>

  <!-- Provider -->
  <rect x="160" y="118" width="120" height="40" rx="6" fill="#2a1a0d" stroke="#e05555" stroke-width="2"/>
  <text x="220" y="143" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">Provider</text>

  <!-- Arrows down -->
  <line x1="200" y1="158" x2="140" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="158" x2="220" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="240" y1="158" x2="300" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Consumer A (uses count) - re-renders -->
  <rect x="80" y="194" width="110" height="40" rx="6" fill="#2a1a0d" stroke="#e05555" stroke-width="2"/>
  <text x="135" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">Consumer A</text>
  <text x="135" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">count 사용</text>

  <!-- Consumer B (uses name) - also re-renders! -->
  <rect x="165" y="194" width="110" height="40" rx="6" fill="#2a1a0d" stroke="#e05555" stroke-width="2"/>
  <text x="220" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">Consumer B</text>
  <text x="220" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">name 사용</text>

  <!-- Consumer C (uses theme) - also re-renders! -->
  <rect x="250" y="194" width="110" height="40" rx="6" fill="#2a1a0d" stroke="#e05555" stroke-width="2"/>
  <text x="305" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">Consumer C</text>
  <text x="305" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">theme 사용</text>

  <!-- count changed label -->
  <text x="220" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">count 변경 시 A, B, C 모두 re-render ←</text>

  <!-- Zustand side -->
  <text x="640" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Zustand: 구독한 컴포넌트만 re-render</text>

  <!-- Store -->
  <rect x="580" y="118" width="120" height="40" rx="6" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="143" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">Store</text>

  <!-- Lines to subscribers -->
  <line x1="620" y1="158" x2="560" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="640" y1="158" x2="640" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="158" x2="720" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Sub A (count) - re-renders -->
  <rect x="500" y="194" width="110" height="40" rx="6" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="555" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Comp A</text>
  <text x="555" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">count 구독</text>

  <!-- Sub B (name) - no re-render -->
  <rect x="585" y="194" width="110" height="40" rx="6" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="640" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">Comp B</text>
  <text x="640" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">name 구독</text>

  <!-- Sub C (theme) - no re-render -->
  <rect x="670" y="194" width="110" height="40" rx="6" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="725" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">Comp C</text>
  <text x="725" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">theme 구독</text>

  <text x="640" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">count 변경 시 A만 re-render ✓</text>

  <!-- Divider line -->
  <line x1="440" y1="90" x2="440" y2="280" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Code examples at bottom -->
  <rect x="60" y="290" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="309" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Context 소비</text>
  <text x="76" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> &#123; count &#125; = useContext(AppCtx);</text>
  <text x="76" y="345" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// AppCtx 값이 변하면 이 컴포넌트도</text>
  <text x="76" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// count를 안 써도 re-render</text>
  <text x="76" y="381" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 분리 Context로 해결 가능하지만</text>
  <text x="76" y="399" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 복잡도 증가</text>
  <text x="76" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">// use(Context)도 동일 동작</text>

  <rect x="460" y="290" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="309" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Zustand selector 구독</text>
  <text x="476" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> count = useStore(s =&gt; s.count);</text>
  <text x="476" y="345" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// count만 구독, name/theme 변경 시</text>
  <text x="476" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// re-render 없음</text>
  <text x="476" y="381" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 추가 설정 없이 자동으로</text>
  <text x="476" y="399" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 최적화됨</text>
  <text x="476" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">// 성능 우위</text>
</svg>
