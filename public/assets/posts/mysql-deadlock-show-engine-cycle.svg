<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">데드락 순환 대기 그래프</text>

  <!-- Tx A -->
  <rect x="100" y="140" width="200" height="72" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Tx A</text>
  <text x="200" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">보유: Row 1 X-Lock</text>
  <text x="200" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">대기: Row 2 X-Lock</text>

  <!-- Tx B -->
  <rect x="580" y="140" width="200" height="72" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="680" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">Tx B</text>
  <text x="680" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">보유: Row 2 X-Lock</text>
  <text x="680" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">대기: Row 1 X-Lock</text>

  <!-- A -> B arrow (waits for) -->
  <path d="M 300 162 Q 440 110 580 162" stroke="#e05555" stroke-width="2.5"
        fill="none" marker-end="url(#arr-r)"/>
  <text x="440" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">A → B 대기 (Row 2)</text>

  <!-- B -> A arrow (waits for) -->
  <path d="M 580 192 Q 440 250 300 192" stroke="#e05555" stroke-width="2.5"
        fill="none" marker-end="url(#arr-r)"/>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">B → A 대기 (Row 1)</text>

  <!-- Cycle label -->
  <text x="440" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e05555">⟲</text>

  <!-- Resolution -->
  <rect x="300" y="310" width="280" height="80" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">InnoDB 해결 방식</text>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">변경 행 수 적은 트랜잭션 롤백</text>
  <text x="440" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">innodb_deadlock_detect = ON (기본값)</text>

  <line x1="440" y1="300" x2="440" y2="310" stroke="#e05555" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
</svg>
