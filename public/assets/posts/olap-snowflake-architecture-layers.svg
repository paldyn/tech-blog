<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Snowflake 3-레이어 아키텍처</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">클라우드 스토리지 · 쿼리 처리 · 클라우드 서비스 완전 분리</text>

  <!-- Layer 1: Cloud Services -->
  <rect x="60" y="82" width="760" height="74" rx="8" fill="#12182a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Cloud Services Layer</text>
  <text x="440" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인증·접근제어 · 메타데이터 관리 · 쿼리 파싱·최적화 · 트랜잭션 조율</text>
  <text x="440" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">항상 동작 — 별도 서버 불필요, Snowflake가 관리</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrMid" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#555"/>
    </marker>
    <marker id="arrMidUp" viewBox="0 0 14 14" refX="7" refY="2"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 14 L 7 1 L 14 14 z" fill="#555"/>
    </marker>
  </defs>
  <line x1="440" y1="156" x2="440" y2="178" stroke="#555" stroke-width="2" marker-end="url(#arrMid)"/>
  <line x1="440" y1="178" x2="440" y2="156" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Layer 2: Query Processing (Virtual Warehouses) -->
  <rect x="60" y="178" width="760" height="120" rx="8" fill="#0e1a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Query Processing Layer — Virtual Warehouses</text>

  <!-- Three VW boxes -->
  <rect x="90" y="212" width="190" height="70" rx="6" fill="#111"/>
  <text x="185" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">VW: Analytics Team</text>
  <text x="185" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">XL 사이즈 · 항상 실행</text>
  <text x="185" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">32 nodes (클러스터)</text>
  <text x="185" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">로컬 디스크 캐시 독립</text>

  <rect x="345" y="212" width="190" height="70" rx="6" fill="#111"/>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">VW: ETL Pipeline</text>
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">M 사이즈 · 스케줄 실행</text>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">4 nodes</text>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">유휴 시 자동 일시정지</text>

  <rect x="600" y="212" width="190" height="70" rx="6" fill="#111"/>
  <text x="695" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">VW: BI Dashboard</text>
  <text x="695" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">S 사이즈 · 자동 재개</text>
  <text x="695" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">2 nodes</text>
  <text x="695" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">동일 데이터 공유</text>

  <line x1="440" y1="298" x2="440" y2="320" stroke="#555" stroke-width="2" marker-end="url(#arrMid)"/>
  <line x1="440" y1="320" x2="440" y2="298" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Layer 3: Cloud Storage -->
  <rect x="60" y="320" width="760" height="74" rx="8" fill="#1a1220" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">Cloud Storage Layer</text>
  <text x="440" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">S3 / Azure Blob / GCS — Micro-partition 자동 관리 (50~500MB 압축)</text>
  <text x="440" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">FDN(Fail-over Domain) 분산 저장 · Time Travel(0~90일) · Zero-copy Clone</text>

  <!-- Key Features -->
  <rect x="60" y="416" width="370" height="74" rx="8" fill="#111"/>
  <text x="245" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Multi-cluster VW (자동 스케일)</text>
  <text x="245" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">동시 쿼리 급증 시 클러스터 자동 추가</text>
  <text x="245" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AUTO_SUSPEND / AUTO_RESUME</text>
  <text x="245" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">초단위 크레딧 과금</text>

  <rect x="450" y="416" width="370" height="74" rx="8" fill="#111"/>
  <text x="635" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Time Travel &amp; Zero-copy Clone</text>
  <text x="635" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AT(TIMESTAMP) 과거 시점 조회</text>
  <text x="635" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CLONE: 메타데이터만 복사 (비용 0)</text>
  <text x="635" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Fail-safe: 7일 추가 보존</text>
</svg>
