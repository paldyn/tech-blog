<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">날짜·시간 타입 비교</text>

  <!-- Types table -->
  <rect x="60" y="66" width="760" height="270" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="66" width="760" height="28" rx="8" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Header -->
  <text x="150" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">타입</text>
  <text x="350" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">저장 범위</text>
  <text x="570" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">특성</text>
  <text x="740" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">용도</text>

  <line x1="60" y1="94" x2="820" y2="94" stroke="#2a3a5a" stroke-width="1"/>

  <!-- DATE -->
  <text x="150" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">DATE</text>
  <text x="350" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">0001-01-01 ~ 9999-12-31</text>
  <text x="570" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">날짜만 (시간 없음)</text>
  <text x="740" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">생년월일, 만료일, 일정</text>

  <line x1="60" y1="120" x2="820" y2="120" stroke="#1e1e3e" stroke-width="1"/>

  <!-- TIME -->
  <text x="150" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">TIME</text>
  <text x="350" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">00:00:00 ~ 23:59:59.999...</text>
  <text x="570" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시간만 (날짜 없음)</text>
  <text x="740" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">영업시간, 시각표</text>

  <line x1="60" y1="146" x2="820" y2="146" stroke="#1e1e3e" stroke-width="1"/>

  <!-- TIMESTAMP -->
  <text x="150" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">TIMESTAMP</text>
  <text x="350" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">날짜+시간 (마이크로초)</text>
  <text x="570" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">타임존 정보 없음</text>
  <text x="740" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">생성/수정 시각 (단일 TZ)</text>

  <line x1="60" y1="172" x2="820" y2="172" stroke="#1e1e3e" stroke-width="1"/>

  <!-- TIMESTAMPTZ -->
  <text x="150" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">TIMESTAMPTZ</text>
  <text x="350" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">날짜+시간+오프셋 정보</text>
  <text x="570" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">UTC 내부 저장, TZ 변환</text>
  <text x="740" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">글로벌 서비스 이벤트</text>

  <line x1="60" y1="198" x2="820" y2="198" stroke="#1e1e3e" stroke-width="1"/>

  <!-- INTERVAL -->
  <text x="150" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">INTERVAL</text>
  <text x="350" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기간 (duration)</text>
  <text x="570" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">년/월/일/시/분/초 단위</text>
  <text x="740" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기간 계산, 만료일 산출</text>

  <line x1="60" y1="224" x2="820" y2="224" stroke="#1e1e3e" stroke-width="1"/>

  <text x="440" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">DBMS별 이름 차이</text>

  <line x1="60" y1="254" x2="820" y2="254" stroke="#1e1e3e" stroke-width="1"/>

  <text x="200" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" font-weight="600">PostgreSQL</text>
  <text x="200" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TIMESTAMP WITHOUT TIME ZONE</text>
  <text x="200" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TIMESTAMP WITH TIME ZONE (=TIMESTAMPTZ)</text>

  <text x="500" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" font-weight="600">MySQL</text>
  <text x="500" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DATETIME (타임존 없음, 범위 넓음)</text>
  <text x="500" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TIMESTAMP (UTC 저장, 2038 문제 있음)</text>

  <text x="720" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" font-weight="600">Oracle</text>
  <text x="720" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DATE (날짜+시간 모두 포함)</text>
  <text x="720" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TIMESTAMP WITH LOCAL TIME ZONE</text>

  <!-- Bottom best practices -->
  <rect x="60" y="358" width="760" height="82" rx="8" fill="#0a1a0a" stroke="#3a5e3a" stroke-width="1"/>
  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">날짜·시간 타입 선택 원칙</text>
  <text x="440" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">글로벌 서비스 → TIMESTAMPTZ (UTC 내부 저장) · 단일 타임존 앱 → TIMESTAMP · 날짜만 → DATE</text>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">MySQL TIMESTAMP: 2038년 1월 19일 이후 오버플로 → DATETIME 사용 권장</text>
</svg>
