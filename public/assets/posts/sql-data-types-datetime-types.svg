<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">날짜/시간 타입 비교</text>

  <rect x="60" y="56" width="760" height="32" rx="4" fill="#1a2a3a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="77" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타입</text>
  <text x="300" y="77" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">저장 내용</text>
  <text x="530" y="77" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타임존 처리</text>
  <text x="720" y="77" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">용도</text>

  <rect x="60" y="88" width="760" height="28" fill="#0f1a24" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">DATE</text>
  <text x="300" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">YYYY-MM-DD</text>
  <text x="530" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">없음</text>
  <text x="720" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">생년월일, 공휴일</text>

  <rect x="60" y="116" width="760" height="28" fill="#0a1219" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">TIME</text>
  <text x="300" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HH:MM:SS[.ffffff]</text>
  <text x="530" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">없음</text>
  <text x="720" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">영업시간, 이벤트 시각</text>

  <rect x="60" y="144" width="760" height="28" fill="#0f1a24" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">DATETIME</text>
  <text x="300" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">날짜 + 시간</text>
  <text x="530" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">없음 (입력 그대로 저장)</text>
  <text x="720" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MySQL/MSSQL 지역 일시</text>

  <rect x="60" y="172" width="760" height="28" fill="#0a1219" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">TIMESTAMP</text>
  <text x="300" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">날짜 + 시간</text>
  <text x="530" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">UTC 변환 저장 (MySQL)</text>
  <text x="720" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">글로벌 서비스 필수</text>

  <rect x="60" y="200" width="760" height="28" fill="#0f1a24" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">TIMESTAMPTZ</text>
  <text x="300" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">날짜 + 시간 + 오프셋</text>
  <text x="530" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">UTC로 정규화 저장 (PG)</text>
  <text x="720" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">PostgreSQL 권장</text>

  <rect x="60" y="228" width="760" height="28" fill="#0a1219" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">INTERVAL</text>
  <text x="300" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기간 (3일, 2시간 등)</text>
  <text x="530" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">-</text>
  <text x="720" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">날짜 연산, 만료 계산</text>

  <!-- Timezone pitfall -->
  <rect x="60" y="280" width="760" height="60" rx="8" fill="#1a1020" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">타임존 함정 — DATETIME vs TIMESTAMP (MySQL)</text>
  <text x="440" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DATETIME은 입력값 그대로 저장 → 서버 타임존 변경 시 과거 데이터와 불일치</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TIMESTAMP는 내부적으로 UTC 변환 저장, 조회 시 세션 타임존으로 변환</text>

  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">권장: 글로벌 서비스는 TIMESTAMP (MySQL) / TIMESTAMPTZ (PostgreSQL) 사용</text>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Oracle: DATE = 날짜+시간 (1초 정밀도), TIMESTAMP = 마이크로초 정밀도</text>
</svg>
