<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 날짜/시간 타입 비교</text>

  <!-- Header -->
  <rect x="60" y="65" width="760" height="34" rx="4" fill="#131320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타입</text>
  <text x="320" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">저장 내용</text>
  <text x="520" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타임존</text>
  <text x="700" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">적합한 용도</text>

  <rect x="60" y="99" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="160" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">DATE</text>
  <text x="320" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">날짜만 (YYYY-MM-DD)</text>
  <text x="520" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">없음</text>
  <text x="700" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">생일, 만료일, 회계일</text>

  <rect x="60" y="133" width="760" height="34" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="160" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">TIME</text>
  <text x="320" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시간만 (HH:MM:SS)</text>
  <text x="520" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">없음/선택</text>
  <text x="700" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">영업시간, 스케줄 시각</text>

  <rect x="60" y="167" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="160" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">TIMESTAMP</text>
  <text x="320" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">날짜 + 시간</text>
  <text x="520" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">저장 안 함 (위험)</text>
  <text x="700" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단일 서버, 로컬 시간 한정</text>

  <rect x="60" y="201" width="760" height="34" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="160" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">TIMESTAMPTZ</text>
  <text x="320" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">날짜 + 시간 + UTC 저장</text>
  <text x="520" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">UTC 변환 저장 (권장)</text>
  <text x="700" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이벤트, 로그, 글로벌 서비스</text>

  <rect x="60" y="235" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="160" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178" font-weight="600" text-anchor="middle">INTERVAL</text>
  <text x="320" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기간(duration)</text>
  <text x="520" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">없음</text>
  <text x="700" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">구독 기간, 만료 계산</text>

  <!-- DBMS note boxes -->
  <rect x="60" y="286" width="360" height="94" rx="8" fill="#0d1520" stroke="#3a6a9e" stroke-width="1.5"/>
  <text x="240" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">PostgreSQL</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• TIMESTAMPTZ = TIMESTAMP WITH TIME ZONE</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 내부: UTC로 저장, 조회 시 세션 TZ 변환</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• created_at TIMESTAMPTZ DEFAULT now() 권장</text>

  <rect x="460" y="286" width="360" height="94" rx="8" fill="#0d1520" stroke="#3a6a9e" stroke-width="1.5"/>
  <text x="640" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">MySQL / Oracle / SQL Server</text>
  <text x="480" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• MySQL: DATETIME (TZ 없음) / TIMESTAMP (UTC 변환)</text>
  <text x="480" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Oracle: TIMESTAMP WITH TIME ZONE</text>
  <text x="480" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• SQL Server: DATETIMEOFFSET (TZ 오프셋 포함)</text>
</svg>
