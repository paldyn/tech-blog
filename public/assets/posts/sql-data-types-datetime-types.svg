<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">날짜·시간 타입 비교</text>

  <!-- Header row -->
  <rect x="30" y="66" width="820" height="32" fill="#192040" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#9aa4b8">타입</text>
  <text x="300" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#9aa4b8">저장 내용</text>
  <text x="490" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#9aa4b8">범위</text>
  <text x="700" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#9aa4b8">용도</text>

  <line x1="210" y1="66" x2="210" y2="298" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="390" y1="66" x2="390" y2="298" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="590" y1="66" x2="590" y2="298" stroke="#3a4a6e" stroke-width="1"/>

  <!-- DATE -->
  <rect x="30" y="98" width="820" height="40" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="123" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">DATE</text>
  <text x="300" y="116" text-anchor="middle" font-size="11" fill="#888">연-월-일</text>
  <text x="300" y="130" text-anchor="middle" font-size="11" fill="#888">시간 없음</text>
  <text x="490" y="116" text-anchor="middle" font-size="11" fill="#b5cea8">4713 BC ~ 5874897 AD</text>
  <text x="490" y="130" text-anchor="middle" font-size="11" fill="#888">(PostgreSQL 기준)</text>
  <text x="700" y="116" text-anchor="middle" font-size="11" fill="#888">생일, 이벤트 날짜,</text>
  <text x="700" y="130" text-anchor="middle" font-size="11" fill="#888">시간 불필요한 날짜</text>

  <!-- TIME -->
  <rect x="30" y="138" width="820" height="40" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="163" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">TIME</text>
  <text x="300" y="156" text-anchor="middle" font-size="11" fill="#888">시:분:초.ms</text>
  <text x="300" y="170" text-anchor="middle" font-size="11" fill="#888">날짜 없음</text>
  <text x="490" y="163" text-anchor="middle" font-size="11" fill="#b5cea8">00:00:00 ~ 24:00:00</text>
  <text x="700" y="156" text-anchor="middle" font-size="11" fill="#888">영업 시간, 반복</text>
  <text x="700" y="170" text-anchor="middle" font-size="11" fill="#888">일과 스케줄</text>

  <!-- TIMESTAMP -->
  <rect x="30" y="178" width="820" height="40" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="203" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">TIMESTAMP</text>
  <text x="300" y="196" text-anchor="middle" font-size="11" fill="#888">날짜+시간</text>
  <text x="300" y="210" text-anchor="middle" font-size="11" fill="#888">타임존 없음</text>
  <text x="490" y="203" text-anchor="middle" font-size="11" fill="#b5cea8">4713 BC ~ 294276 AD</text>
  <text x="700" y="196" text-anchor="middle" font-size="11" fill="#ce9178">로컬 시간 저장 시</text>
  <text x="700" y="210" text-anchor="middle" font-size="11" fill="#888">(권장 안 함)</text>

  <!-- TIMESTAMPTZ -->
  <rect x="30" y="218" width="820" height="40" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="243" text-anchor="middle" font-size="13" fill="#55c555" font-weight="600">TIMESTAMPTZ</text>
  <text x="300" y="236" text-anchor="middle" font-size="11" fill="#888">UTC로 저장,</text>
  <text x="300" y="250" text-anchor="middle" font-size="11" fill="#888">출력 시 타임존 변환</text>
  <text x="490" y="243" text-anchor="middle" font-size="11" fill="#b5cea8">TIMESTAMP와 동일</text>
  <text x="700" y="236" text-anchor="middle" font-size="11" fill="#7ec8e3">글로벌 서비스,</text>
  <text x="700" y="250" text-anchor="middle" font-size="11" fill="#7ec8e3">이벤트 로그 (권장)</text>

  <!-- INTERVAL -->
  <rect x="30" y="258" width="820" height="40" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="283" text-anchor="middle" font-size="13" fill="#7777cc" font-weight="600">INTERVAL</text>
  <text x="300" y="276" text-anchor="middle" font-size="11" fill="#888">기간(duration)</text>
  <text x="300" y="290" text-anchor="middle" font-size="11" fill="#888">시작~끝 차이</text>
  <text x="490" y="283" text-anchor="middle" font-size="11" fill="#b5cea8">-178000000 ~ +178000000년</text>
  <text x="700" y="276" text-anchor="middle" font-size="11" fill="#888">만료일 계산,</text>
  <text x="700" y="290" text-anchor="middle" font-size="11" fill="#888">경과 시간 표현</text>

  <!-- Code examples -->
  <rect x="30" y="320" width="820" height="132" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="50" y="342" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace">-- 날짜/시간 리터럴과 연산 (PostgreSQL)</text>
  <text x="50" y="362" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">SELECT CURRENT_DATE,              -- 2026-06-10</text>
  <text x="50" y="380" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">       CURRENT_TIMESTAMP,         -- 2026-06-10 10:30:00+09</text>
  <text x="50" y="398" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">       now() + INTERVAL '30 days',-- 30일 후</text>
  <text x="50" y="416" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">       AGE(birth_date),            -- 나이 계산</text>
  <text x="50" y="434" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">       EXTRACT(YEAR FROM now());   -- 현재 연도</text>
</svg>
