<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">날짜·시간 타입 비교</text>

  <!-- Header -->
  <rect x="60" y="66" width="760" height="32" rx="4" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">타입</text>
  <text x="340" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">저장 내용</text>
  <text x="560" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">예시 값</text>
  <text x="740" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">용도</text>

  <rect x="60" y="98" width="760" height="28" fill="#0f1a1a" stroke="#2a3a3a" stroke-width="1"/>
  <text x="160" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">DATE</text>
  <text x="340" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">연-월-일</text>
  <text x="560" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">2026-05-30</text>
  <text x="740" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">생년월일, 만료일</text>

  <rect x="60" y="126" width="760" height="28" fill="#111827" stroke="#2a3a3a" stroke-width="1"/>
  <text x="160" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">TIME</text>
  <text x="340" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시:분:초(.소수)</text>
  <text x="560" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">14:30:00</text>
  <text x="740" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">영업 시작/종료 시간</text>

  <rect x="60" y="154" width="760" height="28" fill="#0f1a1a" stroke="#2a3a3a" stroke-width="1"/>
  <text x="160" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">TIMESTAMP</text>
  <text x="340" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">날짜+시간 (타임존 없음)</text>
  <text x="560" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">2026-05-30 14:30:00</text>
  <text x="740" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">로컬 시간 저장</text>

  <rect x="60" y="182" width="760" height="28" fill="#111827" stroke="#2a3a3a" stroke-width="1"/>
  <text x="160" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">TIMESTAMPTZ</text>
  <text x="340" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">날짜+시간 + 타임존 정보</text>
  <text x="560" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">2026-05-30T14:30:00+09:00</text>
  <text x="740" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">글로벌 서비스 기본 선택</text>

  <rect x="60" y="210" width="760" height="28" fill="#0f1a1a" stroke="#2a3a3a" stroke-width="1"/>
  <text x="160" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">INTERVAL</text>
  <text x="340" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시간 간격</text>
  <text x="560" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">INTERVAL '7 days'</text>
  <text x="740" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">만료 기간 계산</text>

  <!-- Timezone diagram -->
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">타임존 저장 방식</text>

  <rect x="60" y="292" width="340" height="100" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">TIMESTAMP (타임존 없음)</text>
  <text x="230" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">입력 그대로 저장</text>
  <text x="230" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서버 TZ 변경 시 의미 달라짐</text>
  <text x="230" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">글로벌 서비스에서 위험</text>

  <rect x="480" y="292" width="340" height="100" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">TIMESTAMPTZ (타임존 있음)</text>
  <text x="650" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">내부적으로 UTC로 변환 저장</text>
  <text x="650" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">조회 시 세션 TZ로 변환</text>
  <text x="650" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">권장: 항상 UTC 기준 일관성</text>
</svg>
