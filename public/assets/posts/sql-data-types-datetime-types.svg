<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 날짜·시간 타입 비교</text>

  <!-- DATE -->
  <rect x="60" y="72" width="180" height="160" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="72" width="180" height="34" fill="#1e3a5f" rx="8"/>
  <rect x="60" y="94" width="180" height="12" fill="#1e3a5f"/>
  <text x="150" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">DATE</text>
  <text x="78" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">연-월-일만 저장</text>
  <text x="78" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시간 정보 없음</text>
  <text x="78" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">예: '2026-05-29'</text>
  <text x="78" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">생일, 입사일, 만료일</text>
  <text x="78" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">3~4 bytes</text>
  <text x="78" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">모든 RDBMS 지원</text>

  <!-- TIME -->
  <rect x="260" y="72" width="180" height="160" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="260" y="72" width="180" height="34" fill="#1e3a5f" rx="8"/>
  <rect x="260" y="94" width="180" height="12" fill="#1e3a5f"/>
  <text x="350" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">TIME</text>
  <text x="278" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시-분-초 (+ 마이크로초)</text>
  <text x="278" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">날짜 정보 없음</text>
  <text x="278" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">예: '14:30:00'</text>
  <text x="278" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">영업 시간, 알람 시각</text>
  <text x="278" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">3~8 bytes</text>
  <text x="278" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">실무 사용 빈도 낮음</text>

  <!-- TIMESTAMP -->
  <rect x="460" y="72" width="200" height="160" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="460" y="72" width="200" height="34" fill="#1e3a5f" rx="8"/>
  <rect x="460" y="94" width="200" height="12" fill="#1e3a5f"/>
  <text x="560" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">TIMESTAMP</text>
  <text x="478" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">날짜 + 시간 (마이크로초)</text>
  <text x="478" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">타임존 없음(TIMESTAMP)</text>
  <text x="478" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">또는 있음(TIMESTAMPTZ)</text>
  <text x="478" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">이벤트 기록, 생성/수정 시각</text>
  <text x="478" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">8 bytes</text>
  <text x="478" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">서버 타임존 주의!</text>

  <!-- INTERVAL -->
  <rect x="680" y="72" width="160" height="160" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="680" y="72" width="160" height="34" fill="#1e3a5f" rx="8"/>
  <rect x="680" y="94" width="160" height="12" fill="#1e3a5f"/>
  <text x="760" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">INTERVAL</text>
  <text x="698" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시간 간격/지속시간</text>
  <text x="698" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">예: '3 months'</text>
  <text x="698" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">'2 hours 30 min'</text>
  <text x="698" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">구독 기간, 경과 시간</text>
  <text x="698" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">PostgreSQL 등 지원</text>
  <text x="698" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">MySQL 미지원</text>

  <!-- Code examples -->
  <rect x="60" y="252" width="760" height="190" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- 날짜·시간 타입 활용 예시</text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">CREATE TABLE</text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">             subscriptions (</text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  id          </text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">BIGINT</text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">        GENERATED ALWAYS AS IDENTITY PRIMARY KEY</text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  start_date  </text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">DATE</text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">           NOT NULL</text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  end_date    </text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">DATE</text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">                             ,</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  created_at  </text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">TIMESTAMPTZ</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">     NOT NULL DEFAULT</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">                      now</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">                          ()</text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">);</text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff"> </text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff"> </text>
</svg>
