<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">restartPolicy 비교</text>

  <!-- Header -->
  <rect x="60" y="74" width="200" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">정책</text>
  <rect x="270" y="74" width="230" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="385" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">동작</text>
  <rect x="510" y="74" width="310" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="665" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">사용 사례</text>

  <!-- Row 1 Always -->
  <rect x="60" y="118" width="200" height="50" rx="0" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="160" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">Always</text>
  <rect x="270" y="118" width="230" height="50" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
  <text x="385" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">종료 시 항상 재시작</text>
  <text x="385" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">(기본값)</text>
  <rect x="510" y="118" width="310" height="50" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
  <text x="665" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">웹 서버, API 서버 등 상시 실행 서비스</text>

  <!-- Row 2 OnFailure -->
  <rect x="60" y="168" width="200" height="50" rx="0" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="160" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">OnFailure</text>
  <rect x="270" y="168" width="230" height="50" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
  <text x="385" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">비정상 종료(exit&#x21250;)시만</text>
  <text x="385" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">재시작</text>
  <rect x="510" y="168" width="310" height="50" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
  <text x="665" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">Job: 실패 시 재시도, 성공 시 종료</text>

  <!-- Row 3 Never -->
  <rect x="60" y="218" width="200" height="50" rx="0" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="160" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">Never</text>
  <rect x="270" y="218" width="230" height="50" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
  <text x="385" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">재시작 안 함</text>
  <rect x="510" y="218" width="310" height="50" rx="0" fill="#0f1623" stroke="#1f2937" stroke-width="1"/>
  <text x="665" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">데이터 마이그레이션 등 1회 실행 후 분석</text>

  <text x="440" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#6b7280" text-anchor="middle">재시작은 지수 백오프(10s &#x2192; 20s &#x2192; 40s ... 최대 5분)로 지연됨 &#x2014; CrashLoopBackOff 원인</text>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#6b7280" text-anchor="middle">Deployment에는 Always 정책만 적용 가능</text>
</svg>
