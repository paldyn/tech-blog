<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">분류 평가 지표 공식 정리</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">TP · FP · TN · FN 네 값에서 모든 지표가 도출된다</text>

  <!-- TP/FP/TN/FN box -->
  <rect x="60" y="86" width="360" height="90" rx="8" fill="#111827" stroke="#333" stroke-width="1.5"/>
  <text x="240" y="108" text-anchor="middle" fill="#888" font-size="13" font-weight="600">기본 구성 요소</text>
  <text x="76" y="128" fill="#55c555" font-size="12">TP</text>
  <text x="100" y="128" fill="#ccc" font-size="12">실제 Pos, 예측 Pos (맞음)</text>
  <text x="76" y="146" fill="#e05555" font-size="12">FP</text>
  <text x="100" y="146" fill="#ccc" font-size="12">실제 Neg, 예측 Pos (틀림)</text>
  <text x="210" y="128" fill="#7ec8e3" font-size="12">TN</text>
  <text x="234" y="128" fill="#ccc" font-size="12">실제 Neg, 예측 Neg (맞음)</text>
  <text x="210" y="146" fill="#e0a020" font-size="12">FN</text>
  <text x="234" y="146" fill="#ccc" font-size="12">실제 Pos, 예측 Neg (틀림)</text>
  <text x="240" y="168" text-anchor="middle" fill="#555" font-size="11">앞 글자: F(틀림)/T(맞음) · 뒷 글자: P(양성)/N(음성) 예측</text>

  <!-- Formula cards -->
  <!-- Accuracy -->
  <rect x="60" y="194" width="168" height="90" rx="8" fill="#0e1a2a" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="144" y="216" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600">정확도 (Accuracy)</text>
  <text x="144" y="238" text-anchor="middle" fill="#e8e8e8" font-size="13">(TP + TN) / 전체</text>
  <text x="144" y="258" text-anchor="middle" fill="#888" font-size="11">전체 중 맞은 비율</text>
  <text x="144" y="274" text-anchor="middle" fill="#e05555" font-size="10">불균형 클래스에 부적합</text>

  <!-- Precision -->
  <rect x="240" y="194" width="168" height="90" rx="8" fill="#0e2a1a" stroke="#1a5c3a" stroke-width="1.5"/>
  <text x="324" y="216" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">정밀도 (Precision)</text>
  <text x="324" y="238" text-anchor="middle" fill="#e8e8e8" font-size="13">TP / (TP + FP)</text>
  <text x="324" y="258" text-anchor="middle" fill="#888" font-size="11">양성 예측 중 맞은 비율</text>
  <text x="324" y="274" text-anchor="middle" fill="#888" font-size="10">FP를 줄이고 싶을 때</text>

  <!-- Recall -->
  <rect x="420" y="194" width="168" height="90" rx="8" fill="#2a1a0a" stroke="#5c3a1a" stroke-width="1.5"/>
  <text x="504" y="216" text-anchor="middle" fill="#e0a020" font-size="14" font-weight="600">재현율 (Recall)</text>
  <text x="504" y="238" text-anchor="middle" fill="#e8e8e8" font-size="13">TP / (TP + FN)</text>
  <text x="504" y="258" text-anchor="middle" fill="#888" font-size="11">실제 양성 중 찾은 비율</text>
  <text x="504" y="274" text-anchor="middle" fill="#888" font-size="10">FN을 줄이고 싶을 때</text>

  <!-- F1 -->
  <rect x="600" y="194" width="220" height="90" rx="8" fill="#1a0a2a" stroke="#3a1a5c" stroke-width="1.5"/>
  <text x="710" y="216" text-anchor="middle" fill="#7777cc" font-size="14" font-weight="600">F1 점수</text>
  <text x="710" y="238" text-anchor="middle" fill="#e8e8e8" font-size="13">2 × P × R / (P + R)</text>
  <text x="710" y="258" text-anchor="middle" fill="#888" font-size="11">정밀도와 재현율의 조화평균</text>
  <text x="710" y="274" text-anchor="middle" fill="#888" font-size="10">불균형 클래스에서 Acc 대체</text>

  <!-- Tradeoff arrow -->
  <text x="440" y="310" text-anchor="middle" fill="#888" font-size="13" font-weight="600">정밀도-재현율 트레이드오프</text>
  <line x1="240" y1="326" x2="640" y2="326" stroke="#444" stroke-width="1.5"/>
  <polygon points="240,326 252,320 252,332" fill="#55c555"/>
  <polygon points="640,326 628,320 628,332" fill="#e0a020"/>
  <text x="200" y="330" text-anchor="middle" fill="#55c555" font-size="11">높은 정밀도</text>
  <text x="680" y="330" text-anchor="middle" fill="#e0a020" font-size="11">높은 재현율</text>
  <text x="440" y="348" text-anchor="middle" fill="#666" font-size="11">임계값 ↑ → 정밀도 ↑ 재현율 ↓  ·  임계값 ↓ → 재현율 ↑ 정밀도 ↓</text>

  <!-- Use cases -->
  <rect x="60" y="362" width="360" height="50" rx="6" fill="#111827" stroke="#333" stroke-width="1"/>
  <text x="240" y="382" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">재현율 중요: 질병 검진, 사기 탐지</text>
  <text x="240" y="400" text-anchor="middle" fill="#888" font-size="11">FN이 치명적 — 놓치면 안 됨</text>

  <rect x="460" y="362" width="360" height="50" rx="6" fill="#111827" stroke="#333" stroke-width="1"/>
  <text x="640" y="382" text-anchor="middle" fill="#7ec8e3" font-size="12" font-weight="600">정밀도 중요: 스팸 필터, 추천 시스템</text>
  <text x="640" y="400" text-anchor="middle" fill="#888" font-size="11">FP가 치명적 — 잘못 걸면 안 됨</text>

  <!-- Footer -->
  <text x="440" y="428" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
