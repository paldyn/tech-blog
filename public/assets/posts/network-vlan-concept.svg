<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">VLAN: 하나의 스위치 위에 논리적 네트워크 분리</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">물리적 배선 변경 없이 브로드캐스트 도메인을 분리해 보안·관리 효율을 높임</text>

  <!-- Physical switch -->
  <rect x="280" y="200" width="320" height="70" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#7ec8e3" text-anchor="middle" font-weight="600">24포트 스위치</text>
  <text x="440" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">VLAN 10 | VLAN 20 | VLAN 30 | Trunk</text>

  <defs>
    <marker id="vl1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- VLAN 10 - Engineering -->
  <rect x="60" y="100" width="170" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="145" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">VLAN 10 — 개발팀</text>
  <text x="145" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">192.168.10.0/24</text>
  <text x="145" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">포트: Fa0/1~8</text>

  <!-- VLAN 20 - HR -->
  <rect x="355" y="100" width="170" height="70" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">VLAN 20 — 인사팀</text>
  <text x="440" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">192.168.20.0/24</text>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">포트: Fa0/9~16</text>

  <!-- VLAN 30 - Finance -->
  <rect x="650" y="100" width="170" height="70" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="735" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">VLAN 30 — 재무팀</text>
  <text x="735" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">192.168.30.0/24</text>
  <text x="735" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">포트: Fa0/17~24</text>

  <!-- Connections to switch -->
  <line x1="145" y1="170" x2="340" y2="215" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="440" y1="170" x2="440" y2="200" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="735" y1="170" x2="540" y2="215" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Inter-VLAN barrier -->
  <text x="290" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">브로드캐스트 차단</text>
  <text x="590" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">브로드캐스트 차단</text>
  <line x1="280" y1="302" x2="360" y2="302" stroke="#e05555" stroke-width="2"/>
  <line x1="520" y1="302" x2="600" y2="302" stroke="#e05555" stroke-width="2"/>

  <!-- Router for inter-VLAN routing -->
  <rect x="355" y="330" width="170" height="50" rx="8" fill="#111" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" font-weight="600">라우터 (L3 스위치)</text>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">inter-VLAN 라우팅 필요 시</text>
  <line x1="440" y1="330" x2="440" y2="270" stroke="#888" stroke-width="1.5" marker-end="url(#vl1)" stroke-dasharray="4,4"/>

  <!-- Code box -->
  <rect x="60" y="400" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">SW(config)# </text>
  <text x="208" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">vlan 10</text>
  <text x="80" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">SW(config-vlan)# </text>
  <text x="256" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">name ENGINEERING</text>
</svg>
