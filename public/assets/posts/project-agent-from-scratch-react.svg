<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <defs>
    <marker id="arrow-gray" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-accent" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7777cc"/>
    </marker>
    <marker id="arrow-info" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ReAct 루프: 에이전트의 추론-행동 사이클</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Reason → Act → Observe → Repeat / Final Answer</text>

  <!-- ── THOUGHT box ── -->
  <rect x="340" y="100" width="200" height="64" rx="10" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Thought</text>
  <text x="440" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">LLM이 상황을 추론</text>

  <!-- Thought → Action arrow (down) -->
  <line x1="440" y1="164" x2="440" y2="205" stroke="#7777cc" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <!-- ── ACTION box ── -->
  <rect x="300" y="206" width="280" height="72" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Action</text>
  <text x="440" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">tool_name(args) 호출</text>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">web_search · calculator · file_read</text>

  <!-- Action → Observe arrow (down) -->
  <line x1="440" y1="278" x2="440" y2="319" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrow-info)"/>

  <!-- ── OBSERVATION box ── -->
  <rect x="300" y="320" width="280" height="64" rx="10" fill="#111" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Observation</text>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">도구 실행 결과 수신</text>

  <!-- Observe → back to Thought (left side curve) -->
  <!-- Left side: down from Observation, left, up to Thought -->
  <path d="M 300 352 C 200 352 200 132 340 132" stroke="#555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow-gray)"/>
  <text x="168" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">반복</text>

  <!-- ── TERMINATION: Final Answer ── -->
  <!-- Arrow right from Observation -->
  <line x1="580" y1="352" x2="654" y2="352" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Condition label -->
  <text x="616" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">충분한 정보</text>

  <rect x="655" y="320" width="165" height="64" rx="10" fill="#0d1a10" stroke="#55c555" stroke-width="2"/>
  <text x="737" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Final Answer</text>
  <text x="737" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">최종 응답 반환</text>

  <!-- Stopping conditions legend (bottom-right) -->
  <rect x="600" y="100" width="220" height="158" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="710" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">중단 조건</text>
  <line x1="620" y1="133" x2="800" y2="133" stroke="#333" stroke-width="1"/>
  <text x="620" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓</text>
  <text x="638" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Final Answer 감지</text>
  <text x="620" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✕</text>
  <text x="638" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">max_steps 초과</text>
  <text x="620" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✕</text>
  <text x="638" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">토큰 한도 도달</text>
  <text x="620" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✕</text>
  <text x="638" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">도구 오류 누적</text>
  <text x="620" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">⏱</text>
  <text x="638" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">타임아웃</text>

  <!-- Code block -->
  <rect x="60" y="416" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># ReAct 핵심: 도구 결과를 메시지 히스토리에 추가해 LLM에 재전달</text>
  <text x="76" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">while </text>
  <text x="122" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">step &lt; max_steps </text>
  <text x="280" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">and not </text>
  <text x="354" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">is_final_answer(response):</text>
  <text x="76" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    result = execute_tool(response.tool_use); history.append(result)</text>
</svg>
