<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git subtree 핵심 명령어</text>

  <!-- Add -->
  <rect x="60" y="68" width="760" height="86" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">① 추가 (add)</text>
  <rect x="80" y="100" width="720" height="42" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git subtree add </text>
  <text x="228" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">--prefix=libs/util </text>
  <text x="390" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">https://github.com/org/util.git</text>
  <text x="96" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  main --squash</text>

  <!-- Arrow -->
  <line x1="440" y1="162" x2="440" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Pull -->
  <rect x="60" y="190" width="760" height="86" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">② 업스트림 변경 가져오기 (pull)</text>
  <rect x="80" y="222" width="720" height="42" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git subtree pull </text>
  <text x="228" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">--prefix=libs/util </text>
  <text x="390" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">origin-util</text>
  <text x="96" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  main --squash</text>

  <!-- Arrow -->
  <line x1="440" y1="284" x2="440" y2="308" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Push -->
  <rect x="60" y="312" width="760" height="86" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">③ 업스트림에 기여 (push)</text>
  <rect x="80" y="344" width="720" height="42" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git subtree push </text>
  <text x="228" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">--prefix=libs/util </text>
  <text x="390" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">origin-util</text>
  <text x="96" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  main</text>

  <!-- --squash note -->
  <rect x="60" y="418" width="760" height="44" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">--squash 옵션: 외부 저장소 전체 히스토리를 하나의 커밋으로 압축해 메인 히스토리를 깔끔하게 유지</text>
  <text x="440" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">단, --squash 사용 시 push도 --squash 없이 불가 → 처음부터 일관성 있게 사용</text>
</svg>
