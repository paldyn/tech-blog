<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">확률론 핵심 개념: AI의 불확실성 언어</text>

  <!-- Section 1: Probability types -->
  <text x="440" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#888">세 가지 핵심 확률 개념</text>

  <rect x="60" y="92" width="234" height="130" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="177" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">결합 확률 P(A∩B)</text>
  <text x="177" y="136" text-anchor="middle" font-size="12" fill="#aaa">A와 B가 동시에 일어날 확률</text>
  <text x="177" y="156" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">P(A, B)</text>
  <text x="177" y="176" text-anchor="middle" font-size="12" fill="#666">예: 이메일이 스팸이면서</text>
  <text x="177" y="194" text-anchor="middle" font-size="12" fill="#666">"무료"라는 단어를 포함</text>
  <text x="177" y="212" text-anchor="middle" font-size="11" fill="#555">P("무료" ∩ 스팸) = 0.15</text>

  <rect x="323" y="92" width="234" height="130" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">주변 확률 P(A)</text>
  <text x="440" y="136" text-anchor="middle" font-size="12" fill="#aaa">다른 변수를 합산해 얻은 확률</text>
  <text x="440" y="156" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">∑_B P(A, B)</text>
  <text x="440" y="176" text-anchor="middle" font-size="12" fill="#666">예: 이메일이 스팸일 확률</text>
  <text x="440" y="194" text-anchor="middle" font-size="12" fill="#666">(단어와 무관하게)</text>
  <text x="440" y="212" text-anchor="middle" font-size="11" fill="#555">P(스팸) = 0.30</text>

  <rect x="586" y="92" width="234" height="130" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="703" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">조건부 확률 P(A|B)</text>
  <text x="703" y="136" text-anchor="middle" font-size="12" fill="#aaa">B가 주어졌을 때 A의 확률</text>
  <text x="703" y="156" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">P(A,B) / P(B)</text>
  <text x="703" y="176" text-anchor="middle" font-size="12" fill="#666">예: "무료" 포함 이메일이</text>
  <text x="703" y="194" text-anchor="middle" font-size="12" fill="#666">스팸일 확률</text>
  <text x="703" y="212" text-anchor="middle" font-size="11" fill="#555">P(스팸|"무료") = 0.15/0.20 = 0.75</text>

  <!-- Section 2: Distributions -->
  <text x="440" y="248" text-anchor="middle" font-size="14" font-weight="600" fill="#888">AI에서 자주 쓰이는 확률 분포</text>

  <!-- Bernoulli -->
  <rect x="60" y="260" width="167" height="120" rx="6" fill="#111"/>
  <text x="143" y="283" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">베르누이 분포</text>
  <text x="143" y="301" text-anchor="middle" font-size="11" fill="#aaa">이진 결과 (0 또는 1)</text>
  <text x="143" y="319" text-anchor="middle" font-size="11" fill="#666">P(X=1) = p</text>
  <text x="143" y="337" text-anchor="middle" font-size="11" fill="#666">P(X=0) = 1-p</text>
  <text x="143" y="358" text-anchor="middle" font-size="10" fill="#555">사용: 이진 분류</text>
  <text x="143" y="372" text-anchor="middle" font-size="10" fill="#555">출력 (sigmoid)</text>

  <!-- Categorical -->
  <rect x="239" y="260" width="167" height="120" rx="6" fill="#111"/>
  <text x="322" y="283" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">카테고리 분포</text>
  <text x="322" y="301" text-anchor="middle" font-size="11" fill="#aaa">K개 범주 중 하나</text>
  <text x="322" y="319" text-anchor="middle" font-size="11" fill="#666">P(X=k) = p_k</text>
  <text x="322" y="337" text-anchor="middle" font-size="11" fill="#666">∑p_k = 1</text>
  <text x="322" y="358" text-anchor="middle" font-size="10" fill="#555">사용: 다중 분류,</text>
  <text x="322" y="372" text-anchor="middle" font-size="10" fill="#555">토큰 예측 (softmax)</text>

  <!-- Gaussian -->
  <rect x="418" y="260" width="167" height="120" rx="6" fill="#111"/>
  <text x="501" y="283" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">가우시안 분포</text>
  <text x="501" y="301" text-anchor="middle" font-size="11" fill="#aaa">연속 정규 분포 N(μ,σ²)</text>
  <text x="501" y="319" text-anchor="middle" font-size="11" fill="#666">평균 μ 중심, 종 모양</text>
  <text x="501" y="337" text-anchor="middle" font-size="11" fill="#666">68-95-99.7 규칙</text>
  <text x="501" y="358" text-anchor="middle" font-size="10" fill="#555">사용: 가중치 초기화,</text>
  <text x="501" y="372" text-anchor="middle" font-size="10" fill="#555">VAE 잠재 공간</text>

  <!-- Uniform -->
  <rect x="597" y="260" width="167" height="120" rx="6" fill="#111"/>
  <text x="680" y="283" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">균등 분포</text>
  <text x="680" y="301" text-anchor="middle" font-size="11" fill="#aaa">범위 [a,b]에서 균일</text>
  <text x="680" y="319" text-anchor="middle" font-size="11" fill="#666">P(X=x) = 1/(b-a)</text>
  <text x="680" y="337" text-anchor="middle" font-size="11" fill="#666">모든 값이 동일한 확률</text>
  <text x="680" y="358" text-anchor="middle" font-size="10" fill="#555">사용: 무작위 초기화,</text>
  <text x="680" y="372" text-anchor="middle" font-size="10" fill="#555">드롭아웃 마스크</text>

  <!-- Section 3: LLM connection -->
  <rect x="60" y="400" width="760" height="80" rx="8" fill="#111"/>
  <text x="440" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">LLM의 다음 토큰 예측은 조건부 확률이다</text>
  <text x="440" y="446" text-anchor="middle" font-size="12" fill="#7ec8e3">P(다음 토큰 | 이전 모든 토큰) = Softmax(W · h_t + b)</text>
  <text x="440" y="466" text-anchor="middle" font-size="12" fill="#aaa">모델은 수조 토큰을 학습해 이 조건부 확률 분포를 내부적으로 파라미터화하고 있다</text>
  <text x="440" y="476" text-anchor="middle" font-size="11" fill="#555">온도(Temperature) 파라미터는 이 분포를 날카롭게(낮은T) 또는 평탄하게(높은T) 조절한다</text>

  <!-- Footer -->
  <text x="440" y="504" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
