<svg width="880" height="490" viewBox="0 0 880 490" xmlns="http://www.w3.org/2000/svg"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">기본형 vs 참조형 — 메모리 저장 방식</text>

  <!-- ═══ STACK ═══ -->
  <rect x="50" y="68" width="330" height="394" rx="8" fill="#0d1117" stroke="#1e3a6a" stroke-width="1.5"/>
  <!-- Stack header background -->
  <rect x="51" y="69" width="328" height="37" rx="7" fill="#101c30"/>
  <text x="215" y="93" text-anchor="middle" fill="#7ec8e3" font-size="15" font-weight="600">스택 (Stack)</text>
  <line x1="50" y1="107" x2="380" y2="107" stroke="#1e3a6a" stroke-width="1"/>

  <!-- Stack Row 1: int age = 30 (primitive) -->
  <text x="68" y="127" fill="#888" font-size="12">기본형 — 값을 직접 저장</text>
  <text x="68" y="149" fill="#7ec8e3" font-size="13">int</text>
  <text x="91" y="149" fill="#e8e8e8" font-size="13"> age</text>
  <rect x="68" y="157" width="294" height="42" rx="5" fill="#101c30" stroke="#1e4070"/>
  <text x="160" y="183" text-anchor="middle" fill="#888" font-size="11">값 직접 저장</text>
  <rect x="220" y="163" width="122" height="30" rx="4" fill="#163060" stroke="#2a5090"/>
  <text x="281" y="183" text-anchor="middle" fill="#b5cea8" font-size="16" font-weight="700">30</text>

  <!-- Divider -->
  <line x1="68" y1="210" x2="362" y2="210" stroke="#1a2535" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Stack Row 2: String name (reference) -->
  <text x="68" y="230" fill="#888" font-size="12">참조형 — 힙의 주소를 저장</text>
  <text x="68" y="252" fill="#7ec8e3" font-size="13">String</text>
  <text x="111" y="252" fill="#e8e8e8" font-size="13"> name</text>
  <rect x="68" y="260" width="294" height="42" rx="5" fill="#0d2018" stroke="#1a4a2a"/>
  <text x="145" y="286" text-anchor="middle" fill="#888" font-size="11">힙 주소 저장</text>
  <rect x="200" y="266" width="144" height="30" rx="4" fill="#0f2a1a" stroke="#1e5030"/>
  <text x="272" y="286" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">0x4A2F8C10</text>

  <!-- Divider -->
  <line x1="68" y1="314" x2="362" y2="314" stroke="#1a2535" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Stack Row 3: int[] scores (reference) -->
  <text x="68" y="334" fill="#888" font-size="12">참조형 — 힙의 주소를 저장</text>
  <text x="68" y="356" fill="#7ec8e3" font-size="13">int[]</text>
  <text x="104" y="356" fill="#e8e8e8" font-size="13"> scores</text>
  <rect x="68" y="364" width="294" height="42" rx="5" fill="#0d2018" stroke="#1a4a2a"/>
  <text x="145" y="390" text-anchor="middle" fill="#888" font-size="11">힙 주소 저장</text>
  <rect x="200" y="370" width="144" height="30" rx="4" fill="#0f2a1a" stroke="#1e5030"/>
  <text x="272" y="390" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">0x7B3C9A20</text>

  <!-- null note -->
  <text x="68" y="435" fill="#888" font-size="12">* 참조형만</text>
  <text x="130" y="435" fill="#e05555" font-size="12" font-weight="600">null</text>
  <text x="157" y="435" fill="#888" font-size="12">가능 — 기본형은 항상 값 보유</text>

  <!-- ═══ HEAP ═══ -->
  <rect x="500" y="68" width="330" height="394" rx="8" fill="#0d1117" stroke="#1e5a3a" stroke-width="1.5"/>
  <!-- Heap header background -->
  <rect x="501" y="69" width="328" height="37" rx="7" fill="#0d2018"/>
  <text x="665" y="93" text-anchor="middle" fill="#55c555" font-size="15" font-weight="600">힙 (Heap)</text>
  <line x1="500" y1="107" x2="830" y2="107" stroke="#1e5a3a" stroke-width="1"/>

  <!-- Heap: String object -->
  <text x="518" y="127" fill="#888" font-size="12">String 객체</text>
  <rect x="518" y="135" width="294" height="94" rx="6" fill="#0d1a2d" stroke="#1e3a6a"/>
  <text x="534" y="157" fill="#7777cc" font-size="14" font-weight="600">String</text>
  <text x="534" y="179" fill="#888" font-size="12">value:</text>
  <text x="574" y="179" fill="#ce9178" font-size="13">"Alice"</text>
  <text x="534" y="199" fill="#888" font-size="12">length:</text>
  <text x="584" y="199" fill="#b5cea8" font-size="13">5</text>
  <text x="534" y="219" fill="#888" font-size="12">hash:</text>
  <text x="570" y="219" fill="#b5cea8" font-size="13">0x1F3A9C</text>

  <!-- Divider -->
  <line x1="518" y1="242" x2="812" y2="242" stroke="#1a2a1a" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Heap: int[] object -->
  <text x="518" y="262" fill="#888" font-size="12">int[] 배열 객체</text>
  <rect x="518" y="270" width="294" height="108" rx="6" fill="#0d1a2d" stroke="#1e3a6a"/>
  <text x="534" y="292" fill="#7777cc" font-size="14" font-weight="600">int[3]</text>
  <text x="534" y="315" fill="#888" font-size="12">[0]:</text>
  <text x="562" y="315" fill="#b5cea8" font-size="13">90</text>
  <text x="604" y="315" fill="#888" font-size="12">[1]:</text>
  <text x="632" y="315" fill="#b5cea8" font-size="13">85</text>
  <text x="674" y="315" fill="#888" font-size="12">[2]:</text>
  <text x="702" y="315" fill="#b5cea8" font-size="13">92</text>
  <text x="534" y="337" fill="#888" font-size="12">length:</text>
  <text x="584" y="337" fill="#b5cea8" font-size="13">3</text>
  <text x="534" y="359" fill="#888" font-size="12">class:</text>
  <text x="574" y="359" fill="#7ec8e3" font-size="13">int[]</text>

  <!-- ═══ ARROWS (stack references → heap objects) ═══ -->
  <defs>
    <marker id="arr-green" markerWidth="17.5" markerHeight="14" refX="14" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,1.75 15.75,7 0,12.25" fill="#55c555" stroke="#0a200f" stroke-width="0.5"/>
    </marker>
  </defs>

  <!-- name ref → String object: source (344,281), target (518,182) -->
  <path d="M 344,281 C 430,281 430,182 518,182"
        stroke="#55c555" stroke-width="2" fill="none"
        stroke-dasharray="4,4" marker-end="url(#arr-green)"/>

  <!-- scores ref → int[] object: source (344,385), target (518,324) -->
  <path d="M 344,385 C 430,385 430,324 518,324"
        stroke="#55c555" stroke-width="2" fill="none"
        stroke-dasharray="4,4" marker-end="url(#arr-green)"/>

</svg>
