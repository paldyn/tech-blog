<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git push --force 의 위험성</text>
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#888">원격 히스토리를 덮어써 팀원의 커밋이 사라질 수 있다</text>

  <!-- Divider -->
  <line x1="440" y1="100" x2="440" y2="440" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: 상황 (force push 전) -->
  <text x="220" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">force push 전 상태</text>

  <!-- Remote: A-B-C(팀원) -->
  <text x="100" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원격 main:</text>
  <circle cx="90" cy="175" r="13" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">A</text>
  <line x1="103" y1="175" x2="127" y2="175" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="140" cy="175" r="13" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">B</text>
  <line x1="153" y1="175" x2="177" y2="175" stroke="#e05555" stroke-width="2"/>
  <circle cx="190" cy="175" r="13" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="190" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">C</text>
  <text x="190" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">팀원 커밋</text>

  <!-- Local (rebased): A-B' -->
  <text x="100" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내 로컬 main:</text>
  <circle cx="90" cy="265" r="13" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="269" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">A</text>
  <line x1="103" y1="265" x2="127" y2="265" stroke="#7777cc" stroke-width="2"/>
  <circle cx="140" cy="265" r="13" fill="#12102a" stroke="#7777cc" stroke-width="2"/>
  <text x="140" y="269" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">B'</text>
  <text x="140" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">리베이스 후</text>

  <!-- RIGHT: 결과 (force push 후) -->
  <text x="660" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">force push 후 ⚠</text>

  <!-- Remote after force: A-B' (C is lost!) -->
  <text x="540" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원격 main (덮어씀):</text>
  <circle cx="530" cy="175" r="13" fill="#1a2a3a" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">A</text>
  <line x1="543" y1="175" x2="567" y2="175" stroke="#7777cc" stroke-width="2"/>
  <circle cx="580" cy="175" r="13" fill="#12102a" stroke="#7777cc" stroke-width="2"/>
  <text x="580" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">B'</text>

  <!-- X mark for C (lost) -->
  <circle cx="720" cy="175" r="13" fill="#1a0a0a" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="720" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">C</text>
  <line x1="710" y1="165" x2="730" y2="185" stroke="#e05555" stroke-width="2"/>
  <line x1="730" y1="165" x2="710" y2="185" stroke="#e05555" stroke-width="2"/>
  <text x="720" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">손실됨!</text>

  <!-- Warning box -->
  <rect x="460" y="235" width="360" height="100" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">팀원 커밋 C가 dangling 상태</text>
  <text x="640" y="283" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">팀원이 pull 하면 충돌 또는</text>
  <text x="640" y="303" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">히스토리 손실 발생</text>

  <!-- Bottom rule -->
  <rect x="60" y="368" width="760" height="70" rx="6" fill="#12102a" stroke="#3a3a6a"/>
  <text x="440" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">사용 가능 조건</text>
  <text x="440" y="418" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">혼자 쓰는 브랜치 / 팀원에게 미리 공지 / PR 전 정리용</text>
</svg>
