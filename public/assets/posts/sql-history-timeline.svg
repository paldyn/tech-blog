<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 표준의 역사 타임라인</text>

  <!-- Timeline line -->
  <line x1="80" y1="280" x2="820" y2="280" stroke="#3a4a6e" stroke-width="2"/>

  <!-- SQL-86 -->
  <line x1="110" y1="280" x2="110" y2="200" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="110" cy="280" r="6" fill="#7ec8e3"/>
  <rect x="66" y="160" width="88" height="38" fill="#111" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="110" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">SQL-86</text>
  <text x="110" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">ANSI 첫 표준</text>
  <text x="110" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">1986</text>

  <!-- SQL-89 -->
  <line x1="200" y1="280" x2="200" y2="320" stroke="#9aa4b8" stroke-width="1.5"/>
  <circle cx="200" cy="280" r="5" fill="#9aa4b8"/>
  <rect x="156" y="322" width="88" height="38" fill="#111" rx="4" stroke="#9aa4b8" stroke-width="1"/>
  <text x="200" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#9aa4b8" text-anchor="middle">SQL-89</text>
  <text x="200" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">무결성 강화</text>
  <text x="200" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">1989</text>

  <!-- SQL-92 -->
  <line x1="320" y1="280" x2="320" y2="190" stroke="#55c555" stroke-width="1.5"/>
  <circle cx="320" cy="280" r="7" fill="#55c555"/>
  <rect x="265" y="150" width="110" height="38" fill="#111" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="320" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">SQL-92</text>
  <text x="320" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">JOIN 표준화</text>
  <text x="320" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">1992</text>

  <!-- SQL:1999 -->
  <line x1="450" y1="280" x2="450" y2="320" stroke="#e8a020" stroke-width="1.5"/>
  <circle cx="450" cy="280" r="7" fill="#e8a020"/>
  <rect x="392" y="322" width="116" height="50" fill="#111" rx="4" stroke="#e8a020" stroke-width="1"/>
  <text x="450" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8a020" text-anchor="middle">SQL:1999</text>
  <text x="450" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">재귀 CTE, OOP</text>
  <text x="450" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">절차적 확장</text>
  <text x="450" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">1999</text>

  <!-- SQL:2003 -->
  <line x1="560" y1="280" x2="560" y2="200" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="560" cy="280" r="7" fill="#7ec8e3"/>
  <rect x="502" y="160" width="116" height="38" fill="#111" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="560" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">SQL:2003</text>
  <text x="560" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">윈도우 함수, XML</text>
  <text x="560" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">2003</text>

  <!-- SQL:2016 -->
  <line x1="680" y1="280" x2="680" y2="320" stroke="#7777cc" stroke-width="1.5"/>
  <circle cx="680" cy="280" r="7" fill="#7777cc"/>
  <rect x="622" y="322" width="116" height="50" fill="#111" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="680" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">SQL:2016</text>
  <text x="680" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">JSON 지원</text>
  <text x="680" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Row Pattern</text>
  <text x="680" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">2016</text>

  <!-- SQL:2023 -->
  <line x1="800" y1="280" x2="800" y2="200" stroke="#e05555" stroke-width="1.5"/>
  <circle cx="800" cy="280" r="8" fill="#e05555"/>
  <rect x="744" y="158" width="116" height="40" fill="#111" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="802" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">SQL:2023</text>
  <text x="802" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">그래프, 속성값</text>
  <text x="800" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">2023</text>

  <!-- Summary box -->
  <rect x="60" y="410" width="760" height="50" fill="#111" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">주요 DB별 지원 수준: Oracle/PostgreSQL(가장 높음) &gt; MySQL/MariaDB &gt; SQLite(가장 낮음)</text>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">ANSI/ISO 표준 준수 정도는 제품마다 다르며, 방언(Dialect)이 존재함</text>
</svg>