<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Event 오브젝트 해부</text>

  <!-- code box: kubectl events output -->
  <rect x="60" y="80" width="460" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="108" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">$ kubectl events --types=Warning</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">TYPE</tspan>     <tspan fill="#7ec8e3" font-weight="600">REASON</tspan>        <tspan fill="#7ec8e3" font-weight="600">OBJECT</tspan></text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Warning  BackOff       pod/api</text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Warning  FailedMount   pod/web</text>
  <text x="76" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Warning  Unhealthy     pod/api</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">(x12 — 같은 이벤트는 count로 집계)</text>

  <!-- fields right -->
  <rect x="560" y="80" width="260" height="52" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="574" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">type</text>
  <text x="574" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Normal(정보) / Warning(문제)</text>

  <rect x="560" y="140" width="260" height="52" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="574" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">reason</text>
  <text x="574" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기계 판독용 카테고리 (BackOff 등)</text>

  <rect x="560" y="200" width="260" height="52" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="574" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">involvedObject</text>
  <text x="574" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이벤트의 주인공 (pod/api 등)</text>

  <rect x="560" y="260" width="260" height="52" rx="6" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="574" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">message · count</text>
  <text x="574" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사람용 설명 + 반복 횟수 집계</text>

  <!-- warning reasons cheat sheet -->
  <rect x="60" y="280" width="460" height="150" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="290" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">자주 만나는 Warning reason</text>
  <text x="84" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"><tspan fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace">FailedScheduling</tspan> — 배치할 노드 없음 (리소스 부족 등)</text>
  <text x="84" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"><tspan fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace">BackOff</tspan> — 컨테이너 재시작 지수 백오프 중</text>
  <text x="84" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"><tspan fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace">Unhealthy</tspan> — liveness/readiness 프로브 실패</text>
  <text x="84" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"><tspan fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace">FailedMount</tspan> — 볼륨 마운트 실패</text>

  <rect x="560" y="330" width="260" height="100" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="690" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">주의: 1시간이면 사라진다</text>
  <text x="690" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">새벽 장애의 이벤트는 아침에 없다</text>
  <text x="690" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ 익스포터로 외부 보존 필요</text>

  <!-- bottom -->
  <rect x="60" y="450" width="760" height="36" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="473" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">파드가 이상하면 로그보다 먼저 kubectl describe의 Events 섹션을 보라</text>
</svg>
