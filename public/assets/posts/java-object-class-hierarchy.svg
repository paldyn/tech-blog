<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">모든 클래스는 Object를 암묵적 상속</text>

  <!-- Object at top -->
  <rect x="310" y="60" width="260" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">java.lang.Object</text>
  <text x="440" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">equals · hashCode · toString · ...</text>

  <!-- Arrows down -->
  <line x1="340" y1="116" x2="190" y2="176" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="116" x2="440" y2="176" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="116" x2="690" y2="176" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- String box -->
  <rect x="80" y="176" width="220" height="56" rx="8" fill="#0d2214" stroke="#55c555" stroke-width="1.5"/>
  <text x="190" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">String</text>
  <text x="190" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">equals(), hashCode(), toString() 오버라이드</text>

  <!-- AbstractList box -->
  <rect x="330" y="176" width="220" height="56" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">AbstractList</text>
  <text x="440" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">equals(), hashCode(), toString() 오버라이드</text>

  <!-- Custom class box -->
  <rect x="580" y="176" width="220" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">MyClass</text>
  <text x="690" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">오버라이드 없으면 Object 기본값</text>

  <!-- Arrows level 2 -->
  <line x1="440" y1="232" x2="440" y2="296" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="690" y1="232" x2="690" y2="296" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ArrayList -->
  <rect x="330" y="296" width="220" height="56" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">ArrayList</text>
  <text x="440" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">AbstractList 상속 → Object 상속</text>

  <!-- MySubClass -->
  <rect x="580" y="296" width="220" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">MySubClass</text>
  <text x="690" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MyClass 상속 → Object 상속</text>

  <!-- Bottom note -->
  <rect x="60" y="372" width="760" height="36" rx="8" fill="#0a0a14" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="387" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" font-weight="600">class MyClass { }  ==  class MyClass extends Object { }</text>
  <text x="440" y="402" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">extends 절 없는 모든 클래스는 컴파일러가 extends Object를 자동 추가</text>
</svg>
