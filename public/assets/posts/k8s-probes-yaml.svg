<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Probe 설정 YAML</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">initialDelaySeconds · periodSeconds · failureThreshold 조정이 핵심입니다</text>

  <!-- Left: liveness + readiness -->
  <rect x="60" y="86" width="360" height="330" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="108"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">containers:</text>
  <text x="80" y="126"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">- name: app</text>
  <text x="80" y="144"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  livenessProbe</text>
  <text x="80" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    httpGet:</text>
  <text x="80" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">      path: /healthz</text>
  <text x="80" y="198"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">      port: 8080</text>
  <text x="80" y="216"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">    initialDelaySeconds: 30</text>
  <text x="80" y="234"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">    periodSeconds: 10</text>
  <text x="80" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">    failureThreshold: 3</text>
  <text x="80" y="270"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  readinessProbe</text>
  <text x="80" y="288"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    httpGet:</text>
  <text x="80" y="306"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">      path: /ready</text>
  <text x="80" y="324"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">      port: 8080</text>
  <text x="80" y="342"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">    initialDelaySeconds: 10</text>
  <text x="80" y="360"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">    periodSeconds: 5</text>
  <text x="80" y="378"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">    failureThreshold: 3</text>
  <text x="80" y="396"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">    successThreshold: 1</text>

  <!-- Right: startup + probe params -->
  <rect x="460" y="86" width="360" height="330" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="108"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># startupProbe (JVM 앱)</text>
  <text x="480" y="126"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  startupProbe</text>
  <text x="480" y="144"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    httpGet:</text>
  <text x="480" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">      path: /healthz</text>
  <text x="480" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">      port: 8080</text>
  <text x="480" y="198"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">    failureThreshold: 30</text>
  <text x="480" y="216"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">    periodSeconds: 10</text>
  <text x="480" y="234"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 최대 5분(30x10s) 대기</text>
  <text x="480" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 파라미터 의미</text>
  <text x="480" y="270"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">initialDelaySeconds</text>
  <text x="480" y="288"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  첫 체크까지 대기(초)</text>
  <text x="480" y="306"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">periodSeconds</text>
  <text x="480" y="324"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  체크 주기(초)</text>
  <text x="480" y="342"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">failureThreshold</text>
  <text x="480" y="360"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  연속 실패 허용 횟수</text>
  <text x="480" y="378"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">successThreshold</text>
  <text x="480" y="396"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  성공 판정 연속 성공 수</text>

  <!-- Bottom -->
  <rect x="60" y="432" width="760" height="28" rx="6" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="450" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">startupProbe 성공 전까지는 livenessProbe와 readinessProbe 모두 비활성화됩니다</text>
</svg>
