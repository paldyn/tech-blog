<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">lsof — 열린 파일 디스크립터의 세계</text>

  <!-- Process box -->
  <rect x="60" y="74" width="160" height="180" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">프로세스</text>
  <text x="140" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PID: 1234</text>

  <rect x="80" y="132" width="120" height="26" rx="4" fill="#222240" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">fd 0 (stdin)</text>

  <rect x="80" y="163" width="120" height="26" rx="4" fill="#222240" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">fd 1 (stdout)</text>

  <rect x="80" y="194" width="120" height="26" rx="4" fill="#222240" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">fd 2 (stderr)</text>

  <rect x="80" y="225" width="120" height="26" rx="4" fill="#222240" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">fd 3 (file)</text>

  <!-- Arrow -->
  <line x1="220" y1="165" x2="280" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="250" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lsof</text>

  <!-- FD types column -->
  <rect x="282" y="74" width="220" height="310" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="392" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">파일 디스크립터 유형</text>

  <rect x="296" y="108" width="192" height="30" rx="4" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="392" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">REG — 일반 파일</text>

  <rect x="296" y="144" width="192" height="30" rx="4" fill="#1a2e2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="392" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">DIR — 디렉터리</text>

  <rect x="296" y="180" width="192" height="30" rx="4" fill="#2e1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="392" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">IPv4/IPv6 — 소켓</text>

  <rect x="296" y="216" width="192" height="30" rx="4" fill="#2e2e1a" stroke="#e0a050" stroke-width="1"/>
  <text x="392" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a050">unix — Unix 소켓</text>

  <rect x="296" y="252" width="192" height="30" rx="4" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="392" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">FIFO — 파이프</text>

  <rect x="296" y="288" width="192" height="30" rx="4" fill="#1a2222" stroke="#5cc" stroke-width="1"/>
  <text x="392" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#5cc">CHR — 캐릭터 디바이스</text>

  <rect x="296" y="324" width="192" height="30" rx="4" fill="#222" stroke="#666" stroke-width="1"/>
  <text x="392" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">BLK — 블록 디바이스</text>

  <rect x="296" y="360" width="192" height="17" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="392" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">mem — 메모리 매핑</text>

  <!-- Output columns -->
  <text x="540" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">lsof 출력 컬럼 설명</text>

  <rect x="530" y="100" width="315" height="260" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>

  <!-- column headers -->
  <text x="545" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">COMMAND</text>
  <text x="545" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로세스 이름 (앞 9자)</text>

  <text x="545" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">PID / USER</text>
  <text x="545" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로세스 ID / 실행 사용자</text>

  <text x="545" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">FD</text>
  <text x="545" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 디스크립터 번호 또는 유형</text>
  <text x="545" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(cwd, txt, mem, 숫자 등)</text>

  <text x="545" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">TYPE</text>
  <text x="545" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">REG, DIR, IPv4, unix 등</text>

  <text x="545" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">NAME</text>
  <text x="545" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 경로 또는 소켓 정보</text>
  <text x="545" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: /var/log/app.log</text>

  <!-- use cases -->
  <text x="60" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">핵심 활용 시나리오</text>

  <rect x="60" y="422" width="180" height="60" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">포트 점유 확인</text>
  <text x="150" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lsof -i :8080</text>
  <text x="150" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">누가 사용 중인지 즉시 파악</text>

  <rect x="256" y="422" width="180" height="60" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="346" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">삭제된 파일 잔존</text>
  <text x="346" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lsof | grep deleted</text>
  <text x="346" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">디스크 공간 미회수 진단</text>

  <rect x="452" y="422" width="180" height="60" rx="6" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="542" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">FD 한도 소진</text>
  <text x="542" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lsof -p PID | wc -l</text>
  <text x="542" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">열린 FD 수 카운트</text>

  <rect x="648" y="422" width="182" height="60" rx="6" fill="#1a2e2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="739" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">사용자별 파일 추적</text>
  <text x="739" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lsof -u username</text>
  <text x="739" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">특정 사용자 활동 감사</text>
</svg>
