<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">MaskEdit — 마스크 패턴 레퍼런스</text>

  <!-- Table header -->
  <rect x="50" y="64" width="780" height="38" rx="6" fill="#0d1a30"/>
  <text x="100" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">패턴 문자</text>
  <text x="260" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">의미</text>
  <text x="460" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">입력 허용 문자</text>

  <!-- Row 1: # -->
  <rect x="50" y="102" width="780" height="40" rx="0" fill="#0d1220"/>
  <text x="100" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="16" font-weight="700" fill="#ce9178">#</text>
  <text x="260" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">숫자 (0–9)</text>
  <text x="460" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">0, 1, 2 … 9</text>

  <!-- Row 2: A -->
  <rect x="50" y="142" width="780" height="40" rx="0" fill="#101828"/>
  <text x="100" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="16" font-weight="700" fill="#ce9178">A</text>
  <text x="260" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">대문자 영문 (A–Z)</text>
  <text x="460" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">A, B, C … Z</text>

  <!-- Row 3: a -->
  <rect x="50" y="182" width="780" height="40" rx="0" fill="#0d1220"/>
  <text x="100" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="16" font-weight="700" fill="#ce9178">a</text>
  <text x="260" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">소문자 영문 (a–z)</text>
  <text x="460" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">a, b, c … z</text>

  <!-- Row 4: * -->
  <rect x="50" y="222" width="780" height="40" rx="0" fill="#101828"/>
  <text x="100" y="247" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="16" font-weight="700" fill="#ce9178">*</text>
  <text x="260" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">영문+숫자 (alphanumeric)</text>
  <text x="460" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">0–9, A–Z, a–z</text>

  <!-- Divider -->
  <rect x="50" y="274" width="780" height="2" rx="1" fill="#1e2433"/>

  <!-- Examples section -->
  <text x="50" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">실전 마스크 예시</text>

  <!-- Example rows -->
  <rect x="50" y="308" width="780" height="40" rx="4" fill="#0d1a28"/>
  <text x="72" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">전화번호</text>
  <text x="180" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">###-####-####</text>
  <text x="460" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">010-1234-5678</text>

  <rect x="50" y="354" width="780" height="40" rx="4" fill="#0d1220"/>
  <text x="72" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">날짜</text>
  <text x="180" y="379" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">####-##-##</text>
  <text x="460" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">2026-05-01</text>

  <rect x="50" y="400" width="780" height="40" rx="4" fill="#0d1a28"/>
  <text x="72" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">주민번호 앞자리</text>
  <text x="180" y="425" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">######-#</text>
  <text x="460" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">900101-1</text>

  <!-- Footer -->
  <text x="440" y="464" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복</text>
</svg>
