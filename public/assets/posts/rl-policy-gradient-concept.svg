<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" marketHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">정책 경사법 vs 가치 기반: 핵심 차이</text>

  <!-- 왼쪽: 가치 기반 -->
  <rect x="40" y="70" width="360" height="180" fill="#0f1a2e" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">가치 기반 (Value-Based)</text>
  <text x="220" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Q-Learning, DQN</text>

  <text x="60" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Q-함수 학습 → 정책 암묵적 유도</text>
  <text x="60" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">π(s) = argmax_a Q(s, a)</text>
  <text x="60" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 샘플 효율 좋음</text>
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 오프-정책 학습 가능</text>
  <text x="60" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 이산 행동만 가능</text>
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 확률적 정책 표현 어려움</text>

  <!-- 오른쪽: 정책 기반 -->
  <rect x="480" y="70" width="360" height="180" fill="#1a1030" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">정책 기반 (Policy-Based)</text>
  <text x="660" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">REINFORCE, PPO, SAC</text>

  <text x="500" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">정책 π_θ 직접 파라미터화</text>
  <text x="500" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">θ ← θ + α ∇_θ J(θ)</text>
  <text x="500" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 연속 행동 공간 지원</text>
  <text x="500" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 확률적 정책 자연스럽게 표현</text>
  <text x="500" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 분산 높음 (학습 불안정)</text>
  <text x="500" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 온-정책 → 샘플 비효율</text>

  <!-- 정책 경사 정리 박스 -->
  <rect x="100" y="274" width="680" height="80" fill="#14142a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">정책 경사 정리 (Policy Gradient Theorem)</text>
  <text x="440" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#e8e8e8" text-anchor="middle">∇_θ J(θ) = E_π [ ∇_θ log π_θ(a|s) · G_t ]</text>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">log π(a|s): 행동 선택 로그 확률 | G_t: 수익(리턴) — 높은 보상 행동 강화</text>

  <!-- REINFORCE 알고리즘 단계 -->
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">REINFORCE 알고리즘 흐름</text>

  <!-- 단계 박스들 -->
  <rect x="60" y="396" width="148" height="50" fill="#0f1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="134" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">① 에피소드 수집</text>
  <text x="134" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">π_θ로 τ 샘플링</text>

  <line x1="208" y1="421" x2="222" y2="421" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="224" y="396" width="148" height="50" fill="#0f1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="298" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a555" text-anchor="middle">② 리턴 계산</text>
  <text x="298" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">G_t = Σ γᵏ rₜ₊ₖ</text>

  <line x1="372" y1="421" x2="386" y2="421" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="388" y="396" width="148" height="50" fill="#0f1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="462" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">③ 그래디언트 계산</text>
  <text x="462" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">∇_θ log π · G_t</text>

  <line x1="536" y1="421" x2="550" y2="421" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="552" y="396" width="148" height="50" fill="#0f1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="626" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">④ 파라미터 업데이트</text>
  <text x="626" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">θ ← θ + α·∇J(θ)</text>

  <line x1="700" y1="421" x2="714" y2="421" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="752" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">반복</text>
</svg>
