<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">감사 로그 파이프라인</text>

  <!-- client -->
  <rect x="60" y="120" width="160" height="80" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">요청 주체</text>
  <text x="140" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사용자 (kubectl)</text>
  <text x="140" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ServiceAccount · 컨트롤러</text>

  <line x1="220" y1="160" x2="290" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- API server -->
  <rect x="290" y="90" width="290" height="210" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="435" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">API Server</text>

  <rect x="308" y="136" width="254" height="34" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="435" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">인증 → 인가 → Admission</text>

  <rect x="308" y="178" width="254" height="50" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="435" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Audit Policy 평가</text>
  <text x="435" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">이 요청을 어느 level로 기록할 것인가</text>

  <text x="435" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">매 요청을 stage마다 감사 이벤트로 기록</text>
  <text x="435" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#9aa4b8" text-anchor="middle">--audit-policy-file=policy.yaml</text>

  <line x1="580" y1="150" x2="650" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="580" y1="230" x2="650" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- backends -->
  <rect x="650" y="100" width="170" height="76" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="735" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Log 백엔드</text>
  <text x="735" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">--audit-log-path</text>
  <text x="735" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JSON Lines 파일</text>

  <rect x="650" y="216" width="170" height="76" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="735" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Webhook 백엔드</text>
  <text x="735" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">외부 수집 서비스로</text>
  <text x="735" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실시간 전송 (SIEM 등)</text>

  <!-- stages -->
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">기록 시점 (Stage)</text>

  <rect x="60" y="362" width="180" height="64" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">RequestReceived</text>
  <text x="150" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">요청 수신 직후</text>

  <rect x="256" y="362" width="180" height="64" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="346" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">ResponseStarted</text>
  <text x="346" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">응답 헤더 전송 (watch 등)</text>

  <rect x="452" y="362" width="180" height="64" rx="8" fill="#0f1a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="542" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">ResponseComplete</text>
  <text x="542" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">응답 완료 — 주로 이걸 본다</text>

  <rect x="648" y="362" width="172" height="64" rx="8" fill="#1a0f10" stroke="#e05555" stroke-width="1"/>
  <text x="734" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">Panic</text>
  <text x="734" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">내부 오류 발생 시</text>

  <rect x="60" y="450" width="760" height="36" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="473" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Event가 "컨트롤러의 행동 기록"이라면, 감사 로그는 "API 요청 전체의 법적 기록"이다</text>
</svg>
