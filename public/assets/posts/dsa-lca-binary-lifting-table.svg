<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-t" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-lca" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LCA — 이진 리프팅 (Binary Lifting)</text>

  <!-- Tree structure -->
  <!-- Node 1 (root) -->
  <circle cx="440" cy="90" r="26" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">1</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">depth 0</text>

  <!-- Node 2 -->
  <circle cx="240" cy="190" r="26" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">2</text>
  <text x="240" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">depth 1</text>

  <!-- Node 3 -->
  <circle cx="640" cy="190" r="26" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">3</text>
  <text x="640" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">depth 1</text>

  <!-- Node 4 -->
  <circle cx="150" cy="300" r="26" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">4</text>
  <text x="150" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">depth 2</text>

  <!-- Node 5 -->
  <circle cx="330" cy="300" r="26" fill="#1a1a2e" stroke="#55c555" stroke-width="2"/>
  <text x="330" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">5</text>
  <text x="330" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">depth 2</text>

  <!-- Node 6 -->
  <circle cx="560" cy="300" r="26" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="560" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">6</text>
  <text x="560" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">depth 2</text>

  <!-- Node 7 -->
  <circle cx="720" cy="300" r="26" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">7</text>
  <text x="720" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">depth 2</text>

  <!-- Node 8 (LCA query target) -->
  <circle cx="240" cy="400" r="26" fill="#1a2a1a" stroke="#e05555" stroke-width="2"/>
  <text x="240" y="405" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">8</text>
  <text x="240" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">depth 3</text>

  <!-- Tree edges -->
  <line x1="418" y1="106" x2="262" y2="174" stroke="#444" stroke-width="1.5"/>
  <line x1="462" y1="106" x2="618" y2="174" stroke="#444" stroke-width="1.5"/>
  <line x1="218" y1="206" x2="172" y2="284" stroke="#444" stroke-width="1.5"/>
  <line x1="262" y1="206" x2="308" y2="284" stroke="#444" stroke-width="1.5"/>
  <line x1="618" y1="206" x2="582" y2="284" stroke="#444" stroke-width="1.5"/>
  <line x1="662" y1="206" x2="698" y2="284" stroke="#444" stroke-width="1.5"/>
  <line x1="218" y1="316" x2="240" y2="384" stroke="#444" stroke-width="1.5"/>

  <!-- LCA path highlight -->
  <line x1="240" y1="420" x2="240" y2="380" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4"/>
  <line x1="222" y1="384" x2="178" y2="316" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4"/>
  <line x1="152" y1="284" x2="218" y2="206" stroke="#e05555" stroke-width="2.5" stroke-dasharray="4,4"/>

  <!-- LCA result annotation -->
  <text x="180" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">LCA(8,5)</text>
  <text x="180" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">= 2</text>

  <!-- Lifting table -->
  <rect x="490" y="350" width="350" height="120" fill="#111" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="665" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">up[node][k] = 2^k번째 조상</text>
  <!-- Header -->
  <text x="530" y="392" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">node</text>
  <text x="590" y="392" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">k=0</text>
  <text x="650" y="392" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">k=1</text>
  <text x="710" y="392" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">k=2</text>
  <text x="770" y="392" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">k=3</text>
  <!-- Rows -->
  <text x="530" y="412" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">5</text>
  <text x="590" y="412" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">2</text>
  <text x="650" y="412" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">1</text>
  <text x="710" y="412" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">1</text>
  <text x="770" y="412" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">1</text>
  <text x="530" y="432" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">8</text>
  <text x="590" y="432" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">4</text>
  <text x="650" y="432" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">2</text>
  <text x="710" y="432" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">1</text>
  <text x="770" y="432" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">1</text>
  <text x="530" y="452" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">up[v][k] = up[up[v][k-1]][k-1]</text>
</svg>
