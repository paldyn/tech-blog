<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MAC 주소 구조</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">48비트 이더넷 물리 주소의 구성과 특수 비트</text>

  <!-- MAC address example -->
  <text x="440" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="22" font-weight="600" fill="#7ec8e3" text-anchor="middle">AA:BB:CC:DD:EE:FF</text>

  <!-- OUI / NIC split -->
  <!-- OUI: first 3 bytes -->
  <rect x="100" y="120" width="280" height="52" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">OUI (24비트)</text>
  <text x="240" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">제조사 식별자 — IEEE 할당</text>

  <!-- NIC: last 3 bytes -->
  <rect x="500" y="120" width="280" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">NIC 고유번호 (24비트)</text>
  <text x="640" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">제조사가 할당한 일련번호</text>

  <!-- Special bits -->
  <rect x="60" y="196" width="360" height="80" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">첫 번째 옥텟 특수 비트</text>
  <text x="240" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">비트 0 (LSB): U/L 비트</text>
  <text x="240" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">0 = 전역 고유 (OUI 기반)</text>
  <text x="240" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">1 = 로컬 관리 (임의 할당)</text>

  <rect x="460" y="196" width="360" height="80" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">비트 1: I/G 비트</text>
  <text x="640" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">0 = 유니캐스트 (단일 NIC)</text>
  <text x="640" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">1 = 멀티캐스트 또는 브로드캐스트</text>
  <text x="640" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">FF:FF:FF:FF:FF:FF = 브로드캐스트</text>

  <!-- Code block: real examples -->
  <rect x="60" y="296" width="760" height="84" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">실제 예시</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">00:50:56:xx:xx:xx → VMware (가상 NIC, OUI=005056)</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">AC:DE:48:xx:xx:xx → Intel</text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">FF:FF:FF:FF:FF:FF → 브로드캐스트 (LAN 전체 수신)</text>
</svg>
