<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MAC 주소 구조</text>

  <!-- MAC Address visual breakdown -->
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">예시: AC:DE:48:00:11:22</text>

  <!-- OUI Section (3 bytes) -->
  <rect x="60" y="92" width="380" height="80" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="250" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">OUI (제조사 식별자)</text>
  <text x="250" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">AC : DE : 48</text>
  <text x="250" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Organizationally Unique Identifier (24비트)</text>

  <!-- NIC Section (3 bytes) -->
  <rect x="460" y="92" width="380" height="80" rx="8" fill="#0d2016" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">NIC 고유 번호</text>
  <text x="650" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">00 : 11 : 22</text>
  <text x="650" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Network Interface Controller (24비트)</text>

  <!-- Bit breakdown of first byte -->
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">첫 번째 바이트 특수 비트</text>
  <rect x="60" y="216" width="380" height="70" rx="8" fill="#1a120a" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="250" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a55c" text-anchor="middle">비트 0 (LSB): I/G 비트</text>
  <text x="250" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">0 = 유니캐스트, 1 = 멀티캐스트</text>
  <text x="250" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Individual/Group</text>

  <rect x="460" y="216" width="380" height="70" rx="8" fill="#2a0a2a" stroke="#cc55cc" stroke-width="1.5"/>
  <text x="650" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#cc55cc" text-anchor="middle">비트 1: U/L 비트</text>
  <text x="650" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">0 = 전역 유일, 1 = 로컬 관리</text>
  <text x="650" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Universally/Locally administered</text>

  <!-- Code example -->
  <rect x="60" y="306" width="760" height="94" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># MAC 주소 확인</text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">ip link show eth0</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">link/ether ac:de:48:00:11:22 brd ff:ff:ff:ff:ff:ff</text>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ff:ff:ff:ff:ff:ff = 브로드캐스트</text>
</svg>
