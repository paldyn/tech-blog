<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">MAC 주소 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">48비트 하드웨어 주소 — 6바이트 16진수 표기</text>

  <!-- MAC address display -->
  <rect x="160" y="90" width="560" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="28" font-weight="700" fill="#7ec8e3" xml:space="preserve">00:1A:2B : 3C:4D:5E</text>

  <!-- OUI section -->
  <rect x="160" y="170" width="264" height="80" rx="6" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="292" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">OUI (제조사 식별자)</text>
  <text x="292" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">앞 3바이트 (24비트)</text>
  <text x="292" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IEEE 등록 — 제조사 고유</text>

  <!-- NIC section -->
  <rect x="456" y="170" width="264" height="80" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="588" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">NIC 식별자</text>
  <text x="588" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">뒤 3바이트 (24비트)</text>
  <text x="588" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">제조사 내 고유 일련번호</text>

  <!-- bracket arrows -->
  <line x1="260" y1="150" x2="260" y2="168" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="380" y1="150" x2="380" y2="168" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="260" y1="150" x2="380" y2="150" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="320" y1="150" x2="320" y2="168" stroke="#7ec8e3" stroke-width="1.5"/>

  <line x1="496" y1="150" x2="496" y2="168" stroke="#55c555" stroke-width="1.5"/>
  <line x1="614" y1="150" x2="614" y2="168" stroke="#55c555" stroke-width="1.5"/>
  <line x1="496" y1="150" x2="614" y2="150" stroke="#55c555" stroke-width="1.5"/>
  <line x1="555" y1="150" x2="555" y2="168" stroke="#55c555" stroke-width="1.5"/>

  <!-- OUI examples -->
  <rect x="60" y="275" width="360" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">OUI 예시</text>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">00:1A:2B  →  Cisco Systems</text>
  <text x="80" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">3C:22:FB  →  Apple, Inc.</text>
  <text x="80" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">F4:5C:89  →  Samsung Electronics</text>

  <!-- special MACs -->
  <rect x="460" y="275" width="360" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">특수 MAC 주소</text>
  <text x="480" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">FF:FF:FF:FF:FF:FF  브로드캐스트</text>
  <text x="480" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">01:xx:xx:xx:xx:xx  멀티캐스트</text>
  <text x="480" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">그 외                유니캐스트</text>
</svg>
