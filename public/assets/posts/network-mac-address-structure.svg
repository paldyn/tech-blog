<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MAC 주소 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">48비트 하드웨어 주소의 상세 구성</text>

  <!-- MAC address bytes visualization -->
  <rect x="60" y="88" width="760" height="60" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>

  <!-- OUI: 3 bytes -->
  <rect x="64" y="92" width="360" height="52" rx="4" fill="#1a2a35" stroke="#7ec8e3" stroke-width="2"/>
  <text x="244" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">OUI (Organizationally Unique Identifier)</text>
  <text x="244" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">AA : BB : CC</text>
  <text x="244" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">제조사 식별 (IEEE 할당)</text>

  <!-- NIC: 3 bytes -->
  <rect x="436" y="92" width="380" height="52" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="626" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">NIC Specific (Device Identifier)</text>
  <text x="626" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">DD : EE : FF</text>
  <text x="626" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">장치별 고유 번호</text>

  <!-- Bit explanation -->
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">첫 번째 바이트의 특수 비트</text>

  <rect x="60" y="196" width="356" height="80" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="238" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">I/G 비트 (비트 0)</text>
  <text x="238" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">0 = Unicast (단일 장치)</text>
  <text x="238" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">1 = Multicast/Broadcast</text>
  <text x="238" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">FF:FF:FF:FF:FF:FF = Broadcast</text>

  <rect x="464" y="196" width="356" height="80" rx="6" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="642" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">U/L 비트 (비트 1)</text>
  <text x="642" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">0 = Universally Administered (UAA)</text>
  <text x="642" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">1 = Locally Administered (LAA)</text>
  <text x="642" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">가상화/임의 MAC은 LAA</text>

  <!-- OUI examples -->
  <rect x="60" y="300" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">주요 제조사 OUI 예시</text>

  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">Apple     </text>
  <text x="183" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">00:1A:E9 / F0:18:98 / DC:2B:2A ...</text>

  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">Intel     </text>
  <text x="183" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">00:50:F2 / 8C:EC:4B / 40:B0:34 ...</text>

  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">Samsung   </text>
  <text x="183" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">00:12:47 / 8C:71:F8 / B0:72:BF ...</text>

  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># OUI 조회: ieee.ra.org/ra_request/public</text>
</svg>
