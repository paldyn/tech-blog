<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrAM" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">git am — 메일박스 패치를 커밋으로</text>

  <rect x="60" y="110" width="220" height="150" rx="10" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="150" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">패치 파일</text>
  <text x="170" y="180" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">0001-fix.patch</text>
  <text x="170" y="206" font-size="12" fill="#888" text-anchor="middle">From / Date / Subject</text>
  <text x="170" y="230" font-size="12" fill="#888" text-anchor="middle">+ diff</text>

  <rect x="600" y="110" width="220" height="150" rx="10" fill="#10151f" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="150" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">새 커밋</text>
  <text x="710" y="180" font-size="12" fill="#888" text-anchor="middle">작성자 = 원저자</text>
  <text x="710" y="204" font-size="12" fill="#888" text-anchor="middle">날짜 = 원본 날짜</text>
  <text x="710" y="228" font-size="12" fill="#888" text-anchor="middle">메시지 그대로 복원</text>

  <line x1="280" y1="185" x2="598" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrAM)"/>
  <text x="439" y="172" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">git am 0001-fix.patch</text>

  <text x="60" y="302" font-size="13" fill="#888">git apply 와 달리 git am 은 작업 트리만 바꾸지 않고, 원래의 작성자 정보까지 담긴 커밋을 새로 만듭니다.</text>
</svg>
