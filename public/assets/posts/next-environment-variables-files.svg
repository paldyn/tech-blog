<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">.env 파일 우선순위</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">파일 이름과 환경에 따라 로드 순서가 결정됨</text>

  <!-- Files table -->
  <!-- Header -->
  <rect x="60" y="88" width="300" height="40" rx="4" fill="#111827" stroke="#3b4a6e" stroke-width="1"/>
  <text x="210" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">파일 이름</text>
  <rect x="370" y="88" width="200" height="40" rx="4" fill="#111827" stroke="#3b4a6e" stroke-width="1"/>
  <text x="470" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">로드 환경</text>
  <rect x="580" y="88" width="240" height="40" rx="4" fill="#111827" stroke="#3b4a6e" stroke-width="1"/>
  <text x="700" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">git 추적</text>

  <!-- Row 1 -->
  <rect x="60" y="136" width="300" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="76" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">.env</text>
  <rect x="370" y="136" width="200" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="470" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 환경</text>
  <rect x="580" y="136" width="240" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="700" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✅ 추적 가능</text>

  <!-- Row 2 -->
  <rect x="60" y="184" width="300" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="76" y="209" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">.env.local</text>
  <rect x="370" y="184" width="200" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="470" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 환경</text>
  <rect x="580" y="184" width="240" height="40" rx="4" fill="#1a1010" stroke="#4a2020" stroke-width="1.5"/>
  <text x="700" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">❌ .gitignore 필수</text>

  <!-- Row 3 -->
  <rect x="60" y="232" width="300" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">.env.development</text>
  <rect x="370" y="232" width="200" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="470" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">next dev</text>
  <rect x="580" y="232" width="240" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="700" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✅ 추적 가능</text>

  <!-- Row 4 -->
  <rect x="60" y="280" width="300" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="76" y="305" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">.env.production</text>
  <rect x="370" y="280" width="200" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="470" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">next build/start</text>
  <rect x="580" y="280" width="240" height="40" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="700" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✅ 추적 가능 (주의)</text>

  <!-- Priority note -->
  <rect x="60" y="340" width="760" height="60" rx="6" fill="#101820" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="440" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">우선순위 (높음 → 낮음)</text>
  <text x="440" y="386" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">.env.local  &gt;  .env.{environment}  &gt;  .env</text>

  <!-- Warning -->
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ .env.local은 절대 커밋하지 마세요 — API 키, DB 비밀번호 등 민감 정보 포함</text>
</svg>
