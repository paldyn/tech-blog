<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="pri" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">.env 파일 우선순위</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">높은 우선순위가 낮은 우선순위를 덮어씀</text>

  <!-- Priority 1 (highest) -->
  <rect x="60" y="90" width="760" height="60" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="2"/>
  <text x="120" y="116" font-size="13" fill="#9aa4b8">① 최우선</text>
  <text x="440" y="116" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#7777cc">.env.local</text>
  <text x="440" y="138" text-anchor="middle" font-size="12" fill="#888">개인 설정 · git 제외(.gitignore) · 항상 최우선 적용</text>

  <line x1="440" y1="150" x2="440" y2="172" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="460" y="165" font-size="11" fill="#666">↓ 없으면 다음 파일로</text>

  <!-- Priority 2 -->
  <rect x="60" y="178" width="760" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="120" y="204" font-size="13" fill="#9aa4b8">② 환경별</text>
  <text x="440" y="204" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#55c555">.env.production / .env.development</text>
  <text x="440" y="226" text-anchor="middle" font-size="12" fill="#888">NODE_ENV에 따라 자동 선택 · git에 커밋 가능</text>

  <line x1="440" y1="238" x2="440" y2="260" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="460" y="253" font-size="11" fill="#666">↓ 없으면 다음 파일로</text>

  <!-- Priority 3 -->
  <rect x="60" y="266" width="760" height="60" rx="8" fill="#1a150a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="120" y="292" font-size="13" fill="#9aa4b8">③ 기본값</text>
  <text x="440" y="292" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#ce9178">.env</text>
  <text x="440" y="314" text-anchor="middle" font-size="12" fill="#888">모든 환경 공통 기본값 · git에 커밋 가능 (비밀값 금지)</text>

  <!-- Note -->
  <rect x="60" y="358" width="760" height="52" rx="8" fill="#0f0f0f" stroke="#444" stroke-width="1"/>
  <text x="440" y="380" text-anchor="middle" font-size="13" fill="#888">테스트 환경: .env.test.local &gt; .env.test &gt; .env</text>
  <text x="440" y="398" text-anchor="middle" font-size="12" fill="#666">.env.local은 테스트 환경에서 로드되지 않음</text>
</svg>
