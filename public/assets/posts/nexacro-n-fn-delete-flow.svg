<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fn_delete() 삭제 처리 흐름</text>

  <!-- Step 1: Button click -->
  <rect x="60" y="72" width="380" height="50" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="250" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">① 삭제 버튼 클릭 → fn_delete()</text>
  <text x="250" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Grid00.currentrow 값 확인</text>

  <!-- Down arrow to step 2 -->
  <polygon points="247,122 253,122 253,160 259,160 250,172 241,160 247,160"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Step 2: Row selection check -->
  <rect x="60" y="172" width="380" height="50" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="250" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">② 선택 행 체크 (row &lt; 0?)</text>
  <text x="250" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Grid에서 행을 선택하지 않은 경우</text>

  <!-- Right arrow to "no row" box -->
  <polygon points="440,191 498,191 498,186 510,194 498,202 498,197 440,197"
           fill="#888" stroke="#0a0a0a" stroke-width="1"/>
  <text x="475" y="184"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">row &lt; 0</text>

  <!-- "No row" error box -->
  <rect x="510" y="172" width="310" height="50" fill="#1a1a1a" rx="6" stroke="#888" stroke-width="1"/>
  <text x="665" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">alert("행을 선택하세요.")</text>
  <text x="665" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">return — 함수 종료</text>

  <!-- Down arrow to step 3 -->
  <polygon points="247,222 253,222 253,260 259,260 250,272 241,260 247,260"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="270" y="250"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">row ≥ 0</text>

  <!-- Step 3: Confirm dialog -->
  <rect x="60" y="272" width="380" height="50" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="250" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">③ confirm() 확인 다이얼로그</text>
  <text x="250" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자 최종 삭제 의사 확인</text>

  <!-- Right arrow to "cancelled" box -->
  <polygon points="440,291 498,291 498,286 510,294 498,302 498,297 440,297"
           fill="#888" stroke="#0a0a0a" stroke-width="1"/>
  <text x="475" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">취소</text>

  <!-- "Cancelled" box -->
  <rect x="510" y="272" width="310" height="50" fill="#1a1a1a" rx="6" stroke="#888" stroke-width="1"/>
  <text x="665" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">사용자 취소 → return</text>
  <text x="665" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">변경 없이 함수 종료</text>

  <!-- Down arrow to step 4 -->
  <polygon points="247,322 253,322 253,360 259,360 250,372 241,360 247,360"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="270" y="350"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">확인</text>

  <!-- Step 4: deleteRow() -->
  <rect x="60" y="372" width="380" height="50" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="2"/>
  <text x="250" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">④ ds_list.deleteRow(row)</text>
  <text x="250" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">INSERT행: 완전 제거 · NORMAL행: rowStatus=DELETE(8)</text>

  <!-- Right annotation -->
  <rect x="510" y="372" width="310" height="50" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="665" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">fn_save() 시 서버 DELETE</text>
  <text x="665" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NORMAL 행만 서버로 DELETE 요청</text>

  <!-- Bottom note -->
  <text x="440" y="468"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">fn_save() 없이 fn_search() 재조회 시 미저장 삭제 취소됨 — 재조회로 원복 의도라면 그대로 사용</text>
</svg>
