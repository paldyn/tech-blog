<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">switch 표현식 — yield와 블록 분기</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">단순 값 반환 vs 블록 내 yield 반환</text>

  <!-- Left: 단순 화살표 반환 -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">① 단순 값 반환 (Arrow)</text>
  <rect x="60" y="116" width="360" height="144" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">int</text>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan dx="21"> numLetters = </tspan><tspan fill="#7ec8e3">switch</tspan><tspan> (day) {</tspan></text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    case</text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan dx="31"> MON, FRI, SUN -> </tspan><tspan fill="#b5cea8">6</tspan><tspan>;</tspan></text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    case</text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan dx="31"> TUE        -> </tspan><tspan fill="#b5cea8">7</tspan><tspan>;</tspan></text>
  <text x="76" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    case</text>
  <text x="76" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan dx="31"> THU, SAT   -> </tspan><tspan fill="#b5cea8">8</tspan><tspan>;</tspan></text>
  <text x="76" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    case</text>
  <text x="76" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan dx="31"> WED        -> </tspan><tspan fill="#b5cea8">9</tspan><tspan>;</tspan></text>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">};</tspan></text>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 화살표 오른쪽 = 반환값 (단일 표현식)</tspan></text>

  <!-- Right: 블록 + yield -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">② 블록 분기 + yield</text>
  <rect x="460" y="116" width="360" height="180" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">int</text>
  <text x="476" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan dx="21"> v = </tspan><tspan fill="#7ec8e3">switch</tspan><tspan> (x) {</tspan></text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    case</text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan dx="31"> 1 -> {</tspan></text>
  <text x="476" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">        log(</text>
  <text x="476" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"><tspan dx="1">"one"</tspan></text>
  <text x="476" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan dx="1">);</tspan></text>
  <text x="476" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">        yield</text>
  <text x="476" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8"><tspan dx="5"> 10</tspan></text>
  <text x="476" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan>;</tspan></text>
  <text x="476" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    }</text>
  <text x="476" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    default</text>
  <text x="476" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan dx="1"> -> </tspan><tspan fill="#b5cea8">0</tspan><tspan>;</tspan></text>
  <text x="476" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">};</tspan></text>
  <text x="476" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 블록 내에서 yield로 값 반환</tspan></text>

  <!-- Bottom: 규칙 요약 테이블 -->
  <rect x="60" y="312" width="760" height="150" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">switch 표현식 핵심 규칙</text>

  <!-- Table headers -->
  <text x="110" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">항목</text>
  <text x="340" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">화살표 레이블 (->)</text>
  <text x="600" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" font-weight="600">콜론 레이블 (:)</text>

  <line x1="80" y1="368" x2="800" y2="368" stroke="#1e2433" stroke-width="1"/>

  <text x="110" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Fall-through</text>
  <text x="340" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">없음 (안전)</text>
  <text x="600" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">있음 (주의)</text>

  <text x="110" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">블록 내 값 반환</text>
  <text x="340" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">yield 키워드 사용</text>
  <text x="600" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">yield 키워드 사용</text>

  <text x="110" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">완전성(exhaustiveness)</text>
  <text x="340" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">컴파일러가 검사 (default 필수)</text>
  <text x="600" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">컴파일러가 검사 (default 필수)</text>

  <text x="110" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">다중 레이블</text>
  <text x="340" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">case A, B, C -> ...</text>
  <text x="600" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">case A: case B: case C:</text>
</svg>
