<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">kubectl drain 주요 옵션</text>

  <!-- drain commands code -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">실무 drain 명령어</text>
  <rect x="60" y="94" width="400" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본 drain</text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">kubectl drain node-1 \</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  --ignore-daemonsets \</text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  --delete-emptydir-data</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 타임아웃 지정</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">kubectl drain node-1 \</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  --timeout=300s \</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  --ignore-daemonsets</text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 강제 축출 (PDB 무시 — 주의)</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">kubectl drain node-1 \</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">  --force \</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">  --disable-eviction</text>

  <!-- Options explanation -->
  <rect x="500" y="80" width="340" height="260" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="670" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">주요 옵션 설명</text>

  <rect x="516" y="120" width="308" height="50" rx="4" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="526" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">--ignore-daemonsets</text>
  <text x="526" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DaemonSet Pod는 drain 대상에서 제외</text>

  <rect x="516" y="180" width="308" height="50" rx="4" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="526" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">--delete-emptydir-data</text>
  <text x="526" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">emptyDir 볼륨 데이터 삭제 허용</text>

  <rect x="516" y="240" width="308" height="50" rx="4" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="526" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">--timeout</text>
  <text x="526" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">축출 완료 대기 시간 (기본: 무제한)</text>

  <rect x="516" y="300" width="308" height="30" rx="4" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="526" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">--force: 관리자 없는 Pod도 강제 축출</text>

  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">drain은 graceful termination을 사용 — terminationGracePeriodSeconds 존중</text>
</svg>
