<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이벤트 취소(cancel) 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">e.cancel = true 와 return false 동작 비교</text>

  <!-- Normal flow -->
  <text x="200" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">정상 흐름</text>

  <rect x="60" y="116" width="140" height="44" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">이벤트 발생</text>

  <line x1="200" y1="138" x2="236" y2="138" stroke="#55c555" stroke-width="2"/>
  <polygon points="236,131 248,138 236,145" fill="#55c555"/>

  <rect x="248" y="116" width="140" height="44" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="318" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">핸들러 실행</text>
  <text x="318" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">return; 또는 생략</text>

  <line x1="388" y1="138" x2="424" y2="138" stroke="#55c555" stroke-width="2"/>
  <polygon points="424,131 436,138 424,145" fill="#55c555"/>

  <rect x="436" y="116" width="140" height="44" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="506" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">기본 동작 수행</text>

  <line x1="576" y1="138" x2="612" y2="138" stroke="#55c555" stroke-width="2"/>
  <polygon points="612,131 624,138 612,145" fill="#55c555"/>

  <rect x="624" y="116" width="196" height="44" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="722" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">완료</text>

  <!-- Cancel flow -->
  <text x="200" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">취소 흐름</text>

  <rect x="60" y="212" width="140" height="44" rx="8" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">이벤트 발생</text>

  <line x1="200" y1="234" x2="236" y2="234" stroke="#e05555" stroke-width="2"/>
  <polygon points="236,227 248,234 236,241" fill="#e05555"/>

  <rect x="248" y="212" width="140" height="44" rx="8" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="318" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">핸들러 실행</text>
  <text x="318" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">e.cancel = true</text>

  <line x1="388" y1="234" x2="506" y2="234" stroke="#e05555" stroke-width="2" stroke-dasharray="6,3"/>

  <rect x="506" y="212" width="174" height="44" rx="8" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="593" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">기본 동작</text>
  <text x="593" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">⛔ 취소됨</text>

  <!-- e.cancel code -->
  <rect x="60" y="290" width="360" height="160" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">e.cancel = true 패턴</text>
  <line x1="80" y1="324" x2="400" y2="324" stroke="#333" stroke-width="1"/>
  <rect x="76" y="334" width="328" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">this</text>
  <text x="126" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">.edt_name.onkillfocus =</text>
  <text x="92" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text>
  <text x="142" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(obj, e) {</text>
  <text x="106" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  if</text>
  <text x="126" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (obj.value === </text>
  <text x="256" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">""</text>
  <text x="272" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">) {</text>
  <text x="120" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    e.cancel = </text>
  <text x="204" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">true</text>
  <text x="240" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">; }</text>
  <text x="92" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">};</text>

  <!-- return false code -->
  <rect x="460" y="290" width="360" height="160" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">return false / return true</text>
  <line x1="480" y1="324" x2="800" y2="324" stroke="#333" stroke-width="1"/>
  <rect x="476" y="334" width="328" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">this</text>
  <text x="526" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">.grd_list.oncelleditbegin =</text>
  <text x="492" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text>
  <text x="542" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(obj, e) {</text>
  <text x="506" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // false = 편집 진입 차단</text>
  <text x="506" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  if</text>
  <text x="526" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (!g_bEditable) </text>
  <text x="634" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">return false</text>
  <text x="718" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="492" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">};</text>
</svg>
