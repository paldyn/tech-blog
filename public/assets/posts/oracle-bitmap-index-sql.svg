<svg xmlns="http://www.w3.org/2000/svg" width="880" height="350" viewBox="0 0 880 350">
  <rect width="880" height="350" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">비트맵 인덱스 생성 및 확인</text>

  <!-- Code block left -->
  <rect x="60" y="66" width="360" height="258" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 비트맵 인덱스 생성</text>
  <text x="76" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">CREATE BITMAP INDEX</text>
  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    bidx_orders_status</text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ON orders (status);</text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">CREATE BITMAP INDEX</text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    bidx_orders_region</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ON orders (region);</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- Bitmap AND/OR 활용 쿼리</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT COUNT(*)</text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM   orders</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE  status  = 'PENDING'</text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">AND    region  = 'EAST';</text>

  <!-- Code block right -->
  <rect x="450" y="66" width="370" height="258" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 인덱스 유형 확인</text>
  <text x="466" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="466" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    index_name,</text>
  <text x="466" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    index_type,</text>
  <text x="466" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    blevel,</text>
  <text x="466" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    leaf_blocks</text>
  <text x="466" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM dba_indexes</text>
  <text x="466" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE table_name = 'ORDERS';</text>
  <text x="466" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- Bitmap Join Index (DW용)</text>
  <text x="466" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">CREATE BITMAP INDEX</text>
  <text x="466" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    bidx_sales_region</text>
  <text x="466" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ON sales (c.region)</text>
  <text x="466" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM sales s, customers c</text>
</svg>
