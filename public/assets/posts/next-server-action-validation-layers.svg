<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Server Action 검증 레이어</text>

  <!-- Layer 1: Client-side (optional) -->
  <rect x="60" y="70" width="760" height="70" rx="8" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="80" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">① 클라이언트 검증 (선택, UX 개선용)</text>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HTML5 required/pattern, React 상태, 실시간 피드백 — 우회 가능하므로 보안 목적 사용 금지</text>

  <line x1="440" y1="140" x2="440" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 2: Zod validation -->
  <rect x="60" y="156" width="760" height="80" rx="8" fill="#0f2e1a" stroke="#2a6e3a" stroke-width="1.5"/>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">② 서버 스키마 검증 (Zod / Valibot) — 필수</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타입 안전한 파싱 · 필드별 오류 메시지 생성 · 악의적 입력 차단</text>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">FormData → 구조화된 객체로 변환 + 타입 보장</text>

  <line x1="440" y1="236" x2="440" y2="252" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 3: Business logic validation -->
  <rect x="60" y="252" width="760" height="80" rx="8" fill="#1a1a2e" stroke="#4a4a8e" stroke-width="1.5"/>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">③ 비즈니스 로직 검증 — 필수</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">중복 이메일, 잔액 부족, 권한 확인 등 도메인 규칙</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DB 조회 기반 검증 — 서버에서만 가능</text>

  <line x1="440" y1="332" x2="440" y2="348" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 4: DB operation -->
  <rect x="60" y="348" width="760" height="66" rx="8" fill="#1a2a1a" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">④ DB 연산</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">검증 통과한 데이터만 DB에 도달 · 트랜잭션으로 원자성 보장</text>

  <!-- Side note -->
  <text x="800" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">우회</text>
  <text x="800" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">가능</text>
</svg>
