<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">traceback · inspect 모듈 활용</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">스택 프레임 정보를 프로그래밍으로 접근하기</text>

  <!-- traceback module -->
  <rect x="60" y="100" width="360" height="180" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">traceback 모듈</text>
  <rect x="76" y="136" width="328" height="128" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</tspan> traceback</text>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">try</tspan>:</text>
  <text x="92" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    risky_call()</text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">except</tspan> Exception:</text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    # 문자열로 트레이스백 획득</text>
  <text x="92" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    tb = traceback.format_exc()</text>

  <!-- inspect module -->
  <rect x="460" y="100" width="360" height="180" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">inspect 모듈</text>
  <rect x="476" y="136" width="328" height="128" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</tspan> inspect</text>
  <text x="492" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def</tspan> who_called_me():</text>
  <text x="492" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    stack = inspect.stack()</text>
  <text x="492" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    # stack[0] = 현재 함수</text>
  <text x="492" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    # stack[1] = 호출자</text>
  <text x="492" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    caller = stack[<tspan fill="#b5cea8">1</tspan>].function</text>

  <!-- sys._getframe -->
  <rect x="60" y="300" width="760" height="110" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">sys._getframe 으로 직접 프레임 접근</text>
  <rect x="76" y="336" width="728" height="58" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</tspan> sys</text>
  <text x="92" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">frame = sys._getframe(<tspan fill="#b5cea8">0</tspan>)  <tspan fill="#6a8aa0"># 0=현재, 1=호출자, 2=그 위...</tspan></text>
  <text x="92" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">print(frame.f_code.co_name, frame.f_lineno, frame.f_locals)</text>

  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">sys._getframe은 내부 API — inspect.stack()이 더 안전</text>
</svg>
