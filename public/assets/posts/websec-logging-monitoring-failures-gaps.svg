  <rect x="60" y="100" width="160" height="56" rx="8" fill="#1a0808" stroke="#e05a5a" stroke-width="1.5"/>
  <text x="140" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05a5a" text-anchor="middle">&#x26A0; &#xACF5;&#xACA9; &#xBC1C;&#xC0DD;</text>
  <text x="140" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">Attack Occurs</text>

