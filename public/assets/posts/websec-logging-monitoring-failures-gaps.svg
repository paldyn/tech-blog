  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555e77" text-anchor="middle">OWASP A09:2021 – Security Logging and Monitoring Failures</text>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555e77" text-anchor="middle">Source: IBM Cost of a Data Breach Report</text>
