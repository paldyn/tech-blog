      <path d="M0,0 L0,10 L12,5 Z" fill="#e05a5a"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">&#xB85C;&#xAE45;&#xB7E8;&#xBAA8;&#xB2C8;&#xD130;&#xB9C1; &#xC2E4;&#xD328;: &#xD0D0;&#xC9C0; &#xACF5;&#xBC31;</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#9aa4b8" text-anchor="middle">Logging and Monitoring Failure Gaps</text>

