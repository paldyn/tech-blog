  <text x="382" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">No Alerts</text>

  <!-- Arrow 2 -->
  <line x1="462" y1="128" x2="532" y2="128" stroke="#e05a5a" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>

