  <rect x="460" y="260" width="5" height="70" rx="3" fill="#e08a3a"/>
  <text x="482" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e08a3a">02</text>
  <text x="510" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">&#xC911;&#xC694; &#xC774;&#xBCA4;&#xD2B8; &#xC54C;&#xB9BC; &#xC5C6;&#xC74C;</text>
  <text x="510" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">&#xBCF4;&#xC548;&#xD300; &#xC989;&#xAC01; &#xB300;&#xC751; &#xBD88;&#xAC00;</text>

  <!-- Gap 3 -->
  <rect x="60" y="346" width="360" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="346" width="5" height="70" rx="3" fill="#d4c027"/>
  <text x="82" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#d4c027">03</text>
  <text x="110" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">&#xB85C;&#xADF8; &#xC911;&#xC559;&#xD654; &#xBD80;&#xC7AC;</text>
  <text x="110" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">&#xBD84;&#xC0B0;&#xB41C; &#xB85C;&#xADF8;&#xB85C; &#xC0C1;&#xAD00;&#xAD00;&#xACC4; &#xBD84;&#xC11D; &#xBD88;&#xAC00;</text>

  <!-- Gap 4 -->
  <rect x="460" y="346" width="360" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="460" y="346" width="5" height="70" rx="3" fill="#a78bfa"/>
  <text x="482" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#a78bfa">04</text>
  <text x="510" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">&#xCE68;&#xD574; &#xD0D0;&#xC9C0; &#xC9C0;&#xC5F0; (&#xD3C9;&#xADE0; 207&#xC77C;)</text>
