  <text x="110" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">&#xBC18;&#xBCF5; &#xC2E4;&#xD328; &#xD328;&#xD134; &#xAC10;&#xC9C0; &#xBD88;&#xAC00;</text>

