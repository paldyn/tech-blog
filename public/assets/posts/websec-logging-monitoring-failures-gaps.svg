  <text x="682" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4ec94e" text-anchor="middle">&#xCE68;&#xD574; &#xB4A4;&#xB19A;&#xAC8C; &#xD0D0;&#xC9C0;</text>
  <text x="682" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">days / weeks / months later</text>

