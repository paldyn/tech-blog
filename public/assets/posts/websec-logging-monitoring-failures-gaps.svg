  <text x="440" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05a5a" text-anchor="middle">&#xD3C9;&#xADE0; &#xCE68;&#xD574; &#xD0D0;&#xC9C0; &#xC2DC;&#xAC04;: 207&#xC77C;</text>

