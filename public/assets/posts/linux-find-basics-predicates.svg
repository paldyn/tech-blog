<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">find 핵심 조건(predicate) 정리</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">이름·타입·크기·날짜·권한 조건을 AND / OR 로 조합</text>

  <!-- Name/Type predicates -->
  <text x="80" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">이름 · 타입</text>
  <rect x="60" y="106" width="360" height="164" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-name <tspan fill="#ce9178">'*.log'</tspan>   <tspan fill="#9aa4b8"># 대소문자 구분</tspan></text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-iname <tspan fill="#ce9178">'*.Log'</tspan>  <tspan fill="#9aa4b8"># 대소문자 무시</tspan></text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-path <tspan fill="#ce9178">'*/src/*.c'</tspan> <tspan fill="#9aa4b8"># 경로 패턴</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-type f    <tspan fill="#9aa4b8"># 일반 파일</tspan></text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-type d    <tspan fill="#9aa4b8"># 디렉터리</tspan></text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-type l    <tspan fill="#9aa4b8"># 심볼릭 링크</tspan></text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-type b    <tspan fill="#9aa4b8"># 블록 장치</tspan></text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-empty     <tspan fill="#9aa4b8"># 빈 파일/디렉터리</tspan></text>

  <!-- Size/Date predicates -->
  <text x="480" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">크기 · 날짜</text>
  <rect x="460" y="106" width="360" height="164" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-size +10M    <tspan fill="#9aa4b8"># 10MB 초과</tspan></text>
  <text x="476" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-size -1k     <tspan fill="#9aa4b8"># 1kB 미만</tspan></text>
  <text x="476" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-size 512c    <tspan fill="#9aa4b8"># 정확히 512바이트</tspan></text>
  <text x="476" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-mtime -7     <tspan fill="#9aa4b8"># 7일 이내 수정</tspan></text>
  <text x="476" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-mtime +30    <tspan fill="#9aa4b8"># 30일 이전 수정</tspan></text>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-newer ref.txt<tspan fill="#9aa4b8"># ref 보다 새로운</tspan></text>
  <text x="476" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-mmin -60     <tspan fill="#9aa4b8"># 60분 이내 수정</tspan></text>
  <text x="476" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-atime +1     <tspan fill="#9aa4b8"># 1일 이전 접근</tspan></text>

  <!-- Permission/Depth predicates -->
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c55a">권한 · 깊이</text>
  <rect x="60" y="308" width="360" height="128" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-perm 644        <tspan fill="#9aa4b8"># 정확히 644</tspan></text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-perm /u+x       <tspan fill="#9aa4b8"># 사용자 실행 권한</tspan></text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-maxdepth 2      <tspan fill="#9aa4b8"># 최대 2단계</tspan></text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-mindepth 1      <tspan fill="#9aa4b8"># 최소 1단계</tspan></text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-user alice      <tspan fill="#9aa4b8"># 소유자가 alice</tspan></text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-group admin     <tspan fill="#9aa4b8"># 그룹이 admin</tspan></text>

  <!-- Logic operators -->
  <text x="480" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">논리 연산자</text>
  <rect x="460" y="308" width="360" height="128" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">-a / (기본)  <tspan fill="#ffffff">AND: 두 조건 모두</tspan></text>
  <text x="476" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">-o           <tspan fill="#ffffff">OR: 둘 중 하나</tspan></text>
  <text x="476" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">!            <tspan fill="#ffffff">NOT: 조건 부정</tspan></text>
  <text x="476" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 예: .log 또는 .txt</text>
  <text x="476" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">find . \( -name <tspan fill="#ce9178">'*.log'</tspan></text>
  <text x="476" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  -o -name <tspan fill="#ce9178">'*.txt'</tspan> \)</text>
</svg>
