<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">find 핵심 조건(predicate) 정리</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">이름·타입·크기·날짜·권한 조건을 AND / OR 로 조합</text>

  <!-- Name/Type predicates -->
  <text x="80" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">이름 · 타입</text>
  <rect x="60" y="106" width="360" height="164" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-name <tspan fill="#ce9178">'*.log'</tspan>   <tspan fill="#6a8aa0"># 대소문자 구분</tspan></text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-iname <tspan fill="#ce9178">'*.Log'</tspan>  <tspan fill="#6a8aa0"># 대소문자 무시</tspan></text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-path <tspan fill="#ce9178">'*/src/*.c'</tspan> <tspan fill="#6a8aa0"># 경로 패턴</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-type f    <tspan fill="#6a8aa0"># 일반 파일</tspan></text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-type d    <tspan fill="#6a8aa0"># 디렉터리</tspan></text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-type l    <tspan fill="#6a8aa0"># 심볼릭 링크</tspan></text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-type b    <tspan fill="#6a8aa0"># 블록 장치</tspan></text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-empty     <tspan fill="#6a8aa0"># 빈 파일/디렉터리</tspan></text>

  <!-- Size/Date predicates -->
  <text x="480" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">크기 · 날짜</text>
  <rect x="460" y="106" width="360" height="164" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-size +10M    <tspan fill="#6a8aa0"># 10MB 초과</tspan></text>
  <text x="476" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-size -1k     <tspan fill="#6a8aa0"># 1kB 미만</tspan></text>
  <text x="476" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-size 512c    <tspan fill="#6a8aa0"># 정확히 512바이트</tspan></text>
  <text x="476" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-mtime -7     <tspan fill="#6a8aa0"># 7일 이내 수정</tspan></text>
  <text x="476" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-mtime +30    <tspan fill="#6a8aa0"># 30일 이전 수정</tspan></text>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-newer ref.txt<tspan fill="#6a8aa0"># ref 보다 새로운</tspan></text>
  <text x="476" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-mmin -60     <tspan fill="#6a8aa0"># 60분 이내 수정</tspan></text>
  <text x="476" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-atime +1     <tspan fill="#6a8aa0"># 1일 이전 접근</tspan></text>

  <!-- Permission/Depth predicates -->
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c55a">권한 · 깊이</text>
  <rect x="60" y="308" width="360" height="128" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-perm 644        <tspan fill="#6a8aa0"># 정확히 644</tspan></text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-perm /u+x       <tspan fill="#6a8aa0"># 사용자 실행 권한</tspan></text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-maxdepth 2      <tspan fill="#6a8aa0"># 최대 2단계</tspan></text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-mindepth 1      <tspan fill="#6a8aa0"># 최소 1단계</tspan></text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-user alice      <tspan fill="#6a8aa0"># 소유자가 alice</tspan></text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-group admin     <tspan fill="#6a8aa0"># 그룹이 admin</tspan></text>

  <!-- Logic operators -->
  <text x="480" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">논리 연산자</text>
  <rect x="460" y="308" width="360" height="128" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">-a / (기본)  <tspan fill="#e8e8e8">AND: 두 조건 모두</tspan></text>
  <text x="476" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">-o           <tspan fill="#e8e8e8">OR: 둘 중 하나</tspan></text>
  <text x="476" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">!            <tspan fill="#e8e8e8">NOT: 조건 부정</tspan></text>
  <text x="476" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 예: .log 또는 .txt</text>
  <text x="476" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">find . \( -name <tspan fill="#ce9178">'*.log'</tspan></text>
  <text x="476" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  -o -name <tspan fill="#ce9178">'*.txt'</tspan> \)</text>
</svg>
