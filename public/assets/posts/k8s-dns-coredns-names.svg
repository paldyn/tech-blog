<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">쿠버네티스 DNS 네이밍 규칙</text>

  <!-- Service FQDN Section -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">Service FQDN 구조</text>

  <!-- FQDN breakdown boxes -->
  <!-- service name -->
  <rect x="60" y="100" width="130" height="52" rx="6" fill="#1a1f35" stroke="#7777cc" stroke-width="2"/>
  <text x="125" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">my-svc</text>
  <text x="125" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서비스 이름</text>

  <text x="196" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" fill="#555" text-anchor="middle">.</text>

  <!-- namespace -->
  <rect x="206" y="100" width="130" height="52" rx="6" fill="#1a1f35" stroke="#55c555" stroke-width="2"/>
  <text x="271" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">my-ns</text>
  <text x="271" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네임스페이스</text>

  <text x="342" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" fill="#555" text-anchor="middle">.</text>

  <!-- svc -->
  <rect x="352" y="100" width="80" height="52" rx="6" fill="#1a1f35" stroke="#e05555" stroke-width="2"/>
  <text x="392" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">svc</text>
  <text x="392" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">고정값</text>

  <text x="438" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" fill="#555" text-anchor="middle">.</text>

  <!-- cluster.local -->
  <rect x="448" y="100" width="160" height="52" rx="6" fill="#1a1f35" stroke="#7ec8e3" stroke-width="2"/>
  <text x="528" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">cluster.local</text>
  <text x="528" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">클러스터 도메인</text>

  <!-- Short form note -->
  <rect x="630" y="100" width="210" height="52" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="735" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">같은 NS 내 단축 접근</text>
  <text x="735" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">my-svc</text>

  <!-- search domains section -->
  <text x="60" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">resolv.conf 검색 도메인</text>

  <rect x="60" y="210" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="233" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># /etc/resolv.conf (Pod 내부)</text>
  <text x="76" y="253" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">nameserver <tspan fill="#55c555" font-weight="600">10.96.0.10</tspan></text>
  <text x="76" y="273" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">search    <tspan fill="#7ec8e3" font-weight="600">my-ns.svc.cluster.local</tspan> <tspan fill="#7ec8e3" font-weight="600">svc.cluster.local</tspan> <tspan fill="#7ec8e3" font-weight="600">cluster.local</tspan></text>
  <text x="76" y="293" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">options   <tspan fill="#ce9178">ndots:5</tspan></text>
  <text x="76" y="313" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ndots:5 → 도트가 5개 미만이면 search 도메인을 먼저 시도</text>

  <!-- Pod DNS Section -->
  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">Pod DNS 형식</text>

  <!-- Pod DNS breakdown -->
  <rect x="60" y="374" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="397" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Pod IP의 DNS 이름 (IP의 점을 하이픈으로 변환)</text>
  <text x="76" y="417" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">10-244-1-5.my-ns.pod.cluster.local</text>
  <text x="76" y="437" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># StatefulSet Pod: 안정적인 DNS 이름</text>
  <text x="76" y="457" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">web-0.web-svc.my-ns.svc.cluster.local</text>
  <text x="76" y="477" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 형식: {pod-name}.{headless-svc}.{namespace}.svc.cluster.local</text>

  <!-- Bottom note -->
  <text x="440" y="522" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">cluster.local은 기본값이며 클러스터 생성 시 변경 가능합니다</text>
</svg>
