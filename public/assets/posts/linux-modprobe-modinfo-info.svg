<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">modinfo 출력 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">모듈 메타데이터 주요 필드</text>

  <!-- Code block -->
  <rect x="60" y="88" width="480" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">$ modinfo ext4</text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">filename</tspan><tspan fill="#ffffff">: /lib/modules/.../ext4.ko</tspan></text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">description</tspan><tspan fill="#ffffff">: Fourth Extended Filesystem</tspan></text>
  <text x="76" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">author</tspan><tspan fill="#ffffff">: Remy Card, Stephen Tweedie</tspan></text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">license</tspan><tspan fill="#ffffff">: GPL</tspan></text>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">depends</tspan><tspan fill="#ce9178">: mbcache,jbd2</tspan></text>
  <text x="76" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">vermagic</tspan><tspan fill="#ffffff">: 6.8.0-51-generic SMP</tspan></text>
  <text x="76" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">parm</tspan><tspan fill="#ffffff">: fault_prealloc:bool</tspan></text>
  <text x="76" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># -F 로 특정 필드만 추출 가능</text>

  <!-- Annotation panel -->
  <rect x="570" y="88" width="250" height="220" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="695" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">핵심 필드</text>

  <text x="586" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">depends</text>
  <text x="586" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">먼저 로드해야 할 모듈 목록</text>

  <text x="586" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">vermagic</text>
  <text x="586" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">커널 버전 서명 — 불일치 시</text>
  <text x="586" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로드 거부됨</text>

  <text x="586" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">parm</text>
  <text x="586" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모듈 파라미터 (로드 시</text>
  <text x="586" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">key=value 로 전달 가능)</text>

  <text x="586" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">license</text>
  <text x="586" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GPL: 커널 심볼 전부 접근</text>

  <!-- Bottom commands -->
  <rect x="60" y="330" width="760" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="353" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8"># 특정 필드만 추출</tspan></text>
  <text x="76" y="373" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">modinfo</tspan><tspan fill="#ffffff"> -F depends ext4   </tspan><tspan fill="#9aa4b8"># mbcache,jbd2</tspan></text>
</svg>
