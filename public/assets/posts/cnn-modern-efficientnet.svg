<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">EfficientNet 복합 스케일링</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">깊이 · 너비 · 해상도를 함께 키우는 원칙</text>

  <!-- Three dimensions -->
  <!-- Depth -->
  <rect x="36" y="100" width="240" height="220" fill="#0d1520" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="156" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">깊이 (Depth)</text>

  <g transform="translate(96, 138)">
    <rect x="0" y="0"   width="120" height="22" fill="#1a2535" rx="3" stroke="#3a4560" stroke-width="1"/>
    <rect x="0" y="28"  width="120" height="22" fill="#1a2535" rx="3" stroke="#3a4560" stroke-width="1"/>
    <rect x="0" y="56"  width="120" height="22" fill="#1a2535" rx="3" stroke="#3a4560" stroke-width="1"/>
    <text x="60" y="15" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Layer 1</text>
    <text x="60" y="43" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Layer 2</text>
    <text x="60" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Layer 3</text>
    <!-- Extra layers after scaling -->
    <rect x="0" y="84"  width="120" height="22" fill="#1a3d2a" rx="3" stroke="#55c555" stroke-width="1" stroke-dasharray="4,2"/>
    <rect x="0" y="112" width="120" height="22" fill="#1a3d2a" rx="3" stroke="#55c555" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="60" y="99" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Layer 4 (추가)</text>
    <text x="60" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Layer 5 (추가)</text>
  </g>

  <text x="156" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">레이어 수 ↑</text>
  <text x="156" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">더 복잡한 패턴 포착</text>

  <!-- Width -->
  <rect x="320" y="100" width="240" height="220" fill="#0d1020" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">너비 (Width)</text>

  <g transform="translate(330, 138)">
    <!-- Narrow channels -->
    <rect x="0" y="0" width="30" height="60" fill="#1a2535" rx="2" stroke="#3a4560" stroke-width="1"/>
    <rect x="36" y="0" width="30" height="60" fill="#1a2535" rx="2" stroke="#3a4560" stroke-width="1"/>
    <rect x="72" y="0" width="30" height="60" fill="#1a2535" rx="2" stroke="#3a4560" stroke-width="1"/>
    <text x="55" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">64ch</text>

    <!-- Wider channels -->
    <rect x="0" y="80" width="30" height="60" fill="#1a1a2a" rx="2" stroke="#7777cc" stroke-width="1"/>
    <rect x="36" y="80" width="30" height="60" fill="#1a1a2a" rx="2" stroke="#7777cc" stroke-width="1"/>
    <rect x="72" y="80" width="30" height="60" fill="#1a1a2a" rx="2" stroke="#7777cc" stroke-width="1"/>
    <rect x="108" y="80" width="30" height="60" fill="#1a1a2a" rx="2" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,2"/>
    <rect x="144" y="80" width="30" height="60" fill="#1a1a2a" rx="2" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="85" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">128ch (추가)</text>
  </g>

  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">채널 수 ↑</text>
  <text x="440" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">더 세밀한 특징 포착</text>

  <!-- Resolution -->
  <rect x="604" y="100" width="240" height="220" fill="#100d18" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="724" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">해상도 (Resolution)</text>

  <g transform="translate(632, 140)">
    <!-- Low res grid -->
    <text x="45" y="16" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">224×224</text>
    <rect x="0"  y="22" width="22" height="22" fill="#1a1208" stroke="#7a5530" stroke-width="1"/>
    <rect x="24" y="22" width="22" height="22" fill="#1a1208" stroke="#7a5530" stroke-width="1"/>
    <rect x="48" y="22" width="22" height="22" fill="#1a1208" stroke="#7a5530" stroke-width="1"/>
    <rect x="0"  y="46" width="22" height="22" fill="#1a1208" stroke="#7a5530" stroke-width="1"/>
    <rect x="24" y="46" width="22" height="22" fill="#1a1208" stroke="#7a5530" stroke-width="1"/>
    <rect x="48" y="46" width="22" height="22" fill="#1a1208" stroke="#7a5530" stroke-width="1"/>
    <rect x="0"  y="70" width="22" height="22" fill="#1a1208" stroke="#7a5530" stroke-width="1"/>
    <rect x="24" y="70" width="22" height="22" fill="#1a1208" stroke="#7a5530" stroke-width="1"/>
    <rect x="48" y="70" width="22" height="22" fill="#1a1208" stroke="#7a5530" stroke-width="1"/>

    <!-- Higher res grid -->
    <text x="120" y="16" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">600×600</text>
    <g transform="translate(90, 22)">
      <rect x="0"  y="0"  width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="18" y="0"  width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="36" y="0"  width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="54" y="0"  width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="0"  y="18" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="18" y="18" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="36" y="18" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="54" y="18" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="0"  y="36" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="18" y="36" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="36" y="36" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="54" y="36" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="0"  y="54" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="18" y="54" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="36" y="54" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
      <rect x="54" y="54" width="16" height="16" fill="#1a1008" stroke="#ce9178" stroke-width="1"/>
    </g>
  </g>

  <text x="724" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">입력 해상도 ↑</text>
  <text x="724" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">더 세밀한 특징 입력</text>

  <!-- Bottom: Compound formula -->
  <rect x="36" y="338" width="808" height="48" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="440" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">복합 스케일링: depth=α^φ  width=β^φ  resolution=γ^φ  (α·β²·γ² ≈ 2)</text>
  <text x="440" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">φ를 1 늘리면 FLOPs 약 2배 증가 — 균형있게 성능·효율 동시 향상</text>
</svg>
