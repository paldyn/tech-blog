<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">window · document · navigator 관계</text>

  <!-- window box (outermost) -->
  <rect x="60" y="66" width="760" height="380" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="86" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">window</text>
  <text x="86" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전역 객체 — 브라우저 탭 전체를 대표, 전역 변수의 실제 컨테이너</text>

  <!-- window key props -->
  <text x="86" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">innerWidth/Height  outerWidth/Height</text>
  <text x="86" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">scrollX/Y  devicePixelRatio  screen</text>
  <text x="86" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">setTimeout  fetch  localStorage  history  location</text>

  <!-- document box (inside window) -->
  <rect x="86" y="186" width="420" height="240" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="106" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">window.document</text>
  <text x="106" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DOM 진입점 — 현재 탭의 HTML 문서를 대표</text>

  <text x="106" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">document.documentElement  ← &lt;html&gt;</text>
  <text x="106" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">document.head  document.body</text>
  <text x="106" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">document.title  document.URL</text>
  <text x="106" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">document.readyState  document.cookie</text>
  <text x="106" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">querySelector  getElementById</text>
  <text x="106" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">createElement  createTextNode</text>
  <text x="106" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">addEventListener  dispatchEvent</text>
  <text x="106" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">visibilityState  hasFocus()</text>

  <!-- navigator box (right side) -->
  <rect x="526" y="186" width="274" height="240" rx="8" fill="#0d1117" stroke="#e8a84c" stroke-width="1.5"/>
  <text x="546" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8a84c">window.navigator</text>
  <text x="546" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">브라우저·기기 환경 정보</text>

  <text x="546" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8a84c">userAgent</text>
  <text x="546" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8a84c">language  languages[]</text>
  <text x="546" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8a84c">onLine  hardwareConcurrency</text>
  <text x="546" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8a84c">geolocation  clipboard</text>
  <text x="546" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8a84c">permissions  serviceWorker</text>
  <text x="546" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8a84c">mediaDevices  bluetooth</text>
  <text x="546" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8a84c">sendBeacon()</text>
  <text x="546" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8a84c">share()  vibrate()</text>

  <!-- readyState timeline -->
  <text x="60" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">document.readyState 전이</text>

  <rect x="60" y="486" width="150" height="24" rx="4" fill="#131a2e" stroke="#7777cc"/>
  <text x="135" y="503" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">loading</text>

  <line x1="210" y1="498" x2="250" y2="498" stroke="#555" stroke-width="2"/>
  <polygon points="250,498 242,493 242,503" fill="#555"/>

  <rect x="250" y="486" width="170" height="24" rx="4" fill="#131a2e" stroke="#7777cc"/>
  <text x="335" y="503" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">interactive</text>

  <line x1="420" y1="498" x2="460" y2="498" stroke="#555" stroke-width="2"/>
  <polygon points="460,498 452,493 452,503" fill="#555"/>

  <rect x="460" y="486" width="170" height="24" rx="4" fill="#131a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="545" y="503" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">complete</text>

  <text x="660" y="503" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DOMContentLoaded → load</text>
</svg>
