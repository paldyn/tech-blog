<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">화면 책임 분리 계층</text>

  <!-- View Layer -->
  <rect x="60" y="62" width="760" height="68" rx="6" fill="#0d1e35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="86" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3">View Layer · 화면 레이어</text>
  <text x="440" y="110" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">컴포넌트 배치 · 사용자 이벤트 수신 · 화면 상태 갱신</text>

  <!-- Arrow 1 -->
  <line x1="440" y1="133" x2="440" y2="158"
    stroke="#555" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- Controller Layer -->
  <rect x="60" y="160" width="760" height="68" rx="6" fill="#0d2b1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="184" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#55c555">Controller Layer · 제어 레이어</text>
  <text x="440" y="208" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">입력 검증 · 비즈니스 로직 · 트랜잭션 호출</text>

  <!-- Arrow 2 -->
  <line x1="440" y1="231" x2="440" y2="256"
    stroke="#555" stroke-width="2" marker-end="url(#arr-down)"/>

  <!-- Data Layer -->
  <rect x="60" y="258" width="760" height="68" rx="6" fill="#1a1435" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="282" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7777cc">Data Layer · 데이터 레이어</text>
  <text x="440" y="306" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">Dataset 관리 · 서버 통신 · 응답 상태 추적</text>

  <!-- Bottom rule cards -->
  <rect x="60" y="350" width="226" height="34" rx="5" fill="#141a22" stroke="#3a4a6e" stroke-width="1"/>
  <text x="173" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">View: UI만 처리</text>

  <rect x="327" y="350" width="226" height="34" rx="5" fill="#141a22" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">Controller: 로직만 처리</text>

  <rect x="594" y="350" width="226" height="34" rx="5" fill="#141a22" stroke="#3a4a6e" stroke-width="1"/>
  <text x="707" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc">Data: 상태만 관리</text>
</svg>
