<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Image Pull Secret 인증 흐름</text>

  <!-- kubelet -->
  <rect x="60" y="80" width="160" height="80" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">kubelet</text>
  <text x="140" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이미지 풀 요청</text>
  <text x="140" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컨테이너 런타임에 위임</text>

  <line x1="220" y1="120" x2="258" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Secret lookup -->
  <rect x="258" y="80" width="180" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="348" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Secret 조회</text>
  <text x="348" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">kubernetes.io/dockerconfigjson</text>
  <text x="348" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">imagePullSecrets 참조</text>

  <line x1="438" y1="120" x2="476" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Registry auth -->
  <rect x="476" y="80" width="160" height="80" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="556" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">레지스트리 인증</text>
  <text x="556" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자격증명으로</text>
  <text x="556" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이미지 다운로드</text>

  <line x1="636" y1="120" x2="674" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Private Registry -->
  <rect x="674" y="80" width="160" height="80" rx="8" fill="#2a1a00" stroke="#e05555" stroke-width="1.5"/>
  <text x="754" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Private Registry</text>
  <text x="754" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">my-registry.example.com</text>
  <text x="754" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ECR / GCR / ACR</text>

  <!-- Create secret command -->
  <rect x="60" y="190" width="420" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># Image Pull Secret 생성</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl create secret docker-registry \</text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  regcred \</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --docker-server=my-registry.example.com \</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --docker-username=myuser \</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --docker-password=mypassword \</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">  -n production</text>

  <!-- Pod spec -->
  <rect x="500" y="190" width="340" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># Pod spec에서 참조</text>
  <text x="516" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">spec:</text>
  <text x="516" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  containers:</text>
  <text x="516" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    - image: my-registry/myapp:v2</text>
  <text x="516" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">  imagePullSecrets:</text>
  <text x="516" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">    - name: regcred</text>
  <text x="516" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  # 또는 SA에 연결</text>

  <!-- Service Account approach -->
  <rect x="60" y="364" width="760" height="90" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">ServiceAccount에 imagePullSecret 연결 — 네임스페이스 전체 적용</text>
  <rect x="76" y="402" width="710" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl patch serviceaccount default -n production \</text>
  <text x="92" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  -p '{"imagePullSecrets": [{"name": "regcred"}]}'</text>
</svg>
