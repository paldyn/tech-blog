<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">선택 정렬 — 최솟값 선택 과정</text>

  <!-- Row labels -->
  <text x="70" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">초기</text>
  <text x="70" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">i=0</text>
  <text x="70" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">i=1</text>
  <text x="70" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">i=2</text>
  <text x="70" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">완료</text>

  <!-- Initial: [6, 2, 8, 1, 5, 4] -->
  <rect x="120" y="84" width="80" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">6</text>
  <rect x="210" y="84" width="80" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">2</text>
  <rect x="300" y="84" width="80" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">8</text>
  <rect x="390" y="84" width="80" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="430" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">1</text>
  <rect x="480" y="84" width="80" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="520" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">5</text>
  <rect x="570" y="84" width="80" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="610" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">4</text>

  <!-- i=0: min=1 at index 3, swap with 6 → [1, 2, 8, 6, 5, 4] -->
  <rect x="120" y="160" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">1</text>
  <text x="160" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">확정</text>
  <rect x="210" y="160" width="80" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="250" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">2</text>
  <rect x="300" y="160" width="80" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="340" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">8</text>
  <rect x="390" y="160" width="80" height="40" fill="#111" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="430" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#e05555">6</text>
  <rect x="480" y="160" width="80" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="520" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">5</text>
  <rect x="570" y="160" width="80" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="610" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">4</text>
  <text x="780" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">min=1(idx3)</text>
  <text x="780" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">swap(0,3)</text>

  <!-- i=1: min=2 already in place → [1, 2, 8, 6, 5, 4] -->
  <rect x="120" y="236" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">1</text>
  <rect x="210" y="236" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="250" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>
  <text x="250" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">확정</text>
  <rect x="300" y="236" width="80" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="340" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">8</text>
  <rect x="390" y="236" width="80" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="430" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">6</text>
  <rect x="480" y="236" width="80" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="520" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">5</text>
  <rect x="570" y="236" width="80" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="610" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">4</text>
  <text x="780" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">min=2(idx1)</text>
  <text x="780" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">no swap</text>

  <!-- i=2: min=4 at idx 5, swap with 8 → [1, 2, 4, 6, 5, 8] -->
  <rect x="120" y="312" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-size,sans-serif" font-size="18" font-weight="700" fill="#55c555">1</text>
  <rect x="210" y="312" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="250" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>
  <rect x="300" y="312" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="340" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">4</text>
  <text x="340" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">확정</text>
  <rect x="390" y="312" width="80" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="430" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">6</text>
  <rect x="480" y="312" width="80" height="40" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="520" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888">5</text>
  <rect x="570" y="312" width="80" height="40" fill="#111" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="610" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#e05555">8</text>
  <text x="780" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">min=4(idx5)</text>
  <text x="780" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">swap(2,5)</text>

  <!-- Final -->
  <rect x="120" y="388" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">1</text>
  <rect x="210" y="388" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="250" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>
  <rect x="300" y="388" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="340" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">4</text>
  <rect x="390" y="388" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="430" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">5</text>
  <rect x="480" y="388" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="520" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">6</text>
  <rect x="570" y="388" width="80" height="40" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="610" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">8</text>
</svg>
