<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일 쓰기 버퍼링 동작</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">write() → 버퍼 → flush() → OS 커널 → 디스크 — 버퍼가 없으면 쓰기가 느려진다</text>

  <!-- App box -->
  <rect x="60" y="106" width="160" height="60" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Python 앱</text>
  <text x="140" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">f.write("data")</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="136" x2="264" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="242" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">즉시</text>

  <!-- Write buffer box -->
  <rect x="268" y="96" width="180" height="80" rx="8" fill="#111827" stroke="#ce9178" stroke-width="2"/>
  <text x="358" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">쓰기 버퍼</text>
  <text x="358" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Python 레이어</text>
  <text x="358" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기본: 8KB 단위</text>

  <!-- Arrow 2: flush -->
  <line x1="448" y1="136" x2="492" y2="136" stroke="#55c555" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="470" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">flush()</text>

  <!-- OS buffer box -->
  <rect x="496" y="96" width="160" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="576" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">OS 버퍼</text>
  <text x="576" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">커널 캐시</text>
  <text x="576" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Page Cache</text>

  <!-- Arrow 3 -->
  <line x1="656" y1="136" x2="700" y2="136" stroke="#7777cc" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="678" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">fsync</text>

  <!-- Disk box -->
  <rect x="704" y="106" width="116" height="60" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="762" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">디스크</text>
  <text x="762" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">영구 저장</text>

  <!-- Buffering modes -->
  <rect x="60" y="220" width="760" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="78" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># buffering 매개변수 제어</text>
  <text xml:space="preserve" x="78" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">open</tspan>(path, <tspan fill="#ce9178">"w"</tspan>, buffering=<tspan fill="#b5cea8">-1</tspan>)   <tspan fill="#9aa4b8"># 기본: 시스템 결정</tspan></text>
  <text xml:space="preserve" x="78" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">open</tspan>(path, <tspan fill="#ce9178">"w"</ttml:tspan>, buffering=<tspan fill="#b5cea8">0</ttml:tspan>)    <tspan fill="#9aa4b8"># 이진 모드만: 버퍼 없음</tspan></text>
  <text xml:space="preserve" x="78" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">open</tspan>(path, <ttml:tspan fill="#ce9178">"w"</tspan>, buffering=<tspan fill="#b5cea8">1</ttml:tspan>)    <tspan fill="#9aa4b8"># 줄 버퍼링 (텍스트)</tspan></text>
  <text xml:space="preserve" x="78" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">open</tspan>(path, <ttml:tspan fill="#ce9178">"w"</tspan>, buffering=<ttml:tspan fill="#b5cea8">8192</ttml:tspan>) <tspan fill="#9aa4b8"># 8KB 블록 버퍼</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">f.write(<ttml:tspan fill="#ce9178">"data"</ttml:tspan>)  <tspan fill="#9aa4b8"># 버퍼에 쌓임</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">f.flush()         <ttml:tspan fill="#9aa4b8"># 버퍼 → OS 전달</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">f.close()         <ttml:tspan fill="#9aa4b8"># flush() + 파일 닫기</ttml:tspan></text>
</svg>
