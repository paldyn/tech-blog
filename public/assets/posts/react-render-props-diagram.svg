<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">렌더 프롭 패턴</text>

  <defs>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="80" width="320" height="100" rx="10" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="220" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">MouseTracker</text>
  <text x="220" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">state: { x, y } 관리</text>
  <text x="220" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">render({ x, y }) 호출</text>

  <line x1="380" y1="130" x2="460" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrp)"/>
  <text x="420" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">render prop</text>
  <text x="420" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">{ x, y } 전달</text>

  <rect x="460" y="80" width="360" height="100" rx="10" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">사용하는 쪽</text>
  <text x="640" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">render 함수로 UI 주입</text>
  <text x="640" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">렌더링 로직을 완전히 제어</text>

  <rect x="60" y="202" width="760" height="190" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> MouseTracker({ render }) {</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [pos, setPos] = useState({ x: </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, y: </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> });</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">    &lt;div onMouseMove={e =&gt; setPos({ x: e.clientX, y: e.clientY })}&gt;</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">      {render(pos)}</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">    &lt;/div&gt;</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">  );</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#9aa4b8">// render prop으로 원하는 UI를 주입</tspan></tspan>
    <tspan x="76" dy="20"><tspan fill="#ffffff">&lt;MouseTracker render={({ x, y }) =&gt; &lt;p&gt;마우스: {x}, {y}&lt;/p&gt;} /&gt;</tspan></tspan>
  </text>
</svg>