<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="are" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">온디맨드 재검증 흐름</text>

  <!-- User action -->
  <rect x="60" y="80" width="180" height="64" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="108"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">사용자 액션</text>
  <text x="150" y="130"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">글 수정·삭제 등</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="112" x2="300" y2="112" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arb)"/>

  <!-- Server Action -->
  <rect x="304" y="80" width="200" height="64" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="404" y="108"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Server Action</text>
  <text x="404" y="130"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DB 변경 수행</text>

  <!-- Arrow 2 -->
  <line x1="504" y1="112" x2="564" y2="112" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arb)"/>

  <!-- revalidateTag/Path -->
  <rect x="568" y="80" width="252" height="64" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="694" y="104"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">revalidateTag('posts')</text>
  <text x="694" y="122"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">revalidatePath('/posts')</text>
  <text x="694" y="138"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">캐시 무효화 요청</text>

  <!-- Arrow down from revalidate -->
  <line x1="694" y1="144" x2="694" y2="200" stroke="#e05555" stroke-width="2" marker-end="url(#are)"/>

  <!-- Data Cache invalidated -->
  <rect x="450" y="204" width="488" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="694" y="228"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Data Cache 무효화</text>
  <text x="694" y="250"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">태그 매칭 항목 모두 stale 처리</text>

  <!-- Next request arrow -->
  <line x1="440" y1="280" x2="440" y2="334" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arb)"/>
  <text x="452" y="314"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">다음 요청</text>

  <!-- Result: fresh data -->
  <rect x="200" y="338" width="480" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="362"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">최신 데이터 렌더링</text>
  <text x="440" y="384"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새 fetch 실행 → Data Cache에 저장 → 응답</text>

  <!-- Webhook note -->
  <text x="150" y="200"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CMS Webhook의 경우:</text>
  <text x="150" y="220"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Route Handler에서</text>
  <text x="150" y="240"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">revalidateTag 호출</text>
</svg>
