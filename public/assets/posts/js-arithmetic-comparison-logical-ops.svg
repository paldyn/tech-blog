<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">산술 연산자 — 형변환과 함정</text>

  <!-- + operator -->
  <rect x="60" y="72" width="360" height="180" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">+ 연산자 (이중 역할)</text>
  <text x="240" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">문자열이 있으면 연결, 없으면 덧셈</text>
  <rect x="84" y="136" width="312" height="100" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="100" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text><text x="110" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> + </text><text x="128" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text><text x="138" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">          // 3</text>
  <text x="100" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text><text x="110" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> + </text><text x="128" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'2'</text><text x="152" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">        // "12" (문자열 연결)</text>
  <text x="100" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'3'</text><text x="124" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> - </text><text x="140" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text><text x="150" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">         // 2 (-는 숫자 변환)</text>
  <text x="100" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{} + []    </text><text x="172" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 0 (문 vs 표현식 문제)</text>
  <text x="100" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[] + {}    </text><text x="172" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// "[object Object]"</text>

  <!-- comparison operators -->
  <rect x="460" y="72" width="360" height="180" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">비교 연산자</text>
  <text x="640" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">문자열은 사전순, 숫자는 수치 비교</text>
  <rect x="484" y="136" width="312" height="100" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="500" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff"> &gt; </tspan><tspan fill="#b5cea8">9</tspan><tspan fill="#9aa4b8">          // true</tspan></text>
  <text x="500" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">'10'</tspan><tspan fill="#ffffff"> &gt; </tspan><tspan fill="#ce9178">'9'</tspan><tspan fill="#9aa4b8">       // false! (사전순)</tspan></text>
  <text x="500" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#b5cea8">null</tspan><tspan fill="#ffffff"> &gt;= </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#9aa4b8">       // true (null→0)</tspan></text>
  <text x="500" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">null</text><text x="528" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> == </text><text x="554" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text><text x="562" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">       // false! (특수규칙)</text>
  <text x="500" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">NaN</tspan><tspan fill="#ffffff"> &lt; </tspan><tspan fill="#7ec8e3">NaN</tspan><tspan fill="#9aa4b8">        // false</tspan></text>

  <!-- operator precedence -->
  <text x="60" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">연산자 우선순위와 논리 연산자</text>
  <rect x="60" y="300" width="760" height="158" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 논리 연산자 — boolean 강제 변환 후 반환</text>
  <text x="80" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff"> &amp;&amp; </tspan><tspan fill="#ce9178">'hello'</tspan><tspan fill="#9aa4b8">  // 'hello' (마지막 평가값 반환)</tspan></text>
  <text x="80" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">false</tspan><tspan fill="#ffffff"> &amp;&amp; </tspan><tspan fill="#ce9178">'hello'</tspan><tspan fill="#9aa4b8"> // false (단락 평가)</tspan></text>
  <text x="80" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">false</tspan><tspan fill="#ffffff"> || </tspan><tspan fill="#ce9178">'default'</tspan><tspan fill="#9aa4b8">// 'default'</tspan></text>
  <text x="80" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text><text x="90" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> || </text><text x="112" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'default'</text><text x="174" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // 'default' (0은 falsy)</text>
  <text x="80" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 우선순위: ! > 산술 > 비교 > &amp;&amp; > || > 삼항 > 대입</text>
  <text x="80" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff"> || </tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#ffffff"> &amp;&amp; </tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#9aa4b8"> // true (&amp;&amp;가 먼저)</tspan></text>
  <text x="80" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff"> || </tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#ffffff">) &amp;&amp; </tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#9aa4b8"> // false</tspan></text>

  <!-- Footer -->
</svg>
