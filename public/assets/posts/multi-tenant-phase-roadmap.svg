<svg xmlns="http://www.w3.org/2000/svg" width="880" height="640" viewBox="0 0 880 640">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="640" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">멀티테넌시 도입 — 3단계 Phase 로드맵</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">한 PR 로는 못 끝낸다. 단계별로 독립 배포 가능하도록.</text>

  <!-- Phase 1 -->
  <rect x="60" y="100" width="760" height="140" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="2"/>
  <text x="80" y="128" font-size="15" font-weight="700" fill="#7777cc">Phase 1 — 인증 API 만</text>
  <line x1="80" y1="142" x2="800" y2="142" stroke="#222"/>

  <text x="80" y="170" font-size="13" fill="#aaa">• 프로젝트 CRUD + 멤버 grant API (POST/PATCH/DELETE)</text>
  <text x="80" y="192" font-size="13" fill="#aaa">• /auth/projects 가 grant 받은 활성 프로젝트만 반환 (SUPER_ADMIN 우회)</text>
  <text x="80" y="214" font-size="13" fill="#aaa">• admin UI 에 "프로젝트 관리" 탭</text>

  <line x1="440" y1="240" x2="440" y2="270" stroke="#444" stroke-width="2"/>
  <polygon points="435,266 445,266 440,278" fill="#444"/>

  <!-- Phase 2 -->
  <rect x="60" y="278" width="760" height="200" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="80" y="306" font-size="15" font-weight="700" fill="#55c555">Phase 2 — 백엔드 데이터 격리</text>
  <line x1="80" y1="320" x2="800" y2="320" stroke="#222"/>

  <text x="80" y="350" font-size="12" font-weight="600" fill="#7ec8e3">2.1 인증 API</text>
  <text x="220" y="350" font-size="12" fill="#aaa">JWT 에 projects / project_access claim</text>

  <text x="80" y="378" font-size="12" font-weight="600" fill="#7ec8e3">2.2 사전 API</text>
  <text x="220" y="378" font-size="12" fill="#aaa">MyBatis 38 쿼리 명시적 격리 + 마이그레이션</text>

  <text x="80" y="406" font-size="12" font-weight="600" fill="#7ec8e3">2.3 ERD API</text>
  <text x="220" y="406" font-size="12" fill="#aaa">Hibernate @Filter (선언적) + AOP 자동 활성화 + 마이그레이션</text>

  <text x="80" y="434" font-size="12" font-weight="600" fill="#7ec8e3">2.4 DB 워크벤치 API</text>
  <text x="280" y="434" font-size="12" fill="#aaa">composite PK (project_code, user_id) + 마이그레이션</text>

  <text x="800" y="462" text-anchor="end" font-size="11" fill="#444">4개 API 합쳐 통합 테스트 24개 추가</text>

  <line x1="440" y1="478" x2="440" y2="508" stroke="#444" stroke-width="2"/>
  <polygon points="435,504 445,504 440,516" fill="#444"/>

  <!-- Phase 3 -->
  <rect x="60" y="516" width="760" height="100" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="80" y="544" font-size="15" font-weight="700" fill="#e05555">Phase 3 — frontend</text>
  <line x1="80" y1="558" x2="800" y2="558" stroke="#222"/>

  <text x="80" y="582" font-size="13" fill="#aaa">• axios 인터셉터 — X-Tenant-Project 헤더 자동 첨부 (3 인스턴스)</text>
  <text x="80" y="604" font-size="13" fill="#aaa">• 사이드바의 ProjectSwitcher 드롭다운 + 페이지 reload 로 캐시 무효화</text>

  <text x="440" y="632" text-anchor="middle" font-size="11" fill="#444">회고 시리즈 · 멀티테넌시 도입기</text>
</svg>
