<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">디스크 공간 점유 구조</text>

  <!-- Disk box -->
  <rect x="340" y="70" width="200" height="60" rx="8" fill="#1a1a0a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">디스크 풀</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">No space left on device</text>

  <!-- Images -->
  <rect x="60" y="190" width="180" height="70" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">이미지</text>
  <text x="150" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">dangling + 미사용 이미지</text>
  <text x="150" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">수십 GB 점유 가능</text>

  <!-- Containers -->
  <rect x="280" y="190" width="180" height="70" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="370" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">컨테이너</text>
  <text x="370" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">정지된 컨테이너 레이어</text>
  <text x="370" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">로그 파일 무한 증가</text>

  <!-- Volumes -->
  <rect x="500" y="190" width="180" height="70" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="590" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">볼륨</text>
  <text x="590" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">미사용 named 볼륨</text>
  <text x="590" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">DB 데이터 볼륨 누적</text>

  <!-- Build Cache -->
  <rect x="680" y="190" width="140" height="70" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="750" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">빌드 캐시</text>
  <text x="750" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">BuildKit 캐시</text>
  <text x="750" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">반복 빌드 누적</text>

  <!-- Arrows to disk -->
  <line x1="150" y1="190" x2="390" y2="132" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <line x1="370" y1="190" x2="420" y2="132" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <line x1="590" y1="190" x2="460" y2="132" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <line x1="750" y1="190" x2="492" y2="132" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Code block -->
  <rect x="60" y="290" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 현재 Docker 디스크 사용량 확인</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">$ docker system df</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">TYPE       SIZE    RECLAIMABLE</text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Images     12.4GB  8.2GB (66%)</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Containers 1.2GB   1.2GB (100%)</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Volumes    4.8GB   2.1GB (43%)</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Build Cache 3.1GB  3.1GB (100%)</text>

  <!-- Cleanup commands -->
  <rect x="460" y="290" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 안전한 전체 정리 (볼륨 제외)</text>
  <text x="476" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">docker</text>
  <text x="522" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> system prune</text>
  <text x="476" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 미사용 볼륨 포함 전체 정리</text>
  <text x="476" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">docker</text>
  <text x="522" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> system prune --volumes -f</text>
  <text x="476" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 빌드 캐시만 정리</text>
  <text x="476" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">docker</text>
  <text x="522" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> builder prune -f</text>
  <text x="476" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 이미지만 정리</text>
</svg>
