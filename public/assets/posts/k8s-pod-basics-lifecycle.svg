<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">파드 생명주기 (Pod Lifecycle)</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">kubectl get pod 의 STATUS 필드 변화</text>

  <!-- States -->
  <!-- Pending -->
  <rect x="60" y="100" width="140" height="60" rx="8" fill="#1a1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="130" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">Pending</text>
  <text x="130" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스케줄링 대기</text>

  <line x1="200" y1="130" x2="248" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Init -->
  <rect x="250" y="100" width="140" height="60" rx="8" fill="#1a1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="320" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">Init</text>
  <text x="320" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">init 컨테이너 실행</text>

  <line x1="390" y1="130" x2="438" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Running -->
  <rect x="440" y="100" width="140" height="60" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="510" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Running</text>
  <text x="510" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨테이너 실행 중</text>

  <!-- Succeeded -->
  <line x1="580" y1="130" x2="628" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="630" y="100" width="140" height="60" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Succeeded</text>
  <text x="700" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정상 종료 (exit 0)</text>

  <!-- Failed branch from Running -->
  <path d="M 510 160 Q 510 200 620 220" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-red)"/>
  <rect x="620" y="210" width="140" height="60" rx="8" fill="#200d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="690" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Failed</text>
  <text x="690" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비정상 종료 (exit ≠ 0)</text>

  <!-- CrashLoopBackOff -->
  <path d="M 690 270 Q 690 310 510 320" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-red)"/>
  <rect x="370" y="310" width="220" height="60" rx="8" fill="#200d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="480" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">CrashLoopBackOff</text>
  <text x="480" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">반복 재시작 후 백오프</text>

  <!-- Terminating -->
  <path d="M 510 160 Q 260 210 170 215" stroke="#888" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr)"/>
  <rect x="60" y="205" width="140" height="60" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="130" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">Terminating</text>
  <text x="130" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">종료 요청 처리 중</text>

  <!-- kubectl commands box -->
  <rect x="60" y="310" width="290" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 파드 상태 확인</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">kubectl get pod myapp-xxx</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">kubectl describe pod myapp-xxx</text>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">kubectl logs myapp-xxx -c app</text>
</svg>
