<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">pyenv 디렉토리 구조</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">~/.pyenv 내부 이해하기</text>

  <!-- Directory tree code block -->
  <rect x="60" y="90" width="400" height="278" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">~/.pyenv/</tspan></text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">├── </tspan><tspan fill="#55c555">versions/</tspan></text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">│   ├── </tspan><tspan fill="#7777cc">3.10.14/</tspan></text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">│   ├── </tspan><tspan fill="#7777cc">3.11.8/</tspan></text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">│   └── </tspan><tspan fill="#55c555">3.12.3/</tspan><tspan fill="#9aa4b8">  ← global</tspan></text>
  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">├── </tspan><tspan fill="#ce9178">shims/</tspan></text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">│   ├── python</tspan></text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">│   ├── pip</tspan></text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">│   └── pytest</tspan></text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">├── </tspan><tspan fill="#b5cea8">version</tspan><tspan fill="#9aa4b8">  (global 설정)</tspan></text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">└── </tspan><tspan fill="#7ec8e3">plugins/</tspan></text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    └── </tspan><tspan fill="#7ec8e3">pyenv-virtualenv</tspan></text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 프로젝트 로컬 설정</text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">./my-project/.python-version</tspan></text>

  <!-- Explanation boxes -->
  <rect x="480" y="90" width="340" height="84" rx="8" fill="#0f1820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="650" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#ce9178">shims 동작 원리</text>
  <text x="490" y="136" font-size="11" fill="#aaa">PATH 맨 앞에 ~/.pyenv/shims 추가</text>
  <text x="490" y="154" font-size="11" fill="#aaa">python 명령 → shim 가로채기</text>
  <text x="490" y="170" font-size="11" fill="#aaa">올바른 버전으로 자동 라우팅</text>

  <rect x="480" y="192" width="340" height="84" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">versions 디렉토리</text>
  <text x="490" y="238" font-size="11" fill="#aaa">각 Python 버전이 독립적으로 설치</text>
  <text x="490" y="256" font-size="11" fill="#aaa">bin/python, lib/, include/ 포함</text>
  <text x="490" y="272" font-size="11" fill="#aaa">시스템 Python에 영향 없음</text>

  <rect x="480" y="294" width="340" height="74" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">.python-version 파일</text>
  <text x="490" y="340" font-size="11" fill="#aaa">디렉토리에 들어가면 자동 감지</text>
  <text x="490" y="358" font-size="11" fill="#aaa">팀원들과 버전 공유에 사용</text>

  <!-- Shell config note -->
  <rect x="60" y="400" width="760" height="60" rx="8" fill="#0f1418" stroke="#333"/>
  <text x="440" y="422" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">~/.bashrc 또는 ~/.zshrc에 추가 필요</text>
  <text x="440" y="444" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555">eval "$(pyenv init -)"</text>
</svg>
