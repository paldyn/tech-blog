<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">알려진 포함 관계: P ⊆ NP ⊆ PSPACE ⊆ EXPTIME</text>

  <!-- nested ellipses -->
  <ellipse cx="320" cy="270" rx="250" ry="150" fill="none" stroke="#e8a855" stroke-width="2"/>
  <text x="320" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a855">EXPTIME</text>

  <ellipse cx="320" cy="285" rx="195" ry="118" fill="#7777cc11" stroke="#7777cc" stroke-width="2"/>
  <text x="320" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">PSPACE</text>

  <ellipse cx="320" cy="300" rx="140" ry="85" fill="#7ec8e311" stroke="#7ec8e3" stroke-width="2"/>
  <text x="320" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">NP</text>

  <ellipse cx="320" cy="315" rx="80" ry="50" fill="#55c55522" stroke="#55c555" stroke-width="2"/>
  <text x="320" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">P</text>

  <!-- right legend -->
  <rect x="610" y="110" width="210" height="48" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="626" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">P</text>
  <text x="626" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다항 시간 풀이</text>

  <rect x="610" y="170" width="210" height="48" rx="6" fill="#000000" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="626" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">NP</text>
  <text x="626" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다항 시간 검증</text>

  <rect x="610" y="230" width="210" height="48" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1.5"/>
  <text x="626" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">PSPACE</text>
  <text x="626" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다항 메모리 사용</text>

  <rect x="610" y="290" width="210" height="48" rx="6" fill="#000000" stroke="#e8a855" stroke-width="1.5"/>
  <text x="626" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a855" font-weight="600">EXPTIME</text>
  <text x="626" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">지수 시간 풀이</text>

  <text x="60" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">P ⊊ EXPTIME 은 증명됐지만, P=NP·NP=PSPACE 등 중간 단계의 등호 여부는 미해결</text>
</svg>
