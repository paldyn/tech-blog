<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">802.1Q VLAN 태깅 — 트렁크 포트</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">스위치 간 링크(트렁크)는 여러 VLAN 프레임을 4바이트 태그로 구분해 전달</text>

  <!-- Ethernet frame without tag -->
  <text x="80" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" font-weight="600">일반 이더넷 프레임 (Access 포트)</text>
  <rect x="80" y="114" width="100" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">목적지 MAC</text>
  <rect x="186" y="114" width="100" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="236" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">출발지 MAC</text>
  <rect x="292" y="114" width="60" height="40" rx="4" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="322" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">EtherType</text>
  <rect x="358" y="114" width="200" height="40" rx="4" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="458" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">데이터 페이로드</text>
  <rect x="564" y="114" width="60" height="40" rx="4" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="594" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">FCS</text>
  <text x="594" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">CRC</text>

  <!-- Tagged frame -->
  <text x="80" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555" font-weight="600">802.1Q 태그 삽입 프레임 (Trunk 포트)</text>
  <rect x="80" y="204" width="100" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">목적지 MAC</text>
  <rect x="186" y="204" width="100" height="40" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="236" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">출발지 MAC</text>
  <!-- 802.1Q Tag - highlighted -->
  <rect x="292" y="200" width="90" height="48" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="337" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle" font-weight="700">802.1Q TAG</text>
  <text x="337" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555" text-anchor="middle">TPID+TCI</text>
  <text x="337" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#888" text-anchor="middle">4 bytes</text>
  <rect x="388" y="204" width="60" height="40" rx="4" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="418" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">EtherType</text>
  <rect x="454" y="204" width="200" height="40" rx="4" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="554" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">데이터 페이로드</text>
  <rect x="660" y="204" width="60" height="40" rx="4" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="690" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">FCS</text>
  <text x="690" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">CRC</text>

  <!-- Tag breakdown -->
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">802.1Q 태그 구조 (4바이트)</text>
  <rect x="80" y="288" width="100" height="50" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">TPID</text>
  <text x="130" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">0x8100</text>
  <text x="130" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">2 bytes</text>
  <rect x="186" y="288" width="60" height="50" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="216" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">PCP</text>
  <text x="216" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">우선순위</text>
  <text x="216" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">3bits</text>
  <rect x="252" y="288" width="40" height="50" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="272" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e05555" text-anchor="middle">DEI</text>
  <text x="272" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">폐기</text>
  <text x="272" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">1bit</text>
  <rect x="298" y="288" width="100" height="50" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="348" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">VID</text>
  <text x="348" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">VLAN ID</text>
  <text x="348" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">12bits(0-4095)</text>

  <!-- Code box -->
  <rect x="60" y="360" width="760" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">SW(config-if)# </text>
  <text x="222" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">switchport mode trunk</text>
  <text x="80" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">SW(config-if)# </text>
  <text x="222" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">switchport trunk allowed vlan 10,20,30</text>
</svg>
