<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">.tsx에서 제네릭 화살표 함수의 함정</text>
  <text x="60" y="78" font-size="13" fill="#888">&lt;T&gt;를 JSX 태그로 오해 → 쉼표나 extends로 구분해야 한다</text>

  <!-- wrong -->
  <rect x="60" y="100" width="360" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" font-size="14" font-weight="600" fill="#e05555">❌ .tsx에서 에러</text>
  <text xml:space="preserve" x="76" y="166" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> id = &lt;T&gt;(x: T)</tspan></text>
  <text xml:space="preserve" x="76" y="188" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">  =&gt; x;</tspan></text>
  <text xml:space="preserve" x="76" y="226" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// &lt;T&gt; 를 JSX 여는</text>
  <text xml:space="preserve" x="76" y="248" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 태그로 오해</text>
  <text x="76" y="290" font-size="13" fill="#e05555">JSX 파서가 닫는 태그를</text>
  <text x="76" y="310" font-size="13" fill="#e05555">찾다가 실패</text>

  <!-- right -->
  <rect x="460" y="100" width="360" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="128" font-size="14" font-weight="600" fill="#55c555">✓ 쉼표 또는 extends</text>
  <text xml:space="preserve" x="476" y="166" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> id = &lt;T,&gt;(x: T)</tspan></text>
  <text xml:space="preserve" x="476" y="188" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  =&gt; x;</text>
  <text xml:space="preserve" x="476" y="226" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> id = &lt;T </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan></text>
  <text xml:space="preserve" x="476" y="248" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  unknown&gt;(x: T) =&gt; x;</text>
  <text x="476" y="290" font-size="13" fill="#55c555">&lt;T,&gt; 의 쉼표 또는</text>
  <text x="476" y="310" font-size="13" fill="#55c555">extends가 JSX와 구분</text>
</svg>
