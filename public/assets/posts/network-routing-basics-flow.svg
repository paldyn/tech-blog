<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">라우팅: 패킷이 목적지를 찾아가는 여정</text>

  <!-- Host A -->
  <rect x="60" y="100" width="110" height="60" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="115" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">호스트 A</text>
  <text x="115" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">10.0.1.10</text>

  <line x1="170" y1="130" x2="218" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrc)"/>
  <text x="194" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">패킷</text>

  <!-- Router 1 -->
  <rect x="220" y="90" width="120" height="80" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="280" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">라우터 R1</text>
  <text x="280" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">10.0.1.1 / 10.0.2.1</text>
  <text x="280" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">라우팅 테이블 조회</text>

  <line x1="340" y1="130" x2="388" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arrr)"/>

  <!-- Router 2 -->
  <rect x="390" y="90" width="120" height="80" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="450" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">라우터 R2</text>
  <text x="450" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">10.0.2.2 / 10.0.3.1</text>
  <text x="450" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">다음 홉 결정</text>

  <line x1="510" y1="130" x2="558" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arrr)"/>

  <!-- Router 3 -->
  <rect x="560" y="90" width="120" height="80" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">라우터 R3</text>
  <text x="620" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">10.0.3.2 / 10.0.4.1</text>
  <text x="620" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">직접 연결 전달</text>

  <line x1="680" y1="130" x2="728" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrc)"/>

  <!-- Host B -->
  <rect x="730" y="100" width="110" height="60" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="785" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">호스트 B</text>
  <text x="785" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">10.0.4.20</text>

  <!-- Routing table -->
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">라우터 R1의 라우팅 테이블</text>
  <rect x="60" y="225" width="760" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Table header -->
  <text x="80" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">목적지 네트워크       넥스트홉        메트릭  인터페이스</text>
  <line x1="80" y1="256" x2="800" y2="256" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">10.0.1.0/24           직접 연결            0        eth0</text>
  <text x="80" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">10.0.2.0/24           직접 연결            0        eth1</text>
  <text x="80" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">10.0.3.0/24           10.0.2.2            10        eth1</text>
  <text x="80" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">10.0.4.0/24           10.0.2.2            20        eth1</text>
  <text x="80" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">0.0.0.0/0             10.0.2.2            -         eth1</text>
  <text x="80" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 0.0.0.0/0 = 기본 경로 (default route)</text>
  <text x="80" y="394" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 매칭 없을 때 이쪽으로 전달 (인터넷 게이트웨이)</text>
  <text x="80" y="414" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 메트릭: 낮을수록 선호 경로</text>
</svg>
