<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">PGO — 프로파일 기반 최적화로 AOT 강화</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">실측 프로파일을 빌드에 피드백해 피크 처리량 회복</text>

  <!-- PGO 3-step flow -->
  <!-- Step 1 -->
  <rect x="60" y="96" width="220" height="72" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">1단계: 인스트루먼트 빌드</text>
  <text x="170" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">--pgo-instrument 플래그로</text>
  <text x="170" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로파일 수집용 이미지 생성</text>

  <line x1="280" y1="132" x2="330" y2="132" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Step 2 -->
  <rect x="330" y="96" width="220" height="72" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">2단계: 프로파일 실행</text>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 워크로드로 이미지 실행</text>
  <text x="440" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">default.iprof 파일 생성</text>

  <line x1="550" y1="132" x2="600" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Step 3 -->
  <rect x="600" y="96" width="220" height="72" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">3단계: PGO 빌드</text>
  <text x="710" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">--pgo=default.iprof 로</text>
  <text x="710" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최적화된 최종 이미지 생성</text>

  <!-- PGO Code example -->
  <rect x="60" y="192" width="760" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 1단계: 인스트루먼트 이미지 빌드</text>
  <text x="76" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">native-image <tspan fill="#7ec8e3" font-weight="600">--pgo-instrument</tspan> -jar myapp.jar -o myapp-instr</text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 2단계: 실 워크로드로 실행 (iprof 생성)</text>
  <text x="76" y="271" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">./myapp-instr  <tspan fill="#9aa4b8">  # → default.iprof 생성</tspan></text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 3단계: 프로파일 피드백 최적화 빌드</text>
  <text x="76" y="309" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">native-image <tspan fill="#7ec8e3" font-weight="600">--pgo</tspan>=default.iprof -jar myapp.jar -o myapp-pgo</text>

  <!-- When AOT wins section -->
  <text x="60" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">AOT가 유리한 상황</text>

  <rect x="60" y="354" width="220" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">서버리스 / FaaS</text>
  <text x="170" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">콜드 스타트 최소화 필수</text>

  <rect x="300" y="354" width="220" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="410" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">CLI 도구</text>
  <text x="410" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행마다 즉시 응답 필요</text>

  <rect x="540" y="354" width="220" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">메모리 제약 컨테이너</text>
  <text x="650" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JVM 오버헤드 제거</text>

  <!-- Leyden / jaotc note -->
  <rect x="60" y="434" width="760" height="56" rx="8" fill="#111118" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Project Leyden — JVM 내부 AOT의 미래</text>
  <text x="440" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">jaotc는 JDK 17에서 제거됨. Leyden은 CDS + AOT를 JVM 수준에서 통합해 기동 개선 추진 중</text>
</svg>
