<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle 메모리 구조 전체 지도</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">SGA (공유) · PGA (프로세스별) · UGA (세션별)</text>

  <!-- SGA outer -->
  <rect x="60" y="92" width="500" height="390" fill="#0d1a2e" rx="10" stroke="#7777cc" stroke-width="2"/>
  <text x="310" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">SGA (System Global Area)</text>
  <text x="310" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 프로세스가 공유 — 인스턴스 시작 시 할당</text>

  <!-- Buffer Cache -->
  <rect x="80" y="148" width="220" height="80" fill="#0d2040" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="190" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Buffer Cache</text>
  <text x="190" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디스크 블록 캐시</text>
  <text x="190" y="210" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">DB_CACHE_SIZE</text>

  <!-- Shared Pool -->
  <rect x="320" y="148" width="220" height="80" fill="#0d1a3e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="430" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Shared Pool</text>
  <text x="430" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Library Cache (파싱 결과)</text>
  <text x="430" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dictionary Cache</text>

  <!-- Redo Log Buffer -->
  <rect x="80" y="246" width="220" height="70" fill="#1a1000" rx="8" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="190" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8b84b">Redo Log Buffer</text>
  <text x="190" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">변경 벡터 임시 저장</text>
  <text x="190" y="302" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">LOG_BUFFER</text>

  <!-- Large Pool -->
  <rect x="320" y="246" width="104" height="70" fill="#0d1a2e" rx="8" stroke="#555" stroke-width="1"/>
  <text x="372" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">Large Pool</text>
  <text x="372" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">RMAN·</text>
  <text x="372" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">병렬 쿼리</text>

  <!-- Java Pool -->
  <rect x="436" y="246" width="104" height="70" fill="#0d1a2e" rx="8" stroke="#555" stroke-width="1"/>
  <text x="488" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">Java Pool</text>
  <text x="488" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JVM</text>
  <text x="488" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">코드 캐시</text>

  <!-- Fixed SGA -->
  <rect x="80" y="330" width="460" height="40" fill="#0d1520" rx="6" stroke="#333"/>
  <text x="310" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Fixed SGA (내부 구조 포인터 — 크기 고정)</text>

  <!-- ASMM note -->
  <rect x="80" y="385" width="460" height="80" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="96" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- ASMM: 자동 공유 메모리 관리</text>
  <text x="96" y="423" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ALTER SYSTEM SET</text>
  <text x="252" y="423" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> sga_target=4G;</text>
  <text x="96" y="441" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ALTER SYSTEM SET</text>
  <text x="252" y="441" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> memory_target=8G;</text>

  <!-- PGA box -->
  <rect x="600" y="92" width="220" height="200" fill="#111" rx="10" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">PGA</text>
  <text x="710" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Process Global Area</text>
  <text x="710" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">프로세스마다 개별 할당</text>

  <rect x="618" y="160" width="184" height="118" fill="#0e1a0e" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">UGA (포함)</text>
  <text x="710" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">세션 상태·커서</text>
  <text x="710" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Sort Area</text>
  <text x="710" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Hash Join Area</text>
  <text x="710" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Bitmap Merge Area</text>

  <!-- PGA note -->
  <rect x="600" y="305" width="220" height="60" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="616" y="325" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 자동 PGA 관리</text>
  <text x="616" y="343" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SET</text>
  <text x="638" y="343" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> pga_aggregate_target</text>
  <text x="616" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  = 2G;</text>

  <!-- Bottom query -->
  <rect x="60" y="500" width="760" height="42" fill="#0d0d18" rx="6" stroke="#3a4a6e"/>
  <text x="96" y="516" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- SGA 현황</text>
  <text x="204" y="516" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="250" y="516" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> * </text>
  <text x="268" y="516" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="302" y="516" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> v$sgastat;</text>
  <text x="430" y="516" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  -- PGA 현황</text>
  <text x="556" y="516" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="602" y="516" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> * </text>
  <text x="620" y="516" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="654" y="516" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> v$pgastat;</text>
  <text x="440" y="534" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v$ 동적 성능 뷰로 실시간 현황 모니터링</text>
</svg>
