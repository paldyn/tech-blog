<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arrInfo" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrWarn" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrSucc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">폴링 vs 웹훅</text>

  <!-- ===== 좌측: 폴링 ===== -->
  <text x="225" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">폴링 (반복 GET)</text>

  <!-- 좌 client/server 기둥 헤더 -->
  <rect x="60" y="96" width="150" height="34" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">클라이언트</text>
  <rect x="240" y="96" width="150" height="34" rx="6" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="315" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">서버</text>

  <!-- lifelines -->
  <line x1="135" y1="130" x2="135" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="315" y1="130" x2="315" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- GET 1 -->
  <line x1="135" y1="160" x2="313" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <text x="224" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">GET /events</text>
  <line x1="315" y1="186" x2="137" y2="186" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrWarn)"/>
  <text x="224" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">204 빈 응답 (낭비)</text>

  <!-- GET 2 -->
  <line x1="135" y1="236" x2="313" y2="236" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <text x="224" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">GET /events</text>
  <line x1="315" y1="262" x2="137" y2="262" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrWarn)"/>
  <text x="224" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">204 빈 응답 (낭비)</text>

  <!-- GET 3 (드디어 데이터) -->
  <line x1="135" y1="312" x2="313" y2="312" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <text x="224" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">GET /events</text>
  <line x1="315" y1="338" x2="137" y2="338" stroke="#55c555" stroke-width="2" marker-end="url(#arrSucc)"/>
  <text x="224" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">200 데이터 (드디어)</text>

  <text x="225" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">대부분 빈 응답 · 지연 · 트래픽 낭비</text>

  <!-- 구분선 -->
  <line x1="440" y1="70" x2="440" y2="430" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ===== 우측: 웹훅 ===== -->
  <text x="655" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">웹훅 (역방향 POST)</text>

  <rect x="490" y="96" width="150" height="34" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="565" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">클라이언트</text>
  <rect x="670" y="96" width="150" height="34" rx="6" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="745" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">서버</text>

  <line x1="565" y1="130" x2="565" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="745" y1="130" x2="745" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- 등록 -->
  <line x1="565" y1="166" x2="743" y2="166" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <text x="654" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">callback URL 등록</text>

  <!-- 대기 -->
  <text x="654" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">… 이벤트 발생까지 대기 …</text>

  <!-- 이벤트 발생 표시 -->
  <circle cx="745" cy="262" r="6" fill="#55c555"/>
  <text x="745" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">이벤트 발생</text>

  <!-- POST 역방향 -->
  <line x1="745" y1="312" x2="567" y2="312" stroke="#55c555" stroke-width="2" marker-end="url(#arrSucc)"/>
  <text x="654" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">POST /callback</text>
  <line x1="565" y1="338" x2="743" y2="338" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <text x="654" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">200 ack</text>

  <text x="655" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">필요할 때 한 번 · 즉시 전달 · 낭비 없음</text>
</svg>
