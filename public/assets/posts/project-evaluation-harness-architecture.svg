  <rect x="643" y="88" width="177" height="112" rx="10" fill="#111" stroke="#55c555" stroke-width="2"/>
  <text x="731" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Scorer</text>
  <text x="731" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">채점 엔진</text>
  <rect x="661" y="142" width="140" height="18" rx="4" fill="#0d1a10" stroke="#55c555" stroke-width="1"/>
  <text x="731" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">LLM-as-Judge (GPT-4)</text>
  <rect x="661" y="164" width="140" height="18" rx="4" fill="#0d1a10" stroke="#55c555" stroke-width="1"/>
  <text x="731" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Rule / Regex / ROUGE</text>

  <!-- ── Parallel inference visualization ── -->
  <text x="440" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">병렬 비동기 추론 — asyncio.gather + semaphore(concurrency=8)</text>

  <!-- Parallel case boxes -->
  <rect x="60" y="250" width="115" height="38" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="117" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">case_001</text>
  <text x="117" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">pending → done</text>

  <rect x="185" y="250" width="115" height="38" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="242" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">case_002</text>
  <text x="242" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">pending → done</text>

  <rect x="310" y="250" width="115" height="38" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="367" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">case_003</text>
  <text x="367" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">scoring…</text>

  <rect x="435" y="250" width="115" height="38" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="492" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">case_004</text>
  <text x="492" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">scoring…</text>

  <rect x="560" y="250" width="115" height="38" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="617" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">case_005</text>
  <text x="617" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">score: 4/5</text>

  <rect x="685" y="250" width="115" height="38" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="742" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">case_006</text>
  <text x="742" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">score: 5/5</text>

  <!-- ── Lower row: Results DB → Dashboard ── -->
  <line x1="731" y1="200" x2="731" y2="338" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-green)"/>

  <!-- Results DB -->
  <rect x="599" y="340" width="221" height="80" rx="10" fill="#111" stroke="#55c555" stroke-width="2"/>
  <text x="709" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Results DB</text>
  <text x="709" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">run_id · model · scores</text>
  <text x="709" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">SQLite · Postgres · JSON</text>

  <!-- Arrow Results DB → Dashboard -->
  <line x1="599" y1="380" x2="462" y2="380" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Dashboard -->
  <rect x="249" y="340" width="210" height="80" rx="10" fill="#111" stroke="#e05555" stroke-width="2"/>
  <text x="354" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">Dashboard</text>
  <text x="354" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">지표 집계 · 회귀 감지</text>
  <text x="354" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">score trend · version diff</text>

  <!-- Human Eval side -->
  <rect x="60" y="340" width="172" height="80" rx="10" fill="#111" stroke="#e05555" stroke-width="2"/>
  <text x="146" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">Human Eval</text>
  <text x="146" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Gold Standard</text>
  <text x="146" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Annotation UI</text>

  <line x1="249" y1="380" x2="232" y2="380" stroke="#e05555" stroke-width="2" marker-end="url(#arrow-warn)"/>

  <!-- Bottom legend -->
  <line x1="60" y1="454" x2="100" y2="454" stroke="#7777cc" stroke-width="2"/>
  <text x="108" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">입력 흐름</text>
  <line x1="190" y1="454" x2="230" y2="454" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="238" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">채점 결과</text>
  <line x1="320" y1="454" x2="360" y2="454" stroke="#e05555" stroke-width="2"/>
  <text x="368" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사람 평가</text>
  <line x1="450" y1="454" x2="490" y2="454" stroke="#7ec8e3" stroke-width="2"/>
  <text x="498" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">병렬 추론</text>

  <text x="440" y="496" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">Eval Harness — Test → Infer → Score → Report</text>
</svg>
