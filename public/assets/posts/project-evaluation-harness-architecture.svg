  <rect x="462" y="104" width="140" height="80" rx="10" fill="#111" stroke="#555" stroke-width="2"/>
  <text x="532" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">LLM API</text>
  <text x="532" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GPT-4 / Claude</text>
  <text x="532" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">rate-limit aware</text>

  <!-- Arrow 3 → 4 -->
  <line x1="602" y1="144" x2="642" y2="144" stroke="#555" stroke-width="2" marker-end="url(#arrow-gray)"/>

