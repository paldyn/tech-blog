<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <defs>
    <marker id="arrow-gray" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-accent" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7777cc"/>
    </marker>
    <marker id="arrow-info" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-warn" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">평가 하네스 파이프라인 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">Test Dataset → Async Eval Runner → Scorer → Results DB → Dashboard</text>

  <!-- ── Step 1: Test Dataset ── -->
  <rect x="60" y="104" width="148" height="80" rx="10" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <text x="134" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">Test Dataset</text>
  <text x="134" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">입력 / 기대 출력</text>
  <text x="134" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">JSONL · CSV · DB</text>

  <!-- Arrow 1 → 2 -->
  <line x1="208" y1="144" x2="248" y2="144" stroke="#7777cc" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <!-- ── Step 2: Eval Runner (async) ── -->
  <rect x="249" y="88" width="172" height="112" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="335" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Eval Runner</text>
  <text x="335" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비동기 배치 추론</text>
  <rect x="267" y="144" width="136" height="18" rx="4" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="335" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">case_001 ──▶ LLM</text>
  <rect x="267" y="166" width="136" height="18" rx="4" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="335" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">case_002 ──▶ LLM</text>

  <!-- Arrow 2 → 3 -->
  <line x1="421" y1="144" x2="461" y2="144" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrow-info)"/>

