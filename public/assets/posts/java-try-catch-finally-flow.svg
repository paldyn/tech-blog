<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">try-catch-finally 실행 흐름</text>

  <!-- try block -->
  <rect x="60" y="70" width="280" height="60" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">try { ... }</text>
  <text x="200" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">보호할 코드 실행</text>

  <!-- Normal path -->
  <line x1="200" y1="130" x2="200" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="220" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">정상</text>

  <!-- Exception path -->
  <line x1="340" y1="100" x2="500" y2="100" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="420" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">예외 발생</text>

  <!-- catch block -->
  <rect x="510" y="70" width="280" height="60" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="650" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">catch (XxxException e) { ... }</text>
  <text x="650" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">예외 처리</text>

  <line x1="650" y1="130" x2="650" y2="160" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- finally block — always runs -->
  <rect x="270" y="170" width="300" height="60" rx="8" fill="#1a1a0d" stroke="#b5cea8" stroke-width="2"/>
  <text x="420" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b5cea8" text-anchor="middle">finally { ... }</text>
  <text x="420" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">항상 실행 (예외·정상·return 무관)</text>

  <!-- Lines to finally -->
  <line x1="200" y1="160" x2="300" y2="170" stroke="#55c555" stroke-width="1.5"/>
  <line x1="650" y1="160" x2="540" y2="170" stroke="#e05555" stroke-width="1.5"/>

  <!-- Line from finally to continue -->
  <line x1="420" y1="230" x2="420" y2="262" stroke="#b5cea8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="300" y="262" width="240" height="44" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="420" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">정상 흐름 계속</text>
  <text x="420" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(catch가 처리한 경우)</text>

  <!-- Code block -->
  <rect x="60" y="330" width="760" height="168" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 전형적인 사용 패턴</text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Connection</tspan><tspan fill="#ffffff"> conn = </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    conn = DriverManager.getConnection(url);</tspan></text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// DB 작업</tspan></text>
  <text x="76" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">} </tspan><tspan fill="#7ec8e3" font-weight="600">catch</tspan><tspan fill="#ffffff"> (SQLException e) {</tspan></text>
  <text x="76" y="472" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    log.error(</tspan><tspan fill="#ce9178">"DB 오류"</tspan><tspan fill="#ffffff">, e);</tspan></text>
  <text x="76" y="492" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">} </tspan><tspan fill="#7ec8e3" font-weight="600">finally</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="512" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (conn != </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">) conn.close();  </tspan><tspan fill="#9aa4b8">// 자원 해제 보장</tspan></text>
</svg>
