<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">버전 스큐 정책 — 무엇이 얼마나 차이 나도 되는가</text>

  <!-- reference: api server -->
  <rect x="320" y="86" width="240" height="60" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">kube-apiserver (기준)</text>
  <text x="440" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">예: v1.30</text>

  <!-- rows -->
  <rect x="60" y="190" width="350" height="64" rx="8" fill="#13151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">kubelet</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">apiserver보다 최대 3 마이너 낮게 OK (높으면 안 됨)</text>

  <rect x="470" y="190" width="350" height="64" rx="8" fill="#13151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="490" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">controller-manager · scheduler</text>
  <text x="490" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">apiserver와 같거나 1 마이너 낮게</text>

  <rect x="60" y="270" width="350" height="64" rx="8" fill="#13151c" stroke="#ce9178" stroke-width="1.5"/>
  <text x="80" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">kubectl</text>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">apiserver 기준 ±1 마이너 이내</text>

  <rect x="470" y="270" width="350" height="64" rx="8" fill="#2a1416" stroke="#e05555" stroke-width="1.5"/>
  <text x="490" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">핵심 규칙</text>
  <text x="490" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">한 번에 한 마이너씩만 — 건너뛰기 금지</text>

  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컴포넌트가 apiserver보다 높은 버전이어선 안 된다 — 그래서 컨트롤 플레인을 먼저 올린다</text>
</svg>
