<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <!-- Background -->
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">캐시 제어 설정 예시</text>

  <!-- Code box 1: XML -->
  <rect x="40" y="58" width="800" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- XML comment -->
  <text x="60" y="82" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&lt;!-- TypeDef.xml — 캐시 설정 --&gt;</text>
  <text x="60" y="99" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">&lt;TypeDefinition&gt;</tspan>
  </text>
  <text x="60" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">&lt;CacheInfo&gt;</tspan>
  </text>
  <!-- TypeDef cache -->
  <text x="60" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &lt;!-- TypeDef는 항상 최신 버전 --&gt;</text>
  <text x="60" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">&lt;Cache</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">id</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"TypeDef"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">no-cache</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"true"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">no-store</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"true"</tspan><tspan fill="#7ec8e3" font-weight="600">/&gt;</tspan>
  </text>
  <!-- Script cache -->
  <text x="60" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &lt;!-- JS 번들은 버전 해시로 캐시 --&gt;</text>
  <text x="60" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">&lt;Cache</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">id</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"Script"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">max-age</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"31536000"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">immutable</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"true"</tspan><tspan fill="#7ec8e3" font-weight="600">/&gt;</tspan>
  </text>
  <!-- Image cache -->
  <text x="60" y="201" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &lt;!-- 이미지: 1시간 캐시 --&gt;</text>
  <text x="60" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">&lt;Cache</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">id</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"Image"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">max-age</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"3600"</tspan><tspan fill="#7ec8e3" font-weight="600">/&gt;</tspan>
  </text>
  <text x="60" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/CacheInfo&gt;</tspan>
  </text>
  <text x="60" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">&lt;/TypeDefinition&gt;</tspan>
  </text>

  <!-- Code box 2: HTTP header example -->
  <rect x="40" y="292" width="800" height="132" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="60" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 서버 응답 헤더 (nginx)</text>
  <text x="60" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">Cache-Control</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">no-store</tspan>
  </text>
  <text x="60" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">→ TypeDef.xml, *.xml 설정 파일</tspan>
  </text>
  <!-- blank -->
  <text x="60" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">Cache-Control</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">max-age=31536000</tspan>
  </text>
  <text x="60" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">→ nexacro.xxxx.js (해시 포함)</tspan>
  </text>
</svg>
