<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Replacements — 값 복사 변환기</text>

  <!-- Source -->
  <rect x="60" y="70" width="340" height="180" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">소스 (source)</text>
  <rect x="76" y="107" width="308" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># ConfigMap에서 값 읽기</text>
  <text x="92" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">replacements:</text>
  <text x="92" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  - source:</text>
  <text x="92" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      kind: ConfigMap</text>
  <text x="92" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">      name: app-version</text>
  <text x="92" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      fieldPath: data.VERSION</text>

  <!-- arrow -->
  <line x1="400" y1="160" x2="460" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="430" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">복사</text>

  <!-- Target -->
  <rect x="460" y="70" width="360" height="260" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">대상 (targets)</text>
  <rect x="476" y="107" width="328" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">    targets:</text>
  <text x="492" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      - select:</text>
  <text x="492" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">          kind: Deployment</text>
  <text x="492" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">        fieldPaths:</text>
  <text x="492" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">          - spec.template.spec</text>
  <text x="492" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">            .containers[0].image</text>
  <text x="492" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">        options:</text>
  <text x="492" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">          delimiter: ":"</text>
  <text x="492" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">          index: 1</text>
  <text x="492" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" xml:space="preserve">          # myapp:latest 중 :latest 부분만 교체</text>
  <text x="492" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">          # → myapp:v2.0.0</text>

  <!-- bottom: use cases -->
  <rect x="60" y="278" width="160" height="130" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">활용 1</text>
  <text x="140" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">ConfigMap 값을</text>
  <text x="140" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Deployment env로</text>
  <text x="140" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">자동 복사</text>
  <text x="140" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">중복 없이 한 곳에서 관리</text>

  <rect x="244" y="278" width="178" height="130" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="333" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">활용 2</text>
  <text x="333" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Service 이름을</text>
  <text x="333" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Ingress host 규칙에</text>
  <text x="333" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">자동 반영</text>
  <text x="333" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">namePrefix 변경 시 자동 갱신</text>
</svg>
