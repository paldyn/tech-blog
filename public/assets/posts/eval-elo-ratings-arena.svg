<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrow-blue" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-gold" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#e0a830"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Chatbot Arena: ELO 기반 모델 랭킹</text>

  <!-- ===== Step 1: User input (centered top) ===== -->
  <rect x="290" y="68" width="300" height="52" rx="8" fill="#0d1425" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="88" text-anchor="middle" font-size="13" fill="#888">STEP 1</text>
  <text x="440" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#e8e8e8">사용자 질문 입력</text>

  <!-- Arrow down from Step 1 to models -->
  <!-- Left branch -->
  <line x1="360" y1="120" x2="240" y2="162" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <!-- Right branch -->
  <line x1="520" y1="120" x2="640" y2="162" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- ===== Step 2: Two anonymous models ===== -->
  <!-- Model A -->
  <rect x="100" y="165" width="230" height="60" rx="8" fill="#121228" stroke="#7777cc" stroke-width="1.5"/>
  <text x="215" y="187" text-anchor="middle" font-size="13" fill="#888">STEP 2</text>
  <text x="215" y="209" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">모델 A (익명)</text>

  <!-- Model B -->
  <rect x="550" y="165" width="230" height="60" rx="8" fill="#121228" stroke="#ce9178" stroke-width="1.5"/>
  <text x="665" y="187" text-anchor="middle" font-size="13" fill="#888">STEP 2</text>
  <text x="665" y="209" text-anchor="middle" font-size="15" font-weight="700" fill="#ce9178">모델 B (익명)</text>

  <!-- Arrows down from models to vote -->
  <line x1="215" y1="225" x2="330" y2="267" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <line x1="665" y1="225" x2="550" y2="267" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- ===== Step 3: User vote ===== -->
  <rect x="270" y="270" width="340" height="60" rx="8" fill="#1a1a10" stroke="#e0a830" stroke-width="1.8"/>
  <text x="440" y="291" text-anchor="middle" font-size="13" fill="#888">STEP 3 — 사용자 투표</text>
  <!-- Vote options -->
  <rect x="290" y="300" width="70" height="22" rx="4" fill="#7777cc"/>
  <text x="325" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">A 승리</text>
  <rect x="375" y="300" width="70" height="22" rx="4" fill="#555"/>
  <text x="410" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">무승부</text>
  <rect x="460" y="300" width="70" height="22" rx="4" fill="#ce9178"/>
  <text x="495" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">B 승리</text>

  <!-- Arrow down from vote to ELO update -->
  <line x1="440" y1="330" x2="440" y2="357" stroke="#55c555" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- ===== Step 4: ELO Update ===== -->
  <rect x="290" y="360" width="300" height="42" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="379" text-anchor="middle" font-size="13" fill="#888">STEP 4</text>
  <text x="440" y="395" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">ELO 레이팅 업데이트</text>

  <!-- Arrow down from ELO update to leaderboard -->
  <line x1="440" y1="402" x2="440" y2="411" stroke="#55c555" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- ===== Step 5: Leaderboard ===== -->
  <rect x="220" y="413" width="440" height="20" rx="0" fill="none"/>
  <!-- Inline leaderboard as a compact row -->
  <rect x="180" y="413" width="520" height="18" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="205" y="426" font-size="11" fill="#e0a830" font-weight="700">🏆 리더보드:</text>
  <text x="305" y="426" font-size="11" fill="#7ec8e3">GPT-4o 1280</text>
  <text x="420" y="426" font-size="11" fill="#7777cc">Claude 1260</text>
  <text x="530" y="426" font-size="11" fill="#55c555">Gemini 1240</text>

  <!-- Side label: millions of votes annotation -->
  <text x="820" y="300" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,820,300)">수백만 번의 누적 투표 → 신뢰도 수렴</text>
</svg>
