<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">사이드카 컨테이너 YAML</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Kubernetes 1.29+에서 sidecarContainers 네이티브 지원이 추가됐습니다</text>

  <!-- Left: classic sidecar -->
  <rect x="60" y="86" width="360" height="312" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="108"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">spec:</text>
  <text x="80" y="126"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  containers</text>
  <text x="80" y="144"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  - name: app</text>
  <text x="80" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    image: myapp:1.0</text>
  <text x="80" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    volumeMounts:</text>
  <text x="80" y="198"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    - name: logs</text>
  <text x="80" y="216"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">      mountPath: /var/log/app</text>
  <text x="80" y="234"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 사이드카</text>
  <text x="80" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  - name: log-shipper</text>
  <text x="80" y="270"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    image: fluentd:v1.16</text>
  <text x="80" y="288"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    volumeMounts:</text>
  <text x="80" y="306"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    - name: logs</text>
  <text x="80" y="324"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">      mountPath: /var/log/app</text>
  <text x="80" y="342"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  volumes</text>
  <text x="80" y="360"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  - name: logs</text>
  <text x="80" y="378"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    emptyDir: {}</text>

  <!-- Right: native sidecar (1.29+) -->
  <rect x="460" y="86" width="360" height="312" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="108"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 네이티브 사이드카 (1.29+)</text>
  <text x="480" y="126"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">spec:</text>
  <text x="480" y="144"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  initContainers</text>
  <text x="480" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  - name: log-shipper</text>
  <text x="480" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    image: fluentd:v1.16</text>
  <text x="480" y="198"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    restartPolicy: Always</text>
  <text x="480" y="216"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    # restartPolicy: Always</text>
  <text x="480" y="234"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    # → 네이티브 사이드카 선언</text>
  <text x="480" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve"># 장점:</text>
  <text x="480" y="270"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve"># - 메인 컨테이너 시작 전</text>
  <text x="480" y="288"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">#   사이드카 준비 보장</text>
  <text x="480" y="306"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve"># - Job에서도 사이드카</text>
  <text x="480" y="324"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">#   함께 종료됨</text>

  <!-- Bottom -->
  <rect x="60" y="414" width="760" height="28" rx="6" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">사이드카는 메인 컨테이너와 localhost로 통신 · 같은 PID 네임스페이스 공유 가능 (shareProcessNamespace: true)</text>
</svg>
