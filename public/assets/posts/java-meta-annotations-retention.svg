<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">@Retention — 애너테이션의 생존 기간</text>

  <defs>
    <marker id="mrArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- timeline -->
  <text x="160" y="96" font-size="14" font-weight="600" fill="#888" text-anchor="middle">소스 코드</text>
  <text x="440" y="96" font-size="14" font-weight="600" fill="#888" text-anchor="middle">.class 파일</text>
  <text x="720" y="96" font-size="14" font-weight="600" fill="#888" text-anchor="middle">런타임 (JVM)</text>
  <line x1="60" y1="120" x2="820" y2="120" stroke="#3a4a6e" stroke-width="2" marker-end="url(#mrArr)"/>

  <!-- SOURCE -->
  <rect x="60" y="150" width="220" height="56" rx="8" fill="#1a160d" stroke="#e0a955" stroke-width="1.5"/>
  <text x="170" y="176" font-size="14" font-weight="600" fill="#e0a955" text-anchor="middle">SOURCE</text>
  <text x="170" y="196" font-size="12" fill="#888" text-anchor="middle">컴파일 후 버려짐</text>
  <text x="170" y="232" font-size="12" fill="#9aa4b8" text-anchor="middle">@Override</text>
  <text x="170" y="250" font-size="12" fill="#9aa4b8" text-anchor="middle">Lombok 처리용</text>

  <!-- CLASS -->
  <rect x="330" y="150" width="220" height="56" rx="8" fill="#0f1626" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="176" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">CLASS (기본값)</text>
  <text x="440" y="196" font-size="12" fill="#888" text-anchor="middle">.class엔 남지만 미적재</text>
  <text x="440" y="232" font-size="12" fill="#9aa4b8" text-anchor="middle">바이트코드 도구가</text>
  <text x="440" y="250" font-size="12" fill="#9aa4b8" text-anchor="middle">읽는 용도</text>

  <!-- RUNTIME -->
  <rect x="600" y="150" width="220" height="56" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="176" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">RUNTIME</text>
  <text x="710" y="196" font-size="12" fill="#888" text-anchor="middle">리플렉션으로 읽힘</text>
  <text x="710" y="232" font-size="12" fill="#9aa4b8" text-anchor="middle">@Entity @Test</text>
  <text x="710" y="250" font-size="12" fill="#9aa4b8" text-anchor="middle">스프링·JPA·JUnit</text>

  <text x="440" y="296" font-size="13" fill="#9aa4b8" text-anchor="middle">리플렉션으로 읽으려면 반드시 RUNTIME — 기본값 CLASS는 런타임에 안 보인다</text>
</svg>
