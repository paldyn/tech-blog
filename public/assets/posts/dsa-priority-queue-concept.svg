<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">우선순위 큐 동작 원리</text>

  <!-- Left: queue vs priority queue -->
  <rect x="50" y="65" width="380" height="200" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">일반 큐 (FIFO)</text>

  <rect x="70" y="100" width="50" height="36" fill="#1a2a4a" rx="4"/>
  <text x="95" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">작업C</text>
  <rect x="128" y="100" width="50" height="36" fill="#1a2a4a" rx="4"/>
  <text x="153" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">작업A</text>
  <rect x="186" y="100" width="50" height="36" fill="#1a2a4a" rx="4"/>
  <text x="211" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">작업B</text>
  <path d="M 244 118 L 278 118" stroke="#7ec8e3" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <text x="320" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dequeue</text>
  <text x="320" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">→ 작업C</text>
  <text x="240" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">입력된 순서 그대로 처리</text>

  <text x="240" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">우선순위 큐</text>
  <rect x="70" y="198" width="80" height="36" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="110" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">C (p=1)</text>
  <text x="110" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">낮은 우선순위</text>
  <rect x="158" y="198" width="80" height="36" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="198" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">A (p=10)</text>
  <text x="198" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">높은 우선순위</text>
  <rect x="246" y="198" width="80" height="36" fill="#1a2a2a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="286" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">B (p=5)</text>
  <text x="286" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#aaa" text-anchor="middle">중간 우선순위</text>
  <path d="M 334 216 L 360 216" stroke="#ce9178" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <text x="395" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dequeue</text>
  <text x="395" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ 작업A</text>
  <text x="240" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">우선순위가 높은 순서로 처리</text>

  <!-- Right: implementation comparison -->
  <rect x="460" y="65" width="370" height="200" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현 방법별 성능</text>

  <!-- Table header -->
  <text x="520" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">구현</text>
  <text x="640" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">insert</text>
  <text x="730" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">pop-max</text>

  <line x1="475" y1="118" x2="820" y2="118" stroke="#3a4a6e" stroke-width="1"/>

  <text x="520" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">정렬 배열</text>
  <text x="640" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">O(n)</text>
  <text x="730" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O(1)</text>

  <text x="520" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">비정렬 배열</text>
  <text x="640" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O(1)</text>
  <text x="730" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">O(n)</text>

  <text x="520" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">이진 힙</text>
  <text x="640" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O(log n)</text>
  <text x="730" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O(log n)</text>

  <text x="520" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">피보나치 힙</text>
  <text x="640" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O(1) 분할상환</text>
  <text x="730" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">O(log n)</text>

  <text x="520" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">레드-블랙 트리</text>
  <text x="640" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O(log n)</text>
  <text x="730" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O(log n)</text>

  <text x="645" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실무에서는 이진 힙이 가장 범용적</text>

  <!-- Code box -->
  <rect x="50" y="280" width="780" height="125" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> heapq</tspan>
  </text>
  <text x="66" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># (우선순위, 데이터) 튜플로 관리</tspan>
  </text>
  <text x="66" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">pq = []</tspan>
  </text>
  <text x="66" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">heapq.heappush(pq, (</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'작업C'</tspan><tspan fill="#ffffff">))   </tspan><tspan fill="#9aa4b8"># 낮은 숫자 = 높은 우선순위</tspan>
  </text>
  <text x="66" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">heapq.heappush(pq, (</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'작업A'</tspan><tspan fill="#ffffff">))</tspan>
  </text>
  <text x="66" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">pri, task = heapq.heappop(pq)   </tspan><tspan fill="#9aa4b8"># (1, '작업C') 반환</tspan>
  </text>
</svg>
