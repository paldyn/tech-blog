<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">명명 규칙 (Naming Conventions)</text>

  <!-- Header row -->
  <rect x="60" y="62" width="760" height="36" rx="4" fill="#1a2233" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="85" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">대상</text>
  <text x="380" y="85" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">규칙</text>
  <text x="640" y="85" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">예시</text>
  <line x1="280" y1="62" x2="280" y2="98" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="62" x2="490" y2="98" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Rows -->
  <rect x="60" y="98" width="760" height="38" rx="0" fill="#111518" stroke="#2a3444" stroke-width="0.5"/>
  <text x="170" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">폼 파일</text>
  <text x="380" y="122" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">PascalCase</text>
  <text x="640" y="122" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">UserList.xfdl</text>
  <line x1="280" y1="98" x2="280" y2="136" stroke="#2a3444" stroke-width="0.5"/>
  <line x1="490" y1="98" x2="490" y2="136" stroke="#2a3444" stroke-width="0.5"/>

  <rect x="60" y="136" width="760" height="38" rx="0" fill="#0e1215" stroke="#2a3444" stroke-width="0.5"/>
  <text x="170" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">함수 / 메서드</text>
  <text x="380" y="160" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">fn_ + camelCase</text>
  <text x="640" y="160" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">fn_search, fn_save</text>
  <line x1="280" y1="136" x2="280" y2="174" stroke="#2a3444" stroke-width="0.5"/>
  <line x1="490" y1="136" x2="490" y2="174" stroke="#2a3444" stroke-width="0.5"/>

  <rect x="60" y="174" width="760" height="38" rx="0" fill="#111518" stroke="#2a3444" stroke-width="0.5"/>
  <text x="170" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Dataset</text>
  <text x="380" y="198" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">ds + PascalCase</text>
  <text x="640" y="198" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">dsUserList, dsSearch</text>
  <line x1="280" y1="174" x2="280" y2="212" stroke="#2a3444" stroke-width="0.5"/>
  <line x1="490" y1="174" x2="490" y2="212" stroke="#2a3444" stroke-width="0.5"/>

  <rect x="60" y="212" width="760" height="38" rx="0" fill="#0e1215" stroke="#2a3444" stroke-width="0.5"/>
  <text x="170" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">컴포넌트</text>
  <text x="380" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">타입약어 + 번호</text>
  <text x="640" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">btn00, edt01, grd00</text>
  <line x1="280" y1="212" x2="280" y2="250" stroke="#2a3444" stroke-width="0.5"/>
  <line x1="490" y1="212" x2="490" y2="250" stroke="#2a3444" stroke-width="0.5"/>

  <rect x="60" y="250" width="760" height="38" rx="0" fill="#111518" stroke="#2a3444" stroke-width="0.5"/>
  <text x="170" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">전역 변수</text>
  <text x="380" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">g_ + camelCase</text>
  <text x="640" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">g_userId, g_langCode</text>
  <line x1="280" y1="250" x2="280" y2="288" stroke="#2a3444" stroke-width="0.5"/>
  <line x1="490" y1="250" x2="490" y2="288" stroke="#2a3444" stroke-width="0.5"/>

  <rect x="60" y="288" width="760" height="38" rx="0" fill="#0e1215" stroke="#2a3444" stroke-width="0.5"/>
  <text x="170" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">공통 함수</text>
  <text x="380" y="312" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">gfn_ + camelCase</text>
  <text x="640" y="312" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">gfn_alert, gfn_log</text>
  <line x1="280" y1="288" x2="280" y2="326" stroke="#2a3444" stroke-width="0.5"/>
  <line x1="490" y1="288" x2="490" y2="326" stroke="#2a3444" stroke-width="0.5"/>

  <rect x="60" y="326" width="760" height="38" rx="0" fill="#111518" stroke="#2a3444" stroke-width="0.5"/>
  <text x="170" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">상수</text>
  <text x="380" y="350" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">UPPER_SNAKE_CASE</text>
  <text x="640" y="350" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">MAX_ROW_CNT, PAGE_SIZE</text>
  <line x1="280" y1="326" x2="280" y2="364" stroke="#2a3444" stroke-width="0.5"/>
  <line x1="490" y1="326" x2="490" y2="364" stroke="#2a3444" stroke-width="0.5"/>

  <!-- bottom border of last row -->
  <rect x="60" y="364" width="760" height="1" fill="#2a3444"/>

  <text x="440" y="396" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">팀 내 합의된 규칙을 문서화하고 공유하는 것이 가장 중요하다</text>
</svg>
