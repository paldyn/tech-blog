<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PlatformTransactionManager 추상화 계층</text>

  <!-- ── Top: @Transactional AOP ── -->
  <rect x="270" y="68" width="340" height="52" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">@Transactional AOP 프록시</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">TransactionInterceptor → TransactionAspectSupport</text>

  <!-- Arrow down -->
  <line x1="440" y1="120" x2="440" y2="140" stroke="#555" stroke-width="2"/>
  <polygon points="440,146 433,136 447,136" fill="#555"/>

  <!-- ── Interface: PlatformTransactionManager ── -->
  <rect x="210" y="146" width="460" height="64" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">«interface»  PlatformTransactionManager</text>
  <text x="440" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#888" text-anchor="middle">getTransaction()  /  commit()  /  rollback()</text>

  <!-- Arrow down to implementations -->
  <line x1="440" y1="210" x2="440" y2="238" stroke="#555" stroke-width="1.5"/>
  <!-- Branch lines -->
  <line x1="130" y1="238" x2="750" y2="238" stroke="#555" stroke-width="1.5"/>
  <!-- Down to each impl -->
  <line x1="130" y1="238" x2="130" y2="256" stroke="#555" stroke-width="1.5"/>
  <polygon points="130,262 124,252 136,252" fill="#555"/>
  <line x1="310" y1="238" x2="310" y2="256" stroke="#555" stroke-width="1.5"/>
  <polygon points="310,262 304,252 316,252" fill="#555"/>
  <line x1="570" y1="238" x2="570" y2="256" stroke="#555" stroke-width="1.5"/>
  <polygon points="570,262 564,252 576,252" fill="#555"/>
  <line x1="750" y1="238" x2="750" y2="256" stroke="#555" stroke-width="1.5"/>
  <polygon points="750,262 744,252 756,252" fill="#555"/>

  <!-- Implementation 1: DataSourceTransactionManager -->
  <rect x="60" y="262" width="140" height="62" rx="7" fill="#0d1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="130" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">DataSource</text>
  <text x="130" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">TransactionManager</text>
  <text x="130" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888" text-anchor="middle">JDBC / JdbcTemplate</text>

  <!-- Implementation 2: JpaTransactionManager -->
  <rect x="234" y="262" width="152" height="62" rx="7" fill="#0d1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="310" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">JpaTransaction</text>
  <text x="310" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">Manager</text>
  <text x="310" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888" text-anchor="middle">JPA / Hibernate</text>

  <!-- Implementation 3: JtaTransactionManager -->
  <rect x="494" y="262" width="152" height="62" rx="7" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="570" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">JtaTransaction</text>
  <text x="570" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">Manager</text>
  <text x="570" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888" text-anchor="middle">분산 트랜잭션 (JTA)</text>

  <!-- Implementation 4: ReactiveTransactionManager -->
  <rect x="678" y="262" width="142" height="62" rx="7" fill="#0d1117" stroke="#7777cc" stroke-width="1.2"/>
  <text x="749" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" font-weight="600" fill="#7777cc" text-anchor="middle">Reactive</text>
  <text x="749" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" font-weight="600" fill="#7777cc" text-anchor="middle">TransactionManager</text>
  <text x="749" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888" text-anchor="middle">WebFlux / R2DBC</text>

  <!-- ── TransactionSynchronizationManager ── -->
  <rect x="210" y="354" width="460" height="60" rx="8" fill="#111827" stroke="#e8a030" stroke-width="1.2"/>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8a030" text-anchor="middle">TransactionSynchronizationManager</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">ThreadLocal로 현재 트랜잭션 정보 &amp; Connection 바인딩</text>

  <!-- Arrows from impls to sync manager -->
  <line x1="130" y1="324" x2="280" y2="352" stroke="#333" stroke-width="1"/>
  <line x1="310" y1="324" x2="360" y2="352" stroke="#333" stroke-width="1"/>
  <line x1="570" y1="324" x2="520" y2="352" stroke="#333" stroke-width="1"/>
  <line x1="749" y1="324" x2="600" y2="352" stroke="#333" stroke-width="1"/>

  <!-- Bottom note -->
  <text x="440" y="440"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555" text-anchor="middle">비즈니스 코드는 인터페이스에만 의존 → DB 기술 교체 시 @Transactional 코드 수정 불필요</text>
  <text x="440" y="458"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555" text-anchor="middle">Spring Boot 자동 구성: JPA 있으면 JpaTransactionManager, JDBC만이면 DataSourceTransactionManager</text>
</svg>
