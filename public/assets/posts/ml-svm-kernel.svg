<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 450" style="background:#0a0a0a;border-radius:12px">
  <!-- Background -->
  <rect x="0" y="0" width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Header band -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">커널 트릭: 저차원 → 고차원 매핑</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">비선형 데이터를 선형 분리 가능하게 만드는 수학적 마법</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Section label -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">커널 트릭 시각화</text>

  <!-- ===== LEFT PANEL: 2D (non-separable) ===== -->
  <rect x="60" y="116" width="230" height="180" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="175" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">2D 원본 공간</text>
  <text x="175" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">선형 분리 불가</text>

  <!-- Inner ring class (circles, center cluster) -->
  <circle cx="175" cy="225" r="30" fill="none" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="175" cy="225" r="9" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="160" cy="210" r="9" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="190" cy="215" r="9" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="165" cy="238" r="9" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="188" cy="237" r="9" fill="none" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Outer ring class (squares, surrounding) -->
  <rect x="108" y="160" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>
  <rect x="226" y="163" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>
  <rect x="98" y="243" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>
  <rect x="236" y="248" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>
  <rect x="145" y="272" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>
  <rect x="204" y="272" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>
  <rect x="115" y="280" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>

  <!-- Labels -->
  <text x="80" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">클래스-</text>
  <text x="160" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">클래스+</text>

  <!-- ===== ARROW (2D → 3D) ===== -->
  <text x="310" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">커널 함수</text>
  <text x="310" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">φ(x)</text>
  <line x1="302" y1="218" x2="348" y2="218" stroke="#7777cc" stroke-width="2.5"/>
  <polygon points="348,212 362,218 348,224" fill="#7777cc"/>

  <!-- ===== RIGHT PANEL: 3D (separable) ===== -->
  <rect x="370" y="116" width="230" height="180" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="485" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">고차원 공간</text>
  <text x="485" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">선형 분리 가능!</text>

  <!-- Hyperplane (horizontal line in 3D projection) -->
  <line x1="390" y1="235" x2="580" y2="235" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="585" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">초평면</text>

  <!-- Upper class (circles — lifted by kernel) -->
  <circle cx="420" cy="170" r="8" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="450" cy="158" r="8" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="480" cy="165" r="8" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="510" cy="173" r="8" fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="540" cy="162" r="8" fill="none" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Lower class (squares) -->
  <rect x="400" y="252" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>
  <rect x="435" y="263" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>
  <rect x="470" y="256" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>
  <rect x="505" y="265" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>
  <rect x="540" y="254" width="14" height="14" rx="2" fill="none" stroke="#ce9178" stroke-width="2"/>

  <!-- ===== KERNEL TABLE ===== -->
  <text x="626" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">주요 커널 함수</text>
  <rect x="626" y="116" width="194" height="180" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <text x="646" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">선형 (Linear)</text>
  <text x="646" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">K(x,z) = xᵀz</text>
  <text x="646" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">선형 분리 가능 데이터</text>
  <line x1="646" y1="174" x2="800" y2="174" stroke="#1e2433" stroke-width="1"/>

  <text x="646" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">RBF/가우시안</text>
  <text x="646" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">exp(-γ‖x-z‖²)</text>
  <text x="646" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">기본값, 비선형에 강력</text>
  <line x1="646" y1="228" x2="800" y2="228" stroke="#1e2433" stroke-width="1"/>

  <text x="646" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">다항식 (Poly)</text>
  <text x="646" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(γxᵀz + r)^d</text>
  <text x="646" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">이미지, 텍스트 특성</text>
  <line x1="646" y1="281" x2="800" y2="281" stroke="#1e2433" stroke-width="1"/>

  <text x="646" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="600" fill="#7777cc">핵심: 실제 변환 없이</text>
  <text x="646" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">내적만 계산 → 효율적</text>

  <!-- ===== CODE BLOCK ===== -->
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">scikit-learn SVC 커널 선택</text>
  <rect x="60" y="329" width="760" height="90" rx="6" fill="#070b14" stroke="#1e2433"/>

  <!-- Line 1 -->
  <text x="76" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="120" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> sklearn.svm </text>
  <text x="234" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="282" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> SVC</text>
  <text x="320" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">  # 분류</text>

  <!-- Line 2 -->
  <text x="76" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">svm_rbf  = SVC(kernel=</text>
  <text x="274" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'rbf'</text>
  <text x="314" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, C=</text>
  <text x="354" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1.0</text>
  <text x="388" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, gamma=</text>
  <text x="464" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'scale'</text>
  <text x="518" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>
  <text x="534" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">  # RBF 커널 (기본 추천)</text>

  <!-- Line 3 -->
  <text x="76" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">svm_poly = SVC(kernel=</text>
  <text x="274" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'poly'</text>
  <text x="314" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, degree=</text>
  <text x="394" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">3</text>
  <text x="406" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, C=</text>
  <text x="444" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">10.0</text>
  <text x="480" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>
  <text x="496" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">  # 3차 다항식 커널</text>

  <!-- Line 4 -->
  <text x="76" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">svm_rbf.fit(X_train_scaled, y_train)</text>
  <text x="500" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">  # 반드시 스케일링 먼저!</text>

  <!-- Footer -->
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
