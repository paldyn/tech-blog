<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Poetry 기본 명령</text>

  <rect x="60" y="86" width="760" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">poetry <tspan fill="#7ec8e3" font-weight="600">new</tspan> myapp        <tspan fill="#9aa4b8"># 프로젝트 골격 생성</tspan></text>
  <text xml:space="preserve" x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">poetry <tspan fill="#7ec8e3" font-weight="600">add</tspan> requests    <tspan fill="#9aa4b8"># 의존성 추가 + lock 갱신</tspan></text>
  <text xml:space="preserve" x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">poetry <tspan fill="#7ec8e3" font-weight="600">install</tspan>        <tspan fill="#9aa4b8"># lock 기준으로 환경 구성</tspan></text>
  <text xml:space="preserve" x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">poetry <tspan fill="#7ec8e3" font-weight="600">run</tspan> pytest     <tspan fill="#9aa4b8"># venv 안에서 실행</tspan></text>
  <text xml:space="preserve" x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">poetry <tspan fill="#7ec8e3" font-weight="600">build</tspan>          <tspan fill="#9aa4b8"># wheel + sdist 생성</tspan></text>
  <text xml:space="preserve" x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">poetry <tspan fill="#7ec8e3" font-weight="600">publish</tspan>        <tspan fill="#9aa4b8"># PyPI 업로드</tspan></text>

  <text x="60" y="300" font-size="13" fill="#888">add 한 번으로 의존성 해결·lock·설치가 함께 이뤄진다.</text>
</svg>
