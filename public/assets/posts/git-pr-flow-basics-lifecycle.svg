<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-lc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-lc2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-lc3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pull Request 생명 주기</text>

  <!-- State boxes -->
  <!-- 1: Open (Draft) -->
  <rect x="60" y="72" width="160" height="56" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="140" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">Draft PR</text>
  <text x="140" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">작업 중 WIP 공유</text>

  <!-- Arrow draft → open -->
  <line x1="220" y1="100" x2="300" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-lc)"/>
  <text x="260" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Ready for review</text>

  <!-- 2: Open PR -->
  <rect x="300" y="72" width="180" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="390" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Open PR</text>
  <text x="390" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">리뷰 대기 / 진행 중</text>

  <!-- Arrow open → review -->
  <line x1="480" y1="100" x2="560" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-lc)"/>
  <text x="520" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Approved</text>

  <!-- 3: Merged -->
  <rect x="560" y="72" width="150" height="56" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="635" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Merged</text>
  <text x="635" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">main에 반영</text>

  <!-- 4: Closed (rejected) -->
  <rect x="740" y="72" width="100" height="56" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="790" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Closed</text>
  <text x="790" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">거절</text>

  <!-- Arrow open → closed -->
  <path d="M 390 128 Q 390 150 590 150 Q 790 150 790 128" fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-lc3)"/>
  <text x="590" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Changes requested 반복 → 닫기</text>

  <!-- Feedback loop arrow -->
  <path d="M 390 180 Q 390 210 200 210 Q 140 210 140 180" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-lc)"/>
  <text x="270" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Changes requested → 추가 커밋</text>

  <!-- Divider -->
  <line x1="60" y1="254" x2="820" y2="254" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Review actions section -->
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">리뷰어 행동 옵션</text>

  <!-- Comment -->
  <rect x="60" y="296" width="220" height="60" rx="8" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="170" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">Comment</text>
  <text x="170" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">의견 제시 (승인 안 함)</text>

  <!-- Approve -->
  <rect x="330" y="296" width="220" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Approve</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">승인 → 머지 가능</text>

  <!-- Request Changes -->
  <rect x="600" y="296" width="220" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Request Changes</text>
  <text x="710" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">변경 요청 → 재작업</text>

  <!-- Merge methods -->
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">머지 방법 3가지</text>

  <rect x="60" y="396" width="220" height="44" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Merge commit</text>

  <rect x="330" y="396" width="220" height="44" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Squash and merge</text>

  <rect x="600" y="396" width="220" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Rebase and merge</text>
</svg>
