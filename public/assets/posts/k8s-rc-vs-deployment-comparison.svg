<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ReplicationController vs Deployment</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Kubernetes 오케스트레이션의 진화</text>

  <!-- RC column header -->
  <rect x="50" y="84" width="360" height="44" rx="8" fill="#1a1428" stroke="#7777cc" stroke-width="2"/>
  <text x="230" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">ReplicationController (RC)</text>
  <text x="230" y="120" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">v1 · 레거시 · 사용 지양</text>

  <!-- Deployment column header -->
  <rect x="470" y="84" width="360" height="44" rx="8" fill="#121e38" stroke="#7ec8e3" stroke-width="2"/>
  <text x="650" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">Deployment</text>
  <text x="650" y="120" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">apps/v1 · 현재 표준</text>

  <!-- Row 1: Selector -->
  <rect x="50" y="138" width="360" height="52" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="158"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Selector 방식</text>
  <text x="70" y="178"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Equality-based 만 가능 (app=web)</text>

  <rect x="470" y="138" width="360" height="52" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="158"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Selector 방식</text>
  <text x="490" y="178"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">matchLabels + matchExpressions 모두 지원</text>

  <!-- Row 2: Rolling Update -->
  <rect x="50" y="198" width="360" height="52" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="218"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">롤링 업데이트</text>
  <text x="70" y="238"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">kubectl rolling-update (별도 명령 / 클라이언트 측)</text>

  <rect x="470" y="198" width="360" height="52" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="218"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">롤링 업데이트</text>
  <text x="490" y="238"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">서버 측 자동 / maxSurge, maxUnavailable 제어</text>

  <!-- Row 3: Rollback -->
  <rect x="50" y="258" width="360" height="52" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="278"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">롤백</text>
  <text x="70" y="298"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">미지원 · 수동으로 이미지 되돌리기 필요</text>

  <rect x="470" y="258" width="360" height="52" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="278"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">롤백</text>
  <text x="490" y="298"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">kubectl rollout undo / revision 히스토리 관리</text>

  <!-- Row 4: Pause/Resume -->
  <rect x="50" y="318" width="360" height="52" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="338"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">업데이트 일시 정지</text>
  <text x="70" y="358"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">미지원</text>

  <rect x="470" y="318" width="360" height="52" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="338"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">업데이트 일시 정지</text>
  <text x="490" y="358"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">kubectl rollout pause/resume 지원</text>

  <!-- Row 5: Annotation -->
  <rect x="50" y="378" width="360" height="52" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="398"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">상태 관리 오브젝트</text>
  <text x="70" y="418"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">RC 하나 (ReplicaSet 없음)</text>

  <rect x="470" y="378" width="360" height="52" rx="4" fill="#0d1828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="398"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">상태 관리 오브젝트</text>
  <text x="490" y="418"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Deployment → ReplicaSet(복수) → Pod 체인</text>

  <!-- Arrow between columns -->
  <line x1="412" y1="305" x2="466" y2="305" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="439" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">발전</text>
  <text x="439" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">대체</text>

  <!-- Bottom note -->
  <rect x="50" y="444" width="780" height="40" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="468" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">RC는 Kubernetes 1.0부터 존재하지만 현재는 deprecated 권고 — 모든 새 배포에 Deployment 사용 권장</text>
</svg>
