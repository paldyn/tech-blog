<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git checkout vs git switch</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Git 2.23에서 역할이 분리된 두 명령</text>

  <!-- checkout column -->
  <rect x="60" y="100" width="370" height="300" rx="10" fill="#0d1117" stroke="#e8a838" stroke-width="1.5"/>
  <text x="245" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8a838" text-anchor="middle">git checkout (구)</text>
  <text x="245" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">너무 많은 일을 함</text>

  <text x="80" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 브랜치 전환</text>
  <text x="80" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 새 브랜치 생성 (-b)</text>
  <text x="80" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 파일 되돌리기</text>
  <text x="80" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• Detached HEAD</text>
  <text x="80" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 태그·커밋 체크아웃</text>
  <text x="80" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 스테이지 덮어쓰기</text>

  <rect x="80" y="340" width="330" height="44" rx="6" fill="#1a1400" stroke="#e8a838" stroke-width="1"/>
  <text x="245" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a838" text-anchor="middle">git checkout HEAD -- file.js</text>
  <text x="245" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">← 파일 되돌리기인지 브랜치인지 혼동</text>

  <!-- switch column -->
  <rect x="450" y="100" width="370" height="300" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">git switch (신)</text>
  <text x="635" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">브랜치 전환만 담당</text>

  <text x="470" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 브랜치 전환</text>
  <text x="470" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 새 브랜치 생성 (-c)</text>
  <text x="470" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 이전 브랜치로 복귀 (-)</text>
  <text x="470" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• Detached HEAD (--detach)</text>
  <text x="470" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파일 되돌리기 → git restore</text>
  <text x="470" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스테이지 조작 → git restore</text>

  <rect x="470" y="340" width="330" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">git restore HEAD -- file.js</text>
  <text x="635" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">← 파일 복원은 restore가 담당</text>

  <!-- Version note -->
  <rect x="60" y="418" width="760" height="44" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Git 2.23 (2019년 8월)에서 도입 — git switch, git restore 모두 아직 "experimental" 표시지만 실무 사용 권장</text>
  <text x="440" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">git checkout은 하위 호환성 유지를 위해 계속 동작</text>
</svg>
