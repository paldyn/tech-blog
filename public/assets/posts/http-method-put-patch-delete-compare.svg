<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PUT vs PATCH — 리소스 수정 방식</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">전체 교체 vs 부분 수정 — 서버 상태 변화 비교</text>

  <!-- Current state box -->
  <rect x="300" y="88" width="280" height="90" rx="8" fill="#0d1117" stroke="#444" stroke-width="1.5"/>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">현재 상태 — GET /users/42</text>
  <text x="320" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff">{"id":42,</text>
  <text x="320" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff"> "name":"Alice", "age":30}</text>

  <!-- PUT path -->
  <text x="160" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">PUT (전체 교체)</text>

  <rect x="60" y="234" width="280" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7777cc" font-weight="600">PUT /users/42</text>
  <text x="80" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff">{"name":"Bob"}</text>
  <text x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#9aa4b8">(age 필드 미포함)</text>

  <rect x="60" y="328" width="280" height="76" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">결과 (age 사라짐!)</text>
  <text x="80" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff">{"id":42, "name":"Bob"}</text>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#9aa4b8">age 필드 누락 → 삭제됨</text>

  <!-- PATCH path -->
  <text x="660" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">PATCH (부분 수정)</text>

  <rect x="540" y="234" width="280" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="560" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#7ec8e3" font-weight="600">PATCH /users/42</text>
  <text x="560" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff">{"name":"Bob"}</text>
  <text x="560" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#9aa4b8">(name만 변경)</text>

  <rect x="540" y="328" width="280" height="76" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="560" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">결과 (name만 변경)</text>
  <text x="560" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#ffffff">{"id":42, "name":"Bob",</text>
  <text x="560" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="11" fill="#ffffff"> "age":30}</text>

  <!-- Bottom note -->
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">실무: PUT 쓸 때는 반드시 전체 필드 보내기 — PATCH가 더 안전한 경우 많음</text>
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">PUT은 멱등(O) · PATCH는 구현 따라 멱등 여부 결정됨</text>
</svg>
