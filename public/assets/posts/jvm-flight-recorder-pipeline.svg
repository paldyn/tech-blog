<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">JFR 이벤트가 흐르는 길</text>

  <defs>
    <marker id="jfrArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="50" y="110" width="160" height="90" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="148" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">이벤트 발생</text>
  <text x="130" y="170" font-size="12" fill="#888" text-anchor="middle">GC·할당·락·예외</text>
  <text x="130" y="188" font-size="12" fill="#888" text-anchor="middle">메서드 샘플 등</text>

  <rect x="260" y="110" width="160" height="90" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="148" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Thread-local 버퍼</text>
  <text x="340" y="170" font-size="12" fill="#888" text-anchor="middle">스레드마다 따로</text>
  <text x="340" y="188" font-size="12" fill="#888" text-anchor="middle">락 경합 없음</text>

  <rect x="470" y="110" width="160" height="90" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="550" y="148" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Global 버퍼</text>
  <text x="550" y="170" font-size="12" fill="#888" text-anchor="middle">주기적으로 모음</text>
  <text x="550" y="188" font-size="12" fill="#888" text-anchor="middle">고정 ring buffer</text>

  <rect x="680" y="110" width="150" height="90" rx="8" fill="#1a1408" stroke="#e0a055" stroke-width="1.5"/>
  <text x="755" y="148" font-size="14" font-weight="600" fill="#e0a055" text-anchor="middle">.jfr 파일</text>
  <text x="755" y="170" font-size="12" fill="#888" text-anchor="middle">디스크 기록</text>
  <text x="755" y="188" font-size="12" fill="#888" text-anchor="middle">분석 입력</text>

  <line x1="212" y1="155" x2="258" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jfrArr)"/>
  <line x1="422" y1="155" x2="468" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jfrArr)"/>
  <line x1="632" y1="155" x2="678" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jfrArr)"/>

  <text x="440" y="252" font-size="13" fill="#888" text-anchor="middle">스레드-로컬 버퍼로 락 경합을 피해 오버헤드를 약 1% 수준으로 억제한다</text>
</svg>
