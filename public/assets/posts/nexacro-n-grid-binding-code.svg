  <!-- Code block -->
  <rect x="60" y="90" width="760" height="256" fill="#070b14" rx="6" stroke="#1e2433"/>

  <!-- Line 1: <Grid id="grd_emp" -->
  <text x="80" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;</text>
