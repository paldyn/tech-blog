<svg xmlns="http://www.w3.org/2000/svg" width="880" height="390" viewBox="0 0 880 390">
  <rect width="880" height="390" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 바인딩 XFD 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">bindDataset 설정 및 Column·Cell datacolumn 매핑</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="256" fill="#070b14" rx="6" stroke="#1e2433"/>

  <!-- Line 1: <Grid id="grd_emp" -->
  <text x="80" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;</tspan><tspan fill="#7ec8e3">Grid</tspan><tspan fill="#e8e8e8"> id=</tspan><tspan fill="#ce9178">"grd_emp"</tspan></text>

  <!-- Line 2:   bindDataset="ds_emp"> -->
  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  bindDataset=</text>
  <text x="186" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"ds_emp"</text>
  <text x="249" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&gt;</text>

  <!-- Line 3:   <Columns> -->
  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">Columns</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- Line 4:     <Column size="80"/> -->
  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    &lt;</tspan><tspan fill="#7ec8e3">Column</tspan><tspan fill="#e8e8e8"> size=</tspan><tspan fill="#b5cea8">"80"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <!-- Line 5:     <Column size="120"/> -->
  <text x="80" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    &lt;</tspan><tspan fill="#7ec8e3">Column</tspan><tspan fill="#e8e8e8"> size=</tspan><tspan fill="#b5cea8">"120"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <!-- Line 6:   </Columns> -->
  <text x="80" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;/</tspan><tspan fill="#7ec8e3">Columns</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- Line 7:   <Body> -->
  <text x="80" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;</tspan><tspan fill="#7ec8e3">Body</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- Line 8:     <Cell col="0" datacolumn="emp_id"/> -->
  <text x="80" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    &lt;</tspan><tspan fill="#7ec8e3">Cell</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#b5cea8">"0"</tspan><tspan fill="#e8e8e8"> datacolumn=</tspan><tspan fill="#ce9178">"emp_id"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <!-- Line 9:     <Cell col="1" datacolumn="emp_nm"/> -->
  <text x="80" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    &lt;</tspan><tspan fill="#7ec8e3">Cell</tspan><tspan fill="#e8e8e8"> col=</tspan><tspan fill="#b5cea8">"1"</tspan><tspan fill="#e8e8e8"> datacolumn=</tspan><tspan fill="#ce9178">"emp_nm"</tspan><tspan fill="#e8e8e8">/&gt;</tspan></text>

  <!-- Line 10:   </Body> -->
  <text x="80" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  &lt;/</tspan><tspan fill="#7ec8e3">Body</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- Line 11: </Grid> -->
  <text x="80" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">&lt;/</tspan><tspan fill="#7ec8e3">Grid</tspan><tspan fill="#e8e8e8">&gt;</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Grid의 bindDataset과 Column.datacolumn이 핵심 — 나머지는 자동 동기화</text>
</svg>
