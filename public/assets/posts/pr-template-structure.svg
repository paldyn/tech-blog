<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">PR 템플릿 구조</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">.github/PULL_REQUEST_TEMPLATE.md</text>

  <!-- Code block showing template -->
  <rect x="40" y="90" width="500" height="384" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="56" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">## 변경 사항</text>
  <text x="56" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">&lt;!-- 무엇을 왜 변경했는지 --&gt;</text>

  <text x="56" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">## 변경 유형</text>
  <text x="56" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- [ ] 버그 수정</text>
  <text x="56" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- [ ] 새 기능</text>
  <text x="56" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- [ ] 리팩토링 (동작 변경 없음)</text>
  <text x="56" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- [ ] Breaking change</text>

  <text x="56" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">## 테스트</text>
  <text x="56" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- [ ] 단위 테스트 추가/수정</text>
  <text x="56" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">- [ ] 로컬에서 직접 확인</text>

  <text x="56" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">## 스크린샷 (UI 변경 시)</text>
  <text x="56" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">&lt;!-- before / after 이미지 --&gt;</text>

  <text x="56" y="380" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">## 관련 이슈</text>
  <text x="56" y="400" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Closes #</text>
  <text x="56" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">&lt;!-- Closes #123 시 머지 시 이슈 자동 닫힘 --&gt;</text>
  <text x="56" y="454" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">## 리뷰어에게</text>
  <text x="56" y="466" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">&lt;!-- 특히 봐줬으면 하는 부분 --&gt;</text>

  <!-- Right panel: annotations -->
  <rect x="560" y="90" width="280" height="384" rx="8" fill="#111" stroke="#333" stroke-width="1"/>

  <text x="700" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">각 섹션의 역할</text>

  <text x="576" y="148"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">변경 사항</text>
  <text x="576" y="165"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">맥락 없는 PR 방지</text>

  <line x1="570" y1="178" x2="826" y2="178" stroke="#1e1e1e" stroke-width="1"/>

  <text x="576" y="200"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">변경 유형 체크박스</text>
  <text x="576" y="217"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">리뷰 집중 영역 안내</text>

  <line x1="570" y1="230" x2="826" y2="230" stroke="#1e1e1e" stroke-width="1"/>

  <text x="576" y="252"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">테스트 체크박스</text>
  <text x="576" y="269"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">테스트 누락 방지 장치</text>

  <line x1="570" y1="282" x2="826" y2="282" stroke="#1e1e1e" stroke-width="1"/>

  <text x="576" y="304"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">스크린샷</text>
  <text x="576" y="321"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">UI 변경 시각 확인</text>

  <line x1="570" y1="334" x2="826" y2="334" stroke="#1e1e1e" stroke-width="1"/>

  <text x="576" y="356"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">관련 이슈</text>
  <text x="576" y="373"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이슈 자동 닫힘 연동</text>

  <line x1="570" y1="386" x2="826" y2="386" stroke="#1e1e1e" stroke-width="1"/>

  <text x="576" y="408"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">리뷰어에게</text>
  <text x="576" y="425"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">리뷰 포인트 사전 안내</text>

  <!-- Footer -->
  <text x="440" y="490" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">모든 섹션이 필수는 아니다 — 팀 관행에 맞게 가볍게 시작, 점진적으로 확장</text>
</svg>
