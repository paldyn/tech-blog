<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">N+1 문제 — 원인과 해결</text>

  <!-- Left: N+1 Problem -->
  <rect x="60" y="66" width="360" height="36" rx="6" fill="#2a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">N+1 문제 (Lazy Loading)</text>

  <!-- Query 1 -->
  <rect x="60" y="118" width="360" height="40" rx="6" fill="#1a0a0a" stroke="#553333" stroke-width="1"/>
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">쿼리 1 (1번)</text>
  <text x="80" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ce9178">SELECT * FROM users LIMIT 100</text>

  <line x1="240" y1="158" x2="240" y2="178" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Query N -->
  <rect x="60" y="180" width="360" height="66" rx="6" fill="#1a0a0a" stroke="#553333" stroke-width="1"/>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">쿼리 2~101 (N번 = 100번)</text>
  <text x="80" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ce9178">SELECT * FROM orders WHERE user_id=1</text>
  <text x="80" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ce9178">SELECT * FROM orders WHERE user_id=2</text>

  <!-- Impact box -->
  <rect x="60" y="262" width="360" height="56" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">총 101회 DB 쿼리</text>
  <text x="240" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">100명 조회 → 주문 로딩 100번 추가</text>

  <!-- Right: Eager Loading Solution -->
  <rect x="460" y="66" width="360" height="36" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">해결: Eager Loading (JOIN / IN)</text>

  <!-- Solution Query -->
  <rect x="460" y="118" width="360" height="56" rx="6" fill="#0a1a0a" stroke="#335533" stroke-width="1"/>
  <text x="480" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">방법 A: JOIN FETCH (1번)</text>
  <text x="480" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ce9178">SELECT u.*, o.* FROM users u</text>
  <text x="480" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ce9178">LEFT JOIN orders o ON o.user_id=u.id</text>

  <rect x="460" y="186" width="360" height="56" rx="6" fill="#0a1a0a" stroke="#335533" stroke-width="1"/>
  <text x="480" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">방법 B: IN 로딩 (2번)</text>
  <text x="480" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ce9178">SELECT * FROM users LIMIT 100</text>
  <text x="480" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ce9178">SELECT * FROM orders WHERE user_id IN (...)</text>

  <!-- Impact box -->
  <rect x="460" y="262" width="360" height="56" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">1~2회 DB 쿼리</text>
  <text x="640" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">100명 조회 → 주문 일괄 로딩 1번</text>

  <!-- VS arrow -->
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#555" text-anchor="middle">vs</text>

  <!-- Bottom: ORM code comparison -->
  <rect x="60" y="342" width="760" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># SQLAlchemy 해결 방법</text>
  <text x="80" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> sqlalchemy.orm </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> selectinload, joinedload</tspan>
  </text>
  <text x="80" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># selectinload: IN 방식 (다수 레코드에 적합)</tspan>
  </text>
  <text x="80" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">stmt = select(User).options(selectinload(User.orders))</tspan>
  </text>
  <text x="80" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># joinedload: LEFT JOIN 방식 (1:1, 소수에 적합)</tspan>
  </text>
  <text x="80" y="462" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">stmt = select(Order).options(joinedload(Order.user))</tspan>
  </text>
</svg>
