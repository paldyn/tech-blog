<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-push" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-pull" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8a020"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Docker 레지스트리 전체 구조
  </text>

  <!-- Developer -->
  <rect x="60" y="70" width="160" height="60" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">개발자 머신</text>
  <text x="140" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">docker build / push</text>

  <!-- Registry -->
  <rect x="320" y="54" width="240" height="200" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Registry</text>

  <!-- Registry components -->
  <rect x="340" y="96" width="200" height="36" rx="4" fill="#0a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Repository</text>

  <rect x="340" y="144" width="200" height="36" rx="4" fill="#0a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Image Manifest</text>
  <text x="440" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" text-anchor="middle">sha256:abc123...</text>

  <rect x="340" y="192" width="200" height="36" rx="4" fill="#0a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Layer Blobs (tar.gz)</text>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Content-Addressable Storage</text>

  <!-- CI/CD -->
  <rect x="60" y="200" width="160" height="60" rx="8" fill="#1a1a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="140" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">CI/CD</text>
  <text x="140" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">build & push</text>

  <!-- Production -->
  <rect x="660" y="130" width="160" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">프로덕션 서버</text>
  <text x="740" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">docker pull / run</text>

  <!-- Arrows -->
  <!-- Dev push -->
  <path d="M 220 100 L 318 127" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arr-push)"/>
  <text x="255" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">push</text>

  <!-- CI push -->
  <path d="M 220 230 L 318 195" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arr-push)"/>
  <text x="245" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">push</text>

  <!-- Prod pull -->
  <path d="M 560 160 L 658 160" stroke="#e8a020" stroke-width="2" fill="none" marker-end="url(#arr-pull)"/>
  <text x="590" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8a020">pull</text>

  <!-- OCI spec note -->
  <rect x="60" y="310" width="760" height="72" rx="6" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">OCI Distribution Spec</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">레지스트리는 OCI 표준 HTTP API를 구현. GET /v2/{name}/manifests/{reference}</text>
  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Docker Hub, ECR, GCR, ACR, GHCR 등 모두 동일한 API 규격 사용</text>

  <!-- Popular registries -->
  <text x="60" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">주요 레지스트리</text>

  <rect x="60" y="428" width="130" height="70" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="125" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">Docker Hub</text>
  <text x="125" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">퍼블릭 기본</text>
  <text x="125" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">docker.io</text>

  <rect x="210" y="428" width="130" height="70" rx="6" fill="#0a1a2a" stroke="#e8a020" stroke-width="1"/>
  <text x="275" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle" font-weight="600">AWS ECR</text>
  <text x="275" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">IAM 인증</text>
  <text x="275" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">*.ecr.amazonaws.com</text>

  <rect x="360" y="428" width="130" height="70" rx="6" fill="#0a1a2a" stroke="#55c555" stroke-width="1"/>
  <text x="425" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">GHCR</text>
  <text x="425" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">GitHub 통합</text>
  <text x="425" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">ghcr.io</text>

  <rect x="510" y="428" width="130" height="70" rx="6" fill="#0a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="575" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle" font-weight="600">GCR/GAR</text>
  <text x="575" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Google Cloud</text>
  <text x="575" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">*.pkg.dev</text>

  <rect x="660" y="428" width="160" height="70" rx="6" fill="#0a1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="740" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle" font-weight="600">Self-hosted</text>
  <text x="740" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Harbor, Nexus</text>
  <text x="740" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">registry:2</text>
</svg>
