<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git reset 실전 예시</text>

  <!-- –soft example -->
  <rect x="60" y="68" width="234" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="177" y="94" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">--soft</text>

  <text x="80" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 마지막 커밋 취소</text>
  <text x="80" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">git reset --soft HEAD~1</text>

  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">커밋 전 상태로:</text>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">변경은 Staged 유지.</text>
  <text x="80" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">메시지만 수정하고</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">다시 커밋할 때 유용.</text>

  <text x="80" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">git log --oneline</text>
  <text x="80" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># a3f9d21 이전 커밋</text>
  <text x="80" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">git status -s</text>
  <text x="80" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># M  src/auth.js</text>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">(여전히 Staged)</text>

  <!-- –mixed example -->
  <rect x="323" y="68" width="234" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="94" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">--mixed (기본)</text>

  <text x="343" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 커밋 + 스테이징 취소</text>
  <text x="343" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">git reset HEAD~1</text>

  <text x="343" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일은 Modified 상태로.</text>
  <text x="343" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">커밋을 쪼개거나</text>
  <text x="343" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">다른 파일과 조합해</text>
  <text x="343" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">재커밋할 때 유용.</text>

  <text x="343" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">git status -s</text>
  <text x="343" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">#  M src/auth.js</text>
  <text x="343" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">(Staged → Modified)</text>

  <text x="343" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">git reset HEAD file.js</text>
  <text x="343" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 언스테이징 (구버전)</text>

  <!-- –hard example -->
  <rect x="586" y="68" width="234" height="280" rx="8" fill="#1a0808" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="703" y="94" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">--hard ⚠</text>

  <text x="606" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 완전히 되돌리기</text>
  <text x="606" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">git reset --hard HEAD~1</text>

  <text x="606" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">커밋+스테이징+파일</text>
  <text x="606" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모두 이전 상태로.</text>
  <text x="606" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">작업한 내용이 사라짐.</text>
  <text x="606" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">신중히 사용할 것.</text>

  <text x="606" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">git status -s</text>
  <text x="606" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># (아무것도 없음)</text>

  <text x="606" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">복구 방법:</text>
  <text x="606" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">git reflog</text>
  <text x="606" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">git reset --hard {hash}</text>
</svg>
