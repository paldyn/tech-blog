<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NoInfer&lt;T&gt; — 추론 참여 차단</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">TypeScript 5.4 내장 유틸리티 — 해당 위치를 추론 사이트에서 제외</text>

  <!-- Solution code: left -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">해결: NoInfer&lt;T&gt;로 initial 추론 참여 차단</text>
  <rect x="60" y="116" width="360" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> setInitialValue&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt;(</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  items: <tspan fill="#7ec8e3" font-weight="600">T</tspan>[],</text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  initial: <tspan fill="#55c555">NoInfer</tspan>&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt;</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">): <tspan fill="#7ec8e3" font-weight="600">void</tspan> { <tspan fill="#9aa4b8">/* ... */</tspan> }</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">setInitialValue([<tspan fill="#ce9178">"a"</tspan>, <tspan fill="#ce9178">"b"</tspan>], <tspan fill="#b5cea8">0</tspan>);</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✗ 오류: number는 string에 할당 불가</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">setInitialValue([<tspan fill="#ce9178">"a"</tspan>, <tspan fill="#ce9178">"b"</tspan>], <tspan fill="#ce9178">"z"</tspan>);</text>

  <!-- Right: more use cases -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">동작 원리 및 추가 패턴</text>
  <rect x="460" y="116" width="360" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// items에서 T=string 추론</text>
  <text x="476" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// initial은 NoInfer 래핑 → 추론 참여 X</text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 단, T=string으로 타입 검사는 수행</text>
  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 이벤트 핸들러 패턴</text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> on&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt;(</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  event: <tspan fill="#7ec8e3" font-weight="600">T</tspan>,</text>
  <text x="476" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  cb: (e: <tspan fill="#55c555">NoInfer</tspan>&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan>&gt;) =&gt; <tspan fill="#7ec8e3" font-weight="600">void</tspan></text>

  <!-- How it works row -->
  <rect x="60" y="312" width="360" height="90" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">NoInfer&lt;T&gt; 동작</text>
  <text x="240" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">T 타입 검사는 정상 수행</text>
  <text x="240" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">해당 위치를 T 추론 사이트에서 제외</text>
  <text x="240" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">런타임에는 영향 없음 (타입 레벨만)</text>

  <rect x="460" y="312" width="360" height="90" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">도입 배경 (TS 5.4)</text>
  <text x="640" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">기존 우회책: T &amp; {} 또는 [T][0] 등</text>
  <text x="640" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">5.4에서 공식 내장 유틸리티로 추가</text>
  <text x="640" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">lib.d.ts: type NoInfer&lt;T&gt; = intrinsic</text>

  <!-- Note -->
  <rect x="60" y="424" width="760" height="36" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="447" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">"추론은 다른 곳에서, 검사는 이곳에서" — T 결정 흐름을 한 위치로 집중시킨다</text>
</svg>
