<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">eBPF 기반 CNI — Cilium의 패킷 처리</text>

  <!-- Traditional path (left) -->
  <rect x="60" y="68" width="350" height="240" rx="8" fill="none" stroke="#e05555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="235" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">전통적 iptables 방식 (kube-proxy)</text>

  <rect x="80" y="108" width="140" height="40" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">패킷 도착</text>

  <line x1="150" y1="148" x2="150" y2="165" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="80" y="168" width="140" height="40" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="150" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">iptables PREROUTING</text>

  <line x1="150" y1="208" x2="150" y2="225" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="80" y="228" width="140" height="40" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="150" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">DNAT → 목적지 변경</text>

  <line x1="220" y1="168" x2="250" y2="168" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="220" y1="208" x2="250" y2="208" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="220" y1="248" x2="250" y2="248" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <text x="270" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">규칙 수: O(Services)</text>
  <text x="270" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">매 패킷 순차 탐색</text>
  <text x="270" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">1000+ 서비스 시 지연</text>

  <text x="150" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">conntrack + 여러 레이어 거침</text>
  <text x="150" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">L4 LB만 지원</text>

  <!-- eBPF path (right) -->
  <rect x="470" y="68" width="350" height="240" rx="8" fill="none" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">eBPF 방식 (Cilium)</text>

  <rect x="490" y="108" width="140" height="40" rx="4" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">패킷 도착</text>

  <line x1="560" y1="148" x2="560" y2="165" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="490" y="168" width="140" height="40" rx="4" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">XDP / TC eBPF hook</text>
  <text x="560" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">NIC 레벨 처리</text>

  <line x1="560" y1="208" x2="560" y2="225" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="490" y="228" width="140" height="40" rx="4" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">BPF Map 해시 O(1)</text>
  <text x="560" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">목적지 직접 조회</text>

  <text x="646" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">O(1) 룩업, 스택 최소 거침</text>
  <text x="646" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">L3/L4/L7 정책 모두 지원</text>

  <!-- Benefits bar -->
  <rect x="60" y="330" width="760" height="70" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Cilium eBPF 주요 기능</text>
  <text x="200" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">kube-proxy 완전 대체</text>
  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">L7 HTTP/gRPC 정책</text>
  <text x="680" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Hubble 관측성</text>
  <text x="200" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">iptables 규칙 없음</text>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DNS 기반 정책</text>
  <text x="680" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">흐름 실시간 모니터링</text>

  <line x1="330" y1="340" x2="330" y2="396" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="560" y1="340" x2="560" y2="396" stroke="#2a2a2a" stroke-width="1"/>
</svg>
