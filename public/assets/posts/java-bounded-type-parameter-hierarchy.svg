<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">경계 타입 파라미터 — extends로 범위 제한</text>

  <!-- Title labels -->
  <text x="220" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">상한 경계 (Upper Bound)</text>
  <text x="660" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">다중 경계 (Multiple Bounds)</text>

  <!-- Left: Upper bound hierarchy -->
  <rect x="170" y="98" width="100" height="38" fill="#1e2a3a" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="220" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Number</text>

  <defs>
    <marker id="arr-up" viewBox="0 0 14 14" refX="7" refY="12" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 14 L 7 1 L 13 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="7" refY="12" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 14 L 7 1 L 13 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <line x1="180" y1="160" x2="220" y2="136" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-up)"/>
  <line x1="260" y1="160" x2="220" y2="136" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-up)"/>
  <line x1="340" y1="160" x2="220" y2="136" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-up)"/>

  <rect x="100" y="160" width="80" height="36" fill="#0d1a2a" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">Integer</text>

  <rect x="200" y="160" width="80" height="36" fill="#0d1a2a" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">Double</text>

  <rect x="300" y="160" width="60" height="36" fill="#0d1a2a" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="330" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">Long</text>

  <!-- T extends Number constraint box -->
  <rect x="60" y="220" width="320" height="62" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// T는 Number 또는 그 하위 타입</tspan></text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">static</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> Number&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">double</tspan><tspan fill="#ffffff"> sum(List&lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">&gt; list)</tspan></text>

  <!-- Label -->
  <text x="220" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">T.doubleValue() 호출 가능 (Number 메서드)</text>

  <!-- Right: Multiple bounds -->
  <rect x="500" y="98" width="320" height="220" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">클래스 + 인터페이스 다중 경계</text>
  <text x="516" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 첫 번째만 클래스, 나머지 인터페이스</tspan></text>
  <text x="516" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> Number &amp;</tspan></text>
  <text x="516" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">         Comparable&lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">&gt;&gt;</tspan></text>
  <text x="516" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 인터페이스만 다중 가능</tspan></text>
  <text x="516" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> Serializable &amp;</tspan></text>
  <text x="516" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">         Cloneable &amp; Comparable&lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">&gt;&gt;</tspan></text>
  <text x="516" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">// NG: 클래스 두 개 extends 불가!</text>
  <text x="516" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// &lt;T extends A &amp; B&gt;  A, B가 둘 다 클래스면 오류</tspan></text>

  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">상한 경계를 지정하면 T의 메서드 &amp; 필드에 접근 가능 — raw type보다 강력한 타입 제약</text>
</svg>
