<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SELinux 아키텍처 — MAC 정책 적용 흐름</text>

  <!-- Process / Subject -->
  <rect x="60" y="72" width="180" height="64" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">주체 (Subject)</text>
  <text x="150" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프로세스</text>
  <text x="150" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle">httpd_t</text>

  <!-- Arrow to kernel -->
  <line x1="240" y1="104" x2="300" y2="104" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="270" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">syscall</text>

  <!-- Kernel SELinux module -->
  <rect x="300" y="60" width="280" height="200" rx="10" fill="#0d102e" stroke="#4a5e9e" stroke-width="2"/>
  <text x="440" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Linux 커널</text>

  <rect x="320" y="96" width="240" height="50" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">SELinux LSM 모듈</text>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Linux Security Module</text>

  <rect x="320" y="154" width="240" height="50" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">AVC (Access Vector Cache)</text>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정책 결정 캐시</text>

  <rect x="320" y="212" width="240" height="34" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">정책 데이터베이스 (/etc/selinux)</text>

  <!-- Allow arrow -->
  <line x1="580" y1="100" x2="640" y2="100" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="610" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">허용</text>

  <!-- Deny arrow -->
  <line x1="580" y1="132" x2="640" y2="180" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <text x="618" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">거부+로그</text>

  <!-- Object / Resource -->
  <rect x="640" y="72" width="180" height="64" rx="8" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="730" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">객체 (Object)</text>
  <text x="730" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파일 / 소켓 등</text>
  <text x="730" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle">httpd_sys_content_t</text>

  <!-- Denied resource -->
  <rect x="640" y="160" width="180" height="64" rx="8" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="730" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">거부된 객체</text>
  <text x="730" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">잘못된 컨텍스트</text>
  <text x="730" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle">user_home_t</text>

  <!-- Context labels -->
  <text x="440" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">SELinux 컨텍스트 구조</text>

  <rect x="60" y="316" width="760" height="56" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="80" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">컨텍스트 형식:</text>
  <text x="230" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">user</text>
  <text x="266" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">:</text>
  <text x="278" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">role</text>
  <text x="306" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">:</text>
  <text x="318" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">type</text>
  <text x="354" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">:</text>
  <text x="366" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">level</text>
  <text x="80" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예:</text>
  <text x="110" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">system_u:system_r:httpd_t:s0</text>
  <text x="450" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">← Apache 프로세스의 컨텍스트</text>

  <!-- Code -->
  <rect x="60" y="388" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># SELinux 모드 확인 및 전환</text>
  <text x="80" y="426" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">getenforce</text>
  <text x="80" y="444" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 일시적 변경 (재부팅 시 초기화)</text>
  <text x="80" y="462" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">setenforce</text>
  <text x="152" y="462" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> 0  </text>
  <text x="200" y="462" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Permissive  |  setenforce 1 → Enforcing</text>
  <text x="80" y="480" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 컨텍스트 확인: ls -Z file  /  ps -eZ | grep httpd</text>
</svg>
