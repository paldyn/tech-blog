<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Authorization Code Flow — Spring Authorization Server</text>

  <!-- Actors -->
  <rect x="60" y="68" width="100" height="40" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="110" y="93" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Browser</text>

  <rect x="240" y="68" width="120" height="40" rx="8" fill="#0a0e1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="300" y="93" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Client App</text>

  <rect x="450" y="68" width="140" height="40" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="520" y="93" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">Auth Server</text>

  <rect x="700" y="68" width="120" height="40" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="760" y="93" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Resource Server</text>

  <!-- Swimlane lines -->
  <line x1="110" y1="108" x2="110" y2="460" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="300" y1="108" x2="300" y2="460" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="520" y1="108" x2="520" y2="460" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="760" y1="108" x2="760" y2="460" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: Browser → Client, click login -->
  <line x1="110" y1="126" x2="238" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="174" y="120" text-anchor="middle" font-size="11" fill="#888">① 로그인 버튼 클릭</text>

  <!-- Step 2: Client → Auth Server, redirect -->
  <line x1="360" y1="150" x2="448" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="404" y="144" text-anchor="middle" font-size="11" fill="#888">② /oauth2/authorize 리다이렉트</text>

  <!-- Step 3: Auth Server → Browser, login page -->
  <line x1="448" y1="174" x2="122" y2="174" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="286" y="168" text-anchor="middle" font-size="11" fill="#888">③ 로그인 페이지 반환</text>

  <!-- Step 4: Browser → Auth Server, credentials -->
  <line x1="110" y1="198" x2="448" y2="198" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="286" y="192" text-anchor="middle" font-size="11" fill="#888">④ username + password 제출</text>

  <!-- Step 5: Auth Server → Client, authorization code -->
  <line x1="448" y1="222" x2="362" y2="222" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="404" y="216" text-anchor="middle" font-size="11" fill="#888">⑤ code + state (redirect)</text>

  <!-- Step 6: Client → Auth Server, exchange code -->
  <line x1="360" y1="246" x2="448" y2="246" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="404" y="240" text-anchor="middle" font-size="11" fill="#888">⑥ POST /oauth2/token (code)</text>

  <!-- Step 7: Auth Server → Client, tokens -->
  <line x1="448" y1="270" x2="362" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="404" y="264" text-anchor="middle" font-size="11" fill="#888">⑦ access_token + refresh_token</text>

  <!-- Step 8: Client → Resource Server, API call -->
  <line x1="360" y1="306" x2="698" y2="306" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="528" y="300" text-anchor="middle" font-size="11" fill="#888">⑧ GET /api/data (Bearer token)</text>

  <!-- Step 9: Resource Server → Auth Server, JWK -->
  <path d="M 700 330 Q 610 360 532 330" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="616" y="357" text-anchor="middle" font-size="11" fill="#888">⑨ JWK 공개키 조회 (캐싱)</text>

  <!-- Step 10: Resource Server → Client, response -->
  <line x1="698" y1="378" x2="362" y2="378" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="528" y="372" text-anchor="middle" font-size="11" fill="#888">⑩ 200 OK + 데이터</text>

  <!-- Note box -->
  <rect x="60" y="408" width="760" height="60" rx="6" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="430" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">핵심: Resource Server는 Auth Server에 직접 통신하지 않는다</text>
  <text x="440" y="452" text-anchor="middle" font-size="12" fill="#888">JWT 서명은 로컬(JWK 공개키)로 검증 — 매 요청마다 Auth Server 호출 없음</text>
</svg>
