<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle 인스턴스 vs 데이터베이스</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">인스턴스는 메모리+프로세스, 데이터베이스는 디스크 파일</text>

  <!-- Instance box -->
  <rect x="60" y="95" width="360" height="320" fill="#0d1520" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">인스턴스 (Instance)</text>
  <text x="240" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">서버 기동 시 메모리에 생성 — 전원 꺼지면 사라짐</text>

  <!-- SGA -->
  <rect x="80" y="158" width="320" height="80" fill="#0d2040" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">SGA (Shared Global Area)</text>
  <text x="240" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Buffer Cache · Shared Pool</text>
  <text x="240" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Redo Log Buffer · Large Pool</text>

  <!-- PGA -->
  <rect x="80" y="250" width="148" height="60" fill="#0d1a2e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="154" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">PGA</text>
  <text x="154" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">세션별 메모리</text>
  <text x="154" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Sort/Hash 영역</text>

  <!-- Background Processes -->
  <rect x="242" y="250" width="158" height="60" fill="#0d1a2e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="321" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">백그라운드 프로세스</text>
  <text x="321" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DBWR · LGWR</text>
  <text x="321" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CKPT · SMON · PMON</text>

  <!-- System ID -->
  <text x="240" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">식별자: ORACLE_SID (환경변수)</text>
  <text x="240" y="365" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">export ORACLE_SID=ORCL</text>
  <text x="240" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">하나의 인스턴스는 하나의 DB를 마운트</text>

  <!-- Database box -->
  <rect x="460" y="95" width="360" height="320" fill="#111" rx="10" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">데이터베이스 (Database)</text>
  <text x="640" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">디스크에 영구 저장된 파일의 집합</text>

  <!-- Files -->
  <rect x="480" y="158" width="140" height="60" fill="#0e1a0e" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="550" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">데이터 파일</text>
  <text x="550" y="198" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">*.dbf</text>
  <text x="550" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">테이블스페이스</text>

  <rect x="640" y="158" width="160" height="60" fill="#1a1000" rx="6" stroke="#e8b84b" stroke-width="1"/>
  <text x="720" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8b84b">Redo Log 파일</text>
  <text x="720" y="198" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">*.log</text>
  <text x="720" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트랜잭션 로그</text>

  <rect x="480" y="234" width="140" height="60" fill="#1a0e0e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Control 파일</text>
  <text x="550" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">*.ctl</text>
  <text x="550" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DB 구조 메타</text>

  <rect x="640" y="234" width="160" height="60" fill="#0d1a2e" rx="6" stroke="#555" stroke-width="1"/>
  <text x="720" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">Archive Log</text>
  <text x="720" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">*.arc</text>
  <text x="720" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PITR 복구용</text>

  <!-- DB name -->
  <text x="640" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">식별자: DB_NAME (파라미터)</text>
  <text x="640" y="362" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">SELECT name FROM v$database;</text>
  <text x="640" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전원이 꺼져도 파일은 남는다</text>

  <!-- Mount/Open arrows -->
  <line x1="420" y1="230" x2="458" y2="230" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="458,230 444,223 444,237" fill="#7ec8e3"/>
  <text x="439" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">MOUNT</text>
  <text x="439" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">OPEN</text>

  <!-- Bottom: startup sequence -->
  <rect x="60" y="438" width="760" height="76" fill="#0d0d18" rx="6" stroke="#3a4a6e"/>
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Oracle 기동 순서</text>
  <text x="180" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">NOMOUNT</text>
  <text x="180" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파라미터 파일 읽기</text>
  <text x="295" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#555">→</text>
  <text x="440" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">MOUNT</text>
  <text x="440" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Control 파일 읽기</text>
  <text x="512" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#555">→</text>
  <text x="660" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">OPEN</text>
  <text x="660" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">데이터 파일·Redo 열기</text>
</svg>
