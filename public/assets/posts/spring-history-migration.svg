<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring Boot 2 vs 3 — 패키지 변화</text>

  <!-- Left label: Spring Boot 2.x / Spring 5 -->
  <text x="245" y="72"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Spring Boot 2.x (Spring 5)</text>

  <!-- Right label: Spring Boot 3.x / Spring 6 -->
  <text x="635" y="72"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Spring Boot 3.x (Spring 6)</text>

  <!-- Left code box -->
  <rect x="60" y="84" width="370" height="226" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8">// javax 네임스페이스 사용 (구버전)</text>
  <text x="76" y="127" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> javax.persistence.Entity;</tspan>
  </text>
  <text x="76" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> javax.persistence.Id;</tspan>
  </text>
  <text x="76" y="165" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> javax.servlet.http.HttpServletRequest;</tspan>
  </text>
  <text x="76" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> javax.validation.Valid;</tspan>
  </text>
  <text x="76" y="203" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff"> </text>
  <text x="76" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">@Entity</tspan>
  </text>
  <text x="76" y="241" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> User {</tspan>
  </text>
  <text x="76" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">    @Id</tspan>
  </text>
  <text x="76" y="279" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    private</tspan><tspan fill="#ffffff"> Long id;</tspan>
  </text>
  <text x="76" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Arrow in middle -->
  <text x="440" y="204"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#555" text-anchor="middle">→</text>
  <text x="440" y="224"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">javax</text>
  <text x="440" y="238"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">→</text>
  <text x="440" y="252"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">jakarta</text>

  <!-- Right code box -->
  <rect x="450" y="84" width="370" height="226" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="466" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8">// jakarta 네임스페이스 (Spring 6+)</text>
  <text x="466" y="127" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#e05555"> jakarta</tspan><tspan fill="#ffffff">.persistence.Entity;</tspan>
  </text>
  <text x="466" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#e05555"> jakarta</tspan><tspan fill="#ffffff">.persistence.Id;</tspan>
  </text>
  <text x="466" y="165" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#e05555"> jakarta</tspan><tspan fill="#ffffff">.servlet.http.HttpServletRequest;</tspan>
  </text>
  <text x="466" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#e05555"> jakarta</tspan><tspan fill="#ffffff">.validation.Valid;</tspan>
  </text>
  <text x="466" y="203" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff"> </text>
  <text x="466" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">@Entity</tspan>
  </text>
  <text x="466" y="241" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> User {</tspan>
  </text>
  <text x="466" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">    @Id</tspan>
  </text>
  <text x="466" y="279" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    private</tspan><tspan fill="#ffffff"> Long id;</tspan>
  </text>
  <text x="466" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Bottom annotation -->
  <text x="440" y="332"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Spring Boot 3.x 마이그레이션의 핵심: 패키지명만 변경 — 로직은 그대로</text>
</svg>
