<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커링 활용 패턴 — 부분 적용과 재사용</text>

  <!-- Pattern 1: Logger -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">패턴 1 — 로거 팩토리</text>
  <rect x="60" y="96" width="340" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Function</tspan><tspan fill="#ffffff">&lt;String,</tspan></text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">  Function</tspan><tspan fill="#ffffff">&lt;String, String&gt;&gt; log =</tspan></text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  level -&gt; msg -&gt;</tspan></text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"["</tspan><tspan fill="#ffffff"> + level + </tspan><tspan fill="#ce9178">"] "</tspan><tspan fill="#ffffff"> + msg;</tspan></text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> warn = log.apply(</tspan><tspan fill="#ce9178">"WARN"</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- Arrow -->
  <line x1="410" y1="152" x2="456" y2="152" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Result boxes -->
  <rect x="466" y="100" width="354" height="104" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="482" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">부분 적용으로 레벨 고정</text>
  <text x="482" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">warn.apply("DB 연결 실패")</text>
  <text x="482" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  // "[WARN] DB 연결 실패"</text>
  <text x="482" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">레벨별 로거 함수를 미리 생성해 재사용</text>

  <!-- Pattern 2: Validator -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">패턴 2 — 검증 규칙 조립</text>
  <rect x="60" y="262" width="760" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Function</tspan><tspan fill="#ffffff">&lt;Integer, </tspan><tspan fill="#7ec8e3" font-weight="600">Predicate</tspan><tspan fill="#ffffff">&lt;Integer&gt;&gt; range =</tspan></text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    min -&gt; n -&gt; n &gt;= min;</tspan></text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Predicate</tspan><tspan fill="#ffffff">&lt;Integer&gt; isAdult = range.apply(18);  </tspan><tspan fill="#9aa4b8">// n &gt;= 18</tspan></text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Predicate</tspan><tspan fill="#ffffff">&lt;Integer&gt; over0  = range.apply(1);   </tspan><tspan fill="#9aa4b8">// n &gt;= 1</tspan></text>

  <!-- Key Points -->
  <rect x="60" y="382" width="760" height="70" rx="8" fill="#0d1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">커링 vs 부분 적용 차이</text>
  <text x="180" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">커링: f(a,b) → f(a)(b) — 인자를 1개씩</text>
  <text x="570" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">부분 적용: 일부 인자만 먼저 고정</text>
  <line x1="440" y1="416" x2="440" y2="445" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
