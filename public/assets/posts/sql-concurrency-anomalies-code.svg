<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <text x="440" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">이상 현상 추가 유형: Lost Update · Write Skew</text>

  <!-- Left: Lost Update -->
  <rect x="50" y="56" width="370" height="22" rx="4" fill="#1a1010"/>
  <text x="235" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">Lost Update (갱신 손실)</text>

  <rect x="50" y="82" width="370" height="234" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="66" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- Tx1: 좋아요 +1</text>
  <text x="66" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT<tspan fill="#ffffff"> likes </tspan><tspan fill="#7ec8e3">FROM</tspan><tspan fill="#ffffff"> posts;</tspan><tspan fill="#9aa4b8"> -- 10</tspan></text>
  <text x="66" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- Tx2 동시에 좋아요 +1</text>
  <text x="66" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT<tspan fill="#ffffff"> likes </tspan><tspan fill="#7ec8e3">FROM</tspan><tspan fill="#ffffff"> posts;</tspan><tspan fill="#9aa4b8"> -- 10</tspan></text>
  <text x="66" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">UPDATE<tspan fill="#ffffff"> posts </tspan><tspan fill="#7ec8e3">SET</tspan><tspan fill="#ffffff"> likes=</tspan><tspan fill="#b5cea8">11</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">UPDATE<tspan fill="#ffffff"> posts </tspan><tspan fill="#7ec8e3">SET</tspan><tspan fill="#ffffff"> likes=</tspan><tspan fill="#b5cea8">11</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">-- 결과: 11 (12이어야 함)</text>
  <text x="66" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 해결: 원자적 UPDATE</text>
  <text x="66" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">UPDATE<tspan fill="#ffffff"> posts</tspan></text>
  <text x="66" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  SET<tspan fill="#ffffff"> likes = likes + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">;</tspan></text>

  <!-- Right: Write Skew -->
  <rect x="460" y="56" width="370" height="22" rx="4" fill="#10101a"/>
  <text x="645" y="71" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Write Skew (쓰기 왜곡)</text>

  <rect x="460" y="82" width="370" height="234" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 조건: 당직 의사 최소 1명</text>
  <text x="476" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- Tx1, Tx2 동시에 퇴근 시도</text>
  <text x="476" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 둘 다 당직 의사 2명 확인</text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT<tspan fill="#ffffff"> COUNT(*) </tspan><tspan fill="#7ec8e3">FROM</tspan></text>
  <text x="476" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  on_duty <tspan fill="#7ec8e3">WHERE</tspan><tspan fill="#ffffff"> active;</tspan><tspan fill="#9aa4b8">-- 2</tspan></text>
  <text x="476" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 둘 다 자기 자신 퇴근 처리</text>
  <text x="476" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">UPDATE<tspan fill="#ffffff"> on_duty </tspan><tspan fill="#7ec8e3">SET</tspan></text>
  <text x="476" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  active=<tspan fill="#7ec8e3">false</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">-- 결과: 당직 의사 0명!</text>
  <text x="476" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 해결: SERIALIZABLE 격리</text>

  <rect x="50" y="326" width="780" height="24" rx="4" fill="#111118"/>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Write Skew는 SERIALIZABLE 또는 SELECT ... FOR UPDATE로만 방지 가능 (REPEATABLE READ 불충분)</text>
</svg>
