<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Flyway 마이그레이션 실행 흐름</text>

  <!-- 애플리케이션 기동 단계 -->
  <!-- Step 1: App Start -->
  <rect x="60" y="80" width="160" height="60" rx="8" fill="#1a2030" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 앱 기동</text>
  <text x="140" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SpringApplication.run()</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="110" x2="268" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- Step 2: Flyway Bean -->
  <rect x="270" y="80" width="160" height="60" rx="8" fill="#1a2030" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="350" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">② Flyway Bean</text>
  <text x="350" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Auto-configuration</text>

  <!-- Arrow 2→3 -->
  <line x1="430" y1="110" x2="478" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- Step 3: flyway_schema_history -->
  <rect x="480" y="80" width="180" height="60" rx="8" fill="#1a2030" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="570" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 히스토리 테이블</text>
  <text x="570" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">flyway_schema_history</text>
  <text x="570" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">확인 / 생성</text>

  <!-- Arrow 3→4 -->
  <line x1="660" y1="110" x2="708" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-w)"/>

  <!-- Step 4: Scan migrations -->
  <rect x="710" y="80" width="140" height="60" rx="8" fill="#1a2030" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="780" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">④ 스크립트 스캔</text>
  <text x="780" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">db/migration/*.sql</text>

  <!-- 파일 목록 박스 -->
  <rect x="60" y="190" width="340" height="170" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">resources/db/migration/</text>
  <text x="80" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  V1__create_users.sql</text>
  <text x="80" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  V2__add_email_column.sql</text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  V3__create_orders.sql</text>
  <text x="80" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">  V4__add_indexes.sql</text>
  <text x="80" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  ── 미적용 (신규) ──</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" xml:space="preserve">  ✓ 적용됨  ✗ 미적용</text>

  <!-- 히스토리 테이블 박스 -->
  <rect x="480" y="190" width="360" height="170" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="498" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">flyway_schema_history</text>
  <text x="498" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">version  │ description    │ success</text>
  <text x="498" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">─────────┼────────────────┼────────</text>
  <text x="498" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">1        │ create users   │ true</text>
  <text x="498" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">2        │ add email      │ true</text>
  <text x="498" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">3        │ create orders  │ true</text>
  <text x="498" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">(V4 없음 → 실행 대상)</text>

  <!-- 비교 화살표 -->
  <line x1="400" y1="275" x2="478" y2="275" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-w)"/>
  <text x="430" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">비교</text>

  <!-- 실행 결과 -->
  <rect x="60" y="400" width="760" height="100" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">⑤ V4__add_indexes.sql 실행 → success=true 기록</text>
  <text x="440" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle" xml:space="preserve">Successfully applied 1 migration to schema "public"</text>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">체크섬 불일치 · 순서 오류 시 기동 자체가 실패(FlywayException)</text>
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">→ prod 환경에서 배포 전 스크립트 오류를 사전 차단하는 안전망</text>

  <!-- Down arrow from steps to result -->
  <line x1="440" y1="370" x2="440" y2="398" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
</svg>
