<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">Python 내장 예외 계층 구조 (주요)</text>

  <!-- BaseException root -->
  <rect x="330" y="55" width="220" height="38" rx="6" fill="#0c1628" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="79" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">BaseException</text>

  <!-- Lines from BaseException -->
  <line x1="440" y1="93" x2="440" y2="115" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="120" y1="115" x2="760" y2="115" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Level 2: 4 branches -->
  <line x1="120" y1="115" x2="120" y2="135" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="330" y1="115" x2="330" y2="135" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="560" y1="115" x2="560" y2="135" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="760" y1="115" x2="760" y2="135" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- SystemExit -->
  <rect x="50" y="135" width="140" height="34" rx="5" fill="#1a0c0c" stroke="#e05555" stroke-width="1.5"/>
  <text x="120" y="157" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">SystemExit</text>

  <!-- KeyboardInterrupt -->
  <rect x="240" y="135" width="180" height="34" rx="5" fill="#1a0c0c" stroke="#e05555" stroke-width="1.5"/>
  <text x="330" y="157" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">KeyboardInterrupt</text>

  <!-- GeneratorExit -->
  <rect x="470" y="135" width="180" height="34" rx="5" fill="#1a0c0c" stroke="#e05555" stroke-width="1.5"/>
  <text x="560" y="157" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">GeneratorExit</text>

  <!-- Exception (main) -->
  <rect x="680" y="135" width="160" height="34" rx="5" fill="#0c1c0a" stroke="#55c555" stroke-width="2"/>
  <text x="760" y="157" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">Exception</text>

  <!-- Lines from Exception -->
  <line x1="760" y1="169" x2="760" y2="195" stroke="#2a3d5e" stroke-width="1.5"/>
  <line x1="55" y1="195" x2="820" y2="195" stroke="#2a3d5e" stroke-width="1.5"/>

  <!-- Level 3: Exception subclasses grouped -->
  <!-- ArithmeticError group -->
  <line x1="100" y1="195" x2="100" y2="215" stroke="#2a3d5e" stroke-width="1.5"/>
  <rect x="55" y="215" width="160" height="30" rx="5" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="135" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">ArithmeticError</text>
  <line x1="135" y1="245" x2="135" y2="260" stroke="#2a3d5e" stroke-width="1"/>
  <rect x="65" y="260" width="140" height="26" rx="4" fill="#0c1628" stroke="#7777cc" stroke-width="1"/>
  <text x="135" y="277" text-anchor="middle" font-size="10" fill="#7777cc">ZeroDivisionError</text>

  <!-- LookupError group -->
  <line x1="280" y1="195" x2="280" y2="215" stroke="#2a3d5e" stroke-width="1.5"/>
  <rect x="215" y="215" width="130" height="30" rx="5" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="280" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">LookupError</text>
  <line x1="250" y1="245" x2="250" y2="260" stroke="#2a3d5e" stroke-width="1"/>
  <rect x="210" y="260" width="80" height="26" rx="4" fill="#0c1628" stroke="#7777cc" stroke-width="1"/>
  <text x="250" y="277" text-anchor="middle" font-size="10" fill="#7777cc">KeyError</text>
  <line x1="310" y1="245" x2="310" y2="260" stroke="#2a3d5e" stroke-width="1"/>
  <rect x="270" y="260" width="90" height="26" rx="4" fill="#0c1628" stroke="#7777cc" stroke-width="1"/>
  <text x="315" y="277" text-anchor="middle" font-size="10" fill="#7777cc">IndexError</text>

  <!-- ValueError, TypeError, AttributeError -->
  <line x1="420" y1="195" x2="420" y2="215" stroke="#2a3d5e" stroke-width="1.5"/>
  <rect x="375" y="215" width="130" height="30" rx="5" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">ValueError</text>

  <line x1="560" y1="195" x2="560" y2="215" stroke="#2a3d5e" stroke-width="1.5"/>
  <rect x="515" y="215" width="130" height="30" rx="5" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">TypeError</text>

  <line x1="700" y1="195" x2="700" y2="215" stroke="#2a3d5e" stroke-width="1.5"/>
  <rect x="645" y="215" width="165" height="30" rx="5" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="728" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">AttributeError / NameError</text>

  <!-- OSError group -->
  <line x1="820" y1="195" x2="820" y2="215" stroke="#2a3d5e" stroke-width="1.5"/>
  <rect x="765" y="215" width="100" height="30" rx="5" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="815" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">OSError</text>
  <line x1="815" y1="245" x2="815" y2="260" stroke="#2a3d5e" stroke-width="1"/>
  <rect x="762" y="260" width="106" height="26" rx="4" fill="#0c1628" stroke="#7777cc" stroke-width="1"/>
  <text x="815" y="277" text-anchor="middle" font-size="10" fill="#7777cc">FileNotFoundError</text>

  <!-- Bottom row: StopIteration, RuntimeError, OverflowError etc -->
  <rect x="55" y="320" width="770" height="48" rx="6" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="343" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3">그 밖의 주요 Exception 서브클래스</text>
  <text x="440" y="361" text-anchor="middle" font-size="11" fill="#888">StopIteration · RuntimeError · OverflowError · RecursionError · NotImplementedError · TimeoutError</text>

  <!-- UserWarning, Warning etc. under Exception -->
  <rect x="55" y="392" width="770" height="70" rx="6" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="415" text-anchor="middle" font-size="12" font-weight="700" fill="#ce9178">Warning 계열 (Exception → Warning)</text>
  <text x="440" y="433" text-anchor="middle" font-size="11" fill="#888">DeprecationWarning · RuntimeWarning · UserWarning · FutureWarning</text>
  <text x="440" y="452" text-anchor="middle" font-size="11" fill="#888">경고는 예외 계층에 속하지만 기본적으로 출력만 하고 실행은 계속됨</text>
</svg>
