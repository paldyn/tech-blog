<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Docker bridge 네트워크 구조</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">veth pair + docker0 브리지 + NAT(iptables) 동작 원리</text>

  <!-- Host boundary -->
  <rect x="40" y="88" width="800" height="390" rx="10" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="60" y="108" fill="#555" font-size="12">Host OS</text>

  <!-- docker0 bridge -->
  <rect x="300" y="190" width="280" height="50" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="220" text-anchor="middle" fill="#7ec8e3" font-size="15" font-weight="600">docker0  (172.17.0.1/16)</text>

  <!-- Container 1 -->
  <rect x="80" y="320" width="200" height="100" rx="8" fill="#0d1b2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="348" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">Container A</text>
  <text x="180" y="368" text-anchor="middle" fill="#e8e8e8" font-size="12">eth0: 172.17.0.2</text>
  <text x="180" y="386" text-anchor="middle" fill="#888" font-size="11">nginx:80</text>
  <text x="180" y="404" text-anchor="middle" fill="#888" font-size="11">veth0a ←→ vethXXX</text>

  <!-- Container 2 -->
  <rect x="340" y="320" width="200" height="100" rx="8" fill="#0d1b2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="348" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">Container B</text>
  <text x="440" y="368" text-anchor="middle" fill="#e8e8e8" font-size="12">eth0: 172.17.0.3</text>
  <text x="440" y="386" text-anchor="middle" fill="#888" font-size="11">app:8080</text>
  <text x="440" y="404" text-anchor="middle" fill="#888" font-size="11">veth0b ←→ vethYYY</text>

  <!-- Container 3 (different network) -->
  <rect x="600" y="320" width="200" height="100" rx="8" fill="#1a1a0d" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="700" y="348" text-anchor="middle" fill="#888" font-size="14" font-weight="600">Container C</text>
  <text x="700" y="368" text-anchor="middle" fill="#888" font-size="12">다른 네트워크</text>
  <text x="700" y="386" text-anchor="middle" fill="#888" font-size="11">A, B와 통신 불가</text>

  <!-- veth lines A -->
  <line x1="180" y1="320" x2="330" y2="240" stroke="#55c555" stroke-width="1.5"/>
  <!-- veth lines B -->
  <line x1="440" y1="320" x2="440" y2="240" stroke="#55c555" stroke-width="1.5"/>

  <!-- Internet -->
  <rect x="360" y="100" width="160" height="44" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="127" text-anchor="middle" fill="#7777cc" font-size="14" font-weight="600">인터넷 / 외부</text>

  <!-- NAT arrow -->
  <line x1="440" y1="144" x2="440" y2="190" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="440,190 434,176 446,176" fill="#7777cc"/>
  <text x="510" y="168" fill="#7777cc" font-size="12">iptables NAT</text>

  <!-- Inter-container arrow -->
  <path d="M 290 370 Q 315 355 330 370" fill="none" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="330,370 320,362 320,374" fill="#7ec8e3"/>
  <text x="305" y="350" text-anchor="middle" fill="#7ec8e3" font-size="11">컨테이너 간 직접 통신</text>

  <!-- Block arrow to C -->
  <line x1="560" y1="370" x2="598" y2="370" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="579" y="360" text-anchor="middle" fill="#e05555" font-size="11">차단</text>

  <!-- Port mapping note -->
  <rect x="60" y="448" width="760" height="30" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="468" text-anchor="middle" fill="#e8e8e8" font-size="12">외부 → 컨테이너: docker run -p 8080:80  (호스트 포트 → 컨테이너 포트, iptables DNAT)</text>
</svg>
