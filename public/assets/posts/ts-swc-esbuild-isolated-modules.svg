<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">파일별 변환의 제약</text>
  <text x="60" y="76" font-size="14" fill="#888">한 파일만 보고 변환하므로, 다른 파일의 타입 정보를 모른다</text>

  <!-- problem box -->
  <rect x="60" y="100" width="360" height="270" fill="#101418" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="134" font-size="16" font-weight="600" fill="#e05555">막히는 패턴</text>
  <text x="84" y="158" font-size="13" fill="#888">isolatedModules가 미리 경고</text>
  <rect x="84" y="176" width="312" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="100" y="202" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 타입인지 값인지 한 파일로</text>
  <text xml:space="preserve" x="100" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 판단 불가 → re-export</text>
  <text xml:space="preserve" x="100" y="246" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">export</tspan> { User } <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">"./types"</tspan>;</text>
  <text xml:space="preserve" x="100" y="278" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// const enum: 인라인 불가</text>
  <text xml:space="preserve" x="100" y="298" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const enum</tspan> Color { Red }</text>
  <text xml:space="preserve" x="100" y="330" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 네임스페이스 합성 등도 제약</text>

  <!-- fix box -->
  <rect x="460" y="100" width="360" height="270" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="134" font-size="16" font-weight="600" fill="#55c555">해법</text>
  <text x="484" y="158" font-size="13" fill="#888">의도를 명시적으로 표기</text>
  <rect x="484" y="176" width="312" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="500" y="202" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 타입은 type-only로</text>
  <text xml:space="preserve" x="500" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">export type</tspan> { User }</text>
  <text xml:space="preserve" x="500" y="242" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">"./types"</tspan>;</text>
  <text xml:space="preserve" x="500" y="274" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// const enum 대신 일반 객체</text>
  <text xml:space="preserve" x="500" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> Color = { Red: <tspan fill="#b5cea8">0</tspan> }</text>
  <text xml:space="preserve" x="500" y="314" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">as const</tspan>;</text>
  <text x="484" y="338" font-size="13" fill="#9aa4b8">tsconfig: "isolatedModules": true</text>
</svg>
