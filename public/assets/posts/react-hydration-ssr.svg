<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <defs>
    <marker id="arrW" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SSR + Hydration 흐름</text>

  <!-- 서버 단계 -->
  <rect x="60" y="68" width="220" height="82" rx="10" fill="#0d1828" stroke="#7ec8e3" stroke-width="2"/>
  <text x="170" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">1. 서버 렌더링</text>
  <text x="170" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">React 컴포넌트를</text>
  <text x="170" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정적 HTML 문자열로 변환</text>

  <line x1="280" y1="109" x2="308" y2="109" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <!-- 전송 단계 -->
  <rect x="312" y="68" width="220" height="82" rx="10" fill="#0f1c2e" stroke="#7777cc" stroke-width="2"/>
  <text x="422" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">2. HTML 전송</text>
  <text x="422" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">브라우저에 HTML 전달</text>
  <text x="422" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자는 빠르게 콘텐츠 봄</text>

  <line x1="532" y1="109" x2="560" y2="109" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <!-- 하이드레이션 단계 -->
  <rect x="564" y="68" width="256" height="82" rx="10" fill="#0d1f12" stroke="#55c555" stroke-width="2"/>
  <text x="692" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">3. Hydration</text>
  <text x="692" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">JS 로드 후 기존 DOM에</text>
  <text x="692" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이벤트 핸들러 연결</text>

  <!-- Hydration 설명 -->
  <text x="440" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">Hydration이란?</text>

  <rect x="60" y="196" width="760" height="68" rx="10" fill="#101820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">서버가 생성한 정적 HTML DOM에 React가 "물을 붓듯" 동적 기능을 불어넣는 과정</text>
  <text x="440" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">DOM을 새로 만들지 않고, 기존 HTML 구조를 그대로 사용하며 이벤트 핸들러만 연결</text>

  <!-- 코드 박스 -->
  <rect x="60" y="284" width="380" height="172" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="306"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 서버: renderToString</text>
  <text x="76" y="326"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">import</text>
  <text x="130" y="326"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> { renderToString } from</text>
  <text x="76" y="346"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  'react-dom/server'</text>
  <text x="76" y="366"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">const</text>
  <text x="118" y="366"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> html = renderToString(&lt;App /&gt;);</text>
  <text x="76" y="396"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 클라이언트: hydrateRoot</text>
  <text x="76" y="416"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">import</text>
  <text x="130" y="416"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> { hydrateRoot } from </text>
  <text x="76" y="436"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  'react-dom/client'</text>
  <text x="76" y="452"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">hydrateRoot(document.getElementById(</text>

  <!-- 오른쪽 비교 -->
  <rect x="468" y="284" width="352" height="80" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="644" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">render vs hydrateRoot</text>
  <text x="484" y="334"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">render: DOM을 새로 생성</text>
  <text x="484" y="354"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">hydrateRoot: 기존 DOM 재사용, 이벤트만 연결</text>

  <rect x="468" y="378" width="352" height="78" rx="8" fill="#101820" stroke="#55c555" stroke-width="1.5"/>
  <text x="644" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">SSR 성능 이점</text>
  <text x="484" y="426"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">FCP 빠름 (HTML 먼저 표시)</text>
  <text x="484" y="446"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TTI 이후 인터랙션 가능 (Hydration 완료 후)</text>
</svg>
