<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Mo's Algorithm - 블록 분해 기반 쿼리 정렬</text>

  <!-- Array Section -->
  <text x="60" y="90" font-size="16" font-weight="600" fill="#e8e8e8">배열 (N=8, 블록 크기 B=3)</text>

  <rect x="60" y="100" width="216" height="56" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="284" y="100" width="216" height="56" rx="6" fill="#1a3a2a" stroke="#55c555" stroke-width="1.5"/>
  <rect x="508" y="100" width="144" height="56" rx="6" fill="#2a1a3a" stroke="#7777cc" stroke-width="1.5"/>

  <text x="168" y="96" font-size="13" fill="#7ec8e3" text-anchor="middle">블록 0</text>
  <text x="392" y="96" font-size="13" fill="#55c555" text-anchor="middle">블록 1</text>
  <text x="580" y="96" font-size="13" fill="#7777cc" text-anchor="middle">블록 2</text>

  <rect x="68" y="108" width="64" height="40" rx="4" fill="#0a1a2a" stroke="#3a5a7a" stroke-width="1"/>
  <text x="100" y="124" font-size="12" fill="#888" text-anchor="middle">idx 0</text>
  <text x="100" y="142" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">A[0]</text>

  <rect x="140" y="108" width="64" height="40" rx="4" fill="#0a1a2a" stroke="#3a5a7a" stroke-width="1"/>
  <text x="172" y="124" font-size="12" fill="#888" text-anchor="middle">idx 1</text>
  <text x="172" y="142" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">A[1]</text>

  <rect x="212" y="108" width="64" height="40" rx="4" fill="#0a1a2a" stroke="#3a5a7a" stroke-width="1"/>
  <text x="244" y="124" font-size="12" fill="#888" text-anchor="middle">idx 2</text>
  <text x="244" y="142" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">A[2]</text>

  <rect x="292" y="108" width="64" height="40" rx="4" fill="#0a2a1a" stroke="#3a7a5a" stroke-width="1"/>
  <text x="324" y="124" font-size="12" fill="#888" text-anchor="middle">idx 3</text>
  <text x="324" y="142" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">A[3]</text>

  <rect x="364" y="108" width="64" height="40" rx="4" fill="#0a2a1a" stroke="#3a7a5a" stroke-width="1"/>
  <text x="396" y="124" font-size="12" fill="#888" text-anchor="middle">idx 4</text>
  <text x="396" y="142" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">A[4]</text>

  <rect x="436" y="108" width="64" height="40" rx="4" fill="#0a2a1a" stroke="#3a7a5a" stroke-width="1"/>
  <text x="468" y="124" font-size="12" fill="#888" text-anchor="middle">idx 5</text>
  <text x="468" y="142" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">A[5]</text>

  <rect x="516" y="108" width="64" height="40" rx="4" fill="#1a0a2a" stroke="#5a3a7a" stroke-width="1"/>
  <text x="548" y="124" font-size="12" fill="#888" text-anchor="middle">idx 6</text>
  <text x="548" y="142" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">A[6]</text>

  <rect x="588" y="108" width="64" height="40" rx="4" fill="#1a0a2a" stroke="#5a3a7a" stroke-width="1"/>
  <text x="620" y="124" font-size="12" fill="#888" text-anchor="middle">idx 7</text>
  <text x="620" y="142" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">A[7]</text>

  <!-- Queries Before Sort -->
  <text x="60" y="192" font-size="16" font-weight="600" fill="#e8e8e8">정렬 전 쿼리</text>

  <rect x="60" y="202" width="170" height="36" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="145" y="225" font-size="13" fill="#888" text-anchor="middle">Q0: [L=1, R=6]</text>

  <rect x="240" y="202" width="170" height="36" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="325" y="225" font-size="13" fill="#888" text-anchor="middle">Q1: [L=3, R=7]</text>

  <rect x="60" y="244" width="170" height="36" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="145" y="267" font-size="13" fill="#888" text-anchor="middle">Q2: [L=0, R=2]</text>

  <rect x="240" y="244" width="170" height="36" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="325" y="267" font-size="13" fill="#888" text-anchor="middle">Q3: [L=2, R=5]</text>

  <line x1="440" y1="245" x2="488" y2="245" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="464" y="238" font-size="12" fill="#888" text-anchor="middle">정렬</text>

  <!-- Queries After Sort -->
  <text x="500" y="192" font-size="16" font-weight="600" fill="#e8e8e8">Mo 순서 정렬 후</text>

  <rect x="500" y="202" width="320" height="36" rx="5" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="520" y="216" font-size="11" fill="#7ec8e3" font-weight="600">블록 0</text>
  <text x="520" y="232" font-size="13" fill="#e8e8e8">Q2: [L=0, R=2]</text>
  <text x="790" y="224" font-size="12" fill="#7ec8e3" text-anchor="end">L//B=0, R=2</text>

  <rect x="500" y="244" width="320" height="36" rx="5" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="520" y="258" font-size="11" fill="#7ec8e3" font-weight="600">블록 0</text>
  <text x="520" y="274" font-size="13" fill="#e8e8e8">Q0: [L=1, R=6]</text>
  <text x="790" y="266" font-size="12" fill="#7ec8e3" text-anchor="end">L//B=0, R=6</text>

  <rect x="500" y="286" width="320" height="36" rx="5" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="520" y="300" font-size="11" fill="#55c555" font-weight="600">블록 1</text>
  <text x="520" y="316" font-size="13" fill="#e8e8e8">Q3: [L=3, R=5]</text>
  <text x="790" y="308" font-size="12" fill="#55c555" text-anchor="end">L//B=1, R=5</text>

  <rect x="500" y="328" width="320" height="36" rx="5" fill="#1a0a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="520" y="342" font-size="11" fill="#7777cc" font-weight="600">블록 2</text>
  <text x="520" y="358" font-size="13" fill="#e8e8e8">Q1: [L=3, R=7]</text>
  <text x="790" y="350" font-size="12" fill="#7777cc" text-anchor="end">L//B=1, R=7</text>

  <!-- Pointer Movement -->
  <text x="60" y="320" font-size="16" font-weight="600" fill="#e8e8e8">포인터 이동 분석</text>

  <rect x="60" y="332" width="200" height="68" rx="6" fill="#1a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="352" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">L 포인터</text>
  <text x="80" y="374" font-size="13" fill="#888">같은 블록 내 이동</text>
  <text x="80" y="392" font-size="13" fill="#888">이동량: O(B) per query</text>

  <rect x="280" y="332" width="200" height="68" rx="6" fill="#1a1a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="352" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">R 포인터</text>
  <text x="300" y="374" font-size="13" fill="#888">블록 변경 시 단조 증가</text>
  <text x="300" y="392" font-size="13" fill="#888">총 이동량: O(N sqrt N)</text>

  <!-- Complexity -->
  <rect x="60" y="424" width="760" height="82" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="448" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">총 시간 복잡도</text>
  <text x="440" y="470" font-size="13" fill="#888" text-anchor="middle">L 이동: Q개 쿼리 x O(B) = O(Q sqrt N)   |   R 이동: sqrt N 블록 x O(N) = O(N sqrt N)</text>
  <text x="440" y="492" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">합계: O((N + Q) * sqrt(N))</text>
</svg>
