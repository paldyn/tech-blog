<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="ve-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ve-arg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Velero — 클러스터 리소스 + 볼륨 백업</text>

  <!-- source cluster -->
  <rect x="50" y="100" width="220" height="220" rx="10" fill="#13151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">운영 클러스터</text>
  <rect x="74" y="150" width="172" height="48" rx="6" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">K8s 리소스(YAML)</text>
  <rect x="74" y="210" width="172" height="48" rx="6" fill="#201a10" stroke="#ce9178" stroke-width="1"/>
  <text x="160" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">PV 데이터(스냅샷)</text>
  <text x="160" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">velero backup create</text>

  <!-- object storage -->
  <rect x="330" y="140" width="220" height="140" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">오브젝트 스토리지</text>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">S3 · GCS · MinIO</text>
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리전 밖 보관 권장</text>

  <!-- target cluster -->
  <rect x="610" y="100" width="220" height="220" rx="10" fill="#13151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">복구 클러스터</text>
  <rect x="634" y="150" width="172" height="48" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">리소스 재생성</text>
  <rect x="634" y="210" width="172" height="48" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">볼륨 복원</text>
  <text x="720" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">velero restore create</text>

  <line x1="270" y1="200" x2="330" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ve-arr)"/>
  <line x1="550" y1="210" x2="610" y2="210" stroke="#55c555" stroke-width="2" marker-end="url(#ve-arg)"/>

  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">매니페스트는 GitOps로, 동적 상태·볼륨은 Velero로 — 두 축이 함께 클러스터를 되살린다</text>
</svg>
