<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">curl vs wget 비교</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">두 도구의 주요 차이와 사용 시나리오</text>

  <!-- Header -->
  <rect x="60" y="94" width="760" height="38" fill="#111827" rx="6"/>
  <text x="220" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">항목</text>
  <text x="480" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">curl</text>
  <text x="730" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">wget</text>

  <!-- Rows -->
  <rect x="60" y="134" width="760" height="40" fill="#0f1117" rx="3"/>
  <text x="220" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">기본 출력</text>
  <text x="480" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">stdout (파이프 가능)</text>
  <text x="730" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">파일로 저장</text>

  <rect x="60" y="176" width="760" height="40" fill="#13151f" rx="3"/>
  <text x="220" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">재귀 다운로드</text>
  <text x="480" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">지원 안 함</text>
  <text x="730" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">-r 옵션</text>

  <rect x="60" y="218" width="760" height="40" fill="#0f1117" rx="3"/>
  <text x="220" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">HTTP 메서드</text>
  <text x="480" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">-X GET/POST/PUT/DELETE</text>
  <text x="730" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">POST만 --post-data</text>

  <rect x="60" y="260" width="760" height="40" fill="#13151f" rx="3"/>
  <text x="220" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">헤더 조작</text>
  <text x="480" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">-H "Key: Value" 다중</text>
  <text x="730" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-function-calls" font-size="13" fill="#888" text-anchor="middle">--header 단일</text>

  <rect x="60" y="302" width="760" height="40" fill="#0f1117" rx="3"/>
  <text x="220" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">이어받기</text>
  <text x="480" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">-C -</text>
  <text x="730" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">-c (--continue)</text>

  <rect x="60" y="344" width="760" height="40" fill="#13151f" rx="3"/>
  <text x="220" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">프록시</text>
  <text x="480" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">-x http://proxy:3128</text>
  <text x="730" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">-e http://proxy:3128</text>

  <rect x="60" y="386" width="760" height="40" fill="#0f1117" rx="3"/>
  <text x="220" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">주요 용도</text>
  <text x="480" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">API 호출, 디버깅, 스크립팅</text>
  <text x="730" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">파일 다운로드, 미러링</text>

  <!-- Dividers -->
  <line x1="360" y1="94" x2="360" y2="426" stroke="#222" stroke-width="1"/>
  <line x1="610" y1="94" x2="610" y2="426" stroke="#222" stroke-width="1"/>

  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">API 개발·디버깅은 curl / 파일 대량 다운로드·미러링은 wget</text>
</svg>
