<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Transactional 복제 에이전트 흐름</text>

  <!-- Publisher -->
  <rect x="60" y="72" width="180" height="80" rx="8" fill="#0a1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Publisher</text>
  <text x="150" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">Publication DB</text>
  <text x="150" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">트랜잭션 로그 생성</text>

  <!-- Log Reader Agent -->
  <rect x="280" y="84" width="160" height="56" rx="6" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="360" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Log Reader Agent</text>
  <text x="360" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">로그에서 변경 추출</text>

  <line x1="240" y1="112" x2="280" y2="112" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="112" x2="480" y2="112" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Distribution DB -->
  <rect x="480" y="72" width="180" height="80" rx="8" fill="#101030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Distributor</text>
  <text x="570" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">Distribution DB</text>
  <text x="570" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">변경 큐 보관</text>

  <!-- Distribution Agent -->
  <rect x="680" y="84" width="160" height="56" rx="6" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="760" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Distribution Agent</text>
  <text x="760" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Subscriber에 적용</text>

  <line x1="660" y1="112" x2="680" y2="112" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Subscriber 1 -->
  <rect x="640" y="188" width="200" height="64" rx="8" fill="#101010" stroke="#888" stroke-width="1.5"/>
  <text x="740" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Subscriber 1</text>
  <text x="740" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">보고서 DB (SQL Server)</text>
  <text x="740" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">읽기 전용 워크로드 분산</text>

  <!-- Subscriber 2 -->
  <rect x="400" y="188" width="200" height="64" rx="8" fill="#101010" stroke="#888" stroke-width="1.5"/>
  <text x="500" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Subscriber 2</text>
  <text x="500" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Azure SQL / Oracle</text>
  <text x="500" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이기종 타겟 가능</text>

  <line x1="760" y1="140" x2="760" y2="188" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="760" y1="152" x2="500" y2="188" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Code -->
  <rect x="60" y="280" width="760" height="96" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 복제 지연 모니터링 (Distributor에서 실행)</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">SELECT agent_name, comments, timestamp</text>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">FROM distribution.dbo.MSreplication_monitordata</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">WHERE publisher_db = 'AdventureWorks'</text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">ORDER BY timestamp DESC; -- 지연 시간 확인</text>

  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Log Reader Agent 지연 + Distribution Agent 지연 = 전체 복제 지연</text>
</svg>
