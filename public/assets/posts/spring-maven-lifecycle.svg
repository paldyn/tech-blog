<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Maven 기본 라이프사이클 (default)</text>

  <!-- Phase boxes — left column -->
  <!-- validate -->
  <rect x="60" y="70" width="180" height="44" fill="#0e1420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="87" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">1. validate</text>
  <text x="150" y="105" font-size="11" fill="#888" text-anchor="middle">프로젝트 구조 검증</text>

  <!-- compile -->
  <rect x="60" y="132" width="180" height="44" fill="#0e1420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="149" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">2. compile</text>
  <text x="150" y="167" font-size="11" fill="#888" text-anchor="middle">소스 코드 컴파일</text>

  <!-- test -->
  <rect x="60" y="194" width="180" height="44" fill="#0e1420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="211" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">3. test</text>
  <text x="150" y="229" font-size="11" fill="#888" text-anchor="middle">단위 테스트 실행</text>

  <!-- package -->
  <rect x="60" y="256" width="180" height="44" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="273" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">4. package</text>
  <text x="150" y="291" font-size="11" fill="#888" text-anchor="middle">JAR/WAR 패키징</text>

  <!-- verify -->
  <rect x="60" y="318" width="180" height="44" fill="#0e1420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="335" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">5. verify</text>
  <text x="150" y="353" font-size="11" fill="#888" text-anchor="middle">통합 테스트 검증</text>

  <!-- install -->
  <rect x="60" y="380" width="180" height="44" fill="#0e1420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="397" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">6. install</text>
  <text x="150" y="415" font-size="11" fill="#888" text-anchor="middle">로컬 저장소 설치</text>

  <!-- Arrows between phases -->
  <line x1="150" y1="114" x2="150" y2="132" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="150" y1="176" x2="150" y2="194" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="150" y1="238" x2="150" y2="256" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="150" y1="300" x2="150" y2="318" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="150" y1="362" x2="150" y2="380" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Command examples right side -->
  <rect x="280" y="70" width="540" height="358" fill="#070b14" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="296" y="94" font-size="14" font-weight="600" fill="#888">명령어와 실행 단계</text>

  <text x="296" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># validate까지만 실행</text>
  <text x="296" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ mvn validate</text>

  <text x="296" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># compile까지 실행 (validate→compile)</text>
  <text x="296" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ mvn compile</text>

  <text x="296" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 테스트 건너뛰고 패키징</text>
  <text x="296" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ mvn package -DskipTests</text>

  <text x="296" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 로컬 저장소에 설치 (멀티모듈 공유)</text>
  <text x="296" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ mvn install</text>

  <text x="296" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 이전 빌드 산출물 삭제 + 패키징</text>
  <text x="296" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ mvn clean package</text>

  <text x="296" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># Spring Boot 앱 실행</text>
  <text x="296" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ mvn spring-boot:run</text>

  <text x="296" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">// 단계는 순서대로 누적 실행됨</text>
  <text x="296" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">// package → verify→compile→test→package</text>

  <!-- Footer -->
  <text x="440" y="468" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #6 · Chapter 2</text>
</svg>
