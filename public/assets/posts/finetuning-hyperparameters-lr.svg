<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Learning Rate Schedule: 파인튜닝의 핵심</text>
  <text x="440" y="70" font-size="15" fill="#888" text-anchor="middle">Warmup → Decay 전략이 안정적인 수렴을 결정한다</text>

  <!-- Chart area background -->
  <rect x="60" y="88" width="560" height="300" fill="#0d1117" rx="10" stroke="#1e2433" stroke-width="1.2"/>

  <!-- Grid lines (horizontal) -->
  <line x1="100" y1="108" x2="600" y2="108" stroke="#1e2433" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="100" y1="158" x2="600" y2="158" stroke="#1e2433" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="100" y1="208" x2="600" y2="208" stroke="#1e2433" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="100" y1="258" x2="600" y2="258" stroke="#1e2433" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="100" y1="308" x2="600" y2="308" stroke="#1e2433" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="100" y1="358" x2="600" y2="358" stroke="#1e2433" stroke-width="0.8" stroke-dasharray="4,4"/>

  <!-- Axes -->
  <line x1="100" y1="98" x2="100" y2="368" stroke="#444" stroke-width="1.5"/>
  <line x1="100" y1="368" x2="600" y2="368" stroke="#444" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="68" y="240" font-size="12" fill="#888" text-anchor="middle" transform="rotate(-90 68 240)">Learning Rate</text>
  <!-- X-axis label -->
  <text x="350" y="398" font-size="12" fill="#888" text-anchor="middle">훈련 스텝 (Training Steps)</text>

  <!-- Y-axis ticks -->
  <text x="94" y="112" font-size="10" fill="#555" text-anchor="end">높음</text>
  <text x="94" y="212" font-size="10" fill="#555" text-anchor="end">중간</text>
  <text x="94" y="362" font-size="10" fill="#555" text-anchor="end">0</text>

  <!-- Warmup region shading -->
  <rect x="100" y="98" width="100" height="270" fill="#7ec8e3" fill-opacity="0.06"/>
  <line x1="200" y1="98" x2="200" y2="368" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="150" y="115" font-size="11" fill="#7ec8e3" text-anchor="middle">Warmup</text>
  <text x="150" y="128" font-size="10" fill="#7ec8e3" text-anchor="middle">3~10% steps</text>

  <!-- ── Curve 1: Linear Warmup + Linear Decay (green) ── -->
  <!-- warmup: (100,368) → (200,118) -->
  <!-- decay: (200,118) → (600,368) -->
  <polyline points="100,368 200,118 600,368"
    fill="none" stroke="#55c555" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="200" cy="118" r="5" fill="#55c555"/>

  <!-- ── Curve 2: Cosine Decay (blue) ── -->
  <!-- Approximated with a cubic bezier: warmup (100,368)→(200,118), then cosine to (600,348) -->
  <path d="M 100,368 L 200,118 C 340,118 420,240 600,348"
    fill="none" stroke="#7ec8e3" stroke-width="2.5" stroke-dasharray="8,3"/>
  <circle cx="200" cy="118" r="5" fill="#7ec8e3"/>

  <!-- ── Curve 3: Constant LR (purple) ── -->
  <polyline points="100,368 200,178 600,178"
    fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,4"/>
  <circle cx="200" cy="178" r="5" fill="#7777cc"/>

  <!-- Warning: LR too high (발산) -->
  <line x1="100" y1="98" x2="280" y2="108" stroke="#e05555" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="290" y="104" font-size="11" fill="#e05555">← LR 너무 큼: 발산 위험</text>

  <!-- Warning: LR too low (수렴 느림) -->
  <line x1="200" y1="340" x2="500" y2="338" stroke="#e05555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="390" y="332" font-size="11" fill="#e05555">LR 너무 작음: 수렴 느림 →</text>

  <!-- X-axis markers -->
  <text x="100" y="382" font-size="10" fill="#555" text-anchor="middle">0</text>
  <text x="200" y="382" font-size="10" fill="#7ec8e3" text-anchor="middle">warmup end</text>
  <text x="600" y="382" font-size="10" fill="#555" text-anchor="middle">max steps</text>

  <!-- Legend -->
  <rect x="638" y="88" width="210" height="300" fill="#111520" rx="10" stroke="#1e2433" stroke-width="1.2"/>
  <text x="743" y="114" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">스케줄 종류</text>

  <!-- Legend item 1 -->
  <line x1="658" y1="142" x2="698" y2="142" stroke="#55c555" stroke-width="2.5"/>
  <circle cx="678" cy="142" r="4" fill="#55c555"/>
  <text x="708" y="146" font-size="12" fill="#e8e8e8">Linear Warmup</text>
  <text x="708" y="160" font-size="11" fill="#888">+ Linear Decay</text>
  <text x="708" y="175" font-size="10" fill="#55c555">안정적, 권장</text>

  <!-- Legend item 2 -->
  <line x1="658" y1="205" x2="698" y2="205" stroke="#7ec8e3" stroke-width="2.5" stroke-dasharray="7,3"/>
  <circle cx="678" cy="205" r="4" fill="#7ec8e3"/>
  <text x="708" y="209" font-size="12" fill="#e8e8e8">Cosine Decay</text>
  <text x="708" y="224" font-size="11" fill="#888">부드러운 감소</text>
  <text x="708" y="239" font-size="10" fill="#7ec8e3">최고 성능 경향</text>

  <!-- Legend item 3 -->
  <line x1="658" y1="268" x2="698" y2="268" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,4"/>
  <circle cx="678" cy="268" r="4" fill="#7777cc"/>
  <text x="708" y="272" font-size="12" fill="#e8e8e8">Constant</text>
  <text x="708" y="287" font-size="11" fill="#888">고정 학습률</text>
  <text x="708" y="302" font-size="10" fill="#888">단순하지만 비효율</text>

  <line x1="648" y1="325" x2="838" y2="325" stroke="#1e2433" stroke-width="1"/>
  <text x="743" y="346" font-size="11" fill="#888" text-anchor="middle">권장 LR 범위</text>
  <text x="743" y="364" font-size="12" fill="#7ec8e3" text-anchor="middle">1e-5 ~ 3e-4</text>
  <text x="743" y="378" font-size="11" fill="#555" text-anchor="middle">(사전학습보다 낮게)</text>
</svg>
