<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">커스텀 예외 클래스 설계 패턴</text>

  <!-- Left: Simple custom exception code -->
  <rect x="55" y="65" width="380" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="75" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8"># 기본 패턴: 계층 설계</text>
  <text x="75" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">class</text><text x="119" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> AppError(</text><text x="222" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">Exception</text><text x="293" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">):</text>
  <text x="75" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">    """앱 전역 기본 예외"""</text>
  <text x="75" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">    pass</text>
  <text x="75" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">class</text><text x="119" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ValidationError(AppError):</text>
  <text x="75" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">    """입력 검증 실패"""</text>
  <text x="75" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">class</text><text x="119" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> DatabaseError(AppError):</text>
  <text x="75" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">    """DB 관련 오류"""</text>
  <text x="75" y="255" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">    pass</text>

  <!-- Right: Rich custom exception code -->
  <rect x="455" y="65" width="370" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="475" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8"># 풍부한 컨텍스트 포함</text>
  <text x="475" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">class</text><text x="519" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ValidationError(AppError):</text>
  <text x="475" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">    def</text><text x="509" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> __init__(</text><text x="580" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">self</text><text x="610" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, field, msg):</text>
  <text x="475" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">        super</text><text x="527" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">().</text><text x="549" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">__init__(msg)</text>
  <text x="475" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">        self</text><text x="517" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">.field = field</text>
  <text x="475" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">        self</text><text x="517" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">.msg = msg</text>
  <text x="475" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">    def</text><text x="509" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> __str__(</text><text x="580" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">self</text><text x="610" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">):</text>
  <text x="475" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">        return</text><text x="539" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> f"[{self.field}] {self.msg}"</text>
  <text x="475" y="255" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">    # ...</text>

  <!-- Design principles -->
  <rect x="55" y="285" width="770" height="110" rx="8" fill="#0c1628" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">커스텀 예외 설계 원칙</text>
  <text x="75" y="330" font-size="12" fill="#e8e8e8">① Exception을 직접 상속받는 앱 루트 예외 하나를 만든다 — 전체 앱 예외를 한 번에 catch 가능</text>
  <text x="75" y="350" font-size="12" fill="#e8e8e8">② 서브클래스로 세분화 — ValidationError, DatabaseError 등 카테고리별 분류</text>
  <text x="75" y="370" font-size="12" fill="#e8e8e8">③ 컨텍스트 필드 추가 — field, code, detail 같은 속성으로 오류 정보 풍부하게</text>
  <text x="75" y="390" font-size="12" fill="#888">④ __str__ 오버라이드 — 로그·출력에 유용한 형식으로 메시지 커스터마이징</text>
</svg>
