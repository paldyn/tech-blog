<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">딕셔너리 기초 — 키-값 매핑</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">생성 · 접근 · 메서드 · 순회</text>

  <!-- hash table visual -->
  <rect x="60" y="96" width="760" height="76" rx="8" fill="#111520" stroke="#1e2433"/>
  <text x="144" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">hash("name")</text>
  <rect x="82" y="126" width="124" height="32" rx="4" fill="#070b14" stroke="#7ec8e3"/>
  <text x="144" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">"name" → "Alice"</text>

  <rect x="226" y="126" width="124" height="32" rx="4" fill="#070b14" stroke="#7ec8e3"/>
  <text x="288" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">"age" → 30</text>

  <rect x="370" y="126" width="160" height="32" rx="4" fill="#070b14" stroke="#7ec8e3"/>
  <text x="450" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">"city" → "Seoul"</text>

  <rect x="550" y="126" width="124" height="32" rx="4" fill="#111520" stroke="#1e2433" stroke-dasharray="4,2"/>
  <text x="612" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#444" text-anchor="middle">빈 버킷</text>

  <rect x="694" y="126" width="124" height="32" rx="4" fill="#111520" stroke="#1e2433" stroke-dasharray="4,2"/>
  <text x="756" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#444" text-anchor="middle">빈 버킷</text>

  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">해시 테이블 구조 — O(1) 평균 접근</text>

  <!-- Code left -->
  <rect x="60" y="204" width="380" height="270" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 생성</tspan></text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d = {</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"age"</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#e8e8e8">}</tspan></text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d2 = </tspan><tspan fill="#7ec8e3">dict</tspan><tspan fill="#e8e8e8">(name=</tspan><tspan fill="#ce9178">"Bob"</tspan><tspan fill="#e8e8e8">, age=</tspan><tspan fill="#b5cea8">25</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">empty = {}</tspan></text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 접근</tspan></text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d[</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#e8e8e8">]        </tspan><tspan fill="#6a8aa0"># "Alice"</tspan></text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d[</tspan><tspan fill="#ce9178">"x"</tspan><tspan fill="#e8e8e8">]           </tspan><tspan fill="#e05555"># KeyError!</tspan></text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d.</tspan><tspan fill="#7ec8e3">get</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"x"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">)     </tspan><tspan fill="#6a8aa0"># 0 (기본값)</tspan></text>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 수정·추가·삭제</tspan></text>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d[</tspan><tspan fill="#ce9178">"age"</tspan><tspan fill="#e8e8e8">] = </tspan><tspan fill="#b5cea8">31</tspan></text>
  <text x="76" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d[</tspan><tspan fill="#ce9178">"city"</tspan><tspan fill="#e8e8e8">] = </tspan><tspan fill="#ce9178">"Seoul"</tspan></text>
  <text x="76" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">del</tspan><tspan fill="#e8e8e8"> d[</tspan><tspan fill="#ce9178">"age"</tspan><tspan fill="#e8e8e8">]</tspan></text>
  <text x="76" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d.</tspan><tspan fill="#7ec8e3">pop</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"city"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <!-- Code right -->
  <rect x="460" y="204" width="360" height="270" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 순회</tspan></text>
  <text x="476" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> k </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> d:         </tspan><tspan fill="#6a8aa0"># 키</tspan></text>
  <text x="476" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> v </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> d.values():  </tspan><tspan fill="#6a8aa0"># 값</tspan></text>
  <text x="476" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> k, v </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> d.items():  </tspan><tspan fill="#6a8aa0"># 쌍</tspan></text>
  <text x="476" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 병합 (Python 3.9+)</tspan></text>
  <text x="476" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a = {</tspan><tspan fill="#ce9178">"x"</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">}</tspan></text>
  <text x="476" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">b = {</tspan><tspan fill="#ce9178">"y"</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">}</tspan></text>
  <text x="476" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">c = a | b    </tspan><tspan fill="#6a8aa0"># 새 dict</tspan></text>
  <text x="476" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">a |= b       </tspan><tspan fill="#6a8aa0"># in-place</tspan></text>
  <text x="476" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># setdefault</tspan></text>
  <text x="476" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d.</tspan><tspan fill="#7ec8e3">setdefault</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"k"</tspan><tspan fill="#e8e8e8">, [])</tspan></text>
  <text x="476" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 키 없으면 [] 삽입 후 반환</tspan></text>
  <text x="476" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ce9178">"name"</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> d   </tspan><tspan fill="#6a8aa0"># True (키 검사)</tspan></text>
</svg>
