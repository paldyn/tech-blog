<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DuckDB — 임베디드 OLAP 엔진</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">프로세스 내 실행 · 의존성 없음 · 단일 파일 DB</text>

  <!-- Application Process Box -->
  <rect x="40" y="82" width="800" height="320" rx="10" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">애플리케이션 프로세스 (Python / R / Node.js / Java / CLI)</text>

  <!-- DuckDB embedded -->
  <rect x="80" y="114" width="720" height="270" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">DuckDB 엔진 (in-process)</text>

  <!-- Internal components -->
  <rect x="112" y="148" width="180" height="60" rx="6" fill="#111"/>
  <text x="202" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">SQL 파서</text>
  <text x="202" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PostgreSQL 문법 호환</text>
  <text x="202" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">윈도우·CTE 완전 지원</text>

  <rect x="320" y="148" width="180" height="60" rx="6" fill="#111"/>
  <text x="410" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">쿼리 최적화기</text>
  <text x="410" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CBO · Join Reordering</text>
  <text x="410" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Predicate Pushdown</text>

  <rect x="528" y="148" width="252" height="60" rx="6" fill="#111"/>
  <text x="654" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">벡터화 실행 엔진</text>
  <text x="654" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컬럼형 벡터 단위 처리 (2048행)</text>
  <text x="654" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">멀티스레드 병렬 실행</text>

  <!-- Storage layer -->
  <rect x="112" y="228" width="656" height="60" rx="6" fill="#0e1a0e" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">데이터 소스 (동일 프로세스 내 직접 읽기)</text>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.duckdb 파일 · Parquet · CSV · JSON · Arrow · pandas DataFrame · S3 · httpfs</text>

  <!-- Performance note -->
  <rect x="112" y="306" width="656" height="58" rx="6" fill="#111"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">제로-카피 통합</text>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">pandas/Arrow 데이터를 복사 없이 직접 쿼리 — IPC 오버헤드 없음</text>
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Parquet 파티션 스캔, httpfs로 S3 원격 쿼리 지원</text>

  <!-- Comparison with SQLite -->
  <rect x="40" y="422" width="380" height="58" rx="8" fill="#111"/>
  <text x="230" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SQLite vs DuckDB</text>
  <text x="230" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQLite: 행 지향 OLTP · DuckDB: 열 지향 OLAP</text>
  <text x="230" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">같은 임베디드 모델, 목적이 반대</text>

  <rect x="460" y="422" width="380" height="58" rx="8" fill="#111"/>
  <text x="650" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">주요 사용 사례</text>
  <text x="650" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 파이프라인 · 노트북 분석</text>
  <text x="650" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">BI 백엔드 · ETL 로컬 테스트</text>
</svg>
