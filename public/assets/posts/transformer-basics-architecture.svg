<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Transformer 전체 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Attention Is All You Need (Vaswani et al., 2017)</text>

  <!-- ENCODER stack (left) -->
  <rect x="60" y="88" width="340" height="36" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">ENCODER  (×N layers)</text>

  <!-- Encoder components, bottom to top -->
  <!-- Input Embedding -->
  <rect x="80" y="430" width="300" height="40" rx="6" fill="#0d1117" stroke="#888" stroke-width="1.5"/>
  <text x="230" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">입력 임베딩 + 위치 인코딩</text>

  <!-- MHA -->
  <rect x="80" y="370" width="300" height="40" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="230" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Multi-Head Self-Attention</text>

  <!-- Add &amp; Norm 1 -->
  <rect x="80" y="320" width="300" height="32" rx="4" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="230" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Add &amp; Norm</text>

  <!-- FFN -->
  <rect x="80" y="264" width="300" height="40" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="230" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Feed-Forward Network</text>

  <!-- Add &amp; Norm 2 -->
  <rect x="80" y="218" width="300" height="32" rx="4" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="230" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Add &amp; Norm</text>

  <!-- Encoder output label -->
  <text x="230" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">↑ 인코더 출력 (K, V로 전달)</text>
  <!-- Vertical arrows in encoder -->
  <line x1="230" y1="470" x2="230" y2="412" stroke="#888" stroke-width="1.5"/>
  <polygon points="224,412 230,400 236,412" fill="#888"/>
  <line x1="230" y1="370" x2="230" y2="354" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="224,354 230,342 236,354" fill="#7777cc"/>
  <line x1="230" y1="320" x2="230" y2="306" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="224,306 230,294 236,306" fill="#7777cc"/>
  <line x1="230" y1="264" x2="230" y2="252" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="224,252 230,240 236,252" fill="#7777cc"/>

  <!-- DECODER stack (right) -->
  <rect x="480" y="88" width="340" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">DECODER  (×N layers)</text>

  <!-- Decoder components -->
  <rect x="500" y="430" width="300" height="40" rx="6" fill="#0d1117" stroke="#888" stroke-width="1.5"/>
  <text x="650" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">출력 임베딩 + 위치 인코딩</text>

  <rect x="500" y="374" width="300" height="40" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="650" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Masked Multi-Head Self-Attention</text>
  <text x="650" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(미래 마스킹)</text>

  <rect x="500" y="330" width="300" height="28" rx="4" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Add &amp; Norm</text>

  <rect x="500" y="284" width="300" height="32" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="650" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Cross-Attention (Q←Dec, K/V←Enc)</text>

  <rect x="500" y="244" width="300" height="28" rx="4" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Add &amp; Norm</text>

  <rect x="500" y="200" width="300" height="32" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Feed-Forward Network</text>

  <!-- Decoder vertical arrows -->
  <line x1="650" y1="470" x2="650" y2="416" stroke="#888" stroke-width="1.5"/>
  <polygon points="644,416 650,404 656,416" fill="#888"/>
  <line x1="650" y1="374" x2="650" y2="360" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="644,360 650,348 656,360" fill="#7777cc"/>
  <line x1="650" y1="330" x2="650" y2="318" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="644,318 650,306 656,318" fill="#7777cc"/>
  <line x1="650" y1="284" x2="650" y2="274" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="644,274 650,262 656,274" fill="#7777cc"/>
  <line x1="650" y1="244" x2="650" y2="234" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="644,234 650,222 656,234" fill="#7777cc"/>

  <!-- Cross-attention arrow from encoder to decoder -->
  <line x1="380" y1="218" x2="498" y2="300" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="494,294 502,308 508,296" fill="#7777cc"/>
  <text x="420" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">K, V</text>

  <!-- Output label -->
  <rect x="550" y="148" width="200" height="40" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Linear + Softmax → 단어</text>
  <line x1="650" y1="200" x2="650" y2="190" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="644,190 650,178 656,190" fill="#7777cc"/>
</svg>
