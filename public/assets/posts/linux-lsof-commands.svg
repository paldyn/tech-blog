<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">lsof 실전 명령어 모음</text>

  <!-- Block 1 -->
  <rect x="60" y="64" width="370" height="185" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 포트/소켓 관련</text>
  <text x="76" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lsof</text>
  <text x="116" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -i :8080</text>
  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lsof</text>
  <text x="116" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -i tcp:443</text>
  <text x="76" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lsof</text>
  <text x="116" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -i -P -n</text>
  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># LISTEN 상태만 필터</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lsof</text>
  <text x="116" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -i -s TCP:LISTEN</text>
  <text x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 모든 네트워크 연결</text>
  <text x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lsof</text>
  <text x="116" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -i 4 -i 6</text>

  <!-- Block 2 -->
  <rect x="450" y="64" width="370" height="185" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="466" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 프로세스/파일 기반</text>
  <text x="466" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lsof</text>
  <text x="506" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -p 1234</text>
  <text x="466" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lsof</text>
  <text x="506" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -u alice</text>
  <text x="466" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lsof</text>
  <text x="506" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> /var/log/app.log</text>
  <text x="466" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 삭제된 파일 (공간 점유)</text>
  <text x="466" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lsof</text>
  <text x="506" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> | grep deleted</text>
  <text x="466" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 열린 FD 수 확인</text>
  <text x="466" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">lsof</text>
  <text x="506" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -p 1234 | wc -l</text>

  <!-- Block 3 - output example -->
  <rect x="60" y="265" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># lsof -i :3306 출력 예시</text>
  <text x="76" y="307" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">COMMAND  PID  USER  FD   TYPE DEVICE SIZE/OFF NODE NAME</text>
  <text x="76" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">mysqld  1234  mysql  17u  IPv6  54321  0t0  TCP *:mysql (LISTEN)</text>
  <text x="76" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">mysqld  1234  mysql  22u  IPv6  54322  0t0  TCP host:3306-&gt;cli:52100 (ESTABLISHED)</text>
  <text x="76" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">#  FD 17u = 파일디스크립터 17, u=읽쓰기 (r=읽기, w=쓰기)</text>

  <!-- tips -->
  <text x="60" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">팁:</text>
  <text x="90" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">-P</text>
  <text x="110" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">포트 번호 그대로 표시 (서비스명 변환 안 함) |</text>
  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">-n</text>
  <text x="460" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">IP를 hostname으로 변환 안 함 (빠름)</text>

  <text x="60" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">시스템 최대 FD:</text>
  <text x="195" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">cat /proc/sys/fs/file-max</text>
  <text x="420" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888"> | 프로세스 한도:</text>
  <text x="548" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">ulimit -n</text>

  <text x="60" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">권한:</text>
  <text x="100" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">다른 사용자 프로세스의 FD를 보려면 sudo 필요</text>
</svg>
