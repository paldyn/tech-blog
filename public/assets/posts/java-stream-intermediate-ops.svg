<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Stream 중간 연산 — 분류와 특성</text>

  <!-- Stateless ops -->
  <rect x="60" y="66" width="750" height="186" fill="#0f2010" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="435" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Stateless 중간 연산 — 이전 원소 불필요, 원소별 독립 처리</text>

  <!-- filter -->
  <rect x="80" y="100" width="200" height="60" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="122" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">filter(pred)</text>
  <text x="180" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">조건 참인 원소만 통과</text>
  <text x="180" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Predicate&lt;T&gt;</text>

  <!-- map -->
  <rect x="300" y="100" width="200" height="60" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="400" y="122" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">map(fn)</text>
  <text x="400" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원소 T → 원소 R 변환</text>
  <text x="400" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Function&lt;T, R&gt;</text>

  <!-- flatMap -->
  <rect x="520" y="100" width="200" height="60" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="122" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">flatMap(fn)</text>
  <text x="620" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">T → Stream&lt;R&gt; 후 평탄화</text>
  <text x="620" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Function&lt;T, Stream&lt;R&gt;&gt;</text>

  <!-- peek -->
  <rect x="80" y="178" width="160" height="60" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">peek(consumer)</text>
  <text x="160" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">사이드이펙트 (디버깅용)</text>
  <text x="160" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Consumer&lt;T&gt;</text>

  <!-- mapToInt etc -->
  <rect x="260" y="178" width="240" height="60" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="380" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">mapToInt / mapToLong</text>
  <text x="380" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">기본 타입 스트림으로 변환</text>
  <text x="380" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">박싱 비용 제거</text>

  <!-- mapMulti -->
  <rect x="520" y="178" width="200" height="60" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="620" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">mapMulti()</text>
  <text x="620" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">flatMap 대안 (Java 16)</text>
  <text x="620" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Consumer 기반 push</text>

  <!-- Stateful ops -->
  <rect x="60" y="276" width="750" height="160" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="435" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">Stateful 중간 연산 — 전체/부분 원소 버퍼링 필요</text>

  <!-- sorted -->
  <rect x="80" y="310" width="160" height="60" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="332" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">sorted()</text>
  <text x="160" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체 버퍼링 후 정렬</text>
  <text x="160" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">O(n log n)</text>

  <!-- distinct -->
  <rect x="260" y="310" width="160" height="60" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="340" y="332" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">distinct()</text>
  <text x="340" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HashSet 유지하며 중복 제거</text>
  <text x="340" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">equals/hashCode 의존</text>

  <!-- limit / skip -->
  <rect x="440" y="310" width="160" height="60" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="520" y="332" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">limit / skip</text>
  <text x="520" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">앞 n개 / 건너뛰기</text>
  <text x="520" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">단락 평가 가능</text>

  <!-- takeWhile / dropWhile -->
  <rect x="620" y="310" width="180" height="60" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="710" y="332" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">takeWhile / dropWhile</text>
  <text x="710" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">조건 기반 앞/뒤 자르기</text>
  <text x="710" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Java 9+</text>

  <!-- Bottom note -->
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">병렬 스트림에서 Stateful 연산은 스레드 간 동기화 비용 발생 → 성능 저하 요인</text>
  <text x="440" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">중간 연산 반환 타입은 Stream&lt;T&gt; — 메서드 체이닝으로 파이프라인 구성</text>
</svg>
