<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ib1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ib2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">자바와 Kotlin — 양방향으로 서로를 호출한다</text>

  <rect x="80" y="120" width="250" height="100" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="205" y="160" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Java 클래스</text>
  <text x="205" y="186" font-size="12" fill="#888" text-anchor="middle">.class 바이트코드</text>

  <rect x="550" y="120" width="250" height="100" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="160" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Kotlin 클래스</text>
  <text x="675" y="186" font-size="12" fill="#888" text-anchor="middle">.class 바이트코드</text>

  <line x1="332" y1="152" x2="548" y2="152" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#ib1)"/>
  <text x="440" y="140" font-size="12" fill="#7ec8e3" text-anchor="middle">Kotlin에서 자바 호출</text>
  <line x1="548" y1="190" x2="332" y2="190" stroke="#55c555" stroke-width="2.5" marker-end="url(#ib2)"/>
  <text x="440" y="210" font-size="12" fill="#55c555" text-anchor="middle">자바에서 Kotlin 호출</text>

  <text x="440" y="266" font-size="13" fill="#888" text-anchor="middle">컴파일 결과가 같은 바이트코드라, 한쪽 클래스는 다른 쪽에게 그저 또 하나의 클래스다</text>
</svg>
