<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">바인딩 방향 스크립트 제어</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">조회 모드 vs 편집 모드 전환 패턴</text>

  <rect x="60" y="90" width="760" height="240" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 조회 모드: 모든 입력 컴포넌트를 읽기 전용으로</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="142" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> fn_setViewMode() {</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.edtName.set_displayonly(</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.edtAmt.set_displayonly(</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.cboStatus.set_enable(</tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.btnSave.set_visible(</tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 편집 모드: 입력 활성화</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="142" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> fn_setEditMode() {</text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.edtName.set_displayonly(</tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.cboStatus.set_enable(</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#e8e8e8">.btnSave.set_visible(</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#e8e8e8">);</tspan></text>
</svg>
