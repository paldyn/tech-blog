<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    일반 이미지 vs Distroless 이미지
  </text>

  <!-- Traditional column header -->
  <rect x="60" y="70" width="340" height="40" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">일반 이미지 (ubuntu:22.04 기반)</text>

  <!-- Distroless column header -->
  <rect x="480" y="70" width="340" height="40" rx="8" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="650" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Distroless 이미지</text>

  <!-- Traditional layers -->
  <rect x="80" y="130" width="300" height="48" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">OS 기반 레이어</text>
  <text x="230" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">bash, sh, coreutils, apt, …</text>

  <rect x="80" y="192" width="300" height="48" rx="6" fill="#2a2a1a" stroke="#e8a020" stroke-width="1"/>
  <text x="230" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">패키지 관리자 레이어</text>
  <text x="230" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">apt-get, dpkg, snap, …</text>

  <rect x="80" y="254" width="300" height="48" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="230" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">런타임 레이어</text>
  <text x="230" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JRE, Node.js, Python, …</text>

  <rect x="80" y="316" width="300" height="48" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="230" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">앱 레이어</text>
  <text x="230" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">app.jar / server.js / main.py</text>

  <!-- Size label traditional -->
  <rect x="80" y="380" width="300" height="36" rx="6" fill="#3a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">총 크기: ~500MB ~ 1GB+</text>

  <!-- Distroless layers -->
  <rect x="500" y="130" width="300" height="48" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">최소 OS 레이어</text>
  <text x="650" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">glibc / CA 인증서 / 시간대 정보만</text>

  <rect x="500" y="192" width="300" height="48" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">런타임 레이어</text>
  <text x="650" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JRE, Node.js, Python (최소 구성)</text>

  <rect x="500" y="254" width="300" height="48" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">앱 레이어</text>
  <text x="650" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">app.jar / server.js / main.py</text>

  <!-- Empty space where packages would be (crossed out) -->
  <rect x="500" y="316" width="300" height="48" rx="6" fill="#111" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="650" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#444" text-anchor="middle">셸 / 패키지 관리자 없음</text>

  <!-- Size label distroless -->
  <rect x="500" y="380" width="300" height="36" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">총 크기: ~20MB ~ 100MB</text>

  <!-- Benefits -->
  <rect x="80" y="432" width="300" height="64" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗ 공격 표면 넓음</text>
  <text x="100" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗ CVE 취약점 많음</text>
  <text x="100" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗ 이미지 크고 느린 pull</text>

  <rect x="500" y="432" width="300" height="64" rx="6" fill="#0a0a0a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="520" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 공격 표면 최소화</text>
  <text x="520" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ CVE 대폭 감소</text>
  <text x="520" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 빠른 pull / 배포</text>
</svg>
