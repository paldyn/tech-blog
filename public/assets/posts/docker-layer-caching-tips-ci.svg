<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    CI 환경별 레이어 캐시 전략
  </text>

  <!-- GitHub Actions -->
  <rect x="60" y="64" width="360" height="130" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">GitHub Actions (type=gha)</text>
  <rect x="80" y="96" width="320" height="88" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#7ec8e3" font-weight="600">uses:</tspan><tspan fill="#ffffff"> docker/build-push-action@v6</tspan>
  </text>
  <text x="96" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#7ec8e3" font-weight="600">with:</tspan>
  </text>
  <text x="96" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">  cache-from: type=gha</tspan>
  </text>
  <text x="96" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">  cache-to: type=gha,mode=max</tspan>
  </text>

  <!-- Registry cache -->
  <rect x="460" y="64" width="360" height="130" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">레지스트리 캐시 (type=registry)</text>
  <rect x="480" y="96" width="320" height="88" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">docker buildx build \</tspan>
  </text>
  <text x="496" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">  --cache-from \</tspan>
  </text>
  <text x="496" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">    type=registry,ref=myapp:cache \</tspan>
  </text>
  <text x="496" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">  --cache-to type=registry,ref=myapp:cache</tspan>
  </text>

  <!-- Local cache -->
  <rect x="60" y="214" width="360" height="130" rx="8" fill="#1a1a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a020">로컬 디렉터리 캐시 (type=local)</text>
  <rect x="80" y="246" width="320" height="88" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">docker buildx build \</tspan>
  </text>
  <text x="96" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">  --cache-from type=local,src=/tmp/cache \</tspan>
  </text>
  <text x="96" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">  --cache-to type=local,dest=/tmp/cache \</tspan>
  </text>
  <text x="96" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">  --tag myapp:latest .</tspan>
  </text>

  <!-- Inline cache -->
  <rect x="460" y="214" width="360" height="130" rx="8" fill="#1a0a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="480" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">인라인 캐시 (이미지에 포함)</text>
  <rect x="480" y="246" width="320" height="88" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">docker buildx build \</tspan>
  </text>
  <text x="496" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">  --cache-to type=inline \</tspan>
  </text>
  <text x="496" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#ffffff">  --push --tag myapp:latest .</tspan>
  </text>
  <text x="496" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 이미지 메타데이터에 캐시 정보 포함</tspan>

  <!-- note -->
  <rect x="60" y="360" width="760" height="28" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">type=gha (GitHub Actions) 와 type=registry 는 ephemeral 러너에서도 캐시 공유 가능 — 가장 많이 쓰임</text>
</svg>
