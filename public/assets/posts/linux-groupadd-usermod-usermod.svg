<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">usermod — 사용자 속성 변경</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">주요 플래그와 용도</text>

  <!-- Rows: flag boxes -->
  <!-- Row 1 -->
  <rect x="60" y="90" width="360" height="72" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="80" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">-aG GROUP</text>
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">보조 그룹 추가 (-G만 쓰면 기존 그룹 제거됨)</text>
  <text x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">usermod -aG docker alice</text>

  <rect x="460" y="90" width="360" height="72" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="480" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">-s SHELL</text>
  <text x="480" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">로그인 셸 변경</text>
  <text x="480" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">usermod -s /bin/zsh alice</text>

  <!-- Row 2 -->
  <rect x="60" y="180" width="360" height="72" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="80" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">-d HOMEDIR</text>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">홈 디렉터리 경로 변경 (-m 과 함께 이동)</text>
  <text x="80" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">usermod -d /data/alice -m alice</text>

  <rect x="460" y="180" width="360" height="72" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="480" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">-l NEW_NAME</text>
  <text x="480" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">로그인 이름 변경 (UID는 유지)</text>
  <text x="480" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">usermod -l bob alice</text>

  <!-- Row 3 -->
  <rect x="60" y="270" width="360" height="72" fill="#111827" rx="6" stroke="#5f1e1e" stroke-width="1"/>
  <text x="80" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">-L / -U</text>
  <text x="80" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">계정 잠금(-L) / 잠금 해제(-U)</text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">usermod -L alice  # shadow에 ! 추가</text>

  <rect x="460" y="270" width="360" height="72" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="480" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">-e DATE</text>
  <text x="480" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">계정 만료일 설정 (YYYY-MM-DD)</text>
  <text x="480" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">usermod -e 2026-12-31 alice</text>

  <!-- Row 4 -->
  <rect x="60" y="360" width="360" height="72" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="80" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">-g GROUP</text>
  <text x="80" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">기본 그룹(primary group) 변경</text>
  <text x="80" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">usermod -g devteam alice</text>

  <rect x="460" y="360" width="360" height="72" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="480" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">-u UID</text>
  <text x="480" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">UID 변경 (파일 소유권은 별도 수정)</text>
  <text x="480" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">usermod -u 2001 alice</text>

  <!-- warning note -->
  <text x="440" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">⚠ -G 단독 사용 시 기존 보조 그룹이 모두 교체됨 — 반드시 -aG 조합 사용</text>
</svg>
