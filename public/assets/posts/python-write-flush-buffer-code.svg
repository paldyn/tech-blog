<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">write · flush · print 실전 패턴</text>

  <rect x="60" y="68" width="370" height="26" rx="4" fill="#1a2a4a"/>
  <text x="245" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">진행 상황 실시간 출력</text>

  <rect x="60" y="96" width="370" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># print는 sys.stdout (라인 버퍼)</text>
  <text xml:space="preserve" x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 파이프/리다이렉트 시 블록 버퍼</text>
  <text xml:space="preserve" x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">import</tspan> sys</text>
  <text xml:space="preserve" x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">for</tspan> i in <tspan font-weight="600" fill="#7ec8e3">range</ttml:tspan>(<ttml:tspan fill="#b5cea8">100</ttml:tspan>):</text>
  <text xml:space="preserve" x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <ttml:tspan font-weight="600" fill="#7ec8e3">print</ttml:tspan>(<ttml:tspan fill="#ce9178">f"처리 중: {i}"</ttml:tspan>, end=<ttml:tspan fill="#ce9178">"\r"</ttml:tspan>,</text>
  <text xml:space="preserve" x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">          flush=<ttml:tspan font-weight="600" fill="#7ec8e3">True</ttml:tspan>)   <ttml:tspan fill="#9aa4b8"># 즉시 표시</ttml:tspan></text>
  <text xml:space="preserve" x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># sys.stdout.flush() 동일 효과</text>
  <text xml:space="preserve" x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sys.stdout.write(<ttml:tspan fill="#ce9178">"작업 완료\n"</ttml:tspan>)</text>
  <text xml:space="preserve" x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sys.stdout.flush()</text>
  <text xml:space="preserve" x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 환경 변수로 버퍼 끄기</text>
  <text xml:space="preserve" x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># PYTHONUNBUFFERED=1 python app.py</text>
  <text xml:space="preserve" x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 또는 python -u app.py</text>

  <rect x="450" y="68" width="370" height="26" rx="4" fill="#1a2a1a"/>
  <text x="635" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">안전한 파일 쓰기 (atomic)</text>

  <rect x="450" y="96" width="370" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="466" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 쓰기 중 크래시 → 손상 방지</text>
  <text xml:space="preserve" x="466" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 임시 파일 → rename (원자적)</text>
  <text xml:space="preserve" x="466" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">import</ttml:tspan> os, tempfile</text>
  <text xml:space="preserve" x="466" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">from</ttml:tspan> pathlib <ttml:tspan font-weight="600" fill="#7ec8e3">import</ttml:tspan> Path</text>
  <text xml:space="preserve" x="466" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">def</ttml:tspan> <ttml:tspan fill="#55c555">safe_write</ttml:tspan>(path, content):</text>
  <text xml:space="preserve" x="466" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    p = Path(path)</text>
  <text xml:space="preserve" x="466" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    fd, tmp = tempfile.mkstemp(</text>
  <text xml:space="preserve" x="466" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        dir=p.parent)</text>
  <text xml:space="preserve" x="466" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <ttml:tspan font-weight="600" fill="#7ec8e3">try</ttml:tspan>:</text>
  <text xml:space="preserve" x="466" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        <ttml:tspan font-weight="600" fill="#7ec8e3">with</ttml:tspan> os.fdopen(fd, <ttml:tspan fill="#ce9178">"w"</ttml:tspan>) as f:</text>
  <text xml:space="preserve" x="466" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">            f.write(content)</text>
  <text xml:space="preserve" x="466" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        os.replace(tmp, path)</text>
  <text xml:space="preserve" x="466" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # os.replace = atomic rename</ttml:tspan></text>

  <rect x="60" y="390" width="760" height="22" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">close() = flush() + 파일 디스크립터 반환 — with 문 사용 시 자동 호출</text>
</svg>
