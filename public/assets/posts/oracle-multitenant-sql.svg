<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">CDB · PDB 관리 SQL</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">PDB 생성 · 열기 · 접속 · 플러그인</text>

  <!-- Left panel -->
  <rect x="60" y="92" width="370" height="340" rx="12" fill="#0e1623" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">CDB 관점 — 루트에서 실행</text>
  <rect x="76" y="124" width="338" height="292" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="92" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 전체 PDB 목록 조회</text>
  <text x="92" y="166" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> con_id, name, open_mode</text>
  <text x="92" y="184" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  v$pdbs <tspan fill="#7ec8e3">ORDER BY</tspan> con_id;</text>

  <text x="92" y="212" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- PDB 생성 (Seed 복사)</text>
  <text x="92" y="230" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">CREATE PLUGGABLE DATABASE</tspan></text>
  <text x="92" y="248" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  pdb_prod</text>
  <text x="92" y="266" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  <tspan fill="#7ec8e3">ADMIN USER</tspan> pdbadmin</text>
  <text x="92" y="284" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  <tspan fill="#7ec8e3">IDENTIFIED BY</tspan> <tspan fill="#ce9178">"SecurePwd1!"</tspan></text>
  <text x="92" y="302" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  <tspan fill="#7ec8e3">FILE_NAME_CONVERT</tspan> = (</text>
  <text x="92" y="320" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    '/oradata/pdbseed',</text>
  <text x="92" y="338" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    '/oradata/pdb_prod');</text>

  <text x="92" y="366" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- PDB 열기 (부팅 후 자동)</text>
  <text x="92" y="384" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ALTER PLUGGABLE DATABASE</tspan></text>
  <text x="92" y="402" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  pdb_prod <tspan fill="#7ec8e3">OPEN</tspan>;</text>
  <text x="92" y="420" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ALTER PLUGGABLE DATABASE ALL OPEN</tspan></text>
  <text x="92" y="438" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  <tspan fill="#7ec8e3">SAVE STATE</tspan>;</text>

  <!-- Right panel -->
  <rect x="450" y="92" width="370" height="340" rx="12" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">PDB 접속 &amp; 플러그인</text>
  <rect x="466" y="124" width="338" height="292" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="482" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- PDB로 컨텍스트 전환</text>
  <text x="482" y="166" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ALTER SESSION SET</tspan></text>
  <text x="482" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  container = pdb_prod;</text>

  <text x="482" y="212" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- TNS 직접 접속 (서비스명)</text>
  <text x="482" y="230" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- sqlplus user/pw@pdb_prod</text>

  <text x="482" y="258" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- PDB Unplug (이식)</text>
  <text x="482" y="276" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ALTER PLUGGABLE DATABASE</tspan></text>
  <text x="482" y="294" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  pdb_prod <tspan fill="#7ec8e3">UNPLUG INTO</tspan></text>
  <text x="482" y="312" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  '/tmp/pdb_prod.xml';</text>

  <text x="482" y="340" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 다른 CDB에 Plugin</text>
  <text x="482" y="358" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">CREATE PLUGGABLE DATABASE</tspan></text>
  <text x="482" y="376" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  pdb_prod <tspan fill="#7ec8e3">USING</tspan></text>
  <text x="482" y="394" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  '/tmp/pdb_prod.xml'</text>
  <text x="482" y="412" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  <tspan fill="#7ec8e3">COPY</tspan> <tspan fill="#7ec8e3">FILE_NAME_CONVERT</tspan> = (</text>
  <text x="482" y="430" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  '/old', '/new');</text>
</svg>
