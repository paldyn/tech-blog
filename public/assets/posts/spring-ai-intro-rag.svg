<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    RAG (Retrieval-Augmented Generation) 흐름
  </text>

  <!-- Ingestion phase -->
  <text x="170" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a020" text-anchor="middle">① 문서 수집 단계</text>

  <rect x="40" y="92" width="120" height="50" fill="#1a1008" rx="6" stroke="#e8a020" stroke-width="1.5"/>
  <text x="100" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a020" text-anchor="middle">문서 로드</text>
  <text x="100" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PDF / TXT</text>

  <line x1="160" y1="117" x2="188" y2="117" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="190" y="92" width="120" height="50" fill="#1a1008" rx="6" stroke="#e8a020" stroke-width="1.5"/>
  <text x="250" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a020" text-anchor="middle">청크 분할</text>
  <text x="250" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TokenTextSplitter</text>

  <line x1="310" y1="117" x2="338" y2="117" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="340" y="92" width="120" height="50" fill="#1a1008" rx="6" stroke="#e8a020" stroke-width="1.5"/>
  <text x="400" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a020" text-anchor="middle">임베딩</text>
  <text x="400" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">EmbeddingModel</text>

  <line x1="460" y1="117" x2="488" y2="117" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="490" y="92" width="130" height="50" fill="#1a1008" rx="6" stroke="#e8a020" stroke-width="1.5"/>
  <text x="555" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a020" text-anchor="middle">벡터 저장</text>
  <text x="555" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">VectorStore</text>

  <!-- Retrieval+Generation phase -->
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② 질문-답변 단계 (런타임)</text>

  <rect x="40" y="196" width="120" height="50" fill="#0f2020" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="100" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">사용자 질문</text>

  <line x1="160" y1="221" x2="188" y2="221" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="190" y="196" width="140" height="50" fill="#0f2020" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="260" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">유사 문서 검색</text>
  <text x="260" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">VectorStore.similaritySearch</text>

  <line x1="330" y1="221" x2="358" y2="221" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="360" y="196" width="150" height="50" fill="#0f2020" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="435" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">프롬프트 조합</text>
  <text x="435" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">질문 + 검색 문서</text>

  <line x1="510" y1="221" x2="538" y2="221" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="540" y="196" width="120" height="50" fill="#0f2020" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="600" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">LLM 답변</text>
  <text x="600" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ChatModel.call()</text>

  <line x1="660" y1="221" x2="688" y2="221" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="690" y="196" width="130" height="50" fill="#0f2020" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">응답 반환</text>

  <!-- Code: QuestionAnswerAdvisor -->
  <rect x="60" y="276" width="760" height="158" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Spring AI: RAG 구현 (QuestionAnswerAdvisor)</text>
  <text x="76" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">@Service</text>
  <text x="76" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">public class</text>
  <text x="76" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  RagService(ChatClient.Builder builder, VectorStore vs) &#123;</text>
  <text x="76" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">this</tspan>.chatClient = builder</text>
  <text x="76" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        .defaultAdvisors(<tspan fill="#7ec8e3" font-weight="600">new</tspan> QuestionAnswerAdvisor(vs))</text>
  <text x="76" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        .build();</text>
  <text x="76" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  &#125;</text>
</svg>
