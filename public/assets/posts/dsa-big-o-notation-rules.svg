<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">빅오(Big-O) 표기법 핵심 규칙</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">상수 계수와 하위 항을 제거해 성장률의 본질만 남긴다</text>

  <!-- Rule 1: Drop Constants -->
  <rect x="60" y="90" width="370" height="80" rx="8" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">규칙 1: 상수 계수 제거</text>
  <text x="245" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">O(2n) = O(n),  O(500) = O(1)</text>
  <text x="245" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">n이 충분히 크면 상수 배율은 무의미</text>

  <!-- Rule 2: Drop Lower Terms -->
  <rect x="460" y="90" width="370" height="80" rx="8" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="645" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">규칙 2: 하위 항 제거</text>
  <text x="645" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">O(n² + n) = O(n²)</text>
  <text x="645" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">지배 항 이외는 n→∞에서 무시 가능</text>

  <!-- Rule 3: Different inputs -->
  <rect x="60" y="190" width="370" height="80" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">규칙 3: 다른 입력 = 다른 변수</text>
  <text x="245" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">두 배열 순회 → O(a + b)</text>
  <text x="245" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">두 배열 크기가 같다고 가정하지 말 것</text>

  <!-- Rule 4: Nested different inputs -->
  <rect x="460" y="190" width="370" height="80" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">규칙 4: 중첩 다른 입력</text>
  <text x="645" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">두 배열 중첩 순회 → O(a × b)</text>
  <text x="645" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">O(n²)이 아님 — a, b는 독립 변수</text>

  <!-- Code example -->
  <rect x="60" y="290" width="760" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="315" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 흔한 실수: O(n²) → 실제로는 O(a×b)</tspan>
  </text>
  <text x="76" y="335" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> intersect(arrA, arrB) {</tspan>
  </text>
  <text x="76" y="355" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">for</tspan>
    <tspan fill="#ffffff"> (a </tspan>
    <tspan fill="#7ec8e3" font-weight="600">of</tspan>
    <tspan fill="#ffffff"> arrA)             </tspan>
    <tspan fill="#9aa4b8">// a번</tspan>
  </text>
  <text x="76" y="375" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">for</tspan>
    <tspan fill="#ffffff"> (b </tspan>
    <tspan fill="#7ec8e3" font-weight="600">of</tspan>
    <tspan fill="#ffffff"> arrB)         </tspan>
    <tspan fill="#9aa4b8">// b번 → 합계 a×b</tspan>
  </text>
  <text x="76" y="395" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">      </tspan>
    <tspan fill="#7ec8e3" font-weight="600">if</tspan>
    <tspan fill="#ffffff"> (a === b) result.push(a);</tspan>
  </text>
  <text x="76" y="415" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
    <tspan fill="#9aa4b8">  // O(a×b), NOT O(n²)</tspan>
  </text>
  <text x="76" y="440" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 해시셋 활용 시 → O(a+b)</tspan>
  </text>
</svg>
