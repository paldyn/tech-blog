<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TCP/IP 4계층 모델</text>

  <!-- Column headers -->
  <text x="220" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">계층</text>
  <text x="470" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">주요 프로토콜</text>
  <text x="720" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">PDU(데이터 단위)</text>

  <!-- Layer 4: Application -->
  <rect x="60" y="90" width="280" height="70" rx="8" fill="#2a0a2a" stroke="#cc55cc" stroke-width="1.5"/>
  <text x="200" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#cc55cc" text-anchor="middle">응용 계층</text>
  <text x="200" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Application Layer</text>
  <rect x="360" y="90" width="240" height="70" rx="8" fill="#1a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">HTTP, HTTPS, FTP</text>
  <text x="480" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">DNS, SMTP, SSH</text>
  <rect x="620" y="90" width="200" height="70" rx="8" fill="#1a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#cc55cc" text-anchor="middle">메시지 (Message)</text>

  <!-- Layer 3: Transport -->
  <rect x="60" y="178" width="280" height="70" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">전송 계층</text>
  <text x="200" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Transport Layer</text>
  <rect x="360" y="178" width="240" height="70" rx="8" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">TCP — 신뢰성, 순서 보장</text>
  <text x="480" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">UDP — 빠름, 비신뢰성</text>
  <rect x="620" y="178" width="200" height="70" rx="8" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">세그먼트</text>

  <!-- Layer 2: Internet -->
  <rect x="60" y="266" width="280" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">인터넷 계층</text>
  <text x="200" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Internet Layer</text>
  <rect x="360" y="266" width="240" height="70" rx="8" fill="#0a100a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">IP (v4, v6)</text>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">ICMP, ARP, OSPF, BGP</text>
  <rect x="620" y="266" width="200" height="70" rx="8" fill="#0a100a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">패킷 (Packet)</text>

  <!-- Layer 1: Network Access -->
  <rect x="60" y="354" width="280" height="70" rx="8" fill="#1a0a00" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="200" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8a55c" text-anchor="middle">네트워크 접근 계층</text>
  <text x="200" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Network Access Layer</text>
  <rect x="360" y="354" width="240" height="70" rx="8" fill="#100800" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">이더넷, Wi-Fi (802.11)</text>
  <text x="480" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">PPP, 광섬유</text>
  <rect x="620" y="354" width="200" height="70" rx="8" fill="#100800" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a55c" text-anchor="middle">프레임 (Frame)</text>
  <text x="720" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">비트 (Bit)</text>
</svg>
