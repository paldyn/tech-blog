<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TCP/IP 4계층 모델</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">인터넷 통신의 실제 구조 — OSI와의 대응 관계</text>

  <!-- OSI column title -->
  <text x="200" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">OSI 7계층</text>

  <!-- TCP/IP column title -->
  <text x="550" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">TCP/IP 4계층</text>

  <!-- OSI layers (smaller) -->
  <rect x="60" y="110" width="280" height="40" rx="5" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9988cc">7 응용 / 6 표현 / 5 세션</text>
  <rect x="60" y="155" width="280" height="36" rx="5" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">4 전송 (Transport)</text>
  <rect x="60" y="196" width="280" height="36" rx="5" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">3 네트워크 (Network)</text>
  <rect x="60" y="237" width="280" height="36" rx="5" fill="#111" stroke="#e8c44a" stroke-width="1"/>
  <text x="200" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c44a">2 데이터링크</text>
  <rect x="60" y="278" width="280" height="36" rx="5" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="301" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">1 물리 (Physical)</text>

  <!-- arrows: OSI -> TCPIP -->
  <line x1="340" y1="130" x2="390" y2="140" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <line x1="340" y1="173" x2="390" y2="196" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <line x1="340" y1="214" x2="390" y2="252" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <line x1="340" y1="260" x2="390" y2="296" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <line x1="340" y1="296" x2="390" y2="310" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>

  <!-- TCP/IP Layer 4: Application -->
  <rect x="400" y="110" width="300" height="66" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="550" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">응용 계층 (Application)</text>
  <text x="550" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HTTP, HTTPS, FTP, DNS, SMTP</text>
  <text x="550" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자가 직접 상호작용하는 계층</text>

  <!-- TCP/IP Layer 3: Transport -->
  <rect x="400" y="182" width="300" height="66" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="550" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">전송 계층 (Transport)</text>
  <text x="550" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TCP (신뢰성), UDP (속도)</text>
  <text x="550" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">포트 번호로 프로세스 구분</text>

  <!-- TCP/IP Layer 2: Internet -->
  <rect x="400" y="254" width="300" height="66" rx="8" fill="#0f1a14" stroke="#55c555" stroke-width="2"/>
  <text x="550" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">인터넷 계층 (Internet)</text>
  <text x="550" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IP, ICMP, ARP</text>
  <text x="550" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IP 주소로 라우팅 결정</text>

  <!-- TCP/IP Layer 1: Network Access -->
  <rect x="400" y="326" width="300" height="66" rx="8" fill="#1a1200" stroke="#e8c44a" stroke-width="2"/>
  <text x="550" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8c44a">네트워크 접근 계층</text>
  <text x="550" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이더넷, Wi-Fi, MAC 주소</text>
  <text x="550" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">물리적 전송 담당</text>

  <!-- protocol examples on right -->
  <text x="730" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">예: curl → HTTP</text>
  <text x="730" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">예: :80 → TCP</text>
  <text x="730" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">예: 1.1.1.1 → IP</text>
  <text x="730" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">예: 프레임 → Eth</text>

  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">각 계층은 독립적 — HTTP가 바뀌어도 IP·이더넷은 그대로</text>
</svg>
