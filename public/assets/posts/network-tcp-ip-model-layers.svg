<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TCP/IP 4계층 모델</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">인터넷 표준 프로토콜 스택 구조</text>

  <!-- OSI 7 on left -->
  <text x="130" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">OSI 7계층</text>

  <rect x="60" y="104" width="140" height="44" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">7. Application</text>

  <rect x="60" y="152" width="140" height="44" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9090dd" text-anchor="middle">6. Presentation</text>

  <rect x="60" y="200" width="140" height="44" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9090dd" text-anchor="middle">5. Session</text>

  <rect x="60" y="248" width="140" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">4. Transport</text>

  <rect x="60" y="296" width="140" height="44" rx="6" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">3. Network</text>

  <rect x="60" y="344" width="140" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="130" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">2. Data Link</text>

  <rect x="60" y="392" width="140" height="44" rx="6" fill="#2a1a1a" stroke="#ce9178" stroke-width="1"/>
  <text x="130" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">1. Physical</text>

  <!-- Mapping brackets -->
  <line x1="210" y1="126" x2="230" y2="126" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="210" y1="174" x2="230" y2="174" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="210" y1="222" x2="230" y2="222" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="210" y1="126" x2="210" y2="222" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="210" y1="174" x2="230" y2="174" stroke="#3a4a6e" stroke-width="1"/>

  <line x1="210" y1="270" x2="230" y2="270" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="210" y1="318" x2="230" y2="318" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="210" y1="366" x2="230" y2="366" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="210" y1="414" x2="230" y2="414" stroke="#3a4a6e" stroke-width="1"/>

  <!-- TCP/IP 4 layers -->
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">TCP/IP 4계층</text>

  <!-- Application Layer -->
  <rect x="240" y="104" width="360" height="132" rx="8" fill="#1a1a35" stroke="#7777cc" stroke-width="2"/>
  <text x="420" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Application Layer</text>
  <text x="420" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HTTP · HTTPS · DNS · FTP · SMTP · SSH</text>
  <text x="420" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TLS/SSL · SNMP · NTP · DHCP</text>
  <text x="420" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9090dd" text-anchor="middle">OSI 5 + 6 + 7 통합</text>
  <text x="420" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">PDU: Message / Data</text>

  <!-- Transport Layer -->
  <rect x="240" y="248" width="360" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="420" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Transport Layer</text>
  <text x="420" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TCP (신뢰성) · UDP (속도) · PDU: Segment/Datagram</text>

  <!-- Internet Layer -->
  <rect x="240" y="320" width="360" height="60" rx="8" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="420" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Internet Layer</text>
  <text x="420" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">IP · ICMP · ARP · BGP · OSPF · PDU: Packet</text>

  <!-- Network Access Layer -->
  <rect x="240" y="392" width="360" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="420" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">Network Access Layer</text>
  <text x="420" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Ethernet · Wi-Fi · PPP · PDU: Frame / Bit</text>

  <!-- Right: Protocol boxes -->
  <text x="750" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">주요 역할</text>

  <rect x="640" y="104" width="200" height="60" rx="6" fill="#0f1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="740" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">사용자 서비스</text>
  <text x="740" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">웹·이메일·DNS 등</text>
  <text x="740" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">애플리케이션 데이터 처리</text>

  <rect x="640" y="248" width="200" height="60" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">종단간 전달</text>
  <text x="740" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">포트 번호로 앱 구분</text>
  <text x="740" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TCP 신뢰성·재전송</text>

  <rect x="640" y="320" width="200" height="60" rx="6" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="740" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">논리 주소·라우팅</text>
  <text x="740" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IP 주소로 경로 결정</text>
  <text x="740" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서로 다른 LAN 연결</text>

  <rect x="640" y="392" width="200" height="60" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">물리 전송</text>
  <text x="740" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MAC 주소·프레임 처리</text>
  <text x="740" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비트 전기/광 변환</text>
</svg>
