<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TCP/IP 4계층 모델</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">인터넷이 실제로 동작하는 프로토콜 스택</text>

  <!-- TCP/IP Left column -->
  <text x="200" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">TCP/IP 계층</text>

  <rect x="60" y="112" width="280" height="64" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">응용 계층 (Application)</text>
  <text x="200" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">HTTP, HTTPS, DNS, FTP, SMTP, SSH</text>

  <rect x="60" y="184" width="280" height="52" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">전송 계층 (Transport)</text>
  <text x="200" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">TCP, UDP</text>

  <rect x="60" y="244" width="280" height="52" rx="8" fill="#2a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">인터넷 계층 (Internet)</text>
  <text x="200" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">IP, ICMP, ARP, BGP, OSPF</text>

  <rect x="60" y="304" width="280" height="52" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">네트워크 접근 계층 (Link)</text>
  <text x="200" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Ethernet, Wi-Fi, PPP, 광섬유</text>

  <!-- OSI Right column -->
  <text x="680" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">OSI 참조 계층</text>

  <rect x="540" y="112" width="280" height="32" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="680" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">7. 응용 (Application)</text>

  <rect x="540" y="150" width="280" height="32" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="680" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">6. 표현 (Presentation)</text>

  <rect x="540" y="188" width="280" height="32" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="680" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">5. 세션 (Session)</text>

  <rect x="540" y="226" width="280" height="32" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="680" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">4. 전송 (Transport)</text>

  <rect x="540" y="264" width="280" height="32" rx="6" fill="#2a1a0a" stroke="#e05555" stroke-width="1"/>
  <text x="680" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">3. 네트워크 (Network)</text>

  <rect x="540" y="302" width="280" height="32" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="680" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">2. 데이터링크 (Data Link)</text>

  <rect x="540" y="340" width="280" height="32" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="680" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">1. 물리 (Physical)</text>

  <!-- Bracket lines from TCP/IP to OSI -->
  <!-- Application spans 7,6,5 -->
  <line x1="340" y1="144" x2="490" y2="128" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="340" y1="144" x2="490" y2="204" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Transport spans 4 -->
  <line x1="340" y1="210" x2="490" y2="242" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Internet spans 3 -->
  <line x1="340" y1="270" x2="490" y2="280" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Link spans 2,1 -->
  <line x1="340" y1="330" x2="490" y2="318" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="340" y1="330" x2="490" y2="356" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom note -->
  <rect x="60" y="378" width="760" height="56" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OSI는 이론적 참조 모델, TCP/IP는 실제 인터넷 구현 모델이다.</text>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">현장에서는 OSI 계층 번호(L3, L4...)로 프로토콜/장비를 지칭하는 관행이 남아 있다.</text>
</svg>
