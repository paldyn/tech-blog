<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">etcd 데이터 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">쿠버네티스 오브젝트는 /registry/ 경로 아래에 저장됨</text>

  <!-- Key-value tree -->
  <rect x="60" y="96" width="400" height="290" rx="8" fill="#0d0d0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="260" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">etcd 키 경로 구조</text>

  <text x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">/registry/</text>
  <text x="100" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">pods/</text>
  <text x="120" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">default/myapp-pod</text>
  <text x="120" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">kube-system/coredns-xxx</text>
  <text x="100" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">deployments/</text>
  <text x="120" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">default/myapp</text>
  <text x="100" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">services/</text>
  <text x="120" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">default/myapp-svc</text>
  <text x="100" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">nodes/</text>
  <text x="120" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">worker-node-1</text>
  <text x="100" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">secrets/</text>
  <text x="120" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">default/db-secret</text>
  <text x="100" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">configmaps/ ...</text>

  <!-- Value box -->
  <rect x="490" y="96" width="330" height="290" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="655" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">저장된 값 (protobuf)</text>
  <text x="510" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve"># API Server만 직접 읽기/쓰기 가능</text>
  <text x="510" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve"># kubectl로 조회하면 디코딩된 JSON 반환</text>
  <text x="510" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">{</text>
  <text x="510" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  "apiVersion": "v1",</text>
  <text x="510" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  "kind": "Pod",</text>
  <text x="510" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  "metadata": {</text>
  <text x="510" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">    "name": "myapp-pod",</text>
  <text x="510" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">    "namespace": "default"</text>
  <text x="510" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  },</text>
  <text x="510" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  "spec": { ... },</text>
  <text x="510" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  "status": {</text>
  <text x="510" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">    "phase": "Running"</text>
  <text x="510" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">}</text>
</svg>
