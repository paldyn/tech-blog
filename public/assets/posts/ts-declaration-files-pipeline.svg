<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="410" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">declaration: true — 컴파일 한 번, 출력 셋</text>

  <!-- Left: source -->
  <rect x="60" y="110" width="330" height="180" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="225" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">src/math.ts</text>

  <rect x="76" y="150" width="298" height="112" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export function add(</text>
  <text x="92" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  a: number, b: number</text>
  <text x="92" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">): number {</text>
  <text x="92" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  return a + b;</text>
  <text x="92" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Arrows -->
  <line x1="392" y1="160" x2="514" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="392" y1="200" x2="514" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="392" y1="240" x2="514" y2="280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="450" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">tsc</text>

  <!-- Right outputs -->
  <rect x="520" y="88" width="300" height="64" fill="#000000" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">math.js</text>
  <text x="670" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">런타임 코드 — 타입은 제거됨</text>

  <rect x="520" y="168" width="300" height="64" fill="#000000" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">math.d.ts</text>
  <text x="670" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">타입 선언만 — 구현 코드 없음</text>

  <rect x="520" y="248" width="300" height="64" fill="#000000" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="670" y="273" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" text-anchor="middle">math.d.ts.map</text>
  <text x="670" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">선언 소스맵 (declarationMap 옵션)</text>

  <!-- Bottom note -->
  <rect x="60" y="340" width="760" height="42" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">.d.ts는 컴파일 결과의 "타입 절반" — .js와 같은 이름으로 나란히 두면 자동으로 짝이 된다</text>
</svg>
