<svg width="880" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">application.properties vs application.yml</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">두 형식은 완전히 동일한 설정을 표현합니다 — 팀 컨벤션에 따라 선택</text>

  <!-- Left block label -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">application.properties</text>

  <!-- Left code block -->
  <rect x="60" y="114" width="370" height="306" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># DB 설정</text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">spring</tspan><tspan fill="#ffffff">.datasource.</tspan><tspan fill="#7ec8e3">url</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">jdbc:h2:mem:testdb</tspan></text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">spring</tspan><tspan fill="#ffffff">.datasource.</tspan><tspan fill="#7ec8e3">username</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">sa</tspan></text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">spring</tspan><tspan fill="#ffffff">.datasource.</tspan><tspan fill="#7ec8e3">password</tspan><tspan fill="#ffffff">=</tspan></text>
  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># JPA 설정</text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">spring</tspan><tspan fill="#ffffff">.jpa.hibernate.</tspan><tspan fill="#7ec8e3">ddl-auto</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">update</tspan></text>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">spring</tspan><tspan fill="#ffffff">.jpa.</tspan><tspan fill="#7ec8e3">show-sql</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#b5cea8">true</tspan></text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 서버 포트</text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">server</tspan><tspan fill="#ffffff">.</tspan><tspan fill="#7ec8e3">port</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#b5cea8">8080</tspan></text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 로깅 레벨</text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">logging</tspan><tspan fill="#ffffff">.level.</tspan><tspan fill="#7ec8e3">com.example</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">DEBUG</tspan></text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">logging</tspan><tspan fill="#ffffff">.level.</tspan><tspan fill="#7ec8e3">root</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">INFO</tspan></text>

  <!-- Right block label -->
  <text x="450" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">application.yml</text>

  <!-- Right code block -->
  <rect x="450" y="114" width="370" height="306" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="466" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># DB 설정</text>
  <text x="466" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">spring</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="466" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3">datasource</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="466" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3">url</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">jdbc:h2:mem:testdb</tspan></text>
  <text x="466" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3">username</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">sa</tspan></text>
  <text x="466" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3">jpa</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="466" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3">hibernate</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="466" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      <tspan fill="#7ec8e3">ddl-auto</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">update</tspan></text>
  <text x="466" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3">show-sql</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">true</tspan></text>
  <text x="466" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 서버 포트</text>
  <text x="466" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">server</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="466" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3">port</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">8080</tspan></text>
  <text x="466" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 로깅 레벨</text>
  <text x="466" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">logging</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="466" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3">level</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="466" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3">com.example</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">DEBUG</tspan></text>
</svg>
