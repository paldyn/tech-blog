<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">IPv6 SLAAC 주소 자동 구성 과정</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="80" width="220" height="80" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 링크 로컬 주소 생성</text>
  <text x="170" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">fe80::/10 + EUI-64 or 임의값</text>
  <text x="170" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">부팅 직후 자동 생성</text>

  <!-- Arrow 1 to 2 -->
  <line x1="280" y1="120" x2="328" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="330" y="80" width="220" height="80" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">② DAD 수행</text>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Duplicate Address Detection</text>
  <text x="440" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">NS 전송 후 응답 없으면 사용</text>

  <!-- Arrow 2 to 3 -->
  <line x1="550" y1="120" x2="598" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="600" y="80" width="220" height="80" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">③ RS 전송</text>
  <text x="710" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Router Solicitation</text>
  <text x="710" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ff02::2 (All Routers) 로 전송</text>

  <!-- Down arrow from step 3 -->
  <line x1="710" y1="160" x2="710" y2="198" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="600" y="200" width="220" height="80" rx="8" fill="#111" stroke="#e8a030" stroke-width="1.5"/>
  <text x="710" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a030" text-anchor="middle">④ RA 수신</text>
  <text x="710" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Router Advertisement</text>
  <text x="710" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프리픽스 (예: 2001:db8::/64)</text>

  <!-- Arrow 4 to 5 -->
  <line x1="600" y1="240" x2="558" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="330" y="200" width="220" height="80" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">⑤ 글로벌 주소 생성</text>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프리픽스 + 인터페이스 ID</text>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">2001:db8::1234:5678:9abc:def0</text>

  <!-- Arrow 5 to 6 -->
  <line x1="330" y1="240" x2="288" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 6 -->
  <rect x="60" y="200" width="220" height="80" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">⑥ DAD 재수행</text>
  <text x="170" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">글로벌 주소 중복 확인</text>
  <text x="170" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ 완료 시 사용 가능</text>

  <!-- Code block -->
  <rect x="60" y="320" width="760" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Linux에서 SLAAC 주소 확인</text>
  <text x="80" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">$ ip -6 addr show eth0</text>
  <text x="80" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">2: eth0: &lt;BROADCAST,MULTICAST,UP&gt;</text>
  <text x="80" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">    inet6 2001:db8::a1b2:c3d4:e5f6:0001/64 scope global dynamic</text>
  <text x="80" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">           valid_lft 86389sec preferred_lft 14389sec</text>
  <text x="80" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">    inet6 fe80::a1b2:c3d4:e5f6:0001/64 scope link</text>
  <text x="80" y="462" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">           valid_lft forever preferred_lft forever</text>
</svg>
