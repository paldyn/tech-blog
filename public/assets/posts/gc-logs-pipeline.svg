<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="p1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GC 로그 분석 파이프라인 — 무엇을 볼 것인가</text>

  <!-- Step 1: collect -->
  <rect x="60" y="86" width="220" height="86" rx="8" fill="#101422" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">1. 로그 수집</text>
  <text x="170" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">-Xlog:gc*:file=gc.log</text>
  <text x="170" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">:time,uptime,level,tags</text>

  <!-- arrow 1->2 -->
  <line x1="280" y1="129" x2="330" y2="129" stroke="#7ec8e3" stroke-width="2" marker-end="url(#p1)"/>

  <!-- Step 2: parse -->
  <rect x="332" y="86" width="216" height="86" rx="8" fill="#101422" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">2. 도구로 파싱</text>
  <text x="440" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GCeasy.io · GCViewer</text>
  <text x="440" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">그래프 · 통계 자동 산출</text>

  <!-- arrow 2->3 -->
  <line x1="548" y1="129" x2="598" y2="129" stroke="#7ec8e3" stroke-width="2" marker-end="url(#p1)"/>

  <!-- Step 3: metrics -->
  <rect x="600" y="86" width="220" height="86" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">3. 핵심 지표 판독</text>
  <text x="710" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">아래 5가지를 기준으로</text>
  <text x="710" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">건강 상태를 진단</text>

  <!-- arrow 3 -> metrics grid -->
  <line x1="710" y1="172" x2="710" y2="214" stroke="#55c555" stroke-width="2" marker-end="url(#p1)"/>

  <!-- Metrics grid title -->
  <text x="440" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">봐야 할 핵심 지표</text>

  <!-- Metric box 1 -->
  <rect x="60" y="222" width="244" height="70" rx="8" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="76" y="246"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">처리량 (Throughput %)</text>
  <text x="76" y="266"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전체 시간 중 앱 실행 비율</text>
  <text x="76" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">95% 이상이 건강 기준</text>

  <!-- Metric box 2 -->
  <rect x="318" y="222" width="244" height="70" rx="8" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="334" y="246"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">pause 분포 (p99)</text>
  <text x="334" y="266"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">평균이 아닌 꼬리(tail) 지연</text>
  <text x="334" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SLA 직결 — 최댓값도 확인</text>

  <!-- Metric box 3 -->
  <rect x="576" y="222" width="244" height="70" rx="8" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="592" y="246"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">allocation rate</text>
  <text x="592" y="266"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">초당 할당량 (MB/s)</text>
  <text x="592" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">높을수록 young GC 빈발</text>

  <!-- Metric box 4 -->
  <rect x="189" y="306" width="244" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="205" y="330"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Full GC 빈도</text>
  <text x="205" y="350"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">잦으면 누수 / 힙 부족 신호</text>
  <text x="205" y="368"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">after 힙이 계속 우상향?</text>

  <!-- Metric box 5 -->
  <rect x="447" y="306" width="244" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="463" y="330"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">promotion rate</text>
  <text x="463" y="350"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">old로 승격되는 양</text>
  <text x="463" y="368"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">과도하면 premature promotion</text>

  <!-- Bottom note -->
  <text x="440" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">지표를 단일 시점이 아니라 시간축 추세로 본다 — after 힙의 우상향이 가장 위험한 신호</text>
  <text x="440" y="442" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">G1이라면 humongous allocation 경고도 함께 확인 — region 절반 초과 객체</text>
</svg>
