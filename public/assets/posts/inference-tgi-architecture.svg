<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TGI 아키텍처</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Hugging Face Text Generation Inference 내부 구조</text>

  <!-- Request flow -->
  <!-- Client -->
  <rect x="60" y="100" width="120" height="60" rx="6" fill="#111" stroke="#888" stroke-width="1.5"/>
  <text x="120" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Client</text>
  <text x="120" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">HTTP Request</text>

  <line x1="180" y1="130" x2="218" y2="130" stroke="#444" stroke-width="2"/>
  <polygon points="218,124 230,130 218,136" fill="#444"/>

  <!-- Router -->
  <rect x="230" y="100" width="140" height="60" rx="6" fill="#151c24" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="300" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">Router (Rust)</text>
  <text x="300" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">요청 검증</text>
  <text x="300" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SSE 스트리밍</text>

  <line x1="370" y1="130" x2="408" y2="130" stroke="#444" stroke-width="2"/>
  <polygon points="408,124 420,130 408,136" fill="#444"/>

  <!-- Scheduler -->
  <rect x="420" y="100" width="160" height="60" rx="6" fill="#20181a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="500" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">Scheduler</text>
  <text x="500" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Continuous Batching</text>
  <text x="500" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">대기열 관리</text>

  <line x1="580" y1="130" x2="618" y2="130" stroke="#444" stroke-width="2"/>
  <polygon points="618,124 630,130 618,136" fill="#444"/>

  <!-- GPU Workers -->
  <rect x="630" y="100" width="190" height="60" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">GPU Worker (Python)</text>
  <text x="725" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PyTorch + Flash Attn</text>
  <text x="725" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Tensor Parallelism</text>

  <!-- Key Features -->
  <rect x="60" y="190" width="380" height="160" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">핵심 최적화 기술</text>
  <line x1="80" y1="224" x2="420" y2="224" stroke="#222" stroke-width="1"/>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Flash Attention 2: 메모리 최적화된 어텐션</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Continuous Batching: 동적 배치 재구성</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Tensor Parallelism: 다중 GPU 샤딩</text>
  <text x="80" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Quantization: GPTQ·AWQ·FP8·BnB 지원</text>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Speculative Decoding: Draft 모델 내장</text>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Watermarking: 텍스트 워터마크 내장 지원</text>

  <!-- Docker command -->
  <rect x="460" y="190" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Docker로 TGI 실행</text>
  <text x="476" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">docker run --gpus all -p 8080:80 \</text>
  <text x="476" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  -v $HF_HOME:/root/.cache/hf \</text>
  <text x="476" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  ghcr.io/huggingface/tgi:latest \</text>
  <text x="476" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  --model-id meta-llama/Llama-3.1-8B \</text>
  <text x="476" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  --quantize awq \</text>
  <text x="476" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  --max-input-length 4096 \</text>
  <text x="476" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">  --max-total-tokens 8192</text>

  <!-- Benchmarks -->
  <rect x="60" y="370" width="760" height="90" rx="6" fill="#111" stroke="#222"/>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">TGI vs vLLM 처리량 비교 (Llama-2-7B, A100, 동시 32 요청)</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">TGI:  ~1,200 tok/s  (Continuous Batching + Flash Attn)</text>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">vLLM: ~1,400 tok/s  (PagedAttention + 최신 커널)</text>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">※ 두 엔진 모두 성능이 빠르게 향상 중 — HF 생태계 통합이 TGI의 차별점</text>
</svg>
