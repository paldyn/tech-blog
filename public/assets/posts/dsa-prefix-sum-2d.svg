<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">2차원 누적 합 — 포함·배제 원리</text>

  <!-- Grid 4x4 -->
  <!-- P[r][c] = sum of rectangle (0,0)..(r-1,c-1) -->
  <!-- Original matrix values -->
  <text x="160" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">원본 행렬 A</text>

  <rect x="80"  y="88" width="52" height="42" rx="2" fill="#222" stroke="#444"/>
  <text x="106" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8" text-anchor="middle">1</text>
  <rect x="132" y="88" width="52" height="42" rx="2" fill="#222" stroke="#444"/>
  <text x="158" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8" text-anchor="middle">2</text>
  <rect x="184" y="88" width="52" height="42" rx="2" fill="#222" stroke="#444"/>
  <text x="210" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8" text-anchor="middle">3</text>

  <rect x="80"  y="130" width="52" height="42" rx="2" fill="#222" stroke="#444"/>
  <text x="106" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8" text-anchor="middle">4</text>
  <rect x="132" y="130" width="52" height="42" rx="2" fill="#222" stroke="#444"/>
  <text x="158" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8" text-anchor="middle">5</text>
  <rect x="184" y="130" width="52" height="42" rx="2" fill="#222" stroke="#444"/>
  <text x="210" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8" text-anchor="middle">6</text>

  <rect x="80"  y="172" width="52" height="42" rx="2" fill="#222" stroke="#444"/>
  <text x="106" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8" text-anchor="middle">7</text>
  <rect x="132" y="172" width="52" height="42" rx="2" fill="#222" stroke="#444"/>
  <text x="158" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8" text-anchor="middle">8</text>
  <rect x="184" y="172" width="52" height="42" rx="2" fill="#222" stroke="#444"/>
  <text x="210" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8" text-anchor="middle">9</text>

  <!-- Formula -->
  <rect x="280" y="80" width="560" height="90" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="560" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">2D 전처리 공식</text>
  <text x="560" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" text-anchor="middle">P[r][c] = A[r-1][c-1]</text>
  <text x="560" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" text-anchor="middle">  + P[r-1][c] + P[r][c-1] - P[r-1][c-1]</text>
  <text x="560" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(포함·배제 원리)</text>

  <!-- Query formula -->
  <rect x="280" y="186" width="560" height="70" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="560" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">직사각형 구간 합 쿼리 O(1)</text>
  <text x="560" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">sum(r1,c1,r2,c2) = P[r2+1][c2+1] - P[r1][c2+1]</text>
  <text x="560" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">                   - P[r2+1][c1] + P[r1][c1]</text>

  <!-- Code block -->
  <rect x="60" y="276" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  def</text>
  <text x="80" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      build_2d(A):</text>
  <text x="80" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    R,C = len(A),len(A[0])</text>
  <text x="80" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    P=[[0]*(C+1) for _ in range(R+1)]</text>
  <text x="80" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    for</text>
  <text x="80" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        r in range(1,R+1):</text>
  <text x="80" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">      for</text>
  <text x="80" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">          c in range(1,C+1): P[r][c]=A[r-1][c-1]+P[r-1][c]+P[r][c-1]-P[r-1][c-1]</text>
</svg>
