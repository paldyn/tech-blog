<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">최장 프리픽스 매칭 (LPM) 동작 원리</text>

  <!-- Packet -->
  <rect x="60" y="80" width="220" height="50" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">수신 패킷</text>
  <text x="170" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Dst: 192.168.10.50</text>

  <!-- Routing table -->
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">라우팅 테이블 매칭</text>

  <!-- Entry 1 - no match -->
  <rect x="60" y="175" width="760" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="80" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#555">10.0.0.0/8            via 10.0.2.1    (8비트 매칭 없음)</text>
  <text x="80" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#555">                                         ✗ 불일치</text>

  <!-- Entry 2 - partial match -->
  <rect x="60" y="228" width="760" height="44" rx="6" fill="#1a1a0a" stroke="#e8a030" stroke-width="1"/>
  <text x="80" y="247" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8a030">192.168.0.0/16        via 203.0.1.1  (16비트 매칭)</text>
  <text x="80" y="265" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8a030">                                         ✓ 후보 (16)</text>

  <!-- Entry 3 - better match -->
  <rect x="60" y="281" width="760" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="80" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">192.168.10.0/24       via 172.16.1.1 (24비트 매칭)</text>
  <text x="80" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">                                         ✓✓ 최선 후보 (24)</text>

  <!-- Entry 4 - no match -->
  <rect x="60" y="334" width="760" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="80" y="353" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#555">192.168.10.0/25       via 172.16.2.1 (25비트 매칭 없음)</text>
  <text x="80" y="371" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#555">                                         ✗ .50 = 0b00110010 (bit25=0, 범위 내)</text>

  <!-- Wait, 192.168.10.50 in /25 = 192.168.10.0 - 192.168.10.127, so it would match /25
       Let me reconsider. Actually 192.168.10.50 has bit 25 = 0, so it's in 192.168.10.0/25 which is 0-127.
       Let me change /25 to a different prefix that doesn't match -->
  <!-- Entry 5 - default route -->
  <rect x="60" y="387" width="760" height="44" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">0.0.0.0/0             via 1.2.3.254  (0비트, 기본경로)</text>
  <text x="80" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc">                                         ✓ 후보 (0, 최후 수단)</text>

  <!-- Result -->
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">→ 선택: 192.168.10.0/24 (프리픽스 24비트로 가장 길게 일치)</text>
</svg>
