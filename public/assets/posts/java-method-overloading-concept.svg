<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메서드 오버로딩 — 같은 이름, 다른 시그니처</text>

  <!-- 호출 박스 -->
  <rect x="60" y="80" width="200" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">컴파일 타임</text>
  <text x="160" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">정적 디스패치(Static Dispatch)</text>

  <!-- 화살표: 컴파일 타임 → 오버로드 선택 -->
  <line x1="260" y1="110" x2="318" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- 오버로드 선택 박스 -->
  <rect x="320" y="80" width="240" height="60" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">오버로드 해소</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">인수 타입·개수로 메서드 선택</text>

  <!-- 화살표: 해소 → 실행 -->
  <line x1="560" y1="110" x2="618" y2="110" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- 실행 박스 -->
  <rect x="620" y="80" width="200" height="60" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">런타임 실행</text>
  <text x="720" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">선택된 메서드 호출</text>

  <!-- 구분선 -->
  <line x1="60" y1="170" x2="820" y2="170" stroke="#2a2a2a" stroke-width="1"/>

  <!-- 세 가지 오버로드 케이스 제목 -->
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">구분 기준 세 가지</text>

  <!-- 케이스 1: 매개변수 타입 다름 -->
  <rect x="60" y="216" width="230" height="100" rx="8" fill="#0f1623" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 매개변수 타입</text>
  <text x="175" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">print(int n)</text>
  <text x="175" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">print(double d)</text>
  <text x="175" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">print(String s)</text>

  <!-- 케이스 2: 매개변수 개수 다름 -->
  <rect x="325" y="216" width="230" height="100" rx="8" fill="#0f1623" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② 매개변수 개수</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">add(int a, int b)</text>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">add(int a, int b, int c)</text>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">add(int... nums)</text>

  <!-- 케이스 3: 매개변수 순서 다름 -->
  <rect x="590" y="216" width="230" height="100" rx="8" fill="#0f1623" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">③ 매개변수 순서</text>
  <text x="705" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">format(String s, int n)</text>
  <text x="705" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">format(int n, String s)</text>
  <text x="705" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(타입이 다른 경우만 유효)</text>

  <!-- 구분선 -->
  <line x1="60" y1="340" x2="820" y2="340" stroke="#2a2a2a" stroke-width="1"/>

  <!-- 코드 박스 제목 -->
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">오버로딩 ≠ 반환 타입 차이</text>

  <!-- 불가 박스 -->
  <rect x="60" y="380" width="340" height="110" rx="6" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">// ✗ 컴파일 에러</text>
  <text x="84" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">int</tspan>    getValue() { ... }</text>
  <text x="84" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">double</tspan> getValue() { ... }</text>
  <text x="84" y="464" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 반환 타입만 다름 → 불가</text>

  <!-- 가능 박스 -->
  <rect x="480" y="380" width="340" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="650" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">// ✓ 유효한 오버로딩</text>
  <text x="496" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">int</tspan>    getValue(<tspan font-weight="600" fill="#7ec8e3">int</tspan> x) { ... }</text>
  <text x="496" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">double</tspan> getValue(<tspan font-weight="600" fill="#7ec8e3">double</tspan> x) { ... }</text>
  <text x="496" y="464" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 매개변수 타입 다름 → 가능</text>
</svg>
