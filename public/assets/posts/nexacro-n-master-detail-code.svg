<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">마스터-디테일 핵심 코드</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">oncurrentchanged → 디테일 조회 트랜잭션</text>

  <rect x="60" y="90" width="760" height="262" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// dsMaster.oncurrentchanged 이벤트</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text><text x="142" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> dsMaster_oncurrentchanged(obj, e) {</text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    var</tspan><tspan fill="#ffffff"> nRow = obj.currentrow;</tspan></text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    if</tspan><tspan fill="#ffffff"> (nRow &lt; </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    // 마스터 키 추출</text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    var</tspan><tspan fill="#ffffff"> ordNo = obj.getColumn(nRow, </tspan><tspan fill="#ce9178">"ORD_NO"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    // 조회 파라미터 Dataset 설정</text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.dsParam.clearData();</tspan></text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    var</tspan><tspan fill="#ffffff"> r = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.dsParam.addRow();</tspan></text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.dsParam.setColumn(r, </tspan><tspan fill="#ce9178">"ORD_NO"</tspan><tspan fill="#ffffff">, ordNo);</tspan></text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    // 디테일 조회 트랜잭션</text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.transaction(</tspan><tspan fill="#ce9178">"detail"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        "SVC/getDetail"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"dsParam=dsParam"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        "dsDetail=dsDetail"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">);</tspan></text>
</svg>
