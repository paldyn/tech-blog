<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">.gitignore 적용 우선순위</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">파일 위치가 깊을수록 높은 우선순위를 가진다</text>

  <!-- Priority levels - top to bottom = high to low -->
  <!-- Level 1: highest -->
  <rect x="200" y="90" width="480" height="50" fill="#0d1a0d" rx="8" stroke="#1a5a1a" stroke-width="1"/>
  <text x="440" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">① 명령줄 --exclude-from 옵션 (가장 높음)</text>
  <text x="440" y="130" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">git ls-files --exclude-from=.myignore</text>

  <line x1="440" y1="140" x2="440" y2="158" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Level 2 -->
  <rect x="160" y="158" width="560" height="50" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">② 하위 디렉터리 .gitignore (경로 깊을수록 우선)</text>
  <text x="440" y="198" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">src/.gitignore  >  .gitignore (루트)</text>

  <line x1="440" y1="208" x2="440" y2="226" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Level 3 -->
  <rect x="120" y="226" width="640" height="50" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">③ 저장소 루트 .gitignore</text>
  <text x="440" y="266" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">.gitignore  (팀 공유)</text>

  <line x1="440" y1="276" x2="440" y2="294" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Level 4 -->
  <rect x="80" y="294" width="720" height="50" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">④ 전역 gitignore  (개인 설정)</text>
  <text x="440" y="334" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#666">~/.config/git/ignore  또는  core.excludesFile</text>

  <line x1="440" y1="344" x2="440" y2="362" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Level 5: lowest -->
  <rect x="60" y="362" width="760" height="24" fill="#140a0a" rx="6" stroke="#3a1a1a" stroke-width="1"/>
  <text x="440" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">⑤ .git/info/exclude  (로컬 전용, 커밋 안됨, 가장 낮음)</text>
</svg>
