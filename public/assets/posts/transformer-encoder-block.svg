<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Transformer Encoder 블록 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Add &amp; Norm + Sub-layer 두 번 반복 — 잔차 연결로 학습 안정화</text>

  <!-- Left: Block diagram -->
  <!-- Input -->
  <rect x="60" y="96" width="340" height="40" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="230" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">입력 x  (seq_len × d_model)</text>

  <!-- Arrow down -->
  <line x1="230" y1="136" x2="230" y2="158" stroke="#444" stroke-width="2"/>
  <polygon points="223,158 230,170 237,158" fill="#444"/>

  <!-- Residual branch for MHA -->
  <line x1="100" y1="116" x2="100" y2="270" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="82" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" transform="rotate(-90 82 196)">잔차 연결</text>

  <!-- MHA box -->
  <rect x="120" y="170" width="220" height="50" fill="#1a1f35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Multi-Head Self-Attention</text>
  <text x="230" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Q, K, V 모두 동일 입력에서</text>

  <!-- Arrow + Add -->
  <line x1="230" y1="220" x2="230" y2="242" stroke="#444" stroke-width="2"/>
  <polygon points="223,242 230,254 237,242" fill="#444"/>
  <line x1="100" y1="270" x2="185" y2="270" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="270" r="14" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">+</text>

  <!-- LayerNorm 1 -->
  <line x1="230" y1="254" x2="230" y2="296" stroke="#444" stroke-width="2"/>
  <polygon points="223,296 230,308 237,296" fill="#444"/>
  <rect x="155" y="308" width="150" height="34" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Layer Normalization</text>

  <!-- Residual branch for FFN -->
  <line x1="100" y1="116" x2="100" y2="420" stroke="#7777cc" stroke-width="0" /><!-- already drawn above -->
  <line x1="90" y1="325" x2="90" y2="430" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow -->
  <line x1="230" y1="342" x2="230" y2="364" stroke="#444" stroke-width="2"/>
  <polygon points="223,364 230,376 237,364" fill="#444"/>

  <!-- FFN box -->
  <rect x="120" y="376" width="220" height="50" fill="#1a150a" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="230" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Feed-Forward Network</text>
  <text x="230" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Linear → ReLU/GELU → Linear</text>

  <!-- Add + Norm 2 -->
  <line x1="230" y1="426" x2="230" y2="448" stroke="#444" stroke-width="2"/>
  <polygon points="223,448 230,460 237,448" fill="#444"/>
  <line x1="90" y1="430" x2="185" y2="460" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="460" r="14" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="200" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#ce9178" text-anchor="middle">+</text>
  <line x1="230" y1="460" x2="230" y2="482" stroke="#444" stroke-width="2"/>
  <polygon points="223,482 230,494 237,482" fill="#444"/>
  <rect x="155" y="494" width="150" height="20" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="509" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Layer Normalization</text>

  <!-- Right: details panel -->
  <rect x="460" y="96" width="370" height="400" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="645" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">각 서브레이어 상세</text>

  <!-- MHA details -->
  <text x="476" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① Multi-Head Self-Attention</text>
  <text x="476" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· Q = K = V = 입력 x (모두 같은 소스)</text>
  <text x="476" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· h개 헤드로 병렬 계산 후 concat</text>
  <text x="476" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· Padding Mask로 &lt;PAD&gt; 무시</text>

  <line x1="476" y1="216" x2="818" y2="216" stroke="#1e2433" stroke-width="1"/>

  <!-- FFN details -->
  <text x="476" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">② Feed-Forward Network</text>
  <text x="476" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 위치별 독립 적용 (position-wise)</text>
  <text x="476" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 내부 차원: d_ff = 4 × d_model</text>
  <text x="476" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· FFN(x) = max(0, xW₁+b₁)W₂+b₂</text>

  <line x1="476" y1="302" x2="818" y2="302" stroke="#1e2433" stroke-width="1"/>

  <!-- Residual + Norm -->
  <text x="476" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ Residual + Layer Norm</text>
  <text x="476" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· output = LayerNorm(x + Sublayer(x))</text>
  <text x="476" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 잔차 연결 → 그래디언트 소실 방지</text>
  <text x="476" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· LayerNorm → 학습 안정화</text>

  <line x1="476" y1="388" x2="818" y2="388" stroke="#1e2433" stroke-width="1"/>

  <!-- Stack info -->
  <text x="476" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">④ N겹 스택</text>
  <text x="476" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 원논문: N=6, d_model=512, h=8</text>
  <text x="476" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· BERT-Large: N=24, d_model=1024</text>
  <text x="476" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 마지막 레이어 출력 = 문맥 표현</text>
</svg>
