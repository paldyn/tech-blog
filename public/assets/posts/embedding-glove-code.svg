<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 338" width="880" height="338">
  <rect width="880" height="338" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GloVe 벡터 로드 및 단어 유사도</text>

  <!-- Code block background -->
  <rect x="60" y="68" width="760" height="252" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Line numbers -->
  <text x="76" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 1</text>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 2</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 3</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 4</text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 5</text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 6</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 7</text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 8</text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve"> 9</text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve">10</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve">11</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" xml:space="preserve">12</text>

  <!-- Code -->
  <text x="110" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">import</text>
  <text x="157" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> numpy </text>
  <text x="212" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">as</text>
  <text x="230" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> np</text>

  <text x="110" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># GloVe 벡터 로드</text>

  <text x="110" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="136" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> load_glove(path):</text>

  <text x="110" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    vecs = {}</text>

  <text x="110" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">    for</tspan><tspan fill="#ffffff"> line </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#ffffff"> open(path):</tspan></text>

  <text x="110" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        w, *v = line.split()</text>

  <text x="110" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        vecs[w] = np.array(v, </text>
  <text x="368" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">float)</text>

  <text x="110" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ffffff"> vecs</tspan></text>

  <text x="110" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">glove = load_glove(</tspan><tspan fill="#ce9178">"glove.6B.300d.txt"</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="110" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 단어 유사도</text>

  <text x="110" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">cos = glove[</tspan><tspan fill="#ce9178">"cat"</tspan><tspan fill="#ffffff">] @ glove[</tspan><tspan fill="#ce9178">"dog"</tspan><tspan fill="#ffffff">]</tspan></text>

</svg>
