<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">useState — 추론에 맡길까, 제네릭을 줄까</text>
  <text x="60" y="78" font-size="13" fill="#888">초깃값으로 타입이 정해지지만, null·유니온은 명시가 필요하다</text>

  <!-- left: inference -->
  <rect x="60" y="100" width="360" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" font-size="14" font-weight="600" fill="#55c555">초깃값으로 추론되는 경우</text>
  <text xml:space="preserve" x="76" y="160" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [n, setN] =</tspan></text>
  <text xml:space="preserve" x="76" y="182" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  useState(0);</text>
  <text xml:space="preserve" x="76" y="204" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// n: number</text>
  <text xml:space="preserve" x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [s, setS] =</tspan></text>
  <text xml:space="preserve" x="76" y="262" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">  useState(</tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">);</tspan></text>
  <text xml:space="preserve" x="76" y="284" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// s: string</text>
  <text x="76" y="330" font-size="13" fill="#ffffff">초깃값이 곧 타입.</text>
  <text x="76" y="352" font-size="13" fill="#ffffff">단순 값이면 제네릭 생략 OK.</text>

  <!-- right: explicit -->
  <rect x="460" y="100" width="360" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="128" font-size="14" font-weight="600" fill="#e05555">명시가 필요한 경우</text>
  <text xml:space="preserve" x="476" y="160" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [u, setU] =</tspan></text>
  <text xml:space="preserve" x="476" y="182" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  useState&lt;User | null&gt;(null);</text>
  <text xml:space="preserve" x="476" y="204" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// null만 주면 타입이</text>
  <text xml:space="preserve" x="476" y="226" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// null로 굳어버린다</text>
  <text xml:space="preserve" x="476" y="262" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [list, setList] =</tspan></text>
  <text xml:space="preserve" x="476" y="284" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  useState&lt;Item[]&gt;([]);</text>
  <text xml:space="preserve" x="476" y="306" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// [] → never[] 추론 방지</text>
  <text x="476" y="352" font-size="13" fill="#ffffff">null·빈배열·유니온은 제네릭으로.</text>
</svg>
