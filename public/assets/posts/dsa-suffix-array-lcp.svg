<svg width="880" height="490" viewBox="0 0 880 490" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="490" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LCP 배열: 인접한 정렬 접미사의 공통 접두사</text>

  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">정렬된 접미사 (초록 = 직전과의 공통 접두사)</text>
  <text x="600" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">LCP[i]</text>

  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <rect x="60" y="118" width="460" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="141" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=0</tspan><tspan fill="#ffffff">  a</tspan></text>
    <rect x="600" y="118" width="120" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="616" y="141" xml:space="preserve" fill="#9aa4b8">—</text>

    <rect x="60" y="168" width="460" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="191" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=1</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#55c555" font-weight="600">a</tspan><tspan fill="#ffffff">na</tspan></text>
    <rect x="600" y="168" width="120" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="616" y="191" xml:space="preserve" fill="#b5cea8">1</text>

    <rect x="60" y="218" width="460" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="241" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=2</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#55c555" font-weight="600">ana</tspan><tspan fill="#ffffff">na</tspan></text>
    <rect x="600" y="218" width="120" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="616" y="241" xml:space="preserve" fill="#b5cea8">3</text>

    <rect x="60" y="268" width="460" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="291" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=3</tspan><tspan fill="#ffffff">  banana</tspan></text>
    <rect x="600" y="268" width="120" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="616" y="291" xml:space="preserve" fill="#b5cea8">0</text>

    <rect x="60" y="318" width="460" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="341" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=4</tspan><tspan fill="#ffffff">  na</tspan></text>
    <rect x="600" y="318" width="120" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="616" y="341" xml:space="preserve" fill="#b5cea8">0</text>

    <rect x="60" y="368" width="460" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="391" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">i=5</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#55c555" font-weight="600">na</tspan><tspan fill="#ffffff">na</tspan></text>
    <rect x="600" y="368" width="120" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="616" y="391" xml:space="preserve" fill="#b5cea8">2</text>
  </g>

  <rect x="60" y="428" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">LCP[i] = 정렬상 바로 앞 접미사와의 <tspan fill="#55c555" font-weight="600">최장 공통 접두사 길이</tspan> — 반복 부분 문자열 분석의 핵심</text>
