<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ORM이 해결하는 패러다임 불일치</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">객체 지향 세계 vs 관계형 데이터베이스 세계</text>

  <!-- Left: OOP World -->
  <rect x="60" y="84" width="340" height="36" fill="#0d1a2e" rx="8" stroke="#1e2e4a" stroke-width="1.5"/>
  <text x="230" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">객체 지향 (Java)</text>

  <!-- Right: RDB World -->
  <rect x="480" y="84" width="340" height="36" fill="#1a0e00" rx="8" stroke="#3a2200" stroke-width="1.5"/>
  <text x="650" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8a855" text-anchor="middle">관계형 DB (SQL)</text>

  <!-- Problem 1: Inheritance -->
  <text x="230" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">상속 (Inheritance)</text>
  <rect x="80" y="152" width="300" height="60" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="100" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">class Animal { String name; }</text>
  <text x="100" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">class Dog extends Animal { }</text>
  <text x="100" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 자연스러운 계층 구조</text>

  <text x="650" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">상속 없음 (테이블 분리/합치기)</text>
  <rect x="500" y="152" width="300" height="60" fill="#1a0e00" rx="6" stroke="#3a2200" stroke-width="1"/>
  <text x="520" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">TABLE animal (id, name, dtype)</text>
  <text x="520" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">TABLE dog (animal_id FK)</text>
  <text x="520" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// JOIN 필요 — 복잡도 증가</text>

  <!-- Problem 2: Association -->
  <text x="230" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">연관 관계 (참조)</text>
  <rect x="80" y="248" width="300" height="44" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="100" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">order.getMember()  <tspan fill="#6a8aa0">// 객체 참조</tspan></text>
  <text x="100" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">member.getOrders() <tspan fill="#6a8aa0">// 양방향</tspan></text>

  <text x="650" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">외래 키 (단방향)</text>
  <rect x="500" y="248" width="300" height="44" fill="#1a0e00" rx="6" stroke="#3a2200" stroke-width="1"/>
  <text x="520" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">ORDER.member_id FK  <tspan fill="#6a8aa0">// PK 참조</tspan></text>
  <text x="520" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// JOIN으로만 역방향 조회</text>

  <!-- Problem 3: Identity -->
  <text x="230" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">동일성 (Identity)</text>
  <rect x="80" y="330" width="300" height="44" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="100" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a == b  <tspan fill="#6a8aa0">// 참조 동일성</tspan></text>
  <text x="100" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a.equals(b) <tspan fill="#6a8aa0">// 값 동등성</tspan></text>

  <text x="650" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">기본 키 (PK)</text>
  <rect x="500" y="330" width="300" height="44" fill="#1a0e00" rx="6" stroke="#3a2200" stroke-width="1"/>
  <text x="520" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">WHERE id = 1  <tspan fill="#6a8aa0">// PK로 식별</tspan></text>
  <text x="520" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 객체 동일성 개념 없음</text>

  <!-- Problem 4: Granularity -->
  <text x="230" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">세분성 (Granularity)</text>
  <rect x="80" y="414" width="300" height="44" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="100" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Member { Address address; }</text>
  <text x="100" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 객체 안의 객체 (임베디드)</text>

  <text x="650" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">컬럼 기반 (평탄화)</text>
  <rect x="500" y="414" width="300" height="44" fill="#1a0e00" rx="6" stroke="#3a2200" stroke-width="1"/>
  <text x="520" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">city, street, zipcode 컬럼</text>
  <text x="520" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 별도 테이블 또는 플래튼</text>

  <!-- ORM Bridge arrow -->
  <line x1="430" y1="130" x2="430" y2="470" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="404" y="275" width="52" height="30" fill="#1a1a0a" rx="4" stroke="#2e2e00" stroke-width="1"/>
  <text x="430" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e855" text-anchor="middle">ORM</text>

  <!-- Bottom summary -->
  <rect x="60" y="472" width="760" height="36" fill="#0a0a1a" rx="6" stroke="#1a1a2e" stroke-width="1"/>
  <text x="440" y="495" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">JPA/Hibernate는 이 4가지 불일치를 매핑 설정(@Entity, @OneToMany, @Embedded 등)으로 자동 해결</text>
</svg>
