<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect x="0" y="0" width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="60" y="56" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HTTP/2 프레임 헤더 — 고정 9바이트(72비트)</text>

  <!-- bit scale labels -->
  <text x="60" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">비트 0</text>
  <text x="730" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">비트 71</text>

  <!-- Row 1: header fields (Length 24, Type 8, Flags 8) spanning 760px = 40 bits -->
  <!-- 760px for 40 bits => 19px per bit. Length 24bit=456, Type 8=152, Flags 8=152 -->
  <rect x="60" y="104" width="456" height="64" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="288" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Length</text>
  <text x="288" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">24비트 · 페이로드 길이</text>

  <rect x="516" y="104" width="152" height="64" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="592" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Type</text>
  <text x="592" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">8비트</text>

  <rect x="668" y="104" width="152" height="64" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="744" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Flags</text>
  <text x="744" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">8비트</text>

  <!-- Row 2: R 1bit + Stream Identifier 31bit = 32 bits -->
  <!-- 760px for 32 bits => 23.75px per bit. R=1bit~24px, Stream ID=31bit~736px -->
  <rect x="60" y="184" width="40" height="64" fill="#000000" stroke="#e05555" stroke-width="1.5" rx="6"/>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">R</text>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">1</text>

  <rect x="100" y="184" width="720" height="64" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="460" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">Stream Identifier</text>
  <text x="460" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">31비트 · 스트림 ID (0 = 연결 전체)</text>

  <!-- brace label header -->
  <line x1="60" y1="262" x2="820" y2="262" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">▲ 9바이트 고정 헤더 (모든 프레임 공통)</text>

  <!-- Payload box -->
  <rect x="60" y="300" width="760" height="76" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6" stroke-dasharray="4,4"/>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">Payload (가변 길이)</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">Length 필드가 가리키는 바이트 수만큼 · 타입별로 의미가 다름</text>

  <text x="60" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">수신측은 헤더 9바이트를 먼저 읽어 Length를 확인한 뒤, 정확히 그만큼을 페이로드로 읽는다 — 경계 추측이 사라진다.</text>
</svg>
