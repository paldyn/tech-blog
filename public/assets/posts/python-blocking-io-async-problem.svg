<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">블로킹 호출이 루프를 멈춘다</text>

  <!-- 블로킹 -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">time.sleep / 동기 requests.get</text>
  <rect x="60" y="118" width="600" height="36" fill="#e05555" rx="4"/>
  <text x="360" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">루프 전체가 이 시간 동안 정지 — 다른 코루틴 모두 대기</text>
  <text x="60" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단일 스레드라 await 양보가 없으면 빠져나갈 수 없다</text>

  <!-- 비블로킹 -->
  <text x="60" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">await asyncio.sleep / run_in_executor</text>
  <rect x="60" y="250" width="180" height="36" fill="#55c555" rx="4"/>
  <text x="150" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">코루틴 A</text>
  <rect x="248" y="250" width="180" height="36" fill="#55c555" rx="4"/>
  <text x="338" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">코루틴 B</text>
  <rect x="436" y="250" width="180" height="36" fill="#55c555" rx="4"/>
  <text x="526" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">코루틴 C</text>
  <text x="60" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">대기 중 다른 코루틴이 실행되어 루프가 살아있다</text>
</svg>
