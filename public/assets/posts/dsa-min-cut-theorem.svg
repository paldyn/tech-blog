<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">최대 유량-최소 컷 정리 (Max-Flow Min-Cut)</text>

  <!-- S-side background -->
  <ellipse cx="230" cy="260" rx="180" ry="160" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" opacity="0.7"/>
  <text x="130" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">S 집합</text>

  <!-- T-side background -->
  <ellipse cx="650" cy="260" rx="180" ry="160" fill="#1a1a1a" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" opacity="0.7"/>
  <text x="730" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">T 집합</text>

  <!-- Cut line -->
  <line x1="440" y1="80" x2="440" y2="440" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">컷(Cut)</text>

  <!-- Nodes -->
  <!-- s -->
  <circle cx="120" cy="260" r="26" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">s</text>

  <!-- A (S side) -->
  <circle cx="260" cy="180" r="24" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">A</text>

  <!-- B (S side) -->
  <circle cx="260" cy="340" r="24" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">B</text>

  <!-- C (T side) -->
  <circle cx="620" cy="180" r="24" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="620" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">C</text>

  <!-- D (T side) -->
  <circle cx="620" cy="340" r="24" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="620" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">D</text>

  <!-- t -->
  <circle cx="760" cy="260" r="26" fill="#1a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="760" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">t</text>

  <!-- S-side internal edges -->
  <line x1="146" y1="248" x2="234" y2="190" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="146" y1="272" x2="234" y2="328" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- CUT edges (S->T, red, bold) -->
  <line x1="284" y1="180" x2="594" y2="180" stroke="#e05555" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="440" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">cap=7</text>

  <line x1="284" y1="340" x2="594" y2="340" stroke="#e05555" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">cap=5</text>

  <line x1="278" y1="200" x2="606" y2="320" stroke="#e05555" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="460" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">cap=3</text>

  <!-- T-side internal edges -->
  <line x1="644" y1="192" x2="732" y2="248" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <line x1="644" y1="328" x2="732" y2="272" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- Cut value box -->
  <rect x="270" y="415" width="340" height="52" fill="#1a1a2e" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">컷 용량 = 7 + 5 + 3 =</text>
  <text x="440" y="457" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">15 = 최대 유량</text>
</svg>
