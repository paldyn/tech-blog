<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a055"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">RSA 암호화 · 복호화 흐름</text>

  <!-- Key Generation Section -->
  <text x="60" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">① 키 생성 (Key Generation)</text>

  <rect x="60" y="96" width="760" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># RSA 키 쌍 생성</text>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">p</tspan> = 임의의 큰 소수,  <tspan fill="#7ec8e3" font-weight="600">q</tspan> = 임의의 큰 소수</text>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">n</tspan> = p × q,  φ(n) = (p-1)(q-1)</text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">공개키: (e, n)   비밀키: (d, n)   [e × d ≡ 1 mod φ(n)]</text>

  <!-- Encryption Section -->
  <text x="60" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">② 암호화 — 수신자 공개키(e, n) 사용</text>

  <!-- Sender box -->
  <rect x="60" y="220" width="160" height="60" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">송신자 (Alice)</text>
  <text x="140" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">평문 M 보유</text>

  <!-- Encrypt box -->
  <rect x="280" y="220" width="180" height="60" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1.5"/>
  <text x="370" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">암호화</text>
  <text x="370" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">C = Mᵉ mod n</text>

  <!-- Cipher box -->
  <rect x="520" y="220" width="140" height="60" rx="8" fill="#1a1108" stroke="#e0a055" stroke-width="1.5"/>
  <text x="590" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055">암호문 C</text>
  <text x="590" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">네트워크 전송</text>

  <!-- Receiver enc box -->
  <rect x="720" y="220" width="140" height="60" rx="8" fill="#111a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">수신자 (Bob)</text>
  <text x="790" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비밀키(d,n) 보유</text>

  <!-- Enc flow arrows -->
  <line x1="222" y1="250" x2="276" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="462" y1="250" x2="516" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="662" y1="250" x2="716" y2="250" stroke="#e0a055" stroke-width="2" marker-end="url(#arr-y)"/>

  <!-- Decryption Section -->
  <text x="60" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">③ 복호화 — 수신자 비밀키(d, n) 사용</text>

  <!-- Cipher recv -->
  <rect x="60" y="330" width="140" height="60" rx="8" fill="#1a1108" stroke="#e0a055" stroke-width="1.5"/>
  <text x="130" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055">암호문 C</text>
  <text x="130" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">수신된 암호문</text>

  <!-- Decrypt box -->
  <rect x="260" y="330" width="180" height="60" rx="8" fill="#111a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="350" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">복호화</text>
  <text x="350" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">M = Cᵈ mod n</text>

  <!-- Plaintext box -->
  <rect x="500" y="330" width="160" height="60" rx="8" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="580" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">평문 M 복원</text>
  <text x="580" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비밀키 없이 복호 불가</text>

  <!-- Dec flow arrows -->
  <line x1="202" y1="360" x2="256" y2="360" stroke="#e0a055" stroke-width="2" marker-end="url(#arr-y)"/>
  <line x1="442" y1="360" x2="496" y2="360" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Security note -->
  <rect x="60" y="420" width="760" height="40" rx="8" fill="#110a0a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">⚠ RSA-PKCS#1 v1.5 패딩은 Bleichenbacher 공격에 취약 — OAEP 패딩 사용 필수</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 TLS에서는 RSA로 직접 데이터를 암호화하지 않고 대칭키(AES)를 교환하는 데만 사용</text>
</svg>
