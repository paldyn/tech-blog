<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git init 후 .git 디렉토리 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">버전 관리의 모든 데이터가 .git 안에 저장된다</text>

  <!-- Left: directory tree -->
  <rect x="60" y="90" width="360" height="340" rx="10" fill="#111" stroke="#2a2a2a"/>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">디렉토리 구조</text>

  <rect x="80" y="128" width="320" height="280" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="100" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">my-project/</text>
  <text x="100" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">├── .git/</text>
  <text x="100" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">│   ├── HEAD</text>
  <text x="100" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">│   ├── config</text>
  <text x="100" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">│   ├── description</text>
  <text x="100" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">│   ├── hooks/</text>
  <text x="100" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">│   ├── info/</text>
  <text x="100" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c55e">│   ├── objects/</text>
  <text x="100" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c55e">│   └── refs/</text>
  <text x="100" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555">│       ├── heads/</text>
  <text x="100" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555">│       └── tags/</text>
  <text x="100" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">├── src/</text>
  <text x="100" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">└── README.md</text>

  <!-- Right: file explanations -->
  <rect x="460" y="90" width="360" height="340" rx="10" fill="#111" stroke="#2a2a2a"/>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">주요 파일 역할</text>

  <!-- HEAD -->
  <rect x="480" y="130" width="320" height="48" rx="6" fill="#0d1520" stroke="#1e2433"/>
  <text x="500" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">HEAD</text>
  <text x="560" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 현재 브랜치를 가리키는 포인터</text>
  <text x="500" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">ref: refs/heads/main</text>

  <!-- config -->
  <rect x="480" y="188" width="320" height="48" rx="6" fill="#0d1520" stroke="#1e2433"/>
  <text x="500" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">config</text>
  <text x="560" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 저장소별 로컬 설정</text>
  <text x="500" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">remote, branch 설정 등</text>

  <!-- objects -->
  <rect x="480" y="246" width="320" height="48" rx="6" fill="#1a150d" stroke="#3a2e1e"/>
  <text x="500" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8c55e">objects/</text>
  <text x="572" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 모든 데이터 저장소</text>
  <text x="500" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">blob, tree, commit, tag 객체</text>

  <!-- refs -->
  <rect x="480" y="304" width="320" height="48" rx="6" fill="#1a150d" stroke="#3a2e1e"/>
  <text x="500" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8c55e">refs/</text>
  <text x="548" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 브랜치·태그 참조</text>
  <text x="500" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">heads/main = 최신 커밋 해시</text>

  <!-- hooks -->
  <rect x="480" y="362" width="320" height="48" rx="6" fill="#0d1520" stroke="#1e2433"/>
  <text x="500" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">hooks/</text>
  <text x="556" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ Git 이벤트 훅 스크립트</text>
  <text x="500" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">pre-commit, post-merge 등</text>

  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">.git 디렉토리를 삭제하면 버전 관리 정보가 모두 사라진다 (파일은 유지)</text>
</svg>
