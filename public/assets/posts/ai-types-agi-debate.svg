<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AGI 달성 여부 — 주요 관점 비교</text>
  <text x="440" y="74" text-anchor="middle" font-size="13" fill="#888">낙관론 · 신중론 · 회의론이 나뉘는 이유</text>

  <!-- Left: Optimist -->
  <rect x="60" y="100" width="230" height="280" fill="#0f1f12" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">낙관론</text>
  <text x="175" y="148" text-anchor="middle" font-size="12" fill="#888">Altman · LeCun(일부)</text>
  <line x1="80" y1="158" x2="270" y2="158" stroke="#222" stroke-width="1"/>
  <text x="80" y="178" font-size="12" fill="#e8e8e8">"AGI는 10년 내 온다"</text>
  <text x="80" y="200" font-size="11" fill="#888">• 스케일링 법칙이 계속 작동</text>
  <text x="80" y="218" font-size="11" fill="#888">• 멀티모달·에이전트 급발전</text>
  <text x="80" y="236" font-size="11" fill="#888">• o3·o4 추론 능력 폭발적 향상</text>
  <text x="80" y="254" font-size="11" fill="#888">• 강화학습이 빠진 퍼즐 채움</text>
  <line x1="80" y1="268" x2="270" y2="268" stroke="#222" stroke-width="1"/>
  <text x="80" y="288" font-size="11" fill="#888">주요 근거:</text>
  <text x="80" y="306" font-size="11" fill="#55c555">GPT-4 → 5 간격이 좁아짐</text>
  <text x="80" y="324" font-size="11" fill="#55c555">코딩·수학 벤치마크 급등</text>
  <text x="80" y="342" font-size="11" fill="#55c555">에이전트 루프 자율화</text>
  <rect x="80" y="356" width="170" height="20" fill="#0f2a14" rx="4"/>
  <text x="165" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#55c555">2030~2035년 목표</text>

  <!-- Center divider label -->
  <text x="440" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#888">vs</text>

  <!-- Right: Skeptic -->
  <rect x="590" y="100" width="230" height="280" fill="#1f0f0f" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="705" y="128" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">회의론</text>
  <text x="705" y="148" text-anchor="middle" font-size="12" fill="#888">Marcus · Mitchell</text>
  <line x1="610" y1="158" x2="800" y2="158" stroke="#222" stroke-width="1"/>
  <text x="610" y="178" font-size="12" fill="#e8e8e8">"현재 방식은 한계가 명확"</text>
  <text x="610" y="200" font-size="11" fill="#888">• 통계적 패턴 ≠ 이해</text>
  <text x="610" y="218" font-size="11" fill="#888">• 상식·인과 추론 미흡</text>
  <text x="610" y="236" font-size="11" fill="#888">• 새 패러다임이 없으면 한계</text>
  <text x="610" y="254" font-size="11" fill="#888">• 환각·망각·신뢰성 미해결</text>
  <line x1="610" y1="268" x2="800" y2="268" stroke="#222" stroke-width="1"/>
  <text x="610" y="288" font-size="11" fill="#888">주요 근거:</text>
  <text x="610" y="306" font-size="11" fill="#e05555">Winogrande·ARC 여전히 부족</text>
  <text x="610" y="324" font-size="11" fill="#e05555">추론 과정 비일관성</text>
  <text x="610" y="342" font-size="11" fill="#e05555">데이터 편향 해결 안 됨</text>
  <rect x="610" y="356" width="170" height="20" fill="#2a0f0f" rx="4"/>
  <text x="695" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#e05555">달성 시점 불투명</text>

  <!-- Middle: Cautious -->
  <rect x="310" y="130" width="260" height="110" fill="#0f1a1f" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="155" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">신중론 (다수 연구자)</text>
  <line x1="330" y1="165" x2="550" y2="165" stroke="#222" stroke-width="1"/>
  <text x="330" y="183" font-size="11" fill="#888">• 현재 LLM은 Narrow AI 범주</text>
  <text x="330" y="201" font-size="11" fill="#888">• AGI 정의 자체가 불분명</text>
  <text x="330" y="219" font-size="11" fill="#888">• 새로운 아키텍처·데이터 필요</text>

  <!-- Bottom: current state note -->
  <rect x="60" y="402" width="760" height="62" fill="#141414" rx="8" stroke="#333" stroke-width="1"/>
  <text x="440" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">중요한 사실: "AGI가 됐다"는 주장은 마케팅일 가능성이 높습니다</text>
  <text x="440" y="444" text-anchor="middle" font-size="12" fill="#888">AGI의 기준이 없기 때문에, 누구도 공식적으로 "AGI 달성"을 선언한 적 없습니다.</text>

  <!-- Footer -->
  <text x="440" y="476" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈 #3</text>
</svg>
