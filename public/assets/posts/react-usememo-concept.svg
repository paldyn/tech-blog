<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useMemo — 메모이제이션 동작 원리</text>

  <!-- Without useMemo (left) -->
  <text x="210" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">useMemo 없음</text>

  <rect x="60" y="90" width="300" height="48" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="210" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">부모 리렌더링</text>
  <text x="210" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(어떤 state든 바뀌면)</text>

  <line x1="210" y1="138" x2="210" y2="162" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="60" y="164" width="300" height="48" rx="8" fill="#200a0a" stroke="#e05555"/>
  <text x="210" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">무거운 계산 재실행</text>
  <text x="210" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">매 렌더마다 새로 계산</text>

  <line x1="210" y1="212" x2="210" y2="236" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="60" y="238" width="300" height="48" rx="8" fill="#200a0a" stroke="#e05555"/>
  <text x="210" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">성능 저하</text>
  <text x="210" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">불필요한 CPU 사용</text>

  <!-- Divider -->
  <line x1="440" y1="70" x2="440" y2="300" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- With useMemo (right) -->
  <text x="670" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">useMemo 사용</text>

  <rect x="520" y="90" width="300" height="48" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="670" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">부모 리렌더링</text>
  <text x="670" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(어떤 state든 바뀌면)</text>

  <line x1="670" y1="138" x2="670" y2="162" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="520" y="164" width="300" height="48" rx="8" fill="#0a1a20" stroke="#7ec8e3"/>
  <text x="670" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">의존성 배열 비교</text>
  <text x="670" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">deps 변경 여부 체크</text>

  <!-- Conditional branches -->
  <line x1="620" y1="212" x2="580" y2="236" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="580" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">동일</text>

  <line x1="720" y1="212" x2="760" y2="236" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="740" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">변경</text>

  <rect x="520" y="238" width="130" height="48" rx="8" fill="#0a200a" stroke="#55c555"/>
  <text x="585" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">캐시 반환</text>
  <text x="585" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">재계산 생략</text>

  <rect x="670" y="238" width="150" height="48" rx="8" fill="#1a100a" stroke="#ce9178"/>
  <text x="745" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle" font-weight="600">새로 계산</text>
  <text x="745" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">결과 캐시 업데이트</text>

  <!-- Code section -->
  <rect x="60" y="316" width="760" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8">// deps가 바뀔 때만 재계산</tspan></text>
  <text x="76" y="357" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> sortedList = </tspan><tspan fill="#7ec8e3" font-weight="600">useMemo</tspan><tspan fill="#ffffff">(() =&gt; {</tspan></text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> [...items].sort((a, b) =&gt; a.price - b.price);</tspan></text>
  <text x="76" y="395" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">}, [items]);</tspan><tspan fill="#9aa4b8">  // items가 바뀔 때만 sort 실행</tspan></text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"></text>
  <text x="76" y="427" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8">// 다른 state(예: searchText) 변경 시 sort 생략됨</tspan></text>
</svg>
