<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">암묵적 형변환(Coercion) — + 연산자 규칙</text>

  <!-- Left: + operator rules -->
  <text x="210" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3">+ 연산자 (덧셈 vs 문자열 연결)</text>

  <rect x="60" y="88" width="360" height="370" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="110" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 규칙: 피연산자 중 하나가 문자열이면 연결
  </text>
  <text x="76" y="128" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">        </tspan><tspan fill="#9aa4b8">// 3 (숫자 + 숫자)</tspan>
  </text>
  <text x="76" y="146" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">"1"</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">      </tspan><tspan fill="#9aa4b8">// "12" (문자열 연결)</tspan>
  </text>
  <text x="76" y="164" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#ce9178">"2"</tspan><tspan fill="#ffffff">      </tspan><tspan fill="#9aa4b8">// "12" (문자열 연결)</tspan>
  </text>
  <text x="76" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// 2 (true→1)</tspan>
  </text>
  <text x="76" y="200" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#ffffff">   </tspan><tspan fill="#9aa4b8">// 1 (false→0)</tspan>
  </text>
  <text x="76" y="218" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// 1 (null→0)</tspan>
  </text>
  <text x="76" y="236" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#7ec8e3">undefined</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#9aa4b8">// NaN (undefined→NaN)</tspan>
  </text>
  <text x="76" y="254" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> + []       </tspan><tspan fill="#9aa4b8">// "1" ([]→"")</tspan>
  </text>
  <text x="76" y="272" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> + {}       </tspan><tspan fill="#9aa4b8">// "1[object Object]"</tspan>
  </text>
  <text x="76" y="290" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">[] + []     </tspan><tspan fill="#9aa4b8">// ""</tspan>
  </text>
  <text x="76" y="308" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">[] + {}     </tspan><tspan fill="#9aa4b8">// "[object Object]"</tspan>
  </text>
  <text x="76" y="326" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">{} + []     </tspan><tspan fill="#9aa4b8">// 0 ({}가 블록문!)</tspan>
  </text>
  <text x="76" y="362" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// - * / 는 항상 숫자 변환
  </text>
  <text x="76" y="380" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">"6"</tspan><tspan fill="#ffffff"> - </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">      </tspan><tspan fill="#9aa4b8">// 4 (문자열→숫자)</tspan>
  </text>
  <text x="76" y="398" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">"6"</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">      </tspan><tspan fill="#9aa4b8">// 12</tspan>
  </text>
  <text x="76" y="416" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">"abc"</tspan><tspan fill="#ffffff"> - </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// NaN</tspan>
  </text>
  <text x="76" y="434" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff"> + </tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">// 2 (1+1)</tspan>
  </text>

  <!-- Right: == coercion -->
  <text x="660" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#e05555">== 동등 비교 (느슨한 비교)</text>

  <rect x="460" y="88" width="360" height="370" fill="#000000" rx="6" stroke="#e05555" stroke-width="1"/>

  <text x="476" y="110" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// == 는 타입 변환 후 비교
  </text>
  <text x="476" y="128" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">==</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#55c555">// true</tspan><tspan fill="#9aa4b8"> (false→0)</tspan>
  </text>
  <text x="476" y="146" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">""</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">==</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#55c555">// true</tspan><tspan fill="#9aa4b8"> (""→0, false→0)</tspan>
  </text>
  <text x="476" y="164" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">==</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">       </tspan><tspan fill="#55c555">// true</tspan><tspan fill="#9aa4b8"> (""→0)</tspan>
  </text>
  <text x="476" y="182" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">==</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"0"</tspan><tspan fill="#ffffff">      </tspan><tspan fill="#55c555">// true</tspan><tspan fill="#9aa4b8"> ("0"→0)</tspan>
  </text>
  <text x="476" y="200" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">==</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">undefined</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555">// true</tspan><tspan fill="#9aa4b8"> (특별 규칙)</tspan>
  </text>
  <text x="476" y="218" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">==</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">         </tspan><tspan fill="#e05555">// false!</tspan>
  </text>
  <text x="476" y="236" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">[] </tspan><tspan fill="#7ec8e3">==</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#ffffff">     </tspan><tspan fill="#55c555">// true</tspan><tspan fill="#9aa4b8"> ([]→0, false→0)</tspan>
  </text>
  <text x="476" y="254" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">[] </tspan><tspan fill="#7ec8e3">==</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ffffff">![]</tspan><tspan fill="#ffffff">       </tspan><tspan fill="#55c555">// true</tspan><tspan fill="#9aa4b8"> (![]===false, []→0)</tspan>
  </text>
  <text x="476" y="272" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">"1"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">==</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#ffffff">      </tspan><tspan fill="#55c555">// true</tspan><tspan fill="#9aa4b8"> ("1"→1, true→1)</tspan>
  </text>
  <text x="476" y="308" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// === 는 타입+값 모두 비교
  </text>
  <text x="476" y="326" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">===</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#e05555">// false</tspan>
  </text>
  <text x="476" y="344" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">===</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">undefined</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#e05555">// false</tspan>
  </text>
  <text x="476" y="380" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 비교 시 항상 === 사용 권장
  </text>
  <text x="476" y="398" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// null/undefined 체크에만 == null 허용
  </text>
  <text x="476" y="434" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (v </tspan><tspan fill="#7ec8e3">==</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#ffffff">) { ... } </tspan><tspan fill="#9aa4b8">// null||undefined</tspan>
  </text>

  <!-- Bottom legend -->
  <text x="440" y="476" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">+ 연산: 문자열 있으면 연결, 없으면 숫자 덧셈 | - * /: 항상 숫자 변환 | ==: 타입 변환 후 비교 → 버그 주의</text>
</svg>
