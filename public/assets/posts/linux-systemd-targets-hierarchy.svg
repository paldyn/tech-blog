<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">systemd 타겟 계층</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">부팅 시 타겟 체인</text>

  <!-- graphical.target at top -->
  <rect x="300" y="88" width="280" height="50" fill="#0d1929" rx="8" stroke="#1e3a5f" stroke-width="2"/>
  <text x="440" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">graphical.target</text>

  <!-- Arrow -->
  <line x1="440" y1="138" x2="440" y2="155" stroke="#555" stroke-width="2"/>
  <polygon points="435,155 440,165 445,155" fill="#555"/>

  <!-- multi-user.target -->
  <rect x="300" y="165" width="280" height="50" fill="#0d200d" rx="8" stroke="#2d4a1e" stroke-width="2"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">multi-user.target</text>

  <!-- Arrow -->
  <line x1="440" y1="215" x2="440" y2="232" stroke="#555" stroke-width="2"/>
  <polygon points="435,232 440,242 445,232" fill="#555"/>

  <!-- basic.target -->
  <rect x="300" y="242" width="280" height="50" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">basic.target</text>

  <!-- Arrow -->
  <line x1="440" y1="292" x2="440" y2="309" stroke="#555" stroke-width="2"/>
  <polygon points="435,309 440,319 445,309" fill="#555"/>

  <!-- sysinit.target -->
  <rect x="300" y="319" width="280" height="50" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">sysinit.target</text>

  <!-- Side: special targets -->
  <rect x="60" y="165" width="210" height="100" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="165" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">특수 타겟</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">rescue.target</text>
  <text x="76" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단일 사용자 복구 모드</text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">emergency.target</text>
  <text x="76" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">최소 환경 (root 셸만)</text>

  <!-- Side: runlevel comparison -->
  <rect x="610" y="88" width="210" height="220" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="715" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SysV 런레벨 대응</text>

  <text x="626" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">runlevel0</text>
  <text x="730" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ poweroff.target</text>
  <text x="626" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">runlevel1</text>
  <text x="730" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ rescue.target</text>
  <text x="626" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">runlevel3</text>
  <text x="730" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ multi-user</text>
  <text x="626" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">runlevel5</text>
  <text x="730" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">→ graphical</text>
  <text x="626" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">runlevel6</text>
  <text x="730" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ reboot.target</text>

  <line x1="626" y1="228" x2="800" y2="228" stroke="#3a4a6e" stroke-width="1"/>
  <text x="715" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">호환 심볼릭 링크</text>
  <text x="715" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">runlevel3.target</text>
  <text x="715" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">→ multi-user.target</text>
  <text x="715" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(호환성용 심볼릭 링크)</text>

  <!-- systemctl isolate -->
  <rect x="60" y="396" width="760" height="72" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">타겟 전환 명령</text>
  <text x="76" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ systemctl isolate multi-user.target</text><text x="456" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # GUI → 텍스트 모드</text>
  <text x="76" y="458" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ systemctl isolate rescue.target</text><text x="426" y="458" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">       # 복구 모드로 전환</text>

  <text x="440" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">isolate는 AllowIsolate=yes 인 타겟만 가능</text>
</svg>
