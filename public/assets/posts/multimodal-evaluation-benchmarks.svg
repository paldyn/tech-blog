<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">멀티모달 벤치마크 분류</text>
  <text x="440" y="70" font-size="13" fill="#888" text-anchor="middle">시각·언어 이해 능력을 측정하는 주요 평가 데이터셋</text>

  <!-- ===== ROW 1: 인식 능력 ===== -->
  <!-- Category label box -->
  <rect x="40" y="96" width="140" height="52" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="110" y="117" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">인식 능력</text>
  <text x="110" y="136" font-size="11" fill="#888" text-anchor="middle">Perception</text>

  <!-- Items row 1 -->
  <rect x="204" y="96" width="140" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="274" y="117" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">VQA v2</text>
  <text x="274" y="136" font-size="11" fill="#888" text-anchor="middle">시각적 질의응답</text>

  <rect x="360" y="96" width="140" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="430" y="117" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">GQA</text>
  <text x="430" y="136" font-size="11" fill="#888" text-anchor="middle">합성형 질의응답</text>

  <rect x="516" y="96" width="140" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="586" y="117" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">TextVQA</text>
  <text x="586" y="136" font-size="11" fill="#888" text-anchor="middle">이미지 내 텍스트</text>

  <rect x="672" y="96" width="168" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="756" y="117" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">OCRBench</text>
  <text x="756" y="136" font-size="11" fill="#888" text-anchor="middle">문서 OCR 인식</text>

  <!-- ===== ROW 2: 추론 능력 ===== -->
  <rect x="40" y="172" width="140" height="52" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="110" y="193" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">추론 능력</text>
  <text x="110" y="212" font-size="11" fill="#888" text-anchor="middle">Reasoning</text>

  <rect x="204" y="172" width="140" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="274" y="193" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">MMMU</text>
  <text x="274" y="212" font-size="11" fill="#888" text-anchor="middle">대학원 수준 이해</text>

  <rect x="360" y="172" width="140" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="430" y="193" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">MMStar</text>
  <text x="430" y="212" font-size="11" fill="#888" text-anchor="middle">시각 추론 집중</text>

  <rect x="516" y="172" width="140" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="586" y="193" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">ScienceQA</text>
  <text x="586" y="212" font-size="11" fill="#888" text-anchor="middle">과학 질문 응답</text>

  <rect x="672" y="172" width="168" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="756" y="193" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">MathVista</text>
  <text x="756" y="212" font-size="11" fill="#888" text-anchor="middle">수학적 시각 추론</text>

  <!-- ===== ROW 3: 종합 평가 ===== -->
  <rect x="40" y="248" width="140" height="52" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5" rx="8"/>
  <text x="110" y="269" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">종합 평가</text>
  <text x="110" y="288" font-size="11" fill="#888" text-anchor="middle">Comprehensive</text>

  <rect x="204" y="248" width="140" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="274" y="269" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">MMBench</text>
  <text x="274" y="288" font-size="11" fill="#888" text-anchor="middle">18가지 능력 평가</text>

  <rect x="360" y="248" width="140" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="430" y="269" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">MM-Vet</text>
  <text x="430" y="288" font-size="11" fill="#888" text-anchor="middle">통합 능력 평가</text>

  <rect x="516" y="248" width="140" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="586" y="269" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">SEED-Bench</text>
  <text x="586" y="288" font-size="11" fill="#888" text-anchor="middle">다양한 시각 작업</text>

  <rect x="672" y="248" width="168" height="52" fill="#111" stroke="#333" stroke-width="1" rx="6"/>
  <text x="756" y="269" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">LLaVA-Bench</text>
  <text x="756" y="288" font-size="11" fill="#888" text-anchor="middle">오픈엔드 대화 평가</text>

  <!-- Bottom legend -->
  <rect x="40" y="328" width="800" height="36" fill="#111" stroke="#222" stroke-width="1" rx="6"/>
  <circle cx="80" cy="346" r="6" fill="#55c555"/>
  <text x="94" y="351" font-size="12" fill="#888">인식: 이미지에서 정보 추출</text>
  <circle cx="290" cy="346" r="6" fill="#7777cc"/>
  <text x="304" y="351" font-size="12" fill="#888">추론: 복합 지식 + 시각 결합</text>
  <circle cx="520" cy="346" r="6" fill="#e05555"/>
  <text x="534" y="351" font-size="12" fill="#888">종합: 다양한 능력 전반 평가</text>
</svg>
