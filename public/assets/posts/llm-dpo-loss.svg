<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DPO 손실 함수</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">보상 모델 없이 선호도를 직접 최적화하는 수식 구조</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="252" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text xml:space="preserve" x="84" y="112" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0"> 1</text>
  <text xml:space="preserve" x="108" y="112" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#7ec8e3">from</text>
  <text xml:space="preserve" x="140" y="112" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8"> trl </text>
  <text xml:space="preserve" x="166" y="112" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#7ec8e3">import</text>
  <text xml:space="preserve" x="214" y="112" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8"> DPOTrainer, DPOConfig</text>

  <text xml:space="preserve" x="84" y="130" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0"> 2</text>

  <text xml:space="preserve" x="84" y="148" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0"> 3</text>
  <text xml:space="preserve" x="108" y="148" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">config = DPOConfig(</text>

  <text xml:space="preserve" x="84" y="166" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0"> 4</text>
  <text xml:space="preserve" x="108" y="166" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">    model_name_or_path=</text>
  <text xml:space="preserve" x="278" y="166" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ce9178">"sft-model"</text>
  <text xml:space="preserve" x="366" y="166" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">,</text>

  <text xml:space="preserve" x="84" y="184" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0"> 5</text>
  <text xml:space="preserve" x="108" y="184" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">    beta=</text>
  <text xml:space="preserve" x="158" y="184" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#b5cea8">0.1</text>
  <text xml:space="preserve" x="188" y="184" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">,          </text>
  <text xml:space="preserve" x="316" y="184" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0"># KL 페널티 강도</text>

  <text xml:space="preserve" x="84" y="202" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0"> 6</text>
  <text xml:space="preserve" x="108" y="202" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">    loss_type=</text>
  <text xml:space="preserve" x="198" y="202" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#ce9178">"sigmoid"</text>
  <text xml:space="preserve" x="282" y="202" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">,</text>

  <text xml:space="preserve" x="84" y="220" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0"> 7</text>
  <text xml:space="preserve" x="108" y="220" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">    learning_rate=</text>
  <text xml:space="preserve" x="238" y="220" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#b5cea8">5e-7</text>
  <text xml:space="preserve" x="274" y="220" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">,</text>

  <text xml:space="preserve" x="84" y="238" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0"> 8</text>
  <text xml:space="preserve" x="108" y="238" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">    per_device_train_batch_size=</text>
  <text xml:space="preserve" x="348" y="238" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#b5cea8">4</text>
  <text xml:space="preserve" x="358" y="238" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">,</text>

  <text xml:space="preserve" x="84" y="256" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0"> 9</text>
  <text xml:space="preserve" x="108" y="256" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">    num_train_epochs=</text>
  <text xml:space="preserve" x="258" y="256" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#b5cea8">3</text>
  <text xml:space="preserve" x="268" y="256" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">,</text>

  <text xml:space="preserve" x="84" y="274" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0">10</text>
  <text xml:space="preserve" x="108" y="274" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">)</text>

  <text xml:space="preserve" x="84" y="292" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0">11</text>
  <text xml:space="preserve" x="108" y="292" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">trainer = DPOTrainer(</text>

  <text xml:space="preserve" x="84" y="310" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0">12</text>
  <text xml:space="preserve" x="108" y="310" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">    model=model, ref_model=ref_model,</text>

  <text xml:space="preserve" x="84" y="328" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#6a8aa0">13</text>
  <text xml:space="preserve" x="108" y="328" font-family="JetBrains Mono,Consolas,monospace" font-size="13" fill="#e8e8e8">    args=config, train_dataset=dataset,</text>

  <!-- Formula section -->
  <rect x="60" y="356" width="760" height="100" fill="#0d1520" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">DPO 손실 함수 수식</text>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">L_DPO = -E[ log σ( β·log(π_θ(y_w|x)/π_ref(y_w|x)) - β·log(π_θ(y_l|x)/π_ref(y_l|x)) ) ]</text>
  <text x="200" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">π_θ: 학습 중인 정책</text>
  <text x="400" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">π_ref: 고정된 SFT 모델</text>
  <text x="600" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">β: KL 페널티 강도 (기본 0.1)</text>

  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">y_w = 선호 응답(chosen), y_l = 거부 응답(rejected), σ = 시그모이드 함수</text>
</svg>
