<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메모이제이션 동작 원리</text>

  <!-- Without memoization -->
  <text x="200" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">메모이제이션 없음 — 중복 계산</text>

  <rect x="80" y="92" width="240" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">fib(5)</text>

  <!-- fib(4) and fib(3) -->
  <rect x="60" y="148" width="120" height="32" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="120" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">fib(4)</text>
  <rect x="220" y="148" width="120" height="32" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="280" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">fib(3)</text>

  <defs>
    <marker id="mf" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#888"/>
    </marker>
  </defs>
  <line x1="176" y1="128" x2="140" y2="148" stroke="#888" stroke-width="1.5" marker-end="url(#mf)"/>
  <line x1="224" y1="128" x2="260" y2="148" stroke="#888" stroke-width="1.5" marker-end="url(#mf)"/>

  <!-- Repeated fib(3) highlighted -->
  <rect x="30" y="202" width="100" height="28" rx="4" fill="#1a0a0a" stroke="#888" stroke-width="1"/>
  <text x="80" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">fib(3)</text>
  <rect x="150" y="202" width="100" height="28" rx="4" fill="#3a1515" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" text-anchor="middle">fib(2) ×2</text>
  <rect x="270" y="202" width="100" height="28" rx="4" fill="#3a1515" stroke="#e05555" stroke-width="1.5"/>
  <text x="320" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" text-anchor="middle">fib(2) ×중복</text>

  <text x="200" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">fib(n) 호출 횟수 ≈ 2^n (지수 증가)</text>

  <!-- With memoization -->
  <text x="640" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">메모이제이션 — 캐시 활용</text>

  <rect x="540" y="92" width="240" height="36" rx="6" fill="#0f2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">fib(5) → 캐시 미스</text>

  <rect x="540" y="148" width="240" height="32" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">fib(4) + fib(3)</text>

  <rect x="540" y="202" width="240" height="32" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">fib(3) → 캐시 히트!</text>

  <rect x="540" y="250" width="240" height="32" rx="6" fill="#1a2a1a" stroke="#b5cea8" stroke-width="1"/>
  <text x="660" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" text-anchor="middle">이미 계산됨 — 즉시 반환</text>

  <text x="660" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">fib(n) 호출 횟수 = n (선형)</text>

  <!-- Code example -->
  <rect x="60" y="324" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> functools </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> lru_cache</tspan>
  </text>
  <text x="76" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#55c555">@lru_cache(maxsize=</tspan>
    <tspan fill="#7ec8e3" font-weight="600">None</tspan>
    <tspan fill="#55c555">)</tspan>
    <tspan fill="#9aa4b8">  # 무제한 캐시</tspan>
  </text>
  <text x="76" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> fib(n): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> n </tspan>
    <tspan fill="#7ec8e3" font-weight="600">if</tspan>
    <tspan fill="#ffffff"> n &lt; </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">else</tspan>
    <tspan fill="#ffffff"> fib(n-</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">) + fib(n-</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="76" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># fib.cache_info() → CacheInfo(hits=N, misses=N, maxsize=None, currsize=N)</tspan>
  </text>
</svg>
