<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">systemd-resolved DNS 해석 흐름</text>

  <!-- Application -->
  <rect x="330" y="66" width="220" height="52" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">애플리케이션</text>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">getaddrinfo() / DNS lookup</text>

  <!-- Arrow down -->
  <line x1="440" y1="118" x2="440" y2="152" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- NSS / stub resolver -->
  <rect x="280" y="152" width="320" height="52" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">127.0.0.53:53</text>
  <text x="440" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">systemd-resolved stub 리스너</text>

  <!-- Arrow -->
  <line x1="440" y1="204" x2="440" y2="238" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">캐시 miss 시</text>

  <!-- Resolved daemon -->
  <rect x="240" y="238" width="400" height="64" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">systemd-resolved 데몬</text>
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DNSSEC 검증 · mDNS · LLMNR · 캐시 관리</text>

  <!-- Two branches -->
  <line x1="330" y1="302" x2="180" y2="348" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="550" y1="302" x2="700" y2="348" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Upstream DNS -->
  <rect x="80" y="348" width="200" height="52" rx="8" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="180" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">업스트림 DNS</text>
  <text x="180" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">8.8.8.8, 1.1.1.1 등</text>

  <!-- mDNS -->
  <rect x="600" y="348" width="200" height="52" rx="8" fill="#1a100d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="700" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">mDNS / LLMNR</text>
  <text x="700" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로컬 네트워크 이름 해석</text>

  <!-- resolv.conf note -->
  <rect x="240" y="420" width="400" height="30" rx="6" fill="#1a1a0d" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/etc/resolv.conf → symlink to stub-resolv.conf</text>
</svg>
