<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">루프 함정 2-4</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa" text-anchor="middle">인덱스 오류 · 루프 안 무거운 연산 · range(len) 안티패턴</text>

  <!-- Pitfall: range(len) antipattern -->
  <text x="60" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">안티패턴: range(len()) 남용</text>
  <rect x="60" y="108" width="360" height="130" rx="6" fill="#070b14" stroke="#e05555" stroke-width="1"/>
  <text x="76" y="131" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555"># 나쁜 예</text>
  <text x="76" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for</text>
  <text x="106" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> i </text>
  <text x="124" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">in</text>
  <text x="142" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> range</text>
  <text x="178" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text>
  <text x="185" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">len</text>
  <text x="215" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(items)):</text>
  <text x="76" y="167" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    print</text>
  <text x="136" y="167" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(items[i])</text>
  <text x="76" y="193" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"># 좋은 예</text>
  <text x="76" y="211" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for</text>
  <text x="106" y="211" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> item </text>
  <text x="148" y="211" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">in</text>
  <text x="166" y="211" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> items:</text>
  <text x="76" y="229" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    print</text>
  <text x="136" y="229" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(item)</text>

  <!-- Pitfall: heavy operation in loop condition -->
  <text x="460" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">함정: 루프 조건에서 반복 계산</text>
  <rect x="460" y="108" width="360" height="130" rx="6" fill="#070b14" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="131" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555"># 나쁜: len() 매 반복 호출</text>
  <text x="476" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for</text>
  <text x="506" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> i </text>
  <text x="524" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">in</text>
  <text x="542" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> range</text>
  <text x="578" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(</text>
  <text x="585" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">len</text>
  <text x="615" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">(db.all())):</text>
  <text x="476" y="167" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    # db.all() 매번 쿼리!</text>
  <text x="476" y="193" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"># 좋은: 미리 계산</text>
  <text x="476" y="211" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">all_items = db.all()</text>
  <text x="476" y="229" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for</text>
  <text x="506" y="229" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> item </text>
  <text x="548" y="229" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">in</text>
  <text x="566" y="229" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> all_items:</text>

  <!-- Summary table -->
  <rect x="60" y="262" width="760" height="140" rx="8" fill="#111827" stroke="#2a3444"/>
  <text x="80" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">루프 함정 체크리스트</text>

  <rect x="80" y="300" width="10" height="10" rx="2" fill="#e05555"/>
  <text x="98" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"><tspan font-weight="700" fill="#e05555">순회 중 수정</tspan> — 리스트/딕셔너리를 순회하면서 add/remove/del → 컴프리헨션 또는 복사본 순회</text>

  <rect x="80" y="322" width="10" height="10" rx="2" fill="#e05555"/>
  <text x="98" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"><tspan font-weight="700" fill="#e05555">클로저 캡처</tspan> — 람다/함수가 루프 변수 참조 → 기본 인수 바인딩(i=i) 또는 functools.partial</text>

  <rect x="80" y="344" width="10" height="10" rx="2" fill="#e8a838"/>
  <text x="98" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"><tspan font-weight="700" fill="#e8a838">range(len) 안티패턴</tspan> — 값만 필요하면 직접 순회, 인덱스 필요하면 enumerate()</text>

  <rect x="80" y="366" width="10" height="10" rx="2" fill="#e8a838"/>
  <text x="98" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"><tspan font-weight="700" fill="#e8a838">루프 안 비싼 연산</tspan> — DB 쿼리, 파일 열기, 정규식 컴파일 등을 루프 밖으로 호이스팅</text>

  <rect x="80" y="388" width="10" height="10" rx="2" fill="#7777cc"/>
  <text x="98" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"><tspan font-weight="700" fill="#7777cc">루프 변수 누출</tspan> — for 종료 후에도 변수 살아있음, 의도치 않은 재사용 주의</text>
</svg>
