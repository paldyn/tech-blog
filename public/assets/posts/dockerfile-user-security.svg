<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" role="img" aria-label="USER 인스트럭션 보안 효과">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">USER 인스트럭션 — 루트 탈피의 보안 효과</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">컨테이너 탈출 시 호스트 피해 범위 차이</text>

  <!-- Without USER (root) -->
  <rect x="60" y="95" width="340" height="300" rx="8" fill="#1a0808" stroke="#3d1e1e" stroke-width="1.5"/>
  <text x="230" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">USER 없음 (root로 실행)</text>

  <!-- Container icon -->
  <rect x="80" y="134" width="300" height="120" rx="6" fill="#111318" stroke="#3d1e1e" stroke-width="1"/>
  <text x="230" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨테이너</text>
  <text x="230" y="184" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">UID: 0 (root)</text>
  <text x="230" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 권한 보유</text>
  <text x="230" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일시스템 전체 접근 가능</text>

  <!-- Exploit arrow -->
  <line x1="230" y1="258" x2="230" y2="300" stroke="#e05555" stroke-width="2.5"/>
  <polygon points="224,300 230,316 236,300" fill="#e05555"/>
  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">컨테이너 탈출</text>

  <!-- Host impact -->
  <rect x="80" y="316" width="300" height="60" rx="6" fill="#2a0808" stroke="#5d2a2a" stroke-width="1"/>
  <text x="230" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">호스트: root 권한 획득</text>
  <text x="230" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">시스템 완전 장악 가능</text>

  <!-- With USER -->
  <rect x="480" y="95" width="340" height="300" rx="8" fill="#081808" stroke="#1e3d1e" stroke-width="1.5"/>
  <text x="650" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">USER appuser (비루트)</text>

  <!-- Container icon -->
  <rect x="500" y="134" width="300" height="120" rx="6" fill="#111318" stroke="#1e3d1e" stroke-width="1"/>
  <text x="650" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨테이너</text>
  <text x="650" y="184" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">UID: 1001 (appuser)</text>
  <text x="650" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제한된 권한</text>
  <text x="650" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">/app 만 접근 가능</text>

  <!-- Exploit arrow -->
  <line x1="650" y1="258" x2="650" y2="300" stroke="#888" stroke-width="2.5"/>
  <polygon points="644,300 650,316 656,300" fill="#888"/>
  <text x="660" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨테이너 탈출</text>

  <!-- Host impact -->
  <rect x="500" y="316" width="300" height="60" rx="6" fill="#0d200d" stroke="#1e3d1e" stroke-width="1"/>
  <text x="650" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">호스트: 권한 없는 사용자</text>
  <text x="650" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">피해 범위 대폭 축소</text>

  <!-- Bottom note -->
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">비루트 사용자 실행은 컨테이너 보안의 가장 기본이며 가장 효과적인 방어선이다</text>
</svg>
