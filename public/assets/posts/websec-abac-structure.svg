<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-v" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ABAC: 속성 기반 접근 제어 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Attribute-Based Access Control — 4가지 속성으로 동적 정책 결정</text>

  <!-- Subject Box -->
  <rect x="60" y="100" width="180" height="80" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">주체 (Subject)</text>
  <text x="150" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">role=admin</text>
  <text x="150" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dept=finance, age=30</text>

  <!-- Object Box -->
  <rect x="640" y="100" width="180" height="80" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">객체 (Object)</text>
  <text x="730" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">type=report</text>
  <text x="730" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">classification=confidential</text>

  <!-- Environment Box -->
  <rect x="350" y="100" width="180" height="80" rx="8" fill="#0f1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">환경 (Environment)</text>
  <text x="440" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">time=09:00~18:00</text>
  <text x="440" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ip=192.168.1.0/24</text>

  <!-- PDP Box (center) -->
  <rect x="330" y="240" width="220" height="80" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">PDP</text>
  <text x="440" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Policy Decision Point</text>
  <text x="440" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정책 평가 엔진</text>

  <!-- Arrows from subject/env/object to PDP -->
  <line x1="150" y1="180" x2="150" y2="240" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="150" y1="240" x2="330" y2="280" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="440" y1="180" x2="440" y2="240" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="730" y1="180" x2="730" y2="240" stroke="#55c555" stroke-width="1.5"/>
  <line x1="730" y1="240" x2="550" y2="280" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Policy Store -->
  <rect x="60" y="240" width="180" height="80" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="150" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">정책 저장소</text>
  <text x="150" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Policy Store</text>
  <text x="150" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">XACML / OPA 규칙</text>

  <line x1="240" y1="280" x2="330" y2="280" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Decision Result -->
  <rect x="350" y="376" width="180" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Permit / Deny</text>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">접근 허가 또는 거부</text>

  <line x1="440" y1="320" x2="440" y2="376" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- PEP -->
  <rect x="640" y="376" width="180" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="730" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">PEP</text>
  <text x="730" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Policy Enforcement Point</text>

  <line x1="530" y1="406" x2="640" y2="406" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ABAC vs RBAC note -->
  <rect x="60" y="376" width="235" height="60" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="177" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RBAC: 역할만으로 결정</text>
  <text x="177" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">ABAC: 다양한 속성 조합으로 결정</text>

  <!-- Footer -->
  <rect x="60" y="460" width="760" height="38" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">ABAC = Subject·Object·Action·Environment 속성을 조합한 세밀한 동적 접근 제어</text>
</svg>
