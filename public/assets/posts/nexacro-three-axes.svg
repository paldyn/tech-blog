<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">넥사크로를 구성하는 3가지 축</text>
  <text x="440" y="82" text-anchor="middle" font-size="13" fill="#666">화면 · 데이터 · 서버 연동이 하나의 흐름으로 묶인다</text>

  <!-- Axis 1: 화면 -->
  <rect x="60" y="120" width="246" height="232" rx="12" fill="#0e1620" stroke="#22405a" stroke-width="1.5"/>
  <text x="183" y="156" text-anchor="middle" font-size="13" fill="#7799cc" font-weight="600">1. 화면 (Form)</text>
  <line x1="92" y1="172" x2="274" y2="172" stroke="#1a2a3a" stroke-width="1"/>
  <rect x="92" y="186" width="182" height="142" rx="6" fill="#070b14" stroke="#1a2a40" stroke-width="1"/>
  <text x="106" y="212" font-size="12" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">Form</text>
  <text x="124" y="234" font-size="12" fill="#7799cc" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">├ Button</text>
  <text x="124" y="254" font-size="12" fill="#7799cc" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">├ Edit</text>
  <text x="124" y="274" font-size="12" fill="#7799cc" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">├ Grid</text>
  <text x="124" y="294" font-size="12" fill="#7799cc" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">└ Combo</text>
  <text x="106" y="318" font-size="11" fill="#556">onload · onclick</text>

  <!-- Axis 2: 데이터 -->
  <rect x="318" y="120" width="246" height="232" rx="12" fill="#0e1a0e" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="441" y="156" text-anchor="middle" font-size="13" fill="#66cc88" font-weight="600">2. 데이터 (Dataset)</text>
  <line x1="350" y1="172" x2="532" y2="172" stroke="#1a3a1a" stroke-width="1"/>
  <rect x="350" y="186" width="182" height="142" rx="6" fill="#080f08" stroke="#1a3a1a" stroke-width="1"/>
  <text x="364" y="212" font-size="12" fill="#aaddaa" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">Dataset</text>
  <text x="378" y="238" font-size="11" fill="#666">컬럼/행 구조</text>
  <text x="378" y="258" font-size="11" fill="#666">행 상태 추적</text>
  <text x="378" y="278" font-size="11" fill="#666">컴포넌트 바인딩</text>
  <text x="378" y="298" font-size="11" fill="#666">정렬·필터·집계</text>
  <text x="364" y="322" font-size="11" fill="#556">신규 · 수정 · 삭제</text>

  <!-- Axis 3: 서버 연동 -->
  <rect x="576" y="120" width="246" height="232" rx="12" fill="#1a1408" stroke="#4a3a1a" stroke-width="1.5"/>
  <text x="699" y="156" text-anchor="middle" font-size="13" fill="#cc8855" font-weight="600">3. 서버 연동 (Transaction)</text>
  <line x1="608" y1="172" x2="790" y2="172" stroke="#3a2a0a" stroke-width="1"/>
  <rect x="608" y="186" width="182" height="142" rx="6" fill="#0f0a05" stroke="#3a2a0a" stroke-width="1"/>
  <text x="622" y="212" font-size="12" fill="#ddbb88" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">transaction()</text>
  <text x="636" y="238" font-size="11" fill="#666">요청 URL</text>
  <text x="636" y="258" font-size="11" fill="#666">in / out Dataset</text>
  <text x="636" y="278" font-size="11" fill="#666">인자값</text>
  <text x="636" y="298" font-size="11" fill="#666">성공/실패 콜백</text>
  <text x="622" y="322" font-size="11" fill="#556">백엔드와 데이터 계약</text>

  <!-- Flow arrows between axes -->
  <line x1="306" y1="236" x2="316" y2="236" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="564" y1="236" x2="574" y2="236" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bottom flow narrative -->
  <line x1="60" y1="384" x2="820" y2="384" stroke="#222" stroke-width="1"/>
  <text x="440" y="416" text-anchor="middle" font-size="12" fill="#888">사용자 입력 → Dataset에 반영 → Transaction으로 서버 동기화 → 응답을 다시 Dataset에</text>
  <text x="440" y="450" text-anchor="middle" font-size="11" fill="#555">세 축이 단단히 묶여 있어, 화면 한 장이 아니라 운영 가능한 업무 시스템이 만들어진다</text>
  <text x="440" y="478" text-anchor="middle" font-size="10" fill="#444" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">Form ↔ Dataset ↔ Transaction</text>
</svg>
