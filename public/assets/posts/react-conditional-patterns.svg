<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">조건부 렌더링 4가지 패턴</text>

  <!-- Pattern 1: if/else -->
  <rect x="60" y="72" width="370" height="108" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① if / else — 얼리 리턴</text>
  <rect x="80" y="108" width="330" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan> (isLoading) </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> &lt;Spinner /&gt;;</tspan>
  </text>
  <text x="96" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan> (error) </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> &lt;ErrorMsg msg={error} /&gt;;</tspan>
  </text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로딩/에러 가드에 최적. 코드가 선형적으로 읽힘</text>

  <!-- Pattern 2: ternary -->
  <rect x="450" y="72" width="370" height="108" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">② 삼항 연산자 — 두 가지 중 하나</text>
  <rect x="470" y="108" width="330" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">
    <tspan>{isLoggedIn ? &lt;Dashboard /&gt; : &lt;Login /&gt;}</tspan>
  </text>
  <text x="486" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">
    {/* A와 B 중 하나만 렌더할 때 */}
  </text>
  <text x="470" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JSX 인라인에 사용 가능. 중첩하면 가독성 급락</text>

  <!-- Pattern 3: && -->
  <rect x="60" y="208" width="370" height="108" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">③ &amp;&amp; 단축 평가 — 있거나 없거나</text>
  <rect x="80" y="244" width="330" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">
    <tspan>{hasNew &amp;&amp; &lt;Badge&gt;NEW&lt;/Badge&gt;}</tspan>
  </text>
  <text x="96" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">
    <tspan>{count &amp;&amp; &lt;Badge&gt;{count}&lt;/Badge&gt;}  </tspan><tspan fill="#9aa4b8">{/* ⚠ count=0 */}</tspan>
  </text>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">주의: 0, NaN, "" 같은 falsy는 0을 렌더함. Boolean() 변환 필요</text>

  <!-- Pattern 4: variable -->
  <rect x="450" y="208" width="370" height="108" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="470" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">④ 변수에 JSX 저장</text>
  <rect x="470" y="244" width="330" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan> content;</tspan>
  </text>
  <text x="486" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan> (a) content = &lt;A /&gt;;</tspan>
  </text>
  <text x="470" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">else-if 체인이 필요할 때. 복잡 로직을 JSX 밖으로 분리</text>

  <!-- null to hide -->
  <rect x="60" y="350" width="760" height="110" rx="8" fill="#141414" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">null과 false를 반환하면 아무것도 렌더되지 않는다</text>
  <rect x="80" y="386" width="720" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Banner({ show }) {</tspan>
  </text>
  <text x="100" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan> (!show) </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan>;  </tspan>
    <tspan fill="#9aa4b8">{/* DOM에서 완전히 제거됨 */}</tspan>
  </text>
  <text x="100" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> &lt;div className=</tspan><tspan fill="#ce9178">"banner"</tspan><tspan>&gt;공지사항&lt;/div&gt;;</tspan>
  </text>
</svg>
