<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL Server 파일 구조</text>

  <!-- Database -->
  <rect x="60" y="68" width="760" height="340" rx="10" fill="#0a0f1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">데이터베이스 (AdventureWorks)</text>

  <!-- FileGroup PRIMARY -->
  <rect x="80" y="102" width="400" height="150" rx="8" fill="#0f1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="280" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">FileGroup: PRIMARY</text>

  <rect x="100" y="136" width="160" height="50" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">AdventureWorks.mdf</text>
  <text x="180" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">주 데이터 파일</text>

  <rect x="280" y="136" width="160" height="50" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="360" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">AW_data1.ndf</text>
  <text x="360" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">보조 데이터 파일 (선택)</text>

  <text x="280" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시스템 테이블, 기본 사용자 테이블</text>

  <!-- FileGroup USERDATA -->
  <rect x="80" y="264" width="400" height="120" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="280" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">FileGroup: USERDATA (사용자 정의)</text>

  <rect x="100" y="298" width="160" height="50" rx="6" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">AW_fg1.ndf</text>
  <text x="180" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SSD 드라이브 D:\</text>

  <rect x="280" y="298" width="160" height="50" rx="6" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="360" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">AW_fg2.ndf</text>
  <text x="360" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SSD 드라이브 E:\</text>

  <!-- Log file -->
  <rect x="500" y="102" width="300" height="150" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">트랜잭션 로그</text>

  <rect x="520" y="136" width="260" height="50" rx="6" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="650" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">AdventureWorks.ldf</text>
  <text x="650" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로그 레코드 (VLF 단위)</text>

  <!-- VLF structure -->
  <text x="650" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">VLF (Virtual Log File)</text>
  <rect x="520" y="216" width="50" height="20" rx="3" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="545" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">VLF1</text>
  <rect x="575" y="216" width="50" height="20" rx="3" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="600" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">VLF2</text>
  <rect x="630" y="216" width="50" height="20" rx="3" fill="#0a200a" stroke="#55c555" stroke-width="1"/>
  <text x="655" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">VLF3</text>
  <rect x="685" y="216" width="50" height="20" rx="3" fill="#0a200a" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">Active</text>
  <rect x="740" y="216" width="40" height="20" rx="3" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="760" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Free</text>

  <!-- FILESTREAM -->
  <rect x="500" y="264" width="300" height="120" rx="8" fill="#1a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">FileGroup: FILESTREAM (선택)</text>
  <text x="650" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">VARBINARY(MAX) FILESTREAM 컬럼</text>
  <text x="650" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OS 파일 시스템에 직접 저장</text>
  <text x="650" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">트랜잭션 일관성 보장</text>

  <!-- Code block -->
  <rect x="60" y="428" width="760" height="74" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 파일 정보 조회</text>
  <text xml:space="preserve" x="80" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> name, type_desc, physical_name, size*</tspan><tspan fill="#b5cea8">8</tspan><tspan fill="#ffffff">/</tspan><tspan fill="#b5cea8">1024</tspan><tspan fill="#ffffff"> size_mb,</tspan></text>
  <text xml:space="preserve" x="80" y="488" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">       max_size, growth, data_space_id </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> sys.database_files;</tspan></text>
</svg>
