<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">버전 지정자가 뜻하는 범위</text>

  <rect x="60" y="86" width="760" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">requests==2.31.0</text>
  <text xml:space="preserve" x="430" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 정확히 그 버전 (고정)</text>

  <text xml:space="preserve" x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">requests&gt;=2.31</text>
  <text xml:space="preserve" x="430" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 2.31 이상 모두</text>

  <text xml:space="preserve" x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">requests~=2.31.0</text>
  <text xml:space="preserve" x="430" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 2.31.* 호환 (패치 허용)</text>

  <text xml:space="preserve" x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">requests&gt;=2.0,&lt;3.0</text>
  <text xml:space="preserve" x="430" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 메이저 2 대역만</text>

  <text xml:space="preserve" x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">requests</text>
  <text xml:space="preserve" x="430" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555"># 무제한 — 재현성 위험</text>

  <text x="60" y="290" font-size="13" fill="#888" xml:space="preserve">  넓게 허용할수록 업데이트가 쉽지만, 어느 날 빌드가 깨질 위험도 커진다.</text>
</svg>
