<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">모든 모델은 fit → predict</text>

  <defs>
    <marker id="skar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="96" width="200" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">학습 데이터</text>
  <text x="160" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">X_train, y_train</text>
  <text x="160" y="168" font-size="12" fill="#888" text-anchor="middle">특징 + 정답</text>

  <line x1="260" y1="136" x2="316" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#skar)"/>
  <text x="290" y="118" font-size="12" fill="#7ec8e3" text-anchor="middle">fit</text>

  <rect x="320" y="96" width="200" height="80" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="420" y="124" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">학습된 모델</text>
  <text x="420" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">model</text>
  <text x="420" y="168" font-size="12" fill="#888" text-anchor="middle">패턴을 내부에 저장</text>

  <line x1="520" y1="136" x2="576" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#skar)"/>
  <text x="548" y="118" font-size="12" fill="#7ec8e3" text-anchor="middle">predict</text>

  <rect x="580" y="96" width="240" height="80" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="124" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">예측</text>
  <text x="700" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">model.predict(X_new)</text>
  <text x="700" y="168" font-size="12" fill="#888" text-anchor="middle">새 데이터의 정답 추정</text>

  <rect x="60" y="208" width="760" height="44" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="236" font-size="14" fill="#55c555" text-anchor="middle">선형회귀든 랜덤포레스트든 — estimator라면 .fit()과 .predict() 인터페이스가 같다</text>
</svg>
