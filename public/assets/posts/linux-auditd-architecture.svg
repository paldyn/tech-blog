<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">auditd 아키텍처 — 감사 이벤트 흐름</text>

  <!-- 커널 영역 -->
  <rect x="60" y="70" width="760" height="90" rx="8" fill="#0a1420" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">커널 영역</text>
  <rect x="100" y="106" width="160" height="40" rx="5" fill="#112233" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Audit Subsystem</text>
  <rect x="290" y="106" width="160" height="40" rx="5" fill="#112233" stroke="#7ec8e3" stroke-width="1"/>
  <text x="370" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Syscall 후킹</text>
  <rect x="480" y="106" width="160" height="40" rx="5" fill="#112233" stroke="#7ec8e3" stroke-width="1"/>
  <text x="560" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Netlink 소켓</text>
  <rect x="670" y="106" width="130" height="40" rx="5" fill="#112233" stroke="#7ec8e3" stroke-width="1"/>
  <text x="735" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">audit.rules</text>

  <!-- 화살표: 커널 → auditd -->
  <line x1="440" y1="160" x2="440" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이벤트 전달</text>

  <!-- auditd 데몬 -->
  <rect x="160" y="200" width="520" height="60" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="420" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">auditd 데몬</text>
  <text x="420" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이벤트 수신 · 필터링 · 로그 기록 (/var/log/audit/audit.log)</text>

  <!-- 화살표 분기 -->
  <line x1="290" y1="260" x2="160" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="440" y1="260" x2="440" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="590" y1="260" x2="720" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- 출력 박스 3개 -->
  <rect x="60" y="300" width="200" height="60" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">/var/log/audit/</text>
  <text x="160" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">audit.log 파일</text>

  <rect x="340" y="300" width="200" height="60" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">ausearch</text>
  <text x="440" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이벤트 검색 도구</text>

  <rect x="620" y="300" width="200" height="60" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="720" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">aureport</text>
  <text x="720" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">요약 보고서 도구</text>

  <!-- 화살표: 분석 도구 → 이벤트 저장소 -->
  <line x1="290" y1="330" x2="336" y2="330" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="616" y1="330" x2="544" y2="330" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- auditctl -->
  <rect x="60" y="390" width="760" height="70" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="90" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">auditctl — 규칙 관리</text>
  <text x="90" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">auditctl -l : 현재 규칙 목록  |  auditctl -D : 모든 규칙 삭제  |  auditctl -e 2 : 감사 고정 모드(변경 불가)</text>
  <text x="90" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">규칙은 /etc/audit/rules.d/*.rules 에 저장 → augenrules --load 로 커널에 적용</text>
</svg>
