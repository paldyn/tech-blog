<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">버블 정렬 — 패스별 진행 과정</text>

  <!-- Initial array -->
  <text x="70" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">초기:</text>

  <!-- Array bars - initial [5, 3, 8, 1, 9, 2] -->
  <!-- Each bar: x=100+i*120, width=100, height=val*28 -->

  <!-- Pass 0 row -->
  <text x="70" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">초기</text>

  <!-- Boxes for initial array -->
  <rect x="120" y="100" width="80" height="44" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">5</text>
  <rect x="218" y="100" width="80" height="44" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="258" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">3</text>
  <rect x="316" y="100" width="80" height="44" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="356" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">8</text>
  <rect x="414" y="100" width="80" height="44" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="454" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">1</text>
  <rect x="512" y="100" width="80" height="44" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="552" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">9</text>
  <rect x="610" y="100" width="80" height="44" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">2</text>

  <!-- Pass 1 result: [3, 5, 1, 8, 2, 9] - 9 bubbled to end -->
  <text x="70" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Pass 1</text>
  <rect x="120" y="172" width="80" height="44" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="160" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888">3</text>
  <rect x="218" y="172" width="80" height="44" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="258" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888">5</text>
  <rect x="316" y="172" width="80" height="44" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="356" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888">1</text>
  <rect x="414" y="172" width="80" height="44" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="454" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888">8</text>
  <rect x="512" y="172" width="80" height="44" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="552" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888">2</text>
  <!-- 9 is sorted -->
  <rect x="610" y="172" width="80" height="44" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">9</text>
  <text x="650" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">확정</text>

  <!-- Pass 2 result: [3, 1, 5, 2, 8, 9] -->
  <text x="70" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Pass 2</text>
  <rect x="120" y="248" width="80" height="44" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="160" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888">3</text>
  <rect x="218" y="248" width="80" height="44" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="258" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888">1</text>
  <rect x="316" y="248" width="80" height="44" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="356" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888">5</text>
  <rect x="414" y="248" width="80" height="44" fill="#111" rx="6" stroke="#555" stroke-width="1"/>
  <text x="454" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888">2</text>
  <rect x="512" y="248" width="80" height="44" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="552" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">8</text>
  <rect x="610" y="248" width="80" height="44" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">9</text>

  <!-- Final sorted -->
  <text x="70" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">완료</text>
  <rect x="120" y="324" width="80" height="44" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">1</text>
  <rect x="218" y="324" width="80" height="44" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="258" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">2</text>
  <rect x="316" y="324" width="80" height="44" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="356" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">3</text>
  <rect x="414" y="324" width="80" height="44" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="454" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">5</text>
  <rect x="512" y="324" width="80" height="44" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="552" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">8</text>
  <rect x="610" y="324" width="80" height="44" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">9</text>

  <!-- Complexity info -->
  <rect x="60" y="400" width="760" height="56" fill="#111" rx="8" stroke="#222" stroke-width="1"/>
  <text x="200" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">최선 (정렬됨)</text>
  <text x="200" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">O(N)</text>
  <line x1="320" y1="404" x2="320" y2="452" stroke="#222" stroke-width="1"/>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">평균·최악</text>
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">O(N²)</text>
  <line x1="560" y1="404" x2="560" y2="452" stroke="#222" stroke-width="1"/>
  <text x="700" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">공간</text>
  <text x="700" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">O(1)</text>
</svg>
