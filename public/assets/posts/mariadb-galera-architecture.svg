<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MariaDB Galera Cluster 아키텍처</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">동기식 다중 Primary — 모든 노드에서 쓰기 가능</text>

  <defs>
    <marker id="arr-gc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- App layer -->
  <rect x="60" y="80" width="180" height="50" rx="8" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="150" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">App / MaxScale</text>
  <text x="150" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">로드밸런서</text>

  <!-- Arrows from App to nodes -->
  <line x1="150" y1="132" x2="150" y2="180" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-gc)"/>
  <line x1="200" y1="105" x2="380" y2="150" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-gc)"/>
  <line x1="200" y1="110" x2="620" y2="150" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-gc)"/>

  <!-- Node 1 -->
  <rect x="60" y="182" width="180" height="110" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="2"/>
  <text x="150" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Node 1</text>
  <text x="150" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Primary</text>
  <rect x="76" y="238" width="148" height="24" rx="4" fill="#0a0a1e" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">wsrep: Galera 3.x</text>
  <text x="150" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">:4567 Cluster</text>
  <text x="150" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">:4568 IST / :4444 SST</text>

  <!-- Node 2 -->
  <rect x="350" y="182" width="180" height="110" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Node 2</text>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Primary</text>
  <rect x="366" y="238" width="148" height="24" rx="4" fill="#0a0a1e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">wsrep: Galera 3.x</text>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">:4567 Cluster</text>
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">:4568 IST / :4444 SST</text>

  <!-- Node 3 -->
  <rect x="640" y="182" width="180" height="110" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="2"/>
  <text x="730" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Node 3</text>
  <text x="730" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Primary</text>
  <rect x="656" y="238" width="148" height="24" rx="4" fill="#0a0a1e" stroke="#7777cc" stroke-width="1"/>
  <text x="730" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">wsrep: Galera 3.x</text>
  <text x="730" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">:4567 Cluster</text>
  <text x="730" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">:4568 IST / :4444 SST</text>

  <!-- wsrep replication arrows -->
  <line x1="242" y1="237" x2="348" y2="237" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gc)"/>
  <line x1="348" y1="247" x2="242" y2="247" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gc)"/>
  <text x="295" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">동기 복제</text>

  <line x1="532" y1="237" x2="638" y2="237" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gc)"/>
  <line x1="638" y1="247" x2="532" y2="247" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gc)"/>
  <text x="585" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">동기 복제</text>

  <!-- Commit flow -->
  <rect x="60" y="320" width="760" height="150" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Galera Writeset Replication (wsrep) 커밋 흐름</text>

  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">① 트랜잭션 실행</text>
  <text x="80" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">② Writeset 생성 (변경 행 + 인증 키)</text>
  <text x="80" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">③ 전체 노드에 브로드캐스트 (TOI)</text>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">④ 모든 노드 인증 통과 → COMMIT</text>
  <text x="80" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">⑤ 충돌 감지 시 나중 트랜잭션 ROLLBACK (낙관적 잠금)</text>
  <text x="500" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RPO = 0 : 데이터 유실 없음</text>
  <text x="500" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">노드 장애 → 자동으로 클러스터에서 제외</text>
  <text x="500" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">홀수 노드 권장 (Split-Brain 방지)</text>
  <text x="500" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최소 3노드 (쿼럼: n/2 + 1)</text>
</svg>
