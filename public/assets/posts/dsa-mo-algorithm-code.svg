<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Mo's Algorithm - 정렬 및 포인터 이동 구현</text>

  <!-- Code box -->
  <rect x="60" y="62" width="760" height="372" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Line numbers background -->
  <rect x="60" y="62" width="40" height="372" rx="8" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>

  <text x="440" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle" xml:space="preserve"># Mo's Algorithm - query sorting + pointer movement</text>

  <!-- Line 1 -->
  <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">1 </tspan><tspan fill="#7ec8e3" font-weight="600">B </tspan><tspan fill="#ffffff">= </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">(N**</tspan><tspan fill="#b5cea8">0.5</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- Line 2 -->
  <text x="80" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">2 </tspan><tspan fill="#ffffff">queries.sort(</tspan><tspan fill="#7ec8e3" font-weight="600">key</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#7ec8e3" font-weight="600">lambda</tspan><tspan fill="#ffffff"> q: (</tspan></text>

  <!-- Line 3 -->
  <text x="80" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">3 </tspan><tspan fill="#ffffff">  q[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">]//B,</tspan></text>

  <!-- Line 4 -->
  <text x="80" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">4 </tspan><tspan fill="#ffffff">  q[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">] </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> q[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">]//B%</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">==</tspan><tspan fill="#b5cea8">0</tspan></text>

  <!-- Line 5 -->
  <text x="80" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">5 </tspan><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">else</tspan><tspan fill="#ffffff"> -q[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">]))</tspan></text>

  <!-- Separator -->
  <line x1="80" y1="210" x2="800" y2="210" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Line 6 -->
  <text x="80" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">6 </tspan><tspan fill="#7ec8e3" font-weight="600">cur_l</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3" font-weight="600">cur_r</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, -</tspan><tspan fill="#b5cea8">1</tspan></text>

  <!-- Line 7 -->
  <text x="80" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">7 </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> l, r, idx </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> queries:</tspan></text>

  <!-- Line 8 -->
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">8 </tspan><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> cur_r </tspan><tspan fill="#ffffff">&lt;</tspan><tspan fill="#ffffff"> r: add(cur_r); cur_r+=</tspan><tspan fill="#b5cea8">1</tspan></text>

  <!-- Line 9 -->
  <text x="80" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">9 </tspan><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> cur_l </tspan><tspan fill="#ffffff">&gt;</tspan><tspan fill="#ffffff"> l: cur_l-=</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">; add(cur_l)</tspan></text>

  <!-- Line 10 -->
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> cur_r </tspan><tspan fill="#ffffff">&gt;</tspan><tspan fill="#ffffff"> r: remove(cur_r); cur_r-=</tspan><tspan fill="#b5cea8">1</tspan></text>

  <!-- Line 11 -->
  <text x="80" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">11</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> cur_l </tspan><tspan fill="#ffffff">&lt;</tspan><tspan fill="#ffffff"> l: remove(cur_l); cur_l+=</tspan><tspan fill="#b5cea8">1</tspan></text>

  <!-- Line 12 -->
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#b5cea8">12</tspan><tspan fill="#ffffff">  ans[idx] = get_answer()</tspan></text>

  <!-- Annotation -->
  <text x="80" y="406" font-size="13" fill="#888">짝수 블록: R 오름차순  |  홀수 블록: R 내림차순 (Hilbert curve 최적화)</text>
  <text x="80" y="428" font-size="13" fill="#7ec8e3">add / remove 함수는 현재 구간 상태를 O(1)에 갱신</text>
</svg>
