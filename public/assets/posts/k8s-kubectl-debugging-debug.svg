<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">distroless 이미지를 디버깅하는 법</text>
  <text x="50" y="80" font-size="14" fill="#888">kubectl debug — 임시 컨테이너를 Pod에 주입해 도구 없이 들여다본다</text>

  <rect x="50" y="115" width="360" height="220" rx="10" fill="#16181d" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="143" font-size="15" font-weight="600" fill="#e8e8e8">대상 Pod (distroless)</text>
  <rect x="74" y="160" width="312" height="70" rx="8" fill="#101319" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="90" y="188" font-size="13" font-weight="600" fill="#7ec8e3">app 컨테이너</text>
  <text x="90" y="210" font-size="12" fill="#9aa4b8">shell·curl·ps 없음 → exec 불가</text>
  <rect x="74" y="244" width="312" height="70" rx="8" fill="#101319" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="90" y="272" font-size="13" font-weight="600" fill="#55c555">ephemeral 디버그 컨테이너</text>
  <text x="90" y="294" font-size="12" fill="#ffffff">busybox·netshoot — 같은 네임스페이스 공유</text>

  <rect x="470" y="115" width="360" height="220" rx="10" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="486" y="142" xml:space="preserve" font-size="13" font-weight="600" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 임시 컨테이너 주입</text>
  <text x="486" y="166" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">kubectl debug -it pod/web \</text>
  <text x="486" y="186" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  --image=nicolaka/netshoot \</text>
  <text x="486" y="206" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  --target=app</text>
  <text x="486" y="240" xml:space="preserve" font-size="13" font-weight="600" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 노드 셸로 진입</text>
  <text x="486" y="264" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">kubectl debug node/n1 -it \</text>
  <text x="486" y="284" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  --image=busybox</text>
  <text x="486" y="312" xml:space="preserve" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">--target 으로 PID·네트워크 공유</text>

  <line x1="410" y1="279" x2="468" y2="279" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrB)"/>

  <text x="50" y="362" font-size="13" fill="#888">디버그 컨테이너는 대상과 네트워크·프로세스 네임스페이스를 공유하지만, 원본 컨테이너 이미지는 건드리지 않는다.</text>
</svg>
