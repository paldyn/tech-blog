<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Vision Transformer (ViT) 아키텍처</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">이미지 → 패치 분할 → 임베딩 → Transformer Encoder → 분류</text>

  <!-- Step 1: Image -->
  <rect x="30" y="100" width="100" height="100" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">입력</text>
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이미지</text>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">224×224</text>

  <line x1="130" y1="150" x2="158" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Patch Split -->
  <rect x="160" y="100" width="120" height="100" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">패치 분할</text>
  <text x="220" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">16×16 패치</text>
  <text x="220" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">196개 패치</text>
  <text x="220" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">(14×14 grid)</text>

  <line x1="280" y1="150" x2="308" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Linear Embed -->
  <rect x="310" y="100" width="130" height="100" rx="6" fill="#1a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="375" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">선형 임베딩</text>
  <text x="375" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">패치 → 벡터</text>
  <text x="375" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">768d + CLS token</text>
  <text x="375" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">+ Pos Encoding</text>

  <line x1="440" y1="150" x2="468" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Transformer Encoder -->
  <rect x="470" y="90" width="200" height="120" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="570" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Transformer Encoder</text>
  <text x="570" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">× L 레이어</text>
  <text x="570" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">LN → MSA → LN → MLP</text>
  <text x="570" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">ViT-B: L=12, H=12</text>
  <text x="570" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">ViT-L: L=24, H=16</text>

  <line x1="670" y1="150" x2="698" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: CLS Head -->
  <rect x="700" y="100" width="140" height="100" rx="6" fill="#1a1a2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="770" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">분류 헤드</text>
  <text x="770" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CLS 토큰 추출</text>
  <text x="770" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">FC → Softmax</text>
  <text x="770" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">클래스 확률</text>

  <!-- Encoder Internal Detail -->
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">Transformer Encoder 블록 내부</text>

  <!-- Encoder block detail -->
  <rect x="60" y="268" width="760" height="200" rx="10" fill="#0d1117" stroke="#333" stroke-width="1"/>

  <!-- LN1 -->
  <rect x="90" y="295" width="80" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Layer Norm</text>
  <text x="130" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LN₁</text>

  <line x1="170" y1="320" x2="198" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- MSA -->
  <rect x="200" y="285" width="140" height="70" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="270" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Multi-Head</text>
  <text x="270" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Self-Attention</text>
  <text x="270" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">(MSA)</text>

  <!-- Add -->
  <text x="370" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#b5cea8" text-anchor="middle">⊕</text>
  <text x="370" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">잔차 연결</text>
  <line x1="340" y1="320" x2="358" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="380" y1="320" x2="408" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- LN2 -->
  <rect x="410" y="295" width="80" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="450" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Layer Norm</text>
  <text x="450" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LN₂</text>

  <line x1="490" y1="320" x2="518" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- MLP -->
  <rect x="520" y="290" width="130" height="60" rx="6" fill="#1a1a2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="585" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">MLP (FFN)</text>
  <text x="585" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Linear-GELU-Linear</text>

  <!-- Add2 -->
  <text x="685" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#b5cea8" text-anchor="middle">⊕</text>
  <text x="685" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">잔차 연결</text>
  <line x1="650" y1="320" x2="673" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="697" y1="320" x2="725" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="727" y="300" width="70" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="762" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">출력</text>

  <!-- Note about MSA -->
  <text x="440" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Pre-LN 구조 (LN → Attention, LN → MLP 순서)</text>
  <text x="440" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 패치 토큰이 서로 어텐션 → 전역 수용 영역(Global Receptive Field)</text>
  <text x="440" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MLP 확장 비율 4× (예: 768 → 3072 → 768)</text>

  <!-- Bottom note -->
  <text x="440" y="505" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">ViT-B/16: 86M params, 197 tokens (196 patches + 1 CLS)</text>
</svg>
