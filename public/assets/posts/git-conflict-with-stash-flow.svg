<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git stash pop/apply 충돌 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">stash 복원 시 현재 브랜치 코드와 충돌하면</text>

  <!-- Left column: stash pop conflict -->
  <text x="220" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">git stash pop 충돌</text>

  <rect x="60" y="114" width="320" height="44" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>
  <text x="220" y="140" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">git stash pop</text>

  <line x1="220" y1="158" x2="220" y2="182" stroke="#555" stroke-width="1.5"/>
  <polygon points="220,190 213,180 227,180" fill="#555"/>

  <rect x="60" y="190" width="320" height="44" rx="6" fill="#1a0808" stroke="#e05555"/>
  <text x="220" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">CONFLICT</text>
  <text x="220" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">stash는 자동 제거 안 됨!</text>

  <line x1="220" y1="234" x2="220" y2="258" stroke="#555" stroke-width="1.5"/>
  <polygon points="220,266 213,256 227,256" fill="#555"/>

  <rect x="60" y="266" width="320" height="44" rx="6" fill="#0d1117" stroke="#7777cc"/>
  <text x="220" y="285" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">충돌 파일 수정</text>
  <text x="220" y="303" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">git add &lt;파일&gt;</text>

  <line x1="220" y1="310" x2="220" y2="334" stroke="#555" stroke-width="1.5"/>
  <polygon points="220,342 213,332 227,332" fill="#555"/>

  <rect x="60" y="342" width="320" height="44" rx="6" fill="#0a1a0a" stroke="#55c555"/>
  <text x="220" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">git commit (or 작업 계속)</text>
  <text x="220" y="378" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">git stash drop stash@{0}</text>

  <!-- Right column: stash pop vs apply -->
  <text x="660" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">pop vs apply 차이</text>

  <rect x="500" y="114" width="320" height="140" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>
  <text x="516" y="138"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">git stash pop</text>
  <text x="516" y="158"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 복원 성공 시 stash 자동 제거</text>
  <text x="516" y="178"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">• 충돌 시 stash 유지됨 (주의!)</text>
  <text x="516" y="198"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 해결 후 직접 stash drop 필요</text>

  <line x1="500" y1="255" x2="820" y2="255" stroke="#1e2433" stroke-width="1"/>

  <rect x="500" y="262" width="320" height="120" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="516" y="286"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">git stash apply</text>
  <text x="516" y="306"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 복원 후에도 stash 유지</text>
  <text x="516" y="326"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• 충돌 여부와 관계없이 안전</text>
  <text x="516" y="346"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 완료 후 수동으로 stash drop</text>

  <!-- Bottom note -->
  <rect x="60" y="414" width="760" height="52" rx="8" fill="#0a0d14" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="436" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">충돌이 우려된다면 pop 대신 apply를 사용하자</text>
  <text x="440" y="456" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">apply는 stash를 보존하므로 복구 실패 시 재시도 가능</text>
</svg>
