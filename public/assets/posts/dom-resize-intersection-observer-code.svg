<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Observer 활용 코드 패턴</text>

  <rect x="60" y="64" width="760" height="330" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// ResizeObserver — 요소 크기 변화 감지</text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> ro = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> ResizeObserver((entries) =&gt; {</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  </tspan><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> e </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#e8e8e8"> entries) {</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> { width, height } = e.contentRect;</tspan></text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    chart.</tspan><tspan fill="#e8e8e8">resize</tspan><tspan fill="#e8e8e8">(width, height);</tspan></text>
  <text x="84" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  }</tspan></text>
  <text x="84" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">});</tspan></text>
  <text x="84" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">ro.</tspan><tspan fill="#e8e8e8">observe</tspan><tspan fill="#e8e8e8">(document.</tspan><tspan fill="#e8e8e8">querySelector</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'#chart'</tspan><tspan fill="#e8e8e8">));</tspan></text>

  <line x1="84" y1="234" x2="796" y2="234" stroke="#1e2433" stroke-width="1"/>

  <text x="84" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// IntersectionObserver — 지연 로딩</text>
  <text x="84" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> io = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> IntersectionObserver((entries, self) =&gt; {</tspan></text>
  <text x="84" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  entries.</tspan><tspan fill="#e8e8e8">filter</tspan><tspan fill="#e8e8e8">(e =&gt; e.isIntersecting).</tspan><tspan fill="#e8e8e8">forEach</tspan><tspan fill="#e8e8e8">(e =&gt; {</tspan></text>
  <text x="84" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    e.target.src = e.target.dataset.src;</tspan></text>
  <text x="84" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    self.</tspan><tspan fill="#e8e8e8">unobserve</tspan><tspan fill="#e8e8e8">(e.target); </tspan><tspan fill="#6a8aa0">// 로드 후 감시 중단</tspan></text>
  <text x="84" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  });</tspan></text>
  <text x="84" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">}, { rootMargin: </tspan><tspan fill="#ce9178">'200px'</tspan><tspan fill="#e8e8e8">, threshold: </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8"> });</tspan></text>
  <text x="84" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">document.</tspan><tspan fill="#e8e8e8">querySelectorAll</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'img[data-src]'</tspan><tspan fill="#e8e8e8">).</tspan><tspan fill="#e8e8e8">forEach</tspan><tspan fill="#e8e8e8">(img =&gt; io.</tspan><tspan fill="#e8e8e8">observe</tspan><tspan fill="#e8e8e8">(img));</tspan></text>
</svg>
