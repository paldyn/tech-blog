<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Observer 활용 코드 패턴</text>

  <rect x="60" y="64" width="760" height="330" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ResizeObserver — 요소 크기 변화 감지</text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> ro = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> ResizeObserver((entries) =&gt; {</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> e </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#ffffff"> entries) {</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> { width, height } = e.contentRect;</tspan></text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    chart.</tspan><tspan fill="#ffffff">resize</tspan><tspan fill="#ffffff">(width, height);</tspan></text>
  <text x="84" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  }</tspan></text>
  <text x="84" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">});</tspan></text>
  <text x="84" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">ro.</tspan><tspan fill="#ffffff">observe</tspan><tspan fill="#ffffff">(document.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'#chart'</tspan><tspan fill="#ffffff">));</tspan></text>

  <line x1="84" y1="234" x2="796" y2="234" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// IntersectionObserver — 지연 로딩</text>
  <text x="84" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> io = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> IntersectionObserver((entries, self) =&gt; {</tspan></text>
  <text x="84" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  entries.</tspan><tspan fill="#ffffff">filter</tspan><tspan fill="#ffffff">(e =&gt; e.isIntersecting).</tspan><tspan fill="#ffffff">forEach</tspan><tspan fill="#ffffff">(e =&gt; {</tspan></text>
  <text x="84" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    e.target.src = e.target.dataset.src;</tspan></text>
  <text x="84" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    self.</tspan><tspan fill="#ffffff">unobserve</tspan><tspan fill="#ffffff">(e.target); </tspan><tspan fill="#9aa4b8">// 로드 후 감시 중단</tspan></text>
  <text x="84" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  });</tspan></text>
  <text x="84" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}, { rootMargin: </tspan><tspan fill="#ce9178">'200px'</tspan><tspan fill="#ffffff">, threshold: </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> });</tspan></text>
  <text x="84" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">document.</tspan><tspan fill="#ffffff">querySelectorAll</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'img[data-src]'</tspan><tspan fill="#ffffff">).</tspan><tspan fill="#ffffff">forEach</tspan><tspan fill="#ffffff">(img =&gt; io.</tspan><tspan fill="#ffffff">observe</tspan><tspan fill="#ffffff">(img));</tspan></text>
</svg>
