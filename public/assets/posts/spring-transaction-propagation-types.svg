<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">트랜잭션 전파(Propagation) 유형 한눈에 보기</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">외부 트랜잭션 존재 여부에 따른 내부 메서드 동작</text>

  <!-- Header row -->
  <rect x="60" y="90" width="220" height="36" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="170" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">전파 속성</text>

  <rect x="290" y="90" width="240" height="36" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="410" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">기존 TX 있을 때</text>

  <rect x="540" y="90" width="280" height="36" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="680" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">기존 TX 없을 때</text>

  <!-- Row 1: REQUIRED -->
  <rect x="60" y="134" width="220" height="46" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">REQUIRED</text>

  <rect x="290" y="134" width="240" height="46" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="310" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">기존 TX에 참여</text>
  <text x="310" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">내부 롤백 → 전체 롤백</text>

  <rect x="540" y="134" width="280" height="46" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="560" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">새 TX 생성</text>
  <text x="560" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">기본값 — 가장 많이 사용</text>

  <!-- Row 2: REQUIRES_NEW -->
  <rect x="60" y="188" width="220" height="46" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">REQUIRES_NEW</text>

  <rect x="290" y="188" width="240" height="46" fill="#1a0e00" rx="6" stroke="#2e1e00" stroke-width="1"/>
  <text x="310" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a855">항상 새 TX 생성, 외부 TX 일시 중단</text>
  <text x="310" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">독립적 커밋/롤백</text>

  <rect x="540" y="188" width="280" height="46" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="560" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">새 TX 생성</text>
  <text x="560" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">로그·알림 등 독립 처리에 적합</text>

  <!-- Row 3: SUPPORTS -->
  <rect x="60" y="242" width="220" height="46" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">SUPPORTS</text>

  <rect x="290" y="242" width="240" height="46" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="310" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">기존 TX에 참여</text>
  <text x="310" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">TX가 있으면 함께 사용</text>

  <rect x="540" y="242" width="280" height="46" fill="#1a1a00" rx="6" stroke="#2e2e00" stroke-width="1"/>
  <text x="560" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e855">TX 없이 실행</text>
  <text x="560" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">읽기 전용 조회에 활용 가능</text>

  <!-- Row 4: NOT_SUPPORTED -->
  <rect x="60" y="296" width="220" height="46" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">NOT_SUPPORTED</text>

  <rect x="290" y="296" width="240" height="46" fill="#1a0e00" rx="6" stroke="#2e1e00" stroke-width="1"/>
  <text x="310" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a855">외부 TX 일시 중단</text>
  <text x="310" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">TX 없이 실행</text>

  <rect x="540" y="296" width="280" height="46" fill="#1a1a00" rx="6" stroke="#2e2e00" stroke-width="1"/>
  <text x="560" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e855">TX 없이 실행</text>
  <text x="560" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">TX를 원치 않을 때</text>

  <!-- Row 5: MANDATORY -->
  <rect x="60" y="350" width="220" height="46" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">MANDATORY</text>

  <rect x="290" y="350" width="240" height="46" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="310" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">기존 TX에 참여</text>
  <text x="310" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">반드시 TX 안에서만 호출 가능</text>

  <rect x="540" y="350" width="280" height="46" fill="#1a0a0a" rx="6" stroke="#2e1a1a" stroke-width="1"/>
  <text x="560" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">예외 발생</text>
  <text x="560" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">IllegalTransactionStateException</text>

  <!-- Row 6: NEVER -->
  <rect x="60" y="404" width="220" height="46" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">NEVER</text>

  <rect x="290" y="404" width="240" height="46" fill="#1a0a0a" rx="6" stroke="#2e1a1a" stroke-width="1"/>
  <text x="310" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">예외 발생</text>
  <text x="310" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">TX가 있으면 절대 안 됨</text>

  <rect x="540" y="404" width="280" height="46" fill="#1a1a00" rx="6" stroke="#2e2e00" stroke-width="1"/>
  <text x="560" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e855">TX 없이 실행</text>
  <text x="560" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">TX 외부 강제</text>

  <!-- Row 7: NESTED -->
  <rect x="60" y="458" width="220" height="46" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="486" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">NESTED</text>

  <rect x="290" y="458" width="240" height="46" fill="#0a0a1a" rx="6" stroke="#1a1a2e" stroke-width="1"/>
  <text x="310" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">세이브포인트 생성</text>
  <text x="310" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">내부 롤백 → 세이브포인트까지만</text>

  <rect x="540" y="458" width="280" height="46" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="560" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">새 TX 생성</text>
  <text x="560" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">JDBC DataSourceTM 전용</text>

  <!-- Legend -->
  <rect x="60" y="516" width="16" height="16" fill="#0a1a0a" rx="3" stroke="#1a2e1a" stroke-width="1"/>
  <text x="84" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">정상 참여/생성</text>
  <rect x="220" y="516" width="16" height="16" fill="#1a0e00" rx="3" stroke="#2e1e00" stroke-width="1"/>
  <text x="244" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a855">중단·분리</text>
  <rect x="360" y="516" width="16" height="16" fill="#1a0a0a" rx="3" stroke="#2e1a1a" stroke-width="1"/>
  <text x="384" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">예외 발생</text>
  <rect x="480" y="516" width="16" height="16" fill="#0a0a1a" rx="3" stroke="#1a1a2e" stroke-width="1"/>
  <text x="504" y="528" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">세이브포인트</text>
</svg>
