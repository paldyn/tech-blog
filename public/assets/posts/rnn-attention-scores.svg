<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Attention 종류별 점수 계산</text>

  <!-- Three types side by side -->
  <!-- Additive (Bahdanau) -->
  <rect x="60" y="76" width="230" height="200" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="175" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Additive</text>
  <text x="175" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(Bahdanau, 2015)</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">e = vᵀ · tanh(</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">   W_s·s + W_h·h)</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 파라미터: W_s, W_h, v</text>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 연산 복잡도: O(n²d)</text>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">초기 NMT에서 검증</text>

  <!-- Dot-product (Luong) -->
  <rect x="325" y="76" width="230" height="200" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Dot-Product</text>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(Luong, 2015)</text>
  <text x="345" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">e = sᵀ · h</text>
  <text x="345" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 추가 파라미터 없음</text>
  <text x="345" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 가장 단순하고 빠름</text>
  <text x="345" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">차원이 크면 분산 폭발</text>

  <!-- Scaled Dot-Product -->
  <rect x="590" y="76" width="230" height="200" rx="10" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="705" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">Scaled Dot-Product</text>
  <text x="705" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(Transformer, 2017)</text>
  <text x="610" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">e = (Q·Kᵀ) / √d_k</text>
  <text x="610" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• √d_k 로 스케일링</text>
  <text x="610" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• Q, K, V 선형 변환</text>
  <text x="610" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Transformer의 핵심</text>

  <!-- Common softmax -->
  <rect x="200" y="304" width="480" height="50" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">공통: α = softmax(e)   →   c = Σ α_i · v_i</text>
  <text x="440" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">점수를 확률로 정규화 → 인코더 값(v)의 가중 합산 = Context</text>

  <!-- Code block -->
  <rect x="60" y="368" width="760" height="34" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">scores = torch.bmm(query, key.transpose(</text>
  <text x="430" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="438" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">,</text>
  <text x="446" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="454" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)) / math.sqrt(d_k)</text>
</svg>
