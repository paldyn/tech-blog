<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pyenv 버전 관리 구조</text>

  <!-- pyenv box -->
  <rect x="320" y="68" width="240" height="56" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="440" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">pyenv</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Python 버전 관리자</text>

  <!-- Arrows down -->
  <line x1="280" y1="124" x2="155" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="380" y1="124" x2="340" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="124" x2="540" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="124" x2="725" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Version boxes -->
  <rect x="60" y="168" width="160" height="50" rx="6" fill="#111827" stroke="#475569" stroke-width="1.5"/>
  <text x="140" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 3.8.20</text>
  <text x="140" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">레거시 프로젝트용</text>

  <rect x="250" y="168" width="160" height="50" rx="6" fill="#111827" stroke="#475569" stroke-width="1.5"/>
  <text x="330" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 3.10.14</text>
  <text x="330" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">안정 버전</text>

  <rect x="470" y="168" width="160" height="50" rx="6" fill="#0d2340" stroke="#1d4ed8" stroke-width="2"/>
  <text x="550" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Python 3.12.4</text>
  <text x="550" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">global (기본값)</text>

  <rect x="660" y="168" width="160" height="50" rx="6" fill="#111827" stroke="#475569" stroke-width="1.5"/>
  <text x="740" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 3.13.0</text>
  <text x="740" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">최신 실험용</text>

  <!-- Project scope boxes -->
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">적용 범위</text>

  <rect x="60" y="270" width="230" height="80" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="175" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fbbf24" text-anchor="middle">global</text>
  <text x="175" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">시스템 전역 기본값</text>
  <text x="175" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">pyenv global 3.12.4</text>

  <rect x="325" y="270" width="230" height="80" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">local</text>
  <text x="440" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">디렉터리별 (.python-version)</text>
  <text x="440" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">pyenv local 3.10.14</text>

  <rect x="590" y="270" width="230" height="80" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="705" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">shell</text>
  <text x="705" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">현재 셸 세션에만</text>
  <text x="705" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">pyenv shell 3.13.0</text>

  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">우선순위: shell &gt; local &gt; global — 좁은 범위가 우선</text>
</svg>
