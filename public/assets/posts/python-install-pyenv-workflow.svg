<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">pyenv로 Python 관리하기</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">버전 설치 → 전환 → 프로젝트별 고정</text>

  <!-- Step 1 -->
  <rect x="60" y="90" width="160" height="80" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3">1. pyenv 설치</text>
  <text x="140" y="138" text-anchor="middle" font-size="11" fill="#aaa">brew install pyenv</text>
  <text x="140" y="156" text-anchor="middle" font-size="10" fill="#666">또는 curl 스크립트</text>

  <polygon points="222,130 234,124 234,136" fill="#7ec8e3"/>
  <line x1="220" y1="130" x2="234" y2="130" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Step 2 -->
  <rect x="236" y="90" width="160" height="80" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="2"/>
  <text x="316" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555">2. 버전 설치</text>
  <text x="316" y="136" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="10" fill="#aaa">pyenv install 3.12.0</text>
  <text x="316" y="154" text-anchor="middle" font-size="10" fill="#666">원하는 버전 다운로드</text>

  <polygon points="398,130 410,124 410,136" fill="#55c555"/>
  <line x1="396" y1="130" x2="410" y2="130" stroke="#55c555" stroke-width="1.5"/>

  <!-- Step 3 -->
  <rect x="412" y="90" width="160" height="80" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="2"/>
  <text x="492" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#7777cc">3. 전역 설정</text>
  <text x="492" y="136" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="10" fill="#aaa">pyenv global 3.12.0</text>
  <text x="492" y="154" text-anchor="middle" font-size="10" fill="#666">기본 Python 변경</text>

  <polygon points="574,130 586,124 586,136" fill="#7777cc"/>
  <line x1="572" y1="130" x2="586" y2="130" stroke="#7777cc" stroke-width="1.5"/>

  <!-- Step 4 -->
  <rect x="588" y="90" width="232" height="80" rx="8" fill="#0f1820" stroke="#ce9178" stroke-width="2"/>
  <text x="704" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#ce9178">4. 프로젝트별 고정</text>
  <text x="704" y="136" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="10" fill="#aaa">pyenv local 3.11.0</text>
  <text x="704" y="154" text-anchor="middle" font-size="10" fill="#666">.python-version 파일 생성</text>

  <!-- Code block: pyenv commands -->
  <rect x="60" y="196" width="760" height="198" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 설치 가능한 버전 목록</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">pyenv install --list</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 설치된 버전 확인</text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">pyenv versions</tspan></text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 현재 사용 중인 버전</text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">pyenv version</tspan></text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 가상환경과 함께 사용</text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">python -m venv .venv</tspan></text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">source .venv/bin/activate</tspan></text>

  <!-- Priority explanation -->
  <rect x="60" y="414" width="760" height="66" rx="8" fill="#0f1418" stroke="#333"/>
  <text x="440" y="436" text-anchor="middle" font-size="12" font-weight="700" fill="#e8e8e8">버전 우선순위: shell &gt; local &gt; global</text>
  <text x="200" y="460" text-anchor="middle" font-size="11" fill="#7777cc">pyenv shell  — 현재 세션</text>
  <text x="440" y="460" text-anchor="middle" font-size="11" fill="#55c555">pyenv local  — 디렉토리</text>
  <text x="680" y="460" text-anchor="middle" font-size="11" fill="#7ec8e3">pyenv global — 시스템 기본</text>
</svg>
