<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">두 종류의 테스트</text>
  <text x="60" y="76" font-size="14" fill="#888">런타임 동작과 타입 모양은 서로 다른 차원에서 검증한다</text>

  <!-- left: runtime test -->
  <rect x="60" y="100" width="360" height="220" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="134" font-size="16" font-weight="600" fill="#55c555">런타임 테스트</text>
  <text x="84" y="158" font-size="13" fill="#888">값이 맞는지 — Vitest / Jest</text>
  <rect x="84" y="176" width="312" height="124" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="100" y="202" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">expect</tspan>(add(2, 3))</text>
  <text xml:space="preserve" x="100" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  .<tspan fill="#7ec8e3" font-weight="600">toBe</tspan>(<tspan fill="#b5cea8">5</tspan>);</text>
  <text xml:space="preserve" x="100" y="252" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 실행해서 결과 비교</text>
  <text xml:space="preserve" x="100" y="280" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 실패는 런타임에 드러남</text>

  <!-- right: type test -->
  <rect x="460" y="100" width="360" height="220" fill="#101418" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="484" y="134" font-size="16" font-weight="600" fill="#7ec8e3">타입 테스트</text>
  <text x="484" y="158" font-size="13" fill="#888">타입이 맞는지 — expectTypeOf</text>
  <rect x="484" y="176" width="312" height="124" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="500" y="202" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">expectTypeOf</tspan>(add)</text>
  <text xml:space="preserve" x="500" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  .<tspan fill="#7ec8e3" font-weight="600">returns</tspan></text>
  <text xml:space="preserve" x="500" y="242" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  .<tspan fill="#7ec8e3" font-weight="600">toEqualTypeOf</tspan>&lt;<tspan fill="#7ec8e3" font-weight="600">number</tspan>&gt;();</text>
  <text xml:space="preserve" x="500" y="272" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 컴파일 타임에 검사</text>
  <text xml:space="preserve" x="500" y="292" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 실패 = 타입 에러</text>
</svg>
