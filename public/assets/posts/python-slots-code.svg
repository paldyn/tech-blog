<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">__slots__ 코드 예제</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">선언법, 상속, dataclass 결합</text>

  <!-- Code block -->
  <rect x="60" y="88" width="520" height="360" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>

  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># 기본 __slots__ 선언</text>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class</text>
  <text x="122" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> Vector:</text>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">    __slots__ = (</text>
  <text x="213" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">'x'</text>
  <text x="238" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">, </text>
  <text x="256" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">'y'</text>
  <text x="280" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">)</text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">    def </text>
  <text x="120" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">__init__(self, x, y):</text>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">        self.x, self.y = x, y</text>

  <!-- Dynamic attr test -->
  <text x="76" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">v = Vector(</text>
  <text x="175" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#b5cea8">1</text>
  <text x="188" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">, </text>
  <text x="206" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#b5cea8">2</text>
  <text x="219" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">)</text>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555">v.z = </text>
  <text x="139" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#b5cea8">3</text>
  <text x="152" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0">   # AttributeError</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># hasattr(v, '__dict__') → False</text>

  <!-- Inheritance -->
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># 상속 시 자식도 __slots__ 선언</text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class</text>
  <text x="122" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> Vector3(Vector):</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">    __slots__ = (</text>
  <text x="213" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">'z'</text>
  <text x="237" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">,)</text>

  <!-- dataclass + slots (Python 3.10+) -->
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#6a8aa0"># Python 3.10+: @dataclass(slots=True)</text>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">@dataclass</text>
  <text x="166" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8c040">(slots=True)</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3">class</text>
  <text x="122" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8"> Point:</text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">    x: float</text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e8e8e8">    y: float</text>

  <!-- Right annotations -->
  <rect x="610" y="96" width="210" height="80" rx="6" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="715" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">__slots__ 제한사항</text>
  <text x="715" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">선언 외 동적 속성 불가</text>
  <text x="715" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">__dict__, __weakref__ 없음</text>
  <text x="715" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">다중 상속 시 주의 필요</text>

  <rect x="610" y="196" width="210" height="80" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="715" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">상속 규칙</text>
  <text x="715" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">자식이 __slots__ 생략하면</text>
  <text x="715" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">자동으로 __dict__ 생김</text>
  <text x="715" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">(메모리 절감 사라짐)</text>

  <rect x="610" y="296" width="210" height="80" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="715" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">slots=True (3.10+)</text>
  <text x="715" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@dataclass가 __slots__</text>
  <text x="715" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">자동 생성</text>
  <text x="715" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타입 힌트 기반</text>
</svg>
