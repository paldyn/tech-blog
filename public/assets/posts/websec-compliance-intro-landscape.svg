<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 보안 컴플라이언스 지형</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">무엇을 다루는가에 따라 적용되는 규제·표준이 달라진다</text>

  <!-- GDPR -->
  <rect x="50" y="100" width="250" height="140" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">GDPR</text>
  <text x="175" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">EU 개인정보 보호 규정</text>
  <line x1="74" y1="166" x2="276" y2="166" stroke="#26334d" stroke-width="1"/>
  <text x="175" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">대상: EU 거주자의 개인정보</text>
  <text x="175" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">동의 · 열람/삭제권 · 72h 통지</text>
  <text x="175" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">과징금 최대 매출 4%</text>

  <!-- 국내 개인정보보호법 -->
  <rect x="315" y="100" width="250" height="140" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">개인정보보호법 · ISMS-P</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">국내 개인정보 보호 체계</text>
  <line x1="339" y1="166" x2="541" y2="166" stroke="#26334d" stroke-width="1"/>
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">대상: 국내 개인정보 처리자</text>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">수집·이용 동의 · 안전조치 의무</text>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">ISMS-P 인증 (일정 요건 의무)</text>

  <!-- PCI-DSS -->
  <rect x="580" y="100" width="250" height="140" rx="10" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">PCI-DSS</text>
  <text x="705" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">카드 결제 데이터 보안</text>
  <line x1="604" y1="166" x2="806" y2="166" stroke="#1d3a26" stroke-width="1"/>
  <text x="705" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">대상: 카드 데이터 취급</text>
  <text x="705" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">카드사 계약상 의무 (법규 아님)</text>
  <text x="705" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">12개 요구사항 · 정기 점검</text>

  <!-- ISO 27001 -->
  <rect x="50" y="260" width="380" height="140" rx="10" fill="#1a102a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">ISO 27001</text>
  <text x="240" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정보보안경영시스템(ISMS) 국제표준</text>
  <line x1="74" y1="326" x2="406" y2="326" stroke="#33264d" stroke-width="1"/>
  <text x="240" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">"무엇을 보호하라"가 아니라 "보안을 어떻게 경영하라"</text>
  <text x="240" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">위험 평가 → 통제 선택 → 운영 → 개선 사이클</text>
  <text x="240" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">자발적 인증 · B2B 신뢰 입증에 활용</text>

  <!-- SOC 2 -->
  <rect x="450" y="260" width="380" height="140" rx="10" fill="#2a1a10" stroke="#e0a555" stroke-width="1.5"/>
  <text x="640" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e0a555" text-anchor="middle">SOC 2</text>
  <text x="640" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서비스 조직 통제 보고서 (AICPA)</text>
  <line x1="474" y1="326" x2="806" y2="326" stroke="#4d3926" stroke-width="1"/>
  <text x="640" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">신뢰 서비스 기준: 보안·가용성·기밀성 등</text>
  <text x="640" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">Type I(시점) vs Type II(기간 동안의 운영)</text>
  <text x="640" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">SaaS B2B 거래의 사실상 입장권</text>
</svg>
