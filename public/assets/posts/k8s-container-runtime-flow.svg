<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">컨테이너 생성 흐름</text>

  <!-- Left column: flow boxes -->
  <!-- Box 1: kubelet -->
  <rect x="60" y="72" width="200" height="56" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="106" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">kubelet</text>

  <!-- Arrow -->
  <line x1="160" y1="128" x2="160" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="175" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">CRI gRPC</text>

  <!-- Box 2: containerd -->
  <rect x="60" y="155" width="200" height="56" rx="8" fill="#1e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="189" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">containerd</text>

  <!-- Arrow -->
  <line x1="160" y1="211" x2="160" y2="238" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="175" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">exec + OCI spec</text>

  <!-- Box 3: runc -->
  <rect x="60" y="238" width="200" height="56" rx="8" fill="#1e1e1e" stroke="#888" stroke-width="1"/>
  <text x="160" y="272" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">runc</text>

  <!-- Arrow -->
  <line x1="160" y1="294" x2="160" y2="321" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="175" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">syscall</text>

  <!-- Box 4: Linux kernel -->
  <rect x="60" y="321" width="200" height="72" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="160" y="351" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">Linux Kernel</text>
  <text x="160" y="371" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">namespaces / cgroups</text>

  <!-- Right column: code block -->
  <rect x="310" y="72" width="510" height="340" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="326" y="100" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 런타임 상태 확인</text>
  <text x="326" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">crictl</text>
  <text x="384" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> info</text>

  <text x="326" y="155" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이미지 목록 조회</text>
  <text x="326" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">crictl</text>
  <text x="384" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> images</text>

  <text x="326" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 실행 중인 컨테이너</text>
  <text x="326" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">crictl</text>
  <text x="384" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> ps</text>

  <text x="326" y="265" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 컨테이너 로그</text>
  <text x="326" y="285" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">crictl</text>
  <text x="384" y="285" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> logs </text>
  <text x="436" y="285" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">&lt;container-id&gt;</text>

  <text x="326" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 파드 목록</text>
  <text x="326" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">crictl</text>
  <text x="384" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> pods</text>

  <text x="326" y="375" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># containerd 소켓 경로</text>
  <text x="326" y="395" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">/run/containerd/containerd.sock</text>

  <!-- Label for code block -->
  <text x="565" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">crictl 명령어 (CRI 디버깅 도구)</text>
</svg>
