<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">레벨 순서 순회 (BFS)</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">큐(Queue)를 이용해 레벨별로 왼쪽에서 오른쪽으로 방문</text>

    <!-- Tree on left -->
    <circle cx="240" cy="130" r="22" fill="#1a2544" stroke="#7ec8e3" stroke-width="2"/>
    <text x="240" y="135" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">A</text>
    <text x="221" y="122" font-size="10" fill="#7ec8e3">①</text>

    <circle cx="160" cy="205" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="160" y="210" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>
    <text x="141" y="197" font-size="10" fill="#7ec8e3">②</text>
    <circle cx="320" cy="205" r="22" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="320" y="210" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">C</text>
    <text x="301" y="197" font-size="10" fill="#7ec8e3">③</text>

    <circle cx="120" cy="280" r="22" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="120" y="285" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">D</text>
    <text x="101" y="272" font-size="10" fill="#7ec8e3">④</text>
    <circle cx="200" cy="280" r="22" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="200" y="285" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">E</text>
    <text x="181" y="272" font-size="10" fill="#7ec8e3">⑤</text>
    <circle cx="360" cy="280" r="22" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="360" y="285" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">F</text>
    <text x="341" y="272" font-size="10" fill="#7ec8e3">⑥</text>

    <line x1="224" y1="148" x2="176" y2="187" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="256" y1="148" x2="304" y2="187" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="148" y1="221" x2="133" y2="262" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="172" y1="221" x2="187" y2="262" stroke="#3a4a6e" stroke-width="1.5"/>
    <line x1="332" y1="221" x2="350" y2="262" stroke="#3a4a6e" stroke-width="1.5"/>

    <!-- Result -->
    <text x="240" y="340" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">A → B → C → D → E → F</text>

    <!-- Queue visualization on right -->
    <text x="620" y="100" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">큐 상태 변화</text>

    <!-- Step 1 -->
    <text x="480" y="132" font-size="12" fill="#888">시작</text>
    <rect x="530" y="118" width="40" height="30" fill="#1a2544" stroke="#7ec8e3" stroke-width="1.5" rx="3"/>
    <text x="550" y="138" font-size="12" fill="#7ec8e3" text-anchor="middle">A</text>
    <text x="480" y="165" font-size="11" fill="#555">큐: [A]</text>

    <!-- Step 2 -->
    <text x="480" y="195" font-size="12" fill="#888">A 방문</text>
    <rect x="530" y="182" width="40" height="30" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="550" y="202" font-size="12" fill="#e8e8e8" text-anchor="middle">B</text>
    <rect x="574" y="182" width="40" height="30" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="594" y="202" font-size="12" fill="#e8e8e8" text-anchor="middle">C</text>
    <text x="480" y="228" font-size="11" fill="#555">큐: [B, C]</text>

    <!-- Step 3 -->
    <text x="480" y="258" font-size="12" fill="#888">B 방문</text>
    <rect x="530" y="245" width="40" height="30" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="550" y="265" font-size="12" fill="#e8e8e8" text-anchor="middle">C</text>
    <rect x="574" y="245" width="40" height="30" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1" rx="3"/>
    <text x="594" y="265" font-size="12" fill="#55c555" text-anchor="middle">D</text>
    <rect x="618" y="245" width="40" height="30" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1" rx="3"/>
    <text x="638" y="265" font-size="12" fill="#55c555" text-anchor="middle">E</text>
    <text x="480" y="292" font-size="11" fill="#555">큐: [C, D, E]</text>

    <!-- Code block -->
    <rect x="460" y="306" width="360" height="84" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
    <text x="480" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">from</tspan> collections <tspan fill="#7ec8e3" font-weight="600">import</tspan> deque</text>
    <text x="480" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">q = deque([root])</text>
    <text x="480" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">while</tspan> q:</text>
    <text x="480" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  n=q.popleft(); visit(n); q+=n.children</text>
  </g>
</svg>
