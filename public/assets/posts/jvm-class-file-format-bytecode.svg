<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">javap -v 로 읽는 .class 파일</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">Hello.java 를 컴파일한 Hello.class 의 내부 구조</text>

  <!-- ─── LEFT: Java Source ─── -->
  <text x="95" y="98"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">Hello.java</text>

  <rect x="80" y="108" width="330" height="168" rx="6" fill="#070b14" stroke="#1e2433"/>
  <!-- line 1 -->
  <text x="96" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">public</text>
  <text x="148" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8"> class </text>
  <text x="196" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">Hello {</text>
  <!-- line 2 -->
  <text x="96" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">  public static void</text>
  <!-- line 3 -->
  <text x="96" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">      main(String[] args) {</text>
  <!-- line 4 -->
  <text x="96" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">    System.out.println(</text>
  <!-- line 5 -->
  <text x="96" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">        "Hello, World!");</text>
  <!-- line 6 -->
  <text x="96" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">  }</text>
  <!-- line 7 -->
  <text x="96" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">}</text>
  <!-- line 8: blank + compile label -->
  <text x="96" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">$ javac Hello.java</text>
  <text x="96" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">$ javap -v Hello.class</text>

  <!-- ─── Arrow ─── -->
  <!-- shaft -->
  <rect x="427" y="225" width="42" height="8" rx="2" fill="#55c555" opacity="0.85"/>
  <!-- arrowhead polygon -->
  <polygon points="469,213 486,229 469,245" fill="#55c555" opacity="0.85" stroke="#0a0a0a" stroke-width="1"/>

  <text x="444" y="255"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">컴파일</text>

  <!-- ─── RIGHT: javap -v output ─── -->
  <text x="502" y="98"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">Hello.class (javap -v 요약)</text>

  <rect x="488" y="108" width="332" height="276" rx="6" fill="#070b14" stroke="#1e2433"/>
  <!-- line 1 -->
  <text x="504" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">// major version: 65 (Java 21)</text>
  <!-- line 2 -->
  <text x="504" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">// flags: ACC_PUBLIC, ACC_SUPER</text>
  <!-- line 3 -->
  <text x="504" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">Constant pool:</text>
  <!-- line 4 -->
  <text x="504" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">  #1 </text>
  <text x="532" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">= Methodref </text>
  <text x="640" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">#2.#3</text>
  <!-- line 5 -->
  <text x="504" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">  #7 </text>
  <text x="532" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">= String    </text>
  <text x="640" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"Hello, World!"</text>
  <!-- line 6 -->
  <text x="504" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">public static void main(...):</text>
  <!-- line 7 -->
  <text x="504" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">  Code:  // max_stack=2</text>
  <!-- line 8 -->
  <text x="504" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">   0: </text>
  <text x="528" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">getstatic </text>
  <text x="608" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">#4 // out</text>
  <!-- line 9 -->
  <text x="504" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">   3: </text>
  <text x="528" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">ldc       </text>
  <text x="608" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">#7 // "Hello..."</text>
  <!-- line 10 -->
  <text x="504" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">   5: </text>
  <text x="528" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">invokevirtual</text>
  <text x="636" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">#5</text>
  <!-- line 11 -->
  <text x="504" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">   8: </text>
  <text x="528" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">return</text>
  <!-- line 12 -->
  <text x="504" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">// 9 bytes of bytecode total</text>

  <!-- ─── Bottom annotation bar ─── -->
  <rect x="80" y="410" width="740" height="64" rx="6" fill="#111" stroke="#222"/>
  <text x="104" y="432"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">핵심 포인트</text>

  <rect x="96" y="442" width="8" height="8" rx="2" fill="#55c555"/>
  <text x="112" y="451"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">상수 풀의 #n 인덱스가 모든 이름 참조를 중앙 관리한다</text>

  <rect x="400" y="442" width="8" height="8" rx="2" fill="#7ec8e3"/>
  <text x="416" y="451"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">바이트코드는 오프셋(0, 3, 5, 8) 기준으로 나열된다</text>
</svg>
