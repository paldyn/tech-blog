<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계형 데이터베이스(RDB) 구조</text>

  <!-- DB Layer -->
  <rect x="60" y="80" width="760" height="70" rx="8" fill="#0d1a2a" stroke="#3a6a9e" stroke-width="1.5"/>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">데이터베이스 (Database)</text>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">논리적으로 연관된 데이터의 집합 — 테이블, 뷰, 인덱스 등을 포함</text>

  <!-- Arrow: DB → Tables -->
  <line x1="440" y1="150" x2="440" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Table Layer -->
  <!-- Table 1: users -->
  <rect x="60" y="175" width="360" height="76" rx="8" fill="#0d1f14" stroke="#3a7a4e" stroke-width="1.5"/>
  <text x="240" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">테이블: users</text>
  <text x="240" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">열(Column): id, name, email, created_at</text>
  <text x="240" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">행(Row): 실제 사용자 레코드 1건</text>

  <!-- Table 2: orders -->
  <rect x="460" y="175" width="360" height="76" rx="8" fill="#1a0d1a" stroke="#7a3a9e" stroke-width="1.5"/>
  <text x="640" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">테이블: orders</text>
  <text x="640" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">열(Column): id, user_id, total, status</text>
  <text x="640" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">행(Row): 실제 주문 레코드 1건</text>

  <!-- Relationship Arrow -->
  <line x1="420" y1="213" x2="460" y2="213" stroke="#e8e8e8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">FK</text>

  <!-- Row detail section -->
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">행(Row) = 레코드 1건의 실제 데이터</text>

  <!-- Row boxes -->
  <rect x="60" y="305" width="360" height="52" rx="6" fill="#111" stroke="#3a7a4e" stroke-width="1"/>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">id</text>
  <text x="120" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">name</text>
  <text x="200" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">email</text>
  <text x="330" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">created_at</text>
  <line x1="60" y1="333" x2="420" y2="333" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">1</text>
  <text x="120" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">홍길동</text>
  <text x="200" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">hong@example.com</text>
  <text x="330" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">2024-01-15</text>

  <rect x="460" y="305" width="360" height="52" rx="6" fill="#111" stroke="#7a3a9e" stroke-width="1"/>
  <text x="480" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">id</text>
  <text x="520" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">user_id</text>
  <text x="600" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">total</text>
  <text x="680" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">status</text>
  <line x1="460" y1="333" x2="820" y2="333" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">101</text>
  <text x="520" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">1</text>
  <text x="600" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">59900</text>
  <text x="680" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">paid</text>

  <!-- Key Concepts -->
  <rect x="60" y="380" width="220" height="60" rx="6" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">스키마 (Schema)</text>
  <text x="170" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">테이블 구조 · 타입 · 제약조건 정의</text>

  <rect x="330" y="380" width="220" height="60" rx="6" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">키 (Key)</text>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">행을 고유하게 식별하는 열(PK/FK)</text>

  <rect x="600" y="380" width="220" height="60" rx="6" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">관계 (Relation)</text>
  <text x="710" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">테이블 간 FK로 연결되는 논리적 연관</text>
</svg>
