<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ESLint + TypeScript 설정</text>

  <!-- eslint.config.js -->
  <rect x="60" y="64" width="480" height="330" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="84" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// eslint.config.js (Flat Config)</text>
  <text x="76" y="102" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">import </text>
  <text x="118" y="102" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">tseslint </text>
  <text x="176" y="102" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">from </text>
  <text x="216" y="102" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">'typescript-eslint'</text>
  <text x="76" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">import </text>
  <text x="118" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">globals </text>
  <text x="172" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">from </text>
  <text x="212" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">'globals'</text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> </text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">export default </text>
  <text x="186" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">tseslint.config(</text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  ...tseslint.configs.recommended,</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  {</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    languageOptions: {</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">      globals: globals.node,</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    },</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    rules: {</text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">      // any 사용 경고</text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">      "@typescript-eslint/no-explicit-any"</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">        : </text>
  <text x="106" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"warn"</text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    }</text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  }</text>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">);</text>

  <!-- Right: Notes -->
  <rect x="560" y="64" width="260" height="330" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="580" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">설치 명령어</text>
  <rect x="576" y="94" width="228" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="592" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600">npm install -D \</text>
  <text x="592" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">  eslint typescript-eslint</text>
  <text x="592" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">  prettier globals</text>

  <text x="580" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">권장 규칙들</text>
  <text x="580" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">no-explicit-any</text>
  <text x="580" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">any 타입 사용 경고</text>
  <text x="580" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">no-unused-vars</text>
  <text x="580" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">미사용 변수 경고</text>
  <text x="580" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">consistent-type-imports</text>
  <text x="580" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">import type 일관성</text>
  <text x="580" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">no-floating-promises</text>
  <text x="580" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">await 누락 방지</text>

  <text x="580" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행: npx eslint .</text>
  <text x="580" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">저장 시 자동 수정:</text>
  <text x="580" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">editor.codeActionsOnSave</text>
</svg>
