<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">특징 맵 시각화와 전이학습 전략</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">어느 레이어를 고정(freeze)하고 어디서부터 학습할까</text>

  <!-- Pre-trained model diagram -->
  <!-- Blocks -->
  <rect x="36"  y="100" width="100" height="60" fill="#1a2535" rx="6" stroke="#3a4560" stroke-width="1.5"/>
  <text x="86"  y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Block 1</text>
  <text x="86"  y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">저수준 특징</text>

  <rect x="156" y="100" width="100" height="60" fill="#1a2535" rx="6" stroke="#3a4560" stroke-width="1.5"/>
  <text x="206" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Block 2</text>
  <text x="206" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">엣지·질감</text>

  <rect x="276" y="100" width="100" height="60" fill="#1a2535" rx="6" stroke="#3a4560" stroke-width="1.5"/>
  <text x="326" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Block 3</text>
  <text x="326" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">패턴·부분</text>

  <rect x="396" y="100" width="100" height="60" fill="#1a2535" rx="6" stroke="#3a4560" stroke-width="1.5"/>
  <text x="446" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Block 4</text>
  <text x="446" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">객체 부위</text>

  <rect x="516" y="100" width="100" height="60" fill="#1a2535" rx="6" stroke="#3a4560" stroke-width="1.5"/>
  <text x="566" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Block 5</text>
  <text x="566" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">고수준 의미</text>

  <rect x="636" y="100" width="100" height="60" fill="#1a2535" rx="6" stroke="#3a4560" stroke-width="1.5"/>
  <text x="686" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">FC Head</text>
  <text x="686" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">분류기</text>

  <!-- Connectors -->
  <line x1="136" y1="130" x2="156" y2="130" stroke="#2a3550" stroke-width="2"/>
  <line x1="256" y1="130" x2="276" y2="130" stroke="#2a3550" stroke-width="2"/>
  <line x1="376" y1="130" x2="396" y2="130" stroke="#2a3550" stroke-width="2"/>
  <line x1="496" y1="130" x2="516" y2="130" stroke="#2a3550" stroke-width="2"/>
  <line x1="616" y1="130" x2="636" y2="130" stroke="#2a3550" stroke-width="2"/>

  <!-- ImageNet label -->
  <text x="440" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ImageNet 사전학습 모델 (e.g. ResNet-50)</text>

  <!-- Strategy rows -->
  <!-- Strategy 1: Full freeze, replace head -->
  <rect x="36" y="195" width="808" height="52" fill="#0d1117" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="60" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">전략 1: Feature Extractor</text>
  <text x="60" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Block1~5 완전 고정(freeze), FC Head만 새로 학습 — 데이터 매우 적고 유사 도메인</text>

  <!-- Lock icons -->
  <text x="86"  y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">🔒</text>
  <text x="206" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">🔒</text>
  <text x="326" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">🔒</text>
  <text x="446" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">🔒</text>
  <text x="566" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">🔒</text>
  <text x="686" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✏️</text>

  <!-- Strategy 2: Partial fine-tune -->
  <rect x="36" y="258" width="808" height="52" fill="#0d1117" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="60" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">전략 2: Partial Fine-tuning</text>
  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Block1~3 고정, Block4~5 + Head 학습 — 중간 크기 데이터셋, 다른 도메인</text>
  <text x="86"  y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">🔒</text>
  <text x="206" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">🔒</text>
  <text x="326" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">🔒</text>
  <text x="446" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✏️</text>
  <text x="566" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✏️</text>
  <text x="686" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✏️</text>

  <!-- Strategy 3: Full fine-tune -->
  <rect x="36" y="321" width="808" height="52" fill="#0d1117" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="60" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">전략 3: Full Fine-tuning</text>
  <text x="60" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전체 레이어 낮은 lr로 학습 — 데이터 충분, 도메인 다름 (의료, 위성 이미지 등)</text>
  <text x="86"  y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✏️</text>
  <text x="206" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✏️</text>
  <text x="326" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✏️</text>
  <text x="446" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✏️</text>
  <text x="566" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✏️</text>
  <text x="686" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✏️</text>

  <!-- Bottom tip -->
  <rect x="36" y="385" width="808" height="22" fill="#070b14" rx="4" stroke="#1e2433"/>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">저수준 특징은 도메인 무관(공유 가능) · 고수준 특징은 도메인 특화 → 고수준 레이어부터 교체</text>
</svg>
