<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커널 모듈 아키텍처</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Kernel Space ↔ User Space 모듈 관리 흐름</text>

  <!-- Kernel Space box -->
  <rect x="60" y="100" width="760" height="220" rx="8" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Kernel Space</text>

  <!-- Kernel core -->
  <rect x="300" y="135" width="280" height="60" rx="6" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Linux Kernel Core</text>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">module_list / 심볼 테이블</text>

  <!-- Loaded modules -->
  <rect x="100" y="220" width="130" height="70" rx="6" fill="#1a2a1a" stroke="#3a7a3a" stroke-width="1"/>
  <text x="165" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">ext4.ko</text>
  <text x="165" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파일시스템 드라이버</text>
  <text x="165" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">Used: 2</text>

  <rect x="260" y="220" width="130" height="70" rx="6" fill="#1a2a1a" stroke="#3a7a3a" stroke-width="1"/>
  <text x="325" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">e1000e.ko</text>
  <text x="325" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네트워크 드라이버</text>
  <text x="325" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">Used: 0</text>

  <rect x="420" y="220" width="130" height="70" rx="6" fill="#1a2a1a" stroke="#3a7a3a" stroke-width="1"/>
  <text x="485" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">nvidia.ko</text>
  <text x="485" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GPU 드라이버</text>
  <text x="485" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">Used: 3</text>

  <rect x="580" y="220" width="130" height="70" rx="6" fill="#1a2a1a" stroke="#3a7a3a" stroke-width="1"/>
  <text x="645" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">usbcore.ko</text>
  <text x="645" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">USB 서브시스템</text>
  <text x="645" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">Used: 8</text>

  <!-- arrows from modules to kernel core -->
  <line x1="165" y1="220" x2="385" y2="195" stroke="#3a7a3a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="325" y1="220" x2="415" y2="195" stroke="#3a7a3a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="485" y1="220" x2="465" y2="195" stroke="#3a7a3a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="645" y1="220" x2="495" y2="195" stroke="#3a7a3a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- User Space -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888" text-anchor="middle">User Space</text>

  <!-- User tools -->
  <rect x="100" y="375" width="140" height="55" rx="6" fill="#1a1a0a" stroke="#6a6a2a" stroke-width="1"/>
  <text x="170" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">lsmod</text>
  <text x="170" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모듈 목록 조회</text>

  <rect x="280" y="375" width="140" height="55" rx="6" fill="#1a1a0a" stroke="#6a6a2a" stroke-width="1"/>
  <text x="350" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">insmod</text>
  <text x="350" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">직접 .ko 삽입</text>

  <rect x="460" y="375" width="140" height="55" rx="6" fill="#1a1a0a" stroke="#6a6a2a" stroke-width="1"/>
  <text x="530" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">rmmod</text>
  <text x="530" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모듈 제거</text>

  <rect x="640" y="375" width="140" height="55" rx="6" fill="#1a0a1a" stroke="#6a2a6a" stroke-width="1"/>
  <text x="710" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">/lib/modules/</text>
  <text x="710" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.ko 파일 저장소</text>

  <!-- syscall arrows (user → kernel) -->
  <line x1="170" y1="375" x2="300" y2="320" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="350" y1="375" x2="390" y2="320" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="530" y1="375" x2="490" y2="320" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- /proc/modules label -->
  <rect x="310" y="458" width="260" height="38" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">/proc/modules → lsmod 데이터 소스</text>

  <!-- label for dashed arrow -->
  <text x="205" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">read-only</text>
</svg>
