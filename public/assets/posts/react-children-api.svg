<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">children 활용 패턴과 TypeScript 타입</text>

  <!-- Default children slot -->
  <rect x="60" y="68" width="370" height="100" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 슬롯 패턴</text>
  <rect x="76" y="106" width="338" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Modal({ children, title }) {</tspan></text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff">&gt;{title}{children}&lt;/</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff">&gt;;</tspan></text>

  <!-- Named slots via props -->
  <rect x="450" y="68" width="370" height="100" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">named slot (JSX as prop)</text>
  <rect x="466" y="106" width="338" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Layout({ header, sidebar, main }) {</tspan></text>
  <text x="482" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff">&gt;{header}{sidebar}{main}&lt;/</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff">&gt;;</tspan></text>

  <!-- TypeScript types -->
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">TypeScript: children 타입 선언</text>

  <rect x="60" y="220" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> { type ReactNode, type ReactElement } </tspan><tspan font-weight="600" fill="#7ec8e3">from</tspan><tspan fill="#ce9178"> 'react'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">type</tspan><tspan fill="#ffffff"> CardProps = {</tspan></text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  children: ReactNode;     </tspan><tspan fill="#9aa4b8">// 가장 넓음: 문자열/숫자/null/JSX 모두</tspan></text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  icon?: ReactElement;     </tspan><tspan fill="#9aa4b8">// JSX Element만 허용</tspan></text>

  <!-- Children check pattern -->
  <rect x="60" y="340" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// children 존재 여부 확인 패턴</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Button({ children, icon }) {</tspan></text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">button</tspan><tspan fill="#ffffff">&gt;{icon}{children ?? </tspan><tspan fill="#ce9178">'버튼'</tspan><tspan fill="#ffffff">}&lt;/</tspan><tspan fill="#55c555">button</tspan><tspan fill="#ffffff">&gt;;</tspan></text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// children이 없으면 기본 텍스트 '버튼' 사용</text>
</svg>
