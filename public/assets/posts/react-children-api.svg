<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">다중 슬롯 패턴 (명명된 props)</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">children 하나로 부족할 때 prop 이름을 붙인다</text>

  <rect x="60" y="96" width="760" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* header, footer 슬롯을 명시적 prop으로 분리 */}
  </text>
  <text x="80" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Modal({ header, children, footer }) {</tspan>
  </text>
  <text x="80" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> (</tspan>
  </text>
  <text x="80" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;div className=</tspan><tspan fill="#ce9178">"modal"</tspan><tspan>&gt;</tspan>
  </text>
  <text x="80" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      &lt;div className=</tspan><tspan fill="#ce9178">"modal-header"</tspan><tspan>&gt;{header}&lt;/div&gt;</tspan>
  </text>
  <text x="80" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      &lt;div className=</tspan><tspan fill="#ce9178">"modal-body"</tspan><tspan>&gt;{children}&lt;/div&gt;</tspan>
  </text>
  <text x="80" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      &lt;div className=</tspan><tspan fill="#ce9178">"modal-footer"</tspan><tspan>&gt;{footer}&lt;/div&gt;</tspan>
  </text>
  <text x="80" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;/div&gt;</tspan>
  </text>
  <text x="80" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  );</tspan>
  </text>
  <text x="80" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>}</tspan>
  </text>
  <text x="80" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>&lt;Modal</tspan>
  </text>
  <text x="80" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  header={&lt;h2&gt;확인&lt;/h2&gt;}</tspan>
  </text>
  <text x="80" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  footer={&lt;Button&gt;닫기&lt;/Button&gt;}</tspan>
  </text>
  <text x="80" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>&gt;본문 내용&lt;/Modal&gt;</tspan>
  </text>
</svg>
