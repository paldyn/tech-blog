<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle 잠금 유형 구조</text>

  <!-- DML Locks column -->
  <rect x="60" y="66" width="240" height="50" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">DML 잠금</text>
  <text x="180" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">행 + 테이블 수준</text>

  <!-- DML items -->
  <rect x="75" y="130" width="210" height="50" rx="6" fill="#0d1828" stroke="#3a4a6e"/>
  <text x="180" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">TX Lock (Row Lock)</text>
  <text x="180" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">블록 ITL에 표시, 행 수준</text>

  <rect x="75" y="192" width="210" height="50" rx="6" fill="#0d1828" stroke="#3a4a6e"/>
  <text x="180" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">TM Lock (Table Lock)</text>
  <text x="180" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RS·RX·S·SRX·X 모드</text>

  <!-- DDL Locks column -->
  <rect x="325" y="66" width="240" height="50" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="445" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">DDL 잠금</text>
  <text x="445" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">딕셔너리 + 라이브러리 캐시</text>

  <rect x="340" y="130" width="210" height="50" rx="6" fill="#1a1010" stroke="#3a4a6e"/>
  <text x="445" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Dictionary Lock</text>
  <text x="445" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DDL 실행 중 딕셔너리 보호</text>

  <rect x="340" y="192" width="210" height="50" rx="6" fill="#1a1010" stroke="#3a4a6e"/>
  <text x="445" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Library Cache Lock</text>
  <text x="445" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공유 SQL·PL/SQL 객체 보호</text>

  <!-- Internal Locks column -->
  <rect x="590" y="66" width="240" height="50" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">내부 잠금</text>
  <text x="710" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메모리 구조 보호</text>

  <rect x="605" y="130" width="210" height="50" rx="6" fill="#0f180f" stroke="#3a4a6e"/>
  <text x="710" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Latch</text>
  <text x="710" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SGA 메모리 구조 직렬화</text>

  <rect x="605" y="192" width="210" height="50" rx="6" fill="#0f180f" stroke="#3a4a6e"/>
  <text x="710" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Mutex</text>
  <text x="710" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커서 핀, Shared Pool 경량화</text>

  <!-- TM Lock Modes detail -->
  <rect x="60" y="268" width="760" height="90" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">TM (테이블) 잠금 모드 — DML 시 자동 획득</text>

  <text x="105" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">RS (Row-S)</text>
  <text x="105" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SELECT FOR UPDATE</text>

  <text x="248" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">RX (Row-X)</text>
  <text x="248" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">INSERT / UPDATE / DELETE</text>

  <text x="400" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">S (Share)</text>
  <text x="400" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">LOCK TABLE IN SHARE MODE</text>

  <text x="565" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">SRX</text>
  <text x="565" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Share Row Exclusive</text>

  <text x="725" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">X (Exclusive)</text>
  <text x="725" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DDL / LOCK TABLE IN EXCLUSIVE</text>

  <!-- v$lock note -->
  <rect x="60" y="376" width="760" height="100" rx="8" fill="#0d1828" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">잠금 경합 진단: v$lock</text>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v$lock — 현재 보유·대기 중인 Enqueue 잠금 목록 (TX, TM 등)</text>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v$session_wait — 세션이 대기 중인 이벤트 (enq: TX - row lock contention 등)</text>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v$latch — 래치 경합 통계 (spin_gets, sleeps, misses)</text>
  <text x="440" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v$mutex_sleep — Mutex 경합 통계</text>
</svg>
