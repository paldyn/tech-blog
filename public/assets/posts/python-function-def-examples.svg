<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">함수 정의와 호출 패턴</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">반환값 없음 / 반환값 있음 / 기본값 인수</text>

  <!-- Left: define functions -->
  <rect x="60" y="90" width="360" height="290" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 반환값 없는 함수</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> say_hello(name):</tspan></text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    </tspan><tspan fill="#e8e8e8">print(</tspan><tspan fill="#ce9178">f"Hello, {name}!"</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 반환값 있는 함수</text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> add(a, b):</tspan></text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#e8e8e8"> a + b</tspan></text>

  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 기본값 인수 함수</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> power(base, exp=</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">):</tspan></text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#e8e8e8"> base ** exp</tspan></text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># exp 생략 시 2 사용</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 정의 (definition)</text>

  <!-- Right: call results -->
  <rect x="460" y="90" width="360" height="290" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="476" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 호출 (call)</text>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">say_hello(</tspan><tspan fill="#ce9178">"철수"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># Hello, 철수!</text>
  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">result = say_hello(</tspan><tspan fill="#ce9178">"영희"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="476" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">print(result)    </tspan><tspan fill="#888"># None</tspan></text>

  <text x="476" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">print(add(</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">))  </tspan><tspan fill="#888"># 7</tspan></text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">s = add(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">print(s)         </tspan><tspan fill="#888"># 30</tspan></text>

  <text x="476" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">print(power(</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">))    </tspan><tspan fill="#888"># 9</tspan></text>
  <text x="476" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">print(power(</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#e8e8e8">))  </tspan><tspan fill="#888"># 1024</tspan></text>
  <text x="476" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 결과 (result)</text>

  <!-- Arrow between blocks -->
  <line x1="422" y1="235" x2="448" y2="235" stroke="#55c555" stroke-width="2"/>
  <polygon points="445,229 458,235 445,241" fill="#55c555"/>
</svg>
