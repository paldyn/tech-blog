<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">요약 옵션 네 가지</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">사람용이냐 기계용이냐, 파일별이냐 디렉터리별이냐</text>

  <rect x="50" y="100" width="390" height="90" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="68" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">--stat</text>
  <text x="68" y="156" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">파일별 변경 막대 + 합계</text>
  <text x="68" y="178" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">사람이 보기 좋은 기본 요약</text>

  <rect x="460" y="100" width="370" height="90" rx="10" fill="#101010" stroke="#9988dd" stroke-width="1.5"/>
  <text x="478" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#9988dd">--shortstat</text>
  <text x="478" y="156" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">합계 한 줄만</text>
  <text x="478" y="178" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">N files, +X, -Y</text>

  <rect x="50" y="210" width="390" height="90" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="68" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">--numstat</text>
  <text x="68" y="266" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">탭 구분 숫자 (added del path)</text>
  <text x="68" y="288" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">스크립트 파싱에 적합</text>

  <rect x="460" y="210" width="370" height="90" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="478" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">--dirstat</text>
  <text x="478" y="266" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">디렉터리별 변경 비율(%)</text>
  <text x="478" y="288" font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">변경이 몰린 영역 파악</text>
</svg>
