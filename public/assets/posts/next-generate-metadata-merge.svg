<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메타데이터 상속·병합 규칙</text>

  <!-- Code block -->
  <rect x="60" y="66" width="760" height="314" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// generateMetadata — parent 상속 패턴</text>
  <text x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export async function</tspan><tspan fill="#ffffff"> generateMetadata(</tspan></text>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  &#123; params &#125;: &#123; params: &#123; slug: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> &#125; &#125;,</tspan></text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  parent: ResolvingMetadata</tspan></text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">): </tspan><tspan fill="#7ec8e3" font-weight="600">Promise</tspan><tspan fill="#ffffff">&lt;Metadata&gt; &#123;</tspan></text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> post = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> getPost(params.slug)</tspan></text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (!post) </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> &#123; title: </tspan><tspan fill="#ce9178">'Not Found'</tspan><tspan fill="#ffffff"> &#125;</tspan></text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff"> </text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">  // parent await는 필요할 때만 (항상 할 필요 없음)</text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> parentImages = (</tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> parent).openGraph?.images ?? []</tspan></text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff"> </text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &#123;</tspan></text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    title: post.title,             </tspan><tspan fill="#9aa4b8">// template 적용 → 'title | 브랜드'</tspan></text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    description: post.summary,</tspan></text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    openGraph: &#123; images: [`/og/$&#123;post.slug&#125;`, ...parentImages] &#125;</tspan></text>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  &#125;</tspan></text>

  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">얕은 병합(shallow merge) — 객체 필드는 하위가 덮어씀 / openGraph 전체를 교체하려면 전체 명시 필요</text>
</svg>
