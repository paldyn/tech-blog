<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring Boot 스타터 구조 예시</text>
  <text x="440" y="66" font-size="13" fill="#888" text-anchor="middle">starter 하나가 관련 의존성 전체를 자동으로 가져옴</text>

  <!-- build.gradle code block -->
  <rect x="60" y="84" width="360" height="220" fill="#070b14" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="108" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// build.gradle</text>
  <text x="76" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dependencies {</text>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // 스타터 하나로</text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  implementation</text>
  <text x="76" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    'o.s.b:spring-boot-</text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">     starter-web'</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  implementation</text>
  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    'o.s.b:spring-boot-</text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">     starter-data-jpa'</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  implementation</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    'o.s.b:spring-boot-</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">     starter-security'</text>

  <!-- Arrow -->
  <polygon points="434,194 470,194 470,182 490,214 470,246 470,234 434,234"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Resolved dependencies -->
  <rect x="500" y="84" width="320" height="340" fill="#0e1420" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="660" y="108" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">자동으로 포함되는 라이브러리</text>

  <text x="520" y="134" font-size="12" fill="#888">starter-web 포함:</text>
  <text x="520" y="154" font-size="12" fill="#55c555">  spring-webmvc</text>
  <text x="520" y="172" font-size="12" fill="#55c555">  spring-context</text>
  <text x="520" y="190" font-size="12" fill="#55c555">  tomcat-embed-core</text>
  <text x="520" y="208" font-size="12" fill="#55c555">  jackson-databind</text>

  <line x1="516" y1="220" x2="804" y2="220" stroke="#333" stroke-width="1"/>
  <text x="520" y="240" font-size="12" fill="#888">starter-data-jpa 포함:</text>
  <text x="520" y="260" font-size="12" fill="#ce9178">  hibernate-core</text>
  <text x="520" y="278" font-size="12" fill="#ce9178">  spring-data-jpa</text>
  <text x="520" y="296" font-size="12" fill="#ce9178">  HikariCP</text>

  <line x1="516" y1="308" x2="804" y2="308" stroke="#333" stroke-width="1"/>
  <text x="520" y="328" font-size="12" fill="#888">starter-security 포함:</text>
  <text x="520" y="348" font-size="12" fill="#e0c555">  spring-security-core</text>
  <text x="520" y="366" font-size="12" fill="#e0c555">  spring-security-web</text>
  <text x="520" y="384" font-size="12" fill="#e0c555">  spring-security-config</text>
  <text x="520" y="402" font-size="12" fill="#888">  (버전은 BOM이 관리)</text>

  <!-- Footer -->
  <text x="440" y="452" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #3</text>
</svg>
