<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">인증 보안 강화 방법</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#9aa4b8" text-anchor="middle">Authentication Security Fixes</text>

  <!-- Code box -->
  <rect x="60" y="96" width="760" height="350" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Header bar -->
  <rect x="60" y="96" width="760" height="32" rx="8" fill="#0f1929"/>
  <rect x="60" y="112" width="760" height="16" fill="#0f1929"/>
  <circle cx="84" cy="112" r="5" fill="#e05a5a"/>
  <circle cx="102" cy="112" r="5" fill="#d4c027"/>
  <circle cx="120" cy="112" r="5" fill="#4ec94e"/>
  <text x="440" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">secure-auth.js</text>

  <!-- Code lines -->
  <text x="88" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// &#x2705; &#xACC4;&#xC815; &#xC7A0;&#xAE08; &#xAD6C;&#xD604;</text>
  <text x="88" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">async function</tspan><tspan fill="#ffffff"> login(user, pass) {</tspan></text>
  <text x="88" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> account = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> findUser(user)</tspan></text>
  <text x="88" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (account.failedAttempts &gt;= 5) {</tspan></text>
  <text x="88" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">throw new</tspan><tspan fill="#ffffff"> Error(</tspan><tspan fill="#ce9178">'&#xACC4;&#xC815; &#xC7A0;&#xAE08;&#xB428;'</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="88" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  }</tspan></text>
  <text x="88" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> ok = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> bcrypt.compare(</tspan></text>
  <text x="88" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    pass, account.passwordHash)</tspan></text>
  <text x="88" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (!ok) {</tspan></text>
  <text x="88" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> incrementFailedAttempts(user)</tspan></text>
  <text x="88" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">throw new</tspan><tspan fill="#ffffff"> Error(</tspan><tspan fill="#ce9178">'&#xC778;&#xC99D; &#xC2E4;&#xD328;'</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="88" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  }</tspan></text>
  <text x="88" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> resetFailedAttempts(user)</tspan></text>
  <text x="88" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> createSession(account)</tspan></text>
  <text x="88" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>
</svg>
