<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">슬라이딩 윈도우 최솟값 — 단조 덱</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">배열 [3,1,2,4,3], k=3 — 각 창의 최솟값</text>

  <!-- array -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">입력 배열 (인덱스):</text>

  <rect x="60"  y="104" width="60" height="48" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="90"  y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#e8e8e8">3</text>
  <text x="90"  y="143" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">[0]</text>

  <rect x="128" y="104" width="60" height="48" rx="6" fill="#0d1f0d" stroke="#1a5a1a" stroke-width="2"/>
  <text x="158" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#55c555">1</text>
  <text x="158" y="143" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">[1]</text>

  <rect x="196" y="104" width="60" height="48" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="226" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#e8e8e8">2</text>
  <text x="226" y="143" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">[2]</text>

  <rect x="264" y="104" width="60" height="48" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="294" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#e8e8e8">4</text>
  <text x="294" y="143" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">[3]</text>

  <rect x="332" y="104" width="60" height="48" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="362" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#e8e8e8">3</text>
  <text x="362" y="143" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">[4]</text>

  <!-- window brackets -->
  <rect x="56" y="100" width="208" height="56" rx="8" fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="160" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">window [0..2]</text>

  <!-- step-by-step table -->
  <text x="60" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">단조 덱 처리 과정 (덱 = 인덱스 저장, 앞이 최솟값)</text>

  <rect x="60" y="214" width="760" height="186" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- headers -->
  <text x="76"  y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">i</text>
  <text x="110" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">arr[i]</text>
  <text x="170" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">처리</text>
  <text x="450" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">덱 (인덱스)</text>
  <text x="620" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">결과</text>
  <line x1="76" y1="242" x2="804" y2="242" stroke="#2a3a5e" stroke-width="1"/>

  <text x="76"  y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">0</text>
  <text x="110" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">3</text>
  <text x="170" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">push(0)</text>
  <text x="450" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[0]</text>
  <text x="620" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">창 미완성</text>

  <text x="76"  y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">1</text>
  <text x="110" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">1</text>
  <text x="170" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">arr[0]=3&gt;1 → pop(0), push(1)</text>
  <text x="450" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[1]</text>
  <text x="620" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">창 미완성</text>

  <text x="76"  y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">2</text>
  <text x="110" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">2</text>
  <text x="170" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">arr[1]=1&lt;2 → push(2)</text>
  <text x="450" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[1,2]</text>
  <text x="620" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">min=arr[1]=1</text>

  <text x="76"  y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">3</text>
  <text x="110" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">4</text>
  <text x="170" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">push(3), front=1 범위 내</text>
  <text x="450" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[1,2,3]</text>
  <text x="620" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">min=arr[1]=1</text>

  <text x="76"  y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">4</text>
  <text x="110" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">3</text>
  <text x="170" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">front=1 만료 popleft, push(4)</text>
  <text x="450" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[2,4]</text>
  <text x="620" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">min=arr[2]=2</text>

  <text x="76"  y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">결과: [1, 1, 2]  (각 창 최솟값)</text>

  <!-- complexity -->
  <rect x="60" y="410" width="760" height="36" rx="6" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="76" y="433" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">시간 O(n) (각 원소 push/pop 최대 1번씩), 공간 O(k)</text>
</svg>
