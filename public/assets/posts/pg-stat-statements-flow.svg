<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pg_stat_statements 동작 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">쿼리 실행 → 통계 누적 → 뷰로 조회</text>

  <!-- App -->
  <rect x="60" y="100" width="140" height="56" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">애플리케이션</text>
  <text x="130" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SQL 실행</text>

  <!-- Arrow -->
  <line x1="200" y1="128" x2="255" y2="128" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Executor -->
  <rect x="260" y="100" width="160" height="56" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">쿼리 실행기</text>
  <text x="340" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Executor Hook</text>

  <!-- Arrow -->
  <line x1="420" y1="128" x2="475" y2="128" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Shared memory -->
  <rect x="480" y="88" width="280" height="80" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">공유 메모리 해시 테이블</text>
  <text x="620" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">QueryID → 통계 누적</text>
  <text x="620" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">calls, total_time, rows, I/O...</text>

  <!-- Arrow down -->
  <line x1="620" y1="200" x2="620" y2="240" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="632" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">주기적 디스크</text>
  <text x="632" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">플러시</text>

  <!-- pg_stat_statements.stat file -->
  <rect x="500" y="250" width="240" height="50" rx="8" fill="#2e1a00" stroke="#ce9178" stroke-width="1.2"/>
  <text x="620" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">pg_stat_statements.stat</text>
  <text x="620" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">$PGDATA에 영구 저장</text>

  <!-- View arrow up-left -->
  <line x1="340" y1="158" x2="340" y2="250" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="340" y1="250" x2="200" y2="250" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DBA View query -->
  <rect x="60" y="230" width="200" height="60" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">pg_stat_statements</text>
  <text x="160" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">뷰 (DBA 조회)</text>
  <text x="160" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SELECT * FROM ...</text>

  <!-- Key columns -->
  <text x="75" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">주요 컬럼</text>
  <rect x="60" y="338" width="760" height="120" rx="6" fill="#070b14" stroke="#1e2433"/>

  <!-- Header -->
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">컬럼                     설명</text>
  <line x1="76" y1="362" x2="804" y2="362" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">query                    </text>
  <text x="316" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">파라미터 정규화된 쿼리 텍스트 ($1, $2...)</text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">calls / rows             </text>
  <text x="316" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">총 호출 횟수 / 총 반환 행 수</text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">total_exec_time          </text>
  <text x="316" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">총 실행 시간(ms) — 핫스팟 찾기</text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">mean_exec_time           </text>
  <text x="316" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">평균 실행 시간(ms) — 느린 쿼리</text>
  <text x="76" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">shared_blks_hit/read     </text>
  <text x="316" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">버퍼 캐시 히트/디스크 읽기</text>
</svg>
