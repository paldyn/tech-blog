<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="tgArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">await 코루틴 vs Task 스케줄링</text>

  <!-- 좌: 순차 await -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">await coro()  — 하나씩 순차</text>
  <rect x="60" y="118" width="120" height="36" fill="#222222" stroke="#555555" stroke-width="1" rx="4"/>
  <text x="105" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">작업 A</text>
  <rect x="190" y="118" width="120" height="36" fill="#222222" stroke="#555555" stroke-width="1" rx="4"/>
  <text x="235" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">작업 B</text>
  <rect x="320" y="118" width="120" height="36" fill="#222222" stroke="#555555" stroke-width="1" rx="4"/>
  <text x="365" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">작업 C</text>
  <text x="460" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">→ A+B+C 시간 합산</text>

  <!-- 우: gather -->
  <text x="60" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">gather(A, B, C)  — 동시 진행</text>
  <rect x="60" y="238" width="120" height="32" fill="#55c555" rx="4"/>
  <text x="120" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">작업 A</text>
  <rect x="60" y="276" width="120" height="32" fill="#55c555" rx="4"/>
  <text x="120" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">작업 B</text>
  <rect x="60" y="314" width="120" height="32" fill="#55c555" rx="4"/>
  <text x="120" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">작업 C</text>
  <path d="M 195 292 L 300 292" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tgArr)"/>
  <text x="320" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">→ 가장 느린 작업 하나의 시간</text>
  <text x="320" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">결과는 입력 순서대로 리스트 반환</text>
</svg>
