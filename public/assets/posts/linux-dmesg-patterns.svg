<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">dmesg 주요 진단 패턴</text>

  <!-- OOM -->
  <rect x="60" y="62" width="760" height="84" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">OOM Killer</text>
  <text x="80" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">[ 1234.56] Out of memory: Killed process 5678 (java)</text>
  <text x="80" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">[ 1234.57] total-vm:2048000kB, anon-rss:1900000kB</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메모리 부족으로 프로세스 강제 종료 — 메모리 누수 또는 과도한 사용 의심</text>

  <!-- Disk error -->
  <rect x="60" y="160" width="760" height="84" rx="6" fill="#1a0d0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">디스크 I/O 오류</text>
  <text x="80" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">[ 567.89] blk_update_request: I/O error, dev sda, sector 12345</text>
  <text x="80" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">[ 568.00] SCSI error: return code = 0x08000002</text>
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">하드웨어 디스크 고장 신호 — 즉각 백업 후 교체 검토</text>

  <!-- Network error -->
  <rect x="60" y="258" width="760" height="84" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">네트워크 링크</text>
  <text x="80" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">[ 123.45] eth0: renamed from veth3abc (net)</text>
  <text x="80" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">[ 124.00] eth0: Link is Up - 1000Mbps/Full</text>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인터페이스 이름 변경, 링크 상태 변화 — 네트워크 불안정 진단에 활용</text>

  <!-- grep tip -->
  <rect x="60" y="358" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">dmesg <tspan fill="#ffffff">-T</tspan> | grep <tspan fill="#white">-iE</tspan> <tspan fill="#ce9178">'error|fail|oom|killed|denied|segfault'</tspan></text>
</svg>
