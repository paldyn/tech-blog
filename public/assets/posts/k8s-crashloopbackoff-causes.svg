<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrC" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">CrashLoopBackOff 원인 분류</text>
  <text x="50" y="80" font-size="14" fill="#888">종료 코드와 로그가 어느 갈래인지 알려준다</text>

  <text x="60" y="118" font-size="13" font-weight="600" fill="#9aa4b8">증상 / 신호</text>
  <text x="490" y="118" font-size="13" font-weight="600" fill="#9aa4b8">원인과 첫 조치</text>

  <rect x="50" y="130" width="380" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="155" font-size="13" font-weight="600" fill="#ffffff">Exit Code 1 / 비-0, 로그에 스택트레이스</text>
  <text x="66" y="176" font-size="12" fill="#9aa4b8">애플리케이션 자체 에러</text>
  <rect x="490" y="130" width="340" height="58" rx="8" fill="#16181d" stroke="#3a4a6e" stroke-width="1.3"/>
  <text x="506" y="155" font-size="13" fill="#ffffff">logs --previous 로 코드 버그·예외 추적</text>
  <text x="506" y="176" font-size="12" fill="#9aa4b8">env·설정 누락 여부도 함께 확인</text>

  <rect x="50" y="200" width="380" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="225" font-size="13" font-weight="600" fill="#ffffff">Exit Code 137 (128+9, SIGKILL)</text>
  <text x="66" y="246" font-size="12" fill="#9aa4b8">OOMKilled 또는 liveness 강제 종료</text>
  <rect x="490" y="200" width="340" height="58" rx="8" fill="#16181d" stroke="#3a4a6e" stroke-width="1.3"/>
  <text x="506" y="225" font-size="13" fill="#ffffff">메모리 limit 상향 또는 프로브 완화</text>
  <text x="506" y="246" font-size="12" fill="#9aa4b8">describe 의 Reason: OOMKilled 확인</text>

  <rect x="50" y="270" width="380" height="58" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
  <text x="66" y="295" font-size="13" font-weight="600" fill="#ffffff">즉시 종료 / Events에 probe failed</text>
  <text x="66" y="316" font-size="12" fill="#9aa4b8">liveness가 부팅 전에 실패</text>
  <rect x="490" y="270" width="340" height="58" rx="8" fill="#16181d" stroke="#3a4a6e" stroke-width="1.3"/>
  <text x="506" y="295" font-size="13" fill="#ffffff">startupProbe 추가, initialDelay 상향</text>
  <text x="506" y="316" font-size="12" fill="#9aa4b8">느린 부팅을 죽음으로 오인한 경우</text>

  <line x1="432" y1="159" x2="488" y2="159" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrC)"/>
  <line x1="432" y1="229" x2="488" y2="229" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrC)"/>
  <line x1="432" y1="299" x2="488" y2="299" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrC)"/>

  <text x="50" y="370" font-size="13" fill="#888">시작점은 언제나 같다 — kubectl describe 의 Exit Code 와 kubectl logs --previous 의 마지막 줄.</text>
</svg>
