<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 430">
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HikariCP 핵심 설정 &amp; 트러블슈팅</text>

  <!-- ── Left: application.yml config ── -->
  <text x="70" y="76"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">application.yml — HikariCP 설정</text>

  <rect x="70" y="88" width="360" height="294" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="86" y="116" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">spring:</text>
  <text x="86" y="134" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  datasource:</text>
  <text x="86" y="152" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    hikari:</text>
  <text x="86" y="170" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      <tspan fill="#55c555">maximum-pool-size</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#b5cea8">20</tspan></text>
  <text x="86" y="188" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      <tspan fill="#55c555">minimum-idle</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#b5cea8">5</tspan></text>
  <text x="86" y="206" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      <tspan fill="#7ec8e3">connection-timeout</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#b5cea8">30000</tspan></text>
  <text x="86" y="224" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      <tspan fill="#7ec8e3">idle-timeout</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#b5cea8">600000</tspan></text>
  <text x="86" y="242" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      <tspan fill="#7ec8e3">max-lifetime</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#b5cea8">1800000</tspan></text>
  <text x="86" y="260" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      <tspan fill="#7777cc">keepalive-time</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#b5cea8">60000</tspan></text>
  <text x="86" y="278" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      <tspan fill="#7777cc">pool-name</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#ce9178">MyHikariPool</tspan></text>
  <text x="86" y="296" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      <tspan fill="#7777cc">connection-test-query</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="86" y="314" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#ce9178">        SELECT 1</text>
  <text x="86" y="332" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">      # JDBC4+ 자동 유효성 검사 지원 시 불필요</text>

  <!-- ── Right: 설정값 설명 테이블 ── -->
  <text x="460" y="76"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">설정 가이드라인</text>

  <!-- Table headers -->
  <rect x="460" y="88" width="350" height="30" rx="6" fill="#111827"/>
  <text x="470" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#888">속성</text>
  <text x="590" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#888">기본값</text>
  <text x="660" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#888">권장</text>

  <!-- Row 1 -->
  <line x1="460" y1="118" x2="810" y2="118" stroke="#1e2433" stroke-width="1"/>
  <text x="470" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">maximumPoolSize</text>
  <text x="590" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">10</text>
  <text x="660" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">코어×2+디스크 수</text>

  <!-- Row 2 -->
  <line x1="460" y1="142" x2="810" y2="142" stroke="#1e2433" stroke-width="1"/>
  <text x="470" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">minimumIdle</text>
  <text x="590" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">= maxPool</text>
  <text x="660" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">= maxPool 권장</text>

  <!-- Row 3 -->
  <line x1="460" y1="166" x2="810" y2="166" stroke="#1e2433" stroke-width="1"/>
  <text x="470" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">connectionTimeout</text>
  <text x="590" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">30,000ms</text>
  <text x="660" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">5,000~30,000ms</text>

  <!-- Row 4 -->
  <line x1="460" y1="190" x2="810" y2="190" stroke="#1e2433" stroke-width="1"/>
  <text x="470" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">idleTimeout</text>
  <text x="590" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">600,000ms</text>
  <text x="660" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">10~30분</text>

  <!-- Row 5 -->
  <line x1="460" y1="214" x2="810" y2="214" stroke="#1e2433" stroke-width="1"/>
  <text x="470" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">maxLifetime</text>
  <text x="590" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">1,800,000ms</text>
  <text x="660" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">DB wait_timeout미만</text>

  <!-- Row 6 -->
  <line x1="460" y1="238" x2="810" y2="238" stroke="#1e2433" stroke-width="1"/>
  <text x="470" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc">keepaliveTime</text>
  <text x="590" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">0 (비활성)</text>
  <text x="660" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">30,000~60,000ms</text>

  <!-- Common pitfalls box -->
  <rect x="460" y="274" width="350" height="106" rx="8" fill="#1a1507" stroke="#e8a030" stroke-width="1"/>
  <text x="476" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8a030">자주 발생하는 문제</text>
  <text x="476" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• Connection Timeout: maxPool 부족 또는 트랜잭션 누수</text>
  <text x="476" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• 유효하지 않은 연결: maxLifetime &gt; DB wait_timeout</text>
  <text x="476" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• 풀 크기 과소 설정: DB 커넥션보다 크게 설정 금지</text>
  <text x="476" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">• 멀티 DataSource: pool-name으로 구분해 모니터링</text>

  <!-- Bottom monitoring hint -->
  <text x="70" y="406"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">모니터링: management.metrics.enable.hikaricp=true + Actuator /actuator/metrics/hikaricp.*</text>
</svg>
