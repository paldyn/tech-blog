<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">React DevTools Profiler 사용법</text>

  <!-- Step boxes: 4 steps -->
  <text x="170" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 프로파일링 시작</text>
  <rect x="60" y="98" width="220" height="95" rx="8" fill="#0d1212" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">DevTools → Profiler 탭</text>
  <text x="170" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">● 버튼 클릭으로 녹화 시작</text>
  <text x="170" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">측정할 사용자 인터랙션 실행</text>
  <text x="170" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3" text-anchor="middle">■ 버튼으로 녹화 중지</text>

  <text x="390" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② 커밋 선택</text>
  <rect x="280" y="98" width="220" height="95" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">상단 바 차트 = 각 커밋</text>
  <text x="390" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">높을수록 렌더 시간이 긴 커밋</text>
  <text x="390" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">노란색·빨간색 커밋 주목</text>
  <text x="390" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">느린 커밋 클릭 선택</text>

  <text x="610" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">③ 플레임 그래프 분석</text>
  <rect x="500" y="98" width="220" height="95" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="610" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">가로 = 렌더 시간 비율</text>
  <text x="610" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">노란색 = 렌더된 컴포넌트</text>
  <text x="610" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">회색 = 렌더 스킵된 컴포넌트</text>
  <text x="610" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc" text-anchor="middle">너비 넓은 박스 = 병목</text>

  <!-- Flamegraph mock -->
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">플레임 그래프 예시 (위쪽이 루트)</text>

  <rect x="60" y="242" width="760" height="28" rx="4" fill="#ce9178"/>
  <text x="440" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#000" font-weight="600" text-anchor="middle">App (12.4ms)</text>

  <rect x="60" y="276" width="480" height="28" rx="4" fill="#e0a050"/>
  <text x="300" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#000" font-weight="600" text-anchor="middle">ProductList (9.2ms) ← 병목!</text>

  <rect x="546" y="276" width="160" height="28" rx="4" fill="#888"/>
  <text x="626" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#fff" text-anchor="middle">Header (스킵)</text>

  <rect x="711" y="276" width="109" height="28" rx="4" fill="#888"/>
  <text x="765" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#fff" text-anchor="middle">Footer (스킵)</text>

  <rect x="60" y="310" width="200" height="24" rx="4" fill="#5a8a5a"/>
  <text x="160" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#fff" text-anchor="middle">ProductItem ×8</text>

  <rect x="266" y="310" width="150" height="24" rx="4" fill="#5a8a5a"/>
  <text x="341" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#fff" text-anchor="middle">SortBar (0.3ms)</text>

  <!-- Bottom hint -->
  <rect x="60" y="358" width="760" height="38" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1"/>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888" text-anchor="middle">가로 폭이 넓은 노란색 박스 = 렌더 시간이 긴 컴포넌트 = 최적화 후보</text>
</svg>
