<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">1차 캐시와 변경 감지(Dirty Checking) 동작 흐름</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13">find() 호출 → 스냅샷 저장 → 수정 → flush 시 비교 → UPDATE 자동 실행</text>

  <!-- Step 1: find() -->
  <rect x="60" y="96" width="200" height="64" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="122" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600">① find(Member, 1L)</text>
  <text x="160" y="144" text-anchor="middle" fill="#888" font-size="12">DB에 SELECT 실행</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="128" x2="310" y2="128" stroke="#555" stroke-width="1.5"/>
  <polygon points="306,122 318,128 306,134" fill="#555"/>

  <!-- Step 2: 1st cache + snapshot -->
  <rect x="318" y="88" width="244" height="80" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="113" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">② 1차 캐시 + 스냅샷 저장</text>
  <text x="440" y="132" text-anchor="middle" fill="#888" font-size="11">id=1, name="Alice" → 엔티티 저장</text>
  <text x="440" y="150" text-anchor="middle" fill="#888" font-size="11">스냅샷: {id:1, name:"Alice"} 복사</text>

  <!-- Arrow 2→3 -->
  <line x1="562" y1="128" x2="612" y2="128" stroke="#555" stroke-width="1.5"/>
  <polygon points="608,122 620,128 608,134" fill="#555"/>

  <!-- Step 3: 반환 -->
  <rect x="620" y="96" width="200" height="64" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="122" text-anchor="middle" fill="#7777cc" font-size="14" font-weight="600">③ 영속 엔티티 반환</text>
  <text x="720" y="144" text-anchor="middle" fill="#888" font-size="12">관리 상태 진입</text>

  <!-- Divider -->
  <line x1="60" y1="188" x2="820" y2="188" stroke="#1a1a2a" stroke-width="1"/>

  <!-- Step 4: 수정 -->
  <rect x="60" y="208" width="200" height="64" rx="8" fill="#1a1510" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="160" y="234" text-anchor="middle" fill="#e8b84b" font-size="14" font-weight="600">④ setName("Bob")</text>
  <text x="160" y="254" text-anchor="middle" fill="#888" font-size="12">필드 값만 변경</text>

  <!-- Arrow 4→5 -->
  <line x1="260" y1="240" x2="310" y2="240" stroke="#555" stroke-width="1.5"/>
  <polygon points="306,234 318,240 306,246" fill="#555"/>

  <!-- Step 5: flush -->
  <rect x="318" y="208" width="244" height="64" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="234" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600">⑤ flush() (커밋 직전)</text>
  <text x="440" y="254" text-anchor="middle" fill="#888" font-size="12">현재 상태 vs 스냅샷 비교</text>

  <!-- Step 5 detail -->
  <rect x="318" y="284" width="244" height="60" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="334" y="305" fill="#9aa4b8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">현재: {id:1, name:"Bob"}</text>
  <text x="334" y="323" fill="#9aa4b8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">스냅샷: {id:1, name:"Alice"}</text>
  <text x="334" y="341" fill="#55c555" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">→ name 변경 감지!</text>

  <!-- Arrow 5→6 -->
  <line x1="562" y1="240" x2="612" y2="240" stroke="#55c555" stroke-width="2"/>
  <polygon points="608,234 620,240 608,246" fill="#55c555"/>

  <!-- Step 6: UPDATE -->
  <rect x="620" y="208" width="200" height="64" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="234" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">⑥ UPDATE 자동 실행</text>
  <text x="720" y="254" text-anchor="middle" fill="#888" font-size="12">변경 필드만 포함</text>

  <!-- Arrow to DB -->
  <line x1="720" y1="272" x2="720" y2="340" stroke="#555" stroke-width="1.5"/>
  <polygon points="716,338 720,350 724,338" fill="#555"/>

  <!-- DB box -->
  <rect x="620" y="350" width="200" height="50" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="380" text-anchor="middle" fill="#e05555" font-size="14" font-weight="600">Database</text>

  <!-- SQL code -->
  <rect x="60" y="368" width="520" height="60" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="390" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 변경된 필드만 UPDATE (기본 동작)</text>
  <text x="76" y="408" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">UPDATE</text><text x="126" y="408" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> member </text><text x="200" y="408" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">SET</text><text x="224" y="408" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> name=</text><text x="270" y="408" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">'Bob'</text><text x="306" y="408" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> WHERE</text><text x="360" y="408" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> id=</text><text x="392" y="408" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">1</text>

  <!-- Note: Hibernate default is all-column update -->
  <rect x="60" y="444" width="760" height="60" rx="6" fill="#0f0f1a" stroke="#2a2a3a"/>
  <text x="80" y="464" fill="#7ec8e3" font-size="12">⚠ Hibernate 기본: 모든 컬럼 UPDATE (SQL 재사용 위해)</text>
  <text x="80" y="482" fill="#888" font-size="12">변경된 컬럼만 UPDATE하려면 @DynamicUpdate 사용 (컬럼 수가 많을 때 유효)</text>
  <text x="80" y="500" fill="#888" font-size="12">@DynamicUpdate는 SQL 캐시를 무효화하므로 컬럼이 적으면 오히려 손해</text>
</svg>
