<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-v" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Headless Service DNS 동작 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">일반 Service(VIP) vs Headless Service(clusterIP: None) DNS 응답 차이</text>

  <!-- ===== LEFT: Normal Service ===== -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">일반 Service (ClusterIP)</text>

  <!-- Client pod -->
  <rect x="60" y="114" width="110" height="48" rx="7" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="115" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">클라이언트 Pod</text>
  <text x="115" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">DNS: myapp.ns.svc</text>

  <line x1="115" y1="162" x2="115" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="128" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">질의</text>

  <!-- CoreDNS -->
  <rect x="60" y="197" width="110" height="48" rx="7" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="115" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">CoreDNS</text>
  <text x="115" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">kube-dns</text>

  <!-- Response: single VIP -->
  <line x1="170" y1="221" x2="236" y2="221" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="203" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">A 응답</text>

  <rect x="237" y="197" width="150" height="48" rx="7" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="312" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">ClusterIP (VIP)</text>
  <text x="312" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">10.96.100.50</text>

  <line x1="387" y1="221" x2="420" y2="221" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- kube-proxy -->
  <rect x="421" y="197" width="100" height="48" rx="7" fill="#1a1a0d" stroke="#888" stroke-width="1"/>
  <text x="471" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e8e8e8">kube-proxy</text>
  <text x="471" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">iptables</text>

  <line x1="521" y1="215" x2="554" y2="202" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="521" y1="221" x2="554" y2="221" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="521" y1="227" x2="554" y2="240" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Pods normal -->
  <rect x="555" y="192" width="72" height="24" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="591" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">Pod 10.0.0.1</text>
  <rect x="555" y="212" width="72" height="24" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="591" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">Pod 10.0.0.2</text>
  <rect x="555" y="232" width="72" height="24" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="591" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">Pod 10.0.0.3</text>

  <text x="115" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단일 IP → kube-proxy가 부하 분산</text>

  <!-- Divider -->
  <line x1="40" y1="290" x2="840" y2="290" stroke="#222" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== BOTTOM: Headless Service ===== -->
  <text x="60" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Headless Service (clusterIP: None)</text>

  <!-- Client pod headless -->
  <rect x="60" y="336" width="110" height="48" rx="7" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="115" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">클라이언트 Pod</text>
  <text x="115" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">DNS: myapp.ns.svc</text>

  <line x1="115" y1="384" x2="115" y2="418" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="128" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">질의</text>

  <!-- CoreDNS headless -->
  <rect x="60" y="419" width="110" height="48" rx="7" fill="#0f2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="115" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">CoreDNS</text>
  <text x="115" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">clusterIP: None</text>

  <!-- Multiple A records response -->
  <line x1="170" y1="443" x2="222" y2="443" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="196" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">A 레코드 다수</text>

  <!-- A records box -->
  <rect x="223" y="410" width="180" height="86" rx="7" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="313" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">DNS 응답 (Pod IP들)</text>
  <text x="243" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">A  10.0.0.1  (Pod-0)</text>
  <text x="243" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">A  10.0.0.2  (Pod-1)</text>
  <text x="243" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">A  10.0.0.3  (Pod-2)</text>

  <!-- Arrows to pods directly -->
  <line x1="403" y1="438" x2="457" y2="422" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="403" y1="453" x2="457" y2="453" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="403" y1="468" x2="457" y2="484" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Pods headless -->
  <rect x="458" y="412" width="100" height="26" rx="4" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Pod-0 (10.0.0.1)</text>
  <rect x="458" y="441" width="100" height="26" rx="4" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="459" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Pod-1 (10.0.0.2)</text>
  <rect x="458" y="470" width="100" height="26" rx="4" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="508" y="488" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Pod-2 (10.0.0.3)</text>

  <!-- Key point -->
  <rect x="580" y="410" width="260" height="86" rx="7" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">핵심 차이점</text>
  <text x="596" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">kube-proxy 우회 — 직접 연결</text>
  <text x="596" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">클라이언트 사이드 로드밸런싱</text>
  <text x="596" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">StatefulSet 안정 DNS에 필수</text>
</svg>
