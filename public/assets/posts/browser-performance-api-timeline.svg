<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Performance Timeline 항목 유형</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">performance.getEntriesByType() 반환값</text>

  <!-- Timeline bar -->
  <rect x="60" y="95" width="760" height="20" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="60" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">navigationStart (0ms)</text>
  <text x="780" y="88" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현재 시각</text>

  <!-- Navigation -->
  <rect x="60" y="140" width="340" height="46" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">navigation</text>
  <text x="80" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">domContentLoadedEventEnd · loadEventEnd · type</text>

  <!-- Resource -->
  <rect x="60" y="200" width="340" height="46" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">resource</text>
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">name(URL) · duration · transferSize · initiatorType</text>

  <!-- Paint -->
  <rect x="460" y="140" width="340" height="46" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">paint</text>
  <text x="480" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">first-paint · first-contentful-paint (FCP)</text>

  <!-- Largest Contentful Paint -->
  <rect x="460" y="200" width="340" height="46" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">largest-contentful-paint</text>
  <text x="480" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">startTime(LCP 시각) · size · element</text>

  <!-- Measure -->
  <rect x="60" y="260" width="340" height="46" rx="6" fill="#1f1400" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8b84b">measure</text>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자 정의 구간 측정 (mark~mark)</text>

  <!-- Mark -->
  <rect x="460" y="260" width="340" height="46" rx="6" fill="#1f1400" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="480" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8b84b">mark</text>
  <text x="480" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자 정의 시점 기록</text>

  <!-- Layout shift -->
  <rect x="60" y="320" width="340" height="46" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">layout-shift</text>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">value(CLS 점수) · hadRecentInput</text>

  <!-- Long task -->
  <rect x="460" y="320" width="340" height="46" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="480" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">longtask</text>
  <text x="480" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">50ms 이상 메인 스레드 블로킹 작업</text>

  <!-- Code hint -->
  <rect x="60" y="382" width="760" height="48" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="80" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">performance.getEntriesByType(<tspan fill="#ce9178">'resource'</tspan>)</text>
  <text x="80" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">performance.getEntriesByName(<tspan fill="#ce9178">'my-mark'</tspan>)</text>

  <!-- Bottom note -->
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">PerformanceObserver로 실시간 관찰 가능</text>
</svg>
