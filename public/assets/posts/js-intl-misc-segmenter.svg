<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">Intl.Segmenter — 텍스트 분절</text>

  <!-- granularity 박스들 -->
  <rect x="60" y="72" width="220" height="110" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="170" y="97" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">grapheme</text>
  <text x="170" y="119" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">글자(자소) 단위</text>
  <text x="170" y="139" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">이모지·합성 문자 포함</text>
  <text x="170" y="159" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">기본값</text>

  <rect x="300" y="72" width="220" height="110" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="410" y="97" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">word</text>
  <text x="410" y="119" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">단어 단위</text>
  <text x="410" y="139" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">isWordLike 구분</text>
  <text x="410" y="159" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">공백·구두점 포함 반환</text>

  <rect x="540" y="72" width="280" height="110" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="680" y="97" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">sentence</text>
  <text x="680" y="119" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">문장 단위</text>
  <text x="680" y="139" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">마침표·느낌표 기준</text>
  <text x="680" y="159" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">로케일 인식 분리</text>

  <!-- 코드 블록 -->
  <rect x="60" y="208" width="760" height="252" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="234" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// grapheme — 이모지도 1글자</text>
  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> gs = new Intl.Segmenter(</tspan><tspan fill="#ce9178">'ko'</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="80" y="270" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">[...gs.segment(</text>
  <text x="196" y="270" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'안녕👋'</text>
  <text x="270" y="270" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">)].length; </text>
  <text x="380" y="270" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 3 (안, 녕, 👋)</text>
  <text x="80" y="300" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// word — isWordLike로 공백 제거</text>
  <text x="80" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> ws = new Intl.Segmenter(</tspan><tspan fill="#ce9178">'ko'</tspan><tspan fill="#ffffff">, { granularity: </tspan><tspan fill="#ce9178">'word'</tspan><tspan fill="#ffffff"> });</tspan></text>

  <text x="80" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> words = [...ws.segment(</tspan><tspan fill="#ce9178">'안녕 세계'</tspan><tspan fill="#ffffff">)]</tspan></text>

  <text x="80" y="354" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">  .filter(s =&gt; s.isWordLike)</text>
  <text x="80" y="372" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">  .map(s =&gt; s.segment);</text>
  <text x="80" y="390" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// → ['안녕', '세계']</text>
  <text x="80" y="418" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// segment()는 이터러블 — for..of로도 사용</text>
  <text x="80" y="436" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">for</text>
  <text x="104" y="436" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> (const { segment, index } of ws.segment(text)) { ... }</text>
</svg>
