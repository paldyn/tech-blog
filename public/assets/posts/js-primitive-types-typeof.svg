<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">typeof 연산자 — 원시 타입 판별</text>

  <!-- typeof table -->
  <rect x="60" y="68" width="760" height="36" rx="6" fill="#0d1117" stroke="#333"/>
  <text x="200" y="91" text-anchor="middle" font-size="13" font-weight="600" fill="#888">표현식</text>
  <text x="450" y="91" text-anchor="middle" font-size="13" font-weight="600" fill="#888">typeof 결과</text>
  <text x="680" y="91" text-anchor="middle" font-size="13" font-weight="600" fill="#888">비고</text>

  <!-- Rows -->
  <rect x="60" y="104" width="760" height="34" rx="0" fill="#0f0f0f"/>
  <text x="200" y="126" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">42 · 3.14 · NaN · Infinity</text>
  <text x="450" y="126" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">"number"</text>
  <text x="680" y="126" text-anchor="middle" font-size="11" fill="#555">NaN도 number 타입!</text>

  <rect x="60" y="138" width="760" height="34" rx="0" fill="#0d1117"/>
  <text x="200" y="160" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"hello" · '' · `str`</text>
  <text x="450" y="160" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">"string"</text>
  <text x="680" y="160" text-anchor="middle" font-size="11" fill="#555">템플릿 리터럴도 포함</text>

  <rect x="60" y="172" width="760" height="34" rx="0" fill="#0f0f0f"/>
  <text x="200" y="194" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">true · false</text>
  <text x="450" y="194" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">"boolean"</text>
  <text x="680" y="194" text-anchor="middle" font-size="11" fill="#555">두 값만 존재</text>

  <rect x="60" y="206" width="760" height="34" rx="0" fill="#0d1117"/>
  <text x="200" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">undefined</text>
  <text x="450" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">"undefined"</text>
  <text x="680" y="228" text-anchor="middle" font-size="11" fill="#555">선언만 된 변수</text>

  <rect x="60" y="240" width="760" height="34" rx="0" fill="#0f0f0f"/>
  <text x="200" y="262" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">null</text>
  <text x="450" y="262" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">"object" ← 버그!</text>
  <text x="680" y="262" text-anchor="middle" font-size="11" fill="#e05555">역사적 오류, 수정 불가</text>

  <rect x="60" y="274" width="760" height="34" rx="0" fill="#0d1117"/>
  <text x="200" y="296" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#f7df1e">Symbol('id')</text>
  <text x="450" y="296" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">"symbol"</text>
  <text x="680" y="296" text-anchor="middle" font-size="11" fill="#555">ES2015+</text>

  <rect x="60" y="308" width="760" height="34" rx="0" fill="#0f0f0f"/>
  <text x="200" y="330" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">9007199254740993n</text>
  <text x="450" y="330" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">"bigint"</text>
  <text x="680" y="330" text-anchor="middle" font-size="11" fill="#555">ES2020+</text>

  <!-- null check note -->
  <rect x="60" y="354" width="760" height="14" rx="4" fill="#0d1117" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="365" text-anchor="middle" font-size="11" fill="#e05555">null 체크: typeof x === "object" &amp;&amp; x !== null (typeof만으로는 불가!)</text>

  <!-- Footer -->
  <text x="440" y="370" text-anchor="middle" font-size="10" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #9</text>
</svg>
