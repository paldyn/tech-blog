<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Hash 인덱스 적용 시나리오와 생성</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">긴 문자열 등호 조회에서 B-Tree보다 유리한 경우</text>

  <!-- Code block left -->
  <rect x="60" y="96" width="380" height="228" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="78" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- Hash 인덱스 생성</text>
  <text x="78" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">CREATE INDEX</text>
  <text x="78" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  idx_sessions_token</text>
  <text x="78" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ON</text>
  <text x="78" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  sessions(token)</text>
  <text x="78" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">USING</text>
  <text x="78" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">  hash;</text>
  <text x="78" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 등호 조회만 지원</text>
  <text x="78" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="78" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  user_id, data</text>
  <text x="78" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="78" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  sessions</text>
  <text x="78" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE token = :t; -- Hash Scan</text>

  <!-- Right: use cases -->
  <rect x="460" y="96" width="360" height="228" rx="8" fill="#111" stroke="#1e2433"/>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Hash 인덱스가 유리한 경우</text>
  <text x="480" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ UUID / 세션 토큰 등호 조회</text>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 긴 텍스트 해시 → 인덱스 소형화</text>
  <text x="480" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 높은 카디널리티 컬럼</text>
  <text x="480" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗ 범위 조건(&lt;, BETWEEN)</text>
  <text x="480" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗ ORDER BY 최적화</text>
  <text x="480" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗ 복합 인덱스 (단일 컬럼만)</text>
  <text x="480" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">PG 10+ WAL 지원 이후 안전</text>
  <text x="480" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이전 버전: 재해 복구 후 REINDEX 필요</text>
</svg>
