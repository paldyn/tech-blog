<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLite 미지원 기능과 대안</text>

  <!-- Missing features table -->
  <rect x="60" y="70" width="760" height="52" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">미지원 기능</text>
  <text x="500" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">영향 / 대안</text>
  <line x1="60" y1="104" x2="820" y2="104" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">항목</text>
  <text x="500" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">설명</text>

  <rect x="60" y="130" width="760" height="38" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">RIGHT/FULL OUTER JOIN</text>
  <text x="500" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">3.39+ 지원. 구버전: LEFT JOIN + UNION으로 대체</text>

  <rect x="60" y="174" width="760" height="38" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">ALTER TABLE 컬럼 삭제/수정</text>
  <text x="500" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">3.35+ DROP COLUMN 지원. 컬럼 타입 변경은 재생성 필요</text>

  <rect x="60" y="218" width="760" height="38" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">사용자 인증 / 권한</text>
  <text x="500" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">SQLite에 없음 → 파일 시스템 권한 + SQLCipher로 보완</text>

  <rect x="60" y="262" width="760" height="38" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">네트워크 접근 (원격 클라이언트)</text>
  <text x="500" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">기본 미지원 → Turso / libSQL 분산 확장 사용</text>

  <rect x="60" y="306" width="760" height="38" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">외래 키 기본 OFF</text>
  <text x="500" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">PRAGMA foreign_keys = ON; 명시 필요 (연결마다)</text>

  <rect x="60" y="350" width="760" height="38" fill="#1a1a2e" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">저장 프로시저 / UDF</text>
  <text x="500" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">SQL 저장 프로시저 없음 → 애플리케이션 레이어에서 처리</text>

  <rect x="60" y="394" width="760" height="38" fill="#1a1a2e" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">병렬 쿼리 실행</text>
  <text x="500" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단일 스레드 실행 → 분석에는 DuckDB 사용 권장</text>
</svg>
