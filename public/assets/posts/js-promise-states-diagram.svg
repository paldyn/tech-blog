<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Promise 상태 전이 다이어그램</text>

  <!-- Pending state -->
  <rect x="220" y="100" width="180" height="80" rx="10" fill="#1a2540" stroke="#7ec8e3" stroke-width="2"/>
  <text x="310" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">pending</text>
  <text x="310" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">대기 중</text>

  <!-- Fulfilled state -->
  <rect x="560" y="60" width="200" height="80" rx="10" fill="#102010" stroke="#55c555" stroke-width="2"/>
  <text x="660" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">fulfilled</text>
  <text x="660" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이행 (성공)</text>

  <!-- Rejected state -->
  <rect x="560" y="200" width="200" height="80" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="2"/>
  <text x="660" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">rejected</text>
  <text x="660" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">거부 (실패)</text>

  <!-- Arrow: pending to fulfilled -->
  <line x1="400" y1="125" x2="558" y2="100" stroke="#55c555" stroke-width="2"/>
  <polygon points="558,100 546,94 546,106" fill="#55c555"/>
  <text x="470" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">resolve(value)</text>

  <!-- Arrow: pending to rejected -->
  <line x1="400" y1="155" x2="558" y2="230" stroke="#e05555" stroke-width="2"/>
  <polygon points="558,230 546,222 552,236" fill="#e05555"/>
  <text x="470" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">reject(reason)</text>

  <!-- Settled brace -->
  <line x1="762" y1="80" x2="780" y2="80" stroke="#888" stroke-width="1"/>
  <line x1="780" y1="80" x2="780" y2="260" stroke="#888" stroke-width="1"/>
  <line x1="780" y1="260" x2="762" y2="260" stroke="#888" stroke-width="1"/>
  <line x1="780" y1="170" x2="800" y2="170" stroke="#888" stroke-width="1"/>
  <text x="806" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">settled</text>
  <text x="806" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">(불변)</text>

  <!-- Code: new Promise -->
  <rect x="50" y="310" width="360" height="110" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="66" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Promise 생성자</text>
  <text x="66" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">new</text><text x="92" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Promise((resolve, reject) </text><text x="328" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">=&gt;</text><text x="350" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> {</text>
  <text x="66" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // 비동기 작업...</text>
  <text x="66" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  resolve(</text><text x="134" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'success'</text><text x="218" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">) </text><text x="236" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// or reject(err)</text>
  <text x="66" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">})</text>

  <!-- Code: static methods -->
  <rect x="430" y="310" width="400" height="110" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="446" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">정적 메서드로 즉시 settled</text>
  <text x="446" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Promise.resolve(</text><text x="578" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">42</text><text x="592" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>
  <text x="688" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">fulfilled</text>
  <text x="446" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Promise.reject(</text><text x="572" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">new</text><text x="600" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Error())</text>
  <text x="688" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">rejected</text>
  <text x="446" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">한 번 settled 되면 상태 변경 불가</text>
  <text x="446" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">resolve/reject 여러 번 호출해도 첫 번째만 적용</text>
</svg>
