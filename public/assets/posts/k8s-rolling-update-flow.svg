<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Rolling Update 흐름 (replicas: 4)</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">maxSurge:1 / maxUnavailable:1 기준</text>

  <!-- Step labels -->
  <text x="100" y="100"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Step 0 — 초기 상태</text>
  <text x="100" y="210"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Step 1 — 새 Pod 추가 (Surge)</text>
  <text x="100" y="310"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Step 2 — 구 Pod 제거</text>
  <text x="100" y="410"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Step N — 완료</text>

  <!-- Step 0: 4 old pods -->
  <rect x="340" y="108" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="375" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>
  <rect x="422" y="108" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="457" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>
  <rect x="504" y="108" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="539" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>
  <rect x="586" y="108" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="621" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>

  <!-- Step 1: 4 old + 1 new surge -->
  <rect x="340" y="218" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="375" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>
  <rect x="422" y="218" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="457" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>
  <rect x="504" y="218" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="539" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>
  <rect x="586" y="218" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="621" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>
  <rect x="668" y="218" width="70" height="36" rx="5" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="703" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">v2 신규</text>
  <text x="780" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">5/4 pods</text>

  <!-- Step 2: 3 old + 1 new (one old removed) -->
  <rect x="340" y="318" width="70" height="36" rx="5" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="375" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">v1 종료</text>
  <rect x="422" y="318" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="457" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>
  <rect x="504" y="318" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="539" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>
  <rect x="586" y="318" width="70" height="36" rx="5" fill="#0d1828" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="621" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1</text>
  <rect x="668" y="318" width="70" height="36" rx="5" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="703" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">v2</text>
  <text x="780" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">-1 old</text>

  <!-- Step N: all new -->
  <rect x="340" y="418" width="70" height="36" rx="5" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="375" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">v2</text>
  <rect x="422" y="418" width="70" height="36" rx="5" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="457" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">v2</text>
  <rect x="504" y="418" width="70" height="36" rx="5" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="539" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">v2</text>
  <rect x="586" y="418" width="70" height="36" rx="5" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="621" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">v2</text>
  <text x="780" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">완료</text>

  <!-- Arrows between steps -->
  <line x1="220" y1="152" x2="220" y2="208" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="220" y1="252" x2="220" y2="308" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="220" y1="352" x2="220" y2="408" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Bottom note -->
  <rect x="50" y="468" width="780" height="36" rx="6" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="490" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">각 단계 반복: Ready Pod 확인 후 다음 교체 진행 · readinessProbe가 실패하면 롤아웃 중단</text>
</svg>
