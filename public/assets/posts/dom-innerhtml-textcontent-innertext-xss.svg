<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">innerHTML XSS와 안전한 대안</text>

  <!-- Code block -->
  <rect x="60" y="64" width="760" height="286" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ XSS 취약 — 사용자 입력을 바로 innerHTML에 주입</text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> userInput = </tspan><tspan fill="#ce9178">'&lt;img src=x onerror="alert(1)"&gt;'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">div.innerHTML = userInput; </tspan><tspan fill="#9aa4b8">// 스크립트 실행!</tspan></text>

  <line x1="84" y1="144" x2="796" y2="144" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✅ 안전 — textContent 사용 (태그 문자 그대로 출력)</text>
  <text x="84" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">div.textContent = userInput; </tspan><tspan fill="#9aa4b8">// &lt;img...&gt; 문자열로 표시</tspan></text>

  <line x1="84" y1="196" x2="796" y2="196" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✅ 마크업이 필요한 경우 — DOMPurify 정제 후 삽입</text>
  <text x="84" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">div.innerHTML = DOMPurify.</tspan><tspan fill="#ffffff">sanitize</tspan><tspan fill="#ffffff">(userInput);</tspan></text>

  <line x1="84" y1="248" x2="796" y2="248" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// innerText — 읽기 시 강제 리플로우 (루프 안 절대 금지)</text>
  <text x="84" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">for </tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> el of elements) {</tspan></text>
  <text x="84" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">// el.innerText  ← 매 반복 강제 리플로우 ❌</tspan></text>
  <text x="84" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">// el.textContent ← 스타일 무관, 빠름 ✅</tspan></text>
  <text x="84" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
</svg>
