<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git lfs migrate import</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">히스토리 속 파일을 LFS로 재작성</text>

  <!-- Before / After columns -->
  <text x="220" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">마이그레이션 전</text>
  <text x="660" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">마이그레이션 후</text>

  <!-- Before: git log with blobs -->
  <rect x="60" y="115" width="320" height="168" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <!-- Commits stack -->
  <rect x="80" y="132" width="280" height="34" fill="#1a0808" rx="6" stroke="#5a2a2a" stroke-width="1"/>
  <text x="220" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">commit abc1234  blob: video.mp4 (200MB)</text>
  <rect x="80" y="172" width="280" height="34" fill="#1a0808" rx="6" stroke="#5a2a2a" stroke-width="1"/>
  <text x="220" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">commit def5678  blob: design.psd (80MB)</text>
  <rect x="80" y="212" width="280" height="34" fill="#1a0808" rx="6" stroke="#5a2a2a" stroke-width="1"/>
  <text x="220" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">commit ghi9012  blob: archive.zip (150MB)</text>
  <text x="220" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">저장소 크기: 430MB+</text>

  <!-- Arrow -->
  <line x1="380" y1="200" x2="500" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">migrate</text>
  <text x="440" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">import</text>

  <!-- After: git log with pointers -->
  <rect x="500" y="115" width="320" height="168" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <rect x="520" y="132" width="280" height="34" fill="#0a0f1a" rx="6" stroke="#1a3a5a" stroke-width="1"/>
  <text x="660" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">commit abc1234'  pointer: video.mp4 (134B)</text>
  <rect x="520" y="172" width="280" height="34" fill="#0a0f1a" rx="6" stroke="#1a3a5a" stroke-width="1"/>
  <text x="660" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">commit def5678'  pointer: design.psd (134B)</text>
  <rect x="520" y="212" width="280" height="34" fill="#0a0f1a" rx="6" stroke="#1a3a5a" stroke-width="1"/>
  <text x="660" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">commit ghi9012'  pointer: archive.zip (134B)</text>
  <text x="660" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">저장소 크기: ~2KB (히스토리 포함)</text>

  <!-- Command box -->
  <rect x="60" y="304" width="760" height="108" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="328" fill="#9aa4b8"># 확장자 기준 — 모든 브랜치 히스토리 재작성</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git lfs migrate import</tspan><tspan fill="#ffffff"> --include=</tspan><tspan fill="#ce9178">"*.png,*.mp4"</tspan><tspan fill="#ffffff"> --everything</tspan>
    <tspan x="76" dy="22" fill="#9aa4b8"># 현재 브랜치만 (--everything 생략)</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git lfs migrate import</tspan><tspan fill="#ffffff"> --include=</tspan><tspan fill="#ce9178">"*.zip"</tspan>
  </text>
</svg>
