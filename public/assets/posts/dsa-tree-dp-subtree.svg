<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">트리 DP — 서브트리 상태 전이</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">독립 집합 최대 가중치 — dp[v][0/1]: v 미포함/포함 시 최대 합</text>

  <!-- Tree structure (left) -->
  <!-- Root node 1 -->
  <circle cx="220" cy="110" r="24" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="220" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">1</text>
  <text x="220" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">w=3</text>

  <!-- Node 2 -->
  <line x1="205" y1="130" x2="140" y2="182" stroke="#555" stroke-width="1.5"/>
  <circle cx="130" cy="194" r="24" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">2</text>
  <text x="130" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">w=4</text>

  <!-- Node 3 -->
  <line x1="235" y1="130" x2="300" y2="182" stroke="#555" stroke-width="1.5"/>
  <circle cx="310" cy="194" r="24" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="310" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">3</text>
  <text x="310" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">w=2</text>

  <!-- Node 4 (child of 2) -->
  <line x1="115" y1="212" x2="70" y2="268" stroke="#555" stroke-width="1.5"/>
  <circle cx="62" cy="278" r="20" fill="#1a3a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="62" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">4</text>
  <text x="62" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">w=5</text>

  <!-- Node 5 (child of 2) -->
  <line x1="145" y1="212" x2="175" y2="268" stroke="#555" stroke-width="1.5"/>
  <circle cx="183" cy="278" r="20" fill="#1a3a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="183" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">5</text>
  <text x="183" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">w=6</text>

  <!-- Node 6 (child of 3) -->
  <line x1="295" y1="212" x2="270" y2="268" stroke="#555" stroke-width="1.5"/>
  <circle cx="262" cy="278" r="20" fill="#1a3a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="262" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">6</text>
  <text x="262" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">w=1</text>

  <!-- DP values annotation -->
  <text x="60" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">DP 결과 (dp[v][0]=미포함, dp[v][1]=포함)</text>
  <text x="62" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dp[4]=[0,5], dp[5]=[0,6], dp[6]=[0,1]</text>
  <text x="62" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">dp[2][0]=max(5,0)+max(6,0)=11, dp[2][1]=4+0+0=4</text>
  <text x="62" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">dp[3][0]=max(1,0)=1, dp[3][1]=2+0=2</text>
  <text x="62" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">dp[1][0]=max(11,4)+max(1,2)=13, dp[1][1]=3+0+0=3</text>
  <text x="62" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#77dd77">답: max(dp[1][0], dp[1][1]) = 13</text>

  <!-- Right side: code -->
  <rect x="460" y="88" width="380" height="272" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 독립 집합 최대 가중치 (트리 DP)</text>
  <text x="476" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def tree_dp(v, parent, adj, w):</text>
  <text x="476" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    # dp[0]: v 미포함, dp[1]: v 포함</text>
  <text x="476" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp = [0, w[v]]</text>
  <text x="476" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for u in adj[v]:</text>
  <text x="476" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">        if u == parent: continue</text>
  <text x="476" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        child = tree_dp(u, v, adj, w)</text>
  <text x="476" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">        # v 미포함: 자식은 포함/미포함 중 최대</text>
  <text x="476" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        dp[0] += max(child[0], child[1])</text>
  <text x="476" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">        # v 포함: 자식은 미포함만 가능</text>
  <text x="476" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        dp[1] += child[0]</text>
  <text x="476" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    return dp</text>
  <text x="476" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 호출: dp = tree_dp(root, -1, adj, w)</text>
  <text x="476" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"># ans = max(dp[0], dp[1])</text>
</svg>
