<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">인메모리 DB vs 디스크 기반 DB 성능 특성</text>

  <!-- Left: Disk DB -->
  <rect x="60" y="68" width="340" height="260" rx="10" fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="230" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#888" text-anchor="middle">디스크 기반 RDBMS</text>

  <rect x="80" y="112" width="300" height="36" rx="6" fill="#111"/>
  <text x="130" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">응답 시간</text>
  <text x="360" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="end">밀리초 ~ 초</text>
  <text x="130" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(I/O 발생 시)</text>

  <rect x="80" y="158" width="300" height="36" rx="6" fill="#111"/>
  <text x="130" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">처리량 (TPS)</text>
  <text x="360" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="end">수천~수만 TPS</text>
  <text x="130" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(캐시 히트 의존)</text>

  <rect x="80" y="204" width="300" height="36" rx="6" fill="#111"/>
  <text x="130" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">데이터 용량</text>
  <text x="360" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="end">TB ~ PB 무제한</text>

  <rect x="80" y="250" width="300" height="36" rx="6" fill="#111"/>
  <text x="130" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비용 (인프라)</text>
  <text x="360" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="end">저비용</text>

  <!-- Right: In-memory DB -->
  <rect x="480" y="68" width="340" height="260" rx="10" fill="none" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">인메모리 DB (Altibase)</text>

  <rect x="500" y="112" width="300" height="36" rx="6" fill="#0d1520"/>
  <text x="550" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">응답 시간</text>
  <text x="780" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="end">마이크로초 수준</text>
  <text x="550" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(디스크 I/O 없음)</text>

  <rect x="500" y="158" width="300" height="36" rx="6" fill="#0d1520"/>
  <text x="550" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">처리량 (TPS)</text>
  <text x="780" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="end">수십만 TPS</text>
  <text x="550" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(일관된 성능)</text>

  <rect x="500" y="204" width="300" height="36" rx="6" fill="#0d1520"/>
  <text x="550" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">데이터 용량</text>
  <text x="780" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="end">RAM 크기 제약</text>

  <rect x="500" y="250" width="300" height="36" rx="6" fill="#0d1520"/>
  <text x="550" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">비용 (인프라)</text>
  <text x="780" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="end">고비용 (대용량 RAM)</text>

  <!-- Center: vs -->
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="24" font-weight="700" fill="#7777cc" text-anchor="middle">vs</text>

  <!-- Bottom note -->
  <rect x="60" y="344" width="760" height="0" rx="0" fill="none"/>
</svg>
