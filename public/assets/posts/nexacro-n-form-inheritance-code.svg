<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BaseForm 선언과 상속 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">xfdl inheritedform 속성 + super 호출 패턴</text>

  <!-- Left: BaseForm 선언 -->
  <text x="70" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">BaseForm.xfdl — 기반 클래스</text>
  <rect x="60" y="108" width="360" height="228" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- BaseForm: 추상 Form --&gt;</text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Form id=<tspan fill="#ce9178">"BaseForm"</tspan></text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  width=<tspan fill="#b5cea8">"1720"</tspan> height=<tspan fill="#b5cea8">"1020"</tspan>&gt;</text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Script&gt;&lt;![CDATA[</text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="148" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> gfn_init(form) {</text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#6a8aa0">// 공통 초기화 로직</tspan></text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  form.<tspan fill="#55c555">loadCommonCode</tspan>();</text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">]]&gt;&lt;/Script&gt;</text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;/Form&gt;</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">↑ 직접 화면 표시 안 함</text>

  <!-- Right: 업무 Form 상속 -->
  <text x="470" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">OrderList.xfdl — 업무 Form</text>
  <rect x="460" y="108" width="360" height="228" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- inheritedform 속성으로 상속 --&gt;</text>
  <text x="476" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Form id=<tspan fill="#ce9178">"OrderList"</tspan></text>
  <text x="476" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  inheritedform=</text>
  <text x="476" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "common/BaseForm.xfdl"</text>
  <text x="476" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  width=<tspan fill="#b5cea8">"1720"</tspan> height=<tspan fill="#b5cea8">"1020"</tspan>&gt;</text>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Script&gt;&lt;![CDATA[</text>
  <text x="476" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="548" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Form_onload(obj, e) {</text>
  <text x="476" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  this.<tspan fill="#55c555">gfn_init</tspan>(this); <tspan fill="#6a8aa0">// 상속 함수</tspan></text>
  <text x="476" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  this.<tspan fill="#55c555">fn_search</tspan>();</text>
  <text x="476" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="476" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">]]&gt;&lt;/Script&gt;&lt;/Form&gt;</text>

  <!-- Bottom: override pattern -->
  <text x="70" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a">공통 함수 오버라이드 패턴</text>
  <rect x="60" y="372" width="760" height="54" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 자식 Form에서 BaseForm 함수를 재정의 (같은 함수명으로 선언)</text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="148" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> gfn_init(form) { </text><text x="338" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">/* 이 Form 전용 초기화 */</text><text x="608" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> this.parent.gfn_init(form); </text>
  <text x="76" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  ↑ 자식 구현 먼저, 그다음 BaseForm 함수 호출 (super 패턴)</text>

  <!-- Footer -->
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
