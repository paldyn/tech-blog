<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">날짜 산술과 INTERVAL</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">DATE + INTERVAL · DATEDIFF · EXTRACT · DATE_TRUNC</text>

  <!-- Timeline -->
  <line x1="80" y1="130" x2="800" y2="130" stroke="#3a4a6e" stroke-width="2"/>
  <!-- Arrow head -->
  <polygon points="796,124 808,130 796,136" fill="#1e2433"/>

  <!-- Reference date: 2026-01-15 -->
  <line x1="300" y1="118" x2="300" y2="142" stroke="#7ec8e3" stroke-width="2"/>
  <text x="300" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">2026-01-15</text>
  <text x="300" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">기준일</text>

  <!-- -30 days: 2025-12-16 -->
  <line x1="130" y1="118" x2="130" y2="142" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">2025-12-16</text>
  <text x="130" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">- 30일</text>
  <line x1="130" y1="130" x2="300" y2="130" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="215" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">INTERVAL '30' DAY</text>

  <!-- -1 month: 2025-12-15 -->
  <line x1="90" y1="118" x2="90" y2="142" stroke="#7777cc" stroke-width="1.5"/>
  <text x="90" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7777cc">2025-12-15</text>
  <text x="90" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">- 1달</text>

  <!-- +7 days: 2026-01-22 -->
  <line x1="420" y1="118" x2="420" y2="142" stroke="#55c555" stroke-width="1.5"/>
  <text x="420" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">2026-01-22</text>
  <text x="420" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">+ 7일</text>
  <line x1="300" y1="130" x2="420" y2="130" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="360" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">INTERVAL '7' DAY</text>

  <!-- +3 months: 2026-04-15 -->
  <line x1="650" y1="118" x2="650" y2="142" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="650" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c84a">2026-04-15</text>
  <text x="650" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c84a">+ 3개월</text>
  <line x1="300" y1="130" x2="650" y2="130" stroke="#e8c84a" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="475" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c84a">INTERVAL '3' MONTH</text>

  <!-- DATEDIFF visualization -->
  <line x1="300" y1="178" x2="650" y2="178" stroke="#888" stroke-width="1.5"/>
  <line x1="300" y1="172" x2="300" y2="184" stroke="#888"/>
  <line x1="650" y1="172" x2="650" y2="184" stroke="#888"/>
  <text x="475" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DATEDIFF = 90일 (또는 3개월)</text>

  <!-- Functions reference table -->
  <rect x="60" y="216" width="760" height="172" rx="6" fill="#0e1117" stroke="#3a4a6e"/>
  <rect x="61" y="216" width="758" height="34" rx="5" fill="#161b27"/>
  <rect x="61" y="232" width="758" height="18" fill="#161b27"/>
  <line x1="60" y1="250" x2="820" y2="250" stroke="#3a4a6e"/>

  <!-- Table headers -->
  <text x="170" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">함수 / 연산</text>
  <line x1="300" y1="216" x2="300" y2="388" stroke="#3a4a6e"/>
  <text x="450" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">설명</text>
  <line x1="600" y1="216" x2="600" y2="388" stroke="#3a4a6e"/>
  <text x="710" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">PostgreSQL / 표준</text>

  <!-- Row data -->
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">현재 날짜/시각</text>
  <text x="310" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">현재 날짜 / 시각 반환</text>
  <text x="610" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aab4c8">CURRENT_DATE / NOW()</text>
  <line x1="60" y1="276" x2="820" y2="276" stroke="#252b3a"/>

  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">날짜 산술</text>
  <text x="310" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">날짜 +/- INTERVAL</text>
  <text x="610" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aab4c8">date + INTERVAL '1 day'</text>
  <line x1="60" y1="302" x2="820" y2="302" stroke="#252b3a"/>

  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">날짜 차이</text>
  <text x="310" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">두 날짜 간격(일 수)</text>
  <text x="610" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aab4c8">date1 - date2 / DATEDIFF</text>
  <line x1="60" y1="328" x2="820" y2="328" stroke="#252b3a"/>

  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c84a">날짜 부분 추출</text>
  <text x="310" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">연·월·일·시·분·초 추출</text>
  <text x="610" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aab4c8">EXTRACT(YEAR FROM d)</text>
  <line x1="60" y1="354" x2="820" y2="354" stroke="#252b3a"/>

  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">날짜 절삭</text>
  <text x="310" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">월·주·일 단위로 잘라내기</text>
  <text x="610" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aab4c8">DATE_TRUNC('month', d)</text>

  <!-- Note -->
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">INTERVAL의 단위: YEAR, MONTH, DAY, HOUR, MINUTE, SECOND, WEEK</text>
</svg>
