<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }
      .layer-title { font-size: 13px; font-weight: 600; fill: #e8e8e8; }
      .layer-sub { font-size: 10px; fill: #555; letter-spacing: 0.08em; }
      .layer-desc { font-size: 11px; fill: #666; }
      .arrow-label { font-size: 10px; fill: #444; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="260" fill="#0a0a0a" rx="12"/>

  <!-- Layer boxes -->
  <!-- 입력층 -->
  <rect x="32" y="56" width="160" height="148" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="112" y="84" class="layer-title" text-anchor="middle">입력층</text>
  <text x="112" y="100" class="layer-sub" text-anchor="middle">INPUT LAYER</text>
  <line x1="56" y1="114" x2="168" y2="114" stroke="#1e1e1e" stroke-width="1"/>
  <text x="112" y="132" class="layer-desc" text-anchor="middle">픽셀, 텍스트,</text>
  <text x="112" y="150" class="layer-desc" text-anchor="middle">숫자 등 원시 데이터</text>
  <!-- nodes -->
  <circle cx="72" cy="180" r="5" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>
  <circle cx="92" cy="180" r="5" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>
  <circle cx="112" cy="180" r="5" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>
  <circle cx="132" cy="180" r="5" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>
  <circle cx="152" cy="180" r="5" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>

  <!-- Arrow 1 -->
  <line x1="200" y1="130" x2="234" y2="130" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 은닉층 1 -->
  <rect x="242" y="56" width="160" height="148" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <text x="322" y="84" class="layer-title" text-anchor="middle">은닉층 1</text>
  <text x="322" y="100" class="layer-sub" text-anchor="middle">HIDDEN LAYER 1</text>
  <line x1="266" y1="114" x2="378" y2="114" stroke="#222" stroke-width="1"/>
  <text x="322" y="132" class="layer-desc" text-anchor="middle">선, 모양, 음소 등</text>
  <text x="322" y="150" class="layer-desc" text-anchor="middle">저수준 특징 추출</text>
  <circle cx="282" cy="180" r="5" fill="#1e1e1e" stroke="#444" stroke-width="1.5"/>
  <circle cx="302" cy="180" r="5" fill="#1e1e1e" stroke="#444" stroke-width="1.5"/>
  <circle cx="322" cy="180" r="5" fill="#1e1e1e" stroke="#444" stroke-width="1.5"/>
  <circle cx="342" cy="180" r="5" fill="#1e1e1e" stroke="#444" stroke-width="1.5"/>
  <circle cx="362" cy="180" r="5" fill="#1e1e1e" stroke="#444" stroke-width="1.5"/>

  <!-- Arrow 2 -->
  <line x1="410" y1="130" x2="444" y2="130" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 은닉층 2 -->
  <rect x="452" y="56" width="160" height="148" rx="8" fill="#111" stroke="#3d3d3d" stroke-width="1.5"/>
  <text x="532" y="84" class="layer-title" text-anchor="middle">은닉층 2</text>
  <text x="532" y="100" class="layer-sub" text-anchor="middle">HIDDEN LAYER 2</text>
  <line x1="476" y1="114" x2="588" y2="114" stroke="#2a2a2a" stroke-width="1"/>
  <text x="532" y="132" class="layer-desc" text-anchor="middle">얼굴, 단어, 패턴 등</text>
  <text x="532" y="150" class="layer-desc" text-anchor="middle">고수준 특징 조합</text>
  <circle cx="492" cy="180" r="5" fill="#1e1e1e" stroke="#555" stroke-width="1.5"/>
  <circle cx="512" cy="180" r="5" fill="#1e1e1e" stroke="#555" stroke-width="1.5"/>
  <circle cx="532" cy="180" r="5" fill="#1e1e1e" stroke="#555" stroke-width="1.5"/>
  <circle cx="552" cy="180" r="5" fill="#1e1e1e" stroke="#555" stroke-width="1.5"/>
  <circle cx="572" cy="180" r="5" fill="#1e1e1e" stroke="#555" stroke-width="1.5"/>

  <!-- Arrow 3 -->
  <line x1="620" y1="130" x2="654" y2="130" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 출력층 -->
  <rect x="662" y="56" width="186" height="148" rx="8" fill="#141414" stroke="#4a4a4a" stroke-width="1.5"/>
  <rect x="662" y="56" width="186" height="4" rx="2" fill="#333"/>
  <text x="755" y="84" class="layer-title" text-anchor="middle">출력층</text>
  <text x="755" y="100" class="layer-sub" text-anchor="middle">OUTPUT LAYER</text>
  <line x1="686" y1="114" x2="828" y2="114" stroke="#2a2a2a" stroke-width="1"/>
  <text x="755" y="134" font-size="12" fill="#aaa" text-anchor="middle" font-weight="600">고양이</text>
  <text x="755" y="152" font-size="11" fill="#666" text-anchor="middle">92%</text>
  <rect x="690" y="159" width="130" height="6" rx="3" fill="#1e1e1e"/>
  <rect x="690" y="159" width="120" height="6" rx="3" fill="#3a3a3a"/>
  <text x="755" y="188" font-size="11" fill="#444" text-anchor="middle">강아지 · 7%</text>
  <text x="755" y="203" font-size="11" fill="#333" text-anchor="middle">기타 · 1%</text>

  <!-- Bottom label -->
  <text x="440" y="238" font-size="10" fill="#333" text-anchor="middle" letter-spacing="0.1em">각 층은 이전 층의 출력을 입력으로 받아 더 추상적인 특징을 학습합니다</text>
</svg>
