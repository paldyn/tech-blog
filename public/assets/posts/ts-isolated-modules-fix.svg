<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">타입 재내보내기: type 키워드를 붙여라</text>

  <text x="60" y="84" font-size="14" font-weight="600" fill="#e05555">isolatedModules에서 에러</text>
  <rect x="60" y="96" width="370" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="78" y="124" fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { User } </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan x="78" y="144" fill="#ce9178">  './types'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="78" y="172" fill="#7ec8e3" font-weight="600">export</tspan><tspan fill="#ffffff"> { User };</tspan>
    <tspan x="78" y="200" fill="#e05555">// User가 타입인지 값인지</tspan>
    <tspan x="78" y="220" fill="#e05555">// 이 파일만 봐선 모름 ❌</tspan>
  </text>

  <text x="470" y="84" font-size="14" font-weight="600" fill="#55c555">type로 의도를 명시</text>
  <rect x="470" y="96" width="350" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="488" y="124" fill="#7ec8e3" font-weight="600">import type</tspan><tspan fill="#ffffff"> { User }</tspan>
    <tspan x="488" y="144" fill="#7ec8e3" font-weight="600">  from</tspan><tspan fill="#ce9178"> './types'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="488" y="172" fill="#7ec8e3" font-weight="600">export type</tspan><tspan fill="#ffffff"> { User };</tspan>
    <tspan x="488" y="200" fill="#55c555">// 타입임을 명시 →</tspan>
    <tspan x="488" y="220" fill="#55c555">// 출력에서 안전히 제거 ✅</tspan>
  </text>
</svg>
