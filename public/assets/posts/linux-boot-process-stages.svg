<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Linux 부팅 단계</text>

  <!-- Stage 1: Power On / BIOS/UEFI -->
  <rect x="60" y="70" width="760" height="62" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="97" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">① BIOS / UEFI</text>
  <text x="220" y="117" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">POST 자가진단 → 부팅 장치 탐색</text>
  <text x="600" y="97" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">Legacy MBR 또는 UEFI GPT</text>
  <text x="600" y="117" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">Secure Boot 검증 (UEFI)</text>

  <line x1="440" y1="132" x2="440" y2="152" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 2: Bootloader (GRUB) -->
  <rect x="60" y="152" width="760" height="62" rx="8" fill="#1a0808" stroke="#e08020" stroke-width="1.5"/>
  <text x="220" y="179" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e08020">② 부트로더 (GRUB2)</text>
  <text x="220" y="199" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/boot/grub2/grub.cfg 읽기 → 커널 선택</text>
  <text x="600" y="179" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">vmlinuz + initrd 메모리 로드</text>
  <text x="600" y="199" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">커널 파라미터 전달</text>

  <line x1="440" y1="214" x2="440" y2="234" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 3: Kernel -->
  <rect x="60" y="234" width="760" height="62" rx="8" fill="#002010" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="261" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">③ 커널 초기화</text>
  <text x="220" y="281" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">압축 해제 → 메모리 초기화 → 서브시스템 초기화</text>
  <text x="600" y="261" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">initramfs 마운트</text>
  <text x="600" y="281" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">루트 파일시스템 찾기</text>

  <line x1="440" y1="296" x2="440" y2="316" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 4: initramfs -->
  <rect x="60" y="316" width="760" height="62" rx="8" fill="#001220" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="343" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">④ initramfs</text>
  <text x="220" y="363" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">임시 루트fs → 드라이버 로드 → 실제 루트 마운트</text>
  <text x="600" y="343" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">dracut / mkinitramfs 생성</text>
  <text x="600" y="363" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">LVM/LUKS/NFS 루트 지원</text>

  <line x1="440" y1="378" x2="440" y2="398" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 5: systemd (PID 1) -->
  <rect x="60" y="398" width="760" height="62" rx="8" fill="#12123a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="425" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">⑤ systemd (PID 1)</text>
  <text x="220" y="445" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">유닛 파일 로드 → 타겟 순서로 서비스 시작</text>
  <text x="600" y="425" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">multi-user.target</text>
  <text x="600" y="445" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">graphical.target (GUI)</text>

  <line x1="440" y1="460" x2="440" y2="480" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 6: Login -->
  <rect x="60" y="480" width="760" height="40" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="505" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">⑥ 로그인 프롬프트 (getty / GDM / SDDM)</text>
</svg>
