<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">journalctl 주요 옵션</text>

  <!-- Code block -->
  <rect x="60" y="62" width="760" height="390" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 최근 로그 (기본: 페이저 모드)</text>
  <text x="80" y="108" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl</text>

  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 특정 유닛 로그</text>
  <text x="80" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">-u</tspan> <tspan fill="#ce9178">nginx.service</tspan></text>

  <text x="80" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 실시간 팔로우 (-f = follow)</text>
  <text x="80" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">-u</tspan> <tspan fill="#ce9178">nginx.service</tspan> <tspan fill="#ffffff">-f</tspan></text>

  <text x="80" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 시간 범위 지정</text>
  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">--since</tspan> <tspan fill="#ce9178">"2026-05-18 00:00"</tspan> <tspan fill="#ffffff">--until</tspan> <tspan fill="#ce9178">"now"</tspan></text>

  <text x="80" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 우선순위 필터 (0=emerg ~ 7=debug)</text>
  <text x="80" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">-p</tspan> <tspan fill="#ce9178">err</tspan>          <tspan fill="#888"># error 이상만</tspan></text>

  <text x="80" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 마지막 N줄 (tail -n 과 유사)</text>
  <text x="80" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">-n</tspan> <tspan fill="#b5cea8">50</tspan></text>

  <text x="80" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># JSON 출력 (파싱·분석용)</text>
  <text x="80" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">-u</tspan> <tspan fill="#ce9178">sshd</tspan> <tspan fill="#ffffff">-o</tspan> <tspan fill="#ce9178">json-pretty</tspan></text>

  <text x="80" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 부팅 목록 / 이전 부팅 로그</text>
  <text x="80" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">--list-boots</tspan>  <tspan fill="#ffffff">-b</tspan> <tspan fill="#ffffff">-1</tspan>   <tspan fill="#888"># 이전 부팅</tspan></text>
</svg>
