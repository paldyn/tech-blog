<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ip 명령어 객체 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">ip [옵션] 객체 동작</text>

  <!-- ip link box -->
  <rect x="60" y="96" width="230" height="140" fill="#1a2535" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="175" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">ip link</text>
  <text x="175" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">L2 인터페이스 관리</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">show / set / add / del</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">MTU, MAC, UP/DOWN</text>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">VLAN, 가상 인터페이스</text>

  <!-- ip addr box -->
  <rect x="325" y="96" width="230" height="140" fill="#1a2535" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">ip addr</text>
  <text x="440" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">L3 주소 관리</text>
  <text x="345" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">show / add / del / flush</text>
  <text x="345" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IPv4 / IPv6 주소</text>
  <text x="345" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CIDR 표기, scope</text>

  <!-- ip route box -->
  <rect x="590" y="96" width="230" height="140" fill="#1a2535" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="705" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">ip route</text>
  <text x="705" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">L3 라우팅 관리</text>
  <text x="610" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">show / add / del / get</text>
  <text x="610" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정적 경로, 기본 게이트웨이</text>
  <text x="610" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정책 라우팅 테이블</text>

  <!-- ip neigh box -->
  <rect x="60" y="268" width="230" height="120" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="175" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">ip neigh</text>
  <text x="175" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ARP / NDP 캐시</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">MAC-IP 매핑, 수동 추가</text>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">flush로 캐시 초기화</text>

  <!-- ip tunnel box -->
  <rect x="325" y="268" width="230" height="120" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">ip tunnel</text>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">L3 터널 관리</text>
  <text x="345" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GRE, IPIP, sit 터널</text>
  <text x="345" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">VPN 터널 엔드포인트</text>

  <!-- ip netns box -->
  <rect x="590" y="268" width="230" height="120" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="705" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">ip netns</text>
  <text x="705" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">네트워크 네임스페이스</text>
  <text x="610" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨테이너 네트워크 격리</text>
  <text x="610" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">exec로 네임스페이스 진입</text>

  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">자주 쓰는 객체: link, addr, route, neigh — 이 4개가 실무의 90%를 커버</text>
</svg>
