<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">ndarray의 세 가지 속성</text>

  <defs>
    <marker id="npar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="60" y="92" font-size="13" fill="#888">2행 3열 배열</text>
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#ffffff" text-anchor="middle">
    <rect x="60" y="104" width="60" height="44" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="90" y="132">1</text>
    <rect x="124" y="104" width="60" height="44" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="154" y="132">2</text>
    <rect x="188" y="104" width="60" height="44" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="218" y="132">3</text>
    <rect x="60" y="152" width="60" height="44" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="90" y="180">4</text>
    <rect x="124" y="152" width="60" height="44" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="154" y="180">5</text>
    <rect x="188" y="152" width="60" height="44" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="218" y="180">6</text>
  </g>

  <line x1="300" y1="150" x2="356" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#npar)"/>

  <rect x="360" y="104" width="480" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="378" y="126" font-size="14" font-weight="600" fill="#7ec8e3">.shape</text>
  <text x="378" y="146" font-size="13" fill="#9aa4b8">차원별 크기 — (2, 3)</text>

  <rect x="360" y="162" width="480" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="378" y="184" font-size="14" font-weight="600" fill="#7ec8e3">.dtype</text>
  <text x="378" y="204" font-size="13" fill="#9aa4b8">원소 타입 — int64 (배열 전체 동일)</text>

  <rect x="360" y="220" width="480" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="378" y="242" font-size="14" font-weight="600" fill="#7ec8e3">.ndim</text>
  <text x="378" y="262" font-size="13" fill="#9aa4b8">차원 수 — 2 (행·열)</text>

  <rect x="60" y="290" width="780" height="34" rx="4" fill="#0f1320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="450" y="312" font-size="13" fill="#7ec8e3" text-anchor="middle">한 배열의 모든 원소는 같은 dtype을 공유한다 — 그래서 빠르고 메모리가 빽빽하다</text>
</svg>
