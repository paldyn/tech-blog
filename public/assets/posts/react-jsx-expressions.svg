<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSX에서 JavaScript 표현식 사용</text>

  <!-- code box -->
  <rect x="60" y="76" width="760" height="300" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="100" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* JSX 안에서 중괄호로 JS 표현식을 삽입한다 */}
  </text>
  <text x="80" y="122" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> </tspan><tspan>Profile({ user }) {</tspan>
  </text>
  <text x="80" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan> title = user.isAdmin ? </tspan><tspan fill="#ce9178">"관리자"</tspan><tspan> : </tspan><tspan fill="#ce9178">"일반 사용자"</tspan><tspan>;</tspan>
  </text>
  <text x="80" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> (</tspan>
  </text>
  <text x="80" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;div&gt;</tspan>
  </text>
  <text x="80" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      &lt;h1&gt;{user.name}&lt;/h1&gt;                   </tspan><tspan fill="#9aa4b8">{/* 변수 */}</tspan>
  </text>
  <text x="80" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      &lt;p&gt;{title}&lt;/p&gt;                       </tspan><tspan fill="#9aa4b8">{/* 연산 결과 */}</tspan>
  </text>
  <text x="80" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      &lt;img src={user.avatar} alt="" /&gt;    </tspan><tspan fill="#9aa4b8">{/* 속성에도 */}</tspan>
  </text>
  <text x="80" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      &lt;span style=&#123;&#123; color: </tspan><tspan fill="#ce9178">'blue'</tspan><tspan> &#125;&#125;&gt;텍스트&lt;/span&gt;  </tspan><tspan fill="#9aa4b8">{/* 이중 중괄호 */}</tspan>
  </text>
  <text x="80" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;/div&gt;</tspan>
  </text>
  <text x="80" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  );</tspan>
  </text>
  <text x="80" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>}</tspan>
  </text>
  <text x="80" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* if, for 등 문(statement)은 중괄호 안에 직접 쓸 수 없다 — 변수로 빼거나 삼항 연산자 사용 */}
  </text>
  <text x="80" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">
    style=&#123;&#123; key: value &#125;&#125; — 바깥 &#123; &#125;는 JS 표현식, 안쪽 &#123; &#125;는 객체 리터럴
  </text>
</svg>
