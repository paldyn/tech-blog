<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="ab-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">프롬프트 A/B 테스트 구조</text>

  <!-- Traffic splitter -->
  <rect x="360" y="70" width="160" height="60" rx="8" fill="#2a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">트래픽 분배기</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사용자 해시 기반 분할</text>

  <!-- Variant A -->
  <rect x="120" y="190" width="220" height="90" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">프롬프트 A (Control)</text>
  <text x="230" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">v1 · 70% 트래픽</text>
  <text x="230" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기존 시스템 프롬프트</text>
  <text x="230" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">score avg: 4.1 / 5.0</text>

  <!-- Variant B -->
  <rect x="540" y="190" width="220" height="90" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">프롬프트 B (Treatment)</text>
  <text x="650" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">v2 · 30% 트래픽</text>
  <text x="650" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Chain-of-Thought 추가</text>
  <text x="650" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">score avg: 4.5 / 5.0  ↑</text>

  <!-- Arrows traffic -> A/B -->
  <line x1="400" y1="130" x2="270" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ab-arr)"/>
  <line x1="480" y1="130" x2="600" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ab-arr)"/>

  <!-- Decision box -->
  <rect x="320" y="314" width="240" height="58" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">B가 통계적 유의미하게 우세</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ v2를 production label로 승격</text>

  <!-- Arrows A/B -> decision -->
  <line x1="230" y1="280" x2="380" y2="314" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ab-arr)"/>
  <line x1="650" y1="280" x2="500" y2="314" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ab-arr)"/>
</svg>
