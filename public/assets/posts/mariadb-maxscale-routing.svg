<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MaxScale 쿼리 라우팅 규칙</text>

  <!-- Query types (left) -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">SQL 구문 유형</text>

  <!-- Write queries -->
  <rect x="60" y="115" width="200" height="50" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">쓰기 쿼리</text>
  <text x="160" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">INSERT / UPDATE / DELETE</text>

  <!-- DDL queries -->
  <rect x="60" y="180" width="200" height="50" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">DDL / 트랜잭션</text>
  <text x="160" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CREATE / BEGIN / CALL</text>

  <!-- Read queries -->
  <rect x="60" y="245" width="200" height="50" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">읽기 쿼리</text>
  <text x="160" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SELECT (트랜잭션 외부)</text>

  <!-- Hint read -->
  <rect x="60" y="310" width="200" height="50" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">힌트 라우팅</text>
  <text x="160" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">/* maxscale route to ... */</text>

  <!-- Router box -->
  <rect x="330" y="170" width="200" height="160" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="430" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">ReadWriteSplit</text>
  <text x="430" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">쿼리 분석 & 라우팅</text>
  <line x1="350" y1="228" x2="510" y2="228" stroke="#3a4a6e" stroke-width="1"/>
  <text x="430" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">causal_reads = true</text>
  <text x="430" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">max_slave_replication_lag</text>
  <text x="430" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">transaction_replay = true</text>
  <text x="430" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">slave_selection = LEAST_GLOBAL_CONNECTIONS</text>

  <!-- Arrows: query types -> router -->
  <line x1="260" y1="140" x2="328" y2="230" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <line x1="260" y1="205" x2="328" y2="248" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <line x1="260" y1="270" x2="328" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="260" y1="335" x2="328" y2="300" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Backend servers (right) -->
  <text x="610" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">백엔드 서버</text>

  <rect x="610" y="115" width="210" height="50" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="2"/>
  <text x="715" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Primary (쓰기)</text>
  <text x="715" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 쿼리 수용 가능</text>

  <rect x="610" y="190" width="210" height="50" rx="8" fill="#101520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="715" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Replica 1 (읽기)</text>
  <text x="715" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SELECT 전담</text>

  <rect x="610" y="260" width="210" height="50" rx="8" fill="#101520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="715" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Replica 2 (읽기)</text>
  <text x="715" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SELECT 전담</text>

  <!-- Arrows: router -> backends -->
  <line x1="530" y1="220" x2="608" y2="145" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <line x1="530" y1="255" x2="608" y2="215" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="530" y1="270" x2="608" y2="285" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <text x="562" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">쓰기</text>
  <text x="562" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">읽기 분산</text>

  <!-- Code hint example -->
  <rect x="60" y="390" width="760" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 명시적 라우팅 힌트 (Primary 강제)</text>
  <text xml:space="preserve" x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> /* maxscale route to master */ id, name </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> users;</tspan></text>
  <text xml:space="preserve" x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> /* maxscale route to slave */  id, name </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> products;</tspan></text>
</svg>
