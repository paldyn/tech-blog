<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">bytes vs bytearray</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">불변(bytes) 과 가변(bytearray) 이진 시퀀스</text>

  <!-- bytes column -->
  <rect x="60" y="100" width="360" height="380" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="240" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">bytes  (불변)</text>

  <!-- bytes code block -->
  <rect x="80" y="148" width="320" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 리터럴 생성</text>
  <text x="96" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">b = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">b"hello"</text></text>
  <text x="96" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 인코딩으로 생성</text>
  <text x="96" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">b2 = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"안녕"</text>.<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">encode</text>(<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"utf-8"</text>)</text>
  <text x="96" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 수정 불가!</text>
  <text x="96" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">b[<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0</text>] = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">72</text>  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555"># TypeError!</text></text>

  <!-- bytes properties -->
  <text x="240" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">특성</text>
  <rect x="90" y="320" width="300" height="30" rx="6" fill="#0e1a0e"/>
  <text x="240" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 해시 가능 (dict 키 사용 가능)</text>
  <rect x="90" y="358" width="300" height="30" rx="6" fill="#0e1a0e"/>
  <text x="240" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 스레드 안전</text>
  <rect x="90" y="396" width="300" height="30" rx="6" fill="#1a0e0e"/>
  <text x="240" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">✗ 항목 변경 불가</text>
  <rect x="90" y="434" width="300" height="30" rx="6" fill="#0e1a0e"/>
  <text x="240" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 파일 I/O, 네트워크 전송</text>

  <!-- bytearray column -->
  <rect x="460" y="100" width="360" height="380" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="640" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">bytearray  (가변)</text>

  <!-- bytearray code block -->
  <rect x="480" y="148" width="320" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 생성</text>
  <text x="496" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">ba = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">bytearray</text>(<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">b"hello"</text>)</text>
  <text x="496" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 항목 수정 가능</text>
  <text x="496" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">ba[<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0</text>] = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">72</text>  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 'H' = 72</text></text>
  <text x="496" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># append/extend</text>
  <text x="496" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">ba.<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">append</text>(<text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">33</text>)  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># '!'</text></text>

  <!-- bytearray properties -->
  <text x="640" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">특성</text>
  <rect x="490" y="320" width="300" height="30" rx="6" fill="#1a0e0e"/>
  <text x="640" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">✗ 해시 불가 (dict 키 불가)</text>
  <rect x="490" y="358" width="300" height="30" rx="6" fill="#1a0e0e"/>
  <text x="640" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">✗ 스레드 주의 필요</text>
  <rect x="490" y="396" width="300" height="30" rx="6" fill="#0e1a0e"/>
  <text x="640" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 항목 변경·추가 가능</text>
  <rect x="490" y="434" width="300" height="30" rx="6" fill="#0e1a0e"/>
  <text x="640" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 버퍼·프로토콜 효율적 처리</text>
</svg>
