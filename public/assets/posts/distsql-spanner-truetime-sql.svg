<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Cloud Spanner SQL 특징</text>

  <!-- Code: INTERLEAVE -->
  <rect x="60" y="68" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 인터리브: 부모-자식 함께 저장</text>
  <text x="76" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> Customers (</tspan></text>
  <text x="76" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  CustomerId </tspan><tspan fill="#7ec8e3" font-weight="600">INT64 NOT NULL</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  Name       </tspan><tspan fill="#7ec8e3" font-weight="600">STRING</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">) </tspan><tspan fill="#7ec8e3" font-weight="600">PRIMARY KEY</tspan><tspan fill="#ffffff"> (CustomerId);</tspan></text>
  <text x="76" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> Orders (</tspan></text>
  <text x="76" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  CustomerId </tspan><tspan fill="#7ec8e3" font-weight="600">INT64 NOT NULL</tspan><tspan fill="#ffffff">, OrderId </tspan><tspan fill="#7ec8e3" font-weight="600">INT64</tspan></text>
  <text x="76" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">) </tspan><tspan fill="#7ec8e3" font-weight="600">PRIMARY KEY</tspan><tspan fill="#ffffff"> (CustomerId, OrderId),</tspan></text>
  <text x="76" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">  INTERLEAVE IN PARENT</tspan><tspan fill="#ffffff"> Customers;</tspan></text>

  <!-- Code: STALE read -->
  <rect x="460" y="68" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- Stale 읽기: 15초 전 스냅샷</text>
  <text x="476" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- (WAN 왕복 없이 팔로워 읽기 가능)</text>
  <text x="476" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> *</tspan></text>
  <text x="476" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> Orders</tspan></text>
  <text x="476" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">FOR SYSTEM_TIME</tspan><tspan fill="#ffffff"> AS OF</tspan></text>
  <text x="476" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  TIMESTAMP_SUB(</tspan></text>
  <text x="476" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    CURRENT_TIMESTAMP, </tspan></text>
  <text x="476" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    INTERVAL</tspan><tspan fill="#ffffff"></tspan><tspan fill="#b5cea8">15</tspan><tspan fill="#ffffff"></tspan><tspan fill="#ce9178">SECOND</tspan></text>
  <text x="476" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  );</tspan></text>

  <!-- Notes -->
  <rect x="60" y="272" width="360" height="52" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="240" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">INTERLEAVE: 부모-자식 행을 같은</text>
  <text x="240" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">스플릿에 물리적으로 배치 → JOIN 고속화</text>

  <rect x="460" y="272" width="360" height="52" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="640" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Stale read: 일관성↓ 대신 리더 없이</text>
  <text x="640" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">가까운 복제본에서 읽어 지연 감소</text>

  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Spanner = 완전 관리형 서비스 (Cloud Spanner) · 자체 설치 불가</text>
</svg>
