<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">namedtuple — 이름 있는 튜플</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">가독성 높은 경량 데이터 구조</text>

  <!-- namedtuple code -->
  <rect x="60" y="100" width="760" height="280" rx="10" fill="#111520" stroke="#1e2433"/>
  <rect x="80" y="116" width="720" height="248" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">from</tspan><tspan fill="#e8e8e8"> collections </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> namedtuple</tspan></text>
  <text x="96" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"></tspan></text>
  <text x="96" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">Point = namedtuple(</tspan><tspan fill="#ce9178">"Point"</tspan><tspan fill="#e8e8e8">, [</tspan><tspan fill="#ce9178">"x"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"y"</tspan><tspan fill="#e8e8e8">])</tspan></text>
  <text x="96" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">p = Point(</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="96" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">p.x, p.y          </tspan><tspan fill="#6a8aa0"># 3, 4 (이름으로 접근)</tspan></text>
  <text x="96" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">p[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">], p[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">]      </tspan><tspan fill="#6a8aa0"># 3, 4 (인덱스로도 접근)</tspan></text>
  <text x="96" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">x, y = p          </tspan><tspan fill="#6a8aa0"># 언패킹도 가능</tspan></text>
  <text x="96" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"></tspan></text>
  <text x="96" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># _replace: 특정 필드 바꾼 새 인스턴스 반환</tspan></text>
  <text x="96" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">p2 = p._replace(x=</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#e8e8e8">)   </tspan><tspan fill="#6a8aa0"># Point(x=10, y=4)</tspan></text>
  <text x="96" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"></tspan></text>
  <text x="96" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># Python 3.6+ NamedTuple 클래스 방식</tspan></text>
  <text x="96" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">from</tspan><tspan fill="#e8e8e8"> typing </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> NamedTuple</tspan></text>
</svg>
