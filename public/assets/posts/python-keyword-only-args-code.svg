<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">키워드 전용 인수 실용 예제</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">선택적 동작을 명확하게 제어하는 패턴</text>

  <!-- Left: sort-like with key-only -->
  <rect x="60" y="90" width="360" height="268" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 파일 처리 함수</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> copy_file(src, dst,</tspan></text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">            *, overwrite=</tspan><tspan fill="#7ec8e3">False</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">            preserve_meta=</tspan><tspan fill="#7ec8e3">True</tspan><tspan fill="#ffffff">):</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    ...</text>

  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 명시적이고 안전한 호출</text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">copy_file(</tspan><tspan fill="#ce9178">"a.txt"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"b.txt"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">           overwrite=</tspan><tspan fill="#7ec8e3">True</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 의도가 코드에 드러남</text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">* src, dst는 위치로 간결하게</text>

  <!-- Right: no defaults = mandatory keyword-only -->
  <rect x="460" y="90" width="360" height="268" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="476" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본값 없는 키워드 전용</text>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> create_user(*, name, email):</tspan></text>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    ...</text>

  <text x="476" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 반드시 이름 명시</text>
  <text x="476" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">create_user(</tspan></text>
  <text x="476" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    name=</tspan><tspan fill="#ce9178">"철수"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    email=</tspan><tspan fill="#ce9178">"cs@x.com"</tspan></text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">)                  </tspan><tspan fill="#55c555">✓</tspan></text>

  <text x="476" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">create_user(</tspan><tspan fill="#ce9178">"철수"</tspan><tspan fill="#e05555">, </tspan><tspan fill="#ce9178">"cs@x"</tspan><tspan fill="#e05555">)</tspan></text>
  <text x="476" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555"># TypeError: takes 0 positional</text>
  <text x="476" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">* 혼동 방지 · 강제 명시적 API</text>
</svg>
