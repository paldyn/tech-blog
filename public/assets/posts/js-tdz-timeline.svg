<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">TDZ (Temporal Dead Zone) — 시간적 사각지대</text>

  <!-- var timeline -->
  <text x="60" y="84" font-size="15" font-weight="600" fill="#e05555">var 변수</text>

  <!-- var bar -->
  <rect x="60" y="92" width="760" height="36" rx="4" fill="#1a0a0a" stroke="#333"/>
  <!-- undefined zone -->
  <rect x="60" y="92" width="380" height="36" rx="4" fill="#2a1a0a" stroke="#444"/>
  <text x="250" y="115" text-anchor="middle" font-size="12" fill="#e05555">undefined (선언 + 초기화 완료)</text>
  <!-- assigned zone -->
  <rect x="440" y="92" width="380" height="36" rx="0" fill="#0a2a0a" stroke="#444"/>
  <text x="630" y="115" text-anchor="middle" font-size="12" fill="#55c555">값 할당 후 정상 사용</text>
  <!-- marker -->
  <line x1="440" y1="88" x2="440" y2="132" stroke="#f7df1e" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="440" y="148" text-anchor="middle" font-size="11" fill="#f7df1e">var x = 5;</text>

  <!-- let timeline -->
  <text x="60" y="178" font-size="15" font-weight="600" fill="#7ec8e3">let / const 변수</text>

  <rect x="60" y="186" width="760" height="36" rx="4" fill="#1a0a0a" stroke="#333"/>
  <!-- TDZ zone -->
  <rect x="60" y="186" width="380" height="36" rx="4" fill="#2d0a2d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="209" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">TDZ — 접근 시 ReferenceError</text>
  <!-- live zone -->
  <rect x="440" y="186" width="380" height="36" rx="0" fill="#0a2a0a" stroke="#444"/>
  <text x="630" y="209" text-anchor="middle" font-size="12" fill="#55c555">값 할당 후 정상 사용</text>
  <!-- marker -->
  <line x1="440" y1="182" x2="440" y2="226" stroke="#f7df1e" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="440" y="242" text-anchor="middle" font-size="11" fill="#f7df1e">let x = 5;</text>

  <!-- Block start marker -->
  <line x1="60" y1="162" x2="60" y2="230" stroke="#7777cc" stroke-width="2"/>
  <text x="60" y="158" text-anchor="middle" font-size="11" fill="#7777cc">블록 시작</text>

  <!-- Code example section -->
  <text x="60" y="278" font-size="16" font-weight="600" fill="#e8e8e8">코드 예제</text>

  <!-- Left: var vs let code -->
  <rect x="60" y="292" width="380" height="150" rx="8" fill="#0d1117" stroke="#333"/>
  <text x="80" y="314" font-size="13" font-weight="600" fill="#e05555">var — TDZ 없음</text>
  <rect x="76" y="322" width="348" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">{</text>
  <text x="92" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  console.log(x);</text>
  <text x="92" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">  // → undefined (no error)</text>
  <text x="92" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  var</text>
  <text x="120" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> x = </text>
  <text x="156" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">10</text>
  <text x="174" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="92" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">}</text>

  <rect x="460" y="292" width="380" height="150" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="314" font-size="13" font-weight="600" fill="#7ec8e3">let — TDZ 존재</text>
  <rect x="476" y="322" width="348" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">{</text>
  <text x="492" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  // ← TDZ 시작</text>
  <text x="492" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  console.log(x);</text>
  <text x="492" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">  // → ReferenceError!</text>
  <text x="492" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  let</text>
  <text x="520" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> x = </text>
  <text x="556" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">10</text>
  <text x="574" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">; // ← TDZ 끝</text>

  <!-- Footer -->
  <text x="440" y="462" text-anchor="middle" font-size="11" fill="#888">TDZ는 선언이 호이스팅되었지만 초기화되지 않은 구간 — "아직 태어나지 않은" 상태</text>
  <text x="440" y="476" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #8</text>
</svg>
