<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">TDZ (Temporal Dead Zone) 타임라인</text>

  <!-- var timeline -->
  <text x="80" y="84" font-size="14" font-weight="600" fill="#ce9178">var</text>

  <!-- Phases for var -->
  <rect x="120" y="70" width="160" height="36" rx="4" fill="#1a0f00" stroke="#ce9178" stroke-width="1"/>
  <text x="200" y="93" text-anchor="middle" font-size="12" fill="#ce9178">생성 단계</text>

  <rect x="284" y="70" width="220" height="36" rx="4" fill="#ce9178" fill-opacity="0.2" stroke="#ce9178" stroke-width="1"/>
  <text x="394" y="93" text-anchor="middle" font-size="12" fill="#ce9178">TDZ 없음 — undefined 접근 가능</text>

  <rect x="508" y="70" width="120" height="36" rx="4" fill="#55c555" fill-opacity="0.2" stroke="#55c555" stroke-width="1"/>
  <text x="568" y="93" text-anchor="middle" font-size="12" fill="#55c555">초기화</text>

  <rect x="632" y="70" width="188" height="36" rx="4" fill="#55c555" fill-opacity="0.15" stroke="#55c555" stroke-width="1"/>
  <text x="726" y="93" text-anchor="middle" font-size="12" fill="#55c555">값 사용 가능</text>

  <!-- var annotation -->
  <text x="394" y="120" text-anchor="middle" font-size="11" fill="#888">var name; ← undefined</text>
  <text x="568" y="120" text-anchor="middle" font-size="11" fill="#888">name = 'Lee';</text>

  <!-- let timeline -->
  <text x="80" y="164" font-size="14" font-weight="600" fill="#7ec8e3">let</text>

  <rect x="120" y="150" width="160" height="36" rx="4" fill="#0a1628" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="173" text-anchor="middle" font-size="12" fill="#7ec8e3">생성 단계</text>

  <rect x="284" y="150" width="220" height="36" rx="4" fill="#e05555" fill-opacity="0.18" stroke="#e05555" stroke-width="1.5"/>
  <text x="394" y="173" text-anchor="middle" font-size="12" fill="#e05555">TDZ — 접근 시 ReferenceError</text>

  <rect x="508" y="150" width="120" height="36" rx="4" fill="#55c555" fill-opacity="0.2" stroke="#55c555" stroke-width="1"/>
  <text x="568" y="173" text-anchor="middle" font-size="12" fill="#55c555">초기화</text>

  <rect x="632" y="150" width="188" height="36" rx="4" fill="#55c555" fill-opacity="0.15" stroke="#55c555" stroke-width="1"/>
  <text x="726" y="173" text-anchor="middle" font-size="12" fill="#55c555">값 사용 가능</text>

  <!-- let annotation -->
  <text x="394" y="200" text-anchor="middle" font-size="11" fill="#e05555">접근 불가 구간</text>
  <text x="568" y="200" text-anchor="middle" font-size="11" fill="#888">let name = 'Lee'; ← 여기서 초기화</text>

  <!-- const timeline -->
  <text x="80" y="244" font-size="14" font-weight="600" fill="#55c555">const</text>

  <rect x="120" y="230" width="160" height="36" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="253" text-anchor="middle" font-size="12" fill="#55c555">생성 단계</text>

  <rect x="284" y="230" width="220" height="36" rx="4" fill="#e05555" fill-opacity="0.18" stroke="#e05555" stroke-width="1.5"/>
  <text x="394" y="253" text-anchor="middle" font-size="12" fill="#e05555">TDZ — 접근 시 ReferenceError</text>

  <rect x="508" y="230" width="312" height="36" rx="4" fill="#55c555" fill-opacity="0.2" stroke="#55c555" stroke-width="1"/>
  <text x="664" y="253" text-anchor="middle" font-size="12" fill="#55c555">선언과 동시에 초기화 (값 고정)</text>

  <!-- const annotation -->
  <text x="394" y="280" text-anchor="middle" font-size="11" fill="#e05555">접근 불가 구간</text>
  <text x="664" y="280" text-anchor="middle" font-size="11" fill="#888">const name = 'Lee'; ← 반드시 초기값 필요</text>

  <!-- Timeline axis -->
  <line x1="120" y1="310" x2="820" y2="310" stroke="#444" stroke-width="1.5"/>
  <polygon points="815,305 820,310 815,315" fill="#444"/>
  <text x="120" y="330" text-anchor="middle" font-size="11" fill="#666">스코프 시작</text>
  <text x="508" y="330" text-anchor="middle" font-size="11" fill="#888">선언문 실행</text>
  <text x="820" y="330" text-anchor="middle" font-size="11" fill="#666">시간 →</text>

  <line x1="508" y1="305" x2="508" y2="315" stroke="#888" stroke-width="1.5"/>

  <!-- TDZ example code -->
  <rect x="120" y="344" width="680" height="80" rx="6" fill="#0d1117" stroke="#2a2a2a"/>
  <text x="140" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 클래스에도 TDZ 적용</text>
  <text x="140" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">new Foo(); // ReferenceError — 클래스는 호이스팅되나 TDZ</text>
  <text x="140" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">class Foo {}</text>

  <!-- Footer -->
  <text x="440" y="448" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
