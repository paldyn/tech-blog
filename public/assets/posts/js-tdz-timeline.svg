<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">일시적 사각지대 (TDZ) — var vs let·const</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">같은 호이스팅이지만 초기화 방식이 다르다</text>

  <!--
    Left: x=60 w=360 (var, no TDZ)
    Gap: 60px → x=480
    Right: x=480 w=340 (let/const, TDZ)
  -->

  <!-- Left: var (x=60, w=360) -->
  <rect x="60" y="104" width="360" height="300" fill="#1a1000" rx="8" stroke="#e8a53f" stroke-width="1"/>
  <text x="240" y="128" font-size="14" font-weight="700" fill="#e8a53f" text-anchor="middle">var — TDZ 없음</text>
  <text x="240" y="146" font-size="11" fill="#8a6030" text-anchor="middle">선언과 동시에 undefined로 초기화</text>

  <rect x="78" y="158" width="324" height="200" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- y base=178, spacing=18: 178,196,214,232,250,268,286,304,322 -->
  <!-- Hoisting phase annotation zone -->
  <rect x="78" y="158" width="324" height="50" fill="#1a1000" rx="6"/>
  <text x="94" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a53f">// [호이스팅] var x → undefined</text>
  <text x="94" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 스코프 진입 시 자동 초기화됨</text>
  <text x="94" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">console.log(x); // undefined ✓</text>
  <text x="94" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 선언 전 접근 — 에러 없음</text>
  <text x="94" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a53f">var x = 10; // 할당</text>
  <text x="94" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">console.log(x); // 10</text>
  <text x="94" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>

  <text x="78" y="376" font-size="12" fill="#888">선언 전 접근해도 에러 없이 undefined 반환</text>
  <text x="78" y="394" font-size="12" fill="#e8a53f">→ 잠재적 버그의 원인</text>

  <!-- Center arrow -->
  <polygon points="422,255 422,241 452,241 452,235 478,248 452,261 452,255"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Right: let/const (x=480, w=340) -->
  <rect x="480" y="104" width="340" height="300" fill="#1a0808" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="650" y="128" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">let · const — TDZ 있음</text>
  <text x="650" y="146" font-size="11" fill="#8a3030" text-anchor="middle">선언 전 접근 → 즉시 ReferenceError</text>

  <rect x="498" y="158" width="304" height="200" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- TDZ zone highlight -->
  <rect x="498" y="158" width="304" height="86" fill="#2a0808" rx="6"/>
  <text x="514" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// [TDZ 구간] ← 여기가 위험</text>
  <text x="514" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 호이스트는 됐지만 초기화 안 됨</text>
  <text x="514" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="514" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">console.log(x); // ReferenceError!</text>
  <text x="514" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// TDZ 안에서 접근 → 에러</text>
  <!-- Separator line: TDZ ends here -->
  <line x1="498" y1="260" x2="802" y2="260" stroke="#e05555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="514" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="514" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">let x = 10; // TDZ 종료, 초기화</text>
  <text x="514" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">console.log(x); // 10 ✓</text>
  <text x="514" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>

  <text x="498" y="376" font-size="12" fill="#888">선언문 실행 전까지 접근하면 즉시 에러</text>
  <text x="498" y="394" font-size="12" fill="#55c555">→ 실수를 즉시 발견 가능</text>

  <!-- Footer -->
  <text x="60" y="458" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part II — TDZ (일시적 사각지대)</text>
</svg>
