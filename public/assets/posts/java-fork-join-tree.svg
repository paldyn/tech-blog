<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Fork/Join 분할 정복 트리</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">배열 합산 예: [1..8] → 재귀 분할 후 병합</text>

  <!-- Root task -->
  <rect x="340" y="82" width="200" height="48" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">sum[1..8]</text>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">fork() → 두 서브태스크 생성</text>

  <!-- Level 2 -->
  <rect x="160" y="180" width="180" height="44" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">sum[1..4]</text>
  <text x="250" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">fork() 재귀</text>

  <rect x="540" y="180" width="180" height="44" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="630" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">sum[5..8]</text>
  <text x="630" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">fork() 재귀</text>

  <!-- Level 3 left -->
  <rect x="70" y="280" width="140" height="44" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">sum[1..2]</text>
  <text x="140" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임계값 이하</text>

  <rect x="240" y="280" width="140" height="44" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="310" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">sum[3..4]</text>
  <text x="310" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임계값 이하</text>

  <!-- Level 3 right -->
  <rect x="500" y="280" width="140" height="44" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="570" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">sum[5..6]</text>
  <text x="570" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임계값 이하</text>

  <rect x="670" y="280" width="140" height="44" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="740" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">sum[7..8]</text>
  <text x="740" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임계값 이하</text>

  <!-- Leaf results -->
  <rect x="70" y="368" width="140" height="36" rx="6" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">= 3 (1+2)</text>

  <rect x="240" y="368" width="140" height="36" rx="6" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="310" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">= 7 (3+4)</text>

  <rect x="500" y="368" width="140" height="36" rx="6" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="570" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">= 11 (5+6)</text>

  <rect x="670" y="368" width="140" height="36" rx="6" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">= 15 (7+8)</text>

  <!-- Join result -->
  <rect x="280" y="430" width="320" height="36" rx="6" fill="#0a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">join() → 최종 합계 36</text>

  <!-- Fork arrows (top-down) -->
  <line x1="400" y1="130" x2="290" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="130" x2="590" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="210" y1="224" x2="165" y2="280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="290" y1="224" x2="335" y2="280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="590" y1="224" x2="545" y2="280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="670" y1="224" x2="715" y2="280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Compute arrows -->
  <line x1="140" y1="324" x2="140" y2="368" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="310" y1="324" x2="310" y2="368" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="570" y1="324" x2="570" y2="368" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="740" y1="324" x2="740" y2="368" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <!-- Join arrows -->
  <line x1="210" y1="404" x2="350" y2="430" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
  <line x1="380" y1="404" x2="400" y2="430" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
  <line x1="570" y1="404" x2="500" y2="430" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
  <line x1="740" y1="404" x2="600" y2="430" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
</svg>
