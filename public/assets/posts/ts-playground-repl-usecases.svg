<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Playground 활용 사례</text>

  <!-- Case 1 -->
  <rect x="60" y="70" width="370" height="110" rx="8" fill="#0f1f2f" stroke="#3178c6" stroke-width="1.5"/>
  <text x="245" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">① 타입 동작 실험</text>
  <text x="245" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">유니언, 인터섹션, 조건부 타입 등</text>
  <text x="245" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">복잡한 타입 표현 결과를 즉시 확인</text>
  <text x="245" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">설치 없이 바로 시작 가능</text>

  <!-- Case 2 -->
  <rect x="450" y="70" width="370" height="110" rx="8" fill="#0f2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">② 버전 간 동작 비교</text>
  <text x="635" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">TS 3.x → 5.x 동작 변화 확인</text>
  <text x="635" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">nightly 빌드로 미래 기능 미리 보기</text>
  <text x="635" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">버전 선택 드롭다운 제공</text>

  <!-- Case 3 -->
  <rect x="60" y="200" width="370" height="110" rx="8" fill="#2a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="245" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">③ 질문 · 버그 리포트</text>
  <text x="245" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">URL 공유로 재현 코드 전달</text>
  <text x="245" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Stack Overflow · GitHub Issues</text>
  <text x="245" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">팀원에게 타입 문제 설명 시 유용</text>

  <!-- Case 4 -->
  <rect x="450" y="200" width="370" height="110" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="635" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">④ 학습 도구</text>
  <text x="635" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">공식 예제 · 핸드북 연동</text>
  <text x="635" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Examples 탭에 다양한 샘플 제공</text>
  <text x="635" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">strict 옵션 켜고 끄며 효과 비교</text>

  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Playground URL에 코드가 인코딩되어 있어 페이지를 닫아도 URL만 있으면 복원 가능</text>
</svg>
