<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">FTS5 쿼리 문법과 보조 함수</text>

  <!-- Query syntax -->
  <rect x="60" y="68" width="360" height="300" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- FTS5 MATCH 쿼리 문법</text>
  <text x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 1. 단순 토큰</text>
  <text x="76" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">MATCH <tspan fill="#ce9178">'SQLite'</tspan></text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 2. AND / OR / NOT</text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">MATCH <tspan fill="#ce9178">'SQLite AND 빠른'</tspan></text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">MATCH <tspan fill="#ce9178">'SQLite OR MySQL'</tspan></text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">MATCH <tspan fill="#ce9178">'데이터베이스 NOT NoSQL'</tspan></text>
  <text x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 3. 구문 검색 (인접 단어)</text>
  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">MATCH <tspan fill="#ce9178">'"임베디드 데이터베이스"'</tspan></text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 4. 접두사 검색</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">MATCH <tspan fill="#ce9178">'데이터*'</tspan></text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 5. 컬럼 한정 검색</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">MATCH <tspan fill="#ce9178">'title:SQLite'</tspan></text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">MATCH <tspan fill="#ce9178">'title:SQL body:빠른'</tspan></text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 6. NEAR 근접 검색</text>

  <!-- Auxiliary functions -->
  <rect x="460" y="68" width="360" height="300" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 보조 함수</text>
  <text x="476" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- highlight: 검색어 강조</text>
  <text x="476" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan></text>
  <text x="476" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  highlight(articles,0,</text>
  <text x="476" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#ce9178">'&lt;b&gt;'</tspan>, <tspan fill="#ce9178">'&lt;/b&gt;'</tspan>) <tspan font-weight="600" fill="#7ec8e3">AS</tspan> h</text>
  <text x="476" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">FROM</tspan><tspan fill="#ffffff"> articles</tspan></text>
  <text x="476" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">WHERE</tspan><tspan fill="#ffffff"> articles </tspan><tspan font-weight="600" fill="#7ec8e3">MATCH</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'SQLite'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- snippet: 주변 컨텍스트 추출</text>
  <text x="476" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan></text>
  <text x="476" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  snippet(articles,1,</text>
  <text x="476" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#ce9178">'&lt;mark&gt;'</tspan>,<tspan fill="#ce9178">'&lt;/mark&gt;'</tspan>,</text>
  <text x="476" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#ce9178">'...'</tspan>, <tspan fill="#b5cea8">20</tspan>) <tspan font-weight="600" fill="#7ec8e3">AS</tspan><tspan fill="#ffffff"> snip</tspan></text>
  <text x="476" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">FROM</tspan><tspan fill="#ffffff"> articles</tspan></text>
  <text x="476" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">WHERE</tspan><tspan fill="#ffffff"> articles </tspan><tspan font-weight="600" fill="#7ec8e3">MATCH</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'검색'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- bm25(): 관련성 점수 (음수, 작을수록 관련)</text>
</svg>
