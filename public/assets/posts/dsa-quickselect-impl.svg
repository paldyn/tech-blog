<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">Quickselect 구현 (Lomuto 파티션)</text>

  <rect x="60" y="66" width="760" height="316" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="90" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  import</text>
  <text x="80" y="90" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         random</text>
  <text x="80" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  def</text>
  <text x="80" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      quickselect(arr, k, lo=0, hi=None):</text>
  <text x="80" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # k번째 작은 원소 (0-indexed)</text>
  <text x="80" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    if</text>
  <text x="80" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        hi is None: hi = len(arr) - 1</text>
  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    if</text>
  <text x="80" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        lo == hi: return arr[lo]</text>
  <text x="80" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # 랜덤 피벗 → 최악 O(N²) 방지</text>
  <text x="80" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    pivot_i = random.randint(lo, hi)</text>
  <text x="80" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    arr[pivot_i], arr[hi] = arr[hi], arr[pivot_i]</text>
  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    pivot = arr[hi]; store = lo</text>
  <text x="80" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    for</text>
  <text x="80" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        i in range(lo, hi):</text>
  <text x="80" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">      if</text>
  <text x="80" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">          arr[i] &lt;= pivot:</text>
  <text x="80" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        arr[store], arr[i] = arr[i], arr[store]</text>
  <text x="80" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        store += 1</text>
  <text x="80" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    arr[store], arr[hi] = arr[hi], arr[store]</text>
  <text x="80" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    if</text>
  <text x="80" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        k == store: return arr[store]</text>
  <text x="80" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    elif</text>
  <text x="80" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         k &lt; store:</text>

  <!-- Overflow to last lines -->
  <text x="80" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      return quickselect(arr, k, lo, store-1)</text>
  <text x="80" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    else</text>
  <text x="80" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">              return quickselect(arr, k, store+1, hi)</text>
</svg>
