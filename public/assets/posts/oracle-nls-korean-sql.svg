<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">한국어 NLS 실무 SQL</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">문자 집합 확인 · 정렬 · 변환</text>

  <!-- Left panel -->
  <rect x="60" y="92" width="370" height="340" rx="12" fill="#0e1623" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">문자 집합 &amp; NLS 파라미터 확인</text>
  <rect x="76" y="124" width="338" height="292" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="92" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- DB 문자 집합 조회</text>
  <text x="92" y="166" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> value</text>
  <text x="92" y="184" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  nls_database_parameters</text>
  <text x="92" y="202" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">WHERE</tspan> parameter</text>
  <text x="92" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">      = <tspan fill="#ce9178">'NLS_CHARACTERSET'</tspan>;</text>

  <text x="92" y="248" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 세션 NLS 확인</text>
  <text x="92" y="266" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> * <tspan fill="#7ec8e3">FROM</tspan> nls_session_parameters</text>
  <text x="92" y="284" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ORDER BY</tspan> parameter;</text>

  <text x="92" y="312" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 세션 NLS 변경</text>
  <text x="92" y="330" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ALTER SESSION SET</tspan></text>
  <text x="92" y="348" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  nls_date_format =</text>
  <text x="92" y="366" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    'YYYY-MM-DD HH24:MI:SS';</text>
  <text x="92" y="390" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">ALTER SESSION SET</tspan></text>
  <text x="92" y="408" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  nls_sort = <tspan fill="#ce9178">KOREAN</tspan>,</text>
  <text x="92" y="426" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  nls_comp = <tspan fill="#ce9178">LINGUISTIC</tspan>;</text>

  <!-- Right panel -->
  <rect x="450" y="92" width="370" height="340" rx="12" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">문자 변환 &amp; 바이트 크기 확인</text>
  <rect x="466" y="124" width="338" height="292" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="482" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 한글 1자의 바이트 수 확인</text>
  <text x="482" y="166" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan></text>
  <text x="482" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  LENGTHB(<tspan fill="#ce9178">'가'</tspan>) AS byte_len,</text>
  <text x="482" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  LENGTH(<tspan fill="#ce9178">'가'</tspan>)  AS char_len</text>
  <text x="482" y="220" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan>  dual;</text>
  <text x="482" y="238" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- AL32UTF8: 3바이트, 1글자</text>

  <text x="482" y="266" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- 문자 집합 간 변환</text>
  <text x="482" y="284" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">SELECT</tspan> CONVERT(</text>
  <text x="482" y="302" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  col1,</text>
  <text x="482" y="320" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  'AL32UTF8',</text>
  <text x="482" y="338" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  'KO16MSWIN949'</text>
  <text x="482" y="356" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>
  <text x="482" y="374" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">FROM</tspan> t;</text>

  <text x="482" y="402" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">-- VARCHAR2(100 CHAR) vs BYTE</text>
  <text x="482" y="420" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3">CREATE TABLE</tspan> t (</text>
  <text x="482" y="438" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  nm VARCHAR2(<tspan fill="#b5cea8">100</tspan> <tspan fill="#7ec8e3">CHAR</tspan>));</text>
</svg>
