<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">태그 삭제 vs 레이어 삭제</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">docker rmi의 내부 동작 원리</text>

  <!-- Divider -->
  <line x1="440" y1="100" x2="440" y2="460" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Left header: 여러 태그 -->
  <text x="230" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">여러 태그가 같은 이미지 참조</text>

  <!-- Left: before -->
  <rect x="80" y="128" width="320" height="68" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">nginx:latest  +  nginx:1.25</text>
  <text x="240" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">IMAGE ID: e5e16e1a5897 (공유)</text>

  <!-- Left: command -->
  <rect x="80" y="218" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">docker rmi nginx:latest</text>

  <!-- Left: arrow -->
  <line x1="240" y1="252" x2="240" y2="276" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="240,282 234,268 246,268" fill="#7ec8e3"/>

  <!-- Left: result -->
  <rect x="80" y="288" width="320" height="90" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">nginx:latest 태그 제거 ✗</text>
  <text x="240" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">nginx:1.25 태그 유지 ✓</text>
  <text x="240" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레이어: 참조 남아 있으므로 유지</text>

  <!-- Left: layers box -->
  <rect x="80" y="400" width="320" height="56" fill="#111820" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">레이어 보존</text>
  <text x="240" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">디스크에서 삭제되지 않음</text>

  <!-- Right header: 단일 태그 -->
  <text x="660" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">단일 태그만 존재</text>

  <!-- Right: before -->
  <rect x="500" y="128" width="320" height="68" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">myapp:v1</text>
  <text x="660" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">IMAGE ID: abc123def456 (유일)</text>

  <!-- Right: command -->
  <rect x="500" y="218" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">docker rmi myapp:v1</text>

  <!-- Right: arrow -->
  <line x1="660" y1="252" x2="660" y2="276" stroke="#7777cc" stroke-width="2"/>
  <polygon points="660,282 654,268 666,268" fill="#7777cc"/>

  <!-- Right: result -->
  <rect x="500" y="288" width="320" height="90" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">myapp:v1 태그 제거 ✗</text>
  <text x="660" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">IMAGE ID abc123 완전 삭제 ✗</text>
  <text x="660" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레이어: 참조 0 → 전부 삭제</text>

  <!-- Right: layers box -->
  <rect x="500" y="400" width="320" height="56" fill="#180e0e" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="660" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">레이어 삭제</text>
  <text x="660" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">디스크에서 완전히 제거됨</text>
</svg>
