<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">e2fsck 5단계 검사 흐름 (ext 파일시스템)</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">파일시스템 손상 복구는 단계별 진행 — 언마운트 상태에서만 안전</text>
  <rect x="60" y="96" width="140" height="60" fill="#071420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Phase 1</text>
  <text x="130" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">inode 검사</text>
  <text x="130" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">타입/크기/링크 수</text>
  <line x1="200" y1="126" x2="216" y2="126" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="216,120 216,132 228,126" fill="#7ec8e3"/>
  <rect x="228" y="96" width="140" height="60" fill="#071a07" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="298" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Phase 2</text>
  <text x="298" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">디렉터리 구조</text>
  <text x="298" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">엔트리/inode 참조</text>
  <line x1="368" y1="126" x2="384" y2="126" stroke="#55c555" stroke-width="2"/>
  <polygon points="384,120 384,132 396,126" fill="#55c555"/>
  <rect x="396" y="96" width="140" height="60" fill="#0d0d1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="466" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Phase 3</text>
  <text x="466" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">디렉터리 연결</text>
  <text x="466" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">lost+found 배치</text>
  <line x1="536" y1="126" x2="552" y2="126" stroke="#7777cc" stroke-width="2"/>
  <polygon points="552,120 552,132 564,126" fill="#7777cc"/>
  <rect x="564" y="96" width="140" height="60" fill="#1a0e00" rx="8" stroke="#e0a020" stroke-width="1.5"/>
  <text x="634" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0a020" text-anchor="middle">Phase 4</text>
  <text x="634" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">링크 카운트</text>
  <text x="634" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">참조 수 불일치 수정</text>
  <line x1="704" y1="126" x2="720" y2="126" stroke="#e0a020" stroke-width="2"/>
  <polygon points="720,120 720,132 732,126" fill="#e0a020"/>
  <rect x="732" y="96" width="108" height="60" fill="#100a1a" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="786" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">Phase 5</text>
  <text x="786" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">비트맵 검사</text>
  <text x="786" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">블록/inode 맵</text>
  <rect x="60" y="186" width="760" height="64" fill="#0a1200" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">lost+found 디렉터리</text>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">부모를 잃은 고아 inode를 임시 보관합니다. 복구 후 직접 확인하세요.</text>
  <text x="440" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">경로: /마운트포인트/lost+found/   파일 이름 = inode 번호</text>
  <text x="60" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">fsck 주요 명령어</text>
  <rect x="60" y="294" width="760" height="128" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># ext 파일시스템 검사 (언마운트 필수)</text>
  <text x="76" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">sudo e2fsck -f /dev/sdb1</text>
  <text x="76" y="349" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 자동 수정 모드</text>
  <text x="76" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">sudo e2fsck -fp /dev/sdb1</text>
  <text x="400" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 백업 슈퍼블록으로 복구</text>
  <text x="400" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">sudo e2fsck -b 32768 /dev/sdb1</text>
  <text x="400" y="349" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># xfs 검사</text>
  <text x="400" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">sudo xfs_repair /dev/sdc1</text>
  <text x="76" y="403" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 다음 부팅 시 루트 FS 강제 검사</text>
  <text x="400" y="403" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">sudo touch /forcefsck  OR  tune2fs -C 1 /dev/sda1</text>
  <text x="60" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">주의: 마운트된 파일시스템에 e2fsck 실행 시 데이터 손상 위험 — 반드시 언마운트 후 실행</text>
</svg>
