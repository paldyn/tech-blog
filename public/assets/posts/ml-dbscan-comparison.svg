<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="68" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="56" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="36" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">K-평균 vs DBSCAN: 비구형 군집 비교</text>
  <text x="60" y="58" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">K-평균은 구형 군집만 찾는다 — DBSCAN은 어떤 형태도 탐지</text>
  <line x1="60" y1="78" x2="820" y2="78" stroke="#1e2433" stroke-width="1"/>

  <!-- ===== LEFT: K-Means fails on ring ===== -->
  <rect x="60" y="88" width="360" height="220" rx="8" fill="#0d1520" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">K-평균 (K=2): 실패</text>
  <text x="80" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원형 결정 경계 → 링 모양 군집 분리 불가</text>

  <!-- Ring shape: outer ring points -->
  <!-- Outer ring (radius ~70 from center 240,180) -->
  <circle cx="240" cy="110" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="270" cy="115" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="295" cy="130" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="308" cy="155" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="308" cy="180" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="295" cy="205" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="270" cy="220" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="240" cy="228" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="210" cy="220" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="185" cy="205" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="172" cy="180" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="172" cy="155" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="185" cy="130" r="4" fill="#e05555" opacity="0.85"/>
  <circle cx="210" cy="115" r="4" fill="#e05555" opacity="0.85"/>

  <!-- Inner cluster (center) -->
  <circle cx="228" cy="175" r="4" fill="#7ec8e3" opacity="0.85"/>
  <circle cx="245" cy="168" r="4" fill="#7ec8e3" opacity="0.85"/>
  <circle cx="255" cy="183" r="4" fill="#7ec8e3" opacity="0.85"/>
  <circle cx="238" cy="190" r="4" fill="#7ec8e3" opacity="0.85"/>
  <circle cx="228" cy="162" r="4" fill="#7ec8e3" opacity="0.85"/>

  <!-- K-Means incorrect boundary (vertical-ish line) -->
  <line x1="240" y1="96" x2="240" y2="292" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <text x="242" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffcc00">잘못된 경계</text>

  <!-- K-Means centroids -->
  <text x="195" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#e05555">✕</text>
  <text x="272" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#7ec8e3">✕</text>
  <text x="185" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">중심1</text>
  <text x="268" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">중심2</text>

  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">링의 절반씩 나눔 → 완전히 틀린 군집</text>
  <text x="80" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">구형 결정 경계의 한계</text>

  <!-- ===== RIGHT: DBSCAN succeeds ===== -->
  <rect x="460" y="88" width="360" height="220" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">DBSCAN: 성공</text>
  <text x="480" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">밀도 연결 → 링 형태 군집 정확히 탐지</text>

  <!-- Same ring shape, different colors showing correct clustering -->
  <!-- Outer ring = cluster 1 (green/orange) -->
  <circle cx="640" cy="110" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="670" cy="115" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="695" cy="130" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="708" cy="155" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="708" cy="180" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="695" cy="205" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="670" cy="220" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="640" cy="228" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="610" cy="220" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="585" cy="205" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="572" cy="180" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="572" cy="155" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="585" cy="130" r="4" fill="#ce9178" opacity="0.9"/>
  <circle cx="610" cy="115" r="4" fill="#ce9178" opacity="0.9"/>

  <!-- Inner cluster = cluster 2 (purple/blue) -->
  <circle cx="628" cy="175" r="4" fill="#7777cc" opacity="0.9"/>
  <circle cx="645" cy="168" r="4" fill="#7777cc" opacity="0.9"/>
  <circle cx="655" cy="183" r="4" fill="#7777cc" opacity="0.9"/>
  <circle cx="638" cy="190" r="4" fill="#7777cc" opacity="0.9"/>
  <circle cx="628" cy="162" r="4" fill="#7777cc" opacity="0.9"/>

  <!-- Cluster labels -->
  <text x="700" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">군집 1 (링)</text>
  <text x="662" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">군집 2</text>

  <text x="480" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">링 외부 = 군집 1, 내부 = 군집 2</text>
  <text x="480" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">K 사전 지정 불필요, 이상치 자동 제거</text>

  <!-- Arrow between panels -->
  <text x="420" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#7777cc">→</text>

  <!-- ===== Code Block ===== -->
  <rect x="60" y="325" width="760" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="345" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text><text x="122" y="345" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> sklearn.cluster </text><text x="264" y="345" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text><text x="318" y="345" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> DBSCAN</text>
  <text x="76" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">db = DBSCAN(eps=</text><text x="230" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0.5</text><text x="257" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, min_samples=</text><text x="398" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">4</text><text x="408" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">).fit(X)</text>
  <text x="76" y="381" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">labels = db.labels_</text><text x="250" y="381" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">  # -1 = 잡음(이상치)</text>
  <text x="76" y="399" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">noise_mask = labels == </text><text x="280" y="399" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">-1</text><text x="300" y="399" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">  # 이상치 탐지</text>
  <text x="76" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">n_clusters = </text><text x="178" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">len</text><text x="211" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">(set(labels)) - (</text><text x="360" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text><text x="370" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> if</text><text x="397" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> -1</text><text x="424" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> in</text><text x="451" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> labels </text><text x="508" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">else</text><text x="542" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> 0</text><text x="556" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>

  <!-- Footer -->
  <text x="440" y="449" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
