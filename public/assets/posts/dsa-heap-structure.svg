<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">최대 힙 (Max-Heap) 구조</text>

  <!-- Tree section label -->
  <text x="230" y="75" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">트리 표현</text>

  <!-- Tree nodes -->
  <!-- Root 100 -->
  <circle cx="230" cy="108" r="26" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="230" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">100</text>
  <text x="270" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">root</text>

  <!-- Level 2: 80, 60 -->
  <circle cx="140" cy="180" r="26" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="140" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">80</text>
  <circle cx="320" cy="180" r="26" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="320" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">60</text>

  <!-- Level 3: 40,70,50,30 -->
  <circle cx="84" cy="256" r="24" fill="#1a2a4a" stroke="#2a4a6e" stroke-width="1.5"/>
  <text x="84" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">40</text>
  <circle cx="188" cy="256" r="24" fill="#1a2a4a" stroke="#2a4a6e" stroke-width="1.5"/>
  <text x="188" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">70</text>
  <circle cx="276" cy="256" r="24" fill="#1a2a4a" stroke="#2a4a6e" stroke-width="1.5"/>
  <text x="276" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">50</text>
  <circle cx="364" cy="256" r="24" fill="#1a2a4a" stroke="#2a4a6e" stroke-width="1.5"/>
  <text x="364" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">30</text>

  <!-- Edges -->
  <line x1="212" y1="128" x2="157" y2="156" stroke="#555" stroke-width="1.5"/>
  <line x1="248" y1="128" x2="303" y2="156" stroke="#555" stroke-width="1.5"/>
  <line x1="122" y1="200" x2="99" y2="234" stroke="#555" stroke-width="1.5"/>
  <line x1="158" y1="200" x2="172" y2="234" stroke="#555" stroke-width="1.5"/>
  <line x1="303" y1="200" x2="288" y2="234" stroke="#555" stroke-width="1.5"/>
  <line x1="337" y1="200" x2="351" y2="234" stroke="#555" stroke-width="1.5"/>

  <!-- Heap property annotation -->
  <text x="230" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">부모 ≥ 자식 (최대 힙 속성)</text>

  <!-- Array section label -->
  <text x="660" y="75" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">배열 표현</text>

  <!-- Array visualization -->
  <text x="490" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인덱스:</text>
  <text x="490" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">값:</text>

  <!-- Index boxes -->
  <rect x="540" y="92" width="44" height="24" fill="none"/>
  <text x="562" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">0</text>
  <rect x="590" y="92" width="44" height="24" fill="none"/>
  <text x="612" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1</text>
  <rect x="640" y="92" width="44" height="24" fill="none"/>
  <text x="662" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">2</text>
  <rect x="690" y="92" width="44" height="24" fill="none"/>
  <text x="712" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">3</text>
  <rect x="740" y="92" width="44" height="24" fill="none"/>
  <text x="762" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">4</text>
  <rect x="790" y="92" width="44" height="24" fill="none"/>
  <text x="812" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">5</text>

  <!-- Value boxes -->
  <rect x="540" y="116" width="44" height="36" fill="#1a2a4a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="562" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">100</text>
  <rect x="590" y="116" width="44" height="36" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="612" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">80</text>
  <rect x="640" y="116" width="44" height="36" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="662" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">60</text>
  <rect x="690" y="116" width="44" height="36" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="712" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">40</text>
  <rect x="740" y="116" width="44" height="36" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="762" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">70</text>
  <rect x="790" y="116" width="44" height="36" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="812" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">50</text>

  <!-- Index formula -->
  <rect x="490" y="175" width="370" height="100" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="675" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">인덱스 공식 (0-based)</text>
  <text x="675" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">부모(i) = (i-1) // 2</text>
  <text x="675" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">왼쪽 자식(i) = 2i + 1</text>
  <text x="675" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">오른쪽 자식(i) = 2i + 2</text>

  <!-- Code box -->
  <rect x="50" y="330" width="780" height="115" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> MaxHeap:</tspan>
  </text>
  <text x="66" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> __init__(self): self.heap = []</tspan>
  </text>
  <text x="66" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> parent(self, i): </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> (i - </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">) // </tspan><tspan fill="#b5cea8">2</tspan>
  </text>
  <text x="66" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> left(self, i): </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> * i + </tspan><tspan fill="#b5cea8">1</tspan>
  </text>
  <text x="66" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> right(self, i): </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> * i + </tspan><tspan fill="#b5cea8">2</tspan>
  </text>
</svg>
