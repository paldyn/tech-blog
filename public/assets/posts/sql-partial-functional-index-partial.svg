<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">부분 인덱스 (Partial Index)</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">WHERE 조건으로 인덱스 대상 행을 한정해 크기와 유지 비용을 줄인다</text>

  <!-- Left: Full Index -->
  <rect x="60" y="100" width="340" height="360" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="230" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">일반 인덱스</text>

  <!-- Table rows (all) -->
  <rect x="80" y="145" width="300" height="28" fill="#1a1a1a" rx="4"/>
  <text x="95" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">id=1  status='active'   ← 인덱스 포함</text>
  <rect x="80" y="178" width="300" height="28" fill="#1a1a1a" rx="4"/>
  <text x="95" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">id=2  status='deleted'  ← 인덱스 포함</text>
  <rect x="80" y="211" width="300" height="28" fill="#1a1a1a" rx="4"/>
  <text x="95" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">id=3  status='active'   ← 인덱스 포함</text>
  <rect x="80" y="244" width="300" height="28" fill="#1a1a1a" rx="4"/>
  <text x="95" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">id=4  status='deleted'  ← 인덱스 포함</text>
  <rect x="80" y="277" width="300" height="28" fill="#1a1a1a" rx="4"/>
  <text x="95" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">id=5  status='deleted'  ← 인덱스 포함</text>
  <rect x="80" y="310" width="300" height="28" fill="#1a1a1a" rx="4"/>
  <text x="95" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">id=6  status='active'   ← 인덱스 포함</text>

  <!-- Index size label -->
  <rect x="80" y="360" width="300" height="36" fill="#1e2433" rx="6"/>
  <text x="230" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">인덱스 크기: 6 entries (모든 행)</text>

  <!-- Code block for full index -->
  <rect x="80" y="400" width="300" height="44" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE INDEX</text>
  <text x="185" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> idx_status</text>
  <text x="96" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ON</text>
  <text x="120" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> orders (status);</text>

  <!-- Right: Partial Index -->
  <rect x="480" y="100" width="340" height="360" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="650" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">부분 인덱스</text>

  <!-- Table rows - highlight active only -->
  <rect x="500" y="145" width="300" height="28" fill="#0e1a0e" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">id=1  status='active'   ← 인덱스 포함</text>
  <rect x="500" y="178" width="300" height="28" fill="#1a1a1a" rx="4"/>
  <text x="515" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">id=2  status='deleted'  ← 제외</text>
  <rect x="500" y="211" width="300" height="28" fill="#0e1a0e" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">id=3  status='active'   ← 인덱스 포함</text>
  <rect x="500" y="244" width="300" height="28" fill="#1a1a1a" rx="4"/>
  <text x="515" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">id=4  status='deleted'  ← 제외</text>
  <rect x="500" y="277" width="300" height="28" fill="#1a1a1a" rx="4"/>
  <text x="515" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">id=5  status='deleted'  ← 제외</text>
  <rect x="500" y="310" width="300" height="28" fill="#0e1a0e" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="515" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">id=6  status='active'   ← 인덱스 포함</text>

  <!-- Index size label -->
  <rect x="500" y="360" width="300" height="36" fill="#0e1a0e" rx="6"/>
  <text x="650" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">인덱스 크기: 3 entries (50% 절감)</text>

  <!-- Code block for partial index -->
  <rect x="500" y="400" width="300" height="44" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="516" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE INDEX</text>
  <text x="605" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> idx_active</text>
  <text x="516" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">ON orders(id) </text>
  <text x="638" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="676" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> …</text>

  <!-- Arrow between panels -->
  <polygon points="440,280 465,267 465,293" fill="#7ec8e3"/>
  <line x1="420" y1="280" x2="463" y2="280" stroke="#7ec8e3" stroke-width="2"/>
  <text x="430" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">WHERE</text>
  <text x="430" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">조건 적용</text>

  <!-- Bottom note -->
  <text x="440" y="488" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">삭제/만료 행이 많은 테이블에서 활성 행만 조회하는 패턴에 적합</text>
</svg>
