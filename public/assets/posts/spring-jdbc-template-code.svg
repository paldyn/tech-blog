<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JdbcTemplate 핵심 사용 패턴</text>

  <!-- ── Left: JdbcTemplate ── -->
  <text x="70" y="76"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">JdbcTemplate — 위치 기반 파라미터</text>

  <rect x="70" y="88" width="360" height="294" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <!-- Line 1 -->
  <text x="86" y="116" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 단건 조회 — queryForObject</text>
  <!-- Line 2 -->
  <text x="86" y="134" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">String<tspan fill="#ffffff"> sql = </tspan><tspan fill="#ce9178">"SELECT name FROM users"</tspan></text>
  <!-- Line 3 -->
  <text x="86" y="152" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178">             <tspan fill="#ffffff">+ </tspan><tspan fill="#ce9178">" WHERE id = ?"</tspan><tspan fill="#ffffff">;</tspan></text>
  <!-- Line 4 -->
  <text x="86" y="170" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">String<tspan fill="#ffffff"> name = jdbcTemplate</tspan></text>
  <!-- Line 5 -->
  <text x="86" y="188" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    .queryForObject(sql, </text>
  <!-- Line 6 -->
  <text x="86" y="206" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">        String<tspan fill="#ffffff">.class, userId);</tspan></text>
  <!-- Blank line -->
  <!-- Line 7 -->
  <text x="86" y="242" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 목록 조회 — RowMapper 람다</text>
  <!-- Line 8 -->
  <text x="86" y="260" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">List<tspan fill="#ffffff">&lt;User&gt; list = jdbcTemplate.query(</tspan></text>
  <!-- Line 9 -->
  <text x="86" y="278" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178">    "SELECT * FROM users"<tspan fill="#ffffff">,</tspan></text>
  <!-- Line 10 -->
  <text x="86" y="296" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    (rs, n) -> <tspan fill="#7ec8e3">new </tspan><tspan fill="#ffffff">User(</tspan></text>
  <!-- Line 11 -->
  <text x="86" y="314" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">        rs.getLong(<tspan fill="#ce9178">"id"</tspan><tspan fill="#ffffff">),</tspan></text>
  <!-- Line 12 -->
  <text x="86" y="332" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">        rs.getString(<tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff">)));</tspan></text>

  <!-- ── Right: NamedParameterJdbcTemplate ── -->
  <text x="450" y="76"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">NamedParameterJdbcTemplate — 이름 기반</text>

  <rect x="450" y="88" width="360" height="294" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <!-- Line 1 -->
  <text x="466" y="116" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// MapSqlParameterSource 활용</text>
  <!-- Line 2 -->
  <text x="466" y="134" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">MapSqlParameterSource<tspan fill="#ffffff"> p =</tspan></text>
  <!-- Line 3 -->
  <text x="466" y="152" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">    new <tspan fill="#ffffff">MapSqlParameterSource()</tspan></text>
  <!-- Line 4 -->
  <text x="466" y="170" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">        .addValue(<tspan fill="#ce9178">"dept"</tspan><tspan fill="#ffffff">, deptId)</tspan></text>
  <!-- Line 5 -->
  <text x="466" y="188" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">        .addValue(<tspan fill="#ce9178">"active"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">);</tspan></text>
  <!-- Blank line -->
  <!-- Line 7 -->
  <text x="466" y="224" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">List<tspan fill="#ffffff">&lt;User&gt; list = namedJdbc</tspan></text>
  <!-- Line 8 -->
  <text x="466" y="242" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    .query(</text>
  <!-- Line 9 -->
  <text x="466" y="260" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178">        "SELECT * FROM users "</text>
  <!-- Line 10 -->
  <text x="466" y="278" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      + <tspan fill="#ce9178">"WHERE dept = :dept"</tspan><tspan fill="#ffffff">,</tspan></text>
  <!-- Line 11 -->
  <text x="466" y="296" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">        p, userRowMapper);</text>

  <!-- Bottom comparison note -->
  <text x="70" y="400"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#6a8aa0">위치 기반: SQL 파라미터 수 변경 시 인수 순서 오류 위험</text>
  <text x="450" y="400"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">이름 기반: 가독성 ↑, 순서 독립, 복잡한 쿼리에 적합</text>
</svg>
