<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JdbcTemplate 핵심 사용 패턴</text>

  <!-- ── Left: JdbcTemplate ── -->
  <text x="70" y="76"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">JdbcTemplate — 위치 기반 파라미터</text>

  <rect x="70" y="88" width="360" height="294" rx="6" fill="#070b14" stroke="#1e2433"/>
  <!-- Line 1 -->
  <text x="86" y="116" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// 단건 조회 — queryForObject</text>
  <!-- Line 2 -->
  <text x="86" y="134" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">String<tspan fill="#e8e8e8"> sql = </tspan><tspan fill="#ce9178">"SELECT name FROM users"</tspan></text>
  <!-- Line 3 -->
  <text x="86" y="152" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#ce9178">             <tspan fill="#e8e8e8">+ </tspan><tspan fill="#ce9178">" WHERE id = ?"</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <!-- Line 4 -->
  <text x="86" y="170" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">String<tspan fill="#e8e8e8"> name = jdbcTemplate</tspan></text>
  <!-- Line 5 -->
  <text x="86" y="188" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    .queryForObject(sql, </tspan></text>
  <!-- Line 6 -->
  <text x="86" y="206" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">        String<tspan fill="#e8e8e8">.class, userId);</tspan></text>
  <!-- Blank line -->
  <!-- Line 7 -->
  <text x="86" y="242" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// 목록 조회 — RowMapper 람다</text>
  <!-- Line 8 -->
  <text x="86" y="260" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">List<tspan fill="#e8e8e8">&lt;User&gt; list = jdbcTemplate.query(</tspan></text>
  <!-- Line 9 -->
  <text x="86" y="278" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#ce9178">    "SELECT * FROM users"</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <!-- Line 10 -->
  <text x="86" y="296" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    (rs, n) -> </tspan><tspan fill="#7ec8e3">new </tspan><tspan fill="#e8e8e8">User(</tspan></text>
  <!-- Line 11 -->
  <text x="86" y="314" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">        rs.getLong(</tspan><tspan fill="#ce9178">"id"</tspan><tspan fill="#e8e8e8">),</tspan></text>
  <!-- Line 12 -->
  <text x="86" y="332" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">        rs.getString(</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#e8e8e8">)));</tspan></text>

  <!-- ── Right: NamedParameterJdbcTemplate ── -->
  <text x="450" y="76"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">NamedParameterJdbcTemplate — 이름 기반</text>

  <rect x="450" y="88" width="360" height="294" rx="6" fill="#070b14" stroke="#1e2433"/>
  <!-- Line 1 -->
  <text x="466" y="116" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// MapSqlParameterSource 활용</text>
  <!-- Line 2 -->
  <text x="466" y="134" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">MapSqlParameterSource<tspan fill="#e8e8e8"> p =</tspan></text>
  <!-- Line 3 -->
  <text x="466" y="152" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">    new </tspan><tspan fill="#e8e8e8">MapSqlParameterSource()</tspan></text>
  <!-- Line 4 -->
  <text x="466" y="170" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">        .addValue(</tspan><tspan fill="#ce9178">"dept"</tspan><tspan fill="#e8e8e8">, deptId)</tspan></text>
  <!-- Line 5 -->
  <text x="466" y="188" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">        .addValue(</tspan><tspan fill="#ce9178">"active"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <!-- Blank line -->
  <!-- Line 7 -->
  <text x="466" y="224" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">List<tspan fill="#e8e8e8">&lt;User&gt; list = namedJdbc</tspan></text>
  <!-- Line 8 -->
  <text x="466" y="242" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    .query(</tspan></text>
  <!-- Line 9 -->
  <text x="466" y="260" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#ce9178">        "SELECT * FROM users "</tspan></text>
  <!-- Line 10 -->
  <text x="466" y="278" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      + </tspan><tspan fill="#ce9178">"WHERE dept = :dept"</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <!-- Line 11 -->
  <text x="466" y="296" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">        p, userRowMapper);</tspan></text>

  <!-- Bottom comparison note -->
  <text x="70" y="400"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#6a8aa0">위치 기반: SQL 파라미터 수 변경 시 인수 순서 오류 위험</text>
  <text x="450" y="400"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">이름 기반: 가독성 ↑, 순서 독립, 복잡한 쿼리에 적합</text>
</svg>
