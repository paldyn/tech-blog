<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ES2023 불변 배열 메서드</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">toSorted · toReversed · toSpliced · with</text>

  <!-- Left column: toSorted / toReversed -->
  <text x="230" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">toSorted / toReversed</text>
  <rect x="60" y="110" width="340" height="156" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const </tspan><tspan fill="#ffffff">arr = [</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">];</tspan></text>

  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> sorted = arr.toSorted();</tspan></text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// sorted → [1, 2, 3]</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// arr    → [3, 1, 2] ← 그대로</text>
  <line x1="60" y1="200" x2="400" y2="200" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> rev = arr.toReversed();</tspan></text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// rev → [2, 1, 3]</text>
  <text x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// arr → [3, 1, 2] ← 그대로</text>

  <!-- Right column: toSpliced / with -->
  <text x="650" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">toSpliced / with</text>
  <rect x="480" y="110" width="340" height="156" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="496" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const </tspan><tspan fill="#ffffff">a = [</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#ffffff">];</tspan></text>

  <text x="496" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> b = a.toSpliced(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="496" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// b → [10, 30]</text>
  <text x="496" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// a → [10, 20, 30] ← 그대로</text>
  <line x1="480" y1="200" x2="820" y2="200" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">const </tspan><tspan fill="#ffffff">c = a.with(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="496" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// c → [10, 99, 30]</text>
  <text x="496" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// a → [10, 20, 30] ← 그대로</text>

  <!-- Bottom note box -->
  <rect x="60" y="290" width="760" height="70" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">핵심 패턴: 원본 보존 + 새 배열 반환</text>
  <text x="440" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">React setState · Redux · 불변 상태 관리에서 sort/reverse/splice 대신 사용</text>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">TypedArray에도 동일하게 적용 (ES2023, Chrome 110+, Node 20+)</text>

  <!-- Footer -->
</svg>
