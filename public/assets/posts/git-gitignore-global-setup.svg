<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">전역 gitignore 설정 방법</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">한 번 설정하면 모든 저장소에 자동 적용</text>

  <!-- Setup commands -->
  <rect x="60" y="88" width="760" height="100" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="112" fill="#9aa4b8"># 전역 gitignore 파일 위치 설정 (기본값: ~/.config/git/ignore)</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git config</tspan><tspan fill="#ffffff"> --global core.excludesFile </tspan><tspan fill="#ce9178">~/.gitignore_global</tspan>
    <tspan x="76" dy="22" fill="#9aa4b8"># 설정 확인</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">git config</tspan><tspan fill="#ffffff"> --global core.excludesFile</tspan>
  </text>

  <!-- Global gitignore content -->
  <rect x="60" y="204" width="760" height="148" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">~/.gitignore_global 권장 내용</text>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="248" fill="#9aa4b8"># macOS</tspan>
    <tspan x="76" dy="18" fill="#ce9178">.DS_Store .AppleDouble .LSOverride</tspan>
    <tspan x="76" dy="18" fill="#9aa4b8"># Windows</tspan>
    <tspan x="76" dy="18" fill="#ce9178">Thumbs.db ehthumbs.db Desktop.ini</tspan>
    <tspan x="76" dy="18" fill="#9aa4b8"># IDE</tspan>
    <tspan x="76" dy="18" fill="#ce9178">.idea/ .vscode/ *.sublime-workspace *.swp *~</tspan>
  </text>
</svg>
