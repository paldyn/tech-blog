<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">고아 커밋 복구 단계별 명령어</text>

  <rect x="60" y="68" width="760" height="262" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># STEP 1: reflog에서 잃어버린 커밋 찾기</text>
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git reflog</text>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># abc1234 HEAD@{2}: commit: feat: 결제 추가  ← 이 커밋!

</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># STEP 2: 해당 커밋 내용 확인</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git show abc1234</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git diff abc1234^ abc1234</text>

  <line x1="76" y1="212" x2="804" y2="212" stroke="#1e2a3a" stroke-width="1"/>

  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># STEP 3a: 브랜치로 복구 (전체 작업 내역 살리기)</text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git checkout -b recover/payment abc1234</text>

  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># STEP 3b: 현재 브랜치에 cherry-pick (커밋 하나만)</text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git cherry-pick abc1234</text>

  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># STEP 3c: reset으로 돌아가기 (직전 커밋인 경우)</text>
</svg>
