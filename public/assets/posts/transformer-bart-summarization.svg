<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BART 요약 파이프라인</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">긴 기사 → 인코더 → 디코더 → 요약문 생성</text>

  <!-- Input article -->
  <rect x="50" y="90" width="240" height="130" fill="#111827" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">입력 기사</text>
  <text x="170" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">구글이 새로운 AI 모델을</text>
  <text x="170" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">발표했다. 이 모델은 기존</text>
  <text x="170" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">GPT-4를 여러 벤치마크에서</text>
  <text x="170" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">앞선다고 밝혔다. 또한 ...</text>
  <text x="170" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">(최대 1024 토큰)</text>

  <!-- Arrow to encoder -->
  <line x1="290" y1="155" x2="328" y2="155" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="328,149 342,155 328,161" fill="#7ec8e3"/>

  <!-- Encoder -->
  <rect x="342" y="90" width="160" height="130" fill="#1a1f35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="422" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">BART Encoder</text>
  <text x="422" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">양방향 Self-Attn</text>
  <text x="422" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">6 레이어</text>
  <text x="422" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">문맥 표현 생성</text>
  <text x="422" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">(K, V 제공)</text>

  <!-- Arrow to decoder -->
  <line x1="502" y1="155" x2="540" y2="155" stroke="#55c555" stroke-width="2"/>
  <polygon points="540,149 554,155 540,161" fill="#55c555"/>

  <!-- Decoder -->
  <rect x="554" y="90" width="160" height="130" fill="#1a0d1a" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="634" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">BART Decoder</text>
  <text x="634" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Masked Self-Attn</text>
  <text x="634" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Cross-Attention</text>
  <text x="634" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">자기 회귀 생성</text>
  <text x="634" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">Beam Search</text>

  <!-- Arrow to output -->
  <line x1="714" y1="155" x2="752" y2="155" stroke="#ce9178" stroke-width="2"/>
  <polygon points="752,149 766,155 752,161" fill="#ce9178"/>

  <!-- Output summary -->
  <rect x="766" y="90" width="90" height="130" fill="#111827" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="811" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ce9178" text-anchor="middle">요약문</text>
  <text x="811" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">구글의</text>
  <text x="811" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">새 AI가</text>
  <text x="811" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">GPT-4를</text>
  <text x="811" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">앞섰다.</text>

  <!-- Code block -->
  <rect x="50" y="240" width="780" height="118" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="66" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">from </tspan><tspan fill="#e8e8e8">transformers </tspan><tspan fill="#7ec8e3">import </tspan><tspan fill="#e8e8e8">pipeline</tspan></text>

  <text x="66" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">summarizer = pipeline(</text>
  <text x="66" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ce9178">    'summarization'</tspan><tspan fill="#e8e8e8">                   , model=</tspan><tspan fill="#ce9178">'facebook/bart-large-cnn'</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <text x="66" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">result = summarizer(long_article, max_length=</text>
  <text x="390" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">130</text>
  <text x="414" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">, min_length=</text>
  <text x="516" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">30</text>
  <text x="534" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>
  <text x="66" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#b5cea8">print</tspan><tspan fill="#e8e8e8">(result[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">][</tspan><tspan fill="#ce9178">'summary_text'</tspan><tspan fill="#e8e8e8">])</tspan></text>

</svg>
