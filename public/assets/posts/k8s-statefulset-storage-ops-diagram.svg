<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">StatefulSet 스케일 다운 — PVC 보존</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Pod가 삭제되어도 PVC는 삭제되지 않습니다 (데이터 보호)</text>

  <!-- Before state: replicas=3 -->
  <rect x="60" y="86" width="360" height="220" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">replicas: 3 (Before)</text>

  <!-- Pod boxes before -->
  <rect x="80" y="120" width="100" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="141" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">web-0</text>
  <text x="130" y="159" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Running</text>

  <rect x="195" y="120" width="100" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="141" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">web-1</text>
  <text x="245" y="159" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Running</text>

  <rect x="310" y="120" width="100" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="360" y="141" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">web-2</text>
  <text x="360" y="159" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Running</text>

  <!-- PVC arrows before -->
  <line x1="130" y1="170" x2="130" y2="204" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="245" y1="170" x2="245" y2="204" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="360" y1="170" x2="360" y2="204" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- PVC boxes before -->
  <rect x="80" y="206" width="100" height="40" rx="4" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">data-web-0</text>
  <text x="130" y="237" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">Bound</text>

  <rect x="195" y="206" width="100" height="40" rx="4" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">data-web-1</text>
  <text x="245" y="237" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">Bound</text>

  <rect x="310" y="206" width="100" height="40" rx="4" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="360" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">data-web-2</text>
  <text x="360" y="237" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">Bound</text>

  <!-- Scale down arrow -->
  <line x1="440" y1="200" x2="458" y2="200" stroke="#e05555" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="449" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">scale</text>
  <text x="449" y="215" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">down</text>

  <!-- After state: replicas=1 -->
  <rect x="460" y="86" width="360" height="220" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">replicas: 1 (After)</text>

  <!-- Pod box after -->
  <rect x="480" y="120" width="100" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="530" y="141" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">web-0</text>
  <text x="530" y="159" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Running</text>

  <!-- Deleted pods -->
  <rect x="595" y="120" width="100" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="645" y="141" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">web-1</text>
  <text x="645" y="159" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">삭제됨</text>

  <rect x="710" y="120" width="100" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="760" y="141" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">web-2</text>
  <text x="760" y="159" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">삭제됨</text>

  <!-- PVC after (all kept) -->
  <line x1="530" y1="170" x2="530" y2="204" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="480" y="206" width="100" height="40" rx="4" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">data-web-0</text>
  <text x="530" y="237" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">Bound</text>

  <rect x="595" y="206" width="100" height="40" rx="4" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">data-web-1</text>
  <text x="645" y="237" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">보존됨</text>

  <rect x="710" y="206" width="100" height="40" rx="4" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="760" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">data-web-2</text>
  <text x="760" y="237" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">보존됨</text>

  <!-- Legend and note -->
  <rect x="60" y="330" width="760" height="122" rx="8" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">PVC 보존 정책 (persistentVolumeClaimRetentionPolicy)</text>
  <text x="440" y="374" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">whenDeleted: Retain (기본값) — StatefulSet 삭제 시 PVC 유지</text>
  <text x="440" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">whenScaled: Retain (기본값) — 스케일 다운 시 PVC 유지</text>
  <text x="440" y="414" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Delete로 변경 시 스케일 다운·삭제 시 PVC도 함께 삭제됩니다 (Kubernetes 1.27+ GA)</text>
  <text x="440" y="434" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">PVC를 직접 삭제하면 데이터가 영구 삭제될 수 있으니 주의하세요</text>
</svg>
