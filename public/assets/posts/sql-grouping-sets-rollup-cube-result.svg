<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ROLLUP 결과와 GROUPING() 함수</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">소계 행 식별과 NULL 구분</text>

  <!-- ROLLUP result table -->
  <rect x="60" y="90" width="400" height="336" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="260" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">ROLLUP(country, category) 결과</text>
  <!-- header -->
  <rect x="60" y="122" width="400" height="22" rx="4" fill="#0f1a2e"/>
  <text x="130" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">country</text>
  <text x="240" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">category</text>
  <text x="360" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">SUM</text>
  <text x="440" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">GRPNG</text>
  <line x1="60" y1="144" x2="460" y2="144" stroke="#1e2433" stroke-width="1"/>
  <!-- rows -->
  <text x="130" y="160" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">KR</text>
  <text x="240" y="160" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">전자</text>
  <text x="360" y="160" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">5000</text>
  <text x="440" y="160" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">0</text>
  <line x1="60" y1="166" x2="460" y2="166" stroke="#1e2433" stroke-width="1"/>
  <text x="130" y="182" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">KR</text>
  <text x="240" y="182" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">의류</text>
  <text x="360" y="182" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">3000</text>
  <text x="440" y="182" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">0</text>
  <line x1="60" y1="188" x2="460" y2="188" stroke="#1e2433" stroke-width="1"/>
  <!-- KR subtotal -->
  <rect x="61" y="188" width="398" height="20" rx="2" fill="#1e3a1e" fill-opacity="0.6"/>
  <text x="130" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">KR</text>
  <text x="240" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">NULL</text>
  <text x="360" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">8000</text>
  <text x="440" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">1</text>
  <line x1="60" y1="208" x2="460" y2="208" stroke="#1e2433" stroke-width="1"/>
  <text x="130" y="224" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">US</text>
  <text x="240" y="224" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">전자</text>
  <text x="360" y="224" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">7000</text>
  <text x="440" y="224" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">0</text>
  <line x1="60" y1="230" x2="460" y2="230" stroke="#1e2433" stroke-width="1"/>
  <!-- US subtotal -->
  <rect x="61" y="230" width="398" height="20" rx="2" fill="#1e3a1e" fill-opacity="0.6"/>
  <text x="130" y="244" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">US</text>
  <text x="240" y="244" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">NULL</text>
  <text x="360" y="244" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">7000</text>
  <text x="440" y="244" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">1</text>
  <line x1="60" y1="250" x2="460" y2="250" stroke="#1e2433" stroke-width="1"/>
  <!-- Grand total -->
  <rect x="61" y="250" width="398" height="20" rx="2" fill="#1a1a3a" fill-opacity="0.7"/>
  <text x="130" y="264" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">NULL</text>
  <text x="240" y="264" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">NULL</text>
  <text x="360" y="264" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">15000</text>
  <text x="440" y="264" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">3</text>

  <!-- Legend -->
  <text x="260" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GROUPING(country, category) 값:</text>
  <text x="260" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">0 = 실제 데이터 행</text>
  <text x="260" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">1 = country 소계 (category가 NULL)</text>
  <text x="260" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">3 = 전체 합계 (둘 다 NULL)</text>
  <text x="260" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">NULL이 소계인지 원래 NULL인지 구분 필수!</text>

  <!-- GROUPING query -->
  <rect x="480" y="90" width="360" height="336" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="660" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">GROUPING() 활용 쿼리</text>
  <rect x="492" y="124" width="336" height="216" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="508" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="508" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  CASE</text>
  <text x="508" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    WHEN GROUPING(country)=1</text>
  <text x="508" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">    THEN '전체'</text>
  <text x="508" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    ELSE country</text>
  <text x="508" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  END AS country_label,</text>
  <text x="508" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  CASE</text>
  <text x="508" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    WHEN GROUPING(category)=1</text>
  <text x="508" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">    THEN '소계'</text>
  <text x="508" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    ELSE category</text>
  <text x="508" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  END AS category_label,</text>
  <text x="508" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  SUM(amount)</text>

  <text x="660" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">NULL 대신 의미 있는 레이블 표시</text>
  <text x="660" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실무 보고서에 바로 활용 가능</text>

  <!-- Footer -->
  <text x="440" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
