<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">전역 오류 핸들러 + 오류 리포팅</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">application.onerror로 uncaught 예외를 잡고 서버에 보고한다</text>

  <!-- Left: try/catch pattern -->
  <text x="40" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">try / catch / finally 패턴</text>
  <rect x="40" y="106" width="390" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> fnSave() {</text>
  <text x="56" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">this</tspan>.btnSave.set_enable(<tspan fill="#7ec8e3" font-weight="600">false</tspan>);</text>
  <text x="56" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">try</tspan> {</text>
  <text x="56" y="195" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    fnValidate();</text>
  <text x="56" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">this</tspan>.dsList.beginUpdate();</text>
  <text x="56" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    fnApplyChanges();</text>
  <text x="56" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">this</tspan>.dsList.endUpdate();</text>
  <text x="56" y="271" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  } <tspan fill="#7ec8e3" font-weight="600">catch</tspan> (e) {</text>
  <text x="56" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">this</tspan>.dsList.endUpdate();</text>
  <text x="56" y="309" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    gfn_error(e.message);</text>
  <text x="56" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    alert(<tspan fill="#ce9178">"저장 중 오류: "</tspan> + e.message);</text>
  <text x="56" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  } <tspan fill="#7ec8e3" font-weight="600">finally</tspan> {</text>
  <text x="56" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">this</tspan>.btnSave.set_enable(<tspan fill="#7ec8e3" font-weight="600">true</tspan>);</text>
  <text x="56" y="385" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>

  <!-- Right: global onerror -->
  <text x="450" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">전역 오류 핸들러 (Application)</text>
  <rect x="450" y="106" width="390" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// application.xfdl 스크립트</text>
  <text x="466" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> application_onerror(obj,e) {</text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">var</tspan> sInfo = <tspan fill="#ce9178">""</tspan></text>
  <text x="466" y="187" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    + <tspan fill="#ce9178">"form:"</tspan>  + e.formid + <tspan fill="#ce9178">"\n"</tspan></text>
  <text x="466" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    + <tspan fill="#ce9178">"msg:"</tspan>   + e.errormsg + <tspan fill="#ce9178">"\n"</tspan></text>
  <text x="466" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    + <tspan fill="#ce9178">"line:"</tspan>  + e.lineno;</text>
  <text x="466" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // 개발: trace 출력</text>
  <text x="466" y="271" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  gfn_error(<tspan fill="#ce9178">"[GLOBAL] "</tspan> + sInfo);</text>
  <text x="466" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // 운영: 서버 오류 리포트 전송</text>
  <text x="466" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  dsErr.setColumn(<tspan fill="#b5cea8">0</tspan>, <tspan fill="#ce9178">"MSG"</tspan>, sInfo);</text>
  <text x="466" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">this</tspan>.transaction(</text>
  <text x="466" y="355" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"ERR_REPORT"</tspan>,</text>
  <text x="466" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"/api/errorReport"</tspan>, ...);</text>
  <text x="466" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
</svg>
