<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">긴급 이슈 대응 — stash 실전 워크플로</text>

  <!-- Steps -->
  <rect x="60" y="75" width="40" height="40" rx="20" fill="#7777cc"/>
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <rect x="120" y="75" width="700" height="40" rx="8" fill="#1a1a1e" stroke="#555"/>
  <text x="140" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">feature 브랜치에서 작업 중 긴급 버그 리포트 수신</text>
  <text x="140" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">git stash push -m "login feature WIP"</text>

  <line x1="80" y1="115" x2="80" y2="133" stroke="#7777cc" stroke-width="2" marker-end="url(#arrd)"/>

  <rect x="60" y="135" width="40" height="40" rx="20" fill="#7777cc"/>
  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <rect x="120" y="135" width="700" height="40" rx="8" fill="#1a1a1e" stroke="#555"/>
  <text x="140" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">main 브랜치로 이동</text>
  <text x="140" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">git checkout main</text>

  <line x1="80" y1="175" x2="80" y2="193" stroke="#7777cc" stroke-width="2" marker-end="url(#arrd)"/>

  <rect x="60" y="195" width="40" height="40" rx="20" fill="#7777cc"/>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <rect x="120" y="195" width="700" height="40" rx="8" fill="#1a1a1e" stroke="#555"/>
  <text x="140" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">hotfix 브랜치 생성 후 버그 수정</text>
  <text x="140" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">git checkout -b hotfix/critical-bug &amp;&amp; ... &amp;&amp; git push</text>

  <line x1="80" y1="235" x2="80" y2="253" stroke="#7777cc" stroke-width="2" marker-end="url(#arrd)"/>

  <rect x="60" y="255" width="40" height="40" rx="20" fill="#7777cc"/>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <rect x="120" y="255" width="700" height="40" rx="8" fill="#1a1a1e" stroke="#555"/>
  <text x="140" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">원래 feature 브랜치로 복귀</text>
  <text x="140" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">git checkout feature/login</text>

  <line x1="80" y1="295" x2="80" y2="313" stroke="#7777cc" stroke-width="2" marker-end="url(#arrd)"/>

  <rect x="60" y="315" width="40" height="40" rx="20" fill="#55c555"/>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <rect x="120" y="315" width="700" height="40" rx="8" fill="#1a2a1e" stroke="#55c555"/>
  <text x="140" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">저장해둔 작업 복원</text>
  <text x="140" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">git stash pop   ← 원래 작업 상태로 돌아옴</text>
</svg>
