<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e08020"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8">Docker 컨테이너 트래픽 흐름 (MASQUERADE / DNAT)</text>

  <!-- Container -->
  <rect x="60" y="74" width="160" height="70" rx="8" fill="#12123a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Container</text>
  <text x="140" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">172.17.0.2:any</text>
  <text x="140" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">eth0 (veth pair)</text>

  <!-- Arrow: Container → docker0 -->
  <line x1="220" y1="109" x2="310" y2="109"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="265" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">veth 페어</text>

  <!-- docker0 bridge -->
  <rect x="310" y="74" width="160" height="70" rx="8" fill="#002010" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">docker0</text>
  <text x="390" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">172.17.0.1/16</text>
  <text x="390" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Linux bridge</text>

  <!-- Arrow: docker0 → iptables POSTROUTING -->
  <line x1="470" y1="109" x2="540" y2="109"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- iptables NAT POSTROUTING -->
  <rect x="540" y="74" width="200" height="70" rx="8" fill="#1a0a00" stroke="#e08020" stroke-width="1.5"/>
  <text x="640" y="99" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e08020">iptables NAT</text>
  <text x="640" y="117" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">POSTROUTING MASQUERADE</text>
  <text x="640" y="135" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">SRC 172.17.0.2 → 호스트 IP로 변환</text>

  <!-- Arrow → Internet -->
  <line x1="740" y1="109" x2="810" y2="109"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="810" y="86" width="50" height="46" rx="6" fill="#1a1a1a" stroke="#666" stroke-width="1"/>
  <text x="835" y="113" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Internet</text>

  <!-- Section separator -->
  <line x1="60" y1="174" x2="820" y2="174"
        stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Port forwarding section -->
  <text x="440" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">포트 포워딩 (-p 8080:80)</text>

  <!-- External client -->
  <rect x="60" y="220" width="130" height="60" rx="8" fill="#1a1a1a" stroke="#666" stroke-width="1"/>
  <text x="125" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">외부 클라이언트</text>
  <text x="125" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">:8080 요청</text>

  <!-- Arrow → PREROUTING DNAT -->
  <line x1="190" y1="250" x2="270" y2="250"
        stroke="#e08020" stroke-width="2" marker-end="url(#arr-o)"/>

  <rect x="270" y="218" width="200" height="64" rx="8" fill="#1a0a00" stroke="#e08020" stroke-width="1.5"/>
  <text x="370" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e08020">PREROUTING DNAT</text>
  <text x="370" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">DST :8080 → 172.17.0.2:80</text>
  <text x="370" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">iptables -t nat -A DOCKER</text>

  <!-- Arrow → Container -->
  <line x1="470" y1="250" x2="560" y2="250"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="560" y="218" width="160" height="64" rx="8" fill="#002010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Container :80</text>
  <text x="640" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">172.17.0.2:80 도달</text>

  <!-- iptables rules display -->
  <rect x="60" y="316" width="760" height="196" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Docker가 자동 생성하는 iptables 규칙</text>
  <text x="80" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">iptables</text>
  <text x="156" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -t nat -L -n --line-numbers</text>
  <text x="80" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># POSTROUTING: 컨테이너 → 외부 MASQUERADE</text>
  <text x="80" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">MASQUERADE  all  172.17.0.0/16  !172.17.0.0/16</text>
  <text x="80" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># PREROUTING: 외부 → 컨테이너 포트 포워딩</text>
  <text x="80" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">DNAT  tcp dpt:8080  to:172.17.0.2:80</text>
  <text x="80" y="462" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># FORWARD: docker0 ↔ 외부 허용</text>
  <text x="80" y="482" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ACCEPT  all  172.17.0.0/16  0.0.0.0/0</text>
  <text x="80" y="502" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">iptables</text>
  <text x="156" y="502" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -t filter -L DOCKER -n</text>
</svg>
