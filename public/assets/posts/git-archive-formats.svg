<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">포맷과 자주 쓰는 옵션</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">출력 형식과 묶음 구조를 명령으로 제어한다</text>

  <rect x="60" y="100" width="760" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># tar.gz로 묶고 최상위 폴더 이름 지정</text>
  <text x="78" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git archive <tspan fill="#7ec8e3" font-weight="600">--format=tar.gz</tspan> <tspan fill="#7ec8e3" font-weight="600">--prefix=app-1.0/</tspan> \</text>
  <text x="78" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">            <tspan fill="#7ec8e3" font-weight="600">-o</tspan> app-1.0.tar.gz v1.0</text>
  <text x="78" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># zip 포맷</text>
  <text x="78" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git archive <tspan fill="#7ec8e3" font-weight="600">--format=zip</tspan> <tspan fill="#7ec8e3" font-weight="600">-o</tspan> src.zip HEAD</text>
  <text x="78" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 하위 경로만: git archive HEAD src/ docs/</text>
</svg>
