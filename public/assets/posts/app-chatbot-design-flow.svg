<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ad" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">대화 처리 플로우</text>

  <!-- Column labels -->
  <text x="250" y="72" text-anchor="middle" font-size="13" fill="#888">처리 단계</text>
  <text x="660" y="72" text-anchor="middle" font-size="13" fill="#888">세부 내용</text>

  <!-- Step 1 -->
  <rect x="60" y="86" width="380" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="110" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">1. 사용자 메시지 수신</text>
  <text x="250" y="131" text-anchor="middle" font-size="12" fill="#888">텍스트 · 이미지 · 음성 입력</text>

  <rect x="500" y="86" width="320" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="110" text-anchor="middle" font-size="13" fill="#e8e8e8">길이 확인 · 스팸 필터 · 입력 정규화</text>
  <text x="660" y="131" text-anchor="middle" font-size="12" fill="#888">max_length 제한 · 인코딩 처리</text>

  <line x1="440" y1="116" x2="500" y2="116" stroke="#888" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Arrow 1→2 -->
  <line x1="250" y1="146" x2="250" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ad)"/>

  <!-- Step 2 -->
  <rect x="60" y="196" width="380" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="220" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">2. 컨텍스트 검색</text>
  <text x="250" y="241" text-anchor="middle" font-size="12" fill="#888">대화 이력 로드 + RAG 문서 조회</text>

  <rect x="500" y="196" width="320" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="220" text-anchor="middle" font-size="13" fill="#e8e8e8">최근 N턴 이력 + 유사 문서 Top-K</text>
  <text x="660" y="241" text-anchor="middle" font-size="12" fill="#888">벡터 유사도 · BM25 하이브리드</text>

  <line x1="440" y1="226" x2="500" y2="226" stroke="#888" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Arrow 2→3 -->
  <line x1="250" y1="256" x2="250" y2="306" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ad)"/>

  <!-- Step 3 -->
  <rect x="60" y="306" width="380" height="60" rx="8" fill="#1a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="250" y="330" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">3. 프롬프트 조립</text>
  <text x="250" y="351" text-anchor="middle" font-size="12" fill="#888">System + History + RAG → Messages</text>

  <rect x="500" y="306" width="320" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="330" text-anchor="middle" font-size="13" fill="#e8e8e8">토큰 수 관리 · 우선순위 설정</text>
  <text x="660" y="351" text-anchor="middle" font-size="12" fill="#888">컨텍스트 윈도우 내 최적 배치</text>

  <line x1="440" y1="336" x2="500" y2="336" stroke="#888" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Arrow 3→4 -->
  <line x1="250" y1="366" x2="250" y2="416" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ad)"/>

  <!-- Step 4 -->
  <rect x="60" y="416" width="380" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="250" y="440" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">4. LLM 호출 · 응답 스트리밍</text>
  <text x="250" y="461" text-anchor="middle" font-size="12" fill="#888">Claude · GPT · Gemini API</text>

  <rect x="500" y="416" width="320" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="440" text-anchor="middle" font-size="13" fill="#e8e8e8">temperature · max_tokens · stream</text>
  <text x="660" y="461" text-anchor="middle" font-size="12" fill="#888">SSE 스트리밍 · 안전 필터 후처리</text>

  <line x1="440" y1="446" x2="500" y2="446" stroke="#888" stroke-width="1.5" marker-end="url(#ar)"/>
</svg>
