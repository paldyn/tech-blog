<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset ↔ Grid 바인딩 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">bindDataset · bindId · datacolumn 매핑</text>

  <!-- Dataset box -->
  <rect x="50" y="90" width="340" height="250" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="220" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Dataset</text>
  <text x="220" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">id = ds_emp</text>
  <line x1="70" y1="152" x2="370" y2="152" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">emp_id</text>
  <text x="320" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">Integer</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">emp_nm</text>
  <text x="320" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">String</text>
  <text x="80" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">dept_cd</text>
  <text x="320" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">String</text>
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">sal_amt</text>
  <text x="320" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">Number</text>
  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">status</text>
  <text x="320" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">String</text>

  <text x="220" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">데이터를 보관하는 메모리 테이블</text>

  <!-- Arrow: pointing right, centered at y=215 -->
  <!-- Outline -->
  <polygon points="392,207 452,207 452,197 480,215 452,233 452,223 392,223" fill="#1e2433"/>
  <!-- Fill -->
  <polygon points="394,209 454,209 454,199 478,215 454,231 454,221 394,221" fill="#7ec8e3"/>

  <!-- Arrow label: bindDataset above arrow -->
  <text x="436" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">bindDataset</text>

  <!-- Grid box -->
  <rect x="490" y="90" width="340" height="250" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="660" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Grid</text>
  <text x="660" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">id = grd_emp</text>
  <line x1="510" y1="152" x2="810" y2="152" stroke="#1e2433" stroke-width="1"/>

  <text x="520" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">col 0</text>
  <text x="570" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">datacolumn="emp_id"</text>
  <text x="520" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">col 1</text>
  <text x="570" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">datacolumn="emp_nm"</text>
  <text x="520" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">col 2</text>
  <text x="570" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">datacolumn="dept_cd"</text>
  <text x="520" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">col 3</text>
  <text x="570" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">datacolumn="sal_amt"</text>

  <text x="660" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">화면에 데이터를 표시하는 컴포넌트</text>

  <!-- Bottom note -->
  <rect x="50" y="358" width="780" height="50" fill="#0f1929" rx="6" stroke="#1e2433"/>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Column.datacolumn 값이 Dataset 컬럼명과 정확히 일치해야 자동 동기화됩니다</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Grid의 bindDataset 속성에 Dataset ID를 지정하면 바인딩이 활성화됩니다</text>
</svg>
