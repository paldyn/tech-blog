  <rect x="606" y="326" width="198" height="52" rx="6" fill="#1a1208" stroke="#ce9178" stroke-width="1" stroke-opacity="0.5"/>
  <text x="705" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
