<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">mosh vs SSH — 연결 방식 비교</text>

  <!-- SSH column -->
  <rect x="60" y="64" width="370" height="40" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="245" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">SSH</text>

  <!-- Mosh column -->
  <rect x="450" y="64" width="370" height="40" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="635" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">mosh</text>

  <!-- Row 1: 프로토콜 -->
  <rect x="60" y="112" width="370" height="48" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="245" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">TCP 연결 (포트 22)</text>
  <text x="245" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">연결 끊기면 세션 종료</text>
  <rect x="450" y="112" width="370" height="48" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="635" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">SSH로 시작 → UDP로 전환 (60001+)</text>
  <text x="635" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SSP (State Synchronization Protocol)</text>

  <!-- Row 2: 재연결 -->
  <rect x="60" y="168" width="370" height="48" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="245" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">재연결 불가</text>
  <text x="245" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IP 변경 시 세션 소멸</text>
  <rect x="450" y="168" width="370" height="48" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="635" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">자동 재연결</text>
  <text x="635" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IP 변경·Wi-Fi 전환 후에도 유지</text>

  <!-- Row 3: 응답성 -->
  <rect x="60" y="224" width="370" height="48" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="245" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">서버 응답 대기</text>
  <text x="245" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">고지연 환경서 입력 지연 체감</text>
  <rect x="450" y="224" width="370" height="48" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="635" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">로컬 에코 예측</text>
  <text x="635" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력 즉시 화면 반영 (예측값)</text>

  <!-- Row 4: 보안 -->
  <rect x="60" y="280" width="370" height="48" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="245" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">RSA/ECDSA + AES-CTR</text>
  <text x="245" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">업계 표준 SSH 암호화</text>
  <rect x="450" y="280" width="370" height="48" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="635" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">AES-128-OCB (인증 암호화)</text>
  <text x="635" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SSH 인증 활용, 이후 UDP 암호화</text>

  <!-- Row 5: 제한 -->
  <rect x="60" y="336" width="370" height="48" rx="4" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="245" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">포트포워딩 지원</text>
  <text x="245" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">-L, -R, -D 모두 사용 가능</text>
  <rect x="450" y="336" width="370" height="48" rx="4" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1"/>
  <text x="635" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">포트포워딩 미지원</text>
  <text x="635" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">셸 접속 전용, UDP 60001+ 방화벽 필요</text>

  <!-- Code -->
  <rect x="60" y="400" width="760" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="420" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># mosh 접속 (SSH 인증 재사용)</text>
  <text x="80" y="438" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">mosh</text>
  <text x="110" y="438" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> user@server</text>
  <text x="80" y="456" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 비표준 SSH 포트 사용 시</text>
  <text x="80" y="454" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">mosh</text>
  <text x="110" y="454" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> --ssh="ssh -p 2222" user@server</text>
</svg>
