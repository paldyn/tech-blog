<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <!-- Background -->
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SealedSecret 암호화 스코프</text>

  <!-- Header -->
  <rect x="50" y="58" width="780" height="44" rx="4" fill="#111"/>
  <text x="190" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">스코프</text>
  <text x="430" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">복호화 가능 조건</text>
  <text x="700" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">용도</text>
  <line x1="50" y1="102" x2="830" y2="102" stroke="#222" stroke-width="1"/>

  <!-- Row 1: strict (default) -->
  <rect x="50" y="106" width="780" height="64" rx="4" fill="#0f1520"/>
  <text x="190" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">strict (기본값)</text>
  <text x="190" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">--scope strict</text>
  <text x="430" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">name + namespace 모두 일치해야 함</text>
  <text x="430" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">암호화 시 지정한 정확한 위치에만 배포 가능</text>
  <text x="700" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">권장 (가장 안전)</text>

  <!-- Row 2: namespace-wide -->
  <rect x="50" y="174" width="780" height="64" rx="4" fill="#111"/>
  <text x="190" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">namespace-wide</text>
  <text x="190" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">--scope namespace-wide</text>
  <text x="430" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">같은 namespace 내 어떤 이름으로도 배포 가능</text>
  <text x="430" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">이름 변경이 필요한 경우</text>
  <text x="700" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이름 유연성 필요 시</text>

  <!-- Row 3: cluster-wide -->
  <rect x="50" y="242" width="780" height="64" rx="4" fill="#0f1520"/>
  <text x="190" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">cluster-wide</text>
  <text x="190" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">--scope cluster-wide</text>
  <text x="430" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">클러스터 내 어디서나, 어떤 이름으로도 배포 가능</text>
  <text x="430" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">멀티 네임스페이스 공유 시크릿</text>
  <text x="700" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">주의해서 사용</text>

  <!-- Column separators -->
  <line x1="292" y1="102" x2="292" y2="308" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="580" y1="102" x2="580" y2="308" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Bottom note -->
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">암호화 시 결정된 스코프는 이후 변경 불가 — 변경 시 재암호화 필요</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">scopes: strict는 이름과 네임스페이스를 암호화 시드로 사용해 재배포 공격 방지</text>
</svg>
