<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">man / info / help 도구 비교</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">조작 키와 적합한 상황</text>

  <!-- man column -->
  <rect x="60" y="100" width="230" height="300" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <rect x="60" y="100" width="230" height="40" fill="#7ec8e3" rx="8"/>
  <rect x="60" y="120" width="230" height="20" fill="#7ec8e3"/>
  <text x="175" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">man</text>
  <text x="175" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">Space / b</text>
  <text x="175" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">다음/이전 페이지</text>
  <line x1="80" y1="192" x2="270" y2="192" stroke="#1e2433" stroke-width="1"/>
  <text x="175" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">/패턴  →  n / N</text>
  <text x="175" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">검색 / 다음·이전 결과</text>
  <line x1="80" y1="242" x2="270" y2="242" stroke="#1e2433" stroke-width="1"/>
  <text x="175" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">g / G</text>
  <text x="175" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">처음 / 끝으로 이동</text>
  <line x1="80" y1="292" x2="270" y2="292" stroke="#1e2433" stroke-width="1"/>
  <text x="175" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">q</text>
  <text x="175" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">종료</text>
  <line x1="80" y1="342" x2="270" y2="342" stroke="#1e2433" stroke-width="1"/>
  <text x="175" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">적합한 상황</text>
  <text x="175" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">빠른 옵션 확인</text>

  <!-- info column -->
  <rect x="325" y="100" width="230" height="300" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <rect x="325" y="100" width="230" height="40" fill="#7777cc" rx="8"/>
  <rect x="325" y="120" width="230" height="20" fill="#7777cc"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">info</text>
  <text x="440" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">n / p</text>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">다음/이전 노드</text>
  <line x1="345" y1="192" x2="535" y2="192" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">Tab / Enter</text>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">링크 이동</text>
  <line x1="345" y1="242" x2="535" y2="242" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">u</text>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">상위 노드로 이동</text>
  <line x1="345" y1="292" x2="535" y2="292" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">q</text>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">종료</text>
  <line x1="345" y1="342" x2="535" y2="342" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">적합한 상황</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">GNU 도구 상세 학습</text>

  <!-- help column -->
  <rect x="590" y="100" width="230" height="300" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <rect x="590" y="100" width="230" height="40" fill="#55c555" rx="8"/>
  <rect x="590" y="120" width="230" height="20" fill="#55c555"/>
  <text x="705" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">help / --help</text>
  <text x="705" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">help cd</text>
  <text x="705" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">빌트인 도움말</text>
  <line x1="610" y1="192" x2="800" y2="192" stroke="#1e2433" stroke-width="1"/>
  <text x="705" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">ls --help</text>
  <text x="705" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">외부 명령 도움말</text>
  <line x1="610" y1="242" x2="800" y2="242" stroke="#1e2433" stroke-width="1"/>
  <text x="705" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">help -d</text>
  <text x="705" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">한 줄 요약만 출력</text>
  <line x1="610" y1="292" x2="800" y2="292" stroke="#1e2433" stroke-width="1"/>
  <text x="705" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">페이저 없음</text>
  <text x="705" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">즉시 터미널 출력</text>
  <line x1="610" y1="342" x2="800" y2="342" stroke="#1e2433" stroke-width="1"/>
  <text x="705" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">적합한 상황</text>
  <text x="705" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">빌트인·옵션 빠른 확인</text>

  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">pinfo, tldr, cheat 같은 대안 도구도 활용 가능</text>
</svg>
