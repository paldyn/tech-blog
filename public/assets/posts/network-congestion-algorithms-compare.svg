<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TCP 혼잡 제어 알고리즘 비교</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Reno / CUBIC / BBR의 목표와 설계 차이</text>

  <!-- Reno -->
  <rect x="40" y="86" width="250" height="300" rx="8" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="165" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">TCP Reno</text>
  <text x="165" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1988년, 표준 기준</text>
  <text x="58" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">혼잡 감지 방법:</text>
  <text x="58" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패킷 손실 (타임아웃/</text>
  <text x="58" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Triple Duplicate ACK)</text>
  <text x="58" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">손실 후 반응:</text>
  <text x="58" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">cwnd = 1 (타임아웃)</text>
  <text x="58" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">cwnd /= 2 (Triple dup)</text>
  <text x="58" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">장점: 단순, 공정</text>
  <text x="58" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점: 고BDP 링크에서</text>
  <text x="58" y="320" font-family="'Wanted Sans Variable','Anted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">낮은 처리량</text>
  <text x="58" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용: Linux 기본값</text>
  <text x="58" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(오래된 커널)</text>

  <!-- CUBIC -->
  <rect x="315" y="86" width="250" height="300" rx="8" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e0c055">TCP CUBIC</text>
  <text x="440" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2008년, Linux 기본값</text>
  <text x="333" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">혼잡 감지 방법:</text>
  <text x="333" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패킷 손실</text>
  <text x="333" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(Reno와 동일)</text>
  <text x="333" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">증가 방식:</text>
  <text x="333" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">3차 함수(cubic) 곡선</text>
  <text x="333" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">마지막 손실 기준 탐색</text>
  <text x="333" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점: 고BDP에서 강력</text>
  <text x="333" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">공정한 대역폭 분배</text>
  <text x="333" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점: 손실 기반이라</text>
  <text x="333" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">버퍼 과도 채움 가능</text>
  <text x="333" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용: Linux 4.9+ 기본</text>

  <!-- BBR -->
  <rect x="590" y="86" width="250" height="300" rx="8" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1.5"/>
  <text x="715" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">TCP BBR</text>
  <text x="715" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2016년 Google 개발</text>
  <text x="608" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">혼잡 감지 방법:</text>
  <text x="608" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대역폭 + RTT 측정</text>
  <text x="608" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(손실 기반 아님!)</text>
  <text x="608" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">핵심 개념:</text>
  <text x="608" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BDP(대역폭×RTT) 추정</text>
  <text x="608" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파이프를 최적으로 채움</text>
  <text x="608" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점: 낮은 지연</text>
  <text x="608" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">무선/위성에서 강점</text>
  <text x="608" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점: 공정성 논란</text>
  <text x="608" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">구현 복잡</text>
  <text x="608" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용: Google, YouTube</text>

  <!-- Bottom note -->
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현재 Linux 기본값: CUBIC | 고성능 서버/클라우드: BBR 권장</text>
</svg>
