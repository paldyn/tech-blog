<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="19" font-weight="700" fill="#e8e8e8">프로토타입 상속 vs ES6 클래스</text>
  <text x="440" y="64" text-anchor="middle" font-size="13" fill="#555">클래스는 프로토타입의 문법적 설탕(Syntactic Sugar) — 내부 동작은 동일하다</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="400" stroke="#1e1e1e" stroke-width="2"/>

  <!-- Left: Prototype-based -->
  <text x="220" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#cc8844">프로토타입 기반 (ES5)</text>

  <rect x="30" y="112" width="390" height="256" rx="8" fill="#141008" stroke="#2a2010" stroke-width="1"/>
  <text x="225" y="136" text-anchor="middle" font-size="11" fill="#888">// 생성자 함수</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="225" y="154" text-anchor="middle" font-size="11" fill="#cc8844">function Animal(name) {</text>
  <text x="225" y="170" text-anchor="middle" font-size="11" fill="#888">  this.name = name;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="225" y="186" text-anchor="middle" font-size="11" fill="#cc8844">}</text>
  <text x="225" y="208" text-anchor="middle" font-size="11" fill="#888">// 프로토타입에 메서드 추가</text>
  <text x="225" y="224" text-anchor="middle" font-size="11" fill="#cc8844">Animal.prototype.speak = function() {</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="225" y="240" text-anchor="middle" font-size="11" fill="#888">  return `${this.name}이(가) 말합니다.`;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="225" y="256" text-anchor="middle" font-size="11" fill="#cc8844">};</text>
  <text x="225" y="278" text-anchor="middle" font-size="11" fill="#888">// 상속</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="225" y="294" text-anchor="middle" font-size="11" fill="#cc8844">function Dog(name, breed) {</text>
  <text x="225" y="310" text-anchor="middle" font-size="11" fill="#888">  Animal.call(this, name);</text>
  <text x="225" y="326" text-anchor="middle" font-size="11" fill="#888">  this.breed = breed;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="225" y="342" text-anchor="middle" font-size="11" fill="#cc8844">}</text>
  <text x="225" y="358" text-anchor="middle" font-size="11" fill="#888">Dog.prototype = Object.create(Animal.prototype);</text>

  <!-- Right: Class-based -->
  <text x="660" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#44aa88">클래스 문법 (ES6)</text>

  <rect x="455" y="112" width="395" height="256" rx="8" fill="#08140e" stroke="#1a2a20" stroke-width="1"/>
  <text x="652" y="136" text-anchor="middle" font-size="11" fill="#888">// class 키워드</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="652" y="154" text-anchor="middle" font-size="11" fill="#44aa88">class Animal {</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="652" y="170" text-anchor="middle" font-size="11" fill="#44aa88">  constructor(name) {</text>
  <text x="652" y="186" text-anchor="middle" font-size="11" fill="#888">    this.name = name;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="652" y="202" text-anchor="middle" font-size="11" fill="#44aa88">  }</text>
  <text x="652" y="222" text-anchor="middle" font-size="11" fill="#44aa88">  speak() {  // 자동으로 prototype에 추가</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="652" y="238" text-anchor="middle" font-size="11" fill="#888">    return `${this.name}이(가) 말합니다.`;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="652" y="254" text-anchor="middle" font-size="11" fill="#44aa88">  }</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="652" y="270" text-anchor="middle" font-size="11" fill="#44aa88">}</text>
  <text x="652" y="292" text-anchor="middle" font-size="11" fill="#888">// 상속 — extends + super</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="652" y="308" text-anchor="middle" font-size="11" fill="#44aa88">class Dog extends Animal {</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="652" y="324" text-anchor="middle" font-size="11" fill="#44aa88">  constructor(name, breed) {</text>
  <text x="652" y="340" text-anchor="middle" font-size="11" fill="#888">    super(name); // Animal.call(this, name)</text>
  <text x="652" y="356" text-anchor="middle" font-size="11" fill="#888">    this.breed = breed;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="652" y="372" text-anchor="middle" font-size="11" fill="#44aa88">  }</text>

  <!-- Bottom note -->
  <text x="440" y="406" text-anchor="middle" font-size="11" fill="#444">두 코드는 내부적으로 동일한 프로토타입 체인을 만든다 — class는 더 읽기 쉬운 문법을 제공할 뿐</text>
</svg>
