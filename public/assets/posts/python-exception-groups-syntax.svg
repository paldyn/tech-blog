<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">except* vs except 비교</text>

  <!-- Left: traditional except -->
  <rect x="55" y="65" width="380" height="44" rx="8" fill="#0c1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">기존 except (단일 예외)</text>

  <rect x="55" y="120" width="380" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="75" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">try</text><text x="99" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="75" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    process()</text>
  <text x="75" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">except</text><text x="135" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ValueError </text><text x="243" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text><text x="263" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> e:</text>
  <text x="75" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    handle_one(e)</text>
  <text x="75" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">except</text><text x="135" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> TypeError </text><text x="225" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text><text x="245" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> e:</text>
  <text x="75" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    handle_two(e)</text>
  <text x="75" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 단 하나의 예외만 처리 가능</text>

  <!-- Right: except* for ExceptionGroup -->
  <rect x="455" y="65" width="370" height="44" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">except* (예외 그룹용, 3.11+)</text>

  <rect x="455" y="120" width="370" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="475" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">try</text><text x="499" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="475" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    process()</text>
  <text x="475" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">except</text><text x="535" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">* ValueError </text><text x="643" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text><text x="663" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> eg:</text>
  <text x="475" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    handle_all(eg.exceptions)</text>
  <text x="475" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">except</text><text x="535" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">* TypeError </text><text x="635" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text><text x="655" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> eg:</text>
  <text x="475" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    handle_all(eg.exceptions)</text>
  <text x="475" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 같은 그룹 내 여러 예외 동시 처리</text>

  <!-- Use case note -->
  <rect x="55" y="305" width="770" height="48" rx="6" fill="#13102a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="327" text-anchor="middle" font-size="12" font-weight="700" fill="#7777cc">주요 사용처: asyncio.TaskGroup, 병렬 I/O 작업</text>
  <text x="440" y="347" text-anchor="middle" font-size="11" fill="#888">여러 태스크 동시 실행 중 일부 실패했을 때 모든 예외를 한 번에 수집해 처리</text>
</svg>
