<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">T5 파이프라인 구현</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">태스크 프리픽스만 바꾸면 동일 모델로 다양한 태스크 수행</text>

  <!-- Code block -->
  <rect x="50" y="90" width="780" height="286" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="66" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">from </tspan><tspan fill="#e8e8e8">transformers </tspan><tspan fill="#7ec8e3">import </tspan><tspan fill="#e8e8e8">T5ForConditionalGeneration, T5Tokenizer</tspan></text>

  <text x="66" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">model = T5ForConditionalGeneration.from_pretrained(</text>
  <text x="66" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    't5-base'</text>
  <text x="66" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">              )</text>
  <text x="66" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">tokenizer = T5Tokenizer.from_pretrained(</text>
  <text x="66" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    't5-base'</text>
  <text x="66" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">              )</text>

  <text x="66" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 태스크별 프리픽스만 변경</text>
  <text x="66" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">tasks = {</text>
  <text x="66" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ce9178">    'translate'</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#ce9178">'translate English to French: I love AI'</tspan><tspan fill="#e8e8e8">                                          ,</tspan></text>

  <text x="66" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ce9178">    'summarize'</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#ce9178">'summarize: [긴 텍스트...]'</tspan><tspan fill="#e8e8e8">                             ,</tspan></text>

  <text x="66" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <text x="66" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">for </text>
  <text x="96" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">name, prompt </text>
  <text x="192" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">in </text>
  <text x="216" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">tasks.items():</text>
  <text x="66" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    ids = tokenizer(prompt, return_tensors=</tspan><tspan fill="#ce9178">'pt'</tspan><tspan fill="#e8e8e8">).input_ids</tspan></text>

  <text x="66" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    out = model.generate(ids, max_new_tokens=</tspan><tspan fill="#b5cea8">200</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <text x="66" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#b5cea8">print</tspan><tspan fill="#e8e8e8">(name, tokenizer.decode(out[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">], skip_special_tokens=</tspan><tspan fill="#b5cea8">True</tspan><tspan fill="#e8e8e8">))</tspan></text>

</svg>
