  <line x1="520" y1="214" x2="568" y2="214" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrW)"/>

  <text x="60" y="290" font-size="13" fill="#888">wheel이 있으면 빌드 도구·컴파일러 없이 설치된다. 그래서 휠 제공이 권장된다.</text>
