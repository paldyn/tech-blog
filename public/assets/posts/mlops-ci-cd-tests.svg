<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arrow-muted" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <polygon points="2,2 12,7 2,12" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">ML 시스템 테스트 피라미드</text>

  <!--
    Pyramid layers (trapezoids) — centered around x=390 (with legend panel on right)
    Base y=390, each layer ~65px tall
    Center x = 390
    Layer 1 (bottom): half-width=340 → full=680
    Layer 2:          half-width=250 → full=500
    Layer 3:          half-width=170 → full=340
    Layer 4 (top):    half-width=90  → full=180
  -->
  <!-- cx=390 -->

  <!-- Layer 1 (Unit Tests) — bottom, y=325→390 -->
  <polygon points="50,390 730,390 680,325 100,325" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="352" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">단위 테스트 (Unit Tests)</text>
  <text x="390" y="370" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">피처 변환 함수, 전처리 로직, 유틸리티</text>

  <!-- Layer 2 (Integration Tests) — y=260→325 -->
  <polygon points="140,325 640,325 600,260 180,260" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="390" y="287" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">통합 테스트 (Integration Tests)</text>
  <text x="390" y="307" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">파이프라인 E2E, API 연동, 데이터 스키마</text>

  <!-- Layer 3 (Model Tests) — y=195→260 -->
  <polygon points="220,260 560,260 530,195 250,195" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델 테스트 (Model Tests)</text>
  <text x="390" y="242" text-anchor="middle" font-size="11" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">성능 회귀, 공정성 검사, 슬라이스 분석</text>

  <!-- Layer 4 (E2E / Shadow) — y=130→195 -->
  <polygon points="300,195 480,195 462,130 318,130" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="390" y="156" text-anchor="middle" font-size="12" font-weight="700" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">E2E / 섀도우 테스트</text>
  <text x="390" y="174" text-anchor="middle" font-size="10" fill="#aaaacc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">실 트래픽 섀도우, A/B 실험</text>

  <!-- Pyramid tip cap -->
  <polygon points="318,130 462,130 390,80" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>

  <!-- Legend panel (right side) -->
  <rect x="750" y="120" width="112" height="280" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="806" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">테스트 수량</text>

  <!-- Legend item 4: E2E -->
  <rect x="762" y="154" width="12" height="12" rx="2" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.2"/>
  <text x="780" y="164" font-size="10" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">E2E</text>
  <text x="780" y="177" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">1–2개</text>
  <text x="780" y="189" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">매우 느림</text>

  <line x1="762" y1="200" x2="854" y2="200" stroke="#222" stroke-width="1"/>

  <!-- Legend item 3: Model -->
  <rect x="762" y="208" width="12" height="12" rx="2" fill="#1a2a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="780" y="218" font-size="10" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델</text>
  <text x="780" y="231" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">수 개</text>
  <text x="780" y="243" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">느림</text>

  <line x1="762" y1="254" x2="854" y2="254" stroke="#222" stroke-width="1"/>

  <!-- Legend item 2: Integration -->
  <rect x="762" y="262" width="12" height="12" rx="2" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.2"/>
  <text x="780" y="272" font-size="10" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">통합</text>
  <text x="780" y="285" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">수십 개</text>
  <text x="780" y="297" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">중간 속도</text>

  <line x1="762" y1="308" x2="854" y2="308" stroke="#222" stroke-width="1"/>

  <!-- Legend item 1: Unit -->
  <rect x="762" y="316" width="12" height="12" rx="2" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="780" y="326" font-size="10" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">단위</text>
  <text x="780" y="339" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">수백 개</text>
  <text x="780" y="351" font-size="9" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">빠름</text>

  <!-- Axis label: speed arrow -->
  <text x="30" y="260" font-size="10" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" transform="rotate(-90,30,260)">← 빠름     느림 →</text>

</svg>
