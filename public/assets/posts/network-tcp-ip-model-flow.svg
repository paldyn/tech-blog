<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">웹 요청 흐름 — 계층별 동작</text>

  <!-- Left: Browser -->
  <rect x="40" y="70" width="150" height="260" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="115" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Browser</text>
  <text x="115" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">App Layer</text>
  <text x="115" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">HTTP GET /index.html</text>
  <line x1="60" y1="150" x2="180" y2="150" stroke="#333" stroke-width="1"/>
  <text x="115" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Transport</text>
  <text x="115" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">TCP SYN (port 443)</text>
  <line x1="60" y1="202" x2="180" y2="202" stroke="#333" stroke-width="1"/>
  <text x="115" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Internet</text>
  <text x="115" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">IP src=1.2.3.4</text>
  <text x="115" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">dst=93.184.216.34</text>
  <line x1="60" y1="268" x2="180" y2="268" stroke="#333" stroke-width="1"/>
  <text x="115" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">Link</text>
  <text x="115" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">ETH frame→Router MAC</text>

  <!-- Middle: Router -->
  <rect x="360" y="130" width="160" height="160" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Router / ISP</text>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Internet Layer</text>
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">IP 라우팅 테이블 조회</text>
  <text x="440" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Next Hop 결정</text>
  <line x1="380" y1="228" x2="500" y2="228" stroke="#333" stroke-width="1"/>
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">Link Layer</text>
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">프레임 재작성</text>

  <!-- Right: Server -->
  <rect x="690" y="70" width="150" height="260" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="765" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Web Server</text>
  <text x="765" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">App Layer</text>
  <text x="765" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">HTTP 200 OK</text>
  <line x1="710" y1="150" x2="830" y2="150" stroke="#333" stroke-width="1"/>
  <text x="765" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Transport</text>
  <text x="765" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">TCP ACK + Data</text>
  <line x1="710" y1="202" x2="830" y2="202" stroke="#333" stroke-width="1"/>
  <text x="765" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Internet</text>
  <text x="765" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">IP src=93.184.216.34</text>
  <line x1="710" y1="268" x2="830" y2="268" stroke="#333" stroke-width="1"/>
  <text x="765" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">Link</text>
  <text x="765" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">ETH frame 수신</text>

  <!-- Arrows -->
  <line x1="190" y1="210" x2="360" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="520" y1="210" x2="690" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Bottom note -->
  <rect x="60" y="350" width="760" height="18" rx="5" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">라우터는 L3(인터넷)까지만 처리. 응용 데이터는 보지 않는다.</text>
</svg>
