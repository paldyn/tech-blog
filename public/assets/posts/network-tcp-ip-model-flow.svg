<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-l" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">HTTP 요청 시 TCP/IP 계층 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">브라우저에서 서버까지 각 계층이 처리하는 내용</text>

  <!-- Client column -->
  <text x="140" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">클라이언트 (브라우저)</text>

  <rect x="60" y="110" width="160" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">응용 계층</text>

  <rect x="60" y="160" width="160" height="40" rx="6" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">전송 계층</text>

  <rect x="60" y="210" width="160" height="40" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">인터넷 계층</text>

  <rect x="60" y="260" width="160" height="40" rx="6" fill="#1a1200" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="140" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c44a">네트워크 접근</text>

  <!-- Router column -->
  <text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">라우터 (중계)</text>

  <rect x="360" y="210" width="160" height="40" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">인터넷 계층</text>
  <rect x="360" y="260" width="160" height="40" rx="6" fill="#1a1200" stroke="#e8c44a" stroke-width="1"/>
  <text x="440" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c44a">네트워크 접근</text>

  <!-- Server column -->
  <text x="740" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">서버</text>

  <rect x="660" y="110" width="160" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="740" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">응용 계층</text>
  <rect x="660" y="160" width="160" height="40" rx="6" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="740" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">전송 계층</text>
  <rect x="660" y="210" width="160" height="40" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">인터넷 계층</text>
  <rect x="660" y="260" width="160" height="40" rx="6" fill="#1a1200" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="740" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c44a">네트워크 접근</text>

  <!-- physical medium -->
  <rect x="60" y="320" width="760" height="26" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">물리 매체 — 케이블 / 광섬유 / 무선</text>

  <!-- horizontal arrows at network access level -->
  <line x1="220" y1="280" x2="358" y2="280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>
  <line x1="522" y1="280" x2="658" y2="280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- labels above/below arrows at network level -->
  <text x="289" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">프레임 전송</text>
  <text x="590" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">프레임 전송</text>

  <!-- note labels on client side -->
  <text x="30" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="end">HTTP</text>
  <text x="30" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="end">TCP</text>
  <text x="30" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="end">IP</text>
  <text x="30" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="end">Eth</text>

  <!-- note: router only processes up to L3 -->
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">라우터는 3계층(IP)까지만 처리 — 응용·전송 계층은 보지 않음</text>
</svg>
