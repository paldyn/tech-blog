<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arrf" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrf2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 요청의 TCP/IP 처리 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">브라우저에서 서버까지 각 계층 동작</text>

  <!-- Client side -->
  <text x="160" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">클라이언트</text>

  <rect x="60" y="108" width="200" height="50" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Application</text>
  <text x="160" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GET /index.html HTTP/1.1</text>

  <rect x="60" y="174" width="200" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Transport</text>
  <text x="160" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TCP SYN → port 443</text>

  <rect x="60" y="240" width="200" height="50" rx="6" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Internet</text>
  <text x="160" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">src:192.168.1.5 → 93.184.216.34</text>

  <rect x="60" y="306" width="200" height="50" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Network Access</text>
  <text x="160" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">dst MAC: aa:bb:cc:dd:ee:ff</text>

  <!-- Router (middle) -->
  <text x="440" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">라우터</text>

  <rect x="340" y="240" width="200" height="50" rx="6" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Internet</text>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">라우팅 테이블 조회·전달</text>

  <rect x="340" y="306" width="200" height="50" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Network Access</text>
  <text x="440" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이더넷 프레임 재구성</text>

  <!-- Server side -->
  <text x="720" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">서버</text>

  <rect x="620" y="108" width="200" height="50" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Application</text>
  <text x="720" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">HTTP 요청 처리 → 200 OK</text>

  <rect x="620" y="174" width="200" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Transport</text>
  <text x="720" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TCP SYN-ACK → 확인응답</text>

  <rect x="620" y="240" width="200" height="50" rx="6" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Internet</text>
  <text x="720" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">dst:192.168.1.5 ← 93.184.216.34</text>

  <rect x="620" y="306" width="200" height="50" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Network Access</text>
  <text x="720" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MAC: 클라이언트 향 프레임</text>

  <!-- Arrows: Client -> Router (L3/L2) -->
  <line x1="260" y1="265" x2="340" y2="265" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrf)"/>
  <line x1="260" y1="331" x2="340" y2="331" stroke="#e05555" stroke-width="2" marker-end="url(#arrf)"/>
  <!-- Router -> Server (L3/L2) -->
  <line x1="540" y1="265" x2="620" y2="265" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrf)"/>
  <line x1="540" y1="331" x2="620" y2="331" stroke="#e05555" stroke-width="2" marker-end="url(#arrf)"/>
  <!-- Client App -> Transport -> Internet arrows (down) -->
  <line x1="160" y1="158" x2="160" y2="174" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrf2)"/>
  <line x1="160" y1="224" x2="160" y2="240" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrf2)"/>
  <line x1="160" y1="290" x2="160" y2="306" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrf2)"/>
  <!-- Server up arrows -->
  <line x1="720" y1="356" x2="720" y2="306" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrf2)"/>
  <line x1="720" y1="290" x2="720" y2="240" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrf2)"/>
  <line x1="720" y1="224" x2="720" y2="174" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrf2)"/>
  <line x1="720" y1="174" x2="720" y2="158" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrf2)"/>

  <!-- Note: Router only sees L3/L4 -->
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">라우터는 L3(IP)까지만 처리</text>

  <!-- Bottom bar -->
  <rect x="60" y="386" width="760" height="30" rx="6" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">각 계층은 동급(Peer) 계층과 논리적으로 통신 — 실제로는 아래 계층을 통해 전달</text>
</svg>
