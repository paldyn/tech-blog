<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">리소스 제한과 stats 연계</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">--cpus / --memory 설정이 MEM LIMIT에 반영</text>

  <!-- Left: without limits -->
  <rect x="60" y="104" width="340" height="130" rx="8" fill="#0d0d0d" stroke="#555" stroke-width="1.5"/>
  <text x="230" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">제한 없음</text>
  <text x="80" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">MEM USAGE/LIMIT</text>
  <text x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">45.8MB / 7.6GB</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">호스트 전체 메모리가 LIMIT</text>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">OOM 위험: 무제한 성장 가능</text>

  <!-- Right: with limits -->
  <rect x="480" y="104" width="340" height="130" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">--memory=512m</text>
  <text x="500" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">MEM USAGE/LIMIT</text>
  <text x="500" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">45.8MB / 512MB</text>
  <text x="500" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">제한이 LIMIT에 명시</text>
  <text x="500" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">초과 시 OOMKilled 발생</text>

  <!-- Code block -->
  <rect x="60" y="256" width="760" height="88" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># CPU 1.5코어, 메모리 512MB 제한</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker run</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">--cpus 1.5</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">--memory 512m</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">myapp</tspan>
  </text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 모든 컨테이너 1회 스냅샷 (메모리 정렬)</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker stats</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">--no-stream</tspan>
    <tspan fill="#ffffff"> | </tspan>
    <tspan fill="#7ec8e3">sort</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">-k4</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">-hr</tspan>
  </text>
</svg>
