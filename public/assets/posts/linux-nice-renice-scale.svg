<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nice 값 스케일과 우선순위</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">-20(최고 우선순위) ↔ +19(최저 우선순위)</text>

  <!-- Nice value scale bar -->
  <!-- Background bar -->
  <defs>
    <linearGradient id="niceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e05555;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#b5cea8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a3a7a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect x="100" y="100" width="680" height="40" rx="6" fill="url(#niceGrad)"/>

  <!-- Tick marks and labels -->
  <line x1="100" y1="140" x2="100" y2="155" stroke="#e8e8e8" stroke-width="2"/>
  <text x="100" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">-20</text>
  <text x="100" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">최고 우선순위</text>
  <text x="100" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">root만 설정 가능</text>

  <line x1="440" y1="140" x2="440" y2="155" stroke="#e8e8e8" stroke-width="2"/>
  <text x="440" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" text-anchor="middle">0</text>
  <text x="440" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">기본값</text>

  <line x1="780" y1="140" x2="780" y2="155" stroke="#e8e8e8" stroke-width="2"/>
  <text x="780" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">+19</text>
  <text x="780" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">최저 우선순위</text>
  <text x="780" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">일반 사용자도 가능</text>

  <!-- Mid marks -->
  <line x1="270" y1="140" x2="270" y2="150" stroke="#e8e8e8" stroke-width="1"/>
  <text x="270" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">-10</text>

  <line x1="610" y1="140" x2="610" y2="150" stroke="#e8e8e8" stroke-width="1"/>
  <text x="610" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">+10</text>

  <!-- Arrow labels on bar -->
  <text x="200" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#0a0a0a" text-anchor="middle">CPU 더 많이</text>
  <text x="660" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">CPU 더 적게</text>

  <!-- Use case boxes -->
  <rect x="50" y="220" width="240" height="180" rx="8" fill="#200a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">음수 nice (-20~-1)</text>
  <text x="170" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">root 권한 필요</text>
  <text x="68" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 실시간 오디오 처리</text>
  <text x="68" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 레이턴시 민감 서버</text>
  <text x="68" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 핵심 시스템 데몬</text>
  <text x="68" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 데이터베이스 엔진</text>
  <text x="68" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">nice -n -5 mysqld</text>

  <rect x="320" y="220" width="240" height="180" rx="8" fill="#0f1f0f" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b5cea8" text-anchor="middle">0 (기본값)</text>
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">모든 일반 프로세스</text>
  <text x="338" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 대부분의 데스크탑 앱</text>
  <text x="338" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 웹 서버 워커</text>
  <text x="338" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 일반 사용자 프로그램</text>
  <text x="338" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">기본 실행 (nice 0)</text>

  <rect x="590" y="220" width="240" height="180" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">양수 nice (+1~+19)</text>
  <text x="710" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">일반 사용자 설정 가능</text>
  <text x="608" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 백그라운드 압축</text>
  <text x="608" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 야간 백업 스크립트</text>
  <text x="608" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 인덱싱·크롤링</text>
  <text x="608" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 빌드 작업</text>
  <text x="608" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">nice -n 19 make -j8</text>
</svg>
