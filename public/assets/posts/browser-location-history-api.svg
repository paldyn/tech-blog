<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">location · history API</text>

  <!-- location decomposition -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">location — URL 분해</text>

  <!-- URL bar -->
  <rect x="60" y="96" width="760" height="40" rx="6" fill="#131a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="121" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">https://example.com:8080/path/page?q=hello&amp;lang=ko#section</text>

  <!-- breakdown arrows -->
  <line x1="100" y1="136" x2="100" y2="156" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">protocol</text>
  <text x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">'https:'</text>

  <line x1="240" y1="136" x2="240" y2="156" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">hostname</text>
  <text x="200" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">'example.com'</text>

  <line x1="360" y1="136" x2="360" y2="156" stroke="#e8a84c" stroke-width="1"/>
  <text x="335" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8a84c">port</text>
  <text x="335" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">'8080'</text>

  <line x1="470" y1="136" x2="470" y2="156" stroke="#7777cc" stroke-width="1"/>
  <text x="430" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">pathname</text>
  <text x="430" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">'/path/page'</text>

  <line x1="600" y1="136" x2="600" y2="156" stroke="#55c555" stroke-width="1"/>
  <text x="555" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">search</text>
  <text x="555" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">'?q=hello…'</text>

  <line x1="755" y1="136" x2="755" y2="156" stroke="#e05555" stroke-width="1"/>
  <text x="730" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">hash</text>
  <text x="730" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">'#section'</text>

  <!-- location methods -->
  <rect x="60" y="208" width="360" height="110" rx="6" fill="#111" stroke="#2a2a2a"/>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">location 이동 메서드</text>
  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">location.assign('/new')     <text fill="#6a8aa0">// 히스토리 추가</text></text>
  <text x="80" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">location.replace('/new')    <text fill="#6a8aa0">// 히스토리 교체</text></text>
  <text x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">location.reload()           <text fill="#6a8aa0">// 페이지 새로고침</text></text>
  <text x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">location.href = '/new'      <text fill="#6a8aa0">// = assign()</text></text>

  <!-- history API -->
  <rect x="450" y="208" width="370" height="110" rx="6" fill="#111" stroke="#2a2a2a"/>
  <text x="470" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">history API</text>
  <text x="470" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">history.pushState(state, '', url)</text>
  <text x="470" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">history.replaceState(state, '', url)</text>
  <text x="470" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">history.back()   history.forward()</text>
  <text x="470" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">history.go(-2)   history.length</text>

  <!-- pushState vs replaceState -->
  <text x="60" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">pushState vs replaceState</text>

  <rect x="60" y="362" width="360" height="114" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">pushState</text>
  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">새 히스토리 엔트리 추가</text>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">뒤로가기로 이전 URL 복귀 가능</text>
  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">SPA 페이지 전환에 사용</text>
  <text x="80" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">popstate 이벤트로 뒤로가기 감지</text>

  <rect x="450" y="362" width="370" height="114" rx="6" fill="#131a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="470" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">replaceState</text>
  <text x="470" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">현재 엔트리를 교체 (스택 증가 없음)</text>
  <text x="470" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">뒤로가기 시 이전 URL은 보존</text>
  <text x="470" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">필터·정렬 등 URL 파라미터 갱신에 사용</text>
  <text x="470" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">히스토리 스택을 오염시키지 않음</text>
</svg>
