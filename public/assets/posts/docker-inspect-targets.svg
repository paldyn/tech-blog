<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker inspect 대상 종류</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">컨테이너 · 이미지 · 볼륨 · 네트워크</text>

  <!-- 4 target boxes -->
  <rect x="60" y="104" width="180" height="100" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">컨테이너</text>
  <text x="150" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">docker inspect web</text>
  <text x="150" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">State, Config,</text>
  <text x="150" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Network, Mounts</text>

  <rect x="260" y="104" width="180" height="100" rx="8" fill="#1a1a30" stroke="#7777cc" stroke-width="1.5"/>
  <text x="350" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">이미지</text>
  <text x="350" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">docker image inspect</text>
  <text x="350" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Layers, Config,</text>
  <text x="350" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">RootFS, History</text>

  <rect x="460" y="104" width="180" height="100" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="550" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">볼륨</text>
  <text x="550" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">docker volume inspect</text>
  <text x="550" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Mountpoint,</text>
  <text x="550" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Driver, Options</text>

  <rect x="660" y="104" width="180" height="100" rx="8" fill="#1f1400" stroke="#e8a030" stroke-width="1.5"/>
  <text x="750" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8a030">네트워크</text>
  <text x="750" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">docker network inspect</text>
  <text x="750" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Subnet, Gateway,</text>
  <text x="750" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">Containers</text>

  <!-- Code block -->
  <rect x="60" y="228" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 여러 컨테이너 동시 조회</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker inspect</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">web db cache</tspan>
  </text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 종료된 컨테이너 종료 코드 확인</text>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker inspect</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">-f</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">'{{.State.ExitCode}} {{.State.Error}}'</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">web</tspan>
  </text>
</svg>
