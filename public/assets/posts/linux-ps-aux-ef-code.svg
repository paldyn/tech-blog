<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ps 주요 옵션 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">BSD 스타일(aux) vs UNIX 스타일(-ef) 및 실전 패턴</text>

  <!-- Left: BSD aux -->
  <rect x="50" y="86" width="370" height="340" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="68" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">BSD 스타일 (대시 없음)</text>
  <line x1="66" y1="118" x2="404" y2="118" stroke="#3a4a6e" stroke-width="1"/>

  <text x="68" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 모든 사용자의 모든 프로세스</text>
  <text x="68" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps aux</text>

  <text x="68" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># grep으로 필터링</text>
  <text x="68" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps aux | grep nginx</text>

  <text x="68" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># CPU 사용률 내림차순 정렬</text>
  <text x="68" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps aux --sort=-%cpu | head -10</text>

  <text x="68" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 메모리 내림차순 정렬</text>
  <text x="68" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps aux --sort=-%mem | head -10</text>

  <text x="68" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 사용자만</text>
  <text x="68" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps aux -U www-data</text>

  <text x="68" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 스레드 포함 출력</text>
  <text x="68" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps auxH | grep python</text>

  <!-- Right: UNIX -ef + custom -->
  <rect x="460" y="86" width="370" height="340" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="478" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">UNIX 스타일 (대시 사용)</text>
  <line x1="476" y1="118" x2="814" y2="118" stroke="#3a4a6e" stroke-width="1"/>

  <text x="478" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 전체 프로세스 (PPID 포함)</text>
  <text x="478" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps -ef</text>

  <text x="478" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 PID 상세 보기</text>
  <text x="478" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps -f -p 1234</text>

  <text x="478" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 커스텀 출력 컬럼 선택</text>
  <text x="478" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps -eo pid,ppid,user,</text>
  <text x="478" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">       stat,cmd --sort=pid</text>

  <text x="478" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 프로세스 그룹으로 필터</text>
  <text x="478" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps -g $(ps -o pgid= -p $$)</text>

  <text x="478" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 스레드 상세(-L 옵션)</text>
  <text x="478" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps -Lf -p 1234</text>

  <text x="478" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 환경변수 포함 출력(e=env)</text>
  <text x="478" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">ps auxe | grep MY_VAR</text>
</svg>
