  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  private </text>
  <text x="136" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
