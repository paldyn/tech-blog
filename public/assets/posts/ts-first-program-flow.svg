<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr4" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 개발 워크플로</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">코드 작성부터 실행까지</text>
  <!-- Flow boxes -->
  <rect x="60" y="108" width="140" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">.ts 작성</text>
  <text x="130" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TypeScript 코드</text>
  <text x="130" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타입 어노테이션</text>
  <line x1="200" y1="148" x2="238" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr4)"/>
  <rect x="240" y="108" width="140" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="310" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">tsc 실행</text>
  <text x="310" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타입 검사</text>
  <text x="310" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JS 코드 생성</text>
  <!-- Error branch -->
  <text x="310" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">오류 발견</text>
  <line x1="310" y1="188" x2="310" y2="230" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="240" y="232" width="140" height="50" rx="6" fill="#1a0808" stroke="#5a1a1a" stroke-width="1"/>
  <text x="310" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">오류 수정</text>
  <text x="310" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">에러 메시지 확인</text>
  <!-- Back arrow -->
  <line x1="240" y1="257" x2="130" y2="257" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="130" y1="257" x2="130" y2="193" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr4)"/>
  <!-- Success path -->
  <line x1="380" y1="148" x2="418" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr4)"/>
  <text x="399" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">성공</text>
  <rect x="420" y="108" width="140" height="80" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">.js 생성</text>
  <text x="490" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타입 제거됨</text>
  <text x="490" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실행 가능 JS</text>
  <line x1="560" y1="148" x2="598" y2="148" stroke="#55c555" stroke-width="2" marker-end="url(#arr4)"/>
  <rect x="600" y="108" width="140" height="80" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">node 실행</text>
  <text x="670" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">node dist/hello.js</text>
  <text x="670" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">결과 출력</text>
  <!-- Tips -->
  <rect x="60" y="310" width="760" height="100" rx="8" fill="#0d0d0d" stroke="#2a2a4e" stroke-width="1"/>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">개발 생산성 팁</text>
  <text x="120" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">tsc --watch</text>
  <text x="120" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일 변경 자동 감지</text>
  <text x="380" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">ts-node</text>
  <text x="380" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컴파일 없이 직접 실행</text>
  <text x="620" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">nodemon + ts-node</text>
  <text x="620" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">변경 시 자동 재실행</text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">npm install -D ts-node nodemon 으로 빠른 개발 환경 구성 가능</text>
</svg>
