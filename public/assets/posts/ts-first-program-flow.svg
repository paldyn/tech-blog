<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">첫 TypeScript 프로그램 작성</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">hello.ts → hello.js → 실행까지 단계별 안내</text>

  <!-- Step 1: Write hello.ts -->
  <text x="76" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① hello.ts 작성</text>
  <rect x="60" y="112" width="380" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 타입이 있는 함수 선언</tspan></text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> greet(name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">): </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">`Hello, ${name}!`</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">console.log(greet(</tspan><tspan fill="#ce9178">"TypeScript"</tspan><tspan fill="#ffffff">));</tspan></text>

  <!-- Arrow down -->
  <defs>
    <marker id="dn" viewBox="0 0 14 14" refX="7" refY="12" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <line x1="250" y1="242" x2="250" y2="266" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dn)"/>
  <text x="310" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">tsc hello.ts</text>

  <!-- Step 2: hello.js output -->
  <text x="76" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b5cea8">② hello.js 출력 (타입 제거됨)</text>
  <rect x="60" y="296" width="380" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> greet(name) {</tspan></text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">`Hello, ${name}!`</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">console.log(greet(</tspan><tspan fill="#ce9178">"TypeScript"</tspan><tspan fill="#ffffff">));</tspan></text>

  <!-- Right side: type annotations explained -->
  <rect x="480" y="112" width="340" height="340" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="500" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">타입 어노테이션 분석</text>
  <line x1="480" y1="148" x2="820" y2="148" stroke="#222" stroke-width="1"/>

  <text x="500" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">파라미터 타입</text>
  <rect x="500" y="184" width="300" height="40" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan></text>

  <text x="500" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">name 파라미터는 반드시 string 타입이어야 합니다.</text>
  <text x="500" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">숫자나 객체를 넘기면 컴파일 오류가 납니다.</text>

  <text x="500" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">반환 타입</text>
  <rect x="500" y="312" width="300" height="40" rx="4" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">): </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> {</tspan></text>

  <text x="500" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수가 반드시 string을 반환해야 함을 명시합니다.</text>
  <text x="500" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">number를 반환하면 컴파일 오류가 납니다.</text>
  <text x="500" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">반환 타입 생략 시 자동 추론 (권장)</text>

  <!-- Execution result -->
  <text x="76" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ 실행 결과</text>
  <rect x="60" y="420" width="380" height="26" rx="4" fill="#000" stroke="#3a8e3a" stroke-width="1"/>
  <text x="76" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Hello, TypeScript!</text>
</svg>
