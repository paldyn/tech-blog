  <text x="162" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">;</text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  title: </text>
  <text x="124" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
