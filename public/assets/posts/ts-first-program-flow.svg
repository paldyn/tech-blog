<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">첫 TypeScript 프로그램 빌드 및 실행</text>
  <defs>
    <marker id="arr-build" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-err" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <!-- Step 1 -->
  <rect x="60" y="80" width="180" height="70" rx="8" fill="#0a0a1a" stroke="#3178c6" stroke-width="2"/>
  <text x="150" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#3178c6">index.ts 작성</text>
  <text x="150" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 있는 TS 코드</text>
  <!-- Arrow -->
  <line x1="240" y1="115" x2="290" y2="115" stroke="#55c555" stroke-width="2" marker-end="url(#arr-build)"/>
  <!-- Step 2 -->
  <rect x="290" y="80" width="180" height="70" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="2"/>
  <text x="380" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">npx tsc</text>
  <text x="380" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컴파일 실행</text>
  <!-- Fork: success / error -->
  <line x1="470" y1="100" x2="530" y2="72" stroke="#55c555" stroke-width="2" marker-end="url(#arr-build)"/>
  <line x1="470" y1="130" x2="530" y2="158" stroke="#e05555" stroke-width="2" marker-end="url(#arr-err)"/>
  <text x="500" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">성공</text>
  <text x="500" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">오류</text>
  <!-- Success path -->
  <rect x="530" y="50" width="180" height="50" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="620" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">index.js 생성</text>
  <text x="620" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 정보 제거됨</text>
  <!-- Success arrow to run -->
  <line x1="710" y1="75" x2="760" y2="75" stroke="#55c555" stroke-width="2" marker-end="url(#arr-build)"/>
  <rect x="760" y="50" width="80" height="50" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="800" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">node</text>
  <text x="800" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">실행</text>
  <!-- Error path -->
  <rect x="530" y="140" width="180" height="50" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="620" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">타입 오류</text>
  <text x="620" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오류 메시지 출력</text>
  <!-- Error arrow back to edit -->
  <path d="M 620 190 C 620 240, 150 240, 150 150" fill="none" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-err)"/>
  <text x="390" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">오류 수정 후 재컴파일</text>
  <!-- ts-node shortcut -->
  <rect x="60" y="290" width="760" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#9aa4b8"># 단축키: 컴파일 없이 직접 실행 (개발용)</tspan>
    <tspan x="80" dy="24" fill="#9aa4b8">$</tspan><tspan fill="#ffffff"> npm install -D ts-node</tspan>
    <tspan x="80" dy="22" fill="#9aa4b8">$</tspan><tspan fill="#ffffff"> npx ts-node index.ts</tspan>
  </text>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">tsx, ts-node/esm 으로도 실행 가능</text>
</svg>
