  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  done: </text>
  <text x="124" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
