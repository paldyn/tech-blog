  <rect x="570" y="150" width="270" height="56" rx="6" fill="#1a0d2e" stroke="#7777cc" stroke-width="1"/>
  <text x="590" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7777cc">private 접근 제한자</text>
  <text x="590" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">클래스 외부 접근 차단</text>
  <text x="590" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">타입 수준 제약</text>

  <rect x="570" y="224" width="270" height="56" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="590" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555">반환 타입 명시</text>
  <text x="590" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">void / Todo[] 명시</text>
  <text x="590" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">의도 문서화</text>

  <rect x="570" y="298" width="270" height="56" rx="6" fill="#2e1a0d" stroke="#ce9178" stroke-width="1"/>
  <text x="590" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#ce9178">타입 자동 추론</text>
  <text x="590" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">nextId: number 추론됨</text>
  <text x="590" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
