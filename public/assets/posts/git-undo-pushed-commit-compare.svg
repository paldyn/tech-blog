<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="upArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">이미 푸쉬한 커밋: revert vs reset --force</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">공유 브랜치에서는 히스토리를 지우지 않는 쪽이 안전하다</text>

  <!-- revert side -->
  <rect x="60" y="105" width="370" height="240" rx="10" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="135" font-size="16" font-weight="600" fill="#55c555">revert (권장)</text>
  <text x="80" y="172" font-size="13" fill="#ffffff">A — B — C 위에</text>
  <text x="80" y="196" font-size="13" fill="#ffffff">C를 취소하는 C' 추가</text>
  <circle cx="110" cy="240" r="9" fill="#7ec8e3"/><text x="103" y="245" font-size="11" fill="#0a0a0a">A</text>
  <circle cx="170" cy="240" r="9" fill="#7ec8e3"/><text x="163" y="245" font-size="11" fill="#0a0a0a">B</text>
  <circle cx="230" cy="240" r="9" fill="#7ec8e3"/><text x="223" y="245" font-size="11" fill="#0a0a0a">C</text>
  <circle cx="290" cy="240" r="9" fill="#55c555"/><text x="280" y="245" font-size="11" fill="#0a0a0a">C'</text>
  <line x1="119" y1="240" x2="161" y2="240" stroke="#888" stroke-width="2"/>
  <line x1="179" y1="240" x2="221" y2="240" stroke="#888" stroke-width="2"/>
  <line x1="239" y1="240" x2="281" y2="240" stroke="#888" stroke-width="2"/>
  <text x="80" y="295" font-size="13" fill="#55c555">협업자 히스토리 안 깨짐</text>
  <text x="80" y="320" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#7ec8e3">git revert C</text>

  <!-- reset force side -->
  <rect x="450" y="105" width="370" height="240" rx="10" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="135" font-size="16" font-weight="600" fill="#e05555">reset + force (위험)</text>
  <text x="470" y="172" font-size="13" fill="#ffffff">C를 통째로 잘라내고</text>
  <text x="470" y="196" font-size="13" fill="#ffffff">강제로 덮어쓴다</text>
  <circle cx="500" cy="240" r="9" fill="#7ec8e3"/><text x="493" y="245" font-size="11" fill="#0a0a0a">A</text>
  <circle cx="560" cy="240" r="9" fill="#7ec8e3"/><text x="553" y="245" font-size="11" fill="#0a0a0a">B</text>
  <circle cx="620" cy="240" r="9" fill="#e05555" opacity="0.4"/><text x="613" y="245" font-size="11" fill="#0a0a0a">C</text>
  <line x1="509" y1="240" x2="551" y2="240" stroke="#888" stroke-width="2"/>
  <line x1="569" y1="240" x2="611" y2="240" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="470" y="295" font-size="13" fill="#e05555">남의 clone과 충돌·유실 위험</text>
  <text x="470" y="320" font-size="12" font-family="'JetBrains Mono','Menlo',monospace" fill="#e05555">push --force-with-lease</text>

  <text x="60" y="370" font-size="13" fill="#888">혼자 쓰는 브랜치가 아니라면 revert를 기본으로 삼는다</text>
</svg>
