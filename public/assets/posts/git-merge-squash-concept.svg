<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Squash Merge 동작 원리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">브랜치의 모든 커밋을 하나로 압축하여 main에 추가</text>

  <!-- Before: feature branch -->
  <text x="100" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">병합 전</text>

  <!-- main commits -->
  <circle cx="100" cy="160" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C1</text>

  <circle cx="180" cy="160" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C2</text>

  <!-- main label -->
  <rect x="152" y="192" width="56" height="22" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">main</text>
  <line x1="180" y1="192" x2="180" y2="182" stroke="#7777cc" stroke-width="1.5"/>

  <!-- feature commits branching off C1 -->
  <circle cx="260" cy="100" r="22" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="260" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">F1</text>
  <text x="260" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">WIP</text>

  <circle cx="360" cy="100" r="22" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="360" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">F2</text>
  <text x="360" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">fix typo</text>

  <circle cx="460" cy="100" r="22" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="460" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">F3</text>
  <text x="460" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">완성</text>

  <!-- feature label -->
  <rect x="418" y="54" width="84" height="22" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="460" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">feature</text>
  <line x1="460" y1="78" x2="460" y2="78" stroke="#55c555" stroke-width="1.5"/>

  <!-- Arrows -->
  <line x1="122" y1="160" x2="156" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="156,155 166,160 156,165" fill="#555"/>
  <line x1="120" y1="148" x2="238" y2="112" stroke="#555" stroke-width="2"/>
  <polygon points="232,107 242,112 234,120" fill="#555"/>
  <line x1="282" y1="100" x2="336" y2="100" stroke="#55c555" stroke-width="2"/>
  <polygon points="336,95 346,100 336,105" fill="#55c555"/>
  <line x1="382" y1="100" x2="436" y2="100" stroke="#55c555" stroke-width="2"/>
  <polygon points="436,95 446,100 436,105" fill="#55c555"/>

  <!-- Arrow pointing down for squash -->
  <line x1="440" y1="260" x2="440" y2="295" stroke="#e8e8e8" stroke-width="2"/>
  <polygon points="433,295 440,310 447,295" fill="#e8e8e8"/>

  <rect x="330" y="228" width="220" height="30" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">git merge --squash feature</text>

  <!-- After: squash commit -->
  <text x="100" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">병합 후</text>

  <circle cx="100" cy="385" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C1</text>

  <circle cx="200" cy="385" r="22" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C2</text>

  <circle cx="340" cy="385" r="26" fill="#1a1a0a" stroke="#e0aa55" stroke-width="2.5"/>
  <text x="340" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0aa55">S3</text>
  <text x="340" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">squash</text>

  <line x1="122" y1="385" x2="176" y2="385" stroke="#555" stroke-width="2"/>
  <polygon points="176,380 186,385 176,390" fill="#555"/>
  <line x1="222" y1="385" x2="312" y2="385" stroke="#555" stroke-width="2"/>
  <polygon points="312,380 322,385 312,390" fill="#555"/>

  <!-- Note: single parent -->
  <text x="340" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">부모 1개 (C2)</text>

  <!-- Note right side -->
  <text x="640" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0aa55">F1+F2+F3 변경사항이</text>
  <text x="640" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0aa55">하나의 스테이지에 모임</text>
  <text x="640" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">git commit -m "..." 으로 완성</text>
</svg>
