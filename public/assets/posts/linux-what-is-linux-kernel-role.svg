<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커널이 하는 일</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">4가지 핵심 역할</text>

  <!-- Box 1: 프로세스 관리 -->
  <rect x="60" y="100" width="360" height="120" fill="#0d1a2a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">프로세스 관리</text>
  <text x="240" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">프로세스 생성 · 종료 · 스케줄링</text>
  <text x="240" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">CPU 시간 분배 — 멀티태스킹 구현</text>
  <text x="240" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">시그널 · IPC (파이프, 소켓, 공유메모리)</text>

  <!-- Box 2: 메모리 관리 -->
  <rect x="460" y="100" width="360" height="120" fill="#0d1f0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">메모리 관리</text>
  <text x="640" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">가상 메모리 · 페이지 테이블 관리</text>
  <text x="640" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">프로세스 격리 — 서로의 메모리 침범 불가</text>
  <text x="640" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">스왑 · OOM Killer · 메모리 매핑</text>

  <!-- Box 3: 파일시스템 -->
  <rect x="60" y="260" width="360" height="120" fill="#1c1a0d" rx="8" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="240" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8c55a" text-anchor="middle">파일시스템 · 스토리지</text>
  <text x="240" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">VFS (가상 파일시스템) 추상화 계층</text>
  <text x="240" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">ext4 / xfs / btrfs / tmpfs 등 지원</text>
  <text x="240" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">블록 I/O 스케줄러 · 버퍼 캐시</text>

  <!-- Box 4: 네트워크 &amp; 드라이버 -->
  <rect x="460" y="260" width="360" height="120" fill="#1a0d1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">네트워크 · 디바이스 드라이버</text>
  <text x="640" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">TCP/IP 스택 · 넷필터 · 소켓 API</text>
  <text x="640" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">USB · PCI · 블록 · 문자 드라이버</text>
  <text x="640" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">커널 모듈로 동적 로드 · 언로드 가능</text>

  <!-- Center label -->
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666" text-anchor="middle">커널은 유저 공간과 하드웨어 사이의 신뢰받는 중개자 (Ring 0에서 실행)</text>
</svg>
