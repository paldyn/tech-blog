<svg width="880" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">접근 제어: public vs private</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888"># 접두사가 강제하는 캡슐화</text>

  <!-- Left: Class interior box -->
  <rect x="60" y="100" width="360" height="280" rx="8" fill="#0f0f15" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">클래스 내부</text>

  <!-- Private field row -->
  <rect x="76" y="140" width="328" height="46" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">#balance = 0</text>
  <text x="92" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">프라이빗 — 클래스 내부에서만 접근</text>

  <!-- Public method row -->
  <rect x="76" y="198" width="328" height="46" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="92" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">deposit(amount)</text>
  <text x="92" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">퍼블릭 메서드 — 내부에서 #balance 접근</text>

  <!-- Getter row -->
  <rect x="76" y="256" width="328" height="46" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="92" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">get balance()</text>
  <text x="92" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">퍼블릭 getter — #balance 읽기 전용 노출</text>

  <!-- Divider -->
  <line x1="460" y1="110" x2="460" y2="370" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Right: Access table -->
  <text x="520" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">접근 위치별 가능 여부</text>

  <!-- Table header -->
  <rect x="480" y="140" width="360" height="32" rx="4" fill="#1a1a2e"/>
  <text x="560" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">위치</text>
  <text x="700" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">#balance</text>
  <text x="796" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">balance</text>

  <!-- Table rows -->
  <line x1="480" y1="172" x2="840" y2="172" stroke="#1e2030" stroke-width="1"/>
  <text x="496" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클래스 내부 메서드</text>
  <text x="700" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓</text>
  <text x="796" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓</text>

  <line x1="480" y1="204" x2="840" y2="204" stroke="#1e2030" stroke-width="1"/>
  <text x="496" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서브클래스 메서드</text>
  <text x="700" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">✗</text>
  <text x="796" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓</text>

  <line x1="480" y1="236" x2="840" y2="236" stroke="#1e2030" stroke-width="1"/>
  <text x="496" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클래스 외부 코드</text>
  <text x="700" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">✗</text>
  <text x="796" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓</text>

  <!-- Note box -->
  <rect x="480" y="280" width="360" height="60" rx="6" fill="#1a1400" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="660" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle"># 는 문법적 강제 — 런타임 오류 발생</text>
  <text x="660" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">obj.#field → SyntaxError (외부에서 시도 시)</text>

  <!-- Footer -->
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
