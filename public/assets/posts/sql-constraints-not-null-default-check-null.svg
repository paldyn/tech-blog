<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NULL의 의미와 3값 논리</text>

  <!-- NULL meaning -->
  <rect x="60" y="72" width="380" height="130" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="250" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">NULL = "알 수 없음" (Unknown)</text>
  <text x="78" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NULL은 0도 아니고, 빈 문자열도 아닙니다.</text>
  <text x="78" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전화번호가 NULL = "번호를 모름"</text>
  <text x="78" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전화번호가 '' = "번호가 없음을 알고 있음"</text>
  <text x="78" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">NULL 비교는 항상 = 대신 IS NULL / IS NOT NULL 사용</text>

  <!-- 3-value logic -->
  <rect x="480" y="72" width="360" height="130" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="660" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">3값 논리 (TRUE / FALSE / UNKNOWN)</text>
  <text x="498" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NULL = NULL → UNKNOWN (TRUE 아님!)</text>
  <text x="498" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NULL &gt; 100 → UNKNOWN</text>
  <text x="498" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">WHERE 조건: UNKNOWN → 행 제외됨</text>
  <text x="498" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">→ WHERE age = NULL은 항상 0건 반환!</text>

  <!-- Code block -->
  <rect x="60" y="222" width="760" height="110" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- NULL 처리 올바른 패턴</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">SELECT</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">        * </text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">          FROM</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">               employees</text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">WHERE</text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">     resign_date </text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">                  IS NULL</text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">                          ; -- 재직 중인 직원</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- WHERE resign_date = NULL  ← 이건 항상 0건!</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff"> </text>
</svg>
