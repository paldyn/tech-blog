<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">split → apply → combine</text>

  <defs>
    <marker id="gbar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="130" y="96" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">1. split</text>
  <rect x="60" y="110" width="140" height="44" rx="4" fill="#000000" stroke="#7777cc"/>
  <text x="130" y="138" font-size="13" fill="#9aa4b8" text-anchor="middle">A · A · B · B · A</text>
  <text x="130" y="174" font-size="12" fill="#888" text-anchor="middle">key별로 그룹 분리</text>
  <rect x="60" y="190" width="140" height="36" rx="4" fill="#0f1320" stroke="#3a4a6e"/>
  <text x="130" y="213" font-size="13" fill="#7ec8e3" text-anchor="middle">그룹 A · 그룹 B</text>

  <line x1="210" y1="170" x2="266" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#gbar)"/>

  <text x="370" y="96" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">2. apply</text>
  <rect x="270" y="110" width="200" height="44" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="370" y="138" font-size="13" fill="#9aa4b8" text-anchor="middle">각 그룹에 함수 적용</text>
  <rect x="270" y="166" width="200" height="60" rx="4" fill="#0f1320" stroke="#3a4a6e"/>
  <text x="370" y="190" font-size="13" fill="#7ec8e3" text-anchor="middle">A → mean = 12</text>
  <text x="370" y="212" font-size="13" fill="#7ec8e3" text-anchor="middle">B → mean = 30</text>

  <line x1="480" y1="170" x2="536" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#gbar)"/>

  <text x="690" y="96" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">3. combine</text>
  <rect x="540" y="110" width="280" height="116" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="138" font-size="13" fill="#9aa4b8">결과를 하나의 표로 합침</text>
  <text x="560" y="170" font-size="14" fill="#55c555">A    12</text>
  <text x="560" y="196" font-size="14" fill="#55c555">B    30</text>

  <rect x="60" y="262" width="760" height="44" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="290" font-size="14" fill="#55c555" text-anchor="middle">groupby는 이 세 단계를 한 줄로 압축한다 — 직접 루프 돌 필요 없음</text>
</svg>
