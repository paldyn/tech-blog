<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">비용 기반 옵티마이저(CBO) 작동 흐름</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">SQL 파싱 → 후보 플랜 생성 → 비용 추정 → 최적 플랜 선택</text>

  <!-- Step 1: SQL -->
  <rect x="60" y="100" width="140" height="60" fill="#0d1520" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">SQL 입력</text>
  <text x="130" y="148" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">SELECT ... WHERE</text>

  <!-- Arrow 1 -->
  <polygon points="224,130 206,122 206,138" fill="#555"/>
  <line x1="200" y1="130" x2="222" y2="130" stroke="#555" stroke-width="2"/>

  <!-- Step 2: Parse + Rewrite -->
  <rect x="224" y="100" width="140" height="60" fill="#0d1520" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="294" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">파싱·재작성</text>
  <text x="294" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구문 분석</text>
  <text x="294" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">View 펼치기</text>

  <!-- Arrow 2 -->
  <polygon points="388,130 370,122 370,138" fill="#555"/>
  <line x1="364" y1="130" x2="386" y2="130" stroke="#555" stroke-width="2"/>

  <!-- Step 3: Plan generation -->
  <rect x="388" y="100" width="140" height="60" fill="#0d1520" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="458" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">후보 플랜 생성</text>
  <text x="458" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">조인 순서</text>
  <text x="458" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인덱스 조합</text>

  <!-- Arrow 3 -->
  <polygon points="552,130 534,122 534,138" fill="#555"/>
  <line x1="528" y1="130" x2="550" y2="130" stroke="#555" stroke-width="2"/>

  <!-- Step 4: Cost estimation -->
  <rect x="552" y="100" width="140" height="60" fill="#0d1520" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="622" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">비용 추정</text>
  <text x="622" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">통계 + I/O 모델</text>
  <text x="622" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CPU + 메모리</text>

  <!-- Arrow 4 -->
  <polygon points="716,130 698,122 698,138" fill="#555"/>
  <line x1="692" y1="130" x2="714" y2="130" stroke="#555" stroke-width="2"/>

  <!-- Step 5: Best plan -->
  <rect x="716" y="100" width="104" height="60" fill="#0e1a0e" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="768" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">최적 플랜</text>
  <text x="768" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">최저 비용</text>
  <text x="768" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">선택</text>

  <!-- Statistics box -->
  <rect x="460" y="210" width="260" height="130" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="590" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">옵티마이저 입력 통계</text>
  <text x="480" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 테이블 행 수 (row count)</text>
  <text x="480" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 컬럼별 고유값 수 (NDV)</text>
  <text x="480" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 히스토그램 (값 분포)</text>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 인덱스 깊이·페이지 수</text>

  <!-- Arrow from stats to cost -->
  <line x1="590" y1="210" x2="622" y2="162" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="622,162 616,175 628,175" fill="#7777cc"/>

  <!-- Cost formula -->
  <rect x="60" y="210" width="360" height="130" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="240" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">비용 추정 요소</text>

  <rect x="80" y="248" width="320" height="80" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="96" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 단순화된 비용 공식</text>
  <text x="96" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cost = seq_page_cost * pages</text>
  <text x="96" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     + cpu_tuple_cost * rows</text>
  <text x="96" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     + random_page_cost * …</text>

  <!-- Plan examples -->
  <rect x="60" y="370" width="760" height="100" fill="#111" rx="8" stroke="#333"/>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">플랜 비교 예시</text>

  <rect x="80" y="402" width="200" height="50" fill="#0d1520" rx="6" stroke="#7ec8e3"/>
  <text x="180" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Plan A: Index Scan</text>
  <text x="180" y="440" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">cost=0.43..12.45</text>

  <rect x="310" y="402" width="200" height="50" fill="#1a1010" rx="6" stroke="#e05555"/>
  <text x="410" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Plan B: Seq Scan</text>
  <text x="410" y="440" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">cost=0.00..3245.00</text>

  <rect x="540" y="402" width="200" height="50" fill="#0e1a0e" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">선택: Plan A (최저 비용)</text>
  <text x="640" y="440" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">→ 실행</text>
</svg>
