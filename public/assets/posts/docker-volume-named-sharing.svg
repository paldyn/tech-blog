<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Named Volume — 여러 컨테이너 공유</text>

  <!-- Container A -->
  <rect x="60" y="80" width="200" height="100" fill="#1a1a2e" rx="8" stroke="#3a3a5e" stroke-width="1.5"/>
  <text x="160" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">컨테이너 A</text>
  <text x="160" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">app-writer</text>
  <text x="160" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">/data → 쓰기</text>

  <!-- Container B -->
  <rect x="60" y="210" width="200" height="100" fill="#1a1a2e" rx="8" stroke="#3a3a5e" stroke-width="1.5"/>
  <text x="160" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">컨테이너 B</text>
  <text x="160" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">app-reader</text>
  <text x="160" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">/data → 읽기</text>

  <!-- Arrows to volume -->
  <line x1="260" y1="130" x2="340" y2="196" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="344,200 332,192 342,184" fill="#7ec8e3"/>

  <line x1="260" y1="260" x2="340" y2="218" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="344,214 332,222 342,230" fill="#7ec8e3"/>

  <!-- Named Volume -->
  <rect x="344" y="166" width="200" height="80" fill="#0f1f2e" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="444" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">shared-data</text>
  <text x="444" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Named Volume</text>

  <!-- Arrow from volume to storage -->
  <line x1="544" y1="206" x2="620" y2="206" stroke="#55c555" stroke-width="2"/>
  <polygon points="628,206 616,200 616,212" fill="#55c555"/>

  <!-- Host storage -->
  <rect x="628" y="168" width="190" height="76" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="723" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">호스트 스토리지</text>
  <text x="723" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">/var/lib/docker/volumes/</text>
  <text x="723" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">shared-data/_data</text>

  <!-- Note -->
  <rect x="60" y="330" width="760" height="0" fill="none"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">여러 컨테이너가 같은 Named Volume 마운트 가능 — 동시 쓰기 시 애플리케이션 레벨 잠금 필요</text>
</svg>
