  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle" xml:space="preserve">핵심 원칙</text>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">이미지는 작고(최소 레이어), 안전하고(비루트, 취약점 스캔),</text>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">빠르게 빌드되고(캐시 최적화), 예측 가능해야 한다(태그 고정)</text>
