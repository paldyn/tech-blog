<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">next/image 최적화 파이프라인</text>

  <!-- Original image -->
  <rect x="60" y="80" width="140" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">원본 이미지</text>
  <text x="130" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">4K PNG 8MB</text>

  <line x1="200" y1="110" x2="258" y2="110" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Next.js Image optimizer -->
  <rect x="260" y="80" width="200" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="360" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Next.js Image</text>
  <text x="360" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Optimizer (Sharp)</text>
  <text x="360" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">리사이즈 · 포맷 변환 · 캐시</text>

  <line x1="460" y1="110" x2="518" y2="110" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Optimized result -->
  <rect x="520" y="80" width="300" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">최적화된 이미지</text>
  <text x="670" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">디바이스 크기 WebP/AVIF · 용량 90% 감소</text>
  <text x="670" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">CDN 캐시 · Lazy load · CLS 방지</text>

  <!-- Features grid -->
  <text x="440" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">next/image 핵심 기능</text>

  <!-- Feature cards -->
  <rect x="60" y="190" width="180" height="90" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">자동 포맷 변환</text>
  <text x="150" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">WebP / AVIF 지원 브라우저엔</text>
  <text x="150" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">자동 변환, 구형 브라우저는</text>
  <text x="150" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">원본 포맷으로 폴백</text>

  <rect x="260" y="190" width="180" height="90" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="350" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">반응형 srcset</text>
  <text x="350" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">화면 크기별 최적 이미지</text>
  <text x="350" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">자동 생성 — 640w, 750w,</text>
  <text x="350" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">1080w, 1920w 등</text>

  <rect x="460" y="190" width="180" height="90" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="550" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Lazy Loading</text>
  <text x="550" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본값 lazy — 뷰포트 진입</text>
  <text x="550" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">시 로드 / LCP 이미지엔</text>
  <text x="550" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">priority 필수</text>

  <rect x="660" y="190" width="160" height="90" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="740" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">CLS 방지</text>
  <text x="740" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">width/height 설정으로</text>
  <text x="740" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">레이아웃 시프트 방지</text>
  <text x="740" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">자동 aspect-ratio</text>

  <!-- Props table -->
  <rect x="60" y="298" width="760" height="170" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Image </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ce9178"> 'next/image'</tspan></text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff"> </text>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Image</tspan></text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  src=</tspan><tspan fill="#ce9178">"/hero.webp"</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">// 로컬 또는 원격 URL</tspan></text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  alt=</tspan><tspan fill="#ce9178">"히어로 이미지"</tspan><tspan fill="#ffffff">  width=</tspan><tspan fill="#b5cea8">&#123;1200&#125;</tspan><tspan fill="#ffffff">  height=</tspan><tspan fill="#b5cea8">&#123;630&#125;</tspan></text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  priority  </tspan><tspan fill="#9aa4b8">// LCP 이미지 — preload 생성됨</tspan></text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  sizes=</tspan><tspan fill="#ce9178">"(max-width: 768px) 100vw, 50vw"</tspan></text>
  <text x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">/&gt;</tspan></text>

  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">일반 &lt;img&gt; 대신 next/image 사용 필수 — Next.js의 이미지 경고(next/no-img-element)는 이 때문</text>
</svg>
