<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">캐시 저장 흐름</text>
    <!-- Three entities -->
    <rect x="60" y="80" width="160" height="54" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="140" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">브라우저</text>
    <text x="140" y="122" text-anchor="middle" font-size="11" fill="#888">브라우저 캐시</text>
    <rect x="360" y="80" width="160" height="54" rx="8" fill="#2a2a0f" stroke="#aaaa3a" stroke-width="1.5"/>
    <text x="440" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#dddd55">CDN 캐시</text>
    <text x="440" y="122" text-anchor="middle" font-size="11" fill="#888">공유 캐시 (중간)</text>
    <rect x="660" y="80" width="160" height="54" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="740" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">원본 서버</text>
    <text x="740" y="122" text-anchor="middle" font-size="11" fill="#888">Origin Server</text>
    <!-- Arrow 1: Browser → CDN (cache miss) -->
    <line x1="220" y1="107" x2="360" y2="107" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="290" y="99" text-anchor="middle" font-size="10" fill="#7ec8e3">캐시 미스</text>
    <!-- Arrow 2: CDN → Origin (cache miss) -->
    <line x1="520" y1="107" x2="660" y2="107" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="590" y="99" text-anchor="middle" font-size="10" fill="#7ec8e3">캐시 미스</text>
    <!-- Arrow 3: Origin → CDN (response with cache headers) -->
    <line x1="660" y1="122" x2="520" y2="122" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
    <text x="590" y="140" text-anchor="middle" font-size="10" fill="#55c555">Cache-Control: public, max-age=300</text>
    <!-- Arrow 4: CDN → Browser (cached response) -->
    <line x1="360" y1="122" x2="220" y2="122" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
    <text x="290" y="140" text-anchor="middle" font-size="10" fill="#55c555">응답 저장 + 전달</text>
    <!-- Arrow 5: Browser → CDN (cache hit) -->
    <line x1="220" y1="175" x2="360" y2="175" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="290" y="167" text-anchor="middle" font-size="10" fill="#7ec8e3">다음 요청</text>
    <!-- CDN serves from cache -->
    <line x1="360" y1="190" x2="220" y2="190" stroke="#dddd55" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="290" y="208" text-anchor="middle" font-size="10" fill="#dddd55">캐시 히트 (서버 미요청)</text>
    <!-- Decision matrix -->
    <rect x="60" y="230" width="760" height="160" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
    <text x="440" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Cache-Control 조합별 캐싱 동작</text>
    <text x="80" y="278" font-size="12" fill="#e8e8e8">public, max-age=3600</text>
    <text x="440" y="278" text-anchor="middle" font-size="11" fill="#55c555">CDN + 브라우저 모두 1시간 캐시</text>
    <text x="80" y="302" font-size="12" fill="#e8e8e8">private, max-age=3600</text>
    <text x="440" y="302" text-anchor="middle" font-size="11" fill="#7ec8e3">브라우저만 1시간 캐시 (CDN 저장 불가)</text>
    <text x="80" y="326" font-size="12" fill="#e8e8e8">no-cache</text>
    <text x="440" y="326" text-anchor="middle" font-size="11" fill="#dd9955">저장은 하되 매번 서버에 재검증</text>
    <text x="80" y="350" font-size="12" fill="#e8e8e8">no-store</text>
    <text x="440" y="350" text-anchor="middle" font-size="11" fill="#e05555">어떤 캐시에도 저장 금지</text>
    <text x="80" y="374" font-size="12" fill="#e8e8e8">immutable, max-age=31536000</text>
    <text x="440" y="374" text-anchor="middle" font-size="11" fill="#9999ee">1년 캐시, 재검증 생략 (불변 파일)</text>
    <text x="440" y="406" text-anchor="middle" font-size="11" fill="#555">s-maxage: CDN용 TTL 별도 지정 (max-age보다 CDN에서 우선)</text>
  </g>
</svg>
