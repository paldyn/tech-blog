<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pgrep · pkill 주요 옵션</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">필터 옵션과 실전 활용 패턴</text>

  <!-- Left: pgrep options -->
  <rect x="50" y="86" width="370" height="310" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">pgrep 옵션</text>
  <line x1="66" y1="118" x2="414" y2="118" stroke="#3a4a6e" stroke-width="1"/>

  <text x="66" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 이름(comm) 정확 매칭</text>
  <text x="66" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pgrep -x bash</text>

  <text x="66" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 전체 커맨드라인 매칭(-f)</text>
  <text x="66" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pgrep -f "gunicorn.*8080"</text>

  <text x="66" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 가장 최근 프로세스 1개만</text>
  <text x="66" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pgrep -n nginx     # newest</text>
  <text x="66" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pgrep -o nginx     # oldest</text>

  <text x="66" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 사용자 + 이름</text>
  <text x="66" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pgrep -u www-data -a nginx</text>

  <text x="66" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 부모 PID로 필터</text>
  <text x="66" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pgrep -P 1204      # 자식만</text>

  <text x="66" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 종료 코드: 0=찾음, 1=없음</text>

  <!-- Right: pkill options + patterns -->
  <rect x="460" y="86" width="370" height="310" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">pkill 옵션 + 실전 패턴</text>
  <line x1="476" y1="118" x2="814" y2="118" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 시그널 지정</text>
  <text x="476" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pkill -HUP nginx    # 설정 리로드</text>
  <text x="476" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pkill -9 zombie_app</text>

  <text x="476" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 사용자의 프로세스만</text>
  <text x="476" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pkill -u alice python</text>

  <text x="476" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 커맨드라인 패턴 매칭</text>
  <text x="476" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pkill -f "celery worker"</text>

  <text x="476" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># dry run(-e): 죽이지 않고 출력만</text>
  <text x="476" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pkill -e -f "python app"</text>

  <text x="476" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 프로세스 그룹에 전송</text>
  <text x="476" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pkill -g $(pgrep -o nginx)</text>

  <text x="476" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 종료 코드: 0=신호보냄, 1=없음</text>
</svg>
