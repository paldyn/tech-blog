<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">자원 × 결정성으로 클래스를 가른다</text>

  <!-- header row -->
  <text x="130" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" font-weight="600">자원/모드</text>
  <text x="360" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">결정적</text>
  <text x="600" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">비결정적</text>

  <!-- row 1: poly time -->
  <rect x="60" y="116" width="160" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">다항 시간</text>
  <rect x="240" y="116" width="240" height="56" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="360" y="142" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555" font-weight="600">P</text>
  <text x="360" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정렬·최단경로</text>
  <rect x="500" y="116" width="240" height="56" rx="6" fill="#000000" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="620" y="142" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" font-weight="600">NP</text>
  <text x="620" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SAT·TSP</text>

  <!-- row 2: poly space -->
  <rect x="60" y="184" width="160" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">다항 공간</text>
  <rect x="240" y="184" width="500" height="56" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1.5"/>
  <text x="490" y="210" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7777cc" font-weight="600">PSPACE = NPSPACE</text>
  <text x="490" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사비치 정리로 결정·비결정 동일</text>

  <!-- row 3: exp time -->
  <rect x="60" y="252" width="160" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="286" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">지수 시간</text>
  <rect x="240" y="252" width="240" height="56" rx="6" fill="#000000" stroke="#e8a855" stroke-width="1.5"/>
  <text x="360" y="278" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8a855" font-weight="600">EXPTIME</text>
  <text x="360" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일반 게임 최적수</text>
  <rect x="500" y="252" width="240" height="56" rx="6" fill="#000000" stroke="#e8a855" stroke-width="1.5"/>
  <text x="620" y="278" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8a855" font-weight="600">NEXPTIME</text>
  <text x="620" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"></text>

  <!-- co-NP note -->
  <rect x="60" y="328" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">co-NP</tspan><tspan fill="#ffffff"> : "아니오" 답을 검증 가능 — NP=co-NP 여부도 미해결 (예: 소수 판정의 양면)</tspan></text>

  <text x="60" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">시간보다 공간이 더 재사용 가능한 자원 — 같은 칸을 여러 번 덮어쓸 수 있다</text>
</svg>
