<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">스케줄러 노드 선택 알고리즘</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Filtering → Scoring → Binding 3단계</text>

  <!-- All nodes -->
  <rect x="60" y="96" width="760" height="80" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">전체 노드 후보</text>
  <rect x="80" y="128" width="100" height="36" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Node A</text>
  <rect x="196" y="128" width="100" height="36" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="246" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Node B</text>
  <rect x="312" y="128" width="100" height="36" rx="4" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="362" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Node C</text>
  <rect x="428" y="128" width="100" height="36" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="478" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Node D</text>
  <rect x="544" y="128" width="100" height="36" rx="4" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="594" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Node E</text>
  <rect x="660" y="128" width="100" height="36" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Node F</text>

  <!-- Step 1: Filtering -->
  <line x1="440" y1="178" x2="440" y2="202" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="204" width="760" height="100" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">1단계: Filtering</text>
  <text x="130" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">불가능한 노드 제거</text>
  <text x="480" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">필터 조건:</text>
  <text x="480" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· NodeSelector / NodeAffinity 불일치</text>
  <text x="480" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 자원(CPU/MEM) 부족 · Taint 불일치</text>
  <text x="480" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 볼륨 마운트 불가</text>
  <!-- Filtered out nodes with X -->
  <text x="362" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#e05555">✗ C</text>
  <text x="594" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#e05555">✗ E</text>

  <!-- After filter: A, B, D, F -->
  <line x1="440" y1="306" x2="440" y2="330" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="332" width="760" height="100" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">2단계: Scoring</text>
  <text x="130" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">남은 노드에 점수 부여</text>
  <text x="350" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Node A: 72점</text>
  <text x="350" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Node B: 85점</text>
  <text x="350" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Node D: 61점</text>
  <text x="350" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Node F: 79점</text>
  <text x="580" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스코어 기준:</text>
  <text x="580" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 자원 균형 (LeastRequestedPriority)</text>
  <text x="580" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 이미지 캐시 (ImageLocalityPriority)</text>
  <text x="580" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· Affinity 가중치</text>

  <!-- Winner -->
  <line x1="440" y1="434" x2="440" y2="458" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="330" y="460" width="220" height="30" rx="8" fill="#1a400d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Node B 선택 → Binding</text>
</svg>
