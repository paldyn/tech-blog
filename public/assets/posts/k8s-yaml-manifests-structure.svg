<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Kubernetes YAML 매니페스트 구조</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">모든 K8s 오브젝트에 공통인 4가지 최상위 필드</text>

  <!-- 4 fields -->
  <rect x="60" y="100" width="360" height="70" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="90" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">apiVersion</text>
  <text x="90" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">오브젝트가 속한 API 그룹 버전</text>
  <text x="90" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#6b7280">예: v1, apps/v1, batch/v1, networking.k8s.io/v1</text>

  <rect x="460" y="100" width="360" height="70" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="490" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">kind</text>
  <text x="490" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">오브젝트 종류</text>
  <text x="490" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#6b7280">예: Pod, Deployment, Service, ConfigMap</text>

  <rect x="60" y="200" width="360" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="90" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">metadata</text>
  <text x="90" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">오브젝트 식별 정보</text>
  <text x="90" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#6b7280">name, namespace, labels, annotations</text>
  <text x="90" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280">uid (시스템 자동 생성), resourceVersion, creationTimestamp</text>

  <rect x="460" y="200" width="360" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="490" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">spec</text>
  <text x="490" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">원하는 상태 (Desired State) 정의</text>
  <text x="490" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#6b7280">오브젝트 종류마다 다름</text>
  <text x="490" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280">사용자가 가장 많이 작성하는 필드</text>

  <!-- Status -->
  <rect x="260" y="320" width="360" height="60" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">status (시스템 관리, 직접 수정 X)</text>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#6b7280" text-anchor="middle">현재 상태. K8s가 자동으로 업데이트. YAML에 작성해도 무시됨</text>

  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#6b7280" text-anchor="middle">spec &#x2260; status : 이 차이를 조정하는 것이 Controller의 역할 (Control Loop)</text>
</svg>
