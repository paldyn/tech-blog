<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">K8s YAML 매니페스트 구조</text>

  <!-- Left: Code block -->
  <rect x="60" y="68" width="440" height="400" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="96" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">apiVersion</text>
  <text x="162" y="96" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: apps/v1</text>
  <text x="76" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">kind</text>
  <text x="116" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: Deployment</text>
  <text x="76" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">metadata</text>
  <text x="152" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  </text>
  <text x="90" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">name</text>
  <text x="128" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: nginx-deploy</text>
  <text x="76" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  </text>
  <text x="90" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">namespace</text>
  <text x="178" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: default</text>
  <text x="76" y="204" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  </text>
  <text x="90" y="204" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">labels</text>
  <text x="146" y="204" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="224" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    app: nginx</text>
  <text x="76" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">spec</text>
  <text x="114" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  </text>
  <text x="90" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">replicas</text>
  <text x="158" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">3</text>
  <text x="76" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  selector:</text>
  <text x="76" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    matchLabels: {app: nginx}</text>
  <text x="76" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  template:</text>
  <text x="76" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    metadata: {labels: {app: nginx}}</text>
  <text x="76" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    spec:</text>
  <text x="76" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      containers:</text>
  <text x="76" y="412" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      - name: nginx</text>
  <text x="76" y="432" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        image: </text>
  <text x="152" y="432" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">nginx:1.27</text>
  <text x="76" y="452" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        ports: [{containerPort: </text>
  <text x="297" y="452" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">80</text>
  <text x="307" y="452" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}]</text>

  <!-- Right: Annotation boxes -->
  <!-- apiVersion annotation -->
  <rect x="540" y="80" width="300" height="56" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="690" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">apiVersion</text>
  <text x="690" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리소스 API 그룹과 버전</text>
  <line x1="500" y1="96" x2="540" y2="96" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- kind annotation -->
  <rect x="540" y="152" width="300" height="56" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="690" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">kind</text>
  <text x="690" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리소스 타입 (대문자 CamelCase)</text>
  <line x1="500" y1="116" x2="540" y2="168" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- metadata annotation -->
  <rect x="540" y="224" width="300" height="72" rx="6" fill="#0d2d0d" stroke="#55c555" stroke-width="1"/>
  <text x="690" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">metadata</text>
  <text x="690" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이름, 네임스페이스, 레이블,</text>
  <text x="690" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">어노테이션 등 식별 정보</text>
  <line x1="500" y1="144" x2="540" y2="260" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- spec annotation -->
  <rect x="540" y="316" width="300" height="72" rx="6" fill="#1e1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">spec</text>
  <text x="690" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원하는 상태 (desired state)</text>
  <text x="690" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리소스 타입마다 구조가 다름</text>
  <line x1="500" y1="252" x2="540" y2="352" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- status note -->
  <rect x="540" y="406" width="300" height="44" rx="6" fill="#2d1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="690" y="426" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">status: K8s가 자동 관리</text>
  <text x="690" y="442" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">직접 수정 불가 (읽기 전용)</text>
</svg>
