<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">OWASP Top 10 (2021)</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">가장 위험한 10가지 웹 애플리케이션 보안 위험</text>

  <!-- Left column: A01~A05 -->
  <!-- A01 -->
  <rect x="60" y="96" width="370" height="52" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">A01</text>
  <text x="124" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff">손상된 접근 제어</text>
  <text x="84" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Broken Access Control — IDOR, 권한 우회</text>

  <!-- A02 -->
  <rect x="60" y="158" width="370" height="52" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">A02</text>
  <text x="124" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff">암호화 실패</text>
  <text x="84" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Cryptographic Failures — 평문 전송, 약한 암호화</text>

  <!-- A03 -->
  <rect x="60" y="220" width="370" height="52" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">A03</text>
  <text x="124" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff">인젝션</text>
  <text x="84" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Injection — SQL, XSS, Command, Template</text>

  <!-- A04 -->
  <rect x="60" y="282" width="370" height="52" rx="8" fill="#1a1a0f" stroke="#e0a055" stroke-width="1.5"/>
  <text x="84" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e0a055">A04</text>
  <text x="124" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff">안전하지 않은 설계</text>
  <text x="84" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Insecure Design — 위협 모델링 부재</text>

  <!-- A05 -->
  <rect x="60" y="344" width="370" height="52" rx="8" fill="#1a1a0f" stroke="#e0a055" stroke-width="1.5"/>
  <text x="84" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e0a055">A05</text>
  <text x="124" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff">보안 설정 오류</text>
  <text x="84" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Security Misconfiguration — 기본값, 불필요 기능</text>

  <!-- Right column: A06~A10 -->
  <!-- A06 -->
  <rect x="450" y="96" width="370" height="52" rx="8" fill="#1a1a0f" stroke="#e0a055" stroke-width="1.5"/>
  <text x="474" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e0a055">A06</text>
  <text x="514" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff">취약하고 오래된 컴포넌트</text>
  <text x="474" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Vulnerable Components — 의존성 관리 부재</text>

  <!-- A07 -->
  <rect x="450" y="158" width="370" height="52" rx="8" fill="#1a1a0f" stroke="#e0a055" stroke-width="1.5"/>
  <text x="474" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e0a055">A07</text>
  <text x="514" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff">식별 및 인증 실패</text>
  <text x="474" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Identification Failures — 세션 탈취, 약한 인증</text>

  <!-- A08 -->
  <rect x="450" y="220" width="370" height="52" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="474" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">A08</text>
  <text x="514" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff">소프트웨어·데이터 무결성 실패</text>
  <text x="474" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Integrity Failures — 역직렬화, 공급망 공격</text>

  <!-- A09 -->
  <rect x="450" y="282" width="370" height="52" rx="8" fill="#1a1a0f" stroke="#e0a055" stroke-width="1.5"/>
  <text x="474" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e0a055">A09</text>
  <text x="514" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff">보안 로깅·모니터링 실패</text>
  <text x="474" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Logging Failures — 침해 감지 지연</text>

  <!-- A10 -->
  <rect x="450" y="344" width="370" height="52" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="474" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">A10</text>
  <text x="514" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffffff">서버 사이드 요청 위조</text>
  <text x="474" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SSRF — 내부망 접근, 클라우드 메타데이터</text>

  <!-- Legend -->
  <rect x="60" y="414" width="16" height="16" rx="3" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">높은 위험도 (Critical)</text>
  <rect x="220" y="414" width="16" height="16" rx="3" fill="#1a1a0f" stroke="#e0a055" stroke-width="1.5"/>
  <text x="244" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중간 위험도 (High)</text>

  <!-- Footer -->
  <rect x="60" y="446" width="760" height="38" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">OWASP Top 10은 3~4년마다 갱신 — 가장 최신 버전(2021) 기준 웹 보안 로드맵 출발점</text>
  <text x="440" y="481" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">owasp.org/Top10</text>
</svg>
