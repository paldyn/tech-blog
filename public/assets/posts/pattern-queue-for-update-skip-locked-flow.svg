<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SELECT FOR UPDATE SKIP LOCKED — DB 큐</text>

  <!-- Queue table -->
  <rect x="60" y="72" width="360" height="240" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="72" width="360" height="36" rx="8" fill="#1e3a5f"/>
  <rect x="60" y="92" width="360" height="16" fill="#1e3a5f"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">job_queue</text>

  <!-- Header row -->
  <rect x="60" y="108" width="360" height="26" rx="0" fill="#0f1f35"/>
  <text x="85" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">id</text>
  <text x="130" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">status</text>
  <text x="230" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">payload</text>
  <text x="350" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">retry</text>

  <!-- Job rows -->
  <rect x="61" y="134" width="358" height="26" rx="0" fill="#0f2a1f"/>
  <text x="85" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">101</text>
  <text x="130" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">🔒 processing</text>
  <text x="230" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">{type: email}</text>
  <text x="350" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">0</text>

  <line x1="61" y1="160" x2="419" y2="160" stroke="#2a3a5e" stroke-width="1"/>
  <rect x="61" y="160" width="358" height="26" rx="0" fill="#0a2a1a"/>
  <text x="85" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">102</text>
  <text x="130" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">pending</text>
  <text x="230" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">{type: sms}</text>
  <text x="350" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">0</text>

  <line x1="61" y1="186" x2="419" y2="186" stroke="#2a3a5e" stroke-width="1"/>
  <rect x="61" y="186" width="358" height="26" rx="0" fill="#0a2a1a"/>
  <text x="85" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">103</text>
  <text x="130" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">pending</text>
  <text x="230" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">{type: push}</text>
  <text x="350" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">0</text>

  <line x1="61" y1="212" x2="419" y2="212" stroke="#2a3a5e" stroke-width="1"/>
  <text x="85" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">104</text>
  <text x="130" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">failed</text>
  <text x="230" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">{type: webhook}</text>
  <text x="350" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">3</text>

  <text x="240" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">🔒 = Worker A가 처리 중 (잠금)</text>

  <!-- Workers -->
  <rect x="480" y="100" width="120" height="56" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Worker A</text>

  <rect x="480" y="200" width="120" height="56" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="540" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Worker B</text>

  <rect x="480" y="300" width="120" height="56" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="540" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">Worker C</text>

  <!-- Arrows: worker picking jobs -->
  <line x1="480" y1="128" x2="422" y2="152" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="455" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#55c555">Job 101</text>

  <line x1="480" y1="228" x2="422" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#7ec8e3">Job 102</text>

  <line x1="480" y1="328" x2="422" y2="204" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#ce9178">Job 103</text>

  <!-- SKIP LOCKED label -->
  <rect x="630" y="180" width="200" height="80" rx="6" fill="#0f1f35" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="730" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">SKIP LOCKED</text>
  <text x="730" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">잠긴 행 건너뜀</text>
  <text x="730" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데드락 없음</text>

  <!-- Bottom code -->
  <rect x="60" y="330" width="760" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- Worker가 다음 작업 할당받기</text>
  <text x="80" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WITH</tspan><tspan fill="#ffffff"> next_job </tspan><tspan fill="#7ec8e3" font-weight="600">AS</tspan><tspan fill="#ffffff"> (</tspan>
  </text>
  <text x="80" y="394" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> id </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> job_queue</tspan>
  </text>
  <text x="80" y="414" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> status = </tspan><tspan fill="#ce9178">'pending'</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">ORDER BY</tspan><tspan fill="#ffffff"> id</tspan>
  </text>
  <text x="80" y="434" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">LIMIT</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">FOR UPDATE SKIP LOCKED</tspan>
  </text>
  <text x="80" y="454" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="80" y="474" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">UPDATE</tspan><tspan fill="#ffffff"> job_queue </tspan><tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> status = </tspan><tspan fill="#ce9178">'processing'</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> id = (</tspan><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> id </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> next_job) </tspan><tspan fill="#7ec8e3" font-weight="600">RETURNING</tspan><tspan fill="#ffffff"> *;</tspan>
  </text>
</svg>
