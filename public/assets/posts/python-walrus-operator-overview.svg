<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">바다코끼리 연산자 := 해부</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa" text-anchor="middle">할당 + 값 반환을 동시에 — Python 3.8+</text>

  <!-- Anatomy -->
  <rect x="100" y="86" width="680" height="70" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="200" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">n</text>
  <text x="330" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#e8a838" text-anchor="middle">:=</text>
  <text x="560" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#7ec8e3" text-anchor="middle">len(data)</text>
  <text x="200" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">변수명</text>
  <text x="330" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a838" text-anchor="middle">walrus(:=)</text>
  <text x="560" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">표현식 (할당 + 값 반환)</text>

  <!-- Left: while without walrus -->
  <text x="60" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">walrus 없이 (중복 계산)</text>
  <rect x="60" y="192" width="360" height="112" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="215" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 중복: len() 두 번 호출</text>
  <text x="76" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">while</text>
  <text x="118" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> len</text>
  <text x="148" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(data) > </text>
  <text x="214" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="222" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="76" y="251" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    n = </text>
  <text x="124" y="251" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">len</text>
  <text x="154" y="251" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(data)  </text>
  <text x="218" y="251" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 두 번째</text>
  <text x="76" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    print</text>
  <text x="136" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(n);</text>
  <text x="176" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> data.pop()</text>
  <text x="76" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># len() 중복 호출, 코드 장황</text>

  <!-- Right: with walrus -->
  <text x="460" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">walrus 사용 (간결·효율)</text>
  <rect x="460" y="192" width="360" height="112" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="215" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 한 번에 할당 + 조건 검사</text>
  <text x="476" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">while</text>
  <text x="518" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (n := </text>
  <text x="568" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">len</text>
  <text x="598" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(data)) > </text>
  <text x="668" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="676" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="476" y="251" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    print</text>
  <text x="536" y="251" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(n)</text>
  <text x="476" y="269" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    data.pop()</text>
  <text x="476" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># n에 len(data) 바인딩 + 조건 평가</text>

  <!-- Bottom: use cases -->
  <rect x="60" y="330" width="760" height="72" rx="8" fill="#111827" stroke="#2a3444"/>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">:= 적합한 사용처</text>
  <rect x="80" y="366" width="10" height="10" rx="2" fill="#7ec8e3"/>
  <text x="98" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"><tspan font-weight="700" fill="#7ec8e3">while 루프 조건</tspan> — 파일 읽기, 소켓 수신, 반복 계산 결과 재사용</text>
  <rect x="400" y="366" width="10" height="10" rx="2" fill="#55c555"/>
  <text x="418" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"><tspan font-weight="700" fill="#55c555">컴프리헨션 조건부</tspan> — 비용 큰 함수 결과를 재사용할 때</text>
  <rect x="80" y="388" width="10" height="10" rx="2" fill="#e8a838"/>
  <text x="98" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"><tspan font-weight="700" fill="#e8a838">if 조건</tspan> — 정규식 매칭 등, 조건 검사 결과를 바디에서 바로 사용</text>
</svg>
