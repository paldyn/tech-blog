<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Next.js Metadata API 개요</text>

  <!-- Two approaches -->
  <text x="220" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">정적 메타데이터</text>
  <text x="660" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">동적 메타데이터</text>

  <!-- Static code -->
  <rect x="60" y="96" width="360" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// layout.tsx 또는 page.tsx</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import type</tspan><tspan fill="#ffffff"> &#123; Metadata &#125; </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ce9178"> 'next'</tspan></text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff"> </text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan><tspan fill="#ffffff"> metadata: Metadata = &#123;</tspan></text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  title: </tspan><tspan fill="#ce9178">'홈 | PALDYN'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  description: </tspan><tspan fill="#ce9178">'기술 블로그'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">&#125;</tspan></text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 빌드 타임에 정적으로 생성됨</text>

  <!-- Dynamic code -->
  <rect x="460" y="96" width="360" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// [slug]/page.tsx</text>
  <text x="476" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export async function</tspan><tspan fill="#ffffff"> generateMetadata(</tspan></text>
  <text x="476" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  &#123; params &#125;: Props</tspan></text>
  <text x="476" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">): </tspan><tspan fill="#7ec8e3" font-weight="600">Promise</tspan><tspan fill="#ffffff">&lt;Metadata&gt; &#123;</tspan></text>
  <text x="476" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> post = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> getPost(params.slug)</tspan></text>
  <text x="476" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> &#123; title: post.title &#125;</tspan></text>
  <text x="476" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">&#125;</tspan></text>
  <text x="476" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 요청 시 DB 조회 후 동적 생성</text>

  <!-- Metadata fields grid -->
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 Metadata 필드</text>

  <!-- Grid: 3x2 -->
  <rect x="60" y="318" width="220" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">title</text>
  <text x="170" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">문자열 또는 template 객체</text>
  <text x="170" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">브라우저 탭 + 검색 결과 제목</text>

  <rect x="290" y="318" width="220" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="400" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">description</text>
  <text x="400" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">검색 결과 설명 (≤160자 권장)</text>
  <text x="400" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CTR에 직접 영향</text>

  <rect x="520" y="318" width="300" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="670" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">openGraph</text>
  <text x="670" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SNS 공유 미리보기 (og:title 등)</text>
  <text x="670" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">images 배열로 OG 이미지 지정</text>

  <rect x="60" y="398" width="220" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">twitter</text>
  <text x="170" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">X(Twitter) 카드 메타데이터</text>
  <text x="170" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">summary_large_image 등</text>

  <rect x="290" y="398" width="220" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="400" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">robots</text>
  <text x="400" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">크롤러 지시 (index, follow 등)</text>
  <text x="400" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">페이지별 크롤링 제어</text>

  <rect x="520" y="398" width="300" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="670" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">alternates</text>
  <text x="670" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">canonical, hreflang 설정</text>
  <text x="670" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">다국어 SEO 핵심</text>
</svg>
