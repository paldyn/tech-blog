<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect x="0" y="0" width="880" height="500" rx="12" fill="#0a0a0a"/>

  <defs>
    <marker id="fcArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="fcArrBack" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="60" y="56" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">흐름 제어 윈도우와 WINDOW_UPDATE</text>

  <!-- sender / receiver labels -->
  <text x="120" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">송신측</text>
  <text x="700" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">수신측</text>

  <!-- Step 1 -->
  <text x="60" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">① 윈도우 = 65535. 윈도우만큼 DATA 전송</text>
  <line x1="200" y1="160" x2="680" y2="160" stroke="#55c555" stroke-width="2.5" marker-end="url(#fcArr)"/>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">DATA (16KB)  →  윈도우 65535 − 16384 = 49151</text>

  <!-- window bar after step1 -->
  <rect x="200" y="178" width="480" height="22" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="4"/>
  <rect x="200" y="178" width="120" height="22" fill="#3a4a6e" rx="4"/>
  <text x="690" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">소비됨</text>

  <!-- Step 2 -->
  <text x="60" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">② 계속 전송 → 윈도우 0. 송신 중단(blocked)</text>
  <line x1="200" y1="266" x2="680" y2="266" stroke="#55c555" stroke-width="2.5" marker-end="url(#fcArr)"/>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">DATA …  →  윈도우 0  (더 못 보냄)</text>

  <rect x="200" y="284" width="480" height="22" fill="#000000" stroke="#e05555" stroke-width="1.5" rx="4"/>
  <rect x="200" y="284" width="480" height="22" fill="#e05555" opacity="0.35" rx="4"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">윈도우 고갈 — 전송 멈춤</text>

  <!-- Step 3: WINDOW_UPDATE back -->
  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">③ 수신측이 버퍼 비우고 WINDOW_UPDATE 회신</text>
  <line x1="680" y1="378" x2="200" y2="378" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#fcArrBack)"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">←  WINDOW_UPDATE  increment=65535</text>

  <!-- window bar restored -->
  <text x="60" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">④ 윈도우 회복 → 전송 재개</text>
  <rect x="200" y="448" width="480" height="22" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="4"/>
  <rect x="200" y="448" width="480" height="22" fill="#55c555" opacity="0.40" rx="4"/>
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">윈도우 = 65535 (가득)</text>
</svg>
