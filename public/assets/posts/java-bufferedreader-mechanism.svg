<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">BufferedReader 버퍼링 동작 원리</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">파일에서 문자를 읽는 과정 — 버퍼 없음 vs 버퍼 있음</text>

  <!-- Without buffer -->
  <rect x="60" y="90" width="360" height="180" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">버퍼 없이 FileReader 직접 사용</text>

  <!-- File -->
  <rect x="80" y="124" width="100" height="40" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="130" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">파일(디스크)</text>

  <!-- Many small arrows -->
  <line x1="180" y1="144" x2="210" y2="144" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="180" y1="152" x2="210" y2="152" stroke="#e05555" stroke-width="1.5"/>
  <line x1="180" y1="160" x2="210" y2="160" stroke="#e05555" stroke-width="1.5"/>

  <rect x="210" y="124" width="40" height="40" rx="4" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">1</text>
  <text x="230" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">char</text>
  <text x="230" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">씩</text>

  <line x1="250" y1="144" x2="300" y2="144" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrB)"/>

  <rect x="300" y="124" width="100" height="40" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="350" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">앱 (read())</text>

  <text x="240" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1문자마다 시스템 콜 → 매우 느림</text>
  <text x="240" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">1,000 문자 = 1,000번 시스템 콜</text>
  <text x="240" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커널 모드 전환 비용이 지배적</text>
  <text x="240" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">  </text>

  <!-- With buffer -->
  <rect x="460" y="90" width="360" height="180" rx="8" fill="#101810" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">BufferedReader 사용</text>

  <!-- File -->
  <rect x="476" y="124" width="100" height="40" rx="6" fill="#102010" stroke="#55c555" stroke-width="1"/>
  <text x="526" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">파일(디스크)</text>

  <!-- One big arrow to buffer -->
  <line x1="576" y1="144" x2="606" y2="144" stroke="#55c555" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="591" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">8KB</text>

  <!-- Buffer -->
  <rect x="606" y="120" width="70" height="50" rx="4" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="641" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">버퍼</text>
  <text x="641" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">8192 chars</text>

  <!-- Smaller arrows from buffer to app -->
  <line x1="676" y1="144" x2="706" y2="144" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrB)"/>

  <rect x="706" y="124" width="96" height="40" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="754" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">앱 (read())</text>

  <text x="640" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버퍼에서 문자 제공 (시스템 콜 없음)</text>
  <text x="640" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">1,000 문자 = 1번 시스템 콜</text>
  <text x="640" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버퍼 소진 시 다음 8KB 읽기</text>

  <!-- Code example -->
  <rect x="60" y="290" width="760" height="190" rx="8" fill="#101010" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">BufferedReader 주요 API</text>

  <rect x="76" y="320" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 생성 (기본 버퍼 8192 chars)</text>
  <text x="92" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">new</text>
  <text x="92" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">     BufferedReader(reader);</text>
  <text x="92" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">new</text>
  <text x="92" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">     BufferedReader(reader, 16384);</text>

  <text x="92" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// readLine() — 줄 구분자 제거</text>
  <text x="92" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">String</text>
  <text x="92" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        line = br.readLine();</text>
  <text x="92" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// EOF → null 반환</text>
  <text x="92" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Stream (Java 8+)</text>

  <rect x="448" y="320" width="360" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="464" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// lines() → Stream&lt;String&gt;</text>
  <text x="464" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">br.lines()</text>
  <text x="464" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  .filter(l -&gt; l.contains(</text>
  <text x="464" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">    "ERROR"))</text>
  <text x="464" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  .forEach(System.out::println);</text>
  <text x="464" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// skip() → 줄 건너뛰기</text>
  <text x="464" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">br.lines().skip(1) </text>
  <text x="464" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 헤더 스킵</text>
</svg>
