<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">세그먼트 트리 — 배열 [2, 4, 3, 1, 6, 7, 2, 5]의 구간 합</text>

  <!-- Array visualization -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">입력 배열:</text>
  <rect x="130" y="60" width="40" height="30" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="150" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">2</text>
  <rect x="176" y="60" width="40" height="30" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="196" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">4</text>
  <rect x="222" y="60" width="40" height="30" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="242" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">3</text>
  <rect x="268" y="60" width="40" height="30" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="288" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">1</text>
  <rect x="314" y="60" width="40" height="30" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="334" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">6</text>
  <rect x="360" y="60" width="40" height="30" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="380" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">7</text>
  <rect x="406" y="60" width="40" height="30" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="426" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">2</text>
  <rect x="452" y="60" width="40" height="30" fill="#1a2a4a" rx="4" stroke="#3a5a7e"/>
  <text x="472" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">5</text>

  <!-- Index labels -->
  <text x="150" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">0</text>
  <text x="196" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">1</text>
  <text x="242" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">2</text>
  <text x="288" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">3</text>
  <text x="334" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">4</text>
  <text x="380" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">5</text>
  <text x="426" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">6</text>
  <text x="472" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">7</text>

  <!-- Tree structure -->
  <!-- Root: [0,7]=30 -->
  <rect x="360" y="120" width="120" height="40" fill="#1a2a4a" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="420" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[0,7]</text>
  <text x="420" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">30</text>

  <!-- Level 2: [0,3]=10, [4,7]=20 -->
  <rect x="165" y="200" width="110" height="40" fill="#1a2a4a" rx="5" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="220" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[0,3]</text>
  <text x="220" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">10</text>

  <rect x="624" y="200" width="110" height="40" fill="#1a2a4a" rx="5" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="679" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[4,7]</text>
  <text x="679" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">20</text>

  <!-- Level 3: [0,1]=6, [2,3]=4, [4,5]=13, [6,7]=7 -->
  <rect x="82" y="280" width="100" height="40" fill="#0d1520" rx="4" stroke="#2a3a5e" stroke-width="1"/>
  <text x="132" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[0,1]</text>
  <text x="132" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">6</text>

  <rect x="278" y="280" width="100" height="40" fill="#0d1520" rx="4" stroke="#2a3a5e" stroke-width="1"/>
  <text x="328" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[2,3]</text>
  <text x="328" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">4</text>

  <rect x="540" y="280" width="100" height="40" fill="#0d1520" rx="4" stroke="#2a3a5e" stroke-width="1"/>
  <text x="590" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[4,5]</text>
  <text x="590" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">13</text>

  <rect x="736" y="280" width="100" height="40" fill="#0d1520" rx="4" stroke="#2a3a5e" stroke-width="1"/>
  <text x="786" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[6,7]</text>
  <text x="786" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">7</text>

  <!-- Leaf level (partial): [0]=2,[1]=4,[2]=3,[3]=1 -->
  <rect x="60" y="358" width="56" height="36" fill="#0a1020" rx="4" stroke="#1a2a3e"/>
  <text x="88" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">2</text>
  <rect x="130" y="358" width="56" height="36" fill="#0a1020" rx="4" stroke="#1a2a3e"/>
  <text x="158" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">4</text>
  <rect x="256" y="358" width="56" height="36" fill="#0a1020" rx="4" stroke="#1a2a3e"/>
  <text x="284" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">3</text>
  <rect x="326" y="358" width="56" height="36" fill="#0a1020" rx="4" stroke="#1a2a3e"/>
  <text x="354" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">1</text>

  <!-- Edges -->
  <line x1="390" y1="160" x2="265" y2="200" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="160" x2="635" y2="200" stroke="#555" stroke-width="1.5"/>
  <line x1="200" y1="240" x2="165" y2="280" stroke="#555" stroke-width="1.5"/>
  <line x1="240" y1="240" x2="300" y2="280" stroke="#555" stroke-width="1.5"/>
  <line x1="659" y1="240" x2="612" y2="280" stroke="#555" stroke-width="1.5"/>
  <line x1="699" y1="240" x2="759" y2="280" stroke="#555" stroke-width="1.5"/>
  <line x1="108" y1="320" x2="88" y2="358" stroke="#555" stroke-width="1.5"/>
  <line x1="156" y1="320" x2="158" y2="358" stroke="#555" stroke-width="1.5"/>
  <line x1="306" y1="320" x2="284" y2="358" stroke="#555" stroke-width="1.5"/>
  <line x1="350" y1="320" x2="354" y2="358" stroke="#555" stroke-width="1.5"/>

  <!-- Query annotation -->
  <text x="550" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">query(1, 5) = ?</text>
  <text x="550" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">= [1,3](4 from tree) + [4,5](13) = 21</text>
  <text x="550" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">O(log n) 노드만 방문</text>

  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">트리 크기: 4n 이하. 빌드: O(n). 쿼리/업데이트: O(log n)</text>
</svg>
