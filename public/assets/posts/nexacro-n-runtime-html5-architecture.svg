<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" width="880" height="580" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="580" fill="#0a0a0a" rx="12"/>

  <text x="440" y="52" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Nexacro N HTML5 런타임 구조</text>
  <text x="440" y="76" text-anchor="middle" fill="#888" font-size="13">브라우저 위에서 동작하는 3계층 런타임 모델</text>

  <!-- Layer 1: Browser -->
  <rect x="60" y="100" width="760" height="68" rx="8" fill="#0e1520" stroke="#1e3050" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="700">브라우저 (Chrome / Edge / Firefox / Safari)</text>
  <text x="440" y="152" text-anchor="middle" fill="#888" font-size="12">HTML5 Canvas · CSS Variables · WebSocket · Fetch API · Web Workers</text>

  <!-- Arrow down 1 -->
  <line x1="440" y1="168" x2="440" y2="192" stroke="#444" stroke-width="2"/>
  <polygon points="440,196 434,186 446,186" fill="#444"/>

  <!-- Layer 2: Nexacro Runtime -->
  <rect x="60" y="200" width="760" height="130" rx="8" fill="#0e200e" stroke="#1e501e" stroke-width="1.5"/>
  <text x="440" y="228" text-anchor="middle" fill="#55c555" font-size="14" font-weight="700">Nexacro N 런타임 엔진 (JavaScript)</text>

  <!-- Sub boxes in runtime layer -->
  <rect x="80" y="242" width="164" height="70" rx="6" fill="#0a1a0a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="162" y="264" text-anchor="middle" fill="#e8e8e8" font-size="12" font-weight="600">컴포넌트 렌더러</text>
  <text x="162" y="282" text-anchor="middle" fill="#888" font-size="11">Canvas 기반 렌더링</text>
  <text x="162" y="298" text-anchor="middle" fill="#888" font-size="11">고성능 그리드 처리</text>

  <rect x="260" y="242" width="164" height="70" rx="6" fill="#0a1a0a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="342" y="264" text-anchor="middle" fill="#e8e8e8" font-size="12" font-weight="600">이벤트 시스템</text>
  <text x="342" y="282" text-anchor="middle" fill="#888" font-size="11">버블링 / 캡처링</text>
  <text x="342" y="298" text-anchor="middle" fill="#888" font-size="11">DOM 이벤트 추상화</text>

  <rect x="440" y="242" width="164" height="70" rx="6" fill="#0a1a0a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="522" y="264" text-anchor="middle" fill="#e8e8e8" font-size="12" font-weight="600">Dataset 관리자</text>
  <text x="522" y="282" text-anchor="middle" fill="#888" font-size="11">메모리 내 테이블</text>
  <text x="522" y="298" text-anchor="middle" fill="#888" font-size="11">변경 추적 / 바인딩</text>

  <rect x="620" y="242" width="180" height="70" rx="6" fill="#0a1a0a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="710" y="264" text-anchor="middle" fill="#e8e8e8" font-size="12" font-weight="600">Transaction 관리자</text>
  <text x="710" y="282" text-anchor="middle" fill="#888" font-size="11">PL Protocol</text>
  <text x="710" y="298" text-anchor="middle" fill="#888" font-size="11">비동기 HTTP 통신</text>

  <!-- Arrow down 2 -->
  <line x1="440" y1="330" x2="440" y2="354" stroke="#444" stroke-width="2"/>
  <polygon points="440,358 434,348 446,348" fill="#444"/>

  <!-- Layer 3: Application Files -->
  <rect x="60" y="362" width="760" height="100" rx="8" fill="#1a0e20" stroke="#3a1e50" stroke-width="1.5"/>
  <text x="440" y="390" text-anchor="middle" fill="#7777cc" font-size="14" font-weight="700">애플리케이션 파일 (웹서버 배포)</text>

  <rect x="90" y="406" width="130" height="40" rx="5" fill="#150e1a" stroke="#2a1a3a" stroke-width="1"/>
  <text x="155" y="431" text-anchor="middle" fill="#e8e8e8" font-size="12">.xfdl 폼 파일</text>

  <rect x="236" y="406" width="130" height="40" rx="5" fill="#150e1a" stroke="#2a1a3a" stroke-width="1"/>
  <text x="301" y="431" text-anchor="middle" fill="#e8e8e8" font-size="12">.js 스크립트</text>

  <rect x="382" y="406" width="130" height="40" rx="5" fill="#150e1a" stroke="#2a1a3a" stroke-width="1"/>
  <text x="447" y="431" text-anchor="middle" fill="#e8e8e8" font-size="12">.css 테마 파일</text>

  <rect x="528" y="406" width="130" height="40" rx="5" fill="#150e1a" stroke="#2a1a3a" stroke-width="1"/>
  <text x="593" y="431" text-anchor="middle" fill="#e8e8e8" font-size="12">TypeDef XML</text>

  <rect x="674" y="406" width="126" height="40" rx="5" fill="#150e1a" stroke="#2a1a3a" stroke-width="1"/>
  <text x="737" y="431" text-anchor="middle" fill="#e8e8e8" font-size="12">환경설정 XML</text>

  <!-- Arrow down 3 -->
  <line x1="440" y1="462" x2="440" y2="486" stroke="#444" stroke-width="2"/>
  <polygon points="440,490 434,480 446,480" fill="#444"/>

  <!-- Layer 4: Web Server / App Server -->
  <rect x="60" y="494" width="360" height="52" rx="8" fill="#200e0e" stroke="#501e1e" stroke-width="1.5"/>
  <text x="240" y="524" text-anchor="middle" fill="#e05555" font-size="13" font-weight="600">웹서버 (Nginx / Apache / IIS)</text>

  <rect x="460" y="494" width="360" height="52" rx="8" fill="#1a140a" stroke="#3a2e1a" stroke-width="1.5"/>
  <text x="640" y="524" text-anchor="middle" fill="#e0a040" font-size="13" font-weight="600">앱서버 (Spring Boot / Node.js)</text>

  <!-- bidirectional arrow between web and app -->
  <line x1="420" y1="520" x2="460" y2="520" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <text x="440" y="570" text-anchor="middle" fill="#444" font-size="11">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
