<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git clone이 하는 일</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">단순 다운로드가 아닌 완전한 저장소 복제</text>

  <!-- Remote -->
  <rect x="60" y="90" width="300" height="320" rx="10" fill="#111" stroke="#1e2a3a"/>
  <text x="210" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">원격 저장소 (GitHub)</text>

  <rect x="80" y="130" width="260" height="256" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="100" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">커밋 이력</text>
  <circle cx="120" cy="185" r="10" fill="#1e2a40" stroke="#7ec8e3"/>
  <text x="120" y="189" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#7ec8e3">c1</text>
  <circle cx="165" cy="185" r="10" fill="#1e2a40" stroke="#7ec8e3"/>
  <text x="165" y="189" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#7ec8e3">c2</text>
  <circle cx="210" cy="185" r="10" fill="#1e2a40" stroke="#7ec8e3"/>
  <text x="210" y="189" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#7ec8e3">c3</text>
  <circle cx="255" cy="185" r="10" fill="#7ec8e3" stroke="#aaddff"/>
  <text x="255" y="189" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#0a0a0a">c4</text>
  <line x1="130" y1="185" x2="154" y2="185" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="175" y1="185" x2="199" y2="185" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="185" x2="244" y2="185" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="210" y="226" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">브랜치</text>
  <text x="100" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">main</text>
  <text x="100" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">develop</text>
  <text x="100" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8c55e">feature/login</text>

  <text x="210" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">태그</text>
  <text x="100" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">v1.0.0</text>
  <text x="100" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">v1.1.0</text>

  <!-- Arrow -->
  <line x1="362" y1="250" x2="440" y2="250" stroke="#7ec8e3" stroke-width="3" marker-end="url(#arr)"/>
  <text x="401" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">git clone</text>
  <text x="401" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체 복사</text>

  <!-- Local clone -->
  <rect x="444" y="90" width="376" height="320" rx="10" fill="#0d150d" stroke="#1e3a1e"/>
  <text x="632" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">로컬 저장소 (복제본)</text>

  <!-- What was copied -->
  <rect x="464" y="130" width="336" height="256" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="484" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">✓ 동일한 커밋 이력 (전체)</text>
  <circle cx="504" cy="185" r="10" fill="#1e3a1e" stroke="#55c555"/>
  <text x="504" y="189" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#55c555">c1</text>
  <circle cx="549" cy="185" r="10" fill="#1e3a1e" stroke="#55c555"/>
  <text x="549" y="189" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#55c555">c2</text>
  <circle cx="594" cy="185" r="10" fill="#1e3a1e" stroke="#55c555"/>
  <text x="594" y="189" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#55c555">c3</text>
  <circle cx="639" cy="185" r="10" fill="#55c555" stroke="#77ee77"/>
  <text x="639" y="189" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#0a0a0a">c4</text>
  <line x1="514" y1="185" x2="538" y2="185" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="559" y1="185" x2="583" y2="185" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="604" y1="185" x2="628" y2="185" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="484" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">✓ remote/origin 자동 설정</text>
  <text x="484" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">  origin → github.com/user/repo</text>

  <text x="484" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">✓ 기본 브랜치 체크아웃</text>
  <text x="484" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  HEAD → main</text>

  <text x="484" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">✓ 모든 태그 포함</text>
  <text x="484" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  v1.0.0, v1.1.0 ...</text>

  <text x="440" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">클론 이후 원격 저장소 없이도 전체 이력 탐색 · 브랜치 작업이 가능하다</text>
</svg>
