<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CORS 프리플라이트 흐름</text>

  <!-- 브라우저 -->
  <rect x="60" y="80" width="200" height="52" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">브라우저</text>
  <text x="160" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">https://app.example.com</text>

  <!-- API 서버 -->
  <rect x="620" y="80" width="200" height="52" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">API 서버</text>
  <text x="720" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">https://api.example.com</text>

  <!-- Simple Request 경로 -->
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Simple Request (GET·HEAD·POST + 기본 헤더)</text>

  <line x1="260" y1="185" x2="618" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="439" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">GET /data  Origin: https://app.example.com</text>

  <line x1="620" y1="205" x2="262" y2="205" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="439" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Access-Control-Allow-Origin: https://app.example.com</text>

  <!-- 구분선 -->
  <line x1="60" y1="240" x2="820" y2="240" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Preflight 경로 -->
  <text x="440" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8883a" text-anchor="middle">Preflight (DELETE·PATCH·커스텀 헤더·Content-Type: application/json 등)</text>

  <!-- 1단계: OPTIONS -->
  <text x="90" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">① Preflight</text>
  <line x1="260" y1="300" x2="618" y2="300" stroke="#e8883a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-r)"/>
  <text x="439" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8883a" text-anchor="middle">OPTIONS /data  AC-Request-Method: DELETE</text>

  <!-- 2단계: 서버 허가 -->
  <text x="640" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">② 허가 응답</text>
  <line x1="620" y1="335" x2="262" y2="335" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-g)"/>
  <text x="439" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">AC-Allow-Methods: DELETE  AC-Max-Age: 86400</text>

  <!-- 3단계: 실제 요청 -->
  <text x="90" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">③ 실제 요청</text>
  <line x1="260" y1="370" x2="618" y2="370" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="439" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">DELETE /data  Authorization: Bearer ...</text>

  <!-- 4단계: 최종 응답 -->
  <line x1="620" y1="390" x2="262" y2="390" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="439" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">200 OK  Access-Control-Allow-Origin: https://app.example.com</text>

  <!-- 자격증명 요청 박스 -->
  <rect x="60" y="415" width="760" height="80" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">자격증명 포함 요청 (withCredentials)</text>
  <text x="180" y="463" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" text-anchor="middle">credentials: 'include'</text>
  <text x="180" y="481" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쿠키·인증 헤더 전송</text>
  <text x="440" y="463" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" text-anchor="middle">AC-Allow-Origin: 와일드카드(*) 금지</text>
  <text x="440" y="481" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">명시적 origin 필수</text>
  <text x="700" y="463" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" text-anchor="middle">AC-Allow-Credentials: true</text>
  <text x="700" y="481" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">반드시 true 명시</text>
  <line x1="300" y1="420" x2="300" y2="492" stroke="#333" stroke-width="1"/>
  <line x1="570" y1="420" x2="570" y2="492" stroke="#333" stroke-width="1"/>
</svg>
