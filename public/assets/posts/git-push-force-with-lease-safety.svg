<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">--force-with-lease 안전 메커니즘</text>
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#888">로컬이 알고 있는 원격 SHA와 실제 원격 SHA를 비교</text>

  <!-- Divider -->
  <line x1="440" y1="100" x2="440" y2="440" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: 성공 케이스 -->
  <text x="220" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">push 허용 (안전)</text>

  <rect x="68" y="135" width="350" height="60" rx="6" fill="#0a1a0a" stroke="#1a3a1a"/>
  <text x="243" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로컬이 아는 origin/main SHA:</text>
  <text x="243" y="178" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">abc1234</text>

  <rect x="68" y="215" width="350" height="60" rx="6" fill="#0a1a0a" stroke="#1a3a1a"/>
  <text x="243" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 원격 main SHA:</text>
  <text x="243" y="258" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">abc1234  ✓ 일치</text>

  <!-- Check arrow -->
  <rect x="238" y="197" width="4" height="16" fill="#55c555"/>
  <polygon points="230,213 250,213 242,223" fill="#55c555"/>

  <rect x="68" y="295" width="350" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="243" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">push 성공</text>
  <text x="243" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로컬 커밋으로 원격 덮어씀</text>

  <!-- RIGHT: 실패 케이스 -->
  <text x="660" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">push 차단 (보호)</text>

  <rect x="462" y="135" width="356" height="60" rx="6" fill="#1a0a0a" stroke="#3a1a1a"/>
  <text x="640" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로컬이 아는 origin/main SHA:</text>
  <text x="640" y="178" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">abc1234</text>

  <rect x="462" y="215" width="356" height="60" rx="6" fill="#1a0a0a" stroke="#3a1a1a"/>
  <text x="640" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 원격 main SHA:</text>
  <text x="640" y="258" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">def5678  ✗ 불일치</text>

  <!-- X arrow -->
  <rect x="638" y="197" width="4" height="16" fill="#e05555"/>
  <polygon points="630,213 650,213 642,223" fill="#e05555"/>

  <rect x="462" y="295" width="356" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">push 거부됨</text>
  <text x="640" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">팀원 커밋이 생겼음을 감지</text>

  <!-- Bottom explanation -->
  <rect x="60" y="370" width="760" height="60" rx="6" fill="#0d1117" stroke="#2a3a52"/>
  <text x="440" y="393" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">원리: 로컬 refs/remotes/origin/main 값과 실제 원격 비교</text>
  <text x="440" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">fetch 없이 push 하면 로컬 추적 브랜치 SHA가 기준이 됨</text>
</svg>
