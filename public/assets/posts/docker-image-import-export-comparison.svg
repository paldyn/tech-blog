<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">save/load vs export/import 비교</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">이미지 기반 vs 컨테이너 스냅샷 기반</text>

  <!-- Header row -->
  <rect x="60" y="104" width="220" height="36" fill="#1e2433" rx="6"/>
  <text x="170" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">항목</text>

  <rect x="300" y="104" width="240" height="36" fill="#111820" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="420" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">save / load</text>

  <rect x="560" y="104" width="260" height="36" fill="#111820" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">export / import</text>

  <!-- Row 1: 대상 -->
  <rect x="60" y="152" width="220" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">대상</text>
  <rect x="300" y="152" width="240" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="420" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">이미지 (Image)</text>
  <rect x="560" y="152" width="260" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="690" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">컨테이너 (Container)</text>

  <!-- Row 2: 레이어 -->
  <rect x="60" y="202" width="220" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">레이어 구조</text>
  <rect x="300" y="202" width="240" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="420" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">모든 레이어 보존 ✓</text>
  <rect x="560" y="202" width="260" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="690" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">단일 평탄화 레이어 ✗</text>

  <!-- Row 3: 히스토리 -->
  <rect x="60" y="252" width="220" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">히스토리</text>
  <rect x="300" y="252" width="240" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="420" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">완전 보존 ✓</text>
  <rect x="560" y="252" width="260" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="690" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">히스토리 없음 ✗</text>

  <!-- Row 4: 태그 -->
  <rect x="60" y="302" width="220" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">태그 보존</text>
  <rect x="300" y="302" width="240" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="420" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">보존 ✓</text>
  <rect x="560" y="302" width="260" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="690" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">수동 지정 필요 ✗</text>

  <!-- Row 5: 용도 -->
  <rect x="60" y="352" width="220" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">주요 용도</text>
  <rect x="300" y="352" width="240" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="420" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">에어갭 이미지 전송</text>
  <rect x="560" y="352" width="260" height="40" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="690" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">컨테이너 상태 스냅샷</text>

  <!-- Summary -->
  <rect x="60" y="412" width="760" height="64" fill="#0d1117" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">export/import 의 한계</text>
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레이어 캐싱 불가 / 용량 절감 없음 / 빌드 재현 어려움 — 일반적으로 save/load 권장</text>
</svg>
