<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    이미지 최적화 도구 비교
  </text>

  <!-- Headers -->
  <text x="80" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">도구</text>
  <text x="240" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">방식</text>
  <text x="450" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">크기 감소</text>
  <text x="610" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">적합한 경우</text>

  <!-- docker-slim -->
  <rect x="60" y="86" width="760" height="54" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">docker-slim</text>
  <text x="80" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(slimtoolkit)</text>
  <text x="240" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">동적 분석 (앱 실행 후</text>
  <text x="240" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용한 파일만 유지)</text>
  <text x="450" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">30배~</text>
  <text x="610" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">웹앱, API 서버</text>

  <!-- dive -->
  <rect x="60" y="150" width="760" height="54" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">dive</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(레이어 분석)</text>
  <text x="240" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">레이어별 파일 변경 시각화</text>
  <text x="450" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">직접 감소 ✗</text>
  <text x="610" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">불필요 파일 찾기</text>

  <!-- crane -->
  <rect x="60" y="214" width="760" height="54" rx="6" fill="#1a0a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">crane</text>
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(google/go-containerregistry)</text>
  <text x="240" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">이미지 복사/변환/검사</text>
  <text x="450" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">flatten으로 감소</text>
  <text x="610" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">레이어 병합, 복사</text>

  <!-- skopeo -->
  <rect x="60" y="278" width="760" height="54" rx="6" fill="#0a1a1a" stroke="#e8a020" stroke-width="1"/>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a020">skopeo</text>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(컨테이너 이미지 검사)</text>
  <text x="240" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">레지스트리 간 복사, 검사</text>
  <text x="450" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020">감소 아님</text>
  <text x="610" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">레지스트리 마이그레이션</text>

  <!-- Workflow suggestion -->
  <rect x="60" y="352" width="760" height="108" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">권장 워크플로</text>
  <!-- boxes -->
  <rect x="80" y="386" width="140" height="36" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">① dive로 분석</text>
  <line x1="222" y1="404" x2="258" y2="404" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="260" y="386" width="160" height="36" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="340" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">② 불필요 레이어 제거</text>
  <line x1="422" y1="404" x2="458" y2="404" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="460" y="386" width="160" height="36" rx="4" fill="#1a0a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="540" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle">③ slim으로 압축</text>
  <line x1="622" y1="404" x2="658" y2="404" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="660" y="386" width="140" height="36" rx="4" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="730" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">④ 검증 후 배포</text>
  <text x="80" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dive로 어떤 파일이 불필요한지 확인 → Dockerfile 개선 → slim으로 최종 크기 축소 → trivy로 보안 검증</text>
</svg>
