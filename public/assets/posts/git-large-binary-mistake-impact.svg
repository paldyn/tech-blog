<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">대용량 파일은 지워도 히스토리에 남는다</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">다음 커밋에서 rm 해도 과거 커밋이 그 blob을 붙들고 있다</text>

  <!-- timeline commits -->
  <circle cx="140" cy="170" r="11" fill="#7ec8e3"/><text x="120" y="205" font-size="12" fill="#888">C1</text>
  <circle cx="300" cy="170" r="11" fill="#e05555"/><text x="270" y="205" font-size="12" fill="#e05555">C2 (200MB 추가)</text>
  <circle cx="460" cy="170" r="11" fill="#7ec8e3"/><text x="430" y="205" font-size="12" fill="#888">C3 (rm 했지만…)</text>
  <circle cx="620" cy="170" r="11" fill="#7ec8e3"/><text x="600" y="205" font-size="12" fill="#888">C4</text>
  <line x1="151" y1="170" x2="289" y2="170" stroke="#888" stroke-width="2"/>
  <line x1="311" y1="170" x2="449" y2="170" stroke="#888" stroke-width="2"/>
  <line x1="471" y1="170" x2="609" y2="170" stroke="#888" stroke-width="2"/>

  <!-- blob still referenced -->
  <rect x="240" y="240" width="220" height="56" rx="8" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="260" y="265" font-size="13" fill="#e05555">200MB blob 여전히 존재</text>
  <text x="260" y="285" font-size="12" fill="#9aa4b8">clone·fetch마다 다운로드</text>
  <line x1="300" y1="181" x2="300" y2="240" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>

  <text x="60" y="325" font-size="13" fill="#888">저장소 크기를 줄이려면 히스토리 자체에서 blob을 제거해야 한다</text>
</svg>
