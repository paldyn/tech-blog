<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">폰트 최적화 — preload · font-display · 서브셋</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">폰트 로딩 전략으로 FOUT·FOIT 방지</text>

  <!-- Preload box -->
  <rect x="60" y="96" width="240" height="110" rx="8" fill="#0d1f2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">rel="preload"</text>
  <text x="180" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">HTML 파싱 시점에</text>
  <text x="180" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">폰트 파일 우선 요청</text>
  <text x="180" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">as="font" crossorigin 필수</text>
  <text x="180" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">LCP 폰트에 효과적</text>

  <!-- font-display box -->
  <rect x="320" y="96" width="240" height="110" rx="8" fill="#0d1f2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">font-display: swap</text>
  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">시스템 폰트로 즉시 렌더</text>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">웹 폰트 로드 후 교체</text>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">FOIT(텍스트 숨김) 방지</text>
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Lighthouse 권장</text>

  <!-- Subset box -->
  <rect x="580" y="96" width="240" height="110" rx="8" fill="#0d1f2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">서브셋 · unicode-range</text>
  <text x="700" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">실제 사용 글자만 포함</text>
  <text x="700" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">한글: KR 서브셋만 로드</text>
  <text x="700" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">파일 크기 80% 절감 가능</text>
  <text x="700" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">woff2 포맷 사용 필수</text>

  <!-- Code block -->
  <rect x="60" y="228" width="760" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">&lt;!-- HTML: 폰트 프리로드 --&gt;</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&lt;<tspan fill="#7ec8e3" font-weight="600">link</tspan> rel=<tspan fill="#ce9178">"preload"</tspan> href=<tspan fill="#ce9178">"/fonts/pretendard-kr.woff2"</tspan></text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">     as=<tspan fill="#ce9178">"font"</tspan> type=<tspan fill="#ce9178">"font/woff2"</tspan> crossorigin/&gt;</text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">/* CSS: font-display: swap */</text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">@font-face { font-family: <tspan fill="#ce9178">'Pretendard'</tspan>; src: url(<tspan fill="#ce9178">'.../kr.woff2'</tspan>) format(<tspan fill="#ce9178">'woff2'</tspan>);</text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  font-display: swap; unicode-range: U+AC00-D7A3; }</text>
</svg>
