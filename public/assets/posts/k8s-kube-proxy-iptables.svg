<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">kube-proxy iptables 모드 동작</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Service ClusterIP 트래픽 → 파드 IP로 DNAT 변환</text>

  <!-- Client Pod -->
  <rect x="60" y="110" width="160" height="70" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Client Pod</text>
  <text x="140" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">myapp-service</text>
  <text x="140" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">:8080 접속 요청</text>

  <line x1="222" y1="145" x2="258" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Service ClusterIP -->
  <rect x="260" y="110" width="200" height="70" rx="8" fill="#1a1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="360" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ce9178">Service (ClusterIP)</text>
  <text x="360" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">10.96.0.100:8080</text>
  <text x="360" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">가상 IP (실제 존재 안 함)</text>

  <line x1="462" y1="145" x2="498" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- iptables -->
  <rect x="500" y="100" width="280" height="90" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">iptables DNAT 규칙</text>
  <text x="640" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">kube-proxy가 관리하는 iptables 체인</text>
  <text x="640" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">목적지 10.96.0.100:8080</text>
  <text x="640" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">→ 파드 IP 중 하나로 무작위 DNAT</text>

  <!-- Pod endpoints -->
  <rect x="60" y="250" width="200" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Pod A</text>
  <text x="160" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">10.244.0.5:8080</text>

  <rect x="340" y="250" width="200" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Pod B</text>
  <text x="440" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">10.244.1.3:8080</text>

  <rect x="620" y="250" width="200" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Pod C</text>
  <text x="720" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">10.244.2.7:8080</text>

  <!-- iptables to pods -->
  <line x1="580" y1="192" x2="200" y2="248" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr2)"/>
  <line x1="620" y1="192" x2="470" y2="248" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr2)"/>
  <line x1="700" y1="192" x2="720" y2="248" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr2)"/>

  <text x="380" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">1/3 확률로 각 파드에 로드밸런싱</text>

  <!-- kube-proxy watches -->
  <rect x="60" y="340" width="760" height="130" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">kube-proxy의 역할</text>

  <rect x="80" y="378" width="340" height="78" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="250" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Watch: Service + Endpoints 변경 감지</text>
  <text x="250" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파드 추가 → iptables 규칙 추가</text>
  <text x="250" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파드 제거 → iptables 규칙 삭제</text>
  <text x="250" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">DaemonSet으로 모든 노드에 실행</text>

  <rect x="440" y="378" width="360" height="78" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="620" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">iptables vs IPVS 모드</text>
  <text x="620" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">iptables: 소규모 클러스터, 기본값</text>
  <text x="620" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">IPVS: 대규모, 더 효율적인 LB 알고리즘</text>
  <text x="620" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">서비스 수천 개 이상이면 IPVS 권장</text>
</svg>
