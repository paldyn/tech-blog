<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">sort · uniq — 정렬과 중복 제거</text>

  <!-- sort options -->
  <rect x="60" y="68" width="360" height="240" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">sort 주요 옵션</text>

  <!-- option rows -->
  <rect x="80" y="106" width="60" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="110" y="125" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-n</text>
  <text x="158" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">숫자 정렬</text>

  <rect x="80" y="142" width="60" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="110" y="161" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-r</text>
  <text x="158" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">역방향 정렬</text>

  <rect x="80" y="178" width="60" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="110" y="197" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-k</text>
  <text x="158" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">특정 필드 기준 정렬</text>

  <rect x="80" y="214" width="60" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="110" y="233" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-t</text>
  <text x="158" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">구분자 지정</text>

  <rect x="80" y="250" width="60" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="110" y="269" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-u</text>
  <text x="158" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">중복 제거 (-u = unique)</text>

  <rect x="80" y="286" width="60" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="110" y="305" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-h</text>
  <text x="158" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">사람 읽기형 (1K,2M) 정렬</text>

  <!-- uniq options -->
  <rect x="460" y="68" width="360" height="240" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc">uniq 주요 옵션</text>

  <rect x="480" y="106" width="60" height="28" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="510" y="125" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">-c</text>
  <text x="558" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">발생 횟수 앞에 출력</text>

  <rect x="480" y="142" width="60" height="28" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="510" y="161" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">-d</text>
  <text x="558" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">중복된 줄만 출력</text>

  <rect x="480" y="178" width="60" height="28" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="510" y="197" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">-u</text>
  <text x="558" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">중복 없는 줄만 출력</text>

  <rect x="480" y="214" width="60" height="28" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="510" y="233" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">-i</text>
  <text x="558" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">대소문자 무시</text>

  <rect x="480" y="250" width="60" height="28" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="510" y="269" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">-f N</text>
  <text x="558" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">N개 필드 건너뛰고 비교</text>

  <rect x="480" y="286" width="60" height="28" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="510" y="305" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">-s N</text>
  <text x="558" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">N개 문자 건너뛰고 비교</text>

  <!-- Pipeline flow -->
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">전형적인 파이프라인 패턴</text>

  <rect x="60" y="358" width="180" height="48" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="376" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cat file.txt</text>
  <text x="150" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원본 (중복 포함)</text>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <line x1="242" y1="382" x2="280" y2="382" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="249" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">sort</text>

  <rect x="282" y="358" width="140" height="48" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="352" y="376" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sort file.txt</text>
  <text x="352" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정렬됨</text>

  <line x1="424" y1="382" x2="462" y2="382" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="430" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">uniq</text>

  <rect x="464" y="358" width="160" height="48" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="544" y="376" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sort | uniq</text>
  <text x="544" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중복 제거됨</text>

  <line x1="626" y1="382" x2="664" y2="382" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="629" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">-c</text>

  <rect x="666" y="358" width="154" height="48" rx="6" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="743" y="376" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sort | uniq -c</text>
  <text x="743" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빈도 집계</text>
</svg>
