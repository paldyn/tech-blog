<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="390" viewBox="0 0 880 390">
  <rect width="880" height="390" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">쿠키 보안 레이어 (프리픽스별)</text>
    <!-- Code block: wrong vs right -->
    <rect x="60" y="65" width="760" height="186" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve"># 취약한 설정 (공격자가 HTTP에서 덮어쓸 수 있음)</text>
    <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Set-Cookie</tspan><tspan fill="#ffffff">: csrfToken=secret; Path=/</tspan></text>
    <text x="76" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve"># __Secure-: HTTPS 강제 (서브도메인 쿠키 인젝션 방어)</text>
    <text x="76" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Set-Cookie</tspan><tspan fill="#ffffff">: __Secure-csrf=secret; Secure; SameSite=Strict</tspan></text>
    <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve"># __Host-: 가장 강력 (도메인 고정, Path=/ 강제)</text>
    <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Set-Cookie</tspan><tspan fill="#ffffff">: __Host-sess=abc; Secure; HttpOnly; Path=/</tspan></text>
    <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># __Host- 위반 예시 (브라우저가 거부)</text>
    <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e05555">Set-Cookie</tspan><tspan fill="#ffffff">: __Host-sess=abc; Secure; Domain=.example.com</tspan></text>
    <!-- Layer diagram -->
    <rect x="60" y="275" width="760" height="90" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
    <text x="440" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#888">방어 레이어 누적</text>
    <rect x="80" y="308" width="180" height="40" rx="4" fill="#1a0a0a" stroke="#aa3a3a" stroke-width="1"/>
    <text x="170" y="333" text-anchor="middle" font-size="11" fill="#e05555">HttpOnly (XSS 방어)</text>
    <rect x="280" y="308" width="180" height="40" rx="4" fill="#1a1a0a" stroke="#aaaa3a" stroke-width="1"/>
    <text x="370" y="333" text-anchor="middle" font-size="11" fill="#dddd55">Secure (도청 방어)</text>
    <rect x="480" y="308" width="180" height="40" rx="4" fill="#0f1a0f" stroke="#3aaa3a" stroke-width="1"/>
    <text x="570" y="333" text-anchor="middle" font-size="11" fill="#55c555">SameSite (CSRF 방어)</text>
    <rect x="680" y="308" width="140" height="40" rx="4" fill="#0a1020" stroke="#3a5a9a" stroke-width="1"/>
    <text x="750" y="333" text-anchor="middle" font-size="11" fill="#7ec8e3">__Host- (최강)</text>
    <text x="440" y="375" text-anchor="middle" font-size="11" fill="#555">브라우저 지원: Chrome 49+, Firefox 50+, Safari 13.1+</text>
  </g>
</svg>
