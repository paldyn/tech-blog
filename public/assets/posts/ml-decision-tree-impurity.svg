<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px">
  <rect x="0" y="0" width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">불순도 지표와 DecisionTreeClassifier 파라미터</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">엔트로피 vs 지니 계수, max_depth · min_samples_split 효과</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- LEFT: Entropy vs Gini comparison panel -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">불순도 비교: 2-클래스 문제, p = 클래스 1의 비율</text>

  <!-- Entropy panel -->
  <rect x="60" y="115" width="360" height="134" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">엔트로피 (Entropy)</text>
  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">H = -Σ pᵢ · log₂(pᵢ)</text>
  <!-- Bar chart: entropy curve approximation -->
  <rect x="80" y="185" width="18" height="4" rx="2" fill="#7ec8e3" opacity="0.3"/>
  <rect x="100" y="175" width="18" height="14" rx="2" fill="#7ec8e3" opacity="0.5"/>
  <rect x="120" y="160" width="18" height="29" rx="2" fill="#7ec8e3" opacity="0.7"/>
  <rect x="140" y="148" width="18" height="41" rx="2" fill="#7ec8e3" opacity="0.85"/>
  <rect x="160" y="142" width="18" height="47" rx="2" fill="#7ec8e3"/>
  <rect x="180" y="148" width="18" height="41" rx="2" fill="#7ec8e3" opacity="0.85"/>
  <rect x="200" y="160" width="18" height="29" rx="2" fill="#7ec8e3" opacity="0.7"/>
  <rect x="220" y="175" width="18" height="14" rx="2" fill="#7ec8e3" opacity="0.5"/>
  <rect x="240" y="185" width="18" height="4" rx="2" fill="#7ec8e3" opacity="0.3"/>
  <text x="80" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">p=0</text>
  <text x="166" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">p=0.5 (최대=1.0)</text>
  <text x="254" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">p=1</text>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">범위 [0, 1], 계산 비용 ↑, ID3·C4.5에서 사용</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이진 분류: 0 (순수) ~ 1 (완전 혼합)</text>

  <!-- Gini panel -->
  <rect x="460" y="115" width="360" height="134" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">지니 계수 (Gini Impurity)</text>
  <text x="480" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">G = 1 - Σ pᵢ²</text>
  <!-- Bar chart: gini curve approximation -->
  <rect x="480" y="186" width="18" height="3" rx="2" fill="#7777cc" opacity="0.3"/>
  <rect x="500" y="177" width="18" height="12" rx="2" fill="#7777cc" opacity="0.5"/>
  <rect x="520" y="163" width="18" height="26" rx="2" fill="#7777cc" opacity="0.7"/>
  <rect x="540" y="153" width="18" height="36" rx="2" fill="#7777cc" opacity="0.85"/>
  <rect x="560" y="148" width="18" height="41" rx="2" fill="#7777cc"/>
  <rect x="580" y="153" width="18" height="36" rx="2" fill="#7777cc" opacity="0.85"/>
  <rect x="600" y="163" width="18" height="26" rx="2" fill="#7777cc" opacity="0.7"/>
  <rect x="620" y="177" width="18" height="12" rx="2" fill="#7777cc" opacity="0.5"/>
  <rect x="640" y="186" width="18" height="3" rx="2" fill="#7777cc" opacity="0.3"/>
  <text x="480" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">p=0</text>
  <text x="564" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">p=0.5 (최대=0.5)</text>
  <text x="654" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">p=1</text>
  <text x="480" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">범위 [0, 0.5], 계산 빠름, sklearn 기본값</text>
  <text x="480" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CART 알고리즘의 기본 불순도 척도</text>

  <!-- VS badge -->
  <circle cx="440" cy="182" r="22" fill="#111827" stroke="#444" stroke-width="1"/>
  <text x="440" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">VS</text>

  <!-- Code block -->
  <text x="60" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">DecisionTreeClassifier 핵심 파라미터</text>
  <rect x="60" y="281" width="760" height="144" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="303" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="120" y="303" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> sklearn.tree </text>
  <text x="238" y="303" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="289" y="303" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> DecisionTreeClassifier</text>

  <text x="76" y="321" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">clf = DecisionTreeClassifier(</text>
  <text x="76" y="339" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    criterion=</text>
  <text x="176" y="339" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'gini'</text>
  <text x="222" y="339" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">,  # 'entropy' 또는 'gini'</text>
  <text x="76" y="357" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    max_depth=</text>
  <text x="183" y="357" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">5</text>
  <text x="196" y="357" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">,        # 트리 최대 깊이 (과적합 제어)</text>
  <text x="76" y="375" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    min_samples_split=</text>
  <text x="255" y="375" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">10</text>
  <text x="277" y="375" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">,   # 분기하려면 최소 샘플 수</text>
  <text x="76" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    min_samples_leaf=</text>
  <text x="254" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">4</text>
  <text x="267" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">,    # 리프 노드 최소 샘플 수</text>
  <text x="76" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    random_state=</text>
  <text x="202" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">42</text>
  <text x="222" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>

  <!-- Hyperparameter effect summary -->
  <rect x="60" y="436" width="360" height="12" rx="3" fill="#e05555" opacity="0.12"/>
  <text x="80" y="447" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">max_depth 크게 → 과적합 위험 ↑</text>
  <rect x="460" y="436" width="360" height="12" rx="3" fill="#55c555" opacity="0.12"/>
  <text x="480" y="447" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">min_samples_* 크게 → 가지치기 효과 (일반화 ↑)</text>

  <!-- Footer -->
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
