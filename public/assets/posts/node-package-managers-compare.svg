<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">npm · yarn · pnpm 패키지 매니저 비교</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">설치 속도 · 디스크 효율 · 엄격성 · 모노레포 지원</text>

  <!-- Headers -->
  <rect x="60" y="90" width="240" height="40" rx="6" fill="#1a2533" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="115" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600">npm</text>

  <rect x="320" y="90" width="240" height="40" rx="6" fill="#1a2533" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="115" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600">yarn (berry)</text>

  <rect x="580" y="90" width="240" height="40" rx="6" fill="#1a2533" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="115" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600">pnpm</text>

  <!-- Row: 설치 속도 -->
  <text x="60" y="158" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">설치 속도</text>
  <rect x="60" y="165" width="240" height="36" rx="5" fill="#111218"/>
  <text x="180" y="188" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">보통</text>
  <rect x="320" y="165" width="240" height="36" rx="5" fill="#111218"/>
  <text x="440" y="188" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">빠름 (PnP: 매우 빠름)</text>
  <rect x="580" y="165" width="240" height="36" rx="5" fill="#111218"/>
  <text x="700" y="188" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">매우 빠름</text>

  <!-- Row: 디스크 -->
  <text x="60" y="220" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">디스크 효율</text>
  <rect x="60" y="228" width="240" height="36" rx="5" fill="#111218"/>
  <text x="180" y="251" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">중복 복사</text>
  <rect x="320" y="228" width="240" height="36" rx="5" fill="#111218"/>
  <text x="440" y="251" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">ZIP 캐시 (PnP)</text>
  <rect x="580" y="228" width="240" height="36" rx="5" fill="#111218"/>
  <text x="700" y="251" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">콘텐츠 주소 스토어</text>

  <!-- Row: 엄격성 -->
  <text x="60" y="283" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">팬텀 의존성</text>
  <rect x="60" y="290" width="240" height="36" rx="5" fill="#111218"/>
  <text x="180" y="313" text-anchor="middle" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">허용 (플랫 node_modules)</text>
  <rect x="320" y="290" width="240" height="36" rx="5" fill="#111218"/>
  <text x="440" y="313" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">차단 (PnP)</text>
  <rect x="580" y="290" width="240" height="36" rx="5" fill="#111218"/>
  <text x="700" y="313" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">차단 (심링크)</text>

  <!-- Row: 모노레포 -->
  <text x="60" y="346" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">모노레포 지원</text>
  <rect x="60" y="354" width="240" height="36" rx="5" fill="#111218"/>
  <text x="180" y="377" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">workspaces</text>
  <rect x="320" y="354" width="240" height="36" rx="5" fill="#111218"/>
  <text x="440" y="377" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">workspaces + 플러그인</text>
  <rect x="580" y="354" width="240" height="36" rx="5" fill="#111218"/>
  <text x="700" y="377" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">workspaces (1등급)</text>

  <!-- Row: 잠금 파일 -->
  <text x="60" y="409" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">잠금 파일</text>
  <rect x="60" y="416" width="240" height="36" rx="5" fill="#111218"/>
  <text x="180" y="439" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">package-lock.json</text>
  <rect x="320" y="416" width="240" height="36" rx="5" fill="#111218"/>
  <text x="440" y="439" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">yarn.lock</text>
  <rect x="580" y="416" width="240" height="36" rx="5" fill="#111218"/>
  <text x="700" y="439" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">pnpm-lock.yaml</text>

  <!-- Bottom note -->
  <text x="440" y="475" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">팬텀 의존성: package.json에 명시하지 않은 패키지를 require/import할 수 있는 현상</text>
</svg>
