<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">React 동작 원리: 컴포넌트 트리와 렌더링</text>

  <!-- Step 1: 컴포넌트 트리 -->
  <rect x="60" y="68" width="220" height="200" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">컴포넌트 트리</text>

  <rect x="100" y="110" width="120" height="36" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">App</text>

  <line x1="130" y1="146" x2="130" y2="160" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="190" y1="146" x2="190" y2="160" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="82" y="168" width="90" height="34" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="127" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Header</text>

  <rect x="182" y="168" width="90" height="34" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="227" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Main</text>

  <line x1="227" y1="202" x2="227" y2="218" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="182" y="226" width="90" height="34" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="227" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Card</text>

  <!-- Arrow 1 to 2 -->
  <line x1="280" y1="168" x2="330" y2="168" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Virtual DOM -->
  <rect x="330" y="68" width="220" height="200" rx="12" fill="#0f1825" stroke="#e0c044" stroke-width="1.5"/>
  <text x="440" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0c044">Virtual DOM</text>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(메모리 내 가상 트리)</text>

  <rect x="360" y="132" width="160" height="34" rx="8" fill="#1a1a0d" stroke="#e0c044" stroke-width="1"/>
  <text x="440" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0c044">{ type: 'div', props: {...} }</text>

  <text x="440" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">상태 변경 시 새</text>
  <text x="440" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Virtual DOM 생성</text>
  <text x="440" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">&#x2192; 이전과 비교(diffing)</text>
  <text x="440" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">&#x2192; 변경된 부분만 계산</text>

  <!-- Arrow 2 to 3 -->
  <line x1="550" y1="168" x2="600" y2="168" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Real DOM -->
  <rect x="600" y="68" width="220" height="200" rx="12" fill="#0f1825" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Real DOM</text>
  <text x="710" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(브라우저 실제 DOM)</text>

  <rect x="630" y="132" width="160" height="34" rx="8" fill="#0d2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&lt;div class="app"&gt;...</text>

  <text x="710" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">변경된 부분만</text>
  <text x="710" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">실제 DOM에 반영</text>
  <text x="710" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2192; 최소 DOM 조작</text>
  <text x="710" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#x2192; 빠른 렌더링</text>

  <!-- Code block -->
  <rect x="60" y="298" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// React 앱 진입점 — Virtual DOM을 Real DOM에 마운트</text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> React </tspan><tspan font-weight="600" fill="#7ec8e3">from</tspan><tspan fill="#ce9178"> 'react'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> { createRoot } </tspan><tspan font-weight="600" fill="#7ec8e3">from</tspan><tspan fill="#ce9178"> 'react-dom/client'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> App </tspan><tspan font-weight="600" fill="#7ec8e3">from</tspan><tspan fill="#ce9178"> './App'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">createRoot(document.getElementById(</tspan><tspan fill="#ce9178">'root'</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  .render(&lt;App /&gt;);</tspan></text>
  <text x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// id="root"인 &lt;div&gt;에 전체 React 앱을 마운트</text>
</svg>
