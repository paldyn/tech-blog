<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">서브모듈 5대 함정</text>

  <!-- Pitfall 1 -->
  <rect x="60" y="68" width="370" height="84" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">① 빈 디렉터리 함정</text>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">git clone 후 서브모듈 디렉터리가 비어 있음</text>
  <text x="80" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">→ --recurse-submodules 또는 init+update 필요</text>

  <!-- Pitfall 2 -->
  <rect x="450" y="68" width="370" height="84" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">② Detached HEAD 커밋 소실</text>
  <text x="470" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">브랜치 없이 커밋하면 update 시 덮어씌워짐</text>
  <text x="470" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">→ 작업 전 반드시 git switch &lt;branch&gt;</text>

  <!-- Pitfall 3 -->
  <rect x="60" y="170" width="370" height="84" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">③ 포인터 커밋 누락</text>
  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">서브모듈 변경 후 메인 저장소 커밋 안 함</text>
  <text x="80" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">→ git add &lt;submodule-path&gt; &amp;&amp; git commit</text>

  <!-- Pitfall 4 -->
  <rect x="450" y="170" width="370" height="84" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">④ URL 변경 미동기화</text>
  <text x="470" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">.gitmodules 수정해도 .git/config 반영 안 됨</text>
  <text x="470" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">→ git submodule sync 실행 필요</text>

  <!-- Pitfall 5 -->
  <rect x="60" y="272" width="760" height="84" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">⑤ 서브모듈 제거 불완전</text>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">디렉터리만 삭제하면 .gitmodules, .git/config, .git/modules 잔존</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">→ deinit → git rm → rm -rf .git/modules/&lt;name&gt; → commit</text>

  <!-- Code reminder -->
  <rect x="60" y="376" width="760" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">안전한 서브모듈 워크플로 체크리스트</text>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">☑  clone 시 --recurse-submodules 사용</text>
  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">☑  서브모듈 수정 전 브랜치 checkout 확인</text>
  <text x="400" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">☑  포인터 변경 후 메인 저장소 커밋</text>
  <text x="400" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">☑  URL 변경 시 submodule sync 실행</text>
  <text x="80" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">☑  제거 시 deinit → git rm → .git/modules 삭제 3단계</text>
</svg>
