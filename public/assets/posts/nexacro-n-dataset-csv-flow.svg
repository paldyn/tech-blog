<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Dataset ↔ CSV 변환 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">saveCSV / loadCSV / 수동 파싱</text>

  <!-- Left: CSV text -->
  <rect x="60" y="92" width="340" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// CSV 문자열 예시</text>
  <text x="80" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">CODE,NAME,AMT</text>
  <text x="80" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">A01,사과,5000</text>
  <text x="80" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">A02,배,8000</text>
  <text x="80" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">A03,포도,12000</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">첫 행: 헤더 (컬럼명)</text>

  <!-- Arrow loadCSV -->
  <polygon points="422,157 452,149 452,165" fill="#7ec8e3"/>
  <line x1="400" y1="157" x2="452" y2="157" stroke="#7ec8e3" stroke-width="2"/>
  <text x="426" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">loadCSV()</text>

  <!-- Arrow saveCSV (reverse) -->
  <polygon points="400,177 370,169 370,185" fill="#7777cc"/>
  <line x1="400" y1="177" x2="452" y2="177" stroke="#7777cc" stroke-width="2"/>
  <text x="426" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">saveCSV()</text>

  <!-- Right: Dataset -->
  <rect x="452" y="92" width="368" height="130" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="636" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Dataset (dsMain)</text>
  <line x1="452" y1="128" x2="820" y2="128" stroke="#222" stroke-width="1"/>
  <text x="490" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CODE</text>
  <text x="580" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NAME</text>
  <text x="670" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AMT</text>
  <line x1="452" y1="152" x2="820" y2="152" stroke="#222" stroke-width="1"/>
  <text x="490" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">A01</text>
  <text x="580" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">사과</text>
  <text x="670" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">5000</text>
  <text x="490" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">A02</text>
  <text x="580" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">배</text>
  <text x="670" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">8000</text>
  <text x="490" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">A03</text>
  <text x="580" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">포도</text>
  <text x="670" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">12000</text>

  <!-- Warning notes -->
  <rect x="60" y="252" width="760" height="150" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">주의사항 — CSV 한글·특수문자 처리</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">① 인코딩: 파일 다운로드 시 서버에서 EUC-KR / UTF-8 BOM 지정 필요</text>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">② 쉼표 포함 값: 큰따옴표로 감싸야 함 — "홍길동, 과장"</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">③ saveCSV 구분자: 기본 탭 문자(\t) — 쉼표 구분자로 바꾸려면 인자 전달</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">④ loadCSV 후 rowType: 모두 NORMAL(1) → 서버 전송 대상 아님</text>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 수정 추적 필요 시 addRow() 방식 사용 권장</text>
</svg>
