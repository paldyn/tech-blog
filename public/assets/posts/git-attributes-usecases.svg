<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">.gitattributes 실전 활용</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">팀 프로젝트에서 자주 사용하는 패턴 모음</text>

  <!-- Code block: comprehensive example -->
  <rect x="60" y="88" width="760" height="244" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="112" fill="#9aa4b8"># 텍스트 파일 — 자동 EOL 감지</tspan>
    <tspan x="76" dy="18" fill="#ce9178">*</tspan><tspan fill="#ffffff">           </tspan><tspan fill="#7ec8e3" font-weight="600">text</tspan><tspan fill="#ffffff">=auto</tspan>
    <tspan x="76" dy="22" fill="#9aa4b8"># 항상 LF (스크립트, 설정 파일)</tspan>
    <tspan x="76" dy="18" fill="#ce9178">*.sh</tspan><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">text</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">eol</tspan><tspan fill="#ffffff">=lf</tspan>
    <tspan x="76" dy="18" fill="#ce9178">Makefile</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">text</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">eol</tspan><tspan fill="#ffffff">=lf</tspan>
    <tspan x="76" dy="22" fill="#9aa4b8"># Windows 배치 파일 — CRLF</tspan>
    <tspan x="76" dy="18" fill="#ce9178">*.bat</tspan><tspan fill="#ffffff">       </tspan><tspan fill="#7ec8e3" font-weight="600">text</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">eol</tspan><tspan fill="#ffffff">=crlf</tspan>
    <tspan x="76" dy="22" fill="#9aa4b8"># 바이너리 — 변환 없음</tspan>
    <tspan x="76" dy="18" fill="#ce9178">*.png *.jpg *.gif</tspan><tspan fill="#ffffff">  binary</tspan>
    <tspan x="76" dy="18" fill="#ce9178">*.zip *.tar.gz</tspan><tspan fill="#ffffff">     binary</tspan>
  </text>

  <!-- Use-case cards -->
  <rect x="60" y="350" width="175" height="50" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="147" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">EOL 정규화</text>
  <text x="147" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">플랫폼 간 줄 끝 통일</text>

  <rect x="251" y="350" width="175" height="50" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="338" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">LFS 연동</text>
  <text x="338" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">filter=lfs 설정</text>

  <rect x="442" y="350" width="175" height="50" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="529" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Diff 드라이버</text>
  <text x="529" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">언어별 diff 최적화</text>

  <rect x="633" y="350" width="175" height="50" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="720" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Merge 전략</text>
  <text x="720" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일별 병합 방식 지정</text>
</svg>
