<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">힙 정렬: Max-Heap 구축 → 추출</text>

  <!-- === LEFT PANEL: Build Max-Heap === -->
  <!-- Section label -->
  <text x="210" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">1단계: 힙 구축</text>

  <!-- Initial array label -->
  <text x="70" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">입력 배열</text>

  <!-- Initial array boxes -->
  <rect x="70" y="118" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="92" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">4</text>

  <rect x="118" y="118" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">10</text>

  <rect x="166" y="118" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="188" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">3</text>

  <rect x="214" y="118" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="236" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">5</text>

  <rect x="262" y="118" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="284" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">1</text>

  <!-- Array index labels -->
  <text x="92" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">0</text>
  <text x="140" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">1</text>
  <text x="188" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">2</text>
  <text x="236" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">3</text>
  <text x="284" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">4</text>

  <!-- Arrow down: heapify -->
  <line x1="210" y1="186" x2="210" y2="216" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="220" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">heapify</text>

  <!-- Max-Heap tree -->
  <!-- Edges first -->
  <line x1="210" y1="252" x2="148" y2="312" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="210" y1="252" x2="272" y2="312" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="148" y1="332" x2="116" y2="390" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="148" y1="332" x2="180" y2="390" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Root node: 10 -->
  <circle cx="210" cy="240" r="24" fill="#1a2744" stroke="#7ec8e3" stroke-width="2"/>
  <text x="210" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">10</text>

  <!-- Level 1: 5, 3 -->
  <circle cx="148" cy="320" r="22" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="148" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">5</text>

  <circle cx="272" cy="320" r="22" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="272" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">3</text>

  <!-- Level 2: 4, 1 -->
  <circle cx="108" cy="400" r="22" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="108" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">4</text>

  <circle cx="188" cy="400" r="22" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="188" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">1</text>

  <!-- Tree labels -->
  <text x="210" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">루트(최대값)</text>

  <!-- Max-Heap array representation -->
  <text x="70" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Max-Heap 배열</text>

  <rect x="70" y="464" width="44" height="44" rx="6" fill="#1a2744" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="92" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">10</text>

  <rect x="118" y="464" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">5</text>

  <rect x="166" y="464" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="188" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">3</text>

  <rect x="214" y="464" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="236" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">4</text>

  <rect x="262" y="464" width="44" height="44" rx="6" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="284" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">1</text>

  <!-- === DIVIDER === -->
  <line x1="440" y1="70" x2="440" y2="520" stroke="#222" stroke-width="1"/>

  <!-- === RIGHT PANEL: Extract Max === -->
  <text x="660" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">2단계: 최댓값 추출 반복</text>

  <!-- Step rows -->
  <!-- Step 1 -->
  <text x="460" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">반복 1: swap(a[0],a[4]) → heapify</text>
  <rect x="460" y="120" width="36" height="36" rx="5" fill="#2a1f1f" stroke="#e05555" stroke-width="1.5"/>
  <text x="478" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">1</text>
  <rect x="500" y="120" width="36" height="36" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="518" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">4</text>
  <rect x="540" y="120" width="36" height="36" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="558" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">3</text>
  <rect x="580" y="120" width="36" height="36" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="598" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">5</text>
  <rect x="620" y="120" width="36" height="36" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="638" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">10</text>
  <text x="670" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">← 확정</text>

  <!-- Step 2 -->
  <text x="460" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">반복 2: swap(a[0],a[3]) → heapify</text>
  <rect x="460" y="192" width="36" height="36" rx="5" fill="#2a1f1f" stroke="#e05555" stroke-width="1.5"/>
  <text x="478" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">1</text>
  <rect x="500" y="192" width="36" height="36" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="518" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">3</text>
  <rect x="540" y="192" width="36" height="36" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="558" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">4</text>
  <rect x="580" y="192" width="36" height="36" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="598" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">5</text>
  <rect x="620" y="192" width="36" height="36" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="638" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">10</text>

  <!-- Step 3 -->
  <text x="460" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">반복 3: swap(a[0],a[2]) → heapify</text>
  <rect x="460" y="264" width="36" height="36" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="478" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">1</text>
  <rect x="500" y="264" width="36" height="36" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="518" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8">3</text>
  <rect x="540" y="264" width="36" height="36" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="558" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">4</text>
  <rect x="580" y="264" width="36" height="36" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="598" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">5</text>
  <rect x="620" y="264" width="36" height="36" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="638" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">10</text>

  <!-- Final result -->
  <rect x="460" y="340" width="360" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">최종 정렬 결과</text>
  <text x="640" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">[ 1, 3, 4, 5, 10 ]</text>

  <!-- Complexity info -->
  <rect x="460" y="420" width="360" height="80" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">시간 복잡도</text>
  <text x="480" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Build-Heap: O(N)</text>
  <text x="480" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">N번 추출 × O(log N) = <tspan font-weight="700" fill="#7ec8e3">O(N log N)</tspan></text>
  <text x="700" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">공간 복잡도</text>
  <text x="700" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">O(1)</text>
  <text x="700" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">In-place 정렬</text>
</svg>
