<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Encoder-Decoder 적용 태스크</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">소스 시퀀스 → 타깃 시퀀스 변환이 필요한 모든 태스크에 적합</text>

  <!-- Task cards -->
  <!-- Row 1 -->
  <!-- Translation -->
  <rect x="50" y="96" width="240" height="90" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">기계 번역</text>
  <text x="170" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">EN: "I love AI"</text>
  <text x="170" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">→ KO: "나는 AI를 사랑한다"</text>
  <text x="170" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">모델: T5, BART, mBART</text>

  <!-- Summarization -->
  <rect x="320" y="96" width="240" height="90" fill="#111827" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">문서 요약</text>
  <text x="440" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">긴 기사 / 논문 → 핵심 요약문</text>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">추상 요약 (새 문장 생성)</text>
  <text x="440" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">모델: BART, PEGASUS</text>

  <!-- QA -->
  <rect x="590" y="96" width="240" height="90" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">질의응답</text>
  <text x="710" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">컨텍스트 + 질문 → 답변</text>
  <text x="710" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">생성형 QA (추출 대신 생성)</text>
  <text x="710" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">모델: T5-based, Flan</text>

  <!-- Row 2 -->
  <!-- Code generation -->
  <rect x="50" y="210" width="240" height="90" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">코드 생성</text>
  <text x="170" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">자연어 명세 → 코드</text>
  <text x="170" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">"정렬 함수 작성" → Python</text>
  <text x="170" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">모델: CodeT5, StarCoder</text>

  <!-- Dialog -->
  <rect x="320" y="210" width="240" height="90" fill="#111827" rx="8" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b5cea8" text-anchor="middle">대화 시스템</text>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">대화 이력 → 다음 응답</text>
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Seq2Seq 프레임워크 활용</text>
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">모델: Blenderbot, DialoGPT</text>

  <!-- Data-to-text -->
  <rect x="590" y="210" width="240" height="90" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">데이터→텍스트</text>
  <text x="710" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">테이블 / 지식 그래프 → 문장</text>
  <text x="710" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">스포츠 기록 → 뉴스 기사</text>
  <text x="710" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">모델: T5, GPT 파인튜닝</text>

  <!-- Architecture comparison -->
  <rect x="50" y="320" width="780" height="96" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">아키텍처 선택 가이드</text>

  <text x="66" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Encoder-only (BERT)</text>
  <text x="66" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">분류, NER, 감성 분석 — 이해 중심</text>

  <text x="310" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Decoder-only (GPT)</text>
  <text x="310" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">텍스트 생성, LLM — 생성 중심</text>

  <text x="570" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Encoder-Decoder (T5, BART)</text>
  <text x="570" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">번역, 요약, 변환 — 조건부 생성</text>

  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">Decoder-only LLM도 프롬프트 엔지니어링으로 Enc-Dec 태스크를 수행할 수 있으나, 순수 Enc-Dec이 더 효율적</text>
</svg>
