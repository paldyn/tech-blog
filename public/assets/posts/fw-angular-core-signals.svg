<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Angular Signals (v16+) — Zone.js 없는 반응성</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">signal / computed / effect — 세밀한 업데이트</text>

  <!-- Signal -->
  <rect x="60" y="100" width="200" height="56" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">signal(value)</text>
  <text x="160" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">읽기/쓰기 Signal</text>

  <line x1="260" y1="128" x2="310" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- computed -->
  <rect x="315" y="100" width="200" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="415" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">computed(() => ...)</text>
  <text x="415" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">읽기 전용 파생 Signal</text>

  <line x1="515" y1="128" x2="565" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- effect -->
  <rect x="570" y="100" width="250" height="56" rx="8" fill="#1f1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="695" y="124" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">effect(() => ...)</text>
  <text x="695" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Signal 읽으면 자동 의존성 등록</text>

  <!-- Code blocks side by side -->
  <rect x="60" y="180" width="380" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// Signals 사용</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">@Component({ changeDetection: ChangeDetectionStrategy.OnPush })</text>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export class</tspan> CounterComponent {</text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  count = signal(<tspan fill="#b5cea8">0</tspan>)</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  doubled = computed(() =&gt; <tspan fill="#7ec8e3" font-weight="600">this</tspan>.count() * <tspan fill="#b5cea8">2</tspan>)</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  constructor() {</text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    effect(() =&gt; console.log(<tspan fill="#7ec8e3" font-weight="600">this</tspan>.count()))</text>
  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  increment() { <tspan fill="#7ec8e3" font-weight="600">this</tspan>.count.update(n =&gt; n + <tspan fill="#b5cea8">1</tspan>) }</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">}</text>

  <rect x="460" y="180" width="380" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 템플릿에서 Signal 사용</text>
  <text x="476" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;p&gt;Count: &#123;&#123; count() &#125;&#125;&lt;/p&gt; &lt;!-- () 호출 필수 --&gt;</text>
  <text x="476" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;p&gt;Doubled: &#123;&#123; doubled() &#125;&#125;&lt;/p&gt;</text>
  <text x="476" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;button (click)="increment()"&gt;증가&lt;/button&gt;</text>
  <text x="476" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// toSignal: Observable → Signal 변환</text>
  <text x="476" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">users = toSignal(this.userService.getAll(), {</text>
  <text x="476" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  initialValue: []</text>
  <text x="476" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">})</text>
  <text x="476" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// async pipe 없이 템플릿에서 users() 호출</text>
</svg>
