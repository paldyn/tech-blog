<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Bash 문자열 조작 문법</text>

  <!-- Length &amp; Substring -->
  <rect x="60" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">길이 · 부분 문자열</text>
  <rect x="60" y="106" width="370" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">STR=</tspan><tspan fill="#ce9178">"Hello, World!"</tspan></text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${#STR}        </tspan><tspan fill="#9aa4b8"># 13 (길이)</tspan></text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${STR:7}       </tspan><tspan fill="#9aa4b8"># World!</tspan></text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${STR:7:5}     </tspan><tspan fill="#9aa4b8"># World</tspan></text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${STR: -6}     </tspan><tspan fill="#9aa4b8"># orld!  (음수)</tspan></text>
  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${STR: -6:5}   </tspan><tspan fill="#9aa4b8"># orld</tspan></text>
  <text x="76" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${STR^^}       </tspan><tspan fill="#9aa4b8"># HELLO, WORLD!</tspan></text>
  <text x="76" y="252" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> ${STR,,}       </tspan><tspan fill="#9aa4b8"># hello, world!</tspan></text>

  <!-- Pattern removal -->
  <rect x="450" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">패턴 제거 (앞/뒤)</text>
  <rect x="450" y="106" width="370" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">FILE=</tspan><tspan fill="#ce9178">"/path/to/file.tar.gz"</tspan></text>
  <text x="466" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${FILE</tspan><tspan fill="#7ec8e3" font-weight="600">#</tspan><tspan fill="#ffffff">*/}     </tspan><tspan fill="#9aa4b8"># file.tar.gz (앞 최단)</tspan></text>
  <text x="466" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${FILE</tspan><tspan fill="#7ec8e3" font-weight="600">##</tspan><tspan fill="#ffffff">*/}    </tspan><tspan fill="#9aa4b8"># file.tar.gz (앞 최장)</tspan></text>
  <text x="466" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${FILE</tspan><tspan fill="#7ec8e3" font-weight="600">%</tspan><tspan fill="#ffffff">.*}     </tspan><tspan fill="#9aa4b8"># /path/to/file.tar (뒤 최단)</tspan></text>
  <text x="466" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${FILE</tspan><tspan fill="#7ec8e3" font-weight="600">%%</tspan><tspan fill="#ffffff">.*}    </tspan><tspan fill="#9aa4b8"># /path/to/file (뒤 최장)</tspan></text>
  <text x="466" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="466" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># basename/dirname 대체</text>
  <text x="466" y="252" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">name=${FILE##*/}    ext=${FILE##*.}</tspan></text>

  <!-- Substitution -->
  <rect x="60" y="272" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="294" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">치환 (/ 와 //)</text>
  <rect x="60" y="314" width="370" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="334" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">STR=</tspan><tspan fill="#ce9178">"foo bar foo baz"</tspan></text>
  <text x="76" y="352" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${STR/foo/FOO}   </tspan><tspan fill="#9aa4b8"># FOO bar foo baz</tspan></text>
  <text x="76" y="370" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${STR//foo/FOO}  </tspan><tspan fill="#9aa4b8"># FOO bar FOO baz</tspan></text>
  <text x="76" y="388" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${STR/#foo/FOO}  </tspan><tspan fill="#9aa4b8"># 앞에서만</tspan></text>
  <text x="76" y="406" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${STR/%baz/BAZ}  </tspan><tspan fill="#9aa4b8"># 뒤에서만</tspan></text>
  <text x="76" y="424" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${STR// /}       </tspan><tspan fill="#9aa4b8"># 공백 제거</tspan></text>

  <!-- Default values -->
  <rect x="450" y="272" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="294" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">기본값 / 존재 확인</text>
  <rect x="450" y="314" width="370" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="334" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${VAR:-default}  </tspan><tspan fill="#9aa4b8"># 미설정시 default</tspan></text>
  <text x="466" y="352" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${VAR:=default}  </tspan><tspan fill="#9aa4b8"># 미설정시 설정+반환</tspan></text>
  <text x="466" y="370" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${VAR:+other}    </tspan><tspan fill="#9aa4b8"># 설정시 other</tspan></text>
  <text x="466" y="388" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">${VAR:?"msg"}    </tspan><tspan fill="#9aa4b8"># 미설정시 에러</tspan></text>
  <text x="466" y="406" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="466" y="424" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># -v 로 설정 여부 확인</text>
  <text x="466" y="442" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> [[ -v VAR ]]; </tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"설정됨"</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">fi</tspan></text>
</svg>
