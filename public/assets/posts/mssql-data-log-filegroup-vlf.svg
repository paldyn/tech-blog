<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일 증가 전략 및 VLF 관리</text>

  <!-- Autogrowth bad -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">❌ 나쁜 패턴: % 자동 증가 (기본)</text>

  <rect x="60" y="105" width="760" height="60" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <!-- Small blocks getting bigger -->
  <rect x="80" y="120" width="40" height="28" rx="3" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">1MB</text>
  <rect x="125" y="120" width="50" height="28" rx="3" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="150" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">10%</text>
  <rect x="180" y="120" width="60" height="28" rx="3" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="210" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">10%</text>
  <rect x="245" y="120" width="80" height="28" rx="3" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="285" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">10%↑</text>
  <text x="600" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">VLF 수 급증 → 로그 스캔·백업 느려짐</text>

  <!-- Autogrowth good -->
  <text x="60" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">✓ 좋은 패턴: 고정 크기 증가 + 사전 할당</text>

  <rect x="60" y="210" width="760" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <rect x="80" y="225" width="100" height="28" rx="3" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">512MB</text>
  <rect x="185" y="225" width="100" height="28" rx="3" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="235" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">512MB</text>
  <rect x="290" y="225" width="100" height="28" rx="3" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="340" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">512MB</text>
  <text x="600" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">균등한 VLF 크기 → 효율적 순환</text>

  <!-- SQL code for pre-allocation -->
  <rect x="60" y="292" width="760" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 파일 사전 할당 + 고정 크기 증가</text>
  <text xml:space="preserve" x="80" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">ALTER DATABASE</tspan><tspan fill="#ffffff"> AdventureWorks </tspan><tspan fill="#7ec8e3" font-weight="600">MODIFY FILE</tspan><tspan fill="#ffffff"> (</tspan></text>
  <text xml:space="preserve" x="80" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    NAME = </tspan><tspan fill="#ce9178">AdventureWorks_log</tspan><tspan fill="#ffffff">,</tspan></text>
  <text xml:space="preserve" x="80" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    SIZE = </tspan><tspan fill="#b5cea8">4096</tspan><tspan fill="#ffffff">MB,     </tspan><tspan fill="#9aa4b8">-- 사전 할당</tspan></text>
  <text xml:space="preserve" x="80" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    FILEGROWTH = </tspan><tspan fill="#b5cea8">512</tspan><tspan fill="#ffffff">MB  </tspan><tspan fill="#9aa4b8">-- 고정 크기 증가</tspan></text>
  <text xml:space="preserve" x="80" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">);</tspan></text>
  <text xml:space="preserve" x="80" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8">-- VLF 수 확인</tspan><tspan fill="#ffffff">   </tspan><tspan fill="#7ec8e3" font-weight="600">DBCC</tspan><tspan fill="#ffffff"> LOGINFO(</tspan><tspan fill="#ce9178">'AdventureWorks'</tspan><tspan fill="#ffffff">);</tspan></text>
</svg>
