<svg width="880" viewBox="0 0 880 590"
     xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="590" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-size="22" font-weight="700" fill="#e8e8e8">transaction() 요청·응답 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-size="14" fill="#888">서버 통신이 일어나는 6단계</text>

  <!-- ========== Left Panel: Code Example ========== -->
  <!-- Panel: x=60, width=355 (right=415), height=400 (bottom=488) -->
  <rect x="60" y="88" width="355" height="400"
        fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1" rx="8"/>
  <text x="80" y="112" font-size="14" font-weight="600" fill="#e8e8e8">스크립트 예시</text>

  <!-- Code block rect: x=80, width=315 (right=395 < 415 ✓) -->
  <!-- 11 lines × 18px = 198px content + 14+14 padding = 226px height -->
  <rect x="80" y="124" width="315" height="226"
        fill="#070b14" stroke="#1e2433" stroke-width="1" rx="6"/>

  <!-- Code text: Method A — each indent level adds 14px to base x=96 -->
  <!-- Level 0: x=96, Level 1: x=110, Level 2: x=124 -->
  <!-- Line spacing: exactly 18px. First line y = 124+14 = 138 -->

  <text x="96" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">// fn_search 구현</text>

  <text x="96" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">function fn_search() {</text>

  <text x="110" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">this.transaction(</text>

  <text x="124" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"search",</text>

  <text x="124" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"svc::HR.do",</text>

  <text x="124" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"input=ds_cond",</text>

  <text x="124" y="246" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"output=ds_result",</text>

  <text x="124" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"",</text>

  <text x="124" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">"fn_callback"</text>

  <text x="110" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">);</text>

  <text x="96" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">}</text>
  <!-- Code rect bottom = 124+226 = 350. Last line y=318, descent ~5 → 323 < 350 ✓ -->

  <!-- Parameter legend below code block: y=358 to y=488 -->
  <text x="80" y="364" font-size="12" font-weight="600" fill="#888">인자 구성 (6개)</text>

  <text x="80" y="382" font-size="11" fill="#7ec8e3">①</text>
  <text x="96" y="382" font-size="11" fill="#888">트랜잭션 ID ("search")</text>

  <text x="80" y="398" font-size="11" fill="#7ec8e3">②</text>
  <text x="96" y="398" font-size="11" fill="#888">서비스 URL ("svc::HR.do")</text>

  <text x="80" y="414" font-size="11" fill="#7ec8e3">③</text>
  <text x="96" y="414" font-size="11" fill="#888">입력 Dataset (ds_cond)</text>

  <text x="80" y="430" font-size="11" fill="#7ec8e3">④</text>
  <text x="96" y="430" font-size="11" fill="#888">출력 Dataset (ds_result)</text>

  <text x="80" y="446" font-size="11" fill="#7ec8e3">⑤</text>
  <text x="96" y="446" font-size="11" fill="#888">URL 추가 인자 ("")</text>

  <text x="80" y="462" font-size="11" fill="#7ec8e3">⑥</text>
  <text x="96" y="462" font-size="11" fill="#888">콜백 함수명 ("fn_callback")</text>
  <!-- Legend last line y=462 < panel bottom 488 ✓ -->

  <!-- ========== Right Panel: 6-Step Flow ========== -->
  <!-- Gap: 415 to 480 = 65px ✓ -->
  <!-- Panel: x=480, width=340 (right=820 = 880-60 ✓), height=400 (bottom=488) -->
  <rect x="480" y="88" width="340" height="400"
        fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1" rx="8"/>
  <text x="500" y="112" font-size="14" font-weight="600" fill="#e8e8e8">실행 흐름 (6단계)</text>

  <!-- Step boxes: x=500, width=300 (right=800 < 820 ✓) -->

  <!-- Step 1: y=124, h=50, CLIENT (blue) -->
  <rect x="500" y="124" width="300" height="50"
        fill="#0b1520" stroke="#1e3a5f" stroke-width="1" rx="5"/>
  <text x="522" y="144" font-size="16" font-weight="700" fill="#7ec8e3">1</text>
  <text x="546" y="144" font-size="13" font-weight="600" fill="#e8e8e8">사용자 클릭 → fn_search()</text>
  <text x="546" y="163" font-size="11" fill="#888">Button.onclick 이벤트 발생</text>

  <!-- Arrow 1→2 (y=174 to y=186, 12px) -->
  <line x1="650" y1="174" x2="650" y2="180" stroke="#555" stroke-width="1.5"/>
  <polygon points="647,180 653,180 650,186" fill="#555"/>

  <!-- Step 2: y=186, h=50, CLIENT (blue) -->
  <rect x="500" y="186" width="300" height="50"
        fill="#0b1520" stroke="#1e3a5f" stroke-width="1" rx="5"/>
  <text x="522" y="206" font-size="16" font-weight="700" fill="#7ec8e3">2</text>
  <text x="546" y="206" font-size="13" font-weight="600" fill="#e8e8e8">this.transaction() 실행</text>
  <text x="546" y="225" font-size="11" fill="#888">6개 인자 전달 및 비동기 요청 시작</text>

  <!-- Arrow 2→3 (y=236 to y=248, 12px) -->
  <line x1="650" y1="236" x2="650" y2="242" stroke="#555" stroke-width="1.5"/>
  <polygon points="647,242 653,242 650,248" fill="#555"/>

  <!-- Step 3: y=248, h=50, RUNTIME (green) -->
  <rect x="500" y="248" width="300" height="50"
        fill="#070e07" stroke="#1a3d1a" stroke-width="1" rx="5"/>
  <text x="522" y="268" font-size="16" font-weight="700" fill="#55c555">3</text>
  <text x="546" y="268" font-size="13" font-weight="600" fill="#e8e8e8">ds_cond 직렬화 (PL 포맷)</text>
  <text x="546" y="287" font-size="11" fill="#888">Transaction Manager 처리</text>

  <!-- Arrow 3→4 HTTP POST (y=298 to y=314, 16px) — labeled -->
  <line x1="650" y1="298" x2="650" y2="306" stroke="#7777cc" stroke-width="2"/>
  <polygon points="646,306 654,306 650,314" fill="#7777cc"/>
  <text x="658" y="308" font-size="11" fill="#7777cc">HTTP POST</text>

  <!-- Step 4: y=314, h=50, SERVER (red) -->
  <rect x="500" y="314" width="300" height="50"
        fill="#110710" stroke="#3d1a1a" stroke-width="1" rx="5"/>
  <text x="522" y="334" font-size="16" font-weight="700" fill="#e05555">4</text>
  <text x="546" y="334" font-size="13" font-weight="600" fill="#e8e8e8">어댑터 → 서비스 → DB 조회</text>
  <text x="546" y="353" font-size="11" fill="#888">PL 파싱 후 비즈니스 로직 실행</text>

  <!-- Arrow 4→5 HTTP Response (y=364 to y=380, 16px) — labeled -->
  <line x1="650" y1="364" x2="650" y2="372" stroke="#7777cc" stroke-width="2"/>
  <polygon points="646,372 654,372 650,380" fill="#7777cc"/>
  <text x="658" y="374" font-size="11" fill="#7777cc">HTTP Response</text>

  <!-- Step 5: y=380, h=50, RUNTIME (green) -->
  <rect x="500" y="380" width="300" height="50"
        fill="#070e07" stroke="#1a3d1a" stroke-width="1" rx="5"/>
  <text x="522" y="400" font-size="16" font-weight="700" fill="#55c555">5</text>
  <text x="546" y="400" font-size="13" font-weight="600" fill="#e8e8e8">ds_result 역직렬화 → 채움</text>
  <text x="546" y="419" font-size="11" fill="#888">PL 응답 → Dataset 자동 갱신</text>

  <!-- Arrow 5→6 (y=430 to y=442, 12px) -->
  <line x1="650" y1="430" x2="650" y2="436" stroke="#555" stroke-width="1.5"/>
  <polygon points="647,436 653,436 650,442" fill="#555"/>

  <!-- Step 6: y=442, h=34, CLIENT (blue) -->
  <rect x="500" y="442" width="300" height="34"
        fill="#0b1520" stroke="#1e3a5f" stroke-width="1" rx="5"/>
  <text x="522" y="463" font-size="14" font-weight="700" fill="#7ec8e3">6</text>
  <text x="546" y="463" font-size="13" font-weight="600" fill="#e8e8e8">fn_callback → UI 자동 갱신</text>
  <!-- Step 6 bottom: 442+34=476 < panel bottom 488 ✓ -->

  <!-- Footer -->
  <text x="440" y="548" text-anchor="middle"
        font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈</text>

</svg>
