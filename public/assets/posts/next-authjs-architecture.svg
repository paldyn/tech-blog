<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Auth.js v5 아키텍처</text>

  <!-- Browser -->
  <rect x="60" y="80" width="130" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">브라우저</text>
  <text x="125" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">소셜 로그인 클릭</text>

  <!-- Arrow to Provider -->
  <line x1="190" y1="107" x2="248" y2="107" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="219" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">OAuth</text>

  <!-- OAuth Provider -->
  <rect x="250" y="80" width="160" height="54" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="330" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">OAuth Provider</text>
  <text x="330" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Google / GitHub / Kakao</text>

  <!-- Arrow callback -->
  <line x1="330" y1="134" x2="330" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="350" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">callback</text>

  <!-- Auth.js core -->
  <rect x="250" y="172" width="360" height="64" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="430" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Auth.js (NextAuth v5)</text>
  <text x="430" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">auth.ts — NextAuth() 인스턴스</text>
  <text x="430" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Route Handler + Middleware + Server 모두에서 동일 인스턴스 사용</text>

  <!-- Arrow to Session store -->
  <line x1="430" y1="236" x2="430" y2="274" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Session (JWT cookie) -->
  <rect x="340" y="276" width="180" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="430" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">JWT 세션 쿠키</text>
  <text x="430" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">암호화된 httpOnly 쿠키</text>

  <!-- Four consumers -->
  <rect x="60" y="370" width="160" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Middleware</text>
  <text x="140" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">auth() 호출 → 라우트 보호</text>
  <text x="140" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Edge Runtime 호환</text>

  <rect x="240" y="370" width="160" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="320" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Server Component</text>
  <text x="320" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">auth() → session 반환</text>
  <text x="320" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">캐시 공유 (같은 요청)</text>

  <rect x="420" y="370" width="160" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="500" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Server Action</text>
  <text x="500" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">auth() → 액션 내 검증</text>
  <text x="500" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">직접 import 사용</text>

  <rect x="600" y="370" width="220" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Route Handler</text>
  <text x="710" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">GET/POST /api/auth/[...nextauth]</text>
  <text x="710" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">자동 엔드포인트 처리</text>

  <!-- Connecting lines from session to consumers -->
  <line x1="340" y1="330" x2="140" y2="370" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="390" y1="330" x2="320" y2="370" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="470" y1="330" x2="500" y2="370" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="520" y1="330" x2="710" y2="370" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>

  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">providers: [], callbacks: &#123;&#125;, pages: &#123;&#125;, session: &#123; strategy: 'jwt' &#125; — auth.ts 하나로 전체 설정 관리</text>
  <text x="440" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Database adapter 연결 시 세션을 DB에 저장 가능 (Prisma, Drizzle 등)</text>
</svg>
