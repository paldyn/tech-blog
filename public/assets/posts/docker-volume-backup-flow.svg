<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">볼륨 백업 흐름</text>

  <!-- Source volume -->
  <rect x="60" y="80" width="160" height="80" fill="#0f1f2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">source-vol</text>
  <text x="140" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Named Volume</text>
  <text x="140" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">백업할 볼륨</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="120" x2="258" y2="120" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="266,120 254,114 254,126" fill="#7ec8e3"/>

  <!-- Backup container -->
  <rect x="266" y="68" width="220" height="100" fill="#111318" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="376" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">백업 컨테이너 (alpine)</text>
  <text x="376" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">-v source-vol:/data</text>
  <text x="376" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">-v $(pwd):/backup</text>
  <text x="376" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">tar czf /backup/out.tar.gz /data</text>

  <!-- Arrow 2 -->
  <line x1="486" y1="120" x2="524" y2="120" stroke="#55c555" stroke-width="2"/>
  <polygon points="532,120 520,114 520,126" fill="#55c555"/>

  <!-- Archive file -->
  <rect x="532" y="80" width="160" height="80" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="612" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">backup.tar.gz</text>
  <text x="612" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">호스트에 저장</text>
  <text x="612" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">원격 전송 가능</text>

  <!-- Restore section -->
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">── 복원 ──</text>

  <!-- Archive source for restore -->
  <rect x="60" y="220" width="160" height="80" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">backup.tar.gz</text>
  <text x="140" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">백업 파일</text>

  <!-- Arrow -->
  <line x1="220" y1="260" x2="258" y2="260" stroke="#7777cc" stroke-width="2"/>
  <polygon points="266,260 254,254 254,266" fill="#7777cc"/>

  <!-- Restore container -->
  <rect x="266" y="208" width="220" height="100" fill="#111318" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="376" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">복원 컨테이너 (alpine)</text>
  <text x="376" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">-v target-vol:/data</text>
  <text x="376" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">-v $(pwd):/backup</text>
  <text x="376" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">tar xzf /backup/out.tar.gz -C /</text>

  <!-- Arrow -->
  <line x1="486" y1="260" x2="524" y2="260" stroke="#7777cc" stroke-width="2"/>
  <polygon points="532,260 520,254 520,266" fill="#7777cc"/>

  <!-- Target volume -->
  <rect x="532" y="220" width="160" height="80" fill="#0f1f2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="612" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">target-vol</text>
  <text x="612" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">복원된 볼륨</text>

  <!-- Note -->
  <rect x="60" y="330" width="760" height="50" fill="#111318" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">핵심: 볼륨을 직접 복사하는 API는 없다. alpine 같은 임시 컨테이너로 볼륨을 마운트한 뒤</text>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">tar로 압축·해제하는 방식이 표준이다.</text>
</svg>
