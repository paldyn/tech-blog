<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Pino 로거 설정과 구조화 로그</text>

  <!-- Left: pino setup -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">logger.js — 전역 로거 설정</text>
  <rect x="60" y="94" width="360" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> pino</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> from</tspan>
    <tspan fill="#ce9178"> 'pino'</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text xml:space="preserve" x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> isDev = process.env.NODE_ENV</tspan>
  </text>
  <text xml:space="preserve" x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">              </tspan>
    <tspan fill="#7ec8e3" font-weight="600">!==</tspan>
    <tspan fill="#ce9178"> 'production'</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text xml:space="preserve" x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export const</tspan>
    <tspan fill="#ffffff"> logger = pino({</tspan>
  </text>
  <text xml:space="preserve" x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  level: process.env.LOG_LEVEL</tspan>
  </text>
  <text xml:space="preserve" x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">         </tspan>
    <tspan fill="#7ec8e3" font-weight="600">??</tspan>
    <tspan fill="#ffffff"> (isDev </tspan>
    <tspan fill="#7ec8e3" font-weight="600">?</tspan>
    <tspan fill="#ce9178"> 'debug'</tspan>
    <tspan fill="#ffffff"> : </tspan>
    <tspan fill="#ce9178">'warn'</tspan>
    <tspan fill="#ffffff">),</tspan>
  </text>
  <text xml:space="preserve" x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  transport: isDev</text>
  <text xml:space="preserve" x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    ? { target: </tspan>
    <tspan fill="#ce9178">'pino-pretty'</tspan>
    <tspan fill="#ffffff"> }</tspan>
  </text>
  <text xml:space="preserve" x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    : </tspan>
    <tspan fill="#7ec8e3" font-weight="600">undefined</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#9aa4b8">// JSON</tspan>
  </text>
  <text xml:space="preserve" x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  redact: [</text>
  <text xml:space="preserve" x="76" y="294" font-family="'JetBrains Mono','Consolas',monospace"
        font-size="13">
    <tspan fill="#ce9178">    'req.headers.authorization'</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text xml:space="preserve" x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ce9178">    '*.password'</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">'*.token'</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text xml:space="preserve" x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  ],</text>
  <text xml:space="preserve" x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">});</text>

  <!-- Right: usage -->
  <text x="460" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">구조화 로그 사용 패턴</text>
  <rect x="460" y="94" width="360" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 컨텍스트 포함 로그 (첫 인자=객체)</text>
  <text xml:space="preserve" x="476" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">logger.info(</tspan>
  </text>
  <text xml:space="preserve" x="476" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  { userId: </tspan>
    <tspan fill="#b5cea8">42</tspan>
    <tspan fill="#ffffff">, action: </tspan>
    <tspan fill="#ce9178">'login'</tspan>
    <tspan fill="#ffffff"> },</tspan>
  </text>
  <text xml:space="preserve" x="476" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ce9178">  '사용자 로그인 성공'</tspan>
  </text>
  <text xml:space="preserve" x="476" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</tspan>
  <text xml:space="preserve" x="476" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 에러 로그</text>
  <text xml:space="preserve" x="476" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">logger.error(</tspan>
  </text>
  <text xml:space="preserve" x="476" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  { err: error, requestId },</tspan>
  </text>
  <text xml:space="preserve" x="476" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ce9178">  'DB 쿼리 실패'</tspan>
  </text>
  <text xml:space="preserve" x="476" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</tspan>
  <text xml:space="preserve" x="476" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 자식 로거 (고정 컨텍스트)</text>
  <text xml:space="preserve" x="476" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> reqLog = logger.child(</tspan>
  </text>
  <text xml:space="preserve" x="476" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  { requestId, userId });</text>

  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">구조화 로그 = 메시지 + 컨텍스트 객체 → 검색·집계·알림 자동화 가능</text>
</svg>
