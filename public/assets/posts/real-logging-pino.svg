<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pino 구조화 로깅</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">객체 먼저 · 메시지는 정적 · 민감정보는 redact 로 마스킹</text>

  <!-- TOP LEFT: Pino 인스턴스 -->
  <rect x="60" y="100" width="380" height="190" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Pino 인스턴스</text>
  <rect x="76" y="146" width="348" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> logger = pino({</tspan></text>
  <text x="92" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  level: </tspan><tspan fill="#ce9178">'info'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  transport: </tspan><tspan fill="#ce9178">'pino-pretty'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  redact: [</tspan><tspan fill="#ce9178">'*.password'</tspan><tspan fill="#ffffff">]</tspan></text>
  <text x="92" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">})</tspan></text>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">레벨 · 예쁜 출력 · 민감정보 마스킹</text>

  <!-- TOP RIGHT: 구조화 로그 규칙 -->
  <rect x="460" y="100" width="380" height="190" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">구조화 로그 규칙</text>
  <rect x="476" y="146" width="348" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 객체 먼저, msg 는 정적으로</tspan></text>
  <text x="492" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">logger.info(</tspan></text>
  <text x="492" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  { userId, action },</tspan></text>
  <text x="492" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">'user logged in'</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="480" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">동적 값은 객체로 · msg 는 검색용 상수</text>

  <!-- BOTTOM: 출력 JSON -->
  <rect x="60" y="308" width="780" height="110" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">출력 — 한 줄 JSON</text>
  <rect x="76" y="352" width="748" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">{</tspan><tspan fill="#7ec8e3">"level"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"info"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#7ec8e3">"time"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#b5cea8">1699</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#7ec8e3">"userId"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#7ec8e3">"action"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"login"</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#7ec8e3">"msg"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"user logged in"</tspan><tspan fill="#ffffff">}</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">redact 가 password · token 을 자동 마스킹 — 사고를 코드로 막는다</text>
</svg>
