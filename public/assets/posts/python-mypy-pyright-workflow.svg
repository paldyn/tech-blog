<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280">
  <rect width="880" height="280" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">검사기 실행과 오류 리포트</text>

  <rect x="60" y="64" width="760" height="196" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="80" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">$ mypy app.py</tspan></text>

  <text x="80" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">app.py:7: </tspan><tspan fill="#e05555">error:</tspan><tspan fill="#ffffff"> Argument 1 to "add"</tspan></text>

  <text x="80" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  has incompatible type "str"; expected "int"</tspan></text>

  <text x="80" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">Found </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> error in </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> file</tspan></text>

  <text x="80" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">$ pyright app.py</tspan></text>

  <text x="80" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">app.py:7:9 - </tspan><tspan fill="#e05555">error:</tspan><tspan fill="#ffffff"> "str" 형식의 인수를</tspan></text>

  <text x="80" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  "int" 매개변수에 할당할 수 없습니다</tspan></text>
</svg>
