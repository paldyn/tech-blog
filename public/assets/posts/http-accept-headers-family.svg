<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Accept 헤더 패밀리</text>
    <!-- Accept -->
    <rect x="60" y="65" width="375" height="155" rx="8" fill="#0f1f2a" stroke="#4a8aaa" stroke-width="1.5"/>
    <line x1="60" y1="108" x2="435" y2="108" stroke="#4a8aaa" stroke-width="1"/>
    <text x="247" y="87" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">Accept</text>
    <text x="247" y="104" text-anchor="middle" font-size="11" fill="#888">미디어 타입 협상</text>
    <text x="80" y="128" font-size="11" fill="#888">서버가 제공 가능한 형식 중 최적 선택</text>
    <text x="80" y="150" font-size="12" fill="#e8e8e8">Accept: text/html;q=0.9,</text>
    <text x="80" y="168" font-size="12" fill="#e8e8e8">  application/json;q=0.8</text>
    <text x="80" y="192" font-size="11" fill="#7777cc">MIME 타입 + q-factor</text>
    <text x="80" y="210" font-size="11" fill="#555">없으면 서버가 기본 형식 반환</text>
    <!-- Accept-Language -->
    <rect x="445" y="65" width="375" height="155" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <line x1="445" y1="108" x2="820" y2="108" stroke="#3aaa5a" stroke-width="1"/>
    <text x="632" y="87" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Accept-Language</text>
    <text x="632" y="104" text-anchor="middle" font-size="11" fill="#888">자연 언어 협상</text>
    <text x="465" y="128" font-size="11" fill="#888">언어/지역 태그로 선호 언어 전달</text>
    <text x="465" y="150" font-size="12" fill="#e8e8e8">Accept-Language: ko-KR,</text>
    <text x="465" y="168" font-size="12" fill="#e8e8e8">  ko;q=0.9, en;q=0.8</text>
    <text x="465" y="192" font-size="11" fill="#7777cc">BCP 47 언어 태그</text>
    <text x="465" y="210" font-size="11" fill="#555">Vary: Accept-Language 권장</text>
    <!-- Accept-Encoding -->
    <rect x="60" y="240" width="375" height="155" rx="8" fill="#2a1a0f" stroke="#aa6a3a" stroke-width="1.5"/>
    <line x1="60" y1="283" x2="435" y2="283" stroke="#aa6a3a" stroke-width="1"/>
    <text x="247" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#dd9955">Accept-Encoding</text>
    <text x="247" y="279" text-anchor="middle" font-size="11" fill="#888">전송 인코딩 협상</text>
    <text x="80" y="303" font-size="11" fill="#888">압축 알고리즘 선호도 전달</text>
    <text x="80" y="325" font-size="12" fill="#e8e8e8">Accept-Encoding: gzip,</text>
    <text x="80" y="343" font-size="12" fill="#e8e8e8">  br;q=0.9, deflate;q=0.5</text>
    <text x="80" y="367" font-size="11" fill="#7777cc">gzip, deflate, br, zstd</text>
    <text x="80" y="385" font-size="11" fill="#555">서버는 Content-Encoding으로 응답</text>
    <!-- Accept-Charset -->
    <rect x="445" y="240" width="375" height="155" rx="8" fill="#2a0f2a" stroke="#aa3aaa" stroke-width="1.5"/>
    <line x1="445" y1="283" x2="820" y2="283" stroke="#aa3aaa" stroke-width="1"/>
    <text x="632" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#cc77cc">Accept-Charset</text>
    <text x="632" y="279" text-anchor="middle" font-size="11" fill="#888">문자셋 협상 (사실상 폐기)</text>
    <text x="465" y="303" font-size="11" fill="#888">HTTP/1.1에서 권장했으나 현재 비권장</text>
    <text x="465" y="325" font-size="12" fill="#e8e8e8">Accept-Charset: utf-8,</text>
    <text x="465" y="343" font-size="12" fill="#e8e8e8">  iso-8859-1;q=0.5</text>
    <text x="465" y="367" font-size="11" fill="#7777cc">UTF-8 사실상 표준화</text>
    <text x="465" y="385" font-size="11" fill="#555">현대 브라우저는 거의 전송 안 함</text>
    <text x="440" y="416" text-anchor="middle" font-size="11" fill="#555">모든 Accept-* 헤더에 q=0은 "해당 표현 거부"를 의미</text>
  </g>
</svg>
