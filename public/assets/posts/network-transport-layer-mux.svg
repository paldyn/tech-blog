<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="amx" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="amg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">다중화·역다중화: 포트로 프로세스 구분</text>

  <!-- Multiple processes on sender -->
  <text x="180" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">프로세스 (송신)</text>

  <rect x="60" y="92" width="120" height="44" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Chrome</text>
  <text x="120" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">src:51234</text>

  <rect x="60" y="148" width="120" height="44" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">VS Code</text>
  <text x="120" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">src:52000</text>

  <rect x="60" y="204" width="120" height="44" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Slack</text>
  <text x="120" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">src:53100</text>

  <!-- Multiplexer -->
  <line x1="180" y1="114" x2="280" y2="160" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#amx)"/>
  <line x1="180" y1="170" x2="280" y2="170" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#amx)"/>
  <line x1="180" y1="226" x2="280" y2="180" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#amx)"/>

  <rect x="280" y="140" width="80" height="60" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="320" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">전송</text>
  <text x="320" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">계층</text>

  <!-- Network -->
  <line x1="360" y1="170" x2="490" y2="170" stroke="#888" stroke-width="2" marker-end="url(#amx)"/>
  <text x="425" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IP 패킷</text>

  <!-- Demultiplexer -->
  <rect x="490" y="140" width="80" height="60" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">전송</text>
  <text x="530" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">계층</text>

  <!-- Multiple processes on receiver -->
  <text x="700" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">프로세스 (수신)</text>

  <rect x="640" y="92" width="120" height="44" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">nginx</text>
  <text x="700" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">dst:443</text>

  <rect x="640" y="148" width="120" height="44" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">sshd</text>
  <text x="700" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">dst:22</text>

  <rect x="640" y="204" width="120" height="44" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">postgres</text>
  <text x="700" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">dst:5432</text>

  <line x1="570" y1="160" x2="640" y2="114" stroke="#55c555" stroke-width="1.5" marker-end="url(#amg)"/>
  <line x1="570" y1="170" x2="640" y2="170" stroke="#55c555" stroke-width="1.5" marker-end="url(#amg)"/>
  <line x1="570" y1="180" x2="640" y2="226" stroke="#55c555" stroke-width="1.5" marker-end="url(#amg)"/>

  <!-- Port ranges -->
  <rect x="60" y="300" width="760" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">포트 범위          설명                         예시</text>
  <line x1="80" y1="330" x2="800" y2="330" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="348" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">0 - 1023           Well-known ports (루트 필요)  22,80,443,53</text>
  <text x="80" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">1024 - 49151       Registered ports             3306,5432,8080</text>
  <text x="80" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">49152 - 65535      Dynamic/Ephemeral (클라이언트) 자동 할당</text>
</svg>
