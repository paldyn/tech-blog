<svg xmlns="http://www.w3.org/2000/svg" width="880" height="318" viewBox="0 0 880 318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="318" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">"무엇이냐" vs "무엇을 할 수 있느냐"</text>

  <text x="50" y="90" font-size="16" font-weight="600" fill="#e05555">isinstance — 타입을 묻는다</text>
  <rect x="50" y="104" width="360" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="68" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> render(x):</tspan></text>
  <text xml:space="preserve" x="68" y="160" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> isinstance(x, list):</tspan></text>
  <text xml:space="preserve" x="68" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> join(x)</tspan></text>
  <text xml:space="preserve" x="68" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># tuple, set 은 거부당한다</tspan></text>
  <text xml:space="preserve" x="68" y="248" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># — 충분히 순회 가능한데도</tspan></text>

  <text x="470" y="90" font-size="16" font-weight="600" fill="#55c555">덕 타이핑 — 능력을 본다</text>
  <rect x="470" y="104" width="360" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="488" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> render(x):</tspan></text>
  <text xml:space="preserve" x="488" y="160" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> join(</tspan></text>
  <text xml:space="preserve" x="488" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">        str(i) </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> x)</tspan></text>
  <text xml:space="preserve" x="488" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># 순회만 되면 무엇이든 OK</tspan></text>
  <text xml:space="preserve" x="488" y="248" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># list, tuple, set, 제너레이터</tspan></text>

  <text x="60" y="304" font-size="13" fill="#888">"오리처럼 걷고 꽥꽥거리면 오리다" — 타입이 아니라 동작이 인터페이스가 된다.</text>
</svg>
