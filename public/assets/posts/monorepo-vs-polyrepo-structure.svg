<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Monorepo vs Polyrepo 구조</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">저장소 구성 방식에 따른 코드 배치 차이</text>

  <!-- Divider -->
  <line x1="440" y1="88" x2="440" y2="470" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- ===== LEFT: Monorepo ===== -->
  <text x="220" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">Monorepo</text>

  <!-- Single repo box -->
  <rect x="60" y="115" width="340" height="300" rx="8" fill="#0d1824" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">my-company/</text>

  <!-- Directory tree -->
  <text x="88" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">&#9500;&#9472; apps/</text>
  <text x="104" y="190"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">&#9500;&#9472; web/</text>
  <text x="104" y="208"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">&#9500;&#9472; mobile/</text>
  <text x="104" y="226"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">&#9492;&#9472; api/</text>
  <text x="88" y="246"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">&#9500;&#9472; packages/</text>
  <text x="104" y="266"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">&#9500;&#9472; ui/</text>
  <text x="104" y="284"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">&#9500;&#9472; auth/</text>
  <text x="104" y="302"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">&#9492;&#9472; utils/</text>
  <text x="88" y="322"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">&#9500;&#9472; tools/</text>
  <text x="88" y="342"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">&#9492;&#9472; docs/</text>

  <!-- Single repo label -->
  <rect x="80" y="358" width="300" height="46" rx="6" fill="#071624" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">단일 저장소 — 하나의 git history</text>
  <text x="230" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공유 패키지를 한 커밋으로 원자적 변경</text>

  <!-- ===== RIGHT: Polyrepo ===== -->
  <text x="660" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e0955e">Polyrepo</text>

  <!-- Multiple repos -->
  <rect x="460" y="115" width="150" height="72" rx="6" fill="#1a150a" stroke="#e0955e" stroke-width="1.2"/>
  <text x="535" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0955e">web-app/</text>
  <text x="535" y="160" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8e8e8">src/ tests/</text>
  <text x="535" y="178" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">package.json</text>

  <rect x="630" y="115" width="150" height="72" rx="6" fill="#1a150a" stroke="#e0955e" stroke-width="1.2"/>
  <text x="705" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0955e">mobile-app/</text>
  <text x="705" y="160" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8e8e8">src/ tests/</text>
  <text x="705" y="178" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">package.json</text>

  <rect x="460" y="205" width="150" height="72" rx="6" fill="#1a150a" stroke="#e0955e" stroke-width="1.2"/>
  <text x="535" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0955e">api-service/</text>
  <text x="535" y="250" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8e8e8">src/ tests/</text>
  <text x="535" y="268" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">go.mod</text>

  <rect x="630" y="205" width="150" height="72" rx="6" fill="#1a150a" stroke="#e0955e" stroke-width="1.2"/>
  <text x="705" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0955e">shared-ui/</text>
  <text x="705" y="250" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8e8e8">src/ tests/</text>
  <text x="705" y="268" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">package.json</text>

  <!-- Dependency arrows between polyrepos -->
  <line x1="535" y1="205" x2="705" y2="187" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="705" y1="205" x2="705" y2="187" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Polyrepo label -->
  <rect x="460" y="298" width="320" height="46" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="620" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">복수 저장소 — 각자 독립 git history</text>
  <text x="620" y="334" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공유 패키지 변경 시 각 저장소 PR 별도 생성</text>

  <!-- Shared state indicators -->
  <rect x="460" y="362" width="320" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="476" y="383"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공유 라이브러리 버전 관리:</text>
  <text x="476" y="403"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">npm publish → 각 앱 버전업 PR 필요</text>

  <!-- Footer -->
  <text x="440" y="468" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Monorepo 도구: Turborepo, Nx, Bazel / Polyrepo 도구: Renovate, Dependabot</text>
</svg>
