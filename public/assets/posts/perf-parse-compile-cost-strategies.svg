<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파싱·컴파일 비용 절감 전략</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">로딩 성능을 높이는 핵심 접근법</text>

  <!-- Strategy 1: Code Splitting -->
  <rect x="60" y="100" width="240" height="100" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">코드 스플리팅</text>
  <text x="180" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">큰 번들 → 작은 청크 분리</text>
  <text x="180" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">필요한 코드만 즉시 파싱</text>
  <text x="180" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Webpack / Rollup / Vite 지원</text>

  <!-- Strategy 2: Tree Shaking -->
  <rect x="320" y="100" width="240" height="100" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">트리 셰이킹</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">미사용 코드 제거</text>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">ESM 정적 분석 기반</text>
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">번들 크기 → 파싱 시간 직결</text>

  <!-- Strategy 3: Lazy Load -->
  <rect x="580" y="100" width="240" height="100" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">지연 로딩</text>
  <text x="700" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">상호작용 시점에 import()</text>
  <text x="700" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">초기 파싱 비용 0으로</text>
  <text x="700" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">dynamic import() 활용</text>

  <!-- Arrow down -->
  <line x1="440" y1="200" x2="440" y2="228" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Result box -->
  <rect x="160" y="230" width="560" height="56" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">초기 JS 페이로드 감소 → TTI(Time to Interactive) 개선</text>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">모바일 저사양 기기에서 2~3× 파싱 시간 — 코드 크기 절반 = 파싱 시간 절반</text>

  <!-- Code block -->
  <rect x="60" y="316" width="760" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// ✅ 동적 임포트로 초기 파싱 비용 제거</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">button</tspan>.addEventListener(<tspan fill="#ce9178">'click'</tspan>, <tspan fill="#7ec8e3" font-weight="600">async</tspan> () => {</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> { heavyFn } = <tspan fill="#7ec8e3" font-weight="600">await</tspan> <tspan fill="#7ec8e3" font-weight="600">import</tspan>(<tspan fill="#ce9178">'./heavy.js'</tspan>);</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  heavyFn();</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">});</text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 클릭 전까지 heavy.js 파싱·컴파일 발생 안 함</text>
</svg>
