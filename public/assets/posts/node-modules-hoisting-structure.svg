<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">node_modules 호이스팅 구조 비교</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">npm/yarn (플랫) vs pnpm (중첩 심링크)</text>

  <!-- npm flat node_modules -->
  <rect x="60" y="90" width="360" height="360" rx="8" fill="#111218" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="116" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">npm / yarn — 플랫 호이스팅</text>
  <text x="240" y="136" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">node_modules/</text>

  <rect x="80" y="148" width="140" height="28" rx="4" fill="#1a2533" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="167" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">react@18.3.0</text>

  <rect x="240" y="148" width="140" height="28" rx="4" fill="#1a2533" stroke="#7ec8e3" stroke-width="1"/>
  <text x="310" y="167" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">react-dom@18.3.0</text>

  <rect x="80" y="192" width="140" height="28" rx="4" fill="#1a2533" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="211" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">lodash@4.17.21</text>

  <rect x="240" y="192" width="140" height="28" rx="4" fill="#1a2533" stroke="#7ec8e3" stroke-width="1"/>
  <text x="310" y="211" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">scheduler@0.23.0</text>

  <rect x="80" y="236" width="140" height="28" rx="4" fill="#1a2533" stroke="#e05555" stroke-width="1"/>
  <text x="150" y="255" text-anchor="middle" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">phantom-pkg</text>

  <text x="240" y="252" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">← 팬텀 의존성</text>
  <text x="240" y="268" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">(require 가능 — 위험)</text>

  <text x="80" y="304" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">모든 패키지가 루트에 평탄화</text>
  <text x="80" y="322" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">→ 동일 패키지는 단일 복사본</text>
  <text x="80" y="340" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">→ 버전 충돌 시 중첩 폴더 생성</text>

  <!-- Conflict example -->
  <rect x="80" y="356" width="320" height="72" rx="6" fill="#1a1025" stroke="#555"/>
  <text x="90" y="376" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">버전 충돌 시:</text>
  <text x="90" y="394" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">node_modules/</text>
  <text x="90" y="412" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">  lodash@4.17.21/     ← 최상위</text>
  <text x="90" y="430" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">  dep-a/node_modules/lodash@3.10/ ← 중첩</text>

  <!-- pnpm symlink structure -->
  <rect x="460" y="90" width="360" height="360" rx="8" fill="#111218" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="116" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">pnpm — 심링크 구조</text>
  <text x="640" y="136" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">node_modules/</text>

  <rect x="480" y="148" width="140" height="28" rx="4" fill="#1a2533" stroke="#55c555" stroke-width="1"/>
  <text x="550" y="167" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">react → (심링크)</text>

  <rect x="640" y="148" width="140" height="28" rx="4" fill="#1a2533" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="167" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">.pnpm/ (실제 파일)</text>

  <rect x="480" y="192" width="140" height="28" rx="4" fill="#1a2533" stroke="#55c555" stroke-width="1"/>
  <text x="550" y="211" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">react-dom → (심링크)</text>

  <!-- pnpm store -->
  <rect x="480" y="236" width="300" height="76" rx="6" fill="#0f1a12" stroke="#55c555" stroke-width="1"/>
  <text x="630" y="258" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600">.pnpm/ 내부 구조</text>
  <text x="496" y="278" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">react@18.3.0/node_modules/</text>
  <text x="496" y="294" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">  react/         ← 하드 링크 (스토어)</text>
  <text x="496" y="310" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">  scheduler/     ← 의존성 하드 링크</text>

  <text x="480" y="342" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✓ 팬텀 의존성 차단</text>
  <text x="480" y="360" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✓ 전역 스토어 — 디스크 절약</text>
  <text x="480" y="378" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✓ 중첩 의존성 명확한 격리</text>
  <text x="480" y="396" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">심링크 = package.json 선언만 접근 가능</text>
  <text x="480" y="414" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">비선언 → require 시 에러 발생</text>

  <!-- Bottom note -->
  <text x="440" y="478" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">npm 호이스팅 알고리즘: 가장 많이 사용되는 버전을 루트로 끌어올려 중복 최소화</text>
  <text x="440" y="498" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">pnpm: 전역 스토어(~/.pnpm-store)에서 하드 링크 → 동일 파일은 1회만 저장</text>
</svg>
