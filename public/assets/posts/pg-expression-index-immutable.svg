<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">IMMUTABLE 함수와 표현식 인덱스 가능 조건</text>

  <!-- Three columns: VOLATILE / STABLE / IMMUTABLE -->
  <!-- VOLATILE -->
  <rect x="60" y="70" width="220" height="260" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">VOLATILE</text>
  <text x="170" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인덱스 사용 불가</text>
  <line x1="80" y1="122" x2="260" y2="122" stroke="#333" stroke-width="1"/>
  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• now()</text>
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• random()</text>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• nextval()</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• txid_current()</text>
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">같은 입력, 다른 결과</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 인덱스에 저장 불가</text>
  <rect x="80" y="294" width="160" height="26" rx="4" fill="#3a0a0a" stroke="#e05555"/>
  <text x="160" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 인덱스 불가</text>

  <!-- STABLE -->
  <rect x="330" y="70" width="220" height="260" rx="8" fill="#1a1000" stroke="#e8a800" stroke-width="1.5"/>
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a800">STABLE</text>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인덱스 사용 불가</text>
  <line x1="350" y1="122" x2="530" y2="122" stroke="#333" stroke-width="1"/>
  <text x="350" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• current_timestamp</text>
  <text x="350" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• to_char(..,'...')</text>
  <text x="350" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• currval()</text>
  <text x="350" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 세션 의존 함수</text>
  <text x="350" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">트랜잭션 내 동일 결과</text>
  <text x="350" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 인덱스에 저장 불가</text>
  <rect x="350" y="294" width="160" height="26" rx="4" fill="#3a2000" stroke="#e8a800"/>
  <text x="430" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a800">✗ 인덱스 불가</text>

  <!-- IMMUTABLE -->
  <rect x="600" y="70" width="220" height="260" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">IMMUTABLE</text>
  <text x="710" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인덱스 사용 가능</text>
  <line x1="620" y1="122" x2="800" y2="122" stroke="#333" stroke-width="1"/>
  <text x="620" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• lower(text)</text>
  <text x="620" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• upper(text)</text>
  <text x="620" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• date_part('year',..)</text>
  <text x="620" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 산술 연산 (x*2+1)</text>
  <text x="620" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• ::type 캐스트</text>
  <text x="620" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동일 입력 → 항상 동일 결과</text>
  <rect x="620" y="294" width="160" height="26" rx="4" fill="#0a3010" stroke="#55c555"/>
  <text x="700" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 인덱스 가능</text>

  <!-- Custom function note -->
  <rect x="60" y="356" width="760" height="56" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="375" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 커스텀 함수를 IMMUTABLE로 선언하면 표현식 인덱스 사용 가능</text>
  <text x="76" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE FUNCTION</text>
  <text x="196" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> normalize_phone(p </text>
  <text x="334" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">text</text>
  <text x="358" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>
  <text x="370" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">RETURNS text LANGUAGE sql IMMUTABLE AS</text>
  <text x="630" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> $$ ... $$</text>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 주의: IMMUTABLE 선언 후 내부에서 VOLATILE 함수 호출 시 잘못된 결과 발생</text>
</svg>
