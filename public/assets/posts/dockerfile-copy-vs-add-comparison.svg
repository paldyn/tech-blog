<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" role="img" aria-label="COPY vs ADD 기능 비교">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">COPY vs ADD 기능 비교</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">무엇이 같고 무엇이 다른가</text>

  <!-- Header row -->
  <rect x="60" y="95" width="220" height="36" rx="4" fill="#1a1d26" stroke="#2a2d3a" stroke-width="1"/>
  <text x="170" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888">기능</text>

  <rect x="290" y="95" width="240" height="36" rx="4" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="410" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">COPY</text>

  <rect x="540" y="95" width="240" height="36" rx="4" fill="#1a100d" stroke="#3d2a1e" stroke-width="1"/>
  <text x="660" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">ADD</text>

  <!-- Row 1: local files -->
  <rect x="60" y="136" width="220" height="36" rx="0" fill="#111318" stroke="#2a2d3a" stroke-width="0.5"/>
  <text x="80" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">로컬 파일 복사</text>

  <rect x="290" y="136" width="240" height="36" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="410" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 지원</text>

  <rect x="540" y="136" width="240" height="36" rx="0" fill="#1a100d" stroke="#3d2a1e" stroke-width="0.5"/>
  <text x="660" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 지원</text>

  <!-- Row 2: URL -->
  <rect x="60" y="172" width="220" height="36" rx="0" fill="#111318" stroke="#2a2d3a" stroke-width="0.5"/>
  <text x="80" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">URL에서 파일 다운로드</text>

  <rect x="290" y="172" width="240" height="36" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="410" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗ 불가</text>

  <rect x="540" y="172" width="240" height="36" rx="0" fill="#1a100d" stroke="#3d2a1e" stroke-width="0.5"/>
  <text x="660" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 지원</text>

  <!-- Row 3: tar auto-extract -->
  <rect x="60" y="208" width="220" height="36" rx="0" fill="#111318" stroke="#2a2d3a" stroke-width="0.5"/>
  <text x="80" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">tar 자동 압축 해제</text>

  <rect x="290" y="208" width="240" height="36" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="410" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗ 불가</text>

  <rect x="540" y="208" width="240" height="36" rx="0" fill="#1a100d" stroke="#3d2a1e" stroke-width="0.5"/>
  <text x="660" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 자동 해제</text>

  <!-- Row 4: --chown -->
  <rect x="60" y="244" width="220" height="36" rx="0" fill="#111318" stroke="#2a2d3a" stroke-width="0.5"/>
  <text x="80" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">--chown 옵션</text>

  <rect x="290" y="244" width="240" height="36" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="410" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 지원</text>

  <rect x="540" y="244" width="240" height="36" rx="0" fill="#1a100d" stroke="#3d2a1e" stroke-width="0.5"/>
  <text x="660" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 지원</text>

  <!-- Row 5: --from (multistage) -->
  <rect x="60" y="280" width="220" height="36" rx="0" fill="#111318" stroke="#2a2d3a" stroke-width="0.5"/>
  <text x="80" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">--from (멀티 스테이지)</text>

  <rect x="290" y="280" width="240" height="36" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="410" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 지원</text>

  <rect x="540" y="280" width="240" height="36" rx="0" fill="#1a100d" stroke="#3d2a1e" stroke-width="0.5"/>
  <text x="660" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗ 불가</text>

  <!-- Recommendation box -->
  <rect x="60" y="340" width="760" height="60" rx="8" fill="#0d180d" stroke="#1e3d1e" stroke-width="1.5"/>
  <text x="440" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">권장: 기본은 COPY, ADD는 tar 압축 해제가 꼭 필요할 때만</text>
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">URL 다운로드는 ADD보다 RUN curl + 검증이 더 안전하다</text>
</svg>
