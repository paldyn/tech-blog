<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a" rx="12">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Adapter 모듈 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">Transformer 레이어 내부에 삽입되는 Bottleneck Adapter의 위치와 내부 구조</text>

  <!-- ─── Column headers ─── -->
  <text x="190" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">기본 Transformer 레이어</text>
  <text x="650" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Adapter 삽입된 레이어</text>

  <!-- ─── Vertical divider ─── -->
  <line x1="430" y1="88" x2="430" y2="450" stroke="#2a3040" stroke-width="2" stroke-dasharray="5,4"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- LEFT SIDE: Standard Transformer Layer      -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Input arrow -->
  <line x1="190" y1="110" x2="190" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer Norm 1 -->
  <rect x="110" y="130" width="160" height="34" rx="6" fill="#0f1420" stroke="#2a3040" stroke-width="1.2"/>
  <text x="190" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">LayerNorm</text>

  <line x1="190" y1="166" x2="190" y2="184" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Self-Attention -->
  <rect x="100" y="186" width="180" height="38" rx="7" fill="#0f1a2e" stroke="#2a3040" stroke-width="1.4"/>
  <text x="190" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Self-Attention</text>

  <!-- Residual connection left side -->
  <line x1="190" y1="226" x2="190" y2="244" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Add & Norm -->
  <rect x="130" y="246" width="120" height="30" rx="5" fill="#141a22" stroke="#2a3040" stroke-width="1"/>
  <text x="190" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Add &amp; Norm</text>

  <line x1="190" y1="278" x2="190" y2="296" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FFN -->
  <rect x="100" y="298" width="180" height="38" rx="7" fill="#0f1a2e" stroke="#2a3040" stroke-width="1.4"/>
  <text x="190" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Feed-Forward (FFN)</text>

  <line x1="190" y1="338" x2="190" y2="356" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Add & Norm 2 -->
  <rect x="130" y="358" width="120" height="30" rx="5" fill="#141a22" stroke="#2a3040" stroke-width="1"/>
  <text x="190" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Add &amp; Norm</text>

  <line x1="190" y1="390" x2="190" y2="416" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="130" y="418" width="120" height="30" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="190" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Output</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- RIGHT SIDE: With Adapter                  -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Input arrow -->
  <line x1="620" y1="110" x2="620" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer Norm 1 -->
  <rect x="540" y="130" width="160" height="34" rx="6" fill="#0f1420" stroke="#2a3040" stroke-width="1.2"/>
  <text x="620" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">LayerNorm</text>

  <line x1="620" y1="166" x2="620" y2="184" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Self-Attention (Frozen) -->
  <rect x="530" y="186" width="180" height="38" rx="7" fill="#0f1a2e" stroke="#2a3040" stroke-width="1.4"/>
  <text x="620" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">Self-Attention</text>
  <text x="620" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">🔒 Frozen</text>

  <line x1="620" y1="226" x2="620" y2="238" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Adapter after Attention -->
  <rect x="548" y="240" width="144" height="42" rx="7" fill="#12101e" stroke="#7777cc" stroke-width="1.8"/>
  <text x="620" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7777cc" text-anchor="middle">Adapter (Attn 뒤)</text>
  <text x="620" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#9988cc" text-anchor="middle">d → r → d  (학습 가능)</text>

  <line x1="620" y1="284" x2="620" y2="298" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Add & Norm -->
  <rect x="560" y="300" width="120" height="28" rx="5" fill="#141a22" stroke="#2a3040" stroke-width="1"/>
  <text x="620" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Add &amp; Norm</text>

  <line x1="620" y1="330" x2="620" y2="344" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FFN (Frozen) -->
  <rect x="530" y="346" width="180" height="38" rx="7" fill="#0f1a2e" stroke="#2a3040" stroke-width="1.4"/>
  <text x="620" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">Feed-Forward (FFN)</text>
  <text x="620" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">🔒 Frozen</text>

  <!-- Arrow to Adapter after FFN -->
  <line x1="620" y1="386" x2="620" y2="398" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Adapter after FFN -->
  <rect x="548" y="400" width="144" height="42" rx="7" fill="#12101e" stroke="#7777cc" stroke-width="1.8"/>
  <text x="620" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7777cc" text-anchor="middle">Adapter (FFN 뒤)</text>
  <text x="620" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#9988cc" text-anchor="middle">d → r → d  (학습 가능)</text>

  <line x1="620" y1="444" x2="620" y2="458" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="556" y="460" width="128" height="28" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="620" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Output</text>

  <!-- ─── Adapter Bottleneck detail callout (bottom-left area) ─── -->
  <rect x="60" y="326" width="58" height="16" rx="4" fill="#12101e" stroke="#7777cc" stroke-width="1.2"/>
  <text x="89" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">Adapter 내부</text>

  <text x="62" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">↓ Down: d→r</text>
  <text x="62" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">↓ GELU 활성화</text>
  <text x="62" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">↓ Up: r→d</text>
  <text x="62" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">+ Residual (skip)</text>

  <!-- Defs -->
  <defs>
    <marker id="arr" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 14 7, 0 14" fill="#555"/>
    </marker>
  </defs>
</svg>
