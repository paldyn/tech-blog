<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Date 객체 구조와 타임존</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">UTC 타임스탬프 기반 — 로컬 표시는 런타임이 결정</text>

  <!-- UTC timestamp box -->
  <rect x="240" y="95" width="400" height="60" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">UTC 타임스탬프 (ms)</text>
  <text x="440" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">new Date() 내부: 1970-01-01T00:00:00Z 이후 경과 ms</text>

  <!-- Arrow down -->
  <polygon points="440,165 430,183 436,180 436,196 444,196 444,180 450,183" fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Three representations -->
  <rect x="60" y="205" width="220" height="100" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">로컬 시각</text>
  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">getFullYear()</text>
  <text x="80" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">getMonth() // 0-11!</text>
  <text x="80" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">getDate() / getDay()</text>
  <text x="80" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">getHours() / getMinutes()</text>

  <rect x="330" y="205" width="220" height="100" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">UTC 시각</text>
  <text x="350" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">getUTCFullYear()</text>
  <text x="350" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">getUTCMonth()</text>
  <text x="350" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">getUTCDate()</text>
  <text x="350" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">getUTCHours()</text>

  <rect x="600" y="205" width="220" height="100" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">문자열 변환</text>
  <text x="620" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">toISOString()</text>
  <text x="620" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">toLocaleDateString()</text>
  <text x="620" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">toLocaleTimeString()</text>
  <text x="620" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">toLocaleString()</text>

  <!-- Code block -->
  <rect x="60" y="322" width="760" height="152" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Date 생성과 타임존 처리</text>
  <rect x="72" y="352" width="736" height="110" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="88" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// ISO 8601 문자열로 생성 (UTC 기준)</text>
  <text x="88" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Date(</tspan><tspan fill="#ce9178">'2026-05-07T09:00:00Z'</tspan><tspan fill="#e8e8e8">); </tspan><tspan fill="#6a8aa0">// UTC 09:00</tspan></text>
  <text x="88" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Date(</tspan><tspan fill="#ce9178">'2026-05-07'</tspan><tspan fill="#e8e8e8">);         </tspan><tspan fill="#6a8aa0">// ⚠ UTC 자정으로 파싱 (로컬 전날 될 수 있음)</tspan></text>
  <text x="88" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Date.now();                    </text><text x="372" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 현재 타임스탬프 (ms)</text>
  <text x="88" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">new</text><text x="118" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Date().toISOString();         </text><text x="372" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// "2026-05-07T06:30:00.000Z"</text>
  <text x="88" y="462" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">new</text><text x="118" y="462" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Date().getTimezoneOffset();   </text><text x="372" y="462" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// UTC 차이 (분) — KST: -540</text>
</svg>
