<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RoPE: 회전 행렬로 위치 정보 인코딩</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Rotary Position Embedding — 쿼리·키 벡터를 위치에 따라 회전시킨다</text>

  <!-- Left panel: 2D Rotation Diagram -->
  <rect x="60" y="100" width="360" height="380" rx="10" fill="#111" stroke="#222"/>
  <text x="240" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">2D 회전 공간</text>

  <!-- Coordinate axes -->
  <line x1="130" y1="340" x2="340" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="130" y1="340" x2="130" y2="150" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="348" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">x</text>
  <text x="122" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">y</text>

  <!-- Original vector q (position 0) -->
  <line x1="130" y1="340" x2="270" y2="220" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="272" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3">q (pos=0)</text>

  <!-- Rotated vector q_m (position m) -->
  <line x1="130" y1="340" x2="210" y2="180" stroke="#55c555" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="155" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">q_m (pos=m)</text>

  <!-- Arc showing rotation angle -->
  <path d="M 200 308 A 78 78 0 0 1 222 276" stroke="#e05555" stroke-width="1.8" fill="none" stroke-dasharray="4,3"/>
  <text x="220" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">mθ</text>

  <!-- Rotation formula -->
  <rect x="85" y="370" width="310" height="90" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="100" y="395" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">R(mθ) = [cos(mθ)  -sin(mθ)]</text>
  <text x="100" y="413" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">          [sin(mθ)   cos(mθ)]</text>
  <text x="100" y="435" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">q_m = R(mθ) · q</text>
  <text x="100" y="453" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">k_n = R(nθ) · k</text>

  <!-- Right panel: Attention Score Property -->
  <rect x="460" y="100" width="360" height="380" rx="10" fill="#111" stroke="#222"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">상대 위치 의존성</text>

  <!-- Property: q_m · k_n = f(q,k,m-n) -->
  <rect x="480" y="140" width="320" height="60" rx="8" fill="#0f1a0f" stroke="#1e3a1e"/>
  <text x="640" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#55c555" text-anchor="middle">q_m · k_n = f(q, k, m−n)</text>
  <text x="640" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">내적이 상대 거리 m−n만 의존</text>

  <!-- Steps -->
  <text x="480" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">핵심 특성</text>

  <rect x="480" y="244" width="320" height="44" rx="6" fill="#0a0a16" stroke="#1e1e40"/>
  <text x="495" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">① 절대 위치 임베딩 불필요</text>
  <text x="495" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">입력 벡터에 위치를 더하지 않고, 회전만 적용</text>

  <rect x="480" y="300" width="320" height="44" rx="6" fill="#0a0a16" stroke="#1e1e40"/>
  <text x="495" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">② 외삽(Extrapolation) 우수</text>
  <text x="495" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">훈련보다 긴 시퀀스에서도 상대 거리 보존</text>

  <rect x="480" y="356" width="320" height="44" rx="6" fill="#0a0a16" stroke="#1e1e40"/>
  <text x="495" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">③ 차원쌍별 독립 회전</text>
  <text x="495" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">헤드 차원 d를 d/2 쌍으로 나눠 각도 θ_i 적용</text>

  <!-- θ formula -->
  <rect x="480" y="412" width="320" height="50" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="495" y="435" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">θ_i = 1 / (10000^(2i/d))</text>
  <text x="495" y="453" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">i = 0, 1, ..., d/2 − 1</text>

  <!-- Defs -->
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#55c555"/>
    </marker>
  </defs>
</svg>
