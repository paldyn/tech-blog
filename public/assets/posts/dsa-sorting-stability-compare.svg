<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">안정 정렬 vs 불안정 정렬: 동일 키 순서 보존</text>

  <!-- Input description -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">입력: 점수 기준 정렬 (이름은 원래 순서 유지 여부 관심)</text>

  <!-- Input boxes: (이름, 점수) pairs -->
  <!-- Alice:3, Bob:1, Carol:3, Dave:2, Eve:1 -->
  <rect x="60" y="92" width="80" height="52" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Alice</text>
  <text x="100" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">3</text>

  <rect x="150" y="92" width="80" height="52" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="190" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Bob</text>
  <text x="190" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">1</text>

  <rect x="240" y="92" width="80" height="52" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="280" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Carol</text>
  <text x="280" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">3</text>

  <rect x="330" y="92" width="80" height="52" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dave</text>
  <text x="370" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>

  <rect x="420" y="92" width="80" height="52" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="460" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Eve</text>
  <text x="460" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">1</text>

  <text x="540" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">점수: 1 &lt; 2 &lt; 3</text>
  <text x="540" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">동점: Bob, Eve (점수=1) / Alice, Carol (점수=3)</text>

  <!-- Divider -->
  <line x1="60" y1="168" x2="820" y2="168" stroke="#222" stroke-width="1"/>

  <!-- Stable sort result -->
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">안정 정렬 (병합·카운팅·버킷·팀·삽입)</text>
  <text x="60" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">동일 키 내에서 원래 순서(Bob before Eve, Alice before Carol) 유지</text>

  <rect x="60" y="232" width="80" height="52" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="2"/>
  <text x="100" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Bob</text>
  <text x="100" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">1</text>

  <rect x="150" y="232" width="80" height="52" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="2"/>
  <text x="190" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Eve</text>
  <text x="190" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">1</text>

  <rect x="240" y="232" width="80" height="52" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="2"/>
  <text x="280" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Dave</text>
  <text x="280" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>

  <rect x="330" y="232" width="80" height="52" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="2"/>
  <text x="370" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Alice</text>
  <text x="370" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">3</text>

  <rect x="420" y="232" width="80" height="52" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="2"/>
  <text x="460" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Carol</text>
  <text x="460" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">3</text>

  <text x="520" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Bob, Eve 순서 유지</text>
  <text x="520" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Alice, Carol 순서 유지</text>

  <!-- Divider -->
  <line x1="60" y1="304" x2="820" y2="304" stroke="#222" stroke-width="1"/>

  <!-- Unstable sort result -->
  <text x="60" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">불안정 정렬 (퀵·힙·셸 등)</text>
  <text x="60" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">동일 키 내에서 순서가 바뀔 수 있음 — 결과 비결정적</text>

  <rect x="60" y="366" width="80" height="52" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <text x="100" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Eve</text>
  <text x="100" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">1</text>

  <rect x="150" y="366" width="80" height="52" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <text x="190" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Bob</text>
  <text x="190" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">1</text>

  <rect x="240" y="366" width="80" height="52" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="280" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dave</text>
  <text x="280" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>

  <rect x="330" y="366" width="80" height="52" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <text x="370" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Carol</text>
  <text x="370" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">3</text>

  <rect x="420" y="366" width="80" height="52" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <text x="460" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Alice</text>
  <text x="460" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">3</text>

  <text x="520" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">Eve, Bob 순서 바뀜!</text>
  <text x="520" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">Carol, Alice 순서 바뀜!</text>

  <!-- Algorithm reference table -->
  <rect x="60" y="440" width="760" height="64" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">정렬 알고리즘 안정성</text>
  <text x="150" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">안정: 병합·삽입·버블·카운팅·기수·버킷·팀</text>
  <text x="640" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">불안정: 퀵·힙·셸·선택 정렬</text>
</svg>
