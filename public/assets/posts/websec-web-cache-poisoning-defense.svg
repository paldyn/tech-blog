<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">캐시 키 설계와 방어 전략</text>

  <!-- Cache Key explanation -->
  <rect x="60" y="68" width="760" height="90" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">캐시 키(Cache Key) 란?</text>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">캐시가 응답을 식별·저장·반환할 때 사용하는 요청 속성 집합</text>
  <text x="440" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기본: URL + Host | 취약: Unkeyed 입력(X-Forwarded-Host 등)이 응답 본문에 반영되면 포이즈닝 가능</text>
  <text x="440" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">방어: 위험한 헤더를 캐시 키에 포함하거나 응답에서 제거</text>

  <!-- Defense strategies - 4 columns -->

  <!-- Strategy 1: Vary header -->
  <rect x="60" y="178" width="175" height="130" rx="8" fill="#0a0f18" stroke="#7ec8e3" stroke-width="1"/>
  <text x="147" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Vary 헤더 사용</text>
  <text x="147" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">입력 헤더를 캐시 키에</text>
  <text x="147" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">포함시켜 분리 저장</text>
  <rect x="72" y="250" width="151" height="48" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Vary: Accept-Encoding</text>
  <text x="78" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Vary: Accept-Language</text>

  <!-- Strategy 2: Strip unkeyed headers -->
  <rect x="255" y="178" width="175" height="130" rx="8" fill="#0a0f18" stroke="#7ec8e3" stroke-width="1"/>
  <text x="342" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">위험 헤더 제거</text>
  <text x="342" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">캐시 레이어에서</text>
  <text x="342" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">의심 헤더 삭제</text>
  <rect x="267" y="250" width="151" height="48" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="273" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">X-Forwarded-Host</text>
  <text x="273" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">X-Forwarded-Proto</text>

  <!-- Strategy 3: Input validation -->
  <rect x="450" y="178" width="175" height="130" rx="8" fill="#0a0f18" stroke="#7ec8e3" stroke-width="1"/>
  <text x="537" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">입력 검증</text>
  <text x="537" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답에 헤더 값을</text>
  <text x="537" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">직접 반영하지 않음</text>
  <rect x="462" y="250" width="151" height="48" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="468" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">allowlist 검증</text>
  <text x="468" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">encode 후 출력</text>

  <!-- Strategy 4: Cache-Control -->
  <rect x="645" y="178" width="175" height="130" rx="8" fill="#0a0f18" stroke="#7ec8e3" stroke-width="1"/>
  <text x="732" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">캐시 제어</text>
  <text x="732" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">민감 응답은 캐시</text>
  <text x="732" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">하지 않도록 설정</text>
  <rect x="657" y="250" width="151" height="48" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="663" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">Cache-Control:</text>
  <text x="663" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  no-store, private</text>

  <!-- Vulnerable vs Safe comparison -->
  <text x="60" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">취약 패턴 vs 안전 패턴</text>

  <!-- Vulnerable -->
  <rect x="60" y="358" width="360" height="108" rx="8" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="76" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">취약: 헤더 값을 응답에 직접 반영</text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">const host = req.headers</text>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  ['x-forwarded-host']</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">res.write(`&lt;base href="${host}"&gt;`)</text>
  <text x="76" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">위험: host에 evil.com 삽입 가능</text>

  <!-- Safe -->
  <rect x="460" y="358" width="360" height="108" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">안전: 허용 목록으로 검증</text>
  <text x="476" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">const ALLOWED = ['app.com']</text>
  <text x="476" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">const host = req.headers</text>
  <text x="476" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">  ['x-forwarded-host']</text>
  <text x="476" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">if (!ALLOWED.includes(host)) throw</text>
</svg>
