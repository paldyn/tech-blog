<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">alias 동작 원리</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">셸이 명령을 파싱할 때 alias 치환이 먼저 일어난다</text>

  <!-- flow diagram -->
  <!-- Step 1: Input -->
  <rect x="60" y="110" width="180" height="60" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">사용자 입력</text>
  <text x="150" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">ll</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="140" x2="290" y2="140" stroke="#555" stroke-width="2"/>
  <polygon points="290,134 302,140 290,146" fill="#555"/>

  <!-- Step 2: alias lookup -->
  <rect x="302" y="110" width="180" height="60" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="392" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">alias 테이블 조회</text>
  <text x="392" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">ll → ls -alF --color</text>

  <!-- Arrow 2 -->
  <line x1="482" y1="140" x2="532" y2="140" stroke="#555" stroke-width="2"/>
  <polygon points="532,134 544,140 532,146" fill="#555"/>

  <!-- Step 3: substitution -->
  <rect x="544" y="110" width="180" height="60" fill="#111827" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="634" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">치환된 명령</text>
  <text x="634" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">ls -alF --color</text>

  <!-- Arrow 3: down -->
  <line x1="634" y1="170" x2="634" y2="210" stroke="#555" stroke-width="2"/>
  <polygon points="628,210 634,222 640,210" fill="#555"/>

  <!-- Step 4: execute -->
  <rect x="544" y="222" width="180" height="50" fill="#112211" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="634" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">실행</text>

  <!-- alias examples -->
  <text x="60" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">자주 쓰는 alias 예시</text>
  <rect x="60" y="322" width="760" height="76" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">alias <tspan fill="#ffffff">ll=</tspan><tspan fill="#ce9178">'ls -alF --color=auto'</tspan></text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">alias <tspan fill="#ffffff">grep=</tspan><tspan fill="#ce9178">'grep --color=auto'</tspan></text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">alias <tspan fill="#ffffff">..=</tspan><tspan fill="#ce9178">'cd ..'</tspan>   <tspan fill="#ffffff">gs=</tspan><tspan fill="#ce9178">'git status'</tspan>   <tspan fill="#ffffff">gp=</tspan><tspan fill="#ce9178">'git push'</tspan></text>

  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">alias는 현재 셸 세션에만 적용 — 영구 적용은 ~/.bashrc 또는 ~/.zshrc에 저장</text>
</svg>
