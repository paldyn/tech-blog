<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">App Router 네비게이션 훅</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">클라이언트 컴포넌트에서 사용하는 세 가지 훅</text>

  <!-- useRouter -->
  <rect x="60" y="90" width="760" height="100" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="60" y="90" width="200" height="100" rx="8" fill="#14143a"/>
  <text x="160" y="133" text-anchor="middle" font-size="16" font-weight="700" fill="#7777cc">useRouter()</text>
  <text x="160" y="157" text-anchor="middle" font-size="11" fill="#888">프로그래매틱 이동</text>
  <text x="490" y="116" text-anchor="middle" font-size="13" fill="#e8e8e8">router.push('/blog')  router.replace('/home')</text>
  <text x="490" y="136" text-anchor="middle" font-size="13" fill="#e8e8e8">router.back()  router.forward()  router.refresh()</text>
  <text x="490" y="160" text-anchor="middle" font-size="12" fill="#888">주의: 반드시 'use client' 컴포넌트에서만 사용</text>

  <!-- usePathname -->
  <rect x="60" y="204" width="760" height="100" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <rect x="60" y="204" width="200" height="100" rx="8" fill="#0f2f0f"/>
  <text x="160" y="247" text-anchor="middle" font-size="16" font-weight="700" fill="#55c555">usePathname()</text>
  <text x="160" y="271" text-anchor="middle" font-size="11" fill="#888">현재 경로 읽기</text>
  <text x="490" y="232" text-anchor="middle" font-size="13" fill="#e8e8e8">현재 URL 경로명을 문자열로 반환</text>
  <text x="490" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">pathname === '/blog' // true</text>
  <text x="490" y="276" text-anchor="middle" font-size="12" fill="#888">활성 링크 스타일링, 조건부 렌더링에 활용</text>

  <!-- useSearchParams -->
  <rect x="60" y="318" width="760" height="100" rx="8" fill="#0c1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="318" width="200" height="100" rx="8" fill="#0e2030"/>
  <text x="160" y="361" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">useSearchParams()</text>
  <text x="160" y="385" text-anchor="middle" font-size="11" fill="#888">쿼리 파라미터</text>
  <text x="490" y="346" text-anchor="middle" font-size="13" fill="#e8e8e8">URL의 ?key=value 쿼리 파라미터를 읽음</text>
  <text x="490" y="366" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">searchParams.get('page') // '2'</text>
  <text x="490" y="390" text-anchor="middle" font-size="12" fill="#888">Suspense 경계 내부에서 사용 권장</text>
</svg>
