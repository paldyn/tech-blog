<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Button 컴포넌트 타입과 상태</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Button · ImageButton · CheckButton · RadioButton</text>

  <!-- Standard Button -->
  <rect x="60" y="100" width="180" height="120" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="150" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Button</text>
  <rect x="80" y="136" width="140" height="38" fill="#1d4ed8" rx="6"/>
  <text x="150" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">조회</text>
  <rect x="80" y="182" width="140" height="26" fill="#374151" rx="6"/>
  <text x="150" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">비활성(enable=false)</text>

  <!-- ImageButton -->
  <rect x="260" y="100" width="180" height="120" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="350" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">ImageButton</text>
  <rect x="280" y="136" width="140" height="38" fill="#111827" rx="6" stroke="#1e2433"/>
  <text x="310" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#7ec8e3">⊕</text>
  <text x="340" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8"> 추가</text>
  <text x="350" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이미지+텍스트 조합</text>

  <!-- CheckButton -->
  <rect x="460" y="100" width="180" height="120" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="550" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">CheckButton</text>
  <rect x="480" y="136" width="140" height="38" fill="#1d4ed8" rx="6"/>
  <rect x="494" y="148" width="14" height="14" fill="#fff" rx="2"/>
  <text x="517" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#fff">✓ 전체선택</text>
  <rect x="480" y="182" width="140" height="26" fill="#111827" rx="6" stroke="#1e2433"/>
  <rect x="494" y="188" width="14" height="14" fill="#111827" rx="2" stroke="#888"/>
  <text x="517" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">미선택 상태</text>

  <!-- RadioButton -->
  <rect x="660" y="100" width="180" height="120" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="750" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">RadioButton</text>
  <rect x="680" y="136" width="140" height="38" fill="#7ec8e3" rx="6"/>
  <circle cx="700" cy="155" r="7" fill="#fff"/>
  <circle cx="700" cy="155" r="4" fill="#7ec8e3"/>
  <text x="718" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#0a0a0a">선택됨</text>
  <rect x="680" y="182" width="140" height="26" fill="#111827" rx="6" stroke="#1e2433"/>
  <circle cx="700" cy="195" r="7" fill="#111827" stroke="#888"/>
  <text x="718" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">미선택</text>

  <!-- Button States -->
  <rect x="60" y="250" width="760" height="200" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">Button 주요 속성</text>

  <rect x="80" y="290" width="150" height="50" fill="#0f1929" rx="5"/>
  <text x="155" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">text</text>
  <text x="155" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">버튼 표시 텍스트</text>

  <rect x="245" y="290" width="150" height="50" fill="#0f1929" rx="5"/>
  <text x="320" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">enable</text>
  <text x="320" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">true | false</text>

  <rect x="410" y="290" width="150" height="50" fill="#0f1929" rx="5"/>
  <text x="485" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">visible</text>
  <text x="485" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">true | false</text>

  <rect x="575" y="290" width="215" height="50" fill="#0f1929" rx="5"/>
  <text x="682" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">imageInfo</text>
  <text x="682" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">상태별 아이콘 이미지</text>

  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">onclick: 클릭 이벤트  |  ondblclick: 더블클릭  |  onmouseup: 마우스 업</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">set_text() / set_enable() / set_visible() — 런타임 제어 메서드</text>
  <text x="80" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">taborder: 탭 키 이동 순서 제어</text>
  <text x="80" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ access="tabstop": 포커스 정지 여부 제어</text>
</svg>
