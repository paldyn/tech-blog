<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ar2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="470" rx="12" fill="#0a0a0a"/>
  <text x="60" y="56" font-size="22" font-weight="700" fill="#e8e8e8">정점 덮개 2-근사: 아무 간선이나 골라 양 끝점을 담는다</text>

  <!-- step labels -->
  <text x="200" y="100" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">① 덮이지 않은 간선 선택</text>
  <text x="680" y="100" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">② 양 끝점을 덮개에 추가</text>

  <!-- left graph -->
  <line x1="130" y1="180" x2="270" y2="180" stroke="#7ec8e3" stroke-width="3"/>
  <line x1="130" y1="180" x2="130" y2="300" stroke="#555" stroke-width="2"/>
  <line x1="270" y1="180" x2="320" y2="300" stroke="#555" stroke-width="2"/>
  <line x1="130" y1="300" x2="320" y2="300" stroke="#555" stroke-width="2"/>
  <circle cx="130" cy="180" r="16" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="185" font-size="13" fill="#ffffff" text-anchor="middle">a</text>
  <circle cx="270" cy="180" r="16" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="270" y="185" font-size="13" fill="#ffffff" text-anchor="middle">b</text>
  <circle cx="130" cy="300" r="16" fill="#1a1f2e" stroke="#555" stroke-width="2"/>
  <text x="130" y="305" font-size="13" fill="#ffffff" text-anchor="middle">c</text>
  <circle cx="320" cy="300" r="16" fill="#1a1f2e" stroke="#555" stroke-width="2"/>
  <text x="320" y="305" font-size="13" fill="#ffffff" text-anchor="middle">d</text>
  <text x="200" y="160" font-size="13" fill="#7ec8e3" text-anchor="middle">선택한 간선 (a,b)</text>

  <!-- arrow -->
  <line x1="380" y1="240" x2="500" y2="240" stroke="#888" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- right graph -->
  <line x1="610" y1="180" x2="750" y2="180" stroke="#555" stroke-width="2"/>
  <line x1="610" y1="180" x2="610" y2="300" stroke="#555" stroke-width="2"/>
  <line x1="750" y1="180" x2="800" y2="300" stroke="#555" stroke-width="2"/>
  <line x1="610" y1="300" x2="800" y2="300" stroke="#555" stroke-width="2"/>
  <circle cx="610" cy="180" r="16" fill="#2a1f1f" stroke="#e05555" stroke-width="3"/>
  <text x="610" y="185" font-size="13" fill="#ffffff" text-anchor="middle">a</text>
  <circle cx="750" cy="180" r="16" fill="#2a1f1f" stroke="#e05555" stroke-width="3"/>
  <text x="750" y="185" font-size="13" fill="#ffffff" text-anchor="middle">b</text>
  <circle cx="610" cy="300" r="16" fill="#1a1f2e" stroke="#555" stroke-width="2"/>
  <text x="610" y="305" font-size="13" fill="#ffffff" text-anchor="middle">c</text>
  <circle cx="800" cy="300" r="16" fill="#1a1f2e" stroke="#555" stroke-width="2"/>
  <text x="800" y="305" font-size="13" fill="#ffffff" text-anchor="middle">d</text>
  <text x="700" y="160" font-size="13" fill="#e05555" text-anchor="middle">a, b 를 덮개에 추가</text>

  <!-- bound box -->
  <rect x="90" y="360" width="700" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="112" y="390" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">선택한 간선들은 서로 끝점을 공유하지 않는 매칭 → |매칭| ≤ OPT</text>
  <text x="112" y="418" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">덮개 크기 = 2 · |매칭| ≤ 2 · OPT   ⟹   2-근사 보장</text>
</svg>
