<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">결측치(NaN)에 대처하는 세 갈래</text>

  <rect x="60" y="84" width="246" height="150" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="78" y="112" font-size="15" font-weight="600" fill="#e05555">제거 (dropna)</text>
  <text x="78" y="140" font-size="13" fill="#9aa4b8">결측 행/열을 버린다</text>
  <text x="78" y="164" font-size="13" fill="#9aa4b8">결측이 적을 때 간단</text>
  <text x="78" y="194" font-size="13" fill="#9aa4b8">df.dropna()</text>
  <text x="78" y="216" font-size="12" fill="#888">단점: 데이터가 줄어듦</text>

  <rect x="317" y="84" width="246" height="150" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="335" y="112" font-size="15" font-weight="600" fill="#55c555">대치 (fillna)</text>
  <text x="335" y="140" font-size="13" fill="#9aa4b8">값으로 채운다</text>
  <text x="335" y="164" font-size="13" fill="#9aa4b8">평균·중앙값·0 등</text>
  <text x="335" y="194" font-size="13" fill="#9aa4b8">df.fillna(median)</text>
  <text x="335" y="216" font-size="12" fill="#888">주의: 분포가 왜곡될 수</text>

  <rect x="574" y="84" width="246" height="150" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="592" y="112" font-size="15" font-weight="600" fill="#7777cc">표시 (flag)</text>
  <text x="592" y="140" font-size="13" fill="#9aa4b8">"결측이었음"을 기록</text>
  <text x="592" y="164" font-size="13" fill="#9aa4b8">새 불리언 컬럼 추가</text>
  <text x="592" y="194" font-size="13" fill="#9aa4b8">df["x_missing"]</text>
  <text x="592" y="216" font-size="12" fill="#888">결측 자체가 신호일 때</text>

  <rect x="60" y="252" width="760" height="30" rx="4" fill="#0f1320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="272" font-size="13" fill="#7ec8e3" text-anchor="middle">정답은 데이터의 의미에 달려 있다 — 왜 비었는지부터 묻는다</text>
</svg>
