<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <!-- Background -->
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">import 한 줄이 파일을 찾아가는 과정</text>

  <!-- Left: relative import -->
  <rect x="60" y="76" width="360" height="300" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">from "./util" — 상대 경로</text>

  <rect x="80" y="118" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">1. ./util.ts</text>
  <rect x="80" y="160" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">2. ./util.tsx</text>
  <rect x="80" y="202" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">3. ./util.d.ts</text>
  <rect x="80" y="244" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">4. ./util/package.json</text>
  <rect x="80" y="286" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">5. ./util/index.ts</text>

  <text x="240" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">import한 파일 위치 기준으로 위에서부터 순서대로 시도</text>

  <!-- Right: package import -->
  <rect x="460" y="76" width="360" height="300" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">from "pkg" — 패키지 경로</text>

  <rect x="480" y="118" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">1. ./node_modules/pkg</text>
  <rect x="480" y="160" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">2. package.json의 types 필드</text>
  <rect x="480" y="202" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">3. pkg/index.d.ts</text>
  <rect x="480" y="244" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">4. @types/pkg 폴백</text>
  <rect x="480" y="286" width="320" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">5. ../node_modules로 반복</text>

  <text x="640" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">못 찾으면 상위 디렉터리로 올라가며 루트까지 반복</text>

  <!-- Bottom note -->
  <rect x="60" y="396" width="760" height="50" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">TypeScript는 실행 파일이 아니라 타입 정보(.ts·.d.ts)를 찾는다 — 런타임 해석과 별개의 과정</text>
</svg>
