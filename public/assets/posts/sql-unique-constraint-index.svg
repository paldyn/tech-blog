<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400" style="background:#0a0a0a;border-radius:12px">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">UNIQUE 인덱스 vs UNIQUE 제약</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">선언 방식의 차이와 실질적 동작 비교</text>

  <!-- Left: Constraint -->
  <rect x="60" y="96" width="350" height="120" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="235" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">UNIQUE 제약 (표준 SQL)</text>
  <line x1="80" y1="128" x2="390" y2="128" stroke="#1e2433"/>
  <text x="80" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">이름 지정 가능</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">DEFERRABLE 지원 (PostgreSQL)</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">FK 참조 대상으로 사용 가능</text>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">내부적으로 UNIQUE 인덱스 생성</text>

  <!-- Right: Index -->
  <rect x="470" y="96" width="350" height="120" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="645" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">UNIQUE 인덱스 (DDL)</text>
  <line x1="490" y1="128" x2="800" y2="128" stroke="#1e2433"/>
  <text x="490" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">부분(WHERE) 조건 가능 (PostgreSQL)</text>
  <text x="490" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">더 유연한 옵션</text>
  <text x="490" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">DEFERRABLE 불가</text>
  <text x="490" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">FK 참조 대상 불가 (일부 DB)</text>

  <!-- Code block -->
  <rect x="60" y="240" width="760" height="120" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- UNIQUE 인덱스로 soft-delete 패턴 구현 (PostgreSQL)</text>
  <text x="80" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- 삭제되지 않은 행에만 email 유일성 강제</text>
  <text x="80" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">CREATE UNIQUE INDEX</text>
  <text x="247" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> uq_active_users_email</text>
  <text x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    ON</text>
  <text x="116" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> users (email)</text>
  <text x="80" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    WHERE</text>
  <text x="139" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> deleted_at </text>
  <text x="254" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" xml:space="preserve">IS NULL</text>
  <text x="304" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">;</text>

  <text x="440" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
