<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">조인 순서 탐색 — Dynamic Programming vs GEQO</text>

  <!-- Left: DP approach -->
  <text x="200" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">동적 프로그래밍 (DP)</text>
  <text x="200" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">join_collapse_limit 이하 시 사용</text>

  <!-- 3 tables join tree (DP) -->
  <rect x="160" y="120" width="80" height="36" rx="6" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">A ⋈ B ⋈ C</text>

  <!-- Level 2 -->
  <rect x="70" y="180" width="80" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="110" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">(A⋈B)⋈C</text>
  <rect x="165" y="180" width="80" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="205" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">(A⋈C)⋈B</text>
  <rect x="260" y="180" width="80" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="300" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">(B⋈C)⋈A</text>

  <line x1="200" y1="156" x2="110" y2="180" stroke="#444" stroke-width="1"/>
  <line x1="200" y1="156" x2="205" y2="180" stroke="#444" stroke-width="1"/>
  <line x1="200" y1="156" x2="300" y2="180" stroke="#444" stroke-width="1"/>

  <!-- Cost labels -->
  <text x="110" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">cost: 120</text>
  <text x="205" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">cost: 85</text>
  <text x="300" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">cost: 210</text>

  <!-- Best choice highlight -->
  <rect x="161" y="244" width="88" height="28" rx="4" fill="#0a2010" stroke="#55c555"/>
  <text x="205" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">최적 선택</text>

  <!-- Complexity note -->
  <rect x="60" y="296" width="280" height="60" rx="6" fill="#111520" stroke="#333"/>
  <text x="200" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">탐색 공간</text>
  <text x="200" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">N 테이블 → N! / 2 순열</text>
  <text x="200" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">5개=60, 8개=20160, 12개=239백만</text>

  <!-- Divider -->
  <line x1="440" y1="70" x2="440" y2="440" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right: GEQO -->
  <text x="660" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">GEQO (유전자 알고리즘)</text>
  <text x="660" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">geqo_threshold 이상 시 자동 전환</text>

  <!-- GEQO process -->
  <rect x="490" y="120" width="340" height="48" rx="6" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">초기 집단 생성 (무작위 순열)</text>
  <text x="660" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">geqo_pool_size 개의 조인 순서 후보</text>

  <line x1="660" y1="168" x2="660" y2="188" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="660,192 654,180 666,180" fill="#7ec8e3"/>

  <rect x="490" y="194" width="340" height="48" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">적합도 평가 (비용 추정)</text>
  <text x="660" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 순열의 예상 비용 계산</text>

  <line x1="660" y1="242" x2="660" y2="262" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="660,266 654,254 666,254" fill="#55c555"/>

  <rect x="490" y="268" width="340" height="48" rx="6" fill="#1a1000" stroke="#e8a800" stroke-width="1.5"/>
  <text x="660" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a800">교차 + 돌연변이 (새 세대)</text>
  <text x="660" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">geqo_generations 세대 반복</text>

  <line x1="660" y1="316" x2="660" y2="336" stroke="#e8a800" stroke-width="1.5"/>
  <polygon points="660,340 654,328 666,328" fill="#e8a800"/>

  <rect x="490" y="342" width="340" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">최적 후보 선택 (근사 최적)</text>

  <!-- Code block -->
  <rect x="60" y="388" width="760" height="68" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- GEQO 임계값 및 파라미터</text>
  <text x="76" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SHOW</text>
  <text x="106" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> geqo_threshold;       </text>
  <text x="280" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 기본 12 (12개 테이블 이상 시 GEQO)</text>
  <text x="76" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SET</text>
  <text x="100" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> join_collapse_limit = </text>
  <text x="256" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">8</text>
  <text x="264" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="276" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- FROM 절 조인 순서 고정 비활성화</text>
</svg>
