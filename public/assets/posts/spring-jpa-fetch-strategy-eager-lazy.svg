<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 510" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="510" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">JPA 페치 전략 — EAGER vs LAZY</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">연관 엔티티 로딩 시점을 결정하는 핵심 설정</text>

  <!-- EAGER Panel -->
  <rect x="60" y="86" width="360" height="180" rx="8" fill="#0d1b0e" stroke="#55c555" stroke-width="1.5"/>
  <rect x="61" y="87" width="358" height="34" rx="7" fill="#163018"/>
  <rect x="61" y="107" width="358" height="14" fill="#163018"/>
  <text x="240" y="110" text-anchor="middle" fill="#55c555" font-size="15" font-weight="600">EAGER (즉시 로딩)</text>
  <text x="80" y="138" fill="#e8e8e8" font-size="13">엔티티 조회 시 연관 데이터를 즉시 로딩</text>
  <text x="80" y="157" fill="#888" font-size="13">• JOIN 또는 추가 SELECT로 바로 가져옴</text>
  <text x="80" y="175" fill="#888" font-size="13">• 연관 객체가 항상 필요할 때 유리</text>
  <text x="80" y="193" fill="#e05555" font-size="13">✗  불필요한 데이터도 무조건 로딩</text>
  <text x="80" y="211" fill="#e05555" font-size="13">✗  N+1 쿼리 문제 발생 위험</text>
  <text x="80" y="249" fill="#888" font-size="12">기본값: @ManyToOne, @OneToOne</text>

  <!-- VS Divider -->
  <circle cx="440" cy="176" r="24" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="182" text-anchor="middle" fill="#666" font-size="13" font-weight="700">VS</text>

  <!-- LAZY Panel -->
  <rect x="460" y="86" width="360" height="180" rx="8" fill="#0d0e1b" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="461" y="87" width="358" height="34" rx="7" fill="#161830"/>
  <rect x="461" y="107" width="358" height="14" fill="#161830"/>
  <text x="640" y="110" text-anchor="middle" fill="#7ec8e3" font-size="15" font-weight="600">LAZY (지연 로딩)</text>
  <text x="480" y="138" fill="#e8e8e8" font-size="13">연관 필드 최초 접근 시 SELECT 실행</text>
  <text x="480" y="157" fill="#888" font-size="13">• 프록시 객체로 자리를 대신 채움</text>
  <text x="480" y="175" fill="#55c555" font-size="13">✓  실제 필요할 때만 SQL 실행</text>
  <text x="480" y="193" fill="#55c555" font-size="13">✓  성능 최적화에 유리 (실무 권장)</text>
  <text x="480" y="211" fill="#e05555" font-size="13">✗  LazyInitializationException 주의</text>
  <text x="480" y="249" fill="#888" font-size="12">기본값: @OneToMany, @ManyToMany</text>

  <!-- Default Values Reference Table -->
  <text x="440" y="296" text-anchor="middle" fill="#888" font-size="12" font-weight="600">어노테이션별 기본값 · 권장값</text>
  <line x1="60" y1="304" x2="820" y2="304" stroke="#222" stroke-width="1"/>

  <!-- Table header -->
  <rect x="60" y="310" width="760" height="30" rx="4" fill="#111"/>
  <text x="180" y="330" text-anchor="middle" fill="#888" font-size="12" font-weight="600">어노테이션</text>
  <text x="380" y="330" text-anchor="middle" fill="#888" font-size="12" font-weight="600">기본 페치</text>
  <text x="540" y="330" text-anchor="middle" fill="#888" font-size="12" font-weight="600">실무 권장</text>
  <text x="700" y="330" text-anchor="middle" fill="#888" font-size="12" font-weight="600">비고</text>

  <!-- Row 1 -->
  <rect x="60" y="342" width="760" height="30" rx="0" fill="#0c0c0c"/>
  <text x="180" y="362" text-anchor="middle" fill="#7ec8e3" font-size="12">@ManyToOne</text>
  <text x="380" y="362" text-anchor="middle" fill="#e05555" font-size="12">EAGER</text>
  <text x="540" y="362" text-anchor="middle" fill="#55c555" font-size="12">LAZY</text>
  <text x="700" y="362" text-anchor="middle" fill="#888" font-size="12">N+1 방지, 성능</text>

  <!-- Row 2 -->
  <rect x="60" y="374" width="760" height="30" rx="0" fill="#0a0a0a"/>
  <text x="180" y="394" text-anchor="middle" fill="#7ec8e3" font-size="12">@OneToOne</text>
  <text x="380" y="394" text-anchor="middle" fill="#e05555" font-size="12">EAGER</text>
  <text x="540" y="394" text-anchor="middle" fill="#55c555" font-size="12">LAZY</text>
  <text x="700" y="394" text-anchor="middle" fill="#888" font-size="12">프록시 제약 주의</text>

  <!-- Row 3 -->
  <rect x="60" y="406" width="760" height="30" rx="0" fill="#0c0c0c"/>
  <text x="180" y="426" text-anchor="middle" fill="#7ec8e3" font-size="12">@OneToMany</text>
  <text x="380" y="426" text-anchor="middle" fill="#55c555" font-size="12">LAZY</text>
  <text x="540" y="426" text-anchor="middle" fill="#55c555" font-size="12">LAZY</text>
  <text x="700" y="426" text-anchor="middle" fill="#888" font-size="12">기본값 그대로 사용</text>

  <!-- Row 4 -->
  <rect x="60" y="438" width="760" height="30" rx="4" fill="#0a0a0a"/>
  <text x="180" y="458" text-anchor="middle" fill="#7ec8e3" font-size="12">@ManyToMany</text>
  <text x="380" y="458" text-anchor="middle" fill="#55c555" font-size="12">LAZY</text>
  <text x="540" y="458" text-anchor="middle" fill="#55c555" font-size="12">LAZY</text>
  <text x="700" y="458" text-anchor="middle" fill="#888" font-size="12">기본값 그대로 사용</text>

  <!-- Table border -->
  <rect x="60" y="310" width="760" height="158" rx="4" fill="none" stroke="#222" stroke-width="1"/>

  <!-- Bottom tip -->
  <text x="440" y="494" text-anchor="middle" fill="#7777cc" font-size="12">실무 원칙: 모든 연관 관계에 fetch = FetchType.LAZY 명시 → 필요 시 fetch join으로 최적화</text>
</svg>
