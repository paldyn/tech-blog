<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">시스템 메시지 해부도</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">효과적인 시스템 프롬프트의 6가지 구성 요소</text>

  <!-- Block 1: Role -->
  <rect x="60" y="90" width="360" height="62" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① 역할(Role) · 페르소나</text>
  <text x="80" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">당신은 10년 경력의 시니어 백엔드 엔지니어입니다.</text>
  <text x="80" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 모델의 관점·어조·전문성 수준 설정</text>

  <!-- Block 2: Context -->
  <rect x="460" y="90" width="360" height="62" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">② 컨텍스트(Context) · 배경</text>
  <text x="480" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">우리 서비스는 B2B SaaS이며 고객은 개발자입니다.</text>
  <text x="480" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 도메인, 사용자, 목적 정보 제공</text>

  <!-- Block 3: Instructions -->
  <rect x="60" y="172" width="360" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ 지시사항(Instructions)</text>
  <text x="80" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">- 답변은 반드시 한국어로 작성하세요</text>
  <text x="80" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">- 코드는 항상 타입 힌트를 포함하세요</text>
  <text x="80" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 해야 할 것 / 하지 말아야 할 것 명시</text>

  <!-- Block 4: Output Format -->
  <rect x="460" y="172" width="360" height="80" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="480" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">④ 출력 형식(Output Format)</text>
  <text x="480" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">JSON으로만 응답: {"key": "value"}</text>
  <text x="480" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">마크다운 헤딩은 ##까지만 사용</text>
  <text x="480" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 구조, 길이, 스타일 제약</text>

  <!-- Block 5: Constraints -->
  <rect x="60" y="272" width="360" height="80" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">⑤ 제약(Constraints) · 경계</text>
  <text x="80" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">- 개인 식별 정보(PII)는 절대 출력 금지</text>
  <text x="80" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">- 경쟁사 이름을 직접 언급하지 마세요</text>
  <text x="80" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 안전·법적·비즈니스 경계 설정</text>

  <!-- Block 6: Examples -->
  <rect x="460" y="272" width="360" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="480" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">⑥ 예시(Examples)</text>
  <text x="480" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Input: "오류 코드 500"</text>
  <text x="480" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Output: {"error": "Internal Server Error"}</text>
  <text x="480" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 원하는 패턴의 구체적 시범</text>

  <!-- Bottom note -->
  <rect x="60" y="370" width="760" height="50" rx="8" fill="#111111" stroke="#3a4a6e"/>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">모든 요소가 필수는 아님 — 태스크에 맞게 필요한 요소만 조합</text>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Anthropic 권장 순서: Role → Context → Instructions → Format → Constraints → Examples</text>
</svg>
