<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">테스트 더블 — 5가지 유형 비교</text>

  <!-- Dummy -->
  <rect x="60" y="68" width="370" height="82" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Dummy</text>
  <text x="200" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 자리 채우기용, 실제로 사용되지 않음</text>
  <text x="80" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">createUser(user, null, null)</text>
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">null·빈 객체를 파라미터로 전달, 해당 경로 사용 안 함</text>

  <!-- Fake -->
  <rect x="450" y="68" width="370" height="82" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Fake</text>
  <text x="530" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 실제 동작하는 가벼운 구현체</text>
  <text x="470" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">InMemoryUserRepository</text>
  <text x="470" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Map 기반 DB 구현 — 프로덕션과 동일한 인터페이스</text>

  <!-- Stub -->
  <rect x="60" y="162" width="370" height="82" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#b5cea8">Stub</text>
  <text x="136" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 미리 정해진 값 반환, 동작은 없음</text>
  <text x="80" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">stub.returns({ id: 1, name: 'Alice' })</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">입력과 무관하게 정해진 출력 반환 — 간접 입력 제어</text>

  <!-- Spy -->
  <rect x="450" y="162" width="370" height="82" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Spy</text>
  <text x="510" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 실제 동작 + 호출 정보 기록</text>
  <text x="470" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">vi.spyOn(mailer, 'send')</text>
  <text x="470" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 메서드 그대로 실행하면서 호출 횟수·인수 기록</text>

  <!-- Mock -->
  <rect x="60" y="256" width="760" height="82" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">Mock</text>
  <text x="130" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— 기대 행동을 미리 프로그래밍, 검증까지 포함 (Spy + Stub 결합)</text>
  <text x="80" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">vi.fn().mockReturnValue(42)   expect(fn).toHaveBeenCalledWith('arg')</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반환값 제어(Stub) + 호출 검증(Spy) 동시에 — 일상에서 가장 많이 쓰이는 "목"의 의미</text>

  <!-- Decision guide -->
  <text x="60" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">선택 가이드</text>

  <rect x="60" y="382" width="760" height="80" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">외부 서비스 호출 제어 →</text>
  <text x="270" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8">Stub</text>
  <text x="460" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">호출 여부/횟수 검증 →</text>
  <text x="630" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Spy / Mock</text>
  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">DB·파일시스템 대체 →</text>
  <text x="260" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Fake</text>
  <text x="460" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">파라미터 무시 →</text>
  <text x="610" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Dummy</text>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">⚠ 과도한 목킹: 구현 세부사항과 강결합 → 리팩토링 때마다 테스트 깨짐</text>
</svg>
