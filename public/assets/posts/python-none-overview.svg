<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">None — Python의 '없음'</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">NoneType 유일 인스턴스 · 동일성 검사 · 반환값 관례</text>

  <!-- None is singleton -->
  <rect x="60" y="100" width="360" height="200" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="240" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">None은 싱글턴</text>
  <rect x="80" y="146" width="320" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">None</text></text>
  <text x="96" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">b = <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">None</text></text>
  <text x="96" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">is</text> b          <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"># True</text></text>
  <text x="96" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">type</text>(a)        <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># &lt;class 'NoneType'&gt;</text></text>
  <text x="96" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">id</text>(a) == <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">id</text>(b)  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"># True</text></text>
  <text x="96" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a == b          <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"># True</text></text>

  <!-- None check -->
  <rect x="460" y="100" width="360" height="200" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="640" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">None 검사 방법</text>
  <rect x="480" y="146" width="320" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 올바른 방법: is / is not</text>
  <text x="496" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">if</text><text x="514" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> x <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">is</text> <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">None</text>:</text>
  <text x="496" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">if</text><text x="514" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> x <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">is not</text> <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">None</text>:</text>
  <text x="496" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 피해야 할 방법</text>
  <text x="496" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">if</text><text x="514" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555"> x == None:   # 비권장</text>
  <text x="496" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">if</text><text x="514" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555"> not x:       # 0, "" 도 포함</text>

  <!-- Return None -->
  <rect x="60" y="320" width="760" height="130" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">함수 반환값으로서의 None</text>
  <rect x="80" y="360" width="720" height="72" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def</text><text x="120" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> greet(name):  </text><text x="96" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">                         </text>
  <text x="110" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">                 </text>
  <!-- re-do -->
  <text x="96" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> greet(name):   </tspan><tspan fill="#6a8aa0"># return 없으면 암묵적으로 None 반환</tspan></text>
  <text x="96" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">f"Hi {name}"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="96" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">result = greet(</tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#e8e8e8">);  </tspan><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(result)   </tspan><tspan fill="#6a8aa0"># None</tspan></text>
</svg>
