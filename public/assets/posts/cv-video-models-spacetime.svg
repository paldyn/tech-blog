<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이미지 vs 비디오 확산 모델 구조 차이</text>

  <!-- Image Diffusion -->
  <rect x="40" y="70" width="370" height="270" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="225" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">이미지 확산 모델 (2D)</text>

  <!-- 2D grid -->
  <text x="100" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">입력: (B, C, H, W)</text>
  <rect x="60" y="148" width="100" height="100" rx="4" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="110" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">단일 이미지</text>
  <text x="110" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">64×64×4</text>
  <text x="110" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(잠재 공간)</text>

  <text x="225" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">U-Net:</text>
  <text x="225" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">공간 어텐션</text>
  <text x="225" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">ResNet Block</text>
  <text x="225" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Cross-Attn (txt)</text>

  <rect x="300" y="148" width="90" height="100" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="345" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">출력 이미지</text>
  <text x="345" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">512×512</text>

  <text x="225" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시간 차원 없음</text>
  <text x="225" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프레임 독립 처리</text>
  <text x="225" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메모리: ~6GB GPU</text>

  <!-- Video Diffusion -->
  <rect x="470" y="70" width="370" height="270" rx="10" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="655" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178" text-anchor="middle">비디오 확산 모델 (3D)</text>

  <!-- 3D grid (frames) -->
  <text x="490" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">입력: (B, C, F, H, W)</text>

  <!-- Frame 1 -->
  <rect x="490" y="148" width="70" height="70" rx="3" fill="#1a1a2e" stroke="#ce9178" stroke-width="1"/>
  <text x="525" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">f=1</text>
  <text x="525" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">64×64</text>

  <!-- Frame 2 -->
  <rect x="508" y="164" width="70" height="70" rx="3" fill="#1a1a2e" stroke="#ce9178" stroke-width="1"/>
  <text x="543" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">f=8</text>

  <!-- Frame 3 -->
  <rect x="526" y="180" width="70" height="70" rx="3" fill="#1a1a2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="561" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">f=F</text>

  <!-- 3D UNet -->
  <text x="655" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">3D U-Net / DiT:</text>
  <text x="655" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">공간 어텐션 (H,W)</text>
  <text x="655" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ 시간 어텐션 (F)</text>
  <text x="655" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Cross-Attn (txt/img)</text>

  <rect x="750" y="155" width="70" height="70" rx="3" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="785" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">F 프레임</text>
  <text x="785" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">출력 비디오</text>

  <text x="655" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시간 어텐션으로 프레임 간 일관성</text>
  <text x="655" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">플래시 어텐션으로 메모리 절약</text>
  <text x="655" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">메모리: ~24GB GPU (F=16)</text>

  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">시간 어텐션은 각 픽셀 위치에서 모든 프레임의 특징을 비교해 부드러운 움직임을 학습</text>
</svg>
