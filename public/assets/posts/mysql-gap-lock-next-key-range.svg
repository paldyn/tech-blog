<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Gap Lock · Next-Key Lock 범위 시각화</text>

  <!-- Index row timeline -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">인덱스 키 공간 (id)</text>

  <!-- Key values on axis -->
  <line x1="60" y1="130" x2="820" y2="130" stroke="#444" stroke-width="1.5"/>

  <!-- Key markers -->
  <!-- id=10 -->
  <line x1="160" y1="122" x2="160" y2="138" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">10</text>

  <!-- id=20 -->
  <line x1="310" y1="122" x2="310" y2="138" stroke="#7ec8e3" stroke-width="2"/>
  <text x="310" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">20</text>

  <!-- id=30 -->
  <line x1="460" y1="122" x2="460" y2="138" stroke="#7ec8e3" stroke-width="2"/>
  <text x="460" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">30</text>

  <!-- id=50 -->
  <line x1="660" y1="122" x2="660" y2="138" stroke="#7ec8e3" stroke-width="2"/>
  <text x="660" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">50</text>

  <!-- supremum -->
  <text x="790" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">supremum</text>

  <!-- Row Lock label -->
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">① Record Lock  (WHERE id = 20)</text>
  <rect x="270" y="212" width="80" height="28" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="310" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">id = 20</text>

  <!-- Gap Lock label -->
  <text x="60" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">② Gap Lock  (20, 30) — 삽입 차단</text>
  <rect x="310" y="287" width="150" height="28" rx="4" fill="#1a1a3a" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="385" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">(20, 30) 사이 — 열린 구간</text>

  <!-- Next-Key Lock label -->
  <text x="60" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">③ Next-Key Lock  (20, 30] = Record + Gap</text>
  <rect x="270" y="362" width="230" height="28" rx="4" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="385" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">(20, 30] — 닫힌 구간 포함</text>

  <!-- INSERT INTENTION label -->
  <text x="60" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">④ Insert Intention Lock — Gap Lock과 충돌</text>
  <rect x="340" y="437" width="130" height="28" rx="4" fill="#1a1a1a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="405" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">INSERT id=25 → WAIT</text>

  <!-- Connecting lines from axis to each box -->
  <line x1="310" y1="138" x2="310" y2="212" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="310" y1="138" x2="310" y2="287" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="460" y1="138" x2="460" y2="287" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="310" y1="138" x2="310" y2="362" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="460" y1="138" x2="460" y2="362" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
