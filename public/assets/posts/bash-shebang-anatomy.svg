<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">셔뱅(Shebang) 라인 구조</text>

  <!-- Shebang line code box -->
  <rect x="60" y="72" width="760" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700">
    <tspan fill="#e05555">#!/</tspan><tspan fill="#7ec8e3">usr/bin/env</tspan><tspan fill="#ffffff"> bash</tspan>
  </text>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 파일 첫 줄, 반드시 #! 으로 시작</text>

  <!-- Annotation arrows pointing to parts of shebang -->
  <defs>
    <marker id="sarr2" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 2 0 L 7 12 L 12 0 z" fill="#888"/>
    </marker>
  </defs>

  <!-- #! annotation -->
  <line x1="90" y1="134" x2="90" y2="168" stroke="#e05555" stroke-width="1.5" marker-end="url(#sarr2)"/>
  <rect x="60" y="168" width="130" height="56" rx="6" fill="#150505" stroke="#e05555" stroke-width="1"/>
  <text x="125" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">#!</text>
  <text x="125" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">매직 바이트</text>
  <text x="125" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인터프리터 지시자</text>

  <!-- /usr/bin/env annotation -->
  <line x1="240" y1="134" x2="300" y2="168" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#sarr2)"/>
  <rect x="200" y="168" width="200" height="56" rx="6" fill="#050a15" stroke="#7ec8e3" stroke-width="1"/>
  <text x="300" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">/usr/bin/env</text>
  <text x="300" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PATH에서 인터프리터 검색</text>
  <text x="300" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이식성↑ (절대경로 대신)</text>

  <!-- bash annotation -->
  <line x1="440" y1="134" x2="540" y2="168" stroke="#55c555" stroke-width="1.5" marker-end="url(#sarr2)"/>
  <rect x="450" y="168" width="160" height="56" rx="6" fill="#051405" stroke="#55c555" stroke-width="1"/>
  <text x="530" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">bash</text>
  <text x="530" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인터프리터 이름</text>
  <text x="530" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">python3, node 등 가능</text>

  <!-- Execution methods -->
  <text x="440" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">스크립트 실행 방법 비교</text>

  <rect x="60" y="282" width="760" height="148" rx="8" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row headers -->
  <text x="170" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">실행 방법</text>
  <text x="400" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">특징</text>
  <text x="660" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">서브셸 생성</text>
  <line x1="76" y1="314" x2="804" y2="314" stroke="#2a2a2a" stroke-width="1"/>

  <text x="80" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">./script.sh</text>
  <text x="310" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">셔뱅 인터프리터로 실행, 실행권한 필요</text>
  <text x="650" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">O (새 프로세스)</text>

  <text x="80" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">bash script.sh</text>
  <text x="310" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">bash로 명시 실행, 실행권한 불필요</text>
  <text x="650" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">O (서브셸)</text>

  <text x="80" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a055" font-weight="600">source script.sh</text>
  <text x="310" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">현재 셸에서 실행, 변수·함수 반영됨</text>
  <text x="650" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">X (현재 셸)</text>

  <text x="80" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a055" font-weight="600">. script.sh</text>
  <text x="310" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">source의 단축형 (POSIX 호환)</text>
  <text x="650" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">X (현재 셸)</text>
</svg>
