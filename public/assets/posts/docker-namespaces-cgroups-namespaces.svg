<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Linux Namespaces — Docker 격리의 핵심</text>

  <!-- Host OS Box -->
  <rect x="60" y="70" width="760" height="400" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Linux Kernel</text>

  <!-- PID Namespace -->
  <rect x="80" y="110" width="180" height="80" rx="6" fill="#0a1628" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">PID Namespace</text>
  <text x="170" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프로세스 ID 격리</text>
  <text x="170" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">PID 1 = init per ns</text>

  <!-- NET Namespace -->
  <rect x="280" y="110" width="180" height="80" rx="6" fill="#0a1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="370" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">NET Namespace</text>
  <text x="370" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">네트워크 스택 격리</text>
  <text x="370" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">eth0, lo per ns</text>

  <!-- MNT Namespace -->
  <rect x="480" y="110" width="180" height="80" rx="6" fill="#0a1628" stroke="#ce9178" stroke-width="1.5"/>
  <text x="570" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">MNT Namespace</text>
  <text x="570" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파일시스템 마운트 격리</text>
  <text x="570" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">pivot_root / chroot</text>

  <!-- UTS Namespace -->
  <rect x="680" y="110" width="140" height="80" rx="6" fill="#0a1628" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="750" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#b5cea8" text-anchor="middle">UTS Namespace</text>
  <text x="750" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">호스트명 격리</text>
  <text x="750" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">hostname per ns</text>

  <!-- IPC Namespace -->
  <rect x="80" y="220" width="180" height="80" rx="6" fill="#0a1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">IPC Namespace</text>
  <text x="170" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프로세스간 통신 격리</text>
  <text x="170" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">SHM, semaphore</text>

  <!-- USER Namespace -->
  <rect x="280" y="220" width="180" height="80" rx="6" fill="#0a1628" stroke="#e05555" stroke-width="1.5"/>
  <text x="370" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">USER Namespace</text>
  <text x="370" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">UID/GID 매핑 격리</text>
  <text x="370" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">rootless 기반</text>

  <!-- CGROUP Namespace -->
  <rect x="480" y="220" width="180" height="80" rx="6" fill="#0a1628" stroke="#f5c542" stroke-width="1.5"/>
  <text x="570" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#f5c542" text-anchor="middle">CGROUP Namespace</text>
  <text x="570" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">cgroup 뷰 격리</text>
  <text x="570" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">Linux 4.6+</text>

  <!-- TIME Namespace -->
  <rect x="680" y="220" width="140" height="80" rx="6" fill="#0a1628" stroke="#888" stroke-width="1.5"/>
  <text x="750" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888" text-anchor="middle">TIME Namespace</text>
  <text x="750" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시스템 시계 격리</text>
  <text x="750" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">Linux 5.6+</text>

  <!-- Container Box -->
  <rect x="80" y="330" width="760" height="120" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="460" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Docker 컨테이너 — 각 Namespace 인스턴스를 묶어 격리 환경 구성</text>

  <rect x="100" y="366" width="170" height="64" rx="5" fill="#1a2035" stroke="#55c555" stroke-width="1"/>
  <text x="185" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">PID 1 (nginx)</text>
  <text x="185" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">PID ns: 1,2,3...</text>
  <text x="185" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">Host ns: 3412,3413...</text>

  <rect x="290" y="366" width="170" height="64" rx="5" fill="#1a2035" stroke="#7ec8e3" stroke-width="1"/>
  <text x="375" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">eth0: 172.17.0.2</text>
  <text x="375" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">독립 라우팅 테이블</text>
  <text x="375" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">veth pair 연결</text>

  <rect x="480" y="366" width="170" height="64" rx="5" fill="#1a2035" stroke="#ce9178" stroke-width="1"/>
  <text x="565" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">/ = OverlayFS</text>
  <text x="565" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">독립 마운트 트리</text>
  <text x="565" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">pivot_root 적용</text>

  <rect x="670" y="366" width="150" height="64" rx="5" fill="#1a2035" stroke="#b5cea8" stroke-width="1"/>
  <text x="745" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">hostname: app</text>
  <text x="745" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">domainname 독립</text>
  <text x="745" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">UTS ns 인스턴스</text>

  <!-- Arrows from ns boxes to container -->
  <line x1="170" y1="300" x2="170" y2="366" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>
  <line x1="370" y1="300" x2="370" y2="366" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>
  <line x1="570" y1="300" x2="570" y2="366" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>
  <line x1="750" y1="300" x2="750" y2="366" stroke="#b5cea8" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- Bottom label -->
  <text x="440" y="495" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">unshare(2) · clone(CLONE_NEW*) 시스템 콜로 새 Namespace 생성 — 컨테이너마다 독립 뷰 제공</text>
</svg>
