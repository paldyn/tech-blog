<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 언어 분류 체계</text>

  <!-- Center: SQL -->
  <rect x="370" y="196" width="140" height="60" fill="#1a2a4a" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">SQL</text>

  <!-- DDL -->
  <rect x="60" y="80" width="240" height="130" fill="#111" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">DDL (데이터 정의어)</text>
  <text x="180" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Data Definition Language</text>
  <text x="90" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">CREATE   ALTER   DROP</text>
  <text x="90" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">TRUNCATE   RENAME</text>
  <text x="90" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">스키마 구조 변경, 자동 COMMIT</text>

  <!-- DML -->
  <rect x="60" y="250" width="240" height="130" fill="#111" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">DML (데이터 조작어)</text>
  <text x="180" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Data Manipulation Language</text>
  <text x="90" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">SELECT   INSERT   UPDATE</text>
  <text x="90" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">DELETE   MERGE   CALL</text>
  <text x="90" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">데이터 조회/변경, 트랜잭션 내 실행</text>

  <!-- DCL -->
  <rect x="580" y="80" width="240" height="130" fill="#111" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="700" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8a020" text-anchor="middle">DCL (데이터 제어어)</text>
  <text x="700" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Data Control Language</text>
  <text x="610" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">GRANT   REVOKE</text>
  <text x="610" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">DENY (MSSQL)</text>
  <text x="610" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">권한·접근 제어, 자동 COMMIT</text>

  <!-- TCL -->
  <rect x="580" y="250" width="240" height="130" fill="#111" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">TCL (트랜잭션 제어어)</text>
  <text x="700" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Transaction Control Language</text>
  <text x="610" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">COMMIT   ROLLBACK</text>
  <text x="610" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">SAVEPOINT   RELEASE</text>
  <text x="610" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">트랜잭션 경계 제어</text>

  <!-- Connecting lines -->
  <line x1="300" y1="145" x2="370" y2="215" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="300" y1="315" x2="370" y2="235" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="580" y1="145" x2="510" y2="215" stroke="#e8a020" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="580" y1="315" x2="510" y2="235" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom note -->
  <rect x="60" y="408" width="760" height="52" fill="#0d0d0d" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">DDL은 묵시적 COMMIT → 실행 즉시 반영, 롤백 불가 (일부 DB는 트랜잭션 DDL 지원)</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">PostgreSQL은 DDL도 트랜잭션 내 실행 가능 | Oracle/MySQL은 DDL 실행 시 즉시 COMMIT</text>
</svg>