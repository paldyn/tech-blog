<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 언어 범주 개요</text>

  <!-- DDL -->
  <rect x="60" y="80" width="180" height="300" fill="#111827" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="80" width="180" height="42" fill="#2a1010" rx="10"/>
  <rect x="60" y="110" width="180" height="12" fill="#2a1010"/>
  <text x="150" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555" text-anchor="middle">DDL</text>
  <text x="150" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Data Definition Language</text>

  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">데이터 구조 정의</text>
  <text x="80" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">CREATE</text>
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">ALTER</text>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DROP</text>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">TRUNCATE</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">RENAME</text>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">⚠ 즉시 커밋 (AUTO-COMMIT)</text>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">ROLLBACK 불가 (대부분 DBMS)</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">테이블·뷰·인덱스·시퀀스</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">스키마·데이터베이스 등</text>

  <!-- DML -->
  <rect x="270" y="80" width="180" height="300" fill="#111827" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <rect x="270" y="80" width="180" height="42" fill="#0d1a0d" rx="10"/>
  <rect x="270" y="110" width="180" height="12" fill="#0d1a0d"/>
  <text x="360" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">DML</text>
  <text x="360" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Data Manipulation Language</text>

  <text x="290" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">데이터 조작</text>
  <text x="290" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SELECT</text>
  <text x="290" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">INSERT</text>
  <text x="290" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">UPDATE</text>
  <text x="290" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DELETE</text>
  <text x="290" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">MERGE</text>
  <text x="290" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">✓ 트랜잭션 내 실행 가능</text>
  <text x="290" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">COMMIT/ROLLBACK 대상</text>
  <text x="290" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">실제 데이터 값을</text>
  <text x="290" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">읽고 쓰는 명령</text>

  <!-- DCL -->
  <rect x="480" y="80" width="180" height="300" fill="#111827" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="480" y="80" width="180" height="42" fill="#0d0d1a" rx="10"/>
  <rect x="480" y="110" width="180" height="12" fill="#0d0d1a"/>
  <text x="570" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">DCL</text>
  <text x="570" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Data Control Language</text>

  <text x="500" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">접근 권한 제어</text>
  <text x="500" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">GRANT</text>
  <text x="500" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">REVOKE</text>
  <text x="500" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(DENY — SQL Server)</text>
  <text x="500" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">✓ 보안·접근 제어</text>
  <text x="500" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">DBA 영역</text>
  <text x="500" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">사용자·역할(ROLE)에</text>
  <text x="500" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">권한 부여·회수</text>

  <!-- TCL -->
  <rect x="690" y="80" width="130" height="300" fill="#111827" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="690" y="80" width="130" height="42" fill="#0a1a2a" rx="10"/>
  <rect x="690" y="110" width="130" height="12" fill="#0a1a2a"/>
  <text x="755" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">TCL</text>
  <text x="755" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Transaction Control</text>

  <text x="706" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">트랜잭션 제어</text>
  <text x="706" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">COMMIT</text>
  <text x="706" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">ROLLBACK</text>
  <text x="706" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SAVEPOINT</text>
  <text x="706" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">✓ ACID 보장</text>
  <text x="706" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">DML 단위 묶음</text>

  <!-- Bottom note -->
  <rect x="60" y="412" width="760" height="40" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">일부 분류에서는 SELECT를 별도로 DQL(Data Query Language)로 분리하기도 합니다.</text>
</svg>
