<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SQL 언어 분류 체계</text>

  <!-- Center: SQL -->
  <rect x="370" y="80" width="140" height="50" fill="#192040" stroke="#7777cc" stroke-width="2" rx="8"/>
  <text x="440" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#7777cc">SQL</text>

  <defs>
    <marker id="aCenter" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a4a6e"/>
    </marker>
  </defs>

  <!-- DDL -->
  <rect x="30" y="180" width="160" height="76" fill="#0f1320" stroke="#7ec8e3" stroke-width="2" rx="8"/>
  <text x="110" y="204" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">DDL</text>
  <text x="110" y="222" text-anchor="middle" font-size="12" fill="#888">데이터 정의 언어</text>
  <text x="110" y="240" text-anchor="middle" font-size="11" fill="#9aa4b8">CREATE / ALTER</text>
  <text x="110" y="254" text-anchor="middle" font-size="11" fill="#9aa4b8">DROP / TRUNCATE</text>
  <path d="M 190 218 L 370 105" stroke="#3a4a6e" stroke-width="1.5" fill="none" marker-end="url(#aCenter)"/>

  <!-- DML -->
  <rect x="30" y="310" width="160" height="76" fill="#0f1320" stroke="#55c555" stroke-width="2" rx="8"/>
  <text x="110" y="334" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">DML</text>
  <text x="110" y="352" text-anchor="middle" font-size="12" fill="#888">데이터 조작 언어</text>
  <text x="110" y="370" text-anchor="middle" font-size="11" fill="#9aa4b8">INSERT / UPDATE</text>
  <text x="110" y="384" text-anchor="middle" font-size="11" fill="#9aa4b8">DELETE / MERGE</text>
  <path d="M 190 348 L 370 130" stroke="#3a4a6e" stroke-width="1.5" fill="none" marker-end="url(#aCenter)"/>

  <!-- DQL -->
  <rect x="360" y="180" width="160" height="76" fill="#0f1320" stroke="#7777cc" stroke-width="2" rx="8"/>
  <text x="440" y="204" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">DQL</text>
  <text x="440" y="222" text-anchor="middle" font-size="12" fill="#888">데이터 조회 언어</text>
  <text x="440" y="248" text-anchor="middle" font-size="11" fill="#9aa4b8">SELECT</text>
  <line x1="440" y1="180" x2="440" y2="132" stroke="#3a4a6e" stroke-width="1.5" marker-end="url(#aCenter)"/>

  <!-- DCL -->
  <rect x="690" y="180" width="160" height="76" fill="#0f1320" stroke="#e05555" stroke-width="2" rx="8"/>
  <text x="770" y="204" text-anchor="middle" font-size="15" font-weight="700" fill="#e05555">DCL</text>
  <text x="770" y="222" text-anchor="middle" font-size="12" fill="#888">데이터 제어 언어</text>
  <text x="770" y="240" text-anchor="middle" font-size="11" fill="#9aa4b8">GRANT / REVOKE</text>
  <text x="770" y="254" text-anchor="middle" font-size="11" fill="#9aa4b8">권한 부여/회수</text>
  <path d="M 690 218 L 510 105" stroke="#3a4a6e" stroke-width="1.5" fill="none" marker-end="url(#aCenter)"/>

  <!-- TCL -->
  <rect x="690" y="310" width="160" height="76" fill="#0f1320" stroke="#ce9178" stroke-width="2" rx="8"/>
  <text x="770" y="334" text-anchor="middle" font-size="15" font-weight="700" fill="#ce9178">TCL</text>
  <text x="770" y="352" text-anchor="middle" font-size="12" fill="#888">트랜잭션 제어 언어</text>
  <text x="770" y="370" text-anchor="middle" font-size="11" fill="#9aa4b8">COMMIT / ROLLBACK</text>
  <text x="770" y="384" text-anchor="middle" font-size="11" fill="#9aa4b8">SAVEPOINT</text>
  <path d="M 690 348 L 510 130" stroke="#3a4a6e" stroke-width="1.5" fill="none" marker-end="url(#aCenter)"/>

  <!-- DQL sub-note -->
  <rect x="360" y="310" width="160" height="76" fill="#0f1320" stroke="#b5cea8" stroke-width="1.5" rx="8"/>
  <text x="440" y="334" text-anchor="middle" font-size="14" font-weight="600" fill="#b5cea8">참고</text>
  <text x="440" y="354" text-anchor="middle" font-size="11" fill="#888">DQL = DML 일부로</text>
  <text x="440" y="370" text-anchor="middle" font-size="11" fill="#888">분류하기도 함</text>
  <text x="440" y="386" text-anchor="middle" font-size="11" fill="#888">(SELECT는 항상 DQL)</text>
</svg>
