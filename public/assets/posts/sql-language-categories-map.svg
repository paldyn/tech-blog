<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 언어 범주 전체 지도</text>

  <!-- DDL -->
  <rect x="60" y="68" width="180" height="270" rx="10" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">DDL</text>
  <text x="150" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Data Definition Language</text>

  <rect x="80" y="130" width="140" height="30" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">CREATE</text>

  <rect x="80" y="168" width="140" height="30" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">ALTER</text>

  <rect x="80" y="206" width="140" height="30" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">DROP</text>

  <rect x="80" y="244" width="140" height="30" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">TRUNCATE</text>

  <rect x="80" y="282" width="140" height="30" rx="5" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">RENAME</text>

  <text x="150" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">구조 변경 → 자동 COMMIT</text>

  <!-- DML -->
  <rect x="260" y="68" width="180" height="270" rx="10" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="350" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">DML</text>
  <text x="350" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Data Manipulation Language</text>

  <rect x="280" y="130" width="140" height="30" rx="5" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SELECT</text>

  <rect x="280" y="168" width="140" height="30" rx="5" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">INSERT</text>

  <rect x="280" y="206" width="140" height="30" rx="5" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">UPDATE</text>

  <rect x="280" y="244" width="140" height="30" rx="5" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">DELETE</text>

  <rect x="280" y="282" width="140" height="30" rx="5" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">MERGE</text>

  <text x="350" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터 조작 → 트랜잭션</text>

  <!-- DCL -->
  <rect x="460" y="68" width="180" height="270" rx="10" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="550" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">DCL</text>
  <text x="550" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Data Control Language</text>

  <rect x="480" y="130" width="140" height="30" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">GRANT</text>

  <rect x="480" y="168" width="140" height="30" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">REVOKE</text>

  <text x="550" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">권한 제어</text>

  <!-- TCL -->
  <rect x="660" y="68" width="180" height="270" rx="10" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="750" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">TCL</text>
  <text x="750" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Transaction Control Language</text>

  <rect x="680" y="130" width="140" height="30" rx="5" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="750" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">BEGIN / START</text>

  <rect x="680" y="168" width="140" height="30" rx="5" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="750" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">COMMIT</text>

  <rect x="680" y="206" width="140" height="30" rx="5" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="750" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">ROLLBACK</text>

  <rect x="680" y="244" width="140" height="30" rx="5" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="750" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SAVEPOINT</text>

  <text x="750" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ACID 제어</text>

  <!-- Bottom note -->
  <rect x="60" y="394" width="760" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle" font-weight="600">DQL(Data Query Language)이라는 분류도 존재</text>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SELECT를 읽기 전용이라는 점에서 DML에서 분리해 DQL로 부르는 교재도 있음</text>
</svg>
