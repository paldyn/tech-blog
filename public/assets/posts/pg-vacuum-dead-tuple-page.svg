<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">VACUUM 전후 힙 페이지 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Dead 튜플 → Free Space 회수</text>

  <!-- Before VACUUM -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">VACUUM 전 (Dead 튜플 존재)</text>

  <!-- Page frame -->
  <rect x="60" y="116" width="340" height="270" rx="8" fill="#111" stroke="#444" stroke-width="1.5"/>

  <!-- Page header -->
  <rect x="68" y="124" width="324" height="28" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="230" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">페이지 헤더 (24 bytes)</text>

  <!-- Slot directory -->
  <rect x="68" y="156" width="324" height="20" rx="2" fill="#1a1a0d" stroke="#333"/>
  <text x="230" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">슬롯 디렉터리 (1,2,3,4,5)</text>

  <!-- Tuple 1: Live -->
  <rect x="68" y="180" width="110" height="36" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="123" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Tuple 1</text>
  <text x="123" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">Live</text>

  <!-- Tuple 2: Dead -->
  <rect x="182" y="180" width="110" height="36" rx="4" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="237" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">Tuple 2</text>
  <text x="237" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">Dead</text>

  <!-- Tuple 3: Live -->
  <rect x="296" y="180" width="96" height="36" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="344" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Tuple 3</text>
  <text x="344" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">Live</text>

  <!-- Tuple 4: Dead -->
  <rect x="68" y="220" width="110" height="36" rx="4" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="123" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">Tuple 4</text>
  <text x="123" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">Dead</text>

  <!-- Tuple 5: Live -->
  <rect x="182" y="220" width="210" height="36" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="287" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Tuple 5</text>
  <text x="287" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">Live</text>

  <!-- Free space (small) -->
  <rect x="68" y="260" width="324" height="116" rx="4" fill="#0e0e0e" stroke="#222" stroke-dasharray="3,3"/>
  <text x="230" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#444" text-anchor="middle">남은 Free Space (적음)</text>

  <!-- After VACUUM -->
  <text x="490" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">VACUUM 후 (Dead 회수됨)</text>

  <!-- Page frame after -->
  <rect x="490" y="116" width="340" height="270" rx="8" fill="#111" stroke="#444" stroke-width="1.5"/>

  <!-- Page header -->
  <rect x="498" y="124" width="324" height="28" rx="4" fill="#1a1a1a" stroke="#333"/>
  <text x="660" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">페이지 헤더 (24 bytes)</text>

  <!-- Slot directory -->
  <rect x="498" y="156" width="324" height="20" rx="2" fill="#1a1a0d" stroke="#333"/>
  <text x="660" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">슬롯 디렉터리 (1,3,5 — 2,4 재사용 가능)</text>

  <!-- Tuple 1: Live -->
  <rect x="498" y="180" width="110" height="36" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="553" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Tuple 1</text>
  <text x="553" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">Live</text>

  <!-- Tuple 3: Live -->
  <rect x="612" y="180" width="210" height="36" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="717" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Tuple 3</text>
  <text x="717" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">Live</text>

  <!-- Tuple 5: Live -->
  <rect x="498" y="220" width="324" height="36" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Tuple 5</text>
  <text x="660" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">Live</text>

  <!-- Free space (large) -->
  <rect x="498" y="260" width="324" height="116" rx="4" fill="#0d1520" stroke="#7ec8e3" stroke-dasharray="3,3"/>
  <text x="660" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Free Space (회수됨)</text>
  <text x="660" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">새 튜플 삽입 가능</text>

  <!-- Arrow -->
  <line x1="410" y1="250" x2="480" y2="250" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="476,244 490,250 476,256" fill="#7ec8e3"/>
  <text x="445" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">VACUUM</text>

  <!-- Note -->
  <rect x="60" y="404" width="760" height="80" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">VACUUM vs VACUUM FULL</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">VACUUM: Dead 회수, 페이지 조각화 유지 (잠금 없음)</text>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">VACUUM FULL: 테이블 재작성으로 OS에 공간 반환 (배타 잠금, 운영 중 금지)</text>
</svg>
