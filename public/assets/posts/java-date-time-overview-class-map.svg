<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">java.time 핵심 클래스 맵</text>

  <!-- Group headers -->
  <text x="260" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">사람의 시간 (human time)</text>
  <text x="700" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">기계의 시간 (machine time)</text>

  <!-- LocalDate -->
  <rect x="60" y="94" width="190" height="58" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="155" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">LocalDate</text>
  <text x="155" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">날짜만 (2026-06-12)</text>

  <!-- LocalTime -->
  <rect x="270" y="94" width="190" height="58" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="365" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">LocalTime</text>
  <text x="365" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시각만 (14:30:00)</text>

  <!-- Arrows to LocalDateTime -->
  <line x1="155" y1="152" x2="225" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="365" y1="152" x2="295" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- LocalDateTime -->
  <rect x="165" y="196" width="190" height="58" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">LocalDateTime</text>
  <text x="260" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">날짜 + 시각 (타임존 없음)</text>

  <!-- Arrow to ZonedDateTime -->
  <line x1="260" y1="254" x2="260" y2="300" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="276" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">atZone(ZoneId)</text>

  <!-- ZonedDateTime -->
  <rect x="165" y="300" width="190" height="58" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="260" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">ZonedDateTime</text>
  <text x="260" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">날짜 + 시각 + 타임존</text>

  <!-- Duration -->
  <rect x="580" y="94" width="240" height="58" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">Duration</text>
  <text x="700" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시간 기반 양 (초·나노초)</text>

  <!-- Period -->
  <rect x="580" y="196" width="240" height="58" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">Period</text>
  <text x="700" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">날짜 기반 양 (년·월·일)</text>

  <!-- Instant -->
  <rect x="580" y="300" width="240" height="58" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="700" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">Instant</text>
  <text x="700" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">에포크 기준 타임스탬프</text>

  <!-- Conversion arrows between ZonedDateTime and Instant -->
  <line x1="355" y1="316" x2="576" y2="316" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <text x="465" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">toInstant()</text>
  <line x1="580" y1="342" x2="359" y2="342" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>
  <text x="465" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">atZone(ZoneId)</text>

  <!-- Usage guide -->
  <rect x="60" y="404" width="760" height="72" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">선택 가이드</text>
  <text x="440" y="456" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">생일·기념일은 LocalDate, 서버 타임스탬프는 Instant, 사용자에게 보여줄 시간은 ZonedDateTime</text>
</svg>
