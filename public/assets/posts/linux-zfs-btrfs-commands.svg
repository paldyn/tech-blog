<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">ZFS · Btrfs 핵심 명령어</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">풀/서브볼륨 생성 · 스냅샷 · 압축 설정</text>

  <!-- ZFS section -->
  <text x="60" y="98" font-size="15" font-weight="700" fill="#7ec8e3">ZFS</text>
  <rect x="60" y="106" width="380" height="292" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 풀 생성 (RAID-Z1)</text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">zpool </text>
  <text x="116" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">create tank raidz /dev/sd{b,c,d}</text>
  <line x1="76" y1="155" x2="424" y2="155" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="174" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 데이터셋 생성 + 압축</text>
  <text x="76" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">zfs </text>
  <text x="104" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">create tank/data</text>
  <text x="76" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">zfs </text>
  <text x="104" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">set compression=zstd tank/data</text>
  <line x1="76" y1="222" x2="424" y2="222" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 스냅샷 생성 · 목록 · 복구</text>
  <text x="76" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">zfs </text>
  <text x="104" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">snapshot tank/data@2026-05-12</text>
  <text x="76" y="276" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">zfs </text>
  <text x="104" y="276" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">list -t snapshot</text>
  <text x="76" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">zfs </text>
  <text x="104" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">rollback tank/data@2026-05-12</text>
  <line x1="76" y1="306" x2="424" y2="306" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="324" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 풀 상태 · scrub</text>
  <text x="76" y="342" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">zpool </text>
  <text x="116" y="342" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">status</text>
  <text x="76" y="360" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">zpool </text>
  <text x="116" y="360" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">scrub tank</text>

  <!-- Btrfs section -->
  <text x="460" y="98" font-size="15" font-weight="700" fill="#55c555">Btrfs</text>
  <rect x="460" y="106" width="380" height="292" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="476" y="126" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># Btrfs 포맷 · 마운트</text>
  <text x="476" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mkfs.btrfs </text>
  <text x="558" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">/dev/sdb</text>
  <text x="476" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mount </text>
  <text x="516" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">/dev/sdb /mnt/data</text>
  <line x1="476" y1="174" x2="824" y2="174" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 서브볼륨 생성</text>
  <text x="476" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">btrfs </text>
  <text x="514" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">subvolume create /mnt/data/home</text>
  <line x1="476" y1="222" x2="824" y2="222" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 스냅샷 생성 · 목록</text>
  <text x="476" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">btrfs </text>
  <text x="514" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">subvolume snapshot /mnt/data \</text>
  <text x="476" y="276" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  /mnt/data/.snapshots/snap1</text>
  <text x="476" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">btrfs </text>
  <text x="514" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">subvolume list /mnt/data</text>
  <line x1="476" y1="306" x2="824" y2="306" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="324" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 압축 설정 · scrub</text>
  <text x="476" y="342" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">mount </text>
  <text x="516" y="342" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">-o compress=zstd /dev/sdb /mnt</text>
  <text x="476" y="360" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">btrfs </text>
  <text x="514" y="360" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">scrub start /mnt/data</text>

  <!-- Footer -->
  <rect x="60" y="416" width="760" height="10" rx="4" fill="none"/>
  <text x="440" y="432" text-anchor="middle" font-size="12" fill="#555">ZFS는 OpenZFS 프로젝트 · Ubuntu에서 공식 지원 / Btrfs는 커널 5.x 이후 안정화</text>
</svg>
