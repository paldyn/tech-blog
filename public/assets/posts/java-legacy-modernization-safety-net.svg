<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">안전망 먼저, 리팩터링은 그 다음</text>
  <text x="60" y="72" font-size="13" fill="#888">특성화 테스트로 현재 동작을 고정한 뒤에야 구조를 바꾼다</text>

  <defs>
    <marker id="ln-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ln-arr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect x="60" y="100" width="220" height="80" rx="6" fill="#12203a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="134" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">특성화 테스트</text>
  <text x="170" y="158" font-size="12" fill="#9aa4b8" text-anchor="middle">현재 동작을 그대로 고정</text>

  <rect x="330" y="100" width="220" height="80" rx="6" fill="#14240f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="134" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">작은 리팩터링</text>
  <text x="440" y="158" font-size="12" fill="#9aa4b8" text-anchor="middle">동작 보존, 구조만 개선</text>

  <rect x="600" y="100" width="220" height="80" rx="6" fill="#12203a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="134" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">회귀 검증</text>
  <text x="710" y="158" font-size="12" fill="#9aa4b8" text-anchor="middle">테스트 그린 확인</text>

  <line x1="284" y1="140" x2="326" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ln-arr)"/>
  <line x1="554" y1="140" x2="596" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ln-arr)"/>

  <!-- return loop C -> B (repeat) -->
  <path d="M 710 180 C 710 230, 440 230, 440 184" fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ln-arr2)"/>
  <text x="575" y="243" font-size="12" fill="#7777cc" text-anchor="middle">그린이면 다음 조각으로 반복</text>

  <!-- code example -->
  <rect x="60" y="272" width="760" height="132" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="298" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 값을 이해하지 못해도 현재 출력을 그대로 못박는다</text>
  <text xml:space="preserve" x="76" y="317" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">@Test</text>
  <text xml:space="preserve" x="76" y="336" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">void captureLegacyOutput() {</text>
  <text xml:space="preserve" x="76" y="355" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    var out = legacy.calc(input);</text>
  <text xml:space="preserve" x="76" y="374" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    assertThat(out).isEqualTo(SNAPSHOT);</text>
  <text xml:space="preserve" x="76" y="393" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">}</text>
</svg>
