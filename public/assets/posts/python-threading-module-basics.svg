<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">threading 모듈 구조</text>

  <!-- Main thread -->
  <rect x="60" y="64" width="760" height="50" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">메인 스레드 (Main Thread)</text>
  <text x="440" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로그램 시작 시 자동으로 생성. daemon=False</text>

  <!-- Thread creation arrows -->
  <line x1="200" y1="114" x2="200" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="114" x2="440" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="680" y1="114" x2="680" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Worker threads -->
  <rect x="60" y="158" width="260" height="90" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="190" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Thread(target=fn)</text>
  <text x="190" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">함수를 별도 스레드로 실행</text>
  <text x="190" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">t.start() → 실행 시작</text>
  <text x="190" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">t.join()  → 완료 대기</text>

  <rect x="340" y="158" width="200" height="90" rx="8" fill="#0d2b1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Daemon Thread</text>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">daemon=True</text>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">메인 종료 시 강제 종료</text>
  <text x="440" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">백그라운드 작업에 적합</text>

  <rect x="560" y="158" width="220" height="90" rx="8" fill="#2b1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="670" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">Thread 상속</text>
  <text x="670" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">class MyThread(Thread)</text>
  <text x="670" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">run() 메서드 오버라이드</text>
  <text x="670" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">상태 저장에 유리</text>

  <!-- Sync primitives -->
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">동기화 프리미티브</text>

  <rect x="60" y="290" width="180" height="70" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="150" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Lock</text>
  <text x="150" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">acquire() / release()</text>
  <text x="150" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">상호 배제</text>

  <rect x="260" y="290" width="180" height="70" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="350" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">RLock</text>
  <text x="350" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">재진입 가능 락</text>
  <text x="350" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">같은 스레드 재획득 OK</text>

  <rect x="460" y="290" width="180" height="70" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="550" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Event</text>
  <text x="550" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">set() / wait() / clear()</text>
  <text x="550" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">신호 대기</text>

  <rect x="660" y="290" width="180" height="70" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="750" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Semaphore</text>
  <text x="750" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">카운팅 세마포어</text>
  <text x="750" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">동시 접근 수 제한</text>

  <!-- Local storage note -->
  <rect x="60" y="382" width="760" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">threading.local() — 스레드 로컬 저장소</text>
  <text x="440" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">각 스레드마다 독립된 데이터 공간. 스레드 간 공유 없음</text>
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: DB 커넥션, 요청 컨텍스트 저장에 활용</text>
</svg>
