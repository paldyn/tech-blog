<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8d44d"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JAR vs WAR — 빌드 설정 &amp; 배포 방식</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Gradle 설정과 WAR 이중 배포(내장 실행 + 외부 WAS) 패턴</text>

  <!-- Left: JAR Gradle -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">JAR — build.gradle (기본)</text>
  <rect x="60" y="110" width="360" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text xml:space="preserve" x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">plugins {</text>
  <text xml:space="preserve" x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  id </text>
  <text xml:space="preserve" x="106" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'org.springframework.boot'</text>
  <text xml:space="preserve" x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    version </text>
  <text xml:space="preserve" x="146" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'3.3.0'</text>
  <text xml:space="preserve" x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">}</text>
  <text xml:space="preserve" x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 기본: JAR 패키징</text>
  <text xml:space="preserve" x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// jar { enabled = true }  (기본값)</text>

  <!-- Right: WAR Gradle -->
  <text x="460" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">WAR — build.gradle</text>
  <rect x="460" y="110" width="360" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text xml:space="preserve" x="476" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">plugins {</text>
  <text xml:space="preserve" x="476" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  id </text>
  <text xml:space="preserve" x="506" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'org.springframework.boot'</text>
  <text xml:space="preserve" x="476" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  id </text>
  <text xml:space="preserve" x="506" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'war'</text>
  <text xml:space="preserve" x="476" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">}</text>
  <text xml:space="preserve" x="476" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">dependencies {</text>
  <text xml:space="preserve" x="476" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  providedRuntime </text>
  <text xml:space="preserve" x="606" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">'...:tomcat'</text>

  <!-- WAR dual-boot setup -->
  <text x="60" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">WAR 이중 실행 — SpringBootServletInitializer 필수</text>
  <rect x="60" y="278" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text xml:space="preserve" x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// WAR을 외부 WAS에 배포하면서도 java -jar 실행 가능하게 유지</text>
  <text xml:space="preserve" x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">@SpringBootApplication</text>
  <text xml:space="preserve" x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">class Application : SpringBootServletInitializer() {</text>
  <text xml:space="preserve" x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    override fun configure(builder: SpringApplicationBuilder)</text>
  <text xml:space="preserve" x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        = builder.sources(Application::class.java)</text>

  <!-- Decision boxes -->
  <rect x="60" y="398" width="340" height="60" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="230" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">JAR 선택 기준</text>
  <text x="230" y="441" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컨테이너 · 클라우드 · MSA 환경</text>
  <text x="230" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">신규 프로젝트 기본값</text>

  <rect x="480" y="398" width="340" height="60" rx="6" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">WAR 선택 기준</text>
  <text x="650" y="441" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">레거시 WAS 정책이 고정된 경우</text>
  <text x="650" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Websphere · JBoss 연동 필요 시</text>
</svg>
