<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">module-info.java 구조와 주요 지시자</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">모듈 선언 파일의 문법과 의미</text>

  <!-- Left: module-info.java code -->
  <text x="80" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">module-info.java 예시</text>
  <rect x="80" y="114" width="380" height="286" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="96" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">module <tspan fill="#ce9178">com.example.app</tspan> {</text>
  <text x="96" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    // 의존 모듈 선언</text>
  <text x="96" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    requires <tspan fill="#e8e8e8">java.logging</tspan>;</text>
  <text x="96" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    requires <tspan fill="#b5cea8">transitive</tspan> <tspan fill="#e8e8e8">java.sql</tspan>;</text>
  <text x="96" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    requires <tspan fill="#b5cea8">static</tspan> <tspan fill="#e8e8e8">java.compiler</tspan>;</text>
  <text x="96" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">    </text>
  <text x="96" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    // 공개 패키지 선언</text>
  <text x="96" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    exports <tspan fill="#ce9178">com.example.app.api</tspan>;</text>
  <text x="96" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    exports <tspan fill="#ce9178">com.example.app.spi</tspan></text>
  <text x="96" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">        <tspan fill="#b5cea8">to</tspan> <tspan fill="#e8e8e8">com.example.plugin</ttml></text>
  <text x="96" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">        <tspan fill="#b5cea8">to</tspan> <tspan fill="#e8e8e8">com.example.plugin</tspan>;</text>
  <text x="96" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    opens <tspan fill="#ce9178">com.example.app.model</tspan>;</text>
  <text x="96" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    uses <tspan fill="#e8e8e8">com.example.app.spi.Plugin</tspan>;</text>
  <text x="96" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    provides <tspan fill="#e8e8e8">com.example.app.spi.Plugin</tspan></text>
  <text x="96" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">        <tspan fill="#b5cea8">with</tspan> <tspan fill="#e8e8e8">com.example.app.DefaultPlugin</tspan>;</text>
  <text x="96" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">}</text>

  <!-- Right: Directive explanations -->
  <text x="492" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">지시자 설명</text>

  <!-- requires -->
  <rect x="492" y="114" width="328" height="66" fill="#0f1a2e" rx="6" stroke="#1e2d4a"/>
  <text x="510" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">requires</text>
  <text x="510" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">다른 모듈에 대한 컴파일·런타임 의존성</text>
  <text x="510" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">transitive=전이 의존  static=컴파일만</text>

  <!-- exports -->
  <rect x="492" y="190" width="328" height="66" fill="#0f2310" rx="6" stroke="#1e3a1a"/>
  <text x="510" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">exports</text>
  <text x="510" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">패키지를 외부 모듈에 공개 (컴파일+런타임)</text>
  <text x="510" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">to 절로 특정 모듈에만 한정 가능</text>

  <!-- opens -->
  <rect x="492" y="266" width="328" height="66" fill="#151428" rx="6" stroke="#2a2855"/>
  <text x="510" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">opens</text>
  <text x="510" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">런타임 리플렉션 접근 허용</text>
  <text x="510" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JPA, Jackson 등 리플렉션 기반 라이브러리용</text>

  <!-- uses / provides -->
  <rect x="492" y="342" width="328" height="66" fill="#1a1510" rx="6" stroke="#3a2e1a"/>
  <text x="510" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ce9178">uses / provides</text>
  <text x="510" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ServiceLoader 기반 서비스 선언</text>
  <text x="510" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">uses=소비, provides…with=구현체 등록</text>

  <!-- Bottom note -->
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">module-info.java 는 src 루트(패키지 외부)에 위치합니다</text>
</svg>
