<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AI 안전성 방어 레이어</text>

  <!-- Layer 5 (outermost) -->
  <rect x="60" y="70" width="760" height="320" rx="12" fill="none" stroke="#2a2a3a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="100" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">L5: 규제·법률 (EU AI Act, 저작권법)</text>

  <!-- Layer 4 -->
  <rect x="90" y="108" width="700" height="270" rx="10" fill="none" stroke="#2a3a2a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="130" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">L4: 조직·정책 (AI 사용 가이드라인, 레드팀)</text>

  <!-- Layer 3 -->
  <rect x="120" y="146" width="640" height="220" rx="10" fill="none" stroke="#2a2a4a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="160" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">L3: 시스템 설계 (프롬프트 방어, 출력 필터, 사람 검토)</text>

  <!-- Layer 2 -->
  <rect x="150" y="184" width="580" height="170" rx="10" fill="none" stroke="#3a2a2a" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="190" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">L2: 모델 학습 (RLHF, Constitutional AI, DPO)</text>

  <!-- Layer 1 (innermost) -->
  <rect x="200" y="222" width="480" height="120" rx="10" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">L1: 모델 코어 안전성</text>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기초 모델의 안전 행동 학습</text>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">거절 능력 · 유해 요청 감지</text>
  <text x="440" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Constitutional AI Principles</text>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">예: Claude의 안전 원칙 (Anthropic)</text>
</svg>
