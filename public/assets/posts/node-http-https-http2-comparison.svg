<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="req-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="res-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">HTTP/1.1 vs HTTP/2 · 연결 모델</text>

  <!-- HTTP/1.1 section -->
  <text x="220" y="76" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e05555">HTTP/1.1 — 순차 요청</text>

  <!-- Client box -->
  <rect x="60" y="90" width="100" height="310" rx="6" fill="#160808" stroke="#e05555" stroke-width="1.5"/>
  <text x="110" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">Client</text>

  <!-- Server box HTTP/1.1 -->
  <rect x="300" y="90" width="100" height="310" rx="6" fill="#160808" stroke="#e05555" stroke-width="1.5"/>
  <text x="350" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">Server</text>

  <!-- Connection 1 -->
  <text x="110" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TCP conn 1</text>
  <line x1="160" y1="153" x2="298" y2="153" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#req-arr)"/>
  <line x1="298" y1="170" x2="160" y2="170" stroke="#55c555" stroke-width="1" marker-end="url(#res-arr)"/>

  <!-- Connection 2 -->
  <text x="110" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TCP conn 2</text>
  <line x1="160" y1="205" x2="298" y2="205" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#req-arr)"/>
  <line x1="298" y1="222" x2="160" y2="222" stroke="#55c555" stroke-width="1" marker-end="url(#res-arr)"/>

  <!-- Connection 3 -->
  <text x="110" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TCP conn 3</text>
  <line x1="160" y1="257" x2="298" y2="257" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#req-arr)"/>
  <line x1="298" y1="274" x2="160" y2="274" stroke="#55c555" stroke-width="1" marker-end="url(#res-arr)"/>

  <text x="220" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">한 연결당 1 요청</text>
  <text x="220" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HOL 블로킹</text>
  <text x="220" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">6개 연결 제한(브라우저)</text>

  <!-- HTTP/2 section -->
  <text x="660" y="76" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#55c555">HTTP/2 — 멀티플렉싱</text>

  <!-- Client box HTTP/2 -->
  <rect x="500" y="90" width="100" height="310" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="550" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Client</text>

  <!-- Server box HTTP/2 -->
  <rect x="740" y="90" width="100" height="310" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Server</text>

  <!-- Single TCP connection boundary -->
  <rect x="606" y="128" width="128" height="240" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="670" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">1개 TCP 연결</text>

  <!-- Stream 1 (forward) -->
  <line x1="600" y1="163" x2="738" y2="163" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#req-arr)"/>
  <text x="669" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">stream 1 →</text>
  <!-- Stream 1 (response) -->
  <line x1="738" y1="175" x2="600" y2="175" stroke="#55c555" stroke-width="1.5" marker-end="url(#res-arr)"/>
  <text x="669" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">← stream 1</text>

  <!-- Stream 2 (concurrent) -->
  <line x1="600" y1="205" x2="738" y2="205" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#req-arr)"/>
  <text x="669" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">stream 2 →</text>
  <line x1="738" y1="217" x2="600" y2="217" stroke="#55c555" stroke-width="1.5" marker-end="url(#res-arr)"/>
  <text x="669" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">← stream 2</text>

  <!-- Server Push -->
  <line x1="738" y1="247" x2="600" y2="247" stroke="#7777cc" stroke-width="1.5" marker-end="url(#res-arr)"/>
  <text x="669" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">push: style.css</text>
  <line x1="738" y1="259" x2="600" y2="259" stroke="#7777cc" stroke-width="1.5" marker-end="url(#res-arr)"/>
  <text x="669" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">push: app.js</text>

  <text x="660" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">단일 연결 다중 스트림</text>
  <text x="660" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">헤더 압축 (HPACK)</text>
  <text x="660" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버 푸시 지원</text>

  <!-- Bottom comparison table -->
  <rect x="60" y="416" width="760" height="0" rx="0"/>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">HTTP/2는 TLS(HTTPS)와 함께 사용하는 것이 실질적 표준 — 대부분 브라우저가 h2 + TLS만 지원</text>
</svg>
