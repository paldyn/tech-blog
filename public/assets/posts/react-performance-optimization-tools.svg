<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">성능 최적화 도구 비교</text>

  <!-- Header row -->
  <rect x="60" y="70" width="760" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="175" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">도구</text>
  <text x="380" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">역할</text>
  <text x="580" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">비용</text>
  <text x="760" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">권장 시점</text>

  <!-- Row separators vertical -->
  <line x1="290" y1="70" x2="290" y2="350" stroke="#333" stroke-width="1"/>
  <line x1="470" y1="70" x2="470" y2="350" stroke="#333" stroke-width="1"/>
  <line x1="680" y1="70" x2="680" y2="350" stroke="#333" stroke-width="1"/>

  <!-- Row 1: React.memo -->
  <rect x="60" y="106" width="760" height="48" rx="0" fill="#111827" stroke="#333" stroke-width="0.5"/>
  <text x="175" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">React.memo</text>
  <text x="380" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">컴포넌트 리렌더 스킵</text>
  <text x="380" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">(props 얕은 비교)</text>
  <text x="580" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">비교 비용 + 메모리</text>
  <text x="760" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3" text-anchor="middle">렌더 비용 &gt; 비교 비용</text>

  <!-- Row 2: useMemo -->
  <rect x="60" y="154" width="760" height="48" rx="0" fill="#0d1a0d" stroke="#333" stroke-width="0.5"/>
  <text x="175" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">useMemo</text>
  <text x="380" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">계산 결과 캐싱</text>
  <text x="380" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">(deps 배열 비교)</text>
  <text x="580" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">deps 비교 + 메모리</text>
  <text x="760" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3" text-anchor="middle">O(n) 이상의 연산</text>

  <!-- Row 3: useCallback -->
  <rect x="60" y="202" width="760" height="48" rx="0" fill="#111827" stroke="#333" stroke-width="0.5"/>
  <text x="175" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">useCallback</text>
  <text x="380" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">함수 참조 안정화</text>
  <text x="380" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">(deps 배열 비교)</text>
  <text x="580" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">deps 비교 + 메모리</text>
  <text x="760" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3" text-anchor="middle">memo 컴포넌트 prop</text>

  <!-- Row 4: useTransition -->
  <rect x="60" y="250" width="760" height="48" rx="0" fill="#0d1212" stroke="#333" stroke-width="0.5"/>
  <text x="175" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">useTransition</text>
  <text x="380" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">긴급/비긴급 상태 분리</text>
  <text x="380" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">(Concurrent 기능)</text>
  <text x="580" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888" text-anchor="middle">스케줄링 오버헤드</text>
  <text x="760" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3" text-anchor="middle">탭 전환, 필터링 UI</text>

  <!-- Bottom border -->
  <rect x="60" y="298" width="760" height="2" rx="0" fill="#333"/>

  <!-- Note -->
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888" text-anchor="middle">먼저 Profiler로 병목 확인 → 위 도구 중 적합한 것 선택</text>
</svg>
