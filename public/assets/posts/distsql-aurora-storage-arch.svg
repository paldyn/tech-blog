<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09055"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Amazon Aurora: 컴퓨트-스토리지 분리 아키텍처</text>

  <!-- Primary instance -->
  <rect x="320" y="68" width="240" height="52" rx="8" fill="#12213a" stroke="#3a6ea8" stroke-width="2"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Primary (Writer)</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MySQL 5.7 / PostgreSQL 14 호환</text>

  <!-- Read replicas -->
  <rect x="60" y="68" width="200" height="52" rx="8" fill="#0e1820" stroke="#2a4060" stroke-width="1.5"/>
  <text x="160" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">Read Replica 1</text>
  <text x="160" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">읽기 전용 / 15개까지</text>

  <rect x="620" y="68" width="200" height="52" rx="8" fill="#0e1820" stroke="#2a4060" stroke-width="1.5"/>
  <text x="720" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">Read Replica 2</text>
  <text x="720" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">읽기 전용 / 15개까지</text>

  <!-- Shared storage layer -->
  <rect x="60" y="180" width="760" height="52" rx="8" fill="#1a2010" stroke="#4a6020" stroke-width="2"/>
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#88cc44" text-anchor="middle">Aurora 공유 분산 스토리지</text>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">10GB 청크 × 6 복제본 (3 AZ × 2) · 자동 확장 최대 128TiB</text>

  <!-- Arrows: instances -> storage -->
  <line x1="440" y1="120" x2="440" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="448" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Log만 기록</text>

  <line x1="160" y1="120" x2="300" y2="180" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="720" y1="120" x2="580" y2="180" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- 6 storage nodes -->
  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">AZ-A (2 nodes)       AZ-B (2 nodes)       AZ-C (2 nodes)</text>

  <rect x="60" y="282" width="120" height="52" rx="6" fill="#101a08" stroke="#2a4010" stroke-width="1"/>
  <text x="120" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#88cc44" text-anchor="middle">SN 1 (AZ-A)</text>

  <rect x="194" y="282" width="120" height="52" rx="6" fill="#101a08" stroke="#2a4010" stroke-width="1"/>
  <text x="254" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#88cc44" text-anchor="middle">SN 2 (AZ-A)</text>

  <rect x="330" y="282" width="120" height="52" rx="6" fill="#101a08" stroke="#2a4010" stroke-width="1"/>
  <text x="390" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#88cc44" text-anchor="middle">SN 3 (AZ-B)</text>

  <rect x="466" y="282" width="120" height="52" rx="6" fill="#101a08" stroke="#2a4010" stroke-width="1"/>
  <text x="526" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#88cc44" text-anchor="middle">SN 4 (AZ-B)</text>

  <rect x="602" y="282" width="120" height="52" rx="6" fill="#101a08" stroke="#2a4010" stroke-width="1"/>
  <text x="662" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#88cc44" text-anchor="middle">SN 5 (AZ-C)</text>

  <rect x="738" y="282" width="100" height="52" rx="6" fill="#101a08" stroke="#2a4010" stroke-width="1"/>
  <text x="788" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#88cc44" text-anchor="middle">SN 6 (AZ-C)</text>

  <!-- Quorum note -->
  <rect x="60" y="354" width="760" height="52" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">쿼럼: 쓰기 6/6 중 4/6 ACK → 커밋 / 읽기 4/6 → 쿼럼 성립</text>
  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">AZ 1개 전체 장애 + 다른 AZ 노드 1개 장애 동시 발생해도 정상 동작</text>

  <!-- Code note -->
  <rect x="60" y="426" width="760" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="448" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- Aurora: Redo Log만 스토리지에 기록 (페이지 X)</text>
  <text x="76" y="468" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 스토리지 노드가 Log Apply해서 페이지 재구성 → 네트워크 I/O 대폭 감소</text>
</svg>
