<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c040"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">QEMU 동작 모드 비교</text>

  <!-- Mode 1: Full System Emulation -->
  <rect x="60" y="80" width="360" height="380" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">전체 시스템 에뮬레이션</text>
  <text x="240" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">qemu-system-x86_64 / qemu-system-aarch64</text>

  <rect x="80" y="144" width="320" height="50" rx="6" fill="#12123a" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Guest OS (Linux / Windows / macOS)</text>
  <text x="240" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">x86_64 / ARM / RISC-V / MIPS 가능</text>

  <line x1="240" y1="194" x2="240" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="220" width="320" height="50" rx="6" fill="#0a0a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">QEMU TCG (Tiny Code Generator)</text>
  <text x="240" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">게스트 ISA → 호스트 ISA 동적 번역</text>

  <line x1="240" y1="270" x2="240" y2="296" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- With KVM acceleration -->
  <rect x="80" y="296" width="320" height="50" rx="6" fill="#002010" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">KVM 가속 (동일 아키텍처)</text>
  <text x="240" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">-accel kvm → 하드웨어 VT-x 활용, TCG 불필요</text>

  <rect x="80" y="364" width="320" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">가상 디바이스 에뮬레이션</text>
  <text x="240" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">virtio-blk, virtio-net, e1000, IDE, USB</text>

  <!-- Mode 2: User Mode Emulation -->
  <rect x="460" y="80" width="360" height="380" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">사용자 모드 에뮬레이션</text>
  <text x="640" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">qemu-aarch64 / qemu-arm (Linux 전용)</text>

  <rect x="480" y="144" width="320" height="50" rx="6" fill="#102810" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">ARM 바이너리 (크로스 컴파일 결과)</text>
  <text x="640" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ELF / 다른 아키텍처 실행 파일</text>

  <line x1="640" y1="194" x2="640" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arr-y)"/>

  <rect x="480" y="220" width="320" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">QEMU TCG (syscall 번역)</text>
  <text x="640" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ARM 시스콜 → x86_64 시스콜 변환</text>

  <line x1="640" y1="270" x2="640" y2="296" stroke="#55c555" stroke-width="2" marker-end="url(#arr-y)"/>

  <rect x="480" y="296" width="320" height="50" rx="6" fill="#102810" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Host Linux 커널</text>
  <text x="640" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">x86_64 호스트에서 ARM 바이너리 실행</text>

  <rect x="480" y="364" width="320" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">활용: binfmt_misc 등록</text>
  <text x="640" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">./arm-binary 바로 실행, Docker buildx</text>
</svg>
