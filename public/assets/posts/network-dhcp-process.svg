<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="adh" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="adg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DHCP DORA: 주소 할당 4단계</text>

  <!-- Client -->
  <rect x="80" y="80" width="130" height="60" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="145" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">DHCP 클라이언트</text>
  <text x="145" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IP 없음 (0.0.0.0)</text>

  <!-- Server -->
  <rect x="650" y="80" width="130" height="60" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="715" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">DHCP 서버</text>
  <text x="715" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">192.168.1.1</text>

  <!-- Step 1: Discover -->
  <line x1="210" y1="170" x2="648" y2="170" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#adh)"/>
  <rect x="295" y="155" width="250" height="28" rx="4" fill="#0a0a0a"/>
  <text x="420" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① DISCOVER (브로드캐스트)</text>
  <text x="145" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Src: 0.0.0.0:68</text>
  <text x="145" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Dst: 255.255.255.255:67</text>

  <!-- Step 2: Offer -->
  <line x1="648" y1="240" x2="210" y2="240" stroke="#55c555" stroke-width="2" marker-end="url(#adg)"/>
  <rect x="295" y="225" width="250" height="28" rx="4" fill="#0a0a0a"/>
  <text x="420" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">② OFFER (제안)</text>
  <text x="715" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">제안 IP: 192.168.1.100</text>
  <text x="715" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임시 예약 (lease 시작)</text>

  <!-- Step 3: Request -->
  <line x1="210" y1="310" x2="648" y2="310" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#adh)"/>
  <rect x="295" y="295" width="250" height="28" rx="4" fill="#0a0a0a"/>
  <text x="420" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ REQUEST (수락 요청)</text>
  <text x="145" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">브로드캐스트 (다른 서버에게</text>
  <text x="145" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">제안 거절 알림 겸용)</text>

  <!-- Step 4: Acknowledge -->
  <line x1="648" y1="378" x2="210" y2="378" stroke="#55c555" stroke-width="2" marker-end="url(#adg)"/>
  <rect x="295" y="363" width="250" height="28" rx="4" fill="#0a0a0a"/>
  <text x="420" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">④ ACK (확정)</text>
  <text x="715" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IP, 서브넷, GW, DNS</text>
  <text x="715" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임대 기간 포함</text>

  <!-- Client final state -->
  <rect x="60" y="445" width="220" height="44" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">클라이언트 설정 완료</text>
  <text x="170" y="480" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">IP: 192.168.1.100/24</text>

  <!-- Timer -->
  <rect x="560" y="445" width="260" height="44" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">임대(Lease) 갱신</text>
  <text x="690" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">T1=50% 시 RENEW, T2=87.5% 시 REBIND</text>
</svg>
