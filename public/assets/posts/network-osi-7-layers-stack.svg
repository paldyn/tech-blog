<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-up" viewBox="0 0 14 14" refX="7" refY="2"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 0 14 L 7 1 L 14 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">OSI 7계층 모델</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">네트워크 통신을 7개의 추상 계층으로 분리한 참조 모델</text>

  <!-- Layers: y positions for 7 layers, each 44px tall, starting at y=90 -->
  <!-- Layer 7: Application -->
  <rect x="180" y="90" width="300" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="330" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">7 — 응용 계층 (Application)</text>
  <text x="330" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HTTP, FTP, SMTP, DNS</text>

  <!-- Layer 6: Presentation -->
  <rect x="180" y="140" width="300" height="44" rx="6" fill="#1a1a28" stroke="#7777cc" stroke-width="1.2"/>
  <text x="330" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#9988cc">6 — 표현 계층 (Presentation)</text>
  <text x="330" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">암호화, 인코딩, 압축</text>

  <!-- Layer 5: Session -->
  <rect x="180" y="190" width="300" height="44" rx="6" fill="#1a1a22" stroke="#7777cc" stroke-width="1.2"/>
  <text x="330" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#9988cc">5 — 세션 계층 (Session)</text>
  <text x="330" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">세션 수립·유지·종료</text>

  <!-- Layer 4: Transport -->
  <rect x="180" y="240" width="300" height="44" rx="6" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="330" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">4 — 전송 계층 (Transport)</text>
  <text x="330" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TCP, UDP — 포트 기반 통신</text>

  <!-- Layer 3: Network -->
  <rect x="180" y="290" width="300" height="44" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="330" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">3 — 네트워크 계층 (Network)</text>
  <text x="330" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IP, 라우터 — 논리 주소</text>

  <!-- Layer 2: Data Link -->
  <rect x="180" y="340" width="300" height="44" rx="6" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="330" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8c44a">2 — 데이터링크 계층 (Data Link)</text>
  <text x="330" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이더넷, 스위치 — MAC 주소</text>

  <!-- Layer 1: Physical -->
  <rect x="180" y="390" width="300" height="44" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="330" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">1 — 물리 계층 (Physical)</text>
  <text x="330" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">케이블, 광섬유 — 비트 신호</text>

  <!-- Arrows send/recv -->
  <line x1="145" y1="112" x2="145" y2="406" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-down)"/>
  <text x="120" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" transform="rotate(-90,120,265)">송신 (캡슐화)</text>

  <line x1="510" y1="406" x2="510" y2="112" stroke="#55c555" stroke-width="2" marker-end="url(#arr-up)"/>
  <text x="540" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" transform="rotate(90,540,265)">수신 (역캡슐화)</text>

  <!-- PDU labels -->
  <text x="610" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">PDU: 메시지(Message)</text>
  <text x="610" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">PDU: 메시지(Message)</text>
  <text x="610" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">PDU: 메시지(Message)</text>
  <text x="610" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">PDU: 세그먼트(Segment)</text>
  <text x="610" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">PDU: 패킷(Packet)</text>
  <text x="610" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c44a">PDU: 프레임(Frame)</text>
  <text x="610" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">PDU: 비트(Bit)</text>

  <!-- bracket lines to PDU -->
  <line x1="595" y1="112" x2="607" y2="112" stroke="#333" stroke-width="1"/>
  <line x1="595" y1="162" x2="607" y2="162" stroke="#333" stroke-width="1"/>
  <line x1="595" y1="212" x2="607" y2="212" stroke="#333" stroke-width="1"/>
  <line x1="595" y1="262" x2="607" y2="262" stroke="#333" stroke-width="1"/>
  <line x1="595" y1="312" x2="607" y2="312" stroke="#333" stroke-width="1"/>
  <line x1="595" y1="362" x2="607" y2="362" stroke="#333" stroke-width="1"/>
  <line x1="595" y1="412" x2="607" y2="412" stroke="#333" stroke-width="1"/>

  <!-- bottom note -->
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">실제 인터넷은 4계층 TCP/IP 모델 사용 — OSI는 참조(이해) 모델</text>
</svg>
