<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" markerWidth="18" markerHeight="14" refX="16" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,18 7,0 14" fill="#7ec8e3" stroke="none"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">rsync 델타 전송 원리</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">변경된 블록만 전송해 네트워크 부하를 최소화한다</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Source box (left) -->
  <rect x="60" y="108" width="280" height="200" rx="10" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" xml:space="preserve">소스 (로컬)</text>

  <rect x="80" y="148" width="240" height="36" rx="6" fill="#12192a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="170" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">file.txt (10MB)</text>

  <text x="200" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">블록 체크섬 생성</text>

  <rect x="80" y="218" width="100" height="28" rx="4" fill="#12192a" stroke="#888" stroke-width="1"/>
  <text x="130" y="235" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">Block A</text>
  <rect x="190" y="218" width="100" height="28" rx="4" fill="#12192a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="235" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">Block B'</text>
  <rect x="80" y="256" width="100" height="28" rx="4" fill="#12192a" stroke="#888" stroke-width="1"/>
  <text x="130" y="273" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">Block C</text>
  <rect x="190" y="256" width="100" height="28" rx="4" fill="#12192a" stroke="#888" stroke-width="1"/>
  <text x="240" y="273" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">Block D</text>

  <text x="200" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" xml:space="preserve">■ 변경된 블록</text>

  <!-- Center: SSH tunnel -->
  <rect x="360" y="178" width="160" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">SSH 터널</text>
  <text x="440" y="222" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">-e ssh</text>

  <!-- Delta arrow -->
  <line x1="340" y1="208" x2="358" y2="208" stroke="#e05555" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="349" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" xml:space="preserve">변경분만</text>
  <line x1="520" y1="208" x2="538" y2="208" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Destination box (right) -->
  <rect x="540" y="108" width="280" height="200" rx="10" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="680" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" xml:space="preserve">목적지 (원격)</text>

  <rect x="560" y="148" width="240" height="36" rx="6" fill="#12192a" stroke="#888" stroke-width="1.5"/>
  <text x="680" y="170" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">file.txt (이전 버전)</text>

  <text x="680" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">동일 블록 재사용 + 패치</text>

  <rect x="560" y="218" width="100" height="28" rx="4" fill="#12192a" stroke="#888" stroke-width="1"/>
  <text x="610" y="235" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">Block A</text>
  <rect x="670" y="218" width="100" height="28" rx="4" fill="#12192a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="235" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">Block B'</text>
  <rect x="560" y="256" width="100" height="28" rx="4" fill="#12192a" stroke="#888" stroke-width="1"/>
  <text x="610" y="273" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">Block C</text>
  <rect x="670" y="256" width="100" height="28" rx="4" fill="#12192a" stroke="#888" stroke-width="1"/>
  <text x="720" y="273" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">Block D</text>

  <text x="680" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" xml:space="preserve">■ 패치 완료 블록</text>

  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">전송량: 전체 10MB → 변경된 블록(예: 0.3MB)만 전송</text>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">--checksum 옵션으로 파일 수정 시각 대신 체크섬 비교 가능</text>
</svg>
