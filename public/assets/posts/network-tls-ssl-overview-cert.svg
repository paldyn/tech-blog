<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TLS 인증서 체인 &amp; 주요 개념</text>

  <!-- Certificate chain -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">인증서 신뢰 체인</text>

  <!-- Root CA -->
  <rect x="340" y="88" width="200" height="56" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">Root CA</text>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">브라우저/OS에 사전 탑재</text>

  <line x1="440" y1="144" x2="440" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Intermediate CA -->
  <rect x="320" y="174" width="240" height="56" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Intermediate CA</text>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Root CA 서명, 중간 CA</text>

  <line x1="440" y1="230" x2="440" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- End-entity cert -->
  <rect x="310" y="260" width="260" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">End-Entity 인증서</text>
  <text x="440" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">example.com 서버 인증서</text>

  <!-- Left annotations -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Self-signed</text>
  <text x="60" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Trust Anchor</text>

  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Root CA가 서명</text>

  <text x="60" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Intermediate CA</text>
  <text x="60" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">가 서명</text>

  <!-- Right: cert fields -->
  <rect x="630" y="88" width="210" height="230" rx="8" fill="#111120" stroke="#3a3a5a" stroke-width="1"/>
  <text x="735" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">인증서 주요 필드</text>
  <text x="646" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Subject</text>
  <text x="646" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  CN=example.com</text>
  <text x="646" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Issuer</text>
  <text x="646" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  Let's Encrypt R3</text>
  <text x="646" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">SAN</text>
  <text x="646" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  *.example.com</text>
  <text x="646" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Validity</text>
  <text x="646" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  Not After: 90d</text>
  <text x="646" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Public Key</text>
  <text x="646" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  EC P-256 / RSA-2048</text>
  <text x="646" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  Signature (Issuer 개인키)</text>

  <!-- Key concepts row -->
  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">핵심 개념</text>

  <rect x="60" y="370" width="168" height="72" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="144" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Forward Secrecy</text>
  <text x="144" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">세션 키 유출 시에도</text>
  <text x="144" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">과거 트래픽 안전</text>

  <rect x="252" y="370" width="168" height="72" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="336" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">OCSP Stapling</text>
  <text x="336" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서버가 인증서</text>
  <text x="336" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">폐기 상태 미리 첨부</text>

  <rect x="444" y="370" width="168" height="72" rx="8" fill="#2a1a1a" stroke="#e09050" stroke-width="1"/>
  <text x="528" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09050" text-anchor="middle">0-RTT (TLS 1.3)</text>
  <text x="528" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이전 세션 PSK로</text>
  <text x="528" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">핸드셰이크 없이 전송</text>

  <rect x="636" y="370" width="184" height="72" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="728" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">HSTS</text>
  <text x="728" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">브라우저가 HTTPS만</text>
  <text x="728" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">허용하도록 강제</text>

  <!-- Code block -->
  <rect x="60" y="454" width="760" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="473" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">openssl s_client <tspan fill="#7ec8e3" font-weight="600">-connect</tspan> example.com:<tspan fill="#b5cea8">443</tspan> <tspan fill="#7ec8e3" font-weight="600">-tls1_3</tspan> <tspan fill="#9aa4b8">| openssl x509 -text -noout</tspan></text>
</svg>
