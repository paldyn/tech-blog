<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Owner Reference 체인</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">상위 오브젝트 삭제 시 하위 오브젝트도 연쇄 삭제 (Cascade Deletion)</text>

  <!-- Deployment -->
  <rect x="60" y="100" width="180" height="80" rx="8" fill="#1a237e" stroke="#3949ab" stroke-width="2"/>
  <text x="150" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">Deployment</text>
  <text x="150" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9fa8da" text-anchor="middle">my-app</text>
  <text x="150" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">kind: Deployment</text>

  <line x1="250" y1="140" x2="310" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#6b7280" text-anchor="middle">owns</text>

  <!-- ReplicaSet -->
  <rect x="320" y="100" width="180" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">ReplicaSet</text>
  <text x="410" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">my-app-7d4b9c</text>
  <text x="410" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">ownerRef: Deployment</text>

  <line x1="510" y1="140" x2="570" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="540" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#6b7280" text-anchor="middle">owns</text>

  <!-- Pod 1 -->
  <rect x="580" y="70" width="150" height="70" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="655" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Pod</text>
  <text x="655" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9ca3af" text-anchor="middle">my-app-7d4b9c-xkzp2</text>
  <text x="655" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">ownerRef: ReplicaSet</text>

  <!-- Pod 2 -->
  <rect x="580" y="160" width="150" height="70" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="655" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Pod</text>
  <text x="655" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9ca3af" text-anchor="middle">my-app-7d4b9c-mnqr8</text>
  <text x="655" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">ownerRef: ReplicaSet</text>

  <line x1="510" y1="155" x2="570" y2="195" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Deletion cascade -->
  <rect x="60" y="270" width="760" height="130" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Cascade Deletion 방식</text>

  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Foreground (기본)</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">소유된 오브젝트 먼저 삭제 후 오너 삭제. 삭제 중 오너는 deletionTimestamp만 설정됨</text>

  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Background</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">오너 먼저 삭제 후 GC가 소유된 오브젝트 비동기 삭제. --cascade=background</text>
</svg>
