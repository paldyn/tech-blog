<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrInfo" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">Token Endpoint 요청과 응답</text>
  <text x="60" y="73" font-size="16" font-weight="600" fill="#e8e8e8">code 를 access_token 으로 교환하는 HTTP 왕복</text>

  <!-- Left: request -->
  <text x="60" y="108" font-size="13" fill="#888">요청 — application/x-www-form-urlencoded</text>
  <rect x="60" y="120" width="360" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">POST</tspan><tspan fill="#ffffff"> /token HTTP/1.1</tspan></text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Host: auth.example.com</text>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Content-Type:</text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  application/x-www-form-urlencoded</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">grant_type=authorization_code</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&amp;code=SplxlOBeZQ...</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&amp;code_verifier=dBjftJeZ...</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&amp;redirect_uri=https://app/cb</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&amp;client_id=s6BhdRkqt3</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// PKCE: verifier 가 challenge 와 매칭</text>

  <!-- Right: response -->
  <text x="460" y="108" font-size="13" fill="#888">응답 — application/json</text>
  <rect x="460" y="120" width="360" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">HTTP/1.1 </tspan><tspan fill="#b5cea8">200</tspan><tspan fill="#ffffff"> OK</tspan></text>
  <text x="476" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Content-Type: application/json</text>
  <text x="476" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="476" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">  "access_token"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"eyJ..."</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">  "token_type"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"Bearer"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">  "expires_in"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">3600</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">  "refresh_token"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"tGzv..."</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ce9178">  "scope"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"read profile"</tspan></text>
  <text x="476" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="476" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// access_token = Bearer 자격증명</text>

  <!-- arrows connecting boxes -->
  <line x1="420" y1="210" x2="460" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <text x="440" y="200" font-size="12" fill="#7ec8e3" text-anchor="middle">요청</text>
  <line x1="460" y1="270" x2="420" y2="270" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="440" y="290" font-size="12" fill="#55c555" text-anchor="middle">응답</text>

  <!-- footer note -->
  <text x="60" y="396" font-size="13" fill="#888">이 교환은 브라우저가 아닌 서버 간(back-channel)에서 일어나며, code 는 1회용이다.</text>
  <text x="60" y="424" font-size="13" fill="#7777cc">access_token 만료 시 grant_type=refresh_token 으로 같은 엔드포인트에서 재발급.</text>
</svg>
