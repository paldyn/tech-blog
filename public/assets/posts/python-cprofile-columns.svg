<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">cProfile 출력 읽는 법</text>

  <rect x="60" y="84" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">   ncalls  tottime  percall  cumtime  percall  filename:lineno</text>
  <text xml:space="preserve" x="78" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     1000    <tspan fill="#e05555">2.100</tspan>    0.002    <tspan fill="#e0a555">2.450</tspan>    0.002  app.py:42(parse)</text>
  <text xml:space="preserve" x="78" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     5000    0.300    0.000    <tspan fill="#e0a555">0.350</tspan>    0.000  util.py:8(clean)</text>
  <text xml:space="preserve" x="78" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">   # tottime 큰 줄이 진짜 병목</text>

  <rect x="60" y="210" width="247" height="74" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="238" font-size="14" font-weight="600" fill="#e05555">tottime</text>
  <text x="80" y="260" font-size="12" fill="#9aa4b8">그 함수 자체에서</text>
  <text x="80" y="277" font-size="12" fill="#9aa4b8">쓴 시간 (하위 제외)</text>

  <rect x="317" y="210" width="247" height="74" rx="6" fill="#000000" stroke="#e0a555" stroke-width="1"/>
