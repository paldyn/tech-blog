<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">들여쓰기가 만드는 블록 구조</text>

  <!-- Left: Python with indentation -->
  <text x="255" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Python — 들여쓰기로 블록 구분</text>
  <rect x="60" y="88" width="390" height="286" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Level 0 -->
  <rect x="68" y="96" width="4" height="17" rx="1" fill="#475569"/>
  <text x="80" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> process(items):</tspan></text>

  <!-- Level 1 (4 spaces) -->
  <rect x="68" y="115" width="4" height="75" rx="1" fill="#3b82f6"/>
  <text x="80" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> item </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> items:</tspan></text>

  <!-- Level 2 (8 spaces) -->
  <rect x="68" y="132" width="4" height="56" rx="1" fill="#10b981"/>
  <text x="80" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> item &gt; </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">:</tspan></text>

  <!-- Level 3 (12 spaces) -->
  <rect x="68" y="152" width="4" height="35" rx="1" fill="#f59e0b"/>
  <text x="80" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">            result = item * </tspan><tspan fill="#b5cea8">2</tspan></text>
  <text x="80" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">            print</tspan><tspan fill="#ffffff">(result)</tspan></text>

  <!-- Back to level 1 -->
  <text x="80" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> items</tspan></text>

  <!-- Legend -->
  <rect x="68" y="238" width="12" height="12" rx="2" fill="#475569"/>
  <text x="86" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9ca3af">레벨 0 (함수 정의)</text>
  <rect x="68" y="258" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="86" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9ca3af">레벨 1 (4칸)</text>
  <rect x="68" y="278" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="86" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9ca3af">레벨 2 (8칸)</text>
  <rect x="68" y="298" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="86" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9ca3af">레벨 3 (12칸)</text>

  <text x="255" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">들여쓰기가 곧 블록 경계</text>

  <!-- Right: Comparison with other languages -->
  <text x="665" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">C / Java — 중괄호로 블록 구분</text>
  <rect x="455" y="88" width="390" height="286" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="471" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> process(items) {</tspan></text>
  <text x="471" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff">(item : items) {</tspan></text>
  <text x="471" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff">(item &gt; </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="471" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">            result = item * </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="471" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">            printf(</tspan><tspan fill="#ce9178">"%d"</tspan><tspan fill="#ffffff">, result);</tspan></text>
  <text x="471" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        }   </tspan><tspan fill="#9aa4b8">// 중괄호로 블록 종료</tspan></text>
  <text x="471" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    }</tspan></text>
  <text x="471" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>

  <text x="471" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">// 들여쓰기가 없어도 동작 (가독성 저하)</text>
  <text x="471" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">void bad(){</text>
  <text x="471" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">if(x){doA();}else{doB();}}</text>

  <text x="665" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">{ } 로 블록 구분 — 들여쓰기는 관례</text>

  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Python은 들여쓰기를 강제함으로써 모든 코드가 동일한 가독성을 갖도록 보장</text>
</svg>
