<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">TypeScript 점진적 도입 전략</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle" xml:space="preserve">JS 코드베이스를 단계적으로 TS로 전환</text>
  <!-- Phase 1 -->
  <rect x="60" y="96" width="220" height="168" rx="8" fill="#0d0f1a" stroke="#3a3a7a" stroke-width="2"/>
  <text x="170" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle" xml:space="preserve">Phase 1</text>
  <text x="170" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">설정만 추가</text>
  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">allowJs: true</text>
  <text x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">checkJs: true</text>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">strict: false</text>
  <text x="76" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">JS 파일 그대로 유지</text>
  <text x="76" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">JSDoc으로 타입 힌트</text>
  <!-- Arrow 1-->
  <polygon points="295,180 320,170 320,190" fill="#555"/>
  <line x1="280" y1="180" x2="318" y2="180" stroke="#555" stroke-width="2"/>
  <!-- Phase 2 -->
  <rect x="325" y="96" width="220" height="168" rx="8" fill="#0f1a0f" stroke="#1a4a1a" stroke-width="2"/>
  <text x="435" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle" xml:space="preserve">Phase 2</text>
  <text x="435" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">새 파일부터 .ts</text>
  <text x="341" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">새 파일: .ts 작성</text>
  <text x="341" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">기존: .js 유지</text>
  <text x="341" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">핵심 모듈 우선 전환</text>
  <text x="341" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">타입 선언 파일 작성</text>
  <text x="341" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">any 허용 후 점진 제거</text>
  <!-- Arrow 2 -->
  <polygon points="560,180 585,170 585,190" fill="#555"/>
  <line x1="545" y1="180" x2="583" y2="180" stroke="#555" stroke-width="2"/>
  <!-- Phase 3 -->
  <rect x="590" y="96" width="230" height="168" rx="8" fill="#1a0f0a" stroke="#4a2a0a" stroke-width="2"/>
  <text x="705" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8a020" text-anchor="middle" xml:space="preserve">Phase 3</text>
  <text x="705" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">strict 완전 적용</text>
  <text x="606" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">strict: true</text>
  <text x="606" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">noImplicitAny</text>
  <text x="606" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">allowJs: false</text>
  <text x="606" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">any 제거 완료</text>
  <text x="606" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">CI에서 tsc 오류 차단</text>
  <!-- Tools section -->
  <rect x="60" y="286" width="760" height="170" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">자동화 도구</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">npx ts-migrate migrate ./src</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// .js → .ts 자동 변환 + @ts-ignore 삽입</text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">npx @ts-morph/bootstrap  </text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 코드 변환 스크립트 작성</text>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">// @ts-check (JS 파일 내 JSDoc 기반 검사)</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// @ts-ignore, @ts-expect-error (임시 억제)</text>
</svg>
