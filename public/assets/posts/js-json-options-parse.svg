<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSON.parse reviver와 직렬화 제한</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">날짜 복원 · toJSON · 직렬화 불가 값</text>

  <!-- Left: reviver -->
  <rect x="60" y="90" width="370" height="280" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">reviver로 날짜 복원</text>
  <rect x="72" y="120" width="346" height="238" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="88" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="142" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> json = JSON.stringify({</text>
  <text x="88" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  createdAt: </text><text x="178" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">new</text><text x="208" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Date()</text>
  <text x="88" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">});</text>
  <text x="88" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// reviver로 ISO 문자열 → Date 복원</text>
  <text x="88" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="142" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> isoRe = /^\d{4}-\d{2}.*Z$/;</text>
  <text x="88" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="142" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> parsed = JSON.parse(json,</text>
  <text x="88" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  (key, val) =&gt;</text>
  <text x="88" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    typeof</text><text x="152" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> val === </text><text x="212" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'string'</text><text x="272" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> &amp;&amp;</text>
  <text x="88" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    isoRe.test(val)</text>
  <text x="88" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">      ?</tspan><tspan fill="#7ec8e3"> new</tspan><tspan fill="#e8e8e8"> Date(val)</tspan></text>
  <text x="88" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">      :</tspan><tspan fill="#e8e8e8"> val</tspan></text>
  <text x="88" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">);</text>

  <!-- Right: serialization limits + toJSON -->
  <rect x="450" y="90" width="370" height="280" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">직렬화 제한과 toJSON</text>
  <rect x="462" y="120" width="346" height="238" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="478" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 직렬화 안 되는 값</text>
  <text x="478" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">JSON.stringify(</text><text x="590" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">undefined</text><text x="662" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">); </text><text x="684" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// undefined</text>
  <text x="478" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">JSON.stringify(() =&gt; {}); </tspan><tspan fill="#6a8aa0">// undefined</tspan></text>
  <text x="478" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">JSON.stringify(Symbol()); </text><text x="664" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// undefined</text>
  <text x="478" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">JSON.stringify(NaN);      </text><text x="664" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 'null'</text>
  <text x="478" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">JSON.stringify(Infinity);  </text><text x="664" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 'null'</text>
  <text x="478" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// toJSON — 커스텀 직렬화</text>
  <text x="478" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">class</text><text x="514" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Money {</text>
  <text x="478" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  constructor(v, c) {</text>
  <text x="478" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    [</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.v,</tspan><tspan fill="#7ec8e3"> this</tspan><tspan fill="#e8e8e8">.c] = [v, c]; }</tspan></text>
  <text x="478" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  toJSON() { </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ce9178"> `${</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ce9178">.v} ${</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ce9178">.c}`</tspan><tspan fill="#e8e8e8">; }</tspan></text>
  <text x="478" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
</svg>
