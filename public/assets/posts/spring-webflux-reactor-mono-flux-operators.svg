<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#c077cc"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Reactor 핵심 오퍼레이터 시각화</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">map · flatMap · zip · merge · filter · error handling</text>

  <!-- map 오퍼레이터 -->
  <text x="100" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">map (동기 변환)</text>

  <!-- map 입력 스트림 -->
  <line x1="40" y1="124" x2="200" y2="124" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>
  <circle cx="70" cy="124" r="10" fill="#7ec8e3"/>
  <text x="70" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">1</text>
  <circle cx="110" cy="124" r="10" fill="#7ec8e3"/>
  <text x="110" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">2</text>
  <circle cx="150" cy="124" r="10" fill="#7ec8e3"/>
  <text x="150" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">3</text>

  <!-- map 변환 박스 -->
  <rect x="38" y="136" width="164" height="22" rx="4" fill="#0f1a2e" stroke="#3a5a9e" stroke-width="1"/>
  <text x="120" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">x → x * 2</text>

  <!-- map 출력 스트림 -->
  <line x1="40" y1="172" x2="200" y2="172" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>
  <circle cx="70" cy="172" r="10" fill="#55c555"/>
  <text x="70" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">2</text>
  <circle cx="110" cy="172" r="10" fill="#55c555"/>
  <text x="110" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">4</text>
  <circle cx="150" cy="172" r="10" fill="#55c555"/>
  <text x="150" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">6</text>

  <!-- flatMap 오퍼레이터 -->
  <text x="350" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#c077cc">flatMap (비동기 변환+평탄화)</text>

  <line x1="250" y1="124" x2="460" y2="124" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>
  <circle cx="280" cy="124" r="10" fill="#7ec8e3"/>
  <text x="280" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">A</text>
  <circle cx="330" cy="124" r="10" fill="#7ec8e3"/>
  <text x="330" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">B</text>

  <!-- 내부 Publisher 표현 -->
  <line x1="280" y1="134" x2="275" y2="148" stroke="#c077cc" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="330" y1="134" x2="355" y2="148" stroke="#c077cc" stroke-width="1.5" stroke-dasharray="3,2"/>

  <rect x="252" y="136" width="196" height="22" rx="4" fill="#1a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="350" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#c077cc">x → Mono/Flux (내부 Publisher)</text>

  <line x1="250" y1="172" x2="460" y2="172" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>
  <circle cx="275" cy="172" r="9" fill="#c077cc"/>
  <text x="275" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#fff">A1</text>
  <circle cx="300" cy="172" r="9" fill="#c077cc"/>
  <text x="300" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#fff">B1</text>
  <circle cx="325" cy="172" r="9" fill="#c077cc"/>
  <text x="325" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#fff">A2</text>
  <circle cx="350" cy="172" r="9" fill="#c077cc"/>
  <text x="350" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#fff">B2</text>

  <!-- zip 오퍼레이터 -->
  <text x="650" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c84a">zip (두 스트림 결합)</text>

  <line x1="500" y1="115" x2="710" y2="115" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>
  <circle cx="540" cy="115" r="10" fill="#7ec8e3"/>
  <text x="540" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">1</text>
  <circle cx="590" cy="115" r="10" fill="#7ec8e3"/>
  <text x="590" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">2</text>
  <circle cx="640" cy="115" r="10" fill="#7ec8e3"/>
  <text x="640" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">3</text>

  <line x1="500" y1="135" x2="710" y2="135" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>
  <circle cx="540" cy="135" r="10" fill="#e8c84a"/>
  <text x="540" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">A</text>
  <circle cx="590" cy="135" r="10" fill="#e8c84a"/>
  <text x="590" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000">B</text>

  <rect x="500" y="147" width="208" height="20" rx="4" fill="#1a1a0a" stroke="#e8c84a" stroke-width="1"/>
  <text x="604" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e8c84a">Flux.zip — 쌍으로 결합</text>

  <line x1="500" y1="172" x2="710" y2="172" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>
  <circle cx="540" cy="172" r="12" fill="#55c555"/>
  <text x="540" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#000">(1,A)</text>
  <circle cx="590" cy="172" r="12" fill="#55c555"/>
  <text x="590" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#000">(2,B)</text>

  <!-- 에러 처리 섹션 -->
  <text x="180" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">에러 처리 오퍼레이터</text>

  <line x1="40" y1="234" x2="340" y2="234" stroke="#555" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <circle cx="80" cy="234" r="9" fill="#7ec8e3"/>
  <circle cx="130" cy="234" r="9" fill="#7ec8e3"/>
  <circle cx="180" cy="234" r="9" fill="#e05555"/>
  <text x="180" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#fff">✗</text>
  <line x1="180" y1="243" x2="180" y2="256" stroke="#e05555" stroke-width="1.5" stroke-dasharray="3,2"/>

  <rect x="40" y="256" width="300" height="56" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="74" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">onErrorReturn</text>
  <text x="74" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">에러 시 기본값 반환</text>
  <text x="74" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">onErrorResume</text>
  <text x="200" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ 대체 Publisher로 전환</text>

  <!-- 스케줄러 섹션 -->
  <text x="620" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Scheduler 종류</text>

  <rect x="370" y="228" width="470" height="84" rx="6" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="386" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Schedulers.parallel()</text>
  <text x="386" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CPU 코어 수 스레드, 연산 집약 작업용</text>
  <text x="386" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Schedulers.boundedElastic()</text>
  <text x="386" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">최대 10 × CPU 스레드, 블로킹 I/O 격리용</text>

  <!-- 하단 코드 예시 (두 컬럼) -->
  <rect x="40" y="330" width="380" height="178" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="56" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// 오퍼레이터 체인 예시</text>
  <text x="56" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Flux.<tspan fill="#ce9178">"user1"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"user2"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"user3"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="56" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    .<tspan font-weight="600" fill="#7ec8e3">filter</tspan><tspan fill="#ffffff">(name -&gt; name.startsWith(</tspan><tspan fill="#ce9178">"u"</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="56" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    .<tspan font-weight="600" fill="#7ec8e3">map</tspan><tspan fill="#ffffff">(String::toUpperCase)</tspan></text>
  <text x="56" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    .<tspan font-weight="600" fill="#7ec8e3">flatMap</tspan><tspan fill="#ffffff">(name -&gt;</tspan></text>
  <text x="56" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        userService.findByName(name))</text>
  <text x="56" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    .<tspan font-weight="600" fill="#7ec8e3">onErrorReturn</tspan><tspan fill="#ffffff">(User.GUEST)</tspan></text>
  <text x="56" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    .<tspan font-weight="600" fill="#7ec8e3">subscribe</tspan><tspan fill="#ffffff">(System.out::println);</tspan></text>
  <text x="56" y="496" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// subscribe 전까지 실행 안 됨 (Cold)</text>

  <rect x="460" y="330" width="380" height="178" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// Mono 병렬 실행 (zip)</text>
  <text x="476" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Mono&lt;User&gt; user = userSvc.find(id);</text>
  <text x="476" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Mono&lt;Order&gt; order = orderSvc.find(id);</text>
  <text x="476" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Mono&lt;Point&gt; point = pointSvc.find(id);</text>
  <text x="476" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// 세 API를 병렬 호출 후 결합</text>
  <text x="476" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Mono.<tspan font-weight="600" fill="#7ec8e3">zip</tspan><tspan fill="#ffffff">(user, order, point)</tspan></text>
  <text x="476" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    .<tspan font-weight="600" fill="#7ec8e3">map</tspan><tspan fill="#ffffff">(tuple -&gt;</tspan></text>
  <text x="476" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        Dashboard.of(tuple.getT1(),</text>
  <text x="476" y="494" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                     tuple.getT2(), ...));</text>
</svg>
