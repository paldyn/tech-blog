<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Proxy 트랩(Trap) 목록</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">new Proxy(target, handler) — 가로챌 수 있는 동작</text>

  <!-- 트랩 목록 테이블 -->
  <rect x="60" y="96" width="760" height="390" rx="8" fill="#111827" stroke="#1e2433"/>

  <!-- 헤더 -->
  <rect x="80" y="106" width="200" height="28" rx="4" fill="#1e2433"/>
  <text x="180" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">트랩 메서드</text>
  <rect x="290" y="106" width="520" height="28" rx="4" fill="#1e2433"/>
  <text x="550" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">가로채는 동작</text>

  <!-- 행들 -->
  <text x="80" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">get(target, prop, receiver)</text>
  <text x="290" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">obj.prop, obj[prop] 읽기</text>
  <line x1="80" y1="162" x2="820" y2="162" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">set(target, prop, value, receiver)</text>
  <text x="290" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">obj.prop = value 쓰기</text>
  <line x1="80" y1="187" x2="820" y2="187" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">has(target, prop)</text>
  <text x="290" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">prop in obj</text>
  <line x1="80" y1="212" x2="820" y2="212" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">deleteProperty(target, prop)</text>
  <text x="290" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">delete obj.prop</text>
  <line x1="80" y1="237" x2="820" y2="237" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">apply(target, thisArg, args)</text>
  <text x="290" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">fn() / fn.call() / fn.apply() 함수 호출</text>
  <line x1="80" y1="262" x2="820" y2="262" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">construct(target, args, newTarget)</text>
  <text x="290" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">new fn() 생성자 호출</text>
  <line x1="80" y1="287" x2="820" y2="287" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">getPrototypeOf(target)</text>
  <text x="290" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Object.getPrototypeOf()</text>
  <line x1="80" y1="312" x2="820" y2="312" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">setPrototypeOf(target, proto)</text>
  <text x="290" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Object.setPrototypeOf()</text>
  <line x1="80" y1="337" x2="820" y2="337" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">ownKeys(target)</text>
  <text x="290" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Object.keys() / Object.getOwnPropertyNames()</text>
  <line x1="80" y1="362" x2="820" y2="362" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">getOwnPropertyDescriptor(target, prop)</text>
  <text x="290" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Object.getOwnPropertyDescriptor()</text>
  <line x1="80" y1="387" x2="820" y2="387" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">defineProperty(target, prop, desc)</text>
  <text x="290" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Object.defineProperty()</text>
  <line x1="80" y1="412" x2="820" y2="412" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">isExtensible(target)</text>
  <text x="290" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Object.isExtensible()</text>
  <line x1="80" y1="437" x2="820" y2="437" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">preventExtensions(target)</text>
  <text x="290" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Object.preventExtensions()</text>

  <text x="440" y="502" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
