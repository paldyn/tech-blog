  <text x="420" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">10</text>
  <text x="460" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
