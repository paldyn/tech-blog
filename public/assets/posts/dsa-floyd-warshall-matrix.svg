  <!-- Formula -->
  <rect x="58" y="350" width="244" height="96" fill="#1a1a3a" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" font-weight="600" text-anchor="middle">점화식</text>
  <text x="180" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">dist[i][j] = min(</text>
  <text x="180" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">  dist[i][j],</text>
  <text x="180" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">  dist[i][k]+dist[k][j])</text>

  <!-- Right: matrix before/after -->
  <rect x="340" y="86" width="240" height="200" fill="#111" rx="10" stroke="#333" stroke-width="1"/>
  <text x="460" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">초기 행렬 (INF=∞)</text>

  <!-- Matrix header -->
  <text x="380" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">-</text>
  <text x="420" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">1</text>
  <text x="460" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
