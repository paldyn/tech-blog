  <text x="460" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">0</text>
  <text x="500" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">1</text>
  <text x="540" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">5</text>

  <text x="380" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
