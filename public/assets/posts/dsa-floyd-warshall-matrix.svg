  <text x="540" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">4</text>

  <text x="380" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
