  <text x="620" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">・음수 사이클 탐지</text>
  <text x="620" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">・전이 폐쇄(경로 존재)</text>
  <text x="620" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">・소규모 dense 그래프</text>

  <line x1="620" y1="418" x2="828" y2="418" stroke="#333" stroke-width="1"/>

