<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">플로이드-워셜 — 거리 행렬 갱신</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">k를 중간 노드로 경유할 때 dist[i][j] 단축 여부 확인</text>

  <!-- Left: graph -->
  <rect x="40" y="86" width="280" height="380" fill="#111" rx="10" stroke="#333" stroke-width="1"/>
