  <circle cx="100" cy="200" r="22" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
