  <circle cx="180" cy="140" r="22" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
