  <!-- Right side note -->
  <rect x="600" y="86" width="240" height="380" fill="#111" rx="10" stroke="#333" stroke-width="1"/>
  <text x="720" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">알고리즘 구조</text>

  <text x="620" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" font-weight="600">3중 루프</text>
  <text x="620" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">for k in range(n):</text>
  <text x="620" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8"> for i in range(n):</text>
  <text x="620" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">  for j in range(n):</text>
  <text x="620" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">   # 갱신</text>

  <line x1="620" y1="238" x2="828" y2="238" stroke="#333" stroke-width="1"/>

  <text x="620" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" font-weight="600">시간 복잡도</text>
  <text x="720" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#7ec8e3" font-weight="700" text-anchor="middle">O(V³)</text>

  <line x1="620" y1="300" x2="828" y2="300" stroke="#333" stroke-width="1"/>

  <text x="620" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
