  <text x="540" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">4</text>

  <text x="380" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
