  <text x="500" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">0</text>
  <text x="540" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">4</text>

  <text x="380" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
