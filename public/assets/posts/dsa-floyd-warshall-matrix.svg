      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Nodes: 1(100,200) 2(180,140) 3(260,200) 4(180,270) -->
  <!-- Edges -->
  <line x1="122" y1="192" x2="165" y2="152" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-fw)"/>
  <text x="130" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
