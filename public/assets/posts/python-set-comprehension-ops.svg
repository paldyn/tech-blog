<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">집합 연산과 frozenset</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">교집합 · 합집합 · 차집합 · 불변 집합</text>

  <!-- Set operations -->
  <rect x="60" y="100" width="480" height="180" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="300" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">집합 연산 활용</text>
  <rect x="76" y="136" width="448" height="128" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">a_tags = {<tspan fill="#ce9178">"python"</tspan>, <tspan fill="#ce9178">"web"</tspan>, <tspan fill="#ce9178">"api"</tspan>}</text>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">b_tags = {<tspan fill="#ce9178">"python"</tspan>, <tspan fill="#ce9178">"ml"</tspan>, <tspan fill="#ce9178">"api"</tspan>}</text>
  <text x="92" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">a_tags &amp; b_tags   <tspan fill="#9aa4b8"># {'python','api'} 교집합</tspan></text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">a_tags | b_tags   <tspan fill="#9aa4b8"># {'python','web','api','ml'} 합집합</tspan></text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">a_tags - b_tags   <tspan fill="#9aa4b8"># {'web'} 차집합</tspan></text>
  <text x="92" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">a_tags ^ b_tags   <tspan fill="#9aa4b8"># {'web','ml'} 대칭차</tspan></text>

  <!-- frozenset -->
  <rect x="580" y="100" width="240" height="180" rx="8" fill="#111827" stroke="#7777cc"/>
  <text x="700" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">frozenset</text>
  <rect x="596" y="136" width="208" height="128" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="612" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 불변 집합</text>
  <text x="612" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">fs = <tspan fill="#7ec8e3">frozenset</tspan>([<tspan fill="#b5cea8">1</tspan>,<tspan fill="#b5cea8">2</tspan>,<tspan fill="#b5cea8">3</tspan>])</text>
  <text x="612" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 딕셔너리 키 가능</text>
  <text x="612" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">d = {fs: <tspan fill="#ce9178">"group"</tspan>}</text>
  <text x="612" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># set은 unhashable</text>
  <text x="612" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># frozenset은 hashable</text>

  <!-- Comprehension for dedup + set ops -->
  <rect x="60" y="300" width="760" height="110" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">컴프리헨션 + 집합 연산 조합</text>
  <rect x="76" y="336" width="728" height="58" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 두 리스트에서 공통 요소 (대소문자 무시)</text>
  <text x="92" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">list1 = [<tspan fill="#ce9178">"Python"</tspan>, <tspan fill="#ce9178">"Java"</tspan>, <tspan fill="#ce9178">"Go"</tspan>]</text>
  <text x="320" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">list2 = [<tspan fill="#ce9178">"python"</tspan>, <tspan fill="#ce9178">"rust"</tspan>, <tspan fill="#ce9178">"go"</tspan>]</text>
  <text x="92" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{w.lower() <tspan fill="#7ec8e3">for</tspan> w <tspan fill="#7ec8e3">in</tspan> list1} &amp; {w.lower() <tspan fill="#7ec8e3">for</tspan> w <tspan fill="#7ec8e3">in</tspan> list2}  <tspan fill="#9aa4b8"># {'python', 'go'}</tspan></text>

  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">집합 멤버십 체크 O(1) — 리스트 O(n)</text>
</svg>
