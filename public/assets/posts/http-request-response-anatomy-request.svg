<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 요청 메시지 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">클라이언트가 서버로 전송하는 텍스트 기반 메시지</text>

  <!-- Section 1: Request Line -->
  <rect x="60" y="90" width="490" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">① 요청 줄 (Request Line)</text>
  <text x="80" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">POST</text>
  <text x="130" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> /api/users</text>
  <text x="256" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ce9178"> HTTP/1.1</text>

  <!-- Labels for request line -->
  <text x="584" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">메서드</text>
  <text x="584" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GET·POST·PUT·DELETE 등</text>
  <line x1="572" y1="112" x2="557" y2="130" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <text x="680" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">버전</text>
  <text x="680" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HTTP/1.0·1.1·2·3</text>
  <line x1="692" y1="122" x2="672" y2="133" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Section 2: Headers -->
  <rect x="60" y="182" width="490" height="138" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">② 헤더 (Headers) — 0개 이상, CRLF 구분</text>
  <text x="80" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Host:</text>
  <text x="142" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff"> example.com</text>
  <text x="80" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Content-Type:</text>
  <text x="216" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ce9178"> application/json</text>
  <text x="80" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Content-Length:</text>
  <text x="240" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#b5cea8"> 27</text>
  <text x="80" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Authorization:</text>
  <text x="224" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ce9178"> Bearer eyJhbGciO...</text>

  <!-- Header right labels -->
  <text x="584" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">헤더 형식</text>
  <text x="584" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이름: 값\r\n</text>
  <text x="584" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">대소문자 무관</text>
  <text x="584" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">content-type 도 유효</text>

  <!-- Section 3: CRLF -->
  <rect x="60" y="336" width="490" height="32" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="80" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="12" fill="#9aa4b8">\r\n  (빈 줄 — 헤더/본문 경계)</text>
  <text x="584" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CRLF 필수</text>

  <!-- Section 4: Body -->
  <rect x="60" y="384" width="490" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">③ 본문 (Body) — 선택적</text>
  <text x="80" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">{"name":"Alice","age":30}</text>
  <text x="584" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">본문</text>
  <text x="584" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GET엔 보통 없음</text>
  <text x="584" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">POST/PUT/PATCH에 사용</text>

  <!-- Bottom note -->
  <text x="440" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">각 줄은 \r\n(CRLF)으로 끝남 — RFC 7230 규정</text>
</svg>
