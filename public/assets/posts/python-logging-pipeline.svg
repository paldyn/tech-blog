<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="240" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">로그 한 줄이 흘러가는 길</text>

  <defs>
    <marker id="lparr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Logger</text>
  <text x="135" y="150" font-size="11" fill="#9aa4b8" text-anchor="middle">log.info(...)</text>

  <line x1="210" y1="132" x2="259" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lparr)"/>

  <rect x="263" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="338" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Filter</text>
  <text x="338" y="150" font-size="11" fill="#9aa4b8" text-anchor="middle">레벨·조건 통과</text>

  <line x1="413" y1="132" x2="462" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lparr)"/>

  <rect x="466" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="541" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Handler</text>
  <text x="541" y="150" font-size="11" fill="#9aa4b8" text-anchor="middle">어디로 보낼지</text>

  <line x1="616" y1="132" x2="665" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lparr)"/>

  <rect x="669" y="100" width="150" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="744" y="128" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Formatter</text>
  <text x="744" y="150" font-size="11" fill="#9aa4b8" text-anchor="middle">어떤 모양으로</text>

  <rect x="60" y="190" width="759" height="36" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="78" y="214" font-size="13" fill="#55c555">Logger는 "무엇을", Handler는 "어디로", Formatter는 "어떻게"를 담당한다</text>
</svg>
