<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">mpstat — CPU별 사용률 분석</text>

  <!-- Code box -->
  <rect x="60" y="68" width="760" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">$ mpstat -P ALL 1 3</text>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">CPU   %usr  %sys  %iowait  %irq  %soft  %idle</text>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">all   12.5   3.2     1.0    0.1    0.3   82.9</text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  0   <tspan fill="#e05555">87.3</tspan>   8.1     0.0    0.2    0.4    <tspan fill="#e05555">4.0</tspan></text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  1    1.0   0.5     0.0    0.0    0.1   98.4</text>

  <!-- Annotation: CPU 0 is hot -->
  <rect x="640" y="136" width="165" height="36" rx="6" fill="#150505" stroke="#e05555" stroke-width="1"/>
  <text x="722" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">CPU 0만 과부하!</text>
  <text x="722" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단일 스레드 병목 패턴</text>
  <line x1="543" y1="146" x2="638" y2="150" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- CPU % columns explained -->
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">주요 컬럼 의미</text>

  <!-- 3 x 2 grid of explanations -->
  <rect x="60" y="238" width="248" height="72" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="184" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">%usr</text>
  <text x="184" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">사용자 공간 CPU 사용률</text>
  <text x="184" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">높으면 애플리케이션 코드 부하</text>

  <rect x="318" y="238" width="248" height="72" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="442" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">%sys</text>
  <text x="442" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">커널 공간 CPU 사용률</text>
  <text x="442" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">높으면 syscall·락 경합</text>

  <rect x="576" y="238" width="244" height="72" rx="8" fill="#0d0d0d" stroke="#e0a055" stroke-width="1.5"/>
  <text x="698" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">%iowait</text>
  <text x="698" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">I/O 대기 중 idle CPU %</text>
  <text x="698" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">높으면 디스크 병목 가능</text>

  <rect x="60" y="322" width="248" height="72" rx="8" fill="#0d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="184" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">%irq</text>
  <text x="184" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">하드웨어 인터럽트 처리 %</text>
  <text x="184" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">네트워크·디스크 이벤트</text>

  <rect x="318" y="322" width="248" height="72" rx="8" fill="#0d0d0d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="442" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">%soft</text>
  <text x="442" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">소프트웨어 인터럽트 %</text>
  <text x="442" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">네트워크 스택, ksoftirqd</text>

  <rect x="576" y="322" width="244" height="72" rx="8" fill="#0d0d0d" stroke="#888" stroke-width="1.5"/>
  <text x="698" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">%idle</text>
  <text x="698" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CPU 유휴 %</text>
  <text x="698" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">100 - idle = 총 사용률</text>
</svg>
