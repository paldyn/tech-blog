<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계형 모델의 수학적 구조</text>

  <!-- Relation (Table) box -->
  <rect x="60" y="70" width="760" height="260" fill="#0d0d0d" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">릴레이션 R = { t₁, t₂, t₃, ... } — 튜플의 집합</text>

  <!-- Header -->
  <rect x="80" y="104" width="720" height="30" fill="#162030"/>
  <text x="160" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">student_id</text>
  <text x="310" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">name</text>
  <text x="460" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">dept</text>
  <text x="620" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">grade</text>
  <text x="760" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">도메인</text>

  <!-- Row 1 -->
  <rect x="80" y="134" width="720" height="30" fill="#0e1a24"/>
  <text x="160" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">1001</text>
  <text x="310" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">김철수</text>
  <text x="460" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">컴퓨터공학</text>
  <text x="620" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">3</text>
  <text x="760" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">← t₁</text>

  <!-- Row 2 -->
  <rect x="80" y="164" width="720" height="30" fill="#0a1218"/>
  <text x="160" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">1002</text>
  <text x="310" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">이영희</text>
  <text x="460" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">수학</text>
  <text x="620" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">2</text>
  <text x="760" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">← t₂</text>

  <!-- Row 3 -->
  <rect x="80" y="194" width="720" height="30" fill="#0e1a24"/>
  <text x="160" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">1003</text>
  <text x="310" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">박민준</text>
  <text x="460" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">물리학</text>
  <text x="620" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">4</text>
  <text x="760" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">← t₃</text>

  <!-- Column labels -->
  <line x1="80" y1="134" x2="800" y2="134" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="80" y1="164" x2="800" y2="164" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="80" y1="194" x2="800" y2="194" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="230" y1="104" x2="230" y2="224" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="390" y1="104" x2="390" y2="224" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="545" y1="104" x2="545" y2="224" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="700" y1="104" x2="700" y2="224" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Domain annotations -->
  <text x="160" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a020" text-anchor="middle">D₁: 정수 집합</text>
  <text x="310" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a020" text-anchor="middle">D₂: 문자열 집합</text>
  <text x="460" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a020" text-anchor="middle">D₃: {CS,Math,Phys,...}</text>
  <text x="620" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a020" text-anchor="middle">D₄: {1,2,3,4}</text>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">R ⊆ D₁ × D₂ × D₃ × D₄  (카테시안 곱의 부분집합)</text>

  <!-- Properties -->
  <rect x="60" y="350" width="760" height="120" fill="#111" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">릴레이션의 특성</text>

  <rect x="80" y="386" width="160" height="68" fill="#0a0a0a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">중복 없음</text>
  <text x="160" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">튜플은 집합이므로</text>
  <text x="160" y="441" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">동일 행 없음</text>

  <rect x="260" y="386" width="160" height="68" fill="#0a0a0a" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="340" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">순서 없음</text>
  <text x="340" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">행 순서, 열 순서</text>
  <text x="340" y="441" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">모두 무의미</text>

  <rect x="440" y="386" width="160" height="68" fill="#0a0a0a" rx="4" stroke="#e8a020" stroke-width="1"/>
  <text x="520" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a020" text-anchor="middle">원자 값</text>
  <text x="520" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">각 셀은 단일 값</text>
  <text x="520" y="441" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(1NF 조건)</text>

  <rect x="620" y="386" width="180" height="68" fill="#0a0a0a" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">이름으로 접근</text>
  <text x="710" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">컬럼명으로만 참조</text>
  <text x="710" y="441" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">위치 인덱스 지양</text>
</svg>