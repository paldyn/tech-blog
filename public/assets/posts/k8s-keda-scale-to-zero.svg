<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">KEDA Scale-to-Zero 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">이벤트 없을 때 0개 → 이벤트 감지 → 즉시 확장</text>

  <!-- State 1: No events, 0 pods -->
  <rect x="60" y="96" width="220" height="100" fill="#0f1923" rx="8" stroke="#555" stroke-width="1"/>
  <text x="170" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">이벤트 없음</text>
  <text x="170" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" font-weight="700" fill="#555" text-anchor="middle">0 Pods</text>
  <text x="170" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">비용 0 · 리소스 없음</text>
  <text x="170" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">cooldownPeriod 경과 후 축소</text>

  <!-- Arrow: event arrives -->
  <line x1="280" y1="146" x2="348" y2="146" stroke="#e8a020" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <text x="314" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8a020" text-anchor="middle">이벤트 감지</text>

  <!-- State 2: Scaling up -->
  <rect x="348" y="96" width="220" height="100" fill="#0f1923" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="458" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">스케일 업 중</text>
  <text x="458" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" font-weight="700" fill="#e8a020" text-anchor="middle">1 → N</text>
  <text x="458" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">pollingInterval 기준</text>
  <text x="458" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기본 30초마다 체크</text>

  <!-- Arrow: processing -->
  <line x1="568" y1="146" x2="636" y2="146" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="602" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">처리 중</text>

  <!-- State 3: Active -->
  <rect x="636" y="96" width="184" height="100" fill="#0f1923" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="728" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">활성 상태</text>
  <text x="728" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" font-weight="700" fill="#55c555" text-anchor="middle">N Pods</text>
  <text x="728" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메시지 처리</text>
  <text x="728" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이벤트 소진 시 축소</text>

  <!-- Key fields box -->
  <rect x="60" y="218" width="760" height="92" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">ScaledObject 핵심 파라미터</text>
  <text x="120" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">pollingInterval: 30</text>
  <text x="120" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이벤트 소스 폴링 주기(초)</text>
  <text x="340" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">cooldownPeriod: 300</text>
  <text x="340" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이벤트 소진 후 0으로 축소까지 대기(초)</text>
  <text x="600" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">minReplicaCount: 0</text>
  <text x="600" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">0으로 스케일 다운 허용</text>

  <!-- Code block -->
  <rect x="60" y="326" width="760" height="54" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">spec:</text>
  <text x="127" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff"> pollingInterval: 30  cooldownPeriod: 300  minReplicaCount: 0  maxReplicaCount: 50</text>
  <text x="80" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: worker}</text>
</svg>
