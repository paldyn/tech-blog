<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">repr() vs str() 호출 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">str()은 __str__ 없으면 __repr__로 폴백</text>

  <!-- repr() path -->
  <rect x="60" y="90" width="760" height="70" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <text x="90" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">repr(obj) 경로</text>
  <rect x="200" y="100" width="100" height="28" rx="4" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="250" y="118" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7777cc" text-anchor="middle" xml:space="preserve">repr(obj)</text>
  <line x1="308" y1="114" x2="348" y2="114" stroke="#7777cc" stroke-width="2"/>
  <polygon points="348,108 362,114 348,120" fill="#7777cc"/>
  <rect x="366" y="100" width="170" height="28" rx="4" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="451" y="118" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7777cc" text-anchor="middle" xml:space="preserve">obj.__repr__()</text>
  <line x1="544" y1="114" x2="580" y2="114" stroke="#7777cc" stroke-width="2"/>
  <polygon points="580,108 594,114 580,120" fill="#7777cc"/>
  <text x="600" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">결과 문자열</text>
  <text x="90" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용처: REPL 출력, repr(), !r f-string, logging, 디버깅</text>

  <!-- str() path -->
  <rect x="60" y="178" width="760" height="100" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="90" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">str(obj) / print(obj) 경로</text>
  <rect x="200" y="188" width="100" height="28" rx="4" fill="#0a2010" stroke="#55c555"/>
  <text x="250" y="206" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">str(obj)</text>
  <line x1="308" y1="202" x2="348" y2="202" stroke="#55c555" stroke-width="2"/>
  <polygon points="348,196 362,202 348,208" fill="#55c555"/>
  <rect x="366" y="188" width="170" height="28" rx="4" fill="#0a2010" stroke="#55c555"/>
  <text x="451" y="206" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">obj.__str__()</text>
  <line x1="544" y1="202" x2="580" y2="202" stroke="#55c555" stroke-width="2"/>
  <polygon points="580,196 594,202 580,208" fill="#55c555"/>
  <text x="600" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">결과 문자열</text>
  <!-- Fallback arrow -->
  <text x="451" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">__str__ 없으면</text>
  <line x1="451" y1="216" x2="451" y2="260" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="445,260 451,272 457,260" fill="#e05555"/>
  <text x="90" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용처: print(), str(), f-string {!s}, 사용자 화면 출력</text>

  <!-- __repr__ fallback box -->
  <rect x="370" y="272" width="150" height="28" rx="4" fill="#1a2332" stroke="#7777cc"/>
  <text x="445" y="290" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7777cc" text-anchor="middle" xml:space="preserve">obj.__repr__()</text>

  <!-- Comparison table -->
  <rect x="60" y="316" width="760" height="100" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="90" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">비교 요약</text>
  <text x="90" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">__repr__:</text>
  <text x="160" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">개발자용. eval(repr(obj)) == obj가 이상적. 반드시 구현</text>
  <text x="90" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">__str__:</text>
  <text x="155" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">사용자용. 친숙한 형태. 필요할 때만 구현 (없으면 repr 사용)</text>
  <text x="90" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">규칙: 클래스 작성 시 최소한 __repr__은 항상 구현하라</text>
  <text x="620" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">__repr__ = 디버깅 필수 도구</text>
</svg>
