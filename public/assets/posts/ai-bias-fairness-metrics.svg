<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">공정성 지표와 미탐지 예시</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">채용 AI 시나리오: 남성 합격률 70%, 여성 합격률 40%</text>

  <!-- Metric 1: Demographic Parity -->
  <rect x="60" y="96" width="360" height="140" rx="10" fill="#10180d" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">인구통계 동등성</text>
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(Demographic Parity)</text>
  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">P(합격|남성) = P(합격|여성)</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">현재: 70% vs 40% → 불공정</text>
  <text x="80" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">장점: 결과 평등 직접 보장</text>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">단점: 실제 능력 차이 무시 가능</text>

  <!-- Metric 2: Equalized Odds -->
  <rect x="460" y="96" width="360" height="140" rx="10" fill="#100d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="480" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">균등 기회</text>
  <text x="480" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(Equalized Odds)</text>
  <text x="480" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">TPR, FPR 모두 집단 간 동일</text>
  <text x="480" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실력 있는 자의 합격률 동일</text>
  <text x="480" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">장점: 능력 기반 공정성</text>
  <text x="480" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">단점: 기준 선택이 어려움</text>

  <!-- Metric 3: Calibration -->
  <rect x="60" y="258" width="360" height="140" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">보정 공정성</text>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(Calibration Fairness)</text>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">예측 점수 70점 = 70% 성공률</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">집단 무관하게 점수 의미 동일</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">장점: 예측 신뢰도 보장</text>
  <text x="80" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">단점: 결과 불평등 허용 가능</text>

  <!-- Metric 4: Individual Fairness -->
  <rect x="460" y="258" width="360" height="140" rx="10" fill="#0d1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="480" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">개인 공정성</text>
  <text x="480" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(Individual Fairness)</text>
  <text x="480" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">유사한 개인 → 유사한 결과</text>
  <text x="480" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">집단 통계보다 개인 특성 중심</text>
  <text x="480" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">장점: 집단 고정관념 탈피</text>
  <text x="480" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">단점: 유사도 정의가 어려움</text>

  <!-- Note: Impossibility -->
  <rect x="60" y="418" width="760" height="40" rx="8" fill="#1a1a0a" stroke="#e0a055" stroke-width="1"/>
  <text x="440" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">⚠ 불가능성 정리</text>
  <text x="440" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인구통계 동등성 + 균등 기회 + 보정 공정성은 동시에 달성 불가능 (Chouldechova 2017)</text>
</svg>
