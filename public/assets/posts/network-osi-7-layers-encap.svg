<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">캡슐화 (Encapsulation) 과정</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">각 계층이 헤더를 추가하며 데이터를 감싸는 과정</text>

  <!-- Application data -->
  <rect x="300" y="95" width="280" height="36" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">데이터 (Data)</text>
  <text x="75" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">7·6·5계층</text>

  <line x1="440" y1="131" x2="440" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Transport: TCP header + data -->
  <rect x="220" y="155" width="80" height="36" rx="5" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">TCP H</text>
  <rect x="300" y="155" width="280" height="36" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="179" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9988cc">데이터 (Data)</text>
  <text x="75" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">4계층 (세그먼트)</text>

  <line x1="440" y1="191" x2="440" y2="208" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Network: IP header + TCP + data -->
  <rect x="140" y="215" width="80" height="36" rx="5" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">IP H</text>
  <rect x="220" y="215" width="80" height="36" rx="5" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="260" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">TCP H</text>
  <rect x="300" y="215" width="280" height="36" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9988cc">데이터</text>
  <text x="75" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">3계층 (패킷)</text>

  <line x1="440" y1="251" x2="440" y2="268" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Data Link: ETH + IP + TCP + data + FCS -->
  <rect x="60" y="275" width="80" height="36" rx="5" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="100" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">ETH H</text>
  <rect x="140" y="275" width="80" height="36" rx="5" fill="#0f1a14" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">IP H</text>
  <rect x="220" y="275" width="80" height="36" rx="5" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="260" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">TCP H</text>
  <rect x="300" y="275" width="280" height="36" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9988cc">데이터</text>
  <rect x="580" y="275" width="60" height="36" rx="5" fill="#1a1500" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="610" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c44a">FCS</text>
  <text x="700" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">2계층 (프레임)</text>

  <line x1="440" y1="311" x2="440" y2="328" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Physical -->
  <rect x="180" y="335" width="520" height="36" rx="5" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="359" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">01001011 01110010 ... (비트 스트림)</text>
  <text x="75" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1계층 (비트)</text>

  <!-- bottom note -->
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">수신 측은 역순으로 헤더를 제거하며 원본 데이터 복원 (역캡슐화)</text>
</svg>
