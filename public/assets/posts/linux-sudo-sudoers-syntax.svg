<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">sudoers 파일 문법</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">/etc/sudoers — visudo 로만 편집</text>

  <!-- Syntax anatomy -->
  <!-- Box for syntax breakdown -->
  <rect x="60" y="88" width="760" height="60" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="115" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">alice</text>
  <text x="135" y="115" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">  ALL=(</text>
  <text x="235" y="115" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">ALL</text>
  <text x="265" y="115" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">:</text>
  <text x="275" y="115" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">ALL</text>
  <text x="305" y="115" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">)  </text>
  <text x="345" y="115" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#ce9178">NOPASSWD:</text>
  <text x="465" y="115" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">  ALL</text>

  <!-- Annotations -->
  <!-- alice -->
  <line x1="107" y1="148" x2="107" y2="162" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="107" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">사용자(또는 %그룹)</text>

  <!-- ALL hosts -->
  <line x1="195" y1="148" x2="195" y2="162" stroke="#888" stroke-width="1.5"/>
  <text x="195" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">호스트</text>

  <!-- run-as user -->
  <line x1="250" y1="148" x2="250" y2="162" stroke="#55c555" stroke-width="1.5"/>
  <text x="250" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">실행 사용자</text>

  <!-- run-as group -->
  <line x1="290" y1="148" x2="290" y2="162" stroke="#55c555" stroke-width="1.5"/>
  <text x="290" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">실행 그룹</text>

  <!-- NOPASSWD -->
  <line x1="415" y1="148" x2="415" y2="162" stroke="#ce9178" stroke-width="1.5"/>
  <text x="415" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" text-anchor="middle">태그</text>

  <!-- command ALL -->
  <line x1="495" y1="148" x2="495" y2="162" stroke="#888" stroke-width="1.5"/>
  <text x="495" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">명령어</text>

  <!-- Common patterns -->
  <rect x="60" y="200" width="760" height="260" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">자주 쓰는 패턴</text>

  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 패스워드 없이 전체 명령 허용</text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">alice</text><text x="126" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> ALL=(ALL:ALL) NOPASSWD: ALL</text>

  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 그룹 단위 허용 (%접두사)</text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">%devops</text><text x="156" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> ALL=(ALL) ALL</text>

  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 특정 명령만 허용</text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">bob</text><text x="106" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> ALL=(root) /usr/bin/systemctl restart nginx</text>

  <text x="76" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 분리 파일로 관리 (/etc/sudoers.d/)</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ visudo -f /etc/sudoers.d/devops</text>

  <text x="76" y="448" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"># 현재 사용자의 sudo 권한 확인</text>
  <text x="76" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">$ sudo -l</text>

  <!-- warning -->
  <text x="440" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">⚠ sudoers는 반드시 visudo로 편집 — 문법 오류 시 sudo 전체가 잠김</text>
</svg>
