<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dangling Objects 복구 vs 정리</text>

  <!-- Recover path -->
  <rect x="60" y="68" width="360" height="130" rx="8" fill="#0e1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">복구가 필요한 경우</text>
  <text x="80" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve"># 브랜치로 복구</text>
  <text x="80" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">git checkout -b recovered abc1234</text>
  <text x="80" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve"># blob 파일로 추출</text>
  <text x="80" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">git cat-file -p def5678 &gt; file.txt</text>

  <!-- Clean path -->
  <rect x="460" y="68" width="360" height="130" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">정리가 필요한 경우</text>
  <text x="480" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve"># 모든 dangling 즉시 삭제</text>
  <text x="480" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">git reflog expire --expire=now --all</text>
  <text x="480" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">git gc --prune=now</text>
  <text x="480" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 주의: 복구 불가</text>

  <!-- lost-found approach -->
  <rect x="60" y="218" width="760" height="116" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># lost-found 활용: dangling 객체를 파일로 저장</text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fsck --lost-found</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># .git/lost-found/commit/ : dangling commits</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># .git/lost-found/other/  : blobs, trees</text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># (파일명이 SHA, 파일 내용이 객체 내용)</text>
</svg>
