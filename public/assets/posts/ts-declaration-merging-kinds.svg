<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">무엇과 무엇이 병합되는가</text>

  <!-- Row 1 -->
  <rect x="60" y="76" width="400" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="103" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">interface + interface</text>
  <rect x="500" y="76" width="320" height="44" fill="#111827" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="516" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" xml:space="preserve">✓ 멤버가 합쳐진다</text>

  <!-- Row 2 -->
  <rect x="60" y="132" width="400" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">namespace + namespace</text>
  <rect x="500" y="132" width="320" height="44" fill="#111827" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="516" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" xml:space="preserve">✓ 내보내기가 합쳐진다</text>

  <!-- Row 3 -->
  <rect x="60" y="188" width="400" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">namespace + function</text>
  <rect x="500" y="188" width="320" height="44" fill="#111827" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="516" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" xml:space="preserve">✓ 프로퍼티를 가진 함수</text>

  <!-- Row 4 -->
  <rect x="60" y="244" width="400" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">namespace + class / enum</text>
  <rect x="500" y="244" width="320" height="44" fill="#111827" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="516" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" xml:space="preserve">✓ 정적 멤버 추가</text>

  <!-- Row 5 -->
  <rect x="60" y="300" width="400" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">type + type</text>
  <rect x="500" y="300" width="320" height="44" fill="#111827" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="516" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" xml:space="preserve">✗ 중복 식별자 에러</text>

  <!-- Row 6 -->
  <rect x="60" y="356" width="400" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">class + class</text>
  <rect x="500" y="356" width="320" height="44" fill="#111827" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="516" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" xml:space="preserve">✗ 병합 불가</text>

  <!-- Side note -->
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">interface가 열려(open) 있고 type 별칭이 닫혀(closed) 있다는 차이가 병합 가능성을 가른다</text>
</svg>
