<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Stream vs for 루프 — 비교</text>

  <!-- Header row -->
  <rect x="60" y="62" width="180" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">비교 항목</text>

  <rect x="254" y="62" width="270" height="40" rx="6" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="389" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Stream API</text>

  <rect x="538" y="62" width="282" height="40" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="679" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">for / while 루프</text>

  <!-- Row 1: 가독성 -->
  <rect x="60" y="114" width="180" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">가독성</text>
  <text x="150" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(선언적 vs 명령적)</text>

  <rect x="254" y="114" width="270" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="389" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">선언적: 무엇을 할지 기술</text>
  <text x="389" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">filter/map/collect 체이닝</text>

  <rect x="538" y="114" width="282" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="679" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">명령적: 어떻게 할지 기술</text>
  <text x="679" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인덱스, 조건, 리스트 조작 직접 작성</text>

  <!-- Row 2: 성능 -->
  <rect x="60" y="172" width="180" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">성능</text>
  <text x="150" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(단순 순회)</text>

  <rect x="254" y="172" width="270" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="389" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">오버헤드 소량 존재</text>
  <text x="389" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">람다 캡처, 파이프라인 생성 비용</text>

  <rect x="538" y="172" width="282" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="679" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">단순 루프가 보통 더 빠름</text>
  <text x="679" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JIT 최적화가 더 적극적으로 작동</text>

  <!-- Row 3: 병렬화 -->
  <rect x="60" y="230" width="180" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">병렬화</text>
  <text x="150" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle"> </text>

  <rect x="254" y="230" width="270" height="46" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="389" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">.parallel() 한 줄로 전환</text>
  <text x="389" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ForkJoin 자동 관리</text>

  <rect x="538" y="230" width="282" height="46" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="679" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">직접 스레드/ExecutorService 필요</text>
  <text x="679" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">코드 복잡도 급증</text>

  <!-- Row 4: 디버깅 -->
  <rect x="60" y="288" width="180" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">디버깅</text>
  <text x="150" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle"> </text>

  <rect x="254" y="288" width="270" height="46" rx="6" fill="#1a1a08" stroke="#e8c542" stroke-width="1"/>
  <text x="389" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c542" text-anchor="middle">스택 트레이스 길고 복잡</text>
  <text x="389" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.peek()으로 중간값 출력 가능</text>

  <rect x="538" y="288" width="282" height="46" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="679" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">중단점 설정·단계별 추적 용이</text>
  <text x="679" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IDE 디버거 완벽 지원</text>

  <!-- Row 5: break/continue -->
  <rect x="60" y="346" width="180" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">조기 종료</text>
  <text x="150" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(break/continue)</text>

  <rect x="254" y="346" width="270" height="46" rx="6" fill="#1a1a08" stroke="#e8c542" stroke-width="1"/>
  <text x="389" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c542" text-anchor="middle">직접 break 없음</text>
  <text x="389" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">takeWhile / findFirst / limit 활용</text>

  <rect x="538" y="346" width="282" height="46" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="679" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">break / continue 직접 사용</text>
  <text x="679" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">조기 탈출 로직이 자연스러움</text>

  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Stream이 항상 우월한 게 아니다 — 컨텍스트에 맞게 선택하는 것이 중요</text>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">복잡한 변환/집계는 Stream, 인덱스 접근/조기 탈출이 잦으면 루프가 적합</text>
</svg>
