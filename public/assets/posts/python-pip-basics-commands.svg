<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">자주 쓰는 pip 명령</text>

  <rect x="60" y="86" width="760" height="262" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 설치와 제거</text>
  <text xml:space="preserve" x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pip <tspan fill="#7ec8e3" font-weight="600">install</tspan> requests</text>
  <text xml:space="preserve" x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pip <tspan fill="#7ec8e3" font-weight="600">install</tspan> "requests==2.31.0"</text>
  <text xml:space="preserve" x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pip <tspan fill="#7ec8e3" font-weight="600">uninstall</tspan> requests</text>

  <text xml:space="preserve" x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 목록 고정과 재현</text>
  <text xml:space="preserve" x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pip freeze &gt; requirements.txt</text>
  <text xml:space="preserve" x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pip <tspan fill="#7ec8e3" font-weight="600">install</tspan> -r requirements.txt</text>

  <text xml:space="preserve" x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 조회</text>
  <text xml:space="preserve" x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pip <tspan fill="#7ec8e3" font-weight="600">list</tspan>   pip <tspan fill="#7ec8e3" font-weight="600">show</tspan> requests</text>
</svg>
