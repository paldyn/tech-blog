<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">앵커 박스 · IoU · NMS</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">객체 탐지 핵심 개념</text>

  <!-- Anchor Boxes -->
  <rect x="36" y="95" width="250" height="270" fill="#0d1520" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="161" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">앵커 박스</text>

  <g transform="translate(60, 130)">
    <!-- Base anchor (square) -->
    <rect x="50" y="20" width="80" height="80" fill="none" stroke="#7ec8e3" stroke-width="1.5"/>
    <text x="90" y="12" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">1:1</text>

    <!-- Tall anchor -->
    <rect x="66" y="5" width="48" height="110" fill="none" stroke="#ce9178" stroke-width="1.5"/>
    <text x="160" y="60" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">1:2</text>

    <!-- Wide anchor -->
    <rect x="24" y="40" width="132" height="60" fill="none" stroke="#7777cc" stroke-width="1.5"/>
    <text x="160" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">2:1</text>

    <text x="90" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">각 위치마다 미리 정의된</text>
    <text x="90" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">다양한 크기/비율 박스</text>
    <text x="90" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">FPN: 5 scales × 3 ratios</text>
    <text x="90" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">= 15 anchors/위치</text>
  </g>

  <!-- IoU -->
  <rect x="315" y="95" width="250" height="270" fill="#0d1117" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">IoU (교차 면적 비율)</text>

  <g transform="translate(330, 130)">
    <!-- Ground truth box -->
    <rect x="20" y="10" width="110" height="80" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
    <text x="75" y="28" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">Ground Truth</text>

    <!-- Predicted box (offset) -->
    <rect x="55" y="40" width="110" height="80" fill="#1a2535" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="145" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">Predicted</text>

    <!-- Intersection highlight -->
    <rect x="55" y="40" width="75" height="50" fill="#7777cc" opacity="0.3"/>
    <text x="92" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">교집합</text>

    <text x="105" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">IoU = |A∩B| / |A∪B|</text>
    <text x="105" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">0~1 (1 = 완벽 일치)</text>
    <text x="105" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">≥0.5: 탐지 성공 (mAP50)</text>
    <text x="105" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">≥0.75: 높은 정밀도 기준</text>
    <text x="105" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">학습 Loss에도 사용 (GIoU)</text>
  </g>

  <!-- NMS -->
  <rect x="594" y="95" width="250" height="270" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="719" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">NMS (비최대 억제)</text>

  <g transform="translate(608, 130)">
    <!-- Before NMS: multiple overlapping boxes -->
    <text x="105" y="18" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">NMS 전: 중복 박스</text>
    <rect x="20" y="28" width="90" height="60" fill="none" stroke="#e05555" stroke-width="1.5"/>
    <text x="65" y="52" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">conf: 0.9</text>
    <rect x="28" y="34" width="90" height="60" fill="none" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
    <text x="120" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">0.85</text>
    <rect x="35" y="22" width="90" height="60" fill="none" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <text x="125" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">0.78</text>

    <!-- Arrow -->
    <polygon points="105,102 115,96 115,108" fill="#55c555" stroke="#1a5a1a" stroke-width="1"/>
    <line x1="65" y1="102" x2="115" y2="102" stroke="#55c555" stroke-width="2"/>
    <text x="90" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">IoU>0.5 제거</text>

    <!-- After NMS: one box -->
    <text x="105" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">NMS 후: 최선 박스</text>
    <rect x="20" y="148" width="90" height="60" fill="#1a3d2a" stroke="#55c555" stroke-width="2"/>
    <text x="65" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">conf: 0.9 ✓</text>

    <text x="105" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">1. 신뢰도 내림차순 정렬</text>
    <text x="105" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2. 최고 박스 선택</text>
    <text x="105" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">3. IoU>임계값 박스 제거</text>
    <text x="105" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">4. 반복</text>
  </g>
</svg>
