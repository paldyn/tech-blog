  <text x="175" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">❌ 인식 안 함</text>
  <line x1="84" y1="350" x2="266" y2="350" stroke="#3a4a6e" stroke-width="1"/>
