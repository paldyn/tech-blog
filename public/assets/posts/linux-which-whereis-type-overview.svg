<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">which · whereis · type 비교</text>
  <text x="440" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">명령어 위치를 찾는 세 가지 도구</text>

  <!-- which box -->
  <rect x="60" y="110" width="230" height="340" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1"/>
