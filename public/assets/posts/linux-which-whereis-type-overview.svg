  <text x="175" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">검색 범위</text>
  <text x="175" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">$PATH 디렉터리만</text>
  <line x1="84" y1="218" x2="266" y2="218" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">반환값</text>
  <text x="175" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">실행 파일 경로</text>
  <line x1="84" y1="284" x2="266" y2="284" stroke="#3a4a6e" stroke-width="1"/>
