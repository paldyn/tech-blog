  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">표준 시스템 경로</text>
  <line x1="349" y1="218" x2="531" y2="218" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">반환값</text>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">바이너리+소스+매뉴얼</text>
  <line x1="349" y1="284" x2="531" y2="284" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">쉘 빌트인 인식</text>
  <text x="440" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">❌ 인식 안 함</text>
  <line x1="349" y1="350" x2="531" y2="350" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">활용 상황</text>
  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">패키지 설치 위치</text>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">문서까지 확인 시</text>

  <!-- type box -->
  <rect x="590" y="110" width="230" height="340" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="590" y="110" width="230" height="46" fill="#55c555" rx="10"/>
