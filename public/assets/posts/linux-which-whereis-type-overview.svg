  <text x="705" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#0a0a0a" text-anchor="middle">type</text>
  <text x="705" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">검색 범위</text>
  <text x="705" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">쉘이 아는 모든 것</text>
  <line x1="614" y1="218" x2="796" y2="218" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">반환값</text>
  <text x="705" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">유형 + 경로/정의</text>
  <line x1="614" y1="284" x2="796" y2="284" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">쉘 빌트인 인식</text>
  <text x="705" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">✅ 인식함</text>
  <line x1="614" y1="350" x2="796" y2="350" stroke="#3a4a6e" stroke-width="1"/>
  <text x="705" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">활용 상황</text>
  <text x="705" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">명령어 종류 파악,</text>
  <text x="705" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">alias 확인 시</text>

  <!-- bottom note -->
  <text x="440" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666" text-anchor="middle">type은 쉘 빌트인이므로 /usr/bin/type 경로가 없음 — which type 검색 불가</text>
</svg>
