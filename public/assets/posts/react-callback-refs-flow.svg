<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr-e" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-f" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Callback Ref — 연결/해제 시점 감지</text>

  <!-- Object ref (left) -->
  <text x="220" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">일반 Object Ref (useRef)</text>

  <rect x="60" y="104" width="320" height="54" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="220" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">&lt;div ref={myRef} /&gt;</text>
  <text x="220" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">React가 .current를 자동 업데이트</text>

  <rect x="60" y="186" width="320" height="54" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="220" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">DOM 연결 시점을 알 수 없음</text>
  <text x="220" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">연결 후 Effect로 추가 로직 필요</text>

  <line x1="220" y1="160" x2="220" y2="184" stroke="#333" stroke-width="1.5" marker-end="url(#arr-f)"/>

  <!-- Callback ref (right) -->
  <text x="660" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Callback Ref</text>

  <rect x="500" y="104" width="320" height="54" rx="8" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">&lt;div ref={callbackFn} /&gt;</text>
  <text x="660" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">연결 시: callbackFn(domNode)</text>

  <!-- Arrow down -->
  <line x1="660" y1="160" x2="660" y2="184" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-e)"/>

  <rect x="500" y="186" width="320" height="54" rx="8" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">DOM 연결/해제 시점에 콜백 실행</text>
  <text x="660" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">연결: node / 해제: null 인수로 호출</text>

  <!-- Summary boxes -->
  <rect x="60" y="280" width="320" height="88" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="220" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Object Ref 적합한 경우</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• DOM 참조만 필요할 때</text>
  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 연결 시점 감지 불필요</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 대부분의 일반적인 경우</text>

  <rect x="500" y="280" width="320" height="88" rx="6" fill="#0a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="660" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Callback Ref 적합한 경우</text>
  <text x="520" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• DOM 연결 즉시 포커스/측정 필요</text>
  <text x="520" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 조건부 렌더 요소 추적</text>
  <text x="520" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• ref 변경 시 커스텀 로직 실행</text>
</svg>
