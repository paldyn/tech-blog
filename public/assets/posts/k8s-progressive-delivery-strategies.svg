<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect width="880" height="470" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">배포 전략 — 위험을 줄이는 세 가지 방식</text>

  <!-- Rolling -->
  <rect x="50" y="90" width="240" height="330" rx="10" fill="#13151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">롤링 업데이트</text>
  <text x="170" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Pod를 점진적으로 교체</text>

  <rect x="74" y="170" width="86" height="40" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="117" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">v1 ✓</text>
  <rect x="180" y="170" width="86" height="40" rx="6" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="223" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">v2 ↑</text>

  <text x="74" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ 추가 비용 거의 없음</text>
  <text x="74" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ 기본 제공(Deployment)</text>
  <text x="74" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">− 두 버전이 동시 노출</text>
  <text x="74" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">− 자동 검증 게이트 없음</text>
  <text x="74" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">− 롤백이 또 한 번의 롤링</text>

  <!-- Blue-Green -->
  <rect x="320" y="90" width="240" height="330" rx="10" fill="#13151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">블루-그린</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전체를 띄워두고 전환</text>

  <rect x="344" y="170" width="86" height="40" rx="6" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="387" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">Blue v1</text>
  <rect x="450" y="170" width="86" height="40" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="493" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Green v2</text>

  <text x="344" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ 즉시 전환 · 즉시 롤백</text>
  <text x="344" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ 사전 스모크 테스트</text>
  <text x="344" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">− 리소스 2배 필요</text>
  <text x="344" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">− 전환은 여전히 한 번에</text>
  <text x="344" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전환 = 100% 한 방</text>

  <!-- Canary -->
  <rect x="590" y="90" width="240" height="330" rx="10" fill="#13151c" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">카나리</text>
  <text x="710" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">소수 트래픽으로 검증</text>

  <rect x="614" y="170" width="140" height="40" rx="6" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="684" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">v1  90%</text>
  <rect x="758" y="170" width="48" height="40" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="782" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">10%</text>

  <text x="614" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ 영향 범위 최소화</text>
  <text x="614" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ 메트릭 기반 자동 판단</text>
  <text x="614" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">+ 단계적 비중 확대</text>
  <text x="614" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">− 트래픽 분배 도구 필요</text>
  <text x="614" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">− 구성 복잡도 ↑</text>
</svg>
