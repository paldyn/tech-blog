<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="sb_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="sb_arr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">변환과 타입 검사는 별개다</text>
  <text x="60" y="76" font-size="14" fill="#888">SWC·esbuild는 타입을 떼어내기만 할 뿐, 검사하지 않는다</text>

  <!-- tsc row -->
  <rect x="60" y="110" width="150" height="64" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="135" y="140" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">tsc</text>
  <text x="135" y="160" font-size="12" fill="#888" text-anchor="middle">변환 + 검사</text>

  <line x1="210" y1="142" x2="320" y2="142" stroke="#7777cc" stroke-width="2" marker-end="url(#sb_arr)"/>
  <rect x="330" y="110" width="200" height="64" fill="#101418" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="430" y="135" font-size="13" fill="#7ec8e3" text-anchor="middle">타입 에러 잡음</text>
  <text x="430" y="156" font-size="13" fill="#888" text-anchor="middle">느림 (전체 그래프 분석)</text>

  <line x1="530" y1="142" x2="640" y2="142" stroke="#7777cc" stroke-width="2" marker-end="url(#sb_arr)"/>
  <rect x="650" y="110" width="170" height="64" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="735" y="135" font-size="13" fill="#e8e8e8" text-anchor="middle">.js 출력</text>
  <text x="735" y="156" font-size="13" fill="#888" text-anchor="middle">.d.ts 생성</text>

  <!-- swc/esbuild row -->
  <rect x="60" y="240" width="150" height="64" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="135" y="270" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">SWC / esbuild</text>
  <text x="135" y="290" font-size="12" fill="#888" text-anchor="middle">변환만</text>

  <line x1="210" y1="272" x2="320" y2="272" stroke="#55c555" stroke-width="2" marker-end="url(#sb_arr2)"/>
  <rect x="330" y="240" width="200" height="64" fill="#101418" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="430" y="265" font-size="13" fill="#e05555" text-anchor="middle">타입 검사 안 함</text>
  <text x="430" y="286" font-size="13" fill="#55c555" text-anchor="middle">매우 빠름 (파일별)</text>

  <line x1="530" y1="272" x2="640" y2="272" stroke="#55c555" stroke-width="2" marker-end="url(#sb_arr2)"/>
  <rect x="650" y="240" width="170" height="64" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="735" y="277" font-size="13" fill="#e8e8e8" text-anchor="middle">.js 출력 (타입 제거)</text>

  <text x="60" y="346" font-size="13" fill="#9aa4b8">→ 빠른 빌드는 SWC/esbuild에 맡기고, 타입 검사는 tsc --noEmit으로 따로 돌린다</text>
</svg>
