<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">MVCC 읽기 시나리오 — RC vs RR</text>

  <!-- Timeline -->
  <line x1="80" y1="110" x2="820" y2="110" stroke="#2a3a4a" stroke-width="2"/>

  <!-- TRX A events -->
  <circle cx="120" cy="110" r="7" fill="#7ec8e3"/>
  <text x="120" y="92" text-anchor="middle" font-size="12" fill="#7ec8e3">TRX-A</text>
  <text x="120" y="133" text-anchor="middle" font-size="11" fill="#888">BEGIN</text>

  <circle cx="460" cy="110" r="7" fill="#7ec8e3"/>
  <text x="460" y="133" text-anchor="middle" font-size="11" fill="#7ec8e3">SELECT</text>

  <circle cx="760" cy="110" r="7" fill="#7ec8e3"/>
  <text x="760" y="133" text-anchor="middle" font-size="11" fill="#7ec8e3">COMMIT</text>

  <!-- TRX B events -->
  <circle cx="260" cy="110" r="7" fill="#55c555"/>
  <text x="260" y="92" text-anchor="middle" font-size="12" fill="#55c555">TRX-B</text>
  <text x="260" y="133" text-anchor="middle" font-size="11" fill="#888">BEGIN</text>

  <circle cx="360" cy="110" r="7" fill="#55c555"/>
  <text x="360" y="133" text-anchor="middle" font-size="11" fill="#55c555">UPDATE</text>
  <text x="360" y="148" text-anchor="middle" font-size="10" fill="#888">balance=800</text>

  <circle cx="420" cy="110" r="7" fill="#55c555"/>
  <text x="420" y="133" text-anchor="middle" font-size="11" fill="#55c555">COMMIT</text>

  <!-- Results -->
  <rect x="60" y="176" width="360" height="108" rx="8" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="240" y="200" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">READ COMMITTED</text>
  <text x="240" y="224" text-anchor="middle" font-size="13" fill="#888">TRX-A의 SELECT 결과</text>
  <text x="240" y="248" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">balance = 800</text>
  <text x="240" y="272" text-anchor="middle" font-size="12" fill="#888">SELECT마다 새 ReadView 생성</text>
  <text x="240" y="288" text-anchor="middle" font-size="12" fill="#888">→ B가 커밋 후이면 800을 읽음</text>

  <rect x="460" y="176" width="360" height="108" rx="8" fill="#1e3a2a" stroke="#2a4a2a"/>
  <text x="640" y="200" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">REPEATABLE READ (기본값)</text>
  <text x="640" y="224" text-anchor="middle" font-size="13" fill="#888">TRX-A의 SELECT 결과</text>
  <text x="640" y="248" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">balance = 1000</text>
  <text x="640" y="272" text-anchor="middle" font-size="12" fill="#888">BEGIN 시점에 ReadView 고정</text>
  <text x="640" y="288" text-anchor="middle" font-size="12" fill="#888">→ B 커밋 후에도 이전 버전 반환</text>

  <!-- Bottom note -->
  <rect x="60" y="304" width="760" height="78" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="440" y="328" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Consistent Non-Locking Read</text>
  <text x="440" y="352" text-anchor="middle" font-size="13" fill="#888">두 격리 수준 모두 Undo Log 기반 스냅샷 읽기를 사용합니다.</text>
  <text x="440" y="372" text-anchor="middle" font-size="13" fill="#888">SELECT는 어떠한 Lock도 걸지 않고 과거 버전을 읽습니다.</text>
</svg>
