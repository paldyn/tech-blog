<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python 2 vs 3: 코드 비교</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">같은 목적, 다른 문법</text>

  <!-- Left header -->
  <rect x="60" y="84" width="360" height="32" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">Python 2</text>

  <!-- Right header -->
  <rect x="460" y="84" width="360" height="32" rx="6" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">Python 3</text>

  <!-- Left code block -->
  <rect x="60" y="126" width="360" height="202" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 출력</text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">print </tspan><tspan fill="#ce9178">"Hello, World!"</tspan></text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 나누기</text>
  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">print </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">/</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#9aa4b8">   # → 2</tspan></text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 유니코드 문자열</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">msg = </tspan><tspan fill="#ce9178">u"안녕하세요"</tspan></text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 사용자 입력</text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">name = </tspan><tspan fill="#7ec8e3">raw_input</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"이름: "</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># range는 list 반환</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">print </tspan><tspan fill="#7ec8e3">range</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- Right code block -->
  <rect x="460" y="126" width="360" height="202" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 출력</text>
  <text x="476" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"Hello, World!"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 나누기</text>
  <text x="476" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">/</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8">  # → 2.5</tspan></text>
  <text x="476" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본이 유니코드</text>
  <text x="476" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">msg = </tspan><tspan fill="#ce9178">"안녕하세요"</tspan></text>
  <text x="476" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 사용자 입력</text>
  <text x="476" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">name = </tspan><tspan fill="#7ec8e3">input</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"이름: "</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># range는 iterator</text>
  <text x="476" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3">list</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3">range</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">)))</tspan></text>

  <!-- Summary bar -->
  <rect x="60" y="348" width="760" height="92" rx="8" fill="#0f1820" stroke="#333"/>
  <text x="440" y="374" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">마이그레이션 핵심 도구</text>
  <text x="220" y="400" text-anchor="middle" font-size="12" fill="#7ec8e3">2to3</text>
  <text x="220" y="418" text-anchor="middle" font-size="11" fill="#666">자동 변환 스크립트</text>
  <text x="440" y="400" text-anchor="middle" font-size="12" fill="#55c555">python-future</text>
  <text x="440" y="418" text-anchor="middle" font-size="11" fill="#666">2/3 호환 코드 작성</text>
  <text x="660" y="400" text-anchor="middle" font-size="12" fill="#7777cc">pyupgrade</text>
  <text x="660" y="418" text-anchor="middle" font-size="11" fill="#666">최신 문법으로 자동 업</text>
</svg>
