<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">VS Code + TypeScript: 최적의 조합</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">별도 확장 없이 TypeScript 지원 내장. 즉시 사용 가능</text>
  <!-- VS Code mock -->
  <rect x="60" y="90" width="760" height="280" rx="8" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>
  <!-- Activity bar -->
  <rect x="60" y="90" width="44" height="280" rx="8" fill="#252526" stroke="none"/>
  <rect x="68" y="102" width="28" height="28" rx="4" fill="#0e639c" stroke="none"/>
  <text x="82" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#fff">파일</text>
  <rect x="68" y="140" width="28" height="28" rx="4" fill="none" stroke="none"/>
  <text x="82" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">검색</text>
  <rect x="68" y="178" width="28" height="28" rx="4" fill="none" stroke="none"/>
  <text x="82" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">디버그</text>
  <!-- Sidebar -->
  <rect x="104" y="90" width="160" height="280" rx="0" fill="#252526" stroke="#333" stroke-width="1"/>
  <text x="184" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#bbb">탐색기</text>
  <text x="114" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">▶ src/</text>
  <text x="124" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#fff">  index.ts</text>
  <text x="124" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">  utils.ts</text>
  <text x="124" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">  types.ts</text>
  <text x="114" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">▶ node_modules/</text>
  <text x="114" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">tsconfig.json</text>
  <!-- Editor area -->
  <rect x="264" y="90" width="556" height="280" rx="0" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <!-- Tab -->
  <rect x="264" y="90" width="120" height="26" rx="0" fill="#1e1e1e" stroke="#0e639c" stroke-width="1" stroke-dasharray="0"/>
  <text x="324" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#fff">index.ts</text>
  <!-- Code -->
  <text x="280" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">interface</text>
  <text x="366" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> Product {</text>
  <text x="280" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  id</text>
  <text x="310" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="325" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">number</text>
  <text x="280" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  name</text>
  <text x="324" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="339" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">string</text>
  <text x="280" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="280" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="331" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> p: Product = {</text>
  <text x="280" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  id: </text>
  <text x="324" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="280" y="265" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  name: </text>
  <text x="339" y="265" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"Widget"</text>
  <text x="280" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">};</text>
  <!-- Hover tooltip mock -->
  <rect x="380" y="218" width="220" height="44" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1"/>
  <text x="390" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" xml:space="preserve">const p: Product</text>
  <text x="390" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Product 인터페이스 타입</text>
  <!-- Error panel -->
  <rect x="60" y="370" width="760" height="50" rx="0" fill="#1a0a0a" stroke="#333" stroke-width="1"/>
  <text x="80" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">문제 0개</text>
  <text x="200" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">|</text>
  <text x="220" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TypeScript Language Server 동작 중</text>
  <text x="80" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">실시간 타입 검사 | 자동완성 | 정의로 이동 (F12) | 참조 찾기 (Shift+F12)</text>
  <!-- Feature badges -->
  <rect x="60" y="434" width="760" height="44" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">자동완성</text>
  <text x="240" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">타입 힌트</text>
  <text x="380" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">에러 하이라이트</text>
  <text x="540" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">빠른 수정(Quick Fix)</text>
  <text x="700" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">리팩터링</text>
  <text x="100" y="471" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">Ctrl+Space</text>
  <text x="240" y="471" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">Hover</text>
  <text x="380" y="471" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">빨간 물결선</text>
  <text x="540" y="471" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">Ctrl+.</text>
  <text x="700" y="471" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">F12 / F2</text>
</svg>
