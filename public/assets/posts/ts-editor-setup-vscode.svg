<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">VS Code + TypeScript 핵심 설정</text>

  <!-- Settings sections -->
  <!-- Left: Extensions -->
  <rect x="60" y="66" width="360" height="200" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">필수 확장 프로그램</text>

  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">ESLint</text>
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 린팅 + @typescript-eslint</text>

  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Prettier</text>
  <text x="80" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 포매터 (저장 시 자동)</text>

  <text x="80" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Error Lens</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인라인 오류 표시</text>

  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">TypeScript Importer</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자동 import 추가</text>

  <!-- Right: settings.json -->
  <rect x="450" y="66" width="370" height="200" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="470" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">.vscode/settings.json</text>
  <rect x="466" y="96" width="338" height="160" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">{</text>
  <text x="482" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">  "editor.formatOnSave"</text>
  <text x="482" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">    : </text>
  <text x="502" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600">true</text>
  <text x="530" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">,</text>
  <text x="482" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">  "editor.defaultFormatter"</text>
  <text x="482" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">    : </text>
  <text x="502" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">"esbenp.prettier-vscode"</text>
  <text x="482" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">  "typescript.updateImportsOnFileMove"</text>
  <text x="482" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">    : </text>
  <text x="502" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">"always"</text>
  <text x="482" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">}</text>

  <!-- Bottom: Key shortcuts & features -->
  <rect x="60" y="286" width="760" height="148" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">알아야 할 VS Code 단축키 &amp; 기능</text>

  <!-- Shortcut grid -->
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">F12</text>
  <text x="120" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정의로 이동 (Go to Definition)</text>

  <text x="280" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Shift+F12</text>
  <text x="360" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">참조 찾기 (Find References)</text>

  <text x="520" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">F2</text>
  <text x="546" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">심볼 이름 변경 (Rename Symbol)</text>

  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Ctrl+.</text>
  <text x="130" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빠른 수정 (Quick Fix)</text>

  <text x="280" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Ctrl+Space</text>
  <text x="378" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자동완성 트리거</text>

  <text x="520" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Ctrl+Shift+I</text>
  <text x="628" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Import 최적화</text>

  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">호버</text>
  <text x="122" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타입 추론 결과, JSDoc, 오류 메시지 표시</text>

  <text x="380" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">. 입력</text>
  <text x="424" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">해당 타입의 모든 멤버 자동완성 제안</text>

  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">TypeScript 서버</text>
  <text x="192" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">VS Code 내장 (tsserver). Ctrl+Shift+P → "TypeScript: Restart TS Server"</text>
</svg>
