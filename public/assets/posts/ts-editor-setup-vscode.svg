<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">VS Code TypeScript 지원</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">설치 없이 완전한 TypeScript 개발 환경 제공</text>
  <!-- 6 feature boxes in 3x2 grid -->
  <!-- Row 1 -->
  <rect x="60" y="100" width="240" height="100" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">자동완성</text>
  <text x="180" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 기반 멤버 자동완성</text>
  <text x="180" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Ctrl+Space 트리거</text>
  <text x="180" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">IntelliSense 자동 활성화</text>
  <rect x="320" y="100" width="240" height="100" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">타입 오류 표시</text>
  <text x="440" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">저장 없이 실시간 오류 표시</text>
  <text x="440" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오류 hover시 상세 설명</text>
  <text x="440" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">빨간 밑줄 즉시 표시</text>
  <rect x="580" y="100" width="240" height="100" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="700" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">타입 정보 표시</text>
  <text x="700" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">변수 hover시 타입 확인</text>
  <text x="700" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수 시그니처 표시</text>
  <text x="700" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Ctrl+K Ctrl+I 단축키</text>
  <!-- Row 2 -->
  <rect x="60" y="220" width="240" height="100" rx="8" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Go to Definition</text>
  <text x="180" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">F12로 정의 위치 이동</text>
  <text x="180" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">심볼 탐색 강화</text>
  <text x="180" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Alt+F12 Peek Definition</text>
  <rect x="320" y="220" width="240" height="100" rx="8" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">리팩터링</text>
  <text x="440" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">F2로 심볼 일괄 변경</text>
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Extract Function/Variable</text>
  <text x="440" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">코드 액션 Ctrl+.</text>
  <rect x="580" y="220" width="240" height="100" rx="8" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">자동 Import</text>
  <text x="700" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용 시 자동 import 추가</text>
  <text x="700" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">미사용 import 정리</text>
  <text x="700" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Organize Imports 기능</text>
  <!-- Extension note -->
  <rect x="60" y="340" width="760" height="72" rx="6" fill="#111" stroke="#2a2a4e" stroke-width="1"/>
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">권장 확장 프로그램</text>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ESLint · Prettier · Error Lens · TypeScript Importer · Pretty TypeScript Errors</text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">VS Code는 TypeScript로 개발되어 최고 수준의 TS 지원을 제공합니다</text>
</svg>
