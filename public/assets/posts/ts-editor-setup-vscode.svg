<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">VS Code TypeScript 개발 환경</text>

  <!-- VS Code icon area -->
  <rect x="60" y="70" width="200" height="200" rx="8" fill="#0a1a2a" stroke="#3178c6" stroke-width="1.5"/>
  <text x="160" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">VS Code</text>
  <text x="160" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TypeScript 기본 내장</text>
  <text x="160" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">추가 플러그인 없이</text>
  <text x="160" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">타입 검사 · 자동완성</text>
  <text x="160" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TS로 작성된 에디터</text>
  <text x="160" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자체 TypeScript 서버</text>
  <text x="160" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">내장 (tsserver)</text>
  <text x="160" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">code.visualstudio.com</text>

  <!-- Extensions -->
  <rect x="280" y="70" width="560" height="80" rx="8" fill="#0f2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="560" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">필수 확장 (Extensions)</text>
  <text x="300" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">ESLint — eslint.org/vscode-eslint</text>
  <text x="300" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">린팅 오류 인라인 표시 · 자동 수정</text>

  <text x="560" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Prettier — esbenp.prettier-vscode</text>
  <text x="560" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">저장 시 자동 코드 포매팅</text>

  <!-- Settings -->
  <rect x="280" y="170" width="560" height="100" rx="8" fill="#1a1a0a" stroke="#e8c840" stroke-width="1.5"/>
  <text x="560" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8c840" text-anchor="middle">권장 settings.json</text>
  <text x="300" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">"editor.formatOnSave": <tspan fill="#7ec8e3" font-weight="600">true</tspan>,</text>
  <text x="300" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">"editor.defaultFormatter": <tspan fill="#ce9178">"esbenp.prettier-vscode"</tspan>,</text>
  <text x="300" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">"typescript.updateImportsOnFileMove.enabled": <tspan fill="#ce9178">"always"</tspan></text>

  <!-- Key Features -->
  <rect x="60" y="290" width="760" height="130" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">VS Code TypeScript 핵심 기능</text>

  <text x="100" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">자동완성</text>
  <text x="100" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">. 입력 시 멤버 제안</text>

  <text x="260" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Go to Definition</text>
  <text x="260" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">F12 / Cmd+Click</text>

  <text x="430" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">리네임</text>
  <text x="430" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">F2 → 전체 파일 안전 변경</text>

  <text x="600" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Quick Fix</text>
  <text x="600" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Cmd+. 오류 자동 수정 제안</text>

  <text x="100" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">호버 타입 정보</text>
  <text x="100" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">변수 위 마우스 오버</text>

  <text x="260" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Find References</text>
  <text x="260" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Shift+F12</text>

  <text x="430" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">Inlay Hints</text>
  <text x="430" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">추론 타입 인라인 표시</text>

  <text x="600" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Import 자동 정리</text>
  <text x="600" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Organize Imports</text>
</svg>
