<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">폼 유효성 검사 흐름</text>

  <!-- User Input Box -->
  <rect x="60" y="80" width="200" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">사용자 입력</text>
  <text x="160" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">onChange / onBlur / onSubmit</text>

  <!-- Arrow right -->
  <line x1="260" y1="110" x2="315" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Validation Engine Box -->
  <rect x="315" y="80" width="250" height="60" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">유효성 검사 엔진</text>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">RHF · Zod · Yup · 커스텀 규칙</text>

  <!-- Arrow right (valid) -->
  <line x1="565" y1="100" x2="620" y2="100" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="592" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">통과</text>

  <!-- Arrow down (fail) -->
  <line x1="440" y1="140" x2="440" y2="185" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="457" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">실패</text>

  <!-- Error Display Box -->
  <rect x="315" y="185" width="250" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">에러 메시지 표시</text>
  <text x="440" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">formState.errors / 인라인 피드백</text>

  <!-- Submit Box -->
  <rect x="620" y="80" width="200" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">폼 서밋</text>
  <text x="720" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">handleSubmit(onValid)</text>

  <!-- Arrow to server -->
  <line x1="720" y1="140" x2="720" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Server Validation Box -->
  <rect x="620" y="185" width="200" height="60" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">서버 유효성 검사</text>
  <text x="720" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">중복 확인 · 비즈니스 규칙</text>

  <!-- Validation timing section -->
  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">검사 시점 (mode)</text>

  <!-- onChange box -->
  <rect x="60" y="316" width="170" height="80" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="145" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">onChange</text>
  <text x="145" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">타이핑마다 검사</text>
  <text x="145" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">즉각 피드백</text>
  <text x="145" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">렌더링 빈번</text>

  <!-- onBlur box -->
  <rect x="248" y="316" width="170" height="80" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="333" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">onBlur</text>
  <text x="333" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">포커스 떠날 때</text>
  <text x="333" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">UX 균형</text>
  <text x="333" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">권장 기본값</text>

  <!-- onSubmit box -->
  <rect x="436" y="316" width="170" height="80" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="521" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">onSubmit</text>
  <text x="521" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">제출 시에만</text>
  <text x="521" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">검사 최소화</text>
  <text x="521" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단순 폼에 적합</text>

  <!-- all box -->
  <rect x="624" y="316" width="196" height="80" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="722" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">all</text>
  <text x="722" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">onBlur 후 onChange</text>
  <text x="722" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">오류 후 즉시 재검사</text>
  <text x="722" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">UX 최적</text>

  <!-- Code block -->
  <rect x="60" y="426" width="760" height="74" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> { register, handleSubmit, formState: { errors } } = <tspan fill="#7ec8e3" font-weight="600">useForm</tspan>({ mode: <tspan fill="#ce9178">'all'</tspan> });</text>
  <text x="76" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> email = register(<tspan fill="#ce9178">'email'</tspan>, { required: <tspan fill="#ce9178">'이메일을 입력하세요'</tspan>, pattern: { value: /\S+@\S+/, message: <tspan fill="#ce9178">'형식 오류'</tspan> } });</text>
  <text x="76" y="488" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// {errors.email &amp;&amp; &lt;span&gt;{errors.email.message}&lt;/span&gt;}</text>
</svg>
