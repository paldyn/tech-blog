  <rect x="274" y="104" width="48" height="26" fill="#1a1a2a" rx="3" stroke="#3a4a6e" stroke-width="1"/>
  <text x="298" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">4</text>
  <rect x="324" y="104" width="48" height="26" fill="#1a1a2a" rx="3" stroke="#3a4a6e" stroke-width="1"/>
  <text x="348" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">5</text>
  <rect x="374" y="104" width="48" height="26" fill="#1a1a2a" rx="3" stroke="#3a4a6e" stroke-width="1"/>
  <text x="398" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">6</text>
  <rect x="424" y="104" width="48" height="26" fill="#1a1a2a" rx="3" stroke="#3a4a6e" stroke-width="1"/>
  <text x="448" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">7</text>
  <rect x="474" y="104" width="48" height="26" fill="#1a1a2a" rx="3" stroke="#3a4a6e" stroke-width="1"/>
  <text x="498" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">8</text>
  <rect x="524" y="104" width="48" height="26" fill="#1a1a2a" rx="3" stroke="#3a4a6e" stroke-width="1"/>
  <text x="548" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">9</text>
  <rect x="574" y="104" width="48" height="26" fill="#1a1a2a" rx="3" stroke="#3a4a6e" stroke-width="1"/>
  <text x="598" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">10</text>
  <rect x="624" y="104" width="48" height="26" fill="#1a1a2a" rx="3" stroke="#3a4a6e" stroke-width="1"/>
  <text x="648" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">11</text>

  <!-- dp values row -->
  <rect x="74" y="132" width="48" height="36" fill="#1a3a2a" rx="3" stroke="#55c555" stroke-width="1.5"/>
  <text x="98" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">0</text>
  <rect x="124" y="132" width="48" height="36" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="148" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">1</text>
  <rect x="174" y="132" width="48" height="36" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="198" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">1</text>
  <rect x="224" y="132" width="48" height="36" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="248" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">2</text>
  <rect x="274" y="132" width="48" height="36" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="298" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">2</text>
  <rect x="324" y="132" width="48" height="36" fill="#1a3a2a" rx="3" stroke="#55c555" stroke-width="1.5"/>
  <text x="348" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">1</text>
  <rect x="374" y="132" width="48" height="36" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="398" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">2</text>
  <rect x="424" y="132" width="48" height="36" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="448" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">2</text>
  <rect x="474" y="132" width="48" height="36" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="498" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">3</text>
  <rect x="524" y="132" width="48" height="36" fill="#1a2a3a" rx="3" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="548" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">3</text>
  <rect x="574" y="132" width="48" height="36" fill="#1a3a2a" rx="3" stroke="#55c555" stroke-width="1.5"/>
  <text x="598" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">2</text>
  <rect x="624" y="132" width="48" height="36" fill="#2a4a2a" rx="3" stroke="#77dd77" stroke-width="2"/>
  <text x="648" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#77dd77">3</text>

  <!-- Annotation for dp[11]=3 -->
  <text x="648" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#77dd77">5+5+1 = 3개</text>
  <line x1="648" y1="170" x2="648" y2="178" stroke="#77dd77" stroke-width="1.5"/>

  <!-- Transition example -->
  <text x="60" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">dp[11] 계산 과정 (동전 c ∈ {1,2,5}):</text>
  <rect x="60" y="228" width="760" height="66" fill="#111" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">c=1: dp[11-1]+1 = dp[10]+1 = 2+1 = 3</text>
  <text x="80" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">c=2: dp[11-2]+1 = dp[9]+1  = 3+1 = 4</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">c=5: dp[11-5]+1 = dp[6]+1  = 2+1 = 3  ← min → dp[11]=3</text>

  <!-- Code -->
  <rect x="60" y="308" width="760" height="152" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def coin_change(coins, amount):</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp = [float('inf')] * (amount + 1)</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp[0] = 0</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for amount_i in range(1, amount + 1):</text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">        for c in coins:</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">            if c &lt;= amount_i:</text>
  <text x="76" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                dp[amount_i]=min(dp[amount_i],dp[amount_i-c]+1)</text>
  <text x="76" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    return dp[amount] if dp[amount]!=float('inf') else -1</text>
</svg>
