<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">&#xC2E4;&#xC6A9; &#xD328;&#xD134; &#x2014; &#xD0C0;&#xC784;&#xC544;&#xC6C3; &amp; &#xBCD1;&#xB82C; &#xC81C;&#xD55C;</text>

  <!-- Timeout pattern -->
  <rect x="50" y="68" width="370" height="280" rx="6" fill="#070b14" stroke="#e05555"/>
  <text x="235" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Promise.race &#xD0C0;&#xC784;&#xC544;&#xC6C3;</text>

  <text x="66" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">function</tspan><tspan fill="#e8e8e8"> timeout(ms) {</tspan></text>
  <text x="66" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  return new</tspan><tspan fill="#e8e8e8"> Promise((_, rej) =&gt;</tspan></text>
  <text x="66" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    setTimeout(() =&gt;</text>
  <text x="66" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">      rej(</tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Error(</tspan><tspan fill="#ce9178">'timeout'</tspan><tspan fill="#e8e8e8">)), ms)</tspan></text>
  <text x="66" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  )</text>
  <text x="66" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <text x="66" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">await</text><text x="102" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Promise.race([</text>
  <text x="66" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  fetchData(url),</text>
  <text x="66" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  timeout(</tspan><tspan fill="#b5cea8">5000</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="66" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">])</text>
  <text x="66" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">5&#xCD08; &#xC548;&#xC5D0; &#xC751;&#xB2F5; &#xC5C6;&#xC73C;&#xBA74; &#xC2E4;&#xD328;</text>

  <!-- allSettled pattern -->
  <rect x="460" y="68" width="370" height="280" rx="6" fill="#070b14" stroke="#7ec8e3"/>
  <text x="645" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">allSettled &#xACB0;&#xACFC; &#xCC98;&#xB9AC;</text>

  <text x="476" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="514" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> results =</text>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  await</text><text x="524" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Promise.allSettled([</text>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    fetchA(), fetchB(), fetchC()</text>
  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  ])</text>

  <text x="476" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="514" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> ok = results</text>
  <text x="476" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  .filter(r =&gt; r.status ===</text>
  <text x="476" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">            'fulfilled'</text><text x="660" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>
  <text x="476" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  .map(r =&gt; r.value)</text>

  <text x="476" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">&#xC77C;&#xBD80; &#xC2E4;&#xD328;&#xD574;&#xB3C4; &#xC131;&#xACF5;&#xD55C; &#xACB0;&#xACFC;&#xB9CC; &#xD65C;&#xC6A9;</text>
  <text x="476" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">&#xC5D0;&#xB7EC; &#xB85C;&#xAE45; + &#xC131;&#xACF5; &#xC815;&#xCC98;&#xB9AC; &#xBCD1;&#xD589;</text>
  <text x="476" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">{ status: 'fulfilled', value } | { status: 'rejected', reason }</text>
</svg>
