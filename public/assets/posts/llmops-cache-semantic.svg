<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">시맨틱 캐시: 유사 질문 클러스터링</text>

  <!-- Embedding space visualization -->
  <!-- Cluster 1: Python questions -->
  <ellipse cx="200" cy="180" rx="130" ry="100" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="200" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Python 관련 질문 클러스터</text>

  <!-- Points in cluster 1 -->
  <circle cx="160" cy="155" r="5" fill="#55c555"/>
  <text x="160" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">"파이썬이란?"</text>

  <circle cx="220" cy="195" r="5" fill="#55c555"/>
  <text x="220" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">"파이썬이 뭔가요?"</text>

  <circle cx="180" cy="230" r="5" fill="#7ec8e3"/>
  <text x="130" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">"Python이 무엇인지"</text>

  <!-- New query point -->
  <circle cx="230" cy="155" r="7" fill="#e05555" stroke="#ffffff" stroke-width="1.5"/>
  <text x="280" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">새 쿼리</text>
  <text x="280" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">"Python이란 언어는?"</text>

  <!-- Similarity line -->
  <line x1="230" y1="155" x2="162" y2="155" stroke="#e05555" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="200" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">sim=0.96</text>

  <!-- Cluster 2: LLM questions -->
  <ellipse cx="580" cy="200" rx="120" ry="90" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="580" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">LLM 관련 질문 클러스터</text>

  <circle cx="550" cy="180" r="5" fill="#7777cc"/>
  <text x="510" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">"LLM이란?"</text>

  <circle cx="610" cy="210" r="5" fill="#7777cc"/>
  <text x="640" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">"ChatGPT 원리"</text>

  <circle cx="570" cy="245" r="5" fill="#7777cc"/>
  <text x="560" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">"트랜스포머 구조"</text>

  <!-- Threshold annotation -->
  <rect x="60" y="298" width="760" height="46" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">threshold</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">0.92</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8"># 유사도 0.92 이상이면 캐시 히트</tspan></text>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># 낮추면 히트율↑ 품질↓, 높이면 히트율↓ 품질↑</tspan></text>
</svg>
