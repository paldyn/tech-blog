<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">원시 타입 주의사항</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">소문자 vs 대문자, null vs undefined, 타입 강제 변환</text>

  <!-- Section 1: lowercase vs uppercase -->
  <text x="76" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">소문자 vs 대문자 타입</text>
  <rect x="60" y="112" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 소문자: 원시 타입 (권장)</tspan></text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> a: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#9aa4b8">  // 원시값</tspan></text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 대문자: 래퍼 객체 (비권장)</tspan></text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> b: </tspan><tspan fill="#e05555">String</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> String(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">);</tspan><tspan fill="#9aa4b8"> // 객체 래퍼 — 피할 것</tspan></text>

  <!-- Warning note -->
  <rect x="60" y="224" width="760" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">String, Number, Boolean (대문자) 타입은 원시 타입과 달리 객체입니다. 항상 소문자를 사용하세요.</text>
  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">소문자 string에는 String(대문자) 할당 불가 — 반대 방향도 주의</text>

  <!-- Section 2: null vs undefined -->
  <text x="76" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">null vs undefined</text>
  <rect x="60" y="308" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// null: 값이 없다고 명시적으로 할당</tspan></text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> selected: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> | </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#9aa4b8"> // "선택 없음" 명시</tspan></text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// undefined: 값이 아직 할당되지 않음</tspan></text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> pending: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> | </tspan><tspan fill="#7ec8e3" font-weight="600">undefined</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#9aa4b8"> // 나중에 할당 예정</tspan></text>

  <!-- Bottom note -->
  <rect x="60" y="428" width="760" height="36" rx="6" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">strictNullChecks: true 설정 시 null/undefined 를 별도 타입으로 엄격하게 분리합니다</text>
</svg>
