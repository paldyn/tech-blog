<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컨텍스트 윈도우 관리 전략 4가지</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">긴 대화·문서에서 한정된 컨텍스트를 효율적으로 활용</text>

  <!-- Strategy 1: Sliding Window -->
  <rect x="60" y="90" width="370" height="140" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① 슬라이딩 윈도우 (Sliding Window)</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최근 N턴만 유지, 오래된 것은 버림</text>
  <!-- Visual -->
  <rect x="80" y="144" width="60" height="22" rx="3" fill="#333" stroke="#444"/>
  <text x="110" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">T-4</text>
  <rect x="148" y="144" width="60" height="22" rx="3" fill="#333" stroke="#444"/>
  <text x="178" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">T-3</text>
  <rect x="216" y="144" width="60" height="22" rx="3" fill="#1a1a2e" stroke="#7ec8e3"/>
  <text x="246" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">T-2</text>
  <rect x="284" y="144" width="60" height="22" rx="3" fill="#1a1a2e" stroke="#7ec8e3"/>
  <text x="314" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">T-1</text>
  <rect x="352" y="144" width="60" height="22" rx="3" fill="#1a1a2e" stroke="#7ec8e3"/>
  <text x="382" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">T</text>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점: 구현 단순, 비용 일정</text>
  <text x="80" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점: 초반 정보 유실</text>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추천: 일반 챗봇, 단기 세션</text>

  <!-- Strategy 2: Summarization -->
  <rect x="450" y="90" width="370" height="140" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">② 요약 압축 (Summary Compression)</text>
  <text x="470" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오래된 대화를 LLM이 요약, 압축 보관</text>
  <!-- Visual -->
  <rect x="470" y="144" width="120" height="22" rx="3" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="530" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">요약본 (이전 대화)</text>
  <text x="598" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">+</text>
  <rect x="610" y="144" width="60" height="22" rx="3" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="640" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">최근 N턴</text>
  <text x="470" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점: 맥락 보존, 효율적</text>
  <text x="470" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점: 요약 비용, 세부 유실</text>
  <text x="470" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추천: 장기 대화, 고객 지원</text>

  <!-- Strategy 3: RAG Memory -->
  <rect x="60" y="250" width="370" height="140" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ 외부 메모리 (RAG Memory)</text>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">벡터 DB에 대화 저장, 필요 시 검색</text>
  <!-- Visual -->
  <rect x="80" y="304" width="100" height="30" rx="4" fill="#0d2d0d" stroke="#55c555"/>
  <text x="130" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">벡터 DB</text>
  <line x1="188" y1="319" x2="216" y2="319" stroke="#555" stroke-width="1.5"/>
  <polygon points="224,319 212,313 212,325" fill="#555"/>
  <rect x="224" y="304" width="110" height="30" rx="4" fill="#111827" stroke="#444"/>
  <text x="279" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유사도 검색</text>
  <line x1="342" y1="319" x2="370" y2="319" stroke="#555" stroke-width="1.5"/>
  <polygon points="378,319 366,313 366,325" fill="#555"/>
  <rect x="370" y="304" width="50" height="30" rx="4" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="395" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">주입</text>

  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점: 무한 기억, 관련성 높음</text>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점: 복잡한 인프라, 지연</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추천: 개인화 에이전트, 장기 서비스</text>

  <!-- Strategy 4: Hierarchical -->
  <rect x="450" y="250" width="370" height="140" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="470" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">④ 계층적 요약 (Hierarchical)</text>
  <text x="470" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">세션 → 일 → 주 → 월 단위 요약 계층</text>
  <!-- Visual -->
  <text x="470" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">월 요약 → 주 요약 → 일 요약 → 현재 세션</text>
  <text x="500" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">↑ 압축률 높음      ↑ 세부 정보 많음</text>
  <text x="470" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점: 시간적 맥락 보존</text>
  <text x="470" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점: 구현 복잡</text>
  <text x="470" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추천: 장기 PA, 생산성 도구</text>

  <!-- Bottom note -->
  <rect x="60" y="406" width="760" height="44" rx="6" fill="#111111" stroke="#1e2433"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Claude 3.5+, Gemini 1.5+는 100K~1M 토큰 컨텍스트 지원 → 전략 부담 감소</text>
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">하지만 "Lost in the Middle" 현상 주의 — 중간 정보가 긴 컨텍스트에서 무시될 수 있음</text>
</svg>
