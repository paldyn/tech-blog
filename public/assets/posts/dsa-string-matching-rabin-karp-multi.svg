<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">라빈-카프 — 다중 패턴 검색</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">k개 패턴을 해시 집합으로 O(n+k·m)에 동시 검색</text>

  <!-- Multiple patterns -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">패턴 집합 (길이 3)</text>

  <rect x="60" y="116" width="80" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="4"/>
  <text x="100" y="139" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">"abc"</text>
  <text x="100" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">hash=H1</text>

  <rect x="156" y="116" width="80" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="4"/>
  <text x="196" y="139" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">"def"</text>
  <text x="196" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">hash=H2</text>

  <rect x="252" y="116" width="80" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="4"/>
  <text x="292" y="139" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">"xyz"</text>
  <text x="292" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">hash=H3</text>

  <text x="380" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 해시 집합 S = {H1, H2, H3}</text>
  <text x="380" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  O(k)로 사전 구축 후 O(1)으로 검사</text>

  <!-- Text sliding with hash set check -->
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">텍스트 슬라이딩 — 해시 집합 조회</text>
  <text x="60" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">텍스트: "...abcxyzdef..."</text>

  <!-- Sliding window comparison -->
  <rect x="60" y="228" width="740" height="60" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="100" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">윈도우</text>
  <text x="180" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">"abc"</text>
  <text x="180" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">H1 ∈ S ✓</text>
  <text x="280" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">"bcx"</text>
  <text x="280" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">∉ S ✗</text>
  <text x="380" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">"cxy"</text>
  <text x="380" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">∉ S ✗</text>
  <text x="480" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">"xyz"</text>
  <text x="480" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">H3 ∈ S ✓</text>
  <text x="580" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">"yzd"</text>
  <text x="580" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">∉ S ✗</text>
  <text x="680" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">"def"</text>
  <text x="680" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">H2 ∈ S ✓</text>

  <!-- Code -->
  <rect x="60" y="308" width="440" height="72" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 다중 패턴: 해시 셋으로 O(n+km)</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">pat_hashes = {rk_hash(p) for p in patterns}</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">if</text>
  <text x="93" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> window_hash in pat_hashes:</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    verify_exact_match()</text>

  <!-- Complexity -->
  <rect x="520" y="308" width="300" height="72" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="670" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">복잡도 비교</text>
  <text x="536" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">KMP × k개:</text>
  <text x="636" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">O(k·n)</text>
  <text x="536" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Rabin-Karp:</text>
  <text x="636" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">O(n + k·m)</text>
  <text x="536" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Aho-Corasick:</text>
  <text x="636" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">O(n + 총 매칭)</text>
</svg>
