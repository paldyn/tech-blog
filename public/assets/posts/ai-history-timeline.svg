<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 720"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="720" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 역사 타임라인 (1950~2026)</text>
  <text x="440" y="74" text-anchor="middle" font-size="13" fill="#888">붐과 겨울을 반복하며 오늘에 이르다</text>

  <!-- Timeline spine -->
  <line x1="160" y1="100" x2="160" y2="645" stroke="#333" stroke-width="2"/>

  <!-- Era 1: 태동기 -->
  <circle cx="160" cy="118" r="8" fill="#7777cc"/>
  <rect x="175" y="100" width="660" height="52" fill="#111122" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="192" y="121" font-size="14" font-weight="600" fill="#7777cc">1950~1969 · 태동기</text>
  <text x="192" y="141" font-size="12" fill="#888">튜링 테스트 제안(1950), 다트머스 회의(1956), 퍼셉트론 발명(1957), LISP 개발</text>

  <!-- Era 2: 1st AI Winter -->
  <circle cx="160" cy="188" r="8" fill="#e05555"/>
  <rect x="175" y="170" width="660" height="52" fill="#1f0f0f" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="192" y="191" font-size="14" font-weight="600" fill="#e05555">1970~1979 · 제1차 AI 겨울</text>
  <text x="192" y="211" font-size="12" fill="#888">Lighthill 보고서(1973) 비판 → 연구비 삭감, 퍼셉트론 한계 지적</text>

  <!-- Era 3: Expert Systems -->
  <circle cx="160" cy="258" r="8" fill="#55c555"/>
  <rect x="175" y="240" width="660" height="52" fill="#0f1f12" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="192" y="261" font-size="14" font-weight="600" fill="#55c555">1980~1986 · 전문가 시스템 붐</text>
  <text x="192" y="281" font-size="12" fill="#888">MYCIN · XCON 등 전문가 시스템 산업화, Japan 5세대 컴퓨터 프로젝트</text>

  <!-- Era 4: 2nd AI Winter -->
  <circle cx="160" cy="328" r="8" fill="#e05555"/>
  <rect x="175" y="310" width="660" height="52" fill="#1f0f0f" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="192" y="331" font-size="14" font-weight="600" fill="#e05555">1987~1993 · 제2차 AI 겨울</text>
  <text x="192" y="351" font-size="12" fill="#888">전문가 시스템 유지보수 한계, Lisp 머신 실패, 연구비 재삭감</text>

  <!-- Era 5: Statistical ML -->
  <circle cx="160" cy="398" r="8" fill="#7ec8e3"/>
  <rect x="175" y="380" width="660" height="52" fill="#0f1a1f" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="192" y="401" font-size="14" font-weight="600" fill="#7ec8e3">1994~2011 · 통계 ML / SVM 시대</text>
  <text x="192" y="421" font-size="12" fill="#888">SVM(1995), Random Forest(2001), AdaBoost · Kaggle 등장, ImageNet 구축</text>

  <!-- Era 6: Deep Learning Revolution -->
  <circle cx="160" cy="468" r="8" fill="#55c555"/>
  <rect x="175" y="450" width="660" height="52" fill="#0f1f12" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="192" y="471" font-size="14" font-weight="600" fill="#55c555">2012~2016 · 딥러닝 혁명</text>
  <text x="192" y="491" font-size="12" fill="#888">AlexNet ImageNet 우승(2012), Word2Vec · GAN · ResNet · AlphaGo 바둑 정복</text>

  <!-- Era 7: Transformer -->
  <circle cx="160" cy="538" r="8" fill="#7ec8e3"/>
  <rect x="175" y="520" width="660" height="52" fill="#0f1a1f" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="192" y="541" font-size="14" font-weight="600" fill="#7ec8e3">2017~2019 · Transformer / BERT 시대</text>
  <text x="192" y="561" font-size="12" fill="#888">Attention is All You Need(2017), BERT(2018), GPT-1/2, XLNet · RoBERTa</text>

  <!-- Era 8: LLM Era -->
  <circle cx="160" cy="608" r="8" fill="#e8e8e8"/>
  <rect x="175" y="590" width="660" height="52" fill="#1e1e1e" rx="6" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="192" y="611" font-size="14" font-weight="600" fill="#e8e8e8">2020~2026 · LLM 시대</text>
  <text x="192" y="631" font-size="12" fill="#888">GPT-3(2020) → ChatGPT 폭발(2022) → GPT-4/Claude/Gemini/Llama 경쟁(2023~)</text>

  <!-- Legend dot guide -->
  <circle cx="65" cy="672" r="7" fill="#e05555"/>
  <text x="80" y="677" font-size="12" fill="#888">AI 겨울</text>
  <circle cx="175" cy="672" r="7" fill="#55c555"/>
  <text x="190" y="677" font-size="12" fill="#888">성장·부흥기</text>
  <circle cx="305" cy="672" r="7" fill="#7ec8e3"/>
  <text x="320" y="677" font-size="12" fill="#888">기술 전환점</text>
  <circle cx="435" cy="672" r="7" fill="#7777cc"/>
  <text x="450" y="677" font-size="12" fill="#888">태동기</text>

  <!-- Footer -->
  <text x="440" y="700" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈 #2</text>
</svg>
