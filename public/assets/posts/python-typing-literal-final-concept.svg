<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290">
  <rect width="880" height="290" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Literal vs Final — 무엇을 제약하나</text>

  <!-- Literal -->
  <rect x="60" y="80" width="360" height="150" rx="8" fill="#111418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="110" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">Literal</text>
  <text x="84" y="134" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">"이 변수가 가질 수 있는 값"을</text>
  <text x="84" y="153" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">특정 값들로 제한한다.</text>
  <text x="84" y="182" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#ce9178">Literal["r", "w", "a"]</text>
  <text x="84" y="208" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">→ 세 문자열 외 값은 타입 오류</text>

  <!-- Final -->
  <rect x="460" y="80" width="360" height="150" rx="8" fill="#111418" stroke="#e0a955" stroke-width="1.5"/>
  <text x="484" y="110" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="16" font-weight="600" fill="#e0a955">Final</text>
  <text x="484" y="134" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">"재할당 금지"를 선언한다.</text>
  <text x="484" y="153" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">상수를 표현할 때 쓴다.</text>
  <text x="484" y="182" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#ce9178">MAX: Final = 100</text>
  <text x="484" y="208" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">→ 이후 MAX 재할당 시 타입 오류</text>

  <text x="440" y="268" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">둘 다 런타임 강제가 아니라 정적 검사기에 알려주는 제약이다</text>
</svg>
