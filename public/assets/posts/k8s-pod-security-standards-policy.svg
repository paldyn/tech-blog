<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pod Security Standards — Namespace 레이블 설정</text>

  <!-- Code block 1 -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Baseline 적용 예시</text>
  <rect x="60" y="96" width="360" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0" fill="#7ec8e3" font-weight="600">apiVersion</tspan><tspan fill="#ffffff">: v1</tspan>
  </text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0" fill="#7ec8e3" font-weight="600">kind</tspan><tspan fill="#ffffff">: Namespace</tspan>
  </text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0" fill="#7ec8e3" font-weight="600">metadata</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0" fill="#ffffff">  name: my-app</tspan>
  </text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0" fill="#7ec8e3" font-weight="600">  labels</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="76" dy="0">    pod-security.kubernetes.io/enforce</tspan>
  </text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="76" dy="0">      : baseline</tspan>
  </text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # enforce/warn/audit</text>

  <!-- Code block 2 -->
  <text x="460" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Restricted + 버전 고정</text>
  <rect x="460" y="96" width="360" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="476" dy="0" fill="#7ec8e3" font-weight="600">metadata</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="476" dy="0" fill="#7ec8e3" font-weight="600">  labels</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="476" dy="0">    pod-security.k8s.io/enforce</tspan>
  </text>
  <text x="476" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="476" dy="0">      : restricted</tspan>
  </text>
  <text x="476" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="476" dy="0">    pod-security.k8s.io/enforce-version</tspan>
  </text>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="476" dy="0">      : v1.29</tspan>
  </text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="476" dy="0">    pod-security.k8s.io/warn</tspan>
  </text>
  <text x="476" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="476" dy="0">      : restricted</tspan>
  </text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # warn: 경고만, audit: 로그만</text>

  <!-- Mode explanation -->
  <rect x="60" y="300" width="760" height="140" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">세 가지 적용 모드</text>

  <rect x="80" y="340" width="210" height="80" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="185" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">enforce</text>
  <text x="185" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정책 위반 시</text>
  <text x="185" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Pod 생성 거부</text>

  <rect x="335" y="340" width="210" height="80" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">audit</text>
  <text x="440" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정책 위반 시</text>
  <text x="440" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Audit 로그만 기록</text>

  <rect x="590" y="340" width="210" height="80" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="695" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">warn</text>
  <text x="695" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정책 위반 시</text>
  <text x="695" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">사용자에게 경고 메시지</text>
</svg>
