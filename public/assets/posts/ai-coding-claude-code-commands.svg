<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Claude Code 명령 패턴</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Terminal Usage &amp; CLAUDE.md Example</text>

  <!-- Left: Terminal commands -->
  <text x="80" y="102" font-size="13" font-weight="600" fill="#ce9178">터미널 사용 패턴</text>
  <rect x="60" y="114" width="370" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 대화형 세션 시작</text>
  <text x="76" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">$ claude</text>

  <text x="76" y="176" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 단일 명령 실행 (non-interactive)</text>
  <text x="76" y="194" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">$ claude -p </text>
  <text x="166" y="194" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">"버그 수정해줘"</text>

  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 파일 분석 후 리팩토링</text>
  <text x="76" y="234" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">$ claude </text>
  <text x="140" y="234" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">"auth.py를 JWT로 리팩토링"</text>

  <text x="76" y="256" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># Git 변경사항 요약</text>
  <text x="76" y="274" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">$ git diff </text>
  <text x="144" y="274" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">| claude </text>
  <text x="214" y="274" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">"커밋 메시지 작성"</text>

  <text x="76" y="296" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 모델 지정</text>
  <text x="76" y="314" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">$ claude --model </text>
  <text x="190" y="314" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">claude-opus-4-7</text>

  <!-- Right: CLAUDE.md -->
  <text x="456" y="102" font-size="13" font-weight="600" fill="#7ec8e3">CLAUDE.md 예시 (프로젝트 지식 파일)</text>
  <rect x="440" y="114" width="380" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="136" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 프로젝트: PayService API</text>
  <text x="456" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 빌드</text>
  <text x="456" y="174" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">uv run pytest tests/</text>
  <text x="456" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">uv run ruff check .</text>
  <text x="456" y="212" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 아키텍처</text>
  <text x="456" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- FastAPI + PostgreSQL</text>
  <text x="456" y="248" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- app/services/ 비즈니스 로직</text>
  <text x="456" y="268" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">## 중요 규칙</text>
  <text x="456" y="286" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- migrations/ 직접 수정 금지</text>
  <text x="456" y="304" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">- 타입 힌트 필수, 한국어 주석</text>

  <!-- Slash commands reference -->
  <text x="60" y="344" font-size="14" font-weight="600" fill="#e8e8e8">주요 슬래시 커맨드</text>

  <rect x="60" y="358" width="160" height="36" rx="5" fill="#111" stroke="#ce9178" stroke-width="1"/>
  <text x="140" y="374" text-anchor="middle" font-size="12" fill="#ce9178">/help</text>
  <text x="140" y="388" text-anchor="middle" font-size="11" fill="#666">도움말</text>

  <rect x="236" y="358" width="160" height="36" rx="5" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="316" y="374" text-anchor="middle" font-size="12" fill="#55c555">/review</text>
  <text x="316" y="388" text-anchor="middle" font-size="11" fill="#666">코드 리뷰</text>

  <rect x="412" y="358" width="160" height="36" rx="5" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="492" y="374" text-anchor="middle" font-size="12" fill="#7ec8e3">/clear</text>
  <text x="492" y="388" text-anchor="middle" font-size="11" fill="#666">컨텍스트 초기화</text>

  <rect x="588" y="358" width="232" height="36" rx="5" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="704" y="374" text-anchor="middle" font-size="12" fill="#7777cc">/config</text>
  <text x="704" y="388" text-anchor="middle" font-size="11" fill="#666">설정 변경</text>

  <text x="60" y="412" font-size="12" fill="#555">* CLAUDE.md는 프로젝트 루트에 위치. ~/.claude/CLAUDE.md는 글로벌 설정으로 모든 프로젝트에 적용</text>
</svg>
