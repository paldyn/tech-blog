<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">"모든 것은 파일이다" — 통합 인터페이스</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">서로 다른 자원을 동일한 read/write API로 다룬다</text>

  <!-- Center: File Descriptor -->
  <rect x="340" y="186" width="200" height="80" fill="#0d1a2a" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">파일 디스크립터</text>
  <text x="440" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">open() → fd</text>
  <text x="440" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">read() / write() / close()</text>

  <!-- Arrows IN from resources -->
  <!-- Regular File -->
  <rect x="60" y="96" width="160" height="56" fill="#0d2010" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">일반 파일</text>
  <text x="140" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/home/user/data.txt</text>
  <line x1="220" y1="130" x2="335" y2="220" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="335,220 326,212 330,224" fill="#333"/>

  <!-- Device -->
  <rect x="60" y="196" width="160" height="56" fill="#1a0d1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">디바이스</text>
  <text x="140" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/dev/sda, /dev/tty</text>
  <line x1="220" y1="224" x2="338" y2="228" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="338,228 326,222 326,234" fill="#333"/>

  <!-- Socket -->
  <rect x="60" y="296" width="160" height="56" fill="#1c1a0d" rx="6" stroke="#e8c55a" stroke-width="1"/>
  <text x="140" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c55a" text-anchor="middle">소켓</text>
  <text x="140" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">TCP/Unix domain socket</text>
  <line x1="220" y1="316" x2="336" y2="240" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="336,240 326,236 330,248" fill="#333"/>

  <!-- Pipe -->
  <rect x="660" y="96" width="160" height="56" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">파이프</text>
  <text x="740" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ls | grep .txt</text>
  <line x1="660" y1="130" x2="545" y2="220" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="545,220 554,212 550,224" fill="#333"/>

  <!-- /proc -->
  <rect x="660" y="196" width="160" height="56" fill="#0d1a2a" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="740" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">/proc · /sys</text>
  <text x="740" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">커널 정보 가상 파일</text>
  <line x1="660" y1="224" x2="542" y2="228" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="542,228 554,222 554,234" fill="#333"/>

  <!-- stdin/stdout/stderr -->
  <rect x="660" y="296" width="160" height="56" fill="#1c1a0d" rx="6" stroke="#e8c55a" stroke-width="1"/>
  <text x="740" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c55a" text-anchor="middle">stdin/out/err</text>
  <text x="740" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">fd: 0, 1, 2</text>
  <line x1="660" y1="316" x2="544" y2="240" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="544,240 554,236 550,248" fill="#333"/>

  <!-- Bottom note -->
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">모든 자원 = open() → 정수 fd → read/write/close → 일관된 조작</text>
</svg>
