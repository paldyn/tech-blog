<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arrb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계 대수 → SQL 대응</text>

  <!-- Selection sigma -->
  <rect x="60" y="70" width="220" height="80" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7ec8e3" text-anchor="middle">σ gpa &gt; 3.7 (students)</text>
  <text x="170" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">선택 연산</text>
  <text x="170" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">조건을 만족하는 행 추출</text>

  <path d="M 170 150 L 170 190" fill="none" stroke="#55c555" stroke-width="2" marker-end="url(#arrb)"/>

  <!-- SQL for selection -->
  <rect x="60" y="194" width="220" height="70" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">SELECT</text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">        *</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">FROM</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">     students</text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">WHERE</text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">     gpa &gt; 3.7</text>

  <!-- Projection pi -->
  <rect x="330" y="70" width="220" height="80" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7ec8e3" text-anchor="middle">π name, major (students)</text>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">투영 연산</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">특정 속성(열)만 추출</text>

  <path d="M 440 150 L 440 190" fill="none" stroke="#55c555" stroke-width="2" marker-end="url(#arrb)"/>

  <rect x="330" y="194" width="220" height="70" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="346" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">SELECT</text>
  <text x="346" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">        name,</text>
  <text x="346" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">       major</text>
  <text x="346" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">FROM</text>
  <text x="346" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">     students</text>

  <!-- Join -->
  <rect x="600" y="70" width="220" height="80" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">students ⋈ enrollments</text>
  <text x="710" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">조인 연산</text>
  <text x="710" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">공통 속성으로 결합</text>

  <path d="M 710 150 L 710 190" fill="none" stroke="#55c555" stroke-width="2" marker-end="url(#arrb)"/>

  <rect x="600" y="194" width="220" height="70" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="616" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">SELECT</text>
  <text x="616" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">        s.*</text>
  <text x="616" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">FROM</text>
  <text x="616" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">     students s</text>
  <text x="616" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">JOIN</text>
  <text x="616" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">     enrollments e</text>

  <!-- Bottom note -->
  <rect x="60" y="300" width="760" height="100" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">코드의 12가지 규칙 (Codd's 12 Rules)</text>
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">진정한 관계형 DBMS가 갖추어야 할 조건. 현실 제품은 일부만 만족하기도 함.</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">핵심: "모든 정보는 테이블의 값으로만 표현되어야 한다"</text>
</svg>
