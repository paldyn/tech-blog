<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계 대수(Relational Algebra) 핵심 연산</text>

  <defs>
    <marker id="op-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- SELECT (σ) -->
  <rect x="60" y="70" width="360" height="110" fill="#111" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">σ (시그마) — 선택(SELECT)</text>
  <text x="240" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">조건을 만족하는 행만 추출 → SQL WHERE</text>
  <rect x="80" y="124" width="320" height="44" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">σ</text>
  <text x="110" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">grade=3(students)</text>
  <text x="96" y="159" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- WHERE grade = 3</text>

  <!-- PROJECT (π) -->
  <rect x="460" y="70" width="360" height="110" fill="#111" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">π (파이) — 투영(PROJECT)</text>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">특정 열만 추출 → SQL SELECT 컬럼 목록</text>
  <rect x="480" y="124" width="320" height="44" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">π</text>
  <text x="510" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">name, dept(students)</text>
  <text x="496" y="159" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- SELECT name, dept</text>

  <!-- JOIN (⋈) -->
  <rect x="60" y="200" width="360" height="110" fill="#111" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="240" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8a020" text-anchor="middle">⋈ (보타이) — 조인(JOIN)</text>
  <text x="240" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">공통 속성으로 두 릴레이션 결합</text>
  <rect x="80" y="254" width="320" height="44" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">students ⋈</text>
  <text x="192" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600"> dept_id</text>
  <text x="246" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> depts</text>
  <text x="96" y="289" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- JOIN depts ON ...</text>

  <!-- SET OPS -->
  <rect x="460" y="200" width="360" height="110" fill="#111" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">∪ ∩ − — 집합 연산</text>
  <text x="640" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">합집합, 교집합, 차집합 → UNION/INTERSECT/EXCEPT</text>
  <rect x="480" y="254" width="320" height="44" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">R₁ ∪ R₂ </text>
  <text x="570" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- UNION</text>
  <text x="496" y="289" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">R₁ − R₂ </text>
  <text x="568" y="289" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- EXCEPT</text>

  <!-- Summary -->
  <rect x="60" y="330" width="760" height="100" fill="#0d0d0d" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계 대수 → SQL 대응</text>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">σ (선택) = WHERE    π (투영) = SELECT 목록    ⋈ (조인) = JOIN</text>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">∪ = UNION    ∩ = INTERSECT    − = EXCEPT    ρ (이름변경) = AS</text>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">SQL은 관계 대수를 선언형 문법으로 표현한 언어</text>
</svg>