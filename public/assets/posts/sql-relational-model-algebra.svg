<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계 대수 6가지 기본 연산</text>

  <!-- Row 1 -->
  <rect x="60" y="68" width="230" height="80" rx="8" fill="#111822" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#7ec8e3" text-anchor="middle">σ  선택(Selection)</text>
  <text x="175" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">조건을 만족하는 행 추출</text>
  <text x="175" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">WHERE age &gt; 20</text>

  <rect x="325" y="68" width="230" height="80" rx="8" fill="#111822" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#55c555" text-anchor="middle">π  투영(Projection)</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">특정 열만 추출</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">SELECT name, email</text>

  <rect x="590" y="68" width="230" height="80" rx="8" fill="#111822" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#7777cc" text-anchor="middle">⋈  조인(Join)</text>
  <text x="705" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">두 릴레이션 연결</text>
  <text x="705" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">JOIN ... ON</text>

  <!-- Row 2 -->
  <rect x="60" y="176" width="230" height="80" rx="8" fill="#111822" stroke="#ce9178" stroke-width="1.5"/>
  <text x="175" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#ce9178" text-anchor="middle">∪  합집합(Union)</text>
  <text x="175" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">두 결과 합치기</text>
  <text x="175" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">UNION</text>

  <rect x="325" y="176" width="230" height="80" rx="8" fill="#111822" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#7ec8e3" text-anchor="middle">−  차집합(Difference)</text>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">첫 번째에만 있는 행</text>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">EXCEPT / MINUS</text>

  <rect x="590" y="176" width="230" height="80" rx="8" fill="#111822" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#55c555" text-anchor="middle">×  곱집합(Product)</text>
  <text x="705" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 행 조합</text>
  <text x="705" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">CROSS JOIN</text>

  <!-- Code block -->
  <rect x="60" y="278" width="760" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- σ(선택) + π(투영) + ⋈(조인) 조합 예시</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> u.name, o.amount</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> users u <tspan font-weight="600" fill="#7ec8e3">JOIN</tspan> orders o <tspan font-weight="600" fill="#7ec8e3">ON</tspan> u.id = o.user_id</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan font-weight="600" fill="#7ec8e3">WHERE</tspan> o.amount &gt; <tspan fill="#b5cea8">100000</tspan>;</text>
</svg>
