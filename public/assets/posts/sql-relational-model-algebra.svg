<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">관계 대수 — SQL의 수학적 기반</text>

  <!-- 6 operations -->
  <rect x="60" y="68" width="180" height="78" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">선택 (Selection)</text>
  <text x="150" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">조건에 맞는 행 추출</text>
  <text x="150" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">→ WHERE</text>

  <rect x="260" y="68" width="180" height="78" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">투영 (Projection)</text>
  <text x="350" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">원하는 열만 추출</text>
  <text x="350" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">→ SELECT 컬럼목록</text>

  <rect x="460" y="68" width="180" height="78" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="550" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">조인 (Join)</text>
  <text x="550" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">두 관계를 결합</text>
  <text x="550" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">→ JOIN</text>

  <rect x="660" y="68" width="160" height="78" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">합집합 (Union)</text>
  <text x="740" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">두 결과 합치기</text>
  <text x="740" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">→ UNION</text>

  <rect x="160" y="168" width="180" height="78" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="250" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">차집합 (Difference)</text>
  <text x="250" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">A에만 있는 행</text>
  <text x="250" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">→ EXCEPT</text>

  <rect x="380" y="168" width="180" height="78" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">교집합 (Intersect)</text>
  <text x="470" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">양쪽 모두 있는 행</text>
  <text x="470" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">→ INTERSECT</text>

  <rect x="600" y="168" width="180" height="78" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">카테시안 곱</text>
  <text x="690" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 행 조합</text>
  <text x="690" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">→ CROSS JOIN</text>

  <!-- Code example -->
  <rect x="60" y="270" width="760" height="106" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 선택 + 투영 + 조인 조합</text>
  <text x="76" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan>
    <tspan fill="#ffffff"> c.name, o.amount</tspan>
  </text>
  <text x="76" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">FROM</tspan>
    <tspan fill="#ffffff"> customers c</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> JOIN</tspan>
    <tspan fill="#ffffff"> orders o</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> ON</tspan>
    <tspan fill="#ffffff"> c.id = o.customer_id</tspan>
  </text>
  <text x="76" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WHERE</tspan>
    <tspan fill="#ffffff"> o.amount </tspan>
    <tspan fill="#ffffff">&gt; </tspan>
    <tspan fill="#b5cea8">10000</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
</svg>
