<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Oracle 멀티테넌트 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">CDB (Container DB) → PDB (Pluggable DB)</text>

  <!-- CDB outer frame -->
  <rect x="60" y="90" width="760" height="420" rx="14" fill="#0e1623" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="114" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">CDB (Container Database)</text>
  <text x="440" y="132" text-anchor="middle" font-size="12" fill="#888">하나의 Oracle 인스턴스 · 하나의 SGA · 하나의 백그라운드 프로세스 집합</text>

  <!-- CDB$ROOT -->
  <rect x="100" y="148" width="200" height="100" rx="10" fill="#112236" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">CDB$ROOT</text>
  <text x="200" y="196" text-anchor="middle" font-size="12" fill="#aaaaaa">Oracle 딕셔너리</text>
  <text x="200" y="214" text-anchor="middle" font-size="12" fill="#aaaaaa">공유 컴포넌트</text>
  <text x="200" y="232" text-anchor="middle" font-size="11" fill="#888">con_id = 1</text>

  <!-- PDB$SEED -->
  <rect x="330" y="148" width="200" height="100" rx="10" fill="#112236" stroke="#55c555" stroke-width="1.5"/>
  <text x="430" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">PDB$SEED</text>
  <text x="430" y="196" text-anchor="middle" font-size="12" fill="#aaaaaa">새 PDB 생성 시</text>
  <text x="430" y="214" text-anchor="middle" font-size="12" fill="#aaaaaa">복사 대상 템플릿</text>
  <text x="430" y="232" text-anchor="middle" font-size="11" fill="#888">읽기 전용 · con_id = 2</text>

  <!-- Application Root (12.2+) -->
  <rect x="560" y="148" width="220" height="100" rx="10" fill="#1a1208" stroke="#e0a833" stroke-width="1.5"/>
  <text x="670" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#e0a833">Application Root</text>
  <text x="670" y="196" text-anchor="middle" font-size="12" fill="#aaaaaa">앱 공통 스키마·코드</text>
  <text x="670" y="214" text-anchor="middle" font-size="12" fill="#aaaaaa">Application PDB의 부모</text>
  <text x="670" y="232" text-anchor="middle" font-size="11" fill="#888">19c 이상 권장</text>

  <!-- PDB row -->
  <rect x="100" y="290" width="180" height="90" rx="10" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="190" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">PDB_PROD</text>
  <text x="190" y="338" text-anchor="middle" font-size="12" fill="#aaaaaa">운영 애플리케이션</text>
  <text x="190" y="356" text-anchor="middle" font-size="11" fill="#888">독립 데이터파일</text>
  <text x="190" y="372" text-anchor="middle" font-size="11" fill="#888">로컬 UNDO/TEMP</text>

  <rect x="310" y="290" width="180" height="90" rx="10" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="400" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">PDB_DEV</text>
  <text x="400" y="338" text-anchor="middle" font-size="12" fill="#aaaaaa">개발 환경</text>
  <text x="400" y="356" text-anchor="middle" font-size="11" fill="#888">독립 데이터파일</text>
  <text x="400" y="372" text-anchor="middle" font-size="11" fill="#888">독립 딕셔너리</text>

  <rect x="520" y="290" width="180" height="90" rx="10" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">PDB_TEST</text>
  <text x="610" y="338" text-anchor="middle" font-size="12" fill="#aaaaaa">QA / 테스트</text>
  <text x="610" y="356" text-anchor="middle" font-size="11" fill="#888">Plug-in / Unplug</text>
  <text x="610" y="372" text-anchor="middle" font-size="11" fill="#888">가능</text>

  <rect x="720" y="290" width="80" height="90" rx="10" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="760" y="340" text-anchor="middle" font-size="20" fill="#555">···</text>
  <text x="760" y="368" text-anchor="middle" font-size="11" fill="#555">최대 4096</text>

  <!-- Shared resources bar -->
  <rect x="100" y="410" width="700" height="70" rx="10" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="450" y="436" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">CDB 공유 자원</text>
  <text x="220" y="458" text-anchor="middle" font-size="12" fill="#aaaaaa">SGA (Buffer Pool)</text>
  <text x="430" y="458" text-anchor="middle" font-size="12" fill="#aaaaaa">Redo Log / Control File</text>
  <text x="640" y="458" text-anchor="middle" font-size="12" fill="#aaaaaa">Background Processes</text>
  <text x="450" y="474" text-anchor="middle" font-size="11" fill="#888">각 PDB는 서로 완전히 격리된 딕셔너리와 스키마를 가짐</text>
</svg>
