<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Linux Namespaces 7가지</text>

  <!-- ns boxes: 4 top + 3 bottom -->
  <!-- mnt -->
  <rect x="60" y="72" width="180" height="108" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">mnt</text>
  <text x="150" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">마운트 네임스페이스</text>
  <text x="150" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">파일시스템 트리 격리</text>
  <text x="150" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">컨테이너 루트FS</text>
  <text x="150" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">CLONE_NEWNS</text>

  <!-- uts -->
  <rect x="264" y="72" width="180" height="108" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="354" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">uts</text>
  <text x="354" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">UTS 네임스페이스</text>
  <text x="354" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">hostname, domainname</text>
  <text x="354" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">컨테이너별 호스트명</text>
  <text x="354" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">CLONE_NEWUTS</text>

  <!-- ipc -->
  <rect x="468" y="72" width="180" height="108" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="558" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">ipc</text>
  <text x="558" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">IPC 네임스페이스</text>
  <text x="558" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SysV IPC, POSIX MQ</text>
  <text x="558" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">메시지큐 격리</text>
  <text x="558" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">CLONE_NEWIPC</text>

  <!-- net -->
  <rect x="672" y="72" width="148" height="108" rx="8" fill="#1a0a10" stroke="#e05555" stroke-width="2"/>
  <text x="746" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">net</text>
  <text x="746" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">네트워크 격리</text>
  <text x="746" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인터페이스·라우팅</text>
  <text x="746" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">포트 격리</text>
  <text x="746" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">CLONE_NEWNET</text>

  <!-- pid -->
  <rect x="130" y="212" width="180" height="108" rx="8" fill="#0f150a" stroke="#a0cc55" stroke-width="2"/>
  <text x="220" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#a0cc55" text-anchor="middle">pid</text>
  <text x="220" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">PID 네임스페이스</text>
  <text x="220" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">독립 PID 번호 공간</text>
  <text x="220" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#a0cc55" text-anchor="middle">컨테이너 PID 1</text>
  <text x="220" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">CLONE_NEWPID</text>

  <!-- user -->
  <rect x="350" y="212" width="180" height="108" rx="8" fill="#1a1510" stroke="#e0a855" stroke-width="2"/>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e0a855" text-anchor="middle">user</text>
  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">사용자 네임스페이스</text>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">UID/GID 매핑</text>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a855" text-anchor="middle">rootless 컨테이너</text>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">CLONE_NEWUSER</text>

  <!-- cgroup ns -->
  <rect x="570" y="212" width="180" height="108" rx="8" fill="#0a1a1a" stroke="#55ccc8" stroke-width="2"/>
  <text x="660" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55ccc8" text-anchor="middle">cgroup</text>
  <text x="660" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">cgroup 네임스페이스</text>
  <text x="660" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">cgroup 트리 가상화</text>
  <text x="660" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55ccc8" text-anchor="middle">컨테이너 자원 격리</text>
  <text x="660" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">CLONE_NEWCGROUP</text>

  <!-- Process with all ns -->
  <rect x="60" y="350" width="760" height="116" rx="8" fill="#0d0d0d" stroke="#333"/>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">한 프로세스가 속한 네임스페이스 보기</text>
  <text x="80" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">ls -la /proc/$$/ns/</text>
  <text x="80" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># lrwxrwxrwx cgroup -> cgroup:[4026531835]</text>
  <text x="80" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># lrwxrwxrwx net    -> net:[4026531992]</text>
  <text x="80" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># lrwxrwxrwx pid    -> pid:[4026531836]</text>
</svg>
