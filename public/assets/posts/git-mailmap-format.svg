<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">.mailmap 작성 형식</text>

  <rect x="60" y="80" width="760" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="80" y="110" fill="#9aa4b8"># 대표이름 &lt;대표메일&gt;  &lt;바꿀메일&gt;</tspan>
    <tspan x="80" y="134" fill="#ffffff">홍길동 &lt;hong@paldyn.com&gt; &lt;hong@old.com&gt;</tspan>
    <tspan x="80" y="164" fill="#9aa4b8"># 이름과 메일을 모두 교체</tspan>
    <tspan x="80" y="188" fill="#ffffff">홍길동 &lt;hong@paldyn.com&gt; gildong &lt;hong@home.net&gt;</tspan>
    <tspan x="80" y="218" fill="#9aa4b8"># 메일은 그대로, 이름만 교체</tspan>
    <tspan x="80" y="242" fill="#ffffff">홍길동 &lt;hong@paldyn.com&gt;</tspan>
  </text>

  <text x="60" y="316" font-size="13" fill="#888">저장소 루트에 .mailmap 파일을 두면 git log · shortlog · blame 이 자동으로 이 규칙을 적용합니다.</text>
  <text x="60" y="344" font-size="13" fill="#888">git shortlog -sne 로 누가 어떤 이메일로 커밋했는지 먼저 파악한 뒤 매핑을 작성하면 편합니다.</text>
</svg>
