<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">next/font 사용 패턴</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Google Fonts &amp; 로컬 폰트 적용</text>

  <!-- Left: Google Fonts -->
  <text x="220" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Google Fonts</text>
  <rect x="60" y="120" width="320" height="200" rx="7" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// app/layout.tsx</text>
  <text x="76" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="134" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> { Inter } </text>
  <text x="246" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="76" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  'next/font/google'</text>
  <text x="76" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="120" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> inter = Inter(&#123;</text>
  <text x="76" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  subsets: [</text>
  <text x="172" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'latin'</text>
  <text x="222" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">],</text>
  <text x="76" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  variable: </text>
  <text x="162" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'--font-inter'</text>
  <text x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;)</text>
  <text x="76" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&lt;html className=&#123;inter.variable&#125;&gt;</text>

  <!-- Right: Local Font -->
  <text x="660" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">로컬 폰트</text>
  <rect x="500" y="120" width="320" height="200" rx="7" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="516" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 로컬 폰트 파일 사용</text>
  <text x="516" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="574" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> localFont </text>
  <text x="672" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="516" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  'next/font/local'</text>
  <text x="516" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="560" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> myFont = localFont(&#123;</text>
  <text x="516" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  src: </text>
  <text x="558" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'./MyFont.woff2'</text>
  <text x="516" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  variable: </text>
  <text x="602" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'--font-my'</text>
  <text x="516" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;)</text>
  <text x="516" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&lt;html className=&#123;myFont.variable&#125;&gt;</text>

  <!-- Bottom tips -->
  <rect x="60" y="344" width="760" height="52" rx="7" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">핵심 옵션</text>
  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">subsets · weight · style · display · preload · variable (CSS 변수명)</text>
</svg>
