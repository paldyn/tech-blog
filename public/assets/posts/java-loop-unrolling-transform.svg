<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">루프 언롤링 — 반복문 펼치기</text>

  <defs>
    <marker id="lu-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="40" y="84" font-size="14" font-weight="600" fill="#7ec8e3">원본</text>
  <rect x="40" y="96" width="350" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="58" y="126" fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> i = 0; i &lt; n; i++) {</tspan>
    <tspan x="58" y="150" fill="#ffffff">    sum += a[i];</tspan>
    <tspan x="58" y="174" fill="#ffffff">}</tspan>
    <tspan x="58" y="216" fill="#9aa4b8">// 반복마다 i&lt;n 비교 + 분기</tspan>
    <tspan x="58" y="238" fill="#9aa4b8">// n번의 종료 검사</tspan>
  </text>

  <text x="490" y="84" font-size="14" font-weight="600" fill="#55c555">언롤(×4) 후</text>
  <rect x="490" y="96" width="350" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="508" y="126" fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (; i &lt; n-3; i += 4) {</tspan>
    <tspan x="508" y="150" fill="#ffffff">    sum += a[i]   + a[i+1]</tspan>
    <tspan x="508" y="174" fill="#ffffff">         + a[i+2] + a[i+3];</tspan>
    <tspan x="508" y="198" fill="#ffffff">}</tspan>
    <tspan x="508" y="222" fill="#9aa4b8">// 종료 검사 1/4로 감소</tspan>
    <tspan x="508" y="244" fill="#9aa4b8">// 남는 꼬리는 별도 루프 처리</tspan>
  </text>

  <line x1="394" y1="176" x2="486" y2="176" stroke="#55c555" stroke-width="2.5" marker-end="url(#lu-arr)"/>
</svg>
