<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">데이터 중심 패러다임의 스펙트럼</text>

  <!-- Axis -->
  <text x="100" y="90" font-size="13" font-weight="600" fill="#888">규칙 기반</text>
  <text x="730" y="90" font-size="13" font-weight="600" fill="#888">완전 데이터 기반</text>
  <line x1="80" y1="110" x2="800" y2="110" stroke="#333" stroke-width="2"/>
  <!-- Arrow on axis -->
  <polygon points="800,105 814,110 800,115" fill="#333"/>

  <!-- Gradient bar below axis -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7777cc;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#55c555;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <rect x="80" y="116" width="734" height="8" rx="4" fill="url(#grad)"/>

  <!-- 5 positions on spectrum -->
  <!-- Position 1: Rule-based -->
  <circle cx="120" cy="110" r="7" fill="#7777cc"/>
  <rect x="60" y="140" width="164" height="90" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="142" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">규칙 기반 시스템</text>
  <text x="142" y="182" text-anchor="middle" font-size="11" fill="#aaa">전문가 시스템, 결정 트리</text>
  <text x="142" y="198" text-anchor="middle" font-size="11" fill="#aaa">체스 엔진, 내비게이션</text>
  <text x="142" y="216" text-anchor="middle" font-size="11" fill="#666">데이터: 거의 불필요</text>
  <text x="142" y="232" text-anchor="middle" font-size="11" fill="#666">설명성: 매우 높음</text>

  <!-- Position 2: Traditional ML -->
  <circle cx="293" cy="110" r="7" fill="#7ec8e3"/>
  <rect x="213" y="140" width="164" height="90" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="295" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">전통적 머신러닝</text>
  <text x="295" y="182" text-anchor="middle" font-size="11" fill="#aaa">SVM, 랜덤 포레스트</text>
  <text x="295" y="198" text-anchor="middle" font-size="11" fill="#aaa">로지스틱 회귀</text>
  <text x="295" y="216" text-anchor="middle" font-size="11" fill="#666">데이터: 수천~수만</text>
  <text x="295" y="232" text-anchor="middle" font-size="11" fill="#666">설명성: 높음</text>

  <!-- Position 3: Deep Learning -->
  <circle cx="466" cy="110" r="7" fill="#55c555"/>
  <rect x="386" y="140" width="164" height="90" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="468" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">딥러닝</text>
  <text x="468" y="182" text-anchor="middle" font-size="11" fill="#aaa">CNN, RNN, Transformer</text>
  <text x="468" y="198" text-anchor="middle" font-size="11" fill="#aaa">이미지·음성·텍스트</text>
  <text x="468" y="216" text-anchor="middle" font-size="11" fill="#666">데이터: 수십만~수백만</text>
  <text x="468" y="232" text-anchor="middle" font-size="11" fill="#666">설명성: 낮음</text>

  <!-- Position 4: Foundation Model -->
  <circle cx="640" cy="110" r="7" fill="#e05555"/>
  <rect x="560" y="140" width="164" height="90" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="642" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">파운데이션 모델</text>
  <text x="642" y="182" text-anchor="middle" font-size="11" fill="#aaa">BERT, GPT, CLIP</text>
  <text x="642" y="198" text-anchor="middle" font-size="11" fill="#aaa">범용 사전학습</text>
  <text x="642" y="216" text-anchor="middle" font-size="11" fill="#666">데이터: 수십억 토큰</text>
  <text x="642" y="232" text-anchor="middle" font-size="11" fill="#666">설명성: 매우 낮음</text>

  <!-- Position 5: LLM -->
  <circle cx="780" cy="110" r="7" fill="#e05555"/>
  <rect x="712" y="140" width="152" height="90" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="788" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">대규모 LLM</text>
  <text x="788" y="182" text-anchor="middle" font-size="11" fill="#aaa">GPT-4, Claude, Gemini</text>
  <text x="788" y="198" text-anchor="middle" font-size="11" fill="#aaa">수조 파라미터 모델</text>
  <text x="788" y="216" text-anchor="middle" font-size="11" fill="#666">데이터: 수조 토큰</text>
  <text x="788" y="232" text-anchor="middle" font-size="11" fill="#666">설명성: 극히 낮음</text>

  <!-- Data tradeoff chart -->
  <text x="440" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#888">데이터 규모 vs 성능 트레이드오프</text>
  <rect x="60" y="292" width="760" height="120" rx="8" fill="#111"/>

  <!-- Performance curve (mock) -->
  <text x="80" y="318" font-size="11" fill="#666">성능</text>
  <line x1="100" y1="395" x2="790" y2="395" stroke="#333" stroke-width="1"/>
  <line x1="100" y1="310" x2="100" y2="400" stroke="#333" stroke-width="1"/>

  <!-- Curve line -->
  <path d="M 110 390 Q 200 380 300 360 Q 400 330 500 300 Q 600 280 700 270 Q 750 265 780 264" fill="none" stroke="#55c555" stroke-width="2"/>

  <!-- Saturation zone -->
  <rect x="650" y="310" width="120" height="76" rx="4" fill="#1a2010" stroke="#55c555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="710" y="348" text-anchor="middle" font-size="11" fill="#55c555">수확 체감 구간</text>
  <text x="710" y="364" text-anchor="middle" font-size="11" fill="#666">LLM 스케일링</text>
  <text x="710" y="380" text-anchor="middle" font-size="11" fill="#666">법칙 한계 논쟁</text>

  <!-- X labels -->
  <text x="150" y="408" text-anchor="middle" font-size="10" fill="#555">수백</text>
  <text x="300" y="408" text-anchor="middle" font-size="10" fill="#555">수만</text>
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#555">수백만</text>
  <text x="650" y="408" text-anchor="middle" font-size="10" fill="#555">수십억</text>
  <text x="770" y="408" text-anchor="middle" font-size="10" fill="#555">수조 토큰</text>

  <!-- Footer -->
  <text x="440" y="444" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
