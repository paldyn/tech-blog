<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RabbitMQ 메시지 흐름 아키텍처</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Producer → Exchange → Queue → Consumer</text>

  <!-- Producer box -->
  <rect x="60" y="110" width="160" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Producer</text>
  <text x="140" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">RabbitTemplate</text>
  <text x="140" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.convertAndSend()</text>

  <!-- Arrow: Producer → Exchange -->
  <line x1="220" y1="145" x2="296" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="258" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">routingKey</text>

  <!-- Exchange box -->
  <rect x="300" y="95" width="180" height="100" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="390" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Exchange</text>
  <text x="390" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">direct / topic</text>
  <text x="390" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">fanout / headers</text>
  <text x="390" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Binding + RoutingKey</text>

  <!-- Arrow: Exchange → Queue1 -->
  <line x1="480" y1="130" x2="556" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Arrow: Exchange → Queue2 -->
  <line x1="480" y1="160" x2="556" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Queue 1 -->
  <rect x="560" y="108" width="150" height="60" rx="8" fill="#1a1a1a" stroke="#e09555" stroke-width="1.5"/>
  <text x="635" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09555" text-anchor="middle">Queue A</text>
  <text x="635" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">durable: true</text>

  <!-- Queue 2 -->
  <rect x="560" y="208" width="150" height="60" rx="8" fill="#1a1a1a" stroke="#e09555" stroke-width="1.5"/>
  <text x="635" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09555" text-anchor="middle">Queue B</text>
  <text x="635" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">durable: true</text>

  <!-- Arrow: Queue1 → Consumer1 -->
  <line x1="710" y1="138" x2="766" y2="138" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Arrow: Queue2 → Consumer2 -->
  <line x1="710" y1="238" x2="766" y2="238" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Consumer 1 -->
  <rect x="770" y="108" width="50" height="60" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="795" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">C1</text>
  <text x="795" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">@RKL</text>

  <!-- Consumer 2 -->
  <rect x="770" y="208" width="50" height="60" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="795" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">C2</text>
  <text x="795" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">@RKL</text>

  <!-- Dead Letter section -->
  <rect x="60" y="320" width="760" height="150" rx="8" fill="#1a1515" stroke="#e05555" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Dead Letter Exchange (DLX) 처리 흐름</text>

  <!-- DLX: Main Queue -->
  <rect x="90" y="362" width="150" height="64" rx="6" fill="#1a1a1a" stroke="#e09555" stroke-width="1.5"/>
  <text x="165" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e09555" text-anchor="middle">Main Queue</text>
  <text x="165" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">x-dead-letter-</text>
  <text x="165" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">exchange 설정</text>

  <!-- DLX arrow: reject/expire -->
  <line x1="240" y1="394" x2="316" y2="394" stroke="#e05555" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="278" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">nack/expired</text>

  <!-- DLX Exchange -->
  <rect x="320" y="362" width="140" height="64" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="390" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">DLX</text>
  <text x="390" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Dead Letter</text>
  <text x="390" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Exchange</text>

  <!-- DLX arrow -->
  <line x1="460" y1="394" x2="536" y2="394" stroke="#e05555" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- DLQ -->
  <rect x="540" y="362" width="140" height="64" rx="6" fill="#1a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="610" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">Dead Letter</text>
  <text x="610" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">Queue (DLQ)</text>
  <text x="610" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실패 메시지 보관</text>

  <!-- DLQ arrow -->
  <line x1="680" y1="394" x2="736" y2="394" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Retry consumer -->
  <rect x="740" y="362" width="60" height="64" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">Retry</text>
  <text x="770" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Consumer</text>
  <text x="770" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">or Alert</text>

  <!-- Legend -->
  <text x="440" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">@RKL = @RabbitListener</text>
</svg>
