<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Web Storage 코드 패턴</text>

  <!-- Left: typed wrapper -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">타입 안전 래퍼</text>

  <rect x="60" y="94" width="370" height="180" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function <text fill="#ffffff">store(key, val) {</text></text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  localStorage.<text fill="#7ec8e3">setItem</text><text fill="#e8e8e8">(key, </text><text fill="#7ec8e3">JSON</text><text fill="#e8e8e8">.</text><text fill="#7ec8e3">stringify</text><text fill="#e8e8e8">(val));</text></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function <text fill="#ffffff">retrieve(key, fallback = </text><text fill="#b5cea8">null</text><text fill="#e8e8e8">) {</text></text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  try <text fill="#ffffff">{</text></text>
  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    const <text fill="#ffffff">raw = localStorage.<text fill="#7ec8e3">getItem</text><text fill="#e8e8e8">(key);</text></text></text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    return <text fill="#ffffff">raw !== </text><text fill="#b5cea8">null </text><text fill="#7ec8e3">? JSON</text><text fill="#e8e8e8">.</text><text fill="#7ec8e3">parse</text><text fill="#e8e8e8">(raw) : fallback;</text></text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  } </text><text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">catch <text fill="#ffffff">{ </text><text fill="#7ec8e3">return <text fill="#e8e8e8">fallback; } }</text></text></text>

  <!-- Right: storage event -->
  <text x="450" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">storage 이벤트 (탭 간 동기화)</text>

  <rect x="450" y="94" width="370" height="180" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 다른 탭에서 변경 시 발생 (같은 탭 X)</text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">window.<text fill="#7ec8e3">addEventListener</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'storage'</text><text fill="#e8e8e8">, e =&gt; {</text></text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  console.<text fill="#7ec8e3">log</text><text fill="#e8e8e8">(e.key);</text></text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  console.<text fill="#7ec8e3">log</text><text fill="#e8e8e8">(e.oldValue);</text></text>
  <text x="466" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  console.<text fill="#7ec8e3">log</text><text fill="#e8e8e8">(e.newValue);</text></text>
  <text x="466" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  console.<text fill="#7ec8e3">log</text><text fill="#e8e8e8">(e.storageArea); </text><text fill="#6a8aa0">// localStorage</text></text>
  <text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <text fill="#9aa4b8">// 탭 간 상태 동기화에 활용</text></text>
  <text x="466" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <text fill="#7ec8e3">syncUIState</text><text fill="#e8e8e8">(e.key, e.newValue);</text></text>
  <text x="466" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>

  <!-- Bottom: quota handling -->
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">QuotaExceededError 처리</text>

  <rect x="60" y="318" width="760" height="88" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function <text fill="#ffffff">safeSave(key, val) {</text></text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  try <text fill="#ffffff">{</text></text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    localStorage.<text fill="#7ec8e3">setItem</text><text fill="#e8e8e8">(key, </text><text fill="#7ec8e3">JSON</text><text fill="#e8e8e8">.</text><text fill="#7ec8e3">stringify</text><text fill="#e8e8e8">(val));</text></text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  } catch <text fill="#ffffff">(e) {</text></text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    if <text fill="#ffffff">(e.name === </text><text fill="#ce9178">'QuotaExceededError'</text><text fill="#e8e8e8">) </text><text fill="#7ec8e3">evictOldest</text><text fill="#e8e8e8">(); } }</text></text>
</svg>
