<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Web Storage 코드 패턴</text>

  <!-- Left: typed wrapper -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">타입 안전 래퍼</text>

  <rect x="60" y="94" width="370" height="200" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function <tspan fill="#ffffff">store(key, val) {</tspan></text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">const</tspan> s = <tspan fill="#7ec8e3">JSON</tspan><tspan fill="#e8e8e8">.</tspan><tspan fill="#7ec8e3">stringify</tspan><tspan fill="#e8e8e8">(val);</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  localStorage.<tspan fill="#7ec8e3">setItem</tspan><tspan fill="#e8e8e8">(key, s);</tspan></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function <tspan fill="#ffffff">retrieve(key, fallback = </tspan><tspan fill="#b5cea8">null</tspan><tspan fill="#e8e8e8">) {</tspan></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  try <tspan fill="#ffffff">{</tspan></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    const <tspan fill="#ffffff">raw = localStorage.<tspan fill="#7ec8e3">getItem</tspan><tspan fill="#e8e8e8">(key);</tspan></tspan></text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    return <tspan fill="#ffffff">raw !== </tspan><tspan fill="#b5cea8">null</tspan></text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      ? <tspan fill="#7ec8e3">JSON</tspan><tspan fill="#e8e8e8">.</tspan><tspan fill="#7ec8e3">parse</tspan><tspan fill="#e8e8e8">(raw) : fallback; }</tspan></text><text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">catch <tspan fill="#ffffff">{ </tspan><tspan fill="#7ec8e3">return <tspan fill="#e8e8e8">fallback; } }</tspan></tspan></text>

  <!-- Right: storage event -->
  <text x="450" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">storage 이벤트 (탭 간 동기화)</text>

  <rect x="450" y="94" width="370" height="180" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 다른 탭에서 변경 시 발생 (같은 탭 X)</text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">window.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'storage'</tspan><tspan fill="#e8e8e8">, e =&gt; {</tspan></text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  console.<tspan fill="#7ec8e3">log</tspan><tspan fill="#e8e8e8">(e.key);</tspan></text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  console.<tspan fill="#7ec8e3">log</tspan><tspan fill="#e8e8e8">(e.oldValue);</tspan></text>
  <text x="466" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  console.<tspan fill="#7ec8e3">log</tspan><tspan fill="#e8e8e8">(e.newValue);</tspan></text>
  <text x="466" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  console.<tspan fill="#7ec8e3">log</tspan><tspan fill="#e8e8e8">(e.storageArea); </tspan><tspan fill="#9aa4b8">// localStorage</tspan></text>
  <text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#9aa4b8">// 탭 간 상태 동기화에 활용</tspan></text>
  <text x="466" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">syncUIState</tspan><tspan fill="#e8e8e8">(e.key, e.newValue);</tspan></text>
  <text x="466" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>

  <!-- Bottom: quota handling -->
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">QuotaExceededError 처리</text>

  <rect x="60" y="318" width="760" height="106" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function <tspan fill="#ffffff">safeSave(key, val) {</tspan></text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  try <tspan fill="#ffffff">{</tspan></text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    localStorage.<tspan fill="#7ec8e3">setItem</tspan><tspan fill="#e8e8e8">(key, </tspan><tspan fill="#7ec8e3">JSON</tspan><tspan fill="#e8e8e8">.</tspan><tspan fill="#7ec8e3">stringify</tspan><tspan fill="#e8e8e8">(val));</tspan></text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  } catch <tspan fill="#ffffff">(e) {</tspan></text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    if <tspan fill="#ffffff">(e.name === </tspan><tspan fill="#ce9178">'QuotaExceededError'</tspan><tspan fill="#e8e8e8">) </tspan><tspan fill="#7ec8e3">evictOldest</tspan><tspan fill="#e8e8e8">(); } }</tspan></text>
</svg>
