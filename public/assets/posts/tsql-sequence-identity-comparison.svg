<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">IDENTITY vs SEQUENCE — 자동 증가 키 비교</text>

  <!-- IDENTITY column -->
  <rect x="60" y="72" width="360" height="48" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">IDENTITY</text>

  <!-- SEQUENCE column -->
  <rect x="460" y="72" width="360" height="48" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="640" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">SEQUENCE</text>

  <!-- Row: 범위 -->
  <rect x="60" y="135" width="760" height="40" rx="0" fill="#111120" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">테이블에 종속 (열 속성)</text>
  <text x="640" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">독립 객체 (여러 테이블에서 공유)</text>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">범위</text>
  <line x1="420" y1="135" x2="420" y2="175" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Row: 현재값 조회 -->
  <rect x="60" y="175" width="760" height="40" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">@@IDENTITY / SCOPE_IDENTITY()</text>
  <text x="640" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">NEXT VALUE FOR seq_name</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">현재값</text>
  <line x1="420" y1="175" x2="420" y2="215" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Row: INSERT 없이 생성 -->
  <rect x="60" y="215" width="760" height="40" rx="0" fill="#111120" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">불가 (INSERT 필요)</text>
  <text x="640" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">가능 (NEXT VALUE FOR 단독)</text>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">독립 생성</text>
  <line x1="420" y1="215" x2="420" y2="255" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Row: 재설정 -->
  <rect x="60" y="255" width="760" height="40" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">DBCC CHECKIDENT (번거로움)</text>
  <text x="640" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">ALTER SEQUENCE ... RESTART WITH</text>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">재설정</text>
  <line x1="420" y1="255" x2="420" y2="295" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Row: CACHE -->
  <rect x="60" y="295" width="760" height="40" rx="0" fill="#111120" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">내부 캐시 (설정 불가)</text>
  <text x="640" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">CACHE N 옵션으로 성능 조정</text>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">캐시</text>
  <line x1="420" y1="295" x2="420" y2="335" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Row: CYCLE -->
  <rect x="60" y="335" width="760" height="40" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">지원 안 함</text>
  <text x="640" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">CYCLE / NO CYCLE 선택 가능</text>
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">순환</text>
  <line x1="420" y1="335" x2="420" y2="375" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Row: 주요 사용처 -->
  <rect x="60" y="375" width="760" height="40" rx="0" fill="#111120" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">단순 PK 자동생성</text>
  <text x="640" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">여러 테이블 공유 / 배치 채번</text>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">사용처</text>
  <line x1="420" y1="375" x2="420" y2="415" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Note -->
  <text x="440" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">IDENTITY는 SQL Server 7.0부터 · SEQUENCE는 SQL Server 2012(T-SQL 2011 표준) 도입</text>
  <text x="440" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">새 프로젝트에는 유연성이 높은 SEQUENCE 사용을 권장</text>
</svg>
