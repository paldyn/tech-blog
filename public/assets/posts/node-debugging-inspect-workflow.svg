<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">Node.js 디버깅 워크플로우</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">--inspect 플래그 → Chrome DevTools / VS Code 연결</text>

  <!-- Step 1: Start -->
  <rect x="60" y="100" width="200" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="136" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">1. 앱 시작</text>
  <text x="160" y="158" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">node --inspect app.js</text>
  <text x="160" y="174" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">또는 --inspect-brk</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="140" x2="310" y2="140" stroke="#888" stroke-width="1.5"/>
  <polygon points="310,140 302,135 302,145" fill="#888"/>

  <!-- Step 2: Inspector -->
  <rect x="310" y="100" width="200" height="80" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="410" y="136" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">2. Inspector 활성화</text>
  <text x="410" y="158" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">ws://127.0.0.1:9229</text>
  <text x="410" y="174" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">UUID endpoint 노출</text>

  <!-- Arrow 2→3 -->
  <line x1="510" y1="140" x2="560" y2="140" stroke="#888" stroke-width="1.5"/>
  <polygon points="560,140 552,135 552,145" fill="#888"/>

  <!-- Step 3: Connect -->
  <rect x="560" y="100" width="260" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="690" y="130" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">3. 디버거 연결</text>
  <text x="690" y="152" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">chrome://inspect</text>
  <text x="690" y="170" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">VS Code launch.json</text>

  <!-- DevTools features -->
  <rect x="60" y="220" width="380" height="200" rx="8" fill="#111218" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="248" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">Chrome DevTools 기능</text>
  <text x="80" y="272" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Sources</text>
  <text x="80" y="290" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">중단점(breakpoint), 스텝 실행, 변수 조회</text>
  <text x="80" y="316" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Memory</text>
  <text x="80" y="334" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">힙 스냅샷, 메모리 누수 탐지</text>
  <text x="80" y="360" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Profiler</text>
  <text x="80" y="378" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">CPU 프로파일, 플레임 차트</text>
  <text x="80" y="404" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Console</text>
  <text x="80" y="422" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">REPL, 실시간 표현식 평가</text>

  <!-- VS Code launch.json -->
  <rect x="460" y="220" width="360" height="200" rx="8" fill="#111218" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="248" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">VS Code launch.json</text>
  <text x="480" y="272" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">{</text>
  <text x="480" y="290" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">  "type"</text>
  <text x="544" y="290" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">: </text>
  <text x="560" y="290" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">"node"</text>
  <text x="480" y="308" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">  "request"</text>
  <text x="552" y="308" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">: </text>
  <text x="568" y="308" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">"launch"</text>
  <text x="480" y="326" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">  "program"</text>
  <text x="554" y="326" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">: </text>
  <text x="570" y="326" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">"${workspaceFolder}/app.js"</text>
  <text x="480" y="344" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">  "stopOnEntry"</text>
  <text x="578" y="344" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">: </text>
  <text x="594" y="344" fill="#b5cea8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">false</text>
  <text x="480" y="362" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">  "skipFiles"</text>
  <text x="556" y="362" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">: [</text>
  <text x="578" y="362" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">"&lt;node_internals&gt;/**"</text>
  <text x="700" y="362" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">]</text>
  <text x="480" y="402" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">}</text>

  <!-- Bottom note -->
  <text x="440" y="450" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">--inspect-brk: 첫 줄에서 일시 중지 (초기화 코드 디버깅). --inspect: 즉시 실행 후 연결 대기</text>
</svg>
