<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">VCS의 세 가지 핵심 기능</text>

  <!-- Card 1: 스냅샷 -->
  <rect x="60" y="80" width="230" height="340" rx="10" fill="#111" stroke="#1e2a3a"/>
  <text x="175" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">스냅샷</text>
  <text x="175" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(Snapshot)</text>

  <!-- Snapshot stack -->
  <rect x="82" y="152" width="186" height="34" rx="5" fill="#0d1520" stroke="#1e3050"/>
  <text x="175" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">v1 · 2024-01-10</text>

  <rect x="82" y="196" width="186" height="34" rx="5" fill="#0d1520" stroke="#1e3050"/>
  <text x="175" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">v2 · 2024-01-12</text>

  <rect x="82" y="240" width="186" height="34" rx="5" fill="#0d1520" stroke="#1e3050"/>
  <text x="175" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">v3 · 2024-01-15  ← HEAD</text>

  <text x="175" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">변경 시점마다 전체</text>
  <text x="175" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">상태를 저장</text>
  <text x="175" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 언제든 되돌리기 가능</text>

  <!-- Arrow 1→2 -->
  <line x1="296" y1="250" x2="326" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Card 2: 브랜치 -->
  <rect x="330" y="80" width="220" height="340" rx="10" fill="#111" stroke="#1a2a1a"/>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">브랜치</text>
  <text x="440" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(Branch)</text>

  <!-- Branch diagram -->
  <!-- main line -->
  <circle cx="380" cy="180" r="8" fill="#55c555"/>
  <circle cx="440" cy="180" r="8" fill="#55c555"/>
  <line x1="388" y1="180" x2="432" y2="180" stroke="#55c555" stroke-width="2"/>
  <text x="410" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">main</text>

  <!-- feature branch -->
  <line x1="388" y1="180" x2="400" y2="230" stroke="#7777cc" stroke-width="2"/>
  <circle cx="400" cy="230" r="8" fill="#7777cc"/>
  <circle cx="460" cy="230" r="8" fill="#7777cc"/>
  <line x1="408" y1="230" x2="452" y2="230" stroke="#7777cc" stroke-width="2"/>
  <text x="430" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">feature</text>

  <!-- merge back -->
  <line x1="466" y1="226" x2="480" y2="186" stroke="#7777cc" stroke-width="2"/>
  <circle cx="480" cy="180" r="8" fill="#55c555" stroke="#7777cc" stroke-width="2"/>

  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">독립된 작업 흐름을</text>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">분리해서 진행</text>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 기능 개발 · 버그 수정 병렬</text>

  <!-- Arrow 2→3 -->
  <line x1="556" y1="250" x2="586" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Card 3: 협업 -->
  <rect x="590" y="80" width="230" height="340" rx="10" fill="#111" stroke="#2a2a1a"/>
  <text x="705" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8c55e">협업</text>
  <text x="705" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(Collaboration)</text>

  <!-- Collaboration icons -->
  <circle cx="660" cy="190" r="20" fill="#1a1a0d" stroke="#3a3a1a"/>
  <text x="660" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8c55e">A</text>

  <circle cx="750" cy="190" r="20" fill="#1a1a0d" stroke="#3a3a1a"/>
  <text x="750" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8c55e">B</text>

  <rect x="680" y="220" width="46" height="28" rx="5" fill="#1a1a1a" stroke="#3a3a2a"/>
  <text x="703" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Remote</text>

  <line x1="672" y1="208" x2="688" y2="222" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="718" y1="222" x2="736" y2="208" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="705" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">여러 명이 동시에</text>
  <text x="705" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">작업 후 통합</text>
  <text x="705" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 충돌 감지 · 자동 병합</text>

  <!-- bottom label -->
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">Git은 이 세 가지를 로컬에서 완전하게 제공하는 분산형 VCS</text>
</svg>
