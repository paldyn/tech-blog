<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">히스토리에서 비밀 파일 제거</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">filter-repo로 파일을 지우고 강제로 덮어쓴다</text>

  <rect x="60" y="100" width="760" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="130" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># .env 파일을 전체 히스토리에서 삭제</text>
  <text xml:space="preserve" x="80" y="154" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git filter-repo --path .env --invert-paths</text>
  <text xml:space="preserve" x="80" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 특정 문자열만 마스킹 (키 패턴)</text>
  <text xml:space="preserve" x="80" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git filter-repo --replace-text patterns.txt</text>
  <text xml:space="preserve" x="80" y="242" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 재작성된 히스토리를 강제로 push</text>
  <text xml:space="preserve" x="80" y="266" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git push origin --force --all</text>

  <text x="60" y="305" font-size="13" fill="#888">patterns.txt 한 줄 예시: <tspan fill="#ce9178" font-family="'JetBrains Mono',monospace">AKIA****==&gt;REMOVED</tspan></text>
  <text x="60" y="328" font-size="13" fill="#888">force push 후 모든 협업자는 기존 clone을 버리고 새로 받아야 한다</text>
</svg>
