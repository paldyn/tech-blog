<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSON.stringify 옵션</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">replacer · space · toJSON — 직렬화 제어</text>

  <!-- signature box -->
  <rect x="60" y="95" width="760" height="44" rx="8" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">JSON.stringify(value, replacer?, space?)</text>
  <text x="440" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">value: 직렬화할 값  |  replacer: 필터/변환 함수 또는 키 배열  |  space: 들여쓰기</text>

  <!-- Code block -->
  <rect x="60" y="152" width="760" height="296" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">replacer와 space 활용</text>
  <rect x="72" y="182" width="736" height="254" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="88" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> obj = { name: </tspan><tspan fill="#ce9178">'Alice'</tspan><tspan fill="#ffffff">, age: </tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#ffffff">, secret: </tspan><tspan fill="#ce9178">'pw123'</tspan><tspan fill="#ffffff"> };</tspan></text>

  <text x="88" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 배열 replacer — 허용할 키만</text>
  <text x="88" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">JSON.stringify(obj, [</tspan><tspan fill="#ce9178">'name'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'age'</tspan><tspan fill="#ffffff">]); </tspan><tspan fill="#9aa4b8">// '{"name":"Alice","age":30}'</tspan></text>

  <text x="88" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 함수 replacer — 변환·필터링</text>
  <text x="88" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">JSON.stringify(obj, (key, val) =&gt; {</text>
  <text x="88" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  if</tspan><tspan fill="#ffffff"> (key === </tspan><tspan fill="#ce9178">'secret'</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#7ec8e3"> undefined</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// 제외</tspan></text>
  <text x="88" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3">typeof</tspan><tspan fill="#ffffff"> val === </tspan><tspan fill="#ce9178">'string'</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> val.toUpperCase();</tspan></text>
  <text x="88" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  return</text><text x="148" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> val;</text>
  <text x="88" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}); </text><text x="136" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// '{"name":"ALICE","age":30}'</text>

  <text x="88" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// space — 들여쓰기 (숫자: 칸수, 문자열: 구분자)</text>
  <text x="88" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">JSON.stringify({ a: </text><text x="236" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text><text x="248" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, b: </text><text x="284" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text><text x="296" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> }, </text><text x="320" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">null</text><text x="356" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text><text x="372" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text><text x="384" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">); </text><text x="404" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// '{\n  "a": 1,\n  "b": 2\n}'</text>
  <text x="88" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">JSON.stringify({ a: </text><text x="236" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text><text x="248" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> }, </text><text x="272" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">null</text><text x="308" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text><text x="324" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'\t'</text><text x="352" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">); </text><text x="378" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 탭 들여쓰기</text>
  <text x="88" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ⚠ undefined, Function, Symbol은 직렬화 안 됨 (undefined 반환)</text>
</svg>
