<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">텍스트 → 토큰 → ID 변환 파이프라인</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">LLM은 문자열을 직접 처리하지 않는다 — 정수 ID 시퀀스로 변환한다</text>

  <!-- Raw Text -->
  <rect x="60" y="94" width="760" height="56" rx="8" fill="#111820" stroke="#1e2433"/>
  <text x="90" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">입력 문자열</text>
  <text x="90" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#ce9178">"Hello, 안녕하세요! GPT-4는 어떻게 작동하나요?"</text>

  <!-- Arrow -->
  <line x1="440" y1="150" x2="440" y2="176" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="432,176 440,192 448,176" fill="#7ec8e3"/>
  <text x="460" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">tokenize()</text>

  <!-- Tokens -->
  <rect x="60" y="192" width="760" height="80" rx="8" fill="#0a1428" stroke="#1e3a5e"/>
  <text x="90" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">서브워드 토큰</text>

  <!-- Token boxes -->
  <rect x="90" y="222" width="58" height="30" rx="4" fill="#1e2d44" stroke="#3e5a88"/>
  <text x="119" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">Hello</text>

  <rect x="154" y="222" width="22" height="30" rx="4" fill="#1e2d44" stroke="#3e5a88"/>
  <text x="165" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">,</text>

  <rect x="182" y="222" width="28" height="30" rx="4" fill="#1e3a1e" stroke="#2e5a2e"/>
  <text x="196" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">안녕</text>

  <rect x="216" y="222" width="28" height="30" rx="4" fill="#1e3a1e" stroke="#2e5a2e"/>
  <text x="230" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">하세</text>

  <rect x="250" y="222" width="20" height="30" rx="4" fill="#1e3a1e" stroke="#2e5a2e"/>
  <text x="260" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">요</text>

  <rect x="276" y="222" width="14" height="30" rx="4" fill="#1e2d44" stroke="#3e5a88"/>
  <text x="283" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">!</text>

  <rect x="296" y="222" width="40" height="30" rx="4" fill="#1e2d44" stroke="#3e5a88"/>
  <text x="316" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">GP</text>

  <rect x="342" y="222" width="20" height="30" rx="4" fill="#1e2d44" stroke="#3e5a88"/>
  <text x="352" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">T</text>

  <rect x="368" y="222" width="22" height="30" rx="4" fill="#1e2d44" stroke="#3e5a88"/>
  <text x="379" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">-4</text>

  <rect x="396" y="222" width="20" height="30" rx="4" fill="#1e3a1e" stroke="#2e5a2e"/>
  <text x="406" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">는</text>

  <rect x="422" y="222" width="40" height="30" rx="4" fill="#1e3a1e" stroke="#2e5a2e"/>
  <text x="442" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">어떻</text>

  <rect x="468" y="222" width="28" height="30" rx="4" fill="#1e3a1e" stroke="#2e5a2e"/>
  <text x="482" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">게</text>

  <rect x="502" y="222" width="40" height="30" rx="4" fill="#1e3a1e" stroke="#2e5a2e"/>
  <text x="522" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">작동</text>

  <rect x="548" y="222" width="40" height="30" rx="4" fill="#1e3a1e" stroke="#2e5a2e"/>
  <text x="568" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">하나</text>

  <rect x="594" y="222" width="20" height="30" rx="4" fill="#1e3a1e" stroke="#2e5a2e"/>
  <text x="604" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">요</text>

  <rect x="620" y="222" width="14" height="30" rx="4" fill="#1e2d44" stroke="#3e5a88"/>
  <text x="627" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">?</text>

  <text x="650" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">총 16 토큰</text>

  <!-- Arrow -->
  <line x1="440" y1="272" x2="440" y2="298" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="432,298 440,314 448,298" fill="#7ec8e3"/>
  <text x="460" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">convert_to_ids()</text>

  <!-- Token IDs -->
  <rect x="60" y="314" width="760" height="56" rx="8" fill="#0f120a" stroke="#2a3a1e"/>
  <text x="90" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">토큰 ID (정수)</text>
  <text x="90" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">[9906, 11, 21552, 18696, 25, 0, 14238, 51, 12, 19, 14256, 24245, 17501, ...]</text>

  <!-- Bottom info -->
  <rect x="60" y="390" width="230" height="82" rx="8" fill="#111" stroke="#222"/>
  <text x="175" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">어휘 크기(Vocab)</text>
  <text x="175" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">GPT-2: 50,257</text>
  <text x="175" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">GPT-4: 100,277</text>
  <text x="175" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">LLaMA 3: 128,256</text>

  <rect x="325" y="390" width="230" height="82" rx="8" fill="#111" stroke="#222"/>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">특수 토큰</text>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">[BOS] 문장 시작</text>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">[EOS] 문장 끝</text>
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">[PAD] [MASK] [UNK]</text>

  <rect x="590" y="390" width="230" height="82" rx="8" fill="#111" stroke="#222"/>
  <text x="705" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">한국어 특성</text>
  <text x="705" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">영어보다 2~4배</text>
  <text x="705" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">더 많은 토큰 소비</text>
  <text x="705" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">한국어 특화 vocab 필요</text>
</svg>
