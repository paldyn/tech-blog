<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CommonJS vs ES 모듈 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">CJS(require) · ESM(import) 핵심 차이</text>

  <!-- Headers -->
  <rect x="60" y="88" width="355" height="40" rx="8" fill="#1a1206" stroke="#4a3a0e" stroke-width="1.5"/>
  <text x="237" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8c842">CommonJS (CJS)</text>

  <rect x="465" y="88" width="355" height="40" rx="8" fill="#0d1a0d" stroke="#1e4a1e" stroke-width="1.5"/>
  <text x="642" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">ES 모듈 (ESM)</text>

  <!-- Row 1: Syntax -->
  <text x="440" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">문법</text>
  <rect x="60" y="158" width="355" height="60" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const </text>
  <text x="112" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">{ add } = require(</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">  './math'</text>
  <text x="124" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">);</text>

  <rect x="465" y="158" width="355" height="60" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="481" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">import </text>
  <text x="517" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">{ add } </text>
  <text x="565" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">from </text>
  <text x="599" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'./math.mjs'</text>
  <text x="685" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="481" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">module.exports</text>
  <text x="573" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> → </text>
  <text x="597" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">export</text>

  <!-- Row 2: Loading -->
  <text x="440" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">로드 방식</text>
  <rect x="60" y="246" width="355" height="44" rx="6" fill="#1a1206" stroke="#2a1a06"/>
  <text x="237" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c842">동기(Synchronous)</text>
  <text x="237" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">require() 호출 시 즉시 로드 · 블로킹</text>

  <rect x="465" y="246" width="355" height="44" rx="6" fill="#0d1a0d" stroke="#0d2a0d"/>
  <text x="642" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">비동기(Asynchronous)</text>
  <text x="642" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실행 전 의존성 그래프 구성 · 비블로킹</text>

  <!-- Row 3: Binding -->
  <text x="440" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">바인딩</text>
  <rect x="60" y="320" width="355" height="44" rx="6" fill="#1a1206" stroke="#2a1a06"/>
  <text x="237" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c842">복사 (Copy)</text>
  <text x="237" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">require 시점 값 복사 · 이후 변경 미반영</text>

  <rect x="465" y="320" width="355" height="44" rx="6" fill="#0d1a0d" stroke="#0d2a0d"/>
  <text x="642" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">라이브 (Live Binding)</text>
  <text x="642" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">내보낸 값 변경 시 즉시 반영</text>

  <!-- Row 4: Tree shaking / strict -->
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트리쉐이킹 / 엄격모드</text>
  <rect x="60" y="394" width="355" height="44" rx="6" fill="#1a1206" stroke="#2a1a06"/>
  <text x="237" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">트리쉐이킹 어려움</text>
  <text x="237" y="431" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">strict mode 수동 · 동적 require 가능</text>

  <rect x="465" y="394" width="355" height="44" rx="6" fill="#0d1a0d" stroke="#0d2a0d"/>
  <text x="642" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">트리쉐이킹 최적화</text>
  <text x="642" y="431" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">항상 strict mode · 정적 경로만</text>

  <!-- Footer -->
  <text x="440" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — JavaScript 완전 정복</text>
</svg>
