<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MHA vs MQA vs GQA 구조 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Query 헤드 수는 유지하고 KV 헤드를 줄여 KV Cache를 경량화한다</text>

  <!-- MHA -->
  <rect x="40" y="92" width="240" height="370" rx="10" fill="#111" stroke="#222"/>
  <text x="160" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">MHA (Multi-Head)</text>

  <!-- 4 Q heads -->
  <text x="160" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Query 헤드</text>
  <rect x="62" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="84" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q1</text>
  <rect x="114" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="136" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q2</text>
  <rect x="166" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="188" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q3</text>
  <rect x="218" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="240" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q4</text>

  <!-- 4 KV heads -->
  <text x="160" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">KV 헤드</text>
  <rect x="62" y="220" width="44" height="28" rx="4" fill="#e05555" opacity="0.7"/>
  <text x="84" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">KV1</text>
  <rect x="114" y="220" width="44" height="28" rx="4" fill="#e05555" opacity="0.7"/>
  <text x="136" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">KV2</text>
  <rect x="166" y="220" width="44" height="28" rx="4" fill="#e05555" opacity="0.7"/>
  <text x="188" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">KV3</text>
  <rect x="218" y="220" width="44" height="28" rx="4" fill="#e05555" opacity="0.7"/>
  <text x="240" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">KV4</text>

  <!-- Connections MHA -->
  <line x1="84" y1="178" x2="84" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="136" y1="178" x2="136" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="188" y1="178" x2="188" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="240" y1="178" x2="240" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>

  <rect x="72" y="278" width="176" height="40" rx="6" fill="#1a1a2a" stroke="#2a2a4a"/>
  <text x="160" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">KV Cache 크기</text>
  <text x="160" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">4 × (K+V)</text>

  <rect x="72" y="334" width="176" height="64" rx="6" fill="#111820" stroke="#3a4a6e"/>
  <text x="160" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">품질 최고</text>
  <text x="160" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">메모리: 100%</text>
  <text x="160" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">GPT-3, BERT</text>

  <!-- MQA -->
  <rect x="320" y="92" width="240" height="370" rx="10" fill="#111" stroke="#222"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">MQA (Multi-Query)</text>

  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Query 헤드</text>
  <rect x="342" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="364" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q1</text>
  <rect x="394" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="416" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q2</text>
  <rect x="446" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="468" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q3</text>
  <rect x="498" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="520" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q4</text>

  <text x="440" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">KV 헤드 (공유 1개)</text>
  <rect x="418" y="220" width="44" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="440" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">KV</text>

  <!-- All Q -> single KV -->
  <line x1="364" y1="178" x2="440" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="416" y1="178" x2="440" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="468" y1="178" x2="440" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="520" y1="178" x2="440" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>

  <rect x="352" y="278" width="176" height="40" rx="6" fill="#1a1a2a" stroke="#2a2a4a"/>
  <text x="440" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">KV Cache 크기</text>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">1 × (K+V)</text>

  <rect x="352" y="334" width="176" height="64" rx="6" fill="#111820" stroke="#3a4a6e"/>
  <text x="440" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">품질 소폭 하락</text>
  <text x="440" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">메모리: 25%</text>
  <text x="440" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">PaLM, Falcon</text>

  <!-- GQA -->
  <rect x="600" y="92" width="240" height="370" rx="10" fill="#111" stroke="#222"/>
  <text x="720" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">GQA (Grouped-Query)</text>

  <text x="720" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Query 헤드</text>
  <rect x="622" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="644" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q1</text>
  <rect x="674" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="696" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q2</text>
  <rect x="726" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="748" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q3</text>
  <rect x="778" y="150" width="44" height="28" rx="4" fill="#7ec8e3" opacity="0.7"/>
  <text x="800" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">Q4</text>

  <text x="720" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">KV 헤드 (2개 그룹)</text>
  <rect x="666" y="220" width="44" height="28" rx="4" fill="#7777cc" opacity="0.8"/>
  <text x="688" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">KV_A</text>
  <rect x="730" y="220" width="44" height="28" rx="4" fill="#7777cc" opacity="0.8"/>
  <text x="752" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">KV_B</text>

  <!-- Q1,Q2 -> KV_A; Q3,Q4 -> KV_B -->
  <line x1="644" y1="178" x2="688" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="696" y1="178" x2="688" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="748" y1="178" x2="752" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="800" y1="178" x2="752" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="3,2"/>

  <rect x="632" y="278" width="176" height="40" rx="6" fill="#1a1a2a" stroke="#2a2a4a"/>
  <text x="720" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">KV Cache 크기</text>
  <text x="720" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">G × (K+V)</text>

  <rect x="632" y="334" width="176" height="64" rx="6" fill="#111820" stroke="#3a4a6e"/>
  <text x="720" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">MHA 수준 품질</text>
  <text x="720" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">메모리: G/H × 100%</text>
  <text x="720" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">LLaMA 3, Mistral</text>
</svg>
