<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Web Crypto API 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">crypto.subtle 주요 기능 분류</text>

  <!-- Center: crypto.subtle -->
  <rect x="330" y="170" width="220" height="70" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">crypto.subtle</text>
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">SubtleCrypto 인터페이스</text>

  <!-- Hashing -->
  <rect x="60" y="90" width="200" height="70" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">해시</text>
  <text x="160" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SHA-256 / SHA-384 / SHA-512</text>

  <line x1="260" y1="138" x2="328" y2="188" stroke="#444" stroke-width="1.5"/>
  <polygon points="322,184 334,189 325,196" fill="#444"/>

  <!-- Key Generation -->
  <rect x="60" y="200" width="200" height="70" rx="8" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">키 생성/가져오기</text>
  <text x="160" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">generateKey / importKey / exportKey</text>

  <line x1="260" y1="225" x2="328" y2="215" stroke="#444" stroke-width="1.5"/>
  <polygon points="323,209 335,215 325,222" fill="#444"/>

  <!-- Encrypt/Decrypt -->
  <rect x="60" y="310" width="200" height="70" rx="8" fill="#1f1400" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="160" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8b84b">암호화/복호화</text>
  <text x="160" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AES-GCM / RSA-OAEP</text>

  <line x1="260" y1="335" x2="328" y2="252" stroke="#444" stroke-width="1.5"/>
  <polygon points="322,248 334,253 325,260" fill="#444"/>

  <!-- Sign/Verify -->
  <rect x="620" y="90" width="200" height="70" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">서명/검증</text>
  <text x="720" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HMAC / ECDSA / RSA-PSS</text>

  <line x1="620" y1="138" x2="552" y2="188" stroke="#444" stroke-width="1.5"/>
  <polygon points="558,184 546,189 555,196" fill="#444"/>

  <!-- ECDH / HKDF -->
  <rect x="620" y="200" width="200" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">키 파생</text>
  <text x="720" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ECDH / HKDF / PBKDF2</text>

  <line x1="620" y1="225" x2="552" y2="215" stroke="#444" stroke-width="1.5"/>
  <polygon points="557,209 545,215 555,222" fill="#444"/>

  <!-- Random -->
  <rect x="620" y="310" width="200" height="70" rx="8" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">난수 생성</text>
  <text x="720" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">crypto.getRandomValues()</text>

  <line x1="620" y1="335" x2="552" y2="252" stroke="#444" stroke-width="1.5"/>
  <polygon points="557,248 545,253 555,260" fill="#444"/>

  <!-- UUID -->
  <rect x="330" y="350" width="220" height="50" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="371" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">crypto.randomUUID()</text>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RFC 4122 v4 UUID 생성</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">모든 subtle 메서드는 Promise 반환 · HTTPS 또는 localhost 필수</text>
</svg>
