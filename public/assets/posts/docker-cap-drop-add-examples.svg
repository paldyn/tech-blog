<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <!-- background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">cap-drop/add 실전 패턴</text>

  <!-- Left: CLI -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">CLI 예시</text>

  <rect x="60" y="88" width="390" height="204" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#9aa4b8"># 모든 capability 제거 후 필요한 것만 추가</text>
  <text x="76" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">docker run --cap-drop=ALL \</text>
  <text x="76" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  --cap-add=NET_BIND_SERVICE \</text>
  <text x="76" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  --cap-add=CHOWN \</text>
  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  nginx:alpine</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#9aa4b8"># 위험한 capability만 제거</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">docker run \</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  --cap-drop=NET_RAW \</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  --cap-drop=MKNOD \</text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  myapp:latest</text>

  <!-- Right: Compose -->
  <text x="470" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">docker-compose.yml</text>

  <rect x="470" y="88" width="350" height="204" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">services:</text>
  <text x="486" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  web:</text>
  <text x="486" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">    image: nginx:alpine</text>
  <text x="486" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">    cap_drop</text><text x="586" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" font-size="13" fill="#ffffff">:</text>
  <text x="486" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">      - ALL</text>
  <text x="486" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">    cap_add</text><text x="578" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" font-size="13" fill="#ffffff">:</text>
  <text x="486" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">      - NET_BIND_SERVICE</text>
  <text x="486" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">      - CHOWN</text>
  <text x="486" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">      - SETUID</text>
  <text x="486" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">      - SETGID</text>

  <!-- App-specific recommendations -->
  <rect x="60" y="314" width="760" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">앱 유형별 최소 capability</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">일반 웹앱(고번호 포트): ALL DROP → 추가 없음 가능 | Nginx: NET_BIND_SERVICE, CHOWN, SETUID/GID</text>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ping/traceroute: NET_RAW 필요 | tcpdump: NET_RAW + SYS_PTRACE | cron: SYS_NICE</text>
</svg>
