<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Dedicated vs Shared Worker</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">1:1 전용 스레드 vs 다중 탭 공유 스레드</text>

  <!-- ── Dedicated Worker (left) ── -->
  <rect x="50" y="92" width="360" height="330" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="50" y="92" width="360" height="36" rx="8" fill="#0f2530"/>
  <rect x="50" y="113" width="360" height="15" fill="#0f2530"/>
  <text x="230" y="113" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="700" fill="#7ec8e3">Dedicated Worker</text>

  <!-- Tab 1 and its worker -->
  <rect x="70" y="148" width="140" height="50" rx="6" fill="#1a1f35" stroke="#3a4a6e"/>
  <text x="140" y="173" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">Tab 1 (Page A)</text>
  <text x="140" y="189" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">메인 스레드</text>

  <rect x="230" y="148" width="140" height="50" rx="6" fill="#1a2b1a" stroke="#7ec8e3"/>
  <text x="300" y="173" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">Worker A</text>
  <text x="300" y="189" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">전용 스레드</text>

  <rect x="70" y="220" width="140" height="50" rx="6" fill="#1a1f35" stroke="#3a4a6e"/>
  <text x="140" y="245" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">Tab 2 (Page A)</text>
  <text x="140" y="261" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">메인 스레드</text>

  <rect x="230" y="220" width="140" height="50" rx="6" fill="#1a2b1a" stroke="#7ec8e3"/>
  <text x="300" y="245" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">Worker B</text>
  <text x="300" y="261" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">전용 스레드 (새 인스턴스)</text>

  <!-- Arrow: Tab1 ↔ WorkerA -->
  <line x1="210" y1="173" x2="230" y2="173" stroke="#7ec8e3" stroke-width="1.5"/>
  <!-- Arrow: Tab2 ↔ WorkerB -->
  <line x1="210" y1="245" x2="230" y2="245" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Characteristics -->
  <rect x="70" y="292" width="300" height="112" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="220" y="312" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#888">특징</text>
  <text x="85" y="332"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">✅ 탭마다 독립 상태</text>
  <text x="85" y="350"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">✅ 간단한 postMessage</text>
  <text x="85" y="368"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">❌ 탭 간 상태 공유 불가</text>
  <text x="85" y="386"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">❌ 탭마다 별도 메모리</text>
  <text x="85" y="404"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">new Worker(url)</text>

  <!-- ── Shared Worker (right) ── -->
  <rect x="470" y="92" width="360" height="330" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="2"/>
  <rect x="470" y="92" width="360" height="36" rx="8" fill="#1a1f35"/>
  <rect x="470" y="113" width="360" height="15" fill="#1a1f35"/>
  <text x="650" y="113" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="700" fill="#7777cc">Shared Worker</text>

  <!-- Tab 1 and shared worker -->
  <rect x="490" y="148" width="130" height="50" rx="6" fill="#1a1f35" stroke="#3a4a6e"/>
  <text x="555" y="173" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">Tab 1</text>
  <text x="555" y="189" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">port1</text>

  <rect x="490" y="220" width="130" height="50" rx="6" fill="#1a1f35" stroke="#3a4a6e"/>
  <text x="555" y="245" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">Tab 2</text>
  <text x="555" y="261" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">port2</text>

  <rect x="490" y="292" width="130" height="50" rx="6" fill="#1a1f35" stroke="#3a4a6e"/>
  <text x="555" y="317" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">iframe</text>
  <text x="555" y="333" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">port3</text>

  <!-- Shared Worker single instance -->
  <rect x="660" y="180" width="150" height="120" rx="8" fill="#1a1f35" stroke="#7777cc" stroke-width="2"/>
  <text x="735" y="204" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="700" fill="#7777cc">Shared</text>
  <text x="735" y="222" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="700" fill="#7777cc">Worker</text>
  <text x="735" y="245" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">단일 인스턴스</text>
  <text x="735" y="263" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">공유 상태</text>
  <text x="735" y="281" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">onconnect</text>

  <!-- Arrows: tabs → shared worker -->
  <line x1="620" y1="173" x2="660" y2="220" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="620" y1="245" x2="660" y2="240" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="620" y1="317" x2="660" y2="270" stroke="#7777cc" stroke-width="1.5"/>

  <!-- Characteristics -->
  <rect x="490" y="356" width="320" height="48" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="650" y="375" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">✅ 탭 간 상태 공유  ✅ 메모리 효율</text>
  <text x="650" y="395" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">❌ port 관리 복잡  ❌ Firefox·Safari 제한</text>
</svg>
