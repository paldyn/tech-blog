<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript 모듈 시스템의 역사</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">전역 변수 → IIFE → AMD → CJS → UMD → ESM</text>

  <!-- Timeline line -->
  <line x1="80" y1="200" x2="800" y2="200" stroke="#374151" stroke-width="2"/>

  <!-- Era 1: Global (2005) -->
  <circle cx="100" cy="200" r="8" fill="#e05555" stroke="#ff6666" stroke-width="2"/>
  <text x="100" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">~2005</text>
  <text x="100" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">전역 변수</text>
  <text x="100" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">window.jQuery</text>
  <text x="100" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">전역 오염</text>

  <!-- Era 2: IIFE (2008) -->
  <circle cx="220" cy="200" r="8" fill="#e8c842" stroke="#f0d060" stroke-width="2"/>
  <text x="220" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2008</text>
  <text x="220" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8c842">IIFE 패턴</text>
  <text x="220" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(function(){})();</text>
  <text x="220" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">스코프 격리</text>

  <!-- Era 3: AMD (2010) -->
  <circle cx="360" cy="200" r="8" fill="#7ec8e3" stroke="#90d8f0" stroke-width="2"/>
  <text x="360" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2010</text>
  <text x="360" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">AMD</text>
  <text x="360" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">RequireJS</text>
  <text x="360" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">브라우저 비동기</text>

  <!-- Era 4: CJS (2009) -->
  <circle cx="490" cy="200" r="8" fill="#7777cc" stroke="#9090dd" stroke-width="2"/>
  <text x="490" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2009</text>
  <text x="490" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">CommonJS</text>
  <text x="490" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Node.js</text>
  <text x="490" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">서버 동기 로드</text>

  <!-- Era 5: UMD (2012) -->
  <circle cx="630" cy="200" r="8" fill="#e8c842" stroke="#f0d060" stroke-width="2"/>
  <text x="630" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2012</text>
  <text x="630" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8c842">UMD</text>
  <text x="630" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">AMD+CJS+Global</text>
  <text x="630" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">범용 래퍼</text>

  <!-- Era 6: ESM (2015) -->
  <circle cx="780" cy="200" r="10" fill="#55c555" stroke="#66d666" stroke-width="2"/>
  <text x="780" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2015</text>
  <text x="780" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">ES 모듈</text>
  <text x="780" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">표준 ★</text>
  <text x="780" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">브라우저+서버</text>

  <!-- Problem box -->
  <rect x="60" y="300" width="340" height="140" rx="8" fill="#1a0808" stroke="#5c1a1a" stroke-width="1.5"/>
  <text x="230" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">모듈 없던 시절의 문제</text>
  <text x="230" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전역 변수 충돌 — jQuery, lodash, moment</text>
  <text x="230" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">script 태그 순서 의존성</text>
  <text x="230" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">의존성 파악 어려움</text>
  <text x="230" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드 재사용 및 테스트 어려움</text>

  <!-- Solution box -->
  <rect x="480" y="300" width="340" height="140" rx="8" fill="#0a1a0a" stroke="#1a5c1a" stroke-width="1.5"/>
  <text x="650" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">오늘날 ESM이 해결한 것</text>
  <text x="650" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일 단위 스코프 — 격리 보장</text>
  <text x="650" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">명시적 의존성 — import로 선언</text>
  <text x="650" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정적 분석 — 트리쉐이킹 가능</text>
  <text x="650" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">브라우저·Node 통합 표준</text>

  <!-- Footer -->
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — JavaScript 완전 정복</text>
</svg>
