<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">권장/비권장 암호 스위트</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">TLS 1.2 · TLS 1.3 암호 스위트 보안 등급</text>

  <!-- 권장 섹션 -->
  <rect x="60" y="88" width="370" height="300" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">✓ 권장 암호 스위트</text>

  <rect x="80" y="126" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">TLS_AES_256_GCM_SHA384</text>

  <rect x="80" y="154" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="169" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">TLS_AES_128_GCM_SHA256</text>

  <rect x="80" y="182" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="197" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">TLS_CHACHA20_POLY1305_SHA256</text>

  <text x="100" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TLS 1.2 (FS 지원)</text>

  <rect x="80" y="233" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="248" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">TLS_ECDHE_RSA_AES_256_GCM_SHA384</text>

  <rect x="80" y="261" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="276" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">TLS_ECDHE_RSA_AES_128_GCM_SHA256</text>

  <rect x="80" y="289" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="304" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">TLS_ECDHE_ECDSA_AES_256_GCM_SHA384</text>

  <text x="100" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">AES-GCM / ChaCha20-Poly1305 (AEAD) + ECDHE</text>
  <text x="100" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Forward Secrecy 보장</text>

  <!-- 비권장 섹션 -->
  <rect x="450" y="88" width="370" height="300" rx="8" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">✗ 비권장 / 취약 암호 스위트</text>

  <rect x="470" y="126" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="635" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">TLS_RSA_WITH_AES_256_CBC_SHA256</text>

  <rect x="470" y="154" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="635" y="169" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">TLS_RSA_WITH_RC4_128_SHA</text>

  <rect x="470" y="182" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="635" y="197" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">TLS_RSA_WITH_3DES_EDE_CBC_SHA</text>

  <rect x="470" y="210" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="635" y="225" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">TLS_NULL_WITH_NULL_NULL</text>

  <rect x="470" y="238" width="330" height="22" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="635" y="253" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">TLS_DH_ANON_WITH_AES_128_CBC_SHA</text>

  <text x="470" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">RSA 키 교환: FS 없음, 과거 트래픽 복호화 가능</text>
  <text x="470" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">RC4: 편향 공격에 취약 (RFC 7465 금지)</text>
  <text x="470" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">3DES: Sweet32 공격 (64비트 블록)</text>
  <text x="470" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">ANON: 인증 없음 → MITM 취약</text>
</svg>
