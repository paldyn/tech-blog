<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="are" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="aro" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09050"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Data Cache 요청 흐름</text>

  <!-- Incoming request -->
  <rect x="60" y="80" width="200" height="64" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="108"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">서버 컴포넌트</text>
  <text x="160" y="130"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">fetch() 호출</text>

  <!-- Arrow to cache check -->
  <line x1="260" y1="112" x2="330" y2="112" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arb)"/>

  <!-- Cache check diamond shape (rect with text) -->
  <rect x="334" y="80" width="212" height="64" rx="8" fill="#1a1000" stroke="#e09050" stroke-width="1.5"/>
  <text x="440" y="108"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09050">Data Cache 확인</text>
  <text x="440" y="130"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">키: URL + 옵션 hash</text>

  <!-- Cache HIT arrow (right) -->
  <line x1="546" y1="112" x2="616" y2="112" stroke="#55c555" stroke-width="2" marker-end="url(#arg)"/>
  <text x="570" y="104"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">HIT</text>

  <!-- Cache hit result -->
  <rect x="620" y="80" width="200" height="64" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="108"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">캐시 반환</text>
  <text x="720" y="130"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">네트워크 요청 없음</text>

  <!-- Cache MISS arrow (down) -->
  <line x1="440" y1="144" x2="440" y2="214" stroke="#e05555" stroke-width="2" marker-end="url(#are)"/>
  <text x="448" y="184"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">MISS</text>

  <!-- External API -->
  <rect x="300" y="218" width="280" height="64" rx="8" fill="#160d20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="246"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">External API / DB</text>
  <text x="440" y="268"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실제 네트워크 요청</text>

  <!-- Arrow: API -> Store -->
  <line x1="440" y1="282" x2="440" y2="352" stroke="#7777cc" stroke-width="2" marker-end="url(#arb)"/>
  <text x="448" y="322"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">응답 저장</text>

  <!-- Data Cache store -->
  <rect x="200" y="356" width="480" height="72" rx="10" fill="#160d20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="384"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Data Cache (서버 파일시스템)</text>
  <text x="440" y="406"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">key: hash(URL + options)  |  value: Response  |  tag: 연결된 태그 목록</text>

  <!-- Annotation: revalidate -->
  <text x="440" y="458"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">revalidate 만료 시: 다음 요청에 stale 반환 + 백그라운드 갱신 (stale-while-revalidate)</text>
  <text x="440" y="478"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">no-store: Data Cache에 저장하지 않음 — 위 흐름 전체 우회</text>
</svg>
