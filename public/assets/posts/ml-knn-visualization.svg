<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">K-최근접 이웃(KNN): 직관적 분류 원리</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">K값에 따른 결정 경계 변화와 차원의 저주</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- KNN visualization with K=3 -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">KNN 분류: K=3, 새 점(★)은 다수결로 분류</text>
  <rect x="60" y="115" width="360" height="260" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Class A points (blue triangles - use circles) -->
  <circle cx="120" cy="190" r="8" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="150" cy="160" r="8" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="180" cy="200" r="8" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="130" cy="230" r="8" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="110" cy="250" r="8" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="200" cy="175" r="8" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="160" cy="240" r="8" fill="#7ec8e3" opacity="0.9"/>

  <!-- Class B points (orange) -->
  <rect x="279" y="178" width="16" height="16" rx="2" fill="#ce9178" opacity="0.9"/>
  <rect x="309" y="150" width="16" height="16" rx="2" fill="#ce9178" opacity="0.9"/>
  <rect x="329" y="185" width="16" height="16" rx="2" fill="#ce9178" opacity="0.9"/>
  <rect x="299" y="210" width="16" height="16" rx="2" fill="#ce9178" opacity="0.9"/>
  <rect x="349" y="165" width="16" height="16" rx="2" fill="#ce9178" opacity="0.9"/>
  <rect x="379" y="200" width="16" height="16" rx="2" fill="#ce9178" opacity="0.9"/>
  <rect x="359" y="240" width="16" height="16" rx="2" fill="#ce9178" opacity="0.9"/>

  <!-- New query point -->
  <text x="228" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">★</text>
  <text x="215" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">새 점</text>

  <!-- K=3 circle (approximate nearest neighbors) -->
  <circle cx="237" cy="220" r="65" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="237" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">K=3 반경</text>

  <!-- Distance lines to 3 nearest -->
  <line x1="237" y1="220" x2="200" y2="175" stroke="#55c555" stroke-width="1" opacity="0.6"/>
  <line x1="237" y1="220" x2="287" y2="186" stroke="#55c555" stroke-width="1" opacity="0.6"/>
  <line x1="237" y1="220" x2="180" y2="200" stroke="#55c555" stroke-width="1" opacity="0.6"/>

  <!-- Within circle: 2 blue, 1 orange → classify as blue -->
  <text x="120" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">K=3 반경 내: 파란 2개, 주황 1개</text>
  <text x="120" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 다수결: 파란 클래스로 분류</text>

  <!-- RIGHT: K value effect -->
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">K값에 따른 트레이드오프</text>

  <!-- K=1 -->
  <rect x="460" y="115" width="360" height="72" rx="8" fill="#0d1520" stroke="#e05555"/>
  <text x="480" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">K=1 (과적합 위험)</text>
  <text x="480" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가장 가까운 1개 이웃의 클래스 = 예측</text>
  <text x="480" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">훈련 오차=0, 잡음에 매우 민감 (분산 높음)</text>
  <text x="480" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">불규칙한 결정 경계 (복잡)</text>

  <!-- K=√n -->
  <rect x="460" y="198" width="360" height="72" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="2"/>
  <text x="480" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">K=√n ≈ 적절한 K ★</text>
  <text x="480" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">n: 훈련 데이터 수, 교차 검증으로 튜닝</text>
  <text x="480" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">편향-분산 균형, 실전 출발점</text>
  <text x="480" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">부드러운 결정 경계</text>

  <!-- K=n -->
  <rect x="460" y="281" width="360" height="72" rx="8" fill="#0d1520" stroke="#888"/>
  <text x="480" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">K=n (과소적합)</text>
  <text x="480" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전체 훈련 데이터 다수결 → 항상 같은 클래스</text>
  <text x="480" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">완전히 평탄한 결정 경계 (편향 높음)</text>
  <text x="480" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">쓸모없는 모델</text>

  <!-- Curse of dimensionality -->
  <rect x="460" y="364" width="360" height="70" rx="8" fill="#0d1520" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">차원의 저주 (Curse of Dimensionality)</text>
  <text x="480" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">고차원에서 모든 점이 서로 "멀어짐"</text>
  <text x="480" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">특성 100개 → 의미 있는 거리 계산 어려움</text>
  <text x="480" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">해결: PCA 전처리 + 특성 선택 + 정규화</text>

  <!-- Bottom -->
  <rect x="60" y="394" width="370" height="96" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">KNN의 특성</text>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">✓ 학습 단계 없음 (Lazy learner)</text>
  <text x="80" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">✓ 비선형 결정 경계 자연스럽게 처리</text>
  <text x="80" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✗ 예측 시간: O(n·d) — 대규모 데이터 느림</text>
  <text x="80" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">해결: KD-tree, Ball-tree, FAISS(근사 NN)</text>

  <!-- Footer -->
  <text x="440" y="528" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
