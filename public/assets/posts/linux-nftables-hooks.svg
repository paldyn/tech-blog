<svg xmlns="http://www.w3.org/2000/svg" width="880" height="386" viewBox="0 0 880 386" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">nftables 5개 훅 포인트</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">Netfilter 훅에 체인을 연결해 패킷 흐름을 제어한다</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#1e2433" stroke-width="1"/>

  <!-- Table header -->
  <rect x="60" y="92" width="760" height="42" rx="6" fill="#12192a"/>
  <line x1="220" y1="92" x2="220" y2="134" stroke="#1e2433" stroke-width="1"/>
  <line x1="320" y1="92" x2="320" y2="134" stroke="#1e2433" stroke-width="1"/>
  <line x1="540" y1="92" x2="540" y2="134" stroke="#1e2433" stroke-width="1"/>
  <text x="140" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">훅 이름</text>
  <text x="270" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">방향</text>
  <text x="430" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">적용 테이블</text>
  <text x="680" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">역할</text>

  <!-- Row 1: PREROUTING -->
  <rect x="60" y="134" width="760" height="44" fill="#0d1520"/>
  <line x1="220" y1="134" x2="220" y2="178" stroke="#1e2433" stroke-width="1"/>
  <line x1="320" y1="134" x2="320" y2="178" stroke="#1e2433" stroke-width="1"/>
  <line x1="540" y1="134" x2="540" y2="178" stroke="#1e2433" stroke-width="1"/>
  <text x="140" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" xml:space="preserve">PREROUTING</text>
  <text x="270" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" xml:space="preserve">수신</text>
  <text x="430" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">nat · mangle · raw</text>
  <text x="680" y="161" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">DNAT, 패킷 마킹 (라우팅 전)</text>

  <!-- Row 2: INPUT -->
  <rect x="60" y="178" width="760" height="44" fill="#0a0a0a"/>
  <line x1="220" y1="178" x2="220" y2="222" stroke="#1e2433" stroke-width="1"/>
  <line x1="320" y1="178" x2="320" y2="222" stroke="#1e2433" stroke-width="1"/>
  <line x1="540" y1="178" x2="540" y2="222" stroke="#1e2433" stroke-width="1"/>
  <text x="140" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" xml:space="preserve">INPUT</text>
  <text x="270" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" xml:space="preserve">수신</text>
  <text x="430" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">filter · mangle</text>
  <text x="680" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">로컬 프로세스로 향하는 패킷</text>

  <!-- Row 3: FORWARD -->
  <rect x="60" y="222" width="760" height="44" fill="#0d1520"/>
  <line x1="220" y1="222" x2="220" y2="266" stroke="#1e2433" stroke-width="1"/>
  <line x1="320" y1="222" x2="320" y2="266" stroke="#1e2433" stroke-width="1"/>
  <line x1="540" y1="222" x2="540" y2="266" stroke="#1e2433" stroke-width="1"/>
  <text x="140" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" xml:space="preserve">FORWARD</text>
  <text x="270" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">경유</text>
  <text x="430" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">filter · mangle</text>
  <text x="680" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">라우팅 경유 패킷 (포워딩)</text>

  <!-- Row 4: OUTPUT -->
  <rect x="60" y="266" width="760" height="44" fill="#0a0a0a"/>
  <line x1="220" y1="266" x2="220" y2="310" stroke="#1e2433" stroke-width="1"/>
  <line x1="320" y1="266" x2="320" y2="310" stroke="#1e2433" stroke-width="1"/>
  <line x1="540" y1="266" x2="540" y2="310" stroke="#1e2433" stroke-width="1"/>
  <text x="140" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" xml:space="preserve">OUTPUT</text>
  <text x="270" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">송신</text>
  <text x="430" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">filter · nat · mangle · raw</text>
  <text x="680" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">로컬에서 생성된 패킷</text>

  <!-- Row 5: POSTROUTING -->
  <rect x="60" y="310" width="760" height="44" fill="#0d1520"/>
  <line x1="220" y1="310" x2="220" y2="354" stroke="#1e2433" stroke-width="1"/>
  <line x1="320" y1="310" x2="320" y2="354" stroke="#1e2433" stroke-width="1"/>
  <line x1="540" y1="310" x2="540" y2="354" stroke="#1e2433" stroke-width="1"/>
  <text x="140" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" xml:space="preserve">POSTROUTING</text>
  <text x="270" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">송신</text>
  <text x="430" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">nat · mangle</text>
  <text x="680" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">SNAT, MASQUERADE (인터페이스 직전)</text>

  <!-- Outer border -->
  <rect x="60" y="92" width="760" height="262" rx="6" fill="none" stroke="#1e2433" stroke-width="1"/>
</svg>
