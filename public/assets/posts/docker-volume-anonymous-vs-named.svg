<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Anonymous Volume vs Named Volume</text>

  <!-- Headers -->
  <rect x="60" y="62" width="380" height="36" fill="#1a1520" rx="6"/>
  <text x="250" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Anonymous Volume</text>

  <rect x="460" y="62" width="360" height="36" fill="#0f1f2e" rx="6"/>
  <text x="640" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Named Volume</text>

  <!-- Row 1: 이름 -->
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이름</text>
  <text x="200" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">sha256 해시 (자동)</text>
  <text x="480" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이름</text>
  <text x="580" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">사람이 읽을 수 있는 이름</text>

  <line x1="60" y1="130" x2="820" y2="130" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 2: 생성 방법 -->
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">생성</text>
  <text x="200" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-v /path 또는 VOLUME</text>
  <text x="480" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">생성</text>
  <text x="580" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">volume create 또는 -v name:/path</text>

  <line x1="60" y1="160" x2="820" y2="160" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 3: 재사용 -->
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">재사용</text>
  <text x="200" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">어려움 (이름 모름)</text>
  <text x="480" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">재사용</text>
  <text x="580" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">쉬움 (이름으로 참조)</text>

  <line x1="60" y1="190" x2="820" y2="190" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 4: 컨테이너 삭제 시 -->
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컨테이너 rm</text>
  <text x="200" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c53a">볼륨 남음 (--rm이면 삭제)</text>
  <text x="480" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컨테이너 rm</text>
  <text x="580" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">볼륨 유지 (항상)</text>

  <line x1="60" y1="220" x2="820" y2="220" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 5: 주용도 -->
  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">주용도</text>
  <text x="200" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Dockerfile VOLUME 자동 처리</text>
  <text x="480" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">주용도</text>
  <text x="580" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">DB, 영속 데이터, 컨테이너 간 공유</text>

  <!-- Center divider -->
  <line x1="440" y1="62" x2="440" y2="260" stroke="#2a2a3e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Tip -->
  <rect x="60" y="272" width="760" height="44" fill="#0f1a0f" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">실무 팁: 프로덕션에서는 Named Volume을 선호한다. Anonymous Volume은 Dockerfile VOLUME 지시어가</text>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">자동 생성하므로 존재를 알고 관리하지 않으면 디스크를 채울 수 있다.</text>
</svg>
