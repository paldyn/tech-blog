<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">재조정(Reconciliation) — Diffing 알고리즘</text>

  <!-- 규칙 1 -->
  <rect x="60" y="66" width="760" height="74" rx="10" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">규칙 1: 타입이 다르면 전체 트리를 교체한다</text>
  <text x="440" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&lt;div&gt; → &lt;span&gt; 변경 시: div 서브트리 언마운트, span 서브트리 새로 마운트</text>
  <text x="440" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컴포넌트도 동일: &lt;Counter&gt; → &lt;List&gt; 이면 Counter 언마운트 후 List 마운트</text>

  <!-- 규칙 2 -->
  <rect x="60" y="156" width="760" height="74" rx="10" fill="#101820" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">규칙 2: 같은 타입이면 기존 인스턴스를 유지하고 props만 업데이트</text>
  <text x="440" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&lt;div className="old"&gt; → &lt;div className="new"&gt; : DOM 유지, className만 변경</text>
  <text x="440" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컴포넌트: 같은 타입이면 언마운트 없이 리렌더, state도 보존됨</text>

  <!-- 코드 예시 -->
  <rect x="60" y="252" width="380" height="192" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="276"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 타입 변경 — state 초기화됨!</text>
  <text x="76" y="296"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 이전</text>
  <text x="76" y="316"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">{isLoading</text>
  <text x="76" y="336"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  ? &lt;div&gt;&lt;Counter /&gt;&lt;/div&gt;</text>
  <text x="76" y="356"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  : &lt;span&gt;&lt;Counter /&gt;&lt;/span&gt;}</text>
  <text x="76" y="376"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// div → span: Counter state 리셋!</text>
  <text x="76" y="406"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// 수정: 같은 래퍼 타입 유지</text>
  <text x="76" y="426"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&lt;div&gt;{isLoading ? &lt;Spinner/&gt; : &lt;Counter/&gt;}&lt;/div&gt;</text>

  <!-- 오른쪽 설명 -->
  <rect x="468" y="252" width="352" height="90" rx="8" fill="#101820" stroke="#e05555" stroke-width="1.5"/>
  <text x="644" y="278" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">실수 패턴</text>
  <text x="484" y="302"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트를 렌더 중에 정의하면</text>
  <text x="484" y="322"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">매 렌더마다 새 타입 → 항상 언마운트/마운트</text>
  <text x="484" y="336"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">컴포넌트 선언은 함수 바깥에 두기</text>

  <rect x="468" y="358" width="352" height="86" rx="8" fill="#101820" stroke="#55c555" stroke-width="1.5"/>
  <text x="644" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">알고리즘 복잡도</text>
  <text x="484" y="404"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">일반적 트리 비교: O(n³)</text>
  <text x="484" y="422"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">React 휴리스틱: O(n) — 같은 레벨만 비교</text>
  <text x="484" y="436"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">key 힌트로 리스트 최적화</text>
</svg>
