<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JSX 심화: 구 변환 vs 신 변환</text>

  <!-- JSX Source block -->
  <rect x="60" y="68" width="280" height="160" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">JSX 소스</text>
  <rect x="76" y="100" width="248" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="122" fill="#9aa4b8">// 개발자가 작성</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Greeting({ name }) {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;h1</tspan><tspan fill="#ffffff"> className=</tspan><tspan fill="#ce9178">"hi"</tspan><tspan fill="#ce9178">&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      {name}</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;/h1&gt;</tspan>
  </text>

  <!-- Arrow right: JSX -> old/new -->
  <line x1="356" y1="148" x2="400" y2="148" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="378" y="140" text-anchor="middle" font-size="11" fill="#7777cc">컴파일</text>

  <!-- Arrow to old (top) -->
  <line x1="410" y1="148" x2="410" y2="120" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="410" y1="120" x2="455" y2="120" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow to new (bottom) -->
  <line x1="410" y1="148" x2="410" y2="280" stroke="#55c555" stroke-width="1.5"/>
  <line x1="410" y1="280" x2="455" y2="280" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Old transform label -->
  <text x="630" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">React 17 이전 (구 변환)</text>

  <!-- Old transform code block -->
  <rect x="455" y="95" width="365" height="130" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="471" y="105" width="333" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="487" y="127" fill="#9aa4b8">// 파일마다 필요!</tspan>
    <tspan x="487" dy="18" fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> React </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'react'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="487" dy="18" fill="#ffffff">React.createElement(</tspan>
    <tspan x="487" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">'h1'</tspan><tspan fill="#ffffff">, {className:</tspan><tspan fill="#ce9178">'hi'</tspan><tspan fill="#ffffff">},</tspan>
    <tspan x="487" dy="18" fill="#ffffff">  name</tspan>
    <tspan x="487" dy="18" fill="#ffffff">)</tspan>
  </text>

  <!-- New transform label -->
  <text x="630" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">React 17 이후 (신 변환)</text>

  <!-- New transform code block -->
  <rect x="455" y="255" width="365" height="148" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="471" y="265" width="333" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="487" y="287" fill="#9aa4b8">// 자동 삽입 (import 불필요)</tspan>
    <tspan x="487" dy="18" fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { jsx </tspan><tspan fill="#7ec8e3" font-weight="600">as</tspan><tspan fill="#ffffff"> _jsx }</tspan>
    <tspan x="487" dy="18" fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'react/jsx-runtime'</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="487" dy="18" fill="#ffffff">_jsx(</tspan><tspan fill="#ce9178">'h1'</tspan><tspan fill="#ffffff">, {</tspan>
    <tspan x="487" dy="18" fill="#ffffff">  className: </tspan><tspan fill="#ce9178">'hi'</tspan><tspan fill="#ffffff">,</tspan>
    <tspan x="487" dy="18" fill="#ffffff">  children: name</tspan>
    <tspan x="487" dy="18" fill="#ffffff">})</tspan>
  </text>

  <!-- Bottom note -->
  <rect x="60" y="430" width="760" height="48" rx="8" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="450" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">핵심 차이</text>
  <text x="440" y="468" text-anchor="middle" font-size="12" fill="#888">신 변환: import React 불필요, 번들 크기 감소, 개발 경험 개선 (Create React App 5+, Vite 기본 적용)</text>
</svg>
