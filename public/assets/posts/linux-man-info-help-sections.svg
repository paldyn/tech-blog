<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">man 페이지 섹션 번호</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">섹션 번호를 지정하면 같은 이름의 다른 항목을 구분할 수 있다</text>

  <!-- Section grid: 4 columns x 2 rows -->
  <!-- Row 1 -->
  <rect x="60" y="106" width="175" height="84" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="147" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#7ec8e3" text-anchor="middle">1</text>
  <text x="147" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">사용자 명령어</text>
  <text x="147" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ls, cp, find …</text>

  <rect x="255" y="106" width="175" height="84" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="342" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#7777cc" text-anchor="middle">2</text>
  <text x="342" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">시스템 콜</text>
  <text x="342" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">open, read, write …</text>

  <rect x="450" y="106" width="175" height="84" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="537" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#55c555" text-anchor="middle">3</text>
  <text x="537" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">라이브러리 함수</text>
  <text x="537" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">printf, malloc …</text>

  <rect x="645" y="106" width="175" height="84" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="732" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#e8e8e8" text-anchor="middle">4</text>
  <text x="732" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">특수 파일</text>
  <text x="732" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/dev/null, tty …</text>

  <!-- Row 2 -->
  <rect x="60" y="210" width="175" height="84" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="147" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#ce9178" text-anchor="middle">5</text>
  <text x="147" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">파일 형식</text>
  <text x="147" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">fstab, passwd …</text>

  <rect x="255" y="210" width="175" height="84" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="342" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#888" text-anchor="middle">6</text>
  <text x="342" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">게임/화면보호기</text>
  <text x="342" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">sl, fortune …</text>

  <rect x="450" y="210" width="175" height="84" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="537" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#7ec8e3" text-anchor="middle">7</text>
  <text x="537" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">개요·규약·기타</text>
  <text x="537" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">signal, regex …</text>

  <rect x="645" y="210" width="175" height="84" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="732" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="28" font-weight="700" fill="#7777cc" text-anchor="middle">8</text>
  <text x="732" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">관리자 명령어</text>
  <text x="732" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">mount, iptables …</text>

  <!-- example code -->
  <text x="60" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">섹션 지정 예시</text>
  <rect x="60" y="332" width="760" height="112" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ man 1 printf    <tspan fill="#9aa4b8"># 셸 명령어 printf (섹션 1)</tspan></text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ man 3 printf    <tspan fill="#9aa4b8"># C 라이브러리 함수 printf (섹션 3)</tspan></text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ man 5 passwd    <tspan fill="#9aa4b8"># /etc/passwd 파일 형식 (섹션 5)</tspan></text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ man -k socket   <tspan fill="#9aa4b8"># 키워드 검색 (apropos 동일)</tspan></text>
  <text x="76" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ man -f stat     <tspan fill="#9aa4b8"># 모든 섹션에서 항목 확인 (whatis 동일)</tspan></text>

  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">섹션 번호 없이 man stat 실행 시 섹션 1 → 2 → 3 순으로 첫 번째 발견 항목만 표시</text>
</svg>
