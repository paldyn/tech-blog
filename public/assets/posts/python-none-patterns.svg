<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">None 활용 패턴</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">선택적 인수 · Sentinel · Optional 타입 힌트</text>

  <!-- sentinel pattern -->
  <rect x="60" y="100" width="360" height="300" rx="10" fill="#111520" stroke="#3a4a6e"/>
  <text x="240" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">선택적 인수 기본값</text>
  <rect x="80" y="142" width="320" height="236" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="96" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> search(query, limit=</tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">):</tspan></text>
  <text x="96" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> limit </tspan><tspan fill="#7ec8e3">is</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="96" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        limit = </tspan><tspan fill="#b5cea8">100</tspan></text>
  <text x="96" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">    ...</tspan></text>
  <text x="96" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 왜 limit=None? (list 기본값 위험)</tspan></text>
  <text x="96" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> bad(items=</tspan><tspan fill="#e05555">[]</tspan><tspan fill="#ffffff">):</tspan><tspan fill="#9aa4b8">  # ← 공유됨!</tspan></text>
  <text x="96" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> good(items=</tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">):</tspan></text>
  <text x="96" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> items </tspan><tspan fill="#7ec8e3">is</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="96" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        items = []  </tspan><tspan fill="#9aa4b8"># 호출마다 새 리스트</tspan></text>
  <text x="96" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># Optional 타입 힌트</tspan></text>
  <text x="96" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> f(x: </tspan><tspan fill="#7777cc">int | None</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">): ...</tspan></text>

  <!-- None vs other falsy -->
  <rect x="460" y="100" width="360" height="300" rx="10" fill="#111520" stroke="#3a4a6e"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">None과 다른 Falsy 값의 차이</text>
  <!-- Table -->
  <rect x="476" y="142" width="328" height="34" rx="4" fill="#1e2433"/>
  <text x="560" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">값</text>
  <text x="720" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">bool(x)</text>

  <rect x="476" y="178" width="328" height="30" rx="0" fill="#0e1218"/>
  <text x="560" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">None</text>
  <text x="720" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">False</text>

  <rect x="476" y="208" width="328" height="30" rx="0" fill="#111520"/>
  <text x="560" y="227" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" text-anchor="middle">0</text>
  <text x="720" y="227" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">False</text>

  <rect x="476" y="238" width="328" height="30" rx="0" fill="#0e1218"/>
  <text x="560" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">""</text>
  <text x="720" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">False</text>

  <rect x="476" y="268" width="328" height="30" rx="0" fill="#111520"/>
  <text x="560" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">[]</text>
  <text x="720" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">False</text>

  <rect x="476" y="298" width="328" height="30" rx="0" fill="#0e1218"/>
  <text x="560" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">{}</text>
  <text x="720" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">False</text>

  <text x="640" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">모두 Falsy지만 의미가 다르다!</text>
  <text x="640" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">None: 값 자체가 없음</text>
</svg>
