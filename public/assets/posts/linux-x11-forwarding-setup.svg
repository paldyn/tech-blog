<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">X11 포워딩 설정 체크리스트</text>

  <!-- Step 1: Server config -->
  <rect x="60" y="68" width="360" height="120" rx="8" fill="#111122" stroke="#2a3a5e" stroke-width="1.5"/>
  <text x="80" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">① 서버 설정 (/etc/ssh/sshd_config)</text>
  <rect x="80" y="100" width="320" height="76" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">X11Forwarding</text>
  <text x="226" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> yes</text>
  <text x="100" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">X11UseLocalhost</text>
  <text x="240" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> yes</text>
  <text x="100" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># xauth 패키지도 필요</text>
  <text x="100" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">apt</text>
  <text x="126" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> install xauth</text>

  <!-- Step 2: Client config -->
  <rect x="460" y="68" width="360" height="120" rx="8" fill="#111122" stroke="#2a3a5e" stroke-width="1.5"/>
  <text x="480" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">② 클라이언트 설정 (~/.ssh/config)</text>
  <rect x="480" y="100" width="320" height="76" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="500" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">Host</text>
  <text x="542" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> devserver</text>
  <text x="500" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  ForwardX11</text>
  <text x="610" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> yes</text>
  <text x="500" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  ForwardX11Trusted</text>
  <text x="662" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> no</text>
  <text x="500" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # yes = -Y (신뢰), no = -X (보안)</text>

  <!-- Step 3: macOS note -->
  <rect x="60" y="204" width="360" height="96" rx="8" fill="#2e1a1a" stroke="#6e3a3a" stroke-width="1.5"/>
  <text x="80" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e07777">③ macOS: XQuartz 필요</text>
  <rect x="80" y="236" width="320" height="52" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># brew 설치</text>
  <text x="100" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">brew install --cask</text>
  <text x="100" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> xquartz</text>

  <!-- Step 4: Windows note -->
  <rect x="460" y="204" width="360" height="96" rx="8" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="480" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">④ Windows: VcXsrv / MobaXterm</text>
  <rect x="480" y="236" width="320" height="52" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="500" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># WSL2에서는 WSLg로 자동</text>
  <text x="500" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># MobaXterm은 X Server 내장</text>
  <text x="500" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># VcXsrv 실행 후 DISPLAY 설정</text>

  <!-- Test -->
  <rect x="60" y="316" width="760" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 테스트: xeyes가 로컬 화면에 눈 그림 창 띄우면 성공</text>
  <text x="80" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">user@server:~$ </text>
  <text x="80" y="356" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">xeyes</text>
  <text x="80" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">                    &amp;</text>
</svg>
