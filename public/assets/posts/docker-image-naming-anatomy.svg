<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">이미지 이름 구조 해부</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">registry / namespace / repository : tag</text>

  <!-- Full name display -->
  <rect x="60" y="104" width="760" height="64" fill="#070b14" rx="8" stroke="#1e2433" stroke-width="1"/>
  <!-- Registry segment -->
  <text x="130" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#7ec8e3" text-anchor="middle">ghcr.io</text>
  <!-- Slash -->
  <text x="205" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" fill="#888">/</text>
  <!-- Namespace -->
  <text x="290" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#7777cc" text-anchor="middle">myorg</text>
  <!-- Slash -->
  <text x="365" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" fill="#888">/</text>
  <!-- Repository -->
  <text x="470" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">myapp</text>
  <!-- Colon -->
  <text x="570" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" fill="#888">:</text>
  <!-- Tag -->
  <text x="660" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="700" fill="#55c555" text-anchor="middle">v2.1.0</text>

  <!-- Annotation lines -->
  <!-- Registry -->
  <line x1="130" y1="168" x2="130" y2="196" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="196" width="140" height="52" fill="#0d1117" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="130" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">Registry</text>
  <text x="130" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이미지 저장소 주소</text>

  <!-- Namespace -->
  <line x1="290" y1="168" x2="290" y2="196" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="220" y="196" width="140" height="52" fill="#0d1117" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">Namespace</text>
  <text x="290" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">조직 / 사용자명</text>

  <!-- Repository -->
  <line x1="470" y1="168" x2="470" y2="196" stroke="#e8e8e8" stroke-width="1.5"/>
  <rect x="400" y="196" width="140" height="52" fill="#0d1117" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="470" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">Repository</text>
  <text x="470" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이미지 이름</text>

  <!-- Tag -->
  <line x1="660" y1="168" x2="660" y2="196" stroke="#55c555" stroke-width="1.5"/>
  <rect x="590" y="196" width="140" height="52" fill="#0d1117" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">Tag</text>
  <text x="660" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">버전 / 변형 식별자</text>

  <!-- Default values -->
  <text x="60" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888">생략 시 기본값</text>

  <rect x="60" y="296" width="185" height="72" fill="#0d1117" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="152" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#888" text-anchor="middle">Registry 생략</text>
  <text x="152" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">→ docker.io</text>
  <text x="152" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Docker Hub</text>

  <rect x="265" y="296" width="185" height="72" fill="#0d1117" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="357" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#888" text-anchor="middle">Namespace 생략</text>
  <text x="357" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">→ library</text>
  <text x="357" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">공식 이미지 네임스페이스</text>

  <rect x="470" y="296" width="185" height="72" fill="#0d1117" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="562" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#888" text-anchor="middle">Tag 생략</text>
  <text x="562" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">→ latest</text>
  <text x="562" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">⚠ 프로덕션에선 피할 것</text>

  <!-- Example -->
  <rect x="60" y="386" width="760" height="36" fill="#111820" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">nginx  =  docker.io/library/nginx:latest</text>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">단순한 이름 뒤에 기본값이 자동으로 채워짐</text>
</svg>
