<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="60" y="56" font-size="22" font-weight="700" fill="#e8e8e8">두 가지 무작위 알고리즘: 무엇을 양보하는가</text>

  <!-- Las Vegas card -->
  <rect x="60" y="90" width="370" height="260" rx="10" fill="#0f1612" stroke="#55c555" stroke-width="2"/>
  <text x="90" y="128" font-size="16" font-weight="600" fill="#55c555">라스베이거스 (Las Vegas)</text>
  <text x="90" y="160" font-size="13" fill="#888">정답은 항상 보장</text>
  <text x="90" y="184" font-size="13" fill="#888">실행 시간이 무작위로 변동</text>

  <text x="90" y="222" font-size="13" fill="#e8e8e8">• 결과: 언제나 옳음</text>
  <text x="90" y="248" font-size="13" fill="#e8e8e8">• 시간: 기댓값으로 평가</text>
  <text x="90" y="274" font-size="13" fill="#e8e8e8">• 대표: 무작위 퀵정렬</text>
  <text x="90" y="300" font-size="13" fill="#e8e8e8">• 양보: 시간의 확실성</text>
  <text x="90" y="330" font-size="13" fill="#55c555" font-weight="600">정확도 ✔  /  시간 ✘</text>

  <!-- Monte Carlo card -->
  <rect x="450" y="90" width="370" height="260" rx="10" fill="#16100f" stroke="#e05555" stroke-width="2"/>
  <text x="480" y="128" font-size="16" font-weight="600" fill="#e05555">몬테카를로 (Monte Carlo)</text>
  <text x="480" y="160" font-size="13" fill="#888">실행 시간은 항상 보장</text>
  <text x="480" y="184" font-size="13" fill="#888">정답이 작은 확률로 틀림</text>

  <text x="480" y="222" font-size="13" fill="#e8e8e8">• 결과: 확률적으로 옳음</text>
  <text x="480" y="248" font-size="13" fill="#e8e8e8">• 시간: 결정적 상한</text>
  <text x="480" y="274" font-size="13" fill="#e8e8e8">• 대표: 밀러–라빈 소수 판정</text>
  <text x="480" y="300" font-size="13" fill="#e8e8e8">• 양보: 정답의 확실성</text>
  <text x="480" y="330" font-size="13" fill="#e05555" font-weight="600">시간 ✔  /  정확도 ✘</text>
</svg>
