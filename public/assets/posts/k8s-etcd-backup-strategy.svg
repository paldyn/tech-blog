<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">백업 전략 — 무엇을 지켜야 하는가</text>

  <!-- card 1 -->
  <rect x="50" y="90" width="250" height="130" rx="10" fill="#13151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">정기성</text>
  <text x="74" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· CronJob으로 자동화</text>
  <text x="74" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 변경 잦으면 주기 ↓</text>
  <text x="74" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RPO = 스냅샷 간격</text>

  <!-- card 2 -->
  <rect x="315" y="90" width="250" height="130" rx="10" fill="#13151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">격리 보관</text>
  <text x="339" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 클러스터 밖 저장</text>
  <text x="339" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· S3 등 원격 + 암호화</text>
  <text x="339" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">노드 죽어도 살아남게</text>

  <!-- card 3 -->
  <rect x="580" y="90" width="250" height="130" rx="10" fill="#13151c" stroke="#ce9178" stroke-width="1.5"/>
  <text x="705" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#ce9178" text-anchor="middle">보존 정책</text>
  <text x="604" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 오래된 스냅샷 정리</text>
  <text x="604" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">· 일·주·월 단위 유지</text>
  <text x="604" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비용 vs 복구 범위</text>

  <!-- bottom big card -->
  <rect x="50" y="250" width="780" height="110" rx="10" fill="#2a1416" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">가장 중요한 것 — 복구 리허설</text>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">한 번도 복구해보지 않은 백업은 백업이 아니다</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">주기적으로 별도 환경에 실제 restore — 파일 무결성과 복구 절차를 동시에 검증</text>
</svg>
