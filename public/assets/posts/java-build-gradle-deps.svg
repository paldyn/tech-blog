  <text x="684" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">testImplementation — 테스트만</text>
  <text x="684" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">compileOnly · runtimeOnly 도 가능</text>

  <line x1="548" y1="239" x2="500" y2="241" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrF)"/>

  <rect x="548" y="340" width="272" height="70" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="684" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">tasks 블록</text>
  <text x="684" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
