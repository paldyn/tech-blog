  <!-- Code block -->
  <rect x="60" y="88" width="440" height="386" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">plugins</tspan> {</text>
  <text x="76" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#7ec8e3" font-weight="600">java</tspan></text>
  <text x="76" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#7ec8e3" font-weight="600">application</tspan></text>
  <text x="76" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
  <text x="76" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">repositories</tspan> { <tspan fill="#7ec8e3" font-weight="600">mavenCentral</tspan>() }</text>
  <text x="76" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">dependencies</tspan> {</text>
  <text x="76" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#7ec8e3" font-weight="600">implementation</tspan>(<tspan fill="#ce9178">"com.google.guava:guava:32.1.3-jre"</tspan>)</text>
  <text x="76" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#7ec8e3" font-weight="600">testImplementation</tspan>(<tspan fill="#ce9178">"org.junit.jupiter:junit-jupiter:5.10.0"</tspan>)</text>
  <text x="76" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
  <text x="76" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">application</tspan> {</text>
  <text x="76" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    mainClass = <tspan fill="#ce9178">"com.example.App"</tspan></text>
  <text x="76" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
  <text x="76" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">tasks</tspan>.withType&lt;<tspan fill="#7777cc">Test</tspan>&gt;() {</text>
  <text x="76" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    useJUnitPlatform()</text>
  <text x="76" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
  <text x="76" y="412" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  ><tspan fill="#9aa4b8">// 빌드: ./gradlew build</tspan></text>
  <text x="76" y="430" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  ><tspan fill="#9aa4b8">// 실행: ./gradlew run</tspan></text>
  <text x="76" y="448" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  ><tspan fill="#9aa4b8">// 테스트: ./gradlew test</tspan></text>

