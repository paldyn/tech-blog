  <line x1="548" y1="131" x2="500" y2="139" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrE)"/>

  <rect x="548" y="196" width="272" height="114" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="684" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">dependencies 구성</text>
  <text x="684" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">implementation — 컴파일+런타임</text>
  <text x="684" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
