  <!-- bottom hint -->
  <rect x="60" y="474" width="760" height="54" rx="8" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Gradle Wrapper — gradlew / gradlew.bat</text>
  <text x="440" y="516" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
