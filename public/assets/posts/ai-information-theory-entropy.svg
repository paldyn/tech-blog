<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" fill="url(#hdr)" rx="12"/>
  <rect x="0" y="60" width="880" height="12" fill="url(#hdr)"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">정보 이론: 엔트로피와 정보량</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">확률과 불확실성을 수학적으로 측정하는 방법</text>

  <!-- Divider -->
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- LEFT COLUMN: Information Content -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">정보량 (Information Content)</text>
  <!-- Formula box -->
  <rect x="60" y="116" width="340" height="56" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">사건 x가 발생했을 때의 정보량:</text>
  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="600" fill="#7ec8e3">I(x) = −log₂ P(x)   [bits]</text>

  <!-- Examples table -->
  <text x="60" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">확률에 따른 정보량 변화</text>
  <!-- Table header -->
  <rect x="60" y="203" width="340" height="28" rx="4" fill="#111820"/>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사건 설명</text>
  <text x="280" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">P(x)</text>
  <text x="340" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">I(x)</text>

  <!-- Row 1 -->
  <rect x="60" y="231" width="340" height="30" rx="0" fill="#0e1520" opacity="0.6"/>
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">항상 발생하는 사건</text>
  <text x="280" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">1.0</text>
  <text x="340" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">0 bits</text>

  <!-- Row 2 -->
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">동전 앞면 (50%)</text>
  <text x="280" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">0.5</text>
  <text x="340" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">1 bit</text>

  <!-- Row 3 -->
  <rect x="60" y="289" width="340" height="30" rx="0" fill="#0e1520" opacity="0.6"/>
  <text x="80" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">주사위 특정 면 (1/6)</text>
  <text x="280" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">0.167</text>
  <text x="340" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">2.58 bits</text>

  <!-- Row 4 -->
  <text x="80" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">희귀 이벤트 (1%)</text>
  <text x="280" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">0.01</text>
  <text x="340" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">6.64 bits</text>

  <!-- Key insight box -->
  <rect x="60" y="358" width="340" height="52" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">핵심: 희귀할수록 정보량이 많다</text>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">P(x)→1이면 I(x)→0, P(x)→0이면 I(x)→∞</text>

  <!-- RIGHT COLUMN: Entropy Comparison -->
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">엔트로피 비교: H(X) = −Σ P(x) log₂P(x)</text>

  <!-- Low Entropy -->
  <rect x="460" y="116" width="360" height="140" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="480" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">낮은 엔트로피 (H ≈ 0.47 bits)</text>
  <text x="480" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">결과가 거의 확실한 분포</text>
  <!-- Bar chart low entropy -->
  <text x="484" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">A</text>
  <text x="524" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">B</text>
  <text x="564" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">C</text>
  <text x="604" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">D</text>
  <!-- bars: P = [0.9, 0.05, 0.03, 0.02] -->
  <rect x="480" y="166" width="28" height="36" fill="#55c555" rx="2"/>
  <rect x="520" y="197" width="28" height="5" fill="#55c555" rx="2" opacity="0.6"/>
  <rect x="560" y="200" width="28" height="2" fill="#55c555" rx="2" opacity="0.4"/>
  <rect x="600" y="201" width="28" height="1" fill="#55c555" rx="2" opacity="0.3"/>
  <text x="480" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">90%</text>
  <!-- y-axis line -->
  <line x1="476" y1="165" x2="476" y2="204" stroke="#333" stroke-width="1"/>
  <line x1="476" y1="204" x2="640" y2="204" stroke="#333" stroke-width="1"/>
  <text x="660" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" font-weight="600">H=0.47</text>

  <!-- High Entropy -->
  <rect x="460" y="270" width="360" height="140" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="480" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">높은 엔트로피 (H = 2 bits)</text>
  <text x="480" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">결과를 예측하기 어려운 분포 (균등)</text>
  <!-- Bar chart high entropy -->
  <text x="484" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">A</text>
  <text x="524" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">B</text>
  <text x="564" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">C</text>
  <text x="604" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">D</text>
  <!-- bars: P = [0.25, 0.25, 0.25, 0.25] -->
  <rect x="480" y="320" width="28" height="36" fill="#e05555" rx="2"/>
  <rect x="520" y="320" width="28" height="36" fill="#e05555" rx="2"/>
  <rect x="560" y="320" width="28" height="36" fill="#e05555" rx="2"/>
  <rect x="600" y="320" width="28" height="36" fill="#e05555" rx="2"/>
  <line x1="476" y1="319" x2="476" y2="358" stroke="#333" stroke-width="1"/>
  <line x1="476" y1="358" x2="640" y2="358" stroke="#333" stroke-width="1"/>
  <text x="660" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" font-weight="600">H=2.0</text>

  <!-- Bottom entropy formula -->
  <rect x="60" y="428" width="760" height="64" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">AI에서 엔트로피의 활용</text>
  <text x="80" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">LLM 손실: Cross-Entropy(정답, 예측)   |   온도 T↑ → 엔트로피↑(다양한 출력)   |   결정 트리: 분기 기준 = 정보 이득</text>

  <!-- Footer -->
  <text x="440" y="518" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
