<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 310" style="display:block">
  <!-- Background -->
  <rect width="880" height="310" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CLIP 이미지-텍스트 유사도 (Python)</text>
  <text x="440" y="63" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Hugging Face Transformers로 이미지와 텍스트의 코사인 유사도 점수 계산</text>

  <!-- Code box -->
  <rect x="60" y="82" width="760" height="208" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Line 1 -->
  <text x="80" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> torch</tspan></text>

  <!-- Line 2 -->
  <text x="80" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> transformers </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> CLIPProcessor, CLIPModel</tspan></text>

  <!-- Line 3 blank -->
  <text x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff"> </tspan></text>

  <!-- Line 4 -->
  <text x="80" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">model = CLIPModel.from_pretrained(</tspan><tspan fill="#ce9178">"openai/clip-vit-base-patch32"</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- Line 5 -->
  <text x="80" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">processor = CLIPProcessor.from_pretrained(</tspan><tspan fill="#ce9178">"openai/clip-vit-base-patch32"</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- Line 6 -->
  <text x="80" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> PIL </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Image</tspan></text>

  <!-- Line 7 -->
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">image = Image.</tspan><tspan fill="#7ec8e3" font-weight="600">open</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"cat.jpg"</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- Line 8 -->
  <text x="80" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">texts = [</tspan><tspan fill="#ce9178">"고양이 사진"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"강아지 사진"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"자동차 사진"</tspan><tspan fill="#ffffff">]</tspan></text>

  <!-- Line 9 -->
  <text x="80" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">inputs = processor(text=texts, images=image,</tspan></text>

  <!-- Line 10 -->
  <text x="80" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">                   return_tensors=</tspan><tspan fill="#ce9178">"pt"</tspan><tspan fill="#ffffff">, padding=</tspan><tspan fill="#7ec8e3" font-weight="600">True</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- Line 11 -->
  <text x="80" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">outputs = model(**inputs)</tspan></text>

</svg>
