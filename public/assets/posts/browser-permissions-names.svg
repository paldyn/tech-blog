<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">주요 권한 이름 (PermissionName)</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">navigator.permissions.query({ name: '...' }) 에 사용</text>

  <!-- Grid: 3 columns, 4 rows -->
  <!-- Row 1 -->
  <rect x="60" y="90" width="240" height="58" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">"geolocation"</text>
  <text x="180" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GPS/위치 접근</text>

  <rect x="320" y="90" width="240" height="58" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">"notifications"</text>
  <text x="440" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시스템 알림</text>

  <rect x="580" y="90" width="240" height="58" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="114" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">"camera"</text>
  <text x="700" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">웹캠 접근</text>

  <!-- Row 2 -->
  <rect x="60" y="163" width="240" height="58" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="187" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">"microphone"</text>
  <text x="180" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">마이크 접근</text>

  <rect x="320" y="163" width="240" height="58" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="187" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">"push"</text>
  <text x="440" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Push 구독 상태</text>

  <rect x="580" y="163" width="240" height="58" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="700" y="187" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">"midi"</text>
  <text x="700" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Web MIDI</text>

  <!-- Row 3 -->
  <rect x="60" y="236" width="240" height="58" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="180" y="260" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">"clipboard-read"</text>
  <text x="180" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클립보드 읽기</text>

  <rect x="320" y="236" width="240" height="58" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="260" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">"clipboard-write"</text>
  <text x="440" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클립보드 쓰기</text>

  <rect x="580" y="236" width="240" height="58" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="700" y="260" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">"screen-wake-lock"</text>
  <text x="700" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">화면 절전 방지</text>

  <!-- Row 4 -->
  <rect x="60" y="309" width="240" height="58" rx="6" fill="#1f1400" stroke="#e8b84b" stroke-width="1"/>
  <text x="180" y="333" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8b84b">"accelerometer"</text>
  <text x="180" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가속도계 센서</text>

  <rect x="320" y="309" width="240" height="58" rx="6" fill="#1f1400" stroke="#e8b84b" stroke-width="1"/>
  <text x="440" y="333" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8b84b">"background-sync"</text>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">백그라운드 동기화</text>

  <rect x="580" y="309" width="240" height="58" rx="6" fill="#1f1400" stroke="#e8b84b" stroke-width="1"/>
  <text x="700" y="333" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8b84b">"storage-access"</text>
  <text x="700" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서드파티 스토리지</text>

  <!-- Note -->
  <text x="440" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">지원 범위는 브라우저마다 다름 — 미지원 이름은 TypeError 발생</text>
</svg>
