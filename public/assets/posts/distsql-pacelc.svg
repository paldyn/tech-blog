<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PACELC 모델 — CAP의 확장</text>

  <!-- PACELC formula -->
  <rect x="60" y="66" width="760" height="60" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">If Partition: (A vs C) Else: (L vs C)</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">분할이 없을 때도 지연(Latency)과 일관성(Consistency) 사이의 트레이드오프가 존재</text>

  <!-- DB comparison table -->
  <rect x="60" y="146" width="760" height="36" rx="6" fill="#111133"/>
  <text x="180" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">데이터베이스</text>
  <text x="380" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">P 시: 선택</text>
  <text x="580" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">정상 시: 선택</text>
  <text x="760" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">PACELC</text>

  <!-- Rows -->
  <rect x="60" y="182" width="760" height="32" rx="0" fill="#0d0d1a"/>
  <text x="180" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">DynamoDB</text>
  <text x="380" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Availability</text>
  <text x="580" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Low Latency</text>
  <text x="760" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">PA/EL</text>

  <rect x="60" y="214" width="760" height="32" rx="0" fill="#0a0a14"/>
  <text x="180" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">CockroachDB</text>
  <text x="380" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Consistency</text>
  <text x="580" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Consistency</text>
  <text x="760" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">PC/EC</text>

  <rect x="60" y="246" width="760" height="32" rx="0" fill="#0d0d1a"/>
  <text x="180" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">Cassandra</text>
  <text x="380" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Availability</text>
  <text x="580" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Low Latency</text>
  <text x="760" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">PA/EL</text>

  <rect x="60" y="278" width="760" height="32" rx="0" fill="#0a0a14"/>
  <text x="180" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">Google Spanner</text>
  <text x="380" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Consistency</text>
  <text x="580" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Consistency</text>
  <text x="760" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">PC/EC</text>

  <rect x="60" y="310" width="760" height="32" rx="0" fill="#0d0d1a"/>
  <text x="180" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">MySQL (단일 노드)</text>
  <text x="380" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">P 없음 (CA)</text>
  <text x="580" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Consistency</text>
  <text x="760" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PC/EC</text>

  <!-- Outer border for table -->
  <rect x="60" y="182" width="760" height="160" rx="0" fill="none" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="214" x2="820" y2="214" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="246" x2="820" y2="246" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="278" x2="820" y2="278" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="310" x2="820" y2="310" stroke="#222" stroke-width="1"/>

  <!-- Key insight -->
  <rect x="60" y="358" width="760" height="24" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="440" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">분산 SQL(NewSQL)은 강한 일관성을 추구하면서도 수평 확장을 실현한다 — 단, 높은 지연을 감수</text>
</svg>
