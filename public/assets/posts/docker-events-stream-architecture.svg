<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker Events — 실시간 이벤트 스트림 구조</text>

  <!-- Docker Daemon Box -->
  <rect x="60" y="80" width="200" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Docker Daemon</text>
  <text x="160" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">dockerd</text>

  <!-- Event Sources -->
  <text x="160" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">이벤트 소스</text>

  <rect x="60" y="214" width="88" height="34" rx="6" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="104" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">container</text>

  <rect x="172" y="214" width="88" height="34" rx="6" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="216" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">image</text>

  <rect x="60" y="264" width="88" height="34" rx="6" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="104" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">network</text>

  <rect x="172" y="264" width="88" height="34" rx="6" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="216" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">volume</text>

  <!-- Arrow from daemon to event bus -->
  <line x1="260" y1="120" x2="320" y2="120" stroke="#555" stroke-width="1.5"/>
  <polygon points="320,114 334,120 320,126" fill="#555"/>

  <!-- Event Bus -->
  <rect x="334" y="80" width="212" height="80" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Event Stream</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Unix Socket / TCP</text>

  <!-- Arrow from event bus to consumers -->
  <line x1="546" y1="120" x2="606" y2="120" stroke="#555" stroke-width="1.5"/>
  <polygon points="606,114 620,120 606,126" fill="#555"/>

  <!-- Consumers -->
  <rect x="620" y="80" width="200" height="80" rx="8" fill="#111827" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="720" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">Consumers</text>
  <text x="720" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">docker events / 스크립트</text>

  <!-- Event Type Examples -->
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">주요 이벤트 유형</text>

  <!-- Container events -->
  <rect x="334" y="214" width="212" height="110" rx="8" fill="#111320" stroke="#333" stroke-width="1"/>
  <text x="350" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">container</text>
  <text x="350" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">create / start / stop</text>
  <text x="350" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">kill / die / restart</text>
  <text x="350" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">pause / unpause / exec_start</text>
  <text x="350" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">attach / copy / rename / rm</text>

  <!-- Consumer details -->
  <rect x="620" y="200" width="200" height="144" rx="8" fill="#111320" stroke="#333" stroke-width="1"/>
  <text x="636" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">모니터링 활용</text>
  <text x="636" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 자동 재시작 감지</text>
  <text x="636" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 배포 완료 알림</text>
  <text x="636" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 컨테이너 이상 감지</text>
  <text x="636" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• CI/CD 훅 트리거</text>
  <text x="636" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 로그 수집 시스템</text>

  <!-- Daemon sources arrow down -->
  <line x1="104" y1="160" x2="104" y2="212" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="216" y1="160" x2="216" y2="212" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Filter label -->
  <rect x="334" y="354" width="212" height="60" rx="8" fill="#111320" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">--filter 옵션</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">type / event / container / label</text>

  <!-- Time range -->
  <rect x="60" y="354" width="200" height="60" rx="8" fill="#111320" stroke="#333" stroke-width="1"/>
  <text x="160" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">시간 범위 지정</text>
  <text x="160" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">--since / --until</text>

  <!-- Output format -->
  <rect x="620" y="374" width="200" height="40" rx="8" fill="#111320" stroke="#333" stroke-width="1"/>
  <text x="720" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">--format (Go template)</text>

  <!-- Bottom note -->
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">이벤트는 블로킹 스트림 — Ctrl+C 또는 --until 조건 충족 시 종료</text>
</svg>
