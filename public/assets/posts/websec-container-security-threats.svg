<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컨테이너 보안 위협 모델</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Docker / Kubernetes 공격 경로와 방어 레이어</text>

  <!-- Host -->
  <rect x="40" y="400" width="800" height="60" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">호스트 OS / 커널</text>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컨테이너 탈출 공격 대상 — 커널 취약점, 권한 상승, seccomp/AppArmor 우회</text>

  <!-- K8s control plane -->
  <rect x="40" y="310" width="800" height="68" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Kubernetes 제어 플레인</text>
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">API Server · etcd · Scheduler · Controller Manager</text>
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">RBAC 미설정, etcd 무인증 노출, API Server 공개 접근이 주요 위협</text>

  <!-- Containers row -->
  <rect x="40" y="190" width="240" height="96" rx="8" fill="#101820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">이미지 취약점</text>
  <text x="160" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">베이스 이미지 CVE</text>
  <text x="160" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">공개 레지스트리 신뢰 문제</text>
  <text x="160" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Image Vulnerability</text>

  <rect x="320" y="190" width="240" height="96" rx="8" fill="#201010" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">런타임 권한 과다</text>
  <text x="440" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">--privileged 플래그</text>
  <text x="440" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">root 실행 컨테이너</text>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Overprivileged Container</text>

  <rect x="600" y="190" width="240" height="96" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">시크릿 노출</text>
  <text x="720" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">이미지에 하드코딩된 키</text>
  <text x="720" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">env 평문 시크릿</text>
  <text x="720" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Secret Exposure</text>

  <!-- Arrows down -->
  <line x1="160" y1="286" x2="160" y2="308" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="286" x2="440" y2="308" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="720" y1="286" x2="720" y2="308" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Attacker -->
  <rect x="40" y="100" width="200" height="64" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">외부 공격자</text>
  <text x="140" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">네트워크 스캔 / 익스플로잇</text>

  <!-- Arrow attacker to image vuln -->
  <line x1="240" y1="132" x2="318" y2="214" stroke="#e05555" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <!-- Defense label -->
  <rect x="620" y="100" width="220" height="64" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">방어 전략</text>
  <text x="730" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">최소 권한 · 이미지 스캔 · RBAC</text>
</svg>
