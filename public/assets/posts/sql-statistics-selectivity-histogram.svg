<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">히스토그램과 선택도 추정</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">CBO가 값 분포를 어떻게 파악하는가</text>

  <!-- X axis label -->
  <text x="240" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">score 값 분포 히스토그램</text>

  <!-- Histogram bars (left side) -->
  <line x1="80" y1="350" x2="80" y2="130" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="350" x2="400" y2="350" stroke="#333" stroke-width="1"/>

  <!-- Bars -->
  <rect x="90" y="320" width="40" height="30" fill="#7777cc" rx="2"/>
  <rect x="140" y="270" width="40" height="80" fill="#7777cc" rx="2"/>
  <rect x="190" y="200" width="40" height="150" fill="#7ec8e3" rx="2"/>
  <rect x="240" y="160" width="40" height="190" fill="#7ec8e3" rx="2"/>
  <rect x="290" y="200" width="40" height="150" fill="#7777cc" rx="2"/>
  <rect x="340" y="270" width="40" height="80" fill="#7777cc" rx="2"/>

  <!-- X axis labels -->
  <text x="110" y="368" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">0-20</text>
  <text x="160" y="368" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">20-40</text>
  <text x="210" y="368" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">40-60</text>
  <text x="260" y="368" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">60-80</text>
  <text x="310" y="368" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">80-90</text>
  <text x="360" y="368" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">90+</text>

  <!-- Y axis label -->
  <text x="65" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" transform="rotate(-90,65,246)">행 수</text>

  <!-- Query annotation -->
  <rect x="80" y="395" width="320" height="36" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="96" y="411" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">WHERE</tspan><tspan fill="#e8e8e8"> score </tspan><tspan fill="#7ec8e3">BETWEEN</tspan><tspan fill="#b5cea8"> 40</tspan><tspan fill="#7ec8e3"> AND</tspan><tspan fill="#b5cea8"> 80</tspan></text>

  <text x="96" y="425" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">-- 선택도 ≈ 0.40 (40% 행 해당)</text>

  <!-- Right: Selectivity explanation -->
  <rect x="460" y="95" width="360" height="360" fill="#111" rx="8" stroke="#333"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">선택도(Selectivity) 개념</text>

  <text x="480" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">선택도 = 조건을 만족하는 행 수 / 전체 행 수</text>

  <!-- Selectivity scale -->
  <rect x="480" y="165" width="320" height="20" fill="#1a1a1a" rx="3"/>
  <rect x="480" y="165" width="32" height="20" fill="#55c555" rx="3"/>
  <text x="496" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#000">1%</text>
  <rect x="640" y="165" width="160" height="20" fill="#e05555" rx="3"/>
  <text x="720" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#fff">50%+</text>
  <text x="480" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">낮은 선택도 → 인덱스 유리</text>
  <text x="640" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">높은 선택도 → Full Scan 유리</text>

  <!-- Statistics items -->
  <text x="480" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">주요 통계 항목</text>

  <rect x="480" y="240" width="320" height="130" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="496" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- pg_stats 조회 (PostgreSQL)</text>
  <text x="496" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="542" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> n_distinct,</text>
  <text x="496" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">       correlation,</text>
  <text x="496" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">       most_common_vals</text>
  <text x="496" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM</text>
  <text x="532" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> pg_stats</text>
  <text x="496" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="541" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> tablename=</text>
  <text x="625" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'orders'</text>
  <text x="496" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">AND</text>
  <text x="524" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> attname=</text>
  <text x="592" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'score'</text>

  <!-- Note -->
  <text x="640" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ANALYZE 실행 후 갱신됨</text>
</svg>
