<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 컴포넌트 해부도</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Head · Body · Foot — 영역별 역할과 구성 요소</text>

  <!-- Grid outer box -->
  <rect x="60" y="90" width="760" height="390" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Head Row -->
  <rect x="60" y="90" width="760" height="44" fill="#1e2d3d" rx="8 8 0 0"/>
  <text x="90" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">HeadBand</text>
  <!-- Head cells -->
  <line x1="170" y1="90" x2="170" y2="134" stroke="#0a0a0a" stroke-width="1"/>
  <text x="240" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">사번</text>
  <line x1="310" y1="90" x2="310" y2="134" stroke="#0a0a0a" stroke-width="1"/>
  <text x="410" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">성명</text>
  <line x1="510" y1="90" x2="510" y2="134" stroke="#0a0a0a" stroke-width="1"/>
  <text x="590" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">부서</text>
  <line x1="670" y1="90" x2="670" y2="134" stroke="#0a0a0a" stroke-width="1"/>
  <text x="755" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">입사일</text>

  <!-- RowNum label -->
  <text x="110" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">RowNum</text>

  <!-- Body Rows -->
  <rect x="60" y="134" width="760" height="32" fill="#0f1929"/>
  <text x="110" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">1</text>
  <text x="240" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">EMP001</text>
  <text x="410" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">홍길동</text>
  <text x="590" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">개발1팀</text>
  <text x="755" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">2020-03-02</text>

  <!-- Selected row -->
  <rect x="60" y="166" width="760" height="32" fill="#1d4ed8" opacity="0.3"/>
  <rect x="60" y="166" width="760" height="32" fill="none" stroke="#1d4ed8" stroke-width="1"/>
  <text x="110" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">2</text>
  <text x="240" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">EMP002</text>
  <text x="410" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">김철수</text>
  <text x="590" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">개발2팀</text>
  <text x="755" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">2021-07-15</text>

  <rect x="60" y="198" width="760" height="32" fill="#0f1929"/>
  <text x="110" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">3</text>
  <text x="240" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">EMP003</text>
  <text x="410" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">이영희</text>
  <text x="590" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">QA팀</text>
  <text x="755" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">2019-11-20</text>

  <!-- Body label -->
  <rect x="60" y="230" width="760" height="32" fill="#111827"/>
  <rect x="60" y="262" width="760" height="32" fill="#0f1929"/>
  <rect x="60" y="294" width="760" height="32" fill="#111827"/>
  <rect x="60" y="326" width="760" height="32" fill="#0f1929"/>
  <!-- dots -->
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#555" text-anchor="middle">⋮ BodyBand</text>
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Dataset 행 수만큼 반복 렌더링</text>

  <!-- Foot Row -->
  <rect x="60" y="358" width="760" height="44" fill="#1a2535" rx="0 0 8 8"/>
  <line x1="170" y1="358" x2="170" y2="402" stroke="#0a0a0a" stroke-width="1"/>
  <text x="90" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Foot</text>
  <text x="755" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">합계 / 건수</text>

  <!-- Column dividers (full height) -->
  <line x1="170" y1="90" x2="170" y2="402" stroke="#0a0a0a" stroke-width="1" opacity="0.5"/>
  <line x1="310" y1="90" x2="310" y2="402" stroke="#0a0a0a" stroke-width="1" opacity="0.5"/>
  <line x1="510" y1="90" x2="510" y2="402" stroke="#0a0a0a" stroke-width="1" opacity="0.5"/>
  <line x1="670" y1="90" x2="670" y2="402" stroke="#0a0a0a" stroke-width="1" opacity="0.5"/>

  <!-- Properties summary -->
  <rect x="60" y="420" width="760" height="72" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="90" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">bindingInfo</text>
  <text x="90" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">ds_emp (Dataset ID)</text>
  <text x="270" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">rowcount</text>
  <text x="270" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">현재 표시 행 수</text>
  <text x="450" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">selecttype</text>
  <text x="450" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">single | multi | cell</text>
  <text x="640" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">readonly</text>
  <text x="640" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">true | false</text>
  <text x="90" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ oncellclick / oncelldblclick / onrowchanged 핵심 이벤트</text>
</svg>
