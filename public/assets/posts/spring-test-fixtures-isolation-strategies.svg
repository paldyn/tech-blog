<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">테스트 격리 전략 비교</text>

  <!-- Column headers -->
  <text x="150" y="82" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">전략</text>
  <text x="380" y="82" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">격리 수준</text>
  <text x="590" y="82" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">속도</text>
  <text x="760" y="82" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">사용 시나리오</text>

  <!-- Header divider -->
  <line x1="60" y1="90" x2="820" y2="90" stroke="#222" stroke-width="1"/>

  <!-- Row 1: @Transactional + @Rollback -->
  <rect x="60" y="98" width="760" height="64" rx="6" fill="#0d1b33" stroke="#2a3a60" stroke-width="1"/>
  <text x="150" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">@Transactional</text>
  <text x="150" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">+ @Rollback</text>
  <text x="380" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">높음 — 각 테스트 롤백</text>
  <text x="590" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">빠름</text>
  <text x="760" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Repository 단위 테스트</text>

  <!-- Row 2: @Sql -->
  <rect x="60" y="174" width="760" height="64" rx="6" fill="#1a1a0d" stroke="#3a3a20" stroke-width="1"/>
  <text x="150" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#c5c555">@Sql</text>
  <text x="150" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">+ @SqlConfig</text>
  <text x="380" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c5c555">중간 — SQL 스크립트 제어</text>
  <text x="590" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c5c555">보통</text>
  <text x="760" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">복잡한 초기 데이터 세팅</text>

  <!-- Row 3: @DirtiesContext -->
  <rect x="60" y="250" width="760" height="64" rx="6" fill="#1a0d0d" stroke="#3a1a1a" stroke-width="1"/>
  <text x="150" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">@DirtiesContext</text>
  <text x="380" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">완전 — 컨텍스트 재생성</text>
  <text x="590" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">느림</text>
  <text x="760" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컨텍스트 오염 시 최후 수단</text>
  <text x="150" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(최대한 피할 것)</text>

  <!-- Row 4: Testcontainers + BeforeEach -->
  <rect x="60" y="326" width="760" height="64" rx="6" fill="#1a2e1a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="150" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Testcontainers</text>
  <text x="150" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">+ @BeforeEach</text>
  <text x="380" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">최고 — 실제 DB로 완전 격리</text>
  <text x="590" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">느림 (Docker)</text>
  <text x="760" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">통합 테스트, CI 환경</text>

  <!-- Bottom note -->
  <text x="440" y="422" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">권장 조합: Repository → @Transactional/@Rollback, 통합 → @Sql + Testcontainers</text>

  <!-- Column dividers -->
  <line x1="260" y1="90" x2="260" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="490" y1="90" x2="490" y2="400" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="680" y1="90" x2="680" y2="400" stroke="#1a1a1a" stroke-width="1"/>
</svg>
