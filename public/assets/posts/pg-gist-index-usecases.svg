<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GiST 인덱스 활용 — 범위, 기하, 트라이그램</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">오퍼레이터 클래스별 적용 예</text>

  <!-- Range types -->
  <rect x="60" y="96" width="240" height="256" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="180" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">범위 타입 (tsrange)</text>
  <text x="74" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 예약 시스템</text>
  <text x="74" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">CREATE TABLE bookings (</text>
  <text x="74" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  id    BIGSERIAL,</text>
  <text x="74" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  room  INT,</text>
  <text x="74" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  dur   tsrange</text>
  <text x="74" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">);</text>
  <text x="74" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">CREATE INDEX ON bookings</text>
  <text x="74" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">  USING gist (dur);</text>
  <text x="74" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 겹치는 예약 탐지</text>
  <text x="74" y="301" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">SELECT * FROM bookings</text>
  <text x="74" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">WHERE dur &amp;&amp;</text>
  <text x="74" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">  '[2026-05-01,2026-05-03)';</text>

  <!-- PostGIS -->
  <rect x="320" y="96" width="240" height="256" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">공간 검색 (PostGIS)</text>
  <text x="334" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 위치 기반 검색</text>
  <text x="334" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">CREATE TABLE stores (</text>
  <text x="334" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  id   BIGSERIAL,</text>
  <text x="334" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  loc  geometry(POINT,4326)</text>
  <text x="334" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">);</text>
  <text x="334" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">CREATE INDEX ON stores</text>
  <text x="334" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">  USING gist (loc);</text>
  <text x="334" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 반경 내 매장</text>
  <text x="334" y="281" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">SELECT * FROM stores</text>
  <text x="334" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">WHERE ST_DWithin(</text>
  <text x="334" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  loc,</text>
  <text x="334" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  ST_MakePoint(126.9, 37.5),</text>
  <text x="334" y="349" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#b5cea8" xml:space="preserve">  1000 -- 1km</text>

  <!-- pg_trgm -->
  <rect x="580" y="96" width="240" height="256" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="700" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">트라이그램 유사도 (pg_trgm)</text>
  <text x="594" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- 유사 문자열 검색</text>
  <text x="594" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">CREATE EXTENSION</text>
  <text x="594" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">  pg_trgm;</text>
  <text x="594" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">CREATE INDEX ON products</text>
  <text x="594" y="209" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">  USING gist</text>
  <text x="594" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  (name gist_trgm_ops);</text>
  <text x="594" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">-- LIKE/ILIKE도 인덱스 사용</text>
  <text x="594" y="265" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">SELECT * FROM products</text>
  <text x="594" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">WHERE name % </text>
  <text x="594" y="299" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">  'postgresl'; -- 오타 허용</text>
  <text x="594" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">SELECT * FROM products</text>
  <text x="594" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3" xml:space="preserve">WHERE name ILIKE</text>
  <text x="594" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ce9178" xml:space="preserve">  '%postgres%';</text>
</svg>
