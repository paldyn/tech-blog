<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 기본 타입 코드 예시</text>
  <!-- Left code block -->
  <rect x="60" y="70" width="380" height="370" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="76" dy="0" fill="#9aa4b8">// 원시 타입 예시</tspan>
    <tspan x="76" dy="22" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> age: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">25</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> active: </tspan><tspan fill="#7ec8e3" font-weight="600">boolean</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="76" dy="28" fill="#9aa4b8">// 배열 타입 (두 가지 표기)</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> nums: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">[] = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">];</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> strs: Array&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">&gt; = [];</tspan>
    <tspan x="76" dy="28" fill="#9aa4b8">// 튜플 타입</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> pair: [</tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">]</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  = [</tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#ffffff">];</tspan>
    <tspan x="76" dy="28" fill="#9aa4b8">// 함수 타입</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> greet:</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  (name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">) =&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">void</tspan>
    <tspan x="76" dy="20" fill="#ffffff">  = (n) =&gt; console.log(n);</tspan>
  </text>
  <!-- Right code block -->
  <rect x="460" y="70" width="380" height="370" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="476" dy="0" fill="#9aa4b8">// 특수 타입 비교</tspan>
    <tspan x="476" dy="22" fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> a: </tspan><tspan fill="#ce9178" font-weight="600">any</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">;  </tspan>
    <tspan x="476" dy="20" fill="#ffffff">a = </tspan><tspan fill="#ce9178">"string"</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">// OK, 타입 검사 없음</tspan>
    <tspan x="476" dy="28" fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> u: </tspan><tspan fill="#7ec8e3" font-weight="600">unknown</tspan><tspan fill="#ffffff"> = fetchData();</tspan>
    <tspan x="476" dy="20" fill="#9aa4b8">// u.toFixed(); // 오류!</tspan>
    <tspan x="476" dy="20" fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">typeof</tspan><tspan fill="#ffffff"> u === </tspan><tspan fill="#ce9178">"number"</tspan><tspan fill="#ffffff">) {</tspan>
    <tspan x="476" dy="20" fill="#ffffff">  u.toFixed(); </tspan><tspan fill="#9aa4b8">// OK</tspan>
    <tspan x="476" dy="20" fill="#ffffff">}</tspan>
    <tspan x="476" dy="28" fill="#9aa4b8">// void vs never</tspan>
    <tspan x="476" dy="20" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> log(): </tspan><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> {</tspan>
    <tspan x="476" dy="20" fill="#ffffff">  console.log(</tspan><tspan fill="#ce9178">"hi"</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="476" dy="20" fill="#ffffff">}</tspan>
    <tspan x="476" dy="22" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> fail(): </tspan><tspan fill="#7777cc" font-weight="600">never</tspan><tspan fill="#ffffff"> {</tspan>
    <tspan x="476" dy="20" fill="#7ec8e3" font-weight="600">  throw</tspan><tspan fill="#7ec8e3" font-weight="600"> new</tspan><tspan fill="#ffffff"> Error(</tspan><tspan fill="#ce9178">"항상 예외"</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="476" dy="20" fill="#ffffff">}</tspan>
  </text>
  <!-- Bottom note -->
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">unknown은 any보다 안전 — 좁히기(narrowing) 후에만 사용 가능</text>
</svg>
