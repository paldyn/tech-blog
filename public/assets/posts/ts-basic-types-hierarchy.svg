<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr5" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 기본 타입 개요</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">자주 사용하는 내장 타입들</text>
  <!-- Primitive types row -->
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">원시 타입 (Primitive Types)</text>
  <!-- string -->
  <rect x="60" y="120" width="108" height="50" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="114" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">string</text>
  <text x="114" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">문자열</text>
  <!-- number -->
  <rect x="184" y="120" width="108" height="50" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="238" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">number</text>
  <text x="238" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">숫자 (정수+실수)</text>
  <!-- boolean -->
  <rect x="308" y="120" width="108" height="50" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="362" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">boolean</text>
  <text x="362" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">참/거짓</text>
  <!-- bigint -->
  <rect x="432" y="120" width="108" height="50" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="486" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">bigint</text>
  <text x="486" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">큰 정수</text>
  <!-- symbol -->
  <rect x="556" y="120" width="108" height="50" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="610" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">symbol</text>
  <text x="610" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">유일한 값</text>
  <!-- null/undefined -->
  <rect x="680" y="120" width="140" height="50" rx="6" fill="#1a0d0d" stroke="#5a2a2a" stroke-width="1.5"/>
  <text x="750" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" font-weight="600">null · undefined</text>
  <text x="750" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">strictNull 주의</text>
  <!-- Special types row -->
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">특수 타입 (Special Types)</text>
  <!-- any -->
  <rect x="60" y="216" width="150" height="60" rx="6" fill="#1a1208" stroke="#4a3a08" stroke-width="1.5"/>
  <text x="135" y="240" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e0a055" font-weight="600">any</text>
  <text x="135" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">타입 검사 우회 (최대한 피할 것)</text>
  <!-- unknown -->
  <rect x="228" y="216" width="150" height="60" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="303" y="240" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" font-weight="600">unknown</text>
  <text x="303" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">any의 안전한 대안</text>
  <!-- never -->
  <rect x="396" y="216" width="150" height="60" rx="6" fill="#1a0808" stroke="#5a1a1a" stroke-width="1.5"/>
  <text x="471" y="240" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555" font-weight="600">never</text>
  <text x="471" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">도달 불가 코드</text>
  <!-- void -->
  <rect x="564" y="216" width="150" height="60" rx="6" fill="#0d1a2a" stroke="#4a6e4a" stroke-width="1.5"/>
  <text x="639" y="240" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" font-weight="600">void</text>
  <text x="639" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">반환값 없는 함수</text>
  <!-- object -->
  <rect x="732" y="216" width="88" height="60" rx="6" fill="#0d1a2a" stroke="#4a4a8e" stroke-width="1.5"/>
  <text x="776" y="240" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7777cc" font-weight="600">object</text>
  <text x="776" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">객체 타입</text>
  <!-- Composite types row -->
  <text x="440" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">복합 타입 (Composite Types)</text>
  <rect x="60" y="318" width="165" height="60" rx="6" fill="#111122" stroke="#3a3a6e" stroke-width="1"/>
  <text x="142" y="342" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" font-weight="600">string[]</text>
  <text x="142" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">배열 타입</text>
  <rect x="244" y="318" width="165" height="60" rx="6" fill="#111122" stroke="#3a3a6e" stroke-width="1"/>
  <text x="326" y="342" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" font-weight="600">[string, number]</text>
  <text x="326" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">튜플 타입</text>
  <rect x="428" y="318" width="165" height="60" rx="6" fill="#111122" stroke="#3a3a6e" stroke-width="1"/>
  <text x="510" y="342" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" font-weight="600">A | B</text>
  <text x="510" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유니온 타입</text>
  <rect x="612" y="318" width="165" height="60" rx="6" fill="#111122" stroke="#3a3a6e" stroke-width="1"/>
  <text x="694" y="342" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" font-weight="600">A &amp; B</text>
  <text x="694" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인터섹션 타입</text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">TypeScript의 타입 시스템은 이 기본 빌딩 블록으로 복잡한 타입을 표현합니다</text>
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">strict 모드에서 null · undefined는 자동으로 포함되지 않습니다</text>
</svg>
