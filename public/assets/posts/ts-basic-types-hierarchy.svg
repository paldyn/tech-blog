<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="270">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#3a6ea8"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 타입 계층 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">unknown(최상위) → 원시/객체 → never(최하위)</text>
  <!-- Top: unknown -->
  <rect x="330" y="90" width="220" height="48" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="700" fill="#e05555">unknown</text>
  <text x="440" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">모든 타입의 슈퍼타입</text>
  <!-- Line from unknown down to any and primitives -->
  <line x1="440" y1="138" x2="440" y2="163" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Second level: any, primitive types, object -->
  <rect x="170" y="165" width="100" height="42" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="191" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="700" fill="#e05555">any</text>
  <!-- Lines from unknown to primitives -->
  <line x1="330" y1="163" x2="220" y2="165" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="380" y1="163" x2="350" y2="165" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="440" y1="163" x2="440" y2="165" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="500" y1="163" x2="530" y2="165" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="550" y1="163" x2="660" y2="165" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Primitive types -->
  <rect x="290" y="165" width="100" height="42" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="340" y="191" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">string</text>
  <rect x="400" y="165" width="100" height="42" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="450" y="191" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">number</text>
  <rect x="510" y="165" width="100" height="42" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="560" y="191" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">boolean</text>
  <rect x="620" y="165" width="100" height="42" rx="6" fill="#0a1a10" stroke="#2a6a2a" stroke-width="1.5"/>
  <text x="670" y="191" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">object</text>
  <!-- Lines to null, undefined, string literals -->
  <line x1="220" y1="207" x2="220" y2="232" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="340" y1="207" x2="300" y2="232" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="340" y1="207" x2="420" y2="232" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="450" y1="207" x2="450" y2="232" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Third level -->
  <rect x="130" y="232" width="120" height="42" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="190" y="258" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#888">undefined</text>
  <rect x="260" y="232" width="80" height="42" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="300" y="258" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#888">null</text>
  <rect x="350" y="232" width="120" height="42" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="410" y="250" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" font-weight="600" fill="#7ec8e3">"hello"</text>
  <text x="410" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">리터럴 타입</text>
  <rect x="480" y="232" width="120" height="42" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="540" y="250" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" font-weight="600" fill="#7ec8e3">42 | 100</text>
  <text x="540" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">숫자 리터럴</text>
  <!-- Lines to never -->
  <line x1="190" y1="274" x2="360" y2="345" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="300" y1="274" x2="385" y2="345" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="410" y1="274" x2="410" y2="345" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="540" y1="274" x2="435" y2="345" stroke="#3a6ea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Bottom: never -->
  <rect x="330" y="347" width="220" height="48" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="375" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="700" fill="#7777cc">never</text>
  <text x="440" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">모든 타입의 서브타입 (공집합)</text>
  <!-- Legend -->
  <rect x="60" y="435" width="760" height="48" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">unknown = 모든 값 허용(사용 전 타입 좁히기 필요) | any = 타입 검사 우회</text>
  <text x="440" y="476" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">never = 존재할 수 없는 값 (빈 유니언, 무한루프 함수 등)</text>
</svg>
