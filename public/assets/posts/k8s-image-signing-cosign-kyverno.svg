<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Kyverno Policy로 서명되지 않은 이미지 차단</text>

  <!-- Kyverno Policy YAML -->
  <rect x="60" y="70" width="480" height="310" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># ClusterPolicy — 서명 검증</text>
  <text x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">apiVersion: kyverno.io/v1</text>
  <text x="76" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">kind: ClusterPolicy</text>
  <text x="76" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">metadata:</text>
  <text x="76" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  name: verify-image-signature</text>
  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">spec:</text>
  <text x="76" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">  validationFailureAction: Enforce</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  rules:</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">    - name: check-image-signature</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">      verifyImages:</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">        - imageReferences:</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">            - "my-registry/*"</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">          attestors:</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">            - entries:</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">                - keys:</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">                    publicKeys: |-</text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">                      -----BEGIN PUBLIC KEY-----</text>

  <!-- Right: explanation -->
  <rect x="580" y="70" width="260" height="310" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Admission 제어 흐름</text>

  <rect x="600" y="110" width="220" height="50" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Pod 생성 요청</text>
  <text x="710" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">kubectl apply</text>

  <rect x="600" y="180" width="220" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Kyverno Webhook</text>
  <text x="710" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서명 검증 수행</text>

  <rect x="600" y="250" width="100" height="50" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">허용</text>
  <text x="650" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">서명 유효</text>

  <rect x="720" y="250" width="100" height="50" rx="6" fill="#200f10" stroke="#e05555" stroke-width="1"/>
  <text x="770" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">차단</text>
  <text x="770" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">서명 없음/무효</text>

  <text x="600" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" xml:space="preserve">Enforce: 즉시 거부</text>
  <text x="600" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" xml:space="preserve">Audit: 허용 후 기록</text>
  <text x="600" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" xml:space="preserve">처음엔 Audit부터!</text>
</svg>
