<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">mkdir -p: 중첩 디렉터리 한 번에 생성</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">-p 옵션 없이는 중간 경로가 없으면 오류 발생</text>

  <!-- Without -p -->
  <text x="160" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">-p 없이 (오류)</text>
  <rect x="60" y="112" width="200" height="56" fill="#070b14" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ mkdir a/b/c</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">mkdir: a/b: No such dir</text>

  <!-- With -p -->
  <text x="560" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">-p 사용 (성공)</text>
  <rect x="460" y="112" width="200" height="56" fill="#070b14" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ mkdir -p a/b/c</text>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555"># a, a/b, a/b/c 모두 생성</text>

  <!-- Arrow between -->
  <polygon points="438,140 458,132 458,148" fill="#7ec8e3"/>
  <line x1="260" y1="140" x2="457" y2="140" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="358" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">-p 추가</text>

  <!-- Resulting tree -->
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">생성 결과 트리</text>
  <!-- Root -->
  <rect x="390" y="216" width="100" height="28" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">a/</text>
  <!-- a to a/b -->
  <line x1="440" y1="244" x2="440" y2="272" stroke="#444" stroke-width="1.5"/>
  <rect x="390" y="272" width="100" height="28" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">b/</text>
  <!-- a/b to a/b/c -->
  <line x1="440" y1="300" x2="440" y2="328" stroke="#444" stroke-width="1.5"/>
  <rect x="390" y="328" width="100" height="28" fill="#0f2a0f" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">c/</text>

  <!-- Brace label -->
  <line x1="498" y1="216" x2="510" y2="216" stroke="#55c555" stroke-width="1"/>
  <line x1="510" y1="216" x2="510" y2="356" stroke="#55c555" stroke-width="1"/>
  <line x1="498" y1="356" x2="510" y2="356" stroke="#55c555" stroke-width="1"/>
  <polygon points="510,286 530,278 530,294" fill="#55c555"/>
  <text x="534" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">한 명령으로</text>
  <text x="534" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">모두 생성</text>

  <!-- mkdir with multiple dirs -->
  <rect x="60" y="390" width="760" height="0" fill="none"/>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">mkdir -p 는 경로가 이미 존재해도 오류 없이 넘어간다 (멱등)</text>
</svg>
