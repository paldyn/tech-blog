<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">딕셔너리 컴프리헨션 · 패턴</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">딕셔너리 생성 관용구와 update 전략</text>

  <rect x="60" y="100" width="760" height="270" rx="10" fill="#111520" stroke="#1e2433"/>
  <rect x="80" y="116" width="720" height="238" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 컴프리헨션</tspan></text>
  <text x="96" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">squares = {x: x**</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> x </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">range</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">)}  </tspan><tspan fill="#6a8aa0"># {0:0, 1:1, 2:4, ...}</tspan></text>
  <text x="96" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">inv = {v: k </tspan><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> k, v </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#e8e8e8"> d.items()}    </tspan><tspan fill="#6a8aa0"># 키-값 뒤집기</tspan></text>
  <text x="96" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"></tspan></text>
  <text x="96" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># update (덮어쓰기)</tspan></text>
  <text x="96" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d.update({</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">})         </tspan><tspan fill="#6a8aa0"># dict</tspan></text>
  <text x="96" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">d.update(b=</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, c=</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">)        </tspan><tspan fill="#6a8aa0"># kwargs</tspan></text>
  <text x="96" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"></tspan></text>
  <text x="96" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># zip으로 두 리스트 → dict</tspan></text>
  <text x="96" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">keys = [</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"b"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"c"</tspan><tspan fill="#e8e8e8">]</tspan></text>
  <text x="96" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">vals = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">]</tspan></text>
  <text x="96" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">mapping = </tspan><tspan fill="#7ec8e3">dict</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#7ec8e3">zip</tspan><tspan fill="#e8e8e8">(keys, vals))  </tspan><tspan fill="#6a8aa0"># {"a":1, "b":2, "c":3}</tspan></text>
</svg>
