<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <defs>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-accent" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7777cc"/>
    </marker>
    <marker id="arrow-info" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-warn" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">프롬프트 버전 트리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">각 버전: template · score · test_pass_rate · 회귀 감지</text>

  <!-- ── v1.0 (root) ── -->
  <rect x="60" y="96" width="176" height="92" rx="10" fill="#111" stroke="#555" stroke-width="2"/>
  <text x="148" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#888">v1.0</text>
