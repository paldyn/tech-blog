  <rect x="700" y="210" width="160" height="56" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="780" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">회귀 감지</text>
