  <text x="619" y="438" font-family="'JetBrains Mono',monospace" font-size="13" fill="#b5cea8">0.89</text>
  <text x="514" y="450" font-family="'JetBrains Mono',monospace" font-size="13" fill="#7ec8e3" font-weight="600">regression</text>
  <text x="612" y="450" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="625" y="450" font-family="'JetBrains Mono',monospace" font-size="13" fill="#b5cea8">false</text>
