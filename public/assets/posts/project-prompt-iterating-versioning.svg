  <text x="595" y="402" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ce9178">"2.0"</text>
  <text x="514" y="420" font-family="'JetBrains Mono',monospace" font-size="13" fill="#7ec8e3" font-weight="600">score</text>
  <text x="566" y="420" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">: </text>
  <text x="579" y="420" font-family="'JetBrains Mono',monospace" font-size="13" fill="#b5cea8">0.86</text>
  <text x="514" y="438" font-family="'JetBrains Mono',monospace" font-size="13" fill="#7ec8e3" font-weight="600">pass_rate</text>
