  <rect x="494" y="362" width="326" height="96" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="514" y="384" font-family="'JetBrains Mono',monospace" font-size="13" fill="#9aa4b8"># prompt v2.0 template</text>
