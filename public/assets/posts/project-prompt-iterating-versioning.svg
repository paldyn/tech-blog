  <line x1="458" y1="142" x2="502" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ── v2.0 ── -->
  <rect x="504" y="96" width="176" height="92" rx="10" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="592" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">v2.0</text>
  <text x="592" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">template: cot_v2.yaml</text>
