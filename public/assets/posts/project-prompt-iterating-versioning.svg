  <text x="210" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">74%</text>

  <!-- v2.0: 86% -->
  <rect x="286" y="391" width="48" height="39" rx="3" fill="#55c555"/>
  <text x="310" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">86%</text>

  <!-- v2.1: 71% (regression) -->
  <rect x="382" y="402" width="48" height="28" rx="3" fill="#e05555"/>
  <text x="406" y="419" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">71%</text>

