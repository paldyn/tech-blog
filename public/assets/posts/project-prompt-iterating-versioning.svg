  <text x="148" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">score: 61%</text>
  <text x="148" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">pass_rate: 58%</text>

  <!-- v1.0 → v1.1 -->
  <line x1="236" y1="142" x2="280" y2="142" stroke="#7777cc" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <!-- ── v1.1 ── -->
  <rect x="282" y="96" width="176" height="92" rx="10" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <text x="370" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">v1.1</text>
  <text x="370" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">template: cot_v1.yaml</text>
  <text x="370" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">score: 74%  +13%</text>
  <text x="370" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">pass_rate: 71%</text>

