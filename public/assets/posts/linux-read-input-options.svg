<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">read 명령어 옵션</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">표준 입력에서 사용자 입력을 변수에 저장</text>

  <!-- options table -->
  <!-- header -->
  <rect x="60" y="100" width="760" height="36" fill="#1e2433" rx="6"/>
  <text x="140" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">옵션</text>
  <text x="400" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">설명</text>
  <text x="680" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">예시</text>

  <!-- rows -->
  <rect x="60" y="136" width="760" height="30" fill="#111827" rx="0"/>
  <text x="140" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-p "프롬프트"</text>
  <text x="380" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">입력 전 프롬프트 출력</text>
  <text x="680" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">read -p "이름: " name</text>

  <rect x="60" y="166" width="760" height="30" fill="#0f1621" rx="0"/>
  <text x="140" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-s</text>
  <text x="380" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">입력 에코 억제 (비밀번호)</text>
  <text x="680" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">read -sp "PW: " pass</text>

  <rect x="60" y="196" width="760" height="30" fill="#111827" rx="0"/>
  <text x="140" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-t N</text>
  <text x="380" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">N초 타임아웃</text>
  <text x="680" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">read -t 5 -p ">" ans</text>

  <rect x="60" y="226" width="760" height="30" fill="#0f1621" rx="0"/>
  <text x="140" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-n N</text>
  <text x="380" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">N자 입력 후 자동 완료</text>
  <text x="680" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">read -n 1 -p "?" key</text>

  <rect x="60" y="256" width="760" height="30" fill="#111827" rx="0"/>
  <text x="140" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-r</text>
  <text x="380" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">백슬래시를 이스케이프로 처리 안 함</text>
  <text x="680" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">read -r line</text>

  <rect x="60" y="286" width="760" height="30" fill="#0f1621" rx="0"/>
  <text x="140" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-a 배열명</text>
  <text x="380" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">공백 구분 단어를 배열로 저장</text>
  <text x="680" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">read -a arr</text>

  <rect x="60" y="316" width="760" height="30" fill="#111827" rx="0"/>
  <text x="140" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-d 구분자</text>
  <text x="380" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">개행 대신 지정 문자로 입력 종료</text>
  <text x="680" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">read -d '' var</text>

  <rect x="60" y="346" width="760" height="30" fill="#0f1621" rx="0"/>
  <text x="140" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-u FD</text>
  <text x="380" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">파일 디스크립터에서 읽기</text>
  <text x="680" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">read -u 3 line</text>

  <!-- bottom note -->
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">스크립트에서는 항상 -r을 기본으로 붙인다: read -r var</text>
</svg>
