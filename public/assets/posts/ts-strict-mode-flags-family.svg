<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrS" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">strict: true 가 켜는 플래그 묶음</text>

  <rect x="340" y="78" width="200" height="46" rx="8" fill="#11151c" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="106" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">strict: true</text>
  <line x1="440" y1="124" x2="440" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrS)"/>

  <rect x="50" y="170" width="240" height="64" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="70" y="196" font-size="13" font-weight="600" fill="#e8e8e8">noImplicitAny</text>
  <text x="70" y="218" font-size="11" fill="#888">암묵적 any 금지</text>

  <rect x="320" y="170" width="240" height="64" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="340" y="196" font-size="13" font-weight="600" fill="#e8e8e8">strictNullChecks</text>
  <text x="340" y="218" font-size="11" fill="#888">null·undefined 구분</text>

  <rect x="590" y="170" width="240" height="64" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="610" y="196" font-size="13" font-weight="600" fill="#e8e8e8">strictFunctionTypes</text>
  <text x="610" y="218" font-size="11" fill="#888">함수 파라미터 반공변</text>

  <rect x="50" y="254" width="240" height="64" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="70" y="280" font-size="13" font-weight="600" fill="#e8e8e8">strictPropertyInit.</text>
  <text x="70" y="302" font-size="11" fill="#888">필드 초기화 강제</text>

  <rect x="320" y="254" width="240" height="64" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="340" y="280" font-size="13" font-weight="600" fill="#e8e8e8">noImplicitThis</text>
  <text x="340" y="302" font-size="11" fill="#888">암묵적 this any 금지</text>

  <rect x="590" y="254" width="240" height="64" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="610" y="280" font-size="13" font-weight="600" fill="#e8e8e8">alwaysStrict</text>
  <text x="610" y="302" font-size="11" fill="#888">'use strict' 자동 삽입</text>

  <text x="60" y="344" font-size="13" fill="#9aa4b8">strict 한 줄이 여러 개별 플래그를 한꺼번에 켠다. 개별로 끄거나 켤 수도 있다.</text>
</svg>
