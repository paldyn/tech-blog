<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <defs>
    <marker id="arrowB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">React 렌더링 모델: 렌더 단계와 커밋 단계</text>

  <!-- Trigger -->
  <rect x="60" y="72" width="180" height="58" rx="10" fill="#101820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">트리거</text>
  <text x="150" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">state / props 변경</text>

  <!-- arrow -->
  <line x1="240" y1="101" x2="276" y2="101" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Render Phase -->
  <rect x="280" y="60" width="220" height="82" rx="10" fill="#0f1c2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Render 단계</text>
  <text x="390" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트 함수 호출</text>
  <text x="390" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">새 React Element 트리 생성</text>

  <!-- arrow -->
  <line x1="500" y1="101" x2="536" y2="101" stroke="#55c555" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Commit Phase -->
  <rect x="540" y="60" width="220" height="82" rx="10" fill="#0f1c2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Commit 단계</text>
  <text x="650" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">실제 DOM 조작</text>
  <text x="650" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경된 부분만 반영</text>

  <!-- 코드 예시 -->
  <rect x="60" y="172" width="380" height="188" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="196"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// Render 단계: 순수 계산만</text>
  <text x="76" y="216"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">function</text>
  <text x="150" y="216"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Counter({ count }) {</text>
  <text x="76" y="236"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">  return</text>
  <text x="138" y="236"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> (</text>
  <text x="76" y="256"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    &lt;div&gt;{count}&lt;/div&gt;</text>
  <text x="76" y="276"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  );</text>
  <text x="76" y="296"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="76" y="320"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// DOM 조작 = Commit 단계 역할</text>
  <text x="76" y="340"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">// (직접 하지 않음, React가 담당)</text>

  <!-- 오른쪽 특징 설명 -->
  <rect x="468" y="172" width="352" height="82" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="644" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Render 단계 특징</text>
  <text x="644" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">순수 함수처럼 동작 — 부수효과 없음</text>
  <text x="644" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">중단·재개·폐기가 가능 (Concurrent)</text>

  <rect x="468" y="270" width="352" height="90" rx="8" fill="#101820" stroke="#55c555" stroke-width="1.5"/>
  <text x="644" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Commit 단계 특징</text>
  <text x="644" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">동기적 실행 — 중단 불가</text>
  <text x="644" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DOM 변경 후 useLayoutEffect 실행</text>
  <text x="644" y="356" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">그 다음 useEffect 비동기 실행</text>

  <!-- 하단 요약 -->
  <rect x="60" y="376" width="760" height="76" rx="10" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="402" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">핵심 원칙</text>
  <text x="440" y="422" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">컴포넌트 함수는 Render 단계에서 여러 번 호출될 수 있다</text>
  <text x="440" y="440" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">DOM 변경은 Commit 단계에서만 일어나며, 화면은 이때 업데이트된다</text>
</svg>
