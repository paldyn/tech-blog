<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">이더넷 프레임의 FCS 위치</text>

  <!-- Frame structure -->
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이더넷 II 프레임 (최소 64byte ~ 최대 1518byte)</text>

  <!-- Frame boxes -->
  <rect x="60" y="80" width="80" height="50" rx="5" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#7ec8e3" text-anchor="middle">Preamble</text>
  <text x="100" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">8 byte</text>

  <rect x="148" y="80" width="120" height="50" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="208" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#55c555" text-anchor="middle">Dst MAC</text>
  <text x="208" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">6 byte</text>

  <rect x="276" y="80" width="120" height="50" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="336" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#55c555" text-anchor="middle">Src MAC</text>
  <text x="336" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">6 byte</text>

  <rect x="404" y="80" width="70" height="50" rx="5" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="439" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#888" text-anchor="middle">Type</text>
  <text x="439" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">2 byte</text>

  <rect x="482" y="80" width="240" height="50" rx="5" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="602" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#888" text-anchor="middle">Payload (IP Packet)</text>
  <text x="602" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">46 ~ 1500 byte</text>

  <rect x="730" y="80" width="90" height="50" rx="5" fill="#2a1a0a" stroke="#e05555" stroke-width="2"/>
  <text x="775" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">FCS</text>
  <text x="775" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">4 byte (CRC-32)</text>

  <!-- Annotation for FCS -->
  <line x1="775" y1="130" x2="775" y2="155" stroke="#e05555" stroke-width="1.5"/>
  <text x="775" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Frame Check Sequence</text>
  <text x="775" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">CRC-32 계산 결과 (4byte)</text>

  <!-- Notes -->
  <rect x="60" y="222" width="760" height="56" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">수신 NIC는 FCS를 검증 후 오류 프레임을 자동 폐기한다. 상위 계층에는 정상 프레임만 전달.</text>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CRC는 오류 감지만 한다 — 오류 수정은 TCP 재전송 또는 FEC(Forward Error Correction)가 담당.</text>
</svg>
