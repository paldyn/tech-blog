<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RDBMS 3-계층 구조</text>

  <!-- Application -->
  <rect x="330" y="68" width="220" height="52" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">애플리케이션 (클라이언트)</text>
  <text x="440" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Java / Python / Node.js ...</text>

  <!-- Arrow down -->
  <line x1="440" y1="122" x2="440" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="480" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SQL 쿼리</text>

  <!-- DBMS Engine -->
  <rect x="220" y="150" width="440" height="100" rx="8" fill="#0d1e2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">DBMS 엔진</text>
  <!-- sub boxes -->
  <rect x="240" y="188" width="120" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="300" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">파서 / 옵티마이저</text>

  <rect x="380" y="188" width="120" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">실행 엔진</text>

  <rect x="520" y="188" width="120" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="580" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">트랜잭션 관리</text>

  <!-- Arrow down -->
  <line x1="440" y1="252" x2="440" y2="278" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="480" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">I/O 요청</text>

  <!-- Storage -->
  <rect x="220" y="280" width="440" height="80" rx="8" fill="#0d2400" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">스토리지 계층</text>
  <rect x="240" y="316" width="120" height="30" rx="6" fill="#0a1800" stroke="#55c555" stroke-width="0.8"/>
  <text x="300" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">데이터 파일</text>
  <rect x="380" y="316" width="120" height="30" rx="6" fill="#0a1800" stroke="#55c555" stroke-width="0.8"/>
  <text x="440" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">인덱스 파일</text>
  <rect x="520" y="316" width="120" height="30" rx="6" fill="#0a1800" stroke="#55c555" stroke-width="0.8"/>
  <text x="580" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">WAL / Redo Log</text>

  <!-- result label -->
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">SQL → 파싱 → 최적화 → 실행 → 스토리지 I/O → 결과 반환</text>
</svg>
