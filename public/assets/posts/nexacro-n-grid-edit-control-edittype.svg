<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid EditControl — edittype 유형별 동작</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">GridColumn의 edittype 속성으로 셀 편집 컨트롤을 결정한다</text>

  <!-- Column headers row -->
  <rect x="60" y="100" width="160" height="36" fill="#1a1a2e" rx="4"/>
  <rect x="228" y="100" width="160" height="36" fill="#1a1a2e" rx="4"/>
  <rect x="396" y="100" width="200" height="36" fill="#1a1a2e" rx="4"/>
  <rect x="604" y="100" width="216" height="36" fill="#1a1a2e" rx="4"/>
  <text x="140" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">edittype 값</text>
  <text x="308" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">렌더 컨트롤</text>
  <text x="496" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">주요 속성</text>
  <text x="712" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">용도</text>

  <!-- Row 1: normal -->
  <rect x="60" y="142" width="760" height="44" fill="#111" rx="3"/>
  <text x="140" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">normal</text>
  <text x="308" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Edit (텍스트 입력)</text>
  <text x="496" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">mask, inputtype</text>
  <text x="712" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">일반 문자/숫자 입력</text>

  <!-- Row 2: combo -->
  <rect x="60" y="190" width="760" height="44" fill="#161616" rx="3"/>
  <text x="140" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">combo</text>
  <text x="308" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Combo 드롭다운</text>
  <text x="496" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">codecolumn, datacolumn</text>
  <text x="712" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">코드/명칭 매핑 선택</text>

  <!-- Row 3: checkbox -->
  <rect x="60" y="238" width="760" height="44" fill="#111" rx="3"/>
  <text x="140" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">checkbox</text>
  <text x="308" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">CheckBox 체크</text>
  <text x="496" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">checkedvalue, uncheckedvalue</text>
  <text x="712" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Y/N, 1/0 불리언 값</text>

  <!-- Row 4: date -->
  <rect x="60" y="286" width="760" height="44" fill="#161616" rx="3"/>
  <text x="140" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">date</text>
  <text x="308" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Calendar 팝업</text>
  <text x="496" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">dateformat, editformat</text>
  <text x="712" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">날짜 입력/선택</text>

  <!-- Row 5: spin -->
  <rect x="60" y="334" width="760" height="44" fill="#111" rx="3"/>
  <text x="140" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">spin</text>
  <text x="308" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Spin 증감 버튼</text>
  <text x="496" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">spintype, spinunit</text>
  <text x="712" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">숫자 증감 입력</text>

  <!-- Row 6: button -->
  <rect x="60" y="382" width="760" height="44" fill="#161616" rx="3"/>
  <text x="140" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">button</text>
  <text x="308" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">버튼 셀</text>
  <text x="496" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">oncellclick 이벤트</text>
  <text x="712" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">팝업 열기, 액션 트리거</text>

  <!-- Bottom tip -->
  <rect x="60" y="440" width="760" height="38" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">edittype="none" 지정 시 편집 불가(읽기 전용) 셀로 동작</text>
</svg>
