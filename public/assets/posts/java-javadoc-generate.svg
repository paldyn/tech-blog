<svg xmlns="http://www.w3.org/2000/svg" width="880" height="390" viewBox="0 0 880 390">
  <rect width="880" height="390" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">javadoc 명령으로 API 문서 생성하기</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">소스 파일에서 HTML 문서까지 단 한 번의 명령</text>

  <!-- Box 1: Source files (x=60, y=90, w=200, h=200) -->
  <rect x="60" y="90" width="200" height="200" fill="#0f1a2e" rx="8" stroke="#1e2d4a"/>
  <text x="160" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">소스 파일</text>
  <rect x="78" y="120" width="164" height="1" fill="#1e2d4a"/>
  <text x="78" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Calculator.java</text>
  <text x="78" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">StringUtils.java</text>
  <text x="78" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">package-info.java</text>
  <text x="78" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">-sourcepath src/</text>
  <text x="78" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">-subpackages com.example</text>

  <!-- Arrow 1: x=262 to x=318, midY=190 -->
  <!-- shaft: 262->300 (38px), head: 300->318 (18px), shaft height 8px, head height 20px -->
  <polygon points="262,186 300,186 300,180 318,190 300,200 300,194 262,194" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>

  <!-- Box 2: javadoc command (x=320, y=90, w=240, h=200) -->
  <rect x="320" y="90" width="240" height="200" fill="#0f1a2e" rx="8" stroke="#1e2d4a"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">javadoc 명령</text>
  <rect x="338" y="120" width="204" height="1" fill="#1e2d4a"/>

  <!-- Inner code block -->
  <rect x="334" y="126" width="212" height="114" fill="#070b14" rx="4" stroke="#1e2433"/>
  <!-- Code lines: first y=144, spacing 18px -->
  <text x="348" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">javadoc \</text>
  <text x="348" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">-d</tspan> docs \</text>
  <text x="348" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">-sourcepath</tspan> src \</text>
  <text x="348" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">-subpackages</tspan> \</text>
  <text x="348" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    com.example</text>
  <!-- Code rect bottom: 126+114=240 -->

  <text x="338" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">※ 옵션: -private, -author</text>
  <text x="338" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">-version, -link 사용 가능</text>

  <!-- Arrow 2: x=562 to x=618, midY=190 -->
  <polygon points="562,186 600,186 600,180 618,190 600,200 600,194 562,194" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>

  <!-- Box 3: HTML output (x=620, y=90, w=200, h=200) -->
  <rect x="620" y="90" width="200" height="200" fill="#0f2310" rx="8" stroke="#1e3a1a"/>
  <text x="720" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">HTML 문서</text>
  <rect x="638" y="120" width="164" height="1" fill="#1e3a1a"/>
  <text x="638" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">docs/</text>
  <text x="638" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">  index.html</text>
  <text x="638" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">  allclasses.html</text>
  <text x="638" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  com/example/</text>
  <text x="638" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">    Calculator.html</text>
  <text x="638" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">    StringUtils.html</text>

  <!-- Bottom note -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">생성된 docs/ 폴더를 GitHub Pages, S3 등 정적 호스팅에 배포합니다</text>
</svg>
