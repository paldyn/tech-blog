<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Spring CORS 설정 방식 비교</text>
  <text x="440" y="64" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">@CrossOrigin · WebMvcConfigurer · Security CorsConfigurationSource</text>

  <!-- Left panel: WebMvcConfigurer -->
  <rect x="50" y="84" width="376" height="390" rx="8" fill="#0a0a0a" stroke="#2a2a2a"/>
  <text x="74" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">WebMvcConfigurer 전역 설정</text>

  <rect x="66" y="118" width="344" height="340" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="82" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">
    <tspan x="82" dy="0"><tspan fill="#7ec8e3">@Configuration</tspan></tspan>
    <tspan x="82" dy="18"><tspan fill="#7ec8e3">public class</tspan> <tspan fill="#e8e8e8">CorsConfig</tspan></tspan>
    <tspan x="82" dy="18">    <tspan fill="#7ec8e3">implements</tspan> <tspan fill="#e8e8e8">WebMvcConfigurer {</tspan></tspan>
    <tspan x="82" dy="18"></tspan>
    <tspan x="82" dy="18">    <tspan fill="#7ec8e3">@Override</tspan></tspan>
    <tspan x="82" dy="18">    <tspan fill="#7ec8e3">public void</tspan> <tspan fill="#e8e8e8">addCorsMappings(</tspan></tspan>
    <tspan x="82" dy="18">            <tspan fill="#e8e8e8">CorsRegistry registry) {</tspan></tspan>
    <tspan x="82" dy="18">        <tspan fill="#e8e8e8">registry.addMapping(</tspan><tspan fill="#ce9178">"/api/**"</tspan><tspan fill="#e8e8e8">)</tspan></tspan>
    <tspan x="82" dy="18">            <tspan fill="#e8e8e8">.allowedOrigins(</tspan></tspan>
    <tspan x="82" dy="18">                <tspan fill="#ce9178">"https://app.example.com"</tspan><tspan fill="#e8e8e8">)</tspan></tspan>
    <tspan x="82" dy="18">            <tspan fill="#e8e8e8">.allowedMethods(</tspan></tspan>
    <tspan x="82" dy="18">                <tspan fill="#ce9178">"GET"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"POST"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"PUT"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"DELETE"</tspan><tspan fill="#e8e8e8">)</tspan></tspan>
    <tspan x="82" dy="18">            <tspan fill="#e8e8e8">.allowedHeaders(</tspan><tspan fill="#ce9178">"*"</tspan><tspan fill="#e8e8e8">)</tspan></tspan>
    <tspan x="82" dy="18">            <tspan fill="#e8e8e8">.allowCredentials(</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#e8e8e8">)</tspan></tspan>
    <tspan x="82" dy="18">            <tspan fill="#e8e8e8">.maxAge(</tspan><tspan fill="#b5cea8">3600</tspan><tspan fill="#e8e8e8">);</tspan></tspan>
    <tspan x="82" dy="18">    }</tspan>
    <tspan x="82" dy="18">}</tspan>
  </text>

  <!-- Right panel: Security CorsConfigurationSource -->
  <rect x="454" y="84" width="376" height="390" rx="8" fill="#0a0a0a" stroke="#2a2a2a"/>
  <text x="478" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Spring Security 연동</text>

  <rect x="470" y="118" width="344" height="340" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="486" y="140"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">
    <tspan x="486" dy="0"><tspan fill="#7ec8e3">@Bean</tspan></tspan>
    <tspan x="486" dy="18"><tspan fill="#e8e8e8">CorsConfigurationSource corsSource() {</tspan></tspan>
    <tspan x="486" dy="18">    <tspan fill="#e8e8e8">CorsConfiguration cfg =</tspan></tspan>
    <tspan x="486" dy="18">        <tspan fill="#7ec8e3">new</tspan> <tspan fill="#e8e8e8">CorsConfiguration();</tspan></tspan>
    <tspan x="486" dy="18">    <tspan fill="#e8e8e8">cfg.setAllowedOrigins(List.of(</tspan></tspan>
    <tspan x="486" dy="18">        <tspan fill="#ce9178">"https://app.example.com"</tspan><tspan fill="#e8e8e8">));</tspan></tspan>
    <tspan x="486" dy="18">    <tspan fill="#e8e8e8">cfg.setAllowedMethods(</tspan></tspan>
    <tspan x="486" dy="18">        <tspan fill="#e8e8e8">List.of(</tspan><tspan fill="#ce9178">"GET"</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#ce9178">"POST"</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#ce9178">"PUT"</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#ce9178">"DELETE"</tspan><tspan fill="#e8e8e8">));</tspan></tspan>
    <tspan x="486" dy="18">    <tspan fill="#e8e8e8">cfg.setAllowedHeaders(List.of(</tspan><tspan fill="#ce9178">"*"</tspan><tspan fill="#e8e8e8">));</tspan></tspan>
    <tspan x="486" dy="18">    <tspan fill="#e8e8e8">cfg.setAllowCredentials(</tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#e8e8e8">);</tspan></tspan>
    <tspan x="486" dy="18">    <tspan fill="#e8e8e8">cfg.setMaxAge(</tspan><tspan fill="#b5cea8">3600L</tspan><tspan fill="#e8e8e8">);</tspan></tspan>
    <tspan x="486" dy="18"></tspan>
    <tspan x="486" dy="18">    <tspan fill="#e8e8e8">UrlBasedCorsConfigurationSource src =</tspan></tspan>
    <tspan x="486" dy="18">      <tspan fill="#7ec8e3">new</tspan> <tspan fill="#e8e8e8">UrlBasedCorsConfigurationSource();</tspan></tspan>
    <tspan x="486" dy="18">    <tspan fill="#e8e8e8">src.registerCorsConfiguration(</tspan><tspan fill="#ce9178">"/api/**"</tspan><tspan fill="#e8e8e8">, cfg);</tspan></tspan>
    <tspan x="486" dy="18">    <tspan fill="#7ec8e3">return</tspan> <tspan fill="#e8e8e8">src;</tspan></tspan>
    <tspan x="486" dy="18">}</tspan>
  </text>
</svg>
