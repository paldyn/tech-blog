<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 코드 리뷰 프로세스</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">AI-Assisted Code Review Pipeline</text>

  <defs>
    <marker id="revarr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="revarr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Step 1: PR Open -->
  <rect x="40" y="104" width="140" height="72" rx="8" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="110" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#888">PR 생성</text>
  <text x="110" y="155" text-anchor="middle" font-size="12" fill="#666">개발자 Push</text>
  <text x="110" y="169" text-anchor="middle" font-size="12" fill="#666">GitHub PR 오픈</text>

  <line x1="180" y1="140" x2="220" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#revarr)"/>

  <!-- Step 2: Auto checks -->
  <rect x="220" y="104" width="150" height="72" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="295" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">자동 검사</text>
  <text x="295" y="150" text-anchor="middle" font-size="12" fill="#888">린팅·타입 체크</text>
  <text x="295" y="168" text-anchor="middle" font-size="12" fill="#888">단위 테스트</text>

  <line x1="370" y1="140" x2="410" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#revarr)"/>

  <!-- Step 3: AI Review -->
  <rect x="410" y="94" width="160" height="92" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <text x="490" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">AI 리뷰</text>
  <text x="490" y="144" text-anchor="middle" font-size="12" fill="#888">Claude/GPT</text>
  <text x="490" y="162" text-anchor="middle" font-size="12" fill="#888">보안·성능·로직</text>
  <text x="490" y="178" text-anchor="middle" font-size="12" fill="#888">인라인 코멘트</text>

  <line x1="570" y1="140" x2="610" y2="140" stroke="#55c555" stroke-width="2" marker-end="url(#revarr2)"/>

  <!-- Step 4: Human Review -->
  <rect x="610" y="104" width="150" height="72" rx="8" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="685" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">사람 리뷰</text>
  <text x="685" y="150" text-anchor="middle" font-size="12" fill="#888">비즈니스 로직</text>
  <text x="685" y="168" text-anchor="middle" font-size="12" fill="#888">최종 승인</text>

  <!-- AI review output: 4 categories -->
  <text x="60" y="222" font-size="14" font-weight="600" fill="#e8e8e8">AI 리뷰 출력 구조</text>

  <rect x="60" y="240" width="180" height="94" rx="6" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="150" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">🔴 Critical</text>
  <text x="150" y="284" text-anchor="middle" font-size="12" fill="#888">SQL 인젝션</text>
  <text x="150" y="302" text-anchor="middle" font-size="12" fill="#888">인증 누락</text>
  <text x="150" y="320" text-anchor="middle" font-size="12" fill="#888">하드코딩 비밀키</text>

  <rect x="256" y="240" width="180" height="94" rx="6" fill="#111" stroke="#e0a800" stroke-width="1.5"/>
  <text x="346" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#e0a800">🟡 Warning</text>
  <text x="346" y="284" text-anchor="middle" font-size="12" fill="#888">N+1 쿼리</text>
  <text x="346" y="302" text-anchor="middle" font-size="12" fill="#888">에러 처리 누락</text>
  <text x="346" y="320" text-anchor="middle" font-size="12" fill="#888">메모리 누수 가능</text>

  <rect x="452" y="240" width="180" height="94" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="542" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">🔵 Info</text>
  <text x="542" y="284" text-anchor="middle" font-size="12" fill="#888">가독성 개선</text>
  <text x="542" y="302" text-anchor="middle" font-size="12" fill="#888">중복 코드</text>
  <text x="542" y="320" text-anchor="middle" font-size="12" fill="#888">주석 보완</text>

  <rect x="648" y="240" width="172" height="94" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="734" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">🟢 Good</text>
  <text x="734" y="284" text-anchor="middle" font-size="12" fill="#888">잘된 부분 칭찬</text>
  <text x="734" y="302" text-anchor="middle" font-size="12" fill="#888">패턴 인정</text>
  <text x="734" y="320" text-anchor="middle" font-size="12" fill="#888">긍정적 피드백</text>

  <!-- Bottom: AI vs Human division -->
  <text x="60" y="366" font-size="14" font-weight="600" fill="#e8e8e8">AI vs 사람 리뷰 역할 분담</text>

  <rect x="60" y="382" width="370" height="58" rx="6" fill="#1a1428" stroke="#55c555" stroke-width="1"/>
  <text x="245" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">AI가 잘하는 것</text>
  <text x="245" y="422" text-anchor="middle" font-size="12" fill="#888">보안 패턴 탐지, 코딩 컨벤션, 반복 패턴 검사</text>
  <text x="245" y="438" text-anchor="middle" font-size="12" fill="#888">24/7 즉각 응답, 일관된 기준 적용</text>

  <rect x="450" y="382" width="370" height="58" rx="6" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="635" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">사람이 필요한 것</text>
  <text x="635" y="422" text-anchor="middle" font-size="12" fill="#888">비즈니스 로직 타당성, 아키텍처 적합성</text>
  <text x="635" y="438" text-anchor="middle" font-size="12" fill="#888">팀 문화·맥락, 최종 책임과 판단</text>
</svg>
