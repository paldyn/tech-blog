  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ce9178">"trace_id"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"abc-123"</tspan><tspan fill="#ffffff">,  </tspan><tspan fill="#ce9178">"user_id"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"u-456"</tspan></text>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ce9178">"total_tokens"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">531</tspan><tspan fill="#ffffff">,  </tspan><tspan fill="#ce9178">"cost_usd"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">0.0043</tspan></text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ce9178">"quality_score"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">4.2</tspan><tspan fill="#ffffff">,  </tspan><tspan fill="#ce9178">"cache_hit"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan></text>
