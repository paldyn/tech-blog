  <!-- Span: rerank -->
  <rect x="390" y="142" width="200" height="36" rx="4" fill="#2a1a2a" stroke="#e05555" stroke-width="1"/>
  <text x="406" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">rerank</text>
  <text x="406" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">180ms  |  Cohere reranker</text>

  <!-- Span: llm_generate -->
  <rect x="80" y="188" width="600" height="36" rx="4" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="96" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
