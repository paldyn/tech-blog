  <!-- Span: retrieve -->
  <rect x="80" y="142" width="300" height="36" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="96" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">vector_retrieve</text>
  <text x="96" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
