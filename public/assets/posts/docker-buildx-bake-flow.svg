<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker buildx bake 동작 원리</text>

  <!-- bake file -->
  <rect x="60" y="80" width="200" height="96" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">bake 파일</text>
  <text x="160" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">docker-bake.hcl</text>
  <text x="160" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">docker-bake.json</text>
  <text x="160" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">compose.yaml</text>

  <!-- Arrow: bake file → bake engine -->
  <line x1="260" y1="128" x2="314" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- bake engine -->
  <rect x="318" y="80" width="200" height="96" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="418" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Bake 엔진</text>
  <text x="418" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">target 분석</text>
  <text x="418" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">group/target 의존성 해결</text>
  <text x="418" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">병렬 빌드 계획</text>

  <!-- Arrow: bake engine → BuildKit -->
  <line x1="518" y1="128" x2="572" y2="128" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- BuildKit -->
  <rect x="576" y="80" width="244" height="96" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="698" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">BuildKit</text>
  <text x="698" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">병렬 target 빌드</text>
  <text x="698" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">캐시 공유 (--cache-from)</text>
  <text x="698" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">멀티 플랫폼 동시 빌드</text>

  <!-- Targets below bake engine -->
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">단일 명령으로 여러 target 빌드 (병렬)</text>

  <!-- Target boxes -->
  <rect x="60" y="240" width="220" height="60" rx="8" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="170" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">target: app</text>
  <text x="170" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">dockerfile: Dockerfile.app</text>

  <rect x="330" y="240" width="220" height="60" rx="8" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="440" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">target: worker</text>
  <text x="440" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">dockerfile: Dockerfile.worker</text>

  <rect x="600" y="240" width="220" height="60" rx="8" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="710" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">target: nginx</text>
  <text x="710" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">dockerfile: Dockerfile.nginx</text>

  <!-- Arrow from bake engine to targets -->
  <line x1="418" y1="176" x2="170" y2="240" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="418" y1="176" x2="440" y2="240" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="418" y1="176" x2="710" y2="240" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Bottom note -->
  <rect x="60" y="330" width="760" height="60" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">기존 방식 vs bake</text>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">기존: docker build ... app &amp;&amp; docker build ... worker &amp;&amp; docker build ... nginx (순차)</text>
</svg>
