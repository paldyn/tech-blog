<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커넥션 풀 vs 직접 연결</text>

  <!-- Direct -->
  <rect x="60" y="68" width="340" height="50" rx="8" fill="#1a1020" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">직접 연결 (비효율)</text>
  <text x="230" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">요청마다 TCP 핸드셰이크 + 인증 + 세션 초기화</text>

  <!-- Pool -->
  <rect x="480" y="68" width="340" height="50" rx="8" fill="#0d2400" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">커넥션 풀 (효율)</text>
  <text x="650" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">미리 생성된 커넥션 재사용 → 오버헤드 최소화</text>

  <!-- Code block -->
  <rect x="60" y="136" width="760" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- HikariCP 주요 설정 (Java / Spring Boot)</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">spring.datasource.hikari.maximum-pool-size=<tspan fill="#b5cea8">20</tspan></text>
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">spring.datasource.hikari.minimum-idle=<tspan fill="#b5cea8">5</tspan></text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">spring.datasource.hikari.connection-timeout=<tspan fill="#b5cea8">30000</tspan><tspan fill="#9aa4b8">  -- 30s</tspan></text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">spring.datasource.hikari.idle-timeout=<tspan fill="#b5cea8">600000</tspan><tspan fill="#9aa4b8">   -- 10m</tspan></text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">spring.datasource.hikari.max-lifetime=<tspan fill="#b5cea8">1800000</tspan><tspan fill="#9aa4b8">  -- 30m</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- max-lifetime &lt; DB wait_timeout 권장</text>

  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">풀 사이즈 공식: connections = (core_count * 2) + effective_spindle_count</text>
</svg>
