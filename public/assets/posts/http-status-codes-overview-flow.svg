<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrok" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrno" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">상태 코드 선택 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">API 설계 시 올바른 코드를 고르는 결정 트리</text>

  <!-- Root -->
  <rect x="330" y="88" width="220" height="44" rx="6" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">요청을 처리했는가?</text>

  <!-- No: 4xx or 5xx -->
  <line x1="330" y1="110" x2="180" y2="174" stroke="#e05555" stroke-width="2" marker-end="url(#arrno)"/>
  <text x="226" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">No</text>

  <!-- Yes: 2xx or 3xx -->
  <line x1="550" y1="110" x2="700" y2="174" stroke="#55c555" stroke-width="2" marker-end="url(#arrok)"/>
  <text x="642" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Yes</text>

  <!-- Client error branch -->
  <rect x="80" y="174" width="200" height="44" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="180" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">클라이언트 잘못?</text>

  <line x1="130" y1="218" x2="110" y2="264" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrno)"/>
  <text x="90" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Yes</text>
  <line x1="230" y1="218" x2="250" y2="264" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="244" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">No</text>

  <rect x="60" y="264" width="100" height="44" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="110" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">4xx</text>
  <text x="110" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">클라이언트 오류</text>

  <rect x="200" y="264" width="100" height="44" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">5xx</text>
  <text x="250" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">서버 오류</text>

  <!-- 4xx examples -->
  <rect x="60" y="330" width="100" height="78" rx="4" fill="#0d1117" stroke="#2a1a1a" stroke-width="1"/>
  <text x="110" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e05555" text-anchor="middle">400</text>
  <text x="110" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Bad Request</text>
  <text x="110" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e05555" text-anchor="middle">401/403</text>
  <text x="110" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">인증/인가</text>
  <text x="110" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e05555" text-anchor="middle">404</text>

  <!-- 5xx examples -->
  <rect x="200" y="330" width="100" height="78" rx="4" fill="#0d1117" stroke="#1a1a2a" stroke-width="1"/>
  <text x="250" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#7777cc" text-anchor="middle">500</text>
  <text x="250" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Internal Error</text>
  <text x="250" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#7777cc" text-anchor="middle">502/503</text>
  <text x="250" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">게이트웨이</text>

  <!-- Success branch -->
  <rect x="600" y="174" width="200" height="44" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">다른 위치로?</text>

  <line x1="650" y1="218" x2="630" y2="264" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="610" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">Yes</text>
  <line x1="750" y1="218" x2="770" y2="264" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrok)"/>
  <text x="756" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">No</text>

  <rect x="580" y="264" width="100" height="44" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="630" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">3xx</text>
  <text x="630" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">리다이렉션</text>

  <rect x="720" y="264" width="100" height="44" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">2xx</text>
  <text x="770" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">성공</text>

  <!-- 2xx / 3xx examples -->
  <rect x="580" y="330" width="100" height="78" rx="4" fill="#0d1117" stroke="#1a1000" stroke-width="1"/>
  <text x="630" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#ce9178" text-anchor="middle">301</text>
  <text x="630" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">영구 이동</text>
  <text x="630" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#ce9178" text-anchor="middle">302</text>
  <text x="630" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">임시 이동</text>
  <text x="630" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#ce9178" text-anchor="middle">304</text>

  <rect x="720" y="330" width="100" height="78" rx="4" fill="#0d1117" stroke="#0f1a0f" stroke-width="1"/>
  <text x="770" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555" text-anchor="middle">200 OK</text>
  <text x="770" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555" text-anchor="middle">201</text>
  <text x="770" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Created</text>
  <text x="770" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555" text-anchor="middle">204</text>

  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">1xx: 정보성 — WebSocket 업그레이드(101), 청크 전송 지속(100) 등 특수 목적</text>
</svg>
