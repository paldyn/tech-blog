<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 580">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8944a"/>
    </marker>
  </defs>
  <rect width="880" height="580" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CRD 버전 관리와 Conversion Webhook 흐름</text>

  <!-- Section label: Version Timeline -->
  <text x="440" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">API 버전 진화 타임라인</text>

  <!-- Version boxes: v1alpha1 → v1beta1 → v1 -->
  <!-- v1alpha1 -->
  <rect x="60" y="100" width="200" height="80" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="160" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">v1alpha1</text>
  <text x="160" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">served: true</text>
  <text x="160" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">storage: false</text>

  <!-- Arrow v1alpha1 → v1beta1 -->
  <line x1="262" y1="140" x2="318" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="290" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">승격</text>

  <!-- v1beta1 -->
  <rect x="320" y="100" width="200" height="80" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="420" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">v1beta1</text>
  <text x="420" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">served: true</text>
  <text x="420" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">storage: false</text>

  <!-- Arrow v1beta1 → v1 -->
  <line x1="522" y1="140" x2="578" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="550" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">GA</text>

  <!-- v1 (stored) -->
  <rect x="580" y="100" width="200" height="80" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="2.5"/>
  <text x="680" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">v1</text>
  <text x="680" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">served: true</text>
  <text x="680" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">storage: true &#9733;</text>

  <!-- etcd stored version label -->
  <rect x="600" y="194" width="160" height="28" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="680" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">etcd 저장 버전</text>
  <line x1="680" y1="180" x2="680" y2="194" stroke="#55c555" stroke-width="1.5"/>

  <!-- Divider -->
  <line x1="60" y1="242" x2="820" y2="242" stroke="#222" stroke-width="1"/>
  <text x="440" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">Conversion Webhook 요청 변환 흐름</text>

  <!-- Flow: kubectl (v1alpha1 요청) -->
  <rect x="60" y="284" width="160" height="60" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="140" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">kubectl</text>
  <text x="140" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">v1alpha1 요청</text>

  <!-- Arrow to API Server -->
  <line x1="222" y1="314" x2="278" y2="314" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- kube-apiserver -->
  <rect x="280" y="284" width="180" height="60" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="370" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">kube-apiserver</text>
  <text x="370" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">버전 불일치 감지</text>

  <!-- Arrow to Webhook -->
  <line x1="462" y1="314" x2="518" y2="314" stroke="#e8944a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrOrange)"/>
  <text x="490" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8944a" text-anchor="middle">변환 요청</text>

  <!-- Conversion Webhook -->
  <rect x="520" y="270" width="200" height="88" rx="8" fill="#1a1000" stroke="#e8944a" stroke-width="2"/>
  <text x="620" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8944a" text-anchor="middle">Conversion Webhook</text>
  <text x="620" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">v1alpha1 → v1</text>
  <text x="620" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">필드 매핑 / 기본값 주입</text>
  <text x="620" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TLS 필수 (caBundle)</text>

  <!-- Return arrow from Webhook to apiserver -->
  <line x1="518" y1="328" x2="462" y2="328" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrGreen)"/>
  <text x="490" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">변환 완료</text>

  <!-- Arrow from apiserver down to etcd -->
  <line x1="370" y1="344" x2="370" y2="398" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- etcd box -->
  <rect x="280" y="400" width="180" height="60" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="370" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">etcd</text>
  <text x="370" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">v1 형식으로 저장</text>

  <!-- ConversionReview code block -->
  <rect x="60" y="484" width="760" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="506" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># APIService 변환 설정 (CRD spec)</text>
  <text x="80" y="524" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">conversion</text>
  <text x="170" y="524" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">: {strategy: Webhook, webhook: {clientConfig: {url: </text>
  <text x="546" y="524" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">https://...</text>
  <text x="634" y="524" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}}}</text>
  <text x="80" y="544" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># conversionReviewVersions: [v1, v1beta1]  &amp;  caBundle 필수</text>
</svg>
