<svg width="880" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">getter / setter — 계산된 프로퍼티 인터페이스</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">내부 상태를 보호하면서 자연스러운 프로퍼티 문법 제공</text>

  <!-- External code block (left) -->
  <rect x="60" y="110" width="220" height="130" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#6a8aa0">// 읽기 (get)</text>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">obj.temp</text>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#6a8aa0">// 쓰기 (set)</text>
  <text x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">obj.temp = 100</text>
  <text x="150" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">외부 코드</text>

  <!-- Get arrow (top) -->
  <line x1="280" y1="152" x2="350" y2="152" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="350,152 338,145 338,159" fill="#55c555"/>
  <text x="315" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">get</text>

  <!-- Set arrow (bottom) -->
  <line x1="350" y1="206" x2="280" y2="206" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="280,206 292,199 292,213" fill="#7ec8e3"/>
  <text x="315" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">set</text>

  <!-- Class box (center) -->
  <rect x="350" y="100" width="280" height="190" rx="8" fill="#0f0f20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="490" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">클래스 내부</text>
  <line x1="350" y1="134" x2="630" y2="134" stroke="#7777cc" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Getter code -->
  <text x="366" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#55c555">get temp() {</text>
  <text x="366" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#888">  return #c*9/5+32</text>
  <text x="366" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">}</text>

  <!-- Setter code -->
  <text x="366" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3">set temp(f) {</text>
  <text x="366" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#888">  #c = (f-32)*5/9</text>
  <text x="366" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">}</text>

  <!-- Private field box (right) -->
  <rect x="660" y="140" width="160" height="70" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">내부 상태</text>
  <text x="676" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">#celsius = 0</text>
  <text x="740" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">외부 직접 접근 불가</text>

  <!-- Arrow: class to private field -->
  <line x1="630" y1="175" x2="660" y2="175" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="660,175 648,168 648,182" fill="#7777cc"/>

  <!-- Key insight box -->
  <rect x="60" y="310" width="760" height="60" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">핵심: obj.temp 처럼 일반 프로퍼티 문법으로 접근하지만</text>
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실제 실행은 getter/setter 함수 — 검증 로직을 자유롭게 추가</text>

  <!-- Footer -->
  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
