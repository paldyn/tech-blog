<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">서브모듈 vs 서브트리 비교</text>

  <!-- Headers -->
  <rect x="60" y="66" width="240" height="40" rx="6" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">항목</text>

  <rect x="315" y="66" width="240" height="40" rx="6" fill="#1a2035" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="435" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">git submodule</text>

  <rect x="570" y="66" width="250" height="40" rx="6" fill="#1a2035" stroke="#55c555" stroke-width="1.5"/>
  <text x="695" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">git subtree</text>

  <!-- Row 1: 저장 방식 -->
  <rect x="60" y="118" width="240" height="50" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">저장 방식</text>

  <rect x="315" y="118" width="240" height="50" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="435" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">포인터(커밋 SHA)</text>
  <text x="435" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파일은 외부 저장소에 있음</text>

  <rect x="570" y="118" width="250" height="50" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="695" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">파일 직접 포함</text>
  <text x="695" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메인 저장소에 커밋으로 병합</text>

  <!-- Row 2: clone 방식 -->
  <rect x="60" y="180" width="240" height="50" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">clone 방식</text>

  <rect x="315" y="180" width="240" height="50" rx="4" fill="#1a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="435" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">--recurse-submodules</text>
  <text x="435" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">추가 단계 필요</text>

  <rect x="570" y="180" width="250" height="50" rx="4" fill="#0a1a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="695" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">일반 git clone</text>
  <text x="695" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파일이 이미 포함됨</text>

  <!-- Row 3: 업스트림 반영 -->
  <rect x="60" y="242" width="240" height="50" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">업스트림 반영</text>

  <rect x="315" y="242" width="240" height="50" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="435" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">git submodule update</text>
  <text x="435" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">--remote</text>

  <rect x="570" y="242" width="250" height="50" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="695" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">git subtree pull</text>
  <text x="695" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">--prefix=path</text>

  <!-- Row 4: 기여 방식 -->
  <rect x="60" y="304" width="240" height="50" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">업스트림에 기여</text>

  <rect x="315" y="304" width="240" height="50" rx="4" fill="#0a1a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="435" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">자연스러움</text>
  <text x="435" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서브모듈 저장소에서 직접 push</text>

  <rect x="570" y="304" width="250" height="50" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="695" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">git subtree push</text>
  <text x="695" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">추가 명령 필요, 히스토리 분리</text>

  <!-- Row 5: 팀 학습 비용 -->
  <rect x="60" y="366" width="240" height="50" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">팀 학습 비용</text>

  <rect x="315" y="366" width="240" height="50" rx="4" fill="#1a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="435" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">높음</text>
  <text x="435" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Detached HEAD 등 함정 많음</text>

  <rect x="570" y="366" width="250" height="50" rx="4" fill="#0a1a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="695" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">낮음</text>
  <text x="695" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">일반 Git 워크플로와 동일</text>

  <!-- Bottom recommendation -->
  <rect x="60" y="432" width="760" height="62" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">선택 기준: 서브모듈 → 독립적 버전 관리 + 기여 필요 / 서브트리 → 단순 포함 + 팀 친화성</text>
  <text x="440" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">둘 다 패키지 매니저(npm/pip)가 있으면 패키지 매니저를 우선 검토할 것</text>
</svg>
