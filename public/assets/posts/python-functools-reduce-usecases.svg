<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">reduce() 실전 활용 패턴</text>

  <!-- Use case boxes -->
  <rect x="60" y="68" width="360" height="130" rx="8" fill="#0f1a2e" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">딕셔너리 병합</text>
  <rect x="76" y="100" width="328" height="84" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">dicts = [{</tspan>
    <tspan fill="#ce9178">"a"</tspan>
    <tspan fill="#ffffff">:</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">}, {</tspan>
    <tspan fill="#ce9178">"b"</tspan>
    <tspan fill="#ffffff">:</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">}, {</tspan>
    <tspan fill="#ce9178">"c"</tspan>
    <tspan fill="#ffffff">:</tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">}]</tspan>
  </text>
  <text x="90" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">merged = reduce(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">lambda</tspan>
    <tspan fill="#ffffff"> a, b:</tspan>
  </text>
  <text x="90" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    {**a, **b}, dicts)</tspan>
  </text>
  <text x="90" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># {"a":1, "b":2, "c":3}</tspan>
  </text>

  <rect x="460" y="68" width="360" height="130" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">함수 합성 (Compose)</text>
  <rect x="476" y="100" width="328" height="84" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> compose(*fns):</tspan>
  </text>
  <text x="490" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan>
    <tspan fill="#ffffff"> reduce(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">lambda</tspan>
    <tspan fill="#ffffff"> f,g:</tspan>
  </text>
  <text x="490" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        </tspan>
    <tspan fill="#7ec8e3" font-weight="600">lambda</tspan>
    <tspan fill="#ffffff"> x: g(f(x)), fns)</tspan>
  </text>
  <text x="490" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># g(f(x)) 형태로 합성</tspan>
  </text>

  <!-- Warning box -->
  <rect x="60" y="218" width="760" height="68" rx="8" fill="#2a1a00" stroke="#e0a055" stroke-width="1.5"/>
  <text x="440" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e0a055" text-anchor="middle">reduce() vs 내장 함수 선택 기준</text>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">sum, max, min, all, any, str.join → 내장 함수가 더 빠르고 Pythonic</text>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">커스텀 누적 로직, 함수 합성, 딕셔너리 병합 → reduce가 유용</text>

  <!-- Bottom code -->
  <rect x="60" y="304" width="760" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="324" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 더 Pythonic: reduce 대신 내장 함수</text>
  <text x="76" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># reduce(lambda a,b: a+b, nums) </tspan>
    <tspan fill="#e05555">←</tspan>
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">sum</tspan>
    <tspan fill="#ffffff">(nums)  </tspan>
    <tspan fill="#55c555">✓</tspan>
  </text>
  <text x="76" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># reduce(lambda a,b: a if a&gt;b else b, nums) </tspan>
    <tspan fill="#e05555">←</tspan>
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">max</tspan>
    <tspan fill="#ffffff">(nums)  </tspan>
    <tspan fill="#55c555">✓</tspan>
  </text>
</svg>
