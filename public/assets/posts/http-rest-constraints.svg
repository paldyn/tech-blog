<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="430" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">REST 6대 아키텍처 제약</text>
  <text x="60" y="76" font-size="13" fill="#888">5개 필수 제약 + 1개 선택(점선) 제약을 모두 만족해야 RESTful</text>

  <!-- Row 1 -->
  <rect x="60" y="104" width="240" height="70" rx="8" fill="#101418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="126" font-size="15" font-weight="600" fill="#e8e8e8">클라이언트-서버</text>
  <text x="84" y="144" font-size="11" fill="#888">관심사 분리: UI와 데이터 저장을</text>
  <text x="84" y="162" font-size="11" fill="#888">독립적으로 진화시킨다</text>

  <rect x="320" y="104" width="240" height="70" rx="8" fill="#101418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="344" y="126" font-size="15" font-weight="600" fill="#e8e8e8">무상태 (Stateless)</text>
  <text x="344" y="144" font-size="11" fill="#888">요청은 자기완결적. 서버는 클라</text>
  <text x="344" y="162" font-size="11" fill="#888">이언트 세션 상태를 저장 안 함</text>

  <rect x="580" y="104" width="240" height="70" rx="8" fill="#101418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="604" y="126" font-size="15" font-weight="600" fill="#e8e8e8">캐시 가능 (Cacheable)</text>
  <text x="604" y="144" font-size="11" fill="#888">응답에 캐시 여부를 명시해</text>
  <text x="604" y="162" font-size="11" fill="#888">불필요한 상호작용을 줄인다</text>

  <!-- Row 2 -->
  <rect x="60" y="204" width="240" height="70" rx="8" fill="#101418" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="226" font-size="15" font-weight="600" fill="#e8e8e8">균일 인터페이스</text>
  <text x="84" y="244" font-size="11" fill="#888">REST의 핵심. 자원 식별·표현·</text>
  <text x="84" y="262" font-size="11" fill="#888">self-descriptive·HATEOAS</text>

  <rect x="320" y="204" width="240" height="70" rx="8" fill="#101418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="344" y="226" font-size="15" font-weight="600" fill="#e8e8e8">계층화 시스템</text>
  <text x="344" y="244" font-size="11" fill="#888">프록시·게이트웨이 등 중간 계층</text>
  <text x="344" y="262" font-size="11" fill="#888">을 클라이언트가 알 수 없게</text>

  <rect x="580" y="204" width="240" height="70" rx="8" fill="#101418" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="604" y="226" font-size="15" font-weight="600" fill="#e8e8e8">code-on-demand</text>
  <text x="604" y="244" font-size="11" fill="#9aa4b8">(선택) 서버가 스크립트를 보내</text>
  <text x="604" y="262" font-size="11" fill="#9aa4b8">클라이언트 기능을 확장한다</text>

  <!-- Legend -->
  <rect x="60" y="318" width="760" height="76" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="84" y1="344" x2="116" y2="344" stroke="#55c555" stroke-width="3"/>
  <text x="126" y="349" font-size="13" fill="#e8e8e8">초록: 균일 인터페이스 — 4요소로 다시 세분되는 REST의 중심 제약</text>
  <line x1="84" y1="368" x2="116" y2="368" stroke="#7ec8e3" stroke-width="3"/>
  <text x="126" y="373" font-size="13" fill="#e8e8e8">파랑: 필수 제약 — 하나라도 빠지면 RESTful 이라 부르지 못한다</text>
  <line x1="540" y1="368" x2="572" y2="368" stroke="#7777cc" stroke-width="2.5" stroke-dasharray="4,4"/>
  <text x="582" y="373" font-size="13" fill="#9aa4b8">점선: 선택 제약</text>
</svg>
