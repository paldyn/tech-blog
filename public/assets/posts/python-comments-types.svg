<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 주석의 세 종류</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle"># 한 줄 주석 · 인라인 주석 · 독스트링</text>

  <rect x="60" y="88" width="200" height="54" rx="8" fill="#0f1025" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle"># 한 줄 주석</text>
  <text x="160" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">라인 앞에 # 기호</text>

  <rect x="60" y="158" width="760" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 함수 목적을 설명하는 주석</text>
  <text x="76" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> calculate_tax(income):</tspan></text>
  <text x="76" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # 과세 표준 22% 적용 (세법 기준)</text>

  <rect x="290" y="88" width="200" height="54" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">인라인 주석</text>
  <text x="390" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">코드 뒤에 # (스페이스 2칸)</text>

  <rect x="60" y="248" width="760" height="52" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">x = x + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">          </tspan><tspan fill="#9aa4b8"># 루프 카운터 증가</tspan></text>
  <text x="76" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">MAX_SIZE = </tspan><tspan fill="#b5cea8">1024</tspan><tspan fill="#ffffff">       </tspan><tspan fill="#9aa4b8"># bytes — 설정 파일에서 변경 가능</tspan></text>

  <rect x="520" y="88" width="200" height="54" rx="8" fill="#1f1a0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="620" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#f59e0b" text-anchor="middle">독스트링</text>
  <text x="620" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">삼중 따옴표 문자열</text>

  <rect x="60" y="320" width="760" height="88" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> greet(name: </tspan><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    """주어진 이름으로 인사 문자열을 반환한다."""</tspan></text>
  <text x="76" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">f"Hello, {name}!"</tspan></text>
  <text x="76" y="400" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># greet.__doc__ 로 독스트링 확인 가능</text>

  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">독스트링은 런타임에 __doc__ 속성으로 접근 — 자동 문서화 도구가 활용</text>
</svg>
