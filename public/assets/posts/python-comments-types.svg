<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python 주석 3가지 종류</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">언제 어떤 주석을 써야 하는가</text>

  <!-- Type 1: Inline comment -->
  <rect x="60" y="88" width="240" height="50" rx="6" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">인라인 주석</text>

  <rect x="60" y="148" width="760" height="60" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">speed = </tspan><tspan fill="#b5cea8">299792458</tspan><tspan fill="#6a8aa0">  # 빛의 속도 (m/s)</tspan></text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">x += </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#6a8aa0">   # 코드와 최소 2칸 공백</tspan></text>

  <!-- Type 2: Block comment -->
  <rect x="60" y="222" width="240" height="50" rx="6" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">블록 주석</text>

  <rect x="60" y="282" width="760" height="60" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#6a8aa0"># 사용자 인증 처리</tspan></text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#6a8aa0"># JWT 토큰 검증 후 세션 생성</tspan></text>

  <!-- Type 3: Docstring -->
  <rect x="60" y="356" width="240" height="50" rx="6" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">독스트링</text>

  <rect x="60" y="412" width="760" height="30" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#55c555">add</tspan><tspan fill="#e8e8e8">(a, b): </tspan><tspan fill="#ce9178">"""두 수를 더해 반환"""</tspan><tspan fill="#e8e8e8"> ...</tspan></text>
</svg>
