<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLite 선택 결정 트리</text>

  <!-- Root question -->
  <rect x="290" y="70" width="300" height="54" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">다중 서버 인스턴스가 필요한가?</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(로드밸런서, 분산 배포)</text>

  <!-- No -> next question -->
  <line x1="440" y1="124" x2="440" y2="158" stroke="#55c555" stroke-width="1.5"/>
  <text x="450" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">아니오</text>

  <rect x="290" y="158" width="300" height="54" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">동시 쓰기가 초당 수백 건?</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(write-heavy 웹 API)</text>

  <!-- Yes (multi-server) -> Use PG -->
  <line x1="440" y1="70" x2="720" y2="70" stroke="#e05555" stroke-width="1.5"/>
  <line x1="720" y1="70" x2="720" y2="106" stroke="#e05555" stroke-width="1.5"/>
  <text x="580" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">예</text>

  <rect x="600" y="106" width="240" height="54" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">PostgreSQL / MySQL</text>
  <text x="720" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">클라이언트-서버 DB 선택</text>

  <!-- No -> next question -->
  <line x1="440" y1="212" x2="440" y2="246" stroke="#55c555" stroke-width="1.5"/>
  <text x="450" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">아니오</text>

  <rect x="290" y="246" width="300" height="54" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">DB 크기가 수십 GB 이상?</text>
  <text x="440" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">+ 복잡한 JOIN 쿼리</text>

  <!-- Yes (high write) -> Use PG -->
  <line x1="440" y1="158" x2="720" y2="158" stroke="#e05555" stroke-width="1.5"/>
  <line x1="720" y1="158" x2="720" y2="194" stroke="#e05555" stroke-width="1.5"/>
  <text x="580" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">예</text>

  <rect x="600" y="194" width="240" height="40" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">서버 DB or WAL + 배치 처리</text>

  <!-- No -> SQLite OK -->
  <line x1="440" y1="300" x2="440" y2="334" stroke="#55c555" stroke-width="1.5"/>
  <text x="450" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">아니오</text>

  <rect x="290" y="334" width="300" height="54" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">SQLite 적합 ✓</text>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">모바일 / 임베디드 / 데스크탑 / 테스트</text>

  <!-- Yes (large DB) -> Use PG -->
  <line x1="440" y1="246" x2="720" y2="246" stroke="#e05555" stroke-width="1.5"/>
  <line x1="720" y1="246" x2="720" y2="282" stroke="#e05555" stroke-width="1.5"/>
  <text x="580" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">예</text>

  <rect x="600" y="282" width="240" height="40" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">DuckDB / PostgreSQL 고려</text>

  <!-- Use cases summary -->
  <rect x="60" y="410" width="760" height="90" fill="#0f1a2e" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLite가 잘 맞는 범주</text>
  <text x="100" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="116" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">모바일/IoT 로컬 저장</text>
  <text x="320" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="336" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">단일 서버 소규모 앱</text>
  <text x="560" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="576" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">테스트 환경</text>
  <text x="100" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="116" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">분석 스크립트/파일</text>
  <text x="320" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="336" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">오프라인-퍼스트 캐시</text>
  <text x="560" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="576" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">데스크탑/Electron 앱</text>
</svg>
