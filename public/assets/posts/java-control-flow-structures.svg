<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" width="880" height="580">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
    <marker id="arr" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 14 5.25, 0 10.5" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 14 5.25, 0 10.5" fill="#55c555"/>
    </marker>
    <marker id="arrr" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 14 5.25, 0 10.5" fill="#e05555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="580" rx="12" fill="#0a0a0a"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Java 제어 흐름 구조</text>
  <text x="440" y="66" text-anchor="middle" font-size="14" fill="#888">Control Flow Structures</text>

  <!-- ──────────── if / else ──────────── -->
  <text x="100" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">if / else if / else</text>

  <!-- start -->
  <rect x="62" y="112" width="76" height="28" rx="14" fill="#1e2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="131" text-anchor="middle" font-size="11" fill="#e8e8e8">시작</text>
  <!-- arrow down -->
  <line x1="100" y1="140" x2="100" y2="160" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- condition diamond -->
  <polygon points="100,162 142,186 100,210 58,186" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="190" text-anchor="middle" font-size="11" fill="#e8e8e8">조건?</text>
  <!-- true arrow right -->
  <line x1="142" y1="186" x2="176" y2="186" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="159" y="180" text-anchor="middle" font-size="10" fill="#55c555">true</text>
  <rect x="176" y="174" width="48" height="24" rx="4" fill="#0a1f0a" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="190" text-anchor="middle" font-size="10" fill="#55c555">블록 A</text>
  <!-- false arrow down -->
  <line x1="100" y1="210" x2="100" y2="230" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrr)"/>
  <text x="110" y="224" font-size="10" fill="#e05555">false</text>
  <rect x="62" y="232" width="76" height="24" rx="4" fill="#1f0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="248" text-anchor="middle" font-size="10" fill="#e05555">else 블록</text>
  <!-- merge -->
  <line x1="200" y1="198" x2="200" y2="270" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="200" y1="270" x2="120" y2="270" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="100" y1="256" x2="100" y2="270" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="100" y1="270" x2="100" y2="286" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- end -->
  <rect x="62" y="288" width="76" height="28" rx="14" fill="#1e2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="307" text-anchor="middle" font-size="11" fill="#e8e8e8">종료</text>

  <!-- ──────────── for loop ──────────── -->
  <text x="330" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">for 루프</text>

  <rect x="292" y="112" width="76" height="28" rx="14" fill="#1e2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="330" y="131" text-anchor="middle" font-size="11" fill="#e8e8e8">초기화</text>
  <line x1="330" y1="140" x2="330" y2="160" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <polygon points="330,162 372,186 330,210 288,186" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="330" y="190" text-anchor="middle" font-size="11" fill="#e8e8e8">i &lt; n?</text>

  <!-- true: body -->
  <line x1="330" y1="210" x2="330" y2="230" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="340" y="224" font-size="10" fill="#55c555">true</text>
  <rect x="292" y="232" width="76" height="24" rx="4" fill="#0a1f0a" stroke="#55c555" stroke-width="1"/>
  <text x="330" y="248" text-anchor="middle" font-size="10" fill="#55c555">루프 본문</text>

  <!-- update &amp; back -->
  <rect x="292" y="270" width="76" height="24" rx="4" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="330" y="286" text-anchor="middle" font-size="10" fill="#e8e8e8">i++ 업데이트</text>
  <line x1="330" y1="256" x2="330" y2="270" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- back to condition -->
  <line x1="292" y1="282" x2="256" y2="282" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="256" y1="282" x2="256" y2="186" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="256" y1="186" x2="288" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="3,3"/>

  <!-- false: exit -->
  <line x1="372" y1="186" x2="406" y2="186" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrr)"/>
  <text x="388" y="180" text-anchor="middle" font-size="10" fill="#e05555">false</text>
  <rect x="406" y="174" width="54" height="24" rx="4" fill="#1f0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="433" y="190" text-anchor="middle" font-size="10" fill="#e05555">루프 종료</text>

  <!-- ──────────── while / do-while ──────────── -->
  <text x="630" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">while / do-while</text>

  <!-- while -->
  <text x="580" y="126" font-size="11" fill="#888">while</text>
  <polygon points="580,132 622,156 580,180 538,156" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="160" text-anchor="middle" font-size="10" fill="#e8e8e8">조건?</text>
  <line x1="580" y1="180" x2="580" y2="200" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="590" y="194" font-size="10" fill="#55c555">true</text>
  <rect x="542" y="202" width="76" height="24" rx="4" fill="#0a1f0a" stroke="#55c555" stroke-width="1"/>
  <text x="580" y="218" text-anchor="middle" font-size="10" fill="#55c555">본문 실행</text>
  <line x1="542" y1="214" x2="510" y2="214" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="510" y1="214" x2="510" y2="156" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="510" y1="156" x2="538" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="3,3"/>
  <line x1="622" y1="156" x2="660" y2="156" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrr)"/>
  <text x="640" y="150" text-anchor="middle" font-size="10" fill="#e05555">false</text>
  <text x="672" y="160" font-size="10" fill="#e05555">종료</text>

  <!-- do-while -->
  <text x="580" y="256" font-size="11" fill="#888">do-while (최소 1회 실행)</text>
  <rect x="542" y="264" width="76" height="24" rx="4" fill="#0a1f0a" stroke="#55c555" stroke-width="1"/>
  <text x="580" y="280" text-anchor="middle" font-size="10" fill="#55c555">본문 실행</text>
  <line x1="580" y1="288" x2="580" y2="308" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="580,310 622,334 580,358 538,334" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="338" text-anchor="middle" font-size="10" fill="#e8e8e8">조건?</text>
  <line x1="538" y1="334" x2="504" y2="334" stroke="#55c555" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="504" y1="334" x2="504" y2="276" stroke="#55c555" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="504" y1="276" x2="542" y2="276" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)" stroke-dasharray="3,3"/>
  <text x="490" y="300" text-anchor="middle" font-size="10" fill="#55c555">true</text>
  <line x1="622" y1="334" x2="660" y2="334" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrr)"/>
  <text x="640" y="328" text-anchor="middle" font-size="10" fill="#e05555">false</text>
  <text x="672" y="338" font-size="10" fill="#e05555">종료</text>

  <!-- ──────────── break / continue / return ──────────── -->
  <rect x="60" y="356" width="760" height="80" rx="8" fill="#0f1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="378" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">루프 제어 키워드</text>
  <text x="160" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">break</text>
  <text x="160" y="420" text-anchor="middle" font-size="12" fill="#888">루프·switch를 즉시 탈출</text>
  <text x="440" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">continue</text>
  <text x="440" y="420" text-anchor="middle" font-size="12" fill="#888">현재 반복을 건너뛰고 다음 반복으로</text>
  <text x="720" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">return</text>
  <text x="720" y="420" text-anchor="middle" font-size="12" fill="#888">메서드 즉시 종료 (값 반환 가능)</text>

  <!-- ──────────── for-each / enhanced for ──────────── -->
  <rect x="60" y="454" width="760" height="98" rx="8" fill="#111827" stroke="#1e2a3a" stroke-width="1"/>
  <text x="200" y="476" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Enhanced for (for-each)</text>
  <text x="200" y="498" text-anchor="middle" font-size="12" fill="#888">배열·Iterable 순회에 권장</text>
  <text x="200" y="516" text-anchor="middle" font-size="12" fill="#888">인덱스 불필요할 때 간결</text>
  <text x="200" y="534" text-anchor="middle" font-size="12" fill="#888">컬렉션 수정 중 사용 주의</text>
  <text x="550" y="476" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Labeled break / continue</text>
  <text x="550" y="498" text-anchor="middle" font-size="12" fill="#888">중첩 루프에서 특정 루프 탈출</text>
  <text x="550" y="516" text-anchor="middle" font-size="12" fill="#888">outer: for(...)  →  break outer;</text>
  <text x="550" y="534" text-anchor="middle" font-size="12" fill="#888">과도한 사용은 가독성 저하</text>
</svg>
