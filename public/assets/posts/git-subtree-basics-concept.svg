<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git subtree: 외부 저장소를 디렉터리로 병합</text>

  <!-- External repo -->
  <rect x="60" y="70" width="280" height="200" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">외부 저장소 (util)</text>
  <text x="200" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">github.com/org/util.git</text>
  <rect x="80" y="130" width="240" height="80" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">● c9a1b2e  add cache</text>
  <text x="96" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">● 4d8f3a1  init utils</text>
  <text x="96" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">● 1c0e5b7  first commit</text>

  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">📄 index.js</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">📄 utils.js</text>

  <!-- Arrow: add -->
  <line x1="350" y1="170" x2="424" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="387" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">subtree add</text>

  <!-- Main repo -->
  <rect x="430" y="70" width="390" height="340" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="625" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">메인 저장소 (main-project)</text>

  <!-- Main repo history with merged commits -->
  <rect x="450" y="110" width="350" height="120" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">● f3b8d01  Add util subtree</text>
  <text x="480" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 외부 저장소 히스토리 병합됨</text>
  <text x="466" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">● c9a1b2e  add cache</text>
  <text x="466" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">● 4d8f3a1  init utils</text>
  <text x="466" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">● 1c0e5b7  first commit</text>

  <!-- Directory structure in main repo -->
  <rect x="450" y="248" width="350" height="140" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">main-project/</text>
  <text x="482" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">├── src/main.js</text>
  <text x="482" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">├── README.md</text>
  <text x="482" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">└── libs/util/       ← 서브트리</text>
  <text x="498" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">    ├── index.js</text>
  <text x="498" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">    └── utils.js</text>

  <!-- Key difference note -->
  <rect x="60" y="290" width="280" height="100" rx="8" fill="#1a2035" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">서브모듈과 차이점</text>
  <text x="200" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">✓ .gitmodules 파일 없음</text>
  <text x="200" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">✓ git clone 한 번이면 충분</text>
  <text x="200" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">✓ 일반 파일로 관리됨</text>

  <!-- Bottom note -->
  <rect x="60" y="420" width="760" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">핵심: 서브트리 파일은 메인 저장소의 일반 파일 — 특별한 초기화 과정이 없다</text>
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">단점: 메인 저장소 히스토리에 외부 저장소 커밋이 섞임</text>
</svg>
