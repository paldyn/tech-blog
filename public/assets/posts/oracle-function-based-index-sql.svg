<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">FBI 활용 패턴 및 실행 계획 확인</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">다양한 FBI 표현식과 EXPLAIN PLAN 검증 방법</text>

  <!-- Section 1: Patterns -->
  <text x="60" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">주요 FBI 패턴</text>
  <rect x="60" y="110" width="380" height="206" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 1. 대소문자 무관 검색</text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CREATE INDEX</text><text x="184" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> idx_upper_name</text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ON</text><text x="100" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> emp (UPPER(last_name));</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 2. NULL 제외 부분 인덱스 효과</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CREATE INDEX</text><text x="184" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> idx_active_sal</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ON</text><text x="100" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> emp (</text><text x="148" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CASE WHEN</text><text x="232" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> status=</text><text x="288" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'A'</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">     THEN</text><text x="148" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> salary </text><text x="208" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">END</text><text x="232" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">);</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 3. 계산 표현식 인덱스</text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CREATE INDEX</text><text x="184" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> idx_annual_sal</text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">ON</tspan><tspan fill="#ffffff"> emp (salary * </tspan><tspan fill="#b5cea8">12</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- Section 2: Verify -->
  <text x="460" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">실행 계획으로 FBI 사용 확인</text>
  <rect x="460" y="110" width="360" height="206" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 실행 계획 확인</text>
  <text x="476" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">EXPLAIN PLAN FOR</text>
  <text x="476" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text><text x="524" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> * </text><text x="548" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text><text x="584" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> emp</text>
  <text x="476" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">WHERE</tspan><tspan fill="#ffffff"> UPPER(last_name)=</tspan><tspan fill="#ce9178">'KING'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text><text x="524" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> * </text>
  <text x="476" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text><text x="512" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> TABLE(DBMS_XPLAN.DISPLAY);</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- INDEX RANGE SCAN 확인 시 FBI 활용</text>
  <text x="476" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- Operation: INDEX RANGE SCAN</text>
  <text x="476" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">--   Name: IDX_UPPER_NAME ✓</text>
  <text x="476" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- TABLE ACCESS BY INDEX ROWID</text>

  <!-- Section 3: Statistics requirement -->
  <text x="60" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">통계 수집 및 선행 조건</text>
  <rect x="60" y="342" width="380" height="116" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- FBI 통계 수집 (필수)</text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">DBMS_STATS.GATHER_TABLE_STATS(</text>
  <text x="76" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">'HR'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'EMPLOYEES'</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  method_opt =&gt; </tspan><tspan fill="#ce9178">'FOR ALL INDEXED COLUMNS'</tspan></text>
  <text x="76" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">);</text>

  <!-- Section 4: Gotchas -->
  <text x="460" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">FBI 사용 안 되는 흔한 실수</text>
  <rect x="460" y="342" width="360" height="116" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- ❌ 표현식 불일치 → 인덱스 미사용</text>
  <text x="476" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">-- 인덱스: UPPER(last_name)</text>
  <text x="476" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">-- 쿼리:   LOWER(last_name) -- 불일치!</text>
  <text x="476" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- ❌ QUERY_REWRITE_ENABLED=FALSE</text>
  <text x="476" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">ALTER</tspan><tspan fill="#ffffff"> SESSION </tspan><tspan fill="#7ec8e3">SET</tspan></text>
  <text x="476" y="456" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  query_rewrite_enabled = </text><text x="680" y="456" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">TRUE</text><text x="716" y="456" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>

  <!-- Bottom summary -->
  <rect x="60" y="474" width="760" height="50" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <text x="440" y="498" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">FBI 체크리스트</text>
  <text x="200" y="516" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">표현식 완전 일치</text>
  <text x="440" y="516" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">QUERY_REWRITE_ENABLED=TRUE</text>
  <text x="700" y="516" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">통계 수집 완료</text>
</svg>
