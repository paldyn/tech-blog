<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">2PC vs SAGA 패턴 비교</text>

  <!-- 2PC Column -->
  <rect x="60" y="65" width="360" height="46" rx="8" fill="#12213a" stroke="#3a6ea8" stroke-width="2"/>
  <text x="240" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">2PC</text>
  <text x="240" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">강한 일관성 / 동기 블로킹</text>

  <!-- SAGA Column -->
  <rect x="460" y="65" width="360" height="46" rx="8" fill="#1a2a1a" stroke="#3a6e3a" stroke-width="2"/>
  <text x="640" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">SAGA</text>
  <text x="640" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">최종 일관성 / 비동기 보상</text>

  <!-- Row headers -->
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">비교 항목</text>

  <!-- Rows -->
  <!-- Consistency -->
  <rect x="60" y="148" width="360" height="46" rx="6" fill="#0e1c30" stroke="#1e3a5a" stroke-width="1"/>
  <text x="240" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">강한 일관성 (ACID)</text>
  <text x="240" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 노드 동시 커밋</text>

  <rect x="460" y="148" width="360" height="46" rx="6" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1"/>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">최종 일관성</text>
  <text x="640" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">중간 상태 노출 가능</text>

  <!-- Lock -->
  <rect x="60" y="202" width="360" height="46" rx="6" fill="#0e1c30" stroke="#1e3a5a" stroke-width="1"/>
  <text x="240" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">글로벌 락 점유 (블로킹)</text>
  <text x="240" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Coordinator 장애 시 락 해제 불가</text>

  <rect x="460" y="202" width="360" height="46" rx="6" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1"/>
  <text x="640" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">락 없음 (비차단)</text>
  <text x="640" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">각 서비스 독립 완료</text>

  <!-- Rollback -->
  <rect x="60" y="256" width="360" height="46" rx="6" fill="#0e1c30" stroke="#1e3a5a" stroke-width="1"/>
  <text x="240" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">자동 롤백</text>
  <text x="240" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전체 ROLLBACK 원자적 처리</text>

  <rect x="460" y="256" width="360" height="46" rx="6" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1"/>
  <text x="640" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">보상 트랜잭션 직접 구현</text>
  <text x="640" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실패 시 역순으로 취소 실행</text>

  <!-- Use case -->
  <rect x="60" y="310" width="360" height="46" rx="6" fill="#0e1c30" stroke="#1e3a5a" stroke-width="1"/>
  <text x="240" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">적합 케이스</text>
  <text x="240" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">짧은 트랜잭션·동기 서비스</text>

  <rect x="460" y="310" width="360" height="46" rx="6" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1"/>
  <text x="640" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">적합 케이스</text>
  <text x="640" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">마이크로서비스·장기 실행 트랜잭션</text>

  <!-- Code block -->
  <rect x="60" y="374" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="396" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- SAGA 보상 트랜잭션 예시</text>
  <text x="76" y="416" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">UPDATE</tspan><tspan fill="#ffffff"> inventory </tspan><tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> qty = qty + :restore_qty</tspan>
  </text>
  <text x="76" y="436" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> order_id = :failed_order_id; </tspan><tspan fill="#9aa4b8">-- 재고 복원</tspan>
  </text>
  <text x="76" y="456" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">UPDATE</tspan><tspan fill="#ffffff"> orders </tspan><tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> status = </tspan><tspan fill="#ce9178">'CANCELLED'</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> id = :failed_order_id;</tspan>
  </text>
</svg>
