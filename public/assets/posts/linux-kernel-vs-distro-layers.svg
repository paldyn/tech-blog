<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커널 vs 배포판: 레이어 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">커널은 공통 — 배포판이 나머지를 더한다</text>

  <!-- Kernel section (left) -->
  <rect x="60" y="96" width="360" height="320" fill="#080d18" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="17" font-weight="700" fill="#7ec8e3" text-anchor="middle">Linux 커널</text>
  <text x="240" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">(kernel.org에서 동일하게 배포)</text>

  <rect x="84" y="164" width="312" height="36" fill="#0d1a2a" rx="4"/>
  <text x="240" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">프로세스 스케줄러 (CFS)</text>

  <rect x="84" y="208" width="312" height="36" fill="#0d1a2a" rx="4"/>
  <text x="240" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">가상 메모리 · 페이지 캐시</text>

  <rect x="84" y="252" width="312" height="36" fill="#0d1a2a" rx="4"/>
  <text x="240" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">VFS (가상 파일시스템)</text>

  <rect x="84" y="296" width="312" height="36" fill="#0d1a2a" rx="4"/>
  <text x="240" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">네트워크 스택 · 넷필터</text>

  <rect x="84" y="340" width="312" height="36" fill="#0d1a2a" rx="4"/>
  <text x="240" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">디바이스 드라이버 · 커널 모듈</text>

  <!-- Plus sign -->
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="40" font-weight="700" fill="#444" text-anchor="middle">+</text>

  <!-- Distro section (right) -->
  <rect x="460" y="96" width="360" height="320" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="17" font-weight="700" fill="#55c555" text-anchor="middle">배포판이 추가하는 것</text>
  <text x="640" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">(Ubuntu · RHEL · Arch마다 다름)</text>

  <rect x="484" y="164" width="312" height="36" fill="#0d2010" rx="4"/>
  <text x="640" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">패키지 관리자 (apt · dnf · pacman)</text>

  <rect x="484" y="208" width="312" height="36" fill="#0d2010" rx="4"/>
  <text x="640" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">init 시스템 (systemd · OpenRC)</text>

  <rect x="484" y="252" width="312" height="36" fill="#0d2010" rx="4"/>
  <text x="640" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">GNU 도구 (bash · coreutils · glibc)</text>

  <rect x="484" y="296" width="312" height="36" fill="#0d2010" rx="4"/>
  <text x="640" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">기본 설정 · 보안 정책 · 패치</text>

  <rect x="484" y="340" width="312" height="36" fill="#0d2010" rx="4"/>
  <text x="640" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">데스크톱 환경 (GNOME · KDE · …)</text>

  <!-- Equals / Result -->
  <text x="440" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">커널 + 배포판 구성 요소 = 완전한 Linux 운영체제</text>
</svg>
