<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LocalDateTime = LocalDate + LocalTime</text>

  <!-- LocalDate part -->
  <rect x="100" y="86" width="240" height="64" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">LocalDate</text>
  <text x="220" y="134" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">2026-06-12</text>

  <!-- plus sign -->
  <text x="440" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="26" font-weight="700" fill="#888">+</text>

  <!-- LocalTime part -->
  <rect x="540" y="86" width="240" height="64" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">LocalTime</text>
  <text x="660" y="134" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">14:30:00</text>

  <!-- Arrows down to LocalDateTime -->
  <line x1="220" y1="150" x2="356" y2="206" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="660" y1="150" x2="524" y2="206" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="140" y="172"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">atTime(time)</text>
  <text x="740" y="172" text-anchor="end"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">atDate(date)</text>

  <!-- LocalDateTime -->
  <rect x="300" y="206" width="280" height="68" rx="8" fill="#0d1420" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">LocalDateTime</text>
  <text x="440" y="258" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">2026-06-12T14:30:00</text>

  <!-- Decomposition arrows -->
  <line x1="356" y1="274" x2="220" y2="330" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>
  <line x1="524" y1="274" x2="660" y2="330" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <text x="216" y="300" text-anchor="end"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">toLocalDate()</text>
  <text x="664" y="300"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">toLocalTime()</text>

  <!-- Decomposed boxes -->
  <rect x="100" y="330" width="240" height="56" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="220" y="354" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">날짜 부분만 추출</text>
  <text x="220" y="372" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">2026-06-12</text>

  <rect x="540" y="330" width="240" height="56" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="660" y="354" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">시각 부분만 추출</text>
  <text x="660" y="372" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">14:30:00</text>

  <text x="440" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">결합과 분해가</text>
  <text x="440" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모두 자유롭다</text>
</svg>
