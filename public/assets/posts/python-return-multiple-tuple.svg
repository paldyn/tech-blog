<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">여러 값 반환 — 튜플 언패킹</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">return a, b 는 사실 tuple 반환 — 언패킹으로 분리</text>

  <!-- Return creates tuple -->
  <rect x="60" y="90" width="760" height="80" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> minmax(nums):</tspan></text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#e8e8e8"> min(nums), max(nums)   </tspan><tspan fill="#888"># tuple 반환</tspan></text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">    # 괄호 없어도 동일: return (min(nums), max(nums))</text>

  <!-- Three usage patterns -->
  <!-- Pattern 1: tuple as-is -->
  <rect x="60" y="202" width="220" height="210" fill="#070b14" rx="8" stroke="#1e2433"/>
  <text x="170" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">①  튜플 그대로</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">result = minmax([</tspan></text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">])</tspan></text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">result</tspan></text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># (1, 5)</text>
  <text x="76" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">튜플로 저장</text>

  <!-- Pattern 2: unpacking -->
  <rect x="330" y="202" width="220" height="210" fill="#070b14" rx="8" stroke="#55c555"/>
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">②  언패킹</text>
  <text x="346" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">lo, hi = minmax([</tspan></text>
  <text x="346" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">])</tspan></text>
  <text x="346" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">print(lo, hi)</tspan></text>
  <text x="346" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 1 5</text>
  <text x="346" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">가장 일반적인 패턴</text>

  <!-- Pattern 3: ignore one -->
  <rect x="600" y="202" width="220" height="210" fill="#070b14" rx="8" stroke="#7777cc"/>
  <text x="710" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">③  일부만 사용</text>
  <text x="616" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">_, hi = minmax([</tspan></text>
  <text x="616" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">])</tspan></text>
  <text x="616" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">print(hi)</tspan></text>
  <text x="616" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 5</text>
  <text x="616" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">_ 로 불필요한 값 버리기</text>
</svg>
