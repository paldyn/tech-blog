<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="cp-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="cp-arr-aux" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Copying Collection — From / To 반쪽 힙</text>

  <!-- ===== STAGE 1: before copy ===== -->
  <text x="70" y="86" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">1. 수집 전 — From-space에 객체가 흩어져 있음</text>

  <!-- From-space label -->
  <text x="70" y="116" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">From-space (활성)</text>
  <rect x="70" y="124" width="350" height="56" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <!-- live A -->
  <rect x="84" y="136" width="56" height="32" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="112" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">A</text>
  <!-- dead -->
  <rect x="150" y="136" width="56" height="32" rx="4" fill="#2a1414" stroke="#e05555" stroke-width="1"/>
  <text x="178" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">X</text>
  <!-- live B -->
  <rect x="216" y="136" width="56" height="32" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="244" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">B</text>
  <!-- dead -->
  <rect x="282" y="136" width="56" height="32" rx="4" fill="#2a1414" stroke="#e05555" stroke-width="1"/>
  <text x="310" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">X</text>
  <!-- live C -->
  <rect x="348" y="136" width="56" height="32" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="376" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C</text>

  <!-- To-space label -->
  <text x="460" y="116" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">To-space (비어 있음 · 절반 예약)</text>
  <rect x="460" y="124" width="350" height="56" rx="8" fill="#0a0a0a" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="635" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">empty</text>

  <!-- copy arrow -->
  <line x1="420" y1="152" x2="458" y2="152" stroke="#55c555" stroke-width="2.5" marker-end="url(#cp-arr)"/>
  <text x="440" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">copy live ↓</text>

  <!-- ===== STAGE 2: after copy ===== -->
  <text x="70" y="244" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">2. 수집 후 — 생존 객체만 To에 빈틈없이 복사</text>

  <!-- From-space now garbage -->
  <text x="70" y="274" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">From-space (통째로 폐기)</text>
  <rect x="70" y="282" width="350" height="56" rx="8" fill="#0a0a0a" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="245" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">한 번에 비움 (sweep 불필요)</text>

  <!-- To-space packed -->
  <text x="460" y="274" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">To-space (압축 완료)</text>
  <rect x="460" y="282" width="350" height="56" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="474" y="294" width="56" height="32" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="502" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">A</text>
  <rect x="540" y="294" width="56" height="32" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="568" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">B</text>
  <rect x="606" y="294" width="56" height="32" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="634" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C</text>
  <!-- free contiguous -->
  <rect x="672" y="294" width="124" height="32" rx="4" fill="#0a141a" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="734" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">free (연속)</text>

  <!-- swap roles arrow -->
  <line x1="245" y1="338" x2="245" y2="372" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#cp-arr-aux)"/>
  <text x="290" y="362" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">역할 교환 (swap): To가 다음 활성 공간이 됨</text>

  <!-- ===== Tradeoff boxes ===== -->
  <rect x="70" y="388" width="350" height="104" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">장점</text>
  <text x="245" y="442" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">단편화 없음 · sweep 단계 없음</text>
  <text x="245" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">할당이 bump pointer로 매우 빠름</text>
  <text x="245" y="482" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비용이 죽은 객체가 아닌 생존 객체에 비례</text>

  <rect x="460" y="388" width="350" height="104" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">단점</text>
  <text x="635" y="442" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">힙의 절반을 항상 예약 → 메모리 낭비</text>
  <text x="635" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">생존율이 높으면 복사 비용이 커짐</text>
  <text x="635" y="482" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ 생존율 낮은 Young 영역에 적합</text>
</svg>
