<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">유니언 배포 패턴</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">인트린직 타입은 유니언에 자동 배포된다</text>

  <!-- Left: distribution -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">유니언 자동 배포</text>
  <rect x="60" y="116" width="360" height="144" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 유니언에 적용하면 각 멤버에 배포</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> U = Uppercase&lt;<tspan fill="#ce9178">"a"</tspan> | <tspan fill="#ce9178">"b"</tspan> | <tspan fill="#ce9178">"c"</tspan>&gt;;</text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// "A" | "B" | "C"</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Keys = <tspan fill="#ce9178">"name"</tspan> | <tspan fill="#ce9178">"age"</tspan>;</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Setters = <tspan fill="#ce9178">`set${Capitalize&lt;Keys&gt;}`</tspan>;</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// "setName" | "setAge"</text>

  <!-- Right: camelCase conversion -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">camelCase / PascalCase 변환</text>
  <rect x="460" y="116" width="360" height="144" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// snake_case → camelCase (재귀)</text>
  <text x="476" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> ToCamel&lt;<tspan fill="#7ec8e3" font-weight="600">S</tspan> <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#ce9178">string</tspan>&gt; =</text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">S</tspan> <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#ce9178">`${<tspan fill="#7ec8e3">infer</tspan> A}_${<tspan fill="#7ec8e3">infer</tspan> B}`</tspan></text>
  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    ? <tspan fill="#ce9178">`${<tspan fill="#7ec8e3 font-weight=" font-weight="600">A</tspan>}${ToCamel&lt;Capitalize&lt;<tspan fill="#7ec8e3" font-weight="600">B</tspan>&gt;&gt;}`</tspan></text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    : <tspan fill="#7ec8e3" font-weight="600">S</tspan>;</text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ToCamel&lt;"user_first_name"&gt;</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// = "userFirstName"</text>

  <!-- Bottom: constraint pattern -->
  <text x="60" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제약 조건과 함께 (타입 안전 변환)</text>
  <rect x="60" y="296" width="760" height="126" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// CSS 속성 → CSS 변수명</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> CssVar&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan> <tspan fill="#7ec8e3" font-weight="600">extends</tspan> <tspan fill="#ce9178">string</tspan>&gt; = <tspan fill="#ce9178">`--${Lowercase&lt;T&gt;}`</tspan>;</text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> ColorVars = CssVar&lt;<tspan fill="#ce9178">"Primary"</tspan> | <tspan fill="#ce9178">"Secondary"</tspan>&gt;;</text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// "--primary" | "--secondary"</text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 조합: DB컬럼(snake_case) → TS속성(camelCase) 자동 매핑</text>

  <!-- Note -->
  <rect x="60" y="444" width="760" height="0" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="0"/>
</svg>
