<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">ACID 동작 예시: 계좌 이체</text>
  <text x="440" y="62" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">원자성 위반 방지 — 이체 중 장애 발생 시 전부 롤백</text>

  <!-- Left: Success path -->
  <rect x="50" y="78" width="370" height="22" rx="4" fill="#0f1a0f"/>
  <text x="235" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">성공 시나리오 (COMMIT)</text>

  <rect x="50" y="104" width="370" height="234" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="66" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">BEGIN<tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- A 계좌 출금</text>
  <text x="66" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">UPDATE<tspan fill="#ffffff"> accounts</tspan></text>
  <text x="66" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  SET<tspan fill="#ffffff"> balance = balance - </tspan><tspan fill="#b5cea8">100</tspan></text>
  <text x="66" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  WHERE<tspan fill="#ffffff"> id = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- B 계좌 입금</text>
  <text x="66" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">UPDATE<tspan fill="#ffffff"> accounts</tspan></text>
  <text x="66" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  SET<tspan fill="#ffffff"> balance = balance + </tspan><tspan fill="#b5cea8">100</tspan></text>
  <text x="66" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  WHERE<tspan fill="#ffffff"> id = </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">COMMIT<tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 이체 완료, 영구 반영(D)</text>

  <!-- Right: Failure path -->
  <rect x="460" y="78" width="370" height="22" rx="4" fill="#1a0f0f"/>
  <text x="645" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">실패 시나리오 (ROLLBACK)</text>

  <rect x="460" y="104" width="370" height="234" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">BEGIN<tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">UPDATE<tspan fill="#ffffff"> accounts</tspan></text>
  <text x="476" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  SET<tspan fill="#ffffff"> balance = balance - </tspan><tspan fill="#b5cea8">100</tspan></text>
  <text x="476" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  WHERE<tspan fill="#ffffff"> id = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 여기서 오류 발생!</text>
  <text x="476" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">-- ERROR: network timeout</text>
  <text x="476" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- OR: CHECK 제약 위반 등</text>
  <text x="476" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  </text>
  <text x="476" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">ROLLBACK<tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- A 계좌 -100 취소 (원자성)</text>
  <text x="476" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 잔액 불변 보장</text>

  <!-- Bottom note -->
  <rect x="50" y="348" width="780" height="22" rx="4" fill="#111118"/>
  <text x="440" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Undo Log: A 감소 이전 값 보관 → ROLLBACK 시 재적용 | Redo Log: COMMIT된 변경 기록 → 장애 복구 시 재수행</text>
</svg>
