<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ABAC 정책 평가 구현</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Python — OPA 스타일 속성 기반 정책 평가기</text>

  <!-- Code block -->
  <rect x="60" y="94" width="760" height="362" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text xml:space="preserve" x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ABAC 정책 평가 엔진</text>

  <text xml:space="preserve" x="80" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="131" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> dataclasses </text>
  <text xml:space="preserve" x="253" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="304" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> dataclass, field</text>

  <text xml:space="preserve" x="80" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="131" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> datetime </text>
  <text xml:space="preserve" x="217" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="268" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> datetime</text>

  <text xml:space="preserve" x="80" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">@dataclass</text>
  <text xml:space="preserve" x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">class</text>
  <text xml:space="preserve" x="131" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> AccessRequest:</text>
  <text xml:space="preserve" x="80" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    subject: dict</text>
  <text xml:space="preserve" x="80" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    resource: dict</text>
  <text xml:space="preserve" x="80" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    action: str</text>
  <text xml:space="preserve" x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    env: dict = field(default_factory=dict)</text>

  <text xml:space="preserve" x="80" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="110" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> evaluate(req: AccessRequest) -> bool:</text>
  <text xml:space="preserve" x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # 시간 제한: 업무 시간만 허용</text>
  <text xml:space="preserve" x="80" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    hour = req.env.get(</text>
  <text xml:space="preserve" x="234" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"hour"</text>
  <text xml:space="preserve" x="291" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, datetime.now().hour)</text>
  <text xml:space="preserve" x="80" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    if not</text>
  <text xml:space="preserve" x="152" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (</text>
  <text xml:space="preserve" x="167" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">9</text>
  <text xml:space="preserve" x="178" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> &lt;= hour &lt;</text>
  <text xml:space="preserve" x="260" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> 18</text>
  <text xml:space="preserve" x="286" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">):</text>
  <text xml:space="preserve" x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">        return</text>
  <text xml:space="preserve" x="160" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> False</text>

  <text xml:space="preserve" x="80" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # 민감 자원: 같은 부서 관리자만 읽기 가능</text>
  <text xml:space="preserve" x="80" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    return </text>
  <text xml:space="preserve" x="139" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(req.subject[</text>
  <text xml:space="preserve" x="248" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"dept"</text>
  <text xml:space="preserve" x="305" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]</text>
  <text xml:space="preserve" x="316" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">== req.resource[</text>
  <text xml:space="preserve" x="460" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"owner_dept"</text>
  <text xml:space="preserve" x="560" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">])</text>
</svg>
