<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 482"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="482" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro Studio N — 새 프로젝트 생성</text>

  <!-- Vertical divider -->
  <line x1="432" y1="62" x2="432" y2="444" stroke="#1e2433" stroke-width="1"/>

  <!-- ── Left section header ── -->
  <text x="236" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#888">생성 절차 (New Project Wizard)</text>

  <!-- Step 1 box (y=86) -->
  <rect x="72" y="86" width="290" height="56" rx="6" fill="#0f1520" stroke="#1e2433"/>
  <rect x="72" y="86" width="4" height="56" rx="2" fill="#7777cc"/>
  <text x="94" y="109" font-size="16" font-weight="700" fill="#7777cc">1</text>
  <text x="114" y="108" font-size="13" font-weight="600" fill="#e8e8e8">프로젝트 유형 선택</text>
  <text x="114" y="127" font-size="12" fill="#888">Empty Project 또는 Template 선택</text>

  <!-- Down arrow 1 (shaft 30px, head width 18px, y=144→182) -->
  <polygon points="211,145 219,145 219,175 225,175 215,183 205,175 211,175"
           fill="#444" stroke="#333" stroke-width="1"/>

  <!-- Step 2 box (y=186) -->
  <rect x="72" y="186" width="290" height="56" rx="6" fill="#0f1520" stroke="#1e2433"/>
  <rect x="72" y="186" width="4" height="56" rx="2" fill="#7ec8e3"/>
  <text x="94" y="209" font-size="16" font-weight="700" fill="#7ec8e3">2</text>
  <text x="114" y="208" font-size="13" font-weight="600" fill="#e8e8e8">프로젝트 이름·경로 설정</text>
  <text x="114" y="227" font-size="12" fill="#888">한글·공백 경로는 피할 것</text>

  <!-- Down arrow 2 -->
  <polygon points="211,245 219,245 219,275 225,275 215,283 205,275 211,275"
           fill="#444" stroke="#333" stroke-width="1"/>

  <!-- Step 3 box (y=286) -->
  <rect x="72" y="286" width="290" height="56" rx="6" fill="#0f1520" stroke="#1e2433"/>
  <rect x="72" y="286" width="4" height="56" rx="2" fill="#55c555"/>
  <text x="94" y="309" font-size="16" font-weight="700" fill="#55c555">3</text>
  <text x="114" y="308" font-size="13" font-weight="600" fill="#e8e8e8">기본 폼 포함 여부</text>
  <text x="114" y="327" font-size="12" fill="#888">SampleForm.xfdl 자동 생성 선택 가능</text>

  <!-- Down arrow 3 -->
  <polygon points="211,345 219,345 219,375 225,375 215,383 205,375 211,375"
           fill="#444" stroke="#333" stroke-width="1"/>

  <!-- Step 4 box (y=386) -->
  <rect x="72" y="386" width="290" height="56" rx="6" fill="#0f1520" stroke="#1e2433"/>
  <rect x="72" y="386" width="4" height="56" rx="2" fill="#e8e8e8"/>
  <text x="94" y="409" font-size="16" font-weight="700" fill="#e8e8e8">4</text>
  <text x="114" y="408" font-size="13" font-weight="600" fill="#e8e8e8">완료 (Finish 클릭)</text>
  <text x="114" y="427" font-size="12" fill="#888">Studio N IDE가 열리며 프로젝트 오픈</text>

  <!-- ── Right section header ── -->
  <text x="648" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#888">기본 프로젝트 구조</text>

  <!-- Code block: file tree -->
  <rect x="448" y="86" width="368" height="226" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="464" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">MyProject/</text>
  <text x="464" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  |-- TypeDef/</text>
  <text x="464" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">  |   \-- nexacro_v16.td</text>
  <text x="464" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  |-- frame/</text>
  <text x="464" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">  |   \-- MainFrame.xfdl</text>
  <text x="464" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  |-- form/</text>
  <text x="464" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">  |   \-- SampleForm.xfdl</text>
  <text x="464" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  |-- css/</text>
  <text x="464" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">  |   \-- default.css</text>
  <text x="464" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc" xml:space="preserve">  \-- NexacroCfg.xml</text>

  <!-- Right section notes -->
  <text x="448" y="336" font-size="12" fill="#888">※ NexacroCfg.xml — 환경 설정 (서비스 URL)</text>
  <text x="448" y="356" font-size="12" fill="#888">※ TypeDef/ — 컴포넌트 타입 정의 (빌드 참조)</text>
  <text x="448" y="376" font-size="12" fill="#888">※ frame/ — 앱 프레임(창 구조) 폼</text>
  <text x="448" y="396" font-size="12" fill="#888">※ form/ — 실제 업무 화면 폼 파일 위치</text>

  <!-- Footer -->
  <text x="440" y="462" text-anchor="middle" font-size="11" fill="#444">© PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
