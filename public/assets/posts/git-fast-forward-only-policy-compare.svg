<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">Fast-forward only: 선형 히스토리 강제</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">머지 커밋 없이, 브랜치가 깔끔히 이어질 때만 통합을 허용</text>

  <!-- ff possible -->
  <rect x="60" y="105" width="370" height="200" rx="10" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="135" font-size="16" font-weight="600" fill="#55c555">ff 가능 (허용)</text>
  <text x="80" y="160" font-size="13" fill="#9aa4b8">main이 뒤처져 있고 분기 없음</text>
  <circle cx="100" cy="210" r="9" fill="#7ec8e3"/>
  <circle cx="170" cy="210" r="9" fill="#7ec8e3"/>
  <circle cx="240" cy="210" r="9" fill="#55c555"/>
  <circle cx="310" cy="210" r="9" fill="#55c555"/>
  <line x1="109" y1="210" x2="161" y2="210" stroke="#888" stroke-width="2"/>
  <line x1="179" y1="210" x2="231" y2="210" stroke="#888" stroke-width="2"/>
  <line x1="249" y1="210" x2="301" y2="210" stroke="#888" stroke-width="2"/>
  <text x="80" y="270" font-size="13" fill="#55c555">main 포인터만 앞으로 이동</text>

  <!-- ff impossible -->
  <rect x="450" y="105" width="370" height="200" rx="10" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="135" font-size="16" font-weight="600" fill="#e05555">ff 불가 (거부)</text>
  <text x="470" y="160" font-size="13" fill="#9aa4b8">양쪽이 갈라져 분기 존재</text>
  <circle cx="490" cy="200" r="9" fill="#7ec8e3"/>
  <circle cx="560" cy="200" r="9" fill="#7ec8e3"/>
  <circle cx="630" cy="180" r="9" fill="#55c555"/>
  <circle cx="630" cy="240" r="9" fill="#e05555"/>
  <line x1="499" y1="200" x2="551" y2="200" stroke="#888" stroke-width="2"/>
  <line x1="568" y1="195" x2="622" y2="183" stroke="#888" stroke-width="2"/>
  <line x1="568" y1="205" x2="622" y2="237" stroke="#888" stroke-width="2"/>
  <text x="470" y="290" font-size="13" fill="#e05555">rebase 후 다시 시도해야 함</text>

  <text x="60" y="340" font-size="13" fill="#888">--ff-only는 머지 커밋이 섞이지 않은 일직선 히스토리를 보장한다</text>
</svg>
