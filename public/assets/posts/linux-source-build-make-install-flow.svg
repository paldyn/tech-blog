<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">소스 빌드 파이프라인</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">./configure → make → make install</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="100" width="160" height="70" fill="#1a2535" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">소스 다운로드</text>
  <text x="140" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">tar.gz 압축 해제</text>

  <!-- Arrow -->
  <polygon points="232,135 250,127 250,143" fill="#7777cc"/>
  <rect x="220" y="132" width="30" height="6" fill="#7777cc"/>

  <!-- Step 2 -->
  <rect x="252" y="100" width="160" height="70" fill="#1a2535" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="332" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">./configure</text>
  <text x="332" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Makefile 생성</text>

  <!-- Arrow -->
  <polygon points="424,135 442,127 442,143" fill="#7777cc"/>
  <rect x="412" y="132" width="30" height="6" fill="#7777cc"/>

  <!-- Step 3 -->
  <rect x="444" y="100" width="160" height="70" fill="#1a2535" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="524" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">make</text>
  <text x="524" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">소스 컴파일</text>

  <!-- Arrow -->
  <polygon points="616,135 634,127 634,143" fill="#7777cc"/>
  <rect x="604" y="132" width="30" height="6" fill="#7777cc"/>

  <!-- Step 4 -->
  <rect x="636" y="100" width="184" height="70" fill="#1a2535" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="728" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">sudo make install</text>
  <text x="728" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">시스템에 배포</text>

  <!-- configure detail -->
  <text x="225" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">configure 옵션</text>

  <rect x="60" y="216" width="330" height="174" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 설치 경로 지정</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">./configure --prefix=/usr/local</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기능 활성화/비활성화</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">./configure \</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  --prefix=/usr/local \</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  --enable-openssl \</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  --disable-debug</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 도움말 확인</text>

  <!-- make detail -->
  <text x="640" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">make 옵션</text>

  <rect x="490" y="216" width="330" height="174" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="506" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 병렬 빌드 (코어 수만큼)</text>
  <text x="506" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">make -j$(nproc)</text>
  <text x="506" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 특정 타겟만 빌드</text>
  <text x="506" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">make tests</text>
  <text x="506" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">make check</text>
  <text x="506" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 설치 후 제거</text>
  <text x="506" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">sudo make uninstall</text>

  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">Autotools 기반 프로젝트: configure.ac → autoconf → configure 스크립트 생성</text>
</svg>
