<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">커스텀 Spring Boot Starter — 모듈 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">autoconfigure 모듈 + starter 모듈 분리</text>

  <!-- autoconfigure module -->
  <rect x="60" y="96" width="360" height="320" rx="10" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">my-service-spring-boot-autoconfigure</text>

  <!-- Files inside autoconfigure -->
  <rect x="84" y="136" width="312" height="44" rx="6" fill="#0f1318" stroke="#7ec8e3" stroke-width="1"/>
  <text x="100" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">MyServiceAutoConfiguration.java</text>
  <text x="100" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  @Configuration @ConditionalOnClass</text>

  <rect x="84" y="192" width="312" height="44" rx="6" fill="#0f1318" stroke="#7ec8e3" stroke-width="1"/>
  <text x="100" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">MyServiceProperties.java</text>
  <text x="100" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  @ConfigurationProperties("my.service")</text>

  <rect x="84" y="248" width="312" height="44" rx="6" fill="#0f1318" stroke="#7ec8e3" stroke-width="1"/>
  <text x="100" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">MyService.java</text>
  <text x="100" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  핵심 비즈니스 클래스</text>

  <rect x="84" y="304" width="312" height="52" rx="6" fill="#0f1318" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">META-INF/spring/</text>
  <text x="100" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">  org.springframework.boot.</text>
  <text x="100" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">  autoconfigure.AutoConfiguration.imports</text>

  <rect x="84" y="368" width="312" height="32" rx="6" fill="#0f1318" stroke="#7777cc" stroke-width="1"/>
  <text x="100" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">additional-spring-configuration-metadata.json</text>

  <!-- Arrow between modules -->
  <line x1="440" y1="256" x2="478" y2="256" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="486,256 474,250 474,262" fill="#7ec8e3"/>
  <text x="463" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">의존</text>

  <!-- starter module -->
  <rect x="490" y="96" width="330" height="160" rx="10" fill="#1a1f2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="655" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#ce9178">my-service-spring-boot-starter</text>

  <rect x="514" y="136" width="282" height="52" rx="6" fill="#0f1318" stroke="#ce9178" stroke-width="1"/>
  <text x="530" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">pom.xml / build.gradle</text>
  <text x="530" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  의존성만 선언 (코드 없음)</text>

  <rect x="514" y="200" width="282" height="40" rx="6" fill="#12100f" stroke="#ce9178" stroke-width="1"/>
  <text x="655" y="215" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">→ autoconfigure 모듈</text>
  <text x="655" y="232" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">→ my-service-core 라이브러리</text>

  <!-- User App -->
  <rect x="490" y="300" width="330" height="116" rx="10" fill="#1a1f2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="655" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">사용자 Spring Boot App</text>
  <rect x="514" y="340" width="282" height="40" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="655" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">implementation</text>
  <text x="655" y="373" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">  'com.example:my-service-spring-boot-starter'</text>

  <!-- Arrow from starter to app -->
  <line x1="655" y1="260" x2="655" y2="296" stroke="#ce9178" stroke-width="2"/>
  <polygon points="655,304 648,292 662,292" fill="#ce9178"/>

  <!-- Bottom note -->
  <rect x="60" y="432" width="760" height="48" rx="8" fill="#1a1f2e" stroke="#888" stroke-width="1"/>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">스타터를 의존성 하나만 추가하면 Auto-configuration이 자동 발동 — 설정 없이 동작</text>
  <text x="440" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">spring-boot-starter-web, spring-boot-starter-data-jpa 등이 모두 이 패턴을 따릅니다</text>
</svg>
