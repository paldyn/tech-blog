<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MCP Server Python 구현</text>

  <!-- 코드 블록 왼쪽 -->
  <rect x="30" y="64" width="400" height="356" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="50" y="86" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"
        ># MCP Server 기본 구조</text>
  <text x="50" y="106" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> mcp.server </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Server</tspan>
  </text>
  <text x="50" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> mcp.server.stdio </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> stdio_server</tspan>
  </text>
  <text x="50" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> mcp </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> types</tspan>
  </text>
  <text x="50" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">app = Server(</tspan><tspan fill="#ce9178">"my-tools-server"</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="50" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7777cc">@app.list_tools()</tspan>
  </text>
  <text x="50" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">async def</tspan><tspan fill="#ffffff"> list_tools():</tspan>
  </text>
  <text x="50" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> [types.Tool(</tspan>
  </text>
  <text x="50" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        </tspan><tspan fill="#ce9178">name</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"query_db"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="50" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        </tspan><tspan fill="#ce9178">description</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"DB 쿼리 실행"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="50" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        </tspan><tspan fill="#ce9178">inputSchema</tspan><tspan fill="#ffffff">={</tspan>
    <tspan fill="#ce9178">"type"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"object"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="50" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">          </tspan><tspan fill="#ce9178">"properties"</tspan><tspan fill="#ffffff">:{</tspan>
    <tspan fill="#ce9178">"sql"</tspan><tspan fill="#ffffff">:{</tspan>
    <tspan fill="#ce9178">"type"</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#ce9178">"string"</tspan><tspan fill="#ffffff">}},</tspan>
  </text>
  <text x="50" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">          </tspan><tspan fill="#ce9178">"required"</tspan><tspan fill="#ffffff">:[</tspan><tspan fill="#ce9178">"sql"</tspan><tspan fill="#ffffff">]}</tspan>
  </text>
  <text x="50" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    )]</tspan>
  </text>
  <text x="50" y="378" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7777cc">@app.call_tool()</tspan>
  </text>
  <text x="50" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">async def</tspan><tspan fill="#ffffff"> call_tool(name, args):</tspan>
  </text>
  <text x="50" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">    if</tspan><tspan fill="#ffffff"> name == </tspan><tspan fill="#ce9178">"query_db"</tspan><tspan fill="#ffffff">:</tspan>
  </text>

  <!-- 코드 블록 오른쪽 -->
  <rect x="450" y="64" width="400" height="356" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="86" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"
        ># 실행 및 Claude Desktop 설정</text>
  <text x="470" y="106" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">        # DB 쿼리 실행 (실제)</tspan>
  </text>
  <text x="470" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        rows = db.execute(args[</tspan><tspan fill="#ce9178">"sql"</tspan><tspan fill="#ffffff">])</tspan>
  </text>
  <text x="470" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">        return</tspan><tspan fill="#ffffff"> [types.TextContent(</tspan>
  </text>
  <text x="470" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">            </tspan><tspan fill="#ce9178">type</tspan><tspan fill="#ffffff">=</tspan><tspan fill="#ce9178">"text"</tspan><tspan fill="#ffffff">,</tspan>
    <tspan fill="#ce9178">text</tspan><tspan fill="#ffffff">=str(rows)</tspan>
  </text>
  <text x="470" y="186" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">        )]</tspan>
  </text>
  <text x="470" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8"># 서버 실행 (stdio 전송)</tspan>
  </text>
  <text x="470" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">async def</tspan><tspan fill="#ffffff"> main():</tspan>
  </text>
  <text x="470" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">    async with</tspan><tspan fill="#ffffff"> stdio_server() </tspan>
    <tspan fill="#7ec8e3" font-weight="600">as</tspan><tspan fill="#ffffff"> (r, w):</tspan>
  </text>
  <text x="470" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">        await</tspan><tspan fill="#ffffff"> app.run(r, w, ...)</tspan>
  </text>
  <text x="470" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"
        ># Claude Desktop 설정 (JSON)</text>
  <text x="470" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">{</tspan><tspan fill="#ce9178">"mcpServers"</tspan><tspan fill="#ffffff">: {</tspan>
    <tspan fill="#ce9178">"mydb"</tspan><tspan fill="#ffffff">: {</tspan>
  </text>
  <text x="470" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">"command"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"python"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="470" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">"args"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"/path/server.py"</tspan><tspan fill="#ffffff">],</tspan>
  </text>
  <text x="470" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan><tspan fill="#ce9178">"env"</tspan><tspan fill="#ffffff">: {</tspan><tspan fill="#ce9178">"DB_URL"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"..."</tspan><tspan fill="#ffffff">}</tspan>
  </text>
  <text x="470" y="394" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">}}}</tspan>
  </text>
  <text x="470" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"
        ># 저장 위치: ~/.config/claude/claude_desktop_config.json</text>
</svg>
