<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">handle()로 예외와 값 통합 처리</text>

  <rect x="60" y="58" width="760" height="322" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="86" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> result = CompletableFuture</tspan>
  </text>
  <text x="80" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    .supplyAsync(() -&gt; callExternalApi())</tspan>
  </text>

  <text x="80" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">    // 정상·예외 모두 이 handle 블록 통과</tspan>
  </text>
  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    .handle((value, ex) -&gt; {</tspan>
  </text>
  <text x="80" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        if</tspan><tspan fill="#ffffff"> (ex != </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">) {</tspan>
  </text>
  <text x="80" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">            log.warn(</tspan><tspan fill="#ce9178">"API 실패"</tspan><tspan fill="#ffffff">, ex);</tspan>
  </text>
  <text x="80" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">            return</tspan><tspan fill="#ffffff"> fallbackValue();</tspan>
  </text>
  <text x="80" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        }</tspan>
  </text>
  <text x="80" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        return</tspan><tspan fill="#ffffff"> value;</tspan>
  </text>
  <text x="80" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    })</tspan>
  </text>

  <text x="80" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">    // 로깅용 부수 효과 — 예외/성공 상관없이</tspan>
  </text>
  <text x="80" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    .whenComplete((v, e) -&gt;</tspan>
  </text>
  <text x="80" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        metrics.record(v, e))</tspan>
  </text>
  <text x="80" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    .join();</tspan>
  </text>
</svg>
