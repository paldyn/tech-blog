<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Jackson ObjectMapper 직렬화 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Java 객체 → JSON (직렬화) · JSON → Java 객체 (역직렬화) 처리 파이프라인</text>

  <!-- Serialization flow (top) -->
  <!-- Java Object -->
  <rect x="60" y="100" width="150" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="135" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Java 객체</text>
  <text x="135" y="145" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">UserResponse POJO</text>

  <!-- Arrow -->
  <line x1="210" y1="130" x2="266" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Serializer -->
  <rect x="266" y="100" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="346" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">ObjectMapper</text>
  <text x="346" y="139" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">BeanSerializer</text>
  <text x="346" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">어노테이션 처리</text>

  <!-- Arrow -->
  <line x1="426" y1="130" x2="482" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- JsonGenerator -->
  <rect x="482" y="100" width="160" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="562" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">JsonGenerator</text>
  <text x="562" y="139" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">토큰 스트림 생성</text>
  <text x="562" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">writeStartObject()</text>

  <!-- Arrow -->
  <line x1="642" y1="130" x2="698" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- JSON String -->
  <rect x="698" y="100" width="120" height="60" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="758" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">JSON</text>
  <text x="758" y="145" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">{"id":1,...}</text>

  <!-- Section label -->
  <text x="60" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">직렬화 (Serialization)</text>

  <!-- Divider -->
  <line x1="60" y1="200" x2="820" y2="200" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Deserialization flow -->
  <!-- JSON String -->
  <rect x="698" y="220" width="120" height="60" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="758" y="245" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">JSON</text>
  <text x="758" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">{"id":1,...}</text>

  <!-- Arrow reversed -->
  <line x1="698" y1="250" x2="642" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="482" y="220" width="160" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="562" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">JsonParser</text>
  <text x="562" y="259" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">토큰 파싱</text>
  <text x="562" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">readTree()</text>

  <line x1="482" y1="250" x2="426" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="266" y="220" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="346" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">ObjectMapper</text>
  <text x="346" y="259" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">BeanDeserializer</text>
  <text x="346" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@JsonProperty 매핑</text>

  <line x1="266" y1="250" x2="210" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="220" width="150" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="135" y="245" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Java 객체</text>
  <text x="135" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">UserRequest POJO</text>

  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">역직렬화 (Deserialization)</text>

  <!-- Divider -->
  <line x1="60" y1="310" x2="820" y2="310" stroke="#222" stroke-width="1"/>

  <!-- Key annotations -->
  <text x="440" y="336" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">자주 쓰는 Jackson 어노테이션</text>

  <!-- Annotation boxes: 4 in a row -->
  <rect x="60" y="350" width="170" height="90" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="145" y="372" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">@JsonProperty</text>
  <text x="145" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">필드 이름 매핑</text>
  <text x="145" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">"user_name" ↔ userName</text>
  <text x="145" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">전략: SNAKE_CASE 등</text>

  <rect x="245" y="350" width="170" height="90" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="330" y="372" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">@JsonIgnore</text>
  <text x="330" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">직렬화 제외</text>
  <text x="330" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">password 등 민감 필드</text>
  <text x="330" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">@JsonIgnoreProperties</text>

  <rect x="430" y="350" width="185" height="90" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="522" y="372" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">@JsonFormat</text>
  <text x="522" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">날짜·숫자 포맷</text>
  <text x="522" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">pattern, timezone</text>
  <text x="522" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">LocalDate 직렬화</text>

  <rect x="630" y="350" width="190" height="90" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="725" y="372" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">@JsonSubTypes</text>
  <text x="725" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다형성 지원</text>
  <text x="725" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">@JsonTypeInfo와 함께</text>
  <text x="725" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">상속 계층 직렬화</text>
</svg>
