<svg width="880" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">정적 멤버 vs 인스턴스 멤버</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">클래스에 속하는 것과 인스턴스에 속하는 것</text>

  <!-- Class box (center top) -->
  <rect x="290" y="100" width="300" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">class Counter</text>

  <!-- Arrow down-left to static -->
  <line x1="380" y1="160" x2="280" y2="210" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="280,210 290,196 296,208" fill="#7ec8e3"/>

  <!-- Arrow down-right to instance -->
  <line x1="500" y1="160" x2="600" y2="210" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="600,210 590,196 604,198" fill="#55c555"/>

  <!-- Static members box (left) -->
  <rect x="60" y="210" width="300" height="160" rx="8" fill="#070b14" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">정적(static) 멤버</text>
  <line x1="60" y1="246" x2="360" y2="246" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">static count = 0</text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">static reset()</text>
  <text x="76" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· Counter.count 로 접근</text>
  <text x="76" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 모든 인스턴스가 공유</text>
  <text x="76" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 인스턴스 없이 접근 가능</text>

  <!-- Instance members box (right) -->
  <rect x="520" y="210" width="300" height="160" rx="8" fill="#070b14" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">인스턴스 멤버</text>
  <line x1="520" y1="246" x2="820" y2="246" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>
  <text x="536" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">this.id</text>
  <text x="536" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">increment()</text>
  <text x="536" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· new Counter() 로 접근</text>
  <text x="536" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 인스턴스마다 별도 보유</text>
  <text x="536" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· new 없이 접근 불가</text>

  <!-- Footer -->
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
