<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">입력·출력 Dataset 매핑 구조</text>

  <!-- Client Side -->
  <rect x="60" y="72" width="300" height="340" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="210" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">클라이언트 Dataset</text>

  <!-- dsSearch -->
  <rect x="80" y="114" width="260" height="80" fill="#0d1520" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">dsSearch (조건 DS)</text>
  <text x="96" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">DEPT_CD | SRCH_NM | PAGE_NO</text>
  <text x="96" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">A01     | 홍길동  | 1</text>

  <!-- dsMain -->
  <rect x="80" y="216" width="260" height="80" fill="#0d1520" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="210" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">dsMain (결과 DS)</text>
  <text x="96" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">↓ 서버 응답 후 채워짐</text>
  <text x="96" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">EMP_NO | EMP_NM | DEPT_NM</text>

  <!-- dsPager -->
  <rect x="80" y="316" width="260" height="64" fill="#0d1520" rx="5" stroke="#7777cc" stroke-width="1.5"/>
  <text x="210" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">dsPager (페이징 DS)</text>
  <text x="96" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">↓ 전체 건수 수신</text>

  <!-- inDataset arrow -->
  <polygon points="378,156 408,146 408,166" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="360" y1="156" x2="408" y2="156" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="383" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">inDS</text>

  <!-- outDataset arrows (left, back from server) -->
  <polygon points="362,256 332,246 332,266" fill="#55c555" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="332" y1="256" x2="408" y2="256" stroke="#55c555" stroke-width="2.5"/>
  <text x="385" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">outDS</text>

  <polygon points="362,348 332,338 332,358" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="332" y1="348" x2="408" y2="348" stroke="#7777cc" stroke-width="2.5"/>
  <text x="385" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">outDS</text>

  <!-- Server Side -->
  <rect x="420" y="72" width="400" height="340" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="620" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">서버 (Spring Adapter)</text>

  <!-- inDatasets mapping box -->
  <rect x="440" y="112" width="360" height="64" fill="#0d1520" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="620" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">inDatasets 매핑</text>
  <text x="620" y="154" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"dsCond=dsSearch"</text>
  <text x="790" y="148" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">서버 변수명=클라이언트DS</text>

  <!-- server method box -->
  <rect x="440" y="196" width="360" height="90" fill="#0d1520" rx="5" stroke="#e05555" stroke-width="1.5"/>
  <text x="620" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">서버 Java 메서드</text>
  <text x="456" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">NexacroDataSet dsCond =</text>
  <text x="456" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff" xml:space="preserve">  req.getDataset("dsCond");</text>
  <text x="456" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">// dsSearch → dsCond 이름으로 수신</text>

  <!-- outDatasets mapping box -->
  <rect x="440" y="306" width="360" height="88" fill="#0d1520" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">outDatasets 매핑</text>
  <text x="456" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">"dsResult=dsMain</text>
  <text x="620" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve"> </text>
  <text x="456" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve"> dsPager=dsPager"</text>
  <text x="456" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">공백으로 복수 연결. 서버DS=클라이언트DS</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이름 매핑은 "서버변수명=클라이언트DS" — 서버·클라이언트 이름이 달라도 연결 가능</text>
</svg>
