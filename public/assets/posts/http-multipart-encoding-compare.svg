<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">POST 본문 인코딩 세 가지 비교</text>
  <text x="60" y="80" font-size="13" fill="#888">form의 enctype 속성으로 결정 — 파일이 있으면 multipart 한 가지뿐</text>

  <!-- Box 1: urlencoded -->
  <rect x="60" y="104" width="240" height="300" rx="8" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="134" font-size="16" font-weight="600" fill="#e8e8e8">x-www-form-</text>
  <text x="80" y="156" font-size="16" font-weight="600" fill="#e8e8e8">urlencoded</text>
  <text x="80" y="180" font-size="13" fill="#888">기본값 (default)</text>

  <rect x="76" y="196" width="208" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">name=kim&amp;</text>
  <text x="88" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">age=29</text>

  <text x="80" y="290" font-size="13" fill="#e05555">바이너리: 불가</text>
  <text x="80" y="316" font-size="13" fill="#e05555">오버헤드: % 인코딩</text>
  <text x="80" y="342" font-size="13" fill="#55c555">용도: 짧은 텍스트</text>
  <text x="80" y="368" font-size="13" fill="#888">키=값 쌍, &amp; 구분</text>

  <!-- Box 2: multipart -->
  <rect x="320" y="104" width="240" height="300" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="340" y="134" font-size="16" font-weight="600" fill="#e8e8e8">multipart/</text>
  <text x="340" y="156" font-size="16" font-weight="600" fill="#e8e8e8">form-data</text>
  <text x="340" y="180" font-size="13" fill="#888">파일 업로드용</text>

  <rect x="336" y="196" width="208" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="348" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">--X</text>
  <text x="348" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">name="f"; ...</text>

  <text x="340" y="290" font-size="13" fill="#55c555">바이너리: 가능</text>
  <text x="340" y="316" font-size="13" fill="#e05555">오버헤드: part별 헤더</text>
  <text x="340" y="342" font-size="13" fill="#55c555">용도: 파일+필드 혼합</text>
  <text x="340" y="368" font-size="13" fill="#888">boundary로 분리</text>

  <!-- Box 3: text/plain -->
  <rect x="580" y="104" width="240" height="300" rx="8" fill="#000000" stroke="#7ec8e3" stroke-width="1"/>
  <text x="600" y="134" font-size="16" font-weight="600" fill="#e8e8e8">text/plain</text>
  <text x="600" y="180" font-size="13" fill="#888">디버깅·사람용</text>

  <rect x="596" y="196" width="208" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="608" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">name=kim</text>
  <text x="608" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">age=29</text>

  <text x="600" y="290" font-size="13" fill="#e05555">바이너리: 불가</text>
  <text x="600" y="316" font-size="13" fill="#55c555">오버헤드: 거의 없음</text>
  <text x="600" y="342" font-size="13" fill="#e05555">용도: 운영 권장 안 함</text>
  <text x="600" y="368" font-size="13" fill="#888">이스케이프 없음</text>
</svg>
