<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CSRF · CORS · CSP 보안 메커니즘 비교</text>

  <!-- ===== CSRF 패널 (왼쪽, x=50~280) ===== -->
  <rect x="50" y="68" width="240" height="420" rx="8" fill="#1f0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">CSRF</text>
  <text x="170" y="111" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Cross-Site Request Forgery</text>
  <line x1="50" y1="122" x2="290" y2="122" stroke="#e05555" stroke-width="1" opacity="0.4"/>

  <text x="66" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">공격 유형</text>
  <text x="66" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">악성 사이트가 사용자의</text>
  <text x="66" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">인증 쿠키로 요청 위조</text>

  <text x="66" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">방어 방법</text>
  <text x="66" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">서버 발급 토큰을 폼에 포함</text>
  <text x="66" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">→ 악성 사이트는 토큰 모름</text>

  <text x="66" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Spring Security 기본</text>
  <text x="66" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600">활성화 (enabled)</text>

  <text x="66" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">비활성화 대상</text>
  <text x="66" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">REST API (stateless)</text>
  <text x="66" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">→ .csrf(AbstractHttpConfigurer</text>
  <text x="66" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">    ::disable)</text>

  <text x="66" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">쿠키 방어 보완</text>
  <text x="66" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">SameSite=Strict</text>
  <text x="66" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">쿠키 수준 보완책</text>

  <!-- ===== CORS 패널 (중앙, x=320~560) ===== -->
  <rect x="320" y="68" width="240" height="420" rx="8" fill="#0a0d1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">CORS</text>
  <text x="440" y="111" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Cross-Origin Resource Sharing</text>
  <line x1="320" y1="122" x2="560" y2="122" stroke="#7ec8e3" stroke-width="1" opacity="0.4"/>

  <text x="336" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">개념</text>
  <text x="336" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">브라우저의 동일 출처 정책</text>
  <text x="336" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">(SOP) 완화 메커니즘</text>

  <text x="336" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">동작 방식</text>
  <text x="336" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">브라우저 → Preflight OPTIONS</text>
  <text x="336" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">서버 → 허용 헤더 응답</text>

  <text x="336" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Spring Security 설정</text>
  <text x="336" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">.cors(Customizer</text>
  <text x="336" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  .withDefaults())</text>

  <text x="336" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">주요 헤더</text>
  <text x="336" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">Access-Control-Allow-Origin</text>
  <text x="336" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">Access-Control-Allow-Methods</text>
  <text x="336" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">Access-Control-Allow-Headers</text>

  <text x="336" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">보안 주의</text>
  <text x="336" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">allowedOrigins("*")</text>
  <text x="336" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">와일드카드 운영 환경 금지</text>

  <!-- ===== CSP 패널 (오른쪽, x=590~830) ===== -->
  <rect x="590" y="68" width="240" height="420" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">CSP</text>
  <text x="710" y="111" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Content-Security-Policy</text>
  <line x1="590" y1="122" x2="830" y2="122" stroke="#55c555" stroke-width="1" opacity="0.4"/>

  <text x="606" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">목적</text>
  <text x="606" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">XSS 등 인젝션 공격을</text>
  <text x="606" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">브라우저 레벨에서 차단</text>

  <text x="606" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">동작 원리</text>
  <text x="606" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">응답 헤더로 허용 소스 지정</text>
  <text x="606" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">위반 시 브라우저가 차단</text>

  <text x="606" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Spring Security 기본</text>
  <text x="606" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">.headers(h -&gt; h</text>
  <text x="606" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  .contentSecurityPolicy</text>
  <text x="606" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  (csp -&gt; csp.policyDirectives</text>
  <text x="606" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">  ("default-src 'self'")))</text>

  <text x="606" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">주요 지시어</text>
  <text x="606" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">default-src 'self'</text>
  <text x="606" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">script-src 'self' cdn.io</text>
  <text x="606" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">img-src * data:</text>

  <text x="606" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">방어 계층: CSRF·CORS와 독립</text>
</svg>
