<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="encArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">강한 캡슐화(JEP 396)의 영향</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">11에서 경고였던 내부 API 접근이 17에서는 기본 차단된다</text>

  <!-- Java 11 -->
  <rect x="70" y="104" width="320" height="150" rx="10" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="230" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e0b055">Java 11</text>
  <line x1="94" y1="152" x2="366" y2="152" stroke="#403515" stroke-width="1"/>
  <text x="230" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">내부 API 리플렉션 접근</text>
  <text x="230" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0b055">경고만 출력</text>
  <text x="230" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">동작은 계속됨</text>

  <line x1="396" y1="179" x2="484" y2="179" stroke="#e05555" stroke-width="2" marker-end="url(#encArr)"/>
  <text x="440" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본값 변경</text>

  <!-- Java 17 -->
  <rect x="490" y="104" width="320" height="150" rx="10" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">Java 17</text>
  <line x1="514" y1="152" x2="786" y2="152" stroke="#402020" stroke-width="1"/>
  <text x="650" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">동일한 접근 시도</text>
  <text x="650" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">예외 발생 · 차단</text>
  <text x="650" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">InaccessibleObjectException</text>

  <text x="440" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">해법: 내부 API에 의존하는 라이브러리를 17 호환 버전으로 업데이트</text>
  <text x="440" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">불가피할 때만 --add-opens 로 특정 패키지 임시 개방</text>
</svg>
