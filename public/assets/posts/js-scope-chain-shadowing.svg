<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">변수 섀도잉과 스코프 오염</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Variable Shadowing &amp; Scope Pollution</text>

  <!-- Shadowing example -->
  <rect x="60" y="90" width="360" height="260" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="112" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">변수 섀도잉 (의도적)</text>

  <rect x="76" y="122" width="328" height="208" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="142" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> name = <tspan fill="#ce9178">'global'</tspan>;</text>
  <text x="92" y="164" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> greet() {</text>
  <text x="92" y="182" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // 같은 이름, 다른 스코프</text>
  <text x="92" y="200" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> name = <tspan fill="#ce9178">'local'</tspan>;</text>
  <text x="92" y="218" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // 섀도잉: local이 global을 가림</text>
  <text x="92" y="236" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  console.log(name); <tspan fill="#6a8aa0">// 'local'</tspan></text>
  <text x="92" y="254" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="92" y="276" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">greet();</text>
  <text x="92" y="294" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 함수 밖: 전역 name 영향 없음</text>
  <text x="92" y="312" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">console.log(name); <tspan fill="#6a8aa0">// 'global'</tspan></text>

  <!-- Scope pollution (var) -->
  <rect x="460" y="90" width="360" height="260" fill="#1a0d0d" rx="10" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="640" y="112" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">var 스코프 오염 주의</text>

  <rect x="476" y="122" width="328" height="208" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="142" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> leak() {</text>
  <text x="492" y="160" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">var</tspan> i = <tspan fill="#b5cea8">0</tspan>; i &lt; <tspan fill="#b5cea8">3</tspan>; i++) {</text>
  <text x="492" y="178" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    // var는 블록 무시</text>
  <text x="492" y="196" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="492" y="214" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // 루프 종료 후에도 접근 가능!</text>
  <text x="492" y="232" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  console.log(i); <tspan fill="#6a8aa0">// 3 !</tspan></text>
  <text x="492" y="250" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="492" y="278" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> noLeak() {</text>
  <text x="492" y="296" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">let</tspan> i = <tspan fill="#b5cea8">0</tspan>; i &lt; <tspan fill="#b5cea8">3</tspan>; i++) {}</text>
  <text x="492" y="314" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#6a8aa0">// console.log(i) → ReferenceError</tspan></text>

  <!-- ReferenceError diagram -->
  <rect x="60" y="368" width="760" height="60" fill="#0d0d0d" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="390" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">스코프 체인 탐색 실패 → ReferenceError</text>
  <text x="440" y="414" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">console.log(undeclared); // ReferenceError: undeclared is not defined</text>

  <!-- Footer -->
  <text x="440" y="442" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
