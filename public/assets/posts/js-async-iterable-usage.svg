<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">for await...of 활용 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Node.js 스트림 · 이벤트 큐 · 시간 지연 순회</text>

  <!-- 코드 예시 -->
  <rect x="60" y="96" width="760" height="270" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 1) 비동기 제너레이터 소비</text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">for await</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> items </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#e8e8e8"> fetchPages(</tspan><tspan fill="#ce9178">'/api/items'</tspan><tspan fill="#e8e8e8">)) {</tspan></text>

  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  processBatch(items);</text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 2) Node.js Readable 스트림 (라인 단위)</text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> { createReadStream } </tspan><tspan fill="#7ec8e3">from</tspan><tspan fill="#ce9178"> 'fs'</tspan><tspan fill="#e8e8e8">;</tspan></text>

  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="116" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> { createInterface } </text>
  <text x="272" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from</text>
  <text x="304" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178"> 'readline'</text>
  <text x="384" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> rl = createInterface({ input: createReadStream(</tspan><tspan fill="#ce9178">'large.csv'</tspan><tspan fill="#e8e8e8">) });</tspan></text>

  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">for await</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> line </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#e8e8e8"> rl) {  console.log(line); }</tspan></text>

  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// readline.Interface가 Symbol.asyncIterator 구현</text>

  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 3) 동기 이터러블도 for await...of로 사용 가능</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">for await</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> n </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#e8e8e8"> [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">]) {}</tspan></text>

  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Symbol.asyncIterator 없으면 Symbol.iterator fallback</text>

</svg>
