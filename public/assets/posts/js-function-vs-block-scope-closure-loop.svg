<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">클로저 + 루프: var vs let</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Loop Closure Classic Bug Fix with Block Scope</text>

  <!-- var loop bug -->
  <rect x="60" y="90" width="360" height="240" fill="#1a0d0d" rx="10" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="240" y="114" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">var 루프 클로저 버그</text>

  <rect x="76" y="124" width="328" height="186" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> fns = [];</text>
  <text x="92" y="162" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">var</tspan> i = <tspan fill="#b5cea8">0</tspan>; i &lt; <tspan fill="#b5cea8">3</tspan>; i++) {</text>
  <text x="92" y="180" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // 모두 같은 i 공유!</text>
  <text x="92" y="198" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  fns.push(() =&gt; i);</text>
  <text x="92" y="216" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="92" y="238" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">fns[<tspan fill="#b5cea8">0</tspan>](); <tspan fill="#e05555">// 3 (기대: 0)</tspan></text>
  <text x="92" y="256" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">fns[<tspan fill="#b5cea8">1</tspan>](); <tspan fill="#e05555">// 3 (기대: 1)</tspan></text>
  <text x="92" y="274" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">fns[<tspan fill="#b5cea8">2</tspan>](); <tspan fill="#e05555">// 3 (기대: 2)</tspan></text>
  <text x="92" y="292" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">i가 함수 스코프라 루프 후 3</text>

  <!-- let loop fix -->
  <rect x="460" y="90" width="360" height="240" fill="#0d1a0d" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="640" y="114" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">let으로 해결</text>

  <rect x="476" y="124" width="328" height="186" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> fns = [];</text>
  <text x="492" y="162" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">let</tspan> i = <tspan fill="#b5cea8">0</tspan>; i &lt; <tspan fill="#b5cea8">3</tspan>; i++) {</text>
  <text x="492" y="180" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // 반복마다 새 i 바인딩</text>
  <text x="492" y="198" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  fns.push(() =&gt; i);</text>
  <text x="492" y="216" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="492" y="238" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">fns[<tspan fill="#b5cea8">0</tspan>](); <tspan fill="#6a8aa0">// 0 ✓</tspan></text>
  <text x="492" y="256" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">fns[<tspan fill="#b5cea8">1</tspan>](); <tspan fill="#6a8aa0">// 1 ✓</tspan></text>
  <text x="492" y="274" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">fns[<tspan fill="#b5cea8">2</tspan>](); <tspan fill="#6a8aa0">// 2 ✓</tspan></text>
  <text x="492" y="292" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">각 클로저가 독립된 i 캡처</text>

  <!-- Decision guide -->
  <rect x="60" y="348" width="760" height="72" fill="#0d0d0d" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="370" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">var/let/const 선택 가이드</text>
  <text x="100" y="396" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">const</text>
  <text x="100" y="412" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">재할당 불필요 시 기본값</text>
  <text x="310" y="396" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">let</text>
  <text x="310" y="412" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">재할당이 필요한 경우</text>
  <text x="520" y="396" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">var</text>
  <text x="520" y="412" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">레거시 코드 유지보수 외 비권장</text>

  <!-- Footer -->
  <text x="440" y="442" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
