<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ArrayList vs LinkedList — 성능 비교</text>

  <!-- Header -->
  <rect x="40" y="64" width="800" height="32" fill="#1e1b4b" rx="6"/>
  <text x="220" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#a5b4fc" text-anchor="middle">연산</text>
  <text x="460" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">ArrayList</text>
  <text x="720" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">LinkedList</text>

  <!-- Dividers -->
  <line x1="340" y1="64" x2="340" y2="332" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="580" y1="64" x2="580" y2="332" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1: get(i) -->
  <rect x="40" y="100" width="800" height="36" fill="#0d1a2a" rx="4"/>
  <text x="220" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">get(index)</text>
  <text x="460" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">O(1)</text>
  <text x="460" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">랜덤 접근</text>
  <text x="720" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">O(n)</text>
  <text x="720" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">노드 순회 필요</text>

  <!-- Row 2: add(end) -->
  <rect x="40" y="140" width="800" height="36" fill="#0a0a0a" rx="4"/>
  <text x="220" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">add(끝에 추가)</text>
  <text x="460" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">O(1) amortized</text>
  <text x="460" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">확장 시 O(n)</text>
  <text x="720" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">O(1)</text>
  <text x="720" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">tail 노드에 추가</text>

  <!-- Row 3: add(middle) -->
  <rect x="40" y="180" width="800" height="36" fill="#0d1a2a" rx="4"/>
  <text x="220" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">add(중간 삽입)</text>
  <text x="460" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">O(n)</text>
  <text x="460" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이후 요소 이동</text>
  <text x="720" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">O(1)*</text>
  <text x="720" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">*위치 찾기 O(n)</text>

  <!-- Row 4: remove -->
  <rect x="40" y="220" width="800" height="36" fill="#0a0a0a" rx="4"/>
  <text x="220" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">remove(index)</text>
  <text x="460" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">O(n)</text>
  <text x="460" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이후 요소 이동</text>
  <text x="720" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">O(n)</text>
  <text x="720" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">순회 후 링크 변경</text>

  <!-- Row 5: contains -->
  <rect x="40" y="260" width="800" height="36" fill="#0d1a2a" rx="4"/>
  <text x="220" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">contains(o)</text>
  <text x="460" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">O(n)</text>
  <text x="460" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">선형 탐색</text>
  <text x="720" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">O(n)</text>
  <text x="720" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">선형 탐색</text>

  <!-- Memory row -->
  <rect x="40" y="300" width="800" height="36" fill="#0a0a0a" rx="4"/>
  <text x="220" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">메모리 효율</text>
  <text x="460" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">높음</text>
  <text x="460" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">연속 메모리, 캐시 친화적</text>
  <text x="720" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">낮음</text>
  <text x="720" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">노드마다 next/prev 포인터</text>

  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">대부분의 경우 ArrayList가 더 빠름 — CPU 캐시 지역성 (cache locality) 덕분</text>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">LinkedList 사용 권장: 큐/덱(Deque) 용도, 빈번한 양끝 삽입/삭제</text>
</svg>
