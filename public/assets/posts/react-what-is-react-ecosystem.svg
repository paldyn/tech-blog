<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="earr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">React 에코시스템 한눈에 보기</text>

  <!-- React core center -->
  <rect x="320" y="80" width="240" height="60" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">React Core</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">컴포넌트 · 상태 · 렌더링</text>

  <!-- Routing -->
  <rect x="60" y="196" width="200" height="56" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">라우팅</text>
  <text x="160" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">React Router / TanStack Router</text>

  <!-- State -->
  <rect x="290" y="196" width="200" height="56" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">상태관리</text>
  <text x="390" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Redux / Zustand / Jotai</text>

  <!-- Data Fetching -->
  <rect x="520" y="196" width="200" height="56" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="620" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">서버 상태</text>
  <text x="620" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TanStack Query / SWR</text>

  <!-- arrows from React Core -->
  <line x1="380" y1="140" x2="220" y2="196" stroke="#7777cc" stroke-width="1.5" marker-end="url(#earr)"/>
  <line x1="440" y1="140" x2="390" y2="196" stroke="#55c555" stroke-width="1.5"
        marker-end="url(#earr)">
    <marker id="earr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </line>
  <line x1="500" y1="140" x2="580" y2="196" stroke="#ce9178" stroke-width="1.5">
    <marker id="earr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </line>

  <!-- Frameworks -->
  <rect x="60" y="310" width="200" height="56" rx="8" fill="#111827" stroke="#e8e8e8" stroke-width="1"/>
  <text x="160" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">메타 프레임워크</text>
  <text x="160" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Next.js / Remix</text>

  <!-- Styling -->
  <rect x="290" y="310" width="200" height="56" rx="8" fill="#111827" stroke="#e8e8e8" stroke-width="1"/>
  <text x="390" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">스타일링</text>
  <text x="390" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tailwind / CSS Modules</text>

  <!-- Testing -->
  <rect x="520" y="310" width="200" height="56" rx="8" fill="#111827" stroke="#e8e8e8" stroke-width="1"/>
  <text x="620" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">테스팅</text>
  <text x="620" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">RTL / Vitest / Playwright</text>

  <!-- This series note -->
  <rect x="60" y="402" width="760" height="52" rx="8" fill="#141414" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">이 시리즈에서 다루는 범위</text>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">React Core 완전 정복 — JSX부터 Concurrent, 테스팅까지 100편</text>
</svg>
