<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">React 생태계 한눈에 보기</text>

  <!-- Core React center -->
  <rect x="330" y="68" width="220" height="72" rx="10" fill="#1e3a5f" stroke="#3a7cc4" stroke-width="2"/>
  <text x="440" y="98" text-anchor="middle" font-size="18" font-weight="700" fill="#7ec8e3">React Core</text>
  <text x="440" y="122" text-anchor="middle" font-size="12" fill="#888">컴포넌트 · 상태 · 훅</text>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arrgr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Routing -->
  <rect x="60" y="68" width="200" height="60" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="160" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">라우팅</text>
  <text x="160" y="116" text-anchor="middle" font-size="12" fill="#888">React Router · TanStack Router</text>
  <line x1="260" y1="98" x2="330" y2="104" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- State Management -->
  <rect x="60" y="172" width="200" height="60" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="160" y="198" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">상태 관리</text>
  <text x="160" y="218" text-anchor="middle" font-size="12" fill="#888">Redux · Zustand · Jotai</text>
  <line x1="260" y1="202" x2="330" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Server Data -->
  <rect x="60" y="276" width="200" height="60" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="160" y="302" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">서버 상태</text>
  <text x="160" y="322" text-anchor="middle" font-size="12" fill="#888">TanStack Query · SWR</text>
  <line x1="260" y1="306" x2="330" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Meta-frameworks -->
  <rect x="620" y="68" width="200" height="60" rx="8" fill="#1e3a5f" stroke="#3a7cc4" stroke-width="1"/>
  <text x="720" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">메타 프레임워크</text>
  <text x="720" y="116" text-anchor="middle" font-size="12" fill="#888">Next.js · Remix · Gatsby</text>
  <line x1="550" y1="104" x2="620" y2="98" stroke="#3a7cc4" stroke-width="1.5" marker-end="url(#arrgr)"/>

  <!-- Styling -->
  <rect x="620" y="172" width="200" height="60" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="720" y="198" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">스타일링</text>
  <text x="720" y="218" text-anchor="middle" font-size="12" fill="#888">Tailwind · CSS Modules · styled</text>
  <line x1="550" y1="150" x2="620" y2="202" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Testing -->
  <rect x="620" y="276" width="200" height="60" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="720" y="302" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">테스팅</text>
  <text x="720" y="322" text-anchor="middle" font-size="12" fill="#888">Vitest · RTL · Playwright</text>
  <line x1="550" y1="200" x2="620" y2="306" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Why React box -->
  <rect x="60" y="370" width="760" height="56" rx="8" fill="#0f1629" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="396" text-anchor="middle" font-size="13" fill="#7ec8e3" font-weight="600">왜 React인가?</text>
  <text x="440" y="416" text-anchor="middle" font-size="12" fill="#888">거대한 생태계 · 페이스북(Meta) 유지보수 · 산업 표준 · 컴포넌트 재사용성</text>
</svg>
