<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-down-gray" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 0 L 7 13 L 13 0 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">loading.tsx / error.tsx 계층 구조</text>

  <!-- Layer 1: Layout -->
  <rect x="80" y="68" width="720" height="52" rx="8" fill="#0d1f2d" stroke="#3a5a7e" stroke-width="2"/>
  <text x="440" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">layout.tsx</text>
  <text x="440" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">공통 레이아웃 — 항상 렌더링됨</text>

  <!-- Arrow down -->
  <line x1="440" y1="120" x2="440" y2="144" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-down-gray)"/>

  <!-- Layer 2: Template (optional) -->
  <rect x="130" y="144" width="620" height="46" rx="8" fill="#111827" stroke="#374151" stroke-width="1"
        stroke-dasharray="4,4"/>
  <text x="440" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">template.tsx (선택)</text>
  <text x="440" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">이동마다 재마운트</text>

  <!-- Arrow down -->
  <line x1="440" y1="190" x2="440" y2="214" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-down-gray)"/>

  <!-- Layer 3: Error Boundary -->
  <rect x="130" y="214" width="620" height="52" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="236" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">error.tsx</text>
  <text x="440" y="254" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">React Error Boundary — 에러 발생 시 표시, 'use client' 필수</text>

  <!-- Arrow down -->
  <line x1="440" y1="266" x2="440" y2="290" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-down-gray)"/>

  <!-- Layer 4: Suspense (loading) -->
  <rect x="180" y="290" width="520" height="52" rx="8" fill="#1a2a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">loading.tsx</text>
  <text x="440" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">React Suspense 래퍼 — 페이지 로딩 중 표시</text>

  <!-- Arrow down -->
  <line x1="440" y1="342" x2="440" y2="366" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-down-gray)"/>

  <!-- Layer 5: Page -->
  <rect x="230" y="366" width="420" height="52" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">page.tsx</text>
  <text x="440" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실제 페이지 콘텐츠 — async fetch 포함</text>

  <!-- Annotation: error scope -->
  <text x="760" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">에러 포착 범위:</text>
  <text x="760" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">loading + page</text>

  <!-- Note at bottom -->
  <rect x="50" y="440" width="780" height="44" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="70" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">⚠  error.tsx는 같은 레벨의 layout.tsx에서 발생한 에러는 포착하지 못합니다.</text>
  <text x="70" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">   레이아웃 에러를 포착하려면 상위 레이아웃에 error.tsx를 배치하세요.</text>
</svg>
