<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">try / except 기본 흐름</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- try block -->
  <rect x="310" y="70" width="260" height="60" rx="8" fill="#0c1628" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">try 블록</text>
  <text x="440" y="118" text-anchor="middle" font-size="12" fill="#888">실행할 코드</text>

  <!-- Diamond decision -->
  <polygon points="440,165 510,205 440,245 370,205" fill="#0e1929" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="200" text-anchor="middle" font-size="12" fill="#ce9178">예외</text>
  <text x="440" y="215" text-anchor="middle" font-size="12" fill="#ce9178">발생?</text>

  <!-- Arrow from try to diamond -->
  <line x1="440" y1="130" x2="440" y2="163" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- NO path → else (right side) -->
  <line x1="510" y1="205" x2="620" y2="205" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="555" y="198" text-anchor="middle" font-size="11" fill="#55c555">아니오</text>

  <!-- else block -->
  <rect x="620" y="182" width="200" height="46" rx="8" fill="#0c1c0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">else 블록</text>
  <text x="720" y="221" text-anchor="middle" font-size="11" fill="#888">예외 없을 때만 실행</text>

  <!-- YES path → except (left side) -->
  <line x1="370" y1="205" x2="260" y2="205" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="315" y="198" text-anchor="middle" font-size="11" fill="#e05555">예</text>

  <!-- except block -->
  <rect x="60" y="182" width="200" height="46" rx="8" fill="#1a0c0c" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">except 블록</text>
  <text x="160" y="221" text-anchor="middle" font-size="11" fill="#888">예외 처리 코드</text>

  <!-- Both paths merge to finally -->
  <!-- From else block down -->
  <line x1="720" y1="228" x2="720" y2="330" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="720" y1="330" x2="540" y2="330" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="540" y1="330" x2="540" y2="348" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- From except block down -->
  <line x1="160" y1="228" x2="160" y2="330" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="160" y1="330" x2="340" y2="330" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="340" y1="330" x2="340" y2="348" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- finally block -->
  <rect x="270" y="348" width="340" height="56" rx="8" fill="#0c1628" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="373" text-anchor="middle" font-size="14" font-weight="700" fill="#ce9178">finally 블록</text>
  <text x="440" y="392" text-anchor="middle" font-size="11" fill="#888">예외 여부에 관계없이 항상 실행</text>

  <!-- Arrow from try straight down when exception not matched -->
  <!-- End flow -->
  <line x1="440" y1="404" x2="440" y2="425" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="440" y="440" text-anchor="middle" font-size="12" fill="#888">프로그램 계속 실행 (또는 예외 전파)</text>
</svg>
