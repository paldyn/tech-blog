<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">장치 식별 방법 — UUID vs LABEL vs /dev 경로</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">재부팅 후에도 안정적인 식별을 위해 UUID 권장</text>

  <!-- UUID card -->
  <rect x="60" y="92" width="230" height="160" fill="#071420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">UUID= 방식 (권장)</text>
  <line x1="60" y1="120" x2="290" y2="120" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 장치 고유 128비트 식별자</text>
  <text x="76" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 재부팅 · 장치 추가 시에도</text>
  <text x="76" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">  경로 불변</text>
  <text x="76" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 가장 안전한 방법</text>
  <text x="76" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">blkid /dev/sda1</text>
  <text x="76" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">lsblk -f</text>

  <!-- LABEL card -->
  <rect x="325" y="92" width="230" height="160" fill="#071a07" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">LABEL= 방식</text>
  <line x1="325" y1="120" x2="555" y2="120" stroke="#3a4a6e" stroke-width="1"/>
  <text x="341" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 관리자가 직접 이름 부여</text>
  <text x="341" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 사람이 읽기 쉬움</text>
  <text x="341" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 중복 레이블 시 충돌 위험</text>
  <text x="341" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">e2label /dev/sdb1 data</text>
  <text x="341" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">xfs_admin -L data /dev/sdc1</text>

  <!-- /dev card -->
  <rect x="590" y="92" width="230" height="160" fill="#1a1200" rx="8" stroke="#e0a020" stroke-width="1.5"/>
  <text x="705" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a020" text-anchor="middle">/dev/sdX 방식</text>
  <line x1="590" y1="120" x2="820" y2="120" stroke="#3a4a6e" stroke-width="1"/>
  <text x="606" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 전통적 경로 방식</text>
  <text x="606" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 장치 추가/제거 시 이름이</text>
  <text x="606" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">  바뀔 수 있어 불안정</text>
  <text x="606" y="192" font-family="'e05555Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">→ VM/테스트 환경 한정 권장</text>
  <text x="606" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">/dev/sda1</text>
  <text x="606" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">/dev/nvme0n1p1</text>

  <!-- UUID lookup commands -->
  <text x="60" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">UUID 확인 및 fstab 검증 명령어</text>
  <rect x="60" y="304" width="760" height="72" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># UUID 확인</text>
  <text x="76" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">blkid</text>
  <text x="114" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      # 전체 장치 UUID/TYPE 출력</text>
  <text x="76" y="359" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">mount</text>
  <text x="120" y="359" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> -a         </text>
  <text x="220" y="359" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># fstab 전체 테스트 마운트</text>
  <text x="400" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">lsblk -f</text>
  <text x="466" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">       # FS, UUID, 마운트 포인트 표</text>
  <text x="400" y="359" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">findmnt --verify</text>
  <text x="530" y="359" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># fstab 오류 검증</text>
</svg>
