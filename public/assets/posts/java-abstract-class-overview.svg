<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <defs>
    <marker id="arr-cc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-inherit" viewBox="0 0 16 16" refX="8" refY="0"
            markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="16" orient="auto-start-reverse">
      <polygon points="0,14 16,14 8,2" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">추상 클래스 계층 구조</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">미완성 설계도 — 공통 로직과 구현 강제를 동시에</text>

  <!-- Abstract class box: x=215, y=90, w=450, h=160, bottom=250 -->
  <rect x="215" y="90" width="450" height="160" rx="8"
        fill="#0a0a0a" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Header section: y=90 to y=148 -->
  <text x="440" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">«abstract»</text>
  <text x="440" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#e8e8e8">Shape</text>

  <!-- Divider 1 -->
  <line x1="216" y1="148" x2="664" y2="148" stroke="#2a3a4e" stroke-width="1"/>

  <!-- Abstract methods section: y=148 to y=202 -->
  <text x="240" y="170"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" font-style="italic">abstract double area()</text>
  <text x="240" y="190"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" font-style="italic">abstract String describe()</text>

  <!-- Divider 2 -->
  <line x1="216" y1="202" x2="664" y2="202" stroke="#2a3a4e" stroke-width="1"/>

  <!-- Concrete method section: y=202 to y=250 -->
  <text x="240" y="230"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">void print()  {  System.out.println(describe()); }</text>

  <!-- Right annotation badges -->
  <!-- Abstract badge -->
  <rect x="672" y="158" width="100" height="26" rx="4" fill="#2a0808" stroke="#e05555" stroke-width="1"/>
  <text x="722" y="175" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">구현 강제</text>

  <!-- Concrete badge -->
  <rect x="672" y="212" width="100" height="26" rx="4" fill="#082a12" stroke="#55c555" stroke-width="1"/>
  <text x="722" y="229" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">공통 로직</text>

  <!-- Tree structure lines: from abstract bottom (440,250) down -->
  <!-- Trunk -->
  <line x1="440" y1="250" x2="440" y2="288" stroke="#7777cc" stroke-width="1.5"/>
  <!-- Left branch -->
  <line x1="440" y1="288" x2="200" y2="288" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="200" y1="288" x2="200" y2="316" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-cc)"/>
  <!-- Right branch -->
  <line x1="440" y1="288" x2="680" y2="288" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="680" y1="288" x2="680" y2="316" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-cc)"/>

  <!-- "extends" labels on arrows -->
  <text x="308" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">extends</text>
  <text x="572" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">extends</text>

  <!-- Circle class box: x=60, y=316, w=280, h=130, bottom=446 -->
  <rect x="60" y="316" width="280" height="130" rx="8"
        fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">Circle</text>
  <line x1="61" y1="350" x2="339" y2="350" stroke="#2a3a4e" stroke-width="1"/>
  <text x="84" y="372"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">@Override</text>
  <text x="84" y="390"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">double area()  { return Math.PI*r*r; }</text>
  <text x="84" y="412"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">@Override</text>
  <text x="84" y="430"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">String describe()  { return "원 r=" + r; }</text>

  <!-- Rectangle class box: x=540, y=316, w=280, h=130, bottom=446 -->
  <rect x="540" y="316" width="280" height="130" rx="8"
        fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">Rectangle</text>
  <line x1="541" y1="350" x2="819" y2="350" stroke="#2a3a4e" stroke-width="1"/>
  <text x="564" y="372"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">@Override</text>
  <text x="564" y="390"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">double area()  { return w * h; }</text>
  <text x="564" y="412"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">@Override</text>
  <text x="564" y="430"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">String describe()  { return "사각 w=" + w; }</text>

  <!-- Bottom labels -->
  <text x="200" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">구체 클래스 (모든 추상 메서드 구현)</text>
  <text x="680" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">구체 클래스 (모든 추상 메서드 구현)</text>
</svg>
