<svg xmlns="http://www.w3.org/2000/svg" width="880" height="620" viewBox="0 0 880 620" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="620" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링의 4대 핵심</text>
  <text x="440" y="74" text-anchor="middle" font-size="13" fill="#666">IoC · DI · AOP · PSA — 스프링을 스프링답게 만드는 네 기둥</text>

  <!-- ===== IoC ===== -->
  <rect x="60" y="100" width="370" height="216" fill="#0f0f0f" stroke="#2a3a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="100" width="370" height="40" fill="#1a2a0a" rx="10"/>
  <rect x="60" y="128" width="370" height="12" fill="#1a2a0a"/>
  <text x="84" y="126" font-size="15" font-weight="700" fill="#aadd55">IoC</text>
  <text x="138" y="126" font-size="13" fill="#88aa44">Inversion of Control</text>
  <text x="406" y="126" text-anchor="end" font-size="11" fill="#666">제어의 역전</text>

  <text x="84" y="162" font-size="13" fill="#bbbbbb">객체 생성·생명주기 관리를</text>
  <text x="84" y="182" font-size="13" fill="#bbbbbb">컨테이너에게 위임</text>

  <text x="84" y="212" font-size="12" fill="#777">개발자: "OrderService가 필요해"</text>
  <text x="84" y="232" font-size="12" fill="#777">컨테이너: "여기 만들어줄게,</text>
  <text x="84" y="252" font-size="12" fill="#777">           의존성도 넣어줄게"</text>

  <text x="84" y="290" font-size="12" fill="#aadd55">→ 개발자는 사용만, 관리는 스프링</text>

  <!-- ===== DI ===== -->
  <rect x="450" y="100" width="370" height="216" fill="#0f0f0f" stroke="#1a2a3a" stroke-width="1.5" rx="10"/>
  <rect x="450" y="100" width="370" height="40" fill="#0a1a2a" rx="10"/>
  <rect x="450" y="128" width="370" height="12" fill="#0a1a2a"/>
  <text x="474" y="126" font-size="15" font-weight="700" fill="#55aadd">DI</text>
  <text x="510" y="126" font-size="13" fill="#4488aa">Dependency Injection</text>
  <text x="796" y="126" text-anchor="end" font-size="11" fill="#666">의존성 주입</text>

  <text x="474" y="162" font-size="13" fill="#bbbbbb">필요한 객체(의존성)를</text>
  <text x="474" y="182" font-size="13" fill="#bbbbbb">외부에서 주입받는 패턴</text>

  <rect x="474" y="200" width="322" height="76" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="490" y="226" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 생성자 주입 (권장)</text>
  <text x="490" y="244" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Service</text>
  <text x="490" y="262" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">OrderService(OrderRepo r) {}</text>

  <text x="474" y="298" font-size="12" fill="#55aadd">→ new 없이 의존, 교체·테스트 용이</text>

  <!-- ===== AOP ===== -->
  <rect x="60" y="332" width="370" height="216" fill="#0f0f0f" stroke="#2a1a2a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="332" width="370" height="40" fill="#1a0a1a" rx="10"/>
  <rect x="60" y="360" width="370" height="12" fill="#1a0a1a"/>
  <text x="84" y="358" font-size="15" font-weight="700" fill="#cc55cc">AOP</text>
  <text x="138" y="358" font-size="13" fill="#aa44aa">Aspect-Oriented Programming</text>

  <text x="84" y="394" font-size="13" fill="#bbbbbb">횡단 관심사(로깅, 트랜잭션, 보안)를</text>
  <text x="84" y="414" font-size="13" fill="#bbbbbb">비즈니스 로직에서 분리</text>

  <rect x="84" y="430" width="322" height="76" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="100" y="456" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Around("execution(..)")</text>
  <text x="100" y="474" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">Object logTime(</text>
  <text x="100" y="492" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       ProceedingJoinPoint pjp)</text>

  <text x="84" y="528" font-size="12" fill="#cc55cc">→ 비즈니스 코드 수정 없이 기능 삽입</text>

  <!-- ===== PSA ===== -->
  <rect x="450" y="332" width="370" height="216" fill="#0f0f0f" stroke="#2a1a0a" stroke-width="1.5" rx="10"/>
  <rect x="450" y="332" width="370" height="40" fill="#2a1a0a" rx="10"/>
  <rect x="450" y="360" width="370" height="12" fill="#2a1a0a"/>
  <text x="474" y="358" font-size="15" font-weight="700" fill="#ddaa44">PSA</text>
  <text x="528" y="358" font-size="13" fill="#aa8833">Portable Service Abstraction</text>

  <text x="474" y="394" font-size="13" fill="#bbbbbb">다양한 기술을 일관된 인터페이스로</text>
  <text x="474" y="414" font-size="13" fill="#bbbbbb">추상화하여 기술 교체 용이</text>

  <rect x="474" y="430" width="322" height="76" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="490" y="456" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// JPA든 JDBC든 동일 API</text>
  <text x="490" y="474" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Transactional</text>
  <text x="490" y="492" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">void placeOrder(Order o) {}</text>

  <text x="474" y="528" font-size="12" fill="#ddaa44">→ JDBC→JPA→R2DBC 교체에도 무관</text>

  <!-- Footer -->
  <text x="440" y="592" text-anchor="middle" font-size="11" fill="#444">IoC·DI는 구조, AOP는 분리, PSA는 이식성 — 세 개념이 맞물려 '스프링다운 코드'가 만들어진다</text>
</svg>
