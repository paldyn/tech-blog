<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링의 4대 핵심</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#555">IoC · DI · AOP · PSA — 스프링을 스프링답게 만드는 네 가지 기둥</text>

  <!-- IoC -->
  <rect x="60" y="92" width="360" height="176" fill="#0f0f0f" stroke="#2a3a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="92" width="360" height="40" fill="#1a2a0a" rx="10"/>
  <rect x="60" y="120" width="360" height="12" fill="#1a2a0a"/>
  <text x="80" y="118" font-size="15" font-weight="700" fill="#aadd55">IoC</text>
  <text x="130" y="118" font-size="12" fill="#88aa44">Inversion of Control</text>
  <text x="300" y="118" text-anchor="end" font-size="11" fill="#555">제어의 역전</text>
  <text x="80" y="148" font-size="12" fill="#aaa">객체 생성·생명주기 관리를</text>
  <text x="80" y="166" font-size="12" fill="#aaa">컨테이너에게 위임</text>
  <text x="80" y="190" font-size="11" fill="#666">개발자: "OrderService가 필요해"</text>
  <text x="80" y="208" font-size="11" fill="#666">컨테이너: "여기 만들어줄게,</text>
  <text x="80" y="224" font-size="11" fill="#666">         의존성도 넣어줄게"</text>
  <text x="80" y="248" font-size="11" fill="#aadd55">→ 개발자는 사용만, 관리는 스프링</text>

  <!-- DI -->
  <rect x="460" y="92" width="360" height="176" fill="#0f0f0f" stroke="#1a2a3a" stroke-width="1.5" rx="10"/>
  <rect x="460" y="92" width="360" height="40" fill="#0a1a2a" rx="10"/>
  <rect x="460" y="120" width="360" height="12" fill="#0a1a2a"/>
  <text x="480" y="118" font-size="15" font-weight="700" fill="#55aadd">DI</text>
  <text x="518" y="118" font-size="12" fill="#4488aa">Dependency Injection</text>
  <text x="800" y="118" text-anchor="end" font-size="11" fill="#555">의존성 주입</text>
  <text x="480" y="148" font-size="12" fill="#aaa">필요한 객체(의존성)를</text>
  <text x="480" y="166" font-size="12" fill="#aaa">외부에서 주입받는 패턴</text>
  <rect x="480" y="178" width="320" height="56" fill="#070b14" stroke="#1e2433" stroke-width="1" rx="6"/>
  <text x="496" y="196" font-size="10" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 생성자 주입 (권장)</text>
  <text x="496" y="212" font-size="10" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">OrderService(OrderRepo repo) {}</text>
  <text x="480" y="248" font-size="11" fill="#55aadd">→ new 없이 의존, 교체 가능, 테스트 용이</text>

  <!-- AOP -->
  <rect x="60" y="288" width="360" height="196" fill="#0f0f0f" stroke="#2a1a2a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="288" width="360" height="40" fill="#1a0a1a" rx="10"/>
  <rect x="60" y="316" width="360" height="12" fill="#1a0a1a"/>
  <text x="80" y="314" font-size="15" font-weight="700" fill="#cc55cc">AOP</text>
  <text x="128" y="314" font-size="12" fill="#aa44aa">Aspect-Oriented Programming</text>
  <text x="80" y="344" font-size="12" fill="#aaa">횡단 관심사(로깅, 트랜잭션, 보안)를</text>
  <text x="80" y="362" font-size="12" fill="#aaa">비즈니스 로직에서 분리</text>
  <rect x="80" y="374" width="320" height="72" fill="#070b14" stroke="#1e2433" stroke-width="1" rx="6"/>
  <text x="96" y="392" font-size="10" fill="#cc88ff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Around("execution(* service.*.*(..))")</text>
  <text x="96" y="408" font-size="10" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">Object logTime(ProceedingJoinPoint pjp)</text>
  <text x="96" y="424" font-size="10" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    throws Throwable { ... }</text>
  <text x="80" y="464" font-size="11" fill="#cc55cc">→ 비즈니스 코드 수정 없이 기능 삽입</text>

  <!-- PSA -->
  <rect x="460" y="288" width="360" height="196" fill="#0f0f0f" stroke="#2a1a0a" stroke-width="1.5" rx="10"/>
  <rect x="460" y="288" width="360" height="40" fill="#2a1a0a" rx="10"/>
  <rect x="460" y="316" width="360" height="12" fill="#2a1a0a"/>
  <text x="480" y="314" font-size="15" font-weight="700" fill="#ddaa44">PSA</text>
  <text x="528" y="314" font-size="12" fill="#aa8833">Portable Service Abstraction</text>
  <text x="480" y="344" font-size="12" fill="#aaa">다양한 기술을 일관된 인터페이스로</text>
  <text x="480" y="362" font-size="12" fill="#aaa">추상화하여 기술 교체 용이</text>
  <rect x="480" y="374" width="320" height="72" fill="#070b14" stroke="#1e2433" stroke-width="1" rx="6"/>
  <text x="496" y="392" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// JPA든 JDBC든 동일한 API</text>
  <text x="496" y="408" font-size="10" fill="#ddaa66" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Transactional</text>
  <text x="496" y="424" font-size="10" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">void placeOrder(Order o) { ... }</text>
  <text x="480" y="464" font-size="11" fill="#ddaa44">→ JDBC→JPA→R2DBC 교체해도 코드 무관</text>

  <!-- Footer -->
  <text x="440" y="500" text-anchor="middle" font-size="11" fill="#444">IoC·DI는 구조, AOP는 분리, PSA는 이식성 — 세 개념이 맞물려 '스프링다운 코드'가 만들어진다</text>
</svg>
