<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스프링 4대 핵심 개념</text>

  <!-- Center circle label -->
  <circle cx="440" cy="260" r="56" fill="#131a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="254" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Spring</text>
  <text x="440" y="272" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Core</text>

  <!-- IoC box (top left) -->
  <rect x="60" y="80" width="230" height="140" fill="#0e1420" rx="10" stroke="#7777cc" stroke-width="2"/>
  <text x="175" y="110" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">IoC</text>
  <text x="175" y="130" font-size="12" fill="#888" text-anchor="middle">Inversion of Control</text>
  <text x="175" y="152" font-size="12" fill="#888" text-anchor="middle">제어의 역전</text>
  <line x1="80" y1="168" x2="370" y2="168" stroke="#333" stroke-width="1"/>
  <text x="80" y="187" font-size="12" fill="#e8e8e8">객체 생성·생명주기를</text>
  <text x="80" y="205" font-size="12" fill="#e8e8e8">컨테이너가 담당</text>

  <!-- DI box (top right) -->
  <rect x="590" y="80" width="230" height="140" fill="#0e1420" rx="10" stroke="#55c555" stroke-width="2"/>
  <text x="705" y="110" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">DI</text>
  <text x="705" y="130" font-size="12" fill="#888" text-anchor="middle">Dependency Injection</text>
  <text x="705" y="152" font-size="12" fill="#888" text-anchor="middle">의존성 주입</text>
  <line x1="610" y1="168" x2="800" y2="168" stroke="#333" stroke-width="1"/>
  <text x="610" y="187" font-size="12" fill="#e8e8e8">필요한 객체를 외부에서</text>
  <text x="610" y="205" font-size="12" fill="#e8e8e8">주입받아 결합도 감소</text>

  <!-- AOP box (bottom left) -->
  <rect x="60" y="300" width="230" height="140" fill="#0e1420" rx="10" stroke="#ce9178" stroke-width="2"/>
  <text x="175" y="330" font-size="16" font-weight="600" fill="#ce9178" text-anchor="middle">AOP</text>
  <text x="175" y="350" font-size="12" fill="#888" text-anchor="middle">Aspect-Oriented</text>
  <text x="175" y="368" font-size="12" fill="#888" text-anchor="middle">관점 지향 프로그래밍</text>
  <line x1="80" y1="384" x2="370" y2="384" stroke="#333" stroke-width="1"/>
  <text x="80" y="403" font-size="12" fill="#e8e8e8">로깅·트랜잭션 등</text>
  <text x="80" y="421" font-size="12" fill="#e8e8e8">횡단 관심사를 분리</text>

  <!-- PSA box (bottom right) -->
  <rect x="590" y="300" width="230" height="140" fill="#0e1420" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="705" y="330" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">PSA</text>
  <text x="705" y="350" font-size="12" fill="#888" text-anchor="middle">Portable Service</text>
  <text x="705" y="368" font-size="12" fill="#888" text-anchor="middle">Abstraction</text>
  <line x1="610" y1="384" x2="800" y2="384" stroke="#333" stroke-width="1"/>
  <text x="610" y="403" font-size="12" fill="#e8e8e8">기술 구현에 독립적인</text>
  <text x="610" y="421" font-size="12" fill="#e8e8e8">추상화 인터페이스 제공</text>

  <!-- Connecting lines to center -->
  <line x1="290" y1="150" x2="390" y2="220" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="590" y1="150" x2="490" y2="220" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="290" y1="370" x2="390" y2="300" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="590" y1="370" x2="490" y2="300" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Footer -->
  <text x="440" y="476" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #2 · Chapter 1</text>
</svg>
