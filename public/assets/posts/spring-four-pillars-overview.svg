<svg xmlns="http://www.w3.org/2000/svg" width="880" height="640" viewBox="0 0 880 640" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="640" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링의 4대 핵심</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">IoC · DI · AOP · PSA — 스프링을 스프링답게 만드는 네 기둥</text>

  <!-- ===== IoC (top-left) ===== -->
  <rect x="60" y="96" width="370" height="232" fill="#0f1408" stroke="#3a4a1a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="96" width="370" height="42" fill="#1a2208" rx="10"/>
  <rect x="60" y="126" width="370" height="12" fill="#1a2208"/>
  <text x="84" y="122" font-size="15" font-weight="600" fill="#aadd55">IoC · Inversion of Control</text>
  <text x="406" y="122" text-anchor="end" font-size="11" fill="#666">제어의 역전</text>

  <text x="84" y="166" font-size="13" fill="#bbbbbb">객체 생성과 생명주기 관리를</text>
  <text x="84" y="186" font-size="13" fill="#bbbbbb">개발자가 아닌 컨테이너에 위임</text>

  <text x="84" y="220" font-size="12" fill="#888">개발자 — "OrderService가 필요해"</text>
  <text x="84" y="240" font-size="12" fill="#888">컨테이너 — "내가 만들고 의존성도</text>
  <text x="98" y="258" font-size="12" fill="#888">주입해줄게"</text>

  <text x="84" y="298" font-size="12" fill="#aadd55">→ 사용은 개발자, 관리는 스프링</text>

  <!-- ===== DI (top-right) ===== -->
  <rect x="450" y="96" width="370" height="232" fill="#08111c" stroke="#1e3a5a" stroke-width="1.5" rx="10"/>
  <rect x="450" y="96" width="370" height="42" fill="#0a1a2a" rx="10"/>
  <rect x="450" y="126" width="370" height="12" fill="#0a1a2a"/>
  <text x="474" y="122" font-size="15" font-weight="600" fill="#7ec8e3">DI · Dependency Injection</text>
  <text x="796" y="122" text-anchor="end" font-size="11" fill="#666">의존성 주입</text>

  <text x="474" y="166" font-size="13" fill="#bbbbbb">필요한 객체(의존성)를</text>
  <text x="474" y="186" font-size="13" fill="#bbbbbb">외부에서 주입받는 패턴</text>

  <!-- code block -->
  <rect x="474" y="204" width="322" height="74" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="490" y="230" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 생성자 주입 (권장)</text>
  <text x="490" y="248" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Service</text>
  <text x="490" y="266" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">OrderService(OrderRepo r) {}</text>

  <text x="474" y="306" font-size="12" fill="#7ec8e3">→ new 없이 의존, 교체·테스트 용이</text>

  <!-- ===== AOP (bottom-left) ===== -->
  <rect x="60" y="344" width="370" height="232" fill="#140a14" stroke="#3a1a3a" stroke-width="1.5" rx="10"/>
  <rect x="60" y="344" width="370" height="42" fill="#1a0a1a" rx="10"/>
  <rect x="60" y="374" width="370" height="12" fill="#1a0a1a"/>
  <text x="84" y="370" font-size="15" font-weight="600" fill="#cc77cc">AOP · Aspect-Oriented</text>
  <text x="406" y="370" text-anchor="end" font-size="11" fill="#666">관점 지향 프로그래밍</text>

  <text x="84" y="414" font-size="13" fill="#bbbbbb">횡단 관심사(로깅·트랜잭션·보안)를</text>
  <text x="84" y="434" font-size="13" fill="#bbbbbb">비즈니스 로직에서 분리</text>

  <rect x="84" y="452" width="322" height="74" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="100" y="478" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Around("execution(..)")</text>
  <text x="100" y="496" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">Object logTime(</text>
  <text x="114" y="514" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">ProceedingJoinPoint pjp)</text>

  <text x="84" y="554" font-size="12" fill="#cc77cc">→ 비즈니스 코드 수정 없이 기능 삽입</text>

  <!-- ===== PSA (bottom-right) ===== -->
  <rect x="450" y="344" width="370" height="232" fill="#1a1208" stroke="#3a2a08" stroke-width="1.5" rx="10"/>
  <rect x="450" y="344" width="370" height="42" fill="#2a1a08" rx="10"/>
  <rect x="450" y="374" width="370" height="12" fill="#2a1a08"/>
  <text x="474" y="370" font-size="15" font-weight="600" fill="#ddaa44">PSA · Portable Service</text>
  <text x="796" y="370" text-anchor="end" font-size="11" fill="#666">이식 가능 추상화</text>

  <text x="474" y="414" font-size="13" fill="#bbbbbb">다양한 기술을 일관된 인터페이스로</text>
  <text x="474" y="434" font-size="13" fill="#bbbbbb">추상화 — 기술 교체가 자유로움</text>

  <rect x="474" y="452" width="322" height="74" fill="#070b14" stroke="#1e2433" rx="6"/>
  <text x="490" y="478" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// JPA든 JDBC든 동일 API</text>
  <text x="490" y="496" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Transactional</text>
  <text x="490" y="514" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">void placeOrder(Order o) {}</text>

  <text x="474" y="554" font-size="12" fill="#ddaa44">→ JDBC → JPA → R2DBC 교체에도 무관</text>

  <text x="440" y="612" text-anchor="middle" font-size="11" fill="#444">IoC·DI는 구조, AOP는 분리, PSA는 이식성 — 네 개념이 맞물려 '스프링다운 코드'가 된다</text>
</svg>
