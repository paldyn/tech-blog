<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PL/SQL 변수, 커서, 예외</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">스칼라 변수 / 명시적 커서 / 사용자 정의 예외</text>

  <!-- Left: Variable types -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">변수 종류</text>
  <rect x="60" y="108" width="360" height="200" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 스칼라 변수</text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">v_id     </text><text x="148" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">NUMBER</text><text x="196" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(6) := </text><text x="248" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">100</text><text x="272" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">v_flag   </text><text x="148" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">BOOLEAN</text><text x="208" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> := </text><text x="232" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">TRUE</text><text x="268" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- %TYPE: 컬럼과 동일 타입</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">v_name   employees.last_name</text><text x="292" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">%TYPE</text><text x="332" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- %ROWTYPE: 행 전체</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">r_emp    employees</text><text x="216" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">%ROWTYPE</text><text x="288" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 상수</text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">c_pi     </text><text x="148" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CONSTANT NUMBER</text><text x="280" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> := </text><text x="304" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">3.14159</text><text x="364" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- SUBTYPE 사용자 정의 하위타입</text>

  <!-- Right: Explicit cursor lifecycle -->
  <text x="460" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">명시적 커서 라이프사이클</text>
  <rect x="460" y="108" width="360" height="200" fill="#111" rx="6" stroke="#2a2a2a" stroke-width="1"/>

  <!-- 4 steps with boxes and arrows -->
  <rect x="560" y="118" width="160" height="28" fill="#1e2433" rx="4"/>
  <text x="640" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">① DECLARE (선언)</text>

  <polygon points="636,150 644,150 640,158" fill="#7777cc"/>
  <line x1="640" y1="146" x2="640" y2="150" stroke="#7777cc" stroke-width="1.5"/>

  <rect x="560" y="158" width="160" height="28" fill="#1e2433" rx="4"/>
  <text x="640" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">② OPEN (실행)</text>

  <polygon points="636,190 644,190 640,198" fill="#7777cc"/>
  <line x1="640" y1="186" x2="640" y2="190" stroke="#7777cc" stroke-width="1.5"/>

  <rect x="560" y="198" width="160" height="28" fill="#1e2433" rx="4"/>
  <text x="640" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">③ FETCH (행 가져오기)</text>

  <polygon points="636,230 644,230 640,238" fill="#7777cc"/>
  <line x1="640" y1="226" x2="640" y2="230" stroke="#7777cc" stroke-width="1.5"/>

  <rect x="560" y="238" width="160" height="28" fill="#1e2433" rx="4"/>
  <text x="640" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">④ CLOSE (종료)</text>

  <!-- cursor attributes -->
  <rect x="470" y="278" width="340" height="26" fill="#0d1a0d" rx="4"/>
  <text x="640" y="295" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">%ISOPEN  %FOUND  %NOTFOUND  %ROWCOUNT</text>

  <!-- Implicit vs Explicit -->
  <rect x="60" y="322" width="760" height="50" fill="#1e1e10" rx="6" stroke="#3a3a1a" stroke-width="1"/>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">묵시적 커서(SQL%) vs. 명시적 커서(사용자 선언)</text>
  <text x="280" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SQL%ROWCOUNT / SQL%FOUND — DML 직후 자동 제공</text>
  <text x="640" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">명시적 커서 — 다중 행 결과를 반복 처리할 때</text>

  <!-- Exception types -->
  <text x="60" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">예외 종류</text>
  <rect x="60" y="398" width="760" height="100" fill="#111620" rx="6" stroke="#2a3a50" stroke-width="1"/>

  <!-- header -->
  <text x="200" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">종류</text>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">예</text>
  <text x="680" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">처리 방법</text>
  <line x1="70" y1="424" x2="810" y2="424" stroke="#2a3a50" stroke-width="1"/>

  <text x="200" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">사전정의 예외</text>
  <text x="440" y="442" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">NO_DATA_FOUND, TOO_MANY_ROWS, DUP_VAL_ON_INDEX</text>
  <text x="680" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">WHEN 이름 THEN</text>

  <text x="200" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">내부 미정의 예외</text>
  <text x="440" y="462" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">PRAGMA EXCEPTION_INIT 으로 연결</text>
  <text x="680" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ORA-번호 매핑</text>

  <text x="200" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">사용자 정의 예외</text>
  <text x="440" y="482" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">DECLARE e_my_err EXCEPTION; ... RAISE e_my_err;</text>
  <text x="680" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비즈니스 규칙 위반</text>
</svg>
