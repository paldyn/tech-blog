<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">4xx 클라이언트 오류</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">요청이 잘못됨 — 클라이언트가 수정해야 함</text>

  <!-- 400 -->
  <rect x="60" y="90" width="760" height="50" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="90" width="74" height="50" rx="6" fill="#140b0b" stroke="#e05555" stroke-width="1.5"/>
  <text x="97" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e05555" text-anchor="middle">400</text>
  <text x="168" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Bad Request</text>
  <text x="168" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">잘못된 문법·파라미터 누락·잘못된 타입 — 요청 자체를 파싱 불가</text>

  <!-- 401 -->
  <rect x="60" y="148" width="760" height="50" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="148" width="74" height="50" rx="6" fill="#140b0b" stroke="#e05555" stroke-width="1.5"/>
  <text x="97" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e05555" text-anchor="middle">401</text>
  <text x="168" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Unauthorized</text>
  <text x="168" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인증 필요 · WWW-Authenticate 헤더로 방법 안내 · "미인증" (이름과 달리)</text>

  <!-- 403 -->
  <rect x="60" y="206" width="760" height="50" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="206" width="74" height="50" rx="6" fill="#140b0b" stroke="#e05555" stroke-width="1.5"/>
  <text x="97" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e05555" text-anchor="middle">403</text>
  <text x="168" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Forbidden</text>
  <text x="168" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인가 거부 · 인증은 됐으나 권한 없음 · 리소스 존재 자체를 숨길 때는 404 사용</text>

  <!-- 404 -->
  <rect x="60" y="264" width="760" height="50" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="264" width="74" height="50" rx="6" fill="#140b0b" stroke="#e05555" stroke-width="1.5"/>
  <text x="97" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e05555" text-anchor="middle">404</text>
  <text x="168" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Not Found</text>
  <text x="168" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">리소스 없음 · 또는 존재 여부를 숨기고 싶을 때 (보안 목적으로 403 대신)</text>

  <!-- 405 -->
  <rect x="60" y="322" width="760" height="50" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <rect x="60" y="322" width="74" height="50" rx="6" fill="#140b0b" stroke="#e05555" stroke-width="1"/>
  <text x="97" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e05555" text-anchor="middle">405</text>
  <text x="168" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Method Not Allowed</text>
  <text x="168" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">해당 경로에서 메서드 허용 안 됨 · Allow 헤더로 허용 메서드 목록 제공</text>

  <!-- 409/422/429 -->
  <rect x="60" y="380" width="220" height="50" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="97" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">409 Conflict</text>
  <text x="97" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리소스 상태 충돌</text>

  <rect x="300" y="380" width="260" height="50" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="430" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">422 Unprocessable</text>
  <text x="430" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">문법 OK, 의미 오류 (검증 실패)</text>

  <rect x="580" y="380" width="240" height="50" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="700" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">429 Too Many Req</text>
  <text x="700" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">요청 횟수 초과 (Rate Limit)</text>

  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">401 vs 403: 401 = 로그인 필요 / 403 = 로그인해도 접근 불가</text>
  <text x="440" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">404를 보안 목적으로 쓰면 디버깅 어려움 — 내부 API에선 403 명시 권장</text>
  <text x="440" y="494" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">418 I'm a teapot — RFC 2324 April Fools' Day 농담 RFC (실제 표준 아님)</text>
</svg>
