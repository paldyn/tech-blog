<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Sliding Window Attention vs Full Attention</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Mistral 7B의 핵심 효율화 기법</text>

  <!-- Full Attention label -->
  <text x="200" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">Full Attention</text>
  <text x="200" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">O(n²) 메모리</text>

  <!-- Full Attention grid -->
  <g transform="translate(80,136)">
    <!-- 6x6 grid, all above diagonal filled -->
    <rect x="0" y="0" width="240" height="240" rx="4" fill="#0d1117" stroke="#333"/>
    <!-- Row cells: full attention means each token attends to all previous -->
    <!-- row 0 -->
    <rect x="4" y="4" width="32" height="32" rx="2" fill="#e05555" opacity="0.8"/>
    <!-- row 1 -->
    <rect x="4" y="44" width="32" height="32" rx="2" fill="#e05555" opacity="0.6"/>
    <rect x="44" y="44" width="32" height="32" rx="2" fill="#e05555" opacity="0.8"/>
    <!-- row 2 -->
    <rect x="4" y="84" width="32" height="32" rx="2" fill="#e05555" opacity="0.4"/>
    <rect x="44" y="84" width="32" height="32" rx="2" fill="#e05555" opacity="0.6"/>
    <rect x="84" y="84" width="32" height="32" rx="2" fill="#e05555" opacity="0.8"/>
    <!-- row 3 -->
    <rect x="4" y="124" width="32" height="32" rx="2" fill="#e05555" opacity="0.3"/>
    <rect x="44" y="124" width="32" height="32" rx="2" fill="#e05555" opacity="0.4"/>
    <rect x="84" y="124" width="32" height="32" rx="2" fill="#e05555" opacity="0.6"/>
    <rect x="124" y="124" width="32" height="32" rx="2" fill="#e05555" opacity="0.8"/>
    <!-- row 4 -->
    <rect x="4" y="164" width="32" height="32" rx="2" fill="#e05555" opacity="0.2"/>
    <rect x="44" y="164" width="32" height="32" rx="2" fill="#e05555" opacity="0.3"/>
    <rect x="84" y="164" width="32" height="32" rx="2" fill="#e05555" opacity="0.4"/>
    <rect x="124" y="164" width="32" height="32" rx="2" fill="#e05555" opacity="0.6"/>
    <rect x="164" y="164" width="32" height="32" rx="2" fill="#e05555" opacity="0.8"/>
    <!-- row 5 -->
    <rect x="4" y="204" width="32" height="32" rx="2" fill="#e05555" opacity="0.2"/>
    <rect x="44" y="204" width="32" height="32" rx="2" fill="#e05555" opacity="0.2"/>
    <rect x="84" y="204" width="32" height="32" rx="2" fill="#e05555" opacity="0.3"/>
    <rect x="124" y="204" width="32" height="32" rx="2" fill="#e05555" opacity="0.4"/>
    <rect x="164" y="204" width="32" height="32" rx="2" fill="#e05555" opacity="0.6"/>
    <rect x="204" y="204" width="32" height="32" rx="2" fill="#e05555" opacity="0.8"/>
    <!-- axis labels -->
    <text x="120" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">키 위치</text>
  </g>
  <text x="80" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">모든 이전 토큰에 어텐션</text>

  <!-- SWA label -->
  <text x="620" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Sliding Window Attention</text>
  <text x="620" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">O(n×w) 메모리 (w=윈도우 크기)</text>

  <!-- SWA grid -->
  <g transform="translate(500,136)">
    <rect x="0" y="0" width="240" height="240" rx="4" fill="#0d1117" stroke="#333"/>
    <!-- window=2: each token only attends to 2 previous tokens -->
    <!-- row 0 -->
    <rect x="4" y="4" width="32" height="32" rx="2" fill="#55c555" opacity="0.8"/>
    <!-- row 1 -->
    <rect x="4" y="44" width="32" height="32" rx="2" fill="#55c555" opacity="0.5"/>
    <rect x="44" y="44" width="32" height="32" rx="2" fill="#55c555" opacity="0.8"/>
    <!-- row 2 -->
    <rect x="44" y="84" width="32" height="32" rx="2" fill="#55c555" opacity="0.5"/>
    <rect x="84" y="84" width="32" height="32" rx="2" fill="#55c555" opacity="0.8"/>
    <!-- row 3 -->
    <rect x="84" y="124" width="32" height="32" rx="2" fill="#55c555" opacity="0.5"/>
    <rect x="124" y="124" width="32" height="32" rx="2" fill="#55c555" opacity="0.8"/>
    <!-- row 4 -->
    <rect x="124" y="164" width="32" height="32" rx="2" fill="#55c555" opacity="0.5"/>
    <rect x="164" y="164" width="32" height="32" rx="2" fill="#55c555" opacity="0.8"/>
    <!-- row 5 -->
    <rect x="164" y="204" width="32" height="32" rx="2" fill="#55c555" opacity="0.5"/>
    <rect x="204" y="204" width="32" height="32" rx="2" fill="#55c555" opacity="0.8"/>
    <text x="120" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">키 위치</text>
  </g>
  <text x="500" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">윈도우 내 이전 토큰만 어텐션 → 메모리↓ 속도↑</text>
</svg>
